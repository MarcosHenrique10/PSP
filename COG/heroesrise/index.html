 this moment is:\n\n*choice\n\t#Now that I'm outed, I need to find Grandma. She isn't safe.\n\t\tAny one of your enemies can locate Grandma easily, now that your Sterling identity is compromised. The only thing keeping you sane is the thought that Jenny is on her way to your apartment right now.\n\n\t\t*if chip_butler\n\t\t\t\"Excuse me, ${sir_mad},\" MeChip ${chipname} interrupts, \"I've been dialing Jenny at your request and she finally answered. Shall I patch you through?\"\n\t\t\t*goto rightnow\n\t\t*elseif chip_diva\n\t\t\t\"Honey child,\" MeChip ${chipname} interrupts, \"I've been ringing Jenny nonstop and she finally answered. Want to chat?\"\n\t\t\t*goto rightnow\n\t\t*else\n\t\t\t\"Sorry to interrupt, sweetheart,\" MeChip ${chipname} interrupts, \"But I've been dialing Jenny at your request and she finally answered. Should I transfer you through?\"\n\t\t\t*goto rightnow\n\t#I need to find Prodigal. Now.\n\t\tWith Jenny on her way to find Grandma, you have to focus on solving this problem at its source. Prodigal must be stopped.\n\t\t*goto sonja\n\t#I need some time to gather my thoughts.\n\t\tSo much has just happened; you need to make sure your next move is the right one. So you pause for a moment, trying to catch your breath.\n\t\t*goto sonja\n\n*label rightnow\n\n\"Yes,\" you shout out loud, wishing MeChip ${chipname} was upgraded enough to have emergency-situation personality simulators.\n\nSeconds later, Jenny appears in your mind.\n\n\"I'm almost there. I'll call you the moment I arrive,\" she says.\n\n\"Jenny, did you-\"\n\n\"Yes. The Prodigal video is already all over the news—she knew all of MC's press would be at the party to see what she did. Just breathe, ${firstname}. We'll figure this out after I've found your Grandma. I'll call you right back.\"\n\nWith that, Jenny hangs up. You just pray she'll find Grandma safe and sound….\n*page_break\n*goto sonja\n\n*label sonja\n\n*if choose_reporter\n\t\"${codename}, I can't thank you enough for choosing to save me—I will always have your back for that,\" Sonja says, pulling you back to reality. \"But I should get to my office. Maybe I can do some damage control with the press, cast some doubts over Prodigal's claims.\"\n\n\tYou start to respond, but Sonja cuts you off: \"I can get there on my own and I'll make sure to have protection. If I learn anything useful about Prodigal, you'll be the first to know.\"\n\n\tYou nod, grateful for Sonja's dizzying pace. \n\n\t\"Now go get that bitch,\" Sonja says before vanishing from sight.\n\t*page_break\n\t*goto jumbotron\n*else\n\tSteeling yourself, you turn to ${sidekick}. \"You should get home.\"\n\n\t\"${codename}, I can't thank you enough for choosing to save me. But I'm not going anywhere,\" ${skze} says, crossing ${skhis} arms. \"We're in this together. I've earned that right.\"\n\n\tYou nod—after all ${skze} has been through tonight, ${sidekick} deserves to see this through to the end, if that's what ${skze} wants.\n\n\t*if tarana\n\t\t\"${codename}, I think there's something I should tell you…\" Tarana Rain starts, hugging herself. But you've already moved on.\n\t\t*goto jumbotron \n\t*else\n\t\t*goto jumbotron\n\n*label jumbotron\n\nYou try to pull yourself together but it doesn't help when you catch a glimpse of a nearby jumbotron that displays Mayor Victon's holo-image, addressing the public.\n\n\"…not yet sure how this heinous murder was allowed to happen,\" he says, \"but we're certainly going to bring the so-called 'hero' ${codename} in for questioning. This is exactly the kind of amateur irresponsibility that Millennia City must begin to…\"\n\nYou turn away and tune out, not having time to focus on anything but your next move. You take a deep breath and try to stem the tide of panic that wells up inside you, harnessing the adrenaline coursing through your body.\n\nIt might be time to ask for help—but who should you call?\n\n*choice\n\t#Black Magic.\n\t\t*if (rlshp_bm > 50)\n\t\t\t\"${codename}, are you all right?\" Black Magic asks, panicked. \n\n\t\t\tYou don't know how to even begin to answer that question. So instead you say, \"I need help finding Prodigal.\"\n\n\t\t\t\"I'll do everything I can,\" Black Magic says without hesitation. \"Where are you? Do you need anything else?\"\n\n\t\t\t\"I'm taking care of it but I may need protection for my family.\"\n\n\t\t\t\"Just say the word—they can come to the MGHQ.\"\n\n\t\t\t\"Black Magic…\" you start, emotions pounding—${bmze} is still here for you, even after the way you've been treating ${bmhir}.\n\n\t\t\tYou try to find the right words, but before you can, MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t*set legend +5\n\t\t\t*set bm_rescue true\n\t\t\t*goto ambush \n\t\t*else\n\t\t\t\"I thought you might call,\" Black Magic says. \"How are you?\"\n\n\t\t\tYou can't fathom why Black Magic would ask a question like that, considering what has just happened to you. Maybe ${skze} hasn't seen the news yet…\n\n\t\t\t\"Black Magic, I know we have to sort through some things, but-\"\n\n\t\t\t\"You thought you'd still call me for help in your hour of need?\" Black Magic says, sounding chilly. \"You weren't there for me in mine, ${codename}. You haven't even had the decency to call me back. So don't expect any support from me.\"\n\n\t\t\tAnger swells up inside of you and you're about to shout in return, but MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t*set bm_wrong true\n\t\t\t*set legend -5\n\t\t\t*if guard_possible\n\t\t\t\t*set guard_possible false\n\t\t\t\t*goto ambush\n\t\t\t*else\n\t\t\t\t*goto ambush\n\t*if (sanders) #Officer Sanders.\n\t\t\"${codename}, it's good that you called,\" Officer Sanders says without missing a beat. \"What can I help with?\"\n\n\t\t\"I need to find Prodigal,\" you say, the smallest bit of relief forming thanks to this immediate support.\n\n\t\t\"I'll do everything I can,\" Officer Sanders says without hesitation. \"Where are you? Do you need anything else?\"\n\n\t\t\"I'm taking care of it but I may need protection for my family.\"\n\n\t\t\"Just say the word and I'll work up a full escort unit,\" Officer Sanders says. \"You don't deserve this, ${codename}. You'll make it through this; I'm going to make sure of that.\"\n\n\t\tYou try to find the right words to express your gratitude, but you're interrupted as MeChip ${chipname} appears with a call from Jenny.\n\n\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t*set sanders_rescue true\n\t\t*set legend +5\n\t\t*goto ambush\n\t#The Millennial Group.\n\t\t*if diva\n\t\t\t\"Well, if it isn't the little hero of the hour. What can I do for you, darling?\"\n\n\t\t\tYou hear The Diva's voice answer the Group's emergency line and immediately hang up. There's no way someone like her is going to be of any help to you.\n\n\t\t\tWhich is just as well, since MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t*set rlshp_mg %-20\n\t\t\t*set legend -5\n\t\t\t*if guard_possible\n\t\t\t\t*set guard_possible false\n\t\t\t\t*goto ambush\n\t\t\t*else\n\t\t\t\t*goto ambush\n\t\t*else\n\t\t\t*if fistfull_bad\n\t\t\t\t\"Looks like the nasty, little Gene Hazard is getting a karmic kick in the ass, huh?\" \n\n\t\t\t\tYou hear Fistfull's voice answer the Group's emergency line and immediately hang up. There's no way he is going to be of any help to you, not after what you've done to him.\n\n\t\t\t\tWhich is just as well, since MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t\t*set rlshp_mg %-20\n\t\t\t\t*set legend -5\n\t\t\t\t*if guard_possible\n\t\t\t\t\t*set guard_possible false\n\t\t\t\t\t*goto ambush\n\t\t\t\t*else\n\t\t\t\t\t*goto ambush\n\t\t\t*else\n\t\t\t\t\"${codename}, I'm so glad you called,\" Fistfull says, answering the Group's emergency line. \"How can I help?\"\n\n\t\t\t\t\"I need to find Prodigal,\" you say, the smallest bit of relief forming thanks to this immediate support.\n\n\t\t\t\t\"I'll get on it right now,\" Fistfull says without hesitation. \"Where you at? Need anything else?\"\n\n\t\t\t\t\"I'm taking care of it but I may need protection for my family.\"\n\n\t\t\t\t\"They can come to the headquarters, no problem,\"  Fistfull says. \"You don't deserve this, ${codename}. After what you did for me and Monk, we're going to make sure you get through this.\"\n\n\t\t\t\tYou try to find the right words to express your gratitude, but you're interrupted as MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t\t*set rlshp_mg %+20\n\t\t\t\t*set legend +5\n\t\t\t\t*set ffgoodcall true\n\t\t\t\t*goto ambush\n\t#Rebellion.\n\t\t*if guard_possible\n\t\t\t\"${codename}, it's good that you called,\" Rebellion says without missing a beat. \"What can I help with?\"\n\n\t\t\t\"I need to find Prodigal,\" you say, the smallest bit of relief forming thanks to this immediate support.\n\n\t\t\t\"I'll get the whole Group on it,\" Rebellion says, without hesitation. \"Where are you? Do you need anything else?\"\n\n\t\t\t\"I'm taking care of it but I may need protection for my family.\"\n\n\t\t\t\"Just say the word and they can come to the MGHQ,\"  Rebellion says. \"You don't deserve this, ${codename}. You're a good hero and you're going to get through this. I'm going to make sure of that.\"\n\n\t\t\tYou try to find the right words to express your gratitude, but you're interrupted as MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t*set legend +5\n\t\t\t*set rebellion_rescue true\n\t\t\t*goto ambush\n\t\t*else\n\t\t\t\"${codename}, are you all right?\" Rebellion says, answering your call.\n\n\t\t\tYou don't know how to even begin to answer that question. So instead you say, \"I need help finding Prodigal.\"\n\n\t\t\t\"Listen kid, I like you. But after all that's happened between you and my Group members, I really can't be there for you on this one. It just wouldn't look right,\" Rebellion says, \"I hate to say it, but you're on your own. Best of luck.\" \n\n\t\t\tAnger swells up inside of you and you're about to shout in return, but MeChip ${chipname} appears with a call from Jenny.\n\n\t\t\tYou hold your breath and switch the calls, more nervous than you've ever been.\n\t\t\t*set legend -5\n\t\t\t*goto ambush\n\t#No one—I need to work alone now.\n\t\t*set solo_call true\n\t\tYou're not dragging anyone else into this mess. Period. You need to finish this on your own.\n\n\t\tAt least that's what you think, until MeChip ${chipname} appears with a call from Jenny.\n\n\t\tYou hold your breath and answer the call, more nervous than you've ever been.\n\t\t*if (soloist >= 50)\n\t\t\t*set legend +5\n\t\t\t*goto ambush\n\t\t*if (soloist \u003c 50)\n\t\t\t*set legend -5\n\t\t\t*goto ambush\n\n*label ambush\n\n*page_break\n\n\"Jenny, is everything-\"\n\n\"I'm at your place with your grandma,\" Jenny says, causing you to finally exhale with relief….\n\nUntil you hear that Jenny's voice is shouting over a din of explosions. \n\n\"We need you to get here, there's-\"\n\nThe line goes dead.\n\nAnd your blood runs cold. Someone is attacking the two most important people in your life, right this second.\n\nYou're in the air before you even realize it, flying faster than you ever have before.\n\n*page_break Five Minutes Later\n\nAll attempts to call Jenny during your flight have failed, but you can already see your apartment building coming into view.\n\n*if choose_sidekick\n\t${sidekick} struggles to keep up behind you—${skze} hasn't dared to say anything the entire way.\n\n\tSo as you approach your apartment, you turn back and shout: \"Whatever we find in there, don't hold back!\"\n\n\t*goto apartment\n*else\n\t*goto apartment\n\n*label apartment\nNext thing you know, you're crashing through your living room window.\n\nAnd it's chaos.\n*page_break\n\nAll around you, Grandma's plants battle swarms of pool-killer robots. De Milo snaps a tentacle arm in two before another pool-killer hacks through her stem. You look toward the door and see that ${flower} has already gone up in flames. \n\nForcing that image from your brain, you scan for Grandma and Jenny and find them huddled in a corner, protected by a thick wall of vines and branches. Pool-killers converge on the spot, attempting to break through the leafy barrier. You watch as a vine swings away, giving Jenny a chance to fire her gun at an approaching pool-killer.\n\nWithout thinking, you:\n\n*choice\n\t#Use an energy tech-override surge. (Power Cost 10)\n\t\tFocusing with all your might, you imagine the robotic cores of the pool-killers surging with energy. And as you do, the pool-killers begin to convulse and spark ${energycolor}, crashing to the floor in lifeless heaps.\n\n\t\tOnce the pool-killers are down, you rush over to Grandma and Jenny.\n\t\t*set power -10\n\t\t*goto regroup\n\t#Blast the pool-killers away. (Power Cost 15)\n\t\tYou begin to blast the pool-killers with precision-shots—you're so enraged, the robots don't stand a chance. Within a minute, they're all on the ground, convulsing with ${energycolor} sparks.\n\n\t\tOnce the pool-killers are down, your rush over to Grandma and Jenny.\n\t\t*if energy_blast\n\t\t\t*set power -8\n\t\t\t*goto regroup\n\t\t*else\n\t\t\t*set power -15\n\t\t\t*goto regroup\n\t#Shield Grandma and let Jenny do the shooting. (Power Cost 15)\n\t\tAs you throw up a shield around Grandma, Jenny tumbles around your energy wall, shooting as she goes. Once Grandma is protected, you make sure to juice up Jenny's gun with your energy Powers.\n\n\t\tWithin a minute, Jenny has all of the pool-killers on the ground, convulsing with ${energycolor} sparks.\n\t\t*if energy_shield\n\t\t\t*set power -8\n\t\t\t*goto regroup\n\t\t*else\n\t\t\t*set power -15\n\t\t\t*goto regroup\n\n*label regroup\n\n\"We're all right,\" Jenny says, though she looks like a mess. Her gown is ripped up the side and she bleeds from a small cut on her cheek. \"I got here just in time.\"\n\n\"I could have handled those toys on my own,\" Grandma says, brushing herself off. \"Though it appears as if I have some replanting to do….\"\n\nGrandma tries not to show it, but as she looks over the sliced and charred remains of her indoor garden, you know her heart is breaking. \n\n\"We should go. Now,\" Jenny says. \"It isn't safe here anymore.\"\n\n\"Yes,\" you say, already moving toward the door. \"Do we think this was Prodigal or The Splice Circle?\"\n\n*if choose_sidekick\n\t*if sparrow\n\t\t\"Oh, it was definitely Prodigal,\" you hear Sparrow say.\n\n\t\tWhen you turn around to look at her, you nearly faint.\n\n\t\t*page_break\n\n\t\tSparrow's feathers fall from her body in great heaps, gathering in a tar-like ring around her feet.\n\t\t*goto sparrow_reveal\n\t*elseif pressie\n\t\t\"Oh, it was Prodigal,\" Pressie says, his expression growing uncharacteristically dark. \"Trust me.\"\n\n\t\t*page_break\n\n\t\tIn the next second, Prodigal blinks into existence beside Pressie.\n\t\t*goto pressie_reveal\n\t*else\t\n\t\t\"It was Prodigal, she made me do it!\" Tarana Rain shouts. \"I'm so sorry, I didn't want to!\"\n\n\t\tBefore you can ask Tarana Rain what she's talking about, Prodigal blinks into existence next to her.\n\n\t\t*page_break\n\n\t\tYou instinctively raise your hands to blast her away…until Prodigal holds a gun to Tarana Rain's head. \n\n\t\t\"Oh hi, everyone,\" Prodigal says, smiling wildly. \"My dear Miss Rain, so good to see you again.\"\n\n\t\t\"She said she'd kill my parents if I didn't do what she said,\" Tarana sobs. \"I wanted to tell you for so long, I did. I was so afraid….\"\n\t\t*goto tarana_reveal\n*else\n\t*if sparrow\n\t\t\"Oh, it was definitely Prodigal,\" you hear someone say.\n\n\t\tYou spin around to find…\n\n\t\t*page_break\n\n\t\tSparrow standing in the center of the room.\n\n\t\t\"Holy slugger, you're alive!\" you shout, indescribable joy flooding through you. Prodigal must have faked the death scene—you knew it couldn't be true!\n\n\t\t\"No thanks to you,\" Sparrow says, feathers starting to slide off of her body in great clumps. \"You left me to die, all to ensure your glorious rise to fame….\" \n\n\t\tYou have no answer to this—Sparrow is right. But you're too distracted by Sparrow's intense shedding to respond to anything else.\n\n\t\t\"Sparrow, are you OK?\" you ask.\n\n\t\tBut as Sparrow's feathers continue to fall off, you nearly faint.\n\n\t\t*page_break\n\n\t\tSparrow's feathers gather in a tar-like ring around her feet.\n\t\t*goto sparrow_reveal\n\t*elseif pressie\n\t\t\"Oh, it was definitely Prodigal,\" you hear someone say.\n\n\t\tYou spin around to find…\n\n\t\t*page_break\n\n\t\tPressie standing in the center of the room.\n\n\t\t\"Holy slugger, you're alive!\" you shout, indescribable joy flooding through you. Prodigal must have faked the death scene—you knew it couldn't be true! \n\n\t\t\"No thanks to you,\" Pressie says, his expression growing uncharacteristically dark. \"You left me to die! All to ensure your glorious rise to fame! You're scum, you know that?\" \n\n\t\tYou have no answer to this—Pressie is right.\n\n\t\tYour heart sinks…but it gives a jump as Prodigal suddenly appears beside Pressie.\n\t\t*page_break\n\t\t*goto pressie_reveal\n\t*else\n\t\t\"It was Prodigal,\" you hear someone say.\n\n\t\tYou spin around to find…\n\n\t\t*page_break\n\n\t\tTarana Rain standing in the center of the room.\n\n\t\t\"Holy slugger, you're alive!\" you shout, indescribable joy flooding through you. Prodigal must have faked the death scene—you knew it couldn't be true!\n\n\t\t\"No thanks to you,\" Tarana Rain says, tears sliding down her face. \"You left me to die! All to ensure your glorious rise to fame!\" \n\n\t\tYou have no answer to this—Tarana is right.\n\n\t\t\"Well, good thing the joke is on you,\" she says, looking away.\n\n\t\tBefore you can contemplate what that means, Prodigal suddenly blinks into existence beside Tarana Rain.\n\n\t\t*page_break\n\n\t\tYou instinctively raise your hands to blast her away…until Prodigal holds a gun to Tarana's head. \n\n\t\t\"Oh hi, everyone,\" Prodigal says, smiling wildly. \"My dear Miss Rain, so good to see you again.\"\n\n\t\t\"She said she'd kill my parents if I didn't do what she said,\" Tarana says, ignoring Prodigal. \"Looks like I was right not to trust in your loyalty, wannabe.\"\n\t\t*goto tarana_reveal\n\n*label sparrow_reveal\nShe then reaches up to her beak and snaps it off with a sickening crunch.\n\nThat's when you catch your first glimpse of the kevlar suit, a red stripe running up the middle.\n\nYou, Jenny, and Grandma all stare, speechless.\n\nBecause Sparrow has become Prodigal.\n\n*choice\n\t#Sparrow was always Prodigal in disguise?\n\t\tIt's unfathomable…all this time? It can't be. It just can't. \n\n\t\tYou pray that you're wrong….\n\t\t*goto shucks\n\t#No. Prodigal must have impersonated Sparrow since she was kidnapped….\n\t\tThere's no way Prodigal has been Sparrow all this time—she must have switched out before teleporting here.\n\n\t\tBut if that's the case, where is the real Sparrow? Why would Prodigal go to all this trouble?\n\t\t*goto shucks\n\t#I have no idea what to think….\n\t\tSo you keep your mouth shut, waiting to see what happens next.\n\t\t*goto shucks\n\t#I knew it!\n\t\tYou never trusted Sparrow to begin with but Grandma made sure there was nothing you could do about it. And now you seem to be paying the ultimate price….\n\t\t*goto shucks\n\n*label shucks\n\n\"Aw, shucks. And I was so thoroughly enjoying being a part of your little gang,\" Prodigal says, plucking some remaining feathers from her neck. \"Grandma ${familyname}, your brunches really are delicious. I nearly gained ten pounds playing the part of the downtrodden Sparrow….\"\n*goto teleport\n\n*label pressie_reveal\n\nYou instinctively raise your hands to blast her away…until Prodigal begins to pet Pressie's mop of red hair, causing him to nuzzle against her hand.\n\n\"Finally,\" Pressie says in a deep, sinister voice. \"Acting like that jolly oaf all these weeks was really starting to chafe my bundle.\"\n\nYou, Jenny, and Grandma all stare, speechless. Your brain feels as if it's stuck in syrup, moving too slowly to keep up.\n\n*choice\n\t#Pressie was always Prodigal's mole?\n\t\tIt's unfathomable…all this time? It can't be. It just can't. \n\n\t\tYou pray that you're wrong….\n\t\t*goto mustsay\n\t#No. Prodigal must have him under some kind of mind control….\n\t\tThere's no way Pressie is in his right mind—he'd never betray you and Grandma like this. You try to remember all the most effective techniques against mind control, until Pressie speaks again.\n\t\t*goto mustsay\n\t#I have no idea what to think….\n\t\tSo you keep your mouth shut, waiting to see what happens next.\n\t\t*goto mustsay\n\t#I knew it!\n\t\tYou never trusted Pressie to begin with but Grandma made sure there was nothing you could do about it. And now you seem to be paying the ultimate price….\n\t\t*goto mustsay\n\n*label mustsay\n\n\"Though I must admit, Grandma ${familyname}, your brunches really are delicious,\" Pressie says. \"They were the only thing that made infiltrating your pitiful, little lives bearable at all.\"\n\n\"Yes indeed, Preston brought me quite a few leftovers. Compliments to the chef,\" Prodigal says, scratching behind Pressie's ear.\n*goto teleport\n\n*label tarana_reveal\n\nYou, Jenny, and Grandma all stare, speechless.\n\nYour brain feels as if it's stuck in syrup, moving too slowly to keep up.\n\n*fake_choice\n\t#Tarana Rain has always been working for Prodigal?\n\t\t*gosub delay\n\t\tIt's unfathomable…all this time? It can't be. It just can't. \n\n\t\tYou pray that you're wrong….\n\t#No. Tarana Rain must be talking about giving up your secret identity earlier tonight.\n\t\t*gosub delay\n\t\tThere's no other explanation. Tarana Rain has been through hell tonight.\n\t#I have no idea what to think….\n\t\t*gosub delay\n\t\tSo you keep your mouth shut, waiting to see what happens next.\n\t#I knew it!\n\t\t*gosub delay\n\t\tYou never trusted Tarana Rain to begin with but Grandma made sure there was nothing you could do about it. And now you seem to be paying the ultimate price….\n\n\"Yes, Miss Rain was rather stubborn about the whole thing but she played along well enough,\" Prodigal says, stroking Tarana's hair with her gun. \"And I must say Grandma ${familyname}, you do make a mean brunch. I forced Tarana Rain to bring me as many leftovers as she could scrounge….\"\n*goto teleport\n\n*label teleport\n\nYou hear Prodigal's words and it's too much. Everything is wrong, it's all…\n\n\"Looks like I have some explaining to do,\" Prodigal says, producing a golden locket out of thin air. \"Let's go somewhere a bit more private to chat, shall we?\"\n\nYou and Jenny push forward at the same time but it's too late.\n\nThe room falls out from under you.\n\n*finish Next Chapter: Grand Plans\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "ganged_upon": "*comment é\n\n*text_image part_two.png center Part Two: Pride Comes Before\n\n*text_image chap_7.png center Chapter 7: Ganged Upon\n\n${sidekick} is late. Already, this whole sidekick thing seems like a very bad idea.\n\nYou wait in Ringe Square alone, feeling a bit self-conscious in your costume. Grandma knew you had to meet ${sidekick} somewhere public to protect your identity but she could have chosen a better location—this park is a notorious drug center. You feel the eyes of dealers on you from all around, waiting to see why you're here. \n\nNot to mention some punk kid recognized you and shouted about how his dog could probably be a better hero than you. What a great first brush with fame, you think.\n\nYou could also swear one of them is taking photos of you, but before you can locate the source of the flash, your MeChip pulses with an alert.\n\n*if chip_butler\n\t\"$!{sir_mad}, it appears an article has published featuring your, uh…\" MeChip ${chipname} starts. \"Object of affection, shall we say?\"\n\t*goto clip\n*elseif chip_diva\n\t\"Hey lover, I have an update on that big ol' crush of yours,\" MeChip ${chipname} says. \"Try to keep it in your pants this time, you read me?\"\n\t*goto clip\n*else\n\t\"Dear, I found an update on that sweet hero you like so much,\" MeChip ${chipname} says. \"I can't blame you, ${bmze} really is dreamy.\"\n\t*goto clip\n\n*label clip\n\nTurning red, you ignore ${chipname} and open the newsblog clip instead:\n\nTHE MILLENNIAL GROUP GETS A TOUCH OF MAGIC\n*line_break\nBlack Magic to Become Group's Newest Member\n\nAs you read this headline, your heart nearly stops beating.\n*if magic_poster\n\tThere's Black Magic in the holographic picture, looking more like ${bmceleb} than you can stand.\n\t*goto longing\n*else\n\tBlack Magic blazed onto the hero scene after single-handedly protecting MC from a foreign terrorist incursion last year. Even though ${bmhis} origin remains completely shrouded in mystery, Black Magic is currently MC's most famous solo hero—especially after receiving the latest Millennia City's Hero of Tomorrow (HoT) grant, which is the most esteemed honor that can be bestowed upon any aspiring hero.\n\n\tIt doesn't hurt that Black Magic is absolutely gorgeous, either. \n\n\tDespite the mainstream hype, you can't help but be attracted to Black Magic. Mostly because of ${bmhis} striking resemblance to your biggest crush, an old-time celebrity icon from back in the days when normal people were famous:\n\n\t*if bmmale\n\t\t*choice\n\t\t\t#Robert Pattinson.\n\t\t\t\t*set bmceleb \"Robert Pattinson\"\n\t\t\t\t*goto bmagic_sum\n\t\t\t#Kanye West.\n\t\t\t\t*set bmceleb \"Kanye West\"\n\t\t\t\t*goto bmagic_sum\n\t\t\t#Ryan Gosling.\n\t\t\t\t*set bmceleb \"Ryan Gosling\"\n\t\t\t\t*goto bmagic_sum\n\t\t\t#No, Black Magic really looks like…\n\t\t\t\tYour all-time biggest crush:\n\t\t\t\t*input_text bmceleb\n\t\t\t\t*goto bmagic_sum\n\t*else\n\t\t*choice\n\t\t\t#Beyoncé.\n\t\t\t\t*set bmceleb \"Beyoncé\"\n\t\t\t\t*goto bmagic_sum\n\t\t\t#Angelina Jolie.\n\t\t\t\t*set bmceleb \"Angelina Jolie\"\n\t\t\t\t*goto bmagic_sum\n\t\t\t#Natalie Portman.\n\t\t\t\t*set bmceleb \"Natalie Portman\"\n\t\t\t\t*goto bmagic_sum\n\t\t\t#No, Black Magic really looks like…\n\t\t\t\tYour all-time biggest crush:\n\t\t\t\t*input_text bmceleb\n\t\t\t\t*goto bmagic_sum\n\n*label bmagic_sum\n\nBlack Magic is a dead ringer for ${bmceleb}. You think ${bmze} might actually be a direct descendant but no one knows enough about ${bmhis} past to be sure….\n\nYou've always been fine being alone, especially since you haven't had much choice in the matter. Still, there's something about Black Magic…whenever you see ${bmhir}, you feel like you might want more. \n*goto longing\n\n*label longing\n\n*if (soloist > 50)\n\tYou always saw Black Magic as a solo hero like yourself, so it's a bit disappointing that ${bmze} has decided to join The Millennial Group. Still, you imagine yourself standing next to Black Magic in the photo, your hand secretly on ${bmhis} back behind the cameras. Team or no team, you'd be the hottest celebrity couple in all of MC.\n\t*goto fantasy\n*else\n\tIt appears your biggest crush has just joined your favorite Powered team—the combination is enough to leave you breathless. You imagine yourself in that holographic photo next to Black Magic, your hand secretly on ${bmhis} back behind the cameras. You'd be the hottest celebrity couple on MC's biggest team.\n\t*goto fantasy\n\n*label fantasy\n\n*if male\n\t*if male_straight\n\t\tThen your mind wanders to you and Black Magic backstage, in a deserted storage closet, pressed up against the wall. Your hands on her chest, her hands sliding down your stomach, unbuckling the belt on your costume…\n\t\t*goto interruption\n\t*else\n\t\tThen your mind wanders up to Black Magic's no-doubt lavish apartment, to his giant shower. You have him pressed up against the cool tile, hot water running down his abs….\n\t\t*goto interruption\n*else \n\t*if female_straight\n\t\tThen your mind wanders wanders to the king-size bed in Black Magic's apartment—though you're both on the floor next to it. Black Magic hangs over you, his hand running up your arched back, his stubble scratching your cheek….\n\t\t*goto interruption\n\t*else\n\t\tThen your mind wanders to the four-poster bed in Black Magic's bedroom, the only light coming from a dozen burning candles. Black Magic's soft skin presses against yours as she kisses your stomach, moving down below your belly button….\n\t\t*goto interruption\n\n*label interruption\n*page_break\n\n*if sparrow\n\tUntil you hear a faint chirping noise that pulls you back to reality. Turning around, you find Sparrow landing silently next to you. And you have to stop your jaw from dropping.\n\n\tSparrow is covered in tar-black feathers that catch the light in an oily sheen, punctuated with aerodynamic, ridged holes. She has a pale-orange nose that stretches into a beak underneath beady, ink-drop eyes. The total effect is nothing short of mesmerizing. \n\n\t\"Sparrow?\" you ask, trying to get ahold of yourself. \"Hey there, I'm ${codename}.\"\n\n\t\"I know,\" Sparrow says, her head tilted to avoid eye contact. \n\n\tThere's a few moments of silence as you try to decide what to say. Should you ask her something? You two should probably get to know each other….\n\t\n\tBut Sparrow speaks before you can decide, her voice a lilting chirp: \"Who are we going to save today?\"\n\n\tRight down to business. Perfect.\n\n\t\"We're going to stop the Ani-gang rumble,\" you say. \n\n\tYou could be imagining things but you swear you see the slightest hint of a smile curve across Sparrow's beak.\n\t*goto rumble\n*elseif pressie\n\t\"Hi there!\" you hear a nasally voice say, pulling you back to reality.\n\n\tYou turn to find Pressie approaching, his clump of strawberry-blond hair barely reaching your waist. He limps along on his peg leg, which he has painted a deep red. Combined with his green-and-gold costume, the effect is decidedly Christmas elf.\n\n\t\"I'm so gosh darned excited to meet you!\" Pressie says, with traces of a lisp slipping out. \"I've been up all night waiting!\"\n\n\tYou've never seen anyone less suited to be a hero—Pressie looks more like he should be someone's adoring pet, not a fierce sidekick.\n\n\t\"Well, happy to have you on board,\" you say anyway. \"Though I should say, I have something a bit intense planned for tonight. Maybe we should just get to know each other now and then go out on another mission later, one that's less-\"\n\n\tBefore you can finish, Pressie taps on the ground twice with his peg leg. Two massive dirt golems erupt behind him, pounding their fists together.\n\n\t\"Don't you worry about little ol' Pressie,\" he says, his boyish grin displaying a large snaggletooth. \"I can hold my own.\"\n\n\tHere goes nothing….\n\n\t\"Good,\" you say. \"Because we're going to break up the Ani-gang rumble.\" \n\n\tBut as all the color drains from Pressie's face, you are not particularly reassured.\n\t*goto rumble\n*else\n\t\"Uh, hello?\" you hear a sharp voice say, pulling you back to reality.\n\n\tYou turn to find Tarana Rain standing next to you, arms crossed. She wears thigh-high boots with five-inch heels and a tight, white costume, which pops against her dark-brown skin.\n\n\t\"Wow,\" you say, without thinking. Nothing about Tarana's outfit is the least bit practical for heroing—especially not the diamond earrings (which probably cost more than your apartment).\n\n\t\"Of all the lame-ass heroes they could have stuck me with, I get the reject who couldn't even handle an ancient accessory,\" Tarana seethes, eyeing you as if you have leprosy. Looking exhausted, she reaches down into her boot and pulls out a flask.\n\n\t\"Mommy needs a shot.\"\n\n\t*page_break\n\n\t\"Woah, aren't you only-\"\n\n\t\"Relax. I generate water, remember? The excess moisture in my body keeps me so hydrated, it would take an entire distillery to catch a buzz,\" Tarana says, downing half the flask in one gulp. \"Still, it takes the edge off if I lace it with some 'ludes. Now are we going to off some baddies, or what?\"\n\n\tYou stare at Tarana, speechless. You really picked a winner here, didn't you?\n\n\t\"We're going to break up the Ani-gang rumble,\" you say, knowing there's no going back now. You've got to give this whole sidekick thing at least one night or Grandma might kill you.\n\n\t\"What the slugger is an Ani-gang?\" Tarana says, taking another long pull from her flask. \"Is that some kind of weird, hood thing?\"\n\n\tOh dear.\n\t*goto rumble\n\n*label rumble\n*page_break\n\nWith The Splice Circle in upheaval, the Ani-gangs have decided it is the perfect time to try and wipe each other out to serve the new leader without competition. So The Scales and The Cloven have been trying to kill each other in the streets all week, leading up to one final rumble rumored to be tonight, in an abandoned electric plant on the outskirts of the Fringes.\n\nAfter botching the Gravitas case, you decided that stopping gang violence in the Fringes (violence you helped escalate in the first place) would be an excellent, smaller-scale way to start rebuilding your reputation.\n\n*if sparrow\n\tOn your way to the plant, you and Sparrow cruise through the sky. You have to struggle to keep up with her—it seems Sparrow could teach you a thing or two about flying. You can tell she's holding back so that you don't fall behind….\n\t*set power -5\n\n\tSparrow doesn't say anything, keeping her eyes on her flight path. You look over her feathered body, which is one of the most strangely beautiful things you've ever seen. As your eyes pass over her, she swivels her head to look at you—she must have some kind of sense for these things.\n\n\t\"${codename}, why did you choose me to be your sidekick?\" she asks.\n\n\tYou pause for a moment, considering your answer….\n\t*choice\n\t\t#\"We come from the same place.\"\n\t\t\tSparrow just nods and turns back to flying. Clearly not the warm-and-friendly type.\n\t\t\t*set rlshp_sk %+20\n\t\t\t*goto sparrow_gang\n\t\t#\"I honestly just wanted someone else who could fly.\"\n\t\t\tSparrow's beady eyes narrow ever so slightly, then she just turns back to flying.\n\t\t\t*set rlshp_sk %-20\n\t\t\t*goto sparrow_gang\n\t\t#\"Does it matter?\"\n\t\t\t*set rlshp_sk %-20\n\t\t\tSparrow's beady eyes narrow ever so slightly, then she just turns back to flying. Guess it doesn't.\n\t\t\t*goto sparrow_gang\n\t\t#\"I just had a feeling—I think you're going to be a great hero.\"\n\t\t\t*set rlshp_sk %+20\n\t\t\tSparrow just nods and turns back to flying. Clearly not the warm-and-friendly type.\n\t\t\t*goto sparrow_gang\n\n*elseif pressie\n\tOn your way to the plant, you fly while carrying Pressie. For someone so small, he's freakishly heavy. It takes extra Power for you to keep afloat with his added weight.\n\t*set power -5\n\t\n\t\"Excuse me, ${mr_ms} ${codename}?\" Pressie says. \"You do know that I can travel on my own, right?\"\n\n\t\"No, Pressie,\" you pant. \"I did not know that.\"\n\n\t\"Well, I didn't want to contradict you but you look rather strained,\" Pressie says. \"You can let me go now. I'll be fine on my own.\"\n\n\tYou immediately let go and Pressie swings his peg leg in the air, pulling a solid clump of dirt into the sky below him. He lands on it and begins to tap his peg leg rhythmically, causing the dirt from the back of the clump to move to the front and reattach in a constant cycle, like some kind of earthy treadmill.\n\n\t\"I call this my dirty magic carpet ride!\" Pressie says, smiling from ear to ear. \"So anyway, ${mr_ms} ${codename}, I wanted to ask you—why did you choose me to be your sidekick? Not that I'm ungrateful or anything, I was just wondering.\"\n\n\tYou pause for a moment, considering your answer….\n\t*choice\n\t\t#\"I like betting on the underdog.\"\n\t\t\t\"Most excellent,\" Pressie says, his smile growing wider (if that's even possible).\n\t\t\t*set rlshp_sk %+20\n\t\t\t*goto pressie_gang\n\t\t#\"Because you're adorable.\"\n\t\t\t\"I get that a lot,\" Pressie says, turning away. You're not sure if he's taken this as a compliment or not….\n\n\t\t\tThough after that, you and Pressie continue your flight in silence.\n\t\t\t*set rlshp_sk %+10\n\t\t\t*goto pressie_gang\n\t\t#\"Does it matter?\"\n\t\t\t\"Oh. I guess not,\" Presie says, visibly deflating.\n\n\t\t\tAfter that, you and Pressie continue your flight in silence.\n\t\t\t*set rlshp_sk %-20\n\t\t\t*goto pressie_gang\n\t\t#\"I just had a feeling—I think you're going to be a great hero.\"\n\t\t\t\"Most excellent,\" Pressie says, his smile growing wider (if that's even possible).\n\t\t\t*set rlshp_sk %+20\n\t\t\t*goto pressie_gang\n*else\n\tOn your way to the plant, you fly beside Tarana. She can move through the air by shooting jets of water from her hands and feet, like high-pressure hoses. The problem is, she moves considerably slower than you—you have to exert extra Power to fly slowly enough for her not to fall behind.\n\t*set power -5\n\n\tYou are kept mildly entertained, however, as people on the streets below are drenched by the excess water pouring down from Tarana's flight.\n\n\t\"How long will this take?\" Tarana asks. \"I've got a hair appointment later.\"\n\n\tYou're about to respond when you notice Tarana's MeChip flashing away on her wrist—she is mentally texting while flying. This girl is going to get herself killed and it'll be all your fault. What on earth possessed you to pick her?\n\n\t\"So how do your parents feel about you heroing?\" you ask, remembering the reason.\n\n\tTarana looks at you, sending over some grade-A death-shade. \"Is that why you picked me? Because of who my parents are?\"\n\n\tYou pause for a moment, considering your answer….\n\t*choice\n\t\t#\"No! I don't even know who your parents are.\"\n\t\t\t\"You're a terrible liar,\" Tarana says.\n\t\t\t*set rlshp_sk %-10\n\t\t\t*goto tarana_gang\n\t\t#\"Yes.\"\n\t\t\t\"Good to know,\" Tarana says, unfazed.\n\t\t\t*set rlshp_sk %-20\n\t\t\t*goto tarana_gang\n\t\t#\"Does it matter?\"\n\t\t\t\"So that's a yes,\" Tarana says.\n\t\t\t*set rlshp_sk %-20\n\t\t\t*goto tarana_gang\n\t\t#\"I picked you because you seemed like you needed the most training.\"\n\t\t\t\"Yeah, sure thing, ${mr_ms} Screwup.\" Tarana laughs hysterically.\n\t\t\t*set rlshp_sk %-10\n\t\t\t*goto tarana_gang\n\t\n*label sparrow_gang\n\nAfter that, you and Sparrow continue your flight in silence.\n\n*page_break Five Minutes Later\n\nIt's not long before you're approaching the abandoned electrical plant, a bit exhausted from keeping up with Sparrow.\n\n\"So you're sure you're OK with this, Sparrow?\" you ask. \"Things could get pretty dangerous down there….\"\n\nSparrow looks at you, an almost-feral look coming over her.\n\n\"I'm ready,\" she chirps. \n\nOf course she's ready—she's an Animalistic Powered from the Fringes. She must hate Ani-gang activity more than anyone.\n\n\"Good,\" you say, preparing for a dive. \"Then let's do this.\"\n*goto strewn\n\n*label pressie_gang\n*page_break Ten Minutes Later\n\nIt's not long before you're approaching the abandoned electrical plant.\n\n\"So are you sure you're OK with this, Pressie?\" you ask. \"Things could get pretty dangerous down there….\"\n\n\"I don't know much about gangs but I know how to defend myself,\" Pressie says. \"I've had to do that all my life.\"\n\nYou nod at Pressie, thinking about the amount of bullying someone like him must have to endure at school…. \n\n\"Good,\" you say, preparing for a dive. \"Then let's do this.\"\n*goto strewn\n\n*label tarana_gang\n\"Well the joke's on you because my parents don't even know I'm here. They don't want me to be a hero at all.\"\n\nPerfect, you think. Not only will Tarana's media connections not help you, but if her parents find out about you working with her, they'll probably torpedo your career even deeper.\n\n\"Don't look so thrilled, wannabe,\" Tarana says.\n\nEven though she'd probably kill you if she knew, Tarana looks ever-so-slightly defeated. She must have to deal with people using her all the time….\n\nAfter that, you and Tarana continue your flight in silence.\n\n*page_break Twenty Minutes Later\n\nYou finally approach the abandoned electrical plant, way later than you expected.\n\n\"I can't believe I'm going to stop a gang fight,\" Tarana says, looking bored. \"That's so low budget. Can't we do something a little flashier?\"\n\n\"Just worry about getting out alive,\" you say, your patience at its end. \"And follow my lead.\"\n\n\"Wannabe,\" Tarana says, dropping down toward the plant. \"I think you should be following my lead. I've so got this.\"\n\nYou sigh, diving down after Tarana. Here goes nothing. \n*goto strewn\n\n*label strewn\n*page_break\nYou crash through a broken window, followed closely by ${sidekick}. But what you see makes you both freeze. \n\nYou're too late. \n\nDozens of Ani-gangsters already cover the ground, lifeless and emptied. Also strewn among them are the bodies of seven heroes, all wearing brown-and-red costumes—at least you hope that red is from their costumes. You gasp as you realize that all of them are really young, probably some amateur youth startup team that tried to make a name for itself by stopping the rumble. \n\nYou're about to question the wisdom of bringing your own brand-new teen sidekick into this mess, but your attention is stolen by the vicious battles taking place below you.\n\nA few dozen Ani-gangsters remain standing, their movements blurring together; lizard tails and venomous fangs rip into coarsely haired flesh. Cloven hooves and twisted antlers bash thin, scaled torsos everywhere you look.\n\n\"Oh no,\" you say, frozen in the air. The scene is more grisly than you ever could have imagined.\n\n*if sparrow\n\tBut Sparrow doesn't hesitate at all. She careens down into the melee like a black bullet, snapping up a gecko-looking girl with her beak. You're mesmerized by the sight of Sparrow swooping over the brawling crowd—she looks like some winged, dark angel of death, fierce and unrelenting.\n\n\tThen you pull yourself together—you've got to get down there and back her up.\n\t*goto attack\n*else\n\t${sidekick} looks just as horrified, despite ${skhis} big talk just a minute ago. Unfortunately, ${skhis} powers can't keep ${skhir} hovering next to you, so ${skze} begins to plummet down toward the fray, terror-stricken.\n\n\tYou swoop down to scoop ${sidekick} up, flying to the edge of the plant to drop ${skhir} off.\n\n\t\"Listen to me, do not get involved in the fighting!\" you shout. \"I just want you to get all of those fallen heroes to safety. Can you do that for me?\"\n\n\t${sidekick} doesn't even blink, still frozen with fear. You bet ${skze} has never seen anything quite as gruesome as a Fringe gang fight before.\n\n\t\"Can you do that for me?\" you shout louder, trying to snap ${skhir} out of it.\n\n\t${sidekick} finally nods, so you spin around and dive into the fray. You've got to stop this brawl. Now.\n\t*goto attack\n\n*label attack\n*choice\n\t#Use cyclone winds to scatter the fighters across the plant. (Power Cost 10)\n\t\tYou spin super fast and close your eyes, feeling cyclone after cyclone rip away from your body.\n\n\t\tWhen you open your eyes, you find the Ani-gang members scattered across the plant, completely windswept and disorganized.\n\t\t*set power -10\n\t\t*set offensive %-10\n\t\t*goto bitten\n\t#Slam the ground with giant energy fists to disrupt the fighters. (Power Cost 12)\n\t\tYou generate two massive fists of ${energycolor} energy around your hands, the size of small boulders. You then close your eyes and slam your fists into the ground, causing it to erupt in a massive quake.\n\n\t\tWhen you open your eyes, you find the Ani-gang members scattered across the plant, completely battered and disorganized.\n\t\t*set power -12\n\t\t*set offensive %+10\n\t\t*goto bitten\n\t#Drop an energy bomb to disorganize the fighters. (Power Cost 12)\n\t\tYou condense a compact ball of energy between your palms, supercharging it. When it's ready to blow, you toss it into the center of the fray.\n\n\t\tAn explosion rocks the floor and sends the Ani-gang members reeling across the plant, completely battered and disorganized. \n\n*label bitten\n*if sparrow\n\t*goto bitten_real\n*else\n\tYou can make out the sound of ${sidekick}'s voice cheering you on in the background.\n\t*goto bitten_real\n\n*label bitten_real\nYou smile, thinking that this might go smoothly after all….\n\nBut before you can finish your thought, something sharp sinks into your shoulder.\n\n*page_break\n\nYou scream as you feel fangs rip at your flesh. Instinctively, you let out a strong energy pulse and the grip loosens.\n\n*set power -10\n*set health -10\n\nYou whip around to see a blonde girl falling to the ground, her hair flared in the shape of a cobra's head. As she hits the floor, you can see your blood dripping from her fangs.\n\nIgnoring this sight, you turn your attention back to the remaining Ani-gangsters, knowing they'll probably attack you before tearing back into each other.\n\nYou raise your arms to throw up an energy shield but find that they've gone numb. Within seconds, you feel the numbness travel down your spine. Then your legs give out.\n\n*page_break\n\nThere must have been some kind of venom in cobra-girl's bite because you're now paralyzed from the neck down. You swivel your head desperately to see that the gang brawl has started up again all around you. It won't be long before one of them comes to finish you off…. \n\n\"I moved those other heroes out of the line of fire,\" you hear ${sidekick} shout from somewhere nearby. \"Why are you lying there?\"\n\n\"That cobra-girl bit me and now I can't move,\" you say, thankful that you can at least speak. \"Can you get me out of here?\"\n\n${sidekick} steps over you to try and move you, but then ${skhis} face goes blank. \"The gang members, they're coming for us.\"\n\n\"${sidekick}, listen to me. You have to make a stand.\"\n\n*if sparrow\n\tSparrow nods, looking hungry for blood.\n\n\t\"Here's what you do.\"\n\n\tYou studied Sparrow's Powered profile while you were waiting for her, so you know how to utilize her abilities in ways she probably doesn't even know herself. She can go way beyond flying and swooping….\n\t*choice\n\t\t#\"Flap your wings to create a windstorm!\"\n\t\t\tYou've created your fair share of wind attacks and you bet Sparrow can kick up one hell of a storm. Without hesitation, Sparrow unfurls her wings, which span fifteen feet across.\n\n\t\t\tAs she begins to flap, Ani-gangsters go flying in all directions. Sparrow keeps pumping her wings, causing a fierce crosswind that rattles across the plant. \n\n\t\t\tA couple of antelope-hybrids attempt to leap at Sparrow but they simply slam against the nearest wall as they take to the air. Luckily, you're right below Sparrow at the epicenter of the winds, otherwise your limp body would have been tossed around the plant like a rag doll.\n\n\t\t\tUnable to withstand the hurricane-level gale winds, the Ani-gangsters start to flee for the exits, shouting promises for a rematch as they retreat.\t\t\n\t\t\t*goto calm\n\t\t#\"Scream as loud as you can to access your supersonic chirping!\"\n\t\t\tYou spent years studying your mother's vocal abilities, so you know all about the use of sonic Powers. Without hesitation, Sparrow opens her beak to shriek.\n\n\t\t\tSuddenly, your ears feel as if they might burst as Sparrow unleashes a wicked sonic barrage. Some of the Ani-gangsters drop instantly from the attack, while others try to get to Sparrow—a couple of antelope-hybrids attempt to leap at her but the sonic chirp knocks them out midair.\n\n\t\t\tUnable to withstand the decibel destruction, the remaining Ani-gangsters start to flee for the exits, shouting promises for a rematch. You smile as they go, even though you can feel blood trickling from your own ears….\n\t\t\t*set health -10\n\t\t\t*goto calm\n*elseif pressie\n\t\"No, I can't,\" Pressie says, looking like he might faint.\n\n\t\"Yes, you can,\" you say. \"Just do what I tell you.\"\n\n\tYou studied Pressie's Powered profile while you were waiting for him, so you know how to utilize his abilities in ways he probably doesn't even know himself.\n\t*choice\n\t\t#\"See if there are any nearby fault lines you can disrupt!\"\n\t\t\t\"What are you talking about? I don't-\"\n\n\t\t\t\"Close your eyes and concentrate, I know you can do it,\" you shout, seeing several Ani-gangsters about to close in for the kill.\n\n\t\t\tPressie closes his eyes and within seconds, the ground begins to shake. The Ani-gangsters lose their footing, unsure of what to do—until molten liquid begins to erupt all around the room.\n\n\t\t\tSome of the Ani-gangsters drop instantly from the attack, while others try to get to Pressie (who still stands with his eyes closed, his peg leg vibrating madly). A couple of antelope-hybrids attempt to leap at him but a molten blast blocks their path. \n\n\t\t\tUnable to withstand the quake eruption, the remaining Ani-gangsters start to flee for the exits, shouting promises for a rematch.\n\n\t\t\tYou smile as they go, even though you can feel a pool of magma settling underneath your right arm…good thing your body is still numb.\n\t\t\t*set health -30\n\t\t\t*goto calm\n\t\t#\"Make an army of those dirt golems!\"\n\t\t\t\"But I've only ever made three or four before,\" Pressie squeaks.\n\t\t\t\n\t\t\t\"Focus, you can do it!\" you shout, seeing several Ani-gangsters about to close in for the kill.\n\n\t\t\tPressie closes his eyes, and within seconds, the ground begins to shake. The Ani-gangsters lose their footing, unsure of what to do—then a dozen massive dirt golems erupt from the ground.\n\n\t\t\tImmediately, they go to work smashing any Ani-gangsters within reach. A couple of antelope-hybrids attempt to leap at Pressie (who still stands with his eyes closed, his peg leg vibrating madly), but a giant rock fist knocks them away easily. \n\n\t\t\tUnable to withstand the golem march, the remaining Ani-gangsters start to flee for the exits, shouting promises for a rematch.\n\t\t\t*goto calm\n*else\n\tTarana looks ghostly.\n\n\t\"I don't think I can do this,\" she whispers.\n\n\t\"Pull yourself together,\" you shout. \"Just do what I tell you!\"\n\n\tYou studied Tarana Rain's Powered profile while you were waiting for her, so you know how to utilize her abilities in ways she probably doesn't even know herself.\n\t*choice\n\t\t#\"Create a flood to wash the gangsters out.\"\n\t\t\t*goto tsunami\n\t\t#\"Sap the moisture out of their bodies to knock the gangsters out.\"\n\t\t\t*goto tsunami\n\n*label tsunami\n\nTarana Rain looks down at you like you're insane. However, as several Ani-gangsters start to close in for the kill, she gets it together. Closing her eyes tightly, Tarana Rain stretches her arms over her head and begins to scream at the top of her lungs. \n\nImmediately, you feel the ground tremble and you turn your head toward the far wall, which has begun to buckle, trickles of water pushing through. \n\n\"Wait, Tarana, what are you doing? That's not what I told you to-\" you start to say, but it's no use. Before you can finish, the wall gives way and a tsunami crashes through, carrying massive chunks of concrete with it.\n\nYour jaw drops. There's no way anyone in here will survive that wall of water—not even you and Tarana. \n\nYou close your eyes. At least your body is still numb, so you shouldn't feel much of anything when the water hits. You just hope that you don't end up drowning to death….\n\n*page_break\n\nThen you feel your body jerk violently and swing up into the air. You clench your jaw, expecting a rush of cold water, but all you feel is a sprinkle of mist.\n\nYou open your eyes to find yourself in Tarana's arms, rocketing into the sky above the tsunami. Below, the remaining Ani-gangsters swirl around, desperately trying to survive the whirlpool.\n\n\"Holy slugger,\" you whisper as the tidal pool winds down, gushing out of the exits. You can't tell if anyone survived—all you know is that no one on the ground is moving.\n\nOnce the flood clears, Tarana hose-rockets you back to the ground and places you down.\n*goto calm\n\n*label calm\n\n\"I didn't know I could do that,\" ${sidekick} says, astonished.\n\nThen, before ${skze} can say another word, ${sidekick} faints.\n\nSlugger, you think as you lie in the now-silent plant, completely paralyzed.\n\nThis is not good.\n\n*page_break Two Hours Later\n\nYou're back in Ringe Square, having healed yourself enough to fly both you and ${sidekick} back across the Fringes. Of course, it's not until you're about to land that ${skze} starts to wake up.\n\n*set power -25\n\n\"What happened?\" ${sidekick} mutters, ${skhis} eyes fluttering open.\n\n\"I healed myself and got us out of there just as the ambulances were arriving,\" you answer. \"I figured neither of us needed any official attention for that mess….\"\n\n*if sparrow\n\t\"That was wise,\" Sparrow says, attempting to stand. \"I did not know I was capable of doing that with my Powers. Thank you.\"\n\n\t\"You're welcome, Sparrow,\" you say. \"Really, I think that's just the—\"\n\n\t\"It is past my curfew. I must return to the home,\" Sparrow cuts you off, unfurling her wings to take off. \"I look forward to our next mission.\"\n\n\tBefore you can respond, Sparrow takes off into the sky. You may not know her very well yet, but you have a feeling this is going to be the beginning of a special partnership.\n\n\tAs you watch her go, you try not to think about what a close call that just was….\n\t*goto curfew \n*elseif pressie\n\t\"Aw shucks,\" Pressie says, \"and here I was wearing my good costume and all….\"\n\n\tPressie attempts a smile, but you can tell he's rattled—he's shaking so badly, he can barely stand.\n\n\t\"You did really well,\" you say. \"Neither of us would have survived if not for that last move.\"\n\n\tPressie looks pleased for a second but then he looks down at his MeChip. \"What time is it? Oh deary me, my curfew was a half hour ago. I have to run!\"\n\n\t\"Do you need a lift home?\" you ask halfheartedly, remembering Pressie's insane weight.\n\n\t\"No, I'll be fine,\" Pressie says, tapping his peg leg on the ground to create another dirty magical carpet. \"Gee, ${mr_ms} ${codename}, I was like a real hero back there! This has been the best night of my life. You know, besides almost getting killed.\"\n\n\t*choice\n\t\t#\"We'll do much better the next time.\"\n\t\t\tAs you speak, you pat Pressie on top of the head like a dog, without thinking. Luckily he's too elated to notice.\n\n\t\t\t\"I cannot wait! You've got to show me how to do more cool things with my Powers!\" \n\n\t\t\t\"I will,\" you say. \"Now get home, I've got somewhere to be.\"\n\n\t\t\tPressie gives you one last smile before taking off. You may not know him very well yet, but you have a feeling this is going to be the beginning of a special partnership. \n\n\t\t\tThough, as you watch him go, you try not to think about what a close call that just was….\n\t\t\t*set rlshp_sk %+20\n\t\t\t*goto curfew\n\t\t#\"Whatever you say.\" \n\t\t\tAs you speak, you pat Pressie on top of the head like a dog, without thinking. Luckily he's too elated to notice your lack of interest.\n\n\t\t\t\"I cannot wait! You've got to show me how to do more cool things with my Powers!\" \n\n\t\t\t\"Head home, Pressie. I've got somewhere to be.\"\n\n\t\t\tPressie gives you one last smile before taking off. As you watch him go, you try not to think about what a close call that just was….\n\t\t\t*set rlshp_sk %-20\n\t\t\t*goto curfew\n*else\n\t\"Oh, that would have been just perfect,\" Tarana says, attempting to stand. \"That's just what I need, for my parents to know I'm heroing behind their backs. At least you have a few brain cells still functioning. Now where the slugger is my flask?\"\n\t*choice\n\t\t#\"Are you kidding me?\" you shout, finally losing it. \n\t\t\t\"You could have killed us both with that tsunami stunt—you probably just killed some of those Ani-gangsters! Don't you care at all?\"\n\n\t\t\t\"It was us or them,\" Tarana says, getting in your face. \"They were murdering each other like animals. Literally. Do you feel bad for them?\"\n\n\t\t\tYou step back from Tarana because this is just a waste of time. \n\n\t\t\t\"We're done here,\" you say, turning to leave. If you never see Tarana Rain again, you'll be a very happy hero.\n\n\t\t\tBesides, you've got somewhere else to be.\n\t\t\t*set tarana_hate true\n\t\t\t*set rlshp_sk %-20\n\t\t\t*goto curfew\n\t\t#\"You're insane, Tarana. And I like it.\"\n\t\t\t\"Ew, are you hitting on me?\" Tarana says, fishing the soggy flask out of her boot. \"You're, like, a hundred years old.\"\n\n\t\t\t\"Listen, I've got to go,\" you say, ignoring that last remark. \"But that was a very impressive display back there. If we can get you to learn how to control it-\"\n\n\t\t\t\"Who said I wasn't controlling-\"\n\n\t\t\t\"Then you might really turn into an A-list heroine,\" you finish. \"Now get out of here, you're very late for your hair appointment.\"\n\n\t\t\t\"Slugger!\" Tarana screams, immediately hose-rocketing herself back into the sky. \"See you later, wannabe!\" \n\n\t\t\tYou may not know her very well yet, but you have a feeling this is going to be the beginning of a special partnership.\n\n\t\t\tAs you watch her go, you try not to think about what a close call that just was….\n\t\t\t*set rlshp_sk %+20\n\t\t\t*goto curfew\n\n*label curfew\n*page_break\n\nOnce ${sidekick} is out of sight, you reach down to your MeChip to make a call.\n\n\"I was waiting for you to ring me back, you intolerable sloot,\" Jenny says as her holographic image pops up.\n\n\"Meet me in ten minutes,\" you say. \"We've got a lot to talk about.\"\n\nAs you take off again, you can swear that you can see more flashes coming from across the park. But you don't have time for that right now—stopping the Ani-gang rumble was a good move, but it's not enough. You were just treating a symptom, placing a band-aid on a wound that needs stitches.\n\nNo, you know what you really need to do now. You need to cut off the Ani-gang problem at its source.\n\nYou need to take down The Splice Circle.\n\n*set legend +2\n*finish Next Chapter: The Vigilante\n", "grand_plans": "*comment é\n\n*text_image chap_18.png center Chapter 18: Grand Plans\n\nBefore your eyes flutter open, your first thought is that you really need to invest in some anti-teleportation tech upgrades for your costume. \n\nThen, as you do open your eyes, your second thought is: where did all the light go?\n\nThat's when you feel dozens of little legs crawling all over you. Frantic, you reach your arms up but they smack against wood.\n\nThen panic sets in as the reality of your situation crystallizes:\n\nYou're trapped in a coffin.\n\nFull of spiders.\n\nYou can only hear the sound of your scream bouncing back at you as you press your hands to the unmoving lid.\n\n*choice\n\t#Blast my way out. (Power Cost 10)\n\t\tYou send powerful ${energycolor} blasts bursting from your hands, and the coffin lid immediately splinters. You work your hands back and forth until the lid is destroyed enough for you to fly up and out.\n\n\t\tAs you do, you shake off dead spiders—some of which you have to rip out of your exposed skin. \n\t\t*if energy_blast \n\t\t\t*set power -5\n\t\t\t*goto injure\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*goto injure\n\t#Charge the entire coffin to explode. (Power Cost 5)\n\t\tYou charge the coffin with ${energycolor} energy and rig it to explode as quickly as possible. Suddenly, light bursts into view between chunks of splintered wood and the spider carcasses. Some of the splintered wood cuts into your skin through your costume, but you're just happy to be out of that death trap.\n\t\t*set power -5\n\t\t*set health -10\n\t\t*goto injure\n\t#Create an energy pulse to kill the spiders and destroy the coffin all at once. (Power Cost 15)\n\t\tYou generate a powerful energy pulse that incinerates the spiders on contact and disintegrates the wooden coffin. You stand up and shake yourself off, bits of spider still sticking to your costume.\n\t\t*set power -15\n\t\t*goto injure\n\n*label injure\n\nYou look around and find that you aren't free yet—you're still in a large cage made of horizontal, metal bars.\n\nAnd Grandma lies unconscious beside you.\n\nYou rush to her side. Thankfully, her pulse is still strong—she's just knocked out.\n\n\"She'll be fine; she dodged the brunt of the attack,\" Jenny says from nearby. You spin to find she's in a metal cage of her own, unarmed.\n*if tarana\n\tYou scan the room for Tarana Rain but she doesn't appear to be here….\n\t*goto lair\n*else\n\t*goto lair\n\n*label lair\n\n\"Your energy bounced off the metal bars and hit her. Which means you won't be able to blast your way out of these cells….\"\n\nYou immediately think at MeChip ${chipname}, knowing you need to get Grandma medical attention,\n\n*fake_choice\n\t#${chipname}, where are we?\n\t#${chipname}, I need to make a call.\n\t#${chipname}, dial 911.\n\nBut as the thought forms, you feel a vacancy somewhere in the back of your mind. When ${chipname} doesn't immediately respond, you raise your wrist…\n\nTo find a scabbed-over crevice where your MeChip used to be. \n\nYou feel a wave of despair run through you, paired with a jagged rush of loneliness. Is this what Grandma feels like all the time without a MeChip? So…unplugged?\n\nYou turn to Jenny, and even though she's already scanning the room for escape points, she too rubs her wrist anxiously.\n\n\"What kind of maniacal, evil genius could have laid such an elaborate trap?\" Prodigal suddenly says, appearing across the room. \"I mean—spider coffins? Leeched MeChips? Energy-proof cages? It's downright indulgent! Evil extravagance at its absolute finest, don't you think?\"\n\n*page_break\n\nYou look over at Prodigal and take in your surroundings. You're in what appears to be some kind of technologically tricked-out underground bunker that smells like a mixture of ripe laundry and frozen dinners.\n\nThen you notice the walls—they're covered with vintage posters of your parents in their The Sound and The Fury costumes. Every inch is occupied with the photos but they've all been twisted and distorted with graffiti.\n\nThen you see the center of the wall, where a life-size photo of you in your ${codename} costume hangs.\n\nWhat the slugger is this?\n\n\"Welcome to my luscious lair,\" Prodigal says, waving her arm around. \"Do you like what I've done with the place, chickens?\"\n\n*fake_choice\n\t#\"Where are we?\"\n\t#\"Who are you?\"\n\t#\"Why have you taken us here?\"\n\n\"Greedy, greedy, oh so needy! Hold your horses, I'm rigging something up that will answer all of your meddling questions,\" Prodigal says, looking down at a tablet device that appears in her hands. \"But if you must know, we're about three miles underneath the Bigsur fusion plant.\"\n\nThat's…impossible. The BFP powers the entire western portion of America, so its security measures are quite literally impenetrable. It's thirty miles inland from MC but there's no way you're anywhere within ten miles of the plant, otherwise you'd have been detected instantly.\n\n\"Your look of skepticism wounds me,\" Prodigal says. \"I happen to have the Power to generate whatever technology I can imagine, so long as it has some kind of warfare application. Rather bizarre how Power sets can take on parameters like that, isn't it?\n\n\"Anyway, bypassing every security measure of the BFP took a long time to sort out, but I eventually worked up the appropriate counter-tech. This little hideaway is accessible only by Telelock—they really are one of my handiest inventions, don't you think?\"\n\n*fake_choice\n\t#That certainly explains why Prodigal can make technology and weapons appear out of thin air….\n\t#If that's true, it would make sense that Prodigal is the owner of The Artillery weapons business….\n\t#I thought Prodigal's Power was to generate kick-shields….\n\n\"But I do tire of explaining myself, it's all right here for you,\" Prodigal says.\n*if pressie\n\tShe hands the tablet to Pressie, who waddles up to your cage.\n\n\tYou're still having trouble believing that Pressie has betrayed you this heinously. You still half-expect him to snap out of it and rescue you….\n\n\tThough, as Pressie slides the tablet through the bars, his eyes don't betray an ounce of sympathy. \n\t*goto tablet\n*else\n\tShe reaches between the bars and hands you the tablet.\n\t*goto tablet\n\n*label tablet\n\nYou look down at the screen and it reads \"The Prodigal Plan.\"\n\n\"You've got to be kidding me,\" you say, almost laughing. \"What are you, a comic book villain?\"\n\n\"Laugh all you want, but we're in the age of interactive reality, my little ${codename},\" Prodigal replies with malice. \"I've captured every step of my rise to villainous Legend for the public's pleasure. As a matter of fact, we're rolling now, so make sure to smile for the cameras.\"\n\nProdigal gestures toward several floating dots that hover around her—evidently these are cameras following her every move.\n\n\"You reading through my master plan is a part of the grand climax, so do hurry along.\"\n\nYou look down at the tablet again and a holographic menu of options appears under the header \"The Manifesto.\"\n\n*disable_reuse\n*label manifesto\n*choice\n\t#An Alluring Origin.\n\t\t\"You must be wondering just who I am,\" Prodigal's holographic-3D image says, projecting out of the tablet. \"So let's cut right to the chase. I'm a bit of a legacy myself—my mother is famous. Or rather, I should say she [i]was[/i] famous. You see, mommy dearest was murdered when I was but a wee girl, by two of the worst heroes to ever walk this earth…\"\n\n\t\tAs Prodigal talks, your stomach seizes. It can't be.\n\n\t\t\"That's right, loyal viewers. I am the daughter of the one and only Miss Artillery, who was murdered by The Sound and The Fury. To sum it up, I am the Prodigal Daughter, given the gifts of her weaponry prowess before my time, the pinnacle of wasteful extravagance.\"\n\n\t\tYou never knew that Miss Artillery had a daughter. In fact, you never bothered to know much about her life at all, since you blamed her for your parents' fates just as much as Mayor Victon. It never occurred to you that there might be someone out there blaming your family for the very same thing….\n\n\t\t\"And it is my life's ambition to become the villainess my mother never could be. In fact, it is my life's ambition to become the world's most Legendary terrorist of all time!\"\n\t\t*goto manifesto\n\t#The Arches of Enemy.\n\t\t\"In every rise to Legendary villainy, there must always be an archenemy to vanquish,\" Prodigal continues in holo-3D form. \"As you probably already know, I have chosen the fine ${codename} to be mine—after all, we are inextricably linked by the sins of our parents. \n\n\t\t\"The parallels are really quite nice, don't you think? We're both striving for Legend to make our fallen parents proud, forever locked in a battle of good and evil, an epic feud played out for all the world to see. It's so wonderfully consonant! After all, heroes cannot exist without villains, nor can villains flourish without heroes to crush.\n\n\t\t\"And crush ${codename}, I shall. I'm going to do what mommy Artillery never could—I'm going to destroy the ${familyname} family.\"\n\t\t*goto manifesto\n\t#Tolls and Goals.\n\t\t\"Naturally, I've been following the ${familyname}s for years, all through their time in the PFPP. One of the perks of being Powered to generate wartime tech is access to an uncanny level of surveillance.\"\n\n\t\tAs Prodigal's holo-3D image keeps talking, you don't even want to think about what that means. The thought that Prodigal has been watching you all this time is…terrifying.\n\n\t\t\"Of course, I could have killed the ${familyname}s at any moment, but murdering ${codename} directly would do nothing to get me noticed. 'Twould have been but a momentary blip on the great media radar. No, to make a true impact I needed a sweeping plot, a grand tale of monumental struggle.\n\n\t\t\"Most important, I needed ${codename} to be a famous hero for ${youhis} downfall to truly mean anything.\n\n\t\t\"So I waited patiently, honing my Powers and building a sizable fortune by selling my weaponized inventions—all funded by a nice, little nest egg left to me by The Sound and The Fury's estate.\"\n\n\t\tYou have to fight the urge to scream—Prodigal used your parents' estate, the money they made by saving lives as heroes, to fund all of her twisted endeavors? She used the money that should have been yours, the money from your parents' legacy, to build weapons designed only to kill?\n\n\t\tYour blood boils at the thought.\n\n\t\t*page_break\n\n\t\t\"Thus emerged The Artillery, a weapons empire named after my mother, the one who bequeathed my technology-inventing Powers. Though I doubt she ever knew that I'd grow to become an Infini-Class Powered….\"\n\n\t\tHearing this, you notice that Jenny flinches. What the slugger is an Infini-Class Powered? Why have you never heard of this before?\n\n\t\t\"For those not in the know, that basically means I'm among a new breed of Powereds with near-omnipotent, limitless, uncharted levels of Power. Rather scintillating, is it not?\"\n\n\t\t*if megability\n\t\t\tWait…could that have been what Jenny was talking about with your \"megability?\" Could it be possible that you're one of these Infini-Class Powered people?\n\t\t\t*goto manifesto\n\t\t*else\n\t\t\tYou turn to Jenny, who just gives you an ominous look.\n\t\t\t*goto manifesto\n\t#I'm finished with The Manifesto. \n\t\t*goto next_phase\n\t#Throw the tablet to the ground and ignore Prodigal's wishes.\n\t\tWithout even glancing down, you toss the tablet to the ground and listen as it cracks in two. You maintain eye contact with Prodigal, making sure she knows that you won't be playing by her rules anymore.\n\n\t\t\"Well, that was rather rude,\" Prodigal says through clenched teeth.\n\n\t\tYou smirk, happy to have pissed her off.\n\t\t*goto gwake\n\n*label next_phase\nThe current menu fades and a new one appears under the header \"The Plan Unfolds.\"\n\n\"The day ${codename} finally acquired licensed hero status, I set my grand plans into motion,\" Prodigal's holo-3D image announces. \"Let us peruse, shall we?\"\n\n*disable_reuse\n*label unfolds\n*choice\n\t#The Great Gravitas.\n\t\t\"When I learned that ${codename} had set out to find The Gravitas, I immediately discovered who possessed the artifact—I do have the best villainous clients from The Artillery sales, so it was a breeze, really.\n\n\t\t\"Once I knew it was Smyther who had the darned thing, I thought it would be absolutely delightful to crash the party and kill the old fool—he was a rather pesky competitor in the arms-dealing business, after all. Of course, the real goal was to destroy The Gravitas and then frame ${codename} for all of this, which went off without a hitch.\n\n\t\t\"'Twas but a small first move, child's play really. I wanted to test ${codename}'s limits, see how ${youze} would handle a little bit of adversity.\"\n\n\t\tYou think back to that first night—Prodigal had already been tracking you, ensuring that you'd fail….\n\t\t*goto unfolds\n\t#The Dynamic Duo.\n\t\t\"Once I saw that the scrappy little do-gooder was ready to bounce back from The Gravitas debacle, I decided it was time to embed a sidekick in ${codename}'s life. And good, old Grandma ${familyname} wanted her little ${firstname} to have one so badly, I didn't really have to do very much.\n\n\t\t*if sparrow\n\t\t\t\"Constructing a false backstory for Sparrow that would speak to ${codename} was rather simple—the harder part was dressing myself in that ridiculous bird outfit and equipping myself with flight generators every time she needed to appear. I still have feathers in places I'd rather not discuss….\n\t\t\t*goto anigang\n\t\t*elseif pressie\n\t\t\t\"Constructing a false backstory for my happy little helper, Preston, was rather easy—I knew exactly the type of heroic underdog tale that would appeal to ${codename}. Preston has been my villainous little servant for years, ever since we met in a small, underground community of Powereds forced to live in an abandoned asylum.\n\n\t\t\t\"Anyway, Pressie the jolly gnome was born, perfectly suited to win the affections of the ${familyname}s.\n\t\t\t*goto anigang\n\t\t*else\n\t\t\t\"After I saw that ${codename} had chosen Tarana Rain, it was rather easy to blackmail her into being my pet by threatening her parents.\n\t\t\t*goto anigang\n\t#The Circle of Splice.\n\t\t\"Once I saw that ${codename} was doubling back to take on The Splice Circle, I wanted that to go smashingly for ${youhir}. After all, if ${codename} remained such a no-name loser, no one would appreciate my grand schemes.\n\n\t\t\"So I made sure to send Black Magic in ${codename}'s direction with an anonymous tip. And seeing the two hit it off like gangbusters was quite a treat, considering I had watched ${firstname} night after endless night, drooling over that Black Magic poster on ${youhis} wall.\" \n\n\t\tA flush of embarrassed rage passes through you—how long has Prodigal been watching your every move? Nothing you've ever done has been private. You turn to Jenny, who, as your PFPP agent, looks equally floored by this information.\n\n\t\t\"The pool-killers I gave to Madame Vice as a peace offering for murdering Smyther came in rather handy, drawing ${codename} into The Millennial Group. And what a golden opportunity that was! It appeared as if my plan to make ${codename} a superstar was working even faster than expected. A team-up with Black Magic was one thing, but a real live Minterview? Pure gold! \n\n\t\t\"The only hitch was when Smyther reappeared and murdered Madame Vice—such a shame, that old broad and I got along quite well. I really must track Smyther down and make him pay…but that's a task for another day!\"\n\t\t*goto unfolds\n\t#The Follies of The Wisp.\n\t\t\"Riding a new wave of fame from ${youhis} Minterview, it seemed that ${codename} had forgotten all about little, old me. So I slapped my name on a warehouse deed and filled it with pool-killer robots, even going so far as to put up a nice, big The Artillery sign. Of course, ${sidekick} helped ${codename} find the right place and I made sure it was painfully easy to break into. \n\n\t\t\"But the poor simpleton still couldn't figure out quite who I was.…\n\n\t\t\"Then that ghastly Wisp character showed up, which was quite a surprise to me. It would have been a stroke of genius to hire the assassin and pin it on Jury, but sadly, I can't take credit for that—it seems that honor would belong solely to Madame Vice, who had it out for our little heroes before she passed. Quite the posthumous feat, don't you think? Ordering a hit from beyond the grave—how deliciously treacherous!\"\n\n\t\tSo it wasn't Jury who tried to have you killed after all—it was Madame Vice? For once in his miserable life, it seems Jury was telling you the truth….\n\n\t\t\"The Wisp attack did wonders for dear ${sidekick} though, who would now be embraced with open arms after a second life-saving showing.\"\n\t\t*goto unfolds\n\t#Breaking News.\n\t\t\"Somewhere in the midst of all this, I learned that Sonja Challa was being considered on the short list of potential authors for the MC HoT profile. She was still looking for a suitable hero subject to pitch, so right before the Gravitas case, I tipped Sonja off about ${codename}. After Sonja got the case-breaking scoop on The Gravitas and reported your debut, I knew she'd be hooked.\n\n\t\t\"So it was only a matter of time before ${codename} would finally get a dose of the Legend ${youze} craved so badly…and only a matter of time before it would be my moment to shine.\n\n\t\t\"Though there was a small hiccup. The HoT board actually went with some fool named Tumbleweave at first, so I made sure to cripple the poor dear before the party, thus ensuring that the grant would go to ${codename} instead. Really now, did anyone think such a pathetic, little brat could achieve this level of notoriety in such a short time, all on ${youhis} own? Preposterous.\"\n\n\t\tHearing this, your heart sinks. You were named HoT because of Prodigal? That's…unbelievable. \n\t\t*goto unfolds\n\t#${codename}'s Choice.\n\t\t\"Then it came time for my beautiful endgame, the climax to this glorious web I had been weaving. Seeing how ${codename} struggled with walking the line between fame and justice, I arranged for a tidy, little moral choice, one that would publicly ruin ${youhir}, of course.\n\n\t\t\"So on the eve of the big HoT award, I kidnapped Sonja and\n\t\t*if sparrow\n\t\t\tdressed some poor homeless lady as Sparrow.\n\t\t\t*goto kidnapped\n\t\t*elseif pressie\n\t\t\tcalled Preston back to my side.\n\t\t\t*goto kidnapped\n\t\t*else\n\t\t\tTarana Rain.\n\t\t\t*goto kidnapped\n\t#You're finished.\n\t\t*goto final_plan\n\n*label anigang\n\n\"Of course, I didn't need ${sidekick} to serve as a mole—I already had all the surveillance on the ${familyname}s I needed. No, what I really wanted was a way to make ${codename} squirm, to have ${youhir} know what it's like not to be able to trust a soul in this world.\n\n\"Killing a hero is easy, folks,\" Prodigal's image says with a twisted grin. \"But grinding down their will—now there's the real challenge.\n\n\"Once ${sidekick} was in place, things went off without a hitch. Together they broke up the Ani-gang rumble and then ${sidekick} saved ${codename}'s life, creating a rather instantaneous bond of trust. It was simply marvelous to behold.\"\n*goto unfolds\n\n*label kidnapped\nThe stage was set for ${codename} to choose: Save the reporter that would bring ${youhir} fame? Or the sidekick who stood for justice? \n\n\"I really had no idea which way ${youze} would go, so I was rather pleased when ${codename} chose to save\n*if choose_reporter\n\tSonja, cementing ${youhis} selfish ambitions for Legendary fame.\n\n\t\"Of course, I merely faked ${sidekick}'s death during the surely-now-infamous HoT video feed. You know, the one where I proceeded to out ${codename} as ${firstname} Sterling-${familyname}, the murderous child of The Sound and The Fury.\"\n\t*goto unfolds\n*else\n\t${sidekick}, knowing that betraying Sonja would truly break ${youhis} spirit.\n\n\t\"I killed that meddlesome, little Sonja during the surely-now-infamous HoT video feed. You know, the one where I proceeded to out ${codename} as ${firstname} Sterling-${familyname}, the murderous child of The Sound and The Fury.\"\n\t*goto unfolds\n\n*label final_plan\n\nAs the interactive holo-video ends, the real Prodigal beams with pride, tears forming.\n*if pressie\n\tPressie claps beside her, equally moved.\n\t*goto announce\n*else\n\t*goto announce\n\n*label announce\n\n\"Riveting stuff, is it not?\" Prodigal says, wiping her eyes. \"It's a true masterpiece, one that I will release to the public to launch my villainous career and mark the start of my
