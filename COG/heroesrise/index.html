, knowing Monk's threat is not an empty one.\n\n\t\tBut that's all right, you think as you start to head out of the training wing, because one word from your lips is all it's going to take to end them, too.\n\t\t*set soloist %+25\n\t\t*set fistfull_bad true\n\t\t*set rlshp_mg %-40\n\t\t*set moralbonus false\n\t\t*goto go_time\n\n*label go_time\n*page_break Five Minutes Later\n\n*set health 100\n*set power +30\n\nAs you reenter Mission Control, you find that the rest of the Group has already gathered. You take a seat next to Black Magic, who looks recharged and good as new.\n\n\"So how'd that go?\" ${bmze} whispers to you.\n\nYou know that your interactions just now probably sealed your fate with The Millennial Group, but Rebellion's voice booms from the head of the room before you can answer.\n\n\"Officer Spillane will handle the debrief,\" ${youze} says. \"In the meantime, I'm going to have a word with ${codename} outside.\"\n\n$!{Youze} is?\n\nSlugger.\n\n*page_break\n\nStanding outside in the corridor with Rebellion, your pulse begins to race. Now is your chance to say something to ${youhir}. You scream at yourself in your head to speak.\n\n\"Rebellion, can I just say that it is an absolute honor to-\"\n\n\"I'll keep this brief,\" Rebellion cuts you off. \"Firstly, I wanted to thank you for helping us with the Telelock. Because of your tip, Black Magic was able to locate Static's stockpile of evidence. Madame Vice hasn't gotten to it yet and the MCPD has already procured enough to take down the entire Splice Circle.\"\n\nYou pause, trying to absorb this information….\n\n*choice\n\t#I'm happy to have played a pivotal role in furthering the investigation for the Group.\n\t\tWho cares about one case? If you play things right, this opportunity might lead to much bigger and better cases….\n\n\t\tBut you push that thought from your mind as Rebellion continues:\n\t\t*set soloist %-5\n\t\t*goto nomatter\n\t#I'm angry that the case was stolen right out from under me.\n\t\tBut you don't dare interrupt Rebellion as ${youze} continues:\n\t\t*set soloist %+5\n\t\t*goto nomatter\n\t#I don't mind—getting to tour the MGHQ and meet some of these heroes was reward enough.\n\t\tBut you push that thought from your mind as Rebellion continues:\n\t\t*goto nomatter\n\n*label nomatter\n\n\"The Millennial Group has been tasked with bringing in the remaining Splice Generals, which is exactly what we're about to do. But there's something else—our PR department has decided that adding an aspiring rookie to our ranks will help boost our image and help us gain a younger following. It's all nonsense to me but I'm not opposed to bringing in a promising amateur to mentor. We've been auditioning many young heroes and as thanks for your assistance, I was thinking of including you in the mission.\"\n\nHoly slugger, you think. Rebellion is thinking of asking you to fight alongside ${youhir}? To maybe even mentor you? This is too much to even process….\n\n*page_break\n*gosub delay\n*if diva_good\n\t*goto team\n*elseif fistfull_good\n\t*goto team\n*else\n\t*goto solo\n\n*label solo\n*set rlshp_mg %-15\n*set rlshp_bm %-5\n\n\"But you don't seem to mesh with the team very well,\" Rebellion finishes, not a trace of kindness in ${youhis} face. \"And we're already auditioning a new member today. Here he is now, actually.\"\n\nYou turn around and your stomach drops because you see Jury striding down the hall. \n\nNo, you think, anyone but him!\n\n\"Well, look who it is,\" Jury says as smugly as he can manage. \"Good to see you again, cutie.\"\n\nJury stops next to Rebellion and the sight is enough to make your blood boil. But before you can respond, Rebellion turns to go.\n\n\"That will be all, ${codename}. Thanks for your time.\"\n\nWith that, Rebellion walks back into Mission Control, followed by Jury, who winks at you as he whispers: \"Nice seeing you, Gene Hazard.\"\n\nAs the door slams shut in your face, you stand outside, left alone. And with nothing.\n\n*if diva_bad\n\tLooks like The Diva made good on her promise to ruin you….\n\t*goto follow\n*else\n\tLooks like threatening to blackmail Fistfull and Monk was probably the nail in your Minterview coffin….\n\t*goto follow\n\n*label follow\n*page_break\n\nBut that's all right; you don't need The Millennial Group, especially not if they're pandering to someone as sleazy as Jury. Besides, you've always preferred working solo.\n\nSo that's exactly what you're going to do—you're going to take back the case that belonged to you in the first place. You're going to follow The Millennial Group and crash their mission against The Splice Circle. \n\nBecause no one outshines ${codename}.\n*set legend +5\n*finish Next Chapter: Splice Girls\n\n*label team\n*set guard true\n*set rlshp_mg %+15\n*set rlshp_bm %+5\n\n\"And you really seem like a team player,\" Rebellion says, \"so you can join us on this Splice Circle mission.\"\n\nYou can hardly believe your ears—did your idol just tell you that you'll be fighting alongside ${youhir} with MC's greatest Powered team? And that, if all goes well, it could lead to an actual Group membership?\n\n*if diva_good\n\tLooks like sucking up to The Diva really paid off. \n\t*goto rival\n*else\n\tLooks like your promise to keep Fistfull and Monk's secret really paid off.\n\t*goto rival\n\n*label rival\n\n\"I'd be honored to join,\" you say. \"I absolutely won't let you down.\"\n\n\"We'll certainly find out,\" Rebellion says. \"We happen to be auditioning another potential new member today. Here he is now, actually.\"\n\nYou turn around and your stomach drops because you see…\n\n*page_break\n\nJury striding down the hall.\n\nNo, you think, anyone but him! As Jury stops next to Rebellion, the sight is enough to make your blood boil.\n\n\"Well, look who it is,\" Jury says as smugly as he can manage. \"Good to see you again, cutie.\"\n\n\"We've got to get going,\" Rebellion says, turning to reenter Mission Control. \"May the best hero win.\"\n\nAs Jury follows Rebellion inside, he winks at you and mouths, \"You're going down.\"\n\nOh yeah?\n\nGame. On.\n\nNo one is taking this opportunity away from you…especially not a Victon.\n\n*set legend +5\n*finish Next Chapter: Splice Girls\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "night_life": "\n*comment é\n\n*text_image chap_16.png center Chapter 16: Night of Your Life\n\n\"So who do you think it will be this year?\" \n\n\"No one knows but I'm putting my money on that Tumbleweave character….\"\n\n\"Really? I was betting on Black Diamond. His knife-skis really are quite fetching….\"\n\n\"Do you think they have the hero out here with us or hiding away somewhere backstage?\"\n\nYou overhear two women whispering loudly nearby, their diamond earrings jangling as they gab. It still hasn't quite settled in that they're talking about you—that this whole damn party is for you. It all seems to be happening at warp speed….\n\nYou really should be ecstatic but one thought dominates the others: \n\nGrandma should be here with you. \n\n*page_break\n\nYou scan the crowd to distract yourself, taking in the gorgeous gowns and elaborate costumes in the room. It's littered with socialites, politicians, and famous heroes—everyone who's anyone in MC is invited to the HoT party. Of course, the elites of the press world are also all in attendance, along with dozens of aspiring heroes (invited to the party to act as decoys…for you).\n\nYou try to see if you can spot Sonja but it appears she still hasn't arrived yet. The author of the HoT profile is usually an aspiring writer as well, so their identity is kept just as secret as the inductee's. Perhaps that's why you haven't seen Sonja here yet? You can't help but be a little worried, though, considering she hasn't answered any of your calls since you arrived….\n\nLuckily, the organizers of the event and some key members of the HoT Board were here to greet you and fill you in on the evening's proceedings, in private. Right now, you're just supposed to enjoy the party and mingle a bit, so you decide that's what you're going to try to do.\n\nWho do you want to talk to?\n\n*hide_reuse\n*label talk_who\n*choice\n\t#Rexford Schillers.\n\t\tYou've been meaning to apologize to Rexford ever since the botched Gravitas case, but you and MC's wealthiest don't necessarily travel in the same social circles. \n\n\t\tOnce the people currently occupying Rexford move on, you quickly approach. But the moment he sees you coming, Rexford stiffens—maybe this wasn't such a good idea, after all. Oh well, it's too late to turn back now.\n\n\t\t\"Mr. Schillers, I just wanted to say-\"\n\n\t\t\"We have very little to say to each other,\" Rexford says, talking out of the side of his mouth as he smiles at someone else across the room. \"I haven't even begun to repay you for what you cost me. Now if you'll excuse me, I don't have any more time to waste on you.\"\n\n\t\tWithout giving you a chance to respond, Rexford takes off toward his next encounter.\n\n\t\tSo that went well.\n\t\t*goto second_chat\n\t#Mayor Victon.\n\t\tMayor Victon sits at a large, VIP table surrounded by security guards and glittering socialites.\n\t\n\t\tAs you approach, Mayor Victon catches a glimpse of you and freezes. Suddenly, his face turns icy-cold and his eyes bore through you. He shakes his head ever so slightly, but the message is clear: do not try to talk to me.\n\n\t\tA sentiment that makes sense, given your past connections. So you stop in your tracks, deciding to go elsewhere.\n\t\t*goto second_chat\n\t#The Virtuous Reality Video Game Executive.\n\t\tThe executive who could never remember your name stands in the corner, draining a martini glass. Since you didn't turn in the last report you were paid for, you probably shouldn't approach her. However, you're in costume, so she'll have no idea who you are.\n\n\t\t\"Hello,\" you say as the executive heads for the bar, \"I'm ${codename}.\"\n\n\t\tShe looks you over with indifference—she must get approached by wannabe heroes all the time, especially since her name tag indicates that she works at Virtuous Reality Games. She gives a polite nod and orders another martini.\n\n\t\t\"What brings you here?\" you ask, happy to be making her as uncomfortable as possible.\n\n\t\t\"We're basing a video game on this year's HoT,\" she says, snatching her drink. \"The game will follow that hero teaming up with all of the past HoTs.\"\n\n\t\t\"That sounds promising,\" you say with a smile. \n\n\t\tJust then, the executive tilts her head slightly. \"Hey, have we met befo-\"\n\n\t\t\"Best of luck with the game,\" you say, quickly turning to go.\n\n\t\tSatisfaction pours over you—a few short weeks ago you were testing video games and now they'll be making a game with you as the star.\n\n\t\tThings could be worse.\n\t\t*goto second_chat\n\t#The Diva.\n\t\tSince you don't spot any other Group members, you assume The Diva must be here representing the entire team. Which is just as well, since you're not sure what you would to say to Black Magic if ${bmze} were here, anyway. \n\n\t\t\"Diva,\" you say as you approach, tilting to kiss her on both cheeks, \"so good to see you.\"\n\n\t\tThe Diva wears another stunning costume: an ivory jumpsuit paired with a puffy shrug made of silver chiffon. A large ruby sits in the center of The Diva's chest, connecting the shrug to the jumpsuit. The pink soles of The Diva's high-heeled boots glow on the marble floor, raising her height to a commanding six-and-a-half feet.\n \n\t\t*if fistfull\n\t\t\t\"Yes, darling,\" The Diva says, her South African accent dripping with disdain. \"Now remind me, who exactly might you be?\"\n\n\t\t\t\"Uh, I auditioned with The Millennial Group a few days ago. You know, on the Splice Circle mission?\" you say, awestruck.\n\n\t\t\t\"Did you? How charming,\" The Diva says, causing the heroines surrounding her to chuckle. \"Glad you came to say hello, dear. Scurry along now.\"\n\n\t\t\tEqually mortified and enraged, you turn to go. What a total…well, diva.\n\t\t\t*goto second_chat\n\t\t*elseif diva_good\n\t\t\t\"Yes, darling,\" The Diva says, \"I was terribly sorry to hear you didn't make the Group.\"\n\n\t\t\t\"Someday I will, hopefully,\" you say.\n\n\t\t\t\"Well, that's so sweet,\" The Diva laughs, leaning in to whisper in your ear. \"Black Magic sends ${bmhis} regards, by the way.\"\n\n\t\t\tThe Diva then straightens up, offering you a knowing stare. \n\n\t\t\tAs your ears turn a bright shade of red, you quickly say your goodbyes—this is not something you want to get into with The Diva right now.\n\t\t\t*goto second_chat\n\t\t*else\t\n\t\t\t\"Yes, darling,\" The Diva says, her South African accent dripping with malice. \"Now remind me, who exactly might you be?\"\n\n\t\t\t\"I auditioned with The Millennial Group a few days ago, on the Splice Circle mission,\" you say, knowing that The Diva remembers exactly who you are.\n\n\t\t\t\"Did you? How charming,\" The Diva says, causing the heroines surrounding her to chuckle. \"Glad you came to say hello, dear. Scurry along now and find someone to chat with who's more…on your level. Another Gene Hazard, perhaps?\"\n\n\t\t\tA comeback leaps into your throat, but you remember where you are and what's about to happen, so you keep quiet. The Diva will be eating her words the moment you're announced as the new HoT.\n\n\t\t\tStill, as you walk away, you can't help but think about how she's such a complete…well, diva.\n\t\t\t*goto second_chat\n\t*if (tarana) #Tarana Rain's parents.\n\t\tAnyone would recognize the McNeals, the famous couple that owns the [i]Millennial Orbit[/i]. You're about to go introduce yourself when you remember that Tarana Rain's parents don't know she's been working with you—and they'd probably be more inclined to have you arrested than thank you.\n\n\t\tThinking better of it, you decide to steer clear of them instead.\n\t\t*goto second_chat\n\n*label second_chat\n\n*if gala_chat\n\t*goto jenny_surprise\n*else\n\t*page_break\n\tYou still have some time before the official ceremony begins, so who else do you want to talk to?\n\t*set gala_chat true\n\t*goto talk_who\n\n*label jenny_surprise\n*page_break\n\nYou try to decide who to talk to next, scanning the crowd once again.\n\nBut that's when you spot someone who makes you do a double take…\n\n*page_break\n\nIt's Jenny. \n\nAnd she's not in her usual ponytail getup—she's wearing a floor-length, nude dress that clings to her slender frame with surprising elegance. She stares at you from across the ballroom, waving sheepishly.\n\nYou make your way over to her, smiling widely.\n\n*if male\n\t*if male_straight\n\t\t*choice\n\t\t\t#\"Jenny, you look stunning.\"\n\t\t\t\t\"Shall I remind you that I like the ladies?\" Jenny says. \"Down boy.\"\n\t\t\t\t*goto thepoint\n\t\t\t#\"That dress is so unfair.\"\n\t\t\t\t\"Shall I remind you that I like the ladies?\" Jenny says. \"Down boy.\"\n\t\t\t\t*goto thepoint\n\t\t\t#\"What, no ponytail?\"\n\t\t\t\t\"Don't make me punch you in public,\" Jenny says, smiling back at you.\n\t\t\t\t*goto thepoint\n\t*else\n\t\t*choice\n\t\t\t#\"Jenny, you look stunning.\"\n\t\t\t\t\"And did no one tell you the event was black tie?\" Jenny jokes, eyeing your costume.\n\t\t\t\t*goto thepoint\n\t\t\t#\"I so wish I were straight right now.\"\n\t\t\t\t\"I still wouldn't want to touch you with a ten-foot pole, love,\" Jenny jokes. \"Apologies.\"\n\t\t\t\t*goto thepoint\n\t\t\t#\"What, no ponytail?\"\n\t\t\t\t\"Don't make me punch you in public,\" Jenny says, smiling back at you.\n\t\t\t\t*goto thepoint\n*elseif genderneutralhr\n\t*goto nonjenromroute\n*else\n\t*if female_straight\n\t\t*if bisexual\n\t\t\t*goto lady_boner\n\t\t*else\n\t\t\t*label nonjenromroute\n\t\t\t*choice\n\t\t\t\t#\"Jenny, you look stunning.\"\n\t\t\t\t\t\"Don't tempt me, love,\" Jenny says. \"Besides, I'm not your type.\"\n\t\t\t\t\t*goto thepoint\n\t\t\t\t#\"That dress is so unfair.\"\n\t\t\t\t\t\"Don't tempt me, love,\" Jenny says. \"Besides, I'm not your type.\"\n\t\t\t\t\t*goto thepoint\n\t\t\t\t#\"What, no ponytail?\"\n\t\t\t\t\t\"Don't make me punch you in public,\" Jenny says, smiling back at you.\n\t\t\t\t\t*goto thepoint\n\t*else\n\t\t*label lady_boner\n\t\t*choice\n\t\t\t#\"Jenny, you look stunning.\"\n\t\t\t\tJenny just gives you a look—don't go there. Please. You take the hint.\n\n\t\t\t\tBut Jenny still turns her head from you, trying to hide the traces of a smile. You wink at her and feel a flutter run through your stomach….\n\t\t\t\t*goto thepoint\n\t\t\t#\"That dress is so unfair.\"\n\t\t\t\tJenny just gives you a look—don't go there. Please. You take the hint.\n\n\t\t\t\tBut Jenny still turns her head from you, trying to hide the traces of a smile. You wink at her and feel a flutter run through your stomach….\n\t\t\t\t*goto thepoint\n\t\t\t#\"What, no ponytail?\"\n\t\t\t\t\"Don't make me punch you in public,\" Jenny says, smiling back at you.\n\t\t\t\t*goto thepoint\n\n*label thepoint\n\n\"How are you here right now?\" you ask, feeling immediately guilty for not telling Jenny about the HoT party sooner. With all that happened with Grandma, you couldn't really bear to face anyone, especially not Jenny….\n\n\"Well, since you so rudely forgot to invite me,\" Jenny says, not stopping to let you apologize, \"your grandmother called me. She didn't know if you'd want her here, so she asked me to come.\"\n\nHearing this, your heart threatens to crack in half.\n\n\"And let me tell you, finding formal wear on such short notice was not easy,\" Jenny says, adjusting the straps of her dress.\n\nBut you just try to keep yourself together, asking:\n\n*fake_choice\n\t#\"Where is Grandma?\"\n\t#\"Is Grandma all right?\"\n\t#\"What did Grandma say?\"\n\n\"She was still with ${sidekick}, last I spoke to her. She was going to head back home once she knew you'd be here,\" Jenny says, putting a hand on your shoulder. \"But listen, this is incredible news, ${codename}. You have to-\"\n\n\"What Grandma did was wrong,\" you say, cutting Jenny off. \"But still, she should be here.\"\n\n\"I know,\" Jenny says, \"but as your PFPP agent, I probably wouldn't have allowed her to come anyway. It would have made it rather easy to unearth your identity—one look at the old lady sobbing in the front row and your cover would have been blown.\"\n\nYou nod—Jenny is right.\n\nUnfortunately that doesn't stop you from feeling completely awful.\n\n*page_break\n\n\"But we can sort that all out later,\" Jenny starts, lowering her voice to a whisper. \"${codename}, this whole thing is bloody outrageous! How did it even happen? You must tell me everything.\"\n\nYou're about to fill Jenny in on the whole Sonja saga when you realize that you still haven't heard from her. You were sure she'd want to go over the details of the reveal with you before things started rolling….\n\n\"I'll tell you everything in one second; I just have to take care of something,\" you say, stepping away from Jenny before she can protest. You walk into the hallway and ask MeChip ${chipname} to call Sonja again—a request that doesn't go over too well.\n\n\"All of these calls to Sonja and not a single one to Black Magic…\" ${chipname} mutters while dialing.\n\nIgnoring your incredulous MeChip, you sigh as Sonja's phone starts to ring, fully expecting to be directed to her MeMail yet again.\n\nWhich is why you nearly jump when Sonja actually does answer, her holographic image flashing in front of your eyes.\n\nExcept it's not Sonja you see…\n\n*page_break\n\nIt's Prodigal.\n\nShe looks as statuesque as ever, wrapped in her red-striped kevlar bodysuit. She stares at you with her arms folded, a grin stretching through her face mask.\n\n\"My little ${codename}, I thought you'd never ring!\" Prodigal says. \"Don't you know it's rude not to call a girl back after the first date?\"\n\nA million questions begin to run through your mind but you try to keep focused, deciding to ask:\n\n*choice\n\t#\"Where's Sonja?\"\n\t\t\"Come now, do you really think I'm going to tell you where your little reporter friend is holed up?\" Prodigal asks, laughing.\n\t\t*goto goingtotell\n\t#\"What do you want with me?\"\n\t\t\"How deliciously narcissistic! But come now, do you really think you'll be the one calling the shots here?\" Prodigal asks, laughing.\n\t\t*goto goingtotell\n\t#\"Who the slugger are you?\"\n\t\t\"Come now, do you really think I'm going to reveal my big secret via MeChip? How tacky would that be?\" Prodigal asks, laughing.\n\t\t*goto goingtotell\n\n*label goingtotell\n\"No, I'm going to tell you exactly what I want and nothing more, chicken. Then you're going to have quite the choice to make….\"\n\nYou quickly decide that you should go grab Jenny—but how are you going to get through the crowd without—\n\n\"No, no. I can already see that little mind of yours churning. You will tell no one else about this phone call. Do you want to know why?\"\n\nYou nod, not sure what else to do.\n\n\"Because I kidnapped your reporter friend. Oh, and your little sidekick, too,\" Prodigal says, offering a healthy pause to let that sink in. \n\n\"Now here's the real kicker. If you don't do exactly as I say…\" Prodigal finishes, \"they're both going to die.\"\n\n*page_break\n\nYour heartbeat thunders in your ears. Can that even be possible? What if Prodigal is bluffing?\n\nAs if on cue, the holographic image shifts so that you can see Sonja and ${sidekick}, both of whom are tied to chairs and gagged. Your stomach drops.\n\n\"Don't bother wondering how I got ahold of them or where we are; you won't have time for silly worries like that.\" \n\nYou know you should be terrified for Sonja and ${sidekick}, but one thought crashes through everything else: ${sidekick} was supposed to be with Grandma. Were they still together when Prodigal kidnapped ${skhir}? And if they were, would Prodigal have any reason to hurt her? \n\nJust as you're about to ask about Grandma, you realize that you can't—not unless you want to give away your secret identity. You curse Grandma for refusing to have a MeChip installed. Without one, you have no way of getting in touch with her.\n\nAnd if anything has happened to her, after the way you left things…\n\nStraining to focus, you think at MeChip ${chipname}, drafting a mental text to Jenny: \"Check on Grandma now. Don't ask questions. I'll explain later.\"\n\n*page_break\n\nYou finish and hope you've practiced the thought-command function enough for the text to go through.\n\n\"Now listen carefully, because I'm only going to say this once,\" Prodigal says, interrupting your thought process. \"I do feel rather terrible about ruining your big night, so I suppose I'll be a bit generous. I was going to kill both of these little darlings, but I think I'll let one live…\n\n\"And that choice, big hero, is entirely up to you.\"\n\nYou struggle to keep up. Prodigal can't possibly be asking you to do what you think….\n\n*fake_choice\n\t#\"You must be joking, right?\"\n\t#\"Why are you doing this?\"\n\t#\"I…I don't believe you.\"\n\t#\"I'm not going to play by your rules.\"\n\t#\"I'm hanging up.\"\n\t#\"How do I know you'll hold up your end of the deal?\"\n\n\"Wrong answer, ${codename},\" Prodigal says, holding up a rather nasty looking handgun. \"Now I'm giving you quite the opportunity here. You get to save a life! That's every hero's dream, right?\"\n\nProdigal laughs at herself, enjoying this show very much.\n\n\"So here's how it's going to work. You choose: ${sidekick} or Sonja. Whoever you decide to save will be teleported right to your side and then you can go back to enjoying your big night in peace. The other? Well…you won't be seeing them again for quite some time, I fear.\"\n\nThis…this can't be real. You press your brain for some unseen solution, but all you can come up with is trying to stall. You have to buy more time to think about-\n\n\"I'm giving you two minutes to make this decision,\" Prodigal says, once again a step ahead of you. \"If you fail to do so in the allotted time or try to break the rules in any way, I'll simply shoot them both. So no funny business, you hear?\"\n\nAs Prodigal says this, she holds up a clock that begins counting down. One minute, fifty-five seconds remain. \n\nHow on earth can you make a decision like this?\n\n*page_break\n\n\"${codename},\" a voice says from behind you. You twirl to find the president of the HoT board staring at you. \"Come with me, it's almost time. By the way, have you heard from Sonja?\"\n\nYou don't have time for this—what do you do?\n\n*choice\n\t#\"I have to go to the bathroom.\"\n\t\tWithout waiting for the president's response, you run for the bathroom. You need a quiet place to think….\n\n\t\tBy the time you get inside an empty bathroom stall, you only have fifty seconds left on the clock.\n\t\t*goto bathroom\n\t#\"Please bring Mayor Victon to me.\"\n\t\tThe president eyes you with confusion but she still complies, reading the severity in your eyes. \n\n\t\t\"Oh, no. No no no!\" Prodigal says, \"Not cool, ${codename}. You just lost a minute for that! Now find someplace private and let's hear your decision.\"\n\n\t\tBy the time you get inside an empty bathroom stall, you only have thirty seconds left on the clock.\n\t\t*goto bathroom\n\t#\"I'll go look for her now.\" \n\t\tWithout waiting for the president's response, you run for the bathroom. You need a quiet place to think….\n\n\t\tBy the time you get inside an empty bathroom stall, you only have fifty seconds left on the clock.\n\t\t*goto bathroom\n\n*label bathroom\n\n\"So who is it going to be? The loyal sidekick or the helpful reporter?\" Prodigal says, holding up her hands to weigh the options. \"I do like a nice ethical conundrum—it really does show one's true colors, don't you think?\n\n\"What will good ol' ${codename} do? Will ${youze} save the reporter who's about to give ${youhir} the ultimate fame? Or will ${youze} save the sidekick who helps ${youhir} uphold justice? I really can't wait to find out. Oh, twenty seconds left, by the way.\"\n\nYour vision starts to blur—you can't do this. There has to be some other way. Maybe you can send another text to ask for help—this is not a decision you can make.\n\nBut as the countdown reaches ten seconds, you realize that you really don't have a choice. You have to try to save at least one of them….\n\n*page_break\n\n*if fame > 50\n\tYou've definitely been focused on achieving fame as a hero since you started, so you have to ask yourself: would the HoT article come out if Sonja doesn't return?\n\n\tBut how could you even care about that if you let ${sidekick} die—${skze} is only a teenager, one who has saved your life twice now….\n\t*goto faint\n*else\n\tYou've been focused on upholding justice as a hero since you started…and the just thing to do would be to save your young, innocent sidekick. Who cares about your press or the HoT article? It's going to be ruined now, no matter what. It's way more important to save ${sidekick}, especially since ${skze} has saved your own life twice.\n\n\tBut does that mean Sonja deserves to die?\n\t*goto faint\n\n*label faint\n\nYou think you might faint, but force yourself to snap back to reality.  \n\n\"Time's up, hero,\" Prodigal says. \"Speak now or forever hold your peace.\"\n\nYour body goes numb. But to your surprise, you find one name pulsing through your brain.\n\n*if fame > 85\n\tYour commitment to fame is unwavering. Really, you already made this choice for yourself over the past few weeks. You have to choose to…\n\t*set legend +5\n\t*goto the_choice\n*elseif fame \u003c 15\n\tYour commitment to justice is unwavering. Really, you already made this choice for yourself over the past few weeks. You have to choose to…\n\t*set legend +5\n\t*goto the_choice\n*else\n\tYou choose to…\n\t*goto the_choice\n\n*label the_choice\n*choice\n\t*selectable_if (fame >= 15) #\"Save Sonja.\"\n\t\t*set choose_reporter true\n\t\t*set fame %+30\n\t\t*set rlshp_sk %-50\n\t\t*goto done\n\t*selectable_if (fame \u003c= 85) #\"Save ${sidekick}.\"\n\t\t*set choose_sidekick true\n\t\t*set fame %-30\n\t\t*goto done\n\n*label done \n\"Thy will be done,\" Prodigal says, bowing her head. \"Be seeing you soon, ${codename}.\"\n\nBefore you can respond, the call goes dead.\n\nYour stomach turns. Hunching over and pulling off your mask just in time, you vomit into the toilet in great spasms.\n\n*page_break\n\nOnce done, you wipe the sweat from your brow and try to stand, finding that your legs feel like jelly. How could this…this can't be…\n\nThen one thought strikes you:\n\n*choice\n\t*if (choose_reporter) #Where is Sonja? Shouldn't she have teleported here? \n\t\t*goto text_alert\n\t*if (choose_sidekick) #Where is ${sidekick}? Shouldn't ${skze} have teleported here? \n\t\t*goto text_alert\n\t#What if Prodigal was lying to me?\n\t\tA spark of hope hits you—maybe Prodigal was bluffing, maybe she just wanted to see who you'd choose. Maybe she didn't really kill anyone…\n\t\t*goto text_alert\n\t#Prodigal is an insane murderer.\n\t\tMaybe Prodigal just forced you to choose to torture you, then killed both Sonja and ${sidekick} anyway….\n\t\t*goto text_alert\n\n*label text_alert\n\nBefore you can finish that thought, MeChip ${chipname} appears to recite a text from Jenny: \n\n\"I'm on my way to your apartment. What's going on? Please call me, ${firstname}. I don't like this.\"\n\nThank goodness—you couldn't handle it if something happened to Grandma. You force yourself to envision Jenny walking into your apartment and finding Grandma safe and sound, sitting in her recliner or feeding Tropez. \n\nThat thought calms you for a moment but then you scream as a loud bang suddenly echoes beside you.\n\n*page_break\n\n*if choose_sidekick\n\tYou spin and nearly choke with relief. It's ${sidekick}, who is still gagged and bound to a chair. Not daring to think about Sonja, you rush forward to untie ${skhir}.\n\n\t\"No, no, no, no,\" ${sidekick} says once ungagged, trembling and crying. \"No, please no.\"\n\n\t\"It's all right, you're safe now,\" you say, hugging ${skhir} tightly and praying that this is all some kind of twisted dream.\n\t*goto interrogate\n*else\n\tYou spin and nearly choke with relief. It's Sonja, who is still gagged and bound to a chair. Not daring to think about ${sidekick}, you rush forward to untie her.\n\n\t\"No, no, no, no,\" Sonja says once ungagged, trembling and crying. \"No, please no.\"\n\n\t\"It's all right, you're safe now,\" you say, hugging her tightly and praying that this is all some kind of twisted dream.\n\t*goto interrogate\n\n*label interrogate\n*choice\n\t*if (choose_sidekick) #\"Is Sonja still alive?\"\n\t\t*goto notsure\n\t*if (choose_reporter) #\"Is ${sidekick} still alive?\"\n\t\t*goto notsure\n\t#\"Do you know where Prodigal was keeping you?\"\n\t\t*goto notsure\n\t#\"What happened?\"\n\t\t*goto notsure\n\n*label notsure\n*if choose_sidekick\n\t\"I don't know…\" is all ${sidekick} can muster.\n\n\t\"${sidekick}, you have to tell me what happened,\" you say, shaking ${skhir} a bit. Your nerves are so frayed, you can't help it.\n\n\t\"That Prodigal woman ambushed me after I dropped your Grandma off at the Metro-Way,\" ${skze} starts. \n\n\tYou nearly collapse with relief. Grandma is safe. At least you can hold on to that much. Grandma is safe. You keep repeating it in your head so that it will sink in.\n\n\t\"Next thing I knew, I was tied up. It was too dark, I had no idea where I was. My MeChip was missing, she took it so no one could track me,\" ${sidekick} says, holding up ${skhis} vacant wrist. The thought of losing MeChip ${chipname} sends a wave of fear through your gut….\n\n\t\"Right before she teleported me here, Prodigal told me to take you back into the main ballroom….\"\n\t*goto video\t\n*else\n\t\"I don't know…\" is all Sonja can muster.\n\n\t\"Sonja, you have to tell me what happened,\" you say, shaking her a bit. Your nerves are so frayed, you can't help it.\n\n\t\"That Prodigal woman ambushed me as I was leaving to come here,\" Sonja starts. \"Next thing I knew, I was tied up. It was too dark, I had no idea where I was. My MeChip was missing, too—Prodigal took it so no one could track me.\"\n\n\tSonja holds up her vacant wrist, and the thought of losing MeChip ${chipname} sends a wave of fear through your gut.\n\n\t\"Right before she teleported me here, Prodigal told me to take you back into the main ballroom….\"\n\t*goto video\n\n*label video\n\n\"No,\" you say, \"we have to go find Prodigal. Now.\"\n\n*if choose_sidekick\n\t\"I really think we should listen to her,\" ${sidekick} says. \"Please?\"\n\n\tYou really don't want to, but ${sidekick} looks so terrified, you can't find it in you to say no.\n\n\t\"All right, let's go.\"\n\t*goto grand_entrance\n*else\n\t\"I really think we should listen to her,\" Sonja says. \"Please?\"\n\n\tYou really don't want to, but Sonja looks so terrified, you can't find it in you to say no.\n\n\t\"All right, let's go.\"\n\t*goto grand_entrance\n\n*label grand_entrance\n*page_break\n\n*if choose_sidekick\n\tYou and ${sidekick} run into the main ballroom, but no one even notices—everyone is transfixed by a video that plays on a large holo-monitor on the front stage.\n\n\tSonja appears on the monitor, displayed in front of a crowd of her finest press peers. \n\n\tAll you can think is: yes, she's still alive! At least until she starts speaking…\n\n\t\"The hero named ${codename} betrayed me in my hour of need,\" Sonja says into the monitor, through sobs. \"I was the reporter about to name ${youhir} Millennia City's Hero of Tomorrow but ${youze} failed to save me after all that I've done for ${youhir}. ${codename} is nothing but a hack! A danger to society! A…a selfish sociopath!\"\n\n\tYour hear the words and they cut through you like a knife.\n\t\n\t*choice\n\t\t#Sonja is right—a better hero might have been able to stop this from happening in the first place.\n\t\t\t*goto sonja_shot\n\t\t#It was hard choosing ${sidekick} over Sonja but I know it was the right thing to do.\n\t\t\t*goto sonja_shot\n\t\t#It doesn't matter what happened before—all that matters now is saving Sonja and stopping Prodigal.\n\t\t\t*goto sonja_shot\n*else\n\tYou and Sonja run into the main ballroom, but no one even notices—everyone is transfixed by a video that plays on a large holo-monitor on the front stage.\n\n\t${sidekick} appears on the monitor, displayed in front of a crowd featuring MC's finest.\n\n\tAll you can think is: yes, ${skze}'s still alive! At least until ${skze} starts speaking…\n\n\t\"The hero named ${codename} betrayed me in my hour of need,\" ${sidekick} says through sobs. \"I was ${youhis} sidekick but ${youze} failed to save me after all that I've done for ${youhir}. I saved ${youhis} life twice! ${codename} is nothing but a hack! A danger to society! A…a selfish sociopath!\"\n\n\tYour hear the words and they cut through you like a knife.\n\n\t*choice\n\t\t#${sidekick} is right—a better hero might have been able to stop this from happening in the first place. A better hero would have protected ${youhis} sidekick.\n\t\t\t*goto sidekick_shot\n\t\t#It was hard choosing Sonja over ${sidekick} but I know it was the right thing to do.\n\t\t\t*goto sidekick_shot\n\t\t#It doesn't matter what happened before—all that matters now is saving ${sidekick} and stopping Prodigal.\n\t\t\t*goto sidekick_shot\n\n*label sonja_shot\n\"That'll be enough from you,\" Prodigal says, stepping into the frame with her gun raised. \n\nThere are several screams from the crowd as Prodigal points the gun at Sonja. \n\n\"No!\" Sonja screams, \"you said if I recited your speech that you'd spare-\"\n\nBut next there's a loud bang.\n\nThen…silence.\n*goto prodigal_speech\n\n*label sidekick_shot\n\"That'll be enough from you,\" Prodigal says, stepping into the frame with her gun raised. \n\nThere are several screams from the crowd as Prodigal points the gun at ${sidekick}.\n\n*if tarana\n\t\"Tarana!? Not my baby girl!?\" a woman screams from somewhere nearby. You completely forgot that Tarana Rain's parents were here…this is more awful than you can possibly imagine.\n\t*goto finalshot\n*else\n\t*goto finalshot\n\n*label finalshot\n\n\"No!\" ${sidekick} screams, \"you said if I recited your speech that you'd spare-\"\n\nBut next there's a loud bang.\n\nThen…silence.\n*goto prodigal_speech\n\n*label prodigal_speech\n*page_break\n\n\"Hey there, Millennia City,\" Prodigal proclaims, turning toward the horrified crowd. \"I have some breaking news for you. I'm happy to announce that your brand new Hero of Tomorrow is none other than ${codename}. Let's give ${youhir} a round of applause!\"\n\nBut all that can be heard are muffled gasps and sobs.\n\n\"And here's another juicy tidbit for you: ${codename} is really ${firstname} Sterling. Though before ${youhis} time in the Powered Family Protection Program, ${youze} was known as ${firstname} ${familyname}.\"\n\nProdigal says the words and you struggle to understand exactly what they mean. They sound foreign to you, somehow.\n\n\"That's right, ladies and gentlemen! ${codename} is the spawn of The Sound and The Fury, the 'heroes' responsible for the murder of Miss Artillery.\"\n\nThe crowd ripples with whispers but you can't seem to take any of it in.\n\nThis simply cannot be happening.\n\n\"Yes folks, you heard it here first: ${firstname} ${familyname} is Millennia City's Hero of Tomorrow! And what a bright future MC will have under ${codename}'s purview, hailing from a family now responsible for multiple murders.\n*achieve hot\n\n\"And finally, this breaking news report has been brought to you courtesy of Millennia City's Villain of Tomorrow…\n\n\"Prodigal.\"\n\n*page_break\n*gosub delay\n\nWith that, the monitor goes black.\n\nAnd so do you, as \n*if choose_sidekick\n\teveryone in the ballroom turns to look at you and ${sidekick}. \n\t*goto confirm\n\n*else\n\teveryone in ballroom turns to look at you and Sonja. \n\t*goto confirm\n\n*label confirm\nThat's also when you realize that you never put your mask back on after throwing up…\n\nWhich means that right now, all of Millennia City can see you for who you really are.\n\nThis is how your parents must have felt that day when their lives ended forever.\n\nYou find it hard to breathe.\n\n*finish Next Chapter: All Falls Down\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return", "prodigal_daughter": "*comment é\n\n*text_image chap_19.png center Chapter 19: The Prodigcal Daughter\n\n\"${codename}, now!\" Jenny shouts.\n*if jenny_note\n\t\"Your Powers aren't just about energy and flying, you can manipulate atoms and control gravity!\"\n\n\tYou can…what?\n\t*goto stunned\n*else\n\t\"You have Infini-Class Powers, just like Prodigal! You can manipulate atoms and control gravity!\"\n\n\tThese words hit you like a ton of bricks. That can't possibly be true….\n\t*goto stunned \n\n*label stunned\n\n\"Excuse me?\" Prodigal says, the smile disappearing from her face.\n\n\"It's true,\" Grandma says at your side. \"We didn't want you to know…the things you can do…\"\n\nWait, how could Grandma and Jenny have kept this from you? How could they-\n\n\"Don't try to use the atomics, ${codename}, it's too unstable here under the plant,\" Jenny barks. \"Bend gravity. You have to do it now!\"\n\nWhat on earth is Jenny talking-\n\n\"You've always been most annoying, Jennifer,\" Prodigal interrupts, pointing her laser gun at Jenny.\n\nYou only have a second to react:\n\n*choice\n\t#Attempt to use my gravity Infinibility. (Power Cost Unknown)\n\t\t*if megability_use\n\t\t\tProdigal takes a shot at Jenny but she dodges the blast by inches. Without wasting another second, you try to focus, remembering what it felt like the last time you accessed your Infinibility at Ace's High.\n\t\t\t*goto gravity\n\t\t*else\n\t\t\tYou react blindly, trying to extend your flight Powers to Prodigal somehow. You feel a stab of pain rip into your abdomen and your Levels drop dangerously. \n\n\t\t\tHowever, Prodigal's gun does shift to the right, causing the laser blast to miss Jenny by inches.\n\t\t\t*set power -10\n\t\t\t*set health -20\n\t\t\t*goto instructions\n\t#Toss some grenade-marbles at Prodigal to slow her down. (Power Cost 5)\n\t\t*if megability_use\n\t\t\t*goto marbles\n\t\t*else\n\t\t\tYou've never used these untapped Powers before—you can't risk them backfiring.\n\t\t\t*goto marbles\n\t#Throw an energy shield around Jenny to protect her. (Power Cost 8)\n\t\t*if megability_use\n\t\t\t*goto shield\n\t\t*else\n\t\t\tYou've never used these untapped Powers before—you can't risk them backfiring.\n\t\t\t*goto shield\n\t\t\n\n*label marbles\nSo you whip charged marbles through the bars and they connect with Prodigal's gun the instant she fires.\n\nThe gun explodes in Prodigal's hand, causing the laser blast to miss Jenny by inches.\n*set power -5\n*goto instructions \n\n*label shield\nSo you generate a shield around Jenny just in time to stop a laser beam from connecting with her face.\n*if energy_shield\n\t*set power -4\n\t*goto instructions\n*else\n\t*set power -8\n\t*goto instructions\n\n*label instructions\nThis buys you precious seconds to get more instructions.\n\n\"Just focus on the feeling you get when you fly and apply it to the cage bars!\" Jenny shouts.\n*goto gravity\n\n*label gravity\n\nYou lock your eyes on the metal bars and tense your muscles the way you do when you want to fly. But instead of lifting your own body, you focus on lifting the bars.\n\nWith enormous strain, you watch as the bars twist and pull upward, making enough space for you to escape.\n\n*set power -20\n\nThat's…unreal.\n\nYou feel like you may have used half your Power Level to do this, but it doesn't matter.\n\nYou're free.\n\nAnd it's time to take Prodigal down.\n\n*choice\n\t#Knock Prodigal out with one, powerful energy blast. (Power Cost 15)\n\t\tYou unleash a burst of ${energycolor} energy directly at Prodigal.\n\n\t\tProdigal reacts quickly, flipping backward and generating one of her kick-shields. Your blast ricochets off her shield—Prodigal will be able to block most of your long-range attacks.\n\n\t\tSo it's time to go close range.\n\t\t*if energy_blast\n\t\t\t*set power -8\n\t\t\t*page_break\n\t\t\t*goto close_range\n\t\t*else\n\t\t\t*set power -15\n\t\t\t*page_break\n\t\t\t*goto close_range\n\t#Fight Prodigal close range.\n\t\tA very smart move, considering Prodigal can just use her kick-shields to block your long-range energy attacks.\n\t\t*set legend +3\n\t\t*goto close_range\n\t#Drain Prodigal's Health to boost my Power.\n\t\tIt's not a move you like to use often because it could be lethal if used improperly, but the kid gloves are now off with Prodigal.\n\n\t\tYou extend a ${energycolor} energy cord that latches on to Prodigal's arm and immediately begins to leach Health. Prodigal reacts quickly, flipping backward and generating one of her kick-shields.\n\n\t\tThe energy drain breaks and you realize Prodigal will be able to block most of your long-range attacks.\n\n\t\tSo it's time to go close range.\n\t\t*page_break\n\t\t*goto close_range\n\n*label close_range\n\nYou rush at Prodigal, generating a layer of ${energycolor} energy-armor around yourself for protection. Ready to strike, you construct an energy weapon to attack with:\n\n*set power -5\n*choice\n\t#Boxing gloves. (Power Cost 5)\n\t\tYou throw a punch at Prodigal, your fist wrapped in a giant, ${energycolor} boxing glove.\n\t\t*set power -5\n\t\t*goto retaliate \n\t#A sword. (Power Cost 5)\n\t\tYou swipe at Prodigal with a long, thin, ${energycolor} sword.\n\t\t*set power -5\n\t\t*goto retaliate \n\t#A giant hammer. (Power Cost 5)\n\t\tYou swing your arms wildly, throwing the ${energycolor} hammer directly at Prodigal.\n\t\t*set power -5\n\t\t*goto retaliate \n\n*label retaliate\n\nProdigal ducks under your blow with impossible speed, then swivels around to kick you in the face. Luckily, your energy-armor takes the brunt of the blow—but Prodigal quickly disarms you by blasting you point-blank with another oversized plasma gun.\n\nYou feel your energy-armor fall away, so you strike out with your knee, connecting with Prodigal's stomach.\n\nShe groans and drops her weapon. You step back to strike again but Prodigal moves faster, whipping her fist at your face. You feel one of her fingers break as it connects with your jaw, cracking a molar.\n\n*set health -10\n*page_break\n\nYou both howl with pain, staggering away from each other.\n\nAs you spit out bits of shattered tooth and blood, you notice out of the corner of your eye that Grandma has begun to climb out of the gap you made in the cage.\n\n*if pressie\n\tThat's also when you see Pressie creeping up behind her, dirt golems rising out of the ground beside him.\n\n\tOh, hell no.\n\n\t*choice\n\t\t#Obliterate Pressie with an energy burst. (Power Cost 15)\n\t\t\t*goto pressie_gone\n\t\t#Contain Pressie with a detainment field. (Power Cost 15)\n\t\t\t*goto pressie_gone\n\t\t#Hit Pressie with an energy boulder. (Power Cost 15)\n\t\t\t*goto pressie_gone\t\n*else\n\t*goto recharge\n\n*label pressie_gone\nYou raise your hands to attack but Grandma whips around before you can. She pulls out a coiled vine and chucks it at Pressie with surprising speed.\n\nThe moment the vine hits Pressie's face, it begins to grow and wrap itself around his entire body.\n\n\"What the- Oh no! Stop! Stop it!\" Pressie shouts as his limbs tangle with the fast-growing vine.\n\nYou haven't seen Grandma use a vine-bomb in years—she has never liked using her plants offensively. Still, that doesn't mean she walks around totally defenseless….\n\n\"I hope you rot in hell, you foul boy,\" Grandma spits.\n\nPressie continues to scream, his dirt golems disintegrating around him. As the vines begin to suffocate Pressie, suddenly the ground under his feet begins to bubble and open up.\n\nWithin seconds, Pressie is swallowed whole in a fit of magma. With a thundering belch, the ground reseals itself and all that's left of Pressie is the echo of his screams.\n\nYou have no idea where Pressie just went or what he just did to himself, but you don't care.\n\nYou're just thankful that little troll is gone.\n*page_break\n*goto recharge\n\n*label recharge\n\nSeeing that Grandma is all right, you decide it might be time to recharge: your Power Level is at ${power} and your Health Level is at ${health}. Do you think you need to recharge to survive this brawl with Prodigal?\n\n*choice\n\t#Recharge my Power Level.\n\t\t*choice\n\t\t\t#Recharge Power by 15.\n\t\t\t\t*set power +15\n\t\t\t\t*set health -15\n\t\t\t\t*goto levelupdate\n\t\t\t#Recharge Power by 20.\n\t\t\t\t*set power +20\n\t\t\t\t*set health -20\n\t\t\t\t*goto levelupdate\n\t\t\t#Recharge Power by 25.\n\t\t\t\t*set power +25\n\t\t\t\t*set health -25\n\t\t\t\t*goto levelupdate\n\t#Recharge my Health Level.\n\t\t*choice\n\t\t\t#Recharge Health by 5.\n\t\t\t\t*set health +5\n\t\t\t\t*set power -5\n\t\t\t\t*goto levelupdate\n\t\t\t#Recharge Health by 10.\n\t\t\t\t*set health +10\n\t\t\t\t*set power -10\n\t\t\t\t*goto levelupdate\n\t\t\t*if (health \u003c 86) #Recharge Health by 15.\n\t\t\t\t*set health +15\n\t\t\t\t*set power -15\n\t\t\t\t*goto levelupdate\n\t#Don't waste time recharging.\n\t\t*goto blasted\n\n*label levelupdate\n\nWith your Power Level now at ${power} and your Health Level at ${health}, you hope you're strong enough to win this final showdown.\n*goto blasted\n\n*label power_die\n*page_break\n\nBut then you feel an overwhelming stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\nThat's when you feel it—your Power Level is completely depleted. You weren't paying close enough attention and overexerted your Powers!\n\nAs the world starts to swirl into excruciating blackness, you think you can hear Jenny calling your name. What's going to happen to her and Grandma now? You have to save them….\n\nBut it's too late. Your body is already shutting down. Looks like Prodigal is going to have her way after all.\n\nYour final thoughts are of Grandma and your parents…\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the last choice I made in this chapter. (Legend Cost 20)\n\t\tYour Power and Health Levels have been restored to full but your Legend Level will probably never recover from this drop….\n\n\t\tLegendary heroes don't die, ${firstname}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*goto freedcages\n\t#Start the experience over from the very beginning.\n\t\tBetter luck next time, hero! \n\t\t*ending\n\n*label blasted\n*set health -10\n\nAs you turn back toward Prodigal, something hot rips into your hand, causing you to scream. While you were distracted, Prodigal blasted you with one of her weapons—though her aim is a bit off, it seems.\n\nOr at least that's what you think, until you look down and see that Prodigal's blast has incinerated your parents' silvered ring. All that remains is a charred band of ash.\n\nProdigal knew exactly what she was aiming for.\n\n\"Oh, did I destroy your precious?\" Prodigal says, smiling once again. \"How clumsy of me.\"\n\nThe sight of the destroyed ring makes your vision flash red. \n\nThis ends now.\n\n*choice\n\t#Lash out with my Infinibility. (Power Cost 20)\n\t\tYou try accessing your gravity Powers and it comes far easier than you expect. Perhaps the rage has helped you focus; you don't care. You just watch as the air around Prodigal grows thick, the gravity surrounding her increasing tenfold.\n\n\t\tProdigal immediately smashes into the ground, her arm twisting with a sickening snap. \n\n\t\tYou release the gravity hold, feeling light-headed. That took a lot out of you but it worked.\n\t\t*set power -20\n\t\t*if (power \u003c= 0)\n\t\t\t*goto power_die\n\t\t*else\n\t\t\t*goto freedcages\n\t#Silence Prodigal with my fists.\n\t\tYou hurl yourself at Prodigal, your hands reaching for her throat. But she reacts quickly, nailing you in the stomach with a kick.\n\n\t\t*set health -10\n\t\t*goto physical_finish\n\n*label physical_finish\n\nIgnoring the pain, you spin around and fling your fist into the base of Prodigal's skull. With a loud, choking noise, Prodigal falls forward, landing on the ground in a limp heap.\n\nYou stare down at Prodigal, breathing heavily. In the holo-movies, they make it seem like you can take a dozen hits and still remain standing, but you know the truth: one critical blow is all it takes to do some serious damage.\n\n*goto freedcages\n\n*label freedcages\n*page_break\n\nWith Prodigal down for the count, you turn back to the cages to find that Grandma has already freed Jenny.\n\n\"That was very impressive, ${codename},\" Grandma says. \"I only wish I had gotten a piece of her.\"\n\nBut you're too furious to celebrate.\n\n*choice\n\t#\"Why didn't you tell me Miss Artillery had a daughter?\"\n\t\t\"I…\" Grandma says. \"I never wanted to give it much thought, to be honest.\"\n\n\t\tYou turn to Jenny and it's clear she was as in the dark as you.\n\n\t\t\"I researched everything about your parents' case, there's not a mention of a daughter anywhere. It's like someone erased her from existence….\"\n\n\t\t\"We should have been able to stop this,\" you start. \"If we had known, we could have-\"\n\t\t*goto escape\n\t#\"Why didn't you tell me about this Infini-Class Powered ability?\"\n\t\t\"We didn't want you to be overwhelmed,\" Grandma says. \"We wanted you to be ready for-\"\n\n\t\t\"You had no right to keep this from me!\" you shout.\n\n\t\t\"I wanted to tell you, but your grandma was right,\" Jenny says. \"The things you'll be able to do, it might be better not to even explore that kind of Power, ${firstname}.\"\n\n\t\t\"That's a decision I should have been able to make for myself! It's not your place to-\"\n\t\t*goto escape\n\t*if (rlshp_sk \u003c 50) #\"I warned you that inviting ${sidekick} into our lives was a mistake!\"\n\t\t\"${firstname}, now is certainly not the time for an I-told-you-so,\" Grandma starts, hands on her hips. \"You know perfectly well-\"\n\t\t*goto escape\n\n*label escape\n\n\"We don't have time for this,\" Jenny yells. \"We need to find a way out of here. Now.\"\n\nForcing your frayed nerves to calm, you scan the room—and immediately spot the Telelock that brought you here sitting on a computer console across the bunker.\n\nBut as you move to retrieve it, you also realize that Prodigal isn't on the ground anymore.\n\n*page_break\n\n\"Prodigal is up, everyone get close!\" you shout, ready to generate an energy shield.\n\n\"There'll be no need for that,\" Prodigal says.\n\nYou, Grandma, and Jenny all spin to find Prodigal now standing in the corner of the bunker, wearing some kind of elaborate, metal bodysuit. Before any of you can react, Prodigal plugs two large syringes into her veins.\n\nThen she screams.\n\n*page_break\n\n\"It's done,\" Prodigal says, composing herself. \"I'll make this very simple for all of our loyal viewers at home. I have created the ultimate weapon: a machine that generates a solid wall of energy stretching ten miles high and wide.\"\n\nAs Prodigal speaks, she doesn't look so good—she has started to sweat and her cheeks have turned a pale shade of yellow.\n\n\"We're under the Big Sur fusion plant because I needed a power source of nuclear proportions. Now that I have tapped into the reactor above, the wave has activated. It's set to sweep west from here to the ocean, decimating Millennia City in its wake.\"\n\nOnce Prodigal finishes speaking, a video monitor sparks to life, displaying a solid, black wall of energy moving across the remains of Burns State Park (which was paved over to build MC years ago).\n\nAs the miles-wide death wave moves, it incinerates everything in its path. Luckily there's nothing but wildlife between the Bigsur fusion plant and Millennia City…but it can't be long before the wave reaches the outskirts of the city.\n\nGrandma and Jenny both gasp.\n\nAnd you raise your hands to attack.\n\n*fake_choice\n\t#Destroy Prodigal's generator suit with an energy blast. (Power Cost 15)\n\t#Fry Prodigal's generator suit with an energy surge. (Power Cost 10)\n\t#Riddle Prodigal's generator suit with energy marble explosions. (Power Cost 10)\n\n\"Not so fast,\" Prodigal screams. \"Blasting the generator won't help—I was sure to make it rather durable. Impervious, one might say. It's got a coating of some delicious new metal I brewed called Maddenium….\" \n\nYou hesitate for a moment, then jump as a loud bang echoes across the cave. You turn to Jenny, who has picked up one of Prodigal's guns and fired it at the generator suit.\n\nBut the shot just bounces off the generator's sleek metal surface and doubles back, knocking Jenny clean off her feet. Grandma rushes to her side—she indicates that Jenny is alive, just unconscious. The blast only stunned her. Thank slugger.\n\n\"Told ya so,\" Prodigal whines. \"My Powers are directly fueling the generator along with the nuclear boost, hence the need for this rather slimming bodysuit. So as long as my heart is still beating, that wave marches on. Which I'm afraid leaves us in another rather harsh reality….\"\n\nNo. Not again, you think, following Prodigal's logic.\n\n\"The only way to stop that wave now is to kill me,\" Prodigal says, locking eyes with you. \"It looks like you have another moral dilemma to face, ${codename}. Become a cold-blooded murderer to save millions of lives? Or spare me and risk the death of an entire city?\"\n\nYour heart pounds.\n\nYou can't possibly make a choice this big….\n\n*page_break\n\n\"Oh, and the wave hits the first populated area in about twenty seconds—the very edge of the Eastern Fringes, no less. ${codename}'s very own hometown! How fetchingly fitting! So let's pull it together, shall we?\" \n\nWhy is Prodigal doing this? If she really wanted all those people to die, she'd never tell you how to stop her. Besides, Prodigal can't really want you to kill her…can she?\n\nIt makes no sense—but then again, Prodigal doesn't exactly seem to be the picture of sanity. In her mind, this is probably win-win. Whatever you do, she believes she'll become a Legend.\n\nThis…no. You can't. You can't choose!\n\n\"${firstname}, it's all right,\" Grandma says, placing a hand on your shoulder. \"Just do what your parents would have done.\"\n\nYou stare into Grandma's eyes and she nods back at you, resolute.\n\n*if (power \u003c 41)\n\t\"Take whatever Power you need from me and end this,\" Grandma says, sensing that your Levels have gotten dangerously low.\n\n\t*set power 41\n\n\tYou quickly siphon off the Power you need from Grandma, because you\n\t*goto knowdeed\n*else\n\tYou\n\t*goto knowdeed\n\n*label knowdeed\nknow exactly what you need to do. \n*if (lawless > 85)\n\tYou've gotten this far by ignoring the law and it's not going to stop you now.\n\n\tFor you, the choice is as good as made.\n\t*set legend +5\n\t*goto killshot\n*elseif (lawless \u003c 15)\n\tYou've gotten this far by following the law and that's not going to change now.\n\n\tFor you, the choice is as good as made.\n\t*set legend +5\n\t*goto killshot\n*else\n\t*goto killshot\n\n*label killshot\n*choice\n\t*selectable_if (lawless >= 15) #Kill Prodigal and save millions of lives.\n\t\t*set moralbonus false\n\t\t*set lawless %+30\n\t\t*set kill_prodigal true\n\t\t*achieve prodigaldies\n\t\tYou charge a deadly surge of energy in your forearms, locking eyes with Prodigal.\n\n\t\t\"Oh, ${codename}…\" Prodigal says, a sad smile crossing her face.\n\n\t\tWithout hesitation, you unleash a torrent of energy.\n\n\t\tProdigal screams as the blast rips a hole through the exposed part of her chest. She lingers for a few seconds before her body finally slumps to the ground, a smile still twisted across her face.\n\n\t\tYou stare at Prodigal, mouth open.\n\n\t\tYou just killed someone.\n\n\t\tGrandma doesn't say anything and you can't bear to look at her.\n\n\t\tInstead, you turn to the screen to find…\n\t\t*if energy_blast\n\t\t\t*set power -8\n\t\t\t*goto kill_next\n\t\t*else\n\t\t\t*set power -15\n\t\t\t*goto kill_next\t\t\n\t*selectable_if (lawless \u003c= 85) #Don't kill Prodigal—there must be another way to stop the wave.\n\t\t*set lawless %-30\n\t\t*set badassbonus false\n\t\t*achieve mercy\n\t\tYou can't kill Prodigal—you're not a murderer, no matter what.\n\n\t\tBut that doesn't mean you can't stun her. You hit Prodigal with a ball of energy to the face, hoping she won't be able to Power the generator while unconscious.\n\n\t\tYour blast connects and Prodigal drops to the ground, her face still twisted into a smile. \n\n\t\tYou turn to the screen to check on the wave, hoping for the best…\n\n\t\t*set power -10\n\t\t*page_break\n\n\t\tBut the death wave keeps surging forward.\n\n\t\tNo—you can't let that wave destroy Millennia City. But you also can't bring yourself to kill Prodigal…can you?\n\n\t\t\"${firstname}, I didn't want to tell you this while Prodigal could stop you,\" Grandma starts. \"But your Infini-Class Powers—you can control atoms. I'm sure you can stop the flow of nuclear power to the generator, if you try.\"\n\n\t\t\"Gran, I have no idea how to-\"\n\n\t\t\"I know. But ${familyname}s are not murderers, no matter what people may believe. You have to try.\"\n\n\t\tAs the wave on the screen begins to approach the Eastern Fringes, you close your eyes.\n\n\t\tHere goes nothing.\n\t\t*goto what_next\n\n*label kill_next\n*page_break\n*if (legend > 30)\n\tThe wave has stopped.\n\n\tYou did it. You defeated Prodigal and saved your city….\n\n\tBut at what cost?\n\t*set kill_save true\n\t*achieve savefringes\n\t*finish Next Chapter: Equal and Opposite\n*else\n\tThe wave has stopped.\n\n\tBut as the energy begins to dissipate, it reveals the incinerated remains of several apartment buildings on the eastern edge of the Fringes.\n\n\tYour heart stops. How many people just died because you didn't act fast enough?\n\n\tYou won, you try to tell yourself. You still saved your city!\n\n\tBut it doesn't seem to sink in. Because all you can feel right now is… \n\n\tLost.\n\t*set kill_town true\n\t*achieve fringesburn\n\t*finish Next Chapter: Equal and Opposite\n\n*label what_next\n*page_break\n\nYou strain your energy Powers and begin to feel a flow around the room, like air moving—except it's the flow of atomic energy. You open your eyes and see that the energy all circulates in one direction—toward Prodigal's generator suit.\n\nNot sure what else to do, you imagine the nuclear flow drying up, returning to its source.\n\nAs the strain doubles, you feel like your muscles might explode.\n\nBut you give one final push…\n\n*set power -30\n*page_break\n*gosub delay\n*if (legend > 30)\n\tAnd see on the screen that the wave has stopped.\n\n\tYou did it. You disabled the generator, defeated Prodigal, and saved your city.\n\n\tNow that's a feat worthy of Legend.\n\t*set power_save true\n\t*achieve savefringes\n\t*finish Next Chapter: Equal and Opposite\n*else\n\tAnd see on the screen that the wave has stopped.\n\n\tBut as the energy begins to dissipate, it reveals the incinerated remains of several apartment buildings on the eastern edge of the Fringes.\n\n\tYour heart stops.\n\n\tHow many people just died because you didn't act fast enough?\n\n\tYou won, you try to tell yourself. You still saved your city!\n\n\tBut it doesn't seem to sink in. Because all you can feel right now is… \n\n\tLost.\n\t*set power_town true\n\t*achieve fringesburn\n\t*finish Next Chapter: Equal and Opposite\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "prodigies": "*comment é\n\n*text_image chap_5.png center Chapter 5: Prodigies\n\nWhen things snap back into focus, you find that you're in the foyer of a sleek loft. You clap your hand over your mouth and slide against the nearest wall, hoping no one has heard you. The Telelock must have activated somehow, despite the energy overload. \n*if vice_friend\n\tPerhaps it was because Madame Vice was still nearby? Or perhaps-\n\t*goto reveal\n*else\n\tPerhaps it was because Madame Vice shock-whipped you with the lock? Or perhaps-\n\t*goto reveal\n\n*label reveal\n\n\"How stupid are you?\" you hear a deep voice say, interrupting your thoughts. You peek your head around the wall of the foyer and see none other than Smyther sitting on a large, metal throne, staring at something across the room!\n\nHe wears tight, black clothes, his bulging muscles covered in veins and bluish scars, the by-product of gene-splicing ultrasteroids. His face is equally scarred, scattered with stab and gunshot wounds. The effect makes him look considerably less than human.\n\nYou can't help it—the sight of Smyther sends a chill up your spine.\n\nYou try to ignore this as you spot the large, silver staff in Smyther's hands, covered in gemstones the size of baseballs. That must be it…. \n\nThat's The Gravitas.\n\n*page_break\n\nYou almost squeal because you've done it—you found the damn thing! You start to scroll through the ways you're going to spend that reward money, knowing that all you need to do now is get your hands on The Gravitas….\n\nThat is, until your eyes settle on the ten armed guards flanking Smyther. Next to them stand three menacing figures you recognize as Smyther's Splice Generals. One of them is ten feet tall and made of stone (that must be the Security General, Boulder). Another has elongated, plastic fingers ignited by flames (that's the owner of Ace's High Casino, Third Degree). The last has sharp knives growing out of every joint in her body (that must be Fracture, the drug queen).\n\nYou swallow hard, a knot of fear balling up in your stomach. You would probably have a hard time taking on just one of these criminals, let alone all of them combined. Suddenly, The Gravitas seems like an afterthought—how are you even going to get out of here alive?\n\nWith that in mind, you begin to consider your Power Levels. If you're going to survive this battle, you had better make sure you're properly equipped to do so. Luckily, your energy Power allows you to recharge your Levels: you can recharge your Power but it drains a proportionate amount of Health. Likewise, you can heal yourself, but it drains your Power.\n\nYour current Power Level is ${power} and your Health Level is ${health}. You're feeling strong but that could just be all the adrenaline coursing through you. You know that if either of your Levels drops to 0, you'll die instantly. So do you think you need to recharge your Power before things start to get intense here? \n\n*choice\n\t#Yes, I need to recharge my Power.\n\t\tI will recharge my Power by…\n\t\t*choice\n\t\t\t#10.\n\t\t\t\t*set power +10\n\t\t\t\t*set health -10\n\t\t\t\t*goto siphon\n\t\t\t#20.\n\t\t\t\t*set power +20\n\t\t\t\t*set health -20\n\t\t\t\t*goto siphon\n\t\t\t#30.\n\t\t\t\t*set power +30\n\t\t\t\t*set health -30\n\t\t\t\t*goto siphon\n\t#No, I'll be fine.\n\t\t*goto standoff\n\n*label siphon\n\nGritting your teeth, you begin to siphon Health energy from your body, a process that feels a lot like pulling every hair from your skin at the same time.\n\nThankfully, it only takes a second and once it's done, your Power Level is ${power} and your Health Level is ${health}. \n*goto standoff\n\n*label standoff\nReady to act, you tense all of your muscles, hoping you have enough Power and Health to survive the night.\n\nThat's when you realize Smyther and his mob all have their weapons locked on something across the room: a young woman. She wears a bodysuit made of black kevlar, with one thick, red stripe running up the center. Where the bodysuit ends, the red stripe continues to cover her face, showing only her deep, burgundy lips, crystal-blue eyes, and long, dark hair. She looks statuesque, like one of those genetically enhanced Victoria's Secret Angels.\n\nSlugger, you think, another hero has beat you to the punch. And she must be even more insane than you are since she stands unarmed, staring down The Splice Circle.\n\n\"You went to great lengths to find my base of operations,\" Smyther says, gesturing toward a large hole in the floor next to the kevlar-girl—a sight that causes you to lose your breath. You realize that you have no idea how far the Telelock has taken you or how to get back outside….\n\nYou snap out of it as Smyther continues: \"What are you here for?\"\n\nYou look back to the kevlar-girl, remembering that Smyther has the Power to elicit a truthful response from anyone he asks a direct question (a very handy gift for a Powered mob boss). That must be why they haven't killed kevlar-girl yet—Smyther wants to know how and why she's here first.\n\n\"I'm here,\" she says softly, barely audible…\n\n*page_break\n\n\"To kill you.\" \n\nSuddenly, kevlar-girl produces two massive cannon-guns and fires thick surges of laser-energy into the heart of the Circle. Within seconds, four guards and Third Degree are crisped to ash right before your eyes. Your stomach turns as you realize it smells like a summer barbecue.\n\nA deafening roar erupts as the guards return fire. Fracture whips dozens of razor-sharp blades at kevlar-girl while Boulder moves to protect Smyther from the fray. Smyther shouts something at Boulder while waving The Gravitas, but you can't make out the words over the gunshots.\n\nYou quickly generate a protective energy shield, terrified of catching the brunt of a stray attack. Looking through the ${energycolor}ish energy barrier, your eyes snap back to kevlar-girl as she leaps into the air and does a series of flips, her movements creating a visible trail that blocks the barrage of bullets and knives—she must be able to generate some kind of flash-shield with her movements.\n\nKevlar-girl then lands and sends off another round of cannon pulses. You look back to Smyther's corner and see that the last blast took out another half of the guards and left a large, nasty burn on Boulder's back.\n\nYou can hardly believe your eyes—this woman just killed close to a dozen people in a matter of seconds. An intense rush of dread overtakes you. This is a bloodbath. You didn't sign up for this.\n\nYou don't want to die today.\n\nBut just as soon as these thoughts appear, you force them from your brain. You've been training for this your entire life. So what are you going to do?\n\n*if energy_shield\n\t*set power -4\n\t*goto gotime\n*else\n\t*set power -7\n\t*goto gotime\n\n*label gotime\n*choice\n\t#Jump in right away and stop the killing. It doesn't matter who gets The Gravitas—saving lives is more important than anything.\n\t\t*gosub end_trial\n\t\t*set fame %-20\n\t\t*set legend +1\n\t\tYou're a hero. And heroes save lives. Period.\n\n\t\tWithout second thought, you shoot forward in a blur right at kevlar-girl.\n\t\t*if power \u003c  27\n\t\t\t*goto shot\n\t\t*else\n\t\t\t*set power -5\n\t\t\tBefore she can see you coming, you crash into her and grab hold of her waist. Keenly aware of the bullets ricocheting all around you, you canvass the room and spot a small window in the far corner. You have no idea where it will lead; you're just thankful the room has an exit at all.\n\n\t\t\tWith a thundering crash, you use kevlar-girl as a battering ram to smash through the glass, ignoring her screams—she doesn't exactly deserve delicate treatment after murdering everyone in sight.\n\n\t\t\tOnce out of the window, you find yourself five stories up—the headquarters must be hidden on Shed's top floor. Feeling yourself start to fatigue from the effort of carrying kevlar-girl, you pull above the nearest roof and drop her. She gracefully tumbles onto the roof in a tight ball then flips to her feet.\n\n\t\t\tThe moment she gains her footing, she reproduces the massive cannon-guns (which you could have sworn she dropped when you tackled her inside) and trains them directly on you.\n\n\t\t\tYou begin to swerve and dodge laser blasts as kevlar-girl opens fire at you. She is not playing around—if one of those blasts were to hit you, you'd be burnt to a crisp.\n\n\t\t\tYou don't have much time to decide what to do next, however, as kevlar-girl chucks something back towards Shed….\n\n\t\t\tA grenade.\n\n\t\t\t*page_break\n\n\t\t\tThough it looks unlike any grenade you've ever seen before, intricately coiled with tech and a cool-blue core.\n\n\t\t\tYou turn to fly after the grenade as quickly as possible, knowing it will probably incinerate anyone still left inside the headquarters.\n\n\t\t\tBut you're not fast enough—the grenade drifts easily through the broken window. Seconds later, an intense flash of blue heat erupts from inside, followed by a massive explosion that sends flames and debris flying in every direction.\n\n\t\t\tYou scream as you feel the force of the explosion send you reeling.\n\t\t\t*set power -8\n\t\t\t*set health -30\n\t\t\t*goto prodigal\n\t#My only concern here is The Gravitas. I make a grab for it and go!\n\t\t*gosub end_trial\n\t\t*set moralbonus false\n\t\t*set fame %+20\n\t\t*set legend +1\n\t\tYou're a hero, but without a reputation and some money saved, you can't really do anything. The truth is, you need The Gravitas to launch your career.\n\n\t\tSo without a second thought, you shoot forward in a blur, moving at top speed right toward Smyther.\n\t\t*if power \u003c  19\n\t\t\t*goto shot\n\t\t*else\n\t\t\t*set power -5\n\t\t\tBefore he can see you coming, you crash into him and grab The Gravitas right out of his hands.\n\n\t\t\tKeenly aware of the bullets and blasts ricocheting all around you, you canvas the room and spot a window in the far corner. You have no idea where the window will lead; you're just thankful the room has an exit at all.\n\n\t\t\tBut before you can move, you see that the crazy kevlar-girl has dropped her cannons and holds something new in her hands….\n\n\t\t\tA grenade.\n\n\t\t\t*page_break\n\n\t\t\tThough this looks unlike any grenade you've ever seen before—it's intricately coiled with tech and its core glows cool-blue.\n\n\t\t\tYou dash toward the window, but kevlar-girl reaches it first, smashing her way outside—and leaving the grenade behind as a parting gift. You struggle to get out but The Gravitas blocks your path. Frantic, you drop it and push your way outside—\n\n\t\t\t—just as an intense flash of blue heat erupts from the headquarters, followed by a massive explosion that sends flames and debris flying in every direction.\n\n\t\t\tYou manage to pull up above the blast, but not high enough. You scream as you feel the force of the explosion catch you in the back and send you reeling.\n\t\t\t*set health -30\n\t\t\t*goto prodigal\n\t#Wait for them all to kill each other off, then take The Gravitas by surprise from whoever is left standing.\n\t\t*gosub end_trial\n\t\t*set moralbonus false\n\t\t*set lawless %+25\n\t\t*set legend +1\n\t\tWhere other people might see ruthlessness, you just see strategy. Besides, it's not like every one of these people isn't a heartless murderer—they're probably getting exactly what they deserve.\n\n\t\tSo you watch the bloody battle from your hiding spot, coursing with anticipation for the right moment to strike. But just as you congratulate yourself on this masterful plan, you see that the crazy kevlar-girl has dropped her cannons and holds something new in her hands…\n\n\t\tA grenade.\n\n\t\tThough this looks unlike any grenade you've ever seen before—it's intricately coiled with tech and its core glows cool-blue.\n\n\t\tNot wasting a second, you fly forward as fast as possible. Keenly aware of the bullets and blasts ricocheting all around you, you canvas the room and spot a window in the far corner. You have no idea where the window will lead; you're just thankful the room has an exit at all.\n\n\t\t*if power \u003c  19\n\t\t\t*goto blown\n\t\t*else\n\t\t\t*set power -5\n\t\t\t*page_break\n\t\t\tYou dash toward the window but kevlar-girl reaches it first, smashing her way outside—and leaving the grenade behind as a parting gift.\n\n\t\t\tYou follow her outside just as an intense flash of blue heat erupts from the headquarters, followed by a massive explosion that sends flames and debris flying in every direction.\n\n\t\t\tYou manage to pull up above the blast, but not high enough. You scream as you feel the force of the explosion catch you in the back and send you reeling.\n\n\t\t\t*set health -30\n\t\t\t*goto prodigal\n\t#Stay put and wait for the police to arrive—this is way too much for me and I know it.\n\t\t*gosub end_trial\n\t\t*set moralbonus false\n\t\t*set badassbonus false\n\t\t*set legend -3\n\t\tYou watch the bloody battle from your hiding spot, too terrified to move a muscle. This is your first day heroing—you don't want to go and get yourself killed by battling people way more deadly and experienced than you. Yes, you think, you'll wait for the police and explain everything to them. They'll be happy to have a witness on their side, for sure.\n\n\t\tBut just as you congratulate yourself on this masterful plan, you see that the crazy kevlar-girl has dropped her cannons and holds something new in her hands….\n\n\t\tA grenade.\n\n\t\tThough this looks unlike any grenade you've ever seen before—it's intricately coiled with tech and its core glows cool-blue.\n\n\t\tNot wasting a second, you fly forward as fast as possible. Keenly aware of the bullets and blasts ricocheting all around you, you canvas the room and spot a window in the far corner. You have no idea where the window will lead; you're just thankful the room has an exit at all.\n\n\t\t*if power \u003c  19\n\t\t\t*goto blown\n\t\t*else\n\t\t\t*set power -5\n\t\t\t*page_break\n\t\t\tYou dash toward the window, but kevlar-girl reaches it first, smashing her way outside—and leaving the grenade behind as a parting gift.\n\n\t\t\tYou follow her outside just as an intense flash of blue heat erupts from the headquarters, followed by a massive explosion that sends flames and debris flying in every direction.\n\n\t\t\tYou manage to pull up above the blast, but not high enough. You scream as you feel the force of the explosion catch you in the back and send you reeling.\n\t\t\t*set health -30\n\t\t\t*goto prodigal\n\n*label shot\n*page_break\n*set power 0\n\nAs you fly forward, you feel an excruciating stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\nThat's when you feel it—your abilities are completely depleted. Your Power Level has dropped too low! You should have recharged when you had the chance….\n\nLying helpless on the floor, you twist to look up at a row of Smyther's guards turning their attention to you.\n\nYou don't even have time to scream before a torrent of bullets rips through you.\n\nIt appears your heroic career has ended before it ever really had a chance to begin. As you breathe your last breath, your final thoughts are of Grandma and your parents…\n\n…you've truly let them down.\n\n*choice\n\t#Return to the last choice I made in this chapter. (Legend Cost 20)\n\t\tYour Power and Health Levels have been restored to full but your Legend Level will probably never recover from this drop….\n\n\t\tLegendary heroes don't die, ${firstname}. You had better make better decisions this time around.\t\t\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*page_break\n\t\tWhat's your next move?\n\t\t*goto gotime\n\t#Start the experience over from the very beginning.\n\t\tBetter luck next time, hero! \n\t\t*ending\n\n*label blown\n*page_break\n*set power 0\n\nAs you fly forward, you feel an excruciating stab of pain radiate through you. Before you know what's happening, your body gives out and you crash to the floor.\n\nThat's when you feel it—your abilities are completely depleted. Your Power Level has dropped too low! You should have recharged when you had the chance….\n\nLying helpless on the floor, you focus in on the grenade sitting right next to your face…\n\n…and close your eyes as it explodes.\n\nIt appears your heroic career has ended before it ever really had a chance to begin. As you breathe your last breath, your final thoughts are of Grandma and your parents.\n\nFor you've truly let them down.\n\n*choice\n\t#Return to the last choice I made in this chapter. (Legend Cost 20)\n\t\tYour Power and Health Levels have been restored to full but your Legend Level will probably never recover from this drop….\n\n\t\tLegendary heroes don't die, ${firstname}. You had better make better decisions this time around.\n\t\t*set power 100\n\t\t*set health 100\n\t\t*set legend -20\n\t\t*page_break\n\t\tWhat's your next move?\n\t\t*goto gotime\n\t#Start the experience over from the very beginning.\n\t\tBetter luck next time, hero! \n\t\t*ending\n\n\n*label prodigal\n*page_break\n\nIt takes several seconds for your head to stop ringing and your vision to clear. When they do, you find yourself on the street below—the blast sent you a couple of blocks down, significantly lowering your Health. That grenade was some seriously advanced technology—where on earth di
