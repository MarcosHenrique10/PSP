 soloist %-15\n\t\t*set guard_poster true\n\t\t*goto codename\n\t#The Everymen Brigade, MC's most prominent work-for-hire team.\n\t\tThe Everymen Brigade does good deeds and rakes in the big bucks at the same time, working for high profile mega-clients and donating time to pro bono cases. Professional heroing is a business, after all—and no one knows that better than The Everymen.\n\t\t*set soloist %-15\n\t\t*goto codename\n\t#Static, the Eastern Fringes's current champion.\n\t\tNamed after Static Lane, the Fringes's most infamous crime-clogged street, Static is one of the few heroes to stand up to the injustices of life in the Eastern Fringes (since most heroes concentrate on more glamorous and less dangerous work outside of the Fringes).\n\n\t\tHowever, no one has seen Static in months, a troubling mystery that has gone unsolved…. \n\t\t*set soloist %+15\n\t\t*set static_poster true\n\t\t*goto codename\n\t#Black Magic, MC's latest hero heartthrob.\n\t\t*set soloist %+15\n\t\t*set magic_poster true\n\t\tBlack Magic blazed on to the scene after single-handedly protecting MC from a foreign terrorist incursion last year. Even though ${bmhis} origin remains completely shrouded in mystery, Black Magic is currently MC's most famous solo hero—especially after receiving the most recent Millennia City's Hero of Tomorrow (HoT) grant, which is the most esteemed honor that can be bestowed upon any aspiring hero.\n\n\t\tIt doesn't hurt that Black Magic is absolutely gorgeous, either. \n\n\t\tDespite the mainstream hype, you can't help but be attracted to Black Magic. Mostly because of ${bmhis} striking resemblance to your biggest crush, an old-time celebrity icon from back in the days when normal people were famous:\n\t\t*goto bmagic_crush\n\n*label bmagic_crush\n\n*if bmmale\n\t*choice\n\t\t#Robert Pattinson.\n\t\t\t*set bmceleb \"Robert Pattinson\"\n\t\t\t*goto bmagic_sum\n\t\t#Kanye West.\n\t\t\t*set bmceleb \"Kanye West\"\n\t\t\t*goto bmagic_sum\n\t\t#Ryan Gosling.\n\t\t\t*set bmceleb \"Ryan Gosling\"\n\t\t\t*goto bmagic_sum\n\t\t#No, Black Magic really looks like…\n\t\t\tYour all-time biggest crush:\n\t\t\t*input_text bmceleb\n\t\t\t*goto bmagic_sum\n*else\n\t*choice\n\t\t#Beyonce.\n\t\t\t*set bmceleb \"Beyonce\"\n\t\t\t*goto bmagic_sum\n\t\t#Angelina Jolie.\n\t\t\t*set bmceleb \"Angelina Jolie\"\n\t\t\t*goto bmagic_sum\n\t\t#Natalie Portman.\n\t\t\t*set bmceleb \"Natalie Portman\"\n\t\t\t*goto bmagic_sum\n\t\t#No, Black Magic really looks like…\n\t\t\tYour all-time biggest crush:\n\t\t\t*input_text bmceleb\n\t\t\t*goto bmagic_sum\n\n*label bmagic_sum\n\nBlack Magic is a dead ringer for ${bmceleb}. You think ${bmze} might actually be a direct descendant but no one knows enough about ${bmhis} past to be sure.\n\nYou've always been fine being alone, especially since you haven't had much choice in the matter. Still, there's something about Black Magic…whenever you see ${bmhir}, you feel like you want more.  \n\nSometimes when you're falling asleep, you stare at Black Magic's poster and imagine ${bmhir} lying beside you. It would be awfully nice to have someone there—though you try not to indulge in thoughts like this too often.\n*goto codename\n\n*label codename\n*page_break\n\nEvery morning, you stare at the hero wall and envision what your own poster will look like among these famous heroes.\n\nPeeling your eyes away, your attention wanders down to the video game you're supposed to be testing. Now that you have your license, you can finally quit the game-testing job, since there are dozens of ways for heroes to earn a living.\n\nMost of these paid jobs are very difficult to obtain, though—you've heard the horror stories about the endless lines at the DRPR to collect Powered Hero Unemployment. \n\nStill, you don't think twice about tossing the video game in the trash and reaching for your single most-prized possession: your ${codename} costume.\n\nAs you suit up, you pull a mask over your face to protect your identity. Even though no one would ever recognize you as The Sound and The Fury's child now that you're all grown up, you don't need anyone discovering your Sterling identity and coming after Grandma.\n\nYou've been perfecting the right costume for a long time, since it's your calling card as a hero. Knowing this, you've chosen a color scheme that's:\n\n*choice \n\t#All tones of black and metal grey, for intimidation.\n\t\t*set costume_color \"black and grey\"\n\t\t*goto energy_color\n\t#Bright and bold primary colors, to get noticed.\n\t\t*set costume_color \"yellow, red and blue\"\n\t\t*goto energy_color\n\t#Black and bronze, the colors of Millennia City's flag.\n\t\t*set costume_color \"black and bronze\"\n\t\t*goto energy_color\n\t#Blue and gold, the colors of my favorite hero, Rebellion.\n\t\t*set costume_color \"blue and gold\"\n\t\t*goto energy_color\n\t#Red and silver, the colors of my parents' Sound and Fury costumes.\n\t\t*set costume_color \"red and silver\"\n\t\t*goto energy_color\n\n*label energy_color\nEvery time you put on your costume, you can't wait to use your Powers.\n\nSo you snap your fingers, generating a small pop of energy (which also happens to be your favorite color):\n\n*choice\n\t#Pink.\n\t\t*set energycolor \"pink\"\n\t\t*goto upgrade\n\t#Blue.\n\t\t*set energycolor \"blue\"\n\t\t*goto upgrade\n\t#Black.\n\t\t*set energycolor \"black\"\n\t\t*goto upgrade\n\t#Yellow. \n\t\t*set energycolor \"yellow\"\n\t\t*goto upgrade\n\t#White.\n\t\t*set energycolor \"white\"\n\t\t*goto upgrade\n\t#Red.\n\t\t*set energycolor \"red\"\n\t\t*goto upgrade\n\t#Create my own color.\n\t\t*input_text energycolor\n\t\t*goto upgrade\n\n*label upgrade\nAs the pop of ${energycolor} energy fades, you look over your costume in the mirror. Knowing that style without substance means very little, you've also chosen design features that amplify your Powers.\n\nTruth be told, you'd have been able to afford your hero license way sooner if you hadn't spent so much money on your most-prized upgrade:\n\n*if (offensive > 50)\n\t*choice\n\t\t#Aerodynamic, rounded curves and small back-wings for maximum speed.\n\t\t\tThis offensive upgrade allows you to fly at normal speeds without lowering your Power Level, an invaluable resource while in the field.\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_wings true\n\t\t\t*goto the_start\n\t\t#A rocket-backpack to channel excess energy and add propulsion to my normal-speed flying.\n\t\t\tThis offensive upgrade allows you to fly at normal speeds without lowering your Power Level, an invaluable resource while in the field.\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*goto the_start\n\t\t#Large, metal wristbands that store energy for blasting.\n\t\t\tThis offensive upgrade allows you to create blasts at half the Power Cost, an invaluable resource while in the field.\n\t\t\t*set energy_blast true\n\t\t\t*set costume_wristbands true\n\t\t\t*goto the_start\n*else\n\t*choice\n\t\t#Parachute panels for maximum maneuverability.\n\t\t\tThis defensive upgrade allows you to fly at normal speeds without lowering your Power Level, an invaluable resource while in the field.\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_parachute true\n\t\t\t*goto the_start\n\t\t#A rocket-backpack to channel excess energy and add propulsion to my flying.\n\t\t\tThis defensive upgrade allows you to fly at normal speeds without lowering your Power Level, an invaluable resource while in the field.\n\t\t\t*set fly_upgrade true\n\t\t\t*set costume_rocket true\n\t\t\t*goto the_start\n\t\t#Thin tubes throughout my costume that collect and channel excess energy for shielding purposes. \n\t\t\tThis defensive upgrade allows you to generate shields at half the Power Cost, an invaluable resource while in the field.\n\t\t\t*set energy_shield true\n\t\t\t*set costume_tubes true\n\t\t\t*goto the_start\n\n*label the_start\n*page_break\n\nAs you, ${codename}, stand there in your perfect costume and with all of your intentions set, you realize that you're finally ready to start your hero career.\n\nBut becoming a legendary hero means more to you than just fulfilling your own dreams—it's also about redeeming the ${familyname} name. You have one ultimate goal: to become an A-list hero and reveal to Millennia City that you are actually The Sound and The Fury's child.\n\nYou know that achieving this level of success is the only way to restore honor to your parents and redeem your family's legacy in the hero world.\n\nAnd because it's so important to your end goal, one central question constantly plagues you: In your rise to become a Legend, is it more important to focus on achieving fame or upholding justice?\n\n*choice\n\t#I'll need everyone to know my name to get to the top. I don't care what they're saying as long as they're talking about me.\n\t\t*set fame %+30\n\t\t*if tellanimom\n\t\t\tTelling that mother your name earlier tonight was just the beginning—your first priority will always be to get your name out there, to gain notoriety.\n\t\t\t*goto closet\n\t\t*else\n\t\t\t*goto closet\n\t#Having people know who I am is always going to help, but only if my reputation as a hero is worthwhile. \n\t\t*set fame %+15\n\t\t*goto closet\n\t#It's vital that I uphold justice first and foremost but that doesn't mean I can't smile for the press once a mission is accomplished.\n\t\t*set fame %-15\n\t\t*goto closet\n\t#Always doing the right thing will make me a hero worthy of Legend. I'll get to the top by never compromising my commitment to justice. \n\t\t*set fame %-30\n\t\t*if tellanimom\n\t\t\t*goto closet\n\t\t*else\n\t\t\tNot telling that mother your name earlier tonight was just the beginning—your first priority will always be to uphold justice. If you do that, the fame will come on its own.\n\t\t\t*goto closet\n\n*label closet\n\nFor having the courage to begin your hero rise, your Legend has already increased. Your Legend Level is the most important meter for gauging your success in the hero world and is affected not only by the decisions you make, but also by any fluctuations in your public image. Rebellion's Legend is the highest on record—an astounding 100—so that's your ultimate goal.\n\n*set legend +1\n\nYour Legend Level is tracked on your hero license. You flip it over and see you've got a long way to go since your current Legend is a lowly ${legend}.\n\n*if fly_home\n\t*goto chip_selection\n*else\n\tOf course, this plastic version of your license is simply a keepsake—your official license has already been scanned and uploaded into your MeChip.\n\t*goto congrats\n\n*label chip_selection\n*page_break\nYou sigh and place the license on your desk since this plastic version is only a keepsake. The official version of your license has already been scanned and uploaded into your MeChip, a bit of personal tablet technology embedded in the underside of your wrist.\n\nNot too long ago, people used paper slips to pay for things and little, plastic devices as phones, but that was before all communication, identification, entertainment, and banking functions became standard in MeChips. \n\nEach MeChip comes fully customizable, with robotic personality programming that adapts to your habits and desires. There are three standard templates available for the robotic personality, so you decided to go with the:\n\n*choice\n\t#Polite Butler.\n\t\t*set chip_butler true\n\t\t*set chipze \"he\"\n\t\t*set chiphir \"him\"\n\t\t*set chiphis \"his\"\n\t\tYou then decided to name your MeChip Butler:\n\t\t*choice\n\t\t\t#Whedon.\n\t\t\t\t*set chipname \"Whedon\"\n\t\t\t\t*goto butler\n\t\t\t#Abrams.\n\t\t\t\t*set chipname \"Abrams\"\n\t\t\t\t*goto butler\n\t\t\t#Nolan.\n\t\t\t\t*set chipname \"Nolan\"\n\t\t\t\t*goto butler\n\t\t\t#Vaughan.\n\t\t\t\t*set chipname \"Vaughan\"\n\t\t\t\t*goto butler\n\t\t\t#Moore.\n\t\t\t\t*set chipname \"Moore\"\n\t\t\t\t*goto butler\n\t\t\t#Berlanti.\n\t\t\t\t*set chipname \"Berlanti\"\n\t\t\t\t*goto butler\n\t\t\t#Create your own name.\n\t\t\t\t*input_text chipname\n\t\t\t\t*goto butler\n\t#Sassy Diva.\n\t\t*set chip_diva true\n\t\tYou then decided to name your MeChip Diva:\n\t\t*choice\n\t\t\t#Aretha.\n\t\t\t\t*set chipname \"Aretha\"\n\t\t\t\t*goto diva\n\t\t\t#Whitney.\n\t\t\t\t*set chipname \"Whitney\"\n\t\t\t\t*goto diva\n\t\t\t#Halleloo.\n\t\t\t\t*set chipname \"Halleloo\"\n\t\t\t\t*goto diva\n\t\t\t#LaClarkson.\n\t\t\t\t*set chipname \"LaClarkson\"\n\t\t\t\t*goto diva\n\t\t\t#Create your own name.\n\t\t\t\t*input_text chipname\n\t\t\t\t*goto diva\n\t#Supportive Caretaker.\n\t\t*set chip_care true\n\t\tYou then decided to name your MeChip Caretaker:\n\t\t*choice\n\t\t\t#Bertha.\n\t\t\t\t*set chipname \"Bertha\"\n\t\t\t\t*goto care\n\t\t\t#Alice.\n\t\t\t\t*set chipname \"Alice\"\n\t\t\t\t*goto care\n\t\t\t#Poppy.\n\t\t\t\t*set chipname \"Poppy\"\n\t\t\t\t*goto care\n\t\t\t#Fernan.\n\t\t\t\t*set chipname \"Fernan\"\n\t\t\t\t*goto care\n\t\t\t#Create your own name.\n\t\t\t\t*input_text chipname\n\t\t\t\t*goto care\n\n*label butler\n\"Warmest regards on your license, ${sir_mad},\" MeChip ${chipname} says inside your head, with a slight British accent.\n\nAll MeChip functions are connected directly to your senses, so ${chipname} floats in front of your eyes thanks to holographic imaging wired to your retinas. Only you are able to see MeChip ${chipname}, who appears as a slender gentleman wearing a full tuxedo.\n\n\"Best of luck on launching your career.\"\n*goto grandma_enter\n\n*label diva\n\"Kudos on the license, sugar,\" MeChip ${chipname} says inside your head, sounding snappy.\n\nAll MeChip functions are connected directly to your senses, so ${chipname} floats in front of your eyes thanks to holographic imaging wired to your retinas. Only you are able to see MeChip ${chipname}, who appears as a drag queen wearing roller skates.\n\n\"You best work that career, honey!\"\n*goto grandma_enter\n\n*label care\n\"Congratulations on your license, sweetheart,\" MeChip ${chipname} says inside your head in a soothing voice.\n\nAll MeChip functions are connected directly to your senses, so ${chipname} floats in front of your eyes thanks to holographic imaging wired to your retinas. Only you are able to see MeChip ${chipname}, who appears as a girthy woman wearing an apron.\n\n\"I just know you're going to be the best hero ever!\"\n*goto grandma_enter\n\n*label congrats\n\n*if chip_butler\n\t\"Warmest regards on your license, ${sir_mad},\" MeChip ${chipname} says, appearing in front of you once again. \"Best of luck on launching your career.\"\n\t*goto grandma_enter\n*elseif chip_diva\n\t\"Kudos on the license, sugar,\" MeChip ${chipname} says, appearing in front of you once again. \"You best work that career, honey!\"\n\t*goto grandma_enter\n*else\n\t\"Congratulations on your license, sweetheart,\" MeChip ${chipname} says, appearing in front of you once again. \"I just know you're going to be the best hero ever!\"\n\t*goto grandma_enter\n\n*label grandma_enter\n\n\"Thanks, ${chipname},\" you say, smiling.\n\n*page_break\n\nYou then take a moment to check your Hero Statistics by clicking on the \"Show Stats\" button located on the top of this screen.\n\nThe choices you make throughout your career will be reflected in the Statistics and Levels listed here. You also know that, in turn, these Stats and Levels will significantly affect the course of your hero career.\n\nThe choices you make will have very real consequences, so be sure to choose wisely!\n\n*page_break\n\n\"${chipname},\" you say, \"Move the 'Show Stats' button to my homescreen and…\"\n\n\"You all look insane, talking to those electronic voices in your heads,\" Grandma says from the doorway. \"That's why I simply refuse to have one of those machines implanted in me. It just doesn't seem right.\"\n\n\"I know how you feel about MeChips, Gran,\" you say, turning towards her. \"And it's annoying because now that they've done away with landlines and cell phones, there's no way of getting in touch with you.\"\n\n\"Which is precisely how I like it,\" Grandma says. \"But look at you! A born ${familyname} hero.\"\n\n\"Well, this born hero had better get out there,\" you say, shaking off your nerves. \"This career isn't going to start itself.\"\n\n\"Wait, before you go…\" \n\nGrandma walks toward you and you see that she holds an envelope in her hands. Your stomach drops.\n\n*page_break\n\n\"It's such a big day,\" Grandma says, her eyes on the floor. \"They'd want to be here so badly….\" \n\nYour jaw goes tight—you know exactly what Grandma wants you to do.\n\nWhile The Devoid may not allow its prisoners to have any visitors, it does permit them to receive letters. So for years you wrote to your parents, telling them everything about your life. You thought writing those letters would make you feel better but it only made you feel worse. \n\nBecause The Devoid doesn't allow its prisoners to write any letters back.\n\n\"It's been years since you've written anything….\"\n\nGrandma looks up at you and your heart feels like it might break.\n\n*page_break\n\n\"I'm sorry,\" you say, \"but you know how I feel about this, Gran.\"\n\nYou don't write letters to your parents anymore because:\n\n*choice\n\t#It's too painful.\n\t\t*gosub delay\n\t\tNot writing letters to your parents proves just as difficult as actually writing them, so it's a task you try to avoid thinking about entirely. Grandma knows this so she doesn't press the issue.\n\t\t*goto sendoff\n\t#I'm angry that my parents had to abandon me.\n\t\t*gosub delay\n\t\tYou spent years hoping that your parents would somehow find a way back to you, but after all that wasted effort you finally accepted the truth: no one ever escapes a life sentence in The Devoid.\n\n\t\tYour parents always found a way to beat the odds in the past but this time they failed you. \n\t\t*goto sendoff\n\t#I need to learn how to live without them.\n\t\t*gosub delay\n\t\tYou spent years hoping that your parents would somehow find a way back to you, but after all that wasted effort you finally accepted the truth: no one ever escapes a life sentence in The Devoid.\n\n\t\tSo what's the point of writing?\n\t\t*goto sendoff\n\t#I don't know what to say.\n\t\t*gosub delay\n\t\tYou spent years hoping that your parents would somehow find a way back to you, but after all that wasted effort you finally accepted the truth: no one ever escapes a life sentence in The Devoid.\n\n\t\tIt's like writing letters to ghosts—after a while, what's the point?\n\t\t*goto sendoff\n\n*label sendoff\n\n\"All right, ${firstname},\" Grandma says, fighting to keep her face even. \"Now listen to me, please be careful out there. Lord knows I won't be able to sleep until you're home.\"\n\n\"I will, Gran. I promise.\"\n\n\"Then off you go,\" she says, drumming up a smile. \"And do try to kick some butt, yes?\"\n\n*page_break\n\nReady to go, you step up on your window's fourteenth-story ledge and look out over the grandeur of Millennia City. One of the advantages of living in the Eastern Fringes is the spectacular view of MC's iconic skyline. You take a deep breath, letting the energy of the city run through you.\n\nStanding on this precipice, you can't help but wonder what kind of hero you will become. And will you be able to survive long enough to achieve the Legend status you crave?\n\nThe choice is up to you, you think to yourself…right before you jump off the ledge.\n\n\n*finish Next Chapter: The Lower Case\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return", "screenshots": "*comment é\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*set met_family true\n*set met_victon true\n*set met_sk true\n*set met_bm true\n*set met_mg true\n\n*set Codename \"Maneuver\"\n*set Fame 67\n*set lawless 40\n*set offensive 26\n*set Soloist 15\n*set Power 69\n*set Health  30\n*set Money 669\n*set Legend  28\n*set rlshp_family 90\n*set rlshp_victon 19\n*set rlshp_sk 68\n*set rlshp_bm 76\n*set rlshp_mg 88\n\n*script changeBackgroundColor(\"sepia\")\n\n\"I wanted to thank you for saving my life,\" Black Magic continues, drawing her finger across your arm. \"What do you think about that?\"\n\n*fake_choice\n  #Push Black Magic onto the bed.\n  #Let Black Magic take the lead.\n  #Flirt back.\n  #Back away—nothing is going to happen here.\n\n*script changeBackgroundColor(\"black\")\n*set Codename \"Conduit\"\n*set Fame 43\n*set lawless 57\n*set offensive 35\n*set Soloist 88\n*set Power 72\n*set Health  80\n*set Money 826\n*set Legend  35\n*set rlshp_family 90\n*set rlshp_victon 24\n*set rlshp_sk 73\n*set rlshp_bm 64\n*set rlshp_mg 46\n\nYou've been training for this your entire life. So what are you going to do?\n\n*fake_choice\n  #Jump in right away and stop the killing. It doesn't matter who gets The Gravitas—saving lives is more important than anything.\n  #Your only concern here is The Gravitas. Make a grab for it and go!\n  #Wait for them all to kill each other off, then take The Gravitas by surprise from whoever is left standing.\n  #Stay put and wait for the police to arrive—this is way too much for you and you know it.\n\n*script changeBackgroundColor(\"sepia\")\n*set Codename \"Rage\"\n*set Fame 73\n*set lawless 66\n*set offensive 71\n*set Soloist 44\n*set Power 89\n*set Health  86\n*set Money 1240\n*set Legend  38\n*set rlshp_family 74\n*set rlshp_victon 11\n*set rlshp_sk 79\n*set rlshp_bm 67\n*set rlshp_mg 70\n\n\"Have you made a decision yet about the sidekick-mentoring project?\"\n*fake_choice \n  #Sparrow: a 16-year-old orphan from the Eastern Fringes who has the appearance and abilities of a typical bird. She won't have many heroic opportunities within her reach.\n  #Pressie: a 14-year-old, four-foot tall, gnomish-looking boy. He believes his power to manipulate the earth comes from his \"magical\" peg-leg.\n  #Tarana Rain: a 15-year old girl who has the power to generate and manipulate water. She goes to a ritzy Rein Hill Powered private school and comes from a wealthy family–one that owns the Millennial Orbit, MC's best-selling newsblog.\n\n*set Codename \"Synergy\"\n*set Fame 36\n*set lawless 59\n*set offensive 61\n*set Soloist 89\n*set Power 42\n*set Health  51\n*set Money 1645\n*set Legend  51\n*set rlshp_family 88\n*set rlshp_victon 8\n*set rlshp_sk 66\n*set rlshp_bm 58\n*set rlshp_mg 90\n\n\nYou dodge the tentacle arm just in time, leaping back onto the nearest roof and catching a glimpse of your attackers: four robotic creatures that remind you of automatic pool sweepers. They have sleek, globular cores that host a swinging tentacle, which is armed with a blade-tip and energy cannons.\n\nAfter you evade the pool-killers, they zero in on Black Magic. You know ${bmze} is still weak from the Thought Swap, so what's your plan of attack?\n\n*fake_choice\n  #Work with Black Magic to take out the pool-killers.\n  #End this battle on your own with one powerful blast. (Power Cost 15)\n  #Take the Telelock from Black Magic and make a run for it.\n\nPERFECT LEGEND GUIDE\n\nChapter Two: Automatic start increase. (Plus 1: 1)\n\nChapter Three: Do not choose to patrol the streets. (Avoid Decrease)\n*line_break\nChapter Three: Choose the correct fingertip color first--make sure to pay attention to the fingertip description, as the color changes. (Plus 3: 4)\n\nChapter Four: Automatic press boost. (Plus 5: 9)\n\nChapter Five: Do not choose to stay put and wait for the police in the Gravitas battle. (Plus 1: 10)\n*line_break\nChapter Five: Do not die--make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\nChapter Six: Automatic bad press decrease. (Minus 5: 5)\n*line_break\nChapter Six: Choose the positive outlook when reflecting on your first heroic night. (Plus 1: 6)\n*line_break\nChapter Six: Choose Prodigal as your biggest threat. (Plus 1: 7)\n*line_break\nChapter Six: (Optional Tip) Whenever possible, purchase bonus Power Upgrades--this will help you conserve Power in battles for extra Legend boosts.\n\nChapter Seven: Automatic mission reward. (Plus 2: 9)\n\nChapter Eight: (Optional Tip) When speaking with Jenny, choose to go over her materials and then choose a fighting tip. This Power increase will help you in Chapter Eleven. \n\nChapter Nine: Choose wisely when handling the police--talk to the police if Officer Sanders is a contact OR flee if you've been lawless. (Plus 2: 11)\n\nChapter Ten: Reward for ideals & decision consistency--have a Solo stat greater than 60 OR a Team Player stat less than 40 when choosing how to interact with the Millennial Group. (Plus 3: 14)\n*line_break\nChapter Ten: Automatic Millennial Group boost. (Plus 5: 19)\n\nChapter Eleven: Finish mission with Power and Health both greater than 40. (Plus 10: 29)\n*line_break\nChapter Eleven: Do not die--make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\nChapter Twelve: Automatic press boost. (Plus 10: 39)\n*line_break\nChapter Twelve: Ask Grandma what on earth she was thinking inviting your sidekick over--do not trust your sidekick whenever possible. (Plus 1: 40)\n\nChapter Fourteen: Choose to think that Prodigal has it out for you. (Plus 1: 41)\n\nChapter Fifteen: Tell Grandma you really don't trust your sidekick at all. (Plus 1: 42)\n\nChapter Sixteen: Reward for ideals & decision consistency--have a Fame stat greater than 85 OR a Justice stat less than 15 when choosing to save Sonja or your sidekick. (Plus 5: 47)\n\nChapter Seventeen: When making the phone call for backup, be sure to choose a contact you have a positive relationship with OR if a Solo player, call no one. (Plus 5: 52)\n\nChapter Nineteen: Choose to fight Prodigal close range. (Plus 3: 55)\n*line_break\nChapter Nineteen: Reward for ideals & decision consistency--have a Lawless stat greater than 85 OR a Lawful stat less than 15 when choosing to kill or spare Prodigal. (Plus 5: 60)\n*line_break\nChapter Nineteen: Do not die--make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\nChapter Twenty: If you have an above-average Legend Level at this point, you won't cause any Fringe deaths. (Plus 10: 70).\n\nGeneral Tip: In Heroes Rise, you are rewarded for sticking to your ideals. If looking for a high Legend Level, make sure to remain consistent once you decide on either Lawless/Lawful, Solo/Team Player, Fame/Justice, and other heroic traits.\n\n*goto timetoend\n\n*label timetoend\n*page_break The End\n\n*stat_chart\n  text Codename\n  opposed_pair Fame\n    Justice\n  opposed_pair Lawless  \n    Lawful\n  opposed_pair Offensive\n    Defensive\n  opposed_pair Soloist\n    Team Player\n  text Power\n  text Health\n  text Money\n  text Legend\n\nYour relationships:\n\n*stat_chart\n  percent rlshp_family Family\n  percent rlshp_victon Victon\n  percent rlshp_sk Sidekick\n  percent rlshp_bm Black Magic\n  percent rlshp_mg Millenial Group\n\n*page_break OK", "silvered": "\n*comment é\n\n*text_image part_three.png center Part Three: Fallout\n\n*text_image chap_15.png center Chapter 15: Silvered\n\nYou wake up the next day with a pounding headache. So much has happened, you don't even know where to begin sorting through it all.\n\n*if bmnoromance\n\t*goto callnobm\n*else\n\t*goto callfrombm\n\n*label callnobm\n*if chip_butler\n\t\"Time to rise, ${sir_mad},\" MeChip ${chipname} says. \"Much to do today. Also, you have a MeMessage from Sonja waiting.\"\n\n\tRolling over, you open the MeMessage:\n\t*goto sonja_message\n*elseif chip_diva\n\t\"Rise and shine, sugarplum,\" MeChip ${chipname} says, appearing this morning in a romper. \"Today is the big day! I'm finally going to be a star! Oh, and you've got a MeMessage from Sonja waiting.\"\n\n\tRolling over, you open the MeMessage:\n\t*goto sonja_message\n*else\n\t\"Up and at 'em, dear,\" MeChip ${chipname} says, appearing this morning in a plush sweatsuit. \"We've much to do today. Also, you have a MeMessage from Sonja waiting.\"\n\n\tRolling over, you open the MeMessage:\n\t*goto sonja_message\n\n*label callfrombm\n*if chip_butler\n\t\"Time to rise, ${sir_mad},\" MeChip ${chipname} says, appearing this morning in a Haus of Kolson suit. \"Much to do today. Also, you have four MeMessages waiting. I do think you should find the time to call back Black Magic, after all ${bmze} has done for us….\"\n\n\tIgnoring ${chipname}'s helpful suggestion and scrolling over the three MeMessages from Black Magic, you open a MeMessage from Sonja instead:\n\t*goto sonja_message\n*elseif chip_diva\n\t\"Rise and shine, sugarplum,\" MeChip ${chipname} says, appearing this morning in a Haus of Kolson romper. \"Today is the big day! I'm finally going to be a star! Oh, and you've got four new MeMessages waiting. You really should call that delicious bit of Magic back….\"\n\n\tIgnoring ${chipname}'s helpful suggestion and scrolling over the three MeMessages from Black Magic, you open a MeMessage from Sonja instead:\n\t*goto sonja_message\n*else\n\t\"Up and at 'em, dear,\" MeChip ${chipname} says, appearing this morning in a plush sweatsuit. \"We've much to do today. Also, you have four MeMessages waiting. Now why do you keep ignoring that precious little Black Magic? You don't want to seem ungrateful, do you?\"\n\n\tIgnoring ${chipname}'s helpful suggestion and scrolling over the three MeMessages from Black Magic, you open a MeMessage from Sonja instead:\n\t*goto sonja_message\n\n*label sonja_message\n\n\"${codename}, don't forget that tonight you need to come in through the maintenance entrance. No one can think you're special…at least not yet.\"\n\n*page_break\n\nEvery two years there's a big HoT party to announce the honored hero and publish the accompanying article. As it turns out, that big party is tonight—Sonja neglected to mention that the HoT Board actually chose a different hero to receive this year's award, but they had to switch to their alternate choice when the hero's legs were tragically broken two days ago.\n\nYou and Sonja were the runners-up, which is why you only found out about the party yesterday. Of course, the late notice doesn't help you feel any less overwhelmed….\n\nYou're also rather exhausted because you stayed up most of the night reading and rereading Sonja's HoT profile. The beautifully written article recounts everything you've done since your very first night on the Trackr case, all the way up through your recent dealings with Jury. It paints you as a flawed-yet-promising hero and only hints at your heroic family legacy, creating a healthy dose of mystery. \n\nEvery prior recipient of the HoT grant has been catapulted into superstardom, so you can't even fathom what's going to happen to your career after tonight. And out of all of the perks of the HoT award, you're most excited about:\n\n*choice\n\t#The $100,000 cash prize that's attached.\n\t\tThe money is intended to help the amateur recipient launch their career—something it will definitely do for you. With that kind of money, you won't have to worry about paychecks for a very long time. You'll probably be sitting pretty to receive some high-end endorsement deals, as well.\n\n\t\tMaybe you could even think about moving Grandma out of the Fringes and into a nicer neighborhood….\n\t\t*goto priorities\n\t#The credibility to do the kind of heroing work I've always dreamed of doing.\n\t\tNo one will block you from the good cases or the really dangerous villains now—you'll have access to all of the finest heroic opportunities. It might even be time to start thinking about signing with a hero agent—many will be pursuing you after tonight, anyway.\n\t\t*set fame %-15\n\t\t*goto priorities\n\t#The overnight celebrity that comes with the award.\n\t\tYou're going to become an instant celebrity in Millennia City, which will go a long way toward eventually launching a national career. You'll probably be sitting pretty to receive some high-end endorsement deals, as well. It might even be time to start thinking about signing with a hero agent—many will be pursuing you after tonight, anyway.\n\t\t*set fame %+15\n\t\t*goto priorities\n\t#The glamorous party thrown in my honor.\n\t\tAll of MC's finest will be in attendance and you can't wait to see the looks on their faces when you, a lowly hero from the Fringes, are named MC's Hero of Tomorrow.\n\t\t*goto priorities\n\t#I'm not excited—I'm angry about being a last-minute replacement.\n\t\tYou know you're second to no one in this city, so why didn't the HoT Board see that to begin with? They should be the ones honored that you're accepting their award, that's for sure.\n\t\t*goto priorities\n\n*label priorities\n\nYou know you should be focusing on finding Prodigal, sorting things out with Black Magic and the MG, or dealing with the Victons, but after all you've been through, you think you deserve at least one day off to enjoy this big break.\n\nYou bet days filled with this much success will only come along once in a while, so you'd better soak this up while it lasts. \n\nAnd right now, you just can't wait to tell Grandma the big news.\n\n*page_break\n\n\"Well, look who's finally up,\" Grandma says as you enter the living room. She sits on the couch, reading an old gardening magazine (one that's actually printed on paper—how retro). \n\n\"Grandma, I have some news for you.\"\n\n\"Jenny called to tell me all about what happened last night,\" Grandma sighs. \"From the sound of it, you could use all the help you can get. You should dress before ${sidekick} gets here.\"\n\n\"And why did you invite ${sidekick} here without asking me first?\" you say, barely able to hide the impatience in your voice. The last thing you want to do is fight with Grandma right now, but this whole sidekick thing is getting rather annoying.\n\n\"${sidekick} worships you, whether you know it or not. And you have a lot going on right now, so let ${skhir} help you. It's good for you both. You know, ${firstname}, it shouldn't be that-\"\n\n*choice\n\t#\"I have something else to do tonight, Gran.\"\n\t\t*goto nonsense\n\t#\"That's not important right now.\"\n\t\t*goto nonsense\n\t#\"${sidekick} can come another day.\"\n\t\t*goto nonsense\n\t#\"I really need to tell you something.\"\n\t\t*goto nonsense\n\t#\"I really don't trust ${sidekick} at all.\"\n\t\t*set legend +1\n\t\tGrandma just stares at you—she won't even entertain that thought with a response.\n\n\t\t\"Whatever,\" you start, \"I still can't see ${sidekick} today.\"\n\t\t*goto nonsense\n\n*label nonsense\n\n\"Nonsense,\" Grandma says, \"what's more important than finding Prodigal right now?\"\n\nAs Grandma speaks, De Milo snaps menacingly from her pot next to the couch. Grandma's plants tend to match her mood, most days….\n\n\"Well, I guess being named Millennia City's Hero of Tomorrow isn't all that important, is it?\" you nearly shout.\n\nYou certainly didn't want to deliver the news like that but Grandma does know how to work your last nerve sometimes….\n\nAll of your anger washes away, though, as Grandma stares up at you, her bottom lip beginning to quiver.\n\n\"You…what?\"\n\n\"The Board chose me last-minute, so I just found out. The party is tonight,\" you say, calming yourself. \"Grandma, I'm sorry, I didn't mean to shout.\"\n\n\"${firstname},\" Grandma starts in a hushed voice,\n*if male\n\t\"your father dreamed of being named the Hero of Tomorrow when he was your age, but it never happened for him. If only he could see you now…\" \n\t*goto youknow\n*else\n\t\"your mother dreamed of being named the Hero of Tomorrow when she was your age, but it never happened for her. If only she could see you now…\"\n\t*goto youknow\n\n*label youknow\n\nThis is the one thought you've forced out of your mind from the moment you found out about the HoT grant. You have dreamed of delivering your HoT acceptance speech since you were a little kid, rehearsing it over and over to perfect the dramatic pauses and heartfelt tears.\n\nBut you never, ever imagined your parents wouldn't be there to hear you deliver it….\n\n*page_break\n\n\"I always hoped you'd follow in their footsteps, someday,\" Grandma says. \"It's just, after all that has happened, I was afraid…\"\n\n\"I know,\" you mumble.\n\n\"Wait right here,\" Grandma says, dabbing her eyes, \"I have something I need to give you.\"\n\nAs Grandma heads for her bedroom, you take a deep breath. All you can feel is…\n\n*choice\n\t#Excited.\n\t\tIt doesn't matter what the circumstances are, your dreams are actually starting to come true, against all the odds. And that's because you made the right choices to get you here today.\n\t\t*goto ghelp\n\t#Proud.\n\t\tIt doesn't matter what the circumstances are, your dreams are actually starting to come true, against all the odds. And that's because you made the right choices to get you here today.\n\t\t*goto ghelp\t\t\n\t#Sad.\n\t\tThis is such a happy day…but you still wish your parents were here to share it with you.\n\t\t*goto ghelp\n\t#Bittersweet. \n\t\tYour big dreams are actually starting to come true, against all the odds. This is such a happy day…you just wish your parents were here to share it with you.\n\t\t*goto ghelp\n\n*label ghelp\n\n\"${firstname},\" you hear Grandma call from inside, \"can you come in here and help me with something?\"\n\nYou enter Grandma's bedroom to find her staring up at her closet, hands on her hips. \n\n\"Can you grab that box for me? I can't reach it,\" she says. \"I'd have Brill snatch it down for me, but she's busy photosynthesizing at the moment. No peeking, now!\" \n\n\"Sure,\" you say, walking up to the closet and wondering what else Grandma could possibly have to give you. You reach up and pull down the small, wooden box but as you do, a stack of papers underneath it slides off the shelf.\n\n\"Whoops,\" you say, reaching down to pick up the stack.\n\n\"Oh, wait. I'll get that!\" Grandma starts but it's too late. You've already seen the envelope on top, addressed to your parents at The Devoid…\n\nWith a return address in your name. You stare down at the the envelope, your heartbeat picking up its pace.\n\n\"Gran, what's this?\"\n\n*page_break\n\n\"It's nothing. Here, I'll take it,\" Grandma says, snatching at the letter. \n\nBut you pull it away from her and rip open the envelope. \n\n\"${firstname}, please don't! You can't…\"\n\nBut Grandma stops speaking as you pull out a handwritten letter, marked with yesterday's date…\n\nAnd written by you. \n\n*page_break\n\n\"Oh no,\" Grandma whispers.\n\nYour hands go numb as you read the first line: \"Mom and Dad, quite a bit has happened since last month's letter. I have so much to fill you in on my career. Just last night I…\"\n\nYou stop yourself, letting the letter fall to the floor.\n\n\"How long?\" you ask.\n\n\"${firstname}, let me explain, please-\"\n\n\"Grandma, how long have you been forging letters from me to Mom and Dad?\"\n\nEven as the words leave your lips, they don't sound real. How could Grandma do this, how could she…violate you this way?\n\n\"Uh, am I interrupting something?\" a voice says from the doorway. You turn to find ${sidekick} standing there, looking from you to Grandma warily. \"The door was open so I just…\"\n\n\"Oh, dear, it's fine,\" Grandma starts, \"but perhaps it would be better if-\"\n\n\"No,\" you say, \"you want ${sidekick} to be a part of my life so badly, then ${skze} can hear this!\" \n\n\"${firstname}, please, you have to understand-\"\n\n*choice\n\t#\"I don't have to understand anything, Gran! I will NEVER forgive you for betraying my trust this way!\"\n\t\t*set rlshp_family %-20\n\t\t*set moralbonus false\n\t\t*goto exit\n\t#\"You had no right to do this! No right!\"\n\t\t*set rlshp_family %-15\n\t\t*goto exit\n\t#\"You never respect my decisions. I'm not a child anymore!\"\n\t\t*set rlshp_family %-10\n\t\t*goto exit\n\t#\"I…don't want to say anything I'll regret.\"\n\t\t*set rlshp_family %-5\n\t\t*set badassbonus false\n\t\t*goto exit\n\n*label exit\nGrandma just hugs herself, unable to look at you.\n\n\"I should go…\" ${sidekick} says, creeping backward.\n\n\"I'll walk you home,\" Grandma whispers, walking toward the door.\n\nYou know you should say something to make Grandma stay. You know you should talk to her about this, today of all days. \n\nSo why do you let Grandma leave without another word?\n\n*choice\n\t#I'm too angry to think.\n\t\t*goto joyride\n\t#I'm afraid of what I'll say if she stays.\n\t\t*goto joyride\n\t#I don't know.\n\t\t*goto joyride\n\n*label joyride\nGrandma has seriously crossed the line here…and you just need some time to think.\n\n*page_break Hours Later\n\nYou look out over the Millennia City skyline racing below you—the gleaming glass and brick, the steam rising from the pavement, the people teeming through the streets, the buildings lining the blocks like puzzle cutouts. A tram pulls across the distance, lighting up the sunset with photographic flashes.\n\nThe constant motion of it all, the dizzying energy somehow always manages to calm you down.\n\nAfter what happened with Grandma, you just needed to clear your head. And there's one thing that always helps you do that: a good fly-ride.\n\nYou've been cruising around for hours and you think you should feel lots of things, but right now all of the emotions competing in your brain threaten to overwhelm you. So you just fly.\n\nYou hurtle through the sky and take a deep breath of cold air, the wind rushing against your skin. There's nothing like the feeling of soaring through the air, with nothing and no one in your way. You're in absolute control, yet totally wild at the same time. \n\n*page_break\n\nEven though you'd love to cruise around the city all night, you really need to head home and get ready for the HoT party.\n\nSo you fly back toward the Fringes, ignoring the now-doubled number of messages on your MeChip (and ${chipname}'s constant requests for you to reconcile with Black Magic and Grandma both). After ${chiphis} third time chiming in, you threatened to turn ${chipname}'s conversation function off—shouldn't your MeChip be on your side?\n\nIt doesn't really matter though, since you've already decided what to do when you get home. When you see Grandma, you plan to:\n\n*choice\n\t#Apologize to her.\n\t\tNo matter what she has done, Grandma only means well….\n\t\t*set rlshp_family %+10\n\t\t*goto return\n\t#Ignore her.\n\t\tGrandma may be your only family…but that just makes the betrayal all the worse.\n\t\t*set rlshp_family %-20\n\t\t*goto return\n\t#Wait for her to apologize to me.\n\t\tWhat Grandma did was wrong. She needs to acknowledge that if you're ever going to feel all right about this….\n\t\t*goto return\n\n*label return\n\nBut when you get back, you find that the apartment is empty.\n\nGrandma hasn't come back all day and the letter still sits on the floor in her bedroom. You stare at it for a long time, wondering how many just like it have been read by your parents, how many more line the walls of their cells right now….\n\nYou force that thought from your mind as you spot the box that Grandma meant to give you earlier, before everything went wrong. Unable to help yourself, you walk over to the box and crack it open.\n\nAnd your stomach tangles into a knot.\n\n*page_break\n\nInside is a red-and-silver ring, one that you immediately recognize as your \n*if male\n\tfather's\n\t*goto band\n*else\n\tmother's\n\t*goto band\n\n*label band\nwedding band. \n\nThe ring has two intertwined strands, one red and one silver…your parents' heroic colors (or \"silvered,\" as they'd fondly call it). You tilt the ring up to look inside, knowing there are also lyrics from your parents' wedding song engraved there:\n\n*fake_choice\n\t#\"For Once In My Life.\"\n\t\t*set ring_lyric \"For Once In My Life\"\n\t#\"At Last.\"\n\t\t*set ring_lyric \"At Last\"\n\t#\"I'll Be There.\"\n\t\t*set ring_lyric \"I'll Be There\"\n\t#\"Someone Like You.\"\n\t\t*set ring_lyric \"Someone Like You\"\n\t#\"My Heart Will Go On.\"\n\t\t*set ring_lyric \"My Heart Will Go On\"\n\t#\"You Love Me.\"\n\t\t*set ring_lyric \"You Love Me\"\n\t#Create your own lyrics.\n\t\tThe important words from your parents' wedding song read:\n\t\t*input_text ring_lyric\n*gosub delay\n\nYou grasp the ring in your hand, squeezing it tightly for a moment. Then you pull off your costume's glove and slide the ring on to your finger.\n\nIt fits perfectly.\n\nThat's also when you notice there's a slip of paper at the bottom of the box. This is too much…you're not sure if you can handle anything more right now.\n\nBut once again, you find you can't help your curiosity. So you pick up the note.\n\n*page_break\n\nAnd a lump immediately forms in your throat as you recognize your mother's handwriting:\n\n\"For ${firstname}, on the day ${youze} becomes a Legend.\"\n\nReading these words, you finally break. Crumpling to the floor, you give in to the heaves that roll through your body.\n\n*finish Next Chapter: Night of Your Life\n\n*label delay\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Heroes Rise: The Prodigy[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2025-06-12 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n*return\n", "sitting_sun": "*comment é\n\n*text_image chap_21.png center Chapter 21: Sitting in the Morning Sun\n\nOnce showered and changed, you sneak up to the roof. You've got to be moving on soon—Jenny found a temporary safe house for you and Grandma to stay in until you find a more permanent place to settle.\n\nBut before you go there, you need a moment alone to clear your head.\n\nAnd nothing helps you do that like taking in the MC skyline, which is currently set against the rising sun. How are you feeling, after everything that has happened over the past few weeks?\n\n*fake_choice\n\t#It's been a rocky road, but I'm farther along than when I started, at the very least. \n\t#I’ve had some ups and downs—heroing is rather bittersweet.\n\t#Despite what Prodigal did to me, this early development in my career is a good sign that I'll just keep rising. \n\t#In all the madness, it's easy to forget why I even became a hero in the first place.\n\nNothing is like you expected it to be—you think back to your naive self just a few short weeks ago and can barely recognize that person. It seems that entering the \"real world\" has only meant having to accept harsh realities, and realizing that hope isn't always enough….\n\nAfter all that has happened, it would be so easy not to trust people, to expect things not to work out for you. Because more often than not, they just don't.\n\nBut you're starting to understand that it takes a very strong person to be able to hold on to hope, to still expect great things even when there's no reason to. You've come a long way but you know you've still got miles left to go to end up where you want to be….\n\nIt may take a lot of hard work and patience but you're never going to stop.\n\n*page_break \n\nOnce thing's for sure, though, you've definitely arrived in Millennia City. By the time the sun finishes rising, everyone in this city is going to know your name.\n\nBut how the public perceives you will be entirely based on your Legend Level.\n\n\"${chipname},\" you think, feeling much better now that you've reconnected with your MeChip, \"check my Legend Level and my status on the Legend Report, please.\"\n\nThe familiar image of MeChip ${chipname} appears in your mind, this time wearing\n*if chip_butler\n\ta pinstriped suit.\n\n\t\"At your service, ${sir_mad},\" he says with a smile. \"Though may I first say, it's rather excellent to be back. I missed you quite a bit while I was gone.\"\n\t*goto report\n*elseif chip_diva\n\ta naughty nun outfit.\n\n\t\"You got it, honeychild,\" she says with a lipstick-coated smile. \"Though I gotsta confess, I missed you like crazypants while I was gone!\"\n\t*goto report\n*else\n\ta floral house dress, much like the one Grandma likes to sleep in.\n\n\t\"Of course, dear,\" she says with a smile, \"though can I just tell you, I missed you greatly while I was gone.\"\n\t*goto report\n\n*label report\n\n*fake_choice\n\t#\"I missed you too, ${chipname}.\"\n\t#\"Just don't go disappearing on me, again.\"\n\t#\"I have quite a bit to fill you in on, ${chipname}.\"\n\nMeChip ${chipname} beams at you before fading under your Legend Level…\n\nWhich has landed at Level ${legend}.\n\nScrolling down, you start to read your Legend Report:\n\n*if (legend >= 50)\n\t*if (legend = 70)\n\t\t*achieve legend\n\t\tCongratulations, ${codename}—you have achieved a perfect Legend Score!\n\n\t\t*page_break \n\n\t\t-- LEGEND PRIZE UNLOCKED --\n\n\t\tAs a reward for your flawless heroic efforts, you have received a Legend Bonus of $50,000. Keep up the good work!\n\t\t*set money +50000\n\t\t*page_break\n\t\t*goto successstory\n\t*else \n\t\tYour Legend has achieved a Level that is above average (you could have ended with a Level as high as 70 or, conversely, in the negatives).\n\t\t*goto successstory\n*elseif (legend \u003c= 49) and (legend >= 30)\n\tYour Legend has reached a Level that is average (you could have ended with a Level as high as 70 or, conversely, in the negatives).\n\n\tAs a result, your reputation is split:\n\t*if (fame > 50)\n\t\thalf of Millennia City seems to think you're a great hero, while the others think you're a total hack.\n\n\t\tSince you've always been focused on fame, you feel good that at least people know your name. Besides, the fact that people have strong opinions of you is always a good sign.\n\n\t\tStill, it would definitely be nicer if your reputation were better….\n\n\t\tAnd if your choices had resulted in a higher Legend Level, perhaps it might have been.\n\t\t*goto career\n\t*else\n\t\thalf of Millennia City's heroic community seems to think you're a great hero, while the others think you're a total hack.\n\n\t\tAs someone who prides their heroic persona on upholding justice, it's a bit difficult that people aren't in agreement about you always doing the right thing. You wish everyone could see your commitment to justice, but you'll have to settle for what you have, for now.\n\n\t\tPerhaps if your choices had resulted in a higher Legend Level, things might have worked out a bit better….\n\t\t*goto career  \n*else\n\tYour Legend has dropped to a Level that is definitively below average, considering your Legend could have risen to be as high as 70 at this point.\n\n\tAs a result, you are hated by anyone in Millennia City who has heard your story.\n\t*if (fame > 50)\n\t\tMC's general public despises you.\n\n\t\tFor someone who has been focused on fame, you should be happy that people are talking about you. But since all of the buzz is about what a terrible, useless hero you are, you can't help but be hurt. You're almost better known as a villain, which is not the goal of someone looking to become a Legendary hero.\n\n\t\tIf you had made better choices, your Legend Level definitely would have been higher…and then maybe people might not hate you so much.\n\t\t*goto career\n\t*else\n\t\tOther heroes see you as a failure and worst of all, MC's public views you as morally corrupt. For someone who has focused on justice, it's devastating to see everyone think of you as some kind of villain. \n\n\t\tIf you had made better choices, your Legend Level definitely would have been higher…and then maybe people might not hate you so much.\n\t\t*goto career\n\n*label successstory\n\nAnd despite all that you've been through, your reputation has managed to hold strong thanks to the choices you have made.\n\n*if (fame > 50)\n\tYou are generally liked by MC's public, who see you as a hard-working underdog with lots of promise. It seems that your fame actually means something, since you've begun to construct a positive image.\n\n\tIt looks like your focus on fame over justice has really paid off….\n\t*goto career\n*else \n\tYou are respected by other heroes, who see you as a hard-working underdog with lots of promise. And MC's public sees you as someone who always does the right thing, no matter what.\n\n\tIt looks like your focus on justice over fame has really paid off….\n\t*goto career\n\n*label career\n*page_break\n\nGiven how your Legend Level and perception in MC have turned out, how do you feel about your place in the heroic world?\n\n*choice\n\t#Great.\n\t\tYou've done all you could and risen high in a very short time. What more could you ask for?\n\t\t*goto expect\n\t#Unsure.\n\t\tYou're starting to get some buzz but you're not sure it's the kind of buzz you really want….\n\t\t*goto expect\n\t#Terrible.\n\t\tNothing has gone the way you wanted. If you could go back and do it all again, you'd definitely make better choices.\n\t\t*goto expect\n\n*label expect\n\n*if bmnoromance\n\t*goto move_on\n*else\n\t*goto timeforthatcall\n\n*label timeforthatcall\n*page_break\n\nYour MeChip buzzes and you expect a call from Jenny telling you to come back downstairs…\n\nBut when you see that it's Black Magic calling instead, your stomach does a somersault.\n\n*page_break\n\n*if bm_rescue\n\tSeeing ${bmhir} call is such a relief—${bmze} really came through for you when you needed it most. So you answer right away.\n\n\t\"Are you all right?\" Black Magic says, appearing in front of you. You immediately feel warm at the sight of ${bmhir}….\n\n\t*choice\n\t\t#\"I will be.\"\n\t\t\t*goto hereforyou\n\t\t#\"I think so.\"\n\t\t\t*goto hereforyou\n\t\t#\"No.\"\n\t\t\t*goto hereforyou\n\t\t*if (guard_reserve) #\"Much better, now that I'm a member of The Millennial Group.\"\n\t\t\t*goto hereforyou\n*else\n\t\"I know you probably don't want to hear from me,\" Black Magic says, appearing in front of you. \"But we've both been through a lot, so there was something I wanted to ask you….\"\n\t*goto romance\n\n*label hereforyou\n\"Well, I'm here for you if you need anything,\" Black Magic says. \"I know you probably don't have much time right now but I just had to call. I needed to ask you…\" \n*goto romance\n\n*label romance\n\nBlack Magic pauses and even with ${bmhis} brow furrowed that way, ${bmze} still looks more gorgeous than you can stand.\n\n\"Will you ever be OK with my secret?\" Black Magic asks. \"With who I really am?\"\n\nYou stare at Black Magic, considering your answer very carefully.\n\n*choice\n\t*if ((bm_dontcare) or (rlshp_bm > 60))\n\t\t#\"You don't have to worry, I'm totally fine with it.\"\n\t\t\t*set rlshp_bm %+30\n\t\t\t*goto reconcile\n\t*if (bm_rescue) #\"Yes.\"\n\t\t*set rlshp_bm %+40\n\t\t*goto reconcile\n\t#\"I'm not sure yet, but I think I will be someday.\"\n\t\t*set rlshp_bm %+20\n\t\t*goto reconcile\n\t#\"I don't think I ever can be.\"\n\t\t*set rlshp_bm %-20\n\t\t*goto rift\n\t*if (bm_wrong) #\"No, I'm not.\"\n\t\t*set rlshp_bm %-40\n\t\t*goto rift\n\t*if (bmfling) #\"I don't really care. To be honest, I was never looking for anything serious with you.\"\n\t\t*set rlshp_bm %-50\n\t\t*goto rift\n\n*label reconcile\n*set bm_reconcile true\n\n\"I'm so happy to hear that,\" Black Magic says, practically glowing.\n\n\"I may have to lie low for a little bit, but we'll figure it out,\" you say.\n*if guard_reserve \n\t\"And now that I'm on The Millennial Group reserve, I might even be moving into the MGHQ soon….\"\n\t*goto like_that\n*else\n\t*goto like_that\n\n*label like_that\n\n\"I'd really like that,\" Black Magic replies.\n\n\"We'll talk soon,\" you say, aching just to see Black Magic's smile.\n\nYou really want to give this a shot, if you can—see if things with Black Magic are as special as you think they could be….\n\nAnd it looks like you'll have the chance to.\n*goto move_on\n\n*label rift\n*set bm_rift true\n\n\"I…\" Black Magic starts, ${bmhis} eyes hitting the floor. \"Fine.\"\n\n\"I'm sorry,\" you try.\n\n\"Don't be.\" \n\nAnd with that, Black Magic hangs up on you.\n\nYou might feel bad but you know this is for the best…right?\n\nYou can't help but think of how rare it is for you to connect with someone—all you can do is hope you've made the right choice here.\n*goto move_on\n\n*label move_on\n*page_break\n\nYou turn to walk back downstairs because it's time to move on.\n\nProdigal has been taken down. The Splice Circle is dismantled. You've settled things with Black Magic and The Millennial Group. You were named MC's HoT, one way or another. You've made some money. And you saved countless lives.\n\nYou're ready to move on and face whatever comes next, with Jenny and Grandma by your side. Even after everything that has happened, you feel a spark of excitement thinking about what the future holds for you.\n\nBecause no matter what, you can now call yourself a Powered Hero.\n\nAnd no one can take that away from you.\n\n*page_break Epilogue\n\nEPILOGUE: THE LETTER V\n\nYou open the staircase door when you hear someone say your name.\n\nYou turn to find Mayor Victon standing across the roof, his folded arms crinkling an expensive suit.\n\n\"Just thought it was my duty as Mayor to check in on Millennia City's fastest rising hero,\" he says. \"Or fastest falling, depending on your perspective.\"\n\n*choice\n\t#\"And what exactly is your perspective?\"\n\t\t\"That you have a lot to learn,\" he says, losing the smile.\n\t\t*goto reveal\n\t#\"What do you want?\"\n\t\t\"I want to tell you something,\" he says, losing the smile.\n\t\t*goto reveal\n\t#\"I have nothing to say to you.\"\n\t\t\"Well, I have something to say to you, so stay put for a second,\" he says, losing the smile.\n\t\t*goto reveal\n\n*label reveal\n\nAs Mayor Victon walks toward you, the breeze carries a whiff of his sharp cologne and you have to force yourself not to gag.\n\n\"Oh, Jury sends his best, by the way,\" Mayor Victon says, handing you a holo-card. \n\nYou look down and, of course, the card is a shirtless headshot of Jury. You shake your head and flip the holo-card over, reading:\n\n*if guard_reserve\n\t\"Looking forward to being your teammate, cutie. I'm going to make sure it's the experience you truly deserve.\"\n\t*goto drop\n*else\n\t\"So sorry to hear what happened with Prodigal, cutie. Looks like you're getting everything in life you deserve.\"\n\t*goto drop\n\n*label drop\n*page_break\n\nClenching your jaw, you drop the holo-card and let it sweep into a pile of dirt. \n\n\"Ah, not in a chipper mood, are we?\" Mayor Victon starts. \"Well, that's all right. I just came here to say one thing. What Prodigal did to you was terrible—no one should have to go through what you did.\"\n\nYou hear Mayor Victon and all you can think is: what's his angle?\n\n\"Indeed, I've been tracking Prodigal since Miss Artillery's death. She had quite a troubled childhood—she spent her entire life fending for herself, without anyone who cared about her. Despite the fortune she eventually inherited, I believe she ended up living in a sewer drain for some time, then an abandoned asylum, which explains her lack of documentation and her rather…unique disposition. Anyway, all that's rather irrelevant.\"\n\nYou can't help but feel the slightest bit of pity for Prodigal—is that what would have happened to you, if you didn't have Grandma?\n\n\"What is relevant, however, is the fact that I've known of Prodigal's existence for quite some time now. I suppose I could have had her committed or arrested at any time…but I just wanted you to know that I chose not to.\"\n\nMayor Victon smiles at you once again—a cruel, lifeless smile.\n\n\"You see, little ${firstname}, I may not be able to attack you openly, not with that pesky last name of yours, but there are more ways than one to skin a cat.\"\n\nYou stare at Mayor Victon, balling up your fists. \n\n*choice\n\t#Mayor Victon knew about Prodigal all this time and did nothing to stop her attack on me….\n\t\tIt appears you were right to assume you're at war with the Victons.\n\t\t*goto wiseword\n\t#Mayor Victon is taking credit for something he didn't do just to intimidate me.\n\t\tStill, it appears you were right to assume you're at war with the Victons.\n\t\t*goto wiseword\n\t#If what Mayor Victon is saying is true, he would have sacrificed all of MC just to let Prodigal ruin me….\n\t\tCould he really be that soulless? Whatever the case may be, it appears you were right to assume you're at war with the Victons.\n\t\t*goto wiseword\n\n*label wiseword\n*set rlshp_victon %-90\n\n\"A word to the wise: I'm going to become president someday, ${firstname},\" Mayor Victon says in a low voice, \"and I will crush anyone who stands in my way. Just ask your parents.\"\n\nAt this, you turn your back to Mayor Victon—you're not even going to dignify his presence with a response.\n\n\"We'll see about that,\" you whisper to yourself.\n\nAnd as you walk away, all you can think is: \n\n*fake_choice\n\t#Prodigal isn't the only villain I'll have to take down, it seems.\n\t\tBut that's a task for another day….\n\t#I'll do everything in my power to make sure Mayor Victon's life goes up in flames.\n\t\tBut that's a task for another day….\n\t#Is there more to my parents' downfall that I haven't been told?\n\t\tIf that is true, then it's a problem for another day….\n\nBecause more than anything, this last visit with Victon has made you feel one thing with absolute certainty.\n\nSo you walk back downstairs and into Jenny's apartment, flooded with determination.\n\n*page_break\n\n\"We need to get going,\" Jenny says as you enter.\n\n\"I know, but I need to do something first,\" you say. \"Right now.\"\n\nWithout waiting for Jenny's response, you walk into her bedroom and say to MeChip ${chipname}: \"Draft document and record.\"\n\n${chipname} complies, appearing to jot down your words on a sheet of holo-paper.\n\nBefore you start, you glance down at your finger, the one that used to hold the silvered ring, until Prodigal destroyed it. The ring may be gone but burned there into your skin are the words:\n\n\"${ring_lyric}.\"\n\nThe lyrics wrap around your finger, branded in place like a tattoo, forever imprinted upon you.\n\nAnd staring at these words, you finally find the courage to speak….\n\n*page_break\n\n\"Dear Mom and Dad…\" \n\nYou say the words and immediately feel a weight lift from your shoulders.\n\n*fake_choice\n\t#\"I have quite the story to tell you….\"\n\t#\"Ever hear the one about The Prodigal Daughter?\"\n\t#\"I miss you.\"\n\nYou hear someone at the door and turn to find Grandma standing there, her eyes brimming. But she doesn't say anything—she simply nods at you and turns to go, leaving you to the task at hand.\n\nAnd as you begin to write the long-overdue letter to your parents, you are filled once again with a sense of purpose.\n\nFor you are reminded what makes you a hero.\n\n*if moralbonus\n\t*if (fame \u003c 20) and (lawless \u003c 20)\n\t\t*page_break\n\t\t*achieve morality\n\t\t-- MORALITY BADGE UNLOCKED --\n\n\t\tCongratulations, ${codename}—all of your decisions throughout your heroic rise have been made with a perfect moral compass. You obviously have an unyielding commitment to justice, the law, and doing the right thing, no matter what. \n\n\t\tAs a reward for your exemplary choices, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. Wear your Morality Badge with honor!  \n\t\t*goto decisionguide\n\t*else\n\t\t*set moralbonus false \n\t\t*goto legendtest\n*elseif badassbonus\n\t*if (fame > 80) and (lawless > 80)\n\t\t*page_break\n\t\t*achieve badass\n\t\t-- BADASS BADGE UNLOCKED --\n\n\t\tCongratulations, ${codename}—all of your decisions throughout your heroic rise have made you the ultimate badass. You've proven you're always going to do things your way, no matter what.\n\n\t\tAs a reward for your courageous choices, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. Wear your Badass Badge with honor!  \n\t\t*goto decisionguide\n\t*else \n\t\t*set badassbonus false\n\t\t*goto legendtest\n*else\n\t*goto legendtest\n\n*label legendtest\n*if (legend >= 50)\n\t*page_break\n\t-- LEGEND PRIZE UNLOCKED --\n\n\tCongratulations, ${codename}—for maintaining an above-average Legend Level, you have unlocked a Legend Guide, which lists the decisions necessary to achieve a perfect Legend score. Use this information wisely! \n\t*goto decisionguide\n*else\n\t*check_achievements\n\t*page_break\n\t*if choice_achieved_legendguide\n\t\t*goto decisionguide\n\t*check_purchase legendguide\n\t*if not(choice_purchase_supported)\n\t\t*goto timetoend\n\t*if choice_purchased_legendguide\n\t\t*goto decisionguide\n\t[i]Would you like to purchase the Perfect Legend Guide? It lists the decisions necessary to achieve a perfect Legend score.[/i]\n\n\t*purchase legendguide $0.99 decisionguide\n\t*page_break No, Thanks\n\t*goto timetoend\n\n*label decisionguide\n*achieve legendguide\n\nPERFECT LEGEND GUIDE\n\nChapter Two: Automatic start increase. (Plus 1: 1)\n\nChapter Three: Do not choose to patrol the streets. (Avoid Decrease)\n*line_break\nChapter Three: Choose the correct fingertip color first—make sure to pay attention to the fingertip description as the color changes. (Plus 3: 4)\n\nChapter Four: Automatic press boost. (Plus 5: 9)\n\nChapter Five: Do not choose to stay put and wait for the police in the Gravitas battle. (Plus 1: 10)\n*line_break\nChapter Five: Do not die—make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\nChapter Six: Automatic bad press decrease. (Minus 5: 5)\n*line_break\nChapter Six: Choose the positive outlook when reflecting on your first heroic night. (Plus 1: 6)\n*line_break\nChapter Six: Choose Prodigal as your biggest threat. (Plus 1: 7)\n*line_break\nChapter Six: (Optional Tip) Whenever possible, purchase bonus Power Upgrades—this will help you conserve Power in battles for extra Legend boosts.\n\nChapter Seven: Automatic mission reward. (Plus 2: 9)\n\nChapter Eight: (Optional Tip) When speaking with Jenny, choose to go over her materials and then choose a fighting tip. This Power increase will help you in Chapter Eleven. \n\nChapter Nine: Choose wisely when handling the police—talk to the police if Officer Sanders is a contact OR flee if you've been lawless. (Plus 2: 11)\n\nChapter Ten: Reward for ideals & decision consistency—have a Solo stat greater than 60 OR a Team Player stat less than 40 when choosing how to interact with the Millennial Group. (Plus 3: 14)\n*line_break\nChapter Ten: Automatic Millennial Group boost. (Plus 5: 19)\n\nChapter Eleven: Finish mission with Power and Health both greater than 40. (Plus 10: 29)\n*line_break\nChapter Eleven: Do not die—make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\nChapter Twelve: Automatic press boost. (Plus 10: 39)\n*line_break\nChapter Twelve: Ask Grandma what on earth she was thinking inviting your sidekick over—do not trust your sidekick whenever possible. (Plus 1: 40)\n\nChapter Fourteen: Choose to think that Prodigal has it out for you. (Plus 1: 41)\n\nChapter Fifteen: Tell Grandma you really don't trust your sidekick at all. (Plus 1: 42)\n\nChapter Sixteen: Reward for ideals & decision consistency—have a Fame stat greater than 85 OR a Justice stat less than 15 when choosing to save Sonja or your sidekick. (Plus 5: 47)\n\nChapter Seventeen: When making the phone call for backup, be sure to choose a contact you have a positive relationship with OR if a Solo player, call no one. (Plus 5: 52)\n\nChapter Nineteen: Choose to fight Prodigal close range. (Plus 3: 55)\n*line_break\nChapter Nineteen: Reward for ideals & decision consistency—have a Lawless stat greater than 85 OR a Lawful stat less than 15 when choosing to kill or spare Prodigal. (Plus 5: 60)\n*line_break\nChapter Nineteen: Do not die—make sure to keep Power and Health levels above 0. (Avoid Decrease)\n\nChapter Twenty: If you have an above-average Legend Level at this point, you won't cause any Fringe deaths. (Plus 10: 70).\n\nGeneral Tip: In Heroes Rise, you are rewarded for sticking to your ideals. If looking for a high Legend Level, make sure to remain consistent once you decide on either Lawless/Lawful, Solo/Team Player, Fame/Justice, and other heroic traits.\n\n*goto timetoend\n\n*label timetoend\n*page_break The End\n\nPlease save your game below; you'll need your saved game to continue where you left off in the next episode, [i]Heroes Rise: The Hero Project[/i].\n\n*save_game sitting_sun\n\nWe hope you've enjoyed playing [i]Heroes Rise: The Prodigy.[/i]\n\n*feedback\n\nThe sequel is available now!\n\t\n*link_button https://www.choiceofgames.com/heroes-rise-2-hero-project/redirect.php?src=hr1 Play \"The Hero Project\" Now\n\nAnd for a complete list of works by the author of Heroes Rise, Zachary Sergi, head to:\n*line_break\n*link https://zacharysergi.com/ ZacharySergi.com\n\n*ending\n", "splice_girls": "*comment é\n\n*text_image chap_11.png center Chapter 11: Splice Girls\n\nGet. Up.\n\nYou try to move your limbs and feel yourself slide across jagged rubble. Your temples pound and a sharp pain radiates through your left arm.\n\nAll you want to do is close your eyes until the searing stops. But as a hissing sound from somewhere behind you grows louder, the world flashes white, and you remember where you are.\n\nGet. Up!\n\nOr you're going to die.\n\n*page_break\n*set power -20\n*set health -20\n\n*if guard\n\t*goto team\n*else\n\t*goto solo\n\n*label team\nThe memories whip through your mind at lightning speed: the hover-plane ride over with The Millennial Group. Trying not to explode watching Jury chat casually with Rebellion. Sitting next to Black Magic, your knees touching.\n\n*if diva_good\n\tWinking in The Diva's direction for good measure, despite her scowl.\n\t*goto land\n*else\n\tSmiling from Fistfull to Monk, who sat on opposite ends of the plane.\n\t*goto land\n\n*label land\nLanding outside of Ace's High Casino, The Splice Circle's temporary base of operations. Rebellion barking orders, splitting the team into separate missions:\n\nRebellion, Monk, and Fistfull went after Madame Vice and her Generals. The Diva and Jury went to rescue Static. You, Black Magic, and Processor were supposed to disable the pool-killers. \n\nAfter carving through dozens of drones, you and Black Magic covered Processor while she shut down the mainframe, which was hidden in the VIP client lounge. Then you watched as the pool-killers fell to the ground, humming into lifelessness. It all seemed so easy…\n\nUntil the room twisted and crumbled around you, thick with light.\n\nNow, as you come to, these memories blur together into one thought: whatever hit you must be coming to finish you off.\n\nSo what do you do?\n\n*choice\n\t#Go defensive with an energy-shielded evasive flight pattern. (Power Cost 10)\n\t\t*set offensive %-5\n\t\t*if energy_shield\n\t\t\t*set power -5\n\t\t\t*goto strain\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*goto strain\n\t#Go offensive with a cyclonic-energy-blasting combo. (Power Cost  10)\n\t\t*set offensive %+10\n\t\t*if energy_blast\n\t\t\t*set power -5\n\t\t\t*goto stretch\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*goto stretch\n\t#Wait to see what I'm facing before I react.\n\t\t*set offensive %-15\n\t\t*goto mladies\n\n\n*label strain\n\nStraining your muscles, you wrap yourself in a cocoon of ${energycolor} energy, and with a soft whoosh, the light and sound drown out. You then take to the sky, swerving just in time to dodge a rush of burning, viscous gel. A few drops crackle against your energy, hissing and steaming.\n*goto mladies\n\n*label stretch\n\nYou stretch out your arms and spin super fast. As winds begin to rip away from your body, your hands generate a fury of twisting, outward blasts.\n\nComing to a stop, you see the immediate area around you has been cleared…though you stand next to a puddle of burning, viscous gel.\n*goto mladies\n\n*label mladies\n\nYou look across the ground and see gel everywhere, pooled around rubble, broken slot machines, and the limp bodies of Processor and Black Magic. What happened here?\n\nYou zero in on Black Magic—you can't tell if ${bmze} is breathing. You're about to rush to ${bmhis} side when a shriek pierces the air. You twist around to find…\n\n*page_break\n\nA trio of young girls staggering toward you. Their skin melts off of their bones in a deep-crimson protoplasm, turning into a kind of oozing goo that smells like motor oil. The girls struggle through their own drippings, as if trying to pry their way out. It looks like some twisted ballet, the girls' limbs pushing and their faces contorting into screaming scowls. \n\nYou watch in horror—these girls can't be much older than ${sidekick}. You had heard rumors that Madame Vice got many of her workers through…unorthodox methods, but how did these girls get like this?\n\nWhen the triplets finally break free of their shedding goo, they have become entirely bare skeletons, their skin and organs oozing around them like lava.\n\n\"We are the Molten Ladies,\" they whisper in unison, \"and you will burn with us!\"\n\nThe \"Ladies\" then begin to scoop up the searing goo and fling handfuls of it at you. You try to react quickly, but a glob grazes your arm as it flies by.\n\nIt doesn't matter how young these girls are—you need to retaliate. Now.\n\n*set health -5\n*choice\n\t#Suit up with energy armor and fight through them. (Power Cost 10)\n\t\t*set power -10\n\t\tYou haven't tried this move before, but you figure you can use your energy shield like a battle-suit if you contour it to your body.\n\n\t\tSo that's exactly what you do. Making sure the tips of your knuckles are ridged with spikes, you run at the Molten Ladies, fists swinging. You take out the leader of the trio first, smashing her over the head. The girl on your right tosses a thick stream of burning ooze in your direction, which you sidestep. You swing around to roundhouse kick her down.\n\t\t*goto choker\n\t#Trap the girls with a shrinking energy containment field. (Power Cost 15)\n\t\t*set power -15\n\t\tWithout wasting a second, you encase the girls in a containment field—they don't need to be hurt any more than necessary. The Molten Ladies try to fling ooze to free themselves but you made the field very strong. \n\n\t\tThe Ladies scream as the walls begin to close in on them, doubling their efforts to break free. But as the ${energycolor} energy connects with their bare bones, two of the girls fall to the ground.\n\t\t*goto choker\n\n*label choker\n\nThen you hear a mad, hissing sound and feel something scalding your neck. Screaming in pain, you look down to find a noose of ooze around your neck—the middle girl created a whip of the gel and managed to crack through your energy with it….\n\nYou can feel your skin bubbling under the ooze noose and your air supply quickly cuts off. You reach up to free yourself, but suddenly, the gel jerks forward as the Molten Lady pulls hard on the noose. You slam into the ground, gasping for air.\n\n*set health -15\n\nYou won't be able to take much more of this—you need to find a way to free yourself. But as the Molten Lady stands over you and tightens her grip, the edges of your vision begin to blur.\n\nNo! Not like this—you can't go down this way….\n\n*fake_choice\n\t#Try to supercharge the gel to hurt the Molten Lady. (Power Cost 5)\n\t#Try to fly and stretch out the goo. (Power Cost 5)\n\t#Generate an energy bomb to take out the Molten Lady. (Power Cost 5)\n\nYou're about to try this move when, without warning, something comes crashing through the wall next to you. You can feel the noose loosen as the Molten Lady gets distracted, so you tear it away. \n\nAcross the floor, Rebellion rolls to ${youhis} feet, chunks of debris sticking out of ${youhis} skin. $!{Youze} strides forward and brushes ${youhir}self off—someone just put Rebellion through a wall and ${youze}'s not even batting an eye. \n\nThe lone Molten Lady turns toward Rebellion and cries, \"The mighty will fall! I will flay the skin from your very-\"\n\nShe doesn't finish, though, since Rebellion punches her across the face. As she crumples to the ground with her molten sisters, you can see that some of her organs have already begun to grow back.\n\n*goto magic_down\n\n*label solo\n*set static_meet true\n*set power -5\n\nThe memories whip through your mind at lightning speed: You followed the The Millennial Group's hover-plane to Ace's High Casino, The Splice Circle's temporary base of operations. Then you hid and watched as Rebellion barked orders, splitting the team into separate missions.\n\nRebellion, Monk, and Fistfull went after Madame Vice and her Generals. The Diva and Jury went to disable the pool-killers. Black Magic and Processor went to rescue Static.\n\nThen you broke into the back of the building before The Millennial Group could, hoping to rescue Static first. But when you finally found the cellblock in the basement below the VIP lounge, Black Magic and Processor were already untying Static.\n\nThat's when the room twisted and crumbled around you, thick with light.\n\nNow, as you come to, these memories blur together into one thought: whatever hit you must be coming to finish you off.\n\nSo what do you do?\n\n*choice\n\t#Go defensive with an energy-shielded evasive flight pattern. (Power Cost 10)\n\t\t*set offensive %-5\n\t\t*if energy_shield\n\t\t\t*set power -5\n\t\t\t*goto muscles\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*goto muscles\n\t#Go offensive with a cyclonic-energy-blasting combo. (Power Cost  10)\n\t\t*set offensive %+10\n\t\t*if energy_shield\n\t\t\t*set power -5\n\t\t\t*goto arms\n\t\t*else\n\t\t\t*set power -10\n\t\t\t*goto arms\n\t#Wait to see what I'm facing before I react.\n\t\t*set offensive %-15\n\t\t*goto lolli\n\n*label muscles\n\nStraining your muscles, you wrap yourself in a cocoon of ${energycolor} energy, and with a soft whoosh, the light and sound drown out. You then take to the sky, swerving just in time to dodge another intense blast of heat.\n*goto lolli\n\n*label arms\n\nYou stretch out your arms and spin super fast. As winds begin to rip away from your body, your hands generate a fury of twisting, outward blasts.\n\nComing to a stop, you see the immediate area around you has been cleared….\n*goto lolli\n\n*label lolli\n\nYou look across the ground and see the remnants of a rocket launcher explosion. The limp bodies of Static, Processor, and Black Magic lie between mounds of rubble and splintered slot machines. You zero in on Black Magic—you can't tell if ${bmze} is breathing. You're about to rush to ${bmhis} side when a shriek pierces the air.\n\nYou twist around quickly to find…\n\n*page_break\n\nLolli, The Splice Circle's most infamous General. Jutting out of her shoulders are twisted antlers, which she has covered with rhinestones to match her crisp, white hair.\n\nBedazzled as they may be, those antlers still look deadly.\n\n\"I really, really need to stab something,\" Lolli says, licking her lips.\n\nThen Lolli launches at you. You quickly sidestep her tackle but her right antler grazes your arm, slicing it open. As Lolli lands, she wails with pleasure.\n\nYour jaw drops—you had heard rumors that her antler-shoulders doubled as an erogenous zone, but you never thought it could be true. No wonder she likes stabbing people so much….\n\n*set health -5\n\nYou don't have time to contemplate that gruesome fact, though, as Lolli bucks her head and winds up for another attack. How do you retaliate?\n\n*choice\n\t#Suit up with energy armor and fight with Lolli. (Power Cost 10)\n\t\t*set power -10\n\t\tYou haven't tried this move before, but you figure you can use your energy shield like a battle-suit if you contour it to your body.\n\n\t\tSo that's exactly what you do, making sure the tips of your knuckles are ridged with spikes. As L
