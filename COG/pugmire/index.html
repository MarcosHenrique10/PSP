ak\nSabu leads you through the part of Waterdog Port known as the Haze. It derives its name from the fog emanating from the murky swamp water. When the wind blows inland, the mists blanket the area, shrouding pathways and causing eyes to water uncontrollably, though colors are muted even on clear days. The architecture of the Haze slowly deteriorates under the fog's unrelenting caress, requiring frequent repair.\n\nSo it's a surprise when you stumble upon Harv's Hideaway. It's a spacious establishment, connecting three different buildings of obviously varied architecture. Even inside the tables and chairs seem to be jammed into any strange nook or cranny the three buildings offer, allowing for a surprising amount of privacy.\n\nAs you stare, a gruff ferret dressed in a smock walks up to you. \"Whatcha needin'?\" he asks.\n\n\"Hey Harv,\" Sabu says. \"Just the usual tables for me and my crew.\"\n\nThe ferret nods. \"Of course, cap'n.\" He leads you through one building into another, to a set of ramshackle tables in the back. Sabu whispers in your ear. \"Harv doesn't tolerate violence, so keep your cool. The food's decent, too.\"\n\nOnce settled, a cat with a flat tray walks up to you. Her tail twitches slightly. \"Heya, Sabu, Pally,\" she says with a smile. \"The usual?\"\n\nPally slaps the table. \"Coffee all around, Sheridan! Squawk!\"\n\nSheridan smiles. \"It'll be right out,\" she says, and slides away.\n\nThe parrot smiles back. \"I've missed coffee,\" she says to herself.\n\n*if (flg_damianStayed) and (flg_sonyaStayed)\n\tSabu, seated next to you, watches the rest of his crew talk loudly, laugh, and sing songs. He has a pleasant smile on his face.\n\n\t\"Another adventure to lie about,\" he says, contentedly. Then he turns to you. \"But your adventure isn't over yet, is it?\" He shakes his head.  \n\t*goto what_to_do\n*elseif (flg_triadDating)\n\tSonya and Damian, sitting on either side of you, watch the rest of the crew talk loudly, laugh, and sing songs. They both have smiles on their faces.\n\n\t\"Well, boss, you certainly have some amazing adventures,\" Damian says. \"Here's to many more.\"\n\n\t\"Indeed,\" Sonya says, \"but our adventure isn't quite over yet.\" She turns to you. \n\t*goto what_to_do\n*elseif rel_sonya >= rel_damian\n\tSonya, seated next to you, watches the rest of the crew talk loudly, laugh, and sing songs. She has a smile on her face.\n\n\t\"Any adventure you live through is a good one,\" she says. \"But I guess our adventure isn't quite over yet.\" She turns to you. \n\t*goto what_to_do\n*else\n\tDamian, seated next to you, watches the rest of the crew talk loudly, laugh, and sing songs. He has a smile on his face.\n\n\t\"Well, boss, you certainly have some amazing adventures,\" he says. \"But I guess we're not done yet.\" He turns to you. \n\t*goto what_to_do\n\n*label what_to_do\n\"You still need to decide what to do with those pearls.\"\n\nWhat [i]will[/i] you do with the pearls?\n\n*label pearl_choice\n*choice\n\t*if ((flg_damianStayed = false) and (flg_askedDamian = false)) #I ask Damian what to do with the pearls.\n\t\t\"What should I do with the pearls?\" you ask Damian.\n\n\t\tHe leans over and pokes you in the chest. \"Give them back to Fiona Corgi. Obviously. That was the whole point of this, right?\"\n\t\t*set flg_askedDamian true\n\t\t*goto pearl_choice\n\t*if ((flg_sonyaStayed = false) and (flg_askedSonya = false)) #I ask Sonya what to do with the pearls.\n\t\t\"Who should I give the pearls to?\" you ask Sonya.\n\n\t\tShe thinks for a moment, scratching her chin. \"I think giving it to Seneschal Murra is best. He'll know the best way to keep them safe from nefarious paws.\"\n\t\t*set flg_askedSonya true\n\t\t*goto pearl_choice\n\t*if ((flg_damianStayed = false) and (flg_offeredDamian = false)) #I offer Damian @{flg_pearlsSeparate some of the|the} pearls.\n\t\t\"You should take @{flg_pearlsSeparate some of the|the} pearls,\" you tell Damian.\n\n\t\tHe spits his coffee out all over the table. \"Boss, with all due respect, are you [i]mad[/i]?\"\n\n\t\t\"I think you'll do a good job protecting them.\"\n\n\t\tDamian laughs, loudly and a little hysterically. \"I'm not good with even non-possessed jewelry. Man knows what I'd get up to if I had evil magical artifacts in my paws. Really, it's just best to give them to the Corgi family and wash your paws of them completely.\"\n\t\t*goto pearl_choice\n\t*if ((flg_sonyaStayed = false) and (flg_offeredSonya = false)) #I offer Sonya @{flg_pearlsSeparate some of the|the} pearls.\n\t\t\"I could give @{flg_pearlsSeparate some of the|the} pearls to you,\" you say to Sonya.\n\n\t\tShe sets her coffee down, shaky. \"Why would you do that?\" she asks calmly. Too calmly.\n\n\t\t\"I trust you to protect them.\"\n\n\t\tSonya shakes her head, hard. \"You know my history with demons. I wouldn't trust myself around such evil artifacts. I'd just as soon drop them into the Acid Sea and never see them again, but giving them to the Crown of Pugmire will at least keep them safe.\" Her paws tremble as she picks up her coffee again.\n\t\t*goto pearl_choice\n\t#I'll give @{flg_pearlsSeparate some of the|the} pearls to Fiona Corgi in Pugmire.\n\t\t\"I'll give @{flg_pearlsSeparate some of the|the} pearls to Fiona Corgi,\" you say, just as the coffee arrives. You take a sip, enjoying the rich, bitter taste.\n\n\t\t*if (flg_damianStayed = false)\n\t\t\tDamian takes a huge gulp of his coffee as well. \"Sounds like a plan to me, boss.\"\n\t\t\t\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto fiona_corgi\n\t\t*else\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto fiona_corgi\n\t#I'll give @{flg_pearlsSeparate some of the|the} pearls to Seneschal Murra in Pugmire.\n\t\t\"I'll give @{flg_pearlsSeparate some of the|the} pearls to Seneschal Murra,\" you say, just as the coffee arrives. You take a sip, enjoying the rich, bitter taste.\n\n\t\t*if (flg_sonyaStayed = false)\n\t\t\tSonya puts the coffee to her nose, enjoying the aroma. \"A wise strategy,\" she murmurs, before sipping the drink.\n\t\t\t\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto seneschal_murra\n\t\t*else\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto seneschal_murra\n\t#I'll give @{flg_pearlsSeparate some of the|the} pearls to Ambassador von Korat in Pugmire.\n\t\t\"I'll give @{flg_pearlsSeparate some of the|the} pearls to Ambassador von Korat,\" you say, just as the coffee arrives. You take a sip, enjoying the rich, bitter taste.\n\n\t\t*if (flg_damianStayed = false)\n\t\t\tDamian, taking a huge gulp of coffee while you spoke, spits it out onto the table. \"You're going to [i]what[/i]?\"\n\t\t\t\n\t\t\t\"It's a cat problem,\" you say. \"The cats need to solve it.\"\n\n\t\t\t\"That's…\" Damian searches around for the right words. \"Well, that's a choice. We'll see how it plays out in Pugmire, I guess.\"\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto ambassador_korat\n\t\t*elseif (flg_sonyaStayed = false)\n\t\t\tSonya, putting the coffee to her nose to enjoy the aroma, sets it back down with a frown. \"Are you sure that's wise?\" she asks.\n\n\t\t\t\"It's a cat problem,\" you say. \"The cats need to solve it.\"\n\n\t\t\tShe frowns again. \"I'm not sure I agree,\" she says eventually, before sipping her coffee. \"I suppose time will tell once we return to Pugmire.\"\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto ambassador_korat\n\t\t*else\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto ambassador_korat\n\t#I'll keep all the pearls for myself.\n\t\t\"I'll keep all the pearls for myself,\" you say, just as the coffee arrives. You take a sip, enjoying the rich, bitter taste.\n\n\t\t*if (flg_damianStayed = false)\n\t\t\tDamian, taking a huge gulp of coffee while you spoke, spits it out onto the table. \"You're going to [i]what[/i]?\"\n\t\t\t\n\t\t\t\"Who better to protect them?\" you ask.\n\n\t\t\t\"That's…\" Damian searches around for the right words. \"Well, that's a choice. We'll see how it plays out in Pugmire, I guess.\"\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto keep_pearls\n\t\t*elseif (flg_sonyaStayed = false)\n\t\t\tSonya, putting the coffee to her nose to enjoy the aroma, sets it back down with a frown. \"Are you sure that's wise?\" she asks.\n\n\t\t\t\"Who better to protect them?\" you ask.\n\n\t\t\tShe frowns again. \"Literally anyone else,\" she says eventually, before sipping her coffee. \"I suppose time will tell once we return to Pugmire.\"\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto keep_pearls\n\t\t*else\n\t\t\t*gosub travel_to_pugmire\n\t\t\t*goto keep_pearls\n\t#I'll use the pearls myself.\n\t\t*goto bad_ending\n\n*label travel_to_pugmire\n\nThe rest of the night passes. You enjoy several cups of coffee, before the crew switches to stronger drinks. All of you end up swapping stories and outrageous lies, and you sing a number of songs at high volume. But all good things must come to an end, and before long the crew are heading out into the Haze to find a place to sleep. You do the same, and the morning comes bright and early. With a heavy head and heart, you make your way back to Pugmire.\n\n*page_break\n*if (flg_bowToPugmire)\n\tThe trip back is exhausting. Greedy Bow takes every opportunity to make himself as irritating as possible: screaming at all hours, chattering nonsense, and even intentionally falling off the back of your horse. But eventually you find your way back at the southern gate of Pugmire. The kingdom still bustles along like it always has, with dogs running every which way. They laugh, argue, and hurry on errands of their own. Nothing has changed, but you feel like you have.\n\n\tShaking the feeling off, you grab the attention of the city guard at the gate. Explaining who Greedy Bow is and his role in the fracas in the Cat Quarter, you give the mangy pirate over to the local authorities. The police dogs are grateful for your service, although they seem more grateful that they didn't have to track down the criminal down themselves.\n\n\tHaving divested yourself of the pirate, you head for \n\t*return\n*else\n\tThe trip back to Pugmire is uneventful, and before long you find yourself back at the southern gate. The kingdom still bustles along like it always has, with dogs running every which way. They laugh, argue, and hurry on errands of their own. Nothing has changed, but you feel like you have.\n\n\tShaking the feeling off, you head for \n\t*return\n\n*label fiona_corgi\nthe Corgi estate.\n\n*set flg_talkedToFiona true\n*if (((flg_sonyaDating = false) and (flg_sonyaStayed = false)) and (rel_sonya \u003c 40))\n\tSonya becomes increasingly concerned as she realizes you're not heading for the castle.\n\n\t\"So you're committed to this? We know the pearls are dangerous. If those artifacts can be used to summon demons once, they could be used in that way again.\" She looks at you sternly. \"I don't want you to do this.\"\n\t*if (flg_pearlsSeparate)\n\n\t\t\"Only in their combined form,\" you say. \"I believe.\"\n\n\t\t\"That's besides the point,\" she says, slamming her fist into her paw.\n\t\t*goto fiona_corgi_2\n\t*else\n\t\t*goto fiona_corgi_2\n*else\n\t*goto fiona_corgi_3\n\n*label fiona_corgi_2\n\nYou look at the pearls in your paw. \"That's not for me to decide,\" you say carefully. \"They aren't mine.\"\n\n\"You're endangering everyone in Pugmire,\" she says. \"And I can't stand here while you do it.\"\n\nYou carefully put the pearls back in your pouch. \"You're not going to take them from me.\"\n\n\"No,\" she says. \"But I also won't watch you do this.\" She turns on her heel. \"Goodbye, $!{plc_fname}.\"\n\nYou watch her go. You didn't want it to be this way.\n\n*page_break\n*goto fiona_corgi_3\n\n*label fiona_corgi_3\n\nThe estate is not as large as you might have expected from a royal family. Instead of a sprawling mansion or a high tower, instead you see a large home surrounded by a wrought-iron gate. Behind the gate you see a well-managed garden, and a cobble path that leads to the front door. After only a single knock, Fiona opens the door. She looks older than you remember.\n\n\"Oh, $!{plc_fname}, come in.\" She steps aside so you can enter.\n\nThe interior is as homey and comfortable as the outside. Overstuffed chairs curve around a well-used fireplace, and a plate of tea and cookies sits on a table between them. Fiona motions you to the chairs, and you take a seat.\n\n\"Well?\" she says. \"I apologize for being forward, but I've been anxious for news.\"\n\nYou take a deep breath. \"We confronted the bird who killed your brother. Their name is Ambrosia Five Sins, and they were with a pirate named Greedy Bow. @{flg_ambrosiaWandKept I have the wand they used to kill Padraig.\" You give it to her, still carefully wrapped in cloth. \"Be careful.\" She shivers before taking it and putting it into a pocket on her robe.|That pirate stole the pearls.\" She nods in understanding.}\n\n\"Thank you,\" she says. \n*if (flg_sentKittenToFiona)\n\t\"Oh, which reminds me. Thank you for sending that kitten to me.\"\n\n\t\"They actually showed up?\" you say, surprised.\n\n\tShe laughs. \"They ate a dozen plates of food, but I think they'll fit in quite well.\" The smile fades from her face. \"Now, did you recover the pearls?\"\n\t*goto fiona_corgi_4\n*else\n\t\"Did you recover the pearls?\"\n\t*goto fiona_corgi_4\n\n*label fiona_corgi_4\n\nYou pull the Corgi Pearls out of your pouch. \"They turned out to be part of a necklace of pearls,\" you say. \"That necklace was discovered to be an ancient artifact that summoned demons, \n*if (flg_necklaceLost)\n\tbut it was… lost at sea.\"\n\n\t*goto fiona_check\n*else\n\tbut we recovered it.\"\n\t*goto fiona_check\n\n*label fiona_check\n\nFiona is shocked by the revelation. \"Demons?\" she says, looking horrified.\n\nYou nod, \n*if (flg_pearlsSeparate)\n\tand consider how much to give to her.\n\t\n\t*choice\n\t\t#I give her the Corgi Pearls, keeping the necklace. I am a dog of my word.\n\t\t\tYou give her the Corgi Pearls. \"It's probably best if I keep the remaining pearls.\"\n\t\t\t*set flg_whoHasPearls 102\n\t\t\t*set per_loyal %+10\n\t\t\t*goto fiona_check_2\n\t\t#I give her the Corgi Pearls. Maybe I can sell the other pearls to someone.\n\t\t\tYou give her the Corgi Pearls. \"It's probably best if I keep the remaining pearls.\"\n\t\t\t*set flg_whoHasPearls 102\n\t\t\t*set per_loyal %-10\n\t\t\t*goto fiona_check_2\n\t\t#I give her all of the pearls. Her family needs to re-establish their noble standing.\n\t\t\tYou give her the Corgi Pearls and the necklace. \"It's probably best if you keep all of them.\"\n\t\t\t*set flg_whoHasPearls 2\n\t\t\t*set per_idealist %+10\n\t\t\t*goto fiona_check_2\n\t\t#I give her all of the pearls. I don't trust myself to keep them safe.\n\t\t\tYou give her the Corgi Pearls and the necklace. \"It's probably best if you keep all of them.\"\n\t\t\t*set flg_whoHasPearls 2\n\t\t\t*set per_ego %-10\n\t\t\t*goto fiona_check_2\n*else\n\tand give her the pearls.\n\t*set flg_whoHasPearls 2\n\t*goto fiona_check_2\n\n*label fiona_check_2\n*if stg_protect > 2\n\tShe looks at the pearls in your paws, and closes your fingers over them. \"I value your honesty, and your integrity. These are a precious family heirloom, but your strength and tenacity has shown me that you are a far better protector of these than my family.\"\n\n\t*choice\n\t\t#I accept the pearls graciously.\n\t\t\tYou nod, and put the pearls away. \"Thank you,\" you whisper, choking back tears.\n\n\t\t\t\"No,\" Fiona says. \"Thank [i]you[/i] \n\t\t\t*set flg_whoHasPearls 1\n\t\t\t*achieve keeppearls\n\t\t\t*goto fiona_check_3\n\t\t#I politely refuse.\n\t\t\tYou shake your head, and push the pearls back to her. \"Thank you, but these are for your family. I wouldn't feel right keeping them.\"\n\n\t\t\tFiona nods, and carefully takes them from you. \"Guarding this would be a way to honor my brother's passing.\"\n\n\t\t\tYou nod. \"I think so, too,\" you whisper, choking back tears.\n\n\t\t\t\"Thank you \n\t\t\t*goto fiona_check_3\n\t\t#I keep the pearls. Does this make me a noble?\n\t\t\tYou nod, and put the pearls away. \"I guess this makes me a noble now, huh?\" you say, joking to break the tension.\n\n\t\t\tShe smiles. \"If that is your wish. Although I suspect presenting these to the Crown for your petition would make you much more of a target. Perhaps best to keep them secret, at least for now.\"\n\n\t\t\t\"Of course. Thank you.\"\n\n\t\t\t\"No,\" Fiona says. \"Thank [i]you[/i] \n\t\t\t*set flg_whoHasPearls 1\n\t\t\t*achieve keeppearls\n\t\t\t*goto fiona_check_3\n*else\n\tShe looks at the pearls in your paws, and carefully takes them from you. \"I value your honesty, and your integrity. My family has always lived to protect others. Guarding this would be a way to honor my brother's passing.\"\n\n\tYou nod. \"I think so, too,\" you whisper, choking back tears.\n\n\t\"Thank you for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw. \"Now, won't you stay for tea?\"\n\n\tYou have a lovely tea, swapping old stories about Padraig. Even though you don't know each other very well, you talk like old friends. Fiona tells you a funny story about Padraig as a puppy, when he got scared by his own tail. Through the tears of laughter, you tell her about how he would try to tell the same bad joke every night, even though it nobody every laughed at it.\n\n\tAfter an hour, you thank her for her company, and leave.\n\t*set flg_whoHasPearls 2\n\t*goto illiad_tries_again\n\n*label fiona_check_3\nfor everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw. \"Now, won't you stay for tea?\"\n\nYou have a lovely tea, swapping old stories about Padraig. Even though you don't know each other very well, you talk like old friends. Fiona tells you a funny story about Padraig as a puppy, when he got scared by his own tail. Through the tears of laughter, you tell her about how he would try to tell the same bad joke every night, even though it nobody every laughed at it.\n\nAfter an hour, you thank her for her company, and leave.\n*goto illiad_tries_again\n\n*label seneschal_murra\nCastle Pugmire.\n\n*set flg_talkedToMurra true\n*if (((flg_damianDating = false) and (flg_damianStayed = false)) and (rel_damian \u003c 40))\n\tDamian becomes increasingly annoyed as he realizes you're not heading for the Corgi estate.\n\n\t\"So this is what we're doing?\" he says. \"After the Corgis trusted you. These things are far too dangerous to just give to some mutt in a crown.\" He glares at you. \"There's no way that a Pug won't try and use those pearls for some kind of political gain.\" \n\n\t*if (flg_pearlsSeparate)\n\n\t\t\"They're only dangerous in their combined form,\" you say. \"At least, that's what I believe.\"\n\n\t\t\"That's besides the point, and you know it.\"\n\t\t*goto seneschal_murra_2\n\t*else\n\t\t*goto seneschal_murra_2\n*else\n\t*goto seneschal_murra_3\n\n*label seneschal_murra_2\n\nYou look at the pearls in your paw. \"That's not for me to decide,\" you say carefully. \"They aren't mine.\"\n\n\"You've turned your back on the Corgis,\" he says. \"And I'm not sticking around to watch you betray them.\"\n\nYou carefully put the pearls back in your pouch. \"That's unfair.\"\n\n\"Life's tough,\" he says, turning away from you and storming off. Over his shoulder, he yells, \"Goodbye, $!{plc_fname}.\"\n\nYou watch him go. You didn't want it to be this way.\n\n*page_break\n*goto seneschal_murra_3\n\n*label seneschal_murra_3\n\nThe castle is a small city unto itself. Its low walls surround an extensive campus that contains dozens of buildings. Everything from housing for royal staff and guards to stores of food and supplies is kept near the castle. Stables, training grounds, several kitchens, guest quarters for visiting dignitaries, and so on—all told, hundreds of dogs live and work on the castle grounds. \n\nA couple of palace guards recognize you and escort you to a small, discrete audience chamber away from the main throne room. It contains a well-constructed wooden desk and several comfortable chairs. The desk is covered in books, quills, inkwells, and pieces of parchment. You take a seat, and within a few wags Seneschal Murra comes through the door.\n\n\"Thank you for your patience, $!{plc_fname},\" he says, taking the seat behind the desk. \"Please, tell me your news.\"\n\nYou take a deep breath. \"We confronted the bird who killed Padraig Corgi. Their name is Ambrosia Five Sins, and they were with a pirate named Greedy Bow. @{flg_ambrosiaWandKept I have the wand they used to kill Padraig.\" You give it to him, still carefully wrapped in cloth. \"Be careful.\" He nods as he takes it and puts it into a pocket on his robe.|That pirate stole the pearls.\" He nods in understanding.}\n\n\"I see,\" he says. \"And have you recovered the pearls?\"\n\nYou pull the Corgi Pearls out of your pouch. \"They turned out to be part of a necklace of pearls,\" you say. \"That necklace was discovered to be an ancient artifact that summoned demons, \n*if (flg_necklaceLost)\n\tbut it was… lost at sea.\"\n\n\t*goto murra_check\n*else\n\tbut we recovered it.\"\n\t*goto murra_check\n\n*label murra_check\n\nMurra stares at the pearls. \"This…does seem to mesh with the information I've learned,\" he says. His face and voice radiate calm, but there's a tension in his body language you're not used to seeing from the elderly pug.\n\nYou nod, \n*if (flg_pearlsSeparate)\n\tand consider how much to give to him.\n\t\n\t*choice\n\t\t#I give him the Corgi Pearls, keeping the necklace. They belong to Pugmire.\n\t\t\tYou give him the Corgi Pearls. \"It's probably best if I keep the remaining pearls.\"\n\t\t\t*set flg_whoHasPearls 103\n\t\t\t*set per_loyal %+10\n\t\t\t*goto murra_check_2\n\t\t#I give him the Corgi Pearls. Maybe I can sell the other pearls to someone.\n\t\t\tYou give him the Corgi Pearls. \"It's probably best if I keep the remaining pearls.\"\n\t\t\t*set flg_whoHasPearls 103\n\t\t\t*set per_loyal %-10\n\t\t\t*goto murra_check_2\n\t\t#I give him all of the pearls. The Crown can keep them safe.\n\t\t\tYou give him the Corgi Pearls and the necklace. \"It's probably best if you keep all of them.\"\n\t\t\t*set flg_whoHasPearls 3\n\t\t\t*set per_idealist %+10\n\t\t\t*goto murra_check_2\n\t\t#I give him all of the pearls. I don't trust myself to keep them safe.\n\t\t\tYou hand him the Corgi Pearls and the necklace. \"It's probably best if you keep all of them.\"\n\t\t\t*set flg_whoHasPearls 3\n\t\t\t*set per_ego %-10\n\t\t\t*goto murra_check_2\n*else\n\tand give him the pearls.\n\t*set flg_whoHasPearls 3\n\t*goto murra_check_2\n\n*label murra_check_2\n*if rep_dog > 50\n\tHe scrutinizes the pearls in your paws, and shakes his head. \"I respect your honesty, and your integrity. But your reputation speaks for itself. You work hard for the benefit of dogs everywhere.\"\n\n\t\"Thank you, sir, but how does that relate to the pearls?\"\n\n\tHe shuffles some of the papers around, as if looking for something. After a few moments he sighs and looks back at you. \"In truth, I worry that us holding on to such an artifact would be dangerous. It would be better if a good dog, such as yourself, were to hold on to it. At least until we know what to do with it.\"\n\n\t*choice\n\t\t#I accept the pearls graciously.\n\t\t\tYou nod, flattered at the old dog's praise, and put the pearls away. \"Thank you,\" you whisper.\n\t\t\t*set flg_whoHasPearls 1\n\t\t\t*achieve keeppearls\n\t\t\t*goto murra_check_3\n\t\t#I politely refuse.\n\t\t\tYou shake your head, and push the pearls back to him. \"Thank you, but these should be in your paws. I wouldn't feel right keeping them.\"\n\n\t\t\tMurra nods, and carefully takes them from you. \"I will make sure these are kept in a secure location, so that no nefarious paws might claim them.\"\n\n\t\t\tYou nod. \"Thank you, sir.\"\n\t\t\t*goto murra_check_3\n\t\t#I keep the pearls. Does this make me a noble?\n\t\t\tYou nod, and put the pearls away. \"I guess this makes me a noble now, huh?\" you say, joking to break the tension.\n\n\t\t\tHe smiles. \"If that is your wish. Although I suspect presenting these to the Crown for your petition would make you much more of a target. Perhaps best to keep them secret, at least for now.\"\n\n\t\t\t\"Of course. Thank you.\"\n\t\t\t*set flg_whoHasPearls 1\n\t\t\t*achieve keeppearls\n\t\t\t*goto murra_check_3\n*else\n\tHe scrutinizes the pearls in your paws, and carefully takes them from you. \"I respect your honesty, and your integrity. I will make sure these are kept in a secure location, so that no nefarious paws might claim them.\"\n\n\tYou nod. \"Thank you, sir.\"\n\n\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \"Please, walk with me, and I can show you the wonderful library we have.\"\n\n\tYou follow the elderly pug to the well-stocked library, where he shows you all the wondrous tomes and texts preserved there. For the first time since you've met him, he sounds excited as he discusses the letters he recovered sent during the War of the Dogs and Cats, and his theories on where the first King of Pugmire is buried. Ten years seem to fall off Murra as he talks, giving him an energy and vitality you wouldn't have expected from such an old dog.\n\n\tAfter a highly educational hour, you thank him for his company, and follow the guards out of the castle.\n\t*set flg_whoHasPearls 3\n\t*goto illiad_tries_again\n\n*label murra_check_3\n\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \"Please, walk with me, and I can show you the wonderful library we have.\"\n\nYou follow the elderly pug to the well-stocked library, where he shows you all the wondrous tomes and texts preserved there. For the first time since you've met him, he sounds excited as he discusses the letters he recovered sent during the War of the Dogs and Cats, or his theories on where the first King of Pugmire is buried. Ten years seem to fall off Murra as he talks, giving him an energy and vitality you wouldn't have expected from such an old dog.\n\nAfter a highly educational hour, you thank him for his company, and follow the guards out of the castle.\n*goto illiad_tries_again\n\n*label ambassador_korat\nthe graveyard, where you last met Ambassador Korat. \n\n*if (((flg_damianDating = false) and (flg_damianStayed = false)) and (rel_damian \u003c 40))\n\t*set flg_damianDisapproves true\n*if (((flg_sonyaDating = false) and (flg_sonyaStayed = false)) and (rel_sonya \u003c 40))\n\t*set flg_sonyaDisapproves true\n\n*if (flg_damianDisapproves) and (flg_sonyaDisapproves)\n\tDamian and Sonya both become alarmed at your path.\n\n\t\"We're not going to the Corgi estate?\" Damian asks.\n\n\t\"The estate? You mean Castle Pugmire,\" Sonya counters.\n\n\t\"Neither,\" you say. \"I'm giving the pearls to Mau.\"\n\n\tDamian stops and stares at you. \"Are. You. [i]Insane?[/i]\" he yells. \"To the [i]cats[/i]?\"\n\n\t\"I agree with Damian,\" Sonya says. \"I may disagree on which dog to give the pearls to, but they should go to a dog.\"\n\n\t\"We talked about this in Waterdog Port,\" you argue.\n\n\t\"Yeah,\" Damian agrees reluctantly, \"but I kind of assumed you'd come to your senses between now and then.\"\n\n\t\"Well, I haven't,\" you argue, before realizing that isn't as great of a rebuttal as it sounded in your head.\n\n\t\"If you're going to betray your kingdom,\" Sonya says, \"I can't stand and watch you do it.\"\n\n\t\"For once I agree with the puppy,\" Damian says. \"You're on your own, boss.\"\n\n\tAnd with that, the two of them turn and leave you be. You watch them go. You didn't want it to be this way.\n\t*goto ambassador_korat_2\n*elseif (flg_sonyaDisapproves)\n\tSonya becomes increasingly concerned as she realizes you're not heading for the castle.\n\n\t\"So you're committed to this?\" she says. \"The cats?\"\n\n\t\"We talked about this in Waterdog Port,\" you argue.\n\n\t\"We did,\" she reluctantly agrees. \"But I wasn't sure you're really do it. If you're going to betray your kingdom, I can't stand and watch you do it.\" She turns on her heel. \"Goodbye, $!{plc_fname}.\"\n\n\tYou watch her go. You didn't want it to be this way.\n\t*goto ambassador_korat_2\n*elseif (flg_damianDisapproves)\n\tDamian becomes increasingly annoyed as he realizes you're not heading for the Corgi estate.\n\n\t\"So this is what we're doing?\" he says. \"After the Corgis trusted you. These things are far too dangerous to just give to the cats, of all people.\"\n\n\t\"We talked about this in Waterdog Port,\" you argue.\n\n\t\"Yeah,\" Damian agrees reluctantly, \"but I kind of assumed you'd come to your senses between now and then.\"\n\n\t\"Well, I haven't,\" you argue, before realizing that isn't as great of a rebuttal as it sounded in your head.\n\n\t\"You've turned your back on the Corgis,\" he says. \"And I'm not sticking around to watch you betray them.\"\n\n\tYou carefully put the pearls back in your pouch. \"That's unfair.\"\n\n\t\"Life's tough,\" he says, turning away from you and storming off. Over his shoulder, he yells, \"Goodbye, $!{plc_fname}.\"\n\n\tYou watch him go. You didn't want it to be this way.\n\t*goto ambassador_korat_2\n*else\n\tYou approach alone, to avoid any confrontations.\n\n*label ambassador_korat_2\n\nSurprisingly, you see Illiad von Korat standing by Padraig's grave. He throws a flower onto the grave. Grass is just starting to grow over the tilled earth where Padraig is buried. How long has it been since the funeral?\n\n\"Ah, dog,\" Illiad says. \"What news?\"\n\n*if flg_bowToMau = true\n\t*gosub bow_to_Mau\n\n*gosub lore_check\n\n\"And the pearls?\" He looks at you, expectantly.\n\t\n\"I still have them,\" you say, guardedly.\n\nThe cat smiles. \"Excellent.\"\n*gosub illiad_asks\n*goto ambassador_korat_leaves_graveyard\n\n*label ambassador_korat_leaves_graveyard\n\nThe ambassador shakes his fur. \"I have had enough of this dreary place.\" He looks down at the grave. \"You were a good dog, Corgi. Better than most.\" He sniffs loudly. \"Not as good as a cat, however.\" Illiad bows to you, and wanders away.\n*goto final_thoughts\n\n*label keep_pearls\nhome. You find a place to hide the pearls before spinning around three times and falling asleep in your own bed.\n\nYou dream of demons with round black teeth. Their skeletal fingers claw at your throat, and you can hear them whispering your name.\n\n\"$!{plc_fname}.\"\n\n\"[i]$!{plc_fname}[/i].\"\n\n\"[b][i]$!{plc_fname}[/i][/b]!\"\n\nYou wake, panting. Your paws are wet with sweat. Somehow you slept through the night. Putting on some new clothes, you decide to go out and clear your head.\n\n*label illiad_tries_again\n\n*page_break\nBack on the streets of Pugmire, you are surprised to see a black and red carriage pull up next to you. A door opens, and inside you see Ambassador Illiad von Korat.\n\n\"Dog,\" he says cordially. \"It is good to see you. Please, come inside where it does not smell so much.\"\n\nYou don't seem to have much of a choice.\n\n\"Tell me,\" he says once you've settled in and closed the door. \"What news?\"\n\n*if flg_bowToMau = true\n\t*gosub bow_to_Mau\n\n*gosub lore_check\n\n\"And the pearls?\" He looks at you, expectantly.\n\t\n*if flg_whoHasPearls = 2\n\t\"Returned to the Corgis, where they belong.\"\n\n\tIlliad nods. \"I suppose it was too much to expect them to be returned to their rightful place. It is as Man says: 'Finders keepers.'\"\n\t*goto ambassador_korat_leaves_carriage\n*elseif flg_whoHasPearls = 3\n\t\"Given to the Pug family, so they can protect it.\"\n\n\tIlliad nods. \"I suppose it was too much to expect them to be returned to their rightful place. It is as Man says: 'Finders keepers.'\"\n\t*goto ambassador_korat_leaves_carriage\n*elseif flg_whoHasPearls = 1\n\t\"I still have them,\" you say, guardedly.\n\n\tThe cat smiles. \"Excellent.\"\n\t*gosub illiad_asks\n\t*goto ambassador_korat_leaves_carriage\n*else\n\t\"I have some of them,\" you say, guardedly. \n\t*if flg_whoHasPearls = 102\n\t\t\"The rest are in the paws of the Corgis, where they belong.\"\n\n\t\tIlliad frowns. \"Not ideal, but acceptable.\"\n\t\t*gosub illiad_asks\n\t\t*goto ambassador_korat_leaves_carriage\n\t*elseif flg_whoHasPearls = 103\n\t\t\"The rest are in the paws of the Pug family, so they can protect the pearls.\"\n\n\t\tIlliad frowns. \"Not ideal, but acceptable.\"\n\t\t*gosub illiad_asks\n\t\t*goto ambassador_korat_leaves_carriage\n\n*label ambassador_korat_leaves_carriage\n\nHe looks at his wrist. You recognize the motion—one of the ancient rituals of Man that means a conversation has ended. \"Unfortunately, I am due to speak with your charming king momentarily. I would offer to give you a ride, but I won't.\" He smiles, showing you a lot of teeth. \"Farewell, dog.\"\n\nAgain, with little option, you step out of the carriage.\n*goto final_thoughts\n\n*label bow_to_Mau\n\n\"I've captured the pirate Greedy Bow,\" you say.\n\nIlliad shrugs. \"What does that mean for me?\"\n\n\"He's a notorious cat pirate. I had assumed the monarchies would appreciate such a criminal being…returned to them.\"\n\nThe ambassador smoothed his whiskers. \"Such a noble gesture from a dog like yourself. I'll have my people pick him up from whatever filthy ship's hold you've tossed him into.\"\n\n\"The hold isn't filthy,\" you bristle, but Illiad ignores you.\n*return\n\n*label lore_check\n\n\"What of our arrangement? Have you learned much on how to handle the dangers of the outside world?\"\n\n*if stg_lore > 2\n\t\"I have. I've learned a great many things about dangerous elements in the world.\" You look the cat in the eye. \n\t*if (flg_agreedGiveLoreToIlliad)\n\t\t*choice\n\t\t\t#\"And I'll give it to you, as we agreed.\"\n\t\t\t\t\"And I'll give it to you, as we agreed.\" You rattle off all the ways to incapacitate, confuse, or neutralize enemies that don't involve outright killing them.\n\n\t\t\t\tOnce you finish, Illiad nods. \"Excellent. It is so refreshing to work with a dog that keeps ${plc_his} word.\" He dusts some imaginary dirt off his cloak.\n\t\t\t\t*set per_idealist %+10\n\t\t\t\t*return\n\t\t\t#\"But I want to get paid for it.\"\n\t\t\t\t\"But I want to get paid for it.\"\n\n\t\t\t\tIlliad sighs. \"Of course. I would not expect a dog to be blindly loyal to my cause.\" He gives over a small pouch of plastic coins. Once you've checked to confirm their contents, you rattle off all the ways to incapacitate, confuse, or neutralize enemies that don't involve outright killing them.\n\n\t\t\t\tOnce you finish, Illiad nods. \"Excellent. A pleasure doing business with you.\" He dusts some imaginary dirt off his cloak.\n\t\t\t\t*set oth_coins +3\n\t\t\t\t*set per_idealist %-10\n\t\t\t\t*return\n\t\t\t#\"I've changed my mind, however. That knowledge is for myself.\"\n\t\t\t\t\"I've changed my mind, however. That knowledge is for myself, and for those dogs I pledge my loyalty to.\"\n\n\t\t\t\tIlliad frowns. \"The propensity for dogs to indulge in blind loyalty is something I'll never understand.\" He dusts some imaginary dirt off his cloak.\n\t\t\t\t*set per_loyal %+10\n\t\t\t\t*return\n\t*else\n\t\t\"But that knowledge is for myself, and for those dogs I pledge my loyalty to.\"\n\n\t\tIlliad frowns. \"The propensity for dogs to indulge in blind loyalty is something I'll never understand.\" He dusts some imaginary dirt off his cloak.\n\t\t*return\n*else\n\t\"I've forgotten a lot. I had other things going on.\"\n\n\t*if (flg_agreedGiveLoreToIlliad)\n\t\tIlliad frowns. \"I can't tell if you're lying or just stupid. But I am used to disappointment.\" He dusts some imaginary dirt off his cloak.\n\t\t*return\n\t*else\n\t\tIlliad sighs. \"I suppose that's to be expected. I didn't really expect you to tell me anyway, but at least I know your information is worthless regardless.\" He dusts some imaginary dirt off his cloak.\n\t\t*return\n\n*label illiad_asks\n\n\"I suppose you expect me to give them to you.\"\n\n*achieve keeppearls\n*if rep_cat > 50\n\tHe shakes his head. \"On the contrary. You have proven your devotion to the cause of the monarchies several times over. I find it convenient to leave them in the capable paws of a friend. Instead of near where other cats might seek to snatch them away.\" His eyes bore into yours. \"Understand what an honor this is, dog.\"\n\n\tYou nod.\n\t*return\n*else\n\t*if stg_lore > 2\n\t\tHe shakes his head. \"On the contrary. You have a deep knowledge of the dangers of the world, as you admitted. This makes you dangerous yourself. I find it convenient to leave the pearls in the capable paws of one such as you. Instead of near where other cats might seek to snatch them away.\" His eyes bore into yours. \"Understand what an honor this is, dog.\"\n\n\t\tYou nod.\n\t\t*return\n\t*else\n\t\t\"Yes,\" he says. \"Although I should not assume a dog would respect the return of a cat's ancient property. You all think anything you find lying around is yours, do you not?\"\n\n\t\tYou start to protest. \"That's not—\"\n\n\t\tIlliad's eyes bore into yours. \"Understand, dog, that should I desire those pearls, I will take them whenever I desire. I simply choose to leave them in your capable paws, for reasons of my own. Never give me cause to reverse my generous stance. Do you understand?\"\n\n\t\tYou nod.\n\t\t*return\n\n*label final_thoughts\n*page_break\n*if (flg_talkedToFiona = false)\n\t*gosub go_home\n\t*goto nopearls_fiona\n*elseif (flg_talkedToMurra = false)\n\t*gosub go_home\n\t*goto nopearls_murra\n*else\n\tAs you watch Illiad leave, \n\t*goto final_thoughts_2\n\n*label go_home\nYou watch Illiad leave. You sigh—talking to that cat is exhausting—and decide to head back home for some rest.\n\nAnd are surprised to see a carriage sitting next to your door, emblazoned with the symbol of the \n*return\n\n*label nopearls_fiona\nCorgi family. Fiona. You suppose you should have expected this. The driver of the carriage, a younger corgi, tries to ignore you but keeps glancing down to see what's happening.\n\nStepping up to the carriage, you knock on the door. Within moments, Fiona opens it. She looks older than you remember.\n\n\"$!{plc_fname}, come in,\" she says, sliding aside to make room on the leather bench.\n\n*fake_choice\n\t#I step inside and sit down.\n\t\tWithout hesitation, you step up into the carriage and sit down next to her.\n\t#I remain standing outside the carriage.\n\t\tYou shake your head. \"I'll stay out here,\" you say, refusing to move.\n\n\t\tShe sighs and shakes her head. \"I need to discuss something in private with you,\" she says carefully. \"It is best not discussed on the street.\"\n\n\t\tYou think for a moment, and realize that the only way to get this conversation over with is to step into the carriage. Reluctantly, you step up into the carriage and sit down next to her.\n\t#I motion her to my house instead.\n\t\t\"Please, come inside,\" you say, motioning to your door.\n\n\t\t\"I'd be delighted,\" she says without hesitation. \"If it won't be a bother?\" She steps down from the carriage, and you unlock the door to your house. Within a few minutes, you've offered her your most comfortable chair, and you take a seat across from her.\n\n\"I'm sorry to meet you like this,\" Fiona says by way of preamble. \"But I've been anxious for news.\"\n\nYou take a deep breath. \"We confronted the bird who killed your brother. Their name is Ambrosia Five Sins, and they were with a pirate named Greedy Bow. @{flg_ambrosiaWandKept I have the wand they used to kill Padraig.\" You give it to her, still carefully wrapped in cloth. \"Be careful.\" She shivers before taking it and putting it into a pocket on her robe.|That pirate stole the pearls.\" She nods in understanding.}\n\n\"Thank you,\" she says. \n*if (flg_sentKittenToFiona)\n\t\"Oh, which reminds me. Thank you for sending that kitten to me.\"\n\n\t\"They actually showed up?\" you say, surprised.\n\n\tShe laughs. \"They ate
