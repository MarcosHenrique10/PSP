t a plastic coin covered in ashes. \"Here you go.\" \n\t\t*set oth_coins +1\n\t\t*goto pirate_leaves\n\n*label pirate_leaves\nShe straightens her charred coat. \"Now if you'll excuse me, I should see a dog about some healing.\" The pirate walks off with what remains of her dignity.\n\nDamian sighs. \"This is why I hate cats,\" he says. \"They all think they're so Man-damned clever.\"\n\nSonya looks at you. \"If we're going to travel to Houndton, we should leave soon.\"\n\nThe three of you head off, looking for something less burnt to travel in.\n*achieve endchapter2\n*finish [i]Chapter Three: The Haunted Castle[/i]\n\n*label no_pirate\n\nAfter the fire dies down, you examine the wreckage. It seems hopeless, nothing but a mess of waterlogged and charred hunks of wood. After what seems like forever, Damian calls you over. \"Found something!\"\n\nHe carefully pulls open a rolled scrap of parchment. You can barely make out it's a map of the area just to the south of Pugmire. The city of Houndton is circled in red ink.\n\n\"This might be where those cats are heading,\" he says. \"And the name on the scroll case was 'Patches'.\"\n\n\"Where's the scroll case?\" Sonya asks.\n\n\"In my rucksack, awaiting the opportunity to be exchanged for some thick coins or a nice meal in Houndton.\"\n\nSonya sighs and shakes her head. \"Well, if we're going to travel, we should leave soon.\"\n\nThe three of you head off, looking for something less on fire to travel in.\n*achieve endchapter2\n*finish [i]Chapter Three: The Haunted Castle[/i]", "03-houndton": "*temp flg_enterBar 0\n*temp flg_suspensefulFoyer false\n*temp flg_loomingLibrary false\n*temp flg_ifLibraryBook false\n*temp flg_ifLibraryWater false\n*temp flg_deadlyArtGallery false\n*temp flg_ifGallery false\n*temp flg_ifGalleryRemove false\n*temp flg_decayingLanding false\n*temp flg_ominousDiningRoom false\n*temp flg_ifDining false\n*temp flg_ifLarder false\n*temp flg_miserableMasterBedroom false\n*temp flg_ifBedroom false\n*temp flg_hummingThing 0\n*text_image chap_3.png center [b]Chapter Three: The Haunted Castle[/b]\n\nSonya gestures expressively with her paws. \"And that's when we discovered the pirate captain…\"\n\n\"Patches,\" Damian interjects.\n\n\"Right, the pirate captain Patches is on her way to Houndton.\"\n\n\"Which is bad,\" Damian adds.\n\n\"Very bad,\" Sonya agrees. \"Patches might have some information we need, so we have to track her down as soon as possible.\"\n\n\"Faster, even.\"\n\n\"Which is where you come in.\"\n\nThe hound stares in the wake of Sonya's relentless monologue. \"Ma'am, this is a horse stable.\"\n\nYou sigh, putting your paw over your eyes. \n\n*page_break\nAn hour ago, this all seemed like a good idea. With a ship in the docks on fire and angry pirates sailing on the river looking for the culprits, Sonya suggested the best course of action would be getting some fast ground transport to Houndton in order to catch up with Patches. \n\nDamian, surprisingly, agreed, but pointed out the group would lose valuable time heading back to Castle Pugmire and going through the bureaucracy of formally requisitioning horses from the royal stables. He insisted you should get some horses nearby instead.\n\nOf course, Damian suggested simply stealing the horses, as well as teaching the horses to walk on two legs and talk like people. Everyone knows horses aren't people, but you assumed Damian was just teasing. Sonya, ignoring these suggestions, said she could convince a stable owner to lend the horses, and you agreed. So far, this has resulted in her explaining the entire situation to a confused horse trainer.\n\nDamian steps in front of Sonya to cut off her rambling explanation. \"Look, the short version is we need three fast horses. Now. Or you'll have to take it up with my boss here,\" he says, nodding to you as he pulls out a jet-black dagger and starts trimming his claws with it. \n\n*choice\n\t#I look fierce, like I might go wild at any moment.\n\t\tYou cross your arms and stare at the horse trainer, attempting to look fierce.\n\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 50\n\t\t\tThe hound quickly puts up his paws. \"Okay, okay! Here, take three of my horses. Just don't hurt me!\" \n\t\t\t*set rep_dog %+10\n\t\t\t*goto to_houndton\n\t\t*else\n\t\t\tThe hound sighs, clearly not impressed with your attempt. \"Fine, whatever. Here, take three of my horses. Just stop staring at me!\" \n\t\t\t*set rep_dog %-10\n\t\t\t*goto to_houndton\n\t#Being as friendly as possible, I implore him to be a good dog.\n\t\tYou clasp your paws together and try to look as friendly as possible. \"We are in desperate need, and the Code of Man says we should all be good dogs, does it not?\"\n\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 50\n\t\t\tThe hound smiles. \"I can't say no to puppy dog eyes like that. Here, take three of my horses. May the Old Ones always leave a light out for you.\"\n\t\t\t*set rep_dog %+10\n\t\t\t*goto to_houndton\n\t\t*else\n\t\t\tThe hound looks away. \"Fine, whatever. Here, take three of my horses. Just stop staring at me!\"\n\t\t\t*set rep_dog %-10\n\t\t\t*goto to_houndton\n\t#I give a lot of words and facts as to why this course of action is best.\n\t\tYou begin to explain why giving you the horses is the best course of action, both for him and for the whole kingdom. You go into great detail, pulling up every fact and piece of information you can.\n\n\t\tThe hound puts a paw up, cutting you off. \n\t\t*set att_clever %+05\n\t\t*if att_clever > 50\n\t\t\t\"I see now the kingdom needs your help. Here, take three of my horses. May the Old Ones always leave a light out for you.\"\n\t\t\t*set rep_dog %+10\n\t\t\t*goto to_houndton\n\t\t*else\n\t\t\t\"Please, not another tirade I don't understand. Here, take three of my horses. Just stop talking!\"\n\t\t\t*set rep_dog %-10\n\t\t\t*goto to_houndton\n\t*selectable_if (oth_coins > 0) #I offer a coin to convince him of our need.\n\t\tYou dig a plastic coin out of your purse. \"Maybe this can help you with your decision?\"\n\n\t\tHe takes the coin and pockets it. \"I see now the kingdom needs your help. Here, take three of my horses.\"\n\t\t*set rep_dog %+10\n\t\t*set oth_coins -1\n\t\t*goto to_houndton\n\n*label to_houndton\n\nThe trainer gestures to three horses quietly grazing nearby. Their deep green hair looks reasonably well-groomed, and as you approach you only get a couple of ear flicks in response. The three of you put threadbare blankets and well-worn saddles on the steeds and start your trip to Houndton.\n\n*page_break The Next Day\nThe last day was a hard ride. Damian, being a city dog, took a while to get used to riding a horse for so long, and the road was muddy from all the recent rain. Riding through a long, hot afternoon didn't help, nor did seeing nothing but grass and dirt for miles. Not getting as far as you had hoped, you decided to break for camp early. Sonya and Damian, both exhausted from the ride, ate their rations of tough jerky in silence before curling up on their bedrolls to sleep.\n\nToday has been different. You woke up to Damian complaining about how sore he was, how loudly Sonya snored, how dry the jerky was, and any other annoyance that came to his mind. Realizing the sun was coming up and you weren't going to get any more sleep today, you stretched your aching muscles before waking Sonya. The three of you sleepily packed up your camp, got back on your horses, and rode.\n\nBut Damian, clearly bored now that riding presented no challenge and annoyed by his soreness, kept babbling on. When you passed a small village, Damian insulted the color of the thatch on the roofs of their houses. When there were no people around, he complained about the heat of the sun. When riding under a copse of shady trees, he complained about how the leaves smelled funny. Now it's midday, and you're riding next to Sonya on a rocky portion of the road.\n\n\"We should slow down a bit here,\" Sonya advised. \"We don't want our horses slipping on a loose rock.\"\n\nDamian barked laughter from behind the two of you. \"Great. Now even the rocks are against us. I hate everything about this road.\"\n\n*if rel_Sonya > 50\n\tSonya takes a deep breath and looks at you. \"I swear to Man if he says one more thing, I'm going to punch him in the snout.\"\n\n\tYou smile a little. \"Don't let him get to you. We're trained to be explorers, but I doubt Damian's done much riding outside of a carriage. And we're not too far from Houndton.\"\n\n\t\"You're right, of course,\" she says. Then she punches the air. \"But right in the snout, I'm telling you.\"\n\t*goto about_houndton\n*else\n\tSonya grits her teeth. \"That's it,\" she says, and pulls on her horse's reins. The horse slows its trot, and falls behind to ride alongside Damian.\n\n\t\"Do we have to ride [i]that[/i] slow?\" he asks. \"I was hoping to get to Houndton before the Old Ones came back.\"\n\n\t\"One more thing,\" you hear her growl. \"Just complain about one more thing, and so help me Man I will punch you.\"\n\n\tWorried about Damian's propensity to mouth off, you start to slow your horse as well as you hear him say \"So you're—\"\n\n\tYou see Sonya ball her paw up into a fist. \"One. More. Thing.\"\n\n\t\"Everything okay back here?\" you ask.\n\n\tDamian visibly gulps. \"Nope, everything's fine, boss,\" he says. Sonya nods once, and kicks her horse back to a fast trot.\n\t*goto about_houndton\n\n*label about_houndton\n\nThe rest of the day is uneventful. You stop at a quaint little area called \"Yorkshire Village,\" where you find a simple but hearty meal and comfortable beds in a common room next to a warm fire. Contented with food and warmth, you curl your aching body on the bed next to the fire, and immediately fall asleep.\n\n*page_break The Next Day\nYou wake up to Sonya and Damian muttering in the corner. They notice you wake up, and quickly end their conversation. \"Morning, boss!\" Damian says in a chipper tone. Sonya gets up and pays for your food and room. You wonder what they were talking about. Collecting your supplies and horses, you head back out.\n\nBefore the sun is fully above you, the land becomes hilly and craggy, and buildings dot the land in the distance. Unlike the thatch and wood buildings you saw before, these are made of stone—the same color stone as the crags dotting the landscape. Sonya rides her horse up close to you. \"We'll reach Houndton soon. Are you familiar with its history?\"\n\n*choice\n\t#No. I want to learn more.\n\t\t*goto houndton_history\n\t#Yes, but I'm curious to hear what Sonya knows.\n\t\t*goto houndton_history\n\t#Yes. No need to go over it again.\n\t\tAs you ride, you can see more buildings coming into view. You notice a couple of farmers working in the distance. One of them, a hound with dark fur, waves at you as you ride past.\n\n\t\t\"Yes,\" you say after a long moment. \"It was established a while back as the Hounds broke off from Pugmire, right?\"\n\n\t\tShe nods. \"Long story short, Wilfred Hound became King of Pugmire, and was a fair king that attempted to be impartial in every way. But many of the hounds were annoyed, because they all thought they would receive special treatment.\"\n\n\t\tDamian pulls out one of his rations and starts chewing on it loudly. \"Oh no, the nobility didn't get what they wanted.\"\n\n\t\tSonya rolls her eyes. \"You don't like nobles, Damian. We get it. No need to keep barking about it.\" Damian belches loudly behind her back as she continues. \"Some of the Hound families left to build their own 'hound towns' to the south.\" She waves her paw to encompass the view in front of you. \"Hence, Houndton.\"\n\n\t\t*page_break\n\t\t*goto entering_houndton\n\n*label houndton_history\n\"No. Tell me about it,\" you say.\n\nShe nods. \"My father loved history, and told me about it when I was a puppy.\"\n\nDamian, hearing the two of you talking, rides his horse closer so he can hear. Sonya looks off into the distance as she speaks.\n\n\"Houndton didn't start off as a kingdom like Pugmire. It's more like a collection of noble estates that evolved into a kingdom over time. Queen Amelia Pug II was the ruler of Pugmire a long time ago, but some of the Hound families thought the Pug family had been on the throne for too long, and they deserved a chance to rule.\"\n\nDamian snorts. \"Nobles biting each other for a little scrap of power? I'm shocked,\" he mutters, sarcastically.\n\nSonya continues. \"Duke Wilfred Hound was the leader of the Hounds, and he was very charismatic. He spoke with all the other nobles, explaining it was better to have nobility tied to the Code of Man, rather than granted by the whim of the Crown. He's the one that convinced the Crown a family's noble status should be tied to possession of a relic of Man.\"\n\n\"And that's why the Corgis are in the mess they're in,\" Damian adds.\n\n*fake_choice\n\t#\"Sounds like Wilfred Hound knew how to sway a crowd.\"\n\t\t\"Sounds like Wilfred Hound knew how to sway a crowd,\" you say.\n\n\t\tSonya nods. \"He might have done it just to put his family on the throne, but that doesn't mean it was a bad idea.\"\n\t\t*set per_idealist %-10\n\t#\"I agree, only good dogs should be rewarded.\"\n\t\t\"I agree, only good dogs should be rewarded,\" you say.\n\n\t\tSonya nods. \"He might have done it just to put his family on the throne, but that doesn't mean it was a bad idea.\"\n\t\t*set per_idealist %+10\n\t#\"Wilfred was disloyal to the queen.\"\n\t\t\"Wilfred was disloyal to the queen,\" you say.\n\n\t\tDamian shrugs. \"Nobles only care about themselves. That's how it's always been, far as I can tell.\"\n\t\t*set per_loyal %+10\n\t#\"I'm surprised he bothered to stick around and work the system.\"\n\t\t\"I'm surprised he bothered to stick around and work the system,\" you say.\n\n\t\tDamian laughs. \"Wait for the rest of the story, boss.\"\n\t\t*set per_loyal %-10\n\nAs you ride, you can see more buildings coming into view. You notice a couple of farmers working in the distance. One of them, a hound with dark fur, waves at you as you ride past.\n\n\"Long story short,\" Sonya continues. \"Amelia Pug abdicated, and let the dukes and duchesses decide who would be the next ruler. Wilfred got it, and was a fair king that attempted to be impartial in every way. But many of the hounds were annoyed, because they all thought they would receive special treatment.\"\n\nDamian pulls out one of his rations and starts chewing on it loudly. \"Oh no, the nobility didn't get what they wanted.\"\n\nSonya rolls her eyes. \"You don't like nobles, Damian. We get it. No need to keep barking about it.\" Damian belches loudly behind her back as she continues. \"Some of the Hounds broke off and made their own families, like the Basset-Hounds and the Pharaoh-Hounds. So when King Wilfred passed on, the Hound power base was diffused compared to how it was under Queen Amelia. The Papillons, meanwhile, had been building bridges while the Hounds were squabbling. Queen Carmella Papillon was voted to take the throne, and several of the Hound families left to build their own 'hound towns' to the south.\"\n\nShe waves her paw to encompass the view in front of you. \"Hence, Houndton.\"\n\n*page_break\n\n*label entering_houndton\nClouds roll in as the sun starts to set, and Houndton proper comes into view. Unlike Pugmire, which is carefully organized into four quarters, Houndton is a haphazard collection of castles and manors. Markets and inns are run out of old, crumbling houses, which sit next to farmhouses, ramshackle homes, and ornate estates. Each building is made from the same dreary stone as the ones you saw on the outskirts of town.\n\nTrue to its name, many of the dogs working the fields or wandering the streets are a wide variety of hounds. A few cats, rats, and mice are also around, but dogs are clearly the majority of the residents. A few of the residents wave or say hello as you ride, but most keep their eyes down, focused on their tasks. The whole town feels exhausted, like someone trying to keep their cheer up after too long of a ride. Or maybe that's just because you've had a long ride yourself. The three of you find a sign for the Plott-Hound Stables, and Sonya pays the stabledog to feed and water the horses.\n\n\"Where do you want to start?\" Sonya asks. Immediately after the question is asked, the three of you hear a loud crash from behind you, as a labrador is thrown through a window, shattering the glass. The sign above the window reads \"The Pharaoh's Head.\"\n\nDamian rubs his paws together. \"Any bar that has defenestration is my kind of place.\" Sonya simply crosses her arms, waiting for your action.\n\n*fake_choice\n\t#I run inside, hoping for a fight.\n\t\tYou rush into the bar, preparing for a brawl.\n\n\t\t*set flg_enterBar 1\n\t\t*set per_tame %-10\n\t#I carefully enter, in order to avoid the conflict.\n\t\tYou carefully open the door, keeping an eye out for trouble.\n\n\t\t*set flg_enterBar 2\n\t\t*set per_tame %+10\n\t#I swagger through the door, making sure people see me.\n\t\tYou confidently swagger through the door, making a big scene of your entrance. \n\n\t\t*set flg_enterBar 3\n\t\t*set per_ego %+10\n\n[i]The Pharaoh's Head[/i] looks like a surprisingly nice bar. The floor is clean, the chairs generally match each other, and the tables don't look like they've been repaired more than once or twice. Not at all the kind of place you'd expect a bar fight to break out in. And yet, looking out the broken window are three rough-looking cats wearing patched leather armor with swords at their sides. All of them are laughing at the poor labrador, who is slowly picking themself up off the ground. The rest of the patrons look terrified as the skies grow darker.\n\n\"Not quite the dive I expected,\" Damian says, his paw slowly reaching for his daggers.\n\n\"But exactly the kind of ruffians [i]I[/i] expected,\" Sonya says, cracking her knuckles.\n\n*if flg_enterBar = 1\n\tYou nod, reaching for your weapons as well.\n\n\tThe cats look at all of you: three armed dogs who clearly seem ready for a fight. The largest cat, with fluffy brown fur, steps forward to meet your challenge. \"Let's get 'em, mateys,\" he says.\n\n\tAfter a moment, realizing he hasn't heard anything, he looks around. \"Mateys?\" he asks, as he notices the other two cats running off.\n*if flg_enterBar = 2\n\tYou put your paws up and step in front of your companions. \"Now now, we don't want a fight.\"\n\n\t\"We don't?\" Damian asks.\n\n\tThe largest cat, with fluffy brown fur, steps forward. \"Yeah, we want a fight, too.\"\n\n\tSonya smiles and crosses her arms. \"That's you and who else?\" she asks.\n\n\t\"My mateys, of course!\" The cat turns around, just in time to notice his friends running off.\n*if flg_enterBar = 3\n\tYou step in front of your companions. \"Come now. These cats wouldn't want to tangle with someone as well-known as me.\"\n\n\tThe largest cat, with fluffy brown fur, steps forward. \"And who are you, then?\"\n\n\t\"$!{plc_fullname},\" you say proudly.\n\n\t\"Never heard of you,\" the cat mutters. \"Come on, mateys, let's get 'em.\"\n\n\tAfter a moment, realizing he hasn't heard anything, he looks around. \"Mateys?\" he asks, as he notices the other two cats running off.\n\nSonya puts a heavy paw on the cat's shoulder. \"Still want to fight?\" she asks, her tail wagging enthusiastically.\n\nThe cat sighs, and puts his paws up.\n\n*page_break\nYou look the cat in the eye. \"What's your name?\"\n\n\"Tiny,\" the cat says quickly. \"Currently between crews.\"\n\n\"Should have seen that coming,\" Damian mutters. Sonya shushes him.\n\n\"We're looking for a specific cat, Tiny,\" you continue. \"A captain by the name of Patches.\"\n\nThe cat looks indignant. \"So you assume just because I'm a cat, I should know every other cat? Maybe I've never met this pirate before. For all I know, she was never here.\"\n\n*fake_choice\n\t#\"We never mentioned she was a pirate.\"\n\t\t\"We never mentioned she was a pirate,\" you say.\n\n\t\t\"Good catch,\" Damian says.\n\n\t#\"How did you know Patches is a 'she'?\"\n\t\t\"How did you know Patches is a 'she'?\" you ask.\n\n\t\t\"I noticed that, too,\" Sonya says.\n\n\t#\"It's not because you're a cat. It's because you're a sailor.\"\n\t\t\"It's not because you're a cat. It's because you're a sailor,\" you say.\n\n\t\t\"How do you know that?\" Damian asks.\n\n\t\tSonya quickly responds. \"Tiny said he was 'between crews.' Which probably means he's a sailor.\"\n\n\t\t\"Could have been construction crews,\" Damian points out, but Sonya shushes him again.\n\nTiny puts his face in his massive paw. \"Okay, okay. You got me. Patches came in last night, and said a few dogs were on her tail. She was asking around about a good place to hide.\"\n\n\"And did she find a place?\" you ask.\n\n\"Yeah. An old castle that used to be owned by the Transylvania-Hounds.\"\n\nAt that moment, there's a crack of thunder, and rain begins to fall outside.\n\n\"That's not ominous at all,\" Damian says.\n\nTiny pays for the damages to the bar, while you ask the other patrons of the bar about Castle Transylvania-Hound. Unfortunately, the locals are reluctant to talk about it. All you get are some vague directions, and wildly conflicting stories about the fate of its original owner, Wynn Transylvania-Hound. All you know for sure is the castle is haunted. One dog actually curls up on the floor and shivers at the mention of Wynn Transylvania-Hound.\n\nSonya and Damian agree you need to go now, before Patches slips back out of the castle and flees. The patrons warn against going to the castle on such a dark night, but there's no getting around it. You reclaim your horses and head off in the downpour, reminded of the rainy funeral you so recently attended.\n\n*page_break\nIt's a reasonably short walk to the craggy hill the castle sits on, but in the pouring rain it feels like an eternity. \n\n\"Once inside, we should look for any interesting information we can find,\" Sonya suggests. \"These old castles can be full of useful things.\"\n\n\"I agree with the pup, boss,\" Damian says, and for once Sonya doesn't get angry at the insult. \"Let's keep our eyes open.\"\n\nAs he speaks, lightning splits the sky, dramatically lighting the edifice of the building ahead of you. Castle Transylvania-Hound looks old, with large portions of it crumbling away. As you climb the winding road, you can see there are holes in some of the walls, and many of the windows are cracked and shattered.\n\n\"Not that I want to see much of what's in there,\" he adds.\n\n*fake_choice\n\t#\"I'll keep an eye on both your backs.\"\n\t\t\"I'll keep an eye on both your backs,\" you say.\n\n\t\tThey both smile in appreciation as you trudge up the rain-slick hill.\n\t\t*set per_loyal %+10\n\t#\"Bah, nothing in there can stop a Pioneer like me!\"\n\t\t\"Bah, nothing in there can stop a Pioneer like me!\" you say.\n\n\t\tThey both look at each other and shrug as you trudge up the rain-slick hill.\n\t\t*set per_ego %+10\n\t#\"All I want is that cat's neck in my paws.\"\n\t\t\"All I want is that cat's neck in my paws,\" you say.\n\n\t\tThey both nod in agreement as you trudge up the rain-slick hill.\n\t\t*set per_tame %-10\n\n*page_break Climb the Treacherous Hill\nThe castle doesn't look much better at the top of the hill. The front courtyard is paved with old stones, but most of them are cracked or torn up, causing the whole area to be spotted with newly-forming mud puddles. What might have once been a horse stable now just looks like a pile of rubble and moldering lumber. A single dead tree stands in the middle of the destruction, its trunk rent open by a lightning strike, or perhaps something more sinister.\n\n\"Are any demons in there?\" Sonya asks.\n\n\"I don't know,\" you say honestly.\n\nShe shivers next to you. \"My mother was killed by a demon. I've been terrified of them ever since.\"\n\nDamian snorts. \"My ex-lover was killed by an undead abomination. You don't see me whimpering about it, do you?\" But it comes out more melancholy than angry.\n\n*choice\n\t#I agree with Damian. We need to push past our fears.\n\t\t\"We're all scared, but we need to get our paws on Patches.\" You awkwardly pat Sonya's shoulder. \"So push through it, and let's get going.\" \n\n\t\tSonya frowns, but reluctantly nods as you cross the courtyard.\n\t\t*set per_idealist %-10\n\t\t*set rel_Sonya %-10\n\t\t*set rel_Damian %+10\n\t\t*goto 1_suspenseful_foyer\n\t#I agree with Sonya. Fear keeps us cautious.\n\t\t\"We're all scared, but that will keep us sharp.\" You put an arm around Sonya's shoulders. \"We're here to make sure nothing happens to you.\"\n\n\t\tSonya smiles briefly and nods as you cross the courtyard.\n\t\t*set per_idealist %-10\n\t\t*set rel_Sonya %+10\n\t\t*set rel_Damian %-10\n\t\t*goto 1_suspenseful_foyer\n\t#I agree with Damian. No demon is stronger than us!\n\t\t\"We're three mighty dogs,\" you say to Sonya. \"No reason to be scared at all! We can deal with anything this castle throws at us.\"\n\n\t\tSonya frowns, but reluctantly nods as you cross the courtyard.\n\t\t*set per_ego %+10\n\t\t*set rel_Sonya %-10\n\t\t*set rel_Damian %+10\n\t\t*goto 1_suspenseful_foyer\n\t#I agree with Sonya. We're still inexperienced dogs.\n\t\t\"We're still new at this, Damian,\" you say, \"and I don't know if I can handle a demon. We should be careful, and leave as soon as we have Patches in our paws.\"\n\n\t\tSonya smiles briefly and nods as you cross the courtyard.\n\t\t*set per_ego %-10\n\t\t*set rel_Sonya %+10\n\t\t*set rel_Damian %-10\n\t\t*goto 1_suspenseful_foyer\n\n*label 1_suspenseful_foyer\n*if flg_suspensefulFoyer = false\n\t*set flg_suspensefulFoyer true\n\t*goto 1_suspenseful_foyer_unexplored\n*if flg_suspensefulFoyer = true\n\n\t[b]Suspenseful Foyer[/b]\n\n\tYou're back in the foyer. The door leading out is still locked. Damian is still annoyed by it.\n\n\t*choice\n\t\t#I open the @{flg_loomingLibrary door to the library.|door on the left.}\n\t\t\t*goto 1_looming_library\n\t\t#I walk through @{flg_deadlyArtGallery to the art gallery.|the door on the right.}\n\t\t\t*goto 1_deadly_art_gallery\n\t\t#I take the staircase upstairs.\n\t\t\t*goto 2_decaying_landing\n\n*label 1_suspenseful_foyer_unexplored\n\nGiven the general state of disrepair of the castle as a whole, the main door is in surprisingly good shape. The wood looks new, a nice red stain on the wood polished to a shiny finish. A heavy metal handle hangs above the door's ancient lock.\n\n\"Looks well-oiled,\" Damian mutters. \"I think the gates of Castle Pugmire look in worse shape than this.\"\n\n\"So why would you have a brand-new door on such a decrepit castle?\" Sonya asks.\n\n*if plc_calling = \"Ratter\"\n\tInstead of answering, you lean down and pick the ancient lock. Within a few wags, you hear a heavy \"click\" and the door swings slowly open.\n\n\t\"Hey, nice work, boss,\" Damian says.\n\n\tBut you were still in the process of manipulating the lock when it opened. \n\t*goto open_door\n*else\n\tAs you think of an answer, Damian leans down and starts to pick the ancient lock. Within a few wags, you hear a heavy \"click\" and the door swings slowly open.\n\n\t\"Good work,\" you say to Damian.\n\n\tBut Damian stands up, looking confused. \"I wasn't done picking it,\" he says gloomily. \"It just opened by itself.\"\n\t*goto open_door\n\n*label open_door\n\nNervously, the three of you quickly tie up your nervous horses and step inside.\n\n*page_break\n[b]Suspenseful Foyer[/b]\n\nThe foyer of the castle looks as run down as the outside, making the front door look even more incongruous. You see archways full of rubble and debris, as the ruins of ornate furniture and marble statues make it impossible to enter large portions of the area. Several tall candlesticks dot the room, holding surprisingly intact candles. All that remains are a door to your left, a door to your right, and a wooden spiral staircase leading to a second floor.\n\nAs you examine the room, the front door slams shut behind you with a solid [i]thud.[/i] Damian leaps to it, scrambling for a hold, but there's no handle or lock on this side. \"Who makes a door with one handle you can only lock from the outside?\" he yells. \"Man damn it, people have no respect for hard-working ratters, I tell you.\"\n\nSince leaving is currently not possible, you gather the candles, light them, and consider your options.\n\n*choice\n\t#I open the door on the left.\n\t\t*goto 1_looming_library\n\t#I walk through the door on the right.\n\t\t*goto 1_deadly_art_gallery\n\t#I take the spiral staircase upstairs.\n\t\t*goto 2_decaying_landing\n\n*label 1_looming_library\n\n[b]Looming Library[/b]\n\n*if flg_loomingLibrary = false\n\t*set flg_loomingLibrary true\n\t*goto 1_looming_library_unexplored\n*if flg_loomingLibrary = true\n\tYou are back in the library. The books continue to lurk on the shelves as you hear the steady [i]drip drip drip[/i] of water.\n\n\t*choice\n\t\t*selectable_if (not(flg_ifLibraryBook)) #I read one of the creepy books.\n\t\t\t*goto 1_looming_library_read\n\t\t*selectable_if (not(flg_ifLibraryWater)) #I examine the bucket.\n\t\t\t*goto 1_looming_library_drink\n\t\t#I head back to the foyer.\n\t\t\t*goto 1_suspenseful_foyer\n\n*label 1_looming_library_unexplored\nThe door opens with a tortured creak, and inside you can see a large library. Like most of the rest of what you've seen of the castle, much of it is in ruins. There are shelves that have been knocked over, scattering books all over the floor. A hole in the roof has allowed untold years of rain to damage the majority of the tomes, rendering them a moldy pile of wood pulp and twisted leather. Underneath one of the holes is a rusted metal bucket brimming with water. Water falls into the bucket with a steady [i]drip drip drip[/i].\n\nWith all the rubble, there's barely any room for anyone to hide in here. And yet, one shelf looks surprisingly well-preserved. Each of the books on that shelf look pristine. You also get the sense they are staring at you. Ridiculous, of course, as they don't have any eyes.\n\n\"Are those books watching me?\" Damian asks, as he reaches for his dagger.\n\n*if flg_deadlyArtGallery = true\n\t\"You mean like the portraits in the art gallery?\" Sonya asks.\n\n\tSomething strange is definitely going on here.\n\t*goto 1_looming_library_choice\n*else\n\tMaybe not so ridiculous.\n\n\tSonya ignores the comment. \"I'm more interested in seeing if the library has more historical information on Houndton.\"\n\t*goto 1_looming_library_choice\n\n*label 1_looming_library_choice\n\n*choice\n\t*selectable_if (not(flg_ifLibraryBook)) #I try to read one of the creepy books.\n\t\t*goto 1_looming_library_read\n\t*selectable_if (not(flg_ifLibraryWater)) #I examine the bucket.\n\t\t*goto 1_looming_library_drink\n\t#I head back to the foyer.\n\t\t*goto 1_suspenseful_foyer\n\n*label 1_looming_library_read\n*set flg_ifLibraryBook true\nCautiously, you reach a ${plc_fur} paw towards one of the books, a red book that caught your eye. \n\n*if plc_calling = \"Artisan\"\n\tAs you do, the book flies to your paw. You can feel your focus, the item that channels your magical ability, grow warm at your side as the book opens itself up.\n\n\t\"That's amazing,\" Sonya says, watching the pages flip of their own accord. \n\t*goto 1_looming_library_read_successful\n*elseif att_clever > 50\n\tCarefully pulling the book from the shelf, you open the cover and look at the words in front of you. But as you do, the pages start to flip of their own accord. \n\t*goto 1_looming_library_read_successful\n*else\n\tCarefully pulling the book from the shelf, you open the cover and look at the words in front of you. But as you do, the pages start to flip of their own accord. Words speed by faster than you can read them, until the flurry stops and shows you a blank page.\n\n\tAnd then, words start to appear on the page. Unfortunately, it appears to be some strange, alien language you've never read before. More nonsense fills the page as you quickly slam the cover shut and put the book back on the shelf.\n\n\t\"Let's keep the light reading for another time,\" Damian mutters.\n\n\t*choice\n\t\t*selectable_if (not(flg_ifLibraryWater)) #I examine the bucket.\n\t\t\t*goto 1_looming_library_drink\n\t\t#I head back to the foyer.\n\t\t\t*goto 1_suspenseful_foyer\n\n*label 1_looming_library_read_successful\n\nWords speed by faster than you can read them, until the flurry stops and shows you a blank page.\n\nAnd then, words start to appear on the page. The ancient language of Man. Touching a page, you realize it's made of a thin layer of plastic, trapping the words within as they appear.\n\n\"What does it say?\" Sonya asks, breathlessly.\n\nLetting go of the page, you read the words carefully, translating for the benefit of your friends.\n\n[i]And as the three dogs read the words appearing on the page, they knew their quarry was close at paw. For the pirate Patches knew of the enemy they sought, the thief of the pearls. He was the dread pirate…[/i]\n\n\"Boss,\" Damian says with a shiver. \"Is that the story of what's happening right now?\"\n\nSuddenly the book slams itself closed. You yip in surprise, and drop the book. But instead of it falling to the ground, it flies back to the shelf of its own accord. \n\nDamian just stares in surprise, while Sonya mutters a prayer to the Old Ones under her breath. You try to yank on the spine again, but it is now firmly perched on the shelf, as immobile as stone. The other books are equally immobile.\n*set stg_badCat +1\n\n*choice\n\t*selectable_if (not(flg_ifLibraryWater)) #I examine the bucket.\n\t\t*goto 1_looming_library_drink\n\t#I head back to the foyer.\n\t\t*goto 1_suspenseful_foyer\n\n*label 1_looming_library_drink\n*set flg_ifLibraryWater true\n\nThe rusty bucket is full of brown water. Some of it might be rust, some might be mud, but it all smells weird. It's definitely not clean or fresh water.\n\nSonya wrinkles her nose. \"That looks foul,\" she says.\n\nDamian smirks. \"Boss, I'll give you a shiny plastic coin if you drink that water.\"\n\n*choice\n\t#I agree with Sonya. It's disgusting.\n\t\t\"You're right, Sonya,\" you say. \"That water's pretty foul. It's not worth drinking.\"\n\n\t\tDamian nods. \"Good. Glad to know you're a dog with a brain.\"\n\n\t\t*choice\n\t\t\t*selectable_if (not(flg_ifLibraryBook)) #I read one of the creepy books.\n\t\t\t\t*goto 1_looming_library_read\n\t\t\t#I head back to the foyer.\n\t\t\t\t*goto 1_suspenseful_foyer\n\t#I put my paw into the water to see if there's anything inside.\n\t\tYou stick your paw into the brown water. As soon as you do, one of the larger rusted areas on the side bursts open, and the water sloshes onto the floor out the hole in the bucket. There's nothing inside, and now your paw and your boots are covered in foul-smelling water.\n\n\t\tSonya smirks. \"I told you so,\" she says.\n\n\t\t*choice\n\t\t\t*selectable_if (not(flg_ifLibraryBook)) #I read one of the creepy books.\n\t\t\t\t*goto 1_looming_library_read\n\t\t\t#I head back to the foyer.\n\t\t\t\t*goto 1_suspenseful_foyer\n\t#I drink the water.\n\t\t\"I'll take that bet,\" you say, and bend over to start lapping up the water.\n\n\t\t*set att_solid %+05\n\t\t*if att_solid > 55\n\t\t\tSonya and Damian are silent as you take several long drinks. The water tastes cool and a little metallic, but it's still perfectly potable.\n\n\t\t\tWiping your muzzle with the back of your paw, you put the other one out to Damian. Grudgingly, he puts a plastic coin in your paw.\n\n\t\t\t*achieve drinkbucket\n\t\t\t*set oth_coins +1\n\t\t\t*choice\n\t\t\t\t*selectable_if (not(flg_ifLibraryBook)) #I read one of the creepy books.\n\t\t\t\t\t*goto 1_looming_library_read\n\t\t\t\t#I head back to the foyer.\n\t\t\t\t\t*goto 1_suspenseful_foyer\n\t\t*else\n\t\t\tAfter the first drink, the nasty metallic taste hits your tongue. You immediately spit it out, trying not to throw up.\n\n\t\t\t\"I didn't think you'd seriously do it, boss,\" Damian says. \"Keep your money, because that was well and truly disgusting. And hilarious.\"\n\n\t\t\t\"I swear, I would get more accomplished if I were saddled with a team of puppies,\" Sonya growls in frustration.\n\n\t\t\tFeeling a little better, you stand back up.\n\n\t\t\t*achieve drinkbucket\n\t\t\t*choice\n\t\t\t\t*selectable_if (not(flg_ifLibraryBook)) #I read one of the creepy books.\n\t\t\t\t\t*goto 1_looming_library_read\n\t\t\t\t#I head back to the foyer.\n\t\t\t\t\t*goto 1_suspenseful_foyer\n\n*label 1_deadly_art_gallery\n\n[b]Deadly Art Gallery[/b]\n*if flg_deadlyArtGallery = false\n\t*set flg_deadlyArtGallery true\n\t*goto 1_deadly_art_gallery_unexplored\n*if flg_deadlyArtGallery = true\n\n\tYou're back in the art gallery. Sonya stares at one of the portraits to see if their eyes move.\n\n*choice\n\t*selectable_if (not(flg_ifGallery)) #I examine the strange portraits.\n\t\t*goto 1_deadly_art_gallery_examine\n\t*selectable_if (not(flg_ifGallery)) #I try to remove one of the portraits.\n\t\t*goto 1_deadly_art_gallery_remove\n\t#I head back to the foyer.\n\t\t*goto 1_suspenseful_foyer\n\n*label 1_deadly_art_gallery_unexplored\n\nThe door opens silently, and through it you can see a spacious art gallery full of portraits. Most of the gallery is demolished, with many paintings nothing more than tattered rags hanging in frames. A small hole high in the outer wall has allowed debris to wash into the room, and wild ivy is starting to creep inside the room. The wide-open room doesn't have much in the way of hiding places.\n\nA few of the portraits nearest the door you entered look reasonably well-preserved. They depict various members of the Transylvania-Hound family. You hear a scratching noise at the door, but turning to look, you see it's only Damian examining it to make sure it hasn't locked behind you. When you look back at the portraits, something looks different. Like one of them is staring at you. You tell yourself it's nonsense.\n\nSonya stares at the image of Bela Transylvania-Hound, a handsome dog with silky black and tan fur, and piercing brown eyes. \"I think the eyes of this portrait moved,\" she says.\n\n*if flg_loomingLibrary = true\n\t\"Just like the books in the library, huh?\" Damian says.\n\n\tSomething weird is definitely going on here.\n\t*goto 1_deadly_art_gallery_choice\n*else\n\tMaybe it's not nonsense.\n\n\tSonya shrugs. \"Maybe it's nothing. But I'm curious to see if these portraits give us any more historical information on Houndton.\"\n\t*goto 1_deadly_art_gallery_choice\n\n*label 1_deadly_art_gallery_choice\n\n*choice\n\t*selectable_if (not(flg_ifGallery)) #I examine the strange portraits to see if I recognize anyone.\n\t\t*goto 1_deadly_art_gallery_examine\n\t*selectable_if (not(flg_ifGalleryRemove)) #I try to remove one of the portraits.\n\t\t*goto 1_deadly_art_gallery_remove\n\t#I head back to the foyer.\n\t\t*goto 1_suspenseful_foyer\n\n*label 1_deadly_art_gallery_examine\n*set flg_ifGallery true\nYou take a careful look at the portraits. In the midst of several black and tan hounds, the portrait of a corgi draws your eye.\n\n*if plc_calling = \"Shepherd\"\n\tAfter a moment, you recognize her as Mother Dania Corgi. \n\t*goto 1_deadly_art_gallery_examine_successful\n*elseif att_clever > 50\n\tYou remember Padraig once invited you to have tea with him, and he told you about one of his ancestors, Dania Corgi. \n\t*goto 1_deadly_art_gallery_examine_successful\n*else\n\t\"Have you heard of this corgi, Damian?\" you ask, pointing it out to him.\n\n\tDamian sidles over and looks at the portrait. \"Can't say I do. Padraig was always telling me stories of his ancestors, but to be honest they all blurred together after a while.\"\n\n\t\"We should keep looking,\" Sonya says. The both of you agree, and head back to the foyer.\n\n\t*page_break Leave the Gallery\n\t*goto 1_suspenseful_foyer\n\n*label 1_deadly_art_gallery_examine_successful\nShe was a respected member of the Church of Man hundreds of years ago, but when her wife Siobhan Transylvania-Hound decided to move to Houndton, Dania left with her and founded the first church in Houndton.\n\nMore importantly, however, you notice she's wearing a distinctive necklace of black pearls, with an interesting clasp in the front. Perhaps the pearls are meant to attach to each other in some way?\n\n\"We should keep looking,\" Sonya says. You agree, and head back to the foyer.\n\n*set stg_fetch +1\n*page_break Leave the Gallery\n*goto 1_suspenseful_foyer\n\n*label 1_deadly_art_gallery_remove\n*set flg_ifGalleryRemove true\nThe portrait of a corgi draws your eye. Grabbing it with both paws, you attempt to pull it off the wall.\n\n*set att_mighty %+05\n*if att_mighty > 55\n\tYou twist and turn, and eventually the portrait comes off with a decisive [i]pop[/i]. There doesn't appear to be anything unusual on the back of the portrait. Putting it back on the wall, you look at the painting. \n\t\n\t@{(plc_calling = \"Shepherd\") After a moment, you recognize her as Mother|You remember Padraig once invited you to have tea with him, and he told you about one of his ancestors,} Dania Corgi. \n\t*goto 1_deadly_art_gallery_examine_successful\n*else\n\tAs you pull, the wood cracks under your paws, and you end up falling backwards. The fabric tears away from the wall, completely ruining the portrait.\n\n\tSonya stares at you. \"Why? Why would you do that?\"\n\n\tDamian points to your ${plc_fur} paw, still holding the scraps of wood and fabric. \"You, uh, should probably put that down, boss.\"\n\n\tYou drop the ruined painting to the floor and leave the gallery.\n\t\n\t*page_break Leave the Gallery\n\t*goto 1_suspenseful_foyer\n\n*label 2_decaying_landing\n\n[b]Decaying Landing[/b]\n*if flg_decayingLanding = false\n\t*set flg_decayingLanding true\n\t*goto 1_decaying_landing_unexplored\n*if flg_decayingLanding = true\n\n\tYou are back at the landing. Everything seems quiet. Too quiet.\n\n\t*choice\n\t\t#I open the door marked \"study.\"\n\t\t\t*goto 2_demonic_study\n\t\t#I walk through to the dining room.\n\t\t\t*goto 2_ominous_dining_room\n\t\t#I open @{flg_miserableMasterBedroom the bedroom door.|the unmarked door.}\n\t\t\t*goto 2_miserable_master_bedroom\n\n*label 1_decaying_landing_unexplored\n\nThe stairs themselves are made of worn but sturdy wood. They creak off and on as you make your way up. At the top of the stairs is a worn landing. Moth-eaten carpets litter the floor, and in a few places the floor has fallen through, blocking passage to other parts of the castle. Only a few areas look safe to explore.\n\nThe first is a simple door off to your left. The door has a worn sign marked \"study.\"\n\nDirectly in front of you is an archway which leads to what appears to be a dining room, covered in cobwebs and dust.\n\nFinally, to your right is an unmarked door.\n\nAs you consider your options, you hear a loud [i]thump[/i] from the left door, and then silence. Utter stillness.\n\n\"Patches may be in there,\" Sonya says as she steps to the door.\n\n\"It might also be a trap,\" Damian whispers. \"We should check the rest of the floor out first.\"\n\n*choice\n\t#I open the door marked \"study.\"\n\t\t*goto 2_demonic_study\n\t#I walk through to the dining room.\n\t\t*goto 2_ominous_dining_room\n\t#I open the unmarked door.\n\t\t*goto 2_miserable_master_bedroom\n\n*label 2_ominous_dining_room\n\n[b]Ominous Dining Room[/b]\n*if flg_ominousDiningRoom = false\n\t*set flg_ominousDiningRoom true\n\t*goto 2_ominous_dining_room_unexplored\n*if flg_ominousDiningRoom = true\n\n\tYou're back in the dining room. The food still looks @{flg_ifDining disturbed.|undisturbed.} The larder has many, many boxes @{flg_ifLarder on the floor. All the dust in here causes Damian to sneeze.|on the shelves. You still hear that humming noise.}\n\n\t*choice\n\t\t*selectable_if (not(flg_ifDining)) #I try some of the food.\n\t\t\t*goto 2_ominous_dining_room_food\n\t\t*selectable_if (not(flg_ifLarder)) #I search the larder.\n\t\t\t*goto 2_ominous_larder_search\n\t\t#I head back to the landing.\n\t\t\t*goto 2_decaying_landing\n\n*label 2_ominous_dining_room_unexplored\n\nYou step into the dusty dining room. The room seems relatively unscathed compared to other parts of the castle. Aside from the small civilization of tiny spiders that clearly spent decades building all the webs, the room looks like it could have been set up for dinner service the night before. \n\nNobody could be hiding in here, because nothing has been disturbed. All the plates and cutlery are carefully arranged, water bowls lie waiting for thirsty dinner guests, and there are even some covered dishes sitting in the middle of the table. Through a small archway, you see a small, walk-in larder. The shelves are covered in a variety of boxes, all covered in dust and cobwebs. Just on the edge of your hearing, you can make out a faint humming sound.\n\nCurious, Sonya plunges her paw into a knot of spiderwebs and lifts one of the covers. Underneath is a dusty-looking roast chicken.\n\n\"How odd,\" she remarks. \"It's as if someone was sitting down for a meal before the castle was abandoned.\"\n\n*choice\n\t*selectable_if (not(flg_ifDining)) #I try some of the food.\n\t\t*goto 2_ominous_dining_room_food\n\t*selectable_if (not(flg_ifLarder)) #I search the larder.\n\t\t*goto 2_ominous_larder_search\n\t#I head back to the landing.\n\t\t*goto 2_decaying_landing\n\n*label 2_ominous_dining_room_food\n*set flg_ifDining true\n\n\"I'm going to try some of that chicken,\" you say.\n\nDamian and Sonya look at you like you are foaming at the mouth as you rip one of the legs off the chicken. It comes off with a soft [i]crack,[/i] as the dry, stringy meat sits on the bone in your paw.\n\n*if plc_calling = \"Stray\"\n\tYou dig in with relish. As a stray, you never know when your next meal will be. \n\t*goto 2_ominous_dining_room_food_success\n*elseif att_solid > 50\n\tYou dig in with relish. \n\t*goto 2_ominous_dining_room_food_success\n*else\n\tThe smell of the stale, dry chicken finally gets to you, and you feel yourself getting queasy. Better to let the meal rest in peace, you decide.\n\n\t*choice\n\t\t*selectable_if (not(flg_ifLarder)) #I search the larder.\n\t\t\t*goto 2_ominous_larder_search\n\t\t#I head back to the landing.\n\t\t\t*goto 2_decaying_landing\n\n*label 2_ominous_dining_room_food_success\nThe chicken tastes a bit dry, but otherwise it's perfectly edible.\n\nDamian stares at you. \"That might be the most disgusting thing I've ever seen, boss.\" But you can tell they're both impressed. Or maybe horrified.\n\nYou put your paw to your mouth as you belch.\n\n*set rel_Sonya %+05\n*set rel_Damian %+05\n\n*choice\n\t*selectable_if (not(flg_ifLarder)) #I search the larder.\n\t\t*goto 2_ominous_larder_search\n\t#I head back to the landing.\n\t\t*goto 2_decaying_landing\n\n*label 2_ominous_larder_search\n*set flg_ifLarder true\nYou decide to look through the boxes to see if there's anything of interest. \n*if plc_calling = \"Hunter\"\n\tYour keen hunter instincts allow you to focus on the humming sound. Shoving the other boxes to the floor, you select a likely box from the shelf. \n\t*goto 2_ominous_larder_search_success\n*else\n\tYou start opening them at random, trying to find the source of the sound. As the sound gets louder, you see one box start to float up to the ceiling.\n\n\t*set att_agile %+05\n\t*if att_agile > 50\n\t\tLuckily, you manage to catch the box before it escapes. \n\t\t*goto 2_ominous_larder_search_success\n\t*else\n\t\tHowever, you're not quite fast enough to catch it before it hits the ceiling. The buzzing sound gets very loud, so loud you can't stand it, and then it's suddenly gone, along with the box.\n\n\t\tThat was odd.\n\n\t\t*choice\n\t\t\t*selectable_if (not(flg_ifDining)) #I try some of the food.\n\t\t\t\t*goto 2_ominous_dining_room_food\n\t\t\t#I head back to the landing.\n\t\t\t\t*goto 2_decaying_landing\n\n*label 2_ominous_larder_search_success\nYou open it to find a strange object. It's shaped like a green, squat rod that could fit comfortably in your palm. It has a thick button on the top, which has been depressed. The humming is quite loud now.\n\nYou quickly stick your paw in and depress the button. The awful humming noise stops. \n\nLeaving the boxes on the floor, you pocket the strange object and exit the larder.\n\n*set flg_hummingThing 1\n*choice\n\t*selectable_if (not(flg_ifDining)) #I try some of the food.\n\t\t*goto 2_ominous_dining_room_food\n\t#I head back to the landing.\n\t\t*goto 2_decaying_landing\n\n*label 2_miserable_master_bedroom\n\n[b]Miserable Master Bedroom[/b]\n\n*if flg_miserableMasterBedroom = false\n\t*set flg_miserableMasterBedroom true\n\t*goto 2_miserable_master_bedroom_unexplored\n*if flg_miserableMasterBedroom = true\n\tYou're back in the bedroom. There's @{flg_ifBedroom still something moving under the bed.|nothing under the bed now, but Damian still won't come into the room.}\n\n\t*choice\n\t\t*selectable_if (not(flg_ifBedroom)) #I carefully look under the bed.\n\t\t\tYou motion silently to Damian and Sonya to stand on two sides of the bed. You creep up to the remaining side and look underneath. \n\t\t\t*goto 2_miserable_master_bedroom_battle\n\t\t*selectable_if (not(flg_ifBedroom)) #I flip the mattress up to look underneath.\n\t\t\tYou creep up to the edge of the bed, sliding your paws underneath the mattress. Then, with a quick movement, you flip the mattress up and look underneath. \n\t\t\t*goto 2_miserable_master_bedroom_battle\n\t\t#I go back to the landing.\n\t\t\t*goto 2_decaying_landing\n\n*label 2_miserable_master_bedroom_unexplored\nThe door opens halfway, and then gets stuck. You and Sonya push on it to open it the rest of the way with an ear-piercing screech.\n\nOnce inside, you see why the door was blocked. This was probably a bedroom at one point, but it has been thoroughly wrecked. Unlike other parts of the castle which simply seemed to have decayed over time, this room looks purposefully destroyed. Claw marks appear on the floor, and the side of a cabinet looks like it was kicked in. Even worse, the room smells like something is living in here. Or something died in here.\n\nThe only part of the room that looks relatively intact is the large four-poster bed. It's been shoved against one wall, and it's draped in scraps of silk and years of spiderwebs. You think you can see movement underneath the bed. Perhaps that's where Patches is hiding.\n\n*choice\n\t#I carefully look under the bed.\n\t\tYou motion silently to Damian and Sonya to stand on two sides of the bed. You creep up to the remaining side and look underneath. \n\t\t*goto 2_miserable_master_bedroom_battle\n\t#I flip the mattress up to look underneath.\n\t\tYou creep up to the edge of the bed, sliding your paws underneath the mattress. Then, with a quick movement, you flip the mattress up and look underneath. \n\t\t*goto 2_miserable_master_bedroom_battle\n\t#I go back to the landing.\n\t\t*goto 2_decaying_landing\n\n*label 2_miserable_master_bedroom_battle\n*set flg_ifBedroom true\nSuddenly, you see something slash at your face! \n\n*choice\n\t#I use my strength to pin it down.\n\t\t*if plc_calling = \"Guardian\"\n\t\t\tInstinctively, your guardian training kicks in and your thrust your paw under the bed, using your strength to full advantage to pin the attacker to the floor and drag them out from under the bed. \n\t\t\t*goto 2_miserable_master_bedroom_battle_success\n\t\t*else\n\t\t\tYou thrust your paw under the bed, \n\t\t\t*set att_mighty %+05\n\t\t\t*if att_mighty > 50\n\t\t\t\tand manage to use your strength to pin the attacker to the floor and drag them out from under the bed. \n\t\t\t\t*goto 2_miserable_master_bedroom_battle_success\n\t\t\t*else\n\t\t\t\tbut you aren't able to hold on to your assailant. You feel something bite into your paw and scurry out the door.\n\t\t\t*goto 2_miserable_master_bedroom_battle_failure\n\t#I quickly grab it before it can move.\n\t\tYou thrust your paw under the bed, \n\t\t*set att_agile %+05\n\t\t*if att_agile > 50\n\t\t\tand manage to grab the attacker by the scruff of the neck and drag them out from under the bed. \n\t\t\t*goto 2_miserable_master_bedroom_battle_success\n\t\t*else\n\t\t\tbut you aren't able to grab your assailant. You feel something bite into your paw and scurry out the door.\n\t\t\t*goto 2_miserable_master_bedroom_battle_failure\n\t#I try to trick it into running towards me.\n\t\tThinking quickly, you kick the frame of the bed, trying to scare it out. Immediately after your kick, you hear a squeak and a skittering sound. You thrust your paw under the bed, \n\t\t*set att_clever %+05\n\t\t*if att_clever > 50\n\t\t\tand feel the creature run right into it. You grab the attacker by the scruff of the neck and drag them out from under the bed. \n\t\t\t*goto 2_miserable_master_bedroom_battle_success\n\t\t*else\n\t\t\tbut the creature is avoiding you. You feel something bite into your paw and scurry out the door.\n\t\t\t*goto 2_miserable_master_bedroom_battle_failure\n\n*label 2_miserable_master_bedroom_battle_success\n\nIt looks like a massive rodent. Rodents are non-uplifted animals, rats and mice who don't walk upright, talk, or use tools. This one looks bigger than most. More disturbingly, where a rodent would normally have eyes, this only has a couple of blank patches of skin. It screams and writhes in your paw, desperately trying to escape.\n\nDamian screams, and jumps on the bed. \"Get that Man-forsaken thing away from me!\"\n\nSonya tries to hide a smirk. \"Come on, Damian. It's just a little rodent. Nothing to be scared of.\"\n\n\"That's no normal rodent, and you know it. Kill it, kill it, kill it!\"\n\nSonya shrugs. \"Just let it go. It's harmless.\" She looks at the rodent again. \"Probably.\"\n\n*fake_choice\n\t#I kill it.\n\t\tThe rodent makes one more tiny scream as you twist its head, snapping its neck. Not sure what to do with it, you put the corpse back under the bed.\n\t\t*set per_tame %-10\n\t#I let it go.\n\t\tYou step to the doorway and carefully set the rodent on the floor. It instantly scurries away into the darkness.\n\t\t*set per_idealist %+10\n\t#I give it to Damian as a pet.\n\t\t\"Here you go,\" you say, giving it to Damian. \"A new pet.\"\n\n\t\tHe screams and throws the rodent hard against the wall. It makes one more tiny squeak before it slides to the floor.\n\t\t*set per_loyal %-10\n\nDamian coughs and carefully steps off the bed. \"Rodents freak me out, okay?\" he mutters.\n\n\"Too bad you aren't a [i]ratter[/i], then,\" Sonya says, chucking. \"Oh wait, you are!\"\n\nDamian says something foul under his breath. \n\nThere's nothing else of use to do in the bedroom, so the three of you head back to the landing.\n\n*set stg_protect +1\n*page_break Go Back to the Landing\n*goto 2_decaying_landing\n\n*label 2_miserable_master_bedroom_battle_failure\n\n\"What in Man's name was that?\" you ask, nursing your paw.\n\n\"Some kind of eyeless rodent,\" Sonya says. \"I tried to stop it, but I had other problems.\" She motions to Damian, who is standing on top of the bed shivering.\n\nSeeing both of you looking at him, he coughs and carefully steps off the bed. \"Rodents freak me out, okay?\" he mutters.\n\n\"Too bad you aren't a [i]ratter[/i], then,\" Sonya says, chucking. \"Oh wait, you are!\"\n\nDamian says something foul under his breath. There's nothing else of use to do in the bedroom, so the three of you head back to the landing.\n\n*page_break Go Back to the Landing\n*goto 2_decaying_landing\n\n*label 2_demonic_study\n\n[b]Demonic Study[/b]\n\nYou pull on the knob of the door marked \"study.\" The door is stiff, but you manage to pull it open with a loud [i]creak[/i]. Poking your nose in, you see the study is utterly demolished. Cabinets built into the walls are smashed, their contents rendered into unidentifiable lumps of metal and plastic. A stained-glass window is shattered, and colorful glass shards are scattered on the floor. The heavy velvet curtains are slashed, and the side tables and chairs have been ripped apart. \n\nThe only thing left standing is a heavy, oak desk. On top of the desk you see a familiar-looking cat with orange and black fur. Patches is face-down, with her paws tied behind her back and ropes binding her arms and legs. As you open the door, she turns her head to look at you, and you see a scrap of the torn curtain shoved into her mouth.\n*comment trial_end\n\n*fake_choice\n\t#I step forward to untie her.\n\t\t*gosub trial_end\n\t\tAs you step forward to untie Patches, \n\t#I tell Sonya to pick her up.\n\t\t*gosub trial_end\n\t\tAs Sonya steps forward to pick Patches up, \n\t#I check under the desk for traps.\n\t\t*gosub trial_end\n\t\tAs you step up to the desk to check it for traps, \na sharp breeze blows out your candles, and the room is plunged into darkness. Behind you, you hear heavy breathing, but even after turning around you can't see your paw in front of your face.\n\n\"That doesn't sound good,\" Damian whispers. You hear some muffled profanity from Sonya, and then a firm snap. Suddenly, the room is bathed in a strange, green glow, emanating from the unusual plastic rod in Sonya's paw.\n\nIn front of you is a tall, lanky hound with threadbare clothing and fur falling out in patches. The dog's mouth is open, and you see dozens and dozens of sharp, serrated teeth. It smiles, and large globs of drool slide out of its mouth when it does.\n\n*if (flg_hummingThing = 1)\n\tAs the creature stares, you hear a soft humming coming from your rucksack.\n\n\"D-d-demon,\" Sonya says, visibly shaking. Her sword bounces in her shaking paws.\n\n\"What?\" you whisper, not taking your eyes off of it.\n\n\"Cannibal…\" she answers. \"Studied them. And this one eats…\"\n\n\"Dogs. I eat dogs,\" the creature says, carefully enunciating the words so its sharp teeth don't slice up its face. \"And cats. I am alleged to be one of the ancient enemies of dogs and cats, a creature that lives Outside. One of those that are, in a word, Unseen.\"\n\n\"Oh scat,\" Damian swears.\n\nThe Unseen. The collective names of the demons that have plagued dogs and cats, possibly as far back as when the Old Ones still walked in the world. Some are literally invisible, while others simply lurk in hidden places. This one is very visible. And it looks very, very hungry.\n\n*choice\n\t#I tell Sonya we'll get through this.\n\t\t*set per_loyal %+10\n\t\t*if rel_Sonya > 50\n\t\t\t\"Hey, Sonya,\" you say. She tears her eyes away from the demon and looks at you. \"I know you're scared,\" you say calmly, \"but we'll get through this. I trust you.\"\n\n\t\t\tShe swallows hard, and the sword in her paws grows steady. \"Thanks,\" she whispers, and looks back at the demon with new determination.\n\t\t\t*goto confront_demon\n\t\t*else\n\t\t\t*goto sonya_not_assured\n\t#I bark at Sonya to snap her out of it.\n\t\t*set per_tame %-10\n\t\t*if rel_Sonya > 50\n\t\t\t\"Sonya!\" you bark. She tears her eyes away from the demon and looks at you. \"Get your head in the game,\" you snark, \"or none of us are going to survive this!\"\n\n\t\t\tShe swallows hard, and the sword in her paws grows steady. \"Yes we will,\" she whispers, and looks back at the demon with new determination.\n\t\t\t*goto confront_demon\n\t\t*else\n\t\t\t*goto sonya_not_assured\n\t#I let Sonya know I'm too amazing to let her die.\n\t\t*set per_ego %+10\n\t\t*if rel_Sonya > 50\n\t\t\t\"Hey, Sonya,\" you say. She tears her eyes away from the demon and looks at you. \"Don't worry about this,\" you say with a smirk. \"Even if you're scared, I'm far too amazing to let you die from a mere demon.\"\n\n\t\t\tShe swallows hard, and the sword in her paws grows steady. \"Glad you're here then,\" she say with a small smile, and looks back at the demon with new determination.\n\t\t\t*goto confront_demon\n\t\t*else\n\t\t\t*goto sonya_not_assured\n\n*label sonya_not_assured\n\"Sonya,\" you say, but she doesn't seem to hear you. Her eyes are locked on the demon.\n\n\"Are you scared, little pup?\" the demon says. It shows its sharp, slobbery grin again.\n\n\"Pup?\" she says softly.\n\n\"Yeah,\" Damian says. \"A little scared puppy. Just like I said you were.\"\n\nHer eyes narrow, and the sword in her paws grows steady.\n*goto confront_demon\n\n*label confront_demon\n\nThe demon applauds slowly, sarcastically. \"Oh well done. The puppy has grown a spine.\" It leers into your face, and you can smell its breath, like a charnel house dipped in sulfur. \"So what act of selfless bravery are [i]you[/i] going to perform before I eat all three of you?\"\n\n*choice\n\t#I convince it to find food elsewhere.\n\t\t*set per_tame %+10\n\t\tYou clear your throat. \"We're not very tasty. You might want to try somewhere else.\"\n\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\t*set stg_lore +1\n\t\t\tThe demon tilts its head, listening to you. It sniffs the air once, twice. \"Hrm, you may be right. You do smell a bit overdone. Another time, perhaps.\" It turns and leaves the study.\n\n\t\t\t\"I am genuinely surprised that worked,\" Damian says, sliding his dagger back into his sheath. Illiad von Korat's offer of sharing knowledge pops into your head, but you put it out of your mind.\n\n\t\t\t*goto back_to_town\n\t\t*else\n\t\t\t\"I think not,\" it says. The demon leans forward, its hot, sulfurous breath filling your nostrils. Before it can bite you, Sonya screams and slashes down with her sword. \n\t\t\t*goto 2_demonic_study_decap\n\t#I prove we are too tough to eat.\n\t\t*set per_tame %+10\n\t\t\"We're all too tough to eat,\" you say carefully.\n\n\t\t\"What the scat are you doing, boss?\" Damian asks.\n\n\t\tYou hold your arm out. \"Here. Give it a try.\"\n\n\t\t*set att_solid %+05\n\t\t*if att_solid > 55\n\t\t\t*set stg_lore +1\n\t\t\tThe demon tilts its head, confused. Then, it opens its mouth. Hot, sulfurous breath fills your nostrils as it bites you. You close your eyes, refusing to show any pain. After a moment, the demon eases up on the bite. \"Hrm, you may be right. You are a bit too tough for my tastes. Another time, perhaps.\" It turns and leaves the study. \n\n\t\t\t\"I am genuinely surprised that worked,\" Damian says, sliding his dagger back into his sheath. Illiad von Korat's offer of sharing knowledge pops into your head, but you put it out of your mind.\n\n\t\t\t*goto back_to_town\n\t\t*else\n\t\t\t\"I think not,\" it says. The demon leans forward, its hot, sulfurous breath filling your nostrils. Before it can bite you, Sonya screams and slashes down with her sword. \n\t\t\t*goto 2_demonic_study_decap\n\t#I cleave it with my sword.\n\t\t*set per_tame %-10\n\t\t*if plc_calling = \"Guardian\"\n\t\t\t*set stg_protect +1\n\t\t\t*goto 2_demonic_study_guardian\n\t\t*elseif att_mighty > 55\n\t\t\t*set stg_protect +1\n\t\t\tYou draw your sword. The demon lunges forward, its hot, sulfurous breath filling your nostrils. As it moves to bite you, you slash hard with all your might. \n\t\t\t*goto 2_demonic_study_decap\n\t\t*else\n\t\t\tUnfortunately, the sword glances off the demon's thick flesh! You step back to recover, as Sonya screams and slashes down with her sword. \n\t\t\t*goto 2_demonic_study_decap\n\t#I sneak up behind it and take it out with a well-placed dagger thrust.\n\t\t*set per_tame %-10\n\t\t\"Distract it,\" you whisper, pulling your dagger from its sheath. \n\n\t\tDamian nods and waves a paw in front of the demon's face. \"Hey, you big dummy! Bet you can't bite me! Nyah!\"\n\n\t\tThe demon turns to look at him, clearly annoyed by this interruption, as you slide silently behind. Once you can see its exposed back, you plunge your dagger into it. \n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\t*set stg_protect +1\n\t\t\tBlack, ichorous blood pools over your paws as the creature screams in pain before falling down with a heavy thud.\n\n\t\t\t\"Good work, boss,\" Damian says, sliding his dagger back in his sheath.\n\t\t\t*goto back_to_town\n\t\t*else\n\t\t\tHowever, the point of the dagger doesn't pierce the demon's thick flesh! Before it can bite you, Sonya screams and slashes down with her sword. \n\t\t\t*goto 2_demonic_study_decap\n\t*selectable_if (flg_hasMagic) #I shoot it with a bolt of acid.\n\t\t*set att_clever %+05\n\t\t*set per_tame %-10\n\t\tYou prepare a spell. The demon lunges forward, its hot, sulfurous breath filling your nostrils. As it moves to bite you, you let loose with a magical bolt of acid into the creature's stomach. \n\t\t*set stg_protect +1\n\t\tWhich causes the demon to explode. \n\t\t*goto 2_demonic_study_decap\n\t*if (flg_hummingThing = 1) #I pull out the humming thing.\n\t\t*achieve hummingthing\n\t\t*set per_tame %+10\n\t\t*set stg_lore +1\n\t\t*set flg_hummingThing 2\n\t\tYou grab your rucksack and pull out the humming thing from the larder. It is glowing with a strange red aura, and the humming gets even louder as you pull it out.\n\n\t\tIt also starts to get much warmer.\n\n\t\tInstinctively, you throw the humming thing at the demon. The demon, its jaws as it tries to bite you, inadvertently catches the thing in its teeth.\n\n\t\tThen, there is a bright light, and the loudest sound you have ever heard in your life. Once you're able to see again, you notice you're covered in black, ichorous blood, and there's a scorch mark on the floorboards.\n\n\t\tSonya says something to you, but it takes several wags before the ringing in your ears dies down enough to hear.\n\t\t*goto back_to_town\n\n*label 2_demonic_study_decap\nThe head of the demon falls to the floor, and the three of you are covered in a spray of black, ichorous blood.\n\n\"That's disgusting,\" Damian deadpans, sliding his dagger back into his sheath. \"I think I got some in my mouth.\"\n*goto back_to_town\n\n*label 2_demonic_study_guardian\nYou were trained as a guardian. And one of the tenets of the Code of Man is \"Protect All From The Unseen.\" This is what you signed up with the Pioneers to do.\n\nYou smoothly slide your sword out of the scabbard. \"Stand back. I've got this.\"\n\nDamian and Sonya step back, but they keep their weapons drawn. You step forward, sword in both your paws, and stare at the demon.\n\n\"I…am a good dog.\" Your sword blade flashes through the air. Time stands still for a moment, and then the head of the demon falls to the floor. The moment passes, and the three of you are covered in a spray of black, ichorous blood.\n\nDamian stares at you, wide-eyed in disbelief, covered in demonic goo. Sonya just wipes the stuff from her eyes. \n*goto back_to_town\n\n*label back_to_town\n\n*page_break\n\"Let's get this pirate out of here,\" Sonya says crisply. She picks Patches up, and the cat doesn't bother to struggle. \n\nYou remember the strange object she had in her paw that gave off an eerie glow. \"Where did you get that magic rod?\" you ask her as she hoists the pirate onto her shoulder.\n\n\"Something my father gave me once. Said I was only to use it when things were at their darkest.\" She smiles, a little shakily. \n\n*if flg_hummingThing = 1\n\tAs she speaks, there's a loud humming in your rucksack. Quickly, you pull out the humming thing, and you notice it growing warm in your paws. You instinctively throw it away before it gets too hot, but instead of falling, it hangs in the air. There is a bright light, and the next thing you know, the humming thing is gone.\n\n\tSonya stares for a moment, and then looks at you. \"I'm not going to ask where you got yours.\"\n\t*goto castle_weirdness\n*elseif flg_hummingThing = 2\n\t\"Where did you get yours?\"\n\n\tYou shrug. \"Found it in the pantry.\"\n\n\tDamian shakes his head. \"Does it bother either of you that we pretend these conversations are normal?\"\n\t*goto castle_weirdness\n*else\n\t\"Seemed appropriate.\"\n\t*goto castle_weirdness\n\n*label castle_weirdness\n\nWith Patches still tied up and gagged in Sonya's grasp, the four of you make your way to the ground floor. \n\n[b]Suspenseful Foyer[/b]\n\nDamian looks at the door to the outside. \"You better open this time,\" he says, and pushes on it. To his surprise, the door swings open easily. To everyone's surprise, the castle also starts shaking at the exact same moment. The three of you rush outside, with Patches in tow, as the walls of the castle shake. Chunks of rock fall around you as you run as fast as you can. By the time you're back on the road, you stop and look back at the castle. Large chunks of the stone making up the castle have fallen and crawled over each other to settle into the shape of a perfectly square box, almost the same rough size as the castle itself.\n\n\"Did the castle just [i]remake[/i] itself?\" Sonya asks.\n\nDamian shakes his head. \"Don't know. Don't want to know. I've had enough of that place for one night. Let's head back to town.\"\n\nTaking one last look at the stone climbing over itself to make a new turret, you turn and head back to Houndton.\n\n*page_break\nAfter a time, you all stop in an empty barn to get out of the rain and deal with the reluctant cat you have saved. It only takes a few moments to untie Patches and pull the scrap of cloth out of her mouth.\n\n\"Took you long enough,\" she grumbles, spitting on the ground to try and get the taste out of her mouth.\n\n\"Talk,\" Sonya says in a gruff voice.\n\nPatches smiles, and you can see one of her fangs is made of pure plastic. \"Sure, sure. Not gonna be much help, though. My captain ran off with what you're lookin' for.\"\n\nDamian casually runs the point of his dagger over Patches' fur. \"Nice try, but we know you're the captain.\"\n\n\"Me?\" Patches spits on the ground again. \"Hardly. I was just minding the boat. The real captain is Greedy Bow. He and his first mate are taking the pearls to his ship, the [i]Cat's Meow[/i], docked in Waterdog Port.\"\n\nThe name rings a faint bell in your memory. Greedy Bow is a pirate captain, known for his aggression. His first mate is a similarly nefarious bird by the name of Ambrosia Five Sins. \"What else?\" you ask.\n\nPatches laughs at you. \"You think I'm just going to spill my guts to any dog that happens by? Hardly. You got one question as a thank you for saving me from that horrible monster, but it'll take more than gratitude to get me to spill my guts.\"\n\nDamian leans over and whispers in your ear. \"We'll have to find another way to get her to open up, boss.\"\n\n*choice\n\t#I rough her up.\n\t\t*set per_tame %-15\n\t\t\"Talk, or I can make your life very painful,\" you say, flexing your muscles.\n\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 50\n\t\t\tPatches shivers. \"Okay, okay. One more question.\"\n\t\t\t*goto questions\n\t\t*else\n\t\t\tPatches yawns. \"I'm bored of this. Just go ahead and throw me to the police dogs, or whatever you're doing to do.\"\n\t\t\t*goto finish\n\t#I tell her I'll speak to the police dogs on her behalf. \n\t\t*set per_tame %+15\n\t\t\"Look, we just want to get those pearls,\" you say. \"Talk to us, and we'll convince the police dogs to go easy on you.\"\n\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 50\n\t\t\tPatches tilts her head. \"You'd do that? Huh. Okay, one more question.\"\n\t\t\t*goto questions\n\t\t*else\n\t\t\tPatches laughs. \"Right, like a dog would do anything for a cat like me. Just go ahead and throw me to the police dogs, or whatever you're doing to do.\"\n\t\t\t*goto finish\n\t#I logically explain the advantage of cooperation.\n\t\t*set per_tame %+15\n\t\t\"We rescued you from that demon,\" you say. \"Obviously it's in our benefit to keep you alive. So just work with us, and you can eventually go back to your life.\"\n\n\t\t*set att_clever %+05\n\t\t*if att_clever > 50\n\t\t\tPatches shrugs. \"Okay, sure. You have a point. One more question.\"\n\t\t\t*goto questions\n\t\t*else\n\t\t\tPatches shrugs. \"Hey, I appreciate you saving me and all, but I have a reputation to maintain. Just go ahead and throw me to the police dogs, or whatever you're doing to do.\"\n\t\t\t*goto finish\n\t*selectable_if (oth_coins > 0) #I give her money. \n\t\tYou give her a plastic coin. Patches smiles and takes the coin from you. \"You just bought yourself another question.\"\n\n\t\t*set oth_coins -1\n\t\t*goto questions\n\n*label questions\n\nSonya crosses her arms and looks at Patches sternly. \"What else do you want to know, $!{plc_fname}?\"\n\n*choice\n\t#\"Why did you steal the pearls?\"\n\t\t\"Why did you steal the pearls?\" you ask.\n\n\t\tPatches shrugs. \"Because Greedy Bow wanted 'em. He said it was some ancient cat treasure he read about in some book somewhere. Don't know much beyond that.\"\n\n\t\t*set stg_fetch +1\n\t\t*goto finish\n\t#\"How fast is Greedy Bow's ship?\"\n\t\t\"How fast is Greedy Bow's ship?\" you ask.\n\n\t\t\"Fast,\" Patches says, yawning. \"Better get a move on if you want to catch him.\"\n\n\t\t*set stg_badCat +1\n\t\t*goto finish\n\t#\"What do you know about Padraig Corgi's death?\"\n\t\t\"What do you know about Padraig Corgi's death?\" you ask.\n\n\t\tPatches looks nervous. \"Not much. Just that Five Sins seemed to be pretty pleased with it.\"\n\n\t\t*set stg_padraig +1\n\t\t*goto finish\n\t#\"Where's the rest of your crew?\"\n\t\t\"Where's the rest of your crew?\" you ask.\n\n\t\tPatches snorts. \"You mean aside from the ones I burned up? Probably waiting for you on the road, if you take that down to Waterdog Port.\"\n\n\t\t*set flg_heardAboutTrap true\n\t\t*goto finish\n\n*label finish\n\n\"We're not going to get anything more out of this waterlogged moggie,\" Damian snorts.\n\n\"So what do we do with her?\" Sonya asks.\n\n*fake_choice\n\t#\"Give her to the local police dogs. She needs to pay for her crimes.\"\n\t\t\"Give her to the local police dogs,\" you say. \"She needs to pay for her crimes.\"\n\n\t\tSonya nods. \"I completely agree.\"\n\t\t*set flg_patchesStatus 1\n\t\t*set per_idealist %+15\n\t#\"Let her go. She helped us, so now we should help her.\"\n\t\t\"Let her go,\" you say. \"She helped us, so now we should help her.\"\n\n\t\tSonya frowns. \"After all she's done in Pugmire? I don't think that's a good idea.\"\n\n\t\t\"Yeah, boss,\" Damian adds. \"I'm as much of a freedom lover as the next pup, but setting ships on fire ain't going to be looked on kindly by the nobles back in Pugmire.\" He smirks. \"Believe me, I know.\"\n\n\t\t\"We're letting her go,\" you say, crossing your arms.\n\n\t\tDamian puts his paws up. \"Whatever you say, boss.\"\n\t\t*set flg_patchesStatus 2\n\t\t*set per_idealist %+15\n\t#\"Tie her up and leave her here. We can't let her follow after us.\"\n\t\t\"Tie her up and leave her here,\" you say. \"We can't let her follow after us.\"\n\n\t\t\"Good plan, boss,\" Damian says.\n\t\t*set flg_patchesStatus 3\n\t\t*set per_idealist %-15\n\nYou head back to Houndton.\n*achieve endchapter3\n*finish [i]Chapter Four: Southward Bound[/i]\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first few chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2021-07-22 $4.99 $2.99 purchased\n*abort\t", "04-going_south": "*temp flg_goingToRiver false\n*temp flg_inBoat false\n*temp flg_captured false\n*text_image chap_4.png center [b]Chapter Four: Southward Bound[/b]\n\nThe rain eases up as you make your way back to the [i]Pharaoh's Head[/i]. Before you can walk through the doors, however, you are stopped by three hounds, all wearing armor. \"City guard! Halt in the name of the Mayor,\" the tallest one with brown fur says. \n\n\"We need to ask you some questions,\" a shorter, squatter dog barks. He tries to sound firm, but it's clear he's scared.\n\nThe third guard, with gray and black fur, steps forward. \"Did you three have anything to do with the loud, strange noises coming from Castle Transylvania-Hound?\"\n\nDamian and Sonya both look at you to answer.\n\n*fake_choice\n\t#\"We defeated a demon and a pirate. Tell your friends.\"\n\t\t\"We defeated a demon and a pirate,\" you say. \"Tell your friends.\" You wink at the guards.\n\t\t*set per_ego %+10\n\t*if (flg_patchesStatus = 1) #\"Good timing. Here's a pirate cat.\"\n\t\t\"Good timing,\" you say, shoving a bedraggled Patches at the guards. \"Here's a pirate cat.\" You smile and add, \"You're welcome.\"\n\t\t*set per_ego %-10\n\t*if (flg_patchesStatus = 1) #\"Haunted castle. Pirate cat. Your problem. I'm going to bed.\"\n\t\t\"It was a haunted castle. We found a pirate cat,\" you say, shoving a bedraggled Patches at the guards. \"I'm going to bed. Good night.\"\n\t\t*set per_idealist %-10\n\t*if (flg_patchesStatus = 2) #\"I heard a rumor there's a pirate cat on the loose.\"\n\t\t\"I heard a rumor there's a pirate cat on the loose,\" you say. \"But you didn't hear that from us,\" you quickly add. \"Try to keep it to yourselves.\"\n\t\t*set per_ego %-10\n\t*if (flg_patchesStatus = 2) #\"Haunted castle. Pirate cat on the loose. I'm going to bed.\"\n\t\t\"It was a haunted castle. And there's a pirate cat on the loose,\" you say. \"Have fun. I'm going to bed. Good night.\"\n\t\t*set per_idealist %-10\n\t*if (flg_patchesStatus = 3) #\"There's a pirate tied up in a barn up there.\"\n\t\t\"There's a pirate tied up in a barn up there,\" you say. \"But you didn't hear that from us,\" you quickly add. \"Try to keep it to yourselves.\"\n\t\t*set per_ego %-10\n\t*if (flg_patchesStatus = 3) #\"Haunted castle. Pirate cat in a barn. I'm going to bed.\"\n\t\t\"It was a haunted castle. Now it has an angry cat in a barn,\" you say, too tired to lie. \"I'm going to bed. Good night.\"\n\t\t*set per_idealist %-10\n\nThe three guards look astonished by this. You idly wonder how Illiad von Korat handles cat criminals, but you're too tired to care. Exhausted, you step into the inn.\n\nThe only person awake is a pharaoh hound standing behind the bar. He has a lot of gray in his fur, and walks gingerly around the inn, but he seems strong enough to lift the chairs onto the tables as he cleans up. He looks up and nods at the three of you as you enter.\n\n\"Never did get a chance to thank you for taking care of those Man-damned moggies earlier,\" he says, sticking out a paw to shake. \"Neal Pharaoh-Hound III, owner and proprietor.\" The three of you shake and introduce yourselves.\n\n\"Just so you know, your stay tonight is on the house, in appreciation for all you've done. Just let me know if there's anything else I can do for you.\"\n\nDamian lets out a huge yawn. \"Right now, Neal, the best thing you can do is lead me to a bed.\" Sonya nods, muffling a yawn behind her paw as well.\n\n\"Of course, right this way,\" the owner says. He leads you up a set of worn stone stairs to the second floor, and opens a nearby door. Inside you see a large common room with three simple beds. You thank Neal, turn around three times, and fall asleep before your face hits the pillow.\n\n*page_break The Next Morning\nWhen you wake up the next morning, you notice the other two aren't in their beds. You get dressed and head downstairs, to find them seated around one of the worn tables. Scattered plates of food and bowls of water show they started having breakfast, but are now ignoring it to have a heated argument.\n\n\"That's absurd,\" Sonya says, crossing her arms in defiance.\n\n\"No, walking right into a trap is absurd,\" he responds, reaching for his food and accidentally putting his paw into his water bowl.\n\n\"What's going on?\" you ask, as Damian wipes his soggy paw on his shirt.\n\nSonya points an accusing finger at Damian. \"This coward wants us to waste time in our travels.\"\n\n\"No, I want to not be d
