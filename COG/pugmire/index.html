age.\n\n*choice\n\t#I brag of my monster-hunting prowess.\n\t\t\"Have you heard of my monster-hunting prowess?\" you ask, as he deflects your stab at his chest. \"After the creatures I've faced, you should be honored to be defeated by someone like me.\"\n\t\t*set per_ego %+10\n\t\t*gosub greedy_bow_duel_1_exchange\n\t\t*if stg_protect > 2\n\t\t\t*goto greedy_bow_duel_1_win\n\t\t*else\n\t\t\t*goto greedy_bow_duel_1_lose\n\t#I tell him I've beaten stronger enemies than him.\n\t\t\"I've beaten stronger enemies than you,\" you say, as he deflects your stab at his chest. \"Finishing this duel should be easy.\"\n\t\t*set per_tame %-10\n\t\t*gosub greedy_bow_duel_1_exchange\n\t\t*if stg_protect > 2\n\t\t\t*goto greedy_bow_duel_1_win\n\t\t*else\n\t\t\t*goto greedy_bow_duel_1_lose\n\t#I explain how I've learned to exploit enemy weaknesses.\n\t\t\"I know a lot about the weaknesses of my enemies,\" you say, as he deflects your stab at his chest. \"And how exactly to defeat them in the most painful way.\"\n\t\t*set per_idealist %-10\n\t\t*gosub greedy_bow_duel_1_exchange\n\t\t*if stg_lore > 2\n\t\t\t*goto greedy_bow_duel_1_win\n\t\t*else\n\t\t\t*goto greedy_bow_duel_1_lose\n\t#I convince him all enemies can be overcome with the right knowledge.\n\t\t\"I've learned so much about weaknesses,\" you say, as he deflects your stab at his chest. \"It's taught me nothing is impossible to overcome.\"\n\t\t*set per_idealist %+10\n\t\t*gosub greedy_bow_duel_1_exchange\n\t\t*if stg_lore > 2\n\t\t\t*goto greedy_bow_duel_1_win\n\t\t*else\n\t\t\t*goto greedy_bow_duel_1_lose\n\n*label greedy_bow_duel_1_exchange\n\nThe pirate suddenly lunges for you, trying to knock the saber out of your paw. You step back, barely dodging the blow, and you can feel the strange coldness of his enchanted blade as it skims past your fur. He stumbles slightly at your dodge, and you take advantage of the opening, quickly sweeping your blade at his leg.\n*return\n\n*label greedy_bow_duel_1_win\n\nThe edge of your saber grazes his leg. He hisses in pain. \n\n\"That's going to leave a mark,\" you say, carefully wiping the blood off the saber's blade.\n\nThe pirate flattens his ears. \"I'm done toying with you,\" he says with an evil look. \"Less talking and more killing.\"\n\nSeems like you rattled him somewhat. \n*set stg_badCat +1\n*goto greedy_bow_duel_2\n\n*label greedy_bow_duel_1_lose\n\nGreedy Bow sees your attack and knocks your saber aside with a laugh. \"If you fight as well as you talk, you might as well kill yourself and save me the trouble!\" \n\nSeems like he wasn't impressed with your boast. \n*set stg_badCat -1\n*goto greedy_bow_duel_2\n\n*label greedy_bow_duel_2\n\"Fine,\" you say as you parry another blow from his strange saber. \"No more talking, then.\" Your blades flash in the sunlight, as you each attempt to stab, parry, and dodge each other's blows. At one point Greedy Bow looks like his guard is down, but he dodges your stab and brings his freezing blade down across your body. You barely manage to duck away from it at the last possible moment.\n\n\"Getting tired?\" the pirate snarls. You don't reply, because you realize that you are getting tired. That mistake was nearly fatal. You need to find a way to push him into making a mistake, instead.\n\n*choice\n\t#I use my strength to shove him to the ground.\n\t\tYou hold your breath, waiting for Greedy Bow to strike again. After a long moment, he slashes at you, impatient. Once he does, you dodge the slash and step close to him. His eyes grow wide with surprise as, grabbing the lapels of his coat, you shove him with all your might.\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tThe pirate stumbles, trips, and falls with a loud [i]yelp[/i]. \n\t\t\t*goto greedy_bow_duel_2_win\n\t\t*else\n\t\t\tThe pirate, however, barely manages to stand his ground. Your strength isn't enough to overcome him. He laughs, and twists out of your grip. With incredible speed, he spins, and suddenly he's holding his saber to your throat.\n\t\t\t*if (flg_muttRespect)\n\t\t\t\t*goto outsider_help\n\t\t\t*else\n\t\t\t\t*goto captured\n\t#I trick him into making a risky attack.\n\t\tYou swing wildly with your saber, slicing the air. Greedy Bow sees the clumsy blow, and easily steps aside to dodge the swing. You're in the perfect position, making it appear as if you've left yourself wide open for an attack. \n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\tTaking the bait, the pirate steps in and stabs hard at you. But you were planning for that move. You kick hard at his leg, knocking him to the ground. \n\t\t\t*goto greedy_bow_duel_2_win\n\t\t*else\n\t\t\tThe pirate, however, doesn't take the bait. He laughs and steps back, holding his saber to your throat.\n\t\t\t*if (flg_muttRespect)\n\t\t\t\t*goto outsider_help\n\t\t\t*else\n\t\t\t\t*goto captured\n\t#I dodge his next attack to hit him from the side.\n\t\tYou hold your breath, waiting for Greedy Bow to strike again. He assesses the situation for a long moment, and then makes a heavy slash at your chest. You wait until the last possible moment, before spinning out of the way. \n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tThe sudden, graceful dodge puts the pirate off his guard. With a [i]yelp[/i], he stumbles and falls to the ground. \n\t\t\t*goto greedy_bow_duel_2_win\n\t\t*else\n\t\t\tGreedy Bow is too fast for you, however, and you feel the blade part your fur. Before you can recover, he laughs, twists the saber in his paw, and holds it to your throat.\n\t\t\t*if (flg_muttRespect)\n\t\t\t\t*goto outsider_help\n\t\t\t*else\n\t\t\t\t*goto captured\n\t*selectable_if (flg_hasMagic) #I cast a quick spell to disorient him.\n\t\tBefore Greedy Bow can strike again, you quickly mutter something under your breath. The sound of the kraken crashing into the [i]The Pig's Tale[/i] erupts right behind Greedy Bow. \n\t\t*set att_clever %+05\n\t\t*if att_clever > 55\n\t\t\tShocked, the pirate spins in the direction of the sound. You use the distraction to kick the cat's legs out from under him, and he trips and falls to the ground.\n\t\t\t*goto greedy_bow_duel_2_win\n\t\t*else\n\t\t\tThe cat pirate's ears twitch, but he laughs at you and holds the glowing saber to your throat. Looks like he didn't fall for your trick. \n\t\t\t*if (flg_muttRespect)\n\t\t\t\t*goto outsider_help\n\t\t\t*else\n\t\t\t\t*goto captured\n\n*label greedy_bow_duel_2_win\nYou step forward to stab him while he's down, but the glow of his saber flows over Greedy Bow's body, and suddenly he's standing back up again. \"You can't defeat me that easily,\" he snarls. He's confident, but now you know something about his sword's unusual properties. You'll have to try and disarm him.\n*set stg_badCat +1\n\nGreedy Bow pants. \"You can't defeat me as long as I hold this saber.\" You don't know what other tricks the relic in his paw might hold, but you realize you need to end this duel, and quickly. Do you have enough of an advantage to disarm him?\n\n*choice\n\t#I give him one last chance to surrender.\n\t\t\"You have one last chance to surrender,\" you say. \"Drop your sword, and I promise to take you alive.\"\n\t\t*if per_idealist >=55\n\t\t\t*set stg_badCat +1\n\t\t\t*goto greedy_bow_test\n\t\t*else\n\t\t\t*goto greedy_bow_test\n\t#I ruthlessly attempt to injure him.\n\t\tYou step forward, stabbing hard at him. One quick thrust, and Greedy Bow will be at your knees. \n\t\t*if per_idealist \u003c=45\n\t\t\t*set stg_badCat +1\n\t\t\t*goto greedy_bow_test\n\t\t*else\n\t\t\t*goto greedy_bow_test\n\t#I calmly defend myself against him, hoping to wear him down.\n\t\tYou step back, holding your saber in front of you. If you can weather his blows, he'll exhaust himself. \n\t\t*if per_tame >=55\n\t\t\t*set stg_badCat +1\n\t\t\t*goto greedy_bow_test\n\t\t*else\n\t\t\t*goto greedy_bow_test\n\t#I wildly swing at him, trying to overpower him.\n\t\tYou swing wildly from the shoulder, putting all your strength into the swing. Hopefully that will stop him. \n\t\t*if per_tame \u003c=45\n\t\t\t*set stg_badCat +1\n\t\t\t*goto greedy_bow_test\n\t\t*else\n\t\t\t*goto greedy_bow_test\n\n*label greedy_bow_test\n*if stg_badCat >= 2\n\t*goto greedy_bow_duel_3_win\n*else\n\t*goto greedy_bow_duel_3_lose\n\n*label greedy_bow_duel_3_win\n\nGreedy Bow barely holds on to his saber as you continue to cross swords. He takes a step back, then another. He's panting heavily, clearly exhausted from the lengthy duel. He tries to trick you once or twice, but you've learned a lot from pursuing this pirate. You deflect each of this gambits one at a time, and with a mighty swing of your blade, you knock his saber out of his paw.\n\n*achieve winduel\n*choice\n\t#Let him recover his sword.\n\t\tYou motion to his sword, lying on the ground. \"Pick it up,\" you say. \"I want you to die with your sword in your paw.\" The pirate looks around, assessing his options.\n\t\t*goto greedy_bow_surrender\n\t#Tell him to surrender.\n\t\tYou put the point of your sword to his chin. \"Surrender,\" you say.\n\t\t*goto greedy_bow_surrender\n\t#Kill him.\n\t\tYou stare him in the eyes.\n\n\t\t\"Please,\" he pleads. \"I'll change. I'll do whatever you want me to do.\"\n\n\t\tBut you know what will happen if you let him go. He'll steal and murder and destroy people's lives, all over again.\n\n\t\tWith steel in your eyes, you swing your blade at Greedy Bow's neck, ending his life.\n\t\t*set flg_greedyBowState 3\n\t\t*achieve endchapter7\n\t\t*finish [b]Chapter Eight: The Secret of the Pearls[/b]\n\n*label greedy_bow_duel_3_lose\n\nGreedy Bow merely tightens his grip on his saber as you continue to cross swords. He takes a momentary step back as you push your advantage, but soon he steps forward again. His disturbing blade flashes almost faster than your eye can follow, flickering into perfect defense positions. You thought you knew how to defeat this pirate, but his bag of tricks is deeper than you expected. Soon you're panting from exhaustion.\n\nYou lash out with one more desperate slash from your saber, but the cat knocks the blade out of your grip, putting his sword to your throat. \n*if (flg_muttRespect)\n\t*goto outsider_help\n*else\n\t*goto captured\n\n*label outsider_help\n\nSuddenly, Greedy Bow trips and falls on his face! His saber falls to the sand as you see some of his crew pulling him by his legs.\n\n*if (flg_damianStayed = false)\n\tDamian rushes over and helps you up. \"Turns out some of the cats on his crew come from Mutt Town,\" he says. \"We had a talk about Cokie Mutt while you were fighting Captain Obsessed over there. They decided to help out.\"\n\t*goto outsider_help_2\n*elseif (flg_sonyaStayed = false)\n\tSonya rushes over and helps you up. \"During our fight, some of the cats on Greedy Bow's crew recognized you from Cokie Mutt's description,\" she says. \"They're from Mutt Town, and they decided to help out.\"\n\t*goto outsider_help_2\n*else\n\tOne of the pirate cats helps you up. \"Some of us are cats that live in Mutt Town,\" she says, as you stare at her in confusion. \"Cokie Mutt said you help outsiders like us in times of need. We wanted to return the favor.\"\n\t*goto outsider_help_2\n\n*label outsider_help_2\n\n\"I'll have you all keelhauled for this!\" Greedy Bow spits, and his mutinous crew starts to tie him up.\n\n*choice\n\t#Let him recover his sword.\n\t\tYou motion to his sword, lying on the ground. \"Pick it up,\" you say. \"I want you to die with your sword in your paw.\" The pirate looks around, assessing his options.\n\t\t*goto greedy_bow_surrender\n\t#Tell him to surrender.\n\t\tYou put the point of your sword to his chin. \"Surrender,\" you say.\n\t\t*goto greedy_bow_surrender\n\t#Kill him.\n\t\tYou stare him in the eyes.\n\n\t\t\"Please,\" he pleads. \"I'll change. I'll do whatever you want me to do.\"\n\n\t\tBut you know what will happen if you let him go. He'll steal and murder and destroy people's lives, all over again.\n\n\t\tWith steel in your eyes, you swing your blade at Greedy Bow's neck, ending his life.\n\t\t*set flg_greedyBowState 3\n\t\t*achieve endchapter7\n\t\t*finish [b]Chapter Eight: The Secret of the Pearls[/b]\n\n*label greedy_bow_surrender\n\n*if flg_defeatAmbrosia = false\n\tGreedy Bow's eyes slide to where Ambrosia had been standing, but the bird is gone. He hisses at the sorcerer's betrayal, and reluctantly spits, \"I surrender.\"\n\t*set flg_greedyBowState 2\n\t*achieve endchapter7\n\t*finish [b]Chapter Eight: The Secret of the Pearls[/b]\n*else\n\tRealizing he's been soundly defeated, Greedy Bow reluctantly spits, \"I surrender.\"\n\t*set flg_greedyBowState 2\n\t*achieve endchapter7\n\t*finish [b]Chapter Eight: The Secret of the Pearls[/b]\n\n*label captured\n\n*if (flg_damianStayed = false) and (flg_sonyaStayed = false)\n\tSonya screams \"No!\" and tries to break away from her fight, but she's soon overwhelmed by the pirates. Damian dives into the fray to extract her, but one pirate cat punches him in the back of his head, knocking him unconscious.\n\t*goto captured_2\n*elseif (flg_sonyaStayed = false)\n\tSonya screams \"No!\" and tries to break away from her fight, but she's soon overwhelmed by the pirates. \n\t*goto captured_2\n*elseif (flg_damianStayed = false)\n\tDamian screams \"No!\" and dodges away from the pirates he was fighting, but another grabs his leg and drags him to the ground.\n\t*goto captured_2\n\n*label captured_2\n\nThe rest of your crew are quickly captured, as Greedy Bow kicks your saber away from you. Blood-colored sand sprays in your face. \"Now you are in my power!\" he cackles.\n\n*if flg_defeatAmbrosia = false\n\t\"Ambrosia!\" he laughs. \"Take care of this mongrel for me.\" He glances over to where his first in command had been standing, but the bird is gone. He hisses at the sorcerer's betrayal, and pushes the point of his saber hard on your throat, causing a trickle of blood to soak into your ${plc_fur} fur.\n\t*goto captured_3\n*else\n\t\"Surrender!\" he laughs. He pushes the point of his saber hard on your throat, causing a trickle of blood to soak into your ${plc_fur} fur.\n\t*goto captured_3\n\n*label captured_3\n\nWith no other choice, you surrender.\n*achieve endchapter7\n*finish [b]Chapter Eight: Captured![/b]", "08-climax": "*temp flg_playerTiedUp false\n*temp flg_domHurt false\n*temp flg_playerHurt false\n*temp flg_pearlsSeparate false\n*temp flg_necklaceLost false\n*temp flg_bowToWaterdog false\n*temp flg_bowToMau false\n*temp flg_bowToPugmire false\n*temp flg_damianDisapproves false\n*temp flg_sonyaDisapproves false\n*temp flg_askedSonya false \n*temp flg_askedDamian false \n*temp flg_offeredSonya false\n*temp flg_offeredDamian false\n*temp flg_talkedToFiona false\n*temp flg_talkedToMurra false\n*temp flg_whoHasPearls 1\n\t*comment 1 = player has them. 2 = Fiona has them. 3 = Murra has them. 102 = player and Fiona has a half each. 103 = player and Murra has a half each.\n*if flg_greedyBowState > 1\n\t*goto defeated_greedy_bow\n*else\n\t*set flg_playerTiedUp true\n\t*goto tied_up\n\n*label tied_up\n*text_image chap_8a.png center [b]Chapter Eight: Captured![/b]\n\n\"Tie them up!\" Greedy Bow shouts. The remainder of his crew leap to obey. Rough paws yank your arms behind you, and coarse ropes hold your wrists in place while more ropes tie your ankles together. Even in this dark moment, you can't help but smile as you imagine Dom correcting you, telling you they're called \"lines\" and not ropes.\n\n*if (flg_damianStayed = false) and (flg_sonyaStayed = false)\n\tThe smile quickly fades as Damian's unconscious form is tied up next to you. Sonya struggles against the pirates for a moment, but upon seeing Damian's unconscious form, she stops and allows her paws and feet to be bound.\n\n\t\"Is he okay?\" she asks as she's dropped next to you on the sandy beach. \n\n\tBut before you can answer, you both hear a low groan, and Damian's eyes flutter. \"Did someone get the name of that cart?\" he asks. He jerks against the ropes and then stares down, as if just now noticing them. \"Oh right. Pirates.\"\n\n\t*choice\n\t\t#I crack a joke.\n\t\t\t\"Welcome back,\" you say.\n\t\t\t*set per_ego %+10\n\t\t\t*goto tied_up_2\n\t\t#I worry about him.\n\t\t\t\"Seriously, are you okay?\" you ask.\n\t\t\t*set per_loyal %+10\n\t\t\t*goto tied_up_2\n\t\t#I threaten the pirates.\n\t\t\t\"I'll kill you for that,\" you snarl.\n\t\t\t*set per_tame %-10\n\t\t\t*goto tied_up_2\n*elseif (flg_sonyaStayed = false)\n\tSonya struggles against\tthe pirates for a moment, but they soon overpower her and manage to bind her paws and feet before dumping her next to you on the sandy beach.\n\n\t\"I'm sorry,\" she mutters, not looking at you.\n\n\t*choice\n\t\t#I crack a joke.\n\t\t\t\"About what?\" you say, forcing a smile. \"We have him right where we want him.\"\n\t\t\t*set per_ego %+10\n\t\t\t*goto tied_up_2\n\t\t#I worry about her.\n\t\t\t\"I'm more worried about you,\" you say.\n\t\t\t*set per_loyal %+10\n\t\t\t*goto tied_up_2\n\t\t#I threaten the pirates.\n\t\t\t\"Once we're free, we'll kill you,\" you snarl.\n\t\t\t*set per_tame %-10\n\t\t\t*goto tied_up_2\n*elseif (flg_damianStayed = false)\n\tDamian struggles against the pirates for a moment, but he notices how many there are. After some mental math he shrugs, allowing them to bind his paws and feet before dumping him next to you on the sandy beach.\n\n\t\"This is going well,\" he mutters.\n\n\t*choice\n\t\t#I crack a joke.\n\t\t\t\"Just a couple of minor issues,\" you say, forcing a smile. \"Nothing we can't work around.\"\n\t\t\t*set per_ego %+10\n\t\t\t*goto tied_up_2\n\t\t#I worry about him.\n\t\t\t\"Are you okay?\" you ask.\n\t\t\t*set per_loyal %+10\n\t\t\t*goto tied_up_2\n\t\t#I threaten the pirates.\n\t\t\t\"Once we're free, we'll kill you,\" you snarl.\n\t\t\t*set per_tame %-10\n\t\t\t*goto tied_up_2\n*else\n\t*choice\n\t\t#I crack a joke.\n\t\t\t\"So,\" you say, letting the smile linger. \"Shall we negotiate the terms of your surrender?\"\n\t\t\t*set per_ego %+10\n\t\t\t*goto tied_up_2\n\t\t#I worry about the crew.\n\t\t\t\"Are the rest of my crew okay?\" you ask.\n\t\t\t*set per_loyal %+10\n\t\t\t*goto tied_up_2\n\t\t#I threaten the pirates.\n\t\t\t\"Once I'm free, I'll kill you,\" you snarl.\n\t\t\t*set per_tame %-10\n\t\t\t*goto tied_up_2\n\n*label tied_up_2\n\n\"Shut up!\" Greedy Bow yells, as he smacks you across the face with the hilt of his saber. Your head twists to the side from the blow, and you feel more blood in your fur. The pirate cat stares at you, waiting for another outburst, before turning back to the chest sitting on the beach next to the hole. \n\n*page_break\nThe chest looks like a small wooden box with a lock and a lid, not that different from what you use aboard [i]The Pig's Tale[/i] to store supplies. There's still some of the rusty red sand sprayed across the top, and from here it appears to be closed with a simple metal lock. \n\nGreedy Bow pokes at the chest with his saber. The blade flashes purple for a moment when it touches the box, but otherwise nothing unusual happens.\n\n*if plc_calling = \"Artisan\"\n\t\"It's trapped, isn't it?\" you say.\n\n\tThe pirate cat ignores you, but you hear Dom, tied up somewhere behind you, say: \"Magic, right?\"\n\n\tYou try to turn around and look at him, but quickly give up the effort. \"Yeah,\" you say, watching Greedy Bow continue to stare at the box. \"Sometimes a persistent magical spell will intersect with another magical effect and cause a temporary visual aura.\"\n\n\t\"The flash,\" Dom says.\n\n\t\"Exactly. And I think our friend here suspects just such a magical trap, which is why he's reluctant to open it.\"\n\t*goto tied_up_open_chest\n*else\n\tSomewhere behind you, you hear Dom's voice say \"Trapped.\"\n\n\tYou try to turn around and look at him, but quickly give up the effort. \"What do you mean?\" you ask, knowing that asking Dom to talk more is like asking the sea to be less acidic.\n\n\tSurprisingly, you get another word. \"Magic.\"\n\n\tYou put it together. \"The chest has a magical trap on it,\" you say, watching Greedy Bow continue to stare at the box. \"And our friend here know that, which is why he's reluctant to open it.\"\n\t*goto tied_up_open_chest\n\n*label tied_up_open_chest\n\nOne of the pirates storms over to you and slaps you across the face again. You feel something pop around your chest. Maybe one of the bindings has come loose? \"The boss said to shut up!\" he howls, and pulls his paw back for a second blow. But Greedy Bow puts a paw up.\n\n\"No,\" he says, before turning to look at you. \"You know something about this chest.\"\n\n\"Do I?\" you say, cagily.\n\nThe pirate cat crouches down in front of you. You can smell the salt and sweat on his fur, and see that his coat is far more tattered and grimy than you first thought. He's snarling at you, but in his eyes you can see he's exhausted. His voice is a nasty whisper. \"I was planning to have one of my crewmates open the chest and find out what happens, but now I have some new volunteers.\" He motions to your captured colleagues. \"But if you know how to open it, it will save a lot of time and singed fur if you just tell me.\"\n\nYour thoughts race. [i]Can[/i] you figure out how to open it? Or can you turn Greedy Bow's paranoia against him?\n\nGreedy Bow grabs Dom and starts to drag him towards the chest.\n\n*choice\n\t#I think I can figure it out. Telling him will save lives.\n\t\t\"Okay,\" you say suddenly. \"I'll tell you. Let him go.\"\n\n\t\tGreedy Bow looks at you, skeptically. \n\n\t\tYou put your tied paws out for him to see. \"Cut me loose. I'll open the chest.\"\n\n\t\tThe pirate mulls this over for a minute, and then \n\t\t*set att_clever %+05\n\t\t*if att_clever >= 60\n\t\t\tnods and cuts your bindings with his uncanny saber. \"If you try anything,\" he purrs, \"the turtle gets it.\"\n\n\t\t\t\"There's no need for that,\" you say, walking over to the chest and getting a closer look at it.\n\n\t\t\tNow that you see it up close, you notice there are several black bumps around the lock that look like inset dark pearls. You faintly smell lavender and ozone, which gets stronger as your gently stroke three certain bumps. These are probably where the magic is strongest.\n\n\t\t\tHolding your breath, you touch the three magic bumps at the same time. You hear a soft click, and the lid bounces up slightly. It looks like the keyhole lock was a misdirection.\n\n\t\t\tGreedy Bow shoves you out of the way and opens the lid.\n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto untied\n\t\t*else\n\t\t\tshakes his head. \"I don't trust you. Tell me what to do, and I'll have your friend here do it,\" he says, shaking the turtle slightly.\n\n\t\t\tYou glance at Dom, pleading silently, but he just nods to you. With a sigh, you agree, adding: \"At least let me get close enough to see the chest.\"\n\n\t\t\tGreedy Bow motions to two of his pirates, and they drag your bound body through the sand to sit next to the chest. \n\n\t\t\tNow that you see it up close, you notice there are several black bumps around the lock that look like inset dark pearls. You faintly smell lavender and ozone—tell-tale signs of magic.\n\n\t\t\t\"Ignore the keyhole,\" you say. \"Touching those pearls around the lock will open the chest.\"\n\n\t\t\tGreedy Bow draws a knife and puts it to the back of Dom's neck, resting on the top of the turtle's shell. \"Do it,\" he snarls. \n\n\t\t\tDom slowly and carefully starts to touch the bumps. When he touches a few, the smells get stronger. \"Wait,\" you say, \"go back.\" Through trial and error, you discover three pearls might be more magical. Or is it four? It's so hard to tell at this distance.\n\n\t\t\t\"Try pushing those four,\" you say, describing the locations of the ones you think are the most magical. Dom carefully complies, touching all four at once. There's a loud [i]ZZZZAAAPPPPPPP[/i], and Dom falls backwards as a bright light blinds you all momentarily. When your vision clears, however, you see Dom has a large scar on his shell, and the lid of the chest has opened slightly.\n\n\t\t\tGreedy Bow shoves the twitching turtle out of the way and opens the lid. \n\t\t\t*set flg_domHurt true\n\t\t\t*goto pull_out_pearls\n\t#I snarl at him, hoping he'll hurt me instead of Dom.\n\t\tYou stare daggers at the pirate. \"You coward,\" you snarl. \"If you want to hurt someone, hurt me.\"\n\n\t\tThe pirate mulls this over for a minute, and then \n\t\t*set att_solid %+05\n\t\t*if att_solid >= 60\n\t\t\tnods and cuts your bindings with his uncanny saber. \"Fine, you open it,\" he hisses, shoving Dom out of the way. \"But if you try anything, the turtle gets it.\"\n\n\t\t\tYou stand up, rubbing your wrists. \"No. I won't open it.\"\n\n\t\t\tGreedy Bow pulls his saber back. \"I will cut you down where you stand, dog!\" he screams. You duck as the saber slashes at you, but the pirate is cunning and kicks you in the chest. You stumble and fall onto the chest. You feel something crack underneath you, hear a loud [i]ZZZZAAAPPPPPPP[/i], and then everything goes white as every nerve ending erupts in the most intense pain you've ever felt in your whole life.\n\n\t\t\tSomehow, you stay conscious as you fall to the sand, and out of the corner of your eye, you see that the chest was opened in your struggle. Greedy Bow sheathes his saber, rushes to the chest, and opens the lid. \n\t\t\t*set flg_playerTiedUp false\n\t\t\t*set flg_playerHurt true\n\t\t\t*goto untied\n\t\t*else\n\t\t\tshakes his head. \n\t\t\t*gosub dom_hurt\n\t\t\t*goto pull_out_pearls\n\t#I bluff, hoping to get Greedy Bow to trigger the trap.\n\t\t\"Sure, I'll tell you. All you needed to do was ask.\"\n\n\t\tGreedy Bow looks at you, skeptically. \n\n\t\t\"Look, if you cut me loose and I open the chest, I'll get the treasure first. But I can't help you with the chest from here. So just free my paws—that way I won't be able to run away, but you can be the one to get to the treasure first.\"\n\n\t\tThe pirate mulls this over for a minute, and then \n\t\t*if (att_clever >= 60)\n\t\t\tnods and cuts your bindings with his uncanny saber. \"If you try anything,\" he purrs, \"the turtle gets it.\"\n\n\t\t\t\"Relax, you're still in control,\" you say, walking over to the chest and getting a closer look at it.\n\n\t\t\tNow that you see it up close, you notice there are several black bumps around the lock that look like inset dark pearls. You faintly smell lavender and ozone as you look at the pearls. Probably magic.\n\n\t\t\t\"Touch the pearls surrounding the lock,\" you say. You're hoping the pearls are the source of the magic trap, and that it'll hurt Greedy Bow badly enough that you can take the advantage.\n\n\t\t\tThe pirate looks skeptically at you again, and then carefully touches some of the pearls. You hear a soft click, and the lid bounces up slightly. Man-damn it, it looks like the pirate cat accidentally figured out the lock. At least your paws are free.\n\n\t\t\tGreedy Bow shoves you out of the way and opens the lid. \n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto untied\n\t\t*else\n\t\t\tshakes his head. \n\t\t\t*gosub dom_hurt\n\t\t\t*goto pull_out_pearls\n\t#I try to burst the lines binding me.\n\t\tIgnoring the pirate, you flex your chest muscles. You remember feeling something snap when the pirate slapped you, and you're hoping you can burst the bindings around your arms.\n\n\t\t\"What are you doing?\" Greedy Bow snarls as you flex.\n\n\t\t*set att_mighty %+05\n\t\t*if att_mighty >= 60\n\t\t\tJust then, you feel more popping and snapping, and then your arms are free! The pirate cat, in desperation, puts his saber to Dom's neck.\n\n\t\t\t\"Not another move,\" he snarls, \"or the turtle gets it.\"\n\n\t\t\tYou sit still, trying to think of your next move, when Greedy Bow suddenly pushes Dom onto the chest. You hear a crack immediately followed by a loud [i]ZZZZAAAPPPPPPP[/i], and Dom falls backwards as a bright light blinds you all momentarily. When your vision clears, however, you see Dom has a large scar on his shell, and the lid of the chest has opened slightly.\n\n\t\t\tGreedy Bow shoves the twitching turtle out of the way and opens the lid. \n\t\t\t*set flg_domHurt true\n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto untied\n\t\t*else\n\t\t\tBut to no avail. You push and stretch, but the lines hold you firm. \n\t\t\t*gosub dom_hurt\n\t\t\t*goto pull_out_pearls\n\n*label dom_hurt\n\n\"You're up to something,\" he snarls, and pushes Dom onto the chest. You hear a crack immediately followed by a loud [i]ZZZZAAAPPPPPPP[/i], and Dom falls backwards as a bright light blinds you all momentarily. When your vision clears, however, you see Dom has a large scar on his shell, and the lid of the chest has opened slightly.\n\nGreedy Bow shoves the twitching turtle out of the way and opens the lid. \n*set flg_domHurt true\n*return\n\n*label untied\nYou finish untying yourself, carefully watching the pirate cat.\n*goto pull_out_pearls\n\n*label pull_out_pearls\n\nGreedy Bow pulls out a beautiful necklace of black pearls that look very similar to the Corgi Pearls. The necklace hangs on a thin leather cord, and it looks like there are some pearls missing. The pirate cat holds the necklace in his paws, looking at them with awe and wonder.\n\n*if (plc_calling = \"Artisan\")\n\t*gosub artisan_scene\n\t*goto hurt_and_tied_up\n*elseif (plc_calling = \"Shepherd\")\n\t*gosub shepherd_scene\n\t*goto hurt_and_tied_up\n*else\n\t*goto hurt_and_tied_up\n\n*label artisan_scene\n\nThe smell of magic assaults your nostrils, stronger even than the pearls embedded in the chest. This magic is foul, like rotting meat and wilting flowers. There's necromancy of some kind in these pearls.\n*return\n\n*label shepherd_scene\n\nYou can smell the unholy nature of the necklace. You never noticed it in the Corgi Pearls themselves, but this necklace reeks of demonic energy. Without question, it's of the Unseen.\n*return\n\n*label hurt_and_tied_up\n*if (flg_domHurt)\n\tAs you watch, you see Dom shake his head and pull himself up. Looks like the magical trap on that chest didn't injure him permanently, despite the large scar. Relieved, you carefully watch Greedy Bow.\n\t*if (flg_playerTiedUp)\n\t\t*goto watch_helpless\n\t*else\n\t\t*goto try_to_grab_pearls\n*elseif (flg_playerHurt)\n\tAs you watch, the pain racing through your body fades away. Seems the magical trap didn't injure you permanently. Relieved, you carefully watch Greedy Bow.\n\t*set flg_playerHurt false\n\t*if (flg_playerTiedUp)\n\t\t*goto watch_helpless\n\t*else\n\t\t*goto try_to_grab_pearls\n*else\n\t*if (flg_playerTiedUp)\n\t\t*goto watch_helpless\n\t*else\n\t\t*goto try_to_grab_pearls\n\n*label watch_helpless\n\n*gosub greedy_bow_pearl_info\n\nAs the pirate stares at the necklace in awe, holding it in one paw and the Corgi Pearls in the other, \n*if (flg_damianStayed = false)\n\tDamian pushes himself with his bound feet through the sand to bump into you. \"I wriggled my paws free,\" he whispers, as he stealthily unties your bindings. Within moments, you're free.\n\t*set flg_playerTiedUp false\n\t*goto try_to_grab_pearls\n*elseif (flg_sonyaStayed = false)\n\tSonya pulls her arms apart, and the lines around her arms split from her mighty thews. Without wasting time untying her feet, she pulls herself to you and rips at your bindings. Within moments, you're free.\n\t*set flg_playerTiedUp false\n\t*goto try_to_grab_pearls\n*else\n\tyou realize now's your chance to try and break free.\n\t\n\t*choice\n\t\t*selectable_if (att_mighty > 50) #I use my strength to rip apart my bonds.\n\t\t\tUsing your mighty strength, you split the lines holding your arms together. You quickly work on the rest of your bonds, and within moments, you're free.\n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto try_to_grab_pearls\n\t\t*selectable_if (flg_hasMagic) #I quietly cast a spell to free myself.\n\t\t\tUnder your breath, you mutter a spell. Within moments, the lines tying you up turn into snakes which slither off and hide in the blood-red sands. \n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto try_to_grab_pearls\n\t\t*selectable_if (att_sneaky > 50) #I carefully slide out of my bonds.\n\t\t\tUsing your supple frame, you twist and turn your arms until you manage to slide out of the bonds. You quickly work on the rest of your bonds, and within moments, you're free.\n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto try_to_grab_pearls\n\t\t#I dig in the sand for a sharp rock.\n\t\t\tIn desperation, you dig in the sand looking for something to cut your bonds. Surprisingly, you find a sharp piece of flint. You quickly use it to cut your bonds, and within moments, you're free.\n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto try_to_grab_pearls\n\t\t#I use my feet to slide the bonds off my paws.\n\t\t\tDesperately, you put your feet on the bonds holding your paws together, to try and shove the lines off you. Surprisingly, your foot catches on a frayed piece of rope, and the bonds split and fall away. You quickly work on the rest of your bonds, and within moments, you're free.\n\t\t\t*set flg_playerTiedUp false\n\t\t\t*goto try_to_grab_pearls\n\n*label try_to_grab_pearls\n\nAs the pirate admires his ill-gotten treasure, you try to rush him. Before you can take more than a few steps, however, two of Greedy Bow's crewmembers grab your legs. You fall face-first into the sand, your paws just inches away from the nefarious pirate captain.\n*goto combine_pearls\n\n*label greedy_bow_pearl_info\n\n\"It's an ancient artifact,\" the cat says, staring at the necklace. \"There are six cat monarchies now, but once there was a seventh that we don't talk about anymore. Rumors are they were necromancers and demonologists, able to summon and control demons. And that necklace—the Orbs of Smilodon—can manipulate the Unseen to do the wearer's bidding.\"\n\n*if (flg_hasMagic)\n\tSomething about that doesn't sound right. In your experience, the Unseen are deceitful, and there's very little magic in the world that can completely control them. Of course, you're not that knowledgeable about cat magic, but it seems if there were some foolproof way to control demons, everyone would know about it by now.\n\t*return\n*else\n\t*return\n\n*label defeated_greedy_bow\n*text_image chap_8b.png center [b]Chapter Eight: The Secret of the Pearls[/b]\n\n*if (flg_muttRespect)\n\t*if flg_greedyBowState = 2\n\t\tPally barks at her crew, as well as the pirates who turned on their captain. Within moments Greedy Bow and the rest of his loyal crew are tied up.\n\n\t\t\"All pirates that haven't joined the crew are now secured! Squawk!\" \n\t\t*goto examine_chest_1\n\t*else\n\t\tPally barks at her crew, as well as the pirates who turned on their captain. Within moments the rest of Greedy Bow's loyal crew are tied up.\n\t\t*goto examine_chest_1\n*else\n\t*if flg_greedyBowState = 2\n\t\tPally barks at her crew, and within moments Greedy Bow and the rest of the crew are tied up.\n\t\t*goto examine_chest_1\n\t*else\n\t\tPally barks at her crew, and within moments Greedy Bow's crew are tied up.\n\t\t*goto examine_chest_1\n\n*label examine_chest_1\nPally gives you a jaunty salute. \n\nYou return it, before snatching the Corgi Pearls from Greedy Bow's paw.\n\n*if (flg_sonyaStayed = false)\n\tSonya points to the chest Greedy Bow had dug up. \"We should see what that pirate was after,\" she says. \"It may have something to do with the Corgi Pearls.\"\n\t*goto examine_chest_2\n*elseif (flg_damianStayed = false)\n\tDamian smiles as you take the Corgi Pearls. \"Good job, boss.\" He glances over at the chest Greedy Bow had dug up. \"But we should see what other treasure we can nab from this pirate.\"\n\t*goto examine_chest_2\n*else\n\tHaving secured the Corgi Pearls, you turn your attention to the chest Greedy Bow had dug up.\n\t*goto examine_chest_2\n\n*label examine_chest_2\n\nIt looks like a small wooden box with a lock and a lid, not that different from what you use aboard [i]The Pig's Tale[/i] to store supplies. There's still some of the rusty red sand sprayed across the top, and it's closed with a simple metal lock surrounded by several black bumps that look like inset dark pearls. \n\n*if (flg_hasMagic)\n\tYou faintly smell lavender and ozone, which gets stronger as your gently stroke three certain bumps. These are probably where the magic is strongest.\n\t*goto examine_chest_3\n*else\n\tYou gently stroke the bumps and the lock, wondering how to open it.\n\t*goto examine_chest_3\n\n*label examine_chest_3\n\n*if flg_greedyBowState = 2\n\tThe pirate captain cackles madly as you examine the chest. \"You'll never get that chest open. It's protected by magic.\"\n\n\t\"So tell me how to open it,\" you say, pointing your saber at him again.\n\n\t\"Would that I could,\" the pirate laughs, \"but I was just puzzling that out myself when your crew arrived and so rudely interrupted me.\"\n\n\t\"Why are you helping us?\" Pally says, suspicious.\n\n\tGreedy Bow attempts to shrug in his bonds. \"Let's just say I want what's in there as bad as you. More, even.\"\n\n\t\"Why?\" you ask. \"What's in there?\"\n\n\t*gosub greedy_bow_pearl_info\n\n\t*goto open_chest \n*else\n\tOne of the pirate cats cackles madly as you examine the chest. \"You'll never get that chest open. It's protected by magic.\"\n\n\t\"So tell me how to open it,\" you say, pointing your saber at him.\n\n\t\"Would that I could,\" the pirate laughs, \"but Greedy Bow was just puzzling that out himself when your crew arrived and so rudely interrupted him.\"\n\n\t\"Why are you helping us?\" Pally says, suspicious.\n\n\tThe pirate attempts to shrug in his bonds. \"If Greedy Bow wanted what's in there as bad, we want it even more.\"\n\n\t\"Why?\" you ask. \"What's in there?\"\n\n\t*gosub greedy_bow_pearl_info\n\n\t*goto open_chest\n\n*label open_chest\n\nThe Corgi Pearls tingle in your paw, and you have a strong desire to open the chest. Almost like a voice whispering in your mind, telling you that the [i]real[/i] legacy of the Corgis is hidden within.\n\n*choice\n\t#I open the chest carefully, avoiding any magical traps.\n\t\tYou look at the chest again. If it's trapped, odds are fiddling with the keyhole will set off the trap, so your turn your attention to the bumps around the lock.\n\n\t\t*set att_clever %+05\n\t\t*if (flg_hasMagic)\n\t\t\tYou touch the three bumps that smelt the strongest of magic at the same time. You hear a soft click, and the lid bounces up slightly. \n\t\t\t*goto take_pearls\n\t\t*elseif att_clever >=60\n\t\t\tYou aren't sure which ones to touch, however. On a whim, you sprinkle some of the reddish sand over the lock. You notice that most of the sand clumps around all but three of the black studs—it's almost as if something about those three is actually repelling the sand, maybe? Not having any other ideas, you touch those three bumps at the same time.\n\n\t\t\tYou hear a soft click, and the lid bounces up slightly.\n\t\t\t*goto take_pearls\n\t\t*else\n\t\t\tTry as you might, however, you can't figure out what to do. Without any other options, you touch four of the bumps at once. \n\t\t\t\n\t\t\tYou hear a loud [i]ZZZZAAAPPPPPPP[/i], and then everything goes white as every nerve ending erupts in the most intense pain you've ever felt in your whole life. Somehow, you stay conscious as you fall to the sand, and out of the corner of your eye, you see the lid has opened slightly.\n\t\t\t*set att_clever %-05\n\t\t\t*set att_friendly %-05\n\t\t\t*set att_agile %-05\n\t\t\t*set att_sneaky %-05\n\t\t\t*set att_mighty %-05\n\t\t\t*set att_solid %-05\n\t\t\t*if flg_greedyBowState = 2\n\t\t\t\tThe pirate cat laughs at your predicament as the pain wracks your body, making it hard to move or concentrate. \n\t\t\t\t*goto take_pearls\n\t\t\t*else\n\t\t\t\tThe pain wracks your body, making it hard to move or concentrate. \n\t\t\t\t*goto take_pearls\n\t#I smash the chest open, magic be Man-damned.\n\t\tYou look at the chest again. It looks fairly solid, but not excessively so. A heavy blow should bust it open. Searching the beach, you find a good-sized rock that just about fits in your paw. Taking a swing, you slam the rock \n\t\t*set att_mighty %+05\n\t\t*if att_mighty >= 60\n\t\t\tinto the lock on the front of the chest. You hear a soft [i]crunch[/i], and the lid bounces up slightly.\n\t\t\t*goto take_pearls\n\t\t*else\n\t\t\tinto the corner of the chest. You hear a loud [i]ZZZZAAAPPPPPPP[/i], and then everything goes white as every nerve ending erupts in the most intense pain you've ever felt in your whole life. Somehow, you stay conscious as you fall to the sand, and out of the corner of your eye, you see the lid has opened slightly.\n\t\t\t*set att_clever %-05\n\t\t\t*set att_friendly %-05\n\t\t\t*set att_agile %-05\n\t\t\t*set att_sneaky %-05\n\t\t\t*set att_mighty %-05\n\t\t\t*set att_solid %-05\n\t\t\t*if flg_greedyBowState = 2\n\t\t\t\tThe pirate cat laughs at your predicament as the pain wracks your body, making it hard to move or concentrate. \n\t\t\t\t*goto take_pearls\n\t\t\t*else\n\t\t\t\tThe pain wracks your body, making it hard to move or concentrate. \n\t\t\t\t*goto take_pearls\n\t#I won't open it.\n\t\tYou shake your head, as if to dislodge the voice. \"No,\" you say aloud.\n\n\t\t*if (flg_sonyaStayed = false)\n\t\t\t\"No what?\" Sonya says.\n\n\t\t\tYou shake your head again, less vigorously this time. \"Nothing,\" you say. \"Just some voice in my head.\"\n\n\t\t\t\"A voice?\" Sonya looks very worried. \"You don't think…?\"\n\t\t\t*if flg_greedyBowState = 2\n\t\t\t\t*gosub greedy_bow_takes_pearls\n\t\t\t\t*goto combine_pearls\n\t\t\t*else\n\t\t\t\t*gosub dom_takes_pearls\n\t\t\t\t*goto combine_pearls\n\t\t*elseif (flg_damianStayed = false)\n\t\t\t\"What'd you say, boss?\" Damian asks.\n\n\t\t\tYou shake your head again, less vigorously this time. \"Nothing,\" you say. \"Just some voice in my head.\"\n\n\t\t\tDamian chuckles. \"Sounds like rocks in your head if you ask…\"\n\t\t\t*if flg_greedyBowState = 2\n\t\t\t\t*gosub greedy_bow_takes_pearls\n\t\t\t\t*goto combine_pearls\n\t\t\t*else\n\t\t\t\t*gosub dom_takes_pearls\n\t\t\t\t*goto combine_pearls\n\t\t*else\n\t\t\tPally looks at you. \"What was that? Squawk!\"\n\n\t\t\tYou shake your head again, less vigorously this time. \"Nothing,\" you say. \"Just some voice in my head.\"\n\n\t\t\tThe bird nods. \"Sometimes you hear strange things out in…\"\n\t\t\t*if flg_greedyBowState = 2\n\t\t\t\t*gosub greedy_bow_takes_pearls\n\t\t\t\t*goto combine_pearls\n\t\t\t*else\n\t\t\t\t*gosub dom_takes_pearls\n\t\t\t\t*goto combine_pearls\n\n*label greedy_bow_takes_pearls\n\nAt that moment, Greedy Bow leaps forward and bumps into you, knocking you to the sand. Somehow he managed to cut through his bonds! \"The treasure is mine!\" he snarls as he grabs for the chest. \"The voice has told me how!\" He deftly touches some studs on the lock before tearing the lid off and pulls out a beautiful necklace of black pearls that look very similar to the Corgi Pearls. The necklace hangs on a thin leather cord, and it looks like there are some pearls missing.\n\nYou're shocked by the cat's sudden movement, but you stand up to secure the Corgi Pearls, only to discover that the treacherous feline managed to swipe them right out of your paw! They glitter in his other paw, close to the necklace.\n\n\"Drop those pearls, Greedy Bow!\" you scream, drawing your sword.\n*set flg_greedyBowState 1\n*return\n\n*label dom_takes_pearls\n\nAt that moment, Dom bumps into you, knocking you to the sand. \"Mine!\" the turtle snarls as he grabs for the chest. He deftly touches some studs on the lock before tearing the lid off and pulls out a beautiful necklace of black pearls that look very similar to the Corgi Pearls. The necklace hangs on a thin leather cord, and it looks like there are some pearls missing.\n\nYou're shocked by Dom's sudden and inexplicable avarice, but you stand up to secure the Corgi Pearls, only to discover that the turtle managed to swipe them right out of your paw! They glitter in his other paw, close to the necklace.\n\n\"Let's be reasonable, Dom!\" you say loudly, taking a step closer to him.\n*achieve dompossessed\n*return\n\n*label take_pearls\n\nReaching into the chest, you pull out a beautiful necklace of black pearls that look very similar to the Corgi Pearls. The necklace hangs on a thin leather cord, and it looks like there are some pearls missing. You look at the Corgi Pearls in your other paw, and they look like they would fit on the necklace.\n\n[i]Do it,[/i] the voice in your mind whispers.\n\n*choice\n\t#I do it. The voice probably knows what it's talking about.\n\t\tYou shrug. What could go wrong with following a mysterious voice in your head? \n\t\t*set per_tame %-10\n\t\t*goto pc_combine_pearls\n\t#I do it. The Corgis will want all their pearls returned.\n\t\tIf all these are the Corgi Pearls, they'll probably want all of them returned. \n\t\t*set per_tame %+10\n\t\t*goto pc_combine_pearls\n\t#I don't do it. It's probably a trick of some kind.\n\t\tYou decide the voice in your head is a trick of some kind. \n\t\t*set per_idealist %-10\n\t\t*goto dont_do_it\n\t#I don't do it. I'm too good to listen to a weird brain voice.\n\t\tYou know you're too good to fall for the schemes of some strange voice in your head. \n\t\t*set per_ego %+10\n\t\t*goto dont_do_it\n\n*label dont_do_it\n\n*if flg_greedyBowState = 2\n\tSuddenly, Greedy Bow leaps forward and bumps into you, knocking you to the sand and causing you to drop both the Corgi Pearls and the necklace. Somehow he managed to cut through his bonds! \"The treasure is mine!\" he snarls as he grabs the treasures from the sand.\n\n\t\"Drop those pearls, Greedy Bow!\" you scream as you stand up.\n\t*set flg_greedyBowState 1\n\t*goto combine_pearls\n*else\n\tAt that moment, Dom bumps into you, knocking you to the sand and causing you to drop both the Corgi Pearls and the necklace. \"The treasure is mine!\" the turtle snarls as he grabs the treasures from the sand.\n\n\t\"Let's be reasonable, Dom!\" you say loudly as you stand up.\n\t*goto combine_pearls\n\n*label combine_pearls\n\n\"Too late!\" he screams, as he touches the Corgi Pearls to the necklace. The two treasures explode with a bright light and the smell of dirt and entrails. When your eyes and nose clear, the sight that greets you is horrifying.\n\nAll of the dead sailors suddenly open their eyes, which glow with an unearthly green light. Strange symbols crawl across their orbs as they begin to stand up, ignoring their terminal wounds.\n\n*if flg_greedyBowState = 3\n\tDom clutches the necklace, also covered in the same green glow, and his eyes start to change. Before they do, the corpse of Greedy Bow appears behind him. The blade of Greedy Bow's uncanny saber crashes down on the turtle's shell, leaving a nasty gash as the necklace tumbles to the sand. \n\n\tBut Greedy Bow is lightning fast, even in death, and he snatches up the necklace, holding it aloft. \n\t*set flg_domHurt true\n\t*goto demons_attack\n*else\n\tGreedy Bow clutches the necklace, also covered in the same green glow, and his eyes change. He screams, and his body twists in strange ways as you hear sickly cracking sounds. Within moments, the pirate looks like nothing more than a standing corpse. With glowing green eyes, he draws his uncanny saber as he holds the necklace aloft. \n\t*goto demons_attack\n\n*label pc_combine_pearls\nYou touch the Corgi Pearls to the necklace. The two treasures explode with a bright light and the smell of dirt and entrails. When your eyes and nose clear, the sight that greets you is horrifying.\n\nAll of the dead sailors suddenly open their eyes, which glow with an unearthly green light. Strange symbols crawl across their orbs as they begin to stand up, ignoring their terminal wounds. \n*if flg_greedyBowState = 3\n\tEven the corpse of Greedy Bow lurches to his feet! \n\t*goto pc_combine_pearls_2\n*else\n\tEven Greedy Bow lurches to his feet! \n\t*goto pc_combine_pearls_2\n\n*label pc_combine_pearls_2\n\nYou scramble away from the nefarious cat, but Greedy Bow is lightning fast. He snatches the necklace from your paw, holding it aloft. \n*goto demons_attack\n\n*label demons_attack\n\n\"Now I control the demons that destroyed my ancestors,\" he says, his voice rattling like a dying gasp of breath. Like Padraig's last moments.\n\n*fake_choice\n\t#I stare at him in horror.\n\t\t\"No,\" you whisper in dread. \"This can't be happening.\"\n\t#I stand defiant against this abomination.\n\t\t\"No,\" you growl, changing the grip on your weapon. \"I'll stop you.\"\n\t#I pray for the safety of my friends.\n\t\t\"No,\" you say, touching your nose in an ancient sign of protection. \"Man will save us from this horror.\"\n\n*if (flg_sonyaStayed = false) and (flg_damianStayed = false)\n\t\"Demons?\" Sonya yelps. The paw holding her sword shakes.\n\n\t\"Man be damned,\" Damian whispers in awe. \"I can't believe Padraig's legacy led to this.\"\n\n\tSonya shakes her head. \"You're wrong, Damian. The demons controlling Greedy Bow did this. They'll destroy everything. Everything I love.\"\n\n\tGreedy Bow cackles as the demon-possessed corpses shamble towards you.\n\n\t*if (flg_triadDating)\n\t\tDamian puts a paw on her shoulder. \"No they won't. Everything you love is right here. $!{plc_fname} and I won't leave you.\"\n\n\t\tHer paw steadies. \"You're right. Let's do this.\"\n\t\t*goto demon_fight\n\t*else\n\t\t\"Get your head in the game, puppy!\" Damian snarls. \"We've got incoming!\"\n\t\t*goto demon_fight\n*elseif (flg_sonyaStayed = false)\n\t\"Demons?\" Sonya yelps. The paw holding her sword shakes. \"They'll destroy everything. Everything I love.\"\n\n\tGreedy Bow cackles as the demon-possessed corpses shamble towards you.\n\n\t*if (flg_sonyaDating)\n\t\tYou put a paw on her shoulder. \"No they won't. Everything you love is right here.\"\n\n\t\tHer paw steadies. \"You're right. Let's do this.\"\n\t\t*goto demon_fight\n\t*else\n\t\t*goto demon_fight\n*elseif (flg_damianStayed = false)\n\t\"Man be damned,\" Damian whispers in awe. \"I can't believe Padraig's legacy led to this.\"\n\n\tGreedy Bow cackles as the demon-possessed corpses shamble towards you.\n\n\tYou put a paw on his shoulder. \"No, the demons controlling Greedy Bow did this.\"\n\n\tHe smiles at that. \"Good point, boss. Let's do this.\"\n\t*goto demon_fight\n*else\n\tGreedy Bow cackles as the demon-possessed corpses shamble towards you. \n\t*goto demon_fight\n\n*label demon_fight\nThe throats of the dead rattle with expelled air as they bleed over the red sand. The attack feels like a twisted mockery of your previous battle, forcing you and the remains of your crew to kill your enemies all over again. Suppressing a shiver, you determine your course of action.\n\n*choice\n\t#I dive in, slashing with wild abandon.\n\t\tYou dive into the fight, slashing with your saber. The best way to deal with these monsters is with speed and ferocity.\n\t\t\n\t\t*if (flg_sonyaStayed = false)\n\t\t\t*gosub sonya_demons\n\t\t*if ((rep_crew > 49) and (per_tame \u003c= 45))\n\t\t\t*goto crew_fight_winning_2\n\t\t*else\n\t\t\t*goto crew_fight_losing_2\n\t#I hold back, desperately protecting my crewmates.\n\t\tYou draw your weapon but hold back. Better to let the monsters come to you so all the crew can protect and cover each other.\n\t\t\n\t\t*if (flg_sonyaStayed = false)\n\t\t\t*gosub sonya_demons\n\t\t*if ((rep_crew > 49) and (per_loyal >= 55))\n\t\t\t*goto crew_fight_winning_2\n\t\t*else\n\t\t\t*goto crew_fight_losing_2\n\t#I lead the crew with confidence.\n\t\tYou draw your weapon and bellow at the crew to attack. The natural confidence in your voice rings out across the sand.\n\t\t\n\t\t*if (flg_sonyaStayed = false)\n\t\t\t*gosub sonya_demons\n\t\t*if ((rep_crew > 49) and (per_ego >= 55))\n\t\t\t*goto crew_fight_winning_2\n\t\t*else\n\t\t\t*goto crew_fight_losing_2\n\n*label crew_fight_winning_2\n\nThe surviving members of your crew grab their weapons as well and attack the zombies. A couple shiver at the sight, but steel their weapons and charge the horde. Both swing their swords, using them not only to cut through limbs and paws, but also twisting to use the flat of the blade, the heavy metal of the weapon knocking zombies aside.\n\nTheir efforts to maim or brush aside the undead creatures clear a path. Soon, there's nothing between you and the dead pirate captain. Taking the advantage, you rush forward, leaping onto Greedy Bow!\n*goto knock_down_greedy_bow\n\n*label crew_fight_losing_2\n\nThe remains of your crew shake and tremble at the horrific sight, but most tighten their grip on their weapons and attack the zombies. A couple shiver at the sight, and their weapons slip out of sweaty paws as they are frozen in fear. The zombies never pause in their onslaught, however, and the two sailors are quickly driven to the ground. The rest of the crew hears their pitiful cries under the claws and teeth of the monsters. They valiantly try to swing their weapons at the undead, but to no avail. One by one they fall under the relentless press of the zombies, or run in terror.\n\nSuddenly, Greedy Bow pounces on you! The creature grabs your throat, but you manage to kick him in the ribs. The cat rolls onto the sand with a very satisfying \"oof,\" and you leap onto him!\n*goto knock_down_greedy_bow\n\n*label sonya_demons\n\nSonya screams loudly as she dives into the fray. She swings her sword with accuracy and power. \"I will not tremble!\" she snarls, as a zombie is impaled by her sword. \"I will not flee! Demons hold no power over me!\"\n*set rep_crew %+20\n*return\n\n*label knock_down_greedy_bow\n\nYou wrestle with the undead pirate captain for a while. Your last duel was deadly, but there was a sense of skill and maybe even elegance about the fight. This is something different, feral. Greedy Bow doesn't want to just kill you; he wants to rip you apart.\n\nHis claws rake at your face, and you manage to pull away before one pierces your eye. Twisting, you slam your elbow into the side of his skull. You feel a satisfying [i]crack,[/i] and the zombie slumps to the ground, dazed. You quickly regain your feet and pull your saber back out to finish the demon pirate.\n\nThen, for a moment, you see the madness leave his eyes as the light and the symbols fade from view. He croaks out, \"Kill me. I beg you.\" He seems to be lucid, the same pirate with wit and flair that you dueled what feels like years ago. Is it a trick, or one last effort of whatever still lives in this cat's heart?\n\nThe rest of the crew are busy dealing with the demons, and you only have a moment to decide.\n\n*choice\n\t#I kill him. He certainly deserves death.\n\t\tYou stare into his eyes. \"I'm not doing this for you,\" you whisper. \"I'm doing this for all the people you've hurt and killed.\"\n\n\t\tYou bring the saber down. The light in his eyes fades.\n\t\t*set per_tame %-10\n\t\t*set flg_greedyBowState 3\n\t\t*goto demons_defeated\n\t#I grant him eternal peace in the arms of Man. \n\t\tYou stare into his eyes. \"Go with Man,\" you whisper, and bring the saber down. The light in his eyes fade.\n\t\t*set per_idealist %+10\n\t\t*set flg_greedyBowState 3\n\t\t*goto demons_defeated\n\t#I refuse. He must stand trial for his crimes. \n\t\t\"No,\" you spit, pulling the cat upright. \"You must pay for your crimes back in Pugmire.\" You hit him on the back of his head with the pummel of your saber, and he falls unconscious.\n\t\t*set per_tame %+10 \n\t\t*set flg_greedyBowState 2\n\t\t*goto demons_defeated\n\t#I take him. He might have more treasure. \n\t\t\"No,\" you laugh, pulling the cat upright. \"You might have more treasure for me.\" You hit him on the back of his head with the pummel of your saber, and he falls unconscious.\n\t\t*set per_idealist %-10\n\t\t*set flg_greedyBowState 2\n\t\t*goto demons_defeated\n\n*label demons_defeated\n\nAs soon as your blow lands, the other demon-possessed pirates slump to the ground.\n*if (flg_sonyaStayed = false) and (flg_damianStayed = false)\n\tSonya raises her sword to hack at one of them, but Damian puts his paw up.\n\n\t\"Whoa, puppy,\" he says. \"It's over. It's done.\"\n\n\tShe stares at him, fury in her eyes. Then, she carefully sets the sword down. \"Yeah,\" she says. \"It's done.\"\n\n\t\"You did good,\" Damian says.\n\n\tShe turns to look at you. \"Did I?\" she asks, her voice quiet.\n\n\tYou nod. \"Yes. You protected us all from the demons. You are a good dog.\"\n\n\tShe nods, as if to herself, and slowly puts her sword away.\n\t*goto back_to_the_ship\n*elseif (flg_sonyaStayed = false)\n\tSonya raises her sword to hack at one of them, but she notices none of them are moving. After a moment, she carefully sets the sword down and turns to look at you. \"Was I good?\" she asks, her voice quiet.\n\n\tYou nod. \"Yes. You protected us all from the demons. You are a good dog.\"\n\n\tShe nods, as if to herself, and slowly puts her sword away.\n\t*goto back_to_the_ship\n*else\n\t*goto back_to_the_ship\n\n*label back_to_the_ship\n\nPally wipes her arm across her feathered brow. \"Let's get off this horrible island,\" she says.\n\nTabby, the orange cat on your crew, points to [i]The Pig's Tale[/i]. \"Our ship's still taking on water,\" she says. \"We need to salvage what we can from the pirates.\"\n\nPally nods. \"$!{plc_fname}, head back to the ship and let the captain know we need all crewmates to help out.\"\n\n*if (flg_domHurt)\n\tShe lowers her voice. \"And take Dom with you. He still looks hurt.\"\n\t*goto back_to_the_ship_2\n*else\n\t*goto back_to_the_ship_2\n\n*label back_to_the_ship_2\n\nYou nod, and head back to [i]The Pig's Tale[/i], thinking about what just happened. A wrecked ship, ripped apart by a horrifying sea monster. Your friends, the crew of [i]The Pig's Tale[/i], injured and even killed during this dangerous voyage. The dead coming back to life. And the object of your quest, the Corgi Pearls, turn out to be part of some disturbing magical object.\n\nThe Acid Sea calmly laps against the side of the ship, as you drag your feet through the red sands. Was it all worth it? You're not sure. All you can be sure of is that you need to curl up in a bunk and get some sleep.\n*page_break Time Passes….\n\nThe next few days pass quickly. All of the remaining crew pitch in to help—first by burying all the dead, and then working on stripping down [i]The Cat's Meow[/i].\n\n*if (flg_sonyaStayed) and (flg_damianStayed)\n\tNeither Sonya nor Damian speak much to you as they help the crew with the reconstruction effort.\n*if (flg_sonyaStayed) and (flg_damianStayed = false)\n\tSonya doesn't speak much to you as she helps the crew with the reconstruction effort.\n*if (flg_damianStayed) and (flg_sonyaStayed = false)\n\tDamian doesn't speak much to you as he helps the crew with the reconstruction effort.\n*if flg_greedyBowState = 2\n\tGreedy Bow is tied up and locked in the hold of your ship. Russel takes food and water to him three times a day, but he reports that the pirate never speaks.\n*if (flg_domHurt)\n\tDom recovered after a night of rest and some of Sabu's tea. \"Are you sure he'll be okay?\" you asked Sabu at the time.\n\n\tSabu shrugged. \"Probably? I don't have a lot of experience with demonic possession.\"\n\n\t\"I do,\" Sonya said, overhearing you both talk. \"I'll keep an eye on him, but in my experience if he's acting normally, he's probably fine.\"\n\n\t\"Thanks, Sonya,\" Sabu said, putting a paw on her arm. \"I appreciate you keeping an eye on my crew.\"\n\n\tSoon, Dom was alongside the crew, working as hard as they were.\n\nWithin a few days, [i]The Pig's Tale[/i] is repaired. Sabu also has all the excess plunder from [i]The Cat's Meow[/i] transferred to his ship—some to return to previous owners, but much of it to cover the expenses of having the ship properly repaired back at Waterdog Port.\n\nDuring the voyage back, you ponder the pearl necklace.\n*page_break\nEach pearl on the necklace seems to have a dark luster, as if each black sphere shone with power—or maybe malevolence.\n\nFrom everything you've learned chasing the Corgi Pearls, they don't seem to be an issue in and of themselves, because you certainly hadn't heard any stories about the Corgis summoning demons, even by accident. The act of combining all the pearls together appear to be what gives the necklace its power. Have you learned enough about the pearls to try and pull the Corgi Pearls back out? Is it even worth the effort?\n\n*choice\n\t#I try to extract the Corgi Pearls.\n\t\tTaking a deep breath, you hold the necklace in one paw and pull on the Corgi Pearls with the other. The pearls resist at first, and \n\t\t*if stg_fetch >= 2\n\t\t\tthen suddenly they're loose in your paw. You didn't feel anything snap or pull—one second they were on the necklace, and the next they were in your paw. How odd.\n\n\t\t\tEven more odd is the fact that you can't pull the two loose pearls apart. When you try to separate them, they click back together again, as if drawn to each other. The same thing happens with the pearls on the necklace. Clearly there's something strange and magical happening here.\n\n\t\t\tYou stash the pearls in a safe place, under a loose board in your cabin, and go back to your chores as you head back to Waterdog Port.\n\t\t\t*set flg_pearlsSeparate true\n\t\t\t*goto return_to_waterdog_port\n\t\t*else\n\t\t\tyou feel the necklace get warmer. Then quite hot. The Corgi Pearls seem cool to the touch, but the rest of the necklace is glowing red. You drop the necklace from your paw, and watch as it turns white, and then disappears in a puff of smoke. The Corgi Pearls are still in your paw, but the necklace is gone.\n\n\t\t\tEven more odd is the fact that you can't pull the two loose pearls apart. When you try to separate them, they click back together again, as if drawn to each other. Clearly there's something strange and magical happening here.\n\n\t\t\tYou stash the pearls in a safe place, under a loose board in your cabin, and go back to your chores as you head back to Waterdog Port.\n\t\t\t*set flg_necklaceLost true\n\t\t\t*goto return_to_waterdog_port\n\t#Best to get rid of the pearls.\n\t\tYou decide it's too dangerous to keep the necklace and the pearls around. Surely the Corgi family will understand. One night, while the rest of the crew is asleep, you slip onto the deck and drop the necklace overboard. It sinks into the disturbingly-blue waters. Wondering if you made the right choice, you go back to sleep as the ship sails on to Waterdog Port.\n\n\t\tThe next morning, you wake up and find the necklace clutched in your paw. Even more odd is the fact that you can't pull the pearls apart. When you try to separate them, they click back together again, as if drawn to each other. Clearly there's something strange and magical happening here.\n\n\t\tSpooked, you stash the necklace in a safe place, under a loose board in your cabin, and go back to your chores as you head back to Waterdog Port. You try not to think about it.\n\t\t*goto return_to_waterdog_port\n\t#I ask Sabu for help.\n\t\tYou decide it's too dangerous to mess around with an ancient magical artifact, even to get the Corgi Pearls back. Messing with such dangerous magic could cause catastrophic problems. So, one night, you go to Sabu's cabin and knock on the door. Once he invites you inside, you show him the necklace and explain your problem.\n\n\t\t\"I wish I could help you,\" he says with a resigned shrug. \"My magic involves studying chemicals and the sea. This is cat necromancy.\" He shivers. \"Dangerous magic, particularly after the tales you and Pally have told me.\"\n\n\t\t\"So I shouldn't even try?\"\n\n\t\t\"I didn't say that.\" He rummages around in his desk, and comes up with a stoppered glass vial, containing a dark red liquid. \"Put the necklace in here,\" he says. As you grab for the vial, he puts his paws up quickly, his eyes wide. \"Carefully!\" he says in a loud whisper. \"Be gentle.\"\n\n\t\tYou carefully open the vial and slide the necklace in. After a few moments, the liquid disappears and the pearls take on a reddish hue, as if they absorbed the liquid. Sabu nods. \"Try now.\"\n\n\t\tTaking a deep breath, you slide the pearls out of the vial. Holding the necklace in one paw, you pull on the Corgi Pearls with the other. The pearls resist at first, and \n\t\t*if stg_fetch >= 2\n\t\t\tthen suddenly they're loose in your paw. You didn't feel anything snap or pull—one second they were on the necklace, and the next they were in your paw. How odd. \n\n\t\t\tEven more odd is the fact that you can't pull the two loose pearls apart. When you try to separate them, they click back together again, as if drawn to each other. The same thing happens with the pearls on the necklace. Clearly there's something strange and magical happening here.\n\n\t\t\tThe pearls all return to their normal color, and Sabu lets out a long breath. \"That should keep them safe for a while,\" he mutters. \"But they'll probably grow in power again over the next several days. Best to find a safe place for those until we arrive at Waterdog Port.\"\n\n\t\t\tYou thank him for his help, and go to stash the pearls under a loose board in your cabin.\n\t\t\t*set flg_pearlsSeparate true\n\t\t\t*goto return_to_waterdog_port\n\t\t*else\n\t\t\tyou feel the necklace get warmer. Then quite hot. The Corgi Pearls seem cool to the touch, but the rest of the necklace is glowing red. You drop the necklace from your paw, and watch as it turns white, and then disappears in a puff of smoke. The Corgi Pearls are still in your paw, returning to their normal color, but the necklace is gone.\n\n\t\t\tEven more odd is the fact that you can't pull the two loose pearls apart. When you try to separate them, they click back together again, as if drawn to each other. Clearly there's something strange and magical happening here.\n\n\t\t\tSabu lets out a long breath. \"At least they didn't explode,\" he mutters.\n\n\t\t\t\"Sorry?\" you ask.\n\n\t\t\t\"Nothing!\" he says quickly. \"They'll probably return in power over the next several days. Best to find a safe place for those until we arrive at Waterdog Port.\"\n\n\t\t\tYou thank him for his help, and go to stash the pearls under a loose board in your cabin.\n\t\t\t*set flg_necklaceLost true\n\t\t\t*goto return_to_waterdog_port\n\t#I use the pearls myself.\n\t\t*goto bad_ending\n\n*label return_to_waterdog_port\n*page_break\n\nThe trip back is generally uneventful. Sabu and Pally keep you busy, and the crew are in high spirits, despite the horrors of the voyage.\n\nDamian and Sonya stop squabbling, which is a relief.\n\n*if (flg_triadDating)\n\tSonya admits she's still scared of demons. \"Even after what happened,\" she says, \"I can still feel my fist clench and my throat close up just thinking about them.\" \n\n\t\"But not as bad, right?\" you ask.\n\n\tShe shakes her head and smiles. \"No. I don't have the same paralyzing dread I had before. I feel like I can really do this.\" She leans in and kisses your cheek. \"I couldn't have done it without you.\"\n\n\t\"At least you feel something,\" Damian says, staring at the deck. \"I just feel numb after confronting Ambrosia. They just disappeared, and I don't even know where to start looking for them again.\"\n\n\tYou give him a hug. \"It's okay,\" you say softly.\n\n\tHe hugs you back, warmly. \"I just expected to feel resolution or satisfaction or [i]something[/i].\" He breaks the hug. \n\t*if (flg_ambrosiaWandKept)\n\t\t\"At least we have that freaky wand of his.\"\n\n\t\tYou nod. \"That's true.\"\n\t\t*goto triad_discussion\n\t*else\n\t\t*goto triad_discussion\n*elseif (flg_sonyaDating = true) or (rel_sonya >= 60)\n\tSonya admits she's still scared of demons. \"Even after what happened,\" she says, \"I can still feel my fist clench and my throat close up just thinking about them.\" \n\n\t\"But not as bad, right?\" you ask.\n\n\tShe shakes her head and smiles. \"No. I don't have the same paralyzing dread I had before. I feel like I can really do this.\" \n\n\t*if (flg_sonyaDating)\n\t\tShe leans in and kisses your cheek. \"I couldn't have done it without you.\"\n\t\t*goto damian_check\n\t*else\n\t\tShe looks awkward for a moment, and then shakes your paw. \"I couldn't have done it without you.\"\n\t\t*goto damian_check\n*elseif (flg_damianDating) or (rel_damian >= 60)\n\tDamian seems ill at ease. \"I feel numb after confronting Ambrosia. They just disappeared, and I don't even know where to start looking for them again.\"\n\n\t\"It's okay,\" you say softly.\n\n\tHe shrugs, staring at the deck. \"I just expected to feel resolution or satisfaction or [i]something[/i].\" He breaks the hug. \n\t*if (flg_ambrosiaWandKept)\n\t\t\"At least we have that freaky wand of his.\"\n\n\t\tYou shiver. \"That's true. I can't wait to get rid of it, though.\"\n\n\t\tHe nods. \"That's true.\"\n\t\t*goto damian_discussion\n\t*else\n\t\t*goto damian_discussion\n*else\n\t*if (flg_sonyaStayed) and (flg_damianStayed)\n\t\tSonya and Damian both avoid you, refusing to speak to you or each other for the entire voyage back.\n\t\t*goto disembark\n\t*elseif (flg_sonyaStayed)\n\t\tDamian seems light-hearted, but he doesn't talk about what happened with his conflict with Ambrosia. Sonya, however, avoids both of you, refusing to speak for the entire voyage back.\n\t\t*goto disembark\n\t*elseif (flg_damianStayed)\n\t\tSonya seems self-confident but she's quiet about her conflict with the demons on the island. Damian, however, avoids both of you, refusing to speak for the entire voyage back.\n\t\t*goto disembark\n\t*else\n\t\tSonya seems self-confident after her conflict with the demons on the island, while Damian is jokey and light-hearted about his encounter with Ambrosia. Neither of them want to talk more about the matters, though, preferring to dwell privately on their personal issues.\n\t\t*goto disembark\n\n*label triad_discussion\n\n\"I guess I just want Padraig to be happy as he runs around with Man in the afterlife.\"\n\n\"I'm sure he is,\" Sonya says, putting a paw on Damian's shoulder.\n\nYou wipe away a tear. \"I still miss him,\" you say.\n\nDamian kisses you on the other cheek. \"I do, too. But we have each other now.\"\n\nBoth of them pull you into a group hug. Despite everything, perhaps this triad will work out. Maybe your love is the real treasure.\n*goto disembark\n\n*label damian_discussion\n\n\"I guess I just want Padraig to be happy as he runs around with Man in the afterlife.\"\n\n\"I'm sure he is,\" you say, wiping away a tear. \"I still miss him.\"\n\n*if (flg_damianDating)\n\tDamian kisses you on the cheek. \"I do, too. But we have each other now.\"\n\t*goto sonya_check\n*else\n\tDamian nods. \"I do, too. But once we give these pearls back, we can move on.\"\n\t*goto sonya_check\n\n*label damian_check\n\n*if (flg_damianStayed)\n\tDamian avoids both of you, refusing to speak for the entire voyage back.\n\t*goto disembark\n*else\n\tDamian, meanwhile, blows off his own conflict with Ambrosia. He seems light-hearted, but won't talk about what happened.\n\t*goto disembark\n\n*label sonya_check\n\n*if (flg_sonyaStayed)\n\tSonya avoids both of you, refusing to speak for the entire voyage back.\n\t*goto disembark\n*else\n\tSonya, meanwhile, is quiet about her own conflict with the demons on the island. She seems self-confident, but won't talk about what happened.\n\t*goto disembark\n\n*label disembark\n\nBefore you know it, [i]The Pig's Tale[/i] pulls back into Waterdog Port, and it's time to make some hard decisions.\n\n*page_break\nAs soon as your paws are on dry land, Damian and Sonya disembark.\n\n*if (flg_damianStayed) and (flg_sonyaStayed)\n\t\"Well,\" Damian says, not looking at you, \"time to head off.\" He offers his paw. \"Goodbye, $!{plc_fname}.\"\n\n\tBefore you can shake his paw, Sonya brushes past both of you.\n\n\tDamian bristles. \"Hey! I'm trying to say goodbye here!\" he barks, annoyed.\n\n\tSonya shrugs. \"I don't care what either of you want. I'm heading back to Pugmire.\" She sniffs the sea air, and turns to you. \"I hope you have a good life, $!{plc_fname}.\" Turning away, she bumps into Damian again, nearly knocking him over, as she heads to the stables.\n\n\tThe ratter straightens his clothing in annoyance. \"Irritating puppy,\" he mutters. \"Guess it's time to hit the road myself.\"\n\n\tBefore you can say a word, he wanders off as well, leaving you alone.\n\t*goto greedy_bow_check\n*elseif (flg_damianStayed)\n\t\"Well,\" Damian says, not looking at either of you, \"time to head off.\" He offers his paw. \"Goodbye, $!{plc_fname}.\"\n\n\t*fake_choice\n\t\t#I shake his paw. \"Thanks for all your hard work.\"\n\t\t\tYou shake his paw. \"Thanks for all your hard work,\" you say.\n\t\t#I ignore the paw. \"See you around, I guess.\"\n\t\t\tYou ignore his paw. \"See you around, I guess,\" you say.\n\t\t#I shake his paw. \"Good working with you, boss.\"\n\t\t\tYou shake his paw. \"Good working with you, boss.\"\n\t\t#I ignore the paw. \"Bye.\"\n\t\t\tYou ignore the paw. \"Bye,\" you say, brusquely.\n\n\tHe nods. Sonya starts to say something, but offers her paw instead. Damian looks at it, then shakes it reluctantly, before wandering off towards the stables.\n\t*goto greedy_bow_check\n*elseif (flg_sonyaStayed)\n\tSonya brushes past both you and Damian.\n\n\tThe ratter bristles. \"Hey! Watch where you're walking!\" he barks, annoyed.\n\n\tSonya shrugs. \"I don't care what either of you want. I'm heading back to Pugmire.\" \n\n\t*fake_choice\n\t\t#\"Well, so long, I guess.\"\n\t\t\t\"Well, so long, I guess,\" you say.\n\t\t#\"It was nice working with you.\"\n\t\t\t\"It was nice working with you,\" you say.\n\t\t#\"See you around.\"\n\t\t\t\"See you around,\" you say.\n\n\tShe sniffs the sea air, and turns to you. \"I hope you have a good life, $!{plc_fname}.\" Turning away, she bumps into Damian again, nearly knocking him over, as she heads to the stables.\n\n\tDamian straightens his clothing in annoyance. \"Irritating puppy,\" he mutters. \"But I'll miss her anyway.\"\n\t*goto greedy_bow_check\n*else\n\tThe ratter takes a deep breath. \"Smell that sea air,\" he says.\n\n\t\"I figured you'd have gotten enough sea air on the voyage,\" Sonya grumbles, but you can tell it's good-natured.\n\n\t\"I did,\" he says with a wide grin, \"but it smells so much better when you're not on a ship.\"\n\n\tSonya splutters, trying to hide her laughter.\n\t*goto greedy_bow_check\n\n*label greedy_bow_check\n\nSabu joins you on the dock. \"Another safe journey,\" he says, before glancing back at his damaged ship. \"Relatively speaking, that is.\"\n\nYou nod and smile. \"It's good to be back.\"\n\nThe captain sighs contentedly. \"Indeed it is. Until the Acid Sea calls to me again and we're off on another voyage. I feel like whenever I'm on the ship, I can't wait to get off, and vice versa.\" \n\nYou nod and \n*if flg_greedyBowState = 2\n\tchange the subject. \"Speaking of being off the ship, we need to figure out what to do with Greedy Bow.\"\n\n\tSabu shrugs. \"You asked me to help you acquire him. I've done that. What you want to do with him is entirely up to you.\" He pats his coat pockets for a moment, before pulling out a small pouch. \"As for me and the crew, we're going to head to [i]Harv's Hideaway[/i] and have a few drinks that didn't come from a barrel. See you there?\"\n\n\tYou nod and wave as Sabu heads into Waterdog Port, as you ponder what to do with the pirate cat.\n\n\t*choice\n\t\t#I'll give him to the council of Waterdog Port. Maybe there's a reward.\n\t\t\tYou decide it may be best to give him over to the council of Waterdog Port. He was involved in the death of one of their own, and you get the impression that he'll experience some rough justice at their paws. You decide maybe you should ask Sabu on the best way to approach the council, and start to catch up with him.\n\t\t\t*set flg_bowToWaterdog true\n\t\t\t*set per_ego %+10\n\t\t\t*goto letters\n\t\t#I'll present him to the Monarchies of Mau. They should punish their own.\n\t\t\tYou decide it may be best to give him over to the Monarchies of Mau. He was seeking an ancient artifact of theirs, and as a cat he might best receive justice at the paws of his own kind. Once you get back to Pugmire, you can get in touch with Ambassador von Korat. Having made your decision, you start to catch up with Sabu.\n\t\t\t*set per_tame %+10\n\t\t\t*set flg_bowToMau true\n\t\t\t*goto letters\n\t\t#I'll take him back to Pugmire. He should be punished for his crimes against the Corgis.\n\t\t\tYou decide it may be best to give him over to the court of Pugmire. He stole from the Corgis, and one of his subordinates killed a Corgi. Once you get back to Pugmire, you can get in touch with Fiona Corgi or Seneschal Murra. Having made your decision, you start to catch up with Sabu.\n\t\t\t*set per_loyal %+10\n\t\t\t*set flg_bowToPugmire true\n\t\t\t*goto letters\n*else\n\tlook around. \"Where can we get a good drink around here?\" you ask.\n\n\tSabu rubs his paws together. \"The crew and I usually go to [i]Harv's Hideaway[/i] to have a few drinks that aren't water or rum. You'd be welcome to join us.\"\n\n\tYou agree, and start to set off with him.\n\t*goto letters\n\n*label letters\n\nAs you're about to head off, a chihuahua messenger stops you. \"Are you $!{plc_fullname}?\" they ask, panting heavily.\n\n\"I am,\" you admit.\n\nThey dig through the leather sack hanging by their side, and pull out two sealed envelopes. \"Letters for you,\" they say. You take the letters, but the messenger's paw hangs in the air, and the chihuahua coughs slightly.\n\n*if oth_coins > 0\n\t\"Here,\" you say, pressing a chip off a plastic coin into their paw. The messenger tips their cap and rushes off to another part of the port.\n\t*goto read_letters\n*else\n\t\"Thank you for your assistance,\" you say, embarrassed that you didn't grab any plastic from the plunder recovered from Greedy Bow. The messenger grumbles and rushes off to another part of the port.\n\t*goto read_letters\n\n*label read_letters\n\n*page_break\nThe first letter has an ornate wax seal. You recognize King Puckington's crest pressed into it. Breaking the seal, you unfold the letter and read.\n\n[i]Dear $!{plc_fname},[/i]\n\n[i]I hope this letter finds you well, and in possession of that which you sought. As soon as you are able, please meet with me in Pugmire to discuss the disposition of what you've acquired. I have learned disturbing truths about the items you may carry, which can affect the safety of the realm.[/i]\n\n[i]Sincerely,[/i]\n\n[i]Prince Murra Pug, Seneschal[/i]\n\nYou shake your head. \"Disturbing truths\" is an understatement.\n\n*page_break\nYou turn your attention to the second letter. This one has a wax seal you don't recognize—a series of ornate diamond shapes. You break that seal as well and read.\n\n[i]Dog,[/i]\n\n[i]I send this message in haste, as I note Seneschal Murra is seeking to contact you. I have paid this messenger well to bring you my letter as well, so do not let the uncouth cur gouge you for more money. I have matters to discuss with you, so attend to me when you arrive in Pugmire before you speak to your king or his representative. It will be very much to your benefit.[/i]\n\n[i]Illiad von Korat[/i]\n\nInteresting. You fold both letters up, put them into a pocket, and rush to catch up with Sabu.\n\n*if (flg_bowToWaterdog)\n\t\"Sabu,\" you say, breathless, \"I want to give Greedy Bow over to the local council.\"\n\n\tHe laughs at that. \"Giving a pirate over to other pirates? An interesting choice.\"\n\n\t\"But how would I do that?\"\n\n\t\"Not to worry. We'll deliver him ourselves. Probably better if he's coming from a local, instead of a dog from Pugmire.\" He pauses. \"No offense.\"\n\n\tYou nod, happy to let Sabu handle the cat.\n\t*goto harvs\n*else\n\t*goto harvs\n\n*label harvs\n*page_bre
