ead,\" Damian says. \"Big difference.\"\n\nAfter calming them down, the two explain. There are two options to travel to Waterdog Port: borrow a boat and sail down the river or saddle up and take the South Road. Going down the road is faster, but @{flg_heardAboutTrap you heard some pirates may be waiting for you.|it's possible some of the pirates might be waiting for you.} Taking the river is slower (requiring a day's travel to the east), but easier to see if you're about to be attacked.\n\nSonya wants to get there as quickly as possible, so advocates fighting the pirates. Damian wants to avoid going the obviously dangerous way, and suggests getting there later but in one piece is better than faster and dead. \n\nThey don't seem to be slowing down in their argument, so it's up to you to break the tie. \n\n*choice\n\t#I decide to take the road route because Sonya is right.\n\t\t\"Sonya's right. We should take the road,\" you say.\n\n\t\tDamian sighs. \"Of course. Let's listen to the puppy and put ourselves in danger again. Why not?\"\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*goto take_the_road\n\t#I choose to take the road route because I want to go faster.\n\t\t\"The road is faster. We need speed more than security right now,\" you say.\n\n\t\tDamian shrugs. \"Sure, why not? Let's plunge head-first into danger again.\"\n\t\t*set per_tame %-10\n\t\t*goto take_the_road\n\t#I decide to take the river route because Damian is right.\n\t\t\"Damian's right. We should take the river,\" you say.\n\n\t\tSonya sighs. \"It's almost like he doesn't even want to catch Greedy Bow.\"\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*set flg_goingToRiver true\n\t\t*goto take_the_river\n\t#I choose to take the river route because I want to be careful.\n\t\t\"The river is safer. We can't stop these pirates if we're dead,\" you say.\n\n\t\tSonya shrugs. \"I'm worried we'll never catch Greedy Bow, but it's your call.\"\n\t\t*set per_tame %+10\n\t\t*set flg_goingToRiver true\n\t\t*goto take_the_river\n\n*label take_the_river\n\n\"So, how do we get a boat?\" Damian asks.\n\n\"Taking the river was your idea!\" Sonya yells.\n\nDamian smirks. \"Hey, I'm just the idea dog around here. You two are better at the details.\"\n\nBefore a new argument can break out, Neal Pharaoh-Hound comes over to the table. \"I couldn't help but overhear your conversation.\"\n\n\"She was certainly yelling loud enough,\" Damian mutters.\n\nNeal ignores the comment and continues. \"Might the three of you be looking for a boat?\"\n\n*fake_choice\n\t#\"It's not any of your business.\"\n\t\t\"It's not any of your business,\" you say.\n\n\t\t\"Probably not, but you did me a good turn, and I want to do one in return.\"\n\n\t\tSonya puts a paw on your shoulder. \"Let's hear him out.\"\n\t\t*set per_tame %-10\n\t#\"Yes, we are. Do you know where we can buy one?\"\n\t\t\"Yes, we are. Do you know where we can buy one?\" you ask.\n\n\t\t\"I sure do! You did me a good turn, and I want to do one in return.\"\n\n\t\tDamian rubs his paws together. \"I do like altruism. It's cheaper than the alternative.\"\n\t\t*set per_idealist %+10\n\t#\"Only the best for a dog like me.\"\n\t\t\"Only the best for a dog like me,\" you say.\n\t\t\n\t\t\"I don't know about 'the best,' but you did me a good turn, and I want to do one in return.\"\n\n\t\tDamian drains the bowl in front of him. \"I guess it'll have to do, whatever it is.\"\n\t\t*set per_ego %+10\n\n\"My cousin Travis has our old family boat tied up due east of here. He doesn't use it for much beyond the occasional fishing trip.\" He gives you a beat-up envelope. \"Give him this note, and I'm sure he'll be happy to lend it to you.\"\n\nYou thank him and take the envelope. It smells a little moldy. \n*goto take_the_road\n\n*label take_the_road\n\n\"We should get ready,\" Sonya says, standing up from the table. \n\n\"Because you need more reason to yell at people,\" Damian grumbles.\n\n\"What is up with you today?\" you ask. \"You're acting like someone brushed your fur the wrong way.\"\n\nDamian shakes his head. \"Let's just go,\" he says, getting up from the table. Realizing he's not going to answer, the two of you follow him back to the room to gather your supplies. \n\nBy the time the sun is fully in the sky and shining on the muddy streets of Houndton, you've packed your supplies, acquired your horses from the Plott-Hound Stables, and are riding off.\n\n*page_break\n[i]Later that day.[/i]\n\nThe horses keep a slow and steady trot which eats up the miles over several hours. The road continues to be rocky. For a while, Damian and Sonya continued to snipe at each other.\n\n\"Remember to watch out for rocks and holes on the road,\" Sonya said.\n\n\"I know already! Stop pestering me!\" Damian snapped.\n\nSonya, annoyed, kicked her horse into a faster trot, and muttered something about scouting ahead.\n\nNow Damian rides between you and Sonya, crouched over something and not paying attention to where the horse is heading. Suddenly, you notice the horse is about to step into a hole in the ground, which could throw Damian off and possibly damage the horse's leg.\n\n*choice\n\t#I ride alongside Damian's horse and pull it away.\n\t\tYou spur your horse into action and ride up alongside Damian's horse. Reaching out to grab the horse's bridle, you pull on it hard to lead the horse away from the looming hole in the ground. \n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tYou grit your teeth, and your muscles ripple under your fur as you manage to pull the horse to a stop.\n\n\t\t\tDamian, surprised by the sudden action, falls off his horse. With your mighty strength, you're able to catch him before he lands. \n\t\t\t*achieve runawayhorse\n\t\t\t*set rel_damian %+10\n\t\t\t*goto runaway_horse\n\t\t*else\n\t\t\tYou grit your teeth, but the horse rips out of your grasp before coming to a sudden stop.\n\n\t\t\tDamian, surprised by the sudden action, falls off his horse and hits the ground hard. \n\t\t\t*goto runaway_horse\n\t#I sneak up on Damian's horse and scare it into stopping.\n\t\tYou spur your horse into action and ride up behind Damian's horse. You give a loud yell, trying to spook the horse into stopping or changing course. \n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\tThe horse, surprised by the sound, immediately stops. \n\n\t\t\tDamian, surprised by the sudden action, falls off his horse. Luckily, since you were behind him, you are able to catch him before he lands. \n\t\t\t*achieve runawayhorse\n\t\t\t*set rel_damian %+10\n\t\t\t*goto runaway_horse\n\t\t*else\n\t\t\tThe horse, however, barely flicks an ear at the noise and pulls away from you for a bit before coming to a sudden stop.\n\n\t\t\tDamian, surprised by the sudden action, falls off his horse and hits the ground hard. \n\t\t\t*goto runaway_horse\n\t#I convince Damian to jump off the horse.\n\t\tYou spur your horse into action and ride up alongside Damian's horse. \"Come on!\" you yell. \"Jump to me! I'll catch you!\"\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tDamian, surprised by the sudden yelling, falls off his horse. Luckily, you were expecting him to jump, so you manage to catch him before he lands. The horse slows to a halt.\n\t\t\t*achieve runawayhorse\n\t\t\t*set rel_damian %+10\n\t\t\t*goto runaway_horse\n\t\t*else\n\t\t\tThe horse however, spooked by the yelling, suddenly stops.\n\n\t\t\tDamian, surprised by the sudden action, falls off his horse and hits the ground hard.\n\t\t\t*goto runaway_horse\n\t*selectable_if (flg_hasMagic) #I cast a spell to scare Damian's horse away.\n\t\tYou spur your horse into a gallop as you recall a minor spell that creates a loud noise in the nearby area. The horse, stunned by the sound, immediately stops. \n\n\t\tDamian, surprised by the sudden action, falls off his horse. Luckily, since you were behind him, you are able to catch him before he lands. \n\t\t*achieve runawayhorse\n\t\t*set att_clever %+05\n\t\t*set rel_damian %+10\n\t\t*goto runaway_horse\n\n*label runaway_horse\nSomething falls from Damian's paw, and he immediately panics and starts searching the tall, rough grass. The horse, confused by the situation, takes off at a gallop again. You manage to grab the horse's reins and pull yourself into the saddle. But now you're riding on a scared horse galloping as fast as possible away from your friends. Sonya spurs her horse and rushes after you.\n\n*choice\n\t#I talk the horse down.\n\t\tYou lean over the horse's neck and talk to it in a calm, soft voice.\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tAlmost instantly, the horse's gallop slows to a trot, and then stops. Sonya pulls up alongside you. \"That was incredible,\" she says.\n\t\t\t*set rel_sonya %+10\n\t\t\t*goto damians_story\n\t\t*else\n\t\t\tThe horse, however, is having none of it and keeps running.\n\n\t\t\tSonya pulls up alongside you and grabs the horse's bridle. With a combination of her strength and riding skills, she manages to slow Damian's horse down to a stop.\n\t\t\t*goto damians_story\n\t#I throw a rope around a nearby tree stump.\n\t\tYou grab a rope dangling off the horse's saddle and quickly make a lasso. Whirling it above your head, you toss it at a nearby tree stump.\n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tThe lasso grabs the stump tightly. Pulling against the rope hard, the horse turns and slowly stops. Sonya pulls up alongside you. \"That was incredible,\" she says.\n\t\t\t*set rel_sonya %+10\n\t\t\t*goto damians_story\n\t\t*else\n\t\t\tUnfortunately, the rope misses, and the horse keeps running.\n\n\t\t\tSonya pulls up alongside you and grabs the horse's bridle. With a combination of her strength and riding skills, she manages to slow Damian's horse down to a stop.\n\t\t\t*goto damians_story\n\t#I ride the horse in circles to wear it out.\n\t\tYou grab the horse's reins firmly in your paws and lean, encouraging the horse to run in a circle. \n\t\t*set att_solid %+05\n\t\t*if att_solid > 55\n\t\t\tThe horse obeys, and you keep your balance on the horse as it slowly trots to a stop. Sonya pulls up alongside you. \"That was incredible,\" she says.\n\t\t\t*set rel_sonya %+10\n\t\t\t*goto damians_story\n\t\t*else\n\t\t\tUnfortunately, you find it hard to keep your grip as the horse turns, and you lose control.\n\n\t\t\tSonya pulls up alongside you and grabs the horse's bridle. With a combination of her strength and riding skills, she manages to slow Damian's horse down to a stop.\n\t\t\t*goto damians_story\n\n*label damians_story\n\nYou and Sonya lead the two horses back to Damian, who is still frantically searching the grass for something.\n\n\"What are you looking for?\" you ask.\n\nSonya kneels down next to him. \"Can we help?\"\n\n\"No!\" Damian barks. \"Just leave me alone!\" This isn't the sarcastic, funny Damian you've gotten to know over the past several days. He sounds angry, and also on the verge of tears.\n\nAfter a few more wags of him searching frantically, he gives out a loud squeak of triumph and pounces on something in the grass. You see him holding a silver necklace, which he quickly stuffs into his rucksack. \"Found it,\" he mutters. \"Thanks for getting my horse and everything.\"\n\nSonya stares at Damian. For the first time, she doesn't look annoyed or exasperated with him. She looks worried. \"What's wrong, Damian?\"\n\nHe wipes his nose with the back of his sleeve. \"Nothing. Just…thinking about Padraig. \n*if stg_padraig = 0\n\tIt feels like we're not even trying to find his killer.\"\n\t*goto necklace\n*else\n\tIt feels like we've barely started looking for his killer.\" \n\t*goto necklace\n\n*label necklace\n\nDamian pulls the necklace back out of his rucksack. It's just a thin silver chain with half of a heart dangling from it. \"And this was the last thing he gave me before…\" \n\nSonya puts a paw on his shoulder. \"Before what?\"\n\nHe shrugs away from her touch. \"Before he left me and became a trustee for the Royal Pioneers, okay? Are you happy now? Funny, joking Damian has a soft spot for a dead dog, so let's all have a laugh at him.\"\n\n\"Nobody's laughing at you, Damian,\" Sonya says. \"We don't always agree, but that doesn't mean I don't want you to be happy.\"\n\nHe wipes his eyes with his sleeve, and then shoves the chain back into his bag. \"Never mind. Let's just go.\"\n\n*choice\n\t#I give Damian a hug and tell him I'm there for him.\n\t\tYou wrap your arms around Damian. \"I'm here for you,\" you say.\n\n\t\tDamian sniffles, but doesn't pull away. \"Why?\" he asks. \"You barely know me.\"\n\n\t\t\"Because we're in this together,\" you say.\n\n\t\t\"Agreed,\" Sonya says, nodding.\n\n\t\t\"Thanks, I guess,\" he says, finally breaking the hug. \"Now let's pretend this never happened, okay? It would ruin my rep.\"\n\n\t\t*page_break The Next Day\n\t\t*set per_loyal %+10\n\t\t*if flg_goingToRiver = true\n\t\t\t*goto the_river\n\t\t*else\n\t\t\t*goto the_road\n\t#I shrug and tell Damian he needs to get over it.\n\t\tYou shrug. \"You need to get over it,\" you say.\n\n\t\tSonya frowns. \"That's a bit harsh.\"\n\n\t\tDamian sniffles. \"No, $!{plc_fname}'s right,\" he says. \"I need to get over this. Crying won't bring Padraig's killer to justice.\"\n\n\t\t*page_break The Next Day\n\t\t*set per_loyal %-10\n\t\t*if flg_goingToRiver = true\n\t\t\t*goto the_river\n\t\t*else\n\t\t\t*goto the_road\n\t#I give Damian a pat on the back and tell him we'll find the killer.\n\t\tYou give Damian a pat on the back. \"We'll find Padraig's killer,\" you say.\n\n\t\t\"What makes you so sure?\" he says. For once, he doesn't look sure of himself.\n\n\t\t\"Because we're Pioneers,\" you say. \"We're trained to handle danger like this.\"\n\n\t\tDamian sniffles. \"I hope you're right,\" he says.\n\n\t\t*page_break The Next Day\n\t\t*set per_idealist %+10\n\t\t*if flg_goingToRiver = true\n\t\t\t*goto the_river\n\t\t*else\n\t\t\t*goto the_road\n\n*label the_river\nThe next day, Damian lightens up again and acts like nothing ever happened. You and Sonya separately ask him if he's okay, but he just changes the topic by saying something funny or insulting. He's in the middle of a particularly bawdy joke when you hear the sound of water and approach the river. On the shore you see a pharaoh hound idly fishing next to a small boat that's been dragged into the shore. The boat looks like it could comfortably carry three or four dogs and some supplies. Two plastic-coated oars sit inside.\n\nYou dismount from your horses and walk them over to him. After some introductions, where he confirms he's Travis Pharaoh-Hound, cousin of Neal, you give him the beat-up and smelly envelope. He reads the contents, nods, and carefully puts the letter back into the envelope. \"Boat's all yours, then,\" he says, jerking a thumb over his shoulder. \"I'll just take those horses off your paws after you load up the boat.\"\n\n\"That was easy,\" Damian says after loading the boat with your supplies. \"Do either of you know how to paddle a boat?\"\n\nSonya shivers. \"I've never even been on a boat before,\" she says. \"Remember, I wanted to take the road south.\"\n\n*fake_choice\n\t#\"I'm sure we can figure it out.\"\n\t\t\"I'm sure we can figure it out,\" you say. \"How hard can it be?\"\n\t\t*set per_idealist %+10\n\t#\"I know how to do everything!\"\n\t\t\"I know how to do everything!\" you say. \"Anyone can paddle a boat, I'm sure.\"\n\t\t*set per_ego %+10\n\t#\"We can learn how to do it as a team.\"\n\t\t\"We can learn how to do it as a team,\" you say. \"Let's just try something out and see if it works.\"\n\t\t*set per_loyal %+10\n\nDamian and Sonya look skeptical. Sonya calls out to Travis as he's gathering up your horses. \"Can you show us how this works?\" she asks.\n\n\"Sure thing.\" Travis jumps into the boat and gives you all a quick lesson on how to use the oars. Soon the three of you have the hang of it, and he wishes you well. The rest of the day the three of you talk, plan, and argue as you row your boat, learning how to navigate and avoiding crashing into rocks until the sun goes down.\n\n*set flg_inBoat true\n*page_break The Next Day\n\"Boss, we have a problem.\"\n\nYou open your eyes. It was your turn to rest as the other two paddle on to Mutt Town, the next settlement on the river. However, the warm sun and steady rhythm of the oars caused you to doze. As you rub the sleep out of your eyes, you notice the water is moving much faster now, and you can see rocks jutting out of the river in places. In the distance, you spot a rough dam built with logs in the middle of the river, and the rushing river is drawing you right to it.\n\n*choice\n\t#I tell them to row into the rapids. We're tough enough to hang on.\n\t\t\"Go into the rapids,\" you say. \"We just need to hang on until we get through to the other side.\"\n\n\t\tDamian and Sonya don't have time to argue. They steer the boat into the rapids and hang on to the boat.\n\n\t\tAs the boat hits the rapids, you feel the rocks jostle and vibrate the hull. \n\t\t*set att_solid %+05\n\t\t*if att_solid > 55\n\t\t\tAt one point Damian almost falls out, but you're able to grab him and keep him inside the boat. After a few harrowing moments, the vibration stops, and all three of you are still inside the boat.\n\t\t\t*set stg_fetch +1\n\t\t\t*goto badger_bandits\n\t\t*else\n\t\t\tBut you aren't tough enough to endure the abuse. You fall into the water with a loud [i]splash[/i], followed quickly by your friends.\n\t\t\t*set flg_inBoat false\n\t\t\t*goto badger_bandits\n\t#I encourage them to exit and drag the boat around the dam.\n\t\t\"Get out,\" you say. \"We'll carry the boat around the dam.\"\n\n\t\tDamian and Sonya don't have time to argue. They steer the boat to the shore near the rapids and quickly get out. You reach for the boat. \n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tStraining your mighty muscles, you pull the boat out of the rushing rapids and onto the shore. The three of you manage to lift the boat and carry it along the shore to the other side of the dam. Exhausted, you settle it back into the water and climb back in.\n\t\t\t*set stg_fetch +1\n\t\t\t*goto badger_bandits\n\t\t*else\n\t\t\tYou strain to hang on to the boat, but it slips out of your paws and floats into the rapids. The boat bounces along the rocks as you desperately run along the shore, trying to keep it in sight. But the boat makes it past the rapids and is yanked down the river by the rushing water.\n\t\t\t*set flg_inBoat false\n\t\t\t*goto badger_bandits\n\t#I use my fast reflexes to guide the boat through the rapids.\n\t\t\"Go into the rapids,\" you say. \"I can dodge the rocks until we get through to the other side.\"\n\n\t\tDamian and Sonya don't have time to argue. They give you the oars, and you steer the boat into the rapids while they hang on to the boat.\n\n\t\tAs the boat hits the rapids, you feel the rocks jostle and vibrate the hull. \n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tYour quick reflexes allow you to navigate the rapids, avoiding the worst of the rocks. It's not smooth sailing, but you manage to get the boat to the other side without anyone falling overboard.\n\t\t\t*set stg_fetch +1\n\t\t\t*goto badger_bandits\n\t\t*else\n\t\t\tBut you aren't fast enough to navigate the rapids. You fall into the water with a loud [i]splash[/i], followed quickly by your friends.\n\t\t\t*set flg_inBoat false\n\t\t\t*goto badger_bandits\n\t*selectable_if (flg_hasMagic) #I cast a spell to move the logs out of the river.\n\t\t\"Head for the dam,\" you say. \"I'll cast a spell to move the logs.\"\n\n\t\tDamian and Sonya don't have time to argue. They steer the boat to face the dam and hang on to the sides. You quickly mutter under your breath, and a large translucent paw appears above the dam. \n\n\t\tUsing the paw you grab a few of the logs and fling them out of the river. The rest of the dam collapses just as you approach it, allowing you to sail through after a short but rocky ride.\n\t\t*set att_clever %+05\n\t\t*set stg_fetch +1\n\t\t*goto badger_bandits\n\n*label badger_bandits\n\nAnd that's when you notice the badgers.\n\nThere's a small group of them on the shore, wielding rusty swords and covered in mud and grass. Bandits.\n\n*if flg_inBoat = true\n\tA large one in torn, dirty armor points a sword at the three of you. \"Sneaky! Attack!\" he snarls.\n\n\tSuddenly, four weasels pop up out of the river and grab onto the boat. With surprising strength they pull on the edge, causing the boat to capsize. The three of you fall into the water with a loud [i]splash[/i], and the four badgers grab you and drag you ashore. The boat rights itself and floats down the river, with no one aboard.\n\t*goto badger_speaks\n*else\n\tA large one in torn, dirty armor points a sword at the three of you. \"Sneaky! Grab dogs!\" he snarls.\n\n\tSuddenly, four weasels pop out of the river and grab you. They drag you ashore.\n\t*goto badger_speaks\n\n*label badger_speaks\n\n*page_break\nThe large badger points to the ground. The weasels drop the three of you on the shore, dripping and panting. \"Rope,\" the badger mutters, and the weasels tie the three of you up. He follows up with something in a language you don't understand.\n\n\"Why don't I understand them?\" Sonya asks as the weasels work.\n\nIt's a good question. Dogs and cats all speak the same language, one believed to be created by the Old Ones in ancient times. Cats sometimes have secret languages all their own, but those are more like codes and ciphers. \n*if att_clever > 55\n\tBut you recall reading something about how the badgers don't have access to the same language. No matter how hard they try, something [i]prevents[/i] them from learning cat and dog language beyond a few words here and there. But you think you pick up a few words as you listen to the leader talk.\n\t*goto who_cares\n*else\n\tBut why are badgers different? If you survive, maybe you'll look into it someday.\n\t*goto who_cares\n\n*label who_cares\n\n\"Who cares why?\" Damian says, spitting out some brackish water. \"We need to get out of here.\"\n\nThe weasels shake hard, sending water everywhere. Pleased with themselves, they draw daggers and stand between you and the river as the large badger steps to you.\n\n\"Kill dogs,\" he says. \"Get money from pirates.\" He smiles, and you can see a gold fang peeking behind one lip. \"Like money,\" he says as he draws his sword.\n\n*choice\n\t#I try to talk to him in his own language.\n\t\tYou clear your throat to get the badger leader's attention. \n\t\t*set att_clever %+05\n\t\t*if att_clever > 55\n\t\t\tThinking over some of the words you heard them say, you carefully deduce from context what they mean and try a few words. [i]We friends. No harm.[/i]\n\n\t\t\tThe badger cocks his head in confusion and says more words. You pick up what you think are \"badger\" and \"speak,\" but it seems like it's enough to communicate! You desperately try to think of the next words to say, when \n\t\t\t*set stg_lore +1\n\t\t\t*goto mutts_arrive\n\t\t*else\n\t\t\tYou try to think of some words to say. [i]Money fang heart. Much sword fun.[/i]\n\n\t\t\tThe badger laughs. \"You stupid,\" he says in dog language. \"No speak like us.\"\n\n\t\t\tArgh! That wasn't right. You desperately try to think of the next words to say, when \n\t\t\t*goto mutts_arrive\n\t#I threaten them.\n\t\t\"You'll never get away with this,\" you say, threatening the leader. \"Once I get loose, you'll regret what you've done.\"\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tThe badger leader gives a short laugh. \"Shut up,\" he says, as he steps away.\n\n\t\t\tAh! Badgers can be scared. You try to think of more threats, when \n\t\t\t*set stg_lore +1\n\t\t\t*goto mutts_arrive\n\t\t*else\n\t\t\tThe badger leader gives a long laugh. \"You funny,\" he says, and kicks you. He goes to kick you again, when \n\t\t\t*goto mutts_arrive\n\t#I plead with them.\n\t\t\"Let us go,\" you say, begging. \"We don't mean you any harm.\"\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tThe badger leader pauses before giving a short laugh. \"Shut up,\" he says, as he steps away.\n\n\t\t\tAh! Badgers can be reasoned with. You try to think of more ways to convince them, when \n\t\t\t*set stg_lore +1\n\t\t\t*goto mutts_arrive\n\t\t*else\n\t\t\tThe badger leader kicks dirt in your face. \"You dumb,\" he says, laughing. He goes to kick more dirt, when \n\t\t\t*goto mutts_arrive\n\n\t*selectable_if (oth_coins > 0) #I offer them money.\n\t\t\"Wait, we have money!\" you say, desperately. \"You can have it if you let us go.\"\n\n\t\t\"Money?\" the badger leader asks. \"Like money.\"\n\n\t\t\"So I've heard,\" Damian mutters. \"Boss, we shouldn't give him our plastic. We need that.\"\n\n\t\t\"[i]You[/i] need it, you mean,\" Sonya says.\n\n\t\t\"It's not like you care if you end up eating grass for the rest of your life. Some of us need to live in style!\"\n\n\t\t\"Shut up!\" the badger leader says, and starts digging through your rucksack. He pulls a loose plastic coin out and smiles, deftly slipping it into his own pocket. He goes back to searching, when \n\t\t*set stg_lore +1\n\t\t*set oth_coins -1\n\t\t*goto mutts_arrive\n\n*label mutts_arrive\ntwo of the badgers near the leader suddenly draw their swords. \"More dogs!\" one of them hisses, and they rush over a small hill, out of your sight. You hear the sounds of combat, and after a few wags, seven dogs come over the hill. They are a wide variety of heights, fur colors, and clothing, and a couple are carrying bloodied swords. A short mutt with brown fur and one floppy ear steps forward.\n\n\"We are the welcome committee of Mutt Town. Badgers and their ilk are not welcome here.\" She turns to you. \"Nor the dogs of Pugmire.\"\n\n*page_break Mutt Town?\n*gosub mutt_town\n\n*page_break Back to the Badgers\nThe lead badger has been staring at the mutts for a long moment. Finally, he spits and sheathes his sword. \"No like money this much,\" he says. \"We take our dead and go.\" With that, the rest of the badgers and the weasels head over the hill, leaving you behind.\n\nThe small mutt turns to you. \"Cut them loose,\" she says, and the three of you are quickly set free.\n\n\"Thank you,\" you say, rubbing your wrists to get some circulation back into them. \"We appreciate any help you can give us.\"\n\nThe mutt nods. \"Of course. Seems like once again Pugmire has brought problems to our town, and once again we have to clean up for you. We wouldn't have to deal with a dam and a fight if you hadn't brought your problems here.\"\n\n\"Hey!\" Damian says, protesting. \"It's not like [i]we[/i] hired badger bandits to attack ourselves!\"\n\nSonya snarls. \"You mutts have overstepped your bounds. Let us go before we are forced to defend ourselves.\"\n\nThe small mutt frowns at the two of them, before turning to you. \"You best silence your friends. What are you going to do to make this right?\"\n\n*label deal_with_mutts\n*choice\n\t#I challenge the mutts to a contest of strength.\n\t\t*set per_tame %-10\n\t\t\"I challenge you to a duel,\" you say. \"Tug of war. If I win, you help us out.\"\n\n\t\tThe small mutt laughs. \"Agreed. Ambrosius! Get up here.\" The rest of the dogs part as a tall mutt with rippling muscles steps forward. They throw you one end of a rope, and hold on to the other.\n\n\t\t\"Are you ready?\" the small mutts says, laughing. You stare at your opponent and nod. \n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tSuddenly the rope tightens, but you hold your ground. Pulling hard, you slowly take steps back. First one, then another, until soon you are walking backwards and pulling Ambrosius along. They let go of the rope in frustration.\n\n\t\t\t\"Well done,\" the small mutt says.\n\t\t\t*set rep_dog %+10\n\t\t\t*set flg_muttRespect true\n\t\t\t*if (flg_goingToRiver)\n\t\t\t\t*goto mutt_diplomacy_river\n\t\t\t*else\n\t\t\t\t*goto mutt_diplomacy_road\n\t\t*else\n\t\t\tSuddenly the rope tightens, and you stumble forward. You pull hard, trying to reclaim your ground, but you are forced to take another step forward, and another. Soon Ambrosius\tis pulling you along. You let go of the rope in defeat.\n\n\t\t\t\"You're a good dog, Ambrosius,\" the small mutt says.\n\t\t\t*if (flg_goingToRiver)\n\t\t\t\t*goto mutt_diplomacy_river\n\t\t\t*else\n\t\t\t\t*goto mutt_diplomacy_road\n\t#I cleverly explain our mission is for the good of dogs everywhere. \n\t\t*set per_tame %+10\n\t\t\"Our mission is for the good of dogs everywhere,\" you explain. \"Not just Pugmire. Pirates don't care about the allegiances of the people they plunder and kill.\"\n\n\t\tThe small mutt listens carefully to your argument. \n\t\t*set att_clever %+05\n\t\t*if att_clever > 55\n\t\t\tFinally, she nods. \"Okay. We'll help you.\"\n\t\t\t*set rep_dog %+10\n\t\t\t*set flg_muttRespect true\n\t\t\t*if (flg_goingToRiver)\n\t\t\t\t*goto mutt_diplomacy_river\n\t\t\t*else\n\t\t\t\t*goto mutt_diplomacy_road\n\t\t*else\n\t\t\tEventually, she shakes her head. \"I hear what you're saying, but it still sounds like Pugmire business to me.\" \n\t\t\t*if (flg_goingToRiver)\n\t\t\t\t*goto mutt_diplomacy_river\n\t\t\t*else\n\t\t\t\t*goto mutt_diplomacy_road\t\n\t#I tell the mutts we are all good and friendly dogs who mean no ill will.\n\t\t*set per_loyal %+10\n\t\t\"My friends Damian and Sonya might snap and bark, but deep down they're good dogs. We all are. We don't mean you any ill will.\"\n\n\t\tThe small mutt listens carefully to your impassioned speech. \n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tFinally, she nods. \"Okay. We'll help you.\"\n\t\t\t*set rep_dog %+10\n\t\t\t*set flg_muttRespect true\n\t\t\t*if (flg_goingToRiver)\n\t\t\t\t*goto mutt_diplomacy_river\n\t\t\t*else\n\t\t\t\t*goto mutt_diplomacy_road\n\t\t*else\n\t\t\tEventually, she shakes her head. \"Maybe you don't think you mean us harm, but just the three of you being here caused problems.\" \n\t\t\t*if (flg_goingToRiver)\n\t\t\t\t*goto mutt_diplomacy_river\n\t\t\t*else\n\t\t\t\t*goto mutt_diplomacy_road\n\t*if (plc_calling = \"Stray\") #I appeal to her as a fellow stray.\n\t\t\"I'm a stray,\" you say to the small mutt. \"Just like you, I live on the fringes of dog society. And still I have devoted myself to the Royal Pioneers, because I believe they are good dogs who are seeking to do what is right.\"\n\n\t\tThe small mutt listens to your argument, and nods. \"Mutt Town will not turn away a fellow free dog in their time of need. We'll help you.\"\n\t\t*achieve fellowstray\n\t\t*set flg_muttRespect true\n\t\t*if (flg_goingToRiver)\n\t\t\t*goto mutt_diplomacy_river\n\t\t*else\n\t\t\t*goto mutt_diplomacy_road\n\t*if (plc_mutt) #I talk as a fellow Mutt.\n\t\t\"I'm a mutt, just like you,\" you say. \"I also live on the fringes of dog society. But I still devote myself to the Royal Pioneers, because I believe they are good dogs who are seeking to do what is right.\"\n\n\t\tThe small mutt listens to your argument, and nods. \"Mutt Town will not turn away a fellow Mutt in their time of need. We'll help you.\"\n\t\t*achieve fellowstray\n\t\t*set flg_muttRespect true\n\t\t*if (flg_goingToRiver)\n\t\t\t*goto mutt_diplomacy_river\n\t\t*else\n\t\t\t*goto mutt_diplomacy_road\n\n*label mutt_diplomacy_river\n\n\"What's your name?\" you ask the small mutt.\n\n\"Cokie,\" she says, and smiles. \"Look, I'm not trying to be a cur about anything. I was planning to help you out either way. I just needed to know what kind of dogs you were.\" Cokie shrugs. \"We have a few extra horses we captured while those badgers were playing around with you. I can't keep them fed, so we can either give them to you or let them go and maybe sell the saddles.\" As she talks, some of the other mutts bring three horses over the hill by the reins.\n\n\"Given what I saw earlier, the three of you @{flg_inBoat can barely navigate a boat.|can't handle a boat.} And odds are there will be more problems downstream.\" Cokie gestures to the horses. \"So you want them or not?\"\n\n*page_break\nA few hours later, the three of you are riding on your new horses to Waterdog Port. \n*achieve endchapter4\n*finish [i]Chapter Five: The Pig's Tale[/i]\n\n*label the_road\nThe next day, Damian lightens up again and acts like nothing ever happened. You and Sonya separately ask him if he's okay, but he just changes the topic by saying something funny or insulting, so you let the matter drop for the rest of the day. Now it's the day after, and the first few hours have been dull, with nothing but endless trees on both sides of the road. Damian's in the middle of a particularly bawdy joke when you see more horses coming in the opposite direction. He sits up straighter in the saddle, and Sonya peers down the road, her paw over her eyes to shade them from the sun.\n\n\"Look like more dogs,\" she says. \"What should we do?\"\n\n*fake_choice\n\t#I'm careful. It's probably a trap.\n\t\t*set per_idealist %-10\n\t#I'm hopeful. They might be willing to help.\n\t\t*set per_idealist %+10\n\t#I'm quiet. Best just to slip by them.\n\t\t*set per_ego %-10\n\nAs you open your mouth to say something, cats come out from the trees on either side, brandishing scimitars and bows. You recognize the clothing and weapons of Patches' old crew of pirates. \"Hit them hard before those damned mutts get here,\" one of them snarls. You have a quick moment to act.\n\n*choice\n\t#I attack them hard to break their spirit. \n\t\tYou draw your weapon. \"Let's hit them hard,\" you say to Damian and Sonya. Without waiting for a response, you turn your horse and spur it into a gallop to rush the pirates on your side.\n\n\t\t*set per_tame %-10\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tYour ride your horse toward the pirates. Most of the cats drop their weapons and scatter, but one bounces off your horse's flank. The impact rattles your teeth as you hear the [i]thud[/i] of the impact, and the cat slumps to the ground, senseless.\n\n\t\t\tPulling up on the reins, you quickly check your horse, which seems to be fine. You look behind you, and see Damian and Sonya fighting the other group. \n\t\t\t*set stg_protect +1\n\t\t\t*goto mutt_patrol\n\t\t*else\n\t\t\tYour ride your horse toward the pirates. Most of the cats dodge out of the way, but one spins around, their sword flashing. The blade cuts the strap holding the saddle on your horse—a million-to-one lucky shot—and you fall off your horse. The other cats pounce on you, seizing the opportunity. As you struggle against their grip, you notice Damian and Sonya fighting the other group. \n\t\t\t*set flg_captured true\n\t\t\t*goto mutt_patrol\n\t#I distract and confuse them until the dogs arrive.\n\t\tYou motion to Damian and Sonya. \"You attack that group, and I'll distract this one.\" Without waiting for a response, you turn your horse and dash into the woods near the pirates on your side.\n\n\t\t*set per_ego %+10\n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\tBranches smack into your face as you hear cries of indignation and confusion behind you. You quietly slip off your horse and squat behind a small hill thick with trees. You wag your tail once, twice, and then risk a glance around a trunk. You see the cats looking through the trees, swords out, checking behind every trunk, but they don't seem to find you. You wait a moment until they've passed, and then remount and ride back to the road.\n\n\t\t\tOnce you break through the trees, you see Damian and Sonya fighting the other group.\n\t\t\t*set stg_lore +1\n\t\t\t*goto mutt_patrol\n\t\t*else\n\t\t\tBranches smack into your face, but one particularly stout branch knocks you off your horse. You land to the ground with a heavy [i]thud[/i].\n\n\t\t\t\"Over there!\" you hear one yell. You try to shake your head clear and get back up, but within moments you feel paws pulling you up. As you struggle against their grip, you notice Damian and Sonya fighting the other group. \n\t\t\t*set flg_captured true\n\t\t\t*goto mutt_patrol\n\t#I pepper them with arrows to thin their ranks.\n\t\t\"I'll pull back and hit one group with arrows,\" you say to Damian and Sonya. Without waiting for a response, you turn your horse and ride back down the road for a few moments, away from the cats and the conflict. You need to get some distance for your bow. After a wag or two, you unsling your bow, turn your horse around, and carefully fire an arrow into the knot of pirates on your side of the road. And then another. And another.\n\n\t\t*set per_tame %-10\n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tYour arrows rain down on the pirates. Seeing the curving missiles, the cats scream and scatter back into the woods. One arrow lodges in a pirate's boot, and the cat swiftly slides out of the boot, running back into the woods with a humorous waddle.\n\n\t\t\tOnce the pirates you were firing on have vanished back into the woods, you ride back to help Damian and Sonya, as they fight the other group. \n\t\t\t*set stg_protect +1\n\t\t\t*goto mutt_patrol\n\t\t*else\n\t\t\tUnfortunately, the arrows go wide of their mark. The cats, unimpressed with your attack, run up to you on your horse. They are too close for you to get a clean shot at any of them, and before you can switch to another weapon, they grab you and drag you off your horse. As you struggle against their grip, you notice Damian and Sonya fighting the other group. \n\t\t\t*set flg_captured true\n\t\t\t*goto mutt_patrol\n\t*selectable_if (flg_hasMagic) #I cast a magical fog to disorient the pirates.\n\t\tYou motion to Damian and Sonya. \"You attack that group, and I'll cast a spell on this one.\" Without waiting for a response, you clear your mind and begin casting a spell on the pirates on your side of the road. \n\n\t\tWithin a wag or two, a thick white fog billows up from the ground. The droplets cling to your ${plc_fur} fur, chilling you as the cats within crash and clang with confusion. Holding your weapon ready, you watch carefully, making sure no cat lurches out of the fog. Once it clears, many of the cats have fallen over each other, and the rest have fled back into the forest.\n\n\t\tOn the other side of the road, you see Damian and Sonya fighting the other group.\n\t\t*set att_clever %+05\n\t\t*set per_tame %+10\n\t\t*set stg_lore +1\n\t\t*goto mutt_patrol\n\n*label mutt_patrol\n\nThe fight doesn't seem to be going well for them. The dogs you saw down the road have ridden hard to join the fight, and have swords and bows drawn. @{flg_captured Captured as you are,|From where you sit astride your horse,} you can't tell if they're going to attack or help your friends.\n\n*choice\n\t#I call out for help.\n\t\tYou call out, asking the dogs to help you and your friends.\n\t\t*set per_ego %-10\n\t\t*goto mutts_attack\n\t*if (flg_captured = false) #I rush to help my friends, regardless of the danger.\n\t\tDrawing your weapon, you spur your horse to join your friends in the fight, and hope the dogs coming are friends rather than foes.\n\t\t*set per_loyal %+10\n\t\t*goto mutts_attack\n\t*if (flg_captured = true) #I distract my captors so they don't join the fight.\n\t\tYou start screaming and trying to bite your captors, to distract them from the dogs coming closer.\n\t\t*set per_loyal %+10\n\t\t*goto mutts_attack\n\t#I do nothing, trusting in dogs to do the right thing.\n\t\tYou watch, trusting the dogs coming are friends rather than foes. \n\t\t*set per_idealist %+10\n\t\t*goto mutts_attack\n\n*label mutts_attack\n\nThe pack of dogs ride their horses hard. You hear one of them, a small mutt with a bow, yell \"For Mutt Town!\" as they clash with the pirates. \n\n*page_break Mutt Town?\n*gosub mutt_town\n\n*page_break Back to the Battle\nThe combat is short, and within a dozen wags, the cat pirates are fleeing back into the woods. @{flg_captured The dogs free you,|You step down from your horse,} and the small mutt steps forward to look the three of you over.\n\n\"Thank you,\" you say.\n\nThe mutt nods. \"Of course. Seems like once again Pugmire has brought problems down the South Road, and once again we have to clean up for you.\"\n\n\"Hey!\" Damian says, protesting. \"It's not like we [i]asked[/i] for pirates to ambush us!\"\n\nSonya snarls. \"You mutts have overstepped your bounds. Let us go before we are forced to defend ourselves.\"\n\nThe small mutt frowns at the two of them, before turning to you. \"You best silence your friends. What are you going to do to make this right?\"\n*goto deal_with_mutts\n\n*label mutt_diplomacy_road\n\n\"What's your name?\" you ask the small mutt.\n\n\"Cokie,\" she says, and smiles. \"Look, I'm not trying to be a cur about anything. I was planning to help you out either way. I just needed to know what kind of dogs you were.\" Cokie shrugs. \"It turns out you're dogs in need of help, and we were able to provide it. \n*if flg_muttRespect = true\n\tAnd who knows? Maybe we'll provide it again.\"\n\n\tYou shake paws and, gathering your horses, you head back south to Waterdog Port.\n\t*achieve endchapter4\n\t*finish [i]Chapter Five: The Pig's Tale[/i]\n*else\n\tBest of luck, dogs of Pugmire.\"\n\n\tYou shake paws and, gathering your horses, you head back south to Waterdog Port.\n\t*achieve endchapter4\n\t*finish [i]Chapter Five: The Pig's Tale[/i]\n\n*label mutt_town\n\nYou've heard of Mutt Town. Rusty Mutt was a courageous and visionary dog who wanted to bring all the mutts, strays, and other dogs living outside civilization together to build their own community. They've found a niche acting as explorers and guides to carefully harvest the forest, and they've managed to even build up enough resources like wood and rare plants to offer as trade to the other cities in exchange for food and medical supplies. \n\nThus, Mutt Town has an unusual place in dog society—not a part of the Pugmire empire, but also not completely outside of it, either. Rusty has since passed on, and no one has stepped up to take her place as the leader of Mutt Town. A scrappy young pup by the name of Cokie has made several small raids on bands of cat and badger bandits to feed her band of hungry dogs. Other Mutts have started to emulate her, believing Mutt Town won't be taken seriously until aggressive action is taken. Even some cats have come to live in Mutt Town, many taking jobs on ships to earn enough money to help the other dogs and cats in need.\n\nMeanwhile, the more conservative elements of the Pugmire nobility worry about these rumblings from Mutt Town, and advocate dealing harshly with the mutts once and for all. Thus far, King Puckington has advised tolerance and aid for the mutts, but offers to bring Mutt Town back into the paws of the Pugmire empire are met with scorn and disdain from both the nobles and the mutts.\n*return\n", "05-waterdog_port": "*temp flg_sawGreedyBow false\n*temp flg_sawAmbrosia false\n*temp flg_sonyaHorseGone false\n*temp flg_yourHorseGone false\n*temp flg_sonyaOnHerOwn false\n*temp flg_damianOnHisOwn false\n*temp flg_cornerGreedyBow false\n*temp flg_cornerAmbrosia false\n*text_image chap_5.png center [b]Chapter Five: The Pig's Tale[/b]\n\nThe road to Waterdog Port is long and dull, particularly after your thrilling encounter with the dogs of Mutt Town. The plains seem to stretch on forever, with the occasional hill or half-dead tree to liven up the trip. The road is firm with well-packed dirt, not even providing the brief thrill of a rock in the road to avoid. It doesn't rain, and while the sun shines every day, it's not too hot or too cold. The trip seems to drag on and on, leaving the three of you time to talk.\n\n*if rel_Sonya > 55\n\t*gosub sonya_chat\n*if rel_Damian > 55\n\t*gosub damian_chat\n*if (rel_Sonya \u003c= 60) and (rel_Damian \u003c=60)\n\t*gosub nobody_chat\n\nFinally, you can smell salt and water in the air. The breeze has a bitter, acidic edge to it, and in the distance you can make out the tall masts of ships. You must be near the Acid Sea. A couple more hours of riding, and you top the final hill to see Waterdog Port sprawled out in front of you. You think back on everything Sonya and Damian told you about the city during your long ride.\n\n*page_break History\n[i]Yesterday.[/i]\n\n\"Waterdog Port's turbulent history has resulted in an equally turbulent city,\" Sonya said. \"It's like Mutt Town, in that it's ideologically apart from Pugmire and the monarchies, but grudgingly has some relationship with both empires.\"\n\n\"[i]Very[/i] grudgingly,\" Damian agreed.\n\nSonya nodded. \"It considers itself an independent city-state that does business with both major powers, as long as neither attempts to assert their authority over the port.\"\n\n\"So it's totally lawless?\" you asked.\n\n\"Not exactly, boss,\" Damian interjected. \"It does have a Governor, which is elected from a Council of Luminaries.\"\n\n\"Luminaries?\"\n\n\"The movers and shakers of the port. Mostly cats and dogs, but a few birds and lizards too. The Governor keeps the Luminaries in line.\"\n\n\"And for good reason,\" Sonya continued. \"Waterdog Port is primarily governed by finance, as well as a little spite. If selling a huge shipment of contraband is profitable, no one in Waterdog Port will bat an eye.\"\n\n\"And if that contraband rubs the fur of the nobles in Pugmire and the Monarchies the wrong way,\" Damian added, \"that's just a bonus.\"\n\n*fake_choice\n\t#\"How do they stay independent?\"\n\t\t\"How does this one port city hold enough power to stay independent?\" you asked.\n\t#\"The Governor must be powerful.\"\n\t\t\"The Governor must be incredibly powerful to stay independent,\" you said.\n\n\t\t\"Eh, yes and no,\" Damian said.\n\t#\"Sounds like the perfect place for us.\"\n\t\t\"Any city that annoys the nobles sounds like a perfect place for us,\" you said.\n\n\t\t\"Eh, yes and no,\" Damian said.\n\nSonya clenched her paw into a fist. \"The Governor makes sure the Luminaries maintain a stranglehold on the secret of building and sailing the acid-proof boats and ships that allow overseas trade and travel to occur.\" \n\n\"And pirates,\" Damian added. \"Or as I like to think of them, 'sea ratters'.\"\n\n\"True. The fact is, it's cheaper and safer to take a boat from Waterdog Port around the Fearful Forest and into Korat or the other cat monarchies than it is to supply a caravan through the forest itself.\" Sonya shrugged. \"Plus, Pugmire and Houndton continue to need supplies from overseas, and Waterdog Port has a monopoly on that shipping and trade.\"\n\nDamian spread his paws wide. \"So the big puppies and kittens turn a blind eye to the freelance spirit—\"\n\n\"Rampant piracy and criminal elements,\" Sonya muttered.\n\nDamian ignored her. \"—that comprise the heart of Waterdog Port. And the citizens live in a city where everyone is generally free to do what they want.\"\n\n\"Whether the innocents who live there like it or not.\"\n\n*page_break But Now…\n[i]Now.[/i]\n\nBut now you're trotting along the cobbled streets of the North Barrio. The buildings here are nice, a mixture of pragmatic dog architecture and the more ornate building style of the cats. A domed building towers over all the others, with stars painted over the surface. As you make your way into the town square, you see a beautiful marble fountain in front of a well-preserved mansion.\n\nAhead, the tall ships of the dock are a little more visible—there's still a lot of town between you and them, but the town seems to spread out instead of up, allowing a relatively unobstructed view of the dock area. To your right you see another part of the town is built on swampier land and appears to be covered in a permanent fog.\n\nSurprisingly, very few of the people milling around look like…well, like pirates. Sure, lots of people openly wear armor and carry weapons, but you notice cats and dogs mingle, unconstrained by historical animosity. You also see the occasional lizard, turtle, snake, and bird. Some of the people you see are wearing nice clothing and have blankets rolled open, displaying exotic (and extremely shoddy) wares. Others are more simply dressed, carrying heavy loads or pulling wagons full of supplies. Many are dressed in nice, sturdy clothing—some are outright ostentatious, but most are just tailored to withstand the rigors of sailing. This is clearly a town that thrives on trade.\n\nThat makes the clowder of ragged, disreputable-looking cats lurking in the town square easier to spot. They wear ripped and torn clothing similar to the pirates you saw in the Cat Quarter of Pugmire. Further, while most of the people around walk or run with clear purpose and drive, these cats look listless, pacing in place or nervously glancing around. Could these be the pirates you've been looking for?\n\n*choice\n\t#I spur my horse to run them down.\n\t\tYou spur your horse, encouraging it into a fast trot in order to run the pirates down. Damian and Sonya, surprised by your action, yelp and try to catch up to you. \n\t\t*set per_loyal %-10\n\t\t*goto street_chase\n\t#I trot up to them to ask about Greedy Bow.\n\t\tYou trot your horse up to the cats. Maybe they will know where you can find Greedy Bow. Damian and Sonya follow behind you.\n\t\t*set per_tame %+10\n\t\t*goto street_chase\n\t#I motion to Damian and Sonya to surround them.\n\t\tYou point to Damian and Sonya, then at the cats, indicating they should surround the cats. Nodding, they start to circle their horses around the group of pirates.\n\t\t*set per_loyal %+10\n\t\t*goto street_chase\n\n*label street_chase\n\nThe sound of hoofs on the cobbled street causes the cats to turn and look. Seeing the three of you, they quickly turn and flee the town square. Before you can give chase, a turtle with a deep voice and a bell steps out of the mansion. \"Governor Dobi Weimaraner is dead! Assassin on the run!\"\n\nSurprisingly, people start pouring out of the buildings into the streets at this news instead of hiding in their homes. The citizens of Waterdog Port seem to be torn between panic and a desire to see what's going on as the three of you are immediately caught in a huge throng of nervous, excited people. You try to chase the pirates on horseback, but they manage to cross the square and duck between two close-set buildings. The alley is too narrow for your horses, and the streets are getting choked with people.\n\n\"We'll need to get off our horses and chase after them!\" Sonya yells, leaping off her horse.\n\n\"Are you daft? If we leave our horses here, we'll come back to nothing but a collection of used horseshoes!\" Damian calls back.\n\nYou need to make a decision, fast.\n\n*choice\n\t#I chase after Sonya. We have to run them down.\n\t\t\"No time, Damian!\" you shout, also jumping off your horse. \"We have to run them down!\"\n\n\t\t\"You're both crackers!\" Damian says, riding his horse into the street. \"Don't blame me when your horses are gone.\"\n\n\t\tIgnoring his grumbling, you run off after Sonya.\n\t\t*set per_tame %-10\n\t\t*set rel_Sonya %+10\n\t\t*set rel_Damian %-10\n\t\t*set flg_yourHorseGone true\n\t\t*set flg_sonyaHorseGone true\n\t\t*goto sonya_chase\n\t#I follow after Damian on the horse, leaving Sonya behind.\n\t\t\"The horses are faster, Sonya!\" you shout. \"You can't catch them!\"\n\n\t\t\"Trust me, $!{plc_fname},\" she says, heading to the alley. \"I can run them down.\"\n\n\t\t\"You're crackers!\" Damian says, kicking his steed into a gallop. \"Come on, boss!\"\n\n\t\tLeaving Sonya's horse behind, you follow after Damian.\n\t\t*set per_tame %+10\n\t\t*set rel_Damian %+10\n\t\t*set rel_Sonya %-10\n\t\t*set flg_sonyaHorseGone true\n\t\t*goto damian_chase\n\t#I tell Damian to stay with the horses, chasing after Sonya on foot.\n\t\t\"No time, Damian!\" you shout, also jumping off your horse. \"Stay with the horses!\"\n\n\t\t\"You're both crackers!\" Damian says. \"You'll need me to help.\"\n\n\t\tIgnoring his grumbling, you run off after Sonya.\n\t\t*set per_tame %-10\n\t\t*set rel_Sonya %+10\n\t\t*set rel_Damian %-10\n\t\t*set flg_sonyaOnHerOwn true\n\t\t*goto sonya_chase\n\t#I ask Sonya to get back on her horse. The horses are faster.\n\t\t\"The horses are faster, Sonya!\" you shout. \"Saddle back up!\"\n\n\t\t\"I can run them down, $!{plc_fname},\" she says, conflicted.\n\n\t\t\"Just do it!\" you should, as Damian kicks his steed into a gallop.\n\n\t\tSonya gets back up on her horse. \"I'll stay here and make sure they don't double back,\" she says, sourly. You nod, and chase after Damian.\n\t\t*set per_tame %+10\n\t\t*set rel_Damian %+10\n\t\t*set rel_Sonya %-10\n\t\t*set flg_damianOnHisOwn true\n\t\t*goto damian_chase\t\n\n*label sonya_chase\n\nThe alleyways twist and turn, with barely enough room for Sonya to run between the walls of the buildings. Definitely not enough room to swing a sword, and Sonya takes up too much room to shoot an arrow past her. Discarded refuse covers the alleyway, in stark contrast to the relatively clean streets you saw riding in. It's as if everyone in the area shoves their rubbish out of sight, and you try not to breathe in the sour stench of garbage, salt, and sweat. \n\nWith the smell of rancid trash filling your nose and no easy way to use your weapons, all the two of you can do is run, chasing after the pirate cats who scream at people to get out of their way. Ahead you can see the alley opening up to a main street. Kittens are standing on the side, somberly watching an ornate funeral wagon get pulled by two stout horses with well-groomed purple hair. The pirates don't see the kittens, and end up knocking a few of them right in the path of the wagon! The driver, horrified, tries to stop the horses, but she might not be able to do so in time!\n\n*choice\n\t#I jump over the squirming children.\n\t\t\"Jump over them!\" you yell to Sonya. Without acknowledging your order, she leaps over the kittens in the street, hot on the tail of the pirates.\n\n\t\t*set per_idealist %-10\n\t\t*set rep_cat %+10\n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tYou leap over them, keeping right behind Sonya. Behind you, you can hear squeals of terror. It doesn't sound like anyone got hurt. Probably. You don't look back, keeping Sonya in your sights as she chases the pirates.\n\t\t\t*set flg_cornerGreedyBow true\n\t\t\t*goto see_greedy_bow\n\t\t*else\n\t\t\tYou prepare to leap over them as well, but one kitten stumbles in your way.\n\t\t\t*gosub grab_kitten\n\t\t\t*goto see_greedy_bow\n\t#I convince the kittens to get out of the way. \n\t\t\"Get out of the way!\" you yell to the kittens. \"The horses are right behind you!\"\n\n\t\t*set per_idealist %+10\n\t\t*set rep_cat %-10\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tSurprised by your voice, the kittens scamper back to the side of the street, just as the horses stomp down on the ground where they were standing. Glancing at the kittens to make sure they're okay, you keep running after Sonya as she chases the pirates.\n\t\t\t*set flg_cornerGreedyBow true\n\t\t\t*goto see_greedy_bow\n\t\t*else\n\t\t\tSurprised by your voice, most of the kittens scamper back to the side of the street, but one gets confused. \n\t\t\t*gosub grab_kitten\n\t\t\t*goto see_greedy_bow\n\t#I find a quick path around the mess without anyone noticing.\n\t\tSeeing you won't be able to get through the kittens and the horses, you cut to the left, looking for a way to get around the mess without losing too much ground and without the pirates noticing. You notice a merchant nearby with a stack of crates containing shoddy merchandise. \n\t\t*set per_idealist %-10\n\t\t*set rep_cat %+10\n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\tInstinctively, you climb up the boxes and leap off, landing on the ground near Sonya. Behind you, you can hear squeals of terror. It doesn't sound like anyone got hurt. Probably. You don't look back, keeping Sonya in your sights as she chases the pirates.\n\t\t\t*set flg_cornerGreedyBow true\n\t\t\t*goto see_greedy_bow\n\t\t*else\n\t\t\tAs you get ready to climb them, a box tumbles to the ground. The loud sound scares one of the kittens in the street, causing her to stand still with shock. \n\n\t\t\t*gosub grab_kitten\n\t\t\t*goto see_greedy_bow\n\t*selectable_if (flg_hasMagic) #I summon an illusion to scare the kittens away from the horses.\n\t\tThinking quickly, you cast a spell, a quick illusion to scare the kittens away from the horses. Within seconds, a large canine with black fur and glowing eyes stands in the road, growling fiercely at the kittens.\n\n\t\t*set per_idealist %+10\n\t\t*set rep_cat %-10\n\t\t*set att_clever %+05\n\t\t*if att_clever > 60\n\t\t\tTerrified, the kittens scamper back to the side of the street, just as the horses stomp down on the ground where they were standing. Glancing at the kittens to make sure they're okay, you keep running after Sonya as she chases the pirates.\n\t\t\t*set flg_cornerGreedyBow true\n\t\t\t*goto see_greedy_bow\n\t\t*else\n\t\t\tTerrified, most of the kittens scamper back to the side of the street, but one gets confused. \n\t\t\t*gosub grab_kitten\n\t\t\t*goto see_greedy_bow\n\n*label grab_kitten\nInstinctively, you rush forward, grab hold of her, and roll out of the way of the horses. A hoof comes down right next to your head, eliciting a screech from the kitten, but she appears to be safe. Leaving the kitten on the street, you rush after Sonya and the pirates, who have a significant lead.\n*achieve grabkitten\n*return\n\n*label see_greedy_bow\n*set flg_sawGreedyBow true\n\nThe pirates duck around people in the street as you get close to the docks and one ship in particular. You see the words [i]The Cat's Meow[/i] painted on the side, and more shabby-looking pirates working on the decks to get the ship ready to sail. \n\nNear the ship, you notice one cat in particular. He has silky gray fur with gray eyes, and is dressed in a sturdy but well-cared-for coat with lots of gold braid. The pirate cats cluster around him, pulling out weapons, while one tugs on the elaborate coat to convince the gray cat to climb up the rope ladder and board the ship. Spotting you, the gray cat pulls out a saber strapped to his waist and holds it upright in front of his face in a kind of salute. It glows with a strange purple glow.\n\n\"Ahoy!\" he yells over the crowd. \"You came close to touching the notorious Greedy Bow. \n*if (flg_cornerGreedyBow = true) and (flg_sonyaOnHerOwn = false)\n\tBut not—\" \n\n\t\"Shut up, you stuck-up moggie!\" Damian's voice cuts Greedy Bow off, as you see the borzoi charging his horse out of the nearby crowd.\n\n\tShocked, Greedy Bow tries to draw his other sword, but you and Sonya catch up to the clowder of ne'er-do-wells. Sonya shoves two of the pirates aside, and for a brief moment you're able to put your ${plc_fur} paw on Greedy Bow's coat.\n\n\t\"Got you!\" you snarl.\n\n\tGreedy Bow hisses in return, and you see his paw flashing toward you. In a moment, you see what's in his paw, but it's too late. Sand flies into your eyes and Sonya's.\n\t*set stg_badCat +2\n\t*goto pirates_escape\n*elseif (flg_cornerGreedyBow = true)\n\tBut not close enough.\"\n\n\tAs he talks, you and Sonya catch up to the clowder of ne'er-do-wells, and for a moment you get a good look at Greedy Bow's face. Sonya shoves one of the pirates aside, but you see the paw of a second flashing toward her. In a moment, you see what's in his paw, but it's too late to warn her. Sand flies into your eyes and Sonya's.\n\t*set stg_badCat +1\n\t*goto pirates_escape\n*elseif\t(flg_sonyaOnHerOwn = false)\n\tBut not—\" \n\n\t\"Shut up, you stuck-up moggie!\" Damian's voice cuts Greedy Bow off, as you see the borzoi charging his horse out of the nearby crowd.\n\n\tShocked, Greedy Bow steps back to the rope ladder. Sonya catches up to the clowder of ne'er-do-wells, but you're too far behind, and the pirates start to overwhelm her. Once you arrive, you get a brief look at Greedy Bow's face. Sonya shoves one of the pirates aside, but you see the paw of a second flashing toward her. In a moment, you see what's in his paw, but it's too late to warn her. Sand flies into your eyes and Sonya's.\n\t*set stg_badCat +1\n\t*goto pirates_escape\n*else\n\tBut not close enough.\"\n\n\tAs he talks, Sonya catches up to the clowder of ne'er-do-wells, but you're too far behind, and the pirates start to overwhelm her. You arrive just as Sonya shoves one of the pirates aside, and you see the paw of a second flashing toward her. In a moment, you see what's in his paw, but it's too late to warn her. Sand flies into your eyes and Sonya's.\n\t*goto pirates_escape\n\n*label damian_chase\n\nThe streets are full in the wake of the grim announcement. Carts pulled by dogs and cats roll through the streets, while people of all species wander around, talking, yelling, screaming, and running into each other. Like the square, the streets are quite clean, and once you even see a pooper scooper chase behind a horse to make sure their droppings aren't left too long on the cobblestones. Even in the aftermath of an assassination, the streets must stay clean.\n\nThe pirate cats quickly dive into the crowd, making it hard for you to move through the crowd astride your horses. You're still able to see them clearly, though. You're able to notice when one of them runs right next to a puppy carriage. He waits for a moment until you get closer, and then knocks the carriage over, scattering puppies right in front of your horses!\n\n*choice\n\t#I jump over the squirming children.\n\t\t\"Jump over them!\" you yell to Damian. He nods and encourages the horse to jump over the squirming pile of puppies, hot on the tail of the pirates.\n\n\t\t*set per_idealist %-10\n\t\t*set rep_dog %+10\n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tYou leap over them as well, keeping right behind Damian. Behind you, you can hear squeals of terror. It doesn't sound like anyone got hurt. Probably. You don't look back, keeping Damian in your sights as he chases the pirates.\n\t\t\t*set flg_cornerAmbrosia true\n\t\t\t*goto see_ambrosia\n\t\t*else\n\t\t\tYou prepare to leap over them as well, but you quickly realize you're not going to be able to make it. Instinctively, you grab hold of the reins and pull the horse to a stop. The parents of the puppies rush out into the street to collect their children. You move your horse carefully around the puppies before rushing after Damian and the pirates, who have a significant lead.\n\t\t\t*goto see_ambrosia\n\t#I convince the puppies to get out of the way. \n\t\t\"Get out of the way!\" you yell to the puppies. \"Look out for the horses!\"\n\n\t\t*set per_idealist %+10\n\t\t*set rep_dog %-10\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tSurprised by your voice, the puppies scamper back to the side of the street, just as your horse stomps down on the ground where they were standing. Glancing at the puppies to make sure they're okay, you keep ridding after Damian as he chases the pirates.\n\t\t\t*set flg_cornerAmbrosia true\n\t\t\t*goto see_ambrosia\n\t\t*else\n\t\t\tSurprised by your voice, most of the puppies stand still in shock and fear. Instinctively, you grab hold of the reins and pull the horse to a stop. The parents of the puppies rush out into the street to collect their children. You move your horse carefully around the puppies before rushing after Damian and the pirates, who have a significant lead.\n\t\t\t*goto see_ambrosia\n\t#I find a quick path around the mess without anyone noticing.\n\t\tSeeing you won't be able to get through the puppies, you cut to the right, looking for a way to get around the mess without losing too much ground and without the pirates noticing. Right next to the puppy spill, you notice the sidewalk seems to be clear, and maybe just wide enough for your horse. \n\t\t*set per_idealist %-10\n\t\t*set rep_dog %+10\n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\tYou kick your steed into motion, hooves just missing one of the puppies, as you squeeze between people on the sidewalk. Behind you, you can hear squeals of terror. It doesn't sound like anyone got hurt. Probably. You don't look back, keeping Damian in your sights as he chases the pirates.\n\t\t\t*set flg_cornerAmbrosia true\n\t\t\t*goto see_ambrosia\n\t\t*else\n\t\t\tYou kick your steed into motion, but the sound of hooves scares one of the puppies, who is standing between you and the sidewalk and won't get out of the way. Instinctively, you grab hold of the reins and pull the horse to a stop. The parents of the puppies rush out into the street to collect their children. You move your horse carefully around the puppies before rushing after Damian and the pirates, who have a significant lead.\n\t\t\t*goto see_ambrosia\n\t*selectable_if (flg_hasMagic) #I summon an illusion to scare the puppies away from my horse.\n\t\tThinking quickly, you cast a spell, a quick illusion to scare the puppies away from your horse. Within seconds, a large feline with black fur and glowing eyes stands in the road, growling fiercely at the puppies.\n\n\t\t*set per_idealist %+10\n\t\t*set rep_dog %-10\n\t\t*set att_clever %+05\n\t\t*if att_clever > 60\n\t\t\tTerrified, the puppies scamper back to the side of the street, just as your horse stomps down on the ground where they were standing. Glancing at the puppies to make sure they're okay, you keep running after Damian as he chases the pirates.\n\t\t\t*set flg_cornerAmbrosia true\n\t\t\t*goto see_ambrosia\n\t\t*else\n\t\t\tTerrified, most of the puppies stand still in shock and fear. Instinctively, you grab hold of the reins and pull the horse to a stop. The parents of the puppies rush out into the street to collect their children. You move your horse carefully around the puppies before rushing after Damian and the pirates, who have a significant lead.\n\t\t\t*goto see_ambrosia\n\n*label see_ambrosia\n*set flg_sawAmbrosia true\n\nThe pirates duck around people in the street as you get close to the docks and one ship in particular. You see the words [i]The Cat's Meow[/i] painted on the side, and more shabby-looking pirates working on the decks to get the ship ready to sail. \n\nAs you get close to the ship, the crowd parts for a moment, and you see a familiar bird with inky-black feathers. They are wearing a tan cloak that was once covered in small bones. The bird who created the bone bugs that killed Padraig. The pirate cats cluster around them, pulling out weapons, while one tugs on the tan cloak to convince the black bird to climb up the rope ladder and board the ship. Spotting you, the black bird screams and spreads their cloak wide.\n\n\"Fools!\" they yell over the crowd. \"You will never catch Ambrosia Five Sins, slayer of Corgis!\" \n\nDamian sits on his horse in shock, before his face twists into a determined snarl.\n\n*if (flg_cornerAmbrosia = true) and (flg_damianOnHisOwn = false) \n\t\"For Pugmire!\" Sonya's voice roars as the pyrenees charges through the crowd. Shocked, Ambrosia starts to mutter some kind of spell under their breath, but you and Damian manage to get your horses through to catch up to the clowder of ne'er-do-wells. You reach down, and for a brief moment you're able to put your ${plc_fur} paw on Ambrosia's cloak.\n\n\t\"Got you!\" you snarl.\n\n\tAmbrosia squawks in return, and you see their gnarled, clawlike paw flashing toward you. In a moment, you see what's in their paw, but it's too late. Sand flies into your eyes and Damian's.\n\t*set stg_padraig +2\n\t*goto pirates_escape\n*elseif (flg_cornerAmbrosia = true)\n\tAs they talk, you and Damian catch up to the clowder of ne'er-do-wells, and for a moment you get a good look at Ambrosia's face. Damian uses his horse to shove one of the pirates aside, but you see the paw of a second flashing toward him. In a moment, you see what's in their paw, but it's too late to warn him. Sand flies into your eyes and Damian's.\n\t*set stg_padraig +1\n\t*goto pirates_escape\n*elseif\t(flg_damianOnHisOwn = false)\n\t\"For Pugmire!\" Sonya's voice roars as the pyrenees charges through the crowd. Shocked, Ambrosia starts to mutter some kind of spell under their breath and steps back to the rope ladder. Damian gets through the crowd to catch up to the clowder of ne'er-do-wells, but you're too far behind, and the pirates start to overwhelm him. Once you arrive, you get a brief glimpse at Ambrosia in the crowd. Damian uses his horse to shove one of the pirates aside, but you see the paw of a second flashing toward him. In a moment, you see what's in their paw, but it's too late to warn him. Sand flies into your eyes and Damian's.\n\t*set stg_padraig +1\n\t*goto pirates_escape\n*else\n\tAs they talk, Damian catches up to the clowder of ne'er-do-well, but you're too far behind, and the pirates start to overwhelm him. You arrive just as Damian uses his horse to shove one of the pirates aside, and you see the paw of a second flashing toward him. In a moment, you see what's in their paw, but it's too late to warn him. Sand flies into your eyes and Damian's.\n\t*goto pirates_escape\n\n*label pirates_escape\n\nAs your eyes clear, you see a second figure join \n*if flg_sawAmbrosia = true\n\tAmbrosia. He has silky gray fur with gray eyes, and is dressed in a sturdy but well-cared-for coat with lots of gold braid. Ambrosia ruffles his feathers at the sight of the cat. \"Come, Captain Greedy Bow,\" Ambrosia croaks. \"Let these fools deal with the death of the Governor.\"\n\t*goto pirates_escape_2\n*elseif flg_sawGreedyBow = true\n\tGreedy Bow. They have inky-black feathers, and are wearing a tan cloak that was once covered in small bones. It's the bird who created the bone bugs that killed Padraig. \"Shake a leg, Ambrosia,\" Greedy Bow purrs. \"The news of the Governor's death should help our escape.\"\n\t*goto pirates_escape_2\n*else\n\t*bug (You should have seen one of the two pirate leaders!)\n\n*label pirates_escape_2\n\n*if (flg_sawGreedyBow = true) and (flg_cornerGreedyBow = false)\n\tBehind you, Damian rides up on his horse as you watch \n\t*goto pirates_escape_3\n*elseif (flg_sawAmbrosia = true) and (flg_cornerAmbrosia = false)\n\tBehind you, Sonya manages to finally push through the crowd as you watch \n\t*goto pirates_escape_3\n*else\n\tThe three of you watch \n\t*goto pirates_escape_3\n\n*label pirates_escape_3\nthe pirates climb on board their ship. You try to push through the crowd to follow them, but cats on board the ship start shooting arrows into the crowd. The crowd scatters in terror, and the three of you desperately try to avoid both the arrows and the stampede of scared citizens. Eventually you're able to duck behind a pile of wooden crates, but by the time you're able to get out of cover, all you can do is watch the ship sail away.\n\n*page_break\n\"Man damn it!\" Sonya barks, slamming her fist into an open paw. \"We were so close!\"\n\n\"I swear I'm going to rip those pirates limb from limb,\" Damian snarls.\n\n\"Excuse me,\" says a voice behind you.\n\nYou turn to see a hound standing there, looking a little concerned. He is the spitting image of the hound that ran the horse stable in Pugmire. \"We're in the middle of something,\" you say tersely.\n\n\"I appreciate that,\" the hound says, unfazed, \"but it seems you will likely be seeking a boat shortly.\"\n\nYou nod at this, wondering where this is going.\n\n\"Further,\" the hound continues, \"I suspect many local residents will want to be leaving quickly due to the loss of our beloved Governor until…ah, new leadership is forcefully asserted. As such, I was wondering if you were interested in selling your \n*if (flg_yourHorseGone = true) and (flg_sonyaHorseGone = true)\n\tsteed.\" He motions to the horse Damian is riding.\n\t*set oth_coins +1\n\t*goto sell_horses\n*elseif (flg_yourHorseGone = false) and (flg_sonyaHorseGone = false)\n\tsteeds.\" He motions to the horses you, Sonya, and Damian are riding.\n\t*set oth_coins +2\n\t*goto sell_horses\n*else\n\tsteeds.\" He motions to the @{flg_yourHorseGone horses|horses you} @{flg_sonyaHorseGone and|Sonya and} Damian are riding.\n\t*set oth_coins +1\n\t*goto sell_horses\n\n*label sell_horses\n\n\"You look familiar,\" Damian says, getting off his horse.\n\n\"I get that a lot,\" the hound says. \"My family runs horse stables all over the known realms.\"\n\nSonya shrugs. \"We might as well sell the beasts. Like the dog says, we need a ship.\"\n\nAs the hound gives you the money, you see a large, well-built parrot with vibrant red and violet plumage approach you. She dresses in a motley of bright colors, and has a patch of bald skin on her right forearm. \"Squawk! Seems like a bad trip. Looking for a ship?\"\n\nYou're starting to wonder if you hid in the middle of a merchant gathering spot.\n\n*page_break\n\"Who are you?\" you ask the parrot.\n\n\"Squawk! Pally's the name, and sailing's my—\"\n\n\"So help me,\" Damian says with a fierce glare, \"if you end up rhyming every other sentence, I will not be held accountable for my actions.\"\n\nPally visibly gulps. \"I was going to say 'business,' matey. Pally of the Seven Blazing Feathers. I'm the first mate of a ship in need of some dogs.\" She looks around. \"We might be able to help each other. Squawk!\"\n\n*choice\n\t#I grab her by the lapels and demand transport.\n\t\tYou grab her by the lapels. \"We need to follow those pirates. You better take us to your captain right now!\"\n\n\t\tPally struggles in your grip. \"Okay, okay! You just had to ask!\"\n\n\t\tYou let her go, and she straightens her clothing. \"Squawk! No need to be rude. Follow me.\"\n\t\t*set per_tame %-10\n\t\t*goto meet_stumpy\n\t#I ask politely if she's willing to help the noble cause of Pugmire.\n\t\tYou smile widely. \"You are most kind. We are on a mission, and anyone willing to help the noble cause of the Pugmire would be seen more favorably in the kingdom's eyes.\"\n\n\t\tPally laughs. \"Noble cause! Squawk! Sure, we'll be glad to help! Follow me.\"\n\t\t*set per_idealist %+10\n\t\t*goto meet_stumpy\n\t#I tease the offer of a reward in exchange for help.\n\t\tYou look around as well. \"Yes, we're in the market to hire a ship. And there might even be a reward in it for you and your captain.\"\n\n\t\tPally nods. \"Squawk! Good, good. Follow me.\"\n\t\t*set per_idealist %-10\n\t\t*goto meet_stumpy\n\n*label meet_stumpy\n\nYou follow Pally back into the crowd. People seem to be less anxious now there aren't pirates and horses running around the docks, but it still takes several wags before the four of you can push your way through to a shaded alley back from the rest of the busy dock. \n\nLeaning against a wall you see a brilliant green gecko missing most of his tail. He is wearing a long military-style coat with a tri-corner hat, and his large eyes swivel to and fro. He sees Pally and smiles, looking visibly relieved.\n\n\"Dog friends,\" Pally says, \"meet Stumpy Sabu, captain of [i]The Pig's Tale[/i].\"\n\nStumpy shakes each of your paws as you introduce yourselves. \"Nice to meet you,\" he says. \"Did Pally tell you we're looking for some dogs?\"\n\n\"I did,\" Pally said. \"Although—\"\n\n\"Good, good,\" Stumpy interrupts. \"The three of you are clearly new in town, so I don't know if you've heard about the murder of the Governor, Dobi Weimaraner.\"\n\n*fake_choice\n\t#\"We heard it on the way in.\"\n\t\t\"We heard it on the way in,\" you say. \"The turtle crier mentioned an assassin.\"\n\n\t#\"The news seemed to start all this chaos.\"\n\t\t\"The news seemed to start all this chaos,\" you say. \"Nervous about the rumored assassin, I suppose.\"\n\n\t#\"I picked up something about an assassin?\"\n\t\t\"I picked up something about an assassin?\" you say. \"Seemed like a lot of people were concerned about it.\"\n\n\"Squawk! Assassin!\" Pally bursts out with the word, and then suddenly looks sheepish. \"Sorry. Sometimes words just come out of me. Can't help it.\"\n\nStumpy politely ignores Pally. \"Yes, it seems Governor Weimaraner was killed. Which is bad for everyone.\"\n\n\"How so?\" you ask.\n\nPally waves a wing in frustration. \"She's the voice of Waterdog Port to both Pugmire and the Monarchies of Mau, and acts as the point of contact with all local shipping business. Further, the Council of Luminaries has ten seats plus the Governor, and the Governor breaks ties and makes decisions when the others can't come to an agreement.\"\n\n\"Which is often,\" Stumpy adds.\n\n\"And once a Governor is elected, it's a lifetime appointment. Her Brilliance Dobi Weimaraner had been in the seat for years, but no one was expecting her to retire anytime soon.\"\n\nStumpy nods. \"And she hadn't been popular recently, because she made some declarations that ran counter to what some of the Luminaries agreed to.\"\n\nPally shrugs. \"My plastic's on Erwin Sharpei as the new Governor,\" she says.\n\nStumpy waves a paw. \"But none of that matters. We don't know who the assassin is, and the council are all scrambling to find out who did it and why.\"\n\n\"We're working for Zanna of the Four Audacities,\" Pally says proudly.\n\n\"One of the parrot Luminaries on the council,\" Stumpy adds. \"She heard a rumor a dog helped the assassin get close to the Governor, and asked us to look into it. We've since heard the dog is sitting right now in a place called [i]The Salty Dog[/i].\"\n\n\"Squawk! What we can't do,\" Pally interjects, \"is go in and ask about it.\"\n\n\"It's for dogs only,\" Stumpy concludes. \"And that's where you come in. You find the name of the cur that murdered our Governor, and we'll take you anywhere you want to go, free of charge.\"\n\n*choice\n\t#\"Free, huh? Seems suspicious.\"\n\t\t\"Free, huh?\" you say. \"Seems suspicious. What do you get out of it?\"\n\n\t\tStumpy spreads his webbed paws wide. \"Honestly, we'll have a powerful political figure in this town owing us a big favor. That's worth a lot to us. Certainly worth going on another adventure.\"\n\t\t*set per_idealist %-10\n\t\t*goto the_salty_dog\n\t#\"We'll be glad to help the local government.\"\n\t\t\"We'll be glad to help the local government,\" you say. \"I'm sure Luminary Zanna will be most appreciative.\"\n\n\t\t\"Oh absolutely,\" Stumpy says agreeably. \"We'll have a powerful political figure owing us a big favor, and you'll get a free ride to your next adventure.\"\n\t\t*set per_tame %+10\n\t\t*goto the_salty_dog\n\t#\"Good thing you just asked the best dogs in the entire port.\"\n\t\t\"Good thing you just asked the best dogs in the entire port,\" you say confidently. \"We'll make sure nothing goes wrong.\"\n\n\t\t\"Great to hear,\" Stumpy says, amused by your braggadocio. \"Zanna will be happy, we'll be owed a big favor, and you'll get a free ride to your next adventure.\"\n\t\t*set per_ego %+10\n\t\t*goto the_salty_dog\n\n*label the_salty_dog\n\n\"Adventure!\" Pally interjects. \"Squawk!\"\n\n\"Where's this den of dog iniquity?\" Sonya asks.\n\nStumpy turns his eyes down the alleyway. \"Other end of this alley. Just look for the sign of a dog with an eyepatch.\" He turns to look back at all of you. \"Pally and I will head to the docks to get the ship ready.\"\n\n\"Won't you have to tell Zanna the information?\" Damian asks. He crosses his arms and looks suspiciously at the two sailors.\n\n\"I'll have one of my crew stay here and inform Zanna after we push off,\" Stumpy says confidently.\n\n\"Besides,\" Pally says, \"it's always good to get out of town when there's a political standoff. We'll be back by the time the dust clears. Squawk!\"\n\nThe three of you head down the alleyway, and you can hear Stumpy behind you. \"Pally, you should really have that cough looked at.\"\n\n*page_break\n[i]The Salty Dog[/i] is about what you expected. The sign of a bernard with an eyepatch hangs over a small building with boarded-up windows. Standing just outside the door, y
