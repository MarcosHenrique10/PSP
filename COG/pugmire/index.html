behind the gesture. \"Enough with the waving, dog,\" he finally grumbles. \n\t\t*set per_idealist %+15\n\t#I cautiously approach him. He might be an enemy.\n\t\tYou carefully walk toward the cat. He nods and adjusts his cloak around himself. \"Finally, a dog with a modicum of caution,\" he mutters. \n\t\t*set per_idealist %-15\n\nYou notice he has a thick accent, from somewhere in the Monarchies of Mau. Meeting a cat with a Mau accent secretly in a graveyard could be interpreted as suspicious by some dogs, so you decide to get right to the point. \"You want to speak with me?\"\n\nThe cat smooths the fur of his face and bows deeply, spreading his cloak wide. \"I am Diplomat Illiad von Korat, representing House Korat and the entirety of the Monarchies of Mau in the court of King Puckington Pug von Pugmire. And I am at your service.\" He stands back up and stares at you. \"Or perhaps, you can be at mine.\"\n\n*fake_choice\n\t#\"How may I serve the Monarchies?\"\n\t\t\"How may I serve the Monarchies?\" you ask.\n\n\t\tIlliad smiles. \"You're quick to help my people. I like that in a dog.\"\n\t\t*set per_tame %+15\n\t\t*set rep_cat %+10\n\t\t*set rep_dog %-10\n\t#\"Why would I want to work with a damp cat?\"\n\t\t\"Why would I want to work with a damp cat?\" you ask.\n\n\t\tIlliad frowns. \"Do not be too quick to judge me, dog.\"\n\t\t*set per_tame %-15\n\t\t*set rep_cat %-10\n\t\t*set rep_dog %+10\n\t#\"My duty is to the kingdom of Pugmire.\"\n\t\t\"My duty is to the kingdom of Pugmire,\" you say.\n\n\t\tIlliad waves your concern off. \"I don't need mindless patriotism before you have even heard my offer, dog.\"\n\t\t*set per_loyal %+15\n\t\t*set rep_cat %-10\n\t\t*set rep_dog %+10\n\nYou look down at Illiad. \"My name is $!{plc_fname}, not 'dog.'\" \n\nIgnoring you, the cat pulls the hood of his cloak over his head, shivering in the cold, but his eyes glint in determination. \"As I said, I represent, among other things, certain factions within my house. The monarchy of Korat is known for their valor in battle.\" He motions to himself with a sarcastic smirk. \"I am not typical of my house.\"\n\n\"It certainly seems like a family of warriors wouldn't have much use for diplomats,\" you say carefully.\n\nIlliad hisses slightly. \"Only fools believe that, but my house has no lack of them. They warn me of my so-called 'eternal, pointless intrigues.' But just because I value words does not mean I do not fight in my own way.\" He spreads his paws wide. \"I am creating a compendium of sorts, compiling all knowledge I have at my paws about dangerous creatures in the world. And as a Pioneer, you are in a position to gain personal knowledge of them.\"\n\n*fake_choice\n\t#\"Don't you have cats in the Monarchies that can handle such tasks?\"\n\t\t\"Don't you have cats in the Monarchies that can handle such tasks?\" you ask.\n\n\t\t\"Of course we have our own trailblazers that handle dangerous situations on behalf of the collective monarchies. But I seek a more…personal collection of information.\" \n\t#\"Why do you want to keep this information to yourself?\"\n\t\t\"Why do you want to keep this information to yourself?\" you ask.\n\n\t\t\"Cats value secrets. Diplomats like myself value them even more than most. Of course, should the need arise, I would gladly share the information I have, but until then, there is little point in giving away something so valuable.\" \n\t#\"What do you mean by 'dangerous'?\"\n\t\t\"What do you mean by 'dangerous'?\" you ask.\n\n\t\t\"While I respect your devotion to clarity, this isn't a complicated situation. If it has the potential to kill you, I think anyone would consider that dangerous, yes?\" \n\nIlliad shakes his cloak, shedding more water from it. \"Ugh. It seems like Pugmire is eternally raining. Perhaps it's a punishment from Man because dogs do not respect them as our rightful servants.\" Before you can respond, he puts his paws up. \"Apologies. The sour mood of the day has made my tongue too free.\"\n\n*if (plc_calling = \"Shepherd\")\n\tYou can't ignore this insult. \"The Church of Man teaches that [i]dogs[/i] are Man's best friends. Your heretical statements—\"\n\n\tIlliad puts a paw up. \"Please, I am not here to debate theology with you. Accept my apology if it will make this conversation go faster.\"\n\n\tYou sigh. \"So you desire knowledge to defeat your enemies?\" you ask.\n\t*goto after_insult\n*else\n\tYou decide to ignore the insult to the Church of Man. \"So you want to know how to kill your enemies?\"\n\t*goto after_insult\n\n*label after_insult\n\n\"My brethren would say simply sticking a sword in anything will eventually kill all our foes.\" He chuckles. \"No, what I seek is more esoteric knowledge: what doesn't work, or what non-violent solutions have the potential to succeed. That is rarer, and therefore much more valuable. Besides, having an ally such as myself can prove beneficial to you in future.\" He offers his paw. \"Do we have an accord?\"\n\n*page_break Consider the Offer\nYou consider the offer. While it's been generations since Pugmire and the Monarchies of Mau were openly at war with each other, the two nations have had political tension for as long as you've known. True, King Puckington has been making an effort to draft a peaceful trade agreement with the cats of Mau, in order to put the stigma of the war behind everyone—negotiations Illiad was likely involved in as a diplomat. But cats are prone to keeping secrets, as Illiad points out. Further, many cats insist the Old Ones, humanity, were not gods that looked over dogs. Instead, they claim Man worshiped [i]cats[/i], and a few even suggest dogs should probably worship cats as well. \n\nSo while there are efforts at peace between cats and dogs, odds are it won't happen soon. But the puppies and kittens of both nations grew up in this more inclusive environment. Maybe they'll be able to put ancient animosities aside.\n\n*fake_choice\n\t#I shake his paw. \"Whatever I learn, I'll give to you.\"\n\t\t\"Whatever I learn, I'll give to you,\" you say.\n\n\t\tHe smiles—a genuine smile, for once. \"You surprise me, dog…I mean, $!{plc_fname}. Perhaps you will be the one who proves dogs and cats can live together.\"\n\t\t*set rep_cat %+10\n\t\t*set rep_dog %-10\n\t\t*set flg_agreedGiveLoreToIlliad true\n\t#I ignore his paw. \"I am devoted to the Pioneers, not your house.\"\n\t\t\"I am devoted to the Pioneers, not your house,\" you say.\n\n\t\tHe frowns, and lets his paw drop. \"I suppose it was too much to assume a dog is capable of seeing the bigger picture. Perhaps you will change your mind in the future.\"\n\t\t*set rep_cat %-10\n\t\t*set rep_dog %+10\n\t#I reluctantly shake his paw. \"We'll see.\"\n\t\t\"We'll see,\" you say.\n\n\t\tHe frowns, but shakes back. \"I suppose that's the best I can hope for from a dog.\"\n\t\t*set rep_cat %-10\n\t\t*set rep_dog %+10\n\nThe rain slows down as Illiad turns and walks away. When you got up this morning, your only plan was to go to the funeral of a friend and mentor, maybe have a bowl of warm mulled cider, and share stories with your comrades until it was far too late or far too early. Instead you're wet, cold, and you need to prepare for a mission, all while trapped within several political webs.\n\nAs you turn to head back to the walls of Pugmire, a stray sunbeam breaks through the gray clouds. Maybe you can still get that warm bowl before the day ends.\n\n*page_break\n[i]Next morning.[/i]\n\nYou wake up to the sounds of pounding at your front door. Blinking the sunlight from your eyes, you roll out of bed, tossing the linen covers to the side. With bleary eyes, you stumble to the heavy wooden door and open it to find Sonya and Damian, wearing armor and weapons. Sonya looks annoyed, while Damian seems amused. \"Hey boss,\" Damian says. \"Comb your fur and grab your gear. It's time to get to work.\"\n\n*fake_choice\n\t#\"What time is it?\"\n\t\t\"What time is it?\" you ask.\n\n\t\tSonya crosses her arms. \"It's morning, and that's sufficient. I'm surprised to see a Pioneer sleeping in so late.\"\n\n\t\tDamian shrugs. \"$!{plc_fname} here just had a few too many bowls of mulled cider.\" He holds his paws in front of him and licks the air, as if drinking from an imaginary bowl.\n\n\t#\"How much did I drink?\"\n\t\t\"How much did I drink?\" you ask.\n\n\t\tDamian laughs. \"A lot. The pub owner had to get more cider barrels all the way from Houndton just to keep up with a pack of thirsty Pioneers!\"\n\n\t\tSonya crosses her arms. \"While I'm not against a bowl here and there, you knew we had a mission. Such carousing is irresponsible.\"\n\n\t#\"Give me another hour to sleep.\"\n\t\t\"Give me another hour to sleep,\" you say.\n\n\t\tSonya crosses her arms. \"I'm sorry, but no. We have a lot to do today, and best to start as early as possible.\"\n\n\t\tDamian shrugs. \"Me, I'm usually going to bed around this time, but I figure you Pioneers are more 'dawn to dusk' types.\"\n\nYou close the door, and quickly get dressed. Grabbing your rucksack of gear, you head out, locking the door behind you. \"Where are we going?\" you ask.\n\nDamian points to Sonya. \"The puppy and I were just discussing that, boss.\"\n\nSonya growls low. \"I think 'arguing' is a more appropriate word.\"\n\n\"Skritches, scratches, it's all the same.\"\n\nSonya ignores the gibe and turns to you. \"I have been suggesting to this [i]cur[/i] we head to the Plastic Quarter to ask about the pearls. If someone has been trying to buy or sell them, the merchants of the souq may have heard something.\"\n\n\"And while I agree with the general idea,\" Damian counters, \"the application's all wrong. The pearls aren't just some bauble fresh off the boat from Waterdog Port. If someone wants to offload them, they'll be doing it away from the noses of so-called 'honest' merchants. I say we should head to the Cat Quarter and ask around there.\"\n\n\"Those scoundrels won't tell us the color of grass, and even if they did, they'd say it was blue.\"\n\nDamian pokes Sonya in the chestplate. \"Hey, you know your people, and I know mine. I can get them to talk to me as long as you let me spend the coin and you keep your muzzle shut.\"\n\n*page_break Review the Options\nYou mull over your knowledge of Pugmire.\n\nSonya has a good point. The [b]Plastic Quarter[/b] is the colloquial name of the southern portion of Pugmire, officially called Southgate. Many traders and merchants from Waterdog Port and the neighboring kingdom of Houndton come up the road to the southern gate of Pugmire in order to buy or sell wares. A lot of plastic coins change paws there, which is how the Plastic Quarter got its nickname. If you want to ask anyone about buying or selling, that's the place to go.\n\nHowever, Damian also has a valid idea. The [b]Cat Quarter[/b], the less savory name for the Riverwall district, is where shipments from the river come to Pugmire. Nearly a century ago, the stench from the river (before the acid was filtered from it) meant only people unable to live in other parts of the kingdom settled there—the poor, the desperate, and many of the cat and rodent citizens of Pugmire. While the stench and overall grime has disappeared, the unsavory reputation of the quarter remains. It's the best place in Pugmire to conduct illicit business, but they aren't going to be receptive to agents of the Crown like you and Sonya asking questions.\n\nNeither Sonya nor Damian seems willing to budge on their opinions. Which area do you want to go to?\n\n*choice\n\t#The Plastic Quarter, because I'm more interested in travelers from far away.\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*set flg_fromPlasticQuarter true\n\t\t*set per_idealist %+15\n\t\t*gosub sonya_pleased\n\t\t*goto plastic_quarter\n\t#The Plastic Quarter, because I think it's safer.\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*set flg_fromPlasticQuarter true\n\t\t*set per_tame %+15\n\t\t*gosub sonya_pleased\n\t\t*goto plastic_quarter\n\t#The Cat Quarter, because the cats might know something.\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*set per_idealist %-15\n\t\t*gosub damian_pleased\n\t\t*goto cat_quarter\n\t#The Cat Quarter, because it's riskier, and that's exciting.\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*set per_tame %-15\n\t\t*gosub damian_pleased\n\t\t*goto cat_quarter\n\n*label sonya_pleased\n\"The Plastic Quarter,\" you say.\n\n\"A sensible choice,\" Sonya says, pleased. Damian rolls his eyes behind her back. \n*return\n\n*label damian_pleased\n\"The Cat Quarter,\" you say.\n\n\"Good call, boss,\" Damian says, clapping you on the back. Sonya simply sighs in irritation. \n*return\n\n*label cat_quarter\n\nThe choice made, the three of you head east to Riverwall.\n\nRamshackle buildings lean against each other, like drunks working together to walk in a straight line. Most of the homes and shops are still closed, but a few windows show signs of activity. This early in the morning, the Cat Quarter doesn't have much traffic, but the area is aptly named—many of the pawful of people you see on the streets are cats, although some are dogs, as well as mice and rats. Several are sleeping rough, huddled under threadbare blankets or tattered coats as they curl up in alleyways.\n\nAs you ponder the plight of Pugmire's homeless, you notice a kitten yanking on the end of your shirt. Her clothes are dirty, shredded rags, all turned shades of gray from the dirt and wear. She looks like she hasn't eaten in days, and her fur is patchy. \"Please, kind dog. A little plastic to help a starving kitten.\"\n\nSonya's eyes widen. \"How…how can kittens be forced to live like this?\"\n\nDamian seems impervious to the kitten's plight. \"Everyone's got a sob story up here. Shoo, kid. We need to meet with Mister Meow.\"\n\nThe small kitten winces from Damian's harsh words, and Sonya takes a deep breath, ready to start yelling at someone again.\n\n*choice\n\t*selectable_if (oth_coins > 0) #I give the kitten a coin.\n\t\tYou reach into your pouch and pull out a plastic coin, giving it to the kitten. Damian, outraged, tries to grab the coin. \"What are you doing, boss? You flash that kind of plastic around here, and everyone will want a piece!\"\n\n\t\tSonya puts a heavy paw on Damian's shoulder. \"Surely helping the poor citizens of Pugmire is a good use of our resources?\"\n\n\t\t\"Your resources, sure. But half of those resources are mine!\"\n\n\t\tIgnoring the squabble, you put the coin into the kitten's paws. She looks up at you in awe. \"Thank you!\" she says, as a smile of pure joy lights her face. \"But I'll work for my coin, I promise. I'll tell you how to get to Mister Meow's.\"\n\n\t\tDamian sighs and shakes his head. \"Ah well. The benefits of charity and all that.\"\n\n\t\t*page_break\n\t\tAs the morning sun creeps up in the sky, the streets start to come alive. Dockworkers stretch and begin unloading a ship in the port. A rat with a loud bell wanders the streets, announcing the time and the latest news from the castle. Puppies and kittens squeal and play as their parents lean out of house windows and yell at them to have breakfast first.\n\n\t\tThe kitten points you to a side street, away from the susurrus. \"Go down that street until it ends. After that, take a left and then a right.\" She then scurries off, taking her treasure with her. \n\t\t*set oth_coins -1\n\t\t*set rel_sonya %+10\n\t\t*set rep_cat %+10\n\t\t*set per_idealist %+15\n\t\t*goto mister_meow\n\t#I quietly offer some of my rations to the kitten.\n\t\t\"I can't give you any money,\" you say carefully. \n\n\t\tSonya starts to object. \"Surely—\"\n\n\t\t\"We need it for the quest,\" Damian counters. \"And for me.\"\n\n\t\tIgnoring them, you look at the starving kitten and pull some dried jerky from your pouch, putting it in the kitten's paws. \"But I can offer you some of my food.\"\n\n\t\tThe kitten smiles and carefully puts the food in her mouth. She chews slowly, as if unsure, and then more intensely. \"Phang oo!\" she says around a mouthful of food, as she scampers off.\n\n\t\tSonya frowns. \"I wish we could have done something more.\" Damian just looks away.\n\n\t\t*set per_ego %-15\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*page_break\n\t\t*goto asking_around\n\t#I encourage her to join the Pioneers, and put in a good word.\n\t\tYou put a ${plc_fur}-colored paw on the kitten's shoulder. \"If you join the Royal Pioneers, they'll give you food, a place to sleep, and training.\"\n\n\t\tDamian snorts. \"Yeah, like the stuck-up nobledogs want to see a skinny cat running around the world acting in Pugmire's name?\"\n\n\t\t\"Why not?\" Sonya asks. \"The Pioneers say anyone can join, regardless of their background. As long as they pledge their loyalty to the kingdom, what does it matter if it's a dog, a cat, or even a badger?\"\n\n\t\tYou point west, toward the center of the kingdom. \"Go to the castle, and ask for Fiona Corgi. Say $!{plc_fullname} sent you.\"\n\n\t\tThe kitten nods, and walks off.\n\n\t\t\"You'll never see that kitten again,\" Damian says. He tries to sound tough, but you can hear the sadness in his voice.\n\n\t\t*set flg_sentKittenToFiona true\n\t\t*set per_loyal %+15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*page_break\n\t\t*goto asking_around\n\t#I ignore the kitten. It's probably a scam anyway.\n\t\t\"I agree with Damian. I'm not going to be taken for a ride.\"\n\n\t\tSonya looks at you, aghast. \"You're not serious.\"\n\n\t\tYou motion to the kitten. \"Shoo. Shake down some other sucker for your coin.\"\n\n\t\tThe kitten shrugs. \"Had to try,\" she mutters. She tries to sound tough, but you can hear the sadness in her voice as she wanders off.\n\n\t\tDamian claps you on the back. \"See? You're figuring this place out already.\" But he doesn't seem to believe his own bravado.\n\n\t\t*set per_idealist %-15\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*page_break\n\t\t*goto asking_around\n\n*label asking_around\n\nAs the morning sun creeps up in the sky, the streets start to come alive. Dockworkers stretch and begin unloading a ship in the port, as the sailors disembark. A rat with a loud bell wanders the streets, announcing the time and the latest news from the castle. Puppies and kittens squeal and play as their parents lean out of house windows and yell at them to have breakfast first.\n\n\"We're looking for Mister Meow,\" Damian says, as he shields his eyes with his paw. \"He runs a grooming shop around here somewhere.\"\n\n\"So let's go,\" Sonya says, pacing back and forth behind Damian.\n\n\"It's been a while since I've been there,\" he says, dropping his paw. \"I think we'll have to ask for directions.\"\n\nLooking around, you decide to approach… \n\n*fake_choice\n\t#…a dockworker.\n\t\tYou walk up to one of the dockworkers, a rough-looking dog with gray around her muzzle and a scar across her snout. \"Excuse me,\" you say. \"Where is Mister Meow?\"\n\n\t\tThe dog puts a paw to her ear. \"Eh? You're looking for a way out? Just walk back down that street.\"\n\n\t\t\"No,\" you say, raising your voice. \"[i]Mister Meow.[/i]\"\n\n\t\tShe shrugs. \"Ain't no cows around here. Look, I have to get back to work.\"\n\n\t\tDamian's shoulders shake as he tries to contain his laughter. \n\n\t\tBehind him, you hear the rat with the bell swing it hard. [i]Clang![/i] \"Come visit Mister Meow's for the best grooming you'll ever have!\"\n\t#…a puppy playing.\n\t\tYou crouch down next to a small puppy, playing an elaborate game with chalk and rocks.\n\n\t\t\"What are you playing?\" you ask.\n\n\t\t\"It's a game I made up!\" the puppy said brightly. \"You pretend to be humans in ancient times, but instead of being all dead and powerful, they're alive and making houses or doing jobs and stuff.\"\n\n\t\t\"That sounds like fun! Tell me, does a smart puppy like you know where I can find Mister Meow?\"\n\n\t\tThe puppy suddenly drops the chalk and rocks, and runs into his house.\n\n\t\tSonya looks concerned. \"That's not the reaction I would expect when asking about a groomer.\" \n\n\t\tBehind her, you hear the rat with the bell swing it hard. [i]Clang![/i] \"Come visit Mister Meow's for the best grooming you'll ever have!\"\n\t#…the rat with the bell.\n\t\tYou hear the rat with the bell swing it hard. [i]Clang![/i] \"Come visit Mister Meow's for the best grooming you'll ever have!\"\n\t#…one of the residents.\n\t\tWalking up to one of the houses, you knock on the door. A fluffy cat in a robe opens the door as they back a pipe. \"Whaddaya want?\" they ask, groggily.\n\n\t\t\"I was wondering if you knew where to find Mister Meow?\"\n\n\t\tThe cat scoffs. \"Do I [i]look[/i] like a cat tha' needs a groomer? Get outta here!\" They slam the door in your face.\n\n\t\tDamian smiles. \"That went well, I thought,\" he says brightly.\n\n\t\tBehind him, you hear the rat with the bell swing it hard. [i]Clang![/i] \"Come visit Mister Meow's for the best grooming you'll ever have!\"\n\nYou approach the rat, who is swinging his bell and shouting the news. [i]Clang![/i] \"Legendary Pioneer's funeral last night!\"\n\n\"Excuse me,\" you say. \"Can you tell me where…\"\n\n[i]Clang![/i] \"Corgi family distraught over loss!\"\n\nYou speak up. \"I said, can you tell me where to find…\"\n\n[i]Clang![/i] \"Sister Fiona Corgi gives stirring eulogy!\"\n\nYou try yelling. \"[i]I need to know where to find Mister Meow![/i]\"\n\nThe rat stops ringing the bell. \"No need to yell, mate. It's right over there. Take the first left and then first right.\" He points down a side street.\n\n\"Thank you for your help.\"\n\n[i]Clang![/i] \"New visitors to Riverwall easily lost!\"\n\nSonya puts her paws over her ears. \"I'm going to do something awful to that bell.\" Damian agrees, and the three of you walk towards the shop.\n\n*page_break\n*label mister_meow\n\nFollowing the directions you were given, you quickly find yourselves in a maze of cramped side streets. The buildings loom over you, almost blotting out the sky as they lean against each other while you zig and zag across narrow cobblestones. But soon you notice a sign with a pair of scissors and the face of a friendly cat. \"That's the place,\" Damian says. \"Mister Meow's.\"\n\n\"Why are we going to a groomer's anyway?\" Sonya mutters. \"We don't have time for a trim.\"\n\nDamian puts a paw over his eyes and shakes his head. \"You don't get it, do you, puppy?\"\n\nYou put a paw on Sonya's shoulder before the growl escapes her throat. \"Why don't you just tell us what's going on, Damian?\"\n\nThe ratter claps his paws together, ready for a lecture. \"Mister Meow is a 'reputable' groomer. If you get my drift.\" \n\n*if plc_calling = \"Ratter\"\n\tYou nod. \"Right. He's 'reputable.'\"\n\n\tSonya looks between the two of you. \"What are you two talking about?\"\n\n\t\"He has a good reputation,\" you explain.\n\n\tSonya rolls her eyes. \"I know what 'reputable' means, but you two are clearly using it in a different way.\"\n\n\t\"I mean, he has an [i]unusually[/i] good reputation.\"\n\t*achieve reputable\n\t*goto mister_meow2\n*else\n\t\"So he's a good groomer?\" you say.\n\n\t\"No, I mean he has an [i]unusually[/i] good reputation,\" Damian explains.\n\t*goto mister_meow2\n\n*label mister_meow2\n\nSonya slowly nods. \"Ah. You mean, it's a cover for something else.\"\n\nDamian smiles. \"Hey, you're not so dumb after all.\" He looks back at the sign. \"Mister Meow knows a lot about the seedier things happening inside the kingdom. If the pearls are being moved anywhere in Pugmire, he'll know about it.\"\n\n\"So now we're dealing with criminals,\" Sonya sighs. \"I've known you less than a day, and already I deeply regret it.\"\n\nSuddenly, you think of Ambassador Illiad. He also has a lot going on under the surface.\n\n*page_break\nDamian shrugs and knocks on the door. But his knock is unusual: five rapid knocks, then a pause, then two normal knocks: [i]Tap, tap-tap-tap, tap. Knock knock.[/i] After a moment, the door opens, and the cat pictured on the sign stands on the other side. Mr. Meow is a rotund cat, wearing a green vest and a red fez. \"Good morning!\" he says in a thick Mau accent that sounds exaggerated. \"It is a bit early, but never too early for customers. Come in, come in!\"\n\nThe three of you step inside. The shop looks to be a perfectly normal groomer's: there are chairs for the clients to sit in, scissors and razors for trimming and shaving fur, and a variety of mirrors for dogs and cats to admire their trims in. \"Apologies, but I haven't had a chance to clean up,\" Mr. Meow says, motioning to the immaculate room.\n\n*choice\n\t#\"It's easy to clean if you never use it,\" I say, suspicious.\n\t\t\"It's easy to clean if you never use it,\" you say.\n\n\t\tMr. Meow chuckles, but his body posture stiffens at the insult. \"Ah, you jest, but everyone knows Mister Meow's is the finest grooming shop in all of Pugmire! Just ask one of my many noble clients!\"\n\n\t\tSonya mutters in your ear. \"Ease up, $!{plc_fname}. We need him to answer our questions.\"\n\t\t*set per_idealist %-15\n\t\t*goto mister_meow_question\n\t#\"I bet you never get guests like us,\" I say, bragging.\n\t\t\"I bet you never get guests like us,\" you say.\n\n\t\tMr. Meow chuckles. \"Unless you are the King of Pugmire in a very clever disguise, I suspect my establishment has seen quite the high society crowd in its own humble way.\"\n\n\t\tSonya mutters in your ear. \"We don't have time for posturing, $!{plc_fname}. We just need some questions answered.\"\n\t\t*set per_ego %+15\n\t\t*goto mister_meow_question\n\t#\"We're just grateful for your time,\" I say, humbly.\n\t\t\"We're just grateful for your time,\" you say.\n\n\t\tMr. Meow chuckles. \"No no, it is my honor to serve all good dogs who are honest and true, no matter what time of the morning it may be.\" You hear Mr. Meow inject a little sarcasm into his response.\n\n\t\tSonya mutters in your ear. \"Hurry it up, $!{plc_fname}. We need him to answer our questions so we can get out of here.\"\n\t\t*set per_ego %-15\n\t\t*goto mister_meow_question\n\n*label mister_meow_question\n\nDamian plops into one of the chairs and examines his claws. \"We've heard a couple of black, high-quality pearls are making the rounds around here. Rumor is you're the cat who can help us find them.\"\n\nMr. Meow sighs. \"I am sorry, my friends, but I am just a humble groomer with an honest trade. I know nothing of fine things like pearls.\"\n\nThe borzoi pulls out his dagger, and starts cleaning his claws with it. \"Come on, Meow. We're not here to yank your tail. You have information, and we have resources. I'm sure we can make a trade.\"\n\nThe cat eyes the dagger nervously, and suddenly drops his accent. \"Okay, I may have heard something. The Corgi Pearls, right?\"\n\nDamian puts the dagger away and nods. Mr. Meow looks at him for a moment, and then says, carefully, \"You mentioned a trade?\"\n\n*choice\n\t#I threaten him with violence. I'm a strong dog.\n\t\t*set per_tame %-15\n\t\t*set stg_fetch +1\n\t\t*if plc_calling = \"Guardian\"\n\t\t\tBecause of your guardian training, you're used to using your strength to your advantage. Even in cases like this. \n\t\t\t*set att_mighty %+05\n\t\t\t*goto meow_threats_win\n\t\t*else\n\t\t\t*set att_mighty %+05\n\t\t\t*if att_mighty > 55\n\t\t\t\t*goto meow_threats_win\n\t\t\t*else\n\t\t\t\t*goto meow_threats_lose\n\t#I offer a book I have as a clever trade.\n\t\t*set per_tame %+15\n\t\t*set stg_fetch +1\n\t\t*if plc_calling = \"Artisan\"\n\t\t\tFrom your artisan training, you've accumulated a large number of strange and unusual tomes. \n\t\t\t*set att_clever %+05\n\t\t\t*goto meow_book_win\n\t\t*else\n\t\t\t*set att_clever %+05\n\t\t\t*if att_clever > 55\n\t\t\t\t*goto meow_book_win\n\t\t\t*else\n\t\t\t\t*goto meow_book_lose\n\t#I make a friendly offer to bless his business.\n\t\t*set per_tame %+15\n\t\t*set stg_fetch +1\n\t\t*if plc_calling = \"Shepherd\"\n\t\t\tFrom your Shepherd training, you've learned a wide variety of blessings to use in various situations. \n\t\t\t*set att_friendly %+05\n\t\t\t*goto meow_bless_win\n\t\t*else\n\t\t\t*set att_friendly %+05\n\t\t\t*if att_friendly > 55\n\t\t\t\t*goto meow_bless_win\n\t\t\t*else\n\t\t\t\t*goto meow_bless_lose\n\t#I buy the information.\n\t\t*set per_idealist %-15\n\t\t*set stg_fetch +1\n\t\t*set rep_cat %+10\n\t\t*set oth_coins -1\n\t\tYou pull a plastic coin out and show it to Mr. Meow. Smiling, he takes the coin from your paw and swiftly puts it into a pocket in his vest. \"Thank you,\" he says with a smile. \"I do know something of what you seek. \n\t\t*goto more_information\n\n*label meow_threats_win\n*set rep_cat %-10\nYou flex your muscles and look Mr. Meow straight in the eye. \"Give us the information, and we won't hurt you.\"\n\nHe looks back, but you can see a bit of a tremble in his whiskers. \"I don't…\"\n\nYou put a paw into your fist, and loudly crack your knuckles.\n\nMr. Meow puts his paws up. \"Okay, okay! I'll talk! There are some pirates in town, up from Waterdog Port. They were asking around about some black pearls. It wasn't that long ago, so they might still be moored in the docks.\"\n\n\"Which ship?\" Damian asks.\n\n\"I overheard someone call it the [i]Ruffled Fur[/i]. And that's all I know! Now please, leave my shop.\"\n\n\"Thank you for your time!\" Damian says cheerily, and opens the door to leave. The two of your follow, and head to the docks.\n*page_break\n*goto cat_pirates\n\n*label meow_threats_lose\n*set oth_coins -1\n*set rep_cat %-10\nMr. Meow seems like a cat used to intimidation. You flex your muscles and look him straight in the eye. \"Give us the information, and we won't hurt you.\"\n\nHe looks back, unimpressed with your threats. \"Please. I am an occasional broker of unusual information, and this is not the first time I have been threatened. Coins will loosen my tongue faster than muscles.\" He puts his paw out.\n\nDamian shrugs. \"Pay the cat, boss,\" he says. Grudgingly, you pull a plastic coin out and put it in Mr. Meow's paw.\n\n\"Thank you,\" he says with a smile. \"I do know something of what you seek. \n*goto more_information\n\n*label meow_book_win\n*set rep_cat %+10\nYou remember your copy of [i]Pan's Guide for New Pioneers[/i] stuffed in your rucksack. Pulling it out, you offer it to Mr. Meow. \"Inside are a large number of tales about the world beyond. You might find some that amuse your customers.\"\n\nMr. Meow looks at the book with wide eyes. \"This is a fascinating treasure. Thank you.\" He takes the book and bows, setting it on a nearby table. \"I have heard something. \n*goto more_information\n\n*label meow_book_lose\n*set oth_coins -1\n*set rep_cat %-10\nYou remember your copy of [i]Pan's Guide for New Pioneers[/i] stuffed in your rucksack. Pulling it out, you offer it to Mr. Meow. \"Inside are a large number of tales about the world beyond. You might find some that amuse your customers.\"\n\nMr. Meow waves the book away. \"My clients rarely come to my shop for books. Coins will loosen my tongue faster than paper.\" He puts his paw out.\n\nDamian shrugs. \"Pay the cat, boss,\" he says. Grudgingly, you pull a plastic coin out and put it in Mr. Meow's paw.\n\n\"Thank you,\" he says with a smile. \"I do know something of what you seek. \n*goto more_information\n\n*label meow_bless_win\n*set rep_cat %+10\n*set rep_dog %+10\n\"I would be happy to offer the blessing of Man to your business,\" you say, clasping your paws together in a gesture of peace.\n\nMr. Meow quickly swipes his fez from his head, trying to be respectful. \"I would be honored to have the Old Ones watch over my humble shop,\" he says. You mutter a short prayer, and Meow closes his eyes, his ears twitching as he listens intently. Finally, he puts his hat back on. \"Thank you. You are too kind. I have heard something. \n*goto more_information\n\n*label meow_bless_lose\n*set oth_coins -1\n*set rep_cat %-10\n*set rep_dog %+10\n\"I would be happy to offer the blessing of Man to your business,\" you say, clasping your paws together in a gesture of peace.\n\nMr. Meow shrugs at your offer. \"I respect your faith, dogs of Pugmire, but my customers are not generally devout. Coins will loosen my tongue faster than religion.\" He puts his paw out.\n\nDamian shrugs. \"Pay the cat, boss,\" he says. Grudgingly, you pull a plastic coin out and put it in Mr. Meow's paw.\n\n\"Thank you,\" he says with a smile. \"I do know something of what you seek. \n*goto more_information\n\n*label more_information\nThere are some pirates in town, up from Waterdog Port. They were asking around about some black pearls. It wasn't that long ago, so they might still be moored in the docks.\"\n\n\"Which ship?\" Damian asks.\n\n\"I overheard someone say it was the [i]Ruffled Fur[/i].\" He suddenly shakes Damian's paw. \"I appreciate your business. If you are interested, I have other information for sale.\" He puts a finger up. \"One coin for a single piece of information, no more, and then some tea.\"\n\nSonya looks to the door. \"We should catch those pirates while we can.\"\n\nDamian puts a paw up. \"Hold on, hold on. What do you know, Meow?\"\n\nMr. Meow puts his thumbs into the lapels of his vest. \"I have heard something about the captain of the [i]Ruffled Fur[/i]. I also know of the unfortunate death of Padraig von Corgi, as well as the horrible monstrosities that attacked him.\" He looks back and forth between you and Damian. \"So? Would you like to purchase any of my fine wares?\"\n\n*choice\n\t*selectable_if (oth_coins > 0) #I buy the information on the pirate captain.\n\t\tYou put a coin in Meow's paw, which he tucks into a pocket. \"I hear these pirates are part of a larger crew. Their captain has a captain above them, as it were.\" He puts a finger to his lips before adding. \"And that captain is one of the most notorious pirates of the Acid Sea. Be careful, my friends.\"\n\t\t*set oth_coins -1\n\t\t*set stg_badCat +1\n\t\t*goto meow_leave\n\t*selectable_if (oth_coins > 0) #I buy the information on Padraig's murder.\n\t\tYou put a coin in Meow's paw, which he tucks into a pocket. \"I hear he was sadly murdered specifically to gain access to his pearls. It is a shame such a respected warrior was murdered for such base reasons, but I report only what I have heard, my friends.\"\n\t\t*set oth_coins -1\n\t\t*set stg_padraig +1\n\t\t*goto meow_leave\n\t*selectable_if (oth_coins > 0) #I buy the information on the bone bugs.\n\t\tYou put a coin in Meow's paw, which is tucks into a pocket. \"I hear these 'bone bugs' are horrifying, built from the bones of animals and even other people. I have also heard, however, the magics of the monarchies I used to call home may be effective against them.\" You wonder if Illiad would find that information useful.\n\t\t*set oth_coins -1\n\t\t*set stg_lore +1\n\t\t*goto meow_leave\n\t#I pass on the offer.\n\t\t\"Not today, thank you,\" you say.\n\n\t\tMr. Meow gives an exaggerated sigh. \"Ah well. A humble business owner must always try.\"\n\t\t*goto meow_leave\n\n*label meow_leave\n\nThe cat claps his paws together. \"And now, a cup of catnip tea to conclude our business arrangement!\"\n\nSonya shakes her head. \"Unfortunately, we need to go before those pirates leave port.\"\n\nDamian slides out of the chair. \"And if you ever need someone to sniff something out for you who knows this area, just let me know.\"\n\n\"Of course, of course. Until then, I must return to getting my shop ready.\" He politely ushers you out into the street.\n*page_break\n*goto cat_pirates\n\n*label plastic_quarter\n\nThe choice made, the three of you head south to Southgate.\n\nWhile the Plastic Quarter isn't [i]entirely[/i] comprised of merchants, it's easy to think so. The souq is the largest market in the kingdom, containing everything from sturdy stalls that have been around for generations all the way to a rug rolled out on the wide cobblestone streets with wares attractively displayed. The other buildings around look clean and squat, presenting attractive fronts for business or pleasure in order to ease the movement of plastic from paw to coffer. It's still early in the morning, but the souq of the Plastic Quarter is already buzzing with merchants setting up their respective businesses. \n\nAs you look over the various stalls, deciding which of them deal with jewelry, you notice a young cat trying to steal an apple from an elderly dog vendor.\n\n*choice\n\t#I shout at the cat, alerting the vendor to the theft.\n\t\t\"Hey!\" you shout. Several dogs in the area turn to look as you point at the cat thief. \"Put that apple back!\"\n\n\t\tThe cat, startled, drops the apple and runs. Sonya immediately chases after him, barking orders to stop.\n\n\t\tThe elderly vendor rushes over to you, spry despite her gray fur. \"Oh thank you!\" she says, pressing a plastic coin into your paw. \"It's always nice to meet an honest soul in Southgate.\"\n\n\t\tDamian rolls his eyes. \"Yeah, I'm sure missing one apple from your cart would completely upset your profit margin.\"\n\n\t\tThe vendor huffs and goes back to her apple cart, as Sonya returns. She holds the cat by the scruff, who is wiggling and hissing. \"Here's the thief, $!{plc_fname},\" she says, pleased with herself.\n\t\t*set oth_coins +1\n\t\t*set per_ego %+15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*set rep_cat %-10\n\t\t*goto confront_cat\n\t#I turn away, letting the cat go on their business. \n\t\t\"Hey, is that a jewelry stand?\" you say, pointing away from the apple cart. Sonya turns to look, but Damian notices the thief. You look at him for a moment, but he winks and pretends to look the way you pointed.\n\n\t\tBehind you, you hear the elderly merchant yell, \"Stop, thief!\" Several dogs in the area turn to look, as the cat drops the apple and runs. Sonya immediate chases after him, barking orders to stop.\n\n\t\tDamian shrugs. \"No bad deed goes unpunished, I always say.\"\n\n\t\tYou stare at him a moment. \"Don't you mean 'no [i]good[/i] deed'?\"\n\n\t\t\"You think stealing is a good deed?\" He smiles. \"I could get to like you, boss.\"\n\n\t\tSonya returns, holding the cat by the scruff, who is wiggling and hissing. \"Here's that thief you didn't notice, $!{plc_fname},\" she says, looking annoyed.\n\t\t*set per_idealist %-15\n\t\t*set rel_damian %+10\n\t\t*set rel_sonya %-10\n\t\t*set rep_cat %+10\n\t\t*set rep_cat %+10\n\t\t*goto confront_cat\n\t*selectable_if (oth_coins > 0) #I offer to pay for the apple.\n\t\tYou pull a plastic coin from your pouch. \"I want to buy an apple for my friend there,\" you say, slipping it into the merchant's paw before she sees the cat. The cat, meanwhile, stares at you for a wag or two. Then, catching on, he casually mutters \"Thanks,\" and bites into the apple.\n\n\t\tThe merchant, confused by the exchange, starts to protest, but then shrugs and puts the coin in her pocket. \"It's five for a coin,\" she says, and Damian quickly grabs four more before you can say anything.\n\n\t\t\"That was a very nice thing to do, $!{plc_fname},\" Sonya says. \"I'm sure that cat appreciated it.\"\n\n\t\tDamian takes a large bite out of one of his apples, and quickly spits it out. \"Ugh. Not for these worm-eaten things. You got ripped off, boss.\"\n\n\t\tYou are about to retort when you see the cat waving at you from behind another stall. The three of your stroll over. Getting a good look at the cat, you see he's younger than you originally thought—tall and lanky for his age. His clothes are torn to rags, colored in shades of gray from wear and dirt. \"Thanks for the apple back there,\" he says. \"I haven't had a good meal in a couple of days. Let me help you out in some way.\"\n\n\t\t\"We're looking for a jeweler, preferably one who deals with exotic and expensive wares,\" Sonya says, watching him carefully.\n\n\t\t\"You want Fido Mutt,\" the cat says immediately. \"Follow this path until you run into the [i]Thirsty Mongrel[/i], then take a right and a quick left. The stall has a sign of a one-eyed dog holding a ring.\"\n\n\t\tYou thank them, and Damian throws his half-eaten apple to the cat. \"Here, kid. Maybe you can choke this down.\" You hear crunching sounds behind you as you head off.\n\t\t*page_break\n\t\t*set oth_coins -1\n\t\t*set per_idealist %+15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*set rep_cat %+10\n\t\t*goto fido_mutt\n\n*label confront_cat\n\nThe cat dusts himself off with exaggerated effort. \"Thanks for nothing, dogs,\" he mutters. \"That apple was going to be my first good meal in a couple of days.\"\n\n\"We're looking for—\" you start to say, but the cat cuts you off. \"Why should I help you?\"\n\nGetting a good look at the cat, you see he's younger than you originally thought—tall and lanky for his age. His clothes are torn to rags, colored in shades of gray from wear and dirt. \"How old are you?\" you ask.\n\n\"Old enough to know when I'm being shaken down by a few Pioneers. Go on. I don't have anything to take, so just kick the scat out of me or whatever so I can get back to what I'm doing.\"\n\n*choice\n\t*selectable_if (oth_coins > 0) #I give the kitten a coin.\n\t\tYou reach into your pouch, and pull out a plastic coin, giving it to the kitten. Damian, outraged, tries to grab the coin. \"What are you doing, boss? You're just going to give plastic away to any sob story?\"\n\n\t\tSonya puts a heavy paw on Damian's shoulder. \"Surely helping the poor citizens of Pugmire is a good use of our resources.\"\n\n\t\t\"Your resources, sure. But half of those resources are mine!\"\n\n\t\tIgnoring the squabble, you put the coin into the kitten's paws. He looks up at you in awe. \"Thank you!\" he says, looking pleased and relieved. \"But I'll work for my coin, I promise. Tell me what you want to know.\"\n\n\t\t\"We're looking for a jeweler, preferably one who deals with exotic and expensive wares,\" Sonya says, watching him carefully.\n\n\t\t\"You want Fido Mutt,\" the cat says immediately. \"Follow this path until you run into the [i]Thirsty Mongrel[/i], then take a right and a quick left. The stall has a sign of a one-eyed dog holding a ring.\"\n\n\t\tDamian shrugs. \"Ah well. The benefits of charity, I guess.\" You thank the kitten and head off.\n\t\t*page_break\n\t\t*set oth_coins -1\n\t\t*set rel_sonya %+10\n\t\t*set rep_cat %+10\n\t\t*set per_idealist %+15\n\t\t*goto fido_mutt\n\t#I offer some of my rations to the kitten.\n\t\tYou look at the starving kitten and pull some dried jerky from your pouch, putting it in the kitten's paws. \"Here's some food to make up for that lost meal.\"\n\n\t\tThe kitten smiles and carefully puts the food in his mouth. He chews slowly, as if unsure, and then more intensely. \"Thank you!\" he says, looking pleased and relieved. \"But I'll work for my meal, I promise. Tell me what you want to know.\"\n\n\t\t\"We're looking for a jeweler, preferably one who deals with exotic and expensive wares,\" Sonya says, watching him carefully.\n\n\t\t\"You want Fido Mutt,\" the cat says immediately. \"Follow this path until you run into the [i]Thirsty Mongrel[/i], then take a right and a quick left. The stall has a sign of a one-eyed dog holding a ring.\"\n\n\t\tDamian smiles. \"See? And it didn't cost us a coin.\"\n\n\t\tSonya crosses her arms, looking upset. \"I wish there was more we could do,\" she mutters.\n\n\t\tYou thank the kitten and head off.\n\t\t*page_break\n\t\t*set per_ego %-15\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*goto fido_mutt\n\t#I suggest he join the Pioneers, and put in a good word for him.\n\t\tYou put a paw on the kitten's shoulder. \"If you join the Royal Pioneers, they'll give you food, a place to sleep, and training.\"\n\n\t\tDamian snorts. \"Yeah, like the stuck-up nobledogs want to see a skinny cat running around the world acting in Pugmire's name?\"\n\n\t\t\"Why not?\" Sonya asks. \"The Pioneers say anyone can join, regardless of their background. As long as they pledge their loyalty to the kingdom, what does it matter if it's a dog, a cat, or even a badger?\"\n\n\t\tYou point north, toward the center of the kingdom. \"Go to the castle, and ask for Fiona Corgi. Say $!{plc_fullname} sent you.\"\n\n\t\t\"Sure, whatever,\" he says, trying to look tough, but you can tell he's secretly pleased. \"Tell me what you want to know.\"\n\n\t\t\"We're looking for a jeweler, preferably one who deals with exotic and expensive wares,\" Sonya says, watching him carefully.\n\n\t\t\"You want Fido Mutt,\" the cat says immediately. \"Follow this path until you run into the [i]Thirsty Mongrel[/i], then take a right and a quick left. The stall has a sign of a one-eyed dog holding a ring.\" He thanks you and scampers off.\n\n\t\t\"You'll never see that kitten again,\" Damian says. He tries to sound tough, but you can hear the sadness in his voice.\n\t\t*page_break\n\t\t*set flg_sentKittenToFiona true\n\t\t*set per_loyal %+15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*goto fido_mutt\n\n*label fido_mutt\nFollowing the directions you were given, you soon find the stall in question. A faded, chipped sign, featuring a dog with an eyepatch holding a jeweled ring, creaks in the slight breeze. Underneath the sign, you watch a short, wiry dog putting all manner of blazing gems on display. The dog has soft gray fur, and both their eyes are a piercing green color. Behind them sits a tall terrier of the Staffordshire family, who looks at the three of your suspiciously. Her brindle fur raises slightly as you approach. Neither dog wears an eyepatch.\n\nYou step up to the window. \"Excuse me, which of you is you Fido Mutt?\" you ask, looking between the two dogs.\n\nThe short dog glances up. \"I'm Fido. Sorry, we're not open yet, but if you come back in a while, I'll be able to sell you a wide variety of high quality jewelry.\"\n\nSonya steps up behind you. \"We're not here for your wares. We're here for information.\"\n\nThe terrier steps out of the stall and leans against the side, casually stroking the sword strapped to her side. \"Fido said they ain't open, so they ain't open. Come back later.\"\n\n*choice\n\t#I step up to the big dog. I'm not scared of her.\n\t\tYou step closer to the big dog. \"We'll talk now,\" you say, locking eyes with her.\n\n\t\t\"Step. Back.\" She starts to pull her sword.\n\t\t*set per_tame %-15\n\t\t*goto talk_down\n\t#I put my paws up. I don't want trouble.\n\t\tYou put your paws up in a gesture of goodwill. \"We just want to talk,\" you say, trying to look inoffensive.\n\n\t\t\"Talk later,\" she says.\n\t\t*set per_tame %+15\n\t\t*goto talk_down\n\t#I step behind Sonya and Damian. They can handle this.\n\t\tYou take a step back behind your companions. They both look at you, and you shrug. \"You talk to her,\" you say, motioning to the big dog.\n\n\t\t\"Answer's the same,\" the big dog says.\n\t\t*set per_loyal %-15\n\t\t*goto talk_down\n\n*label talk_down\n\nFido puts their paw on hers. \"Now now, Rock. No reason to be rude. Why don't you watch over the stall while I take these fine dogs to the [i]Thirsty Mongrel[/i] to discuss some business?\"\n\n\"But—\"\n\nFido takes a heavy pouch from under the counter, and looks up into Rock's eyes. \"No 'buts,' Rock. I won't be a moment.\" They hold the pouch in their paw a moment, as if weighing it, and then tie it to their belt. \"You want anything while I'm there?\"\n\nRock looks daggers at you, but then sighs, defeated. \"Bowl of cool water would be nice,\" she says finally.\n\n\"Bowl of water for the lady. Won't be a wag.\" Fido turns and smiles at the three of you. \"Shall we go?\" they say, amiably.\n\nAs you turn to go, you hear Damian whispering to Sonya. \"I didn't think Man [i]made[/i] dogs that big.\"\n\nSonya shrugs and mutters back. \"I could take her.\"\n\nFido, either not hearing or choosing to ignore the two whispering dogs, leads the way to the tavern you passed.\n\n*page_break\nThe atmosphere in the [i]Thirsty Mongrel[/i] is quiet. The well-lit main room contains a variety of dogs (as well as a few cats) sitting with bowls in front of them. They discuss business deals, laugh at inside jokes, or quietly drink to themselves. Fido seems to know the bartender, a tall poodle with perfect white fur, and the two of them chat for a moment before Fido brings over a tray with five bowls of water. The dog sets the tray down before taking their seat.\n\n\"There, four waters and one for Rock. Now, what did you want to know about?\"\n\nBefore you can say anything, Damian blurts out, \"Why the eyepatch on the sign? Neither you nor Rock is missing an eye, and it's been bugging me for wags now.\"\n\nFido laughs. \"Came with the stall. I inherited it from my mother, who got it from her father. He lost an eye in the War of Dogs and Cats, you know.\"\n\nSonya laps a little of the water. \"I didn't know Mutts served in the war.\"\n\n\"Officially, we didn't. But there were always some of the working dogs who turned a blind eye—no pun intended—to let any patriotic dog do their duty. Grandpop was a loyalist to the Crown.\" Fido shrugs. \"I'm sure you didn't want to talk about my family history, though.\" They take the pouch from their belt, and carefully pull open the ties. Tipping the pouch onto the table, you watch as plastic coins, gems, and rings of gold and silver pour out.\n\n\"I suspect,\" Fido says with a smile, \"I'll have more to tell if you'd be willing to buy something from me.\"\n\n*choice\n\t*selectable_if (oth_coins > 0) #I pick a ring and buy it.\n\t\tYou pull a plastic coin out, set it on the table, and grab a ring at random. \"Good choice. That's a nice one,\" they say, sweeping the coin from the table along with the rest of the contents into the pouch. Glancing at the ring, you immediately see that it's junk, just something to smooth the flow of information. \n\n\t\t\"Now, what was your question?\" they ask.\n\t\t*achieve buyring\n\t\t*set per_idealist %-15\n\t\t*set stg_fetch +1\n\t\t*set oth_coins -1\n\t\t*goto fido_information\n\t#I threaten them, since Rock isn't around. I'm a strong dog.\n\t\t*set per_tame %-15\n\t\t*set stg_fetch +1\n\t\t*if plc_calling = \"Guardian\"\n\t\t\tAs part of your guardian training, you're used to using your strength to your advantage. Even in cases like this. \n\t\t\t*set att_mighty %+05\n\t\t\t*goto fido_threats_win\n\t\t*else\n\t\t\t*set att_mighty %+05\n\t\t\t*if att_mighty > 55\n\t\t\t\t*goto fido_threats_win\n\t\t\t*else\n\t\t\t\t*goto fido_threats_lose\n\t#I offer advice on protecting their stall from sneaky thieves.\n\t\t*set per_tame %+15\n\t\t*set stg_fetch +1\n\t\t*if plc_calling = \"Ratter\"\n\t\t\tAs part of your ratter training, you've learned a lot about how to prevent places from being broken into. \n\t\t\t*set att_clever %+05\n\t\t\t*goto fido_sneak_win\n\t\t*else\n\t\t\t*set att_clever %+05\n\t\t\t*if att_clever > 55\n\t\t\t\t*goto fido_sneak_win\n\t\t\t*else\n\t\t\t\t*goto fido_sneak_lose\n\t#I make a friendly offer to bless their water.\n\t\t*set per_tame %+15\n\t\t*set stg_fetch +1\n\t\t*if plc_calling = \"Shepherd\"\n\t\t\tFrom your Shepherd training, you've learned a wide variety of blessings to use in various situations. \n\t\t\t*set att_friendly %+05\n\t\t\t*goto fido_bless_win\n\t\t*else\n\t\t\t*set att_friendly %+05\n\t\t\t*if att_friendly > 55\n\t\t\t\t*goto fido_bless_win\n\t\t\t*else\n\t\t\t\t*goto fido_bless_lose\n\n*label fido_threats_win\n*set rep_dog %-10\nYou reach out and shove all the jewelry and plastic back at Fido. \"I'll make you eat all that if you don't tell us what we want to know.\"\n\nFido looks nervously at the three of you, and quickly shoves everything back into their pouch. \"Okay, okay. Should have known better than to do this without Rock. Just don't hurt me. What do you want to know?\"\n\n\"We're looking for some black pearls,\" Sonya says, after finishing off her water. \"Have you seen any?\"\n\n\"Not really,\" Fido says, putting the pouch back on their belt. \"There were a couple of pirates asking if I was willing to buy some really good pearls, but when I asked if they were stolen goods, they backed out. It wasn't that long ago, so they might still be moored in the docks.\"\n\n\"Which ship?\" Damian asks.\n\n\"I overheard someone say it was the [i]Ruffled Fur[/i]. Now if we're through, I have a stall to open.\"\n\nDamian noisily drinks the water in his bowl. \"Thanks for the drinks!\" he says loudly, as Fido scampers out the door. You finish your drink, and the three of you head to the docks in the Cat Quarter.\n*page_break\n*goto cat_pirates\n\n*label fido_threats_lose\n*set oth_coins -1\n*set rep_dog %-10\nYou reach out and shove all the jewelry and plastic back at Fido. \"I'll make you eat all that if you don't tell us what we want to know.\"\n\nFido laughs at your threats. \"Come on. There's a dozen folks in here that will report you to the police dogs, and if I let out so much as a squeak, Rock would be in here faster than you could say 'shish kabob.'\"\n\nSonya tilts her head. \"Why would I want to say—\"\n\n\"So let's get real,\" Fido continues, setting a silver ring on the table near you. \"Here's a nice ring. Buy it, and we can do some real business.\"\n\nDamian drinks noisily from his dish. \"I say pay the dog, boss.\"\n\nReluctantly, you set a coin on the table, and pick up the silver ring. \"Good choice,\" they say, taking the coin from the table and sweeping them up along with the rest of the contents into the pouch. \"Now, what was your question?\"\n*achieve buyring\n*goto fido_information\n\n*label fido_sneak_win\n*set rep_dog %+10\n\"I notice your stall only has one guard,\" you mention. \"And you have a lot of valuable items there.\"\n\nFido nods, but looks worried. \"That's true,\" they say, carefully.\n\n\"Once I'm done with this mission, I can help make your stall more secure. Make sure no dog can take any of your wares, even if Rock is passed out drunk somewhere.\"\n\n\"Oh, that seems unlikely, since Rock only drinks water,\" Fido says, but the worried look persists. \"Still, I have been getting better wares recently, and I could use some more security.\"\n\n\"Trust me,\" Damian says, drinking noisily from his bowl. \"I could steal everything you have in half a wag, easy.\"\n\n\"That's not very reassuring,\" Fido says, quickly shoving everything back into the pouch. \"But I take your point. It's a deal. What was your question?\"\n*goto fido_information\n\n*label fido_sneak_lose\n*set oth_coins -1\n*set rep_dog %-10\n\"I notice your stall only has one guard,\" you mention. \"And you have a lot of valuable items there.\"\n\nFido smiles. \"That's true,\" they say, amused.\n\n\"Once I'm done with this mission, I can help make your stall more secure. Make sure no dog can take any of your wares, even if Rock is passed out drunk somewhere.\"\n\n\"Oh, that seems unlikely, since Rock only drinks water,\" Fido says. \"I respect the scam, but cut the scat. I have a fearsome guard, and I've made friends with all the merchants near me. It's not like I'm selling my wares in the middle of the Cat Quarter, you know.\"\n\nSonya tilts her head. \"What's wrong with—\"\n\n\"So let's get real,\" Fido continues, setting a silver ring on the table near you. \"Here's a nice ring. Buy it, and we can do some real business.\"\n\nDamian drinks noisily from his dish. \"I say pay the dog, boss.\"\n\nReluctantly, you set a coin on the table, and pick up the silver ring. \"Good choice,\" they say, sweeping the coin from the table along with the rest of the contents into the pouch. \"Now, what was your question?\"\n*achieve buyring\n*goto fido_information\n\n*label fido_bless_win\n*set rep_dog %+10\n\"I would be happy to bless your water,\" you say, clasping your paws together in a gesture of prayer.\n\nFido looks skeptical. \"Why…why would you do that?\"\n\n\"If you drink the water,\" you continue, \"Man will watch over your wares, and make sure you earn enough money today to make you happy and healthy.\"\n\n\"And your breath will smell better,\" Damian adds, drinking noisily from his bowl.\n\nThe little dog nods. \"I would be honored to have the Old Ones watch over my wares,\" they say. You mutter a short prayer, and Fido closes their eyes. Once you're finished, Fido opens their eyes and smiles. \"Thank you. You are too kind. Now, what was your question?\"\n*goto fido_information\n\n*label fido_bless_lose\n*set oth_coins -1\n*set rep_dog %-10\n\"I would be happy to bless your water,\" you say, clasping your paws together in a gesture of prayer. \"If you drink the water,\" you continue, \"Man will watch over your wares, and make sure you earn enough money today to make you happy and healthy.\"\n\nFido seems unimpressed with your offer. \"I think you got this place confused with the Religious Quarter. Coins spend better than prayers.\"\n\n\"Be careful what you say, blasphemer,\" Sonya mutters.\n\n\"So let's get real,\" Fido continues, setting a silver ring on the table near you. \"Here's a nice ring. Buy it, and we can do some real business.\"\n\nDamian drinks noisily from his dish. \"I say pay the dog, boss.\"\n\nReluctantly, you set a coin on the table, and pick up the silver ring. \"Good choice,\" they say, sweepping the coin from the table along with the rest of the contents into the pouch. \"Now, what was your question?\"\n\n*achieve buyring\n*label fido_information\n\n\"We're looking for some black pearls,\" Sonya says, after finishing her water. \"Have you see any?\"\n\n\"Not really,\" Fido says, putting the pouch back on their belt. \"There were a couple of pirates asking if I was willing to buy some really good pearls, but when I asked if they were stolen goods, they backed out. It wasn't that long ago, so they might still be moored in the docks.\"\n\n\"Which ship?\" Damian asks.\n\n\"I overheard someone say it was the [i]Ruffled Fur[/i].\"\n\n\"Thanks,\" you say, finishing your water.\n\n\"Hey hey, no need to rush,\" Fido says, putting a paw on yours. \"I have to get back to my stall, but I might have more for you. I heard something else about the pirates. Plus, I've heard a thing or two about the awful murder of Padraig Corgi, another Pioneer like yourselves, by those vicious bone bugs.\" They take another sip from their water. \"Maybe you're willing to pay for one more question?\"\n\n*choice\n\t*selectable_if (oth_coins > 0) #I buy the information on the pirate captain.\n\t\tYou put a coin on the table, which Fido slides into their pouch. \"I hear these pirates are part of a larger crew. Their captain has a captain above them, as it were.\" They cock their head to the side for a moment before adding. \"And that captain is one of the most notorious pirates of the Acid Sea. So if you go after him, be careful.\"\n\t\t*set oth_coins -1\n\t\t*set stg_badCat +1\n\t\t*goto fido_leave\n\t*selectable_if (oth_coins > 0) #I buy the information on Padraig's murder.\n\t\tYou put a coin on the table, which Fido slides into their pouch. \"I hear he was murdered for his pearls—maybe the same ones you're looking for. It is a shame such a respected warrior was murdered for such a trivial reason. I hope Man watches over his family.\"\n\t\t*set oth_coins -1\n\t\t*set stg_padraig +1\n\t\t*goto fido_leave\n\t*selectable_if (oth_coins > 0) #I buy the information on the bone bugs.\n\t\tYou put a coin on the table, which Fido slides into their pouch. \"I hear these 'bone bugs' are horrifying, built from the bones of animals and even other people. I have also heard, however, some kind of cat magic may be effective against them.\" You wonder if Illiad would find that information useful.\n\t\t*set oth_coins -1\n\t\t*set stg_lore +1\n\t\t*goto fido_leave\n\t#I pass on the offer.\n\t\t\"No thanks,\" you say. \n\n\t\tThe small dog nods, and takes another ship of their water. \"Very well.\" \n\t\t*goto fido_leave\n\n*label fido_leave\n\nYour business concluded, Fido stands up from the table. \"I need to take this other bowl back to Rock before it gets warm and she gets worried.\"\n\nSonya stands up. \"And we need to go before those pirates leave port.\"\n\nDamian loudly drains the rest of his water. \"If you ever want to buy me a drink again, Fido, just let me know.\"\n\nFido laughs. \"Sounds good. And if you find someone who is in need of good jewelry, just point them my way!\" They take the remaining bowl off the tray and leave. \n\nYou finish your drink, and the three of you head to the docks in the Cat Quarter.\n\n*page_break\n*goto cat_pirates\n\n*label cat_pirates\n*if (flg_fromPlasticQuarter)\n\tThe docks are in the Riverwall district, more commonly called the \"Cat Quarter.\" It's aptly named—many of the pawful of people you see on the streets are cats, although some are dogs, as well as mice and rats. Several are sleeping rough, huddled under threadbare blankets or tattered coats as they curl up in alleyways.\n\nAs the morning passes, a pawful of ships are sitting in the docks. Most of them are tall, with lots of sails and masts. Dockworkers dressed in rough-spun clothing and wearing leather gloves swarm over these ships, moving crates of spices, fabric, and other trade goods to or from the nearby dock. Nearby, rowdy dog and cat sailors laugh loudly and drink deeply, enjoying their time on shore. You note how the camaraderie of the sea seems to erase the boundaries between cat and dog.\n\nAside the large trade ships, a few smaller vessels don't show much activity. One of those looks like a small jong, with the words \"Ruffled Fur\" clearly visible along the side. \"There she is, boss,\" Damian says, pointing the ship out. \"Looks like a few cats are milling about on the main deck.\"\n\nYou put your paw to your eyes to block out the rising sun, and sure enough you see four rough-and-ready cats prowling the deck. They all have heavy cutlasses at their side, and look like they're ready for a fight.\n\n\"We should capture one and interrogate them,\" Sonya says, slapping a fist into her paw.\n\n\"Or we can sneak on board and see what we can see,\" Damian counters. \"Lots of options. Point is, though, we're not getting anything until we clear those cats out.\"\n\nAs you consider your options, you notice four cats on the deck are looking at you, and one is pointing. \n\n\"There goes the element of surprise,\" Sonya says. \"Good.\"\n\n*choice\n\t#I stoically stare the pirates down to intimidate them.\n\t\t*set per_tame %-10\n\t\t*if plc_calling = \"Stray\"\n\t\t\tAs a stray, you've learned a lot about outlasting people. \n\t\t\t*set att_solid %+05\n\t\t\t*goto staredown_win\n\t\t*else\n\t\t\t*set att_solid %+05\n\t\t\t*if att_solid > 55\n\t\t\t\t*goto staredown_win\n\t\t\t*else\n\t\t\t\t*goto staredown_lose\n\t#I sneak on board and attack from the shadows.\n\t\t*set per_tame %-10\n\t\t*if plc_calling = \"Ratter\"\n\t\t\t*set att_sneaky %+05\n\t\t\t*goto sneak_ratter_win\n\t\t*else\n\t\t\t*set att_sneaky %+05\n\t\t\t*if att_sneaky > 55\n\t\t\t\t*goto sneak_other_win\n\t\t\t*else\n\t\t\t\t*goto sneak_lose\n\t#I agilely pick them off with well-placed arrows.\n\t\t*set per_tame %-10\n\t\t*if plc_calling = \"Hunter\"\n\t\t\tAs a hunter, you've learned the best way to hobble someone with an arrow. \n\t\t\t*set att_agile %+05\n\t\t\t*goto arrow_win\n\t\t*else\n\t\t\t*set att_agile %+05\n\t\t\t*if att_agile > 55\n\t\t\t\t*goto arrow_win\n\t\t\t*else\n\t\t\t\t*goto arrow_lose\n\t*selectable_if (flg_hasMagic) #I cast an illusion to scare them off.\n\t\t*set att_clever %+05\n\t\t*set per_tame %+10\n\t\t*goto magic_win\n\n*label staredown_win\n\"I'll stare them down,\" you say.\n\nDamian laughs. \"Yeah, that's a great…Wait, you're going to do [i]what[/i]?\" He scrambles to race after you and Sonya, who have walked up to the boat. You put your paws on your hips and stare at the sailors.\n\n\"Hey, what are you doing here?\" one of the cats calls down from the boat.\n\nYou stare at them.\n\n\"Get lost!\" another one calls out.\n\nYou stare at them.\n\n\"Uh…don't make us get…uh, rough with you,\" the first one says, uncertainly.\n\nYou stare at them.\n\n\"Let's get away from this creepy dog!\" the second one says. Both rush off the deck and dive into the water. [i]Splash![/i]\n\nYou've learned cats can sometimes be goaded into leaving you alone if you simply stare at them long enough. However, that doesn't stop two more cats from climbing over the edge of the ship and come down to you, cutlasses at the ready.\n\n*page_break\n*set stg_lore +1\n*set stg_badCat +1\n*set flg_pirateFightAdvantage true\n*goto pirate_fight\n\n*label staredown_lose\n\"I'll stare them down,\" you say.\n\nDamian laughs. \"Yeah, that's a great…Wait, you're going to do [i]what[/i]?\" He scrambles to race after you and Sonya, who have walked up to the boat. \n\nYou put your paws on your hips and stare at the sailors, but they simply jeer at you. After a few moments of attempting to scare them into compliance, the four cats climb over the edge of the ship and come down to you, cutlasses at the ready.\n\n*if stg_badCat > 0\n\t*set stg_badCat -1\n*goto pirate_fight\n\n*label sneak_ratter_win\nAs a ratter, you've learned a lot about infiltrating places. \"Leave it to me,\" you say, and before Sonya or Damian can say anything, you've run silently up to the boat and climbed over the side.\n\nNear the edge of the deck, you see the four cats talking among themselves.\n\n\"Where did that other dog go?\" one asks.\n\n\"I swear ${plc_he} @{plc_nonBinary were|was} there a minute ago,\" says another.\n\n\"Who cares?\" a third one says. \"Grab your cutlasses and let's get those other two!\"\n\n\"Yeah!\" the fourth one says. Two of them grab their heavy swords and climb down the side of the ship. As the other two prepare to follow, you sneak up behind them and tap one on the shoulder. \"Excuse me,\" you say, \"but I wanted to give you something first.\"\n\nThe two turn around in astonishment, as you knock their heads together. Within moments, you roll them off the opposite side of the ship. [i]Splash![/i] You hasten to make your way back down and rejoin your friends.\n*page_break\n*set stg_protect +1\n*set stg_badCat +1\n*set flg_pirateFightAdvantage true\n*goto pirate_fight\n\n*label sneak_other_win\n\"Leave it to me,\" you say, as you rush up to the boat. You wait as two cats climb down the side of the ship, carrying heavy cutlasses in their teeth. As they leap off, you scurry up the side and pounce on another two who were getting ready to climb over as well. \n\nFrightened by the sudden appearance of a dog in their midst, they turn and try to run. You manage to dispatch them with your dagger within moments, and hasten to make your way back down and rejoin your friends.\n\n*set stg_protect +1\n*set stg_badCat +1\n*set flg_pirateFightAdvantage true\n*goto pirate_fight\n\n*label sneak_lose\nYou rush up to the side of the boat and wait as two cats climb down the side of the ship, carrying heavy cutlasses in their teeth. As they leap off, you try to scurry up the side and pounce on another two who were getting ready to climb over as well. However, the other two see you and point. You hasten back down to avoid getting trapped between the four cats, and hurry to rejoin your friends. \n\n*if stg_badCat > 0\n\t*set stg_badCat -1\n*goto pirate_fight\n\n*label arrow_win\nYou pull out your bow and quickly nock an arrow. Letting the first arrow fly, you don't even watch its path as you pull a second arrow from your quiver and let it loose as well. Within moments, you see two of the cats on the edge clutch their chests and fall from the deck into the water. [i]Splash![/i]\n\nAs you prepare a third arrow, two more cats have already moved to the other side of the boat and climbed down. Within moments they rush toward you, with heavy cutlasses in their paws.\n\n*set stg_protect +1\n*set stg_badCat +1\n*set flg_pirateFightAdvantage true\n*goto pirate_fight\n\n*label arrow_lose\nYou pull out your bow and quickly nock an arrow. Letting the first arrow fly, you don't even watch its path as you pull a second arrow from your quiver and let it loose as well. Unfortunately, both land in the side of the boat. [i]Thunk! Thunk![/i]\n\nAs you prepare a third arrow, four cats move to the other side of the boat and climbed down. Within moments they rush toward you, with heavy cutlasses in their paws.\n\n*if stg_badCat > 0\n\t*set stg_badCat -1\n*goto pirate_fight\n\n*label magic_win\nYou close your eyes and visualize the spell in your mind. You imagine a loud screaming ghost hovering over the top of the deck. As you open your eyes, you hear screaming as two of the cats run in terror from the very real, very scary-looking ghost looming over the boat! They jump over the edge of the ship and hit the water. [i]Splash![/i]\n\nTwo more cats on deck throw daggers at the ghost, and realize it's an illusion. Furious, they climb over the side of the boat to attack you, cutlasses at the ready. But you've learned some cats can be scared!\n*page_break\n*set stg_lore +1\n*set stg_badCat +1\n*set flg_pirateFightAdvantage true\n\n*label pirate_fight\n\nThe @{flg_pirateFightAdvantage two|four} cats rush at you, screaming! @{flg_pirateFightAdvantage One attacks|Two attack} Damian while the other @{flg_pirateFightAdvantage one goes|two go} after Sonya. They don't look like they're going to surrender.\n\n*choice\n\t#I help Damian by attacking from behind.\n\t\t*set per_ego %-15\n\t\t*set rel_damian %+10\n\t\t*if (flg_pirateFightAdvantage)\n\t\t\tAs Damian struggles with his attacker, you rush behind the cat, stabbing her in the back. The cat, surprised by the attack, turns to face you, as Damian finishes her off with a vicious blow from his dagger.\n\n\t\t\tHe smiles as Sonya finishes off her attacker by herself. \"Hey, thanks,\" he says, tipping you a wink as he says it.\n\t\t\t*goto ship_on_fire\n\t\t*else\n\t\t\tAs Damian struggles with his attackers, you rush behind one of the cats, stabbing her in the back. As she slumps to the ground, the second one turns to face you, and Damian takes her down with a vicious blow from his dagger.\n\n\t\t\tHe smiles as Sonya finishes off her attackers by herself. \"Hey, thanks,\" he says, tipping you a wink as he says it.\n\t\t\t*goto ship_on_fire\n\t#I assist Sonya by attacking from behind.\n\t\t*set per_ego %-15\n\t\t*set rel_sonya %+10\n\t\t*if (flg_pirateFightAdvantage)\n\t\t\tAs Sonya struggles with her attacker, you rush behind the cat, stabbing him in the back. The cat, surprised by the attack, turns to face you, as Sonya finishes him off with a heavy blow from her sword.\n\n\t\t\tShe nods as Damian finishes off his attacker by himself. \"I appreciate it, $!{plc_fname},\" she says.\n\t\t\t*goto ship_on_fire\n\t\t*else\n\t\t\tAs Sonya struggles with her attackers, you rush behind one of the cats, stabbing him in the back. As he slumps to the ground, the second one turns to face you, and Sonya takes him down with a heavy blow from her sword.\n\n\t\t\tShe nods as Damian finishes off his attackers by himself. \"I appreciate it, $!{plc_fname},\" she says.\n\t\t\t*goto ship_on_fire\n\t#I stand next to Damian, ready to fight.\n\t\t*set per_ego %+15\n\t\t*set rel_damian %+10\n\t\t*if (flg_pirateFightAdvantage)\n\t\t\tYou stand next to Damian as the cat swings at him. He manages to block her cutlass with his dagger, while you stab her with your own blade. She turns to face you, and Damian finishes her off with a vicious blow. \n\n\t\t\tHe smiles as Sonya finishes off her attacker by herself. \"Hey, thanks,\" he says, tipping you a wink as he says it.\n\t\t\t*goto ship_on_fire\n\t\t*else\n\t\t\tYou stand next to Damian as the cats advance on each of you. He manages to block the cutlass swing from one with his dagger, while you stab her with your own blade. The second, surprised at you ganging up on Damian's attacker, tries to stab at your side, but Damian finishes her off with a vicious blow. \n\n\t\t\tHe smiles as Sonya finishes off her attackers by herself. \"Hey, thanks,\" he says, tipping you a wink as he says it.\n\t\t\t*goto ship_on_fire\n\t#I stand beside Sonya, offering my help.\n\t\t*set per_ego %+15\n\t\t*set rel_sonya %+10\n\t\t*if (flg_pirateFightAdvantage)\n\t\t\tYou stand next to Sonya as the cat swings at her. She manages to block his cutlass with her sword, while you stab at him with your own blade. He turns to face you, and Sonya finishes him off with a heavy blow. \n\n\t\t\tShe nods as Damian finishes off his attacker by himself. \"I appreciate it, $!{plc_fname},\" she says.\n\t\t\t*goto ship_on_fire\n\t\t*else\n\t\t\tYou stand next to Sonya as the cats advance on each of you. She manages to block the cutlass swing from one with her sword, while you stab at him with your own blade. The second, surprised at you ganging up on Sonya's attacker, tries to stab at your side, but Sonya finishes him off with a heavy blow. \n\n\t\t\tShe nods as Damian finishes off his attackers by himself. \"I appreciate it, $!{plc_fname},\" she says.\n\t\t\t*goto ship_on_fire\n\n*label ship_on_fire\n\nBut there's no time to celebrate. You notice the sky getting darker, and you can smell burning wood. You spin around, and watch the [i]Ruffled Fur[/i] going up in flames, filling the sky with thick, black smoke. A few cats jump into the water, including one with distinctive orange-and-black patchy fur. \n\nBut as you rush to go in after them, Sonya grabs your arm. \"Look, up on the deck,\" she says. You see where she's pointing. One cat is trapped on the deck between the growing flames. You can barely hear her cries for help.\n\n*choice\n\t#I let her be. They are all murderous pirates and deserve what they get. \n\t\t\"Let her go,\" you say, turning your back on the ship. The cats in the river are probably long gone by now.\n\n\t\t\"But she's in trouble,\" Sonya says, concerned.\n\n\t\t\"Those pirates stole the Corgi Pearls at best, and helped murder Padraig at worst. They deserve what they get.\"\n\n\t\tSonya frowns, but nods. \"I understand,\" she says.\n\n\t\tDamian shrugs. \"You're a hard dog, boss, but I gotta respect that.\"\n\t\t*set per_tame %-15\n\t\t*set rep_cat %-10\n\t\t*goto no_pirate\n\t#I convince the dockworkers to pour water on the fire.\n\t\t\"We need to put that fire out,\" you say decisively.\n\n\t\tDamian puts his paw over his eyes. \"Big mistake, boss. That's a huge fire.\"\n\n\t\t\"I think it's a fine plan,\" Sonya says. \"But how?\"\n\n\t\t*set per_ego %-15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\tYou quickly grab one of the dockworkers. \"Get all your friends and any pails you can put your paws on! We've got to put that fire out!\"\n\n\t\t\tThe worker, a big husky, nods and bellows to her comrades. \"All right, folks, grab some water and start throwing!\" They all step to the task, dipping buckets into the river, running up to the ship, and throwing water on the blaze. Slowly the fire gets smaller and smaller, and eventually dies out. As you thank the husky, Sonya quickly climbs up on the deck, grabs the cat, and pulls her back to you and Damian.\n\t\t\t*set rep_dog %+10\n\t\t\t*goto question_pirate\n\t\t*else\n\t\t\tYou quickly grab one of the dockworkers. \"Get all your friends and any pails you can put your paws on! We've got to put that fire out!\"\n\n\t\t\tThe worker, a small chihuahua, looks around nervously. \"Gee, I dunno. I'm not sure I should get involved.\" \n\n\t\t\t\"Come on!\" Sonya barks. \"Get moving!\"\n\n\t\t\tEventually the dog grabs his comrades. They dip buckets into the river, run up to the ship, and throw water on the blaze, but it's not enough. The fire is too hot, too large, too out of control. You watch, helpless, as the ship burns.\n\t\t\t*set rep_dog %+10\n\t\t\t*if stg_badCat > 0\n\t\t\t\t*set stg_badCat -1\n\t\t\t*goto no_pirate\n\t#I quickly dive into the blaze to rescue her. \n\t\tWithout saying anything, you climb up the side of the ship, hoping you're fast enough to find the cat in the blaze. The heat and smoke make your eyes water as you call out for the trapped pirate. \n\t\t*set per_ego %+15\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*set att_agile %+05\n\t\t*if att_agile > 55\n\t\t\tYou dart around in the smoke, and within moments you find the pirate. Without thinking you grab her by the scruff and toss her overboard, into the water. You hear a splash, and you make your way back down the hull.\n\n\t\t\t\"Now that's the kind of heroic nonsense I like to see in a dog!\" Damian says.\n\n\t\t\t\"That was reckless,\" Sonya says, irritated, as she holds the bedraggled cat by the scruff.\n\t\t\t*set rep_cat %+10\n\t\t\t*goto question_pirate\n\t\t*else\n\t\t\tYou dart around in the smoke, but you can't see anything. The fire is too hot, and the smoke too thick. After a few minutes of fruitless searching, you have no choice but to make your way back down the hull.\n\n\t\t\t\"Good effort, boss,\" Damian says. \"That was some real heroic nonsense.\" \n\n\t\t\t\"That was reckless,\" Sonya says, irritated, as you watch the ship burn.\n\t\t\t*set rep_cat %-10\n\t\t\t*if stg_badCat > 0\n\t\t\t\t*set stg_badCat -1\n\t\t\t*goto no_pirate\n\t*selectable_if (flg_hasMagic) #I use a spell to make the area cold.\n\t\t\"I can use my magic to put that fire out,\" you say.\n\n\t\tDamian puts his paw over his eyes. \"Big mistake, boss. That's a huge fire.\"\n\n\t\tSonya just nods. \"Give it a try,\" she says.\n\t\t*set att_clever %+05\n\t\t*set per_idealist %+15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\tQuickly going through your memory, you recall a spell that allows you to change the temperature in an area. Focusing on the fire, you try to imagine it becoming colder and colder. Sweat seeps into your ${plc_fur} fur as you concentrate as hard as possible. Slowly the fire gets smaller and smaller, and eventually dies out. Sonya quickly climbs up on the deck, grabs the cat, and pulls her back to you and Damian.\n\t\t*set rep_cat %+10\n\t\t*goto question_pirate\n\t\t\n*label question_pirate\n\nThe pirate's clothes look charred and burned, but the cat herself seems to be unhurt from the blaze.\n\n\"Where are the pearls?\" you ask the cat.\n\nShe coughs, and says in a raspy voice. \"Patches, our captain, has them. She's heading south to Houndton.\"\n\n\"That's it?\" Damian says. \"We rescue you from a fire your captain probably started in the first place, and that's all we get?\"\n\n\"Ease up,\" Sonya says.\n\n\"No, he's right,\" the pirate says. \"We're on opposite sides, but you saved my life, and our pirate code requires me to repay you. I'll give you one more thing, and then I'll be on my way.\"\n\n*choice\n\t#I ask about the pearls.\n\t\t\"Do you know anything else about the pearls?\" you ask.\n\n\t\tThe pirate shrugs. \"Just that they're some kind of magic artifacts. My captain wanted them pretty bad, but I don't think she was the one ultimately looking for them. And that's all I know.\" \n\t\t*set stg_fetch +1\n\t\t*goto pirate_leaves\n\t#I ask about Patches.\n\t\t\"Tell us more about your captain,\" you say.\n\n\t\tThe pirate shrugs. \"Don't know much about her. It's the first time we've worked together. But I get the impression she worked under another pirate before this. Kind of a sub-contracting deal. And that's all I know.\" \n\t\t*set stg_badCat +1\n\t\t*goto pirate_leaves\n\t#I ask about Padraig's death.\n\t\t\"Tell us about the murder of Padraig Corgi,\" you say.\n\n\t\tThe pirate shrugs. \"That old Pioneer dog? I heard our captain knows the bird that did it, but she never talked about it. Like she was scared of them or something. And that's all I know.\" \n\t\t*set stg_padraig +1\n\t\t*goto pirate_leaves\n\t#I demand some plastic.\n\t\t\"Give us some money for our trouble,\" you say.\n\n\t\tThe pirate shrugs. \"Sure. Like I said, fair's fair.\" She reaches into a pocket and pulls ou
