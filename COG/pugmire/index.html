ou can hear loud sea shanties being sung off-key inside, and smell stale beer that seems to have fossilized into the cobblestones.\n\n\"We spend a surprising amount of time in bars,\" Sonya says, staring at the squalid building.\n\n\"And yet we never get any real drinking done,\" Damian mutters.\n\n*choice\n\t#\"Maybe we're not going to the right bars.\"\n\t\t\"Maybe we're not going to the right bars,\" you say, winking to Damian.\n\n\t\tSonya looks annoyed. \"This isn't a vacation. We're on an important mission.\"\n\n\t\t\"Hey, there's nothing saying we can't have a little fun while we're saving the pearls,\" Damian rebuts.\n\n\t\tShe huffs. \"Let's just go inside.\"\n\t\t*set rel_Damian %+05\n\t\t*set rel_Sonya %-05\n\t\t*goto salty_dog_interior\n\t#\"I don't like it either, but we go where the rabble are.\"\n\t\t\"I don't like it either,\" you say, exasperated, \"but we go where the rabble are.\"\n\n\t\t\"Hey, I resemble that remark,\" Damian says, annoyed.\n\n\t\t\"Yes,\" Sonya adds, looking smug, \"you do.\"\n\n\t\tHe huffs. \"Let's just go inside.\"\n\t\t*set rel_Damian %+05\n\t\t*set rel_Sonya %-05\n\t\t*goto salty_dog_interior\n\t#\"Being on a ship will be much nicer.\"\n\t\t\"Being on a ship will be much nicer,\" you say longingly.\n\n\t\t\"Oh yeah,\" Damian mutters. \"Nothing but endless water and cramped quarters for weeks. Joy.\"\n\n\t\t\"I'm quite looking forward to the solitude,\" Sonya adds, looking out to the sea.\n\n\t\tHe huffs. \"Let's just go inside.\"\n\t\t*set rel_Damian %-05\n\t\t*set rel_Sonya %+05\n\t\t*goto salty_dog_interior\n\t#\"Today we'll get that drinking done.\"\n\t\t\"Today we'll get that drinking done,\" you say, winking to Damian.\n\n\t\tSonya looks annoyed. \"This isn't a vacation. We're on an important mission.\"\n\n\t\t\"Hey, there's nothing saying we can't have a little fun while we're saving the pearls,\" Damian rebuts.\n\n\t\tShe huffs. \"Let's just go inside.\"\n\t\t*set rel_Damian %+05\n\t\t*set rel_Sonya %-05\n\t\t*goto salty_dog_interior\n\n*label salty_dog_interior\n\nEager to end the squabble, you push open the door and step inside.\n\nThe exterior may have been what you expected, but the interior is anything but. Instead of scarred tables and mismatched chairs, you see comfortable couches. There's no burly bartender serving bowls of warm beer, but a small pomeranian pouring a kettle of hot water into a mug of tea leaves. Damian is visibly disappointed.\n\nThe patrons of the place are still a pack of hard-bitten sailors, but the loud singing wasn't drunken enthusiasm. Rather, it seems to be a singing lesson led by a weary-looking dog in colorful clothing.\n\n\"No no, you need to sing more from the stomach. How will you entertain your crew with that caterwauling?\"\n\nOne of the peg-legged singers suddenly looks suspicious. \"'Er, what'd you say about cats?\"\n\n\"Cats? Who mentioned cats?\" the colorful dog says quickly. \"You must have misheard.\"\n\n\"Pretty sure I heard something about cats,\" another one of the singers mutters.\n\n\"We of the Guinea family are known for our beautiful voices,\" the dog says, sniffing, \"and I have enunciated quite clearly, I assure you.\"\n\nThe pomeranian scurries up to you. \"Before they start the sing-song up again, let me welcome you to the Salty Dog, home of those dogs still loyal to the realm of Pugmire. I am Samuel Pomeranian. Can I get you any tea?\"\n\n*choice\n\t#I accept the tea and quietly eavesdrop on the singers.\n\t\t\"A cup of tea would be lovely, thank you,\" you say.\n\n\t\tSamuel gives you each a cup, and three of you take them with you to one of the couches, so you can listen in on the squabbling singers.\n\n\t\t\"You even smell like a cat,\" the singer with the peg leg says.\n\n\t\t\"Yeah, now you mention it,\" his friend replies. \"Why do you smell like a cat? You've been giving lessons to our dog governor, haven't you?\"\n\n\t\tThe guinea looks nervous. \"I have not been around cats, I assure you.\"\n\n\t\t\"Y'do an awful lot of assurin', matey,\" the dog with the peg leg says. \"And not a lot of 'splainin'.\"\n\n\t\tSamuel moves over to the group. \"Now now, Master Guinea here is a quality dog, and former music teacher to the Governor himself. Why, he even came here straight from the Governor's mansion. Didn't you, Master Guinea?\"\n\n\t\tSamuel turns to address the singer, but Master Guinea has started running. You spill your tea as the three of you get off the couch.\n\t\t*set per_ego %-10\n\t\t*goto catch_guinea\n\t#I demand beer instead, because I'm worth it.\n\t\t\"Beer,\" you say.\n\n\t\t\"Oh, we don't serve beer here,\" Samuel says. \"Only tea.\"\n\n\t\t\"We could smell the beer outside,\" Damian argues.\n\n\t\t\"Ah, that's from the previous owner. [i]The Salty Dog[/i] was previously a tavern of some ill repute. But now, as you can see, it has much grown in stature.\"\n\n\t\tYou watch one of the sailors spit into the corner. \"And high-quality clientele,\" you mutter.\n\n\t\t\"Indeed,\" Samuel says evasively, before speaking more excitedly. \"In fact, Master Guinea used to be the music teacher of the Governor. Why, he even came here straight from the mansion. Hey, Master Guinea, weren't you just with the Governor?\"\n\n\t\tSamuel turns to address the singer, but Master Guinea has started running.\n\t\t*set per_ego %+10\n\t\t*goto catch_guinea\n\t#I approach the colorful singer and interrogate him.\n\t\tIgnoring the tea, you march right up to the colorful singer. \"What do you know about the assassination of the Governor?\"\n\n\t\tThe singer looks shocked. \"I say, how dare you make such an accusation?\"\n\n\t\tDamian walks up next to you. \"It wasn't an accusation. Just a question.\"\n\n\t\t\"I assure you, I know nothing about the Governor whatsoever.\"\n\n\t\t\"'Er,\" the peg-legged sailor says, \"you was sayin' just a wag ago you used to give the Governor singing lessons.\"\n\n\t\tThe singing instructor looks like he is about to answer the charges, and then suddenly turns and runs.\n\t\t*set per_tame %-10\n\t\t*goto catch_guinea\n\t#I ask the owner about the assassination.\n\t\t\"Thank you, but we don't have time for tea,\" you say. \"We're looking for any information you might have on the assassination of the Governor.\"\n\n\t\t\"Hrm,\" Samual says, putting a paw to his chin as he thinks. \"No, I can't say I know much about that. But Master Guinea might know.\"\n\n\t\t\"Who's Master Guinea?\" Sonya asks.\n\n\t\t\"That gentledog over there with the colorful coat. Quite an addition to the quality of this establishment, I tell you. In fact, Master Guinea used to be the music teacher of the Governor. Why, he even came here straight from the Governor's mansion. Didn't you, Master Guinea?\"\n\n\t\tSamuel turns to address the singer, but Master Guinea has started running.\n\t\t*set per_tame %+10\n\t\t*goto catch_guinea\n\n*label catch_guinea\n\n\"I'll get him,\" Sonya snarls, running after him as you see the colorful coat disappear through a door marked [i]Employees Only[/i]. She dives through the door herself, and you hear a scuffle. By the time you and Damian reach the door, Sonya has the dog in her paw.\n\n\"Let me go this instant,\" the singing teacher protests. \"How dare you lay your paws on the amazing Guido Guinea?\"\n\nDamian looks Guido up and down. \"How should we get him to talk, boss?\"\n\n*choice\n\t#I threaten Guido with violence.\n\t\tYou look Guido in the eye. \"We can do this the easy way or the hard way,\" you say.\n\n\t\t*set per_tame %-10\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\tGuido starts to sweat. \"Please don't hurt me. I'll tell you all about the Mau spy!\"\n\n\t\t\t\"Mau spy?\" Sonya asks, setting Guido down.\n\t\t\t*set stg_fetch +1\n\t\t\t*goto guido_talks\n\t\t*else\n\t\t\t\"What's the hard way?\" Guido asks, confused.\n\n\t\t\t\"It's when I hurt you to get information,\" you say. He doesn't seem particularly intimidated.\n\n\t\t\t\"Oh! Well, I'd much prefer coin instead.\"\n\t\t\t*goto pay_off_guido\n\t#I preach to him about the Code of Man.\n\t\tYou look Guido in the eye. \n\t\t*set att_friendly %+05\n\t\t*set per_idealist %+10\n\t\t*if plc_calling = \"Shepherd\"\n\t\t\t\"The Code of Man tells us we should all be good dogs,\" you say, pulling out the symbol of the Church of Man: a downward-facing paw with a drop of blood in the center of the palm.\n\n\t\t\t\"Well, yes,\" Guido mumbles.\n\n\t\t\t\"And as a good dog, we should stay loyal to those who are true.\" You hold the symbol up on front of Guido's eyes. \"Was the Governor true to you, Guido Guinea?\"\n\n\t\t\tYou can see the tears start to form in Guido's eyes. \"Yes. He was.\"\n\n\t\t\t\"It's not too late to be a good dog, Guido. It's not too late to seek forgiveness in the eyes of Man. All you have to do is tell us the truth.\"\n\n\t\t\tGuido falls to his knees. \"I'm sorry! I'm so sorry! I'll tell you all about the Mau spy!\"\n\n\t\t\t\"Mau spy?\" Sonya asks, setting Guido down.\t\t\t\n\t\t\t*achieve preachshepherd\n\t\t\t*set stg_fetch +1\n\t\t\t*goto guido_talks\n\t\t*elseif att_friendly > 55\n\t\t\t\"Are you a good dog?\" you ask. \"The Code of Man tells us we should be.\"\n\n\t\t\t\"I try to be,\" Guido says, shuffling his feet.\n\n\t\t\t\"Well, a good dog would tell us everything about what happened.\"\n\n\t\t\tGuido sighs. \"Fine. I'll tell you all about the Mau spy.\"\n\n\t\t\t\"Mau spy?\" Sonya asks, setting Guido down.\n\t\t\t*set stg_fetch +1\n\t\t\t*goto guido_talks\n\t\t*else\n\t\t\t\"Are you a good dog?\" you ask. \"The Code of Man tells us we should be.\"\n\n\t\t\tGuido shrugs. \"Well, I'm not a [i]bad[/i] dog.\" He rubs his belly. \"More of a hungry and poor dog, if I'm honest. One who could use some coin.\"\n\t\t\t*goto pay_off_guido\n\t#I can wait all day until he's ready to talk.\n\t\tYou stare at Guido. \"I can wait all day until you're ready to talk.\"\n\n\t\t\"That may well be,\" Guido counters, \"but I doubt your friend will hold me all day. \n\t\t*set per_tame %+10\n\t\t*set att_solid %+05\n\t\t*if att_solid > 55\n\t\t\tSo just let me go.\"\n\n\t\t\tYou shrug. \"Let's see who gets tired first.\"\n\n\t\t\tSonya smiles, showing Guido all of her teeth. \"And I'm a lot stronger than I look.\"\n\n\t\t\tSo you wait. And wait. And wait. Finally, Guido shrieks. \"All right! All right. I'll tell you what you want about the Mau spy!\"\n\n\t\t\t\"Mau spy?\" Sonya asks, setting Guido down.\n\t\t\t*set stg_fetch +1\n\t\t\t*goto guido_talks\n\t\t*else\n\t\t\tAt some point you'll get tired and make a mistake.\" He shrugs. \"But if you slip me some plastic, I will tell you what I know and forget all about this situation.\"\n\t\t\t*goto pay_off_guido\n\n*label pay_off_guido\n\nDamian sighs. \"Look, if buying this information gets us a free boat ride, I say we do it.\"\n\nReluctantly, Sonya sets Guido down, while you pull a plastic coin out of your purse and put it in his paw.\n*set oth_coins -1\n*goto guido_talks\n\n*label guido_talks\n\n\"It was a cat who assassinated the Governor. A pirate named Greedy Bow.\"\n\nDamian swears loudly.\n\n\"Wait, a Mau spy?\" you ask. \"Maybe we should bring this up to Ambassador Korat.\"\n\nGuido shakes his head rapidly. \"Illiad von Korat? No no no, that's a bad idea. He has his paws in everything. Even Waterdog Port.\"\n\nSonya crosses her arms, looking confused. \"But why would Greedy Bow be a spy? I thought he was just a pirate after some jewels.\"\n\nGuido puts his paws up. \"He said he wanted to throw the port into chaos to distract some dogs chasing after his tail.\" He looks at the three of you. \"I'm guessing that's you.\"\n\n\"So why did you help him?\" you ask.\n\n*page_break\n\"I…\" He lets his paws drop, and looks down at them. \"I didn't know she would be killed. I had been fired by the Governor, who claimed my lessons were…imperfect. I was outraged, and Greedy Bow told me he would make sure the Governor would respect me again!\" Guido wrings his paws as he looks into your eyes. \"I swear! I had no idea murder was in that cat's heart!\"\n\n\"What else can you expect from a cat?\" Sonya says. \"We should take this cur to Stumpy, and make sure he's not welcome back here if nothing else.\"\n\n\"Wait, sorry?\" Guido asks. \"I didn't know I was going to be given over to a third party.\"\n\n\"Stumpy is working on behalf of the Luminaries,\" you say. \"They're investigating the assassination.\"\n\n\"Well, now they have the culprit. Surely there's little need to drag me into it. I'll just slip off quietly.\"\n\nSonya snarls. \"You assisted in the murder of another dog!\"\n\n\"Besides,\" you add, \"the culprit just left on his ship.\"\n\nDamian shrugs. \"I say we let him go. Once the other pirates in this town get word he was involved in the murder, they'll do far worse things to him. The old Governor was well liked around here.\"\n\nGuido looks pleadingly into your eyes.\n\n*choice\n\t#I take him to Stumpy. He can plead his case to the Luminaries.\n\t\t\"We'll take him to Stumpy,\" you say. \"He should have a chance to plead his case to the Luminaries in person.\"\n\t\t*set per_idealist %+10\n\t\t*goto take_guido\n\t#I let him go. We got what we wanted.\n\t\t\"Let him go,\" you say. \"We got what we wanted. There's no point in getting involved in the politics of this town.\"\n\t\t*set per_idealist %-10\n\t\t*goto leave_guido\n\t#I take him to Stumpy. Justice should be done for what he did.\n\t\t\"We'll take him to Stumpy,\" you say. \"He should be judged for what he did, and by the people who lawfully rule over this town.\"\n\t\t*set per_tame %+10\n\t\t*goto take_guido\n\t#I let him go. Let the rough vengeance of Waterdog Port deal with him.\n\t\t\"Let him go,\" you say. \"I'm sure the local pirates will have him singing all sorts of new songs.\"\n\t\t*set per_tame %-10\n\t\t*goto leave_guido\n\n*label take_guido\n\nSonya nods, and grabs Guido by the arm. Damian grumbles under his breath, but falls in behind you as the four of you leave the building. Guido begs and pleads all the way back to the docks.\n\nThere you see Pally talking to another sailor, a turtle with an eyepatch. Sonya jerks on Guido's arm, and he stumbles forward. \"This is the dog that worked with the assassin,\" you say. \"The real killer is Greedy Bow, a pirate we've been chasing.\"\n\n\"Squawk! Excellent! Excellent!\" Pally turns to the turtle, who is already clasping Guido's wrists in pawcuffs. \"Take him to the mansion, and tell them Captain Chromachilde sent you. Give them everything you heard, and what I told you before.\"\n\nThe turtle nods, and starts walking away from the docks, taking Guido with him.\n*goto report_to_stumpy\n\n*label leave_guido\n\nDamian nods. \"See ya, Guido,\" he says, showing a lot of teeth as Guido runs. Sonya mutters to herself, but leads the way as the three of you leave the building.\n\nThere you see Pally talking to another sailor, a turtle with an eyepatch. \"We discovered the assassin,\" you say. \"The real killer is Greedy Bow, a pirate we've been chasing.\"\n\n\"Squawk! Excellent! Excellent!\" Pally turns to the turtle. \"Go to the mansion, and tell them Captain Chromachilde sent you. Give them everything you heard, and what I told you before.\"\n\nThe turtle nods, and starts walking away from the docks.\n\n*label report_to_stumpy\n\n\"Is that good enough for a ride?\" Damian asks.\n\n\"Squawk! Of course! Of course!\" She waves an arm at the ship behind her. \"Come on board!\"\n\nThe ship is large, and in good shape. The rear of the ship facing you has the words \"The Pig's Tale\" painted in large, clear letters. You don't have much knowledge of sailing, but it looks like it has several masts and sails, which hopefully means it's fast. You see a few cannons on the sides, so the ship can defend itself. The side of the hull you can see above the water looks like it's coated in plastic.\n\nPally notices you staring at the hull. \"High-quality plastic-coated hull,\" she says proudly. \"Perfect for long voyages on the Acid Sea.\"\n\n\"That's good,\" you say, marveling at how well the plastic is joined to the hull. \"Because I think we'll be sailing after Greedy Bow for quite a while.\"\n*achieve endchapter5\n*finish [i]Chapter Six: Sailing the Acid Sea[/i]\n\n*label sonya_chat\n\nAfter the first full day of silence, you make camp. Damian volunteers to scour the area for any branches or bits of dead wood to augment the fire, while you unpack the dried rations and Sonya sets up the tent.\n\n\"Another exciting night of hard cheese and dried meat,\" you say sarcastically.\n\nSonya doesn't respond. Her back is to you, as she struggles to unfold the tent. The ropes always get twisted up during the ride, and Sonya is having a particularly tough time untying them. After a moment she swears and throws the package to the dirt.\n\n*fake_choice\n\t#\"Are you okay?\"\n\t\t\"Are you okay?\" you ask, concerned about her outburst.\n\t\t\n\t\t\"I'm fine!\" she snaps, a growl rumbling in her throat. After a moment she collapses into a sitting position on the ground, staring at her paws. \"No. I'm not fine.\"\n\t#\"Is the tent too difficult for you?\"\n\t\t\"Is the tent too difficult for you?\" you quip, trying to make light of her distress.\n\t\t\n\t\t\"Leave me alone!\" she snaps, a growl rumbling in her throat. After a moment she collapses into a sitting position on the ground, staring at her paws. \"Just…leave me alone.\"\n\t#\"Get it together, Sonya. It's just a tent.\"\n\t\t\"Get it together, Sonya,\" you say, irritated at her inability to perform a simple task. \"It's just a tent.\"\n\t\t\n\t\t\"If it's so easy, you do it!\" she snaps, a growl rumbling in her throat. After a moment she collapses into a sitting position on the ground, staring at her paws. \"I…I don't have it together right now.\"\n\n\"What's wrong?\" you ask.\n\nStill staring at her paws, she talks softly. You have to perk your ears up to hear her. \"I froze, $!{plc_fname}. That…that thing was threatening to eat us, and I froze.\"\n\n\"The demon,\" you say, just as quietly.\n\nSonya nods numbly. \"I'm terrified of them, ever since…well, ever since my mother was killed.\"\n*gosub sonyaconfession\n\nYou try to think of something to say, but Damian comes back to the camp, awkwardly carrying a bundle of twigs in his arms. \"Found some of this dead tree stuff you both think is so great,\" he says, dumping the sticks at your feet. Sonya turns away and quickly rubs at her eyes as you gather up the sticks. Damian looks at the two of you. \"Did I interrupt something?\"\n\n\"No,\" you say. \"Nothing important.\"\n\n*page_break Nothing At All\n*return\n\n*label damian_chat\n\nAfter another day of relative silence, you camp again. The following afternoon, Damian is riding next to you and Sonya. The area around you has a sudden and surprising amount of variety, with thick shrubs and squat trees twisting around outcroppings by the road. \n\nDamian taps Sonya on the shoulder. \"Hey, is that a badger lurking in the shrubs up ahead?\" he asks.\n\nSonya sniffs the air. \"I don't smell anything,\" she says carefully.\n\n\"Still, might be good to ride ahead and check anyway, right? You'd feel pretty foolish if we got stuck in another ambush. We'll wait here.\"\n\nShe snorts and kicks her horse into a fast trot. Within moments, she's far ahead of you on the road, carefully scanning the trees.\n\n*fake_choice\n\t#\"I didn't notice any badgers either.\"\n\t\t\"I didn't notice any badgers either,\" you say to Damian. \"Are you sure you saw some?\"\n\n\t\t\"That's because I made them up, boss,\" he says. \"I want to talk to you.\"\n\t#\"Should we help her?\"\n\t\t\"Should we help her?\" you ask. \"What if the badgers attack her while we're back here?\"\n\n\t\t\"There aren't any badgers, boss,\" he says. \"I made them up so I could talk to you.\"\n\t#\"So why did you lie to her?\"\n\t\t\"So why did you lie to her?\" you ask. \"There aren't any badgers up ahead.\"\n\n\t\t\"Nothing gets by you, boss,\" he says. \"I made them up so I could talk to you.\"\n\n\"About what?\"\n\nDamian pulls the necklace out from under his leather armor. \"This is all I have to remember Padraig by. And I signed on board this quest partially to help find his killer.\"\n\nHearing Padraig's name floods you with emotion.\n\n*fake_choice\n\t#I'd been trying not to think about him.\n\t\tYou'd managed to not think about it for a while now, but suddenly the weight of the grief in your heart is just as heavy as it was standing by his grave. \n\t#I'm still furious at his death.\n\t\tThe rage at his death still simmers, even when you're not thinking about him. Hearing his name again brings it all back. You want so badly to make his killer pay.\n\t#I try not to cry.\n\t\tYou hold back the tears. You feel like you've been holding back tears since the funeral. Some days are easier than others. This isn't one of the easy days.\n\nYou swallow your own pain and look at Damian.\n\n*gosub_scene 05-waterdog_port damianconfession\n\nYou notice Sonya trotting back to you. She is covered in brambles and tiny branches, and she looks deeply annoyed. \"I checked all the bushes,\" she says, her tone clipped. \"The very sharp, very sticky bushes, I might add. No badgers.\"\n\nDamian nods. \"I appreciate you checking.\"\n\n\"If I didn't know better, I'd think this is another one of your childish pranks.\" Sonya stares at Damian as she picks a burr out of her fur.\n\nHe gives a huge smile. \"Now would I do something like that?\"\n\nYou trot over and help Sonya with her debris. \"It's all right, Sonya. Better safe than sorry.\"\n\n\"If you say so,\" she mutters.\n\n*page_break To Waterdog Port\n*return\n\n*label nobody_chat\n\nBut what is there to discuss? Sonya seems reluctant to talk more about her fear of demons. Damian doesn't want to talk about Padraig's death. And there are only so many jokes or observations about the weather you can make before the conversation goes cold again. You ask about Waterdog Port and try to make plans about the quest in front of you, and they both answer your questions before everyone falls silent again. \n\nThe quiet gives you time to think over the quest. Why [i]are[/i] you doing this?\n\n*fake_choice\n\t#I still mourn Padraig.\n\t\tJust thinking about his name causes the pain of his loss to flood back. You'd managed to not think about it for a while now, but suddenly the weight of the grief in your heart was just as heavy as it was standing by his grave. The pain hasn't gone away, as much as you hoped it would. You still miss him dearly.\n\t#To defend the Corgi honor.\n\t\tTrying not to think about Padraig, you focus on his living family. Fiona is in danger of her and her relatives losing their status in Pugmire. Damian might scoff at the games the nobles play, but even he realizes they might lose their finances, their possessions, their home. You can't let that happen.\n\t#Because I'm a good dog.\n\t\tYou're doing this because it's the right thing to do. People are hurting over the loss of both Padraig and the pearls. You care for him and his family, but it wouldn't matter even if you didn't. The Code of Man says, first and foremost, \"Be a Good Dog,\" and that's what you strive for. To be the best dog you can.\n\nAs you turn the thoughts over in your head, you stare at Sonya and Damian. The three of you are professionals, working on an important mission, but you aren't friends. There's a distance you're not sure you can ever close. And so the next few days pass in relative silence.\n*page_break To Waterdog Port\n*return\n\n*label sonyaconfession\n\n*fake_choice\n\t#\"What happened?\"\n\t\t\"What happened?\" you ask. \"You didn't really say much before.\"\n\t\n\t\t\"\n\t#\"You don't need to talk about it.\"\n\t\t\"You don't need to talk about it,\" you say. \"Not if you don't want to.\"\n\t\n\t\t\"No, I want to.\" She sighs. \"\n\t#\"Demons are scary.\"\n\t\t\"Demons are scary,\" you say, trying to reassure her. \"I was scared, too.\"\n\t\n\t\t\"But you didn't just stare at it,\" Sonya insists. \"You didn't live through what I did. \nIt was…it was horrible.\"\n\nYou sit down next to her. \"Tell me.\"\n\nShe takes a deep breath. Then, still staring at her paws, her words tumble out in a torrent, like they have been held deep inside her for years.\n\n\"I wasn't much more than a pup when it happened. My father had come back home after guarding King Puckington on one of his diplomatic trips. He brought my mother a necklace that glowed with a soft light whenever she said the command word. Said it was a gift from the cat lands. She loved it, and swore never to take it off, not even for bath time. But it was more than just a trinket. So much more.\"\n\nYou hold your breath as she pauses to wipe her eyes with her paw. \"There was a demon inside,\" she blurts out suddenly. \"No one saw it at first, not even the Shepherds. I think they all considered it a very minor artifact of Man, not worthy of study. But over time my mother became…crueler. She would say and do the most horrible things. Never to me, and never anything anyone can prove, but I'd see that glint in her eyes, and I'd know. My father, he was never around to notice any of it. Too busy with the royal guard. Too busy to take care of his family.\"\n\nFinally, she looks up at you. \"Too busy to love us.\"\n\nYou put your ${plc_fur} paw over hers. \"I'm sure that's not true.\"\n\n\"Then why didn't he stop her?!\" Sonya barks, tears streaming from her eyes. \"Why didn't he stop her from…\" She stops, and stares at her paws again. \"She took her own life, $!{plc_fname}. In the end. I think a part of her realized what was happening. It felt so sudden, and yet it was inevitable. I was too young to understand, and all the words of the Shepherds and artisans and nobles who tried to tell me it was a demon just sounded like noise.\" She sniffs. \"They even buried her with that necklace.\"\n\n*set flg_sonyaToldDemonStory true\n*return\n\n*label damianconfession\n*fake_choice\n\t#\"It's not just about the money?\"\n\t\t\"I thought it was all about the money?\" you say. \"That's what you said at the funeral.\"\n\t#\"I'm angry about his murder, too.\"\n\t\t\"I'm angry about his murder, too,\" you say. \"I was furious at his funeral when you said it was all about the money.\"\n\t#\"We can't bring him back.\"\n\t\t\"We can't bring him back,\" you say. \"Padraig's gone, and finding his killer don't bring him back. I thought you were more focused on the money, anyway.\"\n\n\"I said I didn't [i]just[/i] want to find Padraig's killer, but Padraig is part of why I'm here, too.\" He carefully puts the necklace away. \"Maybe more than I…uh…let on at first. I'm a joker, but not about this, boss.\" He looks you in the eyes. \"Never about this.\" He sighs and rubs the back of his neck with his paw. \"I want a straight answer out of you. Do you think we'll eventually find the killer? Truly?\" \n\n*fake_choice\n\t#\"Of course we will.\"\n\t\t\"Of course we will,\" you say with confidence. \"Without any doubt.\"\n\n\t\t\"Okay. If you say we will, I trust we will.\" He gives you a small smile. \"Thanks.\"\n\t#\"I don't know. Maybe.\"\n\t\t\"I don't know. Maybe,\" you say. \"It depends on if we're able to find these pearls.\"\n\n\t\tHe nods. \"Yeah, I think there's a link there, too. But I appreciate you being honest with me, boss.\" He gives you a small smile. \"Thanks.\"\n\t#\"The pearls are more important.\"\n\t\t\"The pearls are more important,\" you say. \"You signed on to protect the honor of the Corgi family, and that has to be our focus.\"\n\n\t\tHe winces, but nods. \"That's harsh, but I appreciate you not sugar-coating it, boss.\" He gives you a small smile. \"Thanks.\"\n\n*set flg_damianToldPadraigStory true\n*return", "06-sailing": "*temp flg_seaworthiness 4\n*temp flg_emergency_fix false\n*text_image chap_6.png center [b]Chapter Six: Sailing the Acid Sea[/b]\n\nHours later, your last comment still echoes in your head, over and over. How long [i]will[/i] this chase last? The plan was to capture the pearl thief and Padraig's murderer, sure, and you knew there was a chance you'd need to go to the ends of the known lands of Pugmire to do so. But now you're preparing to go off the map and sail into the unknown waters of the Acid Sea. Who knows how many days or weeks it could take to chase down the pirates?\n\nPally and Sabu told you they needed some time to prepare [i]The Pig's Tale[/i]. You spent the hours in dock getting supplies from the merchants who were braving the docks even after all the ruckus, while Damian and Sonya set up your shared quarters below decks. Night fell before the crew was ready to shove off, and by now [i]The Cat's Meow[/i] has already faded into the distance. Eventually, you hear a call from the deck of your ship, telling you to come aboard.\n\nAs you climb up onto the deck, Captain Sabu is waiting for you, holding a lantern near his face. \"We're ready to head off,\" he says, \"but launching a ship is risky at this time of night. Other boats are docked near us, and a ship might come in while we're trying to leave. I know you want to catch those pirates as quickly as possible, but they've already got close to a day's head start on us, and it would be better to sail with a fresh crew after a good night's sleep. I don't know if waiting until daylight will hurt us all that much.\"\n\nPally, hearing the conversation, comes over to join you. \"That may be true, cap'n, but the crew is getting stir crazy. They're tired of being on land and want to launch right away, night be damned. Shoving off now will make them happy.\"\n\nYou glance behind Pally. In the gloom of the ship, you can just make out the crew. They're a ragtag bunch consisting of cats, dogs, mice, a couple of birds, and one decidedly grumpy-looking turtle. They're all trying to look busy, but most have an ear cocked to the conversation you're having.\n\nThe captain nods at his first mate. \"Thanks for the report, Pally.\" He turns to you. \"I guess it's just a matter of how badly you want to chase those rascals down?\"\n\n*choice\n\t#Launch immediately. Those pirates need to be punished.\n\t\t\"We need to launch right now,\" you say. \"Those pirates need to be punished for what they've done.\"\n\t\t*set per_tame %-10\n\t\t*goto sail_at_night\n\t#Set sail tomorrow. I don't want to make waves.\n\t\t\"If you think it's best to set sail tomorrow, that's fine,\" you say. \"I don't want to cause a fuss, and I appreciate all you're doing to help.\"\n\t\t*set per_ego %-10\n\t\t*goto sail_in_morning\n\t#Set sail now. Nothing bad will happen with me on board.\n\t\t\"We set sail now,\" you say. \"With me on board, there's no way anything bad could possibly happen.\"\n\t\t*set per_ego %+10\n\t\t*goto sail_at_night\n\t#Wait until sunrise. We're in this for the long haul now.\n\t\t\"Let's wait until sunrise,\" you say. \"If they have a day's head start, we're in this for the long haul. Better to pace ourselves.\"\n\t\t*set per_idealist %-10\n\t\t*goto sail_in_morning\n\n*label sail_at_night\n\nPally nods and turns to the crew. \"Okay, you heard ${plc_him}! Get ready to set sail!\"\n\nThe crew cheers. Well, most of the crew. The turtle still looks grumpy, but you can't be sure in the darkness. Regardless, they all become twice as busy as they were before, pulling on ropes, climbing ladders, and tying things down. One of the mice skitters out onto the front of the ship and hangs some lanterns to provide some light. Within a few moments, the turtle has hauled the anchor out of the water, and the sails catch a light breeze from the port.\n\n\"Full speed ahead!\" Pally says. The light from the lanterns is feeble, barely showing the sloshing sea water as it slaps against the ship. The first mate calls out directions to the crew, and the sails turn this way and that as [i]The Pig's Tale[/i] slowly eases its way out of the dock.\n\nAfter an hour of careful navigation, it seems like you've cleared all the other ships in port. One of the mice skitters up to Sabu. \"All clear, Cap—\"\n\nPally suddenly points to starboard. \"Watch out!\" she screams, as a ship suddenly appears out of the gloom. \"Turn to port!\"\n\nThe crew desperately races all over the deck. Sabu shouts orders to the three of you, who also pull ropes and move heavy objects out of the way. You see the other ship has noticed you, and is trying to turn as well. But neither ship is able to turn fast enough. There's a terrible grinding sound as the two hulls smack into one another. You stumble and fall to the deck, along with some of the crew, and you notice some vague forms fall to the deck on the other ship as well.\n\nPally rushes to the edge of the ship. \"Watch where you're going, you Man-damned sea dogs!\" she screams. You hear muffled swearing from the other ship as well as the two pull apart in the gloom.\n*set rep_crew %+10\n*set flg_seaworthiness -2\n*goto mouse_overboard\n\n*label sail_in_morning\n\nCaptain Sabu nods and turns to the crew. \"Settle down, crew! Get some sleep, because we're setting sail at first light tomorrow!\"\n\nThe crew grumbles. Well, most of the crew. The grumpy turtle looks somewhat less grumpy, but you can't be sure in the darkness. Regardless, most of the crew shuffles off to sleep, while a couple stay on guard.\n\nDamian grabs your arm. \"We should hit the hay too, boss,\" he says. You nod, suddenly realizing how tired you are, and the three of you head to your bunks.\n\nIt seems like only a few minutes before Sonya is shaking you awake. \"We're getting ready to set sail,\" she says. Using the back of your ${plc_fur} paw to wipe the sleep out of your eyes, you stumble onto the deck. The sun is barely over the horizon, but you can more clearly see the nearby ships. The crew are fresh, with strong limbs pulling on ropes, climbing ladders, and tying things down. Within a few moments, the turtle has hauled the anchor out of the water, and the sails catch a light breeze from the port.\n\n\"Full speed ahead!\" Pally says. The rays of the sun gleam off the sloshing sea water as it slaps against the ship. The first mate calls out directions to the crew, and the sails turn this way and that as [i]The Pig's Tale[/i] slowly eases its way out of the dock. After a few wags of careful navigation, you've cleared all the other ships in port. One of the mice skitters up to Sabu. \"All clear, Captain,\" they squeak in earnest.\n\nPally waves a wing in front of the mouse's face. \"Oi! You report to me, you miserable little rodent, and I report to the captain! Squawk!\"\n\nThe mouse shivers. \"S-s-sorry, first mate. W-w-we're all clear.\"\n\nThe bird sticks her chest out in pride. \"Better.\" She turns to Sabu. \"We're ready for full speed, captain.\" Sabu nods, and Pally turns back to the crew. \"All right, mateys! Full speed! And put your backs into it! Squawk!\"\n*set rep_crew %-10\n*set flg_seaworthiness -1\n*goto mouse_overboard\n\n*label mouse_overboard\n\nSabu comes over to you. \"Now that we've set sail, I'd appreciate it if you could check the ship,\" he says. \"Even with a plastic hull, the Acid Sea takes its toll on a ship such as ours, so everyone on board needs to be in the habit of checking our seaworthiness once in a while.\" He motions to the crew. \"We'll focus on setting the course, so just look around in the hold to make sure nothing's broken and there are no holes in the hull.\"\n\nNodding, you take Damian and Sonya with you into the hold. \n*gosub ship_check\n\nSatisfied [i]The Pig's Tale[/i] is fit to sail, the three of you help out where you can.\n\n*page_break Days Pass\nAfter a few days, life on board the ship settles into a routine. When the sun rises, the three of you wake up in your shared cabin. Within moments Damian and Sonya get on each other's nerves, and breakfast is usually held either in muttered arguments or sullen silence. You end up picking at a loose board you found in your cabin, or staring through the porthole at the unusually blue sea. \n\nThe Acid Sea isn't the clear blue of a normal body of water, but an almost unnatural looking blue, like a puppy's waterpainting of the sea. It's also, you're surprised to learn, not acid. Pally calls it \"acid-[i]ish[/i].\" It stings your skin and wears away at wood over time. Plastic holds up better, but even that gets too thin. That's why having clean water on board is so important, not only to drink, but to wash if you put your paws in the waters of the Acid Sea for too long.\n\nOnce you've eaten, Pally typically finds work for the three of you to do. Sonya often gets asked to move large objects from one side of the ship to the other, while Damian typically climbs up to the crow's nest and takes over for the crew that usually acts as lookout. You typically spend your time…\n\n*choice\n\t#…working long hours securing the supplies.\n\t\tToday, you carefully check the bindings to make sure the crates of supplies and barrels of fresh water you're carrying are securely fastened. \n\t\t*set att_solid %+05\n\t\t*if att_solid > 60\n\t\t\tAs you look it over, you notice one of the lines has been chewed through. Looks like there might be some rodents skittering around the ship. You tie the ends of the line together and make a note to tell Sabu about it.\n\t\t\t*set flg_seaworthiness +1\n\t\t\t*goto sabu_magician\n\t\t*else\n\t\t\tEverything seems fine to you. You turn to leave, when suddenly a rodent skitters by your foot! You leap back, startled by its appearance, as you knock one of the crates onto the floor. You quickly tie the loose crate back into place, and decide to let Sabu know about the rodents.\n\t\t\t*goto sabu_magician\n\t#…carefully examine the weapons to find any hidden flaws.\n\t\tToday, you double-check the cannons, to make sure everything is clean and in working order. \n\t\t*set att_clever %+05\n\t\t*if att_clever > 60\n\t\t\tAs you look the third cannon over, you notice its barrel is full of mud and salt. Looks like someone needs to go in there and clean it out. You make a note of which cannon it is so you can tell Sabu about it.\n\t\t\t*set flg_seaworthiness +1\n\t\t\t*goto sabu_magician\n\t\t*else\n\t\t\tAll of the cannons appear to be fine. As you pass by them for one last look, though, you nearly slip on a muddy puddle pooling underneath one. You make a note of which cannon it is so you can tell Sabu about it.\n\t\t\t*goto sabu_magician\n\t#…helping Sonya lift heavy things.\n\t\tToday, Sonya asks for your help in moving some crates from one part of the hold to the other, so the crew can fix the deck underneath them. \n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 60\n\t\t\tAs you pick up yet another create to give to Sonya, you see a rodent sticking its head through a hole in the deck.\n\n\t\t\t\"Looks like we have rodents,\" you mention to Sonya.\n\n\t\t\tShe sighs. \"Better let Sabu know,\" she mutters, taking the crate from your paws.\n\t\t\t*set flg_seaworthiness +1\n\t\t\t*goto sabu_magician\n\t\t*else\n\t\t\tAs you give Sonya another crate, suddenly you hear a loud squeaking sound from under your boot. Startled, you nearly drop the box as a rodent rushes across the deck.\n\n\t\t\t\"That rodent nearly killed me!\" you bluster in frustration.\n\n\t\t\tSonya manages to hold back a laugh. \"Better let Sabu know,\" she says, taking the crate from your paws.\n\t\t\t*goto sabu_magician\n\t#…help Damian up in the crow's next.\n\t\tToday, Damian asks you to climb up to the crow's nest with him and keep him company as he acts as lookout. \n\t\t*set att_agile %+05\n\t\t*if att_agile > 60\n\t\t\tYou quickly make your way up the netting to where Damian is sitting. You pass the time talking and joking as you stare out at the flat, boring sea. After a while, you notice something under one of the cannons on deck.\n\n\t\t\t\"Does that look like a leak to you?\" you ask Damian.\n\n\t\t\t\"Probably,\" Damian shrugs. \"I don't know anything about cannons. Better tell Sabu about it.\"\n\n\t\t\tAs you climb down the netting, Damian adds, \"And bring me a waterskin! Looking at all this water makes me thirsty!\"\n\t\t\t*set flg_seaworthiness +1\n\t\t\t*goto sabu_magician\n\t\t*else\n\t\t\tYou start to climb up the netting to the crow's nest, but it turns around, leaving you hanging by your paws upside down in the air. Blood rushes to your head, and you start to get dizzy. Before you know it, your grip has slipped and you fall to the deck.\n\n\t\t\t\"Are you okay?\" Damian yells down to you.\n\n\t\t\tShaking your head, nothing seems to be hurt but your pride and your faith in your climbing skills. As you stand up from the deck, you notice there's a muddy puddle underneath one of the cannons. Is it leaking? You decide to let Sabu know.\n\n\t\t\t\"I'm okay!\" you yell back. \"I just need to tell Sabu something!\"\n\n\t\t\t\"Well bring me a waterskin!\" Damian yells back. \"Looking at all this water makes me thirsty!\"\n\t\t\t*goto sabu_magician\n\n*label sabu_magician\n\nYou make your way to Sabu's cabin. As you knock on the door, from inside you hear \"Ah, $!{plc_fname}, come in.\" You don't know how the captain knew it was you. How strange.\n\nYou step inside and see Sabu leaning over some large charts on a dark wooden desk. His office is spartan and tidy, kept with the same kind of military efficiency as his well-tailored coat. There's a rack with cubbyholes full of scrolls and charts, next to an open chest full of well-oiled brass navigation tools. \n\nAs you approach the desk, he moves a large bag of salt sitting on his map to the side, so you can see it more clearly. \"We're coming into a dangerous part of the sea. I'll have to get some of my components together for a big spell.\"\n\n*if (plc_calling = \"Artisan\")\n\tYou nod. \"I had been wondering what kind of magic you've been using.\"\n\t*goto sabu_smirks\n*else\n\tYour eyes widen. \"You're a magician?\"\n\t*goto sabu_smirks\n\n*label sabu_smirks\n\nSabu smirks. \"I'm what my people call an 'alkalist.' Someone who creates magical potions.\" He gestures to the bag of salt. \"Most of us use large quantities of salt in our work, which leads some to call us 'salt witches' or the like. But it's really just—\"\n\nSuddenly, the ship shakes and you hear a loud crack, followed by a heavy drumming sound. The two of you rush outside and find yourselves in a thunderstorm. The sky is full of black clouds and the rain beats onto the deck, as the ship bounces over hard waves.\n\nPally, drenched, slides over to the two of you. \"The storm just came out of nowhere, captain! Squawk!\"\n\nSabu nods, and pulls a bag of colored salt from his belt. He starts making colorful designs on the deck which, miraculously, don't seem to be disturbed by the storm. Once done, he mutters a prayer to the Old Ones, but suddenly you watch in horror as one of the mice crewmembers is hit with a wave and washed over the side of the ship.\n\n\"Crew overboard!\" the crow screams from the crow's nest, as Sonya and Damian rush to your side.\n\nSabu turns to you. \"We have to get them out of there. Someone can survive for a while in the Acid Sea, but eventually even the hardiest crewmember can suffer from burns.\"\n\n*set flg_seaworthiness -1\n*choice\n\t#I order Sonya to dive in after the mouse.\n\t\t\"Sonya, go after him,\" you scream into the wind.\n\n\t\t*set per_loyal %-10\n\t\t*if rel_sonya >= 50\n\t\t\tWithout hesitation, \n\t\t\t*gosub sonya_dives_in\n\t\t\talong with the head of the poor mouse. The turtle throws a line down to the two of them, and before long Sonya and the mouse are gasping on the deck. \n\n\t\t\tThe rain eases up, and you help Sonya to her feet. \"Good work,\" you say with a smile.\n\n\t\t\t*if (rel_sonya >= 60)\n\t\t\t\tShe gives you a shy smile. \"Anything for you,\" she says quietly.\n\t\t\t\t*set rep_crew %+10\n\t\t\t\t*goto saved_mouse\n\t\t\t*else\n\t\t\t\tShe gives a smile. \"Glad to help,\" she says.\n\t\t\t\t*set rep_crew %+10\n\t\t\t\t*goto saved_mouse\n\t\t*else\n\t\t\tShe turns to look at you. \"Me?\"\n\n\t\t\t\"Yes, you!\" you say in exasperation. \"Hurry!\"\n\n\t\t\t\"Why didn't you ask Damian to risk his life?\"\n\n\t\t\tPally smacks Sonya on the back. \"We don't have time for this squabblin'! Just do it!\"\n\n\t\t\tWith a sigh,\n\t\t\t*gosub sonya_dives_in\n\t\t\tall alone. She shakes her head. The turtle throws a line down to her, and before long Sonya's gasping on the deck.\n\n\t\t\tThe rain eases up, and you help Sonya to her feet. She yanks her arm out of your paw and stands up herself.\n\n\t\t\t\"You should have moved faster,\" you say in a low voice.\n\n\t\t\t\"Well, I didn't, and now we both have to live with that,\" she says with a growl.\n\t\t\t*set rep_crew %-10\n\t\t\t*goto lost_mouse\n\t#I command Damian to rescue the mouse.\n\t\t\"Damian, go after him,\" you scream into the wind.\n\n\t\t*set per_loyal %-10\n\t\t*if rel_damian >= 50\n\t\t\tWithout hesitation, \n\t\t\t*gosub damian_dives_in\n\t\t\talong with the head of the poor mouse. The turtle throws a line down to the two of them, and before long Damian and the mouse are gasping on the deck.\n\n\t\t\tThe rain eases up, and you help Damian to his feet. \"Good work,\" you say with a smile.\n\n\t\t\t*if (rel_damian >= 60)\n\t\t\t\tHe gives you a smile and a wink. \"Anything for you,\" he says.\n\t\t\t\t*set rep_crew %+10\n\t\t\t\t*goto saved_mouse\n\t\t\t*else\n\t\t\t\tHe gives a smile. \"Just get some other sucker to dive into the freezing water next time, boss,\" he says.\n\t\t\t\t*set rep_crew %+10\n\t\t\t\t*goto saved_mouse\n\t\t*else\n\t\t\tHe turns to look at you. \"Are you kidding?\"\n\n\t\t\t\"No!\" you say in exasperation. \"Get in there!\"\n\n\t\t\t\"I'm a city dog, boss! Why don't you get the big dumb mutt to risk her neck?\"\n\n\t\t\tPally smacks Damian on the back. \"We don't have time for this squabblin'! Just do it!\"\n\n\t\t\tWith a sigh,\n\t\t\t*gosub damian_dives_in\n\t\t\tall alone. \"Pull me up!\" he screams. The turtle throws a line down to him, and before long Damian's gasping on the deck.\n\n\t\t\tThe rain eases up, and you help Damian to his feet. He accepts the help, before scowling and stepping away from you.\n\n\t\t\t\"You should have listened to me,\" you say in a low voice.\n\n\t\t\t\"It was a dumb decision to send me,\" he barks. \"And now we have to live with that.\"\n\t\t\t*set rep_crew %-10\n\t\t\t*goto lost_mouse\n\t#I dive in myself, because I'm a hero.\n\t\tWithout a moment's hesitation, you leap over the side of the boat.\n\n\t\t*set per_ego %+10\n\t\t*gosub you_dive_in\n\t\t*set att_solid %+05\n\t\t*if att_solid >= 60\n\t\t\tbut you dive back under the water, determined to find the mouse. Forcing your eyes open, you scan the water. The burning in your eyes and on your skin gets worse, and just when you're about to give up, a brown ear appears in the murk.\n\n\t\t\tDesperately grabbing it, a paw clasps onto your wrist. You pull the mouse to the surface of the water. The turtle throws a line down to you, and you clamber up. Before long, both you and the mouse are gasping on the deck.\n\n\t\t\tThe rain eases up, and Sonya and Damian help you to your feet.\n\n\t\t\t\"Good work,\" Sonya says.\n\n\t\t\t\"Yeah, that's some impressive stuff, boss,\" Damian echoes.\n\t\t\t*set rep_crew %+10\n\t\t\t*goto saved_mouse\n\t\t*else\n\t\t\tand you realize you'll die in the Acid Sea before you find the mouse. \"Pull me up!\" you scream. The turtle throws a line down to you, and you desperately clamber up. Before long, you're gasping on the deck.\n\n\t\t\tThe rain eases up, and Sonya and Damian help you to your feet.\n\n\t\t\t\"That was foolish,\" Sonya says.\n\n\t\t\t\"Yeah, boss, what were you thinking?\" Damian asks incredulously.\n\t\t\t*set rep_crew %-10\n\t\t\t*goto lost_mouse\n\t#I throw down a rope and hope to pull the mouse up. \n\t\tWithout a moment's hesitation, you grab a rope. \"We need to throw a rope down to them!\" you yell.\n\n\t\t\"A line,\" the turtle says, appearing next to you.\n\n\t\t\"What?\" you scream into the wind.\n\n\t\tThe turtle grabs a rope as well. \"We call it a line,\" he says. You're pretty sure that's more words than the turtle has said to you all voyage so far.\n\n\t\t\"Fine,\" you say, giving the ends of the ropes to Damian and Sonya. \"You two hold our [i]lines[/i] while we try to pull that mouse up.\"\n\n\t\t*set per_ego %+10\n\t\t*gosub you_throw_a_line\n\t\t*set att_mighty %+05\n\t\t*if att_mighty >= 60\n\t\t\tand you manage to stop the slide. Straining your muscles, you slowly pull on the rope, paw over paw, as the mouse desperately clambers up. Before long, the mouse is gasping on the deck.\n\n\t\t\tThe rain eases up, and Sonya and Damian walk over to you.\n\n\t\t\t\"One of the barrels got loose,\" Sonya says, apologetically.\n\n\t\t\t\"Still, you didn't need us,\" Damian echoes. \"That's some impressive stuff, boss.\"\n\t\t\t*set rep_crew %+10\n\t\t\t*goto saved_mouse\n\t\t*else\n\t\t\tbut you can't stop it from slipping out of your paws. The weight is too much, and before long the line falls into the sea. The turtle looks over the side of the deck, and shakes his head. \"We're too late,\" he says.\n\n\t\t\tThe rain eases up, and Sonya and Damian walk over to you.\n\n\t\t\t\"One of the barrels got loose,\" Sonya says, apologetically.\n\n\t\t\t\"Yeah, shame we weren't able to save that mouse,\" Damian says.\n\t\t\t*set rep_crew %-10\n\t\t\t*goto lost_mouse\n\n*label sonya_dives_in\nSonya drops what she's holding and dives into the stormy sea. You watch the waves bash against the side of the ship as Sonya's head disappears, then reappears, then disappears again.\n\nA long moment passes as all of you stare desperately at the water. You consider whether someone else should dive in after both of them.\n\nThen, Sonya's head pops out of the sea again,\n*return\n\n*label damian_dives_in\nDamian unbuckles his belt, dropping his weapons, and dives into the stormy sea. You watch the waves bash against the side of the ship as Damian's head disappears, then reappears, then disappears again.\n\nA long moment passes as all of you stare desperately at the water. You consider whether someone else should dive in after both of them.\n\nThen, Damian's head pops out of the sea again,\n*return\n\n*label you_dive_in\nThe disturbingly blue water stings your eyes, and you feel a prickling sensation all over your skin. The thrashing waves makes it hard to see anything. You try to dive deeper, but your lungs are burning from lack of air. You kick to the surface, and take a lungful of air.\n\nYou feel the acid on your skin starting to sting, \n*return\n\n*label you_throw_a_line\nThe turtle deftly ties two heavy metal hooks to the ends of your lines. On a count of three, the two of you heave the lines over the side of the ship while the rest of the crew shout for their crewmate.\n\nLong moments pass, where the only sounds you can hear are the crack of thunder and the heavy patter of the rain on the deck. You're about to give up when you feel something tug on the line in your paws.\n\n\"I've got something!\" you scream. \"Pull!\"\n\nThe rest of the crew piles onto the rope and starts to pull. Slowly, you feel the weight being heaved up the side of the ship. You're about to pull it on board when the wind picks up and you hear a heavy [i]thump[/i] behind you. The rope slides through your paws as you hear a scuffle over your shoulder. \n\n\"We're losing 'em!\" one crew member screams. \n\n\"Grab the line!\" another yells.\n\nYou desperately try to hold the rope in your burning paws,\n*return\n\n*label saved_mouse\n*set flg_savedMouse true\n\nAs the last few raindrops splatter onto your face, Pally walks up to you. \"Thank Man you dogs were on this voyage,\" she says, clapping you on the back. \"I know I speak for the rest of the crew when we say we sure appreciate you helping us out.\"\n\n*choice\n\t#\"Of course you do. Because we're amazing.\"\n\t\t\"Of course you do,\" you say with confidence. \"Because we're amazing.\"\n\n\t\tPally laughs at your boast. \"Can't say you're wrong there. Squawk! Can't say you're wrong at all.\"\n\t\t*set per_ego %+10\n\t\t*goto romance_check\n\t#\"We try our best to be good dogs.\"\n\t\t\"We try our best to be good dogs,\" you say with pride. \"As Man encourages us to be.\"\n\n\t\tPally nods and shakes your ${plc_fur} paw. \"Well, you're certainly the best dogs I've ever met. Squawk!\"\n\t\t*set per_idealist %+10\n\t\t*goto romance_check\n\t#\"We only do what any loyal member of the crew would do.\"\n\t\t\"We only do what any loyal member of the crew would do,\" you say softly. \"We want to make sure we're doing our share.\"\n\n\t\tPally stares for a moment, and then shakes your ${plc_fur} paw. \"That's more than we asked for or deserve. You're fine crewmates! Squawk!\"\n\t\t*set per_loyal %+10\n\t\t*goto romance_check\n\n*label lost_mouse\n\nAs the last few raindrops splatter onto your face, Pally walks up to you. \"It's never easy losing a crewmate,\" she says, not looking you in the eye. \"I know you did what you could, but it's probably best if you avoid the rest of the crew for a few days.\"\n\n*choice\n\t#\"Fine. We don't need them anyway.\"\n\t\t\"Fine,\" you say bitterly. \"We don't need them anyway.\"\n\n\t\tPally shakes her head. \"We all need to pull together on a ship like this. Tempers are high, but I'm hoping we can put this all behind us in a few days.\"\n\t\t*set per_loyal %-10\n\t\t*goto romance_check\n\t#\"People die. Best to move on.\"\n\t\t\"People die,\" you say bluntly. \"It's best if we all just move on and get back to our quest.\"\n\n\t\tPally shrugs. \"I actually agree with you, matey, but the rest of the crew need some time to recover from the shock. I'm sure we can put this all behind us in a few days.\"\n\t\t*set per_idealist %-10\n\t\t*goto romance_check\n\t#\"I feel awful about what happened.\"\n\t\t\"I feel awful about what happened,\" you say, choking back tears. \"I wish there was more we could have done.\"\n\n\t\tPally pats you gently on the back. \"It's a dangerous life on the sea, and sometimes people die. You've a good heart, but I'm sure we can put this all behind us in a few days.\"\n\t\t*set per_tame %+10\n\t\t*goto romance_check\n\n*label romance_check\n\nShe steps away from you, yelling at the crew to get back to work cleaning up the ship after the storm. You're suddenly exhausted by everything, and head belowdeck to rest.\n*page_break Time Passes\nA few days later, and you're feeling better after your ordeal. It's your turn to check the ship. \n*gosub ship_check\n\n*set flg_seaworthiness -1\n*if rel_sonya >= 55\n\t*goto sonya_romance\n*if rel_damian >= 55\n\t*goto damian_romance\n*else\n\t*goto spoiled_grog\n\n*label sonya_romance\nAfter growing bored with wandering around the ship, you notice Sonya standing alone on the edge of the deck, staring out to sea. The rest of the crew seem to either be working somewhere else on the ship, or are sleeping belowdeck. Damian is nowhere to be found.\n\n\"Penny for your thoughts,\" you say, walking up to her.\n\nShe smiles when you approach, but looks confused. \"What's a 'penny'?\"\n\nYou shrug. \"It's some ancient Man phrase Padraig used once in a while. It's a way of asking what you're thinking about.\"\n\n*if flg_sonyaToldDemonStory = false\n\tThe smile fades. \"I'm still thinking about the demon we fought in Houndton. Or, more accurately, the one I [i]didn't[/i] fight.\"\n\n\t\"We were all scared,\" you say, putting a paw on her shoulder. \n\n\tShe shrugged. \"I froze, $!{plc_fname}. That…that thing was threatening to eat us, and I froze.\" She lets out a long sigh. \"I'm terrified of demons, even since…well, ever since my mother was killed.\"\n\n\t*gosub_scene 05-waterdog_port sonyaconfession\n\t*goto sonya_romance_2\n*else\n\t\"The demon thing from Houndton,\" she says, her smile fading a little.\n\n\t\"Are you still scared of it?\" you ask, trying not to push her too hard.\n\n\t\"No,\" she says quietly, and wipes a tear from her eye with the back of her paw. \"I just miss my mom, I guess. Even though she got possessed by the necklace.\"\n\t*goto sonya_romance_2\n\n*label sonya_romance_2\n\n\"I'm sorry you went through that.\"\n\nShe sighs, and stands up a little straighter. \"It felt good to get all that out. I guess I didn't realize how much I was holding on to, you know?\"\n\nYou nod in sympathy. \"I'm always here to listen, if you need someone to talk to.\"\n\nShe looks down at the deck and uses the toe of her boot to trace lines on the deck. \"And maybe…something more?\" she asks quietly.\n\n*choice\n\t#I put my arms around her and give her a hug.\n\t\tYou step closer and put your arms around her, giving her a hug. You close your eyes and feel her strong arms around you, holding you close. You both stand there for a long moment, simply enjoying the embrace.\n\n\t\tAfter a while, she pulls back. Her face is close to yours.\n\n\t\t*choice\n\t\t\t#I lean in and kiss her.\n\t\t\t\t*gosub sonya_kiss\n\t\t\t\t*goto sonya_dating\n\t\t\t#I turn away. I love her, but I don't kiss her.\n\t\t\t\t*gosub sonya_no_kiss\n\t\t\t\t*goto sonya_dating\n\t\t\t#I pull away. I care about her, but not romantically.\n\t\t\t\t*goto sonya_not_dating\n\t#I kiss her on the cheek.\n\t\tYou step closer to her and kiss her on the cheek. She smiles at that, and turns to look at you. Her face is close to yours.\n\n\t\t*choice\n\t\t\t#I lean in and kiss her.\n\t\t\t\t*gosub sonya_kiss\n\t\t\t\t*goto sonya_dating\n\t\t\t#I hug her. I love her, but I don't kiss her.\n\t\t\t\t*gosub sonya_no_kiss\n\t\t\t\t*goto sonya_dating\n\t\t\t#I pull away. I care about her, but not romantically.\n\t\t\t\t*goto sonya_not_dating\n\t#I take her paw in mine and say I feel the same way.\n\t\tYou take her paw in yours. \"I feel the same way,\" you say. \"I also want something more.\"\n\n\t\tShe smiles and looks at you. Her face is close to yours.\n\n\t\t*choice\n\t\t\t#I lean in and kiss her.\n\t\t\t\t*gosub sonya_kiss\n\t\t\t\t*goto sonya_dating\n\t\t\t#I turn away and hug her. I love her, but I don't kiss her.\n\t\t\t\t*gosub sonya_no_kiss\n\t\t\t\t*goto sonya_dating\n\t#I let her down gently.\n\t\t*goto sonya_not_dating\n\n*label sonya_kiss\n\nYou lean in to kiss her, and she returns the kiss enthusiastically. \n*achieve kissdamiansonya\n*return\n\n*label sonya_no_kiss\n\n\"Just a hug for now?\" you say. You turn your head, but hold her tight. You can hear her sigh in your ear—a sigh of contentment.\n*return\n\n*label sonya_dating\nFor a long time you enjoy the embrace, swept up in the emotions of the moment. Then the moment is gone. You release each other at the same time.\n\n\"Well,\" she says, smiling.\n\n\"Well,\" you say, smiling.\n\n\"I…I didn't expect something like this to happen.\"\n\n\"Neither did I.\"\n\n\"But I'm glad it did,\" she says, laying a paw on yours as she stares into your eyes. \"I think I've been slowly falling in love with you since we left Pugmire.\"\n\nYou squeeze her paw with yours, as she continues. \"I'm glad you feel the same way, $!{plc_fname}.\"\n\n\"Me, too.\"\n\nSuddenly, as if embarrassed by the show of affection, she sits up and tugs at her clothing nervously. \"I…uh…I guess I should get back to work,\" she says sheepishly. \n\nYou squeeze her paw once more, and let her go. \"See you around,\" you say. \n\nShe smiles and walks away, humming to herself.\n\n*set flg_sonyaDating true\n*set rel_sonya %+30\n*achieve romancesonya\n*if rel_damian >= 55\n\t*goto damian_romance\n*else\n\t*goto spoiled_grog\n\n*label sonya_not_dating\nYou step back away from her. \"I…I care about you.\" You watch her expression change to one of sorrow as you continue. \"I want to be your friend. But I don't think of you in…that way.\"\n\nWhen you finish, she pulls back as well, her posture slumped. \"Oh. Oh sure. I understand,\" she mumbles, as she wipes her eyes again. \"We should stay focused on the mission anyway.\"\n\n\"Are you okay?\" you ask.\n\nShe laughs. \"Sure. Why wouldn't I be? I just…need some time alone. Okay? Please?\"\n\nYou offer her a hug, but she shakes her head, stepping away from you. Silently, you nod and walk away, leaving her to her thoughts.\n\n*set rel_sonya %-20\n*if rel_damian >= 55\n\t*goto damian_romance\n*else\n\t*goto spoiled_grog\n\n*label damian_romance\nYou decide to head belowdeck and look for something to eat. You find Damian heading back to your shared room, a plate of salted meats balanced precariously in his paw. \"Oh, hey boss,\" he says. \"Want to share a bite with me?\"\n\nYou agree, and the two of you sit down on a bunk, chewing on bits of meat in companionable silence. As you eat, you notice Damian's silver necklace openly dangling from his neck, the half-heart sparkling on his chest in the dim light.\n\n\"Is that the necklace Padraig gave you?\" you ask.\n\nHe nods, and toys with the necklace. \n*if flg_damianToldPadraigStory = false\n\t\"This is all I have to remember Padraig by. And I signed on board this quest partially to help find his killer.\"\n\n\tHearing Padraig's name floods you with emotion.\n\n\t*fake_choice\n\t\t#I'd been trying not to think about him.\n\t\t\tYou'd managed to not think about it for a while now, but suddenly the weight of the grief in your heart is just as heavy as it was standing by his grave. \n\t\t#I'm still furious at his death.\n\t\t\tThe rage at his death still simmers, even when you're not thinking about him. Hearing his name again brings it all back. You want so badly to make his killer pay.\n\t\t#I try not to cry.\n\t\t\tYou hold back the tears. You feel like you've been holding back tears since the funeral. Some days are easier than others. This isn't one of the easy days.\n\n\tYou swallow your own pain and look at Damian.\n\t*gosub_scene 05-waterdog_port damianconfession\n\t*goto damian_romance_2\n*else\n\t\"You know, I never really thanked you for our talk on the way to Waterdog Port.\"\n\n\t\"Of course,\" you say. \"I miss him too. Even if it's not in the same way you do.\"\n\n\tHe nods and puts the necklace away.\n\t*goto damian_romance_2\n\n*label damian_romance_2\n\n\"Do you still…love him?\" you ask, carefully.\n\nDamian chews and thinks for a long time, and then shakes his head. \"No. I mean, I do love him, but not in the same way. It was a long time ago, and we broke up for a reason. I still care…cared for him, and I still want to nail the monster that did this to him.\" He turns and looks at you, directly into your eyes. \"But no. I think someone else has my heart now.\"\n\n*if (flg_sonyaDating)\n\t*goto damian_seeing_sonya\n*else\n\t*goto damian_romance_3\n\n*label damian_romance_3\n*choice\n\t#I put my arms around him and give him a hug.\n\t\tYou slide closer and put your arms around him, giving him a hug. You close your eyes and feel his arms around you, holding you close. You both sit there for a long moment, simply enjoying the embrace.\n\n\t\tAfter a while, he pulls back. His face is close to yours.\n\n\t\t*choice\n\t\t\t#I lean in and kiss him.\n\t\t\t\t*gosub damian_kiss\n\t\t\t\t*goto damian_dating\n\t\t\t#I turn away. I love him, but I don't kiss him.\n\t\t\t\t*gosub damian_no_kiss\n\t\t\t\t*goto damian_dating\n\t\t\t#I pull away. I care about him, but not romantically.\n\t\t\t\t*goto damian_not_dating\n\t#I kiss him on the cheek.\n\t\tYou slide closer and kiss him on the cheek. He smiles at that, and turns to look at you. His face is close to yours. \n\n\t\t*choice\n\t\t\t#I lean in and kiss him.\n\t\t\t\t*gosub damian_kiss\n\t\t\t\t*goto damian_dating\n\t\t\t#I turn away. I love him, but I don't kiss him.\n\t\t\t\t*gosub damian_no_kiss\n\t\t\t\t*goto damian_dating\n\t\t\t#I pull away. I care about him, but not romantically.\n\t\t\t\t*goto damian_not_dating\n\t#I take his paw in mine and say I feel the same way.\n\t\tYou slide closer and take his paw in yours. \"I feel the same way,\" you say. \"Someone has my heart, too.\"\n\n\t\tHe smiles and looks at you. His face is close to yours. \n\n\t\t*choice\n\t\t\t#I lean in and kiss him.\n\t\t\t\t*gosub damian_kiss\n\t\t\t\t*goto damian_dating\n\t\t\t#I love him, but I don't kiss him.\n\t\t\t\t*gosub damian_no_kiss\n\t\t\t\t*goto damian_dating\n\t\t\t#I give him a hug.\n\t\t\t\t*gosub damian_no_kiss\n\t\t\t\t*goto damian_dating\t\t\t\t\n\t#I let him down gently.\n\t\t*goto damian_not_dating\n\n*label damian_seeing_sonya\n\nYou look away. \"I…I'm seeing Sonya now.\"\n\nDamian blinks. \"You're seeing Sonya?\"\n\n\"Yes.\"\n\n\"Like…like romantically?\"\n\nYou nod, still not looking at Damian. There's a long silence. Finally, he lets out a long sigh.\n\n\"Well, it'll take a lot of work, but I suppose I could love even a stubborn puppy like her.\"\n\nYou blink, staring at him in shock. \"I'd have to talk it over with Sonya,\" you stammer.\n\nHe smiles bashfully at you. \"Sure, sure. I guess what I'm trying to say is I'm willing to be with both of you. If you want me to.\"\n\n*choice\n\t#Yes. I lean in and kiss him.\n\t\t*gosub damian_kiss\n\t\t*achieve romancedamian\n\t\t*achieve romancetriad\n\t\t*set flg_damianDating true\n\t\t*set flg_triadDating true\n\t\t*goto damian_dating\n\t#Yes. I don't kiss him, but I give him a hug.\n\t\t*gosub damian_no_kiss\n\t\t*achieve romancedamian\n\t\t*achieve romancetriad\n\t\t*set flg_damianDating true\n\t\t*set flg_triadDating true\n\t\t*goto damian_dating\n\t#I'm not interested in dating both of them.\n\t\t*goto damian_not_dating\n\n*label damian_kiss\n\nYou lean in to kiss him, and he returns the kiss enthusiastically. \n*achieve kissdamiansonya\n*return\n\n*label damian_no_kiss\n\n\"Just a hug for now?\" you ask. You turn your head, but hold him tight. You can hear him laugh and then sigh in your ear—a sigh of contentment.\n*return\n\n*label damian_dating\nFor a long time you enjoy the embrace, swept up in the emotions of the moment. Then the moment is gone. You release each other at the same time.\n\n*set rel_damian %+30\n*if (flg_triadDating)\n\t\"Well,\" he says.\n\n\t\"Well,\" you say, smiling.\n\n\tHe smiles back, and then lets out a long whistle. \"You, me, and Sonya, huh? That's going to take a lot of work.\"\n\n\t\"Of course,\" you say, nodding.\n\n\t\"But it'll be worth it.\"\n\t*goto damian_dating_2\n*else\n\t\"That was nice, boss,\" he says, smiling.\n\n\t\"Boss?\" you say, laughing.\n\n\t\"Force of habit. That was nice, $!{plc_fname}.\"\n\n\t\"I thought so, too.\"\n\t*goto damian_dating_2\n\n*label damian_dating_2\n\nHe fiddles with the empty plate nervously. \"I guess I should take this back to the galley,\" he says loudly, with false bravado. \"I'll catch you later.\" He walks out of the room, joking loudly with a crewmate walking by.\n\n*achieve romancedamian\n*set flg_damianDating true\n\n*if (flg_triadDating)\n\t*page_break\n\tYou slip out and rush to find Sonya. She's leaning on the railing of the ship, still humming. As you approach, she turns and smiles. \"Hello again, $!{plc_fname}.\"\n\n\t\"Hi. Um, I should tell you about me and Damian.\"\n\n\tHer face instantly grows cold. \"Are you breaking up with me? Already?\"\n\n\t\"No no! It's just…I also love Damian, and he and I both…love you.\"\n\n\tNow her face is caught in some state between cold and confused. \"You… [i]and[/i] Damian?\"\n\n\tOh no. You've made her mad.\n\n\tHer face twists through a few more emotions, but finally she laughs, loud and hearty. \"Oh wow. I never thought of Damian that way, but…yeah, okay. I guess I have grown to love the little runt, too.\" She shakes her head. \"It'll take a lot of work.\"\n\n\tYou laugh. \"That's what he said.\"\n\n\tShe shrugs. \"I guess we're more alike than I thought.\" She grabs your ${plc_fur} paw and squeezes it. \"Okay. Let's make this work.\"\n\t*goto spoiled_grog\n*else\n\t*goto spoiled_grog\n\n*label damian_not_dating\n\nYou slide away from him. \"I…I care about you. I want to be your friend. But I don't think of you in…that way.\"\n\nHe pulls back as well. \"Oh. You didn't think I meant [i]you[/i], did you?\" He laughs, but it sounds hollow. \"Wow, way to be egotistical, boss.\"\n\nHe picks up the empty plate. \"I should take this back to the galley anyhow. Thanks for sharing lunch with me,\" he says quickly, before rushing out of the room.\n\n*set rel_damian %-20\n*goto spoiled_grog\n\n*label spoiled_grog\n\n*page_break More Days Pass\n[i]More days pass…[/i]\n\nYou're asleep in your bunk when you hear a sudden booming sound. Instantly awake, you grab your weapon and follow Sonya and Damian up to the deck, ready for an attack. Instead, you see Pally holding one of her pistols as the crew hold their ears and shiver.\n\n\"What's going on?\" Sonya asks. \"Where's the attack?\"\n\nPally laughs. \"No attack, friend. Squawk! We're just doing some training.\"\n\nShe growls, sheathing her sword. \"What kind of training involves explosions first thing in the morning?\"\n\n\"Gunpowder Panic training, of course! Have to make sure the crew aren't shaking in their boots just because a cannon goes off! Squawk!\"\n\n\"What is Gunpowder Panic?\" you ask loudly, to be heard over the ringing in your ears.\n\nDamian shakes his head. \"What?\" he says loudly.\n\n\"Gunpowder Panic!\" Sonya yells.\n\n\"Oh, I heard about that from a sailor friend of mine in the Cat Quarter,\" Damian said. \"Why are you yelling?\"\n\n\"Because some idiot couldn't hear me!\" she yells again, this time much closer to Damian's ears.\n\nPally laughs and waves to her crew. \"Dom, come over and tell our friends about Gunpowder Panic.\"\n\nThe turtle huffs and walks over.\n\n\"You have a name?\" Damian asks in disbelief. \"Why didn't you say?\"\n\n\"Didn't ask,\" Dom says.\n\n*choice\n\t#I smugly pretend I already knew Dom's name.\n\t\t\"I knew his name,\" you say smugly.\n\t\t*set per_ego %+10\n\t\t*goto spoiled_grog_2\n\t#I quietly chastise Damian for his rudeness.\n\t\t\"Damian, be nice,\" you say quietly.\n\t\t*set per_tame %+10\n\t\t*goto spoiled_grog_2\n\t#I apologize to Dom for Damian's oversight.\n\t\t\"I'm sorry, Dom,\" you say politely. \"Damian can be a bit self-absorbed.\"\n\t\t*set per_idealist %-10\n\t\t*goto spoiled_grog_2\n\n*label spoiled_grog_2\n\n\"That's…yeah, okay, that's fair,\" Damian says. \"Sometimes I focus on myself and not others. Apologies.\"\n\nDom shrugs. \"You want to hear this or not? 'Cause I have things to do.\"\n\nSonya sits on the deck. \"Please, tell us. I'm sure it'll help us if we get attacked again.\"\n\nDom nods. \"It's a long story.\" You all take a seat, as Dom clears his throat and begins.\n\n*page_break\n\"Gunpowder is the stuff we use in pistols and cannons. When it explodes, dogs, cats, and other people get really scared of it. The more you get used to the noises, though, the easier it is to shake off the fear.\"\n\nA long silence followed.\n*page_break\nDamian blinks. \"Wait, that's it? I thought this was a long story!\"\n\nDom shrugs again. \"It was for me.\"\n\nSonya smiles. \"I like him,\" she says.\n\nPally waves her arms. \"There's more, of course. The history of gunpowder trading through Waterdog Port, for example. And I know a crow on the [i]Twisted Tortoise[/i] that has a fascinating explanation for why gunpowder wasn't used in the War of Dogs and Cats. You see…\"\n\n\"Pally!\" You hear Sabu's roar from his office. \"You better not be telling stories out there during training!\"\n\nPally runs to the office. \"No, Captain! Squawk! I was just explaining to the newcomers about Gunpowder Panic, and…\" Her voice fades away as she closes the door behind her.\n\nDom points to you. \"$!{plc_fname}. Check the ship before Pally gets back.\"\n\nSaluting, you begin your exploration.\n*gosub ship_check\n\nAs you're finishing up your review, you check on the supply of grog. Sabu once explained to you a crew's supply of fresh water is vital for any trip, and the waters of the Acid Sea aren't safe to drink. But barrels of pure water can become spoiled, so the water is mixed with a few ingredients to keep it from becoming tainted, as long as the barrels are sealed properly. Over the weeks you've been aboard the ship, you've gotten used to seeing the wooden barrels held tight with rubber and wax.\n\nBut as you examine the current barrel being used to water the crew, you notice something odd. You manage to push the barrel to the side a little, and you notice around the back that part of the seal has burst. It looks like maybe something fell on it and broke a small edge of the seal. There's no telling how long it's been like that, which means you don't know if the water is safe.\n\nThe water the crew have been drinking for a few days now.\n\nYou rush back to the deck, just in time to see Dom grab his stomach and fall to the ground.\n\n*page_break\nAnother member of the crew, a cat, groans and clutches their stomach.\n\n\"They're sick!\" Damian says. \"We have to tell the captain.\"\n\nSonya strides to the office and pounds on the door. Within a few moments you've explained the situation to Sabu and Pally. \"I can try and purify the current barrel,\" Sabu says. \"And the crew won't die from it. They'll just be uncomfortable for a while.\"\n\nFor the next several hours, you help Sabu and Pally take care of the sick crewmembers. It turns out not many of the crew drank from the tainted grog, but those that did are sent belowdeck to sleep it off. Pally shakes her feathers in frustration. \"Those who aren't affected will have to work double shifts,\" she mutters. \"Morale is going to be low. Have any ideas on how to help with crew morale?\"\n\n*choice\n\t#I lead the crew in prayer to Man for their safe passage.\n\t\tYou offer to lead the crew in prayer to Man. Pally is skeptical, but agrees to let you try. So, the next morning, you gather all the overworked crew on the deck.\n\n\t\t\"We congregate here in the eyes of the Old Ones to ask for their help during this dangerous time,\" you intone, your paws pressed together in prayer. \"For do they not tend to us when we are sick? Do they not feed us medicine to make us well? Do they not stroke our fur and tell us it will get better? Yes, all this Man does for us, and more. This is why they are our best friends.\"\n\n\t\t*set per_idealist %+10\n\t\t*if (plc_calling = \"Shepherd\") or (att_friendly >= 60)\n\t\t\tAll the crew listen in rapt attention. Even the cats, mice, and birds listen. One mouse sits in the shadows, trying not to be seen, but you see them discreetly wipe away a small tear. You raise your paws to the sky and say with relish \"All praise to the Old Ones!\"\n\n\t\t\t\"All praise!\" the crew echo. They head back to their chores, but you see the smiles of contentment on their faces.\n\t\t\t*set rep_crew %+10\n\t\t\t*set flg_raisedMorale true\n\t\t\t*goto pirates_attack\n\t\t*else\n\t\t\tThe dogs in the crew listen in rapt attention. However, the cats, mice, and birds grumble among themselves. \n\n\t\t\t\"What has Man done for us lately?\" one asks.\n\n\t\t\t\"Yeah, seems like only dogs get anything out of this,\" another complains.\n\n\t\t\tYou can see them get up and walk back to their stations. The dogs, disquieted by the dissent, also sheepishly stand up and return to work. The crew seems, if anything, more tense than ever.\n\t\t\t*set rep_crew %-10\n\t\t\t*goto pirates_attack\n\t#I spar with them to work off their aggression.\n\t\tYou offer to spar with some of the crew to distract them. Pally is skeptical, but agrees to let you try. So, the next morning, you gather all the overworked crew on the deck.\n\n\t\t\"Okay, let's have some fair fights,\" you say, after sketching out a rough ring on the deck with some lines. \"No gouging, no biting, no spitting, and nothing below the belt.\"\n\n\t\t\"Yeah,\" says Damian. \"Save all that for the cat pirates when we catch up with them.\"\n\n\t\t*set per_tame %-10\n\t\t*if (plc_calling = \"Stray\") or (att_mighty >= 60)\n\t\t\tThe crew eagerly line up, one at a time. Some fight each other, but a few want to spar with you. Your strength is more than adequate to the task, but you're careful not to hurt anyone. After an hour of scrapping, everyone in the crew looks a little sore as they head back to their chores. You can see the smiles of contentment on their faces.\n\t\t\t*set rep_crew %+10\n\t\t\t*set flg_raisedMorale true\n\t\t\t*goto pirates_attack\n\t\t*else\n\t\t\tThe crew, confused, slowly line up, one at a time. Some try to fight each other, but the friendly matches quickly turn into bitter fights. Two mice actually start biting each other. You try to pull them apart, but you're not strong enough to keep the fierce combatants away from each other for too long.\n\n\t\t\tEventually, you call a halt to the fights, and everyone heads back to their stations. The crew seems, if anything, more tense than ever.\n\t\t\t*set rep_crew %-10\n\t\t\t*goto pirates_attack\n\t#I play subtle and funny pranks on them to distract them. \n\t\tYou offer to play pranks on the crew to help them laugh. Pally is skeptical, but agrees to let you try. By the next morning, you have a series of pranks all planned out: putting coal dust around the rim of a spyglass, tying a line around a crew member's leg, and even putting an inflatable bladder in the crow's nest that will make an embarrassing sound. With your plan ready, you start sneaking around the ship to put it into action.\n\n\t\t*set per_loyal %-10\n\t\t*if (plc_calling = \"Ratter\") or (att_sneaky >= 60)\n\t\t\tEverything goes perfectly. With everyone so stressed out because of the extra work, they don't pay much attention when you offer to \"help\" with key items around the ship. Once you've done everything, you sit back and watch.\n\n\t\t\tThe sea is still and quiet when a loud farting sound comes from the crow's nest. The crew all chuckle, but the mouse on duty isn't amused. They climb down from the nest, shaking the spyglass, and you can see one eye is ringed in black. \"Who messed with my area?\" they squeak in indignation. The chuckles turn to laughs as one of the birds goes to help the mouse, and trips and falls on the deck. After a moment, the mouse and bird join them, and soon everyone is rolling on the ground, holding their sides from the laughter.\n\n\t\t\tEventually, everyone wipes the tears of joy from their eyes and gets back to their chores. You can see the smiles of contentment on their faces.\n\t\t\t*set rep_crew %+10\n\t\t\t*set flg_raisedMorale true\n\t\t\t*goto pirates_attack\n\t\t*else\n\t\t\tUnfortunately, everything goes wrong. Your attempt to sneak up to the crow's nest is thwarted by the mouse on duty. \"Hey, what are you doing up here?\" they ask, surly from exhaustion.\n\n\t\t\t\"I just want to help,\" you say, innocently.\n\n\t\t\t\"Help? With a pawful of coal and a bladder? Go back to the deck and 'help' someone else!\"\n\n\t\t\tBy the time you make your way back down, the rest of the crew has overheard your exchange, and they all shy away from you, making it impossible to do any of your planned pranks. They all view you suspiciously and, if anything, seem more tense than before.\n\t\t\t*set rep_crew %-10\n\t\t\t*goto pirates_attack\n\n*label pirates_attack\n\n*page_break More Days Pass….\nAfter several more days, it's your turn to check the ship's seaworthiness again. \n*gosub ship_check\n\n*set flg_seaworthiness -1\nAs you finish your review, you hear Pally yelling on the deck. \"Ship astern! Check her colors, crew!\" \n\nThe crow in the crow's nest puts a spyglass to his eye, and then calls down \"It's the [i]Green Plague[/i], ma'am!\"\n\n\"Squawk! Just our luck,\" Pally says to herself.\n\n\"What green plague?\" Damian asks, walking over.\n\n\"How can a plague have a color?\" Sonya adds.\n\n\"It's the name of a ship,\" Pally clarifies. \"A large, notorious, and heavily-armed pirate ship. Her captain is Phineas Twelve Beaks, the most violent pirate on the Acid Sea.\"\n\nThe crew around you start to whisper at the mention of Phineas Twelve Beaks. As you discuss, Sabu emerges from his office. \"What's all the ruckus?\" he asks.\n
