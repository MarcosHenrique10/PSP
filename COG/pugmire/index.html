\nPally points out to the green dot on the horizon. \"It's the [i]Green Plague[/i], sir. Squawk!\"\n\nSabu puts a pair of binoculars to his eyes. \"Hrm. She looks like she's heading right for us. Do we know her armaments?\"\n\nThe turtle, listening to this conversation, steps forward. \"Six cannons and one magical lightning staff, Cap'n,\" he says, laconically.\n\nSabu ponders the situation. \"The way I see it, we have our choice of some bad options,\" he says eventually. \"But I think our best bet is to trick them into boarding us.\"\n\n\"How will we do that?\" Sonya asks.\n\n\"[i]Why[/i] would we do that?\" Damian asks.\n\n\"To answer the second question,\" the lizard says, \"if we can spread their crew thin, we might have a chance to escape before they can use their guns against us. As for the first question…\"\n\nSuddenly, you have an idea.\n\n*choice\n\t#We surrender.\n\t\t\"We surrender,\" you say suddenly. \"They'll come on board, not expecting a fight. Then we can deal with them one-on-one.\"\n\t\t*set per_ego %-10\n\t\t*goto plague_surrender\n\t#We fake an attack.\n\t\t\"We fake an attack,\" you say suddenly. \"They'll respond, but when they think they have us on the ropes, they'll come on board. They'll think we're cowed, so they won't be expecting a fight. Then we can deal with them one-on-one.\"\n\t\t*set per_ego %+10\n\t\t*goto plague_fake_attack\n\t#We run.\n\t\t\"We run,\" you say suddenly. \"They'll probably catch us, but when they board, they'll think we're scared of them, so they won't expect a fight. Then we can deal with them one-on-one.\"\n\t\t*set per_tame %+10\n\t\t*goto plague_flee\n\n*label plague_surrender\n\n\"Then it's settled,\" Sabu says. \"Pally and $!{plc_fname}, put up the white flag.\"\n\nPally salutes, and you both tell the crew the plan. As the green-colored ship comes more and more into view, the crew hastily pull on lines, raising a white flag to the top of their mast. \n*goto plague_boarding\n\n*label plague_fake_attack\n\n\"Then it's settled,\" Sabu says. \"Pally and $!{plc_fname}, fire the cannons.\"\n\nPally salutes, and you both tell the crew the plan. As the green-colored ship comes more and more into view, the crew hesitantly fires on it, making sure their shots fall short of their target. Suddenly, a lightning bolt cracks from the rival ship, and burns a hole in one of your sails.\n\n\"The flag!\" Pally screams. \"Put up the white flag! Squawk!\"\n\nHastily, the crew pull on lines, raising the white flag to the top of their mast, while others replace the damaged sail.\n*goto plague_boarding\n\n*label plague_flee\n\n\"Then it's settled,\" Sabu says. \"Pally and $!{plc_fname}, let's try to put some distance between us and that ship.\"\n\nPally salutes, and you both tell the crew the plan. They hastily pull on lines, and for a while the green-colored ship grows smaller, into the distance. Suddenly, a lightning bolt cracks from the rival ship, and burns a hole in one of your sails.\n\n\"The flag!\" Pally screams. \"Put up the white flag! Squawk!\"\n\nThe crew speedily raises the white flag to the top of their mast, while others replace the damaged sail.\n*goto plague_boarding\n\n*label plague_boarding\n\nSlowly, the bottle-green ship pulls alongside [i]The Pig's Tale[/i]. The vibrant color tries to draw your eye, but you can't help but notice the cannons alongside.\n\n\"We need to neutralize the gunners,\" Sonya says, fidgeting with her scabbard. \"Take them by surprise, and then sail off.\"\n\nYou nod, and watch as the crew of the green ship throws ropes tied to hooks. They're a motley collection of sea dogs and sailing cats, covered in earrings and scars. A few have tattoos on their gums, or on skin showing through patchy fur. They leer and snarl as they work to secure the two boats together.\n\nA scarred owl walks to the side of the [i]Green Plague[/i]. Even from here, you can see a dark scar across one eye, which has been replaced with a false eye made of gold. His feathers are bone white, and he wears a deep blue coat and hat as he stares at the ship. \n\n\"Who among you is captain?\" he says, his deep voice managing to be heard over the waves and the susurrus of the sea.\n\nSabu steps forward. \"I am Sabu Chromachilde, captain of the [i]Pig's Tale[/i].\"\n\nThe owl smiles. \"I am Phineas Twelve Beaks, captain of the [i]Green Plague[/i]. I simply wanted to know the name of the captain who was about to die.\" He turns to his crew. \"Kill them all. We'll salvage the ship once we baptize its decks in blood.\"\n\nThe crew gives a bloodthirsty roar, and starts to swing over to your ship! Luckily, all of you were prepared for this, and everyone in Sabu's crew draws weapons before the pirates can get on board. One pirate, a mangy dog with a rusty knife and equally rusty mismatched armor, drops in front of you. \"I'll cut your heart out and eat it for breakfast!\" he snarls.\n\n*choice\n\t#I stab the pirate with a mighty sword thrust.\n\t\tYou step forward, lunging at the pirate dog with your sword. You feel the sword \n\t\t*set att_mighty %+05\n\t\t*if att_mighty >= 60\n\t\t\tstrike through a gap in the pirate dog's rusty armor. \n\n\t\t\t\"No breakfast for you today,\" you mutter. In reply, the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Good work!\" one of the cats in your crew says, as she crosses swords with another pirate.\n\t\t\t*set rep_crew %+05\n\t\t\t*goto release_the_ship\n\t\t*else\n\t\t\tslice the air next to the pirate dog's head. The dog lashes out with a foot, knocking you to the deck. As the pirate raises his knife to finish you off, one of the cats in your crew stabs him in the back. You try to think of something to say as the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Watch yourself!\" the cat snarls at you, as she turns to cross swords with another pirate.\n\t\t\t*set rep_crew %-05\n\t\t\t*goto release_the_ship\n\t#I dodge the pirate's knife thrust and hit them from the side.\n\t\tThe pirate dog steps up and tries to stab you. You step to the side, and \n\t\t*set att_agile %+05\n\t\t*if att_agile >= 60\n\t\t\tthe knife slices the air. You lash out with a foot, knocking the dog to the ground. The knife bounces away, and you kick it overboard before the pirate can scramble to his feet. He turns to grab you, but you stab the pirate in the chest. \n\n\t\t\t\"No breakfast for you today,\" you mutter. In reply, the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Good work!\" one of the cats in your crew says, as she crosses swords with another pirate.\n\t\t\t*set rep_crew %+05\n\t\t\t*goto release_the_ship\n\t\t*else\n\t\t\tthe knife just slices across your stomach. You stumble and fall to the deck, and your weapon falls out of your paw. As the pirate raises his rusty knife to finish you off, one of the cats in your crew stabs him in the back. You try to think of something to say as the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Watch yourself!\" the cat snarls at you, as she turns to cross swords with another pirate.\n\t\t\t*set rep_crew %-05\n\t\t\t*goto release_the_ship\n\t#I trick the pirate into falling for a trap I've already set.\n\t\tBefore the [i]Green Plague[/i] came alongside the ship, you opened one of the doors used to haul freight out of the hold, and threw a heavy tarp over it. Now, the pirate dog lunges forward to try and stab you. You step backwards, luring him to your trap. As he does so, you dance out of his way. \n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky >= 60\n\t\t\tHe steps onto the tarp, intending to turn and face you, but instead he falls through the tarp with a loud crash. Glancing over the edge, you see he's unconscious.\n\n\t\t\t\"No breakfast for you today,\" you mutter.\n\n\t\t\t\"Good work!\" one of the cats in your crew says, as she crosses swords with another pirate.\n\t\t\t*set rep_crew %+05\n\t\t\t*goto release_the_ship\n\t\t*else\n\t\t\tSeeing the way you're moving, he glances at the tarp on the ground and carefully steps next to it, avoiding the trap you set up. Trying to pay attention to both you and the tarp, he doesn't notice one of the cats in your crew sneaking up to stab him in the back. You try to think of something to say as the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Watch yourself!\" the cat snarls at you, as she turns to cross swords with another pirate.\n\t\t\t*set rep_crew %-05\n\t\t\t*goto release_the_ship\t\t\t\t\n\t*selectable_if (flg_hasMagic) #I zap the pirate with a spell.\n\t\tCalling on your mystical knowledge, you carefully speak the magic words. There's a \n\t\t*set att_clever %+05\n\t\t*if att_clever >= 60\n\t\t\tloud [i]crack[/i] and the smell of ozone, and lightning leaps through the air and into the rusty armor of a pirate dog. The metal of the armor glows, and you smell burning fur.\n\n\t\t\t\"No breakfast for you today,\" you mutter. In reply, the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Good work!\" one of the cats in your crew says, as she crosses swords with another pirate.\n\t\t\t*set rep_crew %+05\n\t\t\t*goto release_the_ship\n\t\t*else\n\t\t\tsmall puff of smoke, but nothing else. The pirate dog you were aiming at leers and stalks toward you. As the pirate raises his knife to finish you off, one of the cats in your crew stabs him in the back. You try to think of something to say as the dog gasps and slides to the deck, dead.\n\n\t\t\t\"Watch yourself!\" the cat snarls at you, as she turns to cross swords with another pirate.\n\t\t\t*set rep_crew %-05\n\t\t\t*goto release_the_ship\n\n*label release_the_ship\n\nYou fight your way over to Damian and Sonya, who are fighting to keep the pirates off of Sabu and Pally.\n\n\"Could use a paw here, boss!\" Damian says, as he ducks a slashing cut from a saber.\n\n\"No,\" Sabu says, flinging salt into another pirate's eyes. \"Now that most of their crew are over here, we need to cut the other ship loose and pull away before they can arm their cannons.\"\n\n\"We'll clear a path for you, $!{plc_fname},\" Sonya says, shoving a third pirate away from her.\n\n\"What about you two?\" Damian says to Pally and Sabu.\n\n\"Don't worry about us! Squawk!\" Pally says, pulling a pistol from her belt. \"Just cover your ears!\"\n\nThe four of you manage to do so just in time. An ear-splitting explosion erupts from the pistol, and the pirate Sonya shoved flies over the railing and into the sea.\n\n*if att_solid \u003c 60\n\tYou tremble in fear as your ears ring from the blast, and \n\t*goto panic\n*else\n\tYour ears ring from the blast, and \n\t*goto panic\n\n*label panic\nthe other pirates also cover their ears.\n\n\"They'll only be disoriented for a moment!\" Sabu cries. \"Cut the lines!\"\n\nYou run over to the lines, and…\n\n*choice\n\t#…pull the hooks off the ship with my mighty strength.\n\t\tYou try to grab a line and pull the hook out of the wood. The planks splinter and crack, but \n\t\t*set att_mighty %+05\n\t\t*if att_mighty >= 60\n\t\t\twith a mighty heave you're able to pull the heavy hook out. Before the pirates can recover, you're able to remove all the hooks.\n\t\t\t*set flg_seaworthiness -1\n\t\t\t*goto pull_away\n\t\t*else\n\t\t\tthe hook doesn't budge. \"Need a paw,\" you yell to a nearby crew member. The dog steps to your side, and with a mighty [i]crack[/i] of wood shattering, both of you are able to remove the hook. The pirates start to recover, so the two of you swiftly work to remove the other hooks.\n\t\t\t*set flg_seaworthiness -2\n\t\t\t*goto pull_away\n\t#…quickly slash the lines with my blade.\n\t\tYou quickly grab a line and slash at it with your blade. The strain on the embedded hook causes the planks to splinter and crack, but the rope frays, \n\t\t*set att_agile %+05\n\t\t*if att_agile >= 60\n\t\t\tand your quick slashes cause it to snap in short order. The other half of the line falls into the sea. Before the pirates can recover, you're able to cut the rest of the lines.\n\t\t\t*set flg_seaworthiness -1\n\t\t\t*goto pull_away\n\t\t*else\n\t\t\tslowly, under each slash. You won't cut the line before the pirates recover. \"Need a paw,\" you yell to a nearby crew member. The dog steps to your side, pulling out a cutlass and slashing at another line. Eventually, in frustration, the dog pulls the hook out with a mighty [i]crack[/i] of wood shattering.\tThe pirates start to stir, so the two of you swiftly work to cut the remaining lines.\n\t\t\t*set flg_seaworthiness -2\n\t\t\t*goto pull_away\n\t#…convince the crew to all take a line and throw it off.\n\t\t\"Come on,\" you yell to the crew. \"Help me grab these hooks and throw the lines off!\"\n\t\t*set att_friendly %+05\n\t\t*if att_friendly >= 60\n\t\t\tThe crew quickly jump to help you. They slash at lines with their swords and pull hooks out of the wood. The lines fray as the planks splinter and crack, but before the pirates can recover, all of the hooks and lines have been removed and thrown into the sea.\n\t\t\t*set flg_seaworthiness -1\n\t\t\t*goto pull_away\n\t\t*else\n\t\t\tThe crew aren't sure what to do. Pally squawks loudly to jump to it before they obey. Unfortunately, the pirates are already starting to stir as the crew slash at lines with their swords and pull hooks out of the wood. The planks are badly damaged in their haste, as you hear the wood shatter with a loud [i]crack[/i]. But all the hooks and lines are removed and thrown into the sea.\n\t\t\t*set flg_seaworthiness -2\n\t\t\t*goto pull_away\n\t*selectable_if (flg_hasMagic) #…set the lines on fire with my magic.\n\t\t\"I'll set fire to the lines!\" you say, preparing a spell. You feel the mystical energy flowing through your paws, as the lines all burst into flame. Both the crew and the pirates recoil in surprise and horror. \"What have you done?\" Sabu yells.\n\n\t\t*set att_clever %+05\n\t\t*if att_clever >= 60\n\t\t\tYou don't answer him, keeping your concentration on the spell. A few flames lick the wood, causing it to char and crack, but you're able to control it as it burns through the ropes. Before the pirates can recover, the flaming lines part and fall into the sea.\n\t\t\t*set flg_seaworthiness -1\n\t\t\t*goto pull_away\n\t\t*else\n\t\t\tThen you realize his terror. The fire goes out of control, burning the wood around the lines. You can smell it char and hear the wood splinter with a loud [i]crack[/i]. The crew recovers from their shock and scrambles to put the fire out. Through the smoke you can see the planks are badly damaged, but before the pirates can recover, the flaming lines part and fall into the sea.\n\t\t\t*set flg_seaworthiness -2\n\t\t\t*goto pull_away\n\n*label pull_away\n\n\"All clear!\" you yell to Sabu.\n\nThe pirates, realizing what's happening, shake off their fear and try to scramble back to their ship. But the crew of [i]The Pig's Tale[/i] are already grabbing sail lines and steering the ship away from [i]The Green Plague[/i]. The wind kicks up, and the sails billow as the ship pulls away. You can see Phineas Twelve Beaks scramble to one of the cannons, trying to man it all by himself. But it's too late. Soon his ship is just a green spot on the horizon, where you see a pathetic little explosion.\n\nSabu claps you on the back. \"Excellent work, my friend. Excellent!\" He turns to the pirates, who have been rounded up and tied down by the crew. \"And what will we do with these, hrm?\"\n\n\"We can always use more crew, cap'n,\" Pally says.\n\n\"These scoundrels?\" Sonya snarls. \"They'll stab you in the back first chance they get. We can't trust these pirates any more than we can Greedy Bow and his crew of mangy cats.\"\n\n\"They'll be loyal if you pay them well,\" Damian counters. \"They're just mercenaries. They love plastic more than anything. And we need every paw we can get if we want to get after that black-hearted bird Ambrosia.\"\n\n*if (flg_triadDating)\n\tSonya looks like she's about to say something, but stops and takes a deep breath instead. \"Look. $!{plc_fname} told me about you two.\"\n\n\tDamian instantly becomes angry. \"Why does that matter?\"\n\n\t\"It matters because…I love you, too. That doesn't mean I'll always [i]agree[/i] with you…\"\n\n\tHe snorts. \"That'll never happen.\"\n\n\t\"…but,\" Sonya continues, \"I do want to be better about listening.\" She waves a paw at the captured pirates. \"They did try to kill us, and we should consider that.\"\n\n\tDamian cocks a head, and nods. \"Okay. That's…a lot to unpack, and we'll talk later, but let's just say for the moment that I agree and want to make this work.\" He crosses his arms. \"But I don't think we should kill them in cold blood. That would make us as bad at them.\"\n\t*goto pull_away_2\n*else\n\t\"Why do you have to fight me on [i]everything[/i]?\" Sonya screams at Damian.\n\n\t\"I wouldn't have to fight you if you weren't wrong all the time!\" Damian yells back. \"Besides, what's the alternative? Throw them overboard and let them drown?!\"\n\n\t\"Why not? They were trying to [i]kill us[/i].\"\n\t*goto pull_away_2\n\n*label pull_away_2\n\nHe turns to you. \"Boss, what do you think?\"\n\n*page_break\nBefore you can say anything, Sabu steps between Sonya and Damian. \"You are guests on my ship. With the emphasis on [i]mine[/i]. While I don't mind asking $!{plc_fname} for advice from time to time, in the end I'm the one to makes the calls.\" He turns to look at Sonya. \"We're not throwing them overboard.\" He then looks at Damian. \"But they're not joining my crew, either. They'll be held prisoner belowdeck until we can find a port to drop them off in.\"\n\n*if (flg_triadDating)\n\t\"Fine,\" both dogs say in unison. They turn to look at each other in shock, and then laugh.\n\n\t\"We need to talk some things out anyway,\" Sonya says.\n\n\t\"Yeah,\" Damian agrees. \"And talk about $!{plc_fname} behind ${plc_his} back.\" He winks at you as the two walk away, arm in arm.\n\t*goto sabu_interrupts_2\n*else\n\t\"Fine,\" Sonya spits out.\n\n\t\"Fine,\" Damian mutters.\n\n\tThe two dogs turn and stalk away from each other, each fuming.\n\t*goto sabu_interrupts_2\n\n*label sabu_interrupts_2\n\nYou sigh and put your paw over your eyes. It already feels like you've been sailing for a thousand years.\n*achieve endchapter6\n*finish [i]Chapter Seven: Red Sand Island[/i]\n\n*label ship_check\n\nYou look around for a while, and \n*if flg_seaworthiness = 4\n\taside from a few scrapes along the plastic hull and the occasional broken board, the ship is in good condition.\n\t*return\n*elseif flg_seaworthiness = 3\n\tyou notice a couple of patched holes in the hull, but the ship seems to be sailing okay.\n\t*return\n*elseif flg_seaworthiness = 2\n\tyou see some big holes in the hull. The crew's managed to patch them, but a little seawater is leaking in.\n\t*gosub fix_ship\n\t*return\n*elseif flg_seaworthiness = 1\n\tyou notice the ship groans and creaks as each wave hits it. The crew is constantly patching some large holes in the hull, and bailing seawater out of the hold. You're just barely holding together.\n\t*gosub fix_ship\n\t*return\n*elseif flg_seaworthiness \u003c= 0\n\t*goto ship_sinks\n*else\n\t*return\n\n*label fix_ship\n*if flg_emergency_fix = false\n\tYou might be able to use some of the ship's emergency supplies to fix the ship, but after you use them, they'll be gone and you'll be at the mercy of the Acid Sea.\n\n\t*choice\n\t\t#I use the supplies to fix the ship.\n\t\t\tDigging out the supplies, you manage to patch some of the largest holes in the hull. Your paws sting as the waters of the Acid Sea wash over you, making you hurry your repairs as much as you can. The finished job isn't perfect, but hopefully it'll keep you together long enough to catch up to Greedy Bow.\n\t\t\t*set flg_emergency_fix true\n\t\t\t*set flg_seaworthiness +1\n\t\t\t*return\n\t\t#I wait for a while.\n\t\t\tYou decide the ship can hold together a little longer. Best to hold on to them until you [i]really[/i] need them.\n\t\t\t*return\n\t\t#I tell Sabu about the damage.\n\t\t\tYou think it's best to tell the captain about the damage, and see what he says. Once you show him the damage, he nods. \"Best to get it fixed right away,\" he says. \"You never know what's going to hit.\" Nodding, you manage to patch some of the largest holes in the hull. Your paws sting as the waters of the Acid Sea wash over you, making you hurry your repairs as much as you can. The finished job isn't perfect, not perfect, but hopefully it'll keep you together long enough to catch up to Greedy Bow.\n\t\t\t*set flg_emergency_fix true\n\t\t\t*set flg_seaworthiness +1\n\t\t\t*return\n*else\n\tUnfortunately, you've already used up the ship's emergency supplies. You just have to hope the ship will hold together for a while longer.\n\t*return\n\n*label ship_sinks\nas you check the ship's hold, one of the patches in the hull bursts. Acidic seawater gushes into the hold. Immediately, crew members scamper down into the hold. Three desperately try to put a tarp over the hole to stop the water long enough to patch it again, but the planks around the hull crack from the pressure. The hole doubles in size, and the tarp is dashed out of the crew's paws. Water fills the hold swiftly, and one cat crew member is lost in the water and gets sucked through the hole into the Acid Sea.\n\nCries of \"We're going down!\" and \"Crew overboard!\" ring throughout the ship. You, Damian, and Sonya desperately try to carry buckets of water out of the hold along with the rest of the crew, but it's too little, too late. After an hour of trying, the hold is so full of water you can't even touch the bottom without swimming down to it. Everyone's skin flakes and burns after hours of being in the stuff.\n\nIn desperation, Damian grabs the lapels of Captain Sabu's coat. \"You've got to stop this!\" he screams.\n\nSabu shakes his head sadly as he carefully pulls Damian's paws off his lapels. \"There's nothing we can do. This is the fate we struggle against every day on the Acid Sea. Most of the time, it's smooth sailing.\" He looks out over the water. \"Not this time.\"\n\nYou drop to the deck and put your head in your paws, as the crew break out the lifeboats. You never expected your adventure to end this way. You stumble in a daze as Damian and Sonya drag you and your supplies into one of the small boats, which is unceremoniously shoved into the water. The three of you can do little but watch as [i]The Pig's Tale[/i] slowly sinks into the sea.\n\nDays go by. The three of you try to row with the rest of the crew, but without any features in the area it's hard to tell where you're going. You ration out your supplies, but after a couple of weeks they're all gone. Thirsty and hungry, you stare out onto the endless sea, hoping against hope that another ship will find you.\n\nIt never does.\n\n[i]The End[/i]\n*achieve badending\n*ending\n", "07-island": "*temp flg_sonyaDiver false\n*temp flg_defeatAmbrosia false\n*text_image chap_7.png center [b]Chapter Seven: Red Sand Isle[/b]\n\nOver time, as the sick members of the crew get better, you've taken to doing more chores around the ship to help out. One afternoon, you are mopping the deck of the ship, thinking about how eventful your voyage has been so far. \n\n*if ((flg_savedMouse = true) and (flg_raisedMorale = true))\n\tYou've been a huge asset to the crew, both saving a mouse from drowning after they were washed overboard and raising the crew's morale after you discovered the tainted barrel of grog. \n\t*goto dating_check\n*elseif (flg_savedMouse)\n\tYou saved a mouse from drowning after they were washed overboard. However, you didn't manage to raise the crew's morale after you discovered the tainted barrel of grog. \n\t*goto dating_check\n*elseif (flg_raisedMorale)\n\tYou weren't able to save a mouse from drowning after they were washed overboard. However, you did raise the crew's morale after you discovered the tainted barrel of grog. \n\t*goto dating_check\n*else\n\tYou haven't been a great help to the crew. You weren't able to save a mouse from drowning after they were washed overboard, nor were you able to raise the crew's morale after you discovered the tainted barrel of grog. \n\t*goto dating_check\n\n*label dating_check\n*if (flg_triadDating)\n\tYour traveling companions have (somewhat surprisingly) become your lovers. You've spent your time aboard ship talking long into the night, learning more about each other and adjusting to this new dynamic. Damian and Sonya still bicker, of course, but it's more good-natured than before.\n\t*goto spotted_ship\n*elseif (flg_sonyaDating)\n\tSonya has become your lover. The two of you spend your time aboard ship talking long into the night, learning more about each other or just enjoying each other's company. \n\t*goto spotted_ship\n*elseif (flg_damianDating)\n\tDamian has become your lover. The two of you spend your time aboard ship talking long into the night, learning more about each other or just enjoying each other's company. \n\t*goto spotted_ship\n*else\n\t*set flg_nobodyDating true\n\t*goto spotted_ship\n\n*label spotted_ship\nOf course, you have a collection of ruthless pirates as prisoners. All in all, this voyage has certainly been eventful.\n\nYour reminisces are cut short as Pally rushes up to you. \"Come to the Captain's office,\" she says. \"We have news. Squawk!\"\n\nLeaving the mop on the deck, you head to Sabu's office. The lizard has a map unrolled over his desk.\n\n\"Russel thinks he's spotted our quarry,\" Sabu says without preamble.\n\n\"Russel?\" you ask.\n\n\"He was on shift in the crow's nest this morning,\" Pally says. \"The bird with the black feathers. Surely you've learned everyone's name by now?\"\n\nSabu ignores this jab at your memory and points to the chart. \"It looks like they're heading to Red Sand Isle. A small island without many features.\"\n\n\"Nobody goes there,\" Pally agrees. \"So it seems like Greedy Bow knows something we don't. Squawk!\"\n\n*fake_choice\n\t#\"Why doesn't anyone go there?\"\n\t\t\"Mainly because there's nothing of value on it. But there's another reason.\" Sabu points to another part of the map, picturing a hideous-looking octopus. \n\t#\"Is it dangerous?\"\n\t\tSabu nods, and points to another part of the map, picturing a hideous-looking octopus. \n\t#\"Do you think something's buried there?\"\n\t\tSabu shrugs. \"It's possible, but it would be intensely foolhardy to do so.\" He points to another part of the map, picturing a hideous-looking octopus. \n\"There are tales that monsters lurk nearby.\"\n\n\"The kraken,\" Pally whispers in horror.\n\nThe captain rolls up the chart with a snap of his wrist. \"And for all we know, tales are all they are. We need to catch up with that ship, first mate.\"\n\nPally salutes, her feathers quivering slightly. \"Aye aye, Captain,\" she says, and leaves the office.\n\n\"You and your friends should get ready,\" he says. \"I'm not sure what we'll encounter, but whether it's another bloodthirsty pirate crew or an abomination from the deep, having a few extra sword arms ready can only help.\"\n\nYou salute as well, and rush off to tell Sonya and Damian.\n\n*page_break\nSoon, everyone is on deck. The crew are running back and forth, while Russel calls out sightings of [i]The Cat's Meow[/i] from the crow's nest. Sonya grips her sword harder, while Damian idly flips a plastic coin in the air over and over.\n\n\"Can you stop doing that?\" Sonya says, irritated.\n\n\"Sure, I can,\" Damian says. \"But I won't.\"\n\n*choice\n\t#I encourage both of them to calm down.\n\t\tYou glance at both of them. \"Let's all just calm down.\"\n\n\t\tThe two of them jerk their heads to stare at you. After a moment, Sonya mutters an apology, and Damian nods and puts the coin back in his pouch. Neither of them are happy, but at least they've calmed down.\n\t\t*set per_tame %+10\n\t\t*goto kraken_attacks\n\t#I joke about how great I am to distract them.\n\t\tYou glance at both of them. \"Hey, no need to hide your feelings. Everyone knows how great I am.\"\n\n\t\tThe two of them jerk their heads to stare at you. Then, suddenly, Damian bursts out laughing. Sonya cracks a smile as well. \"You're an idiot, $!{plc_fname},\" she jokes. \n\n\t\tDamian puts the coin back in his pouch. \"Definitely,\" he agrees.\n\t\t*set per_ego %+10\n\t\t*goto kraken_attacks\n\t#I stay quiet, lost in my own thoughts.\n\t\tYou glance at both of them, but stay quiet, waiting to hear what they'll say next.\n\n\t\t\"Why is it that you will bend over backwards for the lowest street rat, but you can't bring yourself to do even the most minor thing for me?\" she growls.\n\n\t\tDamian flips the coin again. \"Maybe it's because you're an overeager puppy who needs to realize the world doesn't revolve around her.\"\n\n\t\tShe starts to pull the sword from her scabbard. \"Why, you…\"\n\t\t*set per_loyal %-10\n\t\t*goto kraken_attacks\n\t*if (flg_nobodyDating) #I yell at both of them to be quiet.\n\t\tYou growl slightly. \"Both of you be quiet!\" \n\n\t\tThe two of them jerk their heads to stare at you. After a moment, Sonya mutters an apology, and Damian nods and puts the coin back in his pouch. Neither of them are happy, but at least they've calmed down.\n\t\t*set per_tame %-10\n\t\t*goto kraken_attacks\n\t*if (flg_triadDating) #I remind them that we should be working on our relationship.\n\t\tYou glance at both of them. \"Hey, that's the old Damian and Sonya. We're in love, and we should try to respect one another more.\" \n\n\t\tThe two of them jerk their heads to stare at you. Then, suddenly, Damian bursts out laughing. Sonya cracks a smile as well. \"You're right, $!{plc_fname},\" she says. \"It's just that Damian's so Man-damned irritating.\"\n\n\t\tDamian puts the coin back in his pouch. \"I absolutely am,\" he agrees.\n\t\t*set per_loyal %+10\n\t\t*goto kraken_attacks\n\n*label kraken_attacks\n\nSuddenly, you hear a massive\n\n[b][i]KRAAAAAAAAK A DOOOOOOOOOOOOOM!![/i][/b]\n\nYou're thrown off your feet as something slams into the side of the ship! The noise briefly deafens you, but it doesn't inspire panic like a cannon or some other gunpowder weapon. The sea water churns like a kettle on the boil, as you catch a glimpse of a rubbery purple hide. You get glimpses of a terrible beak and a gigantic eye before the deck shakes again, knocking you down.\n\n\"The kraken!\" Dom yells. \"The kraken is eating our ship!\" It's the most emotion you've ever seen out of the turtle, and your blood runs cold. As you hastily push yourself up by your paws, you see thick, slimy purple tentacles sliding over the side of the ship.\n\n\"Prepare to repel boarders!\" Sabu yells.\n\n\"How do you repel a sea monster?!\" Pally screams in horror.\n\n[i]Snap! Crunch![/i] The tentacles writhe on the deck as you can hear the plastic hull snapping and shredding. One of the cats of the crew runs over to Sabu. \"Sea water is filling the ship!\" she yells, shaking in terror.\n\nOver all the chaos, you hear the sound of chewing.\n\n*choice\n\t#I slash at it with a mighty swing of my blade!\n\t\tWith a mighty roar, you charge at one the tentacles, ready to slash at it.\n\t\t*gosub tabby_attacks\n\n\t\tYou swing your blade down, trying to free Tabby's leg. \n\t\t*set att_mighty %+05\n\t\t*if att_mighty >= 60\n\t\t\tYour muscles knot as you feel the blade slash through the creature's flesh. Green, foul-smelling blood coats the deck, but the tentacle tip is severed. It flops around on the deck like a fish, trying to attack you even in death. Tabby kicks the hunk of rubbery flesh away from her and shivers in disgust.\n\t\t\t*set rep_crew %+10\n\t\t\t*set stg_protect +1\n\t\t\t*goto succeed_in_attacking_kraken\n\t\t*else\n\t\t\t*goto fail_to_attack_kraken\n\t#I sneak up and try to attack a tender spot!\n\t\tAs the crew screams in anger or terror, you slip through the chaos as quietly as you can. You don't know if the kraken can hear from under the water, but better safe than sorry. \n\t\t*gosub tabby_attacks\n\n\t\tMoving quickly and silently, you duck underneath the outstretched tentacle. Using your dagger, you stab upwards at the tender flesh. \n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky >= 60\n\t\t\tYou feel the limb tremble and suddenly yank back. Green, foul-smelling blood coats the deck, pouring over your knife and paw. You're barely able to hold on to your knife as the tentacle shivers and tries to slap at you. You just manage to retrieve it before it slides back into the sea with a loud splash.\n\t\t\t*set rep_crew %+10\n\t\t\t*set stg_protect +1\n\t\t\t*goto succeed_in_attacking_kraken\n\t\t*else\n\t\t\t*goto fail_to_attack_kraken\n\t#I pepper the creature with arrows to chase it away!\n\t\tAs the crew screams in anger or terror, you pull out your bow and nock an arrow. \n\t\t*gosub tabby_attacks\n\n\t\tYou take careful aim, and let loose the arrow. \t\n\t\t*set att_agile %+05\n\t\t*if att_agile >= 60\n\t\t\tIt flies through the air and sinks deep into the kraken's flesh. The arrow doesn't seem to have passed through—perhaps there's bone or something inside?—but green, foul-smelling blood seeps from the wound and coats the deck. Before you can pull another arrow, the tentacle shivers and retracts into the sea with a loud splash.\n\n\t\t\tWhile you doubt you seriously injured it, it seems arrows can cause a kraken to pull away. You make a mental note of that for future.\n\t\t\t*set rep_crew %+10\n\t\t\t*set stg_lore +1\n\t\t\t*goto succeed_in_attacking_kraken\n\t\t*else\n\t\t\t*goto fail_to_attack_kraken\n\t*selectable_if (flg_hasMagic) #I use a powerful spell!\n\t\tAs the crew screams in anger or terror, you prepare to cast a spell. \n\t\t*gosub tabby_attacks\n\n\t\tA burst of firey arrows fly from your paw toward the tender flesh.\n\t\t*set att_clever %+05\n\t\t*if att_clever >= 60\n\t\t\tThey all hit their mark, sinking deep into the kraken's flesh. It sizzles and blackens as green, foul-smelling blood coats the deck. The sickly appendage shivers and retracts into the sea with a loud splash.\n\n\t\t\tWhile you doubt you seriously injured it, it seems such spells can cause a kraken to pull away. You make a mental note of that for future.\n\t\t\t*set stg_lore +1\n\t\t\t*goto succeed_in_attacking_kraken\n\t\t*else\n\t\t\t*goto fail_to_attack_kraken\n\n*label tabby_attacks\nYou see the terrified cat pull a dagger from her boot and stab a rubbery limb. The blade enters with a [i]glorp[/i], and comes back covered in something that looks, at a distance, to be green. Before you can react, the tentacle pulls back, slapping the knife from her orange-furred paw, but you can see the underside of the creature's outstretched limb.\n\n\"Tabby!\" Pally screams, but the first mate's too far away to do anything.\n*return\n\n*label succeed_in_attacking_kraken\n\n\"Thank you,\" Tabby pants, and pounces on another tentacle, trying to avoid slipping on the deck.\n*set rep_crew %+10\n*goto abandon_ship\n\n*label fail_to_attack_kraken\nUnfortunately, you aren't able to part the dense flesh of the monster. You only manage a small cut, which oozes green, foul-smelling blood. \n\nTabby thrashes at the tentacle, as it drags her off the deck. Finally, in desperation, she kicks at the tentacle with her other foot, and manages to slide from the creature's grasp. Her other boot goes with the tentacle over the side of the boat.\n\n\"I liked that boot,\" she grimaces. Ignoring you, she pounces on another tentacle.\n*set rep_crew %-10\n*goto abandon_ship\n\n*label abandon_ship\n\nThe rest of the battle is not going well. Pally rushes to Tabby's side, helping her against the second tentacle. Damian and Sonya are back-to-back and covered in the foul-smelling blood as they try to hack and slash their way out of the tentacle that has surrounded them. Sabu is throwing vials of potions all over—some of which cause the kraken's flesh to burn with a nauseating smell, while others are tossed to crew members to help with their wounds.\n\nBut quickly it's clear there's no hope. The cracking and grinding of the ship's hull gets louder, and through your boots you can feel the rumble of water rushing below the decks. As you dash to help Damian and Sonya, you call over your shoulder to Sabu, \"We need to abandon ship!\"\n\n\"No!\" Pally squawks. \"We should use the gunpowder barrels against the kraken!\"\n\nDamian grabs your paw and uses the blood coating him to slide out of a tentacle's grasp. \"Someone will have to dive below decks!\" he yells, as the two of you turn to pull the tentacle away from Sonya.\n\nWith a mighty roar, Sonya cleaves the tentacle in half. \"I'll go,\" she pants. \"I need to wash this blood out of my fur anyhow.\"\n\n\"You're needed up here!\" Damian yells. \"One less dagger won't be missed. I'll go.\"\n\n*choice\n\t#I tell Sonya to go.\n\t\tYou turn to Sonya. \"Go. We'll cover you.\"\n\n\t\tShe nods and sprints across the deck. As she tears open the hatch, you can see the water rapidly filling up the hold. Taking a deep breath, she jumps into the water.\n\t\t*set flg_sonyaDiver true\n\t\t*goto they_dive_under\n\t#I listen to Damian's suggestion.\n\t\tYou turn to Damian. \"Go. We'll cover you.\"\n\n\t\tHe salutes and sprints across the deck. As he pulls open the hatch, you can see the water rapidly filling up the hold. Holding his nose, he jumps into the water.\n\t\t*goto they_dive_under\n\t#I dive in myself.\n\t\tAs the two of them argue, you sprint across the deck. You can hear Damian and Sonya yell behind you as you tear open the hatch. The hold is rapidly filling up with water. Taking a deep breath, you dive in.\n\t\t*goto you_dive_under\n\n*label they_dive_under\n\nFor a long moment, nothing happens. Even the tentacles fall limp, as the crew all glance nervously over at the hatch. \n\n*if ((flg_sonyaDiver) and (flg_sonyaDating))\n\tYou hold your breath. Have you fallen in love with Sonya, only to lose her now?\n*if ((flg_sonyaDiver = false) and (flg_damianDating))\n\tYou hold your breath. Have you fallen in love with Damian, only to lose him now?\n\nThen, there's a loud [i]splash[/i] and @{flg_sonyaDiver Sonya|Damian} pulls @{flg_sonyaDiver herself|himself} out of the hold, carrying a long rope. Line. Whatever.\n\n\"Here you go,\" @{flg_sonyaDiver she|he} says, giving the line to you. \n*goto set_the_bomb\n\n*label you_dive_under\n\nThe water stings your eyes. You see a large hole smashed on each side of the ship, and a tentacle grasping at any objects they can find. Barrels float all through the mess, but for once Man is on your side. You see one labeled \"Explosive\" with a long rope tied around it. Line. Whatever.\n\nGrabbing the end of the rope, you swim back to the surface. As you pull yourself out, you see the rest of the crew staring at you, looking relieved. \"Here you go,\" you say, giving the line to Damian and Sonya. \n\n*label set_the_bomb\nThe three of you pull, and soon a heavy barrel is sitting on the deck.\n\n\"Okay, make it blow up,\" Sonya says to Pally.\n\nPally quickly grabs a crowbar and pries the top off before groaning. \"We have to make sure it isn't wet! Squawk!\"\n\n\"Of course it's wet, you goof,\" Damian scowls. \"It was underwater!\"\n\n\"But the powder needs to be dry before—\"\n\nThe tentacles writhe again, and one slams into the side of the ship, knocking everyone off their feet. The barrel falls over and rolls to the side of the ship, leaving a trail of powder behind it.\n\n*fake_choice\n\t#I ask Sabu to cast a spell.\n\t\t\"Sabu, can you set it on fire with your magic?\" you ask.\n\n\t\tSabu checks his pouches, and pulls out a small stoppered vial. \"Once the flame hits the barrel, push it over!\" he says. As he speaks, he uncorks the bottle, and in a few seconds a small flame appears at the mouth.\n\t#I try to create a flame with tools on the deck.\n\t\tLooking around the deck, you find some stone. Grabbing Damian's dagger from his belt, you scrape the dagger along the stone, causing sparks to shoot off it. \"Once the flame hits the barrel, push it over!\" you yell.\n\t#I ask the crew to do it.\n\t\t\"Someone light the powder!\" you say. \n\n\t\tDom, the turtle, pulls some tools from a pouch hanging off his belt. \"Once the flame hits the barrel, push it over!\" he says. As he speaks, he manipulates the tools, and a small flame appears in his paw.\n\t*if (flg_hasMagic) #I use a spell.\n\t\tYou mutter under your breath, summoning magical fire to your paw. \"Once the flame hits the barrel, push it over!\" you yell.\n\n\"What will that do?\" Damian yells.\n\nSonya grabs him as the flame touches the powder. \"Never mind, just push!\" The flame quickly eats up the trail of powder, and the three of you race to the barrel. Sonya kicks a cracked wooden board, opening a large hole in the side, and you and Damian barely manage to push the barrel over just as the flame reaches it. The barrel of gunpowder bursts into flame as it sails over the edge of the deck.\n\n\"Cover your ears!\" Sabu screams.\n\n*page_break\nYou cover your ears just in time, as the gunpowder explodes with a huge\n\n[b][i]KAAAAAAA-BOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOM[i][/b]\n\n*page_break\nFor an eternity all you hear is ringing and all you see is red. Eventually, both fade, and you look around. All the tentacles are gone, and the sea is tinted a sickly green. Everyone in the crew is soaked to the skin and covered in watery kraken blood. In the distance, you can just make out a strip of land that looks dark red.\n\n\"Thank Man, we're alive!\" Damian yells. \"I take back at least some of the bad things I said about the Old Ones.\"\n\nSonya shakes, shedding as much water and blood as she can from her thick fur. \"We're still sinking,\" she says a little too loudly. \"We need to abandon ship.\"\n\nSabu grabs Pally, who still looks dazed. \"Can we get to Red Sand Isle?!\"\n\n\"The rank and file? Is now a good time to worry about command structure? Squawk!\"\n\n\"Red. Sand. Isle.\" Sabu loudly enunciates, pointing to the land on the horizon. \"Can we get there?\"\n\nPally slaps the side of her head and looks at the crew. \"Probably.\" She looks to the three of you. \"We'll need help getting her there, though.\"\n\n*choice\n\t#I volunteer to help bail water.\n\t\t\"I'll help bail water,\" you say. Damian and Sonya quickly agree to help as well.\n\n\t\t\"Okay,\" Pally says. \"Get to it. Squawk!\"\n\n\t\tNodding in unison, the three of you head belowdeck. The water is halfway up the side, forcing you to stop on the stairs. Using buckets, old barrels, and even your paws, you spend hours passing water up to Damian, who gives it to Sonya to dump overboard. But the water is rising faster than you can get rid of it, and it feels like you are only able to do so much before you have to retreat a step up the staircase and keep bailing.\n\n\t\tBy the time you've been pushed back to close to the top of the stairs, you hear Pally's voice call out: \"Prepare for landing!\"\n\t\t*page_break\n\t\t*goto landing\n\t#I offer to repair the hull.\n\t\t\"I can help repair the hull,\" you say. Damian and Sonya quickly agree to help as well.\n\n\t\t\"Okay,\" Pally says, \"get to it. Squawk!\"\n\n\t\tNodding in unison, the three of you head belowdeck. The water is halfway up the side, forcing you to dive under the water to get to the hull. Other members of the crew bail the water out while the three of you take turns diving under, nail a board or a piece of plastic to the hull, and surface to catch your breath while someone else dives under. You spend hours trying to repair the hull in this way, but you just can't patch the holes fast enough. The water keeps rising.\n\n\t\tBy the time the water has reached the top of the stairs, you hear Pally's voice call out: \"Prepare for landing!\"\n\t\t*page_break\n\t\t*goto landing\n\t#I suggest giving directions to the crew.\n\t\t\"I can give directions to the crew,\" you say. \n\n\t\tPally shakes her head. \"That's my job, matey. Squawk!\"\n\n\t\tDamian shrugs. \"We're sinking, but sure, let's argue about the chain of command.\"\n\n\t\t\"I hear,\" Sonya says with a small smile, \"that the chain of command is the chain they beat you with if you don't follow orders.\"\n\n\t\tPally throws her paws up in the air. \"Whatever! Go organize the crew bailing water.\"\n\t\t\n\t\tNodding in unison, the three of you head belowdeck. The water is halfway up the side, forcing you to stop on the stairs. Telling the crew to use buckets, old barrels, and even their paws, you spend hours directing them. But the water is rising faster than you can get rid of it, and it feels like you are only able to do so much before the crew has to retreat a step up the staircase and keep bailing.\n\n\t\tBy the time you've been pushed back to close to the top of the stairs, you hear Pally's voice call out: \"Prepare for landing!\"\n\t\t*page_break\n\t\t*goto landing\t\t\n\n*label landing\nRushing back to the deck, you see the island more clearly. Red Sand Isle is well named, as the sandy beach looks like it's the color of blood. Probably an optical illusion of some sort. Nearby, you see the [i]Cat's Meow[/i] anchored and apparently abandoned.\n\nSabu motions to the ship. \"Looks like Greedy Bow assumed the kraken would sink us.\"\n\n\"It nearly did,\" Dom mutters.\n\nThe captain looks at you. \"That ship is our only way off this island. I'll get my crew together to confront their crew, but we might need some people here on the ship to salvage whatever we can. I'll talk to Pally about who stays and who goes, but you should talk to your friends and decide what you want to do.\" With that, he straightens his blood-soaked coat and marches over to Pally.\n\n*page_break\nYou walk over to Sonya. Her white fur looks light green from all the blood, and she's still desperately trying to shake the water off her.\n\n\"Got a minute?\" you ask.\n\nGiving up on her fur, she nods.\n\n\"Sabu thinks our only ticket home is to capture the crew of the [i]Cat's Meow[/i] so we can steal their ship. He's getting most of the crew together to go after Greedy Bow's pirates. I was wondering if you wanted to come and help me.\"\n\n*if (flg_sonyaDating)\n\tShe smiles. \"Of course. I'll go anywhere with you. You know that.\"\n\n\tYou smile back. Just being next to her makes your heart hammer in your chest. Trying to play it cool, you say \"I figured. I just wanted to hear you say it.\" You grab her paw, and she squeezes it back.\n\n\t\"By the way,\" you say, leaning closer to her.\n\n\t\"Yes?\" she says back, smiling.\n\n\t\"You smell disgusting,\" you say.\n\n\t\"So do you,\" she says with a laugh.\n\t*goto ask_damian\n*else\n\t*if rel_sonya > 35\n\t\tShe nods. \"Sure. I trust you, and I want to see this to the end.\"\n\n\t\tYou smile. \"Thanks. I appreciate the vote of confidence.\" You step back to let her continue trying to clean her fur.\n\t\t*goto ask_damian\n\t*else\n\t\tShe frowns. \"I don't know. It doesn't seem like you trust me very much.\"\n\n\t\t\"What do you mean?\" you ask.\n\n\t\t\"It just seems like you don't like me very much, or at least don't listen to me.\" She stares at the pirate ship in the distance. \"Seems like I'd be of more use helping salvage here while you do whatever you want.\"\n\n\t\t*choice\n\t\t\t#I appeal to her sense of adventure.\n\t\t\t\t\"Come on, where's your sense of adventure?\" you ask. \"Surely you'd rather confront a crew of bloodthirsty pirates over picking over a lot of broken stuff.\"\n\t\t\t\t\n\t\t\t\t*if per_tame \u003c 45\n\t\t\t\t\tShe thinks about this for a moment. \"You have a point,\" she says. \"And you're definitely a dog that loves adventure. I suppose I should tag along, if only to keep you out of trouble.\"\n\t\t\t\t\t*goto sonya_comes_along\n\t\t\t\t*else\n\t\t\t\t\t*goto sonya_stays_behind\n\t\t\t#I remind her this is to help the Corgi family.\n\t\t\t\t\"But we need to do this for the Corgi family,\" you plead. \"Surely your sense of duty is stronger than any concerns you might have about me.\"\n\t\t\t\t\n\t\t\t\t*if per_loyal > 55\n\t\t\t\t\tShe thinks about this for a moment. \"You have a point,\" she says. \"You've proven yourself to be a dog of strong ideals. I'll guess I'll stick with you.\"\n\t\t\t\t\t*goto sonya_comes_along\n\t\t\t\t*else\n\t\t\t\t\t*goto sonya_stays_behind\n\t\t\t#I plead that we've been through too much to stop now.\n\t\t\t\t\"This after everything we've been through?\" you ask. \"We've stood side by side, even when we didn't agree. Surely that's worth something.\"\n\t\t\t\t\n\t\t\t\t*if per_idealist > 55\n\t\t\t\t\tShe thinks about this for a moment. \"You have a point,\" she says. \"You've proven your loyalty more than once, and I do respect that. Okay, I'll come along.\"\n\t\t\t\t\t*goto sonya_comes_along\n\t\t\t\t*else\n\t\t\t\t\t*goto sonya_stays_behind\n\t\t\t#I accept her position and leave her behind.\n\t\t\t\tYou stand there for a moment, shocked. Eventually you offer your paw to her. \"I appreciate all your efforts on our journey,\" you say, trying to keep the emotion out of your voice.\n\n\t\t\t\tShe shakes it solemnly, with a firm grip. \"Likewise. Regardless of our conflicts, I'll speak well of you with the other Pioneers.\" \n\n\t\t\t\tYou turn and walk away, leaving her to finish cleaning her fur. This wasn't how you expected things to turn out after your long journey together, but you have to focus on what's ahead, not the mistakes of the past.\n\t\t\t\t*set flg_sonyaStayed true\n\t\t\t\t*goto ask_damian\n\n*label sonya_comes_along\n\n\"All right!\" you cheer.\n\n\"Now leave me alone to clean my fur,\" she mutters, and you make a hasty retreat.\n\n*goto ask_damian\n\n*label sonya_stays_behind\nSonya thinks for a moment, and then shakes her head. \"I'm sorry, but I just don't feel comfortable with you in charge anymore. I'm going to stay here and help Sabu and his crew, and once we're back to Pugmire, I think it's best if we go our separate ways.\"\n\nYou stand there for a moment, shocked. Eventually you offer your paw to her, which she shakes solemnly, before you leave her to finish cleaning her fur.\n\n*set flg_sonyaStayed true\n*goto ask_damian\n\n*label ask_damian\nYou find Damian sitting on the ruined deck. He's taken one of his boots off, and is dumping a surprisingly large amount of sea water out of it.\n\n\"Can I talk to you?\" you ask.\n\nDamian sets the boot aside, and starts working on the other one. \"Sure, go ahead.\"\n\n\"Sabu says if we want to get home, we need to overpower Greedy Bow's crew and then steal the [i]Cat's Meow[/i]. He's already figuring out how to divide his crew up. I was wondering if you wanted to join me on the island to confront the pirates.\"\n\n*if (flg_damianDating)\n\tHe smiles. \"Duh, boss. I'll follow you to the ends of the earth.\"\n\n\tYou smile back. Just standing next to him, smelling his unique scent, makes you giddy. \"Thanks,\" you say, trying not to show it. \"I thought that would be the case, but I appreciate hearing it.\" \n\n\tHe gives you a quick kiss, and then pulls off his other boot. \"Now step back, unless you want to be flooded in boot water.\"\n\n\tYou quickly step away.\n\t*goto head_ashore\n*else\n\t*if rel_damian > 35\n\t\tHe shrugs. \"Why not? You're a good boss, boss, and I don't see a need to break up the band just yet.\"\n\n\t\tYou nod. \"Thanks. I'm happy to know you still have my back.\" He pulls off his other boot, and you quickly step away to avoid the deluge.\n\t\t*goto head_ashore\n\t*else\n\t\tHe stares at you. \"So now you want to know what I think?\"\n\n\t\t\"What do you mean?\" you ask.\n\n\t\t\"It's not like you listen to me much, or even seem to trust me.\" He stares at the pirate ship in the distance. \"At least I might have some value to this crew of misfits.\"\n\n\t\t*choice\n\t\t\t#I appeal to his sense of adventure.\n\t\t\t\t\"Come on, where's your sense of adventure?\" you ask. \"Surely you'd rather confront a crew of bloodthirsty pirates over picking over a lot of broken stuff.\"\n\t\t\t\t\n\t\t\t\t*if per_tame \u003c 45\n\t\t\t\t\tHe thinks about this for a moment. \"I don't know, there might be some cool stuff here,\" he says. \"But giving those soggy moggies what's coming to them does sound like a lot more fun. Okay, I'm in.\"\n\t\t\t\t\t*goto damian_comes_along\n\t\t\t\t*else\n\t\t\t\t\t*goto damian_stays_behind\n\t\t\t#I remind him we should be finding justice of Padraig.\n\t\t\t\t\"But we need to do this for Padraig,\" you plead. \"Surely your sense of justice is stronger than any concerns you might have about me.\"\n\t\t\t\t\n\t\t\t\t*if per_idealist > 55\n\t\t\t\t\tHe thinks about this for a moment. \"I'm not a big 'law and order' dog, boss,\" he says. \"But you're right, we need to see this through. Okay, I'm in.\"\n\t\t\t\t\t*goto damian_comes_along\n\t\t\t\t*else\n\t\t\t\t\t*goto damian_stays_behind\n\t\t\t#I plead we've been through too much to stop now.\n\t\t\t\t\"This after everything we've been through?\" you ask. \"We've stood side by side, even when we didn't agree. Surely that's worth something.\"\n\t\t\t\t\n\t\t\t\t*if per_loyal \u003c 45\n\t\t\t\t\tHe thinks about this for a moment. \"Loyalty isn't my strong suit,\" he says. \"But we've had each other's backs through a lot, and I guess that does mean something. Okay, I'm in.\"\n\t\t\t\t\t*goto damian_comes_along\n\t\t\t\t*else\n\t\t\t\t\t*goto damian_stays_behind\n\t\t\t#I accept his position and leave him behind.\n\t\t\t\tYou stand there for a moment, shocked. Eventually you offer your paw to him. \"It was good serving with you,\" you say, keeping your voice neutral.\n\n\t\t\t\tHe looks at your ${plc_fur} paw for a moment, then sets his boot down and shakes it. \"It was a lot of laughs, I guess,\" he says.\n\n\t\t\t\tYou turn and walk away, leaving him to dump out his other boot. This wasn't how you expected things to turn out after your long journey together, but you have to focus on what's head, not the mistakes of the past.\n\t\t\t\t*set flg_damianStayed true\n\t\t\t\t*goto head_ashore\n\n*label damian_comes_along\n\n\"All right!\" you cheer.\n\nHe pulls off his other boot. \"Now step back, unless you want to be flooded in boot water.\"\n\nYou quickly step away.\n*goto head_ashore\n\n*label damian_stays_behind\nDamian thinks for a moment, and then shakes his head. \"Nah. I joke and call you 'boss,' but honestly $!{plc_fname}, I prefer helping out here. I'm going to stay and help Sabu and his crew, and once we're back to Pugmire, I'll get back to doing my own thing.\"\n\nYou stand there for a moment, shocked. Eventually you offer your paw to him, which he shakes, before you leave him to dump out his other boot.\n*set flg_damianStayed true\n*goto head_ashore\n\n*label head_ashore\n\nYou come back to see Pally lining up the crew that will head ashore: Pally, Tabby, Russel, and Dom, along with a couple of dogs you recognize as Darby and Gabby. \"Who else is coming with us?\" she asks.\n\n*if (flg_damianStayed) and (flg_sonyaStayed)\n\t\"Just…just me.\" You try to keep the emotions off your face.\n\n\t\"Oh,\" Pally says. \"Well, we'd love to have you, $!{plc_fname}!\"\n\t*goto head_ashore_2\n*elseif (flg_damianStayed)\n\t\"Just Sonya and me,\" you say.\n\n\t\"Well, happy to have a strong sword arm with us!\"\n\t*goto head_ashore_2\n*elseif (flg_sonyaStayed)\n\t\"Just Damian and me,\" you say.\n\n\t\"Well, happy to have a sneaky dog with us!\"\n\t*goto head_ashore_2\n*else\n\t\"All three of us,\" you say.\n\n\tPally sighs in relief. \"That's good. We need every paw we can get!\"\n\t*achieve noneleftbehind\n\t*goto head_ashore_2\n\n*label head_ashore_2\n\n\"What's next?\" you ask.\n\n\"The rest of the crew will stay with the captain and conduct salvage. We'll grab a couple of rafts and row ashore. Hopefully those soggy moggies won't hear us coming! Squawk!\" As if startled by her outburst, Pally clamps her beak with a paw and mutters \"sorry\" through it.\n\nWith that, you grab your supplies and row over to Red Sand Isle.\n\n*page_break\nOn the island, you notice the sand isn't an optical illusion. It really is a rusty red color. In awe, you pick up a pawful from the beach, and every grain looks to be the same color.\n\nPally leans over and whispers in your ear. \"The legends say the island turned this color due to all the people who died here,\" she says. The rest of the crew looks uneasy as well.\n\n*if (flg_sonyaStayed = false)\n\tSonya shrugs. \"Probably just some sort of natural reaction,\" she mutters.\n\t*goto noise_discipline\n*elseif (flg_damianStayed = false)\n\tDamian shrugs. \"I dunno, boss,\" he mutters. \"I don't think blood works that way.\"\n\t*goto noise_discipline\n*else\n\tYou shrug. It's probably just some kind of strange local phenomenon. You're pretty sure blood doesn't work that way.\n\t*goto noise_discipline\n\n*label noise_discipline\n\nNevertheless, you can't contain a shiver down your spine at the thought.\n\n\"Something's happening,\" Dom says laconically, pointing at a cluster of trees. You can just make out a strange glow.\n\n\"All right, crew,\" Pally says. \"Noise discipline from here on in.\"\n\n\"What?\" Russel asks.\n\n\"She means shut up,\" Dom mutters.\n\n\"Well why didn't she say that?\" Russel grumbles.\n\n\"Now I'm telling you to shut up,\" Dom growls.\n\n\"Oh yeah?\" Russel says, getting excited. \"Why don't [i]you[/i] noise discipline up?\"\n\n*choice\n\t#I ask them both to please be quiet.\n\t\tYou walk between Dom and Russel. \"Please be quiet,\" you say in a friendly voice. \"We need to sneak up on them.\"\n\n\t\t*set att_friendly %+05\n\t\t*if att_friendly > 55\n\t\t\t*goto dom_russel_success\n\t\t*else\n\t\t\tThe two push you aside, ignoring your request. \n\t\t\t*set rep_crew %-10\n\t\t\t*goto dom_russel_failure\n\t#I smack them on the head to get them to shut up.\n\t\tYou walk between Dom and Russel and smack them on the head. \"Both of you shut up,\" you growl.\n\n\t\t*set att_mighty %+05\n\t\t*if att_mighty > 55\n\t\t\t*goto dom_russel_success\n\t\t*else\n\t\t\tThe two push you aside, ignoring your request. \n\t\t\t*set rep_crew %-10\n\t\t\t*goto dom_russel_failure\n\t#I trick Pally into handling it.\n\t\tYou step away, out of Pally's eyesight. \"Pally can't tell us what to do!\" you say, in an approximation of Russel's voice.\n\n\t\t*set att_sneaky %+05\n\t\t*if att_sneaky > 55\n\t\t\tPally squawks and flaps over to the two of them. Whispering, she cuffs Russel on the back of the head and whispers something in each crewmember's ear. \n\t\t\t*goto dom_russel_success\n\t\t*else\n\t\t\tPally looks at you with a withering gaze. \"Don't make this worse!\" she snaps. \n\n\t\t\tThe two sailors ignore your argument. \n\t\t\t*set rep_crew %-10\n\t\t\t*goto dom_russel_failure\n\n*label dom_russel_success\n\nThe two stare at each other for a moment, and then nod. \"I'll discipline my noise,\" Russel says. Dom just grunts, but it sounds like a grunt of agreement.\n*set rep_crew %+10\n*goto see_pirate_crew\n\n*label dom_russel_failure\n\"I'll discipline my noise when I want to discipline my noise,\" Russel says, poking Dom in the chest. Dom pulls a fist back.\n\nPally steps up and grabs the fist. \"Enough of that!\" she hisses. \"Shut your traps else I tell the captain you're the reason we can't sail back to Waterdog Port.\"\n\nRussel and Dom stare at each other for a moment, and then nod.\n\nPally turns to you and frowns. \"Seems like these two won't listen to anyone but me.\"\n*goto see_pirate_crew\n\n*label see_pirate_crew\n\nThe group of you make your way into the trees, careful to avoid dry leaves, loose branches on the ground, or anything else that would give you away. You creep closer to the glow, and soon you see a group of pirates standing in a small clearing. Most of them have shovels in their paws, and sit exhausted next to a large hole in the ground. Next to the hole is an ancient wooden chest, still closed. \n\nNext to the chest you see a bird with black feathers, looking smug. Ambrosia Five Sins. They wear a familiar-looking tan cloak which was once covered in small bones. Just as it was when the bone bugs killed your mentor, Padraig. \n\nNext to them stands a gray cat. His fur is still silky, even in the salty air, and his eyes burn with intensity. He wears a sturdy, salt-encrusted coat covered in gold braid, and he has a glowing pearl in each of his paws. Greedy Bow, thief of the Corgi Pearls, gives a cruel laugh. \"I told you, Ambrosia! These pearls led us right to this treasure!\"\n\nAmbrosia shrugs. \"Now all you have to do is open it,\" they say with silky words.\n\nGreedy Bow snorts. \"I am no fool, foul fowl.\" He turns and points at one of his remaining subordinates—a pirate cat with a bandage over one eye. \"You! Come here.\"\n\nThe injured cat slinks forward. \"S-s-sir, I don't think…\"\n\nGreedy Bow kicks him in the back. \"I don't pay you to think, I pay you to do what you're told! And I'm telling you to open that chest.\"\n\n\"I-I-I don't think that's a good idea….\"\n\n*if (flg_damianStayed = false)\n\tOut of the corner of your eye, you notice Damian rushing forward. You rush to grab him before he breaks into the clearing. Just as your paws grab his arms, though, you hear a loud [i]snap[/i] as Damian steps on a dry twig.\n\t*goto see_pirate_crew_2\n*else\n\t\"Now what?\" Russel whispers to Dom. Dom grabs him by the beak in an effort to shut him up.\n\t*goto see_pirate_crew_2\n\n*label see_pirate_crew_2\n\nAt the sudden noise, Ambrosia's eyes snap to the trees you're hiding in. \"I think we have company,\" they say, their beak twisting into a smile.\n\nGreedy Bow shrugs. \"You take care of it. Use your bone bugs to kill them.\"\n\n\"Ah,\" the bird says, looking reluctant. \"It may be some time before I'm able to use that particular spell.\"\n\nThe pirate cat snarls. \"Just do it and stop making excuses! My protection can be removed as easily as it's given.\"\n\nThey quickly nod and pull a rod of bone and ebony from their sleeve.\n\nDarby takes a step back. \"I c-c-can handle a kraken, but I ain't going to d-d-deal with no black magic,\" she stutters in terror. She looks like she's about to run.\n\n*choice\n\t#I bark at Darby to stay put.\n\t\t\"Stay put,\" you bark. \"They can't harm you.\"\n\n\t\t*if per_tame \u003c= 45\n\t\t\t\"Sounds g-g-good to me,\" Darby says, and stays put.\n\n\t\t\t\"Thanks,\" Pally whispers.\n\t\t\t*set rep_crew %+05\n\t\t\t*goto confront_ambrosia\n\t\t*else\n\t\t\t\"Says you,\" Darby says, and flees.\n\n\t\t\t\"I'm sure she'll be fine,\" Pally whispers with a completely unconvincing smile.\n\t\t\t*goto confront_ambrosia\n\t#I give Darby some space.\n\t\t\"Fine, take a minute to get over yourself,\" you growl.\n\n\t\t*if per_loyal \u003c= 45\n\t\t\tDarby takes a couple of deep breaths, and calms down. \"Sorry,\" she says quietly.\n\n\t\t\t\"Thanks,\" Pally whispers.\n\t\t\t*set rep_crew %+05\n\t\t\t*goto confront_ambrosia\n\t\t*else\n\t\t\t\"Fine,\" she says, and runs away back to the ship.\n\n\t\t\t\"I'm sure she'll be fine,\" Pally whispers with a completely unconvincing smile.\n\t\t\t*goto confront_ambrosia\n\t#I reassure Darby.\n\t\tYou quickly step over to Darby. \"There, it'll be okay,\" you say, patting her on the shoulder. \"We'll make sure nothing happens to you.\"\n\n\t\t\"L-l-like what happened to that dog who mentored you, Padraig?\" she sputters.\n\n\t\t*if per_tame >= 55\n\t\t\tYou wince at the shot, but nod your head. \"I won't let anything like that happen again.\"\n\n\t\t\tDarby swallows, and nods. \"Okay. Sorry. And thanks.\"\n\t\t\t*set rep_crew %+05\n\t\t\t*goto confront_ambrosia\n\t\t*else\n\t\t\tBefore you realize it, you snarl in her face. \"No. Not like him.\"\n\n\t\t\tDarby swallows, and runs away back to the ship.\n\n\t\t\t\"I'm sure she'll be fine,\" Pally whispers with a completely unconvincing smile.\n\t\t\t*goto confront_ambrosia\t\t\t\n\n*label confront_ambrosia\n\nThe black bird points the rod at your group. \"Come out where I can see you,\" they snarl. Some of the other pirates turn and look to where Ambrosia is pointing, and pull their rusty cutlasses, heading to the trees where you are hiding.\n\nPally leaps out of the trees. \"Charge, mateys!\" she crows, and the rest of your crew attack the pirates! \n\n*if (flg_sonyaStayed = false)\n\tSonya pulls out her sword and joins them, leaving Ambrosia for you.\n\t*goto confront_ambrosia_2\n*else\n\tThe crews seem equally matched, leaving Ambrosia for you.\n\t*goto confront_ambrosia_2\n\n*label confront_ambrosia_2\n\n*if (flg_damianStayed = false)\n\tDamian leaps forward with his dagger. \"This is for Padraig, you bastard,\" he snarls. For once, there's no laughter in his voice, no love of the adventure of it all. He's deadly serious.\n\t*goto confront_ambrosia_3\n*else\n\tThe black bird laughs. \"Isn't Padraig's old flame going to join us?\" they cackle.\n\t*goto confront_ambrosia_3\n\n*label confront_ambrosia_3\n\n*choice\n\t#I calmly confront Ambrosia.\n\t\tYou pull out your weapon as well. \"You killed my mentor,\" you say, keeping the emotion out of your voice.\n\n\t\tThe bird shrugs. \"Did I?\" they say, flippantly. \"I kill so many dogs.\"\n\n\t\tThe weapon trembles in your paw slightly as the emotion washes over you. \"Padraig. Padraig Corgi.\"\n\n\t\tThey pretend to think on this. \"Padraig. Padraig.\" Then they give you an evil smile. \"Ah yes. The puppy minder. I heard the funeral was quite lovely.\"\n\n\t\t\"You can't bait me,\" you say carefully, trying not to think of simply cutting the bird down. \"You ordered those demons to kill him.\"\n\t\t*goto confront_ambrosia_3b\n\t#I scream at them.\n\t\tYou pull out your weapon as well. \"You killed my mentor,\" you scream, your voice raw with emotion.\n\n\t\tThe bird shrugs. \"Did I?\" they say, flippantly. \"I kill so many dogs.\"\n\n\t\tThe weapon trembles in your paw slightly as the emotion washes over you. \"Don't lie! Padraig. Padraig Corgi!\"\n\n\t\tThey pretend to think on this. \"Padraig. Padraig.\" Then they give you an evil smile. \"Ah yes. The puppy minder. I heard the funeral was quite lovely.\"\n\n\t\t\"You [i]monster[/i]!\" you scream. \"You don't deserve to speak his name. He was a [i]good dog[/i], and you ordered those horrible demons of yours to rip him apart!\"\n\t\t*goto confront_ambrosia_3b\n\t#I threaten the bird.\n\t\tYou pull out your weapon as well. \"You'll pay for killing my mentor,\" you say, your voice icy cold.\n\n\t\tThe bird shrugs. \"Which mentor?\" they say, flippantly. \"I kill so many dogs.\"\n\n\t\tThe weapon trembles in your paw slightly as the emotion washes over you. \"Padraig. Padraig Corgi.\"\n\n\t\tThey pretend to think on this. \"Padraig. Padraig.\" Then they give you an evil smile. \"Ah yes. The puppy minder. I heard the funeral was quite lovely.\"\n\n\t\t\"You're a monster,\" you whisper. \"You don't deserve to speak his name. He was a [i]good dog[/i], and you ordered those demons to rip him apart. Just as I'll enjoy you being ripped apart after your trial.\"\n\t\t*goto confront_ambrosia_3b\n\n*label confront_ambrosia_3b\n\nAmbrosia looks at how the battle is going, and notices Greedy Bow seems more absorbed in the pearls and the locked chest than Ambrosia's fate or the fight going on around them. Fluttering their wings, they turn back to look at you. \"Prove it,\" they say suddenly.\n\n\"What?\" you ask, incredulously.\n\n\"I was with Captain Greedy Bow the whole time.\" They spread their paws wide. \"Surely you won't kill an innocent bird?\"\n\n*if (flg_damianStayed = false)\n\t\"You've got to be kidding me,\" Damian says. \"This bird is guilty as sin, and we all know it.\"\n\n\t\"Do you?\" Ambrosia says, mockingly. \"Do you [i]really[/i]?\"\n\t*goto confront_ambrosia_4\n*else\n\tTaken aback, you think about all the information you've learned about Padraig's death.\n\t*goto confront_ambrosia_4\n\n*label confront_ambrosia_4\n\n*choice\n\t#I quietly present the information I have about the murder.\n\t\t\"Innocent isn't the word I would use,\" you say. \"We have a lot of evidence against you.\" You then quietly and carefully present everything you've learned about the murder.\n\t\t*if ((stg_padraig > 0) and (per_ego \u003c= 50))\n\t\t\t*goto ambrosia_did_it\n\t\t*else\n\t\t\t*goto ambrosia_didnt_do_it\n\t#I threaten Ambrosia with what I've learned.\n\t\t\"Innocent?\" you say with a growl. \"You're a murderer, and I'll break you into pieces.\" Snarling, you then spell out everything you've learned.\n\t\t*if ((stg_padraig > 0) and (per_loyal \u003c= 50))\n\t\t\t*goto ambrosia_did_it\n\t\t*else\n\t\t\t*goto ambrosia_didnt_do_it\n\t#I explain I'll bring Ambrosia down for the Corgis, using what I know.\n\t\t\"You're not innocent,\" you say, \"and I'll make sure the Corgis get justice after what you've done.\" Thinking of Fiona, you explain everything you know about the death.\n\t\t*if ((stg_padraig > 0) and (per_loyal >= 50))\n\t\t\t*goto ambrosia_did_it\n\t\t*else\n\t\t\t*goto ambrosia_didnt_do_it\n\n*label ambrosia_did_it\n\n\"We have plenty to convince the police dogs of Pugmire you're responsible,\" you finish confidently. \n\n*if (flg_damianStayed = false)\n\tDamian steps forward, still holding his dagger. \"I say we just kill them now, and save everyone a lot of trouble.\"\n\n*choice\n\t#I want them to face justice back in Pugmire.\n\t\t*if (flg_damianStayed = false)\n\t\t\t\"No,\" you say, holding Damian back. \"We'll take them back to Pugmire.\"\n\n\t\t\t\"Are you [i]kidding[/i]?\" Damian screams. \"This kind of scum doesn't deserve a fair trial.\"\n\n\t\t\t\"If we kill them, we're no better than these pirates.\"\n\n\t\t\tDamian doesn't look convinced, but stays quiet.\n\t\t\t*goto ambrosia_did_it_2\n\t\t*else\n\t\t\t\"You're going to go back to the police dogs in Pugmire and face justice.\"\n\t\t\t*goto ambrosia_did_it_2\n\t#I want to kill them now.\n\t\t*if (flg_damianStayed = false)\n\t\t\t\"Sounds like a good idea,\" you say to Damian. \"Let's just do it now.\"\n\t\t\t*goto ambrosia_did_it_2\n\t\t*else\n\t\t\t\"But maybe I'll just kill you now, and save everyone a lot of trouble.\"\n\t\t\t*goto ambrosia_did_it_2\n\t#I want to hurt them like they hurt me.\n\t\t*if (flg_damianStayed = false)\n\t\t\t\"No, don't kill them,\" you say to Damian. \"But we should hurt them as much as they hurt us.\"\n\n\t\t\tDamian nods. \"Okay, that seems like a fair compromise. Which do you prefer: wing or thigh?\"\n\t\t\t*goto ambrosia_did_it_2\n\t\t*else\n\t\t\t\"But there's nothing saying you need to go back to Pugmire in one piece. I'll hurt you as much as you've hurt me.\"\n\t\t\t*goto ambrosia_did_it_2\n\n*label ambrosia_did_it_2\n\nAmbrosia starts to tremble. \"I…I don't care. Greedy Bow will protect me.\"\n\nYou nod over to the cat captain, who is still struggling with the chest. \"He doesn't seem particularly concerned with your welfare.\"\n\nThe black bird squawks in frustration, and throws something on the ground. Billows of smoke rise up, stinging the eyes of everyone in the area. \"You'll never catch me!\" the bird screams.\n\n*choice\n\t#I use the smoke to sneak close to the bird to grab them unawares.\n\t\tThe smoke blocks your vision, but that works both ways. Keeping your eyes closed, you slide into the smoke. Your ears perk up, listening for any sound. Suddenly, you hear a scrape of sand, \n\t\t*if (flg_damianStayed = false)\n\t\t\tas Damian says \"I've got you now, murderer!\" \n\t\t\t*set att_sneaky %+05\n\t\t\t*if att_sneaky >= 55\n\t\t\t\t*goto ambrosia_did_it_success\n\t\t\t*else\n\t\t\t\t*goto ambrosia_did_it_failure\n\t\t*else\n\t\t\tand you swing at the sound! \n\t\t\t*set att_sneaky %+05\n\t\t\t*if att_sneaky >= 55\n\t\t\t\t*goto ambrosia_did_it_success\n\t\t\t*else\n\t\t\t\t*goto ambrosia_did_it_failure\n\t#I charge in, holding my breath for as long as possible.\n\t\tYou're a tough dog, and you figure you can hold your breath long enough to find Ambrosia. Keeping your eyes closed, you dive into the smoke, swinging at anything in front of you. \n\t\t*if (flg_damianStayed = false)\n\t\t\tSuddenly, you hear Damian say \"I've got you now, murderer!\" and you check your swing. \n\t\t\t*set att_solid %+05\n\t\t\t*if att_solid >= 55\n\t\t\t\t*goto ambrosia_did_it_success\n\t\t\t*else\n\t\t\t\t*goto ambrosia_did_it_failure\n\t\t*else\n\t\t\t*set att_solid %+05\n\t\t\t*if att_solid >= 55\n\t\t\t\t*goto ambrosia_did_it_success\n\t\t\t*else\n\t\t\t\t*goto ambrosia_did_it_failure\n\t#I drop down and crawl under the smoke as quickly as I can.\n\t\tThinking quickly, you drop to the sand where the smoke is thinner. Shimmying across the blood-red sand, you try to see through the murk. \n\t\t*if (flg_damianStayed = false)\n\t\t\tSuddenly, you see Damian's boots in front of you, and you hear \"I've got you now, murderer!\" \n\t\t\t*set att_agile %+05\n\t\t\t*if att_agile >= 55\n\t\t\t\t*goto ambrosia_did_it_success\n\t\t\t*else\n\t\t\t\t*goto ambrosia_did_it_failure\n\t\t*else\n\t\t\tSuddenly, you see clawed feet, and you stand up and swing your weapon! \n\t\t\t*set att_agile %+05\n\t\t\t*if att_agile >= 55\n\t\t\t\t*goto ambrosia_did_it_success\n\t\t\t*else\n\t\t\t\t*goto ambrosia_did_it_failure\n\n*label ambrosia_did_it_success\nYou hear a short scream, and you see blood on the ground just as the wind blows smoke in your eyes. You desperately wipe your eyes, but when they clear Ambrosia is gone. At your feet is a black rod decorated with bone. The wand Ambrosia used to summon those bone bugs. It's enough to prove they were behind the assassination, so they can never show up in Pugmire again.\n\nAs soon as you pick it up, you feel an uncomfortable tingling sensation. Soon it become a burning feeling, and then you feel like it's on fire. You drop it instinctively, and your paw suddenly feels fine. Wrapping the wand in a bit of cloth, you're able to hold on to it, but you decide to get rid of it once it's stopped being useful as evidence.\n*set flg_defeatAmbrosia true\n*set flg_ambrosiaWandKept true\n*goto crew_fight\n\n*label ambrosia_did_it_failure\n n*label ambrosia_didnt_do_it_2\n\nThe bird spreads their wings. \"Greedy Bow will protect me.\" They look over at the cat captain, who is still struggling with the chest. \"Once we've acquired the treasure, all of Pugmire will tremble from our might!\"\n\nBefore you can move, the bird points their wand at the ground, and there's a burst of bright light. As soon as your eyes clear, you see Ambrosia has fled back to the chest, helping Greedy Bow to try and open it.\n*goto crew_fight\n\n*label crew_fight\n\nBut suddenly you have other things to worry about. The rest of Greedy Bow's crew surges forward, their rusty cutlasses bared and eager for blood. Pally yells \"Ready!\" and your crew grips their weapons tightly to prepare for the wave. You ready yours as well, holding your breath as you consider your options.\n\n*choice\n\t#I dive in, eager for a fight.\n\t\tYou're eager for a fight. \"Let's finish them,\" you snarl as you rush forward, the red sand churning under your feet as you charge forward. \n\t\t*if (flg_defeatAmbrosia)\n\t\t\tThe smoke from Ambrosia's retreat drifts across the island, stinging your eyes and making it hard to see your paw in front of your face. From what you can hear, the fighting is fierce, but before long \n\t\t\t*if ((rep_crew > 49) and (per_tame \u003c= 35))\n\t\t\t\t*goto crew_fight_winning\n\t\t\t*else\n\t\t\t\t*goto crew_fight_losing\n\t\t*else\n\t\t\tAmbrosia cackles and points their wand at you. Another flash of light, and for a moment your entire world turns white! You rub desperately at your eyes, but when they clear Ambrosia is gone. You don't have time to wonder what happened to the bird as the sound of the fierce fighting rises. Before long \n\t\t\t*if ((rep_crew > 59) and (per_tame \u003c= 35))\n\t\t\t\t*goto crew_fight_winning\n\t\t\t*else\n\t\t\t\t*goto crew_fight_losing\n\t#I hold back, working to protect my crewmates.\n\t\tYou hold back, looking to Pally, Dom, and Tabby. \"Are you okay?\" you ask. You get a few curt nods in return. They're nervous, but ready to engage the pirates. You nod back to each of them, feeling the red sand under your feet before you wade into the fight. \n\t\t*if (flg_defeatAmbrosia)\n\t\t\tThe smoke from Ambrosia's retreat drifts across the island, stinging your eyes and making it hard to see your paw in front of your face. From what you can hear, the fighting is fierce, but before long \n\t\t\t*if ((rep_crew > 49) and (per_loyal >= 65))\n\t\t\t\t*goto crew_fight_winning\n\t\t\t*else\n\t\t\t\t*goto crew_fight_losing\n\t\t*else\n\t\t\tAmbrosia cackles and points their wand at you. Another flash of light, and for a moment your entire world turns white! You rub desperately at your eyes, but when they clear Ambrosia is gone. You don't have time to wonder what happened to the bird as the sound of the fierce fighting rises. Before long \n\t\t\t*if ((rep_crew > 59) and (per_loyal >= 65))\n\t\t\t\t*goto crew_fight_winning\n\t\t\t*else\n\t\t\t\t*goto crew_fight_losing\n\t#I lead the crew into the fight, confident in my abilities.\n\t\tYou know no one can defeat you in battle. You look at the crew members near you. \"You, you, and you, follow me. We'll take these pirates down!\" The crew loose ragged war cries, and the red sand churns under your feet as you lead them into the fight. \t\t\n\t\t*if (flg_defeatAmbrosia)\n\t\t\tThe smoke from Ambrosia's retreat drifts across the island, stinging your eyes and making it hard to see your paw in front of your face. From what you can hear, the fighting is fierce, but before long \n\t\t\t*if ((rep_crew > 49) and (per_ego >= 65))\n\t\t\t\t*goto crew_fight_winning\n\t\t\t*else\n\t\t\t\t*goto crew_fight_losing\n\t\t*else\n\t\t\tAmbrosia cackles and points their wand at you. Another flash of light, and for a moment your entire world turns white! You rub desperately at your eyes, but when they clear Ambrosia is gone. You don't have time to wonder what happened to the bird as the sound of the fierce fighting rises. Before long \n\t\t\t*if ((rep_crew > 59) and (per_ego >= 65))\n\t\t\t\t*goto crew_fight_winning\n\t\t\t*else\n\t\t\t\t*goto crew_fight_losing\n\n*label crew_fight_winning\nyou hear triumphant cries from Pally. A few of the pirates lie still on the strange beach, weapons fallen from limp paws, while your crew continues their fierce fighting. It seems your side is winning! \n*set stg_badCat +1\n*goto greedy_bow_duel_1\n\n*label crew_fight_losing\nthere's a cry of dismay from Pally. A few of your crew lie still on the strange beach, weapons fallen from limp paws, while the pirates continue their fierce fighting. It seems your side is losing!\n*goto greedy_bow_duel_1\n\n*label greedy_bow_duel_1\n\nYou clear your vision, ready to lend your weapons to the fight, when Greedy Bow swats the locked chest in disgust and stomps over to you. \"I've had enough of your interfering,\" he growls, and pulls a heavy saber from a sheath on his back. The blade pulses with a dark purple light as he points it at you. \"You and me, dog. A duel, and the winner takes everything: both crews, both ships, and the treasure. What say you?\"\n\nOn the ground, you see one of his pirates has dropped their own saber on the sand. [i]How appropriate to use one of his weapons against him[/i], you think as you pick it up. Brushing the sand off the blade, you say \"I accept.\"\n\nGreedy Bow sneers, and lunges for you. Remembering your drills from Padraig, you instinctively parry his thrust, taking a small step back to put some distance between you and him. [i]Even from the grave you're keeping an eye on me, Padraig.[/i]\n\n\"I'll cut you into kibble and bits,\" the pirate sneers. \"I'll send you to your family in dozens of separate bottles.\" He takes another swing, and you just manage to dodge in time. As you do, you realize Greedy Bow isn't just fighting you sword to sword—he's also trying to get into your head. Maybe you can turn some of the experience you gained fighting monsters against him and give yourself an advant
