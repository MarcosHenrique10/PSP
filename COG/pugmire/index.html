<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pugmire: Treasure of the Sea Dogs — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "pugmire", "title": "Pugmire: Treasure of the Sea Dogs", "scenes": {"01-padraig": "*temp flg_spellCast 0\n*temp flg_notAskedPadraig true\n*temp flg_padraigReasonWhy 0\n\nWelcome to [i]Pugmire: Treasure of the Sea Dogs[/i]! This story is set in the Realms of Pugmire, where dogs have inherited our world far in the future of humanity's disappearance. Would you like to know more about the setting, or jump right into the story?\n\n*choice\n\t#Yes! Please tell me more!\n\t\tWe'd be glad to!\n\t\t*goto background\n\t#I'm a Pugmire fan, but I could use a refresher.\n\t\tWelcome back to the Realms! \n\t\t*goto background\n\t#Nope! Let's get on with the story!\n\t\tEnjoy the adventure!\n\n\t\t*page_break\n\t\t*goto chapter_1\n\n*label background\n\nImagine our world, but far in the future. Countless centuries have gone by, and everything looks very different than it does now. Most buildings have crumbled to dust, and broken roads are buried deep beneath dense forests and layers of rocks. The work of mankind has been reclaimed by nature, but we're all gone. Humanity is no more. And those that remain—our best friends—start to reclaim our legacy.\n\nThe [i]Realms of Pugmire[/i] is a fantasy world with evolved dogs as the main characters. About the size of humans and standing on two legs, they live in the ruins of our world, using tools, language, and ingenuity to build a new civilization in their image. And the kingdom of Pugmire is a center of that civilization. Many of these dogs strive to learn about Man (also known as “the Old Ones”). They deify humanity as examples all should strive to emulate. Other nations, such as the cats in the Monarchies of Mau, have different perspectives on what came before, but all species recognize there was a world before this one, even though it's now populated with mysteries and dangers.\n\nAs the dogs explore the world, they create and invent many new things, but also use what they can salvage. Some have even learned how to use the strange artifacts left behind by the Old Ones. They see these as literal gifts from their gods—rare and unusual magic relics, spells, and enchantments. They even dig up the plastic we've buried in the earth, minting them as coins and trading them much as we would with gold. We might dimly recognize all this as the results of some far-flung futuristic invention, but as they say, any sufficiently-advanced technology is indistinguishable from magic.\n\nThese heroic dogs, eager for mystery and danger, are the characters you portray. As you explore this world—a world that is and yet isn't the one we know—one question will follow your every decision: Are you a good dog?\n\n*page_break\n*goto chapter_1\n\n*label chapter_1\n*text_image chap_1.png center [b]Chapter One: Funeral for a Friend[/b]\n*comment Editor Note: Flashbacks will be in the past tense.\n\nThe rain falls onto your fur as you stand at the graveside. Fat drops of water splatter over the newly-carved tombstone, still warm from the ancient wand the shepherd used to carve an inscription into the dark gray slate. [i]Padraig Corgi.[/i] You can hear the raindrops hiss slightly as they strike the stone, reminding you of the sizzling bacon your mother made when you were a puppy.\n\nA hound you vaguely recognize limps up next to you. You notice their wiry brown fur is speckled with yellow as they try to hold a waxed tarp over their head. The air is filled with the discordant marching of the raindrops on the stiff fabric. \"Always seems to rain at funerals, don't it?\" the dog says, unprompted, talking loudly over the noise. They struggle with the waxed tarp some more. \"Heard tale of an ancient device made by the Old Ones. Called an umbreller or a brolly. Kept the rain off the faces of Man so they could watch over us faithful dogs more clearly.\" \n\nThe hound finally stops struggling and lets the tarp drop to the ground. The roar of the raindrops stops. \"Don't seem much like Man is watching over us now, do it?\" they say, their voice still loud despite the dropped tarp. Many of the dogs gathered around the grave turn to look at both of you.\n\nWhat do you say in return?\n\n*choice\n\t#I look at the dog sternly. \"You shouldn't blaspheme about Man in a graveyard!\"\n\t\t*set per_idealist %+15\n\t\t\"You shouldn't blaspheme about Man in a graveyard!\" you say sternly. \"They listen to everything we say.\"\n\n\t\tThe hound looks down and hugs themselves in the cold rain. \"You're right. Weren't meanin' no offense. I just…I miss him.\"\n\t\t*goto padraig_grave\n\t#I laugh. \"Absolutely. But say that louder so the shepherds can hear you.\"\n\t\t*set per_idealist %-15\n\t\t\"Absolutely. But say that louder so the shepherds can hear you,\" you say, laughing. \"I'm sure they'd love to hear your blasphemy.\"\n\n\t\tThe hound coughs in embarrassment, but ducks their head and leans closer to you. \"Didn't mean to cause no fuss. I just…I miss him.\"\n\t\t*goto padraig_grave\n\t#I motion to them to keep it down. \"Be respectful when you're at a grave.\"\n\t\t*set per_tame %+15\n\t\t\"Be respectful when you're at a grave,\" you say. \"Man listens to everything we say.\"\n\n\t\tThe hound looks around at the staring faces, and ducks their head to lean closer to you. \"I'm sorry. I just…I miss him.\"\n\t\t*goto padraig_grave\n\t#I grab my weapon. \"I will cut you open if you act like a cur.\"\n\t\t*set per_tame %-15\n\t\t\"I will cut you open if you act like a cur,\" you snarl. \"How dare you speak in such a way!\"\n\n\t\tThe hound puts their paws up desperately. \"I'm sorry, truly I am. I just…I miss him.\"\n\t\t*goto padraig_grave\n\n*label padraig_grave\n\nYou miss him, too. \n\n*choice\n\t#He saved me from the streets.\n\t\tPadraig Corgi saved you from a life on the streets. You grew up a mutt, living on scraps and begging for a scrap of a coin. You were willing to take on any job, no matter how dirty, in order to get by. Someone recommended you join the Pioneers, and you signed right up. What other options did you have?\n\n\t\tBut Padraig was more than your teacher. He was loud and friendly when you wanted him to be, making each day and night of harsh training a joy. You knew you were a good dog, but he proved it to you, over and over again.\n\n\t\tHe trained you to care about [i]yourself[/i].\n\t\t*set plc_mutt true\n\t\t*set per_tame %-15\n\t\t*set flg_padraigReasonWhy 1\n\t\t*goto months_ago\n\t#He saw potential in me when no one else did.\n\t\tPadraig Corgi saw something in you. You grew up belittled by the other dogs around you. They always put you down, saying you'd never amount to anything in Pugmire, even when you were a puppy. Someone recommended you join the Pioneers, and you signed right up, just to show them.\n\n\t\tBut Padraig was more than your teacher. He was strict and rigid when you needed him to be, giving you the focus you needed to get through your training. You knew you were something special, but he made you prove it to yourself, over and over again.\n\n\t\tHe trained you to be a [i]good dog[/i].\n\t\t*set per_ego %+15\n\t\t*set flg_padraigReasonWhy 2\n\t\t*goto months_ago\n\t#He stood by me, even in the darkest of times.\n\t\tPadraig Corgi cared more than any other dog you ever knew. Your whole life it seemed like you made one mistake after another. Other dogs always avoided you, treating you like a pariah, even when you didn't deserve such snubs. Whispers and rumors followed you everywhere you went. Someone recommended you join the Pioneers, and you signed right up. A chance at a fresh start.\n\n\t\tBut Padraig was more than your teacher. He was like a father and disciplinarian to each of you, offering advice and criticism in equal measure through your training. He was harsh with you, because he knew you were a good dog, and could stand by you without a second thought.\n\n\t\tHe was [i]loyal[/i] to you, and trained you to be loyal as well. \n\t\t*set per_loyal %+15\n\t\t*set flg_padraigReasonWhy 3\n\t\t*goto months_ago\n\n*label months_ago\nHe trained many of these gathered dogs, too, all standing and shivering in the rain, and you knew they felt the same. You see many of the mourners, including the awkward hound, each bear the symbol of the Royal Pioneers of the kingdom of Pugmire, still shiny after the graduation a few days ago. As you feel the cold water slide under your ceremonial armor and into your fur, you think back to the day you first met him….\n\n*page_break \n[i]Last year.[/i]\n\nThe sun was shining the day you walked to meet your new Trustee for the Royal Pioneers. You didn't sleep a wink all night because of a mixture of excitement and fear. Any dog who pledges their loyalty to the kingdom of Pugmire can join the Pioneers, but when you applied at Castle Pugmire, you were assigned to one of the most revered Trustees of all time: Padraig Corgi.\n\nPadraig Corgi, son of legendary hero General Monty Corgi. General Monty was renowned for his battles during the War of Dogs and Cats, encouraging his two children to follow in his footsteps. Only Padraig's sister, Fiona, has more tales of glory, but both brother and sister spent decades exploring the world and bringing back artifacts, knowledge, and magic from all corners of the Pugmire empire. The whole walk there, you couldn't decide on what was more unlikely: the stories or whether you were good enough for the honor.\n\n*page_break\nPadraig's house was off one of the main streets in the Plastic Quarter of Pugmire—quite an affluent neighborhood, and not where you expected to meet a powerful and skilled warrior. You rapped your knuckles on the door twice, and just when you pulled back to strike it a third time, the door suddenly opened.\n\n\"Come in! Come in!\" The short corgi before you smiled as he waved you into his tastefully-decorated home. You noticed some gray fur around his muzzle and on the backs of his paws, but the light shirt and pantaloons he was wearing showed his limbs were well-muscled. He shut the door behind you. \"Sorry about the mess,\" he said as you stepped into the immaculately-clean parlor. \"I'm just about to brew some catnip tea. Got a taste for it when I was stationed in the cat monarchies. Would you like a cup?\" \n\n*choice\n\t#\"I'd love a cup!\" I didn't want to be rude.\n\t\t*set per_tame %+15\n\t\t*goto kitchen\n\t#\"Of course not!\" I didn't have time to drink tea!\n\t\t*set per_tame %-15\n\t\t*goto kitchen\n\t#\"Whatever you'll have!\" I wanted to show I was loyal.\n\t\t*set per_loyal %+15\n\t\t*goto kitchen\n\n*label kitchen\n\nBefore you were able to answer, he skipped off to the kitchen and came back with two steaming mugs. He set one down in front of you, and the smell was strong and somewhat pleasant. \"You don't need to drink it if you don't want to.\" He plopped down on an overstuffed wooden chair with leather padding, behind a worn and scarred desk with some scraps of parchment and an inkwell. \"So you're the new recruit to the Pioneers, eh? Good, we'll put you to work.\" From behind his large, perky ear he pulled a quill. \"Still, we should get the paperwork sorted out.\"\n\nHe took a sip of the tea and smiled. \"Let's learn all about you, eh? I've got a nose for discerning what new recruits are good at, but any information will help. Just answer some questions, and we'll have you in training before your tea gets cold.\" Padraig squinted at the parchment in his paws. \"Okay, first question. What kind of good dog are you?\"\n\n*choice\n\t#\"I am a good boy.\"\n\t\t\"I am a good boy,\" you said.\n\n\t\t\"And what a good boy you are, I'm sure.\" He scribbled something down. \"Next question. \n\t\t*set plc_nonBinary false\n\t\t*set plc_he \"he\"\n\t\t*set plc_him \"him\"\n\t\t*set plc_his \"his\"\n\t\t*set plc_himself \"himself\"\n\t\t*goto fur_color\n\t#\"I am a good girl.\"\n\t\t\"I am a good girl,\" you said.\n\n\t\t\"And what a good girl you are, I'm sure.\" He scribbled something down. \"Next question. \n\t\t*set plc_nonBinary false\n\t\t*set plc_he \"she\"\n\t\t*set plc_him \"her\"\n\t\t*set plc_his \"her\"\n\t\t*set plc_himself \"herself\"\n\t\t*goto fur_color\n\t#\"I am not a boy or a girl. I am a dog.\"\n\t\t\"I am not a boy or a girl,\" you said. \"I am a dog.\"\n\n\t\t\"Of course, always happy to have a good dog on the team.\" He scribbled something down. \"Next question. \n\t\t*set plc_nonBinary true\n\t\t*set plc_he \"they\"\n\t\t*set plc_him \"them\"\n\t\t*set plc_his \"theirs\"\n\t\t*set plc_himself \"themselves\"\n\t\t*goto fur_color\n\n*label fur_color\nI see bits of your fur, and it's lovely, but just as a formality: What color is your fur?\"\n\n*choice\n\t#Blue\n\t\t*set plc_fur \"blue\"\n\t\t*goto next_question\n\t#Black\n\t\t*set plc_fur \"black\"\n\t\t*goto next_question\n\t#Brown\n\t\t*set plc_fur \"brown\"\n\t\t*goto next_question\n\t#Cream\n\t\t*set plc_fur \"cream\"\n\t\t*goto next_question\n\t#Gold\n\t\t*set plc_fur \"gold\"\n\t\t*goto next_question\n\t#Gray\n\t\t*set plc_fur \"gray\"\n\t\t*goto next_question\n\t#Red\n\t\t*set plc_fur \"red\"\n\t\t*goto next_question\n\t#White\n\t\t*set plc_fur \"white\"\n\t\t*goto next_question\n\t#Yellow\n\t\t*set plc_fur \"yellow\"\n\t\t*goto next_question\n\n*label next_question\n\"$!{plc_fur},\" you said.\n\n\"And a lovely shade it is,\" he said, jotting it down. \"Next! What's your first name?\"\n\n*label first_name\n*choice\n\t#Buddy\n\t\t*set plc_fname \"Buddy\"\n\t\t*goto first_name_2\n\t#Sadie\n\t\t*set plc_fname \"Sadie\"\n\t\t*goto first_name_2\n\t#Duke\n\t\t*set plc_fname \"Duke\"\n\t\t*goto first_name_2\n\t#Angel\n\t\t*set plc_fname \"Angel\"\n\t\t*goto first_name_2\n\t#A different name.\n\t\t*input_text plc_fname\n\t\t*if (plc_fname = \"Dog\") or (plc_fname = \"dog\")\n\t\t\tHe sighed at that. \"I can't just write down 'dog.' If everyone wanted to be called 'dog,' I'd never be able to get anywhere in training. So stop joking around. What's your name?\"\n\t\t\t*goto first_name\n\t\t*else\n\t\t\t*goto first_name_2\n\n*label first_name_2\n\n\"$!{plc_fname}. Did I get that right?\"\n\n*choice\n\t#\"Yes.\"\n\t\t\"Yes,\" you said.\n\n\t\t\"Nice to meet you, $!{plc_fname}!\" He carefully wrote it down on the parchment. \"Now the other half. \n\t\t*goto family_name\n\t#\"No, that's not right.\"\n\t\t\"No, that's not right,\" you said.\n\n\t\tHe nodded. \"Let's try again. \n\t\t*goto first_name\n\n*label family_name\nWhat's your family name?\"\n\n*choice\n\t#\"I'm a Mutt.\"\n\t\t*set plc_family \"Mutt\"\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto mutt\n\t#\"I'm a friendly Pug.\"\n\t\t\"I am a Pug,\" you said. \"We're very friendly.\"\n\n\t\tPadraig smiled. \"The Corgi family has served the Pugs faithfully for decades. Always good to have another friendly face around the place.\"\n\t\t*achieve playaspug\n\t\t*set plc_family \"Pug\"\n\t\t*set att_friendly +10\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto calling\n\t#\"I'm a quick Greyhound.\"\n\t\t\"I am a Greyhound,\" you said. \"We're very fast.\"\n\n\t\tPadraig smiled. \"It's been a while since I served with a Greyhound. But I knew one once that would run me off my feet any chance she got!\"\n\t\t*set plc_family \"Greyhound\"\n\t\t*set att_agile +10\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto calling\n\t#\"I'm a strong Husky.\"\n\t\t\"I am a Husky,\" you said. \"We're very strong.\"\n\n\t\tPadraig smiled. \"My father served with a Husky back during the War. Strong as a horse, she was, and a good sword arm to boot.\"\n\t\t*set plc_family \"Husky\"\n\t\t*set att_mighty +10\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto calling\n\t#\"I'm a clever Sheepdog.\"\n\t\t\"I am a Sheepdog,\" you said. \"We're very clever.\"\n\n\t\tPadraig smiled. \"I've had great philosophical conversations with Sheepdogs. Glad to have someone with your family's wisdom on board.\"\n\t\t*set plc_family \"Sheepdog\"\n\t\t*set att_clever +10\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto calling\n\t#\"I'm a sneaky Wolfhound.\"\n\t\t\"I am a Wolfhound,\" you said. \"We're useful in unusual circumstances.\"\n\n\t\tPadraig smiled. \"It's okay to say 'sneaky.' I don't think any less of you or your family. If anything, it's nice to have some lateral thinkers around.\"\n\t\t*set plc_family \"Wolfhound\"\n\t\t*set att_sneaky +10\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto calling\n\t#\"I'm a sturdy Bulldog.\"\n\t\t\"I am a Bulldog,\" you said. \"We're very sturdy.\"\n\n\t\tPadraig smiled. \"The Bulldogs have been a staple of the Pugmire city guard for generations now. Always glad to meet one of your family.\"\n\t\t*set plc_family \"Bulldog\"\n\t\t*set att_solid +10\n\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t*goto calling\n\t#I'm not any of these.\n\t\t\"I have a different family name,\" you say.\n\n\t\tPadraig nodded. \"Sure thing. Plenty of wonderful families here in Pugmire. Can you spell it for me?\"\n\t\t*goto custom_breed\n\n*label custom_breed\n\n*input_text plc_family\n\"$!{plc_fname} $!{plc_family}. Is that right?\"\n\n*choice\n\t#\"Yes.\"\n\t\t\"Yes,\" you said. \"That's right.\"\n\n\t\t\"It's been a while since I met a $!{plc_family}. I hear your family's known for…\n\n\t\t*choice\n\t\t\t#…making friends.\"\n\t\t\t\tPadraig nodded. \"That's it. The $!{plc_family} family is very friendly. You never know when just the right word will turn the tide.\"\n\t\t\t\t*set att_friendly +10\n\t\t\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t\t\t*goto calling\n\t\t\t#…withstanding adversity.\"\n\t\t\t\tPadraig nodded. \"That's it. The $!{plc_family} family is tenacious and solid. Very useful during a long march.\"\n\t\t\t\t*set att_solid +10\n\t\t\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t\t\t*goto calling\n\t\t\t#…getting quietly into the right place.\"\n\t\t\t\tPadraig nodded. \"That's it. All your relatives in the $!{plc_family} family are very sneaky. Good when you need to ambush an enemy.\"\n\t\t\t\t*set att_sneaky +10\n\t\t\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t\t\t*goto calling\n\t\t\t#…knowing things like magic.\"\n\t\t\t\tPadraig nodded. \"That's it. Cleverness is valued in the $!{plc_family} family. And even an old dog like me can learn a new trick or two.\"\n\t\t\t\t*set att_clever +10\n\t\t\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t\t\t*goto calling\n\t\t\t#…being quick and nimble.\"\n\t\t\t\tPadraig nodded. \"That's it. It's hard to keep up with the agility of the $!{plc_family} family!\"\n\t\t\t\t*set att_agile +10\n\t\t\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t\t\t*goto calling\n\t\t\t#…working hard.\"\n\t\t\t\tPadraig nodded. \"That's it. The $!{plc_family} family is known for being mighty.\"\n\t\t\t\t*set att_mighty +10\n\t\t\t\t*set plc_fullname (plc_fname&\" \")&plc_family\n\t\t\t\t*goto calling\n\t#\"No, that's not right.\"\n\t\t\"No, that's not right,\" you said.\n\n\t\tPadraig nodded. \"Fair enough. Give it to me again.\"\n\t\t*goto custom_breed\n\n*label mutt\n*set plc_mutt true\n\n\"I'm not a part of any family,\" you explained. \"Me and my fellow orphans take the last name of 'Mutt' in solidarity.\" \n\nPadraig put his paws up. \"I've served with many fine Mutts in my day. I'm not one to judge.\" He looked back down at the parchment. \"So tell me, what were you best at when you were a puppy?\"\n\n*choice\n\t#\"Making friends.\"\n\t\t\"Making friends,\" you said. \"I always played with the other puppies.\"\n\n\t\t\"Sounds like you were a very friendly dog!\" He added a note to his parchment.\n\t\t*set att_friendly +10\n\t\t*goto calling\n\t#\"Withstanding adversity.\"\n\t\t\"Withstanding adversity,\" you said. \"I wasn't sick a day in my life.\"\n\n\t\t\"Sounds like you were tenacious and solid.\" He added a note to his parchment.\n\t\t*set att_solid +10\n\t\t*goto calling\n\t#\"Getting quietly into the right place.\"\n\t\t\"Getting quietly into the right place,\" you said. \"I scared my parents more than once with how quiet I was.\"\n\n\t\t\"Sounds like you could be very sneaky when you put your mind to it!\" He added a note to his parchment.\n\t\t*set att_sneaky +10\n\t\t*goto calling\n\t#\"Knowing things like magic.\"\n\t\t\"Knowing things,\" you said. \"I was always learning something new.\"\n\n\t\t\"Sounds like you were quite a clever dog!\" He added a note to his parchment.\n\t\t*set att_clever +10\n\t\t*goto calling\n\t#\"Being fast and nimble.\"\n\t\t\"Being fast and nimble,\" you said. \"I would race the other puppies every day.\"\n\n\t\t\"Sound like you were quite agile.\" He added a note to his parchment.\n\t\t*set att_agile +10\n\t\t*goto calling\n\t#\"Working hard.\"\n\t\t\"Working hard,\" you said. \"I never turned my back on heavy lifting or doing chores around the house.\"\n\n\t\t\"Sounds like you enjoyed using your mighty muscles.\" He added a note to his parchment.\n\t\t*set att_mighty +10\n\t\t*goto calling\n\n*label calling\n\nPadraig pushed the parchment aside. \"Now that's all in order, let's get on to the important part.\" He looked you in the eyes. \"$!{plc_fname}, you need to decide what kind of pioneer training you'll get.\" You considered your future path.\n\nIf you trained as an [b]artisan[/b], you'd become very clever. But the exhaustion that comes from using your energy to cast spells would also make you hardier as well.\n\nThe other magical option, a [b]shepherd[/b], meant you'd have to be friendly to many dogs, in the hopes of bringing them closer to the Old Ones. But you'd also become clever, after long nights studying the Code of Man.\n\nAs a [b]guardian[/b], you'd train to become a mighty warrior. But building your agility would also help you in your fighting skill.\n\nOn the other paw, as a [b]stray[/b], you'd become solid and hardy from a life in the wilderness. But you'd also develop some strength to protect yourself from the dangers outdoors.\n\nThere's also training as a [b]hunter[/b]. You'd become extremely agile as you hunt monsters in both the cities and the wild. But you'd have to be stealthy as well, because sometimes it's better to sneak up on your prey.\n\nFinally, as a [b]ratter[/b], you'll learn to sneak into lost and dangerous places most dogs don't dare explore. But you'd also be able to talk your way out of bad situations with quick wit and a friendly face.\n\n\"Well?\" Padraig asked. \"What do you want to be?\"\n*label calling_try_again\n\n*choice\n\t*selectable_if (flg_notAskedPadraig) #\"What do [i]you[/i] think I should learn?\"\n\t\t\"What do [i]you[/i] think I should learn?\" you asked.\n\n\t\t\"Hrm. Based on what you've told me, I think you should be \n\t\t*if att_clever >50\n\t\t\tan artisan, because you're very clever.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Sounds good.\"\n\t\t\t\t\t\"Sounds good,\" you said.\n\n\t\t\t\t\tPadraig smiled. \"An artisan it is, then.\"\n\t\t\t\t\t*set plc_calling \"Artisan\"\n\t\t\t\t\t*set att_clever +10\n\t\t\t\t\t*set att_solid +5\n\t\t\t\t\t*set flg_hasMagic true\n\t\t\t\t\t*goto final_character\n\t\t\t\t#\"No, I'd rather try something else.\"\n\t\t\t\t\t\"No, I'd rather try something else,\" you said.\n\n\t\t\t\t\t\"You know best, of course. So tell me what you want to be.\"\n\t\t\t\t\t*set flg_notAskedPadraig false\n\t\t\t\t\t*goto calling_try_again\n\t\t*elseif att_friendly >50\n\t\t\ta shepherd, because you're quite friendly.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Sounds good.\"\n\t\t\t\t\t\"Sounds good,\" you said.\n\n\t\t\t\t\tPadraig smiled. \"A shepherd it is, then.\"\n\t\t\t\t\t*set plc_calling \"Shepherd\"\n\t\t\t\t\t*set att_friendly +10\n\t\t\t\t\t*set att_clever +5\n\t\t\t\t\t*set flg_hasMagic true\n\t\t\t\t\t*goto final_character\n\t\t\t\t#\"No, I'd rather try something else.\"\n\t\t\t\t\t\"No, I'd rather try something else,\" you said.\n\n\t\t\t\t\t\"You know best, of course. So tell me what you want to be.\"\n\t\t\t\t\t*set flg_notAskedPadraig false\n\t\t\t\t\t*goto calling_try_again\n\t\t*elseif att_solid >50\n\t\t\ta stray, because you're solid and hardy.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Sounds good.\"\n\t\t\t\t\t\"Sounds good,\" you said.\n\n\t\t\t\t\tPadraig smiled. \"A stray it is, then.\"\n\t\t\t\t\t*set plc_calling \"Stray\"\n\t\t\t\t\t*set att_solid +10\n\t\t\t\t\t*set att_mighty +5\n\t\t\t\t\t*goto final_character\n\t\t\t\t#\"No, I'd rather try something else.\"\n\t\t\t\t\t\"No, I'd rather try something else,\" you said.\n\n\t\t\t\t\t\"You know best, of course. So tell me what you want to be.\"\n\t\t\t\t\t*set flg_notAskedPadraig false\n\t\t\t\t\t*goto calling_try_again\n\t\t*elseif att_agile >50\n\t\t\ta hunter, because you're quite agile.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Sounds good.\"\n\t\t\t\t\t\"Sounds good,\" you said.\n\n\t\t\t\t\tPadraig smiled. \"A hunter it is, then.\"\n\t\t\t\t\t*set plc_calling \"Hunter\"\n\t\t\t\t\t*set att_agile +10\n\t\t\t\t\t*set att_sneaky +5\n\t\t\t\t\t*goto final_character\n\t\t\t\t#\"No, I'd rather try something else.\"\n\t\t\t\t\t\"No, I'd rather try something else,\" you said.\n\n\t\t\t\t\t\"You know best, of course. So tell me what you want to be.\"\n\t\t\t\t\t*set flg_notAskedPadraig false\n\t\t\t\t\t*goto calling_try_again\n\t\t*elseif att_sneaky >50\n\t\t\ta ratter, because you're quite sneaky.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Sounds good.\"\n\t\t\t\t\t\"Sounds good,\" you said.\n\n\t\t\t\t\tPadraig smiled. \"A ratter it is, then.\"\n\t\t\t\t\t*set plc_calling \"Ratter\"\n\t\t\t\t\t*set att_sneaky +10\n\t\t\t\t\t*set att_friendly +5\n\t\t\t\t\t*goto final_character\n\t\t\t\t#\"No, I'd rather try something else.\"\n\t\t\t\t\t\"No, I'd rather try something else,\" you said.\n\n\t\t\t\t\t\"You know best, of course. So tell me what you want to be.\"\n\t\t\t\t\t*set flg_notAskedPadraig false\n\t\t\t\t\t*goto calling_try_again\n\t\t*else\n\t\t\ta guardian. Pugmire always needs warriors, and I myself lived a good life with my sword paw.\"\n\n\t\t\t*choice\n\t\t\t\t#\"Sounds good.\"\n\t\t\t\t\t\"Sounds good,\" you said.\n\n\t\t\t\t\tPadraig smiled. \"A guardian it is, then.\"\n\t\t\t\t\t*set plc_calling \"Guardian\"\n\t\t\t\t\t*set att_mighty +10\n\t\t\t\t\t*set att_agile +5\n\t\t\t\t\t*goto final_character\n\t\t\t\t#\"No, I'd rather try something else.\"\n\t\t\t\t\t\"No, I'd rather try something else,\" you said.\n\n\t\t\t\t\t\"You know best, of course. So tell me what you want to be.\"\n\t\t\t\t\t*set flg_notAskedPadraig false\n\t\t\t\t\t*goto calling_try_again\n\t#\"An artisan.\"\n\t\t\"An artisan,\" you said.\n\n\t\tPadraig smiled. \"The mysteries of the Old Ones will soon be in your paws.\"\n\t\t*set plc_calling \"Artisan\"\n\t\t*set att_clever +10\n\t\t*set att_solid +5\n\t\t*set flg_hasMagic true\n\t\t*goto final_character\n\t#\"A shepherd.\"\n\t\t\"A shepherd,\" you said.\n\n\t\tPadraig smiled. \"Soon the faithful of Man will flock to your word.\"\n\t\t*set plc_calling \"Shepherd\"\n\t\t*set att_friendly +10\n\t\t*set att_clever +5\n\t\t*set flg_hasMagic true\n\t\t*goto final_character\n\t#\"A guardian.\"\n\t\t\"A guardian,\" you said.\n\n\t\tPadraig smiled. \"I know from personal experience the satisfaction of using weapons and armor in the name of good dogs everywhere.\"\n\t\t*set plc_calling \"Guardian\"\n\t\t*set att_mighty +10\n\t\t*set att_agile +5\n\t\t*goto final_character\n\t#\"A stray.\"\n\t\t\"A stray,\" you said.\n\n\t\tPadraig smiled. \"You'll become one tough dog, I can tell.\"\n\t\t*set plc_calling \"Stray\"\n\t\t*set att_solid +10\n\t\t*set att_mighty +5\n\t\t*goto final_character\n\t#\"A hunter.\"\n\t\t\"A hunter,\" you said.\n\n\t\tPadraig smiled. \"Soon you will have many trophies from your hunts.\"\n\t\t*set plc_calling \"Hunter\"\n\t\t*set att_agile +10\n\t\t*set att_sneaky +5\n\t\t*goto final_character\n\t#\"A ratter.\"\n\t\t\"A ratter,\" you said.\n\n\t\tPadraig smiled. \"You're a good dog. Or at least, you'll be good at what you do.\"\n\t\t*set plc_calling \"Ratter\"\n\t\t*set att_sneaky +10\n\t\t*set att_friendly +5\n\t\t*goto final_character\n\n*label final_character\n\nThe old warrior talked to himself as he wrote the last line on the parchment. \"$!{plc_fullname} is training to be @{(plc_calling = \"Artisan\") an|a} ${plc_calling}. Make sure ${plc_he} @{plc_nonBinary have|has} everything ${plc_he} @{plc_nonBinary need|needs} to start training. Sincerely, Padraig.\" \n\nHe took another sip of his tea, and stood up from behind his desk. \"You can stay here tonight—I have a spare room you can use. The rest of the cadets will be coming in throughout the day. But for now, get some shut-eye. You look like you could use it.\" He winked, drained his tea, and headed out, leaving you in the house by yourself. You were surprised he left you alone, a dog he barely knew, but he was right about you feeling exhausted. You walked into a cozy bedroom, laid down on the comfortable bed, closed your eyes, and had the last restful night you would for a long time.\n\n*page_break\n[i]Now.[/i]\n\nYour vision begins to blur. You wipe a ${plc_fur}-colored paw across your eyes, which comes away wet. You're not sure if it's because of the rain or not, but as your eyes clear, you see a short pug standing on your left. His fur is a mixture of black and gray, and he's wearing a robe that looks simple but is made from expensive materials. Two labradors, dressed in the livery of the royal guard, stand at attention next to him. The pug ignores the rain, letting the drops splatter on his head as he stares at the grave.\n\nAfter a long moment, the pug turns to look at you. \"Did you have the honor of knowing him well?\"\n\n*choice\n\t#\"Not well enough. Not long enough.\"\n\t\t*set per_ego %-15\n\t\t\"Not well enough,\" you say. \"Not long enough.\"\n\n\t\tThe elderly pug nods. \"Indeed. There is never enough time to spend with those we care about.\" \n\t\t*goto murra\n\t#\"I swore an oath to him. That was enough.\"\n\t\t*set per_loyal %+15\n\t\t\"I swore an oath to him,\" you say. \"That was enough.\"\n\n\t\tThe elderly pug sighs. \"It is good to be loyal to an oath. Moreso to be devoted to a real person.\" \n\t\t*goto murra\n\t#\"It was more of an honor for him to know me.\"\n\t\t*set per_ego %+15\n\t\t\"It was more of an honor for him to know me,\" you say.\n\n\t\tThe elderly pug chuckles ruefully. \"Perhaps, perhaps.\" \n\t\t*goto murra\n\n*label murra\nYou get the impression his mind is elsewhere, though. After a moment, he sneezes, hard. Water flies off his fur in all directions. You and the two royal guards get some drops of water splashed in your faces. The guards don't bat an eye, however.\n\nAs you wipe your eyes again, the pug holds out a paw to you. He is offering to shake, the sacred greeting Man taught dogs. \"My name is Murra. My brother sends his condolences.\"\n\nSuddenly, it all clicks in your head. The royal guards, the pug, the name. This is Seneschal Murra Pug, prince and elder brother to Puckington Pug, the king of Pugmire. And just as suddenly, you are reminded of the time you first met the king.\n\n*page_break\n[i]Several months ago.[/i]\n\n*if ((plc_calling = \"Artisan\") or (plc_calling = \"Shepherd\"))\n\t*if flg_padraigReasonWhy = 1\n\t\t\"Did I ever tell you about the time I killed the Badger King?\" Padraig said.\n\n\t\tThe magic wand warmed in your paw as you pointed it at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. Padraig moved your arm slightly to adjust your aim while continuing his story. \"I shot him right in the face, just like you're going to do to this thing. Right?\"\n\n\t\tYou start to respond, but he put his paw up to stop you. \"Man-damned right you are. Now let 'er rip!\" You thought the command word to the wand, pushed the button, and a beam of red energy leapt out from the tip. The scarecrow burst into flame with a loud [i]woooosh[/i].\n\n\t\tPadraig waved the smoke out of his face. \"Hey, kid, some day you'll be as good as me, but first we need to control your—\"\n\t\t*goto interruption\n\t*elseif flg_padraigReasonWhy = 2\n\t\t\"Stop shuffling around!\" Padraig bellowed in your ear. \"Focus on your target!\"\n\n\t\tThe magic wand warmed in your paw as you pointed it at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. Padraig moved your arm. \"Hold it higher! Are you planning to shoot it or me?\"\n\n\t\tYou start to respond, but he put his paw up to stop you. \"Enough talking! Attack!\" You thought the command word to the wand, pushed the button, and a beam of red energy leapt out from the tip. The scarecrow burst into flame with a loud [i]woooosh[/i].\n\n\t\tPadraig waved the smoke out of his face. \"Better. Now clean it up and we'll—\"\n\t\t*goto interruption\n\t*else\n\t\t\"Breathe in. Breathe out,\" Padraig said.\n\n\t\tThe magic wand warmed in your paw as you pointed it at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. Padraig moved your arm. \"You planning on breathing out again, or what?\"\n\n\t\tYou didn't realize you were holding your breath. You breathed out, and Padraig nodded. \"Finally,\" he said with a smile. \"Now, aim for the head or the chest.\" You thought the command word to the wand, pushed the button, and a beam of red energy leapt out from the tip. The scarecrow burst into flame with a loud [i]woooosh[/i].\n\n\t\tPadraig waved the smoke out of his face. \"That's both the head [i]and[/i] the chest. But you're—\"\n\t\t*goto interruption\n*elseif ((plc_calling = \"Guardian\") or (plc_calling = \"Stray\"))\n\t*if flg_padraigReasonWhy = 1\n\t\t\"Did I ever tell you about the time I killed the Badger King?\" Padraig said.\n\n\t\tYou gripped the sword firmly in your paw, prepared to lunge at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. He adjusted your grip on the sword slightly. \"I stabbed him right in the face, just like you're going to do to this thing. Right?\"\n\n\t\tYou started to protest, but he cut you off before you could. \"Man-damned right you are. Now let 'er rip!\" You ran toward the scarecrow, holding the sword aloft, and chopped hard into the straw and wood. The top half of the scarecrow fell to the ground with a satisfying [i]thump[/i].\n\n\t\tPadraig looked at the mess on the ground. \"Hey, kid, some day you'll be as good as me, but first you need to aim for—\"\n\t\t*goto interruption\n\t*elseif flg_padraigReasonWhy = 2\n\t\t\"Stop shuffling around!\" Padraig bellowed in your ear. \"Focus on your target!\"\n\n\t\tYou gripped the sword firmly in your paw, prepared to lunge at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. He adjusted your grip on the sword slightly. \"Hold it higher! Is this a sword fight or a dance?\"\n\n\t\tYou started to protest, but he cut you off before you could. \"Enough talking! Attack!\" You ran toward the scarecrow, holding the sword aloft, and chopped hard into the straw and wood. The top half of the scarecrow fell to the ground with a satisfying [i]thump[/i].\n\n\t\tPadraig scowled at the mess on the ground. \"Better. Now clean it up and we'll—\"\n\t\t*goto interruption\n\t*else\n\t\t\"Breathe in. Breathe out,\" Padraig said.\n\n\t\tYou gripped the sword firmly in your paw, prepared to lunge at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. He adjusted your grip on the sword slightly. \"You planning on breathing out again, or what?\"\n\n\t\tYou didn't realize you were holding your breath. You breathed out, and Padraig nodded. \"Finally,\" he said with a smile. \"Now, aim for the head or the chest.\" You ran toward the scarecrow, holding the sword aloft, and chopped hard into the straw and wood. The top half of the scarecrow fell to the ground with a satisfying [i]thump[/i].\n\n\t\tPadraig looked at the mess on the ground. \"Not bad. You're getting better. But you're—\"\n\t\t*goto interruption\n*else\n\t*if flg_padraigReasonWhy = 1\n\t\t\"Did I ever tell you about the time I killed the Badger King?\" Padraig said.\n\n\t\tYou felt the bowstring tighten under your fingers, and you pointed the arrow at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. He watched you carefully. \"I shot him right in the face, just like you're going to do to this thing. Right?\"\n\n\t\tYou start to respond, but he put his paw up to stop you. \"Man-damned right you are. Now let 'er rip!\" You released the tension on the bowstring, and the arrow [i]thunked[/i] home on one of the scarecrow's arms.\n\n\t\tHe walked over to look at the arrow. \"Hey, kid, some day you'll be as good as me, but first you need to aim for—\"\n\t\t*goto interruption\n\t*elseif flg_padraigReasonWhy = 2\n\t\t\"Stop shuffling around!\" Padraig bellowed in your ear. \"Focus on your target!\"\n\n\t\tYou felt the bowstring tighten under your fingers, and you pointed the arrow at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. He watched you carefully. \"Hold it higher! Are you planning to shoot it or me?\"\n\n\t\tYou started to protest, but he cut you off before you could. \"Enough talking! Attack!\" You released the tension on the bowstring, and the arrow [i]thunked[/i] home on one of the scarecrow's arms.\n\n\t\tHe walked over to look at the arrow. \"Better. Now collect your arrows and we'll—\"\n\t\t*goto interruption\n\t*else\n\t\t\"Breathe in. Breathe out,\" Padraig said.\n\n\t\tYou felt the bowstring tighten under your fingers, and you pointed the arrow at the scarecrow. The straw-stuffed mannequin was crudely stuck in the back garden of Padraig's home, leaning at a slight angle. He watched you carefully. \"You planning on breathing out again, or what?\"\n\n\t\tYou didn't realize you were holding your breath. You breathed out, and Padraig nodded. \"Finally,\" he said with a smile. \"Now, aim for the head or the chest.\" You released the tension on the bowstring, and the arrow [i]thunked[/i] home on one of the scarecrow's arms.\n\n\t\tHe walked over to look at the arrow. \"Unless you've met some really weird folks, that's not the head [i]or[/i] the chest. But you're—\"\n\t\t*goto interruption\n\n*label interruption\n\nAt that moment, a hound with wiry brown fur speckled with yellow walked up to both of you. \"Sorry to interrupt, govn'r, but it's time to meet with the new 'un.\" \n\n\"Thank you,\" Padraig said. \"Set that down, $!{plc_fname}. I want you to meet someone.\" You did as he said, and Padraig led you inside the house.\n\n*page_break\nInside you saw a large pyrenees with pure white fur sitting in Padraig's favorite chair. She had a book open on the desk in front of her, and her face rested on her massive paws. She glowered at the book as it if were a mortal enemy. Padraig walked up and touched her arm gently. \"Sonya, can you spare a wag?\"\n\nSonya jolted at the sound of his voice. \"Oh! Oh sorry. I was just\"—she waved her paw at the book—\"studying,\" she finished, as if unsure that was the right word for what she was doing.\n\nPadraig took a step back from the startled dog. \"Of course. Sonya Pyrenees, this is $!{plc_fullname}. I thought maybe ${plc_he} could help you.\"\n\nThe large dog crossed her arms and tried to look menacingly at the small corgi. \"I don't [i]need[/i] help,\" she said. \"I [i]need[/i] to learn it on my own.\" She clearly intended it to be firm, but you got the sense she wasn't completely sure of herself yet.\n\nDuring the exchange, you glanced at the book she was reading. It was [i]Pan's Guide for New Pioneers[/i], an introductory text you studied when you first signed up. \n\n*choice\n\t#I offered to help. She should have more confidence in herself.\n\t\t*set per_loyal %+15\n\t\t*set rel_sonya %+10\n\t\tYou offered to help, and Sonya turned her menacing look on you. \"I said, I don't [i]want[/i] help.\"\n\n\t\tYou pointed to the page she had open. \"I've already read that. I can quiz you on some of the information. You'd still be doing the work, but sometimes having a friend can help you be the best dog you can.\"\n\n\t\tHer expression turned thoughtful. \"I suppose that would be okay.\"\n\t\t*goto the_king\n\t#I offered some lessons, if she paid me. I needed something for my time.\n\t\t*set per_idealist %-20\n\t\t*set rel_sonya %-10\n\t\tYou offered to help for a little coin, and Sonya turned her menacing look on you. \"I said I didn't want any help. Why would I give you money for something I don't want?\"\n\n\t\tYou shrugged. \"You need to learn it. I can teach you. But I'd be giving up my time for you. I just want some plastic coins in return.\"\n\n\t\tShe poked you in the chest, hard. \"If you're training to be a pioneer in order to earn some money, you're in the wrong place.\"\n\t\t*goto the_king\n\t#I respected her wishes. She did need to learn on her own.\n\t\t*set per_loyal %-15\n\t\t*set rel_sonya %+10\n\t\tYou told her you respected her wishes. Sonya turned to you. She didn't smile, but her dour look was lightened. \"Thank you! At least [i]someone[/i] around here listens to what I want!\"\n\t\t*goto the_king\n\t#I told her the book was nonsense.\n\t\t*achieve panbook\n\t\t*set per_ego %+15\n\t\t*set rel_sonya %+10\n\t\tYou told her the book was nonsense. Sonya turned to you, with a curious expression on her face. \"What do you mean by 'nonsense'?\"\n\n\t\tYou shrugged. \"I heard every other story he tells is utterly fabricated. I wouldn't believe half of what's in that book.\"\n\t\t*goto the_king\n\n*label the_king\n\nPadraig was about to say something when the door burst open. A small chihuahua in the garb of a royal messenger ran up to him, panting furiously. \"The…the…front door…\"\n\nThe corgi put a friendly paw on the messenger's shoulder. \"Take a deep breath, pup, and give it to me one word after the other.\"\n\nThe messenger nodded and took a deep breath. She let it all out in one big gust, and then spoke again. \"The King of Pugmire requests your presence at the front door.\" She looked at you and Sonya, before adding, \"And…your guests? I think? Should I go ask him?\"\n\nAll three of you raced past the messenger and opened the front door. Outside, the king stood, his tongue lolling out of his mouth in amusement. His fawn-colored fur looked well-groomed and silky, contrasting nicely with his tailored clothing. \"I hope I'm not disturbing you,\" King Puckington said.\n\n\"Not at all.\" Padraig bowed. Not sure what to do, you bowed with him, while Sonya crossed her arms and glowered. Once the bowing was over, the old corgi stepped aside. \"Please, your Majesty. Step inside and meet our newest cadets.\"\n\n*page_break\n[i]Now.[/i]\n\nYou feel a heavy paw land on your shoulder. Looking away from Murra, you see Sonya standing to your right. The rain drips off her pure-white fur and slides down her polished breastplate, freshly painted with the symbol of the Pioneers. \"How are you doing, $!{plc_fname}?\"\n\nInstead of answering, you step back so she can see Murra. \"Sonya, this is Seneschal Murra Pug.\"\n\nSonya immediately stiffens. \"Your Grace,\" she mutters to the elderly pug.\n\nMurra sneezes again, and nods. \"I know your family. They served the crown of Pugmire faithfully in the royal guard for generations. I was sad to learn of your decision.\"\n\nShe snorted. \"My father chose the royal guard over his family's needs. Over [i]my[/i] needs.\"\n\nThe pug nodded. \"And yet you know you could apply to serve with your father in the guard whenever you wanted.\"\n\nYou hear Sonya give a deep intake of breath. You've only known her for a short time, but already you've learned she only does that when she's about to be very loud.\n\n*choice\n\t#\"Your Grace, you should apologize to Sonya.\"\n\t\t\"Your Grace, you should apologize to Sonya,\" you say.\n\n\t\tMurra looks stunned. \"I should…yes, perhaps it's best. In the interest of preserving the sanctity of the moment. I apologize for questioning your choices, Pioneer Pyrenees.\"\n\n\t\tSonya nods, letting the water splatter all over you and the seneschal. \"Accepted,\" she mutters, and storms off. \n\t\t*set rel_sonya %+10\n\t\t*set rep_dog %-10\n\t\t*set rep_cat %+10\n\t\t*goto fiona\n\t#\"Now is not the best time to have this argument.\"\n\t\t\"Now is not the best time to have this argument,\" you say.\n\n\t\tMurra nods. \"I agree. We can have this discussion another time.\"\n\n\t\t\"No,\" Sonya says. \"We won't have this discussion at all. I'm done.\" She storms off. \n\t\t*set rel_sonya %-10\n\t\t*set rep_dog %+10\n\t\t*set rep_cat %-10\n\t\t*goto fiona\n\t#I don't say anything. I love it when Sonya gets riled up!\n\t\tSonya leans down in Murra's face. \"With all due respect, Your Grace, I've been meaning to get this off my chest for some time.\"\n\n\t\tMurra sighs and shrugs into his cloak more, trying to keep the rain off him. \"Go on,\" he says, wearily.\n\n\t\t\"Your brother came to visit last month. And he acted like I wasn't even there. He didn't even recognize me. You can't sit there and tell me he suddenly values my service to the Crown!\"\n\n\t\t\"My brother is…often distracted with important matters of state. But that doesn't mean…\"\n\n\t\t\"I don't want to hear your excuses.\" Sonya storms off.\n\n\t\tMurra turns to you. \"I notice you didn't say much during that tirade.\" \n\t\t*set rel_sonya %+10\n\t\t*set rep_dog %-10\n\t\t*set rep_cat %+10\n\t\t*goto fiona\t\t\n\n*label fiona\n\nIn the distance, you notice a black-furred cat standing under a tree, watching the exchange.\n\nAfter Sonya leaves, you see Padraig's sister, Fiona, step up to the grave. Her fur has a little more gray than Padraig's had, but otherwise she is the spitting image of your old mentor. The assembled dogs stop muttering and complaining about the rain, and listen as she begins her eulogy.\n\n\"Thank you all for coming, and for proving Padraig was good at making two things: catnip tea and friends.\" Everyone chuckles a bit, and she smiles at the mourners. \"But you shouldn't all stand here moping in the rain. It's sad he's gone, but he went exactly the way he would have wanted.\"\n\nShe pauses, and wipes some water from her eyes. \"He died fighting for what he believed in.\"\n\n*page_break\n[i]Two weeks ago.[/i]\n\nIn the old corgi's back garden, Padraig walked up and down the row of cadets, checking each and nodding with approval. \"I believe you'll all make fine Pioneers.\" \n\nSonya stood next to you in line. As soon as Padraig adjusted her cloak and moved past, she turned to you and winked. \"I hope we get to work together,\" she whispered.\n\nPadraig turned and looked back at Sonya. \"Although I believe some of you could do with a little more noise discipline.\" You saw a couple of dogs in the line put their paws over their mouths to avoid snickering. \n\n*choice\n\t#I laughed loudly. Everyone needed to know I liked Padraig's joke.\n\t\t\"Excellent joke, sir,\" you said loudly. The other dogs glanced in annoyance at your attempt to kiss tail, and Sonya growled slightly.\n\t\t*set per_ego %+20\n\t\t*set rel_sonya %-10\n\t\t*goto attack\n\t#I took blame. I didn't want Sonya to get into trouble.\n\t\t\"Sorry, sir,\" you mumbled. Sonya glanced over at you and nodded, recognizing you shifted the blame onto yourself.\n\t\t*set per_loyal %+10\n\t\t*set rel_sonya %+05\n\t\t*goto attack\n\t#I kept quiet. Sonya should have known better.\n\t\tSonya scowled and stared a hole in the ground.\n\t\t*set per_idealist %-15\n\t\t*goto attack\n\n*label attack\n\nThe old corgi turned back to the assembled dogs. \"Yes, you're all ready to officially become Pioneers next—\"\n\nOne of the cadets, a schnauzer, pointed a paw at something behind Padraig. \"Sir, you should look behind you.\"\n\n\"What did I just say about keeping quiet, cadet?\"\n\n\"No really, sir. Something's on the wall.\"\n\nAll of you looked to where the dog was pointing. Standing on top of the stone wall of the garden was a strange bird with black feathers. They were wearing a tan cloak covered in small bones that rattled in the soft breeze like chimes. They held more bones in their furless paws. Or maybe claws? You didn't know what birds call their paws.\n\nPadraig put a paw to his eyes to shade them from the sun, and looked at the bird. \"You there! What's your business?\"\n\nThe bird chuckled. It was evil-sounding, like forced laughter at the end of a tasteless joke. \"My business, old dog, is your demise!\" They raised their wings to the air. \"Attack, my children!\"\n\n[i]You don't want to remember what came next.[/i]\n\n*page_break But You Must\nYou watched in horror as the bones crawled off the cloak and clambered down the wall. Each of them clicked and cracked and twisted into each other, creating misshapen skittering monstrosities. They were all about the size of a small dog's head, and ran in strange, jerky motions, making their movements hard to predict as they scampered up to Padraig.\n\n\"Bone bugs!\" he yelled. \"Defend yourselves!\"\n\nThe cadets jumped into action, trying to put themselves between Padraig and the monstrosities. You saw one of the bone bugs running toward Sonya. It looked like a cat's skull with tiny bone legs twitching and jerking underneath it as it ran. She was too busy fighting off two more of the creatures herself, and didn't see it coming for her. \n\n*choice\n\t#I fought it off with the strength of my sword arm.\n\t\tYou pulled your sword from your scabbard and prepared to attack!\n\n\t\t*choice\n\t\t\t#I swung in a wide arc, slicing at the bone bug!\n\t\t\t\t*set att_mighty %+05\n\t\t\t\t*if att_mighty > 50\n\t\t\t\t\tYou sliced the bone bug in half. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tThe edge of the sword glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t\t\t#I stabbed at the bone bug, hoping to hit something vital!\n\t\t\t\t*set att_mighty %+05\n\t\t\t\t*if att_mighty > 50\n\t\t\t\t\tYou stabbed through the bone bug. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tThe tip of the sword glanced off the hard skin of the bone bug.\n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t\t\t#I hit the bone bug with the flat of my blade!\n\t\t\t\t*set att_mighty %+05\n\t\t\t\t*if att_mighty > 50\n\t\t\t\t\tThe weight of the sword smashed the bone bug. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tThe sword glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t#I sneaked up on it and exploited a weak spot.\n\t\tYou stepped into the nearby shadows, quickly pulled out your dagger, and considered your approach.\n\n\t\t*choice\n\t\t\t#I used the shadows to sneak up on the monster!\n\t\t\t\t*set att_sneaky %+05\n\t\t\t\t*if att_sneaky > 50\n\t\t\t\t\tYou leapt from the shadows to surprise the bone bug, pushing the point of your dagger through the thick skin. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tYou stepped out from the shadows, but at the last second, the bone bug turned and ran in an unexpected direction, and the tip of the dagger glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t\t\t#I threw my voice to distract it while I stabbed!\n\t\t\t\t*set att_sneaky %+05\n\t\t\t\t*if att_sneaky > 50\n\t\t\t\t\tYou make your voice sound like it was coming from behind the wall. As the bone bug \"looked\" in the wrong direction, you pushed the point of your dagger through the thick skin. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tYou stepped forward after throwing your voice, hoping to catch it unawares. But at the last second, the bone bug turned and ran in an unexpected direction, and the tip of the dagger glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t\t\t#I climbed the wall before I leapt down on it!\n\t\t\t\t*set att_sneaky %+05\n\t\t\t\t*if att_sneaky > 50\n\t\t\t\t\tYou climbed the wall behind the bone bug, and then jumped down when its \"back\" was turned. You stabbed your dagger through the thick skin. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tYou climbed the wall behind the bone bug, and then jumped down when its \"back\" was turned. But at the last second, the bone bug turned and ran in an unexpected direction, and the tip of the dagger glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t#I kept my distance and shot it with a bow and arrow.\n\t\tYou quickly slid your bow off your shoulder, and pulled an arrow from the quiver on your back.\n\n\t\t*choice\n\t\t\t#I aimed for the bone bug's head…thing!\n\t\t\t\t*set att_agile %+05\n\t\t\t\t*if att_agile > 50\n\t\t\t\t\tThe tip of the arrow plunged through the thick skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tYou released the arrow, but your target ran in an unexpected direction, and the arrow glanced off the hard skin of the bone bug.\n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t\t\t#I tried to take out one of its many legs!\n\t\t\t\t*set att_agile %+05\n\t\t\t\t*if att_agile > 50\n\t\t\t\t\tThe tip of the arrow plunged through the thick skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tYou released the arrow, but your target ran in an unexpected direction, and the arrow glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t\t\t#It didn't matter, so as long as I hit it!\n\t\t\t\t*set att_agile %+05\n\t\t\t\t*if att_agile > 50\n\t\t\t\t\tThe tip of the arrow plunged through the thick skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %+10\n\t\t\t\t\t*set stg_protect +1\n\t\t\t\t\t*goto attack_successful\n\t\t\t\t*else\n\t\t\t\t\tYou released the arrow, but your target ran in an unexpected direction, and the arrow glanced off the hard skin of the bone bug. \n\t\t\t\t\t*set rel_sonya %-10\n\t\t\t\t\t*set stg_lore +1\n\t\t\t\t\t*goto attack_failed\n\t*selectable_if (flg_hasMagic) #I used a magic spell to defend myself.\n\t\t*set att_clever %+05\n\t\t*if plc_calling = \"Artisan\"\n\t\t\tYou pulled out your focus, a Man-made wand you use to channel your magic, and prepared to cast a spell!\n\n\t\t\t*choice\n\t\t\t\t#I cast a fireball!\n\t\t\t\t\t*set flg_spellCast 1\n\t\t\t\t\t*goto magic_spell\n\t\t\t\t#I summoned magic missiles!\n\t\t\t\t\t*set flg_spellCast 2\n\t\t\t\t\t*goto magic_spell\n\t\t\t\t#I cast a ray of frost!\n\t\t\t\t\t*set flg_spellCast 3\n\t\t\t\t\t*goto magic_spell\n\t\t*if plc_calling = \"Shepherd\"\n\t\t\tYou touched the Hand of Man, the symbol of your faith you wore around your neck, and prepared to cast a spell!\n\n\t\t\t*choice\n\t\t\t\t#I summoned a holy weapon!\n\t\t\t\t\t*set flg_spellCast 4\n\t\t\t\t\t*goto magic_spell\n\t\t\t\t#I cast holy flames!\n\t\t\t\t\t*set flg_spellCast 5\n\t\t\t\t\t*goto magic_spell\n\t\t\t\t#I cast a cone of divine light!\n\t\t\t\t\t*set flg_spellCast 6\n\t\t\t\t\t*goto magic_spell\n\n*label attack_successful\nThe creature fell to the ground twitching, just as Sonya stepped back from the press of the ones she was fighting. The dead (again?) bone bug crunched under her boot, and she quickly looked down. Seeing you were responsible, she smiled briefly before turning back to the fight. \n*goto padraig_dead\n\n*label attack_failed\nNot deterred from its path, the creature leapt onto Sonya's back, biting into her neck. She screamed. \"Knock it off, $!{plc_fname}!\"\n\nYou quickly stepped forward and knocked the thing off her back, careful not to hurt Sonya. Once it landed on the ground, you crushed it with your boot. \"Next time, stop them [i]before[/i] they attack your allies,\" Sonya growled before turning back to the fight. She had a point, but at least you learned bone bugs could be knocked off with a sharp blow. \n*goto padraig_dead\n\n*label magic_spell\n*set rel_sonya %+10\n*set stg_protect +1\n*if flg_spellCast = 1\n\tThe tip of your focus glowed, and you let loose a mighty fireball on the bone bug! \n\t*goto spell_successful\n*if flg_spellCast = 2\n\tThe tip of your focus glowed, and you let loose a pawful of glowing arrows that sped to their target! \n\t*goto spell_successful\n*if flg_spellCast = 3\n\tThe tip of your focus glowed, and a blue ray of cold energy encased the bone bug! \n\t*goto spell_successful\n*if flg_spellCast = 4\n\tYour paw glowed, and a glowing sword appeared in the air and sliced the bone bug in half! \n\t*goto spell_successful\n*if flg_spellCast = 5\n\tYour paw glowed, and a burst of white flame erupted from it, enveloping the bone bug! \n\t*goto spell_successful\n*if flg_spellCast = 6\n\tYour paw glowed, and a cone of pure white light engulfed the bone bug! \n\t*goto spell_successful\n*else\n\tYou tried to summon the mystical energy to release your spell, but nothing happened. The creature, undeterred, leapt onto Sonya's back, biting into her neck. She screamed. \"Knock it off, $!{plc_fname}!\"\n\n\tYou quickly stepped forward and knocked the thing off her back with your paw. Once it landed on the ground, you crushed it with your boot. \"Next time, stop them [i]before[/i] they attack your allies,\" Sonya growled before turning back to the fight. But you learned bone bugs could be knocked off with a sharp blow. \n\t*set rel_sonya %-10\n\t*set stg_lore +1\n\t*goto padraig_dead\n\n*label spell_successful\nThe creature fell to the ground twitching, just as Sonya stepped back from the press of the ones she was fighting. The dead (again?) bone bug crunched under her boot, and she quickly looked down. Seeing your spell had done the deed, she smiled briefly before turning back to the fight.\n\n*label padraig_dead\n*page_break\n\nDespite all the cadets' skill and strength, it wasn't enough. The bone bugs overwhelmed Padraig, and no matter how much you swatted at them or crushed them under your heels, the creatures continued to bite and rip and tear at his flesh until he stopped moving. The last thing you heard from him was the sickly rattle of his last breath.\n\nIn fury, you and the other Pioneers searched for hours, looking for the bird with the black feathers, but they were nowhere to be found. It was harder to search with tears and anger in your eyes.\n\nYou never got the chance to say goodbye to him.\n\n*page_break\n[i]Now.[/i]\n\nYou hear Fiona finishing her eulogy, and wrench your memories away from that night. You watch as she shakes paws with the other Pioneers. She talks quietly with a dog you don't recognize, a borzoi with a long face, black and white fur, and a smirk that seems out of place at a funeral. He looks like he's huddled in his jet-black cloak, but you can see it's not because he's hiding from the rain. After listening to Fiona he nods, and they both walk over to you.\n\n\"$!{plc_fullname},\" Fiona says. \"Thank you for coming. I want you to meet Damian Borzoi.\"\n\nDamian puts his paw out for you. \"Nice weather for a funeral, eh $!{plc_fname}?\"\n\n*choice\n\t#I refuse. \"You should be more respectful at a funeral.\"\n\t\t\"You should be more respectful at a funeral,\" you say.\n\n\t\tDamian lets his paw drop. \"You don't know a thing about me to say that.\"\n\t\t*set per_ego %-20\n\t\t*set rel_damian %-10\n\t\t*goto the_mission\n\t#I shake carefully. \"Did you come to pay your respects to Padraig?\"\n\t\t\"Did you come to pay your respects to Padraig?\" you ask.\n\n\t\tDamian smirks again as he shakes. \"You could say that,\" he says enigmatically.\n\t\t*set per_idealist %+15\n\t\t*goto the_mission\n\t#I give a vigorous pawshake. \"Any friend of Fiona's is a friend of mine.\"\n\t\t\"Any friend of Fiona's is a friend of mine,\" you say.\n\n\t\tDamian smirks again as he shakes. \"I like a dog that jumps into a friendship with both feet.\"\n\t\t*set rel_damian %+05\n\t\t*set per_ego %-10\n\t\t*goto the_mission\n\n*label the_mission\n*set flg_metSupportingCast true\n\nDuring the introduction, Sonya walks over to the group. \"Who's the new guy?\" she asks pointedly.\n\n\"Let's not go through all that again,\" Damian says. \"The big dogs are talking, puppy warrior, so scram.\"\n\nFiona puts a paw on Sonya's arm. \"No, stay, Sonya. I want you to hear this, too. This is hard enough to talk about, so I'd rather say it all at once. Preferably out of the rain.\"\n\n\"And away from other ears,\" Damian mutters.\n\nYou realize something serious is going on as you follow Fiona away from the other mourners. \n\n*page_break\nYou find some shelter under a tree, and Fiona clasps her paws together. \"I'm not sure where to begin.\"\n\n\"The pearls are missing,\" Damian blurts out.\n\nSonya perks an ear. \"What pearls?\"\n\n\"My family has a treasure,\" Fiona says carefully. \"Two large black pearls, believed to possess the magic of the Old Ones.\"\n\nDamian pulls a dagger from under his cloak and starts picking under his claws. \"I knew Padraig wanted his sister to have them. But they're not here.\"\n\n\"How do you know Padraig?\" Sonya asks. \"I've never seen you around his house.\"\n\n\"That's because I'm not a Pioneer,\" he answers, evasively. After a moment, he sighs and blurts out, \"He and I were in love once.\" He looks back at the grave. \"Not anymore.\"\n\n*fake_choice\n\t#\"I'm sorry to hear that.\"\n\t\t\"I'm sorry to hear that,\" you say.\n\n\t\t\"Not as sorry as I am,\" he says.\n\t#\"I didn't know Padraig had a boyfriend.\"\n\t\t\"I didn't know Padraig had a boyfriend,\" you say.\n\n\t\t\"He didn't, not anymore,\" he says. \"We broke up before he died.\"\n\t#\"Did you steal the pearls?\"\n\t\t\"Did you steal the pearls?\" you ask.\n\n\t\tHe laughs. \"You have a lot of tail, I'll give you that. But no, I didn't steal them.\"\n\nFiona sighs. \"Without the pearls, our claim to nobility comes into question. Damian plans to find them to prevent such a loss of face.\" \n\n\"Not just out of some misty-eyed love or any of that scat,\" Damian interjects. \"I mean, I miss Padraig, and I want to know who killed him, but I'm also getting paid to do this.\" He looks at all three of you, and for the first time looks a little awkward. \"Paid well,\" he mutters as an afterthought.\n\n\"As you say,\" Fiona mutters, clearly conflicted about Damian's revelation. \"But I need to stay here in Pugmire to deal with Padraig's affairs. Further, many of the Pioneers Padraig and I worked with are either injured, retired, or just too old.\" She sighs and looks at you. \"I was wondering if you would be willing to help.\"\n\nYou realize how important this is. A family becomes nobility in Pugmire if someone within that family acquires and protects a valuable relic or artifact from the Ages of Man. The Church of Man considers such an act to be in support of one of the tenets of the Code of Man: [i]Fetch What Has Been Left Behind.[/i] Losing such a relic would not only look bad politically, but it could be argued such dogs are acting against the Church of Man.\n\nSonya crosses her arms. \"I'm in. I won't do it for him,\" she says, nodding to Damian. \"But I'll do it for you, Trustee Fiona.\" She turns to you. \"You'll help too, right, $!{plc_fname}?\"\n\n*choice\n\t#\"I'll do it to help the Corgi family honor.\"\n\t\t\"I'll do it to help the Corgi family honor,\" you say.\n\n\t\tSonya nods. \"An excellent reason.\"\n\n\t\tDamian scoffs. \"A foolish reason. But I'll take whatever help I can get, boss.\"\n\t\t*set per_ego %-15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*goto on_the_way\n\t#\"How much plastic is in it for me?\"\n\t\t\"How much plastic is in it for me?\" you ask.\n\n\t\tSonya growls as Damian barks a laugh. \"Now that's some smart thinking for a Pioneer. I could get to like you, boss.\"\n\t\t*set per_idealist %-15\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*goto on_the_way\n\t#\"Only to kill the person behind Padraig's death.\"\n\t\t\"Only to kill the person behind Padraig's death,\" you say.\n\n\t\tSonya glowers at you. \"The Code of Man dictates we bite only those who endanger us. We should not seek out revenge.\"\n\n\t\tDamian snorts. \"Speak for yourself, puppy. I appreciate the kind of vengeance boss here is looking for.\"\n\t\t*set per_tame %-15\n\t\t*set rel_sonya %-10\n\t\t*set rel_damian %+10\n\t\t*goto on_the_way\n\t#\"Just make sure you tell everyone I helped.\"\n\t\t\"Just make sure you tell everyone I helped,\" you say.\n\n\t\tSonya nods and smiles. \"It would help the Corgi family if our success were widely known. Especially if I could tell my family I did it without their help.\" \n\n\t\tDamian rolls his eyes. \"Look, boss, I don't care whose butt gets scratched, as long as we get it done.\"\n\t\t*set per_ego %+15\n\t\t*set rel_sonya %+10\n\t\t*set rel_damian %-10\n\t\t*goto on_the_way\n\n*label on_the_way\n*set oth_coins 4\n\nThe pyrenees turns to look at Damian. \"Boss?\"\n\n\"Yeah. We're all strong-willed dogs here, so we need someone to be the boss. I'm definitely not following a puppy like you, so I say we listen to ${plc_him}.\" He points to you.\n\nSonya growls. \"I. Am not. A puppy.\" After a second she turns to look at you. \"But we do need a leader, and I won't follow this mongrel, so I agree.\" She rolls her eyes a little. \"Just don't make me call you 'boss'.\"\n\nFiona nods, and gives you a small purse full of plastic coins. \"Then it's settled. Here's a down payment on the money I promised Damian. It may be useful in your quest.\" She smiles at you and adds, \"Boss.\"\n\nYou take the coins and sigh. What a way to start your career as a Pioneer.\n*achieve endchapter1\n*finish [i]Chapter Two: Sniffing for Clues[/i]\n", "02-pugmire": "*temp flg_fromPlasticQuarter false\n*temp flg_pirateFightAdvantage false\n*text_image chap_2.png center [b]Chapter Two: Sniffing for Clues[/b]\n\nFiona thanks you, shaking your paw warmly. Damian and Sonya wander off, already squabbling. You look around, and notice the other mourners are leaving as well, in order to get out of the rain. As you consider what to do next, you hear a sharp hiss behind you.\n\nTurning around, you see a black-furred cat standing under a tree—the same cat who watched the conflict between Murra and Sonya earlier. Like many of the other attendees, he wears a cloak to keep the fat raindrops from soaking into his fur, but the black cloak is of fine quality, trimmed with red and bearing a small red seal you don't recognize on the right breast. He hisses again, trying to get your attention.\n\n*fake_choice\n\t#I hiss back. No cat gets away with hissing at me!\n\t\tYou hiss back at the mysterious cat. This flusters him, and he waves an irritated paw at you. \"We do not have time for these childish games, dog,\" he grumbles. \n\t\t*set per_tame %-15\n\t#I wave to him. Maybe he wants to be friends?\n\t\tYou wave to the mysterious cat. He stares at you for a moment, as if trying to decipher a hidden meaning
