ou've done.\"\n*goto nopearls_fiona_leave\n\n*label nopearls_fiona_give\n\nYou nod.\n\n*if stg_protect > 2\n\tShe looks at the pearls in your paws, and closes your fingers over them. \"This is new information for me. While these pearls are a precious family heirloom, your strength and tenacity has shown me that you are a far better protector of these than my family. Perhaps it is best if you hold on them.\"\n\n\t*choice\n\t\t#I accept the pearls graciously.\n\t\t\tYou nod, and put the pearls away. \"Thank you,\" you whisper, choking back tears.\n\n\t\t\t\"No,\" Fiona says. \"Thank [i]you[/i] for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw.\n\t\t\t*goto nopearls_fiona_leave\n\t\t#I politely refuse.\n\t\t\tYou shake your head, and push the pearls back to her. \"Thank you, but these are for your family. I wouldn't feel right keeping them.\"\n\n\t\t\tFiona nods, and carefully takes them from you. \"Guarding these would be a way to honor my brother's passing.\"\n\n\t\t\tYou nod. \"I think so, too,\" you whisper, choking back tears.\n\t\t\t\n\t\t\t\"Thank you for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw.\n\t\t\t*set flg_whoHasPearls 2\n\t\t\t*goto nopearls_fiona_leave\n\t\t*if (flg_pearlsSeparate) #I give her just the Corgi Pearls, keeping the rest for safe-keeping.\n\t\t\tYou shake your head, and give her the Corgi Pearls. \"At least take back what's yours. I can protect the rest.\"\n\n\t\t\tFiona nods, and carefully takes them from you. \"Guarding these would be a way to honor my brother's passing.\"\n\n\t\t\tYou nod. \"I think so, too,\" you whisper, choking back tears.\n\t\t\t\n\t\t\t\"Thank you for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw.\n\t\t\t*set flg_whoHasPearls 102\n\t\t\t*goto nopearls_fiona_leave\t\t\n\t\t#I keep the pearls. Does this make me a noble?\n\t\t\tYou nod, and put the pearls away. \"I guess this makes me a noble now, huh?\" you say, joking to break the tension.\n\n\t\t\tShe smiles. \"If that is your wish. Although I suspect presenting these to the Crown for your petition would make you much more of a target. Perhaps best to keep them secret, at least for now.\"\n\n\t\t\t\"Of course. Thank you.\"\n\n\t\t\t\"No,\" Fiona says. \"Thank [i]you[/i] for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw.\n\t\t\t*goto nopearls_fiona_leave\n*else\n\tShe looks at the pearls in your paws. \"This is new information for me, but they do belong to my family. Thank you for everything you have done for me and my family. May I have them back?\"\n\n\t*choice\n\t\t#I give her the pearls.\n\t\t\tYou give the pearls to her. \"Of course. I wouldn't feel right keeping them.\"\n\n\t\t\tFiona nods, and carefully takes them from you. \"Guarding these would be a way to honor my brother's passing.\"\n\n\t\t\tYou nod. \"I think so, too,\" you whisper, choking back tears.\n\t\t\t\n\t\t\t\"Thank you for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw.\n\t\t\t*set flg_whoHasPearls 2\n\t\t\t*goto nopearls_fiona_leave\n\t\t*if (flg_pearlsSeparate) #I give her just the Corgi Pearls, keeping the rest for safe-keeping.\n\t\t\tYou give her the Corgi Pearls. \"You can take back what's yours. I can protect the rest.\"\n\n\t\t\tFiona nods, and carefully takes them from you. \"Guarding these would be a way to honor my brother's passing.\"\n\n\t\t\tYou nod. \"I think so, too,\" you whisper, choking back tears.\n\t\t\t\n\t\t\t\"Thank you for everything you've done for me and my family,\" Fiona says, wiping her eye with the back of her paw.\n\t\t\t*set flg_whoHasPearls 102\n\t\t\t*goto nopearls_fiona_leave\t\n\t\t#I can better protect the pearls on my own.\n\t\t\tYou shake your head. \"The pearls are too dangerous, and I wouldn't feel right putting your family at risk. It's better if I hang on to them.\"\n\t\t\t\n\t\t\t*gosub nopearls_fiona_choice\n\t\t\t*goto nopearls_fiona_leave\n\t\t#I fought for the pearls. I should keep them.\n\t\t\tYou shake your head. \"I'm the one that risked my fur for these. I should have the right to keep them.\"\n\n\t\t\t*gosub nopearls_fiona_choice\n\t\t\t*goto nopearls_fiona_leave\n\n*label nopearls_fiona_choice\nFiona frowns. \"Surely that's for me and my family to decide?\"\n\n*choice\n\t#It's for the best.\n\t\t\"It's for the best,\" you say. \"I know what they can do better than you. I know how best to protect them.\"\n\n\t\t\"I think you underestimate me and my family,\" she says, her voice growing icy. \"But I certainly won't beg for them.\"\n\t\t*return\n\t#Fiona isn't strong enough.\n\t\t\"To be honest, you're not strong enough,\" you say. \"I can better protect them from enemies.\"\n\n\t\t\"I think you underestimate me,\" she says, her voice growing icy. \"But very well. I won't beg you for them.\"\n\t\t*return\n\t#It's what Padraig would have wanted.\n\t\t\"It's what Padraig would have wanted,\" you say. \"He would want the best dog possible to protect these.\"\n\n\t\t\"You underestimate me and my family,\" she says, her voice growing icy. \"And I don't think you really know what Padraig would have wanted.\"\n\t\t*return\n\n*label nopearls_fiona_leave\n\nAnd before you know it, you're standing outside the carriage again, watching it pull away. \n*page_break\nAs Fiona's carriage leaves, \n*goto final_thoughts_2\n\n*label nopearls_murra\nPug family. You suppose you should have been expected this. The driver of the carriage, a tall pinscher in the colors of the Royal Guard, sits stiffly and obviously ignores you, instead keeping a close eye on the surrounding area.\n\nStepping up to the carriage, you knock on the door. Within moments, Seneschal Murra opens it. He still looks a little sad, like he did at the funeral. Maybe the weight of advising the Crown weighs on him.\n\n\"$!{plc_fname}, please have a seat,\" he says, patting the plush bench next to him.\n\n*fake_choice\n\t#I step inside and sit down.\n\t\tWithout hesitation, you step up into the carriage and sit down next to him.\n\t#I remain standing outside the carriage.\n\t\tYou shake your head. \"I'll stay out here,\" you say, refusing to move.\n\n\t\tHe sighs and shakes his head. \"There are delicate matters to discuss,\" he says carefully. \"They should be kept between us.\"\n\n\t\tYou think for a moment, and realize that the only way to get this conversation over with is to step into the carriage. Reluctantly, you step up into the carriage and sit down next to him.\n\t#I motion him to my house instead.\n\t\t\"Won't you come inside?\" you ask, motioning to your door. \"It would be more comfortable.\"\n\n\t\t\"Thank you,\" he says without hesitation. \"At my age, comfort is a rare commodity.\" He slowly steps down from the carriage, and you unlock the door to your house. Within a few minutes, you've offered him your most comfortable chair, and you take a seat across from him.\n\n\"I hope you got my letter,\" Murra says by way of preamble. You nod, and he continues. \"I hope this isn't an inconvenient time, but I've been anxious for news.\"\n\nYou take a deep breath. \"We confronted the bird who killed Padraig Corgi. Their name is Ambrosia Five Sins, and they were with a pirate named Greedy Bow. @{flg_ambrosiaWandKept I have the wand they used to kill Padraig.\" You give it to him, still carefully wrapped in cloth. \"Be careful.\" He nods as he takes it and puts it into a pocket on his robe.|That pirate stole the pearls.\" He nods in understanding.}\n\n\"I see,\" he says. \"And have you recovered the pearls?\"\n\n*if flg_whoHasPearls = 2\n\t\"I did,\" you say. \n\t*gosub murra_lost_at_sea\n\n\tMurra nods. \"This…does seem to mesh with the information I've learned,\" he says. His face and voice radiate calm, but there's a tension in his body language you're not used to seeing from the elderly pug.\n\t*goto nopearls_murra_nogive\n*else\n\tYou pull the pearls out of your pouch. \n\t*gosub murra_lost_at_sea\n\n\tMurra stares at the pearls. \"This…does seem to mesh with the information I've learned,\" he says. His face and voice radiate calm, but there's a tension in his body language you're not used to seeing from the elderly pug.\n\t*goto nopearls_murra_give\n\n*label murra_lost_at_sea\n\"They turned out to be part of a necklace of pearls,\" you say. \"That necklace was discovered to be an ancient artifact that summoned demons, \n*if (flg_necklaceLost)\n\tbut it was… lost at sea.\"\n\t*return\n*else\n\tbut we recovered it.\"\n\t*return\n\n*label nopearls_murra_nogive\n\nYou nod. \"I returned them to the Corgi family.\"\n\nMurra frowns. \"Of course, they have a right to reclaim such an artifact. But given what we now know about them, are you sure that was wise?\"\n\n*fake_choice\n\t#It's for the best.\n\t\t\"It's for the best,\" you say. \"The Corgi family have protected them for years.\"\n\n\t\t\"And yet, they had them stolen once already,\" he says, his voice tired. \"But \n\t#The Crown has a political agenda.\n\t\t\"To be honest, I fear the Crown has a political agenda,\" you say. \"The Corgi family doesn't have to compromise with rivals.\"\n\n\t\t\"I fear you underestimate the king's idealism,\" he says, his voice tired. \"As well as mine. But \n\t#It's what Padraig would have wanted.\n\t\t\"It's what Padraig would have wanted,\" you say. \"He would want the best dogs possible to protect these.\"\n\n\t\tHe sighs before speaking, his voice tired. \"I don't know if I would agree with you, but I understand why you would think so. Still, \n\nwhat's done is done.\"\n\nAfter a long moment, he raises from his seat. \"You have still done a great service to this kingdom, young $!{plc_family}. And I will not forget that.\"\n*goto nopearls_murra_leave\n\n*label nopearls_murra_give\n\nYou nod.\n\n*if rep_dog > 50\n\tHe scrutinizes the pearls in your paws, and shakes his head. \"I respect your honesty, and your integrity. But your reputation speaks for itself. You work hard for the benefit of dogs everywhere.\"\n\n\t\"Thank you, sir, but how does that relate to the pearls?\"\n\n\tHe stares off into space for a moment, as if trying to choose his words carefully. After a few moments he sighs and looks back at you. \"In truth, I worry that us holding on to such an artifact would be dangerous. It would be better if a good dog, such as yourself, were to hold on to it. At least until we know what to do with it.\"\n\n\t*choice\n\t\t#I accept the pearls graciously.\n\t\t\tYou nod, flattered at the old dog's praise, and put the pearls away. \"Thank you,\" you whisper.\n\n\t\t\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \n\t\t\t*goto nopearls_murra_leave\n\t\t#I politely refuse.\n\t\t\tYou shake your head, and push the pearls back to him. \"Thank you, but these should be in your paws. I wouldn't feel right keeping them.\"\n\n\t\t\tMurra nods, and carefully takes them from you. \"I will make sure these are kept in a secure location, so that no nefarious paws might claim them.\"\n\n\t\t\tYou nod. \"Thank you, sir.\"\n\n\t\t\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \n\t\t\t*set flg_whoHasPearls 3\n\t\t\t*goto nopearls_murra_leave\n\t\t*if (flg_pearlsSeparate) #I give him just the Corgi Pearls, keeping the rest for safe-keeping.\n\t\t\tYou shake your head, and give him the Corgi Pearls. \"At least take these. I can protect the rest.\"\n\n\t\t\tMurra nods, and carefully takes them from you. \"I will make sure these are kept in a secure location, so that no nefarious paws might claim them.\"\n\n\t\t\tYou nod. \"Thank you, sir.\"\n\n\t\t\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \n\t\t\t*set flg_whoHasPearls 103\n\t\t\t*goto nopearls_murra_leave\t\t\n\t\t#I keep the pearls. Does this make me a noble?\n\t\t\tYou nod, and put the pearls away. \"I guess this makes me a noble now, huh?\" you say, joking to break the tension.\n\n\t\t\tHe smiles. \"If that is your wish. Although I suspect presenting these to the Crown for your petition would make you much more of a target. Perhaps best to keep them secret, at least for now.\"\n\n\t\t\t\"Of course. Thank you.\"\n\n\t\t\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \n\t\t\t*goto nopearls_murra_leave\n*else\n\tHe looks at the pearls in your paws. \"I can only imagine what horrors you had to endure. Thank you for everything you have done for the kingdom. However, I think it best if these are now kept in paws more…educated in these matters. Do you agree?\"\n\n\t*choice\n\t\t#I give him the pearls.\n\t\t\tYou give the pearls to him. \"Of course. I wouldn't feel right keeping them.\"\n\n\t\t\tMurra nods, and carefully takes them from you. \"I will make sure these are kept in a secure location, so that no nefarious paws might claim them.\"\n\n\t\t\tYou nod. \"Thank you, sir.\"\n\n\t\t\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \n\t\t\t*set flg_whoHasPearls 3\n\t\t\t*goto nopearls_murra_leave\n\t\t*if (flg_pearlsSeparate) #I give him just the Corgi Pearls, keeping the rest for safe-keeping.\n\t\t\tYou give him the Corgi Pearls. \"Here are the original stolen pearls. I can protect the rest.\"\n\n\t\t\tMurra nods, and carefully takes them from you. \"I will make sure these are kept in a secure location, so that no nefarious paws might claim them.\"\n\n\t\t\tYou nod. \"Thank you, sir.\"\n\n\t\t\t\"Thank [i]you[/i] for everything you've done for my brother and the kingdom.\" Murra smiles. \n\t\t\t*set flg_whoHasPearls 103\n\t\t\t*goto nopearls_murra_leave\t\n\t\t#I can better protect the pearls on my own.\n\t\t\tYou shake your head. \"The pearls are too dangerous, and I wouldn't feel right putting the kingdom at risk. It's better if I hang on to them.\"\n\t\t\t\n\t\t\t*gosub nopearls_murra_choice\n\n\t\t\tAfter a long moment, he raises from his seat. \"You have still done a great service to this kingdom, young $!{plc_family}. And I will not forget that.\"\n\t\t\t*goto nopearls_murra_leave\n\t\t#I fought for the pearls. I should keep them.\n\t\t\tYou shake your head. \"I'm the one that risked my fur for these. I should have the right to keep them.\"\n\n\t\t\t*gosub nopearls_murra_choice\n\n\t\t\tAfter a long moment, he raises from his seat. \"You have still done a great service to this kingdom, young $!{plc_family}. And I will not forget that.\"\n\t\t\t*goto nopearls_murra_leave\n\n*label nopearls_murra_choice\nMurra frowns. \"Given what we now know about them, are you sure that was wise?\"\n\n*choice\n\t#It's for the best.\n\t\t\"It's for the best,\" you say. \"I know what they can do better than you. I know how best to protect them.\"\n\n\t\t\"And yet, they have been stolen once already,\" he says, his voice tired. \"But what's done is done.\"\n\t\t*return\n\t#The Crown has a political agenda.\n\t\t\"To be honest, I fear the Crown has a political agenda,\" you say. \"I don't have to compromise with rivals.\"\n\n\t\t\"I fear you underestimate the king's idealism,\" he says, his voice tired. \"As well as mine. But what's done is done.\"\n\t\t*return\n\t#It's what Padraig would have wanted.\n\t\t\"It's what Padraig would have wanted,\" you say. \"He would want the best dog possible to protect these.\"\n\n\t\tHe sighs before speaking, his voice tired. \"I don't know if I would agree with you, but I understand why you would think so. Still, what's done is done.\"\n\t\t*return\n\n*label nopearls_murra_leave\n\nAnd before you know it, you're standing outside the carriage again, watching it pull away. \n*page_break\nAs Murra's carriage leaves, \n*goto final_thoughts_2\n\n*label final_thoughts_2\nyou wonder if dogs and cats can ever truly be at peace. You made a lot of hard decisions, but you did what any good dog would do. \n\nYou recovered the Corgi Pearls,  \n*if flg_whoHasPearls = 1\n\tand protected them. \n\t*goto final_thoughts_3\n*elseif flg_whoHasPearls = 2\n\tand gave them back to their rightful owners. \n\t*goto final_thoughts_3\n*elseif flg_whoHasPearls = 3\n\tand gave them to the rulers of your kingdom. \n\t*goto final_thoughts_3\n*else\n\tkept some to protect yourself, and gave the rest \n\t*if flg_whoHasPearls = 102\n\t\tback to their rightful owners. \n\t\t*goto final_thoughts_3\n\t*else\n\t\tto the rulers of your kingdom. \n\t\t*goto final_thoughts_3\n\n*label final_thoughts_3\nYou @{flg_greedyBowState survived an encounter with|captured|killed} a notorious cat pirate. You confronted Padraig's murderer. You \n*if stg_lore > 2\n\tlearned much about \n\t*goto final_thoughts_4\n*elseif stg_protect > 2\n\tdefeated many of \n\t*goto final_thoughts_4\n*else\n\tencountered many of \n\t*goto final_thoughts_4\n\n*label final_thoughts_4\nthose that would seek to destroy you and your friends. And, in the end, \n*if (((flg_triadDating) or (flg_sonyaDating)) or (flg_damianDating))\n\tyou found something more valuable than any of that: love.\n\t*goto final_thoughts_5\n*elseif ((rel_sonya > 50) or (rel_damian > 50))\n\tyou found something more valuable than any of that: friendship.\n\t*goto final_thoughts_5\n*else\n\tyou found something more precious than any of that: peace.\n\t*goto final_thoughts_5\n\n*label final_thoughts_5\n\nIf you had to do it all over again, you'd probably make the same decisions.\n\nWouldn't you?\n\nAs the sun sets, you head back home, wondering what the future holds for you.\n\n*achieve endchapter8\n*page_break Epilogue\n*text_image epilogue.png center [b]Epilogue[/b]\n\n*if ((flg_whoHasPearls = 1) or (flg_whoHasPearls > 100))\n\tYou keep the pearls with you, vowing to protect them from whatever may come. \n\t*if (flg_greedyBowState = 2)\n\t\tMany months after your adventures, you are riding back to Pugmire after an adventure with the Royal Pioneers. Suddenly, you are ambushed by none other than Greedy Bow! Somehow he's escaped from his confinement! The nefarious pirate hisses and screams like a cat possessed, clawing at you.\n\t\t*if (stg_badCat \u003c= 2)\n\t\t\tYou struggle with him, but he manages to knock you out. Luckily he didn't discover the pearls while you were unconscious. \n\n\t\t\tBy the time you wake up and raise the alarm, he already has a head start on the Royal Guard and the Royal Pioneers. They are able to apprehend him after a few days, but by then the damage is done. He has killed several of the citizens of Mutt Town, in an ill-fated attempt to take over Pugmire. Cats of all stripes are blamed, and relationships with the Monarchies worsen as you mourn the dead.\n\t\t\t*goto romance_scene_check\n\t\t*else\n\t\t\tDespite his bizarre rage and uncanny skill, you manage to defeat the pirate once again. The pirate continues to lunge for you, leaving you no choice but to kill him. King Puckington thanks you personally for your protection of the pearls and the dispatching of such a horrible criminal.\n\t\t\t*goto romance_scene_check\n\t*elseif (rep_cat >= 40)\n\t\tMany months after your adventures, you are riding back to Pugmire after an adventure with the Royal Pioneers. Suddenly, you are ambushed by a group of black-garbed cats! You are barely able to fight them off long enough to ride back to the safety of Pugmire.\n\n\t\tWhile none of the cats were wearing anything distinctive, they certainly weren't pirates. You suspect the Monarchies of Mau may try again to steal the pearls from you. You vow to be even more vigilant in the months ahead.\n\t\t*goto romance_scene_check\n\t*elseif (flg_muttRespect)\n\t\tMany months after your adventures, you ride near Mutt Town after an adventure with the Royal Pioneers. Cokie Mutt rides out to greet you. The Mutts hold a surprise celebration for you. You end up gorging yourself on sumptuous roast beast while the Mutts dance and sing, thanking you for keeping all dogs and cats safe, regardless of their politics.\n\n\t\tIt's a night you won't soon forget, and you're pleased to have friends like the Mutts.\n\t\t*goto romance_scene_check\n\t*else\n\t\tSurprisingly, no one attempts to steal the pearls from you. Perhaps word of your deeds have scared off any potential thieves?\n\t\t*goto romance_scene_check\n*elseif flg_whoHasPearls = 2\n\t*if (((flg_triadDating) or (flg_sonyaDating)) or (rel_sonya > 55))\n\t\tDespite her misgivings about giving such dangerous artifacts back to the Corgis instead of to the Crown of Pugmire, Sonya stays by your side. \n\t\t*goto romance_scene_check\n\t*elseif ((rel_sonya >=40) and (rel_sonya \u003c=55))\n\t\tSonya continues to express her misgivings about giving such dangerous artifacts back to the Corgis instead of to the Crown of Pugmire. Over time, your friendship deteriorates, but you maintain a cordial-yet-professional relationship.\n\t\t*goto romance_scene_check\n\t*else\n\t\t*goto romance_scene_check\n*elseif flg_whoHasPearls = 3\n\t*if (((flg_triadDating) or (flg_damianDating)) or (rel_damian > 55))\n\t\tDespite his frustration about now giving the Corgi Pearls back to Padraig's family, Damian stays by your side. \n\t\t*goto romance_scene_check\n\t*elseif ((rel_damian >=40) and (rel_damian \u003c=55))\n\t\tDamian continues to express his frustration at not returning the Corgi Pearls to Padraig's family. Over time, your friendship deteriorates, but you maintain a cordial-yet-professional relationship.\n\t\t*goto romance_scene_check\n\t*else\n\t\t*goto romance_scene_check\n*else\n\t*bug (You shouldn't be here!)\n\n*label romance_scene_check\n\nTime passes. \n*if ((flg_triadDating))\n\tThe three of you continue your lives as Royal Pioneers, working together as a team. The bickering between Damian and Sonya becomes more good-natured, as the love between the three of you grows into a comfortable camaraderie.\n\n\tThe three of you open the Padraig Academy to teach the puppies and kittens of Pugmire self-defense.\n\n\t*gosub damian_padraig\n\t*page_break\n\t*gosub sonya_father\n\t*goto good_dog\n*elseif (flg_damianDating)\n\tYou and Damian continue your lives, working as a team and offering your services wherever they're needed. \n\t*gosub damian_padraig\n\t*goto good_dog\n*elseif (flg_sonyaDating)\n\tYou and Sonya continue your lives as Royal Pioneers, working as a team and offering your services wherever they're needed. \n\t*gosub sonya_father\n\t*goto good_dog\n*else\n\t*goto good_dog\n\n*label damian_padraig\nOnce a month, both of you visit Padraig's grave to leave flowers and clean it.\n\n\"It gets easier each time,\" Damian says. \"Seeing him like this.\"\n\n\"It does,\" you agree. \"But the pain never quite goes away.\"\n\nHe reaches out for your ${plc_fur} paw and squeezes it. \"No,\" he says. \"But I'm glad you're here to share his memory with.\"\n\nYou squeeze back and smile.\n*return\n\n*label sonya_father\nOne day, while visiting Castle Pugmire, Sonya suddenly whimpers and ducks behind a column. You see a tall pyrenees wearing the outfit of the Royal Guard looking around. \"Excuse me,\" he says in a deep, rumbling voice. \"Have you seen my daughter anywhere? I thought I saw her.\"\n\nSighing, Sonya steps into view. \"Hi, Dad,\" she says in a small voice.\n\n\"There you are,\" the elder pyrenees says. \"I just got out of a meeting with the King, and he was telling me all about your good work.\"\n\n\"The King?\" she asks.\n\n\"He says you are a fine dog, and I quite agree.\" He looks down at his paws. \"I was…disappointed when you joined the Royal Pioneers instead of the Royal Guard, but you've turned into a fine dog.\" He wipes his eye. \"I am proud to have a daughter as brave and strong as you.\"\n\nSonya looks at him in shock. The silence stretches, getting awkward. Finally, the elder pyrenees puts a paw on your shoulder. \"I'm sure she'll take good care of you, $!{plc_fname}, and I hope the both of you come to visit sometime.\" With that, he walks off at a brisk pace.\n\nShe shakes herself in disbelief. \"I guess my dad likes you.\"\n\nYou reach out for her paw and squeeze it. \"I like you too.\"\n\nShe smiles.\n*return\n\n*label good_dog\n\nHowever, unbeknownst to you, other events are in motion.\n*page_break\n\n[i]Somewhere on the Acid Sea[/i]\n\nA small ship bobs up and down on the water. Two dogs, a poodle and a boxer, stare out over the water.\n\n\"We've got to find land soon,\" the poodle says as he stares at the water.\n\n\"You've been saying that for days,\" the boxer says, not looking at him.\n\n\"I keep saying it because it's true.\"\n\nThe boxer starts to argue, but suddenly stops, her attention drawn by something in the distance. \"Wait. I see something.\" She slaps at the poodle with her paws. \"Look, look, over there.\"\n\nThe poodle dodges the boxer's blows and pulls out a battered spyglass. After a moment of \"hrm\" and \"huh,\" he lowers it and smiles. \"It's an island.\"\n\nThe boxer squints into the distance. \"It looks red, for some reason.\"\n\n\"It's an [i]island[/i],\" the poodle says. \"Who cares what it looks like?\" He scrambles to adjust the sails. \"That means food, and water, and maybe a way to orient ourselves so we can head back home!\"\n\nThe small ship bobs up and down on the water. And on Red Sand Isle, a bird with black feathers watches and chuckles as they rub their paws together. Soon, they will be off this island, and can plan their revenge.\n\n*page_break\nBut that's a story for another time. \n\nThrough everything, the Kingdom of Pugmire continues to stand against a dangerous and scary world. Some call it the City of Good Dogs, and it counts you among their number.\n\n*page_break Who Was a Good Dog?\n*set flg_goodDog ((((per_tame) + (per_idealist)) + (per_loyal)) + (per_ego))/4\n*if flg_goodDog >= 55\n\tAll in all, you were a very good dog. The best. Yes you were!\n\t*achieve endverygooddog\n\t*goto end\n*else\n\tAll in all, you were a good dog.\n\t*achieve endgame\n\t*goto end\n\n*label bad_ending\nDespite all the warnings, despite seeing what the pearls did to Greedy Bow and his pirates, you decide to use the pearls. Surely, you can succeed where others have failed.\n\nYou hold the pearls in your paws and open yourself to the power within. For a moment they throb with a dark, purple light. And that's the last thing you see.\n\nFor years after, puppies were told the story of the Dread Dog $!{plc_fname}. The dog who did what Should Not Be Done. The dog who died, went feral, or got possessed by a demon. The dog who killed so many people before ${plc_he} @{(plc_nonBinary = true) were|was} finally stopped.\n\n$!{plc_fullname}. The Bad Dog.\n*label end\n*page_break The End\nWe hope you've enjoyed playing [i]Pugmire: Treasure of the Sea Dogs[/i].\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "choicescript_description": "Will you be a good dog, or a scurvy sea dog? In this swashbuckling furry adventure, when nefarious pirate cats murder your mentor and steal the famous Corgi Pearls, you'll chase the cats across the seas to fetch and recover the treasure!\n\n[i]Pugmire: Treasure of the Sea Dogs[/i] is a 100,000-word interactive nautical tail by Eddy Webb, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\"Be a good dog. Protect your home. Be loyal to those who are true.\" — The Code of Man\n\nDogs, cats, and other uplifted species have inherited the world, untold centuries after the Ages of Man have ended. Now, in the kingdom of Pugmire, you are a recently graduated member of the Royal Pioneers of Pugmire, a group dedicated to traveling the more hazardous parts of the world to protect dogs in need, recovering lost knowledge and artifacts, and hunting down dangerous criminals. But when your trustee and patron Padraig Corgi is murdered by a dark wizard, and his family's treasured pearls stolen, it's up to you to recover the pearls and avenge his death!\n\nYou'll travel with fellow pioneer Sonya Pyrenees, a fearless warrior who has turned her back on her family's heritage in order to fight evil abroad, and Damian Borzoi, a ne'er-do-well ex-lover of Padraig's who wants revenge while having a good time…ideally with someone else's money. Together you explore the ruins of Earth with sword or spells in your paw!\n\nAs you strike out and make a name for yourself, and for your family, can you navigate the tense post-war politics between your kingdom and the enemy city-states of the cats? Will you embrace or reject the dogs who have cast off the leash of civilization? Are you a good dog, and will others see you as one?\n\n• Play as male, female, or nonbinary; gay, straight, aromantic, or polyamorous.\n• Explore a future-fantasy world of uplifted dogs, cats, birds, and others.\n• Navigate the politics of both the kingdom of Pugmire and their rivals, the cats of the Monarchies of Mau.\n• Choose any breed of dog you like, as well as from one of eight distinct callings.\n• Sail on the Acid Sea, keeping your ship afloat while avoiding sea monsters and pirates.\n• Fight or outsmart demons, zombies, and the kraken.\n\nA pawesome adventure awaits!", "choicescript_stats": "[b]Name[/b]: $!{plc_fullname}\n\n[b]Fur Color[/b]: $!{plc_fur}\n\n*text_image calling.png center [b]Calling[/b]\n${plc_calling}\n\n*label coins_chart\n*text_image purse.png center [b]Purse[/b]\n${oth_coins}\n\n*text_image attributes.png center [b]Attributes[/b]\n*stat_chart\n\tpercent att_agile Agile\n\tpercent att_clever Clever\n\tpercent att_friendly Friendly\n\tpercent att_mighty Mighty\n\tpercent att_solid Solid\n\tpercent att_sneaky Sneaky\n\n*text_image personality.png center [b]Personality[/b]\n*stat_chart\n\topposed_pair per_tame\n\t\tTame \n\t\tWild\n\topposed_pair per_idealist\n\t\tIdealist\n\t\tPragmatist\n\topposed_pair per_loyal\n\t\tLoyal\n\t\tIndependent\n\topposed_pair per_ego\n\t\tEgotist\n\t\tHumble\n\n*if flg_metSupportingCast\n\t*text_image relationships.png center [b]Relationships[/b]\n\t*stat_chart\n\t\tpercent rep_dog Reputation with Dogs\n\t\tpercent rep_cat Reputation with Cats\n\t\tpercent rel_sonya Sonya Friendship\n\t\tpercent rel_damian Damian Friendship", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 8[/b]\n  \n  Unlock chapters 4 through 8, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 8[/b]\n  \n  You've paid to unlock chapters 4 through 8.\n", "screenshots": "*set plc_fullname \"Yosha Pug\"\n*set plc_fur \"Cream\"\n*set plc_calling \"Artisan\"\n*set oth_coins 0\n*set att_agile 50\n*set att_clever 70\n*set att_friendly 70\n*set att_mighty 50\n*set att_solid 65\n*set att_sneaky 50\n*set per_tame 55\n*set per_idealist 55\n*set per_loyal 55\n*set per_ego 45\n*set rep_dog 55\n*set rep_cat 45\n*set rel_sonya 50\n*set rel_damian 50\n\nYou watched in horror as the individual bones clambered down the wall. Each of them clicked and cracked and twisted into each other, creating misshapen skittering monstrosities. They were all about the size of a small dog's head, and ran in strange, jerky motions, making their movements hard to predict as they scampered up to the gathered cadets.\n\n\"Bone bugs!\" your leader Padraig yelled. \"Defend yourselves!\"\n\nYou saw one of the bone bugs running toward you. It looked like a cat's skull with tiny bone legs twitching and jerking underneath it as it ran. \n\n*fake_choice\n\t#I fought it off with the strength of my sword arm.\n\t#I snuck up on it and exploited a weak spot.\n\t#I kept my distance and shot it with a bow and arrow.\n\t#I used a magic spell to defend myself.\n\n*set plc_fullname \"Rusty Mutt\"\n*set plc_fur \"Brown\"\n*set plc_calling \"Guardian\"\n*set oth_coins 1\n*set att_agile 65\n*set att_clever 50\n*set att_friendly 50\n*set att_mighty 70\n*set att_solid 70\n*set att_sneaky 50\n*set per_tame 50\n*set per_idealist 45\n*set per_loyal 60\n*set per_ego 56\n*set rep_dog 57\n*set rep_cat 43\n*set rel_sonya 55\n*set rel_damian 45\n\nRamshackle buildings lean against each other, like drunks working together to walk in a straight line. Most of the homes and shops are still closed, but a few windows show signs of activity. There isn't much traffic, but many of the pawful of people you see on the streets are cats, although some are dogs, as well as mice and rats. Several are sleeping rough, huddled under threadbare blankets or tattered coats as they curl up in alleyways.\n\nAs you ponder the plight of Pugmire's homeless, you notice a kitten yanking on the end of your shirt. Her clothes are dirty, shredded rags, all turned shades of gray from the dirt and wear. She looks like she hasn't eaten in days, and her fur is patchy. \"Please, kind dog. A little plastic to help a starving kitten.\"\n\n*fake_choice\n\t#I give the kitten a coin.\n\t#I quietly offer some of my rations to the kitten.\n\t#I encourage her to join us.\n\t#I ignore the kitten. It's probably a scam anyway.\n\n*set plc_fullname \"Dixie Shibainu\"\n*set plc_fur \"Black\"\n*set plc_calling \"Stray\"\n*set oth_coins 2\n*set att_agile 70\n*set att_clever 50\n*set att_friendly 50\n*set att_mighty 65\n*set att_solid 70\n*set att_sneaky 50\n*set per_tame 40\n*set per_idealist 45\n*set per_loyal 40\n*set per_ego 60\n*set rep_dog 52\n*set rep_cat 55\n*set rel_sonya 62\n*set rel_damian 57\n\nSuddenly, the ship shakes and you hear a loud crack, followed by a heavy drumming sound. The two of you rush outside and find yourself in a thunderstorm. The sky is full of black clouds and the rain beats onto the deck, as the ship bounces over hard waves. You watch in horror as one of the mice crewmembers is hit with a wave and washed over the side of the ship.\n\n\"Crew overboard!\" the crow screams from the crow's nest.\n\nCaptain Sabu turns to you. \"We have to get them out of there. Someone can survive for a while in the Acid Sea, but eventually even the hardiest crewmember can suffer from burns.\"\n\n*fake_choice\n\t#I order Sonya to dive in after the mouse.\n\t#I command Damian to rescue the mouse.\n\t#I dive in myself, because I'm a hero.\n\t#I throw down a rope and hope to pull the mouse up. \n\n*set plc_fullname \"Darby Boxer\"\n*set plc_fur \"Gold\"\n*set plc_calling \"Stray\"\n*set oth_coins 1\n*set att_agile 50\n*set att_clever 50\n*set att_friendly 50\n*set att_mighty 65\n*set att_solid 90\n*set att_sneaky 50\n*set per_tame 50\n*set per_idealist 64\n*set per_loyal 71\n*set per_ego 39\n*set rep_dog 41\n*set rep_cat 58\n*set rel_sonya 70\n*set rel_damian 35\n\nAmbrosia starts to tremble. \"I…I don't care. Greedy Bow will protect me.\"\n\nYou nod over to the cat captain, who is still struggling with the chest. \"He doesn't seem particularly concerned with your welfare.\"\n\nThe black bird squawks in frustration, and throws something on the ground. Billows of smoke rise up, stinging the eyes of everyone in the area. \"You'll never catch me!\" the bird screams.\n\n*fake_choice\n\t#I use the smoke to sneak close to the bird to grab them unawares.\n\t#I charge in, holding my breath for as long as possible.\n\t#I drop down and crawl under the smoke as quickly as I can.", "startup": "*title Pugmire: Treasure of the Sea Dogs\n*author Eddy Webb\n\n*scene_list\n\tstartup\n\t01-padraig\n\t02-pugmire\n\t03-houndton\n\t04-going_south\n\t05-waterdog_port\n\t06-sailing\n\t07-island\n\t08-climax\n\n*comment ACHIEVEMENTS\n*achievement playaspug visible 25 It's In The Name\n\tPlay Pugmire as a Pug.\n*achievement panbook visible 50 One Star\n\tGive Pan's book a bad review.\n*achievement endchapter1 visible 25 Attend a Funeral\n\tFinish Chapter One.\n*achievement buyring visible 25 Buy a Ring\n\tBuy a nice ring with your plastic.\n*achievement reputable visible 50 Reputable\n\tTalk with Pan about Mr. Meow's reputation.\n*achievement endchapter2 visible 25 Start a Fight\n\tFinish Chapter Two.\n*achievement drinkbucket visible 25 Drink It\n\tDrink from a bucket.\n*achievement hummingthing visible 50 Hum A Little Tune\n\tUse the humming thing at the right moment.\n*achievement endchapter3 visible 25 Find a Demon\n\tFinish Chapter Three.\n*achievement runawayhorse visible 25 Bucking Bronco\n\tStop a runaway horse.\n*achievement fellowstray visible 50 Eye to Eye\n\tAppeal to a fellow outsider.\n*achievement endchapter4 visible 25 Meet a Mutt\n\tFinish Chapter Four.\n*achievement grabkitten visible 25 Free Kittens\n\tGrab a kitten.\n*achievement preachshepherd visible 50 Preach to the Choir\n\tConvert a dog to Man as a Shepherd.\n*achievement endchapter5 visible 25 Hire a Ship\n\tFinish Chapter Five.\n*achievement kissdamiansonya visible 25 Dog Kisses\n\tKiss a dog.\n*achievement badending visible 50 Glub Glub\n\tDie a watery death.\n*achievement endchapter6 visible 25 Sail the Seas\n\tFinish Chapter Six.\n*achievement noneleftbehind visible 50 No Dog Left Behind\n\tGo ashore with your entire crew.\n*achievement winduel visible 25 Win a Duel\n\tDefeat a pirate in a duel.\n*achievement endchapter7 visible 25 Survive a Kraken\n\tFinish Chapter Seven.\n*achievement dompossessed visible 50 Turtle Power\n\tKeep the pearls out of a pirate's hands.\n\tDom ends up getting possessed.\n*achievement keeppearls visible 25 Keepsake\n\tBecome entrusted with the pearls.\n*achievement endchapter8 visible 25 Uncover a Secret\n\tFinish Chapter Eight.\n*achievement endgame visible 25 Be a Good Dog\n\tFinish the story.\n*achievement endverygooddog visible 50 Be a Very Good Dog\n\tFinish the story as a very good dog.\n*achievement romancesonya visible 25 I Love Sonya\n\tDevelop a romance with Sonya.\n*achievement romancedamian visible 25 I Love Damian\n\tDevelop a romance with Damian.\n*achievement romancetriad hidden 50 I Love Everyone\n\thidden\n\tDevelop a polyamorous relationship.\n\n*comment PERSONALITY TRAITS\n*create per_tame 50\n\t*comment How aggressive is your dog? Opposed by Wild.\n*create per_idealist 50\n\t*comment How giving is your dog? Opposed by Pragmatist.\n*create per_loyal 50\n\t*comment How loyal is your dog to others? Opposed by Independent.\n*create per_ego 50\n\t*comment How egotistical is your dog? Opposed by Humble.\n\n*comment ATTRIBUTES\n*create att_clever 50\n\t*comment How smart and knowledgeable is your character? (Also helps with magic.)\n*create att_friendly 50\n\t*comment How social is your character?\n*create att_agile 50\n\t*comment How dexterous is your character?\n*create att_sneaky 50\n\t*comment How quiet and stealthy is your character?\n*create att_mighty 50\n\t*comment How strong is your character?\n*create att_solid 50\n\t*comment How tough is your character?\n\n*comment STORY GOALS\n*create stg_fetch 0\n\t*comment Have you uncovered the clues to find the Corgi Pearls?\n*create stg_badCat 0\n\t*comment Have you done enough to defeat Greedy Bow? (Bigger score means more advantage against him.)\n*create stg_padraig 0\n\t*comment Did you discover how Padraig died?\n*create stg_lore 0\n\t*comment Have you discovered ways to defeat monsters non-violently? (Illiad will take enough knowledge of dangerous entities in lieu of the artifact.)\n*create stg_protect 0\n\t*comment How many monsters have you destroyed in the name of Pugmire? (number changes ending rank)\n\n*comment OTHER STATS\n*create rep_dog 50\n\t*comment Impacts whether Murra Pug (Pugmire) trusts you near the end.\n*create rep_cat 50\n\t*comment Impacts whether Illiad von Korat (Mau) trusts you near the end.\n*create rep_crew 50\n\t*comment Your relationship score with the crew of The Pig's Tale (ch. 6 and 7 only).\n*create rel_sonya 50\n\t*comment Your relationship score with Sonya. This leads to unique scenes with Sonya near the end.\n*create rel_damian 50\n\t*comment Your relationship score with Damian. This leads to unique scenes with Damian near the end.\n*create oth_coins 0\n\t*comment How much money does your character have? Essentially, this is used to buy off certain tests that go badly for the player, like social ones (most anyone will talk given enough money). SELECTABLE_IF.\n\n*comment DEFAULT PLAYER GEN VALUES\n\t*comment Use as such: $!{plc_fname} -- this forces the name to be capitalized.\n*create plc_fname \"Unknown\"\n*create plc_family \"Dog\"\n*create plc_fullname \"Unknown Dog\"\n*create plc_mutt false\n*create plc_calling \"Pioneer\"\n*create plc_fur \"brown\"\n\n*comment GENDER VARIABLES\n*create plc_nonBinary true\n\t*comment Use as such: @{plc_nonBinary have|has}\n*create plc_he \"they\"\n*create plc_him \"them\"\n*create plc_his \"their\"\n*create plc_himself \"themselves\"\n\n*comment MISC STORY FLAGS \n*create flg_metSupportingCast false \n\t*comment Used to turn on relationship section of stat screen.\n*create flg_hasMagic false \n\t*comment Used to offer selectable_if magic options.\n*create flg_agreedGiveLoreToIlliad false \n\t*comment Used in final chapter if player agreed to give lore to Illiad.\n*create flg_sentKittenToFiona false \n\t*comment Used in final chapter if the player sent a starving kitten to Fiona Corgi to join the Pioneers.\n*create flg_patchesStatus 0\n\t*comment Used in chapter four to reflect Patches' status. 0 = unencountered; 1 = given to police dogs; 2 = let her go; 3 = tie her up.\n*create flg_heardAboutTrap false\n\t*comment Used in chapter four if the player was told about the pirate trap on the river.\n*create flg_muttRespect false\n\t*comment Used in chapter seven if you helped Mutt Town to see if the pirates rebel.\n*create flg_sonyaToldDemonStory false\n\t*comment Used in chapter five to mark if Sonya told the PC about how her mother died. \n*create flg_damianToldPadraigStory false\n\t*comment Used in chapter five to mark if Damian told the PC about how he and Padraig broke up.\n*create flg_savedMouse false\n\t*comment used in chapter five to mark if the mouse that fell overboard was saved.\n*create flg_sonyaDating false\n\t*comment Used in chapter six to indicate you're now romantically involved with Sonya.\n*create flg_damianDating false\n\t*comment Used in chapter six to indicate you're now romantically inolved with Damian.\n*create flg_triadDating false\n\t*comment Used in chapter six to indicate you are romantically involved with both Sonya and Damian.\n*create flg_raisedMorale false\n\t*comment Used in chapter six to indicate if you raised crew morale after the grog was tainted.\n*create flg_nobodyDating false\n\t*comment Used in chapter seven to indicate the character isnt' dating anyone.\n*create flg_damianStayed false\n\t*comment Used in chapter seven to indicate whether Damian stayed behind on the ship due to a low relationship score. They will leave as soon as they can for Pugmire.\n*create flg_sonyaStayed false\n\t*comment Used in chapter seven to indicate whether Sonya stayed behind on the ship due to a low relationship score. They will leave as soon as they can for Pugmire.\n*create flg_greedyBowState 1\n\t*comment Used in chapter seven to indicate what state Greedy Bow is in. 1 = alive and free; 2 = alive and captured; 3 = dead.\n*create flg_ambrosiaWandKept false\n\t*comment Used in chapter seven to indicate if the player kept Ambrosia's wand as evidence.\n*create flg_goodDog 0\n\t*comment Used in epilogue to determine if character is a good dog.\n\n*if choice_is_omnibus_app\n\t*comment skip description\n\n\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tWill you be a good dog, or a scurvy sea dog? In this swashbuckling furry adventure, when nefarious pirate cats murder your mentor and steal the famous Corgi Pearls, you'll chase the cats across the seas to fetch and recover the treasure!\n\n\t[i]Pugmire: Treasure of the Sea Dogs[/i] is a 100,000-word interactive nautical tail by Eddy Webb, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t\"Be a good dog. Protect your home. Be loyal to those who are true.\" — The Code of Man\n\n\tDogs, cats, and other uplifted species have inherited the world, untold centuries after the Ages of Man have ended. Now, in the kingdom of Pugmire, you are a recently graduated member of the Royal Pioneers of Pugmire, a group dedicated to traveling the more hazardous parts of the world to protect dogs in need, recovering lost knowledge and artifacts, and hunting down dangerous criminals. But when your trustee and patron Padraig Corgi is murdered by a dark wizard, and his family's treasured pearls stolen, it's up to you to recover the pearls and avenge his death!\n\n\tYou'll travel with fellow pioneer Sonya Pyrenees, a fearless warrior who has turned her back on her family's heritage in order to fight evil abroad, and Damian Borzoi, a ne'er-do-well ex-lover of Padraig's who wants revenge while having a good time…ideally with someone else's money. Together you explore the ruins of Earth with sword or spells in your paw!\n\n\tAs you strike out and make a name for yourself, and for your family, can you navigate the tense post-war politics between your kingdom and the enemy city-states of the cats? Will you embrace or reject the dogs who have cast off the leash of civilization? Are you a good dog, and will others see you as one?\n\n\t• Play as male, female, or nonbinary; gay, straight, aromantic, or polyamorous.\n\t• Explore a future-fantasy world of uplifted dogs, cats, birds, and others.\n\t• Navigate the politics of both the kingdom of Pugmire and their rivals, the cats of the Monarchies of Mau.\n\t• Choose any breed of dog you like, as well as from one of eight distinct callings.\n\t• Sail on the Acid Sea, keeping your ship afloat while avoiding sea monsters and pirates.\n\t• Fight or outsmart demons, zombies, and the kraken.\n\n\tA pawesome adventure awaits!\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first three chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2021-07-22 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased"}};
