<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avatar of the Wolf — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "avatarofthewolf", "title": "Avatar of the Wolf", "scenes": {"10_wolves": "*text_image final.png center Final: Wolves\n\n[i]\"You are mine,\" Wolf said, and bared his awful teeth.[/i]\n\n[i]\"Whether I offer mercy or the glory of being torn apart limb by limb, you are mine—every delicious bit of you.\"[/i]\n*line_break\n- excerpted from the testimony of the supposed first-ever avatar of Wolf.\n*page_break\n\nYou are surrounded by trees, as ever in these dreams, but the feeling is more keen than it has ever been. You can feel the chill of the air and can clearly make out the individual snowflakes drifting from the low-hanging branches. They fall so slowly that it is almost as if they are suspended.\n\nSnow crunches beneath your feet as you walk a path that winds through the woods. You know, in the inexplicable surety of dreams, that the only way out of the woods is through, so you follow the path, though the world darkens around you by degrees. \n\nIt does not take long for you to come upon him. \n\nWolf sits on his back paws, recumbent and almost still enough to suggest relaxation. You doubt the lupine god has relaxed for even a moment since his inception. He regards you with something resembling \n*if action \u003c 70\n\tgeneral disdain.\n*if action >= 70\n\tcautious anticipation.\n*comment endif\n\nHe is larger than any wolf you have ever seen. You expected that, but you could not have anticipated the way his gray fur reveals hints of red whenever he moves even slightly, or the incongruous patch of bone-white that circles his right eye. His features are expressive, but whatever his half-animal mind is thinking lies beyond your ken. \n\nYou expect some kind of reaction from him, but for a long time nothing happens. Wolf just sits in the snow and stares at you as the snow drifts at its glacial, lazy pace. So naturally, his sudden attack jolts you. The god whose domain is hunger leaps at you, moving his impressive bulk with swift and sleek power. You are forced to react immediately:\n\n*choice\n\t#I rouse the snow to wakefulness and urge it to rise against my attacker.\n\t\t*if ritual >= 20\n\t\t\tThe ice and snow are slow to respond, so indolent have they become in this cold, slow place, but in the last instant—as Wolf's jaw widens and the arc of his leap threatens to crush you underneath him—the stillness of this dream-space is upended. A vicious whirl of ice and gentle snowflakes turned jagged by force erupts between you and Wolf.\n\n\t\t\tWolf howls as the relentless swirl of ice throws him backward through the air and onto the ground. By the time he stands again, he seems uncharacteristically hesitant to attack. \n\t\t\t*goto wolf_fight_success\n\t\t*else\n\t\t\t*goto wolf_fight_fail\n\t#I rely on my instincts and quick reflexes to evade Wolf and keep him at a distance.\n\t\t*if quickthinking >= 15\n\t\t\tWolf cannot hurt you if he cannot catch you, so you dash toward Wolf as he comes down at you and then slide underneath him in a flurry of ice and kicked up snow. \n\t\t\t*goto wolf_fight_success\n\t\t*else\n\t\t\t*goto wolf_fight_fail\n\t#I meet him head on. I will not be his easy snack.\n\t\t*if combat >= 20\n\t\t\tYou wait until Wolf is nearly crashing down on you and reach up, digging both hands into the scruff of his neck and jerk hard enough to send him careening away from you. He makes a noise full of indignation as he crashes into the ground. You prepare for his counter-attack, but Wolf makes no immediate move toward you.\n\t\t\t*goto wolf_fight_success\n\t\t*else\n\t\t\t*goto wolf_fight_fail\n\t#I can take whatever Wolf intends to throw at me.\n\t\t*if survival >= 20\n\t\t\tIn your imagination, or perhaps your worst fears, Wolf's body has a weight that could crush you instantly, but his form—though strong and fierce—is not immovable. The impact of him against you pushes you both into the snow, but you are able to keep his snapping, ferocious jaws from closing around your throat by pressing against him with your hands. You eventually work up enough strength and leverage to throw him overhead.\n\n\t\t\tThe wolf god makes a frustrated noise as he sails over you. He lands gracefully enough, but he does not come after you again. Instead he waits, watches. \n\t\t\t*goto wolf_fight_success\n\t\t*else\n\t\t\t*goto wolf_fight_fail\n\t#I use the twisting logic of dreams to my benefit and bend the world around Wolf to incapacitate him.\n\t\t*if sensitivity >= 25\n\t\t\tThe world around Wolf starts to shimmer and then it bends. He is suspended in the air for an instant, then he is slammed down by a force considerably more brutal than gravity alone. Wolf rises, unsteadily, but does not come at you again.\n\t\t\t*goto wolf_fight_success\n\t\t*else\n\t\t\t*goto wolf_fight_fail\n\n*label wolf_fight_fail\nThe token resistance that you offer is nothing to Wolf. He tears through your attempts at combating him and comes at you with more determination than you expected. All of the conflicts you have survived until now have not adequately prepared you for what Wolf represents: fearsome, awful power. \n\nHis paws pin your arms at both sides of your head and he leers at you.\n\n\"Anything to say before I consume you, ${prenom}?\"\n\n*fake_choice\n\t#\"I will never be fully yours. I will fight you always.\"\n\t\t*set action %+10\n\t\t*set deliberation %-10\n\t\tWolf moves his head closer to yours and briefly he looks more terrible than anything you have ever seen. His full godly powers are etched into his animal face in thrumming lines of power that are darker than ink, and depthless. In each one of his gleaming teeth you see a dozen ways that you could die. \n\n\t\t\"Fight then, child, for all the good it will do. Go ahead and fight.\"\n\t#\"You are not my god, Wolf.\"\n\t\t*set action %+10\n\t\t*set deliberation %-10\n\t\t\"You wound me, ${prenom}. I had taken you for one of my finest. But in the end your faith is inconsequential. You have already brought me everything I need.\"\n\t#\"Is this how it was always meant to be?\"\n\t\t*set deliberation %+10\n\t\t*set action %-10\n\t\t\"Since your first breath. There was never any other way this could go,\" Wolf says, then adds quietly. \"Unless there was…but now you will never know.\"\n\t#\"Do not do this, Wolf. I have been faithful…\"\n\t\t*set selfishness %+10\n\t\t*set equity %-10\n\t\t\"And your faith will be rewarded, ${prenom}.\" He is already salivating. \"You will live forever now. Your name will be joined to mine for eternity. Is that not reward enough?\"\n\t#\"Why bother? Do whatever you have to.\"\n\t\t*set selfishness %+10\n\t\t*set equity %-10\n\t\t\"Why?\" Wolf repeats. \"Because hawks are proud, because spiders are sly, because the gazelle races toward the horizon, and wolves are hungry. Always hungry.\"\n\t#Say nothing.\n\t\t*set action %+5\n\t\t*set deliberation %-5\n\n\t\t\"Yes. Oh yes,\" Wolf says. \"Strong and quiet and proud. I hope your noble silence brings you solace when the pain begins.\"\n*comment endif\n\nWolf laughs, and then he feasts.\n*page_break \n\n*label wolf_lunch\nThe pain is terrible, yes, but it is not the pain that drives you to the edge of sanity and perhaps somewhat beyond it. No, it is the way Wolf's jaws consume more than flesh: He tears at the deepest parts of yourself. You feel memories slipping away, whole parts of your mind and your person-hood. True to his word, he is consuming you body and soul. \n\nHonestly, once the pain is gone, you miss it because it means that Wolf has burrowed his way into your senses. What follows is a perfect darkness and beyond that? Nothing good.\n\n*page_break\n*goto_scene consumed_end\n\n*label wolf_fight_success\n\nWolf reorients himself after his failed attack and shakes the snow from his fur. His expression is not one of defeat, but of wry amusement. \n\n\"You are capable, ${prenom}. I will give you that. To be expected of my flesh,\" Wolf says. \n*if ((pantheon_lead = \"you\") or (three_god_powerup = true))\n\t*set self_score %+10\n\t\"Better still, I can smell the power on you. The authority. You have humbled my mighty siblings. For that I must offer you my respect and I assure you, ${prenom}, few have ever heard those words from me.\"\n\t*goto continue_convo_1\n*elseif ((hawk_dies) or (bear_dies))\n\t*set self_score %+5\n\t\"And you come before me with the blood of my killers on your hands. You have done well by me, ${prenom}. Very well indeed.\"\n\t*goto continue_convo_1\n*else\n\t*goto continue_convo_1\n*label continue_convo_1\n\nIt occurs to you that you have never heard his voice before, only felt him stirring in your mind and his impulses filling up your veins. It is more melodious than you would expect, softer too. \n\nHe continues, \"But the hour grows late and you only now arrive. You have kept me waiting for my body, for my resurrection.\"\n\nPerhaps reading something in your face, or your stance, Wolf laughs. \n\n\"You did not expect to leave here intact, did you? \n*if ((action > deliberation) and (selfishness >= equity))\n\t*set self_score %+10\n\tEven though you are indisputably one of my followers in temperament, still\n\t*goto continue_convo_2\n*else\n\tYou are barely a wolf and\n\t*goto continue_convo_2\n*label continue_convo_2\nyou exist to glorify me, avatar. My mark elevates you to the highest high, but the cost is great. My siblings tore my flesh and spread my physical being along the firmament, but they did not devour me. If they meant to wipe me from existence, then they should have swallowed up every mote of me.\" He grins, and it is terrible. \"I will not make their mistake when I swallow you whole.\"\n\nHe smiles when you recoil from his suggestion. \n\n\"Oh, do not worry, child. Your mortal frame will crack open and I will pour myself inside. Every drop of my essence will fill you up and burn away the self that you know, the mind that you treasure, the impulses that drive you, until only I remain. If you are strong, very strong, then something of you will remain. But the body cannot serve two masters. \"\n\nHe takes another step toward you across the snowy field. His right eye catches the moon and takes on a sinister shine. \n*page_break \nWolf looks almost rapturous as he advances on you. \n\n\"The hour of my rebirth arrives, ${prenom}. I have waited here since the mutinous attack hamstrung me, sent me twisting through the darkest depths. It was humbling, being so reduced. But you came. And now you will die so that I may suck the marrow of your soul and be reborn.\n\n\"So, ${prenom} are you prepared to give yourself to me, body, blood, and soul?\" Wolf asks, his maw fairly salivating. \n\n*choice\n\t#No, I have made it this far as myself. I refuse to be anyone's meal.\n\t\t*goto directing_to_last_fight\n\t*if ((three_god_powerup) or (intention = \"demolish\")) #I am not interested in whatever deal Wolf is willing to suggest. He is part of the old way, an enemy. I will destroy Wolf utterly and remove him from existence forever.\n\t\t*set self_strength %+10\n\t\t*label directing_to_last_fight\n\t\t*gosub final_fight\n\t\t*page_break\n\n\t\t*if self_strength > wolf_strength\n\t\t\t*goto wolf_defeated_combat\n\t\t*else\n\t\t\t*label bitter_defeat\n\t\t\tIn the end, Wolf still stands. Despite your best efforts. You threw everything you could his way, but he is a god after all.  \n\n\t\t\t\"You fought well, ${prenom}. No one could have expected more from you. I am almost proud of your efforts.\" Wolf comes closer, so close you can feel the heat of his breath cutting through the cold. \"But you were not meant to be more than my shadow. You are mine. Always and forever, you are mine.\"\n\n\t\t\t*goto wolf_lunch\n\t#It is my duty to revive Wolf. It has ever been so.\n\t\tWolf grins. \n\n\t\t\"I knew you would see reason, child. Now come here and let me taste my new form.\"\n\n\t\t*goto wolf_lunch\n\t#Fight back. Show Wolf that you are formidable in your own right.\n\t\t*goto directing_to_last_fight\n\t#Use my will to subdue Wolf. \n\t\t*gosub final_fight_intellect\n\n\t\t*if self_strength > wolf_strength\n\t\t\t*set wolf_peace_victory true\n\t\t\t*page_break\n\t\t\tYou rally for one final push into Wolf's mind. He resists it, of course, but there is a crack. You push into the breach and his resistance buckles. \n\n\t\t\tSuddenly he stops advancing. He shakes as if trying to rid himself of you, but you have a hold on his mind and refuse to let go.\n\n\t\t\tHe is incensed. You can feel the anger boiling up within him, but it has nowhere to go—you keep his leash painfully short lest he break your control. Like any trapped wild animal, he snaps, gnaws, and fights for any inch of relief. But the god whose domain is action and cunning cannot free himself, and before long he realizes this. He stops struggling, gives into the knowledge that he is well and truly caught. \n\n\t\t\tWolf leans back onto his haunches and lets out a plaintive howl, and the snow, as if in sympathy, stops falling. The world begins to flicker at its edges. The trees all around you are solid, but you can also see through them. The artifice of the dream is fraying.\n\n\t\t\t\"It will not last long now,\" he says.\n\n\t\t\tYou wonder what he means. He does not explain himself. Instead, Wolf cocks his head at an angle and regards you. \n\n\t\t\t*goto wolf_defeated_intellect\n\t\t*else\n\t\t\t*goto bitter_defeat\n\n*label wolf_defeated_combat\nWolf's chest heaves. He stares at you out of one half-shut eye.\n\n*label wolf_defeated_intellect\n*set deliberation %+15\n*set action %-15\n\"When you were born, ${prenom}, Gazelle read your future in your first cry. She claimed she could not see further than a few days. You defied her sight, and that is why I wanted you. I wanted the child that would dare to shrug off our influence. So this…this is delicious irony,\" Wolf says.\n\n\"It did not have to come to this, Wolf,\" you say. \n\n\"Oh, but it did. We can only be what we are, ${prenom}. The lion cannot unmake herself, the sparrow cannot forsake his wings for gills. The story we write is the only story. I tried to defy the end to my story by consuming and investing myself within you. I failed. Such is the way of things.\"\n\nWolf takes a shaky step toward you, but something causes him to topple forward. You see what it is right away: His left paw is transparent. You can see through it to the white snow underneath. It has faded like a half-remembered thread from a dream. \n\n\"Already the pieces of me are fading into the nothing from which my kind was born. Take what remains, ${prenom}. Consume me like I would have done to you.\"\n\nIt is a gruesome suggestion perhaps, but Wolf is right. He would have consumed you without a second thought. Will you not do the same to him?\n\n*choice\n\t#Consume the Wolf god.\n\t\t*gosub eating_wolf\n\n\t\t*goto chapter_close_wolf_eaten\n\t#Refuse the savage command.\n\t\t*if restraint \u003c= 27\n\t\t\t*gosub gobbling_wolf_up\n\n\t\t*if wolf_eaten_trigger\n\t\t\t*goto chapter_close_wolf_eaten\n\t\t*else\n\t\t\t*set sensitivity +5\n\t\t\t*set deliberation %+15\n\t\t\t*set action %-15\n\t\t\t*set equity %+15\n\t\t\t*set selfishness %-15\n\t\t\tYou will not do to Wolf what he would have done to you.\n\n\t\t\tWolf snorts. His white breath streams out in the cool air, curling into impossible shapes before fading altogether.\n\n\t\t\t\"You would rather this power of mine goes to waste?\" Wolf asks. \"Your loss.\"\n\n\t\t\t*goto chapter_close\n\t#Help keep Wolf intact.\n\t\t*set deliberation %+15\n\t\t*set action %-15\n\t\t*set equity %+10\n\t\t*set selfishness %-10\n\t\t*set sensitivity +5\n\t\tWolf snorts.\n\n\t\t*if (selfishness > equity)\n\t\t\t\"Do not pretend to be concerned with the plight of others, ${prenom}. It does not suit you.\"\n\t\t*if (equity >= selfishness)\n\t\t\t\"Your heart bleeds for me, does it, ${prenom}? Save your pity. I have earned this fate and worse.\"\n\t\t*comment endif\n\n\t\t*if restraint \u003c= 27\n\t\t\t*gosub gobbling_wolf_up\n\n\t\t*if wolf_eaten_trigger\n\t\t\t*goto chapter_close_wolf_eaten\n\t\t*else\n\t\t\t*goto chapter_close\n\t*if (wolf_peace_victory) #Make peace with Wolf in his final moments.\n\t\t*set equity %+20\n\t\t*set selfishness %-20\n\t\t*set selfishness %-20\n\t\t*set ritual +5\n\t\t*check_achievements\n\t\t*if not(choice_achieved_gentlenight)\n\t\t\t*achieve gentlenight\n\t\tThe suggestion seems to stun him. Wolf is uncharacteristically quiet.\n\n\t\t\"I do not deserve an heir. I should fade into the dark and be rid of all attachment to this world of blood and fire,\" Wolf says. His voice is thin and reedy. His body is fading faster now. \"I should have eaten you whole.\"\n\n\t\tHe looks at you. Whatever he sees makes him smile.\n\n\t\t\"I do not deserve an heir, but fate has decided I should have one. I suppose that is something.\" Wolf closes his eyes. \"Here. It is not much, but this is a piece of me. It should make you stronger, somewhat.\"\n\n\t\tYou feel a warmth in your chest that fades gradually. \n\n\t\t\"Take care of my world, ${prenom}. If not…\"\n\t\t*goto chapter_close\n\n*label chapter_close\n*set wolf_dead true\nWolf takes a final belabored breath. More than half of him has faded now, but he stares at you until the very last moment. Until nothing of him remains.\n\n*label chapter_close_wolf_eaten \n\nYou are left alone in the quiet that remains, but you faintly hear the stirrings of life around you, and then a bright light forces you to shut your eyes.\n\n*page_break\n*goto_scene survived_end\n\n*comment THE FINAL WOLF FIGHT SUBROUTINE\n\n*label final_fight\n*set wolf_fight_combat true\n\"Oh?\" Wolf says, his eyes twinkling in amusement. \"You are prepared to fight me, seriously? Your petty victories have given you ideas above your station, child.\"\n\nWolf paces around you and bares his teeth to frighten you.\n*if ((pacifism) and (pacifism_broken = false))\n\t*set wolf_strength %+20\n\t\"You think you can take me on? As fragile and unbloodied as you are? You would have done better to submit to me, ${prenom}. At least I would have spared you some of the pain.\"\n\t*goto after_first_wolf_enc\n*elseif pantheon_regard >= 8\n\t*set self_strength %+10\n\t\"You served the other gods. Playing their messenger when you should have been serving me. Pathetic, infuriating human.\"\n\t*goto after_first_wolf_enc\n*comment endif\n\n*label after_first_wolf_enc\n*if restraint \u003c= 30\n\t*set wolf_strength %+15\n\tWolf's taunts are infuriating. You can feel the anger rising off of you in waves, and it only seems to make him stronger, more confident.\n\t*goto continue_fighting\n*else\n\t*set self_strength %+10\n\tYou ignore his taunts. Your mind forms a bulwark against him, refusing to strengthen Wolf's resolve by feeding into the anger and impatience that drives him.\n\t*goto continue_fighting\n\n*label continue_fighting\n\n*if (((meeting_sen) and (influence >= 3)) or ((meeting_sen) and (ritual >= 20)))\n\t*set self_strength %+20\n\n\tYou focus and reach across the chasm between dreams and waking life. You are surprised by how easy it is. You tug the chord and it yields. Just like that, Sen is standing before you. \n\n\tHe looks around, surprised and disoriented, but not for long. He draws his blade when he sees Wolf.\n\n\t\"Wolf. Pleased to make your acquaintance. I am commander Sen of the Rising Sun coalition. I am honored. I hope you will not mind if I make a blanket out of your pelt when we are finished here, it looks comfortable.\"\n\n\tThe fierce god laughs. It is a strange snorting noise. \n\n\t\"I like this one, ${prenom}. He has a sense of humor. It will not save him, but maybe I will tear out just his throat.\"\n*comment endif\n\nWolf comes at you in a blur of gray and white fur. You almost lose his shape against the white expanse of snow between you. \n*if (((meeting_sen) and (influence >= 3)) or ((meeting_sen) and (ritual >= 20)))\n\tSen comes in from beside you and lunges toward Wolf. His sword slices horizontally and would have struck a grievous blow if Wolf had not been moving faster than Sen could track. The blow catches Wolf's side and causes the god to roar in pain and anger, but it hardly slows him. \n*comment endif \n\nAs Wolf bears down on you, you react instinctively,\n*if (((ritual + sensitivity) >= 50) or ((ritual + survival) >= 50))\n\t*set self_strength %+30\n\ttwisting and cajoling the gently falling snow to riot and revolt, to grow uncontrollably. The snow explodes around Wolf, spreading from minuscule dots in the air to intricate, bladed constellations that catch his fur and tear into the flesh beneath. Wolf, bloodied and enraged, struggles through the maze of growing ice.\n\t*goto you_react\n*elseif (((combat + survival) >= 50) or ((combat + quickthinking) >= 50))\n\t*set self_strength %+30\n\twrestling him down to the snow-covered ground. Wolf yelps in surprise as you pin him underneath you, pulling on a reserve of strength and ferocity that might be a product of the dream and the force of your will. You do not have time to question it. You drive your fist into Wolf's enormous body over and over again as your lupine foe wails. \n\t*goto you_react\n*elseif ((quickthinking + survival) >= 40)\n\t*set self_strength %+30\n\tdodging out of the way and waiting until Wolf tries to circle back and come at you again. Instead, you take aim at one of his hind legs and deliver a vicious kick that causes him to buckle momentarily, long enough for you leap toward him and pummel him.\n\t*goto you_react\n*else\n\t*set wolf_strength %+30\n\tthrowing up your hands in defense, but Wolf is violently tenacious. His jaws close around your upper arm and lock. Pain lances your entire arm as you try to get him to disengage before he tears your entire arm out of its socket. When the pressure abates slightly, you are able to pull away. Blood flows freely from the wound and drips from Wolf's red-slicked maw. \n\n\t*if ((meeting_sen) and (influence >= 3))\n\t\t\"${prenom}!\" Sen shouts. \"Are you alright?\"\n\n\t\tYou nod gravely, but you are not sure.\n\t*goto you_react\n\n*label you_react\n\n*if wolf_strength >= self_strength\n\t*label hail_mary_pass\n\tWolf cocks his head to one side.\n\n\t\"This is enough now, is it not, ${prenom}?\" Wolf says. \"Yield.\"\n\n\tYou are not sure you can win against Wolf, but you have decided not to yield and you will not betray your convictions.\n\n\t*if eel_affinity >= 60\n\t\t*check_achievements\n\t\t*if not(choice_achieved_eelhelper)\n\t\t\t*achieve eelhelper\n\t\t*set self_strength %+15\n\t\tThe air tightens. It is hard to explain, but it is as if the space between things narrows and draws everything painfully close. The already cold air becomes frigid and you can feel each hair on your body. \n\n\t\t\"Elder Brother. You overstep.\" \n\n\t\tThe voice seeps in from the darkness around the edges of the woods. \"${prenom} is not yours alone to take. And though our siblings are silent in your demesne, I have never been denied entry to any world I choose to slither into.\"\n\n\t\t\"Eel,\" Wolf says, annoyed. \"Little one, you should not put yourself in my way. You will regret it. Deeply.\"\n\n\t\t\"I might,\" Eel says, his voice coming from the air itself. \"But the uncertainty is half the fun.\"\n\n\t\tCold air suddenly assaults you. You gasp from the brutal chill, and the cold, practically liquid now, rushes into your mouth and fills you with a terrible strength. Wolf watches in undisguised rage. \n\n\t\t\"You will not change a thing, Little Brother. I will wear ${his} fucking skin!\"\n\n\t\tWolf dashes toward you. \n\n\t\tYour hands respond without thought and form gestures of prayer so complex that you can barely understand them. Whereas even the most practiced ritualist merely suggests, convinces, and begs for the sufferance of the elements, Eel drives you now, and he does not ask. The ground beneath Wolf's feet drops away and swirling dark waters take their place. Wolf tries to leap, but there is nothing beneath him and instead he sinks into the sudden whirlpool. Wolf roars with the full force of his breath, and the world shakes. Trees are ripped away from their roots and all the fallen snow is blasted outward from the epicenter of Wolf's scream. \n\n\t\tEventually, Wolf climbs out of the tide pool, his fur matted and his eyes are bloodshot. The woods around you are cleared, and you no longer feel Eel's presence. \n\n\t\t\"Always my siblings interfere. But no more interruptions, ${prenom},\" Wolf says.\n\t\t*if self_strength >= wolf_strength\n\t\t\tHe seems far worse for the wear. \n\t\t*if wolf_strength > self_strength\n\t\t\tHe gives you an unnerving smile.\n\t\t*comment endif\n\t\t*goto fight_scene_end\n\t*else\n\t\tWolf moves to attack again and you rally one final, exhausted attempt to overpower him. He presses in on you and you raise an arm in defense, but Wolf stops in the last moment before his teeth sink in.\n\t\t*goto fight_scene_end\n*else\n\tYou look at Wolf, who in this moment does not seem quite so huge and ominous as he did a moment before. You could almost be convinced that this is not the same god who stalked your dreams and took hold of your being when you were a child.\n\n\tWolf is defeated, you know it and you assume he knows it as well. He can growl and threaten, but he is not strong enough to consume you, and you no longer fear his wrath.\n\t*goto fight_scene_end\n\n*label fight_scene_end\n*return\n\n*label final_fight_intellect\n*comment I created this fight in case players had prioritized non-violent methods, so they would not feel trapped or cheated\n*comment by a forced fisticuffs scenario. \n\nYou barely look at Wolf before he is raising his lupine head and chuckling in your direction. \n\n\"Is that your approach, little one. You are going to try to force me to behave? Best of luck.\"\n\n*if ((pacifism) and (pacifism_broken = false))\n\t*set self_strength %+35\n\tDespite what Wolf says, you have faced challenge after challenge without resorting to violence. You do not have to be afraid of what he represents.\n*comment endif\n\nHe takes a step forward. \n*if restraint >= 50\n\t*set self_strength %+15\n\tAnd you stay firmly rooted. \n\n\t\"Ah. You are resolved, I see. I wonder if it will help you do this impossible, ridiculous thing you have set out to do,\"\n\t*goto intellect_fight_1\n*else\n\t*set wolf_strength %+10\n\tAnd you take a step back. \n\n\t\"Do you mistrust yourself, ${prenom}? Fear that your non-violent plan will end in blood and tears like everything else in your life?\"\n\t*goto intellect_fight_1\n\n*label intellect_fight_1\nWolf says, and takes another step. \n\n\"Stop,\" you command. \n*if ((influence >= 3) or (sensitivity >= 25))\n\t*set self_strength %+25\n\tIt is only a moment, but Wolf does stop. \n\n\tWhen he manages to push past the command and move forward, his motions are sluggish and jerky. He is no longer fully in control.\n\t*goto intellect_fight_2\n*elseif influence >= 2\n\t*set self_strength %+15\n\tWolf's front paw falters for a moment before it lands in the snow. The god's face changes as some thought or impulse flickers behind those sharp eyes. \n\t*goto intellect_fight_2\t\n*else\n\t*set wolf_strength %+25\n\tBut Wolf does not seem to be bothered or slowed by your imperative. He takes a deliberate step toward you. \n\t*goto intellect_fight_2\t\t\n\n*label intellect_fight_2\n\n\"You are not my equal, ${prenom}. Stop this farce,\" he says, half-growling. \n\nIf you are to prove him wrong, you will need to force the issue. This being a dream, your dream as much as Wolf's, you have power here that you might not in the corporeal world. You focus on Wolf and attempt to force his will to bend. You quickly find it is not that simple. When you reach out and try to impress your desires on him, you briefly touch the swirling chaos that is Wolf's mind and his intentions. It is abrasive, resolute, and it is angry.\n\n*if pantheon_regard >= 7\n\t*set wolf_strength %-10\n\tThe roil almost sends you tumbling into anguish and potentially madness, but a reassuring force adds their power to yours. \n\n\tWolf's mind lets out something like a scream. \n\n\t\"Sister! You would interfere in this?\" Wolf snaps. \n\n\tThe force forms words which are soft, but you have no trouble hearing them. \n\n\t\"Brother, your chaos threatens to swallow up your chosen one. $!{he} should not be destroyed for ${his} loyalty,\" Gazelle says to Wolf, then to you, \"I have distracted him. Now, ${prenom}. Fight with everything within you.\"\n\nYour attempt to penetrate that writhing mass\n*if sensitivity >= 30\n\t*set self_strength %+30\n\tthreatens to break the solidity of your own mind. Memories rise unbidden: your first taste of the spiced ${tribe} wine, the smell of fire, the tenderness of your very first friendship. But in the end, those memories anchor you and keep you from spiraling when Wolf's consciousness pushes back against yours. \n\n\t*label mind_win\n\n\tYou push back twice as hard, and Wolf flinches. His mind still resists your attempt at domination, but there is a new note in the frantic song that is his thinking: uncertainty. He stands and regards you. \n\n\t\"You think this solves things, ${prenom}? Victory is not assured for you. Not with these tricks of yours.\"\n\n\t*return\n*elseif ((sensitivity + quickthinking) >= 40)\n\t*set self_strength %+30\n\tcauses you to recoil in an attempt to protect yourself, but you cannot win this fight through restraint alone. You push back and navigate the straits of Wolf's feral thoughts with as much care as you can muster.\n\n\t*goto mind_win\n*else\n\t*set wolf_strength %+25\n\tis rebuffed immediately and thoroughly. You feel a sense of whiplash as Wolf sends you reeling from the ferocity of his psychic defense. \n\n\t\"Child. You think you are the first to try to cow me? In the countless years that I have stalked this world and the world beyond?\"\n\n\t*return\n\n*label gobbling_wolf_up\n*comment this is the scenario that happens if you try to do something besides eating wolf, but you don't have \n*comment the proper level of restraint.\n\nYou intend to leave Wolf as he is, but your mouth salivates and you are suddenly so hungry.\n\n*label eating_wolf\n*set action %+30\n*set deliberation %-30\n*check_achievements\n*if not(choice_achieved_godeater)\n\t*achieve godeater\n*if pacifism\n\t*set pacifism_broken true\n*set wolf_eaten_trigger true\n\nWolf's weakened state kindles something in you, something less than human, and you do not have the restraint to disobey. You attack the weakened god and begin to bite and tear at his flesh with your teeth. What fills your mouth and warms your gut is not blood, but power. Raw. Undiluted. \n\nYou feel what little agency Wolf has left stirring in your belly, in your soul, but it is soon snuffed out. A powerful thrill races up your spine. \n\n*return\n", "1_profaned": "*text_image chap_1.png center One: Profaned\n\n[i]…and the great white Wolf—who is gracious unless hungry—gave the girl a ride across the river on the soft fur of his back. The girl was careful to cling hard to his fur, because Clearwaters know that the Wolf is always hungry.[/i]\n*line_break\n-excerpt from an old Clearwater fable.\n\n*page_break Begin\n\nThere is green then flashes of hot white. Drums in your ears and thunder in your feet. Then you catch snatches of a conversation; serious talk, accusations, then howling, howling, howling. \n\nThe air is thick and close; are there fire ants in your chest or is that the pain of drawing breath? Are you breathing or is that someone else? Someone close by? You only know for sure that you are running and you are afraid. \n\nYou remember a white field and snow, but you do not recall the cold. In the memory, you know you are not alone, but it is not until you see the enormous shape slinking toward you that you begin to feel afraid. His teeth are as sharp as daggers, and his eyes…\n\nYou shake your head and the memory—a very old one indeed—slips away. \n\nThe pain in your chest settles, your breathing calms by degrees, and you start to look around. You are standing on two feet and the deep greenery of a forest floor is all around you. The white flashes from earlier were just the sunlight struggling through the canopy overhead. Your senses return to you after having briefly gone wild. You feel almost silly for the panic, but there is a feeling of wrongness that is persistent. \n\nYou cannot immediately recall what you were running from, but you know yourself and that is a good sign; you are the avatar of the Wolf God. Others have to content themselves with worship, but you are connected directly to the divine presence. At least, you were. At the moment, there is some disconnect; you look at your hands and they are just hands, you cannot feel the feral power running through them. It is confusing and disorienting, but you know better than to dwell. Just because you have managed to calm yourself down does not mean there is nothing in the forest to fear. It makes sense to keep going.\n\nThere are several ways you can think of to move forward: \n\n*choice\n\t#Use superior ritual knowledge to scan the sky through the canopy and divine my location. \n\t\t*set ritual +15\n\t\tThe sun is high in the sky and the leaves and branches overhead make your task difficult, but you are skilled in the arcane rites that trace the motions of the heavens. You are able to pick up directional cues where others would only see the glare of the sun and the idle passing of clouds. \n\n\t\tIt is enough to find a path. \n\t\t*goto pre_query_transition\n\t#Deftly follow animal tracks and water trails through the forest.\n\t\t*set survival +15\n\t\tWhere less practiced eyes would see only the trails of dirt lurking beneath the rotting leaves and upturned logs across the forest floor, you see a map of natural activity. Here there are the skittish steps of deer on the move and elsewhere the deft prints of wolves following quickly behind. You read the living memory of the forest and have little trouble making your way. \n\t\t*goto pre_query_transition\n\t#Climb one of the nearby trees: From a vantage point closer to the sky, perhaps I can better understand the layout of the ground.  \n\t\t*set ritual +5\n\t\t*set survival +5\n\t\tYou scramble up a nearby tree, moving slowly but carefully, swinging higher until you can see clearly around you. Something about being high up relaxes you, even as you survey the land. From this high up, you can also see better through the dense canopy at the sky above, which gives you a sense, real or imagined, of being closer to the gods above.\n\n\t\tRelying on both senses—the high, deep language of the slow heavens, and the frantic, busy tongue of the land—you find your way. \n\t\t*goto pre_query_transition\n\t#Rely on my natural perceptiveness and intuition in order to find my way.\n\t\t*set influence +1\n\t\t*set restraint %+10\n\t\tYou have learned to trust your instincts through long practice, cunning reversals, and bitter disappointments. You follow your whims and trust in the subtle pull of fortune to set you on the right direction. You find this makes you a more charismatic leader and helps to strengthen your resolve in moments where you might otherwise succumb to the pull of baser impulses. \n\t\t*goto pre_query_transition\n*label pre_query_transition\n*page_break\nThis deep in the woodland, there are scant signs of human presence beside your own, but you move carefully, regardless. Not every threat has a human face.\n\nThe path you forge begins to trigger thoughts, memories maybe, or just associations. The wide trunks and heavily striated bark of the trees around you suggests you are in the north, even though you do not remember exactly how you got here. The last few days and weeks are a haze in your memory and you find it difficult to pluck anything definitive from them, but you can remember the long howling and a searing pain. \n\nA little way down, you catch sight of a living blur almost too fast for the common eye to track. But you are far from common. \n\nThe stag flees downwind, perhaps after scenting you, or more precisely scenting the part of the Wolf God that lives in your skin. The smell of the animal, rich and woody, makes you realize just how hungry you are. \n\nWill you give chase? \n\n*choice \n\t#Yes. I am a hunter and the stag is prey; simple.\n\t\t*set action %+15\n\t\t*set deliberation%-15\n\t\t*set stag_kill true\n\t\t*check_achievements\n\t\t*if not(choice_achieved_firstblood)\n\t\t\t*achieve firstblood\n\t\tThe stag flees from you in obvious terror. Your heart seems to want to escape your chest, and the feeling goes to your head. \n\n\t\tYou catch up with the stag and it is as if the animal is moving in slow motion. You know you have to be careful, animals that are cornered are the deadliest. But when you throw yourself at the stag and it collapses under you, you work quickly to ensure that it never rises again. \n\n\t\tAfterward, in the glow of the kill, you take what meat you can get quickly from the stag and leave the rest to the other animals lurking in your periphery, brought by the smell of the freshly dead. You leave the stag's remains for them. A kind of charity.\n\n\t\tYou move on.\n\t\t*goto post_animal_hunt \n\t#Perhaps. If it amuses me.\n\t\t*set selfishness %+15\n\t\t*set equity %-15\n\t\t*check_achievements\n\t\t*if not(choice_achieved_firstblood)\n\t\t\t*achieve firstblood\n\t\t*set stag_kill true\n\t\tYou trail the animal with ease, flushing it out further and further. The hunt is the most amusing part, but the kill is satisfying in its own right. It takes strength to kill an animal without a weapon, but only a bit of cleverness to drive it down a precipitous drop. You stand over the stag and finish it decisively once it becomes clear that the chase can go no further.\n\n\t\tYou cannot fully dress it down without a blade, but the meal was never the goal. \n\n\t\tYou take what you can and move on.\n\t\t*goto post_animal_hunt\n\t#Perhaps not. I should stay on task and find my way out of this forest as quickly as possible.\n\t\t*set deliberation %+15\n\t\t*set action %-15\n\t\tThough it might be wise to do some hunting and come away with some provisions, there could still be danger lurking around you. The forest provides other means anyway. You watch the stag flee out of the corner of your eye and instead grab a handful of berries and edible leaves, even the grass can be harvested if you get hungry enough. \n\n\t\tYou move on. \n\t\t*goto post_animal_hunt\n\t#No. The animal deserves free rein and peace as much as I do.\n\t\t*set equity %+15\n\t\t*set selfishness %-15\n\t\tEven though you can claim familiarity with the trees and easily track the motion of the fleeing stag, this forest is not your home and sometimes respecting your surroundings means resisting the urge to interrupt the life cycle of the less powerful. The stag stops running for a long moment and stares at you before some other sound sends it skittering into a thick copse. \n\n\t\tInstead of stag meat you harvest a few berries and leaves that are safe to eat and then you move on.\n\t\t*goto post_animal_hunt\n\n*label post_animal_hunt\n*page_break\nThe temperature wanes along with the sunlight, but even with diminished visibility, you can still navigate via the potent smells where animals have marked their territory and the ever-changing feel of the forest beneath your bare feet. Above you, through the profusion of branches and leaves, is the night sky and its constellations for guidance. \n*if ritual \u003c 6\n\tThough some of the nuances of the cosmic arrangement may be lost on you, you can still mark out the basics. \n*comment endif\n\nThe sky is the gods' playground, where their incorporeal forms revolve around the world either in loving stewardship or jealous watch, depending on the viewer's opinion. But the gods are not always so distant, as you well know. Your first experience of them left a hot brand on your memories, marking you in some subtle way from that moment forward. What were the circumstances of that experience? \n\n*fake_choice\n\t#It was when I was taken by Wolf: the god who prefers savagery and action.\n\t\t*set action %+10\n\t\t*set deliberation %-10\n\t\tYou were visited before your tenth year by the great white Wolf who walked through your dreams. You needed no further proof of gods or their influence in the mortal world. Nothing more about gods needed to be proved to you, who lived alongside one. \n\t#I saw a woman inhabited by Hawk: the goddess who enforces equity and justice. \n\t\t*set equity %+10\n\t\t*set selfishness %-10\n\t\tWhere you grew up, there were two men with a terrible grudge against each other. They argued daily over a number of escalating transgressions. The wife of one man prayed almost daily to Hawk, who ensures impartiality, for an end to their squabbling. In the middle of another one of the men's quarrels at the height of summer, the pious wife was invested with Hawk's presence. A light seemed to infuse her hair and shine forth from her eyes. Though usually soft-spoken, this woman became as chilly as marble and drew a golden, shimmering sword from the air beside her. She sliced down between the two men and declared in a voice like steel before all present that the quarreling would end, or blood would follow. The men never argued publicly again. \n\n\t\tYou still remember that sword. \n\t#I was told a story about the children of Spider: the goddess who most loves selfishness and want. \n\t\t*set selfishness %+10\n\t\t*set equity %-10\n\t\tIn a village far from where you were born, it was said that each year a child was born who was marked for Spider's care. One year, the child, born like all years with a weblike caul around the eyes and nose, was refused to Spider by his mother. Sometime later, a host of seventeen children of various ages came to the village. Each of them spoke a single word of a prophesied fate for the village and its inhabitants if the child was not relinquished. A terrible fate.\n\n\t\tIn the end, the mother gave over the child. What choice did she have?\n\t#I learned about the strength of Bear: the god who is deliberate and ponderous. \n\t\t*set deliberation %+10\n\t\t*set action %-10\n\t\tYou were once told by another child, before Wolf came into your life, of his uncle who awoke in the night to his home burning around him. He was choked by the smoke and unable to see. He coughed and drifted close to losing consciousness, but he heard the roar of a bear and realized suddenly that the noise had come from himself. He charged out of the burning structure and safely into the night. He swore that Bear had given him the strength at that last moment when he was near death. \n\n\t\tThe story could have easily been embellished, but it stayed with you for years. \n\nSo you learned about the capricious nature of gods and the lives they touch.\n*page_break\nThe night grows cooler, but even still, sweat slicks your skin. It is high summer, and the longer you walk the more you begin to feel something other than the heat gnawing at you. An emptiness in your head and heart. An echo where your sharpest senses used to reside. You come across a clearing and stop again to rest and find your bearings.  \n\n*page_break\nYou look up at the sky. \n\nIt is a riot of lights, much clearer in this open space than before when you were snatching glances through the trees. The stars are all bullying and jockeying for position among the long blanket of dark sky. In those celestial bodies are the answers to your heart's questions. You need only look up and find the constellations that represent the gods who hold all mortal knowledge in their mouths. \n\n*label query_transition_2\n*if query_counter >= 5\n\t*goto wolf_choice\nYou will have to consult all five constellations before you have your answer, but the vast sky is open to whichever order you choose. \n\n*if query_counter = 0\n\tWhich will you read first?\n*if query_counter >= 1\n\tWhich will you read next?\n\n*label god_query\n\n*comment This section uses a variable to ensure that the player goes through\n*comment each option before being able to move on, but allows them to go through\n*comment said options in their preferred order. \n\n*choice\n\t*disable_reuse #The Hawk Star.\n\t\t*set query_counter +1\n\t\tThe Hawk Star is a bright glimmer in the near-black sky. The single brightest object making its way across the heavens aside from the luminous moon. \n\n\t\tThe star, named after Hawk, the shrewd mother with wings outstretched in glorious flight. The goddess whose eyes are sharp and mind sharper still. This is her star.\n\n\t\tThe mother of equity, Hawk judiciously minds the space between the myriad genders. For the benefit of her wisdom and nuance, you need only whisper the gender you prefer to be recognized as into the wind.\n\n\t\t*choice\n\t\t\t#I consider myself female.\n\t\t\t\t*set gender \"female\"\n\t\t\t\t*set he \"she\"\n\t\t\t\t*set his \"her\"\n\t\t\t\t*set him \"her\"\n\t\t\t\t*set man_woman \"woman\"\n\t\t\t\t*goto male_female_choice\n\t\t\t#I consider myself male.\n\t\t\t\t*set gender \"male\"\n\t\t\t\t*set man_woman \"man\"\n\t\t\t\t*goto male_female_choice\n\t\t\t#I am neither female nor male.\n\t\t\t\t*set gender \"none\"\n\t\t\t\t*set he \"they\"\n\t\t\t\t*set his \"their\"\n\t\t\t\t*set him \"them\"\n\t\t\t\t*set man_woman \"person\"\n\t\t\t\t*goto male_female_choice\n\n\t\t*label male_female_choice\n\t\tThe Hawk star shines indifferently in the distance, but you can feel something is different in your blood. You feel recognized.\n\t\t*if (query_counter = 5)\n\t\t\t*goto wolf_choice\n\t\t*else\n\t\t\t*goto query_transition_2\n\t*disable_reuse #The Great Wandering Bear.\n\t\t*set query_counter +1\n\t\tThe Bear constellation is a massive network of embers in the firmament. It feels closer than the other stars, as if you could reach out and touch it. Or as if it could reach down and touch you.\n\n\t\tBear, the ursine god whose method is patience in all things, is the steadying force whose long memory encompasses all of creation. Bear alone remembers how the profusion of peoples grew out of just a handful of families.\n\n\t\tYou will need his long sight to answer your questions. In return, you need only offer him the memory that is in your blood, the memory of your clan. There are the Clearwater, whose hands turned the soil and made bread, the Highwalk who first learned to ride horses and hunt, and the Quietly Swimming, or the Quiet, who never strayed far from the waters they rose from. \n\n\t\tIt is simply a matter of ancestry and blood, but Bear prizes such things. Which clan do you hail from? \n\n\t\t*choice\n\t\t\t#\"I am Clearwater; the first builders to make homes from the bounty of the earth. I am of those who entwine their hair with wooden loops in deference to the trees that made their first homes.\"\n\t\t\t\t*set tribe \"Clearwater\"\n\t\t\t\t*goto bear_continue\n\t\t\t#\"I am Highwalk; the travelers who circumnavigate the placid steppes. Descended from those who first felt the urge to wander further than the limits of their own imaginations.\"\n\t\t\t\t*set tribe \"Highwalk\"\n\t\t\t\t*goto bear_continue\n\t\t\t#\"I am Quietly Swimming; scholars of the southern waterways who hunt both day and night. I am bred from those born to move gracefully, as fluid as the marsh waters that nourish them.\"\n\t\t\t\t*set tribe \"Quiet\"\n\t\t\t\t*goto bear_continue\n\t\t*label bear_continue\n\t\tDespite all its massive strength, the great Bear seems calm, ponderous, and protective tonight. It is hard not to feel a bit safer with the Bear looming overhead. \n\t\t*if (query_counter = 5)\n\t\t\t*goto wolf_choice\n\t\t*else\n\t\t\t*goto query_transition_2\n\t*disable_reuse #Writhing Eel.\n\t\t*set query_counter +1\n\t\tThe twisted shape of the Writhing Eel constellation is like a band across the waist of the night, suggesting to the lurid eye the divide between upper and lower, decency and delight. \n\n\t\tLike its namesake, the constellation is provocative. Eel is the god for whom all roads lead to pleasure and the satisfaction of physical, oft carnal needs. He resides in the heart and the loins, the high places and the low. \n\n\t\tIn order to invoke his aid, you must surrender your wants to him.\n\n\t\tWhat are your attractions?\n\n\t\t*choice\n\t\t\t#\"I am attracted to men,\" I tell the sky.\n\t\t\t\t*set attraction \"male\" \n\t\t\t\t*goto sexual_preference\n\t\t\t#\"I am attracted to women,\" I explain to the open air.\n\t\t\t\t*set attraction \"female\"\n\t\t\t\t*goto sexual_preference\n\t\t\t#\"It matters not. My blood runs hot,\" I declare under the heavens.\n\t\t\t\t*set attraction \"bi\"\n\t\t\t\t*goto sexual_preference\n\t\t\t#I have no interest in romance. I am interested in survival.\n\t\t\t\tYou shout to the sky that you will not play Eel's games and in reply you can perceive a quirk of the long, winding constellation.\n\t\t\t\t*goto post_sex_pref\n\t\t\t#I say nothing. Eel can read into my silence whatever he pleases. \n\t\t\t\t*set attraction \"bi\"\n\t\t\t\tSilence is an answer as well, and the constellation offers some movement in reply. At least, you think it moves. You think its slight gyration might be a twist of irony or whimsy.\n\t\t\t\t*goto post_sex_pref\n\t\t*label sexual_preference \n\t\tHaving told Eel your interests, you see motion in the constellation, a certain tightening of the long band.\n\t\t*label post_sex_pref\n\t\tPerhaps it is just in your imagination.\n\t\t*if (query_counter = 5)\n\t\t\t*goto wolf_choice\n\t\t*else\n\t\t\t*goto query_transition_2\n\t*disable_reuse #The Spider's Skein.\n\t\t*set query_counter +1\n\t\tThe Spider's Skein knits the southwest edges of the night, keeping all within it tied tightly. You find your gaze drawn to its complexities. \n\n\t\tNamed for the Spider, the goddess who revels in the self above all things. Selfish and cruelly cunning, one cannot open a dialogue with the goddess whose favorite toy is secrets without offering one's true name. \n\n\t\tWhat is your name? \n\n\t\t*choice\n\t\t\t#Volk.\n\t\t\t\t*set prenom \"Volk\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#Onai.\n\t\t\t\t*set prenom \"Onai\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#Bvaso.\n\t\t\t\t*set prenom \"Bvaso\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#Ōkami.\n\t\t\t\t*set prenom \"Ōkami\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#Tala.\n\t\t\t\t*set prenom \"Tala\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#Nekra.\n\t\t\t\t*set prenom \"Nekra\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#Bhangi.\n\t\t\t\t*set prenom \"Bhangi\"\n\t\t\t\t*set name_set true\n\t\t\t\t*goto name_decided\n\t\t\t#None of these.\n\t\t\t\t*label NameMaking\n\t\t\t\tWhat are you called? \n\t\t\t\t*input_text prenom\n\t\t\t\tAh, then $!{prenom} is your name, yes?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes, exactly as I said.\n\t\t\t\t\t\t*set prenom \"$!{prenom}\"\n\t\t\t\t\t\t*set name_set true\n\t\t\t\t\t\t*goto name_decided\n\t\t\t\t\t#No, you have misheard. It is just a little different.\n\t\t\t\t\t\t*goto NameMaking\n\n\t\t*label name_decided\n\n\t\t\"${prenom},\" you whisper to the sky.\n\n\t\tIn the distance, just between the call of wolves and the nightbirds' songs, you can hear the chirrup of insects. There is something fearful in their calls tonight.\n\t\t*if (query_counter = 5)\n\t\t\t*goto wolf_choice\n\t\t*else\n\t\t\t*goto query_transition_2\n\t*disable_reuse #Distant Gazelle.\n\t\t*set query_counter +1\n\t\tTwo sleek, slender shapes leap through the far shores of the eastern edges of the sky. The racing, dodging shapes are Gazelle's aspects. They tend to warm you every time you see them. \n\n\t\tGazelle, the tender-hearted goddess whose intentions are generous, is also the goddess whose subtlety and evasiveness makes her the most unapproachable of the celestial figures. She offers kindness, yet takes no sides. Both features represent her; the clever, crafty Gazelle running to the west, and the kind, empathetic one sprinting to the east.\n\n\t\tTo which does your eye move? East or West?\n\n\t\t*choice\n\t\t\t#West. To the Quick-Thinking aspect of Gazelle.\n\t\t\t\t*set quickthinking +10\n\t\t\t\t*goto gazelle_choice\n\t\t\t#East. To the Sensitive aspect of Gazelle.\n\t\t\t\t*set sensitivity +10\n\t\t\t\t*goto gazelle_choice\n\n\t\t*label gazelle_choice\n\n\t\tThe longer you stare, the further away the two aspects of Gazelle seem to run from each other. But once you blink, they seem closer again. You get the sense they will never truly converge, but that they are not so far away from each other as you think. \n\n\t\tYou blink again and when the twin constellations reset, you look away. \n\t\t*if (query_counter = 5)\n\t\t\t*goto wolf_choice\n\t\t*else\n\t\t\t*goto query_transition_2\n\t*if (query_counter >= 5) #Only the Wolf remains.\n\t\t*goto wolf_choice\n\n*label wolf_choice\n*set chara_generation_done true\n*page_break\n*if ritual > 5\n\tHaving opened yourself up to the wisdom of gods circling the upper skies in their star-bound forms, you feel stronger in your esoteric power. You draw the sigils of each: the Bear's steely claw, the Hawk's far-seeing eye, the Eel's long form, the Spider's complex web, and the gentle arc of the Gazelle's leap. There remains only one god whose aid you have not conjured, whose touch you have yet to feel.\n\t*page_break\n\t*goto wolf_choice_2\n*else\n\tYou have felt the touch of all five gods on your senses and you feel stronger for it. Their knowledge thrums in your blood and leads to a kind of intuitive wisdom. You need only concentrate on your question long enough in the clear space of meditation. There is only one god left to query. The god whose touch is most familiar.\n\t*page_break\n\t*goto wolf_choice_2\n\n*label wolf_choice_2\n\nThe moon is the left eye of Wolf, the god who hunts. The moon governs impulse and conflict, weighing both before deciding to bare its teeth or slink away. \n\nWolf's animal strength runs through you as surely as your own pulse. Or it did before this night. You are alone in the forest, draped in shadows, and never has the presence of Wolf felt more distant. \n\nThe phase of the moon is the last piece of the sky you need to complete your query.\n\n*choice\n\t#Prone. The Wolf Moon is at its lowest point, weakening its overall strength, but also greatly lessening its more savage impulses.\n\t\t*set sensitivity +10\n\t\t*set wolf_moon \"prone\"\n\t\t*set restraint %+20\n\t\t*goto wolf_choice_3\n\t#Rising. The Wolf Moon is partway along its ascendancy, strengthened from its prone state, but also more feral.\n\t\t*set combat +10\n\t\t*set restraint %+15\n\t\t*set wolf_moon \"rising\"\n\t\t*goto wolf_choice_3\n\t#Hunting. The Wolf Moon is at its highest point, resulting in unrivaled strength, but barely contained ferocity. \n\t\t*set combat +15\n\t\t*set restraint %-5\n\t\t*set wolf_moon \"hunting\"\n\t\t*goto wolf_choice_3\n\n*label wolf_choice_3\n*set wolf_moon_selected true\n\nYou arrive at the same truth, regardless of how many times or ways you scry the heavens. The truth remains the same in your gut. \n\nWolf is nowhere.\n\nThe god who once consumed a part of your heart and bound you forever to himself has defied your covenant. His moon has not fallen out of the sky, and the violent tension in your limbs is proof that he once inhabited you. But Wolf is gone, and without a word to his most trusted disciple. \n\n*page_break\n\n\"The gods live high above us. But they also walk beside us,\" your\n*if tribe = \"Highwalk\"\n\tauntie—one of the many women you called auntie as a Highwalk child regardless of blood relation—once explained, as she drew diagrams and pictures in the steppe dirt.\n*if tribe = \"Quiet\"\n\ttutor in the Quietly Swimming enclave once explained, while keeping one eye on you and another on a pot full of seaweed, boiling with pungent herbs and spices. \n*if tribe = \"Clearwater\"\n\tClearwater grandfather once explained, as the two of you sat peeling the tough root vegetables that grew near the edge of the town. \n\"Sometimes the gods choose to take us into their confidence. They see something in an individual that they prize highly, and they might choose to become one with us, to share themselves with us and walk beside us for a moment, a season, or a lifetime. Those who receive this attention and bear this weight we call avatars—sometimes manifestations, or incarnations. All just words. The experience is something else entirely.\"\n\nThis was a lesson from your childhood. You remember hearing it when you were still only just you. What did you feel in that moment, knowing that a god could one day slip into your skin and share it with you? \n\n*fake_choice\n\t#Terror.\n\t\tWould it be like the stuff of nightmares, you must have wondered a thousand times, to give up control and be ridden by a force beyond your comprehension? Would you feel anything at all? The question would have been like a burning coal in your gut. A terrible possibility lurking at the edge of your thoughts.\n\t#Exhilaration.\n\t\tIt could be me, you might have thought, and found yourself up late at night thinking about it. You might have wondered how it would feel to have a god in your flesh and to have been chosen for the honor among a countless number of others. You might have anticipated it. Longed for it.\n\t#Confusion.\n\t\tIt is a lot for a child to handle, being told that one day your body, your mind, and everything about you could be altered by an alien presence. It is not surprising that you were confused.\n\t#Peace.\n\t\tPerhaps a part of you always knew that it would be you. That you would be chosen to play host to a god. And if you had accepted it so long ago then all the better. After all, what choice did you have?\n\t#Indignation.\n\t\tYou might have been furious. You might have wondered how a spirit without form itself could make demands on your body, could presume authority over your flesh and mind without consent. Even if the words never left your lips, you were angry, and perhaps that anger, that indignation is what made you a target. A fact that might have made you angrier still.\n\nAnd then you became Wolf's avatar. One night, you awoke in an unfamiliar field laden with snow and saw the white wolf, twice your size or more, stalking across the white earth. He left no prints where his paws fell.\n\nAs he drew closer, you could see his right eye, a menacing ochre that made you shiver. In his luminous left eye, like the moon itself, you could see your reflection. You were both hunter and prey. \n\nYou woke up from the dream, if it truly was a dream, sweating and feverish. \n*if tribe = \"Quiet\"\n\tThe medicine-man\n*if tribe = \"Clearwater\"\n\tYour grandfather\n*if tribe = \"Highwalk\"\n\tThe caravan healer\ncould not tell whether you would live or die. When you rose from the fever, you were no longer alone in your mind. Wolf walked beside you. Until today. \n\nThe enormity of Wolf's absence begins to dawn on you. \n\nSome gods, like Hawk, possess their avatars fully, leaving no room for personality, burning away all that is human in their hosts while making room for their own divine presence. Some gods, like Spider, slip into their avatars like clothes and wear them for a season before leaping to another, preferring to keep their meddling in human affairs as clandestine as possible. One thing is clear—the avatars of the gods are elevated above mundane humans in ways both overt and subtle—some are preternaturally strong, others can draw from the twisting, living spirits inherent within all things through arcane rites, which would take a mere mortal a lifetime to learn, yet others have wits so quick that they can whisper, cajole, force, and manipulate others into doing their bidding. However, despite these gifts, the gods' living emissaries can be felled. \n\nIn the end, Wolf chose you and you alone. The covenant that was made in that cold field was a kind of partnership: Wolf trusted in your judgment and intellect while making his desires and instincts known. The two of you walked in one skin and spoke with one voice.\n\nYou do not know, and never thought to ask, whether your skills came from being chosen by Wolf or were the reason he chose you, but you cannot remember a time that you were not capable and powerful in one way or another. \n\nWolf chose you, and you were strong. Now he appears to be gone and you can feel the absence in every breath as his living avatar. \n\nIt must terrify you. \n\n*choice\n\t#Of course. To be alone after all this time?\n\t\t*set restraint %+10\n\t\t*set deliberation %+5\n\t\t*set action %-5\n\n\t\tWolf was closer to you than a sibling and more than just a voice in the back of your head. Your skin feels hollow without him, and you vow to find out what happened to him. \n\t\t*goto wolf_question\n\t#No. There is no room for terror. I must only act.\n\t\t*set survival +5\n\t\t*set action %+5\n\t\t*set deliberation %-5\n\n\t\tWolf would not waste time mourning you or fretting if you had disappeared. He would act, seeking answers surely and meting out justice deftly. If you and he are as one, it is obvious what you must do. \n\t\t*goto wolf_question\n\t#Terrified? I am elated. I have my body and mind to myself again.\n\t\t*set quickthinking +5\n\t\t*set selfishness %+5\n\t\t*set equity %-5\n\n\t\tWolf entered your body without permission and took your inability to fight him off as complicity. Though he is gone, his strength still resides in your limbs. Perhaps you will avenge him with that borrowed strength. Perhaps. \n\t\t*goto wolf_question\n\t#Wolf's absence may invite others to target me. If that is the case then let them come.\n\t\t*set combat +5\n\t\t*set action %+5\n\t\t*set deliberation %-5\n\n\t\tWhen there is a vacuum in the hierarchy of dominance, others will seek to enter it. This is a law of the natural world. You will have to prove yourself capable of defending the spot that you and Wolf have carved out on the food chain. You feel more than up to the challenge. \n\t\t*goto wolf_question\n\t#I worry that without Wolf I will not have the strength to do the good I wish to.\n\t\t*set sensitivity +5\n\t\t*set equity %+5\n\t\t*set selfishness %-5\n\n\t\tWolf gave you a great many gifts when he came into you. You can still access some of them, but you worry that his ancient wisdom is lost to you. Your path forward may be harder to walk, and that is worth worrying over. \n\t\t*goto wolf_question\n\t#I am concerned that my connection to the divine has been severed.\n\t\t*set ritual +5\n\t\t*set deliberation %+5\n\t\t*set action %-5\n\n\t\tWolf helped you to access the deeper mysteries of the world. Without his aid, it's possible that this connection will be damaged. You will have to work harder to ensure you remain connected to the power that once came so easily to you. \n\t\t*goto wolf_question\n\n*label wolf_question\n*page_break\n\nYou know that many more questions will follow later: What has happened to Wolf? What will it mean for you? But for now, you are alive, and perhaps you ought to stay that way.\n\nYou continue on, out of the clearing and back into the woods, but with a renewed sense of direction and some small inkling of your situation: You are no longer under the Wolf's direct protection, but his instincts still live within you and your own human skills are formidable. From the day of your visitation on that snowy field, you have been training your body and mind to be the keenest edge for Wolf to share. Your days were filled with challenges that taught you to embrace the feral side of yourself, while honoring your human intelligence. Unlike other gods, Wolf keeps no priests. His acolytes seek to embody his violent whims but they have no direct guidance; you are the closest thing to worship in his name. At least you were. \n\nAnother hour into your travels and the spacing of the trees begins to loosen, growing further apart and allowing easier traffic. A little later, you spy evidence of human habitation. There are long-downed trees with the best, driest part hacked off and sectioned up, presumably for firewood. You encounter rudimentary paved pathways. You advance with caution.\n\nSniffing the air, you can tell there are other people nearby, probably three or more, and they have started a fire. Before long, you see a glow that strikes you as foreign to these parts.\n\n*if survival > 5 \n\tYou have no trouble keeping quiet as you approach the fire before you.\n\t*goto first_encounter\n*else\n\tYou watch your feet and try not to draw attention.\n\t*goto first_encounter \n\n*label first_encounter\n*page_break \n\nEventually, you close in and hear what sounds like voices raised in argument. \n\n\"—no right to be here!\" you overhear, then, \"—will not warn you again.\"\n\nThe voices lead you to a natural drop above a dilapidated stone structure, a squat and fairly garish temple.\n*if sensitivity > 5 \n\tYou notice the dark whorls painted on the outside of the temple. They suggest a temple consecrated to the god Eel. Perhaps you ought to be careful, knowing that there might be a god closely watching the outcome of this conflict. \n*comment endif\n\nBelow, you see the people to whom the voices belong. There are four people in tattered leathers, three men and a woman. Two of them are armed and the others bare-handed, but there is a crossbow leaning against a fallen log. The four of them are sitting or standing around a modest flame, and the woman stands on the other side of the fire. She is wrapped in a dark cloak, and because she is facing slightly away from you, you cannot make out her features. \n*if (tribe = \"Quiet\") and (sensitivity > 5)\n\tHowever, you glean that she is Quiet, like you, from her stature, the peculiar weave of her cloak, and the particular lilt of her speaking.\n*comment endif\n\nOne of the leather-wearing crew holds out a hand, palm facing outward, to the cloaked woman in a placating gesture. \n\n\"We would rather not have any trouble with you, but do not push us,\" he says. \n\nThe cloaked woman hisses\n*if tribe = \"Quiet\"\n\ta curse in the guttural tones of the language that the Quiet call \"Old Yarish.\" The exact meaning of the curse is lost on you, but it has something to do with bearing bastard sons.\n\t*goto first_encounter_2\n*else \n\tsomething.\n\t*goto first_encounter_2\n\n*label first_encounter_2\nThe still-sitting members of the group by the fire get to their feet at this new provocation. Their fingers reach tentatively for their weapons, but the man holding out his hand, clearly a leader in some capacity, asks for caution.\n\nThe situation is growing more serious. You feel you should get involved somehow, and since you still have the element of surprise, there are several options open to you. \n*choice\n\t#Climb down the rise and get involved directly.\n\t\tYou move down the rise carefully and quietly, but it is not long before you are noticed. The armed group fans out without being commanded to do so, forming a defensive position around their leader. Clearly, they have had martial training. \n\n\t\tThe cloaked woman glances at you, but does not say anything. If anything, your arrival has made everyone more anxious. \n\n\t\tThe leader of the armed group looks you up and down, but does not say anything, either. \n\n\t\tThere are three weapons between the four of them, but if you are confident in your combat skills, you might be able to dispatch them. However, perhaps diplomacy might serve equally well. The choice is ultimately yours, force or discourse?\n\n\t\t*choice\n\t\t\t#Force. The only talking I need to do is with my fists.\n\t\t\t\tYou decide to attack. Perhaps the remainder of Wolf's instincts within you recognize that
