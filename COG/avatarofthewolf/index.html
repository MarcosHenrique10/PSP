t\t\tYou leave ${ara_name}, watching the children struggle with the bucket between them. And as much water as they slosh onto the ground, they end up with more than enough in their bucket. And perhaps that is something. \n\t\t\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\tThe negotiations begin earnestly, but it quickly becomes apparent that the frustrations and tensions between the Rising Sun and the Ishkoans go deeper than you anticipated. \n\n\t\t\t\t\t\t\t\t\t\t\tThe situation teeters on open fighting, but it never turns into the bloodshed you are anticipating. \n\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans demand that you and the Rising Sun both leave their settlement. It does not look like the Rising Sun soldiers have any intention of doing so, but eventually ${r_captain} relents and calls his soldiers off. \n\n\t\t\t\t\t\t\t\t\t\t\t\"I knew they would not accept. Now we have to do this another way,\" he says, somewhere in between confiding in you and talking to himself.\n\n\t\t\t\t\t\t\t\t\t\t\tYou part with the Risers and head out on your own. \n\t\t\t\t\t\t\t\t\t\t\t*goto ara_interrupt_flow\n\t\t\t\t\t\t\t\t\t#(To the Ishkoans) \"You have no true rights to this land besides the supposed favor of gods, which in the world of men is less than nothing.\"\n\t\t\t\t\t\t\t\t\t\t*label ishko_force\n\t\t\t\t\t\t\t\t\t\t*set ishko_diplomacy ((influence * 5) + (combat + riser_affinity))\n\t\t\t\t\t\t\t\t\t\t${r_captain} edges in behind you to emphasize to the Ishkoans exactly how grave their situation is. His armed soldiers help punctuate the threat. \n\t\t\t\t\t\t\t\t\t\t*if ishko_diplomacy >= 85\n\t\t\t\t\t\t\t\t\t\t\t*set riser_affinity %+15\n\t\t\t\t\t\t\t\t\t\t\t*set ishko_occupied true\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans are surly and understandably frustrated by having a new order imposed on them against their will, but the transition is bloodless. \n\n\t\t\t\t\t\t\t\t\t\t\t${r_captain} and his men spread out to quickly quash any spark of dissent before it ignites, leaving you free to go. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto ara_sun_mockery\n\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t*set restraint %-5\n\n\t\t\t\t\t\t\t\t\t\t\tThe Rising Sun soldiers are well-trained, you can see it in their bearing and the way they subtly shift into combat readiness. \n\n\t\t\t\t\t\t\t\t\t\t\tBut when it becomes apparent that the Ishkoans will not relent and that it will come to blows, you perhaps overestimate the efficacy of ten fighting men and yourself against an entire settlement full of zealous civilians with something to fight for.\n\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans might be untrained, but they are crafty. Living on the fringes of civilizations has taught them a few tricks to protect themselves. They come in waves, forming a pincer so that you and the Rising Sun are fighting on multiple fronts. And you are steadily losing ground. \n\n\t\t\t\t\t\t\t\t\t\t\t${r_captain} calls for a retreat, and the Ishkoans slowly push back against you, pushing you through the streets until the walls are in sight. A few of the Risers break for the walls while others hold off the Ishkoans. Through a haze of exhaustion, you reach into your reserve of animal strength and fight harder for the minutes it takes to secure your own exit. \n\n\t\t\t\t\t\t\t\t\t\t\tEventually you make it out of Ishko. \n\n\t\t\t\t\t\t\t\t\t\t\tThe power struggle having failed, you see no reason to further work alongside the Rising Sun. They gather outside of Ishko's walls and lick their wounds and you look forward. You have other concerns, and so you move on. \n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*goto ara_rock_mockery\n\t\t\t\t\t\t\t\t\t#\"The strong must claim the land and water, if only to protect the weak who cannot do it themselves. Perhaps we should find out who is stronger here.\" [Purposefully sow discord & chaos using your wits and commanding presence]\n\t\t\t\t\t\t\t\t\t\t*set riser_difficulty ((influence * 9) + (quickthinking))\n\t\t\t\t\t\t\t\t\t\t*set ishko_diplomacy ((influence * 9) + (quickthinking))\n\t\t\t\t\t\t\t\t\t\t*if ((riser_difficulty + ishko_diplomacy) >= 65)\n\t\t\t\t\t\t\t\t\t\t\t*set chaos_score +1\n\t\t\t\t\t\t\t\t\t\t\t*set selfishness %+10\n\t\t\t\t\t\t\t\t\t\t\t*set equity %-10\n\t\t\t\t\t\t\t\t\t\t\t*set restraint %+10\n\t\t\t\t\t\t\t\t\t\t\t${r_captain} and his Rising Sun soldiers move into formation so gradually that even you barely notice, but the Ishkoans are also readying themselves for a confrontation. When the violence erupts, it comes all at once. \n\n\t\t\t\t\t\t\t\t\t\t\t*label riser_ishko_brawl\n\t\t\t\t\t\t\t\t\t\t\tBoth sides rush at each other, leaving barely any room to consider you or your involvement in their struggle. \n\n\t\t\t\t\t\t\t\t\t\t\tAt the end of the fight, the Rising Sun soldiers are as bruised and battered as the Ishkoans who fought hard to repel them. Neither side is truly victorious, and the Rising Sun eventually limp away from the center of Ishko as the few Ishkoans who can still stand upright follow at a cautious distance. \n\n\t\t\t\t\t\t\t\t\t\t\tWhile the two groups continue their standoff, you quietly leave them to their conflict. \n\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\t\t\t\t\tAs you sneak out of the settlement, you encounter ${ara_name} sitting atop the fence you are about to jump over. \n\n\t\t\t\t\t\t\t\t\t\t\t*if ((riser_difficulty + ishko_diplomacy) >= 65)\n\t\t\t\t\t\t\t\t\t\t\t\t\"This is how I know we were always meant to be close, ${prenom}. Because you are just as much trouble as I am. A mad wolf in the chicken coop.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Bring that keen sense of chaos with you when you go to the steppe, and maybe we will rewrite all the rules together some day,\" ${ara_he} says.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto end_ara_talk\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\"Not the most elegant plot I have ever seen, but you are not exactly a dull blade, are you? You entertain me, and that is not easy to do.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"I hope you continue to entertain me. Go to the steppe for now. Someday, we will continue to spread our unique brand of mischief. Surely you want to,\" ${ara_he} says.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto end_ara_talk\n\n\t\t\t\t\t\t\t\t\t\t\t*label end_ara_talk\n\n\t\t\t\t\t\t\t\t\t\t\t$!{ara_he} lets ${ara_him}self fall backward off of the wall. When you hop atop the wall yourself to scan the other side, ${ara_he}'s gone. \n\n\t\t\t\t\t\t\t\t\t\t\tYou follow ${ara_his} example and head over the wall, and out of Ishko.\n\t\t\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t\t\t*elseif ((riser_difficulty + ishko_diplomacy) >= 50)\n\t\t\t\t\t\t\t\t\t\t\t*set selfishness %+5\n\t\t\t\t\t\t\t\t\t\t\t*set equity %+5\n\t\t\t\t\t\t\t\t\t\t\t*set riser_affinity %-10\n\t\t\t\t\t\t\t\t\t\t\tMaybe if you were a little more clever as a schemer your plan could have gone off without a hitch, but the Rising Sun quickly catches on to what you intend to do. Nevertheless, they cannot stop you because the Ishkoans are already riled up. \n\n\t\t\t\t\t\t\t\t\t\t\t*goto riser_ishko_brawl\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*label vs_risers_ishkoans\n\t\t\t\t\t\t\t\t\t\t\t*set riser_affinity %-15\n\t\t\t\t\t\t\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t\t\t\t\t\t\tAfter a moment of tension, the Ishkoans and the Rising Sun soldiers seem to come to a near simultaneous conclusion. They turn on you, instead of each other. \n\n\t\t\t\t\t\t\t\t\t\t\tPerhaps you could take the Rising Sun, well-trained though they are, or perhaps you could take the Ishkoans, though they outnumber you ten times over or more. But you certainly cannot take both. \n\n\t\t\t\t\t\t\t\t\t\t\tYour ruse having failed, you manage to just hold off both groups as you dodge, leap, and crawl toward the edge of the settlement. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Block ${his} escape!\" ${r_captain} shouts. \n\n\t\t\t\t\t\t\t\t\t\t\tAn Ishkoan dives for you, but you tap into Wolf's instincts and somersault backward out of his reach. A Rising Sun soldier tries to skewer you as you land, but another bit of Wolf keeps you ahead of the blade. \n\n\t\t\t\t\t\t\t\t\t\t\tAt the edge of town, you spring up onto the low roof of a nearby shack and from there vault over the wall at the edge of Ishko, flying free of the settlement all at once.\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tYour landing could be smoother. You bruise both your shins, and the pain vibrates up into your teeth, but you manage to keep moving. Thankfully, neither the Rising Sun nor the Ishkoans follow you past the edge of town. \n\n\t\t\t\t\t\t\t\t\t\t\tYou hope it is because they are busy killing each other.\n\n\t\t\t\t\t\t\t\t\t\t\t*label ara_rock_mockery\n\t\t\t\t\t\t\t\t\t\t\tNearly a mile out you find ${ara_name} stretched out serenely on a large rock. Sunning ${ara_him}self presumably. $!{ara_his} eyes flicker open as you approach. \n\n\t\t\t\t\t\t\t\t\t\t\t\"So that did not go well, eh? Do not worry, some of us are born schemers and some…\" ${ara_he} trails off intentionally.\n\n\t\t\t\t\t\t\t\t\t\t\tYou keep walking. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Go to the steppe. Maybe you will learn something about making the world bend to you,\" ${ara_he} shouts after you. \n\t\t\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t\t#Signal to the Rising Sun to attack while the Ishkoans are still expecting to parley.\n\t\t\t\t\t\t\t\t\t\t*if riser_affinity \u003c 55\n\t\t\t\t\t\t\t\t\t\t\t*set action %+10\n\t\t\t\t\t\t\t\t\t\t\t*set deliberation %-10\n\t\t\t\t\t\t\t\t\t\t\t*set riser_affinity %+15\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans do not expect a full-on attack in the middle of a parley so they are easy to take. \n\n\t\t\t\t\t\t\t\t\t\t\tThe element of surprise exposes their already lackluster combat training. If feels almost wrong to subdue the town with so little effort, but even the paltry fight the Ishkoans put up is enough to get your blood racing. \n\n\t\t\t\t\t\t\t\t\t\t\tBetween you and the Rising Sun soldiers, the Ishkoans fall without significant difficulty. \n\n\t\t\t\t\t\t\t\t\t\t\tAfter the last of them have been secured, ${r_captain} turns to you and extends a hand, which you take in a friendly embrace. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Thank you for helping us. You kept anyone from getting seriously hurt by acting so quickly. And trust me, we will not mistreat the Ishkoans. Though perhaps now they will take our entreaties a little more seriously going forward.\"\n\n\t\t\t\t\t\t\t\t\t\t\t${r_captain} passes a few more words with you before one of his soldiers requires his attention. Following that, you begin leaving the settlement, your business in Ishko is finished. \n\n\t\t\t\t\t\t\t\t\t\t\tAs you leave, you note the angry, hopeless, impotent glares of the Ishkoans who kneel in the dust. \n\t\t\t\t\t\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\t\t\t\tOn your way to the edge of the settlement, ${ara_name} walks up beside you and matches your pace. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Fast friends with the Rising Sun? Who knew such beauty could grow from such thorny ground,\" ${ara_name} says. \n\n\t\t\t\t\t\t\t\t\t\t\t\"And by that you mean?\" you ask. \n\n\t\t\t\t\t\t\t\t\t\t\t\"The avatar of a slain god befriends members of a group openly hostile to the rule of gods. Strange. I would say to be careful. But what good has ever come of listening to a spider?\" ${ara_name} says, adding, \"but that is what I like about you, ${prenom}. I see a lot of surprises coming from you down the line. Whatever happens, I think your actions on the steppe will continue to make things interesting.\"\n\n\t\t\t\t\t\t\t\t\t\t\t${ara_name}'s next footfall never lands. You turn and ${ara_he}'s gone. You shake your head and continue on.\n\t\t\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto vs_risers_ishkoans\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set ishko_difficulty (riser_affinity + combat) - 40 \n\t\t\t\t\t\t\t\tHe regards you and the band gathered behind you, then he turns away and the Ishkoans attack.\n\n\t\t\t\t\t\t\t\t*if ishko_difficulty >= 20 \n\t\t\t\t\t\t\t\t\t*set death_toll +1\n\t\t\t\t\t\t\t\t\t*set singular_death \"ishkoan\"\n\n\t\t\t\t\t\t\t\t\tThe Ishkoans are angry, but disorganized. They lack the discipline of a trained militia and as they come at you and the Rising Sun band, you can easily see the weaknesses in their attack. The vanguard is practically tripping over itself, slowing those behind them and allowing you and the Rising Sun, united for the moment, to easily adopt a defensive position and corral them. \n\n\t\t\t\t\t\t\t\t\tIt is a short fight. \n\n\t\t\t\t\t\t\t\t\tWhen it is all over, the Rising Sun soldiers detain those among the settlement members who are still spoiling for a fight, while ${r_captain} stands next to you and surveys the scene. One Ishkoan was killed and one militia member injured. \n\n\t\t\t\t\t\t\t\t\t\"It need not have come to this,\" ${r_captain} says. \"Still, there is no question we will take the fishing and farming rights now that blood has been drawn. Thank you, by the way, for supporting our efforts.\" \n\n\t\t\t\t\t\t\t\t\tWhether you intended it or not, your actions have helped change the course of Ishko's future. With ${r_captain}'s gratitude, you start to leave Ishko. \n\t\t\t\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t\t\t\tOn the outskirts of the settlement, you encounter ${ara_name} whispering into the ear of an Ishkoan who stares blankly at the sky until ${ara_name} pulls away. The Ishokan shakes his head and walks away dazed. ${ara_name} smiles in your direction. \n\n\t\t\t\t\t\t\t\t\t\"Hail the conqueror! Subduer of country yokels and victor against the insignificant,\" ${ara_he} says. \n\n\t\t\t\t\t\t\t\t\tYou do not bother mentioning that the Ishkoans attacked first. You keep walking. \n\n\t\t\t\t\t\t\t\t\t\"I hope you intend to take that sense of chaos and turmoil to the steppe. If ever there were a people in need of a little shaking up.\"\n\n\t\t\t\t\t\t\t\t\t${ara_name} smiles brightly and watches you walk away.\n\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t#\"Perhaps. If you make it worth my time.\"\n\t\t\t\t\t\t\t*label bribery\n\t\t\t\t\t\t\t*set riser_affinity %+5\n\t\t\t\t\t\t\t*set selfishness %+10\n\t\t\t\t\t\t\t*set equity %-10\n\t\t\t\t\t\t\t\"I would have been surprised if this did not come down to bribery. It is something of a relief to know that we think the same,\" ${r_captain} says. \"We can offer you a scroll that is my keeping. It describes hidden lore of your gods who live in the stars, I had thought to destroy it, but it can be yours. Or I can give you combat training. You are formidable, I am sure, but who does it hurt to learn a little more?\n\n\t\t\t\t\t\t\t\"So what will you choose?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#The ritual scroll: I want to improve my understanding of the lore of my gods.\n\t\t\t\t\t\t\t\t\t*set scroll_possession true\n\t\t\t\t\t\t\t\t\t${r_captain} hands you the scroll, and the weight of it alone in your hands feels significant. You remind yourself to find time later to devour the information therein. \n\n\t\t\t\t\t\t\t\t\t*label pre_diplomacy \n\t\t\t\t\t\t\t\t\tBut for now you have a peace to broker.\n\n\t\t\t\t\t\t\t\t\t*goto diplomacy_continue\n\t\t\t\t\t\t\t\t#The combat training: I want to strike harder.\n\t\t\t\t\t\t\t\t\t*set combat_training true\n\t\t\t\t\t\t\t\t\t${r_captain} purses his lips and shrugs out of his heavy armor. He walks you through a few combat drills. You can imagine him showing them to Rising Sun trainees. But you are no one's trainee. \n\n\t\t\t\t\t\t\t\t\tYou pick up the moves quickly. They lack the fluid grace and animal fury of your own fighting style. However, you can see how they would be effective, especially when used as a group. \n\n\t\t\t\t\t\t\t\t\tYou promise to make time later to fully deconstruct the movements. \n\t\t\t\t\t\t\t\t\t*goto pre_diplomacy\n\t\t\t\t\t\t\t\t#\"None of these options are adequate. Offer me something more.\"\n\t\t\t\t\t\t\t\t\t${r_captain} frowns. \n\n\t\t\t\t\t\t\t\t\t\"I was so hoping you would not give in to greed.\"\n\n\t\t\t\t\t\t\t\t\t*goto pre_riser_fight_with_text\n\n\t\t\t\t\t\t#\"If you cannot take the town alone, then leave with your tails between your legs.\"\n\t\t\t\t\t\t\t*set riser_affinity %-15\n\t\t\t\t\t\t\t${r_captain} is momentarily taken aback by your bluntness. Anger quickly follows. \n\n\t\t\t\t\t\t\t\"You have a high opinion of yourself, ${prenom}, to speak to me with so little respect. However, you are not wrong.\" He straightens his already erect posture. \"Will you stand aside and let us take Ishko?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"It is yours…if you can take it.\"\n\t\t\t\t\t\t\t\t\t*set riser_affinity %+10\n\t\t\t\t\t\t\t\t\t*set action %+10\n\t\t\t\t\t\t\t\t\t*set deliberation %-10\n\t\t\t\t\t\t\t\t\t${r_captain}'s mouth twists wryly, he says, \"I said it would be difficult. But you will find I am not easily daunted.\"\n\n\t\t\t\t\t\t\t\t\t${r_captain} and his militia, with the sun-burst of their cause emblazoned on their chests, step out to meet the Ishkoans head-on. \n\n\t\t\t\t\t\t\t\t\tThe fighting turns ugly quickly. The Ishkoans are untrained but have the benefit of numbers, while the Rising Sun boast superior weaponry and fight with an impressive single-mindedness.\n\n\t\t\t\t\t\t\t\t\tIn the end, the Rising Sun claw out a victory, leaving broken and cowed those Ishkoans who chose to fight. \n\n\t\t\t\t\t\t\t\t\t\"From this moment forward,\" barks ${r_captain}, whose blood runs freely from a gash in arm. \"This settlement is under our protection and guidance. Piss into the wrong pot, and I swear you will regret it.\"\n\n\t\t\t\t\t\t\t\t\tThe Rising Sun busy themselves subduing the Ishkoans who opposed them, and you are already moving on.\n\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*label ara_sun_mockery\n\t\t\t\t\t\t\t\t\tAt the gate of Ishko, ${ara_name} sits on the dusty ground, braiding and unbraiding thin strands of colored silk into ${ara_his} hair. $!{ara_he} looks up at you and squints against the sun. \n\n\t\t\t\t\t\t\t\t\t\"The sun can be so annoying. Always in one's eyes. Making things uncomfortable. So presumptuous. Ah, well, what is to be done?\" ${ara_he} says.\n\n\t\t\t\t\t\t\t\t\t$!{ara_he} stands and brushes ${ara_him}self off. \n\n\t\t\t\t\t\t\t\t\t\"If I were you, I would head to the steppe. I always prefer the climate there. Hopefully, you will have a little fun there. Without your new friends.\"\n\n\t\t\t\t\t\t\t\t\tBefore you can return the barb, ${ara_name} is gone. You wonder as you walk out of Ishko why you do not have the power to appear or disappear at will. \n\n\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t#\"I have my own plans for this town. Their worship is worth more to me than your sword.\"\n\t\t\t\t\t\t\t\t\t*label worship_option\n\t\t\t\t\t\t\t\t\t*set riser_affinity %-10\n\t\t\t\t\t\t\t\t\t*set selfishness %+10\n\t\t\t\t\t\t\t\t\t*set equity %-10\n\t\t\t\t\t\t\t\t\t*set ishko_aid true\n\t\t\t\t\t\t\t\t\t*if (((combat * 3) >=riser_affinity) or ((influence * 30) >=riser_affinity))\n\t\t\t\t\t\t\t\t\t\t${r_captain} grimaces. His soldiers edge forward at your comment, but he waves them back. \n\n\t\t\t\t\t\t\t\t\t\t\"This is not worth drawing weapons over,\" he tells them, then to you, says, \"you may live to regret standing in our way, ${prenom}. But for now, Ishko is yours to do with what you will. If you can claim it, of course.\"\n\n\t\t\t\t\t\t\t\t\t\t${r_captain} shouts orders to his soldiers, and they begin to march out of Ishko. \n\n\t\t\t\t\t\t\t\t\t\tThat leaves you an entire settlement to bring under your thumb.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tWith roughly half of Ishko standing before you, you make the pronouncement that for protecting them from the Rising Sun threat, they are now both under the protection of Wolf's living form and beholden to ${him}.\n\n\t\t\t\t\t\t\t\t\t\t*if influence >= 2\n\t\t\t\t\t\t\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t\t\t\t\t\t\t*set restraint %+10\n\t\t\t\t\t\t\t\t\t\t\t*set ishkoans_worship_you true\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans do not get down on their knees. They are too proud and independent for that, but slowly you can feel their quiet gratitude building up inside you. You feel more sensitive to the world now, and you know that they have given you a part of their faith. \n\n\t\t\t\t\t\t\t\t\t\t\tYou carry that faith with you as you leave Ishko, and it makes you stronger.\n\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*set ara_affinity %+5\n\t\t\t\t\t\t\t\t\t\t\tAt Ishko's gate you find ${ara_name} waiting for you, grinning brightly. \n\n\t\t\t\t\t\t\t\t\t\t\t\"So you have taken the town's praise for yourself. The valiant, powerful wolf prowling the borders of the settlement and keeping the monsters at bay. I like the idea, but I wonder if you truly mean to protect them or is their worship just another bloody piece of meat for you to chew?\n\n\t\t\t\t\t\t\t\t\t\t\t\"You could not possibly mean to be their protector. This is some deeper game.\"\n\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#\"I mean it.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set equity %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set selfishness %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set ara_affinity %-5\n\t\t\t\t\t\t\t\t\t\t\t\t\t${ara_name} frowns.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"How boring. Hopefully, you will be more entertaining on the steppe. The world is in such dire need of entertainment.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto post_worship_question\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Faith is power, and I want more of it.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set pantheon_regard -1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set ara_affinity %+5\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set action %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set deliberation %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t${ara_name} cocks ${ara_his} head and stares at you. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"I applaud your avarice, but be careful not to take too much more than your share. There are other hunters too, and they do not like going hungry.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tThen smiling, ${ara_he} adds, \"either way, you keep things interesting. I hope you bring that acquisitive nature to the steppe. I do like watching you work.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto post_worship_question\n\t\t\t\t\t\t\t\t\t\t\t\t#\"I did not mean a word of it.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set selfishness %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set equity %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set ara_affinity %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t${ara_name} laughs and claps. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"There is the wolf I want. Merciless and insincere,\" ${ara_he} says. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t$!{ara_he} folds ${ara_his} arms, still grinning. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"We are going to have a lot of fun together, Wolf-kin.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto post_worship_question\n\t\t\t\t\t\t\t\t\t\t\t*label post_worship_question \n\n\t\t\t\t\t\t\t\t\t\t\t${ara_name} bids you farewell and makes ${ara_his} way out of Ishko. You follow shortly thereafter.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans do not bend their knees for you, despite hard looks and veiled threats. Whatever they might owe you for turning away the Rising Sun, it does not add up to their fealty. \n\n\t\t\t\t\t\t\t\t\t\t\tIt becomes clear they do not even particularly want you among them. You bite your tongue to keep from exploding in anger. After all, the other gods would likely frown on you slaughtering all of Ishko in retaliation. \n\n\t\t\t\t\t\t\t\t\t\t\tInstead you take a deep breath, draw from your pool of restraint, and leave the settlement. \n\t\t\t\t\t\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\t\t\t\t${ara_name} waits for you outside of Ishko. $!{ara_he} balances a stiletto horizontally between both palms without cutting ${ara_him}self. \n\n\t\t\t\t\t\t\t\t\t\t\t\"Hard to capture hearts and minds, is it not? At least not without adequate force. Well, next time, maybe. And there are always more worshipers to be had. The independent-minded people of the steppe for example, just waiting to be dominated. Are you not excited by the thought?\"\n\n\t\t\t\t\t\t\t\t\t\t\tBut ${ara_name} and ${ara_his} stiletto are gone before you can reply. Predictably. \n\n\t\t\t\t\t\t\t\t\t\t\tYou walk on. \n\t\t\t\t\t\t\t\t\t\t\t*goto continue_1\t\t\t\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t${r_captain} laughs.\n\n\t\t\t\t\t\t\t\t\t\t\"You think these people are going to follow you? Look around.\"\n\n\t\t\t\t\t\t\t\t\t\tThe Ishkoans are now staring at you as hard as they are at the Rising Sun. It seems that ${r_captain}'s warm reception has somewhat turned their opinions against you. \n\n\t\t\t\t\t\t\t\t\t\t\"But since you are so set on opposing us, let us see what you can do.\"\n\n\t\t\t\t\t\t\t\t\t\t${r_captain} draws his sword and his soldiers follow suit. \n\n\t\t\t\t\t\t\t\t\t\t*goto pre_riser_fight\n\n\t\t\t\t\t\t\t\t#\"I am not sure you are worthy enough, so in fact I do intend to stand in your way.\"\n\t\t\t\t\t\t\t\t\t*set action %+10\n\t\t\t\t\t\t\t\t\t*set deliberation %-10\n\t\t\t\t\t\t\t\t\t${r_captain} draws his sword. \n\n\t\t\t\t\t\t\t\t\t\"I would have preferred to do this another way, ${prenom}. But I cannot say I am terribly surprised it turned out like this.\"\n\n\t\t\t\t\t\t\t\t\tHe gestures to his soldiers, and they fan out around him. \n\n\t\t\t\t\t\t\t\t\t\"We take the town.\"\n\n\t\t\t\t\t\t\t\t\t*goto pre_riser_fight\n\t\t\t\t#\"If you are frightened, then perhaps I should take the town for myself. Their worship is more useful than your cowardice.\"\n\t\t\t\t\t*goto worship_option\n\t\t\t\t*selectable_if ((action > deliberation) and (selfishness >= equity)) #[i]Wolf Path[/i]: \"Do you intend for me to repeat myself, Captain?\"\n\t\t\t\t\t*set riser_affinity %-10\n\t\t\t\t\t*set action %+10\n\t\t\t\t\t*set deliberation %-10\n\t\t\t\t\t*set influence +1\n\t\t\t\t\t${r_captain} looks momentarily taken aback, but quickly recovers in order to save face before his soldiers. \"The Rising Sun stands ready to do what must be done.\" \n\n\t\t\t\t\t\"Good. We have a town to take.\"\n\n\t\t\t\t\tYou approach the Ishkoans and calmly explain to them their options. Fight against the Rising Sun with you bolstering their ranks, or submit. \n\n\t\t\t\t\t*goto ishko_force\n*elseif riser_affinity > 45\t\n\t\"You,\" ${r_captain} shouts. \n\n\tYou realize he is talking to you. \n\n\t\"Can you speak for this settlement? We intend to negotiate, but if no terms can be reached, we are not above taking what we came for.\"\n\n\t*if tribe = \"Clearwater\"\n\t\tDespite the fact that you are Clearwater,\n\t\t*goto speaking_for_ishko\n\t*else\n\t\tConsidering that you are not even Clearwater,\n\t\t*goto speaking_for_ishko\n\n\t*label speaking_for_ishko\n\tyou do not actually have the authority to speak on Ishko's behalf, but that need not stop you. \n\n\t*choice\n\t\t#Attempt to negotiate with the Rising Sun on behalf of Ishko. \n\t\t\tYou are not Ishkoan, but you are the living embodiment of Wolf, or what remains of him at least. Your impulses are the other thing that rules you. You step forward.\n\n\t\t\t*goto immediate_diplomacy\n\t\t#Refuse to let ${r_captain} intimidate Ishko. \n\t\t\t\"You mean to stand in our way?\" ${r_captain} asks. \"Really?\"\n\n\t\t\t${r_captain} seems surprised by the notion that you might want to stand against him and his soldiers.\n\n\t\t\t\"Ishkoan or no, you will submit just the same eventually.\"\n\n\t\t\t*goto pre_riser_fight_with_text\n\t\t#Help the Rising Sun take Ishko. \n\t\t\t\"I somehow doubt this settlement is yours to give away,\" ${r_captain} says. \n\n\t\t\t\"No one is going to put up as much of a fight as I would,\" you reply. \"And I am not fighting you.\"\n\n\t\t\t\"So that just leaves an entire town to take.\"\n\n\t\t\t\"Exactly,\" you say. \n\n\t\t\t\"Then shall we begin?\"\n\n\t\t\tYou face the assembled Ishkoans. \n\n\t\t\t\"This settlement has just changed hands. I would suggest that you allow this to occur peaceably. There is no real need to shed blood here, because if you fight back, you will lose.\"\n\n\t\t\t*goto ishko_force\n*elseif (riser_affinity \u003c 45) and (riser_affinity > 35) \n\t${r_captain} looks in your direction and sneers.\n\n\t\"You are not among our favorites, I can you tell you that. So tell me, why are you here? Do you intend to stand in our way?\"\n\t*choice\n\t\t#\"I am going to stop you right here.\"\n\t\t\t\"Oh, good. Let us get truly acquainted then,\"\n\n\t\t\t*goto pre_riser_fight_with_text\n\t\t#\"Let me help you take the town.\"\n\t\t\tYou politely inform the Ishkoans that, strictly speaking, their settlement is no longer their own.\n\n\t\t\t*goto ishko_force\n\t\t#\"Actually, this town, and its worship, is mine.\"\n\t\t\t*goto worship_option\n\t\t#\"Ishko is protected by forces beyond your understanding. You will not take it easily.\" [Use Ritual to intimidate ${r_captain}]\n\t\t\t*set riser_difficulty ((ritual) + (sensitivity + pantheon_regard))\n\t\t\t${r_captain} scoffs at that. \n\n\t\t\t\"I am not afraid of your mystical nonsense. Protecting spirits that never reveal themselves. Soft-headed tripe.\"\n\n\t\t\t*if riser_difficulty  >= 30\n\t\t\t\t*set ritual +10\n\t\t\t\tSo instead of more talk, you put your threat into action. There are hawks circling above Ishko and it takes a mild adjustment in the bounce of light to create the illusion. Even the small stretch of ritual power makes you gnash your teeth, but you ignore it. Somewhere in the effort of it you feel yourself growing stronger, more comfortable in the realm of mysteries.\n\n\t\t\t\tWhen the Risers and Ishkoans both look up, they see monstrous hawks with enormous wingspans. Their huge bodies blot the distant sun, and their shadows fall wild over the buildings and people of Ishko. \n\n\t\t\t\tThe Risers draw their weapons and prepare for an attack, whereas the Ishkoans drop to their knees in prayer. \n\n\t\t\t\t\"They delay only because it pleases me. Should I tell them there is a feast of flesh to be had between you and your soldiers?\" you ask. \n\n\t\t\t\t${r_captain} manages his fear well, much more deftly than his soldiers, but in the end he breaks. \n\n\t\t\t\t\"Swear that those monsters will keep their distance if we leave the village untouched.\"\n\n\t\t\t\t\"I swear it.\"\n\n\t\t\t\tAnd the Risers carefully, watching each other's backs, leave Ishko in tight formation with their eyes fixed on the sky. \n\t\t\t\t*page_break\n\t\t\t\t*goto ishko_thanks\n\t\t\t*else\n\t\t\t\tYou attempt to put fear into ${r_captain}'s smug expression, but when you reach into land, skies, and your own reserves of arcane power, there is not enough to establish a connection. \n\n\t\t\t\t${r_captain} laughs. \n\n\t\t\t\t\"Was that it? Now let me show you what I am capable of,\" he says. \n\n\t\t\t\t*goto pre_riser_fight_with_text\n*else\n\t${r_captain} draws his blade and points it your direction. \n\n\t\"So we cross paths once again,\" he says. \"Your gods must be cruel to put you in my way.\"\n\n\tYour reply? \n\t*fake_choice\n\t\t#\"Cruel? To you, certainly.\"\n\t\t\t${r_captain} laughs abruptly. \n\n\t\t\t\"Amusing. I wonder if your tongue will be as clever once I remove it from your mouth.\"\n\t\t#\"You have one opportunity to put that sword down.\"\n\t\t\t\"Oh?\" says ${r_captain}. \"How kind of you. I am not offering you any such courtesy.\"\n\t\t#\"This does not have to end with you dead, but it will if you do not sheathe that sword.\"\n\t\t\t${r_captain} blinks at you. \"Is that all you have to say? Then here's my answer:\"\n\t\t#\"We should discuss this.\" \n\t\t\t\"No, I think we have spoken quite enough,\" ${r_captain} replies.\n\t\t#\"Pick a fight with me if you must, but leave these villagers out of this.\"\n\t\t\t\"Killing you is just the preface. Afterward, we are going to have a long, fruitful discussion with the inhabitants of this settlement,\" ${r_captain} says. \n\t*comment endif \n\n\t*label pre_riser_fight_with_text\n\t${r_captain} raises a hand above his head and swings down a closed fist. The soldiers surrounding him prepare their weapons. ${ara_name} folds ${ara_his} arms and watches, while roughly two dozen of the Ishkoan Clearwaters watch the situation unfold from the relative safety of doorframes and behind fenceposts. \n\n\t*label pre_riser_fight\n\t*set riser_affinity %-15\n\t*set riser_conflict true\n\tYou have just moments before the Risers strike. How will you defend yourself? \n\n\t*choice\n\t\t#Alone and honorably.\n\t\t\t*set riser_difficulty ((combat) + (combat * aran_aid))\n\n\t\t\tThe decision is no decision at all. Even without the savage impulse stirring in your blood, there is more honor and satisfaction in fighting fairly and emerging victorious. You crack your knuckles and step into the brewing fray. \n\n\t\t\t*if riser_difficulty >= 20\n\t\t\t\t*set restraint %+10\n\t\t\t\t*set influence +1\n\t\t\t\tThough you have decided to fight fairly, the Risers are beholden to no such promises. They come at you two or three at a time, swinging bladed weapons in tight arcs. They fight in concert and try to corral you, push you into inferior positions, but you dance in and out of their range, frustrating their attempts. \n\n\t\t\t\tCombat is won and lost with patience and so even when your muscles weary of dodging and you take numerous flesh wounds from the Risers's weapons, you still take care with each move and countermove. One at a time, you dispatch the combatants who come against you as the Risers become increasingly frustrated, impatient, and prone to error. \n\n\t\t\t\t${r_captain} looks at you when only you and he remain. All the others lie broken at your feet. \n\n\t\t\t\t\"I doubted you,\" he says. \"That was a mistake.\"\n\n\t\t\t\t\"Yes. It was,\" you reply. \n\n\t\t\t\tHe lasts longer than the others. He fights more ferociously and with more cunning, but he falls like the others do. Sooner or later, he lies at your feet. The Ishkoans look on in hushed, reverent silence. \n\n\t\t\t\t*label risers_death_choice\n\t\t\t\tYou have fought ten men and women and defeated each of them. You look down at the defeated. If you kill them now, you can ensure they'll never stand up against you again. But the Ishkoans are watching closely, and you cannot tell how they'll react to wholesale slaughter. The decision rests heavy on your shoulders. \n\t\t\t\t*choice\n\t\t\t\t\t#Kill the Risers. Their continued existence is a threat to the Clearwaters. If they understand that, then there is only one outcome.\n\t\t\t\t\t\t*label clean_riser_deaths\n\t\t\t\t\t\t*set death_toll +10\n\t\t\t\t\t\t*set action %+10\n\t\t\t\t\t\t*set deliberation %-10\n\t\t\t\t\t\t*set restraint %+5\n\t\t\t\t\t\tWhat follows is clean. Methodical. You end their lives without relish or cruelty. \n\n\t\t\t\t\t\tSome of the Ishkoans watch with guarded faces while the others choose to look away. \n\n\t\t\t\t\t\tWhen it is done, ${ara_name} looks over the scene with amusement.\n\n\t\t\t\t\t\t\"I wonder if you will make corpses everywhere you go?\" ${ara_he} asks. \"Now that you have reddened the soil of Ishko, will you water the steppe with blood as well? I look forward to finding out, ${prenom}.\"\n\n\t\t\t\t\t\t${ara_name} walks off and disappears into the encampment, and you turn away from the corpses. You leave them to the discretion of the Ishkoans and head out toward the road.\n\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t#Let the Risers live. Their survival is a concession, but there has to be another way to live beside complete brutality. \n\t\t\t\t\t\t*label let_risers_live\n\t\t\t\t\t\t*set deliberation %+10\n\t\t\t\t\t\t*set action %-10\n\t\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t\t*set bear_affinity %+15\n\t\t\t\t\t\t*set risers_live true\n\t\t\t\t\t\t${r_captain} glares. \n\n\t\t\t\t\t\t\"You would leave us alive, after this embarrassment. After this—\" His face twists as he spits the next word. \"Defeat.\"\n\n\t\t\t\t\t\t\"You are no longer my problem. Do not make this worse,\" you caution.\n\n\t\t\t\t\t\t\"I have the feeling your problems are just beginning,\" ${r_captain} says. \n\n\t\t\t\t\t\tThe Risers collect themselves slowly and leave Ishko. You doubt they'll make an attempt on the encampment again and you tell the Ishkoans as much. They do not seem inclined to believe you and after seeing you fight, they do not seem to want you around any more than they wanted the Risers. You decide to leave ahead of any more violence. \n\n\t\t\t\t\t\tAs you head out of Ishko, you see ${ara_name} sitting on the low wall that surrounds the encampment. \n\n\t\t\t\t\t\t\"I would have thought you would have killed them,\" ${ara_he} says, and points out the injured group descending the hills surrounding the encampment. \"I wonder if it was wise, leaving them alive. I wonder if their blood was not worth spilling.\"\n\n\t\t\t\t\t\t${ara_name}'s voice is ruminative and ponderous, and then suddenly it is not. \"Not my decision. But will you be headed to the steppe next, ${prenom}? It is lovely this time of year.\"\n\n\t\t\t\t\t\tYou go to answer, but ${ara_name} is gone. You shake your head and find the road. \n\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t#Let the Ishkoans decide whether or not to butcher the Risers.\n\t\t\t\t\t\t*label ishkoans_kill_risers\n\t\t\t\t\t\tYou offer the Ishkoans the decision, and they glance about uncertainly as if the choice were too much for them to bear. Ultimately though, they choose. \n\n\t\t\t\t\t\tAllowing the Rising Sun to live and continue to terrorize them in the future is a heavier fate than ending the lives of their enemies.\n\n\t\t\t\t\t\tYou spare them the difficulty of having to do the bloody work themselves.\n\n\t\t\t\t\t\t*goto clean_riser_deaths\n\t\t\t*else\n\t\t\t\t*set combat +10\n\t\t\t\tYou manage to take down the first handful of challengers, but the fighters are more skilled than you would have thought. Fighting against them gives you a solid challenge and you learn to anticipate their moves and adapt, but as the fight wears on it becomes clear that growing wise to their moves is not enough.\n\t\t\t\t*label fight_loss_scenario \n\t\t\t\t*if riser_difficulty \u003c= 14 \n\t\t\t\t\t*set ishkoans_hurt \"many\"\n\t\t\t\t\t*goto continue_fight_loss\n\t\t\t\t*else\n\t\t\t\t\t*set ishkoans_hurt \"few\"\n\t\t\t\t\t*goto continue_fight_loss\n\t\t\t\t*label continue_fight_loss\n\n\t\t\t\tThe situation quickly becomes frantic. ${r_captain} calls orders above the shouts, and even though you fight like an animal backed into a corner, you lose ground by the minute. The risers fight in tight order with spears, keeping you at a distance. \n\n\t\t\t\tAs it begins to appear hopeless, you hear a shout. \n\n\t\t\t\t*if tribe = \"Clearwater\" \n\t\t\t\t\t\"Protect ${him}! \n\t\t\t\t\t*if gender = \"none\"\n\t\t\t\t\t\t$!{he} are one of ours!\n\t\t\t\t\t*if gender != \"none\"\n\t\t\t\t\t\t$!{he}'s one of our own!\"\n\t\t\t\t\t*goto ishkoans_fight\n\t\t\t\t*else\n\t\t\t\t\t\"For Ishko!\"\n\t\t\t\t\t*goto ishkoans_fight\n\n\t\t\t\t*label ishkoans_fight\n\t\t\t\t*if ishkoans_aid\n\t\t\t\t\tYour edict echoes through the small encampment, and you do not need to wait until they have joined your side to know that they'll come. The awe and fear of the gods is strong enough to evoke a tangible feeling of power that vibrates in your teeth. You charge forward and set an example of the kind of battle-worthiness you expect from your temporary vassals.\n\n\t\t\t\tThe Ishkoans pour into the space beside you, flailing with improvised arms: machetes, butcher knives, and only a handful of legitimate swords and spears. They fight admirably considering and manage to slowly, but consistently, push the Risers back to the edge of town.\n\n\t\t\t\t${r_captain} orders the retreat, and his soldiers limp toward him, protecting themselves as best as possible against the unexpected assault.\n\n\t\t\t\tYou can tell the bloodlust is starting to fade from the Ishkoans, but a casual word could still ignite real violence. If the Risers are dead then their threats end here. Do you intend to push the Ishkoans to murder? \n\n\t\t\t\t*choice\n\t\t\t\t\t#Yes. As long as the Rising Sun soldiers survive, they are a threat. Killing them all is the only option that makes sense.\n\t\t\t\t\t\t*set death_toll +10\n\t\t\t\t\t\tThe Ishkoans hesitate for a moment, and then the bloodshed starts. \n\n\t\t\t\t\t\tWhen it's over, the mob stumbles away from the scene, shedding individuals until only a few dazed Ishkoans remain, breathing hard and regarding the bodies of their enemies. \n\n\t\t\t\t\t\tAnd then even they walk away. \n\n\t\t\t\t\t\t${ara_name} plucks a coin purse from one of the recent dead and checks the heft of it. $!{ara_he} smiles, and the purse disappears into a fold of ${ara_his} tunic. $!{ara_he} turns to you. \n\n\t\t\t\t\t\t\"Now that you have dispensed with that little mess, I will be seeing you later. Hopefully you will take your distinct brand of chaos to the steppe. I do so love to profit from the deceased. They never ask for their coin back,\" ${ara_he} says.\n\n\t\t\t\t\t\t${ara_name} walks away and you do not follow. Whatever ${ara_name}'s game, there is little to be gained from playing along. Especially when you have your own imperatives. \n\n\t\t\t\t\t\tThe Ishkoans \n\t\t\t\t\t\t*if ishkoans_hurt = \"many\"\n\t\t\t\t\t\t\twatch you warily as they tend their wounded and dead. There are people openly weeping on their knees in the dusty lane. They glare at you as you walk by. It is the least you can do to meet their furious stares. \n\n\t\t\t\t\t\t\tNone of them makes a move despite the tension so neither do you. You leave Ishko to its fate and take to the road while the sun is still high in the sky.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\ttend to their wounded, who have sustained mostly surface injuries. The mood is not triumphant exactly, especially not with the bodies of the Risers still cooling in the center of town, but the Ishkoans have a grim determination about them. They have successfully defended their young territory. Retaliations might come their way later, but that is a concern for another day. \n\n\t\t\t\t\t\t\tMore than one Ishkoan nods in your direction as you leave the encampment and head to the road. No words are exchanged.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t#No. If we slaughter all of the Risers present, the bloodshed will hardly stop there. \n\t\t\t\t\t\t*goto let_risers_live\n\t\t\t\t\t#Let the Ishkoans decide whether or not to slaughter the Rising Sun soldiers.\n\t\t\t\t\t\t*if ishkoans_hurt = \"few\"\n\t\t\t\t\t\t\tThe Ishkoans grapple with the question and cast looks upon the defeated Risers that range from pitying to withering. Ultimately, the settlement decides that further bloodshed is neither wise nor necessary. \n\n\t\t\t\t\t\t\t*goto let_risers_live\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto ishkoans_kill_risers\n\t\t#Alone, employing every dirty trick I know.\n\t\t\t*set riser_difficulty ((aran_aid * 3) + (combat + quickthinking))\n\t\t\t*if riser_difficulty >= 25\n\t\t\t\t*set survival +5\n\t\t\t\tTaking the offensive is your best chance, and you take it without hesitation. Whereas others hold tight to their scruples, you have no such issues. You throw a fistful of dust into the eyes of the first Riser you come across and quickly take him off his feet. The next comes at you with a sloppily telegraphed thrust of her short blade, and ends up impaling her own ally. You take advantage of her momentary horror and take her down as easily as the first. \n\n\t\t\t\tThe next few are expecting your tricks, so they are a little harder to fight. Luckily you have a few they have not seen yet. \n\n\t\t\t\tFrom the unnatural way you twist and turn as the Risers come at you, to the animal roar you unleash in their faces; there is no way they can touch you. \n\n\t\t\t\tAfterward, when they are lying in the dust, panting and decimated, you look on, tired but triumphant. \n\n\t\t\t\tNow that they are on their backs, their lives are yours. Kill them or let them go?\n\t\t\t\t*choice\n\t\t\t\t\t#Kill them. \n\t\t\t\t\t\t*set death_toll +10\n\t\t\t\t\t\tIt is not a matter of honor. As bloodthirsty as the wolf inside you can be, it is not about pleasure either. You kill them because once they are dead they are not your problem anymore.\n\n\t\t\t\t\t\t${r_captain} is the last to go and defiant to the final moment.\n\n\t\t\t\t\t\tYou leave the bodies for the Ishkoans. It is the least they can do considering that you have eliminated their greatest threat. \n\n\t\t\t\t\t\tWhen it is over, you catch ${ara_name} watching you from the doorway of an Ishkoan residence. $!{ara_he} points at the recent dead. \n\n\t\t\t\t\t\t\"Seems your friends had a hard time,\" ${ara_he} says. \n\n\t\t\t\t\t\t\"We were not close,\" you reply. \n\n\t\t\t\t\t\t${ara_name} grins. \"Humor. Bloodshed. You keep things interesting, wolf. Hopefully you will take your interesting perspective to the steppe.\"\n\n\t\t\t\t\t\tYou start to respond, but ${ara_he}'s already gone. You shake your head and then continue on out of Ishko. \n\n\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t#Let them walk away.\n\t\t\t\t\t\tYou have to content yourself with knowing that there is no blood on your hands, because gratitude is not forthcoming on the faces of the defeated. \n\n\t\t\t\t\t\t${r_captain} eyes you warily when you tell him and his soldiers to leave Ishko immediately. They do so quietly, picking up their broken comrades and limping toward the edge of town. Something in ${r_captain}'s furious gaze tells you that he is not going to take his defeat lying down. But for right now, Ishko is safe, and you are a hero of sorts. But it does not particularly feel that way. \n\n\t\t\t\t\t\tThe Ishkoans keep their distance, perhaps having seen the extent of the your martial skill, and are now thinking better of close contact. \n\n\t\t\t\t\t\tYou shake your head and set out, away from the Ishkoans and their quiet gawking. \n\n\t\t\t\t\t\t*label ara_mercy_speech\n\t\t\t\t\t\tOn the way out of town you see ${ara_name} cleaning ${ara_his} nails with a thin-bladed knife. $!{ara_he} seems to barely notice you, but starts talking once you near ${ara_him}. \n\n\t\t\t\t\t\t*label aran_banter\n\t\t\t\t\t\t\"Mercy from a wolf? What a wonder the world is,\" ${ara_he} says.\n\n\t\t\t\t\t\t\"My mercy is all used up now,\" you reply, and flash a smile. \n\n\t\t\t\t\t\tWhether or not your comment was intended as a joke or a threat, ${ara_name} grins and slides the knife's blade against ${ara_his} thumb.\n\n\t\t\t\t\t\t\"You should head to the steppe. A good sense of humor is so rare these days, and those people could always use a laugh.\"\n\n\t\t\t\t\t\t${ara_name} waves the knife in a careless hand and walks away whistling. You watch ${ara_him} go and then head out yourself. \n\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t#Let the Ishkoans decide. \n\t\t\t\t\t\t*goto ishkoans_kill_risers\n\t\t\t*else\n\t\t\t\t*set quickthinking +10\n\t\t\t\tThe first few Risers go down easily, but it does not take long for ${r_captain} to begin turning the tide. You get a better sense of the Rising Sun combat tactics, but you are exhausted and battered. \n\n\t\t\t\t*goto continue_fight_loss\n\t\t#Use an unpredictable ritual to turn the forces of the earth against the Risers.\n\t\t\t*set riser_difficulty ((aran_aid * 3) + (ritual + sensitivity))\n\t\t\tAs the Risers begin to advance on you, you reach into the depths of your experience for a suitable ritual. It would be easier if the stars were out to chart the relationships among the roving celestial bodies, but instead you are forced to rely on your innate knowledge.\n\n\t\t\t*if riser_difficulty >= 25\n\t\t\t\t*set survival +5\n\t\t\t\tThe power of ritual is not only in the effects, but in the clear space of its conjuring. You feel a moment of something resembling peace as the power accumulates around you, but only for a moment. That peace tightens into a coil around you and robs you of breath. You keep the tightness, cultivate it, and then the earth leaps forward. \n\n\t\t\t\tThe Risers, and anyone unfortunate enough to be standing nearby, are thrown off their feet as the ground trembles and cracks beneath them. The soldiers tumble like straw dolls on the earth turned suddenly temperamental. \n\n\t\t\t\tYou catch ${r_captain}'s terror as he slides into a diagonal fissure, clawing for purchase as he falls. \n\n\t\t\t\tA choice emerges as the Risers struggle. You can make a spectacle of your power, revel in the fear and awe that you produce, or perhaps satisfy yourself with merely with rattling them to defeat. Or you can expend less of yourself, destabilizing the ground long enough to let the Ishkoans defend their home. \n\n\t\t\t\t*choice\n\t\t\t\t\t#Content yourself with knocking them down.\n\t\t\t\t\t\t*set ishkoans_hurt \"few\"\n\t\t\t\t\t\t*set equity %+10\n\t\t\t\t\t\t*set selfishness %-10\n\t\t\t\t\t\tYou allow the tightness in your chest, like a held breath, to loosen, and the earth's anger subsides. The monstrous tremors cease, and the center of Ishko looks like it has been rent in dozens of places. Any damage to the actual structures that surround the town seems minimal. Luckily for the residents of the encampment. \n\n\t\t\t\t\t\tThe Risers struggle to their feet, though some of them clearly need assistance to do so. \n\n\t\t\t\t\t\t*goto let_risers_live\n\t\t\t\t\t#Unleash your full ritual potential.  \n\t\t\t\t\t\t*set death_toll +10\n\t\t\t\t\t\t*set selfishness %+10\n\t\t\t\t\t\t*set equity %-10\n\t\t\t\t\t\t*set ishkoans_hurt \"many\"\n\t\t\t\t\t\tYou press the earth closer. \n\n\t\t\t\t\t\tThe tightness in your chest flares into actual pain and the force of it nearly doubles you over. The ground ripples beneath one of the soldiers and he sinks, screaming into it like quicksand, but the ground hardens again once he has been swallowed completely. Another woman attempts to vault over a growing chasm beneath her only to find another hole appear at her landing point. \n\n\t\t\t\t\t\t${r_captain} curses you and the gods as he tumbles beyond the reach of his allies. \n\n\t\t\t\t\t\tWhen it is done, there is little remaining of the Risers and the ground has become wretched. More than a few homes and other structures have sustained damage, and the Ishkoans eye you with equal parts fear, anger, and suspicion. \n\n\t\t\t\t\t\t\"The wolf has more than just teeth to recommend ${him}, I see,\" you hear. \n\n\t\t\t\t\t\t${ara_name} stands beside a tall, jagged piece of earth that rose up and impaled one of the Risers, who now stares with blank eyes. ${ara_name} strokes the dead man's cheek and turns to you.\n\n\t\t\t\t\t\t\"You should go to the steppe next,\" ${ara_name} says. \"You do seem to make things interesting, and those people are in such need of a change.\"\n\n\t\t\t\t\t\tThe Spider avatar walks toward the edge of town merrily, as if the carnage that has just occurred has left no mark whatsoever on ${ara_him}. \n\n\t\t\t\t\t\tWhen you leave as well, you can feel the hard stares of the Ishkoans following you for a long time. \n\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t#Target the Risers; give the Ishkoans time to fight back.\n\t\t\t\t\t\t*set deliberation %+10\n\t\t\t\t\t\t*set action %-10\n\t\t\t\t\t\tThe earth responds to your call, the force you hold in your chest, and the ground trembles with it. \n\n\t\t\t\t\t\tYou can barely breathe, much less call the Ishkoans to action, but they need little prompting.\n\n\t\t\t\t\t\tYou watch as natural laws are violated: the Risers struggle to stay on their feet, but the Ishkoans charge unaffected by your controlled ritual. The fight ends quickly with the Risers unable to capably defend themselves. \n\n\t\t\t\t\t\tWhen it is over, you attempt to catch your breath, and the Ishkoans promptly remove the Risers from their settlement. \n\n\t\t\t\t\t\tAs for you, you do not wait around for their thanks. As soon as you can breathe regularly again, you make for the edge of the little village. Grand acts of ritual are rare enough to make people uncomfortable, and discomfort sometimes produces ugliness in people. It is wise to leave before that ugliness is directed at you.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto ara_mercy_speech\n\t\t\t*else\n\t\t\t\t*set ritual +10\n\t\t\t\tThere is a mechanical sort of knowledge that allows for these rituals—the positions of stars, the moon, the revolution of the burning sun—but there is also a space within yourself that facilitates the exchange of energies, terrestrial and otherwise. When you reach into that space, the power that you need is slippery. Elusive. \n\n\t\t\t\tThe Risers surround you, but the earth, which you expected to leap up at your command, is still.\n\n\t\t\t\tYou fight off the first of the soldiers, but the botched ritual has left you exhausted and stunned. Things look grim until you hear the first shout. \n\n\t\t\t\t*goto ishkoans_fight\n\t\t#Command the Clearwaters to fight alongside me in the name of the gods. \n\t\t\t*set riser_difficulty ((influence * 2) + aran_aid)\n\t\t\t*if riser_difficulty >= 5\n\t\t\t\t*set sensitivity +5\n\t\t\t\t*set ishkoans_aid true\n\t\t\t\t*set ishkoans_hurt \"few\"\n\t\t\t\t*goto ishkoans_fight\n\t\t\t*else\n\t\t\t\t*set influence +1\n\t\t\t\t*set ishkoans_hurt \"many\"\n\t\t\t\tWith no less than the authority of the gods behind you, you order the Ishkoans to fight. It does not require much more than a clear, loud voice and a purposefulness that stirs their faith and mobilizes them. \n\n\t\t\t\tThe Ishkoans rush to your side and fight, but even given their collective strength, the Risers are still powerful and well-trained. The Risers hold out for longer than you would have imagined. \n\n\t\t\t\tYou watch Risers and Ishkoans alike topple in battle while you fight alongside ditch-diggers, butchers, and housewives. \n\n\t\t\t\t${r_captain} falls to a pitchfork in his side, and the Risers are all but defeated, but the price is high. Many of the inhabitants of Ishko suffer serious injuries, though it does not seem that any of them have perished outright. Likewise, the Risers have survived despite their wounds. \n\n\t\t\t\t${r_captain} stares at you while holding his bleeding wound. \"So this is what it comes to. I ask only that you make it quick for my soldiers.\" \n\n\t\t\t\tAnd you reply: \n\t\t\t\t*choice\n\t\t\t\t\t#\"I am not going to kill you, ${r_captain}.\"\n\t\t\t\t\t\t*set equity %+5\n\t\t\t\t\t\t*set selfishness %-5\n\t\t\t\t\t\t*set risers_live true\n\t\t\t\t\t\t${r_captain} raises an eyebrow.\n\n\t\t\t\t\t\t\"A poor attempt at humor,\" he says. \n\n\t\t\t\t\t\t\"Leave Ishko alone. I would not attempt retribution if I were you,\" you say. \n\n\t\t\t\t\t\tIt takes a few moments for him to accept that you are not going to kill him and his soldiers. The ten of them struggle to their feet, propping each other up and alternating glares in your direction. \n\n\t\t\t\t\t\tThey leave Ishko without another word. \n\n\t\t\t\t\t\tThe members of the settlement watch the soldiers leave with barely restrained violence in their postures.\n\n\t\t\t\t\t\tAfterward, you begin to leave as well when ${ara_name} stops you. \n\n\t\t\t\t\t\t*goto aran_banter\n\t\t\t\t\t#\"I can do that. After all, you and your soldiers fought honorably.\"\n\t\t\t\t\t\t*set deliberation %+5\n\t\t\t\t\t\t*set action %-5\n\t\t\t\t\t\t*label some_dead_risers\n\t\t\t\t\t\t*set death_toll +10\n\t\t\t\t\t\t*goto clean_riser_deaths\n\t\t\t\t\t#Say nothing. Slaughter them all. \n\t\t\t\t\t\t*set action %+5\n\t\t\t\t\t\t*set deliberation %-5\n\t\t\t\t\t\t*goto some_dead_risers\n\n\t\t*disable_reuse #Ask for ${ara_name}'s help.\n\t\t\t${ara_name} raises an eyebrow when you ask for ${ara_his} aid against the Risers. \n \n\t\t\t\"I am not really the type to get my hands dirty,\" ${ara_he} replies.\n\t\t\t*if ara_affinity >= 55\n\t\t\t\t*set aran_aid 2\n\n\t\t\t\t\"But neither I nor my patron-god are exactly known for consistency of character. I will help you.\"\n\n\t\t\t\t$!{ara_he} blinks ${ara_his} long lashes, and you catch those disconcerting other eyes peeking out beneath ${ara_his} sleepy lids.\n\n\t\t\t\t\"It is done,\" ${ara_he} declares. \"The inhabitants of Ishko have been gently coerced into helping you, and I have sown uncertainty amongst the Rising Sun ranks. You would be surprised how many battles are won or lost on certainty.\" \n\n\t\t\t\t${ara_name} folds ${ara_his} arms. \n\n\t\t\t\t\"The rest is up to you, Wolf-kin.\"\n\n\t\t\t\t*goto pre_riser_fight\n\t\t\t*else\n\t\t\t\t*set ara_affinity %-10\n\t\t\t\t\"So you will have to figure something else out. You have my utmost confidence.\"\n\n\t\t\t\t*goto pre_riser_fight\n\n*label continue_1\n*page_break\nIt is a long walk before the rolling green hills that characterizes the north begin to flatten out. You stop occasionally to gather water from clear streams and to rest, but then you walk again. You travel south and east, hunting small game in order to supplement your meager rations and living off of the land. \n\n*if scroll_possession\n\t*set sensitivity +5\n\t*set ritual +10\n\tYou find time in the quiet austerity to read through the scroll you obtained from the Riser captain. It contains many notes on the course of the stars and what their positions mean. The text is illuminating and possessively impacts your more esoteric skills, but unfortunately it does not provide any deeper knowledge on the situation with Wolf. You roll it up and keep it in the leather container in which it was given to you before continuing on your way.\n*if combat_training\n\t*set combat +10\n\t*set survival +5\n\tYou find some time to go through the combat drills that ${r_captain} showed you. The more you practice them, the more you come to a begrudging respect for the Rising Sun battle movements. You learn more than you would think, though you are hardly ready to become a Riser convert. You do learn quite a few useful tricks.\n\nOver the course of several days, then weeks, your path leads you to lower elevation into rocky, broken terrain. Though it raises your hackles and fills your mouth with a bad taste, you are certain that you are going in the right direction. Before you is a fissure in the earth and a slim pass through which you are meant to travel. You look up at the overcast sky and shake your head. \n\nThe gods, unsurprisingly, are silent. \n*finish \n", "3_roads": "*text_image chap_3.png center Three: Roads\n\n[i]\"The Hawk who wheels above[/i]\n\n[i]in skies whose ends are stitched[/i]\n\n[i]with feathers and blue silk[/i]\n\n[i]has eyes in the dust, in the heart, in the mist.\"[/i]\n*line_break\n-a translation of a famous Highwalk poem. \n*page_break\n\nIt takes nearly two days before you spy the lowest part of the trail leading into the ravine. The rocky, uneven walkway is almost manageable compared to the steep, jagged paths you could expect if you had tried to cross on either side. Whatever stream cut through these rocks has long dried up, which makes the going that much easier.\n\nWhen you descend further, you see a figure reclining on a rock. They are resting or waiting for something. Your eyesight is sharp enough to reveal a few facts: The person has long hair, tied back and away from their face, leather armor that has seen better days, and a sword with a feathered-hilt. \n*if sensitivity >= 10 \n\tThe long, white-gold feathers twined into the hilt of the sword strongly remind you of a hawk's tail. \n*comment endif \n\nYou might speak to them and see what news they might share. It is common for travelers to keep each other abreast of the goings-on of surrounding areas. Of course, you are also free to walk by without a word. \n\n*choice\n\t#Ask what news the stranger brings. \n\t\tYou hail the stranger, and ask, \"What news?\"\n\n\t\tThe traveler responds, in a deep, mellifluous voice. Her face is as weather-beaten as her armaments.\n\n\t\t\"News? The sun spins in the sky, man kills, and we crawl toward oblivion. I have also heard tell of unrest in Ishko. Oh, and there is rumor of the men bearing the sun standard gathering at some sort of compound in the south.\"\n\n\t\tShe shrugs. \n\n\t\t\"All hearsay,\" she says. \"And you? Any tidbits to share?\"\n\n\t\tYou tell her as much as you can without placing yourself too close to any events. She nods as you finish and then points toward the ravine. \n\n\t\t*goto stranger_chat\n\t#Casually chat with the stranger. \n\t\tYou decide to stop and pass words with the stranger, who you can tell from up close, is a woman. She is handsome though her weather-worn face is as lined and deeply colored as the dark leathers she wears. She sits with a hand on the pommel of her sword, but makes no move to draw it as you come closer. \n\n\t\t\"Hail, stranger,\" she says. \n\n\t\tYou reply with the same. \n\n\t\t*label stranger_chat \n\t\t\"The way ahead is through broken land. Forsaken by all gods.\" She spits to make her point. \"I have been sitting here wondering if my business is urgent enough to make me attempt the crossing.\"\n\n\t\t\"Go around then?\" you offer. \n\n\t\tShe shakes her head. \n\n\t\t\"This ravine is the most direct crossing. Climbing the rise might take weeks. Too much time.\"\n\n\t\t\"It sounds like the only way is through,\" you tell her. \n\n\t\t\"I have come to the same point myself.\" She raps a finger on her sword's pommel thoughtfully, then says, \"greater numbers might help matters. You would not be trudging through this rocky mess if you did not intend to cross. We need not be companions, but crossing together is our safest option.\"\n\n\t\t*label accompany_choice\n\t\tIt seems that the traveler intends to cross alongside you whether you require her presence or not. How do you respond to that decision?\n\t\t*choice\n\t\t\t#\"I do not know you. I have no obligation to assist you.\"\n\t\t\t\t*set action %+5\n\t\t\t\t*set deliberation %-5\n\n\t\t\t\t\"That is true. You do not know me,\" the stranger says. \"But I am still not inclined to leave you to your whatever dark things prowl this place.\"\n\t\t\t\t*goto without_hawk\n\t\t\t#\"Why not? As you say, I was crossing anyway.\"\n\t\t\t\t*set equity %+5\n\t\t\t\t*set selfishness %-5\n\n\t\t\t\t\"That is very kind of you. Thank you,\" the stranger says.\n\t\t\t\t*goto with_hawk\n\t\t\t#\"I cannot reliably watch your back and mine. I am sorry.\"\n\t\t\t\t*set deliberation %+5\n\t\t\t\t*set action %-5\n\n\t\t\t\t\"You make a fair point. I don't expect you to go out of your way to assist me. But should we encounter trouble, I will look out for you to the best of my ability,\" the stranger says. \n\t\t\t\t*goto without_hawk\n\t\t\t#\"Assuming you will offer compensation for my protection.\"\n\t\t\t\t*set selfishness %+5\n\t\t\t\t*set equity %-5 \n\n\t\t\t\tThe stranger laughs. The sound is mellow and deep. \n\n\t\t\t\t\"I have little to offer you besides the benefit of the wisdom gained from many years on the road. Even then I would not boast of my coffers to anyone. I will try to think of something more useful to you.\"\n\n\t\t\t\t\"Please do,\" you reply. \n\n\t\t\t\tThe stranger laughs again.\n\t\t\t\t*goto with_hawk\n\t#Ignore the stranger.\n\t\tAs you start to walk by the stranger, they call out to you. \n\n\t\t\"You intend to pass through the ravine?\" \n\n\t\tYou keep walking and only a few steps later find an unwelcome presence keeping pace alongside you. You glance and find the stranger staring back at you. She has a muscular build and the kind of scarring to her face and throat that you would expect from someone who swings a sword for her supper. \n\n\t\t\"I would not go alone, friend,\" she says. \n\n\t\t\"Is that what we are?\" you ask. \n\n\t\t\"Friend or foe, it remains the same. This place is forsaken by the gods. Going through alone is not wise. I can attest to that through personal experience. If you do not mind, I would accompany you.\"\n\n\t\t*goto accompany_choice\n*label with_hawk \n\nShe climbs to her feet, adjusts her leather vest and tightens the straps of the guards crisscrossing her arms. When she's ready, the two of you head forward.\n*goto enter_ravine\n\n*label without_hawk\n\nYou move ahead without waiting for the traveler, but she arranges herself and follows quickly. You enter the ravine alongside your uninvited escort.  \n*goto enter_ravine \n\n*label enter_ravine\n\nThe ravine floor is not especially difficult to traverse. Years of hard rushing water have carved a path through the rock and smoothed the stones underneath. You can imagine it would be treacherous going if the water was still present, but all that surrounds you are the high stone walls of the ravine and a silence that grows deeper as you walk further. \n\nThe traveler walks beside you at a companionable distance. Her gaze scans the rock walls and the path ahead as if anticipating something. \n\n\"This was a holy place once. A long time ago, before my father's and mother's time, when the gods were strong and faith was unquestioned. Their intercession kept it safe. Now there are rumors of fell spirits walking this path. The influence of the gods is waning, I think. Their time is drawing to a close.\"\n\nThe quiet lengthens, and it becomes clear that the traveler intends for you to reply. Do you think that the time of gods is over? \n*choice\n\t#\"Yes. The gods, if they were once powerful and beneficent, are no longer either.\"\n\t\t*set pantheon_regard +1\n\t\t*set hawk_affinity %+20\n\t\t*set deliberation %+10\n\t\t*set action %-10\n\n\t\tThe traveler gives you an appraising look before responding. The long shadows of the ravine fall over half her face. It looks, briefly, like a mask. \n\n\t\t\"The gods have much to account for. I too suspect that the common man is better without their constant interference. Who could say though when places like this exist? Places that have withered without their stewardship?\"\n\n\t\t\"There may be worse prices to pay,\" you say. \n\n\t\t\"That is truth if ever I've heard it.\" \n\n\t\tYou and the traveler are quiet after that. \n\n\t\t*goto god_question_after\n\t#\"Yes. The yoke of the gods has been cast off. If they refuse to cede us our independence, then they should be destroyed.\"\n\t\t*set pantheon_regard -1\n\t\t*set riser_affinity %+10\n\t\t*set hawk_affinity %-5\n\t\t*set action %+10\n\t\t*set deliberation %-10\n\n\t\t\"Destroyed? Who could accomplish such a thing as killing a god?\" the traveler asks.\n\n\t\t\"That is a very good question,\" you reply. \n\n\t\tThe traveler gives you a sidelong look, but does not push the issue further. \n\n\t\t*goto god_question_after\n\t#\"No. I think the gods still have a role to play in all this.\"\n\t\t*set hawk_scrutiny true\n\t\t*set pantheon_regard +2\n\t\t*set restraint %+5\n\t\t*set deliberation %+5\n\t\t*set action %-5\n\t\t*set ara_affinity %+10\n\n\t\tThe traveler seems surprised. \n\n\t\t\"I wonder what the gods have done to earn your support, stranger. Still maybe you are right. It is possible that the gods could yet climb out of their own selfishness and lust for power and surprise us.\" \n\n\t\tShe does not seem convinced, but you don't push the issue. Her views are her own. \n\n\t\tInstead, the two of you continue forward in companionable silence.\n\n\t\t*goto god_question_after  \n\t#\"No. We are lower than gods, and without them we are crawling through the dark. If we want their guidance, their mercy, then we have to submit to them.\"\n\t\t*set hawk_affinity %-15 \n\t\t*set action %+10\n\t\t*set deliberation %-10\n\n\t\tThe traveler visibly sneers at you. \n\n\t\t\"The shepherd is separate from the wolf who hunts the sheep, is that not true? You would reduce our place in the world to give them higher praise?\"\n\n\t\t\"And you would falsely hold yourself in a better light than the gods who gave you breath?\" you reply. \n\n\t\t\"If it meant finally having a place in the world. I would.\"\n\n\t\tThe disagreement never becomes heated, despite your radically different views. It could be the way your words echo from the towering walls of rock that make you hesitant to raise your voice. \n\n\t\t*goto god_question_after\n\t#\"The whims of the gods, for good or ill, have nothing to do with me or getting out of this ravine.\"\n\t\t*set selfishness %+15\n\t\t*set equity %-10\n\t\t*set hawk_affinity %-10\n\t\t*set eel_affinity %+15\n\n\t\t\"I imagine there are a great deal of people who feel much the same as you do. I imagine that apathy is what allows their endless lives and boundless influence in our lives to continue unchecked.\"\n\n\t\t\"Maybe,\" you say, without looking at the traveler, or slowing down. \n\n\t\tShe gets your point and continues on beside you in silence. \n\n\t\t*goto god_question_after\n\t#\"I'd prefer to keep my opinions to myself. Watch the path, those rocks ahead look dangerous.\"\n\t\t*set restraint %+5\n\t\t*set hawk_affinity %-10\n\t\t*set deliberation %+10\n\t\t*set action %-10\n\n\t\tThe traveler does not reply. She keeps her silence, though something in her posture shifts. It seems she has grown colder toward you, but at least she is no longer prying into your affairs. \n\t\t*goto god_question_after\n\n*label god_question_after \n\nThe shadows of the ravine deepen the further you travel into it. The sun penetrates the craggy rock formation overhead, but offers little of its warmth. The going gets rougher underfoot, and it grows colder. \n\nYou and the traveler beside you take turns pointing out particularly perilous sections of the ground where twisting an ankle would be a matter of a single step. To your surprise, her senses are nearly as sharp as your own.\n\nThe path widens into a kind of clearing at the heart of the ravine. This is the deepest part of the natural formation, and the light is all but extinguished here.\n\nThe traveler grimaces beside you. Her fingers twitch beside the pommel of her sword. \n\nThe dread creeps up on you slowly. Your gut is at war with the urge to flee and to fight, but the dark space is absent of a tangible threat. \n*if sensitivity >= 25\n\tYou see something flit by almost too fast to see. It happens again and again. You can taste decay at the tip of your tongue. The dead abound.\n*page_break \n\n*if death_toll >= 10\n\t*check_achievements\n\t*if not(choice_achieved_deadmen)\n\t\t*achieve deadmen\n\tIt takes some time before you realize: the ground you are walking on is not the ground. Hands reach up from the blackness beneath you and attempt to drag you down into it. \n\n\tIt is a seething mass of foul, negative emotions trying to push itself up and into your body. You narrowly avoid its grasp, but the amount of arms coming from the ground are multiplying by the moment. \n\n\t*if (ritual + sensitivity) > 15 \n\t\tYou can sense bits and pieces of humanity in it. It could be an echo of human emotions, magnified in death and dragged into this awful place. \n\t*comment endif \n\n\tThe traveler leaps to avoid the touch of the horrible thing's arms. She looks at it with disgust and seems intent to brandish her sword against it for whatever good that would do. \n\n\tWhat will you do?\n\n\t*choice\n\t\t#Fight off the attacking spirits.\n\t\t\tThere is no way to the other side of the clearing and away from this terrible mass of spirits except through them. You decide to fight. \n\n\t\t\t*if combat >= 25\n\t\t\t\tIt is difficult to find purchase when the arms are of little to no substance, but you are steeled by purpose and the fury of Wolf's own avatar. You fight your way through the maze of spirit-arms that chill you to the bone wherever they touch. They sap your will to continue, but your combat prowess keeps the worst of them off of you. You clench your jaw until your teeth ache to deal with the pain and stay on your feet whenever one touches you.\n\n\t\t\t\tThe traveler fights just as hard beside you. Her sword is a blur around her and her feet are light as she moves steadily through the terrible sea of limbs. More than once you find her sword where one of those fingers would have grabbed you. \n\n\t\t\t\tEventually you make your way to the other side, tired and battered, but alive. You suppress a bitter laugh when you remember coming through the ravine was meant to be the easy road. \n\t\t\t\t*goto post_spirit_fight\n\t\t\t*else\n\t\t\t\tThe nature of the enemy poses a problem, however. You try to swipe at the attacking spirits, but your hands pass through their weightless bodies. \n\t\t\t\t*goto after_fight_fail\n\n\t\t\t*label after_fight_fail\n\n\t\t\tThe malicious spirits surround you. Everywhere they touch on your body goes cold, and you don't have the will to fight them for long. You sink to your knees, and the darkness fills the space around you.  \n\n\t\t\t*goto pre_stat_drop\n\t\t#Subvert the spirit-attackers with ritual force.\n\t\t\t\tThe gods of Wolf's pantheon are powerful, but their reach is limited to the living. They could no more manipulate the dead than they could the flow of time itself. \n\n\t\t\t\tYet there are tremors of the living in the spirit mass. It could be enough. \n\n\t\t\t\tYou reach down into the earth and grasp at the shifting ground beneath you where the bloated, corrupted spirit-mass has embedded itself and its tendrils. You attempt to pull the ground apart, to destabilize what the spirit-body has insinuated itself into. \n\n\t\t\t\t*if ritual >= 15\n\t\t\t\t\tAt first the reply of the ground is faint. The spirit-mass has siphoned off so much of its resilience and strength, but you find that the earth is ready to enact its vengeance. The ground breaks apart in huge chunks. The hard-packed earth of the clearing turns into chaos around you and the spirit hands desperately try to pull it together. Yet for the all tumult, a straight and relatively stable path remains before you. \n\n\t\t\t\t\tYou offer the earth your thanks before racing across the clearing. \n\t\t\t\t\t\n\t\t\t\t\tThere isn't enough room for the traveler to run beside you, so she follows close behind. You can hear her breathing and swearing quietly as the ground wars with the spirit dominating it.  \n\n\t\t\t\t\tEven when you have crossed to the other side, the earth still rages. You hope the fury of the earth does not bring down the walls of the ravine around you. The thought makes you quickly move toward the end of the ravine and leave the clearing behind you.\n\t\t\t\t\t*goto post_spirit_fight \n\t\t\t\t*else\n\t\t\t\t\tYet the earth's voice is far away. You imagine the spirit-mass has been here for a long time, growing stronger off of the strength of the recent dead.\n\n\t\t\t\t\tThe strain of trying to reach the land around you makes it hard to avoid the hands that reach for you. Each touch weakens your resolve, and it's not long before the dark leaps up around you.\n\t\t\t\t\t*goto pre_stat_drop\n\t\t#Revoke their power over you and dismiss the spirits.\n\t\t\tThe spirit arms reach for you and you refuse to run. You stand with both feet planted. \n\n\t\t\tYou are no stranger to operating in the space where fear equals death, but you refuse to be intimidated by the spirit-mass roiling beneath you. \n\n\t\t\tYou take a breath and address the thing directly.\n\n\t\t\t*if ((sensitivity > 15) or (influence >= 3))\n\t\t\t\t\"You have no power over me,\" you shout. \"Nor my companion.\"\n\n\t\t\t\tYour words echo from the high walls of the ravine. The hands cease reaching for you. At least for the space of a few seconds. \n\n\t\t\t\t\"I will pass unmolested. I do not fear you, dead thing.\"\n\n\t\t\t\tYou walk as though you were strolling through a grassy field rather than through the heart of a horror. \n\t\t\t\t\n\t\t\t\tAnd the traveler walks beside you in subtle awe of your composure. \n\n\t\t\t\tYou never turn back to see if the spirit-mass is reaching after you. Not after you have crossed safely. Not after you have spotted the end of the ravine. Never. \n\t\t\t\t*goto post_spirit_fight\n\t\t\t*else\n\t\t\t\tBut its hands do not slow long enough for you to make your point. The spirits' many hands and its very many fingers reach into your ${skin_choice} skin and bring you to your knees. You struggle, but you cannot find your footing as the darkness creeps over you. \n\n\t\t\t\t*goto pre_stat_drop\n\t\t#Push through the vengeful spirits.\n\t\t\tYou are certain you can face whatever this spirit-horror can do to you, and there is only one way across the clearing.\n\n\t\t\tWhen the first spirit-hand touches you, you feel a shock and instant numbness where the spirits' fingers grasp, but you continue, moving forward despite the discomfort. \n\n\t\t\tYou are dedicated to making it through to the other side. \n\t\t\t*if survival >= 15\n\t\t\t\tThe hands of the spirit-mass claw at your arms and legs, they scratch at your face and attempt to drag you down into the uncertain ground beneath you. In your mind, you hear a whisper that suggests it would be easier to relent. To give in. \n\n\t\t\t\tYou keep moving forward. \n\n\t\t\t\tThere isn't much time to linger on her, but you see the traveler struggling forward as well, and her perseverance gives you a little more hope. \n\t\t\t\t\n\t\t\t\tThe other side of the clearing seems as if it's miles away and you can barely feel your limbs. The whisper in your head is now louder than your own thoughts, but something keeps you moving. \n\n\t\t\t\tThe other side gets closer. You are surprised to still be upright. What was once a whisper has become a roar in your head, and the last few feet are indescribable in their torment. Your feet touch something hard, and just like that, you have crossed through the spirit-horror and survived. \n\n\t\t\t\tThe traveler comes through a minute or so later and nearly retches beside you. The both of you take a few moments to orient yourself before continuing on.\n\t\t\t\t*goto post_spirit_fight\n\t\t\t*else\n\t\t\t\tBut the hands of the spirit-mass are countless and your will is limited. Ultimately, you find yourself falling to your knees and struggling fruitlessly to stand. The darkness is not long in overcoming you. \n\t\t\t\t*goto pre_stat_drop\n*elseif ((death_toll > 0) and (death_toll \u003c= 10))\n\tAs you search for an end to the clearing, you sense that you are being watched. You wheel around, hoping to find whoever or whatever is stalking you, but it moves just a moment too quickly, managing to stay out of your vision. \n\n\tIt comes upon you all at once. \n\n\tThe thing feels like regret and anger, it refuses to be ignored. Before you it seems less like a living thing than a shroud. Your eyes burn if you try to trace the edges of it. \n\t*if (ritual + sensitivity) > 15 \n\t\tIt is not something god-made and thus outside of your direct influence, but you can sense the vestiges of humanity about it. The once-living thing is likely an echo of human emotion somehow dragged to this dank place.\n\t*comment endif \n\t\n\tThe traveler hisses at the horrible thing, but makes no move against it. She's calculating, perhaps. \n\n\tWhat do you do? \n\t*choice \n\t\t#Weather the assault of the spirit-mass.\n\t\t\t*if survival >= 15\n\t\t\t\tTheir presence alone sets you on edge and makes your jaw tighten instinctively, but you refuse to let the spirits intimidate you. You take a deep, centering breath as the spirits converge on you. Before everything turns black. \n\n\t\t\t\tInside of the roiling, screaming darkness, the spirits buffet against you and attempt to rip into your ${skin_choice} skin, but you remind yourself that the incorporeal forces can't harm you unless they overpower you. \n\n\t\t\t\tYou let them screa
