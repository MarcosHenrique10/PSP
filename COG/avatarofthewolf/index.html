ted[/b] by the god Bear.\n\t*goto path_choice\n*elseif bear_affinity > 50\n\t*line_break\n\tYou are [b]trusted[/b] by the god Bear.\n\t*goto path_choice\n*elseif bear_affinity >= 70\n\t*line_break\n\tYou are an [b]ally[/b] of the god Bear.\n\t*goto path_choice\n*else\n\t*line_break\n\tYou have no particular relationship with the god Bear.\n\t*goto path_choice\n*label path_choice\n\n*if (action > deliberation) and (selfishness >= equity)\n\t*set path_title \"Wolf\"\n\t*set path_description \"You are like [b]Wolf[/b], savage and oft violently individualistic.\"\n\t*goto path_title \n*elseif (deliberation > action) and (equity >= selfishness)\n\t*set path_title \"Bear\"\n\t*set path_description \"Like [b]Bear[/b] you are deliberate, ponderous and unyielding.\"\n\t*goto path_title\n*elseif (action >= deliberation) and (equity > selfishness)\n\t*set path_title \"Hawk\"\n\t*set path_description \"You are closest to [b]Hawk[/b]—focused on equality, justice, and doing the best for the most.\"\n\t*goto path_title\n*elseif (deliberation >= action) and (selfishness > equity)\n\t*set path_title \"Spider\"\n\t*set path_description \"A shrewd thinker concerned with their own impulses; you are most like [b]Spider[/b].\"\n\t*goto path_title\n\n*label path_title\n\nPath: ${path_title}\n*line_break\n${path_description} \n\nGods' Regard: ${pantheon_regard}\n*line_break\n*if pantheon_regard \u003c 5\n\tThe pantheon of gods has a collectively unfavorable view of your actions.\n\t*goto end_of_stats\n*if ((pantheon_regard > 5) and (pantheon_regard \u003c= 9))\n\tCollectively the pantheon of gods has a somewhat positive view of your actions.\n\t*goto end_of_stats\n*if pantheon_regard >= 10\n\tThe pantheon of gods has a collectively positive view of your actions.\n\t*goto end_of_stats\n*if pantheon_regard = 5 \n\tThe pantheon of gods has no particular collective opinion on your actions.\n\t*goto end_of_stats\n\t\n*label end_of_stats", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "consumed_end": "*set you \"Wolf\"\n*set your \"Wolf's\"\n*set wolf_control true\n*if equity >= 60\n\t*set wolf_humanity %+30\n\t*goto further_wolf_vars\n*else\n\t*set wolf_humanity %-15\n\t*goto further_wolf_vars\n*label further_wolf_vars\n*if ((intention = \"revenge\") or (intention = \"control\"))\n\t*set wolf_humanity %-25\n\t*goto further_wolf_vars_2\n*elseif intention = \"peaceful\"\n\t*set wolf_humanity %+20\n\t*goto further_wolf_vars_2\n*else\n\t*goto further_wolf_vars_2\n*label further_wolf_vars_2\n*if ((influence >= 3) and ((action > deliberation) and (equity \u003c selfishness)))\n\t*set wolf_humanity %-30\n\t*goto proper_start\n*elseif ((influence >= 3) and (deliberation > selfishness))\n\t*set wolf_humanity %+30\n\t*goto proper_start\n*else\n\t*set wolf_humanity %-10\n\t*goto proper_start\n\n*label proper_start\n\n${prenom} awakens with a jolt. The room around ${him}, within the depths of Tumelo's meeting house, is largely the same as it was before ${he} collapsed. But ${he} ${him}self\n*if gender = \"none\"\n\tare\n*if gender != \"none\" \n\tis\ndifferent. \n\n*if meeting_lyall\n\tLyall gives ${him} a strange look. \"Are you all right, ${prenom}?\" ${lyall_he} asks. \"Can you stand?\"\n\n\t${prenom} nods, then tests this hypothesis by putting weight on ${his} legs and standing. \"I suppose so.\"\n\n\t\"Good. It was embarrassing to see you sprawled out like you had just had your first sip of beer,\" Lyall says. It might be the closest ${lyall_he} has come to a joke.\n\n\tLyall starts to say something else, but ${lyall_he} stops ${lyall_him}self. $!{lyall_he} narrows ${lyall_his} eyes at you. \"Who are you?\"\n\n\t*if meeting_ara\n\t\t${ara_name} makes an amused noise. \"I was wondering how long it would take you to realize. Faster than expected, wolfling. I am almost impressed.\"\n\t*comment endif\n\n\tNot long after that, Lyall's eyes go wide as the realization comes to ${lyall_him}. $!{lyall_he} goes to one knee immediately. $!{lyall_he} says one word: \"Wolf.\"\n\t*goto words_with_friends\n*elseif meeting_sen\n\tSen gives ${prenom} a concerned look. \n\n\t\"You seemed fine one moment and then the next you collapsed. What—\"\n\n\tOnce ${prenom} gets to ${his} feet and starts to look around, Sen bristles like an animal scenting a predator on the breeze. He does not say whether it is a gesture or something else entirely that gives ${him} away, but it quickly becomes clear to the Rising Sun commander that ${prenom} is no longer what ${he} was. \n\n\tSen's hand goes to his weapon instinctively, smoothly. \n\n\t\"I would not bother,\" ${prenom} says, nodding to Sen's sword. \"If I wanted you dead, I could have done it in an instant.\"\n\n\t*if meeting_ara\n\t\t\"$!{he} is right, little soldier. I doubt you would last more than a few blows with our friend here,\" ${ara_name} adds.\n\t*comment endif\n\n\tSen looks reluctant to relinquish his hold on his weapon. \"You are Wolf now, are you not?\"\n\t*goto words_with_friends\n*elseif ((meeting_ara) and (meeting_lyall = false))\n\t\n\t*goto words_with_friends\n*else\n\t${prenom} looks around. $!{his} eyes are unfocused, wild. It takes some time before ${he} is able to open ${his} mouth and speak, and even then ${he} talks as if addressing some unseen other. \n\t*goto words_with_friends\n\n*label words_with_friends\n\n\"I can still feel ${him} inside me,\"\n*if (((meeting_ara = false) and (meeting_sen = false)) and (meeting_lyall = false))\n\tThe Wolf god—who is slowly inhabiting ${prenom}'s—skin says quietly to ${him}self.\n\t*goto words_with_friends_2\n*else\n\tThe Wolf god—who is slowly inhabiting ${prenom}'s—skin says.\n\t*goto words_with_friends_2\n*label words_with_friends_2\n\"Still struggling to assert ${him}self. It is useless, but I would expect nothing less. Regardless, ${his} body is mine now.\"\n\n*if meeting_ara\n\t\"What will you do with it, Brother Wolf? This brand new form of yours? Rain blood and judgment on your enemies, I assume,\" ${ara_name} says. $!{ara_his} tone is as coy as always, though limned now with uncharacteristic seriousness.\n\n\t\"And you think I would tell you, Spider? No. Better to keep you in suspense, I think,\" Wolf answers. \n\n\t${ara_name} grins and gives a deep, wholly insincere bow. \"As you will, fiercest of the gods.\"\n*comment endif\n\n*if meeting_lyall\n\tLyall shifts uncomfortably. Clearly there is no protocol among Wolf worshipers about meeting your god in the flesh.\n\t*if lyall_romance != \"none\"\n\t\t*set lyall_romance \"none\"\n\t\tIt takes some time, but eventually ${lyall_he} works up the courage to address Wolf. \"Great Wolf. Is…does ${prenom} hear us? $!{he} fought fiercely, I would have ${him} know the worth of such things. Even in death.\"\n\n\t\tWolf turns to look at Lyall.\n\n\t\t\"$!{he} knows your feelings, Lyall. If it helps you to know,\" Wolf says, then ${his} face hardens marginally. \"But you are my subject first. It will not be between us as it was.\"\n\n\t\tLyall, hardened to a fault, does not express the emotion that is plain on ${lyall_his} face. Instead, ${lyall_he} nods stiffly.\n\t*comment endif\n\n\tLyall clears ${lyall_his} throat, and says, \"Whatever you plan to do next, there are those who are still loyal to you. We walk with you until the last.\"\n\t*goto post_script\n*elseif\tmeeting_sen\n\t\"Commander Sen,\" Wolf says suddenly. \n\n\t\"Yes,\" Sen answers. His voice is calm, but anyone with ears could hear the steel underneath. \n\n\t\"Go and tell your brethren in the Rising Sun \n\t*if riser_affinity >= 50\n\t\tthat they have nothing to fear from me as long as they do not seek me out. You came in ${prenom}'s moment of need and helped to fight. You have earned the protection of your people,\" Wolf explains, then drops ${his} voice. \"But I do not forget that you and yours are dangerous. So I will not have you by my side. I am a god now. Your sworn enemy. This alliance will not benefit either of us.\"\n\t*if riser_affinity \u003c 50\n\t\tthat Wolf is coming for them. They can prepare themselves—sharpen their blades and bolster their ranks—but I am coming, and nothing will stop me.\" \n\t*comment endif\n\n\tSen listens to this with his hand still on his blade, clearly considering Wolf's words carefully. His fingers loosen on the grip of his blade by degrees. He leaves the meeting house without another word. \n\t*goto post_script\n*else\n\t\"I am Wolf,\" \n\t*if gender != \"none\"\n\t\t${he} says\n\t*if gender = \"none\"\n\t\t${he} say\n\tto ${him}self. \"I am Wolf.\"\n\t*goto post_script\n\n*label post_script \n\nEventually Wolf's posture straightens and \n*if gender != \"none\"\n\t${he} begins\n*if gender = \"none\"\n\t${he} begin\nto seem more comfortable in ${his} new form. \n\n\"I think I can get used to this,\" \n*if gender = \"none\"\n\t${he} say, and make ${his} way\n*if gender != \"none\"\n\t${he} says, and makes ${his} way\nout of Tumelo's meeting house and into the bright sunshine of Siltstone. \n\nWhen \n*if gender != \"none\"\n\t${he} first feels\n*if gender = \"none\"\n\t${he} first feel\nthe heat on ${his} skin, ${he} cannot help but smile, like a child first experiencing the world. \"Oh yes, I think I am going to like this body a great deal.\"\n\n*page_break\nLater…\n*comment Here the narrative splits according to who Wolf's largest remaining \"threat\" is.\n\nWolf takes the first steps into the town and no one takes particular notice, despite the fact that it is a small town that harbors the usual suspicion of travelers and strangers. $!{his} hair has grown out somewhat and the skin around ${his} eyes is drawn tight, otherwise, \n*if gender != \"none\"\n\t${he} is\n*if gender = \"none\"\n\t${he} are\nno more worse for the wear of the past few weeks traveling in this new body.\n\n*if gender != \"none\"\n\t$!{he} looks around, and subtly sniffs\n*if gender = \"none\"\n\t$!{he} look around, and subtly sniff\nthe area to track ${his} quarry. \n*if gender != \"none\"\n\t$!{he} finds who ${he} is\n*if gender = \"none\"\n\t$!{he} find who ${he} are\nlooking for in a quiet corner of town, sitting under a shady tree. \n\n*if ((hawk_dies = false) and (bear_dies = false))\n\tThe man and woman look up as ${he} approaches. \n\t*if three_god_powerup\n\t\tThey look more tired and frail, but that is to be expected since more than half of their power sits in ${his} belly.\n\t*comment endif\n\n\t\"So, it comes to this,\" the man says. He is tall and thin. His braided hair is shot through with gray and decorated with five white feathers and one red. \"You are reborn, Wolf. How does it feel?\"\n\n\tThe woman, densely muscled with a scarred face, whittles a piece of wood with a long, dangerous looking knife; she does not look up from her work. \n\n\t\"For a long time in the darkness, howling in anger, being invisible: I wanted you both dead, siblings. I could almost taste your blood in my mouth, even though I had no body with which to seek vengeance. Now, I have the perfect weapon. Did you think that new forms would throw me off your scents? You have grown pitiful in your attempts at evasion, and I have everything I need to destroy you.\"\n\n\tHawk's new male-bodied avatar tenses. Bear's female avatar attempts to project calm, but her grip tightens around her knife. \n\n\t*if wolf_humanity >= 60\n\t\t\"But I have found that killing you is not my chief concern,\" Wolf says. \n\n\t\t\"What?\" Hawk's avatar says. The incredulous look on his face suggests the goddess who directs him is far from prepared to accept Wolf's change of heart. \"You think we will believe that you, Wolf—the devourer—intend to let us leave here alive. Without retribution.\"\n\n\t\tThe way he says the word \"retribution\" hangs in the air. But Wolf, for ${his} part just shakes ${his} head.\n\n\t\t\"Believe whatever you want, Hawk. I have ever been a creature of forward motion. This is consistent with who I have always been. I could kill you both and chew your bones until not even the salt remains, or we can leave the blood spilled behind us.\" Wolf bares ${his} white teeth at that. \"Would you prefer that?\"\n\n\t\tHawk's avatar steps back and the Bear avatar stands. The self-possessed woman, with all the patience of Bear, puts a hand on her ally's shoulder and addresses Wolf. \n\n\t\t\"No. We will accept the peaceful resolution you offer, Wolf. The uncertainty of these times have changed us all. I have no doubt that even your wild heart can change.\"\n\n\t\t\"Well,\" Wolf says, cracking ${his} knuckles. \"I never said I had changed completely.\"\n\n\t\tThe punch that Wolf throws in Bear avatar's direction is unexpected and lightning quick. It packs enough force to lay the large woman out flat on her back. \n\n\t\tHawk goes to Bear's side, fire in his eyes, but Bear lifts a hand. \"I think I deserved that much at least.\"\n\n\t\t\"That and more,\" Wolf growls, but relaxes ${his} fists. \"But I have other matters yet to attend. Goodbye, Siblings. Until next time.\"\n\n\t\t*goto post_script_2\n\t*else\n\t\tThe Bear avatar never gets a chance to use it. By the time she realizes that the attack is coming, Wolf has already driven ${his} elbow into Bear's nose and crushed it to a pulp. The knife slips out of her hand and Wolf is already moving on Hawk. \n\n\t\tThe goddess's avatar pulls the ever-present sword from the air at his side. He proves himself more than capable with the blade, cutting a bloody ribbon into Wolf's side before ${he} wrests the blade away.\n\n\t\t\"You will never–\"\n\n\t\tWolf does not hear the end of Hawk's statement, because ${he} forcefully ends her avatar's life. \n\n\t\tBear however is still in control of his. The woman leaps in Wolf's direction and attempts to use her bulk to pin him, but Wolf incites the air around Bear to chaos, and suddenly tumultuous gusts of wind rock her and throw her off course. She crashes to the ground and Wolf jumps on top of her.\n\n\t\t\"Do it,\" Bear's avatar spits. \n\n\t\tWolf does. \n\t\t\n\t\t*goto post_script_2\n*elseif (((hawk_dies = false) and (bear_dies = true)) or ((bear_dies = false) and (hawk_dies = true)))\n\t*comment Either Bear or Hawk dies, but one remains. I used the god_ally variable b/c that's the only case in which\n\t*comment one of those two gods would be dead and not both. \n\n\t${god_ally} is waiting for ${him}. $!{god_his} new avatar is significantly younger than ${god_his} earlier form, but the avatar's eyes are old and keen. $!{god_he} looks up as Wolf approaches and puts down the long bone needles ${god_he} has been using to knit. \n\n\t\"I have been trying to learn more mortal tasks. Mundane things. It helps me to feel closer to them,\" ${god_ally} says, then adds pointedly, \"our charges.\"\n\n\t\"You told me you would stay away from this world,\" Wolf says. \n\n\t\"No. I made that deal with ${prenom}. I have yet to decide exactly what to do with you, Brother. Sacrifices were made to see this thing through. I want to ensure they were not made in vain,\" ${god_ally} replies.\n\n\t*if wolf_humanity >= 60\n\t\t\"It would be satisfying to tear you limb from limb and leave what remains for the crows. However, swallowing ${prenom} has given me some perspective. It may not be in my best interest to destroy you,\" Wolf explains. \n\n\t\t${god_ally} looks at Wolf as if ${he} has just told ${god_him} that the sun rises at midnight.\n\n\t\t\"You and your traitorous sibling brought me low, but vengeance will not fill my belly. So as long as you stay out of my way, I have no reason to retaliate,\" Wolf continues. \n\n\t\t\"I had reservations that ${prenom} could change your mind on anything of substance, but it seems I was wrong,\" ${god_ally} says. \n\n\t\t\"Give me some credit,\n\t\t*if god_ally = \"Hawk\"\n\t\t\tSister.\n\t\t*if god_ally = \"Bear\"\n\t\t\tBrother.\n\t\tI am not the bloodthirsty monster you would paint me as. Well, not always.\"\n\n\t\t${god_ally} scoffs. \"I see. So what will you do now, Wolf, the Kind Hearted?\"\n\n\t\tWolf raises a finger in warning. \"Do not push me. This is still a tentative peace between us.\"\n\n\t\t${god_ally} assents to that with a nod of ${god_his} head. \n\n\t\tWith the threat of violence passed, there is nothing left to say between the two gods. Wolf gives a begrudging nod to ${god_ally} and leaves. \n\n\t\t*goto post_script_2\n\t*else\n\t\tWolf snarls at ${god_ally}. \"You should have stayed in your hiding hole. I might not have hunted you if I could not smell your stink in this world.\"\n\n\t\t${god_ally} stands. $!{god_he} squares ${god_his} shoulders and stares Wolf down. $!{god_his} incredibly young face feels discordant with ${god_his} martial stance. \n\t\t*if god_ally = \"Hawk\"\n\t\t\t$!{god_he} flicks ${god_his} wrist and ${god_his} feather-hilted sword appears in ${god_his} hand.\n\t\t*comment endif\n\n\t\t\"Shall we, Brother Wolf?\" ${god_he} asks. \n\n\t\tThe gods circle each other for a few moments, then Wolf attacks. The two clash again and again, seemingly evenly matched for a time, but ultimately Wolf takes a superior position and forces ${god_ally} into defending ${god_him}self. \n\n\t\t${god_ally} slips, a tiny mistake, and Wolf\n\t\t*if god_ally = \"Hawk\"\n\t\t\tknocks ${god_his} sword away. \n\t\t*if god_ally = \"Bear\"\n\t\t\tknocks ${god_him} off his feet.\n\t\t*comment endif\n\n\t\t${god_ally} gives Wolf a glare. \"Do not waste either of our time, Wolf.\"\n\n\t\tWolf gives ${god_him} a stiff nod, a recognition of a battle well fought, and brings ${his} heel down hard on ${god_ally}'s throat. \n\n\t\t*goto post_script_2\n*else\n\t*comment Both Hawk and Bear are dead.\n\t*set ara_threat true\n\t*if ara_dies\n\t\t*set ara_name \"Aranea\"\n\t\t*if ara_gender = \"man\"\n\t\t\t*set ara_he \"she\"\n\t\t\t*set ara_his \"her\"\n\t\t\t*set ara_him \"her\"\n\t\t\t*set ara_gender \"woman\"\n\t\tSpider's new avatar wears a crimson gown that is completely impractical in the dusty streets of this farming town, but whether or not the woman is even visible to the people who live there is not immediately clear.\n\n\t\t\"I know we have had our differences, ${prenom}, but do you mind not killing me before we have a chance to talk? I am running out of attractive avatars to inhabit. This one's name is ${ara_name}. I had her raised primarily for beauty and grace, but she can kill you violently at least a few dozen ways. So shall we try to keep this civil?\"\n\n\t\t*label continuing_spider_convo\n\n\t\t*if meeting_ara = false\n\t\t\t\"I am not ${prenom} any longer,\" Wolf explains.\n\n\t\t\t${ara_name} raises a manicured eyebrow. \"I see. So ${prenom} lost then. Pity, I liked ${him} more than I like you.\"\n\n\t\t\t\"Your preference is noted, Sister.\"\n\t\t\t*goto ara_convo_cont\n\t\t*else\n\t\t\t\"So, Wolf, you have had some time to yourself. Time to experience the world and come to your own conclusions. So what shall it be? Fisticuffs or words?\"\n\n\t\t\t\"I think you know very well why I am here,\" Wolf says. \n\t\t\t*goto ara_convo_cont\n\n\t\t*label ara_convo_cont\n\n\t\tSpider's avatar rolls ${ara_his} eyes toward the clear blue sky then downward again. \"Hawk and Bear have been dealt with and I am now your most immediate concern: Gazelle is too wrapped up in her prophecies to act against you, and Eel is busy being mysterious, or whatever he does with his time. I am your biggest living competitor, for now anyway. \n\n\t\t\"So I suppose that makes this the part where I tell you that I am going to fall in line. But you would hardly believe that, would you?\"\n\n\t\t*if wolf_humanity >= 60\n\t\t\t\"I do not have to kill you. If you can be trusted, this once, to be less than completely treacherous,\" Wolf says.\n\n\t\t\t${ara_name} looks surprised, briefly. $!{ara_his} naturally bemused expression returns before long.\n\n\t\t\t\"And what assurances do I have that you will not renege? I think you and I are beyond blind trust,\" ${ara_name} replies.\n\t\t*if wolf_humanity \u003c 65\n\t\t\t\"No. Likely not.\"\n\t\t*comment endif\n\n\t\t${ara_name}'s laugh is light and whimsical. $!{ara_he} stands. \n\n\t\t\"I was on the fence when Hawk and Bear sketched their plan. I did not believe that any one of us could be so dangerous as to warrant what they did to you, but I am no longer sure. Now that they have failed, and you have swallowed up your avatar, I do not know what remains to keep you in check. As loath as I am to dirty my hands, I suppose it must be me.\"\n\n\t\t*if ara_affinity >= 75\n\t\t\t\"I think that ${prenom} deserves that much from our alliance, unconventional though it was,\" ${ara_name} adds.\n\t\t*comment endif\n\n\t\t${ara_name} moves to leave and Wolf goes to stop ${ara_him}, but the Spider avatar just smiles beatifically and points. Wolf's gaze follows and \n\t\t*if gender != \"none\"\n\t\t\t${he} sees\n\t\t*if gender = \"none\"\n\t\t\t${he} see\n\t\tdozens of people armed with farming implements and other makeshift weapons pouring out of their houses and advancing. \n\n\t\t\"I will see you later, I am sure,\" ${ara_name} says, as ${ara_he} walks into the ever-growing crowd. \n\n\t\tWolf edges backward, gauging the mob and wondering if ${he} should fight or flee. $!{he} \n\t\t*if gender != \"none\"\n\t\t\tcracks ${his} knuckles and makes\n\t\t*if gender = \"none\"\n\t\t\tcrack ${his} knuckles and make\n\t\t${his} choice.\n\t\t*goto post_script_2\n\t*else\n\t\t${ara_name} looks as radiant as ever. $!{ara_he} is sitting on the ground with ${ara_his} back against the tall wooden fence surrounding the perimeter of the town. $!{ara_he} is cutting into an apple with a knife just a hair longer than ${ara_his} thumb. \n\n\t\t\"Welcome to—well, whatever the hell this town is called,\" ${ara_name} says. \n\t\t*goto continuing_spider_convo\n\n*label post_script_2\n*page_break \n*if riser_affinity \u003c 50\n\t*gosub hunting_risers\n\n*if van_return\n\t*gosub romancing_ghazal\n\nThere are tales of where Wolf went and what ${he} did in the months and years after inhabiting ${prenom}'s form, but the best indication is in the \n*if wolf_humanity >= 60\n\tsurprising lack of violence and death ${he} left in ${his} wake. \n*if wolf_humanity \u003c 60\n\tbroken bodies of ${his} enemies left scattered in ${his} wake.\n*comment endif\n\nWolf's legend continues to grow, even if \n*if gender != \"none\"\n\t${he} is\n*if gender = \"none\"\n\t${he} are\nspoken of in whispers by enemies and allies alike. \n\n*gosub final_ending\n\n*comment THE SUBROUTINES that tie up individual parts of the narrative.\n\n*label final_ending\n*page_break \n*text_image epilogue.png center Epilogue: Tide and Shore\n*if ((pacifism) and (pacifism_broken = false))\n\t*check_achievements\n\t*if not(choice_achieved_pacifist)\n\t\t*achieve pacifist\n\n[i]After the Wolf had brought the girl across the river safely, she bowed and thanked him. The Wolf accepted her reverence as fair payment, but could not help his curiosity. He asked, \"Why did you show no fear, girl-child? Have you not heard tales of the terrible, hungry Wolf?\"[/i]\n\n[i]The girl smiled meekly, and said, \"All the clans know that there are worse things than wolves. Especially in the dark of the water.\"[/i]\n*line_break\n-The ending to an old Clearwater fable.\n\n*page_break\n\nAt the far edge of the world where the dark sea crashes against the shore, two children sit in the surf with the roiling water swirling around their toes. One of the children is small, his wet and incandescent hair is plastered across his face and his skin is black as oil and smooth. The other child seems older and self-assured, her brown hair is cropped short and her long legs reach further than her friend's into the chaotic waters. \n\n\"The world did not end, Gazelle,\" says the short boy. He turns his gaze, as sly as any god, on his friend. \"Your foresight is flawed.\"\n\nGazelle shrugs her slender shoulders.\n\n\"You are right, Eel,\" she says.\n\nShe continues watching the water come and go. Eel crosses his arms.\n\n\"Nothing else to say for yourself? Your prophecies came to nothing. You said that if Wolf died then the world would follow. But Wolf died\n*if wolf_dead\n\tand we are still here.\"\n\t*goto final_ending_2\n*else\n\tand returned, and we are still here.\"\n\t*goto final_ending_2\n\n*label final_ending_2\n\nGazelle digs her toes into the sand and waits for the oncoming rush of water to fill the trench that her toes have made. The water comes and goes, and the sand is made smooth again before long. \n\n\"We can die, Brother. We have only known fear for the well-being of our charges, but now there are those of us who fear an eternal quietude. Things will change now. The tide creeps up the shore.\"\n\nThe two gods are quiet for a while. \n\n\"And that means the end of the world?\" Eel asks.\n\n\"No. Not necessarily, but…\" Gazelle says, gaze drifting along the horizon.\n\n\"But?\"\n\n\"The weather is turning, Brother. We should go. Find shelter.\"\n\nEel sees it too. There are dark clouds gathering, and occasional lightning. The thunder announces itself soon after. Even as far away as the beach, the wind begins to pick up. \n\n\"Yes,\" Eel says. \"I think you are right. It is time to go.\"\n\n*goto_scene ending \n\n*label hunting_risers\n*if pacifism\n\t*set pacifism_broken true\nTwo men and three women wearing the sunburst standard on their beaten leathers stand around a half-guttered flame and attempt to warm their hands. Theirs is a fairly remote appointment, proof that the Rising Sun is working hard to extend its foothold into untamed lands.\n\n\"I would give my right arm for something other than these terrible preserves,\" one of the men complain. \n\n\"That would be cheap compared to what it took to secure that terrible food you are eating. If it offends you, it might be good to give it to someone else,\" a woman responds, and puts out her hand in jest. \n\nThe group laughs. It is the kind of laugh that expresses something besides humor, a necessary exhalation of discomfort and doubt. They have all heard the stories of entire Rising Sun outposts disappearing in the night.\n\nOne of the women says something crude and there is more laughter, but the laughing is cut short. Someone thinks they hear something. Howling. \n\n*if wolf_control\n\tWolf does not waste time. \n\t*if gender != \"none\"\n\t\t$!{he} is \n\t*if gender = \"none\"\n\t\t$!{he} are\n\tamong them before the first cry of alarm. $!{his} hands are a dervish and ${his} eyes seem rimmed with blood.\n\t*goto hunting_risers_2\n*else\n\tYou are among them before the first cry of alarm.\n\t*if ritual > combat\n\t\tThe ground quakes and the Risers are unable to find their feet. You slide through their ranks like water while they founder.\n\t\t*goto hunting_risers_2\n\t*else\n\t\tYou rush into their midst and proceed to cause as much havoc as you physically can. \n\t\t*goto hunting_risers_2\n\n*label hunting_risers_2\nOne of the men goes down and the woman closest to him tries to help, and loses a limb for her efforts. There are screams and shouts, but not for long.\n\n*if enclave_purpose = \"fight\"\n\tSuba walks up from the bank of a nearby creek and stretches her lean body. \"I caught two down by the water. I thought they would be more interesting, but they died disappointingly quickly.\"\n\n\t*if meeting_lyall\n\t\tLyall and Fillin eventually come into view from far down a makeshift road. They are carrying supplies that are no doubt pilfered from Rising Sun soldiers. The blood splattered on their clothes says as much. \n\n\t\tFillin gestures to the packs they are hauling and shouts, \"a worthwhile endeavor!\"\n\n\t\tLyall reminds Fillin to speak with some deference, but the thrill of the fight makes it hard even for Lyall to keep a grin from cracking at the corner of ${lyall_his} mouth.\n\t*comment endif\n\n\t*if wolf_control\n\t\tWolf takes stock of the body count and nods. \n\n\t\t\"We have dealt them a blow, but we cannot stop now. Not until the Sun worshipers are broken and cowed,\" ${he} says. \n\n\t\t\"We identified another outpost to the south. Close enough that you smell their stink on the breeze,\" Suba says. \n\n\t\tWolf grunts assent. \n\n\t\t\"Why wait? We leave immediately,\" Wolf says. \n\n\t\tThe order filters through the group, and they begin to make their winding way south.\n\t\t*page_break\n\t\t*return\n\t*else\n\t\tAs the last of the bodies fall, Hemming seeks you out. He looks older than he did the last time you saw him, and you wonder briefly if killing is truly in his nature. Perhaps he fell under the sway of the wrong god all those years ago. \n\n\t\t\"There is another outpost out west. It is close enough that we could be there within a day or two.\" He pauses. \"Unless there is something else you think we could be doing…\"\n\n\t\tYou give him a look and put a hand on his shoulder. \n\n\t\t\"What we are doing is worthwhile,\" you explain. \n\n\t\t\"Ah. I have no doubt. We are watering the world in blood and something has to grow in it, right?\" Hemming says ruefully, then walks away. \n\n\t\tYou turn to the west and to work still ahead of you. \n\t\t*page_break\n\t\t*return\n*elseif ((meeting_lyall) and (enclave_purpose != \"fight\"))\n\tLyall comes in fast and hard beside\n\t*if wolf_control\n\t\tWolf.\n\t*if not(wolf_control)\n\t\tyou. \n\t$!{lyall_he} is all fists, and claws, and teeth. $!{lyall_he} fights as viciously as any beast of the wilds. \n\n\tBefore long, the main force of the soldiers are quieted and Lyall hunts the few who escape, trying to flee into the riverbank. When ${lyall_he} returns, it is clear from ${lyall_his} hands that ${lyall_he} has washed some blood from them into the river, but not all. \n\n\t\"There is another outpost. It is not far,\" Lyall suggests. $!{lyall_he} points west. It has been this way for weeks. Hunting for retribution, for catharsis.\n\n\t*if wolf_control \n\t\t\"Then lead the way,\" Wolf says. \n\n\t\tLyall produces a smile, or some approximation of one, and sets off to the west with Wolf walking at ${lyall_his} side.\n\t*if not(wolf_control)\n\t\tYou turn in the direction that Lyall indicates. You have lost count of the lives you have taken, and though you have inflicted great harm to the Rising Sun, it is far from defeated. \n\n\t\tMore bloodshed, then. \n\n\t\t\"Let us see what the next group is made of,\" you say. \n\n\t\tYou and Lyall collect supplies from the dead Risers before continuing on: It is unlikely they will need them any time soon. \n\n\t*page_break\n\t*return\n*else\n\tIt is exhausting work, but not so exhausting that purpose is lost to bloodthirstiness. \n\n\t*if wolf_control\n\t\tWolf is reckless and joyous, moving through the soldiers like a force of nature.\n\n\t\tWhen they are all dead, Wolf scratches ${his} head. \"Disappointing. I expected more of a challenge this time.\"\n\n\t\t*if gender != \"none\"\n\t\t\t$!{he} collects whatever supplies ${he} needs\n\t\t*if gender = \"none\"\n\t\t\t$!{he} collect whatever supplies ${he} need\n\t\tbefore continuing on. There is another outpost only just a few days away. $!{he} can take their supplies if ${he} needs to. They will not need them once they are dead. \n\t\t*page_break\n\t\t*return\n\t*else\n\t\tYou are methodical and careful, knowing that despite your prowess, a group of skilled fighters could take you down. You do not give them the chance.\n\n\t\tWhen the soldiers are all still, you go through their supplies and take only what you need to sustain you until you reach the next outpost. You have no doubt you will be able to find more supplies when you take them unawares and kill them. \n\n\t\tYou know there has to be an end to the killing, but you cannot see it from where you are standing, looking out west at the direction you need to travel. \n\n\t\t\"Eventually,\" you say to yourself, and then beginning walking.\n\t\t\n\t\t*page_break\n\t\t*return\n\t\t\n*label romancing_ghazal\nIt is much later when ${you} arrive at Mara's Caravan.\n\n*if riser_affinity \u003c= 50\n\t*comment acknowledges if you/Wolf have gone on a murderous rampage\n\t${you} tried to wash the dried blood of Rising Sun soldiers from beneath ${your} fingernails, even knowing such efforts will not likely disguise the truth from a seer equipped with Gazelle's far sight. \n\n\tSure enough, Ghazal holds ${ghazal_him}self back, regards ${you} from a distance.\n\n\t\"You are bloodier than when you left us,\" ${ghazal_he} says.\n\n\t\"Sometimes blood needs to be spilled,\" ${you} reply. \n\n\t\"Does it?\" Ghazal replies. $!{ghazal_he} seems to think differently, but lets the subject drop.\n\n\tGhazal steps aside and allows ${you} into ${ghazal_his} tent. \n\t*goto ghazal_romance\n*else\n\t*goto ghazal_romance \n\n*label ghazal_romance \n\nOver the next few days, Ghazal and the people of Mara's 'Van begin to show ${you} a life beyond warfare: the most skilled cooks of the caravan patiently go over how to pack and roast oats into a misshapen, but delicious cake.\n*if wolf_control = false\n\tYou passively learn\n*if wolf_control\n\tWolf passively learns\nthe games and rhymes of the children by watching them run around the grounds of the caravan, and\n*if wolf_control\n\t*if gender = \"none\"\n\t\t${he} teach\n\t*if gender != \"none\"\n\t\t${he} teaches\n*if wolf_control = false\n\tYou teach\n*if ritual > survival\n\tthe elders a set of rituals that might help calm the vicious storms that sometimes tear through the area late in the autumn.\n\t*goto ghazal_romance_2\n*else\n\tthe foragers of the caravan about fruits and vegetables that grow far from the steppes, but can be safely traded for with outsiders.\n\t*goto ghazal_romance_2\n\n*label ghazal_romance_2\n\nOne day Ghazal takes ${you} aside, and says, \"This could be your life. It is simple and slow, and yes, you know that it is sometimes violent, but your hands\n*if ((pacifism) and (pacifism_broken = false))\n\tcan stay clean.\"\n\t*goto ghazal_romance_3\n*else\n\tcan be cleaner than they are.\"\n\t*goto ghazal_romance_3\t\n\n*label ghazal_romance_3\n\n*if wolf_control = false\n\tYou could stay in Mara's Caravan and live alongside the seer and ${ghazal_his} people. Or does the world beyond the steppe still call to you?\n\n\t*choice\n\t\t#\"Yes, I will stay.\"\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_settlingdown)\n\t\t\t\t*achieve settlingdown\n\t\t\tYou can scarcely imagine a life among these nomadic people, but that is a part of the excitement of it. \n\n\t\t\t\"Yes,\" you tell Ghazal. \"I will stay.\"\n\n\t\t\tYou barely know what that means at the time, but the in next few weeks, months, and years, you learn. The elders teach you their songs, which greet the sun\n\t\t\t*if tribe = \"Highwalk\"\n\t\t\t\twhich you nearly remember from your youth.\n\t\t\t*if tribe != \"Highwalk\"\n\t\t\t\twhich begin as harsh and strange to you and sound clumsy on your tongue, but become a part of the tapestry your ears expect upon waking.\n\t\t\t*comment endif\n\n\t\t\tYou are eventually asked to become the second of the primary surveyor. Rasul takes you under his wing and teaches you how to direct the Caravan in ways direct and indirect. By the time he becomes sick and can no longer lead, Rasul is more than confident that you will take care of the Mara's Caravan, its people, and its seer. \n\n\t\t\tEvery once in a while you leave the Caravan to trade, or hunt, or simply to enjoy the vastness of the steppe and you encounter a gazelle incongruous to the rest of the landscape, standing in the tall grass. The animal never approaches and neither do you. It just watches, but for some reason that puts you a little more at peace.\n\n\t\t\t*if (((selfishness >= 50) and (ara_affinity >= 70)) and (ara_dies = false))\n\t\t\t\t*page_break\n\t\t\t\tOne day, late in summer, you are returning from a successful negotiation with another Highwalk caravan. A potential conflict averted, you feel proud of your accomplishment. \n\n\t\t\t\t\"${prenom}!\" someone calls from a distance. \n\n\t\t\t\tYou turn to see an unfamiliar face. It is not until ${ara_he} walks closer, just a few paces away from you, that you recognize the compound irises which disappear almost as soon as you notice them. \n\n\t\t\t\t\"${ara_name}.\"\n\n\t\t\t\t$!{ara_he} bows. \"In the flesh.\"\n\n\t\t\t\tSpider has enlisted a new avatar it seems. $!{ara_he} looks similar to last: sly smile, slender frame. But this avatar has shorter hair, a blunt cut that emphasizes the amber-colored eyes underneath. \n\n\t\t\t\t\"I never took you for the pastoral type, ${prenom}. This is not where I thought you would land.\"\n\n\t\t\t\t\"Oh? And where did you think I would end up?\" you ask. \n\n\t\t\t\t\"At my side.\" ${ara_name} says frankly. \"And it is not too late. Any idiot can breed chicken, but you are different. Exceptional. You know that your destiny is bigger than this place, ${prenom}. Why waste it? Come with me. Be with me. If nothing else, it will be an adventure.\"\n\n\t\t\t\tYou look over your shoulder and you can see the cook fires of Mara's 'Van burning. You can almost smell them. But ${ara_name} is standing in front of you, all casual sensuality and danger. Can you really turn ${ara_him} down?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Yes. I have a responsibility to the caravan.\n\t\t\t\t\t\t*label ara_rejection\n\t\t\t\t\t\t${ara_name} gives you a pitying look. \n\n\t\t\t\t\t\t\"You are free of Wolf's influence, I should have expected you to think like a mortal. But you are more than your flesh, ${prenom}, and small dreams will no longer suit you. When you tire of this life, seek me out. And we shall find a suitable game for you to play.\"\n\n\t\t\t\t\t\t${ara_name} bows to you. It is not the mocking salute that ${ara_he} did when you first met in Ishko. $!{ara_he} stays bent for long enough that when ${ara_he} rises again, you have no doubt that the gesture was genuine. \n\n\t\t\t\t\t\t\"Safe travels,\" you tell ${ara_him}. \n\n\t\t\t\t\t\t\"Safe?\" ${ara_name} shakes ${ara_his} head. \"I hope not.\"\n\n\t\t\t\t\t\t$!{ara_he} leaves and you watch ${ara_him} until ${ara_he} goes so far along the grassy steppe that even your preternaturally gifted eyes cannot track. Then you turn and walk back toward the caravan. \n\n\t\t\t\t\t\t*goto post_ghazal_romance\n\t\t\t\t\t#No. I never belonged here to begin with, I will not delude myself any longer. I will go with ${ara_name}.\n\t\t\t\t\t\t*check_achievements\n\t\t\t\t\t\t*if not(choice_achieved_spidersteal)\n\t\t\t\t\t\t\t*achieve spidersteal\n\t\t\t\t\t\t${ara_name} smiles and holds out a piece of canvas wrapped tightly around a long object. You have to come close to take it from ${ara_him} and when you do you smell the scent of ${ara_him}—like nearly over ripened fruit and cinnamon. $!{ara_he} takes your face in ${ara_his} hand and kisses you. The kiss is brief, but fierce. \n\n\t\t\t\t\t\tAfterward, ${ara_he} lets you take the canvas. You unfurl it and inside is a long tooth.\n\n\t\t\t\t\t\t\"One of my worshipers found that in Quiet lands. I have never seen its like, so I am mightily curious.\" \n\n\t\t\t\t\t\t\"So you want me to help you hunt some unknown beast?\" you ask. \n\n\t\t\t\t\t\t\"I thought it was time you slaughtered something larger than a duck,\" ${ara_name} taunts. \n\n\t\t\t\t\t\t*if ((pacifism) and (pacifism_broken = false))\n\t\t\t\t\t\t\t\"I have tried very hard not to kill, ${ara_name},\" you reply. \n\n\t\t\t\t\t\t\t\"Well, there is always time to learn new skills.\"\n\t\t\t\t\t\t*comment endif \n\n\t\t\t\t\t\t${ara_name} leads the way while whistling a strange, haunting tune. You wonder if ${ara_he} has secured supplies, or has any idea of how treacherous the journey from the highlands to the marshes of the Quiet can be. But you do not consider these things for long. After all, did ${ara_he} not say it would be an adventure? \n\n\t\t\t\t\t\t*goto post_ghazal_romance\n\t\t\t\t\t#Maybe someday, but not today.\n\t\t\t\t\t\t*goto ara_rejection\n\t\t\t*goto post_ghazal_romance\n\t\t#\"No. I cannot settle with the Caravan. I do not think my story ends here.\"\n\t\t\t*goto no_ghazal_romance\n\t\t#\"Give me time to consider the offer.\"\n\t\t\t*label no_ghazal_romance\n\t\t\t\"I understand,\" Ghazal says. \"Will you at least stay until the celebration of the First Frost? We could use your help.\"\n\n\t\t\tYou agree to help out until at least that long. It is not that you belong to Mara's Caravan and its people, but with the matter of Wolf resolved, there is more room in your life for improvisation.\n\n\t\t\t*goto ghazal_romance_opt_out\n*else\n\tWolf regards Ghazal for a long moment before ${he} \n\t*if gender = \"none\"\n\t\tshake ${his} head.\n\t*if gender != \"none\"\n\t\tshakes ${his} head.\n\n\t\"I am not meant for this life. Not forever. Surely you can see that.\"\n\n\t\"I have seen a great many things and I know that the ${prenom} who left this Caravan months ago is not the same ${prenom} who returned to it. I have been in the presence of the divine long enough to recognize the signs.\" Ghazal pulls ${ghazal_his} robe closer. Perhaps it is the chill in the air. Perhaps it is Wolf that makes ${ghazal_him} want to instinctively protect ${ghazal_him}self. \"I also know there is not one path open to you. One day you may return to us. In one form or another.\"\n\n\tWolf arches an eyebrow. \"And you would wait for me to return? On some slim chance? Some half-foretold thing?\"\n\n\t\"You are beginning to sound like one of the supplicants who journey far and wide to hear my oracles, just to greet them with doubt and suspicion. There is a chance you will return: in this life, or another. Believe, or doubt, either way we will see,\" Ghazal says with more steel in ${ghazal_his} voice than expected. \n\n\tWolf says nothing, only inclines ${his} head in deference. \n\n\t*label ghazal_romance_opt_out\n\tOver the next weeks,\n\t*if wolf_control\n\t\tWolf helps\n\t*if wolf_control = false\n\t\tyou help\n\tto prepare the Caravan for the cold weather that will soon come. The members of the caravan show their gratitude in an elaborate feast they throw on the eve of ${your} leaving. Ten of the large flightless birds that stalk the steppe are hunted and roasted, preserved fruits are stuffed with fiery peppers, and the alcoholic fermented milk from the heaving animals that the caravaners raise is passed around in hide-bound gourds. \n\n\t*if wolf_control\n\t\tWolf is\n\t*if wolf_control = false\n\t\tYou are\n\tpresented with a ceremonial bow that is lovingly, painstakingly engraved with a hundred years of Caravan lore. \n\n\tIt is a joyous occasion though farewells are exchanged. Afterward\n\t*if wolf_control\n\t\tWolf leaves\n\t*if wolf_control = false\n\t\tYou leave\n\tthe steppe and move on to another place, another adventure. \n\t*goto post_ghazal_romance\n\n*label post_ghazal_romance\n*return\n", "death": "The Faith teaches that death is the length of a winter's sleep. You may have passed beyond the gauze that separates life from after-life, but there is much still to do. Will you return to the world and finish your journey? Or maybe sleep a bit longer?\n\nIt is up to you, ${prenom}. But remember that Wolf awaits at the end of the world, always howling.\n\n*goto_scene ending\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Avatar of the Wolf.[/i]\n \n*feedback\n \nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n \nThanks for playing!\n \n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set prenom \"Ōkami\"\n*set gender \"female\"\n*set wolf_moon \"hunting\"\n*set chara_generation_done true\n*set wolf_moon_selected true\n*set name_set true\n*set tribe \"Clearwater\"\n*set combat 20\n*set survival 10\n*set quickthinking 15\n*set ritual 5\n*set sensitivity 10\n*set influence 2\n*set restraint 35\n*set pantheon_regard 8\n\n*set action 55\n*set deliberation 45\n*set selfishness 75\n*set equity 25\n\n*set riser_affinity 40\n*set eel_affinity 75\n*set hawk_affinity 55\n*set ara_affinity 45\n*set bear_affinity 65\n\nThe soupy heat abates only slightly as evening presses in. You wait for the darkness to provide enough cover to hide your passing. The fortress, [i]Unfailing Light[/i]—full of potential enemies—and the captive avatar of the Bear god await. \n\nYou follow the incongruous scents of leather, steel, and smoke that foul the marshland until you catch sight of the first Rising Sun sentries from a distance. They do nothing to mask their presence, such is their arrogance.\n\nTheir lackadaisical attitude gives you more than enough time to plan your approach.\n\n*fake_choice\n\t#I will attack them outright. Save the subterfuge for the cowardly.\n\t#Pick them off one-by-one, and savor the hunt.\n\t#Sneak past the sentries without arousing their suspicion. Their slow, mundane vision will never catch me.\n\t#Wrap myself in an arcane guise through the use of complex ritual and stroll past them.\n\t#[i]Rising Sun ally[/i]: Announce myself and demand to be taken to their commanding officer.\n\t#[i]Eel Favor[/i]: I can viciously turn the entire marshland against the Rising Sun patrol using ritual.\n\n*script changeBackgroundColor(\"black\")\n*set prenom \"Bvaso\"\n*set gender \"male\"\n*set wolf_moon \"prone\"\n*set chara_generation_done true\n*set wolf_moon_selected true\n*set name_set true\n*set tribe \"Clearwater\"\n*set combat 30\n*set survival 20\n*set quickthinking 10\n*set ritual 10\n*set sensitivity 5\n*set influence 2\n*set restraint 30\n*set pantheon_regard 10\n*set pacifism true\n\n*set action 30\n*set deliberation 70\n*set selfishness 75\n*set equity 25\n\n*set riser_affinity 50\n*set eel_affinity 25\n*set hawk_affinity 55\n*set ara_affinity 70\n*set bear_affinity 50\n\nThe traveler leads you to the other side of the clearing, and slowly the awful feeling inside you recedes. She puts a hand on your shoulder until she is sure you are relatively all right. Up ahead light floods through the ravine, much brighter than the late afternoon sun you expected.\n\n\"The clearing we passed through is full of the spirits of the dead. It can be truly awful for those with blood on their hands. I have more than once been assailed by the spirits of those who have fallen under my blade. Yet when I found you, you were less troubled than those of us whose souls are stained by the lives we have taken. \n\n\"Do you imagine that you can keep your hands clean on your travels, stranger? Can you stay unbloodied in this brutal world?\"\n\n*fake_choice\n\t#\"For a greater good, I would shed blood.\"\n\t#\"I will not kill, nor do unnecessary harm. I swear it.\"\n\t#\"You think these are clean? I am just getting started.\"\n\t#\"I am a creature of whim. If I have to rupture and kill to get what I want, so be it.\"\n\n*script changeBackgroundColor(\"sepia\")\n*set prenom \"Nekra\"\n*set gender \"none\"\n*set wolf_moon \"rising\"\n*set chara_generation_done true\n*set wolf_moon_selected true\n*set name_set true\n*set tribe \"Clearwater\"\n*set combat 30\n*set survival 20\n*set quickthinking 10\n*set ritual 10\n*set sensitivity 5\n*set influence 2\n*set restraint 30\n*set pantheon_regard 10\n*set pacifism true\n\n*set action 30\n*set deliberation 70\n*set selfishness 75\n*set equity 25\n\n*set riser_affinity 50\n*set eel_affinity 25\n*set hawk_affinity 55\n*set ara_affinity 70\n*set bear_affinity 50\n\n*set lyall_he \"he\"\n*set lyall_his \"his\"\n\n\"You have no idea what we have endured since Wolf went quiet!\" Lyall hisses at you before the group of wolf-worshipers. \"If you will not give us the direction we need, then I will remain the head of this enclave. I formally challenge you for leadership of this enclave.\"\n\nA leadership challenge is not something to be undertaken lightly. The look on Lyall's face suggests ${lyall_he} means it. \n\nHemming, the self-appointed adjudicator, clears his throat and attracts everyone's attention for a moment. \"A leadership challenge recognizes strength alone and means that the winner has final say about the direction of this enclave. It can be brutal. There are so few of us now that potentially losing two leaders to a challenge would be harmful. Is there another way—\"\n\n*fake_choice\n\t#Accept the challenge and fight Lyall for control of the enclave.\n\t#Cede your claim over the enclave. Allow Lyall to take control.\n\t#Suggest a co-leadership.\n\t#[i]Hawk Path[/i]: Allow the group to decide whether or not I should accept the challenge.\n\n*if not(choice_is_ios_app)\n\t*set prenom \"Baku\"\n\t*set gender \"female\"\n\t*set wolf_moon \"prone\"\n\t*set chara_generation_done true\n\t*set wolf_moon_selected true\n\t*set name_set true\n\t*set tribe \"Quiet\"\n\t*set combat 10\n\t*set survival 20\n\t*set quickthinking 10\n\t*set ritual 30\n\t*set sensitivity 25\n\t*set influence 4\n\t*set restraint 30\n\t*set pantheon_regard 5\n\n\t*set action 60\n\t*set deliberation 40\n\t*set selfishness 35\n\t*set equity 65\n\n\t*set riser_affinity 50\n\t*set eel_affinity 25\n\t*set hawk_affinity 55\n\t*set ara_affinity 70\n\t*set bear_affinity 50\n\n\tBoth sides are hesitant to meet each others' eyes, but gradually they explain the situation. The leader of the armed group is the first to drop his weapon, and the first to speak. \n\n\t\"My name is Gellas. I am a member of the Rising Sun—\" he begins.\n\n\t\"A group of faithless brutes—\" the cloaked woman hisses. \n\n\t\"We are far from home and tired. We stopped here because this clearing is easy to defend from deep forest predators.\"\n\n\tThe cloaked woman narrows her eyes. \n\n\t\"This is a temple to the god Eel. Your presence is bad enough—\" She points an accusing finger. \"—but eating and drinking and burning your stinking fire beneath the eaves of his home? It is an affront!\"\n\n\tThe priestess of the Eel god points a finger and shouts something to which one of the Rising Sun group replies with a stinging retort. The situation is getting tense. If you intend to intervene, now would be the time. \n\n\t*fake_choice\n\t\t#To the Rising Sun group, peaceably: \"This is a space sacred to Eel's worshipers, can we not find you some other place to rest your heads?\"\n\t\t#To the Rising Sun group, forcefully: \"You have clearly intruded on something above your ken. Begone, quickly, before we have a real problem.\"\n\t\t#To the Eel worshiper, peaceably: \"They only intend to rest for a while and then be on their way, can you not allow them their brief sojourn?\"\n\t\t#To the Eel worshiper, forcefully: \"Does Eel demand you sow chaos in his house? Leave this place safely right now. I cannot guarantee the offer will last another breath.\"\n\t\t#To both sides: \"None of you have acquitted yourselves well here, and all of you should leave. Now.\"\n\n*set prenom \"Onai\"\n*set gender \"male\"\n*set wolf_moon \"rising\"\n*set chara_generation_done true\n*set wolf_moon_selected true\n*set name_set true\n*set tribe \"Highwalk\"\n*set combat 30\n*set survival 20\n*set quickthinking 15\n*set ritual 5\n*set sensitivity 10\n*set influence 2\n*set restraint 35\n*set pantheon_regard 4\n\n*set action 35\n*set deliberation 65\n*set selfishness 20\n*set equity 80\n\n*set riser_affinity 60\n*set eel_affinity 55\n*set hawk_affinity 30\n*set ara_affinity 25\n*set bear_affinity 25\n\nYou find yourself in an unfamiliar town seeking information, and you have a sense of how to find it: Where there is commerce and success, there is discontent; you seek out that discontent and find it in a group of gamblers throwing dice in the dirt behind an ancient-looking drinking establishment. \n\nOne of the gamblers, squatting to loudly inspect and dispute the outcome of a throw, sees you and levers herself up out of the dirt.\n\n\"You are in the wrong place, outsider,\" she says with finality. \"One chance to turn around. If we are feeling generous, that is.\"\n\nThe other gamblers gather behind her. They let their weapons show to intimidate you. The sunlight glints from broad machetes and long, crooked knives.\n\nThey do not seem inclined to listen, but you can try to talk them down anyway. \n\n*fake_choice\n\t#\"I am not here to fight with you. I only have a few questions.\" \n\t#Talk? Yes, they will talk. Afterward.\n\t#\"All right. I will go.\"\n\n*finish", "startup": "*title Avatar of the Wolf\n*author Bendi Barrett\n*scene_list\n\tstartup\n\t1_profaned\n\t2_othergods\n\t3_roads\n\t$ 4_otherpeoplesproblems\n\t$ 5_burning\n\t$ 6_thewolflings\n\t$ 7_anunfailinglight\n\t$ 8_thirstdrowning\n\t$ 9_featherandclaw\n\t$ 10_wolves\n\t$ consumed_end\n\t$ death\n\t$ survived_end\n\n*create action 50\n*create deliberation 50\n*create selfishness 50\n*create equity 50\n*create survival 5\n*create ritual 5\n*create combat 5\n*create quickthinking 5\n*create sensitivity 5\n*create influence 1\n*create restraint 30\n*create riser_spacing false\n*create eel_spacing false\n*create spider_spacing false\n*create hawk_spacing false\n*create query_counter 0\n*create prenom \"empty\"\n*create man_woman \"none\"\n*create gender \"none\"\n*create tribe \"none\"\n*create he \"he\"\n*create him \"him\"\n*create his \"his\"\n*create name_set false\n*create attraction \"none\"\n*create chara_generation_done false\n*create wolf_moon \"none\"\n*create wolf_moon_selected false\n*create path_title \"None\"\n*create path_description \"Your path is not yet revealed.\"\n*create allies_stat 0 \n*create enemies_stat 0\n*create riser_affinity 50\n*create bear_affinity 50\n*create eel_affinity 50\n*create hawk_affinity 50\n*create ara_affinity 50\n*create lyall_affinity 50\n*create caught_sneaking false\n*create recognize_rising_sun false\n*create stag_kill false\n*create gellas_reoccurs false\n*create risers_spelled false\n*create encampment_directions \"none\"\n*create chaos_score 0\n*create pantheon_regard 5\n*create diplomatic_failure false\n*create eel_and_combat false\n*create shaman_advice false\n*create savage_riser_death false\n*create death_toll 0\n*create ara_he \"she\"\n*create ara_his \"her\"\n*create ara_him \"her\"\n*create ara_possess \"hers\"\n*create ara_gender \"woman\"\n*create ara_name \"Ara\"\n*create no_question false\n*create wolf_question false\n*create hair_choice \"none\"\n*create skin_choice \"none\"\n*create r_captain \"none\"\n*create riser_difficulty 0\n*create ishko_difficulty 0\n*create aran_aid 0\n*create ishkoans_hurt \"none\"\n*create ishkoans_aid false\n*create ishko_diplomacy 0\n*create riser_conflict false\n*create ishko_aid false\n*create singular_death \"none\"\n*create tribe_multiplier 1\n*create ishkoans_worship_you false\n*create riser_ishko_cooperation false\n*create scroll_possession false\n*create combat_training false\n*create risers_live false\n*create rising_boon false\n*create ishko_occupied false\n*create hawk_accompany false\n*create hawk_description true\n*create hawk_scrutiny false\n*create pacifism false\n*create pacifism_broken false\n*create ghazal_gender \"woman\"\n*create ghazal_he \"she\"\n*create ghazal_his \"her\"\n*create ghazal_him \"her\"\n*create ghazal_possess \"hers\"\n*create ghazal_romance false\n*create delayed_van_attack false\n*create van_attacked false\n*create risers_warned_off false\n*create first_line false\n*create van_v_risers false\n*create van_return false\n*create spider_observation 0\n*create spider_gift_1 false\n*create spider_gift_2 false\n*create prophecy_received false\n*comment caravan_helped = 1/fire\n*comment \" = 2/healer\n*create caravan_helped 0\n*comment wake_at 1 = Ghazal's\n*comment wake_at 2 = Horse ground\n*comment wake_at 3 = healer/fireman\n*create wake_at 0\n*create village_state 0 \n*comment 1=peaceful end, 2=leader killed, \n*comment 3=burned village, 4=dead village\n*create clearwater_aid false\n*create suggest_village_aid \"none\"\n*create clearwater_gift \"none\"\n*create clearwaters_search false\n*create defeat_by_clearwaters false\n*create lyall_gender \"woman\"\n*create lyall_he \"she\"\n*create lyall_his \"her\"\n*create lyall_him \"her\"\n*create lyall_possess \"hers\"\n*create enclave_leader \"none\"\n*comment you / lyall / both\n*create enclave_purpose \"none\"\n*comment join (another group)\n*comment fight / survive /\n*create lyall_fight_modifier \"none\"\n*create lyall_romance \"none\"\n*comment sleptwith / delayed / none / refused\n*create fought_lyall false\n*create lyall_fate \"none\"\n*comment dead / banished / live\n*create lyall_talkback false\n*create deviousness false\n*create quiet_nickname \"none\"\n*create riser_joiner true\n*create sen_accompany false\n*create sen_killed false\n*create wolves_harsh_fate false\n*create sen_death_request false\n*create defeat_by_risers false\n*create bear_fate \"none\"\n*comment free / dead / imprisoned\n*create fortress_fight_fail false\n*create infiltrate_type \"none\"\n*comment stealth / friendly / fight\n*comment disgraced / wolfhelped\n*create riser_supplies false\n*create godly_attitude \"none\"\n*comment wrathful/amused/empathetic\n*comment indignant\n*create gods_hinder false\n*create meeting_lyall false\n*create meeting_ara false\n*create meeting_sen false\n*create lyall_takeover false\n*create fight_points 0\n*create self_score 50\n*create enemy_score 50\n*create ara_turn false\n*create three_god_powerup false\n*create hawk_dies false\n*create bear_dies false\n*create lyall_dies false\n*create sen_dies false\n*create ara_dies false\n*create sen_fallback false\n*create lyall_fallback false\n*create friend_kill_count 0\n*create lyall_speaks_out false\n*create ara_peace_refusal false\n*comment the next few variables are to consolidate the Hawk v. Bear/Bear v. Hawk scenarios, so I only have to write one and can change on the fly which god is an ally and which is a foe.\n*create helper \"none\"\n*create god_ally \"none\"\n*create god_his \"his\"\n*create god_him \"him\"\n*create god_he \"he\"\n*create god_foe \"none\"\n*create foe_his \"his\"\n*create foe_him \"him\"\n*create foe_he \"he\"\n*create intention \"none\"\n*comment the intention variable tracks what end the player actually wants, so that I can take them through prepackaged scenarios then route them toward desired ends.\n*comment intentions: \n*comment control = pantheon_control\n*comment revenge = settling grudge with pantheon\n*comment peaceful = leaving without conflict\n*comment demolish = demolish the pantheon\n*create pantheon_lead \"none\"\n*create lyall_intent \"none\"\n*create wolf_control false\n*create going_once false\n*create question_loop false\n*create wolf_dead false\n*create wolf_humanity 50\n*create you \"none\"\n*create your \"none\"\n*create wolf_strength 60\n*create self_strength 50\n*create wolf_fight_combat false\n*create wolf_peace_victory false\n*create ara_threat false\n*create wolf_eaten_trigger false \n*create enclave_joiner false\n*create riser_hunted_stub false\n*create riser_safe_stub false\n*create riser_curbed_stub false\n\n*achievement firstblood visible 15 Fresh Kill\n\tKill at the earliest possible opportunity like a true avatar of the Wolf god.\n*achievement ishkopeace visible 25 A Tentative Peace\n\tNegotiate a peaceful resolution to the situation in Ishko.\n*achievement deadmen visible 10 Hunted By the Dead\n\tKill enough to be attacked by vengeful spirits.\n*achievement fallinline visible 25 Fall in Line\n\tGet the head of the Wolf enclave to recognize your superiority.\n*achievement coleader visible 50 Two Leaders, One Cause\n\tLead the Wolf enclave alongside its former leader.\n*achievement riserjoiner hidden 25 Bearer of the Sunburst\n\thidden\n\tJoin the Rising Sun coalition.\n*achievement commanderdead visible 25 Setting Sun\n\tTake action against the Rising Sun before they get too big to control.\n*achievement bastard visible 50 Bastard\n\tDouble cross the Clearwater people.\n*achievement chaosagent visible 25 Chaos Agent\n\tThrow the world into disarray with the highest level of chaos-causing decisions.\n*achievement bloodrain visible 25 And Blood Fell Like Rain\n\tTake out more than 50 people in your search for Wolf.\n*achievement araslain visible 25 A Cure For Venom\n\tDecisively resolve a disagreement with Spider's avatar.\n*achievement threegodpower visible 25 Wolf, Bear, Hawk\n\tReceive the blessings of three gods. By force, if necessary. \n*achievement godeater visible 50 God Eater\n\tProve that you are the apex predator and that your hunger is the most vicious.\n\tEat up the Wolf god. Every divine morsel of him.\n*achievement settlingdown visible 25 The Settling Type\n\tFind something worth settling down for.\n*achievement spidersteal visible 25 Eight Legs, No Heart\n\tEntertain the sly designs of the spider avatar.\n\tLet Spider's avatar coax you away from your new home.\n*achievement twowolves visible 25 Two Wolves\n\tMake a new pack with a rival. \n*achievement alpha visible 50 The Alpha\n\tEmerge as the uncontested head of the pantheon.\n*achievement eelhelper visible 25 Friends in Slippery Places\n\tGet the Eel god to come to your aid at a crucial moment. \n*achievement gentlenight visible 25 Gentle Night\n\tConvince your nemesis to see reason and embrace a peaceful transition.\n*achievement givepeaceachance visible 25 Give Peace a Chance\n\tSow the first seeds of peace between the Rising Sun and their most bitter enemy.\n*achievement pacifist visible 100 Clean Hands\n\tSurvive in this brutal world without taking a life.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tHunt down the killer who murdered the Wolf god! As the Wolf's last avatar before his assassination, will you revive your god, take revenge on his killer, or destroy the pantheon and bring about a new order?\n\n\t[i]Avatar of the Wolf[/i] is a 135,000-word interactive fantasy novel by Bendi Barrett. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n\tIn a savage land where the gods manipulate mortals like pawns on a chess board, Wolf's divine power controlled you and protected you. But since Wolf's death, the eyes of Hawk, Spider, Bear, Gazelle, and Eel are upon you. The embers of Wolf's power still burn within you; your remnants of divinity threaten to topple the pantheon.\n\n\tForsake the gods and join the Rising Sun, a heretical sect that defies divine rule. Embrace the anarchic, self-serving ethos of Spider and her seductive avatar. Obey Wolf's feral impulses and slaughter your enemies as head of the last Wolf enclave, or forge a lasting peace without spilling a drop of blood.\n\n\tThe gods are fading. Will you hasten their demise or harness their divine power? \n\n\t• Play as male, female, or agender, straight, gay, bi, or asexual.[n/]\n\t• Discover the secret behind the disappearance of Wolf, your patron god[n/]\n\t• Take up the mantle of your savage missing god, or strike out on your own path[n/]\n\t• Receive the blessings of the Spider, Bear, and Eel gods... by force, if necessary[n/]\n\t• Ally with the followers of Wolf or join up with gods-hating Rising Sun[n/]\n\t• Convince the head of the Wolf enclave to recognize your superior power or lead alongside them[n/]\n\t• Choose to survive peaceably in this brutal world, without taking a single life[n/]\n\t• Impress the pantheon of animal gods, reject their rule, or usurp them altogether\n\n\t*if choice_prerelease\n\t\t[i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first three chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n*goto_scene 1_profaned\n", "survived_end": "*set you \"you\"\n*set your \"your\"\nYou awaken with a jolt. It takes a moment for it to sink in: you are yourself; you are safe; you are whole. You managed to confront Wolf and wake away without becoming his meal.\n\nYou struggle to stand. \n*if meeting_sen\n\tSen is there to offer you his hand. He pulls you onto your feet and pats you on the shoulder.\n\t*if wolf_fight_combat\n\t\t\"We did it. I can barely believe it.\"\n\t*comment endif\n*if meeting_lyall\n\t\"Welcome back,\" Lyall says, and helps you climb to your feet. \n*comment endif\n\nTumelo's meeting house is still the same as it was before you were abruptly thrown into Wolf's dream, but it feels different. Perhaps you are different.\n\n*if (((meeting_ara) or (meeting_sen)) or meeting_lyall)\n\tYou quickly explain, as much as you can anyway, what transpired in the Wolf dream. \n\n*if meeting_ara\n\t\"There are not many who encounter Wolf on his terms and leave with their bodies and minds intact. You are in rarefied company, my friend,\" ${ara_name} says, managing to sound only moderately disdainful. \n*comment endif\n\n*if meeting_lyall\n\tYou half expect Lyall to be apoplectic, after all you just confronted and refused to relent to your god, ${lyall_his} god. However, ${lyall_he} has a more nuanced view: \"I was not called, ${prenom}. For all my faith and ferocity, Wolf did not choose me to inhabit. If he had, I cannot say for certain what I would or would not have done. I do know that if Wolf could not defeat you, then by every law we follow he did not deserve to take your consciousness for his own.\"\n\n\tLyall puts a hand on your shoulder. \n\n\t\"You survived, ${prenom}. You survived. That is enough for now,\" ${lyall_he} says. \n*comment endif\n\nAs details of your conflict with Wolf cross your mind, it occurs to you that you are free, or at least as free as any living being could claim to be. \n\n*if meeting_lyall\n\t\"This place symbolizes nothing good. We should leave,\" Lyall says, while looking around the large space and shivering. \n\t*goto leaving_siltstone\n*elseif meeting_sen\n\t\"If it is all the same to you, ${prenom}. I think it is past time we left this place,\" Sen says suddenly. \"It has the reek of misspent power about it, and such things tend to draw conflict as surely as anything.\"\n\t*goto leaving_siltstone\n*elseif (meeting_ara and ((meeting_sen = false) and (meeting_lyall = false)))\n\t\"Should we leave, ${prenom}? Before the fell spirits come to eat up whatever remains of your former patron god?\" ${ara_name} asks. \n\n\tYou could take umbrage with ${ara_his} tone, but ${ara_he} is not wrong. Incorporeal beings flock to places of great spiritual disturbance, and you can think of few more disturbed places that the funeral ground of a powerful god. \n\t*goto leaving_siltstone\n*else\n\tYou are compelled to leave the meeting house where so much occurred to change your world, to begin to put Wolf's destruction behind you.  \n\t*goto leaving_siltstone\n\n*label leaving_siltstone\n\nYou walk out into the sunlight of Siltstone\n*if meeting_sen\n\tand Sen calls after you. \n\n\t\"${prenom}. We have done a great deal already for the Rising Sun cause by allying in the first place, but I fear I must ask you yet another favor. I would have your word that the growing coalition of the Rising Sun is safe from…well, safe from you. I have placed my faith in you, ${prenom}, but the people who trust in me need some reassurance that this is not a one-off. That this thing we have done is a symbol of how things can be in the future.\"\n\n\tSen's youthful face is set in a grimace. \n\n\t\"I am asking you to promise me that there will be no retribution against us from you and whatever Wolf worshipers remain.\"\n\n\t*choice\n\t\t#I can promise you that. Unequivocally. \n\t\t\t*set riser_safe_stub true\n\t\t\t*set action %+20\n\t\t\t*set deliberation %-20\n\t\t\tSen tries not to let his relief show, but it is plain on his face. \n\n\t\t\t\"This means everything to me and my people. Thank you, ${prenom},\" Sen says. He grins and without the burden of leadership for a moment, he looks considerably younger. But before long he arms himself again with an air of chilly formality. \"I should see after my people. This detour has taken us far from where we expected to be. But should you ever have need of our aid, my aid, send word to anyone of mine and they will get me the message.\"\n\n\t\t\tSen pulls you into an embrace before you can refuse or demure. Afterward he turns and leaves to find his soldiers and start their journey. \n\n\t\t\t*page_break\n\t\t\t*goto picking_your_ending\n\t\t#I will make no such promises.\n\t\t\t*set riser_affinity %-50\n\t\t\t*set deliberation %+25\n\t\t\t*set action %-25\n\t\t\t*set riser_hunted_stub true\n\t\t\tSen's face grows distant as soon as you speak. He shakes his head. \n\n\t\t\t*goto sen_threat\n\t\t#I will not come after the Rising Sun, if I am left alone. However, I cannot speak for the others. They follow their own paths.\n\t\t\t*if enclave_leader = \"you\"\n\t\t\t\t*set riser_affinity %-50\n\t\t\t\t*set equity %+25\n\t\t\t\t*set selfishness %-25\n\t\t\t\t*set riser_hunted_stub true\n\t\t\t\tSen's expression hardly changes. \"You are their leader, are you not? At least one contingent of them. Issue a decree, dammit! Call them off!\"\n\n\t\t\t\t\"They are not mine to command, especially now that Wolf is gone,\" you reply. \n\n\t\t\t\tThe Riser commander gives you a withering glare. \n\n\t\t\t\t*label sen_threat\n\t\t\t\t\"You are making a mistake, ${prenom}, and I promise you that it will cost many lives. But I can no more force you into rational behavior than I can command your people on your behalf. The Rising Sun will protect itself. You can be assured of that.\"\n\n\t\t\t\tSen stalks away from you, and the smattering of Rising Sun soldiers you saw loitering around Siltstone join him. You very much doubt you have seen the last of the commander. You wonder if the next time you encounter him it will be on opposite ends of the battlefield.\n\n\t\t\t\t*page_break\n\t\t\t\t*goto picking_your_ending\n\t\t\t*else\n\t\t\t\t*set riser_affinity %-35\n\t\t\t\t*set riser_hunted_stub true\n\t\t\t\t\"You must have some power over them, ${prenom}! You just met their god!\"\n\n\t\t\t\t\"They are not mine to command, Sen. I was never their leader,\" you reply.\n\n\t\t\t\tSen gives you a pleading look. He searches your face for some sign that you will reconsider, but when it becomes clear that you will not or cannot, his expression hardens. \n\n\t\t\t\t*goto sen_threat\n*elseif meeting_lyall\n\tand Lyall calls out. \n\n\t\"${prenom}.\n\t*if enclave_leader = \"lyall\"\n\t\tI intend to lead the Wolf enclave on a campaign against the Rising Sun.\n\t*if ((enclave_leader = \"you\") or (enclave_leader = \"both\"))\n\t\tI do not know what you intend for the Wolf enclave, but I think we should strike against the Rising Sun. \n\t*comment endif\n\tThey will eventually receive word, even rumors, that Wolf is gone for good. They have shamans and ritualists, as well. The secret will not last. We need to show force now. If we band together with the other enclaves, if we rally the faithful, then we can demonstrate how powerful we still are. Will you support this?\" \n\n\t*choice\n\t\t*if (enclave_leader != \"lyall\") #No. I forbid it.\n\t\t\t*set lyall_affinity %-35\n\t\t\t*set equity %+25\n\t\t\t*set selfishness %-25\n\t\t\tLyall looks taken aback. \n\n\t\t\t\"You forbid it?\" Lyall asks acidly. \n\n\t\t\t*label lyall_disappointed\n\t\t\t$!{lyall_he} recoils, pauses. \"You will regret this, ${prenom}. Trust me on that. When the Rising Sun is burning homes and we are burying ours in ditches, you will recall when we had the chance to change our fate and chose the fool's path.\"\n\n\t\t\tLyall does not spend another breath on you. $!{lyall_he} leaves Siltstone immediately, probably to seek out the Wolf enclave and give them the news: ${prenom} has failed us. \n\n\t\t\tYou do not think Lyall is right, that blood is the only option and outcome, but time will solve this disagreement. You can only hope that what you have chosen is the best option for the people who believe in you. \n\n\t\t\t*page_break\n\t\t\t*goto picking_your_ending\n\t\t#It makes sense. We should strike them while we can.\n\t\t\t*set lyall_affinity %+20\n\t\t\t*set action %+20\n\t\t\t*set deliberation %-20\n\t\t\t*set riser_hunted_stub true \n\n\t\t\t*goto lyall_pleased\n\t\t#No. We should wait and see how they react to the news.\n\t\t\t*set lyall_affinity %-25\n\t\t\t*set deliberation %+25\n\t\t\t*set action %-25\n\t\t\t*set riser_safe_stub true\n\n\t\t\t*goto lyall_disappointed\n\t\t#You hardly need my blessing. I imagine that the Wolf enclaves are already prepared to attack.\n\t\t\t*set lyall_affinity %+20\n\t\t\t*set equity %+10\n\t\t\t*set selfishness %-10\n\t\t\t*set action %+20\n\t\t\t*set deliberation %-20\n\t\t\t*set riser_hunted_stub true\n\t\t\t*label lyall_pleased\n\t\t\tLyall grins like a child at your bloody gift. \n\n\t\t\t\"We will start immediately, ${prenom}. You have made the right choice and your word will go far in convincing our enclave, all the remaining enclaves, to fight.\"\n\n\t\t\t$!{lyall_he} leaves Siltstone immediately in order to spread the gospel of war. You know your choice will have consequences, but there is hope it will save at least as many lives as will be taken. It is some comfort.\n\n\t\t\t*page_break \n\t\t\t*goto picking_your_ending \n\t\t#Yes. And I will join the attacks myself. \n\t\t\t*set enclave_joiner true\n\t\t\t*set lyall_affinity %+35\n\t\t\t*set action %+30\n\t\t\t*set deliberation %-30\n\t\t\tLyall gives you a wicked smile. \"I was hoping you would say that.\"\n\n\t\t\t*page_break\n\t\t\t*gosub_scene consumed_end hunting_risers\n\n\t\t\t*if lyall_romance != \"refused\"\n\t\t\t\t*gosub romancing_lyall\n\n\t\t\t*page_break\n\t\t\t*goto picking_your_ending_2\n\t\t#We should seek a peaceful resolution. \n\t\t\t*if ((lyall_affinity >= 60) and ((enclave_leader != \"lyall\") or (sensitivity >= 35)))\n\t\t\t\t*set riser_curbed_stub true\n\t\t\t\t*set lyall_affinity %+15\n\t\t\t\t*set deliberation %+20\n\t\t\t\t*set action %-20\n\t\t\t\t*set equity %+15\n\t\t\t\t*set selfishness %-15\n\t\t\t\t*set quickthinking +5\n\t\t\t\t*check_achievements\n\t\t\t\t*if not(choice_achieved_givepeaceachance)\n\t\t\t\t\t*achieve givepeaceachance\n\t\t\t\tLyall considers your words for a long time. You are nearly certain ${lyall_he} will refuse, fighting even the notion that there could be peace between the Rising Sun and the remaining Wolf enclaves. But when ${lyall_he} opens ${lyall_his} mouth, it is not incredulity and rancor that comes out. \n\n\t\t\t\t\"I have been fighting since I was a child, ${prenom}. It galls me to think there is another way. Imagine how much time was wasted on fighting, killing for every inch of respect, power, even the right to exist.\" Lyall's jaw tenses, but ${lyall_he} fights through the tension and releases it. \"Maybe the next generation will not have to fight like I did. It worries me, because they will need to be strong if this peace you want fails. But if we do not try, we will know. I will try to convince the enclave to attempt this, but I cannot promise they will abide it.\"\n\n\t\t\t\t\"A chance is all I ask for,\" you explain. \n\n\t\t\t\tLyall nods and walks away. You trust ${lyall_he} will do ${lyall_his} best to convince the enclave to seek a peaceful outcome with the Rising Sun. You hope that will be enough. \n\n\t\t\t\t*page_break\n\t\t\t\t*goto picking_your_ending\n\t\t\t*else\n\t\t\t\t*set riser_hunted_stub true\n\t\t\t\tLyall laughs thinking your statement a bleak joke. $!{lyall_he} does not laugh for long.\n\n\t\t\t\t\"You mean to make peace with them? Wolf only just moments dead and you forget what you are, what we are? The others have the luxury of questioning and plotting and playing with their thumbs, but we are made of fire and steel, ${prenom}. We cannot relent. Not while they target our people.\"\n\n\t\t\t\tLyall makes it clear there is no room for debate. $!{lyall_he} bids you farewell and promptly leaves Siltstone, presumably to return to the enclave and begin waging war on the Rising Sun. \n\n\t\t\t\t*page_break\n\t\t\t\t*goto picking_your_ending\n*else\n\tand find yourself dazzled by the light of the day.\n\t*goto picking_your_ending\n\n*label picking_your_ending\n\nThe world is different now than it was at the beginning of your journey. You have helped to shape it and now the road before you is open, and Wolf is not snapping at your heels. So what will you do with this newfound possibility? \n\n*choice\n\t*if (van_return) #Return to Mara's Caravan and see if Ghazal is still awaiting me.\n\t\t*gosub_scene consumed_end romancing_ghazal\n\n\t\t*page_break\n\t\t*goto picking_your_ending_2\n\t#Stay in Siltstone until a more interesting adventure arises.\n\t\tNow that your concerns with Wolf have been resolved, you do not have anywhere to go immediately. You decide to stay in Siltstone for the time being. \n\n\t\tYou are offered employ by\n\t\t*if combat >= ritual\n\t\t\tKasigo, a hard woman who runs the town's only drinking hall, which doubles as a venue for the sharing of information.\n\n\t\t\tYou have to occasionally turn out a drunk or rough up someone with bad intentions, but the work is not strenuous and you pick up little things, like how to ferment a delicious honey wine or how best to keep wheat dry in a damp environment. \n\n\t\t\t*if quickthinking >= 45\n\t\t\t\tKasigo even tasks you with handling the money that comes into the Shanty after she realizes how quick you are with numbers and deems you trustworthy enough.\n\t\t\t*comment endif\n\t\t*if ritual > combat\n\t\t\tAdika, a permanently scruffy and temperamental shaman whose loyalty tips toward whichever god he has not fallen out of favor with recently.\n\n\t\t\tYou are supposed to be his assistant, but your ritual knowledge is more impressive by far, so you become something like a partner in a short amount of time.\n\n\t\t\t*if sensitivity >= 45\n\t\t\t\tAdika comes to you whenever he has trouble interpreting his own dreams and eventually asks if you would like to be formally trained to become a shaman. You mull over the offer, but you do not know that professing faith in another god is in the cards for you just yet. \n\t\t\t*comment endif \n\t\t*comment endif\n\n\t\t*label generic_ending_stuff\n\t\tLife is pleasant, if a little boring at times, but you begin to notice that you can sleep through the night without worrying about vicious Wolf dreams, and your shoulders are not constantly tense from the threat of violence. \n\n\t\tStill, you know when adventure comes and you are required to fight or think your way out of dangerous situations, you will be ready. \n\n\t\t*goto picking_your_ending_2\n\t#Find the Wolf enclave and join them.\n\t\t*set enclave_joiner true\n\t\tThe Wolf enclave welcomes you back without fanfare, which is almost disappointing considering how long it takes you to find them in the back country of Clearwater lands.\n\n\t\t\"It took you long enough,\" Roan, usually quiet to a fault, says. \"We heard you making your way thro
