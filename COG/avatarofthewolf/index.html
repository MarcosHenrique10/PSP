et spider_observation +1\n\tYou have made unlikely, and quite frankly, untrustworthy allies.\n\t*goto spider_next_2\n*label spider_next_2\n*if (riser_ishko_cooperation = true)\n\t*set spider_observation +1\n\tYou have created bridges between enemies, which I would have preferred to burn.\n\t*goto spider_next_3\n*label spider_next_3\n*if (chaos_score >= 1)\n\t*set spider_observation +1\n\tYou have begun to question how central godhood really is to humanity's prosperity.\n\t*goto spider_next_4\n*label spider_next_4 \n*if (pacifism = true)\n\t*set spider_observation +1\n\tYou have sworn never to shed blood, which is madness, of course. \n\t*goto spider_next_5\n*label spider_next_5 \n*if (ishko_occupied = true)\n\t*set spider_observation +1\n\tYou have proven strong enough to take Ishko from its people, which I truly appreciated, by the way.\n\t*goto spider_next_6\n*label spider_next_6\n*if spider_observation >= 2 \n\tSo you have been quite busy, my lupine friend.\"\n*if spider_observation = 1\n\tAnd I am sure you will further impress me.\"\n*if spider_observation = 0 \n\tLet us peer deeply into your soul and see what treats we will find.\"\n\nThe spider shifts, which sends vibrations through the massive web. \n\t\n*if (((selfishness >= 75) or (influence >= 3)) or (quickthinking >= 20))\n\t*set spider_gift_1 true\n\t*set sensitivity +5\n\t\"I have watched many mortals navigate the perils of their short, simple lives, but you are something special. You are truly yourself under Wolf's musk and bluster. I reward individuality, and I think you are deserving of a reward.\n\n\t\"Your senses are keen, but let's make them keener,\" the spider says.\n\n\tYou feel the darkness recede a little. You can feel in greater detail the silk pressing tight against your skin. You can see the fine hairs across the great spider's skin. Even with heightened senses however, you are still incapable of wriggling free. \n\t*goto spider_next_7\n*else\n\t\"I must say, I find it odd that you are not…more. You could have so much for yourself if you would but take it. Command it. Outthink anyone who covets what you have. But you lack the skills. Unfortunate, but there is still time for you to show us what you really are.\"\n\t*goto spider_next_7\n\n*label spider_next_7\n*if ((van_v_risers = true) and (spider_gift_1 = true))\n\t*set ritual +5\n\t\"And I have one more gift for you. \n\t*label spider_gifts\n\tI watched you play the people of the traveling caravan against the gods-hating militants. You pulled their strings with as much cunning as any of my disciples and for that, you deserve this: I hope you use it selfishly and often.\"\n\n\tYou can feel wheels turning in your mind. You feel more able to stand up to the spider's intrusion into your mind. The force of your ritual knowledge has become sharper.  \n\t*goto after_spider_comment \n*elseif (van_v_risers = true)\n\t\"\n\t*goto spider_gifts\n*else \n\t*goto after_spider_comment \n\t\n*label after_spider_comment\n*page_break\n\nThe spider makes a noise like laughter, but horrible. \n\n*if prophecy_received = false\n\t\"I almost forgot. Your prophecy. You went searching for it and came away with empty hands. I myself have no appetite for prestidigitation or hoary oracular stunts, but I can tell you that there are interesting developments brewing in the south. Near the border of the veritable sludge pits that the Quiet call their home. Go there, and I doubt you will be disappointed.\n\n\"We have had some fun, have we not? But it is time for you to wake, ${prenom}.\"\n\nThe spider edges closer, until you can see its glistening fangs. You wake with that image fresh in mind.\n\nThe specifics are hazy, but what feeling are you left with?\n*choice\n\t#Fear. Spider was able to easily subdue me in the dream. \n\t\t*set ara_affinity %-5 \n\t\tIt's true the gods have their methods of contact and control, but being pursued through your dreams like a frightened rabbit leaves you shaken and resentful. You imagine there are easier ways to send a message, but perhaps Spider meant to rattle you.  \n\t\t*goto last_part\n\t#Exhilaration. Spider is a powerful god and a potential ally.\n\t\t*set ara_affinity %+20\n\t\tThough the dream itself was unsettling, you imagine that Spider visited you because she saw something useful in you. A goddess as powerful and cunning as she is could make for a strong ally. \n\t\t*goto last_part\n\t#Anger. How dare Spider insert herself into my dreams.\n\t\t*set ara_affinity %-10\n\t\tYou vow that next time you won't make it so easy. If Spider intends to invade your dreams again, she will find you harder quarry to catch next time.  \n\t\t*goto last_part\n\n*label last_part\n\nEventually, you manage to put the bizarre dream behind you and go back to sleep, but your rest is fitful and short. Instead of the prophecy you came so far to find, you are given another thread to follow back to its source and are beset with strange dreams. You delay returning to sleep but when you do, you dream of Wolf's cries and spiderwebs. \n\n*finish\n", "5_burning": "*if (attraction = \"male\")\n\t*set lyall_gender \"man\"\n\t*set lyall_he \"he\"\n\t*set lyall_his \"his\"\n\t*set lyall_him \"him\"\n\t*set lyall_possess \"his\"\n\n*text_image chap_5.png center Five: Burning\n\n[i]\"What is war?\" asked Brother Eel, who was the youngest of the sibling-gods, as they sat by the fire.[/i]\n\n[i]\"War is terror,\" said Sister Gazelle, while sipping honeyed water.[/i]\n\n[i]\"War is opportunity,\" said Sister Spider with a smile as she combed her long, dark hair with a fine, white comb.[/i]\n\n[i]Sister Hawk stared into the flames, and said, \"War is discourse.\"[/i]\n\n[i]\"War is collapse,\" said Brother Bear, after a lengthy period of consideration.[/i]\n\n[i]\"And you, Brother Wolf? What is war to you?\" Eel asked.[/i]\n\n[i]Brother Wolf picked his teeth with fresh animal bone, and simply said, \"Kindling.\"[/i]\n*line_break\n-from a tale originating in the Clearwater lands.\n*page_break\n\nThe sweat beads up on your pelt and runs down between your eyes. The salt stings, and your vision blurs as you search for a way out. You try to press the animal panic down in your gut, but everywhere you turn it is there, staring into your face and scratching at you. You whine, then you shout, and you do not stop shouting until the thick, black smoke cuts off your breath. \n*if sensitivity >= 20 \n\tYou know, instinctively, that you are not this trapped animal, but the fear is real. The pain coursing through your lungs is a message. \n*comment endif\n\nThe flames rise around you until all is ash. You wake up abruptly, sweating and scanning for danger, and it takes a moment for the flames to register. You search, again, locked in the same scenario for an exit while the flames rise around you. You cough and try to shout, but the smoke again is too much. \n\nYou experience this same terror a half-dozen more times before you truly wake, in your own skin and not a wolf's. \n\n*if wake_at = 1\n\tYou must have tossed and turned in your sleep because when you roll over, Ghazal is beside you, propped up on one elbow, ${ghazal_his} incisive gaze leveled at you. \n\n\t\"A dream?\" ${ghazal_he} asks. \n\n\t*if sensitivity >= 15 \n\t\t\"An omen. A message,\" you reply. \n\n\t\t$!{ghazal_he} nods.\n\t\t*goto continue_dream\n\t*else\n\t\t\"Yes,\" you reply.\n\t\t*goto continue_dream\n\t*label continue_dream\n\n\t\"Tell me,\" Ghazal says. \n\n\tYou explain the dream in as much detail as your mind, still reeling slightly, can offer. Ghazal listens and then takes a deep breath before replying. \n\n\t\"The fire was real. I can feel the heat rising off of you still. As for the wolves…\"\n\n\t*if sensitivity >= 15 \n\t\t\"They are not wolves,\" you answer, finishing ${ghazal_his} thought. \n\n\t\tThe seer seems impressed. \"Exactly. I think you have received a warning. Your wolves are in danger.\"\n\t\t*goto worship_explanation\n\t*else\n\t\tGhazal shakes ${ghazal_his} head. \"Sometimes these things are symbols. The wolves, I believe, are something else. People connected to you. Do you understand?\"\n\n\t\tYou do understand.\n\t\t*goto worship_explanation\n\n\t*label worship_explanation\t\n\n\tSome gods have elaborate places of worship: Hawk commands sprawling temples built high into the sky, and Eel has sites of power in low, abandoned places. Hawk's Featherlight Circle, for example, once little more than a gathering of oddly shaped rocks, has become a dedicated site of worship with an intricate, swirling mosaic at its center, created from tiny stones brought from pilgrims who brave long journeys to see it. \n\n\tOthers, like Spider, like Wolf, exalt themselves through the flesh. \n\n\tWolf has no temples and disdains the cheap adoration of the masses; his is a small but devoted body of worshipers. As his avatar or once-avatar, they are as close to a cohort as you could claim. \n\n\tIf they are in danger, then it is your responsibility to help them. As much as Wolf takes pride in independence and self-sufficiency, there is a time for protecting your own.\n\t*page_break\n\n\tYou prepare to leave and \n\t*if wake_at = 1 \n\t\tGhazal stops you. \n\n\t\t\"I wish your wolves the safety of passage beneath Gazelle's long stride,\n\t\t*if van_v_risers\n\t\t\tbut do not return to this caravan, ${prenom}, or whatever sway you hold with our gods will not protect you from me. I promise that.\"\n\n\t\t\t$!{ghazal_his} expression is unreadable. \n\t\t\t*if ritual > 15\n\t\t\t\tYet you get the sense of enormous ritual power gathering in the tent around you, closing in on you like a noose.\n\t\t\t\t*goto post_ghazal\n\t\t\t*else\n\t\t\t\tYou shiver without knowing why.\n\t\t\t\t*goto post_ghazal\n\n\t\t\t*label post_ghazal\n\n\t\t\tYou climb out of Ghazal's bed and get dressed. The morning is chilly, but perhaps not as cold as your lover of a single night has become. Luckily you have somewhere else to be. \n\t\t\t*goto post_dream_continue\n\t\t*else\n\t\t\tand you have my personal wish for safety and success, ${prenom}. And…\"\n\n\t\t\tYou wait for ${ghazal_him} to continue. \n\n\t\t\t\"It is not every day that you meet someone who understands what it means to live alongside the direct will of the gods. It is heartening to not feel alone for a moment, is it not?\"\n\n\t\t\t*fake_choice\n\t\t\t\t#\"I would not know; I always feel alone.\"\n\t\t\t\t\tGhazal makes a face. \"That is sad to hear, but not surprising, I suppose. Those faithful to Wolf walk a hard path, but that is not all you are.\"\n\n\t\t\t\t\t$!{ghazal_he} puts a hand on your chest. \"${prenom}.\"\n\n\t\t\t\t\t\"${prenom},\" ${ghazal_he} repeats. \"Do not forget that you are capable of warmth and softness, though the world may try to convince you otherwise.\"\n\n\t\t\t\t\t\"And what would you convince me of?\" you ask. \n\n\t\t\t\t\tGhazal scoffs. \"Come back after all this is done and perhaps I will show you.\"\n\t\t\t\t\t*goto post_ghazal_goodbye\n\t\t\t\t#\"It is. I feel at peace here, with you, and that feeling has been elusive.\"\n\t\t\t\t\t*label van_nostalgia\n\t\t\t\t\t\"I try to remind myself what this place can be like for those viewing it with fresh eyes. I have spent my entire life here, and it sometimes feels like a prison,\" Ghazal says, while sweeping hair out of ${ghazal_his} eyes. \"But I have responsibility, and people respect me. It is only my father and I, but with the people of the 'Van my family is bigger and more loving than most.\"\n\n\t\t\t\t\tGhazal pauses, looks at you as if searching for something in your face. \n\n\t\t\t\t\t\"There is a place for you, ${prenom}. Even if you cannot see it yet. There is a place for you.\"\n\n\t\t\t\t\tGhazal's earnestness makes it hard to disagree with ${ghazal_him}. Instead, you squeeze ${ghazal_his} hand and prepare to go.\n\t\t\t\t\t*goto post_ghazal_goodbye \n\t\t\t\t*if (tribe = \"Highwalk\") #\"This reminds me of where I grew up. It is a bittersweet feeling. But being with you makes it better.\"\n\t\t\t\t\t*goto van_nostalgia\n\t\t\t\t#\"I think you have mistaken what this is. Was.\"\n\t\t\t\t\tGhazal does not seem rattled by the statement. $!{ghazal_he} gives you a smile and raises an eyebrow. \n\n\t\t\t\t\t\"I am not asking for marriage, ${prenom}. You are an avatar to the gods. You understand what that means. You understand the weight. It is reassuring,\" ${ghazal_he} says, then adds, \"Was.\"\n\n\t\t\t\t\tGhazal wraps ${ghazal_him}self in a blanket and gestures toward the exit of the tent. \n\n\t\t\t\t\t\"Onward to adventure, no?\" ${ghazal_he} asks. You take the cue and prepare to leave.\n\t\t\t\t#\"You still have the voice of your god to keep you company, Ghazal. You should treasure it.\"\n\t\t\t\t\tGhazal gives you a look that borders on pity, but changes at the last moment into something else. \n\n\t\t\t\t\t\"The gods are not our friends, ${prenom}. We are their tools, and if we are lucky they treat us as finely as a master of craft treats her hammer and her anvil. But we should not think that the love and admiration of the gods is the only love and admiration we are worth.\"\n\n\t\t\t\t\t$!{ghazal_he} takes your hand and kisses it. \n\n\t\t\t\t\t\"Be safe, ${prenom}, and above all: Be yourself.\"\n\n\t\t\t\t\tYou soon realize that the sun is rising and it is time to go. \n\t\t\t\t\t*goto post_ghazal_goodbye\n\n\t\t\t*label post_ghazal_goodbye\n\n\t\t\tYou say goodbye to Ghazal and thank ${ghazal_him} again for ${ghazal_his} blessing. You leave the tent and head out into the morning. Shortly, you will leave for the south. \n\n\t\t\t*goto post_dream_continue\n\t\t\t\n\t*else\n\t\tthank the dream-reader and her young companion before heading toward the edge of the 'Van.\n\t\t*goto post_dream_continue\n\t\t\n*elseif wake_at = 2\n\tYou find yourself again among the horses who stamp their feet and move away from you. You cannot blame them, considering that there is heat rising off of your ${skin_choice} skin in waves, and you smell like singed animal hair. \n\t*if sensitivity \u003c 20 \n\t\tSo it seems your dream was something more than a dream. \n\t*comment endif\n\n\tYou spend the next hour wandering the caravan in the chilly morning asking after a shaman, or a dream-reader, someone who might be able to pull the meaning from your troubling dream. Unfortunately, with access to the seer cut off, it takes longer than you would like, but eventually you are directed to someone with some little shamanic gift.\n\n\t*label dream_reader\n\tThe toothless old woman barely looks at you before barking out a few short sentences in some gnarled steppe language. \n\t*if tribe = \"Highwalk\"\n\t\tDespite growing up on the steppe, you can hardly understand a word.\n\tShe gestures to the child with ritual markings on his forearms who sits beside her.\n\t*if tribe = \"Highwalk\"\n\t\tHe's a future shaman preparing to walk the long road to ritual power.\n\t*if tribe != \"Highwalk\"\n\t\tHe appraises with frank curiosity, but then shyly averts his gaze when you look back. \n\t*comment endif\n\n\t\"She asks about your fire dream. She can smell the ashes,\" the child translates. \n\n\tYou explain your dream to the child, who patiently and carefully relays the experience to the woman. She shakes her head and makes a sign in the dirt with a bronze-tipped stick that she pulls out of her coat. \n\t*if ritual > 15\n\t\tThe sign is a ritual glyph that is rich with many possible interpretations: It can suggest, depending on the context, an elegy for the dead, a warning to the living, or both.\n\t*comment endif\n\n\tThe old woman explains something to the child. He nods gravely, the serious expression is too onerous for his features, still pudgy with a child's fat. \n\n\t\"The wolves are in danger. The smoke gathers around them,\" he says, then adds, \"she says that you will understand.\"\n\n\tAnd you do.\n\t*page_break\n\t*goto worship_explanation\n*else\n\tYou are in the tent of the\n\t*if caravan_helped = 1\n\t\twater-bearer\n\t*if caravan_helped = 2\n\t\thealer\n\tyou assisted. After your disturbing dream, you find that your ${skin_choice} skin smells like cinders and singed hair. Your host, who was sleeping nearby, wakes along with you and is quick to ask after your health. You explain that you were dreaming, and he must notice the smell because he shakes his head and says, \"a dream and something else beside. I will find a shaman to parse this dream of yours. Wait here.\"\n\n\tTrue to his word, he brings an old woman and a child, both bundled up against the chill of the morning, to the tent. You thank your host, and he gives you a warm nod and a smile before leaving you to the privacy of his tent. \n\n\t*goto dream_reader\n*label post_dream_continue\nThere will be a long journey across the southern reaches of the steppe before you find the area suggested to you by your dream. You set out while the sun is still grumbling awake. \n\nThe shrub-land stretches endlessly in every direction, and it is hours before it offers any deviation.\n*if selfishness > equity\n\tYou should have stolen a horse in Mara's 'Van. The thought comes from nowhere to kick you while you travel.\n*comment endif\n\nThe first of the trees appears on the horizon, but it still takes half a day to reach them. By then the sun is starting to set, and there are still whole days of travel in between you and the place the Wolf-dream has marked in your mind, hot and vibrant like a brand.\n*page_break \n\nThe place you find to the south of the steppe, the place you remember as the site of your own burning over and over again, is little more than rubble when you arrive. The campsite lies at the bottom of a gully you climb down into. The smell that greets you is not so different from the one in your dream; burned hair, singed flesh. \n\nThe camp was little more than a handful of tents, which are now burned-out husks.\n*if ((sensitivity >= 20) or (quickthinking >= 20))\n\tYou notice there are no bones, no corpses.\n*comment endif\n\nYou circle the camp three or four times before forcing yourself to decide what to do next. You have to make sense of the scene, discover who was responsible for burning this Wolf worshiper camp to the ground. You have several ways to go about it:\n\n*fake_choice\n\t#I cut my flesh and mix my blood into the dirt where the lives of Wolf's own children were taken. If the land is sympathetic, I will have an answer.\n\t\tYour blood is more directly connected to Wolf than anyone's, and you can use that to your advantage. You bite down on the side of one wrist and elicit a few droplets of blood that you smear into the charred dirt. The feeling that follows is like being nudged by the wind.\n\n\t\tThe forces you have roused from the dust urge you eastward, and you follow.\n\t#I look for the tracks around the camp and follow where they lead.\n\t\tYou comb the campgrounds for nearly an hour before you find the tracks you are looking for. Here a print of a boot in soft earth, and there a trail of snapped twigs leading east. You carefully follow the trail and trust in your instincts and experience to lead you onward.\n\t#Check the ruins of the village. If the fires are just recently guttered out, whoever burned this camp down must be nearby.\n\t\tYour search method relies more heavily on conjecture than you are comfortable with, but ultimately, it is the best option available to you. Sure enough, the fires were burning hot until somewhat recently. You search the perimeter of the campsite and eventually come to a hard-packed path you would barely call a road. You follow it with increasing surety that you are moving in the right direction. If nothing else, a wolf trusts ${his} gut.\n\nThe search leads you just over a mile to the east and over hilly, rocky terrain. A village awaits you, if such a small collection of log cabins could be called a village. You hear a whistle as you approach the cabins, and look up to find a lookout atop one of the structures aiming a bow at you. The sentry cannot have more than thirteen years on his skinny body, but he holds the weapon with steady confidence. You get the sense he has had cause to use it before now. \n\nThe boy's whistle calls others from their homes, and before long there's nearly a dozen people standing in a loose arrangement in front of you. \n*if sensitivity >= 20\n\tTheir clothes are threadbare and much mended.\n*comment endif\n\nOne of the villagers, a blocky woman with a tight scowl, muscles through the gathering and addresses you.\n\n\"Stranger,\" she says, packing the single word with suspicion. \n\n\"A group nearby was killed. The trail ends here,\" you tell her, skipping pleasantries. \n\nHer eyebrows furrow in confusion. \n*if ((sensitivity >= 25) or (quickthinking >= 25))\n\tThe gesture is almost innocent enough for you to believe that what she says next is the truth. Almost. \n\t*goto convo_cont\n*else\n\tIt is a natural gesture you suspect means this is the first time she is hearing these charges, but the worried glances the villagers are trading gives you reason to suspect she is not being entirely forthcoming with what she says next. \n\t*goto convo_cont\n*label convo_cont\n\"My people go out to hunt on occasion, but they never engage others. It is dangerous enough without coming to blows over the occasional deer or boar. Would you agree, stranger?\"\n\n*fake_choice\n\t#\"Are you sure you want to lie to the Wolf avatar?\"\n\t#\"The trail ends here, and I think you want to come clean before we have to have a disagreement.\"\n\t#\"What, exactly, did you do to the Wolf worshipers at that camp?\"\n\nYou demand an explanation and step forward, causing the young sentry to loose a warning arrow, which lands at your feet.\n\n*if ishko_aid\n\tThe woman-leader raises a hand, and the sentry does not fire again. \n\n\t\"One of our brothers-in-arms came from a trip to the west in the last few weeks. He told us many things, including a rumor that Ishko was saved by a ${man_woman} who arrived from the wild. I don't think it's a coincidence that you arrive here asking questions about the Wolf worshipers. Are you the Wolf avatar?\"\n\n\tYou give her a long stare before nodding. \n\n\tShe swears and bites her bottom lip. The villagers behind her look amongst themselves and pointedly avoid your gaze. \n\n\t\"It was not supposed to happen how it did,\" their leader says. \"This far south, things are different from how they are in Ishko. Different, but not so different, you understand. The soldiers from the Rising Sun came at the end of winter, promised cooperation, and told us the wolves in the forest were keeping great stores of food while we starved. We survived the winter, but…\"\n\n\tYou look around at the gaunt faces and tattered rags the villagers are wearing. You can already tell how the story played out. \n\n\t\"The planting is slow-going and the harvest is still a long way off. We were starving and the wolves—\" the leader sees your expression go dark at the slur. \"—Excuse me, the Wolf worshipers. They were fewer than we are and they had so much food stored. We only meant to trade, but they were fierce. I couldn't hold my people back, and the Wolf worshipers didn't even try to…\" She pauses. Stands straighter. \"The food was a lie. They barely had any more than we did, but we didn't know until after. We burned the bodies.\"\n\n\tThe body is Wolf's temple and burning it after death is a small token of respect to the savage god. But the fact remains that these villagers murdered Wolf's worshipers on the basis of a rumor. Your fist is curled so tightly when you hear this news that when you unfurl your fingers, there's a bright red line where your nails met your flesh. Your anger is righteous, but you are not all Wolf, and in the relative calm of reflection, where do you think the blame for this attack lies? \n\n\t*label clearwater_judgement\n\t*choice\n\t\t#With the Clearwaters themselves: They slaughtered people who had faith in Wolf. There is no need to look further to find blame.\n\t\t\t*set action %+10\n\t\t\tOf course these Clearwaters are responsible for the deaths. It was with their own hands that they slew your brothers and sisters. Whatever comes next, you can go forward with the certainty that they deserve to pay a blood price for their actions and anything less would be a mercy.\n\t\t\t*goto village_fate\n\t\t#With the Rising Sun: They manipulated these villagers into killing their enemies through falsehoods.\n\t\t\t*set equity %+10\n\t\t\tThe Rising Sun came to these people and prodded their weaknesses, forced them to make a terrible choice like an animal with a limb stuck in a snare. You try to keep in mind that in this situation, these people were not the hand that struck your Wolf siblings down. They were the knife.\n\t\t\t*goto village_fate \n\t\t#It does not matter who was responsible. All involved must pay. \n\t\t\t*set action %+5\n\t\t\t*set equity %+5\n\t\t\tWhoever wielded the knife or drew the bow is as culpable as the voice that whispered in their ear. The Clearwaters and the Rising Sun and anyone else whose fingers are in this mess are responsible, and it falls to you to mete out fit punishment.\n\t\t\t*goto village_fate\n\t\t#No decision can be made about the intent of the attack without further investigation.\n\t\t\t*set deliberation %+10\n\t\t\tNo one will benefit from hasty decisions here. The worshipers of Wolf are dead and neither hand-wringing nor immediate violence will put breath back into their charred bodies. You try to remind yourself of that every few moments and hope that the thought will bring with it some much-needed calm.\n\t\t\t*goto village_fate\n\t\t*selectable_if (tribe = \"Clearwater\") #[i]Clearwater Clan[/i]: Clearwaters would not have attacked except for under extreme pressure. I know people like this, communities like this, they would not have killed without reason.\n\t\t\t*set deliberation %+5\n\t\t\t*set equity %+5\n\t\t\tYou are more than familiar with the Clearwater attitudes toward outsiders, but you find it hard, verging on impossible, to believe the Clearwaters would have killed Wolf worshipers, or anyone, without being pushed to it. You do not necessarily think that excuses the matter, but it helps you uncurl your fists. \n\t\t\t*goto village_fate\n\n\t*label village_fate \n\n\tSo you are left standing before a handful of starving villagers implicated in an act of great violence against the god you once served. You press down the unthinking rage that is a part of Wolf's legacy. At least for long enough to make a decision. What do you decide to do with them?\n\n\t*choice\n\t\t*selectable_if ((van_attacked = false) and (van_v_risers = false)) #Counsel the Clearwaters to connect with Mara's Caravan, thus ensuring their survival through the next rough winter.\n\t\t\t*set equity %+10\n\t\t\t*if (((quickthinking >= 25) or (influence >= 3)) or (survival >= 25))\n\t\t\t\t*set sensitivity +5\n\t\t\t\t*set village_state 1\n\t\t\t\t*set pantheon_regard +1\n\t\t\t\t*set clearwater_aid true\n\t\t\t\t*set suggest_village_aid \"Ishko\"\n\t\t\t\t*label village_aid_decision\n\t\t\t\tYou point out their thin faces and torn clothing. \n\n\t\t\t\t\"You will not last another winter on your own,\" you tell them.\n\n\t\t\t\t\"We will. We always have,\" the leader replies, her voice is tired though her shoulders are square. \n\n\t\t\t\tYou shake your head. \n\t\t\t\t*if suggest_village_aid = \"Ishko\"\n\t\t\t\t\t\"Mara's Caravan is three days' travel to the north, at the edge of the steppe. Send a rider and make arrangements with them to trade through the cold months. Otherwise, I advise you to make for Ishko and beg shelter, because your life here is untenable.\"\n\t\t\t\t*if suggest_village_aid = \"Risers\"\n\t\t\t\t\t\"From the moment you accepted their words as truth, you became a part of the Rising Sun's group. Seek them out for your shelter. You have proven to yourselves to be their creatures. They will accept you. Otherwise, you will not survive the next hard winter. I promise you that.\"\n\n\t\t\t\t\t\"We have no love for the Sun Soldiers,\" the village-leader says. \n\n\t\t\t\t\t\"Fine. But love won't keep you alive,\" you reply. \n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tThe mood of the town is somber, but you can see they are carefully considering your words. Their leader can catch the scent of a growing consensus as easily as you can. She's shrewd, and it is not difficult to see how she came to be in charge of these people. \n\n\t\t\t\t\"And the worshipers? You expect us to believe that the avatar of Wolf will let us walk away from their deaths unharmed?\" the town's leader asks. \n\n\t\t\t\t\"Wolf is gone,\" you reply. \n\n\t\t\t\tThere are a few gasps. The Wolf god is not well-loved: Who could truly love a force of violence and hunger? But your suggestion that a god could disappear is still a kind of blasphemy.\n\n\t\t\t\t\"The choice of how to move forward is yours, but you have my recommendation,\" you tell them.\n\n\t\t\t\tThe villagers are still on edge as you turn away. The sentry still holds his bow at the ready and their leader never takes her eye off of you, but once you turn your back to the Clearwaters, in your mind, your business with them is over. If you think about them and nurse the anger seething just under your calm demeanor, it would end with their bodies strewn on the ground. \n\n\t\t\t\tYou place one foot in front of the other and walk away without doing harm to a single person. \n\t\t\t\t*goto leave_village\n\t\t\t*else\n\t\t\t\t*goto village_aid_fail\n\t\t#Tell the Clearwaters to join with the Risers, because without the aid of a larger group, they will remain a hungry, desperate people open to the manipulation of others.\n\t\t\t*set equity %+10\n\t\t\t*set suggest_village_aid \"Risers\"\n\t\t\t*if (((influence >= 2) and (riser_affinity > 50)) or ((sensitivity + quickthinking) >= 30))\n\t\t\t\t*set chaos_score +1\n\t\t\t\t*set survival +5\n\t\t\t\t*set village_state 1\n\t\t\t\t*goto village_aid_decision\n\t\t\t*else\n\t\t\t\t*set restraint %-5\n\t\t\t\t*label village_aid_fail\n\t\t\t\tYou explain to the villagers it will be difficult for them to survive without the aid of a larger group to provide goods and services they do not have enough hands to do themselves. You try to explain this as gently as you can, considering that these villagers are responsible for the death of Wolf's worshipers, your brothers and sisters in faith. \n\n\t\t\t\tPerhaps it is in the tone of your voice, the natural ferocity of your stance, or the mere suggestion of danger, but the villagers refuse to consider your words. \n\n\t\t\t\t\"We will survive on our own, stranger, as we have for years,\" their leader explains. \n\n\t\t\t\t\"This is survival? Attacking other groups as if you were half-starved dogs?\" you reply, snarling without exactly meaning to. \n\n\t\t\t\t\"We were lied to and we regret what happened, but we will be vigilant going forward,\" she says.\n\n\t\t\t\t\"You will be, because it will not go well for you if I have to return.\"\n\n\t\t\t\tThe village-leader's posture stiffens, but to her credit, she does not rise to the provocation. The villagers take her lead and mostly remain calm, though you can see that a few of them are biting back the urge to fight.\n\n\t\t\t\tIt takes some amount of restraint to turn away from the Clearwater village, especially knowing that there is a sentry with a bow trained on your back. But the villagers have made their choice, and you have other concerns beside their folly to attend.\n\t\t\t\t*goto leave_village\n\t\t#Finding any survivors among the wrongly attacked and displaced Wolf worshipers is your main priority. Tell the Clearwaters they will aid in the search or face your wrath.\n\t\t\t*set deliberation %+10\n\t\t\t*if (((influence >= 3) or (equity >= 70)) or ((sensitivity + combat) >= 35))\n\t\t\t\t*set clearwaters_search true\n\t\t\t\t*set village_state 1\n\t\t\t\t*set pantheon_regard +1\n\t\t\t\tYou speak and the villagers stare at each other in surprise, as if waiting for you to reveal some trick. They probably wonder if it could really be so simple earn the forgiveness of the vengeful Wolf god. \n\n\t\t\t\tYou repeat yourself: \"You will comb the woods and search for any survivors. Preferably before nightfall?\"\n\n\t\t\t\tThey will not move on your authority, but eventually their leader gives her consent with a tight nod, and they scatter. A few of them stay behind to stand beside their leader, presumably to protect her from the dangerous stranger. \n\n\t\t\t\t\"Do you think they will find anyone out there?\" the woman-leader asks. \n\n\t\t\t\t\"It is possible, but there are no certainties,\" you reply.\n\n\t\t\t\t\"You have no faith?\"\n\n\t\t\t\t\"I will answer that once they find survivors.\"\n\n\t\t\t\tYou set off to the forest yourself and no one stops you or questions your aims. The Clearwaters might well find surviving Wolf worshipers, but they do not have your nose, and they do not have your senses. You have to join in the search yourself. \n\t\t\t\t*goto leave_village\n\t\t\t*else\n\t\t\t\t\"We would help you if we could, but our priority is to fend for ourselves. To survive. We cannot spare the hands,\" the village-leader explains. \n\n\t\t\t\tYou stare at her in something like shock. \n\n\t\t\t\t\"You refuse to give so little of yourselves to repay what you owe? You should be begging clemency,\" you growl. \n\n\t\t\t\tA handful of the villagers step back, though you pose no immediate danger to them. To her credit, their leader does not move. \n\n\t\t\t\t\"This is about survival,\" she says. \n\n\t\t\t\t\"And you will not survive, if you do not right the wrong you have done.\"\n\n\t\t\t\t\"I am sorry.\"\n\n\t\t\t\t\"Not yet,\" you say, and step toward her. \n\n\t\t\t\tThe armed villagers move forward at the perceived threat and their leader allows it. It is not long before they are crowding forward and brandishing their weapons. \n\t\t\t\t*goto clearwaters_fight\n\t\t#Leave the villagers alive, but burn down their village. When they are forced to scrape by without a home or basic safety considerations, then they will understand the gravity of what they have done.\n\t\t\t*set action %+5\n\t\t\t*set deliberation %-5\n\t\t\t*set selfishness %+5 \n\t\t\t*set equity %-5\n\t\t\t*if (((combat + ritual) >= 30) or ((influence >= 3) and (survival >= 20)))\n\t\t\t\t*set ara_affinity %+10\n\t\t\t\t*set quickthinking +5\n\t\t\t\t*set village_state 3\n\t\t\t\t\"You can survive without this place you call home. It is a bloodless price for your crimes against Wolf. Any other god would demand more than this pittance,\" you tell them. \n\n\t\t\t\tTheir leader, so sure of herself until now, falters. \n\n\t\t\t\t\"We cannot. It is too much to ask,\" she says. \n\n\t\t\t\t\"The other option is death. Would you prefer it? Would you condemn your people?\"\n\n\t\t\t\tShe seems like she is about to challenge you, but an old shaman approaches and puts a hand on her shoulder. The shaman regards you with one white iris, then turns back to the village leader. \n\n\t\t\t\t*if gender = \"none\"\n\t\t\t\t\t\"$!{he} are\n\t\t\t\t*if gender != \"none\"\n\t\t\t\t\t\"$!{he} is\n\t\t\t\tserious. If we fight here, we risk losing many. If we accept this judgment, then we have a chance to start over.\" The shaman tugs at her sleeve. \n\n\t\t\t\tShe blinks back tears and is sober-eyed when she next meets your gaze.\n\n\t\t\t\t\"Will you give us time to collect our belongings?\" she asks.\n\n\t\t\t\t\"I can do that much.\"\n\n\t\t\t\tThe villagers collect what little they own before you set fire to their town. \n\n\t\t\t\tThe buildings in the town are modestly constructed with the goal of keeping the cold out rather than standing up to arson. \n\t\t\t\t*if ritual > combat\n\t\t\t\t\tYou hardly need to do more than imagine the town burning and you can already hear the excited whisper of the flames sleeping within the dry wood of the buildings in town, ready to ignite. You ask the flames to wake and they do slowly, raising fire and smoke high above the town. The ritual is exhausting, doubly so considering you have to keep an eye out from an attack from the villagers, but they keep their distance. Their fear keeps them docile. \n\t\t\t\t\t*goto burnt_town\n\t\t\t\t*else\n\t\t\t\t\tA few of the villagers shout abuse and one or two approach you before their family and friends drag them away. Ignoring them, you gather enough wood to set the first building aflame. The fire spreads, and you help it along by taking a torch from home to home. It is grim and grueling work, yes, but you do it without flinching. \n\t\t\t\t\t*goto burnt_town \n\n\t\t\t\t*label burnt_town\n\n\t\t\t\tThe burning does not calm you and the wailing of the more emotional villagers does not bring you peace, but there is a sense of balance about what you have done that feels right in your gut. You cannot help but feel that even Wolf, as bloodthirsty and unthinking as he could be, would have approved of this resolution. \n\n\t\t\t\tThe villagers wander away from the flames and to whatever future lies before them. You wait until the fires rise to their highest point and ensure that the blaze poses no danger to the surrounding woods before you leave the burning village behind. \n\t\t\t\t*goto leave_village\n\t\t\t*else \n\t\t\t\tYou tell the Clearwaters gathered before you that you intend to burn down their village, and their looks are incredulous. \n\n\t\t\t\tThe woman-speaker cocks a head to the side. \"Do you think we will allow this? Are you mad?\"\n\n\t\t\t\tYou bare your teeth. As unnaturally long and sharp as they are, it gives an effect of terror. \n\n\t\t\t\t\"Do you think I am offering you a choice?\" you ask.\n\n\t\t\t\tThe village leader has iron in her spine. She replies, \"No. I suppose you are not.\" She gestures to her people and they surge forward.\n\n\t\t\t\t*goto clearwaters_fight\n\t\t#Demand reparations be paid to the Wolf avatar. They will give me whatever they have that is of value.\n\t\t\t*set selfishness %+10\n\t\t\t*if (((influence >= 3) or (combat >= 25)) or (ritual >= 25))\n\t\t\t\t\"You will repay the offense you have offered Wolf,\" you tell the villagers. \n\n\t\t\t\t\"We have nothing of value to you here, unless you mean to starve us and our children,\" their leader replies. \n\n\t\t\t\t\"I can extract my payment in blood and bone, if you prefer.\"\n\n\t\t\t\tSome of the villagers are visibly rattled by your threat, but the village-leader raises a hand and calls for calm. \"We have one thing of consequence. A set of rituals handed down to us from Mother Hawk. Both are sacred to us; one of them is used to keep our hunters safe on their long hunts and the other to foster a deeper connection with the goddess. We can offer you knowledge of one, but not both. And Hawk will not be pleased to have her secrets pilfered.\"\n\n\t\t\t\tWhich ritual will you take from the Clearwaters?\n\t\t\t\t*choice\n\t\t\t\t\t#The hunting ritual, which will increase my ability to survive dangerous situations.\n\t\t\t\t\t\t*set survival +5\n\t\t\t\t\t\t*set clearwater_gift \"survival\"\n\t\t\t\t\t\t*label ritual_gains\n\t\t\t\t\t\t*set hawk_affinity %-5\n\t\t\t\t\t\t*set bear_affinity %-10\n\t\t\t\t\t\t*set village_state 1\n\t\t\t\t\t\tThe village shaman comes up through the group and looks you over with one milky eye. \n\n\t\t\t\t\t\t\"Thought you'd be bigger,\" the shaman, of indeterminate gender, says.\n\n\t\t\t\t\t\t\"Well you'll have to close your eyes, obviously,\" the shaman chides, and you do. \n\n\t\t\t\t\t\tThe experience that follows is a strange combination of wonder and frustration. You try to grasp at the feeling, which fills your head like a consistent buzz, but is not exactly noise. It is as if there are words of some dream-language filling up your head. You struggle and strain to understand it, but the more you reach for it, the further understanding flees.\n\n\t\t\t\t\t\t\"Well, open your eyes, or do you want to finish your daydream first?\" The sardonic voice of the shaman cuts into your thoughts.\n\n\t\t\t\t\t\t\"You are an impertinent wizened thing,\" you say, then open your eyes. \n\n\t\t\t\t\t\tThe shaman shrugs. \"I have been called worse. The ritual is yours. I hope you choke on it.\"\n\n\t\t\t\t\t\tThe leader of the village makes herself known again and gestures ruefully toward the woods from which you emerged. \"We have nothing else for you, Wolf-faithful.\"\n\n\t\t\t\t\t\tYou feel different. Changed. \n\t\t\t\t\t\t*if clearwater_gift = \"ritual\"\n\t\t\t\t\t\t\tThe sky above you seems to be whispering, and the colors around you are more vibrant than they have ever been.\n\t\t\t\t\t\t*if clearwater_gift = \"survival\"\n\t\t\t\t\t\t\tYour lungs feel fuller and your legs sturdier. It feels as though you could run for ten miles or more without tiring.\n\t\t\t\t\t\t*comment endif\n\n\t\t\t\t\t\t\"This is enough,\" you tell them. You are not entirely sure it is. Does it make up for the dead worshipers? Perhaps not, but this ritual will help you, and that will have to be enough for now. \n\n\t\t\t\t\t\tYou turn to leave the village, and you can feel them watching you go. Waiting, maybe, for you to change your mind and attack. You have more important things to do. \n\n\t\t\t\t\t\t*goto leave_village\n\t\t\t\t\t#The communication ritual, which will make me more capable of getting the attention of the gods.\n\t\t\t\t\t\t*set pantheon_regard +1\n\t\t\t\t\t\t*set clearwater_gift \"ritual\"\n\t\t\t\t\t\t*goto ritual_gains\n\t\t\t\t\t#I want both. Naturally. \n\t\t\t\t\t\t*set selfishness %+5\n\t\t\t\t\t\t*set equity %-5\n\t\t\t\t\t\t*label avarice\n\t\t\t\t\t\tThe village-leader smirks, but the expression seems sad on her broad face. Or perhaps just resigned. \n\n\t\t\t\t\t\t\"Your avarice is disappointing, Wolf avatar. We were fools to consider making any deal with your like.\"\n\n\t\t\t\t\t\tShe drops a hand and an arrow flies. You dodge it, but there can be no doubt. The villagers mean to fight. \n\n\t\t\t\t\t\t*goto clearwaters_fight\n\t\t\t*else \n\t\t\t\t*goto avarice\n\t\t#Slaughter the Clearwaters for their actions.\n\t\t\t*set action %+10\n\t\t\t*set deliberation %-10\n\t\t\t*if ((combat >= 20) or (ritual >= 20))\n\t\t\t\t*if (combat > ritual)\n\t\t\t\t\t*goto combat_slaughter\n\t\t\t\t*else\n\t\t\t\t\t*goto ritual_slaughter\n\t\t\t*else\n\t\t\t\t*if (combat > ritual)\n\t\t\t\t\t*goto combat_defeat\n\t\t\t\t*else\n\t\t\t\t\t*goto ritual_defeat\n\t\t#Kill only their leader, allowing the others to survive with the death of their leader as a warning.\n\t\t\t*set action %+5\n\t\t\t*set equity %+5\n\t\t\t*if (((influence >= 2) and (combat >= 15)) or ((influence >= 2) and (survival > 15)))\n\t\t\t\t*if pacifism \n\t\t\t\t\t*set pacifism_broken true\n\t\t\t\t*set death_toll +1\n\t\t\t\t*set sensitivity +5\n\t\t\t\t*set village_state 2\n\n\t\t\t\tA few of the villagers object loudly and raise their weapons with every intention to fight, but their leader settles them down with one clear shout.\n\n\t\t\t\t\"A fair deal,\" she says. \n\n\t\t\t\tThe incredulous noises that come from the villagers she leads suggests she is well-liked or at least that these people have enough pride in themselves to stand up for their own. Either way, it does not change the circumstances. The exchange of one Clearwater life for all of those they have killed is more than fair. \n\n\t\t\t\tShe comes forward with the confident gait of a soldier. \n\n\t\t\t\t\"Do not seek vengeance for this,\" she tells her people. \"It ends here.\"\n\n\t\t\t\tShe looks into your eyes as if searching for some confirmation that you will keep your word. There is nothing there for her to find. She cannot know your mind, so it is doubly noble for her to offer herself as a sacrifice. \n\n\t\t\t\t\"It ends here,\" you agree. \n\n\t\t\t\tYou have no reason to make her suffer, so you do not. When it is over you turn the body over to the villagers to bury or burn. None of them will meet your gaze, and you could not expect anything different. As you watch them swaddle her body in white cloth and prepare it for burning—the Clearwater's preferred method for disposing of the dead, commending them to the sky—you learn something of their small mercies and take that knowledge with you. \n\n\t\t\t\tYou return to the woods from which you came and half-expect the villagers to follow, incensed and bloodthirsty, but by the time the log cabins disappear from view, you cannot see one person behind you. \n\n\t\t\t\t*goto leave_village\n\t\t\t*else\n\t\t\t\tThe woman-leader looks at you, blinks, and actually laughs out loud. \n\n\t\t\t\t\"You have been in the wild too long.\"\n\n\t\t\t\tShe gestures to the villagers behind her and they slowly move toward you. \n\n\t\t\t\t*goto clearwaters_fight\n*elseif riser_affinity >= 58\n\t\"The Sun soldiers told us about Ishko and their ally there. Now that I consider it, you fit that description quite well. Have you come to tell more of their tales?\" their leader asks, her tone full of spite. \n\n\tThe woman drops a hand, and another arrow comes sailing. This time it is not intended to miss. You dodge out of the way, but the villagers are spreading out and wielding actual weapons, not the improvised farming implements of their Ishkoan brethren. \n\n\t\"Did you think you could come into our home and finish what your friends started?\" she asks. \n\n\tYou try to respond, but she hisses over you. \"Enough talking, stranger.\"\n\n\t*label clearwaters_fight\n\n\tDo you reply with violence of your own, or do you attempt to force a diplomatic solution? \n\n\t*choice\n\t\t#Protect myself without killing the attacking Clearwaters.\n\t\t\t*set deliberation %+5\n\t\t\t*set action %-5\n\t\t\t*if pacifism\n\t\t\t\t*set pacifism_broken true\n\t\t\tThe villagers come streaming toward you as soon as they realize you aren't going to give up peacefully. They are largely untrained, but there are a few fighters among them. You take them on in ones or twos and hold your own. You doubt the child-sentry will fire arrows into the group, which is a relief, but stray too far from the group, and he won't hesitate to put an arrow into you.\n\n\t\t\t*if (((combat >= 20) and (restraint >= 33)) or ((ritual >= 20) and (restraint >= 33)))\n\t\t\t\t*if (combat >= ritual)\n\t\t\t\t\t*set village_state 1\n\t\t\t\t\tThe villagers who have not been thoroughly trained to fight are not much of a challenge. They tire easily and telegraph their moves with every swing of the ax or slice of the sword. You wear them out by dancing around their clumsy strikes, instead of parrying their blows and leaving yourself open to follow-ups by their better-trained peers. Once the weaker ones start to slow, you sweep their legs or drive your elbows and knees hard into their ribs or break their noses. \n\n\t\t\t\t\tThe blows hurt enough to incapacitate without killing and leaves you more time to deal with the actual fighters among them. \n\n\t\t\t\t\tThere are only a few, but they are fierce. The three of them try to corral you and press the advantage of their superior numbers. But they have not faced your like before. Your speed is greatly enhanced by your time spent harboring the divine, and their blows land on open air. You can almost tell the moment when the balance tips from predator to prey in your favor. \n\n\t\t\t\t\tOne of the fighters breaks from the group and tries to escape. It is enough of a distraction for you to take down another and engage the last in a fistfight that ends with him splayed out in the dirt. You keep moving, though, already anticipating the sentry's arrows, and they begin raining down before long. \n\n\t\t\t\t\tYou need only move out of the range of his shots to frustrate the young archer and eventually he lowers his weapon, defeated by practicality. \n\n\t\t\t\t\t*label fight_end_nonlethal\n\t\t\t\t\t\"The fact that you are alive to groan into the dirt is a gift,\" you tell the defeated villagers. \"Get up. Lick your wounds, but do not forget that it was by my kindness that you lived. Harm another who belongs to Wolf and the next price will be steeper.\"\n\n\t\t\t\t\tYou turn and walk away without another word. What else is there to say? You let them live. You trust they are grateful enough. \n\n\t\t\t\t\t*goto leave_village\n\t\t\t\t*else\n\t\t\t\t\tFor most shamans, a ritual requires careful planning and days of preparation to execute even the simplest of feats. Your relationship with the divine is different. Was it because of Wolf's influence on your body and soul, or did your natural aptitude make you attractive to the erstwhile god? You do not know, but when you call to whatever forces lie dormant in this village, they reply in force.\n\n\t\t\t\t\tThe roots of the great trees of the surrounding woods reach up through the earth like fingers to grab at those who come against you. The villagers cry out at the supernatural assault and try to hack at the roots while they coil around ankles and legs. The child archer on the roof fires arrows, but the wind blowing through the village is allied against him, and he consistently misses his mark. \n\n\t\t\t\t\tOne of the villagers, an ancient shaman, chants his ritual words in an attempt to thwart or invert your own rites, but the shaman is unable to stop or slow your workings. You almost feel sorry when the ground trembles beneath him, and a root slaps the fragile ritualist aside.\n\n\t\t\t\t\tBefore long, all of the villagers who raised weapons against you have been taken care of, but still live. \n\n\t\t\t\t\t*goto fight_end_nonlethal \n\t\t\t*elseif ((combat >= 25) or (ritual >= 25))\n\t\t\t\t*set restraint %+10\n\t\t\t\t*set death_toll +15\n\t\t\t\t*if (combat >= ritual)\n\t\t\t\t\t*set action %+10\n\t\t\t\t\t*set village_state 4\n\t\t\t\t\tSome of the villagers are not strong fighters. You can tell by the way they tire after just a few strikes and how easily you can dispatch them. The ease of their defeat stokes something in you, and you find yourself wanting to push them harder, to see what they are really capable of. You bring down a kick on a villager's already twisted leg and delight in the crunching of broken bone.\n\n\t\t\t\t\tYou did not mean to hurt the man, at least not entirely. It was just easy to do and so you do it. You find yourself growing hungry for the hunt, so you are pleased when the other villagers keep coming. \n\n\t\t\t\t\tYou do not kill all of them. Some are truly worthy adversaries and you try to leave them alive, but the others are inconsequential. They do not even offer a challenge, and so their lives are made meaningless. \n\n\t\t\t\t\tEventually, you get your fill of destruction and you realize how far you have gone when you only meant to defend yourself. You survey the wrecked bodies before you and feel a contentment of sorts. It is a deep satisfaction that is on one hand relaxing and on the other truly terrifying. \n\n\t\t\t\t\tYou leave the village quickly and no one follows you. They would not dare. \n\t\t\t\t\t*goto leave_village\n\t\t\t\t\t*comment combat success & restraint failure\n\t\t\t\t*else\n\t\t\t\t\t*set action %+10\n\t\t\t\t\t*set village_state 4\n\t\t\t\t\tYou were cautioned once by the ${tribe} shaman who served as your informal instructor in the arcane rites, that beseeching the gods or calling to the land while in the grips of turbulent emotion was an unparalleled danger. Still, you reach out to the land, and the wind, and the heat of the sun that the earth remembers, and call them up in your defense. \n\n\t\t\t\t\tThe forces of the land respond, and everything afterward is chaos. One of the villagers erupts into flames while another is strangled to the ground by a huge root that suddenly emerges. You try to pull the freakish piece of nature away from the man with the force of your intent, but by the time you do, he has gone limp.\n\n\t\t\t\t\tA terribly old shaman mutters sacred words in an attempt to settle the forces you have brought to bear on this village, but the situation has gone beyond his capabilities. He collapses into an exhausted heap, and the madness around him rages on. \n\n\t\t\t\t\tEventually you manage to quiet the raging forces, but the damage is already done. Several villagers lie dead and others wander aimlessly in the wake of the strange and sudden attack.\n\n\t\t\t\t\tThere is no apology that can make up for the lost lives, so you do not even try. It would be only be an insult at this point and, if you are honest, there is a part of you that enjoys the kill. There is a thrill to it that leaves you feeling more satisfied and clearheaded afterward. You leave the broken village behind without a second glance.\n\t\t\t\t\t*comment ritual success & restraint failure\n\t\t\t\t\t*goto leave_village \n\t\t\t*else \n\t\t\t\t*if (combat >= ritual)\n\t\t\t\t\t*label combat_defeat\n\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t*set defeat_by_clearwaters true\n\t\t\t\t\t*set village_state 1\n\t\t\t\t\tYour best option is to take on the villagers one at a time and split them up so that they don't overwhelm you.\n\n\t\t\t\t\tThe first few villagers are clearly not trained for combat. They overreach and work themselves too hard while trying to land blows. It is easy to evade them, and you let them tire themselves out before you deliver incapacitating blows.\n\n\t\t\t\t\tBut then the genuine fighters move in. They are slow and methodical. They employ exploratory feints and counter-moves in order to take the measure of your speed and strength. They surround you and draw you into making strikes that weaken your position. One of them dives in, deft as a snake, while another comes up on your side and sweeps your leg from under you with the butt of a spear. \n\n\t\t\t\t\t*label save_before_death\n\t\t\t\t\tIt's only at the last instant, when the spear point is coming down toward your throat, that you call on your reserves of strength and power, which gives you enough speed to roll away. You leap to your feet. The villagers, so sure that they had you pinned, are unprepared when you sprint toward the woods. \n\n\t\t\t\t\tYou can hear the experienced fighters giving chase, but the voice of their leader shouts out. \n\n\t\t\t\t\t\"Leave ${him}. Let ${him} crawl back to where ${he} came from,\" she says, and your pursuers break off behind you. \n\n\t\t\t\t\tIt is humbling to be defeated, and you can almost hear Wolf's mocking snarl in your ears. But it is just your sense of chafed pride that follows you into the woods. \n\t\t\t\t\t*goto leave_village\n\t\t\t\t\t*comment combat failure\n\t\t\t\t*else\n\t\t\t\t\t*label ritual_defeat\n\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t*set defeat_by_clearwaters true\n\t\t\t\t\tYou call out to the land, and the wind, and all of the elements therein for their support, and they respond instantly. It is not so easy for most who practice the deep mysteries. It takes a strong will to be so cavalier with the rites of power. \n\n\t\t\t\t\tYou draw up the power of the earth, and the enormous roots of the great trees of the woods around the village start to emerge from the ground. They whip about frantically and send the armed villagers scattering. The young archer on the roof lets his arrows fly, but the air, it seems, is on your side. The sentry's arrows miss their marks.\n\n\t\t\t\t\tYou have the shape of the ritual in your mind, and it is strong until it is not. The feeling of another ritualist twisting the shape of your rite is like having fingers digging through your skin in an attempt to extract your soul. The pain is excruciating, and when you fall to one knee you catch sight of the shaman, an ancient thing supported by a wooden cane and ashen with the strain of forcing your workings awry.\n\n\t\t\t\t\tThe shaman's interference gives his allies a chance to regroup. They come for you, and in your weakened state you hardly have the strength to fight them off. One of the villagers sweeps your leg with a spear and you tumble to the ground. \n\n\t\t\t\t\t*goto save_before_death\n\t\t\t\t\t*comment ritual defeat \n\t\t#Seek a diplomatic outcome.\n\t\t\t*if (((sensitivity >= 20) or (quickthinking >= 20)) or (influence >= 3))\n\t\t\t\t*set village_state 1\n\t\t\t\t*set bear_affinity %+15\n\t\t\t\t\"If this comes to blows, I promise you will lose friends, brothers, sisters in this fight. Even if you manage to defeat me, I will make the cost great enough for you to regret this day for the rest of your lives.\"\n\n\t\t\t\tThe armed villagers hesitate. \n\n\t\t\t\t\"And we should just let you go, then?\" the leader asks. \"Even knowing that you could return to kill us in our beds?\"\n\n\t\t\t\t\"You can live in fear of an unknown tomorrow or you can die right now for certain. Your choice,\" you reply.\n\n\t\t\t\tThe woman looks at you with a mix of resignation and disgust. \"Let ${him} go.\"\n\n\t\t\t\tYou incline your head in acknowledgment of her choice, but she is already walking away. You can understand why she might be eager to put this day behind her. \n\n\t\t\t\tAs for yourself, you head off toward the woods you came out of. If there is any sign of survivors from the Wolf worshiper massacre, then they should be your next goal.\n\t\t\t\t*goto leave_village\n\t\t\t*else \n\t\t\t\t*set restraint %-5\n\t\t\t\tYou attempt to negotiate with the villagers, but instead of listening they use the opportunity to rush you. You are forced into a defensive mode, and things quickly turn ugly. \n\n\t\t\t\tThough not all of the villagers are capable fighters, a few of them are and they come against you in a fury. You hold them off for a while, but they press their advantage and it is not long before you find yourself in a bad position. \n\n\t\t\t\tOne of the better fighters manages to use his spear to sweep you off your feet and you fall badly. \n\n\t\t\t\t*goto save_before_death\n\t\t#Sate my Wolf's urge: Kill them all.\n\t\t\t*if ((combat >= 20) or (ritual >= 20))\n\t\t\t\t*if (combat >= ritual)\n\t\t\t\t\t*label combat_slaughter\n\t\t\t\t\t*if pacifism\n\t\t\t\t\t\t*set pacifism_broken true\n\t\t\t\t\t*set restraint %+20\n\t\t\t\t\t*set death_toll +30\n\t\t\t\t\t*set village_state 4\n\t\t\t\t\tThere's no reason for you to hold back. The boundaries that keep you civilized are erased when your life is threatened. If the villagers want to fight, then you are happy to oblige them. \n\n\t\t\t\t\tYou charge the first set and their terror is obvious as you leap into their midst. Your body falls into a calm rhythm of violence as you bash and claw through the soft, untrained bodies of the villagers before you. Toward the back of their ranks are real fighters who present a challenge and make you sweat with their feints and quick parries. The blood beats high in your ears and you sweat with the effort of taking them down, but they inevitably fall, too. \n\n\t\t\t\t\tWhen it is over, there is no one left to stand against you. The child archer cowers on his rooftop perch and you don't bother to go after him. How much fight would he offer, anyway? \n\n\t\t\t\t\tYou feel sore but satisfied afterward. The martial trial allowed your instincts to run rampant, and you appreciate the exertion. As for the lives you've claimed, you are sure that Wolf would have done worse, which makes it easy to put the dead behind you and walk purposefully back to the woods.\n\t\t\t\t\t*goto leave_village\n\t\t\t\t*else\n\t\t\t\t\t*label ritual_slaughter\n\t\t\t\t\t*if pacifism\n\t\t\t\t\t\t*set pacifism_broken true\n\t\t\t\t\t*set restraint %+20\n\t\t\t\t\t*set death_toll +30\n\t\t\t\t\t*set village_state 4\n\t\t\t\t\tAs a child, when you were first learning about your gift for ritual, the ${tribe} shaman who was your instructor cautioned you against calling out to the land, spirits, and gods, while in the grips of strong emotion. The results could be dire. \n\n\t\t\t\t\tBut you have the wrath of a god to visit upon these people, and you refuse to stem the tide. You reach out to the land, and the wind, and the very heat of the sun cradled in the ground's memory, then you unleash them all. The log cabins quake and lose structure, toppling in on themselves while several of the villagers burst into flames where they stand. The wind buffets those who try to escape the chaos and keeps the villagers corralled in the center of the fray.\n\n\t\t\t\t\tYou spy a shaman, old as time itself, attempting to shout his ritual words over the din, but the wind cuts off his words and a vortex surrounds him, choking the air from his lungs. \n\n\t\t\t\t\tEventually the righteous anger of the earth subsides, and what's left is a shambles. Many of the villagers lay unmoving while a few crawl about and attempt to rouse their fallen allies or see to their own wounds. You cannot help but feel vindicated in this. The Clearwaters brought this fury down upon themselves, and you were merely the vessel. \n\n\t\t\t\t\tUnburdened by conscience, you turn away and head back to the woods from which you came.\n\t\t\t\t\t*goto leave_village\n\t\t\t*else\n\t\t\t\t*if (combat >= ritual)\n\t\t\t\t\t*goto combat_defeat\n\t\t\t\t*else\n\t\t\t\t\t*goto ritual_defeat\n*else\n\t\"I cannot allow you to go any further. Please understand that we live in difficult times,\" the leader explains.\n\n\t\"Did you kill the Wolf worshipers?\" you ask at last.\n\n\tThe village-speaker goes silent. When she speaks again, her voice is barely above a whisper. \"It was not our intention to harm anyone. We wanted to do it a different way.\n\n\t\"We were told they were hoarding food. Poaching off of our lands and disappearing before we could respond. After a difficult hunting season, there was little enough to go around as it was. We had to do something. The confrontation…they were wolves in men's and women's skins. We would not have chosen to do what we did. No one would have chosen that. But it was a lie. They had no more food than we did. Our conflict. Their deaths. It solved nothing.\"\n\n\tYou take a moment to process this tale. Your brothers and sisters murdered for food that never existed. With calm that you do not feel, you ask, \"And who told you these lies?\"\n\n\t\"The Sun soldiers who came through here.\"\n\n\tThe Wolf worshipers are dead and your only consolation is that their bodies were burned, thus setting their souls free of the skin. There will be action next, and you will have to come to a decision about how to move forward with this knowledge. But for the moment you consider where the blame for this travesty falls. Who bears the greatest share of guilt? \n\n\t*goto clearwater_judgement \n\n*label leave_village \n*page_break\nYou leave \n*if village_state = 1\n\tthe bewildered, starving villagers behind\n\t*goto leave_village_2\n*elseif village_state = 2\n\tthe newly leaderless village behind \n\t*goto leave_village_2 \n*elseif village_state = 3\n\tthe smoking remains of the village behind\n\t*goto leave_village_2\n*else\n\tthe village behind\n\t*goto leave_village_2\n*label leave_village_2\nand head back to the ruined camp where the Wolf worshipers were killed. If any of them survived, then you might be able to track them from there. Merely being in the space where Wolf's followers died is disturbing, but without Wolf's direct intercession, there is no other way to find survivors. \n*page_break\nYou spend some time among the ashes looking for footsteps or waiting for some spark of divine knowledge, but nothing comes. Night is coming quickly, and you know that it is best to use the last of the failing light to find shelter. \n\nYou are climbing up out of the gully when you see a shape moving among the trees.\n\n\"Come out and face me!\" you shout. \n\nThe person, a ${lyall_gender}, emerges from the trees and you recognize something in ${lyall_his} bearing. $!{lyall_he} has the same fierceness in ${lyall_his} glare as you do. It is like looking into a mirror that reflects the deepest self. $!{lyall_his} hair is short and hastily cropped, ${lyall_his} fingers slide up and down the point of a throwing knife held light in ${lyall_his} right hand.\n\n\"You smell like a friend,\" ${lyall_he} says. \"But we will see the truth of that. What is your name?\"\n\n\"${prenom}.\"\n\n$!{lyall_he} does not visibly react to hearing your name, but after a moment slides ${lyall_his} knife into ${lyall_his} belt. \"The Wolf avatar arrives, then. Too late to save their lives. You know that, right?\"\n\n\"I had the dream and I came to do what I could.\"\n\n\"What you could,\" ${lyall_he} repeats.\n\n\"And who are you?\"\n\n\"Lyall. The so-called leader of this Wolf-enclave. What remains of it, anyway,\" ${lyall_he} says. \"We looked through what was left behind by whoever killed our brothers and sisters, but I felt I had left something behind, something undiscovered. I suppose it might have been you.\"\n\nYou understand something of ${lyall_his} impulse. Whatever causes ${lyall_his} gaze to linger on you, causes yours to do the same. An unspoken kinship, or something else. You do not have time to consider the feeling further. Lyall turns toward what might generously be called a path, and starts down it. \n\n\"I suppose you should follow me,\" ${lyall_he} says. \n\n*finish\n", "6_thewolflings": "*text_image chap_6.png center Six: The Wolflings\n\n[i]The young Bear initiate lowered the water bucket at the top of the hill, careful not to spill a single drop. His mentor smiled.[/i]\n\n[i]\"How long do I have to do this?\" the initiate asked.[/i]\n\n[i]\"A few days. Weeks. It depends.\"[/i]\n\n[i]\"On what?\"[/i]\n\n[i]\"On how long you intend to have clean water to drink,\" the mentor answered patiently.[/i]\n*line_break\n- an oft told anecdote.\n*page_break \n\nLyall takes you through the woods and follows paths that \n*if survival > 15\n\tyou recognize as being hidden or otherwise obscured. You memorize every turn so you could come back this way on your own if you had to. \n\t*goto onward\n*else\n\twind and meander so frequently that you are hopelessly lost in under the space of an hour.\n\t*goto onward\n*label onward\n\n$!{lyall_he} is not much of a talker and seems content with keeping ${lyall_his} silence, which is why you are surprised when ${lyall_he} speaks. \n\n*if ((action > deliberation) and (selfishness >= equity))\n\t\"It must be difficult being the fist of our living god. Each choice, each moment, a test of sorts. I cannot imagine the weight of it.\"\n\n\t$!{lyall_he} shakes ${lyall_his} head. \n\n\t\"I worry that I will lose perspective. Wander from the Wolf's path and into some safer life, but we are not allowed to waver, are we?\"\n\n\t*choice\n\t\t#\"No. We must not.\"\n\t\t\t*set action %+10\n\t\t\t*set lyall_affinity %+30\n\t\t\tLyall smiles. It is the first time you have seen the expression on ${lyall_his} face. It illuminates ${lyall_his} rough features. \n\n\t\t\t\"It feels good to be in the presence of someone who understands the burden of the path we travel.\"\n\t\t\t*goto post_convo\n\t\t#\"If it serves us.\"\n\t\t\t*set selfishness %+10\n\t\t\t*set lyall_affinity %+20\n\t\t\t*set ara_affinity %+15\n\t\t\t\"I think it should be the other way, ${prenom}. We serve Wolf in all we do. His desires should be ours. No?\"\n\n\t\t\tBut ${lyall_he} is not asking you a question. $!{lyall_he} continues walking and talking as if you had not disagreed with ${lyall_him}.\n\t\t\t*goto post_convo\n\t\t#\"If our path is well-considered, then it is right.\"\n\t\t\t*set deliberation %+10\n\t\t\t*set lyall_affinity %-5\n\t\t\t*set hawk_affinity %+15\n\t\t\t\"Well-considered?\" Lyall says the words as if they are foreign to ${lyall_him}. \n\n\t\t\t\"You disagree?\" you ask. \n\n\t\t\t\"Any follower of Wolf would,\" ${lyall_he} says, and leaves it at that.\n\t\t\t*goto post_convo\n\t\t#\"As long as our actions are just.\"\n\t\t\t*set equity %+10\n\t\t\t*set lyall_affinity %-10\n\t\t\t*set bear_affinity %+15\n\t\t\t\"Justice?\" Lyall asks. \"What do vengeance and action have to do with justice?\"\n\n\t\t\t$!{lyall_he} continues walking as if you had not spoken at all.\n\t\t\t*goto post_convo\n*else\n\t\"I have often wondered about the vessel of our god and how perfect such a creature must be to harbor his living soul. Do you think you deserved the honor of his presence, ${prenom}?\"\n\n\tIt could be your imagination, but there's something in ${lyall_his} tone that sounds like judgment.\n\t*if sensitivity >= 20\n\t\tThe way ${lyall_his} gaze flits away from yours all but confirms it.\n\t*comment endif\n\n\t*choice\n\t\t*comment the affinity gains are less here, because as a non-Wolf path Lyall\n\t\t*comment automatically trusts you less. The player has to work to earn his/her \n\t\t*comment trust. \n\t\t#\"I was a child when I was invested. I do not know that any child could deserve such a thing.\"\n\t\t\t*set deliberation %+5\n\t\t\t*set lyall_affinity %-10\n\t\t\t\"Must children be without purpose? I think the savagery of our world proves that sentiment is watery, ${prenom}. Children are made to struggle. It is the only way to grow.\"\n\t\t\t*goto post_convo\n\t\t#\"My actions speak for themselves.\"\n\t\t\t*set action %+5\n\t\t\t*set lyall_affinity %+15\n\t\t\t\"That they do, ${prenom}. Perhaps our actions are the only thing that can recommend us in this world,\" ${lyall_he} says.\n\t\t\t*goto post_convo\n\t\t#\"No. I think it could have been anyone.\"\n\t\t\t*set equity %+5\n\t\t\t*set lyall_affinity %-15\n\t\t\t\"Yet it was you who he passed into. You who dreamed the Wolf-dream and survived his fever. Yet you think this means nothing. Curious.\"\n\t\t\t*goto post_convo\n\t\t#\"I was chosen. It could not have been otherwise. Why question it?\"\n\t\t\t*set selfishness %+5\n\t\t\t*set lyall_affinity %+15\n\t\t\t\"You are right. Asking questions about what is inevitable only distracts us from the realities. I appreciate the clarity of your thinking.\"\n\t\t\t*goto post_convo\n\n*label post_convo\n\nThe two of you continue through the woods as the ground begins to slant upward and the terrain grows rougher. Lyall offers you pieces of ${lyall_his} story through casual conversation punctuated by long stretches of silence. $!{lyall_he} is extraordinarily sensitive to Wolf's will, like you,\n*if tribe = \"Quiet\"\n\tand like you, ${lyall_he} hails from the Quietly Swimming clan.\n\t*goto chat_cont\n*else \n\tbut unlike you, hails from the Quietly Swimming clan.\n\t*goto chat_cont\n*label chat_cont\n$!{lyall_his} home clan explains the elaborate braids in ${lyall_his} hair and the light and patient drawl of ${lyall_his} speech. $!{lyall_he} led this Wolf enclave before its untimely end. \n\n\"After Wolf went silent, we did not know what to do or where to go. I used rituals to consult my dreams and find a direction, but my dreams were always the same. I dreamed of bloodied paw prints in the snow and a mindless hunger. I was never good at interpretation,\" Lyall jokes grimly.\n\n\"It was never my strong suit, either,\" you agree. \n\nLyall makes a noise that could be interpreted as a laugh and continues ahead. \n\n*page_break \n\nYou travel for two nights and three days before you reach where Lyall leads you. The two of you adopt a steady, companionable flow of traveling and communicating together without the need for much negotiation. You take the first watch on the first night and ${lyall_he} takes it on the second. It is comforting, if strange, to share the duty of your security with someone else. You still remember how the Wolf kept a vigilant watch through your eyes while you slept, but those days are gone. \n\nOne day Lyall brings up the topic of restraint. \"I wonder, sometimes, if we are really ourselves, or just an extension of Wolf's will.\"\n\nLyall shakes ${lyall_his} head. \"Though I am not the avatar of Wolf, my faith in him and obedience to his cause strengthens me. But the cost…I think that I exist, that my choices are mine, but I cannot be sure, can I? It is only the thin strand of my will, my restraint, that keeps me from becoming a creature of pure violence. I think, perhaps, that would be easier.\"\n\nLyall's words do not necessarily beg a response, but you have also felt that pull. Will you commiserate with ${lyall_him}?\n\n*fake_choice\n\t#\"We must do what Wolf wills. That is why we exist. It is what keeps us alive.\"\n\t\t*set survival +5\n\t\t*set action %+5\n\t\t*set deliberation %-5\n\t\t*set lyall_affinity %+15\n\t\tLyall accepts this answer. \n\n\t\t\"That is true. I try to remind myself of that every day,\" ${lyall_he} says. \"It is good that you agree. It is…comforting.\"\n\t#\"It is a fine line, but walking it carefully is how we stay ourselves.\"\n\t\t*set restraint %+10\n\t\t*set deliberation %+5\n\t\t*set action %-5\n\t\t*set lyall_affinity %+25\n\t\tLyall seems somewhat surprised by what you have to say. \n\n\t\t\"I would not have thought you would agree, ${prenom}. That Wolf's avatar shares these concerns is unexpected. I suppose we all struggle with our nature.\"\n\t#Say nothing. You would not want to influence ${lyall_his} choices, but you listen intently.\n\t\t*set sensitivity +5\n\t\t*set equity %+10\n\t\t*set selfishness %-10\n\t\t*set lyall_affinity %+10\n\t\tEventually Lyall shakes ${lyall_his} head. \n\n\t\t\"Maybe these ideas are useless. Thank you, nonetheless, for listening to my foolishness.\"\n\nLyall is quiet for what is left of the trip.\n\nThe site where the remainder of the Wolf enclave has taken root is under the eaves of a dilapidated Bear temple. The ursine god was not exactly an ally to Wolf when the latter god walked beside you, but neither was he hostile. If there was a god who would give shelter to the rowdy children of Wolf, it would be Bear.\n\nAs you approach you can see a few of the Wolf worshipers hauling stones out of the temple. You look at Lyall and ${lyall_he} answers without needing the question. The two of you have developed a sort of shorthand during your brief time together. \n\n\"We are restoring Bear's sacred space while we rest in its shade. It honors him and for now it gives us a purpose.\"\n\nYou quietly approve, but Lyall is their leader and you are merely a visitor, so you keep your opinion to yourself. You are only about thirty paces from the temple when Lyall stops you. \n\n*if ((action > deliberation) and (selfishness >= equity))\n\t\"You follow the Wolf's path, ${prenom}. I can tell that even in your stride. That is how deeply these things run. Wolf is dead or he has abandoned us, but all we have left is the path that we walk. I have been trying to convince the others to walk the Wolf's path, to live with purpose and vitality, whether Wolf stalks our dreams or not. I need you to help me convince them.\"\n\t*goto pre_rally\n*else\n\t\"I barely know you, but I know you have diverged from Wolf's path. I can smell it on you. You are not the leader we deserve, but perhaps you can still lead. Convince them that they need to follow Wolf's impulses to their last breath. Tell them their fealty is not wasted on a dead god. That is what they need to hear and it will mean everything if it comes from you, despite how far you have fallen.\"\n\t*goto pre_rally\n\n*label pre_rally\n*page_break\nYou can see the zeal in Lyall's eyes and you have no doubt that ${lyall_he} is absolutely committed to the ideals of the Wolf god. Perhaps more so than you. Still, ${lyall_he} manages to turn on a smile and greet the first of the curious Wolf followers. \n\n$!{lyall_he} quickly introduces you to the enclave: There is the lean, bald, and impossibly fit Suba who gives you a fleeting grin while she looks you over; Fillin, whose round face makes him seem young, though the size of his biceps dwarf yours several times over; Zev and his twin-sister, Roan, who stares impassively behind a curtain of white-blond hair; and Hemming, the eldest, whose grizzled facial hair and sunburned skin belie a strong, wiry frame.\n\n\"So now that we have kissed and said hello…who are you, and why should we care?\" Suba asks, leaning on a long wooden staff and exposing her sharp white teeth. \n\n\"A little respect for our honored guest,\" Hemming chides lightly. \"Can you not recognize the skin of your god when you see ${him}?\"\n\nSuba reorients herself and stares hard as if trying to peer through your skin. Eventually she shrugs. \"Could be, or ${he} could be another fool with a lie to peddle.\"\n\n*if gender != \"none\"\n\t\"$!{he} is\n*if gender = \"none\"\n\t\"$!{he} are\nthe living vessel of the Wolf,\" Lyall says, ${lyall_his} voice cutting above the din. \n\nFillin is the first to approach. His expression is unreadable. He comes within an arm span of you and falls to one knee. Zev does the same and Roan follows. Hemming saunters over and gives an exaggerated bow before taking a knee and even Suba, last to come forward, eventually kneels. \n\n\"We have waited for some sign of what to do next, ${prenom}. I have humbly counseled for retribution against those who drew blood from our enclave, but the final decision should rightfully rest with the one closest to Wolf's spirit,\" Lyall explains, and then slowly kneels. \n\nSix people do not make much of a group, but you can sense the fierceness of their collective spirit as if it were a tangible thing. This group is the closest you have felt to Wolf's living presence since the day he went quiet. \n\nWhat will you suggest they do now? \n\n*choice\n\t#\"Follow Wolf's example. Seek out others and grow stronger.\"\n\t\t*set action %+5\n\t\t*set lyall_affinity %+35\n\t\t*set survival +5\n\t\tLyall stands and pats you hard on the back. \n\n\t\t\"The soul of Wolf has spoken! \n\t\t*if gender != \"none\"\n\t\t\t$!{he} means\n\t\t*if gender = \"none\"\n\t\t\t$!{he} mean\n\t\tto lead us into battle.\"\n\n\t\t$!{lyall_he} continues. \"The Rising Sun has spread like a blight and no one has risen to tamp them down. We are small in number, but I believe ${prenom} will agree that we can hunt them down to whatever rock they hide under, and we can do them harm. Is that not the will of the Wolf?\"\n\n\t\t*choice\n\t\t\t#Refuse Lyall's influence: \"No. You overstep your bounds by speaking for me and for Wolf.\"\n\t\t\t\t*set action %+5\n\t\t\t\t*set enclave_purpose \"join\"\n\t\t\t\tLyall's eyes open wide and ${lyall_his} jaw lies slack until anger screws it tight again.\n\n\t\t\t\t\"You…you embarrass us with your cowardice! You will answer this insult. I challenge you, ${prenom}, for the leadership of this enclave.\"\n\n\t\t\t\tA hush falls on the group. \n\n\t\t\t\t\"Are you sure this is—\" Zev begins, but is quickly silenced by his sister's hand on his shoulder. He allows her to pull him back and let the scene before them play out. \n\t\t\t\t*goto lyall_challenge\n\t\t\t#Further inflame the Wolf followers: \"Yes. The Rising Sun should be hunted wherever they are, and their swift end is the will of Wolf.\"\n\t\t\t\t*set enclave_leader \"you\"\n\t\t\t\t*set lyall_fate \"live\"\n\t\t\t\t*set chaos_score +1\n\t\t\t\t*set action %+10\n\t\t\t\t*set lyall_affinity %+25\n\t\t\t\t*set enclave_purpose \"fight\"\n\t\t\t\tA cheer goes up from the enclave members. Their eyes are narrowed in anger and, perhaps, in anticipation of sweet vengeance. \n\n\t\t\t\tYour siblings in Wolf talk among themselves, and Lyall comes up to your side. \n\n\t\t\t\t\"You have made a good decision. The only decision. We would follow Wolf's decree into the afterlife and follow it still. We are his sword and will ever be.\"\n\n\t\t\t\tThe rest of the evening devolves into the drinking and cavorting that sometimes comes with a declaration of war.\n\t\t\t\t*label fireside_chat\n\t\t\t\tA roaring fire is made, and the members of the enclave drink, and laugh, and taunt each other until the early hours of the morning. One by one, they retire to their sleep. Lyall remains, stoking the flame and staring into its depths as if it holds some inscrutable secret.\n\n\t\t\t\t\"I was raised up in a small community of Highwalk shamans and Wolf fai
