 strength is the most universal language. But how will you attack?\n\t\t\t\t*label when_diplomacy_fails\n\t\t\t\t*if diplomatic_failure \n\t\t\t\t\tBut attacking outright is only one of the methods available to you. How will you settle this?\n\t\t\t\t*choice\n\t\t\t\t\t#An all-out assault. No tricks, no hesitation.\n\t\t\t\t\t\t*if combat >= 15\n\t\t\t\t\t\t\t*set quickthinking +10\n\t\t\t\t\t\t\tFour opponents with weapons, expecting to fight an ordinary ${man_woman}. How unfortunate for them. \n\n\t\t\t\t\t\t\tOne of them uses a crossbow to get off a shot at you that misses, but it is the only one she manages. There is someone with an axe, another with a sword. None of them can keep up with you. Their arms move as if submerged in molasses, their strikes are as bloodless as their faces as they realize how outmatched they are. \n\n\t\t\t\t\t\t\tIt is only a few moments before you have disarmed and subdued them.\n\t\t\t\t\t\t\t*goto combat_success\n\t\t\t\t\t\t*elseif combat > 9\n\t\t\t\t\t\t\t*set quickthinking +5\n\t\t\t\t\t\t\tYou have the advantage of surprise, already moving by the time the group can properly prepare for you. Fighting four enemies simultaneously is challenging, but greater numbers make the battle muddled; as long as you keep moving, keep shifting positions, and weaving around your opponents, you know the crossbow will be too risky to use. \n\n\t\t\t\t\t\t\t*label mid_combat_scene\n\t\t\t\t\t\t\tSomeone swings an axe at you and by the time you dance away from it, there is a short sword coming at your side. Annoying. \n\n\t\t\t\t\t\t\tIt takes a redoubled effort to disarm the axe-wielder and twist the wrist of the sword-user. A few sweaty minutes later, you have put down all four opponents.\n\t\t\t\t\t\t\t*goto combat_success\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou fly into the midst of your opponents, dodging an axe, slipping under an overhead sword strike, and smashing limbs as you go. But as you fight, the tide begins to slowly turn against you. \n\n\t\t\t\t\t\t\t*label wolf_combat_1\n\t\t\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t\t\tYou grit your teeth and dig deep. You cede a little restraint, a little control over the wild, feral power inside of you and newfound strength rises up. Suddenly, the sword coming at you does not seem so fast nor the axe quite as heavy when you grab its wielder's arm and twist it away from you. \n\n\t\t\t\t\t\t\tIt does not take much longer before you manage to remove the company's weapons and leave them groaning in the dirt.\n\t\t\t\t\t\t\t*goto combat_success\n\t\t\t\t\t#Invoke a ritual to borrow strength from the presiding gods, then strike.\n\t\t\t\t\t\t*if ritual >= 10\n\t\t\t\t\t\t\t*set survival +10\n\t\t\t\t\t\t\tWhen you reach for the power, it arrives slithering and cool on your skin. Eel grants you his curious strength. \n\n\t\t\t\t\t\t\t*label eel_powered\n\t\t\t\t\t\t\tWhen the armed company attempts to attack you, you slip past their strikes, able to move with oily grace among their ranks. You strike and are gone before retaliation can touch you. \n\n\t\t\t\t\t\t\t*if eel_and_combat\n\t\t\t\t\t\t\t\tBefore the last of Eel's power has faded from your limbs, all four of your opponents are lying on the ground.\n\t\t\t\t\t\t\t\t*goto combat_success\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tThe effort of fighting and sustaining a connection with the realm of gods leaves you winded and exhausted, but all four of your opponents are lying on the ground. \n\t\t\t\t\t\t\t\t*goto combat_success\n\t\t\t\t\t\t*elseif (((ritual = 5) and (combat >= 10)) or ((ritual = 5) and (survival >= 10)))\n\t\t\t\t\t\t\t*set eel_and_combat true\n\t\t\t\t\t\t\t*set survival +5\n\t\t\t\t\t\t\tYou invoke the ritual, expecting the power of gods to flow freely into you, but what you receive is only a fragment, a muddled reminder that you and your grasp in the realm of ritual is tenuous. Still, you receive some semblance of power from Eel's bounty. \n\n\t\t\t\t\t\t\tThe rest is all you. \n\n\t\t\t\t\t\t\t*goto eel_powered\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe gods are quiet when you reach for their assistance. A long moment passes before you give up on their aid. But do you need their help when you have the aptitude of a god living in your gut?\n\n\t\t\t\t\t\t\t*goto wolf_combat_1\n\t\t\t\t\t#Intimidate them into submission using trickery to disarm them before I strike.\n\t\t\t\t\t\t*if quickthinking > 5\n\t\t\t\t\t\t\t*set survival +5\n\t\t\t\t\t\t\tThere are four of them and only one of you, but you have the benefit of being cunning and not entirely honest. You notice the symbol branded on their leathers and, while you are not familiar with it, clearly it marks them as a part of a group. \n\n\t\t\t\t\t\t\t\"Ward sent me to meet with you,\" you explain to the leader of the group.\n\n\t\t\t\t\t\t\tYou proceed to spin a yarn of half-truths and outright lies so quickly that it causes the group to pause and look at each other. You approach them cautiously, talking all the time. When you are close enough, you attack without warning and take them by surprise.\n\n\t\t\t\t\t\t\t*goto mid_combat_scene\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Ward sent me to meet with you,\" you say, beginning to explain a false situation to the leader of the group.\n\n\t\t\t\t\t\t\tBut he is not swayed by your double-speak. He gestures to his companions, and they come after you before you can get close.\n\n\t\t\t\t\t\t\tHaving to fight opponents on their terms puts you immediately at a disadvantage. They manage to keep you at a distance with their weapons—a sword and an axe—and any advantage you might have bought yourself with your trickery quickly evaporates. You can sense the tide of the battle turning against you. \n\n\t\t\t\t\t\t\t*goto wolf_combat_1\n\t\t\t#Diplomacy. Why fight until I have exhausted all other choices?\n\t\t\t\tYou decide to talk rather than fight. Blood need not always be spilled, despite what Wolf might have done. But how will you defuse the mounting tension of the situation? \n\t\t\t\t*choice\n\t\t\t\t\t#Ask that all involved parties sheathe their weapons and use common sense instead of killing each other.\n\t\t\t\t\t\t*if (survival >= 15) or (quickthinking >= 15)\n\t\t\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t\t\tNeither the armed group, nor the cloaked woman seem totally inclined to relax their suspicions, but you point out that there has not been any reason yet to draw blood, nothing worth killing over, and that gets closer to putting them at ease. \n\t\t\t\t\t\t\t*goto diplomatic_success\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set diplomatic_failure true\n\t\t\t\t\t\t\t\"And who are you to command us, stranger?\" the leader of the armed group asks. \"If you have any sense at all, you will leave the way you came before we decide to take offense at your tone.\"\n\n\t\t\t\t\t\t\tThe cloaked woman says nothing, but her hard gaze flicks between you and the others.\n\n\t\t\t\t\t\t\tPerhaps you would have left without incident, but the threat stirs a part of you that Wolf left behind. The challenge rises up in your blood and makes you angry enough to vibrate. \n\n\t\t\t\t\t\t\tThere is only way to answer the insult.\n\t\t\t\t\t\t\t*goto when_diplomacy_fails\n\t\t\t\t\t#Present myself as a humble, unarmed mediator and attempt to find common ground through discussion. \n\t\t\t\t\t\t*if combat > 14\n\t\t\t\t\t\t\t*set diplomatic_failure true\n\t\t\t\t\t\t\tYou put up your hands and approach the armed group in an attempt to make peace. You tell them you are unarmed and harmless, but the armed group is leery. It is possible that they see the way you edge toward them and grow skittish, or maybe it is your martial bearing that puts them off their ease, but either way, they seem unlikely to make peace. \n\n\t\t\t\t\t\t\t\"We will not be lured into your trap,\" one of them shouts. Then, in another instant, the woman in their group is aiming a crossbow at you. \n\n\t\t\t\t\t\t\tDiplomacy suddenly seems out of the question. Blood it is then.\n\n\t\t\t\t\t\t\t*goto when_diplomacy_fails\n\t\t\t\t\t\t*elseif sensitivity >= 10\n\t\t\t\t\t\t\t*set quickthinking +5\n\t\t\t\t\t\t\tYou calmly explain you are not a threat and despite a few derisive comments, the armed company and the cloaked woman seem to believe you. \n\n\t\t\t\t\t\t\tFor the moment it appears you have their ears. \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t*goto diplomatic_success\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*set diplomatic_failure true\n\t\t\t\t\t\t\t\"We have no interest in talking with you, stranger,\" says the leader of the armed group. \"Leave. Now. Before we decide to take offense at your tone.\"\n\n\t\t\t\t\t\t\tThe cloaked woman says nothing, but her hard gaze flicks between you and the others.\n\n\t\t\t\t\t\t\tPerhaps you would have left without incident, but the threat stirs a part of you that Wolf left behind. The challenge rises up in your blood and makes you angry enough to vibrate. \n\n\t\t\t\t\t\t\tThere is only one way to answer the insult.\n\t\t\t\t\t\t\t*goto when_diplomacy_fails\n\t\t\t\t\t*selectable_if (wolf_moon = \"hunting\") #[i]Hunting Moon[/i]: Announce myself as Wolf's avatar and demand obedience.\n\t\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t\t*set influence +1\n\t\t\t\t\t\t*set eel_affinity %-10\n\t\t\t\t\t\t*set riser_affinity %-10\n\t\t\t\t\t\t*set gellas_reoccurs true\n\t\t\t\t\t\tThe growl starts low in the back of your throat and is barely audible. You flash your teeth for an instant; your canines are longer than most and have a cruel edge. You are governed by the hunting moon, which is when the Wolf is at its most animalistic. You draw on that wild power now. \n\n\t\t\t\t\t\tYou step forward and everyone steps back. That means they are cautious. That means they are afraid. Good. \n\n\t\t\t\t\t\t\"I am the one who walks with Wolf. I am his claw.\" You give them a smile. \"I am his teeth.\"\n\n\t\t\t\t\t\tThe cloaked woman mutters something, but a look in her direction silences her. The armed group lower their weapons, just a fraction. \n\n\t\t\t\t\t\t\"You will disarm yourselves before me. Obey or I will take you apart.\"\n\n\t\t\t\t\t\tThe armed group is slow to comply, but they put their weapons away in your presence. The authority feels good, perhaps a bit too good. Your blood is beating and you want to go further, but you have already decided not to fight. You push back the urge to kill, and it costs some small amount of already tenuous restraint to do so.\n\n\t\t\t\t\t\t\"Leave this place,\" you tell them. \"All of you. Disappear.\"\n\n\t\t\t\t\t\tThe leader of the armed group looks ready to disagree, but another long look in your direction and he reconsiders. \n\n\t\t\t\t\t\t\"We ought to go,\" he tells his people. They pack their things, shouldering weapons and bedrolls before trudging east into the night. As they leave, you notice a recurring sigil branded on their leathers.\n\t\t\t\t\t\t*if sensitivity > 5\n\t\t\t\t\t\t\t*set recognize_rising_sun true\n\t\t\t\t\t\t\tYou recall it as the sigil of the Rising Sun. A group vowed never to serve under any gods. Their numbers have swelled in recent years. \n\t\t\t\t\t\t\t*goto dismissed\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tBut it means nothing to you. \n\t\t\t\t\t\t\t*goto dismissed\n\n\t\t\t\t\t\t*label dismissed\n\n\t\t\t\t\t\tThe cloaked woman remains after the four armed men and woman have gone. She gives you a curious look—as if wondering exactly what to do with you—then turns to leave.\n\n\t\t\t\t\t\tOnce everyone is gone, the blood stops beating in your ears and your canines begin to resemble normal human teeth once again. You move on.\n\n\t\t\t\t\t\tYou know that the edge of the forest must be nearing, so you will continue east until you find it. From there you should be able to figure out exactly where you are and then where to go next.\n\t\t\t\t\t\t*goto end_of_chapter\n\t\t\t#I am going to break this fight up, even if it requires breaking a few limbs.\n\t\t\t\tYou are prepared to keep the armed group from causing any more trouble, but what course will your actions take?\n\n\t\t\t\t*goto when_diplomacy_fails\n\t#Frighten all five people below and drive them away from each other.\n\t\t*if quickthinking >= ritual\n\t\t\tIf you leave these people alone for much longer, they will likely kill each other. You decide to take action to prevent that, at least for the moment. \n\n\t\t\tA look around the area reveals there is not much to work with. You are unarmed and there are at least three weapons that you can see on the ground. Your best bet is—\n\n\t\t\tThen you see it. Settled high up in a twist of branches belonging to one of the sky-scaling oaks is a bulging nest. Ah!\n\n\t\t\tIf there is one thing that can clear an area, it is a hornet's sting. You scout the ground for a rock and throw it with aim informed by your preternatural senses. The rock dislodges the nest, but the noise rattles the armed group into action. They hardly have time to investigate before the nest falls to the forest floor and cracks open. \n\n\t\t\tThe hornets are incensed! The pained cries of everyone caught in their path is evidence of your genius plan. \n\n\t\t\t*label fleeing_groups\n\t\t\tBoth sides flee into the relative safety of the forest, giving you enough time to consider your response. Since you have not been seen by either side, you could reasonably pursue either of them and meet them on your own terms, perhaps offering aid and getting into their good graces. \n\n\t\t\tWhich side is more attractive? \n\t\t\t*choice\n\t\t\t\t#The armed group.\n\t\t\t\t\t*set riser_affinity %+25\n\t\t\t\t\t*set recognize_rising_sun true\n\t\t\t\t\tYou follow the armed group into the forest where they are recovering from the trick you have just played on them. \n\n\t\t\t\t\t*if quickthinking >= ritual\n\t\t\t\t\t\tTwo of the group are rubbing at the welts running up their arms and legs, while another is rubbing her cheek where she was gouged several times. \n\t\t\t\t\t\t*goto riser_pacify\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe four of them are on full alert. Their weapons are drawn and their expressions tight. They seem to be expecting the wolf to leap out of the very trees.\n\t\t\t\t\t\t*goto riser_pacify\n\n\t\t\t\t\t*label riser_pacify\n\t\t\t\t\tWhen you arrive, they turn their weapons on you, but that is no surprise. You feign innocence, raising your hands and allowing them to acclimate to your presence.\n\n\t\t\t\t\t\"Who are you? What do you want?\" their leader asks. \n\n\t\t\t\t\tYou make up a story about being: \n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"A wandering healer.\"\n\t\t\t\t\t\t\t*if quickthinking >= ritual\n\t\t\t\t\t\t\t\t*goto hornet_explanation\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou explain there is a local plant that can help to ward away wolves because they cannot abide the stench of it. \n\n\t\t\t\t\t\t\t\tThe story is rubbish, but it is worth the telling just to watch them furiously rubbing some random herbs on their faces, chests, and arms. \n\t\t\t\t\t\t\t\t*goto riser_pacify_2\n\t\t\t\t\t\t#\"A hunter from a nearby village.\"\n\t\t\t\t\t\t\t*if quickthinking >= ritual \n\t\t\t\t\t\t\t\t*goto hornet_explanation\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto wolf_explanation\n\t\t\t\t\t\t#\"A Wolf priest communing with nature.\"\n\t\t\t\t\t\t\t*if quickthinking >=ritual \n\t\t\t\t\t\t\t\t*label hornet_explanation\n\t\t\t\t\t\t\t\tYou explain that you have been stung by hornets in this forest before and suggest a local plant with curative properties.\n\t\t\t\t\t\t\t\t*goto riser_pacify_2\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tThe group gets skittish at mention of a wolf. \n\t\t\t\t\t\t\t\t*label wolf_explanation\n\t\t\t\t\t\t\t\tYou calmly, quickly explain that you have driven the great white wolf away. It will not be harming them. \n\n\t\t\t\t\t\t\t\t*goto riser_pacify_2\n\t\t\t\t\t*label riser_pacify_2\n\n\t\t\t\t\tThe armed group begins to relax around you. At least enough that they start to converse. \n\n\t\t\t\t\t\"You have fortuitous timing, stranger. That business with the\n\t\t\t\t\t*if quickthinking >= ritual\n\t\t\t\t\t\thornets\n\t\t\t\t\t\t*goto continue_riser\n\t\t\t\t\t*else \n\t\t\t\t\t\twolf\n\t\t\t\t\t\t*goto continue_riser\n\t\t\t\t\t*label continue_riser\n\t\t\t\t\t*set recognize_rising_sun true\n\t\t\t\t\t*set encampment_directions \"risers\"\n\t\t\t\t\t*set gellas_reoccurs true\n\t\t\t\t\tcould have been much worse. We thank you,\" says their leader, or at least the man they allow to speak for them. \"We are members of the Rising Sun, aiming to meet with another contingent of our brothers and sisters at Ishko, a Clearwater settlement about a day east of here.\"\n\n\t\t\t\t\tPerhaps responding to some confusion in your expression, the leader explains. \n\n\t\t\t\t\t\"The Rising Sun is a group of independent-minded souls. We exist, or try to exist, outside the reach of gods and spirits. Incidents like this, sadly, are pretty common for us.\"\n\n\t\t\t\t\tWhat this man is saying is heresy, and Wolf would have slaughtered them for merely suggesting it, but you remind yourself that you are not Wolf. Not entirely. Not anymore.\n\n\t\t\t\t\t\"Anyway, stranger—\"\n\n\t\t\t\t\t\"My name is ${prenom}.\"\n\n\t\t\t\t\t\"${prenom}, then. My name is Gellas, and these are my brothers and sister in the Sun: Joven, Cathelyn, and Serk. We appreciate your aid, but we must continue on. Perhaps we shall see each other in Ishko.\"\n\n\t\t\t\t\t\"That is a possibility,\" you agree. You have reason enough to travel in that direction, after all it stands to reason you could find food and shelter there. After that, your hunt for answers could begin.\n\n\t\t\t\t\tThe Rising Sun followers trudge off to the east. You do not follow them, but head in the same general direction. Ishko is sounding like a better plan by the moment.\n\t\t\t\t\t*goto end_of_chapter\n\t\t\t\t#The cloaked woman. \n\t\t\t\t\t*set eel_affinity %+25\n\t\t\t\t\tYou follow the cloaked woman into the forest where she is recovering from the trick you have just played on her. \n\n\t\t\t\t\t*if quickthinking \u003c ritual\n\t\t\t\t\t\tThe woman is rubbing at the welts running up her arm. In her other hand, she clutches a bone-handle knife. She has a few welts on her face as well, but seems to be ignoring them.\n\t\t\t\t\t\t*goto shaman_pacify \n\n\t\t\t\t\t*label shaman_pacify\n\t\t\t\t\tWhen you arrive, she turns her weapon on you, but that is no surprise. You feign innocence, raising your hands and allowing her to acclimate to your presence.\n\n\t\t\t\t\t\"And you are?\" she asks. \n\n\t\t\t\t\tYou make up a story about being: \n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"A wandering healer.\"\n\t\t\t\t\t\t\t*if quickthinking >= ritual\n\t\t\t\t\t\t\t\tYou offer to help.\n\n\t\t\t\t\t\t\t\t*label hornet_explanation_2\n\t\t\t\t\t\t\t\tShe thanks you, but ultimately refuses your aid. She explains that she has her own methods of dealing with the hornet stings. Sure enough, as you converse, you see the welts slowly fading on her skin.\n\t\t\t\t\t\t\t\t*goto shaman_pacify_2\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou start to tell her about a local plant that can help to ward away wolves, but she stops you.\n\n\t\t\t\t\t\t\t\t\"You needn't waste your breath on me, Wolf-kin. I know what you are.\"\n\t\t\t\t\t\t\t\t*goto shaman_pacify_2\n\t\t\t\t\t\t#\"A hunter from a nearby village.\"\n\t\t\t\t\t\t\t*if quickthinking >= ritual\n\t\t\t\t\t\t\t\tYou explain that you have been stung by hornets in this forest before and suggest a local plant with curative properties.\n\n\t\t\t\t\t\t\t\t*goto hornet_explanation_2\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto wolf_explanation_2\n\t\t\t\t\t\t#\"A Wolf priest communing with nature.\"\n\t\t\t\t\t\t\t*if quickthinking >=ritual \n\t\t\t\t\t\t\t\tYou explain that you have been stung by hornets in this forest before and suggest a local plant with curative properties.\n\n\t\t\t\t\t\t\t\t*goto hornet_explanation_2\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tThe woman raises an eyebrow at the mention of Wolf. \n\t\t\t\t\t\t\t\t*label wolf_explanation_2\n\t\t\t\t\t\t\t\tYou calmly explain that you have driven the great white wolf away. It will not be harming her. \n\n\t\t\t\t\t\t\t\tShe laughs.\n\t\t\t\t\t\t\t\t*goto shaman_pacify_2\n\n\t\t\t\t\t*label shaman_pacify_2\n\n\t\t\t\t\t*if quickthinking >=ritual\n\t\t\t\t\t\t\"I thank you for your offer of aid,\" she says. \"But I am a shaman and we have our own methods.\"\n\n\t\t\t\t\t\tShe smiles.\n\n\t\t\t\t\t\t*label shaman_farewell\n\t\t\t\t\t\t*set encampment_directions \"shaman\"\n\t\t\t\t\t\t\"I appreciate you intervening when you did. Things could have gotten much worse. And for your assistance, Eel, my patron, owes you a debt that I cannot hope to pay alone. I will tell you, however, that if you are looking for shelter, you can find it in Ishko. A Clearwater settlement just a day or so east of here. That is if you tire of sleeping under the stars.\"\n\n\t\t\t\t\t\tShe turns to leave. \n\n\t\t\t\t\t\t\"Thank you,\" you tell her. \n\n\t\t\t\t\t\t\"We both serve the gods, Wolf-kin. I am obliged to help, am I not? After all, what is family for?\"\n\n\t\t\t\t\t\tShe disappears into the trees and you wait until she is gone before you head east. Shelter and food sound like a good start. Then you can continue finding out more about Wolf and where he is gone.\n\t\t\t\t\t\t*goto end_of_chapter\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"I am a shaman, stranger,\" she says. \"I know more than you give me credit for.\"\n\n\t\t\t\t\t\t*goto shaman_farewell\n\t\t*else\n\t\t\tIf you leave these people alone for much longer, they will likely kill each other. You decide to take action to prevent that, at least for the moment. \n\n\t\t\tYou dig deep into your memories and find a trick that seems appropriate in this situation. When you first became an avatar of Wolf, the god graced you with a simple way to ward off enemies. At least those who did not pose much in the way of a genuine threat, that kind of knowledge would come later. \n\n\t\t\tAll it takes is for you to reach into the pit of your stomach where the Wolf's instincts live. You grasp the shape of the white wolf and bring it out into your hands and eyes and teeth. You growl and yell at the moon, but it comes out in a howl. The ritual is taking hold. \n\n\t\t\tYou descend the rise as quickly as possible, and when the first of the armed group sees you, he shouts in alarm. He is seeing a huge white wolf coming toward him even though you have not changed form, merely suggested a transformation to his eyes, which are eager to believe the deception. His fear helps to convince the others that they are also seeing a wolf coming toward them. \n\n\t\t\tYou howl again and go running.\n\n\t\t\tThey all disperse, even the cloaked woman who narrows her eyes at you, almost as if she could see through the deception, but in the end she runs away as surely and as quickly as the rest of them. \n\n\t\t\t*goto fleeing_groups\n\t#Hunt down and kill the armed group from the shadows.\n\t\t*set pantheon_regard -1\n\t\t*set death_toll +5\n\t\t*set action %+20\n\t\t*set combat +5\n\t\tYou decide to remove the threat entirely. \n\n\t\tThese strangers are clearly organized and seem to be held back by a thin leash. Better to be rid of them definitively, conclusively. \n\n\t\tThere is no way to descend the rise and come out behind them, but you are able to go the long way around and come up to the west of the group where the firelight is most likely to blind them to your approach. You climb down the rise quietly, and the escalating argument between the four armed individuals and the cloaked woman makes for good cover. When you are on the ground, you stalk your prey like any hunter would. \n\n\t\tBy the time the first one of them notices your presence and attempts to alert the others, he is already down. A quick, merciless strike to his throat ensures he stays down. \n\n\t\tThe woman among them nearly clips you with her crossbow, but her inaccuracy seals her fate. The other two join forces and try to come at you together, but you are stronger than they are. And faster. \n\n\t\tWhen you are finished, there are four corpses by the fire. The cloaked woman looks on with her hand floating over her mouth. She looks horrified, but she has not fled yet. \n\n\t\tWhat do you say to her, if anything? \n\t\t*choice\n\t\t\t#\"You are safe. They will not hurt you now.\"\n\t\t\t\t*set encampment_directions \"shaman\"\n\t\t\t\tShe nods slowly. \n\n\t\t\t\t\"I would have been content with merely driving them out,\" she says. \"Killing them all…it seems excessive.\"\n\n\t\t\t\t\"It was necessary.\"\n\n\t\t\t\t\"Was it? I suppose you would know better than I. Either way, as his shaman, I can tell you that my patron god owes you debt, stranger. He will see that it is paid.\"\n\n\t\t\t\t*if selfishness > equity\n\t\t\t\t\t\"Make sure that he does, shaman,\" you tell her.\n\n\t\t\t\t\t\"You will get everything you have earned and more. Trust me,\" the shaman says.\n\t\t\t\t\t*goto selfish_check \n\t\t\t\t*else\n\t\t\t\t\t\"I did not do it for a reward,\" you explain.\n\n\t\t\t\t\tThe shaman's mouth turns up in wry amusement. \"Precisely why you are worthy of it.\"\n\t\t\t\t\t*goto selfish_check \n\n\t\t\t\t*label selfish_check\n\n\t\t\t\tShe turns away from you, then back. \"I should mention: if you are looking for civilization again, there is a settlement no more than a day to the east of here. Small place, but enough for food and water. Maybe even a bath.\"\n\n\t\t\t\tShe makes a meaningful sweeping gesture with two fingers of her left hand toward the dilapidated temple and then turns back to the forest. You watch her go before you make your own way as well.\n\t\t\t\t*goto end_of_chapter\n\t\t\t#\"I think you should leave here.\"\n\t\t\t\t*set encampment_directions \"shaman\"\n\t\t\t\t\"Yes, I suppose so. Assuming you will not strike me dead once I turn around.\"\n\n\t\t\t\tYou shrug and she laughs. It is a sudden burst of dry, grim amusement. \n\n\t\t\t\t\"Thank you, stranger. Your methods are brutal, but I cannot deny that you might well have saved my life and protected Eel's temple from further desecration. \n\n\t\t\t\t\"As his shaman, I can tell that Eel owes you a debt. He will see it paid. I cannot do much for you personally, but if you are looking for civilization again, there is a settlement about a day east of here.\"\n\n\t\t\t\tYou take her directions into consideration, but as for Eel's supposed debt to you, that is a different matter. The ways gods choose to pay their debts are as varied as their temperaments. Being owed a boon can be a help or a hindrance. It remains to be seen which Eel will offer you. \n\n\t\t\t\tYou part from the shaman without much more talk. Both of you walk separate ways back into the dark of the forest.\n\t\t\t\t*goto end_of_chapter\n\t\t\t#Say nothing. Leave her to gawk at the bodies.\n\t\t\t\tAs you turn to leave, she calls out.\n\n\t\t\t\t*if (tribe = \"Quiet\") and (sensitivity > 5)\n\t\t\t\t\t\"Thank you, you have done us a service,\" she says.\n\n\t\t\t\t\t\"Us? You mean Eel, then. You are one of his shamans,\" you say.\n\t\t\t\t\t*goto shaman_thanks\n\t\t\t\t*else\n\t\t\t\t\t\"This is one of Eel's places. You have done us a service by protecting it.\"\n\n\t\t\t\t\t\"Us?\" you ask.\n\t\t\t\t\t*goto shaman_thanks\n\n\t\t\t\t*label shaman_thanks\n\n\t\t\t\t\"Yes. I am a shaman of Eel. He does not walk with me, as Wolf walks with you, but…well, I manage. Thank you, stranger.\"\n\n\t\t\t\tYou grunt. She can take that as a farewell or not, but you have done enough here.\n\t\t\t\t*goto end_of_chapter\n*label diplomatic_success\n*set recognize_rising_sun true\n*set gellas_reoccurs true\nBoth sides are hesitant to meet each others' eyes, but gradually they explain the situation. The leader of the armed group is the first to drop his weapon, and the first to speak. \n\n\"My name is Gellas. I am a member of the Rising Sun, but we have been called Risers as well by those less friendly toward us. Have you heard of our group?\" he asks you.\n\n\"A group of faithless brutes—\" the cloaked woman hisses. \n\n\"We prefer self-determined,\" Gellas counters. \"We do not follow the old ways. The gods or whatever the spirits are that claim authority over us: We do not accept their yoke.\"\n\nThe cloaked woman narrows her eyes. \n\n\"And you believe in trampling sacred spaces, apparently. This is a temple to the god Eel. Your presence is bad enough.\" She points an accusing finger. \"But eating and drinking and burning your stinking fire beneath the eaves of his home? It is an affront. You have not been anointed with his oils or sworn to his service. Your faithlessness offends.\"\n\n\"We are far from home and tired. We stopped here because this clearing is easy to defend from forest predators. Besides, if your god is so protective of this space then why does not he strike us down himself? Why send a frail, whining fruit fly to buzz around our ears and annoy us?\"\n\n\"I offered to show you another place to camp, away from Eel's sacred grounds!\" the cloaked woman shouts. \n\n\"Why does your pleasure-god claim a space in the middle of nowhere? Or do the gods demand all land to be consecrated in their name?\"\n\n\"Eel is god of the low places as well as the high. This is a place for journeymen of his faith to ponder their deepest selves, and you are not welcome.\"\n\nThe situation is getting tense. If you intend to intervene, now would be the time. \n\n*choice\n\t#To the Rising Sun group, peaceably: \"This is a space sacred to Eel's worshipers; can we not find you some other place to rest your heads?\"\n\t\t*set riser_affinity %-25\n\t\t*set eel_affinity %+25\n\n\t\tThe Risers look abashed and Gellas seems…disappointed, perhaps. \n \n\t\t\"You are probably right,\" Gellas says. \"We will find somewhere else to camp, though it means we will get less sleep before dawn.\"\n\n\t\t\"We will likely see each other again, stranger,\" he tells you. \n\n\t\t*label risers_leave\n\t\tThe Risers collect their gear and disappear into the forest. You watch them go, and when they are gone the Eel worshiper approaches you. \n\n\t\t\"You have protected the faith today, Wolf-kin.\"\n\n\t\tIt is difficult to hide your surprise. She laughs. \n\n\t\t\"I can smell him on you. The wet beast stink of the wild dog god. It is distinctive. Especially to a shaman. Anyway, thank you for intruding. It shames me that a follower of Wolf was calmer than I, but the gods teach us strange lessons.\n\n\t\t\"I will stay here and undo whatever damage those animals did here, but if you are looking for shelter and a place to sleep that is not the forest floor, there is a settlement a day or so east of here called Ishko. Clearwater mostly, good people.\"\n\n\t\tYou thank her for the advice and leave her to her task. Perhaps it is best for you to go find the settlement and from there, seek answers elsewhere to the questions you have about Wolf and where he is gone.\n\t\t*goto end_of_chapter\n\t#To the Rising Sun group, forcefully: \"You have clearly intruded on something above your ken. Begone, quickly, before we have a real problem.\"\n\t\t*set riser_affinity %-30\n\t\t*set eel_affinity %+30\n\n\t\tOne of the Risers steps forward with a blade, but Gellas juts an arm out in front of him, stopping him. The Riser leader stares at you, as if trying to make a decision. \n\n\t\t\"You do not want us as an enemy, stranger. Think on that for the next time you see me.\"\n\n\t\tHe turns back to his companions, and says, \"Let us leave this place.\"\n\n\t\t*goto risers_leave\n\t#To the Eel worshiper, peaceably: \"They only intend to rest for a while and then be on their way; can you not allow them their brief sojourn?\"\n\t\t*set riser_affinity %+25\n\t\t*set eel_affinity %-25\n\t\tThe woman looks surprised to hear you supporting the Risers, but ultimately she bows her head and accepts. \n\n\t\t\"Disappointing, to be sure, to have this place defiled, but once you have all moved on, I will restore it and all will be as it was. Be careful sleeping under Eel's gaze. Trespassers tend to find little comfort here.\"\n\n\t\t*label eel_shaman_leaves\n\t\tShe shakes her head one final time and then walks away, out into the forest. \n\n\t\tWhen she is gone, Gellas and his companions relax a bit. \n\n\t\t\"Thank you for siding with us, friend. We could have handled it ourselves, but…well, you may have saved that woman's life. And it cost her only her pride.\"\n\n\t\tGellas smiles. \n\n\t\t\"We will get some rest here then we will be heading on to Ishko, a Clearwater settlement maybe a day east of here. You should consider it if you could use a bath and a decent meal.\"\n\n\t\tIt is not a bad idea. Going east and getting some sleep under an actual roof, then moving on and finding some answers to your questions. The prospect of Ishko sounds better by the moment. \n\t\t*goto end_of_chapter\n\t#To the Eel worshiper, forcefully: \"Does Eel demand you sow chaos in his house? Leave this place safely right now. I cannot guarantee the offer will last another breath.\"\n\t\t*set riser_affinity %+30\n\t\t*set eel_affinity %-30\n\n\t\tThe woman's mouth hangs open for a moment before she bites her lip and points at you. \n\n\t\t\"That…is a serious mistake, stranger, and you may find that gods are not so forgiving. Sleep well.\"\n\n\t\t*goto eel_shaman_leaves\n\t#To both sides: \"None of you have acquitted yourselves well here, and all of you should leave. Now.\"\n\t\t*set equity %+20\n\t\tBoth sides are quiet for a moment. Then the Eel worshiper speaks. \n\n\t\t\"You would try to command me in the seat of Eel's power and favor? You are brave, stranger. Brave and reckless. But you are not wrong. I will agree to walk away, if they will.\"\n\n\t\t\"We will. I do not know who you think you are, newcomer, but you should know that you have not made any friends today. Should I see you again, I promise you it will be on different terms,\" Gellas says, then to the Eel worshiper, \"as for you. Hope we do not cross paths again ever or I may squash you, fruit fly.\"\n\n\t\t\"Some insects sting,\" she says. \n\n\t\tGellas and his people smirk at that and both sides lob insults, veiled and otherwise, while preparing to leave. Eventually, the Risers and the Eel worshiper leave in opposite directions and you are left alone in the forest clearing with just Eel's broken down temple for company. \n\n\t\tOnce you are sure that everyone has cleared out, you leave as well, heading toward what you are sure is the edge of the forest. It should be just a little more than a day before you are there.\n\t\t*goto end_of_chapter\n\n*label combat_success\n*set recognize_rising_sun true\nThe formerly armed group stares at you with simmering rage, those of them that are still sensible. \n\n\"Congratulations, you managed to take us while we were off our guard,\" their leader says, and spits blood into the dirt. \"But trust me, this is not going to go well for you. We are the Rising Sun, friend.\"\n\nThe cloaked woman interjects. \n\n\"You Risers are just the faithless in new colors, preaching an end to the old ways: No more worship of gods, no more faith. But what rises up in its place? Chaos, disorder.\"\n\n\"We have faith in ourselves. We have faith in our brothers and sisters. What we reject is the notion that man should kneel while their so-called gods stand proud,\" the leader shouts. \n\n\"I have served as Eel's shaman for many years and I have seen what faith without direction can do. Like the desecration of other people's sacred spaces.\" The shaman points at the broken down temple. \n\nThe leader already has a rejoinder prepared, but you cut him off:\n\n\"Enough.\"\n\n*label riser_kill_choice\nThe Risers are on their knees, their eyes narrowed in your direction. You have defeated them in battle, but will you allow them to survive or end their lives here? \n\n*comment originally I made it so that if the player's restraint was too\n*comment low then they would be unable to choose the mercy option here.\n*comment however I realized that it was a little early to be robbing players\n*comment of their agency. \n*choice\n\t#Allow the Risers to walk away.\n\t\t*set sensitivity +5\n\t\t*set influence +1\n\t\t*set restraint %-5\n\t\t*set pantheon_regard +1\n\t\t*set riser_affinity %-25\n\t\t*set bear_affinity %+25\n\t\t*label risers_live\n\t\t*set encampment_directions \"shaman\"\n\t\tIt takes a while for the Risers to come to their feet after you tell them that they can take their injured and go. Wary of a trick, they slowly help each other get up and get moving. \n\n\t\tThey limp into the forest like wounded beasts.\n\n\t\t\"The dangers of the forest might kill them, but it is unlikely. You should be prepared for reprisal, Wolf-kin,\" says the shaman.\n\n\t\tYou look at her with some surprise.\n\n\t\t\"Did you know all along what I am?\" you ask. \n\n\t\t\"Of course,\" she says. \"Eel's favor elevates me slightly. Not so much as you, an avatar of the gods, a living font of their power, but…I can at least recognize one of my own.\"\n\n\t\tThe shaman points to the temple. \n\n\t\t\"My work will keep me here a few more days, but if you are looking for cooked food and shelter beyond the canopy overhead there is a settlement called Ishko at the edge of the forest, just another half day to the east.\"\n\n\t\tYou thank her and she nods. Then she turns toward Eel's temple and you head off to the east. Civilization sounds like a good start.\n\t\t*goto end_of_chapter\n\t#Make peace before letting the Risers go.\n\t\t*if influence > 1\n\t\t\t*set riser_affinity %-10\n\t\t\t\"Not one more drop of blood needs to be shed here. Go safely and put reprisal out of your mind. Remember that I could have killed you, but I did not hurt you—any of you—more than necessary to stop the fighting,\" you tell them.\n\n\t\t\t\"As if we need your charity, dog!\" one of them shouts. \n\n\t\t\tTheir leader turns on the man angrily. \n\n\t\t\t\"Would you rather die than accept a peaceful solution? Your life is not yours to throw away as long as I lead this group,\" the Riser leader shouts. He shakes his head and swears, then looks back at you. \"We will leave. I cannot promise things will be peaceful if we meet again, but I will remember what you did here, stranger. All of it.\"\n\n\t\t\t*goto risers_live\n\t\t*else\n\t\t\t*set riser_affinity %-35\n\t\t\tBefore you can say much of anything, their leader spits at you. \n\n\t\t\t\"We are not interested in anything you have to say. You will wish you'd have killed us here, stranger. That I can promise,\" he says.\n\n\t\t\t*goto risers_live\n\t#Kill the Risers. \n\t\t*set death_toll +5\n\t\t*set action %+15\n\t\t*set deliberation %-15\n\t\tAll but the sickest animal will struggle when the end comes upon them. These are no different. When it's done, their eyes still reflect the firelight. You look away. \n\n\t\t*label riser_murder\n\t\t*set encampment_directions \"shaman\"\n\t\tThe shaman meets your eye\n\t\t*if savage_riser_death\n\t\t\tand shakes her head. \n\n\t\t\t\"That was…\" \n\n\t\t\tShe does not finish the statement.\n\t\t\t*goto riser_murder_2\n\t\t*else\n\t\t\tand nods once. There is conspiracy and grim acknowledgment in the gesture, the curve of her mouth, and the way she holds herself. \n\t\t\t*goto riser_murder_2\n\n\t\t*label riser_murder_2\n\t\t\n\t\t\"I have work to do here.\" She waves a hand in the direction of the \n\t\t*if savage_riser_death\n\t\t\tmangled\n\t\tcorpses. \"If you are looking for food and shelter beyond the canopy overhead, there is a settlement called Ishko at the edge of the forest, just another half day to the east.\"\n\n\t\tYou thank her for the information. \n\n\t\t*if savage_riser_death\n\t\t\t\"We are bound to help each other, are we not, Wolf-kin?\" She smiles at the expression on your face when she mentions Wolf. \"I can smell him on you. The wet fur and blood and steel. Something is different though, something beyond my ken. I cannot help, but I hope you find whatever you are looking for.\"\n\t\t\n\t\tShe turns away to tend the bodies, signaling an end to the conversation, and you walk away, to the east and to Ishko; civilization sounds good after tonight's work.\n\t\t*goto end_of_chapter\n\t*if (((ritual > 5) and (sensitivity > 5)) and (shaman_advice)) \n\t\t#Take the shaman's advice: implore the nearby gods to obscure their memories.\n\t\t\t*set eel_affinity %+10\n\t\t\t*set ritual +5\n\t\t\t*set risers_spelled true\n\t\t\t*set encampment_directions \"shaman\"\n\t\t\tYou have to be absolutely silent to hear the whisper slithering through the grass. The sound of a presence that is neither entirely real nor totally imagined. Your skill at cultivating the quiet—some might say holy—space of ritual allows you to hear the wet, slippery visitor that is invisible in the tall grass. \n\n\t\t\t\"Eel, who is brother to Wolf,\" you say without words. \"Take their memories of me, of this woman, of what has happened here. Please.\"\n\n\t\t\tYou never see what coils and uncoils around your feet because you know it can be dangerous to look, but it grows fatter and the air thicker. Breathing the hot, oily air grows impossible and you force yourself not to gag. And then it's over. All is as it was before you reached out for aid. Except…\n\n\t\t\tAll four of the bruised Risers stagger to their feet and look at you with uncertain expressions. \n\n\t\t\t\"What happened here?\" one of them asks. \n\n\t\t\tYou explain that they were attacked by wolves, but that the creatures were driven away. They accept this explanation passively and thank you before wandering away in the forest. \n\n\t\t\tWhen they are gone, the shaman whistles. \n\n\t\t\t\"You are quite a surprise, Wolf-kin,\" she says. \n\n\t\t\tYou raise an eyebrow. She knows what you are. \n\n\t\t\t\"I did not expect someone as talented in the ways of ritual understanding to walk with Wolf. But, I suppose stranger things have happened.\"\n\n\t\t\tShe watches until the Risers are gone and then goes to tend Eel's dilapidated temple. She calls out to you without turning from her work. \n\n\t\t\t\"If you want food and shelter, seek out Ishko. Only a half-day or so to the East.\"\n\n\t\t\tYou thank her and she waves you off, but not before saying. \"I hope you find what you are missing, Wolf-kin.\"\n\n\t\t\tYou leave her to her work. \n\t\t\t*goto end_of_chapter\n\t*if (restraint \u003c 30) #Sate my Wolf's instincts. Attack and tear them apart.\n\t\t*set death_toll +5\n\t\t*set chaos_score +1\n\t\t*set restraint %+25\n\t\t*set pantheon_regard -1\n\t\t*set eel_affinity %-10\n\t\t*set savage_riser_death true\n\t\tThe metallic taste in your mouth becomes all you can think of. Your fingers twitch despite you. It takes the first scream to snap you to awareness, one of the Risers is already dead by then. When you take the rest, the strongest thing you feel is relief. \n\n\t\t*goto riser_murder\n\t*disable_reuse #Ask Eel's shaman what she would do with them.\n\t\t*set shaman_advice true\n\t\tThe woman is clearly surprised to be asked her opinion on the situation, but she recovers admirably. \n\n\t\t\"Eel does not require blood to sate his appetites as some other gods do, but there is occasional wisdom in violence. They have marked your face and mine, and if they live it exposes us both to potential vengeance not only from them, but from their brethren.\n\n\t\t\"But I am loathe to tell you to kill men and women. Perhaps if there was some way to render them insensible.\" She pauses. \"Ultimately, the decision is yours, stranger.\"\n\n\t\tShe draws her cloak closer as if the night has taken on a sudden chill.\n\t\t*page_break\n\t\t*goto riser_kill_choice \n\n*label end_of_chapter\n*page_break\nYour journey east to the edge of the forest takes you about a half day as\n*if encampment_directions = \"shaman\"\n\tthe shaman said it would.\n\t*goto end_continue\n*elseif encampment_directions = \"risers\"\n\tthe Risers said it would.\n\t*goto end_continue\n*else\n\tthe crow flies.\n\t*goto end_continue\n*label end_continue\n\nYou wander out in the transitional zone where the densely packed trees begin to space out and the tall grass thins. Before you in the dazzling fullness of midday sunlight is a world that you feel you are seeing for the first time. The place in your chest where Wolf once sat and made his wishes known is now hollow, and you feel the coming days will dictate whether that emptiness is a blessing or a curse. \n*finish\n", "2_othergods": "*text_image chap_2.png center Two: Other Gods\n\n[i]\"Brother Wolf,\" said Eel. \"I have heard you are the closest of us to your original animal state and therefore the wisest. So tell me: what is luck?\"[/i]\n\n[i]\"Well, Brother Eel. I think that for an eel like you, luck is in your kin,\" said Wolf.[/i]\n\n[i]\"Is that because families help each other?\" asked Eel.[/i]\n\n[i]Wolf smiled and bared his awful teeth. \"Not exactly. You are lucky because wolves do not eat their kin.\"[/i]\n*line_break\n—from an old Quiet fable.\n*page_break\n\nYou smell Ishko before you see it. The wind carries the scents of cooked food and manure across the hilly landscape. You find the Clearwater settlement, almost big enough to be called a town, carved into the side of a pleasantly sloping hill.\n\nThe Clearwaters have been expanding their territories for ten years or more. They have branched out all across the northern hills and tested their luck at the edge of the vast steppe to the south, which the Highwalk call home. \n*if tribe = \"Clearwater\"\n\tIt has meant unexpected prosperity for the still-growing clan. You cannot help but think of these gains with some pride.\n*if tribe = \"Highwalk\"\n\tThis has caused occasional tension between the clans. You cannot imagine the awkwardly lumbering, wooden structures of the Clearwaters cluttering the vast austerity of the steppe. You shake your head at the ridiculous image as you continue on.\n*if tribe = \"Quiet\"\n\tThe ceaseless squabbling for land between Clearwater and Highwalk has long been a source of bleak humor for the comparatively reclusive Quiet. You recall the phrase: what use does the magpie have with a hammer?\n*comment endif\n\nYou find your way to Ishko proper and notice the unfinished touches of the young settlement; low stone walls, pitched tents between wooden homes. You also notice the eyes on you. It is understandable: You are a stranger and these are strange times. \n*if tribe = \"Clearwater\"\n\tBut though you attract wary glances, there is nothing outwardly hostile in their gazes. They are merely curious.\n*if tribe = \"Highwalk\"\n\tA woman snatches a child out of your path as you walk by, an old man forms a claw with his fingers and makes a sign to Hawk against mischief. A youth with a puffed out chest grips the handle of a spade with white knuckles.\n*if tribe = \"Quiet\"\n\t\"Something reeks of fish,\" you overhear, but it is hard to tell who has said it. There are sneering men and women nearby, but no one says anything else that you can hear.\n*comment endif\n\n*if (attraction = \"male\") or (attraction = \"bi\")\n\t*set ara_name \"Aran\"\n\t*set ara_he \"he\"\n\t*set ara_gender \"man\"\n\t*set ara_him \"him\"\n\t*set ara_his \"his\"\n\t*set ara_possess \"his\"\n\t*goto meet_ara\n*label meet_ara\nYou continue on toward the center of the settlement and someone steps into your path, presumably to greet you. But you can quickly tell that ${ara_he} is not a local. The cut of ${ara_his} tunic seems scandalous by local standards and ${ara_his} hair is neatly cut and clean, if fairly long.\n\n\"${prenom},\" ${ara_he} says warmly. \"Welcome to Ishko! Home of no one you ever need know, famous for not burning down. Not yet anyway.\"\n\n$!{ara_his} sudden candor and conspiratorial tone is bracing. You do not know who ${ara_he} is, but ${ara_he} is speaking to you directly. \n\nHow do you reply?\n\n*choice\n\t#With suspicion: I do not know ${ara_him} and cannot trust ${ara_him}.\n\t\t*set influence +1\n\t\t*set selfishness %+10\n\t\t*set equity %-10\n\t\t*set ara_affinity %+25\n\t\t\"Mistrust, discomfort.\" $!{ara_he} puts a hand on ${ara_his} jaw and drums ${ara_his} fingers against it. \"You are right to put as little faith as possible in me. I am impressed. Perhaps there is hope for you yet, little wolf.\"\n\t\t*goto ara_reaction\n\t#With warmth: $!{ara_he} seems friendly, and that can be an advantage.\n\t\t*set equity %+10\n\t\t*set sensitivity +5\n\t\t*set selfishness %-10\n\t\t*set ara_affinity %-10\n\t\t$!{ara_he} raises an eyebrow when you respond pleasantly. $!{ara_he} laughs outright a moment later. \n\n\t\t\"Our Wolf really has evaporated,\" ${ara_he} says. \"Speaking to a stranger without baring teeth? Unusual to say the least, my lupine friend.\"\n\t\t*goto ara_reaction\n\t#With hostility: $!{ara_he} presumes familiarity without cause. That is reason enough to anger me.\n\t\t*set action %+10\n\t\t*set deliberation %-10\n\t\t*set quickthinking +5\n\t\t*set ara_affinity %+15\n\t\tWhen you growl your reply, ${ara_his} eyes narrow and ${ara_his} grin widens. \n\n\t\t\"There it is. The raw edge. The animal instincts, still there. What a beautiful sight,\" ${ara_he} says. \"If you give in to those impulses, you will surely become a beautiful whirlwind of death. You will be lost in the sensation of it. I cannot wait.\"\n\t\t*goto ara_reaction\n\t#With humor: Whoever ${ara_he} is, ${ara_he} does not seem to be very serious. May as well match ${ara_his} tone with mine.\n\t\t*set ritual +5\n\t\t*set selfishness %+5\n\t\t*set deliberation %-5\n\t\t*set ara_affinity %+10\n\t\tYou crack a joke about your proclivity toward strangling strangers. It is not much of a joke, but being Wolf's avatar has not left much time for comedy. \n\n\t\tStill, the stranger laughs raucously as if a joke was the last thing ${ara_he} expected.\n\n\t\t\"Wolf's own weapon is funny. I would not have imagined. Not ever,\" ${ara_he} responds.\n\t\t*goto ara_reaction \n\n*label ara_reaction\n\n\"Who are you?\" you ask. \"And how do you know my name?\"\n\n$!{ara_he} genuflects sarcastically.\n\n\"I am ${ara_name}. I know a great many things. And I believe you know me.\"\n\nAround the periphery of ${ara_his} dark irises, there are suddenly a half-dozen or more tiny eyes staring back at you. You blink, and the effect is gone: ${ara_his} eyes are normal once again, but you cannot shake the sensation of being watched. \n\n\"Spider,\" you say. \n\n\"Yes. The living embodiment of the clever, cunning, gracious goddess. At your service. Possibly,\" ${ara_name} says. \"But look at you, you are filthy and tired. There is a place nearby where you can find a little food and shelter, if sleeping under the stars has lost some of its charm. Come find me in the morning if you have questions that need answering.\"\n\nYou cannot recall ever meeting an avatar of Spider, but there is little doubt that ${ara_he} is what ${ara_he} claims to be. You shake your head and make your way deeper into the settlement.\n*page_break\n\nYou find the closest thing to an inn near the heart of the settlement, and its Clearwater proprietress looks at you with \n*if tribe != \"Clearwater\"\n\topen disdain. She offers you a place to sleep, a hot meal and a bath if you choose in return for hours of work chopping and hauling wood for her hearth. She does not seem to trust you with an axe in hand and so she floats nearby until you finish and return the instrument to her.\n\t*goto at_the_inn_2\n*else\n\tpity.\n\n\t\"One of our own looking like a wild-${man_woman}. Hawk must have had an eye out to bring you to my doorstep,\" she says, ushering you into the warm establishment. \"You need a meal in you and a bath, I would wager.\"\n\n\tThe woman will not hear anything about repayment, so you only bring the subject up once.\n\t*goto at_the_inn_2\n\n*label at_the_inn_2\n\nThe meal she offers is simple fare: vegetables boiled beyond recognition and a simple fish broth, but it is hot and therefore welcome. After you've eaten in a companionable enough silence, you ask her to tell you a bit about Ishko. She bristles at the question initially, but eventually answers.\n\nShe tells you\n*if tribe = \"Clearwater\" \n\tabout her partner whose idea it was to help establish the new settlement at the edge of Clearwater territory. It was a romantic notion but had its difficulties; wild animal attacks at the fringes of the village, long bouts of drought in the high summer, and starvation during the winters.\n*if tribe != \"Clearwater\"\n\tin clipped sentences about goods stolen by Highwalk and Quiet strangers in the dead of night. She points out that any attempt to weaken Ishko from within its borders carries the price of death, but stops short of making specific accusations.\n\n*page_break\nAfter finishing your modest dinner you are offered a bath. The water is lukewarm at best and there is no soap to speak of, but there is a warped piece of glass in which you catch your reflection. Your hair is: \n\n*choice\n\t#Twisted in dark, intricate braids that trail down my back.\n\t\t*set hair_choice \"braided hair\"\n\t\t*goto skin_choice\n\t#Copper-red and shaved short with whatever sharp implement is within reach.\n\t\t*set hair_choice \"short hair\"\n\t\t*goto skin_choice\n\t#Light blond and curly, when it is not laden with oil and sweat. \n\t\t*set hair_choice \"curly hair\"\n\t\t*goto skin_choice\n\t#Black and straight, usually tied back with some bit of leather or twine.\n\t\t*set hair_choice \"long black hair\"\n\t\t*goto skin_choice\n\t#Brown and wavy, of average length, but thick. \n\t\t*set hair_choice \"wavy hair\"\n\t\t*goto skin_choice\n\t#Black and kinky with soft, oft-tangled whorls.\n\t\t*set hair_choice \"kinky hair\"\n\t\t*goto skin_choice\n\t#Non-existent. I shave it completely clean every chance I get. \n\t\t*set hair_choice \"bald head\"\n\t\t*goto skin_choice\n\n*label skin_choice\n\nYou have to grudgingly admit that your head looks better when clean. As does your skin, which is: \n\n*choice\n\t#Clear and unblemished, free of major scarring.\n\t\t*set skin_choice \"smooth\"\n\t\t*goto sleepy_time\n\t#Crisscrossed with scars at various stages of healing. \n\t\t*set skin_choice \"scarred\"\n\t\t*goto sleepy_time\n\t#Freckled across my face, chest, and arms. \n\t\t*set skin_choice \"freckled\"\n\t\t*goto sleepy_time\n\t#Unscarred, but tattoos proudly declaring my clan all but cover my back and upper arms.\n\t\t*set skin_choice \"tattooed\"\n\t\t*goto sleepy_time\n\n*label sleepy_time\n\nYou leave the bath and feel somewhat restored. But sleep is your ultimate goal. You find your designated sleeping area:\n*if tribe != \"Clearwater\"\n\ta stained pallet thrown down in a corner of a communal space packed with other sleepers. You briefly wonder if the Clearwater woman would have treated one of her own so poorly, but do not dwell on the thought long. \n*if tribe = \"Clearwater\"\n\ta pallet and feather-stuffed pillow in a relatively secluded area of the inn.\nYou fall asleep quickly. \n\nYou dream. \n*page_break \n\nYou hear the pad of his preternaturally quiet steps on the softened ground, but Wolf can no more hide from you than you from him. You cannot see his shape in the driving rain, but you catch his scent through the wet. He \n*if ((action > deliberation) and (selfishness >= equity))\n\tcircles you for a few long moments, but in the end pads into your view.\n\t*goto continue\n*else\n\tgrowls at you from somewhere out in the rain and appears before you gradually.\n\t*goto continue\n\n*label continue\nYou wonder how it is possible for a fallen god to skulk around you in your sleep, but that concern is made distant in the gnarled logic of dreams. \n\n*if pantheon_regard \u003c 5\n\tThere is a body lying before Wolf. Someone that you tore apart in the forest. There is blood on Wolf's maw. You cannot tell whether if it belongs to the dead person, the Wolf, or yourself.\n\t*goto sleepy_time_2 \n\n*if pantheon_regard >= 5\n\tThe Wolf carries a broken rabbit in his teeth and drops it at his feet. He licks blood from his maw and stares at you. You can feel his hunger inside you so keenly that your stomach knots with it. \n\t*if restraint > 30\n\t\tSomehow you find the strength to stay upright. You restrain yourself, when you otherwise might lapse into bestial urges. \n\t\t*goto sleepy_time_2\n\t*else\n\t\tYou get on your knees and feast on the animal, tearing at it with your teeth and savoring the hot, fresh meat. There is no need to restrain yourself. You are an animal, too.\n\t\t*goto sleepy_time_2\n\n*label sleepy_time_2\n\n*comment This is Wolf path.\n*if ((action > deliberation) and (selfishness >= equity))\n\t\"You are me.\" \n\n\tThe voice is yours, or some animal approximation of your voice. \"We will be avenged.\"\n\t*goto post_dream\n*else\n\t\"A wolf is always a wolf, teeth bared or smiling.\"\n\n\tThe voice you hear is your own. But you are not speaking the words. Wolf watches you carefully.\n\n\t\"I am you and you are me. And we will be avenged.\"\n\t*goto post_dream\n\n*label post_dream \n*page_break \n\nIn the morning, the strange mood of your dream burns off under the sun like dew, but leaves a tacky feeling in the back of your throat. Most gods reach out to their servants through dreams and signs, but Wolf was always more direct with you, preferring to lead you through instinct and feeling than distant, jumbled augury. There are others though, avatars and priests of far-seeing gods who are known to unravel meaning from dreams and delve into unknown futures. Perhaps it would be worth your time to seek one out. \n\nOnce you are fully awake, you begin to ready yourself for the day. \n\nThe innkeeper offers you breakfast—such as it is—and you accept gratefully. As you work through the lentils you were given, you see ${ara_name} doing the same, seated at one of the long tables that forms the half-cocked dining room. You approach ${ara_him}, and ${ara_he} smiles. \n\n\"Not the finest food in the wide world, but one does what one must, no?\"\n\n\"That is true,\" you remark, and sit across from ${ara_him}. \"You offered to answer my questions.\"\n\n\"Did I?\" ${ara_name} says. \"Ask them and we will see, I suppose.\"\n\n*label ara_reaction_2\nWhat questions, if any, do you have for the Spider host?\n\n*choice\n\t*disable_reuse #\"Why approach me?\"\n\t\t*set no_question true\n\t\t${ara_name} shrugs. \n\n\t\t\"I waited here for you.\" $!{ara_he} reaches out to touch your cheek, but draws back ${ara_his} hand at the last moment. \"I wanted to see for myself if it was true what the goddess saw.\"\n\n\t\t\"What did she see?\" you ask. \n\n\t\t\"That is a different question, little wolf,\" ${ara_he} says. \n\t\t*page_break\n\t\t*goto ara_reaction_2\n\t*disable_reuse #\"You are the same as I am, an avatar.\"\n\t\t*set no_question true\n\t\t\"Not quite a question, is it? And, are we the same?\" ${ara_name} tests the last word out on ${ara_his} tongue. $!{ara_he} considers the question for a moment. \"No. I do not think so. We are both hosts, avatars, whatever you would like to call those of us whose bodies are living altars to the gods. But I do not think we are the same, Wolf-kin. Especially not with your newfound freedom.\"\n\n\t\t\"Freedom? What do you mean?\" you ask.  \n\n\t\t\"Ah. Yet another question,\" ${ara_he} says. \n\t\t*page_break\n\t\t*goto ara_reaction_2\n\t*disable_reuse #\"Do you know what has happened to Wolf?\"\n\t\t*set no_question true\n\t\t*set wolf_question true\n\t\t\"There it is: The question worth asking. Would you believe me, ${prenom}, if I said that Wolf was gone? Murdered perhaps or dead from his own foolish nature. Would you take me at my word?\"\n\n\t\tBefore you can answer, ${ara_he} waves off your reply. \n\n\t\t\"Wolf is dead. That is all I know. You and whatever of him you carry are all that remains of our brother-god. So I suppose you ought to step carefully, a false move and all that remains of a proud force of nature becomes extinct. Quite the burden if you ask me,\" ${ara_he} says. \"But if it were me, I would go looking for someone who could look into the sky and the stars and fetch me some answers. Maybe someone with far enough sight that they see my fate before them and my past behind them.\"\n\n\t\t\"I was thinking the same,\" you say, and look at ${ara_him} pointedly.\n\n\t\t${ara_name} laughs. \"Are you thinking about me? No, Wolf-kin. Spider has many eyes but none, so far as I know, that peer into the future or the past. Our lady watches the world and weaves her impenetrable web, but what fun would it be if she already knew the outcome? Why play a game whose result is already set? How would one prove one's mastery of all things?\"\n\n\t\tAnd you reply: \n\t\t*fake_choice\n\t\t\t#\"Then you are useless to me.\"\n\t\t\t\t*set ara_affinity %+15\n\t\t\t\t${ara_name} smiles broadly. \"Just so, Wolf-kin.\n\t\t\t#\"Do you really think you can hold me in your web?\"\n\t\t\t\t*set action %+10\n\t\t\t\t*set deliberation %-10\n\t\t\t\t\"I do not know, Wolf-kin, but it is a very big web.\n\t\t\t#\"Spider is fond of her games. Is she not?\"\n\t\t\t\t*set deliberation %+10\n\t\t\t\t*set action %-10\n\t\t\t\t\"As much as you enjoy the taste of blood, Wolf-kin.\n\t\t\t#\"That is fine. I could not trust your prophecy anyway.\"\n\t\t\t\t*set hawk_affinity %+15\n\t\t\t\t\"So true, Wolf-kin. So very true.\n\t\t\t#\"For the joy of the game itself. Is Spider above such pleasures?\"\n\t\t\t\t*set eel_affinity %+15\n\t\t\t\t\"You are not wrong, ${prenom}. You are certainly not wrong. \n\t\tAnyway, you are better off finding a prophet or prophetess. Someone beloved of Gazelle, who scans the horizon. Or Hawk, maybe, if you can stand humbling yourself before her.\"\n\t\t*page_break\n\t\t*goto ara_reaction_2\n\t*disable_reuse #Ask about the dream.\n\t\t*set no_question true\n\t\tYou tell ${ara_name} about your Wolf-dream. You stress the unusual nature of a being contacted through a dream. $!{ara_he} listens, for the first time with something resembling seriousness, but in the end ${ara_he} shrugs. \n\n\t\t\"The dreams are usually a communication with our gods, but yours—you say that Wolf usually contacts you through instinct and feeling?\" ${ara_he} asks.\n\n\t\t\"Exactly.\"\n\n\t\t\"The dream could just be a dream. Or maybe there is some deeper game. I am no priest to go throwing bones in the fire for you, ${prenom}. The best I can do is tell you to seek someone more experienced in the arcane.\"\n\t\t*page_break\n\t\t*goto ara_reaction_2\n\t*if (no_question = false) #\"I have no interest in what an agent of the deceiving Spider has to say.\"\n\t\t*goto post_question\n\t*if (no_question = true) #I have no other questions. \n\t\t*goto post_question\n\n*label post_question\n*if ((no_question = false) or ((no_question = true) and (wolf_question = false)))\n\tAs you walk away, ${ara_name} calls after you. \n\n\t\"You should know, Wolf-kin, that your patron-god is dead and gone. I know you can feel it and see it in the stars, just like I can. I cannot tell you who or what is responsible, but I am curious. What will you do next? No one has ever been released from the grasp of the gods. At least not without significant bloodshed. What will you make of yourself now, ${prenom}?\n\n\t\"If it were me, I think I would find a prophet, someone whose business it is to pry into the celestial mysteries. One much beloved by Gazelle whose gaze is fixed firmly on the horizon. Maybe someone like that could help you? But, who knows…\"\n\n\tYou turn around and ${ara_name} is gone. \n\t*goto after_spider\n*else\n\tYou part with ${ara_name} having learned what you wanted to know, but can you entirely trust the source of your information?\n\t*goto after_spider\n\n*label after_spider\n\nThe goddess Spider is known for playing games of calculation, manipulation, and deception, but whether you trust her or not, what her flesh and blood emissary is saying has an element of truth. You can feel the difference for yourself: Wolf is dead. If not dead, then gone somewhere you cannot follow, nor perhaps would you want to. \n\nYour next goal must be the steppe. ${ara_name}'s less-than-subtle insinuation that you need a prophet's aid is not incorrect. Though it is said that all the gods can glean snatches of likely futures, Gazelle and Hawk are particularly gifted with presentiment. Hawk keeps such revelations to herself, but kind-hearted Gazelle could be persuaded to share them. So you leave the inn with the intention of moving south, toward the boundless steppe \n*if tribe = \"Highwalk\"\n\tthat you call home.\n*if tribe != \"Highwalk\"\n\twhich is vast and unlike any other place in the world. \n*page_break\n\nIshko, which was relatively sedate the day before, is now vibrating with activity. There are men and women running every which way and some commotion near the settlement's front gate. You consider whether to go investigate, but before you can make a decision, someone casually slips their arm under yours. ${ara_name}'s slick grin greets your inspection.  \n\n\"A storm brewing in this sleepy little hovel? We should find what is the matter.\"\n\nThere are pockets of Ishkoans gathered around the central square watching the approach of a large group of armed and leather-armored newcomers.  \n\n*if recognize_rising_sun\n\tYou recognize them as belonging to the Rising Sun group before you even see them. Their smell—beaten leather, traces of blood, and sweat—discloses their identities readily enough. The stylized sunburst branded on their tunics merely proves the point. \n*if recognize_rising_sun = false\n\t\"The Rising Sun or Risers, more colloquially,\" ${ara_name} whispers. \"A group outside of the magnanimous tutelage of the gods, which subtly and correctly guide all our lives. Risers are heathens of the worst sort, but that does not mean they are exactly powerless, does it?\"\n*comment endif\n\nThe Risers, some of them riding horses and others on foot, march down the center of town and stop just paces away from where you are standing. \n\nOne of them calls the halt and climbs down from his horse.\n*if gellas_reoccurs\n\t*set r_captain \"Gellas\"\n\tYou recognize him from the forest; his name is Gellas. He sees you and \n\t*if riser_affinity \u003c 50\n\t\tscowls.\n\t\t*goto riser_meeting\n\t*elseif riser_affinity = 50\n\t\tnods his acknowledgement.\n\t\t*goto riser_meeting\n\t*else\n\t\twaves you over.\n\t\t*goto riser_meeting\n*elseif risers_spelled\n\t*set r_captain \"Gellas\"\n\tYou recognize him as Gellas, the leader of the Risers you encountered in the forest, but he does not recognize you. The ritual you worked with Eel's assistance has apparently held.\n\t*goto riser_meeting\n*else\n\t*set r_captain \"Vesul\"\n\tHe is tall and his expression grim. One of his coterie asks, \"Vesul, should we scout a place to camp beyond the walls?\"\n\n\t\"No,\" their leader replies. \"We will not be here long.\"\n\t*goto riser_meeting\n\n*label riser_meeting\n\n*if riser_affinity > 60 \n\t\"I see you came to Ishko. I hope they have treated you kindly,\" ${r_captain} shouts in your direction.\n\n\t*if tribe = \"Clearwater\"\n\t\t\"They have,\" you reply. \n\t*if tribe != \"Clearwater\"\n\t\t\"More or less,\" you reply.\n\t*comment endif\n\n\t\"Good. Good,\" he says. \"I would prefer we were meeting under better circumstances, but the order has come, and Ishko may no longer be the safest place for you to be. I am sorry you have walked into turmoil.\"\n\n\t\"What is the trouble?\" ${ara_name} asks, still standing at your side. \n\n\t${r_captain} looks at ${ara_him} for the first time. He hesitates, but eventually explains the situation. \n\n\t\"The Rising Sun has been attempting to negotiate with Ishko for some time about the rivers and fertile land between this settlement and a number of nearby Rising Sun encampments. We have only just begun to settle in this far north, but—\" ${r_captain} spits, \"—the Ishkoans have resisted sharing even one parcel of their land with us. They cite ancient and spiritual dominance, using potential retribution from angry gods to scare us away. Our encampments will not survive through the coming winter without securing additional provisions. They have set the stage for a serious disagreement between us.\n\t\n\t\"Though…you are\n\t*if tribe = \"Clearwater\"\n\t\tClearwater, too, are you not? \n\t*if tribe != \"Clearwater\"\n\t\tan outsider. \n\tIf you could speak to them, try to make them see reason and avoid potential bloodshed. We would be indebted to you.\"\n\n\t*label diplomacy_options\n\t*choice\n\t\t#\"I will speak to them on your behalf.\"\n\t\t\t*goto diplomacy_continue\n\t\t#\"Perhaps you should reconsider your position and leave this town alone.\"\n\t\t\t${r_captain} rakes a hand through his hair. \"I would love nothing more than to leave this stinking place far behind me, but the Ishkoans overplay their hand. They claim rights to land they cannot reasonably defend or possibly need. My people need this land as well, and we are not afraid to fight for it.\n\n\t\t\t\"So will you help us reason with the Ishkoans or not?\"\n\t\t\t*choice\n\t\t\t\t#\"I cannot. This is your mess to clean up. Not mine.\"\n\t\t\t\t\t*set riser_affinity %-10\n\t\t\t\t\t*set restraint %-5\n\t\t\t\t\t*set riser_difficulty ((influence * 2) + (combat + survival))\n\t\t\t\t\t${r_captain} lets out a long sigh, as if the weight of your words have pressed it out of him. \n\n\t\t\t\t\tYou feel a bit of difficulty yourself. As much as the wolf in you would have loved to tear the Risers apart, you have refrained, and the unspilled blood extracts a toll from your restraint. \n\n\t\t\t\t\t*if riser_difficulty >= 28\n\t\t\t\t\t\t*label risers_intimidated\n\t\t\t\t\t\t*set riser_conflict true\n\t\t\t\t\t\t${r_captain} squeezes the bridge of his nose and closes his eyes for a moment before returning his gaze to you. \n\n\t\t\t\t\t\t\"My people will suffer needlessly because of your decision here today. I hope you understand that.\"\n\n\t\t\t\t\t\tHe hesitates. \n\n\t\t\t\t\t\t\"But I will not fight you. Not without a more suitable force behind me.\"\n\t\t\t\t\t\t*page_break\n\n\t\t\t\t\t\t*label ishko_thanks\n\t\t\t\t\t\t*set ishko_aid true\n\t\t\t\t\t\tAs ${r_captain} and his soldiers leave Ishko, the members of the settlement watch hopefully. When it is clear they have gone, the Ishkoans are visibly relieved, but your presence does not entirely set them at ease. \n\n\t\t\t\t\t\tOne of them approaches you. \n\n\t\t\t\t\t\t\"Thank you, stranger. We appreciate you interceding on our behalf. Who knows if they will be back, but each battle we do not fight helps make our community that much safer.\"\n\n\t\t\t\t\t\tYou accept his thanks, but refuse further considerations. You have spent long enough in Ishko.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tAs you go to leave the settlement, you are stopped by ${ara_name}. \n\n\t\t\t\t\t\t\"Savior of the downtrodden! What a soft-touch you are, ${prenom},\" ${ara_he} says. \n\n\t\t\t\t\t\t*if restraint \u003c 35\n\t\t\t\t\t\t\t\"Go spin your damned web elsewhere, ${ara_name},\" you tell ${ara_him} with a growl.\n\n\t\t\t\t\t\t\tThe sudden flash of irritation seems to come out of nowhere. It is not necessarily a cause for concern yet, but you make a note to keep an eye on your temper.\n\n\t\t\t\t\t\t\t\"At last we see some of that fire. Where was that when you were dealing with the Rising Sun?\"\n\n\t\t\t\t\t\t\t${ara_name} shrugs.\n\t\t\t\t\t\t\t*goto post_restraint_check\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou do not rise to ${ara_his} bait, and ${ara_he} pouts sarcastically.\n\t\t\t\t\t\t\t*goto post_restraint_check\n\n\t\t\t\t\t\t*label post_restraint_check \n\n\t\t\t\t\t\t\"Well, there will always be more chaos to incite. Not to mention livelier places to do it. I assume you are headed to the steppe?\" ${ara_he} asks. $!{ara_he} gives you an inscrutable smile. \"Of course you are, and I hope that all kinds of opportunities for trouble await you, ${prenom}.\"\n\n\t\t\t\t\t\tBefore you can consider whether or not to do violence against ${ara_him} or ask what ${ara_he} means, ${ara_he} laughs and walks away. \n\n\t\t\t\t\t\tYou do not follow. You have your own places to go. \n\t\t\t\t\t\t*goto continue_1\n\t\t\t\t\t*else \n\t\t\t\t\t\t*label risers_unintimidated\n\t\t\t\t\t\t\"We will not be leaving. Farming and fishing rights are the difference between death and survival this far north. If it means anything, though, I am sorry about what comes next.\"\n\n\t\t\t\t\t\t*goto pre_riser_fight_with_text\n\t\t\t\t#\"I will, because otherwise it will mean more death.\"\n\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t*set bear_affinity %+15\n\t\t\t\t\t\"Good,\" ${r_captain} says. \"I am glad you have seen reason.\"\n\n\t\t\t\t\t*goto diplomacy_continue\n\t\t\t\t#\"If it will benefit me.\"\n\t\t\t\t\t*goto bribery\n\t\t#\"Would it not be wiser to just take the town unawares?\"\n\t\t\t${r_captain} squints at you, as if to gauge your seriousness.\n\n\t\t\t\"That would be beneficial to the Rising Sun cause, but given the size of the town and the number of able-bodied persons, difficult. Unless we had help.\" He looks at you, and asks, \"are you serious about this?\"\n\t\t\t*choice\n\t\t\t\t#\"Yes. We will take Ishko by force.\"\n\t\t\t\t\tYou address the gathered Ishkoans. \n\n\t\t\t\t\t\"This settlement is no longer yours,\" you tell them. \"This is simple. Do not make it difficult.\"\n\n\t\t\t\t\t*goto ishko_force\n\t\t\t\t#\"Maybe attacking outright is not the wisest course of action. We should reconsider.\"\n\t\t\t\t\tAn expression crosses ${r_captain}'s face that takes time for you to place. Something like relief. \n\n\t\t\t\t\t\"Yes,\" he says. \"A different way. So will you talk to them then?\"\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Yes, of course.\"\n\t\t\t\t\t\t\t*set riser_affinity %+25\n\t\t\t\t\t\t\t*if tribe = \"Clearwater\"\n\t\t\t\t\t\t\t\t*set tribe_multiplier 2\n\t\t\t\t\t\t\t*label diplomacy_continue\n\t\t\t\t\t\t\t*set ishko_diplomacy (influence * tribe_multiplier)*2\n\t\t\t\t\t\t\tYou approach the gathered Ishkoans with ${r_captain} and the other Rising Sun faithful following at a measured distance.\n\n\t\t\t\t\t\t\t\"Who will speak for Ishko?\" you ask.\n\n\t\t\t\t\t\t\tSome of the Ishkoans tighten their fingers around makeshift weapons. \n\n\t\t\t\t\t\t\tThe man who pushes his way to the front of the crowd does not offer his name or much in the way of greeting. Instead he points a finger at ${r_captain}.\n\n\t\t\t\t\t\t\t\"So the conquerors approach. You eye our land with greed and covet what the gods themselves have given us. We have seen in the eyes of the Hawk who wheels above us what will become of those who fall under your sway. We reject your offer before it slips out of your snake's tongue.\n\n\t\t\t\t\t\t\t\"But you, outsider, we do not know what to make of you. Will you throw in with these monsters, or will you find your sense and leave their side?\"\n\n\t\t\t\t\t\t\t*if ishko_diplomacy >= 5\n\t\t\t\t\t\t\t\tHe grunts, nods, and waits for you to speak.\n\t\t\t\t\t\t\t\t*label immediate_diplomacy\n\t\t\t\t\t\t\t\tAnd just like that, you have been given an opportunity to influence the future of relations between the Rising Sun and the Clearwater settlement of Ishko. Will you encourage harmony or incite chaos?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#[To the Rising Sun] \"The Ishkoans have staked out this territory. By the laws of gods and men, it is theirs. You should leave. Now.\"\n\t\t\t\t\t\t\t\t\t\t*set riser_difficulty ((influence * 5) + combat)\n\t\t\t\t\t\t\t\t\t\t*if riser_difficulty >= 19\n\t\t\t\t\t\t\t\t\t\t\t*goto risers_intimidated\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\"Unfortunately, I do not think that is how this is going to go,\" ${r_captain} says.\n\n\t\t\t\t\t\t\t\t\t\t\t*goto pre_riser_fight_with_text\n\t\t\t\t\t\t\t\t\t#\"[To both groups] \"There is no reason, aside from ignorance, why both Rising Sun and Ishkoans cannot share fishing and farming rights in this area.\" [Encourage cooperation]\n\t\t\t\t\t\t\t\t\t\t*if ((((sensitivity + ritual) >= 24) and (influence > 1)) or (((quickthinking + survival) >= 24) and (influence > 1)))\n\t\t\t\t\t\t\t\t\t\t\t*check_achievements\n\t\t\t\t\t\t\t\t\t\t\t*if not(choice_achieved_ishkopeace)\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve ishkopeace\n\t\t\t\t\t\t\t\t\t\t\t*set riser_ishko_cooperation true\n\t\t\t\t\t\t\t\t\t\t\t*set pantheon_regard +1\n\t\t\t\t\t\t\t\t\t\t\t*set ishko_aid true\n\t\t\t\t\t\t\t\t\t\t\tThe Ishkoans are slow to hear your words and almost too wary to heed them, but something in your tone or bearing brings them around. \n\n\t\t\t\t\t\t\t\t\t\t\tThe Rising Sun soldiers shift awkwardly as the negotiations commence, but ${r_captain} is the very picture of a diplomat. He argues firmly, but never forcefully for the sharing of land rights among Ishkoans and their neighbors, the burgeoning Rising Sun encampment.\n\n\t\t\t\t\t\t\t\t\t\t\tThe negotiations remain tense for some time, but they proceed without outright animosity, which is a good sign. \n\n\t\t\t\t\t\t\t\t\t\t\tYou realize after an hour or so that you are no longer needed. The threat of violence has passed. You prepare yourself to move on, but first ${r_captain} catches your eye, and mouths, \"thank you,\" before returning to the negotiations.\n\n\t\t\t\t\t\t\t\t\t\t\tYou have managed a difficult negotiation, which required a quick mind, a deep understanding of people, and an authoritative air. Going forward, which of those skills would you like to cultivate? \n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#Wit and Mental Clarity.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set quickthinking +15\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto upgrade_choice\n\t\t\t\t\t\t\t\t\t\t\t\t#Understanding and Sensitivity.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set sensitivity +15\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set influence +1\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto upgrade_choice\n\t\t\t\t\t\t\t\t\t\t\t\t#Influence and Authoritative Presence.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set influence +2\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto upgrade_choice\n\t\t\t\t\t\t\t\t\t\t\t*label upgrade_choice\n\n\t\t\t\t\t\t\t\t\t\t\tSatisfied with your work in Ishko, you start to move on. \n\t\t\t\t\t\t\t\t\t\t\t*label ara_interrupt_flow\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tOn your way to the edge of town, you find ${ara_name} waiting for you. $!{ara_he} is casually watching two children struggling at fetching water from a well, but ${ara_he} does nothing to help. \n\n\t\t\t\t\t\t\t\t\t\t\t*if riser_ishko_cooperation \n\t\t\t\t\t\t\t\t\t\t\t\t\"They are like those children, are they not? Struggling with things bigger than their little hands can wrap around,\" ${ara_he} says, watching the children awhile, before continuing, \"but it is not our job to shepherd them. Only to observe, to occasionally dispense some cryptic wisdom. To amuse ourselves. Hopefully you learn that lesson before the steppe. But I have never had much use for hope.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto ara_text_continue\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\"Have you learned a lesson? They cannot be tamed, nor can they be helped. We can only trust them to amuse us with their foibles and occasionally devise new and interesting ways to slay each other. That is what they exist for. Like those children, they struggle, but there is nothing in the end but waste and ache.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"But you know that deep down and this life of ours will find plenty of opportunities to reteach that lesson,\" ${ara_name} says. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Head to the steppe, I promise it will be worth your time,\" ${ara_he} adds.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto ara_text_continue\n\t\t\t\t\t\t\t\t\t\t\t*label ara_text_continue\n\n\t\t\t\t\t\t\t\t\
