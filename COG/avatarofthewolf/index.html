ugh the trees since day broke. You should be more cautious.\"\n\n\t\tShe points to a small roasted bird on a makeshift spit and offers it up. \"Squab?\"\n\n\t\tAs easy as that, you are integrated into the enclave. The duties are judiciously split and\n\t\t*if ((enclave_leader = \"you\") or (enclave_leader = \"both\"))\n\t\t\t*if enclave_leader = \"both\"\n\t\t\t\tas one of their chosen leaders\n\t\t\t*if enclave_leader = \"you\"\n\t\t\t\tas their chosen leader \n\t\t\tyou are often given the first choice on the duties that sustain the enclave, but not always. Your relationship with the group is mutually respectful, but not over-zealous. \n\t\t\t*goto enclave_end\n\t\t*else\n\t\t\tyou are given tasks oriented toward your skill set, and you quickly realize how egalitarian the structure of the enclave is by design. \n\t\t\t*goto enclave_end\n\n\t\t*label enclave_end\n\n\t\t*if riser_hunted_stub\n\t\t\tThe enclave spends a great amount of time over the next few months planning and carrying out attacks on the Rising Sun. Sometimes you are directly involved and other times the effort is more individualized, but the pressure never relents.\n\t\t*if riser_safe_stub\n\t\t\tThe enclave more or less avoids conflict with the Rising Sun, though occasional skirmishes cannot be entirely avoided between two such proud and martially minded groups. Luckily, you do not see much besides the occasional broken bone or busted lip.\n\t\t*if riser_curbed_stub\n\t\t\tThe enclave is reluctant to fully agree to peace with the Rising Sun, but over time things get easier gradually. It begins with an exchange of goods, and a few months in, Fillin begins courting a Rising Sun soldier who is so fit, strong, and skilled with a blade that when they spar, they almost seem like brothers. \n\t\t*comment endif\n\t\t*if (((riser_hunted_stub = false) and (riser_safe_stub = false)) and (riser_curbed_stub = false))\n\t\t\tEventually the question of the Rising Sun comes up. The group naturally grows in power as Wolf's demise becomes common knowledge. \n\n\t\t\tYou are asked for your opinion on the matter one morning as you wander into an argument between Suba and Hemming. \n\n\t\t\t\"We should have already hunted them to extinction! Enough Equivocating!\" Suba shouts, rubbing a hand over her bald head in frustration.\n\t\t\t*if enclave_purpose = \"fight\"\n\t\t\t\t\"We already decided to fight. It should be a closed matter.\"\n\n\t\t\t*if wolves_harsh_fate\n\t\t\t\t\"Zev died because we fought when talking might have helped,\" Hemming shouts back. \n\n\t\t\t\tSuba's fists lock at the mention of their former ally's name.\n\t\t\t*comment endif\n\n\t\t\tHemming sighs. \"Suba. We cannot win. They are growing stronger and we are godless. What chance do we have?\"\n\n\t\t\t\"What chance do we need? If we die, we die. There is no shame in it.\"\n\n\t\t\tWhen Hemming sees you, he waves you over. \"${prenom}! Please explain to Suba that fighting the Rising Sun is going to get us killed.\"\n\n\t\t\tSuba crosses her arms over her chest and rolls her eyes. \"Yes, ${prenom}. Tell me how violently irrational I am.\"\n\n\t\t\t*choice\n\t\t\t\t#I think we should fight. Suba's right.\n\t\t\t\t\t*set riser_hunted_stub true\n\t\t\t\t\t*set action %+25\n\t\t\t\t\t*set deliberation %-25\n\t\t\t\t\tSuba claps excitedly and Hemming makes a disgusted noise.\n\n\t\t\t\t\t\"See? Now here is a real wolf!\" Suba exclaims. \"Come, ${prenom}. Let us convince the rest of our less-bloodthirsty friends to wake up and fight.\"\n\n\t\t\t\t\tThe muscled warrior puts her arm around your neck and leads you off to find the rest of the enclave.\n\n\t\t\t\t\t*goto fighting_wolves\n\t\t\t\t#Hemming makes sense. We should be careful. Talk to them, if they will listen.\n\t\t\t\t\t*set deliberation %+25\n\t\t\t\t\t*set action %+25\n\t\t\t\t\t\"We should make peace with them if at all possible,\" you say, explaining your position. \n\n\t\t\t\t\tHemming looks surprised, but then loudly offers his agreement. Suba shakes her head. \n\n\t\t\t\t\t*if (((influence >= 5) and (enclave_leader = \"you\")) or (enclave_leader = \"both\"))\n\t\t\t\t\t\t*set riser_curbed_stub true\n\t\t\t\t\t\t*set sensitivity +5\n\t\t\t\t\t\t*set equity %+20\n\t\t\t\t\t\t*set selfishness %-20\n\t\t\t\t\t\t*check_achievements\n\t\t\t\t\t\t*if not(choice_achieved_givepeaceachance)\n\t\t\t\t\t\t\t*achieve givepeaceachance\n\t\t\t\t\t\t\"Fine. We will make peace, if we can, but when we fail.\" Suba grins. \"We will do it my way.\"\n\n\t\t\t\t\t\tYou soon find that the matter of peace with the Rising Sun if larger than just convincing Suba, or even the rest of the Wolf enclave. You are soon asked for your opinion by other groups: Eel shamans, caravan leaders, trading towns, even unaffiliated groups representing strange new gods. You counsel peace and cooperation each time, and you hope the message will spread. \n\n\t\t\t\t\t\t*goto enclave_fate_4\n\t\t\t\t\t*else \n\t\t\t\t\t\t*set riser_hunted_stub true\n\t\t\t\t\t\t\"Are you even still wolves under all that timidness, I wonder,\" Suba says aloud.\n\n\t\t\t\t\t\tShe walks away, leaving you and Hemming to your shared ideologies. \n\n\t\t\t\t\t\t*label fighting_wolves\n\t\t\t\t\t\tIn a few days it is announced that the Wolf enclave will begin coordinated attacks on the Riser camps.\n\n\t\t\t\t\t\t*goto enclave_fate_4\n\t\t\t\t#We should mind our business and stay out of theirs, unless they make problems for us.\n\t\t\t\t\t*set equity %+25\n\t\t\t\t\t*set selfishness %-25\n\t\t\t\t\t*set riser_hunted_stub true\n\t\t\t\t\tNeither party seems to be content with that answer and they keep arguing well into the night.\n\n\t\t\t\t\t*goto enclave_fate_4\n\n\t\t*label enclave_fate_4\n\n\t\t*if (((lyall_dies = false) and (lyall_romance != \"refused\")) and (lyall_fate != \"banished\"))\n\t\t\t*page_break\n\t\t\t*gosub romancing_lyall \n\n\t\t*goto picking_your_ending_2\n\t#Roam the land. I am sure there is someone who could use my help.\n\t\tOnce you leave Siltstone, you travel until you reach the ocean. You spend time in a village off the coast where people are being assaulted at night by a so-called monster. You find that this beast is no more than a overgrown lynx harassing the local populace. \n\t\t*if deliberation >= action\n\t\t\tYou manage to scare it off without killing it.\n\t\t*if action > deliberation\n\t\t\tYou manage to trap it and the villager's hunters kill it and use its pelt as a trophy. \n\t\t*comment endif\n\n\t\tYou travel briefly alongside a caravan and are led to a boisterous old man named Papa Finch. He delights in telling elaborate, untruthful stories which always end with his aggrandizement, but he and his followers are pleasant enough company. You help them with a few chores and fighting off occasional bandits and they pay you in food and help you mend your threadbare clothes. \n\n\t\t*goto generic_ending_stuff\n\n*label picking_your_ending_2\n\n*if riser_hunted_stub\n\t*gosub riser_hunted_stub\n\n*if riser_safe_stub\n\t*gosub riser_safe_stub\n\n*if riser_curbed_stub\n\t*gosub riser_curbed_stub\n\n*if (meeting_lyall = false) or (enclave_joiner = false)\n\t*gosub enclave_fate\n\t*goto proper_ending\n*if (((ara_affinity >= 65) and ((chaos_score >= 2) or (selfishness > equity))) and ((van_return = false) and (ara_dies = false)))\n\t*gosub romancing_ara\n\n\t*goto proper_ending\n*elseif ara_dies = false\n\t*gosub ara_fate\n\t*goto proper_ending \n*else\n\t*goto proper_ending\n\n*label proper_ending\n\nThere are rumors, gossip, about your role in the fall of Wolf and how you helped shape the world. And though more than half of those tales are untrue, they are fated to become the stuff of legends. They will tell how a ${tribe} ${man_woman} rose to challenge gods, but they will elide the difficulties and complications. The wonder of your tale will amaze and dazzle, while the details fall into obscurity. Even still, your legend grows. \n\n*gosub_scene consumed_end final_ending\n\n\n*comment HERE ARE THE ENDING SUBROUTINES.\n*comment The stubs are little vignettes that help wrap up various parts of the narrative.\n\n*label riser_hunted_stub\nYou do not need to seek out news of the Rising Sun. You see their homesteads burning and their defensive structures toppling wherever you go. You find a crude representation of a wolf's head painted in places where the Risers have been struck. The divide between those faithful to the old pantheon is thrown into sharp relief as the attacks grow more severe. There are whispers of reprisals staged in the night, temples and villages razed. You begin to wonder if all-out war will follow, and if so, who will win.\n\n*return \n\n*label riser_safe_stub \nThe Rising Sun flourishes without the direct threat of attacks staged by the worshipers of the dead Wolf. Though the faithful of other gods might dislike the methods of the upstart group, they are unlikely to attack without direct provocation.\n*if meeting_sen\n\tYou even hear that Sen has stepped down from commanding the Rising Sun troops and has taken a leadership role within the coalition as it moves to legitimacy. \n*comment endif\n\nThere are rumors though that the Rising Sun is merely bidding time, growing stronger until they are prepared to dominate and subjugate those still loyal to the old faith and convert them at the edge of a sword. \n\n*return\n\n*label riser_curbed_stub\nIt is a long road toward peace between the Rising Sun and the loyalists of the old faith. It is a journey marked by many first steps, like the village destroyed in a dispute between the Quiet and the Rising Sun, which the latter group then helped rebuild. Or a cease-fire negotiated between one of Hawk's holiest temples and the Risers who had been leading incursions against it. \n\nNo one expects the hostilities will end immediately, but any progress in that direction is welcome by most. \n\n*return \n\n*label ara_fate\n${ara_name}'s name comes up every so often in the weeks after Siltstone. You hear of a beautiful ${ara_gender} convincing a Rising Sun initiate to burn down one of Gazelle's temples; it is an act the young, confused soldier is executed for. ${ara_name} also seems to be at the heart of a plot to rally believers of the old gods and members of the Rising Sun alike to hunt down and kill members of a budding clan who worship gods of metal and are capable of amazing feats of engineering. But in your travels you do not encounter ${ara_him} directly. Perhaps ${ara_he} knows better than to cross your path again.\n\n*return \n\n*label enclave_fate\nThe Wolf enclave seeks you out before long. They have survived after Wolf's destruction and found purpose\n*if riser_hunted_stub\n\thunting the Rising Sun. \n\t*goto enclave_fate_2\n*else\t\n\tseeking a new way to live in the world without the guidance of their god. \n\t*goto enclave_fate_2\n\n*label enclave_fate_2\nThey are cordial toward you, but it becomes clear that in choosing not to return to the enclave, your relationship with them will not be as it was. Suba tells you not to lose the ferocity that made you Wolf's heir. Fillin gives you a knife made from the bones of a great hunting beast that he felled himself. Hemming whispers a blessing over you that he hopes will keep you fighting fit for years to come, while \n*if wolves_harsh_fate\n\tRoan give you a bloody stag.\n\t*goto enclave_fate_3\n*else\n\tZev and Roan give you a bloody stag.\n\t*goto enclave_fate_3\n*label enclave_fate_3\n*if ((lyall_fate != \"dead\") and (lyall_dies = false))\n\tLyall comes later and promises only that ${lyall_he} will look after the enclave, come what may.\n\t*if lyall_fate = \"banished\"\n\t\tYou stop short of ending Lyall's banishment, but ${lyall_he} seems to understand that and respect it.\n\t*comment endif\n*comment endif\n\n*return \n\n*label romancing_ara\n\nYou wake in the middle of a vicious rain storm one night to find ${ara_name} sitting beside you. $!{ara_he} is dressed in a wolf's pelt and little else. \n\n\"Hello, ${prenom}. I thought it was time we had a conversation.\"\n\nThunder underscores ${ara_his} words dramatically. \"You are no stranger to rabble-rousing and causing chaos. I appreciate that. I think it is time we joined forces, so to speak. There are still things in this world that threaten the supremacy of gods, more specifically, my supremacy. I do not want to be the biggest fish, ${prenom}, but no one is going to take away my pond.\"\n\n${ara_name} comes closer and you can smell rose and sage on ${ara_his} skin, but also the iron tang of blood. \"Join me, ${prenom}. Help me hunt my enemies and humble them. It will be glorious. And I am willing to offer you a considerable reward. Though maybe I can reward you even if you refuse.\"\n\n${ara_name}'s suggestion is less than subtle. \n\n*choice\n\t#Join ${ara_name}'s scheme, and accept ${ara_his} carnal offer.\n\t\t*gosub ara_intimacy \n\n\t\t\"Now, shall we go shape the world in my image?\" ${ara_name} asks. \"Break some things?\"\n\n\t\t*gosub ara_havoc\n\n\t\t*goto ara_romance_end\n\t#Refuse both.\n\t\t\"I thought you would be more fun, ${prenom}. But I am not surprised exactly.\" ${ara_name} smiles smugly, as if ${ara_he} knew what the outcome of ${ara_his} offer would be before ${ara_he} asked. \"Enjoy yourself, ${prenom}. As long as you can, enjoy yourself.\"\n\n\t\t*goto ara_leaves\n\t#Accept the offer, but refuse the scheme.\n\t\t\"Ah, I see. Well then let us see if the wolf can be spun in the spider's web,\" ${ara_name} says, and sheds the wolf pelt. \n\n\t\t*gosub ara_intimacy\n\n\t\t*label ara_leaves\n\t\t${ara_name} leaves as quietly as ${ara_he} came. You wonder if ${ara_he} will make ${ara_his} offer to someone else, someone who will accept and help Spider turn the world into her playground. But that is not your concern, at least not until they try to make you bow to their whims as well. \n\n\t\t*goto ara_romance_end\n\t#Sign on for the fight, but not for the erotic proposal. \n\t\t${ara_name} laughs when you tell ${ara_him} you want to join ${ara_him}, but not to sleep with ${ara_him}. \n\n\t\t\"You are a perfect surprise, ${prenom}. And I am very, very hard to surprise,\" ${ara_name} says. $!{ara_he} stands, and the wolf pelt draped over ${ara_his} shoulder slithers down ${ara_his} body, obscuring ${ara_his} body. \n\n\t\t\"We should get started, should we not?\" ${ara_name} asks. \n\n\t\tYou agree. \n\t\t*gosub ara_havoc\n\n\t\t*goto ara_romance_end\n\n*label ara_romance_end \n*return\n\n*label ara_havoc\nYou feel it is long past time you caused a little havoc. \n\n${ara_name} proves ${ara_him}self a cunning tactician and a brutal taskmaster. Together you put down revolts that would threaten Spider, spin long plots that benefit the manipulative goddess, and all the time ${ara_name} reveres your bloody instincts. \n\nAgainst all odds, as the belief in the other gods slowly fade, faith in Spider expands. The Spider goddess grows stronger and ${ara_name}, one of many of the goddess's avatars, rises in prestige. There are rumors about the goddess's pet wolf, but such gossip is usually rewarded by a long, painful death. \n\nYou wonder what will happen if ${ara_name} ever begins to see you as a risk to ${ara_his} power, but that is a concern for some other time. The work you do is rewarding and you are feared. It is enough.\n\n*return\n\n*label ara_intimacy \n${ara_name}'s body is soft and pliable, but ${ara_he} is a brutal taskmaster. $!{ara_he} drives you on with pleasure and pain in equal measures, the carrot and the stick. \n\nYou end the evening soaked in sweat and sore, while ${ara_name} just gives you a typically sardonic grin.\n\n*return\n\n*label romancing_lyall\n\nLyall approaches you at the cook fire, where Hemming is regaling a half-asleep Roan with a tale that so far as you can tell is about nothing.\n\n\"Old man, find somewhere else to be,\" Lyall says. \n\nHemming grunts and snaps back, but it is all posture. Roan wakes long enough to see the expression on Lyall's face, then quickly finds someplace else to be. \n\nLyall sits across the fire from you and stares. \n\n*if lyall_romance = \"delayed\"\n\t\"We once sat at a fire like this and I offered you companionship. You delayed, demurred, and now we are here. Is now the time, I wonder. Or is there such a time at all?\"\n\t*goto romance_cont\n*elseif lyall_romance = \"sleptwith\"\n\t\"I am fond of you, ${prenom}. You should know that by now that I do not—\"\n\t*goto romance_cont\n*else\n\t\"I have never been good at this sort of thing, ${prenom}. I would like to be with you.\"\n\t*goto romance_cont\n\n*label romance_cont\n\nLyall shifts. It is a nervous gesture and not one you would ever expect from the warrior.\n\n\"I want to be clear. I do not want to keep my warm bed. I want to fight…and live…beside you. Is that acceptable?\"\n\nLyall frowns in your direction. $!{lyall_he} shuffles ${lyall_his} feet back and forth through the dirt. \n\n*choice\n\t#Refuse Lyall's offer. \n\t\t\"I understand, ${prenom}. I felt it necessary to ask in order to be true to myself and my feelings. I have always attempted to be transparent in that way.\"\n\n\t\tYou attempt to explain yourself, but Lyall refuses. \n\n\t\t\"It does not matter why. I am not heartbroken, merely disappointed. No hunter likes be denied ${lyall_his} quarry.\"\n\n\t\tIt takes a moment for you to realize it was a joke. By the time you do, Lyall is already walking away. \n\n\t\t\"Get some sleep, ${prenom}.\"\n\n\t\t*goto lyall_refusal\n\t#Accept Lyall's suggestion of greater intimacy.\n\t\t*check_achievements\n\t\t*if not(choice_achieved_twowolves)\n\t\t\t*achieve twowolves\n\n\t\tLyall stares at you for a while, as if not quite daring to believe your answer. You have to get up and walk around the fire before ${lyall_he} snaps out of ${lyall_his} reverie. \n\n\t\t\"I did not really think you would agree to this,\" Lyall says frankly.\n\n\t\tYou spend the night together and Lyall warms up to the idea soon enough. $!{lyall_he} shows you a tenderness and urgency that is unexpected. \n\n\t\tThe next morning, when ${lyall_he} awakes beside you, ${lyall_he} squints against the sunlight and laughs. The laugh is free of the bloody-minded determination that marks ${lyall_his} personality; it is warm and genuine. \n\n\t\t\"I thought you would be gone when I woke, like an Eel dream,\" ${lyall_he} says. \n\n\t\t\"I am still here,\" you reply.\n\n\t\t\"That you are.\" \n\n\t\tThe next few days are an adjustment. Lyall comes to depend on you in small ways and you do the same. It is a true partnership that continues to offer small, strange delights for a long time to come. \n\n\t\t*return\n\t*if (lyall_romance = \"delayed\") #Delay. Again.\n\t\t*label delayed\n\t\tLyall smiles. \"We are quickly running out of tomorrows, ${prenom}. I appreciate that you are trying to protect my feelings, but you need not bother. Get sleep, if you can.\"\n\n\t\t*label lyall_refusal\n\t\tYou do get sleep eventually. The next day Lyall behaves as if ${lyall_his} suggestion never happened. It is probably the best path forward and ${lyall_he} is no more or less friendly toward you. \n\n\t\t*return\n\t*if (lyall_romance != \"delayed\") #Delay\n\t\t*goto delayed\n"}};
