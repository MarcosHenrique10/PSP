 work, too.\n\t\t*goto escape\n\t*else\n\t\tYou push and pull and dive, using up reserves you never even knew you had, but at last you free the rope. Then you haul the mermaid further onto shore, heave her into the boat, and collapse. There is no more strength in your body. \n\t\t*goto hostage\n*else\n\t*set bloodloss +1\n\t*if bloodloss >= 4\n\t\t*check_achievements\n\t\t*if not(choice_achieved_highwounds) \n\t\t\t*achieve highwounds\n\t\t\t*goto dive2\n\t\t*else \n\t\t\t*goto dive2\n\t*else\n\t\t*goto dive2\n\n*label dive2\nYou do your best to dive down and free the rope while keeping your distance, but your poor skill at swimming works against you.\n\nUnfortunately, getting close enough to pull the rope free of its confinement means you're also close enough for the mermaid to bite you. Which she does. You clap your hand to the foot she attacked and bob to the surface, bubbling and sputtering.\n*goto escape\n\n\n*label persuade\nThis mermaid is more intelligent than some mere fish, so you should try to get her cooperation. How would you like it if someone hauled you underwater and kept you captive? This is a time for diplomacy the likes of which you have never orchestrated before. You muster all the charm the academic life has equipped you with. \"Hear me out. I have a bargain to offer you.\"\n\nThe mermaid quiets. \"What kind of bargain?\"\n\n\"I am a scholar of the Royal German Marinological Society, a group of people who seek to expand the breadth of human knowledge in all things,\" you tell her. \"And I was sent here to investigate the existence of mermaids. Please, come back with me as living proof that your people are real!\"\n\nThe mermaid's eyes darken with suspicion. Literally—as you watch, they turn from a pale jade to a deep malachite. Fascinating! \"Why in the world would I do that?\"\n\n*if rigor \u003c 50\n\t*goto willing_specimen\n*else\n\tYou grasp for something that would convince her. \"Because—it would prove the truth of—that is, the existence of your people would redefine our understanding of—it would benefit my career like nothing else!\"\n\n\tThe mermaid begins thrashing again, trying to escape her predicament. \"Just let me go!\" she shrills.\n\t*goto after_known\n\t\t\n\n*label escape\nThe mermaid bursts free of her confinement and shoots some few dozen feet away in the blink of an eye. You emerge from the water, panting from effort, only to watch your precious once-in-a-lifetime find disappear into the deep.\n\nYou creep onto dry land weighed down by regret. This was your only chance; mermaids are clever, and now that one knows what you're up to, you're certain no others will come near you. Sodden and miserable, you make your way back to your hut to try to dream up some new strategy; some other way to salvage your career. A living mermaid would have been a coup, but surely there is something else you can do.\n*finish\n\n*label free\n*set loyalty %-30\n*set rigor %-15\n*set queeninvite true\nYou can't possibly try to hold a mermaid prisoner, not only because of her sharp teeth and ferocious nature, but also because it's not the right thing to do. You are no slave trader, no jailer. There are lines one must not cross, not even in pursuit of the truth!\n\nYou work to release her, but the water is cold, and your fingers slowly go numb from the effort. The mermaid helps you where she can, ripping at knots with her teeth, but you soon discover a problem—one of the lines is caught on some rocks under the water. You dive down to untangle it.\n*if swimming \u003c 3\n\t*set bloodloss +1\n\t*if bloodloss >= 4\n\t\t*check_achievements\n\t\t*if not(choice_achieved_highwounds) \n\t\t\t*achieve highwounds\n\t\t\t*goto dive1\n\t\t*else \n\t\t\t*goto dive1\n\t*else\n\t\tIt takes several attempts, and by the end you are drained of all your strength. But you work relentlessly to liberate the mermaid from her predicament.\n\t*goto free2\n\n*label dive1\nAlas, you dive a little too enthusiastically and strike your head on a rock. Still bleeding and battered, you work relentlessly to liberate the mermaid from her predicament.\n*goto free2\n\n*label free2\nAnd at last the mermaid is free of all that holds her. She shoots away from you, tail fanned wide with happiness, then circles back. \"Thank you,\" she says. \"I'll make sure your mercy is remembered. You'll be hearing from us again. Wait, and I promise you'll be rewarded for this act.\"\n\nRewarded? You wonder what she means by that. But before you can ask, she has disappeared into the depths. You stay at the shore for a while, staring at the remains of your contraption, wondering if another chance like this will ever come your way again. \n\nToo soon to tell. But there's a warm ember of hope in your heart where you think perhaps this will all work out in your favor. Your life is an arrow, shot the moment you fell into the ocean so long ago. Soon you'll find out what target you've been flying toward all these years. \n*finish\n\n\n*label hostage\n*set evidence +3\n*set captive true\n*achieve capture\nThe mermaid gnashes her vicious teeth. \"You'll pay for this,\" she tells you. \"The Merameida take care of our own, and the queen will see me free one way or another. Once she finds out what you have done here, you will never be safe near the ocean again for all the days of your life.\"\n\nThat may be, but the causes of science and glory have always had their risks. After a brief rest, you chain her in place so she cannot slip free of the boat when your back is turned. Then you call for help pulling her into town, so she can be loaded onto the next boat headed home. The mermaid snaps and writhes, but there is nothing she can do now to free herself.\n\t\nOhhh yes, this is all the evidence you need. You retreat to your hovel humming a jaunty tune, all the while composing your acceptance speech for the day when you are not only accepted into the Royal German Marinological Society, but are surely also nominated for some major prize or award.\n\nThis has been a fine day for you, ${firstname}. Nothing at all can bring you down now. Nothing.\n*finish\n\n*label willing_specimen\n*set evidence +3\n*set volunteer true\n*achieve persuade\n\"You would be a celebrity! The toast of high society! There would be songs and poems written in your honor! You would be showered with jewels and gowns and—well, maybe not the gowns. You would eat the finest food and drink!\"\n\n\"Would there be bacon?\" she asks, eyes bright.\n\n\"As much as you can eat,\" you vow. \"Trays and buckets of bacon.\"\n\n\"And flowers?\"\n\n\"If I have to pick them myself. Endless flowers! You can sleep in a bed of—in a bathtub filled with flowers!\"\n\nShe nods with deep satisfaction. \"Fine, then. Take me with you.\"\n\nShe works along with you to free herself, and then to take the abandoned rowboat from further down the shore and fashion it into something like a bathtub filled with saltwater for her to lounge in. \"Never fear,\" she says, \"I can breathe air forever, and I'll be fine as long as I don't dry out completely.\"\n\nIt takes rather more effort to drag her and her boat up the hill, and in the end you have to call in assistance from town. Madame sends along a few strapping young men and women, who haul the mermaid into town to wait for the next ship. She holds court all night, flirting and ordering the townsfolk to do her bidding. Your guest seems to love the attention, and you love the sudden gravitas with which you are treated.\n\nYou've made a major discovery, ${firstname}, and you have everything you need to prove it. Now you just need to get her to the Society.\n*finish\n", "9_queen": "Late in the evening, as you pack up your notebooks and pencils for your inevitable return home, you notice a strange glow coming from somewhere along the shoreline. You've heard of such things before—creatures of the sea that light up when you brush against them. But you'd been under the impression that such a light was faint as the stars, and what you see now is bright even from quite a distance away. How interesting!\n\nYou make your way to the beach, then hop from one boulder to another toward deeper water to get a closer look at this rare phenomenon. The light is coming from beneath the waves, yes, but you can't quite make out the source; it's too deep. You kneel and put your face closer to the water to get a better look. \n\nThere is a face looking up at yours. A mermaid face. She exposes her teeth in something like a smile. \n*if queeninvite = true\n\t*goto invite\n*else\n\t*goto kidnapped\n\n*label invite\nShe surfaces, her face just inches from yours. You jerk back, surprised. It's the same mermaid you freed, gleaming green and gold in the twilight! She speaks. \"I come bearing a personal invitation to you from Queen Neiaua of the Merameida people. You will come to see her now.\" She reaches up and grabs your wrist to pull you underwater.\n*goto invite_choice\n\n*label kidnapped\n\"Queen Neiaua of the Merameida people wishes to see to your miserable carcass. You will come to see her now.\" Then she reaches up to grab your wrist. Her claws sink deep into your skin, and then she jerks you forward. She's trying to pull you underwater!\n*goto invite_choice\n\n*label invite_choice\n\n*choice\n\t#No! I won't give up without a fight!\n\t\t*set bloodloss +1\n\t\t*if bloodloss >= 4\n\t\t\t*check_achievements\n\t\t\t*if not(choice_achieved_highwounds) \n\t\t\t\t*achieve highwounds\n\t\t\t\t*goto aprefight\n\t\t\t*else\n\t\t\t\t*goto aprefight\n\t\t*else\n\t\t\t*goto aprefight\t\n\t\t\n\t#This is priceless research—just go along with it.\n\t\t*set rigor %+10\n\t\tThe mermaids have had countless opportunities to harm Sandoval, but he's survived so far, and Broken Shell Island doesn't have any record of mysterious vanishment, nor of grave injury to swimmers and beachcombers. So it's unlikely their aim is to kill you outright. That means this is a priceless opportunity to learn more about mermaid behavior in the wild! \n\n\t\tYou hold your breath as best you can and wait to see what happens. Two more mermaids join you on your descent. Together, you head toward the glow you'd spotted from above. But your breath is limited, and the mermaids haven't given you a way to breathe underwater, as far as you can tell. You stop kicking downward and head toward the sky again, but one of the mermaids grabs you and pulls you deeper down.\n\t\t*goto descent\n\n\t#Persuade her to let me go.\n\t\t*set rigor %-10\n\t\tThis does not seem like something that could possibly end well for you. \"Wait!\" you cry. The mermaid stops and looks at you, her gills closed tight. \"Stop,\" you say. \"I can't breathe water like you. Are you trying to kill me?\"\n\n\t\tThe mermaid is unmoved. Or that's what you guess; she doesn't reply. Instead her grip grows tighter, and she jerks you forward. You tumble into the water. She pulls you down, toward the glow you'd spotted from above.\n\t\t*goto descent\n\n\t*if (queeninvite = true) #How wonderful! I'm delighted to go!\n\t\t*set loyalty %-10\n\t\t\"I am honored,\" you say, and you allow yourself to be pulled under the water. You swim down by the mermaid's side, and are soon joined by two more of her kind. You head toward the glow you'd spotted from a distance. But your breath is limited, and the mermaids haven't given you a way to breathe underwater, as far as you can tell. You stop kicking downward and head toward the sky again, but one of the mermaids grabs you and pulls you deeper down.\n\n\t\t*goto descent\n\n*label aprefight\nPanic sets in as the water closes around your head. You kick and thrash. Her grip loosens ever so slightly, enough for you to twist your wrist away. Your flesh is torn, and the splashing salt water stings your wound, but you kick back up toward the air. Then another mermaid swims in to pull you down by your foot. A third grabs your other hand. The first mermaid clasps your wrist again. Puffs of your blood blow away into the water, like steam from a hot kettle. Together they pull you down, toward the light.\n*goto descent\n\n*label descent\n\nBefore long, you are convinced that the mermaids are trying to drown you. They pull you deeper than you could swim on your own; your ears ache and your lungs burn. Just when you're sure you couldn't hold your breath any longer, they push you sharply to the right. You surface, gasping and red-faced, into a pocket of air. It's clean and pure; your lungs ache with relief. Though it does smell faintly like sardines in here. Sardines someone else already chewed up.\n\nYou examine your surroundings and discover that you're inside some sort of contraption made of thick, greenish glass: a diving bell. This is the source of the light; there is a glowing orb of sea glass affixed to the top. The glass of the bell is imperfect, and your view of the sea outside is clouded by bubbles or distorted by strange bulges and waves. \n\nThe mermaids wave at you impatiently. There is a board installed inside the bell, spanning from one side to the other. One of the mermaids gestures for you to sit there. It's smooth and slick with a skim of greenish algae. You settle upon it, hands slipping. Once you're in place, the water only comes up to your hips. The air is unsurprisingly humid and cool; you shiver a bit.\n\nA net of thick ropes covers the outside of the bell. The mermaids grasp the trailing ends and pull the bell down, down, down. And you go down, as well.\n\nIt's quite a long trip, and eventually you become acclimated to being stuck inside a giant glass bell. How will you pass the time?\n*choice\n\t#Try to talk to the mermaids. I have so many questions!\n\t\t*set loyalty %-10\n\t\tYou knock on the glass to get the mermaids' attention. \"Excuse me—excuse me!\" you call. \"As long as we're fellow travelers, do you mind if I ask a few questions?\"\n\n\t\tYou're not sure at first if they can even hear you, the mermaids ignore you so completely. You tap again.\n\n\t\tA mermaid face presses against the glass, fangs bared. The message is loud and clear: these mermaids aren't interested in having a conversation with you.\n\t\t*goto enter_city\n\t#This is a once-in-a-lifetime opportunity. Observe the creatures carefully!\n\t\t*set rigor %+10\n\t\tAlas, you have no dry paper to record your thoughts and observations, but you do your best to imprint the vision of the mermaids into your mind. But the glass of the bell is wavy and riddled with flaws, and the light is fading fast. You can't make out much more than vague silhouettes from here.\n\n\t\tAfter several minutes of peering out into the depths, one of the mermaids notices your attention and presses her hand to the glass. She has webbed fingers, you notice. And those talons appear to be spines growing from inside her fingers, not nails on the tips of the fingers like yours. How interesting!\n\t\t*goto enter_city\n\t#They're never going to get away with this. I won't let them forget it!\n\t\t*set loyalty %+10\n\t\tYou shout a few inchoate threats at the mermaids through the glass, but they don't appear to fear the combined forces of the Royal German Marinological Society and the Navy coming to avenge your disappearance. Nor do they seem persuaded that you have very highly placed friends willing to do anything to ensure your safety.\n\t\t\n\t\tEventually one of them yawns, showing a mouthful of needle-sharp teeth. Vicious. You lapse into quiet, suddenly keenly aware that you're at their complete mercy. Perhaps prudence is the better course for now.\n\t\t*goto enter_city\n\n*label enter_city\n\nYou return your attention to your surroundings. Where in the world are you going? Why aren't you there yet?\n\nAt first you see nothing of note; a curious fish noses toward you, but flits away when it strikes the surface of the glass. Somewhere in the distance, a sea turtle meanders past. And then, rising up from the cloudy depths, you see the shapes of countless towers made of driftwood, rock and shell. You are reminded, suddenly, of that long-ago day and a trip beneath the sea. \n\nThis is it—this is the mermaid city you saw! You've seen those spires and arches in your dreams a hundred times since that fateful day.\n\nThe mermaids pull you closer. You catalog the city's attributes in your head feverishly: the mermaids swimming through openings all up and down those towers, the schools of fish nibbling away at the walls, the gardens of anemones and urchins placed in pretty geometric arrangements. Has any scholar before you ever seen such wonders?\n\nDid they live to tell the tale?\n\n*page_break\n\nYou can't possibly pay attention to all of it at once, but where do you look when everything around you is a wonder you may never see again?\n\n*fake_choice \n\t#Focus on the architecture.\n\t\tYour eyes are drawn again and again to the complex shapes of the buildings here. Wait—buildings is the wrong word. These structures are mostly coral, grown and shaped into towers and bridges and other forms you have no name for. From time to time you see artifacts from the land embedded into the city, lost treasures from an exotic place. The prow of a sunken ship crests one tower, and a stained glass angel adorns another. Where did they even come from?\n\n\t#Focus on the culture.\n\t\tWhere there is a civilization, there is also art, music, cuisine! You look for signs of any of these things. No paint below the waves, of course, and what would a mermaid's musical instruments even look like? But there are elaborate sand paintings along the ocean floor, in complex but abstract patterns that make you think of stars and fire and writhing tentacles. On the land these would be pathways, and who would so thoroughly ornament a surface meant to be underfoot? But mermaids, you realize, have no use for the flat bottom of the ocean.\n\n\t#Focus on the inhabitants.\n\t\tOf course the most interesting part of a mermaid city is the mermaids themselves. You try to deduce what they're doing. One is harvesting molluscs from the sea floor to eat. Another is weaving kelp into an open-work fabric, like you saw on the mermaid child long years ago. Still one more is herding schools of fish into an enclosure. They seem industrious and quite civilized. You realize that you half expected the mermaids to live like packs of piranha, mindless devourers. But they work, it seems. Just like land people. \n\n*if swimming \u003c 1\n\tAnd then, without warning, you become keenly and horribly aware that you are pressed under a mountain's weight of water. And. You. Cannot. Swim. You begin to hyperventilate. The mermaids take notice of you and murmur among themselves. One of them dives into the bell beside you and strokes your hair with visible concern. She croons a song like glass.\n\n\tSomehow the surreality of your situation breaks through your fear, and you come out the other side, into the realm of total absurdity. You laugh helplessly. The mermaid grins at you, then, with apparent fondness, showing her sharp teeth to excellent effect. She takes an ornament from her hair, a delicate thing of coral and silver, and presses it into your trembling hand. She stays with you for a time, only leaving when your breathing has slowed to something like normal.\n\t*set evidence +1\n\t*set ornament true\n\t*goto post_swimming\n*else\n\t*goto post_swimming\n\t\n*label post_swimming\n\nEventually you and your guards enter an enormous cave opening, older and rougher than the rest of the city. Mermaids line the walls and even float along the ceiling, watching your every move. They are a rainbow of colors such as you have never seen before in nature, glowing reds and greens, living gold and silver, shimmering black and opalescent white. They nudge each other, whispering, as they watch your every move.\n\nYour escort hangs the bell from a hook on the wall in a broad, high cavern. The mermaids fit you with an enormous glass helmet; a hose trails from it to parts unknown. The whole assemblage seems rickety, and there are disturbing rust-colored spots here and there on the fittings, but it seems…serviceable enough. At least the air in the helmet is fresher than that in the diving bell; here it only smells like salt water.\n\nYour captors—or hosts?—pull you from the bell and push you to walk across the cavern floor toward a figure lolling on an ornate throne. This, then, is the Queen of the Mermaids. She wears a crown of pearls and coral upon her head, and her scales are crimson and silver, like blood in moonlit water. \n\n\n*if captive = true\n\t*goto trial\n*if volunteer = true\n\t*goto trial\n*else\n\t*goto invitation\n\n*label trial\nThe Queen bares her teeth at you. This time, it is nothing like a smile at all. \"So you are the one who has been hunting us, spying on us, abducting us. You don't look so fearsome, do you? Tell me, what have you done with our sister Weialaha?\" \n\nAh. She knows about that. Well, this is awkward. \n\nYou open your mouth to answer, but before you can, she darts from her throne and swims closer to you. \"In the name of the Oracle and our ancestors, in the name of bone and fire and tide, you are on trial for the vanishing of one of the Merameida people! Tell me, air-swimmer, how do you plead? And don't think you can lie to me. I am an excellent judge of character.\" \n\n*choice\n\t#Admit the truth.\n\t\tThey have something on you—but you have a bargaining chip. \"Yes, I know where she is,\" you say.\n\t\t*if captive = true\n\t\t\t\"I swear no harm will come to her so long as no harm is done to me!\"\n\n\t\t\tThe Queen goes completely still, not even the edges of her trailing fins waving. \"Are you trying to threaten me?\"\n\t\t\t*goto queen_chat\n\t\t*elseif volunteer = true\n\t\t\t\"And she came with me willingly!\"\n\n\t\t\tThe Queen gazes at you impassively. \"So you admit it, then. It is unlawful to remove one of us from the ocean,\" she says. \"Willingly or not.\"\n\t\t\t*goto queen_chat\n\t\t*else\n\t\t\t*BUG this should never happen\n\t#Defend my innocence!\n\t\t\"I have done nothing wrong!\" you insist. Surely saying anything else would only end in tears and blood. Your tears and blood.\n \n\t\t\"Is that so?\" Her hair drifts in a stray eddy. \"It is our tradition to allow you to prove your innocence through games of chance, but we have had…problems…with air-swimmers playing our games and cheating.\" She grimaces. \"And we have no great reason to trust you.\"\n\n\t\t\"All I want,\" you say, \"is to further the cause of science, and let the world know about your people!\"\n\t\t*goto queen_lecture\n\t#Gather some evidence.\n\t\t*goto steal_evidence\n\t#Make a run for it!\n\t\tThere's no way this is going to end well for you, you can tell already. It's a slim chance, but maybe you have enough air to make it back to the surface. Going up is easier than diving down, right? Something about the human body and buoyancy? \n\n\t\tIt's dangerous, but at least it's a better option than staying here while fish-creatures railroad you through their questionable justice system.\n\t\t*goto escape\n\n*label invitation\n\"Hello there,\" she coos. \"Pleased to make your acquaintance.\" The Queen leaves her throne and swims toward you to tap on your helmet. \"You're breathing all right in there, yes? Do let me know if you have any trouble. We try to take good care of our guests, but air-swimmers can be so…fragile.\" She flows around you in a leisurely fashion. \"You're a strange one, aren't you? Watching for us, just like the other one, but you don't seem to have the same set of peculiar interests. Oh, yes, we know all about you.\"\n\nHer hand slides across the outside of your helmet. \"Tell me, air-swimmer, what is your interest in the Merameida?\"\n\n*choice\n\t#Praise mermaids!\n\t\t\"I've always admired mermaids,\" you say. \"They're—you're!—such beautiful creatures! So graceful! So mysterious! And so I'm here to—to satisfy my curiosity.\"\n\n\t\tThe Queen preens, her fins fanned wide and lacy. \"We are beautiful, aren't we?\" she purrs. \"I can see you are an air-swimmer of exceptional taste.\"\n\t\t*goto queen_chat\n\t#Explain about the Royal German Marinological Society.\n\t\t\"I am a researcher on behalf of the Royal German Marinological Society,\" you announce. \"My mission is to research the Merameida and prove your existence to the world!\"\n\t\n\t\tThe mermaids on the walls stir and whisper to one another.\n\t\t*goto queen_lecture\n\t*selectable_if (bacon = true) #Offer bacon in exchange for cooperation.\n\t\t\"Bacon! To say a few words in front of some air-swimmers?\" The Queen's eyes widen, and she bares her fangs in an uncomfortably toothy grin. \n\t\t*if persistence > 50\n\t\t\t\"Do you think the Merameida are so easily bought? Do you think we are mere animals, with no capacity for thought beyond that of a tuna?\"\n\t\t\t*goto queen_lecture\n\t\t*else\n\t\t\t\"When I was a younger fry,\" she says, \"I might have taken you up on that. But now I have responsibilities to my people, and to their survival.\" She cradles your chin for a moment. \"What a terribly sweet thing to say, though!\" Then she darts away.\n\t\t\t*goto queen_chat\n\t#Stall and steal some evidence.\n\t\t*goto steal_evidence\n\t#Try to escape!\n\t\tYou're in way over your head, in more ways than one. It's a slim chance, but maybe you have enough air to make it back to the surface. Going up is easier than diving down, right? Something about the human body and buoyancy? \n\n\t\tIt's dangerous, but you get the feeling it's no less dangerous than staying in this cavern with all of these hungry mermaids and their sharp, sharp teeth.\n\t\t*goto escape\n\n*label queen_chat\n*temp loop 0\n*temp limit\n*set limit (100 - loyalty)\n*set limit (limit/100)\nThe Queen swims wide circles around you for a long moment, her face entirely inscrutable. \"It's clear that you are fascinated by the Merameida, as is fitting. It amuses me for now to satisfy your curiosity about us. Tell me, what would you know?\" Such a marvelous, unexpected opportunity! The chance of a lifetime, ${lastname}. Better make the most of it. \n\n\n*label queen_chat_2\nYou're not sure how much patience the Queen will have for answering your questions. Certainly not all of them! What should you ask?\n\n*choice\n\t*hide_reuse #\"How many mermaids are there?\"\n\t\t\"How many?\" The Queen scowls. \"Are you planning an invasion, air-swimmer? Do you want to know how much poison it would take to kill us all?\"\n\n\t\t\"No! No, I swear!\"\n\t\t*goto limit_test\n\n\t*hide_reuse #\"What do mermaids do for fun?\"\n\t\tShe smiles. \"We like to play games,\" she says. She stretches, something like a cat crossed with an eel. \"Maybe we should play a game with you. It would be fun. You might even survive!\"\n\t\n\t\t\"Thank you, but n-no thank you,\" you venture.\n\t\t*goto limit_test\n\n\t*hide_reuse #\"Do you have your own language?\"\n\t\tThe Queen answers you with a stream of liquid crystalline sounds, like nothing you've heard before. \n\n\t\tGuess that answers that, huh?\n\t\t*goto limit_test\n\n\t*hide_reuse #\"What do mermaids eat?\"\n\t\tThe Queen brightens. \"Anything that bleeds,\" she purrs. \"Are you volunteering?\"\n\n\t\tYou swallow, your throat suddenly dry despite the miles of water surrounding you. \"No. Don't eat me,\" you squeak.\n\t\t*goto limit_test\n\n\t*hide_reuse #\"Do mermaids have a religion?\"\n\t\tThe Queen swims in wide, lazy circles. \"None you'd know about,\" she says. \"But we do have an Oracle. I'd introduce you, but I should warn you, she can be a little snappish.\"\n\n\t\tSnappish? Does that mean hostile, or like…you would get eaten?\n\t\t*goto limit_test\n\n\t*hide_reuse #\"Are there…you know…boy mermaids and girl mermaids?\"\n\t\tThe Queen looks puzzled. \"I don't understand what you mean,\" she says. \n\n\t\tIt looks like you can't be so delicate, ${lastname}. \"Where do baby mermaids come from?\" you ask.\n\n\t\tShe rolls her eyes like you're the worst simpleton in the world. \"From eggs, of course. Just like everything else that swims. Well, everything that matters.\"\n\t\t*goto limit_test\n\t\n*label limit_test\n\n*set loop +1\n*if loop \u003c limit\n\t*goto queen_chat_2\n*elseif loop > 5\n\t*goto loyalty_check\n*else\n\t*goto loyalty_check\n\n\n*label queen_lecture\nThe Queen shoots around you in a wide circle. She raises her voice to address not just you, but all the assembled mermaids. \"There was a time, thousands of years ago, when your people and mine swam together,\" she says. A school of glimmering fish shoots apart as she approaches it. \"And then the air-swimmers grew violent. They came after us with nets and spears and poison. And so we vanished into deeper waters, that we might survive. And now we are only legends to them.\"\n\nShe returns to you. She runs a single finger across your shoulder blades as she speaks, and you shudder at the sensation. \"This is how it must stay, air-swimmer. If your kind knew of us, we would never live in peace.\"\n*goto queen_chat\n\n*label loyalty_check\nThe mermaid Queen studies you, your face, your body. \"I wonder, can we trust you to keep our secret?\" She places her palm flat on the helmet before you can say anything. Her fingers are webbed, her talons long and scarlet. \"Don't speak,\" she says. \"I can see into your heart, and I know where your loyalties really lie.\"\n\nYou stand, back straight and statue-still, waiting for her judgment.\n*if loyalty \u003c 38\n\t*goto stay_offer\n*if loyalty \u003c 58\n\t\"I think so,\" she says after a while, \"I think we can trust you.\"\n\t*goto liberation\n*else\n\tShe bares her teeth. \"No, you are not to be trusted, I can see that. Then we'll make it so nobody ever trusts you at all.\"\n\t*goto hallucinations\n\n*label steal_evidence\nThis is the chance of a lifetime—assuming you live through it. You scan the area looking for something, anything you could use as proof that you've been here, in the heart of the mermaid city itself. Then you spot the perfect thing: there is a small shell at your feet, carved with inhuman writing.\n\n*if rigor \u003c 40\n\t\"This is all too much—oh! Am I going mad?!\" You pretend to be overwhelmed by the intensity of this admittedly very intense experience you're going through. You stumble and fall to your hands and knees, aided by the weight of the helmet, and slip the shell into your sleeve.\n\n\tQueen Neiaua rolls her eyes at this performance. \"Weak of spirit, I see, like most air-swimmers are.\"\n\t*set evidence +1\n\t*set carvedshell true\n\t*goto loyalty_check\n*else\n\tYou stoop down to try to palm the shell, but your escort sees what you're up to at once and snatches it from your hand. Queen Neiaua's nostrils and gills flare wide. \"I can see even here, when we give you a chance to persuade us, you are unwilling to parley with us. Very well, if we cannot trust you, we'll make it so nobody trusts you at all.\"\n\t*goto hallucinations\n\n*label escape\n*set bloodloss +1\n*if bloodloss >= 4\n\t*check_achievements\n\t*if not(choice_achieved_highwounds) \n\t\t*achieve highwounds\n\t\t*goto steal2\n\t*else\n\t\t*goto steal2\n\n*label steal2\nYou edge back toward the entrance of the cavern, keeping your glass helmet on to make the breath last as long as you can. \"Please,\" you say, \"Don't hurt me, I—I—look, a shark!\" You point toward the throne, and just as you'd hoped, every mermaid head snaps toward it, and momentarily away from you. This is your chance.\n\nYou flee toward the entrance, meaning to cast off the helmet as soon as you're clear of the room. But the mermaids are far, far faster than you, much like a hawk is faster than a rabbit. You wrestle and pull, and in the process their talons cut your flesh.\n*if bloodloss > 4\n\t*goto mermaids_eaten\n*else\n\tQueen Neiaua's nostrils and gills flare wide. \"I can see even here, when we give you a chance to persuade us, you are unwilling to speak in good faith. Very well, if we cannot trust you, we'll make it so nobody trusts you at all.\"\n\t*goto hallucinations\n\n\n*label hallucinations\n*set hallucinations true\n*set credibility %-10\nThe Queen presses her face to your helmet to gaze deeply into your eyes, then she flits away. She flicks the tip of a fin, and at once the mermaids fall upon you, wrestling your helmet away. Your air! No, no, you're going to drown here!\n\nYou grab at it, but there are mermaid hands on your ankles, your wrists, holding you still. Bubbles escape your nose. One of your captors takes a fistful of something cold and purple and shoves it in your mouth. \"Swallow and get your precious dry air back,\" she says into your ear. \n\nIs it poison? But then, why would they give your helmet back if you ate it? You chew quickly; the substance is slightly crunchy and sweet, probably some type of deep-growing seaweed. You swallow, and the mermaids give you your helmet back, as promised. You cough the ocean out of your nose.\n\nQueen Neiaua is back on her throne. \"You never saw us,\" she says. \"You were never here. And nobody will ever, ever believe you.\" She grins. \"Now you can leave.\"\n\n*page_break\nThe mermaids place you back into the diving bell. You have little sense of motion because there is no light waiting in the night above, but soon you are back on the shore of Broken Shell Island, drenched and cold and strangely woozy. The sand is glowing. You've never noticed that before. The sand is glowing and the sky is eating the light. And then you have an epiphany: none of this is real, and all of it is. Everything you can imagine is, in some sense, real. Except you. Especially not you. You race toward Broken Shell Town, laughing, to spread word of this revelation.\n\nFor some inexplicable reason, they don't seem to believe you.\n*if loyalty > 30\n\t*set overdose true\n\t*finish\n*else\n\t*finish\n\n*label liberation\nQueen Neiaua raps on the glass of your helmet. \"I think you can be trusted, air-swimmer. We will let you go, on the condition that you keep our secret until the grave. There are no Merameida, yes? And you know that now.\"\n\n*fake_choice\n\t#\"Yes, yes, of course!\"\n\t#\"I agree with you completely.\"\n\t#\"I mean, I don't want to get eaten?\"\n\nYou nod your feverish agreement, out of prudence if nothing else. You hadn't been entirely sure there was a way to get out of this alive!\n\n\"Don't think to cross me,\" she adds. \"We will know.\" She grins wide one last time, each tooth sharper than the last.\n\n*page_break\nThe mermaids place you back into the diving bell. You have little sense of motion because there is no light waiting in the night above, but soon you are back on the beach of Broken Shell Island, drenched and cold and terribly alone.\n\nBut you're alive—alive, and you think it's high time you make your report to the Royal German Marinological Society. It's time to conclude this matter once and for all.\n*finish\n\n*label mermaids_eaten\n*if swimming = 0\n\t*achieve noswim\n*achieve devoured\nBlood puffs up from your new injury, adding to the small trickles from old wounds reopened in the struggle. Neiaua's gills flare as she catches the scent. Her eyes grow wilder and redder. \"Aren't you a delicious one,\" she murmurs. All around you, mermaid teeth are bared, mermaid pupils grow wide. They draw closer to you, driven mad by the scent of your blood.\n\nAnd then they eat you. Fortunately the feeding frenzy doesn't last long; or at least, your awareness of the feeding frenzy doesn't last long. In truth, the mermaids are gnawing on your knuckle bones and picking hairs from their teeth all through the next day.\n\nSo that's it. Ironically, you do become a scholar of the Royal German Marinological Society post mortem. Given that you disappeared in the course of your work for the Society, such an honor is the least they can do for you. Alas, it appears your career in the Society has dead-ended before it's even begun. Literally.\n\nIf it's any comfort, though, the mermaids see fit to use your bones to decorate the burning chasm in the heart of the earth where their sea dragon oracle dwells. Now, when any mermaid goes for advice or supplication, she passes by your watchful eyes, and shivers at the thought that your uneasy spirit might one day demand retribution for her meal.\n\nAnd one day, perhaps it will.\n*check_achievements\n*if (((((((((choice_achieved_devoured and choice_achieved_stay) and choice_achieved_hallucinate) and choice_achieved_novelist) and choice_achieved_scholar) and choice_achieved_grandscholar) and choice_achieved_prison) and choice_achieved_pirate) and choice_achieved_advisor) and choice_achieved_gormless)\n\t*achieve completist\n*goto_scene ending\n\n*label stay_offer\nNeiaua lays a hand at the small of your back as she drifts past you. \"You're too good for the air-swimmers,\" she murmurs. \"Too good to let you go away again. Why don't you stay here with us? Forever?\"\n\n*choice\n\t#\"Yes! Yes! A thousand times yes!\"\n\t\t*goto mermaidcity_ending\n\t#\"I can better protect your people from the land.\"\n\t\tShe purses her lips. \"Such a pity,\" she says, a little wistfully. \"We would have treasured you here. But you're right, you can serve us better from the land.\"\n\t\t*goto liberation\n\t#\"Never! I would never live with you monsters!\"\n\t\t*set loyalty %+30\n\t\tShe flexes her hands, and you notice for the first time that her fingers end with talons, each as fearsome as her teeth. \"Perhaps for once I have made a mistake, then,\" she says. \n\t\t*goto hallucinations\n\n\n*label mermaidcity_ending\n*if swimming = 0\n\t*achieve noswim\n*if bloodloss = 0\n\t*achieve nowounds\n*achieve stay\nThis is everything you've ever dreamed of and hoped for. Not just to see the mermaids, to study them, but to be with them all the days of your life. You nod enthusiastically. \"Could I really stay here with you?\"\n\nNeiaua smiles. \"Of course! Nothing would make us happier.\" And if her smile is a little too wide, well…perhaps it's better not to look at a dream too carefully.\n\nThey install you in a cave near the mermaid city, where air bubbles up and is trapped through some mysterious geological process. You are not the first human guest here; the place is already filled with furniture in five distinct styles and periods, including something like a throne, a wardrobe stuffed with bones, and perhaps most unsettling of all, a cradle. You don't look at the bones too carefully. There are some things you prefer not to know. \n\nThe mermaids compete for your attention, as if you were a particularly favored pet. They bring you waterlogged foods recovered from the land, fine clothes, toys and games of all description. The mermaids, you learn, are very fond of games.\n\n*page_break\n\nEventually you develop something of a taste for wet, salty pastry, and think nothing of wearing damp raccoon-lined frontier trousers and mildewed ball gowns on alternate days. Weialaha teaches you something of the mermaid language; you are the first to ever learn it, they tell you. It would be easy to give yourself over to the life of a pampered pet.\n\nAnd yet your life's work does not remain forgotten. The mermaids keep you in ink and paper, brought down in oilskin packages from who only knows where. (You just wish they would do as much with the pastries.) When you miss the sun too much, they bring you to the surface in the diving bell, but the land is forbidden to you. You acutely miss the feeling of complete dryness.\n\nAs the years pass, you record extensive observations about mermaid culture, customs, behaviors, and beliefs. Neiaua leafs through your notes from time to time, alternately bemused and delighted by what she finds there. In the end, you have the most perfect monograph on mermaids ever written—and, you think, probably the most perfect one that ever will be written. But it is destined to stay here in the mermaid realm for all time, never to be seen by human eyes again.\n\nJust like you.\n*check_achievements\n*if (((((((((choice_achieved_devoured and choice_achieved_stay) and choice_achieved_hallucinate) and choice_achieved_novelist) and choice_achieved_scholar) and choice_achieved_grandscholar) and choice_achieved_prison) and choice_achieved_pirate) and choice_achieved_advisor) and choice_achieved_gormless)\n\t*achieve completist\n*goto_scene ending\n", "choicescript_description": "Take a scientifically inaccurate romp in pirate-infested waters! Will you prove to the Royal German Marinological Society that mermaids really exist?\n\n\"The Daring Mermaid Expedition\" is a 71,000-word interactive novel by Andrea Phillips, author of \"The Daring Adventures of Lucy Smokeheart.\" Your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nYou are an up-and-coming researcher, tasked with proving the existence of mermaids in order to be admitted to the exclusive Royal German Marinological Society. With a member of the Society as your patron, you’ll brave pirate attacks and dubious academics to fight your way to Broken Shell Island and scientize the mythical mermaid kingdom. Play as a vengeful mermaid-hater, dispassionate scientist, or soft-hearted daydreamer. Or just chuck it all and embrace piracy on the crew of the infamous Lucy Smokeheart herself!\n\nWill you join the illustrious ranks of the Society, or wind up in prison for scientific fraud? Spend the rest of your life living underwater, or be devoured by carnivorous fish-people?\n\nYou’re on a mermaid expedition—it’s time to sink or swim.\n", "choicescript_stats": "*temp full_name\n*set full_name (firstname & \" \") & lastname\n\n*temp wound_text \"None\"\n*if bloodloss = 0\n\t*set wound_text \"None\"\n\t*goto swimming_block\n*elseif bloodloss = 1\n\t*set wound_text \"Mere Drops\"\n\t*goto swimming_block\n*elseif bloodloss = 2\n\t*set wound_text \"Just a Flesh Wound\"\n\t*goto swimming_block\n*elseif bloodloss = 3\n\t*set wound_text \"Woozy and Weakened\"\n\t*goto swimming_block\n*else\n\t*set wound_text \"Barely Alive\"\n\n*label swimming_block\n*temp swimming_text \"None\"\n*if swimming = 0\n\t*set swimming_text \"Staying on the Towel\"\n\t*goto chart_chooser\n*elseif swimming = 1\n\t*set swimming_text \"Wading Areas Only\"\n\t*goto chart_chooser\n*elseif swimming = 2\n\t*set swimming_text \"Doggie Paddler\"\n\t*goto chart_chooser\n*elseif swimming = 3\n\t*set swimming_text \"Deep-End Approved\"\n\t*goto chart_chooser\n*elseif swimming = 4\n\t*set swimming_text \"Swim Meet\"\n\t*goto chart_chooser\n*else\n\t*set swimming_text \"Lifeguard\"\n\n*label chart_chooser\n*if patron = \"none\"\n\t*goto chart1\n*else\n\t*goto chart2\n\n*label chart1\n*stat_chart\n\ttext full_name Name\n\ttext wound_text Blood Loss\n\ttext swimming_text Swimming\n\n\topposed_pair persistence\n\t\tPersistence\n\t\tSpontaneity\n\topposed_pair loyalty \n\t\tSociety Loyalty\n\t\tMermaid Loyalty\n\topposed_pair rigor\n\t\tAcademic Rigor\n\t\tPassion\n\tpercent credibility Credibility\n\t\n*stat_chart\n\tpercent Wellington\n\tpercent Fontana\n\tpercent Scharknell\n\tpercent Tubingen\n*goto inventory\n\n*label chart2\n\n*stat_chart\n\ttext full_name Name\n\ttext wound_text Blood Loss\n\ttext swimming_text Swimming\n\n\topposed_pair persistence\n\t\tPersistence\n\t\tSpontaneity\n\topposed_pair loyalty \n\t\tSociety Loyalty\n\t\tMermaid Loyalty\n\topposed_pair rigor\n\t\tAcademic Rigor\n\t\tPassion\n\tpercent credibility Credibility\n\n*stat_chart\n\tpercent madame Madame Approval\n\tpercent sandoval Sandoval Approval\n\n\tpercent patron_favor Patron Approval\n*goto inventory\n\n*label inventory\n*if evidence = 0\n\tNo evidence collected. Yet.\n\t*finish\n*else\n\t*goto inventory2\n\n*label inventory2\n*temp inventory \"\"\n*temp comma false\n\n*if gift = true\n\t*set inventory &\"Shell Necklace\"\n\t*set comma true\n*if moonlit = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set inventory &\"Moonlit Sighting\"\n\t*set comma true\n*if sailor_tale = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Sailor Anecdotes\"\n*if daylight_sighting = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Daylight Sighting\"\n*if javel_fake = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Javel's Mermaid Comb\"\n*if singednote = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Sandoval's Singed Notes\"\n*if carvedshell = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Shell Carved With Mermaid Writing\"\n*if ornament = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Hair Ornament\"\n*if captive = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"A Live Mermaid, Her Teeth, The Mean Names She Calls You\"\n*if volunteer = true\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"A Live Mermaid, Her Appetite, Your Bacon Receipts\"\n\nEvidence Collected: ${inventory}\n*finish\n\n\t", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  *if choice_is_omnibus_app or choice_is_web\n    [b]Remove Advertising and Delays[/b]\n    \n    Permanently remove all ads and delays from the game.\n  *if (choice_is_omnibus_app = false) and (choice_is_web = false)\n    [b]Rest of the Game[/b]\n\n    Unlock the rest of the game, including the thrilling conclusion!\n  *purchase_discount adfree 2020-04-29 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Daring Mermaid Expedition.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "screenshots": "screenshots!\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set firstname \"Rosemary\"\n*set lastname \"de Mournish\"\n*set bloodloss 0\n*set swimming 3\n*set patron \"none\"\n*set persistence 40\n*set loyalty 40\n*set rigor 65\n*set credibility 45\n*set Wellington 50\n*set Scharknell 50\n*set Fontana 35\n*set Tubingen 60\n*set madame 50\n*set sandoval 50\n*set captive false\n*set gift false\n*set moonlit false\n\nThe elaborate embroidery on her day gown doesn't murmur of costliness so much as it grabs you by the shoulders, shakes you a few times, and shouts in your ear that you couldn't ever afford such a thing. She'd be a fine patron if you could find a way to impress her.\n\nBefore you can introduce yourself, she rushes over to you. \"Darling! DARLING! I've been looking all over for you!\" She gives you a significant look.\n\n*fake_choice\n\t#\"Baroness! What a delight to see you!\"\n\t#\"Are you…are you talking to me?\"\n\t#\"What? You must have the wrong person.\"\t\t\n\t#\"Your ladyship, I was hoping to speak to you about my application.\"\n\n*script changeBackgroundColor(\"black\")\n\n*set firstname \"Sunil\"\n*set lastname \"Patel\"\n*set bloodloss 1\n*set swimming 0\n*set patron \"Tubingen\"\n*set persistence 60\n*set loyalty 60\n*set rigor 35\n*set credibility 55\n*set madame 50\n*set sandoval 35\n*set captive false\n*set gift true\n*set moonlit false\n*set patron_favor 65\nA cannon fires in the distance. \"It's the [i]Relentless[/i]!\" the sailor cries. \"That's Captain Lucy Smokeheart! We're doomed!\" \n\nYou can make out a silhouette at the prow of the advancing ship, but how anybody could identify the ship, much less the captain, is beyond you. The crew of your own vessel, the [i]Albatross[/i], are swarming around the deck like termites at a sawmill.\n \nThe pirates will be upon you at any moment. What will you do?\n\n*fake_choice\n\t#Find a place to hide.\n\t#Get ready to fight!\n\t#Surrender to the pirates.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set firstname \"Greta\"\n*set lastname \"Philatelos\"\n*set bloodloss 0\n*set swimming 1\n*set patron \"Fontana\"\n*set persistence 50\n*set loyalty 60\n*set rigor 65\n*set credibility 40\n*set madame 50\n*set sandoval 50\n*set captive false\n*set gift false\n*set moonlit true\n*set patron_favor 55\n\n[i]We at the Society have heard about your recent troubles! Given the circumstances, we'd like to request a full report. Have you made it to Broken Shell Island? Are you well? Are you still fit to continue the research set before you?[/i]\n\nWhen your patron at the Royal German Marinological Society demands a complete accounting of your progress so far, only a fool would procrastinate. And you, ${firstname}, are nobody's fool. \n\n*fake_choice\n\t#Document my activities, exactly as they are.\t\n\t#Time to be creative—inflate my findings!\n\t#Let's not jump the gun. I'll minimize my discoveries.\t\n\t#Let the Society wait on me for a while.\n\n*set firstname \"Faizah\"\n*set lastname \"Khalil\"\n*set bloodloss 2\n*set swimming 5\n*set patron \"Scharknell\"\n*set persistence 40\n*set loyalty 60\n*set rigor 65\n*set credibility 70\n*set Wellington 50\n*set Scharknell 50\n*set Fontana 35\n*set Tubingen 60\n*set madame 70\n*set sandoval 50\n*set captive false\n*set gift false\n*set moonlit false\n*set patron_favor 40\n\n\"You there, your presence is required!\" Madame announces, her voice sharp. Before you can formulate a response, though, Madame grabs you by the wrist and pulls you along behind her. \"It's time,\" she says. \"This nonsense has gone on long enough!\"\n\n\"What? What's gone on?\" You panic for a moment, convinced that she's talking about your mermaid research. Is she…voting you off the island?! Can she even do that?\n\n\"Sandoval!\" she cries. \"And this ridiculous obsession with mermaids. It ends now, and you will help me!\"\n\n*fake_choice\n\t#Defend Sandoval's ridiculous obsession!\n\t#Wait, what? I don't understand.\n\t#Immediately agree to help.\n\n*set firstname \"Evan\"\n*set lastname \"Chan\"\n*set bloodloss 5\n*set swimming 3\n*set patron \"Wellington\"\n*set persistence 40\n*set loyalty 70\n*set rigor 35\n*set credibility 60\n*set madame 60\n*set sandoval 35\n*set captive true\n*set gift false\n*set moonlit false\n*set patron_favor 60\n\nThe Queen bares her teeth at you. \"Tell me, what have you done with our sister Weialaha?\" Ah. She knows about that. Well, this is awkward. \n\nBefore you can answer, she darts from her throne and swims closer to you. \"In the name of the Oracle and our ancestors, in the name of bone and fire and tide, you are on trial for the vanishing of one of the Merameida people! Tell me, air-swimmer, how do you plead? And don't think you can lie to me.\" \n\n*fake_choice\n\t#Admit the truth.\n\t#Defend my innocence!\n\t#Gather some evidence.\n\t#Make a run for it!\n\n\n", "startup": "*title The Daring Mermaid Expedition\n\n*author Andrea Phillips\n\n*scene_list\n\t1_childhood\n\t2_society\n\t3_pirates\n\t4_island\n\t5_search\n\t6_intervention\n\t7_surprise\n\t8_mermaid\n\t9_queen\n\t10_findings\n\n*achievement wellington visible 15 Student of Logic\n\tMiss Wellington is your patron.\n\n*achievement tubingen visible 15 Fable Apprentice\n\tLord von Tubingen is your patron.\n\n*achievement scharknell visible 15 Social Pupa\n\tBaroness Scharknell is your patron.\n\n*achievement fontana visible 15 Adventurer Junior\n\tMr. Fontana is your patron.\n\n*achievement allpatrons visible 100 Liberal Arts Education\n\tCollect all four patrons.\n\n*achievement letters visible 15 Pen Pal\n\tWrite three letters to your patron.\n\n*achievement lovebirds visible 15 Matchmaker\n\tReconcile Sandoval and Madame.\n\n*achievement capture visible 15 Mermaid Trapper\n\tCapture a mermaid.\n\n*achievement persuade visible 15 Sweet Talker\n\tPersuade a mermaid to go with you.\n\n*achievem
