eal is just as ascetic as you might have predicted; broth followed by cold chicken, dry brown bread, and stewed peaches. There is wine, though, and it loosens her tongue a bit.\n\nGradually your conversation turns to the nature of science. She takes her spectacles off and sets them on the table between you. Her eyes are dark like the night sky. \"What do you think science is for?\" she asks. \n\n*fake_choice\n\t#\"Discerning the truths of the universe.\"\n\t\tShe nods. \"On the surface, yes, that's the point of it all.\"\n\t\t*set patron_favor %+10\n\t#\"It's a passion. We as a species are driven to…explore.\"\n\t\tHer eyes linger on your lips for a moment. \"We do enjoy exploring, don't we?\"\n\t\t*set patron_romance +1\n\t\t*set patron_favor %+15\n\t#\"Don't they say knowledge is power?\"\n\t\t*set patron_favor %-10\n*comment endif\n\nShe leans back in her chair. \"Science isn't just a thing we do,\" she says. \"It's a way of looking at the world—the most true and honest way. Before you go, I'd like to train you in the high arts of observation and logic. I'll expect you every morning until you leave for Broken Shell Island.\" \n\n*if rigor > 50\n\tMiss Wellington gazes upon you in something very like approval. \"I must say, I find you rather less stupid than a novice scholar usually is, ${lastname}. I do think we'll get on famously. Well. Good night, then.\" She turns away. You understand that to be your dismissal, and you quietly make your way out of her home.\n\t*set rigor %+15\n\t*set patron_favor %+10\n\t*goto chap2_end\n*set rigor %+15\n*goto chap2_end\n\n\n*label chap2_end\n*page_break\nLater that night, you lie awake in bed, thinking about what ${patron_title} ${patron_fname} ${patron_surname} has planned for you, about your provisional admission to the Society, about…mermaids. Who could have guessed that a chance childhood encounter would so thoroughly shape the direction of your life? \n\nAt any rate, this mermaid expedition is set to make or break your career in the Royal German Marinological Society. You'd better make this one count, ${firstname}. \n*finish\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_is_steam)\n\t*label purchased\n\t*return\n\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n*abort", "3_pirates": "*temp swim_practice \"false\"\n*temp boon \"false\"\n\n*label set_sail\n\nWhen the Royal German Marinological Society puts its full force behind making something happen, it's as ruthlessly efficient as a guillotine. The Society arranges all of the details for your journey to Broken Shell Island, from transportation to lodgings and material. In no time at all, you find yourself supervising the loading of your trunks and cases onto your ship. You have everything you need: pens, notebooks, tools for taking measurements, reference books. \n\nThe rest is up to you. You'll have to use your wits, muscle, charm, and discipline to collect as much evidence of the existence of mermaids as you possibly can. The more evidence you have, the better your case will be when you return to present your findings to the Grand Royal Scholar.\n\nSandoval also sails with you. Or so you've heard; you don't see a whisker of him. Not that he's got whiskers. \n\n*if patron_favor > 60 \n\t*goto patron_docks\n*else \n\t*goto long_voyage\n\n*label patron_docks\n\nUnexpectedly, your Society patron ${patron_title} ${patron_surname} comes to the docks to see you off. \n\n*if patron = \"fontana\"\n\tHe sizes you up from head to toe, leaving you feeling somewhat like a lamb for sale, then claps you on the back. \"Stay alert,\" he tells you. \"Combing the beaches for a mythological creature may not seem as dangerous as climbing the world's highest peaks or forging into the depths of a snake-infested jungle. But you must not become complacent! Peril comes when you least expect it!\"\n\n\tYou nod dutifully.\n\n\t\"One last thing,\" he says. \"This is an adventure, not a mere research job. Don't forget to enjoy yourself to the fullest!\" He winks as he turns away.\n\t*set persistence %-10\n\t*goto long_voyage\n\n*if patron = \"wellington\"\n\tShe nods to you coolly. \"Remember, whatever else comes, you are in the service of knowledge. Believe nothing without evidence, strive for truth in all things, and everything else will take care of itself.\"\n\n\tYou nod dutifully.\n\n\tMiss Wellington straightens her gloves briskly. \"I'm sure you'll acquit yourself adequately,\" she says. \"This business of mermaids, though, can give some over to flights of fancy. Remember, the glory of a romantic discovery is short, and your career will be long, we hope. Safe journeys, ${firstname}.\" She grants you a businesslike smile before she turns away.\n\t*set rigor %+10\n\t*goto long_voyage\n\n*if patron = \"scharknell\"\n\n\tShe presses a crisp, heavy envelope into your hand, covered in elaborate swirls of calligraphy. It smells faintly of her perfume. \"This is a personal letter of introduction,\" she tells you. \"I think you'll find it opens doors on Broken Shell Island that might otherwise remain closed to you.\"\n\n\tYou nod dutifully.\n\n\tShe pats your cheek affectionately. \"Relax, darling,\" she murmurs. \"I know you believe your whole life pivots on this one moment. But there will be ways to turn this to your advantage, no matter what you discover on the island.\" She peers at the angle of the sun from under her parasol. \"And now I must be off to Lord Battington's luncheon, or I'll be too late to even be fashionable. Do keep me posted!\"\n\t*set rigor %-10\n\n\t*goto long_voyage\n\n*if patron = \"tubingen\"\n\n\tHe runs his fingers through his hair. \"Do you have everything you need? Enough ink? You remembered the monograph on sea lions in antiquity, and the one about funerary practices among eels? Did you bring a varied selection of digestives with you? I find traveling can unsettle the stomach.\"\n\n\tYou nod dutifully.\n\n\t\"Very well.\" He gazes at you thoughtfully. \"Mermaids,\" he murmurs. \"To think we might be nearing an incredible discovery. I almost wish I were coming myself. Perhaps—well, I simply cannot wait to hear about your research. I have no doubt you'll uncover something the world has never seen before.\"\n\n\tHe doesn't say goodbye so much as he appears to lose himself in thought; then he wanders away, muttering about legendary sea dragons, naiads, and selkies. \n\t*set persistence %-10\n\n\t*goto long_voyage\n\n\n*label long_voyage\n\n*temp loop 0\n\nThe [i]Albatross[/i], your home for the days of your journey, is a wide, sturdy vessel with squared-off sails and surprisingly roomy cabins. The sway of the swells beneath you lulls you into a gentle reverie. When you snap out of it, you discover that the land has already receded far into the distance. You've headed for the ocean so gradually that you never even noticed.\n\nThe sun is bright, the sea broad and blue; it reminds you of another day, long ago. You half expect to see green and gold scales glittering just under the surface of the water, just like the day that set you on this path.\n\nIt takes you a while just to become accustomed to shipboard life, and so it takes a day or two for the crushing boredom to find you. But find you it does.\n\n*label loop_check\n\nIt's going to be a long journey to Broken Shell Island, and you can't spend all of it staring at the waves and daydreaming. Well, you could, but you probably shouldn't. How will you pass the time?\n\n*choice\n\t*hide_reuse #Correspond with my patron; I need to work on our rapport.\n\n\t\tOf course ${patron_title} ${patron_surname} won't receive your letter for some time, but it doesn't hurt to set a tone for your relationship going forward.\n\t\t*goto patron_letter\n\t\n\t*hide_reuse #Study mermaid lore. Perhaps there's more to learn?\n\t\tAn excellent idea. Your mission has begun—there's no sense in delaying the start of your work until you've arrived at your destination.\n\t\t*goto mermaid_lore\n\n\t*hide_reuse #I need to stay in top condition. Exercise is just the thing!\n\t\tAh, exercise, the key to a long life and a sharp intellect! \n\t\t*goto ship_exercise\n\t*if (loop >= 1) #Let me just stare at the waves for the rest of the trip.\n\t\tThe voyage is getting to you, huh? Cramped quarters, mild seasickness, and the persistent aroma coming from the general direction of the galley leave you unable—or at least unwilling—to do anything productive. You spend the day in the shade of a sail, staring at the shimmering ocean. Strangely, this doesn't make you any less bored.\n\t\t*goto sandoval_chat\n\t\t\t\n\n*label patron_letter\n*set loop +1\n*set letter_count +1\n*set patron_favor %+15\n\nYou retreat to your cabin to pen a missive to your patron. You hold the pen poised over paper, trying to decide what to write, exactly. Hmm…\n*choice\n\t#Give a matter-of-fact report of my journey and plans.\n\t\tYes, it's best to keep this strictly to business matters. You've heard of affairs of the heart between patron and protégé; you've also heard of the many, many ways they can go wrong. Lives ruined, careers wrecked! And seldom only the career of the protégé. Caution is warranted.\n\t\t*set credibility %+5\n\t\t*if patron = \"wellington\" \n\t\t\t*set patron_favor %+10\n\t\t\t*goto after_letter\n\t\t*else \n\t\t\t*goto after_letter\n\t\t\n\t#I'll report my experiences, but with a warmer, more personal tone.\n\t\t*set persistence %-10\n\t\t*set rigor %-10\n\t\tThe best way to ensure you have a future in the Royal German Marinological Society is to make sure you stay on excellent terms with your patron. And the best way to do that is by remaining friendly in your correspondence.\n\t\t*if patron = \"wellington\"\n\t\t\t*goto after_letter\n\t\t*else\n\t\t\t*set patron_favor %+10\t\n\t\t\t*set rigor %-10\n\t\t\t*goto after_letter\t\n\t#Flattery is the ticket—as long as it's well targeted.\n\t\t*set rigor %-20\n\t\t*set patron_favor %+10\n\t\t\t\n\t\tHmm, yes, it can't be a bad idea to tell your patron you think ${patron_pronoun} is amazing, and that you are grateful for this opportunity you are in the middle of enjoying. Or are about to enjoy. Am enjoying?\n\n\t\tAt any rate, flattery gets you everywhere, and anything you can do to get into your patron's good graces can only help the cause of your career in the Society. Maybe it could help your long-term prospects in other ways, as well. Your heart beats a little faster. You scribble furiously, writing…writing…what is it you're trying to do here?\n\n\t\t*choice\n\t\t\t#Compliment ${patron_poss} stunning intellect.\n\t\t\t\tMm-hmm, mm-hmm. Send the message that you respect your patron. This is an academic endeavor, after all.\n\t\t\t\t*if patron = \"wellington\"\n\t\t\t\t\t*set patron_romance + 1\n\t\t\t\t\t*set patron_favor %+10\n\t\t\t\t\t*goto after_letter\n\t\t\t\t*else\n\t\t\t\t\t*goto after_letter\n\t\n\t\t\t#Flatter ${patron_poss} superior experience.\n\t\t\t\tYes, perfect. Demonstrate your humility, and how terribly aware you are of how far you have yet to go.\n\t\t\t\t*if patron = \"scharknell\"\n\t\t\t\t\t*set patron_romance + 1\n\t\t\t\t\t*set patron_favor %+10\n\t\t\t\t\t*goto after_letter\n\t\t\t\t*else\n\t\t\t\t\t*goto after_letter\n\n\t\t\t#Admire ${patron_poss} distinguished reputation.\n\t\t\t\tAh, yes, reputation is something earned over time and with effort, and not an innate quality. Best to focus on the things ${patron_pronoun} has worked toward.\n\t\t\t\t*if patron = \"tubingen\"\n\t\t\t\t\t*set patron_romance +1\n\t\t\t\t\t*set patron_favor %+10\n\t\t\t\t\t*goto after_letter\n\t\t\t\t*else\n\t\t\t\t\t*goto after_letter\n\n\t\t\t#Confess how impressed I am by ${patron_poss} courage.\n\t\t\t\tAccolades and reputation are external factors, but courage comes from within. Your patron will surely appreciate this sentiment, which recognizes ${patron_poss} worth as a human being best of all.\n\t\t\t\t*if patron = \"fontana\"\n\t\t\t\t\t*set patron_romance +1\n\t\t\t\t\t*set patron_favor %+10\n\t\t\t\t\t*goto after_letter\n\t\t\t\t*else\n\t\t\t\t\t*goto after_letter\n\t\t\n*label after_letter\n\nYou labor over your letter for days, striving to get each line and word perfect. After all, who knows what effect this correspondence might have on your future? But at last you are satisfied. You sign it and seal it with the blue wax of the Royal German Marinological Society. When the [i]Albatross[/i] stops over at a small island to take on fresh water and food, you send off your missive.\n\n*goto loop_check\n\n*label mermaid_lore\n*set loop +1\n\nAlong with all your other supplies and equipment, the Society sent along a collection of books, journals, and correspondence from their libraries—anything and everything to do with mermaids. Most of it is precisely what you already knew from your independent research. There are innumerable accounts of mermaid sightings, legends from a dozen distinct cultures, and so on. But there's precious little in the way of hard evidence. No mermaid has ever been captured and studied. Those innumerable sightings are invariably the realm of drunkards, lunatics, or—and this one stings a little—children.\n\n*if persistence > 55\n\tYou do come across a compelling account in one of Scholar Avolynici's diaries, buried in a footnote in tiny print. Avolynici primarily studied shark bites, but he also recorded several accounts of scarring in which the tooth pattern and size simply didn't match any known species of shark. He assumed it was an as-yet-undiscovered shark species, but…\n\n\t*if scar = true\n\t\tYou rub the scar on your own shoulder. Yes, you know all about that tooth pattern, don't you?\n\t\t*goto mermaid_lore2\n\n\t*else\n\t\tWell, who can say. It's not much to go on.\n\t\t*goto mermaid_lore2\n\n*label mermaid_lore2\n\nIn the end you don't really learn anything new. But it soon occurs to you that you've been missing one of the most valuable resources at your disposal: word of mouth from the very sailors on this ship! They're by no means expert academics, but perhaps they've seen things. There has to be a body of mythology around mermaids known best to the brave men and women who live on the sea, right?\n\nYou approach a group of sailors relaxing over grog and gambling. Your best bet is…\n\n*choice\n\t#Share my childhood experience to encourage them to open up.\n\t\tYou learned early on that this wasn't a story to share with just anyone, but maybe, just maybe, this is the right time and place. You tell them about that fateful day, your fall overboard, all of it. They listen raptly until your story concludes.\n\n\t\t*if (credibility > 50)\n\t\t\t*goto sailors_believe2\n\t\t*else\n\t\t\t*goto sailors_laugh\n\n\t#Ask if any of them has ever seen a mermaid before.\n\t\tYou might as well have sucked all of the air out of the room. A woman with a livid scar across her cheek and white-blonde hair cropped close to her scalp repeats your words slowly. \"Have we ever…seen…a mermaid before?\"\n\n\t\t*if (persistence > 50)\n\t\t\tYou nod grimly. \"That's what I said.\"\n\t\t\t*goto sailors_believe1\n\t\t*else\n\t\t\t*goto sailors_laugh\n\t\t\n\t#Try to gain their trust first. Relax, play some cards, work my way up to it.\n\t\tYou win the first hand with ease. The sailors banter among themselves and with you, joking about some captain's penchant for elaborate wigs, which ships pay better. You begin to lose heavily. You run out of coin, and decide that's enough trust earned for one night. \"Say,\" you slide the subject into the conversation as casually as you can, \"I'm being sent to Broken Shell Island to look into something about mermaids. You know anything about that?\"\n\t\t*if credibility > 50\n\t\t\t*goto sailors_believe2\n\t\t*else\n\t\t\t*goto sailors_laugh\n\n*label sailors_laugh\n\nThe sailors laugh uproariously. Knees are slapped, sides are split. \"Yeah, we know all about mermaids,\" says the sailor sitting on your right, wiping a tear from his eye. He's got an eye patch that seems somehow at odds with the cheery freckles dotting his dark-brown face. \"Remember, Janey, that one time we went swimming with mermaids?\"\n\n\"Yeah, yeah,\" Janey replies with a broad smile. \"I borrowed a starfish to get the knots out me hair after. And then we had a fine feast of pearls and coral!\"\n\nYou rise stiffly to your feet. \"I'll take that as a no,\" you say, and stalk to your cabin with what tatters of dignity you can muster.\n*goto loop_check\n\n\n*label sailors_believe1\n\nThe sailors chortle among themselves for a moment, but turn sober when they notice that you're not joining them. \"You really mean it?\" ventures one, a large woman with bright silver hair and tobacco stains on her teeth. They put their cards down, one by one, and look at one another uncomfortably.\n\n\"There was this one time,\" the silver-haired sailor begins. The others look at her, hushed and uncertain. \"Never told this to anyone before. I fell off the docks at Port St. Never,\" she says slowly. \"And I came face to face with a, well, it was like a…a purple lady, with big eyes and teeth like a shark's. And a fish tail. She came at me mouth-first, ready to take a chunk out of me face. Thought I was going to die.\"\n\nHer shipmates stare at her, riveted. \"Did you die?\" one asks, breathless.\n\n\"No, stupid.\" She glares at him. \"Do I look dead to you? No, me mates pulled me out of the water, and I never was sure if I imagined the whole thing after. So.\" She looks at you uncertainly. \"Do you believe me?\"\n\nYou nod slowly. \"I do. Thank you for telling me your tale.\" You make your excuses and retreat to your room to write down the account while it's still fresh on your mind. It's not proof, but it's better than you had before.\n*set evidence + 1\n*set sailor_tale true\n*goto loop_check\n\n*label sailors_believe2\n\nThe sailors chuckle a bit, then grow thoughtful. \"You know,\" one says, \"I heard Lucy Smokeheart is friends with the Queen of the Mermaids.\" Yeah, you've heard that one, too, but then again you've also heard that Smokeheart's sister-in-law was a monkey, so…\n\nThe sailors mutter and shuffle their feet. \"They say she once fought against Captain Bluebraid on her ghost ship and lived to tell the tale,\" another chimes in.\n\n\"They say the governor of Port St. Never is in love with her—that she carries a sword of ice and magic—that she battled an army of shadows and saved the world.\"\n\nThe first sailor smiles at you apologetically. \"Ain't nothing scientific-like, like maybe you were expecting,\" she says. \"But that's about all we got.\"\n\nYou nod politely. \"Thank you for your time,\" you say. You look into the dark water on your way to your cabin, but at night the ocean is just as opaque as the truth you're looking for.\n*goto loop_check\n\n\n*label ship_exercise\n*set loop +1\n\nYou do your best to execute a series of lunges, sit-ups, and other calisthenics, but the rolling of the ship makes it harder than you expect. You find yourself alternately weaving and toppling over. \n\nWorse, your efforts attract a crowd of gawping sailors. They elbow one another and snicker. Not even behind their hands, just out in the open, like they don't care if you know that they're laughing at you. Jerks.\n\nFinally one of them approaches you. \"Say, you want to go swimming in the ocean?\" she asks. \"We do it all the time when we're at sea.\"\n\nYou can't tell if she's lying.\n\n*choice\n\t#Well, I am here for adventure, right? Let's try it!\n\t\tThe crew of the [i]Albatross[/i] have lowered a ladder for those souls with a hankering to swim in the wide open ocean.\n\t\t*set persistence %-5\n\t\t*goto swimming\n\t#Make one of the sailors go first.\n\t\t\"Sure,\" you say, \"but show me how it's done.\"\n\t\t\n\t\tYou're not sure it's safe at first, but the crew of the [i]Albatross[/i] have lowered a ladder for those souls with a hankering to swim in the wide open ocean. You see a sailor swanning about doing the backstroke.\n\t\n\t\tNot an elaborate prank, then, as best you can figure. May as well give it a shot, right?\n\t\t*goto swimming\n\t#Politely refuse. This can't possibly be a good idea.\n\t\t\"No, thank you,\" you say. You resume your calisthenics with an air of dignity.\n\t\t*set rigor %+10\n\t\t*goto loop_check\n\n*label swimming\n*set swimming + 1\n*set swim_practice true\n\n\"Go on,\" says a sailor, motioning toward the ladder. \"We'll keep an eye out in case you get into trouble.\"\n\nAs you clamber down, a sailor calls one more thing after you: \"Watch out for sharks!\"\n\nThe swells that seemed gentle from the deck are at least as tall as you are, and despite the tropical clime, the water is as cold as an iron lamppost in February. You make the best of it, trying out a few strokes, but on the open ocean it's difficult to tell if you're making any progress or not.\n\nThen something brushes across your calves. You're not alone. A fin cuts through the surface a few feet away from you. Shark!\n\n*if swimming > 2\n\n\tGiven this new incentive, your ability to move through the water improves rapidly. You churn your way back toward the ladder and emerge, shivering but unscathed. The sailors clap you on the back and cheer. \"Good show, mate!\" says one. \n\n\tThe shark skims next to the ship, then seemingly disappears. Maybe…maybe you shouldn't go swimming again anytime soon.\n\t*goto loop_check\n\n*else\n\tYou flail toward the ladder as best you can, but your skill at swimming isn't quite up to the job. The sailors at the rail see your distress and throw a rope to pull you in. You claw at it, and the sailors heave you up the side of the ship until your shoulders are out of the water, then your waist, then—\n\n\t[i]Snap[/i]. The shark's teeth just scrape your heel. You make it safely on deck, then stand there, dripping blood and salt water. A sailor thinks to bring you a towel, and another hurries toward you with bandages.\n\n\tYou look carefully at the wound. It stings like the blazes, but it's not deep. The shark is still thrashing next to the ship, furious at having come so close only to stay hungry. Maybe…maybe you shouldn't go swimming again anytime soon.\n\t*set bloodloss + 1\n\t*goto loop_check\n\n\n*label sandoval_chat\n\nThe next day, entirely breaking with pattern, Sandoval emerges blinking and surly from his cabin and suddenly, inexplicably, devotes himself to engaging you in conversation. This is a bit of a shock. You'd started to half believe he wasn't on the ship at all, and the crew were all perpetrating an elaborate prank on you by insisting he was aboard.\n\nYet now he marches toward you, fists clenched and jaw tight, as though he is expecting some pitched battle. \"Good day,\" he says. Then, his contribution to the opening pleasantries concluded, he watches you, eyes narrowed. He's not quite sure what to expect of you.\n\n*choice\n\t#I'll give him a civil greeting, no more.\n\t\t*goto sandoval_like_test\n\t#Be kind; I'll ask him about the voyage so far.\n\t\t*set sandoval %+5\n\t\t*goto sandoval_like_test\n\t#Let's get right to the point: mermaids!\n\t\t*set sandoval %+10\n\t\t*goto sandoval_like_test\n\t#Ignore him. Maybe he'll go away?\n\t\t*set sandoval %-10\n\t\t*goto sandoval_like_test\n\n*label sandoval_like_test\n*if sandoval \u003c 40\n\tSandoval glares at you. Apparently your behavior during the hearing hasn't been forgiven, much less forgotten. \"Why are you doing this?\" he snaps at you. \"Are you here just to mock me, like all the others?\"\n\n\t*choice\n\t\t#\"You don't make it easy to believe you, buddy.\"\n\t\t\t*set sandoval %-15\n\t\t\tHe recoils. \"What is that supposed to mean?\" Before you can answer, he waves a hand. \"Look, let's just get to the point.\"\n\t\t\t*goto sandoval_prediction\n\n\t\t#\"I'm here for science, nothing else!\"\n\t\t\tHe spits over the edge of the deck. \"I've heard that one before,\" he says darkly. \"But that's not why I needed to speak to you.\"\n\t\t\t*set sandoval %-10\n\t\t\t*goto sandoval_prediction\n\t\t\n\t\t#\"We should team up. I'll rely on your expertise!\"\n\t\t\tHe puffs up with gratification like a little bird on a cold day. \"I'm so glad to see you've seen the error of your ways,\" he says stiffly. Still, there is a little more warmth in his voice than before. \"But that's not why I needed to speak to you.\"\n\t\t\t*set sandoval %+15\n\t\t\t*goto sandoval_prediction\n\t\t\n\t\t#\"Um, yeah, I'm really sorry about that.\"\n\t\t\tHe sniffs. \"Don't think I'll forgive you just like that. I'll be nobody's patsy, and especially not yours. But that's not why I needed to speak to you.\"\n\t\t\t*set sandoval %+10\n\t\t\t*goto sandoval_prediction\n\n*if sandoval > 60\n\tSandoval gives you a short bow and a charming smile. \"So pleased you could join me on this journey. To think! At last, my work will be seen, my expertise vindicated! At last, I will gain recognition from the Royal German Marinological Society, and the world!\"\n\n\t*choice\n\t\t#\"What do you mean, [i]your[/i] expertise and [i]your[/i] work?\"\n\t\t\tHe bristles and turns red; you can all but see steam escaping his ears. \"Why, you're the newcomer here! A scholar-come-lately! Hoping to cash in on my years of research, my—my—\" With some difficulty, he takes a deep breath and tries to regain control of himself. \"This isn't why I needed to speak to you.\"\n\t\t\t*set sandoval %-15\n\t\t\t*goto sandoval_prediction\n\t\t#\"One step at a time. First I have to see these mermaids.\"\n\t\t\tHe rubs at a stain on his shirt absently, then pops the finger in his mouth. \"I suppose that's the best I can expect.\"\n\t\t\t*set sandoval %-5\n\t\t\t*goto sandoval_prediction\n\t\t#\"Tell me more about your findings.\"\n\t\t\tHis eyes light up. \"Yes, yes—the mermaids!\"\n\t\t\t*set sandoval %+15\n\t\t\t*goto sandoval_overshares\n*else\n\tSandoval looks at you uneasily. He doesn't seem to know what to make of you, nor how to start a conversation.\n\t*goto sandoval_prediction\n\n*label sandoval_prediction\n\nThere is an awkward pause while Sandoval tries desperately to organize his thoughts into something he might convey to you. He shuffles his feet, and this is also awkward. \"So,\" he eventually says, as casually as he can manage (which turns out to be about as casual as the embroidery on the Grand Royal Scholar's formal robes), \"what do you expect will happen when we arrive on the island?\"\n*choice\n\t#\"I'm not sure why I should tell the likes of you.\"\n\t\tYou might as well have set the man on fire. His nostrils flare to a dangerous size, and he rears back. For a second you think he's going to strike you. \"Let me tell you something!\" He breathes heavily. \"I have sacrificed! I have earned the right to know!\"\n\t\t*set sandoval %-15\n\t\t*goto sandoval_overshares\n\t#\"Don't worry, my friend, we'll show the Society the truth of the matter!\"\n\t\t*set sandoval %+15\n\t\tHe brightens. \"Do you really think so?! It's been my dream—my passion—\"\n\t\t*goto sandoval_overshares\n\t#\"I'll conduct a full investigation, but who can say what we'll find?\"\n\t\tHe glowers at nothing in particular. \"I can say, scholar. I can say!\"\n\t\t*goto sandoval_overshares\n\t*if (rigor \u003c 40) #\"You're the expert. You should advise me on what to do!\"\n\t\t\"Just so, just so,\" he preens. \n\t\t*set sandoval %+20\n\t\t*goto sandoval_overshares\n\n\n*label sandoval_overshares\nSandoval gestures toward the water in an excessively dramatic sweeping motion. He nearly overbalances in the process.\n\n\"The mermaids fascinate me,\" he says. \"Their supple forms, their shining hair, the way their scales glitter in the sunlight. I've spent months of my life watching them. Years! As a matter of purely academic interest, of course,\" he adds hastily. \"But you should know that the mermaids have also ruined my life!\"\n\nA strange, unsettling expression overcomes him: eyes squinched up, nose twitching. It dawns on you, gradually, that he is experiencing some sort of…emotion. \"Oh, Madame!\" he wails. \"What have I done! She discovered my work, and she was not forgiving! Tell me, ${firstname}, what should I do about her?\"\n\n\"About…who, exactly?\" you ask cautiously.\n\n\"Madame Blandine LeJeunesse, the love of my life! The treasure of my heart! The cruelest woman who ever walked the earth. Oh, ${firstname}, whatever shall I do?\" There are actually tears in his eyes. Wow, talk about awkward.\n\n*choice\n\t#\"I'm sure it's none of my business one way or the other.\"\n\t\tHe stiffens and takes a shuffling step backward. \"Of course, of course,\" he murmurs. \"How gauche of me. We're colleagues, and I shouldn't trouble you with my personal affairs, should I? I will speak no more of this matter.\" He turns away and surreptitiously dabs at his eyes with the cuff of his sleeve.\n\t\t*set sandoval %-20\n\t\t*goto pirates\n\n\t*if (persistence > 60) #\"But…the mermaids. What did you learn about them?\"\n\t\tHis shoulders tremble with the mighty effort of repressing his overflowing font of emotion. \"I'm simply warning you,\" he says. \"If one means to study mermaids, one must be prepared to make sacrifices. This is no easy road to fame!\"\n\t\t*set sandoval %-10\n\t\t*goto pirates\n\n\t*if (rigor \u003c 50) #\"I can help you to win her back!\"\n\t\tHe gasps. \"Would you? Could you? Oh, I would be the happiest man living, if only that could be so!\" He takes your hand and shakes it vigorously. \"I would be your best ally and advocate! I would share with you everything I know! I—I would even let you take most of the credit!\"\n\t\t*set helpsandoval \"true\"\n\t\t*set sandoval %+30\n\t\t*goto pirates\n\t\n\t*if (rigor > 50) #\"Sometimes one must make sacrifices for one's career.\"\n\t\tHe raises his quivering chin high. \"Yes, sacrifice! I have thrown my life onto the rocks of a noble pursuit, and through my suffering…through my…\" he trails off, searching for a sufficiently poetic way to end his sentence. \n\t\t*set sandoval %+10\n\t\t*goto pirates\n\n\t#\"I don't understand. What are you talking about?\"\n\t\tHe dashes his hand across his eyes. \"Forgive me, forgive. I was overcome by my feelings. Of course you don't know. You couldn't know! It is nothing. Please, give me a moment to control myself.\" He begins an elaborate series of breathing exercises, presumably meant to help him regain his composure. \n\t\t*goto pirates\n\n\t#\"There are other fish in the sea, Sandoval.\"\n\t\tThis sends him into a paroxysm of sobs. \"Other fish! Oh, how you mock me! As if a mermaid would ever…\" He gestures to his torso, and you remember his maze of bite scars. \"No, the only woman for me is Madame. I know this to be true.\"\n\t\t*set sandoval %-10\n\t\t*goto pirates\n\t\n\t#Give him a handkerchief.\n\t\tHe accepts it with a bow and dabs daintily at his eyes. \"Thank you,\" he sniffles. \"I'm not sure what came over me. I—I need a moment.\"\n\t\t*set sandoval %+5\n\t\t*goto pirates\n\n\n*label pirates\n\nYou suddenly realize that the lulling hum of shipboard life and the slap of water against the hull have been replaced by a clamor that grows louder with every passing second. Feet pound by you; commands are shouted from one end of the [i]Albatross[/i] to the other. The crew of your ship seems to have become very excited about something.  Sandoval looks around in bewilderment. \"We can't be there yet, can we? Not until tomorrow, I thought.\"\n\nA sailor rounds on the pair of you. \"Pirates,\" he spits. \"And gaining on us fast!\"\n\n*page_break\n\nA cannon fires in the distance. The shot splashes into the water just feet short of your bow.\n\n\"It's the [i]Relentless[/i]!\" the sailor cries. \"That's Captain Lucy Smokeheart! We're doomed!\" He races off to attend to his duties. Sandoval turns a curious shade of purple and devotes himself to leaning against the rail, hurling increasingly creative curses at the enemy.\n\nYou squint toward your attacker. You can make out a silhouette at the prow of the advancing ship, but how anybody could identify the ship, much less the captain, is beyond you. The crew of your own vessel, the [i]Albatross[/i], are swarming around the deck like termites at a sawmill.\n \nThe pirates will be upon you at any moment. What will you do?\n\n*choice\n\t#Find a place to hide.\n\t\t*goto hide\n\t#Get ready to fight!\n\t\t*goto fight\n\t#Surrender to the pirates.\n\t\tThe rest of the [i]Albatross[/i] is still fighting, but you already know exactly how this is going to play out. You hang back, waiting for the inevitable arrival of a pirate to surrender to. You don't have to wait long.\n\t\t*goto surrender\n\n*label hide\nYou're a scholar, not a fighter. Your best bet is to simply hide—maybe the pirates will just take a few valuables and go, and you can safely resume your journey once they've passed. But where to hide?\n\n*fake_choice\n\t# In a barrel.\n\t\tThere's an empty water barrel next to the galley. You rush over and tumble inside it, then pull the lid down over your head.\n\t# Down in the hold.\n\t\tIt's dark down in the cargo hold, and there are plenty of nooks and crannies—too many for any pirate to search thoroughly. You wedge yourself between a crate and some sacks of flour.\n\t# Under my bunk.\n\t\tYou scramble belowdecks and cram yourself beneath your own bunk. It smells like feet, but perhaps you'll be safe here.\n\n*if persistence \u003c 50\n\n\tIt's dark in your hiding spot, but you can hear well enough. The captain is shouting orders, and the sailors are shouting back. Somewhere above there is a rough thud, then another. Your teeth rattle together. The ship turns, and you hug your knees tightly to stay in place. Then everything falls quiet. Is it over? Are you safe now?\n\n\tNo, nothing so good as that. Boots pound across the decks; steel rings against steel. The battle is still going on. You hear a shouted curse, and the crack of a pistol. Smoke fills the air, sharp and hot, as if your nose hairs had been singed.\n\n\tThen you hear a tremendous roar. The whole ship quakes as if shaken in the hand of a colossal toddler. It's hard to tell the difference, since the ship is constantly in motion, but you think the deck under your feet is listing a little to the right.\n\n\n\tA muffled voice cries, \"She's going down! Abandon ship!\"\n\n\tUh-oh. Now what?\n\t*choice\n\t\t#Surrender to the pirates.\n\t\t\tYou reluctantly leave your spot and creep toward the noise, hands held high in the air. \n\t\t\t*set persistence %-10\n\t\t\t*goto surrender\n\t\t#Stay hidden and wait it out.\n\t\t\tYou stay the course. The sounds of fighting continue for a while, then begin to peter out. Great!\n\n\t\t\tThen you realize your feet are getting wet. Um. Less great.\n\n\t\t\t*set persistence %+15\n\t\t\t*goto ship_sunk\n\n\t\t#Try to sneak over to the boats to escape!\n\t\t\tYou don't want to be captured by pirates, but there's no sense in going down with the ship, either. You creep out of your hiding spot and try to get to the boats. \n\n\t\t\tYou almost make it, too. \n\t\t\t*set persistence %-20\n\t\t\t*goto boat\n\n*else\n\tIt takes you a while to work out how to tuck your whole self into your hiding spot; first a sleeve is showing, then a heel. Meanwhile the sounds of fighting draw closer: the [i]Albatross[/i] has been boarded!\n\n\tYou've only just finished settling into place when a massive hand reaches out and hauls you back into the open. A red-bearded giant of a man grins at you—a pirate! \"A little mouse, huh? Too bad I saw your tail sticking out.\"\n\n\tHe sizes you up, his victorious grin slowly replaced by a thoughtful frown. \"You're no sailor, are you?\" He brandishes his axe. It's a glorious thing, that axe, all etched silver and glossy wood. The blade, though, looks far from ornamental. \"C'mon with me. I think the Captain is going to want to speak to you.\"\n\t*goto captured\n\n*label boat\nYou're poised with one foot over the side of the boat when something cold and hard nudges the side of your neck—a pistol! The round-faced boy at the other end coughs apologetically. \"Sorry to interrupt,\" he says, \"But I'm afraid you'll have to come with me. But don't feel bad about yourself; you were doing a very good job of escaping!\" He gives you an encouraging thumbs-up.\n\n*goto captured\n\n*label surrender\nThe poor crew of the [i]Albatross[/i] do their best, of course, but they're not a military vessel. The fighting is fierce—swords ringing, fists flying—but it's painfully clear that the pirates have the upper hand.\n\nYou stay on the edge of the fray, ducking the odd wild punch, until the fighting winds down. You're rounded up with the stragglers to await judgement from the pirate captain.\n*goto captured\n\n\n*label captured\nThe pirates quickly usher you onto the deck of the [i]Relentless[/i]. They have most of the crew of the [i]Albatross[/i] there, too—huddled together, hands tied, bruised and sullen. One pirate climbs into the rigging, brandishing her cutlass. She's a gangly young woman, perhaps seventeen years old, with a head of shaggy black curls and a mischievous grin. \"Relax,\" she calls, \"we're going to make this as easy as possible for all of us!\"\n\n*goto lucy_intro\n\n\n*label fight\nYou won't go down without a fight! But how best to lend your efforts to the fray? There's an unmanned cannon not far away; surely someone should be firing it right now! Maybe that someone should be you! There's also a short, sharp sword hanging from a peg next to the steps leading up to the forecastle. Why hasn't someone grabbed it yet?\n\nYour laudable bravado hits a snag, however, when you realize you don't [i]quite[/i] know how to work a cannon. Or a sword, for that matter. Nor are you particularly well versed in the arts of pugilism, beyond understanding the basic theory that one must attempt to hit one's opponent while avoiding being struck one's own self.\n\nStill, there has to be some way you can help fend off the pirates.\n\n*choice\n\t#Man the cannon! How hard can it possibly be?\t\n\t\t*goto cannon\n\t#Pick up the sword. Armed is better than not.\n\t\t*goto sword\n\t#I'll stick to fighting with what nature gave me.\n\t\t*goto fists\n\n*label cannon\nYou've never worked a cannon before, but if an uneducated sailor can make one go boom, why then, surely you, too, should be able to do so! You look around at the materials a cannoneer is presumably meant to use—gunpowder, mm-hmm, and cannonballs. There's also a box of rags, some sort of torch-looking thing, and a little tinderbox. \n\nYou work your way through the physics of a cannon in your head. The ignition of the gunpowder creates a gas which propels the cannonball out at great force, so gunpowder first, then—hmm, what are these other things for?\n\n*if rigor > 55\n\n\tAha! You spy a scrap of paper peeking out of that box of rags—a sailor's note reminding them of what to do. You follow the steps carefully: swab, powder, wadding, shot—[i]boom[/i]! \n\n\tThe shot careens toward the pirate ship in a beautiful arc, but falls just short. You adjust the angle of the cannon slightly, trying to account for the shifting position of the [i]Relentless[/i] and your own ship, to give it a second try. This time you get a little closer—but the [i]Relentless[/i] is closer, too.\n\t*goto boarded\n\n*else\n\tAs you try to work your way through the intricacies of cannon operation, a cannonball bursts through the timbers near you. You are blown across the deck in a shower of splinters and wood chips. Black spots swim before your eyes and your ears ring, crowding everything out for long moments. At last you stagger back to your feet. But it's too late. \n\t*set bloodloss +1\n\t*goto boarded\n\n*label sword\nYou slide the sword from its scabbard and test the edge. The blade has a few nicks in it, and there's a spot of rust near the handle—you hope it's rust, anyway—but it seems like it's perfectly fit for duty. Too soon to say the same about you, though.\n\nYou brace yourself, waiting for the pirates' inevitable arrival. Your pilfered sword is heavy, though, and the point droops more and more toward the deck the longer you wait. It seems the academic life hasn't prepared you to hold yourself poised for action for very long.\n\nThe cannons aboard the [i]Relentless[/i] fire, and the [i]Albatross[/i] answers. The deck quakes under you as your ship is struck. You reel as the [i]Albatross[/i] wallows to one side, and then the pirates are aboard with you. Metal rings against metal; the fighting whirls toward you.\n\nYou find yourself face to face with a pirate. She's a gangly lass with unruly dark hair and a grin as wide as the sea itself. She launches herself at you with a flurry of slashing blows from her cutlass.\n\n\n*if persistence \u003c 45\n\tSomehow—you really have no idea how—your untrained reactions throw her off her game. You stumble forward when she expects you to dodge; you slash when she clearly expects you to parry. She laughs aloud with unbridled glee at the surprise. \"You're fun!\" Then she lowers her cutlass. \"Too bad the fighting is over, huh?\" You glance around to see that she's right. \n\n\t\"I haven't had such a good time in ages!\" she says. \"Just for that, I think you've earned a favor. What is it they call it? A boon?\"\n\t*set credibility %+5\n\t*goto boon\n\n\t\n*else\n\tYou put forth your best effort, lunging wildly hither and yon. You swing wide, burying the edge of your blade in a mast. You struggle to wrench it out again, expecting the sting of the pirate's cutlass at any moment. When you free your weapon, you turn to find her doubled over, tears streaming from her eyes. \"The way you—and then you—did you seriously think—\" She catches her breath. Then she looks at you and is overcome by fresh peals of laughter.\n\n\t\"And the look on your face, so—so—so serious!\" Eventually she gets control of herself, and signals her crew to collect you and take you aboard the [i]Relentless[/i] with the rest of the prisoners. \n\t*set credibility %-10\n\t*goto sandoval_lucy_throwdown\n\t\n\n*label boon\n*set sandoval %-10\nThe dark-haired girl reaches forward and pumps your hand in a vigorous shake. \"Name's Lucy Smokeheart, and this is my ship. Well, that other ship is my ship, if you're picky. Though I guess this one is mine now, too! Hah!\" She surveys her crew, busy herding the prisoners into a sorry, bruised huddle on the main deck of the [i]Relentless[/i]. \"You must be a passenger, right? Sailors don't dress like…that. What are you, some sort of student or something?\"\n\nYou nod numbly.\n\nShe flashes her grin at you again. \"So make a wish, smart stuff.\"\n\nIt takes you a moment to follow her, but you're about nine-sixteenths sure she's making you a generous, if somewhat vague, offer. So what's it going to be? What will you ask her for?\n\n*choice\n\t#Tell her I want to make it to Broken Shell Island.\t\t\n\t\tLucy nods amiably. \"I think I can make that happen. Mordecai! Pudding! We've got one for the road.\"\n\t\t*goto cast_adrift\n\n\t#Ask for all of us to be let go and not, you know, robbed.\n\t\t*if (rigor \u003c 45)\n\t\t\t*set sandoval %+20\n\t\t\t*goto lucy_impressed\n\t\t*else\n\t\t\t*goto lucy_mad\n\t\t\n\t#Information. Maybe she can help me prove mermaids are real.\n\t\t*goto lucy_mermaid_denial\n\n\t*if (persistence \u003c 40) #A rain check. This favor might be worth more later on.\n\t\t\"Owe me one,\" you say, boldly. \n\t\t*set credibility %+15\n\t\t*goto lucy_impressed\n\t\n\t*if (armwrestling = true) #Tell her about Mr. Fontana's arm wrestling bet.\n\t\t*goto lucy_fontana\n\n\n\n*label fists\nYou do a bit of shadowboxing by way of warm-up, waiting for the pirates to come and board the [i]Albatross[/i]. Though come to think of it, that's assuming things will take a terrible turn for the worse, isn't it? And yet a turn for the worse things do, in fact, take.\n*if bloodloss = 0\n\tYou are no trained pugilist, nor are fisticuffs an area of especial study of yours, since they have no marinological relevance whatsoever. Still, you acquit yourself brilliantly, ducking and jabbing and somehow managing to not just avoid being seriously injured your own self, but also to strike a pretty solid wallop at pirates once or twice, and in anatomical regions you have been led to believe are best to aim for, strategically speaking.\n\n\tIn the end, alas, the pirates' numbers are too much for you to hold them off on your own. An enormous hand grabs you by the scruff of your neck and hauls you off the deck. A giant red-bearded pirate examines you with interest. \"Spunky one, aren't you?\" he says, clearly impressed. \"Brave, given how completely worthless you are at fighting. I think the Captain's going to want to talk to you!\"\n\n\tHe ushers you into the presence of a slight girl with a choppy head of curls and no boots and tells her about your initiative. She laughs aloud with unbridled glee at the story. \"You're funny!\" she tells you. \"Just for that, I think you've earned a favor. What is it they call it? A boon?\"\n\t*goto boon\n\n*else \n\tYou make a fine go of it, but you are no pugilist, and you are far from fresh. Exhaustion from your earlier injury catches up with you quickly, and you find yourself growing dizzy from this unaccustomed level of physical exertion. The life of a scholar has not kept you in the peak of physical fitness, alas. The deck swirls beneath your feet. Or perhaps, since you're on a moving deck, it stands unexpectedly still. You fall to the ground, the pounding of combat fading slowly away.\n\n\tWhen you come to your senses, you find yourself corralled with the crew of the [i]Albatross[/i] on the deck of the pirate ship. Off the bow, you can see your former ship slowly sinking into the depths. So much for fighting off the pirates.\n\t*goto captured\n\n\n*label boarded\nPirates begin to flood aboard the [i]Albatross[/i], swinging over on ropes and cobbling together makeshift gangways. One climbs into the rigging, brandishing a cutlass. \"Get their captain!\" she shouts. \"And get everyone onto the [i]Relentless[/i], she's going down!\"\n\nYou squint to try to get a better look. That can't be their captain, can it? Captain Lucy Smokeheart? There's no time to think about it—you find yourself corralled and taken aboard the [i]Relentless[/i].\n*goto captured\n\n*label lucy_intro\n\nThe pirate captain's eyes fall on you. \"Well, well, what do we have here?\" She swings down and lands lightly in front of you. \"You're no sailor,\" she says. \"Passenger, right? Where are you headed?\"\n\nBefore you can answer, though,\n*goto sandoval_lucy_throwdown\n\n*label ship_sunk\nYou leave your hiding spot, chased by the rising waters. The [i]Albatross[/i] is going down—and the only safe spot, it appears, is the enemy ship. Still, some chance is better than none.\n\n*if swimming > 2\n\n\tYou cut through the water and pull yourself aboard the [i]Relentless[/i] swiftly and safely.\n\n\tWell, as safe as you can be, considering you're now standing on the deck of an infamous pirate ship, dripping wet, unarmed and uninvited. It doesn't take long for the pirates to notice you. A stout Irish lad looks you over, and tuts unhappily. \"What have we here?\" he says. \"You're going to make the brass tarnish, get away from there!\" He ushers you away from the rail and toward the main deck, where the crew of the [i]Albatross[/i] have been corralled. Or more accurately, taken prisoner. Just like you.\n\t*goto captured\n\n*else\n\t*set bloodloss +1\n\tYou thrash your way toward the [i]Relentless[/i] as best you can. You bob along, struggling to keep your head above water. A timber from the [i]Albatross[/i] strikes you on the head. Stars burst in your skull, and for a moment you lose your bearings entirely. The water closes over you.\n\n\tA strong hand reaches down and grabs you by the collar. He's a giant of a man, red-bearded, sunburned, and grinning like a lunatic. \"Got another one, Captain!\" he calls to the ship. He looks you up and down. \"Aren't you a curious thing,\" he says. \"Little mousey that thinks it's a fish. Captain's going to want to speak to you, I think!\"\n\n\tHe ushers you into the presence of a slight girl with a choppy head of curls and no boots.\n\t\n\t*goto boon\n\n\n*label lucy_mad\n\n\"What kind of pirate do you take me for?\" Lucy scowls and stamps her foot like a petulant child. \"Honestly! You can't expect me to maintain a halfway decent reputation as a pirate if I just let people go around doing things like that willy-nilly! And the third rule of pirating, you know, is that reputation is everything.\"\n*goto walk_the_plank\n\n\n*label lucy_impressed\n\nShe crosses her arms and examines you with an extremely unsettling amount of curiosity, given that she is a notorious pirate captain and holds the power of life and death over you. \"You're an interesting character, aren't you?\" she says. \"I mean, I can't do that, but you know what? I like your style. I tell you what. I'll let you go. But…just you.\"\n*goto cast_adrift\n\n\n*label sandoval_lucy_throwdown\nSandoval appears at your side. \"You!\" Sandoval hisses. He scrambles toward the pirate captain and throws a punch at her. It swings wide; she doesn't even have to duck to avoid being hit.\n\n\"Oh, fancy meeting you here,\" Lucy says. \"What's new?\"\n\nSandoval is still winding himself up. \"You! [i]You[/i]! You destroyed my life!\"\n\nShe frowns at him. \"Sorry, I can't quite—I mean, I meet a lot of people. No offense, but can you refresh my memory?\"\n\n\"Everything I had is gone! My beloved! My study! All of my years of research, gone because of you! The [i]mermaids[/i]—\"\n\n\"Oh right,\" Lucy says. \"That. Well, it happens. Nothing personal, you know? All in a day's work.\"\n\n\"Nothing personal. Nothing…personal!\" Sandoval has gradually turned a fascinating and entirely unnatural shade of purple, with some light mottling of red around the ears and neck. Might be time for you to step in.\n\n*choice\n\t#\"What are you arguing about?\"\n\t\tSandoval sniffs. \"Lucy Smokeheart, famous enemy to science! I had been observing the mermaids for years, and she burned all of my notes! Every scrap! This terrible troublemaker ruined my life's work! And she is the one who destroyed my Madame LeJeunesse's faith in me, saying I had stolen a jewel to give her from—from—\"\n\n\t\tAs he speaks, Sandoval turns several colors, each hue more alarming than the last.\n\n\t\t\"I don't have to listen to this,\" Lucy says, rolling her eyes. \n\t\t*goto walk_the_plank \n\t#\"Captain Smokeheart, I think you owe this man an apology.\"\n\t\t*set sandoval %+10\n\t\t*set rigor %-15\n\t\t\"An—\" she gapes at you open-mouthed. \"Are you kidding? I'm the pirate here, and if you haven't noticed, my people are the ones with all the swords and, uh, axes, and the ones in control of the ship you happen to be aboard at this very moment. You probably don't want to take that tone with me just now.\"\n\n\t\tSandoval claps you on the back. \"She does owe me an apology, and I won't give up until I receive it! Destroyer of lives! Homewrecker! Enemy of science! Purveyor of—\"\n\n\t\tLucy rolls her eyes and turns away. \"I really don't have time for this,\" she says. \"Make them walk the plank.\"\n\t\t*goto walk_the_plank\n\t#\"Sandoval, are you mad?! These pirates will kill us all!\"\n\t\t*set sandoval %-10\n\t\tLucy preens. \"I don't know that we'd [i]kill[/i] you all,\" she says. \"It's tough to get blood out of the wood grain once it gets onto the decks, and anyway murder is bad for morale. Ransom, on the other hand…\"\n\n\t\tHer round Irish crewman says something to her, so low you can't hear. Her eyes narrow. \"Oh, I see,\" she murmurs. \"Pudding here says that we don't have enough food to keep all of you for ransom. Which means we have to get rid of a few of you.\" She looks at you and sighs. \"Listen, I'll let you go,\" she says, \"but you have to swear to me that you'll make something up about how horrible we were, and how lucky you are to have lived to tell the tale. Pinky swear?\"\n\n\t\t\"I swear it,\" you say, wide-eyed.\n\n\t\t\"Right then.\" Lucy grins at you, then turns back to her crew. \"Ready the boat!\"\n\t\t*goto cast_adrift\n\t*if (persistence \u003c 45) #\"Captain Smokeheart, forgive my traveling companion. He lacks a sense of timing.\" \n\t\t*set sandoval %-5\n\t\t*set persistence %-10\n\t\tLucy grins. \"Yeah, come to think of it, I remember that about him. You know, you're not so bad! I think…I think I'm going to cut you a break. You have it hard enough, having to deal with this guy all the time, so who am I to make it worse for you?\"\n\n\t\t\"Cut me a break?\" You don't quite follow her at first.\n\n\t\tShe winks at you, then turns to her crew. \"Ready the boat!\" she shouts.\n\t\t*goto cast_adrift\n\t#Ask her about mermaids!\n\t\t*set rigor %+10\n\t\t*set persistence %+5\n\t\tPerhaps a quick change of subject will save the day. \"Captain Smokeheart, is it true,\" you ask, \"what they say about you? That you are a friend to mermaids?\"\n\t\t*goto lucy_mermaid_denial\n\n*label lucy_mermaid_denial\n\n\"I don't know what you're talking about,\" Lucy says sweetly. \"Everyone knows there's no such thing as mermaids!\"\n\nHer crew laugh uproariously at this.\n\nShe eyes you carefully. \"Actually, if any mermaids do exist—and there's absolutely no sign that they do—maybe they don't want to be disturbed. Even if they did exist—which they completely don't!—perhaps there's a reason they've been so elusive over the years.\" She clears her throat. \"I'm just saying, there's no such thing as mermaids, and anyway, if there were, they certainly don't want to be found.\"\n\n*choice\n\t#\"But they exist, I'm sure of it!\"\n\t\t*set credibility %-10\n\t\t*set sandoval %+5\n\t\tShe sniggers. \"Sure, and I'm completely convinced that there are fairies living in my ship's bell. Which there are not,\" she adds hastily. \"Don't go around repeating it, that's how rumors get started.\" She softens a little. \"Listen, it's not your fault you got mixed up in this,\" she says. \"If you were rich or important I'd have to hold on to you, but seeing as you're not, I think…I think I'm going to cut you a break.\"\n\n\t\tBefore you can ask what she means, she turns away. \"Ready the boat!\" she calls.\n\t\t*goto cast_adrift\n\t#\"You're right. I'm sorry, just a passing fancy.\"\n\t\tShe nods, mollified from your apology. \"You're not such a bad sort,\" she says. She hesitates. \"Listen, I don't ordinarily do this sort of thing, and if word got out my reputation would…well, let's just say if word gets out I'll come and find you. But I think I'm going to cut you a break.\"\n\t\t*goto cast_adrift\n\t#\"But everyone knows about your friendship with mermaids!\"\n\t\t*set rigor %-10\n\t\tLucy makes a weird choking noise at the back of her throat. \"Everyone knows the King of Spain is tumbled over in love with me, too,\" she snaps, \"and that I'm nine feet tall and eat gold doubloons for breakfast. You don't believe everything you hear, do you?\"\n\t\t*goto walk_the_plank\n\t*if (evidence > 0) #\"But they do exist, and I have proof!\"\n\t\tHer eyes darken. Or maybe that's just the sun setting. Either way, she is definitely very, very angry with you now. \"Don't be ridiculous,\" she snaps. \n\t\t*set credibility %+10\n\t\t*goto walk_the_plank\n\n\t*if (rigor > 60) #\"How would you know mermaids don't want to be found if they don't exist?\"\n\t\t*if persistence > 60\n\t\t\tHer eyes narrow dangerously, but any intimidating effect is ruined when she doubles over laughing. \"Good one, good one! You know what? I like you. Hey Pudding, wake up Slow Morris and tell him to make some tea!\"\n\t\t\t*goto lucy_tea\n\t\t*else\n\t\t\tShe rolls her eyes. \"A philosopher, are you?\"\n\t\t\t*set credibility %+15\n\t\t\t*goto walk_the_plank\n\t*if (armwrestling = true) #\"I have a challenge for you from Mr. Fontana. Do you know him?\"\n\t\t*goto lucy_fontana\n\t*if (rigor \u003c 40) #\"I don't expect to find mermaids. We're just…humoring certain parties.\"\n\t\tYou flick a significant glance toward Sandoval, and Lucy instantly follows what you're getting at. \"Oh, of course, of course!\" she says. She hesitates. \"Listen, you don't seem like the bad sort, and I am awfully fond of the cause of science—and anything that might annoy people like him.\" She waves at Sandoval. \"So you know what? I'm going to be super nice and send you on your merry way.\"\n\n\t\tBy \"on your merry way,\" it turns out she means \"cast adrift on the ocean in a boat.\" It's…a chance, maybe? At the very least, it seems less worse than any other choices you have available to you just at the moment.\n\t\t*set persistence %-20\n\t\t*goto cast_adrift\n\n\n*label lucy_fontana\n*set sandoval %-10\n\n\"Arm wrestling?\" Lucy straightens, a bright gleam in her eye. \"You know Fontana, do you?\"\n\n*choice\n\t*if (patron = \"fontana\") #\"He's my patron at the Royal German Marinological Society. He wants to challenge you to an arm wrestling match!\"\n\t\t*set patron_favor %+10\n\t\tLucy punches you in the shoulder. \"No way! He's taking on chumps like you these days?\" While you're trying to work out what she means by that exactly, she smiles broadly and signals to one of her crew. \"Come on, I think we should have a little chat.\"\n\t\t*goto lucy_tea\n\t#\"Indeed, and I overheard a very interesting wager about you…\"\n\t\tYou describe to her the details of your encounter with Mr. Fontana before your hearing at the Royal German Marinological Society.\n\n\t\t\"I tell you what,\" she says, her eyes glowing in the deepening twilight. \"You and me arm wrestle, and then when you see Fontana again, you wrestle him, and then…\" she frowns. \"Wait, would that even work? Come on, let's think it over.\" She signals to one of her crew. \"Let's sit down and work this out.\"\n\t\t*if patron = \"fontana\"\n\t\t\t*set patron_favor %+10\n\t\t\t*goto lucy_tea\n\t\t*else\n\t\t\t*goto lucy_tea\n\t\n\t#\"I'll tell you if you let me go.\"\n\t\t*if persistence > 50\n\t\t\tShe hesitates, then her face splits into an enormous grin. \"I like your style!\" She claps you on the back. \"Let's talk it out.\"\n\t\t\t*goto lucy_tea\n\t\t*else\n\t\t\tYour feeble attempt at bargaining goes poorly for you. Lucy scowls. \"Oh, is that how you're going to be? And just when I thought we might be friendly.\"\n\t\t\t*goto walk_the_plank\n\t# \"Indeed. But really…just between you and me…mermaids?\"\n\t\tLucy scowls. \"Oh, is that how you're going to be? And just when I thought we might be friendly.\"\n\t\t*set rigor %+10\n\t\t*set sandoval %+5\n\t\t*goto walk_the_plank\n\n*label lucy_tea\n\nWhat follows are, you think, some of the strangest hours you've ever passed in your life, and that includes that one time where you almost drowned and met a mermaid. Or thought you did. \n\nWhat happens is this: the legendary pirate Captain Lucy Smokeheart invites you for tea in her private cabin.\n\n*if patron = \"fontana\"\n\t\"Yeah, I know Fontana! What a riot that guy is,\" she laughs. \"I ran into him for the first time a long, looooooooong time ago—not long after I first started out in the pirating business, captaining the [i]Relentless[/i]. He was very helpful. He gave me a special annotated edition of [i]Bourne's Rules for Piracy[/i], the book I live by!\" She thumps at a slim red bound volume on the table. \"We had some good times together, Fontana and me. Did he ever tell you about the ruins in the Peruvian jungle? That curse? Or the time we got lost and wound up in a town inhabited by talking cactuses?\"\n*if patron != \"fontana\"\n\t\"If you're from the Royal German Marinological Society, did you ever meet Fontana? What a riot that guy is!\" she laughs. \"I ran into him a long, looooooooong time ago—when I first started out in the pirating business, captaining the [i]Relentless[/i]. He was very helpful. He gave me a special annotated edition of [i]Bourne's Rules for Piracy[/i], the book I live by!\" She thumps at a slim red bound volume on the table. \"We had some good times together, Fontana and me. Did you ever read what he had to say about those ruins in the Peruvian jungle? That curse? Or the time we got lost and wound up in a town inhabited by talking cactuses?\"\n\nThe stout Irish lad, Pudding, bustles in with a tray of piping hot tea, frosted cookies shaped like skulls and crossbones, and little sandwiches filled with watercress and cream cheese. All of it is delicious. All the while, she regales you with tales of Fontana, at least half of which cannot possibly be true.\n\nAt last, Lucy smiles at you apologetically. \"Listen, I'm afraid we can't take you to Broken Shell Island,\" she said. \"Ships to rob, crews to ransom, you know how it is. But we can send you on your way, at least, instead of delaying you any more than this. Sorry for all the bother!\"\n*goto cast_adrift\n\n*label walk_the_plank\n*set bloodloss + 1\n\nLucy's jaw sets in determination. \"I think that's about enough. Let's get on with the plank walking part of today!\" She waves at Sandoval. \"That guy first.\" He bellows with rage as the pirates prod him toward his destiny, but in the end he succumbs to the inevitable. He topples over the edge of the ship and out of sight.\n\nAnd then it's your turn. The pirates haul you to a rough plank leading out over the churning sea. The red-bearded pirate prods you with the haft of his axe. \"Go on, then,\" he says kindly, \"better to just get it over with, mate. Like pulling gum out of your hair.\"\n\n\"No hard feelings,\" Lucy calls. Right. \n\nRight.\n\nYou step carefully to the very end of the plank and look down. There's no sign of Sandoval.\n\n*if swim_practice = true\n\tYou recollect your earlier swimming excursion—and the shark you met there. You see no fins just at the moment, but you know better than to think that means there are no sharks waiting in the depths below. So this is how it's going to be, eh? \n\n\tAt least it'll probably be fast. Compared to dying of consumption, at any rate, or defending your dissertation. You look one last time over your shoulder toward the pirates. The red-bearded pirate gives you an encouraging nod. You leap.\n\n\t*page_break\n\tThere are no sharks. You tread water for a few minutes, braced for the inevitable chomp of death. After a while, you realize that perhaps the sharks aren't nearby. So maybe you'll drown instead. So much for fast.\n\n\tOr maybe you should swim. There's not a lot out here, but a tiny chance is better than no chance at all. \n\n\tYou swim. \n\t*goto postplank\n\n\n*elseif swimming > 2\n\tYour only hope of survival is to try to make it to Broken Shell Island—or another island, if one happens to be in the way. You were sailing southwest, last you knew. You judge the angle of the sun, the time of day, the bearing of the slowly sinking [i]Albatross[/i]. It's a long shot, but it's the only shot you have. You nod politely to your audience, then dive into the water in a graceful arc. \n\n\tThe water is cold, and the salt stings your eyes for a moment. But you get your bearings again almost immediately, and then you kick off your shoes and begin to propel yourself toward what you hope is your destination.\n\n\t*goto postplank\n\n\n*else\n\tIf only you were a stronger swimmer—if only you had practiced harder—but no. You push those thoughts from your head. Hindsight isn't going to help you now, is it? And your fate isn't your fault because you're not a better swimmer, it's the pirates' fault for making you walk the plank in the first place! Stupid pirates. You shoot them a dirty look over your shoulder.\n\n\t\"Go on, then.\" The red-bearded pirate repeats. You waver at the very edge of the plank. Maybe you should plead for forgiveness—maybe you can make them change their minds—maybe you can—\n\n\tThe ship rocks under your feet and you tumble into the water unprepared. You thrash against the water, finding the surface again. But it's a struggle to stay there.\n\t*goto postplank\n\n\n*label postplank\n\nIn the end, no matter how strong a swimmer you were, nothing would have prepared you for this. Not really. Your arms grow heavy, your legs grow weak at the effort of keeping your head above the water, much less making progress toward…somewhere. The [i]Relentless[/i] is out of sight already, though you couldn't say if it's over the horizon or just over the next wave. \n\nThe sun goes down and the stars shine bright. In your frantic struggle to keep going, to not just slide into the blackness under your feet, you lose yourself in a haze of adrenaline and fatigue. Later, you recall only a series of razor-sharp sensory impressions: The sun smeared across the edge of the sea. The rasp of your wet cuff against your wrist. The tang of salt at the back of your throat. \n\nAnd then a flash of bright scales, a strong grip under your arms. Resting your head on something rough-textured and hard. There is a sense of flying across the ocean, faster than you could ever have swum yourself. Then sand under your knees. You lean on your elbows, panting.\n\nEventually you surge to your feet. You're not sure if this is Broken Shell, but you have definitely arrived at an island of some sort. There is salt in your mouth, sand in your shoes, and is that—is that seaweed in your undergarments? Ew. Ew ew ew. The surf hisses at your toes. There is a piece of driftwood here. Tangled in one fork is a knot of bright green hair; on the other end of the gnarled branch, you discover Sandoval, fast asleep.\n\nThe mermaids—they found you, and they saved you. Or…one of them did. You stare out at the moonlit ocean, but the mermaid is gone now.\n\n*set evidence +1\n*set moonlit true\n\n\n*finish\n\n*label cast_adrift\n*set cast_adrift true\n*set persistence %-10\n\nThe pirates ready a boat for you, though you can't quite make out what supplies they're giving you. The sun has set, and the lanterns they use don't shed enough light for you to see by. The Irish lad hands you a gorgeously drawn map, with some reluctance. \"Don't know how well you can navigate a boat, but you're in luck. Just stick to the currents and you should make it to land just fine.\" He places a loving finger on the paper. \"Keep it dry,\" he says, wistfully.\n\nThey set the boat on the water, and then you clamber your way down a rope ladder by lantern light. You can feel the resentment of the assembled crew of the [i]Albatross[/i] behind you, or you think you can, and it makes you lose your footing. You tumble into the waiting boat. \n\nLucy grins at you one last time. \"It's been a good time,\" she calls. \"Good luck with whatever it is you're doing out here!\" One of her pirates unties the rope holding you to the [i]Relentless[/i], and then you're free, adrift all alone on the endless ocean.\n\n*page_break\n\nFor several seconds, anyway. A dark figure rockets over the side of the [i]Relentless[/i] and lands in the water close by. You are deluged from the splash, and your boat sets to wildly rocking. A hand grasps the side of the boat, and then someone crawls in, nearly tipping you over in the process. \n\nIt's Sandoval. Of course. You stare up onto the deck of the pirate ship, wondering if they'll take you back to recapture him—you might not get away so cleanly a second time—but no alarm is sounded, no feet come pounding. Basically, nobody seems to care that Sandoval is getting away with you.\n\n\"Sweet freedom!\" he whispers. So that's something.\n\nHe rummages through the supplies the pirates gave you. There's the map, of course your own supplies provided by the Society, and a picnic basket filled with delights such as deviled eggs, fried chicken, cherry pie, strawberries dipped in chocolate. Sandoval digs in immediately and with a minimum of proper table etiquette, leaving it to you to wonder how it is a pirate ship can make fried chicken at sea, and where precisely those perfect strawberries came from. A mystery for the ages, you decide.\n\nThis time, Sandoval doesn't seem interested in talking. Once he finishes his repast, he falls into a deep and extremely loud sleep. You drift slowly under the stars, kept awake by his snoring, and wonder what will become of you. Eventually, you too doze off. Your sleep is troubled by cannon smoke and laughing pirates.\n\nAnd then, by the light of dawn, the bottom of the boat slides across sand and seaweed, and you discover that you have struck land. \n*finish", "4_island": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]The Daring Mermaid Expedition[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n*temp javelgenderizer 0\n*rand javelgenderizer 1 2\n*if javelgenderizer = 1\n\t*set javel_sex \"boy\"\n\t*set javel_pronoun \"he\"\n\t*set javel_poss \"his\"\n\t*goto dawn\n*if javelgenderizer = 2\n\t*set javel_sex \"girl\"\n\t*set javel_pronoun \"she\"\n\t*set javel_poss \"her\"\n\t*goto dawn\n*else\n\t*bug No gender for Javel! Oh noes!\n\n*label dawn\n\nDawn has broken, bright and clear. You're on a beach, but you'd be hard-pressed to identify precisely which beach; it's not as if there's a helpful sign. Sandoval sprawls on the sand beside you. His snoring could wake the dead, yet somehow he remains steadfastly asleep. Further inland lies a verdant snarl of jungle, probably teeming with snakes, insects, and other things fond of biting tender, intellectual flesh such as your own. There's no sign of the [i]Albatross[/i], nor of the pirates. \n\nOther things there are no sign of include fresh water, fresh clothing, food of any variety (fresh or otherwise), or indeed any sign that the place you've landed is fit for human habitation, much less actually inhabited.\n\nThere inevitably comes a moment in every scholar's career when they wind up stranded on a deserted island. Simply a hazard of the trade. It looks like this is your moment to prove you're made of the stuff of the Royal German Marinological Society. What to do, what to do?\n\n*choice\n\t#Wake up Sandoval.\n\t\tGood idea. Sandoval might not be the most, ah, collected individual you've ever met, but this is his part of the world—you hope—and anyway, he's the only help you've got. Perhaps together you can work out where you are and formulate a plan.\n\n\t\tYou tap his shoulder and call his name, but his snores only deepen, if anything. You shake him gently, then a little less gently. It grows increasingly difficult to believe that he hasn't woken himself up, given the increasing volume of his nasal reverberations. You begin to contemplate slapping him, or finding a way to convey water to dump on his face.\n\n\t\tSuddenly a high, clear voice comes from behind you. \"Whatcha doing?\"\n\t\t*goto javel\n\t#Try to make a smoke signal.\n\t\tYou can't see any sign of civilization from here, and it would be foolhardy to plunge into the jungle to go looking. But perhaps if there are any people close by, you can bring them to you!\n\n\t\tYou gather a few sticks of dried-out driftwood and arrange them in a pile. Good progress! Then you realize you have no ready means to light a fire. Ah, well, friction, right? You've read about the technique before. It's a common element in the adventures you've been reading since you were a small child. How hard can it be? You begin to furiously rub two twigs together.\n\t\n\t\tYour efforts result in basically nothing happening. Well, almost nothing. You do give yourself a splinter. But there is no flame, no spark, not even a trickle of smoke. At least there's nobody to witness your embarrassing failure at survivalism.\n\n\t\tOr so you thought. A high, clear laugh comes from behind you. \"Whatcha doing?\"\n\t\t*goto javel\n\t#Look for food and water.\n\t\tYou won't last long without sustenance, so your first order of business should be to make sure you're not going to perish of thirst or hunger. You approach the jungle with trepidation. There's no telling what you might find in there! You pause and sort through what you recall from reading about the adventures of Royal German Marinological Scholars before you. If you can find coconuts, the water in them could slake your thirst. But do coconuts grow in the jungle, or along the beach?\n\n\t\tThere's a tree here that looks a little like a coconut tree, you think. But the fruit growing on it is enormous and green, not the brown, hairy nuts you would expect. You give the tree a tentative shake anyway, then stumble back as a fruit comes tumbling down, narrowly missing your head.\n\n\t\tA high, clear voice comes from behind you. \"Whatcha doing?\"\n\t\t*goto javel\n\n\n*label javel\n\nYou whirl around, startled out of your skin, and find yourself regarding a small ${javel_sex} of indeterminate age. The child stares at you, wide-eyed. \"Who are you?\"\n\nA rush of relief washes over you, leaving you weak-kneed and trembling. If there's a child here, you're not hopelessly stranded after all! You wonder if this is some sort of record for the shortest amount of time a scholar has been stranded on a desert isle.\n\nThe important thing, though, is to make the most of this opportunity, or you could still find yourself stranded after all. How best to enlist ${javel_poss} aid?\n\n*choice\n\t#Promise the child a reward for helping me.\n\t\tYou brush the sand off your clothes as best you can and draw yourself up to your fullest height, in order to look as impressive as possible. \"Hello, little one! I'm a scholar on an important job for the Royal German Marinological Society.\" You pause to make sure the child is following you; ${javel_pronoun} nods cautiously. \"Is there a village nearby? A port, or a boat? Take me to it and I'll make sure you're well rewarded by the Society.\"\n\t\t\n\t\t*if credibility > 50\n\t\t\tThe child's eyes gleam with interest. \"What kind of a reward?\"\n\n\t\t\tYou spread your hands wide. \"Money, I suppose. You could buy candy with it! Or toys! Or—maybe you like books? A pet monkey? Anything you choose!\"\n\t\t\t*set javel %+10\n\t\t\t*goto fetching_like\n\t\t\n\t\t*else\n\t\t\tThe child gazes dubiously upon your salt-caked and wrinkled clothing. \"You don't look like a scholar to me.\"\n\n\t\t\tOuch—and worse because it's true. Technically, you're not a Royal German Marinological Scholar yet. But how could ${javel_pronoun} possibly know that? You raise your chin. \"I assure you, I am on an important mission for the Society.\"\n\t\t\t*set javel %-10\n\t\t\t*goto fetching_dislike\n\n\t#I need to know more to act. Try to get information.\n\t\t\t\t\n\t\t*if rigor > 50\n\t\t\tYou assess the strange child in front of you, hoping to gather some clue that might help you decide how to best approach this conversation. The ${javel_sex} is dark-skinned and clad in a brightly printed garment. A native islander, then? And ${javel_pronoun} looks well-fed and well-groomed, so there must be a loving family somewhere close. \n\n\t\t\tYou crouch down and smile encouragingly. \"I'm afraid I need a little help. Can you take me to your family? Is your village nearby?\"\n\n\t\t\t*set javel %+10\n\t\t\t*goto fetching_like\t\t\t\n\n\t\t*else\n\t\t\tAn avalanche of questions tumbles from your mouth. \"Who are you? And where is this place? Are there other people close by? A village, a town, a port? can you help me get back to civilization?\" \n\n\t\t\tThe child winces at your onslaught of questions, then sticks out ${javel_poss} chin. \"I asked you first! And my mama always told me not to talk to strangers.\"\n\n\t\t\t\"But you talked to me first!\" you protest.\n\n\t\t\t*set javel %-10\n\t\t\t*goto fetching_dislike\n\t\n\n\t#I'm good with children, I'll just be friendly!\n\t\tYou squat down and smile in as encouraging and friendly a fashion as you can. \"Hi, my name is ${firstname}. What's your name?\"\n\n\t\t*if rigor \u003c 50\n\t\t\tThe child smiles back, with slightly too many teeth. \"I'm Javel.\"\n\n\t\t\tYou smile in as cheery and nonthreatening a fashion as possible. \"I'm in a bit of a pickle, here! Do you think you could help me out?\"\n\n\t\t\tThe child's teeth gleam. That smile is awfully…predatory. \"If I wanted to.\"\n\n\t\t\tUm. \"Do you…want to? I would really appreciate it…\"\n\n\t\t\t*set javel %+20\n\t\t\t*goto fetching_like\n\t\t\n\t\t*else\n\t\t\tThe child backs away out of reach, scowling. \"My mama taught me not to speak to strangers,\" ${javel_pronoun} says. \n\n\t\t\t\"But you're the one who started talking to me first!\"\n\n\t\t\t\"You trying to get me in trouble?\" So much for being good with children.\n\n\t\t\t*set javel %-20\n\t\t\t*goto fetching_dislike\n\n*label fetching_dislike\n\nThe child gazes at you for a moment longer, dark eyes gleaming with something suspiciously like scorn. \"I guess Madame should know about you,\" ${javel_pronoun} sighs at last. \"Stay here, and I'll be right back.\" Then ${javel_pronoun} scampers away into what you could have sworn was impenetrable jungle.\n\nWell. That was certainly…odd.\n*page_break\n\n*goto madame_intro\n\n*label fetching_like\n\nThe child laughs. \"You're funny,\" ${javel_pronoun} says. \"Wait here, I'll go get Madame for you. Hang on, I'll be right back.\" Then ${javel_pronoun} scampers away into what you could have sworn was impenetrable jungle.\n\nHuh. So that happened.\n*page_break\n\n*label madame_intro\n\nThe child returns after only a short time, and ${javel_pronoun} is not alone. This \"Madame\" is a woman, majestic in stature, with an elaborate coiffure and a dress far more fashionable than you'd ever have expected to find in this part of the world. Looks like civilization hadn't been far away after all.\n\nThe woman doesn't walk toward you so much as she sails, her corset creaking like a schooner in a squall. \"Well, well, Javel was right. There is a stranger washed upon our shores,\" she intones. \"What brings you here?\" \n\nThat's when she spies Sandoval, still miraculously sleeping. She shrieks with rage and falls upon him, shaking him awake like a meaty waterwheel. Sandoval finally awakens with one last mighty snort.\n\n\"You!\" the lady screams. \"What do you have to say for yourself?\" Her voice could cut glass. Maybe diamonds.\n\n\"Hellion! Get away from me!\" Sandoval retorts, straining to lift her weight off his back. And then, you're not sure how, the pair fall into outright brawling. Fists fly! Garments are torn! Sand is thrown into the air!\n\nIt would seem that these two, ah, know each other. How to handle this?\n\n*fake_choice\n\t#Defend Sandoval.\n\t\t*set sandoval %+15\n\t\t*set madame %-15\n\t\t*set rigor %-15\n\t\tSandoval is the only known quantity here, and there's no guarantee that this lady won't turn on you as well, once she's done pummeling him. \"Please, stop this madness!\" you cry.  \"There must be a terrible mistake!\" \n\t\n\t\tYou step into the fray and, together with Sandoval, manage to wrestle Madame to the ground only with great difficulty. She glowers at you, corset straining. \"There is no mistake,\" she hisses. \"Let me go!\"\n\n\t\tYou back away. She regains her feet, trembling with rage, but she does not resume her attack.\n\t\t\n\t#Defend the lady.\n\t\t*set sandoval %-15\n\t\t*set madame %+15\n\t\t*set rigor %-15\n\t\tWhatever her grudge against Sandoval may be, you have no doubt he's earned her reproach. You enter the fray and succeed in pinning Sandoval's ear to the ground. The lady surveys the scene with deep satisfaction. \"Thank you for your assistance with this ruffian,\" she tells you. She is more than a little smug.\n\n\t#Try to separate the two.\n\t\t\"S
