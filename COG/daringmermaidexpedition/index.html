on_favor between 45 and 50\n*if ((patron_favor > 50) and (patron_favor \u003c= 55))\n\tpatron_favor between 50 and 55\n*if ((patron_favor > 55) and (patron_favor \u003c= 60))\n\tpatron_favor between 55 and 60\n*if ((patron_favor > 60) and (patron_favor \u003c= 65))\n\tpatron_favor between 60 and 65\n*if ((patron_favor > 65) and (patron_favor \u003c= 70))\n\tpatron_favor between 65 and 70\n*if ((patron_favor > 70) and (patron_favor \u003c= 75))\n\tpatron_favor between 70 and 75\n*if ((patron_favor > 75) and (patron_favor \u003c= 80))\n\tpatron_favor between 75 and 80\n*if ((patron_favor > 80) and (patron_favor \u003c= 85))\n\tpatron_favor between 80 and 85\n*if ((patron_favor > 85) and (patron_favor \u003c= 90))\n\tpatron_favor between 85 and 90\n*if ((patron_favor > 90) and (patron_favor \u003c= 95))\n\tpatron_favor between 90 and 95\n*if ((patron_favor > 95) and (patron_favor \u003c= 100))\n\tpatron_favor between 95 and 100\n\n*comment Reputation – loyalty (vs. Independence)\n*if (loyalty \u003c= 5)\n\tloyalty between 0 and 5\n*if ((loyalty > 5) and (loyalty \u003c= 10))\n\tloyalty between 5 and 10\n*if ((loyalty > 10) and (loyalty \u003c= 15))\n\tloyalty between 10 and 15\n*if ((loyalty > 15) and (loyalty \u003c= 20))\n\tloyalty between 15 and 20\n*if ((loyalty > 20) and (loyalty \u003c= 25))\n\tloyalty between 20 and 25\n*if ((loyalty > 25) and (loyalty \u003c= 30))\n\tloyalty between 25 and 30\n*if ((loyalty > 30) and (loyalty \u003c= 35))\n\tloyalty between 30 and 35\n*if ((loyalty > 35) and (loyalty \u003c= 40))\n\tloyalty between 35 and 40\n*if ((loyalty > 40) and (loyalty \u003c= 45))\n\tloyalty between 40 and 45\n*if ((loyalty > 45) and (loyalty \u003c= 50))\n\tloyalty between 45 and 50\n*if ((loyalty > 50) and (loyalty \u003c= 55))\n\tloyalty between 50 and 55\n*if ((loyalty > 55) and (loyalty \u003c= 60))\n\tloyalty between 55 and 60\n*if ((loyalty > 60) and (loyalty \u003c= 65))\n\tloyalty between 60 and 65\n*if ((loyalty > 65) and (loyalty \u003c= 70))\n\tloyalty between 65 and 70\n*if ((loyalty > 70) and (loyalty \u003c= 75))\n\tloyalty between 70 and 75\n*if ((loyalty > 75) and (loyalty \u003c= 80))\n\tloyalty between 75 and 80\n*if ((loyalty > 80) and (loyalty \u003c= 85))\n\tloyalty between 80 and 85\n*if ((loyalty > 85) and (loyalty \u003c= 90))\n\tloyalty between 85 and 90\n*if ((loyalty > 90) and (loyalty \u003c= 95))\n\tloyalty between 90 and 95\n*if ((loyalty > 95) and (loyalty \u003c= 100))\n\tloyalty between 95 and 100", "1_childhood": "*reset\n*temp firstchoice \n*set firstchoice \"nothing\"\n*comment Shamelessly cribbed this idea from the Broadsides codebase. This saves the first choice to use to modify stats after the character-gen choices. \n\n*temp weapon\n*set weapon false\n\n*temp ending \"noending\"\n\nThe Grand Royal Scholar gazes at you coldly from beneath her bushy eyebrows. \"That's impossible,\" she says. \"And any scholar who would make such assertions with nothing to back them up doesn't deserve a position in the Royal German Marinological Society.\" A murmur arises from the assembly—a collection of the most luminous luminaries, noble nobility, the absolute most-schooled scholars the world has ever known. And they're all here to watch you, to see if this moment signals your rise to the top or your shameful disgrace.\n\n\"Ha-[i]hah[/i]! I've got you now!\" you cry. You brandish your journal on high, like a mighty sword. \"You see, my notes prove conclusively that…\"\n\nYou pause for dramatic effect; a few lesser scholars cower at your feet, waiting for you to inflict the final blow. This is your moment of truth. The crucible that will make or break your career. You unleash your final argument.\n\n*choice \n\t#My careful and methodic investigation has given me the answer.\n\t\t\"The professor has perpetrated a hoax upon you all. There was never any such thing as a speckled antelope fish!\"\n\t\t\n\t\tA gasp arises from the assembly, not unlike the sound that Professor Birenhoffel had claimed the speckled antelope fish was known to make. The distinguished scholar is ejected from the crowd, her spectacles askew. \"Lies!\" Birenhoffel pleads. \"Surely you can't believe this upstart against the weight of my accomplishments!\"\n\n\t\tThe Grand Royal Scholar is not persuaded. She turns her attention back to you. \"And you have proof of this?\"\n\n\t\tYou toss your journal onto her podium. \"It's all right here, Your Dispassionance. I double-checked every so-called fact on the fish she's ever published, and none of it adds up. The fish is nothing but a figment of her imagination.\" \n\n\t\tThe Grand Royal Scholar reviews your notes, her mood visibly darkening with every page she turns. At last: \"Begone with you, Birenhoffel, you— you traitor to knowledge!\" she thunders. \"And never let one of your monographs darken my postbox ever again!\"\n\t\t*set firstchoice \"hoax\"\n\t\t*goto induction\n\n\t\t\n\t#My charm and quick thinking have unraveled the truth.\n\t\t\"The professor was conducting an illicit affair with her protégé and is trying to cover up for the boy's misdeeds!\"\n\t\t\n\t\tProfessor Birenhoffel races out from the protection of the crowd. She has turned a blazing red color, very like the hide of the crimson cave shark she discovered fifteen years ago. \"No! I would never—\"\n\n\t\tYou wave a sheaf of documents. \"I have their letters, Your Dispassionance.\" You place them on the podium before her. She leafs through the love notes, grimacing at every overwrought compliment, wincing at each tortured metaphor. It's unclear which pains her more: the misconduct in question, or the terrible prose their love affair spawned.\n\n\t\tAt last, the Grand Royal Scholar glowers at the professor. \"It is only natural for two people working together to grow close,\" she said. \"But madam, you are a married woman! What do you have to say for yourself?\" \n\n\t\t\"I—I—\" the professor is at a loss for words. She looks from one of her colleagues to the next, searching for some scrap of moral support, but finds nothing. She flees the auditorium, unable to face this blow to her reputation.\n\t\t*set firstchoice \"affair\"\n\t\t*goto induction\n\n\t#My persistence and passion have revealed everything to me.\n\t\t\"The professor had ingested the rare and toxic mermaid's fan kelp. She was hallucinating the whole time!\"\n\n\t\tThe assembly breaks into a feverish murmur. The professor's observations had seemed surprising, even unearthly, but her credibility was impeccable. Who would ever have thought to question her findings?\n\n\t\tThe professor herself shoulders forward out of the crowd. \"What! On what basis do you make this wild accusation?\"\n\n\t\tYou give her a sympathetic smile. \"You took passage on the Sunbird, did you not? I stumbled upon a cookbook proving that the cook on that ship has some very…creative recipes. Did you dine upon the coconut cream parfait during your journey?\" You hand her the recipe in question with a flourish.\n\n\t\t\"I did,\" she said. \"Why, it was my very favorite—I ate it every night. Good heavens! And with the delayed effect the chemical has, that means…\" her eyes glaze over, and she wanders from the hall, muttering about the implications and how to reframe her findings as pharmacological research rather than biological.\n\t\t*set firstchoice \"drugged\"\n\t\t*goto induction\n\t\n\t#Thanks to my dogged determination, for once they'll have to believe me!\n\t\t\"The professor doesn't even know how to swim. Clearly someone is framing her for academic misconduct!\"\n\n\t\tThe Grand Royal Scholar frowns. \"Please explain yourself at once.\" \n\n\t\t\"It's obvious, really,\" you say modestly. \"In order to obtain leaves of purple-striped cliff fern to fabricate this so-called hoax, the forger would have had to traverse an underwater tunnel. The plant is found nowhere else. I maintain that one of her rivals fabricated this idol, and sold it to Professor Birenhoffel as the genuine article!\"   \n\n\t\t\"You make a compelling point.\" The Grand Royal Scholar nods slowly. \"I will invoke a full investigation into this affair. Professor Birenhoffel, your sentence is delayed until the truth can be more fully explored.\"\n\n\t\tThe professor emerges from the crowd and shakes your hand heartily. \"Thank you, thank you, young scholar,\" she tells you. \"I'm sure the investigation will prove my innocence. I can never repay you!\"\n\t\t*set firstchoice \"framed\"\n\t\t*goto induction\n\n\n*label induction\n\n\"Well, well.\" The Grand Royal Scholar turns to you. \"And now we must discuss your role in this matter. You've proven to be terribly perceptive, and we all owe you a debt. If you can forgive me, however, the Royal German Marinological Society requires your assistance in another matter. A matter of utmost importance! Are you ready to fulfill your duty?\"\n\nYou nod soberly. Giving your all to the Society is, after all, your very highest calling in life. There is no mission the Grand Royal Scholar could bestow upon you that you would refuse. Such is your dedication to the Society!\n\nShe clears her throat to speak. The assembled delegates hold their breath, waiting to hear what this grave matter might be. And then—\n\n*page_break\n\n\"Hey, I was reading that! Give it back!\" says your Uncle Banjo. He rips [i]The Astonishing Life and Times of a Royal German Marinological Scholar[/i] from your hands. And just at the exciting part, right before you could learn what the Grand Royal Scholar's mission was!  \n\nBanjo retreats back to his hammock on deck and begins to read the book himself. This leaves you with nothing at all to do except stare into the waves and wish you were anywhere but the middle of the ocean.\n\nYour mind turns back to [i]TALATOARGMS[/i]. What a great book! Why, you could easily picture the life of a scholar for yourself! Performing great exploits in exploration, awing the world with the shine of your academic prowess, unraveling the great mysteries of the universe, or at least the ocean…who wouldn't want to be a part of the Society? Nobody. That's who. Nobody at all.\n\nYou are not such a scholar, and absolutely no glory, adventure, knowledge, or reputation belongs to you whatsoever. Right now you're just a bored kid on a boat. But maybe…maybe one day you too could join the Royal German Marinological Society and make a name for yourself. Stranger things have happened!\n\nBut let's talk about you for a bit.\n\n*goto first_name\n\n*label first_name\nWhat's your name, anyway, you promising young scholar, you? Your [i]first[/i] name, that is.\n\n*choice\n\t#Rosamund\n\t\t*set firstname \"Rosamund\"\n\t\t*goto lastname\n\n\t#Hamish\n\t\t*set firstname \"Hamish\"\n\t\t*goto lastname\n\n\t#Greta\n\t\t*set firstname \"Greta\"\n\t\t*goto lastname\n\n\t#Evan\n\t\t*set firstname \"Evan\"\n\t\t*goto lastname\n\n\t#Something completely different.\n\t\tFine, fine, be like that. Go on, what's your name, then?\n\t\t*input_text firstname\n\t\t*goto lastname\n\n*label lastname\n\nYou know, you do look like a ${firstname}, now that you mention it.\n\nAnd what about your family name?\n\n*choice\n\t#Philatelos\n\t\t*set lastname \"Philatelos\"\n\t\t*goto credibility_test\n\t\n\t#de Mournish\n\t\t*set lastname \"de Mournish\"\n\t\t*goto credibility_test\n\n\t#Smith\n\t\t*set lastname \"Smith\"\n\t\t*goto credibility_test\n\n\t#Chan\n\t\t*set lastname \"Chan\"\n\t\t*goto credibility_test\n\n\t#None of those. You'd make a terrible psychic!\n\t\tOh come on, everybody knows there's no such thing as psychics. That's [i]science[/i]! …So what was your last name?\n\t\t*input_text lastname\n\t\t*goto credibility_test\n\n*label rigor_test\n\nTell me, ${firstname}, how do you arrive at the truth of a matter? \n\n*choice\n\t#Ruthless observation of even the most minor detail. \n\t\tAh, a born scientist, are you? Just the sort the Society looks for.\n\t\t*set rigor 80\n\t\t*goto persistence_test\n\n\t#I'm a stickler for academic rigor, but only when it counts.\n\t\tPragmatic of you. One must know where best to marshal one's energies.\n\t\t*set rigor 60\n\t\t*goto persistence_test\n\n\t#I leap to conclusions, but there's always some basis in fact.\n\t\tRight. Sometimes there's simply no time for a lengthy process.\n\t\t*set rigor 40\n\t\t*goto persistence_test\n\n\t#My intuition has never steered me wrong.\n\t\tHow very bold of you! Your strength of conviction is admirable. \n\t\t*set rigor 20\n\t\t*goto persistence_test\n\n\n*label credibility_test\n\nMm-hmm, mm-hmm, I'll just make a note of that right here… \n\nNow let's establish your relationship with the truth. Are you a credible sort, or are you something of a fibber?\n\n*choice\n\t#The truth is so boring most of the time. Who wants to be boring?\n\t\tA lying liar, eh? Well, at least you're honest about…that? Wait.\n\t\t*set credibility 20\n\t\t*goto rigor_test\n\n\t#When I say something, people have been known to double-check behind my back.\n\t\tIt can be terribly hard to lose a bad reputation once you've found one.\n\t\t*set credibility 40\n\t\t*goto rigor_test\n\n\t#I've been caught in a few white lies, but nothing unusual.\n\t\tWho hasn't? You're only human, after all.\n\t\t*set credibility 60\n\t\t*goto rigor_test\n\n\t#Nothing but the sterling truth has ever passed my lips.\n\t\tYour impeccable reputation will serve you well in the Society one day, my friend.\n\t\t*set credibility 80\n\t\t*goto rigor_test\n\n*label persistence_test\n*page_break\n\nThis is the last question. How dedicated are you to a course once you've set it?\n\n*choice\n\t#Nothing can sway me once I've made a decision.\n\t\tDiligence will serve you well as an academic. Science is no place for acting on whims!\n\t\t*set persistence 80\n\t\t*goto modifiers\n\t\n\t#I'm persistent, but sometimes deviation from a plan is necessary.\n\t\tNo sense being obstinate when it's clear you've taken a losing tactic.\n\t\t*set persistence 60\n\t\t*goto modifiers\n\n\t#I'll make a plan if I have to, but I prefer to keep things flexible.\n\t\tWise. One never knows what challenges a scholar might encounter while doing fieldwork.\n\t\t*set persistence 40\n\t\t*goto modifiers\n\n\t#Call me Professor Spontaneity. I like to keep my options wiiiiide open.\n\t\tA play-it-by-ear sort, then. Not just anyone can adapt to changing circumstances!\n\t\t*set persistence 20\n\t\t*goto modifiers\n\n*label modifiers\n*comment Adding in the first choice modifiers. I'm not sure on the actual modifiers given here, it's all placeholder for now. I'll probably want to think them through a little more and then try to telegraph the results in the story after each choice, too.\n*if (firstchoice=\"hoax\")\n\t*set credibility %+10\n\t*set persistence %-10\n\t*set rigor %+15\n\t*goto lazyday\n*elseif (firstchoice=\"affair\")\n\t*set credibility %+10\n\t*set persistence %-10\n\t*set rigor %-10\n\t*goto lazyday\n*elseif (firstchoice=\"drugged\")\n\t*set credibility %+5\n\t*set persistence %+10\n\t*set rigor %-5\n\t*goto lazyday\n*elseif (firstchoice=\"framed\")\n\t*set credibility %-10\n\t*set persistence %+15\n\t*set rigor %-5\n\t*goto lazyday\n\n\n*label lazyday\n*page_break\nYou'd always thought a long sea voyage was supposed to be exciting. The sails snapping in the wind, the bustle of shipboard life, the free and open ocean spreading before you as far as the eye can see. You had expected adventure: maybe sea serpents, or pirates, or mermaids! At least, that's what [i]TALATOARGMS[/i] had strongly implied. The parts you got to read, anyway.\n\nBut now that you're on a long sea voyage of your own, it turns out to be super boring. The crew don't much care for kids like you, so all you can do is try to stay out of their way. Your guardian, Uncle Banjo, has spent most of the trip thus far napping in a hammock on the aft deck, nose hairs blowing gently in the sea air. Now he's reading your book. Well. Technically, his book. He gave you a toy boat before your trip started, but honestly you feel a little too old for that, and anyway, it's not like you can play with it in the ocean. Not more than once, anyhow.\n\nInstead, you sit alone with your legs hanging off the side of the boat, staring at the endless horizon, wishing for something interesting to happen.\n\nWait—what's that toward the aft of the ship, sparkling down by the waterline?\n\n*fake_choice\n\t#Could it be a mermaid?!\n\t\tThat had to be a tail. It [i]had[/i] to be. You grip the rails and lean forward over the water to get a closer look.\n\t\t*set rigor %-10\n\n\t#Just the water splashing.\n\t\tWhatever. You return to mulling over how horribly, terribly, excruciatingly bored you are.\n\t\t*set persistence %+15\n\n\t#Too soon to tell.\n\t\tYou squint at the spot where you thought you'd seen something. Hmm. Probably nothing.\n\t\t*set rigor %+15\n\nThe sparkle comes again, just for a second, and then a flicker of motion. There's definitely something in the water. Something dappled green and gold, like sunlight through leaves. It slips out of sight again. Could it really be…? What's next?\n\n*choice\n\t#Try to get a little closer for a better look.\n\t\tYou scramble toward the aft of the ship, where you last saw that whatever-it-was.\n\t\t*set persistence %+15\n\t\t*goto mermaid_closeup\n\n\t#Call my Uncle Banjo over. He'll know what to do!\n\t\tYeah, he'll know what to—oh, come on, you can't fool yourself. He wouldn't know what to do with a piece of cake if it were on a plate in front of him and you put a fork in his hand. But he's the closest thing you have to an authority figure around here, so you rush over and shake his hammock. \"Uncle! Uncle! There's something in the water, come see!\"\n\n\t\tHe lowers the book and raises an eyebrow. \"That excited over a fish? Remind me not to let you read any more of my stuff,\" he says. He returns his attention to the gripping page before him.\n\t\t*set credibility %-15\n\t\t*goto no_grownups\n\t\t\n\t#Try to find a spyglass—better to see the situation from a safe distance.\n\t\tLuckily the navigator on board this ship is on the absent-minded side and left a spyglass rattling around on top of a locker—ah, there. Let's get a closer look at this curious creature, shall we?\n\t\t*set rigor %+15\n\t\t*goto mermaid_closeup\n\n*label no_grownups\n*page_break\nWell, if Uncle Banjo won't help you out, you're on your own. You contemplate how to proceed. What would a scholar of the Royal German Marinological Society do?\n*choice\n\t#If it is a mermaid, I should try to make friends! I wonder what mermaids like…\n\t\tWhat would a mermaid consider a treat? Fish? Nah, probably she's got plenty of them. A page from your journal would just dissolve in the water, so that's right out. Hey! Maybe that stupid toy boat from Uncle Banjo would do the trick. You return to the side of the ship and lean out over the water, hoping for another glimpse.\n\t\t*set ending \"gift\"\n\t\t*goto treat\n\t\t\n\t#This might all be my imagination. I want to get a closer look before jumping to any conclusions.\n\t\tSensible. You're not even sure yet if there's something to get excited about—like Uncle Banjo said, it might just be a fish. You inch closer to the side of the ship, hoping for another glimpse of whatever it is that you saw.\n\t\t*goto mermaid_closeup\n\t#I'm kind of scared. I'll investigate, but first I need something to defend myself.\n\t\tYou've heard rumors about mermaids before. Rumors that they eat people. With their teeth. \n\n\t\tIf that really is a mermaid out there, you shouldn't go looking empty-handed. You search the deck for something that could serve as a weapon, and find a pistol lying under a coil of rope. You're pretty sure it's loaded.\n\n\t\tSo let's go see what that splashing was, huh? \n\t\t*set weapon true\n\t\t*goto mermaid_closeup\n\n*label mermaid_closeup\n*page_break\n\nA head and shoulders erupt from beneath the water, green and gold.\n\nYep. That sure is a mermaid right there, no doubt about it. She's only about your size—a child herself. An enormous puff of curls dries rapidly and springs out from her head. She's wearing a loose top of knotted seaweed, and a necklace of pink shells of a kind you've never seen before. She watches you, eyes wide with…\n*fake_choice\n\t#Fascination?\n\t#Fear?\n\t#Fury?\n\nHard to tell.\n\nSuddenly, the mermaid smiles. Her teeth are very white, and very, very sharp. She dives. Her tail fins vanish with a splash beneath the boat.\n\t\t\n*choice\n\t#Try to find her on the other side of the boat.\n\t\tYou scramble to the other side of the deck in time to see the mermaid reappear. When she does, she grins at you. Her tail smacks the water hard, spraying you with droplets. She disappears under the boat again; you race her to the other side. When she meets you there, she laughs and leaps in the water with delight.\n\t\t*if ending = \"noending\"\n\t\t\t*set ending \"gift\"\n\t\t*goto playtime\t\n\n\t#Look to see if she comes back up where she was.\n\t\tNo, she's gone now. \n\n\t\tWait! There she is. She reappears from under the boat. She sticks her tongue out at you and makes a funny face. Nice to know that's universal, huh? She points to the other side of the boat and then vanishes into the deep again.\n\t\t*if ending = \"noending\"\n\t\t\t*set ending \"rescue\"\n\t\t*goto playtime\n\n\t#Start taking notes.\n\t\tYou have a notebook around here somewhere…ah, here we go. You take a pencil and quickly begin to sketch out what you think you saw. Green and gold; sharp teeth; got it. You pause, pencil in the air. Wait—what did her necklace look like? And how long was her hair, exactly? You cautiously edge to the side of the boat to see if you can get another look.\n\t\t*if ending = \"noending\"\n\t\t\t*set ending \"norescue\"\n\t\t*set rigor %+10\n\t\t*goto rogue_wave\n\n\t#Those teeth! Better find a weapon.\n\t\tShe didn't get those chompers by eating seaweed, you're pretty sure. The thought of her lurking around your boat just…waiting…fills you with horror. You search the deck for something that could serve as a weapon, and find a pistol lying under a coil of rope. You're pretty sure it's loaded.\n\t\t*set weapon true\n\t\t*goto weapon\n\n*label weapon\n*page_break\nYour hands close tight around the pistol. You edge closer to the side of the boat, one tiny step at a time, looking for that mermaid again.\n\nShe streaks out from beneath the boat and leaps from the water, scales shining in the sun, then circles back toward you.\n*choice\n\t#She's coming right for us! Shoot!\n\t\tThe mermaid seems to recognize the pistol in your hands as you raise it. Her eyes widen.\n\n\t\tYou try to fire, but the mechanism is jammed! You stare at the pistol in dismay, trying to work out what went wrong. The mechanics of the firearm are, alas, a total mystery to you. You struggle with it, heart pounding, but all you succeed in doing is getting your hands filthy with gun oil.\n\t\t\t\n\t\t*set ending \"chomp\"\n\t\t*goto rogue_wave\n\t#I've got to raise the alarm!\n\t\tYou try to cry out a dignified warning, but all that comes out of your throat is an inarticulate gargling sound. The mermaid dismisses you with one last flick of her tail and vanishes into the deep.\n\t\t*set ending \"norescue\"\t\t\t\n\t\t*goto rogue_wave\n\t#Let's not be hasty.\n\t\tHold on—maybe she's not dangerous. You wave, cautiously.\n\n\t\tShe waves back, and darts under the ship. After a moment, she appears again. She sticks her tongue out at you and makes a funny face. She points to the other side of the boat and then vanishes into the deep again. After a moment, you scramble to the other side of the ship. She laughs out loud, splashes at you, and dives down again for another round.\n\t\t*set ending \"norescue\"\n\t\t*goto playtime\n\n*label treat\n\nYou wave the little boat at the mermaid, then toss it into the water beside her. Against all odds, it lands upright, and bobs uncertainly on the surface. The mermaid pokes it with a finger, and it capsizes. She rights it again and blows air into its sails. She claps her hands with delight and gazes at you with shining eyes.\n\n*goto post_treat\n\n\n*label playtime\n*page_break\n\nYou play hide-and-seek with the mermaid for a while, dashing from one end of the ship to another, giggling madly. She swims under the ship, and you try to guess where she'll emerge; then, you run across the decks and peer out from a new spot, waving when she finds you. It's the most fun you've had since you left Port St. Never last week!\n*goto post_treat\n\n*label post_treat\n\nShe beckons to you. Looks like she wants you to join her in the open water. How's your swimming, ${firstname}?\n\n*choice\n\t#I'm practically a fish myself. I dive in headfirst!\n\t\tYou were always a strong swimmer in the lake near where you grew up. You confidently dive into the water to play with the mermaid child.\n\t\t*set swimming +3\n\t\t*goto lost_at_sea\n\t#I'm OK in the water, but there's no sense being reckless. I'll climb down to swim.\n\t\tYou're a pretty good swimmer, so you clamber down the anchor chain and into the water to play.\n\t\t*set swimming +2\n\t\t*goto lost_at_sea\n\t#Um. I don't hate the water, but this isn't exactly a rain puddle here. I'll climb down to just splash a little.\n\t\tNot such a great swimmer, huh? You hang on to the anchor chain and make your way down to the waterline. \n\t\t*set swimming +1\n\t\t*goto lost_at_sea\n\t#What? There are currents in the ocean! Waves! Sharks! And I can't swim. No way am I climbing down—what are you thinking?!\n\t\tYou don't know how to swim at all, so you just lean over the railing and wave a little. That'll do, right?\n\t\t*goto rogue_wave\n\n*label lost_at_sea\n\nUnfortunately, no matter how good a swimmer you might be, there's no way this would have gone well for you. The waves are more enormous than you guessed, there's nowhere to stand and catch your breath for a second, and worst of all, your ship is starting to pull away. You can't swim fast enough to keep up!\n\n*page_break\nYou flounder in the direction of your ship as best you can, but the ocean sucks all the warmth from your bones. Your muscles tighten. A wave pushes you down, and you no longer have the strength to pull yourself up for one more gasping breath.\n*goto overboard\n\n\n*label rogue_wave\n*page_break\n\n[i]Splash[/i]! \n\nA rogue wave hits the side of the ship. The wall of churning water sends you sprawling. As the foam surges back over the side of the ship, you are pulled inexorably over the side along with it. You scrabble at the slick wooden decking, but you find no purchase. You slip through the rails of the ship and out into the open ocean.\n\n*page_break\n*goto overboard\n\n*label overboard\n\nThe water closes over your head. The chill presses into your skin and into your lungs. You find yourself sinking down, down. It grows darker. Soon you lose your sense of which way is up. You flail in the water, but can't seem to make any headway. The air remaining in your lungs grows stale and explosive. \n\nYou are drowning.\n*page_break\n\n*if ending = \"rescue\" \n\t*goto rescue\n*elseif ending = \"chomp\"\n\t*goto chomp\n*elseif ending = \"gift\"\n\t*goto mermaid_gift\n*else\n\t*goto norescue\n\n\n*label norescue\n\nThe mermaid has vanished. A last bubble escapes from your mouth, and you breathe in a deep lungful of ocean water. \n\nYou find yourself unable to struggle. You slowly drift down and down into the sea.\n\n*goto ship_waking\n\n*label chomp\n\nThrough the hazy blue, the mermaid swims down and around you. Her fins curl around your calf, feathery and smooth. She grins at you again, her teeth shining bright in the darkness. She presses her face toward you, as if searching for your scent.\n\nHer teeth sink deep into your shoulder. Blood billows around you like smoke. Everything goes black.\n\n*set bloodloss +4\n*set scar true\n*goto ship_waking\n\n\n*label mermaid_gift\n\n*set gift true\nThe mermaid slides through the water at your side, squirming with excitement that you've come to play with her.  She takes the shell necklace from her neck and presses it into your hands. Your fingers close around it automatically. \n*set evidence +1\n*goto rescue\n\n*label rescue\n\nA last bubble escapes from your mouth, and you breathe in a deep lungful of ocean water. \n\nYou find yourself unable to struggle. You slowly drift down and down into the sea.\n\nThe mermaid child pauses, and confusion flits across her face. She circles around you again, trying to work out what your problem is. Why aren't you swimming and playing? Understanding slowly dawns on her. Her strong hands grip you just under your arms and pull you toward the surface.\n*goto ship_waking\n\n\n*label ship_waking\n*page_break\n\nFar below your feet, there is light. As blackness eats at the edges of your vision, you see a sprawling structure of coral and glass as intricately woven together as lace. The buildings split and join in exquisite shapes like you've never seen before.\n\nYou see shapes swimming in and out of the tops of the towers—of course. A mermaid city. It's the last thing you see. Everything goes black.\n\n*page_break\n\nYou wake on board the ship once more, gasping and coughing. The air is blessedly dry in your throat. You lie panting for a moment, trying to piece together where you are and how you're not dead.\n\nUncle Banjo leans over you. \"We were really worried there for a bit. You're lucky one of the sailors spotted you in the water before you were left behind! What in the blazes happened to you?\"\n\n*choice\n\t#\"I saw a mermaid, Uncle!\"\n\t\t*set rigor %+20\n\t\t*if credibility > 50\n\t\t\t*goto mermaid_story\n\t\t*else\n\t\t\tHe frowns at you. \"What have I told you about fibbing?\"\n\t\t\t*goto no_story\n\t#\"I was just playing around and fell off the ship.\"\n\t\t*if rigor \u003c 50\n\t\t\tHe frowns. \"You should know better. Try not to do any more horsing around, all right?\"\n\t\t\t*goto no_story\n\t\t*else\n\t\t\tHe pauses and gives you a long, searching look. He can tell you're hiding something. \n\t\t\t*goto no_story\n\t#\"I'm not really sure what happened to me.\"\n\t\t*set credibility %+5\n\t\t*goto no_story\n\t*if (ending = \"chomp\") #\"I was attacked by a mermaid—a vicious monster!\"\n\t\t\t*set credibility %+10\n\t\t\tUncle Banjo looks at your injury with a deep frown. \"That's a nasty bite, ${firstname}. A mermaid, you say? More likely a shark. Oi! Sailor! We need some bandages over here, and fast!\" \n\t\t\t*goto mermaid_story\n\t*if (ending = \"gift\") #\"Look! A mermaid gave me this necklace!\"\n\t\t\t*set credibility %+10\n\t\t\tHe grins. \"That sure is a fine piece of jewelry. Hmm….”\n\t\t\t*goto mermaid_story\n\t\t\t\t\n*label mermaid_story\n\nHe rubs his chin thoughtfully. \"A mermaid, you say? You sure you haven't been reading too many of my books?\"  \n\nYou shake your head. \"I'm telling the truth! I swear I am!\" Your protest strains your lungs, and you devolve into a painful bout of coughing.\n\n\"A friend of mine says he saw a mermaid once. Bit of an odd duck, he was. Told me mermaids'll eat you as soon as look at you, but he pined after 'em like it was his job. Tried to join the Royal German Marinological Society, in the end, but I never heard if they took him.\"\n*goto society\n\n*label no_story\n\nHe shakes his head. \"I guess I can't fault you for being so reckless. You've been reading those books, and the whole ocean was right there waiting for you…\"\n\nYou take in a deep breath, but before you can say anything, you begin coughing. Still a little salt water in your lungs, huh? You shrug helplessly.\n*goto society\n\n*label society\n\nUncle Banjo slaps you on the back, spurring a fresh round of coughing. \"Say, one day, maybe you'll join the Royal German Marinological Society, eh? Wouldn't that be something! My own flesh and blood a famous scholar!\"\n\nYou think about it. Yes, the Society. Of course! You'll join the Society because it's the only way to…\n\n*fake_choice\n\t#Prove to everyone that I wasn't imagining things.\n\t\tYou're no idle daydreamer. What you saw was real.\n\t\t*set credibility %+15\n\t#Find a way to be near those delightful beings again.\n\t\tMermaids! Who would ever have thought! \n\t\t*set loyalty %-20\n\t#Exterminate those dangerous monsters.\n\t\tYou'll have to show this danger to the world.\n\t\t*set loyalty %+20\n\t#Learn more about those exotic creatures.\n\t\tYou've discovered a thirst for knowledge in your heart. You have to know more!\n\t\t*set rigor %+20\n\t*comment endif\n\nYou slowly climb to your feet and look back out over the ocean. There's no sign of the mermaid, not now; but one day, you think, you'll join the Royal German Marinological Society, and then you'll be back.\n\n*finish", "2_society": "*label big_day\n*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]The Daring Mermaid Expedition[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2020-04-29 $4.99 $2.99 delay_purchased\n\t*delay_break 1200\n\n*label delay_purchased\n\n*set bloodloss 0\nThis is it, ${firstname}! Your big day! The one you've been working toward since that fateful encounter on the high seas. This is the day you become a scholar of the Royal German Marinological Society!\n\n*page_break\n\nOr you hope so, anyway. You've jumped through the endless bureaucratic hoops: the dozens of essay questions, the rounds of aptitude testing, the three sketches from various angles. And then you waited, waited, and waited some more. The work of the Society is many things, but it is not hasty. Now, though, the agony is over. Today is the day you go before the Society for your final interview!\n\nYour fate now rests entirely in the hands of four distinguished members of the Society. Why, anything at all could happen at your hearing. It's a good thing that you've spent the last few years…\n\n*fake_choice\n\t#Studying diligently to be the perfect scholar.\n\t\tThe Society is first and foremost an institution of knowledge. The best way to prove your worth to the Society is as a vessel full to the brim of learning. You're poised to spill all that education all over the Society the first chance you get! \n\t\t*set rigor %+15\n\t\t*set history \"study\"\n\t#Learning practical skills to help me in the field.\n\t\tBook learning is fine, but the true measure of your worth to the Society can't be measured in writing. No, the work of the Society takes place in the jungles, tide pools, and reefs of the world, and that's where you shine the brightest. Not literally.\n\t\t*set swimming +1\n\t\t*set history \"skills\"\n\t#Trying to befriend people who might move my career forward.\n\t\tOnly a fool could believe that pure merit drives the decisions of the Society—or those of any other group, for that matter. It helps to have friends in high places, so you've made yourself very friendly indeed. In a platonic way!\n\t\t*set persistence %-15\n\t\t*set rigor %-15\n\t\t*set history \"social\"\n\t#Searching for mermaids.\n\t\tOf course—your passion for marinology was stoked by that chance meeting with a mermaid, and the Society is sure to appreciate you for it. You've lingered many an hour on ships or by the shore, but you've never seen a mermaid again. You could almost think you'd imagined the whole thing. Almost, but…nah.\n\t\t*set persistence %+15\n\t\t*set history \"seeker\"\n\n*page_break\n\nJudging by the angle of the sun, it looks like you woke up earlier than you needed to. Nerves, perhaps, or maybe excitement. One or the other. Or maybe you're oscillating between the two like a wave of emotional energy.\n\nAt any rate, you have a little extra time on your hands. How will you use it to prepare yourself for the ordeal that is yet to come?\n\n*choice\n\t#Rehearse what I plan to say.\n\t\tYou stand before the mirror in your room practicing your speech, your posture, your dramatic gestures. You've worked very hard on this performance and, not to be arrogant, but it's pretty great at this point. This is going to be a cakewalk!\n\t\t*set prep \"rehearsed\"\n\t\t*goto outside\n\n\t#Take extra care with my appearance.\n\t\tIt wouldn't do to go before the Royal German Marinological Society looking shabby and disorganized. Your shoes are carefully polished, your hair perfectly arranged. You fasten a pin with the insignia of the Society to your lapel and step back to examine the overall effect. Ah, perfect. You look every inch a scholar. Why, you're halfway there already!\n\t\t\n\t\t*set prep \"snappydress\"\n\t\t*goto outside\n\n\t#Treat myself to a leisurely breakfast.\n\t\tBest not to drive yourself into higher peaks of anxiety by over-preparation. This is a long-awaited day, and you deserve a bit of celebration for making it this far, come what may.\n\n\t\tYou stop by a cafe around the corner from your place and order their brunch special. This turns out to be a lovely repast of German pastry, piping hot tea, boiled eggs, assorted olives, toasted cheese, and five kinds of juice. Ah, just the thing to bolster your strength in the face of whatever obstacle arises.\n\t\t\n\t\t*set prep \"relaxed\"\n\t\t*goto outside\n\n\t#Stick to my regular routine.\n\t\tYou're already as prepared for your hearing as you ever will be, frankly. At this point, there's no sense in breaking with habit, which might only serve to break your stride. You dress and breakfast as though it were any other day, methodical and efficient as the rising sun itself.\n\n\t\t*set prep \"routine\"\n\t\t*goto outside\n\n\n*label outside\n*page_break\n\nEventually, you make your way to the Society's headquarters, right on schedule.\n \nThe Society's hearing for your application is being held in an elegant villa, all picturesque lawns and charmingly draped ivy. The villa was a gift to the Society from an eccentric scholar some decades ago, and now serves as the home and offices of the Grand Royal Scholar herself. You gaze upon it for a moment, overwhelmed by the weight of pomp and history held within those distinguished walls.\n\nIf you succeed today—if your career curves in a perfect arc from here into the future—one day, this could be your home. You might think about cutting back some of the lilacs; they're on the bushy side.\n\nAnd then your nerve fails you, just for a moment. What if the Society isn't right for you? What if you were cut out for a life of piracy? What if you turned your talents to writing novels? What if the mermaids don't want to be found? Would you sacrifice their privacy for the sake of your career?\n\nWell. It's a little late to be having these doubts now, isn't it?\n\nYour Uncle Banjo is waiting for you next to the wrought iron gates. Oh, right—he's here to support you on your big day. Once he spots you, he waves enthusiastically and rushes over to clasp your hand. \"Are you ready, kiddo?\"\n\n*fake_choice\n\t#\"Yes, I'm ready.\"\n\t\tHe nods sagely. \"You think so, huh? Huh. I guess we'll see about that.\"\n\t#\"No, I'm not ready.\"\n\t\t\"No, no, of course not,\" he says, with a comforting smile. \"It's OK, at least you tried your best!\"\n\t#\"What kind of a question is that?\"\n\t\tThe crease between his eyebrows deepens. \"You'd better not sass the fancy scholars like that,\" he mutters. \n\t*comment endif\n\nThen he clears his throat. \"I'm proud of you, ${firstname},\" Uncle Banjo says. \"I never thought…I mean I didn't think you could…\" He trails off. \"Well, I just didn't think you had it in you!\"\n\n\nAfter an awkward pause, Uncle Banjo claps you on the back. \"I'm going to find my seat in the gallery. I'll see you when it's all over.\"\n\n*page_break\n\nYou make your way into the villa. There is a chattering crowd here, voices echoing off the Dutch marble floor and the blown-glass chandeliers. The illustrious members of your committee are here, mingling freely with what are presumably marinological enthusiasts come to observe the proceedings.\n\nThis is your opportunity to size up the committee that will hear your application to become a Society Scholar! If you play your hand correctly, maybe one of them will even agree to become your patron. Not every entering scholar has such a mentorship, but the benefits of having an established member of the Society helping to guide your career are obvious. It brings advantages to your reputation, experience, and connections that can make the difference between a mediocre career, soon forgotten, and one for the annals of history. \n\nIt's also been whispered that romantic attachments between patron and protégé are not uncommon. Most relationships remain perfectly professional, of course. Positively aboveboard. But from time to time…well. The unusually high divorce rate among Society members isn't only because of the stress of lengthy excursions into the field.\n\nBut this matter of patronage, even aside from the salacious element, relies completely upon your making a good impression. This might be easier said than done; it's common knowledge that each of the committee members have very different priorities and personalities. The same strategy that wins you the favor of one of them won't work for another.   \n\nBest hurry, though. It won't be long until the Society's meeting officially begins.\n\n*label meet_patrons\n*page_break\n\nYou scan the crowd. Who should you try to catch before the hearing begins?\n\n\n*choice\n\t*hide_reuse #Mr. Fontana, the adventurer.\n\t\t*goto meet_fontana\n\t*hide_reuse #Baroness Scharknell, the philanthropist.\n\t\t*goto meet_scharknell\n\t*hide_reuse #Lord von Tubingen, the academic.\n\t\t*goto meet_tubingen\n\t*hide_reuse #Miss Wellington, the scientist.\n\t\t*goto meet_wellington\n\t#None of them. I'm ready for the hearing.\n\t\t*goto hearing\n\n\n*label meet_fontana\n\nMr. Fontana is a fine figure of a man, from his gleaming dark hair to the broad expanse of his shoulders. Gossip has it that his mother was a talented Indonesian pearl diver and his father a publishing magnate. He catches you looking at him, and his teeth flash as he gives you that famous smile. It's even more stunning in person than it ever was in portraiture.\n\nThe legends of Mr. Fontana's exploits are…well, legendary. Or they would be, if they weren't completely true and well documented in his extensive memoirs. Fontana has climbed the highest peaks in the world, done battle with a whole tribe of man-eating cave monsters, swum around the whole of Greater Rainekker Island over the course of 72 hours, and even survived three months in the icy north, stranded with only a belt knife and a supply of wood glue to stave off scurvy.\n\nThere's much you could learn from Fontana about physical conditioning and survival—the very skills that help to keep one alive and well in the field.\n\n*page_break\n\n*set armwrestling true\n\nA harem of admirers crowds around Mr. Fontana, like crust around a pie. They have the air of conspirators. Suddenly his gaze falls on you. \"You there! You're a disinterested party. Help us settle a bet, will you?\"\n\nYou find yourself enveloped in the warm regard of his audience. Fontana claps you on the shoulder, hard. \"You've heard of the legendary pirate Lucy Smokeheart, yes? Imagine, if you will, that she were to capture my ship and challenge me to an arm-wrestling match. Who do you think would win, me or Captain Smokeheart?\"\n\n*choice\n\t#\"You would win, of course, sir!\"\n\t\tHe laughs uproariously. \"You'd think so, would you? I couldn't agree more. Charlotte, you owe me five bits!\"\n\t\t*set fontana %+10\n\t\t*goto fontana2\n\t#\"Captain Smokeheart would surely defeat you.\"\n\t\tHe gapes at you in momentary astonishment. \"You think she would—ha-hah! You're probably right, at that! Charlotte, I'll pay you back tomorrow.\" He grins wide, but under it, he seems a little put out by your response.\n\t\t*set fontana %-15\n\t\t*goto fontana2\n\t#\"It's impossible to guess. You should issue a challenge!\"\n\t\tHis dazzling smile grows wider, if that's even possible. His eyes shine with delight. \"Just imagine it!\" he crows. \"Me and the pirate, together! Why, the memoir would sell millions of copies! What a brilliant idea!\"\n\t\t*set fontana %+15\n\t\t*goto fontana2\n\t#\"Um—can I speak to you about my hearing?\"\n\t\tHe blinks in momentary confusion. \"Oh, it's you on the executioner's block today, is it? Good luck with that, then.\"\n\t\t*set fontana %-10\n\t\t*goto fontana2\n\t\t\n*label fontana2\n\nBefore you can continue your conversation, one of his entourage elbows you out of the circle. Fontana's attention wanders elsewhere; it looks like your brief audience with him has come to a close.\n\n*goto meet_patrons\n\n*label meet_tubingen\n\nLord von Tubingen is a dignified older gentleman, and a scholar in the purest sense of the word. His paper on the observed feeding habits of the common domestic goldfish was first published when he was seven years old. His reputation has only expanded with every passing year since. Now he teaches marinological sciences at the Royal German Academy on top of his duties for the Society. \n\nHe remains quite a prolific writer, often about matters of myth and legend. The lord's monograph last year on folklore involving the formation of pearls made quite a splash. There was something about it, some controversy…you can't quite recall. Upon reading it, you found yourself wondering what it would be like to spend time dueling with his formidable intellect.\n\nHis pale skin is creased at the corners of his eyes, and his sandy curls are graying, but he is nonetheless a very arresting presence, tall and still. His piercing blue eyes remind you of the sky at noon. He stands by a bookcase, leafing through a leather volume pensively.\n\nIf he were your patron, the simple fact of association with him would increase your credibility dramatically. It would be advantageous to make a good impression on him. But what to speak to him about?\n\n*choice\n\t#\"Excuse me, what are your thoughts on the subject of mermaids?\"\n\t\tLord von Tubingen brightens and snaps his book shut. \"Mermaids! What a fascinating subject!\" He practically glows with enthusiasm. \"Such a body of myth! The questions raised, the superstitions surrounding them!\" For a moment you can see him poised on the brink of a lengthy monologue on the topic.\n\t\t*set tubingen %+15\n\t\t*goto tubingen2\n\t#\"I don't care what they say, your paper on pearl formation was magnificent!\"\n\t\tLord von Tubingen's piercing blue eyes skewer you with contempt. \"Hackwork,\" he spits. \"One of the worst papers I've ever been associated with. I tried to have my name struck from it, but the publisher went to press before I could stop it.\"\n\t\t*set tubingen %-10\n\t\t*goto tubingen2\n\t#\"Sir, have you any advice on writing for a new scholar?\"\n\t\tHe looks up from his reading. \"Always a pleasure to advise another scholar,\" he says absently. \"Write from the gut, friend, and from the heart. Never, never write from the wrists or elbows—or any joint, really. That way lies only injury and ignominy.\"\n\t\t*set tubingen %+10\n\t\t*goto tubingen2\n\t#\"Your Lordship, could you advise me on my application to the Society?\"\n\t\tHe frowns, a subtle thing that nonetheless makes you feel green and ignorant. \"You're the one, are you? I don't know that it would be appropriate to give you any special consideration.\"\n\t\t*set tubingen %-15\n\t\t*goto tubingen2\n\t\n*label tubingen2\n\nA motion across the room catches his eye. \"Ah, if you'll pardon me, it appears I'm required to speak with the Grand Royal Scholar.\" He hurries away.\n\n*goto meet_patrons\n\n\n*label meet_scharknell\n\nAh, that must be Baroness Scharknell, the noted philanthropist and socialite. You recognize her velvety dark-brown skin, and that signature silk hibiscus pinned in her hair, from the florid descriptions of her in the social pages. \n\nThe Baroness has never been married, but although she started out lovely and poor, now she is lovely and extremely wealthy. Rumor has it that a series of inheritances from her lovers has added to her family coffers; others insist that she's simply a shrewd investor. Either way, she is unsurpassed at taking advantage of sudden opportunities. Beyond that, though, you don't know much about her tastes or accomplishments.\n\nGazing at her now, you can see that she is a woman of fashion, at the very least. Everything about her is round, soft, and somewhat larger than life. Curls are piled high on her head, and the elaborate embroidery on her day gown doesn't murmur of costliness so much as it grabs you by the shoulders, shakes you a few times, and shouts in your ear that you couldn't ever afford such a thing. Ah, but wouldn't you like to?\n\nShe'd be a fine patron if you could find a way to impress her. Perhaps she could open your eyes to opportunities you might not have otherwise seen and improve your own sense of spontaneity.\n\nBefore you have a chance to fabricate some excuse to introduce yourself, however, she rushes over to you. \"Darling! DARLING! I've been looking all over for you!\" She gives you a significant look.\n\n*choice\n\t#\"Baroness! What a delight to see you!\"\n\t\tBehind her, a woman wielding a thick sheaf of papers pauses, then turns away, disappointed.\n\n\t\t\"Bless you,\" the Baroness says. \"That insufferable woman wanted me to fund her ridiculous monument to Admiral Cartwright, and simply didn't know when to let it go. I'm in your debt!\" She pats you fondly on the cheek. \"Now, if you'll excuse me, I have some things to attend to before the hearing begins.\"\n\t\t*set scharknell %+15\n\t\t*goto scharknell2\n\t#\"Are you…are you talking to me?\"\n\t\tThe Baroness grimaces and tilts her head subtly at a woman hovering behind her with a thick sheaf of papers. \"Yes, you!\" she says. But it's already too late.\n\n\t\tThe woman with the papers creeps closer. Upon realizing she's not interrupting anything, she takes the Baroness by the elbow and steers her away. \"As I was saying, madam, the cost of the materials would only run into the tens of thousands. A pittance, really, to someone of your stature, so…\" They recede into the crowd.\n\t\t*set scharknell %-10\n\t\t*goto scharknell2\n\t#\"What? You must have the wrong person.\"\n\t\tThe Baroness closes her eyes, unable to bear the sight of your social ineptitude. \"Not much of one for subtle cues, are you?\" she murmurs.\n\n\t\tA woman swoops in from behind her and thrusts a sheaf of papers into the Baroness's hands. \"My lady! Let's continue our discussion. Here, let me show you these sketches—the Admiral would have his peg leg like so, and we'd put real crystal in his spectacles so the monument could also serve as…\" The Baroness shoots you a dirty look as she is ushered away.\n\t\t*set scharknell %-15\n\t\t*goto scharknell2\n\t#\"Your ladyship, I was hoping to speak to you about my application.\"\n\t\tShe pauses. \"To the Society? Yes, yes. Of course you were.\" Behind her, a woman wielding a thick sheaf of papers pauses, then reluctantly steps back.\n\n\t\tThe Baroness continues, a bit loudly. \"Hold your head up high, use your strongest voice, and don't be afraid to trumpet your own accomplishments. If you're not proud of yourself, then who's to be proud of you?\" \n\n\t\tAfter a moment, the paper-wielding woman gives up her hovering and wanders away, perhaps in search of another target. \"Oh, excellent, I thought she'd never leave me in peace,\" the Baroness says. \"Good luck today.\" She inclines her head toward you and then swishes away.\n\t\t*set scharknell %+10\n\t\t*goto scharknell2\n\n*label scharknell2\n\nThe scent of jasmine lingers in your nose after the Baroness is gone.\n\n*goto meet_patrons\n\n\n*label meet_wellington\n\nAh, that's Miss Wellington over there, standing alone by the windows. She's looking out over the garden, observing the flight of a butterfly. Probably calculating its precise trajectory into an equation, if her reputation is to be believed.\n\nRumor has it Miss Wellington is a being of pure thought; her observations and insights in the realm of science have won her endless prizes and acclaim. \n\nNow that you see her here, you know that for the bald lie that it is. True, her back is as straight as a mathematical plane, her gown stern black in contrast to her bone-colored skin, her hair tightly tied back. But she is very clearly a physical presence. Her every motion carries the precision and energy of a coiled spring. You get the sense of deep forces held at bay, and you wonder what would happen if her control were to slip. What would you find beneath it?\n\nIf she were your patron, you'd be privy to her methods for research and fieldwork techniques, unparalleled across the world. Your academic rigor would be sure to benefit as a result. But how best to approach her?\n\n*choice\n\t#\"Pardon, but do you have any thoughts regarding mermaids?\"\n\t\tShe turns and looks at you as if you'd grown horns and purple stripes. \"Thoughts? Do I have thoughts on mermaids? Are you wondering if I perhaps also have thoughts on leprechauns, or creatures from Mars? Unicorns, perhaps? Little men who whisper secrets in your ears at night?\"\n\t\t*set wellington %-15\n\t\t*goto wellington2\n\t#\"Miss Wellington? I admire your work.\"\n\t\t\"Do you.\" She turns toward you with something approaching a smile. \"I feel it's much too soon to really judge the worth of my corpus of work. New theories have a shine and glamour about them, but their true value can only be determined from the test of decades.\" \n\n\t\tShe bows slightly. \"That said, I do appreciate the compliment. I have my vanities, like anyone else.\"\n\t\t*set wellington %+10\n\t\t*goto wellington2\n\t#\"Penny for your thoughts?\"\n\t\tShe sizes you up and clearly finds you lacking. \"What is it, precisely, that entitles you to ask about the contents of my brain at a moment when I'm clearly not seeking other company? And why do you presume they would be worth so very little?\"\n\n\t\tThere's not much you can say in response to that, really.\n\t\t*set wellington %-10\n\t\t*goto wellington2\n\t#\"Excuse me—what advice can you give me for my hearing today?\"\n\t\tShe arches a graceful eyebrow. \"Direct, aren't you? I do admire that. Here's some advice, then. The rest of the board is not so logical as we. You'd do well to dance around your subjects with the rest of that lot.\"\n\t\t*set wellington %+15\n\t\t*goto wellington2\n\n*label wellington2\n\nMiss Wellington shakes her head. \"Please be on your way now. I like to be alone before a hearing to collect my thoughts.\" She returns to her window and that fluttering butterfly. \n\nThe conversation (such that it was) has clearly come to its end, so you shuffle away.\n\n*goto meet_patrons\n\n\n*label hearing\n\nIt's time. The crowd surges around you as people head toward their seats. You find yourself swept along into the room where the hearing will be held, like a leaf floating on a stream. Probably an oak leaf. Maybe aspen? Willow? Wait, what do aspen leaves look like, anyway?\n\nThe grand chamber reminds you of a courtroom, all dark wood and somber velvet curtains. A high, broad bench faces row upon row of spectators. There's even a mezzanine up above. Uncle Banjo waves at you from up there and gives you an encouraging thumbs-up.\n\nThe committee members slowly take their places behind the bench, nodding to one another amiably. Sunlight streams in through windows twenty feet tall behind them, rendering them shadowy and intimidating in silhouette. Even more intimidating than they were already, that is. \n\nAs for you…you realize that you'll be the one on trial. A low podium faces the bench. You hesitate, then squeeze into the front row, even though there really isn't any room. A woman with a green bonnet shoots you a filthy look.\n\n*page_break\n\nThe Grand Royal Scholar clears her throat. The crowd falls silent. \"We have several orders of business today. There's the matter of funding the dispute between Professor Barrister and the Weatherstone Benevolent Society. We'll be hearing letters from field researchers on three continents, and of course there's the matter of the bylaws vote to change our policy on disseminating academic treatises. Following that, we…\"\n\nOh, you didn't think this hearing was all about you, did you? The business of the Royal German Marinological Society is weighty, intricate, and for the most part extremely boring. Your application is but a tiny piece. \n\nYou try to pay attention to the proceedings, but before long, you find yourself losing focus. Time flows by like a never-ending river. Maybe…maybe you were swept along before like a maple leaf? Wait, wouldn't a maple leaf spin because of all the points? You certainly weren't spinning.\n\n\"…And finally, it looks like one ${firstname} ${lastname} is here to argue for a post in the Royal German Marinological Society,\" you hear, distantly, as if from another world. Your attention snaps back.\n\n*page_break\n\n\"Approach the podium, if you will, ${lastname}.\" The Grand Royal Scholar squints at the audience, searching for you. From the gallery, Uncle Banjo gives you an encouraging nod.\n\n*if prep = \"snappydress\"\n\t*goto snappydress\n*if prep = \"relaxed\"\n\t*goto relaxed\n*if prep = \"routine\"\n\t*goto routine\n*else \n\t*goto hearing2\n\n*label snappydress\n\nAn appreciative murmur rises as you stand and make your way to the podium. You look the part of a deserving scholar, and so the crowd is already half on your side. Baroness Scharknell beams at you with approval; Miss Wellington rolls her eyes and looks away.\n\n*set scharknell %+15\n*set wellington %-15\n*goto hearing2\n\n \n*label relaxed\n\nYou rise and stretch easily, still relaxed from your leisurely breakfast. As you saunter toward the podium, Mr. Fontana winks at you. Lord von Tubingen, on the other hand, looks a little nonplussed at this mild show of disrespect.\n\n*set fontana %+15\n*set tubingen %-15\n*goto hearing2\n\n*label routine\n\nYou are suddenly keenly aware of how unfamiliar this all is, and you feel tremendously out of your element. You bounce up out of your seat and rush toward your place. In your haste, you knock a glass of water off the podium. It shatters on the floor and spreads in a wide pool of glass shards and shame. Mr. Fontana snorts at this show of nerves on your part, but Miss Wellington gives you something approaching a half-smile of sympathy. You think.\n\nThe hearing is delayed briefly as a maid is summoned to take care of your mess for you.\n\n*set wellington %+15\n*set fontana %-15\n*goto hearing2\n\n\n*label hearing2\n\nYou stand at attention before the panel, hands folded behind your back to keep yourself from fidgeting.\n\nThe Grand Scholar peers at you through her impossibly thick spectacles. \"Mmm. You want to be a member of our ranks, do you?\" She shuffles the papers in front of her. \"Tell me, then, what's your interest in the Royal German Marinological Society? What do you expect to get from it?\"\n\nYour nerves are tight as violin strings. You nod politely to the board, one by one. They nod back with various degrees of impatience and boredom.\n\n*choice\n\t#\"I want swashbuckling adventure and derring-do!\"\n\t\tMr. Fontana pumps his fist in solidarity.\n\t\t*set fontana %+15\n\t\t*if prep = \"rehearsed\"\n\t\t\t*goto rehearsed\n\t\t*else \n\t\t\t*goto sandoval_intro\n\t#\"I crave knowledge. I will solve the great mysteries of the world!\"\n\t\tMiss Wellington's eyes burn with excitement.\n\t\t*set wellington %+15\n\t\t*if prep = \"rehearsed\"\n\t\t\t*goto rehearsed\n\t\t*else \n\t\t\t*goto sandoval_intro\n\t#\"I want to lift up humankind to greater heights!\"\n\t\tBaroness Scharknell lights up; you're speaking her language.\n\t\t*set scharknell %+15\n\t\t*if prep = \"rehearsed\"\n\t\t\t*goto rehearsed\n\t\t*else \n\t\t\t*goto sandoval_intro\n\t#\"I just…look, I just like the ocean, OK? Are you OK with that?\"\n\t\tLord von Tubingen chuckles at your lack of pretense.\n\t\t*set tubingen %+15\n\t\t*if prep = \"rehearsed\"\n\t\t\t*goto rehearsed\n\t\t*else \n\t\t\t*goto sandoval_intro\n\n*label rehearsed\n\nAlmost without conscious thought, your body begins your well-rehearsed argument for acceptance into the Society. \"Scholars all, I have been a lifelong admirer of the Royal German Marinological Society, and it would please me more than words can say to be admitted into your illustrious ranks.\" You've lost Baroness Scharknell's attention. Her gaze is wandering over the faces of the crowd. Lord von Tubingen, on the other hand, is rapt with attention.\n\nYou take a deep breath. \"I've prepared a few notes regarding why I feel worthy to join your Society, and—\"\n\n*set tubingen %+15\n*set scharknell %-15\n*goto sandoval_intro\n\n\n*label sandoval_intro\n\nSuddenly, the double doors bang open. The crowd turns, and a rumble rises as they rush to describe to one another what is occurring.\n\n*page_break\n\n\"I demand to be heard!\" a voice cries. An older gentleman stands framed in the doorway. He is leathery from the sun and entirely bald. His Navy jacket is faded and badly in need of mending. \"I was supposed to be on the agenda today!\" he cries. \"The Royal German Marinological Society can no longer deny me. I must be heard!\"\n\nThe Grand Royal Marinological Scholar peers toward him, every pore sending out clouds of deep disapproval that she is much too well bred to express by voice. \"And what must you be heard about, sir?\"\n\n\"Mermaids!\" he shouts.\n\n*page_break\n\nA groan goes up from the audience. Miss Wellington actually cradles her head in her palms. \"Oh, it's that guy,\" sighs Fontana.\n\n\"I am Sandoval of Broken Shell Island!\" the man says. He shoulders you out of the way and takes your place at the podium. \"For years I have been observing mermaids and making meticulous notes. It was my life's work. Alas, my work was destroyed in a...in an unexpected fire. But the Merameida, as they call themselves, are absolutely real! I insist that the Society send someone to corroborate my findings!\"\n\nThe Grand Royal Scholar glowers. \"It is beneath the dignity of the Society to investigate your spurious claims, sir, and to go chasing after imaginary creatures.\"\n\nSandoval tears off his shirt and jacket, dropping them crumpled to the floor beside you. His flesh is mottled with a patchwork of silvered scar tissue, each injury a curious jagged crescent. Like…teeth, perhaps. Gasps arise from the assembly. \"Look!\" he shouts. \"Look what they've done to me! My body is all the proof I need!\"\n\n*if scar = true \n\tYour fingers rise to your shoulder and your own, remarkably similar scar. It's faded over the years; now it's hardly visible to the eye. But you keenly remember the events of that day: the sharpness of those teeth, the water in your lungs.\n\t*goto sandoval_choice\n*elseif gift = true\n\tYou reach into a pocket, where the necklace the mermaid child gave you is concealed. The events of that day return to you: her brilliant smile, the mermaid city beneath your feet.\n\t*goto sandoval_choice\n*else \n\t*goto sandoval_choice\n\n*label sandoval_choice\n*page_break\n\nThe chamber echoes with the buzzing of the crowd. The Grand Royal Marinological Scholar pounds her gavel, trying to restore order with only middling success. \"I say! I say! ${lastname}, I find myself quite unsure of how to proceed!\"\n\nYou should really say something right here. But bear in mind, the Society is still sitting in judgment on you. How you react to this is going to affect what these scholars think of you, and influence which one elects to become your patron, if any…\n\n*choice\n\t#Compassion could earn Baroness Scharknell's approval.\n\t\t*gosub trial_end\n\t\t\"This man has clearly been through something terrible. I think we should give him a fair hearing,\" you say. \n\n\t\tBaroness Scharknell nods approvingly at your show of sentiment. \"As long as he's come all this way,\" she murmurs.\n\t\t*set persistence %-15\n\t\t*set scharknell %+25\n\t\t*set sandoval %+25\n\t\t*goto patron_test\n\t#Try to win over Mr. Fontana—he'd have no time for this nonsense.\n\t\t*gosub trial_end\n\t\t\"What is this man going on about? Is he a drunkard, mad, stupid?\"\n\t\t\n\t\t\"All of the above, from the sound of it,\" Mr. Fontana agrees. His moustache twitches with barely repressed hilarity.\n\t\t*set sandoval %-25\n\t\t*set rigor %-15\n\t\t*set fontana %+25\n\t\t*goto patron_test\n\t#Lord von Tubingen must be appalled at this disruption in proceedings.\n\t\t*gosub trial_end\n\t\tYou raise your voice so everyone can hear you clearly. \"This interruption is unacceptable. He should be ejected from this hearing at once.\"\n\n\t\t\"If we don't stay with our agenda in the face of this sort of interruption, there will be utter chaos!\" roars Lord von Tubingen. \n\t\t*set sandoval %-15\n\t\t*set persistence %+15\n\t\t*set fontana %+25\n\t\t*goto patron_test\n\t#Miss Wellington values the truth above all things, and I should as well.\n\t\t*gosub trial_end\n\t\tYou clear your throat. \"We lack enough information to reach any conclusion. His claims should be thoroughly investigated, in the name of science!\"\n\n\t\tMiss Wellington taps her lips thoughtfully. \"Perhaps there is more merit to an investigation than I at first believed.\"\n\t\t*set sandoval %+15\n\t\t*set rigor %+15\n\t\t*set wellington %+25\n\t\t*goto patron_test\n\n*label patron_test\n*temp HighestRel tubingen\n*set Patron \"tubingen\"\n*if (fontana > HighestRel)\n\t*set Patron \"fontana\"\n\t*set HighestRel fontana\n*if (scharknell > HighestRel)\n\t*set Patron \"scharknell\"\n\t*set HighestRel scharknell\n*if (wellington > HighestRel)\n\t*set Patron \"wellington\"\n\t*set HighestRel wellington\n*if HighestRel \u003c 60\n\t*goto patron_choice\n*else\n\t*goto mermaids_query\n\n*label mermaids_query\n\nThe Grand Royal Marinological Scholar smiles pleasantly. \"A scholar of the Society must have the ability to adapt to swiftly changing circumstance,\" she says. \"I think we should make this unexpected interruption a part of your test of admission into our Society. Tell me, ${lastname}, what do you think regarding this subject of mermaids?\"\n\nYou hesitate. How honest should you be with the Society? Would they believe you if you told the truth about your long-ago encounter? How can you best secure your post in the Society, and perhaps impress one of the scholars enough to win their patronage of your career? Your whole future depends on what you say next.\n\nNo pressure.\n\n*choice\n\t#A confession might move Baroness Scharknell; I'll admit my secret. \n\t\t*if gift = true\n\t\t\t\"Mermaids definitely exist, and I've seen one myself!\" You fish out the shell necklace once given to you by a mermaid child and hold it high above your head. \"This was given to me by a mermaid when I was just a child. And I saw a city, too! A mermaid city below the waves!\"\n\n\t\t\tThe Grand Royal Marinological Scholar peers at you. \"I see, I see,\" she murmurs.\n\n\t\t\tA fresh buzz arises from the crowd.\n\t\t\t*set credibility %+15\n\t\t\t*goto scharknell_hearing\n\t\t*elseif scar = true\n\t\t\t\"Mermaids definitely exist, and I've seen one myself!\" You bare your shoulder, exposing your scar. Gasps of shock echo from the lofty ceiling at your impropriety. \"I received this mark as a child, from a vicious mermaid. My memory is very clear on the subject.\"\n\n\t\t\tThe Grand Royal Marinological Scholar peers at you. \"I see, I see,\" she murmurs.\n\t\t\t*set credibility %+15\n\t\t\t*goto scharknell_hearing\n\t\t*else\n\t\t\t\"Mermaids definitely exist, and I've seen one myself!\" Your voice reverberates in the suddenly quiet room.\n\n\t\t\t\"Have you any proof?\" asks the Grand Royal Marinological Scholar.\n\n\t\t\tYou bow your head. \"No. I have no proof.\"\n\t\t\t*set credibility %-20\n\t\t\t*goto scharknell_hearing\n\t\t\n\t#Try to sway Lord von Tubingen via his research into legends.\n\t\t*set credibility %+15\n\t\t\"Such a body of legend must have some basis in reality,\" you say.\n\n\t\t\"Just so, just so!\" Lord von Tubingen nods vigorously. \"I've said as much myself on many an occasion!\"\n\t\t*set patron \"tubingen\"\n\t\t*goto patron_choice\n\n\t#Play to Mr. Fontana's sense of adventure.\n\t\t*set rigor %-15\n\t\t\"I think the search would be a grand undertaking, sure to bring glory to this august Society.\"\n\t\tMr. Fontana pounds the table with delight at your boldness. \"A sense of adventure!\" he crows. \"That's what I like to see in a scholar!\"\n\t\t*set patron \"fontana\"\n\t\t*goto patron_choice\n\n\n\t#As Miss Wellington might say, more research is needed.\n\t\t*set rigor %+15\n\t\tYou decide to leave your personal experiences out of it, for now. \"I don't have enough evidence to offer a legitimate opinion.\" You shrug helplessly.\n\n\t\tMiss Wellington nods once, sharply. \"An excellent scholar must keep an open mind in light of new evidence. It appears this matter is not yet settled definitively.\"\n\t\t*set patron \"wellington\"\n\t\t*goto patron_choice\n\n\n*label scharknell_hearing\n\nBaroness Scharknell's eyes are wide. \"What a daring thing to tell us,\" she says. \"I admire your candor more than I can say!\"\n*set patron \"scharknell\"\n*goto patron_choice\n\n\n*label patron_choice\n\n*if patron = \"wellington\"\n\t*set patron_title \"Miss\"\n\t*set patron_pronoun \"she\"\n\t*set patron_fname \"Isabella\"\n\t*set patron_surname \"Wellington\"\n\t*set patron_poss \"her\"\n\t*set patron_favor wellington\n\t*achieve wellington\n*if patron = \"scharknell\"\n\t*set patron_title \"Baroness\"\n\t*set patron_pronoun \"she\"\n\t*set patron_fname \"Aisha\"\n\t*set patron_surname \"Scharknell\"\n\t*set patron_poss \"her\"\n\t*set patron_favor scharknell\n\t*achieve scharknell\n*if patron = \"tubingen\"\n\t*set patron_title \"Lord\"\n\t*set patron_pronoun \"he\"\n\t*set patron_fname \"Charles\"\n\t*set patron_surname \"von Tubingen\"\n\t*set patron_poss \"his\"\n\t*set patron_favor tubingen\n\t*achieve tubingen\n*if patron = \"fontana\"\n\t*set patron_title \"Mr.\"\n\t*set patron_pronoun \"he\"\n\t*set patron_fname \"Adair\"\n\t*set patron_surname \"Fontana\"\n\t*set patron_poss \"his\"\n\t*set patron_favor fontana\n\t*achieve fontana\n*check_achievements\n*if (((choice_achieved_fontana and choice_achieved_tubingen) and choice_achieved_wellington) and choice_achieved_scharknell)\n\t*achieve allpatrons\n\n\nThe Grand Royal Marinological Scholar gazes at you for a long moment. \"I propose a solution to both of the questions facing us—this matter of mermaids, and of whether ${lastname} is truly suitable for joining our ranks.\"\n\nSandoval looks at you, a little uneasy about where this is headed. Not that you're feeling any more easy yourself. \n\nThe Grand Royal Scholar continues. \"Scholar ${lastname}, you will travel to Broken Shell Island with this man and investigate these claims of mermaids. This is only a provisional acceptance. What better way to determine if you are an asset or a detriment to the Royal German Marinological Society than to see how you perform in that role? At the same time, we can gather more information regarding this man's claims without placing the prestige of the Society itself at risk.\"\n\n${patron_title} ${patron_surname} rises from ${patron_poss} seat. \"Given the qualities of character I have witnessed today, I will take on ${lastname} as my protégé. With my patronage and guidance, I'm confident we can discover the truth of this matter with speed and discretion.\" \n\n*page_break\n\nYour breath catches as you realize the implications. You're in the Society! Well, very nearly. And with ${patron_title} ${patron_surname} as your patron, no less! All you have to do is go to Broken Shell Island with Sandoval and conduct a little field research on mermaids.\n\nThis should be a piece of cake. Or pie, if that's more your speed.\n\nAs the room empties out, Uncle Banjo rushes to your side. \"My little ${firstname},\" he says. His eyes are a bit wet. \"I was sure you'd never amount to anything, and look at you now!\"\n\nBefore you can reply, your new patron sweeps past you. \"I'll expect you for dinner at nine o'clock,\" ${patron_pronoun} says. \"Assuming you're free?\"\n\n*fake_choice\n\t#\"Yes, of course!\"\n\t#\"Certainly, thank you!\"\n\t#\"I'll cancel all my other plans!\"\n\n${patron_title} ${patron_surname} nods amiably. \"I'll see you then.\"\n\n*page_break\n\nWhen you turn back to him, Uncle Banjo pumps your hand in a vigorous shake. \"Just don't screw up this mermaid thing, and you'll be in the Society in no time! …You're not going to screw this up, right?\"\n\nYou're not. You are totally not going to screw this up. Probably.\n\n*if patron = \"fontana\"\n\t*goto fontana_training\n*if patron = \"wellington\"\n\t*goto wellington_training\n*if patron = \"scharknell\"\n\t*goto scharknell_training\n*if patron = \"tubingen\"\n\t*goto tubingen_training\n\n*label fontana_training\n*page_break\n\nMr. Fontana's home is a rambling stone manse nestled in a dense patch of woods just outside of town. His decorating tends toward taxidermy and works of art taken as souvenirs of his travels. His servants usher you into his dining room, where you find a feast laid out that is just as much of an adventure as anything in his memoirs: broiled peacock and wild boar, vegetables you have no name for, sea urchin and seaweed, desserts from five continents. He is a gentleman of varied and voracious appetites, after all. \n\nThrough the meal, he regales you with stories too ribald for his memoirs, until your ribs ache from laughing too hard.\n\nAfter dessert, a mischievous spark enters his eye. \"I have something to teach you,\" he says, gesturing with a glass of whiskey. \"About how I survive in even the most adverse conditions. Do you know what the secret is?\"\n\n*fake_choice\n\t#\"An innately high tolerance for discomfort and pain, perhaps?\"\n\t\tHe chortles. \"Would that it were so!\"\n\t\t*set patron_favor %+10\n\t#\"Your physique is legendary! Nobody else could perform your feats.\"\n\t\tHe laughs out loud, then flexes his arms by way of demonstration. \"A most flattering opinion, I must say!\" \n\t\t*set patron_romance +1\n\t\t*set patron_favor %+15\n\t#\"Muscle, I suppose, for when you're not clever enough to avoid a problem.\" \n\t\tHis moustache bristles with offense. \"I'll carry on as if you had not said that to me.\"\n\t\t*set patron_favor %-10\n*comment endif\n\n\"No, ${lastname}.\" He swirls the whiskey in his glass. \"The secret is conditioning of the body, to condition the mind! As long as you're my protégé, I insist you take up a regular course of swimming as exercise. I'll expect you every day for training from now until your ship leaves for Broken Shell Island. We begin at dawn!\"\n\n*if swimming > 2\n\tFontana scrutinizes your triceps through your sleeves. \"Though by the look of it, you've got a head start, eh? I think we'll make a brilliant team!\"\n\t*set swimming +2\n\t*set patron_favor %+10\n\t*goto chap2_end\n\n*set swimming +2\n*goto chap2_end\n\n*label tubingen_training\n*page_break\n\nLord von Tubingen lives in a cottage some distance from town. The furnishings are difficult to make out because the whole place is awash in books, scrolls, maps, and fluttering scraps of paper. His staff ushers you into his library, where you share a hearty repast of roasted chicken with potatoes, followed by strawberries and cream.\n\nAfterward, Lord von Tubingen stands before a roaring fireplace, thoughtfully sipping his tea. His eyes shine in the dim room. \"Much of a scholar's career is shaped by reputation, ${lastname}.\" He gazes into the flames for a long moment. \"Do you know how to establish an excellent reputation?\"\n\n*fake_choice\n\t#\"Surely by merit, through establishing a record of excellence?\"\n\t\t*set patron_favor %+10\n\t\t\"Hah, if only that were so!\" He winks at you. \n\t#\"Who could disbelieve someone as charming as you?\"\n\t\tA smile spreads slowly across his face. \"Charming as I am, you say? How delightful.\"\n\t\t*set patron_romance +1\n\t\t*set patron_favor %+15\n\t#\"By never getting caught in a lie, I suppose.\"\n\t\tHis eyes narrow. \"I'll assume you are not suggesting any particular person is a liar to begin with.\"\n\t\t*set patron_favor %-10\n*comment endif\n\n\"But no. The secret is confidence,\" he continues. \"If you comport yourself as if it were simply not possible that you wouldn't be believed, why, it's astonishing what an audience will take on faith. Here—stop by for tea every day until you leave, and I'll instruct you on bearing and countenance. Your powers of persuasion will become most keen! We begin tomorrow.\"\n\n*if credibility > 55\n\tLord von Tubingen pauses for a moment. \"I'd heard of you already, you know,\" he confides at last. \"Don't let it go to your head, but certain circles within the Society have been tracking your trajectory. Good things, my pupil. Good things are in store for you.\" And with that, he ushers you out of his home.\n\t*set credibility %+15\n\t*set patron_favor %+10\n\t*goto chap2_end\n\n*set credibility %+15\n*goto chap2_end\n\n*label scharknell_training\n*page_break\n\nBaroness Scharknell lives in a fashionable home in a fashionable part of town. It's seemingly all windows and chandeliers, and you feel a little shabby as you approach. Baroness Scharknell herself meets you at the door. \"I've arranged an impromptu soirée in your honor,\" she says, with a mysterious gleam in her eye. \"I want to show off my new protégé.\"\n\nTo the Baroness, however, an impromptu soirée means three hundred guests and six hours of dancing. She makes an endless chain of introductions, proudly putting you forward as her bright new star in the Society. \"Why, Scholar ${lastname} may be the Grand Royal Scholar one day,\" she says. \"And I'll get to say I had a part in making it happen!\"\n\nLater, she draws you into a quiet drawing room. \"${firstname}, do you know the secret to my success?\"\n\n*fake_choice\n\t#\"Is it…hard work and persistence?\"\n\t\tShe laughs softly. \"Oh, how sweet! And how very naive!\"\n\t\t*set patron_favor %+10\n\t#\"You're an exceptional woman. Success was inevitable.\"\n\t\tShe lays a soft hand on her cheek. \"Aren't you the most delightful for saying so?\"\n\t\t*set patron_romance +1\n\t\t*set patron_favor %+15\n\t#\"Just lucky, I guess?\"\n\t\tShe sniffs with disdain. \"Luck is for fools who lack the faculties to plan ahead.\"\n\t\t*set patron_favor %-10\n*comment endif\n*set introduction true\nShe takes an envelope from a nearby side table. \"No, the secret is quick action, my dumpling. Opportunity arises every hour of every day, and most of us are blind to possibilities we hadn't anticipated ahead of time.\" She folds the letter into your hands. \"And sometimes an introduction at the right moment can open a door that would otherwise be closed to you. Come back tomorrow night, and the night after. I'll show you how to limber your wits and improve your ability to react.\"\n\n*if persistence \u003c 45\n\t*page_break\n\tShe leans in close. \"Though I have to say, I already find your natural instincts positively charming. This is going to be such fun! I don't think I've enjoyed myself this much since the circus came to Venice!\"\n\t*set persistence %-20\n\t*set patron_favor %+10\n\t*goto chap2_end\n*set persistence %-15\n*goto chap2_end\n\n*label wellington_training\n*page_break\n\nMiss Wellington lives in a modest set of rooms above her laboratory, deep in the bowels of an industrial part of the city. Her apartments are narrow and sparing in furniture; the walls are stark white with no decoration. She greets you cordially, then brings you into her dining room for a private dinner. The m
