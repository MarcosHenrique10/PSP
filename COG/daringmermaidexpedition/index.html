 person you are!\"\n\n\"As will I,\" seethes Sandoval. \"You may as well go, since you don't care to be here. Go. Just go!\"\n\nYou slide out the door, wishing you could turn invisible. Maybe that should be your next item to research for the Society.\n*goto sandoval_cave\n\n*label peace_brokering\n\nYou have one last chance to try to sneak in a few words and maybe affect how this all turns out. What now, champ?\n\n*choice\n\t#Persuade Madame to forgive Sandoval.\n\t\t\"Stop, stop this at once!\" You raise your voice, and surprisingly, they both fall silent to hear what you have to say. \"Madame LeJeunesse, once upon a time you loved this man, and I believe you still do. Why else would you care to meddle in his affairs in this fashion? But I say it is time for you to accept Sandoval as he is, flaws and all. Forgive him, Madame. Forgive him and find peace within yourself.\"\n\t\t*if (madame > 55) \n\t\t\t*set ally \"both\"\n\t\t\t*goto peace\n\t\t*else\n\t\t\t*set ally \"sandoval\"\n\t\t\t*set enemy \"madame\"\n\t\t\t*goto madame_fail\n\n\t#Persuade Sandoval to forgive Madame.\n\t\t\"Stop, stop this at once!\" You raise your voice, and against all expectation, they both fall silent to hear what you have to say. \"Sandoval, once upon a time you loved this woman, and I believe you still do. Why else would her opinion so inflame you? And how can you blame her for disbelieving the evidence she has not seen with her own eyes? Forgive her, Sandoval. She does this only out of deep and enduring affection for you.\"\n\t\t*if (sandoval > 55) \t\t\n\t\t\t*set ally \"both\"\n\t\t\t*set enemy \"none\"\n\t\t\t*goto peace\n\t\t*else\n\t\t\tThe rage evaporates from Sandoval, leaving behind only a hollow, slack-faced emptiness. \"I see how it is,\" he murmurs. \"I'll just—I'll just continue my life's work on my own.\" \n\t\t\t*set ally \"madame\"\n\t\t\t*set enemy \"sandoval\"\n\t\t\t*goto sandoval_fail\n\n\t#Can't we all just get along?!\n\t\t*if (persistence > 50)\n\t\t\t*set sandoval %-10\n\t\t\t*set madame %-10\n\t\t\t\"There's no need for this to be hostile.\" You smile at all parties in what you hope is a conciliatory fashion. \"Look, we're all adults here—except Javel—and I'm sure we can resolve our differences if we just talk it out!\"\n\n\t\t\tMadame glowers with a ferocity rivaling the sun itself. \"I assure you, Scholar ${lastname}, if there were another way to beat sense into this man's thick—\"\n\n\t\t\tSandoval interrupts her. \"Of course you're so very superior to us, ${firstname}, that we would never have thought of simply talking it out without you here to tell us!\"\n\t\n\t\t\tThe two meet eyes, temporarily united in shared contempt for you, if nothing else. They deserve each other!\n\n\t\t\t\"I think we're done here,\" Sandoval says through his teeth.\n\n\t\t\t\"Indeed.\" Madame sniffs regally. Then the two of them stalk away together through those mahogany double doors, having found new common ground: their enmity for you.\n\t\t\t*set ally \"none\"\n\t\t\t*set enemy \"both\"\n\t\t\t*goto sandoval_cave\n\t\t*else\n\t\t\t\"Look at the two of you!\" You grab a hand from each of them and smack them together. \"I have never in my life met a pair more suited for each other than the two of you. Such, uh, strong personalities! Such energy! Surely you can put aside the past and move ahead with your future together. Mermaids, no mermaids, what's the difference? Let love conquer all!\"\n\n\t\t\tYou feel a little foolish once your grandiose speech is done. It was a little overblown, wasn't it? A bit too far on the side of melodramatic. Something more subtle might have worked. The silence drags on well into the awkward zone.\n\t\t\t*set ally \"both\"\n\t\t\t*set enemy \"none\"\n\t\t\t*goto peace\n\n\n\n*label peace\n*achieve lovebirds\n\n\"Could it be?\" Madame murmurs.\n\n\"I never thought…\" Sandoval trails off. Then he rushes into Madame's arms. \"Oh, how could we have been such fools?\" he cries.\n\n\"How could we let such petty things keep us apart?\" Madame adds. The two gaze upon one another with quivering, snuffly ardor, and then they kiss. The less said about the nature of this kissing the better. The crowd, however, claps and whistles enthusiastically. It seems having this pair together is better for the town than enduring them apart.\n\nThen the lovebirds turn toward you, hand in hand. \"I think perhaps we can find a way through this, thanks to you,\" Madame says. She dashes a stray droplet of emotion from the corner of her eye. \"I don't know how we can ever thank you for helping us to reconcile.\"\n\n\"You can be sure that we'll remember this,\" Sandoval adds. \"The Society will hear nothing but good of you from our lips.\"\n\nSo that's a happy ending. Or…well, you're not sure how much happiness per se will result from this, but at least they'll keep one another out of your hair from here on out. And a good thing. You have work to do, ${firstname}.\n*goto sandoval_cave\n\n*label escape\n\nIt's a close thing, and you nearly knock over a tray full of questionable pastries on your way out, but soon you find yourself scooting quietly through the double doors. Nobody seems to notice your departure. And so you are free and clear, striding back to your hut in the moonlight. What to do with this delicious newfound liberty?\n\n*choice\n\t#Check up on my contraption.\n\t\t*set persistence %+15\n\t\tYou don't quite trust your alarm—it's not like you've built devices such as this every day of your life. And you think you've done a good job in theory, but in practice…\n\n\t\tYou return to the beach and examine the structure to make sure it's all still in one piece and operating as designed. You hum to yourself as you reinforce lashings, tighten knots, test the strength of poles. When you're finally satisfied that everything is in perfect working order, you return to your hut for a well-earned nap.\n\t\t*goto rest\n\n\t#Begin to write up my findings.\n\t\t*set rigor %+15\n\t\tIt's a bit too soon to write up your conclusions, of course, but your monograph should have a robust section regarding your theories and methods. You spend the afternoon happily describing what you've done so far and what you hope will come out of it. History will be your judge.\n\n\t\tFinally, your mind drained of words, you lie down for a well-earned nap.\n\t\t*goto rest\n\n\t#Fabricate a little evidence.\n\t\t*set fake_evidence true\n\t\t*set rigor %-40\n\t\tIf this business with the intervention proves anything, it's that you can't stay here much longer. The people will drive you batty. You've got to come up with results, and fast. Even if that means a little exaggeration on your part. \n\n\t\tNo scholar is a perfect angel, yes? And you're not lying, so much as providing the truth with a little bit of a boost. You know mermaids are real, so what's the harm in going above and beyond to persuade the world? You craft an object from shells and shark's teeth. You'll call it a mermaid's bracelet; you can say one of them gave it to you personally on a chance encounter. None will ever be the wiser.\n\n\t\tFinally, your handiwork carefully concealed under your pillow, you lie down for a well-earned nap.\n\t\t*goto rest\n\n*label rest\nYou doze in the heat of the late afternoon in relative calm, though for a time you are disturbed by terrible, inhuman shouting from the direction of town. \n*set bloodloss -2\n*if bloodloss \u003c 0\n\t*set bloodloss 0\n\t*goto rest_2\n*else \n\t*goto rest_2\n\n*label rest_2\n*set dream true\nYou can all but feel your hurts, physical or metaphysical, resolving. A sense of peace settles over you. Of optimism.\n\nAnd then you begin to dream.\n\nYour dreams are a muddled mess of fear and possible futures. In one, you have a glorious career in the Royal German Marinological Society; in another, you find yourself in prison, or signing autographs, or sailing toward the open sea on a brisk wind. You see yourself arguing with ${patron_title} ${patron_surname}. Or kissing.\n\nYou wake drenched in sweat. This can't go on forever. The clock is ticking, ${firstname}.\n\n*finish\n\n*label sandoval_cave\n\n*page_break\nLater, you find Sandoval in a cave in the cliffs by the ocean. It's surprisingly dry and pleasantly cool; the opening has a stunning view of the horizon. The walls and floor are black with ash. As your eyes adjust to the darkness, you start to make out bits and pieces left from a long-ago fire. Here, the collapsed boards that used to be a shelf; there, a molten lump of metal.\n\n*if rigor > 50 \n\t*set evidence +1\n\t*set singednote true\n\tYou nudge at a jumble of refuse with one foot and uncover a clean, undamaged page. It's one of Sandoval's observations, somehow not ruined with all the rest in the fire. The paper is covered with a cramped, spidery handwriting, and it reads: \"Mermaids on average six to eight feet in length, tails rather longer than human legs. Fin span estimated equal to arm span in most cases…\"\n\n\tYou call Sandoval over and hand him the scrap. \"Look, I found something!\"\n\n\t*if ally = \"madame\"\n\t\tHe scowls. \"Garbage. Useless, just like all of the years I spent researching—all the time I spent courting Blandine!\"\n\t\t*goto cave_angry\n\n\t*else\n\t\tHe holds it gingerly in both of his hands, as if weighing it, and then presses it back upon you. \"Perhaps this can still help you,\" he says, mournfully. \"I love her, you know. I don't know how I can carry on knowing Blandine loathes everything I cherish!\" His bald pate glows in the moonlight like a priceless pearl. \"Perhaps—perhaps I must change for her.\" \t\t\n\t\t*goto cave_ally\n\n*else\n\n*if enemy = \"sandoval\"\n\t*goto cave_angry\n*if enemy = \"both\"\n\t*goto cave_angry\n*else\n\t\"This was where it all was,\" he says mournfully. \"My careful years of observation.\"\n\t*goto cave_ally\n\t\n*label cave_ally\n\nYou hear a strange snuffling sound coming from the back of his throat. Gradually you realize that Sandoval is crying. \"Farewell, my beauties of the sea,\" he whimpers. \"Farewell, my life's work. If this is what it takes to be with my angel, my magnificent Blandine…\" he snuffles again.\n\nYou excuse yourself and go back to your hut; this looks to be a private moment for him. As for you, there's work yet to do. And the clock is ticking.\n*finish\n\n*label cave_angry\nHe wheels in place and gesticulates wildly at the wreckage of his once-office. \"This is what happened to me because of people like you!\" he shouts. \"Everything I ever worked toward, turned to ashes. The mermaid research, my love for Blandine? Burned and gone, all of it. Are you happy? Are you glad to see me reduced to this pitiful nothing of a man?\"\n\nHe turns away. \"Go. Just go. You've done enough.\"\n\nYou leave him in silence, since any other course would only make it worse. As for you, there's work yet to do. And the clock is ticking.\n*finish", "7_surprise": "In the aftermath of that nonsense with Madame and Sandoval, you expect a bit of calm; just another day checking your equipment, taking notes, walking along the beach. The peace will be more than welcome after yesterday's excitement. Then Javel appears, pelting toward you as though shot from a cannon. \"${firstname}! ${firstname}, there's news! There's somebody here for you! A—a visitor!\" \n\nA visitor? For you? Ridiculous! There must be some mistake. Who could possibly have come for you? Uncle Banjo wouldn't want to visit you in such a remote location, one so lacking in basic conveniences like casinos and hot chocolate parlors. And nobody else really knows you're here, except…except…\n\n${patron_title} ${patron_fname} ${patron_surname} sweeps into view. \"Good afternoon,\" ${patron_pronoun} says. \n\n*if patron = \"wellington\"\n\tShe carries a parasol to protect her fair skin from the sun of this clime, but is otherwise exactly as buttoned-up and somber as last you saw her. She regards you with infinitely unreadable eyes. \"${lastname},\" she nods cordially. \"This certainly is an…interesting…home you've chosen for yourself. And I hear you've had some trouble with pirates and the like. Intolerable! I trust you received my letter and have your final report prepared?\"\n\n\t*goto patron_greeting\n\n*if patron = \"fontana\"\n\tFontana bounds up and shakes your hand with vigor. His palm is hot and slightly damp, and his hair is curling up behind his ears in winsome wings. \"Lovely island! Charming people! And I hear you've fallen in with pirates? How marvelous! I knew from the moment I saw you that you were going to be a scholar for the ages! I said as much in my letter—you got my letter, of course, and you have your final report prepared.\"\n\n\t*goto patron_greeting\n\n*if patron = \"scharknell\"\n\tBaroness Scharknell's curls are impeccable even after a long sea voyage, and her skin gleams a perfect deep brown in the tropical sunlight. She extends a hand to you, and you take it in yours and bow your head politely. \"What a quaint situation you've found yourself in,\" she murmurs. \"We have so very much to talk about. I trust my letter reached you safely, and you have your final report prepared?\" \n\n\t*goto patron_greeting\n\n*if patron = \"tubingen\"\n\tLord von Tubingen is wearing a garish floral shirt completely at odds with his dignified persona; apparently he loosens up quite a bit when he travels. He ambles toward you, hands in his pockets. \"${lastname}, good to see you! You'll have quite the story to tell when you return home again, eh? Pirates, no less! You, ah, you'll have read my letter, naturally, and you have your final report prepared.\"\n\t*goto patron_greeting\n\n\n*label patron_greeting\n*if tirade = true\n\tIs it your imagination, or do you see a flash of resentment in ${patron_poss} eyes?\n\t*goto report\n\n*if love_confession = true\n\tIs it your imagination, or is ${patron_poss} smile far warmer than the moment strictly requires?\n\t*goto report\n*else\n\t*goto report\n\n*label report\nNeedless to say, you have received no letter requesting a final report, much less one that suggested a visit from your patron was in the works, much much less that it was all immediately imminent! And you certainly don't have a final report ready—you don't even have a result yet! Better think fast, ${firstname}.\n\n*choice\n\t#Apologize for my lack of preparation.\n\t\t*goto sorry\n\t\t\n\t#Insist I received no such letter.\n\t\t*goto denial\n\t\t\n\t#Embrace ${patron_title} ${patron_surname} warmly!\n\t\t*goto personal\n\n\t*if (tirade = true) #Apologize for the contents of my last letter.\n\t\t*goto tirade\n\t\t\n\n*label tirade\nAh, yes, that late-night tirade of yours. Perhaps the degree of honesty you expressed was…regrettable. \"I sent a letter,\" you say cautiously. \"Did you receive it? I wanted to apologize. The thing is…\"\n\n*if rigor \u003c 45\n\t*set patron_favor %+10\n\t${patron_title} ${patron_surname} nods slowly. \"You must mean that distasteful rant of yours. Well. The pressures of field work can be considerable,\" ${patron_pronoun} says. \"I accept your apology, and we'll speak of it no more.\"\n\t*goto activity_choice\n\n*else\n\t*set patron_favor %-10\n\t${patron_title} ${patron_surname}'s eyes narrow. \"Ready with an excuse and empty apologies, are you? I suspected as much. But now, about that report?\" ${patron_surname} raises an eyebrow.\n\n\tYou stutter an answer, but no actual real words cross your lips.\n\n\t\"I see. You have nothing. I suppose I should have guessed.\"\n\t*goto activity_choice\n\n\n*label personal\nYou hesitate. \"I don't have a final report yet, but I can't tell you how wonderful it makes me feel to see you again.\" You step forward to capture ${patron_title} ${patron_surname} in your arms—or is ${patron_fname} more fitting, now?\n\n*if patron_favor > 55\n\t*set patron_romance +1\n\t*set patron_favor %+10\n\t${patron_fname} tenses for a moment, the breath catching in ${patron_poss} throat. Then ${patron_pronoun} relaxes and spreads ${patron_poss} hands on your shoulder blades. \"It's particularly lovely to see you, too, ${firstname},\" ${patron_pronoun} murmurs. Then ${patron_pronoun} sighs and steps back to straighten ${patron_poss} clothes. \"I'm here primarily for Society business, alas. If you don't have a final report, then what do you have to show me?\"\n\t*goto activity_choice\n*else\n\t*set patron_favor %-10\n\tAs you draw near, ${patron_surname} flinches and steps back out of your reach. \"I'm here on strictly professional business,\" ${patron_pronoun} says, a bit too loudly. \"You may not have your final report, but you must have something. Let's begin our work, shall we?\"\n\t*goto activity_choice\n\n*label denial\n*if credibility > 60\n\t*set patron_favor %+15\n\t\"What! I'm sorry,\" you clap a hand to your heart in unfeigned shock. \"I received no such letter, and I'm afraid I wasn't expecting you! Certainly I have no final report prepared so soon.\"\n\t\t\n\t${patron_title} ${patron_surname} purses ${patron_poss} lips. \"Regrettable,\" ${patron_pronoun} says. \"Then we'll make do with what you have. Show me your progress, and we'll make the best of it.\"\n\t*goto activity_choice\n*else\n\t*set patron_favor %-15\n\t\"So soon? Why, I've only been here for a few days! How could I have a final report when my research has just begun? And anyway, I didn't receive any such letter from you!\"\n\n\t${patron_title} ${patron_surname} listens to your excuses with thinly veiled incredulity. \"It is a sign of poor moral fiber for a scholar to blame his or her shortcomings on another party, particularly one so famously reliable as the postal service.\"\n\t*goto activity_choice\n\n*label sorry\n*if (persistence \u003c 40)\n\t\"I'm so terribly sorry, ${patron_title} ${patron_surname}! I wasn't expecting you so soon, and I don't have such a report to show you!\" Your face shines with sincerity and regret.\n\n\t${patron_surname}'s brow furrows. \"Is that so? How unfortunate. Well, the Society understands that sometimes the course of research does not run smooth. Just show me what you have so far, and we'll see what can be done.\"\n\t*set patron_favor %+15\n\t*goto activity_choice\n*else\n\tYou panic. \"I'm not ready!\" you blurt. \"It's too soon! I've only just arrived here. How could the Society think I would have a final report as quickly as this?\"\n\n\tYour patron grimaces with obvious distaste. \"The academic life isn't meant for the slow-paced nor the slow-witted. But you must have something to show for your time here, yes?\"\n\t*set patron_favor %-15\n\t*goto activity_choice\n\n*label activity_choice\nRight. Right. You take a deep breath. You aren't necessarily being called back to make a full report to the Society today, thankfully! But you should probably offer up some proof of your progress to prove you're not just wasting Society time and money. Your mind races. Are you confident that you can make a good case to ${patron_surname}? \n\n*choice\n\t#Conduct an evidence review for ${patron_surname}.\n\t\t*goto review\n\t\t\n\t#To Crab Corner, to show off the device!\n\t\t*goto crabcorner\n\t\t\n\t#Stall for time.\n\t\t*goto stall\n\n\t#Somewhere…romantic?\n\t\t*goto romantic_walk\n\n*label review\nAh, yes. Straight to business, that's the best way to acquit yourself in a professional and appropriate fashion. You take ${patron_surname} to your entirely unsuitable abode to lay out your progress to date, as measured in cold, hard evidence.\n*if evidence = 0\n\tWhich means…you have nothing. You sit on your rickety bed and motion for ${patron_surname} to take the rickety chair at your desk. You lean forward, hands on your knees. \"The thing is,\" you say earnestly, \"I've come up with no evidence at all. And not for lack of trying! This is turning out to be quite a difficult task. Then again, if it were simple, the Society would have reached a conclusion regarding the mermaid question years ago.\"\n\n\t${patron_surname} nods thoughtfully. \"Perhaps we haven't given enough thought to the enormity of the task,\" ${patron_pronoun} says.\n\t*if inflation = true\n\t\tThen ${patron_poss} eyes darken. \"But wait—I thought you were close to the edge of a breakthrough. From the sound of your recent letter, I thought that you—\"\n\n\t\t\"That was perhaps an overly charitable interpretation of my work,\" you say, after a delicate pause. Your joints feel weak. Your stomach begins to throb. Your brain begins to feel as though it were inflated with bees.\n\n\t\t\"I see. This has been a waste of my time, then.\" ${patron_surname} stands, giving you only a sharp nod by way of dismissal. \"I suppose I'll see you this evening, at the banquet.\"\n\t\t*set credibility %-30\n\t\t*set patron_favor %-25\n\t\t*goto banquet\n\t*else\n\t\tThen ${patron_pronoun} rises with a heavy sigh. \"There's time yet to make a discovery. I suppose the Society will have to be patient, as will I. In the meanwhile, I'll see you this evening at the banquet.\"\n\t\t*goto banquet\n*else\n\tYou lay out what you've found to date, such as it is, describing your adventures and your methods as best you can. \"On reflection, the question of the existence of mermaids is a long-standing problem, and it was naive to expect a hasty and conclusive result,\" you say. \"I assure you that my evidence is by no means exhaustive, but I feel well on my way toward building a very respectable case.\"\n\n\t\"I see, I see,\" ${patron_pronoun} nods thoughtfully. \"It's good to see you making such solid effort, even if it has not yet borne fruit.\"\n\t*if inflation = true\n\t\t*set credibility %-30\n\t\t*set patron_favor %-25\n\t\tThen ${patron_poss} eyes darken. \"But wait—I thought you were close to the edge of a breakthrough. From the sound of your letter, I thought that you—\"\n\n\t\t\"That was perhaps an overly charitable interpretation of my work,\" you say, after a delicate pause. Your joints feel weak. Your stomach begins to throb. Your brain begins to feel as though it were inflated with bees.\n\n\t\t\"I see. This has been a waste of my time, then.\" ${patron_surname} stands, giving you only a sharp nod by way of dismissal. \"I suppose I'll see you this evening, at the banquet.\"\n\t\t*goto banquet\n\t*else\n\t\tThen ${patron_pronoun} rises with a heavy sigh. \"There's time yet to make a discovery. I suppose the Society will have to be patient, as will I. In the meanwhile, I'll see you this evening at the banquet.\"\n\n\t\t*goto banquet\n\t\t\n*label crabcorner\nPerfect! Rather than account for your evidence—and no amount of evidence would be strictly satisfactory at this point—it will be far better to show the concrete and physical effort you've made toward actually laying your hands on a living mermaid. You lead your patron down the path toward the beach, and then pick your way along the rocky outcropping to Crab Corner and your mermaid contraption.\n*if method = \"basket\"\n\tYou proudly show off the baited mermaid-sized basket, the hinge that snaps it shut, the winch to haul it up, the alarm that will alert you in the event that your trap goes off.\n\t*if patron = \"tubingen\"\n\t\t*goto patron_disagree_device\n\t*if patron = \"scharknell\"\n\t\t*goto patron_disagree_device\n\t*else\n\t\t*goto patron_agree_device\n*if method = \"hooks\"\n\tYou proudly point out the near-invisible silhouette of the nets in the water, the alarm to notify you that your prey has been captured. You even prick your finger on one of the hooks to demonstrate how sharp it is.\n\t*if patron = \"tubingen\"\n\t\t*goto patron_disagree_device\n\t*if patron = \"scharknell\"\n\t\t*goto patron_disagree_device\n\t*else\n\t\t*goto patron_agree_device\n*if method = \"net\"\n\tYou proudly point out the near-invisible silhouette of the nets in the water, the alarm to notify you that your prey has been captured. You even pull a corner of the net up to show how tight the knots are, and how strong the fibers.\n\t*if patron = \"tubingen\"\n\t\t*goto patron_disagree_device\n\t*if patron = \"scharknell\"\n\t\t*goto patron_disagree_device\n\t*else\n\t\t*goto patron_agree_device\n*if method = \"ritual\"\n\tYou proudly show off your message to the mermaids and explain the translation, then you demonstrate the way a mermaid is meant to alert you to her presence via that jangling rope.\n\t*if patron = \"tubingen\"\n\t\t\"I got the idea from a book you sent along with me,\" you tell Lord von Tubingen, a bit bashfully. \n\n\t\tHe startles. \"Is that so! I am delighted to have assisted in this effort, then!\"\n\t\t*goto patron_agree_device\n\t*if patron = \"scharknell\"\n\t\t*goto patron_agree_device\n\t*else\n\t\t*goto patron_disagree_device\n*if method = \"bacon\"\n\tYou proudly show off the pile of fragrant bacon, the alarm with its trailing rope pull so that a mermaid could summon you at any time. \"Every day, I put this into the water and lay out some new bacon on the rocks,\" you explain. \"They're sure to find it soon!\"\n\t*if patron = \"tubingen\"\n\t\t*goto patron_agree_device\n\t*if patron = \"scharknell\"\n\t\t*goto patron_agree_device\n\t*else\n\t\t*goto patron_disagree_device\n*if method = \"bait\"\n\tYou proudly show off the flowers, the fish, the shells. \"I put some of the old flowers in the water and lay out fresh bait every day,\" you explain. \"They're sure to find it soon!\"\n\t*if patron = \"tubingen\"\n\t\t*goto patron_agree_device\n\t*if patron = \"scharknell\"\n\t\t*goto patron_agree_device\n\t*else\n\t\t*goto patron_disagree_device\n\n*label stall\n*set loyalty %-10\n*if inflation = true\n\tThere's no use jumping the gun. Now that ${patron_surname} knows you were caught off guard, any damage is done, and there's no point wrapping the tatters of your progress around you and calling it a scholar's robe. Instead, you smile apologetically. \"I really feel it best not to leap to any hasty conclusions. An academic shouldn't be hasty, don't you agree? And you've had a long voyage to get here. You should really rest and gather your strength. We can talk about my research later on.\"\n\n\t${patron_title} ${patron_surname}'s eyebrows draw together. \"But your letter—you said you were close to a significant breakthrough! I must insist I see your progress. I'm much too excited about what you've done here to possibly rest!\"\n\n\tYou flounder for a response, but the look on your face is enough for your patron to draw a correct and extremely unflattering conclusion. \"Ah,\" ${patron_pronoun} says quietly. \"Then there's nothing at all here for me to see. Well! I suppose we'll run into one another again at the banquet this evening.\"\n\n\t*set credibility %-30\n\t*set patron_favor %-25\n\t*goto banquet\n*if rigor \u003c 50\n\tThere's no use jumping the gun. Now that ${patron_surname} knows you weren't expecting ${patron_pronoun}, any damage is done, and there's no point wrapping the tatters of your progress around you and calling it a scholar's robe. Instead, you smile apologetically. \"I really feel it best not to leap to any hasty conclusions. An academic shouldn't be hasty, don't you agree? And you've had a long voyage to get here. You should really rest and gather your strength. We can talk about my research later on.\"\n\n\t${patron_surname} smiles in return. \"Come to think of it, I could use a bit of rest. Very well. I'll see you at the banquet this evening.\" \n\t*set patron_favor %+15\n\t*goto banquet\n*else\n\t*set patron_favor %-15\n\tYou're not ready for this! But how to get out of it? You hop from one foot to another nervously. \"I'm sure you must be exhausted,\" you say. \"Why don't you have a bit of rest? I'm sure you must have accommodations somewhere in town, somewhere else.\"\n\n\t${patron_title} ${patron_surname} gives you a long, silent look. But though it is silent, this is a look with many layers and textures to it, and it speaks volumes regarding your patron's unhappiness, ${patron_poss} ability to see right through your transparent attempt to avoid an accounting of your work, and the steady lowering of opinion in one who was not so long ago your best champion. But \"I see,\" is all ${patron_pronoun} says. \"We'll speak to one another later this evening, then, at the banquet.\"\n\t*goto banquet\n\n\n\n*label romantic_walk\n\nWork is all well and good, but you can talk about your research in correspondence. Right now matters of the heart are topmost on your mind. Your heart, and ${patron_title} ${patron_surname}'s. \"I really can't put words to how happy I am to see you.\" You configure your face into a cheerful and hopefully endearing arrangement. \"I—I could never focus on my research with you here to distract me. Would you like to spend a bit of time together? Just…getting to know one another a bit better?\"\n\n*if patron_favor > 55\n\t${patron_fname} rests a hand on your forearm. \"Do you know, I would really enjoy that.\" You lead the way to a picturesque spot overlooking the sea, and the two of you watch the tide rolling in. You speak at first of small things: the weather, the voyage here. Then you move on to more personal matters: favorite books, private opinions of the Grand Royal Scholar, amusing anecdotes from your studies. And then you just sit together in companionable and deeply contented silence.\n\n\tAt last ${patron_fname} stirs. \"As charming as you are, I'm afraid I must ready myself for the banquet this evening. I'll see you there, yes?\"\n\n\t\"Of course! I would never miss it.\" You make your way back to your rickety hovel with a new spring in your step.\n\t*set patron_romance +1\n\t*goto banquet\n*else\n\t*if inflation = true\n\t\t${patron_fname}'s eyebrows draw together. \"But your letter—you said you were close to a significant breakthrough! I must insist I see your progress immediately. I'm much too excited about your work to wait another moment!\"\n\n\t\tYou flounder for a response, but the look on your face is enough for your patron to draw a correct and extremely unflattering conclusion. \"Ah,\" ${patron_pronoun} she says quietly. \"Then there's nothing at all here for me to see. Well! I suppose we'll run into one another again at the banquet this evening.\"\n\t\t*set credibility %-30\n\t\t*set patron_favor %-25\n\t\t*goto banquet\n\t*else\n\t\t${patron_surname}'s eyebrows draw together in confusion. \"I'm not sure quite what you mean. Are you saying you simply have nothing to show me?\"\n\t\t\n\t\t\"No, I've been working very hard,\" you insist. \"It's just that I felt that we—I mean, you and I—\"\n\n\t\tYour patron shakes ${patron_poss} head in undisguised exasperation. \"I don't know what they're teaching in your academy these days,\" ${patron_pronoun} says, \"but when one's patron visits one to check on one's progress, a scholar should not be too forward, nor too…affectionate. I think I should be going, ${lastname}. We'll meet again this evening at the banquet.\"\n\t\t*goto banquet\n\n\n*label patron_agree_device\n\n${patron_fname} surveys your handiwork with great interest, even going so far as to test the alarm personally. \"This is extremely impressive, ${firstname}!\" ${patron_pronoun} says. \"Very inventive, and definitely in keeping with the Society's spirit. I must say, I'm quite impressed by what you've come up with here. I can't say I would have thought to do the same myself!\"\n\nYou puff up a bit with pride. \"I'm just doing the best I can,\" you say, modestly.\n\n${patron_fname} crouches down and runs a hand through the water. \"I'm glad I supported you during your hearing,\" ${patron_pronoun} says at last. \"I have no cause to regret it, I think. This project is in good hands.\" Finally ${patron_pronoun} stands and brushes ${patron_poss} fingers dry. \"I should be on my way to ready for the banquet this evening. I'll see you there, yes?\"\n\nBanquet? The first you've heard of it, but all you say is \"of course.\"\n\n\"Very good.\" And then ${patron_title} ${patron_surname} makes ${patron_poss} way back toward Broken Shell Town, leaving you alone with your momentarily embiggened ego.\n*set patron_favor %+20\n*set credibility %+20\n*goto banquet\n\n*label patron_disagree_device\n\n${patron_fname} surveys your handiwork with growing dissatisfaction, even going so far as to test the alarm personally. \"What in the world were you thinking, ${lastname}?\" ${patron_pronoun} says at last. \"Have you no sense? Are you serious about this matter of mermaids, or are you content to play at being a scholar while completely dishonoring the spirit of what it means to be a part of the Royal German Marinological Society?\"\n\nYou deflate rapidly. \"I'm just doing the best I can,\" you say, desperately.\n\n${patron_fname} crouches down and runs a hand through the water. \"I wonder now if I should have supported you during your hearing,\" ${patron_pronoun} says at last. \"If I hadn't, this matter might have gone into better, more experienced hands than yours.\" Finally ${patron_pronoun} stands and brushes ${patron_poss} fingers dry. \"I should be on my way to ready for the banquet this evening. I suppose I'll see you there.\"\n\nBanquet? The first you've heard of it, but all you say is \"of course.\"\n\n\"Very good.\" And then ${patron_title} ${patron_surname} makes ${patron_poss} way back toward Broken Shell Town, leaving you alone with a lingering fear for the future.\n\n*set patron_favor %-20\n*set credibility %-20\n\n*label banquet\n\nThe banquet ${patron_title} ${patron_surname} spoke of is in honor of ${patron_poss} arrival, prepared in Town Hall by the irrepressible Madame LeJeunesse. And oh, has Madame outdone herself. The leavings from Sandoval's intervention have been cleared away, the banner and paltry coffee service vanished.\n\nThe room is full of candles, now, in elaborate candelabras stationed at far intervals. They lend the proceedings a pleasing golden hue, as if it were occurring on a softer, less cruel plane of existence than your own. The folding chairs are gone, replaced by tables draped in white cloth and full of glittering tableware: crystal, silver, plates made of a china so fine you can almost see right through it. \n\nYou have a few minutes to collect yourself before the party begins in earnest. How to spend them?\n\n*fake_choice\n\t#Make a beeline straight for ${patron_surname}.\n\t\tThere's no time to waste—precious seconds of valuable time are ticking by that you could be spending impressing your patron! You make your way to ${patron_title} ${patron_surname}'s side. \n\t#Take one last look in the mirror.\n\t\tYou look fine, ${firstname}. Relax. It's not like the Royal German Marinological Society is a beauty pageant, anyway! You straighten your cuffs and make your way over to ${patron_title} ${patron_surname}, like a good little protégé.\n\t#Fetch some punch!\n\t\tAh, buttering up your patron with attentive service. It's not cunning or mercenary, it's just good sense! You ladle two cups full of the mysteriously fizzy beverage, making sure to put a lime wedge and a strawberry in each one, and then you make your way toward ${patron_title} ${patron_surname}.\n\nYour patron nods absently, observing the populace of Broken Shell Island, each turned out in their highly variable finest. \"I haven't yet been properly introduced to your neighbors here,\" ${patron_surname} observes. That's probably a bit of a hint that you should make some introductions. But to whom?\n\n*choice\n\t#Sandoval.\n\t\tYou steer ${patron_surname} toward Sandoval. His bald head glows in the candlelight, as if he were himself made of brass. He bobs nervously as you approach. \"I believe the two of you met briefly before, but allow me to formally introduce you,\" you say.\n\n\t\tSandoval bows so elaborately that you fear he will execute some impromptu tumbling, but at the last moment he rights himself. \"The pleasure is all mine,\" he says.\n\n\t\t\"And how,\" asks ${patron_title} ${patron_surname}, \"do you feel our ${firstname} ${lastname} is doing here on Broken Shell Island?\"\n\n\t\t*if ally = \"sandoval\"\n\t\t\t*goto sandoval_compliment\n\t\t*if ally = \"both\"\n\t\t\t*goto reconciliation\n\t\t*if enemy = \"sandoval\"\n\t\t\t*goto sandoval_insult\n\t\t*if enemy = \"both\"\n\t\t\t*goto both_insult\n\t\t*else\n\t\t\t*goto sandoval_meh\n\t\t\n\t#Madame LeJeunesse.\n\t\tMadame positively fluoresces with excitement as you and your patron approach. \"How delightful to meet you in person! Such an honor! I do hope you enjoy our hospitality; I think you'll find it's as fine as any in the world!\" She curtsies enthusiastically, causing several close bystanders to wince at the terrifying creaking noises emitted by her corset.\n\n\t\t${patron_title} ${patron_surname} nods patiently. \"And in your opinion, how is ${firstname} getting on here?\"\n\t\t*if ally = \"madame\"\n\t\t\t*goto madame_compliment\n\t\t*if ally = \"both\"\n\t\t\t*goto reconciliation\n\t\t*if enemy = \"madame\"\n\t\t\t*goto madame_insult\n\t\t*if enemy = \"both\"\n\t\t\t*goto both_insult\n\t\t*else\n\t\t\t*goto madame_meh\n\n\t#Javel.\n\t\tYou spot Javel lingering by a table of praline-stuffed strawberries, shoving them into ${javel_poss} mouth in great handfuls. You might expect Javel's parents to be present for once, but they are nowhere to be seen. As far as you can tell, anyway! It's not like you've ever met them. \n\n\t\tYou bring your patron to meet Javel. \"I'd like to make an introduction!\"\n\n\t\tJavel stares at the two of you, eyes wide and face covered in strawberry slime. \"I didn't do it!\" ${javel_pronoun} insists. Then ${javel_pronoun} grabs two more enormous fists full of strawberries and bolts for the door.\n\n\t\t\"And this is the manner of person you're associating with here on Broken Shell Island?\" ${patron_surname} sounds a bit skeptical about your wisdom.\n\n\t\t\"This is the manner of person to be found on Broken Shell Island,\" you say, \"whether I choose to associate with them or not.\"\n\t\t*goto no_intro_check\n\n\n\t#Nobody.\n\t\t*if rigor \u003c 50\n\t\t\tYou shake your head almost imperceptibly. \"There's nobody here you'd care to meet,\" you murmur. \"The citizens of this island are colorful, but a bit…uncultured.\" ${patron_title} ${patron_surname} seems faintly disappointed, and Madame and Sandoval both look to you expectantly, but you neatly steer your patron free of their interfering clutches.\n\n\t\t\tInstead you engage ${patron_surname} in an extensive conversation about the relative merits of various types of ink and paper for use in a diverse array of purposes and environments. It turns out that ${patron_pronoun} feels very strongly that Prof. Morticia Lu-Pan's Correctible Permanent Ink is excellent for outdoor uses in hot climates, but Cliopoulos & Bros. Lasting Pigments are the way to go for indoors, and for sketching. You make a note of the fact. Who knew one could hold such strong opinions regarding writing equipment, of all things?\n\t\t\t*goto walk\n\t\t*else\n\t\t\t*set patron_favor %-5\n\t\t\tYou shake your head almost imperceptibly. \"There's nobody here you'd care to meet,\" you murmur. The citizens of this island are colorful, but a bit…uncultured.\" ${patron_surname} seems a little disappointed. You try to steer your patron free of the clutches of Madame and Sandoval, and for a time you think you'll succeed. But in this as in many other things, you are doomed to humiliating failure.\n\t\t\t*goto no_intro_check\n\n*label no_intro_check\n*if enemy = \"sandoval\"\n\t*set patron_favor %-10\n\tSandoval sees the two of you bent together in conversation from across the room and hastens over to make his opinions known to ${patron_surname}. \"You must listen to me!\" Sandoval shoots you a cutting look. \"You should know that your ${lastname} is nothing but an intellectual fraud! An arrogant blowhard! You should be ashamed to have such a person associated with the Royal German Marinological Society!\"\n\n\tYour patron's eyes widen. \"I see.\"\n\n\tYou nod at Sandoval, holding on to your civility for all you're worth. \"Thank you for your opinion. Now if you'll excuse us.\" And then you steer your patron away.\n\t*goto walk\n*if enemy = \"madame\"\n\t*set patron_favor %-10\n\tAnd then Madame sees you bent together in conversation from across the room and hastens over to make her opinions known to ${patron_surname}. \"I must have words with you!\" Madame's eyes flash like a guttering lantern. \"You should know that I've found ${lastname} to be nothing but an unreliable snake. A weasel! You should be ashamed to have such a person associated with the Royal German Marinological Society!\"\n\n\tYour patron's eyes widen. \"I see.\"\n\n\tYou nod at Madame, holding on to your civility for all you're worth. \"Thank you for your opinion. Now if you'll excuse us.\" And then you steer your patron away.\n\n\t*goto walk\n*if enemy = \"both\"\n\t*set patron_favor %-20\n\tTry as you might, it's impossible to avoid both Sandoval and Madame forever. Eventually the two descend upon you at once, like seagulls upon an abandoned crumpet. Madame corners ${patron_title} ${patron_surname}, an unsavory gleam in her eye. \"You should know the terrible things ${lastname} has been doing in the name of the Society,\" she says.\n\n\tSandoval is, surprisingly, of a single mind with Madame on this matter. \"A joke! A muckraker! Not worthy of the robes of the Society!\" He stares hard at you, his nose quivering with rage. \"And such rudeness like I have never seen in my life. And I have seen rudeness, I assure you!\"\n\n\tYour patron takes this in with surprise and no small bit of concern. \"How troubling to hear,\" ${patron_poss} says, giving you a sidelong look.\n\n\tYou nod at Sandoval and Madame, holding on to your civility for all you're worth. It certainly wouldn't do to lose your temper and prove these people right! \"Thank you for your opinion,\" you say. \"Now if you'll excuse us.\" And then you steer your patron away from their poison words.\n\t*goto walk\n*else\n\t*goto walk\n\n*label madame_compliment\n*set patron_favor %+20\n\n\"${firstname} has been such a joy! Such a delight! The very picture of a scholar! I'm sure you'll be amazed when you see the results of this mission!\" You begin to fear Madame is going to shower you with kisses, such is her enthusiasm. Just in case, you start shifting slightly further away.\n\n\"How delightful,\" ${patron_surname} beams. \"It's always charming to hear when one of our own is a credit to the Society.\" A warm glow fills your heart. This is going so well!\n\n*if enemy = \"sandoval\"\n\t*set patron_favor %-10\n\tAlas, Sandoval notices the three of you bent together in conversation from across the room and hastens over to make his opinions known to ${patron_surname}. \"Don't listen to a word this harpy says to you!\" Sandoval shoots Madame a cutting look. \"I've found ${lastname} to be nothing but an intellectual fraud! An arrogant blowhard! You should be ashamed to have such a person associated with the Royal German Marinological Society!\"\n\n\tYour patron's eyes widen. \"I see.\"\n\n\tYou nod at Sandoval, holding on to your civility for all you're worth. \"Thank you for your opinion. Now if you'll excuse us.\" And then you steer your patron away.\n*goto walk\n\n*label madame_insult\n*set patron_favor %-20\n\nMadame lowers her voice. \"I had hoped to speak to you privately,\" she says, \"but to be honest? I think your pet scholar ${lastname} is positively vile. A disgrace! I have found this…this failed scion of the Society to be unreliable, untrustworthy, and in all matters despicable! You should watch more carefully who the Royal German Marinological Society sends as its representative. The reputation of the very Society itself has suffered here!\" She gesticulates wildly with a glass of wine, very nearly spilling it onto her own head.\n\n${patron_surname} grows more and more concerned at this speech. \"I see. Thank you for your frank opinion on this matter.\" Then ${patron_pronoun} turns a speculative and disapproving look upon you.\n*if ally = \"sandoval\"\n\tSandoval, of all people, rushes to your aid. \"Watch your mouth, you shrill termagant!\" he shouts. \"${firstname} is a friend and an esteemed colleague of mine, and I will not sit idly by while you slander such a noble and brilliant scholar.\"\n\n\tThe two lay into one another in a shrieking dispute that increases in volume and temperature minute by minute. You and ${patron_surname} leave them to it. They certainly do deserve each other, don't they?\n\t*set patron_favor %+10\n\t*goto walk\n*else\n\tYou nod at Madame, holding on to your civility for all you're worth. \"Thank you for that honest opinion. Now if you'll excuse us.\" And then you steer your patron away.\n\t*goto walk\n\n*label madame_meh\n\nMadame LeJeunesse looks you up and down. You start to wonder if she'll need to flip a coin to decide whether to offer a favorable opinion of you or not. \"I find ${lastname} entirely unremarkable, to be entirely honest,\" she pronounces. \"I'm not sure exactly what potential the Royal German Marinological Society sees in this…this person, but I don't fancy myself such an expert that I would second-guess that august body.\"\n\n${patron_surname} regards her, a bit nonplussed. \"I see. Thank you for being so forthright.\"\n*goto walk\n\n*label sandoval_meh\n\nSandoval can barely bring himself to look at you. You start to wonder if you've lost his attention entirely, or somehow missed the fact that anyone was speaking to him at all. \"Passable,\" he pronounces eventually. \"Perhaps. Barely. Or perhaps not.\"\n\nYou and your patron regard Sandoval, a bit nonplussed. \"Are you saying…${firstname} would make a passable scholar?\" ${patron_pronoun} asks in confusion.\n\nSandoval raises his chin high. \"If you like that sort of thing.\" And then he swans away, leaving you and your patron to your own devices.\n*goto walk\n\n*label sandoval_compliment\n*set patron_favor %+20\n\nSandoval beams at you. \"All these years I labored alone looking for mermaids, and everyone I reached out to laughed at me—they mocked, they teased, and never once did they listen. Until my friend ${firstname} came along! Now I have a colleague, an ally…dare I say, even a friend.\" His eyes begin to mist up, and for a moment you think he's going to burst into tears.\n\n\"It sounds like ${firstname} has been a true credit to the Society,\" ${patron_surname} says. \"How kind of you to say as much!\"\n\n*if enemy = \"madame\"\n\t*set patron_favor %-10\n\tAnd then Madame sees the three of you bent together in conversation from across the room and hastens over to make her opinions known to ${patron_surname}. \"Don't listen to a word this obsessed madman says to you!\" Madame's eyes could chop through a foot of solid oak like butter, they are so sharp. \"I've found ${lastname} to be nothing but an unreliable snake. A weasel! You should be ashamed to have such a person associated with the Royal German Marinological Society!\"\n\n\tYour patron's eyes widen. \"I see.\"\n\n\tYou nod at Madame, holding on to your civility for all you're worth. \"Thank you for your opinion. Now if you'll excuse us.\" And then you steer your patron away.\n*goto walk\n\n*label sandoval_insult\n\nSandoval lowers his voice. \"I had hoped to speak to you privately,\" he says, \"but to be completely forthright, I have found ${lastname} to be self-aggrandizing, greedy, untrustworthy, and in all matters lower than low! The Royal German Marinological Society should never have sent such an unqualified ignoramus. The reputation of the very Society itself has suffered here!\" He gesticulates wildly with a chicken wing, splattering grease on his pate.\n\n${patron_surname} grows more and more concerned at this speech. \"I see. Thank you for your frank opinion on this matter.\" Then ${patron_pronoun} turns a speculative and disapproving look upon you.\n\n*set patron_favor %-20\n*if ally = \"madame\"\n\tMadame LeJeunesse, of all people, rushes to your aid. \"Such slander! Such deception!\" she cries. \"${firstname} is a friend and a trusted advisor of mine, and I will not sit idly by while you harm the reputation of such a dear, kind soul.\"\n\n\tThe two lay into one another in a shrieking dispute that increases in volume and temperature by the minute. You and ${patron_surname} leave them to it. They certainly do deserve each other, don't they?\n\t*set patron_favor %+10\n\t*goto walk\n*else\n\tYou nod at Sandoval, holding on to your civility for all you're worth. \"Thank you for that honest opinion. Now if you'll excuse us.\" And then you steer your patron away.\n\t*goto walk\n\n*label both_insult\n\nIt should be no surprise that your conversation is, shall we say, less than ideally private. As soon as the question leaves your patron's lips, the other half of this star-crossed pair comes rushing over. The former lovers glare at one another, hackles raised and fists clenched. But alas, on the subject of you, their opinion is completely united. They turn as one and begin speaking, each finishing the other's sentences. \"Meddling busybody…insufferable arrogance…intellectually dishonest…ungrateful and foul-smelling!\" The heaps of insults they cast your way are increasingly varied, inventive, and—just between us—terribly unjust.\n\nMadame's bosom heaves alarmingly, and Sandoval turns an astonishing opalescent violet. \"In conclusion, the Society should be ashamed to be associated with such a person!\" Sandoval cries.\n\n\"You can be sure we will be corresponding with the Grand Royal Scholar and demanding an apology!\" Madame declaims.\n\nYour patron, for ${patron_poss} part, has taken in this information with grave concern. \"I see. Yes, yes, of course I understand.\"\n\nFinally, you've had enough. You hold on to the tattered remains of your dignity as best you can. \"Thank you,\" you say. \"Now if you'll excuse us.\"\n*set patron_favor %-30\n*goto walk\n\n*label reconciliation\n*set patron_favor %+30\n\nIt shouldn't surprise you that the other half of this pair of lovebirds was lurking just nearby. \"We owe much to this paragon of yours,\" Sandoval says, clapping you on the back just a little too hard. \"If we had been left to our own devices, our pride would have kept us at odds for the rest of our lives!\"\n\nMadame looks at Sandoval with suspiciously shining eyes, then clasps him to her bosom. \"Oh my sweet little man,\" she cries. \"How could I have thought so ill of you! Let us never be separated again!\"\n\nSandoval chokes out his agreement, all the while turning faintly blue from the lack of blood to his brain caused by Madame's highly enthusiastic embrace. You watch with great interest as he slowly colors toward a rich cerulean, but just before he loses consciousness, Madame releases him. \"We owe our happiness entirely to ${firstname}, you know, Your Worldliness,\" Madame tells your patron. \"We had been at one another's throats! Why, I had nearly given up hope that we would ever be together!\"\n\nSandoval nods eagerly. \"My blossom Blandine has agreed to send a letter to the Grand Royal Scholar praising ${firstname}'s many merits and virtues. We can't thank you enough.\"\n\n${patron_title} ${patron_surname} seems a bit disquieted by these displays of affection and gratitude, but when you turn away, there is a new respect in ${patron_poss} eyes. \"How remarkable,\" ${patron_pronoun} says. \"How very unusual.\"\n*goto walk\n\n\n*label walk\n\nThe meal itself passes in a haze of gloriously sauced vegetables, meats spiced with flavors you've never encountered before, and a sumptuous collection of desserts that leave you feeling at once flushed, chilled to the bone, and more than a little sick. At one point someone—you suspect Javel—places a peacock feather in Sandoval's collar, leading to the curious illusion that the man sports a single colorful antenna from the top of his bald head. As for you, you spend the time…\n\n*choice\n\t#Keeping my head down and trying not to embarrass myself.\n\t\tYou're a scholar, not a social butterfly, and nobody should expect you to be the center of attention.\n\t\t*if persistence \u003c 40\n\t\t\t*set patron_favor %+5\n\t\t\tStill, you manage to hold your own in the flow of conversation, and you think your table manners are adequate for the job. No mysterious stains appear on your clothes; there are no awkward pauses where everyone stares at you in horror.\n\t\t\t*goto after_dinner\n\t\t*else\n\t\t\t*set patron_favor %-5\n\t\t\tYour efforts to avoid attention go awry, alas, when you try to scoot your chair to let someone pass by you, and somehow wind up flat on your back with your feet in the air. The party erupts into gales of something midway between a snicker and a titter. Ugh! But it only gets worse from there.\n\t\t\t*goto after_dinner\n\t#Being the life of the party!\n\t\t\tJust because you're a scholar doesn't mean you don't know how to have fun!\n\t\t*if rigor \u003c 50\n\t\t\tYour sense of spontaneous fun takes over, and you are some sort of natural force made of keen observations, perfectly tailored compliments, and well-timed witticisms. You bask in the warm glow of the party's admiration; you've done very well by yourself.\n\t\t\t*set patron_favor %+5\n\t\t\t*goto after_dinner\n\t\t*else\n\t\t\t*set patron_favor %-5\n\t\t\tNo, the reason you don't know how to have fun has nothing at all to do with your career choice. Your jokes smell like rotten eggs; your compliments come out curiously barbed; your witty remarks are met by cold silence. But it only gets worse from there.\n\t\t\t*goto after_dinner\n\t#Engaging all and sundry in heady academic discussion.\n\t\tYou hold forth on the topic of theoretical methods for mermaid reproduction, a matter of much heated speculation.\n\t\t*if rigor \u003c 45\n\t\t\t*set patron_favor %+5\n\t\t\tYou audience is captivated, and particularly ${patron_title} ${patron_surname}. \"I had no idea there was such a tremendous body of theory around this subject,\" ${patron_pronoun} says. And so little is known! Perhaps you'll soon find the truth, ${lastname}!\"\n\t\t\t*goto after_dinner\n\t\t*else\n\t\t\t*set patron_favor %-5\n\t\t\tIt's only after you've been speaking on the topic through three full courses that you realize everyone around you is glassy-eyed and inattentive. Apparently the material is less interesting to the layman. But it only gets worse from there.\n\t\t\t*goto after_dinner\n\n*label after_dinner\n\nAfter the meal, Madame treats you to an aria she introduces as \"the most beautiful new opera from outermost Istanbul.\" Upon actually hearing her singing, however, you speculate that any number of musicologists or even music lovers, beginning with the composer and ending with wild dogs, would fight her to the death to dispute that what she has done here is an aria in general, nor beautiful, nor even from the specific opera she speaks of.\n\nOnce Madame has concluded her performance, ${patron_title} ${patron_fname} ${patron_surname} draws you aside. \"I'd like a moment to speak with you privately,\" ${patron_pronoun} says. \"Let us walk.\" The two of you slip away into Madame's garden. \n\nYou hadn't known until this very moment that Madame even had a garden, much less one such as this. It's remarkably orderly; roses and irises marching in strict formation, each as tall as the ones beside it. Even the flora are afraid of her, it seems. \n\nAt last ${patron_fname} turns to you. The moonlight shrouds ${patron_poss} face in mystery. \"Tell me, what do you expect to come of this expedition?\"\n\n*choice\n\t#\"I'm going to shake the pillars of the earth.\"\n\t\t\"Such confidence!\" ${patron_surname} bends to investigate a shadowed rose more closely.\n\t\t*if credibility \u003c 45\n\t\t\t\"I wish I could have as much faith in you. But alas I do not.\"\n\t\t\t*goto patron_rival\n\t\t*elseif credibility > 65\n\t\t\t\"Though I must say, I find you quite convincing.\"\n\t\t\t*goto patron_impressed\n\t\t*else\n\t\t\t\"You do realize that's a tremendously bold statement, ${firstname}.\"\n\t\t\t*goto patron_approval_check\n\t#\"I'll acquit myself acceptably.\"\n\t\t\"Hmm. Modesty.\" ${patron_surname} gazes up at the moon, bright and low on the horizon.\n\t\t*if rigor \u003c 45\n\t\t\t\"It's too bad you don't live up to even your own humble opinion of yourself.\"\n\t\t\t*goto patron_rival\n\t\t*elseif rigor > 65\n\t\t\t\"It shouldn't surprise me that your strict sense of academic rigor extends even to your assessment of yourself.\"\n\t\t\t*goto patron_impressed\n\t\t*else\n\t\t\t\"Humility is an excellent trait in a scholar, I suppose.\"\n\t\t\t*goto patron_approval_check\n\t#\"This is an abysmal failure.\"\n\t\t\"Pessimism, then?\" ${patron_surname} wanders the gravel garden path. It's made of crushed shells, and glimmers faint white in the moonlight.\n\t\t*if evidence > 1\n\t\t\t\"It's a shame you've made so little progress. I'd hoped for better.\"\n\t\t\t*set loyalty %-10\n\t\t\t*if patron_favor \u003c 35\n\t\t\t\t\"It's good to hear that you have such a clear-eyed view of your value here. Or lack thereof.\"\n\t\t\t\t*goto patron_rival\n\t\t\t*else\n\t\t\t\t\"I admit I'm surprised to hear you say it.\"\n\t\t\t\t*goto patron_approval_check\n\t\t*else\n\t\t\t\"Hmm. False modesty? You've made at least some progress, ${firstname}.\"\n\t\t\t*goto patron_approval_check\n\t*if (patron_romance > 0) #This is my one chance. Put the moves on ${patron_title} ${patron_surname}!\n\t\tYou can't hold back the burning passion in your heart a moment longer. The thought of maintaining a strictly professional patron-protégé relationship fills you with an unrelenting dread. You think—no, you're sure—that there's a spark between you. It's undeniable! And so it's time to take matters into your own hands. Or more precisely, your own lips. Your pulse pounds in your ears as you lean forward to chance a kiss.\n\t\t*if patron_favor \u003c 35\n\t\t\t${patron_title} ${patron_surname} recoils in visible horror.\n\t\t\t*goto patron_rival\n\t\t*if patron = \"wellington\"\n\t\t\t*goto wellington_kiss\n\t\t*if patron = \"tubingen\"\n\t\t\t*goto tubingen_kiss\n\t\t*if patron = \"scharknell\"\n\t\t\t*goto scharknell_kiss\n\t\t*if patron = \"fontana\"\n\t\t\t*goto fontana_kiss\n\t\t*else\n\t\t\t*bug OMG\n\n\n*label patron_approval_check\n*if patron_favor > 55\n\t*goto patron_impressed\n*elseif patron_favor \u003c 35\n\t*goto patron_rival\n*else\n\t*goto patron_meh\n\n*label patron_rival\n*set rival true\n*achieve rival\n\nThere is a lengthy silence. ${patron_title} ${patron_surname} lingers over Madame's flowers, ignoring you so thoroughly that you may as well have turned invisible. Then, without turning to you, ${patron_pronoun} begins speaking. \"A Scholar of the Royal German Marinological Society must shine in many areas: compassion, intellectual rigor, discipline, care for one's own reputation and the Society's. And you, alas, do not demonstrate all of these traits to acceptable standards. I've come to deeply regret my association with you.\" You catch a quick, cutting look, then ${patron_pronoun} shakes ${patron_poss} head. \"When I return to the Society, I'll be officially revoking my patronage of you and your career. You should give some thought to what your plans will be in the event that the Society doesn't find your work here adequate. And I am completely sure your work will be woefully inadequate.\" \n\nYour heart pounds. Patronage revoked? This is a disaster. Tongues will wag! Your reputation will be utterly ruined. Unless you present something truly amazing to the Society, your career has just ended. \n\nYou scrabble for what poise and dignity you can. \"I see. Thank you for informing me,\" you say. And then, no longer in a festive mood, you trudge home, utterly defeated.\n*finish\n\n*label patron_impressed\n*set rival false\n*set credibility %+30\n\nUnexpectedly, ${patron_title} ${patron_surname} turns to you and clasps your hand warmly. \"No matter your own opinion of yourself, I want you to know I hold you in the highest esteem after what I've seen here. That day of your hearing, I thought you showed high potential. But being a scholar requires that you have a sense of adventure and of intellectual honesty, that you keep to the highest moral and intellectual standards. I think you're starting to fulfill your potential here, dear ${firstname}.\"\n\nThis high praise is beyond what you would have ever expected to hear from your patron directly! \"I'm flattered,\" you manage. \"You're really much too kind.\"\n\n${patron_title} ${patron_surname} shakes ${patron_poss} head. \"There is a fine future ahead of you, regardless of the outcome here, my good protégé. After what I have seen from you here in the field, I have every faith that this is the start of an exceptional career. Perhaps even a legendary one.\"\n\nYour smile is so wide your cheeks ache a bit; it's always a pleasure to hear a person in authority speak highly of you, and even moreso your own patron. \"Thank you,\" you say, and again, \"thank you.\" That smile lingers with you for the rest of the evening. When you at last make your way home again, it seems even the stars shine brighter, just for you.\n*finish\n\n\n*label patron_meh\n\nThere is a lengthy silence. ${patron_title} ${patron_surname} lingers over Madame's flowers, ignoring you so thoroughly that you may as well have turned invisible. Then, without turning to you, ${patron_pronoun} begins speaking. \"A Scholar of the Royal German Marinological Society must shine in many areas: compassion, intellectual rigor, discipline, care for one's own reputation and the Society's. I'm not yet sure if you have what it takes, ${lastname}.\" \n\nThe wheels turn in your head. What is ${patron_pronoun} driving at? This doesn't sound good.\n\nThen ${patron_pronoun} sighs heavily. \"If only we knew beforehand which paths were the ones most worth walking, which intellects the ones most worth nurturing. I can't decide what to make of you. But there's still time for you to blossom. I'll see you when you present your findings to the Society, ${lastname}. Please don't disappoint me.\"\n\nWell. That could have gone worse, but also much better. The feeling of waiting for judgment hangs over you, destroying what festive mood you might otherwise have enjoyed. And later, on your walk home, even the moon seems like it's watching and weighing you.\n*finish\n\n*label wellington_kiss\n\n*if patron_favor > 55\n\t*set patron_affair true\n\t*achieve romwellington\n\tMiss Wellington returns your kiss with the fiery ardor you suspected was there waiting beneath her cool exterior the whole time, like a volcano hidden under Arctic ice. Bliss! Joy! You temporarily forget about mermaids, about logic and rigor and reputation; there is only you, and her.\n\n\tAt last she pulls away. \"So I see this experiment is a success. How excellent. I had hoped for such an outcome, if not quite so soon.\"\n\n\t\"What do we do?\" you ask.\n\n\t\"We must save matters of the future for after your hearing,\" she says, straightening her sleeves. \"It would be inappropriate for me to sit on your hearing board if we were deeply involved. But for now, we can have tonight.\" This time, she kisses you.  \n\n\t*goto banquet_end_kiss\n*else\n\tMiss Wellington turns her face away from you. \"I think not,\" she murmurs. \"I am of course deeply flattered by your interest in me, but I'd prefer to keep things between us on a strictly professional footing.\"\n\t\n\t\"But I thought—\" you stammer.\n\n\tShe looks at you coolly, her eyelids low and heavy. \"It's true I once thought there might be something between us,\" she says, \"but as I've come to know you better, I've realized we are ill-matched at best. And I am the master of my heart, not the other way around.\"\n\n\t*goto banquet_end\n\n*label fontana_kiss\n\n*if patron_favor > 55\n\t*set patron_affair true\n\t*achieve romfontana\n\tMr. Fontana kisses the way he does all things: with enormous force and enthusiasm. His ardor nearly knocks you off your feet. At last, you break apart. \"I had fancied—\" he begins, and then laughs, loud and bright. \"You have made me the happiest scholar in all the globe! I had thought to speak to you of matters of the heart, but not until you'd returned from this sorry island!\"\n\n\t\"What happens next?\" you ask.\n\n\tFontana's grin gleams bright like the moon. \"First we get through your hearing and get you into the Society,\" he says. \"Then, when we're on more equal footing, we'll see where this takes us. But for right now…\" This time, he kisses you.\n\t*goto banquet_end_kiss\n*else\n\tHe shuffles back and raises a warning hand before your lips make contact. \"I say, it appears there has been some sort of misunderstanding!\"\n\n\tCould you have read the signs and signals wrong? \"I thought you had feelings for me!\"\n\n\t\"I have feelings for a great many things,\" Fontana says. \"I am a man of tremendous feeling! And yet even I know when it is unwise to act upon them.\" He frowns at you, his moustache bristling. \"Methinks I would dislike going on this particular adventure with you.\"\n\t*goto banquet_end\n\n*label scharknell_kiss\n\n*if patron_favor > 55\n\t*achieve romscharknell\n\tBaroness Scharknell is, it turns out, an adept and highly skilled kisser. You lose yourself entirely in a world of feeling the likes of which you had not previously known even existed. Your knees grow weak; you become dizzy; waves of heat overcome you.\n\n\tAt last she draws back, and you take a gasping breath. \"You should know I have feelings for you,\" you say.\n\n\tShe pats your cheek fondly. \"Of course you do. And I quite unexpectedly have great affection for you, as well. We should take care—this is not the sort of liaison the Society looks upon fondly—so we can plan no future together until after your hearing. You understand, yes? But even the Society would forgive us if we kept this one night for ourselves.\" This time, she kisses you.\n\t*set patron_affair true\n\t*goto banquet_end_kiss\n*else\n\tThe Baroness deflects you with a graceful flick of her fan. \"Oh, oh dear, I'm afraid you have quite the wrong impression,\" she says. She flutters her fan madly, the only sign of nerves you've ever seen her display. \"How entirely unsuitable.\"\n\n\tYour face burns with shame. \"But I thought you and I had a…a special connection!\"\n\n\t\"There is a spark here, to be sure, ${firstname}, but I haven't reached my station nor stature by giving in to just any fool impulse that crosses my mind. And this particular impulse, given what I know of you now, would be very foolish indeed.\"\n\t*goto banquet_end\n\n*label tubingen_kiss\n\n*if patron_favor > 55\n\t*set patron_affair true\n\t*achieve romtubingen\n\tLord von Tubingen jumps when you draw near, but then he kisses you back, warm and soft at first, but building in intensity until it completely overwhelms you. Then he steps back; you are both a bit breathless. \"${firstname}!\" he says, a smile dawning over his face. \"I must say, this is quite a pleasant surprise. I had hoped—but not until after your hearing.\"\n\n\t\"Where do we go from here?\" you ask.\n\n\tHe takes your hands. \"We mustn't become too attached, so long as I'm meant to sit on the committee when you present your findings. But even the Society must forgive us if we take this one night for ourselves.\"  This time, he kisses you.\n\n\t*goto banquet_end_kiss\n*else\n\tLord von Tubingen jumps away as though you had lit his stunning moustache on fire. \"Good gravy, are you mad?\"\n\n\t\"But I thought—I mean, I was under the impression you were fond of me,\" you plead.\n\n\tHe brushes off his jacket with brisk motions. \"I agree there is a certain magnetic attraction in play. But I know the difference between musing about an enjoyable fantasy and falling into absurd and unsuitable relations with someone I simply don't care for that much.\"\n\t*goto banquet_end\n\n\n*label banquet_end_kiss\n*check_achievements\n*if (((choice_achieved_romwellington and choice_achieved_romscharknell) and choice_achieved_romfontana) and choice_achieved_romtubingen)\n\t*achieve allromance\n\nYou are interrupted by Madame LeJeunesse, who is for once keenly perceptive. She looks from the one of you to the other with mingled suspicion and amusement. \"Dancing will begin shortly,\" she says. \"Please do come and join us.\"\n\nYou and ${patron_fname} dance only twice, to avoid raising gossip of an untoward nature. But it is the early morning before you part ways. And even when you return to your hard, cold bed, your fingertips tingle with the memory of ${patron_poss} touch.\n\n*finish\n\n*label banquet_end\n\nYou are rescued by Madame LeJeunesse, who blunders in oblivious to the awkward scene she is interrupting. \"Dancing will begin shortly,\" she says. \"Please do come and join us.\"\n\nAfter your failed stab at a romantic interlude, you don't much feel like dancing. Understandable. You make your excuses with no small amount of embarrassment, and spend the remainder of the night in your cold, hard bed, wondering if you could have done something differently.\n\n*finish", "8_mermaid": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]The Daring Mermaid Expedition[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\nYour patron leaves at first light the next day. \"I was merely passing through on other business,\" ${patron_pronoun} explains, then gives you a longer, lingering look. \"We'll meet again when you return to present your findings to the Grand Royal Scholar.\" As ${patron_pronoun} bids your hosts adieu, you wonder how long it will be until you meet again, and how long you'll have here on Broken Shell Island.\n\nYou're a little lost when you return from seeing ${patron_poss} ship off; adrift on strange tides. Your reverie is broken by a loud and entirely unexpected sound. \n*if alarm = \"clatter\"\n\tIt's a terrible clattering, jangling noise, like somebody filled a bag full of junk and has decided to shake it as a hobby. A bag full of glass and shells and—\n*if alarm = \"coconuts\"\n\tIt's a curious clopping noise, almost like a horse trotting on cobblestones, or someone drumming on a block of wood, or…or…wait. That sounds like coconuts clacking together.\n*if alarm = \"bell\"\n\tIt's a low, smooth tolling sound. Clear, metallic, and curiously familiar. Like a bell. A bell. Why would you be hearing a bell right now?\nOh! It must be the alarm you set on the beach—the one to notify you of the presence of a mermaid! Mermaid ahoy!\n\nYou rush down to the beach at once to investigate, nearly tumbling headfirst down the rocky path in your haste.\n*page_break\n\n*if method = \"net\"\n\tYou can see something moving in your trap—something big. You stumble closer and pull the net halfway up from the water. The sea surges around your catch.\n\t*goto trapped\n*if method = \"hooks\"\n\tYou can see something struggling in your trap—something big. You stumble closer and pull the net halfway up from the water. Blood-tinged clouds drift away from your catch.\n\t*goto trapped\n*if method = \"basket\"\n\tYou can see something in the basket, clawing at the bars. You haul the basket up until it's halfway out of the water, water streaming out of its sides.\n\t*goto trapped\n*if method = \"ritual\"\n\t*goto visited\n*if method = \"bacon\"\n\t*goto visited\n*if method = \"bait\"\n\t*goto visited\n\n*else\n\t*bug OH NOES no trap method!\n\n*label visited\nThere—it's a mermaid! A real mermaid! She's lolling, elbows on the rocks by your contraption. She looks at your handiwork with something like amusement; her hand is still on the rope that rings the alarm. She must have pulled on it to see what it did. When she sees you, she startles and begins to slip away into the water.\n\nShe doesn't get very far, though. Unbeknownst to you, some fisherman has cast a net here at Crab Corner, and in her haste the mermaid becomes fouled in that net. She tries to wriggle out of it, but each escape attempt only knots her more securely into her trap.\n\nAt last she surfaces, still trapped, and turns to you, waving for help. \n*goto mermaid_description\n\n*label trapped\n\nYou pull on a rope, and the trap keeping the mermaid from escaping is raised halfway out of the water via your clever device of pulleys and gears.\n\n*label mermaid_description\nYou draw closer to get a better look at this mythical creature you've captured. Her hair is short, chopped into something resembling waves of seaweed on the ocean floor. She wears an astonishing quantity of jewelry made of pearls and silver. She is green and gold from the tip of her nose to the trailing wisps of her tail fins, and something about that jogs your memory. Green and gold under the water. No, she couldn't possibly be that same mermaid! \n\nCould she?\n\nAnd then, to your great astonishment, she speaks. \"Help me!\" she cries. Her voice is brittle, like ice breaking.\n\n*choice\n\t*if (scar = true) #Show her the bite mark!\n\t\t*set loyalty %+10\n\t\tYou bare the scar left by a mermaid so long ago. \"You did this to me,\" you accuse her, eyes flashing. \"I was a child, and you—you tried to kill me!\"\n\n\t\tShe looks genuinely startled, then she bares her sharp teeth at you. \"I was a hatchling too,\" she says, \"and you frightened me. What kind of monster are you, then?\"\n\n\t\tWell. Whether you've met one another before or not, you still have the same decision facing you. Now that you've found a mermaid, what are you going to do with her?\n\t\t*goto after_known\n\t*if (gift = true) #Show her the necklace!\n\t\t*set loyalty %-10\n\t\tYou slowly pull your treasured mermaid necklace from your pocket and dangle it before her. She frowns, then her eyes grow wide. \"That was mine,\" she says, \"when I was just a hatchling. Where did you get that? Did you—\" Slowly the wheels of her cognition turn, and she discovers the truth. \"It was you!\" Her gills flare, then flutter wildly. \"I always wondered if I'd imagined that day. To meet you again after all this time!\"\n\n\t\tWell. Whether you've met one another before or not, you still have the same decision facing you. Now that you've found a mermaid, what are you going to do with her?\n\t\t*goto after_known\n\n\t#Examine the creature.\n\t\t*set rigor %+15\n\t\tYou comport yourself the way a true scholar should: you collect observations. Your recollections of a mermaid's principal features appear to be spot on, from the long, fanlike tail to the gills along her neck. Curiously, though, she appears to be breathing air through her nose, just like any land animal. You make a mental note: perhaps mermaids are amphibious rather than strictly aquatic. How fascinating!\n\n\t\tMoving onward, the fangs look to be quite sharp; the talons, too. You feel an uneasy chill in your gut. Definitely not herbivores. You conclude your preliminary observations, and realize you have to make a decision. Now that you've found a mermaid, what are you going to do with her?\n\t\t*goto after_known\n\n\t#I should try to talk to her.\n\t\t*set persistence %-10\n\t\t\"You're a mermaid,\" you say.\n\n\t\tShe rolls her eyes with understandable impatience. \"No,\" she says, \"I'm an orca.\" \n\n\t\tNot your finest conversational sally, ${firstname}. Get a hold of yourself; you can do better.\n\t\t*goto after_known\n\n*label after_known\n\n*choice\n\t*hide_reuse #\"Have you been hiding around here the whole time?!\" \n\t\tShe wriggles, and her tail splashes salt water into your eyes. It stings.\n\n\t\t\"I live in these waters,\" she says. \"What's it to you?\"\n\n\t\t\"I was just asking!\" you say. \"Why haven't I seen more of you around?\"\n\n\t\t\"We know not to trust your kind,\" the mermaid says. \"With your traps and knives and nets.\" She shoots a barbed look at her predicament; it seems she has a point. Maybe you should try a different tactic.\n\t\t*goto after_known\n\n\t*hide_reuse #\"Are there more of you here?\"\n\t\tShe stills. \"Why do you want to know?\"\n\n\t\t\"Science!\" you say. \"Population counts are very important!\"\n\n\t\tShe renews her efforts to free herself. \"If you care about mermaid populations, you'll help me get out of here,\" she says. \"I'm supposed to watch the hatchlings later. If any of them get eaten or stung, it's all your fault!\"\n\n\t\tYou're not winning her over, ${firstname}. Now what? \n\t\t*goto after_known\n\n\t*hide_reuse #\"Are you friends with Sandoval?\"\n\t\tShe makes an elaborate and very strange face, and then she bursts out laughing, like the ringing of a crystal bell. \"Friends with—am I friends with—did he tell you that? Oh, that's rich!\" Eventually, though with great difficulty, she regains control of herself. \"Maybe he doesn't know, either.\"\n\n\t\t\"Know what?\" Though now you're not a hundred percent sure you even want to know.\n\n\t\tShe grins, and you get a better view of her distractingly sharp teeth. \"It's a game,\" she says. \"You get points for biting him without killing him. It's been running for years!\"\n\n\t\tYou're right. You really, really didn't want to know. Better change the subject, fast.\n\t\t*goto after_known\n\n\t*hide_reuse #\"What do mermaids do all day?\"\n\t\tShe seems surprised by this. \"The same as air-swimmers, I should think. We make food and eat it, care for our young, chase away those who would eat us.\"\n\n\t\tThat was a lot more prosaic than you expected. \"Oh,\" you manage.\n\n\t\t\"Why, did you think we sunned ourselves on rocks all day, singing and combing our hair?\"\n\n\t\t\"Of course not,\" you mumble. Time for a subject change!\n\n\t\t*goto after_known\n\t\t\n\t#No time for chitchat.\n\t\tShe glares at you. \"Are you going to help me get out of this, or what?\"\n\n\t\tMaking endless small talk doesn't really seem appropriate to the occasion. You have a mermaid trapped and entirely at your mercy! You should really decide what you're going to do with her next.\n\t\t*goto freeornot\n\n\n*label freeornot\n\n*choice\n\t*hide_reuse #Persuade her to stay with me.\n\t\t*goto persuade\n\t\t\n\t*hide_reuse #Bring her onto dry land as a captive.\n\t\t*goto captive\n\t\n\t*hide_reuse #Let her go free, no strings attached.\n\t\t*goto free\n\n*label captive\n*set loyalty %+30\nThe cold realization settles on you like a thick blanket of snow—heavy, wet snow, too, not a powder that just blows off in the next faint breeze. You've captured a mermaid! A living, breathing mermaid! Your reputation is cemented, your childhood memory proven. There's absolutely no way you're letting her go free now. \n\nBut the business of keeping a wriggling, biting mermaid in captivity is one you didn't give enough thought to earlier, now that you see it. You look around and spot a beached rowboat further down the shore. Perhaps you can fashion it into something like an impromptu tank? But the first step is to bring her up onto dry land. \n\nYou haul at the ropes as hard as you can, but it soon becomes clear that your academic life hasn't equipped you with the strength to pull a live, struggling mermaid from the water. Upon investigation, you discover that your ropes are snagged on a rock some several feet under the water. If you want to pull her out, you're going to have to swim for it. \n*if swimming >=2\n\tYou enter the water gingerly to pry your ropes loose, trying to stay as far from the creature as possible.\n\t*if bloodloss > 1\n\t\tYou push and pull as best you can, but your muscles are weak from the injuries you've sustained over the course of your adventures, and the mermaid keeps struggling, making it hard to keep your grip on the rope. You simply can't get the rope free. You try again.\n\n\t\tUnfortunately, while you've been distracted with that stuck rope, the mermaid has been hard at
