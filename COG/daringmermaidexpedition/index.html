<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Daring Mermaid Expedition — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "daringmermaidexpedition", "title": "The Daring Mermaid Expedition", "scenes": {"10_findings": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]The Daring Mermaid Expedition[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n*temp secret true\n*temp ending \"none\"\n*temp breakup false\n*temp declined false\n*temp gloat false\n\n*if ally = \"sandoval\"\n\tSandoval sees you to the ship that will take you back to the Society and your moment of truth. \"You'll do fine,\" he says, though he seems glum about it. \"Not like me. I'm stuck on this island with you-know-who. Don't you worry about me! You just—you just show the Royal German Marinological Society what's what!\" He dashes a tear from his eye. Then he hugs you with astonishing ferocity. \"Be sure to write,\" he cries, and then he meanders back toward his beach.\n\t*goto return\n\n*elseif ally = \"madame\"\n\tMadame LeJeunesse sees you to the ship that will take you back to the Society and your moment of truth. \"Too good for them,\" she sniffs, \"but if it's what you want, good luck, I suppose. Do remember to stay in touch; you never know when one might need a connection to the right people.\" From the stretch of the smile she gives you, it's clear that she's the one who might need a connection, and she's hoping that you'll become the right people. She waves vigorously as you climb aboard your vessel.\n\t*goto return\n\n*else\n\tThe only one to see you off is Javel. The sea air ruffles ${javel_poss} hair; ${javel_pronoun} scratches at a scab on ${javel_poss} elbow. \"Madame and Sandoval are off somewhere fighting,\" ${javel_pronoun} says. Well, of course they are. Had you expected anything different? Javel continues: \"So I thought I would say goodbye, at least. Maybe…maybe you'll write me a letter? And help me to grow up and be a scholar like you?\" Hope shines bright in ${javel_poss} eyes.\n\n\t\"Sure, kid,\" you say. \"I'll do that.\" At least you know you have one person in the world who genuinely believes in your academic worth. Though who knows if your example will be one to follow, or one to definitely not ever, ever follow. \n\t*goto return\n\n*label return\n\nYour journey back home to make your report to the Royal German Marinological Society is without event. No pirates, no sharks, not even any foul weather. The sky is clear, the wind brisk, the sea untroubled. \n\n*if overdose\n\tAnd yet everything seems filled with strange omens and portents—the sun haloed in rainbows, whispered words hidden beneath the ship's creaking. Your mind has been woken, and it seems it will never slumber again. The curious effect of the mermaids' poison has not left you; instead, it grows stronger by the day. Still, you hurtle through time and distance toward the moment when you'll discover if everything you've worked for has been for a purpose…or not.\n\t*goto uncle\n\n*else\n\tAfter some days of this quiet, you even come to miss the company of Sandoval and his, ah, quirks. You pass the time checking your evidence again and again, rehearsing what you'll say before the Grand Royal Scholar. You hurtle over placid waters toward the moment when you'll discover if everything you've worked for has been for a purpose…or not.\n\t*goto uncle\n\n*label uncle\n\nThe hearing is set for roughly a week after you arrive back home. The wait is both far too brief and agonizingly long. You start to wonder why you ever went down this path. Has it been worth it? You know the truth, now. Is that enough? \n\nWhen the day arrives at last, Uncle Banjo walks you to the gate, just as he did on your last visit here. \"Really proud,\" he says, with a faint glint of water in his eye. \"Never thought I'd live to see this day. What…what do you think will come out of this?\"\n\n*fake_choice\n\t#Glory.\n\t\t\"One day,\" you say, \"my name will be one of the shining lights of science, Uncle. Just wait, you'll see!\"\n\n\t\t\"Hmm, we will see, we will. Good luck, ${firstname}. I'll be here for you.\"\n\t#Shame.\n\t\t\"I don't think I did a good job, Uncle,\" you tell him. You avoid his eyes. \"I think my dream is almost over.\"\n\n\t\tUncle Banjo claps you on the back. \"Don't say that,\" he says. \"All you need is a little confidence!\" But you…you're not so sure.\n\t#No comment.\n\t\tYou press your lips together a moment. \"I couldn't possibly say,\" you murmur.\n\n\t\tUncle Banjo rolls his eyes. \"You people and your science! What's wrong with hazarding a guess sometimes?\"\n\n*if patron_affair\n\t${patron_title} ${patron_surname} passes you at the doorway, a small, secret smile on ${patron_poss} lips when ${patron_pronoun} sees you. \"Good luck today,\" ${patron_pronoun} nods to you. \"I can't wait for our business together to be…concluded.\"\n\n\tUncle Banjo's eyebrows raise precipitously; he is no fool. Or at least not right this second. At any rate, he says nothing.\n\t*goto hearing\n*elseif rival\n\t${patron_title} ${patron_surname} sweeps by you in the doorway, sparing you hardly a glance. \"Wasn't that your patron?\" Uncle Banjo asks, in a too-loud whisper. \"Did you get into a fight or something?\"\n\n\t\"I'd rather not speak of it,\" you say. Uncle Banjo's eyebrows speak volumes regarding his opinion of that, even if for once his tongue does not.\n\t*goto hearing\n*else\n\tOne might think you would hear something from ${patron_title} ${patron_surname} before the hearing; a greeting, a cordial note, or given the circumstances, perhaps a cutting one. You do not, and you worry about what that means for your prospects. \n\t*goto hearing\n\n*label hearing\n\n*if swimming = 0\n\t*achieve noswim\n*if bloodloss = 0\n\t*achieve nowounds\n*if evidence = 0\n\t*achieve noevidence\n\nThe hearing starts before you feel ready—but to be honest, there's nothing you could have done to feel more ready than you do now. As before, an audience of academics and philanthropists fills the seats. The rustle of gossip grates on your nerves. This is your life at stake, and these people are here to watch you succeed or fail as if you were nothing more than entertainment!\n\n*if overdose = true\n\t*goto hallucinate\n*else\n\t*goto opening\n\n\n*label hallucinate\n\nAs you approach the podium, you realize that your hands are sweating—and the rest of you, too. Your head pounds. The taste of the seaweed the mermaids fed you returns to your mouth. Or perhaps it never really left? You rest your hands on the podium, but before your eyes, it quivers like gelatin. You jolt back. Everything is cast in a blue light, as if it were underwater. You open your mouth to speak, and bubbles emerge, bobbling their way to the ceiling. You stare at them. They contain universes.\n\nNone of it is real, of course. You seem to be having some sort of breakdown caused by the lingering chemicals in your brain from whatever it is the mermaids did to you. \n\nYou eventually realize that the Grand Royal Scholar is frowning at you from across the room, and Uncle Banjo is at your side, shaking you. He looks worried. \"${firstname}! ${firstname}, what's wrong? Are you—are you well?\"\n\nYou try to explain it to him, but the bubbles, the universes, are so bright and lovely that you have trouble paying attention to anything else. You never do find out what happens during the rest of your hearing. \n\n*page_break\n\nAfter a few more episodes, it becomes glaringly clear that any plans you'd had for your life have become irrelevant. Uncle Banjo settles you into a charming country hospital, with kind staff in starched white uniforms who nod kindly at your outbursts and don't mind that you're constantly scribbling pictures of mermaids devouring your brain. You slowly begin to grow accustomed to your new circumstances. And then, one day, one of the nurses coughs apologetically and announces that you have a visitor.\n*achieve hallucinate\n*set ending \"hallucinate\"\n*if rival = true\n\t*goto institution_rival\n*else\n\t*goto institution_fine\n\n*label prison\nShe scowls down on you. \"How dare you come into this sacred hall of truth with your…your…your fabrications and lies!\"\n\n\"But I—I mean—\" you stutter, stunned and unable to find the right explanation. How could this happen? You'd been so careful, and so close to your mark, but now—now!\n\n*if captive = true\n\tYou have one more card up your sleeve. At your signal, your captive mermaid is wheeled in. She is chained to a proper bathtub, now, filled with salt water. She sneers at the audience and snaps at the laborers heaving her forward. You incline your head toward the committee. \"I do believe this should settle the matter, Your Studiousness.\"\n\n\tThe crowd erupts into furious conversation. \"I don't care what costumed actor nor perversion of science you've performed to prove your false case,\" the Grand Royal Scholar howls. \"Now that I know you cannot be trusted!\"\n\t*goto prison2\n*elseif volunteer = true\n\tYou have one more card up your sleeve. At your signal, Weialaha the mermaid enters. She occupies a curious contraption—a bathtub full of salt water, fitted with sturdy wagon wheels. She steers herself into your midst with the aid of a steam engine.\n\n\t\"As you can see,\" Weialaha says, \"I am quite real.\" She splashes the Grand Supreme Scholar with a playful flick of her tail. \"So that's sorted out, then. But I believe I was promised some bacon?\"\n\n\tThe crowd erupts into furious conversation. \"I don't care what costumed actor nor perversion of science you've performed to prove your false case,\" the Grand Royal Scholar howls. \"Now that I know you cannot be trusted!\"\n\t*goto prison2\n*else\n\t*goto prison2\n\n*label prison2\n*achieve prison\nThe Society doesn't take fraud nor forgery lightly. They call for an armed guard, and you find yourself escorted to prison in short order. It's dark in there, and the straw you sleep on itches your back. You pass the night comforting yourself that at least you know the truth, even if nobody will believe you. And then, some days later, the jailer announces that you have a visitor.\n*if rival = true\n\t*goto institution_rival\n*else\n\t*goto institution_fine\n\n*label prison3\nAfter a time, you almost forget that you'd ever lived another life on the outside. And then one day the jailer stops in with a whopping printed volume with your name on the cover.\n\n\"Selling like you wouldn't believe, this book,\" he says. \"You're famous, like! Thought you'd want to see it.\" He tosses the book down in front of you.\n\n*if breakup\n\tIt appears that ${patron_title} ${patron_surname} has written a lengthy work explaining how you perpetrated your \"compelling hoax.\" You leaf through page after page, reading with increasing horror as each piece of your evidence is explained away as misinterpretation, deception, or optical illusion. So much for romance, huh? Any remaining affection curdles in your heart.\n\t*goto prison4\n*elseif rival\n\tIt appears that ${patron_title} ${patron_surname} has written a lengthy work explaining how you perpetrated your \"compelling hoax.\" You leaf through page after page, reading with increasing horror as each piece of your evidence is explained away as misinterpretation, deception, or optical illusion. Well, ${patron_pronoun} did say ${patron_pronoun} would end your career in the Society. Looks like that's done.\n\t*goto prison4\n*else\n\tThe book is by some previously unknown academic who has clawed a niche in the reaches of fame by writing an exposé on how you perpetrated your \"compelling hoax.\" You leaf through page after page, reading with increasing horror as each piece of your evidence is explained away as misinterpretation, deception, or optical illusion. Lies, every page of it, but what can you possibly do?\n\t*goto prison4\n\n*label prison4\nThere is a silver lining, at least. Your jailers, pleased to find themselves holding a minor celebrity, hold you in especial esteem and give you privileges like extra dessert and a cell with a southern exposure. Alas, the southern exposure has a view of the ocean. You're too far away to see any mermaids even if any were close by. It's just as well. \n\nYou've come to regret any interest you once held in the mermaids, the Royal German Marinological Society, and adventure. You wonder sometimes where it all went wrong for you. If anything could have gone differently. But perhaps you'll never know.\n*goto metacheev\n\n\n*label institution_rival\nYou think at first it's your Uncle Banjo. But then ${patron_title} ${patron_surname} walks in, eyes wide, taking in your accommodations with far too much interest. You burn with shame at being seen in such low circumstances.\n\n*if patron = \"wellington\"\n\tMiss Wellington nods at you with cool disinterest, as if this were any other academic symposium. \n*if patron = \"fontana\"\n\tMr. Fontana shakes your hand, a bit too vigorously, as if greeting one of his many fans.\n*if patron = \"tubingen\"\n\tLord von Tubingen executes a short bow; rather more courteous, you think, than you might have expected.\n*if patron = \"scharknell\"\n\tBaroness Scharknell raises her eyebrows by way of greeting, as is right and proper for her social inferiors. Like yourself. \n\"And how are we this morning?\" ${patron_pronoun} asks.\n\n*fake_choice\n\t#\"Couldn't be happier.\"\n\t\tMight as well put a happy face on. You won't let ${patron_title} ${patron_surname} get to you, even while captive in an institution such as this. You wave at your institutional clothing, your spartan living quarters. \"This humble lifestyle gives me more time to devote to the riches of the mind.\"\n\n\t\tUnsurprisingly, ${patron_pronoun} isn't buying it. \"Of course,\" ${patron_pronoun} smirks. \"This is exactly the future you've earned.\"\n\t#\"Did you come to mock me?\"\n\t\tDirect and to the point. There's no reason for ${patron_title} ${patron_surname} to visit you, aside from sheer perversity. Your business with the Society is concluded; your career in academia—and in much of anything else, for that matter—is scuttled forever.\n\n\t\t\"I'm shocked you would have such a low opinion of me,\" ${patron_pronoun} murmurs. Then, even more quietly: \"Or maybe not shocked at all.\"\n\t#\"I'd like to bury the hatchet.\"\n\t\tIt hardly matters how you got onto ${patron_title} ${patron_surname}'s bad side at this point; so much more water has flowed under the bridge that the river is…you lose yourself for a moment, trying unsuccessfully to complete the metaphor. Whatever. It's in the past, and there's no need to be at odds.\n\n\t\t${patron_title} ${patron_surname} clears ${patron_poss} throat. \"Of course, of course. I'd say there's no point in heaping additional punishment on you, anyway.\"\n\t#\"Get out. This is your fault!\"\n\t\tThe chain of events that led you to these straits starts, inexorably, at the single moment when ${patron_title} ${patron_surname} chose to become your patron. If that one thing had gone differently, then you might not have wound up in this place.\n\n\t\t${patron_title} ${patron_surname} laughs outright. \"Oh, and you had no choice in the matter? You're just a helpless pawn of fate? I should think not. I gave you an opportunity, and this—\" ${patron_pronoun} waves at your surroundings—\"this is what you did with it.\"\n\nAfter an awkward pause, ${patron_pronoun} continues. \"But I'm here for a reason. I have questions about what happened in your hearing with the Grand Royal Scholar,\" ${patron_pronoun} says. \"And I wanted to know the truth from your own lips. Surely you owe me that much. Tell me, just between the two of us…what did you really find on Broken Shell Island?\"\n\n*fake_choice\n\t#Tell the truth: you found mermaids.\n\t\t\"I found them,\" you say. \"I trapped a mermaid, I visited the mermaid city, I spoke with their Queen. Every bit of it is real.\"\n\n\t\t\"Of course,\" ${patron_pronoun} sighs.\n\t\t\n\t#Lie and say you found nothing.\n\t\t\"There are no mermaids,\" you say. \"I searched as well as anyone could, and none of it is real.\"\n\n\t\t\"Of course,\" ${patron_pronoun} sighs.\n\t#Hedge and don't answer.\n\t\t\"I can't bear to discuss it.\" You stare at your palms. \"I'm sure you understand.\"\n\n\t\t\"Of course,\" ${patron_pronoun} sighs.\n\n*if patron = \"wellington\"\n\tMiss Wellington brushes her skirts straight. \"Well,\" she says. \"Good-bye, then. I suppose there's no point in wishing you good luck for the future.\" And then she leaves.\n\t*goto institution_fine\n*elseif patron = \"fontana\"\n\tMr. Fontana claps you on the arm. \"Be well,\" he says. \"See you around.\" Then he catches himself. He glances at the bars on your windows. \"Or…maybe not.\"\n\t*goto institution_fine\n*elseif patron = \"tubingen\"\n\tLord von Tubingen executes another of his short bows. \"Farewell,\" he says. \"Perhaps our paths will cross again one day.\" But you both know they won't.\n\t*goto institution_fine\n*elseif patron = \"scharknell\"\n\tBaroness Scharknell curtsies graciously. \"It was certainly something to make your acquaintance,\" she says. She sweeps away, and doesn't look back. You shouldn't, either.\n\t*goto institution_fine\n*elseif ending = \"hallucinate\"\n\t*goto hallucinate2\n*else\n\t*goto prison3\n\n*label institution_fine\nThe sight of ${patron_title} ${patron_surname}'s face fills you with a potent mix of longing, regret, and resentment. For good or ill, ${patron_pronoun} is nothing less than a living symbol of the Society and everything you've lost.\n\n*if patron = \"wellington\"\n\tShe passes you a few thick volumes of mathematical reasoning. \"To help you pass the time,\" she says.\n*if patron = \"fontana\"\n\tMr. Fontana presents you with a smuggled bottle of fine imported banana cordial. \"A bit of a treat collected on my travels. You can have it.\"\n*if patron = \"tubingen\"\n\tLord von Tubingen gives you a book of postcards, each one a landscape from a different faraway place. \"So you can see other vistas than this,\" he says, nodding at your humble surroundings.\n*if patron = \"scharknell\"\n\tBaroness Scharknell presents you with a little box full of delicately painted chocolates. \"A small taste of luxury for when you need one,\" she smiles.\n*if patron_affair = true\n\tThen ${patron_pronoun} kisses you warmly, if uncertainly.\n\"I've been worried,\" ${patron_pronoun} says. \"But I wasn't sure I'd be welcome visiting you here.\"\n\n*choice\n\t*if (patron_affair = true) #\"Be strong, my love. We'll get through this.\"\n\t\tYou gaze adoringly at your darling ${patron_fname}. \"I'm sure we can survive this temporary hiccup. All will be well in time.\"\n\n\t\t${patron_title} ${patron_surname} is at a loss for words, at first, probably because your situation looks far from temporary. \"Of course,\" ${patron_pronoun} says at last. \"Of course we can endure anything. I just wish I could stay here longer with you.\" You spend a while talking companionably, but your time together is of necessity very short. Finally ${patron_pronoun} is called away.\n\t\t*goto institution_fine2\n\t*if (patron_affair = true) #\"I can't see you anymore. We're over.\"\n\t\t*set breakup true\n\t\t*goto breakup\n\t#\"Thank you for coming to see me.\"\n\t\t\"Of course, of course!\" ${patron_title} ${patron_surname} waves your thanks away. \"It must be terribly dull here, and I thought you could use a few moments of good company.\"\n\t\t*goto institution_fine2\n\t#\"What brings you here?\"\n\t\t\"It's the least I could do.\" ${patron_title} ${patron_surname} bows ${patron_poss} head. \"I suppose I should apologize for any part I played in your being here. The pressures of the academic life were too much for you, and I should have known that from the beginning.\" It appears ${patron_pronoun} isn't sure what to do with ${patron_poss} hands.\n\t\t*goto institution_fine2\n\t#\"This is your fault!\"\n\t\tThe chain of events that led you to these straits starts, inexorably, at the single moment when ${patron_title} ${patron_surname} chose to become your patron. If that one thing had gone differently, then you might not have wound up in this place.\n\n\t\t${patron_title} ${patron_surname} laughs outright. \"Oh, and you had no choice in the matter? You're just a helpless pawn of fate? I should think not. I gave you an opportunity, and this—\" ${patron_pronoun} waves at your surroundings—\"this is what you did with it.\" The silence that falls isn't awkward so much as razor-sharp.\n\t\t*goto institution_fine2\n\n*label breakup\n*achieve breakup\n*set patron_affair false\nThe words leave your lips with finality. ${patron_title} ${patron_surname} freezes with disbelief, at first. \"You—you would—\" \n*if patron = \"wellington\"\n\tHer cold eyes glance off of you and pierce something in the middle distance. Miss Wellington, it appears, is not accustomed to being dumped. \"Fine,\" she says. \"Fine.\" Her posture is always excellent, but now it appears to be even stiffer than usual. \n*if patron = \"tubingen\"\n\tHe laughs incredulously, then sobers at the look on your face. \"You're serious? Surely you've not met someone else. I never thought…Well. I suppose there's no use arguing.\" Lord von Tubingen looks shaken, and spends a few moments plucking at his shirt nervously.\n*if patron = \"scharknell\"\n\tShe pats your cheek fondly. \"Of course it would never have lasted, darling. A pleasing diversion, but you're right, this should be the end of it.\" Is it a front to cover her feelings? You can only wonder. The Baroness is a skilled player of games, after all.\n*if patron = \"fontana\"\n\tThat gleam in his eye, could it be? Mr. Fontana dashes the tear away before you can be sure. \"Must you?\" he chokes out. \"After all that's happened, you would treat me so?\" He regains his calm and vows, \"I won't make a scene.\" He looks away from you. There is a long silence.\n*goto end_chooser\n\n*label institution_fine2\nFinally ${patron_pronoun} takes a deep breath. \"Just one more thing before I go. I'm sorry to bring up a sore topic, but I must know. What happened to you out there, ${firstname}? Why…?\" ${patron_pronoun} searches your face, as if hoping to find an answer written in your expression. \n\n*fake_choice\n\t#\"I learned too much of the truth.\"\n\t\tYour lips purse at the sourness of your memories, painful as they now are. \"I was so desperate for people to believe me. And the mermaids are not a kind species, as it happens.\"\n\n\t\t\"So they're real?\" ${patron_title} ${patron_surname} lights up at the news. \"Perhaps the investigation should continue, even without you,\" ${patron_pronoun} muses. \n\t#\"I cracked under pressure. There are no mermaids.\"\n\t\tYou almost believe it yourself at this point. \"There's nothing out there to see. It's a dead end.\" At least the mermaids will be safe, even if you're not. Good for them.\n\n\t\t\"I suspected as much,\" ${patron_title} ${patron_surname} answers, though ${patron_pronoun} sounds faintly disappointed. \"I'm not sure what I came here expecting.\"\n\t#\"I really don't want to talk about it.\"\n\t\tYou turn away. \"I'd just really rather not dwell,\" you say.\n\n\t\t\"I'm sorry I asked, then,\" ${patron_title} ${patron_surname} says. But you can see the curious gleam remaining in ${patron_poss} eyes.\n*if breakup\n\tNeither of you sees the point in a tearful farewell. You exchange a few final courtesies, and then it's finished.\t\n*if breakup = false\n\t${patron_title} ${patron_surname} comes to see you with regularity, at first. But over time the chains of mingled guilt and affection fall away, and ${patron_pronoun} comes less and less often. \n\t*if patron_affair = true\n\t\tThere is a last visit, and a last kiss, though you don't mark it when it happens. \n\tYou miss the sound of ${patron_poss} voice, but it's just as well. Sometimes ${patron_pronoun} made you feel small and sad for the life you almost had.\n*if ending = \"hallucinate\"\n\t*goto hallucinate2\n*else\n\t*goto prison3\n\n*label hallucinate2\n*page_break\nSome of the time, you're completely fine; no visions, no voices. But as the days and months pass, it becomes increasingly difficult for you to tell which ones are the fine days, exactly. It's not so bad, though. Your room has a soft bed and picture windows with a lovely view of the ocean, if you can ignore the bars. From time to time, on a still afternoon, you can even see the mermaids leaping and playing. You tell the staff, and they smile sweetly, but you can see inside their brains, and they think this is just another of your hallucinations.\n\nWell, ${firstname}, you found the truth about mermaids, and some other truths besides. You can comfort yourself that you have done and seen things no other scholar has, and you lived to tell the tale.\n\nIf only someone believed you.\n*goto metacheev\n\n*label opening\n\nYou try your best to ignore the audience and focus on the matter at hand. Today of all days, you must not be distracted.\n\nLuckily for your nerves, this time you are the first and only order of business. You step up to the podium. The Grand Royal Scholar waits at the center of that broad, high bench across the room. She is flanked by the same four as at your first hearing: Miss Wellingon, Mr. Fontana, Baroness Scharknell, and Lord von Tubingen. There is no sign on their faces of what they expect to occur on this day.\n\nThe Grand Royal Scholar pounds a gavel, and the rushing murmurs of the crowd settle quietly in place. \"We are here today to rule on two connected issues,\" she says. \"One is the scientific merit of the hypothesis that mermaids are a real zoological phenomenon. The other is regarding the possible admission of ${firstname} ${lastname} into our august ranks as a scholar. Please, ${lastname}, tell us about the resources and methods you used to explore this matter once you arrived at Broken Shell Island.\"\n\nTo what do you credit your findings?\n\n*fake_choice\n\t#\"I relied heavily upon local knowledge and expertise.\"\n\t\tIt's graceful to give credit where credit is due. And though Sandoval may not seem to be the world's most credible man, nor Madame LeJeunesse and Javel for that matter, in the end all of them contributed to bringing you to this place, this moment.  \n\n\t#\"I credit everything to the Society.\"\n\t\tEvery scholar stands upon the shoulders of giants, and without the aid and abettance of the Society, you wouldn't have even come to Broken Shell Island in the first place. From the ship that took you to the sketchy home you now remember fondly, through the notebooks you used, all the way to the binoculars borrowed from Madame, none of it would have happened without the Society to clear a path for you.\n\n\t#\"Trial and error, like anything else.\"\n\t\tScience is a matter of luck as much as of planning, and though you have findings to report, you won't claim to own powers you don't have. Your process could have failed at any point, and you'd be standing here now with no conclusion at all. \n\t\n\t#\"I drafted a plan based solely on my own insights.\"\n\t\tNobody ever reached the top of the ladder by letting other people take credit for their work. You won't make that mistake. So much was required of you on this journey: invention, diplomacy, courage. These are the things you should focus on: the resources you found in your own heart.\n\nYou speak your piece with passion, and, you think, even some eloquence. When you finish, you search for some sign of a reaction, but the Grand Royal Scholar's face is unnervingly impassive. \"And how did you find this experience?\" she asks. \n\nHow…did you find it. First there were pirates, then you were thrust into Sandoval's and Madame's interpersonal drama; there was an intervention, a surprise visit by your patron; you caught a mermaid, and as a result were brought into the mermaid city itself. You worked hard, and in the end…well, who can say, when it's not the end yet?\n\nHow did you [i]find it[/i]?\n\nYou struggle to come up with a simple way to sum up your feelings.  \n\n*fake_choice\n\t#\"Perfect. It's everything I've ever wanted in life.\"\n\t\tDespite any amount of inconvenience and even downright hardship, you have lived these last weeks like a genuine scholar of the Royal German Marinological Society. Truly a dream come true.\n\n\t#\"It was a difficult situation, but I made the most of it.\"\n\t\tTrue, it was no cakewalk, and you won't pretend otherwise. The audience is rapt as you describe your adventures—and your own efforts in rising to the occasion, time after time. \n\n\t#\"It was a true trial by fire, Your Insightfulness.\"\n\t\tYou've never been in so many dangerous situations. The life of an academic truly didn't prepare you for the realities of social and physical peril that had awaited you. You've come out the other side, far wiser than you were the last time you stood in this room.\n\n\t#\"I deserve more and better than this.\"\n\t\tThere was hardship, to be sure—but much of it was completely unnecessary. If the Society had genuinely thrown its lot in with you, your ship would have had better guard against pirates. You wouldn't have been at the mercy of sketchy characters like Sandoval and Madame LeJeunesse. You might have had a fluffier, less lumpy pillow! You've overcome so much hardship, ${lastname}. So much.\n\n*label moment_of_truth\n*if swimming = 0\n\t*achieve noswim\n*if bloodloss = 0\n\t*achieve nowounds\n*if evidence = 0\n\t*achieve noevidence\n\nAt last, the Grand Royal Scholar clears her throat, and the room falls silent once more. \"Well then. Let us finish this matter, once and for all. Tell me, ${lastname}, what precisely did you find on Broken Shell Island? What have you concluded?\"\n\n*choice\n\t*selectable_if (evidence \u003c 2) #\"Mermaids exist, Your Studiousness. But I don't have enough evidence to prove it.\"\n\t\t*set secret false\n\t\t*if credibility > 50\n\t\t\tYou may not provide enough evidence to conclusively prove anything, but your earnest presentation wins hearts and minds. After a brief discussion, you are accepted into the Society as a full Royal German Marinological Scholar, though one without any particular distinction or notoriety.\n\t\t\t*set ending \"hunterswarm\"\n\t\t\t*goto recap\n\t\t*else\n\t\t\tThe laughter of the Society rings in your ears all the way home. You pace your tiny apartment all night, trying to work out what to do next. You're right—you know you are! How could they treat you this way? Didn't you do exactly what you set out to do? What they asked you to do!\n\t\t\t*set ending \"rejection\"\n\t\t\t*goto recap\n\t*selectable_if (evidence >= 1) #\"I found mermaids, Your Studiousness. And here is your proof!\"\n\t\t*if evidence > 6\n\t\t\t*achieve highevidence\n\t\t*set secret false\n\t\t*if captive = true\n\t\t\t*goto credibility_check\n\t\t*if volunteer = true\n\t\t\t*goto credibility_check\n\t\t*if fake_evidence = true\n\t\t\tYou lay out your evidence carefully, detailing the case for mermaids point by point, even going so far as to describe in vivid detail your journey into the heart of the ocean. They committee members nod along cautiously, and scrutinize each piece with great care. \n\n\t\t\tThen the Grand Royal Scholar gasps, waving the bauble you fabricated in her hand. \"This is a forgery!\" Oh no—she knows!\n\t\t\t*set ending \"prison\"\n\t\t\t*goto prison\n\t\t*else\n\t\t\t*set ending \"scholar\"\n\t\t\t*goto scholar\n\t#\"I can conclusively say that no mermaids exist.\"\n\t\tYou describe in meticulous detail your efforts to find mermaids, and the entirely fabricated failure to see so much as a single scale of a mermaid. Some things aren't meant for the world to know.\n\n\t\t\"The matter is conclusively settled, Your Studiousness.\" You bow your head. \"I am confident further research would only prove me right, and so is entirely unnecessary.\"\n\t\t*goto secret_kept\n\n\t#\"The matter requires extensive further study to reach an answer.\"\n\t\t\tYou lay out a case in ambiguous terms; you know the truth of the matter, of course, but you can't bring yourself to stand before the Society and speak truth. Do you feel your evidence is insufficient? Are you protecting the Merameida and their secret? Perhaps most important, what does this mean for your future?\n\n\t\t\tThe committee nods along with you cautiously, but you find it impossible to read anything into their reactions. One might as well try to read the future by gazing at the clouds. Eventually, they retreat into privacy to discuss your fate. All you can do is wait.\n\t\t*if credibility > 50\n\t\t\t*goto admitted\n\t\t*else\n\t\t\tThe Society is, in short, completely unimpressed. \"Is that the best you can do?\" the Grand Royal Scholar asks, with a sneer perched on her lip like a particularly jaunty moustache. You are summarily rejected as unsuitable academic material.\n\t\t\t*if patron_affair = true\n\t\t\t\t${patron_title} ${patron_surname} is comforting, but it's not enough. Not nearly enough. The future yawns before you, empty and meaningless.\n\t\t\t*if rival = true\n\t\t\t\tThere is a smug smile on ${patron_title} ${patron_surname}'s face as you shuffle out of the hearing. \"Too bad,\" ${patron_pronoun} murmurs, with a distinct lack of sympathy. \"Too bad.\"\n\n\t\t\tYou pace your tiny apartment all night, trying to work out what to do next. You were so measured in your presentation—so calm and scholarly! How could they treat you this way?\n\t\t\t*set ending \"rejection\"\n\t\t\t*goto recap2\n\t\n*label credibility_check\n*if credibility > 40\n\t*set ending \"scholar\"\n\t*goto scholar\n*else\n\tYou lay out your evidence carefully, detailing the case for mermaids point by point, even going so far as to describe in vivid detail your journey into the heart of the ocean. The committee members nod along cautiously. \n\n\tThe Grand Supreme Scholar, alas, does not.\n\t*set ending \"prison\"\n\t*goto prison\t\n\n*label selfpub\n\nBy dawn, a new plan has formed. You won't let your work go to waste. You'll publish a monograph about your findings yourself. You'll show the world what true science looks like. You don't need the Society!\n\nThe pamphlets sell like hotcakes, to your tremendous gratification and enrichment. \n\n*if patron_affair\n\t${patron_title} ${patron_surname} is remarkably supportive of your efforts through all of it, and throws ${patron_poss} full weight behind you, from editing your manuscript to helping locate a printer. And that's only during the day—in the sultry nights, you share far more than simply matters of the mind.\n\t*goto selfpub2\n*elseif rival\n\tThe best part, though, is seeing ${patron_title} ${patron_surname} in those odd moments when you cross paths. That sulky pout! That haughty way of avoiding your eye! It's true: living well is the best revenge.\n\t*goto selfpub2\n*else\n\t*goto selfpub2\n\n*label selfpub2\n*achieve novelist\nAt first you think your success is simply because the public is thirsty for knowledge. But then a young child on the street stops you. \"Scholar ${lastname}, did you really come face to face with the Queen of All Mermaids?\" she asks. \"What a fine adventure!\" In her eyes you see the same shining light that must have lit your own all those years ago, when you read [i]The Astonishing Life and Times of A Royal German Marinological Scholar[/i].\n\n\"I sure did.\" You pat the tyke on the head. \n\n\"I want to be an adventurer one day, just like you!\" she breathes.\n\nAn adventurer…like you. Slowly, you realize that you don't need the Society to live the life you'd always imagined. Why, you can do it on your own! You've already tackled the issue of mermaids as thoroughly as you care to, and settled the matter once and for all. \n\nCome to think of it, you've heard rumors that there's a secret civilization of lizard-people living on Skull Island. Perhaps you should find the truth about them…and tell the public. You may not have the stamp of approval of the Royal German Marinological Society, but you have something even better: the freedom to pursue your dreams.\n\nAn adventurer. How completely perfect. Now to begin planning your next adventure.\n*goto metacheev\n\n*label scholar\n*if captive\n\tAt your signal, your captive mermaid is wheeled in. She is chained to a proper bathtub, now, filled with salt water. She sneers at the audience and snaps at the laborers heaving her forward. You incline your head toward the committee. \"I do believe this should settle the matter, Your Studiousness.\"\n\n\tThe crowd erupts into furious conversation. For a time, even the Grand Supreme Scholar has no words. Then she pounds her gavel. \"I believe this calls for a recess. Please, ${lastname}, give us a moment to discuss this.\"\n\t*set ending \"grandscholar\"\n\t*goto grandscholar\n*elseif volunteer\n\tAt your signal, Weialaha the mermaid enters. She occupies a curious contraption—a bathtub full of salt water, fitted with sturdy wagon wheels. She steers herself into your midst with the aid of a steam engine.\n\n\t\"As you can see,\" Weialaha says, \"I am quite real.\" She splashes the Grand Supreme Scholar with a playful flick of her tail. \"So that's sorted out, then. And now I believe I was promised some bacon?\"\n\n\tThe crowd erupts into furious conversation. For a time, even the Grand Supreme Scholar has no words. Then she pounds her gavel. \"I believe this calls for a recess. Please, ${lastname}, give us a moment to discuss this.\"\n\t*set ending \"grandscholar\"\n\t*goto grandscholar\n*else\n\tYou lay out your array of evidence and explain in detail its provenance. You even describe your experience in the mermaid city. \"The matter is conclusively settled, Your Studiousness.\" You bow your head. \"I am confident further research will only prove me right.\"\n\n\tIt's hard to read the panelists' faces. Finally, the Grand Royal Scholar raises a hand. \"We must discuss this alone,\" she says. \"Be patient.\"\n\t*goto scholar2\n\n*label scholar2\n\nThe wait is difficult, and you find yourself replaying all of the things you said and what you probably should have said instead, if you'd only thought of it in time. By the time the panel summons you again, the speech you now realize you should have given is about three hundred and nineteen times better than the one you actually gave.\n\n*if evidence > 2\n\t*set ending \"scholar\"\n\t*goto admitted\n*else\n\t*set ending \"rejection\"\n\t*goto declined\n\n*label admitted\n*set ending \"scholar\"\n*achieve scholar\nBy the time the committee returns, you fully expect to be ejected from the Society for your lackluster performance. Instead, the Grand Royal Scholar smiles at you. Her teeth, you notice, are very broad, like a horse's. \"Welcome to the Royal German Marinological Society, Scholar ${lastname},\" she says. \"We are delighted to invite you into our august company, and we're sure you will serve the interests of truth in science for many years to come.\"\n\nUncle Banjo rushes you in the hearing room and folds you into an excessively forceful bear-hug. \"My little ${firstname}! Such great things you'll do!\" he sniffles. \"Who knew, who knew? And now, who knows what greatness lies before you?\"\n\n*if patron_affair\n\t${patron_title} ${patron_surname} congratulates you quite a bit more warmly than is strictly necessary. You worry that ${patron_pronoun} had undue influence over your acceptance, but later, privately, ${patron_pronoun} assures you that ${patron_pronoun} hardly spoke at all.\n\t*goto recap2\n*elseif rival\n\t${patron_title} ${patron_surname} sweeps out of the hearing room without giving you congratulations nor even a second glance. You wonder how hard ${patron_pronoun} lobbied against your acceptance. But no matter. You can stand as a full member of the Society now on your own merits.\n\t*goto recap2\n*else\n\t*goto recap2\n\n*label scholar3\nSoon it all starts falling into place. You take offices and buy furniture; you get your official scholarly robes, your insignia, the seal of accreditation, all of it. You find yourself sitting at a desk, shuffling through papers, looking to find your next adventure. You could research lizard-people or rumors of sea dragons. You could return to Broken Shell Island to dive deeper into the topic of mermaids. You could do…anything you like. The official Royal German Marinological Society paperweight on your desk glints in the afternoon sun.\n\nAnd that's when it hits you: for all your work, for all your trials, this is not the end of your story. This is only the beginning.\n*goto metacheev\n\n*label declined\n*set ending \"rejection\"\nWhen the committee returns from their deliberations, you can tell by their somber faces and heavy gaits that the outcome will be bad for you. You brace yourself.\n\n\"We find your argument very compelling,\" the Grand Scholar announces. \"But in the end I'm afraid we simply don't see that it sufficiently supports your conclusions. An academic of the Royal German Marinological Society must always furnish solid proof of their claims and methods. We do not find your research adequate. And so I'm afraid we must decline you a place within our august ranks. Good luck with your future endeavors.\"\n\nFuture…endeavors? What a horrible, terrible blow. A crushing disappointment. \n*goto recap\n\n*label grandscholar\nThere's no debate, of course. Who could look at a living mermaid and still doubt you? You're instantly named the Authority on Allegedly Fictional Marinological Creatures of the Royal German Marinological Society. You become something of a celebrity, in fact. When you go out during the day, you're mobbed for autographs. You cannot go out at night without throngs fighting for the privilege to buy you drinks and hear of your exploits firsthand.\n*goto recap2\n\n\n*label grandscholar2\n\nAnd then—tragedy strikes! The Grand Royal Scholar collapses in an undignified heap not long after your precipitous climb to fame. Your new celebrity is so compelling that you are elected to be the new Grand Royal Scholar with little debate. Who better to be the public face of the Society than someone the public is already so very interested in?\n\n*if patron_affair\n\t${patron_title} ${patron_surname} is a rock and a wonder through all of it. Your relationship eventually becomes public—no secret can last forever—but your reputations withstand the whispers intact. And even better, your fondness for each other grows deeper every day. Love is grand!\n\t*goto grandscholar3\n*elseif rival\n\tThe public is shocked when ${patron_title} ${patron_surname} unexpectedly resigns from the Society, but only the two of you know why. You wouldn't have done anything unseemly out of revenge—well, probably not—but it's just as well not to have to deal with ${patron_pronoun}.\n\t*goto grandscholar3\n*else\n\t*goto grandscholar3\n\n*label grandscholar3\n*achieve grandscholar\nEverything is such a whirlwind that some months pass before you can pause and reflect on the events that have led you to a higher pinnacle of success than you had ever imagined in your grasp. Ah, the glory of academic life! \n\nBut you find yourself growing restless, as well. You cannot rest on your laurels forever, not when there is more left in the world to discover. You've heard rumors of a civilization of lizard-people dwelling somewhere near Skull Island. And you have all of the resources of the Royal German Marinological Society at your fingertips. It's time, you decide, for your next adventure.\n\nAnd what an adventure it is.\n*goto metacheev\n\n\n*label hunterswarm\n\n*achieve advisor\nWord of your findings rapidly spreads far outside academic circles. Your revelations rock the world of pseudoscience. While you have little in the way of genuine proof, your account is so convincing that a swarm of hunters soon descends on Broken Shell Island, each more determined than the last to capture a mermaid and show her to the world. You are deluged with letters asking for your advice and aid, and dispensing it turns into a working cottage industry for you.\n\nCurious things begin to happen on the island; fishing nets become snarled, then the fish disappear entirely. Anchor lines break. You begin to experience…regrets. Or maybe fear? No, fear. It's definitely fear.\n\n*if patron_affair = true\n\t${patron_title} ${patron_surname} is a joy and a comfort to you in this time, and lends ${patron_pronoun} experience to helping you adjust to your new life with a minimum of friction. Eventually word gets out that you're involved; there are smirks and rumors, but since it's clear ${patron_pronoun} had no part in the way your career has gone, those rumors soon settle.\n\t*goto swarm2\n*if rival = true\n\tYour once-patron ${patron_title} ${patron_surname} does ${patron_poss} best to make your life difficult, alas. Rumor follows you, and the wheels of civilization have rusted for you. Everywhere you turn there's a new form to file in triplicate, a new bureaucratic procedure to follow. Clerks steadfastly refuse to bend the rules for you, nor even clearly explain them. But you grit your teeth and tell yourself that you are better than this. Better than ${patron_surname}.\n\t*goto swarm2\n*else\n\t*goto swarm2\n\n*label swarm2\nMeanwhile, you enjoy minor celebrity status; you can get a free drink any night by telling the story of your night in the mermaid city. From time to time you're even stopped in the street by someone who recognizes you. But you leave it there, refusing any offers to continue the investigation personally. \n\nIt's perhaps best, you think, if you were to stay away from the sea for a while. Or forever. Mermaids don't forgive very easily.\n*goto metacheev\n\n*label secret_kept\n*if captive = true\n\tYou think for a moment of your once-prisoner, Weialaha the mermaid, long since freed to return to her people; your conscience couldn't bear to keep her prisoner a moment longer. Not that the mermaid seemed to be properly grateful for it.\n*if volunteer = true\n\tYou think for a moment of Weialaha the mermaid, long since sent back to her people as an act of goodwill and good faith, though she wouldn't go without promises of exorbitant quantities of bacon.\n*if credibility > 50\n\n\tIt's hard to read the panelists' faces. Finally, the Grand Royal Scholar raises a hand. \"We must discuss this alone,\" she says. \"Be patient.\"\n\t*goto scholar2\n*else\n\t*goto piracy2\n\n*label piracy2\n\"What is your game, ${lastname}?\" muses the Grand Royal Scholar. She is clearly suspicious, but of what? How could she know that you're lying? All you can do now is stand by your story, and so you do.\n\nThe committee retires to debate your future behind closed doors. You pace and scowl and drink the Society's weak tea. In the end, you are ushered before the Grand Royal Scholar. \"Thank you for your report,\" she says, somber. \"We have opted, in the end, not to invite you to join us in the Royal German Marinological Society. We'd like to put this whole embarrassing business behind us. Thank you for your cooperation.\"\n\nYou deflate. This was what you'd worked for your whole life, and now—now—whatever will become of you?\n*set ending \"rejection\"\n*goto recap\n\n*label piracy3\n\n*achieve pirate\nLate one night, a quiet knock comes on your door. You open to find a letter scrawled in a careless hand and sealed with a fat blob of blue wax. It reads:\n\n[i]Heard you need a new job. You're a clever sort, aren't you? And a friend says she owes you one. Ever considered piracy?\n— Captain Lucy Smokeheart[/i]\n\nYou venture to the docks, where the [i]Relentless[/i] is anchored and taking on a load of fresh fruit and an assortment of beverages. Lucy herself strides over once she spots you. \"Welcome aboard, scholar,\" she grins. \"Or should I say sailor? Either way, you're one of us now.\"\n\nIt's not the life you'd planned for, but it is a life of adventure—the life you've always dreamed of. And who knows what adventures you'll be off to next?\n*goto metacheev\n\n*label post_rejection\n\nThe rest of your life teeters dangerously without the scaffolding of the Society to hold you up. So you'll have to take the rest of your life into your own hands. What now, ${firstname}?\n*choice\n\t#I'll become a writer.\n\t\tNow there's a thought. As an academic you spent long years honing your skill with words. You may not have the Society, but you still have that skill. And there are other ways to put it to work for you!\n\t\t*if secret = true\n\t\t\t*goto novelist\n\t\t*else\n\t\t\t*goto selfpub\n\t#The adventurous life for me!\n\t\tWho needs the blessing of the Society to explore the world and discover its wonders for yourself? Not you, ${firstname}! That's for sure.\n\n\t\tYou begin to investigate the possibilities open to you now. Without the Society, you'll have to find your adventures yourself. But now that the matter of mermaids is closed at the Society, perhaps the Queen would be willing to spare you a few pearls and pieces of silver? Or perhaps your adventures could fund themselves; you've heard rumors of a cursed treasure in the City Below, a fabled home of dark magicians.\n\n\t\t*if secret = true\n\t\t\tBut before you make a final decision, you receive an offer you can't refuse.\n\t\t\t*goto piracy3\n\t\t*else\n\t\t\t*goto hunterlead\n\t#This is all a [i]terrible mistake[/i]. But I can change their minds!\t\n\t\tYou can still make the Society admit you. They just have to. There must be a way!\t\n\n\t\tMaybe the self-important Royal German Marinological Society wouldn't take you in a closed hearing, but you'll take your story to the newspapers! You'll give lectures in coffeehouses! You'll stand on a stump or a street corner if you have to!\n\n\t\tYou spend the weeks and months to come telling anyone who will listen that you deserve admission to the Society, if only those fools would listen to you. That you are a paragon of academic prowess, and their snub should not go unanswered!\n\t\t*goto gormless\n\n*label gormless\n\n*achieve gormless\nAnd at first you have something that feels like success beyond your wildest imaginings. You find yourself invited to glittering parties, where audiences listen to you, rapt and wide-eyed. Slowly, you begin to notice the tittering behind hands. The amused smirks. The overblown compliments, which might not be entirely, ah, sincere.\n\nSlowly, you realize they are inviting you to make fun of the crackpot, not to celebrate your genius. Eventually you shut yourself away, bitter and isolated. Dreams shattered, hopes turned to dust. So that's that. \n\nAt least you'll always have your memories, and the cold comfort of knowing the truth.\n*goto metacheev\n\n*label hunterlead\n\n*achieve advisor\nBut events move along without you. Word of your findings rapidly spreads far outside academic circles. Your revelations rock the world of pseudoscience. While you have little in the way of genuine proof, your account is so convincing that a swarm of hunters soon descends upon Broken Shell Island, each more determined than the last to capture a mermaid and show her to the world. You are deluged with letters asking for your advice and aid.\n\nAnd so you move to the thick of it all: you return to Broken Shell yourself, taking a spacious home in Broken Shell Town. You've captured a mermaid once before; surely you can do it again.\n\nCurious things begin to happen on the island, however. Fishing nets become snarled, and then the fish disappear entirely. Anchor lines break. The mermaids are not taking the revelation of their existence calmly, it would seem.\n\n*if patron_affair = true\n\t${patron_title} ${patron_surname} is a joy and a comfort to you in this time, and lends ${patron_pronoun} experience to helping you adjust to your new life with a minimum of friction. Eventually word gets out that you're involved; there are smirks and rumors, but since it's clear ${patron_pronoun} had no part in the way your career has gone, those rumors soon settle.\n\t*goto swarm2\n*if rival = true\n\tYour once-patron ${patron_title} ${patron_surname} does ${patron_poss} to make your life difficult, alas. Rumor follows you, and the wheels of civilization have rusted for you. Everywhere you turn there's a new form to file in triplicate, a new bureaucratic procedure to follow. Clerks steadfastly refuse to bend the rules for you, nor even clearly explain them. But you grit your teeth and tell yourself that you are better than this. Better than ${patron_surname}.\n\t*goto swarm3\n*else\n\t*goto swarm3\n\n*label swarm3\n\nAnd then one night you find yourself waist-deep in the water, face-to-face with Queen Neiaua herself. She lunges toward you, fangs bared.\n*if swimming > 3\n\tSomehow—and however many times you tell the story, you're never sure how—you swim out of her reach and to safety before she can take you. \n\n\tThis time, at least. But you can never know if the water is safe, or if a mermaid might be lurking in ambush for you. You lead from on high, after that, and wonder, uneasily, how long a mermaid lives. \n\n\tThe answer: longer than you, my friend.\t\t\n\t*goto metacheev\t\t\n*else\n\tAlas, your clumsy legs and feet cannot swim fast enough to escape. Her fangs sink into your neck. You bleed great clouds into the water.\n\n\tIf it's any comfort, your acolytes find you on the beach some time later, and spin a great legend around your heroic battle against the dangerous beast. \n\n\tBut you're still dead.\n\t*goto metacheev\n\n*label novelist\n\nYou won't spill the mermaids' secret now. Your loyalties are fixed, your heart resolute. But there's no harm in a little creative embroidery, yes? You pour your heart and your hours into a fictional accounting of a would-be scholar not unlike yourself. The story has everything: Nail-biting drama! Sweet-as-honey romance! Biting yet accessible comedy! Carnivorous mermaids! \n\nFinally you gather your pages together and send them off to a publisher. Within a few short months, your tale is for sale to anyone who cares to read it: [i]Foam on the Ocean: The Daring Adventures of a Marinological Scholar: A Novel[/i].\t\n*if rigor \u003c 60\n\t*goto novelist2\n*else \n\t*goto gormless\n\n*label novelist2\n\n*achieve novelist\nThe novel is a brilliant success from the start. You find yourself invited to glittering parties, where audiences listen to your every little witticism, rapt and wide-eyed…at first. As time passes, you receive fewer and fewer invitations; your lectures are canceled in favor of other writers, with newer works crowding yours off the shelves.\n\nEasy come, easy go, eh, ${firstname}?\n\nThere's only one thing for it: you'll have to write another book. But first, you'll need to conduct a bit of research. Perhaps you can hunt down the truth about the legendary ghost pirate, Captain Samira Bluebraid.\n\nNot that you'd necessarily write it as you find it. The truth, you have learned, is sometimes best kept only for yourself.\n*goto metacheev\n\n\n*label recap\n*page_break\nOn the way out of the hearing, you duck into a disused corridor to collect yourself after an intense morning. A moment of peace would serve you well. But it turns out you're not alone after all; the hall is already occupied. \n*if patron = \"wellington\"\n\tMiss Wellington is there, eyes closed, as if in quiet meditation. She could be chiseled from marble, she is so still. Her eyes open at the sound of your approach.\n*if patron = \"scharknell\"\n\tBaroness Scharknell is already there, gazing into the mirror on the wall to tuck a stray curl back into her elaborate coiffure. Her hair gleams in the lamplight.\n*if patron = \"fontana\"\n\tMr. Fontana is already there, doing a bit of light shadowboxing to loosen up after sitting for so long. He straightens his jacket at the sound of your footsteps.\n*if patron = \"tubingen\"\n\tLord von Tubingen is already there, sifting through a towering stack of papers and muttering to himself about oysters. Some of those papers have drifted to the floor.\nYour eyes lock. \n\n*if (patron_affair = true)\n\t${patron_title} ${patron_surname} pulls you into a kiss, then swiftly breaks away before anyone can stumble upon you and start a scandal.\n*goto recap_color\n\n*label recap_color\n*if (rival = true)\n\t*if (ending = \"rejection\")\n\t\t\"Can't say I'm surprised the Society wouldn't take you,\" ${patron_pronoun} says at last, with an air of grave disappointment, like a parent might have for a child that has settled on competitive eating for a career. \n\t\t*goto recap_choice\n\t*else\n\t\t\"Oh, it's you,\" ${patron_pronoun} sniffs. \"Well, I suppose I should congratulate you on joining our august ranks, then. But don't be expecting any additional favors from me.\" As if.\n\t\t*goto recap_choice\n*else\n\t*if (ending = \"rejection\")\n\t\t\"I'm so sorry,\" ${patron_pronoun} says, with wry sympathy. \"I wish I could change the Society's decision, but it's out of my hands at this point. I'm sure you understand.\"\n\t\t*goto recap_choice\n\t*else\n\t\t\"Ah, you have such a shining career ahead of you,\" ${patron_pronoun} says. \"I knew I saw a spark of potential in you that day, ${firstname}. It's going to be a delight to watch your next steps.\"\n\t\t*goto recap_choice\n\n*label recap2\n*page_break\nYou pass the next day or two in something of a haze. You've been working toward the single goal of joining the Society for so long; now that it's been decided, you're not entirely sure what to do with yourself.\n*if rival = true\n\tYou find yourself back at the Society offices, filing the last bits of paperwork required of you: expense reports and the like. On your way out, you stumble into ${patron_title} ${patron_surname}. Literally; ${patron_pronoun} cries out in pain and glares at you.\n\t*goto recap2_patron\n*elseif patron_affair = false\n\tYou meet ${patron_title} ${patron_surname} at a charming spot on the high street for tea and pastries, to go over ${patron_poss} final notes regarding the mermaid affair and discuss your next career move.\n\t*goto recap2_patron\t\n*else\n\t${patron_title} ${patron_surname} has arranged for a romantic dinner at ${patron_poss} abode, just the two of you. The lights are low, the air soft, and ${patron_poss} eyes shine brightly.\n\n*label recap2_patron\n\n*if patron = \"wellington\"\n\tMiss Wellington perches a pair of spectacles at the end of her nose and inspects you carefully.\n*if patron = \"scharknell\"\n\tA jewel shimmers in Baroness Scharknell's hair; an opal, you think. She notices you noticing her ornament.\n*if patron = \"fontana\"\n\tMr. Fontana twirls his moustache until the ends are perfect little points.\n*if patron = \"tubingen\"\n\tLord von Tubingen rubs his nose distractedly, leaving behind a faint smudge of ink.\n*goto recap_color\n\n*label recap_choice\nSilence settles over the two of you like snowflakes. And there's something on your mind, you realize—something you want to get off your chest while you have the chance. What is it?\n*if (rival = true)\n\t*set gloat true\n*if (ending = \"rejection\")\n\t*set gloat false\n\n*choice\n\t*if (gloat = true) #Gloat about my acceptance!\t\n\t\tIt's time to gloat a little. \"You must be seething that the Society took me in,\" you say. \"And I assure you, this is only the first of many, many great moments to come for me. So sorry to disappoint you.\"\n\n\t\t\"You could be the next best thing to the legendary Scholar Brightwell and I would think no higher of you,\" ${patron_pronoun} snaps. But you can tell you've hit a sore spot. You leave the Society offices with a new lightness to your step, and not just because you left behind the papers you'd brought.\n\t\t*goto end_chooser\n\n\t*if (ending = \"rejection\") #Blame my failures on my patron!\n\t\t*set patron_affair false\n\t\t*if (rival = true)\n\t\t\tPerhaps with greater support from such an esteemed member, you might have been accepted into the Society! You unleash a torrent of venom upon your erstwhile patron. \"How dare you look me in the eye,\" you sputter. \"You've done nothing but undermine me at every turn!\"\n \n\t\t\t${patron_title} ${patron_surname} recoils. \"Even I never expected such low behavior from you!\" ${patron_pronoun} steams. \"And for what it's worth, I said not a word against you. You failed on your own merits, ${lastname}.\" And with that, ${patron_pronoun} is gone.\n\t\t\t*goto end_chooser\n\t\t*else\n\t\t\tThe chain of events that led you to this moment starts, inexorably, at the single point when ${patron_title} ${patron_surname} chose to become your patron. If that one thing had gone differently, then perhaps everything else would have been different, too.\n\n\t\t\t${patron_title} ${patron_surname}'s lips thin. \"Oh, and you had no choice in the matter? You're just a hapless pawn of fate? I should think not. I gave you an opportunity, and you simply weren't up to the task. That's not on my head.\"\n\n\t\t\tYou don't have much to say to one another after that.\n\t\t\t*goto end_chooser\n\n\t*if (rival = true) #Try to make amends with my former patron.\n\t\tYou left things on a bad footing on Broken Shell Island, didn't you? And no matter whether you're moved by career concerns or by simple human guilt, you're not happy with keeping it that way. \"I owe you an apology, ${patron_title} ${patron_surname},\" you say. \"You took a risk in supporting me in front of the Society, and I was a disappointment to you.\"\n\n\t\t${patron_title} ${patron_surname}, for ${patron_poss} part, is startled by your peace overture. \"How gracious of you,\" ${patron_pronoun} says, eyebrows high. \"I suppose…I suppose there's no point in holding a grudge. Good luck to you, ${lastname}.\" You leave the Society offices in much better spirits than you expected from an exercise in bureaucracy. \n\t\t*set rival false\n\t\t*goto end_chooser\n\n\t*if (patron_affair = true) #End this misguided relationship.\n\t\tThis understanding between the two of you simply isn't working for you anymore. Maybe it was a madness brought on by the tropical setting; maybe it was the giddy rush of science affecting your decisions. But either way, things have taken a more romantic cast than you are strictly comfortable with. It's time to finish it. \"It's not you,\" you mumble, \"It's me!\"\n\t\t*set patron_affair false\n\t\t*goto breakup\n\n\t*if (patron_affair = true) #Proclaim my abiding love for ${patron_fname}!\n\t\tYour heart fills with a sudden rush of emotion. It is deep and pure and completely overwhelms you. \"${patron_fname},\" you breathe, \"I am so glad to have this moment here with you. You know my feelings for you are…\" You can't find the words to finish.\n\t\t\n\t\t${patron_title} ${patron_surname} clasps your hands. \"We are going to have such grand adventures together,\" ${patron_pronoun} says. And then ${patron_pronoun} says some other things—warmer things—that we would blush to repeat here.\n\t\t*goto end_chooser\n\t\t\n\t#Thank ${patron_title} ${patron_surname} for all ${patron_poss} help.\n\t\tYou've come a long way, ${lastname}, and for good or ill, you wouldn't be standing here today if ${patron_title} ${patron_surname} hadn't supported you in that critical first moment. \"Thank you,\" you say. \"I'm truly grateful to you for helping me get to Broken Shell Island and undertake this research. It was always my dream.\"\n\n\t\t*if (ending = \"rejection\")\n\t\t\t\"How gracious,\" ${patron_pronoun} muses. \"And how flattering. It's a terrible shame it ended the way it did.\" ${patron_title} ${patron_surname} looks genuinely sorry. When you part ways, ${patron_pronoun} presses your hand a bit more warmly than you might have expected.\n\t\t\t*goto end_chooser\n\t\t*else\n\t\t\t${patron_title} ${patron_surname} is visibly flattered. \"I did hardly anything,\" ${patron_pronoun} says, \"beyond merely opening a door for you. You are the one who did the difficult parts!\" But there is a gleam in ${patron_poss} eye, and when you part ways, ${patron_pronoun} presses your hand a bit more warmly than you might have expected.\n\t\t\t*goto end_chooser\n\n\t#Ask ${patron_title} ${patron_surname} for career advice.\n\t\tYou clear your throat. \"I was wondering,\" you say, \"if you might have any advice for me now. After…you know.\"\n\t\t\n\t\t*if (ending = \"rejection\")\n\t\t\t${patron_title} ${patron_surname} rocks back a bit. \"I hadn't given it much thought,\" ${patron_pronoun} mumbles. \"What to do after the Society declines you as a scholar. Hmm. I suppose…keep your options open?\"\n\n\t\t\tYou mull it over later, but no matter how you look at it, that just…isn't very helpful.\n\t\t\t*goto end_chooser\n\t\t*else\n\t\t\t${patron_title} ${patron_surname} snorts. \"I'm sure you'll find your career will take care of itself from here,\" ${patron_pronoun} says. \"Another research project, another paper, another adventure. Just take it as it comes.\"\n\n\t\t\tIt isn't concrete, but ${patron_poss} advice at least makes you feel better.\n\t\t\t*goto end_chooser\n\n\t#Small talk. Nothing significant.\n\t\t${patron_title} ${patron_surname} looks at you expectantly, as if ${patron_pronoun} can see the words poised on the tip of your tongue.\n\n\t\tBut no, come to think of it, those things that sit on your chest are usually better not spoken aloud. You make some polite chit-chat about the weather, the theater, an interesting monograph about the cuisine of Port St. Never. But in the end nothing of consequence is voiced. \n\t\t*goto end_chooser\n\n\n*label end_chooser\n*page_break\n*if ending = \"hallucinate\"\n\t*goto institution_fine2\n*if ending = \"prison\"\n\t*goto institution_fine2\n*if ending = \"hunterswarm\"\n\t*goto hunterswarm\n*if ending = \"rejection\"\n\t*goto post_rejection\n*if ending = \"scholar\"\n\t*goto scholar3\n*if ending = \"grandscholar\"\n\t*goto grandscholar2\n\n*label metacheev\n*check_achievements\n*if (((((((((choice_achieved_devoured and choice_achieved_stay) and choice_achieved_hallucinate) and choice_achieved_novelist) and choice_achieved_scholar) and choice_achieved_grandscholar) and choice_achieved_prison) and choice_achieved_pirate) and choice_achieved_advisor) and choice_achieved_gormless)\n\t*achieve completist\n*goto_scene ending", "11_statsreview": "*comment Reputation – Persistence (vs. Spontaneity)\n*if (Persistence \u003c= 5)\n\tPersistence between 0 and 5\n*if ((Persistence > 5) and (Persistence \u003c= 10))\n\tPersistence between 5 and 10\n*if ((Persistence > 10) and (Persistence \u003c= 15))\n\tPersistence between 10 and 15\n*if ((Persistence > 15) and (Persistence \u003c= 20))\n\tPersistence between 15 and 20\n*if ((Persistence > 20) and (Persistence \u003c= 25))\n\tPersistence between 20 and 25\n*if ((Persistence > 25) and (Persistence \u003c= 30))\n\tPersistence between 25 and 30\n*if ((Persistence > 30) and (Persistence \u003c= 35))\n\tPersistence between 30 and 35\n*if ((Persistence > 35) and (Persistence \u003c= 40))\n\tPersistence between 35 and 40\n*if ((Persistence > 40) and (Persistence \u003c= 45))\n\tPersistence between 40 and 45\n*if ((Persistence > 45) and (Persistence \u003c= 50))\n\tPersistence between 45 and 50\n*if ((Persistence > 50) and (Persistence \u003c= 55))\n\tPersistence between 50 and 55\n*if ((Persistence > 55) and (Persistence \u003c= 60))\n\tPersistence between 55 and 60\n*if ((Persistence > 60) and (Persistence \u003c= 65))\n\tPersistence between 60 and 65\n*if ((Persistence > 65) and (Persistence \u003c= 70))\n\tPersistence between 65 and 70\n*if ((Persistence > 70) and (Persistence \u003c= 75))\n\tPersistence between 70 and 75\n*if ((Persistence > 75) and (Persistence \u003c= 80))\n\tPersistence between 75 and 80\n*if ((Persistence > 80) and (Persistence \u003c= 85))\n\tPersistence between 80 and 85\n*if ((Persis
