top, stop this at once!\" you cry. You bravely force yourself into the flurry of flying fists and hurled shoes, at risk of great personal harm to yourself. \"There's no need to resort to violence! Please, there are children present!\"\n\n\t\tYou suffer a sharp blow to the side of your head and a rip along one cuff, but slowly the combatants disengage.\n\t\t*set madame %+10\n\t\t*set sandoval %+10\n\t\t*set bloodloss +1\n\n\t#Make sure Javel and I are a safe distance away from these maniacs!\n\t\t*set rigor %+10\n\t\tThere's no sense in interfering with these brawling imbeciles. They'll surely not thank you for your aid, and at any rate it's unclear whose side you should even be on! You pull Javel safely away to let the two of them sort themselves out. The fighting continues for long moments; the lady is by far the superior combatant, but Sandoval defends himself with a vigor borne of desperation.\n\n\t\tIt ends with Sandoval facedown in the sand with the lady's foot upon his neck. \"You should never have come back here, Sandoval,\" she hisses. Then she relents. He rises, dusting himself off.\n\t\t*set sandoval %-10\n\t\t*set madame %-10\n\t\n\"I take it the two of you are acquainted?\" you ask.\n\nThey refuse to look at one another. \"This is Madame Blandine LeJeunesse,\" Sandoval says. \"My ex-fiancee.\"\n\nShe straightens herself. \"The very one,\" she announces. \"I have been deeply wronged, I'll have you know, and you shouldn't listen to a single syllable that this vile creature has told you about me.\"\n\nSandoval sputters. \"Vile? Vile! Insufferable woman! I don't know for a moment why I ever thought I should make you my wife. I've saved myself from a lifetime of woe. Now leave me and my colleague to do our work. We're scholars, doing serious scholaring!\"\n\n\"A scholar? You? You're nothing but a coward! A traitor! You left in the night and didn't even leave a note. How dare you. How dare you!\"\n\nFor a moment it looks like they're going to resort to fisticuffs again. \"I don't have to take this from you!\" Sandoval sneers at her. He gives you a short, curt bow. \"I'll see you later. But for now, I'm afraid, ${lastname}, you'll have to deal with this ignorant reprobate on your own. Good luck.\" He saunters away down the beach, then vanishes into the jungle. Javel looks at you, shrugs, and follows him away.\n\nMadame wheels and her attention settles upon you. \"So. I don't believe I've made your acquaintance before. Who are you?\" her eyes are narrow, calculating. \"And what are you doing here?\"\n\n*choice\n\t#\"I'm sent by the Royal German Marinological Society!\"\n\t\t\"So you say,\" she snarls. \"But then explain what you're doing with my Sandoval, of all people. That villain! That oaf! That—that—\"\n\t\t*if madame > 50 \n\t\t\tShe catches herself. \"Forgive me. I am but a fragile blossom, and my heart is tender. I can be very emotional at times. You're here from the Society, you say? I'd heard they were sending someone, but I expected a ship, not a castaway.\"\n\n\t\t\t\"We were beset by pirates.\" You wave a hand at your bedraggled condition. \"This isn't the first impression I would have chosen to make.\"\n\n\t\t\t\"Indeed, indeed not,\" she murmurs. \"Come with me and we'll get you settled into your accommodations.\"\n\t\t\t*goto shack\n\t\t*else \n\t\t\t*goto madame_jealous\n\t\t\n\n\t#\"Just an adventurer traveling with Sandoval for a time.\"\n\t\t\"Yes, I can see that,\" she says, ice-cold. \"Traveling together, were you?\"\n\n\t\t\"On business!\" you add hastily. \"By order of the Royal German Marinological Society!\"\n\t\t*set madame %-25\n\t\t*goto madame_jealous\n\n\t#\"I'm here to do research about mermaids.\"\n\t\t*goto madame_mermaids\n\t*if (introduction = true) #\"Here, I believe this letter of introduction will explain everything.\"\n\t\tYou hand her your letter of introduction from Baroness Scharknell. Madame breaks the seal and reads it, nodding thoughtfully. When she's done, she folds the letter up and taps her lips with it, gazing at you with sharklike scrutiny. \"It would appear you are someone of admirable connections,\" she murmurs. Madame preens a bit. \"I can see you are a person of great taste and refinement,\" she says at last. \"I'm sure you'll soon establish that we are kindred spirits, you and I. But for now—if you need anything at all, I am at your service.\"\n\n\t\t\"I could use a place to stay,\" you venture.\n\n\t\t\"Oh, indeed!\" She smiles, and her resemblance to a shark grows no less. \"Oh, how silly of me, you must need rest. If you're the person sent by the Royal German Marinological Society, why then I am your landlady. I already have a place prepared for you. Come!\"\n\n\t\tShe curtsies and preens simultaneously, and waves for you to follow her into the jungle.\n\t\t*set madame %+25\n\t\t*set credibility %+10\n\t\t*goto shack\n\n*label madame_jealous\n\nHer eyes widen as a new thought occurs to her. \"If you are traveling with my Sandoval…you—you don't have a romantic attachment toward him, do you?\" Shock turns swiftly to utter certainty. \"Do you have designs on his affections for yourself? You must!\" Her chin wrinkles with disgust. \"How dare you toy with a man who's proven himself so…so…vulnerable to manipulation!\"\n\n*choice \n\t#\"How dare you insinuate such a thing about me!\"\n\t\t*if rigor \u003c 45\n\t\t\t*set madame %+20\n\t\t\tHer eyes spark with something like respect. Well, respect might be too strong a word. Lessened contempt, maybe.\n\n\t\t\t\"Perhaps I was wrong about you. Perhaps I've misread the situation. Hmm. Hmmmmmm.\" \n\n\t\t\tYou press your case. \"If you're quite satisfied, I've recently been shipwrecked, and I might appreciate a soft bed and a change of clothes.\"\n\n\t\t\tShe shakes herself. \"Fine. Fine. Come with me.\"\n\t\t\t*goto shack\n\t\t\t\n\t\t*else\n\t\t\t*set madame %-20\n\t\t\tShe seethes as though you had stuffed a sack of eels into her already overburdened corset. \"Of course that's what you [i]would[/i] say, isn't it?\" Her complexion is mottled and faintly purple. \"Still, I am nothing but a woman of honor, and I have an obligation to you. Come.\"\n\n\t\t\tShe pivots on her heel and stalks away, leaving you with no choice but to follow.\n\t\t\t*goto shack\n\t\n\t#\"I assure you, I'm only here on behalf of the Royal German Marinological Society.\"\n\t\t*if credibility > 50\n\t\t\t*set madame %+10\n\t\t\tShe relaxes. \"Of course, of course, the Society. They sent word I was to expect a guest. Tell me, what interest does the Society have in Broken Shell Island?\"\n\n\t\t\t\"Mermaids,\" you reply. \"Our interest is in mermaids.\"\n\t\t\t*goto madame_mermaids\n\t\t*else\n\t\t\tShe seethes as though you had stuffed a sack of eels into her already overburdened corset. \"Of course that's what you [i]would[/i] say, isn't it?\" Her complexion is mottled and faintly purple. \"Still, I am nothing but a woman of honor, and I have an obligation to you. Come.\"\n\n\t\t\tShe pivots on her heel and stalks away, leaving you with no choice but to follow.\n\t\t\t*goto shack\n\t\t\t\n\t#\"Sandoval, that awful man?! Not in a million years!\"\n\t\tShe glows with delight. \"Ah, I thought if you were accompanying him, that might mean you hold him in high esteem! But perhaps you are here despite his efforts, not because of them.\"\n\n\t\tYou nod cautiously. Madame is certainly a volatile substance; she should be treated with all caution. \"I was sent,\" you say, \"to investigate the existence of mermaids.\"\n\t\t*set madame %+15\n\t\t*goto madame_mermaids\n\n\t#Sure, let's go with that. \"Yes, I'm having a fling with Sandoval.\"\n\t\t*set madame %-30\n\t\tMadame fans herself with her hands, unable to speak from the shock. You endure a long moment of her mute, horrified hatred.\n\n\t\tBridge: burned. But at least she's not bothering you anymore, right?\n\n\t\tAfter several minutes, she recovers herself. \"Come with me,\" she hisses. You follow, a bit reluctantly, wondering if she's bringing you to some sort of death trap. And then, for a single heart-stopping moment, you think that might be exactly what's going on.\n\t\t*goto shack\n\n*label madame_mermaids\n\nMadame's brow furrows dangerously. \"What is it you expect to find? You can't possibly be suggesting that this awful man's unsavory obsessions are factual, rather than fictitious?\" Her fists have curled tightly at her sides.\n\n*fake_choice\n\t#\"I'm sure there are no mermaids.\"\n\t\tShe smiles wide. She has rather a lot of teeth, Madame LeJeunesse. \"Of course not. Due diligence, is it? Conducting a proper investigation in order to settle the matter once and for all? Be welcome, scholar! Come, let me show you to your temporary home on Broken Shell Island.\"\n\t\t*set madame %+10\n\t\t*set loyalty %-15\n\t\n\t#\"I'm completely sure there are mermaids.\"\n\t\tShe reels back as though you had punched her. \"How can you believe—idiots! Scoundrels!\" She raises her fist, and for a moment you think she's going on the attack, but instead she points into the jungle. \"Still, I am nothing if not a woman of honor, and I promised to provide you with hospitality. Come.\" She stalks into the jungle, without checking to see if you're following.\n\t\t*set madame %-10\n\t\t*set loyalty %+15\n\t#\"The truth is what it is, and it's my job to discover it.\"\n\t\tShe harrumphs. \"Perhaps there is hope for you yet.\" She shakes her head, and begins to walk into the jungle. \"Come.\"\n\t\t*set credibility %+10\n\t\t*goto shack\n\n\n*label shack\n\nThe hut she leads you toward is…well, it's got walls and a roof, and that's about as kind as you can be about it. The thatching is patchy, like a fourteen-year-old's moustache, and the whole thing lists aimlessly toward the left. \"The Society arranged everything before you arrived,\" Madame LeJeunesse announces. \"It's a shame they couldn't put a little more coin toward your lodgings, so I'm afraid you'll find things a bit sparse.\"\n\n*if madame > 65\n\t\"A shame, really,\" she repeats, sympathetically. \"You seem like such a promising individual.\"\n\t*goto shack2\n\n*elseif madame \u003c 35\n\tShe gives you the side-eye. \"Though I can see why they might not want to throw good money after bad,\" she murmurs.\n\t*goto shack2\n\n*else\n\t\"It is what it is,\" she inhales deeply, leading to an unsettling cracking noise from her corset.\n\t*goto shack2\n\n*label shack2\n*fake_choice\n\t#\"Great, thank you. You're very kind.\"\n\t\t\"I am, aren't I?\" she muses.\n\t\t*set madame %+10\n\t#\"Is it…safe? I mean, is the place up to code and everything?\"\n\t\t\"I thought the Royal German Marinological Society only welcomes scholars with brave hearts and stout constitutions,\" she growls.\n\t\t*set madame %-5\n\t#\"Impossible. This won't do at all! Don't you know who I am?\"\n\t\tShe whirls and stares you down. \"I know precisely who you are,\" she sniffs. \"You are a nobody. A nothing! A fool on a fool's errand.\"\n\t\t*set madame %-15\n\nShe bangs the door open so hard that you worry it may fall off its hinges. It does not. She ushers you inside with a grand sweeping motion. \n\nThe single room smells of mildew and fish. There is a bed, a desk, and a simple chair, each one made of crudely lashed-together bamboo. There is a blanket; in the dimness you can't quite tell if its pattern is faded, or if it's simply covered with an overlapping network of impressive stains.\n\n\"Voila. This is all yours for the duration of your stay on Broken Shell Island.\" She curtsies, a grand gesture undermined by the alarming flexing of her corset. \"And now I leave you to your own devices. Farewell.\"\n\nShe sweeps away, leaving you alone with your thoughts. And the tiny lizard climbing in through one window. Now what?\n\n*choice\n\t#My patron should hear of this turn of events. I'll write a letter.\n\t\tAh, clear and consistent communication, the cornerstone of a good relationship with one's friends, colleagues, and employers.\n\t\t*set loyalty %+10\n\t\t*goto letter\n\t#I should begin my investigation right away. To the beach!\n\t\tYou've waited long enough for this moment—you couldn't possibly delay a second longer. Time to see what you can see!\n\t\t*goto beachcomb\n\t*if (bloodloss > 0) #It's been a long and arduous journey. I should rest and heal my injuries.\n\t\tThere will be plenty of time to start your studies in earnest tomorrow. But you've had a harrowing time, and it's best to recuperate.\n\t\t*goto rest\n\t*if (bloodloss = 0) #It's been a long and arduous journey. I should just call it a day and get to bed.\n\t\tThere will be plenty of time to start your studies in earnest tomorrow. But you've had a harrowing time, and you should recuperate.\n\t\t*goto rest\n\n*label letter\n\n*set letter_count +1\n*if patron = \"scharknell\"\n\tYou settle at your ramshackle desk to write to your patron, the inestimable social butterfly Baroness Scharknell.\n\t*goto letter_cont\n*elseif patron = \"tubingen\"\n\tYou settle at your ramshackle desk to write to your patron, the undisputed master of letters Lord von Tubingen.\n\t*goto letter_cont\n*elseif patron = \"wellington\"\n\tYou settle at your ramshackle desk to write to your patron, the relentlessly rigorous Miss Wellington.\n\t*goto letter_cont\n*else \t \n\tYou settle at your ramshackle desk to write to your patron, the devilish and daring Mr. Fontana.\n\t*goto letter_cont\n\n*label letter_cont\nMost of your belongings have been lost at sea, alas, including much of what the Society packed along with you in those trunks and cases. But you find pen and paper on the desk, and blotting papers, ink, wax for a seal—everything a scholar should require for an informative missive. And there certainly is a lot of information to pass on. Pirates, getting lost at sea, not to mention the brawl between Madame and Sandoval. But where to even begin?\n\n*choice\n\t*if (moonlit = true) #I should discuss my new mermaid sighting.\n\t\t*set rigor %+15\n\t\t*set loyalty %+10\n\t\tYou describe the events of your mermaid encounter, being clear, of course, that your impressions are haphazard and not entirely scientific. The flash of what might be scales, your vision by moonlight, the scant evidence you uncovered afterward. It's nothing like solid proof, of course, but it's more than you had when you first set sail for Broken Shell Island. You finish with promises to conduct a much more rigorous investigation, starting in the morning. Your mission here has only just begun.\n\t\t*goto sleep\n\n\t#This letter should describe the people I've met so far.\n\t\t*set credibility %+10\n\t\tAnd what characters they've been! Between the pirates and Madame LeJeunesse, your circle has expanded to include new people the likes of which you have never before encountered. By the time you set your pen down, your letter describes the people you've met and how they behave so clearly that any reader must surely feel as though they'd met them before.\n\t\t*if patron = \"scharknell\"\n\t\t\t*set patron_favor %+10\n\t\t\t*goto sleep\n\t\t*else\n\t\t\t*goto sleep\n\n\t#I should talk up my own daring exploits.\n\t\t*set credibility %-10\n\t\t*set rigor %-10\n\t\tOne must look out for one's self, after all, or nobody else will. And if you want to develop a high reputation in the Society, surely the relevant information must be guided toward the correct parties! By the time you put your pen down, you are satisfied that your letter strikes exactly the right balance between endearing humility and subtle self-aggrandizement. Any reader must surely be impressed with how you've taken on your adventures with such aplomb.\n\t\t*if patron = \"fontana\"\n\t\t\t*set patron_favor %+10\n\t\t\t*goto sleep\n\t\t*else\n\t\t\t*goto sleep\n\t#Nothing so engaging as a true story well told!\n\t\t*set rigor %-10\n\t\tYou take inspiration from the stories you read as a child, and pen your letter in the style of [i]The Astonishing Life and Times of A Royal German Marinological Scholar[/i]. Ah, the drama! The action! The heartbreak! By the time you set your pen down, your letter is a work of narrative so compelling that any reader must surely be biting their nails waiting for your next missive.\n\t\t*if patron = \"tubingen\"\n\t\t\t*set patron_favor %+10\n\t\t\t*goto sleep\n\t\t*else\n\t\t\t*goto sleep\n\t#This should be a strict and professional accounting of events.\n\t\t\t*set rigor %+10\n\t\tThe utmost duty and honor of a Royal German Marinological Scholar is to record the truth of events as factually and thoroughly as possible. When you set your pen down, your letter is meticulous and detailed. Nobody will be able to doubt your academic prowess when you've returned.\n\t\t*if patron = \"wellington\"\n\t\t\t*set patron_favor %+10\n\t\t\t*goto sleep\n\t\t*else\n\t\t\t*goto sleep\n\n\n*label beachcomb\n\nYou make your way back toward the beach, hoping to find a clue—or perhaps even catch sight of a mermaid. In the dusk, you stumble over every stone and stick of driftwood to be found on the beach. Not to mention any number of broken shells! This island has truly earned its name. \n\nYou stand before the ocean, watching the waves roll endlessly in. Now that you're here, you're not quite sure what you'd hoped to accomplish, or how.\n\n*choice\n\t#Investigate the shallows.\n\t\tYou splash around a bit, taking note of how high the tide is, how warm the water, how tall the waves. The seabed beneath your feet is soft and silky with patches of kelp. You move further out to see how quickly the ocean becomes deeper. The slope is gradual. You expect to find a steep drop-off, but if there is one, it's farther out from shore than you care to go just at the moment.\n\t\n\t\tAfter a while, the pure joy of being submerged overcomes you. Investigation gives way to simply moving your body through the water. You float, you splash, you dive. You even work on your swimming technique, and discover you can hold your breath longer than you'd expected.\n\n\t\tThere is no sign of mermaids, however, and eventually you return to your little hut to rest.\n\t\t*set swimming +1\n\t\t*goto sleep\n\t#Sift through the sand.\n\t\tThe safest thing to do in the fading light. You search a patch of beach, finding only sand, stones, and pieces of broken shells. You move onward to the next patch and find more of the same.\n\n\t\tStill, a scholar must be willing to soldier through even unrewarding work. Patience is what makes a career, just as much as daring or intellect. You search the next patch, and the next.\n\n\t\tBy the time the light is gone, you've discovered three whole conch shells, a lost and badly greened copper piece, and what appears to be a sharp-edged chunk of deep-sea coral. None of it speaks to you of mermaids.\n\n\t\tAh, well, tomorrow your search begins in earnest. Until then, you need rest.\n\t\t*set persistence %+15\n\t\t*goto sleep\n\t#I won't find anything in the dark; call it a night.\n\t\t*set persistence %-15\n\t\tYou hesitate. The sun is setting fast, you don't know the terrain, and you're fatigued enough that you might miss anything short of a live mermaid swimming up and grabbing you. In this case, prudence is the better option. Rest, then, and wait until light. If the mermaids are there now, they still will be in the morning.\n\t\t*goto sleep\n\n\n*label rest\n*if bloodloss = 0\n\t*set persistence %-10\n\tYou've made it this far without injury against all expectation, including your own. Does this mean you're cut out for the life of a scholar? A born natural? Or does it mean that you're playing it too safe and not risking enough in the name of truth and the Society?\n\n\tWell, of course that's all a matter of opinion. Still, you have hurts of the mind that need healing, if not of the body. You've been through a lot these last few days. That narrow bed is calling to you.\n\t*goto sleep\n\t\n\n*else\n\t*set bloodloss -1\n\t*set persistence %-10\n\tBefore nodding off, you attend to your wounds to the best of your ability. Among the meager resources your hut offers is, at least, a robust first aid kit: clean linens and dressings, and a little pot of a creamy unguent that smells of herbs and regret. It seems the Society expects its own to get into the odd spot of trouble. Or perhaps they had low expectations for your physical aptitude and your ability to avoid self-induced personal harm.\n\n\tYou bandage your body up as best you can and leave your wounds to heal while you sleep.\n\t*goto sleep\n\n*label sleep\n\nYou lie in bed for a time, turning over your hopes and worries. In the end, you fall asleep with the sea rushing in your ears and the bed rocking gently; you've been at sea so long that the land seems to move beneath you.\n\nYou dream of a single haunting melody rising up into the air, then a razor-sharp counterpoint. They blend together in seamless harmony, like the sea and sky. There are words in a language you do not know, but you understand them all the same. \"Come find us. We are waiting.\" Whether this is a challenge, threat, or promise, you cannot say.\n\n*finish", "5_search": "Early in the morning, your sleep is broken by an inarticulate bellow from somewhere outside your—your—where is this, again? You blink and try to get your bearings in this unfamiliar place. Ah, yes, that sketchy island dwelling—your sleep was much more sound than one might have expected in such spare accommodations. It turns out that a long ocean voyage followed by a pirate attack is quite exhausting!\n\nThe noise, though: it goes on for long moments, loud and incredibly annoying. You try to place it. Whale song? No, no, too shrill. Birds? Hmm, no, too sustained. A sudden thought occurs to you. Could it be? Could mermaids make such a terrible noise?\n\nThe dawn has come and gone, and from the rich, syrupy quality of the sunlight leaking in through the shutters, so has much of the rest of the morning. You rub at your bleary eyes, then pull on your clothes to investigate.\n\nOutside you find Sandoval sauntering away from the beach, his fingers clutched tight to his arm. He's grinning like a fool. A fool who's somehow won the lottery, or had some other surprising and wonderful thing occur.\n\n*if (rigor > 65) \n\tSomething is on his fingers. Something dark and red. Is that…is that blood?\n\t*goto morning\n*else\n\t*goto morning\n\n*label morning\n\n*choice \n\t#Greet Sandoval.\n\t\t*set sandoval %+10\n\t\t\"Good morning, Sandoval.\" You nod amiably.\n\t\t*if sandoval > 65\n\t\t\t*goto sandoval_reveals\n\t\t*if sandoval > 40\n\t\t\t*goto sandoval_conceals\n\t\t*else\n\t\t\t*goto sandoval_dismissal\n\n\t#Look for the source of the noise.\n\t\tYou ignore Sandoval and scan the area looking for an animal, a machine, anything that would explain that unearthly bellow, but there is nothing. Nothing except Sandoval. Did he…could he possibly have…\n\n\t\tNo, no, no human could have possibly made that sound. Not even Sandoval.\n\t\t*if sandoval > 65\n\t\t\t*goto sandoval_reveals\n\t\t*if sandoval > 35\n\t\t\t*goto sandoval_conceals\n\t\t*else\n\t\t\t*goto sandoval_dismissal\n\n\n\t#Ask Sandoval if he heard something.\n\t\t*set sandoval %-10\n\t\t\"I was awakened by a terrible noise,\" you tell him. \"Do you have any idea what made that unearthly sound?\"\n\n\t\tHe stiffens, obviously insulted by your question. \"That was me,\" he barks. \"I was singing.\"\n\n\t\t*if sandoval > 60\n\t\t\t\t*goto sandoval_reveals\n\t\t*if sandoval > 40\n\t\t\t*goto sandoval_conceals\n\t\t*else\n\t\t\t*goto sandoval_dismissal\n\n\t\t\n\t*if (rigor \u003c 40) #Ask if Sandoval is all right.\n\t\t*set sandoval %+15\n\t\tSandoval seems startled by your concern. \"I've had it worse, no need to trouble yourself on my account.\" His eyes unfocus and his foolish grin grows wider for a moment, as if he were reliving a particularly delicious memory.\n\t\t*if sandoval > 60\n\t\t\t*goto sandoval_reveals\n\t\t*if sandoval > 40\n\t\t\t*goto sandoval_conceals\n\t\t*else\n\t\t\t*goto sandoval_dismissal\n\n\n*label sandoval_conceals\n*set sandoval_conceals true\nThen Sandoval shuffles his feet and bobs his head, like a socially awkward pigeon. \"If you'll pardon me,\" he says. He nods toward his arm, where blood is welling up through his fingers. \"No time to be sociable.\"\n\nHe rushes away, presumably to attend to his mysterious injury. Hmm. Curious.\n\n*goto sandoval_choice\n\n\n*label sandoval_dismissal\nSandoval readjusts his fingers, pressing them harder against his arm. Blood drips from his fingertips. \"Go on, just ignore me like you want to.\" His visage grows darker. \"You and your whole Royal German Marinological Society! Elitists, all of you! More interested in your reputation than in the truth!\"\n\nHe spits at your feet and stalks away. Droplets of blood scatter into the sand in his wake. \n\nThat was certainly…odd. Wonder what in the world got into him.\n\n*label sandoval_choice\n\n*choice\n\t#Follow after him and demand an explanation! I won't take no for an answer!\n\t\tYou catch Sandoval before he's gone very far. \n\t\t*if persistence > 50\n\t\t\t\"I must know what's going on here!\" You bar his way. \"Is it to do with mermaids? If you are the expert you claim to be, prove it—tell me what you know! Or do you know anything at all?\"\n\n\t\t\tThis affront to his intellectual vanity cannot be borne, it seems. He puffs himself up like an angry chicken. \n\t\t\t*goto sandoval_bacon\n\t\t*else\n\t\t\t\"Wait! What in the blazes is going on here?\" you demand. But Sandoval slips by you, more nimble than you would have thought, especially considering his whole bleeding situation. He calls back over his shoulder: \"Some matters are beyond your feeble wit and understanding of the world, Scholar ${lastname}!\"\n\n\t\t\tBeyond your understanding? Did he just…did he just insult you? You fume for a while, trying to come up with a witty response, but he's well out of earshot before you come up with anything.\n \n\t\t\t*goto javel_folklore\n\t#Try to deduce what happened just now from the available evidence.\n\t\tYou don't have much to go on. That bellowing noise, Sandoval's shifty behavior, his mysterious injury…\n\t\t*if rigor > 50\n\t\t\tOh, and there's the matter of the trail of blood! You follow it, backtracking to see where Sandoval received his injury. \n\t\t\t*goto mermaid_sighting\n\t\t*else \n\t\t\tDid he get in a fight? Was the wound self-inflicted? Some sort of ridiculous mermaid-summoning ritual, perhaps? You can't figure it out. You kick at a rock and stub your toe. This is not an auspicious start to your investigation, ${firstname}. Let's hope you haven't set any precedents.\n\t\t\t*goto javel_folklore\n\t#Forget that weirdo. Time for my morning exercise!\n\t\tSandoval is a crackpot to end all crackpots, and it's none of your concern if he enjoys a little morning howling and bleeding. To each their own, right? But you need to settle into something like normal life here, and that includes a rigorous fitness routine. The mind is sharper when the body is fit, right?\n\t\t*if swimming > 2\n\t\t\tAnd nothing is better for fitness than a morning swim. You wander down to the shore to take a dip in the ocean. \n\t\t\t*goto mermaid_sighting \n\t\t\t\n\t\t*else\n\t\t\tYou perform a series of calisthenics and stretches, each scientifically proven to be beneficial to some muscle or another. You work up a satisfying sweat. In all, it clears your mind for the day of serious intellectual pursuits. You're ready to begin your work!\n\t\t\t*goto javel_folklore\n\n\n*label sandoval_reveals\n\nThen Sandoval grabs you by the shoulders and stares deeply into your eyes. His breath smells uncomfortably like salted herring. \"They came for me,\" he breathes, and the fumes of his exhalation creep up through your sinuses. \"They were waiting for me to return. Waiting for me!\"\n\nSomething warm drips onto your feet. You disentangle yourself from his grasp and look down to discover your shoes stained with blood, dark and red. A similar bloom spreads all along Sandoval's sleeve.\n\n\"Who was waiting? What happened to you?\" you ask. Does he mean the mermaids?\n\nHe smiles serenely. \"It looks worse than it is,\" he says. \"They know just how hard they can bite. Practice, you know! I just saw them, over by Crab Corner.\" He points a shaking, blood-covered finger toward the coast.\n\n*choice\n\t#Examine his injury.\n\t\t\"Let me see that.\" You pry away his fingers and scrutinize his wound. Tooth marks, about the size of an adult human bite, but the pattern is very, very wrong for any human mouth. \"A mermaid bit you?\"\n\n\t\tHe chortles. \"Oh, just a nip of affection, I assure you! We play a game, the mermaids and I, and they get points for these little nibbles of theirs.\" He's in unreasonably good spirits for someone who's been bitten by a mermaid.\n\n\t\t\"You seem to know rather a lot about their habits,\" you begin, cautiously.\n\t\t*goto sandoval_bacon\n\n\t#Ask him what happened.\n\t\t*set sandoval %+5\n\t\tHe chortles. \"Just a bit of a game we like to play, the mermaids and I! They're secretive creatures, but they trust me. Or, well, they like to play a game with me, anyway. A game that involves these playful little nips!\"\n\n\t\t\"You seem to know rather a lot about their habits,\" you begin, cautiously.\n\t\t*goto sandoval_bacon\n\t\n\t#Rush to Crab Corner.\n\t\tIf the mermaid was chomping on Sandoval mere minutes ago—why, they might still be there! You bolt away from Sandoval as fast as you can.\n\t\t*if bloodloss \u003c 3\n\t\t\t*goto mermaid_sighting\n\t\t*else\n\t\t\t*goto miss_mermaid\n\n\n*label sandoval_bacon\n\n\"I do, at that! If only you could have seen my records! I could have proven…\" His face clouds over with unhappiness. \"Well, there's no help for it now. But if you want to spot a mermaid for yourself—\"\n\n\"Of course I do!\" you chime in eagerly.\n\n\"Bacon,\" he pronounces. \"They love flowers, too, but for my money, bacon is the way to go. Mermaids go crazy for the stuff! Fry up a good batch, and they'll come from miles around for a taste of it. I guarantee it!\"\n\n\"Bacon,\" you repeat. Bacon. Huh.\n\nHe winks at you. \"You want to be a scholar, stick with me. You've got the gravitas, but I've got the know-how! And now, if you'll forgive me, I should get a bandage.\" He saunters away, whistling merrily. \n\nWhat an odd duck he is. But perhaps no more odd than you are, at the end of the day.\n\n*set bacon true\n\n*goto javel_folklore\n\n\n*label mermaid_sighting\n\nThere is a rocky path leading down to the coast; you follow it at a breakneck pace. At the end of the trail you find an outcropping of flat-topped stones jutting out into the bay. You scan the surface of the water looking for some sign, some hint that a mermaid has been present. \n\nAnd there they are, a furlong or more away from the shore: three mermaids, a confusion of teal, purple, saffron, chasing one another and splashing playfully. The fans of their tails are broad and lacy; they would be the envy of the fashionable set back home. One of them leaps, glittering, from the water and then dives below. The others follow. You wait a few long heartbeats to see if they'll surface again, but they don't.\n*set evidence +1\n*set daylight_sighting true\n\n*if sandoval_conceals = false\n\n\tSandoval arrives moments later, huffing and turning a purplish shade. He grins at you. \"I told you they're real, ${firstname}!\" He claps you on the shoulder, leaving a tiny splatter of blood on your sleeve. \"We'll show the Society what for. They'll have to believe us!\"\n\n\tYou nod and look down at your feet, a bit sheepishly. Wait—there's a little pool of blood: Sandoval's, no doubt. And close by is a broken tooth. You stoop down and pick it up. It's about the size of a human canine, but much sharper. And entirely the wrong shape for a shark tooth. You slip it into your pocket. So goes science: the slow accumulation of tiny pieces of evidence that, taken together, add up to a compelling and indisputable truth.\n\n\tSandoval nods at his injury, still bleeding furiously. \"Now, if you'll excuse me, I suppose I should put a bandage on this.\" He wanders away, whistling merrily. \n\n\t*goto javel_folklore\n\n*else\n\tAt last you let out your breath and look away. Wait—there's a little pool of blood at your feet: Sandoval's, no doubt. And close by is a broken tooth. You stoop down and pick it up. It's about the size of a human canine, but much sharper. And entirely the wrong shape for a shark tooth. You slip it into your pocket. So goes science: the slow accumulation of tiny pieces of evidence that, taken together, add up to a compelling and indisputable truth.\n\t*set sandoval_conceals false\n\n\t*goto javel_folklore\n\n\n*label miss_mermaid\n*set persistence %-5\n\nYou run along the coast, scanning the water for signs of the mermaid. Sandoval is close on your heels, leaving a trail of red droplets behind. But your injuries slow you down, and by the time you reach the shore, there is no sign of anything even approaching a mermaid.\n\nYou scan the horizon anyway, but don't see so much as an unexplained ripple. The surf caresses your ankles, eating away at the sand beneath your feet. You bend over, panting. Has Sandoval steered you wrong?\n\nHe can tell where your mind has gone. \"They were here,\" Sandoval insists. \"They were! Don't worry, ${firstname}, you'll spot them for yourself soon enough. All it takes is some determination and patience.\"\n\nHe performs a wobbly bow—he's probably woozy from blood loss—and then excuses himself. \"I should get a bandage,\" he says. \"Forgive me, we'll speak another time.\"\n\n\n*label javel_folklore\n\nJavel appears not long after, bearing a breakfast tray for you laden with coconuts, pineapple, tea, and a plate of something you speculate were meant to be scones. They're rather more stone-like than scone-like, but you're not really in any position to complain. \"From Madame LeJeunesse!\" ${javel_pronoun} says, and shoves the tray into your hands.\n\nA flashbulb goes off in your head: an idea! Possibly even a good idea. Javel has lived here on Broken Shell Island all ${javel_poss} life. If the seas nearby are rife with mermaids, perhaps you can learn something from asking the right questions in the right way. But how to approach it?\n\n*fake_choice\n\t#Flattery.\n\t\t\"You're a clever one,\" you say, with what you're hoping is a kind smile. \"I bet you know a thing or two about mermaids, don't you?\"\n\n\t#Authority.\n\t\tYou clear your throat and speak in a low and commanding voice. \"Listen here,\" you say, \"I'm on an important mission to find out about mermaids, so I need you to tell me everything you know about the subject.\"\n\n\t#Bribery.\n\t\tYou smile encouragingly. \"Say, Javel, if you tell me anything you know about mermaids, I'll…I'll give you my scones.\"\n\n\t\tJavel takes your proffered scone and munches on it thoughtfully. \n\n\"I do know some things…\" ${javel_pronoun} begins.\n\n\"Go on, go on.\" You set the tray of breakfast items down on a nearby rattan table and motion for Javel to sit with you.\n\nJavel settles into a seat and then kicks ${javel_poss} feet thoughtfully in the air for a while. You begin to worry Javel is making something up in hopes of satisfying you. Then ${javel_pronoun} unleashes an unprecedented flood of verbiage. \"My gramps used to tell stories about mermaids living just off the beach, here, said they're not anything like the legends about 'em. Teeth sharper than a shark's, and as happy to bite your hand off as look at you. Gramps said they're nasty things, 'vain and vicious,' like that, but smarter than anything. Said they had a peace for a while, and even traded some things, so now I have a mermaid comb Gramps says came from a real mermaid a long time ago. Anyway, do you want to see it?\" With this, Javel stops suddenly.\n\nIt takes a while for your brain to catch up with Javel's mouth. \"Do I want to see the mermaid comb?\"\n\nJavel nods soberly.\n\n\"Yes, of course, I'd love to!\"\n\nThe curl-topped child scampers away, only to return carefully bearing what appears to be a comb carved out of a single piece of coral. Javel holds it out to you with both hands. \"I want to give this to you,\" ${javel_pronoun} says. \"For science. I want to make a difference in the world!\"\n\nWell! That's a bit of a pickle. How to handle this one?\n\n*choice \n\t#Examine the comb carefully first.\n\t\t*goto javel_examine\n\t\t\n\t#Thank Javel and pocket the comb.\n\t\t*set evidence +1\n\t\t*set javel_fake true\n\t\t*goto javel_accept\n\t#Don't take the gift.\n\t\t*goto javel_decline\n\n*label javel_examine\n\"How generous! Do you mind if I take a closer look at it?\" you ask. Javel pushes it eagerly into your hands.\n\t\nThe comb does appear to be genuine coral, rather than some form of bone or wood; the texture is accurate. But is it a clever forgery?\nThe handle is carved into a delicate pattern that reminds you of ribbons of kelp braided along the ocean floor. The silhouette of a mermaid swims among them. \n*if (rigor > 55)\n\t*set persistence %+10\n\tAh—your close examination pays off. You find words carefully etched into one edge in tiny letters. They read [i]MADE IN CANADA[/i].\n\n\tJavel's Gramps was telling fibs, it appears. Best not to let on, though; its scientific value may be negligible, but there's no need to erode the object's sentimental value in Javel's eyes.\n\t*goto javel_decline\n*else\n\tYou examine the comb for some sign of fabrication, some clue that it is something other than what Javel believes. But you come away with nothing. The object seems completely genuine. Huh!\n\t*set evidence +1\n\t*set javel_fake true\n\t*goto javel_accept\n\n\n*label javel_accept\n\nA real artifact from the mermaids—solid evidence!  Your veins are full to bursting with excitement. \"Thank you, thank you!\" You embrace Javel and then dance around, holding the comb up high. \"You've done an incredible service for science this day. And for me! Let me know if I can ever do anything to repay you!\"\n\n*goto javel_scholar\n\n*label javel_decline\n\"I couldn't possibly take this from you.\" You gently return the comb, pressing ${javel_poss} hands closed around it. \"Science doesn't demand as much sacrifice as all that, and I can tell this is a very important family heirloom.\"\n\nJavel looks at you, worried. \"Are you sure?\"\n\nYou nod firmly. \"I couldn't possibly take it. But it was very generous of you to offer. Let me know if I can ever do anything to repay you!\"\n*goto javel_scholar\n\n*label javel_scholar\nJavel opens ${javel_poss} mouth and then closes it again a few times. You wait for the avalanche of words to build up enough force to break through. \"Maybe one day can I be a scholar like you? Would you help me to be a scholar? I always wanted to go away and have adventures just like I read about in [i]The Astonishing Life and Times of A Royal German Marinological Scholar[/i]. Did you ever read it? I read it and it's super! My favorite part is the one with the greater striped snapping turtle of Lesser Antigua, and the part with the expedition to the northern ice cap to learn what happened to the Mysteriously Vanished Lucrezian Ice Expedition of '13, and the part with the volcano! I want to do that, too. I want to be just like you one day.\"\n\nYou blink rapidly, then repeat the advice that you always heard. \"Well, of course! You'll need to study hard, mind you—read everything you can, practice writing, and learn to look at the world around you very carefully. When you're older, I'll be happy to help you any way I can!\" Though it's too soon to tell exactly how much help you'll be by that point, eh?\n\nJavel makes a curious but joyful squealing sound, and head-butts you in the abdomen by way of an overenthusiastic hug. \"Thank you, thanks so much, Scholar ${lastname}! I'll study the hardest. I'll learn everything in the world. I'll go get started now!\" Then ${javel_pronoun} bolts away as fast as ${javel_poss} little legs can move.\n*page_break\n\n*label mermaid_research\n\nRight. That's enough distraction for one day—too much distraction, if anything. You can't go to the Society and present them with a series of chance encounters or hearsay; you need science. You need methods and strategy. You need a plan.\n\nObviously any effective plan for collecting evidence requires somehow knowing when and where a mermaid will appear. You'll need to set up some form of a mechanism, ideally by Crab Corner, where a rocky shelf gives way to deep water. You're more likely to find a mermaid there, in those pools, than in the surging waves of the beach. But what kind of mechanism?\n\n*temp traploop 0\n*label mechanism\n\nYou have to make a decision, that much is clear. But you're not sure precisely what path to take. A trap? A nice peace offering? Nice is quite possibly also not-so-effective, but not-so-nice…isn't very nice. What's your approach?\n*choice\n\t*if (patron = \"tubingen\") #More research is in order. Hit the books.\n\t\tYou haven't yet formulated your strategy, but you don't quite feel prepared, either. You still have a book Lord von Tubingen sent to you that you haven't yet taken into consideration; it's moldering away on the shelf in your subpar accommodations. You settle in to rectify this oversight.\n\n\t\tIt's a slim volume, and your reading goes quickly. Eventually you discover the passage that changes everything. It's a description of a mermaid language and method of writing, and a means for summoning a mermaid's attention, as laid out by a crackpot academic from Mongolia some two hundred years ago. Or…maybe not such a crackpot after all. You spend the day learning the ins and outs of this mermaid-calling ritual.\n\n\t\tEventually, satisfied that you understand what's required, you lay out a message in the sand. The strange, swirling letters are picked out in shells and seaweed. According to the book of legends, it means \"Come to us in peace.\" It could work! It might work.\n\t\t*set method \"ritual\"\n\t\t*set traploop +1\n\t\t*goto trapcheck\n\t#Set up nets to capture a mermaid.\n\t\t*set loyalty %+10\n\t\tEffective is more important than nice—your career is at stake here, after all. Your future. And if a net works for fish, why not for a fish-woman? \n\n\t\tIt takes you a while to fashion a net you think will be effective. It has to be strong enough to endure a mermaid's strong hands and sharp teeth, but fine enough that she doesn't see it coming and avoid the trap entirely. Eventually, though, you are satisfied with your work. You deploy the net, and watch it sink into the water. It's almost completely invisible.\n\t\t*set method \"net\"\n\t\t*set traploop +1\n\t\t*goto trapcheck\n\t#Yes, nets—but with hooks to keep her from escaping.\n\t\t*set loyalty %+20\n\t\tA less humane option, but its brutality is the key to ultimate effectiveness. And this is your future at stake—why gamble, with your own destiny on the line?\n\n\t\tYou knot a cunningly strong, fine net, with wicked hooks at random intervals. In the event that a mermaid swims her way into it, she'll have a devil of a time getting free again, and not without serious injury. She'd be wiser to not struggle at all and wait for someone to come to her aid—someone like you.\n\t\t*set method \"hooks\"\n\t\t*set traploop +1\n\t\t*goto trapcheck\n\t*if (swimming > 4) #Set an underwater basket trap.\n\t\t*set loyalty %+10\n\t\t*set bloodloss +1\n\t\tNets would be too easy for a mermaid to slash through with her teeth and swim to safety; no, you need a rigid trap to snap close and hold her tightly. Fortunately, your swimming ability is up to the task of fashioning just such a submerged device.\n\n\t\tIt takes you some hours, and you skin both of your knees on rocks along the way, bleeding clouds into the salt water. But in the end you fashion an enormous basket of loose-woven wicker, with a mechanism that will snap it shut once a creature is trapped inside. You fill the basket with curiosities you hope will draw a mermaid's interest: a little mirror, some pretty stones, a silver fork.\n\t\t*set method \"basket\"\n\t\t*set traploop +1\n\t\t*goto trapcheck\n\t*if (bacon = true) #Lure a mermaid peacefully with bacon and flowers.\n\t\t*set loyalty %-10\n\t\tNo need to harm the creatures; you're under the impression they're quite intelligent, and you should be angling to make contact, not take prisoners. There's no need to earn their enmity right from the beginning.\n\t\t\n\t\tYou take the information you learned from Sandoval and create a vast buffet of bacon, ornamented with flowers gathered from deep inside the jungle, where the mermaids could never reach on their own. You even place strings of banners all around to flap in the breeze and keep gulls from stealing your bait.\n\t\t*set method \"bacon\"\n\t\t*set traploop +1\n\t\t*goto trapcheck\n\t*if (bacon = false) #Lure a mermaid peacefully with fish and shells.\n\t\t*set loyalty %-10\n\t\tNo need to harm the creatures; you're under the impression they're quite intelligent, and you should be angling to make contact, not take prisoners. There's no need to earn their enmity right from the beginning.\n\n\t\tMermaids are fundamentally sea creatures like any other, however, and with such wickedly sharp teeth, they must be carnivorous. Your best bet is to lure them with food, and the kinds of things they most like to eat must be fish of all kinds. Perhaps dried fish will be a pleasant novelty to them? You create something of a mermaid buffet on a flat rock, with banners all around to keep the gulls at bay.\n\n\t\tYou decorate the spread with a collection of pretty shells and rocks, more out of a sense of propriety than any real feeling it will help your case.\n\t\t*set method \"bait\"\n\t\t*set traploop +1\n\t\t*goto trapcheck\n\n*label trapcheck\n*if traploop = 1\n\t*goto second_chance\n*else\n\t*if method = \"ritual\"\n\t\t*goto alarm_nice\n\t*elseif method = \"bacon\"\n\t\t*goto alarm_nice\n\t*elseif method = \"bait\"\n\t\t*goto alarm_nice\n\t*else\n\t\t*goto test_mean\n\n*label second_chance\nHmm. On second thought, is this really the tactic you want to take? What would the Society think of your methods? \n\n*if patron = \"scharknell\"\n\tWhat would Baroness Scharknell think of them? She prizes social advantage through kindness, does she not? Or at least the appearance thereof.\n\t*goto sc2\n*elseif patron = \"tubingen\"\n\tWhat would Lord von Tubingen think of them? Is this what a scholar of sterling reputation would do?\n\t*goto sc2\n*elseif patron = \"wellington\"\n\tWhat would Miss Wellington think of them? Surely all that matters to her is optimizing a good result.\n\t*goto sc2\n*else \t\n\tWhat would Mr. Fontana think of them? He wouldn’t want you to pull your punches and risk failure, would he?\n\n\tDoubt floods your heart, inky and cold. Should you stay the course? Or, now that you see your handiwork, would you prefer to pursue a different mermaid research strategy entirely?\n\t*goto sc2\n\n*label sc2\n*choice\n\t#Stay the course.\n\t\tOf course, of course. Your moment of self-doubt passes. You've done excellent work here, and there's no point in mooning about wondering if you shouldn't do everything differently. How can you ever get anywhere if you keep going in circles?\n\t\t*set persistence %+10\n\t\t*if method = \"ritual\"\n\t\t\t*goto alarm_nice\n\t\t*elseif method = \"bacon\"\n\t\t\t*goto alarm_nice\n\t\t*elseif method = \"bait\"\n\t\t\t*goto alarm_nice\n\t\t*else\n\t\t\t*goto test_mean\n\t#On second thought…\n\t\t*set persistence %-10\n\t\tLet it never be said that you aren't willing to throw out bad work. A scholar must be completely confident that their approach will result in the desired outcome! Back to the drawing board, then.\n\t\t*goto mechanism\n\n\n*label test_mean\nThere are a few loose ends to tie up first, though, such as the matter of knowing when you've caught a mermaid, so you can rush to the scene before she has a chance to wriggle away. You construct an alarm made of sea glass and shells on a line. It makes an inescapable cacophony when shaken. Then you rig up a system of pulleys and gears that will trigger when an adequately large creature swims into your trapped area. Once a mermaid is caught, you'll hear the sound from just about anywhere on Broken Shell Island. Or that's the plan, anyway.\n\nJust because your theory is sound doesn't mean the thing will actually work the way it's meant to. Maybe you should find a way to test it. A way to test it without getting trapped yourself, ideally.\n\n*choice\n\t#Throw something into the trap and see what happens?\n\t\t*set persistence %-5\n\t\tYou haven't seen any signs of dolphins or sharks coming anywhere close to shore. This means you won't get a false positive, but also means you don't have anything of a suitable size and motility to test your trap. There's Javel, but throwing an innocent child into a mermaid trap is beyond the reach of scrupulous scientific methodology.\n\n\t\tYou locate a piece of driftwood of roughly the right size and shape and give it a shove toward your mechanism. Victory! You have successfully entrapped a piece of driftwood, and it will not escape without help from you. Which you provide, because you are not in the business of imprisoning innocent driftwood. \n\n\t\t*goto patron_letter\n\t#Check the mermaid's-eye view.\n\t\t*set swimming +1\n\t\tYou won't get into the trap yourself, but you can at least investigate the trap to see what a mermaid might see and make any relevant adjustments. You descend into the water and splash around.\n\t\t*goto patron_letter\n\t#What? My theory is completely sound!\n\t\t*set persistence %+5\n\t\tRight, right, apologies for insulting your mad engineering skills. Of course the device is sound. Of course it'll work. Are you not a shining light of academic achievement?\n\t\t*goto patron_letter\n\n\n*label alarm_nice\nPerfect. If anything could attract a mermaid to shore and persuade them to speak with you, it's this whole situation you've put together right here. But there's one last problem. How will you know when a mermaid actually stops by? You should set up a way for a mermaid to alert you to her presence, so you can come running before she gets bored and swims off again. You can't be sure what kind of tolerance for boredom a mermaid has…\n\n*choice\n\t#String up something to make a clatter.\n\t\t*set alarm \"clatter\"\n\t\tAs your final act, you construct an alarm of sea glass and shells, so that a peaceable mermaid seeking your attention has a way to summon you. The cacophony will be so loud that you should be able to hear it no matter where you are on the island; it could wake you from even your deepest slumber. The rope pull for the alarm trails aimlessly away into the water, where a mermaid could reach it easily. \n\t\t*goto patron_letter\n\t#How about a water-level bell of some kind?\n\t\t*set alarm \"bell\"\n\t\tThere's a rusting bell hanging under the eaves of your somewhat habitable accommodations. You give it a test, and are pleased to discover the tone is clear and very, very loud. You liberate the thing and string it up on a branch not so far from the shore, then trail a pull rope all the way into the ocean where a mermaid could reach it easily.\n\t\t*goto patron_letter\n\t#Percussion is my answer!\n\t\t*set alarm \"coconuts\"\n\t\tAh! If you provide some sort of percussion instrument, that should be audible from quite a distance away. You haven't seen anything like a drum on the island so far, but surely you can fabricate some sort of castanets, or maybe a tambourine made from…\n\n\t\tCoconuts? You knock a pair of coconuts together and discover that they make a satisfying sound, loud enough to be heard some distance away. Almost there. You fashion some banana leaves into a cone to channel and magnify the sound. The result is a booming noise you're sure can be heard from half a mile off. That'll do, scholar.\n\t\t*goto patron_letter\n\n\n*label patron_letter\n*set letter_count +1\n*if letter_count = 3\n\t*achieve letters\n*temp scene_close \"none\"\n\nYou survey your handiwork with the deep satisfaction of a job well done. You can all but feel the formal robes of a Royal German Marinological Scholar settling around your shoulders. And then you retire to your meager shack for a well-deserved rest.\n\nBut rest is not yet in your reach. When you arrive back at your barely adequate hovel, there is a thick envelope waiting on your desk. It bears the golden ribbon and blue wax stamp of the Royal German Marinological Society. Your heart skips a beat—has something gone wrong? Have you been recalled for not delivering a result to the Society yet? Or despite it all, has your activity earned some reward or recognition? Perhaps the Society has realized they made a grievous error in judgment, and now your preliminary probation has ended; your dream of being a scholar has been crushed forever.\n\nThere's only one way to find out.\n*page_break\n\nYou sit tentatively on the edge of your bed and open the letter. It's from your patron, ${patron_title} ${patron_surname}. You read on, heart pounding.\n\n[i]Scholar-in-Consideration ${lastname},[/i]\n\n[i]We at the Society have heard about your recent troubles during your voyage—an encounter with the legendary Captain Lucy Smokeheart, no less! Given the circumstances, we'd like to request a full report on your current status. Have you made it to Broken Shell Island? Are you well? Are you still fit to continue the research set before you? Most important of all, how goes your progress? We hope your adventures haven't hindered your ability to execute the task appointed to you, and we expect a complete and detailed accounting of any evidence you've accrued so far.[/i]\n\n\n*if patron_favor > 60\n\tThere is a postscript at the end, in a hastier hand, as if ${patron_title} ${patron_surname} added it at the last moment only after much internal debate. [i]Dearest ${firstname}, please don't be put off by the official tone of this missive—there is business to conduct, to be sure, but know that I hold a fondness for you that these cold words don't convey.[/i]\n\t*goto respond\n*else\n\t*goto respond\n\n*label respond\n\nThis seems to demand an immediate reply. When your patron at the Royal German Marinological Society demands a complete accounting of your progress so far, only a fool would procrastinate. And you, ${firstname}, are nobody's fool. \n\nYou settle at your desk and light a candle to compose a letter in return. It's obvious, of course, what you should write.\n\n*choice\n\t#Document my activities, exactly as they are.\n\t\t*set letter_count +1\n\t\t*set scene_close \"document\"\n\t\t*goto document\t\n\t\t\n\t#Time to be creative—inflate my findings!\n\t\t*set letter_count +1\n\t\t*set scene_close \"inflate\"\n\t\t*goto inflate\n\n\t#Let's not jump the gun. I'll minimize my discoveries.\n\t\t*set letter_count +1\n\t\t*set scene_close \"minimize\"\n\t\t*goto minimize\n\t\t\n\t#Let the Society wait on me for a while.\n\t\t*goto wait\n\t\t\n*label document\n*set loyalty %+10\n*set rigor %+10\n*set credibility %+20\nThe truth is what it is, and the best approach is factual and dispassionate. \n*if evidence = 0\n\tUnfortunately you have nothing at all to report to them. Not a single scrap nor shred of evidence has come your way. Some would argue that this is a path that leads to your rejection from the Society; that to avoid that fate, you must act first and foremost as the guardian of your own career, which requires a certain brash and willful ignorance of the truth. But you're not in this purely to make yourself look good. You care about the truth, about the vast sum of human knowledge, and you want your contribution to be indisputably accurate.\n\n\tIn the end, your report consists of a few honest lines and a lot of blank space. \n\t*goto romantic_coda\n\n*else\n\tYou summarize your findings to date with precision and detail, neither omitting nor embroidering the truth, as befits a true Royal German Marinological Scholar. Yours is not the path of self-aggrandizement. Your results will speak for themselves more loudly than anything you could possibly say. One must have faith in the process. After all, if you don't believe in the Society, why are you even here, ${firstname}?\n*goto romantic_coda\n\n\t\n\n*label end_choose\n*if javel_fake = true\n\n\tYou pause in writing, and your gaze briefly falls upon the comb from Javel. It's on the desk by your hand. In the candlelight, you notice something you missed earlier: words carefully etched into one edge in tiny letters. They read [i]MADE IN CANADA[/i].\n\n\tJavel's gramps was telling fibs, it appears. The disappointment nearly crushes your mood. Well, you still have your device, at least. Surely that will bear academic fruit before long.\n\t*set javel_fake false\n\t*set evidence -1\n\t*set javel_fake false\n\t*goto end_choose\n*if scene_close = \"document\"\n\t*goto rigor_close\n*elseif scene_close = \"inflate\"\n\t*goto inflate_close\n*elseif scene_close = \"minimize\"\n\t*goto minimize_close\n*else\n\tBUG Oh noes no scene ending!\n\n*label rigor_close\nWhen you're done, you seal the letter with wax and set it outside for Javel to fetch in the morning. Then you lie in bed, staring at the thatch above you. There is a gap in the roof, and through it you can make out a single shining star. It burns cold and bright. It is not comforting.\n*finish\n\n*label inflate_close\nOnce you're done, you seal the envelope and set it out for Javel to collect in the morning. You lie in bed, gazing at the thatch above you. There is a gap in the roof, and through it you can make out a single shining star. You make a wish, and then you sleep the sound and noiseless sleep of the just.\n*finish\n\n*label minimize_close\nYou seal the letter with wax and send it off. And then you lie in bed, staring at the thatch above you. There is a gap in the roof, and through it you can make out a single shining star. Perhaps that star will be you.\n*finish\n\n*label inflate\n*set loyalty %-15\n*set rigor %-20\n*set inflation true\nRigor and strict adherence to truth are all well and good, but you have to advance your own career. And that requires a certain brashness regarding your relationship with strict objective accuracy.\n\nYou don't lie, not precisely, but with a cunning use of words and a cavalier attitude toward qualifications and omissions, you soon produce a missive that would lead a casual reader into believing you've made substantially more progress than you in fact have. Honestly, scholars do it all the time; the trick is simply not to get caught at it. And you have no intention of getting caught. After all, it's not like anyone from the Society is here to look over your shoulder! Reality will catch up with your aspirations soon enough, you have no doubt.\n*goto romantic_coda\n\n*label minimize\n*set loyalty %-15\n*set credibility %+15\nIt wouldn't do to overplay your hand. Indeed, the best approach might be to lead the Royal German Marinological Society into believing that you're making no progress at all, and then you can bowl them all over with the unexpected depth and quality of your final report once you return.\n\nYou discuss your adventures in vague terms, focusing primarily on the logistics of your journey, your accommodations, and the regrettable loss of many of the books you'd brought with you on the [i]Albatross[/i] when it was sunk by pirates. You carefully skirt any mention of evidence, nor even of the construction work done today at Crab Corner. When the time comes, your star will seem to shine all the brighter for its dimness now.\n\n*goto romantic_coda\n\n*label wait\n*set loyalty %-15\n*set patron_favor %-15\nPerhaps it's better to wait to make a report until you have something more compelling to present, like, say, a live mermaid in your possession. Or a dead one, in a pinch. And after all of your hard work today, with any luck at all, you should have some sort of eyewitness mermaid report to make any moment now.\n\nCome to think of it, why should you have to jump for an arbitrary and ridiculous Society timeline, anyway? This is your research, your lifelong mission. The Society is helping you along your way, to be sure, but it doesn't own you.\n\nYou sleep poorly, your ears straining for the telltale sound of mermaids from the mechanism you set earlier in the day. But no sound ever comes. You'll have to be patient a while longer. And so will the Society.\n*finish\n\n*label romantic_coda\nOne last thing before you send the letter. You could add something else beyond a simple progress report, perhaps even a personal note of some nature. Is that wise? How do you feel about your patron, anyway?\n\n*choice\n\t#Confess a romantic attachment to ${patron_title} ${patron_surname}!\n\t\t*set patron_romance +1\n\t\t*set patron_favor %+20\n\t\t*set love_confession true\n\t\tYou have to admit it to yourself: the feelings you harbor for your patron exceed the bounds of a strictly professional relationship. Society business is important, yes, but for now—now you need to attend to your heart.\n\n\t\tYou pour your feelings onto the page in agonizing truthfulness. How your admiration for ${patron_title} ${patron_surname} is not limited to purely intellectual or academic spheres. How your heart pounds and your stomach flutters at the very thought of the two of you being together in the same room. How you hope—cautiously, desperately—that perhaps your affection is returned in some meager quantity.\n\t\t*goto end_choose\n\n\t#Express warm feelings, but keep it at that.\n\t\t*set patron_favor %+25\n\t\tGratitude has never steered you wrong. But it's inappropriate to step too far over the boundaries of professional courtesy and into matters of the heart. Perhaps your relationship with ${patron_title} ${patron_surname} will take a turn for the sweetly heartfelt, or perhaps even into the downright torrid, at some point in the future. For now, though, you scribble a warm, polite, but not overly personal expression reiterating how grateful you are to have this opportunity.\n\t\t*goto end_choose\n\n\t#No, personal entanglements can only cause trouble for me.\n\t\t*set rigor %+15\n\t\t*set persistence %+10\n\t\tYou know better than to broach matters of the heart with your superiors at the Society. Even if you were attracted to your patron—and whether you are or are not is frankly beside the point—you need to be sure your entry into the Society is solely on your own merits and achievements. There's simply no place in your life for romance right now.\n\t\t*goto end_choose\n\n\t#I regret ever coming here, and it's my patron's fault.\n\t\t*set patron_favor %-30\n\t\t*set tirade true\n\t\tYou haven't wanted to admit it to yourself, but the deck has been stacked against you from the start. And it's all ${patron_title} ${patron_surname}'s fault. You can see that now. It wasn't supposed to be like this! You were supposed to make your entry in the Royal German Marinological Society like any other budding academic, and work your way toward serious research projects at a measured and credible pace.\n\n\t\tInstead, you're sleeping in a ramshackle cabana, following up on the barely credible ravings of some random fool who happened in on what was supposed to be your shining day. If ${patron_title} ${patron_surname} hadn't stepped in, if ${patron_pronoun} hadn't suggested that you go on this ridiculous enterprise, then you could be conducting the very same research on your own terms, and with better preparation and equipment. You're starting to suspect you've been the butt of some particularly cruel joke on ${patron_poss} part.\n\n\t\tYour indignation pours onto the page. So does your confidence that you'll rise above it. No matter how ill-advised the direction you've received from your patron, you'll find a way to turn this into a win for yourself. \n\t\t*goto end_choose\n\n\n", "6_intervention": "*check_purchase adfree\n*if not(choice_is_steam) and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]The Daring Mermaid Expedition[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2020-04-29 $4.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\nYou start to settle into a predictable pattern. You examine Crab Corner for signs of mermaid visitation or tampering; you double-check that your alarm is working properly; you make careful notes about your findings. Or your lack of findings. From time to time you have guests, as well. Javel comes by to observe your forward progress, or lack thereof. Without fail, ${javel_pronoun} asks several too many questions (\"Why did the Society send out someone who isn't a proper scholar if this research is so important?\"). You endure them with what dignity you can muster. \n\nMostly, though, you spend hours on the bluff overlooking the ocean with a pair of binoculars borrowed from Madame LeJeunesse (\"Don't worry, the Society will pay for it generously,\" she said).\n\n*if sandoval_conceals = true\n\tPerhaps this is a fool's errand after all. Even assuming there are mermaids—and of course there must be—you can't be certain that they're anywhere near Broken Shell Island in particular. All you have to go on is Sandoval's word, and Sandoval…well…\n\t*goto madame_summons\n\n*else\n\tBut it's unclear what time of day you should even be the most watchful. Are mermaids nocturnal? You could ask Sandoval for his opinion, but he is curiously scarce. \n\n\tNothing to be done about it. Even if you knew where Sandoval lived—and you don't—you're not sure he'd welcome an uninvited guest.\n\t*goto madame_summons\n\n*label madame_summons\n\nThis afternoon in particular, you diligently record wind and water conditions and listen for your alarm from a discreet distance, for as much good as that does you. As you silently question the life choices that have led you to your current impasse, Madame comes marching toward you, her shoulders thrust forward in determination. \n\n\"You there, your presence is required!\" Madame announces, her voice sharp. Before you can formulate a response, though, Madame grabs you by the wrist and pulls you along behind her. \"It's time,\" she says. \"This nonsense has gone on long enough!\"\n\n\"What? What's gone on?\" You panic for a moment, convinced that she's talking about your mermaid research. Is she…voting you off the island?! Can she even do that?\n\n\"Sandoval!\" she cries. \"And this ridiculous obsession with mermaids. It ends now, and you will help me!\"\n\n*choice\n\t#Defend Sandoval's ridiculous obsession!\n\t\t*set madame %-20\n\t\tYou won't stand for this insult to your trade! \"His ridiculous obsession is no less than the cause of science itself, and it is an obsession I share, Madame!\" You try to pull away, but her grip only tightens.\n\n\t\t\"You don't understand,\" she hisses at you through gritted teeth. \"He has ruined everything in his life for this. You—you have a career, you have a future, but Sandoval has nothing! Don't you see? You're what he's always wanted to be. You're the only one he'll listen to!\"\n\t\t*goto town\n\n\t#Wait, what? I don't understand.\n\t\t*set rigor %+15\n\t\tWait. Wait. Is she asking you to…what on earth is she asking you to do? Looks like you're going to need a little more context to get a handle on the situation. And like a good scholar, you know that asking questions is a good way to find things out. \"What are you—\"\n\n\t\t\"No time!\" she announces. Her nostrils are enormously flared, and her teeth are gritted as if prepared to wage war against the combined might of the Royal Navy.\n\n\t\t\"But what is it you expect me…\" You trail off. There's no point in discussion. It's clear you won't be getting the context you're looking for. Madame already has an iron grip around your wrist, and she's dragging you toward…toward…\n\t\t*goto town\n\n\t#Immediately agree to help.\n\t\t*set madame %+20\n\t\t*set persistence %-15\n\t\tYou can tell from Madame's enormously flared nostrils and the impassioned set of her jaw that she means business. Serious business, whatever it is. There won't be any getting out of this. And it's best to keep her happy, anyway; if you please her enough, perhaps she'll be able to locate a better pillow for your bed, or maybe she could be persuaded to patch the roof of your miserable shack.\n\n\t\tYou bob your head politely. \"I'll do anything I can to help,\" you tell her. \"Lead on, Madame.\"\n\t\t*goto town\n\n\n*label town\n\nHuh. You realize she's bringing you into Broken Shell Town! You haven't been here before now, since you washed up on the beach rather than arriving at the docks on a ship, like a normal person. And you've been totally focused on the sea and beach—it's not like you're going to find mermaids lolling about and combing their hair in town, now is it?\n\nBut to your surprise, there is in fact a collection of rather attractive houses here. The town consists of a pleasant melange of slate-tiled adobe, bamboo and thatch, clapboard and brick. One building stands taller than the rest: a staid, white-painted structure with a bell tower and wide mahogany doors. Neat wrought iron lettering informs you that this is, in fact, Town Hall. And it seems that this is where you're headed.\n\nMadame ushers you into a wide room filled with folding chairs. These chairs are occupied by a sparse assortment of townsfolk, none of whom have you met previously. You see a dark-skinned, buttoned-up banker type; a portly islander woman in a stunningly ornate hat; a pair of what look like Russians, inexplicably wearing heavy furs despite the tropical heat. A banner stretches across the back wall reading \"INTERVENTION\" in large block letters. A side table sports a selection of coffee, tea, and various baked goods.\n\nYou have so many questions. So, so many questions.\n\nBut before you can ask even one of them, Sandoval stumbles in, dragged onward by Javel. \"What's going on here?\" His eyes are bleary and red, his face puffy. There is a semicircle of light bruising on his chin that looks like bite marks. They weren't there the last time you saw him.\n\nMadame clears her throat. \"I believe ${firstname} will take the lead.\" She gives you a significant look, full of eyebrow waggling. Wait, what?\n\n*choice\n\t#Start an intervention?\n\t\t*set madame %+20\n\t\t\"We're here, Sandoval, because we all care about you very much, and we're all very worried about you.\" You clear your throat and look over to Madame to see how you're doing. She leans back in her chair in apparent satisfaction.\n\n\t\t\"An ambush!\" Sandoval glowers at everyone present, starting and ending with you. \"I should have known that this harridan would draw you into her ridiculous schemes, ${firstname}. Few see past her sweet, delicate facade upon first meeting her.\" Sweet? Delicate?\n\n\t\tMaybe Madame is right, and Sandoval really is delusional!\n\t\t*goto intervention\n\n\t#Inquire about Sandoval's health.\n\t\t*set sandoval %+20\n\t\t\"Sandoval,\" you peer at him closely. \"Are you feeling quite well? You don't look well, is what I'm saying.\"\n\n\t\tHis brow furrows. \"What are you trying to say, ${firstname}?\"\n\n\t\tYou clear your throat nervously. \"Maybe this isn't a good time.\"\n\n\t\t\"There's no time like the present!\" Madame LeJeunesse glowers at you and Sandoval in equal measure. \"It is precisely this careless disregard for his health that leads us to such a dire extremity!\"\n\t\t*goto intervention\n\n\t#No way, nuh-uh, not getting involved.\n\t\t*set rigor %+15\n\t\tYou hastily spill a cup of tea all over yourself. \"Oh, sorry, I, uh, I need to…\" you wave wildly at the mess. Javel fetches you a napkin to blot yourself dry. Madame rolls her eyes at your ineptitude, but it appears you've successfully avoided taking a side in this ridiculous undertaking. For now.\n\t\t*goto intervention\n\n*label intervention\nMadame clears her throat. \"It seems I'll need to take control of this situation. As usual.\" She sighs, and her corset creaks menacingly. \"Sandoval, this thing must end. You must know you are the target of endless rumors and gossip. The injuries, the delusions, the obsessive thoughts—why, now you've even drawn the Royal German Marinological Society into your fantasy! The harm you have done to yourself and those who may once have cared for you is limitless.\" Heads are nodding in the crowd; it would seem Madame has filled the seats exclusively with her allies and supporters.\n\nShe sails closer to Sandoval and looks down her nose at him. Sandoval, for his part, is seething like a volcano at the edge of eruption. She speaks again: \"We have agreed that it is time for you to seek attention at the Holy and Sanctified Hospital for the Mentally Unsound in Madrid.\"\n\nFinally Sandoval explodes. \"The people who care about me should trust in my intellect! My grand vision! They should support my efforts to—\"\n\nMadame interrupts, \"We supported you when—\"\n\nAnd finally they devolve into shouting over one another. You can only make out a few fragments here and there: \"worthless wretch,\" \"ungrateful fishwife,\" \"perverted imaginings,\" \"faithless virago.\"\n\nThis is a waste of time, and obviously things have reached an impasse. Perhaps you should step in. \n\n*choice\n\t#Defend the existence of mermaids!\n\t\tIt's one thing for Madame to cast aspersions on Sandoval; he's not exactly the pinnacle of objective study, is he? But it's something else entirely for Madame to suggest that you, too, are somewhere between delusional and a fraudster, or an easily gulled victim.\n\n\t\t\"I assure you, Madame, that mermaids are real,\" you snap, cutting off the ex-lovers' argument. \"The Society would never waste time and resources on this matter without ample justification! Have you for a moment considered that Sandoval might be telling the truth?\"\n\t\t*if credibility > 60\n\t\t\t*set ally \"madame\"\n\t\t\t*set enemy \"none\"\n\t\t\t*goto madame_poison\n\t\t*else\n\t\t\t*set ally \"none\"\n\t\t\t*set enemy \"madame\"\n\t\t\t*goto madame_angry\n\n\t#Side with Madame against Sandoval.\n\t\tSandoval may be technically correct, but Madame owns the meager hovel in which you live. And while it is in fact barely adequate, it beats sleeping in the rain. It would be best to stay on her good side. \"Sandoval,\" you raise your voice to be heard over the commotion, \"you are a blemish on the face of science, and your methods are injuring both yourself and the cause of knowledge. You should listen to Madame LeJeunesse! Madrid would be the best thing for you!\"\n\n\t\tHe reels away from you in glassy-eyed horror. \"But you're here because—the mermaids, your own work—\"\n\n\t\tMadame raises her haughty chin. \"Ah-hah! See, even Scholar ${lastname} agrees you should seek attention! It's settled. I think we're done here. You're on your own.\"\n\n\t\t*set ally \"madame\"\n\t\t*set enemy \"sandoval\"\n\t\t*goto sandoval_fail\n\n\t#Side with Sandoval against Madame.\n\t\tSandoval is the reason you're here, the reason you have a chance at the exact research you'd always hoped to conduct. And more to the point, he's right—there are mermaids, and so far as you know, he is the leading world expert on their habits. You would be ill-advised to make an enemy of him. \"Madame,\" you raise your voice to be heard over the commotion, \"you are a barrier on the road to knowledge. Your dogged harassment of this poor man and scholar is causing both him and myself great personal inconvenience. You would do well to mind your own business and leave we academics to our important work!\"\n\n\t\tSandoval glows at this show of support from you, but Madame gazes upon you in horror. \"How dare you—\"\n\n\t\t\"Leave us alone, Blandine.\" Sandoval tosses his head, a gesture that might be more effective had he any hair. \"Our work is none of your concern.\"\n\t\t*set ally \"sandoval\"\n\t\t*set enemy \"madame\"\n\t\t*goto madame_fail\n\n\t#Diplomacy! Try to make peace.\n\t\t*goto peace_brokering\n\t\t\n\t#Sneak away and hope nobody notices?\n\t\tThis is an opportune time to simply…leave. This is far from your problem, and if anything, you resent that this petty interpersonal squabble has pulled you away from more important matters. You slowly sidle toward the door, one halting step at a time: too fast, and you might catch someone's attention.\t\n\t\t*if persistence \u003c 45\n\t\t\t*set ally \"none\"\n\t\t\t*set enemy \"none\"\n\t\t\t*goto escape\n\t\t*else\n\t\t\t*set enemy \"both\"\n\t\t\t*set ally \"none\"\n\t\t\t*goto both_angry\n\n*label madame_poison\n*set poison true\n\nMadame stills. \"Have I considered…\" She spends a moment considering it for the first time. \"There was the strange matter of the jewelry,\" she murmurs. \"I had wondered, but I thought it simply obtained from another woman, perhaps that sailor lass. But was it really a mermaid's crown?\"\n\n\"It was,\" Sandoval says quietly. Madame turns this novel thought over and over in her head. Perhaps…perhaps the truth will bring peace between them at last?\n\nOr perhaps not. \"If these mermaids swim my shores, they must be eradicated,\" Madame announces. \"I will poison the waves, set nets and traps until they are finished! They stole my one chance at lasting happiness! They stole my Sandoval's affections and time, little by little, until he had nothing left for me. And. I. Will. Make. Them. [i]Pay[/i]!\"\n\nShe cruises out the door, her skirts swishing as she goes. Sandoval stares at you, aghast. \"What have you done?\"\n\n*goto sandoval_cave\n\n\n*label madame_angry\n\nMadame looks dangerously close to doing something impulsive and physically harmful—punching you, perhaps, or Sandoval, or maybe flipping over that table of coffee and hot beverages. Instead, to your tremendous relief, she draws in a deep breath, and then another.\n\n\"I had hoped you could still be redeemed, Sandoval.\" She spits out her words with steely precision, like an expert chef chopping an onion. \"But now I know we are past that. Any dream you had that we could one day be reconciled is over!\" Sandoval snorts at this.\n\n\"And you!\" Madame turns the mighty force of her attention your way. \"I had expected an authorized representative of the Royal German Marinological Society to demonstrate gravitas! Restraint! Good sense! But clearly my expectations were too high. Don't think your failures will go unremarked, ${lastname}. The Society will be hearing about this!\"\n\n*goto peace_brokering\n\n*label madame_fail\n\nShe cruises out the door, leaving you and your small audience nonplussed. \"Forget it,\" Sandoval says. \"Forget her. You and I have more important concerns.\"\n*goto sandoval_cave\n\n*label sandoval_fail\n\nThere is an awkward pause. \"Excuse me,\" Sandoval mumbles, \"I have something urgent I must attend to.\" He stumbles out of Town Hall, leaving the remaining residents hushed and wide-eyed. \n*goto sandoval_cave\n\n*label both_angry\n\nAs you near the door, Madame LeJeunesse turns your way and notices your escape in progress. \"Where are you going?\" she demands. \"Are our concerns so petty to you, so inconsequential, that you cannot bear to help us see them through? Do you care so little for your neighbors and colleagues?\"\n\nYou'd think Sandoval would have your back, at least. You'd think, but you'd be completely wrong. \"A pot-stirrer and troublemaker of the ninth degree!\" he accuses you. \"You draw us here, start an argument between us, and then you just…sit back and enjoy the merriment? Do you so enjoy wrecking the lives of others, ${firstname}?\"\n\n\"But Madame was the one who—\" you begin.\n\n\"Never mind your feeble excuses!\" she roars. \"I see the truth now. And you can be sure I will tell the Society just what sort of
