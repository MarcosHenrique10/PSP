       What do you do now?\n          *choice\n            #After a summary court-martial, I hang them for mutiny and assaulting a superior officer.\n              You assemble a drum-head court-martial, present the evidence, convict them, and hang them for their crimes.  There is a little grumbling around the ${sloop}--some of the evidence was pretty flimsy, and almost all of it was circumstantial.  But you've also taught your crew that your wrath is something to be feared.\n              \n              I hope that your conscience doesn't trouble you late at night when you think about the possibility that they might have been innocent.\n\n              Discipline increases substantially, but happiness decreases slightly.\n              *set sloop_discipline %+20\n              *set sloop_happy %-5\n              *set leadership %+10\n              *set Courage %+10\n              *set Bloodthirst %+10\n              *goto NewMaster\n\n            #I imprison them, planning on requesting a court-martial when I rejoin the fleet.\n              This makes nobody really happy.  It means you don't publicly present your evidence, and their friends can still imagine freeing them.  But at the same time, it sends less of a definitive message.  On the upside, it's probably the fairest thing you can do, and you sleep soundly, knowing that you haven't perverted justice for purposes of maintaining good discipline.\n\n              Discipline increases, but happiness decreases.\n              *set sloop_discipline %+10\n              *set sloop_happy %-10\n              *set Intelligence %+5\n              *set Bloodthirst %-5\n              *set Honor %+10\n              *goto NewMaster\n\n            #Since I'm not fully convinced that they did it, I keep investigating.\n              *goto ContinueInvestigating\n\n            #They might still be innocent.  I can't take action without being sure, so I leave the matter unresolved.\n              *goto DoNothing\n        *elseif (((Intelligence + Leadership)/2) > 60)\n          You ask some questions, examine the evidence, and try to build a list of where each sailor on the ${sloop} was at the time of the death.  After examining the evidence, you conclude that this was probably a murder, although it might have been an accident.  It takes a little while, but you finally identify Allen and Green, two disaffected ordinary sailors, as the most likely suspects.  You can't be sure that they're guilty, but you think it is more likely than not--perhaps sixty percent likely.\n\n          What do you do now?\n          *choice\n            #After a summary court-martial, I hang them for mutiny and assaulting a superior officer.\n              You assemble a drum-head court-martial and present the evidence.  ${Mr} Benton and the ${sloop}'s ${master}'s mates form the body of the court-martial, and they are clearly troubled, but you prevail on them to convict Allen and Green.  Soon enough, they hang by the neck until dead for their crimes.  There is grumbling around the ${sloop}--the evidence was flimsy, and it was all circumstantial.  But you've also taught your crew that your wrath is something to be feared.\n              \n              I hope that your conscience doesn't trouble you late at night when you think about the possibility that they might have been innocent.\n\n              Discipline increases substantially, but happiness decreases.\n              *set sloop_discipline %+15\n              *set sloop_happy %-10\n              *set leadership %+10\n              *set Courage %+15\n              *set Bloodthirst %+15\n              *goto NewMaster\n\n            #I imprison them, planning on requesting a court-martial when I rejoin the fleet.\n              This makes nobody really happy.  It means you don't publicly present your evidence, and their friends can still imagine freeing them.  But at the same time, it sends less of a definitive message.  On the upside, it's probably the fairest thing you can do, and you sleep soundly, knowing that you haven't perverted justice for purposes of maintaining good discipline.\n\n              Discipline increases, but happiness decreases.\n              *set sloop_discipline %+10\n              *set sloop_happy %-10\n              *set leadership %+10\n              *set Courage %+15\n              *set Bloodthirst %+15\n              *goto NewMaster\n\n            #Since I'm not convinced that they did it, I keep investigating.\n              *goto DoNothing\n\n            #They might still be innocent.  I can't take action without being sure, so I leave the matter unresolved.\n              *label DoNothing\n              *comment Adjust stats\n              Even though you think you know who did it, you let the matter slide.  I'm sure that will be really good for the ${sloop}'s discipline.\n              *goto NewMaster\n        *elseif (((Intelligence + Leadership)/2) > 40)\n          At the end of the investigation, you think it was probably a murder but you have no idea who did it.  You have a few possibilities, but none of them are really convincing.\n\n          What do you do?\n          *choice\n            #I continue investigating.\n              *goto ContinueInvestigating\n\n            #I pick a few likely suspects and hang them for the crime, even though they might be completely innocent.  It's what the ${sloop} needs, and that's more important than the truth.\n              *goto WitchHunt              \n\n            #I let the matter drop.  I won't be able to find the guilty parties, and I refuse to punish the innocent.\n              An honorable course.  Let's just hope that it doesn't encourage future problems.\n\n              Discipline decreases, but happiness increases.\n              *set sloop_discipline %-10\n              *set sloop_happy %+10\n              *set Bloodthirst %-15\n              *set Honor %+10\n              *goto NewMaster\n\n        *else\n          At the end of the investigation, you have no more information than when you began.  It might have been a murder, or it might have been an accident.  If it was a murder, you have a few possible suspects, but none of them are really convincing.\n\n          What do you do?\n          *choice\n            #I continue investigating.\n              *goto ContinueInvestigating\n\n            #I pick a few likely suspects and hang them for the crime, even though they might be completely innocent.  It's what the ${sloop} needs, and that's more important than the truth.\n              *goto WitchHunt              \n\n            #I let the matter drop.  I won't be able to find the guilty parties, and I refuse to punish the innocent.\n              An honorable course.  Let's just hope that it doesn't encourage future problems.\n\n              Discipline increases, but happiness decreases.\n              *set sloop_discipline %-10\n              *set sloop_happy %+10\n              *set Bloodthirst %-15\n              *set Honor %+10\n              *goto NewMaster\n\n      #Seize the most likely suspects and proceed straight to a court-martial.  It's better to be firm and swift in response than to be right, even if that means launching a witch hunt.\n        *goto WitchHunt\n\n      #Think about it some more.  I have to respond correctly, and that's more important than acting quickly, especially because it may be nothing.\n        You think carefully about the matter.  Hours turn into days, and days into weeks, and the opportunity for action is lost.\n\n        Happiness increases, but discipline decreases substantially.\n        *set sloop_happy %+10\n        *set sloop_discipline %-20\n        *set Leadership %-10\n        *goto NewMaster\n\n      #Ignore it, at least for now.  Starting an investigation could lead to an open mutiny, and I can't risk that.\n        You ignore the possibility of murder and hope that pretending that all is well will head off worse troubles.  We'll see how well that will work, won't we?\n\n        Happiness increases, but discipline decreases substantially.\n        *set sloop_happy %+10\n        *set sloop_discipline %-20\n        *set Leadership %-15\n        *set Courage %-10\n        *set Honor %-10\n        *goto NewMaster\n  \n\n*label NewMaster\n\nYou are now in the difficult position of selecting a new acting-${master}.  ${Mr} Carter's two mates both leave something to be desired.\n\nThere's MacDougal, the senior mate.  $!{He}'s intelligent, but ${he} usually diverts ${his} intelligence toward finding clever ways to avoid work.  You doubt ${he}'ll set a good example for the crew.\n\nThen there's Avery, the junior mate.  $!{He}'s staunchly loyal to you and to the ship, but that's about all you can say for ${him}.  $!{He}'s simple-minded, to put it kindly; a moron, to put it plainly.\n\nOf course, there's also Jones.  As commander of ${HMS} Defender, you have the authority to restore ${him} to ${his} old grade as ${master}'s mate; you could then promote ${him} to acting-${master}.  Jones would certainly appreciate it; it might help to have another strong friend on the crew.\n\n*temp new_master\n\n*choice\n  #Appoint MacDougal.\n    *set new_master \"MacDougal\"\n    *goto mutiny\n  #Appoint Avery.\n    *set new_master \"Avery\"\n    *goto mutiny\n  #Restore Jones's grade and appoint ${him}.\n    *set RelationshipJones %+30\n    *set new_master \"Jones\"\n    \"Thank you, ${sir}!\"\n    \n    \"It was really the least I could do, ${Mr} Jones,\" you reply, emphasizing \"${Mister}\".\n    \n    \"You won't live to regret it!\"\n    *goto mutiny\n\n*label mutiny\n*page_break\n*if ((((sloop_discipline \u003c 25) and (sloop_happy > 75)) and ((RelationshipJones > 65))) and (Atrocity=false))\n  A few nights later, as you're drifting off to sleep, you hear a knock at your door; Jones lets ${him}self in.\n  \n  \"Sorry to intrude, Captain,\" ${he} says disrespectfully, \"but I'm here to inform you of a change in command.\"\n  \n  \"What?\" You blink at ${him}.\n  \n  \"The crew has decided that we've had enough with Albion; we're looking to strike it out on our own.\"  You look at ${him} with incredulity.  You'd never imagined you'd hear someone discussing mutiny so cavalierly.\n  \n  \"With a fast ${sloop} of this size,\" Jones continues, \"I think we should be able to pull down at least one Iberian merchant ship a month, which would leave us quite comfortable.\"\n  \n  \"You--you mean piracy?\"\n  \n  \"I suppose you might call it that,\" says Jones, drawing a pistol.  \"Listen, some of the ${men} thought it safer to just off you in your sleep, but I managed to convinced them otherwise.  If you'd like, you're welcome to join our crew and sail the seven seas as a private vessel.\"\n  \n  \"And if I refuse?\"\n  \n  \"That'd be perfectly understandable.  I've prepared a lifeboat for you and anyone else who wants to try to steer back to Albion.  It's dangerous, but I think you'll agree, it could be much worse.\"\n  \n  You glance around the room; your sword is within reach.\n  \n  *choice\n    #Abandon my commission and become a pirate.\n      Are you quite sure about this decision?  This game is all about your adventures in the Royal Navy.  If you abandon your commission now, it's the end of the game.  (It may be the end of the game regardless if Jones has ${his} way. . .)\n      *choice\n        #Yes! I want to be a pirate!\n          Very well!  Your ${sloop} sails off into the sunset, hoisting the Jolly Roger.\n          \n          We hope to see you again soon in \"Choice of the Pirate!\"\n          \n          *goto_scene ending\n        #In that case, maybe I'd better accept a lifeboat.\n          *goto surrender\n\n        #What was I thinking?  I'll never surrender my command!\n          *goto die_fighting_pirates\n    #Accept the lifeboat and attempt to sail back to Albion.\n      *label surrender\n      You board the lifeboat with a handful of loyal sailors; you're provided a small quantity of food and water, and a sextant.\n      \n      *label lifeboat\n      You pull out your pocket watch; the time is 11:38pm.  You estimate that you are well over 1,000 miles from Albion.\n      \n      *page_break\n      *if sailing > 65\n      \n        \"Oh, ${sir},\" one of the sailors whimpers, looking at the meager supply of food, the sextent on your hand, and the open sea. \"We're done for, ain't we?\"\n      \n        Do you think ${he}'s right?\n      \n        *fake_choice\n      \n            #I'm afraid so.\n        \n                Your heart sinks within you; you fear the sailor is correct in ${his} assessment. But it would never do to seem beaten, so you try to hide your feelings.\n        \n            #Nonsense. We're still alive. We'll make it.\n        \n                That's the spirit. Never give up.\n            \n        How do you want to respond to the ${boy}?\n      \n        *fake_choice\n      \n            #Kindly.\n        \n                \"No, we're not,\" you say, and the sailor looks at you dubiously. \"Buck up, now. It would be a poor repayment of your loyalty if I didn't get you home, wouldn't it? We'll be all right, you'll see.\"\n        \n            #Sharply.\n        \n                \"None of that!\" you snap. \"We're ${men} of Albion, are we not? Pull yourself together. We'll get through this all right.\" \n            \n        The sailors look at you expectantly.\n      \n        \"You ${men} have the good fortune,\" you go on with an attempt at seeming unconcerned, \"to be set adrift with one of the most accomplished navigators in the Navy. We have a sextent, we have stars, tomorrow morning we'll have sun; what else do we need? Now, then. You, Graham, make an inventory of what supplies we have, and let me know how long they'll last us. You there, Cartwright, I'll need your help in taking this reading. . .\"\n      \n        It is a terrible journey. You and your ${men} are tormented by waves and rain and hot sun and short rations, and it takes all your energy to keep them from falling into despair. \n        \n        But against all odds, you succeed. Using only your sextent and pocket watch, you managed to pilot your small craft back to Albion. And you lose only one ${man} aboard: young Cartwright, who dies of hypothermia.\n               \n        You report yourself and your lifeboat crew to the Admiralty three months later, whereupon the mutiny and your extraordinary voyage are reported in the \"Naval Chronicle.\"  Public opinion is staunchly in your favor: you are considered to be a hero for saving the lives of the ${men} who remained loyal to you, and you are widely admired for the brilliant navigation that brought them safely home. After you retire on commander's half-pay, your company is frequently requested at parties, where crowds clamor for you to tell the tale of the Mutiny on the Defender.\n        \n        Here, our story ends.\n        \n        *goto_scene ending\n      *else\n      \n        Unfortunately, without charts or maps, your nautical expertise isn't enough to get you back home.  Eight weeks into the voyage, some of the lifeboat sailors turn to drinking seawater; they soon die of dehydration.\n        \n        \"It could have happened to anyone,\" you muse to yourself, as you pass out asleep for the last time.\n        \n        *goto_scene death\n        \n    #Never surrender! Reach for my sword and restore my command.\n      *label die_fighting_pirates\n      Jones manages to fire ${his} pistol into your shoulder before you can close on ${him}.  You still manage to lay into ${him}, but the sound draws in the rest of the crew, all of whom are there to defend Jones and kill you.\n      \n      You fight admirably, but with the other loyalists dead, one ${man} can't take on an entire ${sloop}. . . certainly not with that shoulder wound.  Soon enough, cold steel punctures your lungs; all is dark.\n      \n      *goto_scene death\n      \n*elseif ((sloop_happy \u003c 25) and Atrocity)\n  *label whole_ship\n  *comment WHOLE SHIP IS AGAINST YOU\n  \n  A few nights later you awake with a start, to the sound of shouts and clanging metal outside your cabin.\n  \n  You swing up out of bed, grabbing for your sword--just as a team of armed sailors breaks down the door. \n  *if RelationshipJones \u003c 65\n    They are led by Jones, whose face is twisted into a sneer.\n  *if RelationshipJones >=65\n    The leader's face is twisted into a sneer.\n  \"Not so powerful now, are you?\" ${he} says scornfully. Over ${his} shoulder, you can see a sailor bleeding to death on the deck outside. \"Throw down that sword.\"\n  \n  Do you?\n  \n  *fake_choice\n    \n    #I can't win. I throw down my sword.\n        \n    #Never!\n        \n        You attack, and even manage to wound one of the mutineers, but there are far too many for you to hold out against. \n            \n  \"Get ${him}, ${boy}s!\"\n    \n  They seize you and drag you up on deck. You shout for help, and a few loyalists come to your aid,\n  *if RelationshipJones > 65\n    including Jones,\n  but it's clear the numbers are against you. The whole crew has turned itself to the goal of murdering you.\n    \n  *page_break\n    \n  With a convulsive effort, you pull away from the sailor restraining you. One of the loyalists throws you a sword. \n             \n  Your only hope at this point is to try to fight your way to a lifeboat.\n  \n  *choice\n    #Never surrender! I will die on this ${sloop}, if I have to!\n      You struggle on valiantly, and kill several of the mutineers, but the numbers are simply too many.  Your handful of loyalists are quickly dispatched, and one ${man} can't take on an entire ${sloop}. . . certainly not with that shoulder wound.  Soon enough, cold steel punctures your lungs; all is dark.\n      \n      *goto_scene death\n      \n    #Try to fight my way to the lifeboats.\n    \n        You slash to the left and the right, menacingly enough that your attackers fall back.  One of the loyalists pulls out a pistol; unloaded, you discover later, but the mutineers don't know that.  Carefully, inch by inch, you and your few supporters manage to get to the lifeboats.\n        *label retreat\n        *if RelationshipJones > 65\n          Jones\n          *goto whoever\n        *else\n          One of the sailors\n        *label whoever\n        manages to snatch a small quantity of food and water.  One of the sailors on board, who tried to remain passive in the fighting but is now a de jure mutineer, throws you a sextant.\n        *goto lifeboat\n*elseif ((sloop_happy > 40) and (sloop_discipline > 60))\n\n  The new ${master}, $!{Mr} ${new_master}, comments to you a few days later, \"I must admit, ${sir}, that I did not think anyone could turn the crew of this ${sloop} around.  And yet you've done it--the ${men} are a well-disciplined Royal Navy crew, and happy to boot.  I feared that a mutiny might be inevitable, but you've proved me wrong.\"\n\n  You smile.  \"It was hard work, and a little delicate at times, but I think we've done it.\"\n  \n  *set Mutiny false\n  *goto coda\n*else\n  *comment Unsuccessful mutiny\n  *set Mutiny true\n  \n  A few nights later you awake with a start, to the sound of shouts and clanging metal outside your cabin.\n  \n  You swing up out of bed, grabbing for your sword--just as a team of armed sailors breaks down the door. \n  *if RelationshipJones \u003c 65\n    They are led by Jones, whose face is twisted into a sneer.\n  *if RelationshipJones >=65\n    The leader's face is twisted into a sneer.\n  \"Not so powerful now, are you?\" ${he} says scornfully. Over ${his} shoulder, you can see the Marine sentry and a sailor bleeding to death on the deck outside. \"Throw down that sword.\"\n  \n  Do you?\n  \n  *fake_choice\n    \n    #I can't win. I throw down my sword.\n        \n      \"Get ${him}, ${boy}s!\"\n    \n      They seize you and drag you up on deck. But when you shout for help, some sailors immediately come to your aid. One of them presses a sword into your hand. Looking around, you can see that the mutiny is just getting started.\n        \n    #Never!\n        \n      You attack so ferociously ${he} stumbles back in surprise. Ruthlessly following up your advantage, you cut your way through the mutineers and manage to maneuver your way out of your cabin. On deck, you see that the mutiny is just getting started. \n\n  You rally the loyalists,\n  *if RelationshipJones > 65\n    including Jones,\n  and assess the tactical situation. Though parts of the crew were unhappy enough to risk their lives to kill you, notwithstanding your efforts to build discipline. . . the numbers are still on your side. \n  \n  For now.\n  \n  *page_break\n  \n  \"We must re-take control of this ship!\" you shout, and the ${men} surrounding you nod. Some of them are armed, with blades or pistols; some have only their bare hands. But at least they are all on your side.\n  \n  \"For Albion!\" you yell. They follow you as you charge back down the deck, no longer fighting defensively but now actively attacking anyone in your way.\n  \n  *page_break\n  \n  From around a corner come a contingent of mutineers--some of the ones who broke into your cabin, and some others. They stop when they see your party of loyalists. You stop too. Your two groups glare at each other along the deck. Light glistens off the blades of their cutlasses. \n  \n  What do you do?\n  \n  *fake_choice\n  \n    #Bluff them into surrendering.\n    \n        \"You've lost!\" you declare loudly. \"Lay down your weapons!\"\n        \n        One of the mutineers spits an oath at you, and then the whole group comes charging up the deck. Your loyalists meet them squarely, and then the battle is engaged.\n        \n        Someone in the crowd whips out a pistol and fires. A bullet rips through your shoulder, and your vision contracts with pain, but that doesn't stop you. Shouting and slashing, you fight mutineers for control of your command. \n        \n            \n    #Charge down the deck and engage them directly.\n    \n        \"Follow me!\" you order, and lead your loyalists charging down the deck. The mutineers meet them squarely, and then the battle is engaged. \n        \n        Someone in the crowd whips out a pistol and fires. A bullet rips through your shoulder, and your vision contracts with pain, but that doesn't stop you. Shouting and slashing, you fight mutineers for control of your command. \n        \n      \n    #Grab a pistol from one of your loyal ${men} and start shooting from here.\n    \n        Without bothering to speak, you snatch Cartwright's pistol and fire at the closest mutineer. $!{He} falls--and the others come charging up the deck. Your loyalists meet them squarely, and then the battle is engaged.\n        \n        A bullet rips through your shoulder, and your vision contracts with pain, but that doesn't stop you. Shouting and slashing, you fight mutineers for control of your command. \n    \n      \n  *page_break\n  \n  The battle is long and bloody, but in the end, the loyalists are victorious.  \n  \n  Easily a dozen ${men} have died, and a further two dozen more are unable to work, but with that show of force, you have put down the mutiny and re-established control of your ${sloop}.\n  *set wounds +1\n  *goto coda\n\n*label coda\n*page_break Next Chapter\n${HMS} Defender continues ${his_opp} cruise.  On a bright and clear day, you come into sight of a Gaulish merchant convoy, with no apparent warships to defend it.  There are a dozen Gaulish merchant ships in all.\n\nHow do you plan your attack?\n\n*fake_choice\n  #We stay to windward, planning on picking off the Gaulish ships one by one as we overrun them.  With the advantage of the wind gage, we will be able to catch any ships that try to run easily.\n  #We head to the middle of the convoy.  We want to get as many ships in cannon range as quickly as possible.\n  #We sail to lee of the convoy.  With the wind pushing them towards us, they will have little choice but to come to us, and Defender is faster and more maneuverable than any merchant ship.\n\nYou snap off orders, closing with the Gaulish convoy and running up the ensign of the Royal Navy.  The Gaulish ships begin to scatter, hoping that you will have to chase one or two and allow the rest to escape.\n    \n*if (Mutiny = false)\n       Defender's crew responds to your orders with the discipline and precision that you have carefully drilled in.  You expertly maneuver the ${sloop} to continuously herd the merchant ships back together, and your crew fires carefully timed and well-aimed shots at the Gaulish sails to cripple your prey.  Inevitably, some of the merchant ships escape, but you capture eight of the enemy.  You have deprived Gaul of much-needed supplies and earned yourself a small fortune in prize money.\n       *set patronage %+15\n       *set Wealth %+20\n       *finish\n*else\n       Defender's crew responds to your orders well.  The ${men} are not the most disciplined crew that you have ever served with, but they are adequate to the task at hand.  You maneuver the ${sloop} well, overtaking one Gaulish ship after another, and a barrage of cannon fire at the Gaulish sails cripples your prey.  Inevitably, most of the merchant ships escape, but you capture five of the enemy.  You have deprived Gaul of much-needed supplies and earned yourself a sizable payment of prize money.\n       *set Wealth %+5\n       *finish\n", "cuttingout": "\n\nThe tropical sun is hot even through your hat, and it glares painfully off the water. Through your stinging eyes, you can see looming up ahead the cliffs of a little island--a tiny place, uninhabited according to the charts. About halfway between the prow of Courageous and the island, the sea is marked by the white canvas sail of a Gaulish merchant ship--streaking towards the island as fast as ${he_opp} can go, running desperately away from Courageous's pursuit.\n\n\"More sail!\" the Captain commands.\n\nImmediately the ${men} jump to obey, feet pounding on the deck and shouts echoing from the rigging. Canvas snaps and billows overheard.\n\nBut you can tell it isn't enough. The little Gaulish ship is faster under the light wind, and has too great a head start.\n\n*page_break\n\n*comment Faster may not be historically accurate. This can work if the ship just has too great a headstart.\n\n\"I do not think we can catch ${him_opp},\" you say quietly to Bryce.\n\n\"We must catch ${him_opp},\" Bryce replies, \"before ${he_opp} gets much nearer shore. We can't manuever Courageous in those shallow waters--\"\n\nAnd, indeed, before very long the Captain is forced to call off pursuit, citing just that reason. Courageous stays a safe distance out, in deep water. You and many others stare resentfully at the escaped prize--nestled against shore in the company of another Gaulish merchant vessel, one that was already there. The Gauls must use this island often for resupply.\n\n\"${Mr} Bryce! ${Mr} ${surname}!\" the Captain's voice cuts through your reverie. \"In my cabin, if you please!\"\n\n*page_break\n\n\"We can hold them pinned here indefinitely,\" the Captain says, \"but we can't get close enough to engage them directly. Which means a cutting-out expedition is called for.\"  A group of ${men} will be sent to approach the merchant ships in the dead of night, board them secretly, take them over, and sail them away from the island as prizes.\n\n\"There are two ships, so our force will be divided in two. ${Mr} Bryce, you will command one half; ${Mr} ${surname}, you will command the other. Expect that each enemy ship has a complement of thirty ${men}. You will each have forty under your command.\"\n\nFew lieutenants get such a chance to prove their capabilities. \n*if Pigot_alive\n  Indeed, the Captain has clearly decided to pass over ${Mr} Pigot for this opportunity--a decision that you can hardly fault.\n  *goto BoostToCareer\n*label BoostToCareer\nIf you are able to pull this off, it will be a significant boost to your career.\n\nSo how are you feeling about this?\n\n*fake_choice\n\n    #Thrilled. I have been waiting for this sort of opportunity for a while now. I have no doubt at all I will succeed brilliantly and impress the Captain.\n       \n        That's the spirit!\n   \n    #Determined. This is going to be difficult, but I will give it everything I have and hope that is enough.\n   \n        That's the spirit!\n   \n    #Terrified. If I am NOT able to pull this off, it could represent a signficant setback to my career! Isn't that just like the Navy, to put you into positions where there is only a tiny chance of success, and then punish you for failure? I wish the Captain had chosen someone else.\n   \n        Now, now. That's hardly the spirit Albion wants to see in its Naval officers.\n       \n       \nYou give serious thought to how you will organize your ${men}, and then you go to brief the ones who have been assigned to you. They consist of two midship${men} and forty sailors.\n\n\"We will take two boats,\" you explain. \"I shall command one, with ${Mr} Midship${man} Stuart to assist me. ${Mr} Midship${man} Mason will command the other. My boat shall come along the starboard side of the Gaulish vessel, and ${Mr} Midship${man} Mason's along the port side. We will climb aboard secretly, and then attack from two sides with plenty of shouting to frighten the spineless Gaulish ${boy}s.\"\n\nThe ${men} grin.\n\nYou pause. You know that one of the three officers must be made responsible for cutting the anchor cable, so that your ${men} will be able to sail the Gaulish ship out to where H.M.S. Courageous waits. Another must be responsible for ascending the rigging and loosing the topsail to get the ship underway. And a third must be responsible for taking over the steering of the ship. There are three officers available--you and the two midship${men}. Which job do you want for yourself?\n\n\n*temp job\n\n*choice\n    #Cutting the cable is the most important job. It will have to be done while hand-to-hand fighting is still raging on the deck. I will take responsibility for it myself.\n       \n        \"Once we are aboard, I shall cut the anchor cable to release the Gaulish ship from its mooring,\" you continue. \"${Mr} Midship${man} Mason, you shall ascend the rigging and loose the topsail, to set the ship in motion.\"\n       \n        Mason pales slightly, but nods.\n       \n        \"${Mr} Midship${man} Stuart, it shall be your task to make your way directly to the wheel, and steer the prize out of harbor once we have taken ${him_opp}.\"\n       \n        \"Aye aye, ${sir},\" Stuart says crisply.\n       \n        *set job \"cable\"\n        *goto RESTOFTHEPLAN      \n       \n    #Ascending the rigging to loose the topsail is both important and dangerous. It will require iron nerves and great agility to climb to that unsteady height in the dark while fighting rages on the deck below. I will take responsibility for it myself.\n       \n        \"Once we are aboard, ${Mr} Midship${man} Mason, it shall be your task to fight your way to the anchor cable and cut it through, releasing the Gaulish ship from its mooring,\" you continue.\n       \n        Mason pales slightly, but nods.\n       \n        \"I shall ascend the rigging and loose the topsail, to get the ship underway,\" you say. You see some of the ${men}'s eyes widen with admiration--not many officers would volunteer for such a dangerous task.\n        *set job \"rigging\"\n        *set likeability %+10\n        *set leadership %+10\n       \n        \"${Mr} Midship${man} Stuart, it shall be your task to make your way directly to the wheel, and steer the prize out of harbor once we have taken ${him_opp}.\"\n       \n        \"Aye aye, ${sir},\" Stuart says crisply.\n       \n        *goto RESTOFTHEPLAN\n       \n    #Steering the captured prize back to Courageous is the proper job for the officer in command. I will take responsibility for it myself.\n   \n        \"Once we are aboard, ${Mr} Midship${man} Mason, it shall be your task to fight your way to the anchor cable and cut it through, releasing the Gaulish ship from its mooring,\" you continue.\n       \n        Mason pales slightly, but nods.\n       \n        \"${Mr} Midship${man} Stuart, you shall ascend the rigging and loose the topsail, to get the ship underway.\"\n       \n        \"Aye aye, ${sir},\" Stuart says crisply.\n       \n        \"I shall manage the steering,\" you finish--\"none of you need worry over that. See to it your own task gets done, and all will be well.\"\n       \n        *set job \"steer\"\n        *goto RESTOFTHEPLAN\n       \n\n*label RESTOFTHEPLAN\n \n\"Now, you ${men}--you'll each be provided with a pistol and a cutlass. We will leave at four bells--you will be roused.\"\n   \nBefore dismissing them, you think over the plan--is there anything else you need to say?\n   \n*page_break\n\n*if intelligence > 50\n\n    Oh, yes, of course, you nearly forgot! \"Mind you keep those pistols at half-cock until I give the order otherwise! We don't want there to be any risk of a shot going off before we're aboard. Dismissed!\"\n   \n    The next few hours pass nervously, as you go over your plan again and again. Finally, four bells sounds, and you hasten to the deck to take command of your party. Along the way, you encounter Bryce, who seems a little nervous too. \"All in readiness, ${Mr} ${surname}?\" ${he} asks.\n   \n    \"Yes, ${sir}, ${Mr} Bryce,\" you say.\n   \n    \"You've set someone to climb the rigging and loose the topsail, right? And someone to cut the cable?\"\n   \n    \"Yes, ${sir}.\"\n   \n    \"And there's an officer responsible for the steering?\"\n   \n    \"Yes, ${sir}.\"\n   \n    \"You've told the ${men} to keep their damned pistols half-cocked until you give the word? All we need is a premature shot to give away the game.\"\n   \n    \"Yes, ${sir}, I've told them.\"\n   \n    \"Nicely done, ${Mr} ${surname}--you seem to have thought of everything. Your half of the mission is in good hands.\" Bryce smiles, looking only a little strained. \"Good luck to you.\"\n   \n    \"To you too, ${sir},\" you say, and go to shepherd your ${men} into the boats.\n   \n    *page_break\n   \n    *goto APPROACH\n\n*else\n\n    No, you can't think of anything. \"Dismissed!\" you say.\n     \n    The next few hours pass nervously, as you go over your plan again and again. Finally, four bells sounds, and you hasten to the deck to take command of your party. Along the way, you encounter Bryce, who seems a little nervous too. \"All set, ${Mr} ${surname}?\" ${he} asks.\n   \n    \"Yes, ${sir}, ${Mr} Bryce,\" you say.\n   \n    \"You've set someone to climb the rigging and loose the topsail, right? And someone to cut the cable?\"\n   \n    \"Yes, ${sir}.\"\n   \n    \"And there's an officer responsible for the steering?\"\n   \n    \"Yes, ${sir}.\"\n   \n    \"You've told the ${men} to keep their damned pistols half-cocked until you give the word? All we need is a premature shot to give away the game.\"\n   \n    \"Oh.\" That was the thing you forgot.\n   \n    What do you say?\n   \n    *fake_choice\n   \n        #\"Uh, no, ${sir}, I--it slipped my mind. I'll make sure they know before we leave, ${sir}.\"\n       \n                \"Well, see that you do,\" Bryce says, speaking far more sharply than is usual for ${him}. \"One stray shot and it's all over!\" But then ${he} seems to force ${him}self to relax. $!{He} smiles, looking only a little strained. \"Don't worry over it, ${Mr} ${surname},\" ${he} says; \"it's very usual to forget a detail or two when you've never done such a thing before.\" But you think you have sacrificed some degree of respect in ${his} eyes. \"Good luck to you, ${Mr} ${surname}.\" \n               \n                \"To you too, ${sir},\" you say, and go to shepherd your ${men} into the boats.\n               \n                *page_break\n                     \n        #\"I'll tell them when we're ready to go, ${sir}. Wouldn't want them to forget.\"\n       \n                Bryce raises an eyebrow at you. You are uncomfortably certain that ${he} knew you had forgotten, and isn't overly impressed by your attempt to cover your error. \"See that you do,\" ${he} says tersely. But then ${he} manages a somewhat strained smile. \"Good luck to you, ${Mr} ${surname}.\"\n   \n                \"To you too, ${sir},\" you say, and go to shepherd your ${men} into the boats.\n               \n                *page_break\n\n    *comment DGF TODO I don't think this is tact; I think this is leadership?  But then let's not make the poor poorer by taking away more leadership.\n    *if leadership > 50\n   \n        \"Now see here!\" you order your ${men} in a fierce whisper. \"Not one sound from any of you once we're out on the water! And keep those pistols of yours half-cocked until I give the order otherwise! Any ${man} who disobeys will be kissing the gunner's ${son_opp} tomorrow!\"\n   \n        They all nod, and you join them in the boat, satisfied that you covered your earlier mistake brilliantly. No one would ever guess you entirely forgot to give the order before.\n       \n        *page_break   \n        *goto APPROACH\n   \n    *else\n   \n        \"I--I forgot to say, earlier,\" you begin, and instantly curse yourself for the beginning, but it's too \n        late now. \"You're all to keep those pistols half-cocked until I give the order otherwise, do you hear? Any ${man} who disobeys will be kissing the gunner's ${son_opp} tomorrow!\"\n       \n        They all nod. You think maybe one or two of them smile a little at your inexperience, but you can't be sure. You choose to let it pass and join them in the boat.\n       \n        *page_break\n        *goto APPROACH\n\n       \n*label APPROACH\n       \nThe oars skim smoothly over the water, and the ${men} obediently keep quiet. You can feel your heart hammer in your throat as the great dark shapes of the Gaulish ships loom overhead, and you hope your hand doesn't shake on the tiller. It is your responsibility to get the boat close enough to board the merchant vessel, without letting their lookout see anything. You hope your sailing ability is up to the task.\n\n*page_break\n\n*if sailing \u003c 40\n\n    \"Uh, ${Mr} ${surname},\" Stuart whispers loudly. \"Uh, ${sir}, begging your pardon, but I think we're drifting--\"\n   \n    To your horror, you realize that Stuart is right. You hastily fumble to correct your error. Do you thank ${him} for ${his} assistance, or order ${him} to keep quiet?\n   \n    *choice\n   \n        #I nod my thanks as I correct course.\n       \n            Acknowledging the contributions of your subordinates--that's a good quality in a senior officer.\n           \n            Unfortunately, Stuart's warning came too late. From far above, you hear the shout of the lookout on the Gaulish ship. $!{He} has seen you. Your sailing skill apparently wasn't up to the task after all.\n   \n            This is all going to be much harder now.\n       \n            *set likeability %+10\n           \n            *page_break\n            *goto BOARD2\n           \n        #I order ${him} to keep quiet.\n       \n            \"Shut your mouth!\" you hiss. \"How dare you question my competence?\"\n       \n            From far above, you hear the shout of the lookout on the Gaulish ship. $!{He} has seen you--or heard you. Your sailing skill apparently wasn't up to the task after all.\n   \n            This is all going to be much harder now.\n           \n            *set likeability %-10\n            *set leadership %-10\n            *page_break\n            *goto BOARD2\n            \n*else\n\n    Sweat pours down your face as you navigate up close to the starboard side of the Gaulish ship. To your profound relief, no one aboard notices a thing.\n       \n    *goto BOARD\n\n        *label WINTHEFIGHT\n       \n        You cut to the left and the right with your sword, shouting as loudly as you can. At first, the Gauls scatter before you--but then they begin to regroup. \n        \n        One rushes you from the left, and you turn and plunge your sword into ${his} chest. $!{He} falls--but there is another diving in from the right, closing fast as you struggle to extricate your blade from ${his} dead shipmate. \n        \n        What do you do?\n        \n        *fake_choice\n        \n            #I use all my strength to wrench my sword free, and then I turn and fight.\n            \n                With one huge convulsive effort, you pull your sword free, and whirl to confront your new opponent. You barely get your blade up in time to block ${his} swing, and your entire body shudders with the impact of steel on steel. This Gaul is a very good fencer indeed, and for many long seconds your entire attention is consumed with the effort of parrying ${his} blows.\n                \n                Then fortune smiles upon you: the Gaul slips on the bloody deck. Just for a moment, ${his} defense is weakened, and you take advantage of that moment to strike the sword from ${his} hand. Then you plunge your blade into ${his} heart.\n            \n            #I can't waste an instant. I abandon my sword, and turn to fight with my pistol.\n            \n                You let go of the hilt and spin around, leveling your pistol as your new opponent swings ${his} sword. Steel whistles past your ear--you fire at point-blank range--and the Gaul falls to the deck, a smoking hole in the center of ${his} chest.  In a smooth motion you pick up the fallen Gaul's sword and pistol to replace your own.\n            \n            #There isn't enough time to turn. I dodge to the left.\n            \n                Steel whistles past your ear, but you move so fast that it only slices through your sleeve, not your arm. You leap over the fallen Gaul's body, jerk your sword free, and turn--but by that time, the ${man} who thought to attack you is already engaged with someone else. \n                \n                \n        You turn your attention back to the task at hand: fighting your way through the mass of bodies to the \n        *if job = \"cable\"\n            cable.\n        *if job = \"rigging\"\n            main mast.\n        *if job = \"steer\"\n            wheel.\n                \n        You have almost reached your goal when you find your way blocked by two massive, angry Gauls standing shoulder to shoulder. You aim your pistol--and just then, out of the corner of your eye, see Mason fighting a desperate duel on the other side of the deck.\n        \n        If Mason falls, ${his} task will go uncompleted. On the other hand, if you spend your bullet to save ${his} life, you will be out of ammunition. And then you will have to fight both these Gauls with just your sword. If they cut you down, your task will go uncompleted.\n        \n        What do you do?\n        \n        *fake_choice\n        \n            #I am confident in my ability to win any swordfight, even two on one. And it is my responsibility to see to the safety of those under my command. I turn and fire at Mason's attacker.\n            \n                Mason's attacker drops like a stone. Mason looks over, wide-eyed--then gives you an awkward nod of thanks and scrambles to ${his} task.\n                \n                You, meanwhile, turn back to see two large Gauls with drawn swords charging at you.\n                \n                You howl an incoherent challenge and rush to meet them. Steel clangs against steel, and pain scores across your left leg as one of the Gauls lands a blow. You are not fighting by any honorable rules now, but desperately for your life, using elbows and knees as well as the blade of your sword. You manage to elbow one Gaul in the throat, and ${he} falls back, choking curses. That gives you the opportunity you need to wound the other slightly and run before ${he} recovers. \n                \n            #Mason can take care of ${him}self--${he} is a well-trained officer of the Royal Navy. It is my responsibility to see my own part of the mission successfully executed. I fire at one of the Gauls in front of me.\n            \n                You fire, and one of your opponents falls to the deck, writhing in pain. The other rushes you, but you are more than ready to meet ${him}. $!{He} doesn't even manage to land a blow before you strike out viciously, severely injuring ${his} sword arm. As you sprint onward, you spare a glance towards Mason. To your relief, you see that ${he} has won ${his} fight also, and is well on ${his} way to getting ${his} job done.\n                \n        *if job = \"cable\"\n               \n            At last you pummel your way through the mass of bodies to the anchor cable, and hack through it with your sword.  The Gaulish ship is drifting freely now.\n           \n            You look up, and pick out Mason's dark figure, very high up in the rigging. As you watch, the topsail flutters free.\n                      \n            You turn back to the fight. In no time at all, Gauls are surrendering all over the deck. You take prisoner those who still live, get the prize underway, and take ${him_opp} safely back to Courageous.\n           \n            *page_break\n           \n            Bryce's prize beats you there by no more than a few minutes. You and ${he} meet on deck, and ${he} looks as flushed and giddy as you feel. You reach over to shake ${his} hand, and ${he} squeezes yours warmly.\n           \n            \"Brilliant!\" the Captain says in approval. \"Very nicely done indeed, the two of you!\" $!{He} orders you and Bryce to take command of your prizes and sail them to Albion--adding, with a smile, that ${he} would be much surprised if you did not each receive a promotion to Commander.\n           \n            *page_break\n           \n            *comment This seniority is totally a placeholder number. I don't know what makes sense or how it will increment in earlier vignettes.--verified by AHSM; 4 is correct--however, perhaps we should include a separate check for heroic resolution of PrizeShip instead? REVIEW\n            *label Promotion\n           \n            *if seniority > 4\n           \n                In fact, after due consideration of your superb achievements to date, the Admiralty promotes you directly to Post Captain, entirely skipping the rank of Commander. It is a proud moment indeed when you first walk down a street in Chesterport with an epaulette pinned to your right shoulder, marking you as a junior post captain. And now you are eligible to command a ship of your own.\n           \n                Well done, Captain ${surname}!\n                *set rank 4\n                *set Age +1\n                *set seniority 0\n                *set Wealth %+10\n                      \n                *finish\n               \n            *else\n           \n                And indeed, the Admiralty promotes you to the rank of Commander. It is a proud moment indeed when you first walk down a street in Chesterport with an epaulette pinned to your left shoulder. And now you are eligible to command a sloop of your own, and to receive the courtesy title of \"Captain.\"\n               \n                Well done, Captain ${surname}!\n\n                *set rank 3\n                *set Age +1\n                *set seniority 0\n                *set Wealth %+10\n               \n                *finish\n               \n           \n        *elseif job = \"rigging\"\n                  \n            At last you disentagle yourself from the fighting, and make for the rigging.\n           \n            *if sailing > 80\n           \n                You swarm up it with no fear and no hesitation--you are, after all, exceptionally agile. Once aloft, you run across the yardarm and slip off the gaskets to loose the sail. It flutters free, and you let yourself down hand over hand to the deck below, just as the Gauls start surrendering to your ${men}. You take prisoner those who still live, get the prize underway, and take ${him_opp} safely back to Courageous.\n           \n                *page_break\n           \n                Bryce's prize beats you there by no more than a few minutes. You and ${he} meet on deck, and ${he} looks as flushed and giddy as you feel. You reach over to shake ${his} hand, and ${he} squeezes yours warmly.\n           \n                \"Brilliant!\" the Captain says in approval. \"Very nicely done indeed, the two of you!\" $!{He} orders you and Bryce to take command of your prizes and sail them to Albion--adding, with a smile, that ${he} would be much surprised if you did not each receive a promotion to Commander.\n           \n                *page_break\n                *goto Promotion\n           \n            *elseif sailing > 45\n           \n                The fighting rages below you as you make your way up the rigging. Your heart pounds in your ears--climbing isn't exactly your strong suit, after all. Why exactly did you volunteer for this? Making your way out onto the yardarm is among the most terrifying things you have ever done, but you manage it, and the topsail flutters free. \n\n                You let yourself down hand over hand to the deck below, just as the Gauls start surrendering to your ${men}. You take prisoner those who still live, get the prize underway, and take ${him_opp} safely back to Courageous.\n           \n                *page_break\n                Bryce's prize beats you there by no more than a few minutes. You and ${he} meet on deck, and ${he} looks as flushed and giddy as you feel. You reach over to shake ${his} hand, and ${he} squeezes yours warmly.\n           \n                \"Brilliant!\" the Captain says in approval. \"Very nicely done indeed, the two of you!\" $!{He} orders you and Bryce to take command of your prizes and sail them to Albion--adding, with a smile, that ${he} would be much surprised if you did not each receive a promotion to Commander.\n           \n                *page_break\n                *goto Promotion\n           \n            *else\n           \n                It is a terrifying climb. Agility is far from your strong suit--why exactly did you volunteer for this? Your hands sweat and your heart pounds. . . and then your foot slips. You fall to the deck with a sickening thud, and the world goes dark around you.\n               \n                *page_break\n                *goto HURTFAIL\n\n        *else\n           \n                You pummel your way through the mass of bodies to the wheel. In between lunging and parrying, you see the moment when Mason cuts the cable, and the moment when Stuart loosens the topsail. Before very long, Gauls are surrendering to you and your sailors all over the deck. You take prisoner those who still live, and then set your hands proudly on the wheel and take your prize back to Courageous.\n           \n                *page_break\n               \n                Bryce's prize beats you there by no more than a few minutes. You and ${he} meet on deck, and ${he} looks as flushed and giddy as you feel. You reach over to shake ${his} hand, and ${he} squeezes yours warmly.\n           \n                \"Brilliant!\" the Captain says in approval. \"Very nicely done indeed, the two of you!\" $!{He} orders you and Bryce to take command of your prizes and sail them to Albion--adding, with a smile, that ${he} would be much surprised if you did not each receive a promotion to Commander.\n           \n                *page_break\n                *goto Promotion\n   \n*label LOSETHEFIGHT\n\nYou cut to the left and the right with your sword, shouting as loudly as you can. At first, the Gauls scatter before you--but then they begin to regroup. \n        \nOne rushes you from the left, and you turn and plunge your sword into ${his} chest. $!{He} falls--but two more are diving in from the right, closing fast as you struggle to extricate your blade from their dead shipmate. \n\nYou can't get the blade free. Abandoning your sword, you jump to your feet and face your two attackers. You manage to fell one of them with your pistol--but the other swings in with ${his} sword. You dodge as best you can, but slip on the bloody deck. You hit your head hard as you fall, and agonizing pain pierces your right thigh. You have just time enough to realize with despair that you have failed, and wonder what will become of your ${men}, and then the world goes black.\n\n*page_break\n\n*goto HURTFAIL\n\n*label BOARD2               \nYou fling yourself at the chains that snake up the Gaulish ship's side, ordering your ${men} to follow and remembering to call over your shoulder the additional order to cock their pistols. Above your head, you can hear shouts and pounding feet as the Gaulish sailors rush to defend their ship.\n   \nYou and your ${men} climbs as fast as you can, but your poor sailing ability gave the Gauls a chance to get themselves prepared. You were counting on the advantage of surprise, and you have largely lost that. Still, nothing for it--\n   \n\"For Albion!\" you shout, and plunge into the fracas on the deck.\n   \n*page_break\n   \n*if fighting \u003c 70\n   \n    *goto LOSETHEFIGHT\n   \n*else\n   \n    *goto WINTHEFIGHT\n\n   \n*label HURTFAIL\n\n*comment Placeholder value--verified by AHSM--4 is correct.\n*set Wounds +1\n\n*if seniority \u003c 4\n\n    *comment REVIEW AHSM- I think this needs some text describing the death scene, or at least explaining what has happened.\n        \n    The honorless Gaulish dog stabs you to death as you lay unconscious and helpless.\n    \n    Mason sees it happen, though not soon enough to come your aid. As your ${men} cry out in horror at your fate, and their courage begins to fail, it is Mason who rallies them. $!{He} snatches victory from the jaws of defeat, captures the Gaulish ship as a prize, and sails it back to Courageous. $!{His} career is made, and many are the astounding tales told of the exploits of Captain Mason.\n    \n    You, of course, know nothing of this, for your story has ended.\n    \n    *goto_scene death\n\n*else\n       \n    When you open your eyes again, it is to see Stuart bending over you. \"Don't you worry, ${sir},\" ${he} is saying. \"It's all right, we've got the prize. We're headed back to Courageous now, ${sir}, and we'll have you under the surgeon's care in no time.\"\n       \n    \"How. . .?\" you mumble.\n       \n    \"$!{Mr} Midship${man} Mason, ${sir}. $!{He} saw you fall and stepped right in, kept the ${men} from panicking, saw to it the cable was cut and the topsail loosed, took over the steering ${him}self. $!{He} was brilliant, ${sir}--wouldn't think it, would you? I wouldn't have thought it, at least, ${sir}, ${he}'s so quiet I always thought ${he} was one of the fraidy ones, but ${he} was brilliant, brilliant. . .\"\n       \n    And, unsurprisingly, the Captain appears to think so as well. $!{Mr} Midship${man} Mason gets a promotion to Acting-Lieutenant and command of the Gaulish ship to take home as a prize. ${Mr} Bryce, who captured ${his} prize without requiring a midship${man} to save ${his} bacon, gets command of the other Gaulish ship, with the strong implication that ${he} will be promoted to Commander once ${he} reaches Albion.\n    \n    \"Bad luck, ${Mr} ${surname},\" ${he} says to you.\n    \n    What do you say back?\n    \n    *fake_choice\n    \n        #\"Luck had nothing to do with it, ${sir}. You did an excellent job with your half of the mission. Congratulations to you.\" \n        \n        #\"Indeed, ${sir}, it was. If I hadn't hit my head, I'd be sailing home alongside you. . . Still, I'm glad you had better fortune.\"\n        \n    You spend a long, painful time under the surgeon's hands, and are left with permanent weakness from damage sustained to your right leg. When you are well enough, you resume your duties as lieutenant.\n    *set Age +2\n    *set Seniority +2\n    *set Wealth %-5\n       \n    *finish\n\n*label BOARD\n\n\"Pistols cocked!\" you order in a whisper. You look up above you, at the chains that snake up the ship's side, shining silver and then disappearing into darkness.\n   \nIt's time. Do you lead, or do you order Stuart to lead so you can supervise the ${men} as they board?\n   \n*choice\n\n        #I am the officer in command--and I won't ask anyone to do what I will not do myself. I lead!\n       \n            Well said!\n            *set courage %+10\n            *set leadership %+15\n            *set honor %+10\n           \n            \"Follow me!\" you whisper as loudly as you dare, and, springing to your feet, catch hold of the chains. Behind you, you can hear your ${men} following as quietly and quickly as they can manage.\n           \n            *goto KID\n           \n        #I need to be sure that my ${men} undertake their duties correctly. I order Stuart to lead.\n       \n            \"${Mr} Midship${man} Stuart,\" you whisper, \"lead the way, if you please.\"\n           \n            Stuart takes a deep breath and stands. \"Follow me!\" ${he} whispers to the ${men}, and catches hold of the chains.\n            The ${men} follow Stuart--silently at first, and then shouting once they are over the side of the ship.\n           \n            *page_break\n            *set leadership %-25\n           \n            The fight is well underway by the time you make it up to the deck--a mass of struggling Albions and Gauls.\n            *if fighting \u003c 30\n           \n                *goto LOSETHEFIGHT\n               \n            *else\n           \n                *goto WINTHEFIGHT\n           \n               \n*label KID\n\nYou make it to the top of the heavy chains, pull yourself up over the side onto the deck--and come face to face with a wide-eyed, white-faced ${boy}. $!{He} is too startled and frightened to shout now, but ${he} will recover in no more than an instant--and most of your ${men} are still ascending the chains behind you.\n   \nWhat do you do?\n   \n*choice\n   \n    #Shoot ${him}.\n       \n        Your pistol shot echoes loudly in the silent night air. The ${boy} falls backward, mouth open as though surprised, bullet wound branded on ${his} forehead.\n           \n        And from all over the ship, the Gauls come pouring out on deck, alerted by your shot to your presence. I'm not sure what you thought was going to happen, but your bloodthirstiness has given the Gauls a chance to get themselves prepared. You were counting on the advantage of surprise, and you have largely lost that. Still, nothing for it--\n   \n        \"For Albion!\" you shout, and plunge into the fracas on the deck.\n           \n        *set bloodthirst %+20\n       \n        *page_break\n           \n        *if fighting \u003c 70\n           \n            *goto LOSETHEFIGHT\n               \n        *else\n           \n            *goto WINTHEFIGHT\n       \n    #Hit ${him} across the face with my pistol, hopefully knocking ${him} out without killing ${him}.\n       \n        $!{He} falls backward, making no more noise than a soft thump when ${he} hits the deck, mouth open as if in surprise and blood running down ${his} face.\n           \n        Your ${men} pull themselves over the ship's side as quietly as possible. You wait until a good number are beside you, then take a deep breath. \"For Albion!\" you shout, and plunge into the confused mass of Gauls caught unprepared by your surprise attack.\n       \n        *page_break\n           \n        *if fighting \u003c 30\n           \n            *goto LOSETHEFIGHT\n               \n        *else\n           \n            *goto WINTHEFIGHT\n       \n    #$!{He} is only a child--I can't hurt ${him} for being in the wrong place at the wrong time.\n       \n        You hesitate--and ${he} opens ${his} mouth and yells. \"Intruders! Boarders! Captain! Captain!\"\n           \n        And from all over the ship, the Gauls come pouring out on deck, alerted to your presence. I'm not sure what you thought was going to happen, but your softheartedness has given the Gauls a chance to get themselves prepared. You were counting on the advantage of surprise, and you have largely lost that. Still, nothing for it--\n   \n        \"For Albion!\" you shout, and plunge into the fracas on the deck.\n       \n        *page_break\n           \n        *set bloodthirst %-20\n           \n        *if fighting \u003c 70\n           \n            *goto LOSETHEFIGHT\n               \n        *else\n           \n            *goto WINTHEFIGHT", "examination": "*temp Duties\n*set Duties false\n*if (rank=0)\n  You return to your duties as a midship${man} on H.M.S. Courageous.  The days pass much as before.  You study under the ship's ${master}, you run errands for the officers, and you command your small section of ${men} in routine tasks.  As a year passes, you have the opportunity to practice various skills that you expect to be tested on in the lieutenant examination.\n  *goto Practice\n*elseif (rank=1)\n  You take up your new duties as an acting-lieutenant on H.M.S. Courageous.\n  *label NewDuties\n  *set Duties true\n  The responsibilities are much greater, and your duties have changed significantly.  Where previously you were often on deck as an assistant for the officer of the watch, you now take your turns as an officer of the watch.  Where you previously commanded a small group of guns, you now command a broadside.  And your duties studying under the ship's ${master} have completely ended.  As a year passes, you have the opportunity to practice various skills.\n  *goto Practice\n*else\n  You take up your new duties as a lieutenant on H.M.S. Courageous.\n  *goto NewDuties\n\n*label Practice\nWhich of your skills do you devote the most effort to training?\n*choice\n  #Sailing.\n    An excellent choice.\n    *set Sailing %+15\n    *goto Examination\n  #Gunnery.\n    An excellent choice.\n    *set Gunnery %+15\n    *goto Examination\n  #Fighting with sword and pistol.\n    An excellent choice.\n    *set Fighting %+15\n    *goto Examination\n  #Leading the ${men} of the ship.\n    An excellent choice.\n    *set Leadership %+15\n    *goto Examination\n  #Currying favor with my superiors.\n    A clever and savvy choice, but one that doesn't make you many friends among the crew.\n    *set Tact %+15\n    *set Patronage %+5\n    *set Likeability %-10\n    *set Leadership %-10\n    *set RelationshipJones %-10\n    *goto Examination\n\n  *if (rank > 0)\n    #I spend my time training the midship${men}.  I need to think like an officer now.\n      A remarkably responsible choice for one of your age and experience.  You find that working with $!{Mr} Midship${man} Stuart both greatly helps ${him} and also helps you master the skills you teach.  You also learn a thing or two about leadership along the way.\n      *set Sailing %+5\n      *set Gunnery %+5\n      *set Fighting %+5\n      *set Leadership %+15\n      *set Likeability %+10\n      *goto Examination\n\n*label Examination\n*set age +1\n*set seniority +1\n*if (rank=1)\n  *set seniority2 +1\n  *goto A\n*label A\n*if (rank=2)\n  *finish\n\n*page_break\n\nFinally, it is time for your lieutenant examination.  You dress in your finest uniform and head over to a ship of the line, H.M.S. Dreadnought, where a board of captains has convened to examine a plethora of acting-lieutenants and midship${men} on the finer points of naval skill.  Those who pass are promoted to lieutenant.  Those who fail must spend at least another year at sea before trying again.\n\nAfter an interminable wait, your name is called and you present yourself to the trio of captains.  They take a perfunctory look at your papers and then launch into the examination.\n\n*temp Random\n*rand Random 1 3\n*if (Random=1)\n  Captain Fitzroy--a middle-aged captain with a particularly hard cast to ${his} face--begins questioning you on sailing skills.\n\n  \"You are the officer of the watch on a square-rigged ship carrying a full spread of sail.  The wind is strong and steady.  The barometer drops suddenly.  What do you do?\"\n  \n  *if ((Patronage + Sailing) > 125)\n    *if (Sailing \u003c 60)\n      You stammer for a while, finally answering as you think aloud, \"Falling pressure means bad weather is likely, ${sir}.  I order the hands aloft to reef sails in anticipation of the possible bad weather.\"\n\n      The captains are guarded--your answer was correct, but not as swift as it should have been.  They continue to grill you.  Finally, after a long examination, they confer privately and then inform you that you have passed the examination.\n      *goto Passed\n    *else\n      You immediately answer, \"I order the hands aloft to reef sails in anticipation of the possible bad weather, ${sir}.\"\n\n      One of the other captains responds, \"Good.  But why?\"\n\n      \"Falling pressure means bad weather is likely, ${sir}.  If I waited until bad weather arrived, I would be carrying too much sail if the winds increased.  Sending hands aloft to shorten sail then would be dangerous.\"\n\n      The examination continues, and your answers continue to please the captains.  After a relatively short examination, they confer privately and then inform you that you have passed the examination.\n      *goto Passed\n  *else\n    You stammer for a while.  Finally, one of the other captains cuts in.  \"The correct answer is to reef sail.  Falling pressure makes bad weather likely, and you do not want a full spread of sail in a squall.\"  $!{He} then launches into another question that you stumble through.  After ten minutes of agony, the captains confer privately and then inform you that you have failed the examination.\n    *goto Failed\n\n*elseif (Random=2)\n  Captain Fitzroy--a middle-aged captain with a particularly hard cast to ${his} face--begins questioning you on gunnery.  \"How many ounces of powder should be loaded into a long 8?\"\n  \n  *if ((Patronage + Gunnery) > 125)\n    *if (Gunnery \u003c 60)\n      You stammer for a while before finally remembering the answer.\n\n      The captains are guarded--your answer was correct, but not as swift as it should have been.  They continue to grill you.  Finally, after a long examination, they confer privately and then inform you that you have passed the examination.\n      *goto Passed\n    *else\n      You immediately rattle off the correct answer.\n      *comment DGF TODO Could we include the real answer here?  Or another question to which we know the answer?\n\n      The examination continues, and your answers continue to please the captains.  After a relatively short examination, they confer privately and then inform you that you have passed the examination.\n      *goto Passed\n  *else\n    You stammer for a while, before one of the other captains cuts in and gives you the correct answer.  $!{He} then launches into another question that you stumble through.  After ten minutes of agony, the captains confer privately and then inform you that you have failed the examination.\n    *goto Failed\n\n*else\n  Captain Fitzroy--a middle-aged captain with a particularly hard cast to ${his} face--begins questioning you on naval leadership.  \"Why is managing rum essential to a well-disciplined ship?\"\n  \n  *if ((Patronage + Leadership) > 125)\n    *if (Leadership \u003c 60)\n      You stammer for a while before finally answering while thinking aloud, \"Rum is something the ${men} value highly, ${sir}.  Depriving them of the supply they are accustomed to makes them angry, even mutinous, and additional rations can be used as a means to inspire greater efforts.\"\n\n      One of the other captains cuts in, \"All true, but only a partial answer.  What else?\"\n\n      You think, and the answer suddenly becomes obvious.  \"Too much rum can easily render the crew drunk, as they are unlikely to show any moderation themselves.  And a drunk crew is both hard to manage and inherently dangerous, ${sir}.\"\n\n      The captains are guarded--your answer was correct, but not as swift as it should have been.  They continue to grill you.  Finally, after a long examination, they confer privately and then inform you that you have passed the examination.\n      *goto Passed\n    *else\n      \"The ${men} value rum highly, ${sir}, so depriving them of the accustomed supply renders them angry, even mutinous.  Additional rations make the ${men} happy and can be used as a means to inspire greater efforts.  At the same time, too much rum can easily render the crew drunk, as they are unlikely to show any moderation themselves.  And a drunk crew is both hard to manage and inherently dangerous, ${sir}.\"\n     \n      Captain Fitzroy nods in satisfaction with your answer, and one of the other captains cuts in with a new question.\n\n      The examination continues, and your answers continue to please the captains.  After a relatively short examination, they confer privately and then inform you that you have passed the examination.\n      *goto Passed\n  *else\n    You stammer for a while, before one of the other captains cuts in and gives you the correct answer.  $!{He} then launches into another question that you stumble through.  After ten minutes of agony, the captains confer privately and then inform you that you have failed the examination.\n    *goto Failed\n\n*label Passed\nCongratulations!  You are now a lieutenant.\n*if (rank=1)\n  What's more, all of your seniority as an acting-lieutenant is converted to seniority as a lieutenant, because your commission bears the date of your appointment as an acting-lieutenant.\n  *set seniority seniority2\n  *set seniority +1\n  *set Age +1\n  *set rank 2\n  *if (Duties = false)\n    Your responsibilities as a lieutenant are much greater, and your duties have changed significantly.  Where previously you were often on deck as an assistant for the officer of the watch, you now take your turns as an officer of the watch.  Your duties studying under the ship's ${master} have completely ended. And where you previously commanded a small group of guns, you now command a broadside.\n    *finish\n  *else\n    *finish\n*else\n  *set rank 2\n  *set seniority 1\n  *set Age +1\n  *if (Duties = false)\n    Your responsibilities as a lieutenant are much greater, and your duties have changed significantly.  Where previously you were often on deck as an assistant for the officer of the watch, you now take your turns as an officer of the watch.  Your duties studying under the ship's ${master} have completely ended. And where you previously commanded a small group of guns, you now command a broadside.\n    *finish\n  *else\n    *finish\n\n*label Failed\nIt is with a bitter heart that you return to H.M.S. Courageous as a midship${man}.  \n\n*if (Patronage > 50) \n  If you had been a little better prepared, you would have passed.\n  *goto FailedB\n*else\n  If you had a little more patronage, you would have passed.\n  *goto FailedB\n*label FailedB\n*if (rank=1)\n  Even worse than resuming the duties and status of a midship${man} is the loss of the seniority that you accrued as an acting-lieutenant.  Now, when you finally become a lieutenant, you will be much more junior than you would have been otherwise.\n  *set rank 0\n  *set seniority2 0\n  *goto B\n*label B\n\n*rand Random 2 5\n${Random} years pass before you finally pass a subsequent examination.\n\n*set age +Random\n\n*page_break\n*if (Duties = false)\n  The responsibilities are much greater, and your duties have changed significantly.  Where previously you were often on deck as an assistant for the officer of the watch, you now take your turns as an officer of the watch.  Your duties studying under the ship's ${master} have completely ended. And where you previously commanded a small group of guns, you now command a broadside.\n  *goto C\n*else\n  You finally return to the greater responsibilities, and privileges, of a lieutenant.\n  *goto C\n\n*label C\n\n*set rank 2\n*set seniority 0\n*finish", "gunnerystartup": "*set no_name true\n*set master \"master\"\n*temp FirstChoice\n*comment FirstChoice records the result of the player's first choice so that it can be used to affect stats after the initial stats are assigned.\n\n\"Fire the starboard broadside!\" shouts the Captain.\n\nCannons roar as H.M.S. Courageous attacks the enemy frigate.  As one of the junior officers--really, more of an officer in training--you command three guns on Courageous's main gun deck.  The guns of the battery next to yours fire, leaping back against the heavy ropes that prevent them from smashing across the ship. Clouds of white smoke billow about you as you give your gun crew the commands to ready your battery's cannons:  \"Swab!  Powder!  Wadding!  Shot!  Run out the guns!\"\n\nThe Captain yells out, \"Fire as the guns bear!\"  You give your gun crews orders to load and fire as quickly as they can, without waiting for the rest of the broadside. \n\nThey swab out the bore, push in a charge of powder, push wadding down on the powder, load the shot, push the gun out through the gunport, and fire the cannon, with you commanding each step of the process.  \"Swab, powder, wadding, shot, fire!  Swab, powder, wadding, shot--\"\n\nThe world turns upside down as the enemy's broadside rips through the hull some ten feet away.\n\n*page_break\n\nAs the enemy cannonball tears through the side of the ship, giant splinters of wood fly through the air. One of the splinters, perhaps a yard long, rips through the stomach of Davies, a sailor under your command.  A fragment of a cannon ball smashes Fisher's arm, mangling it horribly.  Your sailors seem stunned by the carnage, standing in shock while Davies and Fisher scream in agony.\n\nWhat do you do?\n\n*choice\n  #Attend to the wounded personally--the safety of my sailors is my top concern.\n    While the battle rages around you, you rush over to Davies and Fisher.  Their wounds are both bad--even with your prompt assistance, they may not live.  Still, you can help, and you do, bandaging their wounds and personally taking them to the surgeon in the cockpit.\n\n    As you return to your station, you see a frown on the face of the lieutenant in command of your broadside.  Not all officers would be willing to prioritize the wounds of sailors in the midst of a battle.  But what else could you do?\n    *set FirstChoice \"TreatWounds\"\n    *goto Character_generation\n  #Give some quick orders for them to be taken to the surgeon in the cockpit, then turn back to my duty in commanding the guns.\n    \"Jones!\" you shout, and a ${master}'s mate under your command looks at you expectantly.  \"Take a team of sailors and get Davies and Fisher to the surgeon.\"\n   \n    Your gun crew leaps into action and carries the wounded away.  Their screams continue to echo, but you do your best to put them out of your mind and focus on the battle.\n    *set FirstChoice \"GiveOrders\"\n    *goto Character_generation\n  #With a gut wound like that, Davies is done for, but Fisher can still be saved.  I order some sailors to take Fisher to the cockpit but leave Davies on the deck to die.  I need the extra sailors to use the guns effectively.\n    \"Jones!\" you shout, and a ${master}'s mate under your command looks at you expectantly.  \"Take a team of sailors and get Fisher to the surgeon.\"\n    \n    \"And Davies?\" asks Jones.\n    \n    \"No, Davies is as good as dead.  Take Fisher, now!\"\n   \n    Jones swallows hard, clearly troubled, but obeys your command.  Your gun crew leaps into action and carries Fisher away.  Davies continues to scream for most of the rest of the battle before finally slumping into unconsciousness, but you do your best to put them out of your mind and focus on the battle.\n    *set FirstChoice \"HardChoice\"\n    *goto Character_generation\n  #My duty to the ship outweighs my duty to two sailors.  I ignore the wounded and concentrate on firing my guns as quickly and accurately as I can.\n    That's cold.  Sometimes being an officer means making hard choices, but even so. . . are you completely heartless?\n\n    Jones, a ${master}'s mate under your command, looks particularly disgusted as you ignore the bleeding sailors and continue giving orders to keep the fight going.  But who is Jones to judge, not knowing the burdens of command like you do?\n    *set FirstChoice \"ColdBastard\"\n    *goto Character_generation\n\n*label Character_generation\n*page_break\n\nWe should take a moment here to establish a few important facts about you.\n\nIn this game, you take the role of a young officer in the Royal Navy of \"Albion\" (an imaginary nation rather like England) fighting battles at sea with \"Gaul\" in the time of the Napoleonic wars.\n\n*comment Set some defaults\n*set sailing 50\n*set gunnery 50\n*set leadership 50\n*set fighting 50\n*set patronage 50\n*set tact 50\n*set likeability 50\n*set honor 50\n*set courage 50\n*set bloodthirst 50\n*set intelligence 50\n*set agility 50\n*set rank 0\n*set age 19\n*set seniority 5\n*set seniority2 0\n*set knighted false\n*set wealth 25\n*set married false\n*set RelationshipJones 50\n*set RelationshipVilleneuve 50\n*set wounds 0\n*set disgraced false\n*set cashiered false\n\nBut you're not just any young officer.  Nobody knows it yet, but you're going to be one of the most famous officers in all of Albion.  The \"Naval Chronicle\" will publish stories about you; sailors will tell tall tales of your adventures; one day, if you're lucky, people will write histories about you.\n\nWhy?  What makes you so notable?\n\n*choice\n  #My skill in sailing ships.\n    *set sailing 80\n    You serve in the days of tall ships, dependent on the wind.  Even a small advantage in sailing can make all the difference.\n    *goto Second_question\n  #My combat ability, both commanding the guns of a ship and with pistol and sword.\n    *set gunnery 80\n    *set fighting 80\n    As an officer, you are first and foremost a warrior, defending Albion with your skill in battle.\n    *goto Second_question\n  #My leadership--people instinctively follow me.\n    *set leadership 80\n    An officer's most important duty is maintaining discipline and keeping the crew inspired, even in the face of death and destruction.  Your leadership will serve you well.\n    *goto Second_question\n  #My high birth gives me strong patronage that will ensure that I quickly rise to high command.\n    *set patronage 80\n    *set tact 80\n    *set wealth 60\n    As the younger child of a minor peer, you have strong connections both throughout the Royal Navy and even in Parliament itself.  You can always expect the best assignments and the most opportunity.\n    *goto Second_question\n\n*label Second_question\n\nWhat's your second most notable quality as a young officer?\n*choice\n  *if (sailing \u003c 70)\n    #My skill in sailing ships.\n      *set sailing 70\n      You serve in the days of tall ships, dependent on the wind.  Even a small advantage in sailing can make all the difference.\n      *goto Weakness\n  *if (gunnery \u003c 70)\n    #My combat ability, both commanding the guns of a ship and with pistol and sword.\n      *set gunnery 70\n      *set fighting 70\n      As an officer, you are first and foremost a warrior, defending Albion with your skill in battle.\n      *goto Weakness\n  *if (leadership \u003c 70)\n    #My leadership--people instinctively follow me.\n      *set leadership 70\n      Maintaining discipline and keeping the crew inspired, even in the face of death and destruction, is an essential part of an officer's duties.  Your leadership will serve you well.\n      *goto Weakness\n  *if (patronage \u003c 70)\n    #My str
