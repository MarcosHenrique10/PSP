ong patronage within the Royal Navy.\n      *set patronage 70\n      *set tact 70\n      *set wealth 50\n      As the child of an admiral, you have strong connections throughout the Royal Navy.  You can always expect the best assignments and the most opportunity.\n      *goto Weakness\n\n*label Weakness\n\nThat tells us what you're good at, but you can't be perfect.  What's your greatest weakness as an officer?\n*choice\n  *if (sailing \u003c 70)\n    #My skill in sailing ships.\n      *set sailing 30\n      You don't sail as well as you could, but after all, isn't that what the sailing ${master} and ${master}'s mates are for?\n      *goto Smarts\n  *if (gunnery \u003c 70)\n    #My combat ability, both commanding the guns of a ship and with pistol and sword.\n      *set gunnery 30\n      *set fighting 30\n      While the Royal Navy exists to defeat its enemies in battle, actual combat with the enemy makes up a vanishingly small part of your duties.  Surely your deficiencies won't create too many problems. \n      *goto Smarts\n  *if (leadership \u003c 70)\n    #My leadership--I have trouble getting people to obey me.\n      *set leadership 30\n      *if (Patronage \u003c 70)\n        Your skill at sailing, gunnery, and fighting should more than make up for your prickly manner and difficulty in commanding the crew's respect.\n        *goto Smarts\n      *else\n        Your other skills and patronage should more than make up for your prickly manner and difficulty in commanding the crew's respect.\n        *goto Smarts\n  *if (patronage \u003c 70)\n    #I am without a friend or relation anywhere in the upper ranks of the Royal Navy.  I have a singular lack of patronage.\n      *set patronage 30\n      *set tact 30\n      *set wealth 10\n      You will always have to be twice as able as your fellow officers to receive the same opportunities and respect they habitually get.\n      *goto Smarts\n\n*label Smarts\n\n*line_break\nDo you lead by knowing the correct action or by reading the people around you?  Do you sail based on knowledge of technique and expertise, or through an able reliance on your sailors?  In short, would you say that you are characterized more by your intelligence or by your ability to make people like you?\n\n*choice\n  #Definitely my intelligence.\n    *set Intelligence 80\n    *set Likeability 20\n    *set Leadership %-15\n    *set Tact %-10\n    *set Sailing %+10\n    *set Gunnery %+10\n    *goto Sex\n  #Mostly my intelligence, but I'm also likeable.\n    *set Intelligence 65\n    *set Likeability 35\n    *set Leadership %-7\n    *set Tact %-5\n    *set Sailing %+5\n    *set Gunnery %+5\n    *goto Sex\n\n  #A little of each.\n    *set Intelligence 50\n    *set Likeability 50\n    *goto Sex\n\n  #Mostly my skills with people, but also my intelligence.\n    *set Intelligence 35\n    *set Likeability 65\n    *set Leadership %+7\n    *set Tact %+5\n    *set Sailing %-5\n    *set Gunnery %-5\n    *goto Sex\n\n  #Overwhelmingly my skills with people.\n    *set Intelligence 20\n    *set Likeability 80\n    *set Leadership %+15\n    *set Tact %+10\n    *set Sailing %-10\n    *set Gunnery %-10\n    *goto Sex\n\n\n*label Sex\nRemember, you'll do better as an officer if you avoid situations that strain your weaknesses, and pursue strategies that play to your strengths.\n\n*page_break\nThis game is set in a fictional world, similar to our own but with some differences.\n\nFor example, perhaps the ships are crewed by women.  You are a young and gallant officer, but are you a young gentleman or a young lady?\n\n*choice\n  #I'm a young gentleman, of course, and rather confused by the question.\n    *set sex \"male\"\n    *set Mr \"Mr.\"\n    *set man \"man\"\n    *set men \"men\"\n    *set woman \"woman\"\n    *set women \"women\"\n    *set gentleman \"gentleman\"\n    *set gentlemen \"gentlemen\"\n    *set lady \"lady\"\n    *set ladies \"ladies\"\n    *set he \"he\"\n    *set his \"his\"\n    *set him \"him\"\n    *set he_opp \"she\"\n    *set his_opp \"her\"\n    *set him_opp \"her\"\n    *set Miss \"Miss\"\n    *set Mrs \"Mrs.\"\n    *set boy \"boy\"\n    *set girl \"girl\"\n    *set sir \"sir\"\n    *set maam \"ma'am\"\n    *set lad \"lad\"\n    *set king \"king\"\n    *set kings \"kings\"\n    *set dame \"Sir\"\n    *set mister \"Mister\"\n    *set son_opp \"daughter\"\n    *set mr_opp \"Mrs.\"\n    *set master \"master\"\n\n    Of course, of course.  The officers and crew of a Royal Navy ship are all men.  Let's move on.\n    *goto Age\n  #I'm a young lady.  The idea of gentlemen going to sea and being exposed to the horrors of combat--it's a frankly revolting idea.\n    *set sex \"female\"\n    *set Mr \"Madam\"\n    *set man \"woman\"\n    *set men \"women\"\n    *set woman \"man\"\n    *set women \"men\"\n    *set gentleman \"gentlewoman\"\n    *set gentlemen \"gentlewomen\"\n    *set lady \"gentleman\"\n    *set ladies \"gentlemen\"\n    *set he \"she\"\n    *set his \"her\"\n    *set him \"her\"\n    *set he_opp \"he\"\n    *set his_opp \"his\"\n    *set him_opp \"him\"\n    *set Miss \"Master\"\n    *set Mrs \"Mister\"\n    *set boy \"girl\"\n    *set girl \"boy\"\n    *set sir \"ma'am\"\n    *set maam \"sir\"\n    *set lad \"lass\"\n    *set king \"queen\"\n    *set kings \"queens\"\n    *set dame \"Dame\"\n    *set mister \"Madam\"\n    *set son_opp \"son\"\n    *set mr_opp \"Mr.\"\n    *set master \"mistress\"\n\n    I quite agree.  The place for a man is domestic, rearing the children and making a pleasant home for his wife.  We put men up on a pedestal so that they do not need to face the hardships that women are more constitutionally suited to bear.\n\n    The officers and crew of a Royal Navy ship are all women.  Let's move on.\n    *goto Age\n\n*label Age\n\nYou are about nineteen years old now.  When did you first go to sea as a Midship${man}?\n*choice\n  #When I was 3\n    *set seniority 16\n    I understand that you were added to a ship's compliment officially when you were 3--so you would start accruing seniority--but when did you actually go to sea?\n    *choice\n      #No, really, at age 3\n        Oh, so you spent years as a ship's ${boy} and powder monkey before you really could serve as a midship${man}.  Your manners are less polished as a result, but you have much more seniority than many of your fellows, and you have more experience at sailing tasks.\n        *set sailing %+30\n        *set leadership %-10\n        *set tact %-30\n        *set intelligence %-30\n        *goto Naming\n      #Age 10\n        *goto Age10\n      #Age 13\n        *goto Age13\n      #Age 16\n        *goto Age16\n  #When I was 10\n    *set seniority 9\n    *label Age10\n    Ten is an early age to enter service as a \"volunteer,\" but well within the norms.  Your knowledge of trigonometry and your social polish are not what they could be, but your practical skills as a sailor and gunner have benefited.\n    *set sailing %+20\n    *set gunnery %+15\n    *set tact %-15\n    *set intelligence %-15\n    *goto Naming\n  #When I was 13\n    *set seniority 6\n    *label Age13\n    Thirteen is about the average age for a new midship${man}.\n    *goto Naming\n  #When I was 16\n    *set seniority 3\n    *label Age16\n    Sixteen is late to begin an apprenticeship as a midship${man}.  Your professional skills have suffered as a result.  On the other hand, you've received a better formal education and training in the social norms expected of a young ${gentleman} than most midship${men}.\n    *set sailing %-20\n    *set gunnery %-15\n    *set tact %+15\n    *set intelligence %+15\n    *goto Naming\n\n*label Naming\n\nWe'll need to know your surname.\n*choice\n  *if (patronage>75)\n    #Leighton-Pierce\n      *set surname \"Leighton-Pierce\"\n      *goto Given\n  *if (patronage>60)\n    #Villiers\n      *set surname \"Villiers\"\n      *goto Given\n  #Smythe\n    *set surname \"Smythe\"\n    *goto Given\n  #Brown\n    *set surname \"Brown\"\n    *goto Given\n  *if (patronage\u003c40)\n    #Baker\n      *set surname \"Baker\"\n      *goto Given\n  #I don't like any of those names.\n    Very well then.  What is your surname?\n    *input_text surname\n    *goto Given\n\n*label Given\n*set mr_surname ((Mr & \" \") & ((\"Midship\" & man) & \" \")) & Surname\nA very respectable name, in light of your class, of course.  What about your given name?\n*if (sex=\"male\")\n  *choice\n    #Henry\n      *set given_name \"Henry\"\n      *goto CleanUp\n    #Richard\n      *set given_name \"Richard\"\n      *goto CleanUp\n    #William\n      *set given_name \"William\"\n      *goto CleanUp\n    #Edward\n      *set given_name \"Edward\"\n      *goto CleanUp\n    #Horatio\n      *set given_name \"Horatio\"\n      *goto CleanUp\n    #Something else.\n       What is your given name?\n       *input_text given_name\n       *goto CleanUp\n*else\n  *choice\n    #Anne\n      *set given_name \"Anne\"\n      *goto CleanUp\n    #Elizabeth\n      *set given_name \"Elizabeth\"\n      *goto CleanUp\n    #Honor\n      *set given_name \"Honor\"\n      *goto CleanUp\n    #Mary\n      *set given_name \"Mary\"\n      *goto CleanUp\n    #Horatia\n      *set given_name \"Horatia\"\n      *goto CleanUp\n    #Something else.\n       What is your given name?\n       *input_text given_name\n       *goto CleanUp\n\n*label CleanUp\n*set no_name false\n*comment Let's adjust the variables based on the first choice.\n*if (FirstChoice=\"TreatWounds\")\n  *set bloodthirst %-50\n  *set RelationshipJones %+50\n  *set honor %-25\n  *set leadership %-25\n  *set likeability %+25\n  *goto ReturnBattle\n*elseif (FirstChoice=\"GiveOrders\")\n  *set bloodthirst %-15\n  *set RelationshipJones %+15\n  *set honor %+10\n  *set leadership %+15\n  *goto ReturnBattle\n*elseif (FirstChoice=\"HardChoice\")\n  *set bloodthirst %+15\n  *set RelationshipJones %-15\n  *set honor %-10\n  *set intelligence %+25\n  *set likeability %-15\n  *set leadership %-15\n  *goto ReturnBattle\n*else\n  *set bloodthirst %+50\n  *set RelationshipJones %-50\n  *set honor %-25\n  *set intelligence %+10\n  *set likeability %-25\n  *set leadership %-25\n  *goto ReturnBattle\n\n*label ReturnBattle\nExcellent.  As the game begins, your officer may be described as follows:\n\n*temp name\n*set name ((Mr & (\" Midship\" & (man & \" \" ))) & given_name) & (\" \" & surname)\n\n*stat_chart\n  text Name\n  text Age\n  \n  percent Sailing\n  percent Gunnery\n  percent Leadership\n  \n  percent Fighting\n  percent Patronage\n  percent Tact\n  \n  percent Likeability\n  percent Honor\n  percent Courage\n  percent Bloodthirst\n  percent Intelligence\n  \n  percent Wealth\n\n  \n*page_break\n\n*temp forgot\n*set forgot false\nWith that out of the way, let's get back to the battle.  You've dealt with the injured, in a fashion.  Now, you need to keep firing your guns.  But in the midst of all the excitement. . . what's the next step?\n*label quiz\n*choice\n  #Swab the bore.\n    \"Swab the bore!\" you shout.  The ${men} under your command lift the sponge plunger and smash it down into the gun's muzzle to extinguish any stray sparks that might cause the powder to ignite prematurely.\n    Your gun crew quickly rams in the powder, places the wadding on the powder, loads the shot, and runs out the gun.  You give the word, and the senior rating touches the fuse to the touchhole.  You flinch unconsciously against the expected explosion, but nothing happens.  You wait a moment and realize what happened--the powder was already in the bore when you swabbed it out.  Because the powder got wet, the gun could not fire.\n    \n    *label Screw\n    It's embarrassing, but it could have been much, much worse.  You give orders for your ${men} to insert the screw and to clear the load from the gun manually, and after a delay of a few minutes, you are able to return the gun to service.  The lieutenant commanding the broadside noticed, however, and your patronage suffers slightly.\n    *set patronage %-10\n    *goto Victory\n  #Ram in the powder.\n    \"Powder!\" you yell.  The ${men} under your command ram in a measure of powder and follow it quickly with wadding and shot.  They then run out the gun.\n    *label Explosion\n    \n    The gun carriage bounces on the hull of the ship.  The gun is ready to fire.\n    *if (gunnery > 60)\n      At the last second, however, you realize that something is wrong.  When your ${men} rammed in the shot, it didn't go as deep into the bore as it should have--a fact you noticed because of your high Gunnery.  You must have loaded the gun with an extra cannonball.  If you fired it like this, it might explode!\n    \n      *goto Screw\n    *else\n      You signal the rating to touch the fuse to the powder, and an enormous roar erupts.  You are thrown to the deck by a blast of smoke, and shrapnel rips through your left arm.  You'll live, and even keep the arm, but the pain is intense and your arm is permanently injured.  It takes you some time to realize what has happened, but you finally realize that you loaded a second shot in the cannon.  The pressure was so great that the gun exploded instead of firing--injuring you, killing several of your ${men}, and disabling the gun.\n    \n      You are never formally criticized for your error, but you think the lieutenant commanding the broadside figured out what happened, or at least suspected.  That will hurt your career.  You'll also have to live with your feelings of guilt and the recurrent nightmares.\n      *set gunnery %-10\n      *set patronage %-15\n      *set wounds +1\n      *goto Victory\n  #Place the wadding on the powder.\n    \"Wadding!\" you yell.  The ${men} under your command ram in the wadding, follow it quickly with shot, and run out the gun.\n    *goto Explosion\n  #Load the shot.\n    \"Shot!\" you yell.  The ${men} under your command ram in the shot and run out the gun.\n    *goto Explosion\n  #Run out the gun and fire.\n    \"Run out the gun!\" you yell.  As the gun carriage bounces on the hull of the ship, you shout, \"Fire!\"  One of the ratings touches the fuse to the powder, and the gun leaps back with a roar.  You were correct and kept your gun firing as quickly as possible.  Your able performance has helped your ship win the battle.\n    *set intelligence %+10\n    *set gunnery %+10\n    *set patronage %+10\n    *goto Victory\n  *if forgot = false\n    #I have no idea . . .\n      *set forgot true\n      Think hard!  Can you remember where you left off?  \"Swab, Powder, Wadding, Shot, Fire!\"\n      *goto quiz\n  *if forgot\n    #It's no use.  Screw out the load and start over.\n      *goto screw\n\n*label Victory\n*page_break\nThe battle rages on, but finally the Gaulish ship hauls down its colors and surrenders.\n\nIn the aftermath of the battle, a young midship${man} runs up to you.  \"Captain's compliments, ${sir}, and ${he} asks you to report to the quarterdeck.\"\n\n*set mr_surname (Mr & \" \") & Surname\n\nWhen you get to the quarterdeck, the Captain looks over at you.  \"${Mr_Surname}!  I'm rating you as an acting-lieutenant.  Take a section of twenty ${men} across to the prize and assume command.  Make any necessary repairs and set sail for any Albionish port.\"\n\n\"Aye aye, ${sir}! Thank you, ${sir}!\"  You quickly gather your ${men} and head across on your first command.\n\n*set rank 1\n*set seniority2 0\n*set agility ((Sailing+Fighting)/2)\n*comment I've added a default setting to agility.  It's pretty klugy, and i doubt it's the right solution, but it should make things a little less silly.\n\n*finish", "marriage": "\n\n*temp host\n*temp women\n*temp woman\n*temp girl\n*temp Anne\n*temp Susannah\n*temp Beatrice\n*temp Miss\n*if (sex=\"male\")\n  *set spouse_word \"wife\"\n  *set host \"hostess\"\n  *set women \"women\"\n  *set woman \"woman\"\n  *set girl \"girl\"\n  *set Anne \"Anne\"\n  *set Susannah \"Susannah\"\n  *set Beatrice \"Beatrice\"\n  *set Miss \"Miss\"\n  *goto A\n*else\n  *set spouse_word \"husband\"\n  *set host \"host\"\n  *set woman \"man\"\n  *set women \"men\"\n  *set girl \"boy\"\n  *set Anne \"Arthur\"\n  *set Susannah \"Stanford\"\n  *set Beatrice \"Brendan\"\n  *set Miss \"Master\"\n  *goto A\n\n\n*label A\n*set Married False\n\n*if optout\n    *goto COMMAND\n*else\n    \"Well,\" Bryce says, several days later. \"We didn't get very far with finding you a ${spouse_word}. The Williamsons are having a 'do' tonight--a supper-party. Come along with ${Mr_opp} Bryce and me, and we'll see if we can't find you a likely-looking ${girl} there.\"\n    *goto PARTY\n   \n   \n*label COMMAND\n\nThe peace with Gaul does not last. Before long, hostilities have resumed and the Admiralty is building back up its Royal Navy, to combat the Gaulish threat to the freedom of the seas.\n\nThe letter arrives by special messenger, very early on a cold morning. You slit the seal. Your orders are written in fine black script on heavy, cream-colored paper.\n\n*if (rank = 3)\n  It reads, \"You are requested and required to assume command of H.M. Sloop Defender. . .\"\n   \n  Your own command at last!\n  *set Age +2\n  *set Seniority +2\n   \n  *finish\n*else\n  It reads,  \"You are requested and required to assume command of H.M.S. Defender. . .\"\n   \n  Your own command at last!\n  *set Age +2\n  *set Seniority +2\n   \n  *finish\n\n\n\n*label PARTY\n\nYou put on your uniform, shine your shoes, and accompany Bryce and ${Mr_opp} Bryce to the supper party. The two modest rooms are crowded with people. \"Take a look around,\" Bryce says. \"If you see anyone you'd like to be introduced to, just let me know.\"\n\nYou spend a little time getting your bearings. Some people are sitting at card tables, playing at whist. Some are standing in the pleasant breeze that wafts through the windows, talking together. In the far room, you see a small group dancing. This isn't a proper ball, of course, but it appears that the bolder among the young people have persuaded the pianist to play a tune to which they can dance.\n\nAs you wander through the rooms, you can't help but notice that many of the young ${women} look admiringly at your uniform. Maybe it won't be so hard to impress one of them.\n\n*page_break\n\nThree in particular catch your eye: a tall, proud-looking, golden-haired ${woman} standing with the group in front of the window; a lively-looking redhead among the dancers who is laughing at a joke someone has just told; and a sweet-faced, brown-haired ${girl} sitting quietly off to the sidelines. You ask Bryce whether ${he} knows anything about any of them.\n\n*page_break\n\n*if marriage = \"love\"\n\n    Bryce chuckles. \"You've got a good eye, ${surname}.\n   \n    \"The ${woman} by the window is the most eligible youngster for miles. ${Miss} ${Anne} Hawthorne, eldest child of old Admiral Hawthorne. Handsomest ${girl} I've ever seen--barring ${Mr_opp} Bryce, of course. Elegant, and accomplished, and unusually clever, too. Can talk politics as well as any ${man} in the room, if you can believe it.\n\n    \"The redhead is ${Miss} ${Susannah} Musgrove. Fun-loving, always ready with a laugh or a pert comment. You'd never have the chance to be dismal, if ${he_opp} were yours. Bit of a flirt, but hard to blame ${him_opp} when ${he_opp}'s so good-looking, isn't it? Good family too. Not wealthy, not any longer at least, but an old and respected name.\n  \n    \"And the little one sitting over there is ${Miss} ${Beatrice} West. A sweet youngster, very kind in ${his_opp} manner. So I've heard, at least: ${he_opp}'s also terribly shy, and I don't think I've ever heard ${him_opp} utter two sentences together. ${Miss} West is the youngest child of a solicitor. Very respectable family, the Wests, though nothing like the Hawthornes or Musgroves, of course.\"\n   \n    *goto CHOICE\n\n\n*else\n\n    Bryce chuckles. \"You've got a good eye, ${surname}.\n   \n    \"The ${woman} by the window is the most eligible youngster for miles. ${Miss} ${Anne} Hawthorne, eldest child of old Admiral Hawthorne. You couldn't do better than have Admiral Hawthorne as your patron. The ${girl} isn't a bad catch either. Handsome, isn't ${he_opp}? And clever, I've heard.\n   \n    \"The redhead is ${Miss} ${Susannah} Musgrove, and the Musgroves are one of the oldest families around these parts. The estate isn't far away. They're not rich--not any more, anyway--but a good old country family. And the ${girl} is quite charming. Likes these little 'do's--always in the middle of everything.\n  \n    \"The little one sitting over there isn't quite so good a catch. Youngest child of a solicitor. Respectable family, of course, and you could do worse than have a solicitor as an in-law, but it's not the same thing as an Admiral, is it? The ${girl}'s name is ${Beatrice}. ${Miss} ${Beatrice} West.\n   \n    *goto CHOICE\n   \n\n*label CHOICE\n   \n   \n\"So?\" Bryce looks at you expectantly.\n   \nTo whom do you ask to be introduced?\n\n*temp AH_FAIL\n*temp SM_FAIL\n*temp BW_FAIL\n*set AH_FAIL false\n*set SM_FAIL false\n*set BW_FAIL false\n*temp intended\n*choice\n\n    #${Miss} ${Anne} Hawthorne\n   \n        *set intended \"Hawthorne\"\n   \n        *goto INTRODUCTIONS\n   \n    #${Miss} ${Susannah} Musgrove   \n       \n        *set intended \"Musgrove\"\n   \n        *goto INTRODUCTIONS\n   \n    #${Miss} ${Beatrice} West   \n          \n        *set intended \"West\"\n   \n        *goto INTRODUCTIONS\n\n\n\n*label INTRODUCTIONS\n\nBryce performs the introductions. \"This is my young friend ${given_name} ${surname}. A most up-and-coming young officer, let me tell you! $!{He} most particularly desired to make your acquaintance.\"\n\n${Miss} ${intended} looks at you. \"How very nice to meet you,\" ${he_opp} says.\n\n\"The pleasure is all mine,\" you say. Bryce winks at you and drifts away to talk with someone else.\n\nWhat do you do next?\n\n\n*choice\n\n    #Ask ${Miss} ${intended} to dance.\n\n        *if intended = \"Hawthorne\"\n\n            *goto AH_DANCE\n\n        *elseif intended = \"Musgrove\"\n\n            *goto SM_DANCE\n\n        *else\n\n            *goto BW_DANCE\n\n    #Ask ${Miss} ${intended} to be my partner at whist.\n\n        *if intended = \"Hawthorne\"\n       \n            *goto AH_CARDS\n\n        *elseif intended = \"Musgrove\"\n\n            *goto SM_CARDS\n\n        *else\n\n            *goto BW_CARDS\n\n    #Regale ${Miss} ${intended} with tales of my life at sea.\n\n        *if intended = \"Hawthorne\"\n\n            *goto AH_STORY\n\n        *elseif intended = \"Musgrove\"\n\n            *goto SM_STORY\n\n        *else\n\n            *goto BW_STORY\n\n\n\n*label AH_DANCE\n\n${Miss} Hawthorne's eyes grow cool. \"No, thank you,\" ${he_opp} says precisely. \"I do not find it dignified to dance in the current company.\" $!{he_opp} looks disdainfully at the far room. \"Properly, at a ball, it is all very well, but those youngsters racketing about in there are behaving most childishly.\"\n\n*page_break\n\nOof. I'm wincing on your behalf.\n\nWhat do you want to do next? Try again, or leave this stuck-up snob to ${his_opp} own devices and go in search of Bryce?\n\n*choice\n    #${Miss} Hawthorne is a handsome ${woman} and an Admiral's child. And I am an officer of the Royal Navy, and an officer of the Royal Navy does not quit after one failed attempt. I try to interest ${him_opp} in some other activity.\n   \n        *set tact %+10\n        That's the spirit. Do you ask ${him_opp} to be your partner at whist, or do you offer to fetch ${him_opp} a drink and tell ${him_opp} stories of your life at sea?\n        *choice\n            #I ask ${him_opp} to play cards.\n                *goto AH_CARDS\n            #I get ${him_opp} a drink and tell ${him_opp} stories.\n                *goto AH_STORY\n    #The hell with this. I bow stiffly, apologize for the inadvertant insult, and go in search of Bryce.\n           \n        *set tact %-10\n        *set AH_FAIL true\n        That's the spirit. You're an officer in the Royal Navy. You don't have to take that kind of rudeness from a ${woman}.\n        What now?\n        *choice\n            *if SM_FAIL = false\n                #I ask Bryce for an introduction to ${Miss} Musgrove.\n                    *set intended \"Musgrove\"\n                    *goto INTRODUCTIONS\n            *if BW_FAIL = false\n                #I ask Bryce for an introduction to ${Miss} West.\n                    *set intended \"West\"\n                    *goto INTRODUCTIONS\n            #I go and join a group of ${gentlemen} who are looking for a fourth for whist.               \n                They turn out to be nice enough. It's a reasonably enjoyable evening.\n                *set tact %+10\n                *goto PARTY_FAILURE\n            #I sulk and drink too much. That'll show ${him_opp}.\n                And everyone at the party notices you doing it. Great plan. Do you think any of the ${women} you hadn't yet approached find you terribly attractive now?\n                *set likeability %-10\n                *set tact %-10\n                *goto PARTY_FAILURE\n   \n   \n\n*label AH_CARDS\n\n\"I always enjoy a game of cards,\" ${Miss} Hawthorne says. \"I would like that very much.\" And you sit down to play at whist with another couple.\n\n*page_break\n\n*if intelligence > 70\n\n  *goto AH_CARDS_SUCCESS\n\n*else\n\n  *goto AH_CARDS_FAILURE\n\n\n\n*label AH_CARDS_SUCCESS\n\n${Miss} Hawthorne seems suitably impressed by your whist playing. $!{He_opp} plays at least as well as you do--playing good hands well and fighting out bad hands boldly. The two of you come off much the best. $!{He_opp} is somewhat sharp and proud in ${his_opp} manner, but by the end of the rubber, you find this witty and enjoyable rather than irritating.\n\nYou spend the rest of the evening together, sometimes playing cards and sometimes just talking. You are surprised when you look up and find it is time to go home.\n\n*page_break\n\n*goto PARTY_SUCCESS\n\n\n*label AH_CARDS_FAILURE\n\nAlas! You play very badly. ${Miss} Hawthorne is not impressed at all. Not even a little.\n\nYou try to recover by engaging ${him_opp} in conversation after the game is over, but ${he_opp} gives only brief replies and looks at you as little as possible.\n\n*set AH_FAIL true\n\n*page_break\n\nI'm sorry. That's unfortunate. What do you do now?\n\n*choice\n    *if SM_FAIL = false\n        #I ask Bryce for an introduction to ${Miss} Musgrove.\n            *set intended \"Musgrove\"\n            *goto INTRODUCTIONS\n    *if BW_FAIL = false\n        #I ask Bryce for an introduction to ${Miss} West.\n            *set intended \"West\"\n            *goto INTRODUCTIONS\n    #I go and join a group of ${gentlemen} who are looking for a fourth for whist.\n        They turn out to be nice enough. It's a reasonably enjoyable evening.\n        *set tact %+10\n        *goto PARTY_FAILURE\n    #I sulk and drink too much. That'll show ${him_opp}.\n        And everyone at the party notices you doing it. Great plan. Do you think any of the ${women} you hadn't yet approached find you terribly attractive now?\n        *set likeability %-10\n        *set tact %-10\n        *goto PARTY_FAILURE\n\n\n*label AH_STORY\n\n\"May I fetch you a drink, ${Miss} Hawthorne?\" you ask. $!{He_opp} agrees, with somewhat distant politeness. You get ${him_opp} some punch, and ${he_opp} takes the cup from you with the same detached courtesy.\n\n\"It must be most exciting to live your life at sea, ${Mr_surname},\" ${he_opp} says, but not in a tone of genuine excitement. \"Have you had many thrilling adventures?\"\n\nThus prompted, you tell ${Miss} Hawthorne every story you can think of from your time at sea.\n\n*if intelligence > 60\n    *goto AH_STORY_SUCCESS\n   \n*else\n    *goto AH_STORY_FAILURE\n\n   \n*label AH_STORY_SUCCESS\n\n${Miss} Hawthorne does not seem particularly interested at first, but as your tales go on, ${he_opp} becomes more and more enthralled. $!{He_ eeting.\n        *set courage %-20\n        *goto COMMAND\n\n\n*label PARTY_FAILURE\n\n\"How'd it go?\" Bryce asks you as you head home together.\n\n\"Not very well,\" you admit.\n\n\"Ah well,\" Bryce says philosophically. \"There will be other parties.\"\n\nUnfortunately, there aren't any during this particular leave. ${Mr_opp} Bryce falls ill, and so the Bryces do not attend any other functions. Without them to act as your sponsors, you do not receive any invitations.\n\n*page_break\n\n*goto COMMAND\n\n\n\n*label HAWTHORNE_HOUSE\n\nAfter breakfast the next day, you pay a call to the Hawthorne house--an imposing brick structure with imposing and uniform shrubbery on either side of the front door. You give your card to a pretty maid in a starched white apron, and ask if ${Miss} Hawthorne is at home.\n\nInstead of being taken to the drawing-room and ${Miss} Hawthorne, you are shown to the Admiral's study.\n\n$!{he} is surprisingly large in build, with heavy jowls and bristling white hair that makes you think of a walrus. $!{he} rises from ${his} desk when you enter--suddenly, as though exploding from the chair. \n\nWhat do you do?\n\n*fake_choice\n\n    #I snap to attention.\n    \n    #I offer my hand politely. \"Admiral Hawthorne? My name is ${surname}.\"\n    \n    #I regard ${him} calmly and wait for ${him} to be the first to speak. I must show ${him} that ${he} does not scare me.\n\nA perfectly reasonable choice.\n\n*if patronage > 30\n\n    *goto HAWTHORNE_HOUSE_SUCCESS\n\n*else\n\n    *goto HAWTHORNE_HOUSE_FAILURE\n\n\n*label HAWTHORNE_HOUSE_SUCCESS\n\nThe Admiral looks you up and down. \"Pleasure to make your acquaintance, ${mr_surname},\" ${he} says at last. \"I've heard a lot about you.\"\n\n\"Honored to meet you, too, ${sir},\" you say.\n\n\"I understand,\" the Admiral goes on deliberately, \"that you and my eldest spent quite a lot of time together at the party last night.\"\n\n\"Yes, ${sir},\" you say.\n\nThe Admiral pauses, as if considering the matter. You feel sweat prickle at your hairline, and hope it doesn't run down your face. It is becoming difficult to breathe. \"I wouldn't let just anyone court ${him_opp}, you know.\"\n\n*fake_choice\n\n    #\"Of course not, ${sir}.\"\n    \n        The Admiral twitches an unexpected smile. \"But I suppose you're not 'just anyone,'\" ${he} says.\n    \n    #\"With all due respect, ${sir}, I'm not 'just anyone.'\"\n    \n        The Admiral twitches an unexpected smile. \"You have guts, at least, that's plain. And no, I'd have to agree you're not 'just anyone',\" ${he} says.\n\n\"I've heard good things about you. You seem to be a bright youngster. . . with a fine career ahead of you. . . so I suppose it would be all right.\"\n\nYou suddenly find that you are able to breathe again. \"Thank you, ${sir},\" you say.\n\nThe Admiral turns back to the litter of papers on ${his} desk. \"You'll find ${Anne} waiting for you in the drawing-room.\"\n\n*page_break\n\n*goto COURTSHIP\n\n\n*label HAWTHORNE_HOUSE_FAILURE\n\nThe Admiral looks you up and down as though you are a particularly unkempt sailor.\n\n\"I understand,\" ${he} says deliberately, \"that you and ${Anne} got to know each other rather well last night.\"\n\n\"Yes, ${sir},\" you say. It comes out closer to a squeak than you would have preferred. You're finding it difficult to breathe.\n\nThe Admiral snorts. \"Arrogant presumption, youngster, that's what it is. Who are you to be courting my eldest? A nobody like you? I have no interest in my child entering into a marriage alliance with the likes of you. You'll oblige me by not troubling my household again.\" $!{he} touches a bell, and the door behind you opens. \"Jane,\" the Admiral says to the maid, \"show this young jackanapes out.\"\n\n*page_break\n\nHow do you feel about this?\n\n*fake_choice\n\n    #When I tell Bryce, I make light of it, but I can't help thinking that I've lost something special. ${Miss} Hawthorne and I would have suited each other very well.\n    #Furious. How dare the Admiral imply I'm not good enough for ${his} family? So what if don't have impressive patronage in the Navy? How dare ${he}?\n   \nIndeed.\n   \nPerhaps, one day, when you've made your fortune and proven yourself. . .?\n   \n*fake_choice\n\n    #Perhaps.\n   \n    #Never!\n   \nWell, in any case. . .    \n\n*goto COMMAND\n\n\n*label MUSGROVE_HOUSE\n\nAfter breakfast the next day, you pay a call to the Musgrove house. It is a fine old building, decorated in a mixture of fine old elegance and the most fashionable modern style. You give your card to formidable-looking manservant, and ask if ${Miss} Musgrove is at home.\n\nInstead of being taken to see ${him_opp}, you are shown in to see Mrs. Musgrove, the widowed matriarch of the family.\n\nMrs. Musgrove is handsome considering her age, but she is dressed in a color and a style more appropriate for a youngster than for a woman with grown children. For a moment, you dismiss her as silly. . . but then you notice that her eyes are cool and appraising.\n\nWhat do you do?\n\n*fake_choice\n\n    #I offer my hand. \"Mrs. Musgrove? My name is ${surname}. A pleasure to meet you, ma'am.\"\n    \n    #I regard her calmly and wait for her to speak first. I must show her she does not intimidate me.\n    \nA perfectly reasonable choice.\n\n*if wealth > 30\n\n    *goto MUSGROVE_HOUSE_SUCCESS\n\n*else\n\n    *goto MUSGROVE_HOUSE_FAILURE\n\n\n\n*label MUSGROVE_HOUSE_SUCCESS\n\n\"I understand you and ${Susannah} got to know each other rather well last night,\" Mrs. Musgrove begins.\n\n\"Yes, ma'am.\"\n\n\"The Musgrove name is an ancient and an honorable one, you know.\"\n\n\"Yes, ma'am.\"\n\n\"We cannot, of course, allow just anyone to ally themselves with it.\"\n\n*fake_choice\n\n    #\"Of course not, ma'am.\"\n    \n        You feel a prickle of sweat start at your hairline. Before it can run down your face, Mrs. Musgrove suddenly smiles. \"But I suppose you're not 'just anyone', are you?\" she says.\n    \n    #\"With all due respect, ma'am, I'm not 'just anyone.'\"\n\n        \"No, I suppose you're not,\" Mrs. Musgrove agrees with a sudden smile. \n\n\"I suppose a bright youngster such as yourself. . . so brave as you are, and lucky in the matter of prize-money. . . I think it would be all right.\" She looks you over one last time, nods, then gathers her skirts to leave. \"${Susannah} will be along shortly,\" she says.\n\n\n*goto COURTSHIP\n\n\n*label MUSGROVE_HOUSE_FAILURE\n\n\"I understand you and ${Susannah} got to know each other rather well last night,\" Mrs. Musgrove begins.\n\nHow do you respond?\n\n*fake_choice\n\n    #I nod politely.\n    \n        Mrs. Musgrove looks you up and down, and her eyes grow colder.\n    \n    #\"Yes, ma'am.\"\n    \n        You only mean to be polite, but it seems Mrs. Musgrove thinks you have interrupted her. Her eyes grow colder.\n    \n    #What did she mean by 'get to know each other rather well'? Perhaps I should set her mind at ease. \"I do assure you, ma'am, nothing improper occurred.\"\n    \n        \"I should hope not,\" she snaps. You wince. You seem to have made things worse. \n\n\n\"${Mr_surname},\" she says, \"the Musgrove name is an old and honorable one. We cannot let just anyone ally themselves with it, you know. And you, I fear. . .\" She eyes you with distaste. \"I heard ${Mr} Bryce speak of you. It seems you have no estate of your own, ${Mr}. ${surname}, isn't that so? No income suitable for living in the manner befitting a ${gentleman}. You don't even seem to have done so very well in the matter of prizes. Frankly, ${Mr_surname}, I do not think you could afford to support my ${son_opp} in the circumstances ${he_opp} deserves. I must request you cease your attentions. I wish you good morning.\"\n\n*page_break\n\nHow do you feel about this?\n\n*fake_choice\n\n    #When I tell Bryce, I make light of it, but I can't help thinking that I've lost something special. ${Miss} Musgrove and I would have suited each other very well.\n    #Furious. How dare that woman imply I'm not good enough for her family?\n   \nIndeed.\n   \nPerhaps, one day, when you've made your fortune and proven yourself. . .?\n   \n*fake_choice\n\n    #Perhaps.\n   \n    #Never!\n   \nWell, in any case. . .    \n\n*goto COMMAND\n\n\n*label WEST_HOUSE\n\nAfter breakfast the next day, you pay a call to the Wests' small and respectable house. Somehwat to your surprise, ${Mr} West opens the door ${him}self.\n\n\"Good morning,\" you say politely. \"My name is ${given_name} ${surname}. I was wondering if ${Miss} West might be at home.\"\n\n${Mr} West seems surprised at the question. It would seem ${Miss} West does not receive many callers. \"Not presently,\" ${he} says after a pause, \"but I expect ${him_opp} back at any moment. Will you come in and wait?\"\n\nYou wait in a small sitting room. The furniture shows its age a little, but the room is sternly tidy and without a speck of dust anywhere. Before long, ${Miss} West enters, flushed with pleasure to find that you have come calling.\n\nYou have a delightful walk with ${Miss} West. You have many more over the next month or so. \n\n*page_break\n\n${Mr} West doesn't seem as impressed with you, however. $!{He} eyes you cautiously, and once you overhear ${him} muttering something about sailors. What can you do to win ${him} over?\n\n*choice\n\n    #Perhaps ${he} thinks I am not an advantageous match for ${Miss} West. I shall talk extensively about my background, mentioning my social class and patronage and prize money as often as possible. \n    \n        *if (patronage > 30) and (wealth > 30)\n        \n            The more such stories you tell ${Mr} West, the more ${he} appears to relax. \n            *goto WEST_HOUSE_SUCCESS\n        \n        *else \n    \n            Unfortunately, your social class, patronage, and prize money are nothing to brag about.\n            *goto WEST_HOUSE_FAILURE\n       \n    #Perhaps ${he} thinks sailors (or Naval officers, in my case) are all brawn and no brains. I shall impress ${him} with my intelligence by challenging ${him} to a chess game and winning.\n    \n        *if intelligence > 30\n        \n            The more times you beat ${Mr} West at chess, the more ${he} grows to approve of you.\n            *goto WEST_HOUSE_SUCCESS\n        \n        *else\n        \n            Unfortunately, you find it flatly impossible to beat ${Mr} West at chess. You often leave the West house wishing you were a better player.\n            *goto WEST_HOUSE_FAILURE\n    \n    #Perhaps I can impress ${him} with my leadership skills by telling stories of times when I led groups of ${men} on difficult missions.\n    \n        *if leadership > 30\n        \n            The more such stories you tell ${Mr} West, the more ${he} appears to relax. \n            *goto WEST_HOUSE_SUCCESS\n            \n        *else\n        \n            Unfortunately, your leadership is nothing to brag about. Your stories of failing to effectively lead do not impress ${Mr} West at all.\n            *goto WEST_HOUSE_FAILURE\n\n\n*label WEST_HOUSE_SUCCESS\n\n\"You're a youngster of uncommonly good sense,\" ${he} says at last, and you understand then that you have ${his} formal approval to continue the courtship of ${his} youngest child.\n\n*goto COURTSHIP\n\n\n\n*label WEST_HOUSE_FAILURE\n\nAs the days pass, ${Mr} West looks more and more disapproving. Finally the day comes when ${he} takes you aside.\n\n\"I am certain you mean well, youngster, but you're not what I want for my ${son_opp}. I am afraid I must request you do not call upon ${him_opp} again.\"\n\nYou take your leave with as much dignity as you can manage.\n\n*page_break\n\nHow do you feel about this?\n\n*fake_choice\n\n    #When I tell Bryce, I make light of it, but I can't help thinking that I've lost something special. ${Miss} West and I would have suited each other very well.\n    #Furious. How dare ${Mr} West imply I'm not good enough for ${his} family?\n   \nIndeed.\n   \nPerhaps, one day, when you've made your fortune and proven yourself. . .?\n   \n*fake_choice\n\n    #Perhaps.\n   \n    #Never!\n   \nWell, in any case. . .    \n\n*goto COMMAND\n\n\n*label COURTSHIP\n\nYou have a very pleasant courtship through the rest of the summer. ${Miss} ${intended} continues to be as charming as the night you two met, and ${he_opp} seems to continue to enjoy your company.\n\nThe peace with Gaul does not last. Before long, hostilities have resumed and the Admiralty is building back up its Royal Navy, to combat the Gaulish threat to the freedom of the seas.\n\nThe letter arrives by special messenger, very early on a cold morning. You slit the seal. Your orders are written in fine black script on heavy, cream-colored paper.\n\n*if (rank = 3)\n  It reads, \"You are requested and required to assume command of H.M. Sloop Defender. . .\"\n   \n  Your own command at last!\n   \n  *goto PROPOSAL\n*else\n  It reads,  \"You are requested and required to assume command of H.M.S. Defender. . .\"\n   \n  Your own command at last!\n  *goto PROPOSAL\n\n*label PROPOSAL\n   \nDo you propose marriage?\n\n*choice\n\n    #Of course!\n\n        *set Married True\n\n        *if intended = \"Hawthorne\"\n\n            *set spouse_name \"Hawthorne\"\n            *goto AH_ENDING\n\n        *elseif intended= \"Musgrove\"\n\n            *set spouse_name \"Musgrove\"\n            *goto SM_ENDING\n\n        *else\n\n            *set spouse_name \"West\"\n            *goto BW_ENDING\n\n    #What if ${he_opp} isn't right for me?  I do nothing.\n        *set courage %-20\n        Your sweetheart clearly expects a formal declaration. . . but at that last moment, you can't do it. You don't entirely know why. Perhaps something you have learned in the last few months gives you pause, or perhaps you balk at the idea of formally binding yourself to another.\n       \n        You take a breath and let it out. \"I will. . . I will write to you whenever I can,\" you say. $!{his_opp} face registers surprise, then disappointment. \"Perhaps,\" you say lamely, \"perhaps when I come back. . .\"\n       \n        \"Perhaps I'll be waiting and perhaps I won't be,\" ${he_opp} says, eyes flashing angrily, and storms away.\n       \n        You hesitate a moment, but you decide not to follow. You hold your letter of commission tightly and think about your first command.\n\n        *set Age +2\n        *set Seniority +2\n       \n        *finish\n\n\n\n*label AH_ENDING\n\n$!{he_opp} says yes, and the two of you are married shortly before you take command of Defender.\n\n*set patronage %+20\n\nBeing related to Admiral Hawthorne proves to be of great advantage to you as you work to further your career. Moreover, your home is always well-maintained and pleasant.\n\n*if marriage = \"infl\"\n\n    You feel that you have made a good bargain all around. Satisfied, you turn your attention to your first command.\n\n    *set Age +2\n    *set Seniority +2\n    *set Wealth %+5\n    *finish\n\n*else\n\n    It is a cold home, though--formal and distant. You sometimes feel as though you are missing something, but then you shrug--for many marriages are like this, after all. And to your relief, you can always escape to sea. You turn your attention to your first command.\n\n    *set Age +2\n    *set Seniority +2\n    *set Wealth %+5\n    *finish\n\n\n\n*label SM_ENDING\n\n$!{he_opp} says yes, and the two of you are married shortly before you take command of Defender.\n\n*set patronage %+10\n\n*set wealth %-10\n\nA marriage alliance with the Musgrove family is of some advantage to you as you work to further your career. Moreover, your ${spouse_word} is a pleasant creature, amusing to be around. $!{he_opp} has expensive tastes, though, and although you appreciate the loveliness with which your home is decorated, you do sometimes wish ${he_opp} were a trifle less extravagant. \n\n*if marriage = \"infl\"\n\n    On balance, though, you feel as though you have made a good bargain. You turn your attention eagerly to your first command.\n    *set Age +2\n    *set Seniority +2\n \n    *finish\n\n*else\n\n    You also wish ${he_opp} were occasionally given to serious conversation. You never feel as though you know ${him_opp} all that well. It troubles you sometimes, but then you shrug--many marriages are like this, after all. And to your relief, you can always escape to sea. You turn your attention to your first command.\n\n    *set Age +2\n    *set Seniority +2\n    *finish\n\n\n\n*label BW_ENDING\n\n$!{he_opp} says yes, and the two of you are married shortly before you take command of Defender.\n\nYour ${spouse_word} is a good manager, and runs the household very well on your income and ${his_opp} small dowry. It is a warm, pleasant home, inhabited by a most devoted and attentive spouse.\n\n*if marriage = \"love\"\n\n    Your visits home are blissfully happy. And at last you have a ship of your own. Life couldn't be more perfect.\n\n    *set Age +2\n    *set Seniority +2\n\n    *finish\n\n*else\n\n    It's nice and all, but you can't help feeling some regret: an advantageous marriage would have been better for your career. Your ${spouse_word} knows of this regret, and it hurts and shames ${him_opp}. You manage together by very carefully never talking about it. It's a relief to escape to sea. You turn your attention eagerly to your first command.\n\n    *set Age +2\n    *set Seniority +2\n\n    *finish", "prizeship": "*comment DGF TODO Give the Gaulish ship a French name?\n\n*temp Lords\n*if (sex = \"male\")\n  *set Lords \"Lords\"\n  *goto A\n*else\n  *set Lords \"Peers\"\n  *goto A\n  \n*label A\n\nAs you prepare to leave Courageous, you run into ${Mr} Bryce, the second lieutenant. \n\n\"Well, well, well!  'Acting-Lieutenant' $!{Surname}!\" ${he} says, grinning widely and slapping you on the back.  \"I know you'll do smashingly with your first command; I have the utmost confidence in you!\"\n\n\"Thank you, ${sir},\" you reply, touching your hat in salute.\n\nJust at that moment, first lieutenant Pigot rounds the corner.  \"${Mr} $!{Surname},\" ${he} remarks, somewhat stiffly. \"Fine piece of luck you've had.\"\n\nPigot, with over twenty-five years experience, is by far the most senior lieutenant on board--perhaps in the whole fleet--but it's not to ${his} credit. $!{He}'s too incompetent to earn a promotion to commander; ${he}'s watched countless younger, more competent lieutenants pass ${him} by, while ${he} racks up years of \"valuable experience.\"  All ${he} has to show for it is the power to boss the other lieutenants around imperiously, and ${he} rarely misses an opportunity.\n\n\"Luck has not a bit to do with it, I say!\" Bryce counters cheerfully.  \"Well, go on then! Don't want to keep the prize waiting!\"\n\n\"Aye aye, ${sir}!\"\n\n*page_break\n\nYou make your way across to the prize ship with your detachment of 20 ${men}.  You are the only officer, but you have Jones, a ${master}'s mate, with you as your second-in-command.  The Gaulish ship is a 36-gun frigate--a square-rigged three-masted ship with an ordinary crew complement of some 250 ${men}.  Your detachment of 20 will be sufficient to sail the prize, of course.  Warships carry much larger crews than similarly sized merchant ships because of the need to staff the broadsides, as well as to have ${men} available for detached duties such as prize crews.  And, of course, the larger crew size allows for a substantial number of casualties before the ship is incapacitated.\n\nThe long and the short of it is that you can fairly easily sail the frigate, but your prisoners outnumber you roughly 10 to 1, even taking into account the substantial losses they took before striking their colors.  As you arrive, you quickly send some of your ${men} to bring the prisoners below and to lock them in the hold, where they will spend the rest of the voyage.\n*page_break\n*set RelationshipVilleneuve 50\n*temp speak_gaulish\n*set speak_gaulish false\n\nA Gaulish officer, no more than a few years older than yourself, approaches you and offers ${his} sword in surrender.  $!{He} addresses you in Gaulish.\n\n*if (patronage > 60)\n  Given your social class, your tutors taught you Gaulish as a matter of course.  You understand ${him} perfectly, and can reply with an almost native accent if you choose.\n\n  *goto Understood\n*elseif (intelligence > 60)\n  You always learned quickly, and you picked up at least a smattering of Gaulish.  You may not understand everything ${he} says, and your accent is assuredly abominable, but you are fully capable of making yourself understood.\n  *goto Understood\n*else\n  $!{His} words sound like so much gibberish to you.  You were never very good with languages and never really had the opportunity to learn Gaulish, even if you had wanted to.\n  *goto Albionish\n\n*label Understood\n\"I believe you are the officer of the prize party, ${sir}?\" ${he} says.\n\nDo you deign to respond to ${him} in Gaulish?\n*choice\n  #Yes, anything else would be churlish and unworthy of a ${gentleman}.\n    *set tact %+10\n    *set likeability %+5\n    *set RelationshipVilleneuve %+5\n    *goto Gaulish\n  #Yes.  $!{He} may not understand my language and it will be useful to open communication with ${him}.\n    *set intelligence %+5\n    *goto Gaulish\n  #No.  I may have the opportunity to overhear useful information if the prisoners do not know I speak their language.\n     Clever.  Not particularly honorable, but clever.\n     *set honor %-10\n     *set intelligence %+10\n     *goto Albionish\n  #No.  We defeated them, and we will make them behave on our terms.\n     *set bloodthirst %+10\n     *set honor %-5\n     *set RelationshipVilleneuve %-10\n     *set tact %-10\n     *set likeability %-5\n     *goto Albionish\n\n\n*label Albionish\n\"I cannot speak your language, ${sir},\" you say to the enemy officer.\n\n\"Ah.  I see,\" ${he} responds slowly in Albionish.  \"I speak your language a little, ${sir}.  Pardon my…misunderstandings?\"\n\nYou nod.  \"Please, ${sir}, continue.\"\n\n\"I am Lieutenant Villeneuve of the Gaulish Republican Navy.  In battle, higher lieutenants were all killed, and the Captain wounded.  I am now highest active officer of this ship.\"\n\n\"I am Acting-Lieutenant $!{Given_name} $!{Surname} of H.M.S. Courageous.  I have been placed in command of this prize.\"\n\nA slight flash of resentment crosses ${his} face as you use the word \"prize,\" but ${he} quickly suppresses it. \"Yes.  I offer you my…I do not know the right word in your language.  My parole?  My word that I will not seek to escape?\"\n\nYou nod.  \"We use the word 'parole' as well.  Your 'word of honor' as a ${gentleman}, you mean.\"\n\n\"Ah, yes.  You have it exactly, ${sir}.\"\n\n*set RelationshipVilleneuve %-10\n*goto ParoleChoice\n\n*label Gaulish\n*set speak_gaulish true\n\"I am.  Acting-Lieutenant $!{Given_name} $!{Surname} of H.M.S. Courageous.\"\n\n\"I am Lieutenant Villeneuve of the Gaulish Republican Navy.  During the battle, the more senior lieutenants were all killed, and the Captain suffered a wound that incapacitated ${him} shortly after we struck our colors.  I am now the senior active officer of this ship.\"\n\n\"I understand, ${sir},\" you reply.  \"You understand that we now command this prize?\"\n\n$!{He} nods.  \"Alas, I do.  I offer you my parole, ${sir}.\"  With that, Villeneuve has promised not to seek to escape, and not to interfere in your efforts to steer the ship.\n\n*set RelationshipVilleneuve %+10\n*goto ParoleChoice\n\n*label ParoleChoice\n\n*temp Parole\nDo you accept Lieutenant Villeneuve's parole?\n*choice\n  #Of course!  $!{He} is a ${gentleman} and would never think of breaking ${his} word.\n    *set Parole true\n    *set RelationshipVilleneuve %+15\n    *set honor %+10\n    \"Of course.  I accept your parole.\"  You hand ${his} sword back to ${him}, producing a grateful smile.  \"I trust you will join me in the Captain's cabin for dinner?\"\n\n    \"With pleasure, ${sir}.  Thank you.\"\n    *goto JonesReactParole\n\n  #I suppose.  $!{He}'s probably less dangerous after giving ${his} parole than in the hold trying to escape.  I'm not returning ${his} sword, though.\n    *set Parole true\n    *set RelationshipVilleneuve %+5\n    *set intelligence %+5\n    After a moment's hesitation, you reply, \"I accept your parole.  Please attend carefully to any instructions the crew gives you, and you will of course need to return to the hold at any time that I request.\"\n    \n    \"I understand, ${sir}.  Thank you.\"  $!{His} expression looks a little sour as ${he} glances at ${his} sword, still in your hands.\n\n    *goto JonesReactParole\n  #Normally, I would, but given how few ${men} I have, I cannot afford to.\n    *set Parole false\n    *set RelationshipVilleneuve %-10\n    *set intelligence %+5\n    *set honor %-5\n    \"I wish I could accept your parole, ${sir},\" you reply.  \"But under the circumstances, it is quite impossible.  I have too few ${men} to secure too many prisoners to take the chance.  Were you false to your word, the consequences would be too severe.\"\n\n    \"I understand,\" ${he} replies, although ${his} tone makes it clear that ${he} does not.  \"To think that I would break my word of honor, though. . .\"  $!{He} drifts off into an awkward silence as ${he} thinks better of continuing.\n\n    \"Jones!\" you call to your ${master}'s mate.  \"Take Lieutenant Villeneuve below and lock ${him} in the hold with the rest of the Gaulish.\"\n\n    \"Aye aye, ${sir}!\" responds Jones, with perhaps a little more enthusiasm than necessary.\n\n    *goto JonesReactNoParole\n  #$!{He} is a captive and one of the enemy.  Into the hold with ${him}!\n    *set Parole false\n    *set RelationshipVilleneuve %-20\n    *set honor %-15\n\n    You laugh as ${he} finishes ${his} request.  \"You are a prisoner like any other, your rank notwithstanding.\"\n\n    $!{He} looks frankly shocked.  \"But. . . but we are both ${gentlemen}. . .  Our militaries have always accepted the parole of opposing officers!\"\n\n    \"Jones!\" you call to your ${master}'s mate.  \"Take this Gaul below and lock ${him} in the hold with the rest of the enemy.\"\n\n    \"Aye aye, ${sir}!\" responds Jones, with more than a little vicious enthusiasm.\n\n    *goto JonesReactNoParole\n\n*label JonesReactParole\n\n*page_break\nJones approaches you a short while later.  \"So that's it then, ${sir}?  The bloody Gaul spends hours trying to kill us, does kill a lot of good ${men}, and then after the battle it's all nicey-nicey?  $!{His} lot murdered Davies, but we're supposed to not care after the battle is over?\"\n\nHow do you respond?\n*choice\n  #I explain myself to Jones.\n    *set leadership %-10\n    *set likeability %+10\n    *set RelationshipJones %-5\n    \"I understand that it hurts, Jones.  We all lost friends today.  But there are rules about how wars are fought.  We may not like the rules, but we still have to follow them,\" you explain.  \"War is a terrible thing, but without those rules it would be even worse.  Do you understand?\"\n\n    \"Yes, ${sir},\" says Jones, although it doesn't seem that ${he} does.  \"But why should we trust their officers but not their ${men}?\"\n\n    \"Because I know that Lieutenant Villeneuve has been taught for years that nothing is more important than ${his} honor.  $!{He} would rather die than break ${his} parole.\"\n\n    \"If you say so, ${sir}.\"\n\n    *goto MedicalSupplies\n\n  #Jones is just a ${master}'s mate, and I'm an officer.  I tell ${him} to drop it.\n\n    *set leadership %+10\n    *set likeability %-10\n    *set RelationshipJones %-20\n    \"That's enough, Jones,\" you say sharply.  \"I believe you have other duties to attend to?\"\n\n    \"Aye, ${sir},\" responds Jones sullenly.  $!{He} stomps off to return to work.\n\n    That was probably the best response, but the anger on Jones's face is troubling.  This may lead to problems later--you'll have to keep an eye on ${him}.\n\n    *goto MedicalSupplies\n\n  #How dare one of my ratings question my decisions!  I have ${him} flogged for ${his} insubordination.\n\n    *set leadership %-10\n    *set likeability %-20\n    *set RelationshipJones %-50\n\n    \"Hunter!\"  you shout.\n\n    A moment later, Hunter, the bosun's mate assigned to your prize crew, runs up to you.  \"$!{Sir}?\"\n\n    \"Gather the ${men} to witness punishment.  Jones is to have 20 lashes for insubordination.\"\n\n    \"Aye aye, ${sir}.\"\n\n    Hunter quickly gathers your small prize crew together.  Two of the other ${men} pull Jones across one of the gratings of the ship and strip off ${his} shirt.  Hunter pulls out ${his} cat o' nine tales--a whip with many stiff cords of leather.  $!{He} swings hard at Jones's back.  Jones cries out in agony, and by the end of the flogging, ${his} back is bloody from the numerous wounds the cat has cut in ${his} back.\n\n   Jones gingerly puts ${his} shirt back on, wincing in pain.  You feel confident that you have firmly asserted your control over your crew.  Still, the look of hatred that Jones gives you after the flogging is unmistakable.  You'll have to keep a close eye on ${him} in the future.\n   *goto MedicalSupplies\n\n*label JonesReactNoParole\nJones smiles as ${he} returns to the deck.  \"The Gaulish officer is in the hold, ${sir}.  It's nice to know that after all the suffering they put us through--and the deaths of good ${men} like Davies--that they'll get a taste of suffering on the way back to Albion.  It can't be too nice being cooped up in that hold without any daylight.  I reckon it will take us a week or two to make it back to Albion.\"\n\n*set RelationshipJones %+20\n*goto MedicalSupplies\n\n*label MedicalSupplies\n*page_break\nA few days later,\n*if Parole\n  Lieutenant Villeneuve comes to you with a question.\n  *goto v_question\n*else\n  one of you crew passes the word that Lieutenant Villeneuve has a question for you.\n*label v_question\n\n*if speak_gaulish\n  \"$!{Sir},\" ${he} inquires, \"may we have access to some additional medical supplies?  A member of our crew has suffered a compound fracture; without further attention, ${he} may die.\"\n  *goto supply_choice\n*else\n  \"$!{Sir},\" ${he} inquires, \"may we have some medicine supplies?  One of our crew has broken a bone badly.  $!{He} may die.\"\n*label supply_choice\n\n*choice\n  #Provide medical supplies.\n    *set RelationshipVilleneuve %+ 15\n    \"Thank you, ${sir}.  Thank you.\"\n    *goto v_summary\n  #Deny medical supplies.\n    *set RelationshipVilleneuve %- 15\n    Villeneuve is obviously disappointed, but accepts your decision as the senior active officer of the ship.\n\n*label v_summary\n*if RelationshipVilleneuve > 60\n  You seem to be getting along with Villeneuve handsomely!\n  *goto GaulishSloop\n*elseif RelationshipVilleneuve \u003c 40\n  Villeneuve fairly openly despises you at this point.\n\n*label GaulishSloop\n*comment The PC spots a Gaulish sloop.  Engaging is difficult, because while the frigate substantially outguns the sloop, it has a small prize crew and can't effectively use its guns.  PC can engage and win, engage and lose, or avoid.  If engage and win, there's a moral choice--shoot the young middie running to dump the signal book over the side or not?  Shooting can earn further patronage, but is kinda horrible.  Jones is upset about the idea of fighting and risking their lives yet more.\n\n*page_break\n\nThe next several days pass smoothly.  You get used to the routine of the passing watches, even with the new experience of commanding the prize ship.  The process of trimming the sails, taking your bearings, and setting the course is nerve-wracking--never before have your decisions been the final word, leading a ship either on a safe and direct course to your destination or towards disaster.  But the weather is blessedly easy, with a steady breeze but clear skies, and you go through the process, relying on your training and your experience.\n\nOn the fifth day, Jones comes to you with a disturbing piece of news. \"I've found something below deck that I need to bring to your attention, ${sir}.\"\n\n\"What is it, Jones?\"\n\n\"We're taking in water in the hold.  We'd missed the hole at first because it's beneath the waterline.\"\n\nSure enough, ${he}'s right.  You order your crew to start pumping out the water; with Jones's help, you manage to patch the hole in time to prevent any further damage to the ship.\n\nWhy do you think Jones pointed out the damage to you?\n\n*fake_choice\n #$!{He} did it out of duty.\n #$!{He} did it to get on my good side.\n #$!{He} did it to save ${his} own neck.\n\nPerhaps you're right.\n*page_break\n\nOn the sixth day, one of your ${men} calls down to the deck.  \"Sail to lee!\"\n\n\"What sort of ship is it?\" you call back, as you search with your spyglass. \n\nAfter a minute, the sailor calls back, \"$!{He_opp} looks to be a Gaulish sloop-of-war, ${sir}.\"\n\nA sloop-of-war. . . That presents you with a difficult choice.  A sloop carries no more than 20 guns, and often fewer.  What's more, a sloop's guns will be of lighter weight than those of a frigate.  If you had a full crew, you could easily capture ${him_opp}.  But with only a prize crew at your disposal, the sloop would have a much greater rate of fire and substantially larger number of ${men}.\n\nHow do you want to handle this?\n\n*choice\n  #Engage the enemy sloop directly.\n    \"Set a course to engage the enemy sloop and run up our colors,\" you order.\n\n    \"This is madness, ${sir}!\" exclaims Jones.  \"You'll kill us all!\"\n\n    How do you react?\n    *choice\n      #Order Jones to ${his} station and otherwise ignore ${his} outburst.\n        \"Get to the lead gun of the starboard broadside, Jones,\" you say, with what you hope is a steely demeanor and firm tone.  \"We have too few ${men} for any hesitancy now.\"\n\n        Jones shakes ${his} head in disbelief, but ${he} heads to ${his} assigned place.\n\n        *set RelationshipJones %-10\n        *set Leadership %+10\n        *set Intelligence %-10\n        *set Courage %+10\n        *goto FairFight\n      #Smack Jones down and continue with my battle plan.\n        Your fist catches Jones completely unaware.  $!{He} sprawls to the deck.\n\n        \"If you question my orders again in the face of the enemy, I'll have you hanged by the neck until dead,\" you growl.  \"Do I make myself clear?\"\n\n        \"Aye, ${sir},\" Jones manages to spit out, clutching ${his} jaw.\n\n        \"Good.  Now get to your station at the lead gun of the starboard broadside.\"\n\n        \"Aye aye, ${sir}.\"\n\n        There, that showed ${him}.  Now to give the Gaulish a similar taste of your mettle.  You try to ignore the panicked looks on the faces of the rest of your ${men}.\n        *set Leadership %-10\n        *set Likeability %-20\n        *set Intelligence %-10\n        *set RelationshipJones %-30\n        *set Courage %+10\n        *goto FairFight\n       \n      #Maybe Jones is right. . . but I cannot ignore insubordination in the face of the enemy!\n        *comment DGF TODO I was surprised to find myself hitting Jones in this case.  Is there something else we can do here?\n        Your fist catches Jones completely unaware.  $!{He} sprawls to the deck.\n\n        \"If you question my orders again in the face of the enemy, I'll have you hanged by the neck until dead,\" you growl.  \"Do I make myself clear?\"\n\n        \"Aye, ${sir},\" Jones manages to spit out, clutching ${his} jaw.\n\n        There, that showed ${him}.  Now, do you go through with the plan?\n        *choice\n          #In for a penny, in for a pound.  Run out the guns!\n            That's the spirit!  There's no room for timidity in a Royal Navy officer.  If that means there's sometimes no room for prudence, so be it.\n            *set Leadership %-5\n            *set Likeability %-20\n            *set Intelligence %-10\n            *set Courage %+20\n            *set RelationshipJones %-30\n            *goto FairFight\n          #I need to approach the sloop more carefully.\n            A direct battle is too likely to end badly.  Your first responsibility is to get the prize back to Albion safely.  Still, with a little bit of cunning. . .\n            *set Leadership %-15\n            *set Likeability %-25\n            *set Intelligence %+5\n            *set Courage %-10\n            *set RelationshipJones %-20\n            *goto TrickyPlan\n          #Jones is right--this is madness!  I avoid battle with the sloop altogether.\n            Even as ${he} nurses ${his} sore jaw, Jones looks relieved as you give orders to set a course away from the enemy sloop.\n            *set Leadership %-25\n            *set Likeability %-30\n            *set Intelligence %+5\n            *set Courage %-20\n            *set RelationshipJones %-15\n            *goto RunAway        \n\n      #The more I think about it, the less sure I am that this is a good plan. . .\n        You stand still for a moment, indecision written across your face.  Still, you need to decide what to do.\n        *choice\n          #I need to approach the sloop more carefully.\n            A direct battle is too likely to end badly.  Your first responsibility is to get the prize back to Albion safely.  Still, with a little bit of cunning. . .\n            *set Leadership %-10\n            *set Likeability %+10\n            *set Intelligence %+10\n            *set Courage %-10\n            *set RelationshipJones %+10\n            *goto TrickyPlan\n          #Jones is right--this is madness!  I avoid battle with the sloop altogether.\n            You countermand your orders and have Jones steer a course away from the sloop.  Relief is palpable throughout your small crew.\n            *set Leadership %-10\n            *set Likeability %+20\n            *set Intelligence %+10\n            *set Courage %-20\n            *set RelationshipJones %+20\n            *goto RunAway        \n\n  #Attempt to capture the enemy sloop through a clever ambush.\n    *comment adjust variables here.\n    *label TrickyPlan\n    A cunning plan often makes the difference between victory and defeat.  What's your plan?\n    *choice\n      #Wait until nightfall, sail up to them unobserved, and then threaten them with the prospect of a stern rake with my full broadside if they do not surrender.\n        A clever plan, but one that will take great skill in sailing.  You maintain your distance until nightfall, then douse all of the lights on the ship and try to sail silently across the waves to where the sloop is.\n        *page_break\n        *if (sailing > 70)\n          *set Sailing %+10\n          *set Courage %+10\n          *set Intelligence %+5\n          *set Bloodthirst %+5\n          Your ship slips silently across the block waves under a dark sky.  You maintain strict silence, gliding into position.  Finally, having expertly sailed the ship into a position directly behind the enemy sloop's stern, with no more than 50 feet separating your ship from their stern, you light the lanterns on your ship and fire a single warning shot.\n          The enemy sloop could not possibly withstand being raked by a frigate.  They strike their colors and surrender.\n          *goto Victory\n        *else\n          You approach the enemy sloop, but sailing silently at night is difficult--truth be told, beyond your abilities.  Your ship is near them, but not nearly close enough for your plan to work when they realize that you have been trying to approach them for a surprise attack.\n          The enemy begins clearing for action and running out the guns.  Will you run or fight?\n          *choice\n            #We can still take them, even without surprise!\n              *set Sailing %+5\n              *set Courage %+15\n              *set Intelligence %-5\n              *set Bloodthirst %+15\n              You command your ${men} to prepare for action.\n              *goto FairFight\n            #Escape is our only hope!\n              *set Sailing %+10\n              *set Courage %-5\n              *set Intelligence %+5\n              *if (sailing > 40)\n                It's a close thing, and during the day you might not have made it, but with the assistance of the cover of darkness you sail past the enemy sloop.\n                *goto Escape\n              *else\n                Try as you might, you cannot avoid them.  You sailed too close in your aborted attack to be able to avoid a battle now.\n                *goto FairFight\n      #Pretend to be a crippled ship in need of assistance.  When they approach to within pistol shot range, threaten them with a full broadside.\n        You fake an accident, positioning some sailcloth to make it look like one of your yardarms has fallen, but with only two lines to cut to make the whole wreckage fall away.  You then run up the old Gaulish flag that you captured along with the prize as the sloop approaches.\n        *if (Intelligence > 70)\n          *set Intelligence %+15\n          *set Honor %-15\n          *set Courage %+5\n          You sucker them in completely.  At the last second, you haul down the Gaulish flag and run up your true colors and begin running out your guns.  You can see the panic on the faces of the Gaulish crew--the sloop is not even ready for battle and you have them at close range.  Moments later, their colors flutter down in defeat.\n          *goto Victory\n        *else\n          *set Intelligence %+10\n          *set Honor %-15\n          *set Courage %+5\n          As the enemy sloop approaches, the Gaulish captain must realize that something is off.  Perhaps you were too obvious in loading your guns, or perhaps your fake wreckage was not as convincing as you thought, or perhaps ${he} could see that your uniform did not look right.  In any event, you were not clever enough.  The Gaulish sloop stops well within cannon shot but ahead of you, instead of positioned so that your broadside will bear, and runs up the private recognition signal that Gaulish ships use to confirm each other's identities.  Sadly, you have no idea what the response should be.  After an appropriate pause, the sloop opens fire, and you have no choice but to cut away the wreckage and engage.\n          *goto FairFight\n\n  #Avoid the enemy sloop--it's not worth risking the more valuable prize in a battle that would likely go badly.\n    *set Intelligence %+15\n    *set Likeability %+15\n    *set Courage %-15\n    *label RunAway\n    *if (sailing > 40)\n      *goto Escape\n    *else\n      You do your best to evade them, but the sloop's commander realizes that you are not sailing like a Royal Navy frigate would.  $!{He} claws ${his} way towards you, tacking and taking advantage of a sloop's generally better  maneuverability.  Your only real advantage is a higher speed running before the wind, but running before the wind takes you ever closer to the enemy.  You haven't the skill at sailing to avoid ${him}.  There is no choice for it--you will have to fight to defend your prize.\n      *goto FairFight\n\n*label FairFight\n\nAs your ship and the sloop close with each other, you time the order to open fire with the guns carefully.  Your small crew has had the time to load the entire starboard broadside once, one cannon at a time, but you know that they will not have that luxury again.  You have no choice but to endure some long range cannon fire from the sloop--since you will only have one opportunity, you need to make the most of it.\n\nFinally, you decide that the moment is right.  You bring the ship around in a tight turn, presenting the starboard broadside directly towards the enemy sloop.  You run from gun to gun, giving the order to fire each one as it bears on the enemy sloop.\n\n*page_break\n\n*if (gunnery > 70)\n  As the cloud of smoke from your broadside clears, you can see that you have crippled the Gaulish sloop's sails as well as sending a few cannonballs smashing across their decks.  With the sloop unable to maneuver, you are able to bring the port broadside around to face the enemy ship.  You give your small crew orders to prepare to deliver another broadside.  At that moment, the enemy's colors flutter down.\n\n  You have triumphed, against all odds, because of your expert gunnery skills!\n\n  *set Gunnery %+15\n  *goto Victory\n*elseif (gunnery > 50)\n  As the cloud of smoke from your broadside clears, you can see that the Gaulish sloop is damaged, but not badly.  The sloop answers your broadside with one of its own--its guns are light, but splinters still kill three of your ${men}.  The enemy captain seems to have understood the situation and maneuvers to board your prize ship.\n\n  Now for the moment of truth:  Do you rally your crew for a desperate melee, hoping to somehow prevail despite being badly outnumbered, do you strike your colors and surrender, or do you try to flee despite having brought your ship deep within the enemy's range?\n  *choice\n    #We will never surrender while we still live!\n      *if (leadership > 70)\n        As the sloop approaches to board your prize, you rally your ${men}.  \"This is it. . . for the $!{King}, for freedom, for Albion!\"\n\n        Your ${men} call out \"For Albion!\" as they rush to the railings with  cutlasses and knives.  Your strong leadership skills rally them into a fighting frenzy.\n\n        *if (fighting > 70)\n          *set Fighting %+10\n          *set Leadership %+10\n          *set Courage %+20\n          *set Likeability %-15\n          *set Bloodthirst %+15\n          *set Intelligence %-20\n          *set wounds +1\n          The fighting is intense as dozens, perhaps more than a hundred, Gaulish sailors rush over onto your prize ship.  You fight like never before, firing your pistols, slashing with your sword, and leading your ${men} aggressively against the enemy.  One of the Gauls wounds you, but you press on as if the cut were a mere scratch.  Soon, the deck is slick with blood and piled high with Gaulish bodies, with a few Albionish bodies scattered among them.\n         \n          Against all odds, your vigorous fighting carries the day.  You shoot the sloop's commander and cut down its lieutenant.  You are still outnumbered, but your fierce assault has broken the will of the enemy and they begin to surrender.  A few surrenders quickly turn into a rout, and soon you are in command of two prizes.\n\n          *goto Victory\n        *else\n          *set Fighting %+5\n          *set Leadership %+10\n          *set Courage %+20\n          *set Likeability %-15\n          *set Bloodthirst %+15\n          *set Intelligence %-20\n          *set wounds +1\n          Despite your success in rallying your ${men}, the battle is hopeless.  You are severely outnumbered, and one by one your ${men} are wounded or killed.  After an intense fight, the Gaulish captain stabs you with ${his} sword and you collapse to the deck, unable to fight any longer and lucky to be alive.\n\n          After you fall, your surviving ${men} promptly throw down their weapons.  You survive, although it is a close thing, and some months before you recover fully.  The Gaulish have recaptured your prize, and your first command has ended in failure.\n          *goto Defeat\n      *else\n          *set Fighting %+10\n          *set Leadership %+5\n          *set Courage %+20\n          *set Likeability %-15\n          *set Bloodthirst %+15\n          *set Intelligence %-20\n        *set wounds +1\n        You do your best to rally your crew, but it's obvious even to you that they are unwilling to fight (and likely to die) against overwhelming odds.  As the Gaulish boarders cross over from their sloop to your prize ship, you fight them almost alone. You charge at the enemy swinging your sword, but you are quickly surrounded.  Despite your best efforts, they knock your sword aside and stab you, driving you to the deck.\n        After you fall, your surviving ${men} promptly throw down their weapons.  You survive, although it is a close thing, and some months before you recover fully.  The Gaulish have recaptured your prize, and your first command has ended in failure.\n        *goto Defeat\n\n    #We did our best, but now we have no choice but to surrender.\n      *set Gunnery %+10\n      *set Courage %+5\n      *set Intelligence %-10\n      *set Bloodthirst %+10\n      You give the command to strike the colors, and the flag of Albion flutters down.  The Gaulish sloop pulls along side and a prize crew comes aboard. Your ${men} are gathered up along you and placed into captivity, while the Gaulish prisoners resume control of the ship.  Your first command has ended in failure.\n      *goto Defeat\n    #Escape is our only hope!  Make all sail!\n      *if (sailing > 70)\n        *set Sailing %+10\n        *set Courage %-10\n        *set Intelligence %+15\n        Despite being under the Gaulish sloop's guns for a dismayingly long time as you slowly pull away from ${him_opp}, you are able to gradually make your way out of range.\n        *goto Escape\n      *else\n        *set Sailing %+10\n        *set Courage %-10\n        *set Intelligence %+15\n        Try as you might, you cannot evade the Gaulish sloop.  The sloop is much more maneuverable than the frigate, and has the full complement needed to take best advantage of ${his_opp} capabilities.  Your only advantage is a higher speed when running before the wind, but you do not have enough skill at sailing to use that to break away.  The sloop shoots away a yardarm on your mainmast, killing another one of your ${men} and crippling your ability to maneuver.  Facing the prospect of being raked repeatedly by the sloop's gun, with no prospect for effective answering fire, you have no choice but to strike your colors and surrender.  Your first command has ended in failure.\n        *goto Defeat\n*else\n  As the cloud of smoke from your broadside clears, you see that your broadside accomplished almost nothing.  If a single cannonball struck the Gaulish sloop, you can see no sign of it.  The sloop answers your broadside with one of its own--its guns are light, but splinters still kill six of your ${men}.  The enemy captain seems to have understood the situation and maneuvers to board your prize ship.\n  Now for the moment of truth:  Do you rally your crew for a desperate melee, hoping to somehow prevail despite being badly outnumbered, do you strike your colors and surrender, or do you try to flee despite having brought your ship deep within the enemy's range?\n  *choice\n    #We will never surrender while we still live!\n      You rally your ${men}, and they half-heartedly take up positions to repel boarders.  As the sloop pulls alongside your prize, a wave of Gaulish sailors rushes across.  You charge at them swinging your sword, but you are quickly surrounded.  Despite your best efforts, they knock your sword aside and stab you, driving you to the deck.\n      After you fall, your surviving ${men} promptly throw down their weapons.  You survive, although it is a close thing, and some months before you recover fully.  The Gaulish have recaptured your prize, and your first command has ended in failure.\n      *set wounds +1\n      *set Gunnery %+10\n      *set Courage %+20\n      *set Intelligence %-20\n      *set Fighting %+10\n      *set Bloodthirst %+20\n      *goto Defeat\n    #We did our best, but now we have no choice but to surrender.\n      *set Gunnery %+10\n      *set Courage %+5\n      *set Intelligence %-10\n      *set Bloodthirst %+10\n      You give the command to strike the colors, and the flag of Albion flutters down.  The Gaulish sloop pulls along side and a prize crew comes aboard. Your ${men} are gathered up along you and placed into captivity, while the Gaulish prisoners resume control of the ship.  Your first command has ended in fail
