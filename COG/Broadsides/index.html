ure.\n      *goto Defeat\n    #Escape is our only hope!  Make all sail!\n      *if (sailing > 70)\n        *set Sailing %+10\n        *set Courage %-10\n        *set Intelligence %+15\n        Despite being under the Gaulish sloop's guns for a dismayingly long time as you slowly pull away from ${him_opp}, you are able to gradually make your way out of range.\n        *goto Escape\n      *else\n        *set Sailing %+10\n        *set Courage %-10\n        *set Intelligence %+15\n        Try as you might, you cannot evade the Gaulish sloop.  The sloop is much more maneuverable than the frigate, and has the full complement needed to take best advantage of ${his_opp} capabilities.  Your only advantage is a higher speed when running before the wind, but you do not have enough skill at sailing to use that to break away.  The sloop shoots away a yardarm on your mainmast, killing another one of your ${men} and crippling your ability to maneuver.  Facing the prospect of being raked repeatedly by the sloop's gun, with no prospect for effective answering fire, you have no choice but to strike your colors and surrender.  Your first command has ended in failure.\n        *goto Defeat\n\n\n*label Victory\n*comment I had planned to put a moral choice here, but the scene is crazy-long as it is.  I might add it later, but. . .\nYou slowly make it back to Albion with both your original prize and the sloop as a prize.  Finally, you sail into Chesterport and heave a sigh of relief as you come under the great guns of the harbor defense.  You have succeeded.\n*page_break\nYou approach the Royal Navy captain who commands the port and quickly describe your adventure.\n\n$!{He} looks at you in shocked admiration.  \"You captured a sloop-of-war while sailing a prize back to Albion?  I've never heard of such a thing!  The ${Lords} of the Admiralty themselves will take notice of this.  And think of the prize money, ${lad}--with you as the only officer aboard, you'll get something approaching half the value of that sloop.  Unless I miss my mark, though, that will only be a drop in the bucket by the time your career has finished.\"\n\nYou find yourself thrust into prominence as a hero.  Admirals, members of parliament, and peers ask you to call on them.  The Patriotic Fund commissions a shiny engraved sword with a gold hilt for you as an honor.  While it will take some time for the prize court to determine precisely how much money you will receive, your agent assures you that it will be substantial and offers to advance you a thousand pounds--an absurd amount of money, really--against the prize court's future payment. \n\nAnd perhaps most importantly, the Gazette lists you as commissioned a lieutenant.  You set sail from Albion as a midship${man} and left H.M.S. Courageous as an acting-lieutenant with the permanent rank of midship${man}.  When H.M.S. Courageous sails back into port, however, you rejoin ${his_opp} company as a commissioned officer, with all the status and authority that commands.\n*set rank 2\n*set seniority (seniority2 +1)\n*set age +1\n*set wealth %+30\n*set patronage %+15\n*finish\n\n*label Defeat\n*page_break\nYou spend the next several years in a Gaulish prison.  You are not mistreated, precisely, but it's still a terrible experience.  Finally, after years of waiting, you and your ${men} are exchanged for some Gaulish prisoners.\n\nYou finally return to H.M.S. Courageous, only to discover that the Captain has removed your status as an acting-lieutenant for failing to deliver the prize safely home.  You resume service as a midship${man}.\n\n*set rank 0\n*set seniority +4\n*set age +4\n*set patronage %- 10\n*finish\n\n*label Escape\nIt takes some careful sailing, but you escape from the Gaulish sloop.  When you sail into Chesterport a few days later, you feel an enormous sense of relief to be under the protection of the harbor's mighty guns.\n\nThe captain that commands the port commends you for avoiding capture by the Gaulish sloop.  A few months later, H.M.S. Courageous returns to port and you rejoin ${his_opp} company.  You take up your duties as an acting-lieutenant with the added confidence from the successful command of a prize ship, not to mention a few pounds of spending money from the value of the prize--a midship${man}'s share isn't much, but it's still enough to earn you a small amount.\n\n*set seniority +1\n*set seniority2 +1\n*set age +1\n*set wealth %+10\n*finish", "villeneuveashore": "\n*temp host\n*temp women\n*temp woman\n*temp girl\n*temp Anne\n*temp Susannah\n*temp Beatrice\n*temp Miss\n*temp Clarence\n*temp Reliant\n*temp cheri\n*if (sex=\"male\")\n  *set spouse_word \"wife\"\n  *set host \"hostess\"\n  *set women \"women\"\n  *set woman \"woman\"\n  *set girl \"girl\"\n  *set Anne \"Anne\"\n  *set Susannah \"Susannah\"\n  *set Beatrice \"Beatrice\"\n  *set Miss \"Miss\"\n  *set Clarence \"Clarence\"\n  *set cheri \"mon cheri\"\n  *goto Reliant\n*else\n  *set spouse_word \"husband\"\n  *set host \"host\"\n  *set woman \"man\"\n  *set women \"men\"\n  *set girl \"boy\"\n  *set Anne \"Arthur\"\n  *set Susannah \"Stanford\"\n  *set Beatrice \"Brendan\"\n  *set Miss \"Master\"\n  *set Clarence \"Claire\"\n  *set cheri \"ma cherie\"\n  *goto Reliant\n\n*label Reliant\n\n*if rank = 4\n   \n    You experience the greatest thrill of your life when you step onto the deck of your first command, H.M.S. Reliant. You are very pleased indeed by what you observe there--${he_opp} is a gleaming almost-new frigate that reportedly handles like a charm, crewed by good ${men} obviously accustomed to working well together. A plum command, particularly for a new captain such as yourself. That night, you dream of all the fine things you will do now that you have a ship of your own.\n    *set Reliant \"Reliant\"\n   \n    *page_break\n   \n    *goto PEACE\n\n*elseif (rank = 3)\n    *goto Sloop_Hotspur\n\n*else\n\n    Life goes on. H.M.S. Courageous fights engagements, and now and then takes a prize. The Captain puts you in charge of one of these, with orders to sail ${him_opp} home to Albion. In reward for your many stalwart years of service, the Admiralty promotes you to the rank of commander. It is a proud moment indeed when you first walk down a street in Chesterport with an epaulette pinned to your shoulder. But a prouder moment is still to come.\n\n    *set rank 3\n    *set Age +5\n    *set Seniority 0\n   \n    *page_break\n    \n    *label Sloop_Hotspur\n    You experience the greatest thrill of your life when you step onto the deck of your first command: H.M. Sloop Hotspur. You are very pleased indeed by what you observe there--${he_opp} is a gleaming almost-new sloop that reportedly handles like a charm, crewed by good ${men} obviously accustomed to working well together. A plum command, particularly for a new commander such as yourself. That night, you dream of all the fine things you will do now that you have a sloop of your own.\n    *set Reliant \"Hotspur\"\n     \n    *page_break\n   \n    *goto PEACE\n\n   \n*label PEACE\n\nIn the morning, you wake to a general hullaballoo on the dock and in the streets of Chesterport. Peace has been declared between Albion and Gaul.\n   \nOh, the details are not yet finalized, but documents have been signed and hostilities suspended. Before you know it, you find yourself once again in front of the captain who commands the port--but this time, to hear the unwelcome news that $!{Reliant} is to be paid off. That is, decommissioned. The Admiralty won't have need of such a large fleet in peacetime.\n   \nYour career has--for the moment, at least--vanished in a puff of smoke and diplomats.\n\n*page_break\n   \n\"Might there be any chance of another command becoming available, ${sir}?\" you ask deferentially.\n   \nThe Captain grimaces. \"I wish I could say, ${mr_surname}. There will be ships needing captains, of course, but there will also be a great many post-captains and commanders seeking positions. A bright youngster like yourself has a tolerable chance, but. . . it may be some time. Oh, but it's not so bad! You're entitled to half-pay, and of course you have your prize money. You should enjoy your leave. You will receive a letter when a command becomes available.\"\n\nHow are you feeling about this?\n\n*fake_choice\n\n    #Pleased. It will be nice to have a holiday, and I can manage quite nicely on half-pay plus prize money. I am confident that I will get another command before very long.\n    \n    #Resigned. I serve the Navy in whatever capacity they require. I can be patient. Surely it won't be very long before I am offered another command.\n    \n    #Nervous. I am uncertain how long I can survive on half-pay, even augmented by prize money. And what if I am not offered another command? I am hardly trained for any other career!\n    \nA perfectly understandable reaction.\n    \n\n\nOne day some weeks later, on your way back from drawing your half-pay, you run into your old friend Bryce. \"${surname}, what good luck to meet up with you! You must come and dine with me tonight. I want to introduce you to my ${spouse_word}.\"\n\nYou enjoy the meal very much. ${Mr_opp} Bryce is a charming ${host}, gracious and sweet and well-mannered, and Bryce is obviously devoted to ${him_opp}. After dinner, you and Bryce sit drinking rum and storytelling long into the night.\n\nSuddenly Bryce says, \"So what about you, ${surname}? High time you got married, isn't it?\" $!{He} looks at you shrewdly and laughs. \"You're about to tell me you've been too busy to think of it. Well, you'll have plenty of leisure while you're on half-pay! You should think about it now!\"\n\nYou consider the idea. What do you conclude?\n\n*choice\n    #Bryce seems to have stumbled onto a good thing. It might be. . . kind of nice to have something like this myself. A home to return to, a loving ${spouse_word}. . .\n   \n        You agree that maybe marriage would be a fine thing, if you could find the right person. \"That's the spirit!\" Bryce says approvingly. \"${Mr_opp} Bryce knows several eligible young ${women}. Come along to the Assembly Rooms tomorrow night, and we'll see if we can find someone to introduce you to.\"\n   \n        *set marriage \"love\"\n                  \n        *goto ASSEMBLY\n   \n    #Bryce is right: marriage to the right kind of ${woman} could be very useful as I try to advance in my career.\n   \n        You agree that maybe marriage would be a fine thing, if you could find the right person. \"That's the spirit!\" Bryce says approvingly. \"${Mr_opp} Bryce knows several eligible young ${women}. Come along to the Assembly Rooms tomorrow night, and we'll see if we can find someone to introduce you to.\"\n       \n        *set marriage \"infl\"\n         \n        *goto ASSEMBLY\n   \n    #Marriage? Not me! I don't want to be tied down to anyone.\n   \n        \"Well, all right,\" Bryce says, \"if that's the way you want it. Have another glass.\"\n               \n        *set optout true\n               \n        And to ${his} credit, Bryce doesn't bring up the topic again. $!{He} does, however, convince you to go with ${him} and ${Mr_opp} Bryce to the Assembly rooms one evening. Truth to tell, you're not hard to convince: even if you're not in search of a ${spouse_word}, an Assembly is quite a sight to see.\n       \n        *goto ASSEMBLY\n       \n    #The idea of a ${spouse_word} has never held any appeal for me. . . It's not--ahem--it's not ${women} I find attractive, you see.\n\n        *set gay true\n        Oh! Oh, I see. Well, that's not unheard-of for Royal Naval officers, although it's not the sort of thing you can talk about in polite society.\n       \n        But separate from any. . . other arrangements you might want to make for your own personal fulfillment, there is the question of the advantage a good marriage could give you, as you pursue your career. You wouldn't be the only Naval officer to have a ${spouse_word} back home and. . . other arrangements. . . somewhere else. I mean, it's not as though you'd have to see your ${spouse_word} very often.\n       \n        So what are you going to tell Bryce?\n        *choice\n       \n            #Hm, yes, marriage to the right kind of ${woman} could help advance my career.\n           \n                You agree that maybe marriage would be a fine thing, if you could find the right person. \"That's the spirit!\" Bryce says approvingly. \"${Mr_opp} Bryce knows several eligible young ${women}. Come along to the Assembly Rooms tomorrow night, and we'll see if we can find someone to introduce you to.\"\n               \n                *set marriage \"infl\"\n         \n                *goto ASSEMBLY\n           \n            #Marriage? Not me! I don't want to be tied down to anyone.\n                    \n                \"Well, all right,\" Bryce says, \"if that's the way you want it. Have another glass.\"\n               \n                *set optout true\n               \n                And to ${his} credit, Bryce doesn't bring up the topic again. $!{He} does, however, convince you to go with ${him} and ${Mr_opp} Bryce to the Assembly rooms one evening. Truth to tell, you're not hard to convince: even if you're not in search of a ${spouse_word}, an Assembly is quite a sight to see.\n               \n                *goto ASSEMBLY\n\n\n*label ASSEMBLY\n\nThe Assembly rooms are crowded with young people dancing and flirting. In rooms off to one side, those disinclined to dance or flirt are playing at cards. You walk around the ballroom, getting your bearings, enjoying the pomp and circumstance and splendor. . . \n\nSuddenly, a voice you know cuts through the chatter around you.\n\n\"$!{Mr} ${surname}!\"\n\nYou turn, astonished. It is Lieutenant Villeneuve.\n\n*page_break\n\n$!{He} is not wearing the uniform of the Gaulish Navy, but it is unmistakably the same ${man} whom you met aboard a Gaulish prize some time ago. The years since have treated ${him} well--${his} skin is more weather-beaten, perhaps, and a scar seams ${his} left cheek, but ${he} looks to be otherwise in good health and good spirits. And not hurting for money, either: ${he} is dressed in a very fine linen shirt and a coat with gleaming gold buttons, and ${he} carries a pair of elegant gloves such as a ${gentleman} wears when dancing. $!{He} has clearly come to this Assembly intending to dance. It is a small shock to you to realize that a Gaulish officer is here as someone's invited guest.\n\nHow do you respond?\n\n*choice\n\n    #\"$!{Mr} Villeneuve! What a surprise.\"\n        *goto OPENING\n   \n    #\"What on earth are you doing here?\"\n   \n        *if tact > 70\n       \n            Are you sure that's what you want to say? I mean, you might be thinking that, but do you really want to say it out loud?\n           \n            *choice\n               \n                #Yes.\n                                                      \n                    All right, if that's what you want.\n                    *set tact %-10\n                    \"What on earth are you doing here?\" you say.\n                   \n                    \"Nothing nefarious, I do assure you,\" Villeneuve says, a little dryly. $!{He} takes a swallow from the wine glass ${he} holds, and goes on,\n                    *goto OPENING\n               \n                #Now that you mention it, perhaps not. I think I'll go with \"What a surprise to see you,\" instead.\n               \n                    Good plan.\n                    *goto OPENING\n       \n        *else\n           \n            \"Nothing nefarious, I do assure you,\" Villeneuve says, a little dryly. $!{He} takes a swallow from the wine glass ${he} holds, and goes on,\n           \n            *goto OPENING\n\n\n*label OPENING\n           \n*if RelationshipVilleneuve > 50\n\n    \"It is a surprise to see you as well.\" $!{His} Albionish comes more easily than it did when you first met, though it is still heavily accented. \"Though I do acknowledge the surprise must be much more great on your side--to encounter me upon the soil of Albion--no?\" $!{He} smiles disarmingly. \"I have cousins who reside not far from here. Many Gaulish families can say the same. Marriages in between Gaul and Albion are not uncommon, after all, during the years of peace. And the years of peace have returned. . .\" $!{He} gestures around the pleasant room. \". . . so a ${man} once again has freedom to visit ${his} relations. It is a very fine thing, peace. It permits--\" $!{He} inclines ${his} head at you. \"--civilized ${gentlemen} to interact in a civilized manner.\"\n   \n    This is as frank an overture of friendship as any you have ever seen. What do you do?\n   \n    *choice\n   \n        #Respond in kind. Villeneuve is a ${man} of honor. There is no reason to think ${him} anything less than sincere.\n            *set honor %+10\n            *set tact %+10\n           \n            *label CIVILIZATION\n            \"So it does,\" you say. You raise your wine glass. \"To civilization.\"\n           \n            \"Civilization,\" Villeneuve agrees, and raises ${his} back. More quietly, ${he} says, \"You treated me with great respect when I was your prisoner, and I have never forgotten that. It was not always so. I watched many Albionish officers mistreat those they captured, and so the honorable ones shone all the brighter.\"\n           \n            Before you can respond, a young, fair-haired Albionish ${man} emerges from the crowd and touches Villeneuve's sleeve. $!{He} begins, \"${Clarence} wondered if you wished to join us at whist--\" and then notices you. \"Oh, apologies.\"\n           \n            \"This is my cousin, ${Mr} Christy-Palliere,\" Villeneuve says to you. \"Cousin, may I present ${Mr} ${surname}. So you and ${Clarence} are in search of whist players?\" Villeneuve raises an eyebrow at you. \"Perhaps you would care to play, ${sir}?\"\n           \n            *choice\n               \n                #I agree. I am curious to get to know Villeneuve better.\n                    *set RelationshipVilleneuve %+10\n                    *goto WHIST\n                   \n                #I agree. I'm not sure what Villeneuve is trying to accomplish by asking me, but I want to find out.\n                    *set RelationshipVilleneuve %+10\n                    *set intelligence %+5\n                    *comment Not sure about that - I want to get across the idea that the PC is being cunning\n                    *goto WHIST\n                   \n                #I decline.\n                    *goto DIGNIFIEDEXIT\n                                   \n                    \n        #Proceed warily. Villeneuve is a Gaul, after all, and the war hasn't been over for that long. $!{He} might have some nefarious purpose in seeking my friendship.\n            *set RelationshipVilleneuve %+10\n            *set intelligence %+5\n            *comment Again, want to get across the idea that the PC is being cunning, but not sure this is the best way to do that\n            *goto CIVILIZATION\n       \n        #Pretend to respond in kind. It could be useful later if Villeneuve comes to trust me. Perhaps ${he} will tell me things. The peace might not last, after all.\n       \n            Clever. Not particularly honorable, but clever.\n            *set RelationshipVilleneuve %+10\n            *set honor %-10\n            *set intelligence %+10\n            *set bloodthirst %+5\n            *goto CIVILIZATION\n             \n        #Put this presumptuous Gaul in ${his} place.\n            *set tact %-15\n            *set RelationshipVilleneuve %-25\n            Too damn right. It was not so long ago that Villeneuve was capturing Albionish merchants and taking the lives of Albionish sailors. How dare ${he} come and claim friendship with me now?\n           \n            \"On the other hand,\" you say coldly, \"peace deprives ${men} like me of the opportunity to remove scum like you from the face of the earth.\"\n           \n            Villeneuve looks utterly taken-aback for one instant. And then ${his} face slowly flushes red. A few people nearby turn their heads curiously. You must have spoken more loudly than you intended.\n           \n            \"Ah,\" Villeneuve says between ${his} teeth, \"Albionish civilization. Apparently, not all it is boasted to be. $!{sir}.\" $!{He} inclines ${his} head a bare fraction and turns on ${his} heel.\n           \n            Wait a minute. Did ${he} just insult your country?\n           \n            *page_break\n           \n            $!{He} did. $!{He} actually did. The cheek of that damned Gaul.\n           \n            What are you going to do about it?\n           \n            *choice\n               \n                #Maintain a dignified silence and walk away. $!{He} is beneath contempt.\n               \n                    *if honor > 70\n                   \n                        Are you sure? $!{He} just insulted your country!\n                   \n                        *choice\n                       \n                            #Maintain a dignified silence and walk away.\n                       \n                                Well. . . all right.\n                       \n                                *set honor %-15\n                                *goto DIGNIFIEDEXIT\n                           \n                            #Insult ${him} back.\n                                *set RelationshipVilleneuve %-20\n                                *goto INSULTHIM\n                       \n                            #Call ${him} out.\n                                *set RelationshipVilleneuve %-25\n                                *goto YOUCHALLENGE\n                   \n                    *else\n                       \n                        *goto DIGNIFIEDEXIT\n                   \n                       \n                #Insult ${him} back.\n               \n                    *label INSULTHIM\n                   \n                    \"And are you an example of Gaulish honor, ${sir}?\" you demand, loudly enough that heads nearby turn in your direction. All around you, the sound of chattering voices dies to silence. \"Coin you stole from our ships bought those clothes you're wearing, I shouldn't wonder!\"\n                    *comment This is a terrible insult. Need to come up with a better one.\n                    *goto VCHALLENGE\n               \n                #Call ${him} out.\n               \n                    *label YOUCHALLENGE\n                   \n                    \"I beg your pardon, ${sir}?\" you say, loudly enough that heads all over the room turn in your direction.\n                   \n                    Villeneuve regards you sardonically. \"There is nothing wrong with your ears. You heard me.\"\n                   \n                    Bryce suddenly appears at your side. \"${surname}, what in hell are you doing?\" ${he} demands in a whisper.\n                   \n                    \"I have been insulted,\" you say calmly. More calmly than you feel, to tell the truth: your palms are sweating. You never have fought a duel before. To Villeneuve, you say, \"I demand satisfaction, ${sir}.\"\n                                     \n                    Villeneuve laughs. \"I am all willingness to oblige, ${sir}. My cousin shall stand as my second. Who, ${sir}, shall serve as yours?\"\n                   \n                    You look at Bryce.\n                   \n                    \"I. . . I will, of course,\" ${he} says heavily. \"${Mr} Villeneuve, as the challenged party, yours is the choice of weapon. Do you choose pistols or swords?\"\n                   \n                    \"Oh, swords, of course,\" Villeneuve says. \"A bullet might go anywhere, after all, but steel. . .\"\n                   \n                    \"Very good,\" Bryce says. \"We shall see you at dawn tomorrow.\"\n                   \n                    So at dawn tomorrow, you will be fighting a duel. By breakfast-time tomorrow, you might very well be dead. How did you get yourself into this mess?\n                   \n                    *page_break\n                    *goto DUELSWORD\n               \n                               \n\n*else\n\n    \"I am in Albion visiting cousins of my mother.\" $!{His} Albionish comes more easily than it did when you first met, though it is still heavily-accented. \"Now that there is peace, a ${gentleman} may visit ${his} relations in a civilized manner. A very fine thing, peace, is it not? It permits. . . ${gentlemen} such as ourselves to interact in a. . . civilized manner. As befits a. . . ${gentleman}.\"\n   \n    There is something distinctly disagreeable about the way ${he} pauses before ${he} says \"${gentlemen}\" and \"civilized.\" You remember the two of you facing each other on the deck of a Gaulish prize ship, and looking into Villeneuve's eyes, you can tell that ${he} is remembering that too.\n   \n    What do you do?\n   \n    *choice\n       \n        #I can't be sure ${he} meant it the way I heard it. I let the insult pass.\n       \n            *if honor > 70\n                   \n                Are you sure? $!{He} just insulted your honor!\n                   \n                *choice\n                           \n                    #I let the insult pass.\n                       \n                        Well. . . all right, if that's what you want.                        \n                        *set honor %-15\n                       \n                        *label WHISTINTRO                       \n                        Before you can decide what to say in response, a young, fair-haired Albionish ${man} emerges from the crowd and touches Villeneuve's sleeve. $!{He} begins, \"${Clarence} wondered if you wished to join us at whist--\" and then notices you. \"Oh, apologies.\"\n           \n                        \"This is my cousin, ${Mr} Christy-Palliere,\" Villeneuve says to you. \"Cousin, may I present ${Mr} ${surname}. So you and ${Clarence} are in search of whist players?\" Villeneuve raises an eyebrow at you. \"Perhaps you would care to play, ${sir}?\"\n           \n                        *choice\n                               \n                            #I would welcome the opportunity to trounce ${him} at something. I accept.\n                                   \n                                *goto WHIST\n                                       \n                            #Are you kidding? I excuse myself coldly and walk away.\n                                   \n                                 *goto DIGNIFIEDEXIT\n                           \n                    #You're right! That can't be tolerated. I insult ${him} back.\n                       \n                        *goto INSULTHIM\n                       \n                    #You're right! That can't be tolerated. I call ${him} out.\n                       \n                        *goto YOUCHALLENGE\n                   \n            *else\n                       \n                *goto WHISTINTRO\n       \n        #I can't be sure ${he} meant it the way I heard it. I push back a little, so that ${he} can retreat if in fact ${he} meant no insult.\n       \n            \"I beg your pardon, ${sir}?\" you say, quietly and pleasantly. \"I do not follow your meaning.\"\n           \n            Villeneuve smiles. \"It is not possible you speak your own language as badly as you speak mine. Once you questioned my honor as a ${gentleman}. I say now, ${sir}, that you and I both know you are not one yourself.\"\n           \n            All right, that insult was pretty blatant. You can't ignore that. What are you going to do?\n           \n            *choice\n                   \n                #Insult ${him} back.\n                   \n                    *goto INSULTHIM\n                       \n                #Call ${him} out.\n                   \n                    *goto YOUCHALLENGE\n       \n        #I know damned well ${he} meant it the way I heard it. I insult ${him} back.\n       \n            *goto INSULTHIM\n       \n        #$!{He} just cast aspersions upon my honor as a ${gentleman}! Honor demands I call ${him} out!\n       \n            *goto YOUCHALLENGE\n   \n\n*label WHIST\n\nYou retreat to the card room with Villeneuve and ${his} cousin, where you are introduced to a thin, middle-aged Albionish ${man} identified as ${Clarence} Gilchrist. Gilchrist and Christy-Palliere couldn't care less about getting to know you: they just want to play whist. The four of you sit down at a polished oak table.  \n   \nYou draw lots to pick partners, and you and Gilchrist team up against Villeneuve and Christy-Palliere. You look at Villeneuve's face; you can't tell what ${he} is thinking. You think of the deck of the Gaulish prize ship, ocean heaving all around you, shots and shouts echoing in your ears. The card room is warm and dimly-lit and somewhat stuffy with the smoke of the other card-players' pipes and cigars. This is bizarre.\n   \n*page_break\n   \nWhist is a hard game to cheat at, but you can still manage to cheat if you can catch glimpses of the other players' cards. If you want to. Do you want to cheat?\n   \n*choice\n   \n    *if RelationshipVilleneuve >= 50\n        #No, of course not. A ${gentleman} would do no such thing, and I'm actually interested in getting to know Villeneuve better.\n           \n            Of course. I apologize for doubting your honor.\n               \n            You play whist for the rest of the evening, and greatly enjoy yourself. Gilchrist and Christy-Palliere devote most of their attention to the cards, but Villeneuve makes conversation here and there. You respond as best you can. It's awkward at first, but grows easier as the evening progresses, and you find yourself thinking that it's really quite a lot like playing cards with your shipmates.\n               \n            Villeneuve's style of play tells you something about ${him}, too: ${he} is aggressive and fearless when engrossed in the game, quite different from ${his} carefully-polished manners the rest of the time. You can respect that. It's a shame this ${man} was born Gaulish, for ${he} would have been an asset to an Albionish ship.\n           \n            *page_break\n               \n            *if intelligence > 70\n               \n                Your native intelligence makes you an excellent whist player, and you and Gilchrist soundly trounce Villeneuve and Christy-Palliere. The latter seems irritated, but Villeneuve only flings down ${his} cards with a good-natured grimace and pays you your winnings. \"Well fought,\" ${he} says to you, and then to the other two, \"No, no, I have no wish for more time spent at this game. A last drink, instead, before the night is over? Very good! A toast, ${gentlemen}--to whist and civilization!\"\n               \n               \n                *set RelationshipVilleneuve %+25\n                *page_break               \n                *goto FOOTPADS\n               \n            *else\n               \n                You're not a terribly good whist player, and (to Gilchrist's evident irritation) you and ${he} come off very badly indeed. But Villeneuve is a gracious winner, and smoothly cuts off Christy-Palliere's less well-bred boasting. \"Well fought,\" Villeneuve says to you, and then to the other two, \"No, no, I have no wish for more time spent at this game. A last drink, instead, before the night is over? Very good! A toast, ${gentlemen}--to whist and civilization!\"\n                *set RelationshipVilleneuve %+25\n                *page_break\n                *goto FOOTPADS\n       \n    #I wouldn't ordinarily, but it's important to triumph over Villeneuve. For the honor of Albion.\n       \n        Don't you think the honor of Albion would
