ill Villeneuve, or just wound ${him}?\n\n*fake_choice\n\n    #I will aim to kill.\n    \n    #I will aim to wound.\n    \n  \n. . . Seven. Eight. Nine. Ten. \n\n\"Fire!\" Bryce shouts.\n   \n*page_break\n\n*if fighting > 60\n    \n    You whirl, aim, and fire--movements so familiar to you that you can do them without thought.\n   \n    At the same instant, you feel something whiz past your face--and you see Villeneuve stagger, clapping ${his} right hand to ${his} left arm.\n   \n    \"First blood!\" Bryce shouts. \"Honor is satisfied!\"\n   \n    \"It's not serious,\" ${he} tells you later. \"You didn't kill ${him}. $!{He} will bear the scar the rest of ${his} life, though. Serves the Gaul right.\"\n   \n    *finish\n   \n*else\n\n    You whirl, aim, and fire--and something rips through your left shoulder. You stagger backwards, gasping.\n   \n    Far away, you hear shouts of \"First blood!\" and \"Honor is satisfied!\", and you think you can hear Villeneuve laughing. Then you feel Bryce pressing ${his} handkerchief to the wound. \"It's not so bad,\" ${he} says, but you think ${he} might be lying. \"Ah, it's not bad at all, come on, ${given_name}, I know a sawbones can stitch it up for you. . .\"\n   \n    Bryce is at least partially right. It's not so bad, in that there's no permanent damage or weakness. But you bear the scar for the rest of your life.\n    *set wounds +1\n   \n    *finish\n   \n\n*label DIGNIFIEDEXIT\n\n*page_break\n\nYou somehow don't feel like going into the details of your evening with Bryce and ${Mr_opp} Bryce. You are evasive when they ask you later if you met anyone interesting at the Assembly.\n   \n*finish\n\n*label FOOTPADS\n\nAnd now you must see about getting yourself home. It is very late indeed. Bryce poked ${his} head into the card room some time earlier, telling you that ${he} and ${Mr_opp} Bryce wished to return home, and you said not to worry, you would find your own way back.\n\nNow you need to do that. You stand outside, breathing in the night air. Your head is fuzzy. From the stuffiness of the card room, or did you have too much to drink?\n\nBehind you, you hear Villeneuve's distinctive voice. \"No, no, not to worry! It is more important the carriage be put to the young ${lady}'s use! I can manage very well for myself.\"\n\nYou turn, curious.\n\n\"It seems ${Mr_opp} Gilchrist engaged my cousin and ${Mr} Gilchrist to provide transportation for a youngster who is feeling ill,\" Villeneuve explains. \"It is no matter to me to walk. The night is a very fine one.\"\n\nIt turns out the two of you are headed in the same direction.\n\nDo you want to walk with ${him}?\n\n*choice\n\n    #Yes. There's no reason not to.\n   \n        You head off together, into the dark and quiet night.\n        *goto FOOTPADS2\n   \n    #No, I think that would be awkward.\n   \n        You pretend to have misplaced something, and return inside as if to look for it. When you emerge, Villeneuve has walked off alone.\n       \n        *goto DIGNIFIEDEXIT\n\n\n*label FOOTPADS2\n   \nVilleneuve is making some inconsequential observation about whist games when you think you hear a rustle in the bushes that line the left-hand side of the path.\n\nWhat do you do?\n\n*choice\n\n    #Ignore it. It's probably nothing.\n   \n       \n        You take another stride. . .\n       \n        . . . and feel rather than see the rush of movement behind you, as four ${men} spring out of the bushes.\n       \n        A gang of footpads, preying on unwary or drunken travelers. Such as yourself. You have to admit they set up a very effective ambush.\n       \n        They are armed with knives. You fumble to draw your sword.\n       \n        *page_break \n        *set intelligence %-10\n        *goto FOOTPADFIGHT\n   \n    #Catch Villeneuve's arm and draw ${his} attention to the sound.\n   \n        You reach for Villeneuve's sleeve. . .\n\n        . . . and feel rather than see the rush of movement behind you, as four ${men} spring out of the bushes.\n       \n        A gang of footpads, preying on unwary or drunken travelers. Such as yourself. You have to admit they set up a very effective ambush.        \n       \n        They are armed with knives. You fumble to draw your sword.\n       \n        *page_break \n        *set intelligence %+5\n        *goto FOOTPADFIGHT\n           \n    #Draw my sword and challenge whatever blackguard is hiding in the brush.\n   \n        \"Show yourself!\" you shout, yanking out your sword and whirling to face the left-hand bushes.\n       \n        Whatever is in front of you does not obey, but out of the corner of your eye you can see three ${men} come lunging out of the bushes to the right. A gang of footpads, preying on unwary or drunken travelers. Such as yourself. You have to admit they set up a very effective ambush.\n             \n        *page_break \n        *set courage %+10\n        *goto FOOTPADFIGHT\n       \n       \n*label FOOTPADFIGHT\n\nVilleneuve draws ${his} sword too.\n\nThe footpads have surrounded the two of you. You fight back to back against all four of them. Even drunk, you manage to hold your own: these ${men} are not trained, after all, and armed only with knives, and your reflexes know exactly what to do. So do Villeneuve's, it would seem.\n\nYou slash at the nearest footpad, and ${he} hastily stumbles backwards. The one beside ${him} lunges in under your guard, knife stabbing for your throat.\n\nWhat do you do?\n\n*choice\n\n    #Oh, please. I contemptuously parry ${his} little knife with my sword.\n   \n        *if fighting > 60\n       \n            With a flick of your wrist, you knock the knife from ${his} hand. $!{His} eyes widen, and ${he} lurches backward, off-balance--and then steadies ${him}self and takes off into the night.\n           \n            *goto HELPV\n           \n        *else\n       \n            You try to knock the knife from ${his} hand with your blade, but your reflexes are dulled by drink and the footpad is just too fast. You stumble in your effort to dodge ${his} thrust. $!{He} is nearly on top of you, and you can't quite recover in time--\n           \n            *goto VHELPSYOU\n                      \n           \n    #I sidestep ${his} thrust. If I let ${him} get too close, my sword's greater reach will be no help to me.\n   \n        *if agility > 60\n       \n            Someone less agile would not have been able to avoid the thrust, but you manage it--and even keep your balance. Slashing out with your sword, you strike the knife from ${his} hand. It clatters to the ground, and without bothering to attempt to retrieve it, the footpad takes off into the night.\n\n            *goto HELPV\n           \n        *else\n       \n            You try to get out of the way of the knife, but the footpad is too fast and your reflexes are muddled by drink.\n           \n            *goto VHELPSYOU\n   \n   \n    #I plunge my blade into ${his} chest as ${he} closes.\n   \n        *set bloodthirst %+10\n       \n        The effects of drink slow your reflexes fractionally, and you don't manage to stab the ${man} through the heart. $!{He} understands your intent perfectly, however, and almost falls as ${he} scrambles to get away from you. Dropping the knife in ${his} haste, ${he} takes off into the night.\n       \n        *goto HELPV\n\n       \n*label HELPV\n\nWith no footpads left to menace you, you swing around to see how Villeneuve fares.\n\n*page_break\n\nNot very well, it seems. $!{He} lunges toward one footpad--this ${man} fights the way ${he} plays whist, fearless and aggressive--but that puts ${his} unprotected back to the other, who raises ${his} knife with an evil grin.\n\n*choice\n\n    #I charge to Villeneuve's aid.\n   \n        Of course you do! How could an Albionish ${gentleman} do otherwise?\n       \n        You strike out at the footpad, and score a cut along ${his} arm. $!{He} howls in pain and drops the knife. Not bothering with an attempt to retrieve it, clutching ${his} bleeding arm, ${he} stumbles away from you and takes off into the night.\n       \n        $!{His} companion follows suit. The footpads had been counting on an easy robbery; you and Villeneuve together are too much trouble to make the fight worth their while.\n       \n        Villeneuve draws a deep, slow breath and sheaths ${his} sword. $!{He} turns, meeting your eyes. \"Thank you,\" ${he} says.\n       \n        You wave it off. \"My pleasure, ${sir}.\"\n       \n        Villeneuve holds out ${his} hand, and you shake it. And then ${he} chuckles, though it sounds just a little strained.\n       \n        \"It is good to be alive, is it not?\" ${he} says in explanation.\n       \n        *set RelationshipVilleneuve %+50\n       \n        *goto FIGHTAFTERMATH\n   \n    #I take off. Let Villeneuve save ${his} own skin.\n   \n        *set honor %-90\n        *set courage %-90\n        *set RelationshipVilleneuve %-30\n       \n        Let me get this straight. You abandon your erstwhile ally to ${his} enemies?\n       \n        You ought to be ashamed of yourself. Does the honor of Albion mean nothing to you?\n       \n        You never tell anyone what you have done, for if anyone ever knew, your reputation and career would surely be ruined. You do not learn whether Villeneuve survived. You have to live with the memory of your cowardice and dishonor.\n       \n        *page_break\n       \n        *goto DIGNIFIEDEXIT\n   \n       \n*label VHELPSYOU\n\nVilleneuve plunges between you and the footpad, slashing out with ${his} sword. This ${man} fights the way ${he} plays whist, fearless and aggressive. The footpad howls in pain and jerks back, and ${his} knife clatters to the ground. Not bothering with an attempt to recover it, and clutching ${his} bleeding forearm, ${he} takes off into the night.\n           \n$!{His} comrades quickly follow suit. They had been counting on an easy robbery; you and Villeneuve together are too much trouble to make the fight worth their while. They disperse in four different directions. There is no point in attempting pursuit, even if it were a wise idea, which it is not. \n           \nIt seems Villeneuve just saved you--if not from death, at least from harm. How do you want to respond to that?\n           \n*choice\n           \n    #It's embarrassing I should have needed ${his} help. I pretend it didn't happen.\n               \n        *set honor %-10\n                   \n        At your side, Villeneuve laughs and sheaths ${his} sword. You look at ${him}. \"Good to be alive, is it not?\" ${he} says cheerfully, and holds out ${his} hand.\n\n        You shake it. \"It is,\" you say.\n                             \n        *goto FIGHTAFTERMATH\n\n       \n    #It was a brave action, and I am grateful. I tell ${him} so.\n               \n        *set honor %+10\n        *set RelationshipVilleneuve %+10\n                   \n        \"$!{Mr} Villeneuve,\" you say. $!{He} turns to you. \"My most sincere thanks.\"\n                   \n        $!{He} waves it off. \"My pleasure to oblige, ${sir}.\" $!{He} heaves a deep sigh and sheaths ${his} sword, then, unexpectedly, chuckles. You look at ${him}. \"Good to be alive, is it not?\" ${he} says cheerfully, and holds out ${his} hand.\n\n        You shake it. \"It is,\" you say.\n                   \n        *goto FIGHTAFTERMATH\n               \n    #It was a brave action and does ${him} credit, but there's no reason to get maudlin about it. I thank ${him}  briefly.\n       \n        *set honor %+5\n        *set RelationshipVilleneuve %+5\n                   \n        At your side, Villeneuve laughs and sheaths ${his} sword. You look at ${him}. \"Good to be alive, is it not?\" ${he} says cheerfully, and holds out ${his} hand.\n\n        You shake it. \"It is,\" you say, and then-- \"Thank you.\"\n                   \n        $!{He} waves it off. \"My pleasure to oblige, ${sir}.\"\n                   \n        *goto FIGHTAFTERMATH\n   \n\n*label FIGHTAFTERMATH\n\n*set RelationshipVilleneuve %+50\n\nWhat now?\n\n*choice\n     \n    #As Villeneuve says, it is good to be alive. I feel my blood pumping with the excitement of the fight, and I think triumphing over an ambush of footpads calls for a strong drink.\n   \n        *label DRINK\n       \n        \"I think being alive deserves a drink in celebration,\" you say to Villeneuve, and ${he} grins.\n       \n        \"As you say, my friend.\"\n       \n        The two of you wind up in a nondescript tavern, drinking somewhat forgettable ale and telling stories of the great battles and duels you have each fought. If your stories are somewhat embellished in the telling, you are fairly certain Villeneuve's are, as well. . .\n\n        *if gay\n            As the evening wears on and the ale continues flowing, Villeneuve becomes more effusive, with broader gestures and excited speech.  $!{His} hand brushes against yours, perhaps lingering for just a moment.\n\n            Do you think ${he} meant anything by it?\n            *choice\n              #How could ${he} not?  I know a discreet expression of interest when I see one.\n                *label VilleneuveAdvance\n                How do you respond?\n                *choice\n                  #I lean across the table and kiss ${him}.\n                    *set Tact %-20\n                    *set Courage %+10\n                    Your sudden move startles Villeneuve; ${he} shifts backward, dodging your kiss.  An awkward silence passes between the two of you.\n\n                    Perhaps ${he} was put off by your lack of tact.  Perhaps ${he} was never interested in you to begin with.\n                    *page_break\n                    \"Perhaps we should find a more private place, oui?\" ${he} whispers.\n                    You quickly make your way back to your rooms.  A night of intense passion ensues.\n                    *goto HotGaySex\n\n                  #I invite ${him} back to my rooms.\n                    \"My rooms are not far from here,\" you say.  \"Would you care to accompany me there?\"\n\n                    \"I was beginning to fear you were not interested,\" Villeneuve says with a smile.  \"I have drunk more than enough ale for the evening, but the night is still young.\"\n\n                    The two of you quickly travel back to your rooms.  You enjoy a night of intense passion together.               \n                    *goto HotGaySex\n\n                  #I ignore the overture--I'm not interested in Villeneuve in that way.\n                    Villeneuve may be disappointed, but ${he} conceals it well.\n                    *goto AdvanceRejected\n                  #I wish I could reciprocate, but ${he} is a Gaul, and an officer in the Gaulish Navy no less.  Even in peace time, that would be a step too far.\n                    If only things were different.  But Albion has been at war with Gaul only too recently, and your nations may yet be at war again.  With a heavy heart, you let duty be your guide.\n                    *set Honor %+10\n                    *goto AdvanceRejected\n\n              #I don't know, but I know how to find out.\n                *goto VilleneuveAdvance\n              #Surely not.  I must have imagined it.\n                Of course you did, of course you did.\n                *set Intelligence %-10\n                *set Tact %-10\n                *label AdvanceRejected\n                *if optout\n                  *page_break\n                  *goto GOODNIGHT\n                *else\n                  *line_break\n                  *goto CousinAlarmed\n       \n        *elseif optout = false\n\n            *label CousinAlarmed\n            \"Is your cousin not going to be alarmed when you do not return?\" you realize suddenly.\n       \n            Villeneuve waves a hand. \"Unlikely. I know my cousin.\"\n       \n            \"Have you other family hereabouts?\" you ask.\n       \n            \"No--and very few even in Gaul.\" Villeneuve shrugs. \"There was a ${girl}, whom I thought to marry when I returned from war. . . alas, it was not to be.\" $!{He} turns the subject deftly. \"What about you, my friend, are you married?\"\n\n            \"Not. . . yet,\" you say, thinking of your conversation with Bryce.\n           \n            \"Ah, is it that way?\" Villeneuve smiles, responding to your tone rather than your words. \"Good luck to it, then.\"\n           \n            *set RelationshipVilleneuve %+10\n            *page_break\n            *goto GOODNIGHT\n           \n        *else\n           \n            *page_break\n            *goto GOODNIGHT\n   \n    #I find myself shaking in the aftermath of the fight, though I think I keep that hidden from Villeneuve. I could really do with a drink to steady my nerves.\n   \n        *goto DRINK\n   \n    #Between the after-effects of the fight, and all I had to drink in the card room, I feel very odd indeed. The sooner I get to bed, the better.\n   \n        \"Perhaps we ought to be getting to our respective homes, if we wish to remain alive,\" you add dryly.\n       \n        Villeneuve nods. \"As you say, my friend.\" You walk together in silence until you reach your lodgings, at which point ${he} wishes you a cheerful good night. \"A pleasure working with you, ${Mr} ${surname}.\"\n       \n        *goto DIGNIFIEDEXIT\n       \n*label GOODNIGHT\n\nYou talk until the sun is almost up, and then Villeneuve says ${he} had better be getting back to ${his} cousin's house now. \"A pleasure working with you, ${Mr} ${surname},\" ${he} says in farewell.\n   \n*goto DIGNIFIEDEXIT\n\n*label HotGaySex\n*set RelationshipVilleneuve %+50\n*page_break\nDo you pursue a longer relationship with Villeneuve or do you limit it to just one night?\n*choice\n  #Of course!  This is love!\n    You meet repeatedly, as often as you can arrange without scandal.  Your nights together are passionate, and your days stimulating.  Some of your fellow officers may notice how often the two of you are together, and may even suspect the truth.  You are almost certain that Bryce guesses when you repeatedly have no time for the social events to which ${he} invites you.  But they have enough discretion to say nothing and to pretend that your friendship with Villeneuve is platonic.  After several months, however, Villeneuve receives a letter from Gaul.  $!{He} has been given a new posting and must return to Gaul.\n\n    *set optout true\n    *set Patronage %-15\n    *set Tact %-10\n    *set Courage %+15\n    How do you react?\n    *choice\n      #I urge ${him} to stay with me.  $!{He} should resign ${his} commission for what we have together.\n        \"You know I cannot, ${cheri},\" ${he} replies.  \"Do not ask me to betray my duty to my homeland for you.  I would never ask you to betray yours.\"\n\n        You think Villeneuve feels compelled to leave you by duty, but you cannot help wondering if perhaps ${he} feels less strongly about you than you do about ${him}.  Despite your best efforts, Villeneuve sails across the Channel, leaving you behind.  $!{He} promises to write when ${he} can, but you know the letters will bring as much sorrow as joy.\n\n        *set Honor %-20\n\n        *finish\n      #I offer to resign my commission to go with ${him}.\n        \"No, ${cheri}, I cannot let you do that,\" Villeneuve replies.  \"What would you do?  How would you live?  You would live in a strange land, unable to admit why you were there, while you waited for years for me to come home from sea.  Sometimes, you might wait for news of battle, wondering whether I had been killed or whether I had slain your country${men}.  You must not do this.  Let us treasure our time together, and pray that we may have more some day, but do not let me be the ruin of your life.\"\n\n        You think Villeneuve is being honest about rejecting your offer, yet you cannot help wonder if perhaps ${he} feels less strongly about you than you do about ${him}.  Despite your pleading, Villeneuve sails across the Channel without you.  $!{He} promises to write when ${he} can, but you know the letters will bring as much sorrow as joy.\n\n        *set Honor %-10\n        *set Courage %+15\n        *finish\n      #$!{He} must do ${his} duty, as I must do mine.\n        Villeneuve pledges that ${he} will always remember you, and thanks you for not making a hard parting even worse by suggesting the unthinkable.  $!{He} promises to write when ${he} can, but you know the letters will bring as much sorrow as joy.  With great sorrow, you watch ${his} ship sail across the Channel to Gaul.\n        *set Honor %+15\n        *finish\n\n  #We meet when we can, but eventually our respective duties will draw us apart.  Let us take our pleasure while we may.\n    The months that follow are a joy.  You meet often, although not to the exclusion of your other social obligations.  Finally, however, Villeneuve receives orders to report to a new posting.  On a bittersweet day, ${he} sails across the Channel to resume ${his} duties in the Gaulish Navy.  You are happy for the time you had together, yet only too aware of what you have lost.\n    *finish \n\n  #Villeneuve is a fine ${man}, but there are plenty of fish in the sea.  If we happen to meet again, we will see, but I make no particular effort.\n    Villeneuve can tell the score as you show ${him} out the next morning.  $!{He} kisses you as ${he} goes, perhaps a bit wistfully.  Some months later, you hear that ${he} has returned to Gaul.\n    *goto DIGNIFIEDEXIT\n  #I hope Villeneuve didn't get the wrong idea, but that was a night of fun, nothing more.\n    Villeneuve can tell the score as you show ${him} out the next morning.  $!{He} kisses you as ${he} goes, perhaps a bit wistfully.\n    *goto DIGNIFIEDEXIT\n", "wrapup": "*comment This assumes that you will always be rank=4 (i.e. post captain) for this vignette; it may be possible to get here as rank=3 (commander), from CommandMutiny.  If so, we'll need to add some finish up there--it's probably pretty straight-forward, since I assume that would only happen if you're also either cashiered or disgraced.\n\n*comment Arguably, if you have multiple wounds or whatnot, you should die young--currently, all of the endings imply living to a ripe old age, although some are not explicit.  It just seems like a substantial increase in complexity for little pay-off.\n*temp HighStatus\n*set HighStatus Knighted\n*temp Lords\n*temp Lord_opp\n*temp bachelor\n*if (sex = \"male\")\n  *set Lords \"Lords\"\n  *set Lord_opp \"Lady\"\n  *set bachelor \"bachelor\"\n  *goto Begin\n*else\n  *set Lords \"Peers\"\n  *set Lord_opp \"the Honorable Mr.\"\n  *if Knighted\n    *set bachelor \"unmarried knight\"\n    *goto Begin\n  *else\n    *set bachelor \"gentlewoman\"\n    *goto Begin\n\n*label Begin\n\nWith that, your adventure comes to an end for now,\n*if (Knighted)\n  $!{Dame} $!{Given_name}.\n  *goto Summary\n*elseif (Cashiered)\n  $!{Mr} $!{Surname}.\n  *goto Summary\n*else\n  Captain $!{Surname}.\n  \n  *goto Summary\n\n*label Summary\n*if (Cashiered)\n\n  After all you sacrificed for the Royal Navy and to serve Albion, they still discarded you like some moldy sea biscuits.  Most of your \"friends\" from the Royal Navy ostracize you, treating you as unworthy of even greeting.\n  \n  *if (Wealth > 90)\n  \n    You do have an enormous fortune to rely on and retire to a comfortable life of ease as a country ${gentleman}.  You are even able to buy yourself something of status, owning an entire small village and relying on the income of several thousand pounds a year from your investments.  When you want to travel into Town, you live in high style, although you are frequently snubbed by old associates and prefer to stay in the country.\n    \n    *goto CashieredMarriage\n    \n  *elseif (Wealth > 75)\n  \n    You do have a substantial fortune to rely on and retire to a comfortable life of ease as a country ${gentleman}, with an income of better than a thousand pounds a year from your investments.\n    \n    *goto CashieredMarriage\n    \n  *elseif (Wealth > 50)\n  \n    You have barely enough money to buy an estate and to retire as a country ${gentleman}.  There's not much income, and you scrape out a meager living, but you avoid poverty.\n    \n    *goto CashieredMarriage\n    \n  *elseif (Wealth > 25)\n  \n    You are able to find some work to supplement your meager savings.  It's undignified to stoop to trade--sailing as the \"${master}\" of a merchantship when once you were the Captain of one of the $!{King}'s warships.  Still, it's better than poverty.\n    \n    *goto CashieredMarriage\n    \n  *else\n  \n    You find some work to live on, but the work is intermittent.  You spend much of your time experiencing crushing poverty.\n    \n    *goto CashieredMarriage\n\n  *label CashieredMarriage\n  *if (married)\n    *if (spouse_name = \"Hawthorne\")\n    \n      Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is quite painful.  For someone as status conscious as ${he_opp} is, being married to a cashiered former officer is dreadful, and ${he_opp} takes out ${his} disappointment on you.\n      \n      *goto Statlist\n      \n    *elseif (spouse_name = \"Musgrove\")\n      *if (Wealth > 75)\n      \n        Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is quite enjoyable.  $!{He_opp} was very disappointed by the come down in social status after your court-martial, but ${he_opp} quickly begins wringing all the joy possible out of your new life.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, but you can afford it, and ${he_opp} provides color and enjoyment in your forced retirement.\n        \n        *goto Statlist\n        \n      *elseif (Wealth > 50)\n      \n        Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is reasonably enjoyable.  $!{He_opp} was very disappointed by the come down in social status after your court-martial, but ${he_opp} quickly begins wringing all the joy possible out of your new life.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, and the quarrels over money are a continuing source of stress.  But at the end of the day, ${he_opp} provides color and enjoyment in your forced retirement.\n        \n        *goto Statlist\n        \n      *else\n      \n        Your marriage is another terrible disappointment.  When you return home nearly penniless, reduced to seeking crass work, you quarrel terribly with $!{Mrs} $!{Surname}, your ${spouse_word}.  After several miserable years, ${he_opp} runs off with a well-to-do merchant.  You are neither surprised nor terribly sympathetic when ${he_opp} is abandoned several years later.  You simply try to blot ${him_opp} from your memory.\n        \n        *goto Statlist\n        \n    *else\n    \n      The saving grace in all of this is your life at home with $!{Mrs} $!{Surname}, your ${spouse_word}.  $!{He_opp} is loving and affectionate, and ${he_opp} keeps a pleasant and well-run home.  As great a disappointment as your professional life has been, you find your home makes up for much of it.\n      \n      *goto Statlist\n      \n  *else\n  \n    *goto Statlist\n    \n*elseif (Disgraced)\n\n  You spend the rest of your life on half-pay, without any prospect of a command at sea or even an assignment ashore.\n  \n  *if ((Age-Seniority) \u003c 30)\n  \n    As the years go by, you steadily climb up the naval list.  As your seniority increases, you receive promotion in turn to rear admiral, vice admiral, and finally admiral.  You, however, are a yellow admiral--promoted without ever having the opportunity to fly your command flag, receiving only an increase in half-pay and what should be an increase in social distinction, but is in fact forever obscured by your disgrace.\n    \n    *set Wealth %+10\n    *set override_rank \"Admiral\"\n    *goto DisgracedWealth\n    \n  *elseif ((Age-Seniority) \u003c 40)\n  \n    As the years go by, you steadily climb up the naval list.  As your seniority increases, you finally receive promotion to rear admiral.  You, however, are a yellow admiral--promoted without ever having the opportunity to fly your command flag, receiving only an increase in half-pay and what should be an increase in social distinction, but is in fact forever obscured by your disgrace.  You finally retire from the Royal Navy before promotion to the highest ranks.\n    \n    *set Wealth %+5\n    *set override_rank \"Rear Admiral\"\n    *goto DisgracedWealth\n    \n  *else\n  \n    As the years go by, you steadily climb up the naval list.  Unfortunately, you are not the youngest of captains, not by a long shot.  Before you ever receive the coveted promotion to rear admiral, you retire from the Royal Navy.\n    \n    *goto DisgracedWealth\n    \n  *label DisgracedWealth\n  *if (Wealth > 90)\n  \n    You do have an enormous fortune to rely on and live a comfortable life of ease as a country ${gentleman}.  You are even able to buy yourself something of status, owning an entire small village and relying on the income of several thousand pounds a year from your investments.  When you want to travel into Town, you live in high style, although you are frequently snubbed by old associates and prefer to stay in the country.\n    \n    *goto DisgracedMarriage\n    \n  *elseif (Wealth > 75)\n  \n    You do have a substantial fortune to rely on and live a comfortable life of ease as a country ${gentleman}, with an income of better than a thousand pounds a year from your investments.\n    \n    *goto DisgracedMarriage\n    \n  *elseif (Wealth > 50)\n  \n    You have barely enough money to buy an estate and to live as a country ${gentleman}.  Half-pay doesn't provide much income, and you scrape out a meager living, but you avoid poverty.\n    \n    *goto DisgracedMarriage\n    \n  *else\n  \n    You rely on your half-pay to make ends meet, but you are little above poverty.  You can pay your creditors, with difficulty, but every month money becomes ever more tight as you wait for your next payment.  For one who has given so much to your country, you feel sorely ill-used.\n    \n    *goto DisgracedMarriage\n\n  *label DisgracedMarriage\n  *if (married)\n    *if (spouse_name = \"Hawthorne\")\n    \n        Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is often painful.  For someone as status conscious as ${he_opp} is, being married to a disgraced officer is not what ${he_opp} imagined.  $!{He_opp} takes out ${his} disappointment on you.\n        \n        *goto Statlist\n        \n    *elseif (spouse_name = \"Musgrove\")\n        *if (Wealth > 75)\n        \n          Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is quite enjoyable.  $!{He_opp} was very disappointed by the loss in social status when you were placed on effectively permanent half-pay, but ${he_opp} quickly begins wringing all the joy possible out of your new life.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, but you can afford it, and ${he_opp} provides color and enjoyment in your sometimes drab life.\n          \n          *goto Statlist\n          \n        *elseif (Wealth > 50)\n        \n          Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is reasonably enjoyable.  $!{He_opp} was very disappointed by the loss in social status when you were placed on effectively permanent half-pay, but ${he_opp} quickly begins wringing all the joy possible out of your new life.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, and the quarrels over money are a continuing source of stress.  But at the end of the day, ${he_opp} provides color and enjoyment in your sometimes drab life.\n          \n          *goto Statlist\n          \n        *else\n        \n          Your marriage is another terrible disappointment.  When you return home nearly penniless, reduced to seeking crass work, you quarrel terribly with $!{Mrs} $!{Surname}, your ${spouse_word}.  After several miserable years, ${he_opp} runs off with a well-to-do merchant.  You are neither surprised nor terribly sympathetic when ${he_opp} is abandoned several years later.  You simply try to blot ${him_opp} from your memory.\n          \n          *goto Statlist\n          \n    *else\n    \n        The saving grace in all of this is your life at home with $!{Mrs} $!{Surname}, your ${spouse_word}.  $!{He_opp} is loving and affectionate, and ${he_opp} keeps a pleasant and well-run home.  As great a disappointment as your professional life has been at times, you find your home makes up for much of it.\n        \n        *goto Statlist\n        \n  *else\n    *goto Statlist\n\n*elseif (Knighted)\n\n  As one of the heroes of the Royal Navy, you are always in demand.  Whenever a choice assignment is available, your name comes up.  And if you choose to, you could easily win election to Parliament or gain entree into the highest echelons of Albion's society.\n  \n  *if ((Age-Seniority) \u003c 30)\n  \n    As the years go by, you steadily climb up the naval list.  As your seniority increases, you receive promotion in turn to rear admiral, vice admiral, and finally admiral.  With each promotion, you receive larger and more important commands, as well as the opportunity for more prize money.  In fact, you ultimately reach the degree of importance where you could be appointed one of the $!{Lords} of the Admiralty.  Depending on how your commands go, you may win yourself a peerage.\n    \n    *set Wealth %+15\n    *set override_rank \"Admiral\"\n    *goto KnightedWealth\n    \n  *elseif ((Age-Seniority) \u003c 40)\n  \n    As the years go by, you steadily climb up the naval list.  As your seniority increases, you finally receive promotion to rear admiral.  You receive an important command.  You finally retire from the Royal Navy before promotion to the highest ranks.\n    \n    *set Wealth %+8\n    *set override_rank \"Rear Admiral\"\n    *goto KnightedWealth\n    \n  *else\n  \n    As the years go by, you steadily climb up the naval list.  Unfortunately, you are not the youngest of captains, not by a long shot.  Before you ever receive the coveted promotion to rear admiral, you retire from the Royal Navy.  You do, however, receive several assignments as a commodore leading a squadron on important duties.\n    \n    *set Wealth %+3\n    *set override_rank \"Commodore\"\n    *goto KnightedWealth\n    \n  *label KnightedWealth\n  *if (Wealth > 90)\n  \n    On the relatively rare occasions when you are on half-pay, you have an enormous fortune to rely on and live a comfortable life of ease with an income of several thousand pounds a year from your investments.  You maintain a fine estate in the country, and a fashionable house in Town, where you live in style and enjoy being part of the social elite of Albion.\n    \n    *goto KnightedMarriage\n    \n  *elseif (Wealth > 75)\n  \n    On the relatively rare occasions when you are on half-pay, you have a substantial fortune to rely on and live a comfortable life of ease as a country ${gentleman}, with an income of better than a thousand pounds a year from your investments.\n    \n    *goto KnightedMarriage\n    \n  *elseif (Wealth > 50)\n  \n    You have barely enough money to buy an estate and to live as a country ${gentleman} on the relatively rare occasions when you are on half-pay.  Your success and heroism has not been matched with commensurate financial rewards.  Still, with commands easy for you to secure, you live a comfortable life.\n    \n    *goto KnightedMarriage\n    \n  *else\n  \n    You rely on your Naval pay to make ends meet, but the rare occasions when you have extended periods on half-pay leave you little above poverty.  You can pay your creditors, with difficulty, but every month money becomes ever more tight as you wait for your next payment.  For one who has given so much to your country and received high honors but little wealth in exchange, you feel sorely ill-used.\n    \n    *goto KnightedMarriage\n\n  *label KnightedMarriage\n  *if (married)\n    *if (spouse_name = \"Hawthorne\")\n    \n        Spending time at home with ${lord_opp} $!{Surname}, your ${spouse_word}, is at times overly formal but still pleasant.  Your ${spouse_word} has always been particularly focused on status, and being married to a knight and a national hero suits ${him_opp} perfectly.  $!{He_opp} embraces your success and helps you make the most of it.\n        \n        *goto Statlist\n        \n    *elseif (spouse_name = \"Musgrove\")\n        *if (Wealth > 75)\n        \n          Spending time at home with ${lord_opp} $!{Surname}, your ${spouse_word}, is quite enjoyable.  $!{He_opp} was quite pleased with your rise in status when you were knighted, and ${he_opp} has always been expert in enjoying life to the fullest.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, but you can afford it, and ${he_opp} adds yet more color and enjoyment in your already exciting life.\n          \n          *goto Statlist\n          \n        *elseif (Wealth > 50)\n        \n          Spending time at home with ${lord_opp} $!{Surname}, your ${spouse_word}, is reasonably enjoyable.  $!{He_opp} was quite pleased with your rise in status when you were knighted, and ${he_opp} has always been expert in enjoying life to the fullest.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, and the quarrels over money are a continuing source of stress.  But at the end of the day, ${he_opp} provides yet more color and enjoyment in your already exciting life.\n          \n          *goto Statlist\n          \n        *else\n        \n          Your marriage is one of your few disappointments.  When money is tight, you quarrel terribly with ${lord_opp} $!{Surname}, your ${spouse_word}.  $!{He_opp} was quite pleased with your rise in status when you were knighted, and ${he_opp} has always been expert in enjoying life to the fullest.  But you have never been able to support ${him_opp} in the manner which ${he_opp} insists on, and your bitter fights over money make your time on half-pay even more of a trial than it would be other wise.  Your one relief is that you receive commands at sea frequently that allow you to be far away from your noisome ${spouse_word}.\n          \n          *goto Statlist\n          \n    *else\n    \n        Your life at home with ${lord_opp} $!{Surname}, your ${spouse_word}, remains pleasant and engaging.  $!{He_opp} is loving and affectionate, and ${he_opp} keeps a pleasant and well-run home.  $!{He_opp} often seems uncomfortable with the company that you are expected to keep as a knight and a hero, and ${he_opp} does little in satisfying your social obligations.  Still, you always have ${his_opp} devotion and love supporting you.\n        \n        *goto Statlist\n        \n  *else\n  \n    As a national hero with a very successful naval career, you are an extremely eligible ${bachelor}.  You can easily make an excellent marriage if you wish, whether pursuing an old flame or courting anew.\n    *goto Statlist\n\n*else\n\n  You have a successful career, although never a dazzling one.  You continue to serve actively in commands at sea, although increasingly long periods on half-pay punctuate your ongoing service.\n  \n  *if ((Age-Seniority) \u003c 30)\n  \n    As the years go by, you steadily climb up the naval list.  As your seniority increases, you receive promotion in turn to rear admiral, vice admiral, and finally admiral.  With each promotion, you receive larger and more important commands, as well as the opportunity for more prize money.  Depending on how your commands go, you may eventually win yourself a knighthood or even a baronetcy.\n    \n    *set HighStatus true\n    *set override_rank \"Admiral\"\n    *set Wealth %+12\n    *goto OtherWealth\n    \n  *elseif ((Age-Seniority) \u003c 40)\n  \n    As the years go by, you steadily climb up the naval list.  As your seniority increases, you finally receive promotion to rear admiral.  You receive an important command.  You finally retire from the Royal Navy before promotion to the highest ranks.\n    \n    *set HighStatus true\n    *set override_rank \"Rear Admiral\"\n    *set Wealth %+6\n    *goto OtherWealth\n    \n  *else\n  \n    As the years go by, you steadily climb up the naval list.  Unfortunately, you are not the youngest of captains, not by a long shot.  Before you ever receive the coveted promotion to rear-admiral, you retire from the Royal Navy.  You do, however, receive an assignment or two as a commodore leading a squadron on important duties.\n    \n    *set Wealth %+2\n    *set override_rank \"Commodore\"\n    *goto OtherWealth\n    \n  *label OtherWealth\n  *if (Wealth > 90)\n  \n    On the occasions when you are on half-pay, you have an enormous fortune to rely on and live a comfortable life of ease with an income of several thousand pounds a year from your investments.  You maintain a fine estate in the country, and a fashionable house in Town, where you live in style.\n    *set HighStatus true\n    \n    *goto OtherMarriage\n    \n  *elseif (Wealth > 75)\n  \n    On the occasions when you are on half-pay, you have a substantial fortune to rely on and live a comfortable life of ease as a country ${gentleman}, with an income of better than a thousand pounds a year from your investments.\n    *set HighStatus true\n    \n    *goto OtherMarriage\n    \n  *elseif (Wealth > 50)\n  \n    You have barely enough money to buy an estate and to live as a country ${gentleman} on the occasions when you are on half-pay.  Your professional success has not been matched with commensurate financial rewards.  At times, money is very tight, but overall you live a comfortable life.\n    \n    *goto OtherMarriage\n    \n  *else\n  \n    You rely on your Naval pay to make ends meet, but the occasions when you have extended periods on half-pay leave you little above poverty.  You can pay your creditors, with difficulty, but every month money becomes ever more tight as you wait for your next payment.  For one who has given so much to your country, you feel sorely ill-used.\n    \n    *goto OtherMarriage\n\n  *label OtherMarriage\n  *if (married)\n    *if (spouse_name = \"Hawthorne\")\n    \n        Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is at times overly formal but reasonably pleasant.  Your ${spouse_word} has always been particularly focused on status, and your solid and successful career pleases ${him_opp}, even if you do not exceed ${his_opp} expectations.\n        \n        *goto Statlist\n        \n    *elseif (spouse_name = \"Musgrove\")\n    \n        *if (Wealth > 75)\n        \n          Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is quite enjoyable.  $!{He_opp} is pleased with your professional success, and ${he_opp} has always been expert in enjoying life to the fullest.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, but you can afford it, and ${he_opp} adds yet more color and enjoyment to your life.\n          \n          *goto Statlist\n          \n        *elseif (Wealth > 50)\n        \n          Spending time at home with $!{Mrs} $!{Surname}, your ${spouse_word}, is reasonably enjoyable. $!{He_opp} is pleased with your professional success, and ${he_opp} has always been expert in enjoying life to the fullest.  You wince sometimes at the expenses ${he_opp} incurs without thinking about them, and the quarrels over money are a continuing source of stress.  But at the end of the day, ${he_opp} provides yet more color and enjoyment in your life.\n          \n          *goto Statlist\n          \n        *else\n        \n          Your marriage is one of your few disappointments.  When money is tight, you quarrel terribly with $!{Mrs} $!{Surname}, your ${spouse_word}.  $!{He_opp} is pleased with your professional success, and ${he_opp} has always been expert in enjoying life to the fullest.  But you have never been able to support ${him_opp} in the manner which ${he_opp} insists on, and your bitter fights over money make your time on half-pay even more of a trial than it would be other wise.  Your one relief is that you periodically receive commands at sea that allow you to be far away from your noisome ${spouse_word}.\n          \n          *goto Statlist\n          \n    *else\n    \n        Your life at home with $!{Mrs} $!{Surname}, your ${spouse_word}, remains pleasant and engaging.  $!{He_opp} is loving and affectionate, and ${he_opp} keeps a pleasant and well-run home.  $!{He_opp} is uncomfortable when you socialize with the most senior officers in the Royal Navy, and ${he_opp} does little in satisfying your social obligations.  Still, you always have ${his_opp} devotion and love supporting you.  A happy family life nicely complements your career success.\n        \n        *goto Statlist\n        \n  *else\n    *if HighStatus\n      As a successful naval officer who has become somewhat famous, you are a highly eligible ${bachelor}.  You can make a very good marriage if you wish, whether pursuing an old flame or courting anew.\n      *goto Statlist\n\n    *else\n      *goto Statlist\n\n*label Statlist\n*page_break\n*temp name\n*temp honorific\n*set honorific Mr\n*if Knighted\n  *set honorific Dame\n*set name ((honorific & \" \") & given_name) & (\" \" & surname)\n*temp rank_name\n*set rank_name override_rank\n*if Cashiered\n  *set rank_name \"Cashiered\"\n*if override_rank = \"none\"\n  *set rank_name \"Post-captain\"\n\n*temp made_post_captain\n*set made_post_captain (age - seniority) & \" years old\"\n\nYour final statistics are:\n\n*stat_chart\n  text Name\n  text rank_name Rank\n  text made_post_captain Made Post-Captain\n  \n  percent Sailing\n  percent Gunnery\n  percent Leadership\n  \n  percent Fighting\n  percent Patronage\n  percent Tact\n  \n  percent Likeability\n  percent Honor\n  percent Courage\n  percent Bloodthirst\n  percent Intelligence\n  \n  percent Wealth\n\n*goto_scene ending", "choicescript_description": "A swashbuckling naval adventure, in the spirit of C. S. Forester's Hornblower or Patrick O'Brian's Aubrey/Maturin books, with a dash of Jane Austen.\n\n[i]Choice of Broadsides[/i] is a 60,000 word interactive novel, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n", "choicescript_stats": "*temp seniority_text\n*if rank = 1\n  *set seniority_text seniority2 & \" years\"\n  *goto rank\n*else\n  *set seniority_text seniority & \" years\"\n\n*label rank\n\n*temp rank_name\n*set rank_name override_rank\n*if Cashiered\n  *set rank_name \"Cashiered\"\n*if override_rank = \"none\"\n  *if rank = 0\n    *set rank_name \"Midship\" & man\n    *goto name\n  *elseif rank = 1\n    *set rank_name \"Acting lieutenant\"\n    *goto name\n  *elseif rank = 2\n    *set rank_name \"Lieutenant\"\n    *goto name\n  *elseif rank = 3\n    *set rank_name \"Commander\"\n    *goto name\n  *else\n    *set rank_name \"Post-captain\"\n    *goto name\n*label name\n\n*temp name\n*if no_name\n  *set name \"Unnamed\"\n  *goto display\n*else\n  *temp honorific\n  *set honorific Mr\n  *if Knighted\n    *set honorific Dame\n  *if rank = 0\n    *set honorific Mr & (\" Midship\" & man)\n  *set name ((honorific & \" \") & given_name) & (\" \" & surname)\n\n*label display\n*stat_chart\n  text Name\n  text rank_name Rank\n  text seniority_text Seniority\n  text Age\n  \n  percent Sailing\n  percent Gunnery\n  percent Leadership\n  \n  percent Fighting\n  percent Patronage\n  percent Tact\n  \n  percent Likeability\n  percent Honor\n  percent Courage\n  percent Bloodthirst\n  percent Intelligence\n  \n  percent Wealth\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Advertising[/b]\n  \n  Remove advertisements.\n  \n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n  *goto purchased_list\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  [b]Advertising[/b]\n  \n  You've paid to remove advertisements.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Choice of Broadsides.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*set no_name true\n*script changeBackgroundColor(\"sepia\")\n\n\"Fire the starboard broadside!\" shouts the Captain.\n\nCannons roar as H.M.S. Courageous attacks the enemy frigate.  As one of the junior officers--really, more of an officer in training--you command three guns on Courageous's main gun deck.  The guns of the battery next to yours fire, leaping back against the heavy ropes that prevent them from smashing across the ship. Clouds of white smoke billow about you as you give your gun crew the commands to ready your battery's cannons:  \"Swab!  Powder!  Wadding!  Shot!  Run out the guns!\"\n\nThe Captain yells out, \"Fire as the guns bear!\"  You give your gun crews orders to load and fire as quickly as they can, without waiting for the rest of the broadside. \n\nThey swab out the bore, push in a charge of powder, push wadding down on the powder, load the shot, push the gun out through the gunport, and fire the cannon, with you commanding each step of the process.  \"Swab, powder, wadding, shot, fire!  Swab, powder, wadding, shot--\"\n\nThe world turns upside down as the enemy's broadside rips through the hull some ten feet away.\n\n*page_break\n*script changeBackgroundColor(\"black\")\n\n*set seniority 5\n*set age 19\n\n*set sailing 82\n*set gunnery 73\n*set leadership 26\n*set fighting 70\n*set patronage 50\n*set tact 45\n*set likeability 20\n*set honor 50\n*set courage 50\n*set bloodthirst 50\n*set intelligence 80\n*set wealth 25\n*set Knighted false\n\nThis game is set in a fictional world, similar to our own but with some differences.\n\nFor example, perhaps the ships are crewed by women.  You are a young and gallant officer, but are you a young gentleman or a young lady?\n\n*fake_choice\n  #I'm a young gentleman, of course, and rather confused by the question.\n  #I'm a young lady.  The idea of gentlemen going to sea and being exposed to the horrors of combat--it's a frankly revolting idea.\n\n*script changeBackgroundColor(\"sepia\")\n*set no_name false\n*set rank 4\n*set given_name \"Henry\"\n*set surname \"Brown\"\n*set seniority 0\n*set age 25\n\n*set sailing 82\n*set gunnery 78\n*set leadership 46\n*set fighting 70\n*set patronage 61\n*set tact 55\n*set likeability 48\n*set honor 54\n*set courage 63\n*set bloodthirst 25\n*set intelligence 74\n*set wealth 52\n*set Knighted false\n\n*page_break\n\nBryce performs the introductions. \"This is my young friend Henry Brown. A most up-and-coming young officer, let me tell you! $!{He} most particularly desired to make your acquaintance.\"\n\nMiss Hawthorne looks at you. \"How very nice to meet you,\" she says.\n\n\"The pleasure is all mine,\" you say. Bryce winks at you and drifts away to talk with someone else.\n\nWhat do you do next?\n\n\n*fake_choice\n  #Ask Miss Hawthorne to dance.\n  #Ask Miss Hawthorne to be my partner at whist.\n  #Regale Miss Hawthorne with tales of my life at sea.\n\n*script changeBackgroundColor(\"black\")\n\"I think being alive deserves a drink in celebration,\" you say to Villeneuve, and she grins.\n       \n\"As you say, my friend.\"\n       \nThe two of you wind up in a nondescript tavern, drinking somewhat forgettable ale and telling stories of the great battles and duels you have each fought. If your stories are somewhat embellished in the telling, you are fairly certain Villeneuve's are, as well. . .\n\nAs the evening wears on and the ale continues flowing, Villeneuve becomes more effusive, with broader gestures and excited speech. Her hand brushes against yours, perhaps lingering for just a moment.\n\nHow do you respond?\n*fake_choice\n  #I lean across the table and kiss her.\n  #I invite her back to my rooms.\n  #I ignore the overture--I'm not interested in Villeneuve in that way.\n  #I wish I could reciprocate, but she is a Gaul, and an officer in the Gaulish Navy no less.  Even in peace time, that would be a step too far.\n\n*script changeBackgroundColor(\"sepia\")\nYou set a course to take you towards Lynx as quickly as possible, while maintaining a broadside to broadside fight.  Captain Villeneuve clearly anticipates your plan and tries to edge away from you, keeping this a gunnery battle for as long as possible.\n    \nDespite Lynx's best efforts, you close rapidly and smoothly.  Each ship gets off several broadsides before you lay Dauntless alongside Lynx, but not nearly as many as the Gaulish would have liked.\n      \nYour broadsides wreak havoc on Lynx, giving you a substantial advantage as the boarding action begins.\n\n\nFinally, the battle comes down to a boarding action.  As the ships come alongside each other, the crews charge forward, screaming and waving their cutlasses.  The fighting is bloody and vicious.\n\nAs you rush onto the enemy quarterdeck, sword in hand, you come face to face with Villeneuve.  \nShe hesitates, surprised and upset to encounter you, and her sword drifts out of her guard position.\n\nWhat do you do?\n*fake_choice\n  #I take advantage of her hesitation.  This is war, after all.\n  #I let her recover her poise, but then duty demands that we fight.\n  #Perhaps I can disarm her or otherwise avoid killing her.\n  #I cannot fight her.  I lower my sword.", "startup": "*title Choice of Broadsides\n*author Adam Strong-Morse, Heather Albano, and Dan Fabulich\n\n*comment test 2\n\n*scene_list\n  startup\n  GunneryStartup\n  PrizeShip\n  Examination\n  BadLeadership-PigotScrewup\n  BadLeadership-PunishPigot\n  BadLeadership-Mutiny\n  CuttingOut\n  VilleneuveAshore\n  Marriage\n  CommandMutiny\n  ClimacticBattle\n  WrapUp\n\n\n\n*create given_name \"Henry\"\n*create surname \"Smythe\"\n*create sex \"male\"\n\n*comment  form of address for inferiors; typically, sir or maíam\n*create sir \"sir\" \n\n*comment  polite form of address for opposite sex from PC\n*create maam \"ma'am\" \n\n*comment  form of address for superiors\n*create mr \"Mr.\" \n*create mister \"Mister\"\n*create mr_surname \"Mr. Smythe\"\n*create man \"man\"\n*create men \"men\"\n*create woman \"woman\"\n*create women \"women\"\n*create gentleman \"gentleman\"\n*create gentlemen \"gentlemen\"\n*create lady \"lady\"\n*create ladies \"ladies\"\n*create he \"he\"\n*create his \"his\"\n*create him \"him\"\n*create he_opp \"she\"\n*create his_opp \"her\"\n\n*comment  The opp variables are opposite of the PCs' sex.\n*create him_opp \"her\" \n*create miss \"Miss\"\n*create mrs \"Mrs\"\n*create boy \"boy\"\n*create girl \"girl\"\n*create lad \"lad\"\n*create king \"king\"\n*create kings \"kings\"\n*create firstlieutenant \"DEFAULTFirstLieutenant\"\n*create dame \"Dame\"\n*create son_opp \"daughter\"\n*create mr_opp \"Madam\"\n*create spouse_word \"wife\"\n*create optout false\n*create agility 50\n*create marriage \"love\"\n*create master \"master\"\n\n\n\n*comment  ability at all shiphandling tasks; percentile\n*create sailing 50 \n\n\n\n*comment  general intelligence\n*create intelligence 50 \n\n\n\n*comment  ability at the combat tasks in command; percentile\n*create gunnery 50 \n\n\n\n*comment  ability; governing leading, training, and inspiring crew; %\n*create leadership 50 \n\n\n\n*comment  ability; skill in swordsmanship and pistols; %\n*create fighting 50 \n\n\n\n*comment  support higher up in the Navy and in the government; %\n*create patronage 50 \n\n\n\n*comment  Tact and skill at handling delicate social situations; %\n*create tact 50 \n\n\n\n*comment   Degree to which people like you; %\n*create likeability 50 \n\n\n\n*comment  How honorable you are; %\n*create honor 50 \n\n\n\n*comment  How brave you are; %\n*create courage 50 \n\n\n\n*comment  How willing you are to kill people and to sacrifice your own people to accomplish your goals\n*create bloodthirst 50 \n\n\n\n*comment  age in year\n*create age 19 \n\n\n\n*comment  0=midshipman; 1=acting lieutenant; 2=lieutenant; 3=commander // 4=post captain; in theory, 5+ would be for higher ranks, but not needed in the scope of this game\n*create rank 0 \n\n\n\n*comment  number of years in rank\n*create seniority 0 \n\n\n\n*comment  number of years in current acting rank (rank = 1)\n*create seniority2 0 \n\n\n\n\n\n*comment  true/false\n*create knighted true \n\n\n\n*comment  What scale is this on?  This matters for prize money, but... %\n*create wealth 50 \n\n\n\n*comment  true/false\n*create married true \n\n\n*create spouse_name \"a\"\n\n\n\n*comment  the mutineer\n*create relationshipjones 50 \n\n\n\n*comment  the Gaulish officer\n*create relationshipvilleneuve 50 \n\n\n*create wounds 0\n\n\n*create disgraced false\n\n\n*create cashiered false\n\n\n*create annoyedpigot false\n\n\n*create override_rank \"none\"\n\n\n\n*comment  have we set the player's name yet?\n*create no_name false \n\n\n*create pigot_alive true\n\n\n*create gay false\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  A swashbuckling naval adventure, in the spirit of C. S. Forester's Hornblower or Patrick O'Brian's Aubrey/Maturin books, with a dash of Jane Austen.\n\n  [i]Choice of Broadsides[/i] is a 60,000 word interactive novel, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  *if choice_is_steam\n    *if choice_prerelease\n      [i]You can play the first part of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n      *choice\n        #Sign up to be notified when the game is available.\n          *subscribe {\"now\": true}\n          *restart\n        #Play the first part now for free.\n          *goto purchased\n\n    [i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]Choice of Broadsides[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n      \n      *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n      *page_break_advertisement\n\n      *goto purchased\n    *else\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n\n*label purchased\n\n\n*goto_scene GunneryStartup\n"}};
