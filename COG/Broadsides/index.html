y, and yet Lynx draws ever closer.  Your guns blaze at ${his_opp} sails with chain-shot, hoping to cripple the enemy, but you accomplish nothing but wasting powder.  Lynx bears down on H.M.S. Dauntless inexorably.  If you are to avoid defeat, you will have to prevail in a boarding action.\n  \n  *goto BoardingAction\n\n*label Escape\n*page_break \n\nYou set course back for $!{Kings}port.  Upon returning to $!{Kings}port harbor, flags immediately signal for you to report to the Admiral on H.M.S. Indomitable.\n\nThe Admiral listens grimly to your report.\n\n\"We did our best, ${sir},\" you conclude.\n\n\"Perhaps you did, perhaps you did,\" the Admiral replies.\n\n*if (Patronage > 60)\n  The Admiral thinks for a moment.  \"I suppose there's nothing for it.  I'm going to restore you to standard commerce raiding duty.  It seems to be all that you are good for.\"\n\n  For the rest of your assignment on the $!{Kings}port station, you find that the Admiral is cold to you, and you are not surprised when orders come for you to return to Albion.  You do win substantial prize money taking Gaulish merchant ships though, and your strong patronage means the Admiral cannot take any formal action against you.\n\n  *set Patronage %-15\n  *set Wealth %+15\n  *finish\n*elseif (Patronage > 35)\n\n  The Admiral nods, as if ${he} has been making up ${his} mind.  \"We will see what the court-martial concludes.  I have decided to proffer charges against you for failure to do the utmost to destroy the enemy.\"\n\n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but ${his} testimony is fairly damning.  In the end, you are greatly relieved when the panel of fellow captains returns your sword to you hilt first with a verdict of \"not proven.\"  Nonetheless, the court-martial, and the attendant disgraceful reputation for cowardice, ruins your career.\n\n  *set disgraced true\n  *set Patronage %-50\n  *finish\n*elseif ((Patronage > 15) or (Likeability > 35))\n\n  The Admiral nods, as if ${he} has been making up ${his} mind.  \"We will see what the court-martial concludes.  I have decided to proffer charges against you for failure to do the utmost to destroy the enemy.\"\n\n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but ${his} testimony is fairly damning.  You have never had much support in the rest of the Royal Navy.  The board of fellow captains that makes up the court-martial votes to convict you, and you return to the court to see your naked sword positioned point-first towards you.\n \n  The court-martial sentences you to be discharged from the Royal Navy in disgrace--never again to serve on one of $!{His} Majesty's ships.  Old friends and colleagues shun you, but at least they spared you the ignominy of execution.\n  *set cashiered true\n  *set disgraced true\n  *set Patronage %-65\n  *finish\n\n*else\n\n  The Admiral nods, as if ${he} has been making up ${his} mind.  \"We will see what the court-martial concludes.  I have decided to proffer charges against you for failure to do the utmost to destroy the enemy.\"\n\n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but ${his} testimony is fairly damning.  You have never had much support in the rest of the Royal Navy.  The board of fellow captains that makes up the court-martial votes unanimously to convict you, and you return to the court to see your naked sword positioned point-first towards you.\n\n  The court-martial sentences you to death.  On a cold gray morning, a firing squad ends your life.\n\n  *set disgraced true\n  *set Patronage %-75\n  *goto_scene death\n\n\n*label BoardingAction\n*comment If fight inconclusive and not broken off, boarding action with PC crossing swords with Villeneuve.  If RelationshipVilleneuve high, ${he} hesitates, giving the PC the advantage.  If high Fighting, PC wins cleanly.  If medium, PC wins but badly wounded.  If low, PC loses (but PC's crew may, depending on stats, carry the day anyway).  If wounds > X, go to death scene.\n\n*temp ModifiedFighting\n*comment ModifiedFighting is Fighting adjusted to take account of which ship has the advantage.\n\n*if (Advantage=\"Dauntless\")\n  *set ModifiedFighting (Fighting %+20)\n  *goto A\n  \n*elseif (Advantage=\"Lynx\")\n  *set ModifiedFighting (Fighting %-20)\n  *goto A\n*else\n  *set ModifiedFighting Fighting\n  *goto A\n\n*label A\n\nFinally, the battle comes down to a boarding action.  As the ships come alongside each other, the crews charge forward, screaming and waving their cutlasses.  The fighting is bloody and vicious.\n\n*if (RelationshipVilleneuve > 70)\n\n  As you rush onto the enemy quarterdeck, sword in hand, you come face to face with Villeneuve.  $!{He} hesitates, surprised and upset to encounter you, and ${his} sword drifts out of ${his} guard position.\n  \n  What do you do?\n  *choice\n    #I take advantage of ${his} hesitation.  This is war, after all.\n      *set Honor %-10\n      *set Bloodthirst %+15\n      *set RelationshipVilleneuve %-25\n      *set Intelligence %+10\n      *set ModifiedFighting %+10\n      *goto LethalFight\n    #I let ${him} recover ${his} poise, but then duty demands that we fight.\n      *set Honor %+10\n      *set Bloodthirst %+5\n      *set RelationshipVilleneuve %-10\n      *set Intelligence %-10\n      *goto LethalFight\n    #Perhaps I can disarm ${him} or otherwise avoid killing ${him}.\n      *set Honor %+20\n      *set Bloodthirst %-15\n      *set RelationshipVilleneuve %+10\n      *set Intelligence %-20\n      *set Courage %+10\n      *goto DisarmFight\n    #I cannot fight ${him}.  I lower my sword.\n      *set Honor %-15\n      *set Bloodthirst %-25\n      *set RelationshipVilleneuve %+20\n      *set Intelligence %-15\n      \n      Unfortunately, after a moment's hesitation, Captain Villeneuve decides that ${he} can fight you.  Instead of having the advantage, you have given it to ${him}.\n      \n      *goto LethalFight\n      \n*elseif (RelationshipVilleneuve \u003c 30)\n\n  As you rush onto the enemy quarterdeck, sword in hand, you come face to face with your old nemesis Villeneuve.  $!{He} gives you a vicious smile.  \"Now, we finish this.  I look forward to killing you.\"  With that, the fight is on.\n  \n  *goto LethalFight\n  \n*else\n\n  As you rush onto the enemy quarterdeck, sword in hand, you come face to face with Captain Villeneuve.  $!{He} swings ${his} sword up in a salute and drops into a guard position.\n  \n  *goto LethalFight\n\n\n*label LethalFight\n\n*if (ModifiedFighting > 75)\n\n  The fight is intense, but you are a better fencer than Villeneuve ever was.  After a few quick exchanges, you feint towards ${his} left, then beat ${his} sword aside and thrust towards the right of ${his} body.  Villeneuve slumps to the ground as you run ${him} through.  Your long years of battle experience tell you that ${he} will be dead within minutes.\n\n  How do you feel about Villeneuve's death?\n  *if (RelationshipVilleneuve > 70)\n    *fake_choice\n      #$!{He} was a worthy foe, but a foe nonetheless.\n      #C'est la guerre.\n      #My heart is heavy, but duty required nothing less.\n      #But. . . but. . . What have I done?  How could I kill Villeneuve?\n    *goto WiseWordsA\n  *elseif (RelationshipVilleneuve > 30)\n    *fake_choice\n      #At last!  I've finally killed that dog.\n      #$!{He} was a worthy foe, but a foe nonetheless.\n      #C'est la guerre.  I had no choice and have no regrets.\n      #My heart is heavy, but duty required nothing less.\n      #But. . . but. . . What have I done?  How could I kill my friend?\n    *goto WiseWordsA\n  *else\n    *fake_choice\n      #At last!  I've finally killed that dog.\n      #$!{He} was a worthy foe, but a foe nonetheless.\n      #C'est la guerre.  I had no choice and have no regrets.\n      #My heart is heavy, but duty required nothing less.\n    *goto WiseWordsA\n\n\n  *label WiseWordsA    \n  Wise words, indeed.  In any event, ${he} is dead, and you have won the boarding action.\n  \n  *if (Advantage = \"Lynx\")\n    *goto VictoryHeavyDamage\n  *else\n    *goto VictoryLightDamage\n    \n*elseif (ModifiedFighting > 50)\n\n  The fight is intense.  You quickly wound Villeneuve, but ${he} answers with a vicious blow to your left arm, hurting you badly.  You fear that ${he} will prevail, but finally you feint towards ${his} left, then beat ${his} sword aside and thrust towards the right of ${his} body.  Villeneuve slumps to the ground as you run ${him} through.  Your long years of battle experience tell you that ${he} will be dead within minutes.\n\n  How do you feel about Villeneuve's death?\n  *if (RelationshipVilleneuve > 70)\n    *fake_choice\n      #$!{He} was a worthy foe, but a foe nonetheless.\n      #C'est la guerre.\n      #My heart is heavy, but duty required nothing less.\n      #But. . . but. . . What have I done?  How could I kill Villeneuve?\n    *goto WiseWordsB\n  *elseif (RelationshipVilleneuve > 30)\n    *fake_choice\n      #At last!  I've finally killed that dog.\n      #$!{He} was a worthy foe, but a foe nonetheless.\n      #C'est la guerre.  I had no choice and have no regrets.\n      #My heart is heavy, but duty required nothing less.\n      #But. . . but. . . What have I done?  How could I kill my friend?\n    *goto WiseWordsB\n  *else\n    *fake_choice\n      #At last!  I've finally killed that dog.\n      #$!{He} was a worthy foe, but a foe nonetheless.\n      #C'est la guerre.  I had no choice and have no regrets.\n      #My heart is heavy, but duty required nothing less.\n    *goto WiseWordsB\n\n  *label WiseWordsB    \n  Wise words, indeed.  In any event, ${he} is dead, and you have won the boarding action.\n\n  *set Wounds +1\n  *if (Advantage = \"Lynx\")\n    *goto VictoryHeavyDamage\n  *else\n    *goto VictoryLightDamage\n    \n*elseif (ModifiedFighting > 25)\n\n  The fight is intense.  You quickly wound Villeneuve, but ${he} answers with a vicious blow to your left arm, cutting your hand clean off.  You fear that ${he} will prevail, but finally you feint towards ${his} left, then beat ${his} sword aside and thrust towards the right of ${his} body.  Villeneuve slumps to the ground as you run ${him} through.  Your long years of battle experience tell you that ${he} will be dead within minutes.\n  \n  As ${he} falls, you drop to your knees.\n  \n  *set Wounds +2\n  *goto VictoryHeavyDamage\n  \n*else\n  The fight is intense.  It quickly becomes apparent that Villeneuve is a better fencer than you have ever been.  At first you fight to win, then you fight desperately just to last long enough to hope that your crew will overwhelm ${his}.  Finally, you struggle just to survive.\n  \n  *if (RelationshipVilleneuve > 30)\n  \n    When Villeneuve sees an opening to defeat you cleanly, ${he} takes it.  You collapse to the deck, slain with a clean thrust to the heart.\n    \n    *goto KilledInDuel\n    \n  *else\n  \n     Villeneuve sees ${his} opening and thrusts at your abdomen.  The wound is terrible, and you know that you will not survive it, but it will take a long time for you to bleed to death.  You see Villeneuve looking down at you with a cold smile, enjoying your suffering.\n     \n    *goto KilledInDuel\n    \n  *label KilledInDuel\n  *if (((Leadership > 65) and (Advantage = \"None\")) or ((Leadership > 40) and (Advantage = \"Dauntless\")))\n    *goto VictoryDeath\n  *else\n    *goto DefeatDeath\n\n*label DisarmFight\n*if (ModifiedFighting > 80)\n\n  The fight is intense, but you are a better fencer than Villeneuve ever was.  After a few quick exchanges, you wound ${him} on ${his} sword hand.  A quick twist of your wrist sends ${his} blade skittering along the deck.\n  \n  *if (RelationshipVilleneuve > 70)\n  \n    Villeneuve gives you a small bow as  ${he} surrenders.  \"If I must lose my ship, at least you will benefit from it, $!{Surname}.\"\n    \n    *goto Disarmed\n  *label Disarmed\n  *if (Advantage = \"Lynx\")\n    *goto VictoryHeavyDamage\n  *else\n    *goto VictoryLightDamage\n    \n*elseif (ModifiedFighting > 60)\n\n  The fight is intense.  You quickly gain the advantage, but ${he} answers with a vicious blow to your left arm, hurting you badly.  You fear that the decision to try to disarm ${him} was a poor one, but finally you you wound ${him} on ${his} sword hand.  A quick twist of your wrist sends ${his} blade skittering along the deck.\n  \n  *set wounds +1\n  *if (RelationshipVilleneuve > 70)\n  \n    Villeneuve gives you a small bow as  ${he} surrenders.  \"If I must lose my ship, at least you will benefit from it, $!{Surname}.\"\n    \n    *goto Disarmed\n  *if (Advantage = \"Lynx\")\n    *goto VictoryHeavyDamage\n  *else\n    *goto VictoryLightDamage\n    \n*elseif (ModifiedFighting > 40)\n\n  The fight is intense.  You have the advantage, but not enough of one to disarm ${him} cleanly.  Villeneuve strikes a vicious blow to your left arm, cutting your hand clean off, and you realize that you must meet ${his} attack with deadly force.\n  \n  *page_break\n  \n  You fear that ${he} will prevail, but finally you feint towards ${his} left, then beat ${his} sword aside and thrust towards the right of ${his} body.  Villeneuve slumps to the ground as you run ${him} through.  Your long years of battle experience tell you that ${he} will be dead within minutes.\n  \n  As ${he} falls, you drop to your knees.\n\n  How do you feel about Villeneuve's death?\n  *fake_choice\n    #$!{He} was a worthy foe, but a foe nonetheless.\n    #C'est la guerre.  I had no choice and have no regrets.\n    #My heart is heavy, but duty required nothing less.\n    #But. . . but. . . What have I done?  How could I kill my friend?\n    \n  Wise words, indeed.  In any event, ${he} is dead, and you have won the boarding action.\n\n  *set wounds +2\n  *if (Advantage = \"Lynx\")\n    *goto VictoryHeavyDamage\n  *else\n    *goto VictoryLightDamage\n    \n*else\n\n  The fight is intense.  It quickly becomes apparent that Villeneuve is too good a fencer for you to disarm ${him}.  At first you fight to win, then you fight desperately just to last long enough to hope that your crew will overwhelm ${his}.  Finally, you struggle just to survive.  Perhaps you could have defeated ${him} if you had fought to kill from the start, but you will never know.\n  \n  *if (RelationshipVilleneuve > 30)\n  \n    When Villeneuve sees an opening to defeat you cleanly, ${he} takes it.  You collapse to the deck, slain with a clean thrust to the heart.\n    \n    *goto KilledInDuel\n    \n  *else\n  \n     Villeneuve sees ${his} opening and thrusts at your abdomen.  The wound is terrible, and you know that you will not survive it, but it will take a long time for you to bleed to death.  You see Villeneuve looking down at you with a cold smile, enjoying your suffering.\n     \n    *goto KilledInDuel\n\n*label VictoryLightDamage\n*if (wounds >= 4)\n\n  You spend hours under the saw of the surgeon, and for nearly a day it looks like you might pull through.  Unfortunately, your body has taken more punishment than it can withstand, and all goes dark.\n  \n  *goto VictoryDeath\n  \nH.M.S. Dauntless is lightly damaged, when all is said and done, and you have captured Lynx.  You sail back to $!{Kings}port with the prize.  The Admiral is most pleased, and promotes $!{Mr} $!{FirstLieutenant} to commander as a sign of ${his} regard. \n\nYou are then assigned commerce raiding duties--by the time you receive orders to return to Albion, you have made a small fortune in prize money.\n\n*set Wealth %+25\n\n*label Knighthood\n*set Age +2\n*set Seniority +2\n*if ((Age-Seniority) \u003c 40)\n  Finally, you arrive back in Albion.  You are hailed as a hero upon your arrival--the whole nation rejoiced over the report of your victory. \n\n  The $!{King} ${him}self requests your presence at court.  The $!{King} calls you forward and commands you to kneel.  $!{He} strikes you on each shoulder with a sword and confers the title of Knight of the Most Honorable Order of the Vigil upon you.  Congratulations, $!{Dame} $!{Given_name}.\n  *set Knighted true\n  *finish\n*else\n  Finally, you arrive back in Albion.  The nation welcomes you home as a hero in honor of your victory over Lynx and Captain Villeneuve.  Your triumph completely erases some of the setbacks earlier in your career.\n  *set Knighted false\n  *finish\n\n*label VictoryHeavyDamage\n*if (wounds >= 4)\n\n  You spend hours under the saw of the surgeon, and for nearly a day it looks like you might pull through.  Unfortunately, your body has taken more punishment than it can withstand, and all goes dark.\n  \n  *goto VictoryDeath\n  \nH.M.S. Dauntless is badly damaged, nearly crippled, but you have captured Lynx.  You sail back to $!{Kings}port with the prize.  The Admiral is most pleased, and promotes $!{Mr} $!{FirstLieutenant} to commander as a sign of ${his} regard. \n\nH.M.S. Dauntless needs extensive refitting, and you are unable to resume your commerce raiding duties.  After a few months, but before Dauntless is ready for service again, orders arrive for you to return to Albion on a dispatch sloop.\n*set Wealth %+7\n\n*goto Knighthood\n\n*label VictoryDeath\n\nAt least you have done your duty:  Lynx is defeated and brought back as a prize by H.M.S. Dauntless.  $!{Mr} $!{FirstLieutenant} does an able job commanding H.M.S. Dauntless after your demise and receives a promotion to captain and command of the ship.  But you do not know of any of that.\n\n*goto_scene death\n\n*label Defeat\n\nA boarding party comes aboard to take over your ship.  With a heavy heart, you surrender your sword to them.  You spend the next five years as a prisoner of the Gaulish.\n\n*set Age +6\n*set Seniority +6\n\nAfter a long and dreary time as a prisoner, you are finally exchanged back to Albion.  But your indignities are not over--you face a court-martial for losing your ship.\n\n*if (patronage>70)\n  *set patronage %-10\n  \n  The court-martial is essentially a formality.  You know beforehand that there is no real risk of conviction, and sure enough, the court-martial concludes that you did everything possible to defeat the enemy and were simply defeated by a superior foe.  Your patronage and support within the Royal Navy are sufficient that you are even able to continue actively serving.\n  *finish\n  \n*elseif (patronage > 35)\n  *set patronage %-10\n  *set Disgraced true\n  \n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but the court-martial is fairly hostile to you.  In the end, you are greatly relieved when the panel of fellow captains returns your sword to you hilt first with a verdict of \"not proven.\"  Nonetheless, the court-martial, and the attendant reputation for incompetence, ruins your career.\n  \n  *finish\n*elseif ((patronage > 10) or (likeability > 50))\n  *set patronage %-10\n  *set Disgraced true\n  *set Cashiered true\n  \n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but the court-martial is hostile to you for losing your ship.  You have never had much support in the rest of the Royal Navy.  The board of fellow captains that makes up the court-martial votes to convict you, and you return to the court to see your naked sword positioned point-first towards you.\n \n  The court-martial sentences you to be discharged from the Royal Navy in disgrace--never again to serve on one of $!{His} Majesty's ships.  Old friends and colleagues shun you, but at least they spared you the ignominy of execution.\n  *finish\n  \n*else\n\n  The court-martial is the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but ${his} testimony is fairly damning.  You have never had much support in the rest of the Royal Navy.  The board of fellow captains that makes up the court-martial votes unanimously to convict you, and you return to the court to see your naked sword positioned point-first towards you.\n\n  The court-martial sentences you to death.  On a cold gray morning, a firing squad ends your life.\n  *set Disgraced true\n  *goto_scene death\n\n*label DefeatDeath\n\nYou die before the battle is resolved, but Lynx ultimately captures H.M.S. Dauntless.  You are remembered as the captain who lost a frigate duel--not with a particular degree of shame, as you were outgunned, but nonetheless, you failed in your duty.\n\n*goto_scene death", "commandmutiny": "*temp sloop_happy\n*set sloop_happy (likeability %-30)\n*temp sloop_discipline\n*set sloop_discipline (leadership %-35)\n*temp HMS\n*temp sloop\n*temp Atrocity\n*set Atrocity false\n*temp Firstchoice\n*temp Mutiny\n*set Mutiny false\n\n*comment I'm using sloop_happy and sloop_discipline here.  Should these just be likeability and leadership?\n\n*if (rank=4)\n  *comment Captain, therefore the Sloop is rerated as a sixth-rate ship\n  *set HMS \"H.M.S.\"\n  *set sloop \"ship\"\n  *goto Assume_Command\n*else\n  *comment Commander, therefore assuming command of a sloop.\n  *set HMS \"H.M. Sloop\"\n  *set sloop \"sloop\"\n  *goto Assume_Command\n*label Assume_Command\n\nAt the crack of dawn, you walk to the end of the long pier, where you first catch sight of ${HMS} Defender.\n\nIt's . . . not all that you might hope for.  There are barnacles on the hull; the\nsails are tattered at the edges; the paint is worn.\n*if (sloop=\"ship\")\n  \n  Indeed, Defender is scarcely even a real ship.  Until very recently, the Royal Navy categorized Defender as a sloop-of-war.  As a post-captain, you should be in command of a ship, not a mere sloop, so when the Admiralty assigned you to Defender, they simply re-rated ${him_opp} as a sixth-rate ship.  But despite the formality, in reality Defender remains a dreary sloop.\n  \n  *goto LTintro\n\n*label LTintro\n*comment TODO show the introduction; how do you report?  Forester writes \"reports himself\"\nIt's no better as you find yourself standing\non the dirty, uneven deck, introducing yourself to your first (and only) lieutenant.\n\n\"Welcome aboard Defender, ${sir},\" says ${Mr} Benton proudly.  \"Finest ${sloop} in the navy!\"  $!{His} uniform looks as if ${he}'d put it on in the dark.  $!{He} wouldn't know the finest ${sloop} in the navy if it raked ${him} with a broadside.\n\nYou promptly draw out the orders from the Admiralty placing you in command of ${HMS} Defender.  \n\n*if (sloop=\"sloop\")\n  When you finish reading your orders aloud to the crew, you are officially the new ${master} and commander of the ${sloop}.\n  *goto JonesIntro\n*else\n  When you finish reading your orders aloud to the crew, you are officially the new captain of the ${sloop}.\n*label JonesIntro\n\n*page_break\n\nOut of the corner of your eye, you spot a familar sailor: $!{Master}'s Mate Jones!  Ah, make that just \"Jones\" since ${he} was disrated in connection with that unpleasant business with ${Mr} Pigot back on H.M.S. Courageous.\n\n*if RelationshipJones > 60\n  $!{He} greets you with a salute and a smile.  At least there's one good sailor on this ${sloop}!\n  *goto master\n*elseif RelationshipJones > 40 \n  $!{He} greets you with a respectful salute.\n  *goto master\n*else\n  $!{He} greets you with a respectful salute, but ${he}'s obviously disappointed to find ${him}self in your command again.  (As if you didn't have enough to worry about!)\n\n*label master\n*page_break\n*comment How do you report for duty?\n*comment TODO is this where we explain the deal with M&C vs. Master's Mate?\n*temp masters\n*set masters \"masters\"\n*if sex = \"female\"\n  *set masters \"mistresses\"\n\n*if (sloop=\"sloop\")\n  \"Captain ${Surname}, ${sir}?\" says a middle-aged ${man} coming up from below deck.  \"Carter, reporting for duty.  I'm the senior ${master}'s mate and acting ${master} of Defender.\"\n\n  A post-captain would have a sailing ${master} under ${him} as the most senior warrant officer, but on a sloop the commander is technically also the ${master}.  You still have a few ${master}'s mates--experienced ratings working to get their warrants as ${masters} in the Royal Navy.  ${Mr} Carter, as the senior mate, will fill the role of the sloop's sailing ${master} in all but title.\n\n  \"${Mr} Carter,\" you reply, \"make the sloop ready for some shake-down maneuvers.  I want to see ${his_opp} capabilities.\"\n  \n  *goto ShakeDown\n*else\n  \"Captain ${Surname}, ${sir}?\" says a middle-aged ${man} coming up from below deck.  \"Carter, reporting for duty.  I'm the sailing ${master} of Defender.\"\n\n  As a post-captain you have a sailing ${master} under you as the most senior warrant officer.  ${Mr} Carter probably received ${his} warrant as a ${master} from the Admiralty at the same time that Defender suddenly became a sixth-rate ship instead of a sloop.  $!{He} has a few ${master}'s mates under ${him}--experienced ratings working to get their warrants as ${masters} in the Royal Navy. \n\n  \"${Mr} Carter,\" you reply, \"make the ship ready for some shake-down maneuvers.  I want to see ${his_opp} capabilities.\"\n  \n  *goto ShakeDown\n\n*label ShakeDown\n\n\"Aye aye, ${sir}!\"\n\nYou inspect Carter carefully as ${he} readies the ${sloop} for basic action.\nYou quickly realize that this ${man} is the only force holding the ${sloop} together; Benton gives orders, but Carter has them followed.  Under Carter's guidance, you manage to get the ${sloop} out onto open waters.\n\n*page_break\n\nThe shake-down maneuvers are embarrassing.  You sail the ${sloop}\naround, clear for battle, and fire off a broadside.  The sails are not hauled taut, it\ntakes longer to raise and lower the sails than it should, and it takes\nmuch longer (a full minute or more) to clear the ${sloop} for action than\nit ought.  The broadside is ragged and slow, and one\nsailor injures ${him}self by getting ${his} foot crushed by a gun\ncarriage.\n\nAt this point, you believe that, overall, the crew is \n*if ((sloop_happy > 75) and (sloop_discipline > 75))\n      happy and well disciplined.\n      *goto Drills\n*elseif ((sloop_happy > 75) and (sloop_discipline > 50))\n      happy and with reasonable but not great discipline.\n      *goto Drills\n*elseif ((sloop_happy > 75) and (sloop_discipline > 25))\n      happy but poorly disciplined.\n      *goto Drills\n*elseif (sloop_happy > 75)\n      happy but with terrible discipline.\n      *goto Drills\n*elseif ((sloop_happy > 50) and (sloop_discipline > 75))\n      reasonably happy and well disciplined.\n      *goto Drills\n*elseif ((sloop_happy > 50) and (sloop_discipline > 50))\n      tolerably happy and with reasonable but not great discipline.\n      *goto Drills\n*elseif ((sloop_happy > 50) and (sloop_discipline > 25))\n      reasonably happy but poorly disciplined.\n      *goto Drills\n*elseif (sloop_happy > 50)\n      reasonably happy but with terrible discipline.\n      *goto Drills\n*elseif ((sloop_happy > 25) and (sloop_discipline > 75))\n      fairly unhappy but well disciplined.\n      *goto Drills\n*elseif ((sloop_happy > 25) and (sloop_discipline > 50))\n      fairly unhappy yet reasonably disciplined.\n      *goto Drills\n*elseif ((sloop_happy > 25) and (sloop_discipline > 25))\n      fairly unhappy and poorly disciplined.\n      *goto Drills\n*elseif (sloop_happy > 25)\n      fairly unhappy and with terrible discipline.\n      *goto Drills\n*elseif ((sloop_discipline > 75))\n      very unhappy but well disciplined.\n      *goto Drills\n*elseif ((sloop_discipline > 50))\n      very unhappy yet reasonably disciplined.\n      *goto Drills\n*elseif ((sloop_discipline > 25))\n      very unhappy and poorly disciplined.\n      *goto Drills\n*else\n      very unhappy and with terrible discipline.\n      *goto Drills\n\n*label Drills\n\n\nYou're going to have to turn this ${sloop} into a credible fighting vessel; to do that, you'll have to put the ${men} to work.  It looks like this crew isn't particularly used to hard work yet.\n\nWhere do you want them to focus their efforts?\n\n*choice\n  #Drill them on gunnery.\n    *set gunnery %+ 15\n    *set Firstchoice \"gunnery\"\n    For day after day, you drill the ${men} on gunnery.  You clear the\n    ${sloop} for action, run out the guns, and blaze away with both\n    broadsides as fast as the guns can be cleaned, loaded, run out, and\n    fired.  The work is dirty and hot, with blasts of heat and smoke every\n    time the guns fire.  Every broadside is timed, with a tongue-lashing\n    or worse for any sailor who slows down the firing.\n    \n    After hours of\n    non-stop gunnery, you vary the pace for a bit, floating several empty\n    barrels past the ${sloop}.  Your gun captains practice their aim as each\n    gun fires at the target in turn.  Right as the crew is beginning to\n    relax, settling in to the slower rhythm, you shout for them to resume\n    full speed broadsides, firing as fast as they can.  When the ${men}\n    are completely exhausted struggling through the routine, you order\n    them to tie down the guns and restore the ${sloop} to normal sailing\n    conditions. . . only to order the ${sloop} cleared for battle and another\n    broadside fired again.  By the end of the day, the ${men} stagger down\n    for their dinner.  And then the next day, starting with a tired crew,\n    you do it again.\n    \n    After several days of this brutal regimen, you see real improvement.\n    The ${men} are more alert, quicker in responding to the changes you\n    order.  And the speed of your broadside has improved, with the reload\n    time reduced by nearly a third.  The ${men} groan as you order them to\n    the guns each day, but slowly they are becoming a credit to the Royal\n    Navy.\n    *goto how_hard\n  #Practicing sailing maneuvers.\n    *set sailing %+ 15\n    *set Firstchoice \"sailing\"\n    For day after day, you drill the ${men} on sailing.  You hoist all\n    sail, then send the hands aloft to lower and reef the sails.  As soon\n    as the last top${man} is back on the deck, you send them back up to\n    unreef and spread the sails again.  You tack into the wind, rapidly\n    switching your sailing points and drilling the crew on switching\n    tacks.   Then you bring the ${sloop} about and order the crew to quickly\n    set the sails to run before the wind.  As soon as they are done with\n    that adjustment, it's time to turn across the wind.  When the ${men}\n    have adjusted again, it's back to tacking into the wind.  The work is\n    hard and requires constant attention--any carelessness aloft could be\n    deadly.  $!{Mr} Carter times every maneuver, with a\n    tongue-lashing or worse for any sailor who is slow about ${his} duty.\n    By the end of the day, the ${men} stagger down for their dinner.  And\n    then the next day, starting with a tired crew, you do it again.\n    \n    After several days of this brutal regimen, you see real improvement.\n    The ${men} are more alert, quicker in responding to the changes you\n    order.  The crispness and speed of the ${sloop}'s maneuvers improves, and\n    you find that the ${sloop} is both more maneuverable and faster than you\n    had thought when you first assumed command.  The ${men} groan as you\n    order them aloft each day, but slowly they are becoming a credit to\n    the Royal Navy.\n    *goto how_hard\n  #Clean the ${sloop} completely.\n    *set sloop_happy %+ 20\n    *set sloop_discipline %+ 15\n    *set Firstchoice \"cleaning\"\n    Royal Navy vessels are normally fairly clean, but you take it to another\n    level.  The ${men} holystone the deck to a smooth white sheen.  They\n    spend hours on their knees scrubbing with deck with the soft\n    sandstone, then pumping water across it, and then scrubbing the deck\n    again.  The work is back-breaking and their hands are scraped almost\n    raw by the effort, but now the ${sloop}'s deck is so clean you could eat off of it.\n    \n    As they come off deck cleaning duty, they go to polishing the\n    brasswork of the ${sloop}.  Every last brass fitting is polished, shined,\n    and polished some more.  The guns are oiled and cleaned, the ropes\n    neatly coiled, and every last sail is mended.  You heel the ${sloop} over\n    onto its side and send ${men} overboard on lines to scrape the hull\n    clean, and then repeat the process on the other side.  And every last\n    bit of paint on the hull is touched up by the time you're done.\n    \n    The\n    process takes days, but by the end of it the ${sloop} looks like a\n    different vessel.  Gone is the ugly ${sloop}, worse than some merchant\n    ships, that you took command of.  You now command a ${sloop} that would\n    compare well to any in the Royal Navy.  What's more, the ${men} seem\n    to notice the change, too, and walk with a certain pride.\n\n    The discipline of the ${sloop} increases as does its happiness.\n    \n*label how_hard\nHowever, it's clear that they haven't had to work this hard in quite some time; you manage to overhear a few surly grumbles from the crew, though you don't manage to catch any particular sailor grumbling.\n\n*choice\n  #Keep working them as hard as they can.\n    *set sloop_happy %-10\n    *set sloop_discipline %+ 30\n    What task do you turn to next?\n    *choice\n      *if (Firstchoice != \"gunnery\")\n        #Drill them on gunnery.\n          *set gunnery %+ 8\n    \n          For day after day, you drill the ${men} on gunnery.  You clear the ${sloop} for action, run out the guns, and blaze away with both broadsides as fast as the guns can be cleaned, loaded, run out, and fired.  The work is dirty and hot, with blasts of heat and smoke every time the guns fire.  Every broadside is timed, with a tongue-lashing or worse for any sailor who slows down the firing.\n          \n          After hours of non-stop gunnery, you vary the pace for a bit, floating several empty barrels past the ${sloop}.  Your gun captains practice their aim as each gun fires at the target in turn.  Right as the crew is beginning to relax, settling in to the slower rhythm, you shout for them to resume full speed broadsides, firing as fast as they can.  When the ${men} are completely exhausted struggling through the routine, you order them to tie down the guns and restore the ${sloop} to normal sailing conditions. . . only to order the ${sloop} cleared for battle and another broadside fired again.  By the end of the day, the ${men} stagger down for their dinner.  And then the next day, starting with a tired crew, you do it again.\n    \n          After several days of this brutal regimen, you see real improvement.  The ${men} are more alert, quicker in responding to the changes you order.  And the speed of your broadside has improved, with the reload time reduced by nearly a third.  The ${men} groan as you order them to the guns each day, but slowly they are becoming a credit to the Royal Navy.\n\n          The ${sloop}'s discipline increases greatly, but its happiness declines.\n          *goto HardWork\n      *if (Firstchoice != \"sailing\")\n        #Practicing sailing maneuvers.\n          *set sailing %+ 8\n          For day after day, you drill the ${men} on sailing.  You hoist all sail, then send the hands aloft to lower and reef the sails.  As soon as the last top${man} is back on the deck, you send them back up to unreef and spread the sails again.  You tack into the wind, rapidly switching your sailing points and drilling the crew on switching tacks.   Then you bring the ${sloop} about and order the crew to quickly set the sails to run before the wind.  As soon as they are done with that adjustment, it's time to turn across the wind.  When the ${men} have adjusted again, it's back to tacking into the wind.  The work is hard and requires constant attention--any carelessness aloft could be deadly.  $!{Mr} Carter times every maneuver, with a tongue-lashing or worse for any sailor who is slow about ${his} duty.  By the end of the day, the ${men} stagger down for their dinner.  And then the next day, starting with a tired crew, you do it again.\n    \n          After several days of this brutal regimen, you see real improvement.  The ${men} are more alert, quicker in responding to the changes you order.  The crispness and speed of the ${sloop}'s maneuvers improves, and you find that the ${sloop} is both more maneuverable and faster than you had thought when you first assumed command.  The ${men} groan as you order them aloft each day, but slowly they are becoming a credit to the Royal Navy.\n\n          The ${sloop}'s discipline increases greatly, but its happiness declines.\n\n          *goto HardWork\n      *if (Firstchoice != \"cleaning\")\n        #Clean the ${sloop} completely.\n          *set sloop_happy %+ 5\n          *set sloop_discipline %+ 8\n          Royal Navy vessels are normally fairly clean, but you take it to another level.  The ${men} holystone the deck to a smooth white sheen.  They spend hours on their knees scrubbing with deck with the soft sandstone, then pumping water across it, and then scrubbing the deck again.  The work is back-breaking and their hands are scraped almost raw by the effort, but the ${sloop}'s deck is clean enough to eat off of.\n\n          As they come off deck cleaning duty, they go to polishing the brasswork of the ${sloop}.  Every last brass fitting is polished, shined, and polished some more.  The guns are oiled and cleaned, the ropes neatly coiled, and every last sail is mended.  You heel the ${sloop} over onto its side and send ${men} overboard on lines to scrape the hull clean, and then repeat the process on the other side.  And every last bit of paint on the hull is touched up by the time you're done.\n      \n          The process takes days, but by the end of it the ${sloop} looks like a different vessel.  Gone is the ugly ${sloop}, worse than some merchant ships, that you took command of.  You now command a ${sloop} that would compare well to any in the Royal Navy.  What's more, the ${men} seem to notice the change, too, and walk with a certain pride.\n\n          The ${sloop}'s discipline increases greatly, but its happiness declines slightly.\n\n          *goto HardWork\n\n    *label HardWork \n    \n    You believe that, overall, the crew is \n    *if ((sloop_happy > 75) and (sloop_discipline > 75))\n      happy and well disciplined.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 75) and (sloop_discipline > 50))\n      happy and with reasonable but not great discipline.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 75) and (sloop_discipline > 25))\n      happy but poorly disciplined.\n      *goto rolling_cannonballs\n    *elseif (sloop_happy > 75)\n      happy but with terrible discipline.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 50) and (sloop_discipline > 75))\n      reasonably happy and well disciplined.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 50) and (sloop_discipline > 50))\n      tolerably happy and with reasonable but not great discipline.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 50) and (sloop_discipline > 25))\n      reasonably happy but poorly disciplined.\n      *goto rolling_cannonballs\n    *elseif (sloop_happy > 50)\n      reasonably happy but with terrible discipline.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 25) and (sloop_discipline > 75))\n      fairly unhappy but well disciplined.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 25) and (sloop_discipline > 50))\n      fairly unhappy yet reasonably disciplined.\n      *goto rolling_cannonballs\n    *elseif ((sloop_happy > 25) and (sloop_discipline > 25))\n      fairly unhappy and poorly disciplined.\n      *goto rolling_cannonballs\n    *elseif (sloop_happy > 25)\n      fairly unhappy and with terrible discipline.\n      *goto rolling_cannonballs\n    *elseif ((sloop_discipline > 75))\n      very unhappy but well disciplined.\n      *goto rolling_cannonballs\n    *elseif ((sloop_discipline > 50))\n      very unhappy yet reasonably disciplined.\n      *goto rolling_cannonballs\n    *elseif ((sloop_discipline > 25))\n      very unhappy and poorly disciplined.\n      *goto rolling_cannonballs\n    *else\n      very unhappy and with terrible discipline.\n      *goto rolling_cannonballs\n\n    *label rolling_cannonballs\n    *page_break\n    Yes, you're working the ${men} hard.  They go to sleep sore, they wake up sore, they do a long day's work, and they do it all again the following day.\n    \n    You're not sleeping so well yourself, in fact, as the night watch pounds on the deck every night while you're trying to sleep.  They roll cannon balls on the gun deck and stomp their feet.\n    \n    You quickly begin to suspect that they're doing this intentionally, to torment you.\n    *set sloop_happy %-10\n    *set sloop_discipline %+15\n    \n    *goto difficult_crew\n    \n\n  #Let's take it easy for now.\n    *set sloop_happy %+ 15\n    *set sloop_discipline %- 10\n    In compensation for how hard you've been working the ${men}, you give\n    them a \"rope yarn Sunday\"--a day when their duties are cut back to\n    the bare minimum necessary to keep the ${sloop} sailing.  Even though the\n    rope yarn Sunday doesn't fall on an actual Sunday, you let them relax\n    as if it did, and in fact more than on most Sundays.  Some of the\n    ${men} skylark on deck, while others take to gambling and similar\n    recreations.  The mood of the crew improves dramatically as the ${men}\n    have some time to themselves and a little bit of an opportunity to\n    relax.\n    \n    Unfortunately, a relaxed mood is not necessarily what you want in the\n    Royal Navy.  You begin to notice that some of the ${men} are slow to\n    touch their brows when they address an officer, and even forget to say\n    \"${sir}\" when they ought.  The omissions are small, but the Royal Navy\n    requires shows of respect for a reason.  As the rope yarn Sunday ends,\n    the ${men} grumble about returning to their duties, muttering among\n    themselves and taking their time in obeying their orders.\n\n    The ${sloop}'s happiness increases, but its discipline decreases.\n\n    You believe that, overall, the crew is \n    *if ((sloop_happy > 75) and (sloop_discipline > 75))\n      happy and well disciplined.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 75) and (sloop_discipline > 50))\n      happy and with reasonable but not great discipline.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 75) and (sloop_discipline > 25))\n      happy but poorly disciplined.\n      *goto difficult_crew\n    *elseif (sloop_happy > 75)\n      happy but with terrible discipline.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 50) and (sloop_discipline > 75))\n      reasonably happy and well disciplined.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 50) and (sloop_discipline > 50))\n      tolerably happy and with reasonable but not great discipline.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 50) and (sloop_discipline > 25))\n      reasonably happy but poorly disciplined.\n      *goto difficult_crew\n    *elseif (sloop_happy > 50)\n      reasonably happy but with terrible discipline.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 25) and (sloop_discipline > 75))\n      fairly unhappy but well disciplined.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 25) and (sloop_discipline > 50))\n      fairly unhappy yet reasonably disciplined.\n      *goto difficult_crew\n    *elseif ((sloop_happy > 25) and (sloop_discipline > 25))\n      fairly unhappy and poorly disciplined.\n      *goto difficult_crew\n    *elseif (sloop_happy > 25)\n      fairly unhappy and with terrible discipline.\n      *goto difficult_crew\n    *elseif ((sloop_discipline > 75))\n      very unhappy but well disciplined.\n      *goto difficult_crew\n    *elseif ((sloop_discipline > 50))\n      very unhappy yet reasonably disciplined.\n      *goto difficult_crew\n    *elseif ((sloop_discipline > 25))\n      very unhappy and poorly disciplined.\n      *goto difficult_crew\n    *else\n      very unhappy and with terrible discipline.\n      *goto difficult_crew\n\n\n*label difficult_crew\n\n\"It's a difficult crew, ${sir},\" volunteers ${Mr} Carter.  \"Many of these lands${men} came from the jails.  I've done what I can with them, but the previous captain and ${his} lieutenant struggled to keep them in line.\"\n\n*choice\n  #Punish the whole crew harshly.\n    *set sloop_discipline %+ 10\n    *set sloop_happy %- 30\n    \"If I perceive any one of you to be behaving with contempt toward your superior officers,\" you explain, \"all of you will be punished equally.\"\n    \n    The entire crew gets double work duty; worse, you cut them off from rum completely for about a week.\n    \n    This doesn't win you any congeniality points with the crew; some of them are really starting to hate your guts.  Fortunately, it's mainly the worst sailors who hold a grudge, as they soon find that their fellow sea${men} are enforcing discipline; nobody wants to have that happen again.\n\n    Discipline increases, but happiness greatly decreases.\n    *goto JonesJoke\n  #Identify the worst sailors and punish them.\n    *if leadership > 60\n      *set sloop_discipline %+ 20\n      *comment  REVIEW  AHSM--I don't understand why this is less good for discipline than punishing the whole crew harshly.  In general, I think you're conflating discipline and harshness, which are potentially related but separate.\n      Thanks to your expert leadership, you're able to successfully judge the character of these sailors; you manage to separate the sheep from the goats (for the most part).  The worst of the sailors receive double work duty, numerous lashes, and, perhaps worst of all, they're cut off from rum completely.\n      \n      They soon begin to learn what sort of behavior will get them caned; some of them even start to avoid such behavior.\n\n      Discipline increases greatly.\n      *goto JonesJoke\n    *else\n      *set sloop_happy %-10\n      *set sloop_discipline %+5\n      You're not a good enough judge of character to separate the sheep from the goats; you wind up punishing sailors more or less randomly.  The unlucky sailors receive double work duty, numerous lashes, and, perhaps worst of all, they're cut off from rum completely.\n      \n      Since their punishment has little to do with their behavior, this mostly serves to worsen your relationship with the crew.\n\n      Discipline increases slightly, but happiness declines.\n      *goto JonesJoke\n  #Punish lightly.\n    Unfortunately, this has no effect at all on the behavior of the crew.\n    *goto JonesJoke\n  #Don't punish at all.\n    *set sloop_happy %+ 10\n    *set sloop_discipline %-35\n    *set leadership %-20\n    The crew quickly learns that they can get away with anything under your command.  Discipline is in shambles.  You struggle to keep your ${sloop} on course and your ${men} under control.\n\n    Happiness increases, but discipline decreases greatly.\n\n*label JonesJoke\n*page_break\n*temp men_opp\n*set men_opp \"men\"\n*if sex=\"male\"\n  *set men_opp \"women\"\n\nOne evening, you head below deck as some of the ${men} are taking dinner; you find Jones telling a bawdy joke about the lascivious habits of ${men_opp} in London.  \n\n$!{He} tells it quite well; you hadn't noticed before, but Jones has a certain natural charisma about ${him} that makes others turn to listen to ${him}.\n\n*choice\n  #Chastise Jones for behavior unbecoming a sailor.\n    You can talk all you like, but nobody can stop navy sailors from telling bawdy tales.\n    *goto asleep_on_watch\n  #Have Jones whipped.\n    *set RelationshipJones %-30\n    It certainly won't be the first time Jones is beaten unfairly!\n    *goto asleep_on_watch\n  #Keep an eye on ${him}, but do nothing for now.\n    *goto asleep_on_watch\n  #Tell a bawdy tale of my own.\n    *if likeability > 60\n      *set sloop_happy %+ 15\n      *set sloop_discipline %- 10\n      The sailors are a bit nervous at first, but you're quite likeable, and soon enough they're caught up in your tale.\n      \n      Soon enough they'll be treating you like one of their own, which is unfortunate, because they're supposed to treat you like a commanding offer.\n     \n      Happiness increases, but discipline decreases.\n      *goto asleep_on_watch\n    *else\n      They listen to your tale respectfully, but it's a highly awkward moment; you're just not likeable enough to tell a story like this to your crew without seeming forced.\n\n*label asleep_on_watch\n\nAt this point, you believe that, overall, the crew is \n*if ((sloop_happy > 75) and (sloop_discipline > 75))\n      happy and well disciplined.\n      *goto A\n*elseif ((sloop_happy > 75) and (sloop_discipline > 50))\n      happy and with reasonable but not great discipline.\n      *goto A\n*elseif ((sloop_happy > 75) and (sloop_discipline > 25))\n      happy but poorly disciplined.\n      *goto A\n*elseif (sloop_happy > 75)\n      happy but with terrible discipline.\n      *goto A\n*elseif ((sloop_happy > 50) and (sloop_discipline > 75))\n      reasonably happy and well disciplined.\n      *goto A\n*elseif ((sloop_happy > 50) and (sloop_discipline > 50))\n      tolerably happy and with reasonable but not great discipline.\n      *goto A\n*elseif ((sloop_happy > 50) and (sloop_discipline > 25))\n      reasonably happy but poorly disciplined.\n      *goto A\n*elseif (sloop_happy > 50)\n      reasonably happy but with terrible discipline.\n      *goto A\n*elseif ((sloop_happy > 25) and (sloop_discipline > 75))\n      fairly unhappy but well disciplined.\n      *goto A\n*elseif ((sloop_happy > 25) and (sloop_discipline > 50))\n      fairly unhappy yet reasonably disciplined.\n      *goto A\n*elseif ((sloop_happy > 25) and (sloop_discipline > 25))\n      fairly unhappy and poorly disciplined.\n      *goto A\n*elseif (sloop_happy > 25)\n      fairly unhappy and with terrible discipline.\n      *goto A\n*elseif ((sloop_discipline > 75))\n      very unhappy but well disciplined.\n      *goto A\n*elseif ((sloop_discipline > 50))\n      very unhappy yet reasonably disciplined.\n      *goto A\n*elseif ((sloop_discipline > 25))\n      very unhappy and poorly disciplined.\n      *goto A\n*else\n      very unhappy and with terrible discipline.\n      *goto A\n\n*label A\n*page_break\nA few days later, ${Mr} Carter brings you a lands${man} sailor whom ${he} found asleep on watch.\n\n\"Terribly sorry, ${sir},\" ${he} mumbles groggily.\n\n*choice\n  #Whip ${him} soundly.\n    *label whip_sleeper\n    As captain of this ${sloop}, you have $!{His} Majesty's authority to have any of your sailors flogged.\n    \n    How many lashes?\n    *choice\n      #Five lashes.  A sting, but no permanent harm.\n        *set sloop_discipline %-15\n        Literally the very least you could have done.  The crew is getting the idea that you're easy on insubordination.\n   \n        Discipline decreases.\n        *goto whispering\n      #Ten lashes.  $!{He}'ll feel that for some time.\n        *set sloop_discipline %+5\n        *set sloop_happy %+10\n        $!{He} screams out in pain, but ${he}'s back at work later that day.  Everyone seems to agree that ${he} deserves it.\n\n        Discipline increases slightly, as does happiness.\n        *goto whispering\n      #Twenty lashes.  $!{He}'ll be unable to work effectively for a while.\n        *set sloop_happy %-10\n        *set sloop_discipline %+15\n        $!{He} screams out in pain, but ${he}'s back at work later that week.  Most of the crew seems to agree that ${he} deserves it; all of them now understand the penalty for insubordination on your ${sloop}.\n\n        Discipline increases substantially, but happiness decreases.\n        *goto whispering\n      #Thirty lashes.  $!{He} should consider ${him}self lucky that ${he} won't be crippled.\n        *set sloop_happy %-20\n        *set sloop_discipline %+15\n        The crew watches in horror as the lands${man} sailor is whipped almost to death.  Some of them start to worry that you've gone mad with power, but all of them now understand the penalty for insubordination on your ${sloop}.\n\n        Discipline increases substantially, but happiness decreases very substantially.\n        *goto whispering\n      #Fifty lashes.  Make an example of ${him}.\n        *set sloop_happy %-30\n        *set sloop_discipline %+10\n        *set Atrocity true\n        Unfortunately, this sailor is unable to withstand the punishment; ${his} heart gives out before ${he} receives the last lash.  Some of the crew begin to worry that you've gone mad with power, but all of them now understand the penalty for insubordination on your ${sloop}.\n\n        Happiness decreases greatly, but discipline increases.\n        *goto whispering\n  #Arrange a (questionable) jury to have ${him} court-martialed and hanged.\n    *label hang_sleeper\n    *set sloop_happy %-30\n    *set sloop_discipline %+10\n    *set Atrocity true\n    You assemble a three-${man} court-martial: your lieutenant, the ${master}, and you.\n    \n    The \"court-martial\" jury is clearly uncomfortable about your decision, but neither of them can muster an argument in disagreement.\n    \n    *if (sloop=\"sloop\")\n      After all, you are the duly appointed ${master} and commander of this sloop, and the twenty-sixth Article of War clearly states: \"No person in or belonging to the fleet shall sleep upon ${his} watch, or negligently perform the duty imposed on ${him}, or forsake ${his} station, upon pain of death, or such other punishment as a court martial shall think fit to impose, and as the circumstances of the case shall require.\"\n      *goto WiggleRoom\n    *else\n       After all, you are the duly appointed captain of this ship, and the twenty-sixth Article of War clearly states: \"No person in or belonging to the fleet shall sleep upon ${his} watch, or negligently perform the duty imposed on ${him}, or forsake ${his} station, upon pain of death, or such other punishment as a court martial shall think fit to impose, and as the circumstances of the case shall require.\"\n      *goto WiggleRoom   \n\n    *label WiggleRoom\n    Admittedly, the article does leave a bit of wiggle room; you certainly could have just had ${him} whipped, but perhaps the circumstances of this case required more drastic measures.\n    \n    As they watch that young sailor's feet dangling from the yard arm, the crew begins to realize to what depths you will reach to enforce discipline on your ${sloop}.\n\n    Happiness decreases greatly, but discipline increases.\n    *goto whispering\n  #Put ${him} on double watch, and forbid ${him} from rum.\n    *set sloop_discipline %+5\n    Discipline increases slightly.\n    \n    Cutting ${him} off from rum should have helped, but you are soon enough informed by a young volunteer that ${he} has fallen asleep on duty a second time.\n    *choice\n      #Whip ${him}.\n        *goto whip_sleeper\n      #\"Court-martial\" and hang ${him}.\n        *goto hang_sleeper\n  #Let it slide.\n    *set sloop_happy %+ 15\n    *set sloop_discipline %- 30\n    \"Oh, thank you, ${sir}!\"\n    \n    \"Just this once,\" you warn sternly.  \"If I catch you asleep again, I'll hang you from the yard arm by your genitals.\"\n    \n    \"Aye, ${sir}.  Thank you, ${sir}!\"\n    \n    Unfortunately, this really sends a bad message to the other sailors, who quickly get the idea that with a little pleading they can get away with almost anything.\n\n    Happiness increases substantially, but discipline decreases greatly.\n\n*label whispering\n*page_break\n*comment  REVIEW AHSM--my recommendation is to cut the entire whispering subscene.  I don't think it adds anything, and otherwise I think it needs a more meaningful choice.  I would go straight from here to DeadMaster\n\nAs you head below deck, you see a handful of sailors and midship${men} whispering together, including Jones.  As soon as they catch sight of you, they stop abruptly and go their separate ways.  (You experience a brief moment of \"deja vu,\" as the Gauls call it.)\n*temp questioned_sailor\n*temp unquestioned_sailor\n\n*choice\n    #Loudly ask what they were whispering about.\n      *label loudly\n      \"Walker! Green!\"\n      \n      \"Aye ${sir}!\" they respond in unison.\n      \n      \"What were you whispering about just now?\"\n      \n      Walker and Green turn and look at each other blankly.  From around the corner, Jones turns to look.\n      \n      \"$!{Sir},\" ventures Walker, \"we weren't whispering.\"\n      \n      *comment TODO is there a better innocent topic here?\n      \"I was just asking Walker which shift ${he}'s on,\" blurts out Green.\n      *choice\n        #Let them go.\n          *label let_go\n          \"Very well,\" you murmur.  \"Go about your business.\"  The sailors look relieved.\n          *choice\n            #Use a spy to find out more.\n              *goto spy\n            #Do nothing.\n              *goto dead_master\n        #Threaten to whip them, to get a straight answer.\n          \"Don't lie to me, ${boy}s.\"\n          \n          \"$!{Sir}!\" protests Walker, \"no, ${sir}!\"\n          \n          \"Green, I'm giving you one chance to come clean and tell the truth.  Lie to me again and I'll have you both flogged, or worse.\"\n          \n          The sailors look at each other in terror.  \"$!{Sir},\" says Green finally, \"we're telling the truth.\"\n          *choice\n            #Let them go.\n              *goto let_go\n            #Whip them.\n              *goto whip_mutineers\n            #Try to have them hanged.\n              *goto hanging\n        #Have them whipped for insubordination.\n          *goto whip_mutineers\n        #Arrange a (questionable) jury to have them court-martialed and hanged.\n          *label hanging\n          \"$!{Sir},\" begins ${Mr} Benton.  \"We can't do this.  We can't just hang sailors for whispering below decks.\"\n          \n          \"It's mutiny, I tell you!\" you reply, perhaps a bit more forcefully than you'd intended.  You continue, lowering your voice, \"If these ${men} turn on me, don't doubt they'll turn on you, too, ${Mr} Benton.\"\n          \n          \"Yes, ${sir}.  But we can't just hang them without more proof.\"\n          \n          *choice\n            #Benton is in it with them!  Have ${him} hanged!\n              Are you quite sure about this?  ${Mr} Benton may not be a particularly outstanding officer, but if you turn the officers against you, there may be no one left who'll take your side against the mutineers.\n              *choice\n                #Hang ${him}!  Hang them all!\n                  *goto whole_ship\n                #Maybe we should gather more proof.\n                  *goto spy\n            #Spy on the crew.\n              *goto spy\n            #Drop the matter.\n              *goto dead_master\n    #Pull one of them aside to ask what they were whispering about.\n      Who are you going to pull aside?\n      *choice\n        #Jones\n          *if RelationshipJones > 80\n            \"Jones, what were those ${men} whispering about?\"\n            \n            \"$!{Sir},\" Jones whispers, checking over ${his} shoulder, \"may I ask that we speak about this in your cabin?\"\n      \n            Back in your cabin, Jones sighs.  \"Some of the ${men} are, ah, dissatisfied with the way things are run on this ${sloop}.\"\n            \n            \"What do they intend?\" you ask.\n            \n            \"I was trying to talk them out of it, ${sir}.\"\n            \n            \"What do they indend?\" you repeat.\n            \n            \"I'm not sure of the details,\" Jones admits, \"but it's definitely mutinous.\"\n            \n            \"Can you give me names?\"\n            \n            \"Some,\" Jones says.  $!{He} gives you names.\n            *choice\n              #Have them hanged.\n                \"$!{Sir},\" begins ${Mr} Benton, \"with all due respect, we can't just hang these sailors at Jones's word.\"\n                \n                \"I know Jones well; ${he} is an honest and trustworthy sailor.\"\n                \n                \"That's as may be, but we can't just hang them without more proof.\"\n                *choice\n                  #Have them whipped.\n                    *goto whip_mutineers\n                  #Spy on them closely.\n                    *goto spy\n              #Have them whipped.\n                *goto whip_mutineers\n              #Spy on them closely.\n                *goto spy\n          *else\n            You bring Jones into your cabin for questioning.\n            *set unquestioned_sailor \"Walker\"\n            *set questioned_sailor \"Jones\"\n            *goto question_ordinary\n        #One of the other sailors\n          You bring Walker, an able-bodied sailor, into your cabin for questioning.\n          *set unquestioned_sailor \"Jones\"\n          *set questioned_sailor \"Walker\"\n          *label question_ordinary\n          \n          \"What were those ${men} whispering about?\"\n          \n          $!{He} looks confused.  \"$!{Sir}?\"\n          \n          \"I saw you there, with ${unquestioned_sailor} and Green.\"\n\n          *comment AHSM  the wardroom is officer country; ordinary sailors wouldn't be in there.  So I just deleted the reference.\n          \n          \"$!{Sir},\" replies ${questioned_sailor} slowly, \"we weren't whispering. Green was telling us a tale about ${his} ${spouse_word} back in Albion.\"\n          \n          *choice\n            #Drop the matter.\n              *goto dead_master\n            #Threaten ${questioned_sailor}.\n              \"Don't lie to me, ${questioned_sailor}, or I'll have you all flogged.\"\n              \n              \"$!{Sir}!\" ${he} blurts, \"it's God's own truth, I swear it!\"  Of course, saying otherwise at this point would be admission of guilt.\n              \n              \"On the other hand, maybe I should just have ${unquestioned_sailor} and Green flogged,\" you suggest.  \"Maybe you can provide me with information to spare your own hide.\"\n              \n              \"No, ${sir}!\"  $!{He} seems even more alarmed at this suggestion.  Perhaps ${he}'s afraid of what the others might do, if they thought ${he}'d snitch.\n              \n              \"This is your last chance, ${questioned_sailor}.\"\n              \n              After a pause, ${questioned_sailor} looks you dead in the eye, almost disrespectfully. \"I'm sorry, ${sir},\" ${he} says, \"there's nothing I can tell you.\"\n              *choice\n                #Flog ${questioned_sailor}.\n                  $!{His} eyes seethe raw hatred as ${he} receives ${his} lashes and returns to work.\n                  *goto dead_master\n                #Flog the others.\n                  *goto whip_mutineers\n                #Flog them all.\n                  *goto whip_mutineers\n                #Drop the matter.\n                  *goto dead_master\n    #Whip them soundly.\n      *label consider_whipping\n      What are you flogging them for?\n      *choice\n        #Gossiping.\n          That's a harsh penalty for gossiping.  Their eyes seethe raw hatred as they receive their lashes and return to work.\n          *goto dead_master\n        #Mutinous assembly.\n          *label whip_mutineers\n          Whipping is not a very good cure for mutinous intent.  Their eyes seethe raw hatred as they receive their lashes and return to work.\n          *goto dead_master\n    #Use a spy to find out what they were discussing.\n      *label spy\n      You pass their names to ${Mr} Carter.\n      \n      \"Watch them, ${Mr} Carter.\"\n      \n      \"Aye aye, ${sir}.  I will, ${sir}.\"\n      *goto dead_master\n    #Do nothing.\n      *comment Here for whitespace purposes\n\n*comment  REVIEW AHSM After the whispering scene is one of the places where I felt frustrated-- I felt like I couldn't accomplish anything here.  I would either add a choice that can do something here, or maybe just cut the whispering sequence.\n\n*label dead_master\n\nAt this point, you believe that, overall, the crew is \n*if ((sloop_happy > 75) and (sloop_discipline > 75))\n      happy and well disciplined.\n      *goto B\n*elseif ((sloop_happy > 75) and (sloop_discipline > 50))\n      happy and with reasonable but not great discipline.\n      *goto B\n*elseif ((sloop_happy > 75) and (sloop_discipline > 25))\n      happy but poorly disciplined.\n      *goto B\n*elseif (sloop_happy > 75)\n      happy but with terrible discipline.\n      *goto B\n*elseif ((sloop_happy > 50) and (sloop_discipline > 75))\n      reasonably happy and well disciplined.\n      *goto B\n*elseif ((sloop_happy > 50) and (sloop_discipline > 50))\n      tolerably happy and with reasonable but not great discipline.\n      *goto B\n*elseif ((sloop_happy > 50) and (sloop_discipline > 25))\n      reasonably happy but poorly disciplined.\n      *goto B\n*elseif (sloop_happy > 50)\n      reasonably happy but with terrible discipline.\n      *goto B\n*elseif ((sloop_happy > 25) and (sloop_discipline > 75))\n      fairly unhappy but well disciplined.\n      *goto B\n*elseif ((sloop_happy > 25) and (sloop_discipline > 50))\n      fairly unhappy yet reasonably disciplined.\n      *goto B\n*elseif ((sloop_happy > 25) and (sloop_discipline > 25))\n      fairly unhappy and poorly disciplined.\n      *goto B\n*elseif (sloop_happy > 25)\n      fairly unhappy and with terrible discipline.\n      *goto B\n*elseif ((sloop_discipline > 75))\n      very unhappy but well disciplined.\n      *goto B\n*elseif ((sloop_discipline > 50))\n      very unhappy yet reasonably disciplined.\n      *goto B\n*elseif ((sloop_discipline > 25))\n      very unhappy and poorly disciplined.\n      *goto B\n*else\n      very unhappy and with terrible discipline.\n      *goto B\n\n*label B\n\nThere are definitely some bad apples in the crew.\n\n*page_break\nThe next day, ${Mr} Benton reports that ${Mr} Carter has died in a fatal accident.  \"Fallen down the hatchway, ${sir}.  $!{He} must have overbalanced.\"\n\nDo you think it was really an accident?\n*choice\n  #Of course.\n    What else could it be?  Really, just thinking about other possibilities makes you nervous.\n\n    But then, perhaps you should be nervous. . .\n\n    Happiness increases, but discipline decreases substantially.\n    *set sloop_happy %+10\n    *set sloop_discipline %-20\n    *comment Adjust stats?  Maybe lower intelligence, leadership, and sloop_discipline, increase sloop_happy?\n    *goto NewMaster\n  #Absolutely not; this was murder.\n    $!{Mr} Carter was an experienced and expert sailor.  The only explanation for ${his} death is murder.  And since you doubt Benton killed ${him}, and you know that you didn't, that's tantamount to mutiny.\n\n    So the question is:  What are you going to do about it?\n    *choice\n      #Investigate the murder.  I know ${he} was murdered, but I don't know by whom.\n        *if (((Intelligence + Leadership)/2) > 70)\n          You ask some probing questions, examine the evidence, and build a list of where each sailor on the ${sloop} was at the time of the murder.  It takes a little while, but you finally identify Allen and Green, two disaffected ordinary sailors, as the most likely suspects.  You can't be sure that they're guilty, but you think it is perhaps ninety percent likely.\n\n          What do you do now?\n          *choice\n            #After a summary court-martial, I hang them for mutiny and assaulting a superior officer.\n              You assemble a drum-head court-martial, present the evidence, convict them, and hang them for their crimes.  There is a little grumbling around the ${sloop}--some of the evidence was pretty flimsy, and almost all of it was circumstantial.  But you've also taught your crew that your wrath is something to be feared.\n              \n              I hope that your conscience doesn't trouble you late at night when you think about the possibility that they might have been innocent.\n\n              Discipline increases substantially, but happiness decreases slightly.\n              *set sloop_discipline %+20\n              *set sloop_happy %-5\n              *set leadership %+10\n              *set Courage %+10\n              *set Bloodthirst %+10\n              *goto NewMaster\n\n            #I imprison them, planning on requesting a court-martial when I rejoin the fleet.\n              This makes nobody really happy.  It means you don't publicly present your evidence, and their friends can still imagine freeing them.  But at the same time, it sends less of a definitive message.  On the upside, it's probably the fairest thing you can do, and you sleep soundly, knowing that you haven't perverted justice for purposes of maintaining good discipline.\n\n              Discipline increases, but happiness decreases.\n              *set sloop_discipline %+10\n              *set sloop_happy %-10\n              *set Intelligence %+5\n              *set Bloodthirst %-5\n              *set Honor %+10\n              *goto NewMaster\n\n            #Since I'm not fully convinced that they did it, I keep investigating.\n              *goto ContinueInvestigating\n\n            #They might still be innocent.  I can't take action without being sure, so I leave the matter unresolved.\n              *goto DoNothing\n        *elseif (((Intelligence + Leadership)/2) > 50)\n          You ask some questions, examine the evidence, and try to build a list of where each sailor on the ${sloop} was at the time of the murder.  It takes a little while, but you finally identify Allen and Green, two disaffected ordinary sailors, as the most likely suspects.  You can't be sure that they're guilty, but you think it is more likely than not--perhaps sixty percent likely.\n\n          What do you do now?\n          *choice\n            #After a summary court-martial, I hang them for mutiny and assaulting a superior officer.\n              You assemble a drum-head court-martial and present the evidence.  ${Mr} Benton and the ${sloop}'s ${master}'s mates form the body of the court-martial, and they are clearly troubled, but you prevail on them to convict Allen and Green.  Soon enough, they hang by the neck until dead for their crimes.  There is grumbling around the ${sloop}--the evidence was flimsy, and it was all circumstantial.  But you've also taught your crew that your wrath is something to be feared.\n              \n              I hope that your conscience doesn't trouble you late at night when you think about the possibility that they might have been innocent.\n\n              Discipline increases substantially, but happiness decreases.\n              *set sloop_discipline %+15\n              *set sloop_happy %-10\n              *set leadership %+10\n              *set Courage %+15\n              *set Bloodthirst %+15\n              *goto NewMaster\n\n            #I imprison them, planning on requesting a court-martial when I rejoin the fleet.\n              This makes nobody really happy.  It means you don't publicly present your evidence, and their friends can still imagine freeing them.  But at the same time, it sends less of a definitive message.  On the upside, it's probably the fairest thing you can do, and you sleep soundly, knowing that you haven't perverted justice for purposes of maintaining good discipline.\n\n              Discipline increases, but happiness decreases substantially.\n              *set sloop_discipline %+10\n              *set sloop_happy %-15\n              *set Intelligence %+5\n              *set Bloodthirst %-5\n              *set Honor %+10\n              *goto NewMaster\n\n            #Since I'm not convinced that they did it, I keep investigating.\n              *goto ContinueInvestigating\n\n            #They might still be innocent.  I can't take action without being sure, so I leave the matter unresolved.\n              *goto DoNothing\n        *else\n          At the end of the investigation, you have no idea who did it.  You have a few possibilities, but none of them are really convincing.\n\n          What do you do?\n          *choice\n            #I continue investigating.\n              *label ContinueInvestigating\n              You keep investigating, and the atmosphere on the ${sloop} becomes poisonous as every member of the crew fears that you will turn on them.  You make no progress in solving the crime, however.\n              *set sloop_happy %-15\n\n              Happiness decreases substantially.\n              *goto NewMaster\n\n            #I pick a few likely suspects and hang them for the crime, even though they might be completely innocent.  It's what the ${sloop} needs, and that's more important than the truth.\n              *goto WitchHunt              \n\n            #I let the matter drop.  I won't be able to find the guilty parties, and I refuse to punish the innocent.\n              An honorable course.  Let's just hope that it doesn't encourage future problems.\n\n              Happiness increases but discipline decreases.\n              *set sloop_discipline %-10\n              *set sloop_happy %+10\n              *set Bloodthirst %-15\n              *set Honor %+10\n              *goto NewMaster\n\n      #Seize the most likely suspects and proceed straight to a court-martial.  It's better to be firm and swift in response than to be right.\n        *label WitchHunt\n        \"Are you sure that you want to do this, ${sir}?\" begins ${Mr} Benton.  \"We have no real evidence against these ${men}.  I'm not even convinced that ${Mr} Carter was murdered.\"\n          \n        \"It's a mutiny, I tell you!\" you reply, perhaps a bit more forcefully than you'd intended.  You continue, lowering your voice, \"If these ${men} turn on me, don't doubt they'll turn on you, too, ${Mr} Benton.  We need to hang a few to get the rest in line.\"\n          \n        \"Yes, ${sir}.  But hanging ${men} on such little proof?  Is that what we've come to?\"\n          \n        *choice\n            #Benton is in it with them!  Have ${him} hanged!\n              Are you quite sure about this?  ${Mr} Benton may not be a particularly outstanding officer, but if you turn the officers against you, there may be no one left who'll take your side against the mutineers.\n              *choice\n                #Hang ${him}!  Hang them all!\n                  *goto whole_ship\n                #Maybe Benton doesn't need hanging, but I'm damn well going to hang those sailors.\n                  *label TrumpedUpCharges\n                  The discipline of the ${sloop} is more important than the lives of a few sailors.  You assemble a drum-head court-martial and present the \"evidence.\"  ${Mr} Benton and the ${sloop}'s ${master}'s mates form the body of the court-martial, and they are clearly troubled, but you prevail on them to convict Allen and Green.  Soon enough, they hang by the neck until dead for their crimes.  There is grumbling around the ${sloop}--you had no real evidence and simply accused three sailors for being in the wrong place at the wrong time.  But you've also taught your crew that your wrath is something to be feared.\n\n                  I wonder how you can sleep at night after murdering some innocent sailors.\n\n                  Discipline increases, but happiness decreases tremendously.\n                  *set sloop_discipline %+10\n                  *set sloop_happy %-40\n                  *set Atrocity true\n                  *set Leadership %-10\n                  *set Bloodthirst %+25\n                  *set Honor %-35\n                  *goto NewMaster\n                #$!{He}'s right.  I let the matter go.\n                  I hope your decision won't make matters worse.\n\n                  Discipline decreases, but happiness increases.\n                  *set sloop_discipline %-10\n                  *set sloop_happy %+10\n                  *set Honor %-10\n                  *goto NewMaster\n            #I proceed with the plan.  This ${sloop} needs a hanging to restore discipline.\n              *goto TrumpedUpCharges\n            #I. . .  I. . .  Benton's right.  I can't do this.\n              You slump in your chair.  Finally, you reply, \"You are right, ${Mr} Benton.  We must remember that we are officers of the Royal Navy and hold ourselves to a higher standard.  I must thank you for saving me from my baser instincts.\"\n              \n              ${Mr} Benton clearly feels awkward, yet relieved.  \"Thank you, ${sir}.  I was just doing my duty as your first lieutenant, pointing out possible difficulties with your plan.  I have never had the burden of independent command, I know.\"\n              \n              You nod and dismiss ${him}.  You sleep better, knowing that you haven't murdered sailors in an effort to improve discipline.  I hope your decision won't make matters worse.\n\n              Discipline decreases, but happiness increases.\n              *set sloop_discipline %-10\n              *set sloop_happy %+10\n              *set Honor %-10\n\n              *goto NewMaster\n\n      #Think about it some more.  I have to respond correctly, and that's more important than acting quickly.\n        You think carefully about the matter.  Hours turn into days, and days into weeks, and the opportunity for action is lost.\n\n        Discipline decreases substantially, but happiness increases.\n        *set sloop_happy %+10\n        *set sloop_discipline %-20\n        *set Leadership %-10\n        *goto NewMaster\n\n      #Ignore it, at least for now.  Starting an investigation could lead to an open mutiny, and I can't risk that.\n        You ignore the murder and hope that pretending that all is well will head off worse troubles.  We'll see how well that will work, won't we?\n\n        Discipline decreases substantially, but happiness increases.\n        *set sloop_happy %+10\n        *set sloop_discipline %-20\n        *set Leadership %-15\n        *set Courage %-10\n        *set Honor %-10\n        *goto NewMaster\n\n  #I'm not yet sure.\n    $!{Mr} Carter was an experienced and expert sailor, but accidents do happen, even to the most able sailors.  Besides, the alternative is almost too horrible to contemplate.\n\n    The question is:  What are you going to do about it?\n    *choice\n      #Investigate the possible murder.  I need to find out if this was an accident, and if not, who the murderer or murderers were.\n        *if (((Intelligence + Leadership)/2) > 80)\n          You ask some probing questions, examine the evidence, and build a list of where each sailor on the ${sloop} was at the time of death.  After investigating, you believe that this was almost certainly a murder.  It takes a little while, but you finally identify Allen and Green, two disaffected ordinary sailors, as the most likely suspects.  You can't be sure that they're guilty, but you think it is perhaps ninety percent likely.\n\n
