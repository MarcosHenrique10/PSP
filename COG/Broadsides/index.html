<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choice of Broadsides — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "Broadsides", "title": "Choice of Broadsides", "scenes": {"badleadership-mutiny": "*set Pigot_alive true\n\nAs you head below deck, you see a handful of sailors whispering together.  As soon as they catch sight of you, they stop abruptly and go their separate ways. \n\nWhat do you think they're whispering about?\n*temp suspects_mutiny \n*set suspects_mutiny false \n*temp certain_mutiny \n*set certain_mutiny false \n\n*choice\n  #It's harmless gossip.\n    Do you plan to do anything about it?\n    *choice\n      #Loudly ask what they were whispering about. \n        *label loudly \n        \"You there! Allen! Wilson!\" \n       \n        \"Aye ${sir}!\" they respond in unison. \n       \n        \"What were you whispering about just now?\" \n       \n        Allen and Wilson turn and look at each other nervously.  One of the other whisperers turns to look. \n       \n        \"Well?\" \n       \n        \"Nothing, ${sir}?\" says Wilson. \n       \n        \"Nothing?\" \n       \n        \"Aye ${sir},\" Wilson repeats.  Allen remains silent but terrified. \n       \n        *choice \n          #Let them go. \n            \"Very well,\" you murmur.  \"Go about your business.\"  The sailors look relieved. \n            *if suspects_mutiny \n              *choice \n                #Tell someone about the whispering. \n                  *goto mutiny_rumor \n                #Do nothing. \n                  *goto ignore_mutiny \n            *else \n              *choice \n                #Tell someone about the whispering. \n                  *goto whispering_rumor \n                #Do nothing. \n                  I suppose a few sailors gossiping is nothing to worry about. \n                  *goto mutiny \n          #Lecture them not to gossip, then let them go. \n            *label lecture \n            You begin a short lecture on the nature of gossip; the sailors immediately look relieved as you begin your speech.  They stand quietly at attention until you permit them to go about their duty. \n            *if suspects_mutiny \n              *choice \n                #Tell someone about the whispering. \n                  *goto mutiny_rumor \n                #Do nothing. \n                  *goto ignore_mutiny \n            *else \n              *choice \n                #Tell someone about the whispering. \n                  *goto whispering_rumor \n                #Do nothing. \n                  I suppose a few sailors gossiping is nothing to worry about. \n                  *goto mutiny \n          #Threaten to beat them, to try to get a straight answer. \n            \"Lying to a superior officer, are we?\" \n           \n            \"No, ${sir}!\" Wilson stammers out. \n           \n            \"You'll be kissing the gunner's ${son_opp} if you don't tell me the truth of the matter this instant.\" Allen and Wilson exchange a pained look.  \"Answer me!  What were you whispering about?\" you shout. \n           \n            \"Nothing, ${sir}!\" repeats Wilson. \n           \n            This wouldn't be the first time they'd been bent over a gun and beaten; besides, any other answer at this point would be an admission of guilt. \n            *choice \n              #Lecture them not to gossip, then let them go. \n                *goto lecture \n              #Beat them. \n                *goto beating \n              #Hang them for mutiny. \n                *goto hanging \n          #Have them beaten for insubordination. \n            \"Lying to a superior officer, are we?\" \n           \n            \"No, ${sir}!\" Wilson stammers out.  Any other response would be an admission of guilt. \n           \n            *label beating\n            *comment TODO how does a LT have someone beaten?  Call the bosun?  Does ${he} report to you?  How does this work? \n            \"We'll see about that when you're kissing the gunner's ${son_opp}!\"  You call for a bosun's mate.\n           \n            The bosun's mate comes along in time, bearing ${his} rattan, a long cane, ringed at every two inches by a pronounced joint.  \"Aye, ${sir}?\" \n           \n            \"Take down the names of Wilson and Allen.  They have been lying to a superior officer.\" \n           \n            \"Aye aye, ${sir},\" replies the bosun's mate.  In short order, the Captain assigns them each fifteen lashes.  Their cries are heard throughout the ship. \n           \n            Hopefully, that will be the end of it. \n            *goto mutiny \n          #Have them hanged for mutiny. \n            *label hanging \n            \"Lying to a superior officer, are we?\" \n           \n            \"No, ${sir}!\" Wilson stammers out.  Any other response would be an admission of guilt. \n           \n            \"Shall I remind you of Article 18?  'If any person in or belonging to the fleet shall make or endeavor to make any mutinous assembly upon any pretence whatsoever, every person offending herein [. . .] shall suffer death.'\" \n           \n            \"$!{Sir}, we're no mutineers!\" pleads Allen. \n           \n            \"Oh, just conspirators, then?  Article 19: 'If any person in the fleet shall conceal any traitorous or mutinous practice or design, [. . .] ${he} shall suffer death.'\" \n           \n            \"No, ${sir}!\" \n           \n            \"Well, we'll see about that, won't we?\" \n            *page_break \n            *goto sorry_no_hanging \n      #Pull one of them aside to ask what they were whispering about. \n        *label ask \n        \"Allen, may I have a word with you?\" \n       \n        You move a little closer to your cabin.  \"What was that little gathering about?\" \n       \n        *if RelationshipJones > 50 \n          \"With all due respect, ${sir}, I don't think you want to know.\" \n          *goto jones_choice \n        *else \n          \"Gathering, ${sir}?\"  $!{He} looks nervous. \n        *label jones_choice \n         \n        *choice \n          #Swear to secrecy. \n            *if RelationshipJones \u003c 80 \n              \"You can swear up and down, but there's nothing to tell you. $!{Sir}.\" $!{He} emphasizes the word \"${sir}\" oddly. \n              *choice \n                #I don't think I want to know. \n                  *goto ignore_jones \n                #Threaten Allen \n                  *goto threaten_jones \n            *else \n              *label jones_tells \n             \n              \"Well, you know what happened with Pigot,\" Allen implies. \n             \n              \"Go on.\" \n             \n              \"Some of the sailors are upset about what happened.  Jones got twenty lashes while Pigot gets no punishment?  They'd like to take matters into their own hands, if you follow my meaning.\" \n             \n              \"How?\" \n             \n              \"Well, Pigot's not exactly a top swimmer.\"  You nod, understanding ${his} meaning. \n              *page_break \n              Allen has just revealed to you that ${he} is a conspirator to mutiny; perhaps a mutineer ${him}self. You can have ${him} and all ${his} friends hanged for this. \n             \n              Furthermore, if you don't report the mutiny, and anyone finds out that you knew, you could be court-marshalled and hanged yourself.  (It's not exactly a secret that you're on good terms with Jones.) \n             \n              On the other hand, if you keep quiet and they pull it off, you'll be second lieutenant and Bryce will be first lieutenant. \n             \n             \n             \n              *choice \n                #Report the mutiny. \n                  *label hanged_mutineers \n\n                  By the following morning, at the word of Captain Kent of H.M.S. Courageous and by your testimony as third lieutenant, the mutineers are hanged from the neck until dead. \n                 \n                  *comment TODO this scene should be shown, not told! \n                 \n                  Hopefully, that will be the end of it.\n                  *set Age +3\n                  *set Seniority +3 \n                  *finish \n                #Report the mutiny, but keep Allen's name out of it. \n                  *goto hanged_mutineers \n                #Keep quiet. \n                  *set certain_mutiny true \n                  *goto ignore_mutiny \n          #I don't think I want to know. \n            *label ignore_jones \n            \"Maybe it's best if I don't know.\" \n           \n            \"Aye, ${sir}.  Aye aye, ${sir}.\" \n            *goto ignore_mutiny \n          #Threaten Allen. \n            *label threaten_jones \n            *set RelationshipJones %-30 \n            \"Allen, if you don't tell me the purpose of that assembly, the lash will be the least of your concerns!\"  You emphasize the word \"assembly,\" evoking the nineteeth Article of War, the one about \"mutinous assembly.\" \n           \n            *if RelationshipJones > 80 \n              Allen sighs, then peers around for eavesdroppers.   \n              *goto jones_tells \n            *else \n              Allen's face is now completely expressionless. \"I don't know what you mean, ${sir},\" ${he} says, evenly, looking straight into your eyes.  \"If you will excuse me, ${sir}, I have some duties to attend to.\" \n             \n              *choice \n                #Drop the matter. \n                  \"You are dismissed, Allen.\" \n                 \n                  \"Aye, ${sir}.\"  As Allen turns to leave, you feel a chill run down your spine. \n                  *goto ignore_mutiny \n                #Report a possibly mutiny. \n                  *goto mutiny_rumor \n      #Tell someone about the whispering. \n        *label whispering_rumor \n        Who do you want to tell? \n        *choice \n          #Tell Bryce. \n            \"But you don't think it's anything serious?\" Bryce asks. \n           \n            \"No, ${sir}.  Just ordinary gossip.\" \n           \n            \"Hmm. Well, good on you for noticing! We'd better keep an eye on it, all the same.  Idle hands, and all that.\" \n           \n            \"Indeed, ${sir}.\" \n            *goto mutiny \n          #Tell Pigot. \n            \"But you don't think it's anything serious?\" Pigot asks. \n           \n            \"No, ${sir}.  Just ordinary gossip.\" \n           \n            \"I'm not sure you're right about that. In my experience, whispering sailors can only be up to no good!  We'd better keep an eye out.\" \n           \n            \"Indeed, ${sir}.\" \n            *goto mutiny \n          #Tell the Captain. \n            \"But you don't think it's anything serious?\" the Captain asks. \n           \n            \"No, ${sir}.  Just ordinary gossip.\" \n           \n            \"Then why are you telling me this?  It seems sailors aren't the only ones inclined to gossip on my ship!\" \n           \n            \"Yes, ${sir}.  My apologies, ${sir}.\" \n            *goto mutiny \n          #Bring it up casually at officer's breakfast. \n            \"But you don't think it's anything serious?\" the Captain asks. \n           \n            \"No, ${sir}.  Just ordinary gossip.\"  Pigot looks visibly shaken; ${he} clearly thinks it's more serious than you do. \n           \n            \"We'd better keep an eye on it, all the same,\" says Bryce.  \"Pass the butter, would you, $!{Mr} $!{Surname}?\" \n            *goto mutiny \n      #Do nothing. \n        I suppose a few sailors gossiping is nothing to worry about. \n        *goto mutiny \n  #They're planning a mutiny. \n    What do you plan to do about it?\n    *choice\n      #Loudly ask what they were whispering about. \n        *set suspects_mutiny true \n        *goto loudly \n      #Pull one of them aside to ask what they were whispering about. \n        *set suspects_mutiny true \n        *goto ask \n      #Tell someone about the whispering. \n        *label mutiny_rumor \n        Who do you want to tell? \n        *choice \n          #Tell Bryce. \n            \"Damnation! Do you really think it's mutiny?\" \n           \n            \"Yes, ${sir}.  Yes, I do, ${sir}.\" \n           \n            \"But you can't be sure; it's just a few whispers and your suspicions.\" \n           \n            \"Yes, ${sir}.\" \n           \n            \"Well, I'll tell Pigot and the Captain to keep an eye out for suspicious behavior, then.  If you're right, we've got a royal mess on our hands!\" \n            *goto mutiny \n          #Tell Pigot. \n            \"Damnation! Do you really think it's mutiny?\" \n           \n            \"Yes, ${sir}.  Yes, I do, ${sir}.\" \n           \n            \"Tell me their names, this instant!  I'll have them hanged!\" \n            *temp do_not_reveal \n            *set do_not_reveal 0 \n            *label reveal_pigot \n            *choice \n              #Reveal their names. \n                \"Are you sure you didn't see Jones there?  I'm sure ${he} must be the ringleader.\" \n                 \n                \"Absolutely certain, ${sir}.\"  Pigot eyes you suspiciously but leaves the matter at that. \n                *page_break \n                \"Smoke and oakum! You're quite certain it's mutiny?\" asks the Captain. \n           \n                \"Yes, ${sir}.\" \n               \n                \"But you can't be sure; it's just a few whispers and your suspicions,\" ventures Bryce. \n               \n                The Captain shakes ${his} head.  \"Keep an eye out for suspicious behavior.  If you're right, we've got a royal mess on our hands!\" \n               \n                \"Captain,\" Pigot continues, \"with all due respect . . .\" \n               \n                The Captain interrupts: \"${Mr} Pigot, I advise you not to finish that sentence.\" \n               \n                \"A--Aye aye, ${sir}.\" \n                *goto mutiny \n              #Don't reveal their names. \n                *set do_not_reveal +1 \n                *if do_not_reveal = 1 \n                  *temp jack\n                  *set jack \"Jack\"\n                  *if sex = \"female\"\n                    *set jack \"Jane\"\n                  \"Do I have to remind you that concealing mutinous design is a violation of the nineteenth Article of War?  I'll have you court-martialed before you can say '${Jack} Robinson.'\" \n                  *goto reveal_pigot \n                *else \n                  Pigot does report you to the Captain, but without your testimony, ${he} can't prove there's a mutiny.  $!{He} becomes paranoid, suspecting everyone on board of trying to kill ${him}. \n                  *goto mutiny \n          #Tell the Captain. \n            \"Smoke and oakum! Do you really think it's mutiny?\" \n           \n            \"Yes, ${sir}.  Yes, I do, ${sir}.\" \n           \n            \"But you can't be sure; it's just a few whispers and your suspicions.\" \n           \n            \"Yes, ${sir}.\" \n           \n            The Captain shakes ${his} head.  \"Tell the other officers to keep an eye out for suspicious behavior.  If you're right, we've got a royal mess on our hands!\" \n            *goto mutiny \n          #Discuss it with all of the officers. \n            *label sorry_no_hanging \n            \"Smoke and oakum! Do you really think it's mutiny?\" asks the Captain. \n           \n            \"Yes, ${sir}.  Yes, I do, ${sir}.\" \n           \n            \"Tell us their names, this instant!  I'll have them hanged!\" blurts out Pigot. \n           \n            \"But you can't be sure; it's just a few whispers and your suspicions,\" ventures Bryce. \n           \n            The Captain shakes ${his} head.  \"Keep an eye out for suspicious behavior.  If you're right, we've got a royal mess on our hands!\" \n           \n            \"Captain,\" Pigot continues, \"with all due respect--\" \n           \n            The Captain interrupts: \"${Mr} Pigot, I advise you not to finish that sentence.\" \n           \n            \"A--Aye aye, ${sir}.\" \n            *goto mutiny \n      #Do nothing. \n        *label ignore_mutiny \n       \n        Are you really going to ignore a potentially murderous mutinous assembly? Why? \n        *fake_choice \n          *if certain_mutiny = false \n            #It might not really be a mutiny. \n              We'll see about that, won't we? \n          #If one of my superior officers dies, I'll advance in the ranks. \n            We'll see about that, won't we? \n          #The hierarchy on this ship is fundamentally unjust. \n            If you say so. \n        *goto mutiny \n\n*label mutiny \n*page_break\n*if suspects_mutiny or AnnoyedPigot\n  A few days later, another major storm hits.  At almost four bells, you find yourself wide awake, entirely against your will.  Unable to return to sleep, you pull on your uniform and go above deck for some fresh air.\n  \n  On deck, you encounter a most unusual sight.  The sky is pouring icy rain.  ${Mr} Pigot is wrestling with two sailors on the edge of the deck.  They are trying to push ${him} overboard; they are trying to murder ${him}.\n  \n  Another sailor is on deck, watching the fight, but not involved.  You're pretty sure ${he} hasn't noticed you yet.\n  \n  *choice\n    #Save Pigot's life.\n      *set honor %+ 30\n      *set courage %+ 20\n      You yell to get the sailors' attention; they hesitate in their wrestling match.  One of them slips overboard as Pigot regains ${his} footing.  Realizing that the plan has failed, the other sailor relents as Pigot backs away from the edge and orders the remaining mutineers locked up.\n      \n      Under the testimony of both lieutenants, the remaining mutineers are convicted by a speedy court-martial consisting of the Captain and the lieutenants.  They hang from the yard arm at dawn the following day.\n      \n      You get a full night's sleep that night.\n      *set Age +3\n      *set Seniority +3\n      *finish\n    #Return below deck for some much-needed sleep.\n      *set honor %-60\n      *set courage %-20\n      In a tragic \"accident,\" Pigot falls overboard, lost at sea.\n      \n      *goto wrapup\n*else\n  A few days later, another major storm hits.  ${Mr} Pigot is the only officer on watch; in a tragic accident, ${he} falls overboard, lost at sea. \n  \n  *label wrapup\n  *set Pigot_alive false\n  How do you feel about Pigot's death? \n  \n  *fake_choice \n    #Saddened.\n    #Frightened.\n    #Angry.\n    #Relieved.\n    #Happy.\n    #Nothing.\n  \n  ${Mr} Bryce, now the first lieutenant, asks you privately, \"${Mr_Surname}, do you really think it was an accident?\" \n  \n  *fake_choice \n    #\"Yes, I'm sure it was an accident.\" \n      \"I suppose you're right.\" \n    #\"No, I don't think it was an accident.\" \n      \"I agree.  We should launch an investigation!\"\n      \n      The investigation seems half-hearted; eventually, the case is closed.\n    \n  Life aboard Courageous slowly returns to normal--running much more smoothly under Bryce's hand than under Pigot's. Months pass.\n  \n*set Age +3\n*set Seniority +3", "badleadership-pigotscrewup": "*set AnnoyedPigot false\n\n\"Ten minutes before eight bells, ${sir},\" the quarter${master} reports.  A steady breeze pulls your ship inevitably west, bound for $!{King}sport.\n\n\"Very good,\" you say.  \"Pipe the watch below.\" \n\nThe first lieutenant, ${Mr} Pigot, arrives promptly to relieve you of your dog watch. \n\n*comment Lt Hornblower Chapter 14 has a nice description of changing watch and going to bed. \n\n\"I relieve you, ${Mr_Surname}.\" \n\n\"Aye aye, ${sir}. I stand relieved.  Good night, ${sir}.\" \n\n\"Good night, ${Mr_Surname}.\" \n\nNot long after, you find yourself lying in your cot, drifting off to sleep.  Soon, you begin to dream. \n\n*page_break \n\nYou find yourself sitting for your lieutenant's examination.  Three gigantic captains are looking down at you with terrible grins, larger than life. \n\n\"Good day, ${Mr_Surname}.  My first question to you is as follows.  You are in temporary command of a 36-gun ship, returning to Albion with maximum haste.  The wind is with you, and you are at full sail.  The barometer reports a sudden drop in pressure.  What do you do next?\" \n\n*fake_choice\n  #I don't know the answer! I'm going to fail the exam!\n  #Stammer and stall for time.\n  #Make something up.\n  #Admit that I don't know.\n\nThe captains laugh cruelly.  \"Failing the exam already, $!{Surname}?  Any officer would know that a sudden drop in pressure indicates the arrival of a major storm! By the time you'd reef the sails, you'd probably lose a mast!\"\n\n\"Here is your next question,\" the second captain says. \n\n\"You are in temporary command of a 36-gun ship, returning to Albion with maximum haste.  The wind is with you, and you are at full sail.  The barometer reports a sudden drop in pressure.  What do you do next?\" \n\n*fake_choice \n  #Didn't you just ask me this question?\n  #A strong wind is coming. Let out more sail to pick up speed. \n  #Cut holes in the sail to maintain speed through the weather. \n  #We're about to be calmed.  Prepare oars for rowing. \n  #Oh no!  All of these answers are incorrect!\n\nThe captains shriek with laughter, chilling your bones.  \"Even the most novice sea${man} would know that a drop in barometric pressure means an oncoming squall!  You should have chosen to furl the sail!\" \n\n\"This is your final question,\" the third captain says, disapprovingly. \n\n\"You are in temporary command of a 36-gun ship, returning to Albion with maximum haste.  The wind is with you, and you are at full sail.  The barometer reports a sudden drop in pressure.  What do you do next?\" \n\n*comment This is awkward.  I put in a helpful tester to verify that there were no duplicate options! \n*temp empty \n*set empty \"\" \n\n*fake_choice \n  #A storm is coming.  Furl the sail to avoid disaster.${empty} \n  #A storm is coming.  Furl the sail to avoid disaster.${empty}${empty} \n  #A storm is coming.  Furl the sail to avoid disaster.${empty}${empty}${empty} \n  #A storm is coming.  Furl the sail to avoid disaster.${empty}${empty}${empty}${empty} \n*gosub trial_end\n\n\"${Mr_Surname}, you have officially failed this lieutenant examination.  This is the worst performance I have ever seen in an acting-lieutenant.  Furthermore, it is the unanimous agreement of the examination board that you shall be disrated and pressed into service as an ordinary sailor.  Good day, '${Mister}' $!{Surname}!\" \n\nYou awake with a start. \n\n*page_break \n\nDrowsily, you can hear Pigot call the watch; it's midnight.  The ship is heaving erratically.  As you yawn deeply, your ears pop.  The pressure has changed. \n\n*choice \n  #Fall back asleep. \n    *label sleep \n    There's probably nothing to worry about.  It is Pigot's watch, after all--not yours.  It's a bit hard to sleep comfortably with all that heaving, but you've slept under worse conditions. \n    *page_break \n    Bryce, the ship's second lieutenant, wakes you before dawn the next morning.  \"${Mr_Surname}!\" ${he} says, in a loud whisper. \n     \n    \"Hmm? Aye, ${sir}?\" \n     \n    \"Pigot lost three ${men} in a storm last night.  $!{He} says Jones is to blame.\" \n     \n    \"Come again, ${sir}?\" \n     \n    \"Last night's squall came on quite suddenly; Pigot says Jones was arguing, countermanding ${his} orders.  We'll be discussing it in the Captain's quarters after breakfast.  Get yourself ready.\" \n    *finish \n  #Send word above deck. \n    You call for a midship${man}, still only partly dressed.  \"Yes, ${sir}?\" ${he} asks.  \"What word should I send?\" \n     \n    *choice \n      #Tell Pigot to furl the sail. \n        *if tact \u003c 30 \n          If you'd had more tact, you might have thought twice before sending a message like that to a superior officer!  Pigot's the first lieutenant; ${he}'s the officer of the watch right now.  You have no right to give ${him} advice like this; ${he} would have every right to take offense. \n          \n          *goto offensive_message\n        *else \n          You may want to think twice before sending a message like that to a superior officer!  Pigot's the first lieutenant; ${he}'s the officer of the watch right now.  You have no right to give ${him} advice like this; ${he} would have every right to take offense. \n           \n          Are you sure you want to send this message? \n          *choice \n            #Yes, do it anyway. \n              *label offensive_message\n              *set AnnoyedPigot true \n              *label message \n              \"Aye, ${sir},\" says the volunteer.  A few minutes later, ${he} returns.  \"${Mr} Pigot's compliments, ${sir}, and ${he} has the matter well in hand.\" \n              \n              \"What matter?\" you ask; ${he} shrugs, confused. \n              *choice \n                #Go back to bed. \n                  *goto sleep \n                #Go above deck personally. \n                  *goto go_above \n            #No, never mind. \n              *goto never_mind_message \n      #Ask how things are on deck. \n        *goto message \n      #Never mind! \n        *label never_mind_message \n        \"Aye ${sir},\" says the volunteer, with some confusion. \n        *choice \n          #Go back to bed. \n            *goto sleep \n          #Go above deck personally. \n            *goto go_above \n  #Go above deck. \n    *label go_above \n    By the time you get yourself dressed and on deck, you find that things are already going to hell.  Last night's steady breeze has become a gale; you feel the mist of rain on your cheek. \n     \n    \"${Mr_Surname},\" says Pigot, greeting you formally.  It's hard to see clearly, but you think you can spy Jones up in the riggings, along with two other ${men}. \n     \n    *temp already_suggested \n    *set already_suggested false \n     \n    *choice \n      #Tell Pigot to furl the sail. \n        *label just_tell_him \n        *if tact \u003c 30 \n          How tactless.  You can't just tell Pigot what to do!  $!{He}'s your commanding officer.\n        \n          *goto order_pigot \n        *else \n          No, no, no.  You can't just tell Pigot what to do!  $!{He}'s your commanding officer.  This violates every protocol of the Royal Navy! \n          *choice \n            #To hell with protocol! $!{He} could get us all killed!\n              *set AnnoyedPigot true \n              \"What did you say to me, ${Mr_Surname}? You there,\" Pigot growls to the ${master}'s mate, \"did you hear what ${he} just said?\" \n               \n              \"Aye ${sir}?\" the mate replies noncommittally--trying not to get involved. \n               \n              \"The Captain will hear of this. Return to your quarters,\" orders Pigot. \n               \n              *choice \n                #Go back to bed. \n                  You clumsily excuse yourself to return to your cabin below deck. \n                  *goto captain_on_deck \n                #Wake the Captain. \n                  What's your plan, exactly? \n                  *fake_choice \n                    #If Pigot won't listen, I'll have to go over ${his} head. \n                    #I can spin this better if the Captain hears from me first. \n                    #The Captain could appear at any moment; if I delay ${him}, I may protect Pigot from trouble. \n                   \n                  You may not get your chance. \n                  *label captain_on_deck \n                   \n                  Just at that moment, Captain Kent appears from ${his} cabin.  \"Captain on deck!\" yells Pigot. \n                   \n                  Just then, Jones falls from the riggings of the mizzen mast.  Another sailor reaches out to catch ${him}; the wind shrieks and the ship groans and leans precipitously.  You hear a pop as someone's arm dislocates.  Before anyone can say a word, both sailors have fallen to the deck, one of them killed instantly on impact. \n                   \n                  The Captain takes over from here.  \n    \n                  *finish \n            #Firmly insist that ${he} furl the sail. \n              *label order_pigot \n              *set AnnoyedPigot true \n              Pigot laughs.  \"You came all the way up here to tell me that?\" \n               \n              \"I've already got the ${men} furling the sail! What do you take me for?\" \n              *goto captain_on_deck \n            *if already_suggested \n              #Politely ask what ${he} thinks should be done about the sails. \n                *label extra_polite \n                \"What are you driving at, $!{Surname}?\" \n                *goto captain_on_deck \n            *if already_suggested != true \n              #Politely bring up the weather and ask what ${he} suggests. \n                Pigot looks at you strangely.  \"Well, of course I'd noticed the wind, so I'd sent a few ${men} to pull in some sail.  Why do you ask?\" \n                *goto captain_on_deck \n      #Politely bring up the weather and ask what ${he} suggests. \n        *set already_suggested true \n        Pigot looks at you strangely.  \"Well, of course I'd noticed the wind, so I'd sent a few ${men} to pull in some sail.  Why do you ask?\" \n        *choice \n          #Tell Pigot to furl the sail completely. \n            *goto just_tell_him \n          #Tactfully ask what ${he} thinks should be done about the sails. \n            *goto extra_polite \n          #Go back to bed. \n            You clumsily excuse yourself to return to your cabin below deck. \n            *goto captain_on_deck \n      #Go back to bed. \n        You assess the situation, realizing that there's really nothing you can do here; either Pigot has it in hand, or ${he} doesn't, and there's nothing you can do about it either way. \n         \n        You clumsily excuse yourself to return to your cabin below deck. \n        *goto captain_on_deck\n*finish\n*label trial_end\n*check_purchase adfree\n*if not(choice_is_steam) or (choice_purchased_adfree or not(choice_purchase_supported))\n  *label purchased\n  *return\nRemember earlier how we told you that the first part is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort\n", "badleadership-punishpigot": "After breakfast, all the officers of the ship gather together in the Captain's cabin.\n\n*if AnnoyedPigot \n\n        Pigot takes a moment to turn to you and hiss, \"What were you trying to do last night--make it seem to everyone that I don't know my job? You'll pay for your insolence.\"\n        \n        You have no opportunity to defend yourself before the Captain calls for everyone's attention.\n         \n\"My question for you, ${Mr} Pigot,\" the Captain says, \"is: why were there still ${men} on the riggings when the storm arrived?\"  \n\n\"I could see from on deck that $!{Master}'s Mate Jones hadn't reefed the sail correctly,\" replies Pigot, \"so I ordered the ${men} to return aloft to secure it properly.\" \n\nThe Captain counters, \"Jones says that you gave the order to reef the sail too late, and that ${he} and Wilson were already under heavy weather.\" \n\n\"With all due respect, ${sir}, Jones is an insubordinate and unskilled ${master}'s mate.  I'm not surprised ${he} has invented an excuse.  I gave the order when it was needed.\" \n\n*temp YouSupportJones \n\n*choice \n  #Support Jones. \n    *set YouSupportJones true \n    *set AnnoyedPigot true \n    \"$!{Sir},\" you interject, \"may I ask a question?\" \n     \n    \"Certainly,\" Pigot replies nervously. \n     \n    \"The storm arrived quickly, as you said.  How and when did you know that the sails needed to be reefed?\" \n     \n    \"${Mr_surname}, you must be quite inexperienced to have to ask such a question.  I knew the sails had to be reefed immediately when \n    *comment TODO what's the wrong indicator? \n    the wind picked up and the rain set in.\" \n    *goto barometer \n  #Support Pigot. \n    *set YouSupportJones false \n    \"$!{Sir},\" you interject, \"if it's to be ${Mr} Pigot's word against Jones's, there's no question in my mind that ${Mr} Pigot is in the right. Jones behaved deplorably aboard the prize ship, and demonstrated a clear lack of sailing ability.\" \n     \n    \"Indeed,\" agrees Pigot.  \"I gave the order the moment \n    *comment TODO what's the wrong indicator? \n    the wind picked up and the rain set in.\" \n    *goto barometer \n  #Stay out of it. \n    *set YouSupportJones RelationshipJones > 50 \n    Pigot continues, caught up in ${his} own blustering, \"I gave the order the moment \n    *comment TODO what's the wrong indicator? \n    the wind picked up and the rain set in.\" \n\n*label barometer \n\n\"And not when the barometric pressure dropped?\" asks the Captain. \n\nThere is a brief silence, as everyone in the room realizes that Pigot has just admitted to a serious blunder.  $!{He} turns red with rage and embarrassment. \n\n\"I gave the order at the right time!\" ${he} insists, banging ${his} fist on the table.  \"I demand that Jones be flogged for ${his} error reefing the sails.\" \n\n*comment HA meaty is weird for woman - perhaps just banging ${his} fist?\n\n\"I'm sure ${he} did the best ${he} could, under the circumstances,\"  \n*if YouSupportJones \n  you suggest. \n   \n  *goto JonesFlog \n*else \n  the Captain suggests. \n*label JonesFlog \n\"But ${his} best was simply not good enough, and now two ${men} are dead.\" The Captain is silent for a moment, then says,  \"${Mr} Pigot, I will not mention you by name in my report on this to the Admiralty, but I will remember this as I prepare future reports.  As for Jones, the bosun will administer twenty lashes under ${Mr} Pigot's supervision.\" \n\n*comment  This isn't totally trivial punishment-- the Captain's reports on Pigot are of crucial importance to whether ${he} receives a promotion.  But it still is fairly light punishment, especially where Pigot's career is basically stalled out anyway.\n\nBryce pipes up, \"Jones is still under the care of Dr. Miller.\" \n\n\"Very well; ${his} punishment will be postponed until such time as Dr. Miller agrees to allow it.  You are dismissed.\" \n\n*if AnnoyedPigot \n  Once you're both out of earshot, Pigot leans in to whisper to you: \"Mark my words, ${Surname}: your career in the Navy is well and truly finished!\" \n\n*page_break \nAs soon as ${he}'s able to walk, Jones is laid out for twenty lashes.  Pigot has the bosun beat ${him} as hard as ${he} can; ${he}'s immediately returned to the surgeon's care.\n\n*if AnnoyedPigot = false\n  *finish\n\nLater that night, a midship${man} wakes you from very deep sleep.\n\n\"${Mr} Pigot's compliments, ${sir}, and ${he}'s passing the word for you.\"\n\nBecause ${he} is senior to you, you have no choice but to report when\n${he} sends for you.\nYou stagger out of bed, quickly pull on your uniform, and\nmake your way to the deck, where ${Mr} Pigot awaits you with a nasty\nsmile.\n\n\"${Mr_Surname}, did the weather change at all during your watch?\"\n\n\"Yes, ${sir},\" you reply, as clearly as you are able, \"the wind changed twice during the evening.  At the end of my watch the wind was favorable.\"\n\n\"Very well.  You are dismissed.\"\n\nWhat an odd question.  Couldn't ${he} have gathered this information from the log?\n\n*page_break\n\nYou find that you're a bit tired the following day.  You find it difficult to avoid yawning disrespectfully, but you're in the Royal Navy; you can manage it.\n\n*page_break\n\nBut two days later, Pigot wakes you up again, in the middle of your sleep cycle.\n\n\"How many times did you throw the chip log to measure speed?\" ${he} asks.\n\n\"Uh, three times, ${sir},\" you slur.\n\n\"Come again, ${Mr_Surname}?\"\n\n\"$!{Sir}, I said three times.\"\n\n\"I see.  ${Mr_Surname}, in my opinion, you appear to be inebriated with rum.\"\n\n\"$!{Sir}, no ${sir}.\" It's almost three bells; you're exhausted, but you're not drunk.\n\n\"Well, I'll see to it that this won't happen again.  You're not to have another drop of rum until my order, is that clear?\"\n\n\"Aye aye, ${sir}.\"\n\n\"You are dismissed, ${Mr_Surname}.\"\n\nPigot wakes you again three days later, to ask whether the Captain gave you any standing orders that ${he} should be aware of as the next watchstanding officer.\n\nAnd again two days after that.\n\n*page_break\n\n${Mr} Pigot wakes you at least once every two or three days for the next three weeks; sometimes ${he} takes the opportunity to lecture for an hour on the importance of respect and good discipline on a ship. $!{He}'s doing everything in ${his} authority to make your life hell.\n\nThe following evening, you catch yourself nearly falling asleep on duty--an offense punishable by death.\n\n*choice\n  #Try to apologize to Pigot.\n    *label apologize\n    \"Oh, it's far too late for that, ${Surname},\" says Pigot.  You bristle slightly; in private, ${he} refuses to call you \"${Mr_Surname},\" disrespecting you as an officer.\n    \n    \"$!{Sir}, isn't there anything that can change your mind?\"\n    \n    \"You should have thought of that before you crossed paths with me!\"\n    \n    \"$!{Sir}--\"\n    \n    \"Your career is over, ${Surname}.  It's only a matter of time.\"\n    *finish\n  #Ask ${Mr} Bryce what to do about this.\n    *set tact %+ 20\n    \"I know this is a sticky situation for you,\" says Bryce. \"I wish there were more I could do.  You're not the only officer Pigot has treated unfairly.\"\n    \n    \"Can't we go to the Captain?\" you ask.\n    \n    \"I wouldn't, if I were you.  Everything Pigot has done has been entirely within ${his} authority; ${he}'ll just tell the Captain that your reports have been incomplete.  As our superior officer, ${his} testimony will always have the benefit of the doubt.\"\n    \n    \"With all due respect, ${sir}, ${he}'d be lying to the Captain.\"\n    \n    \"${Mr_Surname}, I know you're a good officer.  But it's not about what's true and what's false; it's about the chain of command, upon which all our lives depend.\"\n    \n    Bryce pauses as you consider ${his} remark.  H.M.S. Courageous is in constant peril: from the Gauls, from the sea, and from ${his_opp} own crew.  Discipline is ${his_opp} first and last defense.\n    \n    \"$!{Sir}, if the Captain won't break the chain of command, then what do you suggest?\"\n    \n    \"Damned if I know.  I suppose you could try apologizing to Pigot, but if I know ${him} half as well as I think I do, ${he}'ll just spit in your face.  No, I think your best bet for now is to simply keep a stiff upper lip.\"\n    *choice\n      #Try to apologize to Pigot.\n        *goto apologize\n      #Complain directly to the Captain.\n        *goto captain\n      #Tough it out.\n        *goto tough_it\n  #Complain directly to the Captain.\n    *label captain\n    \"${Mr_Surname}, are you asking me to violate the chain of command?\"\n    \n    You hesitate before answering the Captain's question; ${he} continues: \"According to ${Mr} Pigot, you've been giving ${him} incomplete reports.\"\n    \n    \"$!{Sir}, I--\"\n    \n    \"I'm not asking you a question, ${Mr_Surname}.  I'm well aware of ${Mr} Pigot's behavior.  You won't be the first junior officer who shares a grudge with ${him}.  But as long as ${he} acts within ${his} authority, I will not act to usurp it.\"\n    \n    \"Yes, ${sir}.\"\n    \n    *temp daddy\n    *set daddy \"Daddy\"\n    *if sex = \"female\"\n      *set daddy \"Mommy\"\n    \"On my ship, the officers are to behave as grown adults.  You're a lieutenant now, ${Mr_Surname}.  You are not a child who can come running to ${Daddy} when you have a problem.\"\n    \n    \"Aye aye, ${sir}.\"\n    *choice\n      #Try to apologize to Pigot.\n        *goto apologize\n      #Tough it out.\n        *goto tough_it\n  #Tough it out.\n    *label tough_it\n    The next night, Pigot wakes you again at three bells.  The following afternoon, you catch yourself dozing during duty.  It couldn't have been more than a few seconds; no one appears to have noticed this time.\n    *finish", "climacticbattle": "*temp HMS\n*set Age +3\n*set Seniority +3\n*if (rank=3)\n  *set rank 4\n  *set Seniority 0\n  In recognition of your able service turning H.M. Sloop Defender into a worthy part of the Royal Navy, the Admiralty promotes you to post-captain and assigns you to command H.M.S. Dauntless, a 38-gun frigate.\n  *set HMS \"H.M. Sloop\"\n  *goto Dauntless\n*else\n  In recognition of your able service aboard H.M.S. Defender, the Admiralty assigns you to command a true frigate more suited to your abilities.  You assume command of H.M.S. Dauntless, a 38-gun frigate.\n  *set HMS \"H.M.S.\"\n  *goto Dauntless\n\n*label Dauntless\n\nThe Admiralty asks if you have a preference for your first lieutenant.\n*choice\n  #I ask for $!{Mr} Stuart from H.M.S. Courageous.\n  \n    *label Stuart\n    $!{Mr} Stuart is available, and the Admiralty orders ${him} to report to H.M.S. Dauntless.  $!{He} is young for the post, but enthusiastic and shaping up to be a fine officer.\n    \n    *set FirstLieutenant \"Stuart\"\n    *goto Tropics\n    \n  #I ask for $!{Mr} Mason from H.M.S. Courageous.\n    $!{Mr} Mason already has pressing duties.  $!{He} is currently serving as an admiral's flag lieutenant.  Do you have a second preference?\n    \n    *choice\n      #$!{Mr} Stuart.\n        *goto Stuart\n      #$!{Mr} Benton.\n        *goto Benton\n      #No preference, then.\n        *goto NoPref\n  #I ask for $!{Mr} Benton from ${HMS} Defender.\n  \n    *label Benton\n    A surprising choice.  Most officers who have served with $!{Mr} Benton would not seek out the opportunity to do so again.  Still, your unexpected patronage earns you ${his} eternal loyalty.\n    \n    *set FirstLieutenant \"Benton\"\n    *set Likeability %+10\n    *set Sailing %-10\n    *set Gunnery %-10\n    *set Fighting %-10\n    *set Leadership %-10\n    *goto Tropics\n    \n  #I make no requests; the current first lieutenant will serve admirably.\n  \n    *label NoPref\n    The current first lieutenant is a ${man} in ${his} early thirties named Evans.  $!{He} is competent and able, but nothing more than that.  Also, by not making personnel management more difficult for your superiors, you have earned a small additional amount of support higher up in the Royal Navy.\n    \n    *set FirstLieutenant \"Evans\"\n    *set Tact %+5\n    *set Patronage %+5\n    *goto Tropics\n\n\n*label Tropics\n\nYour frigate, H.M.S. Dauntless, sails into $!{Kings}port harbor.  $!{Kings}port is the principal harbor city in one of Albion's major colonial possessions in the tropics.  The fleet based out of $!{Kings}port consists mostly of frigates like your own--perfect for raiding Gaulish shipping and for defending Albion's own merchant marine from the depredations of the Gaulish Navy and privateers.  Assignment to this fleet is quite a plum, with great opportunities for prize money and pleasant ports of call on the tropical islands.\n\nShortly after your ship makes port, while you are overseeing the process of taking on new supplies, the signal midship${man} runs up to you.  $!{He} touches ${his} hat in salute and says, \"Signal from the flag:  Admiral's compliments, Captains of Dauntless, Vigilant, and Intrepid please come to the flagship at your convenience.\"\n\n\"Acknowledge the signal and inform the officer of the watch to have my boat prepared for immediate departure,\" you reply.  When an admiral asks you to report to the flagship, it is \"convenient\" for you to drop whatever you are doing and to head over immediately.\n\nWithin a minute, your boat is lowered over the frigate's side.  Upon your arrival, smartly dressed sailors and a marine honor guard pipe you aboard H.M.S. Indomitable, the admiral's flag ship.  The flag lieutenant touches ${his} hat to each of the arriving captains.  \"$!{Sir}, if you will please accompany me?  The Admiral is waiting in ${his} stateroom.\"\n\n*page_break\n\nThe three of you are shown into the Admiral's stateroom--a surprisingly large cabin for a warship, with a large heavy table set in the middle.  The Admiral is in late middle-age, ${his} youthful vigor long since having given way to a prosperous roundness.  $!{His} flag captain murmurs each of your names as you enter.\n\nThe Admiral pours a glass of port for each of you and clears ${his} throat.  \"As you know, one of our principal responsibilities on this station is protecting Albion's merchant shipping.  The foodstuffs and raw materials from these colonies are vital to Albion's security.  Recently, however, a Gaulish commerce raider has taken a large number of our merchantships as prizes.\n\n\"The Gaulish frigate has recently made port on Blue Island.  Blue Island is a possession of Jutland and thus still neutral, so we can't take the frigate there.  But we do have our spies keeping their eyes out, and so we got a report of the frigate.  $!{He_opp}'s a 44-gun frigate, called Lynx, under the command of a Captain Villeneuve.\"\n\n*page_break\n\nYou startle slightly at the name of Lynx's captain, and the Admiral raises an eyebrow.  \"You know of Villeneuve, Captain $!{Surname}?\"\n\n\"Our paths have crossed a few times, ${sir},\" you reply guardedly.\n\n\"All the better.  I'm assigning each of you the mission to hunt down Lynx.  You are to make all efforts to capture or destroy ${him_opp}.  I know, I know. . . you would rather be hunting rich Gaulish merchantships.  I would rather you were hunting merchantships as well.\"  The Admiral smiles--after all, ${he} receives fully one-quarter of the value of any prizes ${his} ships capture.  \"But we have our duty to think of.  Because of the rules of neutrality, none of you can take stations within sight of Blue Island.  I want Vigilant to patrol to the east of the island, Intrepid to sail to the west, and Dauntless to patrol to the north.  One of you should be able to force Lynx to action as ${he_opp} sails out.\n\n\"I am also well aware of the fact that a 44-gun frigate is significantly more powerful than any of your ships.  However, I have no heavier frigates to send, and a ship of the line would be unable to force Lynx to fight.  I trust that the superior sailing and gunnery of the Royal Navy will be more than sufficient for you to prevail.  And, as their Lordships say in the orders giving you command of a ship, 'fail in these duties at your peril,' eh?  Unless there are any questions?  Best be about it, then.\"\n\nYou quickly return to your ship.  As soon as you have the most essential supplies on board, you make sail to fight\n*if (RelationshipVilleneuve > 50)\n  Captain Villeneuve.\n\n  How can you fight ${him} after all you have been through?\n  *fake_choice\n    #It is a duty like any other.\n      Have you no humanity?  Still, that will make this easier.\n    #I dread fighting ${him}, but it is still my duty.\n      Sad yet true.\n    #Surely, there must be some way to avoid this!\n      And perhaps there is.\n\n  *goto Friend\n*elseif (RelationshipVilleneuve \u003c 25)\n  an old enemy.\n\n  How do you feel about fighting Villeneuve?\n  *fake_choice\n    #I look forward to it.\n      At last, old scores will be settled.\n    #It is a duty like any other.\n      A sensible attitude.\n    #I dread fighting ${him}, but it is still my duty.\n      Indeed it is.\n\n  *goto Friend\n*else\n  your oldest rival.\n\n  How do you feel about fighting Villeneuve?\n  *fake_choice\n    #I look forward to it.\n      At last, old scores will be settled.\n    #It is a duty like any other.\n      A sensible attitude.\n    #I dread fighting ${him}, but it is still my duty.\n      Indeed.\n    #Surely, there must be some way to avoid this!\n      And perhaps there is.\n\n  *goto Friend\n*label Friend\n\nYou sail H.M.S. Dauntless into position--north of the main port of Blue Island, but out of sight of the port.  Staying on a specific station requires a certain amount of tacking and sailing back and forth, but that provides you with an opportunity to drill your crew into a high state of readiness.  On the third day after you arrive in position, a sailor in the crow's nest calls down, \"Two sails--one to port, one to starboard!\"\n\nYou pull out your spyglass and look at each ship.  The ship to port looks like a fully-loaded large Gaulish merchant ship.  It would be easy prey for a 38-gun frigate like Dauntless and would fetch you a substantial payment in prize money.\n\nBut the ship to starboard is a warship.  You can't be certain at this range, but that ship is probably Lynx, the Gaulish 44 that you have been sent to defeat.\n\nWhat do you do?\n*choice\n  #There is no glory in taking merchant ships as prizes.  A battle against another frigate is exactly what I want.\n    *set Courage %+15\n    *set Bloodthirst %+15\n    *set Honor %+10\n    *goto BattleLynx\n\n  #Duty demands that I fight the warship despite the dangers.\n    *set Courage %+10\n    *set Bloodthirst %+5\n    *set Honor %+15\n    *goto BattleLynx\n\n  #I could take the merchant ship, but the consequences if the Admiral realized that I shirked an opportunity to fight the Lynx would be too great.\n    *set Courage %+5\n    *set Bloodthirst %+5\n    *set Honor %-10\n    *set Tact %+10\n    *set Intelligence %+10\n    *goto BattleLynx\n\n  #I can't really be sure that the frigate is the Lynx.  Better to take the prize and not worry about it.\n    *set Courage %-15\n    *set Bloodthirst %-10\n    *set Honor %-20\n    *goto AvoidLynx\n\n  *if (RelationshipVilleneuve>70)\n    #This is my chance to avoid fighting Villeneuve!  I'll pursue the other ship instead.\n      *set RelationshipVilleneuve %+10\n      *set Bloodthirst %-10\n      *set Honor %-20\n      *goto AvoidLynx\n\n*label AvoidLynx\n\"Set a course for that ship to port,\" you command.\n\n\"$!{Sir}?  Shouldn't we sail after the ship to starboard?\" asks $!{Mr} $!{FirstLieutenant}, your first lieutenant.\n\n\"I could not be certain that ship was Gaulish,\" you reply.  \"We'll take the prize I could identify.\"\n\n\"Aye, ${sir},\" ${he} says dubiously.\n\nYou sail over to the merchant ship.  A single warning shot is enough to make the merchant ship surrender.\n\nYou continue patrolling off the north coast of Blue Island for another three weeks, taking several more merchant ships as prizes.  Finally, a Royal Navy sloop arrives with orders for you to return to port.\n\nUpon returning to $!{Kings}port harbor, flags immediately signal for you to report to the Admiral on H.M.S. Indomitable.\n\n*page_break\n\nThe Admiral looks up at you grimly as you enter ${his} stateroom.  \"Some three weeks ago, Lynx sailed north out of Blue Island harbor.  Somehow, ${he_opp} eluded your patrol.  We've lost a dozen merchant ships since.\"\n\n\"We did our best, ${sir},\" you reply.\n\n\"Perhaps you did, perhaps you did,\" the Admiral replies.\n\n*if (Patronage > 70)\n\n  The Admiral thinks for a moment.  \"I suppose there's nothing for it.  I'm going to restore you to standard commerce raiding duty.  It seems to be what you are best at.\"\n\n  For the rest of your assignment on the $!{Kings}port station, you find that the Admiral is cold to you, and you are not surprised when orders come for you to return to Albion.  You do win substantial prize money taking Gaulish merchant ships though, and your strong patronage means the Admiral cannot take any formal action against you.\n\n  *set Patronage %-15\n  *set Wealth %+20\n  *finish\n  \n*elseif (Patronage > 50)\n\n  The Admiral nods, as if ${he} has been making up ${his} mind.  \"We will see what the court-martial concludes.  I have decided to proffer charges against you for disobeying a direct order and for failure to do the utmost to destroy the enemy.\"\n\n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but ${his} testimony is fairly damning.  In the end, you are greatly relieved when the panel of fellow captains returns your sword to you hilt first with a verdict of \"not proven.\"  Nonetheless, the court-martial, and the attendant disgraceful reputation for cowardice, ruins your career.\n\n  *set disgraced true\n  *set Wealth %+20\n  *set Patronage %-50\n  *finish\n  \n*else\n\n  The Admiral nods, as if ${he} has been making up ${his} mind.  \"We will see what the court-martial concludes.  I have decided to proffer charges against you for disobeying a direct order and for failure to do the utmost to destroy the enemy.\"\n\n  The court-martial is in many ways the worst experience of your life.  $!{Mr} $!{FirstLieutenant} testifies in the court-martial.  $!{He} seems to be trying to be both truthful and helpful to you, but ${his} testimony is fairly damning.  You have never had much support in the rest of the Royal Navy.  The board of fellow captains that makes up the court-martial votes unanimously to convict you, and you return to the court to see your naked sword positioned point first towards you.\n\n  The only possible sentence for the crimes of which you have been convicted is death.  On a cold gray morning, a firing squad ends your life.\n\n  *set disgraced true\n  *set Patronage %-75\n  *goto_scene death\n \n\n*label BattleLynx\n\n\"Set a course for the ship to starboard, $!{Mr} $!{FirstLieutenant}, and beat to quarters,\" you say calmly.\n\n\"Aye aye, ${sir},\" ${he} responds.\n\nDrums echo throughout the ship as the crew clears the ship for action.\n\nNeither ship has the wind gage as you approach, but the wind is blowing strong and steady, giving you a fair degree of speed and maneuverability.  Lynx is the stronger ship in terms of armament and construction, but the ${men} of the Royal Navy are generally better trained and more reliable than those of the Gaulish Navy.\n\n*temp Advantage\n*set Advantage \"none\"\n\nHow do you plan to win this battle?\n*choice\n  #Charge straight at Lynx--the sooner I can make this a boarding action, the better.\n    *set Courage %+10\n    *set Intelligence %-10\n    \n    You set a course to take you towards Lynx as quickly as possible, while maintaining a broadside to broadside fight.  Captain Villeneuve clearly anticipates your plan and tries to edge away from you, keeping this a gunnery battle for as long as possible.\n    \n    *if (Sailing > 60)\n    \n      Despite Lynx's best efforts, you close rapidly and smoothly.  Each ship gets off several broadsides before you lay Dauntless alongside Lynx, but not nearly as many as the Gaulish would have liked.\n      \n      *if (Gunnery > 85)\n      \n        Your broadsides wreak havoc on Lynx, giving you a substantial advantage as the boarding action begins.\n        \n        *set Advantage \"Dauntless\"\n        *goto BoardingAction\n        \n      *elseif (Gunnery \u003c 35)\n      \n        Lynx's broadsides give you a drubbing as you approach, giving the enemy a substantial advantage as the boarding action begins.\n        \n        *set Advantage \"Lynx\"\n        *goto BoardingAction\n        \n      *else\n      \n        *goto BoardingAction\n        \n    *else\n    \n      Despite your best efforts, however, Lynx keeps you at medium cannon range.  Each ship fires broadside after broadside, trying to batter the other into surrender.\n      \n      *goto GunneryDuel\n\n  #Stay at range and fight a gunnery duel, relying on my ship's superior gunnery to offset Lynx's heavier broadsides.\n\n    Captain Villeneuve is happy to take ${his} chances in a protracted broadside duel as well, so you take up positions at medium cannon range and begin exchanging broadside after broadside.\n    \n    *set Courage %+10\n    *if (Gunnery \u003c 50)\n      *set Intelligence %-10\n      *goto GunneryDuel\n      \n    *elseif (Gunnery > 75)\n      *set Intelligence %+10\n      *goto GunneryDuel\n      \n    *label GunneryDuel\n    *if (Gunnery > 90)\n    \n      The first several broadsides are inconclusive.  You inflict some damage on Lynx, their counterfire inflicts some damage on Dauntless, but the battle rages on.  The fifth broadside is a turning point, however.  A ball from one of your heaviest guns slams into the base of Lynx's mainmast. The mast sways from the damage and then gives way, crashing over Lynx's side and leaving heavy wreckage in the ocean as an anchor of sorts.\n      \n      You capitalize on your advantage, rounding Lynx's bow and raking ${him_opp} with a heavy broadside.  As you prepare to come about to rake ${him_opp} again, Lynx hauls down the Gaulish flag in surrender.\n      \n      *goto VictoryLightDamage\n      \n    *elseif (Gunnery > 75)\n    \n      The gunnery duel rages on, with each ship firing broadside after broadside at the other.  Lynx has a significantly heavier broadside, perhaps a third again as powerful as yours, but your well-trained crew maintains a higher rate of fire with better accuracy.  Slowly, slowly you wear the enemy down, although you take casualties and damage all the while, hoping that Lynx does not get a lucky hit that could win the battle.\n      \n      *set Advantage \"Dauntless\"\n      \n      Despite your advantages in the gunnery duel, you have not been able to disable Lynx.  Captain Villeneuve begins seeking to close with you, hoping that a boarding action will be more favorable than the gunnery battle.\n      \n\n      Do you let ${him} force you into a boarding action?\n      *choice\n        #Yes, best to finish this with sword and pistol.\n          *set Honor %+10\n          *set Courage %+10\n          *set Intelligence %-15\n          \n          You allow Lynx to close the distance between your ships, ripping into the enemy with one last broadside before Captain Villeneuve lays ${his} ship alongside yours.\n          \n          *goto BoardingAction\n\n        #No.  I have ${him} where I want ${him}, and I intend to keep ${him} there until this is finished.\n          *set Intelligence %+15\n          *set Bloodthirst %+10\n          *set Honor %-10\n          *if (sailing > 65)\n          \n            You keep Lynx at range, despite Villeneuve's attempts to close the distance, and slowly batter Lynx into submission.  Finally, after hours of fighting, Lynx hauls down the Gaulish flag and surrenders.  You finally close the distance between the ships and send a prize crew aboard.\n            \n            *goto VictoryHeavyDamage\n            \n          *else\n          \n            You do your best to keep Lynx at range, but Captain Villeneuve is a more able sailor than you are.  Try as you might, you cannot prevent ${him} from bringing Lynx alongside Dauntless.  You'll have to finish this with sword and pistol.\n            \n            *goto BoardingAction\n            \n    *elseif (Gunnery > 50)\n      *set Advantage \"None\"\n      \n      Dauntless and Lynx exchange broadside after broadside, but the results are inconclusive.  Lynx throws much more lead with each broadside, but the Gaulish gunners are no match for the Royal Navy's rigorous training.  Several of their cannon balls rip across your deck, smashing ${men} and material alike to pieces.\n      \n      *goto ContinueBattle\n\n    *elseif (Gunnery > 25)\n    \n      *set Advantage \"Lynx\"\n      \n      Villeneuve's gunners pound Dauntless mercilessly.  The claims that Royal Navy gunners would make up the difference between your broadsides with their skill seems laughable as cannonball after cannonball smashes through your ship, shattering parts of the hull as deadly splinters and killing ${men} you have thought of as friends for years.  You cannot withstand much more of this.\n      \n      *goto ContinueBattle\n      \n    *else\n    \n      The first several broadsides are inconclusive.  You inflict some damage on Lynx, their counterfire inflicts some damage on Dauntless, but the battle rages on.  The fifth broadside is a turning point, however.  A ball from one of Lynx's heaviest guns slams into the base of your mainmast. The mast sways from the damage and then gives way, crashing over the side and leaving heavy wreckage in the ocean as an anchor of sorts.\n      \n      Captain Villeneuve capitalizes on ${his} advantage, rounding your bow and raking you with a heavy broadside.  It's fairly clear that you are beaten.\n      \n      Do you surrender?\n      *choice\n        #Never!\n        \n          Captain Villeneuve pounds your ship with broadside after broadside, remaining in front of your bow so you cannot bring your broadside to bear.  The damage and devastation is terrible.  Finally, a cannonball throws a splinter directly through your abdomen, and the state of the battle stops being your concern.\n          \n          One of the last things you are aware of before you bleed to death is your last surviving lieutenant surrendering the ship.\n          \n          *goto DefeatDeath\n          \n        #I have no choice.\n        \n          Fighting on will just leave more of your ${men} dead.  With a heavy heart, you order $!{Mr} $!{FirstLieutenant} to pull down the proud flag of Albion and surrender.\n          \n          *goto Defeat\n       \n  #Lead Lynx into a trap.  If I can make Villeneuve think ${he} has damaged my ship worse than ${he} has, I will be able to gain the advantage.\n  \n    *set Intelligence %+10\n    *set Bloodthirst %-10\n    *set Courage %-10\n    *set Honor %-5\n    \n    *if (RelationshipVilleneuve > 70)\n    \n      Based on your long history with Captain Villeneuve, you know that ${he} cannot resist a gamble.  If you present ${him} with a situation where ${he} has a bold and risky option, ${he} will surely take it.\n      \n      *goto SuccessfulTrap\n      \n    *elseif (Intelligence > 70)\n    \n      It is difficult to fool a canny and experienced captain, but your intelligence still allows you to perfect your trap.\n      \n      *label SuccessfulTrap\n      \n      You fake an accident on the ship, making it seem that one of the lines in your ship's rigging has broken, disabling the ship.  As your ship lurches around, Captain Villeneuve sees the opportunity to rake your ship's bow.  As ${he} brings Lynx into position, however, you quickly give the orders to tighten down the lines you deliberately let go slack and execute a sharp turn. Before Villeneuve can react, you bring Dauntless behind Lynx.  Instead of Lynx raking your bow, you rake the enemy's stern.\n      \n      *set Advantage \"Dauntless\"\n      *goto ContinueBattle\n      \n    *else\n    \n      You lay your trap carefully, but not well enough.  You fake an accident on the ship, making it seem that one of the lines in your ship's rigging has broken, disabling the ship.  As your ship lurches around, Captain Villeneuve sees the opportunity to rake your ship's bow.  As ${he} brings Lynx into position, you intend to quickly give the orders to tighten down the lines you deliberately let go slack and execute a sharp turn.  Unfortunately, Captain Villeneuve sees through your deception and takes advantage of it to pound Dauntless with a perfectly timed broadside.\n      \n      *set Advantage \"Lynx\"\n      *goto ContinueBattle\n\n  *comment #Lure Lynx towards the east.  If I can force the Gaulish to fight both Dauntless and Vigilant at the same time, we will certainly prevail.\n  \n  *comment  Blah blah blah\n  \n    *comment I'm not quite sure how this should play out.  Should it be possible to double team Lynx?  Perhaps depending on stats, you can double-team Lynx, in which case you win but don't get the full glory?  Otherwise when it becomes clear what you're trying, Lynx closes forcing a BoardingAction.\n    \n  *comment This option is currently unavailable.  If we choose to add it later, we can write it then.\n\n\n*label ContinueBattle\n*page_break\n\n*if (Advantage=\"Lynx\")\n\n  The battle is going poorly for you, although it is certainly not lost yet.  Captain Villeneuve is trying to close with Dauntless to force a boarding action.\n  \n  *goto ContinueBattleB\n  \n*elseif (Advantage=\"Dauntless\")\n\n  The battle is going well, but you certainly have not won yet.  Captain Villeneuve is trying to close with Dauntless to force a boarding action, hoping to take advantage of ${his} larger crew to make up the deficit.\n  \n  *goto ContinueBattleB\n  \n*else\n\n  Thus far, you've given as good as you've gotten.  The battle could go either way.  Captain Villeneuve is trying to close with Dauntless to force a boarding action.\n  \n\n*label ContinueBattleB\n\nIt will be hard to maintain the battle as a gunnery action--you'll have to either carry the enemy by boarding or try to damage their rigging enough to sail away.\n\nWhich will it be?\n*choice\n  #I've done enough to be able to break off the battle honorably--that's all I really wanted.\n    *set Honor %-10\n    *set Bloodthirst %-15\n    *set Courage %-10\n    *set Intelligence %+10\n    *set RelationshipVilleneuve %+10\n    *set Patronage %-10\n    *goto BreakOff\n\n  #I would really like to press the battle, but it's too dangerous.  I must flee.\n    *if (Advantage = \"Dauntless\")\n      If you say so. . .\n      *set Honor %-15\n      *set Bloodthirst %-15\n      *set Courage %-15\n      *set Intelligence %-10\n      *set Patronage %-15\n      *goto BreakOff\n    *elseif (Advantage = \"Lynx\")\n      Indeed, fighting on would likely just cost the ship.\n      *set Honor %-5\n      *set Bloodthirst %-10\n      *set Courage %-5\n      *set Intelligence %+20\n      *set Patronage %+5\n      *goto BreakOff\n    *else\n      A tough decision, Captain.\n      *set Honor %-10\n      *set Bloodthirst %-13\n      *set Courage %-10\n      *set Intelligence %+5\n      *set Patronage %-5\n      *goto BreakOff\n  #I think I can win this one.\n    We'll see about that, won't we?\n    *if (Advantage = \"Lynx\")\n      *goto ToTheBitterEnd\n    *else\n      *set Courage %+5\n      *set Bloodthirst %+5\n      *set Intelligence %+5\n      *goto BoardingAction\n\n  #The only possible end to this battle is Lynx's surrender or destruction.\n    That's the spirit!  Albion is proud to have defenders like you.\n    *label ToTheBitterEnd\n    *set Honor %+15\n    *set Bloodthirst %+15\n    *set Courage %+10\n    *set Intelligence %-10\n    *set RelationshipVilleneuve %-10\n    *set Patronage %+10\n    *goto BoardingAction\n\n*label BreakOff\n*if ((Advantage=\"Dauntless\") and (RelationshipVilleneuve > 40))\n\n  Captain Villeneuve is not particularly eager to continue a battle that's going against ${him}.  $!{He} lets you sail away, trading some last desultory long-range fire with you as you go.\n  \n  *goto Escape\n  \n*elseif (sailing > 60)\n\n  Captain Villeneuve tries to force you into a boarding action, but ${he} is no match for your sailing skills.  You manage to elude the Gaulish frigate and make your escape.\n  \n  *goto Escape\n  \n*elseif (gunnery > 70)\n\n  Captain Villeneuve pursues you doggedly.  Lynx handles better than Dauntless, and for many tense moments you fear that ${he} will force you to action despite your best efforts.  Finally, however, Dauntless's gunnery accomplishes what ${his_opp} sailing could not:  your ${men} shoot away one of Lynx's yardarms, dramatically reducing ${his_opp} speed.  By the time Captain Villeneuve has made ${his} repairs, you have opened up enough distance that ${he} cannot catch you.\n  \n  *goto Escape\n  \n*else\n\n  You turn this way and that, trying every trick you know to escape from the enem
