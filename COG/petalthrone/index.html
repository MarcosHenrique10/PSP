oach, $!{wave} smiles and moves aside for you to enter the strange palanquin. You grab ${wahis} wrist and twist, causing the Eye to drop from numb fingers and roll, bouncing, under the sphere and down into the pit. \n\t\t\t\t*goto wav_defeat\n\t\t\t*else\n\t\t\t\t\n\t\t\t\tLowering your sword to your side, you advance on $!{wave}. \"You're right. You win.\"\n\t\t\t\t\n\t\t\t\t$!{wahis} eyes narrow. \"Do you think I can't read you after all these years? Stay where you are.\"\n\t\t\t\t*goto wav_conflict\t\n\t\t#\"We should run away together.\"\n\t\t\t*if God = \"Dlamélish\"\n\t\t\t\t*set noble %+15\n\t\t\t*if change = false\n\t\t\t\t*set noble %-10\n\t\t\t\"I don't want to go to Avanthár, no matter the opulence,\" you say, \"and I'm tired of princes and their wars. I just want you.\"\n\t\t\t\n\t\t\t$!{wave}'s full laugh echoes around the chamber. \"What, are you asking me to elope? To leave a prince's ransom \n\t\t\t*if (her_dead) and (nir_dead)\n\t\t\t\there to molder beneath the earth? \n\t\t\t*if (her_dead = false) and (nir_dead)\n\t\t\t\tfor the loyal Heréksa \n\t\t\t*if (her_dead) and (nir_dead = false)\n\t\t\t\tfor the loyal Kási \n\t\t\t*if (her_dead = false) and (nir_dead = false)\n\t\t\t\tfor your two fellow soldiers \n\t\t\t*if (her_dead = false) or (nir_dead = false)\n\t\t\t\tto cart back to your General like a renyú with a bird?  \n\t\t\tAnd what, we just go?  Wash the dust of this place from our heels?\"\n\t\t\t*if ((wav_rep > 1) and (lover = wave)) or (wav_rep > 2)\n\t\t\t\t$!{wahis} laughter dies, and ${wahe} looks at you warmly. \"Why not?\" \n\t\t\t\t*if nir_dead = false\n\t\t\t\t\tStill chuckling, ${wahe} turns to Nirún. \"Though it sounded like the Kási might have some objection.\"\n\t\t\t\t*if nir_dead = true\n\t\t\t\t\tStill chuckling, ${wahe} turns to Rayána. \"Do you want to come too?\"\n\t\t\t\t*set fate \"adventure\"\n\t\t\t\t*goto nir_reptest\n\t\t\t*else\n\t\t\t\t$!{wave} sighs. \"There was a time I would have taken you up on that offer, but no. I can't give up all I've earned for you. So where does that leave us?\"\n\t\t\t\t*goto wav_conflict\n\t\t#\"You should stay with me.\"\n\t\t\t\"I could make the same offer to you,\" you say. \"All your points work both ways. Come back with me.\" Hands held out, you stare into ${wahis} eyes. \"Whatever the past, your home is with me in $!{Clan}.\"\n\t\t\t\n\t\t\t$!{wave} looks into your eyes, weighing the truth of your words.\n\t\t\t*if ((wav_rep >2) and (lover = wave)) or (wav_rep >3)\n\t\t\t\t$!{wahe} bites ${wahis} lip, and the arm holding the Eye falls to ${wahis} side.  \"Why do you have to be so forgiving?  How am I supposed to kill you when you hold your hands out to me in welcome?\"\n\t\t\t\t*set fate \"getgirl\"\n\t\t\t\t*goto nir_reptest\n\t\t\t*elseif wave_slave\n\t\t\t\t*if wav_rep >=0\n\t\t\t\t\t$!{wahe} smiles. \"I think you mean that, Tiúni, and I thank you for it, but you know this isn't about us. I can never forgive them or go back to them. To be the former slave, to be Dzái's hated \n\t\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\t\tdaughter-in-law.\" \n\t\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\t\tson-in-law.\" \n\t\t\t\t\t$!{wahe} shakes ${wahis} head, still smiling. \"No. \n\t\t\t\t*if wav_rep \u003c0\n\t\t\t\t\t\"I can never forgive our $!{Clan} or go back to them. If I'm honest with myself, I know I could never forgive you for letting them sell me. No. \n\t\t\t\tBetter to just end it here.\"\n\t\t\t\t*goto wav_conflict\n\t\t\t*else\n\t\t\t\t\"I can't give up all I've earned for you. It was too hard to get here to throw it all away. And I see you won't give up your life for me either. So where does that leave us?\"\n\t\t\t\t*goto wav_conflict\n\t\t#\"I can't let you take the artifact.\"\n\t\t\t*set noble %+15\n\t\t\t\"No,\" you reply. \"My answer is no.\"\n\t\t\t\n\t\t\t*label wav_conflict\n\t\t\t*page_break\n\t\t\tYou know that the minute you move toward ${wahim} that ${wahe}'ll fire, and so the two of you circle, eyes locked as you draw your sword. \"Oh, Tiúni,\" ${wahe} chides.  \"Why must you be so stubborn? The game is played out.\"  \n\t\t\t\n\t\t\t*if (her_dead = false) or (nir_dead = false)\n\t\t\t\tOver ${wahis} shoulder, you see \n\t\t\t\t*if her_dead\n\t\t\t\t\tKási Nirún begin to move. There's no trace of conflict in his features, and his attention is focused solely on $!{wave}.\n\t\t\t\t*if her_dead = false\n\t\t\t\t\tHeréksa Rayána, peeling away from the wall where she'd stood forgotten, and advancing on $!{wave}. \n\t\t\t\tQuickly, you flick your eyes back to $!{wave}'s face, and speak to draw ${wahis} attention.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I am sorry it had to end this way.\"\n\t\t\t\t\t\t*if wav_rep >= 0\n\t\t\t\t\t\t\t\"It doesn't. You can surrender at any time. Avanthár's lovely this time of year, and the Emperor is an eminently rational man. He'll understand your worth.\"\n\t\t\t\t\t\t*if wav_rep \u003c 0\n\t\t\t\t\t\t\t\"I'm sure you do. Most people probably feel that way right before they die.\"\n\t\t\t\t\t#\"There's still time for you to change your mind.\"\n\t\t\t\t\t\t$!{wahe} just sighs. \"No, there isn't. You need to learn to live with your choices and move forward. All that's left for us is to finish this dance.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Then why haven't you pushed the button?\" you retort, and ${wahe} just smiles.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Oh, I'm sentimental too.\"\n\t\t\t\t\t#\"You're a traitor!\"\n\t\t\t\t\t\t\"Please,\" ${wahe} scoffs. \"Even if that word had any meaning left this far into the war, I've never actually changed sides. The word you're looking for is 'spy.'\" \n\t\t\t\t\t#\"Oh, I still have a few moves left….\"\n\t\t\t\t\t\t\"Well, I'm waiting to see them.\" $!{wahe} looks theatrically from side to side.\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\t*if tactics >60\n\t\t\t\t\tThe \n\t\t\t\t\t*if her_dead\n\t\t\t\t\t\tKási \n\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\tHeréksa \n\t\t\t\t\tslams into ${wahim} from the back. $!{wave} sprawls on the floor, pinned, as the Eye rolls across the unnaturally smooth metal, under the floating sphere, and tumbles down the pit.  Before ${wahe} can recover, you pounce upon your traitorous clan-cousin.\n\t\t\t\t\t*goto wav_defeat\n\t\t\t\t*else\n\t\t\t\t\t$!{wave} catches the movement and spins on the balls of ${wahis} feet, while firing.  \n\t\t\t\t\t*if her_dead\n\t\t\t\t\t\tA concussive blast emanates from the Eye. It picks up Nirún like a doll and smashes him into the metallic wall on the other side of a pit.\n\t\t\t\t\t\t*set nir_rush true\n\t\t\t\t\t\t*set nir_dead true\n\t\t\t\t\t*if (her_dead = false) and (nir_dead)\n\t\t\t\t\t\tThe scene with Nirún replays itself with Rayána. The same wall of force, too large to be dodged; the same end, with her smashed form slumped against a wall.\n\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t*if (her_dead = false) and (nir_dead = false)\n\t\t\t\t\t\tA concussive blast emanates from the Eye. It picks up Rayána like a doll and smashes her into the metallic wall on the other side of a pit.  \n\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t*set expended true\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\t$!{wave} shakes ${wahis} head staring at the crumpled \n\t\t\t\t\t*if nir_rush\n\t\t\t\t\t\tKási. \n\t\t\t\t\t*if nir_rush = false\n\t\t\t\t\t\tHeréksa. \n\t\t\t\t\t\"I never did understand all this 'death before dishonor.' What a waste of a good soldier.\"\n\t\t\t\t\t*goto upclose\n\t\t\t*else\n\t\t\t\t*label upclose\n\t\t\t\t\n\t\t\t\tThere's no other choice. You sprint forward, hoping to dodge whatever emanates from the Eye.\n\t\t\t\t*if expended\n\t\t\t\t\tAs you see ${wahis} fingers flex, you dive and slide across the smooth metal floor, but the only sound is the click of the button, and no unearthly gust appears.  With a disgusted curse, $!{wave} tosses the Eye aside, like so much trash, and turns to face you.\n\t\t\t\t\t*goto wav_defeat\n\t\t\t\t*elseif combat >60\n\t\t\t\t\tAs you see ${wahis} fingers flex, you dive and slide across the smooth metal floor. A blast passes above you, fingers of wind tearing at your hair and armor, but does no damage. You turn the dive into a roll, and spring back onto your feet before your adversary.  \n\t\t\t\t\t*label wav_defeat\n\t\t\t\t\t\n\t\t\t\t\tThe struggle is brief and decisive. $!{wave} fights with desperation, but is not up to your caliber. In the end, ${wahe} lies before you, bleeding, and begins to softly laugh, though it's quickly transformed into a wet cough. \"I suppose this is a better ending than being taken back and publicly impaled,\" ${wahe} says between fits. \"Let no one say I'm a sore loser when I gamble big. Take this.\" $!{wahe} reaches into ${wahis} kirtle and pulls out a small flat disk. \"There's a…mouth in the sphere. Put that in it, and push the button below the third window from the left. It'll take you to Tsurú, and the station there is near the surface. Would have been so easy to just come here from there, but you need the right…\" The light goes out of ${wahis} eyes.\n\t\t\t\t\t*set fate \"kill\"\n\t\t\t\t\t*achieve killwave\n\t\t\t\t\t*goto nir_reptest\n\t\t\t\t*else\n\t\t\t\t\tIt's like being run into by a tsi'íl beast. The wave knocks all the air from your body as it lifts you up and flings you back. There's so much pain, and it's all so sudden that you barely register any of it. Instead you lie unmoving in a timeless moment of shock. A blurred face approaches, calling your name, but stronger still is the call of the Isles of Teretané. Following that call, you move from this blackness into another, more complete one.\n\t\t\t\t\t*set fate \"dead\"\n\t\t\t\t\t*finish The Slumber of Death\n\n*label nir_reptest\n*page_break\n*if nir_dead\n\t*if fate = \"kill\"\n\t\t*label kill_end\n\t\t\n\t\tYou stand \n\t\t*if her_dead\n\t\t\talone in the corridor, \n\t\tand stare for a while at the black cube that has caused all this. It remains the same enigmatic block, but it is easier to stare at than the bodies. Whatever this place was before, it is a tomb now, and feels close and intimate.\n\t\t\n\t\t*if her_dead = false\n\t\t\tHeréksa Rayána places a large hand on your shoulder. \"We should go. Who knows what else is down here?\" She ponders the small disc. \"I'm not sure I trust ${wahim}, but it's better than trying to lug this past the marashyálu.\"\n\t\t*if her_dead\n\t\t\tEventually you realize you need to move, to drink, to eat and piss. You turn the disc over and over in your hands. You're not sure you trust $!{wave}, but anything is better than trying to get back past the marashyálu.\n\t\t*comment endif\n\t\t\n\t\tYou move the block into the floating palanquin, and feed it the strange disc, causing the windows inside to look out on different scenes, mostly halls like this one. One is underwater? In the seventh, priests in the robes of Sárku and guards in the elaborate armor of the Omnipotent Azure Legion patrol. The third could be a window onto this very place. You take a deep \n\t\t*if her_dead = false\n\t\t\tbreath, look at the Heréksa beside you, \n\t\t*if her_dead\n\t\t\tbreath \n\t\tand push the button beneath it.\n\t\t*finish The Returning Hero\n\t*elseif fate = \"adventure\"\n\t\t$!{wave} steps into the floating sphere, and feeds a disc into a mouth on its side. \"Come look!\" $!{wahe} waves you \n\t\t*if her_dead = false\n\t\t\tand Rayána \n\t\tinside the strange conveyance. There are ten windows inside, but each looks out onto a subtly different scene, mostly halls like this one. \"We agreed not to go there.\" $!{wahe} motions toward the seventh window, which shows priests in the robes of Sárku and guards in the elaborate armor of the Omnipotent Azure Legion. \"And this third one is not far away at all. I wouldn't choose the one that's underwater,\" ${wahe} smiles, \"but, well, might as well guess at any of the others.\"\n\t\t*if her_dead = false\n\t\t\t\n\t\t\tRayána backs toward the door.  \"I'll be staying.  \n\t\t\t*if battlelost = false\n\t\t\t\tThe Legion of ${legion} will send more ve_her\n\t\t\t\n\t\t\tDespite the fact that ${wahe} keeps the Eye always in hand, ${wahe} is nothing but solicitous as ${wahe} motions you into the sphere. \"Just think of it as a very, very fast chlén cart,\" ${wahe} jokes as ${wahe} feeds something into a mouth on the inside of the sphere. Suddenly ten windows inside look out onto subtly different scenes, mostly halls like this one. In one, priests in the robes of Sárku and guards in the elaborate armor of the Omnipotent Azure Legion patrol back and forth. $!{wave} points at it.  \"Home sweet home. You really will love Avanthár.  It makes the $!{Clan} clanhouse look like a peasant's hut.\"\n\t\t\t\n\t\t\tThe artifact, whatever else it is, is heavy and cumbersome. It takes both of you to get it loaded into what you keep thinking of as a large palanquin.  When all is on board, $!{wave} looks around the cramped space and causes the door to close.\n\t\t\t\n\t\t\t\"Are we ready?\" ${wahe} asks, and at your nod pushes a button beneath the third window.\n\t\t\t*finish In Avanthár\n\t*else\n\t\tYou \n\t\t*label girl_end\n\t\ttake $!{wave}'s hand in yours, and lead ${wahim} to look down at the black cube. \"I don't know how we're going to get this back—\" you begin to say, but ${wahe} puts a finger to your lips. \"Didn't you hear me say I had a ride? Just think of it as a very, very fast chlén cart.\" $!{wahe} moves to the weightless sphere, hanging in the air like a pearl, and climbs inside. $!{wahe} feeds something into a mouth on the inside of the sphere and suddenly the windows look out onto subtly different scenes, mostly halls like this one. In one, priests in the robes of Sárku and guards in the elaborate armor of the Omnipotent Azure Legion patrol back and forth. $!{wave} looks at it and sighs. \"No, I promised,\" you hear ${wahim} whisper to ${wahim}self. Instead, ${wahe} turns to the third window, which shows a hall almost identical to this one. \"It's easy to get to the surface from there, and your ${Prince} has etween you, $!{wave} grabs your shoulder and drags you back into the floating sphere. Nirún's inches away when a panel slides out of the wall and closes. You can hear the futile scraping of his chlén-hide sword on the metal of the ancients.\n\t\t\t\t\n\t\t\t\t\"I wouldn't recommend opening that door again,\" says $!{wave} from behind you, where ${wahe} stands looking at ten small windows. It takes you a moment to realize they all look out on different versions of the room you just left.\n\t\t\t\t\n\t\t\t\t\"We agreed not to go there.\" $!{wahe} motions toward the seventh window, which shows priests in the robes of Sárku and guards in the elaborate armor of the Omnipotent Azure Legion. \"And this third one is not far away at all. I wouldn't choose the one that's underwater.\" $!{wahe} smiles. \"But, well, might as well guess at any of the others. Just press the button under the one you want.\"\n\t\t\t\t\n\t\t\t\t*if her_dead = false\n\t\t\t\t\tYou spare a moment to think of Heréksa Rayána, still outside, but you know Nirún's vendetta is not with her, and suspect she's glad about which side of the door she ended up on. \n\t\t\t\t$!{wave} is beaming expectantly at you, so you reach out, close your eyes, and press a button.\n\t\t\t\t*finish Off to See the World\n\t\t*if fate = \"getgirl\"\n\t\t\t\"Are you still intent on killing us?\" $!{wave} asks with a hint of sarcasm. \"I would note, we have you outnumbered.\" $!{wahe} tosses the Eye in the air once and catches it.\n\t\t\t*if (nir_rep > 1) or ((nir_rep > 0) and (lover = \"Nirún\"))\n\t\t\t\t\"You know I never wanted to; it was just my duty to my family,\" he says.\n\t\t\t*if nir_rep > 0\n\t\t\t\t\n\t\t\t\tHe looks at $!{wave} for a long moment. \"If you,\" and his voice is a bit scathing, \"can be persuaded to change your stripes, I'm damned well not going to be the one who scuttles this mission.\"\n\t\t\t\t\n\t\t\t\t\"Good.\" $!{wahe} grins back. \"Because I'm your way out of here.\"\n\t\t\t\t*choice\n\t\t\t\t\t#I
