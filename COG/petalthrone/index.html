ws, individuals made brave by anonymity in the crowd.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWhat should be a simple falling-in becomes a minor skirmish, with those soldiers sober enough to think through the inevitable end of mass disobedience in the field helping to control their sullen comrades. You see $!{wave} roll ${wahis} eyes at Rayána over a small bottle of Livyáni sherbet before sighing and setting it down to aid in preventing the incipient riot.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt is an angry lot that march away from the thoroughly looted clanhouse, and you can only hope that the immense riches garnered will have a mellowing effect on them when they sober up.\n\t\t\t\t\t\t*set punishment +3\n\t\t\t\t\t\t*goto honored\n\t\t\t\t\t#The Heréksa is right; things have gone too far.\n\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\tSetting down your jeweled brandy cup, you step forward as the drunken legionnaire begins to take a swing at her superior.\n\t\t\t\t\t\t\"What part of 'stand down' is unclear?\" you snap.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe soldier spins to focus a bleary eye upon you.  \"Yes, Kási!  I mistook her for a Sárku clansman at first, sir.  Must've drunk too much.\" Others in the room snicker at the implied insult.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if diplomacy >60\n\t\t\t\t\t\t\t\"That you are drunk as a fish has escaped no one's notice. We had best keep you safely locked up until you can distinguish friend from foe again.\" You signal two of the more sober soldiers to escort her back to quarters. \"And since you let your hunger for prizes override obedience, you may leave what you have, for the others to divide up.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe chastisement hits just the right note: severe enough to make others think twice before disobeying, but light enough not to further fuel the undercurrent of discontent. The task of restoring order and resuming patrol is tedious, but marching in the cool night air has a sobering effect upon the solders as they leave the ransacked clanhouse behind them, weighed down with its treasures.\n\t\t\t\t\t\t\t*goto honored\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIgnoring this, you call for the troops to form up and resume patrol, but what should be a simple falling-in becomes a minor skirmish, with those soldiers sober enough to think through the inevitable end of mass disobedience in the field helping to control their sullen comrades. You see $!{wave} roll ${wahis} eyes at Rayána over a small bottle of Livyáni sherbet before sighing and setting it down to aid in preventing the incipient riot.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt is an angry lot that march away from the thoroughly looted clanhouse, and you can only hope that the immense riches garnered will have a mellowing effect on them when they sober up.\n\t\t\t\t\t\t\t*set punishment +1\n\t\t\t\t\t\t\t*goto honored\n\t\t\t\t\t#The troops need this release; I admonish the Heréksa.\n\t\t\t\t\t\t*set her_rep -1\n\t\t\t\t\t\t*set punishment +1\n\t\t\t\t\t\t\"Heréksa! I require that every room be searched, in case they harbor more undead. If these traitors won't stand aside, then force is a regrettable necessity.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if Her_abandon = false\n\t\t\t\t\t\t\tRayána replies through gritted teeth. \"Yes, Kási,\" before bowing and stalking out into the courtyard. The drunken Tirrikámu spits after her and resumes pushing her way into the room.\n\t\t\t\t\t\t\t*goto ransack\n\t\t\t\t\t\t*if her_abandon\n\t\t\t\t\t\t\tRayána replies through gritted teeth, \"Yes, Kási,\" bowing.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tOnce more, like at the walls of Sangmiré, faced with an order she finds distasteful, she simply leaves. The drunken Tirrikámu spits after her and resumes pushing her way into the room.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I go after her.\n\t\t\t\t\t\t\t\t\tShe paces the courtyard amidst the smell of smoke, knuckles white in clenched fists at her side. Looking up at the sound of your approach, her face shows guilt and then obstinacy. \"I cannot be a party to such dishonorable treatment of our countrymen!\" she blurts out defensively.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Where was this devotion to honor when you abandoned me in Sangmiré?\" you riposte.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe Heréksa flushes, managing to look embarrassed, furious, and indignant all at once. \"It was the same then as it is now. What you did to those upon the wall was not honorable, and what you propose to do now is not either. I am loyal to my $!{prince}, but my first loyalty must be to noble action itself.\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#\"I didn't realize you felt so strongly about these things, and I'm sorry to have pushed you.\" \n\t\t\t\t\t\t\t\t\t\t\t\"Well, sir, I do.  My clan and my lineage are not exalted; all I have is the legion, and my soldier's honor. It is enough for me.\" She deflates at these words. \"But I think I am angry because there was no path of honor to choose. I did not make matters better by refusing to participate; I only tarred my name with the stain of mutiny. I must be damned for action, and damned for inaction….\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\"I can't be thinking just of you. Most of our soldiers fight for wealth and for loyalty to their brothers and sisters in arms. Both that greed and that desire to avenge their fallen need to be slaked.\" You pause thoughtfully. \"But you do not need to have a part in it.  Return to the barracks. I am releasing you from duty for the day.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tRayána bows deeply, clearly grateful at having the Gordian knot of her dilemma sliced through.\n\t\t\t\t\t\t\t\t\t\t\t*set her_rep +2\n\t\t\t\t\t\t\t\t\t\t\t*goto ransack\n\t\t\t\t\t\t\t\t\t\t#\"That is some very pretty-sounding drivel.\" \n\t\t\t\t\t\t\t\t\t\t\tFervent though the Heréksa's opinion on honor may be, she lacks a classical Tsolyáni education, and it is a simple matter for one as well read as you to poke holes in her logical structure, to batter down her arguments with quotes from sages past on duty and obedience. It is clear she reasons with the passion of a child, and her view of honor is as simplistic.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou leave her muttering and angry, but rhetorically outmaneuvered, solidly put in her place.\n\t\t\t\t\t\t\t\t\t\t\t*goto ransack\n\t\t\t\t\t\t\t\t\t\t#\"Your primary honor lies in obedience to your superiors.\"\n\t\t\t\t\t\t\t\t\t\t\t\"Heréksa, if you are ever an officer, it is clear you will handle matters differently, but here and now nobility for you lies in obedience to me as your superior. I hope that is clear. If you disobey or disrespect my orders again, I will take punishment into my own hands.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou're braced for a confrontation, so it comes as a surprise when your words calm her. \"You are right, sir.  These are not my decisions to make.\" She salutes again.\n\t\t\t\t\t\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\t\t\t\t\t\t*goto ransack\n\t\t\t\t\t\t\t\t#I let her go.\n\t\t\t\t\t\t\t\t\t*goto ransack\n\t\t\t*label ransack\n\t\t\t\n\t\t\tBy the time the $!{LegionNum} resumes its patrol of the neighborhood, there is a second fire filling the night sky with smoke, and the wailing of the worm-kissing traitors provides a counterpoint to the joyous singing of your tsurúm, marching home under the weight of gems and thésun cloth and gold.\n\t\t\t*if God = \"Vimúhla\" \n\t\t\t\t*set noble %+20\n\t\t\t*goto honored\n\t\t#These are our clan-cousins, and we are here to restore order.\n\t\t\tIgnoring the richly appointed compounds along the boulevard, you march your soldiers in formation to the site of the burning clanhouse and form a bucket brigade stretching to the nearest fountain. It will not do to have an occupied city burn \n\t\t\t*if God = \"Vimúhla\" \n\t\t\t\t*set noble %-10\n\t\t\t\tdown, though many of your coreligionists may disagree.\n\t\t\t*if God != \"Vimúhla\"\n\t\t\t\tdown.\n\t\t\t*comment endif\n\t\t\t\n\t\t\t*if (her_dead = false)\n\t\t\t\t*set her_rep +1\n\t\t\t\tYoung Heréksa Rayána is beaming at the chance to play the folkloric hero, magnanimous in victory, and sets to organizing a fire brigade with a will.\n\t\t\tWith the love of order and respect for authority natural to Tsolyáni, members of the clan—High Pinnacle—soon direct their servants and slaves in the aid of your soldiers. An elderly man in the robes of the Palace of the Realm appears at your elbow, along with a slave bearing cool chumétl upon a silver tray. Two members of High Pinnacle amongst your soldiers are soon speaking about the occupation with their clansmen in the compound.\n\t\t\t\n\t\t\tThe scene of civic harmony is spoiled by the sight of a dozen of your troops returning from the burning house bedecked in jewelry.  It appears they have decided to do a bit of looting while fighting the flames.\n\t\t\t*choice\n\t\t\t\t#I reprimand them.\n\t\t\t\t\tWith a steely glance you arrest the looters in their progress, and they come to stand before you.  \"How did these items come into your possession?\"\n\t\t\t\t\tOne of the group looks guiltily at his feet, but another meets your gaze. \"We took it from these traitors, in payment for our dead, and for saving their \n\t\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\thouse when we should have been razing it to the ground.\" \n\t\t\t\t\t*if god != \"Vimúhla\"\n\t\t\t\t\t\thouse.\" \n\t\t\t\t\tShe turns barely aside and spits.\n\t\t\t\t\t\n\t\t\t\t\tSuch open disrespect has grabbed the attention of the other soldiers, who have paused in their labor, as well as the clan elder beside you.\n\t\t\t\t\t*if (her_dead = false)\n\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\tHeréksa Rayána strides forward and grabs the soldier by the neck, shaking her like a recalcitrant puppy. \"It's not enough for you to commit brazen theft, but you must defy an officer too? You should be impaled for bringing such shame to the Legion of ${legion}!\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I punish the loudmouth, harshly.\n\t\t\t\t\t\t\tFor a cool moment you simply scan the line of looters, as the silence stretches and grows ominous. Nodding to two who had smirked at their comrade's bold words, you order, \"Take Ngáya into custody and return her to the barracks. Allow her to write a letter to her clan, explaining her shameful actions, and then make sure she reports to the impaler's stake in the morning. I trust you'll follow my orders, or you'll find yourself writhing beside her. The rest of you return what you've stolen and get back to work.\" \n\t\t\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe soldiers resume their labor in tense silence. Though known as a drunkard, Ngáya is popular in the Sangmirém, and while none would speak out against your commands, many clearly resent her sudden execution.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set punishment +2\n\t\t\t\t\t\t\t*goto fire_out\n\t\t\t\t\t\t#Whip the lot of them in the name of civic order.\n\t\t\t\t\t\t\t\"I see.\" Your cold gaze travels over the assembled looters. \"You will all report to the barracks for punishment. Ten lashes each, to be delivered in full view of the assembled legion.\" You know the public loss of face will mean more to some than the whippings themselves. A few, who bore the word \"lashes\" with stony stoicism, pale slightly at \"in full view,\" but all bow their heads in acquiescence.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou are confident that not a single one of High Pinnacle's possessions is taken.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set punishment +3\n\t\t\t\t\t\t\t*goto fire_out\n\t\t\t\t\t\t#Tempers are understandably high; I simply make them give back the loot.\n\t\t\t\t\t\t\t\"It is the General's clerks who will determine their debt to the Imperium, not a bunch of loutish soldiers.\"  You pause, fingers pinching the side of your nose in weariness. \"We're not barbarians; we're not raiders. We are here to restore order. Return what you have taken, and get back to work. Be grateful that I've seen enough of the ${LegionNum}'s blood spilled today.\" Your wave dismisses the lot.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if diplomacy >60\n\t\t\t\t\t\t\t\tShamefacedly the looters lay their stolen riches at the feet of the clan elder beside you. A more somber mood takes hold in the compound, all working in silence, thoughts preoccupied with the sacrifice of the recent dead.\n\t\t\t\t\t\t\t*if diplomacy \u003c60\n\t\t\t\t\t\t\t\tThe looters pile their gems at the feet of the clan elder, though you suspect that some smaller, more easily secreted trinkets are not returned.  Seeing your leniency, the rest of the tsurúm similarly palms discrete valuable objects to carry away.\n\t\t\t\t\t\t\t\t*set punishment +1\n\t\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*label fire_out\n\t\t\t\t\t\t\tThe fire is soon reduced to a size manageable by the clan servants. As you turn to resume your patrol, the old man at your side reaches forward to lightly touch your elbow. \"Glorious Kási, please convey to your superiors our gratitude and our loyalty. We are a small town, our Market Police and temple guards insignificant beside the occupying force.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs your tsurúm marches away, the members of the clan—your countrymen—stand upon the walls of the courtyard to wave farewell.\n\t\t\t\t\t\t\t*goto honored\n\t\t\t\t#I say nothing.\n\t\t\t\t\t*set Wav_rep +1\n\t\t\t\t\tMeeting the eyes of the looters, you merely arch an eyebrow while taking a sip of the chumétl, before returning to conversation with the clan elder by your side.  The soldiers smile and nudge each other. You soon notice more and more of your firefighters bedecked in mismatched jewelry or gauzes, as does the clan elder, though he stifles any objection he might have in a gruff cough and pretends not to see.\n\t\t\t\t\t\n\t\t\t\t\tThe fire is soon reduced to a size manageable by the clan's servants. As you turn to resume your patrol, the old man at your side reaches forward to lightly touch your elbow. \"Glorious Kási, please convey to your superiors our gratitude and our loyalty.  We are a small town, our Market Police and temple guards insignificant beside the occupying force.\"\n\t\t\t\t\t\n\t\t\t\t\tAs you march away, the clansfolk salute farewell, and your tsúrum's morale resembles a parade.  \n\t\t\t\t\t*if (her_dead = false)\n\t\t\t\t\t\tOnly Heréksa Rayána displays muted spirits, though she seems to take comfort upon realizing you yourself bear no treasure.\n\t\t\t\t\t*goto honored\n\t\t\t\t#I demand my share.\n\t\t\t\t\tWith an airy wave you beckon the looters to you, where they stand nervously at attention. You take a cool sip of the chumétl, letting their tension stretch.  \"Sir,\" one blurts out, \"we thought it proper to claim shámtla from this clan, for their role in aiding the Usurper's troops.\" The speech is delivered boldly, but followed by an awkward squirming under your gaze.\n\t\t\t\t\t\n\t\t\t\t\tWith a sigh, the clan elder beside you speaks up. \"As these legionnaires say, we would be glad to make reparations to your brave soldiers, yourself, and your generals. Perhaps we could make a more formal presentation, though? As opposed to distributing such gifts in such an—\" He winces at the bedecked soldiers. \"—ad hoc fashion?\"\n\t\t\t\t\t\n\t\t\t\t\tSoon the chain of water buckets into the clanhouse is mirrored by a small caravan of goods brought out and laid at your feet. A small but heavy chest to be presented to your generals, a rather fine pair of \n\t\t\t\t\t*if God = \"Hnálla\"\n\t\t\t\t\t\tdiamond-\n\t\t\t\t\t*if God = \"Dlamélish\"\n\t\t\t\t\t\temerald-\n\t\t\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\t\t\tamethyst-\n\t\t\t\t\t*if (God = \"Karakán\") or (God = \"Avánthe\")\n\t\t\t\t\t\tsapphire-\n\t\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\truby-\n\t\t\t\t\tencrusted epaulets for you, and a modest pile of other jewels and adornments to be shared amongst your soldiery are the spoils.\n\t\t\t\t\t*set wealth +150\n\t\t\t\t\t*set Wav_rep +1\n\t\t\t\t\t*set status %+15\n\t\t\t\t\tYou see $!{wave} admiring a long silver hairpin with an inset stone that winks in the light, before placing it jauntily into ${wahis} soldier's bun. The elder beside you coughs, pulling your attention to himself. \"Glorious Kási, please convey our gratitude and loyalty to your superiors, along with these gifts, that they may know we have settled out debt with glad hearts.\" He bows low, and calls for the servants and slaves to relieve your soldiers of buckets and take over fighting the now-diminished fire.\n\t\t\t\t\t\n\t\t\t\t\tAs you resume patrol, the clansfolk salute farewell, and your tsúrum's morale resembles a parade.  \n\t\t\t\t\t*if (her_dead = false)\n\t\t\t\t\t\t*set her_rep -1\n\t\t\t\t\t\tOnly Heréksa Rayána displays muted spirits, covertly casting disappointed glances your way.\n\t\t\t\t\t*goto honored\n\n*label honored\n*page_break\nThe sun rises the next morning over an occupied and secure Sangmiré.  The battle having been won, an army of bureaucrats is let loose upon the city to manage suits and counter-suits, criminal fines, shámtla, and inducements.\n\nYou stand in the square, wearing your full legionary finery, in rank with other officers singled out for special honors. You see the sun glint off the burnished golden epaulets of Dritlán Núromen as he kneels before the General to receive an Engsvanyáli edition of the works of Hirkkulméshmru the Dwarf, to the massed legion's repeated roar of \"Otuléngba! All hail!\"\n\nNúromen returns to stand before the legion as puffed-up as a bird in its mating dance, eyes shining brightly, fingers caressing the leather scroll case lovingly. As you watch him, you hear your name called out, and step forward.\n\nGeneral $!{General} and General $!{AlliedGeneral} stand side by side, like Mighty Karakán and his handmaiden Kátha, though you suspect $!{AlliedGeneral} might duel anyone who called her a handmaiden, godly or no. They gaze down on your kneeling form and beckon a servant to come forward carrying a sword.\n*set steel true\n\n*if Loc1 = true\n\t\"The bravery, ferocity, and skill you showed on the field of battle merits a weapon equally as strong. I place this \n\t*if (psychic >10) or (ritual >10)\n\t\tenchanted \n\tsteel sword into the hand that brought us victory, in hope that you will use it wisely in fighting the legion's battles.\"\n*if Loc2 = true\n\t\"Your decisiveness and leadership has helped bring us victory. I give you this \n\t*if (psychic >10) or (ritual >10)\n\t\tenchanted \n\t*if (psychic \u003c=10) and (ritual \u003c=10)\t\n\t\tfine \n\tsteel sword not just as a fitting reward, but also that you may defend yourself in duels and upon the battlefield, in hope that the Legion of ${legion} will have your service for years to come.\"\n*if Loc3 = true\n\t\"For a city to be taken by a semétl is a feat rarely seen since the passing of the Age of Heroes. A hero must wield an appropriate weapon, and so I give you this enchanted steel sword to wield for the Legion of ${legion} in the hope that many more such stunning deeds are attached to its legacy.\"\n*if SaveAllies\n\t\n\tAs your General finishes and the \n\t*if (psychic >10) or (ritual >10)\n\t\tsword, enchanted so it does not interfere with sorcery, \n\t*if (psychic \u003c=10) and (ritual \u003c=10)\n\t\tsword \n\tis placed in your hand, $!{AlliedGeneral} raises her voice.  \"My Kási Nirún, who shall himself soon be kneeling before us in honor, has told me how his tsurúm, the mighty anvil upon which the Scales of Brown broke their might, was spared the full force of their wrath by the timely intervention of your brave soldiers. The armies of Tsolyánu have always stood as brothers. It lightens my heart, in days when so many in power have forgotten this, to see that some still remember and fulfill that bond.\"  Her eyes weigh you as she gives this speech, and though her words are of praise, her gaze is piercing.\n*comment endif\n\nThe same cries of \"Otuléngba!\" that greeted the Dritlán now wash over you.\n*set wealth +200\n*choice\n\t#I bow my head in solemn silence and return to my place.\n\t\t*goto honored3\n\t#I praise my tsurúm.\n\t\tYou raise your voice to cut through the cheers, and speak to your soldiers of duty fulfilled.\n\t\t\n\t\t*goto honored3\n\t#I thank Dritlán Núromen for his leadership.\n\t\t\"I could not have accomplished what I did without the example and guidance of my General and my Dritlán.\" You bow deeply to General $!{General} and then turn and repeat the gesture to Dritlán Núromen.\n\t\t\n\t\t*goto Honored3\n\t*if loc3 = false\n\t\t#I thank Kási Nirún's tsurúm for their role.\n\t\t\tYou raise your voice to cut through the cheers, pointing toward Kási Nirún and his tsurúm, now much depleted from their original strength of four hundred. As you praise their fortitude in absorbing the weight of the enemy assault, Nirún stands taller.\n\t\t\t*set nir_rep +1\n\t\t\t\n\t\t\t*goto honored3\n\t*if (her_dead = true) and (her_captured = false)\n\t\t#I speak of the sacrifice of Heréksa Rayána.\n\t\t\tYou raise your voice to cut through the cheers. Holding the sword aloft, you dedicate your victory to the fallen Heréksa who so bravely gave her life to seize victory from the jaws of defeat. The crowd of assembled legionnaires go silent, each thinking of their own dead, as tears roll down cheeks.\n\t\t\t\n\t\t\t*goto honored3\n\n*label honored3\nOnce you have returned to the ranks, the awards continue. Kási Nirún is awarded a steel gorget for the pivotal roll of his tsurúm in forestalling the enemy advance, and others are presented with signed declarations and scrolls honoring their deeds in extravagant prose, to be mailed back to their clanhouses and displayed proudly upon the walls by doting parents and spouses.\n*if married\n\tYou imagine the pride in $!{spouse}'s eyes when the commemoration of your own deeds arrives.\n*comment endif\n\n*if (her_dead = true) and (her_captured = false)\n\tA similarly calligraphed scroll is displayed for your dead Heréksa, to be returned to her clan in $!{Hometown}. Given their lowly status, it will likely be venerated for generations.\n*comment endif\n\n*if punishment >0\n\tAlong with rewards, discipline is also meted out to those who failed in their duty or otherwise dishonored the legion. Hearing names from your tsurúm upon that list puts a damper on your mood.\n\t*if punishment = 1\n\t\tSoldiers whose behavior got out of hand in the looting, resulting in brawls or abuse of high-clan citizens, are officially charged and briefly beaten. Dritlán Núromen frowns as the list is read, and you know that a lecture about maintaining discipline is in your future.\n\t*if punishment = 2\n\t\tNgáya goes to her death solemnly, surrounded by incense and prayers. Her fellow soldiers petitioned the Dritlán to commute her sentence from impalement to sacrifice. He was displeased to have to deal with such matters personally, earning you a rather lengthy lecture on the balancing act of maintaining discipline and morale.  \n\t\t\n\t\t\"You erode your authority over the troops when you force me to publicly countermand you this way.\" You remember the \n\t\t*if drit_hostile = true\n\t\t\tsuppressed pleasure \n\t\t*if drit_hostile = false\n\t\t\tpatronizing disappointment \n\t\tin his voice as he dressed you down in the early hours of the morning.\n\t*if punishment = 3\n\t\tThe offenders from the previous night are all whipped bloody before both legions, a loss of face for the ${Legionnum}. Many of your soldiers grit their teeth. Some avert their eyes, while others stare fixedly at the sight. None meet your gaze.\n\t\t\n\t\tDritlán Núromen had awakened you before dawn, to stand in a bare breechclout in his tent, while he sputtered and pointed at the punishment list. \"Normally I consider it beneath my station to peruse these reports, but well, this could not be ignored. Are you running a tsurúm or a pack of wild jakkóhl? This loss of control last night will blacken our names, overshadowing our victory.\" Out of breath, he deflated back onto his settee, hand upon his forehead. \"Dismissed, Kási.\" The memory still stings.\n*comment endif\n\nWhen all official business is completed, you are dismissed by semétl.  \n\nWord has come down to the officers that the Legion of ${legion} is to garrison the town in shifts, rotating out the soldiers to relax, while ${alliedlegion} clears out the undead from the catacombs beneath the Temple of Sárku. Given the danger of the task, and because the undead won't venture above ground without their priests to command them, it is an odd choice. Normally, you would leave a tsurúm or two behind to hold the town and begin the long march to the next front. Normally, you would never have taken Sangmiré in the first place.\n\nYou try to put these concerns from your mind. The Generals will confide in you when they see fit and not before. \n\nYou find yourself on liberty, \n*if (her_dead) and (loudmouth_captured)\n\twith a prisoner to see to, and a dead heréksa to mourn.  You take a deep lungful of the smoke-tinged air, and set out to get the unpleasantness over with. \n*if (her_dead) and (loudmouth_captured = false)\n\tbut with a heréksa to mourn. While your fellow officers adjourn to wine houses, you turn toward the battlefield and the yellow tents manned by the priesthood of Belkhánu.\n*if (her_dead = false) and (loudmouth_captured)\n\twith a prisoner to see to.  You take a deep lungful of the smoke-tinged air, and turn your steps toward the makeshift pens where surrendered warriors await ransom or sacrifice.\n*if (her_dead = false) and (loudmouth_captured = false)\n\tfor the first time in months, and look forward to a few days of well-earned relaxation.\t\n*goto res_her\n\n*label courtmarshaled2\n*page_break\nAfter you've dressed, two soldiers from your legion, in formal armor, march you in silence out to a public square. The greater part of both the allied legions stand watching as General $!{General} and General $!{AlliedGeneral} stand together, bequeathing honors upon those who distinguished themselves in battle: mostly elaborately calligraphed scrolls praising the deeds of the recipient, to be sent back home and admired, and additional gifts for those particularly meritorious. You watch Dritlán Núromen receive such a scroll, and Kási Nirún a steel gorget. When the Kási receives his gift, his tsurúm, now much reduced below their customary four hundred, whoop and cheer.\n\nThen come the punishments. These women whipped for drunkenness on guard duty, that man impaled for striking a superior officer. Finally, your name is called.\n\nThe elaborate and formal charges, delivered in stentorian tones by the professional orator, all come down to one word: insubordination. What hangs in the air, unmentioned, but known to many is that it's insubordination that brought victory in its wake. Still, without obedience to the hierarchy, how could the military function? \n*if (God = \"Avánthe\") or ((God = \"Hnálla\") or (God = \"Karakán\"))\n\tHow could society function? \n*if (God = \"Hrü'ü\") or ((God= \"Dlamélish\") or (God = \"Vimúhla\"))\n\tEven the worshippers of the Gods of Change love their hierarchies and their clear, effective chains of command.\n*comment endif\n\nThe two Generals look on stonily. Side by side, they resemble Mighty Karakán and his handmaiden Kátha, though you suspect $!{AlliedGeneral} might duel anyone who called her a handmaiden, godly or no. There is no hint of what's to come in their faces.\n*choice\n\t#I speak of the Dritlán's incompetence.\n\t\t*set dutiful %-10\n\t\t*set noble %-10\n\t\tOnly a few sentences into your speech, you realize your error. The soldiers around you grumble and cast glances at the assembled dritláns, shifting restlessly. In response, the Generals' faces become even more set. True though your words are, they carry a hint of mutiny, and that must be rooted out.\n\t\t*set talk false\n\t\t*goto courtmarshaled3\n\t#I was driven to madness by love of my troops.\n\t\t*set tactics %+10\n\t\tYou fall back on the only defensible part of your actions: a loyalty to those you lead and to the good of the legion.\n\t\t*if diplomacy >60\n\t\t\tIt is a thin line to explain and ask pardon for your actions without appearing to justify them, but you walk it with skill. You conjure the tragedy of a commander torn between obedience to ${PCHis} legion and the desire to save it. You chose wrong, you know that now, but who would wish that choice on anyone?\n\t\t*if diplomacy \u003c=60\n\t\t\tIt is a thin line to explain and ask pardon for your actions without appearing to justify them, and you fear your explanations seem hollow and self-serving. The need to stand here and defend yourself at all rankles, and you fear some of this emotion comes through.\n\t\t*goto courtmarshaled3\n\t#I humbly accept punishment.\n\t\t*set dutiful %+20\n\t\t*set humble true\n\t\tWhen given a chance to speak, you kneel on the ground before the Generals.\n\t\t*if diplomacy >50\n\t\t\tEloquently, you apologize, stopping just shy of abasement. As you acknowledge your wrongfulness, you see tension lift in your General's eyes. What soldier, having seen a kási—and one so in the right—bend his neck to the immutable hierarchy, could contemplate righteous insubordination?\n\t\t*if diplomacy \u003c=50\n\t\t\tHaltingly, you apologize. Nothing in your life as a noble has prepared you to so abase yourself publicly with social inferiors, men and women you must command, looking on. The scene is awkward and stiff, and all look dissatisfied, except for Dritlán Núromen, whose eyes glint maliciously at your shame.\n\t\t*goto courtmarshaled3\n\t#I stoically stand tall and silent.\n\t\t*set noble %+20\n\t\tIn the quiet after the charges are read, eyes look to you, but you do not meet them, staring instead straight ahead.\n\t\t*set talk false\n\t\t*goto courtmarshaled3\n\n*label courtmarshaled3\n\n*if saveallies\n\tYour eyes are focused on the two Generals who hold your life and honor in their hands, and so you are surprised to see Nirún step forward from the ranks of the Legion of ${alliedlegion} to bow low before General $!{AlliedGeneral}.\n\t\n\t\"Omnipotent General.  My tsurúm stands before you wounded and denuded, but not broken. We stood before the Traitor Prince's filthy undead, and held the line.\" As his voice carries to the assembled troops, a cheer goes up. \"That we held, I owe to the courage and steadfastness of my soldiers. That we are here in such numbers, I owe to this Kási.\" Nirún gestures formally in your direction. \"I would ask for clemency for ${pchim}.\" The final words are less grandiose, less prepared. They seem tinged with sadness, and with turmoil?\n\t\n\t$!{AlliedGeneral} looks at him for a moment, then grunts.  She turns to $!{general}. \"These charges are serious, meriting sacrifice, or even a more ignoble death. But if you can be so merciful in our shared victory as to levy shámtla instead, \n\t*if ((talk = true) and(diplomacy >60)) or ((diplomacy>45) and (humble = true))\n\t\tthen the Legion of ${alliedlegion} would gladly pay it as a gift to the tsurúm of Kási $!{name}.  \n\t*if ((talk = false) or (diplomacy \u003c=60)) and ((humble = false) or (diplomacy \u003c=45))\n\t\tthe Legion of ${alliedlegion} would count it a great favor. \n\tAs they saved our soldiers, we will save their Captain.\"\n\t\n\tGeneral $!{General} lets his gaze pass over the assembled tsurúm. \"Grave though these crimes are, I will be magnanimous because you ask it of me.\" He nods, and the guards flanking you step back.  \n\t*if ((talk = true) and(diplomacy >60)) or ((diplomacy>45) and (humble = true)) \n\t\t\"Your shámtla is set at two thousand káitars; be thankful you have such friends as these to pay it for you.\"\n\t\t*goto courtmarshaled4\n\t*else\n\t\t\"Your shámtla is set at two thousand káitars.\"\n\t\t*set wealth -2000\n\t\t*goto courtmarshaled4\n\t\n\t*label courtmarshaled4\n\t\n\tNot another word is said on the subject. Your General glares once at you and then motions for the next criminal to be brought forward. You are a free \n\t*if pche = \"he\"\n\t\tman. \n\t*if pche = \"she\"\n\t\twoman. \n\t*set status %-20\n\t*set convicted false\n\t*label free_at_last\n\t*page_break\n\tWord has come down to the officers that the Legion of ${legion} is to garrison the town in shifts, rotating out the soldiers to relax, while ${alliedlegion} clears out the undead from the catacombs beneath the Temple of Sárku. Given the danger of the task, and because the undead won't venture above ground without their priests to command them, it is an odd choice. Normally, you would leave a tsurúm or two behind to hold the town and begin the long march to the next front. Normally, you would never have taken Sangmiré in the first place.\n\t\n\tYou try to put these concerns from your mind. The Generals are hardly likely to confide in you any time soon.\n\t\n\t*label parole\n\tYou find yourself at loose ends in Sangmiré, \n\t*if (her_dead) and (loudmouth_captured = false)\n\t\twith a fallen heréksa to mourn. While your fellow officers adjourn to wine houses, you turn toward the battlefield and the yellow tents manned by the priesthood of Belkhánu.\n\t*if (her_dead = false) and (loudmouth_captured = false)\n\t\tfree of duties for the first time in months, and look forward to a few days of relaxation.\n\t*goto res_her\n*else\t\n\tSilence falls across the field. General $!{General} stares down at you, weighing options. \n\t*if ((talk = true) and (diplomacy >60)) or ((diplomacy>45) and (humble = true))\n\t\t\"Your actions upon the platform were inexcusable, but by the blessings of ${God} did not bring the calamity and chaos that they should have. Today, in victory I choose to be magnanimous. Your life is spared, and your rank as well, but for the insult you have done to your superior, the Dritlán Núromen, you will pay a shámtla of two thousand káitars.\"\n\t\t*set wealth -2000\n\t\tNot another word is said on the subject. Your General glares once at you and then turns away dismissively and motions for the next criminal to be brought forward. You are a free \n\t\t*if pche = \"he\"\n\t\t\tman. \n\t\t*if pche = \"she\"\n\t\t\twoman. \n\t\t*set convicted false\n\t\t*set status %-20\n\t\t*goto free_at_last\n\t*else\n\t\t\"Your actions upon the platform were inexcusable, but by the blessings of ${God} did not bring the calamity and chaos that they should have. I will not pardon you, and so doing condone your behavior. Neither will I rush to hasty judgment. In the meantime you will be given parole, but are relieved of command.\"\n\t\t*set status %-40\n\t\t*page_break\n\t\tIt is whispered by your fellow officers that the Legion of ${legion} is to garrison the town in shifts, rotating out the soldiers to relax, while ${alliedlegion} clears out the undead from the catacombs beneath the Temple of Sárku. Given the danger of the task, and because the undead won't venture above ground without their priests to command them, it is an odd choice. Normally, you would leave a tsurúm or two behind to hold the town and begin the long march to the next front. Normally, you would never have taken Sangmiré in the first place.\n\t\t\n\t\tYou try to put these concerns from your mind. Until your case is settled, you have no say in army life.\n\t\t*goto parole\n*label res_her\n*if her_dead\n\t*page_break\n\t*if her_captured = false\n\t\tHer body is as bloodless and pale as the undead that killed her. Flies swarm desultorily around it in the heat. \n\t*if her_captured\n\t\tHer body is bloodless and pale. Flies swarm desultorily around her slashed throat in the heat. You're told she was found this way, likely killed by some dishonorable guard in the enemy's rout.  \n\tThey have dressed Rayána in her heréksa's uniform and laid her out in ranks with her fellow soldiers beneath a tent, around which glide priests clad in yellow from head to toe. Their robes and head coverings flutter in the light breeze like ghosts. One wafts to you and bows with grace.\n\t\n\t\"Have you come to pay respects? To make a sacrifice? So many await our ministrations and the rites of the Lord of the Excellent Dead.\" He sighs, motioning at the rows of fallen. \"Summer is a bad time for dead bodies, and we have fewer hands than we'd like for the work, but I assure you that each of these brave souls will be ushered with due ceremony into the planes. They died to drive off the Worm Lord's priests, after all.\" \n\t\n\tYou notice the lack of ornamentation upon the robes and realize this must be a priest of the Third Circle, possibly lower. A small town, Sangmiré's Temple of Belkhánu may be little more than a shrine maintained by a handful of priests and priestesses, and that would have been before the inevitable purges of the undead occupation.\n\t*label res_her2\n\t*choice\n\t\t#\"Just saying goodbye.\"\n\t\t\tThe acolyte bows and leaves you to your thoughts. Face smoothed of ferocity and stubbornness, Heréksa Rayána looks truly young, and a bit like a stranger. Such a peaceful repose had never graced her features in life.\n\t\t\t*goto Fate\n\t\t#\"I wish to buy an offering for her burial.\"\n\t\t\tThe acolyte bows again and returns with an assortment of incense sticks, flowers, decorative weapons, and many other offerings.\n\t\t\t*set wealth -25\n\t\t\t*fake_choice\n\t\t\t\t#A garland of fresh flowers for her to wear.\n\t\t\t\t#A sword to carry into death as she did in life.\n\t\t\t\t#A finely wrought miniature ceramic \"feast\" to symbolize plenty.\n\t\t\t\t#A pillow stuffed with incense and dried flowers to bring sweet repose.\n\t\t\tYou hope your gift will bring solace to her spirit in the voyages to come.\n\t\t\t*goto Fate\n\t\t*hide_reuse #\"I wish to have her embalmed and sent back to her clan.\"\n\t\t\tThe acolyte nods thoughtfully.  \"We have the necessary supplies. It is time that is the limiting factor. We could have her returned to $!{Hometown} in beauty and panoply for internment in her clan's tomb, if a worthy offering were made to the God on her behalf….\"\n\t\t\t*choice\n\t\t\t\t*selectable_if (wealth >=100) #\"Yes, yes, here is your money.\" \n\t\t\t\t\t*set wealth -100\n\t\t\t\t\tYou return the next day to find the flies gone, her skin oiled and gleaming with the color of rich earth, and her scent transmuted to one of sandalwood and myrrh.  Face smoothed of ferocity and stubbornness, with her richly dressed body laid on a bier of cloth and flowers, Heréksa Rayána looks truly young, like a favored child going for sacrifice. You place upon her chest the calligraphed scroll honoring her deeds given to you by the Generals, and fold her hands upon it.\n\t\t\t\t\t*goto Fate\n\t\t\t\t#\"On second thought…\"\n\t\t\t\t\t*goto res_her2\n\t\t*hide_reuse #\"Do you have a priest who can return her to life?\"\n\t\t\tThe acolyte seems taken aback, surprise making him blunt. \"We do, but he is old and has not summoned such energies in years. Do you know what you ask?  The risks involved… The fee would be enormous.\" He looks down at the Heréksa, her rank and clan clearly read in her attire. \"She is from a low clan. Would $!{Clan} even countenance such an expense?\"\n\t\t\t*choice\n\t\t\t\t#\"Probably not…\"\n\t\t\t\t\tYou know that, to another observer, this is just one death among thousands, low ranking, low status. \"Such spells,\" your clansmen would say, \"are reserved for those whose deaths would tear apart the social fabric.\" No, she has moved out upon her soul's journey as everyone must and it would be viewed as hubris to shake the cycle of reincarnation simply for what? Friendship? Gratitude?\n\t\t\t\t\t*goto res_her2\n\t\t\t\t#\"She saved my life!\"\n\t\t\t\t\tThe acolyte stares at you, a featureless still shroud, and then bows neutrally. You know that to most people the idea of moving heaven and earth, the very cycles of life and death, out of gratitude for a low clan minion who died doing her duty would seem absurd. Still, you are determined….\n\t\t\t\t\t\n\t\t\t\t\t\"I will speak to the temple hierarchy and find you in—\" He stops and turns toward Rayána's corpse for a moment. \"—two days, if it can be arranged. If you will excuse me, glorious officer, I must continue attending to these others.\" The robes billow in the direction of the many bodies.\n\t\t\t\t\t\n\t\t\t\t\tHowever noble your intentions, you will need some one thousand káitars to pay the Temple of Belkhánu—a noble's ransom, literally. You hope opportunity presents itself in these next days.\n\t\t\t\t\t*set res_attempt true\n\t\t\t\t\t*goto Fate\n\t\t\t\t*selectable_if (wealth >=650) #\"I will devote my personal fortune.\"\n\t\t\t\t\tThe acolyte steps back as if pushed, clearly shocked at the idea of one individual controlling such resources. He bows.  \n\t\t\t\t\t\n\t\t\t\t\t\"I will speak to the temple hierarchy and find you in—\" He stops and turns toward Rayána's corpse for a moment. \"—two days, if it can be arranged. If you will excuse me, glorious officer, I must continue attending to these others.\" The robes billow in the direction of the many bodies.\n\t\t\t\t\t*set res_attempt true\n\t\t\t\t\t*goto Fate\n*else\n\t*goto Fate\n\n*label Fate\n*if (loudmouth_captured) or (loudmouth_sacrifice)\n\t*page_break\n\tAs you walk toward the area where prisoners of war await their fate, the smell of blood and piss and sickness hangs heavy in the summer air.  Your conquered foe, the loudmouth you dueled before the battle started in earnest, \n\t*if loudmouth_sacrifice\n\t\tsits upon a straw mat, his wounds perfunctorily treated. With so many wounded, what is the point of wasting medicine on one destined for the sacrificial \n\t\t*if God = \"Vimúhla\"\n\t\t\tpyre?\n\t\t*if God != \"Vimúhla\"\n\t\t\tblade?\n\t*if loudmouth_captured\n\t\tpaces his pen.  His wounds have been tended to; his simple cotton breech clout is clean.\n\t\"Ohé!\" he shouts, seeing you approach.\n\t*if loudmouth_sacrifice\n\t\t\"I'm glad you came to see me before the sacrifice. You fought well for such a small thing, defeated me fairly. \n\t\t*if God = \"Vimúhla\"\n\t\t\tSo I know you'll be fair in this. I'm glad to be a sacrifice, to expunge my defeat, but I won't die upon a pyre.  \n\t\t*if God != \"Vimúhla\"\n\t\t\tI'm glad to be a sacrifice, to expunge my defeat, but when it's done \n\t\tI want my body to go back to my family tomb and eternal life.\"\n\t*if loudmouth_captured\n\t\t\"What's this about being ransomed back? I've failed my clan and my Emperor. I won't go home in shame, bought back like a slave. Not in this life.\" He squeezes the bars of the pen, a belligerent look upon his face. \"You need to sacrifice me and send my body home. My death will expunge defeat, and I'll start a new life in the tomb.\"\n\t*choice\n\t\t*selectable_if (God = \"Vimúhla\") #\"I'm sacrificing you to the Lord of Flame. End of discussion.\"\n\t\t\t*set noble %+20\n\t\t\tThe brief look of despair on his face is quickly transmuted to rage. This huge veteran is clearly not accustomed to powerlessness, and his curses follow you as you leave.\n\t\t\t\n\t\t\tThe next day, he is marched with other captives to the stakes set up by the priests of Vimúhla. None of these followers of Sárku and his traitorous Usurper are given the mercy of drugs to dull the pain of immolation. His bellowing screams echo throughout the plaza until smoke fills his lungs.\n\t\t\t*goto Fate2\n\t\t#\"I need the money from your ransom. You're worth more to your clan alive.\"\n\t\t\tThe look of humiliation on his face is transmuted to rage when his entreaties fail to move you. This huge veteran is clearly not accustomed to powerlessness, and his curses follow you as you leave.\n\t\t\t\n\t\t\tTwo days later, he's sent with other prisoners back behind your $!{Prince}'s lines to be held until ransom arrives. The legion quartermasters are kind enough to give you an advance on a part of his value.\n\t\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t\t*set noble %+15\n\t\t\t*if (Clan = \"Red Sun\")\n\t\t\t\t*set noble %-15\n\t\t\t*set Wealth +500\n\t\t\t*goto fate2\n\t\t#\"That's crazy. I'm sending you home to your family.\"\n\t\t\tYou shake your head in dismay. \"Look, you've been away at war for how many years? Your clan won't care that you lost a duel. They'll just be glad to have you home.  Death will come to us all eventually. Don't be in such a hurry.\"\n\t\t\t\n\t\t\tHis expression does not change. \"You don't understand. I don't even know if they will pay.\" But he does not argue; he just sits, contemplating his fate.\n\t\t\t\n\t\t\tTwo days later, he's sent with other prisoners back behind your $!{Prince}'s lines to be held until ransom arrives. The legion quartermasters are kind enough to give you an advance on part of the payment. You hope that he is wrong about his fate.\n\t\t\t*if (God = \"Avánthe\")\n\t\t\t\t*set noble %+15\n\t\t\t*if (Clan = \"Red Sun\")\n\t\t\t\t*set noble %-15\n\t\t\t*set Wealth +300\n\t\t\t*goto Fate2\n\t\t*selectable_if (God != \"Vimúhla\") #\"I'm not sending your body back to be made into an undead!\"\n\t\t\tThe brief look of despair on his face is quickly transmuted to rage. This huge veteran is clearly not accustomed to powerlessness, and his curses follow you as you leave.\n\t\t\t\n\t\t\tThe next day, he is escorted onto a dais with a handful of other prisoners. A priest of the Lord of Glorious War sacrifices each man with a clean, quick cut of his silver blade, amidst billows of incense and chanting. The bodies are then handed over to the priests of Belkhánu for internment, who assure you that their rituals will prevent any from being raised as undead.\n\t\t\t*if God = \"Karakán\"\n\t\t\t\t*set noble %+20\n\t\t\t*if (God = \"Dlamélish\") or (God = \"Hrü'ü\")\n\t\t\t\t*set noble %-10\n\t\t\t*if God = \"Hnálla\"\n\t\t\t\t*set noble %+15\n\t\t\t*goto Fate2\n\t\t#\"As you wish. I will sacrifice you to Lord Karakán and return your body to your clan.\"\n\t\t\t\"Thank you. I will be a good sacrifice for you, and sing your praises until the end.\" You can tell he's not a man used to being in a position to accept favors, but his gratitude sounds genuine.\n\t\t\t\n\t\t\tThe next day, he is escorted onto a dais with a handful of other prisoners. A priest of the Lord of Glorious War sacrifices each man with a clean, quick cut of his silver blade, amidst billows of incense and chanting. Most of the bodies are then given over to the priests of Belkhánu for internment, but your prisoner is loaded in a chlén cart destined for a far town. You wonder if he will find the peace in his second life he did not have in his first.\n\t\t\t*if God = \"Karakán\"\n\t\t\t\t*set noble %+10\n\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t*set noble %-20\n\t\t\t*if (God = \"Dlamélish\") or (God = \"Hrü'ü\")\n\t\t\t\t*set noble %-10\n\t\t\t*if God = \"Hnálla\"\n\t\t\t\t*set noble %+10\n\t\t\t*goto Fate2\n\t\t#\"Your clan are welcome to ransom your corpse.\"\n\t\t\tHe grinds his teeth and seems about to unleash a string of profanity, but visibly controls himself. \"I suppose that's the best chance I'll have.\" \n\t\t\t\n\t\t\tThe next day, he is escorted onto a dais with a handful of other prisoners. A priest of the Lord of Glorious War sacrifices each man with a clean, quick cut of his silver blade, amidst billows of incense and chanting. Most of the bodies are then given over to the priests of Belkhánu for interment, but your prisoner's is loaded in a chlén cart and shipped behind the $!{Prince}'s lines to be held for ransom. The legion quartermasters give you a small advance, unsure of what his clan will be willing to pay.\n\t\t\t*if God = \"Karakán\"\n\t\t\t\t*set noble %+5\n\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t*set noble %-20\n\t\t\t*if (God = \"Dlamélish\") or (God = \"Hrü'ü\")\n\t\t\t\t*set noble %+10\n\t\t\t*set wealth +150\n\t\t\t*goto Fate2\n*else\n\t*goto Fate2\n\n*label Fate2\n*page_break\n*if Clan = \"Red Sun\"\n\t\"The Lord of the Conflagration demands sacrifice!\" intones the red-robed priest. \"Our beloved, holy Prince Mirusíya will only be safe upon the throne when the disloyal have been scourged from Tsolyánu!\" \n\t\n\tCheers go up from the assembled soldiery and many of the officers. Kási Nirún, appearing by your side, looks discomfited. \"If the chaplains keep on this way, Sangmiré will be a pyre in another day or two. And what then? When word travels from clanhouse to clanhouse that Prince Mirusíya's troops are putting towns to the torch?\" He spits. \"Damn all fanatics.\"\n\t*choice\n\t\t#\"Vimúhla requires this of us. How could we fight the might of Sárku without his blessing?\"\n\t\t\tNirún shakes his head. \"The Gods defeated Ksárul when they came together, and that is how we will win this war. If we follow the Concordat and can make alliance with the priesthoods of the other gods, then they will bow to us when they see our strength, but how can our Prince sit on a throne over a nation that views him as a religious tyrant? It hasn't worked out very well for the Usurper and his Worm God….\"\n\t\t\t*choice\n\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t#\"How can you speak so of our ever-burning Vimúhla? He shall burn what he wishes and rule all!\"\n\t\t\t\t\t\t*set nir_rep -1\n\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t\tBeside you, Nirún clenches his jaw, turns, and disappears into the crowd. \n\t\t\t\t\t\t*goto fire_loot\n\t\t\t\t#\"I have my own problems, none of which are enforcing the Concordat. There will be a lot of money to be made in the chaos.\"\n\t\t\t\t\t*label LootN\n\t\t\t\t\t*set nir_rep -1\n\t\t\t\t\t*set dutiful %-10\n\t\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\tBeside you, Nirún clenches his jaw, turns, and disappears into the crowd. \n\t\t\t\t\t*goto fire_loot\n\t\t\t\t#\"Maybe if we gather proof of what has happened we can keep the taint from falling on the Prince.\"\n\t\t\t\t\t*label dataN\n\t\t\t\t\t*set dutiful %+15\n\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*set nir_rep +1\n\t\t\t\t\tNirún pauses to think. \"Yes, that would serve. In some ways, politically, it would be better than no massacre at all; the punishments prove that Prince Mirusíya is not on a temple leash.\"\n\t\t\t\t\t*goto fire_data\n\t\t\t\t#\"It might be possible to save a few people, limit the casualties….\"\n\t\t\t\t\t*label SaveN\n\t\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\t*set noble %-20\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t\"Less than I was hoping for, but more than doing nothing. You are right, we must suit our tactical goals to our capabilities. I will find you when the moment comes.\"\n\t\t\t\t\t*goto fire_save\n\t\t\t\t#\"You should take these points to the Generals.\"\n\t\t\t\t\t*set nir_rep +1\n\t\t\t\t\tNirún looks nervous. \"It is not my way to put myself forward like that, and my Dritlán is a good man, but very religious. He won't be of help. Will you come with me? Two kásis representing both legions…\"\n\t\t\t\t\t*goto fire_gen\n\t\t#\"You're right, we need to do something to keep this from getting out of hand.\"\n\t\t\tNirún lets out a relieved sigh. \"I was hoping you would feel that way.  What do suggest?\"\n\t\t\t*choice\n\t\t\t\t#\"We can can work to save as many as possible when the inevitable happens.\"\n\t\t\t\t\t*goto SaveN\n\t\t\t\t#\"We can't save Sangmiré, but we can gather evidence to take to Prince Mirusíya, so he can publicly punish the perpetrators.\"\n\t\t\t\t\t*goto dataN\n\t\t\t\t#\"We can talk to the Generals and get them to put a stop to it.\"\n\t\t\t\t\t*set nir_rep +2\n\t\t\t\t\tNirún looks nervous. \"It is not my way to put myself forward like that, and my Dritlán is a good man, but very religious. He won't be of help, but if you're with me…two kásis representing both legions…\"\n\t\t\t\t\t*goto fire_gen\n\t\t#\"I'd keep those feelings to yourself unless you want to die atop a bonfire.\"\n\t\t\tNirún smiles sardonically. \"Are you going to turn me in?\" He pauses. \"Do you plan to do nothing? You don't strike me as the passive sort.\"\n\t\t\t*choice\n\t\t\t\t#\"It might be possible to limit the extent of the scourging when it happens….\"\n\t\t\t\t\t*goto SaveN\n\t\t\t\t#\"I'll follow my orders, but I'll gather evidence and proof of them for the Prince. Let him decide whether this was justified.\"\n\t\t\t\t\t*goto dataN\n\t\t\t\t#I have my own problems. Let these people look out for themselves. There will be a lot of money to be made in the chaos.\"\n\t\t\t\t\t*goto LootN\n*else\n\t\"More tea? A pastry?\" The elderly auntie, in her best finery, bends to pour for you herself, shushing away the waiting servant. It appears that membership in the conquering army does wonders for one's status within the local $!{Clan} clanhouse. \"And how are your mothers? Halé is my second cousin, you know.\" By which she means \"We have ties of blood; you don't want mine on your hands.\"\n\t\n\tYou have been invited to the local house of your clan for a third time since Sangmiré fell, and this time you can't help but feel that everyone is laying it all on a bit thick, from the servants who placed a flatteringly high stack of cushions for you to sit upon to the young, attractive \n\t*if (orientation = \"gay\") or (orientation = \"straightf\")\n\t\tmen \n\t*if (orientation = \"lesbian\") or (orientation = \"straightm\")\n\t\twomen \n\tin suspiciously fine attire hanging on your every word. As you sip from your cup, the auntie's stream of chatter takes on a louder tone. \"…and that is why we need you to make these treason charges disappear.\"\n\t\n\tYou sputter and cough, tea sloshing. Damn the woman; you know she waited until just this moment to drop her statement like a lead weight into a pond. All the eyes in the room are looking at you expectantly. \"Shém is a good boy, and loyal as the day is long. His fathers worked so hard to get him that post in the Governor's Palace, and now it's his downfall. Can you imagine their grief?\"\n\n\tYou realize she's going to just keep talking, while their eyes bore into you, unless you say something.\n\t*choice\n\t\t#He's my family; of course I will help.\n\t\t\t*set dutiful %+10\n\t\t\tYou hold up your hand to stop the flow of words, and promise to come to your cousin's aid. Your assurances of help are met with weeping and a few embraces, and followed by a lavish feast at which you are honored. Your station is suddenly elevated above reasonableness, you realize, by your connection to the military occupation, and your relatives, one and all, are moving to shelter beneath your arms.\n\t\t\t*goto help_shem\n\t\t#Assuming he did nothing wrong, I am sure I can get him pardoned.\n\t\t\tYou hold up your hand to stop the flow of words, and promise to look into matters personally. Your assurances are met with nervousness, and the meal that follows is tense. High-level priests and bureaucrats, older men and women used to holding the reins of power, are unused to petitioning a young cousin to intercede on their behalf.\n\t\t\t*goto help_shem\n\t\t#If their gratitude is tangible, I am sure I can get him pardoned.\n\t\t\t*set dutiful %-10\n\t\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t\t*set noble %+10\n\t\t\tYou hold up your hand to stop the flow of words, and promise to look into matters personally. Your assurances are met with nervousness, and the meal that follows is tense. High-level priests and bureaucrats, older men and women used to holding the reins of power, are unused to petitioning a young cousin to intercede on their behalf.\n\t\t\t*goto help_shem\n\t\t#Leave me out of this.\n\t\t\t*if diplomacy >55\n\t\t\t\t\"The war has brought a great deal of grief to us all,\" you reply. \"Sadly, my first duty to our clan is to maintain my position close to the generals who now wield power in Sangmiré, and I cannot do this by making waves or disrupting their plans to pacify the city. In trying to help my cousin I would sacrifice too much of the influence that allows me to protect this clanhouse as a whole.\"\n\t\t\t\t\n\t\t\t\tPretty words, but they ring a bit hollow, and the older, more prestigious clan members look sick at having to swallow the refusal of a familial inferior whom they lowered themselves to admit need of. The glares and the weeping of the auntie make for an awkward meal.\n\t\t\t\t*set status %-15\n\t\t\t\t*goto romance\n\t\t\t*else\n\t\t\t\t\"The war has brought a great deal of grief to us all,\" you reply. \"I have lost dozens of soldiers from my tsurúm to fighting and disease. It is my charge to care for those remaining.\" You turn to look at the clan elders in their robes and jewelry. \"If you wish to petition the Generals, I am sure they will be fair. And if all this clanhouse loses in this war is one young man, I would count yourselves lucky.\"\n\t\t\t\t\n\t\t\t\tYour words are true, but harsh, and not what elders used to commanding obedience from their family members expect. The auntie begins to wail in grief as her children and grandchildren flock about her protectively, glaring at you. The old men cough and harrumph and work up to shouting chastisements. You judge that, whatever the quality of the tea, it's probably best to cut this meal short and beat a strategic retreat.\n\t\t\t\t*set status %-30\n\t\t\t\t*goto romance\n*label help_shem\n*page_break\nThe next morning, head pounding after an overabundance of rich food and fine spirits, you are left with the problem of just how to free your cousin. It seems clear from the scuttlebutt that the Governor and his retinue have committed no particular wrong, and are being offered up to assuage the anger of soldiers and priests resentful of a long and costly siege before that anger spills over into the streets. Of course every clan with a member doomed to die on the impaler's stake as part of this cathartic sacrifice will be finding a kási or a dritlán to plead their case, and while a few will succeed, most will not. What's your plan?\n*choice\n\t#A substantial bribe should do the trick.\n\t\tInducements are the classic Tsolyáni solution to problems such as these. Of course no high-clan officer would discuss matters bluntly, but informal petitions from junior officers to seniors, followed by servants talking, works just as well. The bidding is steep, and you suspect that the bribes will do more to pacify the city than the sacrifices will, with Sangmiré's clans taught humility through being bled of all-important káitars, and some of that wealth being redistributed to the army as a whole.\n\t\t*if wealth >250\n\t\t\t*if res_attempt = false\n\t\t\t\t*label bribe\n\t\t\t\t*set wealth -250\n\t\t\t\t\n\t\t\t\tIn the end it costs you a pretty 250 káitars to buy your cousin's life, and upon seeing his watery gaze and somewhat vacant expression, you're not sure it's money well spent. Your auntie, however, shrieks with joy and pulls him to her breast before launching into an endless stream of fussing and scolding that makes you thankful for Dzái's stoic neglect and Halé's calm competence.\n\t\t\t\t\n\t\t\t\tNo mention is ever made of compensating you for the bribe—all your money is really the clan's, after all—but you know word will get around and that your investment will come back to you as power within the clan, plum assignments, and assistance should you ever find yourself in the same situation as poor Shém.  You also know that for the rest of your stay in Sangmiré there will be at least one door that is always open to you, ready to supply any need or whim.\n\t\t\t\t*achieve shem\n\t\t\t\t*check_achievements\n\t\t\t\t*if (choice_achieved_save)\n\t\t\t\t\t*achieve family\n\t\t\t\t*set status %+25\n\t\t\t\t*goto romance\n\t\t\t*elseif (res_attempt) and (wealth \u003c900)\n\t\t\t\tThis leaves you with a difficult choice.  The wealth from your campaigns is substantial, but not enough to both rescue your cousin and resurrect the dead Rayána.\n\t\t\t\t*choice\n\t\t\t\t\t#Clan comes first.\n\t\t\t\t\t\t*goto bribe\n\t\t\t\t\t#The Heréksa comes first.\n\t\t\t\t\t\tYou make a lower offer for your cousin than you think optimal, but one which still reserves enough capital to meet the costs of the Temple of Belkhánu.  A soldier's cart is supposed to run on wheels of gold, but right now it seems like everyone is taking a piece of yours.\n\t\t\t\t\t\t*if wealth \u003c800\n\t\t\t\t\t\t\t*set wealth 650\n\t\t\t\t\t\t\t*goto failedbribe\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set wealth -100\n\t\t\t\t\t\t\t*goto failedbribe\n\t\t\t*else\n\t\t\t\t*goto bribe\n\t\t*else\n\t\t\tThe price has been driven up much higher than you suspect you can afford, but you make an offer anyway, in the polite roundabout way required.\n\t\t\t*set wealth -50\n\t\t\t*label failedbribe\n\t\t\t\n\t\t\tWord comes back to you that your cousin is too strongly implicated in the government's crimes to be spared, though his death will be commuted from impalement to ritual sacrifice by a priest of Karakán in deference to your family—still a death, though a much more honorable one. Upon hearing the news your clan seem defeated. The memorable aunt is in hysterics, and one of Shém's fathers retreats into himself, muttering \"If only…\" and \"It seemed like such a good post….\" Though understanding your position, the local clan elders make it clear that you will not darken their doorstep again.\n\t\t\t*set status %-10\n\t\t\t*goto romance\t\n\t#Maybe $!{wave} can help.  $!{wahe}'s his cousin too.\n\t\t*if wave_slave\n\t\t\t\"Help?\" $!{wahis} face is suffused with blood and rage. \"You want me to stick out my neck for some clan-cousin I've never met, after what $!{Clan} let happen to me? I wouldn't lift a finger! I'll go to the damn impaling and raise a glass!\"\n\t\t\t*if wav_rep >2\n\t\t\t\t\n\t\t\t\tIt takes a lot of soothing to calm ${wahim} down and bring ${wahim} around to your way of thinking, and even so, ${wahe} paces the small tent, fists clenched, mulling your words over. You sip chumétl and wait for ${wahim} to work off all the energy before \n\t\t\t\t*goto askWave\n\t\t\t*else\n\t\t\t\tNo words will calm ${wahim}. It doesn't take long for you to be evicted from the small, neat tent. When had $!{wave} become neat? When had your clanless cousin amassed so many things that need to be stored so carefully, let alone a relatively prestigious post in a good legion? $!{wahe} has steadfastly refused to discuss the past, and has become more of an enigma than ever. But one thing you are sure of: $!{wave} has neither forgotten nor forgiven ${wahis} enslavement.\n\t\t\t\t\n\t\t\t\tYou walk out into the sun, shaking your head.  You'll have to do this alone.\n\t\t\t\t*page_break\n\t\t\t\tSadly, your efforts do not come to much, in part because it seems poor Shém, his mother's views aside, is guilty of selling grain from the city's hidden reserves to General Sikún hiKhanúma's quartermasters during the occupation. After that comes out, nothing you say or do will shift the Generals from their course. He goes to his death pleading and protesting innocence, but none outside $!{Clan} believe him. Watching the grisly scene, your aunt is in hysterics, and one of Shém's fathers retreats into himself, muttering, \"If only…\" and \"It seemed like such a good post….\" Though understanding your position, the local clan elders make it clear that you will not darken their doorstep again.\n\t\t\t\t*set status %-10\n\t\t\t\t*goto romance\n\t\t*else\n\t\t\t\"Of course one must help out the old clan,\" $!{wave} says with sardonic cheer, tapping the $!{Clan} badge on ${wahis} belt. \"Duty calls, and all that.\" You take a sip of chumétl and gaze around ${wahis} small tent. When had $!{wave} become tidy? A bit taken aback by ${wahis} ready assent, \n\t\t\t*label askWave\n\t\t\tyou begin to explain the avenues of approach as you see them, which boil down to favor-trading and bribery. $!{wave}, despite ${wahis} brief tenure in the Legion of ${legion}, is already surrounded by a cadre of fast friends and gossips, just as ${wahe} was back in $!{hometown}, and you hope ${wahe} can pinpoint the fulcrum on which to work.\n\t\t\t\n\t\t\tIn this aspect, ${wahe} does not disappoint.  Your cousin dismisses the difficulties with a wave of a hand, and insists you leave the matter in ${wahis} lap. \"If we're going to move heaven and earth for this Shém, we might as well use as little force as possible to do so. I know who to talk to to keep costs down.\"\n\t\t\t*page_break\n\t\t\tThe next day the matter becomes moot, as the Governor is found dead of poison in his chambers, having left behind a letter absolving all his functionaries of responsibility for the occupation, and begging that his death buys them clemency. \"In days such as these, it is hard to know how to steer the ship of state between warring factions,\" he wrote. \"I did what was needed to preserve Sangmiré, as is my charge. Let my death wash away any offense I have given to $!{Prince} $!{Princename}, and let it be the last death that war brings to my town.\"\n\t\t\t\n\t\t\tThe words are read aloud in the town square, and much debated and wept over by soldiers and townsfolk alike. The bloodlust fades in the wake of the suicide, and the prisoners are released, including Shém. He seems more bewildered than relieved at the turn of events, like a hmá spared from slaughter. Your auntie, however, shrieks with joy and pulls him to her breast before launching into an endless stream of fussing and scolding that makes you thankful for Dzái's stoic neglect and Halé's calm competence.\n\t\t\t*set gov_suicide true\n\t\t\t*achieve shem\n\t\t\t*check_achievements\n\t\t\t*if (choice_achieved_save)\n\t\t\t\t*achieve family\n\t\t\t*set status %+15\n\t\t\t*goto romance\n\t#I'll use my pull as the hero who took the city.\n\t\t*if convicted\n\t\t\tIt doesn't take long to realize that the shadow cast by your looming sentence is dark enough to obliterate any reflected glory from your capture of the city. The very people you would expect to have your back avoid you like the plague. Now that the walls are breached, few seem to have need of you, and you spend a disheartening few days cooling your heels in tent foyers being stood up for appointments.\n\t\t\t\n\t\t\tOnly persistence gets you an eventual audience with the dritlán who manages General $!{general}'s affairs. With visible annoyance she listens to your requests, looking over the list of captives brought by a clerk. She makes a notation next to your cousin's name and says she'll look into the matter, then dismisses you before you can say another word.\n\t\t\t*goto failedbribe\n\t\t*elseif courtmarshal\n\t\t\tYou make an appointment with General $!{general}'s personal dritlán, who listens with expressionless politeness to your request. When you finish, her lip quirks up a bit. \"Asking quite a lot of favors of our illustrious General, aren't you? He's already given you your life, and now you want a cousin's life too?\" \n\t\t\t*if diplomacy >60\n\t\t\t\t\n\t\t\t\tHer tone is chiding, but you sense no hostility in it. You remember that she has reason to hate her fellow Dritlán Núromen. Technically she outranks him by virtue of her close position to the General, but his clan is one of higher status, and the two of them often jockey for position. \n\t\t\t\t\n\t\t\t\tYou frown artfully. \"I know it is unlikely to be granted. I have heard that my Dritlán has caught word of my endeavor and thrown his influence into blocking me, saying it would be an insult to him for me to be shown any favor. But I still must make the request. For my clan, you know.\" As you excuse yourself, you see a steely glint in her eye.\n\t\t\t\t*page_break\n\t\t\t\tBetween that meeting and the impalements, Shém is returned to the clanhouse where his mothers and cousins make much of him. Your auntie shrieks with joy and pulls him to her breast before launching into an endless stream of fussing and scolding that makes you thankful for Dzái's stoic neglect and Halé's calm competence. Your cousin stammers his way through the reunion, casting you rheumy looks of gratitude, like a hmá spared from slaughter. The gratitude of the elders is more concrete, promising that word will be spread, and that the next time you need help with a plum assignment or extraction from trouble, $!{Clan} will be there for you. You also know that for the rest of your stay in Sangmiré there will be at least one door that is always open to you, ready to supply any need or whim.\n\t\t\t\t*achieve shem\n\t\t\t\t*check_achievements\n\t\t\t\t*if (choice_achieved_save)\n\t\t\t\t\t*achieve family\n\t\t\t\t*set status %+25\n\t\t\t\t*goto romance\n\t\t\t*else\n\t\t\t\t\n\t\t\t\tYou redden at the criticism, at this indolent paper-pusher accusing you of greed and ingratitude, and jump to your feet, knuckles red on your sword. She merely arches an eyebrow, then waves dismissively. \"I'll let him know of the request.\" You seem to have the worst luck with dritláns.\n\t\t\t\t*goto failedbribe\n\t\t*else\n\t\t\tSurrounded as you are in a haze of glory, it is a simple matter get an appointment with General $!{general}'s personal dritlán.  \n\t\t\t\n\t\t\t\"There must have been a mistake,\" she says after hearing you out. \"Of course no one could expect a relative of yours to be a collaborator,\" and so on. \"Still,\" she taps her front teeth with her stylus, \"he has amassed quite a bundle of legal fees that must be paid before his release.\" You remember that she has reason to hate her fellow dritlán, Núromen. Technically she outranks him by virtue of her close position to the General, but his clan is one of higher status, and the two of them often jockey for position. She sees gouging you as a way to take minor revenge upon your superior.\n\t\t\t*if diplomacy >50\n\t\t\t\t\n\t\t\t\tYou frown artfully. \"You and I know such fees are levied at the discretion of the general staff.\" You hold up your hand to forestall her indignant protest. \"It's Nuromen, isn't it? Placing this block in my way? He's bitter over my share of glory and has been putting these blocks in my path since the victory.\" Here you insert a dramatic sigh. \"I know you have General $!{General}'s ear. Surely you can override him?\"\n\t\t\t\t\n\t\t\t\tThere's a steely glint in her eye as she scratches off lines on her document. \"Of course, Kási. Anything for the hero of the hour.\"\n\t\t\t\t*goto shem_produced\n\t\t\t*else\n\t\t\t\tGiven her superior rank, and that such inducements are a legitimate form of income for her, there's nothing to do but pay up.\n\t\t\t\t*if wealth >=150\n\t\t\t\t\t*if res_attempt = false\n\t\t\t\t\t\t*set wealth -150\n\t\t\t\t\t\tWith a small sigh, you hand over 150 káitars.\n\t\t\t\t\t\t*goto shem_produced\n\t\t\t\t\t*elseif (res_attempt) and (wealth \u003c800)\n\t\t\t\t\t\tThis leaves you with a difficult choice.  The wealth from your campaigns is substantial, but not enough to both rescue your cousin and resurrect the dead Rayána.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Clan comes first.\n\t\t\t\t\t\t\t\t*set wealth -150\n\t\t\t\t\t\t\t\tWith a frustrated grimace, you hand over 150 káitars. \n\t\t\t\t\t\t\t\t*goto shem_produced\n\t\t\t\t\t\t\t#The Heréksa comes first.\n\t\t\t\t\t\t\t\t*label frustration\n\t\t\t\t\t\t\t\tKnuckles white, you excuse yourself from the tent. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYour local clan, impoverished by the occupation, and now squeezed by the people they viewed as saviors, cannot muster the coin in time. Word comes back to you that your cousin's death will be commuted from impalement to ritual sacrifice by a priest of Karakán in deference to your accomplishments—still a death, though a much more honorable one. Upon hearing the news, your clan seem defeated. The memorable aunt is in hysterics, and one of Shém's fathers retreats into himself, muttering, \"If only…\" and \"It seemed like such a good post….\" Angry at this betrayal by the military, the local clan elders make it clear that you will not darken their doorstep again.\n\t\t\t\t\t\t\t\t*set status %-10\n\t\t\t\t\t\t\t\t*goto romance\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set wealth -150\n\t\t\t\t\t\tWith a small sigh, you hand over 150 káitars.\n\t\t\t\t\t\t*goto shem_produced\n\t\t\t\t*else\n\t\t\t\t\tA civil war does not pay as well as foreign conquest, and a kási's salary is no great thing. You lack even the 150 káitars needed to secure Shém's freedom.\n\t\t\t\t\t*goto frustration\n\n*label shem_produced\n*page_break\nThe watery-eyed, frail specimen that is your cousin Shém is produced immediately. As he stands, blinking in the light of the tent while forms are filled out, the contrast between you two is a bit comical, and you see the Dritlán's lips quirk as she casts sidelong glances she tries to hide.\n\nA year ago, Shém, a knobbly skeleton lost in the panoply of his office robes, would have represented the power in Sangmiré, and the authority. Now, the bureaucrats and priests have given way to the strong, sun-darkened, scarred warriors. He follows you home, where you present him like a trophy to his weeping, scolding mother. Your cousin stammers his way through the reunion, casting you looks of gratitude. The gratitude of the elders is more concrete, promising that word will be spread, and that the next time you need help with a plum assignment or extraction from trouble, $!{Clan} will be there for you. You also know that for the rest of your stay in Sangmiré there will be at least one door that is always open to you, ready to supply any need or whim.\n*achieve shem\n*check_achievements\n*if (choice_achieved_save)\n\t*achieve family\n*set status %+25\n*goto romance\n\n*label fire_loot\n*page_break\nIt does not take long to find the fig leaf to justify the hungered-for destruction. A document in the governor's archives, a horoscope for the city, shows that Sangmiré's rite of ditlána, of urban renewal, had been due some sixty-seven years previously, but was put off by a parsimonious governor who found bribing the priesthoods a lower cost than the rebuilding of such a sizable town. Not an uncommon secret to find in a city's history. Béy Sü is some 378 years past due, with no one sure how to even accomplish the task of razing and rebuilding the nation's capital in an orderly fashion, but the delay here is enough to justify action.\n\n\"It is because of such laxity,\" people say, \"that Lord Vimúhla has sent us war, has caused our princes to tear apart our nation. Destruction is inevitable; it must be respected, and if not served in an orderly way, will come nonetheless.\" Sangmiré is made an example of, the people rounded up, their clanhouses burned. The lucky—those with wealth or clan connections—are escorted outside the walls to the military encampment. The unlucky, many of them Sárku worshipers or perceived collaborators within the town, are placed on pyres and likewise burned to the invocations of the All-Cleansing One.\n\nThe luckiest of all, officers and priests charged with the evacuations, \"rescue\" valuables from the houses they patrol before the burning, serving their god and themselves simultaneously, as is only right. You spend that night watching the flames dance above Sangmiré, cupped within the clay walls like a lamp, illuminating the sky and banish the chill of night. Beside you, $!{wave} stares as the reflected light plays over the heavy links of a new silver chain. Your own spoils are already packed away, gems and metal, things that would not have burned in any case, vast riches.\n*achieve pious\n*set wealth +750\n*goto romance\n\n*label fire_data\n*set evidence true\n*page_break\nIt does not take long to find the fig leaf to justify the hungered-for destruction. A document in the Governor's archives, a horoscope for the city, shows that Sangmiré's rite of ditlána, of urban renewal, had been due some sixty-seven years previously, but was put off by a parsimonious governor who found bribing the priesthoods a lower cost than the rebuilding of such a sizable town. Not an uncommon secret to find in a city's history. Béy Sü is some 378 years past due, with no one sure how to even accomplish the task of razing and rebuilding the nation's capital in an orderly fashion, but the delay here is enough to justify action.\n\n\"It is because of such laxity,\" people say, \"that Lord Vimúhla has sent us war, has caused our princes to tear apart our nation. Destruction is inevitable; it must be respected, and if not served in an orderly way, will come nonetheless.\"  Sangmiré is made an example of, the people rounded up, their clanhouses burned. The lucky—those with wealth or clan connections—are escorted outside the walls to the military encampment. The unlucky, many of them enemy soldiers from the Scales of Brown or perceived collaborators within the town, are placed on pyres and likewise burned to the invocations of the All-Cleansing One.\n\nYou say nothing during this, despite how your stomach turns at the pleading cries of your countrymen, but record all: from the looting done before the fires are set to the extortion levied upon those who wish to not burn with their city. Nirún, part of the archival search that turns up the horoscope, manages to save from the flames the list of donations by the Governor to gain blessing for the delay, and the second horoscope shifting the date 122 years into the future. Every malfeasance, every act that shows this to be a retribution and not a renewal, you document and keep hidden. Hidden from your own superiors, who would destroy it; hidden from Dhich'uné's spies, who would use such documents to smear your Prince.  Hidden until the morning when a fast runner, a cousin of Nirún's, is sent to carry word of victory to the northern camp of Prince Mirusíya, and in his diplomatic pouch is tucked your report. You sigh with relief to see it go, and do not speak of it again.\n*goto romance\n\n*label fire_save\n*page_break\nIt does not take long to find the fig leaf to justify the hungered-for destruction. A document in the Governor's archives, a horoscope for the city, shows that Sangmiré's rite of ditlána, of urban renewal, had been due some sixty-seven years previously, but was put off by a parsimonious governor who found bribing the priesthoods a lower cost than the rebuilding of such a sizable town. Not an uncommon secret to find in a city's history. Béy Sü is some 378 years past due, with no one sure how to even accomplish the task of razing and rebuilding the nation's capital in an orderly fashion, but the delay here is enough to justify action.\n\n\"It is because of such laxity,\" people say, \"that Lord Vimúhla has sent us war, has caused our princes to tear apart our nation. Destruction is inevitable; it must be respected, and if not served in an orderly way, will come nonetheless.\"  \n\nWhen the time comes for the razing, and the rich and well-connected are escorted to the military encampment, you meet in a deserted clanhouse with \n*if her_dead = false\n\tKási Nirún, Heréksa Rayána, \n*if her_dead\n\tKási Nirún \nand $!{wave}. Nirún is nervous, but energetic, laying out plans. $!{wave} seems more annoyed than anything \n*if her_dead = false\n\telse, and Rayána is silent with anger. \n*if her_dead\n\telse. \nPlans are made, and you disperse to your duties.  Nirún and a pair of other officers brazenly escort out of the city an entire medium-status clan in exchange for a modest \"bribe.\" When they return at dawn, having escorted them ten miles down the sákbe road by the light of the two full moons, Nirún and his fellow officers will be admonished and forced to turn over their earnings, but such enterprising attempts at pocket-lining are commonplace.\n\nAlong with $!{wave}, you complete a subtler mission. Tasked by the legion with moving from house to house, rounding up those who have escaped the priests' net, you manage to distribute chisels and blades to low-clan captives tied to pyres or boxed in c
