rue\n\t\t\thomeward. \n\t\t*if assassination = 1\n\t\t\tYour cousin was saved, but you had made an enemy that day in the clan of this wastrel. \n\t\t\t*if wave_resolved = false\n\t\t\t\tThe fire-gems that went to cover $!{wave}'s debts were, unbeknownst to you, taken without permission from $!{Villain}'s clan.  Their anger over this loss, \n\t\t\t*if wave_resolved\n\t\t\t\t$!{Villain}'s nameless rest in a communal grave little more than a dumping ground was the talk of parties all season, which shamed ${vilhis} parents deeply.  Anger over this, \n\t\t\tand the loss of face caused by ${vilhis} public death, would not fade.\n\t\t*set noble %-10\n\t\t*if wave_resolved = true\n\t\t\t*goto wave_count\n\t\t*else\n\t\t\t*goto wave_good_news\n*label wave_count\n*temp magic_stat\n*if ritual >10\n\t*set magic_stat \"ritual\"\n*if psychic >10\n\t*set magic_stat \"psychic\"\n\n*temp top_counter\n*temp second_counter\n\n*if com_count > tac_count\n\t*set top_counter \"com_count\"\n\t*set second_counter \"tac_count\"\n\t*goto diplomacy\n*else\n\t*set top_counter \"tac_count\"\n\t*set second_counter \"com_count\"\n\t*goto diplomacy\n*label diplomacy\n*if dip_count > {top_counter}\n\t*set second_counter top_counter\n\t*set top_counter \"dip_count\"\n\t*goto sorcery\n*elseif dip_count > {second_counter}\n\t*set second_counter \"dip_count\"\n\t*goto sorcery\n*else\n\t*label sorcery\n\t*if sor_count > {top_counter}\n\t\t*set second_counter top_counter\n\t\t*set top_counter \"sor_count\"\n\t\t*goto boost_stats\n\t*elseif sor_count > {second_counter}\n\t\t*set second_counter \"sor_count\"\n\t\t*goto boost_stats\n\t*else\n\t\t*goto boost_stats\n\n*label boost_stats\n*if top_counter = \"tac_count\"\n\t*set tactics %+20\n\t*goto second\n*elseif top_counter = \"com_count\"\n\t*set combat %+20\n\t*goto second\n*elseif top_counter = \"dip_count\"\n\t*set diplomacy %+20\n\t*goto second\n*elseif top_counter = \"sor_count\"\n\t*setref magic_stat %+20\n\t*goto second\n\n*label second\n*if second_counter = \"tac_count\"\n\t*set tactics %+15\n\t*goto end\n*elseif second_counter = \"com_count\"\n\t*set combat %+15\n\t*goto end\n*elseif second_counter = \"dip_count\"\n\t*set diplomacy %+15\n\t*goto end\n*elseif second_counter = \"sor_count\"\n\t*setref magic_stat %+15\n\t*goto end\n*label end\n*finish\t", "adolescence2": "\n*temp BladeInHand false \n*temp Dressed_Lines false\n*temp PosseComitatus false\n*temp MagicalAccident false\n*temp dip_count 0\n*temp tac_count 0\n*temp com_count 0\n*temp sor_count 0\n*temp Hotheaded\n*temp her_advice false\n*set Hotheaded false\n*temp MagicalAccident\n*set MagicalAccident false\n*temp BladeInHand\n*set BladeInHand false\n*temp PosseComitatus\n*set PosseComitatus false\n*temp Dressed_Lines\n*set Dressed_Lines false\n*temp magic_fail false\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n[b]Chapter 2: Adult Responsibilities[/b]\n\n[i]$!{Hometown}, Summer to Winter of 2355 A.S.[/i]\n\n\nYour clan-mother Dzái was an honored veteran of the prestigious Legion of ${legion}. She greased your path (and the palms of recruiting officers) so that you would, when your name-day passed, march into the recruiting office of the local Palace of Glorious War and enlist as an officer. The office was bustling with activity in that time of coming conflict; all the legions were pressed for troops, and many young women and men were eager to answer the call to war. \n\nHeart pounding, throat dry, gripping your letter of recommendation, you passed the tables and bronzed standards of competing units and struggled to keep your voice even as you informed the bored recruiting officer of your name, lineage, and clan. Looking up from his seat, a pile of well-worn campaigner's mats, over piles of personnel rolls and enlistment forms, the wrinkled veteran ignored your carefully prepared letter and shouted, \"Ohé, sprout! What makes you think you're good enough to join the ${Legionnum}? Fine young men and women from all the best clans have waited in line all day for the privilege! Why should our glorious legion waste its time on an untried lump of mud like you?\"\n*fake_choice\n\t#I bribed the corrupt old fool the appropriate amount.\n\t\tThe old veteran grinned, pleased at wringing a handful of coins from another wet-behind-the-ears recruit, and stamped your enlistment form with your new rank of heréksa—lieutenant—before passing you on to his sergeants for processing.\n\t\t*set wealth -10\n\t\t*set dip_count +1\n\t#I put him in his place.\n\t\t\"Molkár Dzái ${Lineage} has said so. Do you beg to differ?\"\n\t\t\n\t\tNot easily intimidated, the crusty old soldier just rolled his eyes insolently. \"A high lineage may get you in the door, but will it march and fight for you?\" He stamped your enlistment papers with your new rank of heréksa—lieutenant—and passed you along to his smirking sergeants for processing.\n\t\t*set com_count +1\n\t#I cited Liyuráin of Tsámra.\n\t\t\"A great officer can build strong earthworks from soft mud.\"\n\t\t\n\t\t\"Ohé, men, Molkár Dzái said her brat was studious!\" the old soldier replied with good humor.  He handed your enlistment papers to you stamped with your new rank of heréksa—lieutenant. His sergeants nodded to you with respect as they took you away for processing.\n\t\t*set tac_count +1\n\t*if (ritual>10) or (psychic >10)\n\t\t#With a flick of my hand, I lifted his papers and ink into the air, raising an eyebrow.\n\t\t\tWith visible effort to restrain his astonishment, the old soldier grumbled something about \"merely a test\" and handed you your enlistment papers, stamped with your new rank of heréksa—lieutenant. He then motioned to his shaken sergeants to take you away for processing.\n\t\t\t*set sor_count +1\n*comment endif\n\nNothing in the sheltered life of a young noble had prepared you for the exhaustion and humiliation of legionary training. Never before had social inferiors dared to shout at and insult you. Nothing you did was ever good enough, the hours were long, and the food was terrible. You were not even permitted body-slaves to dress you and clean your equipment! Your days were filled with endless marching as sergeants beat the complex formations and trumpet calls required of Tsolyáni infantry into your young skull—sometimes literally. Still, you cannot look back on those first days but with some nostalgia….\n*fake_choice\n\t#I followed orders and did my best to bring honor to Mama Dzái's name.\n\t\tYour clan-mother expected no less of you. Your drill sergeants showed you grudging respect, and your fellow recruits learned to follow your example.\n\t\t*set dutiful %+10\n\t\t*if Clan = \"Red Sun\"\n\t\t\t*set Noble %+10\n\t#I used wit, charm, and the expected \"inducements\" to win promotion quickly.\n\t\t*set Dutiful %-10\n\t\t*if (Clan = \"Sea Blue\")\n\t\t\t*set Noble %+10\n\t\tThe system worked! Eager to escape the discomfort and indignity of training, young officers like yourself have always applied themselves to climbing the ladder of rank.\n\t\t*if Diplomacy >50\n\t\t\tYour social graces and family connections resulted in cushy assignments and better food, and you soon became the envy of your fellow recruits.\n\t\t*if Diplomacy \u003c=50\n\t\t\tAlas, you were only one of many, and others were wittier, more charming, or simply richer. Training was truly a struggle, but you emerged stronger for the tempering.\n\t#I was determined to lead a life of pleasure and joy.\n\t\tOne's Skein of Destiny should contain as many golden threads as one can convince the Weaver to include, né? You may have absorbed little of formations and drills and command phrases, but you certainly left a trail of broken hearts, empty purses, and legendary hangovers in your wake.\n\t\t*if God = \"Dlamélish\"\n\t\t\t*set Noble %+10\n\t\t*if Clan = \"Red Sun\"\n\t\t\t*set Noble %-20\n*comment endif\n\n*label Wargame\nNear the end of your training, you were chosen for a signal honor: to join your superior officers on the command stand during a qadárni—a \"little war,\" or live-weaponry exercise—against another legion. Kási Núromen hiCháika welcomed you grandly, bestowing his august favor upon your youthful self, despite the fact that he was only six months older. A scion of the royal hiCháika lineage of \n*if Clan != \"Sea Blue\"\n\tthe ancient Clan of Sea Blue, \n*if Clan = \"Sea Blue\"\n\tyour own Clan of Sea Blue, \nhe held such lofty status that it besmirched his personal honor to speak freely with the \"common\" soldiers. He would rely upon younger adjutants like you, from less lofty \n*if Clan != \"Sea Blue\"\n\tclans, \n*if Clan = \"Sea Blue\"\n\tlineages, \nto communicate his orders to the troops in all but the direst of emergencies. \n*if Clan = \"Sea Blue\"\n\tDespite your shared clan, the captain's refined lineage outranked your own, and it seemed he would not easily let you forget it. \n*if Clan !=\"Sea Blue\"\n\tDespite the noble status of your own clan, the Sea Blue towered over all but the imperial clan, Tlakotáni, and you knew the captain would not easily let you forget it. \n*page_break\nKási Núromen was reading that morning from a well-lacquered scroll held up for his pleasure by his preadolescent valet, a painfully eager low-clan cobbler's daughter named Rayána. For your benefit he translated, with great erudition, into modern Tsolyáni the ten-thousand-year-old wisdom of the great Ssamirén of Khéiris on the necessity of daily drill to turn civilians into soldiers. You could not help but notice that little Rayána was mumbling along under her breath!\n*set met_her true\n*fake_choice\n\t#Astonished at her cheek, I reprimanded her on his behalf.\n\t\t*set her_rep -1\n\t\t*set Noble %+10\n\t\tThe Kási raised an eyebrow and placed his finger on the scroll to mark his spot. Rayána fell silent and stared down at the planks of the command platform. \"I have chosen to enlighten young Rayána with the wisdom of our ancestors. Despite her common blood, as my servant, I require her to be good conversation as she cleans my kit and prepares my food. We of noble family have an obligation to serve as examples to the lesser orders. Your diligence in enforcing respect among the troops is, of course, noted.\" He then resumed his oration, unperturbed.\n\t#I politely inquired of my Kási how she had learned the verses.\n\t\t*set her_rep +1\n\t\tYour Kási marked his place on the scroll with his finger and smiled. \"Ah, yes, young Rayána has applied herself most studiously to the writings of the great masters. Although only a servant from a poor clan of…leatherworkers, was it? Nevertheless, she is eager to learn the virtues of the strategist and the tactician. We of noble clans have an obligation to serve as examples to the lesser orders, Heréksa.\" Pleased with your etiquette, he resumed his oration.\n\t#I disregarded the eccentricities of my new superior.\n\t\t*set dutiful %+10\n\t\tIt became clear to you that little Rayána had memorized entire verses of the works of Master Ssamirén, and that Kási Núromen had not only permitted but encouraged this. He clearly placed a nearly religious importance on the great books of ancient strategy and was something of an evangelist for these \"scriptures\" as a result.\n\n*page_break\nThe green troops fell into their formations with eagerness if not skill. Kási Núromen conveyed his orders to you through a combination of code words and hand signals, and you in turn passed them to signalers with trumpets, and to runners who bore them down from the command platform, and to the arrayed ranks of your infantry. Although this was only an exercise against another of the Petal Throne's units, you and your fellow recruits were anxious to bring glory to the centuries-great name of the Legion of ${legion}. During the exercise, Kási Núromen unexpectedly turned to you and stated, \"General Girigá appears to have chosen the \"Claws of the Kruá (crab)\" gambit, hoping to outflank us on both sides. Tell me, Heréksa, how would the masters tell us to respond?\"\n\n*label Choose_Strategy\n*choice\n\t*selectable_if (her_advice = false) #I ingratiatingly assured him that I was there to learn from his example.\n\t\t*set Dutiful %+10\n\t\t*if Diplomacy >55\n\t\t\tDespite your refusal to answer a direct question, Kási Núromen found your flattery (and modesty) appropriate. \"You are wise to recognize your own youth and inexperience; it mirrors the inexperience of our newest cohorts. To rely on the wisdom of your elders and the masters is noble for one so new to the art of war.\" Together you observed your General's refusal to respond to Lord Girigá's ambitious but ultimately over-extended maneuver. The ${Legionnum} carried the day, and you and your troops, although exhausted, swelled with pride.\n\t\t\t*set Wargame_victor true\n\t\t\t*goto Wargame_victory\n\t\t*else\n\t\t\t*if her_rep > 0\n\t\t\t\tLittle Rayána, who stood by with a pitcher of cool chumétl for Kási Núromen, suddenly dropped it. Blushing, she stooped to gather up the pottery shards, loudly begging pardon for her clumsiness. In the midst of this performance, she whispered harshly from the side of her mouth, \"Hold fast!\" giving you a bold grin and a wink.\n\t\t\t\t*set her_advice true\n\t\t\t\t*goto Choose_Strategy\n\t\t\t*else\n\t\t\t\t\"We are not discussing the classics of literature over másh brandy, Heréksa! As your commanding officer, I expect and demand the benefit of your tactical skills at all times!\" The Kási made a gesture of dismissal. \"Chá! Perhaps a few more weeks of formation drills will increase your familiarity with the essentials of command!\" \n\t\t\t\t\n\t\t\t\tThe ${Legionnum} won a victory that day, but from your place of dishonor in command of punishment detail, it was difficult to share your fellows' sense of triumph, barred as you were from the parades and celebrations.\n\t\t\t\t*set status %-10\n\t\t\t\t*goto Winemakers\n\t*selectable_if ((Tactics \u003c65) and (her_advice = false)) #I suggested Sa'álur of Jakálla's \"Embrace of Nayári\" to penetrate the enemy center.\n\t\t*if her_rep > 0\n\t\t\tLittle Rayána, who stood by with a pitcher of cool chumétl for Kási Núromen, suddenly dropped it. Blushing, she stooped to gather up the pottery shards, loudly begging pardon for her clumsiness. In the midst of this performance, she whispered harshly from the side of her mouth, \"Hold fast!\" giving you a bold grin and a wink.\n\t\t\t*set her_advice true\n\t\t\t*goto Choose_Strategy\n\t\t*else\n\t\t\t\"A bit late to attempt to take their center when their strongest units have already begun to spread around our flanks. Perhaps a closer reading of Sa'álur would benefit you.\" Kási Núromen turned back to watch the battle unfold, secure in his superior knowledge of the writings of the great masters of war. Somewhat chastened, you still swelled with pride when your legion was judged the victor in the exercise. Your Kási, however, was still miffed, and you were ordered to forgo the victory celebration in favor of further study alone in the barracks.\n\t\t\t*goto wargame_victory\n\t*selectable_if ((Tactics \u003c70) and (her_advice = false)) #I suggested the Crystal Square to defend our troops from the attempted outflanking.\n\t\t*if her_rep > 0\n\t\t\tLittle Rayána, who stood by with a pitcher of cool chumétl for Kási Núromen, suddenly dropped it. Blushing, she stooped to gather up the pottery shards, loudly begging pardon for her clumsiness. In the midst of this performance, she whispered harshly from the side of her mouth, \"Hold fast!\" giving you a bold grin and a wink.\n\t\t\t*set her_advice true\n\t\t\t*goto Choose_Strategy\n\t\t*else\n\t\t\t\"Surrender all initiative to a less-trained force? Collapse our lines and only defend? Lord Sa'álur would not recommend such a tactic in an open-field battle with no hard point to defend.\" Kási Núromen turned back to watch the battle unfold, secure in his superior knowledge of the writings of the great masters of war.   Somewhat chastened, you still swelled with pride when your legion was judged the victor in the exercise. Your Kási, however, was still miffed, and you were ordered to forgo the victory celebration in favor of further study alone in the barracks.\n\t\t\t*goto wargame_victory\n\t*if ((Tactics >=70) or (her_advice = true))\n\t\t#\"Let them break their claws against our strength.\"\n\t\t\t*set Wargame_victor true\n\t\t\tKási Núromen nodded in approval. \"Well spotted, Heréksa. Lord Ssamirén advises us that a love of clever stratagems is a weakness in an unschooled commander. Lord Girigá seems to have skipped that verse. It is well that you did not.\" Pleased with your command of the classics, the Kási allowed you to stand just below him on the platform to observe your legion's victory over the enemy's over-extended \n\t\t\t*if her_advice\n\t\t\t\tformation while little Rayána beamed in secret victory.\n\t\t\t*if her_advice = false\n\t\t\t\tformation.\n\t\t\t*goto Wargame_victory\n\t*if Psychic >=10\n\t\t#I risked reading the captain's mind to determine which answer he wanted to hear.\n\t\t\t*set sor_count +1\n\t\t\t*set Dutiful %-10\n\t\t\t*if ((God = \"Hrü'ü\") or (God = \"Dlamélish\"))\n\t\t\t\t*set Noble %+10\n\t\t\t*if ((God != \"Hrü'ü\") and (God != \"Dlamélish\"))\n\t\t\t\t*set Noble %-10\n\t\t\t*if Psychic >= 40\n\t\t\t\t*set Wargame_victor true\n\t\t\t\tYou read in Kási Núromen's mind the desire to trick you into choosing an elaborate maneuver when, in fact, the battle was already won. \"Our troops are superior to the opposing force,\" you stated calmly. \"Let them break their claws against our strength; we will then sweep their remains from the field.\" Kási Núromen nodded in approval at your echo of his own opinion. \"Well spotted, Heréksa. Lord Ssamirén advises us that a love of clever stratagems is a weakness in an unschooled commander. Lord Girigá seems to have skipped that verse. It is well that you did not.\" Pleased with your command of the classics, the Kási allowed you to stand just below him on the platform to observe your legion's victory over the enemy's over-extended formation. You managed to hide your self-satisfied smirk until you were certain he was not looking.\n\t\t\t\t*goto Wargame_victory\n\t\t\t*if Psychic \u003c 40\n\t\t\t\tKási Núromen, as an educated soldier from the highest of Tsolyánu's royal clans, had experienced sorcery before. Your feeble probe merely alerted him to your attempt to read his mind. His eyes narrowed and his voice became fierce and cold. \n\t\t\t\t\n\t\t\t\t\"Heréksa! You will report to punishment detail at once! As your commanding officer, I expect and demand that you behave in accordance with noble action—and I will [i]not[/i] be subject to sorcerous prying! Have you spent so much time on musty scrolls of sorcery and so little with the works of the ancient masters of war-craft? This is base cheating and borders upon assault of a superior officer! For your mother's sake I shall not bring you up before an imperial court, this time!\" \n\t\t\t\t\n\t\t\t\tThe Kási made a gesture of dismissal. \"Chá! Perhaps a few more weeks of formation drills will increase your familiarity with the essentials of command!\" The ${Legionnum} won a victory that day, but from your place of dishonor in command of punishment detail, it was difficult to share your fellows' sense of triumph, barred as you were from the parades and celebrations.\n\t\t\t\t*set status %-10\n\t\t\t\t*goto Winemakers\n*label Wargame_victory\n*page_break\nThe Legion of ${legion} enjoyed a well-deserved celebration in its \n*if wargame_victor\n\t*set status %+10\n\tcamp. Prostitutes of all sexes and inclinations, wine and \"powders,\" and whole roasted hmá sheep all were generously provided by your proud General, $!{General}. What is more, your legion was to have pride of place in the local celebration of the Might of Heroes, a parade of soldiers honoring Lord Karakán, God of Glorious War. \n*if wargame_victor = false\n\tcamp, the faint echoes of which made it hard to concentrate on your solitary study.  When word came the next day that your legion was to have pride of place in the local celebration of the Might of Heroes, a parade of soldiers honoring Lord Karakán, God of Glorious War, you were relieved to be informed you would be allowed to march.\n*comment endif\n\nYou spent several days making certain your ceremonial armor and weapons were painted and polished, and when the day of the parade came, despite the heat, the dust, and the many miles of marching required, you were as happy as you could ever remember. Your entire clan gave a mighty shout of \"Otuléngba!\" as your unit marched past the clanhouse, and in that instant you felt as mighty as Lord Karakán himself.\n*page_break\nRumor and gossip had not prepared you for the ultimate honor of that day. The imperial heir whom your clan supported, the \n*if PrinceName = \"Ma'ín\"\n\tfamously beautiful and cultured Princess Ma'ín Kruthái, \"the Exquisite,\" \n*if PrinceName = \"Rereshqála\"\n\tfamous wit and patron of the arts, Prince Rereshqála of Jakálla, \n*if PrinceName = \"Mirusíya\"\n\tnewly revealed soldier and statesman, Prince Mirusíya, chosen of the Flame Lord, \nwaited, borne up on a golden palanquin by hundreds of slaves, personally to cast eyes over your legion in the great square of $!{Hometown} and cast blessings upon you as you marched by. Several of your comrades, stunned by the singular experience of marching for the pleasure of a scion of the Petal Throne, actually swooned when they recognized the Imperial Seal upon the massive, many-tiered palanquin, and the colors and badges of their imperial heir. You were made of sterner stuff, however…weren't you?\n*choice\n\t#I worshipped the great $!{Prince} from afar.\n\t\t*set dutiful %+10\n\t\t*set noble %+10\n\t\t*if change = false\n\t\t\t*set noble %+10\n\t\tYour fellow officers, in years to come, grew very familiar with the treasured story of how you personally received the blessing of an imperial heir in the halcyon days before the civil war.  As you marched past the vast palanquin, \n\t\t*if clan = \"White Stone\"\n\t\t\tPrincess Ma'ín beamed at you, flanked on either side by priests and priestesses of the two goddesses, who tossed blossoms and silver coins to the soldiers.  You caught a coin midair, and still wear it as a pendant to this day.\n\t\t*if clan = \"Sea Blue\"\n\t\t\tPrince Rereshqála reclined, watching with a smiling mouth and calculating eyes.  Despite his reputation as somewhat effete, he was a massively strong man whose presence radiated authority.\n\t\t*if clan = \"Red Sun\"\n\t\t\tPrince Mirusíya stood at a stiff attention in well worn-armor, arm held out in a salute.  It wasn't so long ago that he was a kási like yourself, his imperial parentage unknown.\n\t\t*goto Winemakers\n\t#I talked up my clan's connection to the $!{Prince} to boost my own cachet.\n\t\t*set Dutiful %-10\n\t\t*if change\n\t\t\tTruly you had learned the lessons of personal aggrandizement well. \n\t\t\t*set Noble %+10\n\t\t*if change = false\n\t\t\tWeak-kneed worship at the feet of the mighty, like some schoolchild swooning over a famous gladiator at the hirilákte arena, was not for you.\n\t\tThe glory of the $!{Prince} reflected also upon those clans who enjoyed the favor of the heir. Word of your connections helped bring promotions to your status, friends to your table, and dazzled, if ambitious, lovers to your bedroll.\n\t\t*goto Winemakers\n\t#I determined to meet the great $!{Prince} at the celebration, using my clan's connections to sweep me into the imperial presence.\n\t\t*set Dutiful %-20\n\t\t*if (Diplomacy > 55) or ((diplomacy >50) and (wargame_victor))\n\t\t\tYour wit and charm persuaded your clan elders to grant you a place in the deputation to pay homage to $!{Prince} $!{PrinceName}. You summoned from your school memories the proper forms of address for an imperial heir, which you'd never believed you would have the chance to use, and practiced your speech of praise until even you were bored with the repetition.\n\t\t\t*goto Prince_Meeting\n\t\t*elseif (Tactics > 55) or ((Tactics >50) and (wargame_victor))\n\t\t\tCalling in every favor you could muster, you arrayed your allies and mentors within the clan until the council of elders could not but choose to include you in the clan's deputation of honor to $!{Prince} $!{PrinceName}. The borrowed glory of your clan and your legion were the sword and shield which allowed you to cut a swathe through the ranks of sycophants and bureaucrats surrounding the imperial heir.\n\t\t\t*goto Prince_Meeting\n\t\t*else\n\t\t\tAlas for your lofty ambitions, you were but one of hundreds of eager officers, bureaucrats, scholars, musicians, artists, poets, merchants, and sorcerers seeking to steal a little reflected glory from the bright sun of the imperial heir. Despite your arguments and pleas, others were better placed to seize the opportunity. You consoled your hurt pride at the victory celebration with your troops instead.\n\t\t\t*goto Winemakers\n*label Prince_Meeting\n*set Meet_Prince true\n*page_break\n*achieve heir\n*if PrinceName = \"Mirusíya\"\n\t*goto Meet_Mirusiya\n*if PrinceName = \"Rereshqála\"\n\t*goto Meet_Rereshqala\n*else\n\t*goto Meet_Ma'in\n\n*label Meet_Mirusiya\nPrince Mirusíya, alone among the Glorious Emperor's then-current acknowledged heirs, was not born into the imperial clan, Tlakotáni. He was raised in secret in his mother's clan, the ancient, haughty Vríddi of desert-bound Fasíltum, City of the Chiming Skulls. He lived as an ordinary soldier, learning tactics and diplomacy, before the Vríddi revealed his lineage and threw their influence behind his campaign for the imperial throne. While his entourage was filled with the expected bureaucrats, scholars, sorcerous bodyguards, and handmaidens, it also bore the indelible stamp of the experienced campaigner. \n\nHis vast many-roomed palanquin, usually borne by hundreds of strong slaves, was laid down on a defensible hill and surrounded by earthworks and a defensive perimeter created by his crack personal troops. He surrounded himself with his so-called \"New Men,\" officers promoted from the ranks of legions allied to his cause, not only for their noble blood but also for their competence, regardless of any personal impoverishment in wealth or family connections.\n*page_break\nYou were brought into the Imperial Prince's glorious presence.  You caught only a glimpse of his aquiline nose and elaborate headdress before you genuflected, pressing your face to the beautifully woven flame-orange carpets which surrounded his high seat. Your name was chanted ceremonially by a young priestess of the Temple of the Flame Lord, Vimúhla, the patron god of the Vríddi and of Prince Mirusíya. You felt psychic fingers rummage through your mind, searching for hidden disloyalty or treasonous intent. How did you respond to the august personage?\n*choice\n\t#I rose to my knees in stoical silence, awaiting his pleasure.\n\t\t*set Noble %+10\n\t\tPrince Mirusíya seemed distracted, reading from a lengthy scroll while inspecting his many visitors and receiving whispered counsel from multiple advisers, but he responded to the reading of your name by glancing up and searching your face for a moment.\n\n\t\t*if Wargame_victor = true\n\t\t\t\"The young Heréksa who was so perceptive on the command platform during the qadárni.\" He appraised you at more length. \"The Empire will have need of officers like you in the days to come. War with Yán Kór is inevitable. Continue to serve the Throne in honor! The Flame Lord and my great and ever-glorious imperial father, may Lord Hnálla continue to bless him, would expect no less of a scion of the Clan of $!{Clan}.\" \n\t\t\t\n\t\t\tThe scribes recorded the Imperial Prince's words and the name of the one so honored. You cannot, to this day, remember much else that transpired that night, so borne up on mighty waves of pride and astonishment as you were.\n\t\t\t*set status %+10\n\t\t\t*goto Winemakers\n\t\t*elseif noble >50\n\t\t\t\"Young Heréksa, my staff tell me you have served with distinction.\" He appraised you at more length. \"The Empire will have need of such loyalty in the days to come. War with Yán Kór is inevitable. The Flame Lord expects courage and obedience of all soldiers.\" \n\t\t\t\n\t\t\tThe scribes recorded the Imperial Prince's words and the name of the one so honored. You cannot, to this day, remember much else that transpired that night, as borne up on mighty waves of pride and astonishment as you were.\n\t\t\t*set status %+10\n\t\t\t*goto Winemakers\n\t\t*else\n\t\t\t\"Soldier!\" he intoned. \"Know that the Flame Lord, and my great and glorious imperial father, may Lord Hnálla continue to bless him, demand loyal service from all who bear arms in the name of the Mighty Seal of the Imperium. Princes and generals, captains and sergeants, down to the least trooper guarding a village gate—all are as slaves to the will of the Petal Throne. Fight with steadfast courage in the finest tradition of the Legion of ${legion}.\" \n\t\t\t \n\t\t\tHe turned away as the scribes recorded the Imperial Prince's words of wisdom. Your resolve to cover the name of your legion in glory was only redoubled on that night.\n\t\t\t*goto Winemakers\n\t#I bellowed \"Otuléngba! All Hail!\" striking my chest in a military salute.\n\t\tThe mighty Prince glanced up from the lengthy scroll he was reading with a smile of genuine pleasure. \"The true wealth of our great and glorious Empire is in the loyalty and strength of our soldiers! You honor me and my mighty imperial father, may Lord Hnálla continue to bless him. Stand, young Heréksa, and know that you have brought joy to my heart this night.\" \n\t\t\n\t\tThe scribes recorded the Imperial Prince's words and the name of the one so honored. You cannot, to this day, remember much else that transpired that night; the wine of celebration, pride, and the congratulations of your clan and troops blur your recollection.\n\t\t*goto Winemakers\n\t#I dared to speak, \"Mighty Prince, might you honor your unworthy servant's loyal troops with a personal inspection?\"\n\t\t*set Dutiful %-20\n\t\t*set Noble %-20\n\t\t*if diplomacy > 55\n\t\t\tThe court gasped at such bald-faced effrontery as to speak without permission to an imperial heir, but Prince Mirusíya did not always stand upon formality with his troops. \"Heréksa, I am pleased to inspect your troops. The Flame Lord, and my great and glorious imperial father, may Lord Hnálla continue to bless him, demand constant vigilance from all who bear arms in the name of the Mighty Seal of the Imperium. The troops must be ever-ready to march into glory and death, and the officers must ensure their preparedness.\" \n\t\t\t\n\t\t\tYour bold gambit paid off, and your fellow officers knew it was you they had to thank for the surge in the troops' morale after they received the personal blessing of the mighty Prince.\n\t\t\t*set status %+25\n\t\t\t*goto Winemakers\n\t\t*else\n\t\t\tThe Prince's court fell silent for a moment at the naked impertinence of one so lowly as you speaking to an imperial heir without leave. Prince Mirusíya, though, did not always stand upon formality with his loyal troops and, as the silence grew, clearly took pity on you.  \"It is noble that you have such care for those under your command.\"  He turned back to his paperwork as if the slight had never happened, and the audience continued.\n\t\t\t\n\t\t\tSadly, your superiors were less charitable and you spent the next few weeks on punishment detail, drilling the troops who had earned similar disgrace in military etiquette (among other painfully repetitive subjects).\n\t\t\t*set status %-15\n\t\t\t*goto Winemakers\n\t*if (orientation = \"straightf\") or (orientation = \"gay\")\n\t\t#I rose to my knees in the most seductive fashion, brazenly making eye contact with the handsome Prince.\n\t\t\tMighty Prince Mirusíya was considered near to the epitome of Tsolyáni male beauty even before his exalted rank was revealed. His aquiline nose, wide brow, muscular figure, and glossy black hair marked him as one of noble blood and soldierly virtue. Alas for your youthful infatuation, he was not given to fraternizing with his troops, knowing too well the degradative effect that playing favorites could have on his command structure. Your boldness earned you a brief smile, which you like to believe was not without a certain wistful regret. \"We are, all of us, Heréksa, slaves to duty and the Petal Throne,\" intoned the Mighty Prince. \"Let your body be ever a weapon in the arsenal of imperial victory!\" \n\t\t\t\n\t\t\tYou walked on clouds for the rest of the night, and your dreams were of the Prince's flashing eyes.\n\t\t\t*goto Winemakers\n\n*label Meet_Rereshqala\n*set status %+10\nPrince Rereshqála was the eldest of mighty Emperor Hirkáne's acknowledged heirs, and like his imperial father, was a devotee of the Temple of Hnálla, Lord of Light and Supreme Principle of Stability. He was raised in his mother's clan—your clan—the venerable and royal Sea Blue, who were kings of the Bednálljans more than 15,000 years before the first Tlakotáni founded the modern Tsolyáni Imperium. Despite this peerless lineage and the finest education, many discounted the Prince in those days of your youth. They believed his fondness for the ancient pleasure-city of Jakálla, and the erotic delights of the temples of its patron goddesses, the wicked Green Ladies, had rendered him soft and decadent.\n*page_break\nThat warm and lazy night at a glittering villa, Prince Rereshqála was, as usual, surrounded by the best and brightest of the Empire's aristocracy. Sprawling languidly on richly woven mats on the highest dais in the feast hall, just beneath the gilded replica of the Great Seal of the Imperium, he entertained the breathless crowd with devastating sallies of wit at the expense of his rivals, while gorgeous slaves oiled his remarkable physique. \"And brother Dhich'uné,\" he drawled, naming the brother who was to become the fanatic Usurper, \"what does he root after in those frigid catacombs beloved of the undead? One does try to understand his frothing sermons on the glories of the Worm Lord, but I must confess, after only a few lines I fear it is I who require bodily resurrection, so sluggishly beats my heart from boredom!\" The mocking laughter of the nobles greeted the Prince's public and nearly sacrilegious jape at his imperial brother's expense.\n\nHow did you while away the hours in the presence of the brightest young things of the imperial aristocracy that night?\n*choice\n\t#I pursued new alliances among the best people of the Empire, to serve my ambitions.\n\t\t*set Dutiful %-10\n\t\t*set dip_count +1\n\t\t*if God = \"Hrü'ü\"\n\t\t\t*set noble %+10\n\t\t\tIn the inchoate chaos of this ephemeral life, the superior mind recognizes that all is striving and self-interest is the only guiding principle. So teach the catechisms of Lord Hrü'ü, Supreme Principle of Change and Master of the Darkness. You applied his lessons well that night, and some of those connections still benefit your career to this day.\n\t\t\t*goto Puppetry\n\t\t*else\n\t\t\tThe ladder of ambition is steadied by one's friends and rocked by one's rivals, and a wise soul always knows one from the other. You saw and were seen, and made promises of undying friendship and mutual benefit. Some of the alliances won that night still serve your purposes today. The evening was a pleasurable success and you returned to the barracks well-satisfied.\n\t\t\t*goto Winemakers\n\t#I drank, gambled, and consorted with bright and beautiful lovers.\n\t\t*set dutiful %-10\n\t\t*set dip_count +1\n\t\tWhen in Jakálla, do as the Jakállans do, né? Prince Rereshqála's parties were justifiably famous for their elegance, extravagance, and excess. You fully enjoyed all three, although truthfully you have difficulty remembering most of the details—although memories of the hangover the next morning, not to mention the beauty of the several persons with whom you awoke, remain with you still.\n\t\t*if noble >60\n\t\t\t*goto Puppetry\n\t\t*else\n\t\t\t*goto Winemakers\n\t#I gathered information about the upcoming war with the northern invaders from Yán Kór.\n\t\t*set dutiful %+10\n\t\t*set tac_count +1\n\t\t*if God = \"Hnálla\"\n\t\t\t*set noble %+10\n\t\t\tThe Lord of Light and Supreme Principle of Stability Hnálla instructs his worshippers always to serve the state, eschewing mere pleasure for the greater satisfaction of duty. You remembered your catechisms well that night. Although many of the scions of the high clans feigned boredom with matters of war-craft, there were undercurrents both of fear of a victorious invasion by the northerners and of greed for the lands to be won in a successful counterinvasion of northern lands. Sufficient of Prince Rereshqála's hangers-on shared your concerns that you learned much of their plans to build new legions, not to mention the logistics of recruitment and provisioning required.\n\t\t\t*goto Puppetry\n\t\t*else\n\t\t\tMost of Prince Rereshqála's followers were uninterested in war-craft. However, some realized that a victory against the northern invaders might lead to the seizing of lands, and to new fiefs for those ancient clans whose patents of nobility predated the independence of Yán Kór and the north. Sufficient of the wealthy lords and ladies desired to pursue plunder and conquest that your opinions—and connections—were in demand that night, and the conversations taught you much about recruitment, provisioning, and the bureaucratic maneuvering required to raise new legions. You returned to the barracks pleased with your efforts and plotting your successful rise through the ranks of the imperial military.\n\t\t\t*goto Winemakers\n\n*label Puppetry\n\nAs the night progressed and you secured allies—or tools—among the rich and powerful, you found yourself mildly drunk on very expensive másh brandy, desultorily listening to the playing of tenturén in a dimly lit alcove. While one musician plucked at the strings, another provided the fingering, and together they produced a sweet song.  Two embracing lovers whispered sweet nothings and giggled. You could not help but overhear them, and despite their tone their words were most unusual. \n\n\"We know his damned lich-priest has met with Yán Koryáni agents in the catacombs,\" cooed the girl, nuzzling her beau's neck. \"But we can prove nothing, and they can claim they were assessing the enemy,\" chuckled her swain.\n\nObviously, they were agents discussing matters of espionage! How did you proceed?\n*choice\n\t#I noisily cleared my throat to make my presence known.\n\t\t*set dutiful %+10\n\t\t*if God = \"Hnálla\"\n\t\t\t*set noble %+10\n\t\t*if God = \"Hrü'ü\"\n\t\t\t*set noble %-10\n\t\tThe \"lovers\" ceased their hushed whispering at once. The woman made a show of blushing and murmured an apology, while the man collected himself and made eye contact. \"How straightforward you are, Heréksa,\" he drawled. You recognized the face and the voice.  Prince Rereshqála! \"Sea Blue has trained you well in courtesy.\" By his coolly assessing expression, you were uncertain whether you had passed or failed some kind of test. \n\t\t\n\t\tHe turned to his beautiful companion, a scholar-priestess of Ksárul, the Lord of Secrets. \"Let us retire to somewhere more private, Kalusü, to continue our entertainment.\" Without a backward glance, the Prince strode from the room, ignoring your attempts at etiquette. Several athletic young men and women also manifested from the shadows of the alcove to follow the pair. Bewildered, you stumbled away to rejoin the party.  As you struggled to sleep on your mat back in the barracks later that night, you still pondered what, exactly, the Prince had intended by his actions.\n\t\t*goto Winemakers\n\t#I continued to listen quietly, gathering useful information.\n\t\t*set dutiful %-10\n\t\t*if God = \"Hrü'ü\"\n\t\t\t*set Noble %+10\n\t\t*if God = \"Hnálla\"\n\t\t\t*set noble %-10\n\t\tThe two continued their conversation, conveying by their whispers and body language the image of drunk and amorous youths, while exchanging intelligence over some great lord or magnate who was engaged in treasonous meetings with the northern invaders. \"They seek lost weapons of the ancients, but whether to augment the Ebon Cube of the Yán Koryáni or to somehow block its power, or for some other purpose entirely, we cannot yet discern,\" hissed the woman. \n\t\t\n\t\t\"His role as a scholar-priest allows him to pretend that his interest in such things is only to the good of the Empire,\" replied the man. \"Maintain observation, Kalusü,\" he continued, and much to your surprise concluded with \"much as our young Heréksa has done so surreptitiously.\"\n\t\t\n\t\tAs he stood to leave the alcove, his assessing gaze fell upon you.  Prince Rereshqála! Ignoring your attempts at polite obeisance, he strode away, followed by several athletic young men and women who manifested from the shadows of the alcove, leaving you pondering, that night and for many afterwards, what, exactly, he had intended by his actions.\n\t\t*goto Winemakers\n\t#I joined in the conversation!\n\t\t\"Open meetings with agents of northern aggression can now be dismissed as 'assessing the enemy?'\" you asked archly. \n\t\t\n\t\tThe two \"lovers,\" their charade exposed, turned to you coolly. The woman, quite beautiful and dressed as a scholar-priestess of Ksárul, Lord of Secrets, fidgeted with her hair ornaments, but the man made a brief gesture of dismissal. \"It seems the Heréksa is bolder than most, Kalusü,\" he drawled, assessing you coolly. You recognized him.  Prince Rereshqála! \n\t\t\n\t\tTo you he offered, \"Those whom the Empire has elevated to great rank need not answer inquiries as to their meetings,\" he paused, raising an eyebrow, \"unless and until concrete evidence is acquired.\" He stood and strode from the alcove, ignoring your attempts at polite display, followed by the priestess and several athletic young men and women who manifested from the shadows of the alcove. You left the party in the wee hours of the morning, pondering what, exactly, the Prince had intended by his actions.\n\t\t*goto Winemakers\n\n*label Meet_Ma'in\nThe Princess Ma'ín was justifiably famous throughout the Five Empires for her great beauty. She was equally adored by her loyal followers, however, for her patronage of art and culture. A worshipper of Lady Avánthe, the Wise Mother of Devotion, in her youth, she converted to the Temple of Dlamélish, the Green-Eyed Lady of Fleshly Joys, as an adult. She surrounded herself with the finest musicians, poets, perfumers, sculptors, and epic-singers, and lavished her ample imperial allowance on feasts to showcase their accomplishments. The celebration in her honor that night was a perfectly orchestrated symphony of pleasure, all elements of sight, sound, smell, texture, and taste blended harmoniously to celebrate the human capacity for aesthetic appreciation. You recall the night with wonder and satisfaction as a glittering strand woven into your Skein of Destiny by the Weaver of Fate.\n*page_break\nThe Princess, radiant in her beauty, reclined on the highest dais in the feast hall, immediately beneath the place of honor reserved for the gilded replica of the mighty Seal of the Imperium. Gorgeous servants of both sexes plied her with heady liquors, rare candied fruits, and spiced tidbits of game birds. Brought before her in the most elaborate finery your clan could arrange for you, you bore a single lavish gift, chosen with the advice of the council of elders of the $!{Clan} clan.\nWhat gift had you chosen to present to Princess Ma'ín that night?\n*choice\n\t#A mirror festooned with emeralds, the better to reflect the Princess's eternal beauty.\n\t\t*set dip_count +1\n\t\tYour gift was inspected briefly by the Princess's bodyguards, then placed in her hand by a fawning slave. She contemplated her left and right profiles, then honored you with a glorious smile. \"You have provided me with a perfect gift, Heréksa. Herein may I contemplate my own loveliness, a gift of the Goddess, in Her favored materials, silver and emerald. But more, I may reflect upon myself,\" (the court tittered obediently at the imperial pun), \"and contemplate those imperfections against which I must always strive.\" \n\t\t\n\t\tShe made a motion. \"Let this soldier be rewarded. Assign to ${PCHim} three of our personal body-slaves, who may instruct ${PCHim} in the arts of pleasure, that ${PCHe} might always be reminded of the joy ${PCHe} has brought me this night.\" Such an extravagant gift was an astonishing honor for one so relatively lowly as yourself, and the three beautiful and accomplished slaves grace your clanhouse still, maintained in imperial luxury as former possessions of the Princess. Your clan elders display them at every feast, and your name is thus praised frequently for the adroitness of your choice that glittering night.\n\t\t*set status %+20\n\t\t*goto Winemakers\n\t#An ancient Engsvanyáli text on the courtly arts, the Book of the Eternal Moment.\n\t\t*set tac_count +1\n\t\tThe Princess's sorcerous bodyguards, psychics, and ritualists from the Temple of Lady Dlamélish, inspected the gift with great reverence before kneeling before her to present it. The great work, crafted during the now-lost Empire of the Gods, was written in inks of powdered gems on pages of imperishable electrum. Its intricate illustrations depicted the Thousand Joys of which Dlamélish is the patron goddess, including music, dance, dining, gambling, sport, and sex, and advised the noble reader on how best to use the fine arts to seduce and beguile. \n\t\t\n\t\tYour clan had spent a fortune finding the work and acquiring it. Princess Ma'ín's eyes danced over the shining pages; her attendants were obviously well pleased by the respect shown to their deity. \"I shall savor each page,\" breathed the Princess. \n\t\t\n\t\tYour clan elders congratulated you that night, for the priestesses of the Green-Eyed Lady were well pleased and promised future favors to the $!{Clan} clan.\n\t\t*if God = \"Dlamélish\"\n\t\t\t*set noble %+10\n\t\t*set status %+10\n\t\t*goto Winemakers\n\t#A rare suit of enchanted steel armor, emphasizing the martial glory of past empresses.\n\t\t*set com_count +1\n\t\tIron is rare on Tékumel, and thus good steel is more precious than gold. You chose a gift of great value which also served as a reminder of the queenly role your clan desired for Princess Ma'ín. Her eyes widened with wonder as your slaves bore the gift to her bodyguards for inspection. The armorer hired by your clan explained the provenance of each piece and the techniques used to enamel the imperial colors, sky blue and gold, onto the pieces to create a pleasing whole. \n\t\t\n\t\t\"Let this rare gift be enchanted, so that it might endure forever as a symbol of the loyalty of the $!{Clan} clan,\" intoned the Princess. \"Let its imperishable steel be a symbol of the greatest strength of the Empire—the unchanging loyalty of its people.\" \n\t\t\n\t\tYour clan-mother Dzái still speaks with pride of the day you made such a fine and soldierly gift to the imperial heir, and of the honor you brought to her lineage.\n\t\t*if God = \"Avánthe\"\n\t\t\t*set Noble %+10\n\t\t*set status %+10\n\t\t*goto Winemakers\n\n*label Winemakers\n*page_break\nMonths later, you and the other new recruits had truly completed your induction training, and your commanding officers let it be known that a special informal celebration would not be inappropriate. Rather than eating in the barracks, as was usual, you and your fellow new officers decided to rent a suite at a winemakers' clanhouse, and pooled your funds to provide alcohol, powders, prostitutes, and food for your troops. The common soldiers would, of course, remain in the courtyard with most of the entertainers, while the higher-clan subalterns and officers would have the proper sitting daises and more refined diversions inside with a separation befitting their dignity. The troops were appropriately grateful for this largesse, and the shouts and laughter of their enjoyment did not disturb you too much.\n\nProviding wine, company, and music for the troops did not come cheaply. What role did you take in the evening's celebration?\n*fake_choice\n\t*selectable_if (wealth >=60) #I spent my allowance generously, to be certain that the troops were happy.\n\t\t*set dutiful %+10\n\t\t*set noble %+10\n\t\t*set dip_count +1\n\t\t*set wealth -100\n\t\tThe soldiers guzzled wine and gorged themselves on whole spit-roast hmá, ogled the dancers, and demanded songs of martial victory from the musicians well into the night. While you and your fellow officers had shared the expense, your subalterns let it be known that their heréksa did not stint on rewarding the soldiers from ${PCHis} káreng.\n\t#I saved my káitars for outfitting and equipment in the coming war.\n\t\t*set dutiful %+10\n\t\t*set noble %-10\n\t\t*set tac_count +1\n\t\tIt would prove a wise choice, but one your troops did not understand, and there was some muted grumbling when they thought you could not hear.  Often in your years as an officer, commanding soldiers would make you think of Mama Halé wrangling small children before bath time.\n\t#I threw myself wholeheartedly into the celebration, making certain to be seen and appreciated by the troops.\n\t\t*set dip_count +1\n\t\t*if God = \"Dlamélish\"\n\t\t\t*set noble %+10\n\t\t\tYour choice to consort with the troops was unusual, but the goddess Dlamélish, Green-Eyed Lady of Fleshly Joys, cares nothing for society or propriety, only for the thrill of each moment of pleasure. Your soldiers took your religion into account and were amazed by your capacity for drink and food.  Still, their conversation quickly became tiring in proportion to their inebriation, and you retired back inside, \n\t\t*if God != \"Dlamélish\"\n\t\t\t*set noble %-10\n\t\t\tThe aristocrats of the Empire do not deign to speak to the lower orders; a provincial governor might oversee the trade of his province's dná grain and lumber to its neighbors, but that worthy would never stoop to converse with a farmer or lumberjack. Your troops, aware of this custom, were puzzled by your choice to celebrate with them.  In the face of their discomfiture, you beat a tactical retreat inside, \n\t\twhere your fellow heréksa welcomed you with raucous cheers and proffered drink.\n*comment endif\n\n*page_break\n*If assassination = 4\n\t*set cousin \"Gámalu\"\n*temp companion\n*if assassination = 4\n\t*set companion cousin\n*if assassination != 4\n\t*set companion \"Nirún\"\n\t*set met_nir true\nThe local clanhouse of the Blue Kirtle was well used to hosting large parties and to providing privacy to its guests. The celebration on the night in question strained even its resources, however. Another unit, the Legion of ${alliedlegion}, had also booked rooms to celebrate. You learned of this when you collided with a young kási in the halls, splashing fragrant liquor upon his uniform.\n\n\"Steady on!\" he laughed, gripping your elbow.  \"Sorry to have almost trampled you. I was a bit lost in my thoughts.  On my way out for some air, if you'd care to join me?\"\n*choice\n\t#\"It is a bit close in here. Why not?\"\n\t\tAs you walked side by side to a balcony overlooking the street, you noticed him surreptitiously taking in your rank and clan badge.  \"I'm Kási $!{Companion},\" he said, \"of $!{Nirclan}.\"\n\t\t\n\t\t\"$!{Name}, $!{Clan},\" you replied, looking out over tiled roofs and hanging lanterns.  The winter air was cool on your perspiring skin, a relief from the humid hotness of inside.\n\t\t\n\t\t*if assassination = 1\n\t\t\tBeside you, $!{Companion} stiffened.  \"The famous duelist.\"\n\t\t\t\n\t\t\tYour mind caught up. $!{Nirclan}. $!{Cousin}'s clan.\n\t\t\t*fake_choice\n\t\t\t\t#\"What of it?\"\n\t\t\t\t\tHe made an awkward grimace.  \"I didn't bring you out here to start a fight.  I was just a bit surprised—\" He was interrupted when \n\t\t\t\t#\"It was a personal matter.\"\n\t\t\t\t\tHe made an awkward grimace.  \"Yes, I suppose it was.  $!{Cousin} had a lot of 'personal' affairs—\" He was interrupted when \n\t\t\t\t#\"Tonight, I'm just a soldier enjoying good company.\"\n\t\t\t\t\tHe smiled at your diplomatic turn of phrase.  \"If you parry with a sword as well as you do with words, no wonder you won.\" He stared out over the cityscape, lost in thought.  As he was about to turn to you and speak, \n\t\t\t*goto bad_news\n\t\t*else\n\t\t\tBeside you, $!{Companion} recited a line of poetry beneath his breath, then silently drank in the scenery.  After the fevered partying inside, it was nice to clear your head, to stop and be in the moment.  \n\t\t\t\n\t\t\t\"I hear there are snows on the mountains of Yán Kór this time of year,\" said $!{Companion}.  \"That will be a sight to see—\"\n\t\t\t\n\t\t\tHe was interrupted when \n\t\t\t*goto bad_news\n\t#\"I'm afraid I must get back to my friends.\"\n\t\tHe smiled genially, \"So we're fated to run into each other in the dark, disengage, and go our separate ways?  Rather like the 14th and 22nd Medium Infantry back in the Time of Four Kingdoms.  Well I won't report back if you don't.\" His grip on your elbow turned to a military handshake, \"I'm Kási $!{companion}.\"\n\t\t\n\t\tYou were about to respond when \n\t\t*goto bad_news\n\t#\"That was rare tsuhóridu you spilled, idiot!\"\n\t\tHis friendly demeanor dropped like a mask.  \"I'd offer you shámtla, but perhaps you'd prefer a duel? I know I would.  You can ask after Kási $!{Companion}.\"\n\t\t*if assassination = 1\n\t\t\tHe looked you up and down, taking in your rank and clan badge. \"I've heard you're quite the fencer.  Killed a man recently, didn't you?\"\n\t\t*fake_choice\n\t\t\t#\"I suppose I can find find five minutes to show you some pointers.\"\n\t\t\t#\"Honestly, I'd prefer shámtla for a new drink. Dueling you doesn't seem entertaining.\"\n\t\t\t#\"My second will contact yours.\"\n\t\t\t#\"Just watch where you're going next time.\"\n\t\tHe was about to sputter a response when \n\t\t*goto bad_news\n*label bad_news\n*temp dispatch false\na soldier in the colors of the ${Legionnum} came pounding down the hall. Breathlessly, nursing a swollen eye and jaw, she slammed her fist to her chest and straightened her arm in salute, then stammered, \"Heréksa! The troops…they're fighting the Legion of ${alliedlegion}'s soldiers…in the courtyard! Live weapons!\" \n\nWhen you listened for it, you could dimly hear shouts and the clacking of chlén-hide weapons against one another.\n*page_break\nHurrying into the courtyard, with $!{Companion} a step behind, you were greeted by the sight of men and women in uniform variously wrestling, kicking, shouting, and, in one flagrantly criminal case, swordfighting. Shrieking slaves fled the mayhem, wine and blood mingled on the flagstones, and several soldiers already lay motionless over scattered food and shattered pottery. A soldier in the uniform of the Legion of ${alliedlegion} knocked one of your men into the dirt, shouting \"The men of the Legion of ${legion} fight like pretty little slave-girls!\"\n\nHow did you respond to the insult to the ${Legionnum}'s honor?\n*choice\n\t#I joined my soldiers in avenging this insult!\n\t\t*gosub end_trial\n\t\t*achieve honor\n\t\t*set com_count +1\n\t\t*set dutiful %-10\n\t\t*set Hotheaded true\n\t\t*if change\n\t\t\t*set noble %+10\n\t\t*if change = false\n\t\t\t*set noble %-10\n\t\t*goto Brawl\n\t#I ignored the drunkard; my chief concern was preventing a riot.\n\t\t*gosub end_trial\n\t\t*set dip_count +1\n\t\t*if change\n\t\t\t*set noble %-10\n\t\t*if change = false\n\t\t\t*set noble %+10\n\t\t*set dutiful %+10\n\t\t*goto Barfight_Choice\n\t*selectable_if (assassination !=4) #I let the soldiers blow off steam. It was no concern of mine.\n\t\t*gosub end_trial\n\t\t*if change = false\n\t\t\t*set noble %-20\n\t\t*if (God = \"Vimúhla\") or (God = \"Dlámelish\")\n\t\t\t*set noble %+10\n\t\tThough your fellow officers from both legions ran about like panicked children, trying vainly to calm the soldiery, you relaxed, a glass in hand, as matters took their course.  Catharsis was achieved by the rank and file at the cheap cost of a few broken limbs, tables, and skulls.  Sadly, the Clan of the Blue Kirtle did not see matters in the same light, and loudly demanded shámtla for the damage the imperial soldiers had wreaked upon their premises and personnel. The generals of the two legions paid them out of their personal treasuries, and the black mark remains on your record to this day.\n\t\t*set status %-20\n\t\t*goto Military_count\n*label Barfight_Choice\nHow did you quiet the impending riot?\n*choice\n\t*hide_reuse #I defused the situation with personal charisma and shouted commands.\n\t\t*set dip_count +1\n\t\t*if (God = \"Hnálla\") or (God = \"Karakán\")\n\t\t\t*set noble %+10\n\t\t*if assassination = 4\n\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. Bellowing orders, you waded into the brawl….\n\t\t\t*goto JustKillAMan\n\t\t*elseif diplomacy > 55\n\t\t\tYou leapt onto a table and stomped your foot upon it until the drum-like pounding carried over the noise.  \"What would our ${Prince} think, to see the orderly soldiers \n\t\t\t*if Princename = \"Ma'ín\"\n\t\t\t\tshe \n\t\t\t*if Princename != \"Ma'ín\"\n\t\t\t\the \n\t\t\thad so recently praised for their loyalty squabbling like children?\" You let your stern gaze travel across the mob, as looks of shame began to propagate. \"Now, I see that the Legion of ${alliedlegion} has a surfeit of food, while we ourselves have more beer than can be drunk.\"  Making eye contact with $!{Companion}, you extended your hand.  \"Shall we combine our feasts?\"\n\t\t\t\n\t\t\tSmiling, he gripped your forearm, and you helped him up upon the table.\n\t\t\t*page_break\n\t\t\tThe soldiers of the two legions mingled, gathering around bonfires in the courtyard to sing old songs or tell boastful stories.  Inside the winemaker's the officers followed suit, combining parties.  Ironically, this prevented you and $!{Companion} from continuing your conversation, as you had both become stars of the hour, gathered about and toasted by your respective comrades.  Toward the end of the night, Kási $!{Companion} sought you out.  \"That was quick thinking back there.  It's rare in the military for us to win without someone else losing.  I think sometimes we lose sight of compromise as an action.\" He lifted his glass to you, turned, and disappeared in the crowd.\n\t\t\t\n\t\t\tOnce morning came and with it a return to sobriety, the soldiers of both legions were overcome with shame and remorse. Your superior officers decided to err on the side of morale and to make no further mention of the incident, since no one was seriously hurt. The House of the Blue Kirtle received some substantial inducements from the generals of both legions to keep the rumors to a minimum. You received no official commendation for your actions, but the talk in the general's tent clearly benefited the course of your career.\n\t\t\t*achieve command\n\t\t\t*set nir_rep +1\n\t\t\t*set status %+15\n\t\t\t*goto Military_count\n\t\t*else\n\t\t\tYour shouted commands were drowned out by the noise of the brawl, as were $!{Companion}'s, and even those of your own troops who saw you chose to fend off the \"enemy\" rather than pay heed to your orders. Soon chaos reigned, the two of you were separated by the flow of the rioters, and your priorities changed to saving your skin.\n\t\t\t*goto brawl\n\t#I drew my sword and threatened to kill the first mutineer who stepped forward.\n\t\t*set com_count +1\n\t\t*if God=\"Avánthe\"\n\t\t\t*set Noble %-10\n\t\t*if (Clan = \"Red Sun\") or (God = \"Hrü'ü\")\n\t\t\t*set noble %+10\n\t\t*if assassination = 4\n\t\t\t*set BladeInHand true\n\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. You drew your sword and stepped forward….\n\t\t\t*goto JustKillAMan\n\t\t*elseif combat > 70\n\t\t\tThe mutinous soldiers did not immediately respond to your threat, too full of wine and youthful confidence to obey lawful orders. With blinding speed you dispatched the legionnaire from your unit who had drawn a sword on his comrades from the Legion of ${alliedlegion}'s forces. The sudden violence reminded your troops of the absolute rigidity of the chain of command, and they fell into line. The other legion's troops quickly did the same, under the direction of Kási $!{Companion}.\n\t\t\t*set dispatch true\n\t\t\t*goto BrawlWon\n\t\t*elseif combat > 60\n\t\t\tYour attempt to use violence and intimidation was poorly chosen, for while your troopers submitted to your authority, the other legion's soldiers simply saw you as another uniformed threat. However, your presence did give your legionnaires a rallying point, and they fell into lines behind you to end the melee as a unit.\n\t\t\t\n\t\t\t*label wedge\n\t\t\t*if tactics >55\n\t\t\t\tYour troops arrayed in formation, and you pressed the attack. Your wedge moved without grace or speed, but inexorably pushed through to the armed men and women who offered the greatest risk of serious mayhem. Once they were disarmed and beaten into submission, the remaining legionnaires understood that the brawl was over and stood down.\n\t\t\t\t*goto BrawlWon\n\t\t\t*else\n\t\t\t\tWhile you charged most bravely, your legionnaires were unable to form properly the Divider of Foes wedge. Your formation pushed into the fray, but without coordination. Your \n\t\t\t\t*goto knocked_out\n\t\t*else\n\t\t\tYour attempt to use violence and intimidation was poorly chosen, for while your troopers submitted to your authority, the other legion's soldiers simply saw you as another uniformed threat. You waded into the fray, but your \n\t\t\t*label knocked_out\n\t\t\trecollection of events after that is dim. Both the fog of war and a blow from a flagon of beer wiped away the memory of that night. \n\t\t\t\n\t\t\tBack in camp, bandaged and bruised, you awakened with an enormous headache. Someone had saved your skin, but the Clan of the Blue Kirtle loudly demanded shámtla for the damage the imperial soldiers had wreaked upon their premises and personnel. The generals of the two legions paid them out of their personal treasuries, but the black mark remains on your record to this day.\n\t\t\t*set status %-20\n\t\t\t*goto Military_count\t\n\t*hide_reuse #I formed our officers into a cadre and we ended the brawl together.\n\t\t*set tac_count +1\n\t\t*if God = \"Avánthe\"\n\t\t\t*set Noble %+10\n\t\t*if assassination = 4\n\t\t\t*set PosseComitatus true\n\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. With your fellow subalterns from the Legion of ${legion}, you waded into the fray….\n\t\t\t*goto JustKillAMan\n\t\t*elseif tactics > 65\n\t\t\tSeeing your tactic, $!{Companion} called to a few of his fellows, who came to join you.  The sudden presence of a well-organized group of officers from both legions, all acting as a unit to separate combatants, shouting the orders to dress lines and pummel those legionnaires too drunk or battle-crazed to stand down, had the desired effect. Your troops fell into their lines, variously shame-faced, frightened, or relieved, and the Legion of ${alliedlegion}'s soldiers quickly followed suit, realizing the enormity of their actions and the severity of the punishment they could face.\n\t\t\t*goto BrawlWon\n\t\t*elseif tactics > 55\n\t\t\tThe sudden presence of a well-organized group of officers, all acting as a unit to separate combatants, shouting the orders to dress lines and pummel those legionnaires too drunk or battle-crazed to stand down, had the desired effect…on your legionnaires. They fell into formation, variously shame-faced, frightened, or relieved, but the Legion of ${alliedlegion}'s soldiers simply regarded this as a new threat and pressed the attack while your troops were trying to stand down.\n\t\t\t\n\t\t\t*label bold_charge\n\t\t\t*if combat >55\n\t\t\t\tWith your troops formed up and in good order, your strength was magnified. While you suffered some cuts and bruises, the Legion of ${alliedlegion}'s soldiers got the worst of it, and were forced to submit to the superior force—yours. You could see new respect in the eyes of your soldiers as you ended the fray before it could rage out of control.\n\t\t\t\t*goto BrawlWon\n\t\t\t*else\n\t\t\t\tYour \n\t\t\t\t*goto knocked_out\n\t\t*else\n\t\t\tEach of your fellow subalterns had a different idea as to how to solve the problem. In their mounting panic, each insisted on shouting over you and your fellows, and while you did not come to blows, the resulting argument was as shameful as the riotous display put on by the common troopers. While you all bellowed and blustered, the fighting enveloped you.  Your \n\t\t\t*goto knocked_out\n\t*if (Psychic>10) or (Ritual>10)\n\t\t*hide_reuse #I quelled the rioting soldiers with a display of magic.\n\t\t\t*set sor_count +2\n\t\t\t*if assassination = 4\n\t\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. You began the mental exercises necessary to summon magical power from the Planes Beyond….\n\t\t\t\t*set MagicalAccident true\n\t\t\t\t*goto JustKillAMan\n\t\t\t*if (Psychic>40) or (Ritual>40)\n\t\t\t\tA single sorcerer usually makes no difference on the field of battle. However, during a drunken brawl between hot-headed, off-duty young troopers, a display of the power of magic can have a sobering and severe effect.\n\n\t\t\t\t*if (Psychic>Ritual)\n\t\t\t\t\tInvisible hands pried the combatants apart. Waves of telekinetic force tossed any who dared to resist sprawling to the ground. Your powers quickly sapped the brawling soldiers of their taste for mayhem. Chastened, they fell into lines by unit and awaited further orders.\n\t\t\t\t\t*goto BrawlWon\n\t\t\t\t*else\n\t\t\t\t\tUsing the spell of Light and Darkness, you plunged the courtyard into a deep and inky black cloud. The soldiers, suddenly unable to see one another (or themselves), immediately ceased fighting. Some panicked, thinking themselves struck blind, but once your voice pierced the darkness, most realized what was happening and stood down.\n\t\t\t\t\t*goto BrawlWon\n\t\t\t*else\n\t\t\t\tYour command of magic was, at that time, not sufficiently advanced to allow you to summon spells which could command attention and obedience from near-riotous soldiers. Given that most sorcerers choose to specialize in magic and make it a life's calling, you were lucky to have mastered any spells while training as a soldier. You made another plan….\n\t\t\t\t*set magic_fail true\n\t\t\t\t*goto Brawl\n*label JustKillAMan\n\n*if hotheaded = false\n\tYou struggled to end the drunken idiocy of the troops in the courtyard, but it was, it seemed, in vain. Beside you, $!{Companion} shouted orders to his soldiers, struck them with the flat of his drawn blade, and physically pulled two brawlers apart, placing his own life in danger in order to stop the destructive brawl. In an ideal world, the two of you would have worked together. Sadly, you did not live in that ideal world.\n*page_break\n*if MagicalAccident = true\n\tYou reached through the barrier between worlds to summon magical power from the Planes Beyond. $!{Companion}, seeing your clothing and the badge of a lay-sorcerer of $!{lord} $!{god} you wore, paled in horror and placed a hand on your shoulder to stop you from casting some destructive spell into the already bloody riot. The ceremonial uniform he wore was festooned with brass and copper fittings, and once in contact with you, the forces you fought desperately to control were scattered by the presence of the metal. \n\t\n\tA torrent of energy flowed through you, threatening to destroy you and everyone else in the courtyard. Whether by training, great good luck, or simply chance, you were able to direct the wild flux into the closest available target—the luckless kási. Arcs of random energy jumped over his skin, and his hair stood on end. His smoking corpse fell to the ground, burned almost beyond recognition. It was only after he died that you realized that you could easily have suffered the same fate, or brought it upon everyone present.\n\t*goto ShotAManInReno\n*elseif Bladeinhand = true\n\tSword drawn, you advanced on the drunken soldiers.  Most took one look at your stance and your expression and backed away, but two in the colors of ${alliedlegion} took it upon themselves to engage in some class warfare.  \n\t\n\tIf they had been sober it might have been a fair fight, but as it was, even two on one, you were hardly taxed.  You skewered one through the shoulder as the eddies of the crowd brought you face to face with Kási $!{Companion}.  All he saw was you delivering a nasty injury to one of his men, and about to turn on the other.  Without a thought, he drew his blade and intervened.  \n\t\n\tIn the heat of the moment, over the noise of the riot, you could not make yourself heard.  Pressed to keep his sword from your body, you fought with frustrated fury. The young kási retreated, and when he slipped in a puddle of wine, you had your opening. While you intended only to disarm him, he was badly off-balance, and your blade pierced his side, between his ribs. He died choking on his own blood. As the light left his eyes, he mouthed, \"Why?\"\n\t*goto ShotAmaninReno\n*else\n\t*if PosseComitatus = true\n\t\tYou and your fellow officers made a wedge and pushed toward the swordfight in the middle of the courtyard. Laying about you with truncheons, you slowly bullied and stunned the troops out of their mutinous mayhem. When you reached the handful of troops armed with knives and swords, you and your cadre demanded as one that they lay down their arms.   \n\t*if PosseComitatus = false\n\t\tShouting orders, you laid about with your truncheon, slowly bullying or stunning the troops out of their mutinous mayhem. When you reached the handful of troops armed with knives and swords at the center of the courtyard, you demanded that they lay down their arms. \n\t$!{Companion} was already there, demanding that they dress their lines.  The conflicting orders led only to more confusion.\n\t\n\tYou approached him and demanded that he let you speak. He pointed to his kási's crest and ordered you to stand down, gesturing with his naked blade and shouting. You raised your truncheon, unwilling to back down in front of your soldiers, intending to knock his sword away, and at that moment he staggered, knocked down by a struggling rioter.\n\t\n\tYour truncheon came down on his skull and he did not rise again.\n\t*label ShotAManInReno\n\t*achieve regret\n\t*page_break\n\tIn the wake of the death of the young Kási $!{Companion}, a stunned silence fell over the courtyard.  Your brother officers restored peace while you knelt by the dead man's side. The imperial court convened a military tribunal over the incident, which chose to impale several troops in both legions who had struck superior officers.  Given your lofty status, the circumstances surrounding the death, and the desire of the Tsolyáni command to avoid future strife between your legion and the Legion of ${alliedlegion}, you were given only a nominal punishment. Although you wished to offer private consolation, or even shámtla, to his family and to his clan, $!{Nirclan}, the imperial court had declared the matter ended and sealed, and your own clan warned you to let it lie. \n\t\n\tThe Kási's face still haunts you in unguarded moments.\n\t*goto Military_count\t\n*label Brawl\n*if hotheaded = true\n\tAs a proud young officer of the time-honored Legion of ${legion}, you could not allow this insult to go unanswered!\n\t\n*comment endif\nHow did you force the rioting soldiers of the Legion of ${alliedlegion} to submit?\n*choice\n\t#I used my personal prowess.\n\t\t*set com_count +1\n\t\t*if assassination = 4\n\t\t\t*set BladeInHand true\n\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. You drew your sword and stepped forward….\n\t\t\t*goto JustKillAMan\n\t\t*elseif combat > 70\n\t\t\tYour ferocity brought the riot to a quick end, as none of the drunken legionnaires were prepared to face such a skilled swordsman. Laying about with the flat of your blade, you quickly thumped the Legion of ${alliedlegion}'s troops' thirst for mayhem out of them, forcing them to acknowledge that the Legion of ${legion} was made up of true soldiers who could not be cowed.\n\t\t\t*goto BrawlWon\n\t\t*else\n\t\t\tYou waded into the fray, but your \n\t\t\t*goto knocked_out\n\t#I formed my soldiers into a wedge, intent on bringing the swordfighters down as quickly as possible.\n\t\t*set tac_count +1\n\t\t*if assassination = 4\n\t\t\t*set PosseComitatus true\n\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. With your fellow subalterns from the Legion of ${legion}, you waded into the fray….\n\t\t\t*goto JustKillAMan\n\t\t*elseif Tactics > 65\n\t\t\tAll those hours of trumpet drills and coordinated marches paid off beautifully, as your neatly dressed lines became a tight wedge, forcing the brawling soldiers apart. The Legion of ${alliedlegion}'s troops' quickly lost their taste for mayhem when they saw your legionnaires bring down the swordfighters with unified and controlled force. They would not soon again insult the courage or professionalism of your legion!\n\t\t\t*goto BrawlWon\n\t\t*else\n\t\t\tWhile you charged most bravely, your legionnaires were unable to form properly the Divider of Foes wedge. Your formation pushed into the fray, but without coordination. Your \n\t\t\t*goto knocked_out\n\t*selectable_if ((magic_fail = false) and ((psychic >10)or(ritual>10))) #I used my magic to defeat ${alliedlegion} soldiers.\n\t\t*set sor_count +2\n\t\t*if assassination = 4\n\t\t\tWhen you think back on that night, it is always with bitter regret. One mistake led to the death of a brave officer from the other legion, to a bloody feud between his clan and your own, and to the assassination attempt in the Temple of $!{lord} $!{god} which you barely escaped. You began the mental exercises necessary to summon magical power from the Planes Beyond….\n\t\t\t*set MagicalAccident true\n\t\t\t*goto JustKillAMan\n\t\t*elseif ritual > psychic\n\t\t\tStanding upon a table you danced and chanted into being the spell of Favoring upon the soldiers of the ${Legionnum}, enhancing their ferocity and skill, to give them the upper hand in this conflict.\n\n\t\t\t*if ritual >40\n\t\t\t\tThis tipping of the scales of battle was enough to transform a stalemate into a victory.  The soldiers of the Legion of ${alliedlegion}, having expected a spirited and even brawl, quickly lost their taste for conflict and returned sourly to their wine cups.\n\t\t\t\t*goto brawlwon\n\t\t\t*else\n\t\t\t\tAs the spell was manifesting, you heard an unfamiliar voice shout \"Sorcerer!\" and saw a sea of drunken, surly faces turn toward you.  Your \n\t\t\t\t*goto knocked_out\n\t\t*else\n\t\t\tThe psychic aura you created around yourself exuded fear, causing most of the drunkards to flee or bow trembling before you.\n\t\t\t*if psychic >40\n\t\t\t\tThe brawl parted around you, as you walked toward the soldier who had shouted the insult.  Those outside your aura quieted to turn and watch you, while those inside scrambled away or whimpered.  The loudmouth stood stunned and slack-jawed, like prey in a predator's gaze.\n\t\t\t\t\n\t\t\t\t\"Would you,\" you whispered, \"please repeat what you said?\" Shame made him break eye contact, as he tried to stammer a response and failed.  He stared at the floor, broken with his loss of face. The now-quiet and somber crowd began to disperse.\n\t\t\t\t*goto brawlwon\n\t\t\t*else\n\t\t\t\tSome, however, were immune, and these few fixated on you as the biggest threat.  Your \n\t\t\t\t*goto knocked_out\n\n*label BrawlWon\n*page_break\nYou had averted a full-blown riot at the House of the Blue Kirtle. \n*if hotheaded = false\n\tWhen matters had calmed, Kási $!{Companion} sought you out.  \"That was quick thinking.  We're ordering our lot back to barracks, and I drew the short straw and have to play escort.  Make sure they don't upend a fruit cart or $!{lord} $!{god} knows what else on their way home.\" He shook his head bemusedly, and saluted before turning to go.\n*if hotheaded = true\n\tYou last glimpse of Kási $!{Companion} was of him shepherding soldiers toward the door.  He looked back over his shoulder, and your eyes met.  His gaze was measuring as he turned to go.\n*comment endif\n\nOnce morning came, and with it a return to sobriety, the soldiers of both legions were overcome with shame and remorse. Your superior officers decided to err on the side of morale and to make no further mention of the incident, since no one was seriously hurt. The House of the Blue Kirtle received some substantial (and quiet) \"inducements\" from the generals of both legions to keep the rumors to a minimum. You received no official commendation for your actions, but the talk in the general's tent clearly benefited the course of your career.\n*achieve command\n*set status %+10\n*goto Military_count\n\n*label Military_count\n*temp magic_stat\n*if ritual >10\n\t*set magic_stat \"ritual\"\n*if psychic >10\n\t*set magic_stat \"psychic\"\n\n*temp top_counter\n*temp second_counter\n\n*if com_count >= tac_count\n\t*set top_counter \"com_count\"\n\t*set second_counter \"tac_count\"\n\t*goto diplomacy\n*else\n\t*set top_counter \"tac_count\"\n\t*set second_counter \"com_count\"\n\t*goto diplomacy\n\n*label diplomacy\n*if dip_count > {top_counter}\n\t*set second_counter top_counter\n\t*set top_counter \"dip_count\"\n\t*goto sorcery\n*elseif dip_count > {second_counter}\n\t*set second_counter \"dip_count\"\n\t*goto sorcery\n*else\n\t*label sorcery\n\t*if sor_count > {top_counter}\n\t\t*set second_counter top_counter\n\t\t*set top_counter \"sor_count\"\n\t\t*goto boost_stats\n\t*elseif (sor_count >= {second_counter}) and ((psychic >10) or (ritual >10))\n\t\t*set second_counter \"sor_count\"\n\t\t*goto boost_stats\n\t*else\n\t\t*goto boost_stats\n\n*label boost_stats\n*if top_counter = \"tac_count\"\n\t*set tactics %+20\n\t*goto second\n*elseif top_coun
