<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choice of the Petal Throne — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "petalthrone", "title": "Choice of the Petal Throne", "scenes": {"adolescence": "\n*temp villain_dead \n*temp clan_payment false\n*temp dip_count 0\n*temp com_count 0\n*temp tac_count 0\n*temp sor_count 0\n*temp wave_disgraced false\n*temp wave_resolved false\n*temp duel false\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\nAs the spring following your naming day progressed, you found yourself in a strange position, with the rights and respect of an adult, but few responsibilities to occupy your time.  All knew that Dzái intended to purchase you a military commission, which would immediately carry you away to the Yán Koryáni front, and so there seemed little point in involving you in the clan's business.  How did you spend your days?\n*fake_choice\n\t#I relaxed and socialized with my peers, enjoying a last taste of city life.\n\t\tIt was while you reclined in the courtyard, sipping sherbet and resting from a long night of parties, that $!{wave} ran to you, face tear-streaked and eyes red.\n\t\t*set Diplomacy %+20\n\t#I practiced my swordplay in preparation for battles to come.\n\t\tIt was while you stood after one of these sessions, bent double and panting from exertion in the heat, that $!{wave} ran to you, face tear-streaked and eyes red.\n\t\t*set Combat %+20\n\t#I read works of strategy by great generals.\n\t\tIt was while you reclined in the shade of the courtyard, immersed in a scroll on the proper way to ford water under enemy fire, that $!{wave} ran to you, face tear-streaked and eyes red.\n\t\t*set Tactics %+20\n\t*if (ritual >10) or (psychic >10)\n\t\t#I honed my sorcerous skills while I still had access to the temple library.\n\t\t\tIt was while walking home from the temple one afternoon, pondering the latest magical diagram from your tutor, that $!{wave} ran to you, face tear-streaked and eyes red.\n\t\t\t*if psychic >10\n\t\t\t\t*set psychic %+20\n\t\t\t*if ritual >10\n\t\t\t\t*set ritual %+20\n*if (orientation = \"straightm\") or (orientation = \"gay\")\n\t*set villain \"Mottán\"\n\t*set vilhe \"he\"\n\t*set vilhis \"his\"\n\t*set vilhim \"him\"\n\t*if assassination = \"1\"\n\t\t*set cousin \"Mottán\"\n\t*goto crisispt2\n*else\n\t*set villain \"Shekkára\"\n\t*set vilhe \"she\"\n\t*set vilhis \"her\"\n\t*set vilhim \"her\"\n\t*if assassination = \"1\"\n\t\t*set cousin \"Shekkára\"\n\t*label crisispt2\n\t\n\t\"Oh, Tiúni!  I am in such trouble.  I have lost a small fortune at the House of Shining Joy.  $!{Villain} hosts an exclusive room there—beautiful and refined, with gold-washed window screens and ivory-inlaid tables—and everyone was so pleasant.\" $!{wahis} words ran over each other as ${wahe} spoke with a mixture of panic and wistful memory. \"A Golden Lintel banker let me take out a line of credit. At first she was so understanding of my run of bad luck, but then she became rather cold and impertinent, and said she would be appealing to my clan for payment of my debts.  What should I do?\"\n\t*label response\n\t*choice\n\t\t*hide_reuse #\"Wait, who's this $!{villain}?\"\n\t\t\t$!{wave} described $!{Villain}, an older youth whom you had seen at parties around $!{hometown}, though ${wahis} description of an elegant and urbane socialite matched poorly with your impression of a cynical and dissipated lay-about.  You thought ${wahe} might be trying to make you jealous….\n\t\t\t*choice\n\t\t\t\t#I did not fall for that ploy.\n\t\t\t\t\tJealousy is viewed as quite ignoble in Tsolyáni culture, and yet $!{wave} seemed somewhat disappointed by your neutral reaction to her flattering description.  With pleading eyes, ${wahe} once more asked what ${wahe} should do.\n\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*goto response\n\t\t\t\t#It worked!\n\t\t\t\t\tThough jealousy is viewed as ignoble in the Five Empires, it, like many faux-pas behaviors, was all too common and natural.  $!{wave} seemed charmed by your obvious passion, and a little strengthened in ${wahis} resolve, as ${wahe} asked what to do next.\n\t\t\t\t\t*set noble %-15\n\t\t\t\t\t*set wav_rep +1\n\t\t\t\t\t*goto response\n\t\t*hide_reuse #\"How could you be so stupid?\"\n\t\t\tSummoning forth all your anger at the numerous selfish and short-sighted slights of your relationship, and your fear at the magnitude of ${wahis} transgression, you let forth a tirade upon the already beleaguered $!{wave}, who withered under the assault.\n\t\t\t*choice\n\t\t\t\t#\"I wash my hands of this.\"\n\t\t\t\t\tIn frustration you turned on your heel and strode away.\n\t\t\t\t\t*set dutiful %-10\n\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t\n\t\t\t\t\tIt was two days later that you heard, from one of $!{wave}'s fathers, that the council was debating selling $!{wave} into slavery to cover the debt, but could not come to consensus.\n\t\t\t\t\t*goto judgement\n\t\t\t\t#\"Alright, fine, I'll help.\"\n\t\t\t\t\tHelping $!{wave} up and drying ${wahis} tears, you give advice.\n\t\t\t\t\t*goto response\n\t\t#\"You need to go tell the clan elders before she does.\"\n\t\t\t*set dutiful %+15\n\t\t\t*set dip_count +1\n\t\t\tThough $!{wave}'s first impulse is to somehow sweep the entire matter under the rug, you convince ${wahim} to come forward and confess to the clan elders.  $!{wahe} only agrees on the stipulation that you come too, for moral support.\n\t\t\t*page_break\n\t\t\t*label Elders\n\t\t\t*set meet_elders true\n\t\t\t*set wave_disgraced true\n\t\t\tThe assorted retired molkárs, wizened priests, and fossilized bureaucrats who made up the eldest and highest-status members of Clan $!{Clan} present in $!{Hometown} came together to hear $!{wave}'s confession and pass judgment.  Immune to ${wahis} remorseful charms, they seemed universally annoyed, as much by the impingement upon their time as by the lavish sum lost.\n\t\t\t\n\t\t\tAfter perfunctory debate, cross-examination, and the tearful pleas of $!{wave}'s mothers, casting $!{wave} out into the street as nakomé, or non-person, was rejected, but a split remained between those favoring speaking with Golden Lintel about paying the debt at a more favorable rate, and those who believed selling the impudent wastrel into slavery would provide a salutary lesson to the other new adults.\n\t\t\t*choice\n\t\t\t\t#I politely requested to speak on $!{wave}'s behalf.\n\t\t\t\t\tWith tolerant impatience, the elders beckoned you forward to speak.  Dzái, herself the youngest of the clan elders, gave you a frosty and warning glance.  She was among those urging that $!{wave} be sold into slavery,  \"…to remove a diseased limb before its corruption spreads,\" she had said, looking directly at you.  What was the basis of your argument for clemency?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"To cast ${wahim} out would reflect poorly upon the clan.\"\n\t\t\t\t\t\t\t\"Oh you of the fealty of many, it is true that $!{wave} hiTánkolel has committed an ignoble act, but to punish ${wahim} by selling ${wahim} into slavery would give the false perception that $!{Clan} values recouping the lost káitars above concern for appearance, propriety, or blood ties.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tNone of the canny minds present missed your implied criticism, and Dzái looked daggers at you, but the point stimulated further discussion.\n\n\t\t\t\t\t\t\t*if (Clan = \"Sea Blue\")\n\t\t\t\t\t\t\t\t*goto clan_favorable\n\t\t\t\t\t\t\t*elseif diplomacy >55\n\t\t\t\t\t\t\t\t*goto clan_favorable\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set status %-10\n\t\t\t\t\t\t\t\t*goto clan_unfavorable\n\t\t\t\t\t\t#\"We should punish those who took advantage of our clan-member, not the member ${wahim}self.\"\n\t\t\t\t\t\t\t\"Oh you of the fealty of many, what message does it send to those in the city, jealous of our exalted position, when an ignoble scoundrel and a common moneylender can act against a scion of $!{clan} with impunity?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMuch coughing and shifting of seats followed this declaration.  When the murmur faded, a grandfather in the robes of the Palace of the Realm stood unsteadily to speak.  \"Bold words, but where is the proof of this conspiracy?  From here it looks just as likely that this fool was ${wahis} own undoing.\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt was decided that any decision would be put off until more information could be gathered, and you and $!{wave} were dismissed.  $!{wahe} was enveloped by ${wahis} parents and escorted away, but not before securing your promise to travel to the House of Shining Joy, in search of some solution to ${wahis} woes.\n\t\t\t\t\t\t\t*goto Shining_Joy\n\t\t\t\t\t\t#\"This is a minor youthful mistake, and should be punished as such.\"\n\t\t\t\t\t\t\t\"Oh you of the fealty of many, it is said that it is the height of ignobility for a man born into power and privilege to live a life of small and niggling deeds.  All the elders here have lived lives of grand scale and ambition, and I believe that $!{wave} hiTánkolel will do so as well.  It is this very drive toward greatness that causes ${wahim} to gamble with the brave abandon of Hrúgga, though sadly with less skill.\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tMany dry chuckles greeted your reference to the legend of Hrúgga gambling for the world against the goddess Avánthe, though the tone returned to seriousness as debate continued.\n\n\t\t\t\t\t\t\t*if Clan = \"White Stone\"\n\t\t\t\t\t\t\t\t*goto clan_favorable\n\t\t\t\t\t\t\t*elseif diplomacy >55\n\t\t\t\t\t\t\t\t*label clan_favorable\n\t\t\t\t\t\t\t\tIn the end, it was decided that a smaller sum than that officially owed might be quietly offered to the Golden Lintel with the implication that seeking more would earn her the enmity of the clan. If this was acceptable, the matter of discipline might be left to $!{wave}'s immediate family.  \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou were dispatched to carry the offer to the old woman operating out of the House of Shining Joy; whether it was a token of your contribution or a form of oblique lesson was unclear.\n\t\t\t\t\t\t\t\t*set clan_payment true\n\t\t\t\t\t\t\t\t*goto Shining_Joy\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*set status %-10\n\t\t\t\t\t\t\t\t*label clan_unfavorable\n\t\t\t\t\t\t\t\tThe heated debate carried long past the time when tiredness and tempers overwhelmed rational discourse.  When the hiTánkolel began to darkly hint at the various perceived slights that fell upon their lineage in the past two hundred years at the hands of the other families, the wiser elders suggested adjournment.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label judgement\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tThe issue left unresolved, arguments over the appropriate punishment spilled over into daily gossip, debated as hotly as any theological point or imperial edict.  $!{wave} hid in ${wahis} parents' quarters and refused to show ${wahis} face, while duels were fought between members of the hiTánkolel lineage and others, though none to the death.  Because Mother Dzái was the most vocal in calling for harsh exemplary punishment, many of these duels were with ${lineage}s.  You were exempt from such challenges from the hiTánkolels, and this leniency called your loyalty to your own lineage into question among your peers.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I ached to see this fate befall my first love, but feared to involve myself further.\n\t\t\t\t\t\t\t\t\t\tAn understandable sentiment.  Clan and lineage are powerful forces.\n\t\t\t\t\t\t\t\t\t\t*goto wave_failure\n\t\t\t\t\t\t\t\t\t#$!{wahe} had made ${wahis} sleeping mat, and I was glad to see ${wahim} have to lie in it.\n\t\t\t\t\t\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t\t\t\t\t\tFed up with years of melodrama, you did not even attempt to visit $!{wave} or defend ${wahim} to others.\n\t\t\t\t\t\t\t\t\t\t*goto wave_failure\n\t\t\t\t\t\t\t\t\t#I knew there was more I could do to help.\n\t\t\t\t\t\t\t\t\t\tIt was clear that to save your first love you must somehow restore ${wahis} honor in the eyes of the clan elders, and so, in search of a solution, you went to the ill-named House of Shining Joy.\n\t\t\t\t\t\t\t\t\t\t*goto Shining_Joy\n\t\t\t\t#I remained silent.\n\t\t\t\t\t*goto clan_unfavorable\n\t\t#\"We just need to solve this problem before they find out.\"\n\t\t\tWhen $!{wave} turned ${wahis} luminous eyes upon you at this pronouncement, you felt as tall as a N'lüss, and as brave as Pendárte of Khéiris.  Instantly reassured by the advent of a plan, ${wahe} told you where to find the Golden Lintel clanswoman.\n\t\t\t*set wav_rep +1\n\t\t\t*set dutiful %-10\n\t\t\t*label Shining_Joy\n\t\t\t*page_break\n\t\t\tEvening's cool shadows contrasted the day's heat still radiating off the brick streets as you walked to the House of Shining Joy.  The building was a shabby wine house in poor repair, but gilded over with opulent touches.  Stepping into the vestibule, you found a pleasantly gurgling fountain where patterned fish cavorted among coins.  In one corner a khéshchal bird perched in a gold-painted cage, its magnificent multicolored tail feathers hanging to the floor.  \n\t\t\t*if clan_payment = true\n\t\t\t\t*set wav_rep +1 \n\t\t\t\t*page_break\n\t\t\t\tAn obsequious slave moved forward to bid you welcome to the establishment, and was intercepted by the servant accompanying you.  After a brief conversation, which you did not deign to concern yourself with, he escorted you into a small room, where you were seated upon a flatteringly high stack of cushions, with a cup of wine at your right hand, and your servant on a mat at your left.\n\t\t\t\t\n\t\t\t\tA wrinkled woman in the dreary garb of a medium clan looked up with an ingratiating smile.  \"Honourable Youth, how may I be of service to you?\"\n\t\t\t\t\n\t\t\t\tTaking a sip from the cup—a middling vintage—you motioned for Balané, a scribe in $!{Clan}'s employ, to speak.  \"The exalted $!{Name} ${lineage} has come to settle the affairs of $!{wave} hiTánkolel.\"\n\t\t\t\t\n\t\t\t\tHer eyes lit with avarice, and she leafed through a meticulously kept book at her side, looking up to name an exorbitant sum, at the mention of which Balané sputtered in outrage.  \"I see you hope to profit by taking advantage of my noble client's unconcern for trifling details, but I cannot allow such a disgrace!\"\n\t\t\t\t\n\t\t\t\tAs you looked about the room with feigned indifference, the bargaining grew heated.  The Golden Lintel representative spoke of money lent on the surety of $!{wave}'s word, while the scribe insisted on more favorable rates.  In the end, to your relief, it was settled that the debt would be bundled in with other $!{Clan} loans, and repaid at their lower interest, significantly reducing the sum.   Both bureaucrats seemed enervated by this debate over terms and percentages, leaving you wondering whether you could ever truly understand those of a medium clan.\n\t\t\t\t\n\t\t\t\tThe proper exchange of farewell ceremonies was brief, and soon you were home again, strolling through the clanhouse gardens in the chill night breeze.\n\t\t\t\t*set status %-10\n\t\t\t\t*label wave_good_news\n\t\t\t\t*achieve save\n\t\t\t\t*fake_choice\n\t\t\t\t\t#I went to ease $!{wave}'s worries with glad tidings.\n\t\t\t\t\t\tWith a \n\t\t\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\t\t\tbellow \n\t\t\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\t\t\tshriek \n\t\t\t\t\t\tof joy, ${wahe} leapt across ${wahis} parents' room to entangle you in a fierce hug.  Words of gratitude and promises of redemption were showered upon you, until with a polite firmness ${wahis} parents requested some time alone to digest the information.  Their looks cast your way were full of admiring gratitude, but a steely coldness was directed toward $!{wave}.  As you retreated down the halls of the living quarters, eight voices rose together in disapproval and censure to crash down upon $!{wave}, legally an adult, but still ${wahis} parents' child.\n\t\t\t\t\t#I went to tell ${wahim} of this last service and end things between us.\n\t\t\t\t\t\t$!{wave}'s gratitude turned to misery, followed by promises and pleading, which gave way in turn to the sort of impassioned fiery fight common throughout your relationship.  Both of you left the room with raw wounds, but neither made the move toward reconciliation that had always happened in the past.  It was quite a while before you could pass in the hallways, or meet glances across the dining hall as ${wahe} laughed at some joke, without a dull pain.\n\t\t\t\t\t\t*set lover \"none\"\n\t\t\t\t\t#I felt no need to see ${wahim} at all, and washed my hands of ${wahim}.\n\t\t\t\t\t\tThe fresh air cooled your head, and like other childish things, you knew it was time to leave this relationship behind as you stepped forward into the full responsibilities of adulthood.\n\t\t\t\t\t\t*set lover \"none\"\n\t\t\t\t*if (assassination = 1) and (duel = false)\n\t\t\t\t\t*goto duel_prequel\n\t\t\t\t*else\n\t\t\t\t\t*goto wave_count\n\t\t\t*else\n\t\t\t\t*choice\n\t\t\t\t\t#I had the Golden Lintel clanswoman summoned to me.\n\t\t\t\t\t\tAn obsequious servant moved forward to bid you welcome to the establishment, and upon hearing your request, disappeared into one of the many private rooms of the wine house.  After a moment, he returned to escort you into a small chamber, where you were seated upon a flatteringly high stack of cushions, with a cup of wine at your right hand.\n\t\t\t\t\t\t\n\t\t\t\t\t\tA wrinkled woman in the dreary garb of a medium clan looked up with an ingratiating smile.  \"Honourable Youth, how may I be of service to you?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"You can erase the debt of my cousin.  Now.\"\n\t\t\t\t\t\t\t\tWith brusque formality, and using the pronoun which signifies discriminating contempt for your listener, you demanded an apology for her role in preying upon a high-clan youth, intimating dire consequences if events were not made right.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe moneylender seemed unimpressed by this show of bravado.  \"Do you know how many times a week young people like you, with neither decorum, nor sense, nor káitars to pay their debts come here expecting to be able to threaten their way out of their messes?  Too many, I assure you.  And yet, every time, it is me their clans and the law side with, and they who ultimately pay the price of such folly.\"  The elderly lady clapped, and a scarred, rotund gladiator entered the room.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Maybe this wasn't such a good idea, I thought.\n\t\t\t\t\t\t\t\t\t\t*set tac_count +1\n\t\t\t\t\t\t\t\t\t\t\"I can see you are an unreasonable person of little honor, and that coming here was a mistake.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tGathering your dignity about you, you stood, spun on your heel, and walked past the gladiator and into the vestibule.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tTo your right \n\t\t\t\t\t\t\t\t\t\t*goto villain_room\n\t\t\t\t\t\t\t\t\t#I'd see how smug she was with a sword at her throat.\n\t\t\t\t\t\t\t\t\t\tIn a smooth movement you stood and drew the chlén-hide sword given to you by Dzái as a naming day present.\n\t\t\t\t\t\t\t\t\t\t*set com_count+1\n\t\t\t\t\t\t\t\t\t\t*if combat \u003c50\n\t\t\t\t\t\t\t\t\t\t\tCracking his neck while giving a powerful yawn, the gladiator stepped forward, his meaty feet causing the old floorboards to creak, and placed a hand upon your wrist.  \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*label evicted\n\t\t\t\t\t\t\t\t\t\t\t\"Come now, we would not want to disrespect your noble person, but this cannot be tolerated,\" said the old woman with a slight smirk.  \"The Golden Lintel have deep roots in this city, and many friends.  You would not want to make an enemy for your clan.  I believe our interview is over, but the servants shall find you a palanquin to get you safely home to your clanhouse with due ceremony.  I shall be going there soon myself, I think.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tWith an odd mixture of perfect politeness and absolute firmness on behalf of the staff, you were ushered from the premises of the House of Shining Joy.  The next day, the Golden Lintel representative arrived at the clanhouse, and left with coin in her purse and disorder in her wake.  \n\t\t\t\t\t\t\t\t\t\t\t*label duel_lost\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tSoon all came to know of $!{wave}'s debt, and arguments over the appropriate punishment spilled over into daily gossip, debated as hotly as any theological point or imperial edict.  $!{wave} hid in ${wahis} parents' quarters and refused to show ${wahis} face, while duels were fought between members of the hiTánkolel lineage and others, though none to the death.  Because Mother Dzái was the most vocal in calling for harsh exemplary punishment, many of these duels were with ${lineage}s, though you were exempt.  \n\t\t\t\t\t\t\t\t\t\t\t*goto wave_failure\n\t\t\t\t\t\t\t\t\t\t*elseif combat \u003c70\n\t\t\t\t\t\t\t\t\t\t\tAs you lunged forward, the gladiator sprang up to interpose, his bulk bowing the floorboards when he landed.  With a grunt he shifted his weight into a common wrestling stance, his chlén-hide-wrapped forearms brought forward to parry.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tWith wide eyes, the moneylender waved her hands.  \"I want no fighting here.  At best you will injure my slave before he disarms you, and at worst you will get hurt yourself and we shall both be in a great deal of trouble over it.  This is $!{Villain}'s problem; go speak to ${vilhim}.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou were not sure you would prevail against a veteran wrestler of the arena, and let yourself be herded out through the door and back into the vestibule.  To your right \n\t\t\t\t\t\t\t\t\t\t\t*goto villain_room\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\tAs you lunged forward, the gladiator sprang up to interpose, his bulk bowing the floorboard when he landed.  In that moment of landing he was off-balance, and you kicked him in his ample stomach, forcing out his breath.  Before he could recover you had grabbed the old woman and positioned her between you two, with your sword pressed against her.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*label lender_intimidated\n\t\t\t\t\t\t\t\t\t\t\t\"Please, I submit to your will.  I should never have given offense, but the debt has been registered with my clan and I cannot erase it in its entirety.  I can, however, use my influence to have it reduced to half the amount, based on a more favorable rate.  Surely such a respected clan as $!{Clan} would cover such a sum, with little thought….\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe offer was a tempting one, and if you had not promised $!{wave} to protect ${wahis} reputation perhaps you would have taken it.  Instead, you made a dismissive gesture. \"Do not think to dicker with me over math as if I were some common peddler.  To pay even the smallest fraction of this 'debt' would besmirch the good name of my beloved clan-cousin.\"\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tClosing her eyes tightly in mumbled prayer, your hostage took a steadying breath.  \"It is not I who took her coins.  If it is the honor of the matter that concerns you, then your argument is with $!{Villain}.  It is known to all the gamblers of $!{Hometown} that ${vilhe} is a cheat, reduced to preying upon novices with weighted dice and narcotic-laced wine.  I know the names of some ${vilhe} has cheated, and who would testify against ${vilhim}.  None with the social rank to bring a case on their own, but respectable enough to corroborate charges if you make them.  I shall help you, if you spare me.\"\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThere would be little shame to $!{wave} in being the victim of a crime such as this, and the money won in court could easily cover her debt to the Golden Lintel.  Were you satisfied?\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#Yes, it was beneath me to hold a grudge against such a functionary.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label lender_end\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe old woman sat down upon her low, flat cushion, waving her guard back to somnolent repose, and chewing on a hnéqu leaf to calm her nerves.  In a low voice she related the names and clans of various temple students, low-level functionaries, and such swindled by $!{Villain}, and promised to persuade her clan to cease pursuit of the debt until after the court case.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto court_case\n\t\t\t\t\t\t\t\t\t\t\t\t#Hardly, this cowardly predator had to die.\n\t\t\t\t\t\t\t\t\t\t\t\t\tThough only of medium status, the Golden Lintel are extremely wealthy and connected.  It is likely that such a murder would result in claims by her clan for exorbitant shámtla.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Thinking better of my rash impulse, I let her go.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lender_end\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#No price is too great to fulfill my duty to my love.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tMercilessly you executed the moneylender before straightening your kilt and walking calmly out of the House of Shining Joy.  In passing through the vestibule, you saw the room $!{wave} described as used by $!{Villain}, but thought better of entering.  For one of your status to kill a member of a medium clan was a matter of shámtla; to kill an aristocrat outside of a lawful duel would mean impalement.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto Dzái_slavery\n\t\t\t\t\t\t\t\t\t*if (psychic >10) or (ritual >10)\n\t\t\t\t\t\t\t\t\t\t#I was not some spoiled brat with empty threats. I was a sorcerer.\n\t\t\t\t\t\t\t\t\t\t\t*set sor_count +3\n\t\t\t\t\t\t\t\t\t\t\t*if psychic >40\n\t\t\t\t\t\t\t\t\t\t\t\tYou glared at the woman as you summoned forth the power of Ascertainment, and rifled through her mind, wherein you saw guilt and fear of being caught out.  She knew that $!{Villain} had been winning money from $!{wave} by some ignoble and devious method, but had still encouraged $!{wave} to borrow more.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Ah, I do not think the law would take your side if they saw your thoughts as I do.  You have committed some very interesting transgressions….\" You let the accusation hang in the air.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lender_intimidated\n\t\t\t\t\t\t\t\t\t\t\t*elseif ritual >40\n\t\t\t\t\t\t\t\t\t\t\t\tStriking the poses that shape other-planar energies, and humming a prayer, you summoned forth your own \"guards\" made of illusion and ectoplasm.  These spectral servitors glided forward to overwhelm the guard and terrorize his mistress.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lender_intimidated\n\t\t\t\t\t\t\t\t\t\t\t*elseif psychic >10\n\t\t\t\t\t\t\t\t\t\t\t\tLashing out with the force of your pedhétl, you attempted to bind the woman to your will, commanding, \"You will show me respect!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tSadly, the face across from you, instead of bowing in subservience, broke into a grin.  \"My mind is not as weak as all that, though I give you credit for trying.\"  \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tTaking on a more thoughtful countenance, she continued,  \"I want no fighting here.  At best you will do some arcane injury to my slave with your psychic tricks before he overpowers you; at worst you will get hurt yourself and we shall both be in a great deal of trouble over it.  This is $!{Villain}'s problem; go speak to ${vilhim}.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tSeeing the wisdom of these words, you summoned the remains of your dignity and returned to the vestibule.  To your right \n\t\t\t\t\t\t\t\t\t\t\t\t*goto villain_room\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tStriking the poses that shape other-planar energies, and humming prayer, you summoned forth your own \"guards\" made of illusion and ectoplasm, but the woman seemed unimpressed.  \"These apparitions may scare others, but I doubt they could affect me more than the wind.  I, if you pardon the pun, see through your gambit.\" She chuckled at her own witticism.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"I want no fighting here.  At best you will do some arcane injury to my slave with your psychic tricks before he overpowers you; and at worst you will get hurt yourself and we shall both be in a great deal of trouble over it.  This is $!{Villain}'s problem; go speak to him.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tSeeing the wisdom of these words, you returned to the vestibule.  To your right \n\t\t\t\t\t\t\t\t\t\t\t\t*goto villain_room\n\t\t\t\t\t\t\t#\"Let us better talk of how I can be of service to you.\"\n\t\t\t\t\t\t\t\t*set dip_count +1\n\t\t\t\t\t\t\t\t\"Why would a fine aristocrat such as yourself be interested in helping me?\" she asked with suspicion.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"$!{Clan} has had many years of pleasant dealings with the Golden Lintel, and my mother, Molkár Dzái ${lineage}, in particular has relied upon your clan to handle such tawdry monetary matters as are beneath her notice when outfitting her legion.  It is loyalty to this good service that moves me to come speak with you.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (diplomacy \u003c50) and ((ritual \u003c10) or (Clan != \"White Stone\"))\n\t\t\t\t\t\t\t\t\tThe wrinkled moneylender snorted in amusement.  \"Ah, I see now.  This is about the young $!{Clan} \n\t\t\t\t\t\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\t\t\t\t\t\tgirl \n\t\t\t\t\t\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\t\t\t\t\t\tboy\n\t\t\t\t\t\t\t\t\tand ${wahis} unwise gambling, and you think that you can come in here and bludgeon me with names and titles, in the same way a thug might use a club, to rob me of my profit.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tLosing your calm at such a direct insult from such a grubby counter of coins, you shot to your feet, knuckles white upon your sword hilt.  The infuriating woman, amused at seeing her barbs hit home, clapped to summon a doughy gladiator into the room.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto evicted\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tSuspicion unallayed, she took a sip from her own wine cup, then smacked her lips.  \"So much for why.  I suppose that leaves the how….\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*if (ritual >10) and (Clan = \"White Stone\")\n\t\t\t\t\t\t\t\t\t\t*set sor_count +2\n\t\t\t\t\t\t\t\t\t\tConcentrating, you used the power of your pedhétl to summon forth a spell of Adornment, giving yourself a supernatural charm, before proceeding.\n\t\t\t\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"You recently loaned some money to my clan-cousin, $!{wave} hiTánkolel.  A paltry stream beside the river of commerce between our clans I am sure, but as you know, amongst the higher clans it is principle and not arithmetic with which we concern ourselves.  These káitars were not lent at a favorable rate, nor through the usual channels; and were the business to come to the eyes of my clan elders, the entire affair might appear quite unsavory.  It would be in the best interest of the Golden Lintel to pretend it had not occurred.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe old woman seemed charmed by your words, but in the patronizing way familiar to you from Mama Halé when you were a child, she said,  \"Pretty threats, honorable youth, but thornless ones. Clan $!{clan} are known for their honorable dealings, and would not, I think, begrudge a poor old woman for doing her duty to her clan, or that clan for fulfilling its purpose.\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I flattered the old woman.\n\t\t\t\t\t\t\t\t\t\t\t*if (diplomacy \u003c55) and ((ritual \u003c10) or (Clan != \"White Stone\"))\n\t\t\t\t\t\t\t\t\t\t\t\t*label lender_fail\n\t\t\t\t\t\t\t\t\t\t\t\tAs you opened your mouth to object, she raised a supplicating hand. \"We can talk the evening away, but will gain nothing for it but bad blood and hot tempers.  If any 'unsavory' dealings occurred under this roof, they were those of $!{Villain}, and your problem is with ${vilhim}.  Please let me summon a servant to take you to ${vilhis} rooms.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tAvoiding eye contact, she clapped to summon a sumptuously dressed servant, and bade him escort you.  Re-entering the vestibule, \n\t\t\t\t\t\t\t\t\t\t\t\t*goto villain_room\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\tSmiling, you poured more wine into her bowl.  \"I do not believe for a moment you are some lowly functionary, or 'poor old woman.'\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Save your charm and pretty words for some young girl naive enough to fall for them,\" she said, drinking deeply from the cup. \"I won't—\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto temper_temper\n\t\t\t\t\t\t\t\t\t\t#She was too sure of her security, so I put some fear into her.\n\t\t\t\t\t\t\t\t\t\t\t*if (diplomacy \u003c55) and ((ritual \u003c10) or (Clan != \"White Stone\"))\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lender_fail\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*label temper_temper\n\t\t\t\t\t\t\t\t\t\t\t\tSwitching in an instant from the languid posture of a benevolent aristocrat to that of an affronted and brash noble, you cut her off.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Do not presume to tell me how you think my clan would react.  We take the respect and deference due to us very seriously.  When I return to tell of how you not only cheated my clan-cousin, but then, when I lowered myself to speak to you on such equal terms, you also threw my generosity in my face, do you truly believe they will have such an serene view of the situation?   I assure you, they will not!\" \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tStanding, you paced above the moneylender, who began to cower. You continued, \"When a conflict arises, I know my clan will stand behind me, but I doubt yours, motivated more by desire of wealth than any finer sentiment, will care much for a wrinkled hag already sidelined to such a rickety hovel.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lender_intimidated\n\t\t\t\t\t\t\t\t\t\t#I lost my temper at her superciliousness.\n\t\t\t\t\t\t\t\t\t\t\t*if (diplomacy \u003c55) and ((ritual \u003c10) or (Clan != \"White Stone\"))\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lender_fail\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*goto temper_temper\n\t\t\t\t\t#I asked for admittance to $!{Villain}'s room.\n\t\t\t\t\t\tAs a servant moved forward to make you welcome, \n\t\t\t\t\t\t*label villain_room\n\t\t\t\t\t\tyou saw the room $!{wave} described and, hung on a hook beside the door, the méshqu plaque of Joyous Conviviality, signaling an open invitation to all of high status to enter and join the party.\n\t\t\t\t\t\t\n\t\t\t\t\t\tInside was just as $!{wave} had said, with plush cushions for guests around tables for kévuk dice and tsahltén sticks.  In the early evening, the room was sparsely populated, and all of the party-goers were adolescents like yourself.  At a tsahltén table, two young men, dressed in the diaphanous green of Lady Dlamélish's priests and the clan insignia of Sea Blue, tossed sticks in the air in between conspiratorial giggles, while an elderly judge looked on.  $!{Villain} was seated at the kévuk table, about to cast the dice.\n\t\t\t\t\t\t*label gambling_entry\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I joined the kévuk game to get a measure of the place.\n\t\t\t\t\t\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\t\t\t\t\t\t*set Noble %+20\n\t\t\t\t\t\t\t\t*set tac_count +1\n\t\t\t\t\t\t\t\tYou approached the table, placed down a bet and, appropriate to this investigative charade, selected as your deity Ksárul, god of secrets—you forget which color you chose.  $!{Villain} had bet on Ksárul's opposite, Thumís, god of knowledge, and as the carved bone dice rattled across the table, they came to rest with each showing the symbol of one of the opposed pair.  \"Poor luck for you, I'm afraid,\" the host chuckled. \"Thumís beats Ksárul, in this context.\"  \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Strange that. One would think that in a gambling den such as this the Lord of Secrets would be in his element,\" you riposted.  With a delicately arched brow, ${villain} passed you the dice. \"You lose, and you're witty.  Who could ask for more in a guest?  Welcome to my party.  Please, take the next throw.\"\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tPlay continued, and though the dice and káitars changed hands around the table, it was soon clear to everyone that the true contest was between $!{Villain} and you, who traded barbed civilities with every toss of the dice.\n\t\t\t\t\t\t\t\t*if tactics \u003c60\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYour conviction grew that something was amiss, and yet you could not pin down what caused the feeling.  As the night progressed, $!{Villain} became more gloating whenever the dice favored ${vilhim}, a superior twinkle in ${vilhis} eye.  Knuckles white with frustration, you threw the dice in one last cast, losing with the same roll as you had in the beginning.  With another of ${vilhis} grating chuckles, $!{villain} gave a languid stretch, and uttering an airy comment about \"things coming full circle\" excused ${vilhim}self from the table.\n\t\t\t\t\t\t\t\t\t*set wealth -50\n\t\t\t\t\t\t\t\t\t*if (assassination = 1) and (combat >45)\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tSeeing this villain walk away, so smug, caused your blood to boil, and with a bound you leapt to your feet, shouting a challenge.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"I don't have proof, but I know you are the architect of my clan-cousin's misfortune, and I will have satisfaction.  If you count yourself a person of honor, you will meet me in the hirilákte arena to settle the matter between us.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t$!{Villain} looked at the sword you wore at your hip, gathered ${vilhis} courage, and managed a nod.  \"Send your second to my clanhouse, and I will meet you at a time and place of your choosing.  Until then, I would appreciate it if you left my party.\" So saying, ${vilhe} turned ${vilhis} back upon you in insulting dismissal.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t$!{Vilhe} would of course pay for every insult in blood very soon.\n\t\t\t\t\t\t\t\t\t\t*goto duel\n\t\t\t\t\t\t\t\t\t*elseif psychic >30\n\t\t\t\t\t\t\t\t\t\tWishing to know the source of $!{Villain}'s smugness, you used your psychic powers to invade ${vilhis} mind.  Therein you saw the secret to ${vilhis} \"luck\" was no more than weighted dice to stack the odds in ${vilhis} favor and drugged wine to rob ${vilhis} guests of their good sense.  Once your host had left the room, you grabbed the dice from the table along with a cup and sprinted for the door, the angry protests of partiers following you.\n\t\t\t\t\t\t\t\t\t\t*goto sleuth\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tEven now, thinking back, your blood boils at the impotence you felt, but there was nothing more you could do.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe next day, the Golden Lintel representative arrived at the clanhouse, and left with coin in her purse and disorder in her wake.  \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tSoon all came to know of $!{wave}'s debt, and arguments over the appropriate punishment spilled over into daily gossip, debated as hotly as any theological point or imperial edict.  $!{wave} hid in ${wahis} parents' quarters and refused to show ${wahis} face, while duels were fought between members of the hiTánkolel lineage and others, though none to the death.  Because Mother Dzái was the most vocal in calling for harsh exemplary punishment, many of these duels were with ${lineage}s.  Though you were exempt from such challenges from the hiTánkolels, it seemed that this very leniency called your loyalty to your own lineage into question among your peers.\n\t\t\t\t\t\t\t\t\t\t*goto wave_failure\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYour first clue was the slight off-smell to the wine being lavishly poured to all around the table, and the giddy abandon you felt course through your veins upon drinking—an emotion few of these sybarites would think out of place, but which contrasted markedly with your focused tension.  Guessing that the wine was laced with ntó, you set it aside, now alert to other such gamester's tricks.  While telling some amusing anecdote, you jostled the dice casually in your palm, feeling that, yes, they had a subtle lop-sided weight to them.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tAfter a particularly lucky streak of throws, you requested the \"lucky dice\" from the host in lieu of his bet, a gesture viewed by all as so magnanimous that he had no option but to assent through gritted teeth.  Soon after, your luck turned for the worse, and you found yourself out the little coin your had on your person. Wishing a fond farewell to those about the table, you \"inebriatedly\" retired into your palanquin, refilled glass of wine still in hand.  \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*label sleuth\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tAll the ride home, you stared down at the weighted dice and the drugged wine: evidence that would clear $!{wave} and shame $!{Villain} when ${vilhe} was brought to court and sued for shámtla. \n\t\t\t\t\t\t\t\t\t*if wave_disgraced = false\n\t\t\t\t\t\t\t\t\t\tThat is, if you wanted to make it a public matter at all.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Better to see this villain publicly exposed, to save others from ${vilhis} predations.\n\t\t\t\t\t\t\t\t\t\t\t\tPutting the greater good above $!{wave}'s pride, you brought your evidence to the clan elders.\n\t\t\t\t\t\t\t\t\t\t\t\t*if (God= \"Hnálla\") or (God = \"Avánthe\")\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set Noble %+20\n\t\t\t\t\t\t\t\t\t\t\t\t*goto court_case\n\t\t\t\t\t\t\t\t\t\t\t#$!{wave}'s reputation was my only concern.  The more quietly this was handled, the better.\n\t\t\t\t\t\t\t\t\t\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set Noble %+10\n\t\t\t\t\t\t\t\t\t\t\t\tIt was just after dawn when you arrived at $!{Villain}'s clanhouse, with an urgent request for a meeting.  The tediously long wait in a sitting chamber was redeemed when a groggy $!{Villain} shambled in, clearly just awoken from a very brief sleep after ${vilhis} long night.  ${Vilhis} bloodshot eyes snapped open from their half-lidded doze when you mentioned the evidence secreted in your dormitory.  The protestations of innocence came first, followed by the pleas, and in the end ${vilhe} was blessing your benevolence at letting ${vilhim} simply pay off the debt, and its accumulated interest.  It really was a quite pathetic display.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto home_again\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto court_case \n\t\t\t\t\t\t\t#I rushed in and angrily challenged the villain to a duel.\n\t\t\t\t\t\t\t\t*if Clan = \"Red Sun\"\n\t\t\t\t\t\t\t\t\t*set Noble %+20\n\t\t\t\t\t\t\t\t*set com_count +1\n\t\t\t\t\t\t\t\tFull of righteous fury, you strode to $!{Villain} and slapped the dice from ${vilhis} hand as ${vilhe} was about to make ${vilhis} cast.  As the ivory cubes flew off into a corner, ${vilhe} whirled on you in shock, ${vilhis} look of rage fading to fearful neutrality as ${vilhe} took in your clan badge and the sword at your hip.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Your behavior here offends me, and you have wounded one I hold dear,\" you say.  \"If you count yourself a person of honor, you will meet me in the hirilákte arena to settle the matter between us.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tClearly wishing neither to refuse outright, nor to commit ${vilhim}self against you, the ignoble fool attempted to ply you with drink and talk over whatever difference had so upset you.  Not wishing to explain, and thus expose $!{wave}'s secret, you remained stoically indifferent, meeting ${vilhis} queries and cajolery with stony utterances.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLooking around at the interested assembled, ${vilhe} gathered ${vilhis} courage and managed a nod.  \"Send your second to my clanhouse, and I will meet you at a time and place of your choosing.  Until then, I would appreciate it if you left my party.\" So saying, ${vilhe} turned ${vilhis} back upon you in insulting dismissal.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t$!{Vilhe} would of course pay for every insult in blood very soon.\n\t\t\t\t\t\t\t\t*goto duel\n\t\t\t\t\t\t\t*if (God = \"Dlamélish\") or (Clan = \"Sea Blue\")\n\t\t\t\t\t\t\t\t*hide_reuse #I took some time to relax with the priests.\n\t\t\t\t\t\t\t\t\t*set dip_count +1\n\t\t\t\t\t\t\t\t\t*if God = \"Dlamélish\" \n\t\t\t\t\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t\t\t\t\tYou sauntered up to the low table, to sit upon a stack of cushions lower than those of the\n\t\t\t\t\t\t\t\t\t*if God = \"Dlamélish\" \n\t\t\t\t\t\t\t\t\t\tvery-high-clan \n\t\t\t\t\t\t\t\t\t*if Clan = \"Sea Blue\"\n\t\t\t\t\t\t\t\t\t\thigh-ranking \n\t\t\t\t\t\t\t\t\tpriests, who simultaneously turned their gazes upon you in frank curiosity.  \"When did you arrive?\" one asked right as the other said, \"Are you really there?\"  Up close, it was clear that the two were indulging in some form of narcotic.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tBefore you could reply, the one closest to you picked up the sticks before him and, in a ringing tone, sang out, \"I will throw the 'High Forest'! 200 káitars say so!\" while his compatriot, in a bored, rumbling voice, stated, \"No you won't.  I'll take that bet.\" The gilded sticks caught the light of the lamps, hung suspended in the air, then clattered prettily onto the table.  The judge sententiously studied the resulting pattern then pronounced, \"A mere 'Single Square.'\" \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWith a shrug, the loser pushed a pile of coins across the table and handed you the sticks.  \"I'm so glad you joined us.  We've been trading coins all evening, and it is rather dull.\"\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t*if God = \"Dlamélish\" \n\t\t\t\t\t\t\t\t\t\t\t#Knowing the stakes played for by the high nobility, I demurred.\n\t\t\t\t\t\t\t\t\t\t\t\t*label refuse\n\t\t\t\t\t\t\t\t\t\t\t\tThe singer sighed.  \"You're a strange one, to come to a tsahltén table, in a gambling room, in a wine house, and yet not join the fun.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if diplomacy >55\n\t\t\t\t\t\t\t\t\t\t\t\t\tIn a conspiratorial tone you confided your mission to the priests, turning $!{wave}'s debacle into a story of risk, betrayal, and love.  By the end, the priest across from you was wiping tears from his eyes, mumbling some prayer over the capriciousness of the Lady of Earthly Delights, whose notice can bring joy or torment.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tHis compatriot, however, seemed more thoughtful.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label D_secret\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"To take risks with such unconcern for consequence is a blessed act, and it is not ${wahis} fault that ${wahe} lost in any case.\" His companion told you all about $!{Villain}'s games—how he weighted the kévuk dice and subtly laced the wines with narcotics to relax, or confuse, or make one overly brave.  \"We've known forever, of course.  It's why we come, for the thrill of competing in a fixed game, for the amusing cross-effects of the spiked drinks with our current drug of fancy.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tThis was highly ignoble behavior on the host's part, and certainly cause for a court suit that would invalidate $!{wave}'s debt.  With proper humility, you asked the noble priests if they would be willing to lend their exalted voices to speak on your behalf in such a trial.  Overcome by sentimentality, they agreed.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto court_case\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\tWith this statement, both priests lost interest in your doings, and returned to their game.  What did you do then?\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto gambling_entry\n\t\t\t\t\t\t\t\t\t\t*if Clan = \"Sea Blue\" \n\t\t\t\t\t\t\t\t\t\t\t#Not wishing to repeat $!{wave}'s mistakes, I demurred.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto refuse\n\t\t\t\t\t\t\t\t\t\t#I threw caution to the wind, and the sticks into the air.\n\t\t\t\t\t\t\t\t\t\t\tTouching your amulet of Shu'uré (She of Grand Exhilaration), you exclaimed, \"I wager one hundred káitars that I can throw the 'Double Peak'!\" Thus in one gamble you risked most of the money you had brought with you for bribes, now understanding how $!{wave} could have amassed such debt so quickly.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe high voice called out, \"I'll bet against!\" as the low said, \"Two hundred káitars says ${PCHe}'ll make it!\" with strange certainty.  Make the throw you did, netting a tidy sum from the younger priest, who seemed unconcerned at having lost three bets and some five hundred káitars in two rounds of the game.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tAs the game continued, your winnings grew, giving rise to a lively debate as to whether beginner's luck, the blessing of Lady Dlamélish, or your sober state was most responsible.  In the interest of eliminating one possibility, to better focus on the other two, the priests offered you a clear crystal.\n\t\t\t\t\t\t\t\t\t\t\t*set wealth +150\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#I kept a clear head.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if diplomacy >50\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tIn a conspiratorial tone you confided your mission to the priests, explaining your need to keep your wits about you.  In your retelling, $!{wave}'s debacle became a story of risk, betrayal, and love.  By the end, the priest across from you was wiping tears from his eyes, mumbling some prayer over the capriciousness of the Lady of Earthly Delights whose notice can bring joy or torment.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHis compatriot, however, seemed more thoughtful.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto D_secret\n\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour refusal subtly branded you a bad sport, and the priests soon moved off to play some private game.  What did you do next?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto gambling_entry\n\t\t\t\t\t\t\t\t\t\t\t\t#I accepted their hospitality.\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe drársha played with your sense of time, and \"soon\" you found yourself reclining in another room of the wine house, pouring out your tale of woe to sympathetic ears while pouring brandy down your throat.  As you expressed frustration at $!{wave}'s foolish profligacy, the steadier priest chided you. \"To take risks with such unconcern for consequence is a blessed act, and it is not ${wahis} fault that ${wahe} lost in any case.\" His companion giggled and told you all about $!{Villain}'s games—how he weighted the kévuk dice and subtly laced the wines with narcotics to relax, or confuse, or make one overly brave.  \"We've known forever, of course.  It's why we come, for the thrill of competing in a fixed game, for the amusing cross-effects of the spiked drinks with our current drug of fancy.\"  \n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tAirily, they told you not to be concerned—that they would speak with $!{Villain}, threaten him with a lawsuit or social disgrace or whatever seemed most amusing at the time, and get him to repay the moneylender.  Both made little of the service, agreeing that life is too short for young love to trouble itself with anything as common as financial difficulties.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\tThat weight taken off your shoulders, you were able to relax and truly enjoy the evening.   As night deepened, and the green moon Gayél hung suspended in the view through the window frame, there was much languid complaining over the need to return to the temple and get a night's sleep, followed by a coy invitation to join the two priests.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set wealth -50\n\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I thought it better to return to my clanhouse and give $!{wave} the good news.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto home_again\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I had never spent the night with a priest of the Green Eyed Lady before and was intrigued.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tEven now that night evokes strong emotions of physical pleasure and spiritual fulfillment.  The three of you made of each other prayers to the Goddess of Fleshly Delights, who blessed you in return.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if god = \"Dlamélish\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*achieve blessed\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto home_again\n*label home_again\n*achieve save\nWhen you returned home to the clanhouse, $!{wave} was overjoyed to hear that ${wahis} problem had been solved with no one the wiser.  $!{wahe} lavished affection upon you and treated the entire incident, in hindsight, as a great adventure.  But at night, in the dark of the dormitory, ${wahe} hugged you tight and whispered, \"I know how close I came to ruin.  I won't forget this.\"\n*set wav_rep +1\n*if assassination = 1\n\t*goto duel_prequel\n*else\n\t*goto wave_count\n\n*label wave_failure\n*set wave_slave true\n\nWhen it seemed the discord, simmering in summer's relentless heat, had begun to poison the very air of the clanhouse, the luminaries of $!{Clan} in $!{Hometown} decreed that $!{wave} hiTánkolel would be sold into slavery, and that would be the end of the matter.  Though not unheard of, the punishment was an extreme one, usually reserved for intransigents, criminals, and compulsive debtors.  It was clear to all that a message was being sent about obedience to the clan, and a censure to the hiTánkolel lineage and the youth of the clan for creating such a disharmonious stir.  $!{wave} had become a goat, to be sacrificed.\n*choice\n\t#Heartbroken, I spent these last days together with $!{wave}.\n\t\tStill not leaving ${wahis} parents' suite of rooms, $!{wave} made an idyllic bubble of that last week.  While dragonflies hovered amongst the blossoms in the atrium, you two sat upon the fountain rim, as you had as children, and spoke heart to heart.  The flippant vanity that had so characterized $!{wave}'s charm gave way, and you learned that your first infatuation truly loved you, before ${wahe} was snatched away.\n\t\t\n\t\t*label goodbye\n\t\tAt dawn of the appointed day, while many in the clanhouse were still asleep, $!{wave} hiTánkolel was escorted from the premises.  As ${wahe} passed you, ${wahe} cast a tender, regretful smile, but as ${wahis} eyes broke away, the look was replaced with a mask of steely determination, such as you had never seen upon that face.\n\t\t*if assassination = 1\n\t\t\t*goto duel_prequel\n\t\t*else\n\t\t\t*goto wave_count\n\t#Determined, I looked for a way to save ${wahim} until the end.\n\t\tThat week you learned the misery of a zrné pacing the length of its cage in a menagerie.  All avenues of action were denied you.  The blankly polite servants of the House of Shining Joy knew neither where to find the moneylender nor $!{Villain}.  Mother Dzái skillfully intercepted any attempt to speak with the elders on $!{wave}'s behalf. \n\t\t\n\t\t*goto goodbye\n\t#$!{wahe} deserved ${wahis} fate; I did not concern myself.\n\t\t*set wav_rep -1\n\t\t*set lover \"none\"\n\t\t$!{wahis} last days in the clanhouse passed like any other for you, and it was not until $!{wave} had been gone a week that you felt the absence.  Walking through an atrium where you two had often sat upon the edge of the fountain to talk, you remembered the day last summer when you had dunked ${wahim} beneath the water in revenge for a splashing that left you drenched, and the surprise when ${wahe} pulled you down with ${wahim} and then, under the cool water of the cistern, gave you your first kiss.\n\t\t*if assassination = 1\n\t\t\t*goto duel_prequel\n\t\t*else\n\t\t\tNow that memory, like $!{wave}, had become a thing of your childhood, to be set aside as you moved forward into the role and responsibilities of an adult.\n\t\t\t*goto wave_count\n*label court_case\n*set wave_disgraced true\n*set status %+10\n\nThe suit against $!{Villain} was quickly taken out of your hands and put into those of the clan lawyers.  Word came of a settlement one twilight as you sat reading in the gardens.\n\n\"Cousin!\" called the apprentice law scribe, \"$!{Villain}'s clan, \n*if assassination = 1\n\t$!{nirclan}, \nsettled on paying shámtla to us.  I think they saw the scavengers circling at the scent of blood, and wished to end the entire affair before they became mired in countless suits.  A good thing, too. If we had gone to the civil court, it would have been who-knows-how-many years and filings and 'questionings' before the judges were satisfied.\"\n\nHe grinned. \"I came to you first because I thought you might wish to carry the news to $!{wave} yourself and get a hero's due reward.\"\n*goto wave_good_news\n*label Dzái_slavery\n*set wave_slave true\n\nOnce again Gayán came to wake you from sound sleep, but with no joke on his lips.  \"You are summoned to the elders, immediately.  Mama Halé is weeping, and Dzái is in a fury.  Dress, and come.\"  Without another word, he ran off.\n\nIn the receiving room, sipping fresh chumétl and looking as though they found the taste sour, sat two men and two women in the clothes of the Golden Lintel.  Across from them, with masks of frosty politeness, were Dzái and other elders.  Dzái's look at your entrance caused you to step back with a clumsy bow.  \"Wait outside,\" she commanded.\n\nHalf-dozing against the wall, you were startled back to wakefulness when the Golden Lintel envoys were escorted past by servants, all four glaring at you in passing.  One servant motioned for you to enter as they left.\n*set status %-25\n\nDzái's angry words struck like a squall as you stepped inside.  \"Of all the rash, stupid things to do! Do you know how much more this death will cost the clan than your lover's debts?  Not to mention our reputation, [i]my[/i] reputation, to have my child seen killing some old woman over money in a squalid wine house!\"\n*fake_choice\n\t#\"It was not about money, it was about honor.\"\n\t#\"She deserved to die.\"\n\t#\"I don't have to take this from you.\"\nAs you opened your mouth to speak, she turned from you in such abrupt dismissal that you momentarily forgot your words. \n\n\"Stupid my child may have been, impulsive, and rash,\" she admitted to the other elders with an imploring note, \"but if ${PCHe} has been led astray, it was only through association with the hiTánkolel brat.  You know the wealth I have brought back from Yán Kór, and the glory too.  I implore you to leave ${PCHis} punishment to me.  It's past time ${PCHe} started ${PCHis} training, in any case, and life in the legion will straighten ${PCHim} out.\"\n\nWith discreet coughs, and sipping of chumétl, the gathered elders looked around at one another and, reaching some unspoken conclusion, nodded to Dzái.  Returning the nods with a deep bow, and a salute, she turned on her heel to grasp your wrist in an oaken grip and drag you from the room.  \"You will pack this morning, say your goodbyes to Halé and your fathers, and be ready to depart by noon.  Do well in training and we will never speak of this again.\"\n\nThe rest of the walk to her chambers was silent, the only sound her sandals slapping angrily on the floor.  Then you were spun around and propelled through the door, and into the tearful embrace of Mama Halé.  She packed your things, and listened to your explanations and complaints, but would not hear of your leaving the rooms, or sending for $!{wave}, merely shaking her head.  \"Oh my sweet, best put these events behind you.  The past is even more immutable than destiny.\"\n\nWhen the sun sat high in the sky, a palanquin arrived, and you were bundled into it, with stony silence on Dzái's part, crushing hugs on Halé's, and a cautious cheerfulness on the part of your fathers, who rustled your hair while calling out advice, some earnest, but most joking, about surviving your first days in the legion.\n\nYou did not see $!{wave} that day, and by the time you next returned home for a holiday, weeks later, ${wahe} was gone, sold away as punishment for ${wahis} actions.\n*if assassination = 1\n\t*goto duel_prequel\n*else\n\t*goto wave_count\n\n*label duel_prequel\n*page_break\nThough $!{wave}'s fate was settled, your Skein of Destiny had not yet played out.  It yet pulled you onward toward the fateful duel that would lead to assassins dogging your steps, and cast a shadow over what was to come.  And so, you found yourself unable to let go of the righteous and vengeful anger you felt at how $!{Villain} had acted in such a dishonorable manner with little cost to ${vilhim}self.  Perhaps these fires would have had time to die down had not fate cast you again into each other's path, at a party where the wine flowed freely and the narcotic powders served to loosen inhibitions.  Insults were exchanged, followed by the names of seconds, and you found yourself committed to an honor duel in the hirilákte arena.\n*set wave_resolved true\n*goto duel\n\n*label duel\n*page_break\n*set duel true\nSquinting in the glare off the hot sand of the arena, you sized up $!{Villain}, who returned your look with an ironic bow.  It was clear that, whatever else happened, ${vilhe} intended to hold onto a certain panache.  A bored officiant announced to the sparse afternoon crowd the terms of the duel: short swords and shields, no armor, to surrender.  A smattering of applause greeted the announcement from the seats.  $!{Villain}'s second looked worried, in contrast to Gayán, beaming with pride at his little \n*if PCHe = \"she\"\n\tsister's \n*if PCHe = \"he\"\n\tbrother's \nfirst duel.\n*page_break\nWhen the officiant motioned for the duel to start, your opponent moved in quickly.  Looking back now, the veteran of many duels, you recognize the move as one borne of a desire to be committed before cowardice took hold, but at the time it seemed unexpectedly fierce.  You brought your shield into play, deflecting that first \n*if combat >=60\n\tstrike, and then training took over.  Combat was a choreographed dance, less about conscious thought than the quick half-conscious movement from one stance to the next, with turns and lunges, slashes and shield-work all prescribed by your partner. It was not until a jarring shock broke your rhythm that your focus was disrupted.  $!{Villain} was so close that you could feel the warmth of ${vilhis} panting breath on your cheek, a breath which quickly turned to ragged coughing.  $!{Vilhe} stood there, almost as if in your embrace, impaled upon your short sword.\n\t*goto vildie\n*elseif assassination = 1\n\tstrike. It was a harder fought battle than you had expected from this dandy, and you were glad Dzái was not present to see how clumsily you translated sparring-yard theory into life-and-death practice.  It was not so much that you were in any true danger, as that all your energy was spent in blocking ${vilhis} attacks.  You landed only casual cuts upon ${vilhis} person.  Was it the tiredness on both your parts that caused your first clean lunge to strike so true, causing not a deep wound to the shoulder, but instead skewering your opponent?\n\t*goto vildie\n*else\n\tstrike, but ${vilhe} turned the momentum into a clumsy pirouette, and began attacking you again from the other side.  The move left ${vilhim} completely open and was so pointlessly flashy that it threw you off balance, as used to as you were to fighting professionals with sensible, prescribed responses.  As you struggled to deflect the blow, you remembered an old trainer telling you how a non-combatant in their unpredictability could be more dangerous than a poorly trained soldier.  So it was with $!{Villain} you found yourself physically and psychologically off-balance, and in ${vilhis} terrified onslaught ${vilhe} managed to get a scrape across your shoulder: barely a true wound, but just enough for the legalistic weasel to claim victory and retreat in cowardice.\n\t*goto duel_lost\n\n*label vildie\n\n$!{Vilhe} looked into your eyes through the shock, and gave a fey smile.  \"And so, the heroic and honorable youth avenges ${PCHis} love upon the death of the villain.\"  $!{Vilhe} coughed and spat blood onto the sand. \"Will you make me famous in wine houses and barracks halls, retelling this story?  Will—\"  Seeing ${Vilhis} spirit-soul flee ${vilhis} body, you let go of the sword, and ${vilhe} crumpled to the sand.\n*achieve duelist\n\nAll witnesses agreed it had been an accidental killing, though there was some argument over on whose part the accident had occurred.  The official judged this a moot point from the view of the law, droned out the closing ceremonial words, and returned to her office to begin filling out the documentation.  As you were the victor, your opponent's person and any valuables upon it were forfeit to you.\n*if clan = \"Red Sun\"\n\t*set status %+10\n*if clan != \"Red Sun\"\n\t*set status %-10\n*if wave_resolved = false\n\t\n\tGathering the defeated's arms and armor, Gayán gasped.  He handed you a purse of fire-gems, an incredulous look on his face.  \"Why would the fool wear this to a duel?\"  \n\t\n\tThe gems would easily cover $!{wave}'s debt.  As you pondered their mystery, \n$!{Villain}'s second came forward to bargain with you for the corpse you had just made—a small offer in truth, much less than for a living \n*if vilhe = \"he\"\n\tman. \n*if vilhe = \"she\"\n\twoman. \n*choice\n\t#$!{vilhe} fought and died honorably; let ${vilhis} kin have ${vilhim} to bury.\n\t\tWith a grim bow the second walked off in search of slaves to bear his clan-cousin homeward.  Gayán slapped you on the back and began to walk with you from the arena.  \"What a story this will make….\"\n\t\t*set wealth +200\n\t\t*if clan = \"Red Sun\"\n\t\t\t*set noble %+20\n\t\t*if clan != \"Red Sun\"\n\t\t\t*set noble %+10\n\t\t*if assassination = 1\n\t\t\tYour cousin was saved, but you had made an enemy that day in the clan of this wastrel. \n\t\t\t*if wave_resolved = false\n\t\t\t\tThe fire-gems that went to cover $!{wave}'s debts were, unbeknownst to you, taken without permission from $!{Villain}'s clan.  Their anger over this loss, \n\t\t\t*if wave_resolved\n\t\t\t\tReturning ${vilhis} body was small comfort to ${vilhis} parents, and anger over this, \n\t\t\tand the loss of face caused by ${vilhis} public death, would not fade. \n\t\t*if wave_resolved = true\n\t\t\t*goto wave_count\n\t\t*else \n\t\t\t*goto wave_good_news\n\t#I refused; I will see ${vilhim} in a slave's grave.\n\t\tIn mute fury the second strode off, face red from more than the day's heat.  Gayán looked surprised. \"Remind me never to cross you, \n\t\t*if pche = \"she\"\n\t\t\tsister. \n\t\t*if pche = \"he\"\n\t\t\tbrother. \n\t\tIt is a cruel thing to deny a \n\t\t*if vilhe = \"he\"\n\t\t\tman \n\t\t*if vilhe = \"she\"\n\t\t\twoman \n\t\tthe chance to rest with ${vilhis} ancestors.\" He went off in search of slaves to bear your grim trophy \n\t\t*if wave_resolved = false\n\t\t\thomeward, leaving you to stare down into the pouch of cut gems, blazing like a bonfire under the sun. \n\t\t*if wave_resolved = t
