 \"You're pushing too hard, and mental fatigue can't help.\" \n\t\t\t\t\n\t\t\t\t$!{wahe} wipes sooty sweat from ${wahis} brow and hair from ${wahis} eyes. \"You're right. I just need a few minutes to close my eyes,\" ${wahe} replies. \n\t\t\t\t*if lover = Wave\n\t\t\t\t\tThe two of you find a squarish stone, cold and hard, but out of the muck, and lie side by side, limbs entangled. $!{wave} is asleep almost instantly, but you are left awake to listen to ${wahis} breathing and the steady drip drip of water off the walls. \n\t\t\t\t*if lover != Wave\n\t\t\t\t\t$!{wahe} finds a squarish stone, cold and hard, but out of the muck, and is asleep almost instantly. \n\t\t\t\tTrue to ${wahis} word, ${wahe} awakes a short time later, and with a feline stretch hops off the slab to move and examine an inscribed pillar. \n\t\t\t*selectable_if (battlelost) #\"I thought you said you just glimpsed at those papers…?\"\n\t\t\t\t$!{wave} manages to look slightly chagrined. \"Fine, I may have stayed to read a bit. Is it a crime to want to know why we're throwing ourselves against the wall of some tiny rural village for three months? Well, it probably is actually, but you can court-martial me when we get out of the Underworld, unless you want to do it here and find your own way out.\"\n\t\t\t\t\n\t\t\t\t$!{wahe} moves off to examine a inscribed pillar, pretending to be unaware of any further questions.\n\t\t*goto hole\n\n*label hole\n*if her_dying\n\t*label her_dying\n\t*set her_dying false\n\t*page_break\n\t*if die_loc !=3\n\t\tYou do not get much father before you notice that \n\tRayána \n\t*if die_loc !=3\n\t\thas begun to fall behind, walking in a daze. In the light of your torch, her side is soaked in blood, and her eyes glassy with pain. Red streaks radiate from the gash up her side. \n\t*if die_loc =3\n\t\tstumbles on the stairs after just a few steps. She stops and grips the rail, just breathing in and out. Her coughing brings up blood, and her eyes are glassy with pain. The smell of cooked meat hangs around her. \n\t*choice\n\t\t#I order her to rest.\n\t\t\tShe sits, leaning against the wall as \n\t\t\t*if die_loc !=3\n\t\t\t\tcommanded, and you try to re-dress her wounds, but the blood only flows faster. \n\t\t\t*if die_loc =3\n\t\t\t\tcommanded. \n\t\t\tLooking down, she shakes her head. \"I don't have long. I hear the Miyusál coming for me.\" She looks you in the eyes. \"Go on. The light dims and our ${Prince} needs us.  I will not mind some time alone with my thoughts before the end.\"\n\t\t\t*fake_choice\n\t\t\t\t#\"As you wish.\"\n\t\t\t\t\tYou nod and \n\t\t\t\t\t*if lover = \"Rayána\"\n\t\t\t\t\t\tkiss her on the forehead, \n\t\t\t\t\t*if lover != \"Rayána\"\n\t\t\t\t\t\tgrip her shoulder tightly, \n\t\t\t\t\tthen stand and walk away. $!{wave} and Nirún are solemn beside you, and for a time there is deathly quiet.\n\t\t\t\t\t*set her_dead true\n\t\t\t\t#\"I can't leave you.\"\n\t\t\t\t\tIn spite of her words, you sit down beside \n\t\t\t\t\t*if lover = \"Rayána\"\n\t\t\t\t\t\ther, holding her in your arms until the end comes. \"Such a tender embrace, Kási,\" she mumbles. \"Karakán willing, I will fall asleep in comfort, and awake to eternal battle.\"\n\t\t\t\t\t*if lover != \"Rayána\"\n\t\t\t\t\t\ther. \n\t\t\t\t\tHer death is peaceful and quiet, better than most, but also infinitely more lonely and strange here so far below the earth. \n\t\t\t\t\t*set her_dead true\n\t\t\t*goto her_dying2\n\t\t#Good riddance.\n\t\t\t*set dutiful %-20\n\t\t\t*if change = false\n\t\t\t\t*set noble %-10\n\t\t\tNoting the fact, you simply turn and \n\t\t\t*if die_loc != 3\n\t\t\t\tcontinue your walk. \n\t\t\t*if die_loc =3\n\t\t\t\tcontinue. \n\t\t\tKási Nirún looks as though he might object, but merely shakes his head and follows.  \n\t\t\t*if die_loc != 3\n\t\t\t\t$!{wave}, preoccupied with finding the way seems to have not even noticed.  \n\t\t\tYou move on, leaving the Heréksa to die alone beneath the earth. \n\t\t\t*set her_dead true\n\t\t\t*goto her_dying2\n\t\t#Our mission is too important and our supplies too dwindling to stop.\n\t\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t\t*set noble %+10\n\t\t\t*if (God = \"Hnálla\") or (God = \"Avánthe\") \n\t\t\t\t*set noble %-10\n\t\t\t\"Come, soldier!\" you command with a field bellow. \"We march for the glory of the ${Legionnum}, and will pursue it until death, so our names will be immortal.\" Her feverish eyes focus on you, and with a smile she quickens her pace, \n\t\t\t*if die_loc !=3\n\t\t\t\tthough it appears to cause the blood to seep faster. Still, it is a long way before she finally collapses, to lie on the floor of the tunnel.  \n\t\t\t*if die_loc =3\n\t\t\t\tbut then misses a step and tumbles halfway to the landing, where she just lies unmoving. \n\t\t\t*comment endif\n\t\t\t\n\t\t\t\"I hear them, Kási, the Miyusál come for me to take me to Lord Karakán's paradise, so I can carry the banner of the Legion of ${legion} into battle for eternity.\"  Her heart rate increases, as she stares at what you cannot see, until, with a last gasp, she stops breathing at all.\n\t\t\t*set her_dead true\n\t\t\t*goto her_dying2\n\t\t#I try to help her walk.\n\t\t\t*set dutiful %+10\n\t\t\tYou place her arm over your shoulder, grasp it and begin to walk beside her, bearing her weight. \n\t\t\t*if lover = \"Rayána\"\n\t\t\t\tShe smiles and glances at you as you walk.  \"Such a tender embrace, Kási. I will not mind dying in your arms.\"  \n\t\t\t*if die_loc !=3\n\t\t\t\tIt is a long ways before \n\t\t\t*if die_loc =3\n\t\t\t\tYou only make it to the first landing before \n\t\t\tshe finally asks to be let down to rest. Her back against a wall, she closes her eyes, breathing heavy.  \"I hear them, Kási. The Miyusál come for me to take me to Lord Karakán's paradise, so I can carry the banner of the Legion of ${legion} into battle for eternity.\"  Her heart rate increases until, with a last gasp, she stops breathing at all.\n\t\t\t*set her_dead true\n\t\t\t*goto her_dying2\n\t\n\t*label her_dying2\n\t*if die_loc = 1\n\t\t*goto A1\n\t*elseif die_loc = 2\n\t\t*goto trap\n\t*elseif die_loc = 3\n\t\t*goto ru'ún\n*label A1\n*page_break\nA torch dropped down the hole is visible as a small circle of light maybe two stories below. It squats in the middle of a hall full of cracked and fallen pillars, and Nirún had almost stumbled into it after hours of walking.\n\n\"This is definitely what we're looking for,\" says $!{wave}. \"There's a clear record of this hole being dug. The nobleman whose entertaining room this used to be,\" ${wahe} says, gesturing around the spacious hall, \"filed a complaint with Queen Nayári's government in Jakálla.\"  \n\nBeside you, Nirún whistles, impressed. \"The Generals really dug into the past to find this thing, didn't they? Ancient maps, Bednálljan court records…how did they find all this?\"\n\n\"I read that it was the undead that first told the Emperor to start looking here. Someone's illustrious ancestor, lovingly preserved for countless generations, reciting a story he heard from his own ancestor as a boy.\" $!{wave} ties a rope off on a nearby stalagmite—possibly once the base of a column?—frowns at it, and pulls back, testing ${wahis} weight. \"The Emperor had teams searching the records rooms in Avanthár and Béy Sü for months to find anything more than the town name, but when one bureaucrat finally did find a trail, she took the records and defected to ${Prince} $!{Princename}.\"\n*fake_choice\n\t#\"I bet she's in for a slow death if the Usurper ever catches her.\"\n\t\t\"No kidding,\" $!{wave} replies.\n\t\t\n\t\t\"I'll bet you fifty káitars she outlives all of us.\" Nirún's voice is strange, and thoughtful, as he stares down the hole.\n\t\t\n\t\t\"Done!\" laughs $!{wave}, taking Nirún's bet. \"Either we all get out of here and you owe me money, or we die and I don't have to pay.\"\n\t#\"We're lucky they did. How brave to take the risk.\"\n\t\t\"Brave?  A bureaucrat?\" $!{wave}'s voice is full of scorn. \"More likely she was so blinded by avarice that she couldn't think straight. And then, having grabbed the documents, was too afraid to go back.\"\n\t\t\n\t\t\"Isn't there room for altruism in your worldview?\" asks Nirún. \"Maybe she was a patriot, risking all for her clan.\"\n\t\t\n\t\t\"In my experience,\" $!{wave} says, tugging again on the rope with a frown, \"people talk about duty, but they act for themselves.\"\n\t#\"Great. I'll remember to thank her for sending me on this errand.\"\n\t\tNirún laughs sardonically. \"Yes, and she's probably reclining on cushions, fanned by servants, and without a care right now. Amply rewarded.\"\n\t\t\n\t\t\"Hardly without care.\" $!{wave} scowls. \"With a betrayal like that, she must know her days are numbered. Anyway, we have our own problems.\" \nSatisfied it's anchored, ${wahe} stops pulling on the rope. \"I think this is as secure as it's going to get.\"\n\nRappelling is a standard part of military training. You remember practicing off the side of a sákbe road as a raw recruit. However, no one feels like trusting this rope or its anchor with more than one person at a time. Nirún volunteers to go first and, before anyone can object, has leaned back out over the pit, rope wrapped around an arm guard, and agilely leaped back into darkness, a fleeting look of boyish pleasure on his face.\n\nYou see the torch lifted and his face looking up from the bottom. \"It's safe to come down.\" He pauses, looking off to the side, and then the torch moves out of your view at the bottom of the hole. Great. Sighing, you order $!{wave} \n*if her_dead = false\n\tand Rayána \nto wait here until you've gone down to belay \n*if her_dead = false\n\tthem. \n*if her_dead\n\t${wahim}. \n*page_break\nYou land with a splash in a shallow puddle that shimmers in the torchlight. You're in some kind of stone hall, with carvings on the walls, but nearby there is a large fissure, beyond which the floor continues downward at a steep angle. Nirún is leaning against the wall, foot twisted. \"I slipped in the water,\" he says, voice tight with strain. \"Help me up. \n*if lover = \"Nirún\"\n\tPlease, I need you.\"\n*if lover != \"Nirún\"\n\tIt really hurts.\"\n*choice\n\t#I give him my hand.\n\t\t*set dutiful %+10\n\t\t*if (God = \"Avánthe\") or (God = \"Hnálla\")\n\t\t\t*set noble %+10\n\t\t*set nir_rep +1\n\t\tYou walk forward and bend down, arm outstretched. Nirún's nails bite like claws as they grasp your forearm to pull your face down to his, and his eyes are deep pools of black. They expand to fill all of your world. \n\t\t\"$!{wahe}'s trying to kill me. I hear ${wahis} thoughts; ${wahe} wants the artifact for ${wahim}self. You must call ${wahim} down and kill ${wahim} while ${wahe}'s vulnerable.\"\n\t\t\n\t\t*if (psychic > 10) or (ritual > 10)\n\t\t\tThe hair on the back of your neck stands up, and you know that, somewhere nearby, psychic power is being drawn from the Planes Beyond. It must be $!{wave}. You didn't think ${wahe} had psychic powers, but it makes sense.  \n\t\t*if (psychic \u003c 10) or (ritual \u003c 10)\n\t\t\t$!{wave}.  \n\t\t*goto mara2\n\t#I tell him to wait until everyone is down.\n\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t*set noble %+10\n\t\t\"No, please. I can't stand it!\" He begins to cry, a sound disturbingly like that of a child from a man fully grown. It grates on your nerves, echoing endlessly in the stone corridor, and you know you'll do anything to make it stop. \"I'm weak. Now's ${wahis} chance. $!{wahe}'ll kill me and take the artifact for ${wahim}self. You must call ${wahim} down and kill ${wahim} while ${wahe}'s vulnerable.\"\n\t\t\n\t\t*if (psychic > 10) or (ritual > 10)\n\t\t\tThe hair on the back your neck stands up, and you know that, somewhere nearby, psychic power is being drawn from the Planes Beyond. It must be $!{wave}. You didn't think ${wahe} had psychic powers, but it makes sense.  \n\t\t*if (psychic \u003c 10) or (ritual \u003c 10)\n\t\t\t$!{wave}.  \n\t\t*label mara2\n\t\tSomehow $!{wave} has done this.  Knowing what ${wahe} ought not to know, squirming out of every difficulty with insidious lies. You know now that your only safety lies in ${wahis} death.\n\t\t*if lover = wave\n\t\t\tA tiny voice inside you objects, but is drowned out by the sound of Nirún's weeping. You have to make it stop, the crying; it hurts so much. \n\t\t*label mara3\n\t\t\n\t\tYou grab the rope, holding it steady and waving the torch side to side. \"Come down!\"\n\t\t*page_break\n\t\t$!{wave} slides gracefully down the rope at speed, ${wahis} back to you, but as you swing the fatal blow, ${wahe} catches the movement from the corner of ${wahis} eye and manages to twist, by dumb luck entangling your sword in the rope.\n\t\t\n\t\tNirún shrieks in rage, but when you turn to look at him he's gone, replaced by…you. \"Wave!\" ${pche} cries. \"It's a monster. It killed Nirún. Please. Help me.\"  $!{pche} whimpers like a child, the grating sound echoing up and down the corridor. As its attention leaves you, the volume of sound shrinks enough for you to hold a brief coherent thought in your head.\n\t\t*choice\n\t\t\t#I attack the monster wearing my face.\n\t\t\t\t*if Nir_rep >= 1\n\t\t\t\t\t*label nirhelp\n\t\t\t\t\t*set nir_help true\n\t\t\t\t\tBefore you can act, you hear Nirún's voice from behind you. \"Just run, get away from its voice.\" He begins to chant haltingly in Bednálljan Salarvyáni as you back away, buffeted by waves of psychic will ebbing and flowing with the whimperer's cries. You—the other you—leap toward $!{wave}, and then you are $!{wave}, both of them falling in a tangle. You need to stop Nirún's chanting, you need to kill Wave; you place your hands over your ears and rock back and forth in agony.\n\t\t\t\t\t\n\t\t\t\t\tAn old woman stands before Nirún calling for your blood, for vengeance, but though visibly pale he continues to chant, holding out an amulet. When he stops, so too does the constant noise, and there is an amazing silence so complete it stuns you.\n\t\t\t\t\t\n\t\t\t\t\tYou look up as Nirún shakes your shoulder. \"Come on, we need to move. I don't know how long the amulet will work, and then it will return.\" You see $!{wave} push ${wahim}self up, \n\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\tdry heaving, and hear the splash of the Heréksa landing. \n\t\t\t\t\t*if her_dead\n\t\t\t\t\t\tdry heaving. \n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tYou're only half-aware as you all scurry off down the tunnel and begin running.\n\t\t\t\t\t*achieve admirable\n\t\t\t\t\t*goto trap\n\t\t\t\t*else\n\t\t\t\t\t*label mara_fight\n\t\t\t\t\t*if steel = false\n\t\t\t\t\t\tYour sword has little effect upon your doppelgänger, but a thrust of the torch to its shoulder proves more effective.\n\t\t\t\t\t*if steel\n\t\t\t\t\t\tYour steel blade flashes in the torchlight and bites deeply into the shoulder of your doppelgänger.\n\t\t\t\t\tThe monster shrieks and tries to rake you with claws. As you parry, you see the fluid, flickering image of your body reform around the wound. Whatever this is, like many things of the ancients, it will not be easily destroyed. The only option is a retreat, hoping that whatever has bound it to this place for millennia will keep it from pursuing you.\n\t\t\t\t\t\n\t\t\t\t\tEasier said than done. Your comrades close in around you, eyes unseeing, and soon you are fighting \n\t\t\t\t\t*if her_dead\n\t\t\t\t\t\tthree \n\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\tfour \n\t\t\t\t\ton one. \n\t\t\t\t\t\n\t\t\t\t\t*if (combat > 70) or (((combat > 50) and (steel)) or ((combat > 50) and (warded)))\n\t\t\t\t\t\tYou are hard pressed, but \n\t\t\t\t\t\t*if warded\n\t\t\t\t\t\t\tmost of their clumsy strikes cannot penetrate your wards. \n\t\t\t\t\t\t*if (combat > 70) and (warded = false)\n\t\t\t\t\t\t\tare skilled enough with a blade to handle such number when you have ground to retreat to.  \n\t\t\t\t\t\t*if (combat \u003c= 70) and (warded = false)\n\t\t\t\t\t\t\tyour shiny blade can easily deflect their weapons. \n\t\t\t\t\t\tSweat runs down your brow, as with a sword in one hand and a torch in the other you fight, step by step back, down the slanted tunnel.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour arms are leaden, and your fighting becoming formulaic when you notice the sound of the whimpering fade. With every step you leave the monster farther behind, and it paces back and forth across the tunnel with frustration. Summoning a last burst of energy, you push back your friends-turned-opponents, spin, and sprint off down the corridor, hoping to lead them out of range of the horrible song. You run past exhaustion, past the time when the corridor grows silent, and when you fall panting to the floor, you are surrounded by those you have led out of danger.\n\t\t\t\t\t\t*goto trap\n\t\t\t\t\t*else \n\t\t\t\t\t\tYou put up a valiant fight, but are too hard-pressed. In desperation, you use a wild arcing sweep to push them all back, and spin to run. As you do so, you feel a sword pierce your back ribs. Every step of your headlong dash produces a wet pulling in your back, but you keep going until the terrible crying song is replaced with silence and your spasming lungs cannot take in air. \n\t\t\t\t\t\t*if combat > 45\n\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\t*if combat \u003c= 45\n\t\t\t\t\t\t\t*set wound +2\n\t\t\t\t\t\t*if wound > 3\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou fall to the floor and roll to sprawl on your back. The darkness of the tunnel closes in, and though a blurred face holds a torch over you, your eyes cannot focus on it. Far away, someone is calling your name, but stronger still is the call of the Isles of Teretané. Following that call, you move from this blackness into another, more complete one. \n\t\t\t\t\t\t\t*set fate \"dead\"\n\t\t\t\t\t\t\t*finish The Slumber of Death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tLooking to the side, you see your fellow soldiers also panting, also wild eyed, but no sign of the monster. You're safe.  You place a hand to your back and feel wet warmth, but the flow of blood has already begun to clot.  \n\t\t\t\t\t\t\t*goto trap\n\t\t\t*selectable_if (her_dead = false) #I call to Rayána for help.\n\t\t\t\t*if Nir_rep >=1\n\t\t\t\t\t*goto nirhelp\n\t\t\t\t*else\n\t\t\t\t\t*if tactics > 60\n\t\t\t\t\t\tAs you call out, you throw yourself at the hideous doppelgänger to distract it, sending the two of you tumbling into a heap. You're surprised to find that you are stronger than your double. $!{pche} does not have your nature so much as your semblance. Perhaps you could—you lock eyes with yourself, and the lament swells, and you are lost in a timeless sea of sound.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou come back to yourself, slumped against the wall of a blessedly quiet tunnel. Heréksa Rayána is leaning over you, panting heavily. \"Oh thank Karakán, Kási. I thought you might never wake up. Whatever spell it cast, you got the worst of it. You must've chased me near on a mile before falling like a puppet with its strings cut.\" She stops, bent over, hands on knees, and just breathes in and out, her ribs expanding and contracting. \"It was so busy enthralling you, it didn't notice me until I'd jabbed the torch in its—your—back.\" She shudders. \"But that barely did anything at all, so I just picked up Nirún and ran, and you two chased after me like renyú at a hunt, and it like your master. Then, it just suddenly stopped and turned back, but you kept running.\"\n\t\t\t\t\t\t*goto trap\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe Heréksa slides down the rope, torch in hand, and looks from you to your double, her brows furrowed in thought. \"Attack it!\" you yell, and whether it's because she can see some difference you can't, or just because you spoke first, she lunges at the monster with her torch. \"Run!\" she says, motioning down the corridor, and you, hearing the hideous wailing closing in once more, turn and go. You sprint forward into darkness, and once moving can't stop, until finally you can hear the pounding of your heart over the creature's magic.  \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou don't know how long it's been, but Nirún and $!{wave} are close on your heels, eyes wide in terror. When you stop, panting and gulping for air, you notice the Heréksa is not here. $!{wave} sees you look back down the way you've come and gasps, \"We can't go back. We can't fight that thing.\" \n\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#\"I know, dammit.\"\n\t\t\t\t\t\t\t\t$!{wahe} nods. \"Just wanted to make sure you weren't about to do something noble and stupid both.\"\n\t\t\t\t\t\t\t#\"We have to—\"\n\t\t\t\t\t\t\t\t$!{wahe} cuts you off before you can reply. \"She died for us to get away. I won't let you ruin that. I'm going forward and if you want to get out of here you'll follow.\" $!{wahe} holds all the cards, and you're forced to agree.\n\t\t\t\t\t\t*goto trap\n\t\t\t*selectable_if ((ritual > 10) or (psychic > 10)) #I battle the creature with sorcery.\n\t\t\t\t*if nir_rep >=1\n\t\t\t\t\t*goto nirhelp\n\t\t\t\t*else\n\t\t\t\t\tYou try to bring the force of magic against the creature, but it is clear that none of the various spells of mental control will work. Whatever this is, it's psychically powerful yet not sentient, perhaps some strange creation of the ancient times. The only palpable effects of your magic are to focus its attention back on you, and you know there is only a moment to fight before you drown in the sea of crying, leaving your body no more than a puppet.\n\t\t\t\t\t\n\t\t\t\t\tThough your spells dash against the hideous doppelgänger, nothing keeps you from bolstering your own abilities.\n\t\t\t\t\t*if psychic > 10\n\t\t\t\t\t\tYou summon a Sphere of Impermeable Quiescence, disabling all psychic phenomena around yourself. The whimpering is suddenly just a shrill cry, neither loud nor compelling. You see $!{wave} shake ${wahis} head to clear it and look around.\n\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\tRayána rappels down the rope to land at your side and \n\t\t\t\t\t\tNirún, too, emerges from the darkened corridor to stand beside you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tStripped of its powers, the thing that looks like you crouches down and continues its high keening, seemingly bewildered. No one seems to want to attack the crouching and bedraggled figure wearing your face, and when you nerve yourselves up, surrounding it, you quickly discover that it's all but impervious to your weapons, and beyond confusing to fight. It launches itself at $!{wave} and, as they roll on the ground, it shifts to become ${wahim}.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if tactics > 55\n\t\t\t\t\t\t\tWhatever this is, it appears more like a demon than anything else, and, like many demons, it may be bound to some location or place by the sorcerer who summoned it. With few options left, you call for a tactical retreat, which soon becomes a flat-out run. The whimpers follow you down the slanted hallway, then stop and finally recede.  Looking around, no one wants to go back and see what has waylaid the monster, and so you continue running, until some time later you all fall panting against the wall.\n\t\t\t\t\t\t\t*goto trap\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tStill, you try to end the monster with fire and sword thrusts—gripped in terror over the havoc it could cause if it tracks you farther down and comes upon you again unaware—but though you hack and burn, it seems only marginally injured. One moment you are fighting and the next \n\t\t\t\t\t\t\t*if her_dead\n\t\t\t\t\t\t\t\tyou feel the rip of claws along the back of your arm. Your numbed fingers drop your sword to clatter on the tunnel floor. As the others push you into a fleeing run, you manage to pick it up with your left hand.  \n\t\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\t\tyou hear a painful grunt from Heréksa Rayána. She drops her sword and doubles over, causing your defense to collapse. You all turn and run.\n\t\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe whimpers follow you down the slanted hallway, then stop and finally recede. Looking around, no one wants to go back and see what has waylaid the monster, and so you continue running, until some time later you all fall panting against the wall.\n\n\t\t\t\t\t\t\t*set wound+1\n\t\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\t\t*set die_loc 2\n\t\t\t\t\t\t\t\t*set wound -1\n\t\t\t\t\t\t\t\t*goto her_dying\n\t\t\t\t\t\t\t*elseif wound > 3\n\t\t\t\t\t\t\t\tThe darkness of the tunnel closes in, and though a blurred face holds a torch over you, your eyes cannot focus on it. Far away, someone is calling your name, but stronger still is the call of the Isles of Teretané. Following that call, you move from this blackness into another, more complete one.\n\t\t\t\t\t\t\t\t*set fate \"dead\"\n\t\t\t\t\t\t\t\t*finish The Slumber of Death\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto trap\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou ward yourself against physical attack, and launch yourself at the strange creature, hoping to kill it or render it unconscious.\n\t\t\t\t\t\t*set warded true\n\t\t\t\t\t\t*goto mara_fight\n\t\t\t*selectable_if (eye_aerial) #I use the Eye of Aerial Excellence to flee.\n\t\t\t\t*if nir_rep >=1\n\t\t\t\t\t*goto nirhelp\n\t\t\t\t*else\n\t\t\t\t\tReaching into your pouch, you \n\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\tcall to Rayána to hurry down the hole and \n\t\t\t\t\tlook around to see Nirún, stunned in the shadows, staring blankly. You grab him as $!{wave} turns to chase you, clumsy under the creature's control. The cacophony grows again as your hideous doppelgänger once more focuses on you, but you have already pushed the button on the Eye, and the \n\t\t\t\t\t*if her_dead\n\t\t\t\t\t\tthree \n\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\tfour \n\t\t\t\t\tof you are lifted into the air and flung down the hallway into darkness, almost careening off a wall. You're traveling faster then you could have imagined, generating a great wind by your passing down the long slanted corridor. Soon even the relentless cries of your pursuer fade into the distance, bringing your companions back to themselves. You're not sure how long you flee, heart pounding, but eventually the Eye weakens and its spell ends, tumbling you all to the floor of the hall.\n\t\t\t\t\t*set eye_aerial false\n\t\t\t\t\t*goto trap\n\t#I arrange a little \"accident\" here in the dark to avoid splitting the glory.\n\t\t*set nirmurder true\n\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t*set noble %+10\n\t\t*set dutiful %-20\n\t\t*set nir_rep -2\n\t\tYou reach out to grasp his forearm with your left arm, your right clutching a weapon, but his nails dig into your arm, and his eyes look directly into yours. You know he sees exactly what you plan. \"Not me. We can work together. It is $!{wave} you must kill. $!{wahe} wants the artifact for ${wahim}self, but he'll be vulnerable when ${wahe} comes down the rope. Eliminate ${wahim} and I'll lead us to the artifact. I know the way.\"\n\t\t*choice\n\t\t\t#Sounds good to me.\n\t\t\t\t*set Wavemurder true\n\t\t\t\t*goto mara3\n\t\t\t#No, it is still Nirún who must die.\n\t\t\t\tHis eyes are deep pools of black expanding to fill all of your world. His cries tear at your soul. You cannot move.\n\t\t\t\t*if (psychic > 10) or (ritual > 10)\n\t\t\t\t\tYou know this is some sort of spell, but the knowledge doesn't help. You remain frozen, half-awake.\n\t\t\t\t*goto mara2\n\t\t\t#Something is not right here….\n\t\t\t\tYou step back, but can't look away from Nirún. His eyes are deep pools of black expanding to fill all of your world. His cries tear at your soul. You cannot move.\n\t\t\t\t*if (psychic > 10) or (ritual > 10)\n\t\t\t\t\tYou know this is some sort of spell, but the knowledge doesn't help. You remain frozen, half-awake.\n\t\t\t\t*goto mara2\n\n*label trap\n*page_break\n\"What was that?\" whispers $!{wave}, and you're about to uncertainly reply when Nirún says, \"A marashyálu. A whimperer. I've read they were made in the Latter Times to guard things of great value, and that some sorcerers of Lord Ksárul can bind them. When I came down the hole, I thought I heard my sister crying, and…\" He moves off down the hall, running a trembling hand along the stone walls, over carvings of strange men sitting astride odd animals.\n\n$!{wave} dusts ${wahim}self off and looks around. \"Luckily, we ran the right direction. This hall is supposed to intersect a 'shaft that swallows the sea,' whatever that means.  We're close now.\" $!{wahe} follows Nirún down the hall, and soon overtakes him. \n*if her_dead = false\n\tThe stolid Heréksa Rayána follows behind, but \nNirún maintains his slow dreamlike pace. \n*label nirtalk\n*choice\n\t#Leave him to his thoughts.\n\t\t*goto endconvo\n\t*hide_reuse #\"What exactly is a marashyálu?\"\n\t\tHe starts, pulled from his reverie. \"A psychically powerful creature that fights by hypnotizing its foes, but you saw that. They say they they live by sucking out the internal organs of their victims, and I don't think they're intelligent. Subadím the Sorceror fought one in the epics, and destroyed it with an 'eye,' though it had turned all his crew against him. This one must have been bound to guard that hole.\"\n\t\t\n\t\tHe stares at the wall, caressing the smoothed relief. \"The epics don't convey the horror, do they? It's already hard enough to know who your enemies are, nowadays, without something that can wear the faces of others.\"\n\t\t*goto nirtalk\n\t*selectable_if (nir_help) #\"How did you drive it off?\"\n\t\tHe holds up the strange amulet, looking a little embarrassed. \"This is an Amulet of Peace Amongst the Servitors of Lord Ksárul. I looted it from a battle once, from a priest of Sárku. I've always loved Bednálljan and, well, it's very old, so I kept it. I wasn't actually sure it would work, to be honest. Especially when the whimperer turned into my mother.\" He seems lost in thought again, as if the effects of the hypnosis have not worn off. \"It was a very accurate impression.\"\n\t\t\n\t\t*if nirmurder\n\t\t\tNirún gives you a pointed look almost, but not quite, as penetrating as that of the marashyálu. \"I almost didn't do anything, but we don't know what's ahead of us, and it may take all of us to get to the artifact.\"\n\t\t*goto endconvo\n\t*selectable_if (nir_help = false) #\"Where were you during the fight?\"\n\t\t\"It had hypnotized me before you ever came down; I saw the whole thing, but I couldn't move.\"  \n\t\t*if nirmurder = false\n\t\t\tHe looks away, \"Honestly, I'd prefer not to dwell on it.\" \n\t\t*if nirmurder\n\t\t\tThere's an emphasis on \"whole thing\" that makes it clear what he saw, and that he doesn't care whether you believe his story or not.\n\t\t*goto endconvo\n\n*label endconvo\n\nThe group is in a somber, quiet mood as you march down the endless hall. The torches flicker, and your shadows play over the reliefs on the walls, but everyone is too lost in their own thoughts to speak.  You remember the rage you felt toward $!{wave} under the mental control of the marashyálu, and peek at your clan-cousin. $!{wahe} walks with confidence you would not have suspected in this place. Why did the monster single ${wahim} out?\n\nSlowly, a faint, far away rumble begins to intrude upon your thoughts, growing as you move farther along.\n*page_break\nThe shaft is perfectly square in cross-section, and made of a smooth silver metal, more metal than you have ever seen. A man-sized crack above your heads mars the perfect smoothness, and from it gushes a river of water, pouring down into endless darkness with a thundering roar. $!{wave} cups ${wahis} hands under the deluge and drinks thirstily, before splashing some on ${wahis} face and whooping. Nirún stands in the mist, smiling, arms held out to catch the refreshing spray as he looks about. \"Don't celebrate too early; we need to find a way—are we going up or down?  Across seems not to be an option.\"\n\n\"Down,\" replies $!{wave} and begins to look, walking along the edge.  \n\n*if her_dead = false\n\tRayána, after drinking deeply, pulls you aside, whispering under cover of the echoing waterfall. \"What are we going to do when we find this magic treasure? How will we get it back up; how will we get it past that monster back there, or the guards in the temple? I don't want to undermine morale, but it seems the Signaler has not thought this through.  'A soldier should always have a plan before engaging the enemy,'\" she quotes, and you recognize one of Dritlán Nuromén's endless aphorisms.\n\t*fake_choice\n\t\t#\"I think Signaler $!{wave} isn't telling us everything.\"\n\t\t\t\"You don't have to tell me that, sir. That one's as devious as the day is long.\" \n\t\t\t\n\t\t\tYou wonder what happened between the two of them to create such animosity. There are aspects of barracks life that are opaque to an officer: the card games, pranks, and black market trades. Knowing $!{wave}, you suspect ${wahe} was hip-deep in all of them.\n\t\t#\"There's too much unknown here. We need to tackle one thing at a time.\"\n\t\t\tShe nods slowly, not quite convinced. \"You're right, I guess. It's a bad situation, but there's nothing to be done for it.\" She closes her eyes and takes a deep breath before whispering \"perseverance\" to herself under her breath. \n\t\t#\"Don't worry, Rayána, I have it all under control.\"\n\t\t\t*if her_rep \u003c= 0\n\t\t\t\tThe looks she gives you is frankly skeptical. \"Yes, Kási.\" She salutes and turns to mull over the problem on her own.\n\t\t\t*if her_rep > 0\n\t\t\t\tShe gives you a quick smile. \"I suppose that's why you're the kási. I'll just have your back.\"\n\t\t*if nirmurder\n\t\t\t#\"I'm more worried about being betrayed by Nirún. Watch him.\"\n\t\t\t\t*if her_rep \u003c0\n\t\t\t\t\t\"All due respect, Kási, but I don't want to get involved in the games of the nobility. I'm here to get this treasure back to our ${prince} and hopefully live to see the sun again. That's all.\"\n\t\t\t\t*if her_rep >=0\n\t\t\t\t\tAt your words she looks even more troubled, and begins to chew on her lip. \"Are you sure, Kási? This is going to be hard enough without having to watch our backs, and I already don't trust Signaler hiTánkolel farther than I could throw ${wahim}.\"\n*comment endif\n\nSoon $!{wave} is shouting again, triumph in ${wahis} voice.  \"Here! There's a ladder.\" $!{wahe} is lying on the stone floor of the hall, waving ${wahis} torch over the edge. \"It's a bit of a reach, but not too far.\"\n\nThe ladder is made of the same metal as everything else, and fused to the side of the shaft. With a shrug, Nirún begins climbing down, back to the waterfall. Far below, you see a faint luminescence.\n*page_break\nAfter descending the height of a sákbe road, you come to the source of the light: another hallway, leading back the direction you came, and made of the omnipresent gray metal. The corridor is bathed in harsh light, as bright as the daytime sun, but with no obvious source of illumination. At $!{wave}'s gesture, Nirún swings himself into it, and the rest of you follow. Behind you, the waterfall continues its rush into the dark, and before you the unrelieved featureless gray walls curve.\n\nThere are no branchings, though the way forward often bends. The walls are featureless, but hung with large paintings at regular intervals. The art is strange, looking so realistic that it almost resembles windows into another place. In one, a woman in strange dress lies sleeping upon a beach. In another, the smiling bust of a giant man holds up a cylinder with writing on it. After the decayed glory and rubbish of the previous levels, this sparse, alien sameness is disorienting.\n\n*if her_dead = false\n\tBeside you the Heréksa is muttering prayers under his breath.  \"This is a strange place sir, so bare and yet all of metal.  I think we have stumbled into some demon's private domain!\"\n\t\n*comment endif\nNirún is entranced by the foreign architecture, and calls to $!{Wave}.  \"What is this place, Signaler?\"\n\n\"It's where our Generals' treasure lies, that's all that matters.\" replies $!{Wave} \n*if tactics \u003c=60\n\tcurtly.\n*if tactics >60\n\tcurtly, though you suspect ${wahe} knows more than that.\n*fake_choice\n\t#\"I'm with $!{Wave}, whatever this place was, it's barren now.\"\n\t\t\"Yes,\" replies Nirún, \"but why?  Why is some mysterious artifact sitting in an empty building beneath the earth?\"\n\t*if her_dead = false\n\t\t#\"Don't worry, Heréksa, we'd have to pass through a portal to enter another plane.\"\n\t\t\t\"Maybe Kási, but it's too strange,\" says Rayána.  You notice she doesn't stop her mumbled prayers, which makes $!{Wave} smirk and mumble something about country bumpkins under ${wahis} breath.\n\t#\"I think it is an ancient temple, to be clad in precious metal.\"\n\t\tNirún is intrigued by your answer.  \"A temple to whom?  These walls could be gray for Thumís or Silver for Dlamélish, or symbolic iron for one of the war gods.  Are the paintings of religious figures?  Is the cylinder the man holds a form of Eye?  A ritual object?\"  He philosophizes as you walk.\n\t#\"It's so bare and sparse, it must have a utilitarian purpose.\"\n\t\tNirún nods reluctant agreement.  \"It would remind me of a warehouse, except there's no reason for a warehouse to have such a long, thin corridor.  And the paintings, have you noticed they repeat themselves?  The man is always holding the same metal object in his hands, but the woman is lying on different beaches.\" He philosophizes as you walk.\n\t#I ignore their bickering.\n*comment endif\n\nYou have not walked long before the passage continues into a large bare room. Your eye is drawn to what looks like an armored demon of Karakán squatting in the middle of it. \n\nIt hulks unmoving over a stairway with short pillars to either side. It has one blazing scarlet eye, and three stumpy silver limbs protrude from each shoulder of its squat frame. These are held stiffly outward to block the passage between the pillars, and spin in an odd ritual gesture, angry lightning arcing out from them. It shouts commandingly at you in a language you do not understand, repeating the same phrase over and over, though it has no mouth from which to speak.\n*label demon\n*choice\n\t*hide_reuse #I placate the demon.\n\t\t*if God = \"Karakán\"\n\t\t\t*set noble %+10\n\t\tNo amount of chanting or prayers causes it to cease its droning repetition. Perhaps it is issuing a challenge, or saying some prayer to the Lord of Glorious War in a forgotten tongue.\n\t\t*set demon_count +1\n\t\t*goto demon\n\t*selectable_if (steel) #I give it my steel sword as an offering sacred to Lord Karakán.\n\t\t*if God = \"Karakán\"\n\t\t\t*set noble %+15\n\t\t*if (God != \"Hrü'ü\") and (God != \"Dlamélish\")\n\t\t\t*set noble %+10\n\t\t*set steel false\n\t\tChanting a prayer to the War God, you approach his demon and kneel before it, head bowed to the floor. You hold the sword out and place it before you. Immediately a bolt of lightning strikes the sword, melting and twisting it as your sacrifice is accepted amidst acrid smoke. The demon ceases its display of power, and its eye dims as it returns to slumber. \n\t\t \n\t\t*achieve pious\n\t\t*goto byedemon\n\t*hide_reuse #I attack the demon.\n\t\tYou sprint across the room, sword in hand, and lunge to pierce the demon in its large eye.\n\t\t*if steel = false\n\t\t\tIt is impervious to your chlén-hide sword, which bends against it almost to the point of snapping. You are soon forced to retreat by its flailing arms and shield of lightning.\n\t\t\t*set demon_count +1\n\t\t\t*goto demon\n\t\t*else\n\t\t\tYour sword pierces its eye with a large crack as it strikes at you with a bolt of lightning.\n\t\t\t*set wound +1\n\t\t\t*if wound > 3\n\t\t\t\tYou come to flat on your back, the smell of your own burning flesh hovering around you. A blurred face leans over you, but your eyes cannot focus on it. Far away, someone is calling your name, but stronger still is the call of the Isles of Teretané. Following that call, you move from this blackness into another, more complete one.\n\t\t\t\t*set fate \"dead\"\n\t\t\t\t*finish The Slumber of Death\n\t\t\t*else\n\t\t\t\tYou come to flat on your back a few lengths away from the demon, all your muscles cramping. Your back arches in pain. With bleary eyes you see that your foe is vanquished, its eye shattered, its corpse still. The lightning has ceased, and a thick black oily blood leaks onto the floor.\n\t\t\t\t\n\t\t\t\t*if ((lover != \"none\") and (lover != \"spouse\")) and ((her_dead = false) or (lover != \"Rayána\"))\n\t\t\t\t\t$!{Lover} kneels down to help you up. \"You've killed it.  I can't believe…\" $!{Lov_he} shakes ${Lov_his} head in wonder. \"I can't decide if you're brave or stupid.\"\n\t\t\t\t*if ((lover = \"none\") or (lover = \"spouse\")) or ((her_dead) and (lover = \"Rayána\"))\n\t\t\t\t\t$!{wave} kneels down to help you up. \"You've killed it. I can't believe…\" $!{wahe} shakes ${wahis} head in wonder. \"I can't decide if you're brave or stupid.\"\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\t*goto byedemon\n\t*selectable_if (her_dead = false) #I order the Heréksa to attack the demon.\n\t\t*if her_rep \u003c1\n\t\t\tRayána gets a stubborn look on her face and shakes her head. \"I won't fight a servitor of Lord Karakán. Find some other option.\"\n\t\t\t*set demon_count +1\n\t\t\t*goto demon\n\t\t*else\n\t\t\t\"Are you sure? It's a servitor of Lord Karakán. We might anger him by hurting it.\" $!{wave} snorts derisively at this. \"Only you would be worried about hurting the demon. It's more likely to kill you than the other way 'round.\" Rayána glares at $!{wave} and grips her sword tighter.  \n\t\t\t\n\t\t\tShe advances on the demon and bows. \"We must pass.\" It continues the same incomprehensible chant. \"I am sorry it has come to this,\" she says, and draws her weapon.\n\t\t\t\n\t\t\tShe leaps forward and stabs for its eye, but her sword merely bends against its impervious flesh. Though she hacks at its metallic limbs furiously, they do not even scratch. Then she steps too close and the field of sparking lightning coalesces into a bolt that throws her back. She lies twitching on the ground at your feet, muscles rigid and hair smoking, and the room goes silent. The demon's chanting has stopped, its baleful eye dimmed. Dead or asleep—you do not know.\n\t\t\t\n\t\t\tThe Heréksa crawls to her knees and vomits out all the water she had drunk up above. Her skin smells of cooked meat, and she can barely stand, but she does so, leaning on her sword as a cane. \"Do not,\" she says, turning to $!{wave}, \"think you know the limits of martial valor. Or that you can challenge my courage.\" $!{wave}, who has probably never been told off by a low-clan person in ${wahis} life, stands agape at the scene. \"Right,\" ${wahe} says, \"noted.\"\n\t\t\t\n\t\t\tRayána begins to hobble down the stairs past the now-quiescent demon. She looks like a sacrifice tied to a lightning rod above Lord Karakán's temple, and apparently the demon has accepted her as such.\n\t\t\t*set die_loc 3\n\t\t\t*goto her_dying\n\t*selectable_if (eye_aerial) #I use the Eye of Aerial Excellence to fly over it and down the stairs.\n\t\tYou back away and gather the others about you, pulling the Eye from your pouch. As you depress the button on the back, you feel yourself bob into the air. At your thought of moving, the entire group is flung forward, sailing over the demon and careening into the back wall of the room.  \n\t\t\n\t\tIt does not turn or give chase or even turn as you pass, but its display of power increases, and you hear a humming from the Eye in response.\n\t\t\n\t\tWith slightly more finesse you \"gather up\" everyone in the Eye's mysterious field and sail down the stairway. You are halfway down when the whining in the Eye reaches a painful pitch, and all your hair stands on end. You have the presence of mind to throw it away back up the stairwell as fingers of lightning reach out for it mid-flight.  The Eye is destroyed in a sudden blast, and you all tumble from the air to roll down the staircase and land in a heap at the bottom. Either the Eye has killed the demon or it has found the thing a suitable sacrifice, for the display of lightning has stopped, and it does not chase you down the stairs.\n\t\t*goto ru'ún\n\t*selectable_if (demon_count >0) #I rush past the demon.\n\t\tYou sidle to the side of the servitor of Karakán, then rush in, trying to slide under its flailing arms and down the stairs, but an arc of lightning throws you back.\n\t\t*set wound +1\n\t\t*if wound > 3\n\t\t\tYou come to flat on your back, the smell of your own burning flesh hovering around you. A blurred face leans over you, but your eyes cannot focus on it. Far away, someone is calling your name, but stronger still is the call of the Isles of Teretané. Following that call, you move from this blackness into another, more complete one.\n\t\t\t*set fate \"dead\"\n\t\t\t*finish The Slumber of Death\n\t\t*else\n\t\t\tYou come to flat on your back a few lengths away from the demon, muscles all cramping, jaw clenched. With bleary eyes you see that the lightning has ceased, and the demon appears to slumber, the fire in its eye dimmed.\n\t\t\t\n\t\t\t*if ((lover != \"none\")and (lover != spouse)) and ((her_dead = false) or (lover != \"Rayána\"))\n\t\t\t\t$!{Lover} kneels down to help you up. \"I can't believe…\" $!{Lov_he} shakes ${Lov_his} head in wonder. \"I can't decide if you're brave or stupid, but I've heard demons of Lord Karakán are impressed by courageous acts.\"\n\t\t\t*if ((lover = \"none\") or (lover = spouse)) or ((her_dead) and (lover = \"Rayána\"))\n\t\t\t\t$!{wave} kneels down to help you up. \"I can't believe…\" $!{wahe} shakes ${wahis} head in wonder. \"I can't decide if you're brave or stupid, but I've heard demons of Lord Karakán are impressed by courageous acts.\"\n\t\t\t*label byedemon\n\t\t\t\n\t\t\tTentatively, your group moves past the demon—or whatever it is—jumping over its arms, and down the stairs. Devoid of movement and lightning, it looks much less impressive; its \"armor\" is the same metal that makes up the room, and its rectangular body is fused to the floor.  You begin to doubt your initial assessment. $!{wave} is trembling with \n\t\t\t*if her_dead = false\n\t\t\t\texcitement, while Rayána appears filled with superstitious dread. \n\t\t\t*if her_dead\n\t\t\t\texcitement. \n\t\t\t*goto ru'ún\n\n*label ru'ún\n*page_break\nThere are flights and flights of strange metal stairs, punctuated by landings and short halls. Sometimes the halls lead to different stairwells, and you suspect $!{wave} might be guessing where to go at this point. The walls are mostly unadorned except for more murals depicting people or landscapes. There is little artistry or proper scale to these odd images.  \n\nThrough a door at the bottom of one flight is yet another hallway, with colored glass in the floor beside deep circular pits, and next to one of them a tall man-shaped demon shining like bronze—a ru'ún. The ru'ún is sweeping a spotless floor, oblivious to your presence.\n\nThe others peer around the door frame, and then back up the stairs to whisper.  \nNirún's voice is trembling with a mixture of nervousness and excitement. \"A ru'ún!  Maybe it can tell us where the item we seek is?\"\n\n$!{wave} dismisses this immediately. \"Everything else down here has tried to kill us. Let's not court trouble this close to our goal. It's probably like the marashyálu, and keeps to its territory.\"\n\n*if her_dead = false\n\t\"Maybe you're more afraid of what it might tell us? I think you like being the shepherd and us the flock.\" Rayána's voice is full of \n\t*if battlelost\n\t\tscorn, and the conversation reminds you of the endless bickering in the cells below the Temple of Sárku.\n\t*if battlelost = false\n\t\tscorn. \n\t*comment endif\n\t\n\t\"The Heréksa's right,\" says Nirún. \"I think you're more afraid of losing your monopoly on knowledge than you are of the demon.\"\n*if her_dead\n\t\"I think you're more afraid of losing your monopoly on knowledge than you are of the demon,\" Nirún replies, giving ${wahim} a shrewd look.\n*choice\n\t#I ignore their arguing and kick the ru'ún into a pit before it sees us.\n\t\t*if change = false\n\t\t\t*set noble %-10\n\t\t*if change\n\t\t\t*set noble %+10\n\t\tYou take a deep breath and bound into the room and across the intervening space. The sweeper begins to turn, dropping its broom. \n\t\t*if combat \u003c 65\n\t\t\tYou leap, foot out, as the bronze demon raises a sparking hand. A shock goes through you in mid-air and you collapse to the floor spasming. Another demon of Karakán! Maybe this is one of his temples, you wonder as you stare dreamily up at the featureless gray ceiling. The ru'ún stands over you, metal face expressionless, as it babbles a repeated phrase in some unknown language.\n\t\t\t\n\t\t\t*if her_dead\n\t\t\t\tNirún \n\t\t\t*if her_dead = false\n\t\t\t\tRayána \n\t\t\tcomes forward, bowing in supplication to the tall gleaming demon. \"What were you thinking?\" \n\t\t\t*if her_dead\n\t\t\t\the whispers in your ear, but he sounds bemused.\n\t\t\t*if her_dead = false\n\t\t\t\tshe hisses in your ear. \"Don't you have any respect for the General of the Gods?\"\n\t\t\t*comment endif\n\t\t\t\n\t\t\tThe ru'ún gestures jerkily, pointing at you, and back up the passage as your companion kneels beside you. With a parody of peevishness, it grabs its broom from the floor and makes sweeping motions at you in a very clear \"go away\" motion that reminds you of your grandmother. It uses the broom like this to herd you all out of the room and back down the hall, where it gestures emphatically back the way you came, before turning and returning to its room.\n\t\t\t*goto finale\n\t\t*else\n\t\t\tYou leap, foot out, and hit it in the hip right when it is off-balance. It jerkily flails at the air before toppling backward into the pit. You don't hear it hit the bottom.\n\t\t\t\n\t\t\tThe broom lies alone in the empty room, and you stoop to examine it. It is made of the same strong metal of the  \n\t\t\t*if (psychic > 10) or (ritual > 10)\n\t\t\t\tancients, which does not interfere with spell casting, \n\t\t\t*if (psychic \u003c= 10) and (ritual \u003c= 10)\n\t\t\t\tancients \n\t\t\tas the walls and floor around you.  You see that the handle is screwed into the base, and detaching the two, you are left with a fine staff.  \n\t\t\t*if (psychic \u003c 10) and (ritual \u003c 10)\n\t\t\t\tIf you got a blacksmith to make a bronze or steel spearhead that would screw on in place of the handle, it would be a fine spear.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tYou turn, prize in hand to see \n\t\t\t*if her_dead\n\t\t\t\t$!{wave} \n\t\t\t*if her_dead = false\n\t\t\t\tRayána \n\t\t\tgaping open-mouthed and Nirún looking annoyed. \"That demon's probably been maintaining this shrine to Karakán since the days of the Dragon Warriors, and you just…mugged it. I don't…\" He stops and turns away, shaking his head.\n\t\t\t\n\t\t\t$!{wave} laughs. \"Now we have one less foe and one more weapon. I say good work.\"\n\t\t\t*set staff true\n\t\t\t*set nir_rep -1\n\t\t\t*goto finale\n\t#\"We need to learn more about this place and the thing we're supposed to get.\"\n\t\t$!{wave} is too busy sputtering at Nirún's accusation to mount an objection as you step through the doorway.\n\t\t\n\t\tThe bronze demon turns at your approach, and though its mask-like metal face doesn't change, it manages to convey annoyance by shooing at you with its broom and pointing back out the door while babbling in a foreign tongue.\n\t\t\n\t\t\"It doesn't speak Tsolyáni, and it doesn't want us here. Can we move along?\" $!{wave} calls from ${wahis} spot near the door.\n\t\t\n\t\t\"That writing on its back is in ancient Bednálljan,\" Nirún says thoughtfully.  \"I think it's a spell inscription. I could try to read it if you get the ru'ún to stand still.\"\n\t\t\n\t\t\"Do you know what spell it will cast?\" asks $!{wave} in a skeptical tone.\n\t\t\n\t\t\"No.\" \n\t\t\n\t\t\"I didn't think so.\"\n\t\t*label ruun_convo\n\t\t*choice\n\t\t\t#\"Sure, how bad could it be?\"\n\t\t\t\tYou gather your courage and step closer to the ru'ún, speaking loudly and pointing at it to draw its attention. Its gestures become more emphatic, and its words change, though you still cannot understand them.\n\t\t\t\t\n\t\t\t\tMeanwhile, Nirún mumbles the words on its back under his breath.\n\t\t\t\t*if (psychic > 10) or (ritual > 10)\n\t\t\t\t\tYou feel other-planar energy gather. \n\t\t\t\t*temp die_roll\n\t\t\t\t*rand die_roll 1 10\n\t\t\t\t*if die_roll > 9\n\t\t\t\t\t*set wound +1\n\t\t\t\t\t*set nir_wound +1\n\t\t\t\t\t*if wound > 3\n\t\t\t\t\t\tThe last thing you remember is $!{wave} turning and sprinting from the room as the pressure in the air increases. Then the flash as the demon explodes, and the darkness, and the call of the Isles of Teretané.\n\t\t\t\t\t\t*set fate \"dead\" \n\t\t\t\t\t\t*finish The Slumber of Death\n\t\t\t\t\t*else\n\t\t\t\t\t\tThere is a gathering sensation, like the pressure before a storm, and a loud noise.  $!{wave} is shouting over it as ${wahe} runs from the room, then the bronze demon explodes, sending pieces of metal flying off in all directions. One slams into your pectoral, causing you to gasp in pain as it fractures your breastbone. Nirún is covered in light burns and scrapes, but miraculously saved from further harm.\n\t\t\t\t\t\t\n\t\t\t\t\t\t$!{Wave} helps you to your feet, glaring at Nirún.  \"Idiot,\" ${wahe} mutters.  \"I told you we should have left it alone.  Everything down here is dangerous.\" Ears still ringing from the blast, you follow ${wahim} back into the hallway.\n\t\t\t\t\t\t*goto finale\n\t\t\t\t*else\n\t\t\t\t\tThere's a feeling like the pressure before a storm and then, \n\t\t\t\t\t\n\t\t\t\t\t\"Go away! I know you don't have ------; the ------ is broken. Every time you ------ come back here, you've grown stranger and dumber. I'd threaten to shoot you, but you wouldn't even understand.\"\n\t\t\t\t\t\n\t\t\t\t\tSome of the words have a sudden clarity in your mind, but other are still quite unintelligible.\n\t\t\t\t\t\n\t\t\t\t\tNirún whoops, \"It worked!\"\n\t\t\t\t\t\n\t\t\t\t\tThe demon turns to him. \"I can understand you! Oh. That damned sorcerer.\" It turns its head fruitlessly in an attempt to look over its shoulder. \"What did he write on my back?\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"We're looking for an artifact….\"\n\t\t\t\t\t\t\tThe ru'ún stares at you. \n\t\t\t\t\t\t#\"Nirún, you'd better do the talking.\"\n\t\t\t\t\t\t\tHe nods, and steps forward confidently, but then seems at a loss for words. \n\t\t\t\t\t\t#I say nothing.\n\t\t\t\t\t\"Look, I want nothing to do with you.\" The demon is incredibly rude, using a very insulting pronoun, and you bridle. \"But I've been ordered to give you a message.\"\n\t\t\t\t\t\n\t\t\t\t\tWhen it next speaks, it does so with a completely different voice: \"I am the wizard Ta'ána of Tumíssa and have bound this demon to my service.\"\n\t\t\t\t\t\n\t\t\t\t\t\"'Demon,' indeed!\" scoffs the ru'ún in its own voice before continuing with the message.\n\t\t\t\t\t\n\t\t\t\t\t\"I claim the interfogulator by right of salvage, and shall return for it shortly. My sight is as keen as the Eye of Ksarúl, and I will hunt down any who steal my prize.\"\n\t\t\t\t\t\n\t\t\t\t\tThe ru'ún pauses. \"What a windbag.\"\n\t\t\t\t\t\n\t\t\t\t\t$!{wave} chuckles to ${wahim}self. \"'Shortly,' my foot. I read about Ta'ána in the Generals' notes. She died before the First Imperium. She won't be coming back.\"\n\t\t\t\t\t\n\t\t\t\t\tThe ru'ún turns to look at $!{wave}. \"You're here for the interfogulator, then. Well, take it. It's been on a pallet in loading dock five for fifteen thousand years, and all it does is bring annoying ------- like you down here after it. That and distort space-time, which is quite annoying. Why would I want to switch places with my parallel self?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I don't know what ------- means, but I'm tired of this demon insulting me.\n\t\t\t\t\t\t\t*set noble %+15\n\t\t\t\t\t\t\tYou grip your weapon and challenge the demon to a duel.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\t\tRayána looks very impressed at this display of bravado, and gives a low whistle.\n\t\t\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I have a -----; you'd lose.\" It stares at your blank expression. \"I can make lightning. Go away.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t$!{wave} puts a hand on your arm. \"We should just go. It's a demon; who knows what powers it has. Besides, it's clearly crazy.\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"No. My honor must be redeemed.\"\n\t\t\t\t\t\t\t\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t\t\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t\t\t\t\t*if (steel) and (combat > 50)\n\t\t\t\t\t\t\t\t\t\tThe ru'ún is raising its hand to point at you, and you move to slice off its wrist. Your sword bangs against its hard flesh, leaving a scratch. You think the jarring stop twisted something in your elbow, and the ru'ún looks barely hurt, but it stares at the wound.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"This is not worth it. I am very sorry. I humbly beg your forgiveness for being rude. I am just a cleaning ru'ún; please leave me to my work?\" The bronze demon stares at the scratch and attempts to rub it away.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\t\t\t\t\t\tRayána is breathy with excitement as she turns to $!{wave}. \"The Kási just defeated a demon of Lord Karakán in a duel. This will go in the legion record book when we get back.\"\n\t\t\t\t\t\t\t\t\t\t\t*set legend true\n\t\t\t\t\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tHonor mollified, and sure you could not actually hurt the thing if you tried, you draw yourself up. Haughtily you walk from the room.\n\t\t\t\t\t\t\t\t\t\t*achieve legend\n\t\t\t\t\t\t\t\t\t\t*goto finale\n\t\t\t\t\t\t\t\t\t*elseif combat >50\n\t\t\t\t\t\t\t\t\t\tThe ru'ún is raising its hand to point at you, and you move to slice off its wrist, but the chlén-hide weapon just skitters off its shining skin without leaving a mark.\n\t\t\t\t\t\t\t\t\t\t*goto ruun_lose\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYou draw your sword as the bronze demon raises a sparking hand.  \n\t\t\t\t\t\t\t\t\t\t*label ruun_lose\n\t\t\t\t\t\t\t\t\t\tA shock goes through you and you collapse to the floor spasming. More lightning. This must be one of Karakán's temples, you think as you stare dreamily up at the featureless gray ceiling. The ru'ún stands over you, metal face expressionless, as it speaks.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Take your friend and go.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tIt grabs its broom from the floor and makes sweeping motions at you in a very clear \"go away\" motion that reminds you of your grandmother. It uses the broom like this to herd you all out of the room and back down the hall.\n\t\t\t\t\t\t\t\t\t\t*goto finale\n\t\t\t\t\t\t\t\t#\"I've killed sorcerers before, demon. Apologize.\"\n\t\t\t\t\t\t\t\t\tThe ru'ún stares at your for a moment, and then in its monotone voice says, \"I am sorry. I am charged to be 'polite and welcoming' to guests of --------  ----------  ---------. It's been a very trying few millennia, but that's no excuse.\" It bows, then returns to its sweeping.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tHonor mollified, you draw yourself up and haughtily walk from the room.\n\t\t\t\t\t\t\t\t\t*goto finale\n\t\t\t\t\t\t\t\t#\"Fine, let's go.\"\n\t\t\t\t\t\t\t\t\tAs you leave to continue your quest, the ru'ún picks up its broom and begins assiduously cleaning away your footprints. Nirún glances back at it wistfully.\n\t\t\t\t\t\t\t\t\t*goto finale\n\t\t\t\t\t\t#\"Space-time?\"\n\t\t\t\t\t\t\tThe ru'ún stops to think, then begins to talk slowly, as if to a child. \"It moves a person to another plane. You know what a plane is?\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tNirún nods, like he's back in temple school. \"We would call it a heaven. It's where demons come from.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Some of them have demons, which I am not, or are very strange, but most of them are just like here, only slightly different. There's probably one where you died a few days ago and I didn't have to be bothered with this conversation. Maybe I could use the interfogulator to go there.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou hear $!{wave} snort behind you. \"Sort of prickly, isn't he?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"But how did it get here? You said it was on a dock, but we're underground.\" Nirún's voice is enraptured.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe ru'ún pauses in thought, standing perfectly motionless. \"These holes lead to roads beneath the earth,\" it says, motioning to the pit behind it. \"There are…carts?…that run along them. The interfogulator was being shipped. Of course the carts won't work without a ------. So people come for it, but have a hard time getting it out.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tNirún asks more questions, but it quickly becomes clear that the ru'ún does not know how you could make the underground carts work, and is growing bored of its role as teacher. Eventually even your fellow Kási takes the hint, and allows himself to be led away.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs you leave to continue your quest, the ru'ún picks up its broom and begins assiduously cleaning away your footprints.\n\t\t\t\t\t\t\t*achieve scholar\n\t\t\t\t\t\t\t*goto finale\n\t\t\t\t\t\t#Let's retrieve our prize and get out of here.\n\t\t\t\t\t\t\t\"We know the artifact is here in one of these docks, though why they call them that I have no idea,\" you say. You imagine that $!{wave} looks smug at your words, but ${wahe} doesn't venture giving any information.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs you leave to continue your quest, the ru'ún picks up its broom and begins assiduously cleaning away your footprints. Nirún glances back at it wistfully.\n\t\t\t\t\t\t\t*goto finale\n\t\t\t*hide_reuse #\"What exactly is a ru'ún?\"\n\t\t\t\t\"They are magical constructs like the marashyálu. Made long ago by sorcerers to guard their temples and treasures. I've read that some of them can make lightning, and others can throw small metal balls so fast you can't even see them,\" says Nirún. He pauses and looks at the gesticulating bronze man. \"This one seems harmless, though.\"\n\t\t\t\t\n\t\t\t\t*if her_dead = false\n\t\t\t\t\t\"I have to agree with the Signaler,\" says Rayána in a pained voice. \"We don't know what that spell does, and you're no sorcerer, Kási Nirún. This is beyond strange.\"\n\t\t\t\t*goto ruun_convo\n\t\t\t#\"No, let's just leave it be.\"\n\t\t\t\tWith a sigh Nirún turns from the demon. He casts longing glances back over his shoulder as you all leave the room.\n\t\t\t\t*goto finale\n\t#\"$!{wave} is right. Let's just move on.\"\n\t\t$!{wave}, about to sputter an angry retort to Nirún, stops and smirks. \"Thank you, cousin, for realizing that we're on a military expedition and not some scholarly tour.\"\n\t\t\n\t\tYour fellow Kási glares at ${wahim}, but then nods. \"You're right. We need to focus on our duty.\"\n\t\t\n\t\tYou continue past the room, and the demon doesn't even look up.\n\t\t*goto finale\n\n*label finale\n*page_break\nA handful of turns and stairways brings you to a near-identical room, with the same pits and colored panels, and in the middle the object of your quest. The artifact is underwhelming in appearance: a waist-high black stone block with dull silver filigree and other odd ornamentation. In fact, you might have overlooked it were the rooms not so bare, or if $!{wave} had not gasped and gone to run hungry eyes over it at once. \n*if (ritual > 10) or (psychic > 10)\n\tBeing near it makes you feel slightly nauseated, and you sense that casting magic here would be unsafe. \n*comment endif\n\nNirún walks around it with a critical eye. \"So this is what it's all been about….\" \n\nHe looks up at you and stiffens. \"I can't let you go back with this, \n*if nir_rep \u003c 0\n\t${lineage}. \n*if nir_rep >= 0\n\t$!{name}. \nThe glory that will come from it is too great, and I was never supposed to let you survive \n*if battlelost\n\tthe battle.  \n*if battlelost = false\n\tthis little adventure.  \nI \n*if nir_rep \u003c 0\n\tcan't say I \nam sorry it's come to this. My clan has its grievances, and \n*if nir_rep >= 0\n\tI've been ordered to carry them out. I hope we can face our destinies as honorable soldiers and—well, for my part—if I win, I'll make sure everyone knows you died in service to our $!{Prince}.\"\n*if nir_rep \u003c 0\n\tI'm glad to be the agent of their retribution, but even you deserve an honorable death in a fair combat.\"\n*comment endif\n\nIn the silence that follows his awkward, obviously rehearsed speech, a look of desperate frustration comes over his features. \"Family loyalty is one thing, but I am not some assassin or thug to be sent for a quiet killing in the dark!\"\n*choice\n\t#\"What, am I supposed to thank you for that?\"\n\t\t*if nir_help\n\t\t\t\"You know I've saved your life when I could have stood aside, but no, \n\t\t*if nir_help = false\n\t\t\t\"No, \n\t\tI suppose not. \n\t\t*if nirmurder\n\t\t\tEven though it was more of a chance than you were going to give to me back in that damp pit. \n\t\t*if saveallies\n\t\t\tYou saved my entire tsurúm.\" He runs a hand up through his hair, exhaling. \"Nothing I do can balance that out. \n\t\tI'm doing this for me, not for you. I'm doing it because a \n\t\t*goto nirchat\n\t#\"Why?\"\n\t\t\"Why am I saying this to your \n\t\t*if nir_help\n\t\t\tface? Why did I save you when I could have let the marashyálu do my murder for me?\" \n\t\t*if nir_help = false\n\t\t\tface?\" \n\t\t*comment endif\n\t\t\n\t\tHe clenches his jaw and stares you in the eyes. \"Do you have such a low opinion of my honor? I'm telling you because \n\t\t*if saveallies\n\t\t\tyou saved my entire tsurúm.  I owe you a debt for that which I can't repay.  And because \n\t\ta \n\t\t*goto nirchat\n\t#\"You want a fight, I'm happy to oblige.\"\n\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t*set noble %+10\n\t\t\"I'm glad you understand. What are words to soldiers at a time like this?\"\n\t\t\n\t\tThe two of you begin to circle each other, the alien room becoming a hirilákte arena. Nirún seems at ease, the tension fading as he limbers his sword arm.  Out of the corner of your eye you see that \n\t\t*goto verge\n\t#\"I can't believe this….\"\n\t\t\"A \n\t\t*label nirchat\n\t\tsoldier can't choose whether to serve or whom to serve, but we find our honor in how we serve.  \n\t\t*if nir_rep >0\n\t\t\tI'm sorry, but it \n\t\t*if nir_rep \u003c=0\n\t\t\tIt \n\t\thas to end this way. You cut short your Skein of Destiny the day you crossed $!{Nirclan}.\"\n\t\t\n\t\tHe slashes at the air, battling his thoughts.\n\t\t*if assassination = 2\n\t\t\t\"Do you even remember his name? My cousin you killed? \n\t\t\t*if clan = \"Sea Blue\"\n\t\t\t\tOr is mighty Sea Blue so far above us that we're beneath notice? \n\t\t\tBecause we remembered $!{Cousin} and will avenge him.\" \n\t\t\t*achieve notice\n\t\t*if assassination = 4\n\t\t\t\"My cousin $!{Cousin}'s death in that brawl was a tragedy, and yet the courts denied us redress.  I know \n\t\t\t*if nir_rep \u003c0\n\t\t\t\tyou claim \n\t\t\tit was an accident, but you've seen enough of war to know what intentions count for. Soldiers have to be ransomed, battles have to be won, and wrongs have to be repaid.\" \n\t\t*if assassination = 3\n\t\t\t\"I don't agree with my uncle, and I know my cousin $!{Cousin} is happier in that monastery, but since when does happiness matter next to duty? Did you think you could save ${wahim}?  Well, ${wahe} escaped \n\t\t\t*if wahe = \"he\"\n\t\t\t\this, \n\t\t\t*if wahe = \"she\"\n\t\t\t\thers, \n\t\t\tbut now a heavier one has fallen on me.\"\n\t\t*if assassination = 1\n\t\t\t*if wave_slave = false\n\t\t\t\t\"You traded my cousin's life for that of yours.\" \n\t\t\t*if wave_slave\n\t\t\t\t\"You took my cousin's life in repayment for that of yours.\" \n\t\t\tHe motions dismissively at $!{wave}, who merely arches an eyebrow. \"And yes, $!{Villain} was a wastrel, but so was ${wahe}.\"\n\t\t*comment endif\n\t\t\n\t\tAs his fist tightens around his weapon, his voice fills with \n\t\t*if nir_rep >0\n\t\t\thelplessness and \n\t\ta directionless anger. \"So pick up your sword and face \n\t\t*if lover = \"Nirún\"\n\t\t\tme before my heart breaks.\" \n\t\t*if lover != \"Nirún\"\n\t\t\tme.\" \n\t\t*fake_choice\n\t\t\t#I pick up the sword.\n\t\t\t\tWordlessly, you step forward, sword held to parry his attack. The two of you begin to circle each other, the alien room becoming a hirilákte arena. Out of the corner of your eye you see that \n\t\t\t#\"Let me explain….\"\n\t\t\t\t*if assassination = 1\n\t\t\t\t\t\"It was a fair duel and ${Vilhe}—\"\n\t\t\t\t*if assassination = 2\n\t\t\t\t\t\"He had besmirched my honor, and I paid the shámtla—\"\n\t\t\t\t*if assassination = 3\n\t\t\t\t\t\"This isn't about duty, this is about a bitter thwarted old man throwing a fit—\"\n\t\t\t\t*if assassination = 4\n\t\t\t\t\t\"I still dream about that night, and if I could go back and change—\"\n\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\"Save your breath, Tiúni,\" your cousin cuts across your protestations of innocence. \n\t\t\t#\"Maybe this personal vendetta can wait?\"\n\t\t\t\t*if God = \"Hnálla\"\n\t\t\t\t\t*set noble %+10\n\t\t\t\t\"You'd risk this? Our legion, this mission, our $!{Prince}'s chance at victory over a stale vendetta? There are bigger concerns right now.\" You motion around the alien subterranean room, and at the interfogulator resting upon its palette.\n\t\t\t\t\n\t\t\t\t*if nir_rep \u003c=0\t\n\t\t\t\t\t\"What, trying to weasel out? Buy yourself time?\" Nirún's voice is dismissive, and he flicks his sword out in a feint.\n\t\t\t\t*if nir_rep >0\n\t\t\t\t\t\"What do you suggest? I can't let you return with the item, to get the glory, and tell this tale.\"\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tBefore you can respond, you notice that \n\t\t\t*selectable_if (lover = \"Nirún\") #\"I won't fight you.\"\n\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t*set noble %+10\n\t\t\t\tNirún looks tormented. \"Please, don't make this harder than it is. I can't let you leave here, but I won't cut you down like a slaughtered hmá.\" \n\t\t\t\t\n\t\t\t\tSuddenly, \n\t\t\t*selectable_if (lover = \"Nirún\") #\"How could you?\"\n\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t*set noble %+10\n\t\t\t\tNirún looks tormented. \"Please, believe me, if there were any other way…. I have orders, and I am who I am. I can no more change our future than you can go back and change the past. I should never have come to your tent that night.\" \n\t\t\t\t\n\t\t\t\tSuddenly, \n\t\t*goto verge\n\n*label verge\n$!{wave} is standing, an Eye pointed at Nirún.\n\n*if lover = \"Nirún\"\n\t\n\t\"As sweet as this little lovers' quarrel is,\" ${wahe} says, stalking \n*if lover != \"Nirún\"\n\t$!{WaHe} stalks\nto the side of one of the pits and stamping down on a blue glass panel, Eye still trained on Nirún, \n*if (Assassination = 1) and (wave_slave)\n\t\"I'm afraid I need to interrupt.\" $!{wahis} face is twisted in rage, though ${wahe} maintains an urbane tone, looking Nirún up and down. \"So you're the cousin of that piece of filth $!{Villain}. Your words have moved me. We do have a duty to repay like for like, don't we? And ${Vilhe} ruined my life, so…\"\n\t\n\t*label wav_kills_nir\n\t*set nir_dead true\n\tWith a flick of ${wahis} wrist ${wahe} sends a concussive wall of force out from the Eye. It picks up Nirún like a doll and smashes him into the metallic wall on the other side of the pit.\n\t\n\t$!{wave} stares at the crumpled Kási. \"What a waste, especially when we've gotten this far. Why did he have to choose now to let his pedhétl take charge?\" $!{wahe} turns to look at you.\n\t*goto wav_reveal\n*elseif wav_rep >0\n\t\"I can't let you kill my cousin. After that rambling speech on familial duty, I'm sure you understand.\" $!{wahe} flicks ${wahis} eyes to you momentarily. \"What do you want me to do?\"\n\t*choice\n\t\t#\"Kill him.\"\n\t\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t\t*set noble %+10\n\t\t\t*if (God != \"Hrü'ü\") and (God != \"Dlamélish\")\n\t\t\t\t*set noble %-10\n\t\t\t*set her_rep -1\n\t\t\t*set wav_rep +1\n\t\t\t*achieve unforgiving\n\t\t\t*goto wav_kills_nir\n\t\t#\"No, let us duel.\"\n\t\t\t*set noble %+15\n\t\t\t*set dutiful %+15\n\t\t\t*set nir_rep +1\n\t\t\t*goto no_fight\n\t\t#\"Let him live.\"\n\t\t\t*if (God = \"Avánthe\") or (God = \"Hnálla\")\n\t\t\t\t*set noble %+10\n\t\t\t*if (God != \"Avánthe\") and (God != \"Hnálla\")\n\t\t\t\t*set noble %-10\n\t\t\t\"Are you sure?\" $!{wave}'s voice is full of skepticism. \"I don't want to have to watch your back with every step we take.\" $!{wahe} turns to Nirún. \"Maybe you could give your parole? I think your word means too much to you for you to break it. You have to see how futile carrying out your clan's orders now is.\" With a step back, ${wahe} moves to put both of you in the Eye's line of fire.\n\t\t\t\n\t\t\t*goto wav_reveal\n*else\n\t*label no_fight\n\t\"I won't have you two killing each other. If nothing else, that artifact looks heavier than I can carry. So drop your swords, both of you.\" $!{wave} gestures at you both with the Eye in a flicking motion.\n\t\n\t*label wav_reveal\n\t\"Besides, we're not going back to Sangmiré, and no one's getting covered in any \n\t*if nir_dead = false\n\t\tglory, so there's nothing for you two to be fighting over.\" \n\t*if nir_dead\n\t\tglory.\" \n\t$!{wahe} smirks. \"Well, I might get some glory when Spymaster Vridékka and the Emperor see the new toy I've brought them. We're going to Avanthár.\"\n\t*fake_choice\n\t\t#\"Seriously? Is anyone else actually trying to accomplish this mission?\"\n\t\t\t*if her_dead = false\n\t\t\t\t\"I am, Kási,\" Rayána replies, from where she's been forgotten, pressed up against the wall. She eyes the other two warily, her stillness that of a predator about to pounce.\n\t\t\t\t\n\t\t\t*if nir_dead = false\n\t\t\t\tNirún looks down, cheeks suffused, but \n\t\t\t$!{wave} merely laughs. \"We didn't come down here for our health. I'm sure the Kási \n\t\t\t*if nir_dead = false\n\t\t\t\tintends \n\t\t\t*if nir_dead\n\t\t\t\tintended \n\t\t\tto return the artifact to his superiors, as do I. It's the same mission, just a different endpoint.\"\n\t\t#\"Wait, why?\"\n\t\t#\"Like hell we are!\"\n\t\t\t\"Oh, don't be so rash.\" \n\t\t#\"You're betraying me too?\"\n\t\t\t*if wav_rep \u003c=0\n\t\t\t\t\"Is that so surprising? You've let me down often enough. I'm sure you'll live.\" $!{wahe} pauses in thought. \"Unless you do something really stupid.\"\n\t\t\t*if wav_rep >0\n\t\t\t\t\"No!\" $!{wave} is indignant. \"I'm doing this for us. Do you have any idea the riches that will be showered on you when we \n\t\t\t\t*if lover = wave\n\t\t\t\t\tarrive? This is our happily ever after.\"\n\t\t\t\t*if lover != wave\n\t\t\t\t\tarrive?\"\n\t*comment endif\n\t\n\t$!{wahe} begins to pace, Eye kept trained, back to the corner.  \"Emperor Eternal Splendor is the rightful heir to the Imperium, and more importantly the only one of his siblings strong enough to end this war quickly. Do you think it really matters whose ass graces the Petal Throne? Are we supposed to keep fighting ourselves while the Mu'ugalavyáni and Salarvyá and Yán Kór all eat away at our borders? Emperors come and go and bring their favored gods with them, but the Empire remains. The whole point of the damned Kólumejálim is to avoid this kind of dynastic struggle.\" \n\t\n\tYou've never heard $!{wave} sound so impassioned, or really ever speak about politics, and it takes you a bit aback. \n\t\n\t*if nir_dead = false\n\t\tNirún is less impressed. \"The Usurper should have thought of that when he declared himself Emperor without a fair Kólumejálim then. Don't pretend he didn't start this war,\" he spits. \"And where's your loyalty? To your clan and their heir, their interests and their god? It seems to me you're just an opportunist trying to finagle yourself onto the winning side.\"\n\t\t\n\t\t*if wave_slave\n\t\t\t\"My loyalty to them? What loyalty did they ever show me, that I should care for them? They sold me into slavery. It was Vridékka who bought me, who saved me from a life as some house servant or scribe, beaten whenever my master felt like it.\"\n\t\t*if wave_slave = false\n\t\t\t\"Don't pretend you know me.\"\n\t\t*comment endif\n\t\t\n\t\tYour cousin's voice is full of pride. \n\t\"I worked long and hard to get where I am. From \n\t*if wave_slave = false\n\t\tinformant \n\t*if wave_slave\n\t\tslave \n\tto useful spy, and finally an actual rank in Vridékka's new Omnipotent Azure Legion. You speak of loyalty to the Legion of ${legion}; well I have my loyalty too, to those who fight for the Empire with cleverness and deceit instead of swords.\"\n\t\n\t$!{wahe} takes a steadying breath, eyes fixing on your face.\n\t*if wave_slave\n\t\t*achieve bitter\n\t*if wav_rep > 0\n\t\t\"But I remember my old loyalties too,\" ${wahe} says, the pride ringing in ${wahis} voice momentarily replaced by pleading, \"and that's why \n\t\t*if gov_suicide\n\t\t\tI handled that problem with the governor back in Sangmiré for cousin Shém.  It's why \n\t\tI want you to come with me. Willingly. We can make good for ourselves in this, and even extend protection to $!{Clan} if that's important to you. We'll be important people, valued and respected. I can't give you the artifact, but I can give you that.\"  \n\t*if wav_rep \u003c= 0\n\t\t\"So, I'm taking the artifact for them, for those who have actually rewarded my loyalty. And you can come, as my prisoner, as my cousin, or you can die \n\t\t*if nir_dead\n\t\t\there and have your bones rot beside Kási Nirún's.\"\n\t\t*if nir_dead = false\t\n\t\t\there.\"\n\t*page_break\n\tAs ${wahe} finishes speaking, there is a whirring sound accompanied by a wind, and a large sphere emerges from the pit to hover beside $!{wave}. It's bigger than a prince's palanquin, but floats in the air like a feather. A door on its side opens, and the glass below $!{wave}'s foot turns to yellow. \"My palanquin awaits. Time to decide.\"\n\t*choice\n\t\t#\"I'll go with you.\"\n\t\t\t*if God != \"Dlamélish\"\n\t\t\t\t*set noble %-20\n\t\t\tYou drop your sword, and have begun to walk forward before it even rings against the floor. \"You're right. You win.\" \n\t\t\t*if (nir_dead = false) and (her_dead = false)\n\t\t\t\tThree pairs of eyes follow you. Nirún looks a breath away from charging. \n\t\t\t*if (nir_dead = false) and (her_dead)\n\t\t\t\tTwo pairs of eyes follow you. Nirún looks a breath away from charging. \n\t\t\t*if (nir_dead) and (her_dead = false)\n\t\t\t\tTwo pairs of eyes follow you. \n\t\t\t*set fate \"defect\"\n\t\t\t*goto nir_reptest\n\t\t#\"I'll go with you.\" (Lie)\n\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\t*set noble %+20\n\t\t\t*if (wav_rep >1) and (diplomacy >60)\n\t\t\t\tYou drop your sword, and have begun to walk forward before it even \n\t\t\t\t*if steel\n\t\t\t\t\trings \n\t\t\t\t*if steel = false\n\t\t\t\t\tclatters \n\t\t\t\tagainst the floor. \"You're right. You win.\"\n\t\t\t\t\n\t\t\t\t*if (nir_dead = false) and (her_dead = false)\n\t\t\t\t\tThree pairs of eyes follow you. Nirún looks a breath away from charging. \n\t\t\t\t*if (nir_dead = false) and (her_dead)\n\t\t\t\t\tTwo pairs of eyes follow you. Nirún looks a breath away from charging. \n\t\t\t\t*if (nir_dead) and (her_dead = false)\n\t\t\t\t\tTwo pairs of eyes follow you. \n\t\t\t\tAs you appr
