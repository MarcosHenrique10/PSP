ages. The result is a subtle pattern of escapes.\n*goto romance\n\n*label fire_gen\n*page_break\nIt does not take long to find the fig leaf to justify the hungered-for destruction. A document in the Governor's archives, a horoscope for the city, shows that Sangmiré's rite of ditlána, of urban renewal, had been due some sixty-seven years previously, but was put off by a parsimonious governor who found bribing the priesthoods a lower cost than the rebuilding of such a sizable town. Not an uncommon secret to find in a city's history. Béy Sü is some 378 years past due, with no one sure how to even accomplish the task of razing and rebuilding the nation's capital in an orderly fashion, but the delay here is enough to justify action.\n\n\"It is because of such laxity,\" people say, \"that Lord Vimúhla has sent us war, has caused our princes to tear apart our nation. Destruction is inevitable; it must be respected, and if not served in an orderly way, will come nonetheless.\"\n\nBefore such talk can gain a foothold amongst the ranks, you gather your courage and arrive with Kási Nirún to clap for entry at the Generals' tent. \n*if courtmarshal\n\tYou are left by a functionary to cool your heels for multiple hours without food or drink, and when finally ushered in, given insultingly flat cushions to kneel upon.  $!{AlliedGeneral} looks at Nirún speculatively while sipping an iced sherbet, but $!{general} is more blunt with you. \"I did not expect you to darken my tent anytime soon.  Anxious for your punishment?\"\n*if courtmarshal = false\n\tThe Generals are in conference, a functionary explains, but in the meantime you are sat upon stacks of cushions and given sherbet to drink. The hour or so passes quickly enough, though Nirún looks glassy with nervousness. When you are ushered in, the Generals motion you to more cushions and gesture for you to speak.\n*comment endif\n\nNirún looks to you for support, takes a stiffening breath, and begins to lay out his observations of the situation brewing and its political ramifications. Nervous he may be, but clearly trained in oratory and logic as well. $!{AlliedGeneral} raises her brows in bemusement and says, \"I did not know I had a budding bureaucrat for a nephew,\" which makes Nirún blush.  \"You make a good point, but intelligence is useless without an accompanying strategy. What would you have us do?\" Nirún seems taken aback, clearly having expected to dump the problem in mother's lap and watch it be solved.  \n\n\"I would steal the priest's momentum,\" you pipe up. \"The soldiers still feel their losses and resent the townspeople for the months of siege. That drives them more than anything else. Round up the Governor, other bureaucrats, a few high-level members of Sárku-worshiping clans, and have a sacrifice. Showy and cathartic, but precise, limited in damage. The priests will still want a wholesale burning, but everyone else will be full of death and ready to move on.\"\n\nYour General nods. \"It's a good plan, but it relies on viewing Lord Vimúhla's priesthood as the enemy to be outmaneuvered, which they are not. They are important allies of our Prince, and of this legion. Still, for a rough blueprint we could do worse. Thank you for bringing this to our attention. You are dismissed.\" As you stand to leave, both turn back to their maps, ancient parchment and newer copies, but of a strange design.\n\nNirún is elated and offers to stand you a bottle and some poetry recitation at one of the finer wine-merchant houses. \n*choice\n\t#\"Wonderful idea.\"\n\t\tThe two of you escape the afternoon heat to drink a light vintage, a clay bottle perspiring with chill from the cellars, while a young man declaims epics to musical accompaniment in the Chákan style. Free from the presence of his superiors, Nirún proves an educated conversationalist. He's surprisingly voluble, ranging from poetic allusions and politics of the day to tactics and the news from his clanhouse back in $!{Hometown}. In his queries after any news you might have from home, you recognize his type: the transplanted soldier, always yearning after the old clanhouse, probably writing letters home at every opportunity.\n\t\t\n\t\tBy the time you leave, the cool of evening has descended. With a respectful bow he departs to the officers' quarters for the Legion of ${alliedlegion}\n\t\t*set nir_rep +1\n\t\t*goto fire_gen2\n\t#\"No thank you.\"\n\t\tYou plead off on grounds of having work to do, and with a sardonic shrug he leaves to quench his thirst alone.\n\t\t*goto fire_gen2\n\n*label fire_gen2\t\n*page_break\t\nYou don't see the behind-the-scenes politics that follows in the next days, but you do notice that the temple rhetoric dies down. Condemnations move from the collective to the specific, focusing on the crimes of those who collaborated with the occupiers during the siege.  The Governor's Palace and the clans worshiping the Dark Trinity are decimated, and though the sacrificial goats plead innocence, beg for clemency, and in one notable case offer an astounding bribe, they all go to the priests' pyres. The burning of the Governor's Palace fills the night with brilliant light. The following morning the city is choked with smoke, but the morale of the soldiers is greatly improved, and even the townspeople seem like they've finally stopped waiting for the other shoe to drop.  \n\nThe turmoil is over, and now everyone can get back to their lives, unless of course some other prince captures the city, when you suppose it will all begin again. Looking over the burned wreckage at the center of Sangmiré, an island of destruction in the midst of a bustling town, you know that it was you and Nirún who contained the blaze. That old name for Vimúhla, \"The Flame Cupped Within the Lamp,\" comes back to you.\n*label romance\n*page_break\n*if res_attempt \n\tAnother day passes before a yellow-clad figure appears in your doorway, bows, and asks to enter. A higher-Circle priest than the one you first talked with, she is likewise completely covered by her uniform, though her voice, low and like honey, gives away her gender.  \n\t\n\t\"I have been told that you wish us to gather the energies and break the cycle of incarnation for you.  We have a priest who knows those spells, but our Lord Belkhánu is jealous of his purview over the soul. He reminds us always that the ultimate power lies in him, and one form of these reminders is the danger, the chance of sudden death, for any who try to meddle in his affairs.\"\n\t\n\t\"We have lost so many to the Usurper's army. He fears death, and so he fears us, and the occupation was not easy for our temple. To lose one of our few guardians, our most powerful priest, in this time of war would further weaken us. He says he cannot take the risk until things are put right, until the gates and other damage to the compound are repaired, until guards are hired to replace those lost….\"\n\t*if wealth \u003c650\n\t\tYou know immediately that she is naming a price, and also know, familiar as you are with defensive construction and soldier pay, that you cannot afford it.\n\t\t*choice\n\t\t\t#I plead my case.\n\t\t\t\tThe priestess listens tranquilly to your desperate requests, but seems unmoved. \"Kási, you of all people should know that death is an inevitability. Your Heréksa's time has come, and she must journey to the Isles of the Excellent Dead. This is the way of things, and we cannot lightly trespass against that order. Every dead soldier leaves grief behind him, but we cannot bring back them all.\" \n\t\t\t\t\n\t\t\t\tShe stands, and leaves you, her head bowed.\n\t\t\t\t*goto romance2\n\t\t\t#I accept gracefully and thank her for her time.\n\t\t\t\tShe nods. \"I wish we could help, but so many have died, and we cannot plunge again and again into the magics to return them all, or who would be left to tend our Lord's temple? The thought of reversing death is heady, but it is better for all to accept and move on. I assure you that is what your Heréksa's soul is doing even now in the Isles of the Excellent Dead.\"\n\t\t\t\t\n\t\t\t\tWith these words, she stands, bows, and returns to her temple.\n\t\t\t\t*goto romance2\n\t\t\t#I admonish her for taking advantage of my grief.\n\t\t\t\tShe weathers your tirade without moving, a featureless pillar of silk. Without resistance, your anger burns itself out, and only then does she speak. \"You ask us to upend the cycle of reincarnation. Of course we set the price high; otherwise would anyone accept death? No. You all would destroy everything in pursuit of eternal life stuck in one incarnation on one plane.\" \n\t\t\t\t\n\t\t\t\tWith an impatient flick of a gloved hand, she stands and walks out.\n\t\t\t\t*goto romance2\n\t*else\n\t\tYou know immediately that she is naming a price, and also know, familiar as you are with defensive construction and soldier pay, that it is within your means, but just barely—maybe some six or seven hundred káitars.\n\t\t*choice\n\t\t\t#I offer to fund these improvements if the priest can help me.\n\t\t\t\t\"Then you had best come to the temple tonight. Every hour the soul slips farther away.\"\n\t\t\t\t\n\t\t\t\tThe temple's small gates, set in a rough gray stone wall, are shuttered, but choral singing emanates from within. The priestess raises a gloved hand to the knocker in a rhythmic tap, and the gate is opened. You see by lantern light the damage she referred to. One valve has had its great bronze hinges snapped off, and is supported solely by a pile of statuary and furniture piled against it. Your escort leans down to whisper in the ear of the lantern bearer, who hands over the light and walks hurriedly into the darkness.\n\t\t\t\t\n\t\t\t\t\"We have prepared a chamber, just in case,\" she says over her shoulder as she begins to walk further into the small compound.\n\t\t\t\t\n\t\t\t\tHeréksa Rayána lays upon a table, surrounded by candles, face calm. Her skin is still sallow, but has been oiled. A tall figure, also in yellow, stands over her, looking down. His spine is bent and skin wrinkled with age. There are flecks of blood upon his robes and, you now notice, upon the yellow shirt Rayána's corpse is wearing. \"I've already removed the internal organs, the rotted food, the parasites. Given her a good clean inside and out. I had a hunch ${pche} would say yes, and this long after every minute counts.\" He sighs and shrugs. \"No reason to delay.\" And then he drops into one of the more elaborate ritual castings you have ever seen, dancing around the tables with sudden nimbleness, singing with a full throat, voluminous yellow robes flaring out with each spin.\n\t\t\t\t\n\t\t\t\t*if ritual >10\n\t\t\t\t\tYou have never seen magic of this complexity performed.  At first you're shocked that they would let you witness it, as such spells are closely guarded secrets, but you quickly realize that the speed and precision of the thing is far beyond your abilities. You realize now that the cost, steep though it seems, is incredibly low to risk a sorcerer of this talent. The years of training the temple must have invested in him….\n\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\tYou are still absorbed in watching the dance when it comes to a halt, and he collapses to the floor. The priestess by your side runs to him, but your eyes are pulled to Rayána, whose chest has begun to rise and fall. \"He's spared you again,\" you hear the honey voice say, and a chuckle in return with \"Yes, only He knows why. I should go pray in thanks.\"\n\t\t\t\tSlowly, that calm face transforms into the one you know. Eyebrows come together in a furrow of concentration, jaw clenches in pain, all the pouncing zrné-beast tension returns to her muscles, and she sits up, leans over, and begins to retch water.\n\t\t\t\t*achieve death\n\t\t\t\t*set her_dead false\n\t\t\t\t*set her_rep +2\n\t\t\t\t*set wealth -650\n\t\t\t\t*choice\n\t\t\t\t\t#\"I'm here.\"\n\t\t\t\t\t\tYou put an arm around her, and hold back her braid as the convulsions pass. After a last run of coughs, Rayána smiles up at you, but then the furrow reappears between her brows and she looks around, taking in the table and the yellow-robed priests, and her eyes widen.\n\t\t\t\t\t\t*goto her_res\n\t\t\t\t\t#\"Welcome back, soldier.\"\n\t\t\t\t\t\tRayána bends forward, head down between her knees, and coughs and coughs, then struggles to attention in reflex to your voice. \"Sir!\" She trails off, taking in the table and the yellow-robed priests, and her eyes widen.\n\t\t\t\t\t\t*goto her_res\n\t\t\t\t\t#I remain silent.\n\t\t\t\t\t\tRayána bends forward, head down between her knees, and coughs and coughs, then raises her head to look around, bewildered. Her eyes are like those of a sleepwalker, whose shadow soul has not yet returned to her body. Eventually she takes in the table and the yellow-robed priests, and her eyes widen.\n\t\t\t\t\t\t*label her_res\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I remember the spear.\" She touches her abdomen, where there should be a gaping wound, but there isn't even a scar. You notice all her scars, the net of thin lines and thick knots that covered her body, are gone, all wiped away. It makes her look like a clan-girl. \"Kási, what have you done?  Why?\"\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#\"I owed you my life; I've repaid that debt.\"\n\t\t\t\t\t\t\t\t\"But my life…I was doing my duty, and even if not, the shámtla to my family would be much less than the cost of this.\" She shakes her head, clearly bemused by the opulence of high-clan nobles. \"You have more than repaid the debt. Now it's me who owes you. You have bought a strong arm at your back in whatever comes next.\" She struggles to her feet, salutes you, kowtows to the priests, and walks out before you can say another word.\n\t\t\t\t\t\t\t#\"Do you know how hard it is to find a good heréksa?\"\n\t\t\t\t\t\t\t\tRayána looks at you quizzically, unsure if you're joking. You see the gap between your statuses in that look. You have fought and eaten and slept beside this girl for months on campaign, but for all that you realize she honestly believes you may habitually resurrect valuable servitors with careless abandon. Shaking her head, she salutes you, kowtows to the priests, and walks out before you can say another word.\n\t\t\t\t\t\t\t#\"I couldn't go on without you.\"\n\t\t\t\t\t\t\t\tRayána looks taken aback. \"What, Kási, you're not asking me to be your fourth wife, are you? You'd need to get a few more first.\" She blushes, embarrassed by her own joke. After a moment she stiffens up, leaving aside the girl to become the soldier, and she meets your gaze, face serious.  \"Where you go, I will go, and I will have your back.\" She struggles to her feet, salutes you, kowtows to the priests, and walks out before you can say another word.\n\t\t\t\t\t\t\t#\"Never you mind.\"\n\t\t\t\t\t\t\t\tOnly Rayána, presented with the mysteries of death, sorcery, and the migration of souls, would react with equanimity at being told to ignore it all.  She nods, salutes you, kowtows to the priests, and stands to walk out, but you see her chewing thoughtfully on her lip as she leaves the room.\n\t\t\t\t\t\tThe figures of the priests turn to watch her go.  \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"It often takes them this way.  The hlákme—the mind—shies away from knowledge of its own mortality and seeks refuge in return to old patterns,\" says the woman.  \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"She should be well; it was a good casting,\" adds the man. \"Now, if you will excuse us, we must take our turns in the choir. There are few left to keep it going through the night.\"\n\t\t\t\t\t\t*goto romance2\n\t\t\t#I demur. I feel gratitude to Rayána, but not 650 káitars worth.\n\t\t\t\tThe priestess picks up on your meaning, and is understanding. \"I think you make the wisest choice. Death is a part of life, and it is better for all to accept and move on. I assure you that this is what your Heréksa's soul is doing even now in the Isles of the Excellent Dead.\"\n\t\t\t\t*goto romance2\n*else\n\t*label romance2\n\t*page_break\n\tIn the night you are awakened by the wind rustling the flap of your tent, a scraping sound eerily similar to that of the assassin's sandals upon the temple stones months ago. You spring awake, and see a figure silhouetted in the light from moon and stars. It was not the wind that woke you.   Another assassin? You grope for a weapon as the shadow moves closer, and you make out a familiar face. Who stands there?\n\t*choice\n\t\t*selectable_if ((her_rep >0) and (her_dead = false)) #Heréksa Rayána.\n\t\t\t*set lover \"Rayána\"\n\t\t\t*set lov_rep \"her_rep\"\n\t\t\t*set lov_he  \"she\"\n\t\t\t*set lov_him  \"her\"\n\t\t\t*set lov_his  \"her\"\n\t\t\t*goto romance3\n\t\t*selectable_if (nir_rep >0) #Kási Nirún.\n\t\t\t*set lover  \"Nirún\"\n\t\t\t*set lov_rep \"nir_rep\"\n\t\t\t*set lov_he  \"he\"\n\t\t\t*set lov_him  \"him\"\n\t\t\t*set lov_his  \"his\"\n\t\t\t*goto romance3\n\t\t#$!{wave}.\n\t\t\t*set lover wave\n\t\t\t*set lov_rep \"wav_rep\"\n\t\t\t*set lov_he  wahe\n\t\t\t*set lov_him  wahim\n\t\t\t*set lov_his  wahis\n\t\t\t*label romance3\n\t\t\t\"Sorry to startle you. It's a cold night; I didn't want to spend it alone.\"\n\t\t\t*choice\n\t\t\t\t#\"Come in.\"\n\t\t\t\t\t*if God = \"Dlamélish\"\n\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t*setref lov_rep +1\n\t\t\t\t\tAs ${lov_he} opens the flap wider the moon shines in and a chill breeze blows through. Fall is coming, good marching weather. Soon the Generals will finish their business here and the army will be on the move again. You feel a hand upon your cheek. \"Come back to me,\" ${lov_he} whispers in your ear, \"your thoughts are wandering.\" \n\t\t\t\t\t\n\t\t\t\t\tYou turn and kiss ${lov_him} passionately, both your attentions now riveted. \n\t\t\t\t\t*if lover = wave\n\t\t\t\t\t\t\"To think, after all these years, we find ourselves back together.\" $!{wave} laughs. \"For tonight, let's just be Tiúni and Wave, and let them come wake us with a bucket of water to pry us out of our den.\" $!{wahis} laugh is silvery, as is the gloss on ${wahis} black hair, hanging loose in the moonlight. \n\t\t\t\t\t*if lover = \"Rayána\"\n\t\t\t\t\t\tRayána speaks no words, just places a strong hand behind your head, pulling you to her. No elaborate serenade, no body rouge and Thirty-Four Acts; she is direct and primal in her lovemaking.\n\t\t\t\t\t*if lover = \"Nirún\"\n\t\t\t\t\t\tNirún's dark eyes drink in your form in the moonlight, and he smiles, reciting a poem in praise of \n\t\t\t\t\t\t*if (orientation = \"straightf\") or (orientation = \"straightm\")\n\t\t\t\t\t\t\tMa'ásha of the Ecstatic Union.\n\t\t\t\t\t\t*if (orientation = \"lesbian\") or (orientation = \"gay\")\n\t\t\t\t\t\t\tDletára of Reflective Pleasures.\n\t\t\t\t\t\tUp close, in profile you see how aristocratic his features are, with his bronze skin and hawkish nose. He shakes his head dolefully. \"I shouldn't be here….\" But he does not move away, and neither do you.\n\t\t\t\t\t*comment add more\n\t\t\t\t\t*goto descent\n\t\t\t\t#\"This is awkward….\"\n\t\t\t\t\tYou invite $!{lover} in, sitting up on your bedroll. With patience and care you turn talk to reminiscences, and open a bottle of wine, but avoid sitting too close and shy away from the intimate topics ${lov_he} breaches. Dawn is lightening the sky when you stumble forth in comradely fashion in search of breakfast.\n\t\t\t\t\t*set lover \"none\"\n\t\t\t\t\t*goto descent\n\t\t\t\t#\"Go away!\"\n\t\t\t\t\tYou make it clear that you are in no mood for company, and certainly not $!{lover}'s. $!{lov_he} turns into the chill night to hide ${lov_his} expression, letting the flap fall closed behind ${lov_him}.\n\t\t\t\t\t*setref lov_rep -1\n\t\t\t\t\t*set lover \"none\"\n\t\t\t\t\t*goto descent\n\t\t*selectable_if (married) #$!{Spouse}.\n\t\t\t*set status %+10\n\t\t\t*set lover spouse\n\t\t\t*setref lov_rep +1\n\t\t\t*set lov_he wahe\n\t\t\t*set lov_him wahim\n\t\t\t*set lov_his wahis\n\t\t\tYou look into the smiling face of your \n\t\t\t*if wahe = \"he\"\n\t\t\t\thusband. \n\t\t\t*if wahe = \"she\"\n\t\t\t\twife. \n\t\t\t$!{wahe} comes and lays down beside you, and you turn to enfold ${wahim} in your limbs, but your hands grasp at cold air and you wake with a start, alone in a cold tent like every night of this war. $!{wahe} is still at home in the clanhouse in ${Hometown}. You feel a pang of longing for ${wahim}. Lighting a candle, you reach for ${wahis} last letter, and read it for the hundredth time:\n\t\t\t\n\t\t\t\"Tsámmeri—Heart's Desire,\n\t\t\t\n\t\t\tRelative peace continues to reign in $!{Hometown}. Here within the clanhouse it would be easy to forget about the war were it not for my worries for you. \n\t\t\t*if Hometown = \"Jakálla\"\n\t\t\t\tThe food shortages and the sweltering summer heat have led to discontent and riots, but secure behind our walls we sleep through the worst of the day, and do not suffer for food.\n\t\t\t*if Hometown = \"Béy Sü\"\n\t\t\t\tPrince Dhich'uné's—or Eternal Splendor's, as he now calls himself—spies and enforcers still operate in strength here, but the Soul of the World is too cosmopolitan to permit the types of purges we've read of elsewhere. We mostly stay behind our walls, and have paid all the appropriate bribes to ensure warning if trouble comes.\n\t\t\t*if Hometown = \"Butrús\"\n\t\t\t\tThe Mu'ugalavyáni have begun to make probing attacks across the border, hoping to find our forces distracted, but we are well garrisoned, and the fighting has been contained to the more rural areas.\n\t\t\tAre you still besieging Sangmiré?  Please write when it has fallen, and tell me all about it, so I can share the story with Mother Hále, and also so I won't worry that you were hurt in the fighting.\n\t\t\t\n\t\t\tThe twins are a terror, and it is taking all our efforts to keep them out of trouble.  \n\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\tThe Lord of Confusion has truly placed his stamp upon them, and they are bringing chaos wherever they go, but isn't that always the way with two-year-olds? \n\t\t\tGayán bought a pair of feathered headdresses for them, and they look like chubby rural potentates ordering us all about.  \n\t\t\t*if God = \"Hnálla\"\n\t\t\t\tMaybe they will become governors or judges, bringing the blessed order of Lord Hnálla into the world.\n\t\t\t*if God = \"Dlamélish\"\n\t\t\t\tThey love stories of your and Dzái's adventures, and claim they too will be soldiers one day. I think the spirit of our Green-Eyed Lady has blessed them, for they are fearless and inquisitive, ready to try anything. \n\t\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t\tThey love stories of your and Dzái's adventures, and claim they too will be soldiers one day. I took them by the legion hall, to show them the banners, and haven't heard the end of it yet. \n\t\t\tI feel so at home here, so comfortable, and the only thing missing is your presence to complete the family. \n\t\t\t*if God = \"Avánthe\"\n\t\t\t\tI thank Mother Avánthe every day for entwining my Skein of Destiny with yours. \n\t\t\t*comment endif\n\t\t\t\n\t\t\tReturn to me soon.\n\t\t\t$!{Spouse} ${lineage}\n\t\t\t\n\t\t\tYou carefully fold the paper before reaching for your writing desk to pen a response.\n\t\t\t*fake_choice\n\t\t\t\t#I write of my victories.\n\t\t\t\t\tThe fall of Sangmiré makes for exciting reading. You are sure the letter will be passed around the clanhouse.\n\t\t\t\t#I ask for more stories of home.\n\t\t\t\t\tMany soldiers yearn for the prosaic when in the field. You are lucky to have such a correspondent in $!{spouse}.\n\t\t\t\t*selectable_if (courtmarshal) #I unburden myself about the court-martial.\n\t\t\t\t\tThe frustration and anger you can't express to anyone in your command chain is poured out upon the page. Knowing that $!{Spouse} will sympathize and take your side lifts a weight of loneliness, and you know you'll sleep better for having written this letter.\n\t\t\t\t#I write about my compatriots.\n\t\t\t\t\tYou pen paragraphs on the sudden mysterious appearance of $!{wave}, little changed from ${wahis} hellion days; \n\t\t\t\t\t*if her_dead\n\t\t\t\t\t\tthe brave sacrifice of Heréksa Rayána; \n\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\tyour stolid but fierce low-clan Heréksa; \n\t\t\t\t\tand your tentative camaraderie with Kási Nirún.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tHaving finished the letter, you find your candle burning low and your eyes beginning to droop. The moon is still high in the sky as you return to your bedroll.\n\t\t\t*goto descent\n\t\t#No one. It was the wind after all.\t\n\t\t\tSighing, you pull up your blanket from the chill, and return to sleep and solitude.\n\t\t\t*goto descent\n\n*label descent\n*page_break The Next Morning\nThe only light in the temple vault is provided by a few torches. The steady drip drip of water onto stone emanates in the darkness. \n\n\"We had a tough time clearing out these tombs while you were securing the town above ground,\" $!{AlliedGeneral}'s voice echoes off arches. \"But the job is done. Not a single undead left, nor priest.\" Your General nods at her words and begins to walk forward, the torchbearers hurrying to keep him in the light.\n\nYou are in the bowels of the Temple of Sárku, a surprisingly large section of the tsu'úrum—underground—excavated beneath their small rural temple. The stone is old and pitted, the barrel vaults unadorned. It was probably a sewer once, or some granary buried by a past ditlána. Something functional, anyway. Your small troupe walks through the ruins of the past with no explanation forthcoming from those who brought you here. Deference to rank combines with the dank gloom to dampen conversation among all but the two figures leading the way, who are deep in conversation with one another.\n\n\"The door is this way….\"\n\nEven in the dim light you can tell the passages are changing. The brick vaults are now adorned by mosaics and crenelation. In one vast room the ceiling is supported by ranks of elaborately carved columns, proceeding off into the darkness. Kási Nirún steps up to one and runs his fingers reverently along it. \"Engsvanyáli!\" he whispers. \"It must be. Look at the capital and the seamlessness of the column itself. We still live in the shadow of their greatness. What do you think this room was before the worm priests came to squat in its ruins?\"\n\nOf course, the circle of light does not pause for a lowly kási when generals are on the move, and continues to pull him along in its wake. He casts glances over each column you pass, and is so distracted that he almost stumbles into the soldier before him when your party comes to an abrupt halt before an open door.\n\nIts oily black wood hangs on heavy metal hinges only lightly touched by rust. There's enough metal in them to make a fine stiletto or gorget, and you're surprised no looter has pried them from the wall in the ages since this door was last used.\n*page_break\nGeneral $!{general} turns and dismisses the entourage, grabbing a torch. When their footsteps have faded he turns to you. \"Beyond this door is the old city, and in it the reason we've spent nearly half a year taking a flea-speck of a town deep within Dhich'uné's territory. I'm sending you excavating.\n*if convicted\n\tKási $!{Name}, you'll be leading the mission. If you come back, there'll be enough glory to drown out any memory of what happened on the platform. If you don't, well, it's a better to die on a mission than to be impaled or turned out of the legion. It's the best I can do for you and for Dzái under the \n\t*if (ritual >10) or (psychic>10)\n\t\tcircumstances. Besides that, your sorcerous abilities should prove useful, and we cannot spare a member of either legion's sorcerer corps.\"\n\t*if (ritual \u003c=10) and (psychic \u003c=10)\n\t\tcircumstances.\"\n*if convicted = false\n\tKási $!{Name}, you'll be leading the mission. The ingenuity you showed in the taking of the town makes you the perfect soldier for this kind of small-unit tactical \n\t*if (ritual >10) or (psychic>10)\n\t\twork. Besides that, your sorcerous abilities should prove useful, and we cannot spare a member of either legion's sorcerer corps.\"\n\t*if (ritual \u003c=10) and (psychic \u003c=10)\n\t\twork.\"\n*comment endif\n\n*if convicted\n\t$!{wave} casts you a smug glance and whispers, \"I told you I'd find us an out, and wait 'til you hear the rest.\" \n*comment endif\n\nGeneral $!{AlliedGeneral} turns to Kási Nirún. \"As you must surmise, you are also being assigned to the mission. The lead being given to Kási $!{name} is not a slight. It is simply because \n*if her_dead = false\n\tthe others,\" she says, gesturing at $!{wave} and Rayána, \"are \n*if her_dead\n\tthe signaler,\" she says, gesturing toward $!{wave}, \"is \nfrom ${PCHis} legion. I know you will face the Underworld with the same stolidity you showed against the Scales of Brown, and do our family proud.\" There's a heavy emphasis on the last words, and at them Nirún looks away from her. Then she folds him into a hug.\n*fake_choice\n\t#I give Nirún a friendly nod. \"It's a fine point of seniority, and I hope we can consult on most matters.\"\n\t#I'm glad to have the chain of command made clear. \"Too many cooks,\" as they say.\n\t#I eye Nirún and his aunt, saying nothing.\nNirún mumbles something inaudible from his aunt's embrace, and General $!{General} continues where General $!{AlliedGeneral} left off. Do these two choreograph everything between them?\n\n*if her_dead = false\n\t\"Heréksa, I am charging you with seeing the kásis through any dangers alive. We depend upon your strength.  Signaler, \n*if her_dead\n\t\"Signaler, \nwe've discussed your role.  Your previous experience should serve you well as a guide.\"\n\nAt your quizzical look $!{wave} snorts. \"I had a life while you were gone, you know.\"\n\n\"Somewhere down there lies a weapon of great value to our $!{Prince}, whose scribes have pieced together little other than the briefest description of its nature and location.  Some might call this a fool's errand, but there's a high potential of reward that more than compensates for the risk. There are other, larger teams that can follow if you fail, but we hope to accomplish this quickly, with minimal loss of life, and without word getting out. That becomes impossible once we send a larger force, with the way soldiers gossip.\"  \n\n$!{AlliedGeneral} snorts. \"For that matter, our movements are watched, and we,\" she gestures to her fellow general and herself, \"cannot be absent long without drawing notice.  Signaler hiTánkolel has been briefed under cover of ${wahis} other duties, and will explain more.\" \n*fake_choice\n\t#Say Nothing\n\t#\"What exactly are we looking for?\"\n\t\t*if convicted\n\t\t\t$!{AlliedGeneral} turns her gaze upon you.  \"You, Kási, are trying to find the honor you lost upon the platform.  You lost it through disobedience, and it can only be found through subjugation to the chain of command.\"\n\t\t*if convicted = false\n\t\t\t\"It's a box,\" says General $!{General}.  \"At least, that's what it's supposed to look like.  As for what it does, it would take too long to explain.  Just know that the $!{Prince}'s advisors think it worth all our time to sneak it away without the Usurper knowing we have it.\"\n\t*if convicted\n\t\t#\"Thank you for this chance to redeem myself, sirs.\"\n\t\t\tGeneral $!{General} nods.  \"You're a good soldier, and I know that you'll take this opportunity to prove that.  I'd hate to have to tell Dzái that her\n\t\t\t*if gender = \"male\"\n\t\t\t\tboy\n\t\t\t*if gender = \"female\"\n\t\t\t\tgirl\n\t\t\thad disgraced\n\t\t\t*if gender = \"male\"\n\t\t\t\thimself.\"\n\t\t\t*if gender = \"female\"\n\t\t\t\therself.\"\n\t#\"We really captured an entire town just for what's behind this door?\"\n\t\t$!{AlliedGeneral} looks at you with annoyance.  \"Yes.  Those were the orders, and we're carrying them out.  \n\t\t*if courtmarshal\n\t\t\tI know obeying orders is a foreign concept to you.\"\n\t\t*if courtmarshal = false\n\t\t\tYou can save your commentary.\"\n\t#\"Why weren't the rest of us briefed?  This is rather sudden.\"\n\t\t*if convicted\n\t\t\t\"You mean, why didn't we confide in the soldier convicted of insubordination?\" asks $!{AlliedGeneral} with whithering sarcasm.  \"I can't imagine.\"\n\t\t*if convicted = false\n\t\t\t\"We would have liked to tell you,\" says General $!{General}, \"but in an army this size, we know the Usurper must have spies, and it's crucial he not find out what we're after.  It wasn't strange for the Signaler to be seen carrying message to and from our tent.  I know this is a difficult situation, but trust you are up to it.\"\n*comment endif\n\nThe Generals salute, as the rest of the party stands rather dumbstruck. They have left and shut the heavy door behind them before any of the others have recovered from the brisk pace of events.\n\nOnly $!{wave} seems chipper; ${wahe} always did enjoy getting to tell other people what to do, you think uncharitably.  Still,\n*fake_choice\n\t#A chance for glory is not to be passed up.\n\t\tWho knows what monsters lurk beneath the earth, or what tales will be told of your quest when you return victorious.  You limber your sword in its sheath.\n\t#You will do anything to see your $!{Prince} on the throne.\n\t\tIf $!{Prince} $!{Princename} desires this artifact, you will lay it at\n\t\t*if Princename = \"Ma'ín\"\n\t\t\ther\n\t\t*if Princename != \"Ma'ín\"\n\t\t\this\n\t\tfeet.  You lay a resolute hand upon the ebony door.\n\t#Orders are orders.\n\t\tYou are a soldier, and a soldier does not question, but finds honor in serving as an extension of his commander's will.\n\t\t*if her_dead = false\n\t\t\tYou share a resolute glance with Rayána beside you, and turn to the door.\n\t#The hero who returns with the $!{Prince}'s desire in hand will be showered with rewards.\n\t\tYou take a moment to savor the thought of wealth and promotion to your due place, before refocusing upon the mission.  Victory is not in your grasp yet.\n\t#There is clearly knowledge  and power to be gained on this mission.\n\t\tYou know that the secrets of temples and old civilizations lie beneath the earth, and the farther down you go, the more amazing the things that can be found.\n*finish Into the Depths!\n", "childhood": "\n*temp ara\n*temp offering \"glass\"\n*temp wave_with false\n\n[b]Chapter 1: Youthful Folly[/b]\n\n[i]$!{Hometown}, Spring of 2355 A.S.[/i]\n\n\nYour childhood in the great clanhouse of $!{clan} was pleasant.  The household possessed plenty of slaves to do menial toil and an abundance of wealth.  Your numerous mothers and fathers (your parents' siblings and their spouses) lavished affection upon you.  During the day you were taught reading, writing, maths, \n*if (psychic >10)\n\tpsychics, \n*if (ritual >10)\n\tritual magic, \nand history at the temple school of $!{lord} $!{god}; and in the evenings you slept in comfortable dormitories with your \"clan-cousins\" (other children of the clan, most of them unrelated to you by any close blood tie).\n \nMany of the older adolescents, on the verge of adulthood, snuck between the boys and girls dormitories to warm each other's beds, and in the past year you had begun to join in this pastime.  The night before your khatunjálim, or naming ceremony, found you sneaking into your clan-cousin Wave's bed.  Where were you coming from and where were you heading to?\n*choice\n\t#I slept with the other boys, but was visiting Wave in the girls' dormitory.\n\t\t*set gender  \"male\"\n\t\t*set orientation  \"straightm\"\n\t\t*set PCHe \"he\"\n\t\t*set PCHis \"his\"\n\t\t*set PCHim \"him\"\n\t\t*set Wagender  \"female\"\n\t\t*set wahe  \"she\"\n\t\t*set wahis  \"her\"\n\t\t*set wahim  \"her\"\n\t\t*set WaMan \"woman\"\n\t\t*set wagod \"goddess\"\n\t\t*set Wave  \"Sáyi\"\n\t\t*label HeteroDorm\n\t\tThe spring nights were chilly and damp; and though the dormitories were heated by small braziers and the many bodies sleeping within, the air in the corridor between the two buildings made you shiver as you tiptoed across.  Once inside the \n\t\t*if Wagender = \"female\"\n\t\t\tgirls' \n\t\t*if Wagender = \"male\"\n\t\t\tboys' \n\t\tsleeping room, you found Wave's mat.  $!{wahe} was still awake, waiting for you.    \n\t\t\n\t\t\"Tiúni, I was worried you were mad at me and were not coming tonight,\" ${wahe} whispered.  You thought how strange it would be that after tomorrow no one would ever call you Tiúni again.  There was pride in the idea that you would finally have an adult's name and an adult's responsibilities.\n\t\t*goto WaCon\n\t#Both Wave and I were boys and slept in the same dormitory.\n\t\t*set gender  \"male\"\n\t\t*set orientation  \"gay\"\n\t\t*set PCHe \"he\"\n\t\t*set PCHis \"his\"\n\t\t*set PCHim \"him\"\n\t\t*set Wagender \"male\"\n\t\t*set wahe  \"he\"\n\t\t*set wahis  \"his\"\n\t\t*set wahim  \"him\"\n\t\t*set WaMan \"man\"\n\t\t*set wagod \"god\"\n\t\t*set Wave  \"Sánjesh\"\n\t\t*label HomoDorm\n\t\tIt was quite convenient not needing to leave the warmth of the dormitory and walk through the damp hall on the chilly spring night.  You simply dragged your sleeping mat over next to Wave, who was still awake, waiting for you.  \n\t\t\n\t\t\"Tiúni, I was worried you were mad at me and were not coming tonight,\" ${wahe} whispered.  You thought how strange it would be that after tomorrow no one would ever call you Tiúni again.  There was pride in the idea that you would finally have an adult's name and an adult's responsibilities.\n\t\t*goto WaCon\n\t#I slept with the other girls, but was visiting Wave in the boys' dormitory.\n\t\t*set gender  \"female\"\n\t\t*set orientation  \"straightf\"\n\t\t*set PCHe \"she\"\n\t\t*set PCHis \"her\"\n\t\t*set PCHim \"her\"\n\t\t*set Wagender  \"male\"\n\t\t*set wahe  \"he\"\n\t\t*set wahis  \"his\"\n\t\t*set wahim  \"him\"\n\t\t*set WaMan \"man\"\n\t\t*set wagod \"god\"\n\t\t*set Wave  \"Sánjesh\"\n\t\t*goto HeteroDorm\n\t#Both Wave and I were girls and slept in the same dormitory.\n\t\t*set gender  \"female\"\n\t\t*set orientation  \"lesbian\"\n\t\t*set PCHe \"she\"\n\t\t*set PCHis \"her\"\n\t\t*set PCHim \"her\"\n\t\t*set Wagender  \"female\"\n\t\t*set wahe  \"she\"\n\t\t*set wahis  \"her\"\n\t\t*set wahim  \"her\"\n\t\t*set WaMan \"woman\"\n\t\t*set wagod \"goddess\"\n\t\t*set Wave  \"Sáyi\"\n\t\t*goto HomoDorm\t\n*label WaCon\n*set lover Wave\n*set lov_rep \"wav_rep\"\n*set lov_he  wahe\n*set lov_him  wahim\n*set lov_his  wahis\n*page_break\nEarlier that day you had found Wave gambling with some of the other \n*if Wagender = \"female\"\n\tgirls \n*if Wagender = \"male\"\n\tboys \nin one of the courtyards.  $!{wahis} brown eyes sparkled under black bangs that bobbed as ${wahe} laughed, scooping up ${wahis} winnings. You knew that ${wahis} mothers would not have approved of gambling, and worst of all, ${wahe} had placed the small ceramic amulet of \n*if orientation = \"lesbian\"\n\tSsáni \"The Lover,\" patroness of love between women, \n*if orientation = \"gay\"\n\tDletára \"The Goddess of Reflective Pleasures,\" patroness of love between members of the same sex, \n*if (orientation = \"straightm\") or (orientation = \"straightf\") \n\tTahelé \"The Maid of Beauty,\" the patron of young girls and first romance, \nthat you had given ${wahim} in the pot!  After the dice had been thrown and ${wahe} had won, Wave had claimed ${wahe} had only bet it because ${wahe} had known it would bring ${wahim} luck; but as Wave slipped the amulet back around ${wahis} neck and gathered up ${wahis} winnings, you had stormed off with tears in your eyes.  Though Wave was beautiful and clever, ${wahe} could also be spoiled, sure that ${wahis} winning personality could get ${wahim} out of any situation. \n\nNow ${wahe} was looking up at you with a vulnerable worry, different from the brash assurance of earlier in the day.\n*choice\n\t# \"I could not stay angry with you.\"\n\t\tWave smiled invitingly and pulled back the sheet to welcome you under.  \"I knew you would understand!\" $!{wahis} smile was like the sun coming out from behind the clouds, a joyous grin that made your heart speed faster, and promised an evening of sweet delight.  The birds were chirping in the pre-dawn darkness before you fell asleep that night.\n\t\t*goto bucket\n\t# \"You hurt my feelings, tsámmeri, when you do not value my gifts.\"\n\t\tWave looked crushed.  \"Mother gave me that money to purchase a new hair comb, and I couldn't lose it, and I knew the Goddess would not let me be parted from your amulet, that it would ensure my winning….\" The two of you talked for half the night, starting with remonstrances, but ending in joint apologies followed by pledges of love and eventually more physical affirmations of your mutual affection, until, physically and emotionally exhausted, you passed into sleep.\n\t\t*goto bucket\n\t# \"If you ever do something like that again, we're through!\"\n\t\tIn a heartbeat Wave's demeanor went from apologetic to haughty.  \"Do not think, Tiúni, that you can control me because you share my bed-mat!\"  Thus began a heated argument that only ended when some of your clan-cousins threatened to turn you both out of the barracks if you would not be quiet. You both laid back to back in the night, each too proud to apologize, but too in love to move away.  Eventually, you fell asleep listening to ${wahis} breathing.\n\t\t*goto bucket\t\t\n*label bucket\n \nThe next thing you knew, cold water was startling you out of sleep.  Sputtering,  you looked up into the face of your elder brother, Gayán, smiling down at you.  \n\n\"Sleep well, little \n*if gender = \"female\"\n\tsister? \n*if gender = \"male\"\n\tbrother? \nOr did you not sleep at all?\"  Here he leered at Wave and waggled his eyebrows.  Gayán fancied himself a comedian.  \"Well, I have come to break you two apart. Mother Halé is in a state of distraction over the fit of your formal dress, and has told me that if I do not bring you back immediately she will feed me to a zrné.  Oh!\" Here he looked again at Wave. \"And your parents wish your company as well.\" \n \nWithout waiting for a response, Gayán grabbed you up by the arm and dragged you from the barracks.\n*page_break\nYou were barely through the door before Mama Halé was fastening a jeweled chlén-hide collar over your shoulders and arranging a kilt around your waist.  As she eyed and adjusted its drape she barraged you with unsolicited advice about the upcoming ceremony.  \n \n*if PrinceName = \"Ma'ín\"\n\t\"Tiúni, you must not slouch during the parade.  And when you get to the temple, and are upon the altar, be decorous.  \n*if PrinceName = \"Mirusíya\"\n\t\"Tiúni, it is most important that you acquit yourself well in the duel.  Dzái will be watching, and you know how important that sort of thing is to her.  \n*if PrinceName = \"Rereshqála\"\n\t\"Tiúni, you must keep your posture during the parade and during the feast.  The headdress will be heavy, but you must look regal.  \nAnd afterward do not drink too heavily or overindulge in the powders.  There will be ten of you getting your names today, and half of ${Hometown} has turned out to see, and you must be the most shining youth present…\" on and on she chattered.\n \nMama Halé was your birth mother's sister, a plump woman with an easy smile who had raised you since you were an infant. Your other mother, Dzái, had declared herself aridáni at her own naming ceremony, and so taken on rights and responsibilities normally reserved for men.  She had joined a legion and marched to war while her sister elected to remain a \"good clan girl\" and accept the more traditional role for women.  Halé was a ward of the clan, could not own property, and could not be sued or challenged to a duel, but she was still a formidable personality, actively involved in the work and social life of Clan $!{Clan}.  \n \nAnd now all of her will was bent on getting you through the day without a misstep that might provide fodder for gossips and lower your family's prestige within the clanhouse.   \n\nHow did you feel about the celebration?\n*choice\n\t#I was excited to be an adult, but just wanted to survive the day without disgracing myself.\n\t\tIt is funny now, as a veteran of battles, to look back on the youthful importance you attached to your khatunjálim, but at the time the idea of stuttering, or worse yet tripping under the weight of the formal wear, was mortifying.  The morning passed in a nervous blur.  At one point you saw Wave herded along a corridor by all eight of ${wahis} parents, but there was not time to speak.  Finally you found yourself joining the other nine soon-to-be adults for the procession \n\t\t*if PrinceName = \"Ma'ín\"\n\t\t\tto the Temple of $!{lord} $!{god}.\n\t\t*if PrinceName = \"Mirusíya\"\n\t\t\tto the hirilákte arena.\n\t\t*if PrinceName = \"Rereshqála\"\n\t\t\tthrough the city.\n\t\t*set dutiful %+10\n\t\t*goto naming\n\t#I was always up for a good party and meant to enjoy myself.\n\t\tDespite the general air of stress in the clanhouse you managed to maintain an enthusiastic and relaxed demeanor.  At one point you saw Wave herded along a corridor by all eight of ${wahis} parents, and gave ${wahim} a smile.  Eventually you found yourself joining the other nine soon-to-be adults for the procession \n\t\t*if PrinceName = \"Ma'ín\"\n\t\t\tto the Temple of $!{lord} $!{god}.\n\t\t*if PrinceName = \"Mirusíya\"\n\t\t\tto the hirilákte arena.\n\t\t*if PrinceName = \"Rereshqála\"\n\t\t\tthrough the city.\n\t\tMany of them seemed petrified or puffed up, but you managed to crack the tension with smiles and wit.\n\t\t*if god = \"Dlamélish\"\n\t\t\t*set Noble %+10\n\t\t*goto naming\n\t#I knew this was my chance to impress my clan elders and the rest of the city's notables.\n\t\tEven then you had a keen eye for the ways of power. You knew that, though the elders saw the khatunjálim as a chance to boost the prestige of the clanhouse, it would be you and your compatriots that all the populace of $!{hometown} would be staring at.  Mama Halé was alternately enthused and frustrated that you had an interest in the proceedings, depending on whether your views matched with hers on a given issue.  \n\t\t \n\t\tIn the end you were impeccably turned out as you joined the other nine soon-to-be adults for the procession \n\t\t*if PrinceName = \"Ma'ín\"\n\t\t\tto the Temple of $!{lord} $!{god}.\n\t\t*if PrinceName = \"Mirusíya\"\n\t\t\tto the hirilákte arena.\n\t\t*if PrinceName = \"Rereshqála\"\n\t\t\tthrough the city.\n\t\t*set dutiful %-10\n\t\t*if PrinceName = \"Rereshqála\"\n\t\t\t*set noble %+10\n\t\t*goto naming\n*label naming\n\n*if PrinceName = \"Ma'ín\"\n\t*goto namingMa1\n*if PrinceName = \"Mirusíya\"\n\t*goto namingMi1\n*if PrinceName = \"Rereshqála\"\n\t*goto namingR1\n*label namingR1\nThe city of Jakálla lies on the delta of the Eqúnoyel River, facing out over tidal flats and the Bay of Jakálla. Jakállans consider the goddess Dlamélish their city patron, and see their town as the most cultured in Tsolyánu.  Thus, as $!{Clan}'s parade wound through the city's streets it attracted an entourage of curiosity-seekers, revelers, and entertainers.  \n\nBy the time you returned to your clanhouse, the parade had swelled to become a mob.  Your clan elders had anticipated this and, while only the most exalted of noble families would celebrate and dine with you inside, a vast feast with associated entertainments was set up in the courtyard.  Monstrous tsi'íl beasts roasted over fire pits, drops of their juices crackling as they hit the flames and filling the air with savory smells. Bread was handed out, and wine flowed freely.  It is by such largess that the lower clans are kept peaceable and in awe of mighty $!{Clan}.\n*page_break\nThe noble guests filed through a vast room with frescoes upon the plastered walls and an intricate mosaic upon the floor, up a grand marble staircase, and onto a terraced rooftop garden.  Here the spring breezes could flow freely, but the walls and roofs of the surrounding buildings blocked prying eyes.  The guests arranged themselves on a series of raised daises under peaked pavilions according to rank while the ten of you stood beneath a bower.  There you waited, still and proud, on display, as what seemed like every notable in Jakálla filed in.\n\nWhen all were seated, a hush descended.  A gray-haired man, dressed in finery of the Nineteenth Form of dress, stood, bowed to priests waiting beside the bower, and began to speak.  He orated upon the ancient roots of Clan Sea Blue in the days of the Bednálljan Empire; on the histories of the lineages of each young man or woman standing before him; on the virtues of duty to the clan, of honor and dignity.  Finally, when you felt your knees must buckle from supporting the massive weight of your jeweled and feathered headdress, he approached the first youth.  In turn each new name was read from a scroll, and a sacrifice was passed from a waiting slave to the youth, and from them to a priest of their faith.  When the elder came to stand before you, what name did he read out?\n*choice\n\t*if gender = \"female\"\n\t\t#Chentsúni.\n\t\t\t*set name  \"Chentsúni\"\n\t\t\t*goto namingR2\n\t\t#Mikúsa.\n\t\t\t*set name  \"Mikúsa\"\n\t\t\t*goto namingR2\n\t\t#Linátla.\n\t\t\t*set name  \"Linátla\"\n\t\t\t*goto namingR2\n\t\t#Osuré.\n\t\t\t*set name  \"Osuré\"\n\t\t\t*goto namingR2\n\t\t#Tlayésha.\n\t\t\t*set name  \"Tlayésha\"\n\t\t\t*goto namingR2\n\t\t#Visháya.\n\t\t\t*set name  \"Visháya\"\n\t\t\t*goto namingR2\n\t\t#None of these.\n\t\t\tReally?  What is your name then?\n\t\t\t*input_text name\n\t\t\t\n\t\t\t*goto namingR2\n\t*else\n\t\t#Achán.\n\t\t\t*set name  \"Achán\"\n\t\t\t*goto namingR2\n\t\t#Fíru.\n\t\t\t*set name  \"Fíru\"\n\t\t\t*goto namingR2\n\t\t#Kámar.\n\t\t\t*set name  \"Kámar\"\n\t\t\t*goto namingR2\n\t\t#Mnéktu.\n\t\t\t*set name  \"Mnéktu\"\n\t\t\t*goto namingR2\n\t\t#Túrisan.\n\t\t\t*set name  \"Túrisan\"\n\t\t\t*goto namingR2\n\t\t#Zhurák.\n\t\t\t*set name  \"Zhurák\"\n\t\t\t*goto namingR2\n\t\t#None of these.\n\t\t\tReally?  What is your name then?\n\t\t\t*input_text name\n\t\t\t\n\t\t\t*goto namingR2\n\t\t\t*label namingR2\n\t\t\tAn excellent and noble name!\n\t\t\tAnd what offering did you present?\n\t\t\t*choice\n\t\t\t\t*if God = \"Hnálla\"\n\t\t\t\t\t#A flawless clear diamond that my mother Dzái captured while away at war.\n\t\t\t\t\t\t*set offering  \"diamond\"\n\t\t\t\t\t\t*goto namingR3\n\t\t\t\t\t#A delicate white orchid from the Chákan jungles.\n\t\t\t\t\t\t*set offering  \"orchid\"\n\t\t\t\t\t\t*goto namingR3\n\t\t\t\t\t#A white thésun-gauze priest's robe.\n\t\t\t\t\t\t*set offering  \"robe\"\n\t\t\t\t\t\t*goto namingR3\n\t\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\t\t#A ritual lamp with obsidian panes that shed a dim purplish light.\n\t\t\t\t\t\t*set offering \"lamp\"\n\t\t\t\t\t\t*goto namingR3\n\t\t\t\t\t#A velvet mask shaped to resemble the monstrous visage of one of $!{lord} $!{god}'s aspects.\n\t\t\t\t\t\t*set offering \"mask\"\n\t\t\t\t\t\t*goto namingR3\n\t\t\t\t\t#Two matched khéshchal tail feathers, each of a bright purple hue, and some three feet in length.\n\t\t\t\t\t\t*set offering  \"khéshchal plumes\"\n\t\t\t\t\t\t*goto namingR3\t\t\n*label namingR3\nAs the priest accepted the ${offering}, your elder read out: \"The ancient and exalted clan of Sea Blue is proud to welcome its newest member, $!{name} ${lineage}. Otuléngba!\" At his joyous shout, the crowd replied in a chorus: \"Otuléngba! All Hail!\"\n*set status +10\n*if gender = \"female\"\n\t*set ara \"R4\"\n\t*label aridani_choice\n\t*page_break\n\tHaving been cued before the ceremony by Dzái, the clan elder now waited for you to claim your aridáni status. Since you were little, your birth mother had made it clear that she expected you to be the equal of all men before the law and to follow her into the army. How did you feel about this?\n\t*choice\n\t\t#I would have preferred to remain a simple woman of my clan, and live a life surrounded by my aunts and sisters.\n\t\t\t*if God = \"Avánthe\"\n\t\t\t\t*set noble %+10\n\t\t\tStories are full of reluctant heroes, drawn by the skeins of their destinies unto greatness, and such is your lot.  So, though you had misgivings in your heart, you could not bear to defy the fierce Mama Dzái, and announced:  \"Let it be recorded that, before all the honored and respectable people gathered here, I declare myself an aridáni woman.\"  The announcement was greeted with polite applause. Looking back, you do not think anyone noticed the regret in your voice.\n\t\t\t*goto namingtree\n\t\t#I was eager to assume the role of aridáni and soldier, and to make my mark upon the world.\n\t\t\t*if Clan = \"Red Sun\"\n\t\t\t\t*set noble %+10\n\t\t\tEver bold, you stepped forward, head held high, to announce:  \"Let it be recorded that, before all the honored and respectable people gathered here, I declare myself an aridáni woman.\"  The announcement was greeted with polite applause from the crowd and looks of pride on the faces of your mothers.\n\t\t\t*goto namingtree\n\t\t#I was glad to become aridáni and escape the stifling life of the good clan girl, but was not so sure about the soldier part.\n\t\t\t*if Clan = \"Red Sun\"\n\t\t\t\t*set noble %-10\n\t\t\tOut of curiosity, what did you want to do with your life?\n\t\t\t*fake_choice\n\t\t\t\t#Nothing! Work is for peasants.\n\t\t\t\t\tWhat's the point of being rich if you can't lay about, go to parties, and devote yourself to the finer things?  Sadly, your parents did not agree.\n\t\t\t\t\t*if God = \"Dlamélish\"\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t#I wanted to become a priest and devote my life to $!{lord} $!{god}.\n\t\t\t\t#I wished to devote myself to my studies and the recovery of lost knowledge.\n\t\t\t\t\t*if God = \"Hnálla\" \n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t*if (psychic > 10) or (ritual >10)\n\t\t\t\t\t#I wished to become the greatest sorcerer of my age.\n\t\t\t*comment endif\n\n\t\t\tIn the days to come you would have many impassioned arguments with Mama Dzái about the course of your life, but your destiny is entwined with that of the Legion of ${legion}, and there is no escaping destiny.  \n\t\t\t\n\t\t\tStanding in the garden on that day, you knew nothing of what was to come, and raised your voice proudly. \"Let it be recorded that, before all the honored and respectable people gathered here, I declare myself an aridáni woman.\"  As you announced this you met Dzái's eyes with a flash of stubbornness.\n\t\t\t*label namingtree\n\t\t\t*if ara = \"R4\"\n\t\t\t\t*goto namingR4\n\t\t\t*elseif ara = \"Mi4\"\n\t\t\t\t*goto namingMi4\n\t\t\t*else\n\t\t\t\t*goto namingMa4\n*else\n\t*label namingR4\n\t \n\tThe ritual of naming was repeated for the next clan-cousins, and then the elder stood before Wave, who presented the priest of $!{lord} $!{god} with a \n\t*if God = \"Hnálla\"\n\t\tnecklace of milky white moonstones.\n\t*if God = \"Hrü'ü\"\n\t\tnecklace of onyx beads.\n\tThe elder then read from the scroll, \"The ancient and exalted clan of $!{Clan} is proud to welcome its newest member, $!{wave} hiTánkolel.  Otuléngba!\" Once more the crowd shouted approval.\n\t*page_break\n\tSoon the ceremony ended, and attention drifted away from the newly named adults and onto more important things like fashion, gossip, trade deals, and news of the war with the country of Yán Kór.  Mama Dzái came forward and gave you a tight hug, as did her husbands Visán and Pi'úr, but she had just arrived that morning after over two years away, and it was not long until social obligation dragged them all off.  You found yourself left to your own devices.  Various rooms in the clanhouse were set aside for puppet shows, poetry readings, and a display by dancers.  How did you occupy yourself?\n\t*goto entertainments\n*label entertainments\n*temp R_entertainments 0\n*label R_entertainments\n*choice\n\t*hide_reuse #I looked for Wave—I mean $!{wave}.\n\t\t$!{wahe} was looking for you as well, and you both made a fine display as you explored the party.  $!{wave} was clearly enjoying acting the part of the sophisticated adult, an effect that was only ruined by occasional grins and laughter.\n\n\t\tNow that you young lovers were reunited, where did you venture?\n\t\t*set wav_rep +1\n\t\t*set wave_with true\n\t\t*goto R_entertainments\n\t*hide_reuse #I went to watch the puppet show.\n\t\tThe Clan of the Striding Incantation had a stage set up in one of the larger rooms, and had gathered a crowd.  On this stage, in front of backdrops of painted cloth, moved magically animated puppets, each the size of your forearm.  Directed by the spells of the puppeteers—the secrets of which are protected by law and assassination—the wooden figures were acting out the tale of Pendárte of Khéiris, who had traveled throughout the many planes of reality to rescue the soul of Princess Ssíneleth from the horrific demon Rü'ütlánesh.\n\t\n\t\tThe puppet playing Pendárte moved from plane to plane—each with its own backdrop, showing fantastical landscapes—and in each one faced a new foe crafted of paper or bone or gems.  Sometimes they would battle, while in other scenes Pendárte would humorously trick the demon.  In the climactic battle, the small hero was pitted against a monstrous and ill-formed puppet made of reeds and paper.  Pendárte's wooden sword clattered against Rü'ütlánesh's many limbs, occasionally breaking a reed with a loud snap that would cause the audience to gasp.  Rü'ütlánesh appeared to use magic to cause wounds to spontaneously open upon Pendárte and pour forth blood (or rather, red ink).  \n\t\t \n\t\tThe battle was waged back and forth across the stage, until finally Pendárte leaped upon the great demon's back and stabbed down with his sword into the fragile paper.  Then, from this husk rose the Princess Ssíneleth.  The crowd all snapped approval.\n\t\t*set R_entertainments +1\n\n\t\t*if R_entertainments \u003c 2\n\t\t\tThe evening was yet young; where did you go next?\n\t\t\t*goto R_entertainments\n\t\t*else\n\t\t\t*if wave_with = true\n\t\t\t\t*goto wave_bed\n\t\t\t*else\n\t\t\t\t*goto forced_to_bed\n\t*hide_reuse #I went to see the dancers.\n\t\tIn a tiled courtyard, young men and women adorned in transparent green (very little of it) danced to the music of drums and a stringed tenturén.  The silver bells upon their anklets created their own tune as they swayed and stamped in unison.  \n\t\t*if PrinceName = \"Mirusíya\"\n\t\t\tThese priests and priestesses of Dlamélish had been hired especially for this occasion from the larger and more cosmopolitan city of Tumíssa, and were drawing a lot of attention for their novelty.\n\t\t*if PrinceName = \"Rereshqála\"\n\t\t\tThere are many stories in Jakálla of nobles who have risked their wealth, social standing, and even lives for the favor of a skilled dancer, and those hired by Clan Sea Blue are very skilled indeed.\n\t\t*if PrinceName = \"Ma'ín\"\n\t\t\tThe troupe had been brought upriver from Jakálla as a special treat.  There are many stories in Jakálla of nobles who have risked their wealth, social standing, and even lives for the favor of a skilled dancer, and seeing these men and women perform you could almost believe the tales.\n\t\t*comment endif\n\t\t\n\t\tThe dancers continued their display, at times languorous, at others frantic.  \n\t\t*if wave_with = true\n\t\t\t*set dress true\n\t\t\tIt was all intensely erotic, and made you very aware of $!{wave} sitting next to you, resplendent in all ${wahis} finery.  $!{wave} must have been thinking the same thoughts.  The looks between you two became more smoldering, and by mutual consent you left the party to return to the dormitory, where you had a great deal of fun discovering how to remove formal dress of the traditional Nineteenth Form.\n\t\t\t*finish \n\t\t*else\n\t\t\t*set R_entertainments +1\n\t\t\t*if R_entertainments \u003c 2\n\t\t\t\tEventually, they paused to refresh themselves.  Where did you go then?\n\t\t\t\t*goto R_entertainments\n\t\t\t*else\n\t\t\t\t*goto fall_asleep\n\t*if PrinceName = \"Mirusíya\"\n\t\t*hide_reuse #I found a good view of the gladiatorial games.\n\t\t\tDown on the sand, potted plants had been arranged to create an impromptu cross between a jungle and a maze through which stalked two men, a woman, and a bulbous four-armed Páchi Léi, all carrying a wide variety of traditional hunting implements.  Visible to the audience looking down upon the scene, they were stalked in turn by a gray zrné beast, half again as long as a man is tall.  The audience found much humor and suspense in the near misses and circular progress as the gladiators stalked the beast and the beast stalked the gladiators around the arena floor.  \n\t\t\t*if wave_with = true\n\t\t\t\t$!{wave} grabbed your hand like a ${WaMan} drowning at each almost-encounter.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tThe humorous chase ended when the zrné and its hunters came to be separated by only a single wall woven through with vines.  Using its massive rearmost legs the beast leapt straight up the wall, intending to perch upon it, but instead causing the flimsy structure to topple down. With an affronted yowl that left many spectators clutching themselves in mirth, it leapt free of the tangled wreckage mid-fall and the battle was joined.\n\t\t\t\n\t\t\tOne of the men, who had been pinned beneath the vine screen, attempted to reclaim his feet while two of his comrades, wielding long spears, corralled the zrné between them, baiting it.  The Páchi Léi began to swing a weighted net, but as he let it fly the zrné grabbed hold of a spear behind the blade and yanked the woman off her feet.  The two ended up together beneath the net.  A gasp went up at this misfortune, but the gladiatrix would not accept her death.  She shoved her left arm, covered in overlapping layers of thick chlén hide, toward the beast, which latched on to it, bowling her over; and as it pinned her to the ground and began to rake her torso, she pulled a gleaming bronze dagger from her belt and plunged it into the zrné's spine right below the skull.\n\t\t\t \n\t\t\t*if wave_with = true\n\t\t\t\tAs the crowd went wild with excitement and cheers, $!{wave} stood and looked to see whether the woman was still breathing beneath the body of her foe. The other three gladiators finished off the beast, and a low-ranking priestess of Avánthe came out to inspect the mauled woman, before shaking her head sadly.  At this sad news $!{wave} became crest-fallen.  Soon the staff of the arena began to clear away the scenery and the two corpses.  It would be a while before the next entertainment.\n\t\t\t*if wave_with = false\n\t\t\t\tAs the crowd went wild with excitement and cheers, the other three gladiators finished off the beast, and a low-ranking priestess of Avánthe came out to inspect the mauled woman, before shaking her head sadly.  Soon the staff of the arena began to clear away the scenery and the two corpses.  It would be a while before the next entertainment.\n\t\t\t*set R_entertainments +1\n\t\t\t*if R_entertainments \u003c 2\n\t\t\t\tThe evening was yet young; where did you go next?\n\t\t\t\t*goto R_entertainments\n\t\t\t*else\n\t\t\t\t*if wave_with = true\n\t\t\t\t\t*goto wave_bed\n\t\t\t\t*else\n\t\t\t\t\t*goto forced_to_bed\n\t*if (PrinceName = \"Rereshqála\") or (PrinceName = \"Ma'ín\")\n\t\t*hide_reuse #I went to go listen to the poetry reading.\n\t\t\tYou came to a smaller chamber filled with a more subdued crowd.  In one corner was a dais upon which stood a poet, declaiming lines from \"The Lament to the Wheel of Black,\" the tale of the great war between the gods at the beginning of days, begun when Lord Ksárul, God of Secrets and Arcane Magic, attempted to make himself supreme over the others.  At first, the Gods of Change gladly joined him in fighting against their opposite numbers who served Stability, but one by one they realized that his victory would mean their subservience and joined forces with Stability to lock him within the Blue Room, where he remains imprisoned today.  \n\t\t\t\n\t\t\tThe last of the gods to leave his side was his lover Dlamélish, and it was of her betrayal that the poet spoke.  She began with the two walking together upon Dórmoron Plain, and Ksárul giving Dlamélish an obsidian dagger.  At this the audience all nodded and sighed, for it was well known that it was this dagger which Dlamélish used to erect her seal upon his prison.  \n\n\t\t\tThe poet was good—or perhaps had just suffered a breakup herself?—for she managed to infuse the dialogue between the two with frustration and sorrow, turning the stanzas into a referendum on the impossibility of love in a universe where pride holds sway.  The more soft-hearted audience members were openly weeping by the story's end.  \n\t\t\t*if wave_with = true\n\t\t\t\t$!{wave} looked at you apologetically, and squeezed your arm through the end of the tale, clearly regretting the events of the previous day.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tNo one seemed eager to follow the woman and there was a brief lull.  Did you seize the moment and deliver a poem?\n\t\t\t*set R_entertainments +1\n\t\t\t*choice\n\t\t\t\t#I am a classically educated and extremely cultured noble. Of course I chose to orate!\n\t\t\t\t\t*label poemR\n\t\t\t\t\tWhat kind of poem did you tell?\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#These people needed to be cheered up.  I declaimed something light and comical.\n\t\t\t\t\t\t\tYour story of a man ensorcelled to fall in love with one of the barbaric and inhuman Ahóggya left the audience weeping tears of mirth.  \n\t\t\t\t\t\t\t*if wave_with = true\n\t\t\t\t\t\t\t\tAt a couple of points $!{wave} burst out laughing, ${wahis} amusement echoing in the small chamber.\n\t\t\t\t\t\t#Clearly everyone present was a sucker for romantic tragedy, so I gave them more of the same.\n\t\t\t\t\t\t\tYour tale of a young man who tried to rescue his beloved from the Garden of the Weeping Snows—only to end frozen as a statue a hair's breadth from her touch for all eternity—reinforced the mood of sentimental despair.  A certain despondency hung in the room as you left.  \n\t\t\t\t\t\t#A tale of martial valor seemed appropriate; there was a war on, after all.\n\t\t\t\t\t\t\tYour action-filled story of the ancient hero Hrúgga and his travels got the audience's blood pumping.  A more festive atmosphere had returned by the time you stepped down from the dais and left the room.  \n\t\t\t\t\t\n\t\t\t\t\t*if R_entertainments \u003c 2\n\t\t\t\t\t\tThe evening was yet young; where did you go next?\n\t\t\t\t\t\t*goto R_entertainments\n\t\t\t\t\t*else\n\t\t\t\t\t\t*if wave_with = true\n\t\t\t\t\t\t\t*goto wave_bed\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto forced_to_bed\n\t\t\t\t#I am afraid I never had a head for memorization of such stories.\n\t\t\t\t\tNo one else immediately climbed the dais, and the lull grew boring.\n\t\t\t\t\t*if R_entertainments \u003c 2\n\t\t\t\t\t\tThe evening was yet young; where did you go next?\n\t\t\t\t\t\t*goto R_entertainments\n\t\t\t\t\t*else\n\t\t\t\t\t\t*if wave_with = true\n\t\t\t\t\t\t\t*goto wave_bed\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto forced_to_bed\n\t\t\t\t#I knew a great many poems, but was too shy to present myself.\n\t\t\t\t\tNo one else immediately climbed the dais, and you turned to leave only to hear Gayán call out your name.  \"La! It is one of the heroes of the day! $!{name}, come favor us with a tale.\"  Cloth rustled and feathers bobbed as every eye in the room turned to you.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I fled.\n\t\t\t\t\t\t\tMany of your soldiers would laugh to know that their Kási had retreated from a room of perfumed tale-tellers, but Jakállan sarcasm can be more cutting than a steel blade.\n\n\t\t\t\t\t\t\t*if wave_with = true\n\t\t\t\t\t\t\t\t$!{wave} chased after you, and suggested that you adjourn to the dormitory and tell ${wahim} a story in more intimate surroundings.\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*if R_entertainments \u003c 2\n\t\t\t\t\t\t\t\t\tThe evening was yet young; where did you go next?\n\t\t\t\t\t\t\t\t\t*goto R_entertainments\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto forced_to_bed\n\t\t\t\t\t\t#I walked to the dais, glaring at my brother.\n\t\t\t\t\t\t\t*goto poemR\n*label forced_to_bed\nAs you went in search of the next amusement, you were captured by Mama Halé and whisked off to bed.  You may have become an adult in the eyes of the law, but you began to suspect she would always see you as her child.\n*finish\t\t\t\t\t\t\t\n*label fall_asleep\nWatching them sway rhythmically to and fro, you fell into a gentle sleep.  It had been a long day.  Someone must have collected you when the party ended, for you have a vague memory of being groggily undressed, and then more unconsciousness.\n*finish\n*label Wave_Bed\n*set dress true\nBy this time the party had begun to thin, and by mutual consent you and $!{wave} left to return to the clanhouse's dormitory, where you had a great deal of fun discovering how to remove formal dress of the traditional Nineteenth Form.\n*finish\t\t\t\t\t\t\t\t\t\n*label namingMi1\nThe town of Butrús lies on a hill amidst the verdant Chákan jungles, an island of white walls and red tile roofs in a sea of greenery.  Butrús is the home of many of the aristocratic red clans, including your own $!{Clan}, and Lord Vimúhla is the most prominent deity.  The historic worship of the Lord of Flame combined with the constant threat of attack from the Mu'ugalavyáni on the nearby border has given the town a very martial air.  Thus, as Red Sun's procession wound through the streets, it was accompanied by the blaring of trumpets and waving of banners.  \n\nBy the time you reached the hirilákte arena, the parade had attracted a mob of curiosity-seekers.  Your clan elders had anticipated this, and had sponsored a day of gladiatorial games open to all.  Monstrous tsi'íl beasts roasted over fire pits, drops of their juices crackling as they hit the flames and filling the air with savory smells, while hawkers distributed beer and various snacks to the crowd.\n*page_break\nAs the ten of you stood alone upon the sand of the arena floor, what seemed like the entire town filed into the great stadium.  The sound of the crowd was overwhelming, but it quieted quickly when an older noble, dressed in formal armor, stood to speak. The excellent acoustics carried his voice to all present as he orated on the ancient roots of Clan Red Sun in the days of the Dragon Warriors, on the histories of the lineages of each young man or woman standing below, and on the virtues of duty to the clan, of honor, and of bravery.\n \nAt the end of this speech he motioned down to the first youth, who strode forward to grasp a sword planted in the sand.  From one of the arches emerged a scarred veteran, blade in hand.  The two met in the center of the arena, saluted each other, and began to duel.  The chlén-hide blades clacked together, and at first the terrified youth retreated, to the crowd's vocal displeasure.  In rebuke for this cowardice the soldier began to tauntingly flick out his blade at his opponent's arms and legs, lacerating them until anger got the better of fear and the young man began to advance, pressing the attack.\n \nAt this show of spirit the veteran smiled, and after a few exchanges allowed himself to be disarmed, but not before gifting his opponent with a slash along his right cheekbone.  Everyone held their breath at that.  It was an astonishing display of control, to strike so close to the eye, but leave it unharmed.  The youth would have a fine scar.\n\nWhen he had accepted the veteran's surrender, the boy turned and saluted the governor, and then the clan elder.  Making up for his poor performance at the start of the duel, he was now bearing his wounds with perfect stoicism.  The clan elder read his name off of a scroll, and the boy moved to a brazier, where he cut off the end of one of his braids and threw it upon the flame.  \n\nThis ritual was then repeated for each of you, and soon it was your turn to duel.\n*page_break\nAs you picked up the sword you found yourself facing a younger soldier from your mother Dzái's legion.  You both saluted, and she waited for you to make the first move.\n*choice\n\t#I rushed in quickly, eager to get this over with.\n\t\tYou hurried to the attack, hoping to get in a quick blow and so end the duel, startling your opponent into a series of defensive maneuvers.  She was highly skilled, and greeted your attack with a lunge that pierced through your calf, but the crowd cheered what they saw as a show of ferocity on your part.  Having bloodied you, and seeing your limp, the soldier graciously allowed you to disarm her in the next exchange.\n\t\t*goto namingM1\n\t#I took a defensive stance to better gauge my opponent's skill.\n\t\tThe crowd sighed in disappointment at the effective but less than entertaining strategy, making a sound like the wind moving through leaves.  The woman before you was more skilled than you were, and got in a single shallow cut upon your calf.  What then?\n\t\t*choice\n\t\t\t#It was important to make a good show so that she surrendered, not to actually beat her. I played it safe.\n\t\t\t\tYour form was neat and precise as you focused on blocking her attacks, occasionally making swings of your own that you knew would not get through.  You showed yourself to be competent with a weapon. After collecting a couple more shallow cuts, you managed to land a blow due to deliberate slowness on the part of your opponent, and she surrendered.\n\t\t\t\t*goto namingM1\n\t\t\t#A little trickery could balance things out and hand me victory.\n\t\t\t\t*set dutiful %-10\n\t\t\t\tUsing a move more suited to the battlefield than a ritual duel, you enticed the soldier into a low lunge and then kicked sand in her face.  In the moment she was blinded you moved in to hit her wrist with the flat of your blade, but she was quicker than you expected and got a long cut in across your chest before your blow knocked her sword from numb fingers.\n\t\t\t\t\n\t\t\t\tYou stood defiantly before the crowd, blood running onto your finery. The murmur of conversation became louder as those in the stands debated your tactic.  Some felt it was dishonorably done, but others thought it showed true soldier's grit.  Dzái seemed proud, Halé concerned.  If your goal was to be provocative, you certainly achieved it.\n\t\t\t\t*goto namingM1\n\t\t\t#If I was willing to take some serious wounds, I knew I could defeat her.\n\t\t\t\t*set noble %+10\n\t\t\t\tYou began to press the attack, leaving yourself open.  The young soldier did not take full advantage of the opportunities you presented her—it is hardly appropriate to kill a youth on the day of their naming—but soon you were sporting a number of cuts.  The tactic had its effect, however, and one of your furious swings got through to scrape across her thigh.\n\t\t\t\t\n\t\t\t\tAs the soldier fell to one knee, you turned victorious to the governor, and the crowd gave a mighty roar of approval.  You were unsteady on your feet through the rest of the ceremony, possibly due to the fact that you seemed to be wearing most of your blood on the outside, but Mother Dzái was shining with pride.\n\t\t\t\t*goto namingM1\n\t#I flourished my blade, intending to put on a show.\n\t\tThe stadium quieted at your display of flare.  These duels are usually not very entertaining, unless one counts unintentionally comedic performances on the part of the new adults, so the crowd was eager for excitement.  Your opponent smiled jovially and began to play along with sweeps, rolls, and pirouettes more akin to stage fighting than any true battle.  The display culminated in you \"disarming\" the young lady, who graciously allowed you to knock her sword spinning into the air.  As you posed, blade at her throat, the common people burst into wild cheers and snapping applause. Many of the older soldiers seemed less than amused by the show, which was not a true display of danger and combat, and unfortunately Dzái was among this group. \n\t\t*goto namingM1\n*label namingM1\n\nYou moved toward the brazier, and the clan elder squinted down at the scroll in his hands.  What name was written there?\n*choice\n\t*if gender = \"female\"\n\t\t#Chentsúni\n\t\t\t*set name  \"Chentsúni\"\n\t\t\t*goto namingM2\n\t\t#Mikúsa\n\t\t\t*set name  \"Mikúsa\"\n\t\t\t*goto namingM2\n\t\t#Linátla\n\t\t\t*set name  \"Linátla\"\n\t\t\t*goto namingM2\n\t\t#Osuré\n\t\t\t*set name  \"Osuré\"\n\t\t\t*goto namingM2\n\t\t#Tlayésha\n\t\t\t*set name  \"Tlayésha\"\n\t\t\t*goto namingM2\n\t\t#Visháya\n\t\t\t*set name  \"Visháya\"\n\t\t\t*goto namingM2\n\t\t#None of these\n\t\t\tReally?  What is your name then?\n\t\t\t*input_text name\n\t\t\t\n\t\t\t*goto namingM2\n\t*else\n\t\t#Achán\n\t\t\t*set name  \"Achán\"\n\t\t\t*goto namingM2\n\t\t#Fíru\n\t\t\t*set name  \"Fíru\"\n\t\t\t*goto namingM2\n\t\t#Kámar\n\t\t\t*set name  \"Kámar\"\n\t\t\t*goto namingM2\n\t\t#Mnéktu\n\t\t\t*set name  \"Mnéktu\"\n\t\t\t*goto namingM2\n\t\t#Túrisan\n\t\t\t*set name  \"Túrisan\"\n\t\t\t*goto namingM2\n\t\t#Zhurák\n\t\t\t*set name  \"Zhurák\"\n\t\t\t*goto namingM2\n\t\t#None of these\n\t\t\tReally?  What is your name then?\n\t\t\t*input_text name\n\t\t\t\n\t\t\t*goto namingM2\n*label namingM2\nAn excellent and noble name!\n\nAs you burned your offering of hair, your elder read out, \"The ancient and exalted clan of ${Clan} is proud to welcome its newest member, $!{name} ${lineage}.  Otuléngba!\" At his joyous shout, the crowd replied in a chorus: \"Otuléngba! All Hail!\"\n*set status +10\n\n*if gender = \"female\"\n\t*set ara \"Mi4\"\n\t*goto aridani_choice\n*else\t\t\n\t*label namingMi4\n\t \n\tThe ritual of naming was repeated for the next clan-cousins, and then Wave completed ${wahis} own, rather formulaic duel (${wahe} was no \n\t*if wahe = \"he\"\n\t\tswordsman), \n\t*if wahe = \"she\"\n\t\tswordswoman), \n\tand offered up ${wahis} hair.\n\t\n\tThe elder then read from the scroll, \"The ancient and exalted clan of Red Sun is proud to welcome its newest member, $!{wave} hiTánkolel.  Otuléngba!\" Once more the crowd shouted approval.\n\t*page_break\n\tSoon the ceremony ended and you were ushered from the field to make way for the gladiatorial games.  Mama Dzái came forward and gave you a tight hug, as did her husbands Visán and Pi'úr, but she had just arrived that morning after over two years away, and it was not long until social obligation dragged them all off.  You found yourself left to your own devices.   A large section of the hirilákte arena had been set aside for the guests of Clan $!{Clan} and a party was underway, spilling out into the streets.  How did you occupy yourself?\n\t*goto entertainments\n*label namingMa1\nThe city of Béy Sü lays alongside the mighty Mssúma River in the heart of the Empire.  This epicenter of mercantile trade, bureaucracy, and priestly politics is known as \"The Soul of the World.\" Thus, as White Stone's parade wound through the city's streets to the Temple of $!{lord} $!{god}, it was but one small display amongst many in the giant metropolis.  It was, however, an especially fine one, including a select group of the most important people in the most powerful city in the greatest empire since the fall of Engsván hla Gánga.\n\n*if god = \"Avánthe\"\n\tThe ceremony at the temple was similarly tasteful and intimate. \n*if god = \"Dlamélish\"\n\tThe ceremony at the temple was sumptuous and exclusive.\nThe noble guests filed through a vast courtyard lined with statues of the aspects of the Goddess, and into a small but opulent shrine.  In the cool shadows of the vaulted ceiling the guests arranged themselves on a series of raised daises according to rank while the ten of you stood before an altar.  There you waited, still and proud, on display, as what seemed at th
