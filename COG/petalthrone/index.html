e healed and ransomed.\n\t\t\t\t\t\tAs your fallen opponent is carried from the field, the trumpets signal and your tsurúm forms up.  The battle has begun!\n\t\t\t\t\t\t*set loudmouth_captured true\n\t\t\t\t\t\t*goto Melee\n\t\t\t\t\t#I call for a priest.  He fought well and should be sacrificed.\n\t\t\t\t\t\tAs your fallen opponent is carried from the field, the trumpets signal and your tsurúm forms up.  The battle has begun!\n\t\t\t\t\t\t*set loudmouth_sacrifice true\n\t\t\t\t\t\t*goto Melee\n\t\t\t\t\t#I surreptitiously stab him in the throat.  This braggart is unworthy of either mercy or sacrifice.\n\t\t\t\t\t\tYou turn from the enemy's corpse as trumpets signal and your tsurúm forms up.  The battle has begun!\n\t\t\t\t\t\t*set Noble %-10\n\t\t\t\t\t\t*goto Melee\n\t\t\t*else\n\t\t\t\tYou meet with a slam between the two armies.  He's strong as a chlén, and though you put up a good fight, his mighty blows drive you back.  Under the heat of the sun, you feel exhaustion setting in, and in a moment of distraction a blow like an axe strikes your head.  The world goes dark.\n\t\t\t\t*page_break You Awaken\n\t\t\t\t*goto_scene battlelost \n\t\t#I let one of my soldiers charge forward. \n\t\t\tHeréksa Rayána waits to see if you will step forward to face the challenger.  Seeing you pause, she strengthens her grip upon her shield and chlén-hide sword and moves forward. You consider ordering her to stay put, but it would look bad if the challenge were not met.  Rayána puts up a valorous fight, but is outmatched.  In the end she is hit by a blow to the right knee and crumples to the earth.\n\n\t\t\tThe nameless challenger gives a roar, and then strips Rayána of her weapons and calls for her to be carried from the field as either slave or sacrifice.  You hope that the enemy have good physicians.  Seeing the popular Heréksa fall, your soldiers grow quieter.  The trumpets begin signaling formations, and the battle begins.\n\t\t\t*set Her_captured true\n\t\t\t*goto Melee\n\t\t#I caution my soldiers to stand fast and ignore his barbs.  \n\t\t\t\"We will find honor in winning the battle and taking the city, not in besting this loudmouth.  He is a distraction, nothing more,\" you shout as the enemy continues to mock the name of your legion. Your Heréksa Rayána grinds her teeth in aggravation but holds the line, and the discontented men and women follow her example. Finally, the trumpets begin signaling formations, and the battle begins.\n\t\t\t*set her_rep -1\n\t\t\t*set morale -1\n\t\t\t*goto Melee\n*else\n\t\n\tYou see Rayána strengthen her grip upon her shield and chlén-hide sword, and move forward to answer the challenge.\n\t*choice\n\t\t#I let Rayána fight.  \n\t\t\tRayána leaps to the attack with enthusiasm, but is over-matched.  In the end she is hit by a blow to the right knee and crumples to the earth.\n\t\t\t\n\t\t\tThe nameless challenger gives a roar, and then strips Rayána of her weapons and calls for her to be carried from the field as either slave or sacrifice.  You hope that the enemy have good physicians.  Seeing the popular Heréksa fall, your men and women grow quieter.  The trumpets begin signaling formations, and the battle begins.\n\t\t\t*set Her_captured true\n\t\t\t*set her_rep +1\n\t\t\t*goto Melee\n\t\t#I order $!{wave} to signal a halt.  \n\t\t\tThe enemy continues to mock the good name of your legion. Rayána grinds her teeth in aggravation but holds the line. Finally, the trumpets begin signaling formations, and the battle begins.\n\t\t\t*set her_rep -1\n\t\t\t*goto Melee\n\n*label Melee\n*page_break\n*if Location = 1\n\tYour tsúrum's role is to hold position on the right flank until your Dritlán sees an appropriate opening and signals for the squads under his command to rush in.  Around you, orderly lines march to battle. Your brothers and sisters in arms struggle in the dust and heat, fighting and dying.   \n\t\n\tThe main body of ${AlliedLegion} is hammered repeatedly along the right, as Sikún hiKhanúma employs \"The Mace of Vimúhla,\" expending all his effort upon crumpling that side, just as Nirún had predicted.  The men and women of Nirún's tsurúm retreat over their own dead and dying, giving ground to the enemy, but you still have not heard the signal to join battle. \n\t*choice\n\t\t#I wait patiently.\n\t\t\tUsing well-drilled formation changes, your tsurúm deflects attackers but continues not to fully engage, as the right flank of ${AlliedLegion} begins to fall to pieces.  Why did you choose this course?\n\t\t\t*choice\n\t\t\t\t#Because I obey orders.\n\t\t\t\t\tA very Tsolyáni viewpoint.  You put your faith in your superiors upon the viewing platform, trusting that what looks like an error from your position on the ground is part of a larger strategy.  Some of your soldiers seem less sure, and grow disheartened.\n\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*set morale -1\n\t\t\t\t\t*goto Engage\n\t\t\t\t#Better them than me.\n\t\t\t\t\tI suppose you shall live to fight another day, no matter what happens here.  A servant passes you a dewy skin of cold chumétl as you rest, conserving your energy.\n\t\t\t\t\t*set noble %-10\n\t\t\t\t\t*set morale -1\n\t\t\t\t\t*goto Engage\n\t\t\t\t#Because it makes tactical sense.\n\t\t\t\t\tSurely this is a trap set by the Generals to bring the enemy's potent left flank fully within your \n\t\t\t\t\t*If tactics>60\n\t\t\t\t\t\treach…as you think this, you look closer at the obvious disarray, and note the lack of coded signals ordering such a feint.  This is not a ruse.  The rightmost tsurúm is in disarray!\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto interfere\n\t\t\t\t\t*else\n\t\t\t\t\t\treach. Trap it may be, but springing it is costly indeed, and by the time the retreat is done, the rightmost tsurúm is broken, barely holding a line.\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t\t*set morale -1\n\t\t\t\t\t\t*goto Engage\n\t\t#I lead my tsurúm to their aid.\n\t\t\t*label interfere\n\t\t\t*set SaveAllies true\n\t\t\t*achieve ally\n\t\t\t*set nir_rep +2\n\t\t\tYou and your four hundred soldiers move forward, forcing the enemy block to confront you, and giving Nirún's retreating tsurúm time to consolidate ranks, gather their courage, and catch their breaths.\n\t\t\t*if Tactics >75\n\t\t\t\tYour engagement with the enemy is brief enough only to blunt their force without compromising your own position. As you disengage, the right flank of ${AlliedLegion} is stabilized, and though they continue to give way, it is in good order with few losses.\n\t\t\t\t*set morale +1\n\t\t\t\t*goto Engage\n\t\t\t*else\n\t\t\t\tYour engagement with the enemy quickly becomes a bloody brawl as your soldiers, frustrated with their idleness upon the sidelines, engage too fully. When you finally are able to disengage, the allied soldiers have reformed into an orderly retreat, but at great cost to your own unit.\n\t\t\t\t*set morale -1\n\t\t\t\t*goto Engage\n*elseif Location = 2\n\tYour tsurúm's role is to hold position on the right flank until your Dritlán sees an appropriate opening and signals for the squads under his command to rush in.  Orderly lines march to battle, but the field is soon obscured by clouds of dust from within which the sounds of fighting and dying emanate.  Your soldiers stand unused on the far right side while ${AlliedLegion} engages.  Though you will direct your tsurúm, it is Núromen's decision when to order you into battle.  What do you do in the meantime?\n\t*choice\n\t\t#I analyze the bigger picture so I am prepared when the signal comes.\n\t\t\tThe enemy general has decided to meet the \"Two Mighty Gauntlets of Hrúgga\" with the \"Mace of Vimúhla.\" His center holds strong against the main body of ${AlliedLegion}, neither advancing nor retreating, while an angled unit of skirmishers and medium infantry counter your Left Gauntlet. The right is where this battle will be won or lost, as the enemy has formed his heaviest units into a powerful hammer to strike again and again at the right flank of the allied center, just as Nirún had predicted.\n\t\t\t\n\t\t\t*if tactics \u003c55\n\t\t\t\tAs you wait to be ordered into battle, you witness the first success of such a hammering. Despite a chaos of blared orders and formation changes, the tsurúm of Kási Nirún is broken and forced to regroup after giving up significant ground to the enemy.\n\t\t\t\t*goto engage\n\t\t\t*else\n\t\t\t\tYou suspect that the rightmost tsurúm, under Kási Nirún, will soon be routed entirely, though he seems to be pursuing a strategy of dogged perseverance.\n\t\t\t\t*choice\n\t\t\t\t\t#It is not my place to manage his men.\n\t\t\t\t\t\tAs you watch, the tsurúm of Kási Nirún is broken and forced to regroup after giving up significant ground to the enemy.\n\t\t\t\t\t\t*goto engage\n\t\t\t\t\t#I should speak with the Dritlán about lending the aid of my tsurúm.\n\t\t\t\t\t\t*label AidConvo\n\t\t\t\t\t\tDritlán Núromen is especially prickly this day—a cynic might say that he is always at his worst when tasked with positions requiring flexibility and independent action—and his answers are brusque.  Yes, he has seen \"Nirún's blunder.\" No, he does not consider it opportune to intervene. No, he is not interested in debate.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I accept his decision, and drop the matter.\n\t\t\t\t\t\t\t\t*set dutiful %+10\n\t\t\t\t\t\t\t\t*label acquiesce\n\t\t\t\t\t\t\t\tThe hierarchy that allows Tsolyáni military and society to function so efficiently is bred into you.  Knowing that dissension amongst officers will surely mean the loss of the battle, you salute and walk away.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if NirunTalk = True\n\t\t\t\t\t\t\t\t\tUpon hearing the decision, Kási Nirún nods grimly and returns his attention to fighting a losing battle.\n\t\t\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIn the end, the tsurúm of Kási Nirún is broken and forced to regroup after giving up significant ground to the enemy.\n\t\t\t\t\t\t\t\t*goto Engage\n\t\t\t\t\t\t\t#I press the point.\n\t\t\t\t\t\t\t\t*label press\t\n\t\t\t\t\t\t\t\t*if Diplomacy >60\n\t\t\t\t\t\t\t\t\t\"The Kási humbly asks that you lend your considerable expertise and tactical insight in order to extricate him from his folly,\" you open. \n\t\t\t\t\t\t\t\t*if Diplomacy \u003c=60\n\t\t\t\t\t\t\t\t\t\"Kási Nirún needs the might of our forces to help him hold the right center,\" you open. \n\t\t\t\t\t\t\t\tIt soon becomes clear that the Dritlán refuses to grasp the enormity of a damaged right center, and secretly hopes to wait and snatch victory from the jaws of defeat, in an effort to count coup upon Nirún's superiors and be lauded as the savior of the battle.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if diplomacy >60\n\t\t\t\t\t\t\t\t\tWith honeyed words you convince him that a timely intervention now would place him as the savior of the moment, positioned to receive the bountiful gifts of those whom he helped save face.\n\t\t\t\t\t\t\t\t\t*goto IntervenePlatform\n\t\t\t\t\t\t\t\t*elseif tactics >65\n\t\t\t\t\t\t\t\t\tWith effort you point out the miscalculation he is making and convince him that, if Nirún's tsurúm fails, the battle may be lost, and then questions of why more was not done will be asked.\n\t\t\t\t\t\t\t\t\t*goto IntervenePlatform\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tUnfortunately, this insight counts for little, when you cannot make him change his mind.  Your words run off him like rain off an oiled cloak, and the only result is his rising pique.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tIn the end, the tsurúm of Kási Nirún is broken and forced to regroup after giving up significant ground to the enemy.\n\t\t\t\t\t\t\t\t\t*goto Engage\n\t\t#I talk with other officers.\n\t\t\tAs a kási, you are the lowest ranked officer upon the platform, and few have time for you.  With whom do you speak?\n\t\t\t*choice\n\t\t\t\t#My direct superior, Dritlán Núromen.\n\t\t\t\t\tDritlán Núromen is especially prickly this day—a cynic might say that he is always at his worst when tasked with positions requiring flexibility and independent action—but he seems mollified that you have come to \"learn at his feet\" and is soon discussing the battle in fine pedantic style.  \n\t\t\t\t\t*if tactics >55\n\t\t\t\t\t\tHis views are a perfect reflection of the wisdom of the great strategists who have come before, but lacking the perception needed to apply them in the necessarily timely manner—a perfect theory with no knowledge of application.\n\t\t\t\t\t*if tactics \u003c=55\n\t\t\t\t\t\tHis views are a perfect reflection of the wisdom of the great strategists who have come before, and you are impressed at his ability to bring all the relevant quotes and configurations to mind as they appear on the field.\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tEventually he winds down and motions to the right flank of the Legion of ${alliedlegion}, where the tsurúm of Nirún is being forced into disorderly retreat by the powerful blows of the enemy.  \"Look at that blunder.  It threatens the stability of the entire allied formation, but it also lures the enemy into overreaching and being outflanked by your soldiers.  How do you read the situation?\"\n\t\t\t\t\t*if tactics >60\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt is clear to you the Dritlán refuses to grasp the enormity of a damaged right flank for ${AlliedLegion}, and hopes to wait and snatch victory from the jaws of defeat in an effort to count coup upon Nirún superiors and be lauded as the savior of the battle.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"We should sacrifice Kási Nirún's unit.\"\n\t\t\t\t\t\t\tThe Dritlán nods in approval. You watch, and the Dritlán dissects, each flailing attempt to hold position, as the tsurúm of Kási Nirún is broken and forced to regroup after giving up significant ground to the enemy. \n\t\t\t\t\t\t\t*goto Engage\n\t\t\t\t\t\t#\"We should save Kási Nirún's unit.\"\n\t\t\t\t\t\t\tWith honeyed words you convince him that a timely intervention would place him as the savior of the moment, positioned to receive the bountiful gifts of those whom he helped save face.\n\t\t\t\t\t\t\t*label IntervenePlatform\n\t\t\t\t\t\t\t*set SaveAllies True\n\t\t\t\t\t\t\t*achieve ally\n\t\t\t\t\t\t\t*set nir_rep +2\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou order your four hundred soldiers forward, forcing the enemy block to confront them, and giving the retreating allies time to consolidate ranks, gather their courage, and catch their breaths.\n\t\t\t\t\t\t\t*if Tactics >70\n\t\t\t\t\t\t\t\tYour engagement with the enemy is brief enough only to blunt their force without compromising your own position.  As you disengage, the right flank of the Legion of ${alliedlegion} is stabilized, and their retreat once more in order.\n\t\t\t\t\t\t\t\t*set drit_happy true\n\t\t\t\t\t\t\t\t*goto Engage\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYour engagement with the enemy quickly becomes a bloody brawl as your soldiers, frustrated with their idleness upon the sidelines, engage too fully.  When you finally are able to disengage, the allied soldiers have reformed into an orderly retreat, but at great cost to your own unit.  Seeing the carnage, the Dritlán purses his lips, tsk'ing.  \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Exactly as I feared.  We have squandered our strength in disproportion to our gain, and now there will be no room for future error. I shall need to take a more direct hand in the management of your tsurúm, to ensure victory.\"\n\t\t\t\t\t\t\t\t*set drit_hostile true \n\t\t\t\t\t\t\t\t*achieve insubordinate\n\t\t\t\t\t\t\t\t*goto Engage\n\t\t\t\t#Nirún, a kási in the ${AlliedLegion} whose tsurúm holds the rightmost flank.\n\t\t\t\t\t\"$!{name}.  I was hoping you would come to speak with me.  The entire weight of the enemy legion has been formed into a hammer, and my tsurúm is the anvil upon which their blows will fall.  I do not know the plans your Dritlán has for his reserves, but I believe their timely aid would make my losses lighter.\"\n\t\t\t\t\t*if tactics >55\n\t\t\t\t\t\tYou can see from the situation that Nirún is understating the point. His losses are not the concern, so much as his ability to hold position at all.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I shall carry word of his request to my Dritlán.\n\t\t\t\t\t\t\t*set niruntalk true\n\t\t\t\t\t\t\t*goto AidConvo\n\t\t\t\t\t\t#My help does not come cheap.\n\t\t\t\t\t\t\t*set NirBribe true\n\t\t\t\t\t\t\t\"The Dritlán will use his best judgment, but it is true that he relies heavily on my advice.\" You let the sentence hang in the air, meaningfully.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if Diplomacy >60\n\t\t\t\t\t\t\t\tPicking up on your \"hint,\" Kási Nirún mentions the hopes his clan and superiors have placed in his charge, their wrath in the face of failure, and their generosity in victory.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAn understanding reached, you go to bend the ear of your Dritlán.\n\t\t\t\t\t\t\t\t*set niruntalk true\n\t\t\t\t\t\t\t\t*goto AidConvo\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tNirún seems affronted by your intimation.  \"I had thought that the Legion of ${alliedlegion} and the Legion of ${legion} were fighting together in this battle, but I see it is not the case.  If victory for our ${Prince} is not enough of an inducement for you, I have nothing more precious I can offer.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Now I feel bad; I'll go talk with the Dritlán.\n\t\t\t\t\t\t\t\t\t\t*set niruntalk true\n\t\t\t\t\t\t\t\t\t\t*goto AidConvo\n\t\t\t\t\t\t\t\t\t#He can't put the burden of this failure on me!\n\t\t\t\t\t\t\t\t\t\tBluntly, you remind him that it is not your tsurúm or your legion failing and fleeing before Dhich'uné's men before stalking off.  Dritlán Núromen decides not to intervene and the inevitable rout occurs. Kási Nirún's tsurúm is broken and forced to regroup after giving up significant ground.\n\t\t\t\t\t\t\t\t\t\t*set nir_rep -1\n\t\t\t\t\t\t\t\t\t\t*goto engage\n\t\t\t\t\t\t#I won't have my soldiers sent in to bail him out.\n\t\t\t\t\t\t\tPretending not to pick up on his request, you offer sympathies to Kási Nirún, and assure him that Dritlán Núromen is monitoring the situation, alert for the perfect moment to deploy the Right Gauntlet.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if diplomacy >65\n\t\t\t\t\t\t\t\tWith polished ease you deflect the pleas he is too prideful to make directly, and focus his hopes on your Dritlán's grasp of tactics. When Núromen decides not to intervene, and the inevitable rout occurs, you offer sympathy, one kási to another—den-den pieces moved around by the Generals and their Dritlán—and he accepts it, his ire focused solely upon your superior.\n\t\t\t\t\t\t\t\t*goto engage\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tBluntly, you remind him that it is not your decision when to advance, but that of your Dritlán.  When Núromen decides not to intervene, the inevitable rout occurs, leaving Kási Nirún's tsurúm broken and forced to regroup after giving up significant ground. Your offer of sympathy, such as it is, is rebuffed, and it is clear that Kási Nirún blames you for not taking his request to your superior.\n\t\t\t\t\t\t\t\t*set nir_rep -1\n\t\t\t\t\t\t\t\t*goto engage\n\t\t#I relax.\n\t\t\tWar can be quite civilized in the Five Empires. You are brought a tray of dainties, some wine, and cold chumétl. Slaves fan you to keep off the heat and conserve your energies for the moment of action.  By your side waits your personal Signaler and childhood companion. $!{wave} gives you—or is it the delicacies?—covert glances.\n\t\t\t\n\t\t\t\"I love the view from the platform,\" ${wahe} says, \"the closest a mortal can get to the vision of the gods perhaps.  Seeing the struggle and knowing that, were I to give command with my trumpet, men would march, soldiers would die, and battle would be won or lost.\"  \n\t\t\t*choice\n\t\t\t\t#I flirt with $!{wave}.\n\t\t\t\t\t\"You are certainly the vision of a ${WaGod}, and I find it hard to keep my eyes upon the battle. You would not need your trumpet to command me.\"\n\t\t\t\t\t\n\t\t\t\t\t\"That is as well, since it is at your will that I sound it. Do you—\"\n\t\t\t\t\t\n\t\t\t\t\tAround you there is a chaos of shouted orders and blaring trumpets. Kási Nirún of the ${AlliedLegion} is stoically holding panic at bay, as his soldiers on the right flank are driven back. His glances to your Dritlán make it clear he expects, or at least hopes, for your troops to come to his rescue, but instead of help Núromen gives him a parsimonious frown, and waves you back down to a seated position.\n\t\t\t\t\t\n\t\t\t\t\tSuch a large loss of ground by the right flank of the Legion of ${alliedlegion} has created a change in battle plans and necessitated an end to further conversation, though you fancy you are cast some smoldering looks throughout the rest of the battle.\n\t\t\t\t\t*set wav_rep +2\n\t\t\t\t\t*goto Engage\n\t\t\t\t#I take ${wahim} down a peg.\n\t\t\t\t\t\"It is no more your command than it is that of the trumpet. Both you and your instrument are my voice, agents of my will; and though you look down from a great height, I doubt you see much. War is like a game of den-den; it is not enough to move pieces about the board like a child. The true vision is in seeing the moves that have not yet come.\"\n\t\t\t\t\t\n\t\t\t\t\tAs if your words were prophetic, there is a sudden chaos of shouted orders and blaring trumpets, as Kási Nirún of the ${AlliedLegion} orders a poor move, causing his soldiers to be driven back. His panicked glances to your Dritlán make it clear he expects, or at least hopes, for your troops to come to his rescue, but instead of help Núromen gives him a parsimonious frown, and waves you back down to a seated position.\n\t\t\t\t\t\n\t\t\t\t\tLuckily for the victim of your acid tongue, the loss of ground by the right flank of ${AlliedLegion} has created a change in battle plans and necessitated an end to further conversation.\n\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t*goto Engage\n\t\t\t\t#Finally, some civilized conversation!\n\t\t\t\t\t\"You seemed quite contemptuous of such a view when Dritlán Núromen expressed as much last night.  Are you so changeable?\"\n\t\t\t\t\t\n\t\t\t\t\t\"It was not the philosophy I objected to, it was the tone of delivery.  I think you made the wiser decision to be up here, as opposed to down upon the field.\"\n\t\t\t\t\t\n\t\t\t\t\t\"I am so glad you approve of my decisions, soldier,\" you say, letting a slight irony drip into your tone.  \n\t\t\t\t\t\n\t\t\t\t\tYou're unsure whether ${wahe} intends to apologize or make some riposte.  There is a sudden chaos of shouted orders and blaring trumpets. Kási Nirún of the ${AlliedLegion} is stoically holding panic at bay, as his soldiers on the right flank are driven back. His glances to your Dritlán make it clear he expects, or at least hopes, for your troops to come to his rescue, but instead of help Núromen gives him a parsimonious frown, and waves you back down to a seated position.\n\t\t\t\t\t\n\t\t\t\t\tSadly, the loss of ground by the right flank of ${AlliedLegion} has created a change in battle plans and necessitated an end to further conversation.\n\t\t\t\t\t*set wav_rep +1\n\t\t\t\t\t*goto Engage\n\t\t\t\t*if reprimand = true\n\t\t\t\t\t#I bring up ${wahis} shameful display last night.\n\t\t\t\t\t\t\"And yet, when our Dritlán, Núromen, expressed nearly that same view last night, you saw fit to make mock of him.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I am sorry, sir; his tone struck me as amusing is all. I should learn more self control.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"That you should.  He is the commander of half a legion, and thousands of soldiers. You command a trumpet. Your relative places should be obvious even were you not under my command, and thus under his.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe dressing down is interrupted by a sudden chaos of shouted orders and blaring trumpets. Kási Nirún of the ${AlliedLegion} is stoically holding panic at bay, as his soldiers on the right flank are driven back.  His glances to your Dritlán make it clear he expects, or at least hopes, for your troops to come to his rescue, but instead of help Núromen gives him a parsimonious frown, and waves you back down to a seated position.\n\t\t\t\t\t\t\n\t\t\t\t\t\t$!{wave}, trumpet in hand, seems about to protest the inaction, but looks instead to you and sets it down once more.  Maybe your words have taken root.\n\t\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t\t*goto Engage\n*else\n\tOver a hill of dried grass, set into a baked brick wall, the southern gate is sparsely guarded by the half-starved remnants of the town's market police.  Even so, a handful of soldiers atop a fortified wall can hold off your káreng of a hundred until help arrives, unless an advantage can be won through your magics.  Which spell will best help you tip the balance of power and take the gate?\n\t*choice\n\t\t*if psychic >10 \n\t\t\t#I will use Domination to compel them to surrender.\n\t\t\t\tWalking alone toward the gate, you present little threat, and the soldiers line up to call insults down upon you.  \"Come now, we're all friends here,\" you say, summoning forth your pedhétl and then unleashing it in a psychic wave invisible to these simple townsmen.  \"Why don't you open the gate, and let us in to talk?\"\n\t\t\t\t\n\t\t\t\tYou soldiers are awed and apprehensive as they march under the wall, clearly expecting projectiles or boiling oil to rain down at any moment.  The market police, however, having opened the gate, stand back and await further orders peaceably.  Of course, the spell will soon wear off.\n\t\t\t\t*choice\n\t\t\t\t\t#Our best bet is to melt away into the city before the alarm is sounded.\n\t\t\t\t\t\tAt you motion to keep moving, Heréksa Rayána quickly divides the tsurúm into five twenty-man semétls, making sure each remembers its assigned route to the main gate. As you move into the cluster of clanhouses nearby, the gatehouse is barely lost to view before you hear bells ring and trumpets sound for reinforcements.  The chase is on!\n\t\t\t\t\t\t*goto fraught\n\t\t\t\t\t#Dead men tell no tales.\n\t\t\t\t\t\tYou move your soldiers to surround the gate guards, two soldiers to each policeman.  At the signal, moving with the precision brought by years of drilling, each couple moves in unison to muffle and then exsanguinate its chosen victim.  The only sound is from one aged guardsman, who cries out in pain when Heréksa Rayána fails to silence him, instead standing frozen as her partner delivers the killing blow.  His cry is feeble and quickly ended, but it is probably still best to move on from this place.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe soldiers divide themselves into five twenty-man semétls, each taking a different route to the main gate.  Rayána seems shaken and preoccupied as she leads her group off into the shadows.  Your semétl is halfway through the city before you hear, faintly from behind you, the distant shouts of alarm at the small gatehouse.\n\t\t\t\t\t\t*set her_abandon true\n\t\t\t\t\t\t*set her_rep -2\n\t\t\t\t\t\t*goto peaceful\n\t\t\t#I will use Prorogation to slow their thoughts and movements as my soldiers seize the gate.\n\t\t\t\t*if tactics \u003c65\n\t\t\t\t\tYou give the order and your soldiers crest the hill, launching a volley of javelins that clears the wall. Some gate guards duck and others fall to bleed in the street below.  By the time your soldiers have reached the gate, some sending grapnels flying, others providing cover with bow and javelin, the enemy force has recovered.  You send dizzying blasts of psychic energy toward one clump of defenders after another until your pedhétl has been depleted.  Where the guardsmen are struck, they move with drugged slowness, allowing your soldiers to scurry over the wall and quickly overwhelm the enemy.\n\t\t\t\t\t\n\t\t\t\t\tIn the end, all your soldiers live, their wounds are minor, and you stand the first to breach the walls of Sangmiré, but in the chaos alarms were sounded, and even now you hear the footsteps of reinforcements.  At your motion to keep moving, your Heréksa quickly divides the soldiers into five twenty-man semétls, making sure each remembers its assigned route to the main gate. As you move into the cluster of clanhouses nearby, the gatehouse is barely lost to view before you hear bells ring and trumpets sound for reinforcements.  The chase is on!\n\t\t\t\t\t*goto fraught\n\t\t\t\t*else\n\t\t\t\t\tYou give the order and your soldiers crest the hill, launching a volley of javelins that clears the wall. Some gate guards duck and others fall to bleed in the street below.  By the time your soldiers have reached the gate, some sending grapnels flying, others providing cover with bow and javelin, the enemy force has recovered.  Summoning forth your mental focus you blast a select few defenders with dizzying energies, but conserve your pedhétl, though it makes the task before your veterans more daunting.  You focus instead on slowing any guard who makes a move toward the alarm gong.\n\t\t\t\t\t\n\t\t\t\t\tIn the end, the losses were minimal, and you stand the first to breach the walls of Sangmiré, with no significant alarm sounded.  At your motion to keep moving, Heréksa Rayána quickly divides the soldiers into five twenty-man semétls, making sure each remembers its assigned route to the main gate.  Your semétl is halfway through the city before you hear, faintly from behind you, the distant shouts of alarm at the small gatehouse.\n\t\t\t\t\t*goto peaceful\n\t\t*if ritual >10\n\t\t\t#I will make myself and my soldiers invisible.\n\t\t\t\tBlocked from the sight and hearing of the gate guards by the hill, you begin the ritual dances and singing needed to shape other-planar energies into a palpable effect upon this plane.  When you are finished, all the soldiers surrounding you are invisible to outside eyes.  Knowing that such a spell is draining, and that the effect will not last long, you give the order for your tsurúm to crest the hill, launching a volley of javelins. Each hits home upon an unsuspecting foe, who topples down behind the wall.\n\t\t\t\t*if tactics \u003c65\n\t\t\t\t\tBy the time your soldiers have reached the gate, there is panic on the wall.  How can a soldier fight that which he cannot see?  \n\t\t\t\t\t\n\t\t\t\t\tIn the end, all your soldiers live, their wounds are minor, and you stand the first to breach the walls of Sangmiré, but in the chaos alarms were sounded, and even now you hear the footsteps of reinforcements.  At your motion to keep moving, Heréksa Rayána quickly divides the soldiers into five twenty-man semétls, making sure each remembers its assigned route to the main gate.  As you move into the cluster of clanhouses nearby, the gatehouse is barely lost to view before you hear bells ring and trumpets sound for reinforcements. The chase is on!\n\t\t\t\t\t*goto fraught\n\t\t\t\t*else\n\t\t\t\t\tCommanding the move forward, you task twenty soldiers to secure the alarm gong. By the time your soldiers have reached the gate, there is panic on the wall, and a valiant defense is rallied.  \n\t\t\t\t\t\n\t\t\t\t\tIn the end, the losses were minimal, and you stand the first to breach the walls of Sangmiré, with no significant alarm sounded.  At your motion to keep moving, your Heréksa quickly divides the soldiers into five twenty-man semétls, making sure each remembers its assigned route to the main gate. Your semétl is halfway through the city before you hear, faintly from behind you, the distant shouts of alarm at the small gatehouse.\n\t\t\t\t\t*goto peaceful\n\t\t\t#I will cast Soporiferousness, placing them into a deep sleep.\n\t\t\t\tWalking alone toward the gate you present little threat, and the soldiers line up to call insults down upon you. Then you begin to dance and sing, bending other-planar energies into a spell.  A cry of \"Sorcerer!\" comes up from one of the gate guards, and a moment later a javelin appears in his chest, thrown by Heréksa Rayána. Others of your men pick off any guard quick-witted enough to head for the alarm gong or to shout. Finally, the power bent to your control, you let it flow out as a command of sleep that settles over the wall and all atop it.\n\t\t\t\t\n\t\t\t\tTwo soldiers use grapnels to quickly and quietly scale the defenses, then unlock the gate from inside.  Your entire káreng of one hundred stands inside the gate, with no alarm given. Of course, the spell will soon wear off.\n\t\t\t\t*choice\n\t\t\t\t\t#Our best bet is to melt away into the city before the alarm is sounded.\n\t\t\t\t\t\tAt your motion to keep moving, your Heréksa quickly divides the káreng into five twenty-man semétls, making sure each remembers its assigned route to the main gate.  As you move into the cluster of clanhouses nearby, the gatehouse is barely lost to view before you hear bells ring and trumpets sound for reinforcements.  The chase is on!\n\t\t\t\t\t\t*goto fraught\n\t\t\t\t\t#Dead men tell no tales.\n\t\t\t\t\t\tYou move your legionnaires to surround the sleeping market police turned gate guards, two soldiers to each policeman.  At the signal, moving with the precision brought by years of drilling, each couple moves in unison to muffle and then exsanguinate its chosen victim.  The only sound is from one aged guardsman, who cries out in pain when Heréksa Rayána fails to silence him, instead standing frozen as her partner delivers the killing blow.  His cry is feeble and quickly ended, but it is probably still best to move on from this place.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe soldiers divide themselves into five twenty-man semétls, each taking a different route to the main gate. Rayána seems shaken and preoccupied as she leads her group off into the shadows. Your semétl is halfway through the city before you hear, faintly from behind you, the distant shouts of alarm at the small gatehouse.\n\t\t\t\t\t\t*set her_rep -2\n\t\t\t\t\t\t*set her_abandon true\n\t\t\t\t\t\t*goto peaceful\n\n*label fraught\n*page_break\nThe winding streets of the ancient town work to your advantage in evading pursuit, but navigation to the main gate is difficult once you're forced to leave the planned route.  Soon you are engaged in a seemingly endless flight, chased by the phantom noises of police you never see, often doubling back as streets dead-end in walled clanhouses or the backs of shops.  Finally, in the distance you see the towers of the main gate, and ahead of you a public square occupied by two semétls of twenty temple guardsmen each. Surely, even outnumbered two to one, the soldiers of the Legion of ${legion} can triumph over these indolent rural guardsmen!\n*choice\n\t#I organize my soldiers into formation and order them forward.\n\t\tThough alert, the temple guards are in poor formation, and lose precious time reacting to the ordered discipline of Tsolyáni legionnaires. In the first screaming moments of battle you almost even the numbers, as their Tirrikámu forms the remaining men and women into an organized unit.\n\n\t\t*if tactics >60\n\t\t\tThe unity and precision of your soldiers make the brave individual efforts of the guardsmen seem clumsy and fumbling. Soon the stones are slick with blood, and the moans of the dying herald your coming. The ${Legionnum} marches forward, bloody footprints leading straight down the main street to the city gate. At each intersection your numbers grow; three of the four other semétls having made it through, some unscathed, others, like that lead by Heréksa Rayána, wounded in body but hungry in spirit. In lockstep order, and eighty strong, your handpicked few arrive before the main gate of Sangmiré.\n\t\t\t*goto engage\n\t\t*else\n\t\t\tOnce organized, their Tirrikámu orders them to fight a defensive action, preventing your passage forward while calling for reinforcements. Though your soldiers are clearly superior, the enemy's cowardly tactics do not give you the opportunity to engage in a meaningful way. By the time you think to disentangle and vanish once more into the town, the road behind you is blocked by yet another semétl of temple guards. Their weapons are old, their armor is of an odd style and spattered with verdigris, and their stench is that of carrion.  \n\t\t\t\n\t\t\tThe undead! In violation of all laws of god and man, the treacherous Usurper has armed the dead and allowed them to walk beneath the sun.  You have heard of others encountering these monstrosities in the civil war, and of the tales of their gruesome feasting upon the flesh of the fallen.\n\t\t\t*choice\n\t\t\t\t#I must think of the welfare of those under my command.  I surrender.\n\t\t\t\t\tThe Tirrikámu's gratification at the prize his guards have taken makes him quite polite as he accepts your surrender.  He utters the formal words, takes your weapons, and then escorts you through the courtyard of the Temple of Sárku and down into the catacombs beneath.  As you pass below the stone arch, you hear faintly the noise of the main battle, and imagine your legion, pressed up against the city walls, waiting in vain for a gate to open.\n\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t#If I must die and leave my corpse as food for monsters, so be it.  We fight on.\n\t\t\t\t\tSpurred by desperation you make a mad dash towards the Tirrikámu before you. \n\t\t\t\t\t*if combat > 60\n\t\t\t\t\t\tHe was clearly expecting a surrender, and barely raises his sword in a parry as you slash down. Like a demon, you carve a path through the shocked guardsmen, taking only a handful of shallow cuts, and with a shout your soldiers follow. Screaming, running, pursued by undead, you head to the main gate, and when it is in sight, turn to fight a retreat. You have heard that the undead can be fierce and brutal, but not bright. This proves true, as none notice the other three semétls emerging from cross streets until they have fallen upon them. Soon short work is made of those who moments ago thought they had you in their power. Despite your wounds, your handpicked few, eighty strong and in good order, arrive before the main gate of Sangmiré.\n\t\t\t\t\t\t*set wound +1 \n\t\t\t\t\t\t*goto engage\n\t\t\t\t\t*else\n\t\t\t\t\t\tHe was clearly expecting a surrender, and barely raises his sword in a parry as you slash down.  Like a demon, you carve a path through the shocked guardsmen, and with a shout your soldiers follow. An instant later the undead are in amongst them. You feel a blow crumple your helmet from behind. Lying dazed on the hot paving stones, looking up into a cloudless sky, you hear the fighting around you as your loyal soldiers make a brave attempt to save their beloved kási. Farther off, you imagine you hear the noise of the main battle, and see your legion, pressed up against the city walls, waiting in vain for a gate to open. Blinking away this image, you return to a silent street and a shadow leaning over you. Its breath reeks of rotting meat; its skin hangs in papery folds. The undead sniffs at you and, grabbing your ankles, hauls you down beneath the earth.\n\t\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t\t*goto_scene battlelost\n\t#I direct my soldiers to wait in ambush while I lure out the enemy.\n\t\tIt is a singularly brave undertaking, especially hampered as you are by the anti-magic shield over the city.  Three of the most veteran of the soldiers volunteer to accompany you, to make the lure more tempting.\n\t\t\n\t\t*if combat >55\n\t\t\tLeaping from the shadowed street, you are among the disorganized guards before they can react, parrying blows, killing two men, and giving the impression of a small group trying fanatically to break through before being rebuffed. As their Tirrikámu shouts orders, you whirl and run back down the \n\t\t\t*if combat > 65\n\t\t\t\tstreet.  \n\t\t\t*if combat \u003c=65\n\t\t\t\tstreet, taking a cut across your calf as you do so. \n\t\t\t\t*set wound +1\n\t\t\t*comment endif\n\t\t\t\n\t\t\tNo legion troops would fall for this trick; they would send scouts and hold their position, but here in this backwater, these guardsmen have probably never seen real combat. They are more confused than fearful when mid-pursuit they are set upon from side streets. Unable to react and fight as one unit, instead they die as individuals, each fighting bravely, but to little effect.\n\t\t\t\n\t\t\tSoon the stones are slick with blood, and the moans of the dying herald your coming.  The ${Legionnum} marches forward, bloody footprints leading straight down the main street to the city gate. At each intersection your numbers grow; three of the four other semétls having made it through, some unscathed, others, like that lead by Heréksa Rayána, wounded in body but hungry in spirit. In lockstep order, and eighty strong, your handpicked few arrive before the main gate of Sangmiré.\n\t\t\t*goto engage\n\t\t*else\n\t\t\tLeaping from the shadowed street, you are among the disorganized guards before they can react, parrying blows and giving the impression of a small group trying frantically to break through before being rebuffed.  The plan is a good one, but against so many, even fighting as crudely as these guardsmen do, you are almost surrounded.  As the Tirrikámu shouts orders, you turn to flee back up the alley, only to feel a blow crumple your helmet from behind.  Lying dazed on the hot paving stones, looking up into a cloudless sky, you hear the fighting around you as your loyal soldiers make a brave attempt to save their beloved kási. Farther off, you imagine you hear the noise of the main battle, and imagine your legion, pressed up against the city walls, waiting in vain for a gate to open.  Blinking away this image, you return to a silent street and a shadow leaning over you.  Its breath reeks of rotting meat; its skin hangs in papery folds. The undead sniffs at you and, grabbing your ankles, hauls you down beneath the earth.\n\t\t\t*page_break You Awaken\n\t\t\t*goto_scene battlelost\n\n*label peaceful\n*page_break\nThe winding streets of the ancient town prove a hazard to navigation. Often you must double back as streets dead-end at the walls of clanhouses, wherein the citizenry huddle, waiting to see how the battle outside the city will change their lives. No alarm has been sounded, and few people are outside to see your troops and recognize your uniforms. That part of the plan, at least, has worked perfectly. Finally, in the distance you see the towers of the main gate. At each intersection leading up to it your numbers grow, \n*if her_abandon = false\n\tfour \n*if her_abandon\n\tthree \nother semétls having made it through the city without a single sword being drawn.  \n*if her_abandon\n\tThe unit lead by Heréksa Rayána does not appear, but there is no time to spend wondering what has detained her when battle awaits.\nIn lockstep order, and \n*if her_abandon = false\n\tone hundred \n*if her_abandon\n\teighty \nstrong, your handpicked few arrive before the main gate of Sangmiré.\n*Label Engage\n*page_break\n*if Location = 1\n\t*if SaveAllies = true\n\t\tThe elite enemy unit falls back to regroup, leaving their fallen upon the field, but true to their place of honor as the strong striking Mace of their formation, they are soon reformed to the mighty rhythm of the káreng drums. Fewer, but still in lockstep, they once again advance at the signals of their officers, bravely plunging themselves between the Right Gauntlet and the main body of the Legion of ${alliedlegion}.\n\t*if SaveAllies = false\n\t\tWith Kási Nirún's forces in retreat, the elite enemy unit now stands between your tsurúm and the main body of the ${AlliedLegion}.  \n\t*comment endif\n\t\n\tThe signal sounds out from the platform, ordering your tsurúm into battle.  You meet the enemy with a clatter of chlén-hide swords.  Despite the obvious skill of the foe, your legionnaires hold their line, the places of those who fall being filled by the rested soldiers at the rear.  Where do you position yourself?\n\t*choice\n\t\t#At the front, leading the fighting.\n\t\t\tBanging your sword hilt upon your shield, you call out war chants, challenging the enemy to engage you.  Seeing a particularly imposing foe advance, you point your sword tip at him in a summons.  Though you expect him to let out a roar and rush to battle, instead he moves to engage you in competent silence, more like a legendary mechanical ruün than a flesh-and-blood man.\n\t\t\t\n\t\t\t*if combat >80\n\t\t\t\tThe fight between you two can barely be called a contest. The soldier approaches swordplay as Dritlán Núromen approaches tactics: with a rote perfection devoid of any creativity, and like the Dritlán is easily flummoxed by deviations from the prescribed moves. Bringing up your shield in defense against a swing that has left him off-balance, you spin and sweep his leg, causing him to fall to the earth, vulnerable to your final slash. Seeing you make such short work of one of these \"elite\" troops, the soldiers behind you shout out \"Otuléngba!\"\n\t\t\t\t*set morale +2\n\t\t\t\t*goto ambush\n\t\t\t*if combat >60\n\t\t\t\tAt first you are over-matched by the clockwork precision with which he executes swordplay, pushing you back and leaving you bleeding from a gash to the thigh.  Then his movements bring forth a powerful memory of the sword drills Mama Dzái would subject you to in your youth, and you see their pattern and know what action your opponent will take before he takes it.  Though hobbled by your wound, you manage a powerful overhand stroke when you know his shield will be lowered, connecting where his collarbone joins his neck, sending him slumping like a puppet with its strings cut.  Around you the voices of your troops are raised in shouts of \"Otuléngba!\"\n\t\t\t\t*set morale +1\n\t\t\t\t*set wound +1\n\t\t\t\t*goto ambush\n\t\t\t*else\n\t\t\t\tFrom the first, you are over-matched by the clockwork precision with which he executes swordplay, pushing you back and leaving you bleeding from a gash to the thigh.  His movements bring forth a powerful memory of the sword drills Mama Dzái would subject you to in your youth, and like in those early days you employ retreat and defensive maneuvers, a tactic which meets with much more marked success when you can lure an enemy into the ranks of your allies, there to be fallen upon. While not an approach that brings glory, it is certainly an effective one.\n\t\t\t\t*set wound +1\n\t\t\t\t*goto ambush\n\t\t#In the rear, waiting to shore up weak spots.\n\t\t\tThe soldiers of the ${Legionnum} are more than a match for the worms who wear the Scales of Brown, and the Right Gauntlet holds its own against the Mace.\n\t\t\t*if tactics >65\n\t\t\t\tFrom your position you are able to see the moments when a soldier might be over-matched, and move to their aid, or where an enemy may be probing too far between the lines unnoticed, and bring attention to him.  These interventions lighten the burden of your troops, smoothing out the rough patches in their fighting, and impart a sublime perfection to their function.\n\t\t\t\t\n\t\t\t\t*set morale +1\n\t\t\t*label ambush\n\t\t\tIt is clear the battle would soon become a mere test of brute force were it not for the disadvantageous position of the enemy, who are being slowly pushed back into the sharp embrace of your allies.  The opposing officers, seeing that your tsurúm will not be easily overrun, and realizing their danger of becoming overcommitted and flanked, pull their unit back.  Your mettle has been tested, and found equal to the task.\n\t\t\t\n\t\t\tYou are given barely a moment to catch your breath, drink water, and dress lines before more signals arrive from the Dritlán, ordering an advance.  It seems that Dritlán Núromen will not allow these enemies to retreat without hounding them all the way.\n\t\t\t*if morale >=1\n\t\t\t\tLike dogs baying at a hunt, the soldiers of your tsurúm rush forward at the sound of trumpets, ready to fall upon their quarry.  \n\t\t\t*if morale \u003c1\n\t\t\t\tLike dogs whipped to the hunt, your soldiers lope forward at the command of the trumpets, grimly determined to finish their task.\n\t\t\tAnd like the hunted jakkóhl, the soldiers retreat before your tsurúm; their formations grow ragged and are broken up.  \n\t\t\t*page_break\n\t\t\tA strange signal is beaten out upon the opposing drums, and with an eerie unity the dispersed soldiers coalesce to array themselves in a crescent circle around you.  A fancy trick, but with their losses in the feint their line is spread thin.  \n\t\t\t*fake_choice\n\t\t\t\t#I form my soldiers into a wedge to punch through their line.\n\t\t\t\t#I form my soldiers into a defensive square.\n\t\t\t\t#I order a retreat back to our own lines.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tYou are about to issue your command when another roll of drums carries across the field.  At this signal, the soldiers arrayed around your tsurúm remove their helmets to reveal dessicated faces, paper-thin skin stretched across bone.  As one they scream a keening wail.  The undead!  In violation of all laws of gods and man, the treacherous Usurper has armed the dead and allowed them to walk beneath the sun.  You have heard of others encountering these monstrosities in the civil war, and of the tales of their gruesome feasting upon the flesh of the fallen.\n\t\t\t\n\t\t\t*if morale \u003c=0\n\t\t\t\tAt the sight of the horrible mrúr zombies, most of your weary soldiers break.  Some fall to their knees in surrender or begin praying for deliverance; others simply run from the field.  Hollow-eyed undead advance, drawing tight their circle, like a pack of hyahyú'ü slinking in on a wounded chlén. Too late you hear the trumpets blaring a retreat, but there is no time to focus on them now.\n\t\t\t\t*if her_captured = false\n\t\t\t\t\tYoung Heréksa Rayána is at your side lofting the banner and calling for the loyal and brave to rally on her and protect their kási.\n\t\t\t\t*label Loc1_failure\n\t\t\t\t*if tactics >50\n\t\t\t\t\t\n\t\t\t\t\tIt is clear to you that, outnumbered and shaken as these remaining soldiers are, any attempt at resistance will end in one-sided slaughter.\n\t\t\t\t*choice\n\t\t\t\t\t#We shall fight to the death and take as many with us as we can.\n\t\t\t\t\t\tUpon your orders the last few loyal soldiers form a hollow square in two ranks, while the undead circle in ever closer.  Three mrúr zombies fall for every soldier lost, but even so the odds are against you.  \n\t\t\t\t\t\t*if her_captured = false\n\t\t\t\t\t\t\tIn the end you find yourself fighting back to back with Heréksa Rayána. \"It has been an honor, sir,\" she whispers, shifting the grip on her sword as the undead close in…. \n\t\t\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIn the end you find yourself fighting alone as the undead close in….\n\t\t\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t\t#We shall fight to break free of the noose.\n\t\t\t\t\t\tUpon your orders to form a wedge, the last few loyal soldiers line up, and charge the undead between you and the ranks of the Legion of ${alliedlegion}.  Outnumbered as you are, breaking through the enemy line proves unbelievably costly. In the end, you find yourself \n\t\t\t\t\t\t*if her_captured = false\n\t\t\t\t\t\t\tfighting back to back with Heréksa Rayána, \n\t\t\t\t\t\tguarding the rear so that the last of your brave and loyal legionnaires can make it to the safety of Kási Nirún's tsurúm, who are moving up. You see the last of the soldiers reach Nirún's ranks right as any wider view of the battle is blotted out by the undead closing in around you.  \n\t\t\t\t\t\t*if her_captured = false\n\t\t\t\t\t\t\t\"It has been an honor, sir,\" whispers Rayána, shifting the grip on her sword…. \n\t\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t\t#Surrender is the only option now.\n\t\t\t\t\t\t*label surrender\n\t\t\t\t\t\tWith dignity, \n\t\t\t\t\t\t*if her_captured = false\n\t\t\t\t\t\t\tyou order the Heréksa to lower the unit standard as \n\t\t\t\t\t\tyou call out surrender.  \n\t\t\t\t\t\t*if morale \u003c=0\n\t\t\t\t\t\t\tThose few soldiers gathered about you drop their weapons into the dirt, and stand wild-eyed, panting, as a \n\t\t\t\t\t\t*if morale >0\n\t\t\t\t\t\t\tA \n\t\t\t\t\t\theréksa, dressed in the robes of a priest of Sárku, walks forward between the encircling undead to accept your formal surrender. Your arms and armor are relinquished, and parole given, in hopes that you will be rescued or ransomed after the battle.\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you are led from the field, you witness the fate of those who did not surrender or chose to flee. The undead fall upon the dead and dying, looking now even more like hyahyú'ü, at their grisly feast.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tWith the Right Gauntlet fallen, the battle has become a mere formality in prelude to defeat, and yet the Generals order to fight grimly on. Though you cannot see the battle play out from your place of arrest, it is impossible to miss the sounds of defeat, or the lines of prisoners escorted to these makeshift enclosures behind enemy lines. Fewer prisoners arrive than you would expect, which might explain the terrified screams echoing from the battlefield.  What use in spending so much life, so much military might, for the slim chance of capturing Sangmiré?  \n\t\t\t\t\t\t*page_break An Eternity Passes\n\t\t\t\t\t\t*goto_scene battlelost\n\t\t\t*else\n\t\t\t\t*if (tactics >50) and (morale \u003c3)\n\t\t\t\t\tYou remember hearing tales of the cowardliness of the shédra—the elite undead who still possess some spark of intelligence—that, having died once, they fear to go again into death. \n\t\t\t\tAround you the men and women of your tsurúm are frozen by \n\t\t\t\t*if (tactics >55) and (morale >2)\n\t\t\t\t\tfear, though you sense that beneath that fear is an iron will to fight on, if they could be snapped out of the spell of terror. \n\t\t\t\t*if (tactics \u003c=55) or (morale \u003c=2)\n\t\t\t\t\tfear. \n\t\t\t\tThe trumpets blare out orders to retreat, pointless now that you have been led so deeply into this trap. You know that this is the moment upon which, looking back, poets will say the entire battle turned. Would the Right Gauntlet break, and in doing so doom the forces of ${Prince} $!{PrinceName}?  Or would they roar forth to sweep the undead from the field?\n\t\t\t\t*choice\n\t\t\t\t\t#I charge one of the hideous shédra, most powerful of the undead.\n\t\t\t\t\t\t*if combat >80\n\t\t\t\t\t\t\tThe shédra is clad in ancient armor, lovingly enameled, and carries a bright copper sword.  In this raiment he appears a fearsome monster from nightmare, but it is he who retreats a few steps in the face of your charge.  You know there is not time for a protracted fight.  Though surprise keeps his fellows from mobbing you at first, that cannot last, and any attempt to parry his enchanted copper with your chlén-hide shield or weapon will be futile. And so, running forward, you make as if to put your power behind a low swing, then at the last second, mid-leap, you turn and deliver a powerful high backhanded stroke that severs the undead's head entirely.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSeeing one of their own come to such a quick end, the other shédra—powerful but cowardly—scattered among the lesser, unthinking mrúr zombies, pull back instinctively.  Picking up the head, you turn to your soldiers and raise it aloft, shouting, \"What have we to fear from corpses?  They should fear us!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto Loc1_Victory\n\t\t\t\t\t\t*if combat >60\n\t\t\t\t\t\t\tThe shédra is clad in ancient armor, lovingly enameled, and carries a bright copper sword.  In this raiment he appears a fearsome monster from nightmare, but it is he who retreats a few steps in the face of your charge.  In self-preservation he moves to meet your opening stroke with a parry, and you realize that his enchanted copper will slice through your chlén-hide, leaving you unarmed.  As you abort the swing you feel the sharp copper blade slice through your armor and cut across your chest.  In that moment the pain is nothing, for your opponent is off-balance, his sword lodged in your thick pectoral. Taking advantage of the opening, you deliver a powerful downward stroke onto the shédra's unprotected head.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSeeing one of their own come to such a quick end, the other shédra—powerful but cowardly—scattered among the lesser, unthinking mrúr zombies, pull back instinctively.  You grasp the copper sword and raise it aloft, pained by the cracked ribs, light-headed with the loss of blood.  \"What have we to fear from corpses?  They should fear us!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\t\t*goto Loc1_Victory\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe shédra is clad in ancient armor, lovingly enameled, and carries a bright copper sword.  In this raiment he appears a fearsome monster from nightmare, but it is he who retreats a few steps in the face of your charge. In self-preservation he meets your stroke with a parry, and his sharp enchanted copper blade slices clean through your by-now-battered chlén-hide sword. No matter how brave or how skilled, no unarmed man can prevail against a swordsman in a direct fight. The shédra looms closer, the carrion stench of its breath making you gag, as it brings the flat of its sword down upon your helmet.\n\t\t\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t\t#I rally my soldiers.\n\t\t\t\t\t\t\"The Worm Prince thinks he can scare us with his blasphemous creations!\" you bellow.  \"He tries to exploit superstition and fear, but the soldiers of the glorious Legion of ${legion} do not know fear! We do not know defeat! We already beat these same monstrosities back once, and we will do so again, and again, until the battle is \n\t\t\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\t\twon! Then we shall throw their bodies upon the sacrificial pyre to burn like so much kindling, and their traitorous priest-creators with them!\" \n\t\t\t\t\t\t*if God != \"Vimúhla\"\n\t\t\t\t\t\t\twon!\" \n\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if morale >2\n\t\t\t\t\t\t\t*label Loc1_Victory\n\t\t\t\t\t\t\tAt your words shoulders hunched in terror straighten, weapons are gripped with surety, and voices are raised in a proud battle song. Forming into an offensive wedge, your legionnaires march to crush the undead. One of the Dritlán's favored axioms comes into your head, \"No matter how puissant the soldiers, the laws of tactics are immutable,\" as the line of encircling undead proves too thin to contain a focused assault.\n\n\t\t\t\t\t\t\tHaving broken free, your tsurúm finds itself grouped and in good order while facing a divided enemy.  The rest is mopping up.\n\t\t\t\t\t\t\t*label Loc1Victorypt2\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tThe entire enemy strategy being reliant on the ability of their elite tsurúm of undead to take your formation's right flank, the opposing officers are soon stymied.  General $!{General} and General $!{AlliedGeneral} issue a flurry of orders by trumpet that result in the Left Gauntlet overpowering the light skirmishers and medium infantry with a bold charge, and then rolling up the enemy center from there. In the end, you are the anvil to their hammer, and the two halves of the Legion of ${legion} carry the battle.\n\t\t\t\t\t\t\t*page_break Victory!\n\t\t\t\t\t\t\t*goto_scene battlewon\n\t\t\t\t\t\t*elseif her_captured = false\n\t\t\t\t\t\t\tDespite your rousing words, your soldiers remain frozen in their tracks, some about to break. Then with a wordless scream, Heréksa Rayána sprints across the space between her and one of the elaborately armored shédra. With a leap she tackles the monster, landing upon it and banging its bare head into the ground.  \"For $!{PrinceName}! For $!{lord} $!{god}! For Tsolyánu!\"  As the undead beneath her ceases its struggles, dying for the second time, mrúr zombies converge upon her, cutting down the unarmed and outnumbered soldier.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThis act of bravery and sacrifice ignites a fury within her fellow soldiers that overcomes fear.  With a roar of \"Otuléngba!\" they form into a rough wedge and attack the knot of mrúr.  As some battle the undead, others rescue the Heréksa's body, bearing it aloft beside the unit standard.  \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe line of encircling undead proves too thin to contain such a focused assault.  Having broken free, your tsurúm finds itself grouped and in good order while facing a divided enemy. The rest is mopping up.\n\t\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t\t\t*goto Loc1Victorypt2\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tDespite your rousing words, some soldiers remain frozen in their tracks; others break in fear. Most keep their heads and fight forward. That moment of chaos, those few cowardly defectors, are enough to change the balance.  Your tsurúm never breaks free of the ring, and soon a heréksa is at your side, lofting the banner and calling for the loyal and brave to rally on her and protect their Kási.\n\t\t\t\t\t\t\t*goto Loc1_failure\n\t\t\t\t\t#Fighting is too risky; I call for surrender.\n\t\t\t\t\t\t*goto surrender\n*elseif Location = 2\n\t*if SaveAllies = true\n\t\tThe elite unit falls back to regroup, leaving their dead upon the field, but true to their place of honor as the strong striking Mace of their formation, they are soon reformed to the mighty rhythm of the káreng drums. Fewer, but still in lockstep, they once again advance at the signals of their officers, bravely plunging themselves between the Right Gauntlet and the main body of the Legion of ${legion}. Impatiently, Dritlán Núromen motions you to attention and commands you to signal your soldiers to engage.\n\t*if SaveAllies = false\n\t\tWith Kási Nirún's forces in retreat, the elite enemy unit now stands between your tsurúm and the main body of the ${Legionnum}.  Impatiently, Dritlán Núromen motions you to attention and commands you to signal your soldiers to engage. \"See now how I shall turn Nirún's blunder into my triumph!\"\n\t*comment endif\n\t\n\tThe trumpets cry out as the two units meet with a clatter of chlén-hide swords. Despite the obvious skill of the foe, your legionnaires hold their line, the places of those who fall being filled by the rested soldiers at the rear. It is clear the battle would soon become a mere test of brute force were it not for the disadvantageous position of the enemy. The opposing officers, seeing that your tsurúm will not be easily overrun, and realizing their danger of becoming overcommitted and flanked, pull their unit back. Your mettle has been tested, and found up to the task, but the Dritlán seems more annoyed than anything else.  \n\t\n\t\"If they had persisted in their foolish advance, they would have crumpled soon enough, and with them the entire enemy strategy, but because of their cowardice there is now nothing for it but the direct fight, our strength against theirs.  Sa’alúr of Jakálla states in his treatise that, in such a fight, no advantage is to be passed up, and it is well known that soldiers fight poorly in retreat. Order our men forward, and keep them pressing the attack.\"\n\t\n\tThe enemy unit takes heavy losses in their retreat, with your tsurúm close upon \n\t*if tactics >65\n\t\tthem, but there is something oddly geometrical and organized in the way they spread out, which makes you suspect a trap. \n\t*if tactics \u003c=65\n\t\tthem. \n\t*choice\n\t\t#It is time to finish this; continue the forward march.\n\t\t\t*label platform_defeat\n\t\t\t*set platform_fight true\n\t\t\tSoon the enemy are reduced to fighting in small groups, as their formations grow ragged and are broken up. The soldiers of your tsurúm march unrelentingly forward, almost to the unprotected flank of the Legion of Scales of Brown. Then a strange signal is beaten out upon the opposing drums, and with an eerie unity the dispersed soldiers coalesce to array themselves in a crescent circle around your unit. A fancy trick, but with the losses in the feint, and spread so thin, their line will be easy to fight through.  \n\t\t\t\n\t\t\tYou order your tsurúm into a wedge directed at one point on the enemy line, and they begin the forward march as another roll of drums carries across the field. At this signal, the soldiers arrayed around your tsurúm remove their helmets and scream a keening wail. From atop the platform you cannot see what has happened below to cause such chaos in your ranks, but suddenly your soldiers seem paralyzed. Some freeze in their tracks; others break in fear. Most keep their heads and fight \n\t\t\t*if her_captured = false\n\t\t\t\tforward, with the brave young Heréksa Rayána leading a charge. \n\t\t\t*if her_captured\n\t\t\t\tforward. \n\t\t\t\n\t\t\tThat moment of chaos, those few cowardly defectors, are enough to change the balance. Your tsurúm never breaks free of the ring, and soon you see your soldiers laying down their weapons, as a Heréksa in the robes of a priest steps \n\t\t\t*if her_captured = false\n\t\t\t\tforward to confer with Rayána.  \n\t\t\t*if her_captured\n\t\t\t\tforward to call for their surrender. \n\t\t\tAs the wounded and paroled are led from the field, you can vaguely make out the enemy soldiers of the Mace scavenging among the fallen like thieves, their officers futilely ordering them back. \n\t\t\t*page_break\n\t\t\tWith the Right Gauntlet fallen, the battle has become a mere formality in prelude to defeat, and yet the Generals give the order to fight grimly on.  What use in spending so much life, so much military might, for the slim chance of capturing Sangmiré?  Dritlán Núromen shakes his head in bewilderment and glares suspiciously at you.  \"It should have worked. The numbers were on our side. Why did your soldiers fail?\" \n\t\t\t\n\t\t\tWhen the end comes, and your legion has signaled surrender, it is the same elite unit who broke your tsurúm that is sent to take the officers prisoner. Covered in blood, they march up to the platform, with the enemy's general, Sikún hiKhanúma, under their protection. As the formal words are exchanged between the Generals, you see $!{wave} motion to one of the enemy tirrikámu, flashing something and arguing heatedly under ${wahis} breath. The soldier seems to ignore ${wahim}, and with an unwarranted casualness the Signaler puts a hand upon his shoulder and forcibly turns him. The soldier casually reaches out and smashes his pommel into $!{wave}'s cheek.\n\t\t\t*choice\n\t\t\t\t#How dare he attack $!{wave}; we've surrendered!\n\t\t\t\t\tWithout thought you leap to the aggressor and grab his sword arm.  Up close he has a carrion smell, and the papery skin of his forearm feels strangely dry in the heat. The corded muscles tense, and the arm barely moves, despite your strength. As the soldier turns and gazes upon you with dead eyes, you understand the fear that broke your tsurúm. The Usurper upon the Petal Throne has armed the undead and sent them into battle!\n\t\t\t\t\t\n\t\t\t\t\tWith fury at this blasphemy, you kick out, hearing a brittle kneecap crunch beneath your heel. Spinning away from the downed \"soldier\" you raise your shield in a parry, sensing $!{wave} springing up to guard your back. You hear your Dritlán's high voice raised in protest, and the bellow of General $!{General} to stand down. They clearly do not see what is happening. Alone amidst your comrades you struggle for space, for the breath to shout a warning, but then from the corner of your eye you see the blow descend, and fall into blackness.\n\t\t\t\t\t*set wav_rep +1\n\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t#Serves $!{wave} right for touching a stranger so imperiously.\n\t\t\t\t\tYou stand back, watching as your Signaler rises, wiping at a bloody mouth. The soldier advances coolly upon ${wahim}, and suddenly a dagger is protruding from the soldier's eye.  This is when the melee breaks out. Though you try to fall back, the enraged victors seem to lash out indiscriminately, and you never see the blow that takes you down into darkness. \n\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t#I must keep the peace.\n\t\t\t\t\t\"Stand down, soldier!\" you bark at $!{wave} while stepping between ${wahim} and the offended soldier. You turn to make apologies for your subordinate's behavior, and find yourself staring into a slack dry face with dead eyes. You now understand the fear that broke your tsurúm.  The Usurper upon the Petal Throne has armed the undead and sent them into battle! The mrúr's mouth splits into a carrion grin as you feel an impact atop your head and sink into darkness.\n\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t*goto_scene battlelost\n\t\t#Caution is the better part of valor; I order a halt.\n\t\t\tAs your Signaler raises ${wahis} trumpet to ${wahis} lips, the Dritlán reaches out a hand and coolly presses the instrument back down.  \"Belay that.\"\n\n\t\t\tTurning to you with a supercilious smile, he adopts the lecturing tone you know so well.  \"It is only natural that nervousness at the final decisive throw of the dice might make you want to pause and regroup. However, such a break in the fighting will gain the enemy much more than it does you. It is well known that momentum is everything in such a skirmish.\"\n\t\t\t*choice\n\t\t\t\t*selectable_if (tactics >65) #I point out the pattern to their seeming retreat, and the ease with which this elite squad has been \"broken.\"\n\t\t\t\t\tWith patient politeness, you try to make the hidebound officer see the battlefield as you do.\n\t\t\t\t\t*label dritfinal\n\t\t\t\t\t*if drit_hostile = false\n\t\t\t\t\t\tThe Dritlán responds to \n\t\t\t\t\t\t*if tactics > diplomacy\n\t\t\t\t\t\t\tthe logic of your argument, \n\t\t\t\t\t\t*if tactics \u003c= diplomacy\n\t\t\t\t\t\t\tyour cleverly chosen words, \n\t\t\t\t\t\tnodding sagaciously.  \"I see I have taught you well. Give the order to halt, and we shall take a thoughtful and cautious approach to this battle.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*label platbattlewin\n\t\t\t\t\t\tAs your soldiers pull back, the enemy realizes their ruse has been ineffective, and dresses ranks with startling alacrity and organization. The entire enemy strategy having relied upon the ability of their elite opposing tsurúm to take your formation's right flank, their officers are soon stymied.  \n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you neutralize the strong striking Mace, \n\t\t\t\t\t\t*if courtmarshal\n\t\t\t\t\t\t\tDritlán Núromen calls for your arrest, and you are reluctantly subdued by two hulking guards. You watch as \n\t\t\t\t\t\tGeneral $!{General} and General $!{AlliedGeneral} issue a flurry of orders that result in the Left Gauntlet overpowering the light skirmishers and medium infantry with a bold charge, and then rolling up the enemy center from there. In the end, you are the anvil to their hammer, and the two halves of the Legion of ${legion} carry the battle.\n\t\t\t\t\t\t*if courtmarshal\n\t\t\t\t\t\t\tFor your subordinates and for your superiors, there will be feasts and looting, but you are led to the stockades.\n\t\t\t\t\t\t*page_break Victory!\n\t\t\t\t\t\t*goto_scene battlewon\n\t\t\t\t\t*else\n\t\t\t\t\t\t*label dritargument\n\t\t\t\t\t\tAs you lay out your argument, the Dritlán seems annoyed and dismisses your words with a casual wave of his hand. \"I can see, Kási, that you are overly fond of elaborate stratagems, and perceive the mechanics of battle to be too much about 'clever' ploys, as opposed to solid doctrine.  You tell me now that there is some trap which only you see, as you told me before that Kási Nirún's tsurúm would be lost without your intervention. It seems to me you are more interested in self-aggrandizement than in serving in your place.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tClearly, he still smarts over the thrashing given to him by the very foes he now sees fleeing before your tsurúm, and his ears and mind are closed to any arguments you muster.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#So be it. I accept his decision.\n\t\t\t\t\t\t\t\tWith a sigh, you salute and motion for your Signaler to sit back down, letting the pursuit continue.\n\t\t\t\t\t\t\t\t*goto platform_defeat\n\t\t\t\t\t\t\t#Enough of this. I am going over his pinhead.\n\t\t\t\t\t\t\t\t*set courtmarshal true\n\t\t\t\t\t\t\t\tSpinning on your heel, you stride past the Dritlán and toward the two Generals in the midst of their strategic planning.\n\t\t\t\t\t\t\t\t*if diplomacy > 55\n\t\t\t\t\t\t\t\t\tWaiting patiently for them to notice you, you give a crisp salute. Next to the image you present of composed military bearing, the Dritlán looks flustered and overwhelmed in his shock at your breach of protocol.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\"Exalted sirs, I would not interrupt your important deliberations in this way, but I feel Dritlán Núromen is about to make a tactical error which could cost us the Right Gauntlet, the battle, and the town. Punish me for this insubordination as you will, but please bring your practiced eyes to bear upon the situation. I gladly sacrifice myself for the lives of my soldiers, and the glory of the legion.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tWith a curt politeness, the Generals demand your sword and order you removed from the platform. While these orders are given, $!{General} makes eye contact with you and nods knowingly. As you are being escorted away, you hear the trumpet blare out the very order you intended to give, and smile in victory.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThough you cannot see the battle play out from your place of arrest, it is impossible to miss the cheers and drumbeats when victory comes.\n\t\t\t\t\t\t\t\t\t*goto_scene battlewon\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tPushing brashly into their conversation, you briefly salute before explaining the mess the Dritlán is making of the Right Gauntlet.\n\t\t\t\t\t\t\t\t\t*if tactics > 60\n\t\t\t\t\t\t\t\t\t\tThough at first incensed at your breach of protocol, you can see the leaders are impressed with your tactical grasp of the situation. Your General meets the eye of his adjunct and commands that the order be given for the Right Gauntlet to pause and regroup. Returning his attention to you, his face remains severe. \"The events of the day will show whether your assessment was correct, but it is already clear that your discipline is lacking. Shall my fellow general think that this is how the ${Legionnum} comports itself, like a tribe of Milumanayáni savages?\" With this, he waves for you to be taken from his presence.  \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tAs you are disarmed, General $!{AlliedGeneral} speaks to her counterpart. \"Comrade, if I have seen the worst of the Right Gauntlet in this kási's behavior, I have also seen the best of it in the rescue of my Kási Nirún's tsurúm. You would honor my legion if you showed clemency.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tGeneral $!{general} nods.  \"Friend, at this moment we must turn our attentions to the battle before us, but when the time comes to judge this one I will take heed of your noble sentiment.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThough you cannot see the battle play out from your place of arrest, it is impossible to miss the cheers and drumbeats when victory comes.\n\t\t\t\t\t\t\t\t\t\t*goto_scene battlewon\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tThe Generals are too incensed by your breach of protocol to pay heed to your fumbling arguments.  As Dritlán Núromen looks on smugly, your arrest is ordered, and you are removed from the platform. The order for your tsurúm to pause in their headlong rush is never given, and you spend the battle languishing amongst cowards and prisoners of war in the temporary stockade.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThough you cannot see the battle play out from your place of arrest, it is impossible to miss the sounds of defeat. When the enemy soldiers come to recover their captured and take the surrender of your guards, a fight breaks out, and you know not why. Soon there is a general melee, and outnumbered by angry enemies, resentful of sitting out their legion's victory, and with only a handful of cowards and defectors at your back, you are soon overwhelmed.\n\t\t\t\t\t\t\t\t\t\t*page_break You Awaken\n\t\t\t\t\t\t\t\t\t\t*goto_scene battlelost\n\t\t\t\t#I calmly explain my misgivings to my superior.\n\t\t\t\t\t*if ((diplomacy >60) and (drit_hostile = false)) or (drit_happy)\n\t\t\t\t\t\tKnowing the Dritlán's love of quoting the ancient masters, you dredge up a memory of quote from \"The Pandects of Hirkkulméshmru the Dwarf,\" urging caution and wariness in battle.  \"Sir, these soldiers of the Usurper think to fool us with some clever new stratagem, but I believe that by adhering to the wisdom of the classic war doctrines, we shall make them the fools.\"\n\n\t\t\t\t\t\t*goto dritfinal\n\t\t\t\t\t*else\n\n\t\t\t\t\t\t*goto dritargument\n\t\t\t\t#I bow to the Dritlán's experience.\n\t\t\t\t\tYou salute and motion for your Signaler to sit back down, letting the pursuit continue.\n\t\t\t\t\t*goto platform_defeat\n\t\t\t\t#I am so tired of this idiot's lectures.\n\t\t\t\t\t\"With respect, sir, you have given me the task of neutralizing the enemy's Mace, and I intend to accomplish it, but I will not risk the lives of my soldiers in a foolhardy rush of childish excitement!\"  Making eye contact with Signaler $!{wave}, you nod for ${wahim} to continue.  Miraculously, ${wahe} does so, raising the trumpet to ${wahis} lips and ordering your tsurúm to pause and regroup.\n\t\t\t\t\t*set Drit_hostile true\n\t\t\t\t\t*achieve insubordinate\n\t\t\t\t\t*set courtmarshal true\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto platbattlewin \n*else\n\tThe motley force of market police and temple guardsmen on the gate is staring outward at the battle, now pressed right up against the city wall, and do not immediately notice your approach, but that will soon change. You feel the anti-magic field generated by the sorcerous corps like a weight upon you. After all the sorcery and subterfuge, it still comes down to swords. Will you be leading the charge?\n\t*choice\n\t\t#I am the first to leap into the square before the gate, launching a javelin at an officer.\n\t\t\tAs you run, the thunder of footsteps follows you. Guardsmen pitch over the wall, javelins in their backs, causing their comrades to turn in surprise. The battle within the city is engaged, a miniature version of the titanic struggle outside, but of more consequence. As you advance, you keep your eyes upon the ultimate goal: the gate, which once open will allow your armies to advance into the city, seizing control of whatever mysterious objective has brought them here.\n\t\t\t*if combat > 70\n\t\t\t\tLike the point of a spear, you move forward, piercing the feeble resistance of these half-trained excuses for soldiers with the best of the Legion of ${legion} at your back.  \n\t\t\t\t*label totalvictory3\n\t\t\t\tTheir resistance reminds you of the death throes of a hunted animal, full of violence and denial, but with an inevitable conclusion. The sun is high in the sky (has it been so little time?) when, amidst scattered fighting, a semétl of twenty of your soldiers manages to open the gate, allowing the rank of legionnaires pressed against the walls to pour into the city. The cry of \"Otuléngba!\" goes up from the ranks, and officers begin signaling the advance through the breach.\n\t\t\t\t*page_break Victory!\n\t\t\t\t*goto_scene battlewon\n\t\t\t*elseif Signaler_present\n\t\t\t\t*label gate_blown\n\t\t\t\tAt first the expertise and superior fitness of your veterans seems decisive, but the desperate defenders atop the wall make shrewd use of the advantage of their position.
