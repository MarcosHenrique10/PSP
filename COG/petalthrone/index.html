e time like every notable in $!{Hometown} filed in.\n*page_break\nWhen all were seated, a priest and priestess, each dressed in elaborate finery, appeared. The woman orated upon the ancient roots of Clan White Stone, on the histories of the lineages of each young man or woman standing before her, on the virtues of duty to the clan, and of honor and piety before the Goddess.  With these words, she approached the first youth and led him up to lie upon the altar amidst a bed of flowers.  There, in view of all, the priestess and the young man came together in the way most pleasing to $!{lord} $!{god}.  Afterward, all present snapped polite approval.\n\nAs the applause died away, the priest read out the man's new name from a scroll, and a sacrifice was passed from a waiting slave to the new adult, and from him to the priestess.  This ritual was then repeated for each young man or woman in turn.  When you had been helped down from the altar, what name was read out?\n*choice\n\t*if gender = \"female\"\n\t\t#Chentsúni\n\t\t\t*set name  \"Chentsúni\"\n\t\t\t*goto namingMa2\n\t\t#Mikúsa\n\t\t\t*set name  \"Mikúsa\"\n\t\t\t*goto namingMa2\n\t\t#Linátla\n\t\t\t*set name  \"Linátla\"\n\t\t\t*goto namingMa2\n\t\t#Osuré\n\t\t\t*set name  \"Osuré\"\n\t\t\t*goto namingMa2\n\t\t#Tlayésha\n\t\t\t*set name  \"Tlayésha\"\n\t\t\t*goto namingMa2\n\t\t#Visháya\n\t\t\t*set name  \"Visháya\"\n\t\t\t*goto namingMa2\n\t\t#None of these\n\t\t\tReally?  What is your name then?\n\t\t\t*input_text name\n\t\t\t\n\t\t\t*goto namingMa2\n\t*else\n\t\t#Achán\n\t\t\t*set name  \"Achán\"\n\t\t\t*goto namingMa2\n\t\t#Fíru\n\t\t\t*set name  \"Fíru\"\n\t\t\t*goto namingMa2\n\t\t#Kámar\n\t\t\t*set name  \"Kámar\"\n\t\t\t*goto namingMa2\n\t\t#Mnéktu\n\t\t\t*set name  \"Mnéktu\"\n\t\t\t*goto namingMa2\n\t\t#Túrisan\n\t\t\t*set name  \"Túrisan\"\n\t\t\t*goto namingMa2\n\t\t#Zhurák\n\t\t\t*set name  \"Zhurák\"\n\t\t\t*goto namingMa2\n\t\t#None of these\n\t\t\tReally?  What is your name then?\n\t\t\t*input_text name\n\t\t\t\n\t\t\t*goto namingMa2\n*label namingMa2\nAn excellent and noble name!\n\nAnd what offering did you present?\n*choice\n\t*if God = \"Avánthe\"\n\t\t#Fresh fruits in a sapphire-studded bowl of gold.\n\t\t\t*set offering  \"bowl of fruit\"\n\t\t\t*goto namingMa3\n\t\t#Two matched khéshchal tail feathers, each of a bright blue hue, and some three feet in length.\n\t\t\t*set offering  \"khéshchal plumes\"\n\t\t\t*goto namingMa3\n\t\t#A blue thésun-gauze priest's robe.\n\t\t\t*set offering  \"robe\"\n\t\t\t*goto namingMa3\n\t*else\n\t\t#A large pile of coins of pure silver.\n\t\t\t*set offering  \"coins\"\n\t\t\t*goto namingMa3\n\t\t#A green glass vial filled with sweet perfume.\n\t\t\t*set offering  \"perfume\"\n\t\t\t*goto namingMa3\n\t\t#An emerald-colored snake.\n\t\t\t*set offering  \"snake\"\n\t\t\t*goto namingMa3\t\t\n*label namingMa3\nAs the priestess accepted the ${offering}, the priest read out, \"The ancient and exalted clan of White Stone is proud to welcome its newest member, $!{name} ${lineage}.  Otuléngba!\" At his joyous shout, the crowd replied in a chorus, \"Otuléngba! All Hail!\"\n*set status +10\n*if gender = \"female\"\n\t*set ara \"Ma4\"\n\t*goto aridani_choice\n*else\t\t\t\n\t*label namingMa4\n\t \n\tThe ritual of naming was repeated for the next clan-cousins, and then $!{wave} was led up upon the altar.  Afterwards ${wahe} presented the priest of ${God} with a \n\t*if God = \"Avánthe\"\n\t\tnecklace of sapphires. \n\t*if God = \"Dlamélish\"\n\t\tnecklace of emeralds. \n\tThe priestess then read from the scroll, \"The ancient and exalted clan of White Stone is proud to welcome its newest member, $!{wave} hiTánkolel.  Otuléngba!\" Once more the crowd snapped approval.\n\t*page_break\n\tSoon the ceremony ended, and attention drifted away from the newly named adults and onto more important things like fashion, gossip, trade deals, and news of the war with the country of Yán Kór.  Mama Dzái came forward and gave you a tight hug, as did her husbands Visán and Pi'úr.  You walked with them as the group proceeded to the House of Unmarred Repose, where White Stone had reserved a suite of rooms for a celebration. However, Dzái had just arrived that morning after over two years away, and as soon as you passed through the door social obligation dragged her away.  You found yourself left to your own devices.  Various rooms in the hostel were set aside for puppet shows, poetry readings, and a display by dancers.  How did you occupy yourself?\n\t*goto entertainments\n", "choicescript_description": "In the Empire of the Petal Throne™, will you find glory, or a knife in your back?\n\n\"Choice of the Petal Throne\" is a 124,000-word interactive fantasy novel by Danielle Goudeau, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nM.A.R. Barker's world of Tékumel™ is a fantasy universe like no other, where South American, Middle Eastern, and Indian cultures collide. The princes and princesses of the Tsolyáni empire vie for their father's mystical Petal Throne, tearing the nation apart with civil war and political intrigues.\n\nAs a captain in one of their armies, will you play as male or female, gay straight or bi? A brave and forthright soldier, a hedonistic intriguer with a heart of gold, or scheming double agent?\n", "choicescript_stats": "\n*temp wound_text\n*if fate = \"dead\"\n\t*set wound_text \"Dead\"\n\t*goto relate\n*elseif wound = 0\n\t*set wound_text \"Uninjured\"\n\t*goto relate\n*elseif wound = 1\n\t*set wound_text \"Scraped up\"\n\t*goto relate\n*elseif wound = 2\n\t*set wound_text \"Battle scarred\"\n\t*goto relate\n*else\n\t*set wound_text \"At Death's door\"\n\t*goto relate\n\n*label relate\n*temp wav_text\n*if wav_rep \u003c0\n\t*set wav_text \"Animosity\"\n\t*goto relate2\n*elseif wav_rep =0\n\t*set wav_text \"Neutrality\"\n\t*goto relate2\t \n*elseif wav_rep \u003c3\n\t*set wav_text \"Appreciation\"\n\t*goto relate2\n*else\n\t*set wav_text \"Adoration\"\n\t*goto relate2\n\t\n*label relate2\n*temp her_text\n*if her_rep \u003c0\n\t*set her_text \"Animosity\"\n\t*goto relate3\n*elseif her_rep =0\n\t*set her_text \"Neutrality\"\n\t*goto relate3\n*elseif her_rep \u003c3\n\t*set her_text \"Appreciation\"\n\t*goto relate3\n*else\n\t*set her_text \"Adoration\"\n\t*goto relate3\n\t\n*label relate3\n*temp nir_text\n*if nir_rep \u003c0\n\t*set nir_text \"Animosity\"\n\t*goto chart\n*elseif nir_rep =0\n\t*set nir_text \"Neutrality\"\n\t*goto chart\n*elseif nir_rep \u003c3\n\t*set nir_text \"Appreciation\"\n\t*goto chart\n*else\n\t*set nir_text \"Adoration\"\n\t*goto chart\n\t\n*label chart\n*stat_chart\n\ttext Name\n\ttext Clan\n\ttext Legion\n\ttext Legionnum Legion Number\n\ttext God Deity\nNoble Behavior:\n*if God = \"Hnálla\"\n\tOrderliness, Forthrightness, Loyalty, Conformity\n*if God = \"Karakán\"\n\tHonor, Protecting Society, Courage, Forthrightness, Loyalty\n*if God = \"Avánthe\"\n\tCompassion, Family, Protecting Women and Nature, Loyalty\n*if God = \"Hrü'ü\"\n\tSelfishness, Deception, Ambition, Nonconformity\n*if God = \"Vimúhla\"\n\tViolence, Vengeance, Courage, Forthrightness, Loyalty\n*if God = \"Dlamélish\"\n\tPursuit of Pleasure, Risk-Taking, Selfishness, Nonconformity\n*stat_chart\n\tpercent Noble Noble Action\n*label index\n*choice\n\t#Character Information\n\t\t*goto chart\n\t#Physical Stats\n\t\t*stat_chart\t\t\n\t\t\tpercent Diplomacy\n\t\t\tpercent Tactics\n\t\t\tpercent Combat\n\t\t*if psychic >10\n\t\t\t*stat_chart\n\t\t\t\tpercent Psychic Psychic Powers\n\t\t*if ritual >10\n\t\t\t*stat_chart\n\t\t\t\tpercent Ritual Ritual Magic\n\t\t*stat_chart\t\n\t\t\ttext wound_text Wounds\t\n\t\t*goto index\n\t#Social Ties\n\t\tRELATIONSHIPS:\n\t\t*stat_chart\n\t\t\ttext wav_text $!{wave}\n\t\t*if met_her\n\t\t\t*stat_chart\n\t\t\t\ttext her_text Rayána\n\t\t*if met_nir\n\t\t\t*stat_chart\n\t\t\t\ttext nir_text Nirún\n\t\t\n\t\t\n\t\t*if married\n\t\t\t*stat_chart\n\t\t\t\ttext spouse Name of Spouse\n\t\t*if married = false\n\t\t\t\tName of Spouse: Unmarried\n\t\t*stat_chart\n\t\t\ttext lover Name of Lover\n\t\t\n\t\tWORLDLY STATUS:\n\t\t*stat_chart\n\t\t\tpercent status Clan Status\n\t\t\ttext wealth Káitars\n\t\t*goto index\n\t#Glossary: People and Aliens, Military Terms\n\t\t\n\t\tMILITARY TERMS:\n\t\t\n\t\t\n\t\tDritlán: A strategic or headquarters commander of half a legion (approximately four thousand soldiers).  Unlike a molkár, a dritlán stays on a platform behind lines during battle.\n\t\t\n\t\tHeréksa: An officer who leads a káreng of one hundred soldiers.  Roughly equivalent to a lieutenant, but the Tsolyáni military does not distinguish between commissioned and noncommissioned officers.\n\t\t\n\t\tKáreng: A unit of one hundred soldiers, led by a heréksa.\n\t\t\n\t\tKási: An officer who leads a tsurúm of four hundred soldiers. Roughly equivalent to a captain.\n\t\t\n\t\tMolkár: The battle-commander of half a legion (approximately four thousand soldiers).  Unlike the dritlán, a molkár fights in the battle.\n\t\t\n\t\tQadárni: A \"little war,\" fought for coup, glory, and prizes between legions or smaller units, even on the same side.\n\t\t\n\t\tSemétl: A unit of twenty soldiers, led by a tirrikámu.\n\t\t\n\t\tTsurúm: A unit of four hundred soldiers, led by a kási.\n\t\t\n\t\tTirrikámu: An officer who leads a semétl of twenty soldiers.  Roughly equivalent to a lieutenant.\n\t\t\n\t\t\n\t\tPEOPLE and ALIENS:\n\t\t\n\t\t\n\t\tBaron Áld: The new military and political leader of Yán Kór.  A former confederate of the deceased Emperor, betrayed by Imperial courtiers and out for vengeance.\n\t\t\n\t\tAhóggya: A four-legged, four-armed, barrel-shaped alien.  They are stereotyped as violent and crude because they ignore Tsolyáni social custom.\n\t\t\n\t\tAridáni: A woman who has decided to forego the customary life of a clan-woman to attain the independence of a man. Women may declare this at any time after their early teens, and doing so grants the ability to join the military or a temple. About 10% to 20% of women make this choice.\n\t\t\n\t\tHrúgga: A famous hero of the past.  Equivalent to Hercules.\n\t\t\n\t\tN'lüss: Barbarian aliens who resemble Tsolyáni but are much taller.  They are the descendants of the Dragon Warriors.\n\t\t\n\t\tPachi Léi: Four-legged, four-armed aliens, native to the Chákan jungles, but found throughout Tsolyánu where they excel in bureaucracies.\n\t\t\n\t\tPavár:  The prophet of the gods of Tékumel, who revealed their existence to mankind.\n\t\t\n\t\tPrince Dhich'uné / Emperor Eternal Splendor / The Usurper:  One of the sons of the deceased Emperor, and an adherent of Sárku, the Five-Headed Lord of Worms.\n\t\t\n\t\tPrincess Ma'ín: The Emperor's only legitimate daughter, and a favorite of the Temple of Avánthe, despite leaving their faith to worship Dlamélish.  She hopes to marry a brother and throw her influence behind him in the war.\n\t\t\n\t\tPrince Mirusíya:  One of the Emperor's hidden children, a favorite of the military party.  He has built a cadre of smart young officers around himself.\n\t\t\n\t\tPrince Rereshqála: The eldest of the deceased Emperor's sons, and the favorite of the nobility.  A cultured man who lives in a seaside villa outside Jakálla.\n\t\t\n\t\tQueen Nayári:  The founder of the Bednálljan Empire.  She was born a slave, but schemed her way to power in a lawless era to build a civilization.\n\t\t\n\t\tTlakotáni: The ruling clan of Tsolyánu.\n\t\t*goto index\n\t#Glossary: Objects and Concepts, Creatures\n\t\t\n\t\tOBJECTS and CONCEPTS:\n\t\t\n\t\t\n\t\tChlén Hide: The shed hide of a chlén, chemically treated to resemble bronze.  It is often cut into fanciful shapes for jewelery, weapons, and armor.\n\t\t\n\t\tChumétl: A salty milk drink, similar to the earth ayran.\n\t\t\n\t\tDitlána:  A ritual purification conducted at intervals of five hundred years, depending upon the city's horoscope, wherein it is razed to the ground, filled with rubble, and built over.  Often postponed indefinitely for practical reasons.\n\t\t\n\t\tDná: A nourishing red grain used to make porridge and bread.\n\t\t\n\t\tDrársha: A popular drug that causes hallucinations and distortions in time-sense.\n\t\t\n\t\tFiryá: A plant-based fabric similar to earth linen.  The most common cloth used.\n\t\t\n\t\tGüdru: A plant-based fabric similar in texture to silk.  A luxury fabric worn by nobles.\n\t\t\n\t\tHirilákte arena: A sporting and gladiatorial arena, similar to a Roman coliseum.\n\t\t\n\t\tHnéqu: A popular drug that provides a mild euphoria when chewed.  Used commonly across social classes.\n\t\t\n\t\tKáitar: A small, thin gold coin that is the standard unit of currency.\n\t\t\n\t\tKévuk:  A gambling game played with dice using the symbols of the gods.\n\t\t\n\t\tKhatunjálim: A naming day celebration for adolescents entering puberty.\n\t\t\n\t\tKhéshchal: A multicolored bird, whose extremely long tail is used as decorative plumage, especially on helmets.\n\t\t\n\t\tKólumejálim:  The \"Choosing of the Emperors.\" A ritual competition of the heirs used to choose the next Emperor.\n\t\t\n\t\tMásh: A yellow fruit used in the making of brandy.\n\t\t\n\t\tMarotlán: A sport in which four teams compete for possession of a scepter.  Played in arenas for large crowds.\n\t\t\n\t\tMéshqu: Small, colorful patterned square hung outside the owner's door to indicate their mood and willingness to receive visitors.\n\t\t\n\t\tNakomé: A state of being clanless, and therefore devoid of legal rights. Also a term for a person in that state.\n\t\t\n\t\tNtó: A popular drug that creates a voluble giddy joy.\n\t\t\n\t\tPedhétl: Literally \"the enemy\" is the emotional id, the source of passion and of psychic energy.\n\t\t\n\t\tShámtla: Blood money, but also a settlement or fine levied by the courts.\n\t\t\n\t\tSákbe: A tiered road that doubles a defensive wall. The walls can have two or three tiers, with high nobles and those on Imperial business on the highest level, merchants and high-to-mid clans on the next. The lowest tier can be used by farmers and low clans.\n\t\t\n\t\tTenturén: A twelve-stringed instrument.\n\t\t\n\t\tThésun: A thin gauzy fabric prized for elegant garments.\n\t\t\n\t\tTiúni: A house cat.\n\t\t\n\t\tTsahltén: A gambling game played by throwing sticks in the air and guessing at the patterns they make.  A high-priced judge is necessary to play, making it a pursuit of wealthy nobles.\n\t\t\n\t\tTsámmeri: \"Beloved,\" a second-person pronoun used as a term of endearment.  Tsolyáni has a wide variety of second-person pronouns to cover relative social position and respect.\n\t\t\n\t\t\n\t\tCREATURES:\n\t\t\n\t\t\n\t\tChlén:  A six-legged herbivore, used as a draft animal and for its thick hide, which is periodically removed by peeling outer layers.  (see: chlén hide)\n\t\t\n\t\tDlaqó: An iridescent green beetle, growing from the size of a fist up to twenty feet in length.  Feeds upon dead flesh.\n\t\t\n\t\tHmá:  A six-legged sheep-like animal used for wool and meat.\n\t\t\n\t\tJajqi: A powerful undead indistinguishable from a living human.\n\t\t\n\t\tJakkóhl: A small fox-like animal.\n\t\t\n\t\tMrúr: A simple, dessicated undead, with little will or intelligence left.\n\t\t\n\t\tRenyú: A semi-intelligent dog-like creature that walks on two legs.  They are kept as pets or servants, and used for hunting.\n\t\t\n\t\tRu'ún: A demon made of bronze, created by the ancients.\n\t\t\n\t\tShédra: A flesh-eating undead of moderate intelligence.  Anyone killed by the shédra comes back as one of them.\n\t\t\n\t\tTiúni: A small domesticated cat.\n\t\t\n\t\tTsi'íl: A large forest-dwelling herbivore, with a spiked crest that continues down its back, and a spiked mace-like ball at the end of its tail. Hunted for meat.\n\t\t\n\t\tZrné: A large, fierce jungle predator with needle-like teeth.\n\t\t*goto index\n\t#Glossary: Supernatural Entities and Locales\n\t\tSUPERNATURAL ENTITIES:\n\t\t\n\t\t\n\t\tAvánthe: The female goddess of Stability, associated with women, family, and nature.\n\t\t\n\t\tBelkhánu: The death god of Stability, associated with the afterlife, funerary rites, and planar travel.\n\t\t\n\t\tDlamélish: The female goddess of Change, associated with sex, sensuality, Epicureanism, and risk-taking.\n\t\t\n\t\tHnálla: The head god of Stability, associated with order, the state, and perfection.\n\t\t\n\t\tHrü'ü: The head god of Change, associated with chaos, never-ending change, and self-interest.\n\t\t\n\t\tKarakán: The war god of Stability, associated with honor, soldierliness, and war for the maintenance of stability.\n\t\t\n\t\tKsárul: The knowledge god of Change, associated with secrets, magic, and power.  Betrayed the other gods and was sealed within the Blue Room.\n\t\t\n\t\tMiyusál:  Scarlet-clad warrior demons who attend on the dead in Karakán's heaven. Similar to valkyrie. \n\t\t\n\t\tRü'ütlánesh: A powerful \"many-mouthed\" demon of Dlamélish.  It takes the souls of those it kills to its plane to be its servants.\n\t\t\n\t\tSárku: The death god of Change, associated with decay, undeath, and cold intellectualism.\n\t\t\n\t\tThumís: The knowledge god of Stability, associated with preserving and sharing knowledge, wisdom, and peace.\n\t\t\n\t\tVimúhla: The war god of Change, associated with fire, violence, and pillaging.\n\t\t\n\t\t\n\t\tLOCALES:\n\t\t\n\t\t\n\t\tAvanthár: The palace-city of the Emperor of Tsolyánu, once a fortress of the ancients.  Currently controlled by Emperor Eternal Splendor.\n\t\t\n\t\tBednálljan Imperium:  The first Imperium, founded by Queen Nayári.  Fulfills the cultural role of ancient Babylon.\n\t\t\n\t\tBéy Sü: The capital and economic powerhouse of the Imperium, known as the \"Soul of the World.\" It is located south of Avanthár on the Mssúma River.\n\t\t\n\t\tButrús: A moderately sized city in the southwestern jungles and forests of Tsolyánu.  Part of the Chákas.\n\t\t\n\t\tChákas, the: The western jungles of Tsolyánu, bordering Mu'ugalavyá.  They have a unique culture that blends the two countries.\n\t\t\n\t\tEngsvanyáli Imperium / Engsván hla Gánga:  The Empire of the Gods, founded after the revelation of the gods of Stability, and destroyed in a magical catastrophe. It is the most recent empire to Tsolyánu, and the Tsolyáni consider themselves its cultural heirs.  Fills the same cultural role as the Roman Empire in modern Western civilization.\n\t\t\n\t\tJakálla: A southern city, founded during the Bednálljan Imperium, on a bay.  Famously decadent.\n\t\t\n\t\tLivyánu: Another of the \"Five Empires,\" it does not share a border with Tsolyánu.  It is located far to the southwest.\n\t\t\n\t\tMilumanayá:  A northern country of desert tribesmen known for the peculiar practice of settling decisions through voting.\n\t\t\n\t\tMu'ugalavyá: A large country of the western border.  \n\t\t\n\t\tSalarvyá:  A country to the southeast.  It is so large that parts of it are only nominally \"Salarvyá.\" The Tsolyáni stereotype Salarvyáni as sleazy merchants.  They worship a goddess who is the amalgam of Dlamélish and Avánthe.\n\t\t\n\t\tSangmiré:  A small town in central Tsolyánu.\n\t\t\n\t\tTékumel: The planet.\n\t\t\n\t\tTeretané: The Isles of the Excellent Dead, where the souls of the departed go to be sorted into their heavens or reincarnation.\n\t\t\n\t\tTsolyánu:  One of the \"Five Empires.\" The setting of the game.\n\t\t\n\t\tÚrmish: A city in the southwestern Empire, amidst good agricultural fields.\n\t\t\n\t\tYán Kór: A matriarchal nation to the north of tribesmen who were united by Baron Áld and went to war with Tsolyánu.\n\t\t*goto index\n\t#Glossary: English Words with Specific Meanings\n\t\tENGLISH WORDS:\n\t\t\n\t\t\n\t\tAunt/Uncle: A broad term encompassing people who either raised you or are blood relatives.\n\t\t\n\t\tClan: A national concern that functions as both a family and business unit, often united by a shared profession (low- or middle-clan) or noble heritage (high-clan).  Clan members in a given city live together within a clanhouse.  Many, but not all, clans have a patron deity or deities.  The clan controls the wealth of its members and exerts strong control over their lives.\n\t\t\n\t\tClanhouse: A sprawling complex of dormitories, private suites, communal rooms, storefronts, and other areas in which the members of a given clan within a city cohabitate.\n\t\t\n\t\tClan-cousin: Age-mates from your clan.\n\t\t\n\t\tConcordat: An agreement established that the worshippers of the ten gods will not proselytize or make open religious war upon each other.  A byproduct of this is a form of pantheism, wherein most Tsolyáni celebrate the holidays of all gods, and seek each for their spheres of influence.\n\t\t\n\t\tEye:  A device of the ancients that produces magical effects.  Ball-shaped, they are held in the hand and fired to project a beam containing the effect.\n\t\t\n\t\tLineage: A more closely related family unit or bloodline within the clan, often claiming descent from a historical figure. Lineages names begin with 'hi' as in 'hiKétkolel.'\n\t\t\n\t\tNoble Action: Living life according to the precepts of your god and your place in the social hierarchy.  This is the highest Tsolyáni virtue.\n\t\t\n\t\tOmnipotent Azure Legion (OAL): The uniformed and secret police of the Tsolyáni state.\n\t\t\n\t\tParent:  Biological parentage is less important in Tsolyánu.  \"Mother\" is used to refer to one's biological mother, her sisters, and one's father's brother's wives.  \"Father\" can refer to one's mother's husbands and brothers, and her sisters’ husbands.\n\t\t\n\t\tPsychic Spells: Magic produced simply with the power of the mind.  They are learned as spells, but do not require ritual movements or equipment.  The produce effects such as clairvoyance, telepathy, and telekinesis.\n\t\t\n\t\tRitual Magic:  Elaborate spell effects produced by conducting memorized ritual movements, such as dancing and singing, often incorporating accoutrements such as scrolls, colored chalks to inscribe glyphs, candles, and other props.\n\t\t\n\t\tSkein of Destiny:  The fatalistic belief that one's destiny is predetermined in his branch of the Tree of iTme.\n\t\t\n\t\tSir: A stand-in for the term \"tusmikang,\" the \"you\" of martial victory. This is a genderless term of respect, though most soldiers are male.\n\t\t\n\t\tSorcery:  The act of pulling energy from between the planes using the power of the mind and pedhétl.  Usually divided into psychic and ritual magic.\n\t\t\n\t\tSpouse:  Tsolyáni men (and aridáni women) can have multiple spouses. One's first spouse is usually arranged by the clan and of equivalent social status.\n\t\t\n\t\tTree of Time: The branching of realities, where small changes or differences lead to new parallel worlds.\n\t\t\n\t\tWomen: The default status for women, especially in southern Tsolyánu, is to be a ward of their clan, often referred to as a \"good clan-girl.\" They cannot own property, sign contracts, or be tried for crimes.  These women may still hold immense social power within the clan itself.  Approximately 20% of women reject this role to become \"aridáni\" (see under Objects and Concepts).\n\t\t*goto index\n\t\t\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  *if choice_is_omnibus_app or choice_is_web\n    [b]Remove Advertising and Delays[/b]\n\n    Permanently remove all ads and delays.\n\n    *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n  *if (choice_is_omnibus_app = false) and (choice_is_web = false)\n    [b]Rest of the Game[/b]\n\n    Unlock the rest of the game, including the thrilling conclusion!\n\n    *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "epilogues": "\n*temp help_wav false\n*temp drit_fate false\n*temp her_praised false\n*temp feud_end false\n*temp propose_her false\n*temp wav_back false\n\n*if fate = \"dead\"\n\t[b]Epilogue: Death[/b]\n\t\n\t\n\t*achieve die\n\tOn Tékumel your compatriots struggle through the Underworld. Two find death, one finds glory, and the war grinds on without you. Your Skein of Destiny has come to its end, and your spirit-soul is unaware of earthly concerns. \n\t*if noble >= 65\n\t\t*achieve noble\n\t\tIt wafts through the Isles of Teretané and unto a final reward in the heaven of $!{lord} $!{god}.\n\t\t\n\t\t*if God = \"Hrü'ü\"\n\t\t\tYou become one with the chaos of reality, delighting in the endless changes and permutations, the ups and downs of life. Wherever your Lord is made manifest in the world, you are there to witness what unfolds, and when you see the fate of the artifact, you cannot help but laugh. \n\t\t*if god = \"Hnálla\"\n\t\t\tYou become one with the light of Lord Hnálla, delighting in the ordering of the universe, and the steady march toward perfection. Wherever your Lord is made manifest in the world, you are there to witness what unfolds, and you know that the war, like all things, will pass and peace will come again.\n\t\t*if god = \"Dlamélish\"\n\t\t\tIn the Emerald Kiosk, you are focused down to a being of pure fulfillment of desire. Yours is an eternity of ecstatic union with the divine, and worry and care mean nothing to you.\n\t\t*if God = \"Avánthe\"\n\t\t\tHere you are born again into a new life and a new family. Here the blessed dead farm emerald fields, play endless games, and find joy and love. The new life is a balm to heal your soul, until the Goddess needs you once more to be sent out into the world.\n\t\t*if God = \"Vimúhla\"\n\t\t\tIn the Halls of the Ever-Burning Flame, for a moment that lasts an eternity, your soul is gloriously unmade. You shed your worries and your concerns, your pain, your needs, and in so doing become pure energy, in union with the Lord of Flame.\n\t\t*if God = \"Karakán\"\n\t\t\tHere you venture forth bravely with a band of brothers to glorious battle with the demons of Change. There is no death, only the eternal struggle, the beat of mighty drums and the panoply of brave warriors. Between battles the Miyusál recount your mighty deeds.\n\t\t\t\n\t\t\t*if her_dead\n\t\t\t\tStanding to meet you when you arrive is Heréksa Rayána. \n\t\t\t*if her_dead = false\n\t\t\t\tIt is not long, in this timeless place, before your numbers are joined by Heréksa Rayána. \n\t\t\tThough all are seated by their courage in Lord Karakán's hall, and the old status is wiped away, still she sits at your right-hand side, ready to follow her Kási once more.\n\t\t*goto the_end\n\t*elseif (noble >= 50)\n\t\tIt wafts through the Isles of Teretané and is found neither worthy nor wanting.  You pass a timeless moment in that place, waiting your turn to live in the world once more.\n\t\t*goto the_end\n\t*else\n\t\t*achieve ignoble\n\t\tIn the Isles of Teretané it is found wanting, and exiled to a final punishment in the hell of $!{lord} $!{god}.\n\t\t\n\t\t*if God = \"Hrü'ü\"\n\t\t\tLike a bug in amber, your soul is trapped, conscious of unending stasis. There is no Change or time, just unbearable sameness, until you are reduced to nothing but a pale ennui.\n\t\t*if god = \"Hnálla\"\n\t\t\tLike a fly in a storm, your soul is trapped in unremitting chaos. There is no peace or order, just terrifying and powerful Change, until you are reduced to weak and trembling fear.\n\t\t*if god = \"Dlamélish\"\n\t\t\tYou are haunted by the memory of desire, and of its fulfillment, forced to live as a shadow of yourself. Here, in a world without the touch of the Emerald Lady there is no drive, no satisfaction or yearning, only a life of perfect gray dolor.\n\t\t*if God = \"Avánthe\"\n\t\t\tHaving failed your Goddess in life, you are exiled from her bounty in death, to a barren plane of dry, cracked earth and terrible unseasonable storms. There is no order here, nor safety, and you wander a blighted world in search of a peace you will never find.\n\t\t*if God = \"Vimúhla\"\n\t\t\tIn the Outer Portals of Kelkúun there is no light or warmth, only the cold damp. Having served Lord Vimúhla ill, you are denied his brightness, both of the flesh and of the spirit, and forced into a dreary eternity.\n\t\t*if God = \"Karakán\"\n\t\t\tHere there is no bravery or honor or glory. It is a place of meanness in deed and spirit, where cowards scheme against each other for meager gains. Your life, such as it is, is reduced to drab scrabbling, until such time as you are sent back to the world to prove yourself again. \n\t\t*goto the_end\n*elseif (fate = \"getgirl\") or (Fate = \"kill\")\n\t*set status %+20\n\t[b]Epilogue: Honored[/b]\n\t\n\t[i]$!{Hometown}, Fall of 2365 A.S.[/i]\n\t\n\t\n\t*achieve home\n\t*if her_dead = false\n\t\t*achieve commander\n\t*if clan = \"Red Sun\"\n\t\tPrince Mirusíya sits upon a raised platform in the field tent, surrounded by young officers. His expression is pensive, and his eyes are fixed on you as you tell your tale, though they occasionally \n\t*if clan = \"Sea Blue\"\n\t\tPrince Rereshqála grants you audience in a small private room within his villa, the entourage that customarily surrounds him replaced by a few older men in the robes of Lord Hnálla. He watches their reactions to your tale as much as he watches you, and his eyes occasionally \n\t*if clan = \"White Stone\"\n\t\tPrincess Ma'ín lounges across a pile of cushions on the raised dais. Her audience chamber is filled with whispering courtiers and the melodies of skilled musicians. She examines her nails as you tell your tale, but at times her eyes narrow and \n\tshift speculatively to the black stone \n\t*if fate = \"getgirl\"\n\t\tartifact and to $!{wave} bound beside you. \n\t*if fate != \"getgirl\"\n\t\tartifact. \n\tWhen your story winds down, and you get to the ride in the floating egg and the rendezvous with the army, the $!{Prince} speaks.\n\t\n\t\"I am pleased to see you here before \n\t*if meet_prince = false\n\t\tme.\"\n\t\t*if evidence\n\t\t\tHe pauses thoughtfully.  \"We have not met, but I recognize your name from a certain diplomatic pouch.  You should know that the priests involved have been punished.  Severely.\" He glares at his advisors, who look forward stonily, and adds, \"I will be an Emperor to all my people and all our gods.\" You can hear the heat of passion in his voice.\n\t*if meet_prince\n\t\tme again. The last time was for a victory in a qadárni, wasn't it? \n\t\t*if clan = \"Sea Blue\"\n\t\t\tAnd now for victory in a battle. From the pursuits of youth to the pursuits of adulthood. There's a poem in that somewhere.\"\n\t\t*if clan = \"White Stone\"\n\t\t\tYou gave me that lovely gift.\" Her eyes travel over you in a way that brings a blush to your cheeks. \"You've grown since then.\" \n\t\t*if clan = \"Red Sun\"\n\t\t\tIt seems like we were all playing at war then, but now we battle for an empire.\"\n\t\t\t*if evidence\n\t\t\t\tHe pauses thoughtfully.  \"Your name is also familiar to me, not from the qadárni.  From a certain diplomatic pouch.  You should know that the priests involved have been punished.  Severely.\" He glares at his advisors, who look forward stonily, and adds, \"I will be an Emperor to all my people and all our gods.\" You can hear the heat of passion in his voice.\n\t*comment endif\n\t\n\t*if clan = \"Sea Blue\"\n\t\tHe stands and begins to pace. \"From what we can tell, the secrecy about your success remains. \n\t\t*if battlelost\n\t\t\tWe had thought Sangmiré lost, and the artifact with it, and here you rise from the ground weeks later, redeeming everything. \n\t\tYou—\" He nods to one of the priests. \"—will take this artifact and report back on its capabilities.\"\n\t*if clan = \"White Stone\"\n\t\tShe stretches languidly. \n\t\t*if Battlelost = false\n\t\t\t\"When \n\t\t*if battlelost\n\t\t\t\"We had thought Sangmiré lost, and the artifact with it, and here you rise from the ground weeks later, redeeming everything.  When \n\t\tmy brothers hear of the new gift you've brought, they will come asking it of me, and we shall play them off one another. Let others fight to be king; we will be king-maker.\"  Beside her, priestesses and advisors begin to murmur.\n\t*if clan = \"Red Sun\"\n\t\tHe stretches, rolling his neck from side to side. \n\t\t*if battlelost = false\n\t\t\t\"Who \n\t\t*if battlelost\n\t\t\t\"We had thought Sangmiré lost, and the artifact with it, and everyone else still does, but who \n\t\tknows how long before the element of surprise is lost? Our first priority must be to get this device operational and in the field.\" He addresses one of the younger men, in the uniform of a dritlán. \"I am trusting you with this. Find the most obvious capabilities, and their strategic uses, quickly.\"\n\t*comment endif\n\t\n\tYou are forgotten for a time in this consultation, but when the $!{Prince}'s attention returns it is to drown you in honors: a promotion to \n\t*if tactics >= combat\n\t\tdritlán, so you can direct the formation of strategy for the Legion of ${legion}, \n\t*if combat > tactics\n\t\tmolkár, increasing your rank while allowing you to continue to direct soldiers on the ground, \n\tseveral attractive and useful slaves, \n\t*if (psychic > 10) or (ritual > 10)\n\t\ta private magical tutor, \n\tand an enchanted steel buckler engraved with the symbol of \n\t*if staff\n\t\t$!{Clan}; even an enchanted steel spearhead for your new staff. \n\t*if staff = false\n\t\t$!{Clan}. \n\t*if courtmarshal\n\t\tNo mention is made of your court-martial, as if it never occurred. Victory, it seems, washes away all manner of sins.\n\t*page_break\n\t*if fate = \"getgirl\"\n\t\tWhen $!{Prince} $!{Princename} is done showing \n\t\t*if prince = \"Prince\"\n\t\t\this \n\t\t*if prince != \"Prince\"\n\t\t\ther \n\t\tgenerosity, \n\t\t*if prince = \"Prince\"\n\t\t\the \n\t\t*if prince != \"Prince\"\n\t\t\tshe \n\t\tfixes \n\t\t*if prince = \"Prince\"\n\t\t\this \n\t\t*if prince != \"Prince\"\n\t\t\ther \n\t\tgaze upon $!{wave}, who straightens, appearing as proud as possible under the weight of binding ropes. \"Of course, you also bring a problem to my doorstep. A member of my brother Dhich'uné's so-called Omnipotent Azure Legion. What am I supposed to do with this?\"\n\t\t*achieve getgirl\n\t\t*choice\n\t\t\t#I promised ${wahim} safety.\n\t\t\t\t*set help_wav true\n\t\t\t\t\"Exalted $!{prince},\" you say, \"I gave my word that my clan-cousin would come to no harm. $!{wahis} decision to betray the Usurper made this victory possible.\"\n\t\t\t\t\n\t\t\t\tAs you speak, $!{wave} inches closer to your side, mouthing a little \"thank you\" under ${wahis} breath.\n\t\t\t\t*label verdict\n\t\t\t\t\n\t\t\t\t*if clan = \"Sea Blue\"\n\t\t\t\t\tPrince Rereshqála taps his chin and stares at the ceiling, addressing $!{wave}. \"What are your thoughts on going back to brother Dhich'uné? If we can spin the story of what happened in those tombs? I promise you rewards well worth the risk.\"\n\t\t\t\t\t\n\t\t\t\t\tYour clan-cousin looks frankly skeptical. \"I don't think there's any defense your psychics could put on me that Vridékka wouldn't see through in a heartbeat. If the plan were good, if I interacted only with the edges of the spy service, and if the goal were concrete and time frame short, maybe it could be \n\t\t\t\t\t*if wave_slave\n\t\t\t\t\t\t*set wav_back true\n\t\t\t\t\t\tdone. As to the price, well, readmission to Clan Sea Blue, and a nice rank that put me near the head of the table, would be damn near priceless.\"\n\t\t\t\t\t*if wave_slave = false\n\t\t\t\t\t\tdone.\" \n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tOne of the priests flushes scarlet at the spectacle of a prisoner dickering with the mighty Prince, but Rereshqála merely waves his hand with a small, terse smile. \"I think we understand one another.\"\n\t\t\t\t*if clan = \"Red Sun\"\n\t\t\t\t\tPrince Mirusíya stares sternly at $!{wave}, taking ${wahis} measure. \"Loyalty is a great virtue, which you seem to be lacking. I can be glad you supported my cause, but still not respect your choice. A true soldier would have died down in that Underworld.\" \n\t\t\t\t\t*if help_wav\n\t\t\t\t\t\tHe is silent a moment, and the only sound is the snap of the tent billowing in the wind. \"My Kási here has given ${pchis} word, and I will not dishonor ${pchim}.  \n\t\t\t\t\t\t*if wave_slave\n\t\t\t\t\t\t\t*set wav_back true\n\t\t\t\t\t\t\tI will order your old clan to take you in, and watch you for me.\n\t\t\t\t\t\tYou will be Red Sun's charge, but I will make it known that I am not displeased with you. Perhaps Kási $!{name} sees something in you that I do not.\"\n\t\t\t\t\t*if help_wav = false\n\t\t\t\t\t\tHis face hardens. \"Your reward will fit your nature. No rank, no trust, no status, just crass \n\t\t\t\t\t\t*if wave_slave\n\t\t\t\t\t\t\twealth. I suggest you use some of it to buy your way into a clan; I won't force Red Sun to take you back.\"\n\t\t\t\t\t\t*if wave_slave = false\n\t\t\t\t\t\t\twealth.\"\n\t\t\t\t\t\t*comment endif\n\t\t\t\t\t\t\n\t\t\t\t\t\tBeside you, $!{wave} does ${wahis} best to convey chastisement, though you can tell a pile of money suits ${wahim} just fine.\n\t\t\t\t*if clan = \"White Stone\"\n\t\t\t\t\t\"I can respect a \n\t\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\t\tman \n\t\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\t\twoman \n\t\t\t\t\twith an eye for the main chance. You gambled, and you won, this time, but I trust you're smart enough not to try the same trick twice?\" At $!{wave}'s nod, she smiles, and for a moment her beauty takes your breath away, like having a goddess pleased with you.  \n\t\t\t\t\t\n\t\t\t\t\t\"Good.\"\n\t\t\t\t\t*if wave_slave\n\t\t\t\t\t\t*set wav_back true\n\t\t\t\t*page_break\n\t\t\t\t*goto family\t\n\t\t\t#You should hand ${wahim} over to the real Omnipotent Azure Legion for questioning.\n\t\t\t\t\"My clan-cousin is a weather vane, turning always towards self-interest. I'm sure your soldiers can easily beat valuable secrets out of ${wahim}.\"\n\t\t\t\t\n\t\t\t\t$!{wave} half stands, and the look ${wahe} gives you is venomous. \"You little—\" But then ${wahe} comes back to ${wahim}self and prostrates ${wahis} body before the $!{prince}. \"No beating is needed. I will be happy to trade information for safety, Your Highness.\" $!{wahis} voice drips honey, but $!{Princename} merely waves for guards. $!{wave} is lifted bodily by the arms, and carried from the \n\t\t\t\t*if clan = \"Red Sun\"\n\t\t\t\t\ttent. \n\t\t\t\t*if clan != \"Red Sun\"\n\t\t\t\t\troom. \n\t\t\t\t*achieve killwave\n\t\t\t\t*page_break\n\t\t\t\t*goto family\n\t\t\t#I don't care what happens to ${wahim}.\n\t\t\t\tYou studiously avoid speaking, looking at the floor as you treat the $!{prince}'s question as rhetorical. Beside you, $!{wave} glares daggers and fidgets in ${wahis} bonds.\n\t\t\t\t*goto verdict\n\t\t\t#We're getting married.\n\t\t\t\tAt your announcement, $!{wave} raises ${wahis} eyebrows, mouthing \"We are?\" sotto voce. $!{Prince} $!{Princename} \n\t\t\t\t*if clan = \"White Stone\"\n\t\t\t\t\tlaughs, the silvery sound carrying throughout the chamber. \n\t\t\t\t*if clan != \"White Stone\"\n\t\t\t\t\tlaughs. \n\t\t\t\t\"I suppose that solves my problem, assuming you can be trusted to keep an eye on your new \n\t\t\t\t*if wahe = \"he\" \n\t\t\t\t\tgroom. \n\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\tbride. \n\t\t\t\tI'll have to think of a suitable present.\"\n\t\t\t\t*set marry_wav true\n\t\t\t\t*if wave_slave\n\t\t\t\t\t*set wav_back true\n\t\t\t\t*goto family\n\t*else\n\t\t*label family\n\t\tThe audience is brief, and the $!{Prince}'s advisors have clearly cast you in the role of honored supplicant, over-awed by the royal presence. Still, it is possible for a bold soldier to seize the moment and ask a personal boon.\n\t\t*fake_choice\n\t\t\t#I am content with my rewards, and feel no need to speak.\n\t\t\t\t*set noble %+20\n\t\t\t*selectable_if (battlelost= false) #I warn the $!{prince} about the shameful job done by Dritlán Núromen.\n\t\t\t\t*set drit_fate true\n\t\t\t\tWith patience and respect you lay out the siege of Sangmiré as you saw it, taking pains to describe your Dritlán's errors. When you are done $!{Prince} $!{Princename} \n\t\t\t\t*if clan = \"Red Sun\"\n\t\t\t\t\tis gritting his teeth. \"For too long we have sacrificed victory to moribund ideas of tactics and strategy. I appreciate you telling me this, Kási. We can't win this war if we defeat ourselves.\"\n\t\t\t\t*if clan = \"White Stone\"\n\t\t\t\t\twaves a hand at a slave. \"Bring me this Dritlán when my interview here is finished.\"\n\t\t\t\t*if clan = \"Sea Blue\"\n\t\t\t\t\tgives a heavy sigh. \"It would not do to defame the name of one of our cousins, whose lineage has been so generous in its support, but I thank you for bringing this to my ear privately. We can find some obscure, out-of-the-way post for Núromen where there is much pomp, but little harm to be done.\"\n\t\t\t#I want an end to my feud with $!{Nirclan}.\n\t\t\t\tYou explain the origins of the disagreement between yourself and $!{Nirclan}, \n\t\t\t\t*if nir_dead = false\n\t\t\t\t\thinting at the disaster it almost caused, without explicitly impugning the name Nirún or General $!{AlliedGeneral}. \n\t\t\t\t*if nir_dead\n\t\t\t\t\thow it cost Kási Nirún his life.  General $!{AlliedGeneral} has tears running down her craggy cheeks as she listens to the fate of her favorite nephew. \n\t\t\t\t$!{Prince} $!{Princename} is somber throughout. \"I cannot have my soldiers putting their squabbles before my goals, and whatever the past, you have shown yourself today to be a \n\t\t\t\t*if pche = \"he\"\n\t\t\t\t\tman \n\t\t\t\t*if pche = \"she\"\n\t\t\t\t\twoman \n\t\t\t\tof nobility. I will let it be known that I have ruled in this matter, and it is to be dropped, with no shámtla paid on either side. Anyone who broaches it again will be committing treason against me.\"\n\t\t\t\t*if nir_dead = false\n\t\t\t\t\tBeside him, General $!{AlliedGeneral} of $!{NirClan}, looks as though she has sucked on a sour fruit, but says nothing. \n\t\t\t\t*if nir_dead\n\t\t\t\t\tBeside him, the General bows her head. \n\t\t\t\t*set feud_end true\n\t\t\t#I wish to commend Heréksa Rayána.\n\t\t\t\t*set her_praised true\n\t\t\t\tYou reiterate once more the vital role played by your low-clan Heréksa, emphasizing her loyalty, stoicism, and raw physical power that helped carry you to victory. \n\t\t\t\t*if her_dead\n\t\t\t\t\tYou tell of how she bravely fell in combat, showing bravery uncommon for her low station of birth.  $!{Prince} $!{Princename} somberly promises to bequeath a large sum upon her clan in her memory.\n\t\t\t\t\n\t\t\t\t*if (clan = \"White Stone\") and (her_dead = false)\n\t\t\t\t\t\"If this woman is as fierce as you say,\" Princess Ma'ín says with a smile, \"such a treasure should not be wasted. I will see her for myself, and decide a fitting reward. Your praise of her is high; do you intend to marry her?\" \n\t\t\t\t\t*set propose_her true\n\t\t\t\t*if (clan = \"Sea Blue\") and (her_dead = false)\n\t\t\t\t\t\"It sounds as though you have some affection for her,\" Prince Rereshqála notes with amusement. \"I will see her promoted, and can even find her a good medium clan. \n\t\t\t\t\t*if (((orientation = \"lesbian\") or ((orientation = \"straightm\") or (lover = \"Rayána\"))) and ((married = true) or (marry_wav = true)))\n\t\t\t\t\t\t*set propose_her true\n\t\t\t\t\t\tUnless you would prefer to marry her and bring her into Sea Blue? \n\t\t\t\t\tIt is important that we display loyalty to those who serve us with it.\"\n\t\t\t\t*if (clan = \"Red Sun\") and (her_dead = false)\n\t\t\t\t\tPrince Mirusíya nods at your words. \"I will see her promoted, and can even find her a good medium clan. \n\t\t\t\t\t*if (orientation = \"lesbian\") or ((orientation = \"straightm\") or (lover = \"Rayána\"))\n\t\t\t\t\t\t*set propose_her true\n\t\t\t\t\t\tUnless you would prefer to marry her? \n\t\t\t\t\tValor like that should be rewarded, wherever it is found.\"\n\t\t\t#I publicly thank my clan for their support.\n\t\t\t\t*set status %+15\n\t\t\t\tYour speech in support of Clan $!{Clan}, their efforts, and their loyalty is well received, and the $!{Prince} nods. \"Do not worry, Kási.  They will get their rewards as well.\"\n\t\t*comment endchoice\n\t\t*if propose_her\n\t\t\t*fake_choice\n\t\t\t\t#\"There's no real romance between us.\"\n\t\t\t\t\tThe $!{Prince} gives an eloquent shrug, the affairs of subjects clearly of little concern.\n\t\t\t\t#\"It's beneath my dignity to marry so far below my status.\"\n\t\t\t\t\tThe $!{Prince} smiles, amused. \"I would never impugn your honor. You'd be surprised at the variety I see in second or third spouses.\"\n\t\t\t\t*selectable_if (her_rep >0) #\"Marriage is a fine idea.\"\n\t\t\t\t\t*set marry_her true\n\t\t\t\t\t\"That's settled then,\" the $!{Prince} says, smiling.\n\t\t\t*goto audience_end\n\t\t*else\n\t\t\t*goto audience_end\n*elseif fate = \"defect\"\n\t[b]Epilogue: Eternal Splendor[/b]\n\t\n\t[i]Avánthar, Fall of 2365 A.S.[/i]\n\t\n\t\n\t*achieve avanthar\n\tThe lamp announcing the Emperor's presence illuminates the thin jade screen, but does not cast his silhouette upon it, at least not that you can see from your position, prostrate upon the floor. Forehead pressed into the luxuriously plush rug, you peer up through your lashes as chanters echo the words of the divine Emperor.\n\t\n\t\"The Speaker of the Will of the Gods commends his loyal servant $!{wave} hiTánkolel, for steadfastness and…creativity in the exercise of Our mandate to retrieve the device of the ancients.\"\n\t\n\tBeside you, $!{wave} is prostrate as well, and you glance aside to see ${wahim} grinning into the carpet as the First Prelate and his chorus echo the imperial commands. \"We raise you up to the rank of kási within the Omnipotent Azure Legion. Your reward, as is so often the case for work well done, will be more work. As to your cousin…\"  At the words you imagine the face behind the screen turning its attention to you.\n\t\n\t\"We are magnanimous to those who turn from the path of treason and in so doing help us secure victory. You set an example, $!{name} ${Lineage}, of how honor can be redeemed. An example that We hope your clan, and Our errant siblings, take notice of.\"\n\t*page_break\n\tYour clan took notice, but not in the way the Emperor meant. Letters had begun arriving in the weeks leading up to your formal audience. The letter from Dzái had radiated anger with every stab of the brush. Phrases like \"traitor\" and \"never hear from you again\" were prominent, and the veneer of etiquette common to Tsolyáni writing was stripped away. Memorably, she accused you of \"hiding behind that putrid wormy little prince's skirts.\"  The letter was almost blasphemous and certainly enough to warrant her impalement if she were ever to fall into the Emperor's grasp.\n\t\n\t*if status \u003c 65\n\t\tYou are certain the rest of the clan feels the same, but are simply more politic than to put such sentiments in writing. You know you will be viewed as a necessary evil, a voice for the clanhouses in lands controlled by the Emperor, and a game piece to hold in reserve in case $!{Prince} $!{Princename} fails to seize the throne.\n\t*if status >= 65\n\t\tThe clan elders were more measured in their response, aware that in games of state, insurance is always called for. Their letter appointed you the voice of $!{Clan} in Avanthár, with a generous stipend attached. You know you will be treated with a deference bordering on groveling, at least until Emperor Dhich'uné's fortunes change.\n\t\t*set wealth +1000\n\t*comment endif\n\t\n\t*if lover = spouse\n\t\tOnly your \n\t\t*if wahe = \"he\"\n\t\t\thusband, \n\t\t*if wahe = \"she\"\n\t\t\twife, \n\t\t$!{Spouse}, expressed joy for your sake. $!{wahis} formal letter had congratulated you on your upcoming audience, and announced that ${wahe} would be packing up ${wahis} things and traveling to meet you in Avanthár, the twins in tow.\n\t*if (married = true) and (lover != spouse)\n\t\tEven your \n\t\t*if wahe = \"he\"\n\t\t\thusband, \n\t\t*if wahe = \"she\"\n\t\t\twife, \n\t\t$!{Spouse}, had written a cold and distant letter, making it clear ${wahe} had no intentions of uprooting ${wahis} life in $!{Hometown} to come to Avanthár.\n\t*fake_choice\n\t\t#I will use my position to extend protection over my clan.\n\t\t\tYour family's coldness does not faze you. You know that they will come to see the truth when the civil war is ended. When their allies and their ${Prince} fall, they will see that you are there to shelter them, and appreciate the genius of your gamble. \n\t\t\t*page_break\n\t\t\tYou nod at the chorus's words. An example, yes.\n\t\t#I will take my place at the head of my clan.\n\t\t\tThe barbs in the letters cannot pierce you, because you know that, unlike the rest of your family, you have had the clarity to pick the winning side in this war, and when the dust settles you will be the only member of $!{Clan} with the Emperor's true favor.\n\t\t\t*page_break\n\t\t\tThat same Emperor is still enumerating your virtues and rewards. \n\t\t#I intend to leave my clan and find a better match through marriage.\n\t\t\tYou will not stay where you are not wanted, and you won't let the rebellion of your relatives pull you down. Here in Avanthár, where the cream of the world gathers, you will find a new family. \n\t\t\t*if lover = spouse\n\t\t\t\tYou know in your heart that $!{Spouse} will follow you into a new marriage, and be glad of ${wahis} rise in station.\n\t\t\t*page_break\n\t\t\tEven now, scribes are recording the words of the Emperor as he praises your virtues. \n\tHonors are piled upon you. Money, rank, slaves—compared to which $!{wave}'s promotion seems a trifling thing—and yet your avaricious cousin shares a private smile with the floor through it all.  \n\t*if staff\n\t\tYou are even presented with an enchanted copper spearhead, hard as steel, for your new staff.  \n\tThe generosity is overwhelming, but each gift is another string tying you to the Emperor, his puppet to dance for the nobles of a rebellious nation, the carrot to be flashed for those weary of the stick.\n\t*page_break\n\tThe audience is ended, the light is extinguished, and you are ushered from the chamber out onto a golden balcony high above the Mssúma River. $!{wave} follows you, giddy in a way you haven't seen since ${wahe} reappeared in your life. \"I told you he's a generous man.\"\n\t\n\t\"He didn't shower many gifts upon you. The Wave I knew didn't think of work as a reward.\"\n\t\n\tYour cousin laughs. \"I live day to day, and anything I need the servants of the fortress provide. Besides, if I can't use a captaincy in the spy service to feather my nest, I don't deserve the promotion.\"\n\t*fake_choice\n\t\t*selectable_if (wav_rep \u003c=0) #\"Why did you let me come with you? We haven't gotten along.\"\n\t\t\t$!{wave} thinks for a moment. \"Sentimentality? No. You're just another prize I carted home, and I'm not sure I've really done you a favor.\"\n\t\t#\"I made the best of a bad situation. I don't forgive your betrayal.\"\n\t\t\t\"I don't need your forgiveness. You're just another prize I carted home.\"\n\t\t#\"This worked out well, and I owe you.\"\n\t\t\t*set wav_rep +1\n\t\t\t$!{wave} beams at you. \"What's family for, eh? I'm sure I'll find a way for you to pay me back.\" $!{wahe} squeezes your shoulder.\n\t\t#Kiss ${wahim}.\n\t\t\t$!{wave} is surprised, but melts into your arms. The waterfalls thunder below, and a bird circles in the sky.\n\t\t*selectable_if (lover = wave) #\"Would you marry me?\"\n\t\t\t\"It's about time you asked.\" $!{wave} folds you in ${wahis} arms and stares out over the balcony, ${wahis} head resting tenderly upon your shoulder. \"We'll make our wedding the talk of the court. You can even invite your mothers.\"\n\t*comment endif\n\t\n\tThen, a voice calls ${wahis} name from back inside, and ${wahe} turns and walks back into the palace.\n\t\t\n\tAvanthár, the most glorious, opulent fortress ever built, the secluded home of emperors where any desire can be granted except their desire to leave—and now, your new home. You place your hand upon a railing of delicate filigree, and stare out upon the world.\n\t*goto the_end\n*elseif fate = \"adventure\"\n\t[b]Epilogue: Adventure[/b]\n\t\n\t[i]Various Locales, Fall and Winter of 2365 A.S.[/i]\n\t\n\t\n\t*achieve adventure\n\tWhen you step out of the floating egg you are greeted by a legion of ru'ún who place garlands of flowers around your necks. In simple Tsolyáni they welcome you and $!{wave} as soldiers. You bathe in tubs of steaming water that pours endlessly from taps, and feast upon spiced delicacies foreign to your palate. Every need is met, and every question deflected.\n\t\n\tYou look over at your cousin, having the tension massaged from ${wahis} shoulders with fragrant oil by a bronze demon, and wonder aloud, \"Have we stumbled into a dream?\"\n\t\n\t\"If so, I hope we never wake.\" $!{wahe} purrs like a cat; the ru'ún presses down on ${wahis} shoulders.\n\t\n\t*if her_dead = false\n\t\tHalfway back across the world, \n\t\t*if nir_dead = false\n\t\t\tNirún and \n\t\tRayána \n\t\t*if nir_dead = false\n\t\t\tdrag \n\t\t*if nir_dead\n\t\t\tdrags \n\t\tthe black block on its metal pallet through the halls of the ancient station. At the waterfall, the Heréksa, strong as a chlén, uses the rungs of the ladders fused to the shaft as a pulley to laboriously pull it up, inch by inch. Then she yokes herself into a makeshift harness and plods step by step down the ancient hall, as the corroded warriors in the carved reliefs look on.\n\t\t*if (nir_dead = true) and (nir_help = false)\n\t\t\t\n\t\t\tIt's not until she enters the domain of the marashyálu that her luck fails her. No amount of dogged stubbornness or physical strength can prevail against its twisting of the mind. \"Kási?\" she asks, staring at the monster, but seeing something else. \"You came back to help me.\" \n\t\t\t\n\t\t\t\"Yes. Now rest. Rest and sleep and I will keep watch.\" \n\t\t\t\n\t\t\tMind weakened by fatigue, Rayána drops her makeshift rope and falls quickly into slumber. The marashyálu crouches over her, obscuring her body in shadow and bends to feast.\n\t\t\t*set her_dead true\n\t\t\t*goto advent2\n\t\t*else\n\t\t\tAs she walks, \n\t\t\t*if nir_dead\n\t\t\t\tshe holds tight to the amulet, taken from around Nirún's neck, and mutters prayers to Ksárul for deliverance.\n\t\t\t*if nir_dead = false\n\t\t\t\tNirún walks beside her, torch in one hand and amulet in the other. Neither speaks, saving their breath.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tWhen the domain of the marashyálu is entered, it paces outside the light of \n\t\t\t*if nir_dead\n\t\t\t\ther \n\t\t\t*if nir_dead = false\n\t\t\t\ttheir \n\t\t\ttorch, weeping and gnashing teeth, but not getting close to Nirún's amulet.\n\t\t\t*page_break\n\t\t\tDays later, while you lie in pampered elegance, your fellow \n\t\t\t*if nir_dead\n\t\t\t\tsoldier continues \n\t\t\t*if nir_dead = false\n\t\t\t\tsoldiers continue \n\t\t\tthe slow, stumbling path through the Underworld.  Rayána has grown gaunt, and her eyes are glassy, her feet stumbling upon the rubble. \n\t\t\t*if nir_dead = false\n\t\t\t\tNirún now pulls the device with her, like two chlén yoked to a plow, and his blood- and dirt-grimed face bears no resemblance to the erudite kási you knew. \n\t\t\t*comment endif\n\t\t\t\n\t\t\tWhen \n\t\t\t*if nir_dead\n\t\t\t\tshe reaches \n\t\t\t*if nir_dead = false\n\t\t\t\tthey reach \n\t\t\tthe solid ebony door, \n\t\t\t*if battlelost = false\n\t\t\t\t*if nir_dead\n\t\t\t\t\tshe collapses \n\t\t\t\t*if nir_dead = false\n\t\t\t\t\tthey collapse \n\t\t\t\tagainst it and fall into a deep sleep, knowing victory at last. \n\t\t\t\t*if nir_dead\n\t\t\t\t\tShe is \n\t\t\t\t*if nir_dead = false\n\t\t\t\t\tThey are \n\t\t\t\tfound there by the soldiers of the ${legionnum}.\n\t\t\t*if battlelost\n\t\t\t\tit is only another waypoint. Beyond it lies the temple, the undead, and capture, and so Rayána turns her back on the door. There are more days of wandering the shallow Underworld in search of a way up, of criminals who make it their home and can be bribed or threatened for food, but Rayána \n\t\t\t\t*if nir_dead = false\n\t\t\t\t\tand Nirún persevere. \n\t\t\t\t*if nir_dead\n\t\t\t\t\tperseveres. \n\t\t\t*goto advent2\n\t*else\n\t\t*goto advent2\n\n*label advent2\n*page_break\nEven paradise can become wearying. The lights that glow at a touch, the ru'ún servitors, and illusory entertainments pale in their wonder. The lack of another human soul besides $!{wave} grows wearying, and you find yourselves bickering over trivialities. You avoid each other, exploring the wonders of the ancient city alone, then are drawn together by loneliness and animal instinct, until personalities grate and the cycle begins again.\n\nSo, when you find the bones of an ancient noble, dessicated and rotted upon sheets of timeless silk, you have a vision of your fate: of dying in this place after days of sameness, your horizons shrunk down to one city and the ocean that surrounds it. Escape is difficult and takes time. The ru'ún, while unfailingly polite, are firm about your \"not returning to duty without command authorization,\" and cannot be overpowered.\n\nYou gather supplies of water and strange rations sealed within packages of glossy paper. $!{wave} starts a fire that burns black and oily, and you sprint for the floating palanquin, still in its berth, under cover of the distraction.\n*page_break\nIn time you travel to the destinations in six of the windows, finding empty stations sealed like tombs and ruins inhabited by hostile aliens. You have running battles and narrow escapes, and find and lose fortunes.\n\nIn Tsolyánu, \n*if her_dead = false\n\t*if nir_dead = false\n\t\tNirún is presented before $!{Prince} $!{Princename}, Rayána by his side. His aunt looks smugly on as he is awarded lavish gifts and raised to the position of dritlán. She beams when his poem describing the haunted ruins enraptures the $!{Prince}. Later, in private, he tells her of your flight, though he does not meet her eyes.\n\t*comment endif\n\t\n\tRayána is praised for her valor, and adopted into a respectable clan of middling rank for her service. Though given wealth and position, she reports the next morning to \n\t*if battlelost = false\n\t\tDritlán Núromen for duty. Her mentor is eager to hear the story of her adventure under the guise of critiquing it and offering advice. \n\t*if battlelost\n\t\tGeneral $!{General} for duty. \n\t*if legend\n\t\tIn the legion hall she tells tales of Kási $!{Name} ${lineage}, who dueled a demon of Karákan and won, and was spirited away to paradise as a reward.\n\t*comment endif\n\t*achieve commander\n\t\n*if married\n\t$!{Spouse} receives word of your honorable death in the siege of Sangmiré, and reads over the commendation, while Mama Halé's tears rain down upon it.  \n*if married = false\n\tMama Halé weeps tears over the letter announcing your honorable death in the siege of Sangmiré, and the commendation written in the $!{Prince}'s own hand.\nStationed on the border, Dzái reads her missive with markedly more stoicism, but frames the scroll to be hung in her tent, and stares at it as she waits for sleep.\n*page_break\nThe war continues on \n*if her_dead\n\twhile the ancient device lies hidden beneath the earth, sought but not found. \n*if her_dead = false\n\tand the ancient device becomes another weapon, made to serve the needs of soldiers who do not truly understand its purpose. \nSoldiers fight, princes die, and towns are ravaged, but you know nothing of it.\n\nYou exit the conveyance, your home of months, for the last time. You've explored all the windows, and there is no place else to go. The station here has a layout similar to all the others, but it smells of brine and rotting vegetation. As you near the surface, you hear the lapping of waves, and soon find yourself standing upon a shallow island, barely above the surf. The moons hang in the sky, their light making the waves glisten. $!{wave} looks about, takes a deep breath of the fresh air, and smiles. \"No Ssú, no ru'ún, and water deep enough to swim.\" $!{wahe} sprints for the beach with a recklessness you have come to know well on your travels.\n\nWading knee-deep in the surf, examining a large shell, you don't see the woman until she is right before you. Her eyes are lighter than yours, and glow in the night, but her skin is darker and blends into it. Her spear is tipped with a serrated jaw bone, and her armor is of silver fish scales. She smiles at you benignly, and says something in a language you don't understand.\n\nYou will live many years amongst the Nóm, as they call themselves, joining a clan-ship sailed through the vast oceans east of Salarvyá. $!{wave} remains by your side, a sometimes lover and fast friend. Your new family is mercurial and chaotic by Tsolyáni standards, each captain the prince of his ship, or princess as the case may be.  \n*if (ritual > 10) or (psychic > 10)\n\tTheir sorcerers are different as well, devoting their lives to excellence in just one spell, and achieving unheard-of effects by this effort. You learn much from them. \nIn one season your ship fishes and trades, in another you raid, more for coup and glory than for politics.  \n\nIt's a life to which you are well suited, and in time you become a captain in your own right, with your own black-hulled ship and family of sailors.\n*fake_choice\n\t#I become a famous pirate whose name strikes terror into the sailors of the southern sea.\n\t\tFrom horizon to horizon all fear your hull, and kings alternately court you as a privateer and pay you lavish gifts to seek new hunting waters. In time, word of your exploits will even reach home to Tsolyánu.\n\t#I sail into unknown waters, continuing my search for ancient places.\n\t\tYour life is filled with knowledge and adventure, time-traveling wizards, improbable technologies, and haughty demons.\n\t#I live a life of pleasant indolence.\n\t\tYour name is never made famous, and words of your deeds do not return to Tsolyáni shores, but you never regret your decision to trade glory for the joys of a life well-lived under the open sky.\n*goto the_end\n\t\t\n*label audience_end\n*page_break\nIn the weeks after your audience you are given leave. Mama Halé welcomes you back to the clanhouse with open arms, and silver in her hair. She directs slaves to draw you a hot bath, while you read the latest letter from your other mother, Dzái, still out in the field. Her letter is, as always, formal and terse, bordering on stilted, but Father Pi'úr's note, delivered in the same packet, mentions that she has hung your imperial commendation in her command tent where all visitors cannot help but notice it. His congratulations are more direct. \"We're all so proud of you. You've become a fine soldier.\"\n\n*if married = true\n\tYou are also reunited with $!{Spouse}, who welcomes you home \n\t*if spouse != lover\n\t\twarmly. $!{wahe} shows you your new suite in the clanhouse, and talks of the life ${wahe} has made here in the years you were away at war. Though ${wahe} was a newcomer amongst strangers when you left, now $!{Spouse} is firmly enmeshed in the life of the clanhouse, which only makes you more aware of how much you've grown apart from it.\n\t*if spouse = lover\n\t\tpassionately. You stay up late talking about your lives apart these last few years and reading from cherished love letters. $!{wahe} has you laughing at stories of Gayán's continued annoying antics, and somber when ${wahe} speaks of the aging Halé, handing over more and more of her responsibilities to younger hands. The light of the twin moons shines in through the window of your rooms, illuminating ${wahis} soft skin and welcoming smile.\n\t*comment endif\n\t\n\tIn the morning, your twin children greet you with a tentative enthusiasm, hiding behind $!{Spouse} from the larger-than-life soldier who has dominated bedtime stories, and soon you are swept up once more in the life of the clanhouse.\n*if married = false\n\tSoon you are swept up once more in the life of the clanhouse.  Your twin children greet you with a tentative enthusiasm, hiding behind Gayán from the larger-than-life soldier who has dominated bedtime stories.  Your brother winks at you and pulls them forward. \"Don't be so afraid,\" he says to the wide-eyed pair, \"${pche} only eats enemy children.\"\n*comment endif\n\n*if status \u003c 40\n\tStill viewed as a troublemaker destined for a bad end, you are nevertheless catapulted into a position of glory by your audience with the ${Prince}. The elders are not sure how to cope with your confounding of their expectations and unwelcome presence among \n\t*if wav_back\n\t\tthem, though this conundrum is overshadowed by the more embarrassing problem of $!{wave}, reinstated by princely fiat, and prickly as ever. \n\t*if wav_back = false\n\t\tthem. \n*if (status >= 40) and (status \u003c 70)\n\tUnflatteringly, there's surprise from the clan elders at your rise to favored of the $!{Prince}, but they grudgingly make room for you in their deliberations.  Regardless of personal feelings, it's clear your Skein of Destiny is bright and woven from silken threads, and the clan is not blind to the opportunity of using your honors for their gain. \n\t*if wav_back\n\t\tYour clan-cousin $!{wave} is another matter entirely. Reinstated by princely fiat, ${wahe} is avoided and ignored when possible. Far from being put out, ${wahe} takes malicious joy in creating artful awkwardness at every opportunity.\n*if status >= 70\n\tYou return a conquering hero, lit by the reflected glory of the $!{Prince}, and are quickly welcomed into the councils of the clan elders as a respected equal. Your opinions are valued and even solicited, the prestige you bring appreciated. You foresee a bright future for yourself at home, regardless of your future military accomplishments.\n\t*if wav_back\n\t\tThe only disharmony in the clanhouse comes from $!{wave}, reinstated by princely fiat. None are sure what to make of ${wahis} reappearance, and many of your clansmen take their lead from you, the now-acknowledged expert in your strange cousin.\n*page_break\n*if drit_fate\n\tWord comes that Dritlán Núromen \n\t*if clan = \"White Stone\"\n\t\thas been executed after a disastrous meeting with the Princess, who has little patience for those who condescend to her or waste her time. \n\t*if clan = \"Red Sun\"\n\t\thas been dismissed from the Legion of ${legion}. It's a strong message from the Prince that he will not suffer fools among his officers, but drives a wedge between himself and Clan Sea Blue.\n\t*if clan = \"Sea Blue\"\n\t\thas been promoted to a headquarters job, full of ceremony and responsibility, little of it meaningful. He writes you of it himself, full of pride, and not even aware that he has been sidelined.\n\t*comment endif\n*if nir_dead = false\n\tKási Nirún comes to speak with you soon after the audience. In his officer's uniform he has regained his polished and urbane look. \n\t*if feud_end\n\t\tIn private he apologizes and sincerely thanks you for asking the $!{Prince} to intervene in the feud between your families. \"You have extricated me from a distasteful situation, and I am grateful. Even my aunt sees the wisdom of letting this matter drop, though she'd hardly say so publicly.\"\n\t\t*goto visit\n\t*elseif nir_rep \u003c 0\n\t\tBiting off each word, and staring straight ahead, he makes small talk. It is clear the social call is a face-saving gesture, an admission from $!{Nirclan} that you have the upper hand, and blackmail for his behavior beneath the earth, and he hates every minute of it. \n\t\t*choice\n\t\t\t#I remind him that we're scheduled to duel.\n\t\t\t\tThe reminder brings the first smile you have seen to his face.  \n\t\t\t\t\n\t\t\t\tThe next day, the two of you meet on the sand of hirilákte \n\t\t\t\t*if combat > 75\n\t\t\t\t\tarena, where you make him into a buffoon before the onlookers of $!{Hometown}, increasing your prestige at the cost of his pride.\n\t\t\t\t\t*achieve unforgiving\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto raya\n\t\t\t\t*elseif combat > 60\n\t\t\t\t\tarena.  It is a close matter between you, drawing groans and cheers from the stands at each blow, when neither of you refuse to yield.  In the end, when you beat him, you see respect in his eyes.\n\t\t\t\t\t*achieve unforgiving\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto raya\n\t\t\t\t*else \n\t\t\t\t\tarena, where you do your best to defend your honor, but are forced to acknowledge him as the superior swordsman.  As you sit, bleeding in the sand, he offers you his arm.  \"You knew you might lose, and you could have let the matter slide, but you fought me here.  Whatever my family may think, you've earned my respect.\"\n\t\t\t\t\t*set nir_rep 0\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto raya\n\t\t\t#I am magnanimous.\n\t\t\t\tThe meeting is brief and awkward, and he soon leaves, to return to his aunt's legion and whatever fate may bring him. You can tell he fervently hopes your paths will not cross again.\n\t\t\t\t*achieve magnanimous\n\t\t\t\t*page_break\n\t\t\t\t*goto raya\n\t\t\t#I rub his nose in my victory.\n\t\t\t\tWatching him squirm is delicious, but he soon leaves, to return to his aunt's legion and whatever fate may bring him. You can tell he fervently hopes your paths will not cross again.\n\t\t\t\t*page_break\n\t\t\t\t*goto raya\n\t*else\n\t\t*label visit\n\t\t*achieve magnanimous\n\t\tWith slightly stiff politeness he speaks of his own audience with the $!{prince}, and of returning soon to his aunt's legion.  \n\t\t*if (lover != \"Nirún\") and ((nir_rep \u003c3) or ((orientation = \"lesbian\") or (orientation = \"straightm\")))\n\t\t\tYou know that you have made a staunch ally in your fellow Kási, and when he stands to leave he asks that you write \"to tell me of your future endeavors, and if you have need of anything. Those days down beneath the earth…I don't think I'll ever forget them.\"\n\t\t\t*page_break\n\t\t\t*goto raya\n\t\t*else\n\t\t\tHe's halfway through a rather rambling story of a dinner party, and you're wondering where exactly this is going when he leans forward and grips your hands.\n\t\t\t\n\t\t\t\"I was wondering whether you would be interested in getting married? We'd make a good match, and it would help patch things up between our clans, and, well, those days beneath the earth…when I didn't think I'd be getting out alive, I really thought about what I valued—who I valued.\"\n\t\t\t*fake_choice\n\t\t\t\t#I accept his proposal.\n\t\t\t\t\tAt your words he visibly relaxes and, staring into your eyes, recites an Engsvanyáli sonnet.\n\t\t\t\t\t*set marry_nir true\n\t\t\t\t#I let him down easily.\n\t\t\t\t\tYou gingerly extricate your hands from his grip, and without you saying a word he straightens up, changing the subject. By the end of the visit, he's recovered, except for a slight wanness.\n\t\t\t\t#I crush his heart.\n\t\t\t\t\t\"You?\" you say, putting as much disdain as you can into the one word. \"You want me to marry you?  After what you did?\"\n\t\t\t\t\t\n\t\t\t\t\tHe gapes at you like a fish, then visibly pulls his composure around himself and stands to leave. Your echoing laughter follows him down the hall.\n\t\t\t*page_break\n\t\t\t*goto raya\n*else \n\t*label raya\n\t*if her_dead = false\n\t\t*if clan = \"White Stone\"\n\t\t\tRayána, no longer a heréksa, looks stunning in her formal armor of blue and emerald. Her hair has been oiled, her skin perfumed, and the enameled ensemble, complete with jewels, glows. \"I still can't believe Princess Ma'ín made me one of her bodyguards. She talked to me. To me.\" Her voice fades off, and she stands a moment lost in the memory.  \n\t\t*if clan != \"White Stone\"\n\t\t\tRayána looks intimidating in her new kási's armor, a gift from Prince $!{Princename}. She stands up straight and salutes as you approach. \"Otuléngba!\" Her promotion has treated her well, and made her something of a celebrity amongst the lower-status of the soldiers, though many of the other officers wince at her painfully frank plebeian talk and her habit of directing subordinates by shoving them into position.\n\t\tA future of being socially snubbed and subtly mocked stands before her, now elevated above her station in a society unkind to those who don't know their place, but she can't see it, she's so bursting with pride and duty. \n\t\t*page_break\n\t*if ((marry_wav) or (marry_her)) or (marry_nir)\n\t\t*page_break\n\t\t*if marry_wav\n\t\t\t*set marriage_count +1\n\t\t*if marry_nir\n\t\t\t*set marriage_count +1\n\t\t*if marry_her\n\t\t\t*set marriage_count +1\n\t\t*if married\t\n\t\t\t*set marriage_count +1\n\t\tYour wedding is a \"simple\" affair, \n\t\t*if married\n\t\t\tat least compared to the first extravaganza, \n\t\tas both the guests and those being married have military duties to return to. Still, it's as festive an occasion as your clan and the legion can make it, and more appreciated for being a moment of merriment amidst an ever more active war.\n\t\t\n\t\tBefore your family and your fellow officers, the priests unite \n\t\t*if marry_wav\n\t\t\t*achieve sweetheart\n\t\t\t*if marriage_count >1\n\t\t\t\t$!{wave}, \n\t\t\t*if marriage_count \u003c=1\n\t\t\t\t$!{wave} \n\t\t*if (marry_Nir)\n\t\t\t*achieve fraternize\n\t\t\t*if marriage_count \u003c=1\n\t\t\t\tNirún \n\t\t\t*if marriage_count >1\n\t\t\t\tNirún, \n\t\t*if (marry_her)\n\t\t\t*achieve egalitarian\n\t\t\t*if marriage_count \u003c=1\n\t\t\t\tRayána \n\t\t\t*if marriage_count >1\n\t\t\t\tRayána, \n\t\t*if married\n\t\t\t$!{Spouse}, \n\t\tand you in matrimony.\n\t\t*if marry_her\n\t\t\tRáyana spends the entire ceremony terrified \n\t\t\t*if married\n\t\t\t\tboth of $!{Spouse} and \n\t\t\tof making a social blunder, her battlefield courage overcome by high-clan etiquette. She refuses to leave your \n\t\t\t*if (married = false) and (marry_nir = false)\n\t\t\t\tside.\n\t\t\t*if (married) or (marry_nir)\n\t\t\t\tside, all while being painfully deferential to \n\t\t\t\t*if marry_nir\n\t\t\t\t\tNirún, at one point calling him \"Kási,\" eliciting a smile and a murmur of \"I think husband might be more appropriate, Rayána.\" \n\t\t\t\t*if (marry_nir = false)\n\t\t\t\t\t$!{Spouse}, who is alternately amused and sympathetic. \n\t\t*if marry_wav\n\t\t\t\n\t\t\t$!{wave} is in ${wahis} element as the center of attention, even going so far as to embrace Dzái and call her \"Mama\" while your mother audibly grinds her teeth. \n\t\t\t*if marry_her\n\t\t\t\tThis display is enough to break Rayána out of her terror long enough to growl at her fellow spouse, earning her points with her new mother-in-law. You foresee a future full of sparks between your \n\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\ttwo new wives, \n\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\tnew husband and wife, \n\t\t\t\tand a lot of time spent playing peacemaker. \n\t\t\t\t*if married\n\t\t\t\t\t$!{Spouse} gives you a look partway through the after-party, as your clan-cousin is purposefully needling the oblivious Rayána as if to ask, \"What have you gotten me into?\"\n\t\t*if marry_nir\n\t\t\t\n\t\t\tArrayed in his formal legionary parade armor, Nirún's hawk-nosed profile is a stereotype of the Tsolyáni military ideal, as he discourses on poetry and history at the reception. He reclines on cushions, pulling you into his lap, and absently kisses the top of your head while trading bawdy quips with his fellow officers.\n\t\t*comment endif\n\t\t\n\t\tThe soldiers of the Legion of ${legion} and of ${alliedlegion} are drunk on a heady brew of victory, good cheer, and the finest brandy. They joke about the treasures you have brought back from the \n\t\t*if married\n\t\t\tbattlefield, tease $!{Spouse} mercilessly, \n\t\t*if married = false\n\t\t\tbattlefield \n\t\tand speculate on matters ranging from what the $!{Prince}'s wedding present to you will be, to where the next pitched battle will take place. It's a lively night, full of fond memories, but the war is omnipresent, waiting for you to return to it. \n\t\t*if ((marry_wav) and (marry_her)) and (marry_nir)\n\t\t\t*achieve big\n\t\t*page_break\n\t*comment endif\n\t\n\tHopes are high for your future and that of your $!{prince}, but the war continues on, making a muddle of the destinies of those who fight in it.  With pride, you prepare to take your new role as a leading officer in the ${Legionnum}.\n\t*label the_end\n\t\n\tOn a nearby branch of the Tree of Time another you is born into a subtly different world, shaped by a new life and a new destiny, and the story begins again.\n\t*page_break End\n\tWe hope you've enjoyed playing [i]Choice of the Petal Throne.[/i]\n\n\t*feedback\n\n\tChoice of Games releases new games like this one on a regular basis.\n\t*subscribe\n\t*page_break\n\n\tThanks for playing!\n\n\t*delay_ending 7200 $4.99\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set met_her true\n*set met_nir true\n*set married true\n*set wound 2\n*set wav_rep 2\n*set her_rep 2\n*set nir_rep 0\n*set name \"Qárras\"\n\n*set diplomacy 85\n*set combat 50\n*set tactics 70\n*set psychic 1\n*set ritual 1\n*set status 75\n*set wealth 550\n*set noble 40\n\n*set God  \"Vimúhla\"\n*set Godhis \"his\"\n*set Godhe \"he\"\n*set Godhim \"him\"\n*set Lord \"Lord\"\n*set Clan \"Red Sun\"\n*set Lineage  \"hiShanúka\"\n*set PrinceName  \"Mirusíya\"\n*set Prince  \"Prince\"\n*set Legion  \"the Storm of Fire\"\n*set LegionType  \"Medium Infantry\"\n*set LegionNum  \"21st\"\n*set General  \"Kutumé hiTánkolel\"\n*set AlliedGeneral \"Dirúla hiFa’ásu\"\n*set AlliedLegion \"Glorious Destiny\"\n*set nirclan \"Red Moon\"\n\n*set Wave  \"Sáyi\"\n*set Spouse \"A'én\"\n\n\n\"The Lord of the Conflagration demands sacrifice!\" intones the red-robed priest. \"Our beloved, holy Prince Mirusíya will only be safe upon the throne when the disloyal have been scourged from Tsolyánu!\" \n\t\nCheers go up from the assembled soldiery and many of the officers. Kási Nirún, appearing by your side, looks discomfited. \"If the chaplains keep on this way, Sangmiré will be a pyre in another day or two. And what then? When word travels from clanhouse to clanhouse that Prince Mirusíya's troops are putting towns to the torch?\" He spits. \"Damn all fanatics.\"\n*fake_choice\n\t#\"Vimúhla requires this of us. How could we fight the might of Sárku without his blessing?\"\n\t#\"I have my own problems. There will be a lot of money to be made in the chaos.\"\n\t#\"You're right, we need to do something to keep this from getting out of hand.\"\n\t#\"I'd keep those feelings to yourself unless you want to die atop a bonfire.\"\n\t\n*script changeBackgroundColor(\"black\")\n*set Wave  \"Sánjesh\"\n*set lover wave\n*set Spouse \"Bálesh\"\n*set wav_rep 4\n\n*set met_her false\n*set met_nir false\n*set married false\n*set wound 0\n*set name \"Túrisan\"\n\n*set diplomacy 50\n*set combat 60\n*set tactics 60\n*set psychic 75\n*set ritual 1\n*set status 50\n*set wealth 100\n*set noble 65\n\n*set God \"Hrü'ü\"\n*set Godhis \"his\"\n*set Godhe \"he\"\n*set Godhim \"him\"\n*set Lord \"Lord\"\n*set Clan \"Sea Blue\"\n*set Lineage \"hiCháika\" \n*set PrinceName  \"Rereshqála\"\n*set Prince \"Prince\" \n*set Legion  \"the Ruby Hand\"\n*set LegionType  \"Heavy Infantry\"\n*set LegionNum  \"15th\"\n*set General  \"Bushu’un hiSsánmirin\"\n*set AlliedGeneral \"Dijáya hiQurrulúma\"\n*set AlliedLegion \"the Blue Peak\"\n*set nirclan \"Blue Girdle\"\n*set Hometown  \"Jakálla\"\n\nYour intended reached a jittery hand for his wine cup to moisten parched lips. At his touch, it exploded, sending liquid and shards across the room.\n\n\"Oh!\" $!{spouse} scurried to pick up pieces of glass, suffused with emba
