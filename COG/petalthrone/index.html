ter = \"com_count\"\n\t*set combat %+20\n\t*goto second\n*elseif top_counter = \"dip_count\"\n\t*set diplomacy %+20\n\t*goto second\n*elseif top_counter = \"sor_count\"\n\t*setref magic_stat %+20\n\t*goto second\n\t\n*label second\n*if second_counter = \"tac_count\"\n\t*set tactics %+15\n\t*goto end\n*elseif second_counter = \"com_count\"\n\t*set combat %+15\n\t*goto end\n*elseif second_counter = \"dip_count\"\n\t*set diplomacy %+15\n\t*goto end\n*elseif second_counter = \"sor_count\"\n\t*setref magic_stat %+15\n\t*goto end\n*label end\n*finish\n\n*label end_trial\n*temp discount_ends \"Apr 10\"\n*temp time_stamp timestamp(\"${discount_ends}, 2015\")\n*check_purchase adfree\n*if not(choice_is_steam or choice_randomtest) or ((choice_purchased_adfree or (choice_is_omnibus_app or choice_is_web)) or not(choice_purchase_supported))\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort", "adolescence3": "\n*temp dip_count 0 \n*temp tac_count 0\n*temp com_count 0\n*temp sor_count 0\n*if wahe = \"she\"\n\t*set Spouse \"A'én\"\n*if wahe = \"he\"\n\t*set Spouse \"Bálesh\"\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n\"A month!  So little notice they give us before they whisk you away,\" chided Mama Halé as she watched slaves \n*if pche = \"he\"\n\tarrange your güdru-silk kilt, and fashion the gilded pectoral about your neck. \n*if pche = \"she\"\n\tloop and pin your hair braids with gemmed sticks. \n*comment endif\n\n\"It gives us barely enough time for a decent wedding, and with so many young people heading off at once the competition for the best artisans will be fierce.\" An officer of good clan in a city suddenly passionate about matters military, you were a very eligible match. \n\n*if (orientation = \"straightf\") or (orientation = \"straightm\")\n\tThe clan of your intended was pushing for the marriage, arranged when you were five, \n*if (orientation = \"lesbian\") or (orientation = \"gay\")\n\tHaving observed your young romantic interest in $!{wave}, your mothers had decided to replace your childhood arrangement with one to someone of your same gender.  Of course, they never asked your input on either the person or the sex of your betrothed.  Now, the clan of your intended was pushing for the marriage \nto be consummated before the war carried you away.  As such, you found yourself being draped in cloth and weighted down with jewelry (though no headdress, thank $!{lord} $!{god}) in preparation to meet your betrothed. \n*choice\n\t#I was excited to be married.\n\t\tA spouse to live at home and manage clan affairs and children is very useful to a military officer, who, unlike most Tsolyáni, lives a life far from the bonds of clan and yet is no less reliant upon them.  While the dressers busied themselves about you, and Mama Halé extolled the many virtues of marriage, you imagined a tidy apartment to return to, filled with \n\t\t*if (orientation = \"straightf\") or (orientation = \"gay\")\n\t\t\thusbands \n\t\t*if (orientation = \"straightm\") or (orientation = \"lesbian\")\n\t\t\twives \n\t\tand children.  Monogamy is not prized in Tsolyánu, jealousy viewed as a shameful emotion, and it is not uncommon for men and aridáni women to take a second or third husband or wife later of their own \n\t\t*if orientation = \"straightf\"\n\t\t\tchoosing; and though you were unlikely to have children yourself anytime soon, all your sisters' children would be as much yours as those of your own body, with your putative husband serving as a father in your absence from the clanhouse. \n\t\t*if orientation = \"gay\" \n\t\t\tchoosing; and though your marriage would not produce children, all your brothers' offspring would be as much yours as those of your own body, with your putative husband serving as a father in your absence from the clanhouse.  Gayán, who would soon be married as well, had made many jokes promising to work hard to supply you with an ample supply of sons while you were away at war. \n\t\t*if orientation = \"lesbian\"\n\t\t\tchoosing; and though your marriage would not produce children, all your sisters' offspring would be as much yours as those of your own body, with your putative wife serving as a mother as well in your absence from the clanhouse. \n\t\t*if orientation = \"straightm\"\n\t\t\tchoosing. \n\t\tWith a final critical look, and some personal adjustments to the drape of your kilt, Mama Halé gave her misty-eyed approval and escorted you to the sitting room.\n\t\t*goto first_meeting\n\t#I was looking to get out of this.\n\t\tDid you not want to marry at all?\n\t\t*fake_choice\n\t\t\t#I would have liked to marry, just not so soon.\n\t\t\t#I had no interest in marriage.\n\t\tIt is within the legal rights of a man or aridáni woman to reject an arranged marriage, though few can resist the social pressure.  Sensing your reticence, \n\t\t*label resistance\n\t\tMama Halé lectured you on your social duties.  She had the tactical advantage, with you pinned down both figuratively and literally by the dressers' ministrations.\n\t\t\n\t\t\"Do not fret so about this spouse.  You will be away so much you shall barely know one another if you so choose.  It will mean a nicely kept apartment when you return home, and someone to look after children when you are gone, and what else it might mean is between you two.  Dzái and her first husband barely speak outside of formal occasions, but I have been glad of him to act as another father to our children.\"\n\n\t\t*if orientation = \"straightf\"\n\t\t\tThough you were unlikely to have children yourself anytime soon, all your sisters' children would be as much yours as those of your own body, with your putative husband serving as a father in your absence from the clanhouse. \n\t\t*if orientation = \"gay\" \n\t\t\tThough your marriage would not produce children, all your brothers' offspring would be as much yours as those of your own body, with your putative husband serving as a father in your absence from the clanhouse.  Gayán, who would soon be married as well, had made many jokes promising to work hard to supply you with an ample supply of sons while you were away at war.\n\t\t*if orientation = \"lesbian\"\n\t\t\tThough your marriage would not produce children, all your sisters' offspring would be as much yours as those of your own body, with your putative wife serving as a mother as well in your absence from the clanhouse. \n\t\t*comment endif\n\t\t\n\t\tLooking at your skeptical expression, she continued.\n\t\t\n\t\t\"And if later some soldier catches your fancy, well, that is what second marriages are for, or lovers.  Go along smoothly with this, and the clan will be very tolerant of your future choices, but thwart them in this and they'll remember.\"  You suspected her use of \"they\" was rather disingenuous in this context, as Halé was well known to be neck-deep in the social life of the clan.\n\t\t\n\t\tWith a final critical look and some personal adjustments to the drape of your kilt, Mama Halé gave her misty-eyed approval and escorted you to the sitting room.\n\t\t*goto first_meeting\n\t#Marriage I didn't mind; it was the arrangement I objected to.\n\t\tWho would you have rather married?\n\t\t*choice\n\t\t\t*selectable_if (lover= wave) #$!{wave}.\n\t\t\t\t*if Wave_slave = true\n\t\t\t\t\tThough ${wahe} was gone from your waking life, $!{wave} still frequented your dreams, and still held your heart.  But romance has no place in Tsolyáni marriage, and it was unlikely you two would ever meet again, let alone marry.  Thinking these thoughts brought a mournful look to your face, a marked contrast with your crisp, bejeweled appearance.\n\t\t\t\t\t\n\t\t\t\t\tSensing your melancholy mood, but not its source, \n\t\t\t\t\t*goto resistance\n\t\t\t\t*else\n\t\t\t\t\tYou had brought up the idea of marrying $!{wave}, and united both your mothers in their opposition.  Dzái was motivated by a simple distaste for your paramour, while Halé was offended at the idea of casting aside the favorable arrangement she had orchestrated.  Pleas in the name of love or romance fell on deaf ears.  Halé, who had been smitten with her husband from the day they met, was sure all would work out for the best, and Dzái, who could barely stand her first husband but was passionately in love with the second, clearly felt you should take your medicine and do your duty like a good soldier, secure in the promise of future reward.  As jealousy is viewed as a shameful emotion by the Tsolyáni, and monogamy not prized, neither of your mothers could see how your infatuation with your clan-cousin impacted your marriage.\n\t\t\t\t\t\n\t\t\t\t\tNow,  with you pinned down both figuratively and literally by the dressers' ministrations, Mama Halé lectured you on the importance of \n\t\t\t\t\t*if assassination != 3\n\t\t\t\t\t\tstrengthening the bonds of clan kinship across the cities of the Empire, \n\t\t\t\t\t\t*if Clan = \"Red Sun\"\n\t\t\t\t\t\t\tespecially between $!{Hometown} and Úrmish, with their ancient rivalry that made cooperation all but impossible. \n\t\t\t\t\t\t*if Clan != \"Red Sun\"\n\t\t\t\t\t\t\tespecially with Úrmish, whose plentiful grain harvests helped feed the people of $!{hometown}. \n\t\t\t\t\t*if assassination = 3\n\t\t\t\t\t\tincreasing the ties between $!{Clan} and $!{Nirclan}.  \"$!{wahis} father is the Governor of Úrmish!\" she kept repeating.\n\t\t\t\t\t\"War means a shortage of grain, which makes increasing our ties to the breadbasket all the more important!  Do not fret so about this spouse.  You will be away so much you shall barely know one another.  It will mean a nicely kept apartment when you return home, and someone to look after children when you are gone, and no more.\"\n\t\t\t\t\t\n\t\t\t\t\t*if orientation = \"straightf\"\n\t\t\t\t\t\tThough you were unlikely to have children yourself anytime soon, all your sisters' children would be as much yours as those of your own body, with your putative husband serving as a father in your absence from the clanhouse. \n\t\t\t\t\t*if orientation = \"gay\" \n\t\t\t\t\t\tThough your marriage would not produce children, all your brothers' offspring would be as much yours as those of your own body, with your putative husband serving as a father in your absence from the clanhouse.  Gayán, who would soon be married as well, had made many jokes promising to work hard to supply you with an ample supply of sons while you were away at war.\n\t\t\t\t\t*if orientation = \"lesbian\"\n\t\t\t\t\t\tThough your marriage would not produce children, all your sisters' offspring would be as much yours as those of your own body, with your putative wife serving as a mother as well in your absence from the clanhouse.\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tLooking at your skeptical expression, she continued.\n\t\t\t\t\t\n\t\t\t\t\t\"Go along smoothly with this, and the clan will be very tolerant of your future choices, maybe even $!{wave}.  Dzái'd probably have a fit, but between you and me, it does my sister good to not get her way occasionally.  Now there.\" With a final critical look and some personal adjustments to the drape of your kilt, Mama Halé gave her misty-eyed approval and escorted you to the sitting room.\n\t\t\t\t\t*goto first_meeting\n\t\t\t#I hadn't met anyone yet—that was the point.\n\t\t\t\tIt is within the legal rights of a man or aridáni woman to reject an arranged marriage, though few can resist the social pressure.  \n\t\t\t\t\n\t\t\t\tSensing your reticence, \n\t\t\t\t*goto resistance\n*label first_meeting\n*page_break\n*if assassination = 3\n\t*set cousin spouse\n\t$!{Spouse} sat upon a high stack of cushions, picking at the nonexistent lint on ${wahis} perfectly pleated gray kilt.  $!{wahe} was thin and gangly looking, and the fashionable clothes draped upon ${wahis} frame.  $!{wahis} eyes raised to meet yours as you entered, then fell again.  \"Thank you for welcoming me to your clanhouse.  The $!{Nirclan} are honored by this alliance,\" ${wahe} recited woodenly, from memory, before returning to examining the weave of ${wahis} kilt.  \n\t*choice\n\t\t#I saw to my hostly duties, and tried to stimulate conversation.\n\t\t\t*set diplomacy %+10\n\t\t\tWith the aplomb of one brought up in the social milieu of a great city of the Empire, you managed to carry on a one-sided conversation, moving from unanswered questions to amusing anecdotes and wry observations, but the more you spoke, the more nervous $!{Spouse} became.  $!{wahe} reached a jittery hand for ${wahis} wine cup to moisten parched lips. At ${wahis} touch, it exploded, sending liquid and shards across the room.\n\t\t\t*label explosion\n\t\t\t*page_break\n\t\t\t\"Oh!\" $!{spouse} scurried to pick up pieces of glass, suffused with embarrassment.  \"When I am nervous…my pedhétl lashes out.\" You noticed the conspicuous lack of metal jewelry in ${wahis} costume, a sure sign of a practicing sorcerer, and also the spreading spot of blood upon ${wahis} kilt from an errant shard.  When the wound was pointed out, $!{spouse} stared for a moment, then made the fluid dance-like motions of ritual casting.  Lifting ${wahis} kilt, ${wahe} picked the piece of glass, now lying on unblemished flesh, and set it with the other remains of the cup.  \n\t\t\t\n\t\t\t\"Fixing the flesh is simple.  Priests of Thumís can fix books, and those of Ksárul the 'Eyes,' but sadly cups are beyond me.  I suppose one could summon a demon, but, well, the sacrifices involved would make it rather purposeless for a cup.\"\n\t\t\t\n\t\t\tAwkward silence followed this pronouncement, and your intended appeared content to sit in stillness indefinitely.   This was interrupted only when servants entered to supply chumétl, wine, and assorted delicacies.  Their rustling presence provided only a brief interlude, however.\n\t\t\t*goto Spouse3_pt2\n\t\t#I sat quietly as well, having nothing to say.\n\t\t\tIn the quiet you could hear $!{Spouse} breathing, a rapid pattern that spoke of anxiety and nervousness, but which slowed as minutes passed.  Taking a sip of wine, ${wahe} finally spoke in a melancholy voice.  \"Are you being forced too?\"\n\t\t\t\n\t\t\tAwkward silence followed this question, and your intended appeared content to sit in stillness indefinitely.   The scene was interrupted only when servants entered to supply chumétl, more wine, and assorted delicacies.  Their rustling presence provided only a brief interlude, however.\n\t\t\t*label Spouse3_pt2\n\t\t\t*fake_choice\n\t\t\t\t#\"You're not much of one for conversation, are you?\"\n\t\t\t\t#\"I don't bite, you know.\"\n\t\t\t\t#\"I think we got off on the wrong foot.\"\n\t\t\t*comment endif\n\t\t\t\n\t\t\t\"I am sorry.  In the monastery, things are different, and my arcane studies left me little time to socialize.\" $!{wahe} gave a wistful sigh, as if the prospect of long days alone with scrolls were a source of much nostalgia.  \"I was about to attain the Seventh Circle, you know, before my cousin died and my father pushed me forward as a replacement.  Once we wed, I don't suppose they'll let me return.\"  \n\t\t\t\n\t\t\tOnce more, ${wahe} lapsed into silence, idly fingering a medallion of Békh, an aspect of Thumís concerned with theoretical underpinnings of reality.  Then, as if a floodgate had been opened, $!{Spouse} began to prattle on about the monastery and ${wahis} life there as a holy oracle and ascetic.\n\t\t\t\n\t\t\t*if (psychic >10) or (ritual >10)\n\t\t\t\tFrom your own training, you knew that certain sorcerers had this power to commune with the gods, though the gods' minds were said to be as much above a man's in their complexity as a man's was above that of an ant.\n\t\t\t*comment endif\n\n\t\t\t*if (psychic >35) or (ritual >35)\n\t\t\t\tYou also knew that to maintain this state was only possible in a place where the walls of reality were thin, and the life so regulated as to place the self in a state of constant harmony, which is why it was seldom seen outside of monasteries following some obscure aspect or another of a god.  $!{Spouse} was impressed with your grasp of the technical details of ${wahis} Labor of Reverence, and soon began to discourse on mental pattern formation and psycho-spiritual cross-temporal glyph maintenance with a warmth at odds with ${wahis} previous demeanor.\n\t\t\t*page_break\t\n\t\t\tAs the afternoon progressed, and the beleaguered \n\t\t\t*if wahe = \"he\"\n\t\t\t\tex-priest \n\t\t\t*if wahe = \"she\"\n\t\t\t\tex-priestess \n\t\t\tdrank more wine, to which ${wahe} was unaccustomed, a story emerged. It centered on ${wahis} father's ambition to in one stroke make himself central to a new clan alliance, and bring a valuable \n\t\t\t*if wahe = \"she\"\n\t\t\t\tdaughter \n\t\t\t*if wahe = \"he\"\n\t\t\t\tson \n\t\t\tback home, where ${wahis} psychic predictions could be used for profit and advancement within the politics of the empire.  This plot was clear to you, but you had the feeling that $!{spouse}, with ${wahis} eyes fixed on the mysteries of Békh, was too far-sighted to see these machinations.  The effect was like watching a hmá led to the slaughter, bleating and distressed and unsure why.\n\t\t\t\n\t\t\tIt was at that moment that you offered to scuttle the marriage, freeing $!{spouse} to return to ${wahis} solemn contemplations of the infinite.  You did not know then how thwarting this injustice would earn the white-hot hatred of ${wahis} father, and lead to assassins dogging your footsteps, but still there was obvious risk in upsetting the plans of your family, lineage, and clan.  Why did you do it?\n\t\t\t*fake_choice\n\t\t\t\t#Out of piety to the gods.\n\t\t\t\t\tA good reason, and a pious deed, which surely the gods looked upon with favor, though $!{Spouse}'s family would not.\n\t\t\t\t#It served my own ends.\n\t\t\t\t\t$!{Spouse}'s family surmised as much, and resented you for it.  \n\t\t\t\t#For the sake of the knowledge that would be lost.\n\t\t\t\t\tIt was an unorthodox view, shared by few, and certainly opaque to $!{Spouse}'s family, who resented your decision.\n\t\t\t\t#Out of charity.\n\t\t\t\t\tSuch kindness!  $!{Spouse} looked upon you as a savior, but ${wahis} family looked upon you as a villain.\n\t\t\t*set noble %+20\n\t\t\t*set dutiful %-10\n\t\t\t*achieve justice\n\t\t\t*goto Hale\t\n\t\t#How dare ${wahe} insult me so!\n\t\t\t*if (God = \"Hrü'ü\") or (God = \"Vimúhla\")\n\t\t\t\t*set noble %+10\n\t\t\tYou tossed back a cup of wine, seething.  Seeing the flushed heat on your cheeks, $!{Spouse} grew nervous. \"I…thank you again for your hospit—\" ${wahe} was stammering when ${wahis} wine cup exploded, sending liquid and shards across the room.\n\t\t\t*goto explosion\n*else\n\t$!{Spouse} sat upon a high stack of cushions, sipping from a cup of wine.  $!{wahe} looked up as you entered, smiling genially.  \"My heart is glad that you have taken the time from your training to meet me.  Honored Dzái explained how busy you have been soldiering.  \n\t*if wargame_victor = true\n\t\tCongratulations on your recent victory in the qadárni.\n\tI hope that you can find the time to show me $!{hometown}.\"\n\t*choice\n\t\t#\"I would love to.\"\n\t\t\t$!{Spouse} gave a dazzling smile, and proceeded to discuss the great sights ${wahe} wished to \n\t\t\t*if Meet_Prince = true\n\t\t\t\tsee, adding, \"Of course, nothing could compare with seeing $!{Prince} $!{Princename} from afar, or in a litter.  Is it true you met \n\t\t\t\t*if princename = \"Ma'ín\"\n\t\t\t\t\ther glorious self?\"\n\t\t\t\t*if princename != \"Ma'ín\"\n\t\t\t\t\this supernal radiance?\"\n\t\t\t\t*comment endif\n\t\t\t\t*choice\n\t\t\t\t\t#\"It was the defining moment of my life.\"\n\t\t\t\t\t\t*set dutiful %+10\n\t\t\t\t\t\t$!{wahis} rapt attention to your story showed that, even if you had nothing else in common, you shared a respect for the $!{prince} verging on hero worship.  \n\t\t\t\t\t\t*label spouse_love\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe tale served as an icebreaker, and soon ${wahe} was discussing ${wahis} hopes for your marriage: \n\t\t\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\t\t\thim rising to a quiet civil post in the Governor's Palace while you brought glory to the family through military exploits.  \n\t\t\t\t\t\t*if wahe = \"she\"\t\n\t\t\t\t\t\t\ther living the life of the clan, managing your money and affairs, and aiding in the social dance of $!{Hometown} while you brought glory to the family through military exploits.\n\t\t\t\t\t\tThe two of you sharing an apartment, eventually filled with children and maybe other loved ones you brought into your union in the fullness of time.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe afternoon passed in spinning out these domestic fancies, and soon servants were entering to light lamps and offer to let the visitor change before dinner.\n\t\t\t\t\t\t*goto Hale\n\t\t\t\t\t#\"Well, we move in the same circles.\"\n\t\t\t\t\t\t*set dutiful %-10\n\t\t\t\t\t\t\"Truly $!{hometown} is a very different milieu from Úrmish.  You cannot know how much it would mean if you could introduce us, but please, don't let me interrupt.  Tell me every detail!\"\n\t\t\t\t\t\t*goto spouse_love\n\t\t\t\t\t#\"It was more for the legion's honor than my own.\"\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t\tWith a wave of the hand, ${wahe} dismissed this modesty.  \"I am sure \n\t\t\t\t\t\t*if princename = \"Ma'ín\"\n\t\t\t\t\t\t\tshe \n\t\t\t\t\t\t*if princename != \"Ma'ín\"\n\t\t\t\t\t\t\the \n\t\t\t\t\t\tsaw your brilliance and recognized a soldier on the rise, whose loyalty would be worth more than bright steel.  Please, tell me every detail of the meeting.\"\n\t\t\t\t\t\t*goto spouse_love\n\t\t\t*else\n\t\t\t\tsee, including \n\t\t\t\t*if hometown = \"Béy Sü\"\n\t\t\t\t\tthe great bronze chain that stretches across the river below the city.  You told ${wahim} of the followers of Shu'uré, Goddess of Risk Takers, aspect of Dlamélish, who would try to tight-rope across it, after parties, energized by wine and powders, invariably falling into the river below. \n\t\t\t\t\t*goto spouse_love\n\t\t\t\t*elseif hometown = \"Jakálla\"\n\t\t\t\t\tthe giant necropolis where the dead sleep.  You told ${wahim} of the giant sarcophagi and the cemetery keepers who would, for an inducement, guide visitors down into the city beneath, where the undead walked, and of the time $!{wave} had gotten separated from the group, and when found again was mistaken for a ghost, causing much terror.\n\t\t\t\t\t*goto spouse_love\n\t\t\t\t*else\n\t\t\t\t\tthe marotlán arena, since the sport is not much played in Úrmish.  You told ${wahim} of the famous match last year in which three of the four teams allied against the other, which even so managed to win by bribing away players until the factions no longer resembled those the game had begun with.\n\t\t\t\t\t*goto spouse_love\n\t\t#\"Look, this is just a political match.\"\n\t\t\tSome of the brightness faded from ${wahis} eyes.  \"I understand, but if we are going to be yoked to the same plow, we might as well learn to pull in harmony.\" $!{wahe} flushed.  \"I suppose that's a hopelessly rural metaphor to use here in $!{hometown}.\"\n\t\t\t\n\t\t\t*if wahe = \"he\"\n\t\t\t\t$!{Spouse} was soon to begin work in the Governor's Palace, and possessed the soul of a bureaucrat. $!{wahe} began to discuss ${wahis} hopes for the marriage in an orderly way, now devoid of romance: connections and inducement money from your lineage to help him rise in the local civil service to a comfortable rank that still left time for family functions and managing your financial affairs. \n\t\t\t*if wahe = \"she\"\n\t\t\t\t$!{Spouse} was a good clan girl, the child of bureaucrats with the mind of one.  $!{wahe} began to discuss ${wahis} hopes for the marriage in an orderly way, now devoid of romance: a comfortable home, work within the clan that still left time for attending parties, and managing your financial affairs.  \n\t\t\t$!{wahe} described a comfortable partnership of two people who smoothed the way for each other in life, with an understanding that you might bring more people into that union if fate or the tug of your heart strings decreed.\n\t\t\t\n\t\t\tThe afternoon was spent more companionably then you might have expected, and soon servants were entering to light lamps and offer to let the visitor change before dinner.\n\t\t\t*goto Hale\n\t\t#\"I don't plan on going through with this.\"\n\t\t\tSome of the brightness faded from ${wahis} eyes.  \"I see.  You know this puts me in—\" ${wahe} sighed, resignedly, and shrugged.  \"I suppose—then I might as well resolve to enjoy my time here while it lasts.  I would be offended, but having just met, I assume your discontent comes from some other source? \n\t\t\t*if Meet_Prince = true\n\t\t\t\tIs this because you were honored by our glorious $!{prince} $!{princename}?  Does your clan now think to make a higher match based on reflected glory? \n\t\t\tSorry. It is impolite to pry.\"\n\t\t\t\n\t\t\tThe remainder of the afternoon passed in stilted, formal conversation, mostly focused on the weather or local sights, safe topics.  As conversation was growing thin, servants entered to light lamps and offer to let the visitor change before dinner.\n\t\t\t*goto Hale\n*label Hale\n\nLifting the heavy pectoral from your shoulders in the gentle lamplight of your room, Mama Halé was all smiles.  \"What did you think of your suitor?\"\n*choice\n\t*selectable_if (assassination !=3) #\"I think we can be quite happy together.\"\n\t\t*set noble %+10\n\t\t*set dutiful %+10\n\t\tThe smile that split Mama Halé's face lit up the room.  She engulfed you in a hug.  \"Oh, my \n\t\t*if pche = \"he\"\n\t\t\tdarling boy, \n\t\t*if pche = \"she\"\n\t\t\tdear girl, \n\t\twe will make you such a wedding as $!{Hometown} has not seen.  And when you march off to war against the Yán Koryáni I will rest easy knowing you have another tie to pull you back home to us.\"\n\t\t*goto wedding_day\n\t*selectable_if (assassination !=3) #\"I'll do my duty.\"\n\t\t*set noble %+10\n\t\t*set dutiful %+10\n\t\tA proud light came into Mama Halé's eyes.  \"You have grown so much, and I…\" She seemed overwhelmed with emotion, pausing to dab at her eyes, before continuing brusquely, \"The clan will remember and support you. I will see to it.  Money for promotions and gear, or ransom, should it come to that, which I doubt.  Dzái was never captured, and I doubt you will be either.  We $!{Lineage}s are fierce.\" She looked up at you and shook her head, like one who cannot believe the evidence of their eyes.  \"I will make you a wedding to be proud of, and you must promise to come home to me when the Yán Koryáni are put down.\"\n\t\t*goto wedding_day\n\t#\"I'm sorry, but I won't consent to this marriage.\"\n\t\t*set noble %+10\n\t\t*set dutiful %-10\n\t\tMama Halé shook her head ruefully, looking down.  \"That is your right, but it is never wise to upset the clan.  Who will you be coming to when you next need money for a promotion, or ransom for some Yán Koryáni who has captured you in battle?  The same elders whose wisdom you are flouting.\" She threw up her hands.  \"I suppose it's pointless to argue with youth.\"\n\t\t*achieve independent\n\t\t*page_break\n\t\t*if meet_elders = true\n\t\t\tOnce more you \n\t\t*if meet_elders = false\n\t\t\tYou \n\t\tfound yourself standing, the next morning, before the \n\t\t*if meet_elders = true\n\t\t\tclan elders, on their high cushions. \n\t\t*if meet_elders = false\n\t\t\tthe assorted retired molkárs, wizened priests, and fossilized bureaucrats that made up the eldest and highest-status members of Clan $!{Clan} present in $!{Hometown}.\n\t\tThere was much grumbling in your direction and giving of moralizing speeches.\n\n\t\t*if meet_elders = true\n\t\t\tOne old bureaucrat spoke up. \"So, young one, you are here before us again.  It seems to me that you have been a great deal of trouble, making waves by swimming against the current.  Your mother there says you will be off to war soon, and out of our hair, and will come back bringing us riches and honor, and so we should let you speak.\" He paused to place a twist of hnéqu leaf upon his tongue.  \"Well, go on.\"\t\n\t\t*if meet_elders = false\n\t\t\tWhen the speechifying had begun to slow, one old bureaucrat, sleepily chewing on a twist of hnéqu leaf, motioned for you to speak. \n\t\t*comment endif\n\n\t\t*if diplomacy >60\n\t\t\tWith shrewdly chosen words, you spoke of your prospects in the military, and the changing fortunes of soldiers in war.  You pointed out that, as the clan branch in Úrmish wanted this tie between the cities as much as they did, there was no use in spending such a—if you might humbly suggest—potentially valuable prospect on the match.  If they would only give you a chance to prove your worth in battle against the hated Yán Koryáni, you suggested, you would make a name for yourself and return as a valuable blue token in the den-den game played by the matchmakers of $!{Hometown}.\n\t\t\t\n\t\t\tThoughtful silence greeted your well-rehearsed speech, broken by a few chuckles from some of the older members. You were told, with a wave of dismissal, not to worry on the matter, that some suitable cousin would be found to take your place in the upcoming ceremony.  As you turned to go, one elderly priestess snapped, \"But be sure you do come back covered in glory, or you may find the choice of matches remaining even less your liking.\"\n\t\t\t*set status %-10\n\t\t\t*goto off_to_war\n\t\t*else\n\t\t\tIn a respectful tone and with brief honesty, you expressed your gratitude to the clan, but made clear that this arrangement was not something you would go through with.  Some were unimpressed, others surprisingly sympathetic, still others clearly bored by the entire procedure.  One elderly priestess waved dismissively and said, \"At least this one is a soldier, and of use.  Why not grab one of the dozens who lay about till noon, then spend our wealth in wine houses till dawn, and make them serve,\" though all the others seemed rather embarrassed by the remark.  \n\n\t\t\tBy the time you were dismissed it was clear you had escaped the match, but also that you had burned goodwill in doing so, and should not return asking for more favors anytime soon.  You could only hope that, in the years while you were away fighting in Yán Kór, this would all blow over, or dream that your victories there would be so great as to overshadow all youthful transgressions.\n\t\t\t*set status %-20\n\t\t\t*goto off_to_war\n\t#I mumbled polite affirmatives while scheming for a way out.\n\t\t*set noble %-20\n\t\t*set dutiful %-20\n\t\tEven as you listened to Mama Halé's happy chatter about the upcoming nuptials, a plan was forming.  The best way to escape the arrangement would be to convince the other family to call off the match, leaving you playing the role of the brave dejected suitor.  \"…and of course it has been impossible to pick a day with $!{Spouse}'s mother consulting no fewer than five astrologers in terror over inauspicious alignments, the superstitious goose,\" prattled Halé as she removed your finery.\n\t\t*page_break\n\t\tHeréksa Réluen was another youth itching to go to war to escape the grasping restraints of clan life, and immediately sympathetic with your plight.  \"You should have seen the man they had planned for me before I declared myself aridáni and joined the legion!\"   \n\t\t\n\t\tIt was a simple matter to get her added to the endless round of pre-wedding parties.  At one of which, appearing convivially and indiscreetly drunk, she sat on a stack of mats near $!{Spouse}'s parents and siblings, and discoursed at length upon your blue eyes.  You had been marked from birth, this soldier said, with the curse of Lady Avánthe.  Of course, Dzái, knowing no soldier would follow an officer so marked, had paid a sorcerer an exorbitant sum to change their color. \"But did that remove the curse?\" she asked her companion.  \"Or perhaps it just angered the Goddess further?\"  She continued rather extensively in this vein.  \n\n\t\tTwo days later, with no reason given—for who would wish to insult Molkár Dzái's child and be forced into a duel?—the contract was dissolved.  Shámtla was paid in recompense by $!{Spouse}'s family, and your cousins gathered about you to offer condolences.  Gayán especially seemed affronted at the rejection, as if it were he and not you who had been jilted.\n\t\t*achieve independent\n\t\t*if (tactics \u003c60) or (assassination = 3)\n\t\t\tUnfortunately, the story proved too amusing for Réluen to keep to herself, and soon propagated as an amusing party anecdote from mouth to mouth, arriving at the ears of members of Clan \n\t\t\t*if assassination = 3\n\t\t\t\t$!{Nirclan}, who responded somewhat disproportionately.\n\t\t\t*if assassination != 3\n\t\t\t\t$!{Nirclan}.  Not wishing to fan the flames of gossip and be made further fools of, the parents of your ex-betrothed let you settle the matter with a payment of shámtla, calculated to be painful but payable on an officer's salary.\n\t\t\t\t*set wealth -200\n\t\t\t\t*set status %-10\n\t\t*goto off_to_war\n*label Wedding_Day\n*achieve dutiful\n*set married true\n*set status %+10\n*page_break\nThe day of your wedding, chosen after careful analysis of your horoscope and that of your \n*if Wagender = \"female\"\n\tbride, \n*if Wagender = \"male\"\n\tgroom, \nfinally arrived, wintry cold but clear. It seemed every member of $!{Clan} in $!{Hometown} had gathered in the courtyard of your clanhouse for the celebration, beneath banners hand-painted with scripts blessing your union. Your clan-mothers and clan-fathers stood proudly assembled in finery of the Fifteenth Form; slaves supported their massive headdresses with slender poles and fanned them continuously. \n\nIt was agreed in the contract that the happy couple would live in your clanhouse, as Mama Halé firmly insisted that someone had to keep your household while you were away on campaign. A gilded palanquin draped in imported güdru brocade, borne by a dozen slaves and accompanied by a troupe of dancers, drummers, and flautists, carried your\n*if Wagender = \"female\"\n\tbride \n*if Wagender = \"male\"\n\tgroom \ninto the courtyard, where you stood, head and shoulders aching from the weight of your own elaborate plumed headdress. Both families cheered and wept openly as you clasped hands to help ${wahim} down from the palanquin and welcome the newest addition to your family. \n\n$!{Spouse} whispered a soft \"Thank you,\" with smoldering eyes, and squeezed your hand warmly. A deputation from \n*if (gender = \"male\") or (orientation = \"lesbian\")\n\tyour \n*if orientation = \"straightf\"\n\tyour groom's \nclanhouse presented the formal contract of marriage, signed by the elders from both clanhouses and by you and your intended.\n*page_break\nThen began the merry traditions of your city and clan. \n*if Hometown = \"Béy Sü\"\n\tSitting cross-legged on ornately woven mats, \n\t*if (Gender = \"male\") or (orientation = \"lesbian\")\n\t\t$!{Spouse} \n\t*if orientation = \"straightf\"\n\t\tYou \n\tfed \n\t*if (Gender = \"male\") or (orientation = \"lesbian\")\n\t\tyou \n\t*if orientation = \"straightf\"\n\t\t$!{Spouse} \n\troasted and spiced dná grains from a golden plate, and then \n\t*if (Gender = \"male\") or (orientation = \"lesbian\")\n\t\tyou \n\t*if orientation = \"straightf\"\n\t\t$!{Spouse} \n\tdid the same, while your clan elders looked on with pride and tears of joy. Your uncle Visán recited in his clear voice the wedding scene from the Epic of Hrúgga, to much appreciative snapping of fingers.\n*if Hometown = \"Jakálla\"\n\tYour giggling clan-cousins, those who had just passed their name days, sprinkled you and $!{Spouse} with the fragrant yellow pollen and made lascivious gestures suggesting that its fertility-boosting effect should be put to good use at once. They bore you and $!{Spouse} aloft on their shoulders and ran you around the clanhouse while your families shouted blessings on your marriage bed and suggestions on what to do there.\n*if Hometown = \"Butrús\"\n\tYou and $!{Spouse}, garbed all in black, drank the ginger liqueur reserved for weddings from a two-lobed cup, careful not to spill a drop or choke on the fiery stuff. Your proud parents exchanged gifts of foil-embossed red-painted eggs, each more elaborate than the last, in promise of many \n\t*if ((orientation = \"gay\") or (orientation = \"lesbian\"))\n\t\tgrandchildren, while married brothers and sisters made lusty pledges to strive hard to provide you with many clan-sons and -daughters to raise.\n\t*if ((orientation != \"gay\") and (orientation != \"lesbian\"))\n\t\tgrandchildren. \n*comment endif\n\n*if wave_slave = false\n\t*if lover != Wave\n\t\tOnly $!{wave} was out of sorts, still smarting from your breakup.  $!{wahe} tried many times to draw your attention with loud stories or outrageous flirtations, but for tonight you and $!{spouse} only had eyes for each other.\n\t*if lover = Wave\n\t\t$!{wave} was in a particularly ebullient mood, giving a rather ribald toast, that made your family laugh uproariously as $!{Spouse} blushed uncomfortably.  You weren't sure whether you sensed a bit of jealousy in that, and it was true that ${wahis} stories were a bit loud, as if trying to draw your attention, but despite this ${wahe} seemed genuinely happy to see you celebrated.\n*comment endif\n\t\t\nYour cousin Elúsa, a priestess of Avánthe, gave you the customary gift of red dná grain and pure water blessed at the shrine of Sunrudáya, the aspect of Lady Avánthe who blesses marriages; $!{Spouse} offered gracious thanks, and placed the gift between you with a flirtatious smile. Your brother Gayán became very drunk, offering many congratulatory embraces to the happy couple and weeping with joy. After much feasting and sharing of lewd stories, you and $!{Spouse} were escorted by laughing relatives to your own new suite. As married adults, you no longer would sleep in the dormitories, but would have privacy.  \n\nYou were away from the festival air of the wedding celebration, alone with a near-stranger, and $!{Spouse}'s smile slipped a bit, as ${wahe} looked around the fine room.  \"Any regrets?\"\n*fake_choice\n\t#\"None.\"\n\t\t$!{Wahis} smile returned, and you proceeded to enjoy your new home as a married couple.\n\t#\"Some, but I think we're off to a good start.\"\n\t\t$!{Wahis} smile returned, with a sardonic edge.  That's how I feel too.  This is strange, but it's our life now, and I want to make something good from it.\"  Moving to the bed-mat, ${wahe} began to undress, a bit shyly, taking care with the elaborate ritual garb.\n\t\t*if dress\n\t\t\tYou had a sudden powerful memory of $!{wave} and yourself giggling and pulling at formal dress in the dormitory.  This would be a different kind of relationship, fueled more by cooperation than passion, you guessed.\n\t#\"Let's not pretend this is any more than it is.\"\n\t\t$!{Spouse} looked wary, but nodded as ${wahe} began to carefully remove ${wahis} jewelry.  \"I know this isn't what you would have chosen freely, but it's our life now, and we're going to live the rest of it together.\"\n\t\t\n\t\tThe two of you spent a solemn, lonely night together while throughout the clanhouse your family toasted your union.\n*label off_to_war\n*page_break\nThe last time you saw your family in $!{Hometown}, they were assembled in the atrium of your warm, familiar clanhouse. You all believed that the war would be against the Yán Koryáni, the fractious barbarians to the north led by the traitorous Baron Áld.\n\n*if Clan = \"Red Sun\"\n\tYour clan elders smiled hugely, holding burning cones of red paper in honor of the Lord of War so he would know the names of the enemies of the Empire you slew in his name.\n*if Clan != \"Red Sun\"\n\tYour clan elders were grave; each touched your hand or shoulder and asked $!{lord} $!{god} to watch over you and bring you home safe.\nMama Dzái stood fiercely erect, radiating pride, as she struck her fist to her ceremonial breastplate and saluted, one officer to another. \"Otuléngba! All Hail!\" she shouted, and a ragged chorus of your clansmen joined her. \n\nMama Halé, her eyes red from crying, tried—and failed—to give you a carefree smile. Your fathers cradled her in their embrace, making vain comforting noises as she wept into the circle of their arms.  They nodded to you and wished you well, blinking furiously. \n*fake_choice\n\t#I hugged Halé tightly, tears in my own eyes.  \"I'll make you proud.\"\n\t\tAs you pressed her to you, she cried even harder.  Then, coming to herself, she dried her eyes and tugged at the folds of your uniform.  \"Here,\" she sniffed, \"you're creasing it.  I won't have my beautiful soldier looking less than perfect.\"\n\t#Conscious of the dignity of the occasion, I saluted them all crisply.\n\t\tDzái nodded, and another cheer went up from the crowd.  Standing in the morning light, in your new ceremonial armor, you cut quite the dashing figure.\n\t#\"Thank you all for coming to see me off,\" I began, launching into an impromptu speech.\n\t\tYou spoke of duty, and promised to bring honor to your family with your deeds.  It was the speech of a youth who had yet to see battle, full of glory and self-consciousness, but those around you were visibly moved with pride.\n*comment endif\n\nBrother Gayán pressed an amulet into your hand—\"For protection!\"—and grinned. \"Bring me home a dozen pretty slave-girls once you've conquered the North! Not too hairy!\"  At this, one of your elderly aunts piped up \"Just one slave-boy for me would suffice.  I like hairy men!\" causing much laughter and breaking the somber mood.\n\n*if Married = true\n\t$!{Spouse} was the last to embrace you. With a dutiful kiss, ${wahe} whispered, \"Don't listen to them. All I want you to bring back is yourself, safe and sound.\" Louder, ${wahe} added, \"Go forth, brave soldier, and bring back what we all actually want: glory and victory!\"\n\t\n\tWith a final clasp of hands, $!{Spouse} reluctantly let you go, and stepped back into the embrace of your loving family, all waving goodbye.\n\t*if (lover = wave) and (wave_slave = false)\n\t\tAt the rear of the crowd, $!{wave}, your childhood sweetheart, wept bitterly, but ventured a cheer and a wave when ${wahe} saw you searching the crowd for ${wahim}. You could not help but notice how ${wahe} narrowed ${wahis} eyes at $!{Spouse}, and hoped there would be peace between them while you were away.\n\t\t*goto flashforward\n\t*elseif (wave_slave = false)\n\t\tAt the rear of the crowd, $!{wave}, your former love, glared with open resentment at $!{Spouse}, but faked a cheer and a wave when ${wahe} caught your eye. You feared there would be no peace between them until $!{wave} left the clanhouse for a career or marriage far away.\n\t\t*goto flashforward\n\t*else\n\t\tConspicuously missing from the well-wishers was your childhood sweetheart, $!{wave}; you could not help but feel a pang of regret at the sad fate that had befallen ${wahim}.\n\t\t*goto flashforward\n*else\n\t*if (wave_slave = false) and (lover = Wave)\n\t\t$!{wave} was the last to embrace you. With a passionate kiss, ${wahe} whispered, \"Return to me!\" and smiled through tears.\n\t\t*goto flashforward\n\t*elseif (wave_slave = false)\n\t\tAt the rear of the crowd, $!{wave}, your former love, glared at the proceedings, but faked a cheer and a wave when ${wahe} caught your eye.  \n\t\t*goto flashforward\n\t*else\n\t\tConspicuously missing from the well-wishers was your childhood sweetheart, $!{wave}; you could not help but feel a pang of regret at the sad fate that had befallen ${wahim}.\n\t\t*goto flashforward\n\n*label flashforward\n*page_break\n[b]Interlude: Battle Years[/b]\n\n[i]2360 to 2365 A.S.[/i]\n\nNow, a decade later, you sit in your palanquin, facing battle against your own countrymen in a siege against a Tsolyáni city. The northern enemy you set out to fight has become the ally of the official government, while the legions of the Empire have been divided between princes and princesses, each vying to be the one to defeat their usurping brother and crown themselves. \n*if clan = \"White Stone\"\n\tPrincess Ma'ín, with the backing of the temples of Avánthe and Dlamélish, and the love of the common people, hopes to ally herself with the worthiest of her brothers to end the deadlock and form a power bloc that could crush the others.\n*if clan = \"Sea Blue\"\n\tFrom seaside Jakálla, Prince Rereshqála has declared himself the protector of the South, keeping the Usurper's soldiers at bay, and maintaining peace and prosperity within his territory, but loudly proclaiming a disinterest in becoming Emperor.\n*if clan = \"Red Sun\"\n\tPrince Mirusíya, with the backing of the military party, leads from the field, sure that it is victory in war against his brother that will decide the next Emperor.\n*comment endif\n\n*page_break\nYou remember being on your first solo assignment as a new kási, your tsurúm pushing through the mountains of Yán Kór, clearing a pass for the main army to follow, exhausted in the thin air and low on supplies, when a breathless runner from the body of the main legion brought word of the old Emperor's death at the hands of his youngest son.  The last cask of spirits was broken and the soldiers sat around thin smoky fires to drink to his memory, singing sad songs in the clear, cold desert night.  \n\nA week later, the official messenger arrived from Price Dhich'uné, now titled Emperor Eternal Splendor, declaring peace with Yán Kór and recalling all units of the ${Legionnum} to $!{Hometown}.  The spindly man, bedecked in the copper of Sárku, delivered the proclamation with an air of command.\n*fake_choice\n\t#I was a soldier.  I followed my orders.\n\t\tAmidst the grumbling of your tsurúm, you retreated back through the pass, giving up ground it had taken you a month and many lives to secure.\n\t\t*if clan = \"Red Sun\"\n\t\t\t*set noble %+15\n\t\t*if (god = \"Avánthe\") or (god = \"Hnálla\")\n\t\t\t*set noble %+10\n\t\t*if (god = \"Dlamélish\") or (god = \"Hrú'ü\")\n\t\t\t*set noble %-10\t\n\t#I sent him on his way with empty promises, then held position until I heard from General $!{General}.\n\t\tThe messenger eyed you suspiciously.  It was clear he did not believe, but, surrounded by four hundred soldiers, had little choice other than to pretend that he did.  He soon scuttled off upon his route.\n\t\t*if (god = \"Dlamélish\") or (god = \"Hrú'ü\")\n\t\t\t*set noble %+15\n\t\t*if (god != \"Dlamélish\") and (god != \"Hrú'ü\")\n\t\t\t*set noble %-10\t\n\t#I told him I did not recognize his authority.\n\t\tThe messenger puffed up indignantly at your words. \"Your Emperor commands this of you,\" he said, as if you might not have understood.\n\t\t\n\t\t\"He's no emperor of mine,\" you retorted.\n\t\t\n\t\tThe messenger looked to your Heréksa, urging them to mutiny, implying the tsurúm would be decimated when word of your mutiny reached Avanthár, but they only returned blank looks.  As the silence grew, so too did his awareness of being surrounded by numerous hostile, well-armed veterans, and he soon scuttled off upon his route.\n\t\t*if change = false\n\t\t\t*set noble %+10\n\t\t*if change = true\n\t\t\t*set noble %-10\n\t#I killed the traitorous messenger.\n\t\tNone raised a hand in his defense as you cut him down, possibly the first casualty of the civil war, dead at your hand.  It was simple to drop his body in a desolate ravine where only carrion birds would find it, and none of your soldiers ever spoke of the matter again.\n\t\t*if change = false\n\t\t\t*set noble %-10\n\t\t*if change = true\n\t\t\t*set noble %+10\n\t\t*if god = \"Vimúhla\"\n\t\t\t*set noble %+10\n*comment endif\n\nGeneral $!{General} met you in the lowlands with the entire strength of the army.  \"Orders have come in from $!{Prince} $!{Princename}.  We're to march toward $!{Hometown} as slowly and indirectly as possible, flying the ${prince}'s banners the whole way.  It's a stall.  All of the princes know this road leads to war, but none want to draw first blood.\" He snorted, showing what he thought of that.\n*page_break\nA year later you were skirmishing with the false emperor's soldiers over grain fields under the direction of Núromen, now promoted to dritlán, less for competence than for the value of his family connections.  Word came of the birth of twins to \n*if (orientation = \"straightm\") and (married)\n\tyour wife, $!{Spouse}: \n*if (orientation = \"gay\") or ((gender = \"male\") and(married = false))\n\tGayán's wife: \n*if (gender = \"female\")\n\tyour sister Palu'él: \ntwo strong girls whose birth cries woke the clanhouse.  \"Mama Halé named them Thunder and Lightning.  She says it's so Lord Karakán will favor them in this time of war, but we all know it's because they're going to keep us up all night and destroy everything in their path.\"\n*choice\n\t#I asked to leave to visit my new children.\n\t\tDritlán Núromen looked pained at your request, as if his lunch had not sat well with him.  \"Kási, the family feeling does you credit, but I need you here until the harvest.  You're a soldier, not a nursemaid, and I can't have you traveling across the Empire with every birth.\" With that, your request was denied, and he moved smoothly on to questioning your plans for the next week and suggesting his own refinements.\n\t\t\n\t\tYou were left writing a letter and enclosing a gift in lieu of visiting.\n\t\t*goto baby_gift\n\t#I sent a letter and gifts.\n\t\tYou added congratulations to your regular update on life at the front.  \n\t\t*label baby_gift\n\t\tWhat did you send?\n\t\t*fake_choice\n\t\t\t#A pair of stuffed chlén beasts, dressed in blue doll clothes.\n\t\t\t\tA very cuddly and appropriate gift, for which Mama Hále would be forced to sew many outfits in years to come.\n\t\t\t\t*set wealth -5\n\t\t\t#A war drum taken off a dead Yán Koryáni soldier.\n\t\t\t\tThe twins hardly took notice of the blood stain, and would spend hours banging on it without end.  It was much appreciated by your children, but Mama Halé wrote you a stern note on \"appropriate gifts.\"\n\t\t\t\t*set status %-1\n\t\t\t#Matching silver anklets bearing blue glass beads, symbols of protection.\n\t\t\t\tThe globes bear the name of Chraikála, She Who Protects Children, and the priestess of Avánthe laid a blessing upon them before selling them to you.\n\t\t\t\t*set wealth -10\n\t\t\t#A faded and battle-worn standard of the Legion of ${legion}, to hang on the wall of their room.\n\t\t\t\tThis beloved artifact still hangs in their room this day, featured prominently in many bedtime stories.\n\t\t*goto seasons\n\t#I didn't care much for babies.  \n\t\tDespite your lack of interest, they continued to feature prominently in your letters from home.\n\t\t*if married = true\n\t\t\tYou began to suspect that $!{Spouse}'s mind had come unhinged, so obsessed was ${wahe} with documenting the minutiae of their feeble achievements.\n\t\t*goto seasons\n*label seasons\n*page_break\nSeasons turned, alliances shifted, allies became enemies, or enemies allies, and the only constant was war.  Your tsurúm grew from fresh-faced adolescents to scarred veterans, and when friends died, as many did, and new boys or girls were sent to fill their places, you shook your head in wonder at their youth and naïveté. The most youthful and naive of all was little Rayána, Dritlán Núromen's batman, drafted despite her low birth in a time when anyone who could hold a sword and a shield was welcome in the lines.  She'd grown into a giant of a girl, putting on muscle and height at an alarming rate, and was always hungry in those lean years. No one was more devoted to the Legion of ${legion}'s honor than the cobbler's daughter who felt honored merely to march in its ranks. \n\nYou led your soldiers through dry deserts and pestilential swamps, learning more of warfare in five years of constant battle than you could have in decades of peacetime.   Then, in the summer of 2365, you traveled along the road to Sangmiré.\n*finish Back in the Present", "battle": "*temp drit_happy false\n*temp reprimand false \n*temp morale 0\n*temp Signaler_present false\n*temp NirunTalk false\n*set met_nir true\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n[b]Chapter 3: The Battle of Sangmiré[/b]\n\n[i]Sangmiré, Summer of 2365 A.S.[/i]\n\n\nSangmiré has been under siege by your forces throughout all of a hot and dusty summer. With supply lines cut and a large civilian populace trapped inside, the defending general, Sikún hiKhanúma, of the Legion of Scales of Brown, has decided to throw the dice and take to the field of battle before his troops are too weak from hunger and disease to lift their weapons.  This morning a messenger from him arrived, and terms of the coming battle were spelled out.  \n\nNow you join the other officers in a sumptuously appointed tent to discuss strategy. $!{AlliedGeneral} of the Legion of ${alliedlegion}, is surrounded by her dritlán and kási, including one \n*if assassination != 4\n\tfamiliar \n*if assassination = 4\n\tlean, scholarly \nlooking noble who keeps casting glances in your direction.  Though many have joked that your General, $!{General}, and $!{AlliedGeneral} must be twins, because of the closeness of their friendship, you have only met her a handful of times, and on those occasions felt awkward in her presence, sure of some hostility on her part.\n\nShe lays out a plan to employ the \"Two Mighty Gauntlets of Hrúgga,\" a formation in which two small but powerful units wait upon the flanks of the main battle in order to take advantage of enemy weaknesses during the fight.  The Legion of ${legion} will be divided in half under the direction of its two dritlán to fulfill this key role.  As a kási, you will direct your tsurúm of four hundred soldiers, as part of the Right Gauntlet, under Dritlán Núromen. \n*page_break\nAs the officers digest this news and begin to whisper amongst themselves, the kási of the Legion of ${alliedlegion} stands.  \"General, when facing this formation, most enemies will try to drive a wedge between the body and one of the gauntlets.  You need solid men there, who will not give ground.  I'd like to volunteer my tsurúm to stand beside the Right Gauntlet.\" He looks down halfway through this speech, aware of making a spectacle of himself, though most of the senior officers snap and the other kási look like they wish they'd thought of volunteering first.\n\n$!{AlliedGeneral} smiles maternally, a look you have never seen before on her face.  \"Of course, Nirún, you know I can't deny my favorite nephew.  Though, you yourself will stay upon the platform and relay orders from there.  Your soldiers I will risk, you I will not.\"  \n*if assassination != 4\n\tThe name and the voice take you instantly back to the brawl of your youth, and you recognize the face.  He has grown leaner in the intervening years, looking more like a scholar than a soldier.\n*comment endif\n\n$!{General} turns to you and politely inquires where you feel you will do the most good in support of your tsurúm.\n*temp Location\n*choice\n\t#I should fight in the thick of it beside my soldiers, where glory is greatest.\n\t\tThe younger of the officers are suitably impressed by your martial bravado, including Nirún, who looks a bit wistful, but Núromen sniffs disapprovingly from his high padded seat. \n\t\t*set Location 1\n\t\t*set loc1 true\n\t\t\n\t\t\"'A soldier on the ground is a pair of blind hands; an officer on the platform is his eyes,'\" he quotes to the nods of the older and more senior officers.  Over his shoulder just inside the lamplight you can make out one of the signalers—waiting patiently lest you need to send a message—roll ${wahis} eyes at the pontification.\n\t\t*fake_choice\n\t\t\t#I won't suffer such an open critique.\n\t\t\t\t*if Clan = \"Red Sun\"\n\t\t\t\t\t*set noble %+10\n\t\t\t\t*if Clan = \"Sea Blue\"\n\t\t\t\t\t*set noble %-10\n\t\t\t\t\"Not all of us fear to get our hands bloody or prefer to watch while others do the fighting and the dying,\" you growl.  Núromen puffs up, but does not rise to the challenge, and with a quelling look $!{General} barks out \"Save it for the enemy, Kási! There will be plenty of blood shed tomorrow; I don't need any in here tonight.\"\n\t\t\t\t*set drit_hostile true\n\t\t\t\t*achieve insubordinate\n\t\t\t#I return ${wahis} eye-roll and chuckle at the pomposity of my \"superior.\"\n\t\t\t\t*set noble %-10\n\t\t\t\t$!{wahe} coughs to conceal a fit of laughter at your mockery as the conversation flows on to the minutiae of the battle and its preparations.  Nirún's glances become annoyed glares at your frivolity, and though the Dritlán pretends not to notice, his face begins to purple.\n\t\t\t#Finally, a chance to debate the wisdom of the ancient strategists!\t\n\t\t\t\t*set Nir_rep +1\n\t\t\t\t*if God = \"Hnálla\"\n\t\t\t\t\t*set noble %+10\n\t\t\t\t\"'To fight in a battle is to feel its pulse and cadence, allowing for instant action at the moment of crisis,'\" you retort, quoting a famous Vimúhla-worshipping general of the First Imperium.\n\t\t\t\t\n\t\t\t\t\"A rather outdated view, surely, Kási…,\" opines $!{General}, but he seems more intrigued than censorious.  \n\t\t\t\t\n\t\t\t\t\"One doesn't have to reach back twenty thousand years,\" interjects Nirún with approval. \"General Kéttukal made extensive use of kási on the ground defending against the Salarvyáni invasion, and that was just a generation ago.\"\n\t\t\t\t\n\t\t\t\tHis aunt smiles and murmurs, \"Hardly a generation. I fought in that war….\"\n\t\t\t\t\n\t\t\t\tSoon a lively debate is sparked.\n\t\t*goto outside_tent\n\t#I should relay orders from the safety of the platform, where my view of the battlefield will aid me in making sound tactical decisions.\n\t\t*set Location 2\n\t\t*set loc2 true\n\t\tThe older officers nod appreciation of your wise decision.  \"'A soldier on the ground is a pair of blind hands, an officer on the platform is his eyes,'\" Núromen intones, though none take much notice.  Over his shoulder just inside the lamplight you can make out one of the signalers—waiting patiently lest you need to send a message—roll ${wahis} eyes at the speech, to the amusement of some of the younger officers.\n\t\t*fake_choice\n\t\t\t#I return ${wahis} eye-roll.\n\t\t\t\t*set noble %-10\n\t\t\t\t$!{wahe} coughs to conceal a fit of laughter as the conversation flows on to the minutiae of the battle and its preparations.  Nirún's glances become annoyed glares at your frivolity.\n\t\t\t#I publicly reprimand ${wahim} for disparaging a superior officer.\n\t\t\t\tThough your rebuke stills the Signaler, some of the other officers are visibly stifling amusement at the awkward scene.  Núromen pretends not to notice or understand, but his face shifts to a reddish hue.\n\t\t\t\t*If (God = \"Hnálla\") or (God = \"Karakán\")\n\t\t\t\t\t*set noble %+10\n\t\t\t\t*set reprimand true\n\t\t\t#I do not wish to make a scene, but I make note to chastise ${wahim}.\n\t\t\t\tYour silent glare promises a talk on the subject of respecting the chain of command.  At it the Signaler stops ${wahis} pantomime and looks down, deflated.\n\t\t\t\t*set reprimand true\n\t\t*goto outside_tent\n\t*selectable_if ((Psychic >10)or (ritual >10)) #I should seize one of the gates using spells in a surprise attack.\n\t\t\t*if God=\"Hrü'ü\"\n\t\t\t\t*set Noble %+10\n\t\t\t*if God != \"Hrü'ü\"\n\t\t\t\t*set Noble %-10\n\t\t\t*set Location 3\n\t\t\t*set loc3 true\n\t\t\tSilence greets this suggestion, and many of the more proper officers, Núromen among them, immediately begin to protest the dishonor of subterfuge upon the battlefield. By contrast, $!{AlliedGeneral} and Nirún both look thoughtful.  \n\t\t\t\n\t\t\t\"We can take the Scales of Brown in a fair fight,\" one of your fellow kási shouts. \"We don't need to steal from behind their backs.\"\n\t\t\t\n\t\t\t\"Surely it demeans the honor of our legion, and brands us cowards, to rely upon such duplicity,\" Núromen opines, bestowing an approving nod on the kási. Over his shoulder just inside the lamplight you can make out one of the signalers—waiting patiently lest you need to send a message—roll ${wahis} eyes at this sentiment.\n\t\t\t*fake_choice\n\t\t\t\t#I shall not suffer such an open critique from a fool.\n\t\t\t\t\t\"Any man who calls me a coward had best be ready to back up those words with a sword,\" you growl.  Núromen puffs up, but does not rise to the challenge, and with a quelling look $!{General} barks out \"Save it for the enemy, kási! There will be plenty of blood shed tomorrow; I don't need any in here tonight.\"\n\t\t\t\t\t*set drit_hostile true\n\t\t\t\t\t*achieve insubordinate\n\t\t\t\t#I return ${wahis} eye-roll and chuckle at the pomposity of my \"superior.\"\n\t\t\t\t\t$!{wahe} coughs to conceal a fit of laughter at your mockery.  Nirún's glances become annoyed glares at your frivolity, and though the Dritlán pretends not to notice, his face purples a bit.\n\t\t\t\t\t*achieve insubordinate\n\t\t\t\t\t*set drit_hostile true\n\t\t\t\t#There is nothing to be gained by publicly arguing with or mocking my superior.\n\t\t\t\t\tWith stoic dignity you stand, gaze fixed as arguments and counter-arguments fill the tent.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tOver the tumult, you see the two generals make eye contact and $!{AlliedGeneral} nods.\n\t\t\t\n\t\t\t*if God= \"Hrü'ü\"\n\t\t\t\t\"It is true that the Lord of Confusion commands us to seek for the unseen and the subtle ways by which structures may be crumbled.  To take the city whether or not the battle is won assures victory.  We \n\t\t\t*if God != \"Hrü'ü\"\n\t\t\t\t\"We \n\t\t\tmust remember that we do not fight here only for our personal honor, but for the glory of the rightful ruler of Tsolyánu.  This city \n\t\t\t*if Princename != \"Ma'ín\"\n\t\t\t\the \n\t\t\t*if Princename = \"Ma'ín\"\n\t\t\t\tshe \n\t\t\twants, and we will deliver it to \n\t\t\t*if Princename != \"Ma'ín\"\n\t\t\t\thim. \n\t\t\t*if Princename = \"Ma'ín\"\n\t\t\t\ther. \n\t\t\tI cannot ignore a ploy that may better our chances.\"\n\t\t\t\t\n\t\t\tAt her words, maps are brought out and the distance of the magical dampening field created by the sorcerous contingents calculated. It's decided that, if the opening lines are pulled back to lure the enemy sorcerers from the city, you could launch an attack on a small gate on the far side, and make it nearly halfway to the main gate before the dampening effect covers you.  Another tsurúm is found to take the place of yours in the Right Gauntlet, and your plan is put into motion.\n\t\t\t*label outside_tent\n\n\t\t\tThe meeting is breaking up when Kási Nirún ventures a discreet cough.  At his aunt's wave and call to \"Spit it out, kási,\" he speaks.  \n\t\t\t\n\t\t\t\"I've studied the maps, and Sangmiré is…valueless.  Their grain stores are depleted; none of their clans make armaments.  They don't control any sákbe roads.  We're about to fight one of the so-called-emperor's top legions over…a dust speck.  Why are they here?  Why are we here?\"  His voice is tight with frustration at thwarted intellectualism.\n\t\t\t\n\t\t\t\"Your nephew is tactically astute,\" Dritlán Núromen says to $!{AlliedGeneral}, who ignores the flattery.  \"There is nothing obvious in Sangmiré that the classical masters would tell us to value,\" he lectures Nirún, \"but those same masters council faith in one's superiors when the strategy is not clear.\" By the smugness radiating off him, you would guess that whatever the secret is, he's in on it.\n\t\t\t*page_break\n\t\t\tAt the end of this night's preparations, as you head for your bedroll, the Signaler from the tent steps from a shadow, placing a light hand upon your arm. \n\t\t\t*if loc3\n\t\t\t\t\"Sir, I would like to accompany you to take the gate.\"\n\t\t\t$!{wahis} eyes reflect the lamplight as ${wahe} looks up, and you step back.  Up close you recognize the face, though ${wahe} has grown and changed—as you have—in the past years.  You last saw $!{wave} \n\t\t\t*if wahe = \"he\"\n\t\t\t\ta boy, \n\t\t\t\t*if wave_slave\n\t\t\t\t\tled from the clanhouse in chains. \n\t\t\t\t*if wave_slave = false\n\t\t\t\t\twaving from the wall of the clanhouse as you marched to war. \n\t\t\t\tNow you find him a man grown, standing before you slim and strong, \n\t\t\t*if wahe = \"she\"\n\t\t\t\ta girl, \n\t\t\t\t*if wave_slave\n\t\t\t\t\tled from the clanhouse in chains. \n\t\t\t\t*if wave_slave = false\n\t\t\t\t\twaving from the wall of the clanhouse as you marched to war. \n\t\t\t\tNow you find her a woman grown, standing before you slim and strong, \n\t\t\tin the uniform of your legion, but with the same irresponsible grin upon ${wahis} face as ${wahe} takes evident delight in your confusion. \n\t\t\t*temp tone \"sardonic\"\n\t\t\t*choice\n\t\t\t\t#\"$!{wave}! What are you doing here?\"\n\t\t\t\t\t*if location  = 3\n\t\t\t\t\t\t*goto wavconvo2\n\t\t\t\t\t*else\n\t\t\t\t\t\t$!{wave} glances down at ${wahis} nails evasively.  \"What, you're the only one who can follow in the family tradition?  After so many battles, the dear old legion has begun to relax its recruiting standards a \n\t\t\t\t\t\t*if wave_slave\n\t\t\t\t\t\t\tbit. I'm being given a second chance,\" \n\t\t\t\t\t\t*if wave_slave = false\n\t\t\t\t\t\t\tbit,\" \n\t\t\t\t\t\t${wahe} says. \n\t\t\t\t\t\t*goto wavconvo3\n\t\t\t\t#\"Oh sweet $!{lord} $!{god}, not you!\"\n\t\t\t\t\t*set tone \"acid\"\n\t\t\t\t\t*goto wavconvo2\n\t\t\t\t#\"I have missed you so much these long years….\"\n\t\t\t\t\t*if location = 3\n\t\t\t\t\t\t*set tone \"warm\"\n\t\t\t\t\t\t*goto wavconvo2\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"I have too.  Didn't you notice I've been making eyes at you all evening?  When I saw who I'd been transferred under, I couldn't wait to come find you.\" $!{wahe} glances at the tent.  \"I'm afraid I didn't make the best impression on our Dritlán.  Let's get out of here before he comes out and finds some new chore for me to do.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs ${wahe} says this, $!{wave} produces a bottle of fine brandy from behind ${wahis} back, proffering it invitingly. The two of you return to your tent.\n\t\t\t\t\t\t*goto wavbed\n\t\t\t\t*if wave_slave\n\t\t\t\t\t#\"But…how did you become free?\"\n\t\t\t\t\t\t\"Thought you were rid of me?\" ${wahe} quips.  \"It's been years of war and your legion is scraping the bottom of the barrel, I'm afraid.  Call this a second chance.  I'd love to bore you with tales of my years of drudgery,\" ${wahe} says sardonically.\n\t\t\t\t\t\t*goto wavconvo3\n\t\t\t*label wavconvo2\n\t\t\t\n\t\t\t$!{wave} glances down at ${wahis} nails evasively.\n\t\t\t\n\t\t\t\"I am glad to see you too, tsámmeri,\" ${wahe} quips \n\t\t\t*if tone = \"acid\"\n\t\t\t\tin an acidic tone.\n\t\t\t\t*goto wavconvo3\n\t\t\t*elseif (lover = wave) or (tone = \"warm\")\n\t\t\t\tin a voice full of warmth.\n\t\t\t\t*goto wavconvo3\n\t\t\t*else\n\t\t\t\tsardonically.\n\t\t\t\t*goto wavconvo3\n\t\t\t*label wavconvo3\n\t\t\t\"But here and now, perhaps we should keep matters professionally formal?  I see our Dritlán giving us the eye.  Charming fellow that he is, he'd probably dock my pay for chatting while on duty.  I wouldn't have come out, but, well, when I saw who I'd been transferred under, I couldn't help myself.  \n\t\t\t*if location !=3\n\t\t\t\tAnd I'm supposed to give you my official transfer papers.\" $!{wave} hands you a scroll bound with the General's seal.  As you move to inspect them, ${wahe} turns in response to a call, and with a mumbled apology disappears into the night, leaving you as abruptly as ${wahe} appeared.\n\t\t\t\t*goto opening\n\t\t\t*else\n\t\t\t\tAnd I do want to help take that gate, it's a good plan.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"I need my Signaler helping to coordinate the actions of the rest of the tsurúm in my absence.\"\n\t\t\t\t\t\t$!{wahe} seems frustrated, but nods in acceptance of your decision, and quickly excuses ${wahim}self on a pretext.\n\t\t\t\t\t\t*set Signaler_present false\n\t\t\t\t\t\t*goto Opening\n\t\t\t\t\t#\"Are you kidding? Your behavior has been disgraceful!\"\n\t\t\t\t\t\t${wahe} steps back at the vehemence in your tone, and seems almost about to argue.  With you.  $!{wahis} superior in rank.  Truly this war has begun to unravel the very fabric of society and decency.  Luckily for ${wahim}, ${wahe} thinks better of protestation, and walks away.\n\t\t\t\t\t\t*set Signaler_present false\n\t\t\t\t\t\t*goto Opening\n\t\t\t\t\t#\"Yes, you may be useful in signaling that the gate has been taken.\"\n\t\t\t\t\t\t$!{wahis} enthusiastic grin at the good news is quickly masked and replaced with a businesslike nod.  \"Thank you, sir.  We can talk more, after the battle.\"\n\t\t\t\t\t\t*set Signaler_present true\n\t\t\t\t\t\t*goto Opening\n\t\t\t\t\t#\"You could certainly accompany me to my bed….\"\n\t\t\t\t\t\tIt is not uncommon for superiors to abuse their rank to extort bribes, monetary or sexual, from their subordinates.  $!{wahe} does not seem taken aback, but asks, \"And if I had a prior commitment…?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Then I don't believe I'll be in need of your services tomorrow, either.\"\n\t\t\t\t\t\t\t\t$!{wave}'s smile remains fixed, but you fancy you see disdain in ${wahis} eyes as ${wahe} replies, \"In that case, I would be honored…sir.\"\n\t\t\t\t\t\t\t\t*set Signaler_present true\n\t\t\t\t\t\t\t\t*goto Opening\n\t\t\t\t\t\t\t#\"Wait. No. I didn't mean to imply…\"\n\t\t\t\t\t\t\t\t*if lover = Wave\n\t\t\t\t\t\t\t\t\t$!{wahe} laughs at your embarrassment.  \"Didn't you notice I've been making eyes at you all evening? I hate to dine and sleep alone the night before a battle.\" \n\t\t\t\t\t\t\t\t\t*label wavbed\n\n\t\t\t\t\t\t\t\t\tThe evening is full of laughter over old times and the renewing of bonds.\n\t\t\t\t\t\t\t\t\t*if wave_slave\n\t\t\t\t\t\t\t\t\t\t$!{wave} avoids discussing how ${wahe} escaped slavery to attain even a low rank in a legion as prestigious as yours, and you don't want to spoil the mood by pressing. \n\t\t\t\t\t\t\t\t\t*if wave_slave = false\n\t\t\t\t\t\t\t\t\t\tThe two of you share news of the clanhouse, though it appears $!{wave} has been gone for years, traveling and then training for ${wahis} unexpected career change. \n\t\t\t\t\t\t\t\t\t\"I don't know, with the way things are going, I just woke up one morning and had had enough of idleness.  Stories will be written about these battles, and I'd like to be a part of that.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tThe two of you toast to victory, and tumble into bed.  \n\t\t\t\t\t\t\t\t\t*if dress\n\t\t\t\t\t\t\t\t\t\tArmor is much easier to remove than formal dress.\n\t\t\t\t\t\t\t\t\t*set Signaler_present true\n\t\t\t\t\t\t\t\t\t*goto Opening\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"Good.  We're not in the clanhouse anymore, and we're not children.  I'll see you at dawn.\"\n\t\t\t\t\t\t\t\t\t*set Signaler_present true\n\t\t\t\t\t\t\t\t\t*goto Opening\n*label Opening\n*page_break\nThe hot midday sun is beating down as the two armies line up to face each other outside the walls of Sangmiré.  Brightly colored khéshchal plumes wave above helmets and on large banner standards.  As the drums beat out a steady rhythm and the trumpets blare orders, the soldiers in both armies are whipped into a frenzy of anticipation.  \n*if Location = 1\n\t*achieve soldier\n\tYour soldiers turn and look to you for guidance.  Some are fearful young recruits fresh from the rural villages, trying to mask terror with bravado.  Others are long-time comrades in arms.  \n\t*choice\n\t\t#Speak to them of the glories of war.\n\t\t\tYou regale your troops with promises of victory, the plunder of a city, and eternal life in the songs that will be written of this day.  With every word their hunger for battle grows. Your newest heréksa, the recently promoted young Rayána, nods along, eyes wide.\n\t\t\t*set morale +1\n\t\t\t*goto challenge\n\t\t#Speak to them of their duty to ${Prince} $!{Princename}.\n\t\t\tYou remind your troops of the rightness of their cause, and that they fight and die in service to the Imperium.  Their faces take on a determined cast, and you know they will not let you or ${Prince} $!{Princename} down.  Your newest heréksa, the recently promoted young Rayána, grips her sword tighter.\n\t\t\t*set her_rep +1\n\t\t\t*if diplomacy >55\n\t\t\t\t*set morale +1\n\t\t\t*if diplomacy \u003c45\n\t\t\t\t*set morale -1\n\t\t\t*goto challenge\n\t\t#Speak to them of the wonders that await in $!{lord} $!{god}'s heaven.\n\t\t\tYou remind your troops not to fear death, that if they fall today, they will awaken in the paradise of $!{lord} $!{god}.  Your newest heréksa, the recently promoted young Rayána, seems almost to be in a state of spiritual ecstasy by the end of the speech, ready to toss aside life in pursuit of glory.\n\t\t\t*set her_rep +1\n\t\t\t*if diplomacy >60\n\t\t\t\t*set morale +1\n\t\t\t*if diplomacy \u003c50\n\t\t\t\t*set morale -1\n\t\t\t*goto challenge\n\t\t#I am not one for fancy speeches.\n\t\t\t*if diplomacy >65\n\t\t\t\t*set morale +1\n\t\t\t*goto challenge\n*elseif Location = 2\n\t*achieve platform\n\tYou can see your newest heréksa, the recently promoted Rayána, speaking words of encouragement to the others. She is brave as a zrné beast, but not yet as deadly, and eager to prove herself despite her low birth.\n\t*goto challenge\n*else\n\t*achieve infiltrator\n\tThese noises, and their attendant rush of excitement, seem far away as your group closes in on the small gate that is your goal, but you know the sense of calm is an illusion.  Only a single káreng of one hundred soldiers travels with you, composed of the steadiest and most veteran of your legionnaires, led by young Heréksa Rayána, newly promoted.  Though she was not your first choice for this mission, a recent show of bravery upon the field made her plea to be included hard to rebuff.  It also left your more senior heréksa to direct the rest of the tsurúm in your absence.  Rayána's jittery enthusiasm is a stark contrast to the stoic, business-like air of the other handpicked troops.\n\t*choice\n\t\t#A sharp reprimand will bring this puppy to heel.\n\t\t\tThe puppy metaphor is an apt one.  She takes your public rebuff as a dog would take a kick: with a shame and eagerness to please almost embarrassing to watch, but it does the job and she falls quietly in line, the signs of her excitement more subdued.\n\t\t\t*set her_rep -1\n\t\t\t*goto melee\n\t\t#I pull her aside for some steadying words.\n\t\t\tWhat words would those be?\n\t\t\t*choice\n\t\t\t\t#I inquire into the cause of her nervousness.\n\t\t\t\t\t\"Well, sir…this is not the sort of fight I am used to.  I have studied duels, and I can stand my ground against a charge, but magic and stealth…\"\n\t\t\t\t\t\n\t\t\t\t\t\"You find it ignoble.\"\n\t\t\t\t\t\n\t\t\t\t\tA slight hesitation hangs in the air, and her eyes fall. \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#How dare she question my honor!\n\t\t\t\t\t\t\tWith tones and pronouns usually reserved for a low-clan servant you respond,  \"The only ignobility I see here is a green soldier insulting her superiors and risking the lives of her fellows through a lack of self-control.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWithout another word said, she salutes, fixes a somewhat blank gaze straight ahead, and rejoins ranks.\n\t\t\t\t\t\t\t*set her_rep -1\n\t\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t\t\t*goto melee\n\t\t\t\t\t\t#Honor is found in victory.\n\t\t\t\t\t\t\t\"The glory today will go to the victors.  If we few capture a city that has been under siege for months, cracking an egg that two armies could not, we shall become immortal in poems, lavished with rewards, and exalted in the eyes of our superiors.  That is true nobility.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThough Rayána still seems conflicted over her personal qualms, she is moved by the promise of the spoils of victory, and with a curt nod, rejoins the ranks.\n\t\t\t\t\t\t\t*goto melee\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#There are bigger issues at stake than her nobility.\n\t\t\t\t\t\t\tWith patience you explain, \"Our duty to our illustrious ${Prince} and to all of Tsolyánu requires that we take this city.  While we march, a traitor defiles the Petal Throne.  On our actions here today hang the fate of an empire, and to shirk that responsibility is the only ignobility.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAt first Rayána seems about to retort, but she closes her mouth and pensively rejoins the ranks.  She spends the rest of the march mulling over your words.\n\t\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\t\t*goto melee\n\t\t\t\t#I compliment her courage.\n\t\t\t\t\t\"Heréksa, I have seen you bleed like a spitted hmá and still stand to defend our standard.  You have nothing to fear in this small sortie.\"\n\t\t\t\t\t\n\t\t\t\t\tShe flushes at the compliment and mumbles an unintelligible response before saying, \"You're right, sir.  I do myself dishonor to act this way.  It won't happen again.\"\n\t\t\t\t\t*goto melee\n\t\t\t\t#I remind her that our mission hinges on quiet and surprise.\n\t\t\t\t\tShe seems chagrined by the need to be reminded, and aghast at the prospect of compromising the mission upon which all hopes are placed.  Though her nervousness remains, she takes a few steadying breaths and, knuckles white upon her weapons, advances in silence.\n\t\t\t\t\t*goto melee\n\t\t#The first taste of combat will steady her nerves.\n\t\t\t*goto melee\n\n*label challenge\n*page_break\nA mighty warrior breaks away from the enemy line.  He raises his weapons in the air and begins calling out imprecations against ${Prince} $!{Princename}, the Legion of ${legion}, the general hygiene of your soldiers, and the unfaithfulness of their sisters.  “Will no one step forward to battle me?  Or are the soldiers of the ${Legionnum} truly cowards and weaklings?”\n*if Location = 1\n\t*choice\n\t\t#\"How dare he say such things about my beloved legion?\"\n\t\t\t*set her_rep +1\n\t\t\t*achieve honor\n\t\t\tYou leap forward, a snarl on your face, to defend the honor of the Legion of ${legion}.  Seeing you approach, the challenger's ugly mouth splits into a grin and he charges to engage you as your soldiers cheer.\n\t\t\t*if combat > 75\n\t\t\t\tYou meet with a slam between the two armies.  He's strong as a chlén, but no match for your prowess with the sword.  You quickly dispatch this loudmouth with a blow to his ribs, and he falls bleeding at your feet.\n\t\t\t\t*set morale +1\n\t\t\t\t*goto duelwon\n\t\t\t*elseif combat > 55\n\t\t\t\tYou meet with a slam between the two armies.  He's strong as a chlén, and the battle is hard-fought beneath the sun.  You're nearing exhaustion when you see an opening, make your strike, and look down to see him bleeding at your feet.\n\t\t\t\t*set morale +1\n\t\t\t\t*set wound +1\n\t\t\t\t*label duelwon\n\t\t\t\t\n\t\t\t\tYour four hundred legionnaires let forth a deafening roar of sound, and only discipline keeps them in ranks and prevents them from charging the enemy line at this very moment. \n\t\t\t\t*choice\n\t\t\t\t\t#I call for a physician so he can b
