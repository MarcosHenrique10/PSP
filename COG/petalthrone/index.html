rrassment.  \"When I am nervous…my pedhétl lashes out.\" You noticed the conspicuous lack of metal jewelry in his costume, a sure sign of a practicing sorcerer, and also the spreading spot of blood upon his kilt from an errant shard.  When the wound was pointed out, $!{spouse} stared for a moment, then made the fluid dance-like motions of ritual casting.  Lifting his kilt, he picked the piece of glass, now lying on unblemished flesh, and set it with the other remains of the cup.  \n\t\t\t\n\"Fixing the flesh is simple.  Priests of Thumís can fix books, and those of Ksárul the 'Eyes,' but sadly cups are beyond me.  I suppose one could summon a demon, but, well, the sacrifices involved would make it rather purposeless for a cup.\"\n\t\t\t\nAwkward silence followed this pronouncement.\n*fake_choice\n\t#\"You're not much of one for conversation, are you?\"\n\t#\"I don't bite, you know.\"\n\t#\"I think we got off on the wrong foot.\"\n*script changeBackgroundColor(\"sepia\")\n*set met_her true\n*set met_nir true\n*set married false\n*set wound 1\n*set wav_rep 0\n*set her_rep 3\n*set nir_rep -2\n*set name \"Chentsúni\"\t\n\t\n*set diplomacy 70\n*set combat 90\n*set tactics 60\n*set psychic 1\n*set ritual 1\n*set status 60\n*set wealth 200\n*set noble 80\n\t\n*set God  \"Avánthe\"\n*set Godhis \"her\"\n*set Godhe \"she\"\n*set Godhim \"her\"\n*set Lord \"Lady\"\n*set Clan \"White Stone\"\n*set Lineage \"hiChákkena\"\n*set PrinceName \"Ma'ín\"\n*set Prince \"Princess\"\n*set Legion \"Káikama of Bey Sü\"\n*set LegionType \"Medium Infantry\"\n*set LegionNum  \"36th\"\n*set General \"Káikama hiMrachiyáku\"\n*set AlliedGeneral \"Dirúla hiVriyén\"\n*set AlliedLegion \"the Translucent Emerald\"\n*set nirclan \"Green Kirtle\"\n*set Hometown  \"Béy Sü\"\n\n*set Wave  \"Sáyi\"\n*set lover \"Rayána\"\nOne torch has burned down, and the backup gives only a faint flickering light, but even in the dimness you can tell the passages have changed. The brick vaults are now adorned by mosaics and crenelation. In one vast room the ceiling is supported by ranks of elaborately carved columns, proceeding off into the darkness. \n\nKási Nirún steps up to one and runs his fingers reverently along it. \"Engsvanyáli! It must be, look at the capital and the seamlessness of the column itself. We still live in the shadow of their greatness. What do you think this room was before the worm priests came to squat in its ruins?\"\n\nHe beckons for the torch and moves it closer to the column to fully illuminate the detail. In doing so, he reveals a shining pair of eyes on a haggard face that comes lurching out of the darkness.  Nirún, intent on the beauty before him, doesn't notice the monstrous shédra until it is sinking its rotted teeth into his shoulder. The Kási lets out a scream of pain and terror.\n*fake_choice\n\t#I move to save him from the undead.\t\n\t#I flee!\n\nIt is clear the battle would soon become a mere test of brute force were it not for the disadvantageous position of the enemy, who are being slowly pushed back into the sharp embrace of your allies.  The opposing officers, seeing that your tsurúm will not be easily overrun, and realizing their danger of becoming overcommitted and flanked, pull their unit back.  Your mettle has been tested, and found equal to the task.\n\n*set met_her true\n*set met_nir true\n*set married true\n*set wound 0\n*set wav_rep -2\n*set her_rep 1\n*set nir_rep 1\n*set name \"Visháya\"\n\n*set diplomacy 50\n*set combat 70\n*set tactics 80\n*set psychic 1\n*set ritual 1\n*set status 78\n*set wealth 320\n*set noble 73\n\n*set God  \"Karakán\"\n*set Godhis \"his\"\n*set Godhe \"he\"\n*set Godhim \"him\"\n*set Lord \"Lord\"\n*set Clan \"Red Sun\"\n*set Lineage  \"hiBosúga\"\n*set PrinceName  \"Mirusíya\"\n*set Prince  \"Prince\"\n*set Legion  \"the Storm of Fire\"\n*set LegionType  \"Medium Infantry\"\n*set LegionNum  \"21st\"\n*set General  \"Kutumé hiTánkolel\"\n*set AlliedGeneral \"Dirúla hiFa’ásu\"\n*set AlliedLegion \"Glorious Destiny\"\n*set nirclan \"Red Moon\"\n*set Hometown  \"Butrús\"\n\n*set Wave  \"Sáyi\"\n*set Spouse \"A'én\"\n*set lover \"Nirún\"\nYou are given barely a moment to catch your breath, drink water, and dress lines before more signals arrive from the Dritlán, ordering an advance.  It seems that Dritlán Núromen will not allow these enemies to retreat without hounding them all the way. Like dogs baying at a hunt, the soldiers of your tsurúm rush forward at the sound of trumpets, ready to fall upon their quarry. And like the hunted jakkóhl, the soldiers retreat before your tsurúm; their formations grow ragged and are broken up.\n\nA strange signal is beaten out upon the opposing drums, and with an eerie unity the dispersed soldiers coalesce to array themselves in a crescent circle around you.  A fancy trick, but with their losses in the feint their line is spread thin.  \n*fake_choice\n\t#I form my soldiers into a wedge to punch through their line.\n\t#I form my soldiers into a defensive square.\n\t#I order a retreat back to our own lines.\n\n\n", "startup": "*title Choice of the Petal Throne\n*author Danielle Goudeau\n*scene_list\n\tstartup\n\ttemple\n\tchildhood\n\tadolescence\n\tadolescence2\n\tadolescence3\n\tbattle\n\tbattlelost\n\tbattlewon\n\tunderground\n\tepilogues\n\n*comment $s from adolescence3\n\n*create change false\n*create gov_suicide false\n*create met_her false\n*create met_nir false\n*create assassination 1\n*create marriage_count 0\n*create marry_wav false\n*create marry_her false\n*create marry_nir false\n*create fate \"mystery\"\n*create gender \"mystery\"\n*create pche \"mystery\"\n*create pchis \"mystery\"\n*create pchim \"mystery\"\n*create god \"mystery\"\n*create lord \"mystery\"\n*create godhe \"mystery\"\n*create godhis \"mystery\"\n*create godhim \"mystery\"\n*create clan \"mystery\"\n*create lineage \"mystery\"\n*create legion \"mystery\"\n*create princename \"mystery\"\n*create prince \"mystery\"\n*create legiontype \"mystery\"\n*create legionnum \"mystery\"\n*create general \"mystery\"\n*create alliedgeneral \"mystery\"\n*create alliedlegion \"mystery\"\n*create saveallies false\n*create hometown \"mystery\"\n*create orientation \"mystery\"\n*create wahe \"mystery\"\n*create wahis \"mystery\"\n*create wahim \"mystery\"\n*create wagender \"mystery\"\n*create waman \"mystery\"\n*create wave \"Wave\"\n*create name \"Tiúni\"\n*create cousin \"Unknown\"\n*create nirclan \"mystery\"\n*create villain \"mystery\"\n*create vilhe  \"mystery\"\n*create vilhis  \"mystery\"\n*create vilhim  \"mystery\"\n*create lover \"none\"\n*create lov_rep \"spouse_rep\"\n*create spouse_rep 0\n*create lov_he  \"mystery\"\n*create lov_him  \"mystery\"\n*create lov_his  \"mystery\"\n*create steel false\n*create battlelost false\n*create evidence false\n*create nir_wound 0\n*create nir_dead false\n*create loudmouth_captured false\n*create loudmouth_sacrifice false\n*create drit_hostile false\n*create nir_help false\n*create courtmarshal false\n*create convicted false\n*create her_captured false\n*create her_dead false\n*create her_abandon false\n*create meet_elders false\n*create wave_slave false\n*create wagod \"mystery\"\n*create wargame_victor false\n*create meet_prince false\n*create platform_fight false\n*create spouse \"mystery\"\n*create married false\n*create nirbribe false\n*create staff false\n*create legend false\n*create loc1 false\n*create loc2 false\n*create loc3 false\n*create wound 0\n*create wav_rep 1\n*create her_rep 0\n*create nir_rep 0\n*create noble 50\n*create dutiful 50\n*create diplomacy 40\n*create combat 30\n*create tactics 30\n*create psychic 1\n*create ritual 1\n*create wealth 200\n*create status 25\n*create dress false\n\n*achievement duelist visible 10 Noted Duelist\n\tFight a duel.\n\tKilled your opponent in a duel.\n*achievement notice visible 10 Beneath Your Notice\n\tPay shámtla to settle a murder.\n\tNirún's clan has sought vengeance for a murder you barely remember.\n*achievement justice visible 10 Champion of Justice\n\tRefuse an unjust marriage.\n\tScuttled an unjust marriage.\n*achievement regret visible 10 Regret\n\tMake a big mistake.\n*achievement blessed visible 15 Blessed by the Goddess\n\tRomance priests of Dlámelish.\n*achievement save visible 30 A Friend in Need\n\tHelp a family member out of hot water.\n\tSaved Wave from a life of slavery.\n*achievement shem visible 10 Family First\n\tHelp a family member in need.\n\tSaved Shém from the executioner's stake.\n*achievement family visible\t15 Loyal to the Clan\n\tComplete both Family First achievements.\n*achievement bitter visible 20 Bitter Heart\n\tFail a lover.\n\tHatred has festered in Wave's heart after being sold into slavery.\n*achievement heir visible 20 Honored by the Heir.\n\tHave an audience with your imperial heir.\n*achievement command visible 20 In Command\n\tProve yourself able to lead soldiers.\n\tPrevented a riot through strong leadership.\n*achievement honor visible 15 Defender of the Legion.\n\tChallenge any who insult the honor of your legion.\n*achievement dutiful visible 10 Dutiful Child\n\tHonor your arranged marriage.\n*achievement independent visible 10 Independent Minded\n\tEscape your arranged marriage.\n*achievement platform visible 20 Tactician\n\tFight upon the officers' platform at Sangmiré.\n*achievement soldier visible 20 Soldier\n\tFight in the line at Sangmiré.\n*achievement infiltrator visible 20 Infiltrator\n\tTake Sangmiré by subterfuge.\n*achievement ally visible 20 Good Ally\n\tProve a strong ally in battle.\n\tSaved the soldiers of Nirún's tsurúm.\n*achievement insubordinate visible 10 Insubordinate\n\tAnger your superior.\n*achievement persecuted visible 10 Unjustly Persecuted\n\tGet court-martialed.\n\tWon the battle at the expense of your position.\n*achievement hero visible 30 Hero of Sangmiré\n\tWin the battle of Sangmiré.\n*achievement defeat visible\t20 Victory from Defeat\n\tLose the battle at Sangmiré.\n\tDespite losing the battle, you survived to fight on.\n*achievement silver visible 15 Silver Tongued\n\tTalk your way out of imprisonment.\n\tEscaped from Sárku's dungeon through persuasion.\n*achievement rescue visible 20 Unlikely Rescue\n\tGet help from an unexpected source.\n\tWave has saved you with a mysterious device.\n*achievement death visible 30 Defeater of Death\n\tResurrect a companion.\n\tBrought Rayána back to life at great personal cost.\n*achievement admirable visible 30 Admirable\n\tInspire great loyalty.\n\tNirún saved you from the marashyálu.\n*achievement pious visible 15 Pious\n\tGive a great sacrifice to a god or goddess.\n*achievement legend visible 20 Legendary\n\tFight a legendary monster in single combat.\n\tDefeated a ru'ún in a duel, and forced it to submit.\n*achievement scholar visible 20 Scholar\n\tLearn of the past and the Tree of Time.\n\tThe ru'ún explained the nature of reality and the purpose of the artifact to you.\n*achievement avanthar visible 30 Avánthar\n\tVisit the capital.\n\tDefected to Prince Dhich'uné's side.\n*achievement adventure visible 30 Globe-Trotter\n\tSee the world.\n\tTurned your back on war to start a new life.\n*achievement home visible 30 Conquering Hero\n\tReturn home victorious.\n*achievement getgirl visible 20 Reunion\n\tBring your family safe through war.\n\tBrought Wave home.\n*achievement die visible 15 Die\n\tPerish in service to your heir.\n*achievement noble visible 10 Heaven\n\tRest in the heaven of your god or goddess.\n*achievement ignoble visible 10 Hell\n\tBe banished to the hell of your god or goddess.\n*achievement commander visible 20 Good Commander\n\tKeep Heréksa Rayána alive.\n*achievement killwave visible 20 Not to Be Crossed\n\tTake an eye for an eye.\n\tMet Wave's treachery with death.\n*achievement unforgiving visible 20 Unforgiving\n\tTake an eye for an eye.\n\tSaw Nirún dead for challenging you.\n*achievement magnanimous visible 15 Magnanimous\n\tTurn the other cheek.\n\tForgave Nirún for carrying out his family's vendetta.\n*achievement sweetheart visible 20 Childhood Sweetheart\n\tMarry your clan-cousin, Wave.\n*achievement egalitarian visible 20 Egalitarian\n\tMarry your second-in-command, Rayána, despite her low birth.\n*achievement fraternize visible 20 Love During War.\n\tMarry your fellow kási, Nirún.\n*achievement big visible 30 Big Heart\n\tMarry Wave, Rayána, and Nirún.\n\t\n*temp discount_ends \"Apr 17\"\n*temp time_stamp timestamp(\"${discount_ends}, 2015\")\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tIn the Empire of the Petal Throne™, will you find glory, or a knife in your back?\n\n\t[i]Choice of the Petal Throne[/i] is a 124,000-word interactive fantasy novel by Danielle Goudeau, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tM.A.R. Barker's world of Tékumel™ is a fantasy universe like no other, where South American, Middle Eastern, and Indian cultures collide. The princes and princesses of the Tsolyáni empire vie for their father's mystical Petal Throne, tearing the nation apart with civil war and political intrigues.\n\n\tAs a captain in one of their armies, will you play as male or female, gay straight or bi? A brave and forthright soldier, a hedonistic intriguer with a heart of gold, or scheming double agent?\n\n\t*if choice_is_steam\n\t\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t\t*if choice_is_advertising_supported\n\t\t\t*page_break_advertisement\n\t\t*if not(choice_is_advertising_supported)\n\t\t\t*page_break Play Now for Free\n\n\t\t*goto purchased\n\t*else\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Choice of the Petal Throne[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\n\t\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t\t\t*page_break_advertisement\n\n\t\t\t*goto purchased\n\t\t*else\n\t\t\t[i]You can play the game for free, with 2 hour breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n\t\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n\t\t\t*page_break Play Now for Free\n\n*label purchased\n\nThis game takes place in the world of Tékumel™, created by Professor M.A.R. Barker.  The setting draws inspiration from historical cultures of South America and the Indian subcontinent.  Though not well known, it is rich and detailed, with multiple countries, published languages, and history spanning millennia.\n\nFor more information, visit\n*link http://www.tekumel.com/\n\n*page_break\n\nIn spring 2022, it came to light that M.A.R. Barker, the late creator of the Tékumel universe, wrote antisemitic work under a pseudonym. When [i]Choice of the Petal Throne[/i] was published in 2015, neither the author nor Choice of Games was aware of this writing by Barker, or of his antisemitic views more generally. \n\nWe at Choice of Games condemn antisemitism in all forms. \n\nAll revenue from “Choice of the Petal Throne” from the beginning of 2022 onward will be donated to Jewish Family Services of the East Bay, to their \n*link https://jfcs-eastbay.org/holocaust-survivor-services/ Holocaust Survivor Services\nprogram.\n\nFor more information, see our \n*link https://www.choiceofgames.com/?p=6994 blog post\nhere.\n\n*finish On a Branch of the Tree of Time…\n", "temple": "\n*set nir_rep -1\n\n[b]Prologue: Sacrifice[/b]\n\n[i]A Roadside Shrine Outside Sangmiré, Summer of 2365 A.S.[/i]\n\n\nOutside the sky is mercilessly bright, and the hot air full of all the varied sounds of an army ready to march, but inside this small shrine are coolness, darkness, and solitude.  And peace, which is a rare and precious thing to find in these years since the Usurper placed himself upon Tsolyánu's Petal Throne, igniting a civil war.\n\nBefore you stands a statue of your god, presiding over an altar on which other legionnaires have placed offerings.  There are ten gods in Tsolyánu: five who champion the cause of unchanging Stability, and five who wish to bring about endless Change.  All are permitted their temples and honored on their holy days, but you and your family, like most Tsolyáni, have a particular patron deity.  Whose face do you look into?\n*choice\n\t#Lord Hnálla, the Illumination of All the World and the Supreme Principle of Stability.\n\t\tThe hiMaródla lineage of the most aristocratic Sea Blue clan has worshiped Lord Hnálla since the ancient days of the Empire of the Gods—the most noble of gods for the most noble of families.  Lord Hnálla calls upon his worshippers to fulfill their place in society with dignity and to strive industriously against Change and decay, both in a spiritual sense and in the physical world.  Kneeling before a statue of his twelfth aspect: Baján Ke'ún, \"Guardian of the Imperium and Patron of the Armies,\" you scatter a handful of fresh white blossoms and flawless quartz crystals upon the altar.\n\t\t*set wealth +100\n\t\t*set Dutiful %+20\n\t\t*set God  \"Hnálla\"\n\t\t*set Godhis \"his\"\n\t\t*set Godhe \"he\"\n\t\t*set Godhim \"him\"\n\t\t*set Lord \"Lord\"\n\t\t*set Clan  \"Sea Blue\"\n\t\t*set Lineage  \"hiMaródla\" \n\t\t*set PrinceName  \"Rereshqála\"\n\t\t*set Prince  \"Prince\" \n\t\t*set Legion  \"the Ruby Hand\"\n\t\t*set LegionType  \"Heavy Infantry\"\n\t\t*set LegionNum  \"15th\"\n\t\t*set General  \"Bushu’un hiSsánmirin\"\n\t\t*set AlliedGeneral \"Dijáya hiQurrulúma\"\n\t\t*set AlliedLegion \"the Blue Peak\"\n\t\t*set nirclan \"Blue Girdle\"\n\t\t*set Hometown  \"Jakálla\"\n\t\t*goto pray\n\t#Lord Karakán, Lord of Glorious War and the High General of Stability.\n\t\tThe hiBosúga lineage are a minority of Karakán worshippers within the largely Vimúhla-centric Red Sun clan.   This can sometimes create friction, but often the temples of the two war gods see politically eye-to-eye despite differing philosophies.   Karakán asks his soldiers to be brave, but also just and restrained, as they battle to serve the state.  The statue of his twenty-ninth aspect: Faishán, \"The Pinnacle of Victory,\" is a proud young woman leaning on a spear.  You gaze into her eyes and promise to capture and sacrifice an enemy soldier in her name using a silver dagger that you have bought specifically for the purpose.\n\t\t*set dutiful %+20\n\t\t*set God  \"Karakán\"\n\t\t*set Godhis \"his\"\n\t\t*set Godhe \"he\"\n\t\t*set Godhim \"him\"\n\t\t*set Lord \"Lord\"\n\t\t*set Clan \"Red Sun\"\n\t\t*set Lineage  \"hiBosúga\"\n\t\t*set PrinceName  \"Mirusíya\"\n\t\t*set Prince  \"Prince\"\n\t\t*set Legion  \"the Storm of Fire\"\n\t\t*set LegionType  \"Medium Infantry\"\n\t\t*set LegionNum  \"21st\"\n\t\t*Set General  \"Kutumé hiTánkolel\"\n\t\t*set AlliedGeneral \"Dirúla hiFa’ásu\"\n\t\t*set AlliedLegion \"Glorious Destiny\"\n\t\t*set nirclan \"Red Moon\"\n\t\t*set Hometown  \"Butrús\"\n\t\t*goto pray\n\t#Lady Avánthe, Mistress of Heaven and the Goddess of Women and Nature.\n\t\tThe hiChákkena lineage of the White Stone clan have always been devoted to Lady Avánthe.  The Mistress of Heaven seeks to create a tranquil and orderly world, which moves in harmonious cycles.  Her followers are tasked to travel gracefully through the stages of life, to seek justice, and to protect women.  Standing at attention before the statue of her second aspect: Kátha, \"The Warrior Maid,\" you sing a brave battle song before placing a single perfect piece of fruit upon the altar.\n\t\t*set dutiful %+20\n\t\t*set God  \"Avánthe\"\n\t\t*set Godhis \"her\"\n\t\t*set Godhe \"she\"\n\t\t*set Godhim \"her\"\n\t\t*set Lord \"Lady\"\n\t\t*set Clan \"White Stone\"\n\t\t*set Lineage \"hiChákkena\"\n\t\t*set PrinceName \"Ma'ín\"\n\t\t*set Prince \"Princess\"\n\t\t*set Legion \"Káikama of Bey Sü\"\n\t\t*set LegionType \"Medium Infantry\"\n\t\t*set LegionNum  \"36th\"\n\t\t*Set General \"Káikama hiMrachiyáku\"\n\t\t*set AlliedGeneral \"Dirúla hiVriyén\"\n\t\t*set AlliedLegion \"the Translucent Emerald\"\n\t\t*set nirclan \"Green Kirtle\"\n\t\t*set Hometown  \"Béy Sü\"\n\t\t*goto pray\n\t#Lord Hrü'ü, the Dispenser of Calamities and the Supreme Principle of Change.\n\t\tThe hiCháika lineage of the ancient and aristocratic Sea Blue clan has been worshipping Lord Hrü'ü since before many other so-called noble clans even existed.  It is a paradox that a family devoted to the ideals of Change has attained a timeless role as pillars of the state, but in truth it is by acknowledging that calamity is inevitable and riding the waves of Change that you have survived the fall of empires. Lord Hrü'ü teaches his followers to avoid complacency and seek individual power and freedom.  You stand proudly before a statue of a great toad-like beast.  It is the  aspect Kaishmá, \"Lord of the Deep Purple Dark.\"  Upon the altar you place a belt of braided purple silk and cloth of gold.\n\t\t*set wealth +100\n\t\t*set dutiful %-20\n\t\t*set change true\n\t\t*set God \"Hrü'ü\"\n\t\t*set Godhis \"his\"\n\t\t*set Godhe \"he\"\n\t\t*set Godhim \"him\"\n\t\t*set Lord \"Lord\"\n\t\t*set Clan \"Sea Blue\"\n\t\t*set Lineage \"hiCháika\" \n\t\t*set PrinceName  \"Rereshqála\"\n\t\t*set Prince \"Prince\" \n\t\t*set Legion  \"the Ruby Hand\"\n\t\t*set LegionType  \"Heavy Infantry\"\n\t\t*set LegionNum  \"15th\"\n\t\t*set General  \"Bushu’un hiSsánmirin\"\n\t\t*set AlliedGeneral \"Dijáya hiQurrulúma\"\n\t\t*set AlliedLegion \"the Blue Peak\"\n\t\t*set nirclan \"Blue Girdle\"\n\t\t*set Hometown  \"Jakálla\"\n\t\t*goto pray\n\t#Lord Vimúhla, the Power of Destruction and Red Ruin, the Lord of Flame.\n\t\tThe hiShanúka lineage of the Red Sun clan will always be passionate and devoted followers of the Flame Cupped Within the Lamp. Lord Vimúhla demands that his soldiers be brave and fierce in battle.  He glories in destruction, pyromania, and pillaging; but these acts are reserved for defeated enemies.  On the altar before the statue of Vimúhla's fourth aspect Dumúggash, \"The Spirit of Battle,\" you sprinkle the ashes of your slave, Visán.  \n\t\t*set dutiful %-20\n\t\t*set change true\n\t\t*set God  \"Vimúhla\"\n\t\t*set Godhis \"his\"\n\t\t*set Godhe \"he\"\n\t\t*set Godhim \"him\"\n\t\t*set Lord \"Lord\"\n\t\t*set Clan \"Red Sun\"\n\t\t*set Lineage  \"hiShanúka\"\n\t\t*set PrinceName  \"Mirusíya\"\n\t\t*set Prince  \"Prince\"\n\t\t*set Legion  \"the Storm of Fire\"\n\t\t*set LegionType  \"Medium Infantry\"\n\t\t*set LegionNum  \"21st\"\n\t\t*Set General  \"Kutumé hiTánkolel\"\n\t\t*set AlliedGeneral \"Dirúla hiFa’ásu\"\n\t\t*set AlliedLegion \"Glorious Destiny\"\n\t\t*set nirclan \"Red Moon\"\n\t\t*set Hometown  \"Butrús\"\n\t\t*page_break\n\t\tVisán served your father as a retainer for years before being given to you as a present on the day you joined the Legion of ${legion}.  Over the years he had cared for your armor, listened to your thoughts, and kept your secrets, but had long suffered from old age and a rattling cough.  Knowing he would not survive the upcoming march, he asked permission to be immolated by the priests as an offering for your victory.\n\t\t*choice\n\t\t\t#Visán was useless to me. I was going to have him immolated soon anyway.  \n\t\t\t\tThe old man was tied to a stake with another slave, and though at first he was brave, you could see doubts begin to show as the fire was lit.  By the time the flames had begun to rise, he was manfully trying not to scream.  But they all scream in the end, and his wails were music to Lord Vimúhla's ears.\n\t\t\t\t*set dutiful %-20\n\t\t\t\t*goto pray\n\t\t\t#I was touched, and did everything I could to make his passing pleasant.\n\t\t\t\tFrom one of the priests you purchased a powerful cocktail of drugs, guaranteed to induce euphoria and numb pain.  With great ceremony Visán walked to the stake, and as the flames rose his voice could be heard singing a death song, until finally he was overcome by heat and smoke.  You remember his passing with both sadness and pride.\n\t\t\t\t*goto pray\n\t\t\t#Though I knew it was wrong, I could not bear to see Visán burned.\n\t\t\t\tSoon after this conversation Visán's cough worsened.  He passed away in comfort, carried in a palanquin and waited upon by your other servants while the legion marched.  His body was cremated, and you now place the ashes upon the altar along with some precious fire opals, which you hope will make up for your moment of weakness.\n\t\t\t\t*set noble %-10\n\t\t\t\t*set dutiful %+20\n\t\t\t\t*goto pray\n\t#Lady Dlamélish, the Green-Eyed Lady of Fleshly Joys and Mistress of Demons.\n\t\tThe hiVriyén lineage of the White Stone clan revels in the patronage of Lady Dlamélish.  The Green-Eyed Lady is a mystical goddess of pleasure who encourages her followers to live in the moment and seek out new experiences.   As a soldier you do her honor whenever you feel the rush of battle or gaze triumphantly upon a new vista.  The statue of a beautiful and sensuous woman before you is her thirty-fourth aspect: Mrikáya, \"She Who Takes Pleasure in Battle.\" On the altar you pleasingly arrange three large green blossoms and several silver coins.\n\t\t*set dutiful %-20\n\t\t*set God  \"Dlamélish\"\n\t\t*set change true\n\t\t*set Godhis \"her\"\n\t\t*set Godhe \"she\"\n\t\t*set Godhim \"her\"\n\t\t*set Lord \"Lady\"\n\t\t*set Clan  \"White Stone\"\n\t\t*set Lineage  \"hiVriyén\"\n\t\t*set PrinceName  \"Ma'ín\"\n\t\t*set Prince \"Princess\"\n\t\t*set Legion \"Káikama of Bey Sü\"\n\t\t*set LegionType \"Medium Infantry\"\n\t\t*set LegionNum  \"36th\"\n\t\t*Set General \"Káikama hiMrachiyáku\"\n\t\t*set AlliedGeneral \"Dirúla hiVriyén\"\n\t\t*set AlliedLegion \"the Translucent Emerald\"\n\t\t*set nirclan \"Green Kirtle\"\n\t\t*set Hometown  \"Béy Sü\"\n\t\t*goto pray\n*label pray\n*page_break\nAnd what brings you to ${God}'s Temple?\n*choice\n\t#I hope to lead my soldiers well in the coming siege.\n\t\t*set noble %+10\n\t\t*if God = \"Dlamélish\"\n\t\t\tYour fickle and hedonistic goddess is not often asked to grant steadiness of nerves and mind, but you hope that the novelty of the request will appeal to her.\n\t\t\t*set noble %-10\n\t\t\t*goto assassination\n\t\t*elseif God = \"Karakán\"\n\t\t\tThis is a very appropriate prayer for this shrine, and you feel sure that Faishán will reward your responsible leadership with victory.\n\t\t\t*set noble %+10\n\t\t\t*goto assassination\n\t\t*else\n\t\t\tFour hundred soldiers look to you for guidance.  It is a weighty responsibility, and you pray to do honor to your clan.\n\t\t\t*goto assassination\n\t#I want to find glory and promotion.\n\t\t\t*set dutiful %-20\n\t\t\t*if God  = \"Hrü'ü\"\n\t\t\t\t*set noble %+10\n\t\t\t\tThe Lord of Confusion has always blessed your family with glory, and you ask him to bring calamity down upon your enemies, both within the armies you will face and upon those in your own army with whom you will compete for notice.  It will still fall to you to grasp the opportunity when it comes.\n\t\t\t\t*goto assassination\n\t\t\t*else\n\t\t\t\tThe military is one of the few methods of social advancement within the Tsolyáni Imperium; and a soldier who is good at his trade, respectful of his superiors, and liberal with bribes can rise far, especially with a little luck.  You hope that this offering has brought you that luck.\n\t\t\t\t*goto assassination\n\t#I wish to return safely to my home and family when this is over.\n\t\tYou beseech ${God} to extend ${Godhis} protection over you, promising more offerings to come if you make it home alive.\n\t\t \n\t\t*if God = \"Vimúhla\"\n\t\t\tIf the priests of the Flame Lord heard this prayer they would surely brand you a coward, but there is no option other than honesty when communing privately with your god, and you hope that if you fight well in his name Lord Vimúhla will tolerate your imperfections.\n\t\t\t*set noble %-10\n\t\t\t*goto assassination\n\t\t*else\n\t\t\tThough few soldiers would admit it, many of them share this secret prayer.\n\t\t\t*goto assassination\n*label assassination\n*page_break\nAs you finish praying, the silence of the temple is disturbed by the faint scuffing of sandals upon stone.  You turn in time to see a woman, wearing the badge of an assassin's clan, raise a blowgun to her lips.  You duck as a poisoned dart whistles by your ear to thunk into the altar.  You are alone in the small shrine and unarmored, though your chlén-hide sword leans against the altar.  (Metal is too rare on Tékumel to be of common use, so soldiers fight with weapons cut from a tough hide which has been chemically treated to resemble soft bronze.  To see the definitions of Tsolyáni words you can check the glossary in the Show Stats screen.)\n*choice\n\t#I grab my chlén-hide sword and lunge for the woman in expert form.\n\t\tIt is your deadliness in battle which has so impressed your superiors in the Legion of ${legion} and led to your rapid promotion to the rank of kási.  With the element of surprise wasted, the assassin is at a disadvantage, and you press the attack.\n\t\t*set combat +40\n\t\t\n\t\tThough momentarily off-balance, the assassin displays the speed and trickery for which her kind are known.  You find yourself flagging in the face of her attack.\n\t\t*choice\n\t\t\t#I fight defensively and whistle for soldiers stationed outside.\n\t\t\t\tKásikoi are expected to be tactical thinkers as well as physically powerful, and you are no exception.  By focusing purely on defense you negate any difference in skill, and the assassin is soon flanked by two of your soldiers.  Realizing too late her position, she looks around for a route of escape.\n\t\t\t\t*set tactics +20\n\t\t\t\t*label tactics_end\n\t\t\t\t*choice\n\t\t\t\t\t#Her death is a fair price for an attempt on my life.\n\t\t\t\t\t\tAs she turns to parry one of your soldier's attacks you finish her with a single sword stroke.  The assassin falls limply to the floor and lies motionless in a spreading pile of blood.\n\t\t\t\t\t\t*goto why\n\t\t\t\t\t#I motion for my soldiers to grab her.   \n\t\t\t\t\t\tYou've always wondered whether it's true that assassins cannot be coerced into betraying their clients.\n\t\t\t\t\t\t*goto questioning\n\t\t\t\t\t#I lunge, stopping my sword inches from her throat.  \"Do you yield?\"\n\t\t\t\t\t\t*goto surrender\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t#This must be the sacrifice Lord Karakán wants of me. \n\t\t\t\t\t\t\t*label sacrifice\n\t\t\t\t\t\t\tYou pull out your silver dagger and plunge it quickly into her heart.  \n\t\t\t\t\t\t\t*if (psychic > 1) or (ritual > 1)\n\t\t\t\t\t\t\t\tThough casting spells or using psychic powers while carrying metal is normally suicidal, ritual daggers are excepted through the powers of the gods.\n\t\t\t\t\t\t\tIt is exactly the sort of quick and merciful sacrifice the god prefers, and an assassin is a worthy foe.  As her heart's blood dampens your hand, you are sure your prayer will be granted.\t\n\t\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t\t\t*goto why\t\n\t\t\t#You must be mistaken.  She may be talented, but I am one of the finest fencers in the empire.\n\t\t\t\tThe look of victory in the assassin's eyes turns to surprise as you shift your sword from your left hand to the right, and begin to really put her through her paces.  Soon she is breathing heavily and clearly attempting to disengage.\n\t\t\t\t*set combat +20\n\t\t\t\t*choice\n\t\t\t\t\t#Her death is a fair price for an attempt on my life.\n\t\t\t\t\t\tFatigued, she is too slow to recover from a thrust, and you finish her with a single sword stroke.  The assassin falls limply to the floor and lies motionless in a spreading pile of blood.\n\t\t\t\t\t\t*goto why\n\t\t\t\t\t#I weaken her, but leave her conscious for questioning.\n\t\t\t\t\t\tYou play with her as a cat plays with a mouse, making shallow cuts that weaken but to do not kill, until she is helpless at your feet.  You've always wondered whether it's true that assassins cannot be coerced into betraying their clients.\n\t\t\t\t\t\t*goto questioning\n\t\t\t\t\t#I lunge, stopping my sword inches from her throat.  \"Do you yield?\"\n\t\t\t\t\t\t*goto surrender\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t#This must be the sacrifice Lord Karakán wants of me.\n\t\t\t\t\t\t\t*goto sacrifice\n\t#I cast the spell \"Vallation,\" sending forth a magical wall of force.\n\t\tThough you are not as talented as the mages of your legion's sorcerer corps, you studied the casting of spells in temple school, attaining a low priestly rank.  You strike the ritual poses needed to bring forth a spell, and the assassin's eyes widen in fear.  \n\t\t*set ritual +40\n\t\t\n\t\tA veil of magic appears and roils toward her, but she leaps aside and throws a small bronze dagger which lodges in your thigh.  It is suicide to cast spells while touching metal, and she charges you like a wild zrné beast, pressing the attack before you can remove the knife.\n\t\t*choice \n\t\t\t#I fight defensively and whistle for soldiers stationed outside.\n\t\t\t\tKásikoi are expected to be tactical thinkers as well as personally formidable, and you are no exception.  You grab your chlén-hide sword  and use it to parry while retreating.  By focusing purely on defense you negate any difference in skill, and the assassin is soon flanked by two of your soldiers.  Realizing too late her position, she looks around for a route of escape.\n\t\t\t\t*set tactics %+20\n\t\t\t\t*goto tactics_end\n\t\t\t#I am as deadly with a sword as I am with my spells.\n\t\t\t\tThe look of victory in the assassin's eyes turns to surprise as you grab your chlén-hide sword and leap to attack her.  After a few exchanges, you boldly duck down and remove the bronze dagger.  Fearing your spells the assassin backs away.\n\t\t\t\t*set combat +20\n\t\t\t\t*choice\n\t\t\t\t\t#Her death is a fair price for an attempt on my life.\n\t\t\t\t\t\tShe is too tired now to dodge your spell, which crushes her with terrifying force.  There is a loud crack as the assassin's head hits the floor.\n\t\t\t\t\t\t*goto why\n\t\t\t\t\t#I'm curious to know whether Assassins can be coerced into betraying their clients.\n\t\t\t\t\t\tWith careful finesse you use your spell to pin her gently to the stone floor.\n\t\t\t\t\t\t*goto questioning\n\t\t\t\t\t#I summon forth a ball of flame.  \"Do you yield?\"\n\t\t\t\t\t\t*goto surrender\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t#This must be the sacrifice Lord Karakán wants of me.\n\t\t\t\t\t\t\t*goto sacrifice\n\t#I focus my psychic energies and time slows around me.  Picking up my chlén-hide sword I advance.\n\t\tWhile not a ritual spell caster, you have innate psychic talents which were honed in temple school.  You harness these now and move toward the assassin like a bolt of Lord Karakán's lightning.  \n\t\t*set psychic +40\n\t\t\n\t\tThough momentarily off balance, the assassin displays the speed and trickery for which her kind are known.  You find yourself flagging in the face of her attack.\n\t\t*choice\n\t\t\t#I fight defensively and whistle for soldiers stationed outside.\n\t\t\t\tKásikoi are expected to be tactical thinkers as well as personally formidable, and you are no exception.  By focusing purely on defense you negate any difference in skill, and the assassin is soon flanked by two of your soldiers.  Realizing, too late, her position, she looks around for a route of escape.\n\t\t\t\t*set tactics %+20\n\t\t\t\t*goto tactics_end\n\t\t\t#You must be mistaken.  She may be talented, but I am one of the finest psychic warriors in the empire.\n\t\t\t\tThe look of victory in the assassin's eyes turns to surprise as you shift your sword from your left hand to the right, and begin to really put her through her paces.  Soon she is breathing heavily and clearly attempting to disengage.\n\t\t\t\t*set combat +20\n\t\t\t\t*choice\n\t\t\t\t\t#Her death is a fair price for an attempt upon my life.\n\t\t\t\t\t\tAfter a furious exchange of blows you  step back and release a deadly bolt of telekinetic force.  The assassin falls limply to the floor and lies motionless, like a discarded doll.\n\t\t\t\t\t\t*goto why\n\t\t\t\t\t#I weaken her, but leave her conscious for questioning.\n\t\t\t\t\t\tYou play with her as a cat plays with a mouse, making shallow cuts that weaken but to do not kill, until she is helpless at your feet.  You've always wondered whether it's true that assassins cannot be coerced into betraying their clients.\n\t\t\t\t\t\t*goto questioning\n\t\t\t\t\t#I lunge, stopping my sword inches from her throat.  \"Do you yield?\"\n\t\t\t\t\t\t*goto surrender\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t#This must be the sacrifice Lord Karakán wants of me.\n\t\t\t\t\t\t\t*goto sacrifice\n\t#I whistle for two of my soldiers who are stationed outside.\n\t\tKásikoi are expected above all to be tactical thinkers, and you are no exception.  You calculate that, if you can hold her off for a few exchanges, your soldiers will be able to flank her.\n\t\t*set tactics +40\n\t\t*choice\n\t\t\t#I grab my chlén-hide sword and prepare to defend myself.\n\t\t\t\tThough more a commander than a fighter, you are still a soldier of the ${legionnum} and a match for this assassin, especially when time is on your side.  You skillfully parry and retreat until your soldiers arrive.  Realizing too late her position, she looks around for a route of escape.\n\t\t\t\t*set combat +20\n\t\t\t\t*goto tactics_end\n\t\t\t#Calling upon my ritual magic, I summon a shield.\n\t\t\t\tThough only of minor talent, you studied the casting of spells in temple school, attaining a low priestly rank.   By chanting and doing a brief ritual dance, you summon a Globe of Guarding around yourself.  You cannot attack from within it, but neither can the assassin get to you, except by pushing slowly through the defense.  She is still trying to crack this strange egg when your soldiers arrive.  Realizing too late her position, she looks around for a route of escape.\n\t\t\t\t*set ritual +20\n\t\t\t\t*choice\n\t\t\t\t\t#Her death is a fair price for an attempt upon my life, but I make it quick.\n\t\t\t\t\t\tAs she begins to fight your two soldiers you drop the spell of Guarding and, picking up your chlén-hide sword, finish her with a single stroke.  The assassin falls limply to the floor and lies motionless in a spreading pool of blood.\n\t\t\t\t\t\t*goto why\n\t\t\t\t\t#I motion for my soldiers to grab her. \n\t\t\t\t\t\tYou're curious to know whether it's true that assassins cannot be coerced into betraying their clients.\n\t\t\t\t\t\t*goto questioning\n\t\t\t\t\t#I summon forth a ball of flame. \"Do you yield?\"\n\t\t\t\t\t\t*goto surrender\n\t\t\t\t\t*if God = \"Karakán\"\n\t\t\t\t\t\t#This must be the sacrifice Lord Karakán wants of me.\n\t\t\t\t\t\t\t*goto sacrifice\n\t\t\t#Focusing my psychic energies, I seize control of her mind.\n\t\t\t\tWhile not a ritual spell caster, you have innate psychic talents which were honed in temple school.  Using the spell of Domination, you attempt to move the assassin's body as a puppeteer directs a puppet.  She is strong-willed and fights you off, but doing so takes all her concentration, and she can muster only the weakest defense against your two soldiers when they arrive.\n\t\t\t\t*set psychic +20\n\t\t\t\t*goto tactics_end\n*label surrender\nThe assassin looks into your eyes, showing no fear.  \"If you let me live, I promise my clan will return the payment and not make another attempt upon you.\"\n*choice\n\t#I let her go.\n\t\tShe bows deeply to you and walks from the shrine.  Assassination is legal in Tsolyánu, so no one stops her.  It seems anticlimactic somehow.\n\t\t*set diplomacy %+10\n\t\t*if God = \"Avánthe\"\n\t\t\t*set noble %+10\n\t\t*if God = \"Vimúhla\"\n\t\t\t*set noble %-10\n\t\t*goto why\n\t#I have changed my mind.  She cannot be left alive.\n\t\t*if (ritual>30) and ((combat >30) or (tactics >50))\n\t\t\tThe assassin is engulfed in a torrent of flame.\n\t\t\t*goto why\n\t\t*else\n\t\t\tYou execute the young woman with a single stroke to the neck.  She falls limply to the floor and lies motionless in a spreading pool of blood.\n\t\t\t*goto why\t\t\t\t\t\t\t\n*label questioning\n*if God = \"Vimúhla\" \n\t*set noble %+10\n*if God = \"Hrü'ü\" \n\t*set noble %+10\n*if God = \"Avánthe\" \n\t*set noble %-10\n*if God = \"Hnálla\"\n\t*set noble %-10\n\"Who sent you?\"  \n\t\t\t\t\nThe assassin's face remains blank \n*if tactics >40\n\tas she is grabbed, \n\t*goto nextpt\n*elseif (ritual > 30) \n\tas she is crushed beneath your spell, \n\t*goto nextpt\n*else\n\tas she falls to her knees weak with blood loss, \n\t*label nextpt\n\ta picture of perfect stillness.  It is clear she intends to die with dignity and silence. \n\t*choice\n\t\t#I know who her employer is anyway.  I give her a merciful end.\n\t\t\t*if God = \"Karakán\"\n\t\t\t\t*set noble %+10\n\t\t\tThe woman gives you a look of weary gratitude, and then the light in her eyes is extinguished.\n\t\t\t*goto why\n\t\t#It's a shame intentions don't always equal success.\n\t\t\t*if psychic >10\n\t\t\t\tYou begin to probe the woman's mind, and what you see there confirms your suspicions.  You are beginning to probe deeper when \n\t\t\t*if psychic \u003c10\n\t\t\t\tYou begin to torture the woman, but though she cries out to her god, Lord Ksárul, for deliverance, she does not speak.  In the end \n\t\t\tshe manages to end her life with a quick slap to her own neck, like the swatting of a mosquito, which leaves behind a poisoned dart.  \n\t\t\t*if tactics >30\n\t\t\t\tThe soldier who had let her arm free in his blanching distraction is stabbed as well, with snake-like swiftness.  He collapses to the stones, foaming at the mouth.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tShe passes from this life having not betrayed her clan or her employer.\n\t\t\t*goto why\t\n*label why\n\nSo, why would someone send an assassin after you anyway?\n*fake_choice\n\t#I killed a rival for the sake of my beloved.\n\t\tJealousy is viewed as ignoble within Tsolyáni society, but that does not keep young people from dueling over affairs of the heart when passions run high. In your case the duel ended in death, which left a grieving mother fixated upon your destruction.  What effect this will have upon your destiny is yet to be seen.\n\t\t*set assassination  1\n\t#The weak envy the strong.  I don't have time to enumerate every grievance brought against me by lesser men.\n\t\tThe shámtla (blood money) paid to the family of some peasant or medium clan bureaucrat\n\t\t*if clan = \"Sea Blue\"\n\t\t\t—or even high clan scion—\n\t\tkilled over a matter of principle is almost pocket change to one of your station, which allows you to keep your inferiors in line.  Unfortunately, some families cannot let the matter drop and insist on hiring assassins to pursue their grievance for them when the courts have failed.  It is quite annoying, but you soon put the matter out of your mind.\n\t\t*set nir_rep -1\n\t\t*set assassination  2\n\t#I prevented an injustice.\n\t\tThough assassins are only supposed to take commissions which redress ignoble action, it is a truism that all men are corruptible.  Having failed to gain his revenge in the courts, your powerful enemy uses his fortune to send greedy assassins after you on the flimsiest of pretexts.  Thus far you have been lucky in surviving such attempts.\n\t\t*set assassination  3\n\t\t*set nir_rep +1\n\t#I killed a man in anger, and deeply regret it. \n\t\tThe offense was tried in military court, and with your elevated status and the situation taken into consideration, you were given a light punishment.  Not knowing the regret you carry in your heart for that red deed, his family saw only a murderer going unpunished, and have spent a small fortune in pursuit of vengeance.  You are unsure how to handle the situation.\n\t\t*set assassination  4\n*page_break\nThe next day sees your legion marching down one of the large fortified sákbe roads, which serve in peacetime as rivers of trade between the cities of the empire, and in war as defensible walls guarding its provinces.  Behind you is the stone guard tower at which you took your noon meal, while ahead of you the road snakes away toward the horizon.  The top tier of the sákbe is unoccupied, except for occasional runners sprinting by on imperial business.  \n \nMost of the ranking officers ride in palanquins carried by slaves upon the middle tier, but the soldiers and the baggage train move slowly along the broad road of well-worn stone at the base of the wall.  As a kási of the Legion of ${legion} and a commander of a tsurúm of 400 soldiers, you may choose to travel in style if you wish.\n*choice\n\t#I am riding in my palanquin.\n\t\tGiven your station, this is your prerogative, but why did you choose it?\n\t\t*choice\n\t\t\t#I need to catch up on paperwork.\n\t\t\t\tA conscientious kási makes time to read the requisition forms, punishment details, and other paperwork applicable to his tsurúm.  The documents give you a real sense of what is going on, unfiltered by the opinions of your subordinates.  Many times you have caught out quartermasters who were taking too-generous bribes by simply checking the math.  \n\t\t\t\t*set dutiful %+10\n\t\t\t\t*if God = \"Hnálla\"\n\t\t\t\t\t*set noble %+10\n\t\t\t\t*page_break\n\t\t\t\tAs the miles pass beneath you, the calligraphy begins to blur, and you find yourself looking out at the scenery and letting your mind wander back to the attempt upon your life in the shrine.\n\t\t\t\t*goto reminisce\t\n\t\t\t#After the week I have had, and with a battle to come, I could use the relaxation.\n\t\t\t\tWhile the legionnaires below you march in the heat, you enjoy a relaxing massage and sip cool chumétl (watered yogurt).  There is something about watching others work that makes well-deserved indolence even more luxurious.  Delightful!\n\t\t\t\t*set dutiful %-10\n\t\t\t\t*if God = \"Dlamélish\"\n\t\t\t\t\t*set noble %+15\n\t\t\t\t*page_break\n\t\t\t\tAs the masseuse's strong hands remove all tension from your back, you fall into dream-like reverie, thinking about your newly lacquered armor, about the fine meal that will await you upon making camp, and eventually about the attempt upon your life in the shrine.\n\t\t\t\t*goto reminisce\t\n\t\t\t#I enjoy trading jokes and news with my fellow commanders.\n\t\t\t\tIn the hours spent traveling there is ample time to gossip and socialize.  Though others may see this as frivolous, promotion in the Tsolyáni army is all about who you know.  By building friendships with the higher-ups within your legion, you guarantee they will look favorably upon your rise.\n\t\t\t\t*set dutiful %-10\n\t\t\t\t*set diplomacy %+10\n\t\t\t\t*page_break\n\t\t\t\tBy late afternoon, the banter has slowed and many of your fellow officers are napping or catching up on paperwork.  You soon tire of gazing out at the passing countryside—endless fields of grain interspersed with identical peasant hamlets does not make for exciting viewing—and begin to replay the recent attempt upon your life in your mind.  \n\t\t\t\t*goto reminisce\t\n\t\t\t#I would rather be marching, but I have to keep up appearances.\n\t\t\t\t*set dutiful %+10\n\t\t\t\tThough great officers can have their eccentricities tolerated, being too chummy with one's soldiers is often seen as a weakness in a kási, and serves as a block to future promotion.  It is safer to blend in with the crowd, letting appropriate behavior be your guide.\n\t\t\t\t*page_break\n\t\t\t\tTo take your mind off the tedium of riding in a palanquin across the breadbasket of the Empire, you begin to replay the recent attempt upon your life in your mind.\n\t\t\t\t*goto reminisce\t\t\t\t\n\t#I am marching with my soldiers.\n\t\tMost officers would jump at the chance to ride in comfort and socialize with their superiors, but not you.  Why?\n\t\t*choice\n\t\t\t#I lead from the front and share my soldiers' tribulations.\n\t\t\t\tThis outlook has made you popular with your men and women, but some of your superiors worry that you are not upholding the dignity of your office and the chain of command.\n\t\t\t\t*set noble %-10\n\t\t\t\t*set tactics %+10\n\t\t\t\t*page_break\n\t\t\t\tA few of the bolder heréksa approach with conversational gambits in the manner of wine merchants offering a vintage for evaluation.  The first couple miles pass in small-talk, but as the afternoon proceeds you are left alone with your thoughts, which naturally settle upon the recent attempt upon your life.\n\t\t\t\t*goto reminisce\n\t\t\t#This way I will stand out in the eyes of my superiors.\n\t\t\t\tIt is important to differentiate yourself from the twenty other kási in the legion, but you need to be careful that you are not seen as too desirous of the approval and social company of your troops.  You are their leader, after all.  Still, a rugged and soldierly aspect is valued in the military.\n\t\t\t\t*set dutiful %-10\n\t\t\t\t*set noble %-10\n\t\t\t\t*page_break\n\t\t\t\tWhile you do cut a fine and inspiring figure marching along, your rank proves a barrier to casual conversation with the troops around you.  To stave off boredom you find yourself replaying the recent attempt upon your life in your mind.\n\t\t\t\t*goto reminisce\n\t\t\t#I want to see how things stand with my tsurúm with my own two eyes.\n\t\t\t\tToo many officers rely solely upon the reports of their subordinates to form a picture of the state of their tsurúm.  You prefer to talk with your soldiers and hear their grievances and worries directly.  It is unconventional, but doing so in the past has helped you ferret out corrupt or overly disciplinarian heréksa who were damaging morale.\n\t\t\t\t*set dutiful %+10\n\t\t\t\t*set tactics %+10\n\t\t\t\t*set noble %-10\n\t\t\t\t*page_break\n\t\t\t\tThe Legion of ${legion} is an elite and well-disciplined force.  There is good-natured grumbling over the march and the heat, ribald jokes about the gaggle of \"dancing girls\" plying their trade at the guard tower, and general high spirits.  Having put your mind at ease as to the disposition of your troops, you begin to reminisce on yesterday's attempt upon your life.\n\t\t\t\t*goto reminisce\n\t\t\t#I enjoy marching.\n\t\t\t\tWell, since the soldiers spend much of their time marching, you might as well enjoy it, you suppose.  It is true that palanquins can get stuffy and rather boring after a few days.  Still, most of the legion thinks you're crazy.\n\t\t\t\t*set noble %-10\n\t\t\t\t*page_break\n\t\t\t\tThe fresh air, the feel of the cobbles beneath your sandals, and the satisfaction of steady progress made throughout the afternoon are comforts to a seasoned campaigner such as yourself.  While your body is busy, your mind is free to roam.  As the shadows lengthen, it alights upon the events of yesterday and the attempt upon your life.\n\t\t\t\t*goto reminisce\t\n*label reminisce\n \n*if assassination = 2\n\tYou dimly recall now which upstart's family may have sent the assassin after you.  It must have been a fellow noble—though of much lower rank—maybe someone you ran into in the months after the time of your naming day celebration….\n\t*set cousin \"Umá\"\n\t*goto prenaming\n*else\n\tFrom there it is a small step to thinking about the months after your naming day celebration, and the unfortunate incident that resulted in the assassination attempt….\n\t*goto prenaming\n*label prenaming\n*finish A Decade Ago\n", "underground": "\n*temp her_dying false\n*temp die_loc 0\n*temp eye_aerial false\n*temp wavemurder false\n*temp nirmurder false\n*temp demon_count 0\n*temp warded false\n*temp nir_rush false\n*temp expended false\n*temp mercy true\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n[b]Chapter 5: Beneath the Earth, Into the Past[/b]\n\n[i]The Underworld, Summer of 2365 A.S.[/i]\n\n\nYour journey through the subterranean ruins is surprisingly like any other march: periods of tedium enlivened by conversation and scenery—except that the scenery is the twisted remnants of a dead culture, and the pressing darkness and threat of attack are omnipresent. Actually, that last part is rather similar to some night marches you've been on.  \n\n$!{wave} seems contentedly smug to be leading the way, but mostly focused on that \n*if her_dead = false\n\ttask, while Heréksa Rayána remains on guard at your back, ready to pounce upon any threat. \n*if her_dead\n\ttask. \nBy contrast, Kási Nirún charts a zig-zag path through the ruins, examining giant frescoes—lacquered to the passage walls such that they never fade, but marred by fissures and large cracks—and statues toppled onto their sides.  He is the first to notice, hours in, when you leave the buildings of the Engsvanyáli and descend into eons shrouded by time: \"We must be down in the Bednálljan Imperium stratum now. None of the religious art features the Lords of Stability, only of Change. Well, that, and the gaudiness. They coined the phrase 'Nothing truly glorious is attained through moderation,' and it shows in their art.\"\n*choice\n\t#I look about on my own.\n\t\tIt's as he says.  There are statues of Ksárul and Sárku, and a small altar with the iconography of \n\t\t*if change\n\t\t\t$!{lord} $!{god}, \n\t\t*if change = false\n\t\t\tDlamélish, \n\t\tbut none to the Gods of Stability. These ruins must predate the revelations of their prophet, Pavár.\n\t\t*fake_choice\n\t\t\t#Leave an offering on the altar out of respect.\n\t\t\t\t*set noble %+10\n\t\t\t\t*set dutiful %+10\n\t\t\t\tYou use your torch to light a block of incense upon the dusty shrine, and kneel to say the appropriate prayers.\n\t\t\t\t\n\t\t\t\t*if God = \"Hrü'ü\"\n\t\t\t\t\t\"Opponent of Permanence. Here, surrounded by the proof of your power, and the inevitability of your chaos, I bow my head in awe.\"\n\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\"Glorious Vimúhla, the Flame Cupped Within the Lamp. I bring you smoke here, amidst the ditlána of previous eras, knowing that everything ends in your fire.\"\n\t\t\t\t*if (God = \"Dlamélish\") or (change = false)\n\t\t\t\t\t\"Beautiful Green-Eyed Lady, here, reminded of the brevity of our lives, I offer you beauty and sweet scent, affirming my desire to make the most of the time I have and honor you with my deeds.\"\n\t\t\t#Pray for protection in this place.\n\t\t\t\tLooking out at the blackness, you place a small offering upon the altar and whisper a prayer, reflecting that you are probably the first human to do so here in millennia.\n\t\t\t\t\n\t\t\t\t*if God = \"Hrü'ü\"\t\n\t\t\t\t\t\"Lord of Confusion. I have entered the realm of darkness and chaos. Help me navigate it skillfully to emerge with power and victory.\"\n\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\"Glorious Vimúhla. I search amidst the ditlána of previous eras for a weapon for your chosen emperor to use to bring ruin to his foes. Bless my endeavor, and make me strong.\"\n\t\t\t\t*if (God = \"Dlamélish\") or (change = false)\n\t\t\t\t\t\"Beautiful, Green-Eyed Lady. Help deliver me from this place and I will shower gifts upon you.\"\n\t\t\t#Leave the altar; I have no need of blessings.\n\t\t\t\t*set noble %-10\n\t\t\t\t*set dutiful %-10\n\t\t*goto walking\n\t#I smile at Nirún's joke and go examine the wall with him.\n\t\tAs he says, the painting depicts all five Gods of Change, but no Gods of Stability, and it is garish.  Every color is used, each hue often next to a contrasting one, and every inch of space is covered with detail, faces of demons or ritual objects filling the background. Staring too long actually induces vertigo.\n\t\t*fake_choice\n\t\t\t#\"Where do you think we are?\"\n\t\t\t\t\"I think we're still within the bounds of the city. We've traveled far, but we keep turning left more than right, so it must be a spiral. I have no idea how far down.\" He pauses to look at the wall. \"Fifteen thousand years into the past. How can physical distance matter next to that?\"\n\t\t\t#I discuss the art with him.\n\t\t\t\t*set nir_rep +1\n\t\t\t\tFor a few moments he loses himself in the discussion, and you can see tension drain from him. Only when you see its absence do you realize the strain he's been under, not unusual given the situation you all find yourself in. Maybe this retreat into scholarly passion is more of a crutch for him than an indulgence.\n\t\t\t*selectable_if (change = false) #\"I wonder what it was like to live in the time before the prophet Pavár.\"\n\t\t\t\t\"I suppose it depends on when before? The gods must have fought a great deal then, and I imagine we were ground up between them when that happened, but there were great civilizations then too, and eras of peace. If the Usurper wins, I'm sure we'll get a taste of life under a hostile god soon enough.\"\n\t\t\t*if (Lover = \"Nirún\") \n\t\t\t\t#I squeeze Nirún's hand, and place my arm around his waist.\n\t\t\t\t\t*set nir_rep +1\n\t\t\t\t\tHe pulls you close. The two of you stand in silence, maybe the last moment of privacy you'll have down here, and watch the light of the torch play across the mural.\n\t\t*comment endif\n\t\t\n\t\tWith a resigned sigh, he turns to look after the dot of $!{wave}'s torch, meandering slowly ahead. \"We're below the earth now, and none of the laws of gods or men apply down here. Do you wonder who you'll be, unfettered like that? What you'll do?\"  It's clearly a rhetorical question, because he continues without pause. \n\t\t*if nir_rep >0\n\t\t\t\"You're not who I thought you'd be, from the stories I'd heard.\"\n\t\t\t*if lover = \"Nirún\"\n\t\t\t\tHe squeezes you tightly enough to stop your breath.\n\t\t*if nir_rep \u003c=0\n\t\t\t\"I wonder if we'll all get out of this alive.\"\n\t\tAbruptly, he follows after $!{wave}.\n\t\t*goto walking\n\t#I roll my eyes and continue to follow $!{wave}.\n\t\t$!{wahe} is carefully picking a path. $!{wahe} looks back at Nirún and shakes ${wahis} head. \"He needs to realize this isn't an archaeological survey.\"  The serious words and tone are a contrast to the Wave of your youth. Since passing through that door, $!{wave} has become all business. The mischief and merry-making you associate with ${wahim} are gone.\n\t\t*label walking\n\t\t*page_break\n\t\tMore walking, and you get lost in your thoughts before bumping into $!{wave}, who has stopped to stand still. $!{wahe} waves to hush you.\n\t\t\n\t\tA man-sized beetle trundles through a cross-passage, black mandibles clicking rhythmically. The torchlight makes its carapace glow an emerald green, but the monster shies away from the brightness. You see, wedged in the wing folds high on its back, a copper-sheathed pommel. The priests of Sárku must have ventured down this far after all, unless the creature wandered up into their tombs.\n\t\t*choice\n\t\t\t#I let the dlaqó pass; we don't need to borrow trouble.\t\n\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t*set noble %+20\n\t\t\t\tA wise decision. There will be plenty of trouble waiting ahead.\n\t\t\t\t*goto dlaqoinfo\n\t\t\t#I stop it; we need more weapons.\n\t\t\t\t*temp pluck false\n\t\t\t\tHow do you propose to do that?\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (psychic > 10) #I telekinetically pluck the item from the dlaqó.\n\t\t\t\t\t\tYou use the spell of Translocation to move the small dagger with the power of your mind. To the gigantic beetle it is a mere uncomfortable splinter, and it seems to hardly notice.\n\t\t\t\t\t\t*if psychic > 45\n\t\t\t\t\t\t\tGently raising the carapace you sense another item. Someone must have been using the dagger as a lever to get at this. Nimbly you pull both free with your psychic grasp, and they float toward you through the air as the emerald giant continues on its way down the hall and out of sight.\n\t\t\t\t\t\t\t*goto treasure\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set pluck true\n\t\t\t\t\t\t\tRaising the carapace you sense another item, but lack the finesse and strength to pull it free as well. Someone must have been using the dagger as a lever to get at this. The dagger floats back to you, and you see that it is a simple weapon of Sárku's priests, but corroded beyond use. The true prize remains inside the dlaqó.\n\t\t\t\t\t\t\t*label beetmagfail\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I kill the beetle and find what lies inside.\n\t\t\t\t\t\t\t\t\tYou motion the others to surround the dlaqó.\n\t\t\t\t\t\t\t\t\t*goto dlaqó_fight\n\t\t\t\t\t\t\t\t#Let the beetle pass.\n\t\t\t\t\t\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t\t\t\t\tThe massive insect moves into darkness with a strange thrumming, chuffing sound, and is soon lost to sight.\n\t\t\t\t\t\t\t\t\t*goto dlaqoinfo\n\t\t\t\t\t*selectable_if (ritual >10) #I command the creature to hold still.\n\t\t\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t\t\t*set noble %+15\n\t\t\t\t\t\tYou hypnotize the beetle with the dance-like movements that call forth the spell of Zoic Domination.  As its three amber-colored eyes fix on you, Nirún clambers up its back. At the top, he casts you a worried glance, but the beetle remains transfixed, even as he pries out the knife.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Hold it a second. There's something else here.\" He casually tosses the heavily corroded dagger to the ground before levering up the carapace with one hand and reaching down beneath it with another, a disgusted look on his face.\n\n\t\t\t\t\t\t*if ritual > 40\n\t\t\t\t\t\t\tThe massive dlaqó's six limbs scratch at the floor in irritation, but you refocus your efforts and keep it subdued. The spell finally breaks just as Nirún triumphantly pulls forth a small sphere, and as the beetle begins to scurry away down the corridor, he tumbles from its back, landing painfully.  Still, he grins as he holds forth his prize in a slimy hand.\n\t\t\t\t\t\t\t*goto treasure\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tThe massive dlaqó's six limbs scratch at the floor in irritation a moment before it begins to trundle down the corridor, gaining momentum. Nirún is thrown from its back to smack against the stones.  He sits up, rubbing an elbow.  \"I think there's something valuable stuck beneath its carapace, and someone was using the knife to pry it out. They were probably trampled.\" He shudders at the thought.\n\t\t\t\t\t\t\t*set nir_wound +1\n\t\t\t\t\t\t\t*goto beetmagfail\n\t\t\t\t\t*selectable_if (Her_dead = false) #I order Heréksa Rayána to distract the dlaqó while I retrieve the item.\n\t\t\t\t\t\tNirún would have raised a sardonic eyebrow, $!{wave} would have said something obscene, but Rayána just nods, as if single combat with a monster the size of a peasant's hut is a common occurrence. She stretches her arms, cracks her neck, and walks to the front of the beast.  As she studies it, its three amber eyes focus on her, and it chitters, razor-sharp mandibles the length of swords.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThere's a moment of stillness as everyone holds their breaths, staring. Then, the Heréksa steps between the mandibles, grabbing one in each hand at smooth lengths near the mouth, and headbutts the beetle in its three eyes.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou half expect the angered insect to buck or charge, turning your Heréksa into a pulpy smear on the floor, but it actually seems stunned.  \n\t\t\t\t\t\t*if tactics \u003c= 60\n\t\t\t\t\t\t\tShaking off your own momentary paralysis, \n\t\t\t\t\t\t*if tactics > 60\n\t\t\t\t\t\t\tShaking off your own momentary paralysis, you order Rayána to move. \"Sweet $!{lord} $!{god} Heréksa, I meant distract it, not challenge it to a duel! Get back before it comes to and cuts you in half!\" Then, before it can recover, \n\t\t\t\t\t\tyou scramble up its back to find the dagger. Disappointingly, it is corroded beyond use; but as you are about to give up and slide back down, you see, lodged beneath it in the carapace, a small metallic sphere. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou manage to grab this just as the dlaqó surges forward. \n\t\t\t\t\t\t*if tactics \u003c=60\n\t\t\t\t\t\t\tRayána gives a grunt of pain before diving to the floor, clutching her side. \n\t\t\t\t\t\tLanding in a crouch, you see the beetle rocketing off into darkness with a strange thrumming, chuffing \n\t\t\t\t\t\t*if tactics \u003c=60\n\t\t\t\t\t\t\tnoise, and Heréksa Rayána pressing cloth to a long cut on her ribs.  As Kási Nirún moves to help bind the Heréksa's wound, \n\t\t\t\t\t\t\t*set her_dying true\n\t\t\t\t\t\t\t*set die_loc 1\n\t\t\t\t\t\t*if tactics >60\n\t\t\t\t\t\t\tnoise.\n\t\t\t\t\t\t$!{wave} moves to look over your shoulder at your prize.\n\t\t\t\t\t\t*goto treasure\t\n\t\t\t\t\t#We must kill the dlaqó and then search it.\n\t\t\t\t\t\t$!{wave} insists that ${wahe} won't risk ${wahis} life for what is clearly a dagger corroded beyond use, but Nirún is interested in the puzzle of how it got \n\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\tthere, and Rayána simply seems excited to fight a giant insect. \n\t\t\t\t\t\t*if her_dead\n\t\t\t\t\t\t\tthere.  \n\t\t\t\t\t\tThe \n\t\t\t\t\t\t*if her_dead\n\t\t\t\t\t\t\ttwo \n\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\tthree \n\t\t\t\t\t\tof you move to surround the trundling beast. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*label dlaqó_fight\n\t\t\t\t\t\tSurrounded by torches, the giant beetle grows nervous, its chittering razor-sharp mandibles the length of swords, as its three amber eyes dilate.\n\t\t\t\t\t\t*if tactics > 70\n\t\t\t\t\t\t\tWith a keen eye for the weakness of the enemy, you notice its fear, and use the torches to herd it into a small room where it cannot turn.  It thrums in anger, surging from side to side in the small space as you pick out vulnerable joints and creases in the carapace to strike.  It's less a fight than simple butchery. When the floor is slick with dark blood, and the giant beetle lies still and unmoving, you scramble up its back to find\n\t\t\t\t\t\t\t*if pluck = false\n\t\t\t\t\t\t\t\tthe dagger.  Disappointingly, time has turned it to trash; but as you are about to give up and slide back down, you see \n\t\t\t\t\t\t\ta small metallic sphere lodged \n\t\t\t\t\t\t\t*if pluck = false\n\t\t\t\t\t\t\t\tbeneath it \n\t\t\t\t\t\t\tin the carapace. \n\t\t\t\t\t\t\t*goto treasure\n\t\t\t\t\t\t*elseif steel\n\t\t\t\t\t\t\tCracking the monster's shell would be an almost insurmountable task were it not for your new steel sword.  The others' chlén-hide weapons simply skitter off the side of the emerald carapace, but it takes you no more than a few powerful overhand swings to sever its back.  After that, it's less a fight than simple butchery. When the floor is slick with dark blood, and the giant beetle lies still and unmoving, you scramble up its side to find \n\t\t\t\t\t\t\t*if pluck = false\n\t\t\t\t\t\t\t\tthe dagger.  Disappointingly, time has turned it to trash; but as you are about to give up and slide back down, you see\n\t\t\t\t\t\t\ta small metallic sphere lodged \n\t\t\t\t\t\t\t*if pluck = false\n\t\t\t\t\t\t\t\tbeneath it \n\t\t\t\t\t\t\tin the carapace. \n\t\t\t\t\t\t\t*goto treasure\n\t\t\t\t\t\t*elseif (combat > 55)\n\t\t\t\t\t\t\tYou position yourself at the head, where danger is greatest, but also where there are the most vulnerabilities to exploit. The dlaqó attempts to shear you in half with its mandibles, but you slide gracefully back out of reach, studying. The eyes are the only obvious soft spot. You wait until the black scissors snap closed again and step forward, slightly to the side, to ram your sword into one of the amber disks, leaning your full weight upon it.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if combat \u003c 70\n\t\t\t\t\t\t\t\tIt's a perfect kill, but a beetle is a simpler creature than a man, and in its death throws it still manages to surge forward, knocking you to the ground and pinning your leg under one great claw. \n\t\t\t\t\t\t\tWith a great shudder the beast collapses. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if combat \u003c 70\n\t\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\t\t\t*if wound >3\n\t\t\t\t\t\t\t\t\tThe darkness of the tunnel closes in, and though a blurred face holds a torch over you, your eyes cannot focus on it.  Far away, someone is calling your name, but stronger still is the call of the Isle of Teretané. Following that call, you move from this blackness into another, more complete one.\n\t\t\t\t\t\t\t\t\t*set fate \"dead\"\n\t\t\t\t\t\t\t\t\t*finish The Slumber of Death\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tThe others, working in concert, manage to shift the corpse enough for you to drag yourself free. Mercifully there is no break, but the flesh is very torn. $!{wave} begins binding the wound and you pass out at ${wahis} touch.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tYou awake to see your leg wrapped in cloth, only a little blood seeping through.  \n\t\t\t\t\t\t\t\t\t*if Her_dead = false\n\t\t\t\t\t\t\t\t\t\tHeréksa Rayána lifts \n\t\t\t\t\t\t\t\t\t*if her_dead\n\t\t\t\t\t\t\t\t\t\tNirún and $!{wave} lift \n\t\t\t\t\t\t\t\t\tyou to your feet, and you are surprised that you can support your own weight, though the room spins a little dizzily.\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t*goto gotcha\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label gotcha\n\t\t\t\t\t\t\t\tNirún scrambles up the side of the green beetle \n\t\t\t\t\t\t\t\t*if pluck = false\n\t\t\t\t\t\t\t\t\tand examines the knife.  He uses it to lever up the carapace and cuts something free before sliding back down.\n\t\t\t\t\t\t\t\t*if pluck\n\t\t\t\t\t\t\t\t\tand uses the corroded dagger to lever up the carapace and cut something free before sliding back down.\n\t\t\t\t\t\t\t\tAs he returns, you see that in one hand he carries a copper dagger, corroded beyond use, but in the other a small metallic sphere. \n\t\t\t\t\t\t\t\t*label treasure\n\t\t\t\t\t\t\t\t*set eye_aerial true\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tIt looks like a child's ball made entirely of metal, with an iris like a human eye. On the opposite side from the iris is a small protuberance. The rest of the surface is covered in glyphs, some of which are set into inlaid tiles.  \"An Eye of the Ancients,\" says Nirún. \"I wonder what effect it casts?\" You are familiar with Eyes, though you have seen few in your life: magic devices that cast strange spells, when they work at all. Sadly, the blocky language inscribed into the metal is not one you know.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou turn it over and over in your hands, debating whether to push the button and see what happens, and you see painted in lacquer a phrase in a more-flowing script. Nirún places a hand on your shoulder. \"That's Bednálljan Salarvyáni. I might be able to puzzle it out.\" He holds out his hand for the orb. \"May I?\"\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t\t\t\t\t*set nir_rep -1\n\t\t\t\t\t\t\t\t\t\tNirún pulls his hands back, feigning disinterest. \"I thought you might want to know what you had. So you know where to point it. Unless you want to blow yourself up or armor your enemies?\" He arches an eyebrow and waits.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tGrudgingly you angle the Eye so the script catches the light.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#\"Yes, I can't read it.\"\n\t\t\t\t\t\t\t\t\t\tYou shrug and place it in his hand, as he motions $!{wave} to bring a torch closer, before staring at the writing while mumbling to himself. \"I have heard,\" $!{wave} opines slowly, \"that in the time when scholars could read the script of the ancients, some of them would write translations of the names….\"  \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tNirún waves to shush ${wahim}.\n\t\t\t\t\t\t\t\t\"I think it says 'Eye of Aerial Excellence,' though whatever the original text says must be much longer.\" He frowns in frustration, but $!{wave}'s face brightens. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I've heard of that one! It allows a group of people to fly, but I'm not sure for how long…or how many charges are left. It might work once or ten times or not at all.\"\n\t\t\t\t\t\t\t\t*label dlaqoinfo\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t$!{wave} stretches, hands over ${wahis} head, spine cracking. \"Those dláqo live in tombs, feasting upon dead flesh, which means there might still be undead nearby. We should put some more distance between us and that door.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tNirún looks impressed at this unexpectedly scholarly side to your cousin. \"You've turned into quite the tour guide,\" he says with friendly irony.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I get around,\" $!{wave} replies, annoyed. \"Soldiers from $!{Prince} $!{Princename}'s legions have been clearing catacombs in every city they take practically since the war began. Everyone knows the priests of Sárku are loyal to the Emperor.\" $!{wahe} grabs a torch and sets off.\n\t\t\t\t\t\t\t\t*goto Mara\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's a valiant attempt, but the giant's carapace is impervious to your chlén-hide swords, and its bulk such that there's no way to keep it penned in to whittle it down. You must soon chose between letting it escape and pursuing it through the maze of decaying passages. Realizing the latter option to be suicide, you give over the hunt, and watch it trundle off into the darkness, still chattering agitatedly.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto dlaqoinfo\t\t\n\n*label Mara\n*page_break\n*if battlelost\n\tAfter moving further into the cracked and distorted passages of an ancient city, $!{wave} stops in what might be a plaza. $!{wahe} crouches down and dribbles a handful of gravel through ${wahis} fingers.  \n\t\n\t\"We need to talk. The papers I glimpsed, they didn't lead out so much as…down. There's something down here the Generals wanted. Badly. An artifact that could change the war.  Emperor Eternal Splendor was searching for it, but we know where it is.\" $!{wahis} eyes stay focused on the sifting gravel. \"That's where I can get us to. It's our best hope for fulfilling our mission and getting out. That's where I'm going.\"  \n\t\n\t$!{wahe} stands up and dusts off ${wahis} hands before turning to look around the plaza. \n\t*if her_dead = false\n\t\tYou, Rayána, \n\t*if her_dead\n\t\tYou \n\tand Nirún start speaking over each other at once, the words echoing in the darkness, but $!{wave} has already stalked off.\n\t\n\tNirún looks at you.  \"It would make sense.  We certainly didn't try to capture this place for its strategic value.\"\n\t*fake_choice\n\t\t#\"Whatever is going on, we'd better follow $!{Wave} before ${wahe} abandons us down here.\"\n\t\t#\"If they want the artifact and not the city, that means we could redeem the whole defeat!\"\n\t\t\tNirún's eyes are shining in the torchlight.  \"We'd be heroes.  If we came back with this, it'd make our careers.\" Then he looks at you and his face grows solemn.\n\t\t\t*if nir_rep >0\n\t\t\t\t\"We need to work together to get out of here.  There's only \n\t\t\t\t*if her_dead\n\t\t\t\t\tthree \n\t\t\t\t*if her_dead = false\n\t\t\t\t\tfour\n\t\t\t\tof us, and who knows what dangers.  The ${Legionnum} is counting on us now.\n\t\t\t*if nir_rep \u003c=0\n\t\t\t\t\"We need to put everything else behind us and focus on this mission.  The ${Legionnum} is counting on us, and that's all that can matter.\"\n\t\t#\"$!{Wave} already lied to us once, and now ${wahe}'s stalking off, refusing to answer questions.  I don't like it.\"\n\t\t\t\"Don't look at me,\" Nirún says, \"${wahe}'s your cousin.  You talk to ${wahim}.\"\n\t\t#\"Hidden artifacts beneath the earth?  It sounds like a fable!\"\n\t\t\t\"Scoff if you like,\" Nirún says, \"but there are records of such things.  Items that control powerful demons, suits of unbreakable armor.  My grandfather went to Avánthar once and saw a flying chariot with a tube on it that made lightning.\" He pauses for a moment.  \"At least, the woman who guarded and polished it said it could fly and shoot lightning.  Her family had been taking care of it for generations for the Emperors.\"\n\t*page_break\t\nFollowing \n*if battlelost\n\t${wahis} \n*if battlelost = false\n\t$!{wave}'s \nfootsteps through the cracked and distorted passages of an ancient city, with time measured only by the burn of torches, you realize that your group has begun to resemble a small band more than a military hierarchy. The dark, unfamiliar surroundings have stripped all pretense from you. \n*choice\n\t#Fine with me. I just try and keep up morale.\n\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t*set noble %-10\n\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t*set noble %+10\n\t\tYou move between the party members, talking with Nirún about \n\t\t*if her_dead = false\n\t\t\tcontingencies, clapping Rayána on the shoulder, \n\t\t\t*if her_dying\n\t\t\t\tthough she stumbles when you do so, clutching her side, \n\t\t*if her_dead\n\t\t\tcontingencies \n\t\tand calling for breaks when $!{wave} seems stumped.\n\t\t*goto hole\n\t#Not for long. I maintain discipline.\n\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t*set noble %+10\n\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t*set noble %-10\n\t\tYou begin to use full titles, issue minor orders, and request status updates as a way to redraw the boundaries between ranks. \n\t\t*if Her_dead = false\n\t\t\tThe Heréksa immediately adopts a straighter posture and seems \n\t\t\t*if her_dying\n\t\t\t\tencouraged, though she still clutches her side with a grimace. \n\t\t\t*if her_dying = false\n\t\t\t\tencouraged. \n\t\t*comment endif\n\t\t\n\t\tYour fellow Kási gives you a sardonic look, but responds with equal formality, humoring you.\n\t\t\n\t\t*if Her_dead\n\t\t\t$!{wave} however, rolls ${wahis} eyes. \"There are three of us here. Two of you are the exact same rank, and while I'm sure you'd love to take turns ordering me about, I am a bit preoccupied with making sure we don't get lost.\"\n\t\t*if Her_dead = false\n\t\t\tOnly $!{wave} is too preoccupied with ${wahis} task to take any notice, still calling to you as \"$!{name}\" when announcing landmarks or turns, or once, more embarrassingly, \"Tiúni.\" You waffle between chalking it up to honest engrossment in ${wahis} task and to a devious pretense to avoid military subservience. Heréksa Rayána winces in annoyance every time, though she does stifle a choking laugh at the childhood nickname.\n\t\t*goto hole\n\t#I am concerned about $!{wave} being the only one who knows where to go.\n\t\tYou inquire about the route, but ${wahe} responds with open annoyance. \"I had to memorize four different scrolls of notes, none of which are particularly accurate, and half of the landmarks are out of order. So unless you want to die starving down here, please leave me alone to think.\"\n\t\t*fake_choice\n\t\t\t#Well then, I leave ${wahim} to it.\n\t\t\t\tYou fall back as $!{wave} moves forward to run ${wahis} torch over an inscribed pillar.\n\t\t\t#How dare ${wahe}!\n\t\t\t\t*set wav_rep -1\n\t\t\t\t$!{wahe} forestalls your outrage before you can open your mouth. \"Look, you can court-martial me when we get out of the Underworld, but unless you want to do it here and find your own way out, just leave me alone.\" $!{wahe} moves off to examine an inscribed pillar, pretending to be unaware of any further questions. At least the situation has been made abundantly clear.\n\t\t\t#$!{wahe}'s obviously under stress; I try to help.\n\t\t\t\t*set wav_rep +1\n\t\t\t\tYou call a halt right then and there, saying to $!{wave},
