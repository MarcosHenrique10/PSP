  As deaths mount on both sides in the square, you hear the sound of reinforcements coming from within the city. Is it possible to have come so far, only to lose? The plan should have worked!  Eyes fixed upon the gate, you see the lightly armored form of your Signaler slip numbly through the fighting at the base of the gate, pause a man's length away, and extend ${wahis} hand, something glittering in ${wahis} palm.  Then, Karakán's own thunder rips the gate apart.  What is left when vision returns to the world are two bent and twisted halves, hanging crooked on the wall, and a hole opening onto the battle outside. The rank of legionnaires pinned against the wall has taken heavy casualties, with those still standing seeming completely disoriented, but the cry of \"Otuléngba!\" goes up from the ranks behind them, and officers begin signaling the advance through the breach.  \n\t\t\t\t\n\t\t\t\tYour mission is saved, your honor and reputation intact, but how?\n\t\t\t\t*achieve rescue\n\t\t\t\t*page_break Victory!\n\t\t\t\t*goto_scene battlewon\n\t\t\t*elseif her_abandon = False\n\t\t\t\t*label rayanasave\n\t\t\t\tLike the point of a spear, you move forward with Heréksa Rayána fighting at your side.  She displays the cunning and ferocity in battle that won her her promotion.  What seemed at first to be a quick and decisive engagement draws out in the face of the desperation of the defenders and their tactical advantage of holding the wall. Still, though the cost to your handpicked soldiers will be high, victory appears inevitable. \n\t\t\t\t\n\t\t\t\tThe sun is high in the sky (has it been so little time?) when, amidst scattered fighting, a semétl of your soldiers moves to open the gate. As your gaze follows them, you see a javelin flash down at you from the wall above. Then you are falling, pushed to the ground by the Heréksa as the javelin punches through her abdomen. Lying upon the flagstones you see the gate swing open, allowing the legionnaires pressed against the walls to pour into the city. The cry of \"Otuléngba!\" goes up from the ranks, and Heréksa Rayána hoarsely shouts as well, her eyes fixed upon the opening that means success as they dim with her death.\n\t\t\t\t*set her_dead true\n\t\t\t\t*page_break Victory!\n\t\t\t\t*goto_scene battlewon\n\t\t\t*else\n\t\t\t\t*label loc3fail\n\t\t\t\tLike the point of a spear, you move forward. At first the expertise and superior fitness of your veterans seems decisive, but the desperate defenders atop the wall make shrewd use of the advantage of their position. What seemed at first to be a quick and decisive engagement draws out in the face of the desperation of the defenders and their tactical advantage of holding the wall. As deaths mount on both sides in the square you hear the sound of reinforcements, and an instant later they are among you, fighting with a merciless precision, much different from those upon the wall.  A blow crumples your helmet from behind. Lying dazed on the hot paving stones, looking up into a cloudless sky, you hear the fighting around you as your loyal soldiers make a brave attempt to save their beloved kási.  You imagine your legion, pressed up against the city walls, waiting in vain for a gate that will never open. Blinking away this image, you realize time must have passed, because the street is silent, and a shadow leans over you.  Its breath reeks of rotting meat; its skin hangs in papery folds. The undead sniffs at you and, grabbing your ankles, hauls you down beneath the earth.\n\t\t\t\t*set wound +1\n\t\t\t\t*page_break You Awaken\n\t\t\t\t*goto_scene battlelost\n\t\t#From the shadows, I direct my soldiers with a full view of the battle.\n\t\t\tThe first volley of javelins pitches guardsmen over the wall, and their comrades turn in surprise. The battle within the city is engaged, a miniature version of the titanic struggle outside, but of more consequence. As your soldiers advance, you keep your eyes upon the ultimate goal: the gate, which once open will allow your armies to advance into the city, seizing control of whatever mysterious objective has brought them here.\n\t\t\t\n\t\t\t*if tactics >70\n\t\t\t\tWith perfect precision the troops of the ${Legionnum} cut through the feeble resistance of these half-trained excuses for soldiers. \n\t\t\t\t*goto totalvictory3\n\t\t\t*elseif Signaler_present\n\t\t\t\t*goto gate_blown\n\t\t\t*elseif her_abandon = False\n\t\t\t\t*goto rayanasave\n\t\t\t*else\n\t\t\t\t*goto loc3fail\n", "battlelost": "\n*temp her_ok false\n*temp drit_present false\n*set battlelost true\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n[b]Chapter 4: Bitter Defeat[/b]\n\n[i]The Dungeons Below Sangmiré, Summer of 2365 A.S.[/i]\n\n\n*achieve defeat\nYou awaken with a dry mouth, ringing head, and uncomfortably full bladder. The torments of sleep have left you momentarily unsure of where you are. You are not in your familiar tent on your comfortable bedroll. The stinks of dried blood, stale sweat, and human waste assault your nostrils. Your head lies on something soft—someone's leg?—and that same someone is stroking your hair gently, repeating your name in a whisper.\n*page_break\nAnother voice intrudes. \"Will ${PCHe} ever awaken, or can we finally give ${PCHim} up for dead?\" says someone in the precise, cultivated voice that, after another moment of disorientation, you place as Kási Nirún's. \n\n$!{wave}—clearly the lap in which you lie is \n*if wahe = \"he\"\n\this—replies \n*if wahe = \"she\"\n\thers—replies \ncoldly, \"Are you certain you wish to decide which of us to leave for the worms so soon?\" They do not seem to be aware that you are conscious.\n*choice\n\t#I struggle to my feet—they will not decide my fate while I lie helpless!\n\t\t*if Clan = \"Red Sun\"\n\t\t\t*set Noble %+10\n\t\tBrushing off $!{wave}'s hand, you stand, swaying in the darkness.  Immediately Heréksa Rayána begins to report. \n\t\t\n\t\t\"Sir! \n\t\t*if her_captured \n\t\t\tUpon being defeated by that brute in single combat, I was escorted to the makeshift prisoner's camp.  I saw the whole bloody mess unfold from there. \n\t\tWhen the battle was lost, we officers were brought into the city.  The Generals are in the Governor's Palace, but I think we're below the Temple of Sárku. I don't know how long it's been, but we've gotten two meals pushed through the door, so maybe a day?  Of course it feels like an infinity, with all the arguing. Some people don't know the meaning of military discipline.\" This with a look at $!{wave}.\n\t\t\n\t\t\"I know how to follow, when there's a leader worth following, who does more than counsel, sitting still, while our doom approaches!\"\n\t\t*goto torrent\n\t#I let them talk, hoping to gain more information.\n\t\t*set dutiful %-10\n\t\t*if (God = \"Dlamélish\") or (God =\"Hrü'ü\")\n\t\t\t*set noble %+10\n\t\t\"I won't leave ${PCHim} here, and we can't make any meaningful escape carrying a body, so we wait for now,\" $!{wave} speaks in the weary tones of one rehashing the same tired argument.\n\t\t\n\t\t\"Stop speaking of escape. It besmirches the honor of the $!{Legionnum} even to consider \n\t\t*if her_rep >=0\n\t\t\tit, and if the Kási were awake ${pche} would tell you the same.  \n\t\t*if her_rep \u003c0\n\t\t\tit.  If the Kási were awake you could try to convince ${PCHim} otherwise. \n\t\tAs ${PCHe} is not, I am your commanding officer, and I say we will wait with dignity for ransom or sacrifice,\" replies Rayána shortly.\n\t\t\n\t\tNirún sighs. \"I have to agree with the Heréksa's conclusion, if not her reasoning. We're not spies or assassins, who pass through bars like shadows. I can't speak for the Legion of ${legion}, but I have faith in my general and in my clan to pay my ransom, and it won't make matters better to get injured or to increase the price through foolish endeavor.\"\n\t\t\n\t\t\"Ssh! $!{PCHe} is awake!\"\n\t\t\n\t\t*goto flutter\n\t#I groan, saving them from further inadvertent speech.\n\t\t*set dutiful %+10\n\t\t*if (God = \"Hnálla\") or (God = \"Karakán\")\n\t\t\t*set noble %+10\n\t\t*label flutter\n\t\tAs your eyes flutter open, you see three faces leaning over you, indistinct shadows in the dim torchlight.\n\t\t*if her_rep >=0\n\t\t\t\"Thank ${God}, sir! We need your leadership.\"\n\t\t\t\n\t\t\t\"Can't you even let ${PCHim} open ${PCHis} eyes first?  Is it so hard to think for yourself for another minute?\"\n\t\t\t\n\t\t\t*goto torrent\n\t\t*if her_rep \u003c0\n\t\t\t\"Tiúni, I am so glad you have come back to us….\"\n\t\t\t\n\t\t\t\"Chá! Yes, the little bird is glad to have a more receptive ear to chirp ${wahis} foolishness into.\"\n\t\t\t\n\t\t\t\"Won't you two stop pecking at each other and give your Kási some air?\"\n\t\t\t\n\t\t\t*label torrent\n\t\t\tA torrent of argument follows, as if your waking has broken some dam, and now everyone feels free to vent their pent-up worries and fears.  $!{wave} is full of plans for a desperate escape, and Heréksa Rayána is full of disgust at the dishonor of breaking parole.  Nirún, your fellow Kási, seems more stoic and less vocal than the others, occasionally gazing at you with intent scrutiny.\n\t\t\t*if NirBribe\n\t\t\t\t\n\t\t\t\tHe cuts off $!{wave} mid-harangue. \"As I said, I'm sure my clan will pay the ransom, and I don't intend to jeopardize that state of affairs.  Besides, knowing the inducement your Kási requires to direct a tsurúm into a flanking position, I shudder to think of the cost of a daring jailbreak personally overseen.\"\n\t\t\t\t\n\t\t\t\t*if SaveAllies\n\t\t\t\t\tThe words are said with joking irony, an attempt to lighten the mood, but they seem only to inflame Rayána further.  She throws up her hands,\n\t\t\t\t*if SaveAllies = false\n\t\t\t\t\tThe words are spoken with bitter anger and an accompanying glare.  Rayána, overhearing, turns to face you both. \n\t\t\t\t\"Have we abandoned all soldierly virtue here?  No wonder we lost the battle!\" \n\t\t\t\t*set her_rep -1\n\t\t\t*label Breakout?\n\t\t\t*choice\n\t\t\t\t#We should try to escape.\n\t\t\t\t\t*set wav_rep +1\n\t\t\t\t\t*set nir_rep -1\n\t\t\t\t\t*set dutiful %-20\n\t\t\t\t\t*if (God != \"Hrü'ü\") and (God != \"Dlamélish\")\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\tPredictably $!{wave} is smug at your decision, Heréksa Rayána sullen, and Kási Nirún skeptical. You half expect Nirún to elect to stay behind, but as the planning progresses he gets drawn in despite himself. \"I watched the guard patrols the whole first day here, and they're in teams of two.  If you want to be sure of success you'll need four people, two for each guard.\"\n\t\t\t\t\t\n\t\t\t\t\tThe Heréksa bridles at that. \"I can take any one of these pale Sárku-worshipping worms without help! And the Kási as well!\" She eyes $!{wave} skeptically. \"Maybe not the signaler, with those skinny arms.\" Said signaler only arches an eyebrow, not moving from ${wahis} state of repose, but Nirún shakes his head. \"The first rule of engagement is numerical superiority; it evens out the mischances of fate.\"\n\t\t\t\t\t\n\t\t\t\t\tAt least they have stopped arguing over what to do, and have now switched to arguing over the means of doing it.\n\t\t\t\t\t*page_break\n\t\t\t\t\tIt is in the middle of crafting these plans that $!{wave}, watching through the grate lest your discussion be overheard, turns white at the sound of two guards dragging something between them.\n\t\t\t\t\t\n\t\t\t\t\t\"That's torn it. We need to get out of here sooner rather than later. Some of those undead officers must be getting peckish. There was shouting at the end of the hall, and those guards were dragging a corpse. A Green Bough Heréksa in the Legion of ${alliedlegion}, by the clothes and jewelry.\" \n\t\t\t\t\t\n\t\t\t\t\tNirún blanches at the description.  \"Palú, he's a scribe, was a scribe….\" \n\t\t\t\t\t\n\t\t\t\t\tHe is only the first in a steady stream of bodies.\n\t\t\t\t\t*goto Breakout!\n\t\t\t\t#We should stoically await our fate.\n\t\t\t\t\t*set dutiful %+20\n\t\t\t\t\t*if (God != \"Hrü'ü\") and (God != \"Dlamélish\")\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*if (God = \"Hrü'ü\") or (God = \"Dlamélish\")\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\t*set nir_rep +1\n\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\tYour decision leaves $!{wave} the odd one out, and while the others settle into patiently waiting, swapping stories of battles or telling old folk tales, ${wahe} paces the cell like a caged beast before the gladiatorial games.  $!{wahe} doesn't even join in the game of kévuk when Rayána remembers the dice in her kirtle. Instead ${wahe} just leans against the bars of the door, testing the strength of the hinges, or standing on tiptoe, peering out through the grate.\n\t\t\t\t\t\n\t\t\t\t\t\"How does a worshipper of $!{lord} $!{god} have such luck throwing Ksárul?\"\n\t\t\t\t\t\n\t\t\t\t\t\"Oh don't—\"\n\t\t\t\t\t\n\t\t\t\t\t\"Ssh!\"  $!{wave} makes frantic shushing gestures as ${wahe} presses ${wahis} cheek against the bars, straining to listen.  Suddenly ${wahe} jumps back as the sound of two guards, dragging something between them, passes by. When the sound has receded, $!{wave} joins the circle.\n\t\t\t\t\t\n\t\t\t\t\t\"That's torn it. We need to get out of here. Some of those undead officers must be getting peckish. There was some shouting at the end of the hall, and those guards were dragging a corpse.  A Green Bough Heréksa in the Legion of ${alliedlegion}, by the clothes and jewelry.\" \n\t\t\t\t\t\n\t\t\t\t\t\"Oh come now!  How do you get from that to 'they're going to eat him'?  Maybe he was trying some foolish escape attempt and the inevitable happened,\" replies Rayána dismissively.\n\t\t\t\t\t\n\t\t\t\t\t\"No,\" interjects Nirún, \"I know that heréksa. Palú. He's a scribe, no true soldier, and he'd have never been so bold.\"\n\t\t\t\t\t*page_break\n\t\t\t\t\tMore time passes in debate, endless cycles of monotony broken up by meals, and a steady stream of bodies is carried past. $!{wave} begins to suspect soporific drugs in the food, and stops eating the meager mush, while Rayána changes from skeptical to worried. \"Noble sacrifice was one thing, ending as some shédra or jajqi's meal quite another,\" she says and nods determinedly.\n\t\t\t\t\t\n\t\t\t\t\tEscape plans begin to be tossed around….\n\t\t\t\t\t*goto Breakout!\n\t\t\t\t*hide_reuse #I consult with Signaler $!{wave}.\n\t\t\t\t\t\"Look…sir.  We serve no one, least of all ourselves, by moldering away in this tomb.  This backwater is of no strategic importance whatsoever, which means there must be some other reason, some person or object, that brought us here, and we need to find it.\"  $!{wahe} is unusually antsy, ${wahis} voice full of hunger for something.\n\t\t\t\t\t*if wav_rep >0\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Besides…\" ${wahe} looks down.  \"I didn't think you were going to wake up.  Now that you're back among the living, I'd like to keep you that way.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I'll make sure both of us get out of this alive.\"\n\t\t\t\t\t\t\t*set wav_rep +1\n\t\t\t\t\t\t\t*if wave_slave = false\n\t\t\t\t\t\t\t\t\"I know you will.  You've saved me once before.  And these undead are no more wizened, nor more formidable than our clan elders.  It's the others you need to convince.\"\n\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\"Don't say that, Tiúni. We both know there are forces bigger than the two of us.  I can fend for myself; you just make sure the other two don't slow us down.\"\n\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t#\"Thank you for your advice.\"\n\t\t\t\t\t\t\t*if wav_rep >1\n\t\t\t\t\t\t\t\t\"I'm too used to speaking my mind to you to ever withhold it.  The damp, the dark.  We might be back in the dormitory on a winter night, those others just more clan-cousins trying to find sleep.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"Come sit with me. We can close our eyes and pretend.\"\n\t\t\t\t\t\t\t\t\t\tThe two of you pass a short, tranquil time together in the dark.  The others respect the silence, but soon you can tell by the occasional coughs and shuffling that no one has forgotten the need for decision.\n\t\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t\t\t#\"I don't remember the dormitory having quite this smell, or as many undead.\"\n\t\t\t\t\t\t\t\t\t\t$!{wave} laughs.  \"All the more reason to get out of this place.\"\n\t\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t#\"So I'm supposed to risk everyone's lives on your strategic insights?\"\n\t\t\t\t\t\t\t$!{wave} is surly and resentful at your criticism, yet oddly unwilling to defend ${wahis} points. Maybe it's just impossible to command subordinates who are former lovers.\n\t\t\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t*if platform_fight\n\t\t\t\t\t\t\t#\"If you hadn't started that brawl back on the platform, we wouldn't even be here!\"\n\t\t\t\t\t\t\t\t$!{wave} looks surprised at the accusation, but ${wahis} features quickly return to blandness. $!{wahe} makes a too-dismissive gesture. \"I tried to bribe one of the soldiers to get us better accommodations, but apparently the undead aren't as corruptible as living men. Who'd have thought?\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"Am I going to spend my whole life getting you out of trouble?\"\n\t\t\t\t\t\t\t\t\t\t\"Only if you're lucky!\"\n\t\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t\t\t#\"Too bad he didn't take the bribe….\"\n\t\t\t\t\t\t\t\t\t\t\"It's a shame,\" you opine, \"we could have been drinking spiced wine handed to us by exquisite slaves instead of musty water from the hands of surly priests.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"I'll try a bigger sum next time, sir.\"\n\t\t\t\t\t\t\t\t\t\t*set wav_rep +1\n\t\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t\t\t#\"I think you should use less 'initiative' from now on.\"\n\t\t\t\t\t\t\t\t\t\t$!{wave} is more surly and resentful at your order than obedient. Maybe it's just impossible to command subordinates who are former lovers.\n\t\t\t\t\t\t\t\t\t\t*set wav_rep -1\n\t\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t*hide_reuse #I consult with Kási Nirún.\n\t\t\t\t\tThe Kási is lost in thought when you approach. \"I am glad you came to speak with me.  As the two officers, I think it's important we show a united front.\"  He shakes his head.  \"Your subordinates are determined to make this some epic conflict between honor and life, but the truth is soldiers get ransomed every day. The best course is to sit tight, be model prisoners, and wait for our clans to cough up the money. Dhich'uné,\" he spits, \"is fighting a three-front war. And wars go through coins faster than a Jakállan in the House of the Pleasant Hour. He'd be insane to overlook ransom as a revenue source.\" \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"But what if his price is too high?\"\n\t\t\t\t\t\t\t\"I do not know how you left matters with your family, or how such things are handled in $!{Clan}, but I have no worries that any sum will be paid.\"    \n\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t#\"A wise course.\"\n\t\t\t\t\t\t\t*set nir_rep +1\n\t\t\t\t\t\t\t\"I thought so, but your soldiers seem to disagree, or at least prefer interminable argument.  Maybe you should take them in hand.\"\n\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t*hide_reuse #I consult with Heréksa Rayána.\n\t\t\t\t\tThe Heréksa salutes as you approach before launching into an obviously rehearsed speech. \"Kási, sir! It was a battle well-fought; I think we can take pride in that. It would be a shame to tarnish the accomplishment with the type of dealings the Signaler proposes.  A soldier's honor is all that keeps war civilized, and doubly important in wars like this where we fight our own people. We have given our paroles, and it would only lower us in the eyes of the gods to disavow \n\t\t\t\t\t*if her_rep >0\n\t\t\t\t\t\tthem. I trust you to make the noble decision, and in life or death I am proud to stand at your side.\" \n\t\t\t\t\t*if her_rep \u003c=0\n\t\t\t\t\t\tthem.\" \n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*if her_rep >0\n\t\t\t\t\t\t\t#\"And I am proud to stand at yours.\"\n\t\t\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\t\t\tRayána flushes, at a loss for words.\n\t\t\t\t\t\t\t\t*goto breakout?\n\t\t\t\t\t\t#\"I'd prefer a victorious battle to a 'well-fought' one.\"\n\t\t\t\t\t\t\tHeréksa Rayána looks down, teeth gritted at your words.  \"And I wouldn't, sir? I grew up in that legion hall; I know half the men and women dead on that field. But the gods rolled the dice, and we lost. What would you have me do?\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"I'm sorry, I misspoke.\"\n\t\t\t\t\t\t\t\t\t\"No, sir. It's not your place to apologize.  I should not be so free with my emotions, but it's been a trying time.  Whatever you chose, I will follow, as is my duty.\"\n\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t\t#\"I would have you stop being so damned passive and fatalistic!\"\n\t\t\t\t\t\t\t\t\t*set her_rep -1\n\t\t\t\t\t\t\t\t\t\"My honor is the only thing I have that can't be taken. Maybe we'll live, or maybe we'll die; that is out of our hands now, but the one thing we do get to choose is how we go to meet the gods. I won't die a coward, trying to escape my fate.\" Cheeks flushed with emotion, she slams a fist into the rotting mortar.  \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tIn the following silence, with all eyes on her, she breathes deep and straightens. \"I am sorry sir. It was not my place to speak so freely.\" With that, she turns and moves to a corner to lie down and feign sleep.\n\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t#\"The Usurper is an ignoble patricide, unworthy of our oaths.\"\n\t\t\t\t\t\t\t\"That may be, sir, but my honor is between me and Lord Karakán. Prince Dhich'uné's does not concern me, nor does he change the right action.\"\n\t\t\t\t\t\t\tHer face takes on a stubborn cast, making it clear that further debate on the issue is fruitless.\n\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t#\"Thank you for your advice.\"\n\t\t\t\t\t\t\t\"I know I'm not as eloquent as Signaler $!{wave}, but I hope you'll see past the flash to the substance of our points.\"\n\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t*if her_abandon\n\t\t\t\t\t\t\t#\"Where was this devotion to honor when you abandoned me in Sangmiré?\"\n\t\t\t\t\t\t\t\tThe Heréksa flushes, managing to look embarrassed, furious, and indignant all at once. \"It was the same then as it is now.  What you did to those upon the wall was not honorable, and what you propose to do now is not either. I am loyal to my $!{Prince}, but my first loyalty must be to noble action itself. It may seem that we can win by these stratagems, but all we do through our ignobility is erode the social fabric and demean ourselves.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"I didn't realize you felt so strongly about these things, and am sorry to have pushed you.\"\n\t\t\t\t\t\t\t\t\t\t\"Well, sir, I do. My clan and my lineage are not exalted; all I have is the legion and my soldier's honor. It is enough for me.\" She deflates at these words. \"But I think I am angry because there was no path of honor to choose. I did not make matters better by refusing to participate; I only tarred my name with the stain of mutiny. If I must be damned for action, and damned for inaction, I might as well choose that which serves the legion, and I suppose that means obedience, even when I find the acts distasteful.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tShe smiles, an internal argument settled, and salutes again.\n\t\t\t\t\t\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t\t\t\t\t\t*goto Breakout?\n\t\t\t\t\t\t\t\t\t#\"That is some very pretty-sounding drivel.\"\n\t\t\t\t\t\t\t\t\t\tFervent though the Heréksa's opinion on honor may be, she lacks a classical Tsolyáni education, and it is a simple matter for one as well read as you to poke holes in her logical structure, to batter down her arguments with quotes from sages past on duty and obedience. It is clear she reasons with the passion of a child, and her view of honor is as simplistic.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou leave her muttering and angry, but rhetorically out-maneuvered, solidly put in her place.\n\t\t\t\t\t\t\t\t\t\t*goto breakout?\n\t\t\t\t\t\t\t\t\t#\"Your primary honor lies in obedience to your superiors.\"\n\t\t\t\t\t\t\t\t\t\t\"Heréksa, if you are ever an officer, it is clear you will handle matters differently, but here and now nobility for you lies in obedience to me as your Kási. And not only your nobility, but your life as well. I hope that is clear. If you disobey my orders again, I will take discipline into my own hands.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou're braced for a confrontation, so it comes as a surprise when your words calm her. \"You are right, sir. These are not my decisions to make, not here and now.\" She salutes again.\n\t\t\t\t\t\t\t\t\t\t*goto breakout?\n\n*label Breakout!\nWith the prisoner population depleted, your captors become more complacent, and despite Nirún's predictions, only one guard comes to deliver your meal, such as it is. He is not clad in the brown robes of a priest of Sárku, but instead in the uniform of a soldier. Setting down the tray to unlatch the grill, he stifles a big yawn. The others look to you in expectation.\n*if ritual > 10\n\tCursing, you finger the copper chain locked about your ankle, almost dainty enough to serve as jewelry, but with enough heft to interfere with the energies of spell casting.  The guards must have seen your ritual accoutrements as they carried you in, and taken appropriate precautions.\n*choice\n\t#I appeal to his sense of comradeship.\n\t\tLeaning against the bars, you inquire familiarly as to the news. \n\t\t\n\t\tHe stammers, taking in your clan badge and uniform. \"Noble sir, uh, Kási. We are not to speak with the prisoners, sir, my apologies.\"\n\t\t\n\t\t\"Come now! Aren't we all countrymen? Bound by duty to serve temporarily under different princes, but still brothers-in-arms?\"\n\t\t*if diplomacy >50\n\t\t\t\n\t\t\tIt doesn't take much cajoling to crack his resolve. He clearly finds this a lonely and depressing post. While the others drink from bowls of dná porridge you talk with the young soldier, far from home.  \n\t\t\t\n\t\t\t\"Sir, you must have seen or heard…\" he looks down and scuffs a sandal against the stonework. \"I'm sorry that such fine soldiers should come to such an end, but the Illustrious Emperor, and Sárku, and our 'officers' must all have their due.\"\n\t\t\t\n\t\t\t\"Your prince, yes, and your jajqi officers, I have no doubt, but do not tell me this is Sárku's will. He decreed the Concordat as much as any of the gods, and what you are doing to us blasphemes against it. You know this is no way for soldiers to die.\"\n\t\t\t*if diplomacy >60\n\t\t\t\tThe young man clenches his jaw.  \"No. It is not.\" He turns from you, fists balled, back tense, frozen. Then, deflating, he walks away.\n\t\t\t\t\n\t\t\t\tIt is a full minute before you realize you heard the click of the door latch unlocking as he turned.\n\t\t\t\t*achieve silver\n\t\t\t\t*goto run!\n\t\t\t*elseif (diplomacy >55) and (wealth >100)\n\t\t\t\tThe young man clenches his jaw.  \"No. It is not.\" He turns from you, \"But I cannot help. It would mean my family's lives if I let you out.\"\n\t\t\t\t\n\t\t\t\t\"An act of insubordination merits such a punishment, but forgetfulness?  Some small lapse?  I have known many an officer who could be induced to overlook such a thing.  So many soldiers captured; who cares about so few?\"  With these words you drop a small bag of your group's collected personal trinkets through the grate.  It lands upon the stone with a heavy clink.\n\t\t\t\t\n\t\t\t\tThe soldier smiles wryly. \"I seem to have dropped something.\"  He picks up the bag and walks away, \"forgetting\" to latch the door.\n\t\t\t\t*achieve silver\n\t\t\t\t*goto run!\n\t\t\t*else \n\t\t\t\t*goto shutdown\n\t\t*else\n\t\t\tThe soldier is willing to speak of trivialities—this is a lonely and depressing post—but he maintains an emotional distance.  You expect he has learned to ease the burdens of his task by ceasing to view the prisoners as living persons.  As the others eat their thin dná porridge, your wheedling clearly begins to grate. \n\t\t\t\n\t\t\t*label shutdown\n\t\t\t\"I know what you want, and I can't give it to you.  Do you think the others didn't see their ends coming?  You might as well ask me to stop the damned war!  Why can't you just accept your Skein of Destiny? Why must you all make this so difficult?\" His voice rises and cracks until he is shouting.\n\t\t\t*goto wave_motion_gun\n\t#I overawe him with authority.\n\t\tLooking him straight in the eyes, you treat him as any other soldier in need of reporting. \"Private, what's been going on up there?\"\n\t\t\n\t\tHe stammers, taking in your clan badge and uniform.  \"Noble sir, uh, Kási.  We are not to speak with the prisoners, sir, my apologies.\"\n\t\t\n\t\tYou snort.  \"Prisoners! If we'd have met two years ago you'd be taking my orders, and when this has all blown over you will be again, no matter who wins.\"\n\t\t\t\t\n\t\t\"That's assuming we're both alive then, sir,\" he quips in reply, somewhat too impishly.\n\t\t*if diplomacy >50\n\t\t\t\"It's true, neither of us might make it though this war.  But our clans will live on, our families will live on, and one day soon an officer from Clan $!{Clan} will find himself in charge of a soldier from,\" you squint at his badge, then wave dismissively, \"your clan. In any case, do you imagine that if I shouted for your commander, demanded shámtla, and said you had insulted my noble honor, that he would dismiss it?  I may be slated to be fed to the undead, but I guarantee you I could see you dead first. I doubt the jajqi would let your corpse go to waste.\"\n\t\t\t*if diplomacy >60\n\t\t\t\t\n\t\t\t\tFear enters the man's eyes.  \"Sir.  Please…\" He stammers, spins, and hurries away without another word—forgetting, in his haste, to latch the door.\n\t\t\t\t*achieve silver\n\t\t\t\t*goto run!\n\t\t\t*elseif (diplomacy >55) and (wealth >250)\n\t\t\t\tAs you see the fear in his eyes, you decide to pair a treat with the lash.  \"Of course, this need not be an adversarial relationship.  As I said, we are both soldiers in the same army, if one takes the long view.  Why should we not both prosper?\" You absently toss and catch a small bag of your group's collected personal trinkets that meets your palm with a satisfying jingle.\n\t\t\t\t\n\t\t\t\tTorn between greed and terror—how easy men are to control when they give into their basest drives—he glances up and down the corridor before reaching through the grill to pluck the bag from your hand.\n\t\t\t\t*choice\n\t\t\t\t\t#I let him take it.\n\t\t\t\t\t\tAfter hefting the bag in his hand, the soldier reaches up to fiddle idly with the door latch.  He meets your gaze and leaves it unlocked before turning and hurrying away.\n\t\t\t\t\t\t*achieve silver\n\t\t\t\t\t\t*goto run!\n\t\t\t\t\t#I grab his wrist and pull his head into the bars with great force.\n\t\t\t\t\t\t*if combat >60\n\t\t\t\t\t\t\tThere's a sickening crunch, and then the guard's body crumples to the corridor. He never got a chance to latch the door. Opening it is a bit harder, with his corpse serving as a grisly doorstop, but you put your back into it.\n\t\t\t\t\t\t\t*goto run!\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tSeeing your ploy, the guard ignores the purse and snatches back his hand. \"Heréksa!\" he shouts. \"We have a problem prisoner!\"\n\t\t\t\t\t\t\t*goto wave_motion_gun\n\t\t\t*else\n\t\t\t\tHis expression goes slack as he processes the threat; then, in his panic, he falls back on the grunt soldier's first instinct.  \"Heréksa! I need help with the prisoners!\"\n\t\t\t\t*goto wave_motion_gun\n\t\t*else\n\t\t\tThe stress of the battle, and the confinement, and the constant bickering of your cellmates come back to you in a flood of rage.  \"Look, you idiotic peasant!  Let me out of here or I'll wring your neck!\"\n\t\t\t\n\t\t\tAs he backs away from the door nervously, $!{wave} moves to stand at the grill.  \"He didn't mean it.  We've had a very trying—\"\n\t\t\t\n\t\t\tThe soldier cuts her off, reaching out to re-latch the door.  \"You're not getting anything from me, or dragging me down with you. Why can't you just accept your Skein of Destiny? Why must you all make this so difficult?\" His voice rises and cracks until he is shouting.\n\t\t\t*goto wave_motion_gun\t\t\t\n\t#I have already laid a cunning ambush.\n\t\tAs the guard passes through the tray, Heréksa Rayána, hidden to the side of the door, snakes out a hand and grabs his arm, yanking forward to smash his face into the door.\n\t\t*if tactics > 65\n\t\t\tIn the moment while he is stunned, you press a shard of glazed pottery, well stropped in your hours of waiting, to his throat and whisper, \"If you move to shout, I'll cut your throat before sound comes out.\"  The poor man's eyes bulge, and his Adam's apple bobs in a gulp, catching upon the tip of the shard and loosing a trickle of blood.\n\t\t\t\n\t\t\t\"Slowly, undo the door latch.  Now.\"\n\t\t\t*label run?\n\t\t\tHe complies, free hand fumbling at the wood as his eyes remain fixed on yours. In a hoarse voice he pleads.  \"Please, sir…Kási.  We're brother soldiers, aren't we?  I'm just obeying my superiors; let me live.\"\n\t\t\t*choice\n\t\t\t\t#I gag him and leave him in the cell.\n\t\t\t\t\t*if (God = \"Avánthe\") or (God= \"Hnálla\")\n\t\t\t\t\t\t*set noble %+20\n\t\t\t\t\t*if (God = \"Vimúhla\") or (God = \"Hrü'ü\")\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\tThe diciest moment is when $!{wave} slips out the crack in the cell door and around the solider, all while you and the Heréksa hold him immobilized.  His eyes roll back as he attempts to see the figure behind him.  With a theatrical sigh the Signaler takes a length of cloth and, bending forward, transforms it into a surprisingly efficacious gag in a few movements. As your party moves off into the catacombs, your former jailer is left trussed and locked in the cell.\n\t\t\t\t\t*goto run!\n\t\t\t\t#How dare he ask for pity after helping murder so many fine soldiers?\n\t\t\t\t\t*if (God = \"Karakán\") or (God = \"Vimúhla\")\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\t*set dutiful %+10\n\t\t\t\t\tThe diciest moment is when $!{wave} slips out the crack in the cell door and around the soldier, all while you and the Heréksa hold him immobilized.  His eyes roll back as he attempts to see the figure behind him.  $!{wave} raises an eyebrow at you, and in response to your nod places a hand over the captive's mouth.  \n\t\t\t\t\t\n\t\t\t\t\tThe pottery shard is sharp enough for the job, but it is still a grisly affair, with much thrashing and poorly muffled moans.  Best to get out of here quickly.\n\t\t\t\t\t*goto run!\n\t\t\t\t#Someone must pay for subjecting me to these indignities.\n\t\t\t\t\t*set dutiful %-10\n\t\t\t\t\t*if (God = \"Dlamélish\") or (God=\"Hrü'ü\")\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*if God = \"Avánthe\"\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\tWith a smile you respond in a calming voice, \"Of course, we are civilized Tsolyáni, not the beasts you have treated us as.\" His breathing begins to slow, and a light of hope enters his eyes \n\t\t\t\t\t*if tactics \u003c= 65\n\t\t\t\t\t\tas you signal to the Heréksa below view of the slit.  You've never seen someone kill a man with a door before, but Rayána has often boasted that anything is a weapon in her hands.\n\t\t\t\t\t*if tactics > 50\n\t\t\t\t\t\tjust before you stab the shard forward.  There is a quite a lot of blood. \n\t\t\t\t\t*goto run!\n\t\t\t\t#We beat him into unconsciousness but leave him alive, barely.\n\t\t\t\t\t*if (God = \"Karakán\") or (God = \"Hnálla\")\n\t\t\t\t\t\t*set noble %+10\n\t\t\t\t\t*if God = \"Vimúhla\"\n\t\t\t\t\t\t*set noble %-10\n\t\t\t\t\tThe diciest moment is when $!{wave} slips out the crack in the cell door and around the soldier, all while you and the Heréksa hold him immobilized. His eyes roll back as he attempts to see the figure behind him, then roll back even further as he is delivered a powerful blow to the head. The task of bludgeoning him into unconsciousness is quiet, brief, and oddly satisfying.\n\t\t\t\t\t*goto run!\n\t\t*else\n\t\t\tYou stare through the slit, making eye contact.  \"Look, friend, all we want is out of here. Undo the latch, and we'll let you go. Otherwise the good Heréksa will bash your brains out upon this door.\"\n\t\t\t\n\t\t\t*if diplomacy > 60\n\t\t\t\t*goto run?\n\t\t\t*else\n\t\t\t\tThe idiot's sense of fear seems to overwhelm even basic reasoning and he releases large gasping sobs.  \"Oh Karakán, forgive me! Kási, please! I don't want to die in this place. I don't want to be fed to them….\" With a shiver of revulsion his words fade into a keening wail.\n\t\t\t\t*goto wave_motion_gun\n\t*if ritual >10\n\t\t#Damn the risks—I cast a spell!\n\t\t\tYou ignore $!{wave}'s hand motions, urging you to action while the window of opportunity remains, instead moving to the slit only after the guard has restarted his circuit of the cells.  \"Heréksa!\" you whisper, \"Hold my hand, close your eyes, and be ready to grapple that guard on command.\"  Though clearly confused, the Heréksa does as you order, and moves forward as you begin the ritual motions to conjure the spell of Translocation, which will move you back along your personal timeline one hundred paces.\n\t\t\t*if ritual > 45\n\t\t\t\tIn a dizzying instant you both appear a short distance behind the guard, and he is in mid-turn as the Heréksa lunges upon him, wrapping one hand over his mouth.  With a grunt she places another behind his head and twists, snapping his neck.\n\t\t\t\t\n\t\t\t\tAs you bend to remove the key ring from the dead man, she stands panting over him.  \n\t\t\t\t*if (God = \"Karakán\") or ((God = \"Hnálla\") or (God = \"Avánthe\"))\n\t\t\t\t\t\"Sweet $!{lord} $!{god}, forgive me for breaking my oath.\"\n\t\t\t\t*if (God = \"Vimúhla\") or (God = \"Hrü'ü\")\n\t\t\t\t\t\"Lord $!{lord} $!{god}, I offer this death to you as a symbol that nothing will stand between us and victory for your chosen prince.\"\n\t\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\tYou unlock the cell, Kási Nirún giving you an appraising glance.  \"I had no idea you had such talents.\"\n\t\t\t\t*goto run!\n\t\t\t*else\n\t\t\t\tA shocking pain like you have never felt runs through you, emanating from your right ankle, which is smoking and burning, eliciting a scream.  \n\t\t\t\t\n\t\t\t\tThe guard, hearing your scream, runs down the hall to stare open-mouthed.  $!{wave} jumps to ${wahis} feet. \n\t\t\t\t*set wound +1\n\t\t\t\t*goto wave_motion_gun\n\t*if psychic > 10\n\t\t#I telekinetically pick his pocket.\n\t\t\tFeigning disinterest in the proceedings, you direct your psychic energies to lift the copper keys off his belt, sending a prayer of thanks to $!{lord} $!{god} that your captors had no inkling of your psychic potential. \n\t\t\t*if psychic > 50\n\t\t\t\tAs the soldier continues on his rounds, you move to the cell door, gazing down through the bars as you direct the keys into the lock with a satisfying click.\n\t\t\t\t$!{wave} looks on disgustedly.  \"Three damn days we've been trapped in here, and you wake up and bust us out in a handful of minutes! I hate sorcerers.\"\n\t\t\t\t*goto run!\n\t\t\t*else\n\t\t\t\tThe head wound, the poor nutrition, and the dim lighting conspire against you to make the task inordinately difficult, and you can't prevent a tremulous jingling from echoing from the keys as they move through the air. While the guard stares at his floating keyring in shock, $!{wave} jumps to ${wahis} feet. \n\t\t\t\t*label wave_motion_gun\n\t\t\t\t\n\t\t\t\t\"Well, there goes subtlety.  Step back,\" $!{wave} mutters, pulling an Eye from ${wahis} girdle (how did ${wahe} smuggle that in?) and aiming it at the door. A rush of sound booms out, leaving silence in its wake, the door blasted from its hinges and the guard a crumpled heap against the far wall. \"Reinforcements should be here soon. I suggest we run.\"\n\t\t\t\t*achieve rescue\n\t\t\t\t\n\t\t\t\tNot knowing where any paths lead, you flee blindly through the torch-lit darkness, pursued by your own flickering shadows and the echoes of startled guards. You are brought to bay in a dead end, under a high vaulted ceiling. Some old canal or aqueduct?  Around you in niches lie the bones of the dead in cold repose.\n\t\t\t\t*page_break\n\t\t\t\tWhen more guards appear at the vault's mouth, that repose ends in response to their droning chant. The dessicated skeletons begin to move sluggishly from their stone beds, and three of the jailers advance upon you.\n\t\t\t\t\n\t\t\t\t*if combat > 60\n\t\t\t\t\tYou reach out and grab a torch from the wall and, turning your back to the human foes, use the thick oaken weight of it to burn and smash the rising undead.  Behind you, you hear Rayána and Nirún dancing out of the way of the guards, slowly giving ground, the shuffling of their sandals growing stronger. As you thrust the flaming brand into the face of the last mrúr zombie, and its dessicated flesh catches afire, you see lying at its side a copper sword.\n\t\t\t\t\t\n\t\t\t\t\tWith the numbers evened, and you armed, the wormy guardsmen prove little challenge. They soon lie in the recesses alongside the smoldering and smashed remains of their mrúr servitors, while their weapons hang at the hips of your compatriots.\n\t\t\t\t\t*goto run!\n\t\t\t\t*else\n\t\t\t\t\tYou reach out and grab a torch from the wall, then leap forward into the three guards, intent on breaking out of this trap. One takes the flame full in the face and falls, another is too stunned to react, but the third rakes her sword across your side as you pass. The pain is searing but not debilitating. You turn to see a brawl behind you, the shadows of the combatants cast larger than life across the back wall, lit by your torch, but the individuals are too hard to separate in the flickering light.\n\t\t\t\t\t\n\t\t\t\t\tYou do recognize Rayána's berserk scream as she breaks the neck of some opponent. It must have been the priest, for the rising mrúr zombies then lie back to resume their slumber. The others soon become distinct as the fighting stops. $!{wave} and Nirún stand over their fallen foe, and the Heréksa over hers.\n\t\t\t\t\t*set wound +1\n\t\t\t\t\t*if wahe = \"he\"\n\t\t\t\t\t\t*if wav_rep >= Nir_rep\n\t\t\t\t\t\t\t$!{wave} moves forward, \n\t\t\t\t\t\t*if wav_rep \u003c Nir_rep\n\t\t\t\t\t\t\tKási Nirún moves forward, \n\t\t\t\t\t\tunwinding his kirtle and tearing off a length with his teeth, before re-securing the rest. \"We can't have you leaving a trail of blood to show them where we've gone,\" he says, tenderly tying the firyá cloth about your torso. \"Next time, maybe you could enlist our help in your heroics.\"\n\t\t\t\t\t*if wahe = \"she\"\n\t\t\t\t\t\t*if wav_rep >= Her_rep\n\t\t\t\t\t\t\t$!{wave} moves forward, \n\t\t\t\t\t\t*if wav_rep \u003c Her_rep\n\t\t\t\t\t\t\tHeréksa Rayána moves forward, \n\t\t\t\t\t\tunwinding her kirtle and tearing off a length with her teeth, before securing the rest. \"We can't have you leaving a trail of blood to show them where we've gone,\" she says, tenderly tying the firyá cloth about your torso. \"Next time, maybe you could enlist our help in your heroics.\"\n\t\t\t\t\t*comment endif\n\t\t\t\t\t\n\t\t\t\t\tIn haste the guards are stripped of weapons, and their bodies dragged into the wall recesses to lie beside their undead servitors; then, you are once again running through the dark maze.\n\t\t\t\t\t*goto run!\n\n*label run!\n*page_break\n*if Loc3\n\tThis is all horribly familiar, a subterranean version of your previous cat-and-mouse game through the streets above.\nThe size of the labyrinthine catacombs works against the teams of guards sweeping for you. Occasionally you hear their calls or footsteps echo down the brick arches and dim passageways, but these become fainter as time progresses, though this still leaves you lost and trapped beneath the earth. The only known exit is out through the Temple of Sárku above. Perhaps that is why the response has been so indifferent?\n\n\"I think I know a way out,\" $!{wave} says, interrupting your reverie.  \"Before the battle, the Generals were discussing weaknesses of the city, modes of escape for the priests and the jajqi.  There's supposed to be an entrance to the Underworld, the ruins of the old city, down here somewhere.  They had a map.\" $!{wahe} leans against the wall, eyes closed as ${wahe} reaches for the memory.  \"The cells.  I think I could find my way from there—they were marked on the map.\"\n\nMore debate follows over the safety of returning to the cells and the wisdom of going down into the ancient ruins, but even the Heréksa must admit that no better option presents itself.  So, after a brief rest you find yourself retracing your steps—a process itself filled with argument—back toward the monastic cells turned prisons. It turns out to be easier than you would have imagined, once Nirún points out that the vaults become steadily larger and more ornately carved as one heads toward the entrance to the temple above.\n*page_break\nThe corridor before you is once again lit by torches in sconces upon the wall, but now blessedly free of the sound of guardsmen.  \"Turn right. We need to head away from the temple entrance, and then there's a…winding, like a snake, and we go left at the third turn—yes, the third.\" You wish $!{wave} sounded more sure of these remembered directions.\n\nA right turn leads you down another row of cells, their doors open and the straw inside brown with blood. These must be the source of the bodies dragged by. At the far end, one cell remains lighted, and the shadow of a pacing figure moves back and forth before the grate.\n\nAs you step into the light, a startled voice calls out, \"Kási. I…you have come for me.\" Dritlán Núromen's face is wan, his thin frame verging on the skeletal, and his hands as they move to grasp the bars palsied.  \"Excellent. Yes. I very much approve of and sanction your initiative.\"\n*if Loc1 or Loc2\n\t*choice\n\t\t#\"You! This is all your fault!\"\n\t\t\tSeeing the torchlight blaze in your eyes, your commanding officer takes a step back, retreating from the fury of your words. \"You think I'm here to get you out? \n\t\t\t*if Loc1\n\t\t\t\tYou led us into a trap, you puffed-up idiot! Half the battle we're on the sidelines, and then as soon as you do order us to engage, it's right into the jaws of the enemy! What happened to 'an officer on the platform is a soldier's eyes'? Are yours clouded with cataracts? Or is it your brain that has gone all milky and soft?\"\n\t\t\t*if Loc2\n\t\t\t\tIf you hadn't given that foolish order to charge, my tsurúm would still be alive. You were all caution when Kási Nirún's soldiers were being butchered, but then, as soon as you decided to act, caution was replaced by unseemly haste, like some nervous boy in his first whorehouse!\"\n\t\t\t*comment endif\n\t\t\t\n\t\t\t\"Look here!\" He waves his hands before him as if to calm you or deflect your ire. \"It was clearly the prescribed move….\"\n\t\t\t\n\t\t\tThe Heréksa, uncomfortable to see two noble officers fighting, bites her lip and looks from one of you to the other. \"Kási, with respect, I don't think it is our place to criticize the Dritlán. Battles are lost. It was either us or the Scales of Brown, and they are an elite legion.\"\n\t\t\t*choice\n\t\t\t\t#\"You're right, arguing now serves no purpose.\"\n\t\t\t\t\t*set her_rep +1\n\t\t\t\t\t*if saveallies = false\n\t\t\t\t\t\t*set Nir_rep -1\n\t\t\t\t\tRayána bestows a wide smile upon you at your acquiescence. \"Let's just all get out of this place.\"\n\t\t\t\t\t*goto drit_convo\n\t\t\t\t#\"Don't you understand how many of your brothers and sisters he doomed?\"\n\t\t\t\t\t*set Nir_rep +1\n\t\t\t\t\tYou try to contain your rage in order to explain coherently the events of the battle and to make her understand.\n\t\t\t\t\t*if diplomacy > 60\n\t\t\t\t\t\tAs you describe the battle as you saw it, and the missteps that led to defeat, your smooth words and iron logic seem to stifle every one of her objections.  It is difficult to make her understand that it is even possible for an officer to fail the common soldier, and to be held accountable. However, if not fully convinced, at least her faith in the hierarchy has been shaken. She lapses into sullen silence.\n\t\t\t\t\t\t*set her_ok true\n\t\t\t\t\t\t*goto drit_convo\n\t\t\t\t\t*elseif (diplomacy > 50) and (her_rep > 0)\n\t\t\t\t\t\tYou describe the battle as you saw it, and the missteps that led to defeat. It is difficult to make her understand that it is even possible for an officer to fail the common soldier, and to be held accountable. However, she clearly places faith in you, a willingness to accept what you say, even if she herself cannot follow the logic. She lapses into sullen silence.\n\t\t\t\t\t\t*set her_ok true\n\t\t\t\t\t\t*goto drit_convo\n\t\t\t\t\t*elseif (Diplomacy > 45) and (saveallies)\n\t\t\t\t\t\tYou describe the battle as you saw it, and the missteps that led to defeat, but the Heréksa's obedience to authority is so ingrained that she is clearly not convinced, seeing only sour grapes in your criticisms of a superior. Then Nirún pipes up from where he stands in shadow, voice clearly full of emotion.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Soldier, understand that what your Kási is saying is that this 'officer,' if he even deserves to be called such, betrayed the legion. I saw how he wished to sacrifice my tsurúm so as to hoard all the glory himself. He did not make choices upon the platform based on what would lead to victory, but solely upon what would make him seem greatest. What loyalty can you owe such a man? What good can come from following his orders?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou have never heard Nirún speak with such passion before, and Rayána is also clearly moved by his words. She cannot bring herself to speak assent, but turns her face from the Dritlán, unwilling to witness his shame.\n\t\t\t\t\t\t*set her_ok true\n\t\t\t\t\t\t*goto drit_convo\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou describe the battle as you saw it, and the missteps that led to defeat, but the Heréksa's loyalty is so ingrained that she is clearly not convinced, seeing only sour grapes in your criticism of a superior. Aware of her stubbornness, you give up the attempt, addressing yourself once more to your \"superior.\"\n\t\t\t\t\t\t*goto drit_convo\n\t\t\t\t#\"You will lecture me on obedience to authority, Heréksa?\"\n\t\t\t\t\t*set her_rep -1\n\t\t\t\t\tThe Heréksa bites her tongue, but clearly out of discipline, not agreement. Perhaps the irony of the situation is beyond her.\n\t\t\t\t\t*goto Drit_convo\n\t\t#No point bringing up past mistakes….\n\t\t\tHow very magnanimous of you.\n\t\t\t*page_break\n\t\t\t*goto drit_convo\n\n*label drit_convo\n*choice\n\t#I let Dritlán Núromen out of the cell.\n\t\t*label open_cell\n\t\t*set her_rep +1\n\t\t*set noble %+10\n\t\t*set dutiful %+20\n\t\t*set drit_present true\n\t\tYour commanding officer has been greatly reduced. His fine garments are rent and soiled, and his lofty bearing replaced by a stoop-shouldered trembling. He seems aware of these things, and tries to gather what dignity he can about himself. \"Heréksa Rayána. I seem to have been injured; attend me.\" He takes a few shuffling steps into the light, then leans heavily upon her broad shoulder. \"Let us carry on. I shall not slow you. When there is time to stop, you may brief me, but for now…\" His mind wanders for a moment. \"…as you were.\"\n\t\t\n\t\tAs $!{wave} resumes ${wahis} circuitous path through the maze, the two of them move along behind at the far edge of the circle of light.\n\t\t*goto almost_there\n\t#I keep moving; he can rot for all I care.\n\t\t*set dutiful %-20\n\t\tYou grab the torch from the sconce beside his cell, and begin to move down the hallway, ignoring his panicked cries as the darkness envelopes him.\n\t\t\n\t\t*if her_ok\n\t\t\tThe Heréksa looks back, troubled, but says not a word. It is many winding turns before his echoing sobs no longer chase you through the passages.\n\t\t\t*goto almost_there\n\t\t*else\n\t\t\t\"Kási, stop! We can't just abandon him here for the undead. No matter what wrong you imagine he has done you, it is too gruesome, too ignoble.\"\n\t\t\t*choice\n\t\t\t\t#With a sigh, \"You're right.\"\n\t\t\t\t\t*goto open_cell\n\t\t\t\t#\"I've made up my mind.\"\n\t\t\t\t\t*set her_rep -1\n\t\t\t\t\t\"And I have made up mine as well.\" Heréksa Rayána turns from you and unlatches the cell. \"Come, Dritlán.  We'll find our own way out.\"\n\t\t\t\t\t*choice \n\t\t\t\t\t\t#\"Fine. You can both come.\"\n\t\t\t\t\t\t\tWith an amused snort at the drama, $!{wave} turns to trace ${wahis} mental map toward escape.  Rayána allows the palsied Dritlán to lean on her strong frame, and the two shuffle along behind at the edge of the circle of light.\n\t\t\t\t\t\t\t*set drit_present true\n\t\t\t\t\t\t\t*goto almost_there\n\t\t\t\t\t\t#\"Good riddance to the both of you!\"\n\t\t\t\t\t\t\tThe two figures move off down the corridor, back toward the guard barracks, the weak figure of Dritlán Núromen leaning upon Rayána's strong frame. With a snort, $!{wave} moves to continue ${wahis} progress along ${wahis} mental map. At the end of the corridor you turn back to see your superior and your Heréksa as nothing more than a pinprick of dim light in the distance, most likely soon to be snuffed out.\n\t\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t\t\t*goto almost_there\n\t#I have always wanted to get him alone in a dark alley…. \n\t\tThe Dritlán is full of nervous anticipation as you unlatch the cell door, like an animal pacing in a menagerie. He is moving to exit as your fist catches him full on the nose, sending him reeling back.\n\t\t*set her_rep -1\n\t\t*if her_ok = false\n\t\t\tAs you move in for another strike, you feel the iron grip of the Heréksa upon your raised forearm as she hisses in your ear. \"Don't make me choose between my two officers, Kási. Just don't.\"\n\t\t\t*choice\n\t\t\t\t#\"I'm sorry, Rayána, but you need to choose.\"\n\t\t\t\t\t*if (her_rep > 1) or ((her_rep >= 0) and (diplomacy > 50))\n\t\t\t\t\t\tThe buff soldier looks as though she might cry from the days of privation and stress, and now from this. \"Damn it! We're a unit! The ${Legionnum}! I can't choose you, not if you commit this mutiny. Leave him for the mrúr, but don't stain your hands.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"As you will.\"\n\t\t\t\t\t\t\t\tAs you turn to leave the cell, and $!{wave} resumes ${wahis} mental path, Rayána turns deferentially to the Dritlán. \"It is the best I can do, sir.  I am sure they will spare you; no one can afford to alienate Sea Blue in this war. You'll get home yet.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou can barely hear the Dritlán's mumbled reply, \"Yes, but how reduced will I be?\"\n\t\t\t\t\t\t\t\t*goto almost_there\n\t\t\t\t\t\t\t#\"He must die.\"\n\t\t\t\t\t\t\t\t\"Then I must fight you, sir—my honor demands it—but know there is no malice in it.\"\n\t\t\t\t\t\t\t\tShe moves to interpose between the Dritlán and you, standing with the loose, light stance of a wrestler.\n\t\t\t\t\t\t\t\t*goto her_fight\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe soldier nods at your words. \"I respect you, Kási, but I choose him. I will fight you here, and I will die as a loyal soldier of the ${Legionnum}, honor unstained by mutiny.\"  \n\t\t\t\t\t\tShe moves to interpose between the Dritlán and you, standing with the loose, light stance of a wrestler.\n\t\t\t\t\t\t*goto her_fight\n\t\t\t\t#\"Unhand me, or it won't be just his blood I spill.\"\n\t\t\t\t\t*if her_rep >= 0\n\t\t\t\t\t\tThe Heréksa lets go of you, but moves to interpose between the Dritlán and you, standing with the loose, light stance of a wrestler.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Go. Kási, I don't want to fight you. We'll try to find our own way out. Just go.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Good riddance to the both of you.\"\n\t\t\t\t\t\t\t\tAt your dismissive gesture, the Heréksa stoops to help up the tremulous Dritlán. The two figures move off down the corridor, back toward the guard barracks, the weak figure of Dritlán Núromen leaning upon Rayána's strong frame. With a snort $!{wave} moves to continue ${wahis} progress along ${wahis} mental map.  At the end of the corridor you turn back to see your superior and your Heréksa as nothing more than a pinprick of dim light, most likely soon to be snuffed out.\n\t\t\t\t\t\t\t\t*set her_rep 0\n\t\t\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t\t\t\t*goto almost_there\n\t\t\t\t\t\t\t#\"I don't mind a fight.\"\n\t\t\t\t\t\t\t\tYou rush forward to meet Rayána. The two of you meet with a flurry of kicks and grabs, the fighting truly primal.\n\t\t\t\t\t\t\t\t*goto her_fight\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe Heréksa attempts to twist your arm up behind your back, but you break free.\n\t\t\t\t\t\t*label her_fight\n\t\t\t\t\t\t*if combat > 60\n\t\t\t\t\t\t\tRayána lands blows like hammer strikes, and you remember the fighting that won her a battlefield promotion, the ferocity of it. It's such a waste of one so talented to die here, but it is her or you now, and it's not really a contest. You elbow her in the throat, then bring both hands down upon her bowed head. There is an audible snap as you connect. \n\t\t\t\t\t\t\t*label Drit_death\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t\t\tThe Dritlán has backed himself into the corner as you fought, not even noble enough to help the woman who died protecting him—truly one who is used to having others do the fighting and the dying. Dispatching him is a simple act, and he goes trembling and crying to whatever afterlife awaits.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"What an onerous little man.\" $!{wave} wrinkles ${wahis} nose in distaste as ${wahe} turns to survey the corridors.\n\t\t\t\t\t\t\t*goto almost_there\n\t\t\t\t\t\t*elseif psychic >50\n\t\t\t\t\t\t\tThe Heréksa is clearly expecting a physical fight, and is shocked when the first blast of psychic energy punches her in the gut, throwing her across the room. Two more follow before she hits the stone, and there she lies, lifeless as a broken doll.\n\t\t\t\t\t\t\t*goto Drit_death\n\t\t\t\t\t\t*elseif (combat > 50) and (wav_rep > 0)\n\t\t\t\t\t\t\tRayána lands blows like hammer strikes, and you remember the fighting that won her a battlefield promotion, the ferocity of it. You are overmatched in this brutish sort of contest, and you begin to feel worried when one of her blows dislocates your jaw. It is then that you see $!{wave} step up behind her and stab something into her back.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe Heréksa's eyes widen in surprise and she coughs before crumpling to the floor in a spreading pool of blood.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"There was a knife on one of the corpses. You can thank me later; she was about to break your neck.\" $!{wave} sounds smug as ${wahe} turns to survey the branching paths.\n\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\t\t*goto Drit_death\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tRayána lands blows like hammer strikes, and you remember the fighting that won her a battlefield promotion, the ferocity of it. You two are evenly matched in this brutish sort of contest, and you begin to feel worried when one of her blows dislocates your jaw. This is followed by a kick that expels all the air from your lungs.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Take ${pchim} and go,\" she says to Kási Nirún and $!{wave}. \"The Dritlán and I will find our own way out.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe world spins as Nirún and $!{wave} lift you to your feet and begin to move off down the corridor. You can hear, fading as you move, the Heréksa speaking soft words of encouragement to the Dritlán back at the cell.\n\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\t\t*set her_dead true\n\t\t\t\t\t\t\t*goto almost_there\n\t\t\t\t#\"Fine. Get him up, but if he slows us down, we leave him for the mrúr.\"\n\t\t\t\t\tRayána lets go of your arm and moves to help the Dritlán up. Blood is pouring down his face, and his tremors have become bad enough that she must practically carry him from the cell. With an amused snort at the drama, $!{wave} turns to trace ${wahis} mental map toward escape. Rayána allows the palsied Dritlán to lean on her strong frame, and the two shuffle along behind at the edge of the circle of light.\n\t\t\t\t\t*set drit_present true\n\t\t\t\t\t*goto almost_there\n\t\t*if her_ok\n\t\t\tThe Heréksa cries out at your strike. \"I know he has a lot to answer for, but not this way, not mutiny. Leave him for the mrúr, but don't stain your hands.\"\n\t\t\t*choice\n\t\t\t\t#\"As you will.\"\n\t\t\t\t\tAs you turn to leave the cell, and $!{wave} resumes ${wahis} mental path, Rayána turns deferentially to the Dritlán. \"It is the best I can do, sir. I am sure they will spare you; no one can afford to alienate Sea Blue in this war. You'll get home yet.\"\n\t\t\t\t\t\n\t\t\t\t\tYou can barely hear the Dritlán's mumbled reply, \"Yes, but how reduced will I be?\"\n\t\t\t\t\t*goto almost_there\n\t\t\t\t#\"He must die.\"\n\t\t\t\t\t*set her_rep -1\n\t\t\t\t\tShe seems torn, but turns her face from the Dritlán. \"Let it be quick, and let us go and be free of this place.\"\n\t\t\t\t\t\n\t\t\t\t\tIt is quick. Stripped of his rank and finery, the little man has no fight left in him. You spill his blood in sacrifice to, in memory of, all those soldiers whom he condemned to death, and his soul rushes to meet its judgment.\n\t\t\t\t\t\n\t\t\t\t\t\"What an onerous little man.\" $!{wave} wrinkles ${wahis} nose in distaste as ${wahe} turns to survey the corridors.\n\t\t\t\t\t*goto almost_there\n\n*label almost_there\n*page_break\nOne torch has burned down, and the backup gives only a faint flickering light, but even in the dimness you can tell the passages have changed. The brick vaults are now adorned by mosaics and crenelation. In one vast room the ceiling is supported by ranks of elaborately carved columns, proceeding off into the darkness. Kási Nirún steps up to one and runs his fingers reverently along it. \"Engsvanyáli! It must be, look at the capital and the seamlessness of the column itself. We still live in the shadow of their greatness. What do you think this room was before the worm priests came to squat in its ruins?\"\n\nHe beckons for the torch and moves it closer to the column to fully illuminate the detail. In doing so, he reveals a shining pair of eyes on a haggard face that comes lurching out of the darkness.  Nirún, intent on the beauty before him, doesn't notice the monstrous shédra until it is sinking its rotted teeth into his shoulder. The Kási lets out a scream of pain and terror.\n*choice\n\t#I move to save him from the undead.\n\t\t*set nir_rep +1\n\t\t*set dutiful +1\n\t\t*set noble %+10\n\t\tThe shédra is completely focused on the gush of warm blood after wandering so long in the lifeless dark, lurching and grasping at Nirún as he pushes it away, which makes it simple to strike the back of its head with a stone from the floor. Nirún stands before you, panting, one hand on his knee to keep from falling, the other pressed against his shoulder to stanch the flow.  \"Thank you, Kási.\" After a moment he chuckles.  \"I suppose I'll have to use my kirtle to stop the bleeding. If this keeps up, we'll soon be out of clothing.\"\n\t\t*goto zombie_mob\n\t#I flee!\n\t\t*set nir_rep -1\n\t\t*set nir_wound +1\n\t\t*set dutiful %-10\n\t\t*set noble %-10\n\t\tGrabbing $!{wave} you turn and run down the hall, pillars flashing by. Behind you, you hear the low moaning of the shédra followed by a wet smack. Looking back you see that Nirún has headbutted the monster, smashing its skull into the columns. Both the undead and the delicate stonework seem worse for wear. In that moment, Nirún kicks away from his adversary and follows at a fast limp, one hand pressed to the seeping wound in his shoulder.\n\t\t*label zombie_mob\n\t\t\n\t\tThe howls and moans echo from all around you in the darkness, shédra scenting blood here under the cold, damp earth. Like a pack of hounds they bay, the protectors of Lord Sárku's darkest tombs, and you know they are closing in.\n\t\t\n\t\t\"Follow!\" shouts $!{wave}. \"We're so close….\" And ${wahe} is off sprinting.\n\t\t*page_break\n\t\tAt first it seems that you might out-distance them, but the scent of Nirún's blood leaves a trail they cannot lose, and unlike humans the undead feel no fatigue.\n\t\t*if drit_present\n\t\t\tPassing through another beautifully wrought arch, the Dritlán stops to lean, panting against the side.  \"I can go no farther,\" he gasps.  \n\t\t\t\n\t\t\t\"How many can there be?\" asks the Heréksa with hollow bravado. \"This is a good place to fight; they cannot come at us all at once. It'll be short work.\"\n\t\t\t\n\t\t\t\"No.\" The Dritlán's voice is firm, a superior giving orders. \"I'll stay, the rest of you go. It'll be a good end, a proud death, and it will buy you time.\" At Rayána's obstinate look, he smiles wanly. \"Besides, oaf, I have spent too long trying to mold you into some proper form of soldier to waste it all here. Escape. Tell my family of my bravery, and serve some other Dritlán well, so he knows how well I taught you.\"\n\t\t\t\n\t\t\tNirún solemnly grabs the Heréksa's hand and pulls her around.  \"Come. Respect his choice.\" He nods to $!{wave}, who once more begins a steady jog, counting steps and peering at walls as best ${wahe} can in your haste.\n\t\t\t*goto really_there\n\t\t*else\n\t\t\t*choice\n\t\t\t\t#I encourage the others to keep running, helping the slowest.\n\t\t\t\t\tWith marching songs and words of encouragement, you keep the party moving in the face of total exhaustion. The shédra seem content to wait for you to collapse, and just trail along outside the light, like scavengers following a wounded beast. Of course, they don't know what you know—or at least hope—that somewhere soon $!{wave}'s exit to the old city will appear.\n\t\t\t\t\t\n\t\t\t\t\t*if tactics \u003c 60\n\t\t\t\t\t\tIn your eagerness for that exit and your terror of what follows, you move too fast for such treacherous conditions, with dim light and damp stone. Where did the water come from? You slip, twisting your ankle. However, there is nothing to be done for it, and you must soldier on, limping forward despite the shocks of pain at each step.\n\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t*goto really_there\n\t\t\t\t#I find a defensible place to turn and fight.\n\t\t\t\t\tA delicately wrought archway seems to provide some advantage. They cannot swarm you here. The dim torch makes a suitable club for smashing frail bones, as you learn when the swarm comes upon you. Once the first overeager ones are laid out, the others seem to know fear, and like jackals are content to wait and hope one of their compatriots finishes the job.\n\t\t\t\t\t\n\t\t\t\t\tAnd thus you move, pursued by scavengers, occasionally turning to crack the skull of those one or two who venture forward while the rest wait on the sideline. It is not long until, with a trail of dead husks spread out behind you, the others give up the chase. Blood is sweet, but apparently not worth the certain cost.\n\t\t\t\t\t*if combat \u003c 60\n\t\t\t\t\t\tYou are cut and bruised, but victorious. You just hope that shédra bites don't carry some disease.\n\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t*goto really_there\n\t\t\t\t*if psychic >10\n\t\t\t\t\t#I wait for the undead to get close and cast a spell of Terrorisation.\n\t\t\t\t\t\tStanding in the shadow of an arch, you concentrate and wait for the undead to come. The shédra move as a pack, congregating and staying at the edge of torch light as their numbers grow. You fight down the panic; it will not do to lose control of the energies, or to cast too soon and only stop a few.\n\t\t\t\t\t\t\n\t\t\t\t\t\tFinally you judge the moment right and empty your pedhétl of the pressure growing in it as a wave of psychic terror. The mass of undead spins and scatters, like a flock of birds when a cat jumps among them.\n\t\t\t\t\t\t*if psychic \u003c 40\n\t\t\t\t\t\t\tA few, more resistant than the rest or more hungry, press forward, but the numbers are more even now, and the arms and armor of these tomb guards have long ago rotted away. It is a messy, frantic fight that leaves you cut and bruised, but victorious. You just hope that shédra bites don't carry some disease.\n\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\t*goto really_there\n\t\t\t\t*if ritual > 10\n\t\t\t\t\t#I leave a Glyph of Execration as a trap for the undead.\n\t\t\t\t\t\tFirst you must stop and calm yourself. It is hard to cast the spells without your components, all the pieces of ritual gear that help shape the extra-planar energies, but the dancing alone should be enough.  As you dance you draw a glyph in your mind, a glyph of rending and explosion directed at the presence of undeath. When it is firm in your mind's eye, you trace it in blood upon a loose stone.  The blood will draw them; surely one will investigate the smell.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if ritual \u003c 45\n\t\t\t\t\t\t\tAt first you think the Glyph has gone off too soon—the pain and smell of singed hair is so strong—but it is only the damn copper anklet again, siphoning off and letting loose the static energies. You can still move, more a hobble than a run, and you feel that the spell did work, but this is getting dangerous…. \n\t\t\t\t\t\t\t*set wound +1\n\t\t\t\t\t\tIt is not long before you hear behind you a noise like thunder, and smell the dust kicked up.  The baying is mercifully silenced.\n\t\t\t\t\t\t*label really_there\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou pass through another arch and have gone a few steps before you realize your error. This is no simple arch, but a door, a heavy wood door with a substantial bar on this side.  It takes all \n\t\t\t\t\t\t*if her_dead\n\t\t\t\t\t\t\tthree \n\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\tfour \n\t\t\t\t\t\tof you to push it shut. The hinges are somewhat rusted, but like many objects from the ancient days it is in surprisingly good repair. With a hand-span of hardwood between you and the shédra, your group can finally rest, and all fall to recline, propped against the wood, panting through dry throats.\n\t\t\t\t\t\t*if her_dead = false\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tPushing herself up with a weary grunt, Heréksa Rayána moves to crouch before Nirún and, without a word spoken, bandage his shoulder. He looks grateful for her ministrations, and smiles silently.\n\t\t\t\t\t\t*if ritual > 10\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t$!{wave} takes a deep yawning breath and stretches ${wahis} arms toward the ceiling before turning to you. \"We're not going to survive in the Underworld if you burn up like a candle every time you need to cast a spell. The clasp on that anklet can't be too hard to pop. Let me see it.\" $!{wahe} pats ${wahis} thigh, motioning for you to place your ankle in ${wahis} lap. \"Hold the torch.  No, more to the right so I don't block the light.\"  \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou doze off to the rhythm of ${wahis} grunts and tapping as ${wahe} moves your ankle this way and that, but come back to wakefulness at the snap of the clasp disengaging. \"There! It's actually rather elegant.\" $!{wave} holds it up to the light before clicking it closed around ${wahis} own ankle. \"What a nice bauble to reward me for my efforts.\" For that moment in the dark tombs of a rotten god, the face beaming at you in self-satisfaction is that of your old playmate $!{wave}.\n\t\t\t\t\t\t*page_break Into the Depths\n\t\t\t\t\t\t*goto_scene underground \n", "battlewon": "\n*temp punishment 0\n*temp talk true\n*temp humble false\n*temp res_attempt false\n*if her_captured\n\t*set her_dead true\n\n*check_purchase adfree\n*if not(choice_prerelease or choice_is_steam) and not(choice_purchased_adfree)\n\tCome back later to play the next part of [i]Choice of the Petal Throne[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 delay_purchased\n\t*delay_break 7200\n\n*label delay_purchased\n\n[b]Chapter 4: Victory[/b]\n\n[i]The Conquered City of Sangmiré, Summer of 2365 A.S.[/i]\n\n\n*achieve hero\n*if courtmarshal\n\t*set convicted true\n\t*achieve persecuted\n\tThat night, everyone is too busy pacifying—and looting—the city to have much time for you. You're moved to a small room in a modest clan compound.  Through the window you can smell the smoke of fires, hear the marching of cohorts, and see the bright stars overhead. You sleep surprisingly well.\n\t\n\tThe next dawn you wake to $!{wave} entering your room with a clean kilt, belt, and pectoral in ${wahis} arms.\n\t\n\t\"Oh, Tiúni. That little puffed-up dritlán of yours is apoplectic. Too bad he couldn't have taken a wound in the mop-up.\" $!{wahis} tone suggests ${wahe}'s imagining delivering the blow ${wahim}self. Your cousin drops the bundle of clothes on the bed, then sits beside it. \"I think he's trying to hide his fear. I suppose you didn't see, but most of the Scales of Brown's elite troops turned out to be undead. I don't know why anyone's surprised, frankly. It should be clear by now that Prince Dhich'uné does not play by the rules. A cohort of undead, and that moron almost marched your entire tsurúm right into it. If he wasn't from Sea Blue…\"\n\t*choice\n\t\t#\"Look, could you leave me alone?\"\n\t\t\t*set wav_rep -1\n\t\t\t$!{wave} sniffs, affronted. \"Do you know how much it cost me to get this assignment? I thought you'd want to know about the undead, about your case.\" Stiffly ${wahe} turns and walks out.\n\t\t\t*goto courtmarshaled2\n\t\t#\"How are my Heréksa and my soldiers?\" \n\t\t\t$!{wave} seems annoyed by your concern. \"Your tsurúm is mostly intact.  Rayána,\" ${wahe} pronounces the name with distaste, \"is dithering like some clan-girl trying to choose between suitors, secretly hoping someone'll just choose for her. She hopes you get off, but she'd sooner lop off an arm than say a word against Dritlán Núromen.  Anyway, it's yourself you need to be worrying about.\"\n\t\t\t*goto courtmarshaled2\n\t\t#\"I'm happy you came.\" \n\t\t\tA smile lights $!{wave}'s face. \"I had to give away quite a bit of my treasure from last night's looting in bribes to get this assignment, so I am glad you appreciate it.  \n\t\t\t*if saveallies\n\t\t\t\tI'm pretty sure General $!{AlliedGeneral} is going to intercede for you, so just don't say anything so outlandish as to back our General into a corner. I advise 'meek.'\"  $!{wave} squeezes your arm and stands.  \"You'd best hurry. They'll be here for you soon.  Might as well look your best.\"\n\t\t\t\t*goto courtmarshaled2\n\t\t\t*else\n\t\t\t\tI thought you should know about the undead. You were right, and maybe you can use that to your advantage, though in my experience being right never really counts as much in these matters as rank. I want you to know that if they do convict you, I have a backup plan. I—\"  $!{wahe} cuts off at the sound of approaching guards.  \"We'll talk after. Good luck.\" $!{wahe} squeezes your arm and stands.\n\t\t\t\t*goto courtmarshaled2\n*else\n\tSomewhere in Sangmiré a clanhouse is burning, the smell of smoke wafting down the deserted streets. Your tsurúm has been ordered to sweep through this high-clan neighborhood, scouting for pockets of resistance before convening at the Governor's Palace—a plum assignment given in honor of your pivotal role in the town's capture. While other units now prepare to take up the defense on the walls, yours is presented with a first pick at the spoils.\n\t*choice\n\t\t#My soldiers deserve some loot, but I won't tolerate harsh treatment of our countrymen.\n\t\t\t*if (God = \"Karakán\") or (God = \"Hnálla\")\n\t\t\t\t*set noble %+10\n\t\t\tThe Tsolyáni are nothing if not orderly, and you find that little more is required to make suitable remuneration appear than to march your tsurúm to the gates of a clan compound and demand shámtla in the name of your august General (with the implicit threat of breaking down said gate if displeased).\n\n\t\t\t*set wealth +300\n\t\t\t*set wav_rep +1\n\t\t\t*if (her_dead = false)\n\t\t\t\t*set her_rep -1\n\t\t\t\tHeréksa Rayána looks upon all of this with disapproval, refusing to participate, but making no comment. She's too honor-obsessed to take her share, but she's still enough of a veteran to know that the promise of riches is what lures many professional soldiers into life-and-death struggle.  By contrast, \n\t\t\t$!{wave} is in high spirits, joking with ${wahis} fellow soldiers, a belt of forfeited gems twisted about ${wahis} waist.\n\t\t\t*goto honored\n\t\t#A bit of harsh treatment will teach these traitors the error of their ways.\n\t\t\t*if (God = \"Hrü'ü\") or (God = \"Vimúhla\")\n\t\t\t\t*set noble %+10\n\t\t\t*if God = \"Avánthe\"\n\t\t\t\t*set noble %-10\n\t\t\tSingling out a particularly well-appointed clanhouse of Sárku worshippers, you order the door battered down. The compound is far easier to breach than the city walls were, and most of the people inside smarter than to offer resistance. Jewelry and fine garments are taken from, and anger vented upon, the defeated nobles. Kegs of fine brandy are cracked, along with the skull of a loyal retainer who foolishly refuses to step aside.  \n\t\t\t*set wealth +800\n\n\t\t\t*if (her_dead = false)\n\t\t\t\tHeréksa Rayána looks upon all of this with disapproval, refusing to participate, but making no comment. She's too honor-obsessed to take her share, but she's still enough of a veteran to know that the promise of riches is what lures many professional soldiers into life-and-death struggle.\n\t\t\t*comment endif\n\t\t\t\n\t\t\tThe ransacking of the compound has a joyous air until a trio of mrúr zombies are found secreted in a cellar. After the loathsome undead are decapitated, and the bodies dragged into the streets to be doused in brandy and burned, an uglier and more resentful mood takes hold. Objects previously ignored as too bulky to carry off are now smashed, tapestries cut, statues defaced, and any who attempt to intervene are beaten mercilessly.  \n\n\t\t\t*if (her_dead)\n\t\t\t\t*set punishment +1\n\t\t\t*if (her_dead = false)\n\t\t\t\t*set her_rep -2\n\t\t\t\tWhen one drunken soldier slams aside a clan-girl blocking entrance to her quarters, Heréksa Rayána strides forward and backhands the soldier.  \"Stand down!\"\n\t\t\t\t*choice\n\t\t\t\t\t#I do not involve myself.\n\t\t\t\t\t\tThe drunken legionnaire is foolish enough to take a swing at her superior. With a grim smile, Rayána steps aside before slamming her fist into the soldier's gut. As her opponent falls to whimper on the floor, the Heréksa takes your bland expression as tacit approval, and begins to issue orders.  \"Form ranks! We're resuming patrol!\" she bellows, manhandling nearby soldiers into position. A few, fueled by brandy or by rage at the Sárku worshippers, are insolent.  \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Never knew you loved the worm kissers so much.\" \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"…sucker-punched Ngáya 'cause some Sárku bitch was holding out on us.\"  \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe mumbling gro
