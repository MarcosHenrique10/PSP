 have triumphed.\n    \n    Finesse increases.\n\n    It takes you months to recover.  On the upside, you are able to loot her tower fully.  You get quite a nice haul, once you feel up to flying again.\n    *set wealth +2500\n    *set brutality %-15 \n    *if (Callax_With = true)\n        *goto CallaxChoice\n    *else\n        *finish", "goblinhero": "You are lounging on your treasure horde when you hear the sounds of booted feet coming bravely towards your treasure chamber.\n\nThe gait is that of a goblin, but what goblin wears boots? The creature who enters is walking bravely forward, clearly scared of you but secure in the notion that he's doing the right thing.\n\nHe is armed with a small sword—a long knife, really—and wears a crude helmet that clearly used to be a kitchen implement.\n\nHe begins to speak.  Like all goblins, his voice is nasal, but he puffs out his chest and begins to speak in important-sounding tones.\n\n\"O great dragon,\" he quavers, \"I am Thokket of this tribe.  I have known all my life that I am destined for greatness.  Possessed as I am of a noble soul, I have practiced for many months and have mastered the art of martial combat.  In your name, I wish to ride out on the field of combat and prove my worth as a true hero.  One day, I shall return with a great treasure to add to your magnificent hoard.  Will you grant me your blessing on my quest?\"\n\n*choice\n    #Eat him.\n        *label eat\n        Good move.  Experience has shown clearly that heroes are nothing but trouble.  He's got a little more meat on him than your average goblin, which makes his cries for mercy all the more delicious!\n        \n        *finish\n    #Grant him my blessing.\n        *label blessing\n        \"Thank you, master!  I swear that I will make you proud of me!\"\n       \n        Other than encouragement, are you going to help him along in any way?\n       \n        *choice\n            #Give him some real weapons.\n                That's generous of you.  Maybe your investment in him will pay\n                off some day.\n               \n                Do you want to send him off in a general direction?\n                *choice\n                    *if clutchmate_alive\n                        #Point him in the general direction of my clutchmate.\n                            *goto clutchmate\n                    #Direct him toward the capitol of my kingdom.\n                        *goto capitol\n                    #Urge him to attack a neighboring kingdom.\n                        *goto neighbors\n                    #Let him fend for himself.\n                        *goto fend\n            *if clutchmate_alive\n                #Point him in the general direction of my clutchmate.\n                    *label clutchmate\n                    Your clutchmate kills him, but he does manage to annoy Axilmeus somewhat, which is really all you could ask from a minion of his stature.\n                    *finish\n            #Direct him toward the capitol of my kingdom.\n                *label capitol\n                Do you plan to send word of his arrival?\n               \n                *choice\n                    #Tell them to kill the crazed beast.\n                        At a word from you, they kill him.  All's well that ends well, I suppose.\n                        *finish\n                    #Tell them to honor him as a hero.\n                        They welcome the \"hero\" reluctantly into their cities; they give him a small riding pony.  Eventually, he wanders over to the neighboring kingdom in search of treasure.\n                       \n                        *page_break\n                        *goto neighbors\n                    #Tell them nothing; just wait and see what they do.\n                        Humans don't take kindly to hostile goblins; they kill him. All's well that ends well, I suppose.\n                        *finish\n            #Urge him to attack a neighboring kingdom.\n                *label neighbors\n                He manages to get himself killed, but he does do some damage. He proudly carries a banner of your kingdom and yells your name loudly when he rides out onto the field of battle.\n               \n                This starts something of an international incident; the neighboring kingdom begins skirmishing with yours.  You have not heard the end\n                of this.\n                *finish\n            #Let him fend for himself.\n                *label fend\n                Eventually, he wanders over to the neighboring kingdom in search\n                of treasure.\n               \n                *goto neighbors\n    #Test his prowess.\n        You put him through some simple tests of skill and bravery.  He's tougher than the average goblin, but not all that tough; his overabundance of sheer determination to succeed—despite all odds—compensates for whatever he may lack in general prowess.\n       \n        *choice\n            #Eat him.\n                *goto eat\n            #Grant him my blessing.\n                *goto blessing\n            #Forbid him to go questing.\n                *goto forbid\n       \n    #Forbid him to go questing.\n        *label forbid\n        He looks crestfallen.  \"Y—yes, master.\"\n        \n        How pathetic.  You nestle back down into your pile of gold coins.\n       \n        *page_break\n        But he's back again, not a week later.\n       \n        \"Master, I can't ignore my destiny!  I know I risk the ultimate penalty for questioning your will, but I accept that risk willingly!  Please, grant me your blessing to quest in your holy name!\"\n       \n        Persistent, isn't he?  What do you do with a goblin minion who won't take \"no\" for an answer?\n       \n        *choice\n            #Eat him.\n                *goto eat\n            #Grant him my blessing.\n                *goto blessing", "heroes": "There's a traveling party of adventurers in town.  The people are already calling them \"heroes,\" telling tales of their past deeds.\n\nDo-gooders like these can be very dangerous.  What do you want to do?\n\n*choice\n    #Gather information about them.\n        *set cunning %+10\n        *set disdain %-10\n        They're pretty tough!  You really can't ignore them.  They're led by a brash young paladin.  They also have a wizard of some sort, a minstrel bard, a priest of the goddess of war, and a rogue.\n       \n        What now?\n       \n        *choice\n            #Challenge them to a duel.\n                *goto challenge\n            #Kidnap a princess to lure them out.\n                *goto kidnap\n            #Scare them off.\n                *goto scare\n    #Challenge them to a duel.\n        *label challenge\n        Are you really going to fight them directly on the field of battle?\n       \n        *choice\n            #Yes.\n                *set cunning %- 20\n                *set brutality %+ 10\n                *label fight\n                *if brutality>60\n                    You crush them mercilessly.  You are earning your reputation as a wyrm of legend!  Those filthy humans are never heard from again.\n                    \n                    Infamy increases.\n                    *set infamy %+ 15\n                    *achieve villain\n                   \n                    Unfortunately, you failed to notice that their rogue slipped into your treasure trove while you were afield.  He manages to steal a few trinkets before you return to your lair.  At least he was in a hurry, so he missed most of the really valuable stuff.\n                    *set wealth -500\n                    *finish\n                *else\n                    *label losefight\n                    Alas, these adventurers are tougher than they look.  As the wizard ensorcels you, the paladin's longsword cuts deeply into your torso. Even the priest lands a flurry of painful blows.\n                   \n                    You narrowly escape with your life.  They steal as much of your treasure as they can carry, and the bard's songs damage your reputation throughout the kingdom.  Moreover, you can never react quite as quickly as you could before the wizard's spell muddled your thoughts.\n\n                    The worst part is that they trigger revolts against you throughout your kingdom.  It takes you years to reassert control.  Even then, several of the more distant provinces never really recognize your rule again.\n                    \n                    Infamy decreases greatly.\n                    *set wounds +1\n                    *set infamy %- 30\n                    *set wealth -2000\n                    *finish\n            #No, I'm luring them into a trap.\n                You hit and fade, gradually drawing them onto a rickety bridge across a deep chasm.\n                *set cunning %+ 20\n                *set brutality %- 10\n                *label trap\n                *if brutality \u003c 40\n                    You smash the bridge to particles, sending the adventurers hurtling to their doom.\n                    *set infamy %+ 10\n                    *achieve villain\n                   \n                    Well, most of them, anyway.  Unfortunately, you failed to notice that their rogue slipped into your treasure trove while you were afield. He manages to steal a few trinkets before you return to your lair.  At least he was in a hurry, so he missed most of the really valuable stuff.\n                    \n                    Infamy increases slightly.\n                    *set wealth -500\n                    *finish\n                *else\n                    Unfortunately, the heroes see through your feeble trap. Avoiding the bridge, the wizard casts a spell on his party, and they fly up to meet you in deadly combat.\n                   \n                    Alas, these adventurers are tougher than they look.  You narrowly escape with your life.  They steal as much of your treasure as they can carry, and the bard's songs damage your reputation throughout the kingdom.  Moreover, you can never react quite as quickly as you could before the wizard's spell muddled your thoughts.\n\n                    The worst part is that they trigger revolts against you throughout your kingdom.  It takes you years to reassert control.  Even then, several of the more distant provinces never really recognize your rule again.\n                    \n                    Infamy decreases greatly.\n                    *set wounds +1\n                    *set infamy %- 30\n                    *set wealth -2000\n                    *finish\n    #Kidnap a princess to lure them out.\n        *label kidnap\n        Let's be honest.  Are you kidnapping a princess for tactical reasons, or are you kidnapping a princess just because you like kidnapping princesses?\n       \n        *choice\n            #It's not like that!  It's purely strategic!\n                If you say so.\n                *goto princess\n            #A little of column A, a little of column B.\n                I thought as much.\n                *goto princess\n            #Mmmm…princesses…\n                I thought as much.\n                *goto princess\n        *label princess\n       \n        Anyway, kidnapping princesses is your specialty. It helps that her bower is in the highest eyrie in the castle; it's trivially accessible by air.  You rip off the roof, snatch the princess, and fly away chortling.\n       \n        Bound securely in your domain, the princess offers you vast riches if you set her free.  Do you accept her offer?\n       \n        *choice\n            #Yes.\n                *set cunning %- 50\n                *set infamy %- 30\n                The princess runs off without paying.  Eventually, the heroes\n                just wander off.\n                *finish\n            #No.\n                That would undermine your plan, wouldn't it?\n                *goto heroes_arrive\n        *label heroes_arrive\n\n        Eventually, the heroes arrive.  Their leader, a brave paladin in shining white armor, challenges you to a duel.  She is flanked by a wizard of some sort, as well as a priest of the goddess of war and a bard.\n       \n        *choice\n            #Accept their challenge.\n                *goto challenge\n            #Kill them on the spot.\n                *goto fight\n            #Kill and eat the princess before their very eyes.\n                The party of heroes looks crestfallen as you swallow the princess in one gulp; they have failed in their quest.  They turn to beat a hasty retreat.\n               \n                Do you permit them to escape?\n               \n                *choice\n                    #Let them run.\n                        *set disdain %+ 20\n                        Good riddance.  (Burp.)\n                       \n                        They spread word of your might and dominion throughout the land.\n                        \n                        Disdain increases and Infamy increases greatly.\n                        *set infamy %+ 30\n                        *achieve villain\n                        *finish\n                    #Kill them all.\n                        *set brutality %+ 15\n                        The party is disorganized and morale is low; you make short work of them and take their belongings as loot.  They are never heard from again.\n                        \n                        Infamy increases.\n                        *set wealth +500\n                        *set infamy %+ 15\n                        *achieve villain\n                        *finish\n                    #Kill all of them but one.\n                        *set cunning %+ 10\n                        The party is disorganized and morale is low; you make short work of them and take their belongings as loot, but you wisely leave the bard alive.\n                       \n                        She spreads word of your might and dominion throughout the land.\n                        \n                        Cunning increases; Infamy increases considerably.\n                        *set wealth +400\n                        *set infamy %+ 40\n                        *achieve villain\n                        *finish\n    #Scare them off.\n        *label scare\n        At midnight, you strafe the village with your breath weapon.  The commonfolk panic in the streets; the nobles tremble in the comfort of their warm beds.\n       \n        *if infamy > 70\n            The \"heroes\" flee with their lives, saving you a lot of trouble.\n            *achieve villain\n            *finish\n        *else\n            Unfortunately, instead of scaring off the adventurers, your antics strengthen their heroic resolve.\n           \n            The heroes emerge from the local traveler's inn.  Their leader, a brave paladin in shining white armor, challenges you to a duel.  She is flanked by a wizard of some sort, as well as a priest of the goddess of war and a bard.\n           \n            Will you accept the challenge?\n           \n            *choice\n                #Yes.\n                    *goto fight\n                #No, lure them into a trap.\n                    *goto trap\n    #Ignore them.\n        *set disdain %+ 30\n        *if infamy \u003c 30\n            Most of the people think you're not too bad, as powerful dragons who have seized control of a kingdom go.  Many other monsters pose a bigger target for would-be heroes.  The adventurers wander off on an adventure to far-off lands, saving you a lot of trouble.\n            *finish\n        *else\n            Unfortunately, your reputation precedes you.  The heroes have come to take your head as a trophy, and now you have let them set the terms of the battle.\n           \n            Eventually, the heroes arrive.  Their leader, a brave paladin in shining white armor, challenges you to a duel.  She is flanked by a wizard of some sort, as well as a priest of the goddess of war and a bard.\n           \n            Will you accept the challenge?\n\n            *choice\n                #Yes.\n                    *goto fight\n                #No, lure them into a trap.\n                    *set cunning %- 25\n                    *set brutality %- 25\n                    You weren't prepared to lure them into a trap!  You tried to ignore them, remember?\n                   \n                    *goto losefight\n\n", "hibernation": "Many years have passed since you seized control of this kingdom.  It's becoming harder and harder to resist your kind's urge to hibernate.\n\nDragons typically hibernate for at least ten years, perhaps longer.  Some older dragons hibernate for generations.\n\nHow are you going to leave your hoard defended while you rest?\n\n*choice\n    #Set a magical trap.\n        *label trap\n        A clever plan…but beware, magical traps are notoriously unreliable.\n        \n        *page_break\n        *if (cunning > 70)\n            In the years to come, many thieves will try to loot your lair, but none of them will make it past your trap.  Good thing \n            you're so cunning.\n\n            *goto end\n        *else\n            Unfortunately, you're not sufficiently cunning to outthink all of the thieves who will come in the years to come.  Sure, some of them will die in your trap, but a few make it past.  They take some of your best treasure.\n\n            Too bad.\n\n            *set wealth (wealth -2000)\n            *goto end\n        \n    #Prepare an elite squad of goblin guards.\n        *label guards\n        The words \"elite\" and \"goblin\" don't often go well together.  You manage to train up a handful of tougher goblins who seem reasonably loyal.\n\n        *page_break\n\n        *if (brutality \u003c 15)\n            It's hard to train goblins into anything more than marginally sentient minions; you manage it somehow.  Many thieves will try to make it past your guard, but none will succeed.  Of course, once you wake up, you'll have to convince the successors to the elite guard that you trained that they still want to obey you now that they're used to being the big goblins.\n\n            Still, that's a much better problem to have than trying to recover stolen treasure from your hoard.\n\n            *goto end\n        *else\n            Despite your best efforts, they're still just goblins.  They're better than most goblins, but you just don't have the Finesse to make them more than they are.\n\n            Over the years to come, adventurers cut their way through your goblins and loot much of your hoard.\n        \n            *set wealth -2000\n            *goto end\n    #None would dare steal from me!\n        *label dare\n        *if (infamy > 75)\n            You're right.  You're the sort of dragon whom parents use to scare their kids into eating their broccoli.  Even as time passes, your legend remains strong, growing as stories are retold and embellished.  And who would want to bring your wrath down on their whole kingdom by stealing even a trinket?\n\n            *goto end\n        *else\n\n            You're probably right…at least, at first.  But after half a generation or more, humans start to forget their place.  They start to become ambitious.  Uppity, even.\n\n            That's when they'll come after your treasure, with nothing more than some incompetent goblins to defend it.  You will lose much of your hoard.  You just aren't infamous enough to scare them away after time has passed.\n\n            *set wealth -2000\n        \n            *goto end\n    #Try to stay awake as long as possible.\n        The call of hibernation is seductive, but it's not impossible to resist, for a time.\n        \n        Each time you go to sleep, it becomes harder and harder to rouse yourself.  Your nictitating membrane (also known as the \"third eyelid\") starts to dry and crack; your powerful muscles begin to ache; you begin to yawn loudly and frequently, threatening the lives of everyone around you.  \n        \n        How long do you think you can stay awake?\n        \n        *choice\n            #Ten more years.\n                With a little will power, you can manage it.\n                \n                *goto irresistable\n            #Twenty more years.\n                It's a lot of work, but you can do it.  You manage to gather up a bit more treasure in the process, which will make your lair all the more comfortable when hibernation comes.\n                \n                *set wealth +500\n                *goto irresistable\n            #Fifty more years.\n                This is a real struggle.  The first twenty years are barely manageable, but the next twenty or so are almost unlivable.  You manage to gather up some more treasure, but in your state you can barely count it; some of it finds its way into other people's pockets.\n                \n                *goto irresistable\n            #A century or more.\n                I'm sorry, but this just isn't reasonable, even for a mighty dragon like yourself. One night, as you drift off to sleep, hibernation overtakes you.  Since you weren't expecting it, you didn't make proper preparations; you can only hope that your hoard will still be there when you awake!\n                *set wealth -5000\n                *goto end\n\n        *label irresistable\n        Now you really MUST hibernate; you simply can't avoid it any longer.  So, how will you keep your hoard defended?\n        \n        *choice\n            #Set a magical trap.\n                *goto trap\n            #Prepare an elite squad of goblin guards.\n                *goto guards\n            #None would dare steal from me!\n                *goto dare\n\n*label end\n*page_break\nAs hibernation overtakes you, you begin to think back on what you've accomplished, and dream of what lies ahead.  Glory.  Treasure.  Loss.  Revenge.  Victory.\n\nSoon, you will spread your mighty wings and the shadow of your majesty will block out the sun itself. The finest baubles will line the walls of your palaces.  The greatest heroes will fall before your razor-sharp teeth. Soon, the whole world will whisper your name in fear and reverence.\n\nBut for now, you rest.  And wait.\n*page_break\n\nYou finished with the following stats:\n\n*temp wealth_text\n*set wealth_text wealth & \" gold coins\"\n\n*temp wound_text\n*if wounds = 0\n  *set wound_text \"Uninjured\"\n  *achieve flawless\n  *goto chart\n*elseif wounds = 1\n  *set wound_text \"Battle-scarred\"\n  *goto chart\n*elseif wounds = 2\n  *set wound_text \"Permanently wounded\"\n  *goto chart\n*elseif wounds = 3\n  *set wound_text \"Permanently weakened\"\n  *goto chart\n*else\n  *set wound_text \"At Death's door\"\n*label chart\n\n*if brutality >= 80\n    *achieve brute\n*if brutality \u003c= 20\n    *achieve sophisticate\n*if cunning >= 80\n    *achieve machiavelli\n*if cunning \u003c= 20\n    *achieve pure\n*if disdain >= 80\n    *achieve transcendent\n*if disdain \u003c= 20\n    *achieve ruler\n*if infamy >= 80\n    *achieve monster\n*if wealth >= 20000\n    *achieve tycoon\n\n*stat_chart\n  opposed_pair Brutality\n    Brutality\n    Finesse\n  opposed_pair Cunning\n    Cunning\n    Honor\n  opposed_pair Disdain\n    Disdain\n    Vigilance\n  percent Infamy\n  text wealth_text Wealth\n  text wound_text Wounds\n  text Blasphemy  \n\n*goto_scene ending\n", "lair": "You spend several weeks winging your way across the land.  Life as a traveling dragon has much to recommend it—the freedom of the air, the thrill of the hunt, and plentiful sight-seeing opportunities.\n\n*comment DGF \"You have nowhere you can safely rest\"—let's show, not tell.\nOn one particular night, sleeping peacefully under the stars, you awake to find yourself under attack.  A gigantic elder dragon towers before you, whipping you hard with its tail.  It must be at least four times your size!\n\n\"Whelp!  How dare you sleep on my lands?\"\n\n*fake_choice\n  #Apologize.\n  #Act tough.\n  #Plead ignorance.\n  #Fight back.\n  #Play nice.\n\nThe elder dragon treats you with enviable Disdain.  It soundly beats you out of its territory.\n\n\"Find your own lair!\" it chortles.\n\nDespite the advantages, it seems that homelessness has some rather severe downsides. After all, you have nowhere to store your treasure hoard!\n\n*page_break\nA few days later, as you fly along, you see a large hill rising up from the land around it. Forests cover the lower slopes of the hill, giving way to grassy fields and then a rocky crag at the top of the hill.  A large cave mouth opens into the promontory.\n\nWhile you would have to check it out more carefully to be certain, you believe that the hill contains a fairly extensive cave complex.  Plenty of game runs through the forest, with herds of sheep and even cattle in some of the valleys a short flight away.  Looking beyond the immediate environs, several human villages and towns are well within a day's flight, offering the promise of easy pillaging to come, but none are close enough to make harassment and annoyance likely.  In short, it appears to be a perfect lair.\n\n*page_break \nAs you fly down to claim your new lair, you spot a group of small, mostly bald, orange-skinned humanoids outside the cave.  They look up and point at you in terror and alarm.  Some of them flee into the cave, while others bravely shake crude, ineffectual spears at you.\n\n\"Don't eat me!\" jabbers one of the goblins.  \"Eat Grubsh! He's got meat on him!\"\n\nThe goblin who spoke pushes forward one of the other goblins with the butt of his spear.  The other goblin, presumably Grubsh, drops his spear as he shakes in front of you.\n \nHow cute.\n \nWhat do you do?\n \n*choice\n  #Scare them off.\n    A mighty roar and a puff of smoke and fire are more than sufficient to scatter them.  Almost no exertion, and they are gone.  What's more, as you follow them into the cave, you find that they are quickly proffering food before you.\n   \n    It can be good to have respectful minions.\n   \n    Disdain and Finesse increase.\n    *set brutality %-20\n    *set disdain %+20\n    *goto Fighting\n  #Slaughter them all.\n    You pounce on them as they flee into the cave.  You totally devastate them.  By the time they realize that they have no prayer of victory, only two of the attackers are left alive.  They flee, and you enjoy a leisurely afternoon hunt.  Roast goblin makes a pleasant change from your diet of mutton.  You return to your new lair confident that you have taught them a lesson.  Well, perhaps not them personally, but certainly the other goblins….\n   \n    Brutality and Vigilance increase.\n    *set brutality %+20\n    *set disdain %-20\n    *goto Fighting\n \n*label Fighting\n*page_break\nThe cave complex within the hill is everything you hoped for: it's defensible, spacious enough for a good hoard, and full of those greasy little goblins, who quickly acknowledge you as their eternal sovereign and overlord.\n\nThey give you the best of their treasure and the finest of their foods.  Well, almost the finest.  They burn the very best of their foods on a crude altar to their primitive goblin god.  How do you react to that?\n\n*choice\n  #It is good for them to serve their god, as best they can.\n    Even goblins should venerate their god.  That is the divine order.  Their offerings show that they are better than mere animals, and you tolerate and even encourage their offerings to their patron. You also secure the unswerving loyalty of the goblin shaman.  Good job.\n    \n    Honor increases.\n\n    *set cunning %-10\n    *goto A\n\n  #As long as they're loyal to me, I don't care if they worship a unicorn covered with polka dots.\n    The offerings are inconsequential, and you can ignore them easily.  By tolerating their religion, you also secure the unswerving loyalty of the goblin shaman.  Good job.\n    \n    Disdain increases.\n    *set disdain %+10\n    *goto A\n  #I should be the focus of all of their attention, not some stupid god!\n    How dare they offer sacrifices to a god?  Those pieces of meat are rightfully yours!\n\n    You smash the altar, taking time to scrape your claw directly through the image of the goblin god.\n\n    The goblin shaman rushes towards you.  \"You go too far, lizard!  The gods will punish—\"\n\n    That's as far as he gets before you eat him.  Problem solved.\n    \n    Some of the goblins begin offering rudimentary prayers to you.\n\n    *set blasphemy +1\n    *goto A\n\n*label A\n*page_break\n\nThe goblins obey your every command, sometimes even anticipating your desires. They may be stupid, crude, and savage minions, but at least they're your stupid, crude, and savage minions.\n \nLife is good.\n \n*page_break\n \nA few days later, you hear the sound of squabbling from one of the other chambers.  You poke your snout in and see that a rudimentary pit has been arranged and some of the lowest status goblins are being made to battle for the amusement of the chieftain (now your lieutenant).  The fighting is savage, and it's clear that the losers will die.\n\n*choice\n  #They do not have my permission to waste their lives.  This must stop!\n    You rush into the chamber and turn on your lieutenant.  \"How dare you fritter away the lives of my minions for your entertainment!\"\n \n    The former chieftain cowers.  \"I'm sorry, great and mighty dragon.  We meant no offense, but our traditions demand that young goblins see bloodshed to learn bravery.\"\n \n    You smile cruelly. \"You want them to see bloodshed?\"\n    \n    *page_break\n \n    You finish chewing up the former goblin chieftain.  He is a little gristly, but nicely marbled.  The former underchief, your new lieutenant, begs for his life and assures you that the goblins will henceforth only ever fight when you will it.  You do not know if he will be a more acceptable lieutenant than his predecessor, but you decide that he will have a chance to prove himself.\n \n    Vigilance increases, Brutality decreases.\n    *set disdain %-20\n    *set brutality %-15\n    *finish\n  #It is well that they should fight for my amusement.  Bring me some refreshments!\n    The goblins stop fighting when they realize you are present, but you settle in and gesture imperiously for them to continue.  The fights make up for their lack of finesse or skill with a certain raw viciousness tinged with desperation.  Goblins attend to your every whim as you watch the fights; the losers make a pleasant snack.\n \n    Brutality increases.\n    *set brutality %+25\n    *finish\n  #What the goblins do is beneath my notice, as long as they are ready to serve me.\n    Your curiosity satisfied, you return to your main chamber and settle in.  You now simply tune out the sounds of fighting from the goblin quarters.  It is nothing worthy of your attention.\n \n    Disdain increases.\n    *set disdain %+20\n    *finish", "mating": "You spend the next five years leisurely hunting, recounting your hoard, and sleeping for months at a time. It's a pretty nice life, but you also feel quite lonely at times. Occasionally, you imagine what it would be like to find a mate.\n\nYou wake up in the middle of the night on your enormous bed of treasure; you realize that you were dreaming of a romantic partner, one who could put fire in your life again.\n\nWill you try to find a mate?\n\n*choice\n    #No.\n        Very well, it's your decision.\n        *goto ending\n    #Yes.\n        Very well.\n\nWhat gender of dragon will you seek out for a mate?\n\n*temp he\n*temp his\n*temp himself\n*temp him\n*fake_choice\n    #Male.\n        *set he \"he\"\n        *set his \"his\"\n        *set himself \"himself\"\n        *set him \"him\"\n    #Female.\n        *set he \"she\"\n        *set his \"her\"\n        *set himself \"herself\"\n        *set him \"her\"\n    #I don't care.\n        *set he \"it\"\n        *set his \"its\"\n        *set himself \"itself\"\n        *set him \"it\"\n*comment endif\n\nHow are you going to find ${him}?\n\n*choice\n    #Post on an Internet message board.\n        That was just a joke. What are you really going to do?\n        \n        *choice\n            #Go out hunting for ${him}.\n                *goto hunting\n            #Use a network of human spies to seek ${him} out.\n                *goto spies\n            #Just wait in my lair; eventually ${he} will find me.\n                *goto wait\n    #Go out hunting for ${him}.\n        *label hunting\n        The problem with going out and hunting is that you must leave your treasure hoard unattended for some time.  In your absence, someone may try to steal your treasure.\n        \n        How concerned are you about this?\n        \n        *choice\n            #Extremely concerned.\n                That's understandable.  Do you still want to go hunting at all?\n                \n                *choice\n                    #No, I'll just stay in my lair.\n                        *goto wait\n                    #Yes, but I'll stay close by to minimize risk.\n                        Hey, at least you're trying!  I respect that.\n                        \n                        *goto closeby\n            #Somewhat concerned.\n                That's only reasonable.  How far are you willing to go to hunt for a mate?\n                \n                *choice\n                    #Not too far. I have my hoard to think about.\n                        *label closeby\n                        You patrol the countryside, careful not to wander too far from your usual territory.\n                        \n                        Unfortunately, you can't find another dragon in such a small area; you probably would have heard of ${him} already if ${he} were already so near.\n                        \n                        What are you going to do now?\n                        \n                        *choice\n                            #Give up.\n                                Well, at least you tried.\n                                *goto ending\n                            #Broaden the hunt a little.\n                                *goto normalhunt\n                    #A significant distance.\n                        *label normalhunt\n                        You travel hundreds of miles, sniffing the air for the scent of a fellow dragon.\n                        \n                        Unfortunately, you aren't able to completely defend your lair from thieves while you are abroad. You'll return to find that a fraction of your treasure trove has been stolen…nothing too pricey, but you'll miss that jewel-encrusted goblet.\n                        *set wealth -100\n                        *goto huntmate\n                    #I will travel to the seven corners of the earth if need be!\n                        That's dedication!\n                        *label stop_at_nothing\n                        \n                        Unfortunately, your unwavering efforts to find a mate are incompatible with defending your lair.\n                        You'll return to find that a noticeable fraction of your treasure trove has been stolen;\n                        your jewel-encrusted bed just won't be the same.\n                        *set wealth -750\n                        *label huntmate\n                        \n                        *page_break\n                        Eventually, you find a suitable mate in a nearby kingdom.\n                        *goto matefound\n            #Not at all concerned.\n                Why aren't you more concerned?\n                \n                *choice\n                    #True love is worth far more than gold.\n                        I suppose you're right.\n                        *goto stop_at_nothing\n                    #No one would dare steal from me!\n                        *if infamy > 70\n                            Good point.\n                            *goto huntmate\n                        *else\n                            You overestimate your reputation!  You'll return to find that a noticeable fraction of your treasure trove has been stolen; your jewel-encrusted bed just won't be the same.\n                            *set wealth -750\n                            *goto huntmate\n                    #I don't really have that much gold to lose.\n                        *if wealth \u003c 500\n                            I suppose you're right!\n                            *goto huntmate\n                        *else\n                            You underestimate your wealth!  You'll return to find that a noticeable fraction of your treasure trove has been stolen; your jewel-encrusted bed just won't be the same.\n                            *set wealth -750\n                            *goto huntmate\n                    #Are you calling me a coward?\n                        No!  No, no.  N—never mind.  Forget I asked.\n                        *goto huntmate\n    #Use a network of human spies to seek ${him} out.\n        *label spies\n        *if disdain > 60\n            Your spies do their best, but you've been keeping mostly to yourself in your lair; you don't have a very extensive network to call upon.\n            \n            Unfortunately, they haven't even heard of another dragon for miles.  What will you do now?\n            \n            *choice\n                #Give up.\n                    Well, at least you tried.\n                    *goto ending\n                #Go out hunting for a mate.\n                    *goto hunting\n        *else\n            Your spies report a suitable mate in a nearby kingdom.\n            *goto matefound\n    #Just wait in my lair; eventually ${he} will find me.\n        *label wait\n        Could it really be that easy?\n        *comment TODO should this work?\n        *goto ending\n\n*label matefound\nMore than one, actually.\n\nTo the north, you find a green dragon with a long spiked tail and kite-shaped plates on ${his} back. $!{he} terrorizes the countryside with ${his} fiery breath.\n\nTo the west, there's a subtle, elegant black serpent.  They say that ${he} sometimes takes human form and walks among the people, whispering in the ears of kings.\n\nTo the south, you encounter an enormous scaly sea-monster; when ${he} breaches, ${he} leaps out of the water seven times without exposing all of ${his} scales to the air. $!{he} has dragged countless ships to the bottom of the sea, where ${he} keeps a vast hoard of ancient treasures.\n\nTo the east lives a strange five-clawed luck dragon with flowing whiskers, revered by the humans around ${him} as like unto a god.\n\nWhich of these mates most interests you?\n\n*temp keystat\n\n*choice\n    #North.\n        *set keystat \"brutality\"\n        *goto attract\n    #West.\n        *set keystat \"cunning\"\n        *goto attract\n    #South.\n        *set keystat \"finesse\"\n        *goto attract\n    #East.\n        *set keystat \"infamy\"\n        *goto attract\n\n*label attract\nExcellent choice.  Now, you'll need to do something to impress ${him}.\n\n*choice\n    #Destroy a nearby village, to demonstrate my strength.\n        *if brutality > 70\n            *set infamy %+ 15\n            You smash a nearby hamlet to splinters, killing most of the humans who live there.\n            \n            Infamy increases.\n            \n            *if keystat=\"brutality\"\n                *goto success\n            *else\n                Unfortunately, this dragon is quite territorial, and is not the least bit impressed by your Brutality.\n                *goto failure\n        *else\n            You make a serious effort, but this is not the first time these cities have been assaulted by dragons; they are well defended.  You do some damage, but nothing to write home about.\n            \n            Your potential mate is not the least bit impressed with your feeble accomplishments.\n            *goto failure\n    #Make graceful loops in the air, to display my maneuverability.\n        *if brutality \u003c 30\n            You climb skyward on powerful wing strokes, then descend in a deep dive, pulling up at the last minute. You blot out the sun with your wingspan as you perform cartwheel after effortless cartwheel.\n            \n            *if keystat=\"finesse\"\n                *goto success\n            *else\n                Unfortunately, this dragon is quite territorial and is not the least bit impressed by your Finesse.\n                *goto failure\n        *else\n            You climb skyward on powerful wing strokes, then descend in a deep dive, pulling up just before you hit the ground. You try to roll into a cartwheel, but your right wing muscles cramp up just as you're about to start it, so the cartwheel looks more like a mistake than a display of aerial Finesse.\n            \n            Your potential mate is not the least bit impressed with your feeble display.\n            *goto failure\n    #Challenge ${him} to a game of wits, to show off my intelligence.\n        You challenge ${him} to a game of chess.\n        \n        Do you cheat?\n        *choice\n            #Of course not!\n                *if cunning > 70\n                    *if keystat=\"cunning\"\n                        Cleverly, you manage to win the chess game, but not so thoroughly as to offend your potential mate.\n                        \n                        *goto success\n                    *else\n                        Dragons love chess, but they love winning most of all.  You win the game, but instead of earning your potential mate's affection, your victory seems to poison ${him} against you.\n                        *goto failure\n                *else\n                    You lose.  This does not impress your potential mate in the slightest.\n                    \n                    *goto failure\n            #Maybe a little.\n                *set infamy %- 10\n                Cheating at chess is neither cunning nor honorable; dragons have very good memories. The dragon catches you cheating, which is a bit embarrassing for both of you.\n                \n                Infamy decreases.\n                \n                You can't talk your way out of a faux pas like this.\n                *goto failure\n    #Make an offering of an enormous sapphire, to exhibit my wealth.\n        *set wealth -500\n        What a lovely gem!\n        \n        Unfortunately, this dragon already has quite a bit of ${his} own treasure, and is not the least bit impressed by your display of wealth.\n        *goto failure\n    #Spread rumors of my impending arrival, highlighting my fearsome reputation.\n        *if infamy > 70\n            The whole kingdom is talking about you.  They whisper of your terrifying deeds and your lair filled with unimaginable treasures.\n            \n            *if keystat=\"infamy\"\n                *goto success\n            *else\n                Unfortunately, this dragon is quite territorial and is not the least bit impressed by your reputation.\n                *goto failure\n        *else\n            You try to get a few people to talk about you, but you are, for the most part, unknown in this region.  Rumors about you are quickly confused with rumors about your potential mate; suffice it to say that ${he} is not the least bit impressed with your efforts.\n            *goto failure\n    #Steal some of ${his} gold and fly off.\n        *set cunning %+ 30\n        *set wealth +1000\n        Very clever of you.  \n        \n        Cunning increases.\n        \n        Of course, this doesn't help your chances with your potential mate at all, but you do manage to sneak off with two big talons full of rare loot.  You return to your lair before ${he} even notices anything is missing.\n        *goto ending\n\n*label failure\n$!{He} rejects your advances, and eventually you return home to your lair…alone.\n*label ending\n\n*page_break\nTime passes.  Eventually, the compulsion to find a mate passes, too.\n\nYou still feel pretty lonely, but over time, you won't mind it as much.\n\n*finish\n\n*label success\n\"Most impressive,\" ${he} says.\n\n*comment DIALOG: If I try to put in real dialog here, I'm going to need to fork at least 4x.  I'm not going to do it :-)\n\n$!{he} invites you to join ${him} in ${his} lair.\n\n*choice\n    #Accept the invitation.\n        You spend a delightful evening in ${his} lair.\n        \n        *label victory\n        *page_break\n        Congratulations; you have found a mate.  What will you do now?\n        *achieve lover\n        \n        *choice\n            #Move on; I can't be tied down like this.\n                Indeed, the life of a dragon is solitary by nature.  You bid your mate a fond farewell, then return to your lair, invigorated, but exhausted.\n                *finish\n            #Move in to ${his} lair, abandoning my kingdom.\n                You end the tyrannical reign of your own kingdom.  Your former subjects rejoice, celebrating in the streets; you no longer care.  You and your mate huddle together on an enormous treasure hoard (including both ${his} riches as well as your own) and begin a tyrannical reign over this new kingdom.\n                \n                Here, our story ends.\n                *page_break\n                *goto_scene ending\n            #Invite ${him} to live in my lair.\n                $!{he} graciously accepts.  Your kingdom now has two tyrannical dragons ruling over it. You will make a fine pair.\n\n                You spend many joyful years together before ${he} settles down for a long hibernation.  You will have to be all the more vigilant to protect your lair now that it contains your sleeping mate.\n                *finish\n    #Spurn the invitation.\n        Are you just playing \"hard to get,\" or are you really rejecting ${him}?\n        \n        *choice\n            #I'm moving on, now that the hunt is over.\n                Fair enough.\n                *goto ending\n            #I'm just flirting.\n                *set cunning %+10\n                \n                It works; ${he} becomes all the more enamored of you.  You wind up spending a delightful evening in ${his} lair.\n                *goto victory\n            #I'm going to try to get one of the other dragons.\n                Unfortunately, spurning a dragon gives you a bit of a reputation.  None of the other dragons will have anything to do with you at this point.\n                \n                *goto ending", "queenpolitics": "You look down from your lair at the lands beyond your mountain. Those green lands are full of humans, and humans have large reserves of livestock and rich treasure. Shouldn't that food and wealth be yours instead?\n*fake_choice\n    #It certainly should, and now!\n        That's what I thought.\n    #You mean it isn't already?\n        Ummmm…no, it isn't.  You're right to think that it's as good as yours, but you'll need to do something to actually take possession.\n    #Nothing enlivens a lair like cringing humans carrying tribute.\n        How true, how true.\n*comment endif\n\nLet's be clear about why you plan on conquering the humans.  What's most important to you?\n*fake_choice\n    #I need to ensure a steady supply of prey.\n        The humans should have vast herds of cows and horses. Intimidate them into bringing you some weekly, and you'll have that much more time to eat.\n    #I need an easy supply of princes and princesses to kidnap. I'm a stickler for tradition.\n        What's a lair without a captive royal to chat with? Besides, kidnapping royalty brings knights in shining armor, and they're always particularly \n        tasty.\n    #I need heaping great piles of gold and loot to adorn my lair.\n        Dragons without hoards are nothing more than scaly failures. You can hear the gold sing to you, and you want more of it.\n    #I want to make humans into my terrified subjects.\n        Goblins are nice, but it's your right to have a better cut of minions. Cringing human slaves really brighten up the ol' lair.\n*comment endif\n\nYou push off from your rocky spire and glide outwards on the wind. You smell the faint scent of human cooking fires. Where to start?\n\n*temp DidSomething false\n\n*label main\n*choice\n    *hide_reuse #Conquer the nearby village.\n        *set DidSomething true\n        Why the nearest village?\n        *fake_choice\n            #It's better to start small and see if they have any defenses.\n                Good thinking!  Clever planning like this will be useful later on, when you'll face more worthy opponents.\n            #People should learn that living near me is a terrible, terrifying idea.\n                Oh, they'll learn that soon enough.\n            #I just want to burn peasants (and their thatched-roof cottages)!\n                *comment This is a gag; a riff off of the Homestar Runner/Strong Bad email Trogdor. http://www.homestarrunner.com/sbemail58.html\n                I should've known.\n        *page_break\n        *label ConquerVillage\n        You soar above the local village.  From here you can see fields of crops, shepherds with their flocks, and a few wagons filled with vegetables. It's fairly small, though.  In the center of the village you can see a hanging banner, displaying the livery of the queen.\n\n        What do you do to the village?\n        *choice\n            #Set the town afire and suffer no one to live.\n                You make several passes, lighting the buildings on fire.  As the people pour out of their homes, you touch down periodically to eat a few and mangle a few more, and then you lift off again to catch a few people who thought they could escape.  Finally, the only people left alive are a handful of farmers cowering in a golden wheat field.  You fly past, allowing them to think they've evaded you, and then with a single puff you light the whole field afire, burning them alive.\n                \n                Brutality and Infamy increase.\n\n                Your attack on the village was savage.  Why did you destroy it, anyway?\n                *set brutality %+20\n                *set infamy %+10\n                *comment Wanton destruction is good for boosting infamy, but not as good as leaving people to talk about you.\n                *fake_choice\n                    #I needed to set an example.\n                        I think we can all agree that the burnt out wreckage of the village provides an excellent example, warning other villages nearby to…ummm…well…not exist, I guess, since that's the only offense that I can think of that this village committed.  Good work.\n                    #It's fun.\n                        That's what I always say: burning a village and killing everyone in it is just good, clean fun.  Oh, wait, I never say that.\n                *comment endif\n\n                Anyway, there's nothing left of the village.  I guess the rest of your plan for dominance will need to unfold elsewhere.\n                *goto VillageNextStep\n            #Destroy a few buildings before conquering the village.\n                You swoop downwards and set the largest building in the village on fire with a single breath.  Humans rush out of the building and stop in their tracks, clearly terrified of you. What do you say?\n                *choice\n                   #I roar, \"Grovel before me, humans, or be devoured!\"\n                       They grovel. Oh, how they grovel. There's no one here who would even think of challenging you, so they squirm on the ground and sing your praises. They're planning to betray you, of course, but for now they're terrified and docile.\n                       *goto DoneScaring\n                   #I say, \"Behold, I am your new liege lord. Unless any of you brave enough to stand against me—?\"\n                       Several brave (or perhaps stupid) peasants actually step forward.\n  \n                       How do you punish this effrontery?\n                       *label effrontery\n                       *choice\n                           #Eat them.\n                               Munch, crunch, munch.  They are a little tougher than you prefer—hard work will do that to livestock—but they have a nice flavor, probably a result of their high-grain, low-meat diet.\n                               *goto quashed\n                           #Breathe fire on them.\n                               Foosh!  You incinerate them in a blast of dragonfire.\n                               *goto quashed\n                           #Rip them apart with my claws.\n                               These peasants aren't worthy of being eaten by a dragon like you.  You shred them effortlessly.\n                               *goto quashed\n                           *hide_reuse #Smile kindly at them and offer them some treasure.\n                               Nah, only kidding. Pick a different choice.\n\n                               *comment DGF Previously, \"smile kindly\" added to brutality and disdain, but that makes no sense.\n                               What do you actually do?\n                               *goto effrontery\n\n                       *label quashed\n\n                       Once the survivors see what defiance gets them, they quickly fall in line. Until they try to betray you by sending messengers to their queen, \n                       this village is yours.\n                       *goto DoneScaring\n                *label DoneScaring\n\n                You eat a bellyful of their sheep, take what few valuables they have, terrify them again for good measure, and take to the air.\n                \n                Infamy increases; Brutality increases slightly.\n                *set infamy %+15\n                *set brutality %+5\n                *set wealth +500\n                *goto VillageNextStep\n            #Demand their surrender and obeisance.\n                You land in front of the largest group of humans and say, \"Grovel before me, humans, or be devoured!\"\n\n                They grovel. Oh, how they grovel. There's no one here who would even think of challenging you, so they squirm on the ground and sing your praises. They're planning to betray you, of course, but for now they're terrified and docile.\n\n                The humans offer you the meager tribute that their village can muster up.  It's not much, but every gold coin counts.  With a belly full of their sheep, you take to the air again.\n                \n                Finesse increases; Infamy decreases.\n\n                *set brutality %-15\n                *set infamy %-10\n                *set wealth +750\n                *goto VillageNextStep\n\n        *label VillageNextStep\n        *page_break\n        What's next?\n        *goto main\n\n\n    *hide_reuse #Fly directly to a big city and confront the human queen there.\n        *goto BigCity\n\n    *hide_reuse #Head to the mountain pass used by all the merchants.\n        *set DidSomething true\n        Interesting choice.  Why start with the mountain pass?\n        *choice\n            #Control trade, and I'll control the kingdom.\n                An insightful analysis.\n\n                Cunning increases.\n                *set cunning %+15\n                *goto MountainPass\n            #Merchants are rich and cowardly. If they want to pass into the kingdom, they can afford to pay me well.\n                Rich and cowardly—really, is there any better victim?\n                *goto MountainPass\n            #Merchants taste good, and so do their horses.\n                Blood-curdling fear and seared horse flesh: two great tastes that taste great together!\n                *goto MountainPass\n            #Hijacking a few wagon trains is an easy way to decorate my lair.\n                Indeed, your lair is badly in need of a little sprucing up.\n                *goto MountainPass\n        *label MountainPass\n        \n        There's one main pass through the mountains that all merchants use, mostly because it has a good road. The human queen has her own toll booth here. You can see a line of wagons making their way through the pass even now. How do you want to handle this?\n\n        *choice\n            #Be sneaky and terrify the toll keepers into giving me all the money they collect.\n                You can be stealthy when you put your mind to it, and you can be patient. You wait until dark before you stalk close to the toll keepers' blockade. When he comes outside to answer the call of nature, you rise up suddenly in front of him.  His scream is a delight to hear.\n\n                What do you ask for?\n                *choice\n                    #\"Turn over every penny you have collected in tolls, or I will eat you!\"\n                        Terrified or not, the toll keeper manages to stutter out, \"That's nothing but highway robbery!\"\n\n                        How do you respond?\n                        *choice\n                            #Eat him.\n                                Brutality increases.\n                                \n                                The toll keeper is tasty, but now that you've eaten him, he can't give you any money; you need a new strategy.\n                                *set brutality %+10\n                                \n                                What do you do?\n                                *choice\n                                    #Set up my own toll operation.\n                                        *goto OwnTolls\n                                    #Seize the caravan that's in the pass.\n                                        *goto SeizeCaravan\n                                    #Abandon the mountain pass.\n                                        *goto MountainNext\n                            #Show my teeth and convince him it's a fine idea anyway.\n                                He certainly agrees once he realizes that any other answer means being eaten. He turns over all their gold to you and promises that he'll send a letter to the queen to get official permission. You think he may be lying, but you have a steady inflow of gold tribute regardless.\n                                *set wealth +1500\n                                *goto MountainNext\n                            #Discuss the nature of taxation in the feudal state and explain that highway robbery isn't much of a change.\n                                *set brutality %-30\n                                \"It is the nature of the world that the strong take from the weak,\" you say.  \"You would agree, I suppose, that there's no difference between what I'm proposing and the various knights who establish [i]ad hoc[/i] tolls at fords or along roadways?\"\n\n                                \"I guess so,\" responds the toll keeper, \"but we're different—we have official authority from the queen!\"\n\n                                \"And what gives the queen the power to grant that authority?\"\n\n                                \"The fact that she's the queen, of course, by the grace of the gods and by virtue of inheritance…\"\n\n                                \"Nonsense!\" you reply.  \"The queen has that power because she has the most knights and the largest army in this realm.  If she didn't, one of her nobles would have deposed her.  You admit that has happened from time to time?\"\n\n                                \"Yes, but usually only when the rebelling nobles had a claim to rightful rule…\"\n\n                                \"The important word there is 'claim.'  At the end of the day, it is the army that matters.  Now that we've established that sheer force grants the power to establish tolls, we have also established my authority to take over this toll station.  Unless you think I'm not the most powerful entity in this pass?\"  You smile an impressively toothy grin.\n\n                                The toll keeper agrees once he realizes that any other answer means getting eaten. He turns over all their gold to you. He will almost certainly contact the queen to send heroes to fight you, but in the meantime you have a steady inflow of gold tribute regardless.\n                                \n                                Finesse increases greatly.\n                                *set wealth +1500\n                                *goto MountainNext\n                    #\"You will give me half of your tolls, now and forever.  That's assuming that you want to live….\"\n                        *set brutality %-10\n                        The toll keeper seems doubtful that their queen will allow it, but he certainly doesn't want to get eaten. He agrees to the deal, but says he'll have to clear it with his superiors in the capitol.\n                        \n                        Finesse increases.\n                        *set wealth +750\n                        *goto MountainNext\n\n            #Eat the toll keepers and settle in for a bit to extract my own tolls.\n                They're stringy, but well seasoned. \n                *label OwnTolls\n                You settle into the roadway in front of the toll booth. \n\n                The merchants are taken aback to meet a dragon on the road, but they're willing to pay whatever it takes to prevent you from killing them.\n\n                So, how much do you take?\n                *choice\n                    #About the same amount as the queen's toll keepers charged.\n                        The point here is to maximize revenue, after all.  If the caravans stop coming, so does the money.\n                        \n                        Finesse and Cunning increase.\n\n                        You make a hefty profit.\n                        *set wealth +1500\n                        *set brutality %-10\n                        *set cunning %+10\n                        *goto HowLong\n                    #A heavier toll, but not so much as to discourage trade significantly.\n                        The point here is to maximize revenue, after all.  If the caravans stop coming, so does the money.  On the other claw, there's no need to leave money on the table.\n                        \n                        Finesse and Cunning increase.\n\n                        You make a hefty profit.\n                        *set wealth +1500\n                        *set brutality %-10\n                        *set cunning %+10\n                        *goto HowLong               \n\n                    #As much as they can possibly afford.\n                        You're being generous by letting them live and keep their wagons.  You might as well get maximum value out of this.\n\n                        Unfortunately, the number of caravans drops precipitously as news of the new toll gets around.  You might have made more money with a lighter touch.\n                        *set wealth +1000\n                        *goto HowLong\n                    #As much as they can possibly afford, and then some.  It might be cheaper for them to just give me the wagons with everything in them.\n                        You make the merchants bleed—literally, in one case, when one of them refuses to pay what you demanded.\n\n                        Unfortunately, other merchants hear about the new toll and refuse to use the pass.  You've basically closed the pass, but you don't see much more trade to prey on.  \n                        Time to move on.\n                        *set wealth +750\n                        *goto MountainNext\n                *label HowLong\n                *page_break\n                Your little toll operation is netting you a nice chunk of change.  How long do you plan on maintaining it?\n                *choice\n                    #Years and years.\n                        *if (disdain \u003c 10)\n                            You settle in and continue applying your toll to every caravan that comes through.  The merchants grumble, but they start to calm down after they realize that you've squeezed out the bandits from this route—after all, who's crazy enough to compete with a dragon?  Over the course of years, you pull in a large amount of treasure.  But even so, something about the work grates on you.  There is no honor in toll-collecting, none of the thrill of the hunt or the rush of the kill.  A little bit of you dies inside with every month you spend collecting tolls.  After several years, you return to your lair.\n\n                            Cunning increases.\n                            \n                            *set cunning %+15\n                            *set wealth +2000\n                            *goto MountainNext\n                        *else\n                            That's just not realistic without extraordinary Vigilance.  You decide that you will collect tolls for years, but by the end of the first couple of weeks, you are miserable and bored.  You just can't make yourself stay in the pass, not for small sacks of gold collected like a functionary.  You fly home to your lair in less than a month.\n                            \n                            Vigilance increases; Cunning increases slightly.\n                            *set disdain %-20\n                            *set cunning %+5\n                            *set wealth +250\n                            *goto MountainNext\n                    #A couple of months.\n                        *if (disdain \u003c 30)\n                            You settle in and continue applying your toll to every caravan that comes through.  The merchants grumble, but they start to calm down after they realize that you've squeezed out the bandits from this route—after all, who's crazy enough to compete with a dragon?  You pull in a lot of money, but you're still relieved when it's time to move on.\n                            \n                            Vigilance increases; Cunning increases slightly.\n                            *set disdain %-10\n                            *set cunning %+5\n                            *set wealth +1000\n                            *goto MountainNext\n                        *else\n                            You try, but you can't stick to your plan without more Vigilance.  You decide that you will collect tolls for a couple of months, but by the end of the first couple of weeks, you are miserable and bored.  You just can't make yourself stay in the pass, not for small sacks of gold collected like a functionary.  You fly home to your lair in less than a month.\n                            \n                            Vigilance increases.\n                            *set disdain %-10\n                            *set wealth +250\n                            *goto MountainNext\n\n                    #A couple of weeks, maybe as long as a month.\n                        You settle in and take your tolls.  It's not exciting and you get a little bored, but you seize a decent amount of gold.  And when you're starting to get restless, you fly back to your lair.  All in all, a nice bit of work.\n                        \n                        Vigilance increases slightly.\n                        *set disdain %-5\n                        *set wealth +750\n                        *goto MountainNext\n\n                    #I'm a dragon, not a toll collector!  A single caravan is the limit for me.\n                        Of course.  And so after you collect your \"toll,\" you fly back to your lair with your loot.  All in all, a nice bit of work, and without sullying yourself by acting like a functionary.\n                        \n                        Disdain and Honor increase.\n                        *set disdain %+10\n                        *set cunning %-10\n                        *goto MountainNext\n            #Swoop down and take the train of wagons for myself.\n                *label SeizeCaravan \n                You swoop down in front of the wagon train.  One overzealous caravan guard fires a bow at you; you eat her for her trouble.  Almost all of the merchants and guards surrender immediately, although a few near the back scurry away.\n\n                You pick through the wagon train, looting it thoroughly.  Some wagons have low value trade goods that you simply fling over the precipice to their destruction.  Several are loaded down with salted meats that make a nice snack.  And a few others represent the jackpot:  gold- and silverwork.  Those wagons you carry back to your lair.  By the end of the process, you've taken or destroyed everything of value in the wagon train.\n                \n                *set wealth +750\n\n                What do you do with the merchants and guards, by the way?\n                *choice\n                    #Let them all go.\n                        Once you've looted the wagons, the humans are of no value to you.  You make a shooing gesture and they flee.  How benevolent of you!  You have ruined only their careers.\n                        \n                        Finesse and Infamy increase.\n\n                        *set brutality %-10\n                        *set infamy %-15\n                        *goto TrainDestruction\n\n                    #Eat most of them and let the rest go.\n                        You start at the front of the caravan and slaughter your way to the back.  You eat a few of the merchants outright, but you kill many more to eat at your leisure.\n\n                        A few of the fastest teamsters manage to dash a distance down the road by the time you finish killing the rest of the humans.  You leap to the air and fly down to catch them.  A flick of your tail knocks them to the ground and you loom above them.  Just when they are convinced that their deaths are at hand, you roar, \"Let the world know of my power. My name is ${name}! Let the world know, and despair!\"\n\n                        You leave them trembling on the ground and go back to your plunder.\n                        \n                        Infamy increases; Brutality increases slightly.\n                        *set brutality %+5\n                        *set infamy %+20\n                        *goto TrainDestruction\n                    #Eat them all.\n                        You slaughter them all.  They scream in terror and mount a feeble effort to fight back, but a bunch of merchants and hired guards are no match for a dragon. One of the guards tries to make his way down the almost vertical cliff face to escape—a clever thought, but for nought.  He's nicely tenderized when you get around to scraping him off the base of the mountain.  All in all, a delightful bit of carnage.\n                        \n                        Infamy increases.\n\n                        *set infamy %+10\n                        *goto TrainDestruction\n\n                *label TrainDestruction\n\n                You wait in the mountain pass for the next caravan to come, but reports of the destruction of that caravan travel quickly.  Trade through the pass dries up completely.  It was fun while it lasted, anyway.  Time to move on.\n\n                *goto MountainNext\n\n        *label MountainNext\n        *page_break\n        What's the next step in your climb to dominance?\n        *goto main\n\n\n    *hide_reuse #Send one of my goblin minions to announce my new rule to the queen of the neighboring realm.\n        *set DidSomething true\n        One of your goblin slaves cowers before you. \"Yes, O great and mighty master?\" she squeaks.\n\n        \"I want a kingdom,\" you growl as you roll over on your pile of treasure. \"Go down the mountain and inform the humans that I will be their new monarch.\"\n\n        The goblin looks horrified, as far as that sort of thing goes; it's always hard to tell with goblins. (They're so ugly.) \"But master, they'll kill me immediately!\"\n\n        You snort, sending flames into the air. \"Just tell them that if they do, my vengeance will be horrible to behold.\"\n\n        She almost looks hopeful. \"Will it?\"\n\n        \"Yes. But you'll still be dead. So don't fail me.\"\n\n        She heads off down the mountain that afternoon. You don't hear from her again.\n\n        What do you do next?\n        *choice\n            #Find out what happened to her.\n                *set disdain %-5\n                Anything that filthy is easy to track by smell. In the dead of night, you creep down the mountain and follow her trail. It leads to the nearest inhabited hut. Several peasants sit outside it by a fire. Your hearing is so good that they're easy to make out.\n                \n                Vigilance increases slightly.\n\n                \"I still can't believe it. Just the damnedest thing. Stupid little goblin jumped out at me from nowhere and started babbling something in that tongue of theirs. I could barely get to my knife in time before the thing stabbed me.\"\n\n                \"You got lucky,\" says the other man. \"Them things are dangerous. I hear they're spies for that dragon.\"\n\n                \"Dragon?\" the first man snorts. \"I'm not even sure it exists. If it does, and they're spies, good thing we killed it!\"\n\n                What do you want to do?\n                *choice\n                    #Sneak away quietly.\n                        You silently return to your lair, brooding. Looks like you'll need a better technique to seize the kingdom.\n                        \n                        Disdain increases.\n                        *set disdain %+10\n                        *goto GoblinNext\n                    #Reveal myself.\n                        \"Is that so?\" Your voice rumbles out, and both men jump to their feet. You slowly reveal yourself, letting the firelight play across your shining scales and magnificent wings. You rear up in front of them. \"No one destroys anything of mine.\" The men panic and begin to run, consumed with fear.\n\n                        What do you do?\n                        *choice\n                            #Kill them both.\n                                You let them get just far enough away that they think they may escape, and then you belch fire on them. They stumble into the night, on fire and with arms pinwheeling, making perhaps another fifteen steps before dropping down dead. That should teach them.\n                                \n                                Brutality and Vigilance increase.\n\n                                *set brutality %+10\n                                *set disdain %-10\n                                *goto GoblinNext\n                            #Kill one and keep another one alive to use as a spy.\n                                *set cunning %+20\n                                *set disdain %-10\n                                Your tail whips up and around, sending one peasant flying. You watch the other flee. As soon as he thinks he's escaped, you flex your powerful wings and fly up into the air. With a thud, you land directly in front of the fleeing peasant. The man drops to his knees in terror and begins begging for his life.\n\n                                \"You want to live?\" you ask. \"You will tell me all you know about the human capitol, and then you will go there and feed me information about their military and defenses.  You will become my spy. If you do, you will be alive and rich. If you don't?\" You raise one claw.\n                                \n                                Cunning and Vigilance increase.\n\n                                *comment Maybe some consequences later?\n                                *goto GoblinNext\n                            #Let them both go.\n                                *set disdain %+5\n                                That? That was funny. Easy come, easy go, as far as goblins are concerned, and those two peasants will never forget you. You incinerate their thatched-roof cottage, just to make a point, and return home.  Disdain increases slightly.\n                                *goto GoblinNext\n            #Forget her.\n                *set disdain %+20\n                Disdain increases.\n                \n                Apparently, sending a minion to do a dragon's work isn't a good idea. Time to try a new plan.  \n                *goto GoblinNext\n\n        *label GoblinNext\n        What's next?\n        *goto main\n    *hide_reuse *if (DidSomething) #That's enough activity on my part.  I'm heading back to my lair.\n        *goto WaitInLair\n        \n*label BigCity\n\nIt doesn't take long before you are circling over their puny city; it would burn beautifully, and you could smash it into flinders, but it's full of wealth. You can smell the treasure from here. You settle heavily in the main plaza in front of the palace.  As you land, your tail idly destroys the ancient statue of some dead king.\n\n\"Send out your queen!\" you roar. People flee from the sound of your voice. \"I demand to talk to her. Send her out, or I'll rip apart the castle piece by piece and then eat her once I'm done. NOW!\"\n\nSomeone screams. You see worried courtiers staring at you from around the door to the palace, then hastily ducking back inside. From behind, the sound of a horse distracts you. You smell weapon oil and metal.\n\n\"Avaunt, foul beast!\" challenges a human encased in metal armor. He carries a long lance with a pennant flying from it. \"I am Sir Rodegard, knight of—\"\n\nAre you going to put up with that?\n*choice\n    #Let him finish his speech.\n        \"…knight of our Royal Highness, her graceful majesty Queen Juliet, long may she reign over—\"\n\n        *choice\n             #He's really boring. Eat him instead.\n                 *label EatKnight\n\n                 You knock him down before he ever completes his little speech. A claw swipe knocks him sideways off of his horse and sends the mount fleeing in blind terror. The knight rolls and awkwardly tries to get to his feet. As he does, he looks up to see you dangling the remains of the plaza's statue over his head. \"Duck,\" you suggest, and he does. Then your head \n                 snaps down and catches him in your jaw. He struggles, half in and half out of your mouth, as you decide whether to eat him.\n\n                 *choice\n                     #Devour him.\n                         You bite down hard, swallow, and smile a terrible grin.\n                         *goto AfterKnightfall\n                     #Allow him to live.\n                         *label allow_live\n                         \"You're too small to bother with,\" you growl, \"and it's funnier to let you live knowing that you failed. Can't have you running after me, though.\" With a flick of your neck, you fling him into a nearby building.  You hear bones snap as he hits the wall and promptly forget about him.\n                         *goto AfterKnightfall\n                 \n\n             #No, I let him finish.\n                 \"…us all. I am her sworn protector. I challenge you, beast, and I shall skin your dead body to make my next shield.\"  He spurs his warhorse towards you.\n\n                 How do you plan to fight him?\n                 *choice\n                     #Take to the air to fight.\n                         Your wings beat the air and you rise upwards out of the reach of his lance. He seems a bit bewildered by this simple tactic. He reins his horse to a halt and cries upwards, \"Come down and fight honorably!\" Instead, you breathe fire on h
