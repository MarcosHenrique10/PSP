im. He's still alive as his horse catches fire beneath him, but not for long. You're picking your teeth with the cooling remains of his lance when the queen cautiously pokes her head out from around the palace doors, sighs, and emerges out into the courtyard.\n                         *goto AfterKnightfall\n\n                     #Stay on the ground to fight.\n                         He's charging you head-on. Not particularly smart on his part. You roar, a noise that shatters windows and causes his horse to flinch, and you slap your claw down on top of him. He dodges to the side, throwing himself off his horse, and you feel the beast's blood pumping out over your scales as you simply squeeze. The horse gives a shriek.   \n                         \"I'm sorry,\" you say, \"were you using this?\" Then you casually lower the horse's remains into your own maw.\n\n                         The knight is senseless with fury as he draws a sword and charges. He's braver than he is skilled; you allow him to hack at your side for a minute or two before you pick him up with two pinched claws. \"Are you quite done?\"\n\n                         What do you do with him?\n                         *choice\n                             #Allow him to live.\n                                 *goto allow_live\n                             #Eat him.\n                                 \"Foul beast,\" he cries out, \"I will never surrender!\"\n\n                                 \"Fair enough,\" you say, and eat him whole. The metal armor crunches unpleasantly in your mouth, but the soft bit inside is delicious.\n                                 *goto AfterKnightfall\n\n    #Eat him now.\n        *goto EatKnight\n\n*label AfterKnightfall\n\nMustering whatever dignity she can, the human queen steps outside the doors to her palace. You can smell her fear, and her courtiers beg her not to, but she emerges to meet you with what passes for human courage. You smile, a terrible sight.\n\n\"Beast?\" she asks in a remarkably steady voice. \"I am Queen Juliet. We have not offended you. What is it you want with us?\"\n\nWhat do you do?\n*choice\n    #Eat her.\n        Your head snaps forward and the queen is gone in one bloody gulp. \"I am your new ruler!\" you roar to all who can hear. \"Bring treasure to the base of my mountain, every piece of gold you possess! If you do not, I will return and level your entire city!\" You place your mouth up to the door of the palace and give a quick breath of fire, enough to get their attention but not enough to burn down the place. You then shatter a few homes for good measure. \n\n        You round up the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}! To defy the dragon is death!\"  Good, they understand the way things work now.  They are terrified of you, and you can expect their tribute.\n        \n        Brutality and Infamy increase.\n\n        *set wealth +1000\n        *set brutality %+15\n        *set infamy %+10\n        *finish\n    #Command the queen to surrender her kingdom.\n        How do you want to command the queen?\n        *choice\n            #Brutally.\n                You roar, and the queen staggers backward.  \"I have defeated your greatest champion without any difficulty.  I can destroy you and all that you hold dear at my whim.  Surrender your crown and bow before me.  I'm willing to let you at least beg for your life and the lives of your family.\"\n\n                *if (cunning > 35)\n                    The queen shudders and then draws a small dagger.  It takes you a moment to realize that she is trying to attack you with an ornament.  \"I will never surrender my kingdom to you, beast!  You are an ignoble monster worthy only of death!\"\n\n                    She is surprisingly brave to attack you with no hope of success.  She is also surprisingly tasty, as you discover while chewing on her.  \n\n                    After you finish devouring her, you round up the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}! To defy the dragon is death!\"  Good, they understand the way things work now.\n                    \n                    You then gather the most valuable items in the palace for your hoard and fly back to your lair. You won't be able to trust them, of course, but that hardly matters so long as they keep you supplied with food and gold.\n                    \n                    Brutality and Infamy increase.\n                    *set wealth +1000\n                    *set infamy %+10\n                    *set brutality %+10\n                    *finish\n                *else\n                    The queen shakes, as if she finds it physically revolting to acquiesce, but she kneels and lifts off her crown, offering it to you.  \"I know you are an honorable dragon. Please, accept the tribute of your loyal subjects, and spare them from destruction.\"\n\n                    *choice\n                        #I accept her tribute and spare her life.\n                            You lift your head and give a mighty roar of triumph that echoes off the walls of the city.  The queen raises her voice to anyone who can hear.  \n                    \n                            \"Kneel before your new sovereign, O people!\" she shouts. \"Behold the dragon ruler,\n                            ${name}!\n\n                            You take the ex-queen's crown and a pile of treasure that her courtiers promptly bring out to you, and you depart clutching the first of your tribute in your claws, exceptionally pleased with how the day has gone. You'll have to wait for treachery, of course, but you have a good feeling about this. You've never owned a kingdom before.\n                            \n                            Honor increases; Infamy decreases.\n  \n                            *set wealth +1500\n                            *set infamy %-10\n                            *set cunning %-10\n                            *finish\n\n                        #It's no fun if I don't get to sack the palace.  I eat her and go on a rampage before accepting the surrender of her advisors.\n                            \"No, no, no,\" you say in disgust.  \"You were supposed to refuse and make me destroy the heart of your capital.\"\n\n                            The queen looks up at you in horror as she realizes what you're saying.  That's when you pounce on her.  The next few minutes are ugly.  Then you turn your attention to the palace, ripping the very building apart and smashing through the guards like they were toy soldiers.  \n                            \n                            Brutality and Infamy increase; Honor decreases.\n\n                            After a satisfying rampage, you're finally willing to accept the surrender of a haggard, miserable group of the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}! To defy the dragon is death!\"  Good, they understand the way things work now.\n                            \n                            You then gather the most valuable items in the wreckage of the palace for your hoard and fly back to your lair. You won't be able to trust them, of course, but that hardly matters so long as they keep you supplied with food and gold.\n                            *set wealth +1000\n                            *set infamy %+25\n                            *set brutality %+20\n                            *set cunning %+15\n                            *finish\n\n            #Cleverly.\n                \"Dearest queen,\" you croon, \"I am not without mercy. I am able to kill you and everyone you protect. Alternately, I could decimate your kingdom; your few remaining subjects would kill you themselves for betraying them to a fearsome dragon. I have a better idea, however. In exchange for a somewhat burdensome amount of treasure, I will rule you from afar. You will become MY kingdom, and my subjects, and in return for your obedience and tribute I will protect you. What say you?\"\n\n                The soon to be ex-queen's eyes are bulging. \"Great dragon,\" she stutters, \"that is a very kind and gracious offer. We would be blessed to have as mighty a protector such as you. May we have some time to decide?\"\n                *fake_choice\n                    #Give her some time.\n                        \"Of course,\" you say. \"This must be a very difficult decision for you. You may have five minutes.\"\n\n                        \"Five minutes?\" She sounds shocked. \"But that is hardly enough time to—\"\n\n                        \"To betray me and summon your knights? To smuggle out the best of your riches? I agree. You have a choice, Queen. You can die, or live; you can lose your kingdom or give it the most powerful protector imaginable. It will only cost you wealth and your pride. What do you choose?\"\n\n                    #No, she must decide now.\n                        \"NO!\" you roar. \"You must decide this instant, human. Is not the ability to make rapid decisions a good quality in a ruler?\"\n                *temp honor\n                *temp finesse\n                *set honor 100-cunning\n                *set finesse 100-brutality\n\n                *if ((honor + finesse) > 100)\n                    *comment Honor makes it more likely she will accept, as does finesse.\n                    \"Yes, O mighty dragon. I will accept you as my ruler, and perhaps through me you will administer to your new kingdom.\" She raises her voice to anyone who can hear.  \n                    \n                    \"Kneel before your new sovereign, O people!\" she shouts. \"Behold the dragon ruler, ${name}!\n\n                    You depart clutching the first of your tribute in your claws, exceptionally pleased with how the day has gone. You'll have to wait for treachery, of course, but you have a good feeling about this. You've never owned a kingdom before.\n                    \n                    Finesse increases; Infamy decreases.\n  \n                    *set wealth +1500\n                    *set infamy %-15\n                    *set brutality %-10\n                    *finish\n                *else\n                    \"The answer is no. You are a treacherous beast, and you can not intimidate me. I would rather die than—\"\n\n                    \"In that case, allow me to oblige.\" You eat her in a single snap of your teeth.\n                    \n                    Infamy increases.\n\n                    After you finish devouring her, you round up the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}! To defy the dragon is death!\"  Good, they understand the way things work now.   \n                 \n                    You then gather the most valuable items in the palace for your hoard and fly back to your lair. You won't be able to trust them, of course, but that hardly matters so long as they keep you supplied with food and gold.\n                    *set wealth +1000\n                    *set infamy %+5\n                    *finish\n\n*label WaitInLair\n\nYou return to your lair.  You have demonstrated your power and might, even majesty.  Now, it's time for the humans to come before you and acknowledge your rulership.  You wait for them on your bed of gold, not anxiously, but simply confident that they will acknowledge your power.\n\nDisdain increases.\n\n*set disdain %+25\n\nAfter about a month, a knight arrives at your lair.  She kills a few of your goblin guards perfunctorily—no great loss there—and calls out to you.  \"Beast!  I am Dame Elsa.  Queen Juliet has sent me to demand that you end your depredations within her lands.  If you will not, I shall put an end to your threat.\"\n\nHow do you respond?\n*choice\n    #I present my demands:  if the humans acknowledge me as their ruler and give me adequate tribute, I will cut back on my raiding.\n        You fly out of your lair and unleash a blast of flame into the air, causing Dame Elsa's horse to rear uncontrollably.\n\n        \"Listen, knight.  If your little queen wants me to stop raiding her lands for money and food whenever I feel like it, she'll have to meet my demands.  She needs to acknowledge that I'm the true ruler of these lands, and she needs to provide me with great tribute in both food and gold.  Otherwise, I will continue to take what I please, when I please.  Is that understood?\"\n\n        The knight does not answer at all, except to lower her visor and to set her lance to charge you.  You brush her lance aside with your claw and bite her head off.\n\n        Her fleeing squire carries your message back to the queen.\n        *goto annoyance\n    #I ignore her—if the queen wants to talk, she should come here herself.\n        You ignore the knight, refusing to acknowledge her presence.\n        \n        Disdain increases.\n        \n        Eventually, she forces her way into your presence, cutting a path through your goblins with her sword.  She's certainly \n        persistent.\n\n        When she finally reaches your actual lair, you demonstrate that persistence is no substitute for might at arms and eat her.\n        *set disdain %+15\n        *goto annoyance\n    #I kill the insolent knight.\n        A knight dares to question you at your own lair?  Can't have that.  You fly out through the secret back exit to your lair, loop around behind her, and pounce on her from behind.  In a \n        moment, it's all over except for the chewing.\n        \n        Vigilance increases.\n\n        *set disdain %-10\n        *goto annoyance\n    \n*label annoyance\n*page_break\nA few more knights come by over the next several months with similar results.  It's a bit annoying, but random knights are no real threat to a dragon like you.\n\nAre you willing just to wait until the humans are willing to acknowledge your rule?\n*choice\n   #What are a few more months or years to a dragon who will live centuries?  I'm not leaving my lair.\n       *goto KeepWaiting\n   #Forget this, I'm going to the capital and speaking to the queen herself.\n       Vigilance increases.\n       \n       *set disdain %-10\n       *goto BigCity\n\n*label KeepWaiting\n\nIt's true, waits that would seem long to a human are just relaxing breaks for you.  You even manage to sneak in a short three-month nap.\n\nDisdain increases.\n*set disdain %+25\n\nEventually, your goblin minions rouse you.  \"O great dragon, a large group of humans is outside.\"\n\nYou emerge from your lair to see a small army camped outside under royal banners and flags of truce.  Trumpets sound a fanfare as a human wearing a crown—Queen Juliet, you suppose—walks out of the crowd to meet you.\n\n\"Mighty dragon, we would parlay with you.  We have done nothing to offend you.  Why do you despoil our lands?\"\n\nHow do you respond?\n*choice\n    #Loudly demand that she surrender her lands to my rule and provide me with tribute if she wants to survive.\n        You roar, and the queen staggers backward.  \"I have defeated your champions without any difficulty.  I can destroy you and all that you hold dear at my whim.  Surrender your crown and bow before me.  I'm willing to let you at least beg for your life and the lives of your family.\"\n\n        *if (cunning > 35)\n            The queen shudders and then draws a small dagger.  It takes you a moment to realize that she is trying to attack you with an ornament.  \"I will never surrender my kingdom to you, beast!  You are an ignoble monster worthy only of death!\"\n\n            She is surprisingly brave to attack you with no hope of success.  She is also surprisingly tasty, as you discover while chewing on her.\n            \n            Infamy increases.\n\n            After you finish devouring her, you round up the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}! To defy the dragon is death!\"  Good, they understand the way things work now.            \n\n            A few short weeks later, the first shipment of tribute arrives from the humans. You won't be able to trust them, of course, but that hardly matters so long as they keep you supplied with food and gold.\n            *set wealth +1000\n            *set infamy %+10\n            *finish\n        *else\n            The queen shakes, as if she finds it physically revolting to acquiesce, but she kneels and lifts off her crown, offering it to you.  \"I know you are an honorable dragon. Please, accept the tribute of your loyal subjects, and spare them from destruction.\"\n\n            *choice\n                #I accept her tribute and spare her life.\n                    You lift your head and give a mighty roar of triumph that echoes through the valley below.  \"Behold your new ruler!\" you shout in deafening tones.\n                    \n                    Honor increases; Infamy decreases.\n\n                    You take the ex-queen's crown and a pile of treasure that her courtiers promptly bring over to you, and you send your new human minions away, exceptionally pleased with how the day has gone. You'll have to wait for treachery, of course, but you have a good feeling about this. You've never owned a kingdom \n                    before.\n  \n                    *set wealth +1500\n                    *set infamy %-10\n                    *set cunning %-10\n                    *finish\n\n                #It's no fun if I don't get to slaughter the army.  I eat her and go on a rampage before accepting the surrender of her advisors.\n                    \"No, no, no,\" you say in disgust.  \"You were supposed to refuse and make me destroy your puny little army.\"\n\n                    The queen looks up at you in horror as she realizes what you're saying.  That's when you pounce on her.  The next few minutes are ugly.  Then you turn your attention to the army, smashing through the troops like they were toy soldiers.  \n                    \n                    Brutality and Infamy increase; Honor decreases.\n\n                    After a satisfying rampage, you round up the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}! To defy the dragon is death!\"  Good, they understand the way things work now.\n                    \n                    A few weeks later, a wagon train of tribute arrives from the humans. You won't be able to trust them, of course, but that hardly matters so long as they keep you supplied with food and gold.\n                    *set wealth +1000\n                    *set infamy %+25\n                    *set brutality %+20\n                    *set cunning %+15\n                    *finish\n\n    #Quietly explain that her best option is to accept you as an overlord.\n        \"Dearest queen,\" you croon, \"I am not without mercy. I am able to kill you and everyone you protect. Alternately, I could decimate your kingdom; your few remaining subjects would kill you themselves for betraying them to a fearsome dragon. I have a better idea, however. In exchange for a somewhat burdensome amount of treasure, I will rule you from afar. You will become MY kingdom, and my subjects, and in return for your obedience and tribute I will protect you. What say you?\"\n\n        The soon to be ex-queen's eyes are bulging. \"Great dragon,\" she stutters, \"that is a very kind and gracious offer. We would be blessed to have as mighty a protector such as you. May we have some time to decide?\"\n        *fake_choice\n            #Give her some time.\n                \"Of course,\" you say. \"This must be a very difficult decision for you. You may have five minutes.\"\n\n                \"Five minutes?\" She sounds shocked. \"But that is hardly enough time to—\"\n\n                \"To betray me and smuggle out the best of your riches? I agree. You have a choice, Queen. You can die, or live; you can lose your kingdom or give it \n                the most powerful protector imaginable. It will only cost you wealth and your pride. What do you choose?\"\n\n            #No, she must decide now.\n                \"NO!\" you roar. \"You must decide this instant, human. Is not the ability to make rapid decisions a good quality in a ruler?\"\n        *temp honor\n        *temp finesse\n        *set honor 100-cunning\n        *set finesse 100-brutality\n\n        *if ((honor + finesse) > 100)\n            *comment Honor makes it more likely she will accept, as does finesse.\n            \"Yes, O mighty dragon. I will accept you as my ruler, and perhaps through me you will administer to your new kingdom.\" She raises her voice to anyone who can hear.  \n            \n            \"Kneel before your new sovereign, O people!\" she shouts. \"Behold the dragon ruler, ${name}!\n\n            Within a few weeks the first shipments of treasure arrive.  You are exceptionally pleased with how the process of taking over a kingdom has gone. You'll have to wait for treachery, of course, but you have a good feeling about this. You've never owned a kingdom before.\n            \n            Finesse increases; Infamy decreases.\n  \n            *set wealth +1500\n            *set infamy %-15\n            *set brutality %-10\n            *finish\n        *else\n            \"The answer is no. You are a treacherous beast, and you can not intimidate me. I would rather die than—\"\n\n            \"In that case, allow me to oblige.\" You eat her in a single snap of your teeth. A few particularly loyal knights attack, but you quickly dispatch them as well.   \n\n            After you finish devouring the knights, you round up the ex-queen's advisors.  You kill a few to motivate the rest and force the survivors to abase themselves before you.  As your  \n            new slaves cower before you, one of the former queen's advisors shouts out to the terrified populace, \"Behold our new master, ${name}!\n            To defy the dragon is death!\"  Good, they understand the way things work now.            \n            \n            They are much more cooperative than the queen was, and within a few weeks the first shipments of tribute arrive from the \n            humans. You won't be able to trust them, of course, but that hardly matters so long as they keep you supplied with food and gold.\n            \n            Infamy increases.\n            *set wealth +1000\n            *set infamy %+5\n            *finish\n\n    #Eat her and the whole little army.\n        You attack without warning and without mercy.  The queen dies in the first moments of your attack along with the shocked heralds who thought that not even a dragon would violate a flag of truce. Her knights and soldiers rush in to fight you—she must have been popular—but a few blasts of flame cook most of them.  Your claws and teeth deal with the rest.\n        \n        Brutality and Cunning increase; Infamy increases greatly.\n\n        You enjoy a leisurely afternoon hunting down the remaining courtiers, musicians, and servants as they desperately flee your wrath.\n\n        Less than a month later, the humans send their first shipment of tribute to you.  \n        \n        They've learned that talking to you will get them nothing.  All in all, that worked out pretty well.\n        *set brutality %+15\n        *set cunning %+10\n        *set infamy %+20\n        *set wealth +750\n        *finish", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n*script changeBackgroundColor(\"sepia\")\nLet us begin.\n\nA knight charges up the slope at you.  His horse pounds at the ground, carrying the heavily armored warrior as if he were a child's doll.  The knight sets his lance to attack you.\n\nHow do you defend yourself, O mighty dragon?\n*fake_choice\n  #I take to the air with a quick beat of my wings.\n  #I knock the knight from his horse with a slap of my tail.\n  #I rush into his charge and tear him to pieces with my claws.\n  #A puff of my fiery breath should be enough for him.\n*script changeBackgroundColor(\"black\")\nIsn't it a little sexist to always kidnap princesses?\n\n*fake_choice\n  #Maybe, but tradition demands that dragons kidnap princesses, even if that is sexist.\n  #You dare question my actions?\n  #You know, I never thought about that before.  In fact, I think I kidnapped a prince, just to avoid being sexist.\n  #I'll have you know that I make a careful point of alternating between princes and princesses, but it happened to be time for a princess.\n*script changeBackgroundColor(\"sepia\")\nThere's a traveling party of adventurers in town.  The people are already calling them \"heroes,\" telling tales of their past deeds.\n\nDo-gooders like these can be very dangerous.  What do you want to do?\n\n*fake_choice\n    #Gather information about them.\n    #Challenge them to a duel.\n    #Kidnap a princess to lure them out.\n    #Scare them off.\n    #Ignore them.", "startup": "*title Choice of the Dragon\n*author Dan Fabulich and Adam Strong-Morse\n\n*scene_list\n  startup\n  lair\n  queenpolitics\n  clutchmate\n  checkpoint\n  heroes\n  goblinhero\n  warrequest\n  worship\n  mating\n  evilwizard\n  hibernation\n\n*create name \"\"\n*create brutality 50\n*create cunning 50\n*create disdain 50\n*create gender \"unknown\"\n\n*comment I've added wounds and blasphemy to provide hit points of sorts;\n*comment if the PC gets hurt, wounds goes up, with 3 usually meaning death;\n*comment impiety tracks whether the gods have been directly angered\n*create wounds 0\n*create blasphemy 0\n*create infamy 50\n*create wealth 5000\n\n*create encourage 0\n*comment encourage = 1 if you encourage the folk religion\n\n*create victory 0\n\n*create clutchmate_alive false\n*create vermias_killed_axilmeus false\n*create callax_alive true\n*comment Callax_Alive = true if Callax is alive, false if Callax is dead\n*create Callax_With false\n\n*achievement flawless visible 50 Flawless\n  Finish the game without wounds.\n  Finished the game without wounds.\n*achievement brute visible 50 Brute\n  Finish the game with at least 80% Brutality.\n  Finished the game with at least 80% Brutality.\n*achievement sophisticate visible 50 Sophisticate\n  Finish the game with at least 80% Finesse.\n  Finished the game with at least 80% Finesse.\n*achievement machiavelli visible 50 Machiavelli\n  Finish the game with at least 80% Cunning.\n  Finished the game with at least 80% Cunning.\n*achievement pure visible 50 Pure\n  Finish the game with at least 80% Honor.\n  Finished the game with at least 80% Honor.\n*achievement transcendent visible 50 Transcendent\n  Finish the game with at least 80% Disdain.\n  Finished the game with at least 80% Disdain.\n*achievement ruler visible 50 Ruler\n  Finish the game with at least 80% Vigilance.\n  Finished the game with at least 80% Vigilance.\n*achievement monster visible 100 History's Greatest Monster\n  Finish the game with at least 80% Infamy.\n  Finished the game with at least 80% Infamy.\n*achievement tycoon visible 100 Tycoon\n  Finish the game with at least 20,000 gold pieces.\n  Finished the game with at least 20,000 gold pieces.\n*achievement villain visible 50 Villain\n  Defeat a party of heroes.\n  Defeated the heroes.\n*achievement blasphemy visible 50 Blasphemy\n  Anger the gods.\n  Slain by gods.\n*achievement lover visible 100 Lover\n  Find a mate.\n  Found a mate.\n*achievement champion visible 50 Champion\n  Defeat an evil wizard.\n  Defeated Magister Vermias.\n*achievement dragonslayer visible 50 Dragon Slayer\n  Stop your own heart.\n  Stopped your own heart.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n    Choice of the Dragon is supported by advertisements, but you can buy the unlimited version\n    to turn off ads forever.\n\n    *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n    *page_break_advertisement\n\n\n*label purchased\nLet us begin.\n\nA knight charges up the slope at you.  His horse pounds at the ground, carrying the heavily armored warrior as if he were a child's doll.  The knight sets his lance to attack you.\n\nHow do you defend yourself, O mighty dragon?\n*choice\n  #I take to the air with a quick beat of my wings.\n    You leap to the air, deftly avoiding the knight's thrust.  Now that you are in the air, he hardly poses any threat at all—not that he ever posed much of one to you.  You circle back and knock him off his horse with a swipe of your claw.\n\n    *set brutality %-10\n    *goto Victory\n\n  #I knock the knight from his horse with a slap of my tail.\n    You swing your mighty tail around and knock the knight flying.  While he struggles to stand, you break his horse's back and begin devouring it.\n\n    *set cunning %+10\n    *goto Victory\n \n  #I rush into his charge and tear him to pieces with my claws.\n    The knight's lance shatters against your nigh-impenetrable hide as you slam into him.  You yank him clean off his horse, slamming him to the ground and ripping his plate armor with your vicious claws.  The fight is over before it has begun. \n\n    *set brutality %+10\n    *goto Victory\n\n  #A puff of my fiery breath should be enough for him.\n    You let loose an inferno of fire.  The knight's horse is cooked nicely, and your stomach lets out a deafening rumble as the smell of roast destrier reaches your nostrils.  The knight himself staggers to his feet.  His armor managed to keep him alive, but only barely.\n\n    *set disdain %+10\n    *goto Victory\n  *if (choice_save_allowed) #Restore a saved game.\n    *restore_game\n    *goto purchased\n\n*label Victory\n\nDo you finish him off, victorious dragon?\n*choice\n      #Of course!  How dare he attack me?\n        Your jaws crush him in a single bite.\n\n        That showed him.\n        *set brutality %+10\n        *goto Naming\n\n      #I let him live to warn others of my immense power.\n        \"Begone, petty human.  To attack me is to meet your doom,\" you growl.\n\n        The knight stumbles away as quickly as he can, not even daring to pretend that he could still fight you.\n        *set infamy %+15\n        *goto Naming\n\n      #Eh.  Now that the threat is ended, he is beneath my concern.\n        You leisurely eat the knight's horse.  He slinks away as quietly as he can.  (His heavy armor makes a stealthy escape impossible.)  Still, you pay him no mind as he leaves.\n\n        *set infamy %+10\n        *set disdain %+10\n        *goto Naming\n\n*label Naming\n\nYou know, it's going to get annoying to keep calling you \"great and mighty dragon.\"  What is your name?\n*choice\n    #Gorthalon.\n        *set name \"Gorthalon\"\n        *goto gender\n    #Sssetheliss.\n        *set name \"Sssetheliss\"\n        *goto gender\n    #Calemvir.\n        *set name \"Calemvir\"\n        *goto gender\n    #These names are all terrible!\n        Oh! Please forgive me.\n        *label input_name\n        What name would you prefer?\n        *input_text name\n\n        *comment check capitalization\n        *if (\"${name}\" != \"$!{name}\")\n\n            Your name is $!{name}, is that right?\n\n            *choice\n                #Yes.\n                    *set name \"$!{name}\"\n                    *goto gender\n                #No, my name is ${name}, just as I said.\n                    *goto gender\n                #Er, wait, let me try that again.\n                    *goto input_name\n\n*label gender\nWill you be male or female?\n*choice\n    #Male.\n        *set gender \"male\"\n        *goto Princess\n    #Female.\n        *set gender \"female\"\n        *goto Princess\n    #Neither.\n        *set gender \"neither\"\n        *goto Princess\n    #Unknown/undetermined.\n        *set gender \"unknown\"\n        *goto Princess\n    #Do not pester me with impudent questions!\n        *set brutality %+ 15\n        I, ah, I mean, yes!  Of course!  How churlish of me.\n        \n        But, O mighty ${name}, I feel I should let you know that this game is full of choices; indeed, it is nothing but multiple choice questions that determine the course of your adventures as a dragon.  If you don't enjoy answering questions, this game may not be for you!\n        \n        Do you…I mean, if I may, would you like to specify your gender after all?\n        \n        *choice\n            #Very well.\n                Excellent choice!  What gender will you be?\n                \n                *choice\n                    #Male.\n                        *set gender \"male\"\n                        *goto Princess\n                    #Female.\n                        *set gender \"female\"\n                        *goto Princess\n                    #Neither.\n                        *set gender \"neither\"\n                        *goto Princess\n                    #Unknown/undetermined.\n                        *set gender \"unknown\"\n                        *goto Princess\n            #I said no.\n                *set gender \"unknown\"\n                \n                Well, let's just leave it undetermined, then!\n                *goto Princess\n       \n*label Princess\n\nAs you think about it, the knight's attack was probably inevitable.  After all, you did just kidnap the princess from right out of her tower.  Although…\n\nIsn't it a little sexist to always kidnap princesses?\n*temp royal\n*choice\n  #Maybe, but tradition demands that dragons kidnap princesses, even if that is sexist.\n    I guess you're right.\n\n    Anyway, as you ripped the roof off her tower, the light glistened off your…\n    *set royal \"princess\"\n    *goto color\n  #You dare question my actions?\n    No, no!  Of course not.  I just wanted to—I mean—What I'm trying to say is…\n\n    Let's just move on.\n\n    Anyway, as you ripped the roof off her tower, the light glistened off your…\n    *set royal \"princess\"\n    *goto color\n  #You know, I never thought about that before.  In fact, I think I kidnapped a prince, just to avoid being sexist.\n    Right you are.  As I was saying, the knight's attack was probably inevitable.  After all, you did just kidnap the prince \n    from right out of his tower.  As you ripped the roof off his tower, the light glistened off your…\n    *set royal \"prince\"\n    *goto color\n  #I'll have you know that I make a careful point of alternating between princes and princesses, but it happened to be time for a princess.\n    Of course.  I'm sorry for questioning you.\n\n    Anyway, as you ripped the roof off her tower, the light glistened off your…\n    *set royal \"princess\"\n    *goto color\n\n*label color\n*temp royal_him\n*temp royal_his\n*temp royal_she\n*temp royals\n*if (royal=\"princess\")\n  *set royal_him \"her\"\n  *set royal_his \"her\"\n  *set royal_she \"she\"\n  *set royals \"princesses\"\n  *goto A\n*else\n  *set royal_him \"him\"\n  *set royal_his \"his\"\n  *set royal_she \"he\"\n  *set royals \"princes\"\n  *goto A\n\n*label A\n\nAh, would you like to specify the color of your hide?  I wasn't sure which color to put in that description.\n\n*temp color\n*choice\n    #Can we just get on to the smashing?\n        *set brutality %+ 30\n        Y—yes, of course!  Your wish is my command.\n        \n        On with the show!\n        \n        *page_break\n        *goto RoyalResolution\n    #Black.\n        *set color \"black\"\n        *goto limbs\n    #Blue.\n        *set color \"blue\"\n        *goto limbs\n    #Brown.\n        *set color \"brown\"\n        *goto limbs\n    #Gold.\n        *set color \"golden\"\n        *goto limbs\n    #Green.\n        *set color \"green\"\n        *goto limbs\n    #Iridescent.\n        *set color \"iridescent\"\n        *goto limbs\n    #Red.\n        *set color \"red\"\n        *goto limbs\n    #White.\n        *set color \"white\"\n        *goto limbs\n    \n\n*label limbs\nWonderful choice.  So the light glistened off your ${color} hide, as you snatched the ${royal} out of ${royal_his} tower.\n\nWhile we're on the subject, let's settle a few other details.  How many limbs will you have, not counting your wings or tail?\n\n*fake_choice\n    #Four.\n    #Five.\n    #Six.\n    #Eight.\n\nHmm.  Is the top of your head ridged or smooth?\n*temp head\n\n*choice\n    #Ridged.\n        *set head \"ridged\"\n        *goto wings\n    #Smooth.\n        *set head \"smooth\"\n        *goto wings\n\n*label wings\n\nI see.  And your wings—feathery, leathery, or scaly?\n\n*temp wings\n\n*choice\n    #Feathery.\n        *set wings \"feathery\"\n        *goto Summary\n    #Leathery.\n        *set wings \"leathery\"\n        *goto Summary\n    #Scaly.\n        *set wings \"scaly\"\n        *goto Summary\n\n*label Summary\nAs you kidnapped the ${royal}, you beat your ${wings} ${color} wings and flew off into the night, as ${royal_she} clutched tightly to your ${head} scalp to avoid plummeting to ${royal_his} doom.\n\n*label RoyalResolution\nWhat are you planning on doing with the ${royal}, anyway?\n*choice\n  #It's all about companionship and good conversation.\n    Life can be lonely as a dragon, and interesting conversation is at a premium.  The elite upbringing of royalty makes them more suitable for entertaining dragons.\n\n    But what do you do after you tire of ${royal_his} conversation?\n    *choice\n      #Then it's time for a royal feast—by which I mean I eat ${royal_him}.\n        The ${royal}'s efforts to entertain you with ${royal_his} stories, harp-playing, and singing become more desperate as your boredom becomes more apparent.  But even ${royal_his} best efforts are not enough, and you devour ${royal_him} without remorse.\n\n        *set brutality %+10\n        *set cunning %+10\n        *set infamy %+10\n        *goto personality\n\n      #I let ${royal_him} slip away, pretending not to notice ${royal_his} escape plan.\n        The ${royal} becomes gradually more fearful as ${royal_his} stories, harp-playing, and singing amuse you less each passing day.  One evening, as you pretend to sleep, ${royal_she} makes a break for it.  You are well aware of ${royal_his} departure and could catch ${royal_him} easily, but you let ${royal_him} go.  $!{Royal_She} made several months more interesting, and that's\n        worth sparing ${royal_his} life.\n        *set brutality %-10\n        *set cunning %-10\n        *set infamy %-10\n        *goto personality\n  #I'll keep ${royal_him} around for a little while to lure in more knights, but then ${royal_she}'s dinner.  It's a little known fact that ${royals} taste better than most humans.\n    *goto EatHer\n  #It's all about the ransom payments.  Those are a quick and easy way to build a hoard.\n    Indeed.  Within a month, a large chest of gold comes to pay for the ${royal}'s release.\n    *set wealth +1500\n\n    What do you do then?\n    *choice\n      #Honor demands that I carry out my end of the bargain.\n        Of course.  No sooner have you received the payment than you let the ${royal} go.\n        *set cunning %-20\n        *set brutality %-10\n        *set infamy %-10\n        *goto personality\n\n      #Once I have the payment, I have no reason to delay my dinner.\n        Crunch, munch.  Delicious.\n\n        *set cunning %+20\n        *set brutality %+10\n        *set infamy %+10\n        *goto personality\n    \n*label EatHer\nIt must be the diet.  In any event, you have a delightful dinner of roast ${royal}.\n*set brutality %+10\n*set infamy %+10\n*goto personality\n\n*label personality\n\n*page_break\nThis would be a good time to talk a little more about your personality.\n\nAll dragons can be described in terms of a handful of characteristics, each in opposed pairs:  Brutality and Finesse, Cunning and Honor, Disdain and Vigilance.\n\n*comment We start with the basic dichotomies between the paired attributes\n*comment brutality is the opposite of finesse; only modify by %+ or %-\n\nAre you more notable for your Brutality or your Finesse?\n*choice\n  #Brutality: strength and cruelty.\n    *set brutality %+70\n    *goto CunningQuestion\n  #Finesse: precision and aerial maneuverability.\n    *set brutality %-70\n    *goto CunningQuestion\n\n*label CunningQuestion\n\n*comment cunning is the opposite of honorable; only modified by %+ or %-\n\nDo you have more Cunning or Honor?\n*choice\n  #Cunning: intelligence and trickery.\n    *set cunning %+70\n    *goto DisdainQuestion\n  #Honor: honesty and trustworthiness.\n    *set cunning %-70\n    *goto DisdainQuestion\n\n*label DisdainQuestion\n\n*comment disdain is the opposite of vigilant; only modify by %+ or %-\n\nDo you disdain threats and insults that are beneath you, or are you vigilant\nagainst any slight or transgression?\n*choice\n  #Disdain: patience and scorn.\n    *set disdain %+70\n    *goto FirstChoice\n  #Vigilance: attention and impulsiveness.\n    *set disdain %-70\n    *goto FirstChoice\n\n*label FirstChoice\n*comment Now we face some real choices to finish chargen and establish setting\n*comment First choice trades off cunning vs. brutality\nNow we're going to view some flashbacks to your days as a wyrmling.\n\nAs a young hatchling, you lived with your mother in a cave high up on a mountain.  Your mother had a vast hoard of treasure and a varied hunting range. Some of your siblings chose to spend much of their time reading the rare codices and scrolls your mother had collected.  Other siblings spent their time hunting dangerous game and brawling with each other.  Which pursuit did you prefer?\n\n*choice\n  #Reading.\n    A wise choice that made you more Cunning and taught you Finesse.\n    *set cunning %+20\n    *set brutality %-20\n    *goto SecondChoice\n  #Hunting.\n    You developed your muscles as you gloried in combat and the kill at\n    the end of the hunt.  Your brawls with your siblings also taught you the\n    basics of Honor. \n\n    Brutality and Honor increase.\n    *set cunning %-20\n    *set brutality %+20\n    *goto SecondChoice\n\n*label SecondChoice\n*comment Second choice trades off cunning vs. disdain\n\nAs you reached maturity, you began to threaten your mother's dominance over her territory.  Before you could possibly have bested her in a direct confrontation, she threw you out of her lair and drove you from the lands in which you grew up, leaving you to fend for yourself without any resources beyond your claws, wings, and teeth. \n\nDid you seek revenge on her by turning some of the humans in her lands against her, or did you consider petty revenge beneath you?\n\n*choice\n  #I sought revenge.\n    You were unable to truly threaten her, but you forced your mother to\n    spend her time suppressing the revolts of human villages.  The dead    \n    villagers also provided her with no tribute, reducing the increase of her\n    hoard.  Perhaps something more direct would be better as revenge. Still, a real\n    gain nonetheless. \n\n    Cunning and Vigilance increase.\n    *set cunning %+20\n    *set disdain %-20\n    *goto ThirdChoice\n  #Revenge is beneath my dignity.\n    Disdain for petty matters is essential for a dragon, as it avoids the\n    pointless feuds that weaken you and allow your enemies to achieve great\n    goals. \n   \n    Manipulating peasants is also not the most honorable of activities for a    \n    mighty dragon such as yourself. \n   \n    Your wise choice increases Disdain and Honor.\n    *set cunning %-20\n    *set disdain %+20\n    *goto ThirdChoice\n\n*label ThirdChoice\n*comment Trades off Disdain versus Brutality\n\nAfter several days of flight, you came across a tiny halfling travelling through the desert.  Even from afar, your keen eyes detected the glint of gold and the sparkle of magic.  This halfling has some sort of magic golden shield strapped to his tiny back.\n\nYou knew immediately that this treasure must be yours.\n\nThe halfling was far from civilization and would almost surely die soon of thirst and starvation.  For the moment, he seemed to be protected by the power of the shield.\n\nDid you kill him on the spot, ignoring his magical protections, or did you hover nearby and wait for the halfling to die, knowing that you might lose the treasure?\n\n*choice\n  #I waited for him to die.\n    There's no reason you have to do all the dirty work yourself.  A few hours later, the halfling stumbled, crawled for a while, and finally stopped.  You easily plucked the treasure off of his body, saving yourself quite a bit of work.\n   \n    Disdain and Finesse increase.\n    *set brutality %-20\n    *set disdain %+20\n    *goto Axilmeus\n  #I killed him on the spot.\n    It wasn't easy; the shield protected him from fire and helped him evade your attacks.  Eventually you had to swallow him whole and cough up the shield.  That worked!\n   \n    Brutality and Vigilance increase.\n    *set brutality %+20\n    *set disdain %-20\n    *goto Axilmeus\n\n*label Axilmeus\n*page_break\nOne of your elder clutchmates was an overbearing brute named Axilmeus.  Axilmeus loved to torment the others, always seeking to seize what did not belong to him.\n\n\"${name},\" he said with a menacing grin, \"give me that golden shield, or I will beat you within an inch of your life.\"\n\n*choice\n  # I gave him the shield to avoid a fight.\n    *set disdain %+ 15\n    Disdain increases.\n    \n    Axilmeus took your shield and beat you with it, hard.\n    *goto ResolveAxilmeus\n  # I dueled him for the shield.\n    *set brutality %+ 15\n    *set cunning %- 15\n    Brutality and Honor increase.\n    \n    You fought your hardest, but Axilmeus was a bit stronger than you; he pinned you to the ground and pried the shield out of your claws.\n    *goto ResolveAxilmeus\n  # I evaded him and hid the shield.\n    *set brutality %- 15\n    *set cunning %+ 15\n    Cunning and Finesse increase.\n  \n    Unfortunately, Axilmeus is your elder; at this age, he has the advantage in maneuverability.  He caught up to you quickly, pinning you to the ground and prying the shield out of your claws.\n\n*label ResolveAxilmeus\nThen he crushed the shield in his jaws, wasting the magical energies imbued within it, and spat it out at your feet.  He laughed with a great roar as he flew away.\n\n*label Wrapup\n*comment [We need to generate a starting Wealth somehow.  My current thought is\n*comment that we use a random number increased up by low Brutality, low Disdain,\n*comment and high Cunning. \n*comment But we could also tie it more specifically to the choices, or just go\n*comment random, or whatever.]\n\n*page_break\n\nYou have the following stats:\n\n*temp wealth_text \"${wealth} gold coins\"\n\n*stat_chart\n  opposed_pair Brutality\n    Brutality\n    Finesse\n  opposed_pair Cunning\n    Cunning\n    Honor\n  opposed_pair Disdain\n    Disdain\n    Vigilance\n  percent Infamy\n  text wealth_text Wealth\n\n*finish Begin the Adventure\n\n", "warrequest": " \nAs the sun climbs high, you bask yourself on a rock near your lair.  A group of humans slowly make their way up the slope towards you this day.  The humans wear armor and carry weapons, but their weapons are sheathed and they approach respectfully.  These are humans you know.\n\nAs they enter the cleared area of stone that surrounds your lair, the humans kneel before you, recognizing your glory.  \"O liege,\" begins the leader, \"accept our praise and hear our petition.\"\n\nYou incline your head slightly, acknowledging her and indicating that she may proceed.\n\n\"As your magnificence is surely aware, almighty dragon, we are among the knights and lords that hold lands under your magnificence's rule.  We bring tribute each year, and now we come to beg a boon of you.\"  The knight pauses.  \"Our enemies—people like ourselves, but with a mighty army—have begun invading your territory.  They have looted the less well-defended manors and burned some of the fields.  We are readying to fight them, but your magnificence's assistance would greatly strengthen our hand.\"\n\nOne of the other knights interrupts.  \"They are taking our animals and chattels and destroying the value of our lands.  You must aid us!\"\n\nYour nostrils flare and a wisp of smoke puffs out of them.  He dares to refer to your animals, chattels, and lands as his own?  A grave insult indeed!  How do you respond?\n*choice\n  #Ignore the insult.\n    The minor insult the knight has offered you is far too insignificant for you to address, although you are gratified that the lead knight shushes him quickly.\n    \n    Your Disdain increases.\n    *set disdain %+20\n    *goto WarChoice\n  #Lecture the young knight on the nature of feudalism.\n    \"Your animals and chattels?  Your lands?  Surely you mean my animals, chattels, and lands?\" you say.\n    \n    \"Of course, mighty one,\" says the leader of the delegation.  \"Sir Edmund foolishly misspoke.  We would never presume to make a claim on your rights.\"\n    \n    \"Good,\" you mutter with a warning glance at Sir Edmund.  His pallor is most gratifying.  \n    \n    Vigilance and Finesse increase.\n    *set disdain %+10\n    *set brutality %-10\n    *goto WarChoice\n  #Kill the individual offender.\n    A flash of one claw is all that it takes to deal with the insolent knight. His companions are clearly taken aback, yet they act as if nothing had happened.  But then, what choice do they have?  \n    \n    Vigilance, Brutality, and Infamy increase.\n    *set infamy %+ 10\n    *set disdain %-10\n    *set brutality %+10\n    *goto WarChoice\n  #Kill them all for their insolence!\n    A blast of flame incinerates half of them, and then you fall on the survivors with tooth and claw.  One of the knights has the temerity to try to draw her sword, but you dispatch her quickly enough.  Whatever matter they wished you to handle could not possibly be as important as enforcing your prerogatives.  \n    \n    Vigilance and Infamy increase; Brutality increases greatly.\n    *set infamy %+20\n    *set disdain %-20\n    *set brutality %+30\n    *goto NoHelp\n\n*label WarChoice\n\nThe leader of the delegation clears her throat nervously.  \"Mighty one, will you aid us in our time of need?\"\n\n*choice\n  #I am honor-bound to defend my vassals.\n    \"Very well,\" you rumble.  \"You have served me loyally as vassals, and I will punish those who would dare threaten my interests.\"  \n    \n    Honor and Vigilance increase.\n    *set cunning %-20\n    *set disdain %-20\n    *goto War\n  #I need more information.\n  \n    Cunning increases.\n    \n    What do you need more information about?\n    *set cunning %+10\n    *choice\n      #How badly does the enemy threaten my tribute?\n        \"The losses will likely be significant, your magnificence.  We expect to prevail, but the enemy will hurt us.  We may be unable to offer the sort of tribute we have customarily given.\"  \n        \n        Vigilance increases.\n        *set disdain %-10\n        *goto WarChoice2\n      #How powerful are your enemies?\n        \"They are a threat to us,\" replies the lead knight.  \"We will likely prevail, but it will be hard-fought without your aid.  Our enemies pale in comparison to your vast power, of course.\"  \n        \n        Finesse increases.\n        *set brutality %-10\n        *goto WarChoice2\n      #Does the enemy have loot worth taking?\n         One of the knights smiles, a greedy glint in his eye.  \"Yes, indeed, mighty one. Our enemies have a wealthy port city.  Much trade flows through that port.  If you shatter the enemy's army, you will be able to plunder its gold for your own.\"  \n         \n         Cunning increases.\n         *set cunning %+10\n         *goto WarChoice2\n  #The humans can fend for themselves.\n    \"Your war is of no interest to me,\" you say.  \"Begone before I decide to use you for sport.\"\n    \n    The humans hurry down the hill, not wanting to annoy you further.  \n    \n    Disdain increases.\n    *set disdain %+20\n    *goto NoHelp\n\n*label WarChoice2\n\nWill you help the humans in their war?\n*choice\n  #Yes.  To war!\n    Based on what you have learned, you choose to go to war to aid the humans.\n    *goto War\n  #No, let them take care of it themselves.\n    Disdain increases.\n    \n    *set disdain %+10\n    *goto NoHelp\n\n*label War\n\nThe humans convene a war council in the area surrounding your lair.\n\n*if (blasphemy > 0)\n  As you join them in the council, a steady rain begins to fall.  Their diviners report that the gods are displeased with you.  Still, you are a mighty dragon.  A little divine disfavor won't make much of a difference. \n\nYou lean in closely to read their tiny human maps, nearly killing several squires.\n\nWith your support, your minions plan to engage their enemies in a single large field battle.  A decisive victory should end the incursions into your territory and set up an effective counter-attack.\n\nDo you take a role in the center of the battle, relying on your core combat ability, or do you plan on remaining hidden at first and then striking from surprise at a point when the enemy is vulnerable?\n\n*temp honor\n*set honor 100-cunning\n*temp finesse\n*set finesse 100-brutality\n\n*choice\n  #Participate in the center of the battle.\n    *if ((brutality+honor)>150)\n      You position yourself with the armored knights and lead a charge against the center of the enemy's position.  Between your awesome combat abilities and the competent performance of your knights, you shatter the enemy army. You rampage among the enemy troops as they try to flee, turning their defeat into an utter rout.  It becomes hard not to giggle, but you avoid it, to maintain morale.\n      \n      Brutality, Honor, and Infamy increase.\n      *set brutality %+10\n      *set cunning %-10\n      *set victory +2\n      *set infamy %+10\n      *goto looting\n    *elseif ((brutality+honor)>50)\n      You position yourself with the armored knights and lead a charge against the center of the enemy's position.  The fighting is fierce, but mere humans are no match for a dragon.  Your army wins a decisive victory, although the enemy withdraws in good order.\n      \n      You lick your talons and plan the next phase of your attack.\n      \n      Brutality and Honor increase.\n      *set brutality %+10\n      *set cunning %-10\n      *set victory +1\n      *goto ambush\n    *else\n      You position yourself with the armored knights and lead a charge against the center of the enemy's position.  \n      \n      Brutality and Honor increase.\n      \n      Unfortunately, the enemy army is more powerful than you would have thought credible.  They muster an effective lance charge after your initial attack, and one of the enemy knights scores a long gash down your side and through your wing muscles.\n     \n      The battle is inconclusive.  While you gain an opportunity to raid into their territory, you do not put an end to their depredations.  And even after it heals, your wing muscle is never quite as strong and responsive as it used to be.\n      \n      Infamy decreases.\n      *set infamy %-10\n      *set brutality %+10\n      *set cunning %-10\n      *set wounds +1\n      *goto ambush\n  #Remain hidden and strike from surprise.\n    *if ((cunning+finesse)>150)\n      You carefully plan the battle, giving specific instructions to your troops.  The battle is well underway and the enemy troops are fully committed when you drop out from a cloud above the battlefield.  From your angle of attack, you are flying directly out of the sun; they do not notice you until you are almost upon them.  Your fiery breath lays waste to their high command; you are then able to attack their knights from the rear, inflicting brutal casualties.\n     \n      Your troops respond perfectly to the opportunity, smashing the disorganized enemy and triggering a complete rout.  It becomes hard not to giggle, but you avoid it, to maintain morale.\n      \n      By the end of the day, most of the enemy army has been captured or slain, and the remainder is unable to pose an ongoing threat.\n      \n      Cunning, Finesse, and Infamy increase.\n      *set infamy %+10\n      *set brutality %-10\n      *set cunning %+10\n      *set victory +3\n      *goto looting\n    *elseif ((cunning+finesse)>50)\n      You attack from surprise in the middle of the battle.  The enemy responds quickly to your attack and demonstrates impressive discipline, but they are no match for a dragon and your attack still makes the difference.  Your army wins a decisive victory, but the enemy withdraws in good order.\n      \n      You lick your talons and plan the next phase of your attack.\n      \n      Cunning and Finesse increase.\n      *set brutality %-10\n      *set cunning %+10\n      *set victory +1\n      *goto ambush\n    *else\n      You set up in a hidden position before the battle, planning on emerging to attack at a key moment.  \n      \n      Cunning and Finesse increase.\n      \n      Unfortunately, the enemy spots you before you are ready.  They send a group of knights to attack you.  Without the support of your own army, you find yourself in a tough fight.  You manage to fight them off and withdraw successfully, but not before one of the enemy knights scores a long gash down your side and through your wing muscles.\n     \n      The battle as a whole is inconclusive.  While you gain some opportunity to raid into their territory, you do not put an end to their depredations. Even after it heals, your wing muscle is never quite as strong and responsive as it used to be.\n      \n      Infamy decreases.\n      *set infamy %-10\n      *set brutality %-10\n      *set cunning %+10\n      *set wounds +1\n      *goto ambush\n\n \n*label ambush\n*page_break\nYou fly towards the enemy's territory; you will make them pay for this war with a punitive raid of your own.  As you approach, you see an effigy of yourself planted out in a field.  The mockery is most cruel, depicting you as a crude beast.\n\n*if (disdain>70)\n  *label IgnoreTrap\n  While it touches at your sense of pride, you know that the effigy is almost surely meant to lure you into an ambush.  You have enough Disdain for the japes of humans to bypass the trap.  Far better to pay them back by sacking their homes.\n  *goto looting\n*elseif (disdain>30)\n  Do you destroy the mockery?\n  *choice\n    #Yes.\n      *set disdain %-15\n      Vigilance increases.\n      \n      *goto AttackTrap\n    #No.\n      *set disdain %+15\n      Disdain increases.\n      \n      *goto IgnoreTrap\n*else\n  *label AttackTrap\n  *set wounds +1\n  *if (wounds >= 5)\n    You fly down to destroy the effigy and punish the humans near it, but it's a trap! They fire a concealed ballista at you and follow it up with a concerted volley of arrows.  Without your prior wounds, this would have been dangerous.  But because of your many grievous injuries, the ballista is able to knock you to the ground, and the arrows find chinks in your weakened armor.\n\n    You slaughter many of the humans, but then it dawns on you that you are fighting not for vengeance but for survival.  Even so, you think that you will be able to escape with your life.  Finally, however, a heavily armored knight charges you and drives her lance deep into your chest.  You struggle to rise despite the mortal wound, but she begins hammering your head with her sword.  All goes dark.\n\n    *goto_scene death\n  *else\n    You fly down to destroy the effigy and punish the humans near it, but it's a trap!  They fire a concealed ballista at you and follow it up with a concerted volley of arrows.  Only the ballista bolt truly hurts you, but it glances off your head, permanently blinding you in one eye. You kill all of the humans for their impudence, but you have still suffered a serious injury this day.\n    *goto looting\n\n*label looting\n*page_break\n\nYou fly into the enemy territory.  You quickly sack various small towns, collecting a variety of booty for your troubles.  But then you fly into a major port city, where the real opportunity presents itself.  You can smell the rich supply of gold and jewels just waiting to be taken from a major temple.  And yet…sacking a temple might anger the gods.\n\n*choice\n  #Gods worry lesser beings, not dragons!\n    You sack the temple, leaving the building in ruins and carrying off most of its portable wealth.  Even the gold statuary of the gods will add to your hoard.  Some of the priests resist you, but they are not much as warriors and you quickly strike them down.  Your Wealth goes up dramatically. Your impiety angers the gods, but they do not act against you…yet.\n    *set blasphemy +1\n    *set wealth +5000\n    *goto WarConclusion\n  #I think I have enough loot without angering the gods.\n    You take as much other wealth as you can gather, but you leave the temple alone.  The missed opportunity for gain is outweighed by avoiding future problems.  Your Wealth goes up, but not as much as it could have.\n    *set wealth +1500\n    *goto WarConclusion\n\n*label WarConclusion\n\nIn gratitude for your assistance in the war, your human minions provide you a particularly large tribute this year.  Nice work!\n*set wealth wealth+(victory*1000)\n*finish\n\n*label NoHelp\n\nWithout your aid, the humans in your territory get the worst of it in the war with their neighbors.  This has little importance for you, and you avoided the risks implicit in battle. It does mean that the tribute this year is low, and you missed an opportunity to loot the humans' enemies.\n*set wealth -1000\n*finish\n", "worship": "While you are flying across your territory, you spot a new shrine that your people have erected.  You fly down and find that a goat has been tied to the shrine.  A young woman is bowing before the shrine and praying.  The symbols on the shrine depict some winged deity, but the iconography is unfamiliar.\n\n\"You there,\" you call out.  \"To whom is this shrine dedicated?\"\n\nThe woman looks over her shoulder at you.  Her eyes widen in surprise, and she quickly turns, throwing herself prone before you.  She speaks without lifting her head.  \"O mighty dragon, this shrine is dedicated to you.  Please, accept my praise and offering.  I know it's not much, but it's the best I could afford.\"\n\nIt seems the people in your territory have started to worship you.  What do you want to do about that?\n\n*choice\n  #This is heresy!  Worshipping me is now forbidden.\n    You inform the woman that you are a dragon, not a god, and that you find her veneration offensive.  She blanches and then flees, hoping to be left alive.\n\n    You rip down the shrine and let the word go forth that worshipping you is forbidden.  It takes a certain amount of enforcement, but eventually the religion dies down.\n\n    Your decision pleases the gods, but it costs you a certain amount of tribute—it turns out that some people are more willing to give money to a \"god\" as tribute than to a dragon.\n    *set blasphemy -1\n    *finish\n  #Whom they worship is their business.  I ignore it.\n    You ignore the groveling woman and pause only to eat the goat before returning to your lair.\n\n    Over the following weeks, you become aware of a slowly growing cult worshipping you.  Your worshippers give more in tribute than most of the rest of the people living in your territory, but other than accepting the tribute, you pay little attention to the cult.\n    *set wealth +500\n    *set encourage 0\n    *page_break\n    *goto Statue\n  #Yes, they should worship me!  I encourage it.\n    \"It is well that you recognize my divine glory!\" You place one clawed hand lightly upon the woman's form. \"Accept my blessing, and go forth knowing that a dragon guides your actions!\"\n\n    On numerous similar occasions, you do everything you can to encourage the new religion.  Soon, you are venerated throughout your territory as widely as any of the major gods.\n\n    Almost immediately, you begin to reap tangible rewards from your new status as a deity.  It turns out that people will dig deeper to make offerings to their god than to their feared draconic overlord.\n    *set encourage 1\n    *set blasphemy +1\n    *set wealth +1500\n    *page_break\n    *goto Statue\n\n*label Statue\n\nSeveral weeks after you first learned of the new religious movement, a group of humans approach your lair.  They carry a large golden statue with them.  The artistry is not perfect, but it is clearly a dragon and probably intended as a representation of you.\n\nAn old man steps forward from the group and genuflects towards your lair.  \"Master…great dragon that breathes the fire that burns in our hearts…hear our prayer! Bless this statue, that it may watch over us and that we may pray before it.\"\n\nThe statue was clearly made out of gold, with semi-precious stones for the eyes and at the tips of the claws and teeth.  It is worth a small fortune, and you hunger for it.\n\nWhat do you do?\n*choice\n  #Claim the statue for my hoard and send the people away.\n    \"This is a worthy gift,\" you say.  \"It will enhance my hoard nicely.  Now leave!\"\n\n    There is some discontented murmuring among the people, but they have enough sense not to arouse your ire.\n\n    The statue goes nicely in your hoard, surrounded by piles of gold coins and adorned with a little jewelry. But the statue is pretty much the last benefit you get from your little cult.  Oh well.\n    *set wealth +1000\n    *goto ImpietyCheck\n  #Bless the statue and send it back with them.\n    You breathe flame at the statue; not much, enough to heat it a little but not to melt it.  The gemstone eyes shine as if some of the flame has been captured within.  The people praise you enthusiastically and carry the statue back to their village to be the center of their religious practices.\n\n    Over the subsequent weeks, you receive increasing gifts and offerings as your religion grows.\n    *set wealth +750\n    *page_break\n    *goto BeliefQuestion\n\n*label BeliefQuestion\nYour followers continue making offerings and praying to you.  It's a pretty sweet setup, all things considered.\n\nLet's be honest, though.  Do you actually believe you are a god, or is this just a way to gain control over your followers and extract additional offerings?\n\n*choice\n  #I am actually a god!  How dare you question my divinity?\n    Sorry, sorry!  I didn't mean any insult, your holiness. \n\n    Honor increases.\n    *set cunning %-20\n    *page_break\n    Despite your new perspective, life continues much as it did before.  It turns out that there isn't much difference between a dragon that believes it is a god and a dragon that does not.  Of course, the gods themselves may disagree….\n    *goto ImpietyCheck\n  #Don't be silly, it's just a means of control.\n    That's what I thought.  Running a fake religion dedicated to yourself isn't very pious or honorable, but it is very profitable.\n\n    Cunning and Wealth increase.\n    *set cunning %+20\n    *set wealth +1000\n    *goto ImpietyCheck\n\n*label ImpietyCheck\n*page_break\n*if (blasphemy >= 3)\n  As you are flying one day, a blue thunderbolt knocks you from the air.\n  \n  While you try to recover, an avatar of the goddess of war attacks you. \"The gods are much angered by your blasphemy, lizard!\"\n  \n  With the first strike of her sword, both your wings are gone; you plummet to the ground with a deafening thud.  With another strike of her sword, she blinds you in holy light.\n  \n  With the final blow, she severs your head from your body, taking it as a trophy for the heavens.\n\n  *achieve blasphemy\n\n  *goto_scene death\n*elseif (blasphemy > 0)\n  The gods may not be pleased by your impiety, but they do not deign to take action against you.\n  *finish\n*else\n  The gods are pleased with your piety.\n\n  *finish\n"}};
