eciation by passing you all sorts of exotic substances. \n          *if improv >= 65\n            *set reputation %+20\n            You play deep into the night, though at some point the scene becomes hazy, and you black out until you are awakened by…\n            *goto tomorrow\n          *else\n            *set reputation %+10\n            You play deep into the night, though at some point the scene becomes hazy, and you black out until you are awakened by…\n            *goto tomorrow\n    *else\n      *set cohesion %+10\n      *set reputation %+10\n      your beloved bandmates. No matter what else is going on, it's always nice to be able to spend some quality time with the band.   \n \n      *if marvins \u003c 65\n        Of course, quality time with the band can always include some quality groupies as well. When a gang of party-hungry ${sexpref_boys} forces their way backstage, claiming to be your \"biggest fans in the world\" after just one show, you're only too happy to play the hospitable host. \n        \n        It doesn't take long to discover that the ${sexpref_boys} in ${stop1} do not mess around when it comes to partying. You keep up with them the best you can, but soon everything becomes hazy, and you black out until you are awakened by…\n        *goto tomorrow\n      *else  \n        As an added bonus, you get to listen to the Marvins' set through the PA speakers pumping in to your dressing room. After their show, the lead Marvin stops by your dressing room to ask what you thought of their set.\n        *goto marvinq2 \n  #Relax and rest up before tomorrow's show.\n    *set health %+20\n    *set buzz %-10\n    *set reputation %-15\n    Good thinking. Staying rested and healthy is crucial on a long tour. As you pack up and make your way to the parking lot, you're met by a group of new fans. While it was hard to tell from the stage, it seems some people really dug your show! They ask if you want to come back to one of their houses and party with them tonight, but you politely decline.\n    *goto show2  \n  *if (demo_first) #Get an early start selling demo tapes.\n    You rush outside and set up your demo table outside the ${vehicle}, hoping to catch anyone going for a smoke before the next show.\n    *if buzz >= 65\n      *set money +100\n      You are surprised by the amount of sales you are able to make! All told, you manage to sell 20 demo tapes, your best haul yet.\n      *goto as_soon\n    *else\n      *set money +35\n      While relatively few people venture over to your table, you do manage to meet a few enthusiastic fans. They not only purchase demo tapes, but they promise to return tomorrow.\n      \n      All told, you manage to sell seven demo tapes, your best haul yet. \n      *label as_soon\n      As soon as The Marvins come back on stage, the crowd outside dissipates, leaving you to figure out what to do with yourself once again.\n      *goto choice2      \n  *if (MarvinsHate) #Stick it to The Marvins by throwing our own party/concert somewhere else.\n    *set buzz %+5\n    What better way to stick it to The Marvins than to steal away their audience to your own surprise show? You share this plan with some newly acquired fans you met in the parking lot. They are stoked about the idea and promise to spread the word to as many people as possible. One of them even offers up his basement for the impromptu gathering.\n  \n    As you set up at the house, people from the show start to trickle in.\n    *if buzz >= 65\n      *set buzz %+20\n      While it was hard to tell from the stage, it seems a lot of people really dug your show. By the time you're ready to play, it seems almost half the audience has ditched The Marvins to come see you!\n      *goto secret_show\n    *else\n      *set buzz %+10\n      While it was hard to tell from the stage, it seems some people really dug your show. By the time you're ready to play, the basement is nearly packed with newly acquired fans!\n      *goto secret_show\n \n*label marvinq\n*if marvins \u003c= 45\n  Unfortunately, you wake up the next day to find that Marvin has taken offense to your witty stage banter. He got you bumped from tonight's show. Your bandmates are understandably pissed off that your rudeness cost you all a major gig. But what were you supposed to do, not tell everyone how much those lame-asses suck?\n  \n  *goto stop2\n*else\n  Packing up backstage after the show, you happen to bump into Marvin once again.\n\n  \"I saw you guys back there watching our set. So, what did you think?\"\n  *label marvinq2\n  *choice\n    #\"Great show. We really enjoyed watching you work.\"\n      *set marvins %+20\n      Marvin seems pleased with your reaction.\n    \n      \"Thanks! You know, a lot of people think we're gimmicky, but we put a lot of work into our stagecraft. \n      *goto marvind \n    #\"It was something else. Truly, something else.\"\n      *set marvins %+10\n      Marvin seems happy with your response.\n    \n      \"Well, you know, we try to give the audience something different. \n      *goto marvind \n    *selectable_if (reputation > 47) #\"No offense, but that was the lamest piece of crap show I've ever had the misfortune to suffer through. And please let me reiterate, no offense.\"\n      *set marvinsHate true\n      *set marvins %-90\n      *set reputation %+10\n      *set cohesion %-20\n      It seems Marvin does take offense. His entire face turns beet red. He looks like some sort of galactic monster. He rants and raves about destroying your career and making sure you never play again. You just ignore him and head out for the night.\n    \n      Unfortunately, you wake up the next day to find that Marvin has made good on his threat, at least in one small way: you've been bumped from tonight's show. Your bandmates are understandably pissed off that your rudeness cost you all a major gig. But what were you supposed to do, not tell that lame-ass how much he sucked?\n      \n      *goto stop2\n*label marvind\n*if marvins >= 65\n  It didn't hurt getting to come on after you guys, though. You might not have been able to tell from onstage, but the audience was absolutely loving you. Actually, that gives me an idea: why don't you come touring with us the rest of the way? We have forty gigs left, all across the country, four more months. I'd love to have you guys as my opening act. What do you say?\"\n\n  Touring with The Marvins means much greater exposure, more money, and more shows. But it also means touring with The Marvins. \n  *label marvin_choice\n  What do you say?\n\n  *hide_reuse\n  *choice\n    #\"Are you kidding? We'd love to!\"\n      *set cohesion %-5\n      *set marvins 99\n      *achieve marvinyes\n      While Marvin calls up his manager, you run and share the good news with the rest of the band. There's a fair bit of consternation, with ${band_member1} wanting to know why you'd want to associate yourselves with \"poser sellouts.\" But when you explain all the benefits of touring with The Marvins, everyone comes around to share your excitement.\n      *goto marvin_tour\n    #\"Sorry, Marvin. We've kinda got our own thing going.\"\n      *set commercial %-20\n      *set style %-10\n      While The Marvins's offer is nice, you didn't set out on this tour to become the opening act for some electro-space outfit. For better or worse, you're going to pursue your dream on your own terms.\n      \n      You tell this to Marvin, who does not take the news graciously.\n      \n      \"Your loss,\" he sneers, storming off.\n      \n      Looks like you made the right call. Unfortunately, just a few minutes later, the club promoter comes by to tell you that you've been booted from tomorrow night's bill, courtesy of Mr. Marvin. The band is not thrilled, understandably, but everyone agrees you are better off not being associated with The Marvins.\n      \n      *goto stop2\n    #\"Wow, that's a huge decision. I'd better talk to my band first.\"\n      *if (sound = \"poppy\") or (rosenblatts = true)\n        *set cohesion %+15\n        The band seems mostly excited about the opportunity, although ${band_member2} expresses some fears that you might be branded as \"sellouts.\"\n        \n        Ultimately, the decision is up to you.\n        *goto marvin_choice\n      *elseif ((sound = \"heavy\") or (sound = \"dark\")) or (sound = \"punk\")\n        *set cohesion %-10\n        The band seems confused about why you would even consider this offer. Words like \"poser,\" \"sellout,\" and \"idiotic\" are tossed around, although ${band_member2} thinks there might be some benefit to consider.\n        \n        Ultimately, the decision is up to you.\n        *goto marvin_choice\n      *else\n        *set cohesion %+5\n        The band seems split about the proposition. \n      \n        A contentious argument kicks up, with words like \"poser,\" \"sellout,\" and \"foolish\" tossed around. The band seems evenly split between two camps: The Marvins are ridiculous, and we shouldn't tour with them, and it would be ridiculous to pass up their offer.\n\n        Ultimately, the tie-breaking decision is left up to you.\n        *goto marvin_choice\n*else\n  *set style %+5\n  *set stage_presence %+5\n  You guys weren't bad, either. Just some small advice: work on your style and stage presence. The music can only take you so far. You gotta offer something special to the audience that they can't get anywhere else. If you do that, I can see big things for you.\"\n\n  With that little pep talk, Marvin walks off.\n  *goto show2\n\n*label secret_show\n*achieve secretshow\nThe basement \"gig,\" if you can call it that, turns out to be one of most fun nights you've ever had. The crowd's energy level is off the charts, and it fuels you to want to keep playing and playing.\n  \n*if musicianship >= 65\n  *set buzz %+10\n  At some point, after you've run out of original material, members of the crowd start shouting out songs for you to cover. You play for another whole hour of \"audience request time\" before finally calling it a night.\n  *goto ss2\n*elseif stage_presence >= 65\n  *set buzz %+10\n  It turns out your natural on-stage charisma is even more naturally charismatic in such an intimate setting. Looking at all the enraptured faces around the room, it's clear that this is a night they won't soon be forgetting. You play for over an hour, running through every song, half-written idea, and cover you can think of, before finally calling it a night.\n  *goto ss2\n*else\n  You play for over an hour, running through every song, half-written idea, and cover you can think of, before finally calling it a night.\n  *goto ss2\n\n*label ss2\nAfter the show you settle into some heavy partying, with all sorts of illicit substances thrust upon you from various ${sexpref_boys}. At some point the scene becomes hazy, and you black out until you are awakened by…\n\n*label tomorrow\n\"Hey, wake up! Let's go!\"\n \nYou open your eyes the next morning on some unknown bed, on top of some unknown ${sexpref_boy}'s underwear, with an unknown someone walking around naked in front of you.\n\n\"Come on, my parents will be home from church soon, and I need you gone by then.\"\n\nHow do you respond?\n\n*fake_choice\n  #\"Um, who are you?\"\n    All those times you imagined waking up next to a random groupie and not remembering ${sexpref_his} name, and now the time has finally come. Somehow it's not as satisfying as you thought it would be.   \n    \n    $!{sexpref_he} just scoffs and shuttles you outside.\n  #\"Your parents? How old are you exactly?\"\n    \"Do you really want to know?\" ${sexpref_he} asks. \n    \n    Good call. No more questions. You throw on your clothes and make your way to the front door.\n  #\"So did we, like, you know…?\"\n    $!{sexpref_he} just scoffs at you and shuttles you outside.\n \n    \"See you tonight!\" ${sexpref_he} says, slamming the door in your face. You're confused: wasn't that supposed to work the other way around? And what did ${sexpref_he} mean about tonight?\n  \n    Oh yeah, you have another show tonight! It's all coming back now. But you still have no idea where you are and no way to contact the band. Luckily, you manage to hitch a ride into town with a friendly trucker and arrive at the club just in time to meet your similarly beleaguered bandmates. \n    \n    Over breakfast, the ${band_size_text} of you recover from your hangovers and piece together your stories from last night. You are reminded, yet again, of how lucky you are to be on the road with this fine group of miscreants.\n*goto show2\n\n*label show2\n\n*set money +100\nIt seems all of ${stop1}, or at least the cool people, come out for your second show.\n*if (musicianship >= 65) and (stage_presence >= 65)\n  *set buzz %+20\n  Unlike last night, this time it feels like they're actually here for you. The word is getting around! You put in another explosive performance and then \n  *if demo_first = true\n    set up shop in the parking lot with the demo tapes. For the first time, there's actually a line of people dying to take home a copy of your demo, some of them buying multiple copies for friends. You manage to sell out your entire stock, almost a hundred tapes!\n    \n    Once the selling is all done, you hop in the ${vehicle} and hit the road again.\n    *if (demo_style = \"amazing album\") or (demo_style = \"album\") \n      *set money +850\n      *goto stop2\n    *elseif (demo_style = \"excellent EP\")\n      *set money +650\n      *goto stop2\n    *else\n      *set money +450\n      *goto stop2\n  *else\n    hit the road.\n    *goto stop2  \n*else\n  *set buzz %+10\n  It's another solid show before you hit the road again.\n  *goto stop2 \n  \n*label stop2\n*if fran = false\n  It's time to choose your next destination. You've narrowed it down to three choices: Los Angeles, Chicago, and New York City.  \n \n  You and your bandmates spend a long time discussing the pros and cons of each decision. Los Angeles is glitzy and glamorous, and there's no better place to find exposure and commercial opportunities. Chicago is brimming with passionate music fans, with plenty of bars and venues catering to unique styles. New York is massive, with a rich music history and an endless abundance of audiences. \n \n  So, where are you headed next?\n\n  *choice\n    #Out west! Set sail for the City of Angels!\n      *set stop2 \"Los Angeles\"\n      *if sound = \"poppy\"\n        *set buzz %+15\n        *set commercial %+20\n        *goto run\n      *else\n        *goto run\n    #Up north! Let the winds carry us to Chi-town!\n      *set stop2 \"Chicago\"\n      *if (sound = \"punk\") or (unique >= 65)\n        *set buzz %+15\n        *set commercial %-10 \n      *goto run\n    #Back east! No sleep till Brooklyn!\n      *set stop2 \"New York\"\n      *set buzz %+5\n      *goto run\n*else\n  Fran calls you up to give you the lowdown on your next destination.\n\n  *if buzz >= 65\n    *set stop2 \"Los Angeles\"\n    \"I've booked you into some of the hottest clubs in Hollywood. That's Sunset Strip, kiddies, where stars are made every day. Get there right away and make Momma proud!\"\n    \n    Looks like you're heading to Los Angeles!\n    *goto run2\n  *else\n    *set stop2 \"Chicago\"\n    \"I've booked you into some of the hottest clubs on the Miracle Mile. That's the Windy City, kiddies, the Hollywood of the midwest. Get there right away and make Momma proud!\"\n    \n    Looks like you're heading to Chicago!\n    *goto run2\n\n*label run\n*if band_size >= 7\n  *set money -1500\n  *goto runn\n*elseif band_size >= 5\n  *set money -1000\n  *goto runn\n*else\n  *set money -500  \n  *goto runn\n  \n*label runn\n*gosub diag\n\n*goto ruunn\n\n*label ruunn    \n*if buzz >= 60\n  *set money +2500\n  *set health %-10\n  Your good press from The Hot Box propels you to your next run of gigs. Soon, you find you no longer have any problems picking up shows, as word has begun to spread about your band. Once you land in ${stop2}, you fill your schedule with two months' worth of gigs at various spots around town. Your demand is high enough that you get to play every night, sometimes twice. It's exhilarating and exhausting. By the end of the summer, you miss ${hometown} more than ever.\n  *goto end2\n*else\n  *set money +1000\n  *set health %-15\n  The trip to ${stop2} is touch-and-go, as you find yourself having trouble picking up gigs along the way. You play some tiny bars and even a few open mics just to keep active. Thankfully, as you get close to your destination, you start to pick up more gigs. Your momentum allows you to pick up enough shows to last in ${stop2} for the rest of the summer: one month, to be exact. It's an exhilarating and exhausting month of non-stop playing, and by the end you find yourself missing ${hometown} more and more.\n  *goto end2\n  \n*label run2\n*set money +1500\n*set health %-5\n*gosub diag\n*goto ruun2\n\n*label ruun2  \nYour two months in ${stop2} are exhilarating and exhausting. Your demand is high enough that you get to play every night, sometimes twice. For the first time, you can really feel the buzz around you growing, as your band is written up in multiple magazines and newspapers. But by the end of the summer, you find yourself missing ${hometown} more and more.\n*goto end2\n\n*label marvin_tour\n*set MarvinTour true\n*set money +2500\n*set commercial %+20\n*set style %+20\n*set stage_presence %+20\n*set buzz %+10\n\nYour three months with The Marvins takes you all over the country, from Los Angeles's Sunset strip, to Chicago's Miracle Mile, and, finally, to New York City. The Marvins' buzz only grows as the tour continues, and by the time you've reached New York, they have secured a major record deal. \n\nEven with all their success, The Marvins turn out to be a great group of people. They even help you add some flare and style to your performance. It's a blast hanging out with them.\n*if (musicianship >= 65) and (stage_presence >= 65)\n  *set buzz %+10\n  Meanwhile, you're picking up fans left and right, with the help of glowing reviews in every town. One reviewer dubs you \"twice the steak with all The Marvins' sizzle,\" whatever the hell that means. You're just glad to be playing every night to more and more fans in a major city. But with fall approaching, you find yourself missing ${hometown} more and more.\n  *goto end2\n*else\n  Still, sometimes you miss being able to make your own decisions and headline your own shows. Despite all the gigs you're getting to play, you know there's something more you want. As the summer tour draws to a close, you are excited to return to ${hometown} and figure out your next move.\n  *goto end2\n\n*label diag\n\n*set flag true\n*if health \u003c= 35\n  *if hdiag = true\n    *return\n  *else \n    *set hdiag true\n    *if health \u003c= 20\n      The nagging illnesses you've been dealing with all tour—bad cough, fatigue, dizziness—catch up to you all at once. You're forced to go to the emergency room, where you are diagnosed with mild pneumonia, the only cure for which is extended rest. The remainder of your tour is put on indefinite hiatus.\n      *goto hiatus\n    *else\n      Unfortunately, it seems life on the road is catching up to you. You've developed a nasty cough, you feel tired and worn out, and it's started to burn when you pee (although that could just be the booze). Your bandmates worry about you. They suggest you take some time off to heal up. But the last thing you want to do is derail the tour at this point. What do you do?\n      *choice\n        #See a doctor.\n          *if money \u003c 300\n            *set money -50\n            *set health %+10\n            Unfortunately, you cannot afford such luxuries as professional medical care. Instead, you rest up for a couple days, then get back on the road.\n            *return\n          *else\n            *set money -250\n            *set buzz %-5\n            *set health %+25\n            It costs a pretty penny, but your trip to the doctor fixes you up nice and quick. She gives you some codeine for the cough, some vitamin supplements for the energy, and some ointments for the…well, you get the idea. In just a couple days you're feeling like your old self again and ready to get back on the road.\n            *return\n        #Rest for a few days.\n          *set health %+15\n          *set money -100\n          *set buzz %-10\n          You decide to kick up your feet at a roadside motel for a few days. The rest helps. While you wouldn't say you're back to normal, you feel strong enough to carry on.\n          *return\n        #Keep going. I'll be fine. \n          You decide on the \"plow forward and hope for the best\" strategy. Let's hope it works out.\n          *return\n*elseif money \u003c= 250\n  *if dmoney = true\n    *return\n  *else\n    *set dmoney true\n    *if (money \u003c= 50) and (fran = false)\n      You arrive at a gas station ATM to find that credit cards are maxed out, your bank accounts drained, and your wallets comically filled with moths. It's time to initiate emergency protocols: Calling the parents.\n    \n      Between all ${band_size_text} of you, you're only able to scrounge up a couple hundred dollars. It's enough to get the ${vehicle} back on the road. Unfortunately, it's not enough to keep the tour going. You decide to head back to ${hometown} to regroup and consider your next move.\n      *goto hiatus\n    *else\n      Uh, oh. It appears you are running drastically low on funds. If you don't do something soon, you risk running out of money completely.\n      *choice\n        *if (fran = true) #Ask Fran for help.\n          You call up Fran and explain the situation.\n        \n          \"Honey, you're not the first band to blow through money like a drunken pirate crew, but that doesn't make it all right.\n          *if buzz >= 72\n            I'll front you $1,000 more dollars; better make it count this time!\"\n          \n            Click. Looks like you're getting a reprieve. Hopefully you'll make enough money going forward that you won't have to cut your tour short.\n            *set money +1000\n            *return\n          *else\n            I'll front you $500 more dollars, but you're going to have to work for it. I'll be in touch.\"\n          \n            Click. What did she mean by \"work for it\"? Your question is answered just a few hours later, when a representative from Organix, an industrial chemical manufacturing company, calls about a jingle you're supposed to create for them. This seems to be the work Fran wanted. Are you in?\n            *choice\n              #Yes.\n                *set money +500\n                *set health %-15\n                *set commercial %+20\n                Working long hours, you bang out a new jingle called \"Organix Ecstatic,\" filled with all sorts of corporate buzzwords and hyperbolic marketing claims. The company loves it. Shilling for a corporate entity makes you feel somewhat icky, but you're glad to have enough money to get back on the road.\n                *return\n              #No.\n                *set commercial %-20 \n                You decide to decline Fran's offer of $500 with strings attached. You will have to figure out how better to hold onto your money, or else the tour may come to an early end.\n                *return\n              #No, and I think I'm done needing Fran's \"help,\" too.\n                *set commercial %-20\n                *set fran false\n                You call up Fran to let her know she's been relieved of her duties. You'd better figure out how to make money soon, or else you may be relieved from your duties as well.\n                *return\n        *if (sound != \"punk\") #Sleep in the ${vehicle} from now on to save money.\n          *set money +350\n          *set health %-20\n          You decide to start sleeping in the ${vehicle} instead of the luxurious trucker motels to which you've become accustomed. It's cramped, damp and smelly—and that's before you started sleeping there. But at least you get to keep touring.\n          *return\n        *if (sound = \"punk\") #Ask for help from the local punk community.\n          *set money +400\n          You reach out to some of the contacts given to you by your loyal base of fans. It seems that punk bonds truly do run deep. The fans hook you up with lodging, supplies, food, and even some gas. All they ask in return is that you promise never to sell out. Seems like a fair bargain.\n          *return     \n        #We'll make enough at the next stop to get us through; let's keep going.\n          You decide on the \"plow forward and hope for the best\" strategy. Let's hope it works out.\n          *return\n*else\n  *return\n\n*label hiatus\n*if buzz \u003c= 40\n  After the hiatus, back in ${hometown}, you try your best to regroup and get back on the road. Sadly, it seems the band has fallen apart. ${band_member1} went off to college, while ${band_member2} joined up with The Marvins, who are currently recording a highly anticipated debut album. Meanwhile, your fortunes are left in the dust. \n  \n  *if fran = true\n    Fran won't return your phone calls.\n    *goto dead\n  *else\n    *goto dead\n*else\n  *set cohesion %-25\n  *set buzz %-20\n  After the hiatus, back in ${hometown} and temporarily crashing at the parentals, you try your best to regroup and get back on the road. But the band has begun to drift apart, you're having trouble getting a gig, and you've even begun looking for a 9-to-5 just to get out of the house. You worry that your rock career may be coming to a premature end.\n  \n  *if demo_first\n    That is, until one day, when, out of the blue, your band is invited to play at a local music festival honoring musicians from the ${hometown} area. It seems the organizer is a longtime fan of yours, back from your days gigging at Casaba's. There will be thousands of people there!\n\n    You bring the band back together for your one last shot at rock stardom.\n    *page_break\n    *goto_scene joey\n  *else\n    *set studio_slave true\n    That is, until one day, when ${band_member1}'s father comes to the rescue, with the hook up for a discounted session at The Bubonic Sonic, a local recording studio. You'll have to a few hours at the studio to cover the cost, but it's a tremendous deal. Looks like your rock career is off life support, for now anyway.   \n    *finish\n    \n*label dead\n*achieve earlyending\nYou're forced to move back in with Mom and Dad while you search for a 9-to-5. You harbor dreams of one day restarting your rock career, but, unfortunately, those dreams have been put on hold, indefinitely. Still, twice a week you can be found playing the open mic night at Casaba's, where the handful of customers marvel at your innate musical talent. As the song goes:\n  \n[i]They sit at the bar, and put bread in my jar[/i]\n*line_break\n[i]And say, \"Man, what are you doing here?\"[/i]\n  \nIt's the same question you ask yourself each and every night. Maybe one day you'll have the answer.\n*goto_scene endings ending\n\n*label end2\n\nFinally, you reach the end of the road.\n*if MarvinTour\n  You wish a tearful goodbye to The Marvins and head back home.\n  *goto end3\n*else\n  You wave goodbye to ${stop2} and set your ${vehicle} toward home.\n  *goto end3\n\n*label end3\n\n*if demo_first = false\n  After resting for a few days, basking in the glow of the successful tour, you realize that you'd better act fast to capitalize on your growing buzz. That's right, it's time to record your first demo!\n  *finish\n*else\n  Excited for a few days of well-earned rest back at home, and basking in the glow of the successful tour, you receive a call asking you to be part of a local music festival near ${hometown}. It seems the organizer is a longtime fan of yours, back from your days gigging at Casaba's. There will be thousands of people there! \n  \n  The only problem? It's this weekend. Guess there really is no rest for the weary rocker. You get home and immediately start preparing for the big show.\n  *page_break\n  *goto_scene joey\n  \n  \n*label rosenblatts_costume\n*if rosenblatts and (sound = \"heavy\")\n  The Rosenblatts, in particular, look almost comical with their torn shirts and outsized hair. You shrug…they'll adjust.\n*if rosenblatts and (sound = \"artsy\")\n  The Rosenblatts, in particular, seem to appreciate the new look.\n*return", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Gunther\"\n*set last_name \"Grant\"\n*set health 50\n*set money 1\n*set band_size 1\n*set musicianship 50\n*set stage_presence 50\n*set hometown \"Cleveland\"\n*set cohesion 50\n*set buzz 50\n*set casper 50\n*set commercial 50\n*set folksiness 50\n*set style 50\n*set improv 50\n*set unique 50 \n*set reputation 50\n*set contract \"No Contract\"\n\nYou spend all night dancing to the sounds of your new album. It's the greatest, most amazing music you've ever heard. Clearly your life will never be the same again. \n\nYou want to play along with the music so badly, but your crummy triangle won't cut it. What instrument would you like to \"play\" as you rock out with your socks out?\n*fake_choice\n  #The air guitar.\n  #The air bass.\n  #The air drums.\n  #The air keyboard.\n  \n*script changeBackgroundColor(\"black\")\n*set band_name \"Les Chomps\"\n*set name \"Kendra\"\n*set last_name \"Elvin\"\n*set instrument \"Guitar\"\n*set casper_instrument \"Bass\"\n*set hometown \"Richmond\"\n*set health 43\n*set money 1500\n*set band_size 3\n*set band_size_text \"Three\"\n*set musicianship 60\n*set stage_presence 57\n*set cohesion 46\n*set buzz 54\n*set casper 62\n*set commercial 33\n*set folksiness 32\n*set style 71\n*set improv 67\n*set unique 59 \n*set reputation 66\n*set contract \"No Contract\"\n\nYou realize, as you settle into your dressing room at the unreasonably early time of 10:30, that you have an entire night ahead of you with no plans whatsoever. Being the opening act rocks!\n\nHow do you want to spend your night?\n*fake_choice\n  #Might as well check out The Marvins.\n  #Party backstage.\n  #Relax and rest up before tomorrow's show.\n  #Get an early start selling demo tapes.\n  #Stick it to The Marvins by throwing our own party/concert somewhere else.\n  \n*script changeBackgroundColor(\"sepia\")\n*set band_name \"The Dirty Damsels\"\n*set name \"Priscilla\"\n*set last_name \"Schwartz\"\n*set instrument \"Bass\"\n*set casper_instrument \"Guitar\"\n*set hometown \"Charleston\"\n*set health 53\n*set money 2350\n*set band_size 7\n*set band_size_text \"Seven\"\n*set musicianship 66\n*set stage_presence 67\n*set cohesion 44\n*set buzz 58\n*set casper 0\n*set commercial 73\n*set folksiness 32\n*set style 71\n*set improv 37\n*set unique 39 \n*set reputation 46\n*set contract \"No Contract\"\n \n\"You know I've been reading about The Dirty Damsels all summer long. A demo tape, a successful tour, and an opener gig for a hot touring band. And now, you've capped it off beautifully with your first large-venue show. There's only one thing you're missing: A record deal!\"\n\nHe lets those last three words hang in the air for a very long time. Finally he breaks the tension.\n\n\"Well? Do you want a deal or not?\"\n\n*fake_choice\n  #\"Of course! I've been waiting for this moment my whole life!\"\n  #\"No way. We don't want anything to do with you record-industry sleazeballs.\"\n  #\"I mean, sure, why not? You know, if you're offering.\"\n  #\"I think we'd better discuss amongst ourselves first.\"\n\n\n*set band_name \"Stevie and the Scubas\"\n*set name \"Stevie\"\n*set last_name \"Brown\"\n*set instrument \"Drums\"\n*set casper_instrument \"Guitar\"\n*set hometown \"Kansas City\"\n*set health 43\n*set money 6550\n*set band_size 4\n*set band_size_text \"Four\"\n*set musicianship 54\n*set stage_presence 69\n*set cohesion 64\n*set buzz 68\n*set casper 76\n*set commercial 43\n*set folksiness 72\n*set style 41\n*set improv 66\n*set unique 48 \n*set reputation 68\n*set contract \"Best Contract\"\n\nLayla runs over and hugs you.\n    \n\"Thank you for being so supportive of me. So then you'll talk to Joey about putting one of my songs on your next album?\n    \nSay what, now?\n*fake_choice\n  #No! \n  #No, but maybe she can sing backup vocals on stage with us.\n  #Sure, why not? One song can't hurt.\n  #What a great idea!", "startup": "*title Choice of the Rock Star\n*author Jonathan Zimmerman\n*scene_list\n  startup\n  summer79\n  best_days\n  $ city_built\n  $ band_battle\n  $ decision\n  $ road\n  $ demo\n  $ joey\n  $ fame\n  $ endings\n  \n*create sib_name false\n*create warp_indie false\n*create warp_solo false\n*create problem \"undefined\"\n*create replacement false\n*create problem_he \"undefined\"\n*create problem_him \"undefined\"\n*create problem_his \"undefined\"\n*create musicianship 50\n*create stage_presence 50\n*create cohesion 50\n*create band_size 1\n*create band_size_text \"one\"\n*create other_members 1\n*create other_members_text \"one\"\n*create sludge false\n*create rory false\n*create rosenblatts false\n*create uno false\n*create v false\n*create wendle false\n*create howie false\n*create instrument \"undefined\"\n*create instrument_guitarist \"undefined\"\n*create instrument_drum \"undefined\"\n*create instrument_its \"undefined\"\n*create instrument_it \"it\"\n*create casper_its \"it's\"\n*create casper_it \"it\"\n*create band_instrument \"undefined\"\n*create casper_instrument \"undefined\"\n*create casper_instrument_guitarist \"undefined\"\n*create gender \"undefined\"\n*create sexpref \"undefined\"\n*create gender_him \"undefined\"\n*create gender_he \"undefined\"\n*create gender_his \"undefined\"\n*create gender_man \"undefined\"\n*create gender_boy \"undefined\"\n*create gender_bro \"undefined\"\n*create sexpref_him \"undefined\"\n*create sexpref_his \"undefined\"\n*create sexpref_he \"undefined\"\n*create sexpref_boys \"undefined\"\n*create sexpref_boy \"undefined\"\n*create sexpref_himself \"undefined\"\n*create sexpref_man \"undefined\"\n*create sexpref_men \"undefined\"\n*create sexpref_waiter \"undefined\"\n*create sexpref_wife \"undefined\"\n*create money 1\n*create buzz 50\n*create name \"undefined\"\n*create last_name \"Doe\"\n*create band_name \"undefined\"\n*create band_member1 \"undefined\"\n*create band_member2 \"undefined\"\n*create backing_name \"undefined\"\n*create vehicle \"van\"\n*create health 50\n*create casper 50\n*create casperquit false\n*create commercial 50\n*create folksiness 50\n*create style 50\n*create improv 50\n*create unique 50 \n*create reputation 50\n*create joey 50\n*create joey_card false\n*create album \"undefined\"\n*create chorus1 \"undefined\"\n*create title1 \"undefined\"\n*create title2 \"undefined\"\n*create title3 \"undefined\"\n*create title4 \"undefined\"\n*create sound \"undefined\"\n*create performance 1\n*create marvins 50\n*create fran false\n*create hometown \"undefined\"\n*create studio_slave false\n*create demo_first false\n*create demo 50\n*create demo_style \"undefined\"\n*create contract \"No Contract\"\n*create layla \"undefined\"\n*create lay false\n*create sell_out false\n*create legacy \"undefined\"\n*create dad \"dad\"\n*create father \"father\"\n*create breakup false\n*create indie false\n\n*achievement amazingalbum visible 40 Amazing Album\n  Record an amazing full-length album!\n  You recorded an amazing, full-length album.\n*achievement badbirthday visible 10 Bad Birthday\n  Ruin your birthday.\n  You ruined your birthday.\n*achievement bestdeal visible 65 Best Contract\n  Sign the best contract.\n  You signed the best contract.\n*achievement bus visible 10 Bus\n  Land a tour bus.\n  You landed a tour bus!\n*achievement classicalrage visible 10 Classical Rage\n  Rage on a classical instrument.\n  You raged on a classical instrument.\n*achievement collapse visible 20 Collapse!\n  Collapse on stage.\n  You collapsed on stage at the Battle of the Bands!\n*achievement comebacklegacy visible 20 Comeback Kid Legacy\n  Fashion a legacy as a Comeback Kid.\n  Become a Comeback Kid.\n*achievement crossover visible 20 Crossover Success\n  Find crossover success.\n  You found crossover success!\n*achievement egoname visible 10 Early Egomania\n  Use your name as the band name.\n  You used your name for the band's name.\n*achievement deathlegacy visible 65 Fallen Star\n  Die an early death.\n  You died early and became a rock legend.\n*achievement firstgroupie visible 10 First Groupie\n  Make moves on the cutie at Strom's.\n  You made your move on the cutie at Strom's.\n*achievement firstsong visible 10 First Song\n  Write a song in the first chapter.\n  You wrote a song in the first chapter.\n*achievement fransign visible 10 Fran\n  Sign with Fran.\n  You signed with Fran.\n*achievement caspername visible 20 The Friendly Ghosts\n  Put Casper's name in the band's name.\n  You put Casper's name in the band's name.\n*achievement hugeparty visible 20 Huge Party\n  Throw a massive school party.\n  You threw a massive party at school.\n*achievement indielegacy visible 65 Indie Star Legacy\n  Achieve a legacy as an Indie Star.\n  You became an Indie Star.\n*achievement insurancelegacy visible 20 Insurance Rocker Legacy\n  Retire to a life of insurance sales.\n  You retired to a life of insurance sales.\n*achievement gospeldemo visible 10 Is that a Gospel choir?\n  Add a Gospel choir to your demo tape.\n  You added a Gospel choir to your demo tape.\n*achievement orchestrademo visible 10 Is that an orchestra?\n  Add an orchestra to your demo tape.\n  You added an orchestra to your demo tape.\n*achievement jail visible 10 Jail\n  Spend a night in jail.\n  You spent a night in jail.\n*achievement jamlegacy visible 20 Jam Band Pioneer Legacy\n  Become a pioneer jam musician.\n  You were known as a pioneering jam musician.\n*achievement joeycard visible 20 Joey's Card\n  Get Joey Greenbacks' business card.\n  You got Joey Greenbacks' business card!\n*achievement legendlegacy visible 40 Rock Legend Legacy\n  Become a rock legend.\n  You became a rock legend.\n*achievement prolegacy visible 20 Musical Professional Legacy\n  Become a professional session musician.\n  You became a professional session musician.\n*achievement nocasper visible 20 No More Ghosts\n  Get rid of Casper.\n  You fired Casper!\n*achievement marvinyes visible 20 Opening Act\n  Become an opening act.\n  You became an opening act.\n*achievement perfectcity visible 20 Perfect City\n  Choose the perfect city for your sound.\n  You chose the perfect city for your sound.\n*achievement perfectsong visible 20 Perfect Song\n  Choose the perfect song to play.\n  You chose the perfect song to play.\n*achievement police visible 25 Police\n  Get taken home by the police.\n  You were taken home by the police.\n*achievement rockprank visible 10 Prankster\n  Prank someone.\n  You played a prank.\n*achievement earlyending visible 10 Premature Burnout\n  Burnout before hitting the big time.\n  You burned out before hitting the big time.\n*achievement punklegacy visible 40 Punk Legend Legacy\n  Become a legend in the punk scene.\n  You became a legend in the punk scene.\n*achievement ramblinglegacy visible 20 Rambling Legacy\n  Earn a legacy as a rambling musician.\n  You earned a legacy as a rambling musician.\n*achievement familylegacy visible 65 Rock Family Legacy\n  Become a Rock 'n Roll family!\n  You became a Rock 'n Roll family.\n*achievement rehab visible 40 Rock Star Rehab\n  Find some moderation in rehab.\n  You ended up in rehab.\n*achievement secretshow visible 10 Secret Show\n  Play a secret show.\n  You played a secret show.\n*achievement sellout visible 20 Sell Out\n  Sell out for big bucks.\n  You sold out for big bucks.\n*achievement sololegacy visible 20 Solo Star Legacy\n  Become famous as a solo star.\n  You became famous as a solo star.\n*achievement styleking visible 10 Style King\n  Update your style.\n  You updated your style.\n*achievement win visible 40 Victory!\n  Win the Battle of the Bands!\n  You won the Battle of the Bands!\n*achievement avoidlabel visible 20 Avoid Label\n  Avoid a label before the Battle of the Bands.\n  You avoided a label before arriving at the Battle of the Bands.\n\n\n*temp knowledge false\n*temp songname 0\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Rock your way to the top of the '80s charts in this interactive tale of music and mayhem! But beware, mischievous managers, fickle fans, and gossiping groupies stand between you and rock immortality.\n\n  \"Choice of the Rock Star\" is an interactive novel where your choices control the story. The game is entirely text-based—without graphics or sound effects—and powered by the vast, unstoppable power of your imagination.\n\n  Will your band tear itself apart? Will you flame out on national television? Or will you build a legacy that stands the test of time?\n\n  [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n  *purchase_discount adfree 2019-07-09 $3.99 $2.99 purchased\n  *label page_break\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n*page_break\n\n[i]I am the entertainer[/i]\n*line_break\n[i]Been all around the world[/i]\n*line_break\n[i]I've played all kinds of palaces[/i]\n*line_break\n[i]And laid all kinds of girls[/i]\n*line_break\n[i]I can't remember faces[/i]\n*line_break\n[i]I don't remember names[/i]\n*line_break\n[i]Ah, but what the hell[/i]\n*line_break\n[i]You know it's just as well[/i]\n*line_break\n[i]'Cause after a while and a thousand miles[/i]\n*line_break\n[i]It all becomes the same[/i]\n*line_break\n—Billy Joel\n\n*page_break\n\"Yeeehaww! You fellers ready to go onstage, or what?\"\n\nThere are many ways to be woken up in this world, but having a tobacco-chewing wannabe-cowboy shove his hairy mug in your face and scream at the top of his lungs must rank somewhere near the bottom. \n\nYou open your eyes and pull the world into focus just in time to evade the string of tobacco spittle that falls from his chin and lands with a splash on the hard-wood spot where your head used to lie.\n \nStrom, the owner-proprietor of Strom's Bar and Saloon, wipes his lip with his sleeve and grins malevolently.\n\n\"'Scuse me, I didn't mean to upset your precious 'rock star' beauty-sleep time…you dandies. Now, you best git out on stage in five minutes or you ain't gittin' paid tonight. Oh, and have a lovely show!\"\n\nWith that he slams the door shut. It's your first night at Strom's, a rowdy biker bar off the highway. It's the kind of bar you thought only exists in movies about undercover martial-arts experts who \"don't want any trouble.\" You've already noticed more tattoos since you walked in the door than you knew existed in the world, and that Confederate flag over the jukebox seemed awfully ominous when you first entered.\n\nStill, it's a gig, and gigs are what you need. Plus, if the show goes well, you may be able to squeeze a few more nights out before having to hit the road again. You've only been on the road two weeks for your first tour, but it feels so much longer.\n\nYou finally manage to sit up and take stock of the room: The cramped and dusty backstage dressing room holding your instruments, some various alcohol bottles, and your bandmates slumped against the walls. No one speaks as they all try to pull themselves from various states of unconsciousness.\n\nWhy are you all so tired?\n*fake_choice\n  #We've just been living the life of the rock star, baby: Party all night, work all day.\n    *set health %-5\n    *set reputation %+10\n    Well, it's your life anyway. And you wouldn't trade it for anything…except for maybe some Advil, because your head is killing you right now.    \n  #We've been rehearsing hard and traveling so much, it's been tough to get a good night's rest.\n    *set musicianship %+10\n    It's not like you've been put up at the Four Seasons, either. For now and the foreseeable future, hard wooden floors in the backs of venues will have to suffice for nap time.\n  #We were out late last night surveying some of the local music scene.\n    *set buzz %+5\n    *set stage_presence %+5\n    It's always important to meet local musicians and audiences, even if, in this town, that means having to pretend you know how to square dance.\n  #We all went to bed nice and early last night, actually. We just wanted to add some extra Z's before the show.\n    *set health %+10\n    Clearly you don't go in for all those standard rock cliches. If they weren't so embarrassed by your career choice and general lifestyle, I'm sure your parents would be very proud.\n*comment endif\n\nWith only five minutes before showtime, you'd better do something to get your energy up before the show. Unfortunately, the options inside the room are beyond poor: Some half-drunk beer bottles, a handle of whiskey, and a can of Mountain Dew.\n\nWhat's your preference? \n*choice\n  #Whiskey, please. It's nature's eye opener.\n    *set health %-15\n    *set reputation %+20\n    You grope blindly for the whiskey bottle and find it nestled comfortably between your legs. Unfortunately, due to the law of diminishing returns, the swig of whiskey only makes you more groggy. Better get moving before you fall back to sleep. \n     \n    *goto WhoAmI  \n  #The Dew. At least it has vitamins.\n    *set health %+10\n    You grope blindly for the bottle and find it sitting on the table behind you. Mmmm, delicious and nutritious. \n    \n    *goto WhoAmI\n  #That beer. It needs to be finished.\n    *set health %-10\n    *set reputation %+10  \n    You grope blindly for the beer bottle and find it next to your chair. The beer has aged nicely since last night and has taken on a delightful smokey flavor with a hint of tar. Oh, wait, that's because someone dropped a cigarette butt in it. At least it helps wake you up.\n    \n    *goto WhoAmI\n  #I'll awaken my senses with the power of creative meditation, gathering all the thoughts swimming in my head to compose an impromptu song about the moment.\n    *achieve firstsong\n    *set musicianship %+10\n    *set health %-5\n    [i]Ready for another show.\n    *line_break\n    [i]Is this my life? I don't really know.\n    *line_break\n    [i]All the days seem to blend,\n    *line_break\n    [i]I don't even know who I am.\n    \n    [i]Won't you please tell me who I am? (Who am I?!)\n    *line_break\n    [i]Won't you please tell me where I am? (Where am I?!)\n    *line_break\n    [i]Won't you please tell me what day it is? (Seriously, what day is it?!)\n    *line_break\n    [i]I can't remember, can't remember, can't remember (Yeah!)[/i]\n\n    What should you call this new ditty of yours?\n    *choice\n      #So Sleepy.\n        *set songname \"So Sleepy\"\n        *goto think\n      #Everything Hurts.\n        *set songname \"Everything Hurts\"\n        *goto think\n      #Can't Remember.\n        *set songname \"Can't Remember\"\n        *goto think\n      #I'll choose my own song title, thanks.\n        *input_text songname\n        *goto think\n\n*label think\nPray tell, what do you think of ${songname}?\n*choice\n  #It's crap.\n    *set musicianship %+10\n    You are your own harshest critic. Well, you and that dillweed in the front row last show. \n \n    *goto WhoAmI\n  #It's quite probably the greatest song ever written.\n    *set musicianship %-5\n    *set stage_presence %+10\n    Of course it is; you wrote it! \n\n    *goto WhoAmI\n  #It's got potential. I'll keep working on it. Maybe it will turn into something down the road.\n    *set musicianship %+5\n    *set stage_presence %+5\n    For someone who passed out in a smelly dressing room, you sure have a well-cultivated sense of self-discipline. \n    \n    *goto WhoAmI\n    \n*label whoami\nYou're the first one to rise to your feet. Per usual, your bandmates are taking their sweet-ass time getting up. As much as you love being the band leader, you never anticipated how much of the job would involve actually having to lead your bandmates to do what you need them to do.\n\nOnly three minutes to go till showtime. What's your next move?\n*fake_choice\n  #Better get them up so they have enough time to get ready.\n    *set cohesion %+5\n    *set style %-5\n    Who needs kids when you've got a band to look after? You rouse everyone and head over to the gear to start getting ready.\n  #Better use this minute to make myself presentable before the show. They're all adults, at least in theory. \n    *set style %+10\n    *set musicianship %-5\n    You quickly tousle your hair, zip up your pants, and button the essential buttons on your shirt. You give a quick glance in the mirror: Yup, still awesome-looking. Then you head over to the gear to start getting ready.\n  #Better try leading by example: Start getting set up myself, and then they will follow.\n    *set musicianship %-5\n    *set cohesion %+5\n    *set style %-5\n    A wonderful idea. Let's hope it actually works. You head over to the gear to start getting ready.\n*comment endif\n    \nA pile of black cases holds various instruments on the inside and various names on the outside. Actually, now would be a good time to remember your name, if you can.\n\nWhat's your first name?\n*choice\n  #Antonio\n    *set name \"Antonio\"\n    *goto last_name\n  #Bobby\n    *set name \"Bobby\"\n    *goto last_name\n  #Courtney\n    *set name \"Courtney\"\n    *goto last_name\n  #Fred\n    *set name \"Fred\"\n    *goto last_name\n  #Heather\n    *set name \"Heather\" \n    *goto last_name \n  #Nancy\n    *set name \"Nancy\"\n    *goto last_name\n  #Rodger\n    *set name \"Rodger\"\n    *goto last_name\n  #Zeke\n    *set name \"Zeke\"  \n    *goto last_name   \n  #I can tell you my own name….   \n    *input_text name\n    *goto last_name\n\n*label last_name\nWhat's your last name?\n*choice\n  #Anderson\n    *set last_name \"Anderson\"\n    *goto gender\n  #Elvin\n    *set last_name \"Elvin\"\n    *goto gender\n  #Grant\n    *set last_name \"Grant\"\n    *goto gender\n  #Schwartz\n    *set last_name \"Schwartz\"\n    *goto gender\n  #Wilkins\n    *set last_name \"Wilkins\"\n    *goto gender\n  #I'll tell you….\n    *input_text last_name\n    *goto gender\n\n*label gender\nIt would also be useful to know what your gender is…you know, for the fans.  \n*label alien_gender\n*choice\n  #Male.\n    *set gender \"male\"\n    *goto gender2\n  #Female.\n    *set gender \"female\"\n    *goto gender2\n  *hide_reuse#Bowie (non-gendered).\n    *set gender \"androgynous\"\n    Much like the great Ziggy Stardust zirself, you will henceforth remain non-gendered, with accompanying non-gendered pronouns. Sound good?\n    *choice\n      #Yes.\n        *goto gender2\n      #No.\n        *goto alien_gender\n  *hide_reuse #Alien from the planet Rocktopia.\n    *goto alien\n\n*label alien\nUh, huh. Sure you are. But, for the sake of argument, let's just say that you've assumed a human form and have no recollection of your prior life on planet Rocktopia. Sound good?\n\nNow, of what gender is your current, human, body?\n*goto alien_gender\n\n*label gender2\n*if (gender=\"male\")\n  *set gender_him \"him\"\n  *set gender_his \"his\"\n  *set gender_bro \"bro\"\n  *set gender_he \"he\"\n  *set gender_man \"man\"\n  *set gender_boy \"boy\"\n  *goto hometown\n*elseif (gender=\"female\")\n  *set gender_him \"her\"\n  *set gender_his \"her\"\n  *set gender_bro \"sis\"\n  *set gender_he \"she\"\n  *set gender_man \"woman\"\n  *set gender_boy \"girl\"\n  *goto hometown\n*elseif (gender=\"androgynous\")\n  *set gender_him \"zir\"\n  *set gender_bro \"sib\"\n  *set gender_his \"zir\"\n  *set gender_he \"ze\"\n  *set gender_man \"person\"\n  *set gender_boy \"person\"\n  *goto hometown\n\n*label hometown\nBefore you crack open your instrument case, you can't help but notice the \"If lost, please return to:\" sticker adorning the front. Whenever you see it, it always makes you nostalgic for your hometown of…\n\nWhere did you grow up? \n*choice\n  #Poughkeepsie, NY.\n    *set hometown \"Poughkeepsie\"\n    *goto sex\n  #Sheboygan, WI.\n    *set hometown \"Sheboygan\"\n    *goto sex\n  #George, WA.\n    *set hometown \"George\"\n    *goto sex\n  #Burlington, VT.\n    *set hometown \"Burlington\"\n    *goto sex\n  #Anytown, USA.\n    *set hometown \"Anytown\"\n    *goto sex\n  #None of those.\n    So where are you from?\n    *input_text hometown\n    *goto sex\n\n*label sex\nAh, yes, ol' ${hometown}, where the grass grows tall and the people grow wide. \n\nAs you finally open the case, a handwritten letter falls out and lands on the floor. Someone must have slipped it in there at some point, probably before you woke up in that special someone's bed.\n\nThe note wishes you good luck on your tour and ends with a number and a command to call from the road. How sweet!\n\nWho left you the note?\n*choice\n  #A fat-bottomed gal.\n    *set sexpref \"female\"\n    \"Fat-bottomed gal\" is rock speak for \"beautiful young lady\". \n    *goto groupie1\n  #A foxy fella fan.\n    *set sexpref \"male\"\n    Only the foxiest for you.\n    *goto groupie1\n  #Just a friend.\n    *set reputation %-15   \n    Fair enough. But if you were to indulge in some of the spoils of rock stardom, what type of companionship would you pursue?\n    *choice\n      #Dudes.\n        *set sexpref \"male\"\n        *goto groupie1\n      #Chicks.\n        *set sexpref \"female\"\n        *goto groupie1\n      #It's all good with me.\n        *set sexpref \"free\"\n        Sweet! I will do my best to alternate the genders of the many friends you may meet along your journey.\n        *goto groupie1\n  #Ever hear of free love? \n    *set sexpref \"free\"\n    Sure have! I will do my best to alternate the genders of the many companions you may meet along your journey.\n    *goto groupie1\n\n*label groupie1\n*if (sexpref =\"male\")\n  *set sexpref_him \"him\"\n  *set sexpref_his \"his\"\n  *set sexpref_waiter \"waiter\"\n  *set sexpref_he \"he\"\n  *set sexpref_boys \"boys\"\n  *set sexpref_boy \"boy\"\n  *set sexpref_himself \"himself\"\n  *set sexpref_men \"men\"\n  *set sexpref_man \"man\"\n  *set sexpref_wife \"husband\"\n  *goto groupie\n*elseif (sexpref =\"female\")\n  *set sexpref_him \"her\"\n  *set sexpref_his \"her\"\n  *set sexpref_waiter \"waitress\"\n  *set sexpref_he \"she\"\n  *set sexpref_boys \"girls\"\n  *set sexpref_boy \"girl\"\n  *set sexpref_himself \"herself\"\n  *set sexpref_men \"women\"\n  *set sexpref_man \"woman\"\n  *set sexpref_wife \"wife\"\n  *goto groupie\n*elseif (sexpref =\"free\")\n  *set sexpref_him \"him\"\n  *set sexpref_his \"his\"\n  *set sexpref_waiter \"waiter\"\n  *set sexpref_he \"he\"\n  *set sexpref_boys \"girls\"\n  *set sexpref_boy \"girl\"\n  *set sexpref_himself \"herself\"\n  *set sexpref_men \"men\"\n  *set sexpref_man \"woman\"\n  *set sexpref_wife \"wife\"\n  *goto groupie\n\n*label groupie\n\nFinally, the time has come. Your bandmates have just barely made it to their feet and readied their instruments when Strom announces your band.\n  \nAs you step out of the dressing room, you can hear the roar of the crowd beckoning…oh, wait, that's just your nervous stomach. Even though you've been on the road a couple of weeks already, you still get that same feeling just before going onstage, as endless questions fill your head: What kind of crowd will you have tonight? What reaction will you get? How many new fans can you accumulate? How many more shows like this will it take to reach your dreams of rock stardom?   \n\nInstead of stressing about the future, you decide to take a moment to meditate on the past. You take a deep breath, close your eyes, and transport yourself back to the much simpler time of your youth, the time when one innocent decision would set in motion everything that has brought you to exactly where you are today.\n*finish\n\n    \n\n", "summer79": "*temp affinity\n*set affinity \"Casper\"\n[i]Jenny said when she was just five years old[/i]\n*line_break\n[i]You know my parents gonna be the death of us all[/i]\n*line_break\n[i]Two TV sets and two Cadillac cars[/i]\n*line_break\n[i]You know it ain't gonna help me at all[/i]\n*line_break\n[i]Till one fine mornin' she turns on a New York station[/i]\n*line_break\n[i]She don't believe what she hears at all[/i]\n*line_break\n[i]She started dancing to that fine, fine music[/i]\n*line_break\n[i]You know her life was saved by Rock and Roll![/i]\n*line_break\n-Velvet Underground\n*page_break\n\n\"Hey, ${name}, what are you doing to celebrate your thirteenth birthday tonight?\"\n\nYour friend Ricki whispers to you from behind ${gender_his} cello. You are seated at the back of a junior-high classroom. School ended over an hour ago, but you're not going anywhere. The big orchestra recital is tomorrow, and you've got to practice. That means two more hours of playing…\n\nWhat instrument do you play?\n\n*choice\n  #The triangle.\n    Of all the instruments, only the mighty triangle makes music and teaches geometry at the same time.\n    *set band_instrument \"triangle\"\n    *goto band\n  #The bassoon.\n    Leave it to you to pick the instrument that is both named after, and sounds like, a French lady farting.\n    *set band_instrument \"bassoon\"\n    *goto band\n  #The piccolo.\n    Good choice. Any instrument that takes you 20 lessons just to figure out how to blow into it properly must be a real delight to play.\n    *set band_instrument \"piccolo\"\n    *goto band\n  #The harp.\n    The mighty harp. The instrument that says, \"I am committed to driving a mini-van for the rest of my life, and I don't care who knows!\"\n    *set band_instrument \"harp\"\n    *goto band\n\n*label band    \nYour mom decided that you should play the ${band_instrument} because it instills discipline, motor-skills, and an appreciation for \"real\" music. You've never quite figured out what \"real music\" means, or what makes the music you like less than real, but you've learned it's best not to argue with her about these things.\n\nYour mother is not a fan of contemporary music. Born at the tail-end of the Great Depression and raised during World War II, her tastes in all things veer decidedly traditional. Her idea of popular music begins and ends with Elvis Presley, and, no, you are not allowed to listen to him until you are older. As for those drug bands from places like New York City, Los Angeles, and, most horrifying of all, England…well, you'd better just forget about it. So, yes, your mother is quite strict.\n\nAs for your ${father}, he learned years ago just to go along with whatever your mother says. And for the most part, you do, too. But lately, for whatever reason, you've been feeling a bit of a rebellious urge bubble up inside you. Whereas you never would have talked to a known troublemaker like Ricki before, now you find yourself whispering with ${gender_him} in the back of band rehearsal.\n\nYou lean over behind Ricki's cello—truly the greatest classical instrument for whispering behind—and respond, \"I don't know. My parents are probably just going to order pizza and a cake or something.\"\n\nRicki uses ${gender_his} bow and mouth to make the universal symbol for \"uber lame.\" \n\n\"Listen, I'm going to hang out with my older cousin Gunther after school. He is so cool! He loves to play practical jokes on people, like ringing doorbells, TPing trees, and smashing mailboxes. It's hilarious! Why don't you come out with us and celebrate your birthday in style?\"\n\n*choice\n  #\"That does sound pretty rad. But if I skip out on my parents tonight, my mom will stick me in a cake and light me on fire. Next time?\"\n    *set reputation %-10\n    *set musicianship %+15\n    \"Whatever. Enjoy your Little Caesar's and Fudgie the Whale cake.\"\n    \n    You pack up your ${band_instrument} and head outside to meet your brother Casper. He's sweet but a little spacey. While you have your little sibling spats every now and again, you couldn't imagine a better older brother. Not that you would ever admit that to him.\n    \n    *label say_no\n    He's waiting for you on the hood of his car. \"You ready, birthday ${gender_boy}?\"\n\n    \"Let's do this!\"\n\n    *goto casper_ride\n  #\"Hell, yeah! In fact, let's leave right now. If I have to listen to you torture that cello for one more minute, my brain might leak out of my eyeholes.\"\n    *set reputation %+20\n    *set musicianship %-20\n    \"Whoa, gross! You are bad-ass. All right, let's bolt in three, two…\"\n    *goto bolt\n  #\"Fine, just promise me you'll get me home before dinner?\"\n    *set reputation %+10\n    *set musicianship %-10\n    \"Scout's honor! I don't really know what that means; it's just something I heard a geek say when I was giving ${gender_him} a wedgie. But, yes, I'll get you back to your stupid house before stupid dinner.\"\n    *goto brother\n  #\"Your cousin sounds like a real stand-up guy…the kind that will be spending his formative, post-adolescent years standing in police line-ups. I'll pass.\"\n    *set reputation %-20\n    *set musicianship %+15\n    \"I don't know what half of those words meant, but I'm going to take my cello elsewhere and pretend I don't know you.\"\n    \n    As Ricki sneaks out the back, you settle in for two more hours of intense ${band_instrument} practice time before you can finally head home. \n\n    Finally, you pack up your instrument and go outside to meet Casper, your brother. He's sweet if a little spacey. And he's waiting for you on the hood of his car.  \"You ready, birthday ${gender_boy}?\"\n\n    \"Let's do this!\"\n    \n    *goto casper_ride\n    \n*label bolt\nFaster than you can say, \"Wolfgang Amadeus Mozart,\" you're out the door.\n*goto brother \n\n*label brother\n\nYou and Ricki escape school and hop over the small fence separating your junior high from the adjacent high school. \n\nEverything here looks the same, only bigger. As you saunter through The Land of the Giants, feeling like some sort of foreign dignitary, your adrenaline buzz is squelched by the sight of your brother Casper cutting across the parking lot.\n\n\"Hey, birthday ${gender_boy}! What are you doing here? Are you in high school now or something?\"\n\nCasper is sweet but somewhat spacey. Before you have a chance to say anything, Ricki blurts out: \"We're going to go smash mailboxes with my cousin Gunther. You may have heard of him; he's the guy who got suspended for using the principal's toupee as a jock strap. Wanna come?\" \n\nCasper looks at you with a mixture of shock and disappointment. You recognize it as the same look your mom usually gives you right before the yelling starts.\n\n\"Really, ${name}? You don't want to waste your time with that punk. Besides, Mom and Dad have a whole night planned for you with a special surprise. Come on, I'll give you a ride home.\"\n\n*choice\n  #\"You're right, let's go.\"\n    *set reputation %-20\n    *set casper %+20\n    *goto casper_ride\n  #\"Thanks, but no thanks. Catch you later, Casper.\"\n    *set casper %-10\n    *goto gunther\n  #\"What's the surprise?\"\n    *goto casper_question\n  #\"Buzz off, Casper. Now that I'm a teenager, I don't have to listen to you anymore.\"\n    \"Man, you've really changed since you turned thirteen this morning. Whatever, have fun.\"\n    *set reputation %+20\n    *set casper %-20\n    *set health %-10\n    *goto gunther\n\n*label casper_question\nCasper's eyes light up.\n\n\"I can't tell you that, but…let's just say that your gift will leave you spinning.\"\n\nLeave you spinning? What the heck is he talking about? \n\n*choice\n  #\"You've got my attention. Let's roll.\"\n    *set reputation %-10\n    *goto casper_ride\n  #\"Tell me what it is now, or I'm not coming.\"\n    *set reputation %+20\n    *set casper %-20\n    *set health %-10\n    \"No can do, little one. Guess you're on your own.\"\n    \n    Whatever, who cares. It was probably something ${band_instrument}-related anyway.\n    *goto gunther\n  #\"If it didn't suck, you woulda told me what it was. I'm outie.\"\n    \"Man, you've really changed since you turned thirteen this morning. Whatever, it's your life.\"\n    *set reputation %+20\n    *set casper %-20\n    *set health %-10\n    *goto gunther\n    \n*label gunther\n*set affinity \"Gunther\"\n\nRicki's cousin Gunther pulls up in a cherry-red convertible Thunderbird. He flicks his cigarette and blows the remaining smoke in your face, then opens the door.\n\n\"Hop in, short stack. Word to the wise: If you scuff up the leather upholstery, I will scuff up your face.\"\n\nThe two of you hop in, and Gunther speeds out of the parking lot. As you head toward your afternoon of birthday debauchery, your eye catches something odd in the car dashboard. Just below the radio dial is what appears to be, but couldn't possible be…\n\n\"Hey, is that a tape deck in your car?\"\n\nGunther smirks proudly.\n\n\"You bet your butt it is! First edition Sony Electronics In-Dash Cassette player. I had my buddy Paco at the shop install it for me; it's the first one of its kind. Jealous?\"\n\nYou can't believe it! A tape deck in a car! Think of the possibilities! No more crummy local radio stations, no more mom controlling what music you listen to. You want to hear it so bad. But what kind of music would a guy like Gunther have?\n\n\"Do you have any tapes?\" you ask hopefully. \n\nGunther snorts in your general direction. He flips open the glove compartment, revealing a pile of cassettes. Every album you've ever wanted to listen to, all in one place. It's a treasure trove of rock. You could spend weeks just looking at the artwork and reading the liner notes.\n\n\"Well, are you gonna keep drooling or put one in already? I'm sick of hearing you breathe.\"\n\nYou're not sure, but you have a feeling this could be the most important decision you've ever made in your life. No pressure, though.\n\n*label album_choice\nChoose an album to learn more about it, then decide which album to listen to.\n*choice\n  #[i]American Beauty[/i], Grateful Dead.\n    Though the '60s had just come to an end, the Grateful Dead crafted the era's defining statement on American Beauty. Flower-child classics like \"Box of Rain,\" \"Friend of the Devil,\" and \"Till the Morning Comes\" exhibit the band's seamless blending of blues, rock, and Americana influences to perfection.\n    *choice   \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select  \n  #[i]Blood on the Tracks[/i], Bob Dylan.\n    By the time Dylan released [i]Blood on the Tracks[/i], his fifteenth album, he had already transformed himself so many times that most of his fans had moved on. But as he proves here, with timeless tracks like \"Tangled Up in Blue,\" \"If You See Her, Say Hello\" and \"Shelter From the Storm,\" much of his best work was still ahead of him.\n    *choice  \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select  \n  #[i]The Dark Side of the Moon[/i], Pink Floyd.\n    Unlike anything that came before it, Pink Floyd's [i]Dark Side[/i] proved that a rock album can be so much more than just a collection of songs. Songs like \"Time\" and \"Money\" are psychedelic classics in their own right, but it's their context within the overall sonic narrative that makes \"Dark Side\" a candidate for greatest album of all time.\n    *choice    \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select    \n  #[i]Electric Ladyland[/i], Jimi Hendrix.\n    The prodigal son of the Woodstock era, Hendrix's [i]Electric Ladyland[/i] is his most mature and encompassing achievement. The album bursts with virtuosic psychedelic rock masterpieces, such as \"Voodoo Chile,\" \"Crosstown Traffic,\" and \"All Along the Watchtower.\"\n    *choice   \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select    \n  #[i]Exile on Main Street, Rolling Stones[/i].\n    Lacking some of the more mainstream hooks of the Stones's earlier successes, and featuring an abrasively gritty sound to boot, [i]Exile on Main Street[/i] flew over the heads of many critics and fans on its release. Years later, it is rightfully appreciated as the Stones's greatest album, with two discs chock full of down-and-dirty classics that get better with every listen. \n    *choice\n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select    \n  #[i]Led Zeppelin IV[/i], Led Zeppelin.\n    By their fourth album, Led Zeppelin was a muscular musical force, capable of delivering in the live setting as well as in the studio. While [i]IV[/i] may be their most mainstream album, with the singles \"Rock and Roll\" and \"Stairway to Heaven,\" it's also the album considered most responsible for launching the genre of heavy metal.\n    *choice  \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select\n  #[i]Never Mind the Bollocks, Here's the Sex Pistols[/i], The Sex Pistols.\n    When The Sex Pistols released their first and only official album in 1977, it signaled not only the launching of a new musical genre, but also an entirely new way of approaching popular music. It was an immediate success in England and an enduring influence on decades of musicians. Songs such as \"God Save the Queen,\" \"Anarchy in the U.K.,\" and \"Holidays in the Sun\" heralded the musical force that would soon become the dominant counter-cultural movement in the United States: Punk rock.\n    *choice \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select \n  #[i]The Rise and Fall of Ziggy Stardust and the Spiders from Mars[/i], David Bowie.\n    Though barely making a splash in the U.S. on its release, David Bowie's defining concept album is a conceptual and musical masterpiece. Bowie's shocking alter-ego and [i]avant garde[/i] narrative string together some brilliantly inventive songs, such as \"Moonage Daydream,\" \"Ziggy Stardust,\" and \"Suffragette City.\"\n    *choice \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select    \n  #[i]The White Album[/i], The Beatles.\n    The Beatles' latter-years' masterpiece, [i]The White album[/i] is bursting at the seams with unchecked creativity. From the soulful ballad \"While My Guitar Gently Weeps,\" to the pop rocker \"Back in the USSR,\" to the folksy poem \"Blackbird,\" [i]The White Album[/i] offers a sprawling buffet of musical brilliance.\n    *choice  \n      #I'll keep browsing.\n        *goto album_choice\n      #I'm ready to make my selection.\n        *goto album_select  \n        \n*label album_select\nSo, which one will it be? Choose carefully; the future of rock may depend on it.\n*choice\n  #Listen to [i]American Beauty[/i].\n    *set album \"[i]American Beauty[/i]\"\n    *set folksiness %+35\n    *set commercial %-10\n    *set style %-20 \n    *set improv %+40\n    *set unique %+10\n    *if affinity=\"Casper\"\n      *goto play_record  \n    *else\n      *goto play_tape\n  #Listen to [i]Blood on the Tracks[/i].\n    *set album \"[i]Blood on the Tracks[/i]\"\n    *set commercial %-10\n    *set folksiness %+30\n    *set style %-30 \n    *set unique %+15\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape \n  #Listen to [i]The Dark Side of the Moon[/i].\n    *set album \"[i]The Dark Side of the Moon[/i]\"\n    *set commercial %+10\n    *set folksiness %-30\n    *set style %+25 \n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape\n  #Listen to [i]Electric Ladyland[/i].\n    *set album \"Electric Ladyland\"\n    *set commercial %+15\n    *set folksiness %-30\n    *set style %+25 \n    *set improv %+25\n    *set unique %-20\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape\n  #Listen to [i]Exile on Main Street[/i].\n    *set album \"Exile on Main Street\"\n    *set commercial %-30\n    *set folksiness %+20\n    *set style %-10 \n    *set improv %-15\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape  \n #Listen to [i]Led Zeppelin IV[/i].\n    *set album \"Led Zeppelin IV\"\n    *set commercial %+30\n    *set folksiness %-30\n    *set style %+20 \n    *set improv %-15\n    *set unique %-20\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape \n #Listen to [i]Never Mind the Bollocks, Here's the Sex Pistols[/i].\n    *set album \"Never Mind the Bollocks, Here's the Sex Pistols\"\n    *set commercial %-25\n    *set folksiness %-25\n    *set style %+15 \n    *set improv %+10\n    *set unique %+15\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape   \n #Listen to [i]The Rise and Fall of Ziggy Stardust and the Spiders from Mars[/i].\n    *set album \"The Rise and Fall of Ziggy Stardust and the Spiders from Mars\"\n    *set commercial %+20\n    *set folksiness %-10\n    *set style %+30 \n    *set improv %-10\n    *set unique %+25\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape\n #Listen to [i]The White Album[/i].\n    *set album \"The White Album\"\n    *set commercial %+15\n    *set improv %-30\n    *set unique %+30\n    *if affinity=\"Casper\"\n      *goto play_record\n    *else\n      *goto play_tape                 \n*label play_tape\nYou pop ${album} into the tape deck. From the moment the first notes ring out, you know you've made the right choice. It's a revelation, the greatest music you've ever heard; clearly, your life will never be the same again. \n\nWhile Ricki and Gunther spend the afternoon happily wreaking havoc around town, all you want to do is listen to ${album} over and over again. But once the sun goes down, Gunther says he needs to head home and fluff his mustache before his girlfriend comes over. \n\nHe drops Ricki off first, then you. You wave goodbye as he peels off into the distance. As soon as his car disappears, it hits you: What are you going to tell your parents?\n\n*fake_choice\n  #I'll pretend the bus broke down, and I had to walk home.\n  #I'll say I stayed late for extra band practice.\n  #Nothing. I'll just sneak upstairs and hope they assume I was home all along.\n*achieve badbirthday\n\nNo such luck. As soon as you open the door you find your mom has been waiting for you, roused by the sounds of Gunther's booming speakers. She's fuming mad. Behind her, you can see the melting ice cream cake and cold pizza. You're starving, but you have a feeling you won't be eating any time soon.\n\n\"Ricki's mother just called. Apparently, the two of you thought it would be a good idea to go for a joyride on your birthday. Well, I hope you had fun, because now your birthday is over. No presents, no cake, no pizza. Straight to your room, now!\"\n\nYou trudge upstairs and slam the door. When the coast is clear, Casper whispers under your door.\n\n\"Hey, birthday ${gender_boy}. Too bad about your present. It would kill you if you knew what it was going to be. So, do you want to know?\"\n\n*choice\n  #\"Buzz off.\"\n    *set reputation %+10\n    *set casper %-10\n    \"Screw you! It was a record player, and now you don't get it. Serves you right.\"\n    *goto preair\n  #\"Yes.\"\n    \"It was a record player. Sorry.\"\n    *goto preair\n  #\"No.\" \n    \"Fine, I won't tell you about the awesome record player. Oh, I just did, didn't I? Sorry.\"\n    *goto preair\n\n*label preair  \n*set stage_presence %+10  \nA record player! Why didn't anyone tell you before?!\n    \nWell, this birthday went from epic to lame in record time. Still, even if you're trapped alone in your room, you're determined to throw yourself a party. With the sounds of ${album} still fresh in your head, you rock out in front of your mirror. \n\n*label air_instrument\nWhat instrument would you like to \"play\" as you rock out with your socks out?\n*choice\n  #The air guitar.\n    *set instrument \"guitar\"\n    *set instrument_drum \"guitar\"\n    *set instrument_guitarist \"guitarist\"\n    *set instrument_its \"it's\"\n    *set instrument_it \"it\"\n    *set casper_instrument \"bass\"\n    *set casper_instrument_guitarist \"bassist\"\n    You pick up your hockey stick and start \"slaying that axe.\" It might look wrong, but it feels so right.\n    *goto end\n  #The air bass.\n    *set instrument \"bass\"\n    *set instrument_drum \"bass\"\n    *set instrument_guitarist \"bassist\"\n    *set instrument_its \"it's\"\n    *set instrument_it \"it\"\n    *set casper_instrument \"keyboard\"\n    *set casper_instrument_guitarist \"keyboardist\"\n    You grab a broom and start \"slappin' that bass.\" It might look wrong, but it feels so right.\n    *goto end\n  #The air drums.\n    *set instrument \"drums\"\n    *set instrument_drum \"drum\"\n    *set instrument_its \"they're\"\n    *set instrument_it \"they\"\n    *set instrument_guitarist \"drummer\"\n    *set casper_instrument \"guitar\"\n    *set casper_instrument_guitarist \"guitarist\"\n    You grab a pair of pencils and start \"pounding those skins.\" It might look wrong, but it feels so right.\n    *goto end\n  #The air keyboard.\n    *set instrument \"keyboard\"\n    *set instrument_drum \"keyboard\"\n    *set instrument_its \"it's\"\n    *set instrument_guitarist \"keyboardist\"\n    *set casper_instrument \"drums\"\n    *set casper_its \"they're\"\n    *set casper_it \"they\"\n    *set casper_instrument_guitarist \"drummer\"\n    You grab your skateboard and start \"tickling those ivories.\" It might look wrong, but it feels so right.\n    *goto end\n    \n*label casper_ride\nYou hop into Casper's beat-up Ford Pinto and head for home.\n\n\"Man, you're gonna be so psyched when you see what Mom and Dad got you this year. In fact, I should just shut up so I don't ruin it. Let's listen to the radio.\"\n\nYour brother sets the dial to the most rocking station your town has: 106.7 WOLD, where the '50's live forever! As always, you cross your fingers for some Buddy Holly or Chuck Berry, but it's all Frank Sinatra. Lame.\n\nWhat would your parents possibly get you that would be so exciting? Your mind reels. You try not to get your hopes up too high.\n\n*label homeintime\n*set casper %+10\nWhen you get home, your parents, grandparents, and cousins are all waiting for you in the kitchen with a surprise: Fudgie the Whale cake and pizza. What a shock. \n\n\"Happy birthday!\" everyone shouts. \n\nYou quickly scarf up your birthday dinner, hoping to get to the presents sooner. But as soon as your meal ends, your mother tells everyone to gather into the family room so you can regale them with a ${band_instrument} recital. How do you react?\n\n*choice\n  #Fine, I'll play one quick song, then it's present time.\n    *set reputation %-10\n    You blast through an up-tempo version of \"My Country, 'Tis of Thee\" in record time. Your family applauds politely, but Casper seems disappointed. He knows you can do better. No matter, it's present time!\n    *goto pre
