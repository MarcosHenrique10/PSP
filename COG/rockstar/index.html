 you need a distinctive sound. You can't just play whatever you feel like; you need to make choices.\"\n    \n    \"Finally, if and when you do sign with a record label, make sure to do everything your executive tells you. There's nothing that annoys me more than a band that won't follow my orders–I mean, suggestions.\"\n    *goto joey_qs\n  *hide_reuse #\"If you were us and we were you, what question would you/us ask we/you?\"\n    *if (mistake = false)\n      \"Are you hopped up on goofballs? Just listening to that made my head hurt. I think question time is over.\"\n      *goto card \n    *else\n      \"Really? That's your question? Are you hopped up on goofballs or something? How about you ask another one and try not to embarrass all of us this time, ok?\"\n      *goto joey_qs   \n  *hide_reuse #\"Will you sign us to your record label…please?\"\n    *if (mistake = false)\n      \"Oops, looks like our time has run out. Nice talking to you kids. See you around–maybe.\"\n      *goto card \n    *else\n      \"Looks like our two minutes have run out. Sorry, kids, better luck next time.\"  \n      *goto nocard \n\n*label card\n\n*set joey_card true\n*achieve joeycard\nBefore he leaves, Joey hands you and Casper a business card. He looks you straight in the eyes.\n\n\"Call me when you think you're ready. You only get one shot, so you better make it the right one. And make sure you get rid of any dead weight, if you know what I mean. 'Till next time.\"\n\nHe gives you a parting wink and then heads out. Once you've finally caught your breath, you hold up the card for you and Casper to admire.\n\n\"We'd better put this somewhere safe,\" you say. \"I have a feeling we'll be needing it soon.\"\n\nThat night, kept awake by the sounds of Casper snoring, you think back to your earlier conversation with Joey. What did he mean by \"dead weight\"? \n*goto auditions\n\n*label nocard\n\nJoey abruptly leaves. Although you may have missed an opportunity, you feel glad to be rid of him and his smell.\n*goto auditions\n\n*label auditions\n*page_break\n*if joey = \"bored\"\n  *set joey 50\n  *goto auditions1\n*elseif joey = \"impressed\"\n  *set joey 70\n  *goto auditions1\n*else\n  *set joey 30\n  *goto auditions1\n\n\n*label auditions1\n\n*if joey_card\n  *set joey %+15\n  Heeding Joey's words, you decide it's time to start getting a real band together. Casper isn't too thrilled with the idea; you get the sense that he would be comfortable playing tiny bars for the rest of his life. But you're reaching for something much bigger. You plaster the campus halls and local bars with fliers, then hold your auditions.\n  \n  *goto auditions2 \n*else\n  *set money -100\n  After a few more months playing with Casper, you decide it's time to get a real band together. Casper doesn't seem too thrilled with the idea; you get the sense that he would be comfortable playing tiny bars for the rest of your lives. But you're reaching for something much bigger. You plaster the campus halls and local bars with fliers, then hold your auditions.\n  *goto auditions2\n  \n*label auditions2\n\nIf nothing else, the auditions do serve to stroke your ego a bit. There are some terrible musicians out there! Luckily, there are also some pretty great ones. Although Casper was too \"busy\" to help prepare for the auditions, he now asks if he can join in on the decision-making process. What do you say?\n\n*choice\n  #\"Of course! This is a partnership, right?\"\n    *set casper %+20\n    *set casper_choice true\n    \"It sure is, ${gender_bro}!\" Casper replies. \"Now let's crack open a brewski and find ourselves some new bandskis.\"\n    *goto band_choice\n  #\"Fine, but remember that I'm the band leader, and what I say goes.\"\n    *set casper %-15\n    *set cohesion %+15\n    *if gender = \"male\"\n      \"Wow, so sorry, Mr. Band Leader,\" Casper replies. \"I had no idea I was in the presence of the great and wonderful Band Leader. Please, lead away; I'll just sit here quietly so I don't disturb you. By the way, I'm being sarcastic…Mr. Band Leader!\"\n      \n      After his rant, Casper goes and sulks quietly in the corner, leaving you to review the options in peace. It seems being the band leader does have some perks!\n      *goto band_choice \n    *elseif gender = \"female\"\n      \"Wow, so sorry, Ms. Band Leader,\" Casper replies. \"I had no idea I was in the presence of the great and wonderful Band Leader. Please, lead away; I'll just sit here quietly so I don't disturb you. By the way, I'm being sarcastic…Ms. Band Leader!\"\n      \n      After his rant, Casper goes and sulks quietly in the corner, leaving you to review the options in peace. It seems being the band leader does have some perks!\n      *goto band_choice \n    *else\n      \"Wow, so sorry, Mx. Band Leader,\" Casper replies. \"I had no idea I was in the presence of the great and wonderful Band Leader. Please, lead away; I'll just sit here quietly so I don't disturb you. By the way, I'm being sarcastic…Mx. Band Leader!\"  \n      \n      After his rant, Casper goes and sulks quietly in the corner, leaving you to review the options in peace. It seems being the band leader does have some perks!\n      *goto band_choice \n    \n  #\"Sorry, this is my band. You can be in it, but I call the shots.\"\n    *set casper %-40\n    You had a feeling Casper might react poorly, but you didn't anticipate just how upset he'd become. \n    \n    \"Your band!?\" he shouts. \"How dare you! This was supposed to be a partnership. You think just because you practice more, sing and write all the songs, and hold the auditions, that this is somehow your band?\"\n    \n    That's the great thing about arguing with Casper—if you just remain silent long enough, he'll do all your arguing for you. Still, he seems pretty worked up this time. After pacing back and forth rapidly, he turns on you again.\n    \n    \"Fine! This can be your band. And I don't want any part of it! Just like this is my apartment, and I don't want you in it anymore. So leave!\"\n    \n    Uh, oh. He seems serious. What do you do?\n    *choice\n      #Apologize profusely. I want Casper to stay in the band (and I don't know where else I would sleep tonight).\n        *set casper %+20\n        *set cohesion %-20\n        *set casper_choice true\n        You break out your best, most sincere apology voice—the one you haven't had to use since moving away from Mom and Dad's. It does the trick. After a few moments, Casper calms down, and the two of you hug it out. Now, finally, it's time to choose a band.\n        *goto band_choice\n      #Agree. Maybe we just need some time apart, and later on we can try to reconcile.\n        *set casper %-90\n        *set casperquit true\n        *set health %-10\n        *set stage_presence %+10\n        Good plan. You've lived together for the majority of your life, so maybe starting a band together is too much. You can always try to bring him back in later. \n        \n        You pack up your things and head down to Casaba's, where the cute ${sexpref_waiter} you've been flirting with sets you up to crash in the basement. \n        \n        \"Just don't let Mickey catch you,\" ${sexpref_he} warns.\n        \n        All right, now that you're finally alone, it's time to assemble a band. \n        *goto band_choice\n      #Say nothing. If that's what he wants, then that's what's meant to be.\n        *set casper %-90\n        *set casperquit true\n        *set health %-20\n        *set stage_presence %+20\n        *achieve nocasper\n        Seems like this is your chance to get rid of some dead weight.\n        \n        You pack up your things and storm out of the apartment, then head to your contingency plan: the basement at Casaba's. Luckily, the cute ${sexpref_waiter} you've been flirting with is there to set you up in the basement.\n        \n        \"Just don't let Mickey catch you,\" ${sexpref_he} warns.\n        \n        Now that you've gotten rid of your brother, it's time to choose your new bandmates.\n        *goto band_choice  \n      #Cut to the chase. \"Actually, I've been meaning to tell you…you're out of the band. Sorry.\"\n        *set casper %-95\n        *set casperquit true\n        *set health %-20\n        *set stage_presence %+20\n        *achieve nocasper\n        The look on Casper's stunned, pained face is almost too much to bear, but you know this is the right decision. It's time to get rid of the dead weight and begin your rock career in earnest, and that means moving on without your brother.\n    \n        You silently pack up your belongings and head to Casaba's, where the cute ${sexpref_waiter} you've been flirting with has set up an area in the basement for you to crash until you find a better option.\n    \n        \"Just don't let Mickey catch you,\" ${sexpref_he} warns.\n        \n        Now that you've gotten rid of your brother, it's time to choose your new bandmates.\n        *goto band_choice\n    \n*label band_choice\n\nAs you select your band, there are a few important guidelines to keep in mind. \n\n1) The more band members you have, the more expensive touring/recording becomes. Certain types of music benefits from large bands, while others benefit from a smaller, tighter sound. Choose wisely.\n\n2) While you can have two guitarists, you cannot have two drummers, two bassists, or two keyboardists. It would just look silly. \n\n3) You can have as many band members as you like, but you need at least three. Anything less would negatively impact your rock-ability.\n\n*if casperquit\n  *set cohesion %+20\n  *goto nocasper_choice\n*else\n  *goto make_choice\n  \n*label make_choice\nYou and Casper already have the ${instrument} and ${casper_instrument} covered. \n*if (casperquit = false) and ((instrument != \"drums\") and (casper_instrument != \"drums\")) \n  *label sludge_t\n  *set sludge true\n  *set band_size 3\n  Every band needs a percussion section, so your first choice is already made for you. Sofie \"Sludge\" McArthur is the best drummer in town by far. She comes from the Keith Moon school of drumming-as-destructive-force. Wildly talented and wildly unpredictable, Sludge is the ultimate X-factor. You're lucky to have her.\n  *set SludgeDescription true    \n  *goto make_choice2\n*elseif ((casperquit = true) and (instrument != \"drums\"))\n  *goto sludge_t\n*else\n  *set band_size 2\n  *goto make_choice2  \n\n*label make_choice2\n\nWho else do you want to add? Remember, you're making history here.\n\n*label make_choice3\nClick on each musician to learn all about each one of them.\n*choice\n  *if (((instrument != \"keyboard\") and (casper_instrument != \"keyboard\")) and (wendle = false)) #Wendle Lee, keyboardist.\n    Wendle doesn't look like much: he's shy, diminutive, and geeky. But brother can straight-up slay 'boards. Trained from preschool as a classical pianist, Wendle rebelled against his parents and dove into freaky synth-rock with abandon. Their loss is rock's reward.\n    *set WendleDescription true\n    *choice\n      #Yes.\n        *set wendle true\n        *set band_size +1\n        *goto make_choice3\n      #No.\n        *goto make_choice3\n  *hide_reuse *if (((instrument != \"bass\") and (casper_instrument != \"bass\")) and (V = false)) #V, bassist.\n    V is short for \"Vicious,\" because that is precisely what a bass guitar sounds like in her capable hands. She's got so much style, it's almost unfair. Good times, bad times, she's the glue that holds everything together, both on-stage and off. \n    *set VDescription true\n    *choice\n      #Yes.\n        *set v true\n        *set band_size +1\n        *goto make_choice3\n      #No.\n        *goto make_choice3\n  *if (((instrument != \"guitar\") and (casper_instrument != \"guitar\")) and (uno = false)) #Uno Saldero, guitarist.\n    Uno may be the best find of the bunch. Your band is lacking a lead guitarist, and Uno is a bonafide lead guitarist. Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential. \n    \n    You do have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what his guitar will sound like when paired with your ${instrument}.\n    *set UnoDescription true\n    *choice\n      #Yes.\n        *set uno true\n        *set band_size +1\n        *goto make_choice3\n      #No.\n        *goto make_choice3  \n  *if ((instrument = \"guitar\") and (uno = false)) #Uno Saldero, guitarist.\n    Uno is traditionally a lead guitarist, but he's willing to accept the rhythm roll to join your band. Luckily for you, Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n    \n    Sure, you have some concerns about Uno's willingness to take orders from you, but you drool to think what your guitars will sound like paired together.\n    *set UnoDescription true\n    *choice\n      #Yes.\n        *set uno true\n        *set band_size +1\n        *goto make_choice3\n      #No.\n        *goto make_choice3\n  *if ((casper_instrument = \"guitar\") and (uno = false))  #Uno Saldero, guitarist.\n    Uno is traditionally a lead guitarist, so either he or Casper is going to have to accept the rhythm role. This may cause some disharmony, but the benefits of adding Uno are hard to pass up. Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.\n    *set UnoDescription true\n    *choice\n      #Yes.\n        *set uno true\n        *set band_size +1\n        *goto make_choice3\n      #No.\n        *goto make_choice3\n  *if (rosenblatts = false) #The Rosenblatt brothers, horns.\n    The Rosenblatts are three horny brothers from Manhattan who never heard a silence they couldn't shatter, a racket they couldn't produce, or a neighbor they couldn't enrage. After spending their adolescences in a constant state of being shushed, these boys are ready to unleash their massive sound on the world.   \n\n    Players of a sax, a trumpet, and a trombone, the brothers add an entirely new dimension to your sound—and an entirely new set of headaches to your life. Still, who doesn't love horns?\n    *choice\n      #Yes.\n        *set rosenblatts true\n        *set band_size +3\n        *goto make_choice3\n      #No.\n        *goto make_choice3\n  *if (rory = false) #Rory Kixx, vocalist.\n    Rory's got vocal chords made out of pure velvet and pipes that could inflate a bouncy castle. As lead singer or vocal accompaniment, she could majorly boost the vocal acuity of your band. But before you bring her into the band, you better decide if you really want another singer stepping into the spotlight.\n    *choice\n      #Yes.\n        *set rory true\n        *set band_size +1\n        *goto make_choice3\n      #No.\n        *goto make_choice3\n  #I'm finished.\n    Are you sure? This is your last chance to add more members to your new band. \n    *choice\n        #Yes.\n          *if band_size = 2\n            Weren't you trying to start a rock band? Better add at least one more member.\n            *goto make_choice2\n          *else\n            *goto casper_objection\n        #No, I want to think about it more.\n          *goto make_choice2\n             \n*label nocasper_choice\nYou already have the ${instrument} covered.\n*set band_size 1 \n*if (instrument != \"drums\")\n  *set sludge true\n  *set band_size +1\n  \n  Since every band needs a percussion section, your first choice is already made for you. Sofie \"Sludge\" McArthur is the best drummer in town by far. She comes from the Keith Moon school of drumming-as-destructive-force. Wildly talented and wildly unpredictable, Sludge is the ultimate X-factor. You're lucky to have her. \n*if (instrument != \"guitar\")\n\n  Your band won't be much of a rock band without a guitarist. And Uno Saldero is one heck of a lead guitarist. Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Adding him to your band significantly ups your potential. Of course, you're not sure about his willingness to take orders from you, but you can't have everything.\n  *set uno true\n  *set band_size +1\n  *goto cont\n*else\n  *goto cont\n\n*label cont\n\nWho else do you want to add? Remember, you're making history here.\n\n*label nocasper_choice2\nClick on each musician to learn more about each one of them. \n*choice\n  *if ((wendle = false) and (instrument != \"keyboard\")) #Wendle Lee, keyboardist.\n    Wendle doesn't look like much: he's shy, diminutive, and geeky. But brother can straight-up slay 'boards. Trained from preschool as a classical pianist, Wendle rebelled against his family and dove into freaky synth-rock with abandon. Their loss is rock's reward.\n    *choice\n      #Yes.\n        *set wendle true\n        *set band_size +1\n        *goto nocasper_choice2\n      #No.\n        *goto nocasper_choice2\n  *if ((v = false) and (instrument != \"bass\")) #V, bassist.\n    V is short for \"Vicious,\" because that is precisely what a bass guitar sounds like in her capable hands. She's got so much style, it's almost unfair. Good times, bad times, she's the glue that holds everything together, both on-stage and off.\n    *choice\n      #Yes.\n        *set v true\n        *set band_size +1\n        *goto nocasper_choice2\n      #No.\n        *goto nocasper_choice2\n  *if ((uno = false) and (instrument != \"guitar\")) #Uno Saldero, guitarist.\n    Uno may be the best find of the bunch. Your band is lacking a lead guitarist, and Uno is one heck of a lead guitarist. Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n \n    You do have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what his guitar will sound like when paired with your ${instrument}.\n    *choice\n      #Yes.\n        *set uno true\n        *set band_size +1\n        *goto nocasper_choice2\n      #No.\n        *goto nocasper_choice2\n  *if ((uno = false) and (instrument != \"guitar\"))  #Uno Saldero, rhythm guitarist.\n    Uno is traditionally a lead guitarist, but he's willing to accept the rhythm roll to join your band. Luckily for you, Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n\n    Sure, you have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what your guitars will sound like paired together.\n    *choice\n      #Yes.\n        *set uno true\n        *set band_size +1\n        *goto nocasper_choice2\n      #No.\n        *goto nocasper_choice2\n  *if (rosenblatts = false) #The Rosenblatt Brothers, horns.\n    The Rosenblatts are three horny brothers from Manhattan who never heard a silence they couldn't shatter, a racket they couldn't produce, or a neighbor they couldn't enrage. After spending their adolescences in a constant state of being shushed, these boys are ready to unleash their massive sound on the world.\n    \n    Players of a sax, a trumpet, and a trombone, the brothers add an entirely new dimension to your sound—and an entirely new set of headaches to your life. Still, who doesn't love horns?\n    *choice\n      #Yes.\n        *set rosenblatts true\n        *set band_size +3\n        *goto nocasper_choice2\n      #No.\n        *goto nocasper_choice2\n  *if (Rory = false) #Rory Kixx, vocalist.\n    Rory's got vocal chords made out of pure velvet and pipes that could inflate a bouncy castle. As lead singer or vocal accompaniment, she could majorly boost the vocal abilities of your band. But before you bring her into the fold, you better decide if you really want another singer stepping into the spotlight.\n    *choice\n      #Yes.\n        *set rory true\n        *set band_size +1\n        *goto nocasper_choice2\n      #No.\n        *goto nocasper_choice2\n  #I'm finished.\n    *if band_size = 1\n      I hate to break it to you, but your \"band\" is just you.  Even if you'll be a \"solo\" artist of sorts, you need to have a back-up band.\n      *goto nocasper_choice2\n    Are you sure? This is your last chance to add more members to your new band. \n    *choice\n        #Yes.\n          *if band_size = 2\n            Weren't you trying to start a rock band? Better add at least one more member.\n            *goto nocasper_choice2\n          *else\n            *goto band_name\n        #No, I want to think about it more.\n          *goto nocasper_choice2      \n   \n*label casper_objection\n*if ((casperquit = false) and (casper_instrument = \"guitar\")) and (uno = true)\n  *set cohesion %-20\n  *goto co2\n*elseif uno = true\n  *set cohesion %-10\n  *goto co2\n*else\n  *goto co2\n\n*label co2\nAfter you've made all your choices, Casper suddenly decides he has some some strong objections.\n\n*if band_size \u003c= 3\n  \"Dude, I don't know, it just feels like the band is too small, doesn't it? Don't you think we need at least four, maybe five members? Let's go through it again and see if we can add a couple more.\n  *choice\n    #\"You're right; let's do it.\"\n      *set casper %+20\n      *set band_size 2\n      *set wendle false\n      *set uno false\n      *set rory false\n      *set sludge false\n      *set v false\n      You go back to the drawing board, throwing out all the decisions you've made and starting over again.\n      *goto make_choice\n    #\"Sorry. You had your chance, but now it's too late.\"\n      *goto pout\n    #\"That's it! You're out of the band!\"\n      *goto out\n*elseif ((band_size = 5) and rosenblatts)\n  \"Dude, I don't know, it feels like the band is missing a sound it needs. It's just us and the horns right now, right? Let's go through it again and see if we can add a couple more.\n  *choice\n    #\"You're right, let's do it.\"\n      *set casper %+20\n      *set band_size 2\n      *set wendle false\n      *set uno false\n      *set rory false\n      *set sludge false\n      *set rosenblatts false\n      *set v false\n      You throw out all the decisions you've made and start over again.\n      *goto make_choice\n    #\"Sorry. You had your chance, but now it's too late.\"\n      *goto pout\n    #\"That's it! You're out of the band.\"\n      *goto out\n*else\n  *if uno\n    \"Dude, I don't know about this Uno character. He seems like a bit of a showboater to me, don't you think? Do you really want him in there, stealing the spotlight from me—I mean, us?\"\n    *choice\n      #\"You're right. He's gone.\"\n        *set band_size -1\n        *set uno false\n        *set casper %+20\n        \n        *goto band_name\n      #\"Sorry, Casper, you've been overruled.\"\n        *goto pout\n      #\"That's it! You're out of the band.\"\n        *goto out  \n  \n  *elseif rosenblatts\n    \"Dude, I don't know about these Rosenblatt characters. Does it really make sense to add three more musicians to have to take care of? Besides, what band really needs a horn section anyway?\n    *choice\n      #\"You're right. They're gone.\"\n        *set band_size -3\n        *set rosenblatts false\n        *set casper %+20\n        \n        *goto band_name\n      #\"Sorry, Casper, you've been overruled.\"\n        *goto pout\n      #\"That's it! You're out of the band.\"\n        *goto out\n\n  *elseif rory\n    \"Dude, I don't know about this Rory chick. I mean, do we really need another member just for vocals? What does she have that you and I don't already have?\n    *choice\n      #\"You're right. She's gone.\"\n        *set band_size -1\n        *set rory false\n        *set casper %+20\n        \n        *goto band_name\n      #\"Sorry, Casper, you've been overruled.\"\n        *goto pout\n      #\"That's it! You're out of the band.\"\n        *goto out\n    \n  *else  \n    \"Dude, I just don't know. It seems like the band is too big. Let's go through it again and make it smaller this time.\"\n    *choice\n      #\"You're right; let's do it.\"\n        *set casper %+20\n        *set band_size 2\n        *set wendle false\n        *set v false\n        *set uno false\n        *set rory false\n        *set sludge false\n        *set rosenblatts false\n        You throw out all the decisions you've made and start over again.\n        *goto make_choice\n      #\"Sorry, Casper, you've been overruled.\"\n        *goto pout\n      #\"That's it! You're out of the band.\"\n        *goto out\n\n*label pout\n*set casper %-30\n*set cohesion %-10\nCasper pouts for a bit, but you know you've made the right decision.\n*goto band_name\n\n*label out\n*set casperquit true\n*set casper %-90\n*set band_size -1\n*set cohesion %+20\n*achieve nocasper\nIt's finally time to get rid of the dead weight. You sit Casper down and tell him that there are too many creative differences for you to be in a band together. He takes the news about as well as you'd expect: screaming, name-calling, and, finally, kicking you out.\n\nYou pack up your things and head to your contingency plan: The basement at Casaba's. Luckily, the cute ${sexpref_waiter} you've been flirting with is there to set you up in the basement.\n        \n\"Just don't let Mickey catch you,\" ${sexpref_he} warns.\n\n*if casper_instrument = \"drums\"\n  While breaking it off with Casper was hard, you feel fortunate to find that your top choice for a replacement is still available: Sofie \"Sludge\" McArthur is the best drummer in town by far. She comes from the Keith Moon school of drumming-as-destructive-force. Wildly talented and wildly unpredictable, Sludge is the ultimate X-factor.\n  \n  You quickly extend her an invitation to join the band, which she gladly accepts. \n  *set sludge true\n  *set band_size +1\n  *goto out2\n*elseif (uno = false)\n  *if UnoDescription = false\n    *if instrument = \"guitar\"\n      While breaking it off with Casper was hard, you feel fortunate to find that your top choice for a replacement is still available: Uno Saldera.  Uno is traditionally a lead guitarist, but he's willing to accept the rhythm roll to join your band. Luckily for you, Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n\n      Sure, you have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what your guitars will sound like paired together.\n      *set uno true\n      *set band_size +1\n      *goto out2\n    *else\n      While breaking it off with Casper was hard, you feel fortunate to find that your top choice for a replacement is still available: Uno Saldera.  Your band is lacking a lead guitarist, and Uno is one heck of a lead guitarist. Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n \n      You do have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what his guitar will sound like when paired with your ${instrument}.\n      *set uno true\n      *set band_size +1\n      *goto out2\n  While breaking it off with Casper was hard, you feel fortunate to find that Uno is still available. You quickly extend him an invitation to join the band, which he gladly accepts. \n  *set uno true\n  *set band_size +1\n  *goto out2\n*elseif band_size = 2\n  While breaking it off with Casper was hard, you feel fortunate that you got it over with in time to add another member to the band. Time to look back at your notes and see who you want to add.\n  *goto nocasper_choice2\n*else\n  *goto out2\n\n*label out2\n        \nNow that you've gotten rid of your brother, it's time to come up with a name for your new band.\n*goto band_name2\n\n*label band_name\nIt's time to come up with a name for your new band.\n*label band_name2\nThe type of name you choose will reflect the kind of creative relationship you want to have with your bandmates. What type of name do you want?\n*choice\n  #Just my name, since it's really all about me, and everyone else is in the background.\n    *set band_name \"The ${name} ${last_name} Band\"\n    *set cohesion %-20\n    *set casper %-10\n    *achieve egoname\n    You are now ${band_name}! Sweet band name! It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n    *if (casperquit = false)\n      *goto name_objection\n    *else\n      *goto end  \n  #My name first, then the band name. That way it's still all about me, but also a little about them.\n    *goto me_first\n  *if (casperquit = false) #My and Casper's last name, since it's our band.\n    *set casper %+20\n    *goto last_name\n  #Forget my name; there's no egotism here. Just a standard, awesome band name.\n    *goto name  \n\n*label last_name\n*set casper %+20\nCasper sure appreciates it! Which of these options do you like the best?\n*choice\n  #The ${last_name} Band.\n    *set sib_name true\n    *set band_name \"The ${last_name} Band\"\n    Sweet band name! It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n    *goto name_objection\n  #The ${last_name}s.\n    *set sib_name true\n    *set band_name \"The ${last_name}s\"\n    Sweet band name! It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n    *goto name_objection\n  #The ${name} and Casper ${last_name} Band.\n    *set sib_name true\n    *set band_name \"The ${name} and Casper ${last_name} Band\"\n    *set casper %-15\n    Sweet band name! Casper grumbles a bit about your name being before his, but it just works better that way, right?\n    *goto name_objection\n  *if (gender = \"male\") #The ${last_name} Brothers.\n    *set sib_name true\n    *set band_name \"The ${last_name} Brothers\"\n    Sweet band name! It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n    *goto name_objection\n  *if (gender = \"male\") #The ${last_name} Brothers Band.\n    *set sib_name true\n    *set band_name \"The ${last_name} Brothers Band\"\n    Sweet band name! It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n    *goto name_objection\n    \n*label me_first\n*set cohesion %-20\nTom Petty and the Heartbreakers, Bob Marley and the Wailers, Bob Dylan and the Band…there have been many classic back-up-band-name combos in rock. Your band will be ${name} ${last_name} and the…what?\n\n*input_text backing_name \n*set band_name \"${name} ${last_name} and The ${backing_name}\"\n\nExcellent! You are now ${band_name}. It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n*if (casperquit = false)\n  *goto name_objection\n*else\n  *goto end  \n  \n*label name\n*set cohesion %+10\nYour options for a band name are as limitless as your imagination. So, what's it going to be?\n\n*input_text band_name\n\nExcellent! You are now ${band_name}. It should look great on t-shirts, posters, tattoos, etc. Oh, yeah, and albums.\n*if (casperquit = false)\n  *goto name_objection\n*else\n  *goto end  \n  \n*label name_objection\nUnfortunately, after some further thought, it seems Casper's not a fan of the name. After sulking around for a while, he finally comes clean.\n\n\"Look, I'm just not feeling ${band_name} as our name, okay? I'm sorry. Listen, I've come up with my own list of potential names. Check them out; I bet one of them will be perfect for us!\"\n\nDo you want to look at this list?\n\n*choice\n  #\"Fine, show it to me.\"\n    *goto name_objection2\n  #\"No, thanks, I like our name.\"\n    *goto casper_quit\n  #\"You're out of the band, Casper.\"\n    *goto casper_dump\n\n*label name_objection2\nTake a look at the list of names and select one if you want to choose it.\n\n*choice\n    #The Totally Awesome, Super-Sexy, Funk-Groove Project.\n      *set casper %+30\n      *set band_name \"The Totally Awesome, Super-Sexy, Funk-Groove Project\"\n      *goto casper_happy\n    #Casper and the Friendly Ghosts.\n      *achieve caspername\n      *set casper %+30\n      *set band_name \"Casper and the Friendly Ghosts\"\n      *goto casper_happy\n    #The ${last_name} Experience.\n      *set casper %+50\n      *set cohesion %-20\n      *set band_name \"The ${last_name} Experience\"\n      *goto casper_happy\n    #Ragematronic 3000.\n      *set casper %+30\n      *set band_name \"Ragematronic 3000\"\n      *goto casper_happy\n    #${band_name}.\n      *set casper %-30\n      Perhaps not surprisingly, you prefer the band name you came up with to any of the ones Casper scribbled on a napkin.\n      \n      Either way, he's pissed. \n      *goto casper_quit\n\n*label casper_dump\n*set casper %-90\n*set casperquit true\n*achieve nocasper\nYou don't know why, but that was the last straw. It's finally time to get rid of the dead weight. You tell Casper he's out of the band, then pack up and escape before he has time to go ballistic on you.\n\nLuckily, the cute ${sexpref_waiter} you've been flirting with at Casaba's helps you crash in the basement.\n        \n\"Just don't let Mickey catch you,\" ${sexpref_he} warns.\n        \nWith Casper gone, you call up your contingency plan.\n*goto replacement\n\n*label casper_quit\n*set casper %-80\n*set casperquit true\n\"I can't be in a band where I'm not respected!\" Casper shouts. \"I quit!\"\n\nIt seems he's serious. It's a shame things had to end this way, but luckily you know someone who can come in and take his place.\n\n*label replacement\n*if casper_instrument = \"drums\"\n  *set sludge true\n  *if SludgeDescription = false\n    Sofie \"Sludge\" McArthur is the best drummer in town by far. She comes from the Keith Moon school of drumming-as-destructive-force. Wildly talented and wildly unpredictable, Sludge is the ultimate X-factor.\n\n  You welcome in Sludge as the new drummer for ${band_name}.\n  *goto end\n*elseif casper_instrument = \"bass\"\n\n  *if VDescription = false\n    She goes by V. V is short for \"Vicious,\" because that is precisely what a bass guitar sounds like in her capable hands. She's got so much style, it's almost unfair. Good times, bad times, she's the glue that holds everything together, both on-stage and off.\n  You welcome in V as the new bassist for ${band_name}.\n  *set v true\n  *goto end\n*elseif casper_instrument = \"guitar\"\n  *if uno = false\n    *if UnoDescription = false\n      *if instrument = \"guitar\"\n        Uno Saldera is traditionally a lead guitarist, but he's willing to accept the rhythm roll to join your band. Luckily for you, Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n\n        Sure, you have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what your guitars will sound like paired together.\n        *set uno true\n        *goto end\n      *else\n        Your band is lacking a lead guitarist, and Uno Saldera is one heck of a lead guitarist. Uno is the best axe shredder around; everyone else is a distant [i]dos[/i]. Add him to your band, and you're significantly upping your potential.   \n \n        You do have some concerns about Uno's willingness to take orders from you, but you drool just thinking about what his guitar will sound like when paired with your ${instrument}.\n        *set uno true\n        *goto end\n    You welcome in Uno as the new guitarist for ${band_name}.\n    *set uno true\n    *goto end\n  *else\n    *set band_size -1\n    Uno will now step up as lead guitarist for ${band_name}.\n    *if band_size = 2\n      *if VDescription = false\n        Uno convinces you to add a new bassist as well:  V.  V is short for \"Vicious,\" because that is precisely what a bass guitar sounds like in her capable hands. She's got so much style, it's almost unfair. Good times, bad times, she's the glue that holds everything together, both on-stage and off. You're a little nervous at first—they have a \"history\" together—but V fits the band perfectly.\n        *set v true\n        *set band_size +1\n        *goto end\n      *else\n        Uno convinces you to add V as a new bassist as well. You're a little nervous at first—they have a \"history\" together—but V fits the band perfectly.\n        *set v true\n        *set band_size +1\n        *goto end\n    *goto end\n*else\n  *set wendle true\n  *if WendleDescription = false\n    Wendle Lee doesn't look like much: he's shy, diminutive, and geeky. But brother can straight-up slay 'boards. Trained from preschool as a classical pianist, Wendle rebelled against his family and dove into freaky synth-rock with abandon. Their loss is rock's reward.\n    \n  You welcome Wendle as the new keyboardist for ${band_name}.\n  *goto end   \n    \n*label casper_happy\nCasper is over the moon.\n\n\"Woah, thanks ${gender_bro}! This band is going to be amazing!\"\n*goto end\n\n*label end\n*if band_size \u003c 3\n  *bug Band size is too small!\n*if band_size = 3\n  *set band_size_text \"three\"\n  *goto end2\n*elseif band_size = 4\n  *set band_size_text \"four\"\n  *goto end2\n*elseif band_size = 5\n  *set band_size_text \"five\"\n  *goto end2\n*elseif band_size = 6\n  *set band_size_text \"six\"\n  *goto end2\n*elseif band_size = 7\n  *set band_size_text \"seven\"\n  *goto end2\n*else\n  *set band_size_text \"eight\"\n  *goto end2\n\n*label end2\n\n*gosub name_change\nIt seems the next chapter in your life is finally beginning. It's time to say good bye to ${name}, the mild mannered ${instrument} player, and say hello to ${name}, the leader of ${band_name}!\n*finish\n\n*label name_change\n*if (sib_name = true) and (casperquit = true)\n  \n  Now that Casper's gone, do you want to keep ${band_name} as your band name?\n  *choice\n    #Sure, why not.\n      Great! You shall remain ${band_name}.\n      \n      *return\n    #No, I'd better change it.\n      OK, what would you like the new name to be?\n      \n      *choice\n        #Just my name.\n          *set band_name \"The ${name} ${last_name} Band\"\n          *set cohesion %-20\n          *set casper %-10\n          *achieve egoname\n          You are now ${band_name}!\n          \n          *return\n        #My name, followed by a band name.\n          *set cohesion %-20\n          Tom Petty and the Heartbreakers, Bob Marley and the Wailers, Bob Dylan and the Band…there have been many classic back-up-band-name combos in rock. Your band will be ${name} ${last_name} and the…what?\n\n          *input_text backing_name \n          *set band_name \"${name} ${last_name} and The ${backing_name}\"\n\n          Excellent! You are now ${band_name}.\n          \n          *return\n        #A regular band name.\n          *set cohesion %+20\n          Your options for a band name are as limitless as your imagination. So, what's it going to be?\n\n          *input_text band_name\n\n          Excellent! You are now ${band_name}.\n          \n          *return     \n*else\n  *return", "decision": "[i]I know so many people who think they can do it alone[/i]\n*line_break\n[i]They isolate their heads and stay in their safety zones[/i]\n*line_break\n[i]Now what can you tell them?[/i]\n*line_break\n[i]And what can you say that won't make them defensive?[/i]\n*line_break\n[i]I know there's an answer[/i]\n*line_break\n[i]I know now, but I have to find it by myself[/i]\n*line_break\n–The Beach Boys\n*page_break\n\n*if (band_member1 = problem)\n  *if band_member1 = \"Casper\"\n    *bug Casper is both band_member1 and problem!\n  *if band_member1 = \"Sludge\"\n    *bug Sludge is both band_member1 and problem!\n  *if band_member1 = \"Uno\"\n    *bug Uno is both band_member1 and problem!\n*if (replacement)\n  The first thing you do when you get back is work on finding a replacement for ${problem}. Luckily,\n  *if problem = \"Casper\"\n    *if (casper_instrument = \"guitar\") and (uno = false)\n      *set uno true\n      *set band_member2 \"Uno\"\n      Uno Saldera is still interested! You quickly enlist his services.\n      \n      *goto start\n    *elseif (casper_instrument = \"keyboard\") and (wendle = false)\n      *set wendle true\n      *set band_member2 \"Wendle\"\n      Wendle Lee is still interested! You quickly enlist his services.\n      \n      *goto start\n    *elseif (casper_instrument = \"drums\") and (sludge = false)\n      *set sludge true\n      *set band_member2 \"Sludge\"\n      Sludge is still interested! You quickly enlist her services.\n      \n      *goto start\n    *elseif (casper_instrument = \"bass\") and (v = false)\n      *set v true\n      *set band_member2 \"V\"\n      V is still interested! You quickly enlist her services.\n      \n      *goto start\n    *else\n      *set howie true\n      *set band_member2 \"Howie\"\n      the Rosenblatt brothers\n      *gosub rosen\n      introduce you to their younger cousin, Howie Rosenblatt. Howie is an all-around brilliant musician and a prodigy at the ${casper_instrument}. You quickly enlist his services.\n      \n      *goto start\n  *elseif problem = \"Sludge\"\n    *set howie true\n    *set band_member2 \"Howie\"\n    the Rosenblatt brothers\n    *gosub rosen\n    introduce you to their younger cousin, Howie Rosenblatt. Howie is an all around brilliant musician and a prodigy at the ${casper_instrument}. You quickly enlist his services.\n    \n    *goto start \n  *else\n    *set howie true\n    *set band_member2 \"Howie\"\n    the Rosenblatt brothers\n    *gosub rosen\n    introduce you to their younger cousin, Howie Rosenblatt. Howie is an all-around brilliant musician and a prodigy at the ${casper_instrument}. You quickly enlist his services.\n    \n    *goto start\n*if problem = \"you\"\n  *if band_member1 = \"Sludge\"\n    *if uno = true\n      *set band_member2 \"Uno\"\n      *goto start\n    *elseif Wendle = true\n      *set band_member2 \"Wendle\"\n      *goto start\n    *elseif V = true\n      *set band_member2 \"V\"\n      *goto start\n    *elseif Rory = true\n      *set band_member2 \"Rory\"    \n      *goto start\n    *else\n      *set band_member2 \"the Rosenblatts\"\n      *goto start\n  *elseif band_member1 = \"Casper\"\n    *if Sludge = true\n      *set band_member2 \"Sludge\"\n      *goto start\n    *elseif uno = true\n      *set band_member2 \"Uno\"\n      *goto start\n    *elseif Wendle = true\n      *set band_member2 \"Wendle\"\n      *goto start\n    *elseif V = true\n      *set band_member2 \"V\"\n      *goto start\n    *elseif Rory = true\n      *set band_member2 \"Rory\"   \n      *goto start \n    *else\n      *set band_member2 \"the Rosenblatts\"\n      *goto start   \n  *else\n    *if Sludge = true\n      *set band_member2 \"Sludge\"\n      *goto start\n    *elseif Wendle = true\n      *set band_member2 \"Wendle\"\n      *goto start\n    *elseif V = true\n      *set band_member2 \"V\"\n      *goto start\n    *elseif Rory = true\n      *set band_member2 \"Rory\"  \n      *goto start  \n    *else\n      *set band_member2 \"the Rosenblatts\"\n      *goto start\n*else\n  *set band_member2 \"${problem}\"\n  *goto start\n\n*label start\n*if fran = true\n\n  A week goes by, and you hear nothing from Fran. You're beginning to think her interest was exaggerated, that she was all bluster and no substance. It's painful to realize that all of the recent excitement may have amounted to bupkis. You resign yourself to the fact that your professional-rock-star life may still be a ways off, and a soul-crushing nine-to-five may be looming in your near future.\n  \n  Finally, one lazy Sunday afternoon, the phone rings.\n  \n  \"Kiddo, it's Fran. Are your ears buzzing, or have you ruined them already? I've been speaking to some of my friends at the finest venues around the country, getting them all hot and bothered about your band. Lemme tell you, I think I outdid myself this time. I've got a whole tour planned for you, six months on the road. That is, if you live up to the expectations I've created. If not…well, let's not worry about that now. But we have to get you on the road right away, because your first gig is next weekend. You kids ready?\"\n  \n  Apparently, Fran considers stunned silence an affirmative response. \n  \n  \"Excellent! I love the excitement! I've got the\n  *if (performance >= 4) or (sound = \"punk\")\n    *set vehicle \"bus\"\n    *achieve bus\n    tour bus ready to go, along with a $2,500 advance for expenses. Nothing but the best for my winners!\n    *goto fran\n  *else\n    *set vehicle \"van\"\n    tour van ready to go, along with a $1,000 advance for expenses. Nothing but the best for you!\n    *goto fran\n*else\n  *if performance >= 3\n    You return from St. Louis flush with confidence and prize money. \n    *goto decision\n  *else\n    You return from St. Louis determined to put the past behind you and blaze a new path forward. You still believe in this band; now you just have to figure out how to make everyone else feel the same.\n    *goto decision\n\n*label decision\nThe rest of the band looks to you to chart a course for your future. What's the plan?\n*choice\n  #Hit the road and start gigging. We'll use the few connections we have to start off, then build from there.\n    *label road\n    *set money -1000\n    \n    You immediately pool all available money and set to work finding a vehicle worthy of carrying your band on its historic first road trip. You settle on a used 1966 Volkswagen Bus. After vacuuming the shag carpet and removing the disco ball, you're ready to load up your gear and hit the road.\n    \n    *if sound = \"punk\"\n      *set money +750\n      Because you've built such a loyal following among the local punk fans, many of them rush out to help you on your way. They load up your van with food and supplies and give you numbers for places to crash as you follow your path. Whoever said punkers weren't friendly?\n      *page_break\n      *goto_scene road\n    *elseif money \u003c 0\n      *set health %-15\n      *set money 0\n      Unfortunately, you're now completely out of cash. With your last dollar, you purchase a marker and a piece of cardboard to create a sign: \"Will rock for food.\" This will be your motto until you manage to get some income. \n      \n      It's not pretty, with plenty of gas-station meals, truck-stop showers, and nights in the van, but you manage to beg and serenade your way down to your first gig.\n      *page_break\n      *goto_scene road\n    *elseif money \u003c 200\n      Unfortunately, after the VW sets you back $1000, you're nearly out of finances. For you, life on the road will mean gas-station meals, truck-stop showers, and nights in the van after gigs. That is, if you're lucky enough to get regular gigs. If not, you may be off the road very soon.\n      *page_break\n      *goto_scene road\n    *elseif money >= 5000\n      *set health %+20\n      Thanks to your Battle of the Bands winnings, you will start your tour with a nice financial cushion. Still, you'd better be very careful with how you spend it. Money has a way of evaporating on the road, and it will take discipline and a steady run of gigs to keep your tour going.\n      *page_break\n      *goto_scene road  \n    *else \n      Though you still have a small financial cushion, you will have to be very careful with how you spend it. Money has a way of evaporating on the road, and it will take discipline and a steady run of gigs to keep your tour going.\n      *page_break\n      *goto_scene road\n  #Hit the studio and start recording. We'll pump out a demo tape then take it on the road to sell to fans.\n    *label record\n    *set demo_first true\n    While it's a blast playing shows, your first love has always been the rock album. You've been waiting your whole life to record your first demo tape, and now you finally have the band and the material to do it.\n    \n    *if money \u003c= 0  \n      *set studio_slave true\n      *set health %-20\n      Unfortunately, you don't really have any money. Luckily, ${band_member1}'s father has a friend who runs a recording studio, and he agrees to let you use it during off-hours, as long as you agree to help with cleaning the place and maintaining the equipment. Working long nights after recording will take its toll, but at least you've got the green light to start working on your demo!\n      *page_break\n      *goto_scene demo\n    *elseif money \u003c 1200\n      *set money /2\n      *set studio_slave true\n      Unfortunately, you don't really have the money. Luckily, ${band_member1}'s father has a friend who runs a recording studio, and he agrees to let you use it during off-hours, as long as you agree to help with cleaning the place and maintaining the equipment. You will still need to scrounge some money together for all the other expenses, but now you've got the green light to start working on your demo!\n      *page_break\n      *goto_scene demo\n    *elseif money >= 4000\n      *set money -1200\n      *set health %+15\n      You also have plenty of money, thanks to your prize winnings and ${band_member1}'s father, who hooked you up with time at his old college friend's studio. You'll get to work with a real producer and quality recording equipment! Better make sure your band is up to the task.\n      *page_break\n      *goto_scene demo  \n    *else\n      *set money -1200\n      You also have just enough money, thanks to your prize winnings and ${band_member1}'s father, who hooked you up with time at his old college friend's studio. You'll get to work with a real producer and quality recording equipment! Better make sure your band is up to the task.\n      *page_break\n      *goto_scene demo\n  #Hit the brakes. There's no need to rush into anything yet. We'll spend some time building up our savings accounts and material, and then we'll get to the road/studio when we're ready.\n    *set musicianship %+25\n    *set cohesion %+35\n    *set buzz %-30\n    *set money +1200\n    *set health %-20\n    The next few months are spent in endless practice sessions as you and your bandmates grow from a collection of musicians into a well-oiled rock machine. Crashing on ${band_member1}'s couch and mostly subsisting off free food and beer, you are able to save up over $1,000 from various gigs around town. More importantly, you're able to build up a wealth of material and experience.\n    \n    Finally, after one particularly impressive practice session, you turn to the rest of the band and announce, \"We're ready.\"\n    \n    Ready for what?\n    *choice\n      #To hit the road! It's touring time.\n        Much of the buzz you created before and during The Battle has worn off over the last few months, so you will have to start rebuilding your fan base from scratch.\n        *goto road\n      #To hit the studio! It's demo time.\n        *goto record \n    \n*label fran\nNow get your gear in order and say goodbye to any loved ones. I'll be in touch with further instructions. Ciao!\"\n\nCLICK! Before you can even attempt to formulate a response, Fran has already hung up on you. It takes a few seconds before you remember to set the phone down yourself.\n*page_break\nWell, it's decision time. Fran may have the next six months of your life planned out already, but this is your career. Do you really want to hit the road right now and commit to such a long tour? Or would you rather stick around and write more music with your young band, eventually working toward a first demo tape? Or something else?\n*choice\n  #Hit the road! This is exactly what I've been waiting for my entire life, and I am excited to get going.\n    You immediately bring the band together and fill them in on Fran's plan.\n    *if cohesion >= 55\n      Somehow, they are even more excited than you are! Seeing their excitement, any concerns you had are immediately washed away. You know it will be tough spending the next six months stuck in a ${vehicle}, but you can't imagine a better group to be stuck with than your ${other_members_text} band members.\n      *goto next\n    *elseif reputation >=70\n      *set health %-10\n      Their jubilant reaction sets off a week of non-stop partying before you finally hit the road. You can't say how, or if, you managed to get everything packed into the ${vehicle}, but, before you know it, you and your bandmates are on the road, headed toward your first destination.\n      *goto next\n    *else\n      *set cohesion %-15\n      They react to the news with a mixture of excitement and anxiety. There's a lot of questions you weren't expecting: \"Where do we sleep? Where do the groupies sleep? Where do we shower? Where do the groupies shower? How much are we getting paid? What happens if we run out of money?\" And so on.\n      \n      You don't have any good answers yet, but you promise them you will make sure Fran takes care of everything. Having to worry about all these petty issues puts a serious damper on your mood, but nothing can squash your eagerness to get on the road.\n      *goto next  \n  #Make more music! We need to focus our creative energy on songwriting and making a demo tape. Then, when we go on tour, we'll have plenty of music to play—and sell.\n    *set demo_first true\n    You call Fran back and tell her that you'd like to push off touring for a bit to concentrate on writing music and recording your first demo tape. It's a few tense moments before she finally responds.\n    \n    \"You know what? That's a brilliant idea. An idea I wish you'd shared with me before I made all these arrangements, but brilliant nonetheless. \n    *if performance >= 4\n      I'll front you some money for recording fees and work on rescheduling your dates for six weeks down the line.\n      *goto demo\n    *else\n      *set musicianship %-20\n      I'll front you some money for recording fees and work on trying to reschedule your dates for three weeks down the line.\n      *goto demo\n  #Slow it down. This is all happening too fast. I just formed this band a few months back; there's no way we should be hitting the road before we have a chance to play and grow together.\n    You call Fran back and tell her that, while you appreciate her offer, you feel your band will be better off spending some more time practicing together before hitting the road.\n    *if performance >= 3\n      *set musicianship %+25\n      *set cohesion %+35\n      *set buzz %-20\n      *set money -1500\n      *set reputation %-20\n      It's a few tense moments before she finally responds.\n      \n      \"I don't like it, but you need to do what you feel is best. Call me when you're ready to hit the road.\"\n      \n      The next month is spent in endless practice sessions as you and your bandmates grow from a collection of musicians into a well-oiled rock machine. Living off the money from The Battle and crashing on ${band_member1}'s couch, you manage to get by without having to work a dreaded normal job. You play a few gigs here and there to help with expenses, but mostly it's just the ${band_size_text} of you, alone in a room, putting in hard work.\n      \n      Finally, after one particularly impressive practice session, you turn to the rest of the band and announce, \"We're ready.\" You call up Fran; luckily, she hasn't forgotten about you.\n      \n      \"You kids finally ready? Good, you leave tomorrow. Now go pack!\"\n      *goto next\n    *else\n      *set musicianship %+25\n      *set cohesion %+35\n      *set buzz %-20\n      *set money -1500\n      *set reputation %-20\n      *set fran false      \n      Unfortunately, Fran does not take the news well. It seems this will mark the end of your professional relationship. It's a shame, but you're not going to let anyone tell you how to run your band.\n      \n      The next month is spent in endless practice sessions as you and your bandmates grow from a collection of musicians into a well-oiled rock machine. Living off the money from The Battle and crashing on ${band_member1}'s couch, you manage to get by without having to work a dreaded normal job. You play a few gigs here and there to help with expenses, but mostly it's just the ${band_size_text} of you, alone in a room, putting in hard work.\n      \n      Finally, after one particularly impressive practice session, you turn to the rest of the band and announce, \"We're ready.\"\n      *goto road\n\n*label demo\nThat should give you plenty of money and time to have a shiny demo tape ready to sell when you get on the road. Now get to work; I'll be in touch.\"\n\nBetter start writing those songs!\n*page_break\n*goto_scene demo\n    \n*label next\n\nThat night, the ${vehicle} arrives at ${band_member1}'s house. You pull an all-nighter just getting all the gear packed up, and before you know it, you and your bandmates are on the road, headed toward your first destination.\n*if performance >= 4\n  *set money +2500 \n  *page_break\n  *goto_scene road\n*else\n  *set money +1000\n  *page_break\n  *goto_scene road\n\n*label rosen\n*if rosenblatts = false\n  , who have remained loyal fans and friends of yours despite not becoming members of the band, \n  *return\n*else\n  *return\n", "demo": "*temp recording_time\n*set recording_time 25\n*temp demo1\n*set demo1 \"untitled\"\n*label start\n[i]Train wheels running through the back of my memory[/i]\n*line_break\n[i]As the daylight hours do increase[/i]\n*line_break\n[i]Someday, everything's gonna be smooth like a rhapsody[/i]\n*line_break\n[i]When I paint my masterpiece[/i]\n*line_break\n–Bob Dylan\n*page_break\n\nThe first day you pull up to Bubonic Sonic Studios, conveniently located between two truck stops off the highway an hour outside ${hometown}, you find yourself somewhat underwhelmed. It's not like you were expecting Abbey Road or anything, but this place is a dump. \n\n*if demo_first = false\n  After so long on tour, are you really ready to lock yourself up for weeks inside this dank studio, without any of the audience interaction that you've come to love? It's almost enough to make you want to run away.\n  *goto spencer\n*else\n  *goto spencer\n  \n*label spencer  \nHowever, once you get past the stained concrete exterior smelling of decay, and Spencer, the ferociously growling pitbull chained by the entrance, you find a perfectly serviceable recording studio.\n\nNot that you really know anything about recording studios, but all the elements you'd expect seem to be in place. There are microphones of all shapes and sizes, a reel-to-reel recorder, a mixing board with all manner of intriguing knobs and dials, and even that weird grey egg-crate-looking material covering the walls and ceiling for some reason. \n\nLucien, the burly, tattooed gentleman sitting at the mixer, gives you a quick tour of the space. Lucien's aggressive facial piercings and bleached mohawk, all somewhat obscured by the cloud of smoke forever clinging around his head, bespeak his rock bonafides. \n\n*if fran = true\n  *set recording_time 20\n  Despite its outwardly decrepit appearance, you're excited to learn that this studio has played host to some famous artists over the years: Art Garfunkel, Tito Jackson, The Pips, etc. Maybe not the cream of the crop, but it's clear that Fran has hooked you up with a legit space.\n  \n  After finishing the tour, you sit down with Lucien to discuss business.\n  \n  \"Your manager said you guys were the next hot thing, that just letting you record here would put this place on the map. I asked her which map that was, exactly, and she hung up on me. Fucking managers. Anyway, she booked you for 20 hours, which will get you six songs if you work fast enough. That's pretty standard for a demo tape. If you want more, you have to pay. If you want anything extra–any bells and whistles–you also have to pay. If you want to get drunk and trash the place, you have to pay and answer to Spencer. Got it?\"\n  *goto questions\n*elseif (performance >= 4) or (marvins = 99)\n  *set recording_time 30\n  \"Welcome to Bubonic Sonic, where good sound production is contagious. As the owner and producer here, I'm glad to welcome up-and-comers like yourselves to my studio. I've worked with other up-and-comers in the past who ended up becoming down-and-goers, but I have a good feeling about you all. So good that I'm adding ten free hours to your recording time, in the hopes you'll make an album kick-ass enough for me to move out of this shit hole, finally. Don't make me regret it, or you'll have to answer to Spencer. Any questions?\n  *goto questions\n*else\n  *set recording_time 15\n  \"Welcome to Bubonic Sonic, where good sound production is contagious. As the owner and producer here, my job is to help you record your album as quickly and painlessly as possible. Your job is to make sure you don't get in the way of my doing my job. Since you're only booked for 15 hours, which is the bare minimum needed to record a standard six-song demo tape, both of us will need to do our jobs as quickly and efficiently as possible.\n  \n  *if studio_slave = true\n    And since you will be sticking around an extra couple hours each day to help clean up around here, make sure you factor that into your equation. It doesn't leave you a lot of time for practicing or dicking around, so I hope you're ready to go. Should we get started?\"\n    *choice\n      #Yes! Let's start recording.\n        \"All right. Go get your gear set up, and let's do this.\"\n        *goto first_session\n      #Sorry, not quite yet. Actually, now that you mention it, we should take some more time to practice before we get going.\n        \"Sorry, you're already booked for today. But that's a great idea before your next session. Now, get your gear set up, and let's do this.\"\n        *goto first_session\n      #Okay, but speaking of dicking around, mind if we bring some refreshments in here?\n        *set reputation %+20\n        *set health %-10\n        *set buzz %+10\n        *set recording_time -1\n        Lucien sighs.\n        \n        \"Hell, I'm not a den mother. It's your time. As long as you don't break any of my rules, or any of my equipment, you can do whatever you want in here. And one of my rules is you have to share anything you bring in with the producer, naturally.\"\n        \n        You load all of the gear and party supplies into the studio and get ready for your first session.\n        *goto first_session\n  *else\n    If you need to add more hours, you'll have to pay. If you want anything extra, any bells and whistles, you also have to pay. If you want to get drunk and trash the place, you have to pay and answer to Spencer. Got it?\"\n    *goto questions\n  \n*label questions\n*choice\n  #\"Got it. Let's get started!\"\n    \"All right. Go get your gear set up, and let's do this.\"\n    *goto first_session\n  #\"I'm not sure ${recording_time} hours is enough. How much to add more time?\"\n    \"It's $20 an hour to add more time now. If you run out of time and want to add more at the end, it rises to $30 an hour. If you don't understand why the same hour costs more if you need it later than if you book it now, I would be happy to lecture you on the principles of supply-and-demand economics. That will cost $40 an hour.\"\n\n    What do you want to do?\n    *choice\n      #I'll take my chances with the ${recording_time} hours.\n        $!{recording_time} hours it is. Let's start recording, shall we?\n        *goto first_session\n      *selectable_if (money >= 100) #Let's book five more hours, to be safe.\n        *set recording_time +5\n        *set money -100\n        $!{recording_time} hours it is. Let's start recording, shall we?\n        *goto first_session\n      *selectable_if (money >= 200) #Let's book ten more hours, to be safe.\n        *set recording_time +10\n        *set money -200\n        $!{recording_time} hours it is. Let's start recording, shall we?\n        *goto first_session\n      *selectable_if (money >= 400) #Screw it, let's book 20 more hours. You only get one chance to make a first album, and I'm going all in on this one.\n        *set recording_time +20\n        *set money -400\n        \"I like your attitude—and your money! ${recording_time} hours may seem like a lot, but if you're planning on producing a fully polished 12-to-16-song album, it will go faster than you realize. Now, let's start recording, shall we?\"\n        *goto first_session\n      #\"Tell me more about these bells and whistles of which you speak.\"\n        \"Additional gear or instruments, background vocalists, or session musicians—meaning musicians who will sit in on a track to help give you a certain \n        sound. Those can include standard or orchestral musicians, so if you're looking for a cello to fill out a track, come talk to me. For now, let's\n        concentrate on laying down something usable, alright?\"\n        *goto first_session\n      #\"Speaking of getting drunk…mind if we bring in a few refreshments?\"\n        *set reputation %+20\n        *set health %-10\n        *set buzz %+10\n        *set recording_time -1\n        \"Hell, I'm no den mother. As long as you don't break any of my rules, or any of my equipment, you can do whatever you want in here. And one of my rules is you have to share anything you bring in with the producer, naturally.\"\n    \n        You load all of the gear and party supplies into the studio and get ready for your first session.\n        *goto first_session\n    \n*label first_session\n*set recording_time -1\n\nIt takes about an hour to get all set up, with the microphones properly positioned and all the instruments accounted for. Finally, you're all ready to start playing…except you haven't picked out a song to play! You decide to focus on your original four songs first and harness the creative energy to generate more material down the road.\n\n*label first\nWhich song do you want to record first?\n*choice\n  #${title1}\n    *set demo1 \"${title1}\"\n    *goto demo1\n  #${title2}\n    *set demo1 \"${title2}\"\n    *goto demo1\n  #${title3}\n    *set demo1 \"${title3}\"\n    *goto demo1\n  #${title4}\n    *set demo1 \"${title4}\"\n    *goto demo1\n\n*label demo1    \nAfter all the build-up, you rip into a version of ${demo1} that effortlessly explodes from all ${band_size_text} of you like a scud rock missile. You immediately rush over to Lucien to hear the playback. He rewinds the track, but before pressing play he warns you:\n\n\"Listen, this is your first time recording, which means it's your first time hearing yourselves on tape. For some bands, it can be a very difficult experience. Like when you hold a magnifying glass up to some hot chick's ass, and you see all the zits and stuff. It might look gross at first, but it doesn't mean she isn't still hot.\"\n\nLucien truly has a way with words. After making sure you've heeded his advice, he presses play. And it sounds…\n*if (musicianship >= 68) and (reputation \u003c= 55)\n  *set recording_time -3\n  *set demo %+25\n  pretty damn great! Obviously you've played ${demo1} plenty of times now, but hearing it on tape is a completely new and exciting experience. Even Lucien is impressed. \"That may be the cleanest first take by a new band I've ever heard,\" he says. \n\n  \"Of course there are a few rough spots to polish out, too,\" he quickly adds, lest his enthusiasm seem over-effusive, \"but we can work on those later. Let's lay down some more tracks!\"\n  \n  In just three hours, you manage to record the base tracks to all four of your songs. By the end of the session, Lucien's amazement at your skill and discipline has only grown. Lighting a new cigarette with his current cigarette, he turns to the band.\n  \n  *if fran\n    \"You know, a lot of young bands come in here with a ton of hype and never come close to living up to it, but you guys are something special. I haven't been this excited to record an album since I was a schoolgirl. You have ${recording_time} hours left; that is more than enough at the rate you're going. It's up to you how you want to spend it.\"\n    *goto good_choice\n  *else\n    \"You know, a lot of bands come in here with lotta hype and money, and they don't hold a candle to what I just witnessed from you guys. I haven't been this excited to record an album since I was a schoolgirl. You have ${recording_time} hours left; that is more than enough at the rate you're going. It's up to you how you want to spend it.\"\n    *goto good_choice\n*elseif (musicianship >= 62)\n  *set recording_time -5\n  not bad! Obviously, you've played ${demo1} plenty of times now, but hearing it on tape is a completely new and exciting experience. Even Lucien seems impressed. \"For a new band, that was a pretty clean first take,\" he says. \n\n  \"Of course there are plenty of rough spots to polish out, too,\" he quickly adds, lest he seem over-enthused, \"but we can work on that later. Let's lay down some more tracks!\"\n  \n  In just five hours, you manage to record the base tracks to all four of your songs. It takes a few attempts to really nail the tricky parts in ${title2} and ${title4}, but by the end you can almost see Lucien smile behind his smoke cloud.\n  \n  \"Nice work, team. \n  *if recording_time \u003c=8\n    You have ${recording_time} hours left; that's just enough time to record two more tracks and get them nice and polished. As long as you keep up the disciplined pace you set today, you should have a damn fine demo tape soon enough.\"\n    *goto 2songs\n  *else\n    You have ${recording_time} hours left; that is more than enough at the rate you're going. It's up to you how you want to spend it.\"\n    *goto good_choice\n*elseif (musicianship >= 50) and (reputation \u003c= 55)\n  *set recording_time -8\n  not completely terrible. Obviously you've played ${demo1} plenty of times now, but hearing it on tape is a completely new and somewhat jarring experience. All you can hear are the weaknesses, or the \"zits,\" as Lucien colorfully put it, but at the same time it does almost sound like a real song. Your real song.\n  *if ((sound = \"punk\") or (sound = \"artsy\")) or (sound = \"poppy\")\n    *set recording_time +6\n    *goto punk_art\n  *else\n\n    \"For a new band, that was a pretty decent first take,\" he says, in his typically effusive manner. \"There are plenty of rough spots to polish out, but we can work on that later. Let's see how many more tracks we can lay down today.\" \n  \n    It takes the entire rest of the day, eight full hours, but you manage to record the base tracks to all four of your songs. It would have gone faster, but there were a number of technical issues early on that threw you off your rhythm, and then some of the band members lost their focus and started dropping flubs later in the session. But, thankfully, you made it through with serviceable tracks from which to work.\n  \n    At the end of the day, Lucien coughs at you from behind his smoke cloud. \"Nice work, team.\n    *label time_choice  \n    *if recording_time \u003c= 8\n       But I'm worried about rest of the hours. At this point, you may want to think about sticking to these four songs and not trying to write any more, or else you may run out of hours. What's the call?\"\n       *goto sad_choice\n    *elseif recording_time \u003c=12\n        You have ${recording_time} hours left; that's just enough time to record two more tracks and get them nice and polished. As long as we can pick up the pace a bit, you should have a damn fine demo tape soon enough.\"\n        *goto 2songs\n    *else\n        You have ${recording_time} hours left; that is more than enough at the rate you're going. It's up to you how you want to spend it.\"\n        *goto good_choice\n*elseif (musicianship >= 53) and (stage_presence >= 58)\n  *set recording_time -2\n  painful. Obviously you've played ${demo1} plenty of times now, but hearing it on tape is a completely new and somewhat jarring experience. All you can hear are the weaknesses, or the \"zits,\" as Lucien colorfully put it. \n  *label punk_art\n  *if sound = \"punk\"\n  \n    Looking past all the flubs, however, there's an unmistakable energy there that even Lucien can't deny.\n    \n    \"Look, it's not the prettiest recording I've ever heard, but pretty isn't your thing, no offense. There's something raw and exciting about it that fits perfectly with your style. We can clean it up a little bit later on, but for now we should try to build off this energy and record as much as we can.\n    *goto 10hours\n  *elseif (sound = \"artsy\") or (sound = \"poppy\")\n    By the end of the track, you've almost convinced yourself that this is a fine take from which to build.\n     \n    Unfortunately, as soon as Lucien puts his headphones down and turns to you, you can tell he does not agree.\n     \n    \"Look, you have a great energy here; I won't deny that. When you play live, I'm sure the audience eats it up. But the ${sound} sound you have just doesn't allow for this kind of sloppiness on tape. It needs to be tight and sharp; if not, the whole thing falls apart. I wouldn't use this track if I were you, but that's just my opinion. The decision is up to you, of course.\"\n    *goto bad_choice\n  *else\n    Still, even with the all the flubs, there's an unmistakable energy that even he can't deny.\n  \n    \"Look, for a new band, that was a pretty decent first take,\" he says, in his typically effusive manner. \"There are plenty of rough spots to polish out, but I like the energy. It's up to you whether we should move forward or do a few more takes and try for something cleaner.\"\n    *choice\n      #It's good enough; let's keep moving. We can polish it up afterwards.\n        *set demo %-30\n        Building on the energy from the last take, you decide to keep recording.\n        *goto 10hours\n      #No, I want our tracks to be clean. We will keep re-recording everything until we get it right.\n        *set demo %+20\n\n        You have ${recording_time} hours to use, and you want to make them count. You keep re-recording every song until it's perfect. It ends up taking a full two days of work before you finally have useable takes for all four of your songs.\n        *set recording_time -16  \n        *goto blank_hours\n*else\n  *set recording_time -2\n  awful. Just awful. Your entire band looks at one another in shock. $!{band_member1} seems almost in tears.\n  \n  \"Do we really sound that terrible?\" you sputter. \n\n  Lucien puts a comforting hand on your shoulder. \"Yes, yes you do. But, look, you're new at this. A lot of great bands sound terrible on first take. Maybe not as bad as you just did, but pretty bad. You'll get\n  *if (sound = \"punk\") or (sound = \"heavy\")\n    better.  Besides, you're not exactly the philharmonic. Your sound is supposed to be hard and dirty. If you can just get some more energy, you should be able to give your songs the recordings they deserve.\n    *goto time\n  *else\n    better.\n    *goto time\n\n*label time\n*if recording_time \u003c= 25\n  Still, you need to make some tough choices now. I don't think what we got was at all useable, and ${recording_time} hours ain't gonna be enough to get six pristine tracks at this rate. But, of course, the decision is up to you.\"\n  *goto bad_choice    \n*else\n  *set recording_time -16\n  *set demo %+20\n  You have ${recording_time} hours left; that's plenty of time to turn things around. For now, lets keep working on getting the basic tracks down, and then we can see where we're at.\"\n    \n  It takes two whole days, but you finally get relatively useable takes for all four of your songs. You are still planning on writing and recording two more songs to fill out the demo, but Lucien thinks you should abandon that idea and just concentrate on cleaning up the four songs you already have. What do you want to do?\n  *goto sad_choice\n    \n*label 10hours\n*set recording_time -10\n\nIt takes the entire rest of the day, ten full hours, but you manage to record the base tracks to all four of your songs. \n*label blank_hours\nIt would have gone faster, but there were a number of technical issues early on that threw you off your rhythm, and then some of the band members started screwing around and lost their focus. But thankfully you pulled through with four serviceable tracks from which to work.\n  \nAt the end of the session, Lucien coughs at you from behind his smoke cloud. \"Nice work, team. I wasn't sure you'd make it through everything, but you did.\n*goto time_choice\n    \n*label sad_choice\n*choice\n  #Write and record two more songs as quickly as possible, and spend any remaining time on polishing.\n    *set demo %-20\n    *goto 2songs\n  #Take a break to write and practice, then record the final two songs.\n    *set musicianship %+20\n    *set cohesion %-15\n    *set demo %+20\n    You spend the next ten days practicing and working on the new material. While the rest of the band is anxious to keep recording, you remain focused on making sure everyone sounds much tighter the next time you step into the studio.\n      \n    After long practices each day, you sit down with your ${instrument} and work on the new material for the album. \n    *goto 2songs\n  #Ditch the final two songs; just concentrate on polishing what we have.\n    You spend your remaining hours in the studio polishing the tracks you've recorded.\n    *label polishing\n    It's long, tedious work, but it certainly pays off. By the time you've used up all your recording hours, your demo has actually begun to resemble something you could call \"sorta remotely professionalish.\"\n    *gosub slave\n    *if recording_time > 12\n      *set demo %+30\n      *goto short\n    *elseif recording_time > 8\n      *set demo %+20\n      *goto short\n    *else\n      *set demo %+10\n      *goto short\n\n*label bad_choice\nWhat do you want to do?\n*choice\n  #Stay the course. It will get better. Six songs, ${recording_time} hours left, let's do it.\n    *set demo %-30\n    *set recording_time -8\n    You opt to plow ahead, hoping that the quality will improve as the day goes on. It's hard to tell from Lucien's reaction whether it ever does, but after eight hours you finish recording all four of your songs.\n    \n    Lucien turns to you from behind his smoke cloud. \"Well, you recorded four songs today, so that's something.\"\n    *gosub slave\n    *goto time_choice\n  #Cut the demo down to four songs and work on getting those as good as they can be.\n    *set demo %+10\n    With only ${recording_time} hours to work with, you decide to cut the album down to the four songs you know best. It's a major weight off of everyone's shoulders knowing that you all won't have to worry about writing any more songs.\n    \n    *set recording_time -8   \n    Although there are a few stops and starts along the way—a sore throat here, a buzzing amplifier there, and all sorts of of flubs—by the end of the eight-hour day, you have recorded acceptable versions of all four songs. \n     \n    Lucien turns to you from behind his smoke cloud. \"Well, you recorded four songs today, so that's something. But tomorrow starts the real work: polishing the tracks.\"\n    *gosub slave\n    *goto polishing\n  #The vibe in this place is all wrong. It should feel more like a party and not like some boring office in Dullsville. Improve our energy, and then our music will follow. \n\n    Despite Lucien's protestations, you decide to call up some of your friends and fellow musicians to join you. You are hoping to cultivate a looser and more exciting recording environment, reminiscent of the classic Stones/Beatles/Zeppelin party sessions of yore.\n    \n    *if (((cohesion >= 60) and (reputation >= 60)) and (((sound
