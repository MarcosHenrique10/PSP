= \"punk\") or (sound = \"heavy\")) or (sound = \"jammy\")))\n      *set demo %+20\n      *set reputation %+20\n      *set health %-20\n      *set recording_time -10 \n      And it works! As soon as your friends arrive, the booze and creativity start to flow freely, and the air fills with smoke and music. Even Lucien gets into the routine, kicking back and actually seeming to enjoy himself. In what seems like a flash, ten hours to be exact, you're able to get down four solid tracks. No, they're still not perfectly clean, but the added creativity and energy more than compensates.       \n\n      At the end of the day, Lucien coughs at you from behind the smoke cloud. \"Nice work, team. I never thought adding more chaos to the proceedings would help, but for you it seems to have been the right choice.\n      *goto time_choice \n    *else\n      *set demo %-35\n      *set reputation %+20\n      *set health %-20\n      *set recording_time -20\n      And it's a disaster. Actually, it starts off pretty well, with the booze and creativity flowing freely. But soon the creativity dries up, the booze takes control, and your recording session turns into a multi-day bender with about as much quality as a Chipmunks Christmas album.   \n    \n      *if recording_time \u003c= 4\n        Mercifully, Lucien puts an end to the proceedings by announcing that your hours are almost up, and you'd better put the final touches on the four songs you managed to record. But even this proves problematic, as ${band_member1} is already passed out in the corner,\n        *if (problem = \"you\")\n          and you are too hungover to do anything on the ${instrument}.\n          *goto party_end\n        *else\n          and no one wants to go anywhere near the drums after ${band_member2} puked all over them.\n          *goto party_end\n      *else\n        With ${recording_time} hours left, you have just enough time to sober up and put final touches on all four tracks. Even though it's just four songs, they actually turn out better than you had feared.\n        *if recording_time >= 8\n          *set demo %+20\n          *goto short\n        *else\n          *set demo %+10\n          *goto short\n\n*label party_end\nLucien does his best to help you, but in the end all he can do is burn what you have to tape and send you on your way.\n*gosub slave\n\n*goto short\n\n*label 2songs\n*if (musicianship > 65) and (sound != \"undefined\")\n  *set demo %+20\n  *set cohesion %+10\n  *label good_writing\n  Because you are a bit obsessed with music, you already have an entire library of \"song seeds\"—half-to-fully-baked musical ideas that you keep locked inside your head. It's why songwriting has always come so naturally for you, and why your high school math teachers always thought you were daydreaming during class (they were right).\n  \n  You hone in on two of the most promising ideas and flesh them out until they are ready to start practicing with the band.\n  *gosub uno\n  *goto new_songs\n*else\n  Though you are no stranger to songwriting, you have a hard time freeing yourself creatively when you know that anything you write will soon be subjected to the harsh light of the studio. How should you jumpstart your creativity? \n  *choice\n    #Keep battling that blank page. I'll stay up all night if I have to, but I will write two more songs.\n      *set demo %-10\n      Finally, \n      *label persistence\n      whether by persistence or insomnia-induced delirium, you find inspiration for two more songs. You like both of them a lot right now, but you will need some sleep before you can tell if they are any good or not.\n      *gosub uno\n      *goto new_songs\n    #Try some collaborative songwriting with the band. $!{band_size_text} beautiful musical brains are better than one.\n      *if ((cohesion >= 60) and (sound != \"undefined\")) or (cohesion >= 73)\n        *set demo %+20\n        Because your band has grown so tight, the creativity just flows like a faucet. Though it takes longer to work this way, the results are fantastic, and you cannot wait to bring the new songs into the studio.\n        *gosub uno\n        *goto new_songs\n      *else\n        *set demo %-10\n        *set cohesion %-10\n        *if (sound = \"undefined\") or (sound = \"indie\")\n          It turns out that your decision to reject a conventional musical style makes for a rocky collaboration. With ${band_size_text} members of the band, there are at least ${band_size_text} different opinions for every creative decision. When you find yourself in a screaming match about the differences between neo-Aussie folk rock and East German medieval fusion metal, you realize that there will be little chance for productive collaboration unless you can settle on a unifying sound on which to focus.          \n\n          What should you do?\n        \n          *choice\n            #We need one person writing the songs, and that person is going to be me. I should have done it from the beginning. \n              *set cohesion %-15\n              Collaboration is overrated. The band isn't thrilled with your decision, but you know it's the only possible one. You vow to lock yourself in your room and not leave until the songs are written. It takes all night, but finally\n              *goto persistence \n            #We need to get our creative juices flowing. And by juices, I mean vodka.\n              *goto party\n            #We need to settle on a sound. It's time, already.\n              *goto sound      \n        *else\n          *set demo %-10\n          While your brains are beautiful, they also happen to be quite stubborn. Under this kind of time-constraint, and with the pressure of recording an album, fruitful collaboration proves impossible. After a week of meandering explorations and pointless arguments—such as whether drummers should be considered musicians if their jobs could effectively be replaced by those wind-up monkeys with cymbals—you finally decide just to write the new songs yourself.\n        \n          You vow to lock yourself in your room and not leave until the songs are written. It takes all night, but, finally,\n          *goto persistence \n    #Improve the energy, and then the creativity will follow. After all, this whole songwriting thing is supposed to be fun, you know?\n      *label party\n      You decide to turn the songwriting process into a band party. You are hoping to cultivate a looser and more exciting environment, reminiscent of the classic Stones/Beatles/Zeppelin party sessions of yore.\n    \n      *if (((cohesion >= 60) and (reputation >= 65)) and ((sound != \"poppy\") and (sound != \"folksy\")))\n        *set demo %+10\n        *set reputation %+20\n        *set health %-20\n        *set cohesion %+10\n        And it works! As the booze begins to flow, the creativity follows, and soon the air is thick with smoke and music. At the end of the three-day marathon party, you have a plethora of new songs from which to choose. You make two your focus and begin preparing them for recording.\n        *gosub uno\n        *goto new_songs \n      *else\n        *set demo %-25\n        *set health %-20\n        *set reputation %+20\n        Unfortunately, your session turns out to be more like Spinal Tap than The Stones. The party starts off pretty well, with the booze and creativity flowing freely. But soon the creativity dries up, the booze takes control, and your party turns into a multi-day bender with about as much creative output as a Chipmunks Christmas album.   \n    \n        The three-day marathon party leaves you with nothing useable. It takes another day to sober up and two more days of staring at a blank page until you're finally able to wring enough creative juice from your boozed-up brain for two new songs. They may be the greatest songs you've ever written or complete garbage, but at this point you can't really tell. You bring them to the band and begin preparing them for recording. \n        *gosub uno   \n        *goto new_songs\n\n*label sound\nWhat unifying sound do you want to choose for these new songs?\n*choice\n  #Heavy rock.\n    *set sound \"heavy\"\n    *if folksiness \u003c 35\n      *goto glove\n    *else\n      *if (casperquit = false)\n        *set cohesion %+5\n        *set demo %+5\n        Casper is thrilled about the new direction and promises to unleash a torrent of ${casper_instrument}-slaying on the new demo.\n      *set folksiness %-20\n      *goto no_glove\n  #Improvisational rock.\n    *set sound \"jammy\"\n    *if improv > 65\n      *goto glove\n    *else\n      *if v\n        *set cohesion %+5\n        *set demo %+5\n        V is thrilled about the new direction and promises to unleash a torrent of booming baritone bass on the new demo.\n      *set improv %+20\n      *goto no_glove\n  #Artsy rock.\n    *set sound \"artsy\"\n    *if (unique > 65) and (commercial \u003c 40)\n      *goto glove\n    *else\n      *set unique %+20\n      *set commercial %-15\n      *if rory\n        *set cohesion %+5\n        *set demo %+5\n        Rory is thrilled about the new direction and promises to unleash a torrent of soulfully sonorous singing on the new demo.\n      *goto no_glove\n  #Folk rock.\n    *set sound \"folksy\"\n    *if folksiness > 65\n      *goto glove\n    *else\n      *set folksiness %+20\n      *if uno\n        *set cohesion %+5\n        *set demo %+5\n        Uno is thrilled about the new direction and promises to unleash a flood of folksy fretboard fire. \n        *goto no_glove \n      *else\n        *goto no_glove \n  #Punk rock.\n    *set sound \"punk\"\n    *if ((folksiness \u003c 40) and (reputation > 50)) and (commercial \u003c 65)\n      *goto glove\n    *else\n      *set folksiness %-15\n      *set commercial %-10\n      *set reputation %+10\n      *if sludge\n        *set cohesion %+5\n        *set demo %+5\n        Sludge is thrilled about the new direction and promises to unleash a torrent of percussional pandemonium on the demo.  \n        *goto no_glove \n      *else\n        *goto no_glove  \n  #Pop rock.\n    *set sound \"poppy\"\n    *if (commercial > 65) and (reputation \u003c 65)\n      *goto glove\n    *else\n      *set commercial %-20\n      *set reputation %-15\n      *if rosenblatts\n        *set cohesion %+5\n        *set demo %+5\n        The Rosenblatts are thrilled about this new direction and promise to unleash a torrent of brash brass blasts on the demo.  \n      *goto no_glove\n  *hide_reuse #Does it have to have \"rock\" in the name? I'm tired of rock.\n    No, of course not. You could always take up the ${band_instrument} again, I hear that's really popular these days….\n    \n    Sorry. This is what you signed up for. You might explore other genres as well, but ultimately you are a rocker at heart. I guess that puts you between rock and a heart place, huh?\n    *choice\n      #Fine, I'll choose a style.\n        *goto sound\n      #I'll be a rocker, but I'm not conforming to your labels.\n        *set sound \"indie\"  \n        *set unique %+20\n        *set commercial %-20\n        *set cohesion %-10\n        Fair enough. You will remain an \"indie\" band—meaning you are independent of commercial genres and labels—with all its provident freedoms and difficulties.\n      \n        You seize on this freedom to crank out a new batch of songs, each as unique and eclectic as you are. After some debate, you settle on two of them to record.\n        *gosub uno\n        *goto new_songs \n\n*label glove\n*set musicianship %+15\n*set demo %+15 \n*set cohesion %+25\n\nThis new ${sound} style fits like a glove. It's basically what you were already doing, only now there's a sense of clarity and direction for the band. Hopefully the label won't become too constraining, but for now it's perfect.\n\nYou quickly and excitedly crank out a batch of new songs and pick the best two to record for the album.\n*gosub uno\n*goto new_songs\n\n*label no_glove\n*set demo %+5 \n*set cohesion %+10\n\nThis new ${sound} style fits like a glove—the kind of glove that bunches up and makes your hands feel really sweaty and gross. No, it's not a perfect fit just yet. The band chafes at the constraints of the ${sound} category, and you worry about retaining your creative freedom. \n\nBut after listening to some of your favorite influences, you find a way to capture a version of the ${sound} without losing what makes your band unique. You harness this energy to crank out a new batch of songs and pick the best two to record for the album.\n*gosub uno\n*goto new_songs\n\n*label new_songs\n*if (recording_time > 14) or ((recording_time > 8) and (musicianship > 65))\n  *set demo %+30\n  *set recording_time -4\n  \n  Even though the songs are brand-new, as soon as you practice them a couple of times, it feels like you've known them forever. You rush back to the studio with a burst of energy and lay down the tracks. You know the songs are good when you see Lucien bobbing his head and rocking out behind the soundboard when he thinks no one is watching.\n  \n  You spend the remaining time polishing your tracks. It's long, tedious work, but it really pays off. By the time you've used up all your recording hours, your demo begins to sound like a real album.\n  *gosub slave\n  *goto normal \n*else\n  *set demo %+10\n  *set recording_time -6\n  \n  While the new songs could probably use some more time, you rush back to the studio with a burst of energy. Even though they take a few tries to get right, you know the songs are good when you see Lucien bobbing his head and rocking out behind the soundboard when he thinks no one is watching.\n  *if recording_time > 5\n  \n    You spend the remaining time polishing your tracks.\n    \n    *gosub slave\n    \n    *goto switch\n  *else\n  \n    Unfortunately, you don't have enough time left to polish your tracks! Lucien says he needs a bare minimum of six more hours. What do you do?\n  \n    *choice\n      *selectable_if ((money > 60) and (recording_time > 3)) #Add two more hours.\n        *set money -60\n        *set recording_time +2\n        *goto switch\n      *selectable_if ((money > 120) and (recording_time > 1)) #Add four more hours.\n        *set money -120\n        *set recording_time +4\n        *goto switch\n      *selectable_if (money > 180) #Add six more hours.\n        *set money -180\n        *set recording_time +6\n        *goto switch\n      *selectable_if (money > 240) #Add eight more hours.\n        *set money -240\n        *set recording_time +8\n        *goto switch\n      *selectable_if (money > 300) #Add ten more hours.\n        *set money -300\n        *set recording_time +10\n        *goto switch\n      #Forget polishing; leave it how it is.\n        You, and your wallet, decide that a raw, unpolished sound is exactly what this music deserves.\n        *if sound = \"punk\"\n          *set demo %+30\n          Actually, Lucien agrees.\n        \n          \"It pains me not to take more of your money, but the ${sound} sound you have works better with all the grittiness left in. Good call.\"\n          *goto normal\n        *else\n          *set demo %-25\n          *goto normal\n\n*label switch\nIt's expensive and tedious, but the polishing really pays off. By the end of the recording, your demo actually has begun to resemble something you could call \"professional-ish.\"\n*if recording_time \u003c 4\n    *goto normal\n*elseif recording_time \u003c 6\n    *set demo %+10\n    *goto normal\n*elseif recording_time \u003c 8\n    *set demo %+20\n    *goto normal\n*else\n    *set demo %+30\n    *goto normal\n    \n*label good_choice\n\nWhat's the strategy for your remaining hours? \n*choice\n  #I want to focus on the six-song demo we set out to make and spend the extra hours making it as polished and professional-sounding as possible. \n    *set musicianship %+15\n    *set demo %+15\n    Good call. Why overreach when what you have already is so awesome? \n    \n    When you're away from the studio, you start working on two more songs to fill out your demo. \n    *goto good_writing \n  #I want to expand the scope of the project into a full-sized, 12-16-song album.\n    Not only are you bursting with studio time, you are overflowing with creativity as well. Because you are a bit obsessed with music, you already have an entire library of \"song seeds\"—half-to-fully-baked musical ideas that you keep locked inside your head. It's why songwriting has always come so naturally for you, and why your high-school math teachers always thought you were daydreaming during class (they were right).\n  \n    You hone in on the most promising ideas and flesh them out until they are ready to start being practiced with the band.\n    *goto album_songs\n  #I want to bring in additional musicians to add a new dimension to our sound.\n    *if money \u003c 300\n      Unfortunately, you don't have the funds for this kind of extravagance. Better focus on the musicians you already have.\n      *goto good_choice\n    *else\n      *set recording_time -5\n      After writing and recording two new songs, you still have ${recording_time} studio hours left. Listening to the tracks, you sense there's something crucial missing from the demo, something that sounds a lot like…\n      *choice\n        *if (rosenblatts = false) #A horn section.\n          *set money -300\n          Exactly. As any musicologist will tell you, there's only so much awesomeness that can be attained without a horn section. Why limit your awesomeness?\n          *if ((sound = \"punk\") or (sound = \"poppy\")) or (sound = \"jammy\")\n            *set demo %+25\n            Horns prove to be the perfect addition. Even Lucien can't believe how much better your demo sounds after the Rosenblatt brothers lay down their sweltering horn riffs on top.\n            *goto wrap_polish\n          *elseif (sound = \"heavy\") or (sound = \"folk\")\n            *set demo %+5\n            Horns are an admittedly odd choice for your sound. Although Lucien seems unsure about it, you bring in the Rosenblatt brothers to lay down some sweltering horn riffs for your tracks.\n            *goto wrap_polish\n          *else\n            *set demo %+15\n            You bring in the Rosenblatt brothers to lay down some sweltering horn riffs for your tracks. It sounds awesome.\n            *goto wrap_polish\n        *if (rory = false) #A sultry back-up vocalist.\n          *set money -300\n          A sultry, syrupy songstress is exactly what your songs need, nay, demand. \n          *if (sound = \"heavy\") or ((sound = \"jammy\") or (sound = \"punk\"))\n            *set demo %+10\n            The dulcet-toned crooner is admittedly an odd choice for your sound, but you press ahead, despite Lucien's protestations. Her velvety additions sound wonderful, if somewhat against the grain.\n            *goto wrap_polish\n          *else\n            *set demo %+25\n           The dulcet-toned crooner proves the perfect addition for your tracks, enveloping them in the sweet velvety goodness of her golden vocal chords.\n           *goto wrap_polish\n        #A string accompaniment.\n          A scorching cellist or violinist is exactly what your songs need, nay, demand.\n          *if (sound = \"jammy\") or (sound = \"punk\")\n            *set demo %+5\n            The strings are admittedly an odd choice for your sound, but you press ahead, despite Lucien's protestations. They add an intriguing, if somewhat off-kilter, element to the recordings.\n            *goto wrap_polish\n          *elseif (sound = \"heavy\") or (sound = \"artsy\")\n            *set demo %+25\n            The strings prove a perfect choice, providing a beautiful aural contrast to your sound and creating a feeling that could only be described as epic.\n            *goto wrap_polish\n          *else\n            *set demo %+15\n            The strings provide a beautiful aural addition to your sound, adding depth, character, and general awesomeness.\n            *goto wrap_polish\n        *selectable_if (money >= 750) #A gospel choir.\n          *achieve gospeldemo\n          *set money -750\n          An entire choir of gospel crooners is what your songs need, nay, demand.\n          *if (sound = \"heavy\") or ((sound = \"jammy\") or (sound = \"punk\"))\n            *set demo %+15\n            The choir is admittedly an odd choice for your sound, but you press ahead, despite Lucien's protestations. The soulful vocalists provide an exciting, if somewhat against-the-grain, addition.\n            *goto wrap_polish\n          *else\n            *set demo %+30\n            The soulful vocalists prove a perfect addition to your tracks, punctuating them with heavenly aural adornments.\n            *goto wrap_polish\n        *selectable_if (money >= 1500) #An orchestra.\n          *achieve orchestrademo\n          *set money -1500\n          *set demo %+35\n          For today's over-indulgent rock star, only the best will do. An entire philharmonic orchestra is exactly what your songs need, nay, demand. Their classically-trained aural additions provide depth, character, and general epicness to your tracks.\n          *goto wrap_polish\n    \n*label wrap_polish\n\nAfter adding your sweet new sounds, it's time at last to polish the tracks. The goal is to get rid of any hiccups and make the recording sound clean and professional.\n*if recording_time > 7\n  You have just ${recording_time} hours left. It's a tedious process, but by the end your demo sounds almost professional-ish.\n  *goto normal\n*else\n  Unfortunately, you don't have enough time left to polish your tracks! Lucien says he needs a bare minimum of eight more hours. What do you do?\n  *choice\n    *selectable_if ((money > 120) and (recording_time > 3)) #Add four more hours.\n      *set money -120\n      *set recording_time +4\n      *goto switch_album\n    *selectable_if ((money > 240)) #Add eight more hours.\n      *set money -240\n      *set recording_time +8\n      *goto switch_album\n    *selectable_if (money > 360) #Add 12 more hours.\n      *set money -360\n      *set recording_time +12\n      *goto switch_album\n    *selectable_if (money > 480) #Add 16 more hours.\n      *set money -480\n      *set recording_time +16\n      *goto switch_album\n    *selectable_if (money > 600) #Add 20 more hours.\n      *set money -600\n      *set recording_time +20\n      *goto switch_album\n    #Forget polishing; leave it how it is.\n      You, and your wallet, decide that a raw, unpolished sound is exactly what this music deserves.\n      *if sound = \"punk\"\n        *set demo %+30\n        Actually, Lucien agrees.\n        \n        \"It pains me not to take more of your money, but the ${sound} sound you have works better with all the grittiness left in. Good call.\"\n        *goto normal\n      *else\n        *set demo %-25\n        *goto normal\n\n*label switch_album\nIt's expensive and tedious, but the polishing really pays off. By the time you've used up all your hours, your album actually begins to sound like an album.\n*if recording_time \u003c 12\n    *goto normal\n*elseif recording_time \u003c 16\n    *set demo %+10\n    *goto normal\n*elseif recording_time \u003c 20\n    *set demo %+20\n    *goto normal\n*else\n    *set demo %+30\n    *goto normal\n          \n*label album_songs\n*if (recording_time > 24) or ((recording_time > 16) and (musicianship > 65))\n  *set demo %+30\n  *set recording_time -4\n  Even though the songs are brand-new, as soon as you practice them a of couple times, it feels like you've known them forever. You rush back to the studio with a burst of energy and lay down the tracks. You know the songs are good when you see Lucien bobbing his head and rocking out behind the soundboard when he thinks no one is watching.\n  \n  You spend the remaining time polishing all your tracks. It's long, tedious work, but it really pays off. By the time you've used up all your recording hours, your album actually has begun to resemble something you could call \"professional-ish.\"\n  *goto long \n*else\n  *set demo %+10\n  *set recording_time -6\n  While the new songs could probably use some more time, you rush back to the studio with a burst of energy. Even though they take a few tries to get right, you know the songs are good when you see Lucien bobbing his head and rocking out behind the soundboard when he thinks no one is watching.\n  *if recording_time > 11\n    \n    You spend the remaining time polishing your tracks. It's tedious work, but it really pays off. By the time you've used up all your recording hours, your demo actually has begun to resemble something you could call \"almost professional-ish.\"\n  \n    *goto switch_album2\n  *else\n    Unfortunately, you don't have enough time left to polish your tracks! Lucien says he needs a bare minimum of twelve more hours. What do you do?\n    *choice\n      *selectable_if ((money > 120) and (recording_time > 7)) #Add four more hours.\n        *set money -120\n        *set recording_time +4\n        *goto switch_album2\n      *selectable_if ((money > 240) and (recording_time > 3)) #Add eight more hours.\n        *set money -240\n        *set recording_time +8\n        *goto switch_album2\n      *selectable_if (money > 360) #Add 12 more hours.\n        *set money -360\n        *set recording_time +12\n        *goto switch_album2\n      *selectable_if (money > 480) #Add 16 more hours.\n        *set money -480\n        *set recording_time +16\n        *goto switch_album\n      *selectable_if (money > 600) #Add 20 more hours.\n        *set money -600\n        *set recording_time +20\n        *goto switch_album2\n      #Forget polishing; leave it how it is.\n        You, and your wallet, decide that a raw, unpolished sound is exactly what this music deserves.\n        *if sound = \"punk\"\n          *set demo %+30\n          Actually, Lucien agrees.\n        \n          \"It pains me not to take more of your money, but the ${sound} sound you have works better with all the grittiness left in. Good call.\"\n          *goto long\n        *else\n          *set demo %-25\n          *goto long\n\n*label switch_album2\nIt's expensive and tedious, but the polishing really pays off. \n*if recording_time \u003c 16\n    *goto long\n*elseif recording_time \u003c 20\n    *set demo %+10\n    *goto long\n*elseif recording_time \u003c 24\n    *set demo %+20\n    *goto long\n*else\n    *set demo %+30\n    *goto long\n\n*label short\n\nYou've just finished your first album! Yes, it's only four tracks long,\n*if demo > 60\n  *set demo_style \"short and sweet\"\n  but those four tracks are glorious.\n  *goto good_end\n*elseif demo \u003c 35\n  *set demo_style \"short and sour\"\n  and the quality could be better. But, still, it's an album! [i]Your[/i] album!\n  *goto bad\n*else\n  *set demo_style \"short\"\n  but it's a great first step.\n  *goto ok\n\n*label normal\n\nYou've just finished your first album! Yes, it's only a six-track demo, \n*if demo > 60\n  *set demo_style \"excellent EP\" \n  but those six tracks are glorious.\n  *goto good_end \n*elseif demo \u003c 35\n  *set demo_style \"demo dud\"\n  and the quality could be better. But, still, it's an album! [i]Your[/] album!\n  *goto bad\n*else\n  *set demo_style \"demo\"\n  but it's a great first step.\n  *goto ok\n  \n*label long\nYou've just finished your first album! A real, honest-to-god, album with [i]your[/i] music…it almost doesn't seem real.\n*if demo > 60\n  *set demo_style \"amazing album\"\n  *achieve amazingalbum\n  *goto good_end\n*else\n  *set demo_style \"album\"\n  *goto good_end\n\n*label good_end\nAll of your hard work paid off to create the perfect realization of your music.\n\nBefore you leave, Lucien hands you a copy of the final master recording. \"I'm glad I got a chance to work with you all, before you become famous. I don't think it will take too long. Unfortunately, I've seen what the industry can do to talented kids like you. It chews you up and spits you out as a hollow corporate shill. Just stick to your own path, and you'll be all right. Oh, and rock on!\"\n*goto end\n\n*label ok\nBefore you leave, Lucien hands you a copy of the final master recording. \"I'm glad I got a chance to work with you. I think you have a bright future. Just always remember to stick to your own path, and you'll be all right. Oh, and rock on!\"\n*goto end\n\n*label bad\nBefore you leave, Lucien hands you a copy of the final master recording. \"Well, it's been something. Remember, first albums are hard; it's what you do afterward that counts. Your band has potential, you just need to figure out how to bring it out. Oh, and rock on!\"\n*goto end\n\n*label end\n*set recording_time 0\n*if demo_first = true\n  *if fran = true\n  \n    Finally, leaving the studio after what feels like months, you come home to an answering machine full of messages, all from Fran.\n   \n    \"Kiddo, I hope you had a relaxing time in the studio, because it's time to hit the road. Tell all your bandmates to pack their stuff; you leave first thing tomorrow morning!\"\n    *page_break\n    *goto_scene road\n  *else\n    \n    After working on the album for what feels like months, you could not be more excited to get back to playing live. You tell the band to pack up the van and get ready to hit the road right away…as soon as you've had a few days to sleep, that is.\n    *page_break\n    *goto_scene road\n*else\n\n  Excited for a few days of well-earned rest, you receive a call asking you to be part of a local music festival near ${hometown}. It seems the organizer is a longtime fan of yours, back from your days gigging at Casaba's. There will be thousands of people there! \n  \n  The only problem? It's this weekend. It seems there really is no rest for the weary rocker. You get home and immediately start preparing for the big show.\n  *page_break\n  *goto_scene joey\n\n*label slave\n*if studio_slave = false\n  *return\n*else\n  *set cohesion %-10\n  *set health %-15\n\n  After the long and strenuous recording day, the entire band must stick around to put in a couple of hours' work at the studio. It's the last thing anyone wants to do, but it's the only way to make this album a reality. Just think what a great story this will make in interviews.\n  *page_break\n  *return\n\n*label uno\n*if uno\n  *set cohesion %-15\n  *set musicianship %+10\n  \n  While the rest of the band digs the new tunes, Uno has some \"creative additions\" to make. As usual, this involves his adding some more guitar parts for him to shred. The additions actually sound pretty good, but even if they didn't, it's clear that he wasn't really asking for permission. You hope this doesn't become a recurring problem down the line.\n  *return\n*else\n  *return ", "endings": "*temp flag\n*set flag false\n[i]How I wish, how I wish you were here[/i]\n*line_break\n[i]We're just two lost souls swimming in a fish bowl, year after year[/i]\n*line_break\n[i]Running over the same old ground[/i]\n*line_break\n[i]What have we found?[/i]\n*line_break\n[i]The same old fears[/i]\n*line_break\n[i]Wish you were here[/i]\n—Pink Floyd\n*page_break\n*goto warp\n\n*label warp\n*if warp_solo = true\n  *goto warp_solo\n*elseif warp_indie = true\n  You forge ahead on your new path as an independent band. \n  *goto warp_indie\n*else\n  *goto start\n  \n*label start\n*if breakup\n  *set casperquit true\n  *label warp_solo\n  Having officially cut all ties with your former band, you embark on your new solo career.\n  *if lay = true\n    Actually, it's more like a duo career. ${layla} takes over on the ${casper_instrument}, and the two of you hit the stage together. You play mostly ${band_name} tunes in the beginning, but soon your repertoire grows to include new songs written by you and ${layla}. \n    *goto layl\n  *elseif (instrument = \"drums\") or (instrument = \"bass\") \n    As it turns out, perhaps unsurprisingly, audiences aren't lining up to see a solo ${instrument_guitarist}. You decide to learn the ${casper_instrument}, even spending a few months practicing alone.   \n    *if musicianship >= 68\n      *set instrument \"${casper_instrument}\"\n      Happily, you find that your musical virtuosity wasn't confined to just one instrument. Pretty soon, you're hitting the stage once more, now with your new ${instrument}.\n      *goto solo\n    *else\n      But it's no use. It seems you were just born to play the ${instrument} and only the ${instrument}. \n      *goto plan\n  *else\n    *goto solo\n*elseif sound = \"punk\"\n  *goto punk\n*else\n  *goto band\n\n*label layl\nYou work your way back through the familiar clubs and bars, attracting some old fans and picking up new ones. Sure, they represent only a small fraction of the audience you could have had if you had stuck with the band, but it's enough to keep you happy, right?\n*choice\n  *selectable_if (reputation \u003c= 55) #Yes. I finally have everything I want.\n    You have become the rarest of all creatures: the well-adjusted, happily married rock star. That's right, you and ${layla} were married in a small, but rocking, ceremony with a few of your closest musician friends. \n    \n    *label family_band\n    *achieve familylegacy\n    After years of steady touring, you finally settle down and start a family, endeavoring to work as a local session musician to allow more time with the kiddies. But for you and ${layla}, settling down looks a little different than it does for normal people. As soon as your kids are old enough to play a few notes on your ${instrument}, you realize the path fate has chosen for you: Family band leader!\n    \n    Before long, you and ${layla} have produced a full-sized brood of band members. You're like The Partridges and The Osmonds before you, but even cooler this time around. You load up the family and hit the road, building interest and audiences wherever you go. Suddenly, becoming a famous musician doesn't seem so hard anymore. Now your only concerns are how to make the five-year-old's voice harmonize with yours, and whether ${layla} can change diapers during set break.\n    \n    Maybe this isn't the path you dreamed of many years ago, but you can't imagine a life that could make you any happier. And what's more rock-and-roll than that?\n    *goto ending\n  #Sort of. I'm happy with ${layla}, but I wish there were more.\n    One night, as you and ${layla} finish up a string of small theater shows, a promoter approaches you backstage. He tells you that he's a major fan of ${band_name} and always believed you were destined for stardom. He implores you to leave ${layla} and work with him to build a new solo career, with the promise of finally achieving your dreams. What do you say?\n    *choice\n      #Yes! When do we start?\n        You let ${layla} down easy and quickly, then set out to begin your solo career.\n        *goto solo\n      #No, thank you.\n        Sure, there will always be that desire for more, but you would never abandon ${layla}. You decide to stick it out and hope for the best.\n        *goto family_band\n      #I'm ready for a new career, but I don't want to go solo. I want to start a new band.\n        You decide to form a brand new band, this time doing it the right way. You will build on the mistakes of the past and let nothing get in your way. You let ${layla} down easy and quickly, then set out to begin your new career.\n        \n        *gosub snarky  \n        \n        Yet, while your last band at least took some time before imploding, this one never even makes it off the runway. The promoter stops taking your calls, and your attempts at reconciling with Layla fall flat.\n        *goto hobo\n  #No. I'm a rock star, and this is not a rock-star life.\n    As much as you love ${layla}, you ultimately know that you have to stay loyal to your first and only love. You let ${sexpref_him} down easy, then set out to begin your new solo career.\n    *goto solo\n\n*label solo\n\n*if buzz >= 68\n  *achieve sololegacy\n  If you had any concerns about your new solo career, they are quickly alleviated when you see the stunning success of your debut album. With ${title4} and ${title1} all over the radio, fans are clamoring to catch your live performances. Soon, you are moving out of clubs and into larger and larger venues, using a rotating band of available professional performers to back you up at each stop. It's exactly what you'd always envisioned, even if it took a strange route to get there.\n  \n  *gosub family\n  \n  One night, you find yourself back in ${hometown} for a stop on your new tour.\n  *gosub show\n  \n  You continue moving forward. The highlights of the next few years include: A hit solo album, a Grammy, an acclaimed cameo in an indie film where you get to play \"against type\", a respectable No. 17 on People's \"100 Hottest\" list, and a sellout tour. You thrive as a solo artist, harnessing the creative and personal freedom to take your music to new heights. Clearly, you were just never meant to be in a band.  \n  \n  Still, there are times when you miss the camaraderie you once knew, when the stage feels as wide and lonely as the sea. You sometimes wish you had others to share the highs and lows with. \n  \n  You always make sure to keep up with your former bandmates. None are nearly as famous as you, but they all have achieved a great deal in their careers. Every year or so, the press begins to rumble about the possibility of a ${band_name} reunion tour. Maybe one day it will be time to give the fans what they want. Maybe one day.\n  \n  For now, there's another packed house with an empty stage for you to rock.\n  *goto ending \n*else\n  *label solo_bad\n  Your solo career begins promisingly, with a number of sold-out shows, buoyed by the strength of ${title4}, your hit radio single. Soon, however, the audiences begin to dwindle. It seems there's a good reason most bands don't break up just before their first albums drop. While the royalties keep you afloat for a few months, eventually you're forced to get off the road and accept reality.\n  *goto plan\n  \n*label band\n*if indie = true\n  *goto indie\n*else\n  *goto band2\n\n*label indie\nYou forge ahead on your new path as an independent band.  \n*if contract != \"indie\"\n   *if (buzz >=70) or (((buzz >= 55) and (((sound = \"jammy\") or (sound = \"folk\")) or (sound = \"artsy\"))) or ((buzz >= 50) and (demo_style = \"amazing album\")))\n     But you soon find that separating yourself from your former life is even more difficult than you imagined. Joey does not take kindly to artists breaking contracts with him, and he makes sure to take everything away from you: The money; the music videos; the radio promotions; and even the album.   \n\n     But what Joey cannot take away from you are the fans.\n     *goto good_indie\n   *else\n     *goto bad_indie\n*else\n  *label warp_indie\n  *if ((buzz >=63) or ((buzz >= 55) and (((sound = \"jammy\") or (sound = \"folk\")) or (sound = \"artsy\")))) or ((buzz >= 50) and (demo_style = \"amazing album\"))\n    You are amazed at the loyalty and support of your fans.\n    *label good_indie\n    *achieve indielegacy\n    \n    Sure, they only represent a small fraction of the audience you could have had if you had stuck with the record company, but it's more than enough to keep you selling out clubs and even theaters on a regular basis. \n    \n    In many ways, it's the best possible outcome: Getting to live the rock-and-roll lifestyle on your own terms, with less money and fame but a lot more freedom.\n    \n    *gosub family\n    \n    *goto jammy\n    \n    *label 1night\n    One night, you find yourself back in ${hometown} for the largest show of your career. You've managed to book a headlining slot at the largest theater in town, with nearly a thousand seats sold out.\n    \n    *gosub show\n\n    While your band keeps moving forward to new towns, new tours, new albums and new levels of success, you try always to keep yourself grounded in the feeling of that picture of you and Casper in the early days that you still carry with you. \n    \n    After many years of toiling in the shadows of the \"major label bands,\" one day a strange new technology appears called \"online music.\" People are talking about digitally downloading music, sharing songs with friends, and even replacing portable CD players with MP3 players…whatever those are. Along with the rise of digital music comes another trend that's said to threaten the entire music industry: \"Digital piracy.\" \n    \n    What's your take on all of this?\n    *choice\n      #I'm a musician. I make the music; other people worry about selling it.\n        True that. \n        *label true_that\n        And you get to continue making music for many years, as a beloved if somewhat under-appreciated band standing at the vanguard of what will soon be called \"Indie Rock.\" And as more and more bands emancipate themselves from the golden shackles of their the record labels, you will be seen as more influential than you ever anticipated.\n        *goto path_indie \n      #I'm going to take a stand. Stealing is wrong. \n        A high-profile group of artists has gotten together to stand up against music-piracy sites like Napster. Metallica, The Red Hot Chili Peppers, Creed…and you. You don't receive quite the publicity as those groups for your role in the campaign, but the record industry appreciates your efforts. \n        \n        One day, a record-company executive calls you up out of the blue. He says that \"he likes how you play ball\" and wants to offer you a contract. The money is not fantastic, but it offers a lot of freedom for your creative decision-making. What do you say?\n        *label industry_chance\n        *choice\n          #Yes, let's do it.\n            You sign the contract and immediately get to work on polishing your official debut album. Before you know it, the release date arrives.\n            *goto star\n          #No, we're good.\n            You've come this far without the industry's help, and you see no need for it now. You politely decline the offer.\n            \n            *goto true_that\n      #I'm interested. This whole internet thing could be a great way to connect with my fans.\n        Where others see crisis, you see opportunity. You set up a website and begin uploading free songs, tour dates, and fan-club newsletters. As your online presence grows, so too does your fanbase.  \n\n        One day, a record company executive calls you up out of the blue. He says that \"he likes your cutting-edge methods\" and wants to offer you a contract. What do you say?\n        *goto industry_chance\n  *else\n    *goto bad_indie\n          \n*label path_indie  \n\nSo even though your path means you will never reach the status of rock legend, you know that you've truly accomplished the dream of that thirteen-year-old ${gender_boy}: To play your music, for yourself, on your terms. And what could be more rock-and-roll than that?  \n*goto ending\n    \n*label bad_indie\nBut you soon find advancing your career without record-industry support to be extremely difficult. Radio play, interviews, venues—they're all under the thumb of the industry gatekeepers. Without a contract, or an already-massive fan base, in place, you find it hard to gain any traction. Even worse, you have to watch way- less-talented bands find more success than you, while your money and fans keep dwindling.\n    \nWhat do you do?\n*choice\n  #Go crawling back to Joey and ask for a deal.\n    You plead for Joey's mercy, promising him that you will be a faithful client, agreeable to any of his demands.\n    *if buzz >= 62\n\n      \"Anything?\" he asks with a smirk.\n          \n      Within minutes, you have signed a brand-new contract. You're so excited that you hardly even read it. There's a bunch of clauses about promotional demands and advertising, but you're not worried. So what if the cost of fame is having to sacrifice a bit of your morals?\n       \n      *goto commercial\n    *else\n      Unfortunately, your plea falls upon deaf ears. Joey, unlike life, does not offer second chances.\n      *goto indie_forge\n  #Go try to make a deal with another executive.\n    Unfortunately, it seems record executives are less interested in competing with one another than they are in protecting their country-club memberships and tee times. Basically, you've been blacklisted. No one wants to sign a difficult band, whether that label is fair or not.\n        \n    *goto indie_forge\n  #Forge ahead as an indie band.\n    *label indie_forge\n    You try to hold out as long as you can in the indie world, but there just aren't enough fans showing up to make the band financially viable. It's not long before the well, along with your bandmates' enthusiasm, has completely dried up. All of them have accepted reality and moved on, leaving you to face reality as well, finally.\n    *goto plan \n         \n*label band2\n*if commercial >= 65\n  *label commercial\n  *gosub stardom\n  Almost as quickly as success arrives, so too does adversity. For every article hyping your band and the new album, there are now two more mocking you and branding you as sell-outs. Joey, for his part, doesn't seem to mind. He just wants the promotional money to keep rolling in, and he doesn't care about its origin. \n  \n  Before long, your face can be seen all over billboards and magazine ads hocking everything from liquor and cigarettes to diapers and sanitary napkins. Over the next few years, you: Star in a Korean shoe commercial; play a private show for an Arab sheik; perform ${title1} at the CLIO advertising awards; model for the Marlboro catalogue; and book a series of corporate gigs around the country.\n  \n  With your bank account swelling and your reputation dwindling, it's time to choose the next chapter of your career.\n  \n  What's the plan?\n  *choice\n    #Release another album to regain respect and reinvigorate my career.\n      *if buzz > 63\n        You pour your heart and soul into a new album, hoping it will be the artistic milestone of your career . Finally, when the big release day arrives, \n        *goto scndalbum\n      *else  \n        Your album comes out to a deafening roar of indifference. It's seems your brief time in the limelight has passed, and no one is interested in your comeback. It's a shame, too, because critics consider this your most impressive work yet. [i]Rolling Stone[/i] considers it \"the undiscovered gem of the year.\" And while the passage of time will help solidify its acclaim, for now it will remain mostly undiscovered. \n        *goto lost_all\n    *if (reputation >= 68) #Throw yourself into a world of sex, drugs and, sometimes, rock and roll.\n        It's the life you've always dreamed of. \n        *goto star2\n    #Embark on a solo career.\n      This whole ${band_name} project is beginning to feel a bit stale. It's time to focus on what's truly important—you.\n      \n      *goto warp_solo\n\n*else\n  *goto star  \n\n*label lost_all\n*achieve sellout\nJoey can see the writing on the wall. He squeezes as many final promotions out of you as he can, then suddenly stops returning your calls. The rest of the band, trying as best they can to separate themselves from the dreaded sell-out label, cut all ties with you. Just one year after your album's debut, at a time that was supposed to be the realization of all your dreams, you find that you've somehow lost everything that you've been working toward all these years.\n\nWhat's your next move?\n*choice\n  #Form a new band and start over.\n    *if buzz > 63\n      *goto try_over\n    *else\n      *gosub snarky\n      No one is interested in your attempted comeback; the only audience that would come see you just wants to hear the old ${band_name} songs.\n      *if reputation >= 65\n        It takes a heavy toll, and rather than reflect on the trajectory of your career, you instead find yourself turning back to your old comforts.\n        *goto death_switch\n      *else\n        Rather than suffer that indignity, you decide to hang it up and call it a career.\n        *goto quit       \n  #Quit music.\n    *label quit\n    *if reputation >= 65\n        Your abundance of promotion money means you can easily settle into an early retirement. Unfortunately, it also means you find yourself with all the time in the world to indulge in all your old comforts. \n        *goto death\n    *else\n        Your abundance of promotion money means you can easily settle into an early and comfortable retirement. You take an extreme interest in golf, fishing, and traveling. \n        *goto world\n\n*label star\n*if ((warp_solo = true) or (warp_indie = true))\n  *goto starr\n*else\n  *gosub stardom\n  *goto starr\n*label starr\n*set money +3000000\nFinally, when the big day arrives,\n*if buzz >= 70\n  your album debuts at number one on the charts!\n  *goto star2\n*else\n  *label scndalbum\n  your album debuts at number two on the charts! You come in just behind The Marvins' debut album, \"He's the Martian, I'm the Spaceman.\" \n  *goto star2\n\n*label star2\n*if reputation >= 68\n  Unfortunately, this kind of success is about the worst thing that ever could have happened to you. Success means money, and money for you means more drugs and alcohol. \n\n  *label death\n  \n  *achieve deathlegacy\n  While you were able to keep your habit somewhat in check before, you now find yourself without anyone or anything stopping you from over-indulging. What began as a partying lifestyle has transformed overnight to a full-blown addiction.\n  \n  One morning, you are found dead in your house from an overdose.\n  *if lay \n    You were slumped over your ${instrument}, presumably having passed out while playing. ${layla}, passed out just a few feet away from you, was too drunk even to notice. All things considered, it's not a terrible way to go out.\n    *goto dead2\n  *elseif (instrument = \"drums\") or (instrument = \"keyboard\")\n    You were slumped over your ${instrument}, presumably having passed out while playing. All things considered, it's not a terrible way to go out.\n    *goto dead2\n  *else\n    You passed out on top of your ${instrument}, presumably while playing. All things considered, it's not a terrible way to go out.\n    *goto dead2\n*else\n  *goto star3  \n\n*label star3\n*achieve legendlegacy\n*label star3.5\nThe album's success transforms you overnight. You are no longer just a musician or even a rock star; you are a celebrity. And celebrity means bigger everything—bigger house, bigger car, and bigger parties.\n\n*gosub layla\n\nYou forge ahead, focusing on your next album and tour. And while you could do without some of the sillier aspects of celebrity, you're still in love with being a rock star. Getting to play your music for millions of people all around the world—what could be greater than that? \n\n*gosub family\n\nMeanwhile, you are back on tour, with a massive show coming up at the ${hometown} Centrum, the sports stadium outside of town. It's your first stadium show, and it signifies that you've truly arrived—or at least reached the same level as the minor-league hockey team that calls the stadium its home.\n\n*gosub show\n\nWhile your band keeps moving forward to new towns, new tours, new albums, and new levels of success, you try always to keep yourself grounded in the feeling of that picture of you and Casper in the early days that you still carry around with you. So even as you reach the final stage of fulfilling your dream, moving from rock star to rock legend, you will always remain inside the same young ${gender_boy} who loves to make music. And nothing could be more rock-and-roll than that.\n*goto ending\n\n*label plan\nWhat's your plan now?\n*choice\n  #I'll quit music for good. Part of living the dream is knowing when to wake up. \n    *label end_nomusic\n    *achieve insurancelegacy\n    Just because your music career is over doesn't mean your life is. After some time living at home, you manage to secure a comfortable job in ${hometown} as an insurance adjuster. It's a comfortable life, if not quite as exciting as your old one. \n    \n    Still, you will always have your memories…and your once-a-month standing set at Casbaba's, where your new band of fellow insurance workers, The Reactuaries, plays to a small but respectful crowd. Eventually, the crowd even comes to include your new family. \n\n    As you play your short set, tastefully curated for all ages of course, and gaze out over the dozen or so audience members, including your loving ${sexpref_wife} and newborn child, you feel a strange sensation come out of the sky and strike you like lightning. Should you do it?\n    *fake_choice\n      #Do what?\n      #You're not thinking of…are you?\n      #I would reconsider.\n      #Dear god, no!\n\n    Too late! Before anyone knows what's happening, you launch your body off of the stage and into the seated \"crowd,\" screaming the word \"[b]Rock[/b]!!!\" as you go straight for your manager's table. Like many of the less-than-responsible decisions in your life, this one will be branded as legendary and discussed in hushed reverence by some and will be viewed as incredibly bone-headed and destructive by others. But in the end, it just goes to show that while you can take the rock star out of rock, you can also fling ${gender_him} off the stage and into ${gender_his} boss's nachos. Now, who's ready for an encore?\n    *goto ending\n  #I'll continue to pursue a career in music, just not as a band leader.\n    *if reputation >= 63\n      Unfortunately, your reputation has preceded you once again. No one wants a ${instrument_guitarist} with a penchant for getting blackout drunk and throwing up on stage. After a string of rejections, you finally get the message: It's time to hang it up.\n      *goto end_nomusic\n    *else\n      *achieve prolegacy\n      You start as an audio technician at Bubonic Sonic, working long hours for little money.\n      *gosub slave\n      It takes some time, but you finally transition to full-time session musician, gigging for all sorts of bands in the studio. Before long, you're the most sought-after ${instrument_guitarist} in the studio.\n      \n      It's clear that the diminutive confines of Bubonic Sonic can't hold you for too much longer. You soon gain renown as a consummate music professional, bouncing around to different session and backup gigs. In just a few years' time, you: Play in an off-broadway backing band; spend a month in Detroit to work on The White Stripes' debut album; gig with a circus group in Marseille; and work with all the greatest musicians in the greater ${hometown} area.\n      \n      Maybe it's not the life you dreamed of so long ago, but you wouldn't trade it for for anything. You're a professional musician with a steady job, an active lifestyle, and enough stability to think about raising a family one day. And what could be more rock-and-roll than that?      \n      \n      *goto world\n  #I'll form a new band and try all over again.\n    *if buzz > 63\n      *label try_over\n      *achieve comebacklegacy\n      Don't call it a comeback; call it a new chapter. Just because your first attempt at rock stardom failed, doesn't mean you're ready to give up on your dream. With your reputation as a world-class ${instrument_guitarist}, it's relatively easy to form a new band from all your new musician friends. \n      \n      Learning from the mistakes of the past, your new band explodes onto the scene with purpose and aplomb. This time the music just pours out of you, with little of the prior distractions. Before long, you're putting the finishing touches on your new \"first\" album. With the proper label support in place, this time around, it's a straight shot to the top.\n          \n      *goto star3.5  \n    *else\n      *gosub snarky\n      \n      You spend the next few years learning this lesson again and again, as your boundless persistence only yields a string of failed bands. Flat broke, and way past your expiration date, you finally decide to call it quits as a musician.\n      *goto end_nomusic\n\n*label layla\n*if lay = true\n  Actually, ${layla} may be the one who's benefited the most from your celebrity. $!{sexpref_he}'s used ${sexpref_his} newfound fame as your ${sexpref_boy}friend to launch ${sexpref_his} newest venture, a high-end fashion label. $!{sexpref_his} desire for fame often proves distracting, but it certainly doesn't hurt your own public image. It's time to figure out your future with ${layla}. What's your plan?\n  *fake_choice\n    #Marry ${sexpref_him}.\n      Looks like you dodged a bullet, because before you even get the chance,\n    #Keep dating ${sexpref_him}. I'll worry about marriage later.\n      A very sensible plan, which lasts for about two more weeks, until\n    #Break up with ${sexpref_him}.\n      Before you get the chance,\n  you come home to find a note from ${layla} explaining that ${sexpref_he} has left you for a Mexican soap opera star. It seems ${sexpref_he} has even more money, with a bigger mansion and better publicity. The news completely crushes you—for about a week. You would be more upset except for, you know, all the groupies and money and everything.\n*return \n\n*label family\n*if flag = true\n  *return\n*else\n  *set flag true\n  Still, you're often haunted by the knowledge that there's one dream you can never achieve: The support of your family. It's been years since \n  *if (casperQuit) or (cohesion \u003c 15) \n    you've seen your parents, and Casper still refuses to speak to you since your \"creative differences\" ruined your musical-and-familial—relationship. It pains you to know they never took any pleasure in your success.\n    *return\n  *else\n    you and Casper have seen your parents, and it pains both of you to think how they never supported you or took pleasure in your success.\n    *return\n  \n*label jammy\n*if sound != \"jammy\"\n  *goto 1night\n*else\n  *achieve jamlegacy\n  Still, you've been grateful to have a family among the fans and other musicians within the jam-band scene. Much like the Grateful Dead before you, you've been steadily building a following of endlessly loyal fans, or ${band_name}heads as they are often labeled. Many of them travel with you from show to show, and some of them have even started hanging with you backstage. They've become as much a part of your life as you are of theirs.\n  \n  Thanks to your ever-supportive fanbase, you've been able to build a career on your terms. In just a few short years, you: Play an overnight festival at a friend's farm upstate; tour local colleges, earning legions of new fans; play with myriad likeminded musicians in exciting collaborations; and begin pulling songs together for a new album.\n  \n  Speaking of that album, what's the plan?\n  *fake_choice\n    #Breakthrough commercial success.\n      Is the public ready for a mainstream jam band? More importantly, are you ready for endless questions about being \"the next Grateful Dead\"? Looks like you'll either find out, or flop trying.\n    #Mind-bending psychedelic rock opera.\n      You and your bandmates spend three weeks in the Mojave desert with nothing but your instruments, a four-track recorder, and some of the finest local produce. Once you've returned, you carry with you a recording of either the most brilliant narrative rock odyssey ever laid to tape, or an unintelligible mess of disjointed noises and ideas. You plan to figure it out after taking a long nap.\n    #A collection of songs from live performances.\n      Studio albums are fine, but it's the high-wire, improvisational, live performances that the fans love and crave. In fact, they've already taken to recording your shows and trading them amongst themselves on a thriving black market. You don't really mind; in fact, you suspect it's helping attract such a loyal audience. But how will those same fans feel about paying record-store prices for something they may already have? Only time will tell.\n    #Just a regular album.  \n      Of course, for you a regular album is far from regular. It requires digging through hours of improvisational highlights, discovering the buried gems and inspiration sown throughout. Though many of your fans favor live performances to studio albums, you love the process of creating and perfecting new material. But how will those fans feel about paying standard record-store prices when many of them freely collect and trade recordings of your shows already? Only time will tell.\n  *comment endif\n      \n  As you plow boldly forward into the future with your traveling family of bandmates and fans, you have no idea where this whole \"jam-band\" trail will lead. And for good reason: You're the one creating it! But you do know, no matter what others try to label you—hippie, fringe act, over-indulgent, drug-band, etc.—there will only ever be one label that accurately describes what you are: Rock star.\n  *goto ending\n\n*label show\nIt's one of these shows where everything seems to be going wrong. As you try to focus your energy, you take out a picture of you and Casper from your younger years, when you used to play together all day long, and the only thing in the world that mattered was the music, pure and simple. It was the happiest time of your life, and it feels so far away now.\n\nYou struggle on stage that night, just going through the motions of the performance, unable to rid yourself of the thought that you've lost that pure energy you once had. \nThen, looking down into the audience,\n*if casperQuit or breakup\n  you see a familiar face looking up at you, singing along to all the words. It's Casper! As soon as the song is over, you ask him up on stage to play a few of your old numbers together. \n  \n  Playing together again, it seems as if you've never been apart. And suddenly those days of your youth don't seem so distant after all, and that energy between you is so real you can feel it. Backstage, after the show, you and Casper swear never to separate from each other again. And you never do.\n  *page_break\n  *return\n*else\n  you see familiar faces looking up at you from the front. It's your parents! You and Casper look at each other in disbelief. \n  \n  After the show is over, you meet up backstage. While they still don't \"understand\" your music, they say, they are so proud of your success that they had to come see it in person. They apologize for not keeping in touch, and they promise to be there for you from now on, if only to make sure you stay out of trouble. In return, your mom makes you promise to incorporate the ${band_instrument} into one of your new songs.\n  *page_break\n  *return\n  \n*label stardom\nThat [i]Tonight Show[/i] appearance proved to be the launching pad for your band's ascension to true rock stardom. The buzz created by your appearance fed right into the promotion for the upcoming album, which in turn bolstered the radio and music-video play of ${title4}.\n\n*return\n\n*label snarky\nYou form a new band and hit the town again. After working your way up through the local bars, you catch your first big break at the annual battle of the bands when a fortuitous encounter with a powerful record executive…sound familiar? \n    \nUnlike the SATs, in rock and roll you only get one chance.\n*return\n\n*label dead2\nWhile no one knows for sure, Casper and your former bandmates like to believe you were playing ${title1} just one last time before you passed. It was always your favorite composition. \n\nCasper says as much at your funeral, where he introduces a new solo song that he wrote about your life called \"A Rocket Ship Named ${name}.\" If you were around, you probably would have considered it cheesy, but it actually turns into something of a hit and manages to spark Casper's successful solo career. \n\nLike so many of your musical heroes, you were just twenty-seven years old when you passed away. And, like them, though you could have done so much more, the music you made in your brief life will continue to live on forever, inspiring future generations of young musicians to chase their own dreams of rock stardom.\n*goto ending\n\n*label hobo\n*achieve ramblinglegacy\nYour whole life, you've only ever had two friends on whom you could always rely: Your ${instrument} and the open road. You decide it's time to reconnect with these old pals. Leaving all else behind, you purchase a one-way ticket on a southbound train with no long-term plans, or even short-term ones, for that matter.\n\nAs you journey south toward parts unknown, the excitement of the unknown bubbles up inside you for the first time in…forever. You realize that you were never meant to have a normal life, with normal things like jobs, family, and responsibility. No, you were born a rambling ${gender_man}, a rolling stone, a traveling troubadour. It might sound like a cliche, but it's very real for you.\n\nYour journeys include: Gigging in Mexican bars; working an oil-rig in Alaska (as the accounts manager, but still); leading a transcontinental-cruise-ship band; getting into trouble with the Yakuza over a ${sexpref_boy}; losing all your money on \"green\" in Macao; and traveling the rails as a hobo musician. And that was just the first month!\n\nYour life as a rambling musician becomes legendary, even inspiring a hit song \"The Ballad of Hobo ${name}.\" You heard it on the radio once and started laughing to yourself but refused to tell any of your compatriots what you thought was so funny. \n\nAnd that's right about where your story ends. If anyone wants to find you today, all they have to do is hop on the right cargo tanker headed between Duluth and Tijuana, and so long as they remember to drop a dollar in your cap, they'll be treated to the most soulful rendition of ${title1} that's ever been played. Till then, you just keep rambling on.\n*goto ending\n\n*label death_switch\nIt's a fast slide back into the hazy world of booze, pills, druggies, and hangers-on. Everyone you used to know has abandoned you. Your old life feels like an illusion, like a dream someone else had. Days bleed into each other and become weeks, and then months, and before you know it five years have passed, and you can barely remember how it happened. \n\nOne day, a group of old friends and family members surprises you with an intervention. $!{band_member1} and Casper even show up to join in on the fun! They go around and tell you how your addictions have affected their lives, and they plead with you to go to rehab. How do you respond?\n\n*choice\n  #Thank you; I need help.\n    *achieve rehab\n    You check yourself into one of the finest rehab centers money can buy. Over the course of a month, you find many things: Sobriety; yoga; inner peace; a new octave in your vocal range; a $100 check from Casaba's you forgot to cash; and yourself. When you step out of rehab on your final day, you remind yourself that you are stepping into the first day of the rest of your life.\n    *goto plan\n  #You're trying to make me go to rehab? I say no, no, no.\n    Rehab? What fun would that be? You show these friends of yours the back door. They weren't there for you when it counted, and you don't need them now.\n    *goto death\n  #I do need help, but not from the likes of you. \n    You show these friends of yours the back door. They weren't there for you when it counted, and you don't need them now. As soon as they leave, you pack up all your belongings, your important belongings, anyway, and hit the road, vowing never to return.\n    *goto hobo \n    \n*label world\nMaybe it's not the life you dreamed of so long ago, but you wouldn't trade it for for anything. At least, that's what you tell yourself every night when you close your eyes and find that fleeting glimpse of rock stardom beginning to pull at you once again, carrying you back to a world of blazing music, screaming fans, endless parties, worshipful groupies, excitement, creative fulfillment, pure joy—\n    \n\"I wouldn't trade this for the world, I wouldn't trade this for the world, I wouldn't trade this for the world….\"\n*goto ending\n\n*label punk\n*achieve punklegacy\nCelebrity is a tough road to travel as a punk band. Even before your first music video, many of your authentic fans jumped ship, branding you a sell-out. But for every fan you've lost, there have been hundreds gained since ${title4} became the hit song of the year.\n\nThe media, in their zeal for labeling things, has labeled your sound \"New Wave Punk\" or even \"Pop Punk.\" You're said to be the leader of the new generation that looks to bring punk to the mainstream. While many critics regard your music as less substantial than that of the first wave punk bands, you could give a rat's ass what they think. You've got a multi-million-dollar band to lead. \n\nOver the next few years, you: Embark on a massive stadium tour of the United States; perfect the art of moshing and introduce it to a new generation of fans; tour internationally to sell-out crowds all over the world; and begin contemplating a new album. As your fans eagerly await your next move, what do you want to do?\n\n*choice\n  #Collaborate with other musicians on an album of punk covers of popular hit songs.\n    *set buzz %+10\n    *goto punk_end\n  #Open a chain of punk-themed restaurants/venues called \"The Rat Hole,\" dedicated to cultivating, and monetizing, the punk ethos.\n    *set commercial %+20\n    *goto punk_end\n  #Write and perform the world's first punk-rock opera, with eventual plans to convert it into a Broadway musical.\n    *set style %+10\n    *set stage_presence %+10\n    *goto punk_end\n  #Record just a regular album. I don't want celebrity to change me.\n    *set commercial %-10\n    *goto punk_end\n    \n*label punk_end\nYou embark on your new project with excitement—and a little bit of anxiety. How long can this roller coaster keep going? Does anyone care about an aging punker? How long before you become the establishment and another band comes in to take your place?\n\nLike a stage diver launching headfirst into the crowd, there's just no way to know what the future will hold. You could easily find yourself crashing face-first into the floor. But despite your worries, you know there's only one approach to take, the same approach that has served you well your entire career: Just close your eyes and jump.\n*goto ending\n\n*label slave\nThankfully, your prior experience working at the studio allows you to move swiftly through the ranks.\n*return  \n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Choice of the Rock Star.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "fame": "*temp laylaOnStage \n*set laylaOnStage false\n*temp casperonstage \n*set casperonstage false\n\n*if sexpref = \"male\"\n  *set layla \"Marq\"\n  *goto fran\n*else\n  *set layla \"Layla\"\n  *goto fran\n\n*label fran  \n*if fran = true\n  *set fran \"Fran\"\n  *goto start\n*else\n  *set fran \"your manager\"\n  *goto start  \n  \n*label start\n[i]Fame, what you like is in the limo[/i]\n*line_break\n[i]Fame, what you get is no tomorrow[/i]\n*line_break\n[i]Fame, what you need you have to borrow[/i]\n*line_break\n[i]Fame, [/i]nein[i]! It's mine, it's just his line[/i]\n*line_break\n[i]To bide your time, it drives you to crime, fame[/i]\n*line_break\n–David Bowie\n*page_break\n\n*if contract = \"indie\"\n  *finish\n*else\n  *goto start2\n  \n*label start2\nIt's now six months later. You, as is your new custom, are passed out in the back of a limousine. Because people like to ask you questions while you are asleep, you have taken to wearing very dark sunglasses at all times. This has the added benefit of hiding the bags under your eyes, which are many and massive. \n\nYou wake up to a rolled-up magazine being rudely smacked against your face. Opening your eyes, the blurry visage of \n*if fran = \"your manager\"\n  your manager appears before you. Joey hired her to look after you, saying you were \"too important to be left alone and too old for a babysitter.\" You haven't learned her name yet because…well, it's been a rough six months. She doesn't seem to mind.\n  *goto mag\n*else\n  Fran appears before you.\n  *goto mag\n\n*label mag\nIt seems she's been talking to you for quite some time, but only now does her voice register.\n  \n\"…or they're going to cancel. \n*label quest\nWell, what's your decision, yes or no?\"\n  \n*choice\n  #\"Yes.\"  \n    \"OK, I'll cancel the show and confirm you for the music-video shoot tonight.\"\n    *goto mag2  \n  #\"No.\"\n    \"Ok, I'll cancel the show and confirm you for the music-video shoot tonight.\" \n    *goto mag2  \n  #\"How about yes and no?\"\n    She rolls her eyes.\n    \n    \"What a brilliant suggestion. Fine, I'll cancel the show and confirm you for the music-video shoot tonight.\"\n    *goto mag2  \n  *hide_reuse #\"Please rephrase the question.\"\n    She sighs and launches back into a lengthy explanation. You try to pay attention, but you are so tired from your relentless schedule that you immediately zone out. You only snap back to attention when you hear, yet again:\n    *goto quest \n  #\"You're my manager; you decide.\" \n    *set reputation %+5\n    She rolls her eyes.\n    \n    \"Thanks for taking an active interest in your career. Fine, I'll cancel the show and confirm you for the music-video shoot tonight.\" \n    *goto mag2 \n\n*label mag2\nWell, glad that's settled. You're about to fall back to sleep when ${fran} shoves that magazine back in your face.\n\n\"Before you go back to sleep, you may want to look at this. Page 78.\"\n\nYou groggily flip open the \n*if commercial >= 65\n  [i]People[/i] magazine\n  *goto mag3\n*elseif sound = \"poppy\"\n  [i]Rolling Stone[/i] magazine\n  *goto mag3\n*elseif sound = \"folksy\"\n  [i]BMG[/i] magazine\n  *goto mag3\n*elseif sound = \"punk\"\n  [i]Clash[/i] magazine\n  *goto mag3\n*else\n  [i]Spin[/i] magazine\n  *goto mag3\n\n*label mag3\nand find a small picture of you and a scantily clad ${sexpref_man} on the beach. The accompanying blurb reads: \"${band_name} lead singer ${name} and art-world darling ${layla} Gold canoodling on the beach. \n\n*if (demo = \"album\") or (demo = \"amazing album\")\n  ${band_name}'s hotly anticipated major-label debut album is set to drop next month.\"\n  *goto canood\n*else\n  ${band_name}'s hotly anticipated debut album is set to drop next month.\"\n  *goto canood\n*label canood\n\nWhat the hell does \"canoodling\" mean? You pass the magazine back to ${fran}.\n*choice\n  #\"It's nice of Joey to get me some publicity, but I wish it could be about the music, not my relationship.\"\n    *set commercial %-10\n    \"You really think people buy music magazines for the music? You've got a lot to learn, kiddo.\"\n    \n    $!{fran} chuckles to herself as you roll your eyes and fall back to sleep. \n    *goto video\n  #\"Why is my picture so small? Call up the magazine and yell at them for me.\"\n    *set commercial %+10\n    \"Err, sure, kiddo. I'll get right on that. In the meantime, you concentrate on making this music video kick ass, and the rest will take care of itself.\"\n    *goto video\n  #\"Please stop showing me crap like this. It gives me a stomachache.\"\n    *set health %+10\n    \"You got it, kiddo.\"\n    \n    She rolls down the window and chucks the magazine out, along with all the other magazines she brought to show you. While you don't approve of her littering, you must say you appreciate her willingness to do whatever you ask now that you're a real star.\n    *goto video\n  #\"I don't like the way my hair looks. We need to work on that.\"\n    *set style %+10\n    $!{fran} frowns at the picture.\n    \n    \"I'll make sure there's a stylist ready on set when you get there.\"\n    \n    Satisfied, you close your eyes and drift back to sleep.\n    *goto video\n \n*label video\nThe night's music-video shoot finds you seated atop a camel, surrounded by half-naked women, singing the chorus to ${title4} roughly 8,467 times. \n*if (demo = \"album\") or (demo = \"amazing album\")\n  Now that your album is getting a major-label release, ${title4} has been chosen to become the next smash-hit single from Gilded Cage Records. \n  *goto wrap\n*else\n  ${title4} will be the first single off the new album and has already reached the Top Ten new-release charts in its first week of radio play.\n  *goto wrap\n*label wrap\nWhile the rest of the band has already wrapped for the day, you're forced to stick around and keep shooting your close-ups. It's yet another drawback of being the head honcho. \n\nAfter the take, Marcello, the intense director, runs over to you.\n\n\"[i]Bellisimo[/i]! Wonderful energy! We're almost finished now; just one small adjustment….\"\n\n*if (contract = \"best contract\") \n  He adjusts your robe, making sure the opening goes as far down below your navel as possible. One of the make-up people runs in and sprays fake sweat onto your chest region. Marcello nods approvingly.\n\n  \"Now we are ready for the rocking!\"\n\n  He runs back to the camera while you prepare yourself for the next take. It's a tough job, but what can you do?\n  *goto layla\n*elseif ((contract = \"great contract\") or (contract = \"good contract\")) or (contract = \"fine contract\")\n  He hands you a can of Schmidywinks Malted Delight, an \"adult beverage\" that boasts \"twice the alcohol of beer at half the cost and ten times the attitude!\"\n  \n  You take a sip. It tastes like a melted popsicle doused in cough syrup.\n  \n  \"Ugh, this is awful!\" you exclaim.\n  \n  \"Oh, no, you're not supposed to drink it!\" Marcello says. \"You're just supposed to sell it. It's for—how-do-you-say—juvenile criminals and alcoholics? We have real drinks here for you if you like. You just hold the can and pretend to drink to show everyone how cool it is to be drunk all the time, yes?\"\n  *goto shill\n*else\n  He hands you a pack of Chief Smoke-'Ems Natural Delight cigarettes, featuring a cartoon image of a grinning Indian Chief on the pack.\n  \n  \"Um, but I don't smoke cigarettes,\" you say.\n  \n  \"Of course you don't! And if you did, we have plenty of rich-people cigarettes in the back for you to enjoy. No, this is just for the—how-do-you-say—urban peasants and children? You just stick one in your mouth and make it look cool so all the little kiddies want to smoke and look cool just like you, yes?\n  *goto shill\n  \n*label shill\nBefore you can respond, he runs back to the camera.\n  \n\"Ok, places everyone!\"\n  \nThe shot's about to start. What do you do?\n\n*choice\n  #Do it. What's the alternative? This is the nature of the job. Besides, if it's not me selling this crap, it'll just be some other lucky rich person.\n    *set commercial %+25\n    Every job has its unfortunate aspects. There's no point in lashing out and causing trouble. You do as you're told and finish off the shoot, then retreat to your dressing room.\n    *goto layla\n  #Reason with him. While I understand that product endorsement is part of the job, I'm not comfortable with this particular product. Maybe they can give me something else?\n    You raise your objections to Marcello, all the while feeling guilty for wasting the cast's and crew's time. You realize that, to them, you must look like a spoiled rock brat, but this is important.  \n    *if (commercial \u003c= 40) and (style >= 60)\n      *set commercial %-15\n      $!{fran} talks to Joey and effectively communicates to him, through the use of many colorful swear words, that you have an image to protect—an image that does not include marketi
