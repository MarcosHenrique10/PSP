sound of a new generation. As long as you let me guide you, that is.\"\n  *goto sign\n\n*label sign\n\nDo you want to sign with Fran?\n*choice\n  #Yes.\n    *set fran true\n    *achieve fransign\n    You consider her offer—for about a split second. You tell her you are thrilled to be under her representation. She promises to get in touch soon with the next steps. It's time to find out what life is like as a legitimate band! \n    *finish\n  #No.\n    *set cohesion %-10\n    *set commercial %-20\n    You're not sure why, but something seems off about this lady. Besides, you can manage your band just fine yourself and save money in the process.\n    \n    Your bandmates are not thrilled that you passed on an offer without consulting them, but you know you made the right choice. Now it's time to figure out the next step.\n    *finish\n  #Let me speak to my band first.\n    *set cohesion %+20\n    *set commercial %+15\n    *set fran true\n    Your band feels validated that you're asking their opinion on such a crucial matter. They all agree—let's sign right away, before she changes her mind!\n    \n    You accept Fran's offer. It's time to find out what life is like as a legitimate band!\n    *finish\n  *hide_reuse #I want some more information before I decide.\n    You decide to ask Fran some pertinent questions about her rate, how she works, and what her plans are for your band.\n  \n    *if performance \u003c= 2\n      *set commercial %-10\n      Her mood immediately changes.\n    \n      \"Some bands just don't know how to take success. I tried to offer you an opportunity, and you respond with all this impertinence. I work with wildly destructive bands, not difficult bands.\"\n    \n      And with that, she says goodbye. Looks like you're going to have to press forward without a manager, but you may have just dodged a bullet.\n      *finish\n    *else \n      \"Honey, let me worry about all the specifics later. Now, are you signing or not?\"\n      *goto sign\n      \n*label V\nV especially digs your new commitment to a ${sound} sound and lets you know it by laying down some of the most wicked bass riffs you've ever heard in practice.\n*return\n\n*label sludge\nSludge especially digs your new commitment to a ${sound} sound and lets you know it by beating her drums into bloody oblivion at the next practice.\n*return\n\n*label wendle\nWendle especially digs your new commitment to a ${sound} sound and lets you know it by laying down some extra-spacey goodness on his keys at the next practice.\n*return\n  \n*label rosenblatts\nThe Rosenblatts especially dig your new commitment to a ${sound} sound and let you know it by laying down some window-shattering blasts at the next practice.\n*return\n\n*label rory\nRory especially digs your new commitment to a ${sound} sound and lets you know it by unleashing some of the most goosebump-inducing vocals you've ever heard at the next practice.\n*return\n\n*label name_change\n*if (sib_name = true) and (casperquit = true)\n  \n  Now that Casper's gone, do you want to keep ${band_name} as your band name?\n  *choice\n    #Sure, why not.\n      Great! You shall remain ${band_name}.\n      \n      *return\n    #No, I'd better change it.\n      OK, what would you like the new name to be?\n      \n      *choice\n        #Just my name.\n          *set band_name \"The ${name} ${last_name} Band\"\n          *set cohesion %-20\n          *set casper %-10\n          *achieve egoname\n          You are now ${band_name}!\n          \n          *return\n        #My name, followed by a band name.\n          *set cohesion %-20\n          Tom Petty and the Heartbreakers, Bob Marley and the Wailers, Bob Dylan and the Band…there have been many classic back-up-band-name combos in rock. Your band will be ${name} ${last_name} and the…what?\n\n          *input_text backing_name \n          *set band_name \"${name} ${last_name} and The ${backing_name}\"\n\n          Excellent! You are now ${band_name}.\n          \n          *return\n        #A regular band name.\n          *set cohesion %+20\n          Your options for a band name are as limitless as your imagination. So, what's it going to be?\n\n          *input_text band_name\n\n          Excellent! You are now ${band_name}.\n          \n          *return     \n*else\n  *return", "best_days": "*temp musicset\n*set musicset false\n*temp lyricsset\n*set lyricsset false\n*temp lyrics\n*set lyrics \"unknown\"\n*temp music \n*set music \"unknown\"\n*temp huge_party\n*set huge_party false\n[i]Oh, when I look back now[/i]\n*line_break\n[i]That summer seemed to last forever[/i]\n*line_break\n[i]And if I had the choice[/i]\n*line_break\n[i]Yeah, I'd always want to be there[/i]\n*line_break\n[i]Those were the best days of my life[/i]\n*line_break\n–Bryan Adams\n*page_break\n\nIt's three years later, and you are now 16 years old. Three more years dreaming of rock stardom. But are you any closer to realizing your dream?\n\nYour brother Casper should be arriving home from college any minute. You have a few more weeks of school left. You've been counting down the days until Casper's return, but you're not ready to see him. Not yet.\n\nInstead of waiting for him at home, you sit in a darkened classroom. School ended over two hours ago, and the building is nearly empty, but you sit alone. Well, not completely alone. \n\nYou also have your ${instrument}.\n\nTechnically, ${instrument_its} not your ${instrument}. You are borrowing from Mr. Hart, the super-cool high-school gym teacher. But with the amount of time you spend with the ${instrument}, ${instrument_its} really beginning to feel like your own.\n\nHow much time do you spend practicing?\n\n*choice\n  #Four hours a day and twice as much on weekends. Besides school, it's all I do.\n    Friends? No time. Schoolwork? Please. $!{sexpref_boys}? Those can wait. You are a single-minded rock machine. And you know that all the work you do now is sure to pay off someday…right?\n    *set musicianship %+15\n    *set reputation %-20\n    *goto home_late  \n  #Plenty. It's my only extra-curricular activity.\n    The \"after-school program of rock\" is demanding, but your skills have grown immensely.\n    *set musicianship %+10\n    *set reputation %-10\n    *goto home_late \n  #Enough. It comes naturally to me, so I don't need to practice too much. \n    *set improv %+10\n    Fair enough. If you practiced too often, it would start to feel like a job. Then you'd just be your dad.\n    *goto home\n  #To be honest, I'm mostly playing it to get ${sexpref_boys}, so what's the point of spending all my time alone in a classroom like some nerd?\n    *set musicianship %-10\n    *set reputation %+10\n    It's hard to argue with that logic. Even so, you've gotten quite good. And the ${sexpref_boys} have noticed.\n    *goto home\n    \n*label home_late\nAfter clocking your long hours in the rock-mines, you head home. It's already beginning to get dark outside when you pull up to your house on your bicycle. \n\nWaiting for you in the driveway is a familiar smiling face: Casper!\n*goto driveway\n\n*label home\nYou practice for a little bit, but you're too excited to really concentrate. You rush home and find Casper sitting in the driveway, waiting for you.\n*goto driveway\n\n*label driveway\n\n\"Casper! Welcome home!\"\n\n\"Hey, little ${gender_bro}. I wouldn't go inside, if I were you. Mom just got a call from your music teacher that you haven't been attending your band practices. She's super pissed.\"\n\nUh, oh. This is bad news for your health and rocking. Casper sees the concern on your face.\n\n\"What's going on? Did you grow tired of your ${band_instrument} or something?\"\n\n*choice\n  #\"Yes, that's it. Nothing else.\"\n    *goto casper_hide\n  *if (instrument != \"drums\") #\"Yes, but you would, too, if you had a sick ${instrument} to play!\"\n    *goto casper_share\n  *if (instrument = \"drums\") #\"Yes, but you would, too, if you had a sick set of drums to play!\"\n    *goto casper_share \n  #\"Not at all. Playing the ${band_instrument} every now and then really helps me relax after shredding the ${instrument}.\"\n    *goto casper_share\n*label casper_share\n\n\"Woah, no way! Dude, check this out!\"\n\n*if casper_instrument = \"drums\"\n  Casper opens his wallet and pulls out a picture of his brand new, shiny red drum kit. He grins at you like a proud father as you examine the picture.\n\n  \"She's beautiful,\" you say.\n\n  \"She's only ten months old, but she's my pride and joy,\" he replies. \"She takes after her daddy, doesn't she?\"\n\n  Okay, this is getting a little weird now. Before long, you're helping Casper move his drums from his dorm room to the empty science classroom.  \n\n  \"Now that school is almost out for the summer, we have the place all to ourselves. We can play here every day, as much as we want!\"\n\n  As he sets up his kit, you take out your ${instrument}. What do you want to play him first to knock his socks off?\n  *goto song_choice\n*else\n  Casper pops open his trunk to reveal a shiny new ${casper_instrument}.\n\n  \"I've been playing for a few months now and getting pretty good, too. Hey, we should totally play together!\"\n\n  As usual, you're already miles ahead of him. Before long, you're sneaking him into the high school through your secret entrance, the bathroom window. You lead him into the empty science classroom and take out your ${instrument}. \n\n  \"I practice here all the time,\" you say. \"Once school lets out for the summer, we will have the place to ourselves. We can play here every day, as much as we want!\"\n\n  Casper cannot believe it. What do you want to play him first to show off your ${instrument} skills?\n  *goto song_choice\n  \n*label casper_hide\nYou are a terrible liar. Casper can tell you are holding back something, but he deftly pivots the conversation.\n\n\"Oh, that's a shame. I guess that means you won't be interested in my new ${casper_instrument}. $!{casper_its} sitting in the trunk of my car. I thought maybe you'd want to jam with me.\"\n\nThat seals it. You shove Casper into the car and command him to drive to the school. You sneak back in through your secret entrance—the window of the bathroom. As you lead him into the empty classroom, Casper seems as confused as ever.\n\n\"Dude, what the hell are we…\"\n\nYou shush him up and unlock the utility closet, revealing the ${instrument} in all her glory. \n\n\"Woah, no way! Is that yours? Are you any good?\"\n\nAre you any good? Ha! What song should you play him first to knock his socks off?\n\n*label song_choice\n*choice\n  #Something funky, with a wicked groove.\n    *if instrument=\"bass\"\n      *set musicianship %+20\n      *set casper %+10\n\n      You chose the perfect song to show off your bass-playing dominance! Casper is blown away.\n      *goto allsummer\n    *else\n      You breeze through a solid rendition. Casper seems impressed.\n      *goto allsummer   \t\n  #Something jazzy, with a creative interlude.\n    *if instrument=\"keyboard\"\n      *set musicianship %+20\n      *set casper %+10\n\n      You chose the perfect song to show off your keyboard dominance! Casper is blown away.\n      *goto allsummer\n    *else\n      You breeze through a solid rendition. Casper seems impressed.\n      *goto allsummer  \n  #Something rocking, with a snarling solo.\n    *if instrument=\"guitar\"\n      *set musicianship %+20\n      *set casper %+10\n\n      You chose the perfect song to show off your guitar dominance! Casper is blown away.\n      *goto allsummer\n    *else\n      You breeze through a solid rendition. Casper seems impressed.\n      *goto allsummer\n  #Something loud, with a driving beat.\n    *if instrument=\"drums\"\n      *set musicianship %+20\n      *set casper %+10\n\n      You chose the perfect song to show off your drumming dominance! Casper is blown away.\n      *goto allsummer\n    *else\n      You breeze through a solid rendition. Casper seems impressed.\n      *goto allsummer\n      \n*label allsummer\nUnable to wait any longer, he joins in on the fun. It takes a few hours to work out the kinks, but eventually the two of you are grooving together like you've been at it for years. \n\nGrinning from ear to ear, he shouts out, \"Little ${gender_bro}, this is gonna be the best summer ever!\"\n\nIt turns out he was right. For the next two months, you and your brother play music every day, becoming better and better. Soon you are a well-oiled musical duo.\n\nWhat else do you do all summer?\n\n*choice\n  #Go to lots of concerts.\n    *label concerts\n    *set buzz %+20\n    On the weekends, you and Casper sneak into bars and clubs to experience the local music scene. The shows aren't anything special, but you do get to meet lots of musicians. Some of them even invite you backstage to hang out and jam after the shows. After a couple months, you feel closer to being a real musician than ever before. \n    *goto song \n  #Hang out with friends.\n    *set health %+10\n    Sure, your friends are great and everything, but you can already feel yourself growing apart from them as you become more and more obsessed with your ${instrument}. After a couple months, you've mostly given up on hanging out with them.\n    *goto song \n  #Hit on ${sexpref_boys} and party.\n    *label partying\n    *set stage_presence %+10\n    *set reputation %+10\n    *set health %-10\n    *set musicianship %-10\n    Slaying the ${instrument} by day and slaying the ${sexpref_boys} by night. It's called living the dream. This summer holds a number of important firsts for you: Your first kiss, your first illegal beer, and your first time running from the cops. \n    \n    Some days you are too tired to practice, but the nights are always worth it. After a couple months, it's hard to say which you want more: To become a rock star, or to party like one.\n    *goto song\n  #Nothing. Eat, sleep, and practice, not always in that order.\n    *set musicianship %+10\n    *set reputation %-10\n    You spend more time alone in the science classroom than a nerd working on a chemistry experiment. Casper joins you for a few hours each day, but he can't match your devotion. \n      \n    After a few weeks, he tries desperately to convince you to spend some time away from the school with him.\n    \n    \"Come on, little ${gender_bro}. There's more to life than practicing. Real rock stars have to learn about the important things, like partying, going to shows, and hitting on ${sexpref_boys}.\"\n    *choice\n      #He's right. If I want to be a rock star, I must learn to party with the same fervor that I harnessed to learn how to make my ${instrument} sing like an enchanted choirboy.\n        *goto partying\n      #Perhaps I should survey some of the local musicians, for purely educational purposes.\n        *goto concerts\n      #What do any of those things have to do with becoming the greatest rock ${instrument_guitarist} who ever lived? Sorry, Casper, no dice.\n        *set musicianship %+20\n        *set reputation %-30\n        You are well on your way to becoming an extraordinary ${instrument_guitarist}. But are you any closer to becoming a rock star?\n        *goto song\n           \n*label song\n\nAs the summer draws to a close, you find yourself growing bored of banging out the same covers over and over. You decide that it's finally time for you and Casper to write your first song together. \n\nWhich part of the song do you want to write first, the music or the lyrics?\n\n*choice\n  #Music.\n    Everyone knows that the music is the heart of every rock song. No musician likes to be pigeonholed into a musical category, but when you're writing a song, it's important to know what you are going for. Songs don't come out of a vacuum; they are a careful synthesis of your unique style and the many artists who have influenced you over the course of your life. Great songs are like sponges, soaking up all the dirty musical dishwater inside a musician's head and squeezing out a few drops of original musical essence. \n    \n    *label music\n    *set musicset true\n    \n    What kind of song are you writing?\n    *choice\n      #A headbanger. Something wild and thrashing, with screaming ${instrument} and explosive ${casper_instrument}.\n        *set music \"rocker\"\n        *set folksiness %-30\n        *set commercial %+5\n        *goto switch\n      #A tearjerking ballad. Something beautiful and poignant, with rich vocals and delicate ${instrument}.\n        *set music \"ballad\"\n        *set casper %-10\n        *set commercial %+15\n        *set health %+10\n        *set style %-10\n        *goto switch\n      #A rump shaker. Something bouncy and groovy, with funkified ${instrument} and hypnotic ${casper_instrument}\n        *set music \"funk groove\"\n        *set commercial %+15\n        *set style %+10\n        *goto switch\n      *if (instrument = \"bass\") #A folk ditty. Something loose and jammy, with a bulbous bass line and gorgeous ${casper_instrument}.\n        *set music \"folk ditty\"\n        *set commercial %-10\n        *set folksiness %+20\n        *set improv %+20\n        *goto switch\n      *if (instrument = \"guitar\") #A folk ditty. Something loose and jammy, with a gorgeous guitar solo and bulbous ${casper_instrument}.\n        *set music \"folk ditty\"\n        *set commercial %-10\n        *set folksiness %+20\n        *set improv %+20\n        *goto switch\n      *if (instrument = \"keyboard\") #A folk ditty. Something loose and jammy, with a jazzy keyboard solo and pulsating ${casper_instrument}.\n        *set music \"folk ditty\"\n        *set commercial %-10\n        *set folksiness %+20\n        *set improv %+20\n        *goto switch\n      *if (instrument = \"drums\") #A folk ditty. Something loose and jammy, with a jazzy drum beat and gorgeous ${casper_instrument}.\n        *set music \"folk ditty\"\n        *set commercial %-10\n        *set folksiness %+20\n        *set improv %+20\n        *goto switch\n        \n  #Lyrics.\n    The lyrics are the true heart of any song. Some lyrics are elaborate poetry, revealing more meaning with every listen. Other lyrics are simple but strong and emotionally raw. But for lyrics to be truly great, they must be one thing above all: Catchy. Unless you've written something that 100,000 fans want to shout back at you on stage, you haven't done your job.\n\n    *label lyrics\n    *set lyricsset true\n    \n    What style of lyrics should you write?\n    *choice\n      #Complex and poetic, with lots of big words and imagery about forests.\n        *set lyrics \"poetic\"\n        *set commercial %-10\n        *set folksiness %+10\n        *goto switch\n      #Raw and simple, with lots of angst about unrequited love.\n        *set lyrics \"emotional\"\n        *set health %+10\n        *set style %-10\n        *goto switch\n      #Strange and artsy, with lots of offbeat musings about clowns.\n        *set lyrics \"artsy\"\n        *set unique %+10\n        *set commercial %-20\n        *goto switch\n      #Fun and poppy, with lots of rhymes about ${sexpref_boys} and partying.\n        *set lyrics \"poppy\"\n        *set commercial %+15\n        *goto switch \n      #Dark and full of pain, with lots of yelling about death and violence.\n        *set lyrics \"dark\"\n        *set folksiness %-20\n        *goto switch   \n  #I'll let Casper decide. It's good to make him feel as though he's important.\n    \"Hmm, good question, ${gender_bro}. I mean, music is sort of the heart of every song, isn't it? But then again, lyrics are pretty much the heart of the song, too. Can something have two hearts? Man, this is making my head hurt. You know what, let's flip a coin.\"\n    *set casper %+15  \n    *goto lyrics\n\n*label switch\n*if (musicset = true) and (lyricsset = false)\n  Now that you've got your song worked out, it's time to start working on the lyrics.\n  *goto lyrics\n*elseif (lyricsset = true) and (musicset = false)\n  Now that you've got your lyrics written out, it's time to come up with the perfect music to set it to.\n  *goto music    \n*else\n  All right, your song is almost done! It's now time to add your personal flair.\n  *goto chorus      \n  \n*label chorus\nOf course, the chorus is the true heart of the song. A great chorus will be instantly memorable to everyone who hears it. Your fans will sing it for the rest of their lives, humming it in the shower and annoying those around them to no end. \n\nDo you have what it takes to pen the perfect 2-4 line chorus that will infect listeners' minds like a parasitic rock virus?\n\n*choice\n  #I've always heard this idea that great songs \"write themselves.\" Let's go with that. \n    Amazingly, your strategy of not working seems to work fantastically. You close your eyes and a fully formed chorus appears in your head.\n    *goto chorus2\n  #Give me a pad and paper. I want to craft this chorus myself.\n    *set musicianship %+10\n    *input_text chorus1\n    *goto title \n\n*label chorus2\n*if lyrics=\"artsy\"\n  *set chorus1 \"[i]I'm not clowning around anymore, So wipe your smile off of my floor.[/i]\"\n  *goto title\n*elseif lyrics=\"emotional\"\n  *set chorus1 \"[i]Don't erase me, don't deface me. Just encase me. Encase me. In case we…[/i]\"\n  *goto title\n*elseif lyrics=\"poppy\"\n  *set chorus1 \"[i]So we danced all night to our record player, And then we danced all day 'cause you're my record player. Yeah, you're my record player, My record player, My record player.[/i]\"\n  *goto title\n*elseif lyrics=\"dark\"\n  *set chorus1 \"[i]When yesterday's homicide is tomorrow's genocide, And tomorrow's suicide is yesterday's regicide. And you know you're dead inside, Yeah, you know you're dead inside, From yesterday's regicide.[/i]\"\n  *goto title\n*else\n  *set chorus1 \"[i]Europa, Europa, to the Galilee, My sepulchral queen has set me free.[/i]\" \n  *goto title\n  \n\n*label title    \n\nDespite what anyone may have told you, the heart of a great rock song is the title. Obviously. The title is what fans are going to hold signs up for you to play, call up radio stations to request, and, maybe, someday in the distant future, purchase for their magical portable music boxes. What's your title?\n\n*choice\n  *if (lyrics=\"poetic\") #Sepulchral Queen.\n    *set title1 \"Sepulchral Queen\"\n    *goto congrats\n  *if (lyrics=\"artsy\") #Circus Maximus.\n    *set title1 \"Circus Maximus\"\n    *goto congrats\n  *if (lyrics=\"emotional\") #In Case We.\n    *set title1 \"In Case We\"\n    *goto congrats\n  *if (lyrics=\"poppy\") #My Record Player.\n    *set title1 \"My Record Player\"\n    *goto congrats\n  *if (lyrics=\"dark\") #Yesterday's Regicide.\n    *set title1 \"Yesterday's Regicide\"\n    *goto congrats\n  #Rock and Roll Part 27.\n    *set title1 \"Rock and Roll Part 27\"\n    *goto congrats\n  #Untitled.\n    *set title1 \"Untitled\"\n    *goto congrats\n  #Hey Hey, Na Na! \n    *set title1 \"Hey Hey, Na Na!\"\n    *goto congrats\n  #Hot Black Tar.\n    *set title1 \"Hot Black Tar\"\n    *goto congrats   \n  #Kindly step aside and allow me to title my own song.\n    *input_text title1\n    *goto congrats\n\n*label congrats\n*set title1 \"\\\"${title1}\\\"\"\nCongratulations, you've written your first song! \n*if (lyrics=\"artsy\") or (lyrics=\"emotional\")\n  It's an ${lyrics} ${music} that's poised to take the world by storm! \n  *goto practice\n*else \n  It's a ${lyrics} ${music} that's poised to take the world by storm! \n  *goto practice\n  \n*label practice\nIt takes a couple of days of practice,\n*if musicianship>=65\n  only because Casper struggles mightily to keep up with your musical brilliance, but soon you are rocking ${title1} like you've played it for years.\n  *goto party_plan\n*else\n  but soon you are rocking ${title1} like you've played it for years.\n  *goto party_plan\n\n*label party_plan\nAfter one particularly explosive performance, Casper turns to you, dripping with rock sweat, and says:\n\n\"Little ${gender_man}, I don't think it's fair for us to keep brilliance like this to ourselves any longer. I think it's time we unleash it on the world. What do you say we sneak a few friends into the school one night and throw a small party? We'll play a few of our best covers and then blow the doors down with ${title1}!\n*choice\n  #That's an inspired idea! But only a few friends, okay? If we get caught, I'll lose my precious ${instrument} and have to go back to playing the stupid ${band_instrument}.\n    \"Of course! Just a few friends, I promise!\"\n    *goto prepare\n  #Are you nuts? You want us to sneak a few friends into the school for a small party? We just wrote the greatest song in the history of rock; this calls for a [i]real party[/i]! Let's put out the word and invite everyone we know.\n    \"Righteous! Let's do it!\"\n    *set huge_party true\n    *goto prepare\n  #Sorry, no. I would never do anything to risk my precious ${instrument}. The world will hear ${title1} soon enough, but for now we practice alone.\n    *goto no_party\n\n*label no_party\n*set reputation %-20\n*set casper %-15\n\"Wow, I'm sorry, Mom. I didn't realize ${name} had left. Maybe when ${name} comes back, you can tell ${gender_him} that there won't be any party…Mom.\"\n\nAnd with that, Casper storms off. Yeah, he's pretty pissed. For a few days you don't see him or hear from him at all. Then, one afternoon, he shows up back at the school. He's carrying a six-pack of beer, and you can smell alcohol on his breath.\n\n\"Hey ${gender_bro}, sorry about that whole 'Mom' thing a few days ago. You know I was just joking around, right? Listen, I  have a couple friends here, and all they want to do is sit quietly and hear us play. I told them how awesome a ${instrument_guitarist} you are, and they're so excited. I promise we won't get in trouble or anything. Can I please let them in?\"\n\n*choice\n  #\"Sure, why not? Let's give them a show.\"\n    *set casper %+15\n    *set reputation %+10\n    \"Righteous!\" Casper lets out a loud whistle and his friends pile in through the window. There's more than a couple of them, about ten in all.\n    \n    \"I thought you said just a couple of friends!\" you shout at him.\n    \n    \"That's right, a couple, meaning twelve. Like a couple eggs, or a couple bagels, or a baker's couple.\"\n    \n    To be fair, math was never Casper's strong suit. You sigh and roll your eyes, but there's nothing to be done now except put on a show.\n    *goto party\n  #\"Fine, as long as it's just a couple and they stay completely quiet.\"\n    *set casper %+10\n    *set reputation %-5\n    \"Of course, of course, don't worry.\" Casper signals to the window and his friends pile in. They keep coming and coming; there's about ten in all. \n    \n    \"I thought you said just a couple friends!\" you shout at him.\n    \n    \"That's right, a couple, meaning twelve. Like a couple eggs, or a couple bagels, or a baker's couple.\"\n    \n    To be fair, math was never Casper's strong suit. You sigh and roll your eyes, but there's nothing to be done now except put on a show.\n    *goto party\n  #\"No. I already told you, absolutely not.\"\n    *set casper %-10\n    *set reputation %-10\n    Casper sighs and rolls his eyes. \"Fine, whatever. I'll just tell them all to leave.\"\n    \n    \"Tell them all?\" you think. How many were there? \n    \n    Unfortunately, it seems you're about to find out, as from outside you hear the sounds of laughter and a window being forced open. \n    \n    Casper grins. \"Sorry, ${gender_bro}, looks like they made up their minds.\"  His friends come piling into the room. There are around ten in all.\n    \n    \"What the hell, Casper! I thought you said just a couple friends!\" you shout at him.\n    \n    \"That's right, a couple, meaning twelve. Like a couple eggs, or a couple bagels, or a baker's couple.\"\n    \n    To be fair, math was never Casper's strong suit. He begins setting up the instruments. It seems this party is happening one way or another.   \n    *goto party\n\n*label prepare\n\nThe next few days are spent in anticipation. How should you prepare for the big night?\n*choice\n  #Keep practicing my ${instrument} to be in top shape.\n    *if musicianship >=60\n      *set musicianship %+5\n      You've been practicing so much lately, these extra few sessions don't really add much. You may want to think about starting to develop other areas of your future rock-star persona.\n      *goto big_small\n    *else \n      *set musicianship %+15\n      You have sharpened your ${instrument} skills into a finely tuned rocking machine.\n      *goto big_small    \n  #Spend some time singing in front of a mirror so I don't look like a goober in front of Casper's friends.\n    *set stage_presence %+15\n    Now you only look like a goober to yourself, as you dance and sing in front of your bathroom mirror. Still, all that \"practice\" pays off. Once Friday night rolls around, you feel confident and ready to rock. \n    *goto big_small\n  *if (buzz >=45) #Find my musician buddies and convince them to come check out my performance.\n    *set buzz %+15\n    You spend the next few days going to gigs and trying to convince the hip musicians you've met around town to come hear you play. A few of them actually promise to be there.\n    *goto big_small\n  #Hang around with Casper, kicking it old school.\n    *set casper %+20\n    You and Casper share the next few days bonding as bandmates, friends, and siblings. Your chemistry could not be better by the time Friday night rolls around. \n    *goto big_small\n    \n*label big_small\n*if huge_party\n  *goto huge_party\n*else\n  *goto filter\n\n*label filter\n\nWhile you and Casper set up, his friends begin filtering into the classroom, six-packs of beer in tow. It soon becomes clear that your and his conceptions of \"a few\" are very different from each other!\n\n\"I thought you said just a few friends!\" you shout at him.\n\n\"That's right, a few, meaning twelve. Like a few eggs, or a few bagels, or a baker's few.\"\n\nTo be fair, math was never Casper's strong suit. Finally, everyone has filed in, and the instruments are all set up. Time to play.\n*goto party\n\n*label huge_party\n*achieve hugeparty\n\nYou've done everything you can to make this the most kick-ass party imaginable. You're hoping that all the calls to friends and fliers you hung around everywhere will be enough to fill the classroom. \n\nAs you arrive early on the big night and begin setting up, your fears are put to rest by the first group of friends pulling up to the school. They are followed soon after by more groups, filling up the parking lot and hoisting one another through the bathroom window. \n\nBefore you know it, the classroom is filled to capacity! With even more people trying to push their way in, you wonder how you'll ever be able to carve out enough space to play. \n\nLuckily, some of Casper's friends have figured out how to break into the gym basement, containing a pool which has been drained for the summer. It's the perfect makeshift venue. While everyone rushes into the pool, you and Casper haul over your equipment and quickly set up again.\n\nFinally, the moment you've been waiting for arrives.\n\n*label party\n*if buzz >= 55\n  *set reputation %+10\n  *set stage_presence %+15\n  Just before you're about to begin, a few of your musician buddies make their way into the back of the room. Uh, oh, pressure's on. Better bring your A-game.\n  *goto rock\n*else  \n  *goto rock\n\n*label rock\nTime to rock!\n\nWhat should your first song be?\n*fake_choice\n  #Something fast and funky to get everyone moving.\n    You kick off with \"One More Saturday Night\" by the Grateful Dead. See, it's funny, because it's actually a Friday night. The crowd begins shaking and dancing to the groove.\n  #Something slow and poignant to build anticipation.\n    You start up with \"Heart of Gold\" by Neil Young. Your crowd seems to appreciate the thoughtful selection, and Casper appreciates the chance to get warmed up.\n  #Something loud and rocking to blow everyone away.\n    You set the volume to 11 and lay into \"Kashmir\" by Led Zeppelin. That woke everyone up, including Casper.\n*comment endif\n\nThe next few songs continue in the same fashion. Eventually, you and Casper nod to each other, and you both understand–it's time. As the song ends, you step up to the microphone.\n\n\"Everyone, thanks so much for coming tonight. We've got a new number to play for you now; hope you enjoy it.\"\n\n*if stage_presence >=55\n  Your energy and charisma radiate into the crowd as they await your next song with great excitement. For the first time you know the feeling of having a crowd in the palm of your hand.\n  *goto original\n*else\n  The crowd quiets down, awaiting your song with anticipation. \n  *goto original\n\n*label original\n\nAs the opening notes ring out, you and Casper lay into your original ${music} with energy and confidence. Time to sing the first verse. You hope you can remember the words…\n\n*page_break\n\n*if lyrics = \"poetic\"\n  [i]Oh Oleanna, the rings around your weathered mane[/i],\n  *line_break\n  [i]Bespeaks an ancient, cryptic pain[/i],\n  *line_break \n  [i]Of crimson fields and children slain[/i],\n  *line_break\n  [i]Who, reaching for your your fruits so blanch[/i],\n  *line_break\n  [i]Were torn upon your supine branch[/i].\n  *goto chorus_sing\n*elseif lyrics = \"emotional\"\n  [i]Your number, the window[/i],\n  *line_break\n  [i]Your lipstick, so bitter[/i],\n  *line_break\n  [i]The message you handed me that very day[/i],\n  *line_break\n  [i]When you tore me to pieces and blew me away[/i].\n  *goto chorus_sing\n*elseif lyrics = \"artsy\"\n  [i]Mr. Floppy Shoes, where you sleeping tonight[/i]?\n  *line_break\n  [i]Laughing alone by the moonlight[/i].\n  *line_break\n  [i]Mr. Curly Hair, do you know where we are[/i]?\n  *line_break\n  [i]You got 15 friends coming outta that car[/i]!\n  *line_break\n  [i]Oh! I got seltzer in my eye[/i]!\n  *line_break\n  [i]Oh! I got seltzer in my eye[/i]!\n  *goto chorus_sing\n*elseif lyrics = \"dark\"\n  [i]Knock, knock, Mr. Reagan[/i].\n  *line_break\n  [i]Hello, it's me again[/i].\n  *line_break\n  [i]I'm the child dying of hunger on your lawn[/i].\n  *line_break\n  [i]I'm the blood of the innocent came and gone[/i].\n  *line_break\n  [i]How do you quiet the screams in your head[/i]?\n  *line_break\n  [i]I said, how do you quiet the screams of the dead[/i]?\n  *goto chorus_sing  \n*else\n  [i]From across the room, ${sexpref_he} makes me swoon[/i],\n  *line_break\n  [i]Yeah, I'm trying to see through ${sexpref_his} Hennessy[/i],\n  *line_break\n  [i]Let's start a party in July that goes till November[/i],\n  *line_break\n  [i]And do it again when we can't even remember a thing[/i].\n  *goto chorus_sing\n\n*label chorus_sing\n\nSo far, so good! Now it's time for the most important part–the chorus!\n\n[i]${chorus1}[/i]\n\nSweet! Almost time to bring this baby home. As you do, you look out and take in the audience's reaction.\n\n*if ((music = \"rocker\") or (music = \"funk groove\")) and ((musicianship >= 55) and (folksiness \u003c= 40))\n  *set buzz %+20\n  The entire audience is on its feet, dancing and partying. By the time you hit the crescendo, the whole classroom is going nuts. Is this what every show is going to be like?\n  *goto switch2\n*elseif ((music = \"folk ditty\") or (music = \"ballad\")) and ((musicianship >= 55) and (folksiness >= 55))\n  *set buzz %+20\n  The entire audience has their lighters in the air, swaying back and forth. By the time you hit your final refrain, everyone is singing the words along with you. The feeling is electrifying. Is this what every show is going to be like?\n  *goto switch2\n*elseif ((musicianship \u003c 55) and (musicianship >= 40))\n  *set buzz %-10\n  Oh no, there are a couple of flubs. Luckily, the audience doesn't seem to care. They are definitely digging it. Great job!\n  *goto switch2\n*elseif musicianship \u003c 40\n  *set buzz %-20\n  *set casper %-10 \n  Toward the end, the song starts to get a little sloppy. You and Casper exchange looks, each of you thinking it was the other's fault. \n\n  You made it through all the way…barely. Some of the audience members seemed put off, but others definitely dug your work. A nice experience overall, but you can now see how much practice you're going to need if you want to put on a polished show.\n  *goto switch2\n*else\n  *set buzz %+10\n  *set casper %+10\n  The audience is grooving right along with you. Casper shoots you a grin, and you shoot him one back. They both say the same thing: if this is what being a rock star is like, you already know you want more!\n  *goto switch2\n\n*label switch2\n*if huge_party\n  *goto sirens\n*else\n  *goto busted\n  \n*label sirens\n\nAs you transition into your next cover, you look out and realize that your little gig has transformed into an all-out rager of a party. There are inebriated teenagers causing a ruckus all around the pool and spilling out into the rest of the school. Smoke clouds abound, and bottles are passed around with impunity. The din of your music and the partying is so loud that you don't even hear the sirens until the police car pulls into the parking lot.\n\nUh-oh. Before you know it, the cops are pushing into the pool room, prompting hordes of partygoers to scramble away as fast as they can. One of the officers shouts at you through his megaphone.\n\n\"Teenagers, cease your rock noise at once!\" \n\nYou and Casper exchange furtive glances. It's clear, from your vantage point, that it would take the cops a couple minutes to push through the crowd. But no matter how long it takes, your backs are against the wall—there's no turning and running.\n\n\"Step away from your noise machines and submit peacefully,\" the officer continues, \"or we will be forced to arrest you.\"\n\nHow far do you want to push this?\n\n*choice\n  #Enough's enough. I've already cemented my legacy with this epic rager; no need to spend the night in jail…especially if I ever hope to speak to my mom again.\n    *gosub end_trial\n    *if false\n      *label end_trial\n      *check_purchase adfree\n      *if choice_purchased_adfree or not(choice_purchase_supported)\n        *label purchased\n        *return\n      Remember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n      *if choice_prerelease and choice_is_web\n        *subscribe {\"allowContinue\": false}\n\n      [i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n      *purchase_discount adfree 2019-07-09 $3.99 $2.99 purchased\n      *abort\n    *if casper >=60\n      You and Casper smile at one another, silently acknowledging that this has been the greatest night of your life. Finally, you put down the instruments and surrender to the officers. \n      *label squad_car\n      *achieve police\n      They give you a few minutes to wrap up the gear, then they put you in the squad car. \n      \n      \"Officers,\" Casper asks, \"how long will we have to stay in jail?\"\n      \n      The officers  .\n      \n      \"Don't worry kid, you're not being arrested. We're taking you home for your parents to decide how to deal with you.\"\n      \n      Casper considers this for a moment.\n      \n      \"Sir, is there any way you would reconsider and take us to jail instead?\"\n      \n      The officers laugh, but you don't. You know what's awaiting you at home.\n      *goto ending1\n    *else\n      *if instrument = \"drums\"\n        Better quit while you're ahead. You put down your drumsticks and surrender. \n        *goto different_page\n      *else\n        Better quit while you're ahead. You put down your ${instrument} and surrender.\n        *goto different_page      \n  #Let's take this thing to 11. What's one night in the pokey compared to a lifetime of rock stardom? \n    *gosub end_trial\n    *set buzz %+15\n    *set reputation %+20\n    *if casper >=60\n      *set casper %+20\n      *set buzz %+15\n      \"Rock and roll forever!\" you shout out. As if reading your mind, Casper begins wailing away at his ${casper_instrument} even louder than before. The few remaining party-goers cheer you on, clearly blown away by your bravado. \n      \n      The cheers grow even louder as the cops finally pull the plug on your performance and escort you out to the parking lot. In a few days, the legend of your epic episode will have spread all around the town. For now, though, you will have to spend the night in jail.\n      *goto ending2\n    *else\n      *set casper %-20\n      *if instrument = \"drums\"\n        \"Rock and roll forever!\" you shout out as you begin pounding away at your kit even louder than before. But when you glance over at Casper for support, you find he's already packing up his ${casper_instrument} and surrendering peacefully to the cops. Traitor!\n        \n        Finally, the police pry the sticks out of your hands and escort both of you into the squad car.\n        *goto different_page2 \n      *else\n        \"Rock and roll forever!\" you shout out as you begin wailing away at your ${instrument} even louder than before. But when you glance over at Casper for support, you find he's already packing up his ${casper_instrument} and surrendering peacefully to the cops. Traitor!\n        \n        Finally, the police pry you away from your ${instrument} and escort both of you into the squad car.\n        *goto different_page2  \n      \n\n*label different_page\n*set casper %-15\nUnfortunately, it seems you and Casper are not on the same page. He looks at you with disappointment, then turns back to the police.\n\n\"Rock and roll forever!\" he shouts toward them, while continuing to wail away at his ${casper_instrument}, even louder than before. Finally, the police pry the ${casper_instrument} out of his hands and escort both of you into the squad car.\n\n*label different_page2\n*achieve police\n\"Officers,\" you ask, \"how long will we have to stay in jail?\"\n\nThe officers chuckle.\n\n\"Don't worry, kid,\" one of the officers responds, \"you're not being arrested. We're taking you home for your parents to decide how to deal with you.\"\n\nYou consider this for a moment.\n\n\"Sir, is there any way you would reconsider and take us to jail instead?\"\n\nThe officers laugh, but you and Casper don't. You both know what's awaiting you at home.\n*goto ending1\n\n*label busted \n\nAs you break into your last cover, you look out across the classroom and realize that your small gathering has definitely turned into a certifiable party. Inebriated teenagers all around you are having the times of their young lives. It's amazing that that you and your ${instrument} can bring this much joy to people.\n\nUnfortunately, it seems the group may be having a little too much fun, as you look toward the back of the room and see Mr. Hart, the gym teacher, entering the room. You and Casper abruptly stop playing.\n\n\"Hey, Mr. Hart,\" you stammer.\n\nHe scowls back at you. \n\n\"I thought that was my ${instrument} I heard blaring through the walls of the school. It looks like I was wrong to trust you. Come on, everyone, clear out.\"\n\nHow should you respond?\n\n*choice\n  #Stop playing immediately and apologize profusely. Just maybe he'll let me borrow the ${instrument} again.\n    *gosub end_trial\n    *set buzz %-10\n    *set reputation %-15\n    You immediately step away from the ${instrument} and apologize to Mr. Hart. While you two talk, Casper awkwardly shepherds the partygoers out of the school. You finally wrap up your emotional plea. Mr. Hart sighs.\n    \n    \"I can see the ${instrument} means a lot to you. We can talk about your borrowing it again later, once you've proved yourself more responsible. For now, I need to call your parents and tell them where you are.\"\n    \n    Call your parents!\n    *goto call_rents\n\n  #Solo for ten more seconds, then thank the audience and call it a night.\n    *gosub end_trial\n    *if musicianship > 60\n      *set buzz %+10\n      You unleash a searing ${instrument} solo to end the evening, bowling over the audience one last time. Finally, you wish everyone goodnight and step down to face Mr. Hart.\n\n      As you walk over to him, you see that he is picking up the telephone in the back of the classroom. Uh, oh.\n      \n      \"Um, who are you calling there, Mr. Hart?\"\n      \n      \"Your parents. Now go put everything away and consider yourself lucky I didn't decide to call the police.\"\n      *goto call_rents\n    *else\n      A few seconds in, you realize that you've never actually tried to solo for ten seconds before. Might want to practice your ${instrument} more before attempting something so advanced. Still, it was only ten seconds, and the audience seemed to dig it.\n      \n      Finally, you wish everyone goodnight and step down to face Mr. Hart. As you walk over to him, you see that he is picking up the telephone in the back of the classroom. Uh, oh.\n      \n      \"Um, who are you calling there, Mr. Hart?\"\n      \n      \"Your parents. Now go clean up and consider yourself lucky I didn't decide to call the police.\"\n      *goto call_rents\n      \n  #Show him who's boss. \"My ${instrument}?\" Who does this guy think he is? He may have purchased it, but the ${instrument} knows who ${instrument_its} real owner is now.\n    *gosub end_trial\n    *if instrument = \"drums\"\n      \"Step away, mere mortal!\" you bellow. \"Your drums are in the control of a Rock God now!\"\n      *goto hart_on\n    *else\n      \"Step away, mere mortal!\" you bellow. \"Your ${instrument} is in the hands of a Rock God now!\"\n      *goto hart_on\n        \n*label hart_on\nWith that, you launch into a sneering improvisational jam, Casper providing ample support on his ${casper_instrument}.\n\n*if musicianship \u003c 45\n    *set buzz %-15\n    It doesn't sound like much yet. A few members in the audience cover their ears to protect themselves from your aural assault. Better work on your musicianship before trying something like that again.\n    *goto hart_on2\n*elseif musicianship > 60\n    *set buzz %+15\n    You and Casper lock into a tight and evil groove. The audience is back to party mode, jumping up and down and rushing toward the stage. Even Mr. Hart seems unsure how to react, watching you with a mixture of reverence and annoyance.\n    *goto hart_on2\n*else\n    A few seconds in, you realize that you've never attempted a sneering improvisational jam before. Even so, the results aren't half bad. The audience seems to dig it. Maybe your playing doesn't justify your cockiness quite yet, but it might soon enough.\n    *goto hart_on2\n      \n*label hart_on2\n\nAbout halfway through the jam, you notice Mr. Hart exiting through the back. Maybe he was so overwhelmed by your rocking power that he decided to cut you a break?\n\nNot so much. A few minutes later, you hear sirens approaching. As everyone makes a break for it, Mr. Hart escorts the officers into the classroom. Busted.\n*goto squad_car\n\n*label call_rents\nWhat should you do?\n*fake_choice\n  #Beg him not to call. \n    \"Mr. Hart, please! Have some, er, compassion! If you call my parents, they will literally murder me.\"\n  #Make a run for it.\n    You dash toward the door but trip on a wire and fall flat on your face. As Mr. Hart helps you up, you plead with him.   \n\n    \"Please, Mr. Hart! Have some, er, compassion!\"\n  #Offer him a deal.\n    \"Fine, no more ${instrument}. In fact, this is the last you'll ever see of me again…until the school year, that is. Just, please, no parents…\"\n*comment endif\n\nNothing you say breaks through his icy demeanor. From this day forward, you vow to always refer to him as \"Mr. Hartless.\" Burn!\n\nEven your witty nickname is not enough to make you smile when you realize the agony in store for you at home.\n*goto ending3\n\n*label ending1\n*set health %-15\nYou can feel your heart jump into your throat as the police car pulls up at your house, and the officers escort you to your door.\n\n\"Don't let them see your fear,\" Casper whispers as the officers knock on the door.\n\nToo late. The veins bulging out of your mother's neck when she answers the door are enough to instill fear in anyone. Even Casper is shaking.\n\nFinally, once the officers leave, your mother wakes up your ${father} and the two of them lay into you like never before. \n*goto ending4\n\n*label ending2\n*achieve jail\nAfter a long night in jail, your ${father} finally arrives at the station to pick you up. He looks the most disappointed you've ever seen him. \n\n\"Youe mother couldn't bear to see you here,\" he says, laying on the guilt extra thick. When you arrive home, you find your mother crying in the kitchen. She can't even muster the energy to yell at you—she just shakes her head at you and keeps crying.\n\nIn the days following, your mother finally recovers enough to hand down your punishment. Here are the highlights: No more ${instrument}, no more friends, 8:00 P.M. curfew. Oh, and they're taking away your record player.\n*goto casper_run\n\n*label ending3\nYou're not sure if it's Mr. Hart's empty head or the volume of your mother's voice, but you can hear every apoplectic word your mother says through the phone receiver. Even Mr. Hart seems moved to something bordering on compassion as he puts the phone away.\n\n\"Wow, that lady is tough! I feel really bad for you kids. Okay, let's take you home.\"\n\nAs soon as you arrive home, your mother lays into you like never before. She even wakes your ${father} up so he can get in on the action. \n*label ending4\nThere's so much yelling that you can't understand everything, but here are the highlights: No more ${instrument}, no more friends, no more music, 8:00 P.M. curfew.\n*goto casper_run\n\n*label casper_run\nCasper doesn't get off easy either; his car is confiscated. He storms out, yelling, cursing, and vowing never to return. \n\n\"You'll be sorry!\" he yells. \"When ${name} and I are rich rock stars, you bet your ass you'll be sorry.\"  \n\nYour mother just closes the door and lets him walk off into the night on his own. Only days later do you find out that Casper has safely hitched a ride back to school. Your parents are relieved, although it takes a few weeks for your mom and Casper to speak to each other again.\n\nYou used to think your family was fairly normal, but now you're not so sure. There's a deep rift that's grown between you and your parents. Will this rift inevitably keep growing as you continue to pursue your passion, or is it possible to maintain a healthy family life along with a rock career?\n\nYou have no idea. At this point, you can only be sure of one thing: these next two years before graduation are gonna be rough. \n*finish", "choicescript_description": "Rock your way to the top of the '80s charts in this interactive tale of music and mayhem! But beware, mischievous managers, fickle fans, and gossiping groupies stand between you and rock immortality.\n\n\"Choice of the Rock Star\" is an interactive novel where your choices control the story. The game is entirely text-based—without graphics or sound effects—and powered by the vast, unstoppable power of your imagination.\n\nWill your band tear itself apart? Will you flame out on national television? Or will you build a legacy that stands the test of time?\n", "choicescript_stats": "*temp full_name\n*set full_name \"${name} ${last_name}\"\n*temp fran_text\n*if (fran = \"undefined\") or (fran = 0)\n  *set fran_text \"No Manager\"\n  *goto next\n*else\n  *set fran_text \"Fran\"\n  *goto next\n\n*label next  \n*temp casper_text\n*if (casperquit = true) or (cohesion = 0)\n  *set casper_text \"Estranged\"\n  *goto start\n*else\n  *set casper_text \"Bandmates\"\n  *goto start\n*label start\n*stat_chart\n  text full_name Name\n  text Instrument\n  text Hometown\n  text Money\n  percent Health\n  percent Style\n  percent Musicianship\n  percent stage_presence Stage Presence\n  opposed_pair reputation\n    Bad Influence\n    Role Model\n\n*if band_name != \"undefined\"\n  *stat_chart\n    text band_name Band Name\n    text band_size_text Band Size\n    text casper_instrument Casper's Instrument\n    percent Buzz\n    percent Cohesion\n    opposed_pair commercial\n      Commercial\n      Indie\n    opposed_pair folksiness\n      Folk\n      Rock\n    opposed_pair improv\n      Improvisation\n      Precision\n    opposed_pair unique\n      Artsy\n      Poppy\n  *goto relationships  \n*else\n  *goto relationships\n\n*label relationships\n*stat_chart\n  text casper_text Casper Relationship\n  text fran_text Management\n  text Contract Contract\n\n*if title1 != \"undefined\"\n  *stat_chart\n    text title1 First Song\n  *goto title_two\n*else\n  *finish\n  \n*label title_two\n*if title2 != \"undefined\"\n  *stat_chart\n    text title2 Second Song\n  *goto title_three\n*else\n  *finish\n\n*label title_three\n*if title3 != \"undefined\"\n  *stat_chart\n    text title3 Third Song\n  *goto title_four\n*else\n  *finish\n\n*label title_four  \n*if title4 != \"undefined\"\n  *stat_chart\n    text title4 Forth Song\n  *goto sound\n*else\n  *finish\n\n*label sound\n*if sound != \"undefined\" \n  *stat_chart\n    text sound Musical Style\n  *goto album\n*else\n  *finish\n\n*label album\n*if album != \"undefined\"\n  *stat_chart\n    text album\n  *goto legacy\n*else\n  *finish\n\n*label legacy\n*if legacy != \"undefined\"\n  *stat_chart\n    text legacy\n  *finish        \n*else\n  *finish", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 10[/b]\n  \n  Unlock Chapters 4 through 10, including the thrilling conclusion! (Purchasing the rest of the game will also turn off in-game advertisements.)\n  \n  *purchase_discount adfree 2019-07-09 $3.99 $2.99 start\n  *goto purchased_list\n\n*if choice_purchased_everything\n  You're completely upgraded!\n  *goto purchased_list\n\n*label purchased_list\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 10[/b]\n  \n  You've paid to unlock the full game.\n", "city_built": "*temp mistake\n*set mistake true\n*temp casper_choice \n*set casper_choice false\n*temp UnoDescription false\n*temp VDescription false\n*temp WendleDescription false\n*temp SludgeDescription false\n*set money +500\n[i]Marconi plays the mamba[/i]\n*line_break\n[i]Listen to the radio, don't you remember?[/i]\n*line_break\n[i]We built this city[/i]\n*line_break\n[i]We built this city on rock and roll![/i]\n*line_break\n–Jefferson Starship\n*page_break\n\nIt is now three years later, and you are nineteen years old. The year is 1985. A disease called \"disco fever\" has come and gone, leaving a wake of devastation in its path. Seminal 1960s psychedelic rock band Jefferson Airplane changed its name to Jefferson Starship and began cranking out pop songs. Deep in the urban underground, a new form of dance music has arisen which some are calling \"hip hop.\" \n\nHas rock and roll as you know it begun its slide into obscurity? Or is it simply evolving into something new and equally exciting? And in either case, what role will you get to play in all of it?\n\nThese are the thoughts that float through your head as you sit in the back of the…\n\nWait, where are you these days?\n\n*choice\n  #I'm taking classes at the local college by day, playing gigs by night.\n    *set reputation %-10\n    These are the thoughts that float through your head as you sit in the back of the classroom. You want to concentrate, especially with all the money your parents have spent on tuition in an effort to save you from your \"music and alcohol addiction,\" but all you can think about is what will happen when you hit the stage that night.\n    \n    Finally, after classes end, you head over to Casaba's, the local bar, to meet your brother.\n    *goto gigging\n  #I'm straight partying, broseph. That's right, I say things like \"broseph\" now.\n    *set reputation %+15\n    *set health %-15\n    You sure do. And, as an honorary member of—and house musician for—the local Sigma Sigma Sigma chapter, it's important for you to remain alert at all times for the unexpected prank, streaking run, or beer bong strike.\n    \n    This is one of those latter times. Your brother Casper, the president and official party planner of the tri-Sigs, has hoisted a beer bong up to your mouth, and the chants of \"Chug! Chug! Chug!\" begin to ring out. Fortunately, you snap out of your thoughts just in time to tilt your head up and consume your adult beverage. Mmm, tasty.\n    \n    After a few rounds, you climb to your feet and slap Casper on the back of his head.\n    \n    \"We have a gig. Let's go, broseph.\"\n    \n    The two of you wave goodbye and stumble down the road to Casaba's, your local watering-hole and entertainment venue where you and Casper play three times a week. It's called a \"standing set,\" which is ironic since you're usually passed out by the end of it.\n    *goto gigging    \n  #I'm busing tables before I hit the stage.\n    *set money +500\n    These are the thoughts that float through your head as you sit in the back of the room, folding napkins. Your parents tried to get you to go to college, but that would just take up precious song-memorizing space in your head. No, all you're concerned about is making a few bucks during the day and rocking every night. Luckily, you can do both of those things at Casaba's, the popular watering-hole and entertainment venue for the local college kids.\n    \n    When you finally finish folding, you take off your apron and meet Casper on the stage to set up for your gig. Time to rock!\n    \n    *goto gigging\n*label gigging\n\nEven though you've done dozens of these shows already, you still get goosebumps when you look down from the stage at the handfull of bar patrons. In just a few short years, you and Casper have grown from baby rockers, playing in the back of your garage, to young-adult rockers, gigging out for sparse crowds of inattentive drunks.\n\nOver the past few years, you two have spent more time together than you ever imagined.  Between practice, songwriting, performing, partying—it's been non-stop sibling bonding. What kind of relationship do you and Casper have?\n\n*choice\n  #Super-close. We genuinely enjoy each other's company.\n    *set casper %+10\n    *if gender = \"male\"\n      It's rare to find two siblings, let alone bandmates, that get along so well. You feel very fortunate to have Casper and hope to keep playing with him forever.\n      *goto launch\n    *else\n      It's rare to find two siblings, let alone bandmates, that get along so well. You feel very fortunate to have Casper and hope to keep playing with him forever.\n    *goto launch\n  #Professional. I, as the band leader, set the tone, and I expect him to follow.\n    *set musicianship %+15\n    *set casper %-10\n    You love your brother, but it would be silly to pretend you're equals. You are the talent, the creative force, the decision maker, and the face of this little duo. As long as Casper remembers that, you will get along great.\n    *goto launch\n  #Raging. A family that parties together, rocks together.\n    *set reputation %+10\n    And you do plenty of each. Still, you've managed to find a balance that works for both of you, allowing you to eat, sleep, and dream the rock-and-roll lifestyle. How long it will last is anyone's guess.\n    *goto launch\n*label launch\n\nTime for the show! You immediately launch into ${title1}, which has been refined into a tight and energetic crowd pleaser.\n\nAs per usual, you begin tearing up your ${instrument} while Casper still needs some time to shake the rust off. It's not that Casper is bad at his instrument, it's just that you're way better at yours. But what's wrong with that? You're the band leader, after all; you should be the best. Still, sometimes you wish you had a bandmate who worked harder and could push you just a bit more.\n\nHow do you respond to Casper's playing?\n*choice\n  #Give him an encouraging smile.\n    *set musicianship %-10\n    *set casper %+10\n    You shoot Casper an encouraging smile. Somewhat confused, he takes this as a signal to launch into an extended ${casper_instrument} solo. It doesn't sound great, but it seems to boost his ego.\n    *goto gigg\n  #Shoot him a disparaging look.\n    *set musicianship %+10\n    *set casper %-10\n    You shoot Casper a disparaging look, which you must have picked up from your mom over the years. It works. He immediately picks up his game, although he avoids looking at you for the rest of the set.\n    *goto gigg\n  #Don't respond. Just keep doing my thing.\n    As per usual, Casper finds his form on the next song, and the two of you are off and running.\n    *goto gigg\n\n*label gigg\nAfter a few covers, you move into another original number, one that you and Casper have been crafting for some time. This one is a…\n\n*choice\n  #Hard-rocking party anthem called \"Imbibe Your vibe.\"\n    *set title2 \"Imbibe Your Vibe\"\n    *set folksiness %-20\n    *goto gigging2\n  #Folksy acoustic number called \"Savannah Seasonal.\"\n    *set title2 \"Savannah Seasonal\"\n    *set folksiness %+20\n    *goto gigging2\n  #Poppy dancer called \"2 Heart 2 Dance.\"\n    *set title2 \"2 Heart 2 Dance\"\n    *set folksiness %-20\n    *set commercial %+15\n    *goto gigging2\n  #Abstract funk excursion called \"Birdz and Beez.\"\n    *set title2 \"Birdz and Beez\"\n    *set unique %+20\n    *goto gigging2\n    \n*label gigging2\n*set title2 \"\\\"${title2}\\\"\"\nThe crowd, made up of local students, drunken townies, and a handful of actual fans, digs your newest tune. Some of them even dance along!\n\nLooking out into the back of the smokey room, you notice a particularly well-dressed man watching your show. He's surrounded by a cadre of attractive young ${sexpref_men}, none of whom you recognize. This is odd, because there are very few attractive young ${sexpref_men} in the town who you wouldn't recognize.\n\nThe man seems somewhat bored, yawning and frequently checking his watch. In the middle of your climactic solo, he stubs out his cigarette and yells to the bartender to close his tab. How rude! What are you going to do about it?\n\n*choice\n  #Keep playing. I'm a professional, and it's not my job to tell the bar patrons how to act.\n    *set joey \"bored\"\n    *set health %+20 \n    This zen-like ability to filter out distractions bodes well for your future mental health. You finish the set with one of your standard, crowd-pleasing covers, then call it a night.\n    *goto post \n\n  #Call him out for being a prick. If I can't yell at people in the audience, there's no point in being on stage with a microphone in the first place.\n    *set reputation %+20\n    *if (stage_presence >= 60) or (unique >= 58)\n      *set stage_presence %+20 \n      *set joey \"impressed\"\n      \"Hey, old prick in the back!\" you shout. \"This isn't Bingo night at the retirement home. If you don't shut your trap, I'll come down there and shut it for you!\"\n      \n      That showed him! \n      *goto post\n    *else\n      *set stage_presence %+10\n      *set joey \"annoyed\" \n      \"Hey, old fogey in the back!\" you shout. \"Why don't you save all that talking for your next trip to talky town? You know, since you like talking so much…\"\n      \n      The crowd looks up at you with intense confusion. In the background, a choir of crickets sings to your awkwardness. The man in the back just shakes his head in your general direction.\n      \n      Finally, someone yells out, \"Free Bird!\" and the crowd starts laughing. You quickly count out the show closer, and you and Casper rip into your final song with aplomb, your face still red from your embarrassing attempt at stage intimidation.\n      *goto post\n\n  #Tear him a new one…with the power of rock!\n    \"Hey, old loser in the back!\" you shout. \"This one's for you!\"\n    *if musicianship >=57\n      *set improv %+20\n      *set joey \"impressed\"\n      *if instrument = \"guitar\"\n        You launch straight into the most scorching-est, fret-board-inflaming-est, thirty seconds of guitar soloing you've ever produced. The crowd is blown away. Even the old guy is forced to turn and watch, although his face betrays no emotions.\n        *goto post\n      *elseif instrument = \"bass\"\n        You launch straight into the funkiest, bass-thumping-est thirty seconds of soloing you've ever produced. The crowd is blown away. Even the old guy is forced to turn and watch, although his face betrays no emotions.\n        *goto post\n      *elseif instrument = \"keyboards\"\n        You launch straight into the most soaring thirty seconds of fleet-fingered keyboard finesse  you've ever produced. The crowd is blown away by your solo. Even the old guy is forced to turn and watch, although his face betrays no emotions.\n        *goto post\n      *else\n        You launch straight into a grinding, winding, exploding-your-mind-ing drum solo unlike anything you've ever produced before. The crowd is blown away. Even the old guy is forced to turn and watch, although his face betrays no emotions.\n        *goto post\n    *elseif musicianship \u003c=43\n      *set joey \"annoyed\"\n      *set improv %+10\n      You turn in a noodley, meandering solo, with quite a few flubs. Ouch. Better work on your musical skills before you try and use them to tear anything for anyone.\n      *goto post\n    *else\n      *set joey \"bored\"\n      You launch straight into a decent, perfectly respectable, solo, with just a couple flubs. You're not even sure if the guy in the back noticed, but the crowd seems to dig it anyway.\n      *goto post\n        \n*label post\n\n*if joey = \"impressed\"\n  After a couple more songs, you wish the crowd a good night and shuffle off stage. As you  and Casper pack up and decompress in the \"green room,\" aka the storage closet, Mickey, Casaba's manager, knocks on the door. He is a stout, high-strung man with a twitchy demeanor. As he speaks, his eyes dart around even more than normal.\n\n  \"Do you fellas know who that was in the back while you was performing? Do ya?\"\n\n  Apparently, Mickey doesn't subscribe to the concept of a rhetorical question. After a few long beats, Casper finally chimes in.\n\n  \"Um, no, Mickey. You gonna tell us?\"\n\n  \"Joey Orvietto!\"\n\n  Blank expressions were not what Mickey was looking for. He smacks his own forehead in annoyance.\n\n  \"Joey 'Greenbacks' Orvietto!? Don't tell me you don't know Joey 'Greenbacks' Orvietto!\"\n\n  \"Okay, Mickey,\" Casper replies. \"Don't worry, we won't tell you.\"\n\n  Mickey can't help but grin at your and Casper's naïveté.\n\n  \"I tell you, you kids are lucky you got me around, that's for sure. Joey Greenbacks is only one of the biggest record company executives in the world today. Any young musician worth his microphone cord would jump in front of traffic to play for Greenbacks, and you just did it without even knowing!\"\n\n  You and Casper look at each other in shock.\n  *page_break\n  \"Anyway, I was out back during your set. How'd it go? I hope well, because Greenbacks is a guy who could make or break your career.\"\n  \n  Talk about your bonehead moves! The one old guy you just happen to insult turns out to be some sort of big music honcho.\n  \n  Just then, as if this night could not get any worse, you spot the imposing figure of Joey \"Greenbacks\" Orvietto approaching from behind Mickey! Up close, he seems somehow younger and far more striking, with a white-trimmed seersucker suit, indoor shades, and a southern-California goatee.\n  \n  \"Excuse me, Mickey,\" Greenbacks says, placing a meaty hand on the diminutive manager's shoulder. \"Mind if I talk to these kids alone for a moment?\"\n  \n  \"Uh—sure thing, Joey, I mean Greenbacks, I mean Mr. Orvietto,\" Mickey exclaims. \"Whatever you want!\"\n  \n  He winks at you and Casper and then bolts down the hall. The smell of Joey's cologne and cigarette breath fill the room as he presses in and closes the door. He smiles enigmatically behind his sunglasses.\n  \n  \"Well, kids, I presume you know who I am now, yes? So what do you have to say for yourselves?\"\n  \n  *choice\n    #\"We're so sorry, Mr. Greenbacks. We never meant to insult you….\"\n      \"So now that you know who I am, you want to apologize all of a sudden? That's not very rock-and-roll of you, is it? Maybe you should think of getting into something tamer, like polka.\"\n      \n      You and Casper shuffle back and forth, unsure how to respond. Finally, Joey grins.\n      \n      \"Relax, it's a joke. Anyway, I enjoyed your show. You still have a while to go until you become a real band, but I wouldn't be surprised if our paths crossed again. Until then, keep working hard and keep out of trouble.\"\n          \n      *goto card \n    #\"We don't like people interrupting our songs. It's nothing personal.\"\n      *goto grin\n    #\"We're not scared of you, old man. So back off before we back you off!\"\n      Instead of being intimidated, Joey laughs in your face.\n      \n      \"Wow, you got some serious anger issues there, kiddo. I used to hang out in Keith Moon's hotel room; you think I'm intimidated by you? Anyway, I was just going to give you some advice, but it looks like you're the type who doesn't think ${gender_he} needs any. Let's see how far that takes you.\"\n      \n      *goto nocard\n    #Actually, I think I'd rather let Casper handle this one.\n      You try and signal Casper by gently elbowing him in the side.\n      \n      \"Ow!\" he yells. \"What was that for?\"\n      \n      You motion your head toward Joey, who's growing more impatient by the moment.\n      \n      \"Oh! You want me to answer him? Really?\"\n      \n      Joey rolls his eyes.\n      \n      \"I've seen some dumb musicians in my time, but you two are something else. I'm impressed you kids can dress yourselves in the morning.\"\n      \n      \"Um, thanks?\" Casper stutters. \"You see, Mr. Greenbacks, sir—\"\n      \n      \"Just call me Greenbacks,\" he interjects.\n      \n      \"Right. So, you see, Greenbacks, we're sorta new at this whole music thing, and if we'd known it was you, and if we'd known who you were, we most likely never woulda yelled at you from the stage like that.\"\n      \n      For a long moment Joey doesn't respond. He just stares at you. Finally, he breaks out into a wide grin. \n      \n      *label grin\n      \"Man, you guys are funny. And, as far as I can tell, you can play your instruments. Not a bad combination. You may just have what it takes to make it in this business–if you know how to listen and play your cards right.\"\n      \n      He looks down at his watch.\n      \n      \"You got two minutes. Ask me anything you want. Go.\"\n    \n      Wow, what an opportunity! What would you like to ask Joey?\n      *goto joey_qs\n\n*elseif joey = \"bored\"\n  After the show, you and Casper pack up in the \"green room\", aka the storage closet. Outside, you find Mickey, the club owner, chatting with the old man from the back of the bar. Knowing Mickey's spotty track record of paying performers, you idle around until he's finished to collect your check.\n  \n  Finally, when the old man leaves, Mickey walks over. He grins widely, his eyes bouncing back and forth even more than normal.\n  \n  \"Good show, kiddos! Must have been a treat to see ol' Joey Greenbacks sitting in for your set, eh?\"\n  \n  Apparently blank expressions were not what Mickey was looking for. He smacks his own forehead in annoyance.\n\n  \"Joey 'Greenbacks' Orvietto!? Don't tell me you don't know Joey 'Greenbacks' Orvietto!\"\n  \n  \"Okay, Mickey,\" Casper replies. \"Don't worry, we won't tell you.\"\n\n  Mickey laughs at your and Casper's naivete.\n\n  \"I tell you, you kids ain't the sharpest bulbs in the tool shed. Joey Greenbacks is only one of the biggest record company executives in [i]the world[/i] today. Any young musician worth his microphone cord would jump in front of traffic to talk to Greenbacks, and you just let him walk out of here without even shaking his hand!\"\n  \n  You and Casper look at each other in shock. What should you do?\n  *choice\n    #Run after him and hope to catch him in the parking lot.\n      You run out to the parking lot with Casper following close behind. You manage to catch Joey just as he is getting into his Mercedes.\n      \n      \"Excuse me, Joey–er, Mr. Orvietto–Greenbacks,\" you stammer, out of breath. \"I, I mean we, just wanted to say hi.\"\n      \n      He turns around and lowers his shades to look at you. You catch a whiff of his cologne and his cigarette breath as he stares you and Casper down.\n      \n      \"You two aren't awful,\" he finally says. \"But you're not good yet, either. Maybe one day you will be. You've got two minutes; ask me whatever you'd like.\"\n      \n      What do you want to ask Joey?\n      *goto joey_qs\n       \n    #Ask Mickey if he has his information and call him.\n      *set joey_card true\n      *achieve joeycard\n      \"Actually, now that you mention it, he did give me this business card for you two. He said you should only call him after you've got a full band together, with a demo album and a full month of touring under your belt. It's sure good that you asked, huh?\"\n      \n      He hands you Joey's business card. You and Casper stare reverently at it for a moment. Finally, you stick it in the most secure place you can think of:\n      *if instrument = \"drums\"\n        Your drum case. \n        \n        \"See you soon, little guy,\" Casper whispers to it as you safely tuck it away.\n        *goto auditions\n        \n      *else\n        Your ${instrument} case.\n        \n        \"See you soon, little guy,\" Casper whispers to it as you safely tuck it away.\n        *goto auditions      \n    #Nothing. I'm an artist. What do I need to talk to some stuffed suit for?\n      *set commercial %-20\n      *set unique %+10\n      Your commitment to your anti-commercial stance is admirable. It may make things somewhat harder for now, but, hopefully, one day you'll be able to cultivate an audience that feels the same way. \n      *goto auditions\n\n*else\n  *set commercial %-20\n  *set money -100 \n  As you finish up your set, you notice the old man in the back smirking to his cohorts. The bar's manager, Mickey, a short and sweaty man, chats him up while you and Casper pack your gear. He casts pensive looks in your direction.\n    \n  Knowing Mickey's spotty track record for paying performers, you wait around after you pack up to talk to him. Finally, he comes storming over to you. His eyes are darting around, even more than usual–he seems mad.\n    \n  \"Do you fellas have any idea how much trouble you're in? Do you?\"\n    \n  Apparently, Mickey doesn't subscribe to the concept of a rhetorical question. After a few long beats, Casper finally answers.\n    \n  \"Um, no, Mickey. How much?\"\n    \n  \"[i]A lot[/i]!\" he shouts, his face growing beet red. \"That man in the back you were bothering was Joey 'Greenbacks' Orvietto!\"\n    \n  Apparently blank expressions were not what Mickey was looking for. He smacks his own forehead in annoyance.\n    \n  \"Joey 'Greenbacks' Orvietto!? Don't tell me you don't know Joey 'Greenbacks' Orvietto!\"\n      \n  \"Okay, Mickey,\" Casper replies. \"Don't worry, we won't tell you.\"\n    \n  Seemingly defying the laws of nature, Mickey's face somehow grows even redder.\n    \n  \"He's only the biggest record-industry executive [i]in the world[/i], and you just managed to make him very angry, which in turn makes me very angry. Greenbacks wants to know why I'd allow bum musicians like you to play in my establishment, and, frankly, I don't have a good answer. As of now, I'm putting you on suspension: no payment for this week, no gigs for next week, and don't even think of coming back here until you've thought about what you've done and fully apologized. Got it!?\"\n    \n  How do you respond?\n    \n  *choice\n    #Contrite. He's right; it was my fault.\n      *set reputation %-10\n      \"You're right, Mickey. It was highly unprofessional of me. I'm sincerely sorry.\"\n        \n      Mickey sighs.\n        \n      \"Go on, get out of here. I'll see you next week.\"\n        \n      You leave that night knowing that you dodged a bullet, and you're grateful that you get to keep playing.\n        \n      *goto auditions \n    #Indignant. Who does he think he is?\n      *set reputation %+20\n      *set casper %-20\n      *set money -200\n      \"Last time I checked, Mickey, we already have a mom. So thanks for the lecture, but next time how about you shove it up your ass, all right?\"\n        \n      Casper lets out an audible gasp at your audacity. He stammers to cover for you.\n        \n      \"Sir–Mickey–I think what my ${gender_bro} was trying to say was…\"\n        \n      \"[b]Get out[/b]!\" Mickey screams. \"You're no longer allowed back here! I will make it my personal mission to make sure the only places in this town that let you perform are street corners and karaoke bars!\"\n        \n      You just laugh and walk away as Mickey continues to fume. On the ride home, Casper lays into you for your rash and destructive behavior. He may be right. Still, wasn't it worth it just to see the look on Mickey's stupid face?\n      *goto auditions\n               \n    #Measured. I'll apologize, but I won't mean it.\n      *set reputation %-5\n      *set money -100\n      *set casper %-10\n      \"Sure, Mickey, whatever you say. We're sorry. And maybe you might want to calm down a bit, you know, with your bad heart and everything. We'd hate to see anything happen to you. See you next week.\"\n        \n      Mickey takes a few deep breaths, calming himself.\n        \n      \"Make it two weeks. Now get out of here.\"\n        \n      Apparently, he wasn't thrilled with your apology. Neither was Casper. Still, you get to take a little break, and then it's back to playing. Not so bad, right?\n        \n      *goto auditions\n\n*label joey_qs\n*choice\n  *hide_reuse #\"How do we become famous rock stars?\"\n    *set mistake false\n    \"First, you gotta get a real band together. The two of you alone won't cut it. Then, you gotta decide whether to hit the road or cut an album. If you've generated enough buzz, it's a good idea to hit the road and capitalize on it. But if your musical chops are real sharp, then you might be better off recording the album so you can sell it when you begin touring.\"\n    *goto joey_qs\n  *hide_reuse #\"Should we get a manager? How do we get a manager?\"\n    *set mistake false\n    \"You'll need a manager eventually. If you are any good, one will find you soon enough.\"\n    *goto joey_qs\n  *hide_reuse #\"What are the biggest mistakes young rockers make that can hurt their careers?\"\n    *set mistake false\n    \"Good question. There are plenty of pitfalls for the young musical artist, and I've seen them all. The party lifestyle of alcohol, drugs, and groupies has claimed more than a few promising careers, not to mention lives. At the same time, this ain't the symphony. If you're all about playing your instruments, you'll never make it past the \"easy listening\" stations. You've got to do some living along with your playing, dig?\"\n    \n    \"I also see a lot of great bands that can't commit to one style. Maybe they're so good that they can play anything, but most of the time it means they won't find an audience. If you want to be huge, and I mean really huge,
