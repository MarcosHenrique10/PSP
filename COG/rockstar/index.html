<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choice of the Rock Star — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "rockstar", "title": "Choice of the Rock Star", "scenes": {"band_battle": "*temp fans\n*set fans false\n*temp vehicle\n*set vehicle \"undefined\"\n*temp collapse \n*set collapse false\n*set vehicle \"undefined\"\n*if v = true\n  *set band_member1 \"V\"\n  *goto set_size\n*elseif wendle = true\n  *set band_member1 \"Wendle\"\n  *goto set_size\n*elseif rory \n  *set band_member1 \"Rory\"\n  *goto set_size\n*elseif rosenblatts\n  *set band_member1 \"Barry Rosenblatt\"\n  *goto set_size\n*elseif uno = true\n  *set band_member1 \"Uno\"\n  *goto set_size\n*elseif sludge = true\n  *set band_member1 \"Sludge\"\n  *goto set_size\n*else\n  *set band_member1 \"Casper\"\n  *goto set_size\n\n*label set_size\n*if band_size = 3\n  *set other_members 2\n  *set other_members_text \"two\"\n  *goto start\n*elseif band_size = 4\n  *set other_members 3\n  *set musicianship %+10\n  *set other_members_text \"three\"\n  *goto start\n*elseif band_size = 5\n  *set stage_presence %+5\n  *set other_members 4\n  *set other_members_text \"four\"\n  *goto start\n*elseif band_size = 6\n  *set stage_presence %+15\n  *set other_members 5\n  *set other_members_text \"five\"\n  *goto start\n*elseif band_size = 7\n  *set stage_presence %+25\n  *set other_members 6\n  *set other_members_text \"six\"\n  *goto start\n*else\n  *set stage_presence %+35\n  *set other_members 7\n  *set other_members_text \"seven\"\n  *goto start\n\n*label start\n[i]Well, we were just another band out of Boston[/i]\n*line_break\n[i]On the road to try to make ends meet[/i]\n*line_break\n[i]Playing all the bars, sleeping in our cars [/i]\n*line_break\n[i]And we practiced right on out in the street[/i]\n*line_break\n[i]No, we didn't have much money[/i]\n*line_break\n[i]We barely made enough to survive[/i]\n*line_break\n[i]But when we got up on stage and got ready to play[/i]\n*line_break\n[i]People came alive[/i]\n*line_break\n–Boston\n*page_break\n\nIt's been six months since you formed ${band_name}. Six months of practicing nearly every day, of honing old songs and writing new ones. \n*if cohesion > 60\n  The chemistry between the ${band_size_text} of you is incredible. Even with all the time spent daydreaming and fantasizing about forming a band, you never imagined one as perfect as this.\n  *goto thisiswhy\n*elseif cohesion >= 45\n  And if the hard work and close confines led to some bumpy times between band members, you could also feel a bond forming.\n  *goto thisiswhy\n*else\n  With the hard work and close confines, the large personalities of the band clashed more than you had ever anticipated. You now realize that this group of talented musicians will need to get some real performances under its belt before it can truly be called a band. \n  *goto thisiswhy\n\n*label thisiswhy\n\nThis is why you are now so incredibly anxious to get your musical career started. I mean, in just a few more months, you will be twenty years old! That's middle-aged for rock stars. The window for your success is rapidly closing, and you're nowhere closer to getting your big break yet.\n\nLuckily, you think you have an idea where you could find it. A prestigious annual Battle of the Bands begins next week in St. Louis. Spots are typically impossible to come by, but luckily you have an in.\n*if sludge\n  Sludge's grandfather happens to play golf with one of the organizers and managed to secure you a spot!\n  *goto practice\n*if uno\n  Uno's grandfather happens to belong to a bridge club with one of the organizers and managed to secure you a spot!\n  *goto practice\n*else\n  One of the waitresses at Casaba's has a grandfather who happens to be in a church group with one of the organizers and managed to secure you a spot!\n  *goto practice\n\n*label practice\nOf course, once you're in, there will be no special treatment. You will have to earn the victory yourself—hence all the practicing.\n\n*if cohesion >= 50\n  *set musicianship %+25\n  Thankfully, your bandmates are all on the same page. It feels amazing to be surrounded by a group as insanely dedicated as you to making it as rock stars. Your practices are full of energy and concentration, which makes your playing sound amazing.\n  *goto fee\n*else\n  *set musicianship %-10\n  There's been some grumbling about all the practice time from the other members. You've learned that it is your job as band leader to motivate your bandmates to reach their peaks. And, when that fails, you just force them to keep playing anyway.\n  *goto fee\n\n*label fee\nThe other issue with the contest is money. For the winners, the prize is enormous: $10,000. You drool to think how your band could spend that money. But there is a $250 entrance fee to get into the contest.\n\nYou can pay the fee yourself, but it represents nearly all the money you have in the world. Do you spend your own money, or do you try to come up with it some other way?\n\n*choice\n  #I'm the band leader; I will pay it myself. With great power comes great responsibility.\n    *if casper >= 67\n      *goto casper_mensch\n    *else\n      *set money -250\n      *set cohesion %+20\n      Ouch. That takes a chunk out of the old piggy bank. Hope it pays off!\n      *goto rehearse\n  #I'll ask my band members to chip in. Since they stand to reap the benefits of winning, it's only fair.\n    *if casper >= 67\n      *goto casper_mensch\n    *elseif band_size \u003c= 5\n      *set money -100\n      *set cohesion %-25\n      Of course it's fair. That doesn't mean everyone else thinks so. There's a decent amount of complaining when it comes time to collect the cash. Still, it's better than ponying up all $250 yourself.\n      *goto rehearse\n    *else\n      *set money -50\n      *set cohesion %-15\n      Of course it's fair. That doesn't mean everyone else thinks so. Thankfully, your band is large enough that each of you only has to chip in a little bit. Unfortunately, this will hold true as well when the money moves in the other direction.\n      *goto rehearse\n  *if (casperquit = false) #I'll ask Casper to split the cost with me.\n    *if casper \u003c= 50\n      *set casper %-20\n      *set money -125\n      *set cohesion %+20\n      Casper's not so thrilled about this arrangement, but what else did you expect? After much prodding, he finally ponies up the $125.\n      *goto rehearse\n    *elseif casper \u003c= 65\n      *set money -125\n      *set cohesion %+20\n      Casper is less than thrilled, but he acknowledges that you can't pay for everything yourself.  After a little prodding, he ponies up the $125.\n      *goto rehearse\n    *else\n      *set cohesion %+20\n      Sometimes people can be very surprising, even your brother.\n      \n      \"You want me to chip in, little ${gender_bro}?\" he says. \"I'll do you one better; let me pay the whole entrance fee. I have some extra cash lying around from when I used to lend my body for scientific research, and you have been awesome about this whole band thing. I'm glad to help out.\"\n      \n      Wow! I guess there's a reason you keep that guy around. You graciously accept his offer.\n      *goto rehearse\n  #I don't want to spend all my money, but I also hate to ask the band. Time to bite the bullet and call the 'rents.\n    *set health %-10\n    *set musicianship %-10\n    *set reputation %-10\n    *set cohesion %+20\n    Wow, talk about your uncomfortable phone calls. Procuring the money involves an hour-long lecture about priorities and self-reliance, and this is even after saying the money is for paying rent. You are also blackmailed into promising that you will visit your grandmother at her upstate nursing home twice a week from now on, which will take away from your much-needed practice time. It's a miserable conversation, but at least it ends with their agreeing to send the money.\n    *goto rehearse\n    \n*label casper_mensch\n*set cohesion %+15\n*set casper %+15\nBefore you get the chance, Casper comes to you.\n\n\"Listen, little ${gender_bro}, I've been thinking,\" Casper begins, which usually prompts a reply of \"god help us,\" but this time he seems serious. \"You have been so awesome about this whole band thing, and I have some extra cash lying around from when I used to lend my body for scientific research, so why don't you let me handle the entrance fee?\"\n\nWow! I guess there's a reason you keep that guy around. You graciously accept his offer.\n*goto rehearse\n\n*label rehearse\n\nYou only have one more week until the big day! It's time to start crafting your set. You get to play three songs, plus one encore if you make it to the last round. Obviously ${title1} and ${title2} will make the cut, since those are your best and most polished numbers.\n\n*if folksiness > 60\n  Since coming together, your band has really honed in on a folksy sound, reminiscent of The Grateful Dead, Bob Dylan, and Simon and Garfunkel. Do you want to commit and choose two more folksy songs to fill out your set, or should you broaden your sound and try something else?\n  *choice\n    #Yes, let's go for a consistent sound across the board.\n      *set sound \"folksy\"\n      *set folksiness %+20\n      *set title3 \"Greta Don't You Leave Me\"\n      *set title4 \"Jammin' Jamboree\"\n      Excellent! While it may feel artistically limiting, your consistent sound should really help you attract a larger audience at The Battle.\n      \n      *if rory\n        *set cohesion %+10\n        *gosub rory\n        *goto practice2\n      *else\n        *goto practice2\n    #No, let's broaden our style and try something new.\n      *goto song_select\n*elseif unique > 60\n  Since coming together, your band has really honed in on a unique, off-kilter sound, reminiscent of Talking Heads, Frank Zappa, and early Pink Floyd. Do you want to commit and choose two more off-beat songs to fill out your set, or should you broaden your sound and try something else?\n  *choice\n    #Yes, let's go for a consistent sound across the board.\n      *set sound \"artsy\"\n      *set unique %+20\n      *set reputation %-20\n      *set title3 \"Two Peas and a Pod\"\n      *set title4 \"Clean X\"\n      Excellent! While it may feel artistically limiting, your consistent sound should really help you attract a larger audience at The Battle.\n      \n      *if band_size >= 5\n        *set stage_presence %+10\n        *goto practice2\n      *else\n        *goto practice2\n    #No, let's broaden our style and try something new.\n      *goto song_select\n*elseif improv > 60\n  Since coming together, your band has really honed in on a loose, highly improvisational style, reminiscent of The Grateful Dead, The Allman Brothers Band, and Little Feat. Do you want to commit and choose two more jammy songs to fill out your set, or should you broaden your sound and try something else?\n  *choice\n    #Yes, let's go for a consistent sound across the board.\n      *set sound \"jammy\"\n      *set improv %+20\n      *set style %-20\n      *set title3 \"Greta Don't You Leave Me\"\n      *set title4 \"Jammin' Jamboree\"\n      Excellent! While it may feel artistically limiting, your consistent sound should really help you attract a larger audience at The Battle.\n      *if band_size >= 5\n        *set stage_presence %+10\n        *set musicianship %+10\n        *if wendle\n          *set cohesion %+10\n          *gosub wendle\n          *goto practice2\n        *else\n          *goto practice2\n      *else\n        *if wendle\n          *set cohesion %+10\n          *gosub wendle\n          *goto practice2\n        *else\n          *goto practice2\n    #No, let's broaden our style and try something new.\n      *goto song_select\n*elseif folksiness \u003c 30\n  Since coming together, your band has really honed in on a bluesy, heavy rocking sound, reminiscent of Led Zeppelin, Black Sabbath, and ZZ Top. Do you want to commit and choose two more bluesy rockers to fill out your set, or should you broaden your sound and try something else?\n  *choice\n    #Yes, let's go for a consistent sound across the board.\n      *set sound \"heavy\"\n      *set folksiness %-20\n      *set title3 \"Hurricane Season\"\n      *set title4 \"If You Leave Me\"\n      Excellent! While it may feel artistically limiting, your consistent sound should really help you attract a larger audience at The Battle.\n      *goto practice2\n    #No, let's broaden our style and try something new.\n      *goto song_select\n*elseif (commercial > 50) and (reputation \u003c 60)\n  Since coming together, your band has really honed in on a poppy sound, reminiscent of The Beach Boys, The Monkees, and early Beatles. Do you want to commit and choose two more poppy songs to fill out your set, or should you broaden your sound and try something else?\n  *choice\n    #Yes, let's go for a consistent sound across the board.\n      *set sound \"poppy\"\n      *set style %+20\n      *set commercial %+20\n      *set title3 \"Luv with a You\"\n      *set title4 \"Under the Covers\"\n      Excellent! While it may feel artistically limiting, your consistent sound should really help you attract a larger audience at The Battle.\n      \n      *if rory\n        *set cohesion %+10\n        *gosub rory\n        *goto practice2\n      *elseif rosenblatts\n        *set cohesion %+10\n        *gosub rosenblatts\n        *goto practice2\n      *elseif V\n        *set cohesion %+10\n        *gosub v\n        *goto practice2\n      *else\n        *goto practice2\n    #No, let's broaden our style and try something new.\n      *goto song_select\n*elseif (((folksiness \u003c 40) and (reputation > 50)) and (commercial \u003c 55))\n  Since coming together, your band has really honed in on a loud, sloppy and energetic punk style reminiscent of The Clash, The Ramones, and The Sex Pistols. Do you want to commit and choose two more punk tunes to fill out your set, or should you broaden your sound and try something else?\n  *choice\n    #Yes, let's go for a consistent sound across the board.\n      *set sound \"punk\"\n      *set folksiness %-40\n      *set commercial %-30\n      *set reputation %+10\n      *set title3 \"Deviant Democracy\"\n      *set title4 \"Beer, Blaze, Brawl\"\n      Excellent! While it may feel artistically limiting, your consistent sound should really help you attract a larger audience at The Battle.\n      \n      *if sludge\n        *set cohesion %+10\n        *gosub sludge\n        *goto practice2\n      *elseif V\n        *set cohesion %+10\n        *gosub v\n        *goto practice2\n      *else\n        *goto practice2\n    #No, let's broaden our style and try something new.\n      *goto song_select\n*else\n  *set sound \"indie\"\n  *set commercial %-15\n  *set unique %+15\n  *achieve avoidlabel\n  Since coming together, your band has played an eclectic mix of songs but hasn't solidified around a single sound yet. For now that makes you an \"indie\" band, meaning you're independent of major-record-label genres…but hopefully not of their profits.\n  *goto song_select\n          \n*label song_select\nHaving a broader sound allows you more artistic freedom but puts more pressure on you to knock every song out of the park. What type of songs would you like to add to get your set of up to four songs?\n*choice\n  #Poppy songs.\n    *set commercial %+20\n    *set style %+20\n    *set title3 \"Luv with a You\"\n    *set title4 \"Under the Covers\"\n    Awesome! As it turns out, you've been working on a catchy little pop number called \"Luv with a You\" and another ballad called \"Under the Covers.\" You decide to practice these, along with your first two songs. \n    *goto practice2\n  #Folksy songs.\n    *set folksiness %+20\n    *set improv %+20\n    *set style %-20\n    *set title3 \"Greta Don't You Leave Me\"\n    *set title4 \"Jammin' Jamboree\"\n    Awesome! As it turns out, you've been working on an acoustic crooner called \"Greta Don't You Leave Me\" and a bluegrass dancer called \"Jammin' Jamboree.\" You decide to practice these, along with the other two songs.   \n    *goto practice2\n  #Rocking songs.\n    *set folksiness %-20\n    *set improv %-20\n    *set title3 \"Hurricane Season\"\n    *set title4 \"If You Leave Me\"\n    Awesome! As it turns out, you've been working on a heavy rocker called \"Hurricane Season\" and a searing ballad called \"If You Leave Me.\" You decide to practice these, along with the other two songs.\n    *goto practice2\n  #Artsy songs.\n    *set unique %+20\n    *set improv %-20\n    *set reputation %-20\n    *set title3 \"Two Peas and a Pod\"\n    *set title4 \"Clean X\"\n    Awesome! As it turns out, you've been working on a funky little number called \"Two Peas and a Pod\" and a polyrhythmic rocker called \"Clean X.\" You decide to practice these, along with the other two songs.\n    *goto practice2\n  #Punk songs.\n    *set folksiness %-40\n    *set reputation %+20\n    *set commercial %-30\n    *set title3 \"Deviant Democracy\"\n    *set title4 \"Beer, Babes, Brawl\"\n    Awesome! As it turns out, you've been working on a hard-edged, anti-establishment number called \"Deviant Democracy\" and a stripped-down party rocker called \"Beer, Babes, Brawl.\" You decide to practice these, along with the other two songs.\n    *goto practice2  \n  #My music doesn't conform to your labels, man.\n    *achieve avoidlabel\n    *set commercial %-40\n    *set style %-20\n    *set sound \"indie\"\n    No problem! Your band can be what some underground music fans call \"indie.\" It sets up a harder road to success, but ultimately you will be able to do it on your own terms. All that matters is that the audience responds to…whatever it is you're doing. \n    \n    So what would you like to call your first new song?\n    *input_text title3\n    And how about your fourth song?\n    *input_text title4\n    Great, you've added ${title3} and ${title4} to your upcoming set!\n    *goto practice2\n    \n*label practice2\n*set title3 \"\\\"${title3}\\\"\"\n*set title4 \"\\\"${title4}\\\"\"\n\nDuring the few hours this week when you're not practicing, how do you spend your time?\n*choice\n  #Party with the band.\n    *set reputation %+20\n    *set cohesion %+20\n    *set health %-10\n    Partying together after a long day of practice certainly takes the edge off. You notice that some of your band members seem to over-indulge,\n    *if reputation >= 60\n      but, of course, no one can keep up with you. The unfortunate few who try end up with wicked hangovers to fight during practice, while you remain bright-eyed and bushy-tailed. For how long will your body allow you to bounce back like this? Your guess: Forever.\n      *set problem \"you\"\n      *goto dress\n    *elseif (casperquit = false) and (band_member1 != \"Casper\")\n      particularly Casper, who seemingly can drink his weight in beer. He seems to rebound pretty well for now, but you can see it becoming a problem down the road.  \n      *set problem \"Casper\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      *goto dress\n    *elseif (sludge = true) and (band_member1 != \"Sludge\")\n      particularly Sludge, who seemingly can drink her weight in tequila. She seems to rebound pretty well for now, but you can see it becoming a problem down the road.\n      *set problem \"Sludge\"\n      *set problem_he \"she\"\n      *set problem_him \"her\"\n      *set problem_his \"her\"\n      *goto dress\n    *else\n      particularly Uno, who seemingly can drink his weight in whiskey. He seems to rebound pretty well for now, but you can see it becoming a problem down the road.\n      *set problem \"Uno\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      *goto dress \n  *if (casperquit = false) #Party with my bro.\n    *set cohesion %-10\n    *set casper %+20\n    *set health %-10\n    In any situation, you can count on big bro to bring the party. And after long days of endless practicing, some family time is just what the doctor ordered.\n    *if reputation >= 65\n      *set problem \"you\"\n      Unfortunately, it also seems you ordered far more tequila than one person should attempt to drink. You wake up with a massive headache but manage to shake it off and show up to practice bright-eyed and bushy-tailed. For how long will your body allow you to bounce back like this? Your guess: forever.\n      *goto dress \n    *else\n      Unfortunately, it also seems Casper drank far more tequila than one person should imbibe. He shows up to practice with a massive hangover. He seems to rebound pretty quickly for now, but you can see it becoming a problem down the road.\n      *set problem \"Casper\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      *goto dress       \n  #Do promotional work to drum up an audience.\n    *set buzz %+25\n    *set cohesion %+15\n    *set fans true\n    After practice, you head out to plaster the town and campus with flyers for the show. Pretty soon it becomes clear that all of your fans want to come support you; they're even going to rent a bus to bring all of them to the city! The extra support should be a huge boost to the band's confidence.\n    \n    Of course, along with fans comes partying.\n    *if reputation >= 65\n      *set health %-20\n      You can't even make it through one night in the week leading up to the show without finding yourself blacking out from your raucous partying. But being the life of the party is a part of the job, and you take it very seriously.\n      *set problem \"you\"\n      *goto dress\n    *elseif (casperquit = false) and (band_member1 != \"Casper\")\n      While you try to take it easy to prepare for the show, Casper seems to have other ideas. He takes being the life of the party very seriously, and you find him blacked out nearly every night. You're hoping this won't become a problem, at least not until after The Battle.  \n      *set problem \"Casper\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      *goto dress\n    *elseif (sludge = true) and (band_member1 != \"Sludge\")\n      While you try to take it easy to prepare for the show, Sludge seems to have other ideas. She takes being the life of the party very seriously, and you find her blacked out nearly every night. You're hoping this won't become a problem, at least not until after The Battle.\n      *set problem \"Sludge\"\n      *set problem_he \"she\"\n      *set problem_him \"her\"\n      *set problem_his \"hers\"\n      *goto dress\n    *else\n      While you try to take it easy to prepare for the show, Uno seems to have other ideas. He takes being the life of the party very seriously, and you find him blacked out nearly every night. You're hoping this won't become a problem, at least not until after The Battle.\n      *if uno = false\n        *bug Uno is the problem, but Uno isn't in the band!\n      *set problem \"Uno\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      *goto dress \n  #\"Hours when we're not practicing?\" Sorry, that does not compute.\n    *set cohesion %-25\n    *set reputation %-10\n    *set musicianship %+25\n    Every minute not practicing before The Battle is a minute wasted. At least that's how you feel. After days of being worked endlessly, some of your band members' grumblings have reached new highs. \n    *if (((casperquit = false) and (casper \u003c= 70)) or ((casperquit = false) and ((Sludge = false) and (Uno = false))))\n      *set casper %-25\n      *set problem \"Casper\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      Casper, in particular, cannot handle so much practicing. You notice he's self-medicating by taking swigs of tequila from a flask. You realize this will probably need to be dealt with soon, but you want to get through The Battle first.\n      *goto dress\n    *if (casperquit = false)\n      *set band_member1 \"Casper\"\n    *if sludge\n      *set problem \"Sludge\"\n      *set problem_he \"she\"\n      *set problem_him \"her\"\n      *set problem_his \"her\"\n      Sludge, in particular, cannot handle so much practicing. You notice she's self-medicating by taking swigs of tequila from a flask. You realize this will probably need to be dealt with soon, but you want to get through The Battle first.\n      *goto dress \n    *else\n      Uno, in particular, cannot handle so much practicing. You notice he's self-medicating by taking swigs of tequila from a flask. You realize this will probably need to be dealt with soon, but you want to get through The Battle first.\n      *if (Uno=false)\n        *bug Uno is the problem, but Uno isn't in the band!\n      *set problem \"Uno\"\n      *set problem_he \"he\"\n      *set problem_him \"him\"\n      *set problem_his \"his\"\n      *goto dress \n  \n*label dress\n\nWhen the big day finally arrives, you and your band hop into a \n*if band_size \u003c= 5\n  *set money -40\n  *set vehicle \"van\"\n  rental van, into which you somehow manage to cram all of your gear. $!{problem} decided it would be a good idea to paint \"${band_name} Rules!\" on the side of the van, which certainly attracts some attention driving down the highway. But you make it to the venue without incident.\n  \n  *goto dress2\n*else\n  *set vehicle \"bus\"\n  *set money -100\n  rented school bus. It's expensive, but you have no other choice with the size of your band.\n  *if money \u003c 50\n    *set cohesion %-25\n    Unfortunately, you don't have enough money to pay for your share of the bus-rental fee, so your band members are forced to pick up the slack. They're not thrilled about it, especially since ${problem} decided it would be a good idea to paint \"${band_name} Rules!\" on the side of the bus, which will certainly drive up the rental fee. But you make it to the venue in one piece.\n\n    *goto dress2\n  *else\n    Also, ${problem} decided it would be a good idea to paint \"${band_name} Rules!\" on the side of the bus, which certainly attracts some attention driving down the highway. But you make it to the venue in one piece.\n    \n    *goto dress2\n\n*label dress2\nYou arrive at The Goodtime Forum and Playhouse as the crew is setting up for the show. It's the largest venue you've ever been in. Legends such as The Doors, Elvis Presley, and The Jackson 5 all passed through here on the way to performing at much larger venues. Still, you are stoked and maybe even a little nervous.\n\nWhat is your pre-show plan?\n*choice\n  #Set up immediately and begin rehearsing.\n    *set musicianship %+15\n    *set reputation %-10\n    You tell everyone to get their gear set up early for soundcheck, so you can try and squeeze out some extra minutes of rehearsal before showtime. \n    *goto problem \n  #Take a look around the venue, drink in the views, and then get to rehearsing.\n    *set health %+10\n    *set stage_presence %+10\n    Gazing up at the stage from different vantage points around the venue helps you to \"connect with the space,\" which is a fancy way of saying you will know how to transmit the maximum amount of rock to all members of the audience. \n    \n    As soon as you're done strolling around the room, you tell your bandmates to get their gear set up early for soundcheck, so you can try and squeeze out some extra minutes of rehearsal before showtime. \n    *goto problem\n  #Break out some refreshments to help take the edge off.\n    *set health %-20\n    *set stage_presence %+15\n    *set reputation %+20\n    Yes, a few drinks, followed by a few more, should provide a nice confidence-booster to help you overcome your nervousness and connect with the audience. This may not be the doctor-recommended method for tackling pre-show jitters, but it sure does the trick.\n    \n    By the time you're done indulging, you find you're running late for your soundcheck. You're able to salvage a few minutes of playing time before making room for the next band. This could have been a disaster if any problems crept up, but fortunately your instruments and gear are in working order. \n    *goto show\n  *if (fans = true) #Party with my fans that came all the way out here to see us.\n    *set buzz %+10\n    *set health %-10\n    *set reputation %+15\n    *set musicianship %-10\n    *set cohesion %-10\n    *set stage_presence %+15\n    Some of these fans have been watching you and partying with you since Casper and you were doing sets at Casabas. Are you really going to stay backstage and leave them hanging before the show?\n    \n    Of course not. You have an excellent time partying with your fans, and they are more pumped than ever to support you. You even gain some brand-new fans as others join the party. Unfortunately, with all the pre-show good times, you completely forget about soundcheck. The organizers are pretty pissed; there's talk of pulling you from the show!\n    \n    Fortunately, ${band_member1} steps up and handles the situation, apologizing for your behavior and promising the band will be ready to play come showtime. Your bandmates are pretty peeved at you, but mostly everyone's just glad you weren't pulled.\n    *goto show\n    \n*label problem\n*if problem = \"you\"\n  *set cohesion %-15\n  Unfortunately, there's a problem. Your partying throughout the week catches up with you at the most inopportune time: on the way to the venue this morning. You begin to feel dizzy and lightheaded, and, soon, you must lie down for fear of falling down.\n  \n  Your bandmates rush over to find you nearly passed out by the bathroom. Soundcheck is in five minutes. What do you tell them?\n  \n  *fake_choice\n    #\"Go soundcheck without me. I'll hydrate and pull myself into shape for the show.\"\n    #\"Pull me to my feet, prop me up against something solid, and let's go.\"\n    #\"After we get through this, promise me you will never let me drink again. I'm done partying; from now on, I'm just about the music.\"\n  That sounded fantastic in your head, but when you opened your mouth to speak, it sounded more like a dying mountain goat. $!{band_member1} forces some water and Tylenol down your throat, and soon enough you are able to stand on your own two feet again—but for how long?\n  \n  *if instrument = \"drums\"\n    In times like these, you are incredibly grateful you decided to become a drummer. Your bandmates help you onto your stool in time for soundcheck, and you are able to commence with the rhythm-making. Once soundcheck is done, you fall back into the fetal position and try to gather your energy for the show. No, this isn't your proudest moment, but it's what happens when you step on stage that matters in the end, right?\n    *goto show\n  *else\n    In times like these, you really wish you had become a drummer; at least then you'd have somewhere to sit. You manage to make it through soundcheck, leaning against the microphone stand, then collapse back to the ground as soon as it's over. No, this isn't your proudest moment, but it's what happens when you step on stage that matters in the end, right?\n    *goto show\n*else\n  Unfortunately, there's a problem. As you begin setting up, you notice that ${problem} has gone missing. It seems ${problem_he} over-indulged a bit on the ride to the venue and has now passed out on the floor of the dressing room. \n  \n  What's the plan here, band leader?\n  *fake_choice\n    #\"Let ${problem_him} recover while we soundcheck, then work on getting him ready for the the show.\"\n    #All that matters is that ${problem_he} can play tonight. We can't go on without ${problem_him}.\"\n    #\"This is ${problem_his} problem. The show must go on—with or without ${problem_him}.\"\n  Fortunately, ${problem} recovers in time to join you for the end of soundcheck, and, despite some close calls, manages not to puke on anyone. You slowly coax ${problem_him} back to shape before the show, but you remain nervous to see how ${problem_he} will perform.\n  *goto show\n\n*label show\n\nThe lights go down, and the first band takes the stage. You spend your time scoping out the competition and listening to the different bands' sets. Some of them are fair to mediocre, but others are impressive. \n\nThere are even a few bands that sound like nothing you've ever heard before: Ironside, an indie band from England, play an entirely instrumental brand of music called \"Post-rock\"; Horny Toads, a nine-member outfit from New York City, feature a horn-based Jamaican-tinged sound called \"Ska\"; and The Scientists, a long-haired foursome from Seattle, exhibit an angsty, distortion-heavy form of rock they call \"Grunge.\"     \n    \nFinally, your time comes. You wait in the wings for the eclectic German polka-punk outfit Later Hose to finish its set, then you finally step out onto the stage.\n\n*if fans = true\n  *set stage_presence %+20\n  The cheers that welcome you onto the stage are deafening. Your fans are going wild, hooting and shouting before you've even played your first note. It's good to have fans.\n  *goto showtime\n*elseif buzz \u003c 55\n  Unfortunately, your band's lack of exposure means there are no cheers to greet you. No one here has ever heard of you. That's okay; in just a few minutes' time, you will make sure they never forget you.\n  *goto showtime\n*else\n  *set stage_presence %+10\n  A smattering of cheers from your loyal fans, who followed you all the way to the show, greet you as you walk onstage. It's a small portion of the crowd, but it means everything to you. Now it's time to make some new fans.\n  *goto showtime\n\n*label showtime\n\nYou gaze out, past the bright lights, into the sea of people. It's the largest audience you've ever had; there may be close to 500 people here! A radio microphone points up at the stage, and a cluster of still and video cameras follow you from the middle of the floor.\n\n*if stage_presence > 65\n  *set buzz %+10\n  Yet, somehow, you feel completely calm. You've been practicing for this moment your entire life. Now the only thing left to do is\n  *label sit_down \n  *if (instrument = \"drums\") or (instrument = \"keyboard\")\n      sit down at your ${instrument} and get ready to play. You smile toward the audience, and you can feel their eyes fixated on you, awaiting your first notes.\n      \n      *goto start_play\n  *else\n      pick up your ${instrument} and get ready to play. You smile toward the audience, and you can feel their eyes fixated on you, awaiting your first notes. \n      \n      *goto start_play\n*elseif (fans = true) and (buzz >= 55)\n  Yet, somehow, you feel an intense sense of confidence. All these people are here to watch you, to cheer for you, to worship you. You were born for this moment!\n  \n  *goto start_play \n*elseif cohesion > 60\n  *set health %+15\n  *set stage_presence %+10 \n  As you step to your ${instrument}, an intense nervousness overtakes over you. For a moment, you feel an urge to turn and run away as fast as you can. \n  \n  But when you look around at your bandmates, you suddenly feel calm again. You realize that, although it's only been a matter of months, you've grown to trust these ${other_members_text} people more than anyone you've ever known. So even if you suck, at least you'll all suck together. That's what being a band is all about, right?\n  *goto start_play\n*elseif musicianship >=65\n  *set stage_presence %+10\n  As you look out at all those people, an intense nervousness overtakes over you. For a moment, you feel an urge to turn and run away as fast as you can. \n  \n  But when you step up to your ${instrument}, you suddenly feel calm again. It's just you and your best friend in the world, the one who you've spent more time with than anyone. As long as you're together, what could possibly go wrong? \n  *goto start_play\n*else\n  It's a tad overwhelming, but you do everything you can to try and calm yourself. The only thing left to do is\n  *goto sit_down\n\n*label start_play\n\nBefore you even know it, you are launching into ${title1}.\n*if (casperquit = false)\n  *set stage_presence %+10\n  *set performance +1\n  Casper looks over at you, smiling from his ${casper_instrument}. You smile back. This is the first song the two of you ever wrote together. Despite all of the ups and downs in your relationship, it feels amazing be onstage together, years later, performing for so many people. The energy between you powers ${title1} to new heights.\n  *goto song2\n*elseif musicianship >65\n  *set performance +1\n  This is the first song you ever wrote, the one you've been practicing for so long that the notes just pour out of your body and through your hands without even having to think about it. The countless hours of practice have given you the gift of complete musical freedom, and it feels great to exercise it on this song.\n  \n  As you look over at your bandmates, part of you still expects to find Casper grinning like a goof at you from behind his ${casper_instrument}. You fight hard to push away any lingering feelings of regret so you can fully concentrate on the task at hand.\n  *goto song2\n*else\n  This is the first song you ever wrote, and it feels special to begin the show with it. The familiar tune eases you into the set, helping you settle into a groove.\n  \n  As you look over at your bandmates, part of you still expects to find Casper grinning like a goof at you from behind his ${casper_instrument}. You fight hard to push away any lingering feelings of regret so you can fully concentrate on the task at hand.\n  *goto song2\n  \n*label song2\n\nAfter the crowd reacts strongly to your first offering, you smoothly transition into ${title2}. Another classic cut from the days of just you and Casper, this one keeps the energy going.\n\n*if problem = \"you\"\n\n  Unfortunately, about halfway through the song, you begin to feel sick again. All the adrenaline and excitement of being on stage wears off, leaving you with a growing dizziness and nausea. What should you do?\n  *choice\n    #Tone down the energy a bit. This set is a marathon, not a sprint.\n      *set health %+10\n      *set stage_presence %-15\n      *set reputation %-10\n      *if health \u003c= 45\n        *goto collapse \n      *elseif instrument = \"drums\"\n        It seems, with the chemicals coursing through your body, you have overexerted yourself just a bit. You take some deep breaths and slump onto the snare drum. After a few beats, your stomach settles down, and your urge to hurl diminishes. You decide to take it easier for the rest of the set, saving your energy for the most important moments.\n        *goto song3\n      *else \n        It seems, with the chemicals coursing through your body, you have overexerted yourself just a bit. You take some deep breaths and lean against the microphone stand. After a few beats, your stomach settles down, and your urge to hurl diminishes. You decide to take it easier for the rest of the set, saving your energy for the most important moments.\n        *goto song3\n    #Power through. I wanted to be a rock star, right? This is what it's all about.\n      *set stage_presence %+10\n      *set reputation %+10\n      *set musicianship %-10\n      *set health %-20\n      *set performance +1\n      *if health \u003c= 45\n        *goto collapse\n      *else\n        Through sheer force of will, you command your stomach to settle down and obey. The swirling lights add another distraction, but your\n        *if instrument = \"drums\"\n          rhythmic limbs push forward anyway, laying down the high-powered beats the rest of the band needs to rock the house.\n          *goto song3\n        *else\n          nimble fingers push forward anyway, laying down those high-powered ${instrument} licks that make the crowd scream.\n          *goto song3\n    #Take a swig of water. A hydrated rocker is a healthy rocker.\n      *set health %+20\n      *if health \u003c= 30\n        *goto collapse \n      *else\n        An excellent, health-conscious decision. During the song's bridge, you reach back and take a long swig from your water bottle. Immediately, your stomach settles down, and you are at full rocking capacity once again.  \n        *if fans\n          *set buzz %+15\n          Even better, your fans just assume you are chugging vodka on stage! This will only add to your growing reputation for bad-assery.\n          *goto song3 \n        *else\n          *set reputation %-10\n          *goto song3\n    #Take a swig of beer. A happy rocker is a healthy rocker.\n      *set health %-15\n      *set reputation %+20\n      *if health \u003c=30\n        *goto collapse \n      *elseif fans\n        *set buzz %+15\n        *goto song3\n      *else\n        That's an interesting piece of logic, but somehow the beer does seem to settle your stomach down and allow you get back to full rock strength. Maybe the reason you felt so crummy before wasn't too much beer, it was not enough beer. Yes, that makes sense.\n        *goto song3 \n*else\nAbout halfway through the song, you notice ${problem} beginning to falter a bit. $!{problem_he} is having trouble keeping up with the tempo, and when you look over you see that ${problem_his} face is quickly turning a color that reminds you of your mother's pea soup. What do you do?\n\n*choice\n  #We're going to power through this. $!{problem_he} must make it through the set!\n    *if cohesion \u003c 50\n      *goto prob_collapse\n    *else\n      *set stage_presence %+10\n      *set performance +1\n      You look over at ${problem} and flash ${problem_him} the universal signal for \"rock on!\" Although ${problem_he} looks like he could collapse any minute, ${problem_he} heeds your advise and bravely soldiers on. Meanwhile, you step up your game to cover for ${problem_his} diminished capacities.\n      *goto song3\n  #Tone the energy down a bit to help ${problem_him} out.\n    *if cohesion \u003c 38\n      *goto prob_collapse\n    *else\n      *set musicianship %+10\n      *set cohesion %+10\n      You use the bridge to slide into a slower tempo, which helps ${problem} keep up and make it through the song. It's unclear if the audience notices, but your band members appreciate your deft leadership.\n      *goto song3\n  #After the song, bring ${problem_him} some water.\n    *if cohesion \u003c 38\n      *goto prob_collapse\n    *else\n      *if (musicianship >= 60) and (improv >= 55)\n        *set performance +1\n        *set cohesion %+20\n        It's a close call, as ${problem} barely makes it to the end of the song. But thanks to your mastery of the ${instrument}, you let off a blistering solo that not only covers for ${problem} but also raises the song to unforeseen heights. The audience, sensing the improvised nature of your creative explosion, responds with great enthusiasm.           \n \n        Before the next song, you bring a bottle of water and a cold towel over to ${problem}. After a few deep breaths, ${problem_his} face returns to its normal color, and ${problem_he} flashes you the universal symbol for \"rock on!\" You breathe a sigh of relief and cue up the next song.\n        *goto song3\n      *else\n        *set stage_presence %-10\n        It's a close call, as ${problem} barely makes it to the end of the song. You take a long break to allow ${problem} to recover, during which the crowd begins to grow restless. Finally, after some sips of water and deep breaths, ${problem}'s face returns to its normal color, and ${problem_he} flashes you the universal symbol for \"rock on!\" You breathe a sigh of relief and cue up the next song.\n        \n        *goto song3  \n  #After the song, bring ${problem_him} some beer.\n    *if cohesion \u003c 55\n      *goto prob_collapse\n    *else\n      *if (musicianship >= 60) and (improv >= 55)\n        *set performance +1\n        *set cohesion %+20\n        It's a close call, as ${problem} barely makes it to the end of the song. But thanks to your mastery of the ${instrument}, you let off a blistering solo that not only covers for ${problem} but also raises the song to unforeseen heights. The audience, sensing the improvised nature of your creative explosion, responds with great enthusiasm.\n         \n        Before the next song, you bring  a cold towel and a cold beer over to ${problem}. After chugging the beer, ${problem_his} face returns to its normal color and ${problem_he} flashes you the universal symbol for \"rock on!\" Is it a problem that ${problem} requires beer to perform? Maybe, but that's a worry for another time. For now, you breathe a sigh of relief and cue up the next song.\n        *goto song3\n      *else\n        *set stage_presence %-10\n        It's a close call, as ${problem} barely makes it to the end of the song. You take a long break to allow ${problem} to recover, during which the crowd begins to grow restless. Finally, after chugging a bottle of beer, ${problem_his} face returns to its normal color and ${problem_he} flashes you the universal symbol for \"rock on!\" Is it a problem that ${problem} requires beer to perform? Maybe, but that's a worry for another time. For now, you breathe a sigh of relief and cue up the next song.\n        *goto song3       \n\n*label song3\n          \nHeading into your last two songs, you can feel the audience settling into your groove. \n*if fans = true\n  *set performance +2\n  All the fans that came along for the trip are definitely helping the energy. Even though they've never heard ${title3} before today, they catch on quickly and are belting out the chorus by the end. From where you're\n  *if instrument = \"drums\"\n    sitting,\n  *if instrument != \"drums\"\n    standing, \n  it makes all the difference in the world.\n  *goto song4\n*elseif ((musicianship > 65) and (stage_presence >65)) and ((sound != \"jammy\") or (sound != \"punk\"))\n  *set performance +2\n  *set buzz %+25\n  It starts in the front row and emanates backwards. Soon, it feels like the entire crowd is locked in and hanging on your every note, as if they're lifelong fans. It's an amazing feeling, and it tells you that everything you've done to reach this point has paid off.\n  *goto song4\n*else\n  You lay down a sharp rendition of the song, then prepare for the big set-closer.\n  *goto song4  \n  \n*label song4\n\nAs you charge into your fourth and final song, ${title4}, you focus yourself on letting out every last drop of energy you have stored within you.\n*if sound = \"folksy\"\n\n  *set performance +1\n  It's clear your unique mix of folk, Americana, and rock really resonates with the crowd. It gives you great confidence to know that you've found a sound that you enjoy playing, and that the audience enjoys hearing. \n  *goto results\n*elseif sound = \"poppy\"\n\n  *set performance +2\n  It's clear your indelibly catchy pop-rock really resonates with the crowd. The young teens are especially going for it, jumping around and dancing to your groovy rhythms. It gives you great confidence to know that you've found a sound that you enjoy playing, and that is commercially viable.\n  *goto results\n*elseif sound = \"jammy\"\n\n  It's clear your jammy musical style doesn't resonate equally with everyone. As you settle into the fourth guitar solo in the 12th minute of ${title4}, many audience members are growing noticeably bored.\n  *if (musicianship >= 65) and (improv >=55)\n    *set buzz %+15\n    *set performance +1\n    Your virtuoso playing skills, however, do not go unappreciated by all. A small but potent contingency has gathered in the front, hanging on your every note. It's their energy that gives you the confidence to dig ever deeper into your musical exploration.\n    *goto results\n  *else \n    *goto results\n*elseif sound = \"heavy\"\n\n  *set performance +1\n  It's clear your heavy rock sound really resonates with the crowd. It gives you great confidence to know that you've found a sound that you enjoy playing, and that is commercially viable.\n  *goto results\n*elseif sound = \"punk\"\n\n  *set performance -2\n  *set buzz %+25\n  It's clear your punk style is dividing the audience. Some of the rowdier members have begun dancing with frenetic energy, violently mashing their bodies together to become a sort of \"mashing pit\" in the middle of the audience. Meanwhile, many others in the audience have responded by moving away from the stage, clearly taken aback by the rowdiness on display.\n  \n  How do you respond?\n  *choice\n    #No response needed. Let the audience respond however they'd like; our job is to play.\n      *set stage_presence %-10\n      *set reputation %-10\n      *set cohesion %+15\n      *set musicianship %+10\n      You professionalism is admirable, but this is punk for godssakes! Thankfully, ${band_member1} steps up to the plate with a nasty stage dive, driving the mashing contingency wild. It's actually a perfect scenario: you keep playing, while ${band_member1} works the crowd.\n      *goto results\n    #Hold my ground. Politely tell the paying customers in the back to go shove it.\n      *set reputation %+15\n      *set buzz %+10\n      And so you do, in so many words. It's amazing how well those four-letter words fit between verses of ${title4}, almost like you wrote it that way. As expected, your words only divide the audience further, prompting more cheers from the front and boos from the back. Their conflicting energies erupt like a storm clowd, and for a moment it seems like a riot might break out. But you make it to the end of the song without incident.\n      *goto results\n    #Make a statement. And there's only one appropriate for the situation: I will launch my body off the stage at full speed and hope to land in one of the softer spots of said \"mashing pit.\"\n      *set health %-20\n      *set reputation %+20\n      *set buzz %+20\n      *set stage_presence %+25\n      It's only about halfway through your flight, as you recognize that your current trajectory is sending your face directly into someone's flailing, tattooed elbow, that you begin to question your decision. \n      \n      Thankfully, these rowdy dancers are more aware and agile than you gave them credit for. They grab your booty out of the air and send you surfing on their outstretched hands back to the stage. Meanwhile, the rest of the band keeps playing, bringing the song to a peak just in time for you to get to your ${instrument} and finish things off. Nice way to end the proceedings.\n      *goto results\n*elseif sound = \"artsy\"\n\n  *set performance -1\n  While the crowd has appreciated your musical abilities, it's clear your offbeat, artsy style is not their usual fare. It's a sad truth that most audiences don't really want to be challenged, but it's also true that the most challenging artists often find the most fervent fans. \n  *if fans = true\n    You can see this already, as your fans are hanging on your every word, and you even notice some new faces among them. You try to concentrate on matching their energy as you finish off the last notes of the set.\n    *goto results\n  *else\n    You can see this already, as a few audience members have pushed their way to the front and are hanging on your every word. Even if the rest of the audience doesn't get it, it's nice to know that some do. You try to concentrate on matching their energy as you finish off the last notes of the set.\n    *goto results\n*else\n  You wrap a bow on the set with a powerful rendition of ${title4}. Many members of the crowd seem to dig it, but will that be enough?\n  *goto results\n  \n*label results\n\nTime to take your bow and say goodnight.\n\n*if sound = \"punk\"\n  \"Our name is ${band_name}, and you can all kiss our asses,\" you shout out to the audience, raising your middle finger in salute. The audience responds with a chorus of boos as you step offstage.\n  \n  Do you care enough to stick around for the results, or do you want to head out now?\n  *choice\n    #It's not that I care, but let's stick around and see what happens. You know, for laughs.\n      *goto results2\n    #You're right; let's ditch this establishment nonsense.\n      *set cohesion %+20\n      *set reputation %+10\n      Within minutes, you're back in the ${vehicle} and heading home, blasting music and laughing the whole way. It's nice to have found a group as committed to not caring what anyone thinks as you are.\n      *goto fran_call \n*if performance >= 3\n  \"Thank you, St. Louis! Our name is ${band_name}; see you next time!\"\n\n  The crowd responds with a raucous standing ovation. I guess they liked you.\n  \n  *goto results2\n*else\n  \"Thank you, St. Louis! Our name is ${band_name}; see you next time!\"\n  \n  The crowd responds with enthusiastic cheers, but are they more enthusiastic for you than they were for the other bands? Only time will tell.\n  *goto results2\n\n*label results2\nAfter a few more bands, it is finally time to announce the results. The event's emcee steps to the microphone, while you and the other bands wait around backstage, pretending not to care…while listening intently, of course.\n\n*if performance >= 4\n  *set money +10000\n  *achieve win\n  \"In third place, from New York City: The Horny Toads!\"\n\n  The nine-piece ska group rushes onstage, shouting \"Oy! Oy! Oy!\" in triumph. The emcee hands them a check for $1,000. It's chump change compared to the real prize, but it's sure better than nothing.\n\n  \"And in second place, from Düsseldorf, Germany: Later Hose!\"\n\n  The polka-fusion outfit erupts in joy, their accordions and glockenspiels ringing notes of victory. They take their $3,000 check and pose for the camera.\n\n  The climactic moment has finally arrived. You're either winning it all or going home with nothing. The emcee takes a long pause, milking the crowd for all they're worth.\n\n  \"And, finally, in first place, from ${hometown}…${band_name}!\"\n\n  What happens next is like a walking daydream. You know you stepped onstage, you know you posed for pictures, and you're sure you were handed a check for $10,000. There was cheering and shouting and lots of flashbulbs. But, somehow, it was like you weren't there at all, like it was happening to someone else. Is this how success feels?\n  *goto fran\n*if performance >= 3\n  *set money +3000\n  \"In third place, from New York City: The Horny Toads!\"\n\n  The 9-piece ska group rushes onstage, shouting \"Oy! Oy! Oy!\" in triumph. The emcee hands them a check for $1,000. It's chump change compared to the real prize, but it's sure better than nothing.\n\n  \"And in second place, from ${hometown}: ${band_name}!\"\n  \n  A strange mix of excitement and disappointment washes over you as you run onstage to accept your award. Mostly, it just feels surreal. Here you are, just beginning to live the life you set out for yourself, and you're already being celebrated for your accomplishments onstage. Who cares that it was just second place?\n  \n  You take your $3,000 check and walk away feeling amazing. It's only later, when you hear the emcee announce Later Hose, the polka/punk outfit from Düsseldorf, that the slightest tinge of jealously grips your heart. It doesn't help when the German outfit erupts in riotous celebration, bringing notes of joy from their accordions and glockenspiels. Did they really deserve the $10,000 more than you did?\n  *goto fran\n*if performance >= 2\n  *set money +1000\n  \"In third place, from ${hometown}: ${band_name}!\" \n\n  Third place: The most loserish of all the winners. You step onstage and try to feign excitement as the emcee hands you a check for $1,000. Sure, it is better than nothing—but not by much. Your bandmates, on the other hand, seem legitimately excited. They try to drag you out of your doldrums, but standing aside and watching as The Horny Toads and Later Hose rush onstage to accept their second- and first-place awards only fuels your bitterness. \n  \n  You escape backstage as the band from Germany hoists its $10,000 check in triumph and brings notes of joy from their accordions and glockenspiels. You're not sure which you find more annoying at this moment: the celebrating Germans, or your bandmates' attempts to convince you that you should be happy with third place.\n  *goto fran  \n*else\n  *if (((sound = \"punk\") or (sound = \"artsy\")) or (sound = \"jammy\"))\n    Unfortunately, you already know your chances of winning anything here were shot before you even played your first note. No matter how well you play, your ${sound} style just doesn't jive with most midwestern crowds. That's the burden of having a unique sound. \n\n    Still, it was a great experience playing for such a large crowd, and you were glad to see that your music was connecting with a small but passionate few. So when Later Hose is announced as the winner, with The Horny Toads and The Scientists coming in second and third place, you don't let it bother you. You just head backstage and begin packing up to the sounds of the riotous Germans celebrating with their accordions and glockenspiels.\n    *goto fran_call\n  *else \n    \"In third place, from New York City: The Horny Toads!\"\n\n    The nine-piece ska group rushes out onstage, shouting \"Oy! Oy! Oy!\" in triumph. The emcee hands them a check for $1,000. It's chump change compared to the real prize, but it's sure better than nothing.\n\n    \"And in second place, from Seattle: The Scientists.\"\n    \n    The grunge rockers shuffle on stage and accept their reward of $3,000 with hardly a grunt of recognition. You think you spot the lead singer smile at one point, but then you realize he's just smirking sarcastically. \n \n    Finally, the climactic moment arrives. You're either winning it all or going home with nothing. The emcee takes a long pause, milking the crowd for all they're worth.\n    \n    \"And our first place winner, from Düsseldorf, Germany…Later Hose!\"\n\n    The polka-fusion outfit erupts in joy, their accordions and glockenspiels ringing notes of victory. It's too much for you to bear; you rush backstage looking for something to punish with your anger. Luckily, you and your bandmates find a collection of empty bottles in the green room to smash to your hearts' content. The outburst allows you to avoid the darker questions gnawing at the back of your mind, like \"How did this happen?\" and \"Are we just not any good?\" and \"Is this all a waste of time?\"\n  \n    By the van ride back you've already decided that the contest was rigged, and your band is a million times better than those corny polka rockers. Still, the doubts continue to plague your thoughts, and you lie awake that night wondering what, if anything, you can do better in the future to keep this failure from happening again.\n    *goto fran_call\n  \n*label prob_collapse\n*set collapse true\n*set buzz %+20\nUnfortunately, ${problem_he} doesn't even make it through the rest of the song. During the climax of ${title2}, ${problem} hurls all over the drum kit before passing out right in the center of the stage. \n\nThe audience, which was just starting to get into the flow of your set, responds with shock and some audible laughter. The stage manager rushes out to force you offstage, apologizing profusely on your behalf. When you finally drag ${problem} to the dressing room, you find out that ${problem_he} has been indulging even more than you realized: There's a bag of pills hidden in ${problem_his} backpack!\n\nWith ${problem} still passed out, the stage manager tells you that she's calling a paramedic. What do you do?\n\n*choice\n  #Let her. The most important thing right now is ${problem}'s health.\n    *set cohesion %-15\n    *set health %+20\n    While your bandmates don't agree, you are looking out for ${problem}'s best interests. You see ${problem} off to the hospital and then head backstage to pack up the gear from your aborted show.\n    *goto kick\n  #Stop her. We can't let ${problem} get into trouble.\n    *set cohesion %+15\n    *set health %-10\n    You dump a bottle of water on ${problem}'s head and slap ${problem_him} a few times, finally waking ${problem_him} from ${problem_his} stupor. \n    \n    \"See, ${problem_he}'s wide awake and fresh as a daisy; there's no need for an ambulance,\" you tell the stage manager. \"Now can we go back and finish our set?\"\n    \n    She just laughs at you and walks off. Your band members appreciate your valiant efforts, but it looks like the show is over.\n    *goto kick\n  #Step out. This is ${problem}'s problem, not mine.\n     *set cohesion %-20\n     *set reputation %-15\n     \"This is ${problem}'s mess; let ${problem_him} deal with it,\" you say, walking out of the dressing room. The other band members can't believe your actions, but you're tired of putting up with ${problem}'s crap. Luckily, they manage to resuscitate ${problem_him} before the stage manager calls an ambulance.\n     *goto kick \n      \n*label collapse\n*achieve collapse\n*set buzz %+15\n*set collapse true\nUnfortunately, you don't even make it through the rest of the song. During the climactic peak of ${title2}, the entire stage begins to spin uncontrollably, and, before you know it, you find yourself hurling all over the drum kit. The last thing you recall is the laughter of the audience ringing in your ears as the stage rushed up to meet your face….\n\n*page_break\n\nYou wake up to ${band_member1} pouring water over your head and slapping you hard across the face. You open your eyes slowly.\n\n\"See, he's awake!\" some blurry figure shouts. \"Now call off the ambulance. And how about letting us finish our set?\"\n\nYou hear withering laughter that you take to be the stage manager's before she storms out and slams the dressing room door. Seems your show is officially over. You summon all of your energy to apologize to your bandmates, but no one speaks to you as they set about packing up the gear.\n*goto fran_call \n \n*label kick\nWhile sullenly packing up your gear, you reflect on the way ${problem}'s behavior just cost your band a tremendous opportunity. How would you like to deal with it?\n*choice\n  #Kick ${problem} out of the band.\n    *set replacement true\n    *set cohesion %+20\n    *set reputation %-30\n    On the way home, you find a relatively private corner of the ${vehicle} and ask ${problem} to speak with you.\n    \n    \"Ooo, am I in trouble?\" ${problem_he} asks with a smirk. Seeing ${problem_his} attitude, any qualms you might have had about your decision are immediately allayed. \n    \n    You inform ${problem_him} that ${problem_his} services in the band are no longer needed. $!{problem_he} curses, yells, and even smashes a few beer bottles, but eventually you get ${problem_him} to calm down. $!{problem_he} finally insists on being let off along the side of the road—but not before vowing to form ${problem_his} own band and bring you down.\n  \n    *if problem = \"Casper\"\n      *set cohesion %+15\n      *set casper 1\n      You feel awful about what you've done to your brother, but you know it was the right decision. Your bandmates seem to agree as well; the mood is noticeably lighter once Casper is gone. You hope to patch things up with him in the future, but for now you've got a rock career to worry about.\n      *set casperquit true\n      *gosub name_change\n      *goto fran_call\n    *else\n      You feel bad about what you had to do, but you know it was the right decision. Your bandmates seem to agree as well; the mood is noticeably lighter once ${problem} is gone. You hope to patch things up with ${problem_him} in the future, but for now you've got a rock career to worry about.\n      *goto fran_call\n\n  #Give ${problem_him} one more chance. $!{problem_he}'s too good to lose.\n    On the way home, you find a relatively private corner of the ${vehicle} and ask ${problem} to speak with you.\n    \n    \"Ooo, am I in trouble?\" ${problem_he} asks with a smirk.\n    \n    You tell ${problem_him} that you are tired of ${problem_his} actions hurting the band, and that this is ${problem_his} last warning.\n    \n    *if reputation >= 60\n      *set reputation %-10\n      *set cohesion %-20\n      $!{problem}'s smirk grows even wider.    \n \n      \"That's real rich coming from you,\" ${problem_he} says. \"Weren't you the one pounding drinks harder than me earlier? Look, I'm sorry about ruining the gig, but how about you get off your high horse, all right?\"\n      \n      You can tell from the rest of your bandmates' laughter that they agree with ${problem}. You're still not happy with ${problem_him}, but you decide to let the issue rest, at least for now.\n      *goto fran_call\n    *else\n      *set cohesion %+15\n      $!{problem} tries to laugh it off, but it's clear the rest of the band agrees with you. Finally, after smoldering alone for a while, ${problem} apologizes to the band and promises to change, effective immediately. It's hard to know how sincere ${problem_he} is, but you decide to accept his apology.\n      *goto fran_call\n  #Do nothing. What am I, ${problem_his} mother? \n    This is a band, not a church group. Next time it could be you collapsing on stage. You and ${problem} are already laughing about the incident by the time you make it to the ${vehicle}.\n    \n    *if reputation > 60\n      *set cohesion %-25\n      Your bandmates, however, are not so happy about it. They grumble about ${problem}'s incident the entire way home, and they worry that you and ${problem_he} are dragging down the professionalism of the band. Thankfully, after a few more drinks, ${problem} apologizes and promises it won't happen again. Everyone seems to lighten up, at least for the time being.\n      *goto fran_call\n    *else\n      *set cohesion %+15\n      Your bandmates aren't thrilled about what happened, but ${problem} clears the air with a heartfelt apology. Soon, everyone is dying with laughter while recollecting the incident. Shows will come and go, you realize, but a band like this is forever.\n      *goto fran_call\n  \n*label fran_call  \n*page_break\nA few days later, you get a phone call from a woman who introduces herself as a musical talent manager. Her name is Fran, and she speaks with the wizened rasp of an inveterate late-night scenester.\n\n\"All right, here's the deal: I saw your show at the Battle of the Bands, and it was sensational. Better than sensational, it was scandalous. \n*if collapse = true\n  The collapse on stage was brilliant. It created exactly the kind of buzz we need to get your career launched. Look, there's an audience out there waiting for you, but you won't find it yourself. Those midwestern hicks had no idea what they were watching, but I did—it was the future of rock. As long as you sign with me, that is.\"\n  *goto sign\n*elseif sound != \"undefined\"\n  Your ${sound} sound is the music of a new generation. Those midwestern hicks had no idea what they were watching, but I did—it was the future of rock. As long as you sign with me, that is.\"\n  *goto sign\n*else\n  Those midwestern hicks had no idea what they were watching, but I did—it was the future of rock. As long as you let me guide you, that is.\"\n  *goto sign\n  \n*label fran\n*page_break\nAs you pack up backstage, a woman knocks on your door. She introduces herself as Fran, worldwide musical talent manager, and comes bearing a bottle of wine as a gift. She speaks to you with the wizened rasp of a inveterate late-night scenester as she lights a cigarette.\n\n\"All right, here's the deal: You guys are a sensation. Did you see the way that audience reacted to you? These midwestern hicks are just the tip of the iceberg.\n*if sound != \"undefined\"\n  Your ${sound} sound will be the music of a new generation. As long as you sign with me, that is.\"\n  *goto sign\n*else\n  Your music is the
