ng illicit products to children. Thankfully, Joey agrees. He promises to find better endorsement deals down the line, and you get to finish off the video without the product placement.\n      *goto layla\n    *else\n      $!{fran} calls Joey and tries to communicate to him, through the use of many colorful swear words, that marketing illicit products to children is not a fantastic move for your budding image. As it turns out, Joey doesn't care about your budding image one bit. All he cares about is making money. He calmly reminds ${fran} that the contract you signed contains an endorsement clause, and if you choose to break the agreement, he will have to void the entire contract. That means no more single on the radio, no video, and no record.\n      \n      Even ${fran} looks stunned.\n      \n      \"I'm sorry, kiddo, there's nothing else to say. It's entirely your call now.\"\n      \n      Do you continue with the shoot?\n      *choice\n        #Yes, of course. I'm opinionated, not stupid.\n          Every job has some unfortunate aspects. There's no point in sacrificing your entire career over one moral qualm. You do as you're told and finish off the shoot, the retreat to your dressing room.\n          *goto layla\n        #I'll call Joey's bluff. He would never actually fire me. \n          You storm off the set, then wait patiently for Joey's call.\n          *if contract = \"great contract\"\n            *set commercial %-10\n            After a few tense moments, it finally arrives. \n            *gosub hash\n            *goto layla\n          *else\n            *set indie true\n            It never comes. The next day, you find that the video shoot has been shut down, along with the album, the tour, and everything else. Just like that, you're now back to square one.\n            *finish\n        #No. I'd rather not be a rock star at all than be this kind of rock star.\n          *goto ground   \n  #Blow him off. This is bullshit. I'm a respected artist with a hit single on the radio and an album on the way. I did not sign up to be some corporate shill.  \n    *label ground\n    *set commercial %-25\n    You storm off the set, knowing that this very well could be the end of your rock career.\n    *if contract = \"great contract\"\n      *set buzz %+20\n      After a few minutes of panic, you receive a call from Joey. It seems you've called his bluff. While he's upset, he's not ready to fire you just yet.\n      \n      *gosub hash\n      \n      Years from now, the story of how an up-and-coming rock star stood up to the great Joey Greenbacks and won will be told in hushed tones around record-company boardrooms and recording studios. For now, you're just glad for the ordeal to be over.\n      *goto layla\n    *else\n      *set indie true\n      \n      The next day, you find that the video shoot has been shut down, along with the album, the tour and everything else. Just like that, you're now back to square one.\n      *finish\n      \n*label hash\nYou and Joey hash it out, with your standing firm that your contract does not require you to market illicit substances to children. Finally, Joey relents. He promises to find better endorsement deals down the line, and you get to finish the video without the product placement.\n*return\n\n*label layla\nYou head back to your dressing room, where you find ${layla} waiting for you with a big hug and a kiss.\n\n\"I was watching you before on that camel,\" ${sexpref_he} says. \"You looked so sexy!\"\n\nYou and ${layla} have been dating for about a month, ever since Joey set you up after one of your shows. ${layla} is an extremely creative person, an artist and musician as well as a passionate fan of your music.\n\nAs you and ${layla} settle in for some alone time, you hear a knock on the door. ${band_member1} walks in.\n\n\"Hey, we were all about to go out and…oh, ${sexpref_he}'s here. Sorry.\"\n\nOver the past couple of weeks, it's become clear that ${layla} and ${band_member1} do not get along. With their polar-opposite personalities, it's increasingly awkward how the two of them must fight for your attention, now that you're the big star of the show. \n\nWhat do you do?\n*choice\n  #I'm going to have a nice relaxing night with ${layla}, and I shouldn't have to feel bad about it, either.\n    *set cohesion %-20\n    *set health %+10\n    You politely tell ${band_member1} to buzz off while you and ${layla} resume your canoodling. Later that night, back in your new high-rise apartment, ${layla} shares with you some new songs ${sexpref_he}'s been working on. Though a bit nervous, ${sexpref_he}'s clearly proud of the songs and wants you to like them as well. \n    \n    *label anygood\n    It's hard for you to tell if they're really any good, since you're quite smitten with ${sexpref_him}, and everything ${sexpref_he} sings just sounds so beautiful. Besides, polyrhythmic flamenco music isn't really your speciality. \n    \n    \"Well, what do you think of my new songs?\"\n    *fake_choice\n      #\"They're amazing and beautiful, just like you.\"\n      #\"They're a lovely first take. I can't wait to hear you record them.\"\n      #\"It's hard for me to say, to be honest. But I always love hearing your work.\"    \n\n    ${layla} runs over and hugs you.\n    \n    \"Thank you for being so supportive of me. So then you'll talk to Joey about putting one of my songs on your next album?\n    \n    Say what, now?\n    *choice\n      #No! \n        People as attractive as ${layla} are not used to being rejected. It's heartbreaking to see ${sexpref_him} break down in tears, but there's nothing you can do to console ${sexpref_him}. Soon enough ${sexpref_he}'s so angry that ${sexpref_he} won't even talk to you, storming out of the apartment and vowing never to return.\n        *set health %-10  \n        *goto late\n      #No, but maybe ${sexpref_he} can sing backup vocals on stage with us.\n        *set cohesion %-20\n        *set lay true\n        People as attractive as ${layla} are not used to being rejected, but ${sexpref_he} seems to come around to the idea of being on stage with you. By the end of the night, the two of you are making beautiful harmonies together.\n        *goto late\n      #Sure, why not?\n        *set cohesion %-30\n        *set lay true \n        It's just hard to look into a face as attractive as ${layla}'s and tell it \"no,\" so why should you? Besides, all you agreed to do was talk to Joey. What could be the harm in that?\n        \n        That night, you and ${layla} make sweet harmonies together. The next morning, you wake up to find that ${layla}'s manager has already spoken to Joey and, with your \"permission,\" added an extra track to the album for ${layla} to record. This should be interesting.\n        \n        *goto late\n  #I'm going out with the band. We need some quality time. ${layla} will understand.\n    After a night of revelry with the band, you come back to your new fancy apartment and find ${layla} pouting away at you. As you try to apologize, ${layla} reveals that the reason ${sexpref_he}'s really upset is that you haven't expressed interest in hearing any of ${sexpref_his} music. \n\n    *label assure\n    You assure ${sexpref_him} that you are, in fact, very interested in ${sexpref_his} music and would love to hear some right now. Immediately, ${sexpref_his} attitude changes, and ${sexpref_he} whips out ${sexpref_his} guitar to play you three new songs.\n    \n    After they're over, ${sexpref_he} nervously asks to know what you think.\n    *goto anygood\n  #I'm going out with the band and bringing ${layla} with me. It's the best of both worlds.\n    *set cohesion %-25\n    While ${layla} and your bandmates all appreciate the effort, it's clear that this combo just doesn't work. As soon as ${layla} begins outlining ${sexpref_his} suggestions for a new, Japanese-kabuki-inspired, stage set-up for the band, ${band_member1}'s and ${band_member2}'s eyes roll so far back into their heads you worry they might be having strokes. \n    \n    Finally, ${band_member1} comes up with an excuse to split, and everyone else follows suit. You and ${Layla} head back to your fancy new apartment, with ${Layla} pouting all the way. She says that she's upset because she doesn't feel that you are interested in her creative input or music.\n\n    *goto assure\n\n*label late\n*if ((musicianship + stage_presence) + style) >= 200\n  *set buzz %+30\n  *goto late2\n*elseif ((musicianship + stage_presence) + style) >= 185\n  *set buzz %+22\n  *goto late2\n*elseif ((musicianship + stage_presence) + style) >= 170\n  *set buzz %+15\n  *goto late2\n*elseif ((musicianship + stage_presence) + style) >= 150\n  *set buzz %+10\n  *goto late2\n*else\n  *goto late2\n\n*label late2  \n\nA few weeks later, you find yourself in lovely Burbank, California, on the famous Tonight Show soundstage, rocking ${title1} for the small studio audience and (though you try to block it from your mind) millions of viewers at home as well. It's the biggest exposure you've ever gotten, a major coup for ${fran} and Joey and the entire band. \n\nUnfortunately, your family couldn't make it to the taping, even though you offered to fly them out. Your mother said she would try to turn it on in the background during her rhythmic gymnastics class, but she wasn't overly excited about the idea. Still, it's hard to be too upset about their disinterest when you've got Johnny Carson and Ed McMahon to the left of you\n*if lay = true\n  and ${layla} to your right. Ever since you worked on the arrangement of ${title1} to add a back-up ${sexpref} harmony, it's been a joy getting to have ${layla} up on stage with you. You're bandmates haven't loved it as much, but it's been hard for them to voice any displeasure with the whirlwind of success you've been experiencing.\n  \n  *goto after\n*elseif cohesion >= 65\n  *if casperquit\n    and your best friends all around you, rocking out on stage. \n    *goto after\n  *else\n    and your best friend, and brother, rocking out all around you. \n    *goto after\n*else\n  nodding their heads along with your song. In a year of countless surreal moments, this one has to take the cake.\n  *goto after\n\n*label after\n\nAfter you bring the song to a close and Johnny sends the audience to their commercial break, Fred de Cordova, the show's producer, runs over.\n\n\"Great job, everyone! I can tell you'll be hugely famous real soon. Not with me, though; I used to work with Elvis, so you just sound like garbage to my ears. But the young generation who don't know any better, they're gonna love you.\"\n\nEveryone shuffles their feet, unsure how to respond. \n\n\"Umm, thanks, I guess,\" you finally reply.\n\nGlancing up at the clock, Fred leans into you.\n\n\"Look, kid. We got three more minutes. Why don't you sit on the couch with Johnny and crack wise for a few, eh? What do you say? You can bring one of these folks up with you, too, but no more than one.\"\n\nWow! Who will it be?\n\n*choice\n  *if (lay) #I'll bring ${layla}.\n    *set laylaOnStage true\n    *set cohesion %-25\n    *if casperquit = false\n      *set casper %-20\n    You and ${layla} sit on the famous couch talking to Johnny, \n    *goto johnny\n  *if casperquit\n    #I'll bring ${band_member1}.\n      You and ${band_member1} sit on the famous couch talking to Johnny, \n      *goto johnny\n    #I'll bring ${band_member2}.\n      You and ${band_member2} sit on the famous couch talking to Johnny, \n      *goto johnny\n  *if casperquit = false\n    #I'll bring Casper.\n      *set casperonstage true\n      *set casper %+20\n      You and Casper sit on the famous couch talking to Johnny,\n      *goto johnny\n  #I'll go up by myself.\n    You sit alone on the famous couch talking to Johnny, \n    *if casperquit = false\n      *set casper %-25\n    *if lay\n      *set cohesion %+10\n      *set buzz %-10\n    *if cohesion >= 53\n      *set cohesion %-10\n      *goto johnny\n    *else\n      *set cohesion 1\n      *goto johnny\n    \n*label johnny\nwhile the rest of the band watches from the wings.\n*if (LaylaOnStage)\n  *set buzz %+20\n  You try to keep the conversation focused on the album, but Johnny keeps turning the focus back on you and ${layla}.\n  \n  \"So, how long have the two of you been making sweet music together?\" he asks. \"I'm referring to the songs, of course.\"\n  \n  ${layla} is only too happy to talk about ${sexpref_himself} and you, divulging cute and engaging details about your relationship that the studio audience eats up with a spoon. You're amazed at ${sexpref_his} ease and charisma in front of the camera—it's almost like ${sexpref_he}'s been preparing for this day ${sexpref_his} entire life.\n  *goto end\n*elseif reputation >= 65\n  *set buzz %+20\n  You tell a few stories about your infamous partying habits, including the time you got into trouble for throwing a party in the high school.\n  \n  \"So you got a bunch of kids to hang out in school during the summer?\" Johnny cracks. \"Wow, you are bad news. Did you give out grades for audience participation as well?\"\n  \n  All in all, it turns out to be one of the funniest parts of the show and a significant publicity-booster for the band.\n  *goto end\n*elseif casperonstage\n  *set buzz %+20\n  You tell a few stories about growing up with Casper and all the fights you used to have.\n  \n  \"It's not every rock band where the ${casper_instrument_guitarist} used to give wedgies to the ${instrument_guitarist},\" cracks Johnny. \"Maybe the Partridge family.\"\n  *goto end\n*else\n  *set buzz %+5\n  You tell a few self-deprecating stories about life on the road: dodging glass bottles at Strom's, sleeping in the ${vehicle}, and playing with The Marvins. \n  \n  \"Sounds just like my third honeymoon,\" cracks Johnny. \n\n  *goto end\n  \n*label end\nAt the end, Johnny reminds the audience one more time about your upcoming debut album, then signs off for the night.  \n\nThe show over, you sign a few autographs for some audience members, then head back toward the dressing room, excited for the miniature candy bars and other assorted delicacies that await you there. \n\n*if cohesion \u003c 15\n  You arrive to find the room completely trashed. The chairs are smashed, the mirror shattered, and the miniature candy bars callously stomped beyond all edibility. \n\n  Down the hall, you hear ${band_member1} shouting and being led away by security. You try to run over there, but ${band_member2} steps in to block your path.\n  \n  \"Don't. It's just the alcohol. And the drugs.\n  *if lay = true\n    And the fact that your lame ${sexpref_boy}friend has turned you into a egomaniac that no one wants to play with anymore.\"\n    *goto end_sad\n  *else\n    And the fact that you've turned into a egomaniac that no one wants to play with anymore.\"\n    *goto end_sad\n*else\n  *if lay = true\n    You pause outside the room when you hear laughter coming from inside. To your surprise, you open to find ${layla} and the rest of your bandmates sitting around the room, laughing it up together. ${layla} is doing an imitation of Ed McMahon that has ${band_member2} in tears. Seeing you at the door, she stands up and shouts: \"Heeeeere's ${name}!\"\n  \n    As you sit down next to ${Layla}, you catch ${band_member1}'s eyes from across the room. The look you exchange says everything: everything is going to be ok.\n    *finish\n  *else\n    You arrive back at the room to find all of your band members hanging out and laughing together. As you enter the room, ${band_member2} introduces you with an impressively refined Ed McMahon imitation: \"heeeeere's ${name}!\"\n   \n    Sitting down with your best friends in the world, it amazes you how little has changed. No matter how big the stage, whether the audience is ten or ten million, all that matters are the ${band_size_text} people together backstage. And if there's free candy waiting there, too, even better.\n    *finish\n\n*label end_sad\nSorry, ${name}, but this has been a long time coming. It's been real, but we quit.\"\n*set breakup true\n*set casperquit true\n\nWhat's your response?\n\n*fake_choice\n  #\"Are you insane? Without me, none of you would be here today. I made this band, and I will keep it going with our without you.\"\n  #\"You're not thinking straight. Give it a day, and we'll talk it out. You really want to give all this up?\"\n  #\"You're right; I'm sorry. I've been acting selfish. Can't we talk it through, instead of throwing away everything we've worked for?\"\n*comment endif\n\nBut it's too late. ${band_member2} just looks at you sadly, then turns and walks away. As you stand there, it strikes you that this is the first time in a long time that you can remember being completely alone.\n*finish\n\n\n\n\n ", "joey": "[i]I could have stayed at home forever[/i]\n*line_break\n[i]But big money man was much too clever[/i]\n*line_break\n[i]He said, \"Sign on the dotted line[/i]\n*line_break\n[i]It's going to work out fine\"[/i]\n*line_break\n–Gerry Rafferty\n*page_break\n\n*temp joey_card_original joey_card\n*if joey_card = true\n  A fortuitous thing happens as you unpack your ${instrument} to set up for the first sound check of the WROX Summer Slam Jam Rockstravanganza '89. The wind happens to catch a small piece of paper sitting in your case and sends it floating in the air. You snatch it just before it falls offstage and disappears into the 2,500-seat outdoor shed. \n  \n  Turning the paper over, you find a number attached to a name: Joey Greenbacks. Suddenly, your interaction with Joey a couple of years ago comes rushing back to you. \"Call me when you're ready,\" he said back then. Looking out into the seemingly endless venue, you realize that the time has finally come: you are ready. What do you do?\n\n  *choice\n    #Call Joey and invite him to the show.\n      *set joey %+10\n      You call Joey and cordially invite him to attend your performance. Well, actually, you leave a cordial message with his assistant. Who knows what will come of it, but you're glad you reached out.\n      *goto preshow\n    #Send a courier to deliver two tickets to Joey's office, along with a handwritten note from the band and a bottle of expensive scotch.\n      *set joey %+20\n      *set commercial %+20\n      Go big or go home, right? You worry about coming off a bit desperate, but all you care about is getting him to the venue. Once he sees how much you've grown, he'll be dying to sign you. You hope.\n      *goto preshow\n    *if (fran = true) #Have Fran call Joey and invite him to the show.\n      You request that Fran cordially invite Joey to attend your performance. Who knows what will come of it, but you're glad you were able to reach out.\n      *goto preshow\n    #Forget Joey. I don't need him anymore.\n      *set joey_card false\n      *set commercial %-15\n      You tear the piece of paper up and watch it float off into the distance like so much dust in the wind. No need to worry about some stuffed suit while you're poised to explode onto the scene under your own terms.\n      *goto preshow\n*else\n  As you set up on the largest stage you've ever stepped foot on, standing underneath the WROX Summer Slam Jam Rockstravanganza '89 banner overlooking the largest outdoor venue you've ever laid eyes on, you try to remain calm and focused. You've just toured around the country, playing dozens of gigs in venues large and small—what makes this so different? \n\n  You know the answer, even as you try not to think about it. It's not the size; it's the location. This is your homecoming show, the show where all your friends and extended family will come to see what you've made of this whole \"rock-star thing.\" That's why there are more butterflies in your stomach than ever before.\n  *goto preshow\n\n*label preshow\n\nAfter soundcheck you have a free evening before tomorrow afternoon's show. How do you want to use the time?\n\n*choice\n  #Publicity. Hit the ground hard and ramp up support for the show.\n    No flyering needed for this one; the festival has done all of the groundwork. Instead, you hit the college and local-radio circuits to promote the band. You even score an exclusive interview with WROX, the highest-rated rock station in town!\n    *if (demo_style = \"demo dud\") or (demo_style = \"short and sour\")\n      *set buzz %+10\n      *goto postshow\n    *elseif ((demo_style = \"short and sweet\") or (demo_style = \"excellent EP\")) or (demo_style = \"amazing album\")\n      *set buzz %+25\n      *set commercial %+15\n      *set health %-5\n      *set money +400\n      You manage to play them a cut from your demo, and they're so blown away by it that they agree to play ${title2} on the air as part of their \"Eight O'Clock Rock Block!\" \n      \n      That night, you and the band gather around the radio to hear your song on a major radio station for the first time. It's an unbelievable moment, one you've been dreaming about nearly your entire life. Though it's only three minutes long, you bask in the afterglow for hours. Good luck getting any sleep tonight!\n      *page_break\n      *goto postshow\n    *else\n      *set money +200\n      *set buzz %+25\n      *set commercial %+15\n      You manage to play them a cut from your demo, and they like it so much that they mention it on the air, including instructions for how to purchase one after the show. Unfortunately, they cannot play any of the songs, record-label contracts being what they are, but they do everything they can to promote you before your big show.\n      *goto postshow\n  #Rest and spend time with old friends.\n    *set health %+20\n    *if casperquit\n      You decide to spend a quiet evening with close friends, just hanging out and reminiscing about old times. It helps settle your nerves before tomorrow's show.\n      *goto postshow\n    *else\n      You and Casper decide to spend a quiet evening with close friends, just hanging out and reminiscing about old times. It helps settle your nerves before tomorrow's show.\n      *goto postshow\n  #Old-fashioned throw-down. Time to make hay with all those ${sexpref_boys} who didn't know my name back in high school.\n    *set health %-20\n    *set money -150\n    *set reputation %+20\n    *if casperquit\n      You take over Casaba's, now under new management, for a pre-show party extravaganza. It seems everyone you knew growing up has come by to check you out. You party deep into the night, then escape into the green room with a few ${sexpref_boys}. They ask you to play them something on the ${instrument}, but you pass out as soon as you sit down. You wake up alone, with a string of drool connecting you to your ${instrument}. Rock and roll!\n      *goto postshow\n    *else\n      You and Casper take over Casaba's, now under new management, for a pre-show party extravaganza. The two of you can't stop laughing and cracking jokes about what Mickey would say if he saw this shindig. It seems everyone you knew growing up has come by to check you out. \n      \n      You party deep into the night, then escape into the green room with a few ${sexpref_boys}. They ask you to play them something on the ${instrument}, but you pass out as soon as you sit down. When Casper finally comes to wake you up, you find a string of drool connecting you to your ${instrument}. Rock and roll!\n      *goto postshow\n\n*label postshow\n\nAfter so much build-up, the show comes and goes in the blink of an eye.\n*if reputation >= 68\n  While you try to keep the show clean for the hometown folks, you do find yourself fighting a hangover and needing a bolt of whiskey or two to keep upright. You also throw up a couple of times, but you manage to turn your back to the audience. Thankfully, the stagehands, knowing your reputation, prepared a bucket next to the monitors for just such an occurrence. You make it to the end of the show without further incident.  \n  *if (sound = \"punk\") or (sound = \"heavy\")\n    *set buzz %+10 \n    *goto postshow2\n  *else \n    *set buzz %-10\n    *goto postshow2\n*elseif buzz \u003c= 60\n  *goto postshow2\n*elseif (sound = \"punk\") or (sound = \"artsy\")\n  *set buzz %+5\n  The majority of the ${hometown} locals are baffled by your sound, as expected. But you're glad to see a lively crowd of true fans right up front, keeping up the energy.\n  *goto postshow2\n*elseif (sound = \"poppy\") or (sound = \"folk\")\n  *set buzz %+10\n  It's exciting to see how the ${hometown} crowd reacts to your sound. More and more audience members filter in over the course of the show, and you can feel the crowd connecting to your sound.\n  *goto postshow2\n*else\n  *goto postshow2\n\n*label postshow2\nUnfortunately, your lasting memory of this show is one of melancholy. As you look out into the audience, specifically the VIP section up front for friends and family, you realize that your family is nowhere to be found.\n\n*gosub uno \n\nAfter the show, you sit alone in the dressing room as your other bandmates celebrate with their family members. Upset as you are, a new guest's sudden arrival manages to take your mind off of everything else: Joey Greenbacks! He bursts into your dressing room like a heat-seeking tornado.\n  \n*if joey_card = true\n  *set joey %+10\n  \"Is this the schmuck who thought it would be a good idea to drag me all the way to this podunk shithole just to watch ${gender_him} play? Well, I'm here.\"\n  \n  *goto joey\n*else\n  \"Is this the schmuck who thought ${gender_he} was too good to give ${gender_his} Uncle Greenbacks a call after all ${gender_his} recent success? Well, never mind, I'm here now.\"\n  *goto joey  \n\n*label joey\nWith Joey, it's impossible to know if he wants to hug you or bite your head off. Thankfully, he opts for the former.\n  \n\"You know I've been reading about ${band_name} all summer long. A demo, a successful tour, and an opening gig for a hot touring band.\n*goto joey2\n\n*label joey2\nAnd now, you've capped it off beautifully with your first large-venue show. There's only one thing you're missing: A record deal!\"\n\nHe lets those last three words hang in the air for a very long time. Finally he breaks the tension.\n\n\"Well? Do you want a deal or not?\"\n*label joeyq\n*choice\n  #\"Of course! I've been waiting for this moment my whole life!\"\n    *set joey %+10\n    *goto deal\n  #\"No way. We don't want anything to do with you record-industry sleazeballs.\"\n    *goto no_sign\n  #\"I mean, sure, why not? You know, if you're offering.\n    *goto deal\n\n*label deal\nJoey laughs.\n\n\"Fine. Bring the gang in here, and let's sign on the dotted lines. Hurry up—I've got to be on a yacht in Boca in three hours.\"\n\nYou run out and grab the other members, who cannot believe what's transpiring. The ${band_size_text} of you huddle around the table and review the contract. He taps his foot impatiently as each second goes by, but you know it's important to consider every aspect carefully. \n\nFor example:\n*if (buzz >= 65) and (reputation \u003c= 60)\n  [i]\"Pursuant to Article I, Section 5b, Gilded Cage Records Inc. (henceforth \"Gilded\") retains all intellectual, commercial, and creative properties produced or otherwise distributed by ${band_name} (henceforth \"${band_name}\"). Furthermore, ${band_name} agrees to no fewer than [b]five[/b] (5) television/radio/magazine promotional appearances, commensurate and in conjunction with each new album released through Gilded, to support said albums and commercial partners of Gilded. Said albums shall be produced at least [b]once[/b] (1x) annually, with at least [b]three[/b] (3) radio-length singles (runtime of 2:47 or less) and [b]two[/b] (2) music videos. From all album sales, single sales, radio/broadcast sales, and live-performance-attendance sales, ${band_name} shall collect a royalty of [b]sixteen and 75/100 percent[/b] (16.75%) of net profits, with an advance against royalties of ave her. She negotiated\n      *label sign??2\n      16% royalties with a $20,000 advance. It's a fantastic deal. Now sign the damn thing already, and let's get on to more important things, like picking out classy-yet-stylish yachting attire.\"\n\n      *label sign?2\n      Do you sign?\n      *choice\n        #Yes!\n          *set money +20000\n          *set contract \"good contract\"\n          *goto sign   \n        #No!\n          *goto no_sign\n        *hide_reuse #Keep pressing for more.\n          You begin to launch into another round of negotiations when Joey cuts you off.\n          \n          \"Life's too short, kid. I'm leaving in two minutes; either sign the damn thing or don't.\"\n          *goto sign?2\n*else\n  [i]\"Pursuant to Article I, Section 5b, Gilded Cage Records Inc. (henceforth \"Gilded\") retains all intellectual, commercial and creative properties produced or otherwise distributed by ${band_name} (henceforth \"${band_name}\"). Furthermore, ${band_name} agrees to no fewer than [b]fifteen[/b] (15) television/radio/magazine promotional appearances, commensurate and in conjunction with each new album released through Gilded, to support said albums and commercial partners of Gilded. Said albums shall contain at least [b]five[/b] (5) radio-length singles (runtime of 2:47 or less) and [b]three[/b] (3) music videos. From all album sales, single sales, radio/broadcast sales and live-performance-attendance sales, ${band_name} shall collect a royalty of [b]eleven and 75/100 percent[/b] (11.75%) of net profits, with an advance against royalties of [b]ten thousand dollars[/b] ($10,000). Failure to comply with these agreements shall result in the termination of all contracts and agreements forthwith between and pursuant to all parties.\"[/i]\n  *gosub pursuant\n   \n  *label sign???3\n  What do you do?\n  *choice\n    #Sign it! Now!\n      *set money +10000\n      *set contract \"terrible contract\"\n      *goto sign    \n    *hide_reuse #See if I can negotiate some slightly better terms.\n      *if (musicianship >= 70) or (sound = \"poppy\")\n        Your bandmates look stunned as you push Joey for better terms. Amazingly, he relents.\n        \n        \"You caught me in a good mood today, and I want to get this thing over with. Let's do\n        *goto sign??3\n      *else\n        You begin to launch into negotiations when Joey cuts you off.\n          \n        \"Life's too short, kid. I'm leaving in two minutes; either sign the damned thing or don't.\"\n        *goto sign???3\n    #Don't sign. I don't want anything to do with this guy.\n      *goto no_sign\n    *if (fran = true) #Call Fran.\n      *gosub joey&fran\n      \"Your manager is a mean old witch. You're very lucky to have her. She negotiated\n      *label sign??3\n      12% royalties with a $15,000 advance. It's a fantastic deal. Now sign the damn thing already, and let's get on to more important things, like picking out classy-yet-stylish yachting attire.\"\n\n      *label sign?3\n      Do you sign?\n      *choice\n        #Yes!\n          *set money +15000\n          *set contract \"good contract\"\n          *goto sign   \n        #No!\n          *goto no_sign\n        *hide_reuse #Keep pressing for more.\n          You begin to launch into another round of negotiations when Joey cuts you off.\n          \n          \"Life's too short, kid. I'm leaving in two minutes; either sign the damn thing or don't.\"\n          *goto sign?3 \n                 \n*label sign\nYour hand shakes as you sign the contract. You can't believe it's actually happening. When you're all done, Joey places a bottle of very expensive champagne on the table.\n          \n\"That's for you. I gotta run. Remember, this is the first day of the rest of your lives. Don't let me down!\"\n\nAnd just like that, Joey disappears, leaving behind a copy of your newly stamped ticket to rock stardom.\n*if sound = \"punk\"\n  *goto punk1\n*else\n  *finish\n  \n*label no_sign\n*set contract \"indie\"\n\nJoey smirks. \"Congratulations, you're officially a nobody. Good luck paying the rent.\"  He rips up the contract and leaves, never to be seen again. \n\n*if sound = \"punk\"\n  *gosub laughing\n  *goto punk2\n*elseif buzz >=65\n  *if cohesion \u003c= 58\n    *set cohesion 1\n    *set breakup true\n    *set warp_solo true\n    For the other band members, this is the last straw. They explode at you, calling you arrogant and destructive. You try your best to explain your decision and apologize, even promising to institute a more democratic leadership system. But it's no use. From that night on, ${band_name} is no more.\n    *page_break\n    *goto_scene endings\n  *else\n    *set cohesion %+20\n    *set indie true\n    *set warp_indie true\n    *gosub laughing\n    In that moment, you're as tight a band as there has ever been. Still, you're now going to have to figure out how to survive with your new designation: an independent band.\n    *page_break\n    *goto_scene endings\n*else\n  *set buzz 1\n  *gosub laughing\n  \n  Filled with unbridled moxie, you move forward with planning your next tour and your new future as an \"independent band.\" But it seems you've overestimated your earning potential. There's just not as much demand for you as you thought there'd be. You manage to string together a few shows here and there, but soon the well runs dry.\n  \n  *if fran = true\n    *set warp_indie true\n    Fran stops returning your calls, band members start looking into other gigs, and pretty soon the sad truth becomes clear: your rock career has reached the end of its all too short road.\n    *page_break\n    *goto_scene endings\n  *else\n    *set warp_indie true\n    Bar managers stop returning your calls, band members start looking into other gigs, and pretty soon the sad truth becomes clear: your rock career has reached the end of its all too short road.\n    *page_break\n    *goto_scene endings\n\n*label laughing\n\nEveryone sits in silence for a long moment. You're unsure how your bandmates will react to your decision. Will this be the end? Finally, the silence is broken.\n\n\"Screw that suit and his label,\" ${band_member1} says. \"Why would we want to hang around with some old dude, anyway?\"\n\nEveryone bursts out laughing.\n*return\n  \n*label joey&fran      \n\"I'm sorry, Mr. Greenbacks, but we can't sign anything without speaking to our manager first.\"\n      \nJoey rolls his eyes.\n      \n\"Need to speak with Mommy, do you? Fine.\"\n      \nHe takes out his portable \"cellular\" telephone—just like in the movies!—and passes it to you. You call up Fran and explain the situation. In a minute, she and Joey are on the phone, shouting back and forth at each other. You're not sure whether they're actually fighting, or if this is just how people like them interact.\n      \nFinally, Joey hangs up. He rips up the contract on the table and produces a brand-new one from his briefcase. Seems he was more prepared to negotiate than he indicated.\n*return  \n\n*label pursuant\n\nYou squint at the text for a while, trying to pretend, at least, like you have some idea of what's going on. Your bandmates are having an even worse time, looking to you for some guidance. After ten minutes of careful reading, ${band_member2} looks up at Joey.\n\n\"Um…what does 'pursuant' mean?\"\n\nJoey chuckles.\n\n\"Musicians. You never disappoint. Look, this is a very standard, very fair contract that's going to make you very rich. If very rich sounds like something that interests you, then sign it. If not, then kindly return my absurdly expensive pen to me, and I will be on my way.\"\n*return\n\n*label punk1\n*achieve crossover\nNow that you've signed on the dotted line, you're officially a crossover success. What does that mean? Basically, the record label hopes to capitalize on your punk bonafides to reach an untapped audience of potential music buyers. \n\n*if buzz >= 63\n  *set indie true\n  Fortunately, Joey's too smart to try and cross you too much. Even though your contract stipulates commercial appearances, he never presses you to become more mainstream. He knows that his best bet is to step back and let you make the magic happen, which is one of his many codewords for money. In the end, you're grateful you signed with a savvy executive like Joey, who will help you reach an even wider audience than before. \n  *page_break\n  *goto_scene endings\n*else\n  Unfortunately, that means you will have to abide by Joey's efforts to make you more mainstream. As stipulated in your contract, you are required to do a certain number of endorsements and media appearances. While you mostly glazed over these stipulations before, it only takes a few days to realize how serious Joey was. He clearly wants to turn you into a legitimate star. Do you let him?\n  *choice\n    #Yes. That's what I want.\n      *set commercial %+15\n      Than that's what you shall get. You dive into celebrity headfirst and hope you're able to come up for air.\n      *finish  \n    #For now. I'll play ball until I can call the shots myself.\n      *set commercial %+5\n      Then play you shall. You dive into celebrity headfirst and hope you remember to come up for air. \n      *finish\n    #No. This is not punk.\n      *set commercial %-20\n      What kind of punk band does endorsements? You call up Joey and tell him to tear up your contract. It's time to begin your new life as an indie punk band.\n      *goto punk2\n\n*label punk2\n*set legacy \"Punk Godfather\"\nPunk is more than just a style of music; it's a way of life. As one of the few successful punk bands in the world, you're grateful that you've been able to build a career and maintain your integrity. Over the next few years, you: perform five nights a week at The Rat Hole, a new punk bar; perfect the art of moshing and introduce it to a new generation of punk fans; tour throughout Eastern Europe, where a rabid punk fan base has been developing; and purchase The Rat Hole and use it to cultivate new talented musicians in the scene.\n\nEventually, like all punk musicians, it becomes time to lay down your ${instrument} before you grow out of touch. No one wants to see an old punker. Still, your status in the community means you get to continue gaining admiration for many years as a sort of punk Godfather. A new generation of bands, raised on your music, will continue to honor you for years to come. \n\nOne band even does a cover of ${title4} that achieves more commercial success than anything you'd ever released. Not only does this mean a nice influx of royalty money for you and the band, but it also revitalizes interest in your music. Soon, underground audiences are clamoring for a ${band_name} reunion show, and maybe even a tour. Will you do it?\n\nThat decision, like all the others you have made over your life, is only up to you.\n*goto_scene endings ending\n\n*label uno\n*if uno\n  *set musicianship %+10\n  Even worse, your problems with Uno are flaring up again. It seems he's decided to take your big day as a chance to assert himself in the spotlight once and for all. Not only does he extend his show-off solos to endless proportions, but he even has the gall to speak directly to the audience between songs. Crowd banter is the band leader's job, everyone know's that!\n\n  What do you want to do about it?\n  *choice\n    #Nothing. Uno's a great musician; what do I care about his banter and soloing?\n      *set cohesion %-5\n      Although your other bandmates are growing annoyed, you really don't care about such nonsense. You finish up the show with a rousing rendition of ${title4}, including, of course, one more spotlight-grabbing solo from Uno.\n      *return\n    #Show him up. I'll remind him whose stage this really is.\n      *if stage_presence >= 63\n        *set cohesion %+15\n        During one of Uno's attempts at crowd banter, you grab the microphone and cut him off.\n    \t\n        \"Ladies and gentlemen, give it up for Uno Saldera!\" you exclaim. \"The only guitarist whose mouth makes more noise than his fingers!\"\n    \t   \n        At the crowd's laughter, you immediately launch into ${title4} without giving Uno a chance to respond. That should keep him in his place from now on.\n        *return\n      *else\n        *set cohesion %-25\n        During one of Uno's attempts at crowd banter, you grab the microphone and cut him off.\n    \t\n        \"Ladies and gentlemen, give it up for Uno Saldera!\" you exclaim. \"The only guitarist whose mouth makes more noise than his fingers!\"\n    \t  \n        Unfortunately, the crowd does not find your jab as hilarious as you did. Your other bandmates shoot you angry glances from across the stage as Uno tries to laugh off your dis. You immediately burst into ${title4}, hoping that you haven't made a dangerous situation much worse.\n        *return\n    #Nothing now. After the show, I'll remind him who's boss.\n      *set cohesion %-15\n      You finish up the show with a rousing rendition of ${title4}, including, of course, one more spotlight-grabbing solo from Uno. Before heading to your dressing rooms, you lay into Uno and tell him that you're tired of his antics. He feigns innocence, claiming he just wanted to contribute to the performance, but you make sure your message is received. You hope that will put an end to his showboating.\n      *return\n*else\n  *return", "road": "*temp MarvinsHate false\n*temp MarvinTour false\n*temp stop1\n*set stop1 \"undefined\"\n*temp stop2 \"undefined\"\n*temp cover\n*set cover \"undefined\"\n*set money +600\n*temp flag\n*set flag false\n*temp hdiag\n*set hdiag false\n*temp dmoney\n*set dmoney false\n[i]Well we know where we're going[/i]\n*line_break\n[i]But we don't know where we've been[/i]\n*line_break\n[i]And we know what we're knowing[/i]\n*line_break\n[i]But we can't say what we've seen[/i]\n*line_break\n[i]And we're not little children[/i]\n*line_break\n[i]And we know what we want[/i]\n*line_break\n[i]And the future is certain[/i]\n*line_break\n[i]Give us time to work it out[/i]\n*line_break\n–Talking Heads\n*page_break\n\nSmash!\n\nThe beer bottle wobbles through the smoky air and explodes against the amplifier, bringing hoots of approval from the crowd. You turn your back to the shrapnel and continue  playing ${title1} right along with the rest of the band. There was a point in your life when a crowd showering you with glass shards would have caused you to miss, at the very least, a few notes. You have since grown immune to such distractions. \n\nYou have been touring for three weeks straight, moving from town to town, playing nearly every night and writing new music during the day. But it hasn't been easy. Tonight marks your second gig at Strom's Stop, a biker bar in South Carolina. The crowd here is known for loving two things: Country music and getting rowdy. While you don't offer much of the former, your band has proven very helpful with the latter. These people absolutely love to hate you.\n\nStrom, the bar's owner, could not be more pleased. He wants to keep you around as long as possible. And he pays well. As soon as you make your escape from the stage, he meets you in the green room and offers you a full week of employment at $100 a night. What do you do?\n\n*choice\n  #We'll take it! This is the longest and most profitable gig we've ever had; why give it up now?\n    *set money +700\n    He grins and shakes your hand while spitting out a gob of tobacco.\n    \n    \"Good! Now come back tomorrow and sell some more broken beer bottles for me!\"\n    *goto strom \n  #We'll take it…at $150 a night.\n    He thoughtfully spits our a gob of tobacco while considering your request.\n    \n    *if (sound = \"punk\") or (sound = \"artsy\")\n      *set money +1050\n      \"Damn greedy punks. Sure, $150 it is. There's just no matching your ${sound} sound for the kind of lucrative vitriol it endears. Now come back tomorrow night and sell me some more broken beer bottles!\"\n      *goto strom\n    *else\n      \"Damn greedy Yankees. What do you think this is, a charity for shitty music? I'll give you $100 and not a penny more. Well?\"\n      *choice\n        #We'll take it.\n          *set money +700\n          \"Fine. Now come back tomorrow night and sell me some more broken beer bottles!\"\n          *goto strom\n        #No, thank you.\n          *set health %+20\n          \"My six-year-old niece is having a ballerina birthday party this weekend; maybe you'd be more comfortable playing for that type of audience?\"\n          *goto next_stop\n        #We'll take it…if you put up something on stage to protect us from the projectiles.\n          He thoughtfully spits our a gob of tobacco while considering your request.\n    \n          \"You pretty Yankees worried about a few drunken hicks? Well, I don't blame you.\n          *if (musicianship > 65) or (buzz > 60)\n            *set money +1050\n            *set health %+15\n            *set cohesion %+15\n            I'll throw up some chicken wire on stage before the next show. Now come back tomorrow night and sell me some more broken beer bottles!\"\n            *goto strom\n          *else\n            *set money +1050\n            Unfortunately, there's nothing I can do for you. Just make sure to duck, cause if someone hits you and knocks you out before the show's over, you don't get paid.\"\n            *goto strom\n  #Sorry, but it's time for us to get back on the road and seek out some less hostile environs.\n    \"Fine! I'll up your pay to $200 if you stick around…you damn greedy Yankees!\" \n    \n    Do you really want to leave your first steady gig so soon?\n    *choice\n      #I'll stay.\n        *set money +1400\n        \"Good. Now come back tomorrow night and sell me some more broken beer bottles!\"\n        *goto strom\n      #No, thank you.\n        *set health %+20\n        \"My six-year-old niece is having a ballerina birthday party this weekend; maybe you'd be more comfortable playing for that type of audience?\"\n        *goto next_stop     \n    \n*label strom\n*set health %-25\n*set cohesion %+10\n*set buzz %-15\n\nThe next seven shows follow roughly the same course. Songs like ${title2} and ${title4}, while performed better than ever before, are met with drunken violence. \n\n*if (sound = \"folksy\") or (sound = \"jammy\")\n  *set health %+10\n  *set stage_presence %+10\n  Over time, you learn to use some of your more folksy songs to calm the crowd down just a bit. But as soon as you turn to anything remotely resembling rock or pop they start calling for your heads again. It turns out to be a valuable, if terrifying, lesson in crowd control.\n  *goto strom2\n*elseif demo_first = true\n  *set money +5\n  Every night, out of stupidity or sheer stubbornness, you hang around onstage with a suitcase full of demo tapes, offering them up for five bucks each. Thankfully, by that time, all the patrons are usually too drunk to remember that they wanted to beat you up. And on one night, a shy young ${sexpref_man} sneaks away from ${sexpref_his} friends and purchases a demo when no one else is looking. It's your first sale!\n  *goto strom2\n*else\n  *goto strom2\n\n*label strom2\n\nBesides the shows, do you engage in any other activities during your residence at Strom's?\n\n*choice\n  #I make moves with that cute bartender who's been eyeing me all week.\n    *achieve firstgroupie\n    After the show, you sidle up to the cutie behind the bar. An hour later, the two of you are out in the parking lot, swapping spit and a jug of moonshine.\n     \n    *if sexpref = \"female\"\n      Unfortunately, she forgot to mention her boyfriend, the one who comes every night with the Confederate-flag-emblazoned pick-up truck. He and his friends surprise you from behind and pin you against the wall.\n      \n      \"If I catch you talking to my girl again, I'll end your life, dandy ${gender_boy}.\"\n      *goto fight\n    *else\n      *set reputation %+10\n      You keep up this relationship after every show, until by the last night ${sexpref_he}'s become so smitten with you that ${sexpref_he} begs you to take ${sexpref_him} on tour. You calmly explain to ${sexpref_him}, as all rock stars must explain throughout their lives, that your first and only love is the open road, and, so, like some sort of liberated, aerial creature, you must be traveling on. You kiss ${sexpref_him} one more time and \n      *if demo_first = true\n        give ${sexpref_him} a free copy of the demo. Then you take off into the endless beyond. Hey, that was fun!\n        *goto next_stop\n      *else\n        then take off into the endless beyond. Hey, that was fun!\n        *goto next_stop \n  #I go check out some of the local music scene.\n    *set musicianship %+15\n    *set folksiness %+10\n    *set cohesion %-10\n    *set money -25\n    Your ability to open yourself up to all kinds of music, even country, is commendable. While your bandmates don't understand how you could listen to that \"twangy banjo crap,\" you actually find some interesting elements that spark new song ideas for you. As you finish out the string of shows and hit the road, you find yourself more excited than ever to sample music scenes from all over the country.\n    *goto next_stop\n  #I try to get my hands on some of that moonshine I've heard so much about.\n    *set money -25\n    After one of the shows, you inquire with a local about procuring some of the region's homemade, organically-distilled, double-concentrated hillbilly juice. As luck would have it, the man you're speaking to happens to be a moonshiner himself! \n    \n    He and his buddies bring you out back to a Confederate-flag-emblazoned pick-up truck and offer you an entire jug of moonshine for the discount price of $15. What a deal!\n    \n    That is, until you take a sip and realize you've been had.\n    \n    \"What is this crap?\" you say, spitting the liquid from your mouth. \"This tastes like water!\"\n    \n    Everyone laughs.\n    \n    \"Sorry, Yank, no refunds,\" he replies. \"Enjoy your ultralight moonshine, you dandy.\"\n    \n    *label fight\n    How do you respond?\n    *choice\n      *selectable_if (reputation \u003c 65) #If not wanting to fight a parking lot full of redneck bikers makes me a dandy, I guess I'm a dandy.\n        *set reputation %-15\n        Good call. You're not famous enough to die just yet. You head back inside, trying to ignore their laughter. When you finally finish out the string of shows, you take your money and drive away as fast as possible, breathing a sigh of relief as you cross city lines and realize you'll never have to step foot in Strom's again.\n        *goto next_stop        \n      #Would a dandy smash a jug of moonshine over someone's head?\n        While that question might have been better left to the philosophers, you decide to conduct a small experiment yourself…by smashing the dude's head with the jug of moonshine.\n        *if reputation > 65\n          *set reputation %+20\n          *set money -750\n          The anger stored up from having to deal with these brain-dead hicks all week comes out of you in an explosion of violence. You never knew you had this much aggression buried inside. Could this be where all the awesome rock comes from as well? You contemplate this idea as the the blood and glass shards continue to fly from your relentless pummeling of this hick. Unfortunately, your ruminations are cut short by the untimely arrival of the local police.           \n\n          The night in jail and subsequent bail money sets you back $750, but soon enough you're back in the ${vehicle} headed toward your next destination. \n          \n          Once you're on the road, your band members surprise you with a souvenir: an article from the local paper about the incident! You're well on your way to stardom now, with your first brawl, your first night in jail, and now, your first newspaper article. All things told, not a bad way to start the tour.\n          *goto next_stop\n        *else\n          *set health %-15\n          *set reputation %+20\n          *set money -750\n          Though he goes down like a ton of bricks, his buddies immediately jump into the fray. The next few moments are a blur of flying fists and bottles until there's a loud crack, and, suddenly, you're waking up in a jailhouse with a bandage around your head and a warning to leave town and never come back. \n          \n          The bail money sets you back $750, but soon enough you're back in the ${vehicle} headed toward your next destination.\n            \n          Once you're on the road, your band members surprise you with a souvenir: an article from the local paper about the incident! You're well on your way to stardom now, with your first brawl, your first night in jail, and now, your first newspaper article. All things told, not a bad way to start the tour. (Your head sure does hurt, though.)\n          *goto next_stop\n      #Retreat now, revenge later….\n        You turn and head back inside, trying to ignore their laughter. On your last night at Strom's, as the band finishes up the final verse of ${title3}, you\n        *if (instrument = \"drums\") or (instrument = \"keyboard\")\n          sneak away from behind the ${instrument} and hop off stage.\n          *goto prank\n        *else\n          grab your ${instrument} and hop off stage.\n          *goto prank\n      #I just want to keep my head down and make it out of here alive.\n        *set health %+20\n        Good idea. You're not famous enough to die just yet. You finish out the string of shows with no further incident, then hightail it of town, breathing a sigh of relief when you cross city lines and realize you'll never have to step foot in Strom's again.\n        *goto next_stop\n\n*label prank\n*set reputation %+10\n*set cohesion %+10\n*achieve rockprank\nYou've already got the rest of the gear packed into the ${vehicle}. Now, as you carefully planned ahead of time, all your band members need to do is grab their instruments and rush outside as soon as they hear…\n\n[b]Honk! Honk![/b]\n\nYou sit inside the ${vehicle} for a few tense moments with the engine running. Finally, the rest of the band rushes outside, throwing everything into the back and jumping in as you peel off.\n\nThe confused bar patrons rush outside, too, just in time to see a dust cloud disappearing into the distance, and the words \"${band_name} Rules!!!\" spray-painted all over the Confederate-flagged pick-up truck.\n*goto next_stop\n\n*label next_stop\n*gosub diag\n\nAs you tear onto the open highway, you \n*if fran = true\n  get a message on your pager from Fran. (A pager is a magical device that tells you when people want you to call them; it's like the future!) You stop at the next rest stop and give her a call from the payphone.\n  \n  \"Listen, kiddos, I've been thinking. It's about time we started talking about your style. Now that you're transforming from little baby caterpillars into beautiful rock butterflies, it's important that you look the part. That's why I've set you up with a stylist before your next two shows at The Hot Box in \n  *if (sound = \"punk\") or (sound = \"artsy\")\n    *set stop1 \"D.C.\"\n    D.C. \n    *goto fran2  \n  *elseif (sound = \"jammy\") or (sound = \"folksy\")\n    *set stop1 \"Memphis\"\n    Memphis.\n    *goto fran2 \n  *else\n    *set stop1 \"Atlanta\"\n    Atlanta.\n    *goto fran2 \n*else\n  *set health %-15\n  realize you have no clue where you're heading next. As the manager of your own band, you're finding just how much responsibility rests on your shoulders. While your bandmates sleep, you pull off the highway and use a pay phone to call some promising leads. \n  *if buzz \u003c 55\n  \n    Thankfully, after a whole lot of rejections, one of them is interested in you for this weekend! Good thing, too; you were beginning to get worried. Better concentrate on building up more buzz at this next stop, or you may find your tour ending prematurely.\n    *set stop1 \"Atlanta\"\n    *goto city\n  *else\n  \n    Thankfully, three of them are interested in you for this weekend! You don't know much about the clubs except where they're located. Which do you choose?\n    *choice\n      #Memphis.\n        *set stop1 \"Memphis\"\n        *if (sound = \"jammy\") or (sound = \"folksy\")\n          *set buzz %+20\n          *achieve perfectcity\n          Good call! The city's vibrant bluegrass music scene should mean a large turnout to hear your ${sound} brand of rock.\n          *goto city\n        *else\n          Memphis it is!\n          *goto city\n      #D.C.\n        *set stop1 \"D.C.\"\n        *if (sound = \"punk\") or (sound = \"artsy\")\n          *set buzz %+20\n          *achieve perfectcity\n          Good call! The nation's capital has become an eclectic hotbed for fringe musical lovers, guaranteeing a sizable crowd for ${sound} rock stylings.\n          *goto city\n        *else\n          D.C. it is!\n          *goto city\n      #Atlanta.\n        *set stop1 \"Atlanta\"\n        *if (sound = \"heavy\") or (sound = \"poppy\")\n          *set buzz %+20\n          *achieve perfectcity\n          Good call! A-town has a vibrant music scene, with many lovers of fun, funky, classic rock and roll. You should see a nice turnout.\n          *goto city\n        *else\n          Atlanta it is!\n          *goto city\n\n*label city\n*if band_size >=7\n  *set money -1500\n  *goto city2\n*if band_size >=5\n  *set money -1000\n  *goto city2\n*else\n  *set money -500\n  *goto city2\n  \n*label city2\n  \nYou arrive in ${stop1} the morning of your first show at The Hot Box, an up-and-coming downtown club. You have about eight hours to kill before getting onstage. ${band_member1} suggests that you spend your day shopping.\n\n\"Now that we're a sorta-kinda-realish band, it's time we started dressing like it, don't you think?\"\n\n${band_member1} does have a point, but you. How would you like to spend the time?\n\n*choice\n  #Let's get our style on.\n    *set style %+10\n    *set cohesion %+15\n    You swing over to a mall and begin poking around the stores.\n    *if band_size >= 7\n      *set money -750\n      *goto style\n    *if band_size >= 5\n      *set money -500\n      *goto style\n    *else\n      *set money -250\n      *goto style  \n  #We need to be extra-sharp tonight. Let's go early and rehearse.\n    *set cohesion %-20\n    *set musicianship %+15\n    You pull up outside the club and start unpacking, only realizing when it's too late that all the doors are still locked. Since you're not about to reload the ${vehicle}, you decide just to set up and play outside. It's not exactly how the band was hoping the spend the day, but you're glad for every minute of practice you can get. Finally, a member of the wait staff arrives and lets you inside.\n    *goto show\n  #We need to get a buzz going. Publicity is the key.\n    *set cohesion %-10\n    *set buzz %+15\n    *set money -100\n    Just because you've moved up to the somewhat-bigger leagues doesn't mean your days of flyering before shows are over. After swinging by Kinkos, you head out to the local college and start plastering. Meanwhile, ${band_member2} has the bright idea to call up the college radio station and offer an \"exclusive pre-show interview.\" Besides boosting your ego, the interview gives you a great chance to promote your\n    *if (demo_first = true)\n      show\n      *if (studio_slave = true) \n        and demo. Plus, you have your first chance to try out that self-depreciating story about working at Bubonic Sonic to pay for the recording time. The interviewer loves it.\n        *if (demo_style = \"excellent album\") or (demo_style = \"album\")\n          *set buzz %+25\n          *goto show\n        *elseif (demo_style = \"excellent EP\") or (demo_style = \"short and sweet\")\n          *set buzz %+15\n          *goto show\n        *else\n          *set buzz %+5\n          *goto show   \n      *else\n        and demo.\n        *if (demo_style = \"excellent album\") or (demo_style = \"album\")\n          *set buzz %+25\n          *goto show\n        *elseif (demo_style = \"excellent EP\") or (demo_style = \"short and sweet\")\n          *set buzz %+15\n          *goto show\n        *else\n          *set buzz %+5\n          *goto show          \n    *else\n      show.\n      *goto show\n*label fran2\n*set buzz %+10\nThis is the biggest, most happening venue you'll be hitting all tour, so it's essential that you knock it out of the park. I'm sure you will. Happy travels!\"\n \nArriving in ${stop1}, you meet the stylist, an imposing Italian woman named Maria. She guides you around a mall, picking out a number of different outfits for all the band members.\n\n*if sound = \"punk\"\n  \"I've decided on an ensemble of ripped jeans, leather boots, black shirts, mohawks, and an army camo jacket for our band leader. Oh, and some aggressive facial piercings all around. What do you say?\"\n  *goto yes_no\n*elseif sound = \"poppy\"\n  \"I've decided on an exciting ensemble of tight shirts, colorful hair bands, gold chain necklaces, retro military-style jackets, and\n  *if gender = \"male\"\n    just a dab of black eyeliner for our band leader. What do you say?\"\n    *goto yes_no\n  *else\n    cherry red lipstick for our band leader. What do you say?\"\n    *goto yes_no\n*elseif sound = \"heavy\"\n  \"I've decided on an exciting ensemble of torn undershirts, leather jackets, black jeans, large belt buckles, poofy hair, and a \n  *if gender = \"male\"\n    striped bowler hat for our band leader. Oh, and some tasteful tattoos all around. What do you say?\"\n    *goto yes_no\n  *else\n    floral headband for our band leader. Oh, and some tasteful tattoos all around. What do you say?\"\n    *goto yes_no\n*elseif sound = \"artsy\"\n  \"I've decided on an elegant ensemble of tight pants, sport jackets, skinny ties, bowler hats, and some horn-rimmed glasses for our band leader. What do you say?\"\n  *goto yes_no\n*elseif (sound = \"folksy\") or (sound = \"jammy\")\n  \"I've decided on a rustic ensemble of flannel shirts, corduroy pants, long hair, and circular sunglasses. What do you say?\"\n  *goto yes_no\n*else\n  \"Because your sound is so unusual, I've decided upon an eclectic ensemble of tight jeans, colorful shirts, skinny ties, berets, and aviator sunglasses. What do you say?\"\n  *goto yes_no\n  \n*label yes_no\n\n*choice\n  #Works for me; let's do it.\n    *set style %+20\n    *set commercial %+15\n    *set folksiness %-10\n    \"[i]Bellissimo![/i]\" shouts Maria. The next few hours are a whirlwind of salons and changing rooms. When you look in the mirror at the end of it all, you can hardly recognize yourself or your bandmates. It feels like there are ${band_size_text} complete strangers staring back at you…strangers who are ready to rock!\n    *if band_size >= 7\n      *set money -750\n      *gosub rosenblatts_costume\n      *goto end_style\n    *if band_size >= 5\n      *set money -500\n      *gosub rosenblatts_costume\n      *goto end_style\n    *else\n      *set money -250\n      *gosub rosenblatts_costume\n      *goto end_style  \n  #No. Just…no. \n    *set commercial %-15\n    You relieve Maria of her duties and decide to take over styling responsibilities yourself. \n    *goto style\n  #You call that a style? This is a rock band, not a knitting circle. We need something that can be seen from the cheap seats.\n    *achieve styleking\n    *set style %+30\n    *set folksiness %-20\n    \"Why didn't you say so before!?\" shouts Maria, throwing her hands in the air.\n  \n    The next few hours are a whirlwind of airbrush makeup, hair salons, and clothes that look like they were bought in a costume store. When you look in the mirror at the end, you hardly recognize yourself or your bandmates. It feels like there are ${band_size_text} complete strangers staring back at you…strangers who are ready to rock!\n    *goto end_style\n\n*label style\nYou want to find something fashionable and low-key. Most importantly, it must fit your musical style. Which do you choose?\n*choice\n  #Something bright and tight from United Colors of Benetton.\n    *set style %+10\n    *set money -200\n    *goto end_style\n  #Something black and ripped from Dejaiz.\n    *set style %+10\n    *set money -174\n    *goto end_style\n  #Something hip and dressy from The Limited.\n    *set style %+10\n    *set money -150\n    *goto end_style\n  #Something rustic and sensible from The Gap.\n    *set style %+7\n    *set money -100\n    *goto end_style\n  #Something cheap and low-key from the Salvation Army.\n    *set style %+5\n    *set money -50\n    *goto end_style\n\n*label end_style\n\nAs you pile back into the van with your new threads, it's hard to stop staring at yourself in the mirror. For the first time, your outward appearance comes close to matching your inward awesomeness. It may be a superficial thing, but it definitely raises everyone's confidence before the big show.\n*goto show\n*label show\n\nEntering The Hot Box for the first time, you are stunned by what you see. The spacious hall looks like an old ballroom, with golden curtains, glistening chandeliers, and gorgeous molding around the walls. The floor looks like it could hold at least three hundred people, easily the largest audience you will have seen since The Battle. Clearly, this is a far cry from Strom's. As everyone takes their sunglasses off and examines the space, you notice in your bandmates' eyes a hint of nervousness along with excitement.\n\nBackstage, you are greeted by The Marvins, tonight's headlining band. The Marvins are an abstract electronica outfit from New York City, with a deep commitment to their proto-futuristic aesthetic: All members perform in spacesuit costumes and play instruments that look like props from a science fiction movie. The lead singer, already in full costume hours before the show, pulls off his helmet and introduces himself.\n\n\"I'm Marvin. \n*if ((sound = \"artsy\") or (sound = \"poppy\")) or (sound = \"punk\")\n  *set marvins %+20\n  Word is you guys have a pretty sweet cutting-edge sound. That's cool. I can't stand that standard rock-and-roll bullshit. Anyway,\n  *goto marvin  \n*elseif buzz >= 60\n  *set marvins %+10\n  I hear you guys are picking up a lot of buzz these days, huh? Well,\n  *goto marvin\n*elseif rory\n  *set cohesion %-10\n  *set marvins %+10\n  I hear you guys have a pretty interstellar vocal section. Some chick named Rory does all the heavy lifting, and you just have to play your ${instrument}, huh? Sounds like a sweet setup. Unfortunately, everyone in my band has to play and sing, but I guess that's why we're on the rocketship to success. Anyway,    \n  *goto marvin\n*else\n  I hear this is your first time opening for a big-league band like us. Well,\n  *goto marvin \n\n*label marvin\njust remember, the audience is here to see us, not you. So just play your songs, don't showboat, and give us our shout-out at the end. Got it?\"\n\nBefore you can respond, he and the rest of The Marvins walk off to their much larger dressing room. What jerks!\n*page_break\nWhether it was The Marvins' psych-out, or just the pressure of playing in the biggest, hippest club you've ever seen, the band is a bit off; you struggle through a lackluster soundcheck. Everyone seems cowed by the moment, knowing that the performance tonight could make or break your careers. You need something to bring everyone's confidence back…but what?\n*choice\n  #\"On stage the band has got problems, they're a bag of nerves on first nights.\"\n    *set cover \"Torn and Frayed\"\n    *if album = \"Exile on Main Street\"\n      *achieve perfectsong\n      All of a sudden, those famous Stones lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Stones lyrics come rushing into your head.\n      *goto wrong\n  #\"The only thing I knew how to do was to keep on keeping on, like a bird that flew.\"\n    *set cover \"Tangled Up In Blue\"\n    *if album = \"Blood on the Tracks\"\n      *achieve perfectsong\n      All of a sudden, those famous Dylan lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Dylan lyrics come rushing into your head.\n      *goto wrong\n  #\"All you do is slow me down, and I got better things on the other side of town.\"\n    *set cover \"Crosstown Traffic\"\n    *if album = \"Electric Ladyland\"\n      *achieve perfectsong\n      All of a sudden, those famous Hendrix lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Hendrix lyrics come rushing into your head.\n      *goto wrong\n  #\"The time is gone, the song is over, thought I'd something more to say.\"\n    *set cover \"Time\"\n    *if album = \"The Dark Side of the Moon\"\n      *achieve perfectsong\n      All of a sudden, those famous Pink Floyd lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Pink Floyd lyrics come rushing into your head.\n      *goto wrong\n  #\"I set out running, but I take my time, a friend of the devil is a friend of mine.\"\n    *set cover \"Friend of the Devil\"\n    *if album = \"American Beauty\"\n      *achieve perfectsong\n      All of a sudden, those famous Dead lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Dead lyrics come rushing into your head.\n      *goto wrong\n  #\"I gotta roll, can't stand still, got a flame in my heart, can't get my fill.\"\n    *set cover \"Black Dog\"\n    *if album = \"Led Zeppelin IV\"\n      *achieve perfectsong\n      All of a sudden, those famous Zeppelin lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Zeppelin lyrics come rushing into your head.\n      *goto wrong\n  #\"All your life, you were only waiting for this moment to arise.\"\n    *set cover \"Blackbird\"\n    *if album = \"The White Album\"\n      *achieve perfectsong\n      All of a sudden, those famous Beatles lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Beatles lyrics come rushing into your head.\n      *goto wrong\n  #\"You're too old to lose it, too young to choose it, and the clock waits patiently on your song.\"\n    *set cover \"Rock 'n Roll Suicide\"\n    *if album = \"The Rise and Fall of Ziggy Stardust and the Spiders from Mars\"\n      *achieve perfectsong\n      All of a sudden, those famous Bowie lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Bowie lyrics come rushing into your head.\n      *goto wrong\n  #\"Don't be told what you want, don't be told what you need.\"\n    *set cover \"God Save the Queen\"\n    *if album = \"Never Mind the Bollocks, Here's the Sex Pistols\"\n      *achieve perfectsong\n      All of a sudden, those famous Sex Pistols lyrics come rushing into your head,\n      *goto correct\n    *else\n      For whatever reason, those famous Sex Pistols lyrics come rushing into your head.\n      *goto wrong\n\n*label correct\n*set cover \"\\\"${cover}\\\"\"\n*set cohesion %+15\n*set stage_presence %+20\n*set marvins %+20\n*set buzz %+15\nbringing back memories of when you used to wear out ${album} as a child, listening to it endlessly all summer, dreaming you would one day grow up to do exactly what you're doing right now. It was the first rock album you ever heard, the first you ever loved, and now it's the first and only thought in your mind. All of a sudden, the pressure just floats away. If this is just a dream that you're living in, then there's no reason to worry at all, right? \n\nYou lay down the opening notes of ${cover} and hum the melody, looking around to see if anyone else catches on. After a moment, ${band_member2} jumps in on the vocals and you settle into the ${instrument} role. \n\n\"Oh, I know this tune!\" ${band_member1} shouts out, joining in. Soon enough, everyone has caught on, and the entire band is belting out the most energetic cover of ${cover} imaginable. You close your eyes, losing yourself in the moment, and when you open them again you find that you're now in front of a packed house of hundreds, belting out those iconic lyrics once more. \n\nWhat you've just experienced is a well-known phenomenon called \"Performers' Hypnosis,\" in which artists on stage lose track of time and find themselves \"waking up\" after a long performance. To you it just reinforces the dreamlike feeling you recaptured during soundcheck.\n*goto end\n\n*label wrong\n*set cover \"\\\"${cover}\\\"\"\nThey seem to perfectly describe the feeling of this moment for you. Feeling like you have to play it right now, you turn to your band mates.\n\n\"Hey, do you guys know how to play ${cover}?\" you ask. You are greeted with shrugs of confusion all around. \n\n\"What's ${cover}?\" asks ${band_member1}. \"I've never heard of it.\"\n\nThat does it. For the next thirty minutes of soundcheck time, you set about teaching the band how to play ${cover}. \n*if musicianship > 65\n  *set stage_presence %+10\n  *set buzz %+15\n  Thankfully, your musical skills are such that the classic song does not prove too big a challenge, and by the end of soundcheck, you and the band are rocking out like it's one of your own tunes.  \n\n  It's exactly that energy and confidence which propels you through your set, allowing you to perform in front of a packed house of hundreds just as if you were playing in your backyard. And when it comes time for one last song, you step up to the microphone and announce…\n  \n  \"Here's a song we just figured out how to play before the show. Maybe you've heard it before.\"\n  \n  …before ripping into a killer, wholly original-sounding take on ${cover}.\n  *goto end\n*else\n  Unfortunately, the classic tune proves too tricky for the band to learn in the short time before the show. Still, just playing it gives you the confidence and energy you need to propel you through you the show.\n  *goto end\n\n*label end\n*if uno\n  *set cohesion %-15\n  *set musicianship %+10\n  Although the set goes well, you can't help but notice Uno hamming it up for the crowd, embellishing his guitar parts to an absurd degree. You roll your eyes, but the crowd does seem to dig it.\n  *goto endd\n*else\n  *goto endd\n  \n*label endd\n   \nWith The Marvins's tech crew waiting in the wings, it's time to step to the mic to say goodbye to the audience. What do you say? \n*choice\n  #\"Thank you ${stop1}, you guys have been great. Our name is ${band_name}. Get ready for the interplanetary space grooves of The Marvins coming on next. Good night!\"\n    *set marvins %+20\n    *goto after\n  #\"Thank you ${stop1}! We're ${band_name}, and we rock. The Marvins are up next.\"\n    *set buzz %+5\n    *set marvins %+10\n    *goto after\n  *selectable_if (reputation >= 43) #\"We're ${band_name}, and The Marvins suck. If you're here for The Marvins, then you suck, too. Goodnight ${stop1}!\"\n    *set reputation %+15\n    *set buzz %+10\n    *set MarvinsHate true\n    *set marvins %-90\n    A smattering of boos greets you from the audience. Your bandmates just shake their heads in your general direction. ${band_member1} wants to be annoyed at you, but also cannot stop from laughing at your antics.\n    \n    \"If you want the audience to hate us so badly, we could have just stayed at Strom's.\"\n    \n    *goto after\n       \n*label after\nAs you step offstage, the tech crew comes on to break down your gear and set up for The Marvins. You almost run head first into the enormous plywood rocketship being hauled onto the stage.\n*if MarvinsHate\n  *if reputation >= 65\n    *set buzz %+10\n    You go backstage expecting a confrontation, but instead you find that The Marvins have locked their dressing-room door and hidden themselves inside. It seems your reputation has preceded you.    \n\n    Outside your dressing room, you meet a gang of rowdy fans who've forced their way backstage. They greet you like heroes and beg you to party with them. You tell them you'll think about it.\n    *goto after2\n  *else\n    You go backstage to find an angry Marvin waiting for you at your dressing room. He rants and raves, swearing that he will ruin your career. You just smirk as he puts his space helmet back on and storms off.\n    *goto after2\n*else\n  *goto after2\n\n*label after2\n\nYou realize, as you settle into your dressing room at the unreasonably early time of 10:30, that you have an entire night ahead of you with no plans whatsoever. Being the opening act rocks!\n\n*label choice2\nHow do you want to spend your night?\n*hide_reuse\n*choice\n  #Might as well check out The Marvins.\n    *set marvins %+25\n    *set style %+10\n    *set reputation %-15\n    You decide to stick around and find out what The Marvins have to offer. You and the band grab a table in the upstairs balcony and settle in for the show. \n    \n    It's hard to say what your expectations were before The Marvins came on stage, but they clearly did not come close to anticipating the vibrant insanity unleashed in front of you. Part performance art, part interpretive dance number, part laser light show, and small part music: It is like nothing you've ever seen or heard.\n    *if casperquit = false\n      Even Casper, typically disdainful of any stagecraft, is enthralled by the spectacle.\n      *goto later_marvin\n    *else\n      *goto later_marvin  \n    *label later_marvin\n    \n    Later in the performance, as two of The Marvins start acting out a lightsaber battle with their keytars, you look down at the audience and realize that they are more enthralled than any audience you've ever seen. It may be gimmicky and even cheesy, but it sure seems to work.\n    \n    *goto marvinq\n  #Party backstage.\n    *set health %-10\n    *set reputation %+15\n    With the electronic space-grooves pumping in the background, you decide to break out the booze and kick off a party with\n    *if MarvinsHate\n      *set buzz %+5\n      your new fans backstage. While it was hard to tell from onstage, it seems a lot of people really dug your show! They keep clamoring to get into your dressing room until it's full.       \n\n      You rage with them all through the night. As the party grows, you are repeatedly asked to keep the noise down until you are finally kicked out of the venue. The party continues back at a fan's pad, where the number of party-goers continues to swell. At some point, the owner of the house mentions that he has some instruments set up in the basement and wonders if you might be interested in playing a few tunes. The party-goers are excited, but ${band_member1} and ${band_member2} seem unsure. What do you do?\n      *choice\n        #Give the people what they want!\n          *set buzz %+15\n          *set health %-15\n          *set cohesion %-15\n          The party-goers cheer and pile downstairs as you get ready to perform. \n          *goto secret_show\n        #Politely remind them that there's a show tomorrow night, one that you actually get paid for.\n          *set buzz %-10\n          After some good-natured boos, the party continues right on into the night. At some point the scene becomes hazy, and you black out until you are awakened by…\n          *goto tomorrow\n        #Leave the other band members alone if they're not interested. You can jam with whoever wants to yourself.\n          *set cohesion %-5\n          *set health %-10\n          While the rest of the band declines, you settle down at the ${instrument} and launch into a jam session with whoever else decides to join. The rest of the party-goers are thrilled, many of them showing their appr
