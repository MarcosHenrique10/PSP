<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HMS Foraker — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "foraker", "title": "HMS Foraker", "scenes": {"chapter_1": "*set date + 21\n*check_achievements\n*set chapnum 1\n*text_image chap_1.png center Chapter 1\n\n\"—I am not being contrarian without purpose,\" Lieutenant Bannister insists as ${pronoun_1} reaches across your dining table to refill ${pronoun_2} glass. \"I merely submit the argument that the Columbians have every right to be cross with us. The heavy-handed manner in which we have impressed their merchant sailors on the mere suspicion of being deserters, and the way which our government has consistently interfered with their trade; could any of us at this table say that Albion would have done nothing had some other nation imposed such outrages on us?\" $!{pronoun_1} shakes ${pronoun_2} head. \"No, \n*if gender = \"men\"\n  gentlemen.\n*if gender = \"women\"\n  ladies.\nI say it has been long past time for us to accept that Columbia's complaint is justified, and to sue for peace. What possible good does it do for us to feed ships and regiments into this pointless sideshow when\n*if gender = \"men\"\n  Corleone Bellaroque still styles himself \"Emperor of the Gauls\" and threatens the peace of the world with an army of nearly a million fighting men?\"\n*if gender = \"women\"\n  Callista Bellaroque still styles herself \"Empress of the Gauls\" and threatens the peace of the world with an army of nearly a million fighting women?\"\n*comment endif\n\n\"Peace will not come cheap,\" Lieutenant $!{lieutenant} notes from the other side of your cramped dining cabin. \"The Columbians have an unceasing greed for territory, that is the real reason why they started this war. They would most certainly demand our colonies to their north as compensation.\"\n\n\"A small price for an end to this needless distraction, surely!\" Bannister answers vehemently. \"What will we stand to lose save for a few acres of snow?\"\n\n*if lieutenant = \"fisher\"\n  \"What will we stand to lose?\" Fisher replies, cheeks flushed with indignation. \"Our reputation! Our honor! Our security! Once it becomes known that Albion might be successfully bullied by any \n  *if gender = \"men\"\n    Harry, Dick, or Tom,\n  *if gender = \"women\"\n    Harriet, Hester, or Tamsin,\n  every nation which has ever coveted anything of ours shall know it is the hour for plunder. It may only be a few acres of snow to Columbia today, but what about tomorrow when Iberia demands the Rum Islands, or the day after that, when Zollern clamors to annex Hibernia?\"\n*if lieutenant = \"simpson\"\n  \"You forget yourself, ${pronoun_5},\" Simpson replies voice low and dangerous. \"Those \"few acres of snow\" are my home. I would rather be cut in half by a cannonball than see New Lothian under Columbian tyranny, and I would rather damn my soul to hell than see the sun-and-stripes fly over Ismay.\"\n*if lieutenant = \"shannon\"\n  \"And who are we to presume what is too great and small a price?\" Shannon shoots back, voice rising in frustration. \"Diplomacy is the task of Parliament, and $!{pronoun_2} Majesty's Government! They are the ones who set policy and we are the ones who must carry it out. The day that arrangement is reversed, we shall become no better than Bellaroque and the Gauls!\"\n*if lieutenant = \"pakenham\"\n  \"And how long shall this peace last?\" Pakenham asks, though judging by the tautness of ${pronoun_2} voice, ${pronoun_1} already knows the answer. \"Their government is already far too enamored with Gaul as it is. If one swells their self-confidence by offering them anything that they might consider a victory, how long before they decide they have a taste for war with Albion? How long before they throw in their lot with Bellaroque?\" $!{pronoun_1} shakes ${pronoun_2} head, ${pronoun_2} expression a mask of most tranquil outrage. \"We ain't securing peace, we are offering our enemies the time and inclination to plunge a knife into our backs.\"\n*fake_choice\n  #Bannister is right: we must have peace.\n    *set gallantry %-10\n    *set sensibility %+10\n    *if lieutenant = \"fisher\"\n      \"You forget yourself, $!{pronoun_4} Fisher,\" you reply as calmly as you can. \"Iberia and Zollern are our allies, and both have suffered far more at the hands of Bellaroque than we have. I do not think peace with Columbia will weaken us quite as much as you think.\"\n      \n      Bannister thankfully does not have the poor sense to gloat as you enter your arguments alongside ${pronoun_2} own. Fisher retreats back to ${pronoun_2} glass of port, sulking. $!{pronoun_1} has too much good sense to press the issue now that you have set yourself against ${pronoun_3}. \n    *if lieutenant = \"simpson\"\n      \"Surely our own peace commissioners would have some say in the matter, $!{pronoun_4} Simpson,\" you reply reassuringly. \"New Lothian is far too valuable to surrender, especially as Ismay is our largest military port on this side of the world. If we must give up some territory to satiate Columbia's ambitions, then it shall be land which Albion can afford to lose.\"\n      \n      Bannister at least has the good grace not to gloat as you enter the dispute on ${pronoun_2} side. As for Simpson, ${pronoun_1} can hardly take offense, not at the table of a superior officer. If ${pronoun_1} is left unsatisfied by your reassurances, ${pronoun_1} makes no effort to show it.\n    *if lieutenant = \"shannon\"\n      \"Yet surely, Parliament is responsible to those it represents, does it not?\" you intervene. \"We are all gentle${gender} of property here at this table. Ought not our opinions be heard, much as those of any other constituent? And ought not our views be allowed free circulation amongst ourselves, so that we may acquire a better grasp of the great matters of the day?\"\n      \n      Shannon can hardly argue against that, not while sitting at the Captain's Table. $!{pronoun_1} withdraws as gracefully as ${pronoun_1} can. Bannister has the good grace not to gloat.\n    *if lieutenant = \"pakenham\"\n      \"You forget, ${pronoun_5}, that not all in Columbia possess as warlike a temperament as those ${gender} who currently comprise their government,\" you remind your first lieutenant. \"Surely there must be many Columbians who oppose open conflict with Albion and miss dearly the sight of our trading ships in their harbors. Likewise, let us not forget that there is a prominent party within the Columbian government which would much rather be our allies than our enemies, and though they may be out of power for the moment, they may return to prominence before long.\"\n      \n      Bannister offers you a nod in appreciation as you take ${pronoun_2} part. As for Pakenham, ${pronoun_1} can only concede the point with ${pronoun_2} usual grace. Even an officer as well-connected as ${pronoun_1} daren't contradict a captain at ${pronoun_2} own table.\n    *goto chap_1_1\n  *if lieutenant = \"fisher\"\n    #Fisher is right: Albion cannot be seen as weak.\n      *set gallantry %+10\n      *set sensibility %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      \"I fear $!{pronoun_4} Fisher has the right of it,\" you rule. \"Recall that it was not so long ago that Iberia and Zollern were arrayed against us as Bellaroque's allies. The only reason they take our party now is because they believe us stronger than the Gaulish. Should a capitulation to Columbia force that perception to change, they may have every reason to switch sides again.\"\n      \n      Fisher sits back with a satisfied look on ${pronoun_2} face, though ${pronoun_1} at least retains the good sense not to gloat. Faced with the prospect of contradicting not only ${pronoun_2} senior lieutenant, but ${pronoun_2} captain as well, Bannister chooses wisely not to press the point.\n      *goto chap_1_1\n  *if lieutenant = \"simpson\"\n    #Simpson is right: the price Columbia will demand for peace is too high.\n      *set gallantry %+10\n      *set sensibility %+10\n      \"When Columbia declared independence from Albion forty years ago, families like those of $!{pronoun_4} Simpson had every opportunity and incentive to join them,\" you remind the table. \"Instead, they chose to remain loyal to Albion, many even fought for their $!{monarch} against the rebel armies. Many lost their fortunes, many lost their lives. To reward such loyalty by consigning their \n      *if gender = \"men\"\n        son and daughters\n      *if gender = \"women\"\n        daughters and sons\n      to the tyrannous rule of the very same government they fled from is unconscionable.\"\n      \n      From the other side of the table, Simpson offers you a look of gratitude. Bannister concedes the point, there is little else ${pronoun_1} can do, not with ${pronoun_2} captain standing opposed. \n      *goto chap_1_1\n  *if lieutenant = \"shannon\"\n    #Shannon is right: this is Parliament's decision, not ours.\n      *set gallantry %+10\n      *set sensibility %+10\n      \"Let us not forget that our duty is to Albion, not to what we believe Albion ought to be doing,\" you state by way of reminder. \"We may be tempted from time to time to think that we know better than the Government regarding where our national interests lie, but we mustn't ever allow that temptation to seduce us to action. We have seen plainly the dire result when soldiers and sailors seize the reins of power while pleading the public interest. One Bellaroque has proven quite turbulent enough this century, I would very much not welcome another.\"\n      \n      Lieutenant Shannon nods sagely as you make your opinion on the matter plain. As for Bannister, ${pronoun_1} can only concede the point, now that you have arrayed yourself against ${pronoun_3}.\n      *goto chap_1_1\n  *if lieutenant = \"pakenham\"\n    #Pakenham is right: We cannot risk Columbia allying with Gaul.\n      *set gallantry %+10\n      *set sensibility %+10\n      \"I confess that I am not an expert on the vagaries of public opinion,\" you interject, \"but I have always been under the impression that success in war only strengthens the position of the dominant party. Indeed, it would seem to me that any settlement which the current Columbian government might describe as a victory would only increase their popularity, emboldening our enemies and further marginalizing our friends. It seems to me that any hope of friendship with Columbia in future must be based on a demonstration of our strength and martial resolve now.\"\n      \n      Pakenham offers you a discreet, but appreciative glance. Bannister quietly concedes the point. $!{pronoun_1} knows full well it would not do to contradict you at your own table. \n      *goto chap_1_1\n  #If discussion of politics leads to such intemperate disputes, then it must stop.\n    *set sensibility %-20\n    \"I find this conversation growing rather uncivil,\" you interject with a tone of command. \"Let us all recall that we are all $!{monarch}'s officers here, bound to a common cause and a common service regardless of our political opinions. If disputes over politics bear the danger of making us lose sight of that, then I must insist we refrain from them.\"\n    \n    One by one, your officers nod in acquiescence. They have no choice in the matter. [i]Foraker[/i] is your ship, and aboard it your word is law, doubly so at your own dining table. Even Bannister gives way, even though ${pronoun_1} does so only grudgingly.\n    *goto chap_1_1\n\n*label chap_1_1\n*set gosub_index 200\n*gosub_scene gosub\n*page_break\nIt is Captain Mercer who boldly essays to salvage the evening. \n\n\"Come now, we are all still friends here, are we not?\" ${pronoun_1} asks jovially, a bumper of port in ${pronoun_2} hand. \"Let us have no more of division on this fine evening. Let us instead have a toast! To something which we are all in accord.\"\n\n\"Hear hear!\" $!{lieutenant} concurs, apparently just as eager to make amends. \"A toast!\"\n\nMercer turns to you. \"$!{pronoun_5}? With your permission?\"\n\nYou nod. $!{pronoun_1} clearly means well, and you rather doubt that the marine officer's efforts will make things worse.\n\nMercer stands to almost ${pronoun_2} full height, stooped just enough to avoid the low ceiling. Chairs scrape against the deck as the other officers join ${pronoun_3}.\n\n*if (sensibility >= 50) and (gallantry >= 50)\n  \"Damnation to the Gauls!\" Mercer toasts.\n  *page_break\n  And just like that, the last vestiges of ill humor are routed from the room. Even if you are an ocean away, and fighting a wholly different enemy, the mention of the old adversary is more than enough to bury any differences you might have betwixt you, in favor of those unsettled disputes yet to be concluded with Albion's eternal enemy.\n  \n  \"Damnation to the Gauls!\" Your officers chorus, raising their glasses in salute.\n  \n  As do you.\n*if (sensibility \u003c 50) and (gallantry >= 50)\n  \"The $!{monarch}!\" Mercer toasts.\n  *page_break\n  Whatever vestiges of rancor or ill-feeling betwixt your officers evaporates at that moment. Whatever differences in opinion or views you might have, you are all officers of the $!{monarch}. It is the commission that you all hold, signed by that august royal hand, which binds you together. You have all pledged to die for $!{pronoun_3}, and if that is what is required of you, then you will all at least know that you have done your duty.\n  \n  \"The $!{monarch}!\" Your officers chorus as they raise their glasses in salute.\n  \n  As do you.\n*if (sensibility >= 50) and (gallantry \u003c 50)\n  *if gender = \"men\"\n    \"To wives and sweethearts!\" Mercer toasts. \"May they never meet!\"\n  *if gender = \"women\"\n    \"To husbands and sweethearts!\" Mercer toasts. \"May they never meet!\"\n  *page_break\n  A round of laughter rises from the table. You aren't actually supposed to say the second half of that particular toast, especially not in hearing of the gentler sex, or midship${gender} yet in their formative years.\n  \n  Yet there are no such personages present tonight, and you have never known Captain Mercer to be subtle when ${pronoun_1} might achieve better results else-wise.\n  \n  And certainly, your other officers do not seem to mind. Any vestige of ill-humor is long gone now. Smiles light the room as your Lieutenants raise their glasses in salute. \"May they never meet!\" they chorus, in complete contentment.\n  \n  As do you.\n*if (sensibility \u003c 50) and (gallantry \u003c 50)\n  \"To safe harbor!\" Mercer toasts.\n  *page_break\n  The Navy is a bloodthirsty service at times. Certainly it has acquired a well-deserved reputation for aggression over the centuries, but that does not mean that the ${gender} who command and crew Albion's ships of war are entirely without regard for those they leave behind. Indeed, for most, it is the promise of seeing their loved ones safe from the threat of foreign rule and depredation which bends them to their duty, and no wish is more likely to gain unanimous assent aboard a $!{monarch}'s ship than the desire to be home again.\n  \n  So it is with one heart that your officers raise their glasses, all vestiges of ill-will forgotten. \"Safe harbor!\" they chorus, their eyes bright and their voices clear.\n  \n  As do you.\n*page_break\n*set date + 1\nThe rest of the evening passes pleasantly enough, any notion of lingering bitterness forgotten. Yet you sleep very little that night, not because of what has passed, but what is to come tomorrow.\n\nThe next morning, [i]Foraker[/i] makes ${ship_pronoun_2} rendezvous with HMS [i]Courageous[/i]. After a short passage in the ship's boat, you clamber up the slab sides of Admiral Warwick's 74-gun flagship, past the checkered rows of closed gunports and up over the side to the shrill sound of the bosun's whistle.\n\nThat is all the ceremony you get today. [i]Courageous[/i]'s first lieutenant wastes little time in ushering you to the flag cabin, where your superior awaits.\n*page_break\nThe Commander in Chief of the Columbian Station is staring out the stern windows when you arrive, a slim, rigid figure who still bears all the tautness of a predatory cat.\n\nAdmiral Warwick turns as you are announced, ${pronoun_2} expression sharply focused. \"Ah! $!{name}. Good of you to have come so quickly, we have precious little time to lose. How much do you know about the Columbian Navy's heavy frigates?\"\n\n*if gallantry >= 50\n  You feel your heartbeat quicken. You've been in the service long enough to intuit where this conversation is going. \"I know that they are the most powerful ships the Columbians have,\" you reply, \"and that any captain who could take one would strike a palpable blow for Albion, ${pronoun_5}.\"\n  \n  \"Easier said than done, $!{name},\" Warwick growls. \n*if gallantry \u003c 50\n  You feel your chest tighten and the hairs on the back of your neck prickle. You've been in the service long enough to know danger when you hear it. \"I know that they are the most powerful ships the Columbians have,\" you reply cautiously, \"and I also know that their heavy armament and construction make them a match for any Albionian frigate.\"\n  \n  \"More than a match, I'm afraid,\" Warwick growls.\n\"Two of the bloody things have dogged us these past six months. I have lost three frigates and half a dozen sloops to them. Now I have received reports that they may have been joined by a third, just as heavily armed and built. Your orders are to ascertain the veracity of these reports and, if there is indeed a third Columbian frigate, to find ${ship_pronoun_3}, and to inform me of ${ship_pronoun_2} location. Any questions?\"\n*temp convo_prog 0\n*label chap_1_2\n*choice\n  *hide_reuse #\"If we find this enemy frigate, do we have permission to engage ${ship_pronoun_3}?\"\n    *set convo_prog + 1\n    \"You do not, $!{pronoun_5},\" Warwick states flatly. \"If this third ship is anything like the other two, ${pronoun_1} will outweigh you in guns and crew by a wide margin. These Columbians have cost us too many ships already, and I do not intend to see another one of\n    *if gender = \"men\"\n      His Majesty's\n    *if gender = \"women\"\n      Her Majesty's\n    frigates taken as a trophy by these damnable upstarts. Once you ascertain ${ship_pronoun_2} location, you are to send word immediately to the [i]Courageous[/i], and avoid any engagement while practicable.\"\n    \n    \"And if an engagement is forced upon us?\" you ask.\n    \n    The Admiral's lips pull taut. \"Then you shall have no choice but to engage,\" ${pronoun_3} replies grimly. It is one thing to avoid seeking out battle against a superior foe, but to show one's heels when it is the enemy who offers battle reeks too much of cowardice in the nostrils of any officer of the Royal Navy. \n    \n    *if gallantry >= 50\n      Which means if you bait this Columbian into attacking you first, you would be completely within your orders to fight back.\n    *if gallantry \u003c 50\n      Which means if you find yourself challenged, you shall have no choice but to offer your ship, your crew, and possibly your life up to the altar of the Navy's fighting reputation.\n    *comment endif\n    \n    \"Will there be anything else, Captain?\"\n    *goto chap_1_2\n  *hide_reuse #\"Shall we still be able to take prizes should the opportunity present itself?\"\n    *set convo_prog + 1\n    The Admiral's eyebrow rises. \"Prizes? Yes, I suppose that is why we are all here, isn't it?\" \n    \n    You suppose rank must have its privileges, as the Admiral states plainly the truth that would be far too crass for a more junior officer to mention. For all the disputes political, moral, and economic betwixt Albion and Columbia, the truth is that the Columbian War is a lucrative opportunity for any Albionian captain with ambition worthy of the title. The United Republics is a country of traders, and war means that its vast merchant fleet is now a legitimate target of war. A lucky cruise could mean taking a dozen prizes, and bring riches beyond mentioning to an aggressive captain.\n    \n    \"Should the opportunity present itself, you are to take prizes based on your own discretion,\" Warwick rules, \"however, do not forget that your main priority pertains to the enemy frigate. Albion is in want of a victory in these waters, and if we do not secure one, then public opinion is likely to turn against this war. If peace is made with Columbia, then it is back to blockade duty for all of us. Understood?\"\n    \n    You nod. \n    \n    \"Good, any further questions?\"\n    *goto chap_1_2\n  *hide_reuse #\"How goes the war elsewhere, ${pronoun_5}?\"\n    *set convo_prog + 1\n    \"The war against Bellaroque goes well,\" Warwick answers. \"The Gaulish have almost been driven out of Iberia entirely. Our allies in Zollern and Carinthia have almost pushed to the Gaulish border. The war may be over in a year, two at the most.\"\n    \n    \"And our war against Columbia?\" you ask.\n    \n    Warwick's expression grows grim. \"Our war against Columbia goes damned badly. They have pushed us north across the border and burned Dunbarton. It is feared that they may push east and threaten $!{monarch}smount as well. Worse yet, the Columbian Navy has become a most vexatious nuisance. Their ships have inflicted great losses on our trade. Their heavy frigates have proven particularly troublesome, being too powerful for our own frigates and too swift for the [i]Courageous[/i] to run down.\" $!{pronoun_1} shakes ${pronoun_2} head. \"Every single time one of those damned ships takes another of our frigates, their newspapers strut and crow with such unseemly arrogance that they convince the Columbian public that they have all but won this war. Worse yet, they are convincing our public as well. The Admiralty is up in arms. Parliament is furious. The Naval Chronicle is calling for peace.\"\n    \n    The Admiral lets out a weary breath. \"We need a victory, and I hope that your efforts may bring us one step closer to achieving one.\"\n    *goto chap_1_2\n  *if convo_prog = 0\n    #\"No questions, ${pronoun_5}.\"\n      *goto chap_1_3\n  *if convo_prog >= 1\n    #\"No further questions, ${pronoun_5}.\"\n      *goto chap_1_3\n*label chap_1_3\n*if not(choice_achieved_story_1)\n  *achieve story_1\nAdmiral Warwick nods approvingly. \"Good. Our last report indicated that your quarry is about two hundred miles north by north-west,\" ${pronoun_1} pulls a folded piece of paper from inside ${pronoun_2} jacket. \"This is the copy of the report of ${ship_pronoun_2} last sighting. Begin your search there.\"\n\n\"Aye, ${pronoun_5},\" you answer as you take the sealed report and tuck it in your own vest.\n\n\"Back to your ship then,\" the Admiral commands as ${pronoun_1} folds ${pronoun_2} hands back behind ${pronoun_2} back. \"Good luck and Godspeed.\"\n*page_break\n*set date + 2\n*set prize_money + 500\nForaker sets out immediately towards your quarry's last known location at best speed. The wind is with you, and you order every yard of sail crowded on, knowing that every moment's delay will make it harder to track down any evidence one way or the other. \n\nYet evidence does not take long to uncover. Two days out from the Courageous, your lookout spots a sail on the horizon: a schooner flying Columbian colors, sailing low and lubberly, as if overloaded by something. $!{ship_pronoun_1} turns to run as [i]Foraker[/i] approaches, but only a few figures climb up the rigging to work the sails, far fewer than even a small vessel like this one ought to have.\n\nNeedless to say, ${ship_pronoun_1} is little match for a 38-gun frigate. [i]Foraker[/i] closes the distance quickly, and a single warning shot from your bow chaser is enough to make ${ship_pronoun_1} haul down ${pronoun_2} colors in surrender.\n*page_break\n\"I fear ${ship_pronoun_2} crew has proven most uncooperative,\" Bannister reports to you, after leading a boarding party across to take possession of your new prize. \"$!{ship_pronoun_1} is a cartel, and both captain and crew have been most vigorous in their protestations.\" \n\nThat makes sense: a cartel is a ship assigned to carry prisoners taken off prize ships for exchange. Under normal circumstances, such vessels have immunity from capture, but in this case…\n\n\"I explained to them that the United Republics has entered into no agreement with $!{pronoun_2} Majesty's government regarding the protection of cartels, and that furthermore, turning to flee qualifies as a hostile act that voids any protection they might have had in any case,\" Bannister continues, \"yet they remain quite uncooperative. However, their obstinance means little in the end: we found hands from five different ships' companies in the hold, all of them Albionian. It shouldn't be hard to guess how they got there.\"\n\nIf Bannister is saying what you think ${pronoun_1} is saying, then you have had a stroke of fortune indeed. \"Their ships were taken by this Columbian mystery frigate?\"\n\nYour second lieutenant nods. \"$!{ship_pronoun_1}'s called the [i]Delmarva[/i]. Fifty guns, crew of four hundred, and ${ship_pronoun_1} is headed for port as we speak.\"\n\n*if lieutenant = \"fisher\"\n  \"Well then? Don't keep us in suspense!\" Fisher interjects. \"What port is ${ship_pronoun_1} bound for?\"\n*if lieutenant = \"simpson\"\n  \"Which port?\" Simpson asks. \"If ${ship_pronoun_1} is headed for New Lancaster or Trimountaine, we may yet overhaul ${ship_pronoun_3} if the fair wind keeps up.\"\n*if lieutenant = \"shannon\"\n  \"$!{pronoun_1} would be able to refit and take on fresh crew then,\" Shannon observes. \"Do we know which port ${ship_pronoun_1} is headed for?\"\n*if lieutenant = \"pakenham\"\n  \"Did these prisoners mention which port the [i]Delmarva[/i] was bound for?\" Pakenham asks. \"That does appear to be a rather important distinction.\"\n*comment endif\n\n\"Well, there is the problem,\" Bannister admits. \"Some of the ${gender} we spoke to thought ${ship_pronoun_1} was bound south for Worsley, but others believed west to New Lancaster or north to Trimountaine. The prize crew know, of course, but they are not likely to offer us any answers.\"\n\nYour officers turn to you for a decision, even though they know as well as you that at this point, any decision you may make might well be guesswork, unless you were to find any further leads.\n\nYet still, a decision must be made. That is the burden of command.\n*label chap_1_choose_port\n*fake_choice\n  #\"We sail for Trimountaine.\"\n    *set location \"trimountaine\"\n  #\"Set course for New Lancaster.\"\n    *set location \"new_lancaster\"\n  #\"Let us head for Worsley, and see what we find.\"\n    *set location \"worsley\"\n  *hide_reuse #\"Tell me about these ports.\"\n    *if lieutenant = \"simpson\"\n      \"New Lancaster is the largest city in the United Republics, and the largest port by far,\" Simpson volunteers. \"Trimountaine is much smaller, but it possesses a sizable military shipyard. Both cities are heavily protected by shore batteries and fortifications. If I were the Columbian captain and seeking refit or resupply, either would serve.\"\n      \n      \"What if you were looking for crew instead?\" Bannister asks. \"[i]Delmarva[/i] must be running short-handed by now.\"\n      \n      \"Then I would go to Worsley,\" Simpson replies. \"It is the smallest of the three, which means it has profited least from trade with Albion. The folk there would be the most supportive of Columbia's war against us. They would offer the most recruits, and the most enthusiastic ones besides.\n      *goto chap_1_choose_port\n    *else\n      \"They're all major ports, or at least what passes for major ports in this part of the world,\" Bannister replies. \"New Lancaster is the largest, but Trimountaine's shipyards are better. Worsley is the furthest south, and I have been told that it is the southerners who are against peace with Albion most fervently.\"\n      \n      $!{pronoun_1} shrugs. \"I'm not sure I could say more than that, ${pronoun_5}. None of us are native to these parts.\"\n      *goto chap_1_choose_port\nBannister nods. \"Aye-aye, ${pronoun_5}. I shall get us a fix and have $!{master} Burroughs plot a course.\"\n\nYour second lieutenant heads off to the stern rail, sextant in hand, but $!{lieutenant} remains, staring at the captured schooner. \n*if lieutenant = \"fisher\"\n  \"It will be damned chancy, going after a ship that heavily armed with a crew that big,\" ${pronoun_1} observes. \"I'd be a damned sight happier about it if we could grab some extra hands from that cartel. They're all trained sailors, and worst comes to worst, they'll at least be able to stop a musket ball before it hits someone useful.\"\n*if lieutenant = \"simpson\"\n  \"Fifty guns and four hundred crew,\" ${pronoun_1} states with a grim look. \"At least we shall be faster and handier, though I'd be much more confident of that if we had more hands in the rigging. I suppose there must be a few trained top${gender} on that cartel. I do not suppose we could pick at least a few of them for ourselves?\"\n*if lieutenant = \"shannon\"\n  \"Fifty guns, my God,\" ${pronoun_1} exclaims. \"We shall need every advantage we can get, and our gun crews are already short-handed as it is. I do not suppose we could pluck a few of the better ${gender} off of that cartel to make up the numbers, could we?\"\n*if lieutenant = \"pakenham\"\n  \"One cannot help but see a tinge of foolhardiness in this endeavor,\" ${pronoun_1} observes. \"We are short-handed as it is. If that Columbian were to contrive to board us, then ${ship_pronoun_1} may be able to overwhelm us with sheer numbers alone, lest we take some precautions. One might suggest increasing our numbers, seeing as we have such a convenient source of trained hands at our disposal.\"\n*comment endif\n\nYou catch your first lieutenant's meaning immediately. Impressment is neither a popular or uncontroversial policy. True, there are few more expedient ways to fill up the ranks of an underhanded ${ship_gender} of war, few are also likely to cause more unrest and disorder. The press gangs may be restricted by law to take those subjects of $!{pronoun_2} Albionian Majesty already accustomed to life at sea, but that does not mean the sailors who crew Albion's merchant ships possess the skills unique to fighting a warship, or the temperament needed to handle the Navy's harsher discipline.\n\nStill, $!{lieutenant} has a point. You shall likely have no better opportunity to replenish [i]Foraker[/i]'s company. Given the circumstances, the use of the press gang may be warranted.\n*choice\n  #I'll take volunteers only: I want no pressed ${gender} on this ship.\n    *set c_str + 2\n    You send out the call for volunteers from the cartel's rescued prisoners, but few answer.\n    \n    Perhaps the rest have heard stories of the conditions aboard the ships of $!{pronoun_2} Majesty's Navy. Some might have even experienced them firsthand. While they are not as bad as the sort of treatment a sailor could expect in the Gaulish or Iberian service, they are certainly far from as lax as the more congenial atmosphere aboard a merchant ship. While it is true that the Admiralty has done much to improve the quality of food and treatment aboard Albion's \n    *if gender = \"men\"\n      men of war\n    *if gender = \"women\"\n      ladies of war\n    these late few years, a naval captain must still demand a level of discipline from ${pronoun_2} company which exceeds that demanded by any merchant house.\n    \n    There is also, of course, the constant threat of death by cannon, musket, cutlass, and bayonet, which some understandably shy away from.\n    \n    That is not to say there are not at least a handful who prove\n    *if gallantry >= 50\n      brave enough\n    *if gallantry \u003c 50\n      naive enough\n    to step forward, but they are certainly not enough to bring [i]Foraker[/i]'s company back to full strength.\n    *page_break\n    At least there is one advantage to recruiting only volunteers. The new members of your company arrive eager to serve and to please. For the most part, they make every effort to fit into their divisions. Within the day, most have already learned their business, and are almost indistinguishable from the more seasoned hands of [i]Foraker[/i]'s company.\n    *goto chap_1_4\n  #Impress anyone who looks like they've served on a warship before.\n    *set c_str + 10\n    *set c_morale - 5\n    *set impress true\n    With the help of Lieutenant $!{lieutenant} and Captain Mercer, you assemble a press gang in short order. With the aid of a dozen marines, they cross over to the cartel and begin examining the newly-rescued prisoners for tattoos, battle scars, or other tell-tale signs of previous service aboard one of $!{pronoun_2} Majesty's ships.\n    \n    They do not go easily. Few common sailors who leave the service miss the harsh discipline or the constant threat of death at the hands of Albion's enemies, and fewer still relish the idea of being dragged back into service at the point of a marine's bayonet. The new members of [i]Foraker[/i]'s company make for a surly procession as they are herded aboard.\n    *page_break\n    Unfortunately, that surliness spreads as the day passes. Trained gunners and top${gender} the new additions to your crew may be, but that does not mean they are anywhere near inclined to serve with the alacrity or diligence of a volunteer. The petty officers and midship${gender} at the heads of their divisions are compelled to resort to balled fists to ensure the newcomers do their duty, a measure which cannot help but spread disaffection to the rest of the company. \n    \n    Still, the new ${gender} begin to settle in. With time, familiarity will surely breed contentment.\n    *goto chap_1_4\n  #Our need is dire: impress as many as we can.\n    *set c_str + 25\n    *set c_morale - 10\n    *set c_gunnery - 5\n    *set c_sailing - 5\n    *set impress true\n    It is only the work of a few minutes to assemble a press gang of sailors and marines. Before long, they are rowing over to the captured cartel to usher its passengers, so recently freed from captivity, into a condition not much improved from their previous one. \n    \n    They do not go easily. Perhaps some have heard stories of the conditions aboard $!{pronoun_2} Majesty's ships. It is likely that at least a few of them have experienced them first-hand. Though many of the duties aboard a ship of war are similar to that aboard a merchant vessel, the discipline under which they are performed is far stricter, a necessity given the nature of a warship's purpose. The lower pay and the constant threat of death by cannon, musket, or cutlass certainly does not endear naval service to your unwilling new recruits, either. From the quarterdeck of the [i]Foraker[/i], you can see more than one scuffle break out on the cartel as your press gang is forced to enforce your orders with charged bayonets and drawn steel.\n    \n    Eventually, the deed is done. Over the course of multiple trips, the press gang ferries over a surly procession of new hands, freshly cowed into $!{pronoun_2} Majesty's service.\n    *page_break\n    Yet acquiescence is not diligence. The new hands see to their duties only with the utmost reluctance and no measure of compulsion by the heads of their divisions seems to be able to instill any form of alacrity or enthusiasm into them. Though they are likely to settle in eventually, for the moment, their disaffection only spreads. Morale suffers, as does every necessary characteristic of [i]Foraker[/i]'s company.\n    *goto chap_1_4\n*label chap_1_4\n*page_break\nYet no matter how many new hands [i]Foraker[/i] takes on, you will never be able to match the numbers of [i]Delmarva[/i]'s company, especially if ${ship_pronoun_1} is given the chance to take on more crew in port. If the Columbian frigate forces an engagement upon you, then [i]Foraker[/i] will have to rely on the superior quality of ${ship_pronoun_2} crew to prevail. \n\nYet as things stand now, there is much room for improvement.\n*if (c_gunnery \u003c= c_sailing) and (c_gunnery \u003c= c_morale)\n  Your gun crews give you cause for especial worry. Weeks of facing nothing more formidable than a lightly-armed brig has given rise to an air of complacency, something which may prove fatal if you are to next face down an enemy ship which outguns yours by a substantial margin.\n  *goto chap_1_4a\n*elseif (c_sailing \u003c= c_gunnery) and (c_sailing \u003c= c_morale)\n  The condition of your top${gender} are especially worrisome. Though their skills have proven sufficient so far, you shall need every ounce of maneuverability if you are to face off against a heavier-armed foe. In such a case, a moment's delay in fetching a foresail or setting a topgallant could mean the difference between victory and destruction.\n  *goto chap_1_4a\n*else\n  Worse yet, if your ship is boarded, you have no guarantee that your crew will fight to defend ${ship_pronoun_3} to their utmost. Their spirits have ebbed dangerously low these past few weeks, and unless measures are taken, your inferiority in cannon and the size of your company may be fatally compounded by an inferiority of morale.\n  *goto chap_1_4a\n*label chap_1_4a\n\nAt least you will have some time to ameliorate the situation. It may be weeks, if not months before you discover the whereabouts of the [i]Delmarva[/i]. It is time that would be well-spent in the service of amplifying the strengths of your crew, or making up for its weaknesses.\n*choice\n  #Our efforts will be spent most profitably in gunnery drill.\n    *set training \"gunnery\"\n    *set c_gunnery %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    There are few effective ways to drill a gun crew on a ship in motion. Live shooting at targets is certainly impractical under sail, doubly so as it would use up far too much of your finite supply of shot and powder. Instead you must content yourself to ordering \"dry runs,\" wherein the crews go through all the motions of running out and loading the guns, but without the use of actual shot, or the final step of firing. \n    \n    Still, even this truncated routine quickly begins to show results. After two hours of such training, the gun crews are well and truly exhausted, but their alacrity in handling [i]Foraker[/i]'s broadside batteries are much improved. \n    \n    At this rate, it shall certainly not be long before [i]Foraker[/i]'s gun crews are among the best in the Navy.\n    *goto chap_1_5\n  #We must focus our efforts on sail drill above all.\n    *set training \"sailing\"\n    *set c_sailing %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    One can hardly practice setting and furling the sails while the ship is underway, not if one wishes to make any real progress towards one's destination. But that does not mean [i]Foraker[/i]'s top${gender} cannot be run through the motions, of climbing the shrouds, of climbing out upon the spars, of surveying the tops, and of all the processes of putting on or taking off sail which are required short of actually doing so.\n    \n    [i]Foraker[/i]'s top${gender} are far from amateurs. They were chosen for their post in the first place due to their youth, agility, intelligence, and strength, and every one has long since learned the ship's rigging like the back of their hand. But even they show signs of improvement as they go through the evolutions of sail over and over again.\n    \n    Surely, with enough time and practice, your crew will be able to ensure that [i]Foraker[/i]'s fine sailing qualities will be used to ${ship_pronoun_2} best advantage.\n    *goto chap_1_5\n  #Let the crew have light duties, the better to raise their spirits.\n    *set training \"morale\"\n    *set c_morale %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    One cannot simply let the entire company of a $!{monarch}'s ship slip into complete idleness, especially while at sea. The deck must still be holystoned, the watches must still be set, and adjustments to the rigging must still be made. However, that also does not mean adjustments cannot be made. You shift the [i]Foraker[/i] from two watches to three, the better to ensure that every member of the company gets an adequate period of sleep and increased periods of leisure.\n    \n    Of course, that does not mean you expect the ${gender} to while away their newly free hours drinking and dicing either. A lack of activity breeds disaffection and mischief just as readily as a surfeit of it. Instead, you arrange for a variety of wholesome activities to be carried out for the enjoyment of the crew—footraces along the gun deck, hornpipes atop the forecastle, singlestick lessons midships: activities which not only occupy [i]Foraker[/i]'s idle company and improves their spirits, but offer the additional benefit of honing their ability to run, to jump, and to fight.\n    \n    If [i]Foraker[/i] should find ${ship_pronoun_3}self engaged in a boarding action in future, your company may find their time at \"recreation\" to have been useful indeed.\n    *goto chap_1_5\n*label chap_1_5\n*page_break\n*set date + 4\n[i]Foraker[/i] makes good time as ${ship_pronoun_1} sails\n*if location = \"trimountaine\"\n  north by north-west towards the Columbian port of Trimountaine. Four days after you take the cartel, your lookout spots the long, curving coast of Cabot's Hook ahead. It will only be another two or three days before you make sight of the lights of Trimountaine Harbor itself.\n  \n  Yet there is no sign of the [i]Delmarva[/i], or any other Columbian warship. [i]Foraker[/i] is the only sail in sight, save for a few coasters and fishing boats which quickly clear out at the sight of an Albionian ${ship_gender} of war.\n  *comment endif\n  \n  Perhaps you have guessed wrong?\n  *goto chap_1_trimountaine\n*if location = \"new_lancaster\"\n  *set new_lancaster true\n  west towards New Lancaster, the largest of Columbia's fledgling cities. Four days after you take the cartel, your lookout spots the headland of Farisle: the long, thin stretch of land which leads towards the harbor of New Lancaster.\n  \n  There is no sign of the [i]Delmarva[/i] here, or any other enemy warship. The only sails in sight are the schooners and brigs of the Columbian coastal trade as they tack into the wind, beating for Worsley or New Angouleme, or some other southern port. \n  \n  Even if your quarry is not here, you cannot help but consider the opportunity before you. While these trading vessels are small and their cargoes likely little of note, there are a great number of them, all downwind. Un-convoyed and unprotected by the Columbian Navy, they would make for easy pickings.\n  *goto chap_1_new_lancaster\n*if location = \"worsley\"\n  *set worsley true\n  south along the coast of Dewarre's Land towards the Columbian privateer port of Worsley. Four days after you take the cartel, your lookout spots the opening of Delmarva Bay, the long body of water for whom your quarry is named after.\n\n  *set gosub_index 103\n  *gosub_scene gosub\n  *goto chap_1_worsley\n\n*label chap_1_trimountaine\n*choice\n  #Press on: I wish to see the state of Trimountaine Harbor with my own eyes.\n    *goto chap_1_end\n  *hide_reuse #Perhaps a more thorough search of the approaches will yield some intelligence.\n    *set date + 7\n    After conferring with Sailing $!{master} Burroughs you determine a search pattern along the coast of Cabot's Hook which should allow you to intercept any vessels which might be found entering or leaving Trimountaine Bay. \n    \n    For a week, [i]Foraker[/i] cruises along the cold northern waters, with every available eye directed outwards for any sign of sail, or peculiar landward movement. For a week, you find nothing, not even the customary passage of small craft along the coves and villages of the coast.\n    \n    The crew soon begins to weary of the inactivity, as paradoxical as that may seem. By the end of the week, their movements begin to grow sluggish, their moods begin to grow sullen. Some whisper that the search is fruitless, and that you are merely wasting time while the Columbian frigate refits and takes on fresh crew in the safety of some distant harbor.\n    *page_break\n    Then on the eight day, your lookouts spot sail, and not just any sail, but the great canvas array of a fully rigged ship, approaching fast from the south. Yet the inbound ship is no Columbian frigate, but HMS [i]Antipode[/i], a mighty 64-gun third rate headed for Ismay from the Rum Islands.\n    \n    Antipode is on an urgent assignment, and cannot be detained, but ${ship_pronoun_1} comes alongside long enough for ${ship_pronoun_2} captain to tell you that ${ship_pronoun_1} has seen no sign of Columbian frigates off Worsley or New Lancaster.\n    \n    While that does not entirely rule out the possibility that the [i]Delmarva[/i] may be in some other port, it does mean that it is far more likely that ${ship_pronoun_1} is in Trimountaine.\n    \n    Unfortunately, [i]Antipode[/i]'s captain cannot offer you more than ${pronoun_2} own vague observations. If you wish to make sure, you shall have to do it yourself.\n    *goto chap_1_trimountaine\n  *if new_lancaster_2 = false\n    #Best we look elsewhere: set course for New Lancaster.\n      *set location \"new_lancaster\"\n      *if new_lancaster = true\n        So, it is back to New Lancaster then.\n      \n      *comment endif\n      You give the order for $!{master} Burroughs to set a southerly course. The seasoned navigator does not take long. Soon, [i]Foraker[/i] is coming about as $!{pronoun_4} Burroughs shouts direction from ${pronoun_2} speaking trumpet.\n    \n      In minutes, your ship is headed south, back around the rocky coast of Cabot's Hook, and towards New Lancaster.\n      *set gosub_index 2\n      *gosub_scene gosub\n      *page_break\n      There is no sign of the [i]Delmarva[/i] when [i]Foraker[/i] approaches the low headland of Farisle. \n      *if new_lancaster = false\n        *set new_lancaster true\n        *set gosub_index 101\n        *gosub_scene gosub\n        *goto chap_1_new_lancaster\n      *else\n        *set gosub_index 102\n        *gosub_scene gosub\n        *goto chap_1_new_lancaster\n  *if worsley = false\n    #The [i]Delmarva[/i] is not here: set course for Worsley.\n      *set location \"worsley\"\n      You have $!{master} Burroughs plot a course for Worsley. It does not take the seasoned old navigator long. Within minutes, [i]Foraker[/i] is heeling south, and gliding upon the wind.\n      *set gosub_index 2\n      *gosub_scene gosub\n      *gosub_scene gosub\n      *page_break\n      [i]Foraker[/i] makes ${ship_pronoun_1} way down the Columbian coast, skirting New Guernsey and Dewarre's Land, until ${ship_pronoun_1} finally reaches the opening to Delmarva Bay, the body of water for which your quarry is named.\n      \n      *set gosub_index 103\n      *gosub_scene gosub\n      *goto chap_1_worsley\n  #I must know the state of [i]Foraker[/i]'s crew before making a decision.\n    *set gosub_index 1\n    *gosub_scene gosub\n    *goto chap_1_trimountaine\n\n*label chap_1_new_lancaster\n*choice\n  *hide_reuse #Let us draw closer to New Lancaster for a closer look.\n    *set new_lancaster_2 true\n    *set date + 4\n    To examine the protected waters of New Lancaster Harbor would mean getting in close, close enough to be within range of the mighty shore guns of Fort Gaunt and Fort Thompson. Even a ship as well-built as [i]Foraker[/i] would not stand up long to heated shot from heavy fortress guns. Any attempt to sail in openly would almost certainly lead to your ship being reduced to a blazing wreck in short order.\n    \n    So, you decide on a little ruse-de-guerre: you order the Royal Jack hauled down from the foremast and the Silver Ensign of the Royal Navy hauled from the gaff and replaced with the Sun and Stripes of the United Republics. With your false flags set, you set course towards the distant sight of New Lancaster.\n    *page_break\n    Over the next two days, [i]Foraker[/i] creeps closer and closer to the lights of the distant city, making sure to avoid any Columbian ships that might unmask your ruse. Your officers have been careful to warn your crew against any hostile action, even as the crowded harbor of New Lancaster heaves into view, crowded with row upon row of fat merchant ships: it is perfectly legal to sail under a false flag, but to attack under one is tantamount to piracy. \n    \n    Thus, it is with the utmost meekness that your ship sails towards the squat earthworks and imposing stone bastions of the harbor defenses, even as your lookouts keep a weather eye for signs of the [i]Delmarva[/i] or any other Columbian warship. \n    \n    Yet even as you sail closer and closer, the ${gender} atop the masts can give you no leads. Your own glass only gives you sights of endless rows of merchant brigs and schooners, with perhaps a big hauler here and there, but nothing that might be seen as a warship. \n    *page_break\n    The thunder of a gun from Fort Gaunt brings you all up short. The Columbians are getting suspicious. You have outstayed your welcome, even though you have not found what you have come for.\n    \n    You order [i]Foraker[/i] turned about. Thankfully, the enemy do not catch on to your ruse until you are far out of range. Only when their shots begin to fall far to your stern do you at least let the crew run up your true colors, though even that bit of good-spirited mockery cannot erase the fact that you are returning empty-handed, save for the knowledge of where your quarry most definitely is not.\n    \n    So where to now?\n    *label chap_1_new_lancaster_2\n    *choice\n      #North, to Trimountaine.\n        *goto chap_1_nl_trimountaine\n      *if worsley = false\n        #South, to Worsley.\n          *goto chap_1_nl_worsley\n      #I mean to assess my crew before making a decision.\n        *set gosub_index 1\n        *gosub_scene gosub\n        *goto chap_1_new_lancaster_2\n  *hide_reuse #With such an opportunity before us, how could we resist taking a few prizes?\n    The crew give a hearty cheer as you order the [i]Foraker[/i] into the swarm of enemy sail. Each member of the company is entitled to a share of the prize money, and although the share of a common sailor is paltry compared to the quarter-share entitled to you as captain, even the capture of a modest coastal vessel is a substantial boost to the fortunes to the lands${gender} and ratings who make up the most of [i]Foraker[/i]'s complement.\n    \n    Drums rise as the cheers fall: the marines beating the ship to quarters. With no less enthusiasm, the crew ready the ship for battle, their eyes sparkling with the thought of the rich harvest which [i]Foraker[/i] is about to reap.\n    *page_break\n    *set date + 7\n    *if (sailing + c_sailing) >= 150\n      *set prize_money + 5000\n      *set c_str - 14\n      *set c_morale %+20\n      *set gosub_index 200\n      *gosub_scene gosub\n      And what a tremendous harvest it is.\n      \n      For three days, [i]Foraker[/i] tears through the New Lancaster coastal trade with utmost abandon. With bold and expert sailing, you manage to keep the wind always at your back as your ship and crew take prize after prize after prize in rapid succession: a brig carrying muskets to Henryville, a sloop with grain for Worsley, cotton from New Angouleme, fruit from Chapparal, all of the industries and wealth of Columbia, striking their colors under your guns and surrendering their wealth to you in the name of $!{pronoun_2} Albionian Majesty, and the enrichment of the captain and crew of HMS [i]Foraker[/i].\n      \n      Alas, it does not last. By the fourth day, the coast is empty. The Columbians are not fools, to send their merchant vessels into the waiting guns of an Albionian frigate. They have all withdrawn under the harbor batteries of New Lancaster, or found some other route. Three more days of searching bring no more prizes, so reluctantly, you give up the hunt, assign sailing crews to each of your captured prizes and set them off in convoy towards Ismay so that they do not burden you as [i]Foraker[/i] returns to ${ship_pronoun_2} pursuit of the [i]Delmarva[/i].\n      \n      Yet your prize crews part in a jubilant mood. They know, as do the rest of your crew, that you have each made a small fortune these past few days. When you return home, you shall all be rich ${gender}.\n      \n      If you return home.\n      *page_break\n      Speaking of which, you still have a Columbian frigate to pursue.\n      \n      What will you do now?\n      *goto chap_1_new_lancaster\n    *elseif (sailing + c_sailing) >= 100\n      *set prize_money + 4000\n      *set c_str - 10\n      *set c_morale %+15\n      *set gosub_index 200\n      *gosub_scene gosub\n      And what a bountiful harvest it is.\n      \n      For three days, [i]Foraker[/i] prowls along the coast, taking prizes with opposition only from the occasional ill wind. The Columbian coastal fortresses on Farisle's coast can only watch helplessly as you take prize after prize after prize from far out of range of their guns. \n      \n      But the Columbians are not fools. By the fourth day, there are no more targets to be found. Three more days of searching bring no more prizes, so, reluctantly, you give up the hunt, assign sailing crews to each of your captured prizes and set them off in convoy towards Ismay so that they do not burden you as [i]Foraker[/i] returns to ${ship_pronoun_2} pursuit of the [i]Delmarva[/i].\n      \n      Yet your prize crews part with one last round of cheers. They know, as do the rest of your crew, that the vessels and cargo you have already taken will mean a substantial fortune once your prize agent is done with them, and that every ${gender} will have their share once you return home.\n      \n      If you return home.\n      *page_break\n      Speaking of which, you still have a Columbian frigate to pursue.\n      \n      What will you do now?\n      *goto chap_1_new_lancaster\n    *else\n      *set prize_money + 2500\n      *set c_str - 6\n      *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      And what a fine harvest it is.\n      \n      For three days, [i]Foraker[/i] sails up and down the coast, taking prize after prize from far outside the range of Farisle's coastal batteries. Only the uncooperative winds and a few unfortunate navigational errors keep you from taking more.\n      \n      But the Columbians are not fools. By the fourth day, the coast is absolutely bereft of sail save your own. Three more days of searching bring no more prizes, so, reluctantly, you give up the hunt, assign prize crews to each of the captured vessels and set them off in convoy towards Ismay so that they do not burden you as [i]Foraker[/i] returns to ${ship_pronoun_2} pursuit of the [i]Delmarva[/i].\n      \n      Yet your prize crews do not part with heavy hearts. Perhaps you might have made more of this opportunity had you maneuvered [i]Foraker[/i] more boldly, or had your crew been handier with the sails, but the prizes which you have taken are far from disappointing. The money they will fetch shall make for a small fortune for you, and a substantial bonus for your crew once you return home.\n      \n      If you return home.\n      *page_break\n      Speaking of which, you still have a Columbian frigate to pursue.\n      \n      What will you do now?\n      *goto chap_1_new_lancaster\n  *if worsley = false\n    #The [i]Delmarva[/i] is not here: set course for Worsley.\n      *label chap_1_nl_worsley\n      *set location \"worsley\"\n      You direct $!{master} Burroughs to plot out a course for the southern port of Worsley. Within minutes, [i]Foraker[/i] is underway, crowding on full sail as ${ship_pronoun_1} heels towards your new destination.\n      *set gosub_index 2\n      *gosub_scene gosub\n      *page_break\n      [i]Foraker[/i] makes ${ship_pronoun_2} way down the Columbian coast, carefully avoiding the Columbian forts which dot the coast of New Guernsey and Dewarre's Land, until the lookout spots before you the opening to Delmarva Bay, the body of water for which your quarry is named.\n      *set gosub_index 103\n      *gosub_scene gosub\n      *goto chap_1_worsley\n  #The [i]Delmarva[/i] is not here: perhaps ${ship_pronoun_1} has sailed for Trimountaine?\n    *label chap_1_nl_trimountaine\n    *set location \"trimountaine\"\n    *if trimountaine = true\n      North again, is it?\n    \n    *comment endif\n    You have a course set for Trimountaine. The crew burst into activity as the orders go out, and within minutes, the [i]Foraker[/i] is heeling towards your new destination.\n    *set gosub_index 2\n    *gosub_scene gosub\n    *page_break\n    *set gosub_index 104\n    *gosub_scene gosub\n    *goto chap_1_trimountaine\n  #I must know the state of [i]Foraker[/i]'s crew before making a decision.\n    *set gosub_index 1\n    *gosub_scene gosub\n    *goto chap_1_new_lancaster\n\n*label chap_1_worsley\n*set worsley true\n*choice\n  *if new_lancaster_2 = false\n    #Perhaps we will have better luck off New Lancaster.\n      *set location \"new_lancaster\"\n      *if new_lancaster = true\n        So, it is back to New Lancaster then.\n      \n      *comment endif\n      You give the order for $!{master} Burroughs to plot a course northwards. Soon, [i]Foraker[/i] is coming about as $!{pronoun_4} Burroughs shouts direction from ${pronoun_2} speaking trumpet.\n    \n      Before long, your ship is gliding north, back past the rocky coast of Dewarre's land, and towards New Lancaster.\n      *set gosub_index 2\n      *gosub_scene gosub\n      *page_break\n      There is no sign of the [i]Delmarva[/i] when [i]Foraker[/i] rounds the low headland of Farisle. \n      *if new_lancaster = false\n        *set new_lancaster true\n        *set gosub_index 101\n        *gosub_scene gosub\n        *goto chap_1_new_lancaster\n      *else\n        *set gosub_index 102\n        *gosub_scene gosub\n        *goto chap_1_new_lancaster\n  #If the [i]Delmarva[/i] is not here, perhaps ${ship_pronoun_1} has sailed for Trimountaine instead.\n    *set location \"trimountaine\"\n    *if trimountaine = true\n      Back to Trimountaine then?\n    \n    *comment endif\n    You have your ship put on a northerly course. The crew burst into activity as the orders go out, and within minutes, the [i]Foraker[/i] is heeling towards your new destination.\n    *set gosub_index 2\n    *gosub_scene gosub\n    *page_break\n    *set gosub_index 104\n    *gosub_scene gosub\n    *goto chap_1_trimountaine\n  #How fares the [i]Foraker[/i]'s company at this juncture?\n    *set gosub_index 1\n    *gosub_scene gosub\n    *goto chap_1_worsley\n\n*label chap_1_end\n*set date + 2\nLieutenant $!{lieutenant} tenses when you give the order. Trimountaine Bay is one of the Columbian Navy's primary home ports, and for good reason: its waters are dominated by half a dozen coastal fortresses and batteries. Any attempt to get close enough to surveil its quays and yards cannot help but be a risky enterprise. \n\nYet $!{lieutenant} is still an officer of the Royal Navy, and passes on your commands without hesitation. If your crew show any sign of apprehension or fear, they hide it well. [i]Foraker[/i] heels towards its destination, with a full set of sail and a\n*if c_morale >= 60\n  crew with hearts full of good cheer.\n*if c_morale \u003c 60\n  crew grimly set to its duty.\n*page_break\nIt is two days to Trimountaine. Two days of nervous and furtive scouting, of an eye glued to the glass for any sign that you have been detected. Two days of gliding under false colors and hooded lanterns, hiding as best as you can from coastal batteries and watchtowers. The crew is already much on edge even before the massive stone bastions of Fort Liberty and Fort Putnam heave into view, their parapets glimmering with the black iron of guns each thrice as large as [i]Foraker[/i]'s own.\n\nYour heart is a throbbing plug in your throat as you bring your glass up and peer past the massive fortifications into Trimountaine Bay, past the cannon-studded breakwaters, past the rows of merchant ships, until you see it: the low, iron-black hull of a Columbian heavy frigate, rigged and in all readiness to sail.\n\nThen you spot another.\n\nAnd another.\n*page_break\n*advertisement\n*goto_scene chapter_2\n", "chapter_2": "*temp week_repeat 0\n*temp recon false\n*set chapnum 2\n*check_achievements\n*if not(choice_achieved_story_2)\n  *achieve story_2\n*text_image chap_2.png center Chapter 2\n\nYou have found the enemy. Not just one Columbian warship, but three, each bigger and more heavily armed than your own. \n\n*if cordial_escape = true\n  *set prize_money - 500\n  And worse yet, they have been forewarned of your presence, for next to the three iron-black hulls of the [i]Delmarva[/i] and ${ship_pronoun_2} siblings rides a fourth ship, of a shape which you had not expected to see until you returned to Ismay.\n  \n  The crew of the [i]Cordial[/i] must have somehow retaken their vessel from poor Lieutenant Callaghan and the prize crew you put aboard ${ship_pronoun_3}. They would not have known enough to know what [i]Foraker[/i]'s orders were, but they would have certainly considered the addition of a new frigate to the Royal Navy's Columbian squadron intelligence worth delivering. \n  \n  Which means that the Columbians might have known of [i]Foraker[/i]'s presence in the region for weeks already. While you were sailing up and down the coast, they had been using every instant to prepare for your possible arrival.\n\n*comment endif\nIn the face of such opposition, the ship which had felt so mighty under your feet not a moment before cannot help but seem a little too small, ${ship_pronoun_2} cannon a little too light, ${ship_pronoun_2} crew a little too few in numbers. [i]Foraker[/i] might be able to stand up to one of the Columbians. If you are fortunate, ${ship_pronoun_1} might even put up a creditable showing against two. \n\nBut three?\n*fake_choice\n  #The greater the odds, the greater the glory; and impossible odds make for grand heroes indeed.\n    *gosub trial_end\n    *set gallantry %+10\n    *set sensibility %+10\n    One against three seem like impossible odds, but the Royal Navy's reputation is built on such lopsided matches. The ranks of Albion's heroes are made of such ${gender}, of those who were faced with odds just as galling as the ones which case you now and not only saw to their duty with cool courage, but came out victorious.\n    \n    If you take such odds and lose all, then you will have only done your duty to the utmost in the finest traditions of the service. You would die a hero.\n    \n    But if you were to prevail, you would live a legend.\n    *page_break\n    Your officers are rather less enthused when you call them to the quarterdeck.\n  #The honor of the service demands I do my utmost, my personal feelings are irrelevant.\n    *gosub trial_end\n    *set gallantry %+10\n    *set sensibility %-10\n    The service has little patience for personal sentiment, for equivocation, for fear. Albion's power rests not in its ships and wealth, but in the iron will of the ${gender} who crew them. As an officer of the Royal Navy, it is your duty to embody that will, even when the odds are laid so heavily against you, even when your duty can only lead to your destruction.\n    \n    There is no place for your own desires in such an equation, you accepted that the moment you accepted the $!{monarch}'s commission. If the traditions of the service demand that you conquer or die, then it must be one or the other.\n    *page_break\n    Your officers are of the same mind when you call them to the quarterdeck.\n  #Such odds terrify me, though I dare not show it.\n    *gosub trial_end\n    *set gallantry %-10\n    *set sensibility %+10\n    At this moment, you would like nothing more to let loose your feelings, to unburden yourself from the constrictions of self-restraint. It is no more than what any other person would wish to do when made sensible of the mortal peril ${pronoun_1} has placed ${pronoun_3} in. \n    \n    But that is not an option, not for a captain of a $!{monarch}'s ship. There is no greater calamity to strike a ship's company than wild, unchecked panic, and there is no greater way to induce it than through the breakdown of ${ship_pronoun_2} captain.\n    \n    So, you swallow the lump in your throat, you force your expression to calm itself, though every fiber of your body is cringing upon itself in wretched, screaming terror. \n    \n    Fear is not a luxury allowed officers of the Royal Navy.\n    *page_break\n    Your officers too, are hiding their fear when you call them to the quarterdeck.\n  #The only reasonable course of action would be to withdraw.\n    *gosub trial_end\n    *set gallantry %-10\n    *set sensibility %-10\n    But you can't, can you?\n    \n    If there is one tenet which the Royal Navy revolves around, it is that every ${gender_2} must do ${pronoun_2} utmost to achieve victory, even if it is at the cost of ${pronoun_2} life. Your orders were to find the [i]Delmarva[/i], to communicate ${ship_pronoun_2} location to Admiral Warwick, and to keep the Columbian in sight until the [i]Courageous[/i] arrives. If the Columbians figure out what you are up to, they will almost certainly sortie. If they do that, you will almost certainly have to face them at impossible odds.\n    \n    But if it comes to that, you will face them. To do otherwise would be unthinkable.\n    *page_break\n    You can only assume your officers are thinking the same thing when you call them to the quarterdeck.\n*set gosub_index 200\n*gosub_scene gosub\nThey have seen what awaits in Trimountaine Harbor too, and they exchange grim looks after you lay out the situation.\n\nBannister speaks first. \"The Commander in Chief has to be warned, as quickly as possible,\" ${pronoun_1} states flatly. \"If all three of the Columbian frigates are here, then even the [i]Courageous[/i] might need assistance from the rest of the squadron to face them.\"\n\n*if lieutenant = \"fisher\"\n  \"Yet we must keep an eye on the bastards here,\" Fisher insists. \"If we leave to find the [i]Courageous[/i], the Columbians will simply flee elsewhere when we return.\"\n*if lieutenant = \"simspon\"\n  \"We cannot go ourselves,\" Simpson notes. \"If we do, the Columbians are likely to find some other rock to hide under, now that we have discovered them.\"\n*if lieutenant = \"shannon\"\n  \"One thing's for sure. We can't go ourselves,\" Shannon observes. \"We shall have to stay here to ensure the Columbians don't get up to any mischief.\"\n*if lieutenant = \"pakenham\"\n  \"However, we do not have the option of rendering that service ourselves,\" Pakenham observes. \"We have discovered the enemy's lair, and they know that as well as we do. The instant we depart over the horizon, they shall find some new anchorage, and we shall be back where we started.\"\n*comment endif\n\nYour second lieutenant nods in agreement. \"We must take a prize, and use that ship to ferry our dispatches to the Admiral while we maintain the blockade.\"\n\n$!{lieutenant} frowns at that, and ${pronoun_1} isn't the only one. Taking a prize in these conditions won't be easy. The Columbians know better than to sail for the open ocean with an Albionian frigate patrolling the approaches. Any ship willing to chance it would either have to be very fast, or very desperate. \n\n\"I think we are getting a bit ahead of ourselves,\" Burroughs interjects. \"I'd like to get a closer l
