ook at those frigates before we commit ourselves. They look ready for sea, but it might be a bluff. I think it'd be best to make certain.\"\n\nYour other officers look to each other as they ponder that. $!{lieutenant} seems to agree. Bannister looks dubious. \n\nThen they turn to you.\n*choice\n  #\"Alerting the Commander in Chief is our first priority.\"\n    *goto chap_2_prize\n  #\"I would like to take a closer look.\"\n    *goto chap_2_recon\n  #\"Let us not go off half-cocked, the crew need preparation yet.\"\n    *goto chap_2_prep\n    \n*label chap_2_prep\n\"With respect, ${pronoun_5}, the Columbians will not tolerate us loitering outside Trimountaine Harbor indefinitely,\" Bannister points out. \"The longer we linger, the more likely they are to sail out to confront us. Would it not be better to contrive a means for informing Admiral Warwick first? The sooner the [i]Courageous[/i] is able to receive our dispatches, the more likely the rest of the squadron will arrive to our aid before the enemy decides to sortie against us.\"\n\n*if gallantry >= 50\n  \"The Columbians are not fools, Lieutenant,\" you explain. \"Once they see us sending a dispatch ship to open sea, they will know exactly what we are up to. They will know that we are in communication with the rest of the squadron, and may seek to capture or drive us off before the [i]Courageous arrives[/i]. In such an eventuality, I mean to have this ship and this crew as prepared as possible.\"\n*if gallantry \u003c 50\n  \"Rest assured, Lieutenant, I dislike such delays as much as you do,\" you reply. \"However, if we make the attempt to capture a prize to carry our dispatches with the crew in its current state, I doubt we will succeed. Better to prepare ourselves to our utmost before tipping our hand, I would think.\"\n*comment endif\n\nYour second lieutenant frowns a little, but nods. \"Aye-aye, ${pronoun_5},\" $!{pronoun_1} responds, swayed, it seems, less by the force of your argument than by the force of your position. \n\n*if training = \"sailing\"\n  \"Do you mean to carry on with sail drill, ${pronoun_5}?\" Burroughs asks, \"or will you be wanting something else?\"\n*if training = \"gunnery\"\n  \"Should we continue with gunnery practice, ${pronoun_5}?\" Burroughs asks, \"or did you have something else in mind?\"\n*if training = \"morale\"\n  \"Will we continue with the current morale program, ${pronoun_5}?\" Burroughs asks, \"or do you mean to start working the crew a bit harder?\"\n*choice\n  #\"The current program will do well enough.\"\n    *set gosub_index 3\n    Your officers touch their fingers to their hats, then get to work.\n    \n    *if training = \"gunnery\"\n      Within a few minutes, the guns are being run out for drill, the same as they had been the day before; although some of the crew cannot help but direct a furtive glance towards the cannon-studded maw of Trimountaine Harbor, and the three black-hulled frigates within.\n    *if training = \"sailing\"\n      Within minutes, the crew are going aloft for sail drill just as they had the day before, though in a fashion for befitting a ship resting at anchor than one at sea. Yet some of the crew cannot help but direct fearful glances at the cannon-studded maw of Trimountaine Harbor as they climb the shrouds.\n    *if training = \"morale\"\n      Within minutes the quarterdeck is cleared for singlestick drill, and the breathy squeaks of the hornpipe rise from midships, just as they did the day before. Yet as the crew fetch their sticks and face off against their sparring partners, some cannot help but sneak furtive glances at the three enemy frigates sheltered in Trimountaine, perhaps wondering when their fighting skills will be put to the test for keeps.\n    *gosub_scene gosub\n    *goto chap_2_hub\n  *if training != \"gunnery\"\n    #\"I would prefer we start doing more gunnery practice.\"\n      *set training \"gunnery\"\n      Your officers touch their fingers to their hats, and get to work.\n      \n      Within minutes, the guns are being run out for drill as their crews form up behind them. At first, the hands cannot help but look up towards the cannon-studded maw of Trimountaine Harbor, and the three iron-black frigates sheltering within. Yet the shouts of their gun-captains bring them back to the matter at hand, and once the sweaty, tasking process of gunnery practice begins in earnest, every one of them is far too focused on the gun before them to think of anything else.\n      *set gosub_index 3\n      *gosub_scene gosub\n      *goto chap_2_hub\n  *if training != \"sailing\"\n    #\"Let us move on to sail drill.\"\n      *set training \"sailing\"\n      Your officers touch their fingers to their hats, and call out the hands for sail drill.\n      \n      Within minutes, the crew is going aloft to the rattle of marine drums. At first, the hands cannot help but look up towards the cannon-studded maw of Trimountaine Harbor, and the three iron-black frigates sheltering within. Yet as they crawl up the shrouds and into the tops, they cannot help but return to the matter at hand—it is hard to think of anything else when a moment of incaution could mean a long fall onto the deck. Then, the evolutions begin, and everyone is too busy with their work to think of anything else.\n      *set gosub_index 3\n      *gosub_scene gosub\n      *goto chap_2_hub\n  *if training != \"morale\"\n    #\"I think a period of rest and light duties would be best for morale.\"\n      *set training \"morale\"\n      Your officer touch their fingers to their hats, and begin putting together plans to allow the ${gender} more rest while keeping them out of idleness.\n      \n      At first, things do not go as well as expected. Instead of catching up on their sleep or joining in with singlestick drill, they crowd [i]Foraker[/i]'s side, peering warily at the cannon-studded maw of Trimountaine Harbor, and the three iron-black frigates sheltering within it. All else seems forgotten as dozens of hands try to make out any distant or hazy sign that the Columbians are planning to sortie.\n      \n      Yet as the day passes without incident, a certain familiarity begins to rise among the crew. Now that the enemy have stayed still for an entire day, it becomes the common belief that they mean to stay still forever. The ${gender} begin to fall into their new routines of leisure and amusement, and only a few seem to persist in thinking of the enemy at all.\n      *set gosub_index 3\n      *gosub_scene gosub\n      *goto chap_2_hub\n      \n*label chap_2_hub\n*page_break\n*set week_repeat + 1\n*if date \u003c 35\n  The wind begins to freshen over the next few days. There is more sun than overcast now, and only a few scattered showers offer any reminder that it is yet early in the year.\n  *goto chap_2_date\n*elseif date \u003c 42\n  The sun seems to grow in warmth with every day as the week wears on. Only a few scattered clouds mar the blue spring skies which greet you every morning.\n  *goto chap_2_date\n*elseif date \u003c 49\n  The next few days bring with it a freak squall, the likes of which every sailor knows to fear as the possible harbinger of worse weather to come. Yet the next day, the sky is utterly cloudless, and remains so for the rest of the week.\n  *goto chap_2_date\n*elseif date \u003c 56\n  The days grow yet brighter over the next few days, blessed with a heat that is summer in all but name. \n  *goto chap_2_date\n*else\n  The heat of summer grows day by day, aided by a more constant and bright sun than Albion has ever seen. Before long, you begin to hope that it reaches its peak soon.\n  *goto chap_2_date\n*label chap_2_date\n\n*if (cordial_escape = true) and (date >= 55)\n  Then, one bright morning, a shout from the tops brings you to the quarterdeck, glass in hand.\n  *goto chap_2_end\n*if date >= 65\n  Then, one hot June morning, an urgent cry from the tops brings you to the quarterdeck, glass in hand.\n  *goto chap_2_end\n*if week_repeat = 1\n  Though the winds blow calm and steady out to sea, Trimountaine Harbor remains quiet. Not a ship sets sail.\n  \n  Your officers seem equal parts relieved and anxious as you call them in at the end of the week.\n*if week_repeat = 2\n  There is still no sign of action from the Columbian ships in Trimountaine Harbor. Only the most careful inspection through the glass indicates that they are crewed at all.\n  \n  Your officers are growing tense at the continued signs of inactivity. They mutter amongst themselves when you call them to your cabin at the week's end.\n*if week_repeat = 3\n  Yet despite the increasingly fair weather, Trimountaine Harbor remains tranquil.\n  \n  Your officers are on edge now. When you call them into your cabin at week's end, more than one seems to think they are up to something, though they cannot say what.\n*if week_repeat >= 4\n  There is still no sign of any real activity on the part of the Columbian frigates. \n  \n  The Columbians must be up to something. Your officers say as much when they assemble at the end of the week.\n*comment endif\nYet still, they must look to you for orders.\n\nWhat is your next step?\n*label chap_2_hub_2\n*choice\n  *if prize = false\n    #\"We must take a prize, and send it to Admiral Warwick with our intelligence.\"\n      *goto chap_2_prize\n  *if recon = false\n    #\"I need to ascertain the condition of the enemy: we must have a closer look.\"\n      *goto chap_2_recon\n  *if prize = true\n    #\"I intend to draw the enemy out and engage them directly.\"\n      *goto chap_2_endgame\n  *if prize = true\n    #\"It may be more prudent to await reinforcement, and prepare for contingencies: what is the state of the crew?\"\n      *set gosub_index 1\n      *gosub_scene gosub\n      *choice\n        #\"Let us undertake another week of preparation.\"\n          *goto chap_2_training\n        #\"Given our state, I feel confident enough to take the initiative and draw out the enemy.\"\n          *goto chap_2_endgame\n  *if prize = false\n    #\"What is the state of the crew? They may need more time.\"\n      *set gosub_index 1\n      *gosub_scene gosub\n      *choice\n        #\"The crew needs another week of preparation, at least.\"\n          *label chap_2_training\n          *if week_repeat = 1\n            Your officers share a few dubious looks with each other, but they all nod agreement readily enough.\n          *if week_repeat = 2\n            Your officers look nervously at each other, but after a pause, they all nod.\n          *if week_repeat = 3\n            $!{lieutenant} frowns a little, but says nothing.\n          *if week_repeat >= 4\n            $!{lieutenant} seems almost about to object, and ${pronoun_1} is not the only one. Still, you are the captain, and your officers keep their tongues and nod, after a grudging moment.\n          *comment endif\n        \n          *if training = \"gunnery\"\n            \"Shall we resume gunnery drill then?\" Burroughs asks.\n          *if training = \"sailing\"\n            \"Back to sail drill then?\" Burroughs asks.\n          *if training = \"morale\"\n            \"Shall we continue your morale program then, ${pronoun_5}?\" Burroughs asks.\n          *choice\n            #\"I do not think any changes to the previous routine will be necessary.\"\n              \"Aye, ${pronoun_5}, very good, ${pronoun_5},\" Burroughs replies deferentially. \n            \n              With your wishes made known, your officers file out to inform the crew of the resumption of the old routine, leaving you once again alone in your cabin.\n              *set gosub_index 3\n              *gosub_scene gosub\n              *goto chap_2_hub\n            *if training != \"sailing\"\n              #\"No, let us move on to sail drill.\"\n                *set training \"sailing\"\n                \"Aye, ${pronoun_5},\" Burroughs replies. \"Sail drill it is.\"\n              \n                Your officers file out of your cabin to carry out your orders. Within minutes, you can hear the shrill whistle of the bosun's call, and the sound of your first lieutenant's voice, as ${pronoun_1} announces your decision to the crew.\n              \n                Then come the rattle of drums and the ordered cacophony of a dozen voices, as the crew begin sail drill in earnest.\n                *set gosub_index 3\n                *gosub_scene gosub\n                *goto chap_2_hub\n            *if training != \"gunnery\"\n              #\"No, let us shift our attention to gunnery exercise.\"\n                *set training \"gunnery\"\n                \"Aye, ${pronoun_5},\" Burroughs replies. \"We shall start the ${gender} on the guns immediately.\"\n              \n                Now that you have given your orders, there is nothing left to do but dismiss them from your cabin so that they may carry them out. Within minutes, you hear the shrill tweet of the bosun's whistle calling the crew to assembly, and the voice of your first lieutenant as ${pronoun_1} announces the new training schedule.\n              \n                Then come the rattle of drums and the low rumble of heavy wheels on bare deck, as gunnery drill begins in earnest.\n                *set gosub_index 3\n                *gosub_scene gosub\n                *goto chap_2_hub\n            *if training != \"morale\"\n              #\"No, let us see to raising the crew's spirits instead.\"\n                *set training \"morale\"\n                \"Rearrange the watches to let the ${gender} have some more sleep? Arrange some leisure activities to keep them out of idleness?\" Burroughs muses, \"Aye, ${pronoun_5}, we could do that.\"\n              \n                Over the few minutes, you and your officers work out exactly what the crew needs the most. Eventually, you settle on a schedule which offers both rest and leisure time, with a bit of boarding drill in between to keep the ${gender} from complacency. \n              \n                Thus advised, your officers take their leave to announce the new arrangements to the crew, leaving you once again alone in your cabin.\n                *set gosub_index 3\n                *gosub_scene gosub\n                *goto chap_2_hub\n        #\"We are ready as we shall ever be: let us consider further action.\"\n          Your officers offer murmurs of agreement. \n          *if gallantry >= 50\n            They mislike this inactivity as much as you do.\n          *if gallantry \u003c 50\n            They must mislike this loitering about in full view of the enemy as much as you do.\n          *comment endif\n        \n          *if prize = false\n            \"Shall we endeavor to take a prize then?\" Lieutenant Bannister asks. \"Surely sending our dispatches to Admiral Warwick takes priority.\"\n          \n            *if recon = false\n              \"I could only wish we had something more substantial to send,\"\n              *if gender = \"men\"\n                Master Burroughs\n              *if gender = \"women\"\n                Mistress Burroughs\n              laments. \"Surely we can do better than 'the enemy are in Trimountaine.' If we were to get a closer look, I'm certain we'd be able to uncover all sorts of intelligence which the Commander in Chief would be sure to appreciate.\"\n            *if recon = true\n              Burroughs nods in agreement. \"Not only are three of the Columbian Navy's most powerful warships here, but we know for a fact that they lack the cannon and ${gender} to outfit more than one of them. That is intelligence the Admiral ought to have as soon as possible.\"\n          *if prize = true\n            *if lieutenant = \"fisher\"\n              \"Then we are to contrive to draw the Columbians out of their hidey-hole?\" Fisher asks. \"It'd be a damn sight better to fight them on our terms than theirs.\"\n            *if lieutenant = \"simpson\"\n              \"You mean to draw the enemy out then?\" Simpson asks. \"If we could fight them at a time of our choosing, that would certainly show [i]Foraker[/i]'s greater maneuverability to best advantage.\"\n            *if lieutenant = \"shannon\"\n              \"Are we to lure the enemy out then?\" Shannon asks. \"If we do that, we would be able to ensure a positional advantage, perhaps do some part in diminishing the enemy's advantage in guns.\"\n            *if lieutenant = \"pakenham\"\n              \"One means to draw the enemy out, perhaps?\" Pakenham asks. \"We would most certainly hold the initiative in any subsequent action if we were to do that.\"\n            *comment endif\n          \n            *if recon = false\n              \"So long as we don't draw out all three of them,\"\n              *if gender = \"men\"\n                Master Burroughs\n              *if gender = \"women\"\n                Mistress Burroughs\n              cautions. \"Our intelligence that only one of those three monsters is actually crewed is dubious at best. I would like to get a closer look, make sure of it before we do anything rash.\"\n            *if recon = true\n              \"Chancy business that,\"\n              *if gender = \"men\"\n                Master Burroughs\n              *if gender = \"women\"\n                Mistress Burroughs\n              cautions. \"Even if only one of them can respond, they still outnumber us in ${gender} and guns—and if their hulls really are made of iron, then we shall have our work cut out for us.\"\n          *comment endif\n        \n          Again, your officers turn to you for a decision.\n          *choice\n            *if prize = false\n              #\"Our chiefest priority is to pass on our intelligence to Admiral Warwick.\"\n                *goto chap_2_prize\n            *if recon = false\n              #\"Let us contrive to get a closer look: I want to know our enemy's condition.\"\n               *goto chap_2_recon\n            *if prize = true\n              #\"I mean to draw our foe out, and engage ${pronoun_3} on our terms.\"\n                *goto chap_2_endgame\n              \n*label chap_2_prize\n*set date + 6\n*if lieutenant = \"fisher\"\n  \"There's still the question of how to do it,\" Fisher observes. \"Taking a prize to carry our dispatches won't be simple under these circumstances. No Columbian will be damned foolish enough to simply sail into our hands, not while we're strutting about in Trimountaine Bay like this.\"\n*if lieutenant = \"simpson\"\n  \"Taking a prize fit to be a dispatch boat would be the most difficult task,\" Simpson observes. \"The small craft we could catch, but they'll hardly stand up to the high seas. One large enough to survive the trip to the [i]Courageous[/i] will no doubt have enough sail to evade us. We shall have to count on a prize falling into our laps, and I rather doubt the chances of that.\"\n*if lieutenant = \"shannon\"\n  \"If only we could cruise into Trimountaine Harbor and take a prize before the enemy frigates could get under sail,\" Shannon sighs. \"No chance of that with those gun batteries covering the approaches. We shall have to wait for a ship to fall into our laps, and I do not fancy the chances of that.\n*if lieutenant = \"pakenham\"\n  \"Then it must be a matter of taking a prize,\" Pakenham conjectures. \"I dare say it shall be easy enough to sail any seaworthy vessel back to the [i]Courageous[/i] without unfortunate incident, but to acquire such a vessel—well, I daren't believe such a suitable craft will simply fall into our hands.\"\n*comment endif\n\n\"I wouldn't be so sure about that, ${pronoun_5},\" Burroughs replies. \"Trimountaine is a major trading port. When we were at peace, ships would arrive by the dozen every day. Without that trade, the city must import its goods by land. Prices for things like cotton and sugar might well be astronomical by now. Surely there will be some captains desperate enough or foolish enough to run our blockade, especially seeing as we're only a single frigate. All we have to do is keep a weather eye, and wait.\"\n\nSo you do.\n\nFor five days, [i]Foraker[/i] lurks outside Trimountaine Harbor in a state of readiness, with every eye looking out for the sign of a ship looking to sneak in or out of the harbor, and every hand poised to set full sail and clear for action. For nearly a week, you wait for a ship willing to try their luck against [i]Foraker[/i] and ${ship_pronoun_2} crew. \n\nThen, on the sixth day, you find one.\n*page_break\n$!{ship_pronoun_1} is a worn-out looking sloop, all sheets to the wind as you spot ${ship_pronoun_3} trying to make a run for the open sea. Your order [i]Foraker[/i] cleared for action as the little craft passes out from under the protection of Fort Liberty's guns, and into the open waters of Trimountaine Bay.\n\nYour quarry rides quick before the wind with the breeze filling ${ship_pronoun_2} sails, but no sloop has the canvas to outrun a 38-gun frigate. Hour by hour, you gain on the Columbian vessel, until finally, ${ship_pronoun_1} is within the extreme range of the long nine-pounders mounted in [i]Foraker[/i]'s bows.\n\nThe bow chaser booms, the shot arcs through the air as a black blur, and lands with a splash just a dozen yards to larboard of your target: a warning shot, to show the Columbian that ${ship_pronoun_1} is entirely at your mercy.\n\nYet your quarry sails on.\n*page_break\n*if lieutenant = \"fisher\"\n  \"Damn! Damn! Damn!\" Fisher growls, each time louder and more vehemently than the last as ${pronoun_1} peers through ${pronoun_2} glass at the defiant little vessel. \"Of all the damned merchant captains in God's bloody ocean, we have to come across the one who wants to be a hero.\"\n*if lieutenant = \"simpson\"\n  \"Damned spiteful of them to keep running like this,\" Simpson observes as ${pronoun_1} peers through ${pronoun_2} glass at the fleeing sloop. \"We'll be able to overhaul ${ship_pronoun_3} and cut ${ship_pronoun_3} off eventually, but it might take hours, days if we are unlucky.\"\n*if lieutenant = \"shannon\"\n  \"Surely ${ship_pronoun_1} does not mean to make a run for it,\" Shannon observes with disbelief as ${pronoun_1} watches the little sloop flee through ${pronoun_2} glass. \"That'll do naught but waste our time, and theirs.\"\n*if lieutenant = \"pakenham\"\n  \"Insolent fellows, ain't they?\" Pakenham observes languidly as ${pronoun_1} keeps an eye to ${pronoun_2} glass. \"One supposes one must expect such disregard for the customs of war from such rustics. Ought to have'em whipped for their trouble, but that won't print well in the papers, one fears.\"\n*comment endif\n\nYou feel your own frustration mounting as well. Merchant captains ought to know when they are outmatched. A naval officer may have a duty to do ${pronoun_2} utmost to hinder an enemy, but surely the captain of a merchant vessel has no business risking the lives and well-being of ${pronoun_2} crew thumbing ${pronoun_2} nose at a 38-gun frigate.\n\n*if gallantry >= 65\n  Then again, were you in command of that brave little sloop, would you not do the same?\n*if gallantry \u003c 65\n  It is folly, sheer folly.\n*temp sloop_damage false\n*set prize true\n*set patronage + 10\n*choice\n  #If we can overtake them and cut them off, they will surely surrender.\n    It is not the subtlest approach by far, but if the sight of a Royal Navy frigate cutting off their escape route with gunports open does not force that Columbian sloop to surrender, nothing will.\n    \n    You order Burroughs to set all possible sail,\n    *if (c_sailing + sailing) >= 100\n      *set date + 1\n      and to position the [i]Foraker[/i] so that you put the other vessel between you and the coast.\n      \n      With every effort set to squeezing an extra knot or two out of the wind, your ship quickly begins to overhaul your quarry. Within two hours you are a mere cable's length behind. Another hour, and you are overtaking ${ship_pronoun_3}. With the jagged rocks of Cabot's Hook to starboard and [i]Foraker[/i]'s waiting guns to port, the Columbian can only keep trying to run straight ahead. \n      \n      Finally, just before sunset, you manage to pull ahead far enough to order a hard turn to starboard, cutting off your quarry's route of escape. You are about to order another warning shot across the Columbian sloop's bow when at long last, ${ship_pronoun_1} strikes ${ship_pronoun_2} colors and surrenders.\n      *goto chap_2_prize_2\n    *else\n      *set date + 4\n      *set c_morale %-10\n      and do your best to catch up with the other vessel. Yet every time you seem to get close, the Columbian somehow manages to slip away. Once or twice, your quarry evades you by less than a cable's length, almost as if ${ship_pronoun_1} were deliberately taunting you.\n      \n      [i]Foraker[/i]'s company are less than amused. As hours turn to days, their patience begins to run out, both with the Columbians for leading them on such a tedious chase, and with you for having ordered them into this unhappy state in the first place.\n      \n      Finally, after three days, you finally manage to pin the enemy ship against the coast. With your open gunports on one side and the jagged rocks of Cabot's Hook on the other, the Columbian sloop finally strikes ${ship_pronoun_2} colors.\n      *goto chap_2_prize_2\n  #We could use [i]Foraker[/i]'s bow chasers to bring down their rigging.\n    You order the long nines in [i]Foraker[/i]'s bows to be loaded with chain shot: a peculiar sort of ammunition designed specifically to damage the rigging of enemy vessels. \n    \n    *if (c_gunnery + gunnery) >= 80\n      *set sloop_damage true\n      *set date + 1\n      You take especial care to lay the guns yourself, going so far as to fire one gun personally, so that it may be timed perfectly against the down-roll of [i]Foraker[/i]'s hull.\n      \n      The other gun goes off right after yours, a pair of matched thunder claps. Two iron blurs scythe through the air, each consisting of a pair of iron balls linked together with chain. One splashes into the water two dozen yards short, but the second strikes home, tearing into the sloop's rigging in a cataclysm of ripping canvas and splintering timber.\n      \n      The Columbian's mast snaps like a twig, collapsing in a tangle of sail and spars. Their flag goes down with it. Nobody raises a new one: your quarry has surrendered. \n      *goto chap_2_prize_2\n    *else\n      *set date + 3\n      *set c_morale %-10\n      Yet the range is still too long. Your first pair of shots go wide, as do the second, and the third.\n      \n      The gunners do not give up easily, yet between the wind and the sea and the unusual characteristics of chain shot in flight, you meet with no success. Eventually, your supply of chain shot for your bow chasers runs empty, and you have no choice but to run down the Columbian sloop the old fashioned way.\n      *page_break\n      The pursuit is a long and frustrating one. Though the Columbian cannot carry anywhere near as much sail as [i]Foraker[/i], ${ship_pronoun_1} is skilfully handled, and slips away every time you manage to get close.\n      \n      As hours turn to days, your crew begin to lose patience, both with the persistent defiance of your quarry, and with you for leading them into such a tedious and fatiguing chase in the first place. \n      \n      It is not until the third day of this tiresome game of cat and mouse that you are finally able to pin the Columbian sloop against the coast. Trapped between [i]Foraker[/i]'s broadside and the jagged rocks of Cabot's Hook, your quarry finally gives up, and strikes ${ship_pronoun_2} colors.\n      *goto chap_2_prize_2\n  #I might be able to bluff them into giving up.\n    *if leadership >= 55\n      *set date + 1\n      \"$!{pronoun_4} Bannister!\" you command, \"reload the bow chasers, and make ready to fire again.\"\n      \n      Your second lieutenant raises an eyebrow. \"With round shot, $!{pronoun_5}? That sloop's no use to us if we hole ${ship_pronoun_3}.\"\n      \n      \"But they don't know that,\" you reply. \"They cannot know that we do not have the option of simply sinking them. I intend to use their ignorance to our advantage.\"\n      \n      Bannister catches your meaning immediately. \"Aye aye, ${pronoun_5},\" ${pronoun_1} replies as ${pronoun_1} touches ${pronoun_2} fingers to ${pronoun_2} hat. \"Reload the long nines with round shot!\"\n      \n      You watch the gun crews lay the bow chasers with profound interest,\n      *if sensibility >= 50\n        straining to keep the worry from your expression.\n      *if sensibility \u003c 50\n        your expression carefully kept calm.\n      If your shots go too wide, then the Columbians will not think you are serious. Worse yet, if they actually do strike your quarry…\n      \n      But they do not. One shot passes just a few yards from the sloop's larboard rail. The second actually passes under the Columbian's shrouds, missing the mast by what seems like less than an arm's width. Surely after that display, they cannot help but think that you will pound them to flinders if they do not submit.\n      \n      And surely enough, they do. A moment later, the Columbian strikes ${ship_pronoun_2} colors.\n      *goto chap_2_prize_2\n    *else\n      *set date + 3\n      *set c_morale %-10\n      \"Hard to port, $!{pronoun_4} Bannister,\" you command. \"Run out the larboard broadside, and let them know we are in earnest.\"\n      \n      \"Aye aye, ${pronoun_5},\" Bannister replies as ${pronoun_1} touches ${pronoun_2} fingers to ${pronoun_2} hat. \"Bright our larboard broadside to bear!\"\n      \n      The crew react immediately, but it takes precious seconds to make that turn and run out the guns, seconds which the Columbian uses to open the distance. Worse yet, when you present the opened gunports of your broadside as a naked threat, the sloop calls your bluff, continuing to run.\n      \n      You order another warning shot, this time from one of the heavy broadside eighteen-pounders, but the Columbian has put too much distance between you. The shot splashes into the sea, a hundred yards short, revealing your threat to be entirely empty.\n      \n      Your attempt at intimidation has ended in complete failure. Your quarry has used the time you have wasted to open the range by at least half a mile. Your officers frown you order [i]Foraker[/i] brought about to resume the pursuit. They know that you all have a long chase ahead of you.\n      *page_break\n      And you do. \n      \n      It takes two days to run down the Columbian vessel. Two days of sailing in circles in futile attempts to corner your slower, but more nimble quarry. By the time you finally manage to pin ${ship_pronoun_3} against the rocky shore of Cabot's Hook, your crew are almost out of patience, both with their prey, and with you for having so fumbled your first attempt to take ${ship_pronoun_3}.\n      \n      Yet now, at least, there is no escape for your quarry. Trapped betwixt the prospect of facing [i]Foraker[/i]'s broadside or shipwreck on an inhospitable shore, the Columbians strike their colors at last.\n      *goto chap_2_prize_2\n*label chap_2_prize_2\n*page_break\n*set prize_money + 150\n\"$!{ship_pronoun_1} is called the [i]Antelope[/i],\" Bannister reports as ${pronoun_1} returns after putting a prize crew on your newly acquired sloop, \"and by God is ${ship_pronoun_1} a sickening sight. $!{ship_pronoun_1}'s crank, has an alarming list to port, ${ship_pronoun_2} hull shows signs of being holed beneath the waterline at least once before, ${ship_pronoun_2} timbers are old, ${ship_pronoun_2} tiller is cracked, ${ship_pronoun_1} mounts eight 4-pounders which are both old [i]and[/i] cracked. Were it not for ${ship_pronoun_2} new sails, ${ship_pronoun_2} empty hold, and ${ship_pronoun_2} captain, ${ship_pronoun_1} would have barely made it out of harbor, let alone given us all the trouble ${ship_pronoun_1} did.\"\n\n\"But will ${ship_pronoun_1} be able to carry our dispatches?\" you ask.\n\nBannister frowns. \n*if sloop_damage = true\n  \"Once we repair the rigging, perhaps,\n*if sloop_damage = false\n  \"Perhaps,\nwith the right crew led by the right officer.\"\n\n\"You shall have to command,\" you reply. \"The midship${gender} are all too junior to be trusted with dispatches, and $!{lieutenant} must remain aboard [i]Foraker[/i] as senior lieutenant.\"\n\n\"I supposed as much, ${pronoun_5},\" Bannister sighs with more equanimity than some might have mustered. \"I shall inform the ${gender}.\"\n*page_break\nThe [i]Antelope[/i]'s former captain is less than pleased with your plans. \n\n\"You can't just take my ship away from me!\" $!{pronoun_1} protests indignantly when you make an inspection of the prize for yourself. \"It's all I got left! [i]Antelope[/i] ain't no warship or nothing! I don't even like this war! Would have voted against it if I could! You won't even get any decent money for it, not without no cargo in the hold!\"\n\n$!{pronoun_1} looks from you to the loads of supplies being carried aboard in a state of utmost agitation. \"Can't you at least tell me what you're planning on doing with my ship?\"\n*fake_choice\n  #It would only be civil to inform ${pronoun_3}, it can do little harm now.\n    *set gallantry %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    \"Your vessel is to be used as a dispatch boat,\" you explain. \"Our superiors need to be made aware of the three frigates in Trimountaine Harbor.\"\n\n    \"The what?\" the Columbian exclaims incredulously. \"What in God's name are you wasting your time with them for? The dang navy can barely even gather up enough trained ${gender} to crew one of the darn things let alone all three.\"\n  #I can explain in generalities, but nothing which might give away our purpose.\n    \"Your vessel is needed to carry dispatches to our superiors,\" you explain. \"You and your crew should not be in any danger.\"\n    \n    The Columbian's eyes narrow. \"What is this about? The frigates in the harbor?\"\n    \n    *if sensibility >= 50\n      You say nothing, but evidently your expression is all the proof the other captain needs.\n    *if sensibility \u003c 50\n      You say nothing, and reveal nothing, but the other captain is not deterred.\n    *comment endif\n    \n    \"It's the only thing that makes sense,\" ${pronoun_1} insists. \"Otherwise you'd be delivering those reports yourself instead of looming over Trimountaine Bay with your telescopes like some kind of\n    *if gender = \"men\"\n      Peepin' Toms.\n    *if gender = \"women\"\n      Peepin' Tamsins.\n    I don't know why you bother though. Dang Navy can barely even scrape together enough ${gender} to crew one of 'em, let alone three.\"\n  #These are military secrets ${pronoun_1}'s asking for! Out of the question!\n    *set gallantry %-10\n    *set gosub_index 200\n    *gosub_scene gosub\n    \"It would be imprudent to divulge our plans during a time of war,\" you reply firmly. \"I can assure you however that your crew will be in no danger.\"\n    \n    \"Imprudent!\" The Columbian scoffs. \"You Navy ${gender} are all the same! Your opposite numbers in Trimountaine like trying to keep secrets too, speakin' in codes and riddles like they're in some kind of bad play, pretendin' like those frigates they got could set sail at any moment when every idjit in the city knows they ain't even got the trained hands to crew more than one of 'em at a time.\"\n*page_break\n*set c_str - 3\nThe Columbian captain's words linger in your head as you oversee the transferral of the prize crew's sea chests,\n*if sloop_damage = true\n  the repair of the Antelope's mast,\n  *set date + 1\nBannister's assumption of command, and the dispatch boat's final departure, headed for the open sea and the friendly squadron which lies lurking somewhere over the horizon.\n\nIt is still repeating itself in your thoughts when [i]Foraker[/i] returns to ${ship_pronoun_2} previous position outside Trimountaine Harbor.\n\n*if recon = false\n  The Columbian had every reason to lie, of course. You are still an officer of a hostile power, commanding a ship currently in the process of blockading ${pronoun_2} homeland.\n  \n  However, if ${pronoun_1} isn't…\n  *page_break\n  *if (date >= 65) or ((date >= 55) and (cordial_escape = true))\n    Yet before you can call a conference to discuss the possibility with your officers, a shout from the tops brings you racing onto the quarterdeck.\n    *goto chap_2_end\n  The evidence is not compelling enough for some.\n  \n  \"I don't trust this Columbian's account,\" Burroughs insists as ${pronoun_1} stands before you during your weekly officers' conferences. \"It is my belief that we ought to corroborate it with accounts of our own, from people we can trust. If our current intelligence about the state of the Columbian frigates proves to be a ruse, then I would rather like to know before we try to lure out one of those frigates and find ourself facing all three.\"\n  \n  \"On the other hand,\" Captain Mercer interjects, \"If the accounts are accurate and the Columbians are having trouble gathering together the crews they need, then they may be having trouble with other preparations. Now, I am no sailor, but it would seem to me immeasurably wiser to move swiftly. If we are able to provoke one of those frigates out before it is fully prepared for battle, we would hold the advantage.\"\n*if recon = true\n  The scouting reports were accurate after all. Out of the three frigates in Trimountaine Harbor, only the [i]Delmarva[/i] has hands enough to sail.\n  *page_break\n  *if (date >= 65) or ((date >= 55) and (cordial_escape = true))\n    Yet before you can call a conference to discuss the matter with your officers, a shout from the tops brings you racing onto the quarterdeck.\n    *goto chap_2_end\n  Your officers do not hesitate to make their views known when you convene for your weekly conference.\n  \n  \"This Columbian's account corroborates our own findings precisely,\" Burroughs declares. \"Two of those frigates in Trimountaine Harbor are nothing but empty shells, a bluff. Those still aren't good odds, but they will certainly be fair enough if we are forced to fight.\"\n  \n  \"Or if we provoke them,\" Captain Mercer adds. \"That Columbian says the enemy is short on ${gender}, and our own reports say that they have yet to finish refitting the ship they can crew. If we were to incite the enemy to action immediately, while their preparations are yet incomplete, we shall have the advantage. Our odds will never be better, ${pronoun_5}.\"\n*set week_repeat + 1\n*goto chap_2_hub_2\n    \n*label chap_2_recon\n*set recon true\n*if lieutenant = \"fisher\"\n  \"Damned sight easier said than done, I would think,\" Fisher notes. \"The Columbians must have a hundred or more heavy guns covering every approach.\"\n*if lieutenant = \"simpson\"\n  \"If only it were so easy,\" Simpson laments. \"Fort Liberty mounts four dozen guns at least. Fort Putnam, probably the same. They cover every approach by sea.\"\n*if lieutenant = \"shannon\"\n  \"The question then becomes how it is to be done,\" Shannon notes. \"The Columbians are not fools. They will have guns covering every approach from sea.\"\n*if lieutenant = \"pakenham\"\n  \"One wishes it were as easily said as done, ${pronoun_5},\" Pakenham observes. \"The enemy's forts cover the approaches. They will have cannon pointed at every possible approach by sea.\"\n*comment endif\n\n\"But not by land!\" Captain Mercer interjects. \"We could put ashore a small party in local clothing, then have them simply approach the city on the main road like a gaggle of common grocers. A city like Trimountaine must have thousands of visitors a day. It shan't be difficult to get in and take a look.\"\n\n\"If they don't run into the militia, anyhow,\" Burroughs replies. \"It may be better to approach by boat. Perhaps under cover of night, or by using the coast as cover from the enemy guns. They could slip in, hide amongst the merchant hulls, record their findings, and slip out again.\"\n\nNone of the plans are without risk. If a landing party is discovered by the Columbian militia, they will have to fight their way out. Yet infiltrating a boat under cover of night would require a great deal of skill in sea${gender_2}ship, and without exact layouts of the Columbian batteries, trying to use the coast for cover would be a matter of guesswork. \n\n*if gallantry >= 50\n  Worst of all, you shall not even be able to lead this endeavor yourself. The Royal Navy has too few captains to risk on such expeditions, and the Admiralty has written standing orders to that effect. If your decision were to prove the wrong one, someone else will suffer for it.\n*if gallantry \u003c 50\n  At least you shall not have to lead such a risky endeavor yourself. The Admiralty has standing orders against that sort of thing. If you make the wrong decision, it will be someone else who suffers for it.\n*choice\n  #\"We must send a scouting party by land.\"\n    *set date + 2\n    You and your officers spend the next two days assembling a scouting party to infiltrate Trimountaine by land. Thankfully, that proves easier than expected: [i]Foraker[/i]'s company includes ${gender} from a dozen nations, including at least a dozen born in the United Republics, each with the appropriate accent and mannerisms to make themselves look familiar in Trimountaine, or at the very least not mark them out as an Albionian sailor.\n    \n    Made aware of their objective, and dressed in lands${gender}'s clothing, your little expedition sets off on the morning of the third day in the ship's cutter. Command of the mission falls to Markham, one of your older midship${gender}, who has been instructed to speak as little as possible to avoid giving away ${pronoun_2} true nationality. Rowing swiftly, they quickly reach a concealed cove along the coast. Then, they disappear into the trees, out of sight.\n    \n    Now all you can do is wait.\n    *page_break\n    And wait you do. For three days, you have the crew keep an eye out for any sign of your scouting party. For three days, they see nothing but the normal, muted activity of a city under blockade.\n    \n    *if c_morale >= 60\n      *set date + 5\n      Then, on evening of the fourth day, your lookouts sight the boat heaving off from shore. It pulls straight for [i]Foraker[/i]'s side. Within minutes, Markham and ${pronoun_2} plucky little group of Columbian ex-patriates are back aboard ship, their expressions flush with triumph.\n      *page_break\n      \"We only had a little trouble, ${pronoun_5},\" Markham reports. \"A mounted patrol stopped us as we were trying to leave the city, but Johnson gave such a convincing reply to their challenge that they let us pass unmolested. I would like to request that ${pronoun_1} be commended for ${pronoun_2} quick action. It was instrumental to our success.\"\n      *goto chap_2_recon_success\n    *else\n      *set date + 5\n      *set c_str - 4\n      Then, late on the fourth day, the evening echoes with the crack of distant gunshots. The city rises in uproar. Even from a distance, you can see the torch-bearing swarms as they flood Trimountaine's streets, raising every manner of panic and upset.\n      \n      The source of the hue and cry soon becomes obvious. Your scouting party's boat heaves off from shore and pulls hard for [i]Foraker[/i]'s side, with only a handful of figures aboard. A fresh round of shouts rises from the coast. Dark specks rise against the darkening sky, lit briefly by the flashes of muskets and pistols. Captain Mercer's marines reply with a crisp volley of their own. It is far out of range to do any damage, but the Columbians disperse in panic all the same. \n      \n      Within minutes, the cutter is alongside, and the shaken remnants of the scouting party are climbing aboard.\n      *page_break\n      \"Things went well until it was time to leave the city,\" Markham reports ruefully. \"We were discovered by a mounted patrol, and someone panicked. They shouted that we should run for it, and that made the Columbians suspicious enough to pursue. I saw Johnson and Harris go down, I must assume the others have been captured.\"\n      *goto chap_2_recon_failure\n  #\"A night infiltration by boat seems the best option.\"\n    *set date + 5\n    It is no easy business to prepare for a night-time reconnaissance. For five days, you and your officers pore over every chart of Trimountaine Harbor that you have available, while the crew perform the laborious task of painting the ship's cutter black, and muffling the oars with wads of oakum. \n    \n    At last, with the details of the approach set and the cutter made ready, your scouting party departs just before midnight, under command of Markham, one of your more senior midship${gender}. \n    \n    As the hours pass by and the sun begins to rise, they still do not return. You can only wait the day, and hope that your little expedition has merely been stranded by daylight, and that they have not been discovered so deep within the beast's den.\n    *page_break\n    *if (c_sailing + sailing) >= 100\n      *set date + 2\n      Then, just after sunset, your lookout spots a dark shape approaching from the direction of Trimountaine Harbor. Soon, the oncoming object resolves itself as a boat, pulling swiftly for [i]Foraker[/i]'s bows. A moment later, it shows with long flashes of a hooded lantern: the prearranged signal.\n      \n      Within minutes, the cutter is alongside, and your scouting party is climbing back aboard hungry and tired, but flush with victory.\n      *page_break\n      \"We were still inside the harbor when the sky began to lighten,\" Markham reports, \"so we slipped the cutter between two of the docked ships, hid ourselves under the tarpaulin, and waited for darkness before making good our escape.\"\n      *goto chap_2_recon_success\n    *else\n      *set date + 2\n      *set c_str - 4\n      Then, just after sunset, the mouth of Trimountaine Harbor lights up with flashes of musket fire. Shouts echo across the water as a dark shape pulls hard for the [i]Foraker[/i]'s bows, with a pair of longboats in hot pursuit. \n      \n      As the first boat pulls within musket shot, you see two long flashes from a hooded lantern at its bow: the signal. \n      \n      The two boats giving chase open up with ragged volleys. You hear someone scream and fall into the water with a splash, but before they can fire again, Captain Mercer's marines pay them back in kind, driving the Columbian guard boats back to the safety of the harbor.\n      \n      Within minutes, your cutter is alongside, but only a handful of the scouting party are alive to clamber up the the side. \n      *page_break\n      \"We were still inside the harbor when the sky began to lighten,\" Markham reports ruefully. \"So we slipped the cutter between two of the docked ships, hid ourselves under the tarpaulin, and waited for darkness to escape. We'd nearly gotten away when someone must have spotted us. We lost three dead to the fire from the guard boats, and another five wounded besides.\"\n      *goto chap_2_recon_failure\n  #\"We shall send a party by boat, using the coast as cover.\"\n    *set date + 3\n    You spend the next three days poring over whatever charts of Trimountaine Harbor you can find, looking for hiding spots and covered approaches not within reach of the port's defenses. Stretching your own knowledge of gun-laying to the fullest, you make your best guesses as to which routes are to be least likely to be overlooked by Columbian guns.\n    \n    Finally, you mark out what should be the safest course on the map and brief Markham, one of your older midship${gender} and the assigned commander of the scouting party.\n    \n    Thus prepared, the little expedition sets off early on the fourth day, heading straight for the coast to begin their slow and careful approach towards Trimountaine.\n    *page_break\n    For four days, you scan the coast, watching the boat's creeping progress towards the mouth of Trimountaine Harbor. Bit by bit, you catch glimpses of your scouting party as they advance in fits and starts, never openly enough to attract the city's defenders. \n    \n    *if (c_sailing + gunnery) >= 100\n      *set date + 4\n      Then, finally, after two days, the scouting party begins to creep back towards [i]Foraker[/i].\n      \n      It is agonizing, watching the boat retreat as slowly as it had advanced, but you know they must go no further: if they were to reach for open ocean too soon, they would still be within range of the enemy's guns.\n      \n      Finally, late on the sixth day, the boat parts ways with the shore, and begins to pull hard for [i]Foraker[/i]'s bows. Within minutes, it is alongside, and its triumphant scouting party is clambering aboard.\n      *page_break\n      \"There were a few times I was worried we had been spotted,\" Markham reports, \"but every time, the enemy must have either failed to recognize us, or found us out of reach of their guns. We were fortunate to escape as cleanly as we did.\"\n      *goto chap_2_recon_success\n    *else\n      *set date + 2\n      *set c_str - 4\n      Then, after two days, the scouting party begins to creep back towards [i]Foraker[/i].\n      \n      Yet after only a few hours, there is a sudden commotion rising from the ramparts of Fort Putnam. The distant report of a cannon echoes out across the water, and the splash of shot rises just a few yards short of the cutter. \n      \n      There is no point to subtlety now. The boat pulls hard for your ship's bows, even as the rest of Trimountaine's harbor batteries open in a thunderous salvo. \n      \n      Most of the shots go wide, for the boat is already at such a range to make accurate cannon fire impossible. Yet with over a hundred guns firing, your scouting party's luck does not hold. A ball strikes the cutter's stern with enough force to split the little boat in two, sending limbs and bodies tumbling into the water like pebbles. A few flailing shapes manage to get free, but you know that only a fraction of the boat's crew can swim. \n      \n      In the end, only Markham and three others make it to [i]Foraker[/i]'s sides. The rest are not seen again.\n      *page_break\n      \"We thought we were out reach of their guns,\" Markham reports ruefully, still dressed in a waterlogged tunic and breeches stained with blood, \"but apparently we had thought wrong. I accept full responsibility for the loss of my command, and the ship's cutter, though I hope I am believed when I say that I do not think anything more could have been done to avoid this.\"\n      *goto chap_2_recon_failure\n*label chap_2_recon_success\n*choice\n  #\"You have my congratulations, $!{pronoun_4} Markham, that was quite well done.\"\n    *set sensibility %+10\n    Markham's face lights up at your words. \"Oh yes, ${pronoun_5}! Thank you, ${pronoun_5}!\"\n    \n    In truth, Markham's actions might well make ${pronoun_3} eligible for an examination for lieutenant. But that is a matter to consider once you have dealt with the current crisis. Allowing your young subordinate ${pronoun_2} moment of happiness, you move on.\n    \n    \"What did you discover?\"\n    *goto chap_2_recon_end\n  #\"Well done, now what did you find?\"\n    In truth, Markham deserves more praise than that for the way ${pronoun_1} carried out ${pronoun_2} mission, but all that will mean nothing if ${pronoun_1} has not discovered anything useful.\n    *goto chap_2_recon_end\n  #\"That can wait: what did you find?\"\n    *set sensibility %-10\n    There's no time to waste on niceties, that can wait until afterwards. You trust that Markham understands your lack of praise as a function of the current exigency, and not of any failing on ${pronoun_2} part.\n    *goto chap_2_recon_end\n*label chap_2_recon_failure\n*choice\n  #\"A pity, a damned pity.\"\n    *set sensibility %+10\n    Markham nods sadly. You suppose ${pronoun_1} had gotten closer to the ${gender} in ${pronoun_2} care in the past few days than you had. The loss of eight trained hands is a still a stinging blow for [i]Foraker[/i], but it must be worse for the young officer who had watched them die.\n    \n    Yet still, there is no time for grieving, not while the enemy is still in sight.\n    \n    \"What did you discover?\"\n    *goto chap_2_recon_end\n  #\"A shame, but did you discover anything?\"\n    In truth, the loss of eight trained hands to such a stroke of poor fortune stings more than just a little, but you will lose a lot more unless you keep your crew focused on the mission at hand.\n    *goto chap_2_recon_end\n  #\"Never mind that, what did you discover?\"\n    *set sensibility %-10\n    You can only hope that Markham realizes that it is not your intention to seem unfeeling. It is simply a matter of the fact that you will lose a lot more than eight trained hands if you are forced to engage the enemy without accurate intelligence as to their dispositions.\n    *goto chap_2_recon_end\n \n*label chap_2_recon_end\n*set gosub_index 200\n*gosub_scene gosub\n    \n\"We got a close look at all three frigates in the harbor,\" Markham replies. \"The [i]Delmarva[/i]'s there. So's the [i]Chancellor[/i] and the [i]Charter[/i].\"\n\nYou nod. Three of the Columbian Navy's most formidable\n*if gender = \"men\"\n  men'o'war,\n*if gender = \"women\"\n  ladies'o'war,\nbut you had known that already. \"What is their condition?\"\n\n\"[i]Charter[/i] is laid up,\" Markham replies. \"$!{ship_pronoun_1} is covered with ${gender}, but they are carpenters and shipwrights, not sailors. The [i]Chancellor[/i] seems entirely deserted. Yet that is not the queerest thing of all, ${pronoun_5}.\"\n\nYou find yourself leaning forward in interest. The fact that [i]Charter[/i] is in no state to sail is a relief. [i]Chancellor[/i]'s lack of crew is certainly strange, but that could simply mean that ${ship_pronoun_2} company is ashore on leave. But if Markham's eye has picked out something even stranger…\n\n\"We saw several wagons full of provisions being unloaded, and more full of cannon,\" the young officer reports, \"but all of them are going aboard [i]Delmarva[/i]. None go to [i]Chancellor[/i] or [i]Charter[/i], not even to feed a skeleton crew. I am reluctant to speculate, ${pronoun_5}, but…\"\n\n\"Go on.\"\n\nMarkham swallows nervously, and breathes out ${pronoun_2} conclusion in a final tumble of words. \"One could almost think that the Columbians currently only have the resources to send out one of their frigates to sea.\"\n*page_break\n*if (date = 65) or ((date >= 55) and (cordial_escape = true))\n  Yet before you can call your officers to discuss the implications of Markham's findings, a shout from the tops brings you up to the quarterdeck.\n  *goto chap_2_end\n*if prize = true\n  So the [i]Antelope[/i]'s captain had not been lying to you after all.\n  \n  You by no means overestimate your own strength. Any of the three frigates in Trimountaine Harbor outweigh and out gun [i]Foraker[/i] handily. Yet defeating one of the black-hulled monsters is at least possible, if still highly improbable. In fact, if the [i]Delmarva[/i] is still being refitted and resupplied, then perhaps it would be better to provoke an engagement now, before ${ship_pronoun_2} company is fully prepared and ${ship_pronoun_2} stores fully loaded. \n  \n  In fact, when it comes time for your weekly conference, that is exactly what your first lieutenant suggests.\n  \n  *if lieutenant = \"fisher\"\n    \"We can't damn well give this chance up, ${pronoun_5},\" Fisher insists. \"Better we try and bait that monster while ${ship_pronoun_1}'s half-whelped than to do so when ${ship_pronoun_1} worked up and ready for a fight.\"\n  *if lieutenant = \"simpson\"\n    \"If the [i]Delmarva[/i] is taking on stores, that means ${ship_pronoun_1} means to put to sea very soon,\" Simpson suggests. \"If ${ship_pronoun_1} finishes ${ship_pronoun_2} preparations and sails before the [i]Courageous[/i] arrives, we shall likely have to engage ${ship_pronoun_3} on ${ship_pronoun_2} terms. Better we try to co-opt them before they are ready, and make them fight on ours.\"\n  *if lieutenant = \"shannon\"\n    \"The [i]Delmarva[/i] is larger than we are, ${ship_pronoun_2} crew is larger too,\" Shannon points out. \"Our sole advantage is the superior quality of [i]Foraker[/i]'s company, and that advantage diminishes with every day we allow the enemy to train their hands in peace. It would be best not to allow them that time.\"\n  *if lieutenant = \"pakenham\"\n    \"Under normal circumstances, one would think it dashed unsporting to try to lure them out while they were still preparing for action,\" Pakenham muses, \"however, given that they already possess a most unfair advantage in ${gender} and guns, one might even say that it would only be fair to seek an advantage of our own.\"\n  *comment endif\n  \n  Burroughs and Mercer nod in agreement. It seems that support for a move to lure out your quarry is all-but unanimous.\n  \n  But a $!{monarch}'s ship is not a democracy. Such a measure can be taken only when you give the order, and not a moment before.\n*if prize = false\n  The implications do not escape you.\n  \n  If Markham's observations are correct, then you face the prospect of not facing three, but only one of the Columbian frigates in Trimountaine Harbor. Though each of the black-hulled monsters still out-guns [i]Foraker[/i] by a wide margin, it would mean that you could approach a potential confrontation with at least some chance of victory. Beyond that, the fact that two of the Columbian Navy's six heavy frigates are currently in no shape to sail is intelligence of vital import to the wider war.\n  \n  Lieutenant Bannister says as much at your weekly officers' conference. \n  \n  \"Admiral Warwick must know of this, ${pronoun_5},\" ${pronoun_1} insists. \"A full third of the enemy's heaviest ships are out of action. Surely the Commander in Chief or the Admiralty could use this intelligence to some profitable end.\"\n  \n  $!{lieutenant} and Burroughs nod in agreement, but Captain Mercer remains pensive.\n  \n  \"Forgive me, ${pronoun_5}, if I have overlooked some finer point of sea service,\" ${pronoun_1} finally says, \"but if the [i]Delmarva[/i] is still taking on stores, does that not mean that ${ship_pronoun_1} is still in the midst of preparations? If we could contrive some way to lure them to battle before such preparations were complete, would that not be likely that ${ship_pronoun_1} would be lacking some vital implement of war, or perhaps that ${ship_pronoun_2} company would be imperfectly trained?\"\n  \n  The marine officer has a point, but there can be no question of luring the [i]Delmarva[/i] into battle until your orders are fulfilled: Admiral Warwick and the Courageous must be warned.\n*goto chap_2_hub\n\n*label chap_2_endgame\nIt is a fine intention, but the Columbians are no fools. If you wish to draw them out to battle on your terms, then you will need to compel them to sail using a method more convincing than mere wishful thinking. Judging by the looks on your officers' faces, they know it too.\n\n*if lieutenant = \"fisher\"\n  \"If we mean to drag the enemy out, we ought to make it intolerable for ${pronoun_3} to remain in port,\" Fisher suggests. \"We could fire off a few broadsides at the city at extreme range. We wouldn't be able to hit anything, but it would certainly frighten the townsfolk. I would wager that the good citizens of Trimountaine would all but demand the captain of the [i]Delmarva[/i] set to sea to put a stop to it.\"\n  \n  *if child_send = true\n    \"But my family-\" Burroughs interjects, eyes wide. \"They are still in the city!\"\n    \n    \"Surely they will know to keep away from the waterfront,\" Fisher replies. \"In any case there is only one way to keep your family out of harm, and that is to see this war ended. \n  *if child_send = false\n    \"With all due respect, ${pronoun_5},\" Burroughs interjects angrily, \"you are speaking of opening fire indiscriminately upon innocents.\"\n  \n    \"With all due respect, $!{pronoun_4} Burroughs, this is war,\" Fisher retorts. \"Moderation in warfare only serves to drag it out pointlessly. Innocents die every day this war continues. \n  If we must act sharply to do our part to shorten it, then it is worth doing so, unless you have a better idea?\"\n*if lieutenant = \"simpson\"\n  \"We must force the enemy to attack us by striking at something ${pronoun_1} must protect,\" Simpson muses. \"If we fire upon Trimountaine itself, then the captain of the [i]Delmarva[/i] would be compelled to sail out in the city's defense.\"\n  \n  *if child_send = true\n    \"But, my family! They are still in the city!\" Burroughs exclaims, eyes wide.\n    \n    \"And I sympathize, and I hope they will find safety,\" Simpson replies, \"but recall that it was the Columbians who first set the precedent of bombarding the blameless populace. That it was their privateers who first struck Coburg and Poole and half a dozen other villages in New Lothian. It was they who first turned their weapons against our country${gender},\" his voice hardens, filling with a cold, pitiless anger after every single word. \"The Columbians have set the music,\n  *if child_send = false\n    \"With all due respect, ${pronoun_5},\" Burroughs interjects, outraged, \"you would open fire indiscriminately upon the city's civil population?\"\n  \n    \"It is no worse than what the Columbian Army has done to Dunbarton,\" Simpson replies with a cool anger, \"or what their privateers have done to Coburg, Poole, or half a dozen other settlements in New Lothian. The Columbians have set the music, \n  let them dance to their own tune, unless you've a better idea.\"\n*if lieutenant = \"shannon\"\n  \"Perhaps we could appeal to the honor of the [i]Delmarva[/i]'s captain?\" Shannon suggests. \"Offer a formal challenge, with the stated intention of settling a point of pride betwixt our two countries, like a trial by champion or the like. In my experience, Columbians have a bit of a romantic streak to them. Such an archaic form may appeal to ${pronoun_3}.\"\n  \n  \"And if it doesn't?\" Burroughs asks.\n  \n  Your first lieutenant shrugs. \"Have you a better idea?\"\n*if lieutenant = \"pakenham\"\n  \"If one to is to draw the enemy out for the sake of acquiring advantage, there is no reason one cannot be civil about it,\" Pakenham notes. \"One could deliver a formal challenge, appeal to the Columbian captain's honor.\"\n  \n  \"I beg your pardon, ${pronoun_4}?\" Burroughs interjects incredulously. \"A formal challenge? In this modern age? In this sort of war? Under these circumstances? Against this sort of enemy, with the intent of localizing its effect solely to the captain of the [i]Delmarva[/i]?\"\n  \n  Pakenham seems unruffled. \"Yes.\"\n  \n  \"Could you at least offer any guarantee it would work?\"\n  \n  \"No,\" your first lieutenant replies flatly. \"Does one have a better idea?\n*comment endif\n\n\"I do,\" the\n*if gender = \"men\"\n  sailing master\n*if gender = \"women\"\n  sailing mistress\nreplies. \"If I were the captain of that ship, I would much rather go out to sea unopposed than fight my way through an enemy ${ship_gender} of war to break out. Fighting a frigate action is risky, the Columbians know that as well as we do. Even if they fight [i]Foraker[/i] and win, they'll still lose crew and sustain damage they may have to spend weeks to repair. If we pretend to withdraw, then [i]Delmarva[/i]'s captain would be sorely tempted to make for open water before we returned or were replaced by some other Albionian ship. Then all we'd need to do is lie in wait until we can cut ${ship_pronoun_3} off from safe harbor, and we shall have our favorable engagement.\"\n\nBurroughs' plan might work, but then again, so might $!{lieutenant}'s. Then again, perhaps there is a better, third option. \n\nBut that is not for them to decide. You are [i]Foraker[/i]'s captain, and at this moment, only your decision matters.\n*choice\n  *if ((lieutenant = \"fisher\") or (lieutenant = \"simpson\"))\n    #\"Bombarding the city will be a challenge the Columbians cannot refuse.\"\n      Burroughs and Mercer seem less than comfortable with your decision, but they cannot object to it now, not when you have made up your mind. \n      *goto chap_2_endgame_bombard\n  *if ((lieutenant = \"fisher\") or (lieutenant = \"simpson\"))\n    #\"Let us appeal to honor instead of force, I'll offer [i]Delmarva[/i]'s captain a formal challenge.\"\n      Burroughs and Mercer look at each other dubiously. $!{lieutenant} only frowns. Yet you have made up your mind. The officers of the Columbian service are not so different from those of your own. Surely, if you were to appeal to your counterpart's sense of honor and pride, you would be able to obtain the same results through nobler means than forcing the [i]Delmarva[/i] out through threat of indiscriminate violence or subterfuge.\n      *goto chap_2_endgame_challenge\n  *if ((lieutenant = \"shannon\") or (lieutenant = \"pakenham\"))\n    #\"Let us try a formal challenge, and hope our adversaries prove ${gender} of honor.\"\n      Burroughs looks at Mercer dubiously, but the Marine captain shrugs. It is too late to object now, not when your mind has been made up.\n      *goto chap_2_endgame_challenge\n  *if ((lieutenant = \"shannon\") or (lieutenant = \"pakenham\"))\n    #\"Why use words when we have cannon? Bombard the city until the [i]Delmarva[/i] comes out.\"\n      A formal challenge is all well and good when calling someone out for a duel, but this is war. In such circumstances, an appeal to an opponent's honor is by no means guaranteed to succeed. Bombarding the city of Trimountaine would compel the captain of the [i]Delmarva[/i] to sortie, if only so that ${pronoun_1} may put a stop to your attack. \n      *if sensibility >= 50\n        It is a low and wretched tactic, but it will work. \n      *if sensibility \u003c 50\n        It is an uncivilized approach, but these are not the most civilized of times.\n      *goto chap_2_endgame_bombard\n  #\"We'll feign retreat, then catch [i]Delmarva[/i] as she sails out.\"\n    $!{lieutenant} shoots Burroughs a dubious look, but says nothing. You have made your decision. Now all that remains is to execute it.\n    *goto chap_2_endgame_retreat\n\n*label chap_2_endgame_bombard\n\nThe next hours are spent in frantic preparation. The starboard guns wedged up to their highest possible elevation as their crews are briefed on what they must do. The rest of [i]Foraker[/i]'s company spend the afternoon shifting ballast in the hold, to induce an intentional list to port, to eke a few more precious degrees of elevation out of the starboard broadside.\n\nIn your cabin, you and your officers pore over charts of Trimountaine Harbor, trying to find the approach which will put you under the fire of as few enemy guns as possible.\n\nThen, the next morning, [i]Foraker[/i] tacks towards the open mouth of Trimountaine Harbor, runs out ${ship_pronoun_2} starboard guns, and brings them to bear on the unsuspecting city beyond.\n*page_break\n*temp retreat true\n*set patronage - 15\n*set bombard true\n[i]Foraker[/i]'s starboard broadside erupts in a cataclysm of smoke and flame and thunder, hurling blurry specks of black iron towards the crowded streets of Trimountaine. [i]Foraker[/i]'s guns are no howitzers or mortars. They cannot lob explosive shells or carcass shot, or any of the other traditional means by which a ship might rain fire and destruction upon a city.\n\nYet when the solid iron shot of your ship's broadside plough into the cobbled streets and punch holes through elegant houses of Trimountaine's harbor front, it is not to life or property that they do the most harm. \n\nThe screams start almost immediately. You can hear them, even a mile and a half away. The air fills with cries for help, the roar of crowds, and the ringing of bells from a hundred church steeples: the cacophony of a city which has suddenly realized it is under attack. For a moment, a second broadside blots out sound and image, but when the smoke clears again, the chaos is redoubled. \n\n*if sensibility >= 50\n  You can imagine the havoc which [i]Foraker[/i]'s guns must be wreaking now: the fear which must have been caused by such an attack, by the sight of familiar sights and faces being shattered to pieces by a storm of iron, all the visceral horror of a naval battle brought with violent suddenness upon a populace which had never seen the like before.\n*if sensibility \u003c 50\n  You suspect the physical effect of your fire is minimal. A few houses holed, perhaps a dozen killed, a few more wounded—less than fifty certainly. Yet the sudden shock of being thrust into the midst of such calamitous violence will do more than enough hurt to the nerves and spirit of the people of Trimountaine to suit your purposes.\n*page_break\n*if (c_sailing + gunnery) >= 100\n  You do not manage to get a third broadside off before eliciting a reply. Shouts of command in Columbian accents carry across the water as the garrisons of the harbor batteries spring into action. A puff of smoke issues from Fort Putnam's ramparts, then another, and another.\n  \n  Each shot arcs through the air, only to splash harmlessly a hundred yards to [i]Foraker[/i]'s stern. You order another broadside. The Columbians mustn't think that they can drive you away with shore guns alone. Fort Putnam does not stop firing, but neither do you. Their shot goes wide, but yours strike home time after time: a stationary target the size of Trimountaine is far easier to hit than a moving one the size of a frigate.\n  \n  Finally, you order [i]Foraker[/i] to wear away. You have made your challenge clear. Fort Putnam fires off one last defiant salvo, but its shot falls far short. As the sun begins to set, you leave the city of Trimountaine to repair its wreckage and bury its dead, with the grim unspoken promise that you shall return on the morrow.\n*if (c_sailing + gunnery) \u003c 100\n  *set c_str - 5\n  *set c_morale %-10\n  You do not manage to get a third broadside off before the Columbians deliver a reply. Trimountaine's shore batteries erupt in smoke, and it soon becomes clear that you have either overestimated your own distance from your foes or underestimated the skill of Fort Putnam's gun crews. The first salvo slashes into the water not a dozen yards short of [i]Foraker[/i]'s stern. The deck buckles under you as the second strikes home, punching through your frigate's oaken hide like a bayonet through a sheet of paper. \n  \n  The air fills with screams of agony as splinters the size of broadswords scythe through the packed deck below you. The surgeon will be busy today. Some of your ${gender} begin to lose heart, but you dare not order the retreat. You mustn't let the enemy know that you will be scared away by fortress guns. You fire off a few more broadsides—and allow [i]Foraker[/i] to stagger under yet another hit—before ordering [i]Foraker[/i] to wear away to leave Trimountaine to repair its wreckage and bury its dead.\n  \n  And for you to do the same.\n*comment endif\n*page_break\nThe next day, you order a repeat showing. Yet [i]Foraker[/i] is still far out of range when a shout from the tops sends you reaching for your glass.\n*goto chap_2_end\n\n*label chap_2_endgame_retreat\n*set retreat true\nYou order [i]Foraker[/i] to wear away and head for the open ocean, feigning retreat. In fact, to most of the crew, it seems as if you are retreating. There are some that scratch their heads, but few raise questions. After all, it is not uncommon for Royal Navy captains at sea to receive sealed orders which command them to do the improbable, or even the nonsensical.\n\nSo, the crew keep mum as you sail out of Trimountaine Bay, as you and\n*if gender = \"men\"\n  Master Burroughs\n*if gender = \"women\"\n  Mistress Burroughs\npick out a likely place to lay in ambush.\n\n*if ((100 - gallantry) + c_sailing) > 100\n  At first, you consider a secluded cove just a few miles north of Trimountaine Harbor. Yet you quickly realize that although such a place may be hidden from view by sea, it is easily visible from land. Instead, you settle for a more imperfect anchorage, behind a rocky island some distance to the east.\n  \n  Your hiding place set, you have Burroughs warp [i]Foraker[/i] into position: a process which involves using a boat to drop the ship's anchor ahead of the bow, and then painstakingly hauling the ship up to it, like a gigantic grapnel. The whole procedure takes half a day of hard, sweaty work, but when it is done, there is naught to do but to lie low, and wait.\n  *page_break\n  *set date + 1\n  For a night and a day, [i]Foraker[/i] lies concealed from all prying eyes. You keep a full complement of lookouts on the tops of the rigging, peering beyond the rocky walls of your hiding place towards the protected harbor of Trimountaine.\n  \n  For a day and a night, nothing seems to happen. The Columbian frigates seem as still as they had always been. You begin to wonder if you have made a mistake, if you have perhaps underestimated your adversary's caution, or ${pronoun_2} cunning.\n  *page_break\n  Then, a shout from the tops sends you racing for the quarterdeck, with your glass in hand.\n  *goto chap_2_end\n*else\n  You end up choosing a secluded cove just a few miles away from Trimountaine Harbor. Once hidden behind outcroppings of rock and stands of pine, you furl your sails, drop your anchor and wait.\n  *page_break\n  *set date + 5\n  And wait, and wait…\n  \n  For five days, you wait inside that cove, your lookouts watching for any sign that [i]Delmarva[/i] might be getting ready to set sail.\n  \n  Nothing. \n  \n  Perhaps you have concealed your ship imperfectly. Perhaps you have underestimated the Columbian captain's caution, or ${pronoun_2} cunning. \n  \n  Disappointed, you order [i]Foraker[/i] to return to ${ship_pronoun_2} prior station in Trimountaine Bay. \n  *page_break\n  *if (date >= 65) or ((cordial_escape = \"true\") and (date >= 55))\n    Yet as you round the headland a shout from the tops sends you reaching for your glass.\n    *goto chap_2_end\n  *else\n    *set retreat false\n    If you mean to draw the [i]Delmarva[/i] out, you shall have to find some other means to do it.\n    *choice\n      #I should try offering the [i]Delmarva[/i]'s captain a formal challenge.\n        *if gallantry >= 50\n          Yes, enough trickery and skulking about. Better to announce one's intentions openly, like a champion of old challenging ${pronoun_2} opponent to battle. You can only hope your opposite number will appreciate the gesture enough to answer it.\n          *goto chap_2_endgame_challenge\n        *else\n          There is no guarantee that a personal appeal to your opposite number will work, but there is also no guarantee it won't. Better to take the honorable path first and be proven wrong than to disgrace oneself with harsh measures which might prove to be unnecessary in hindsight.\n          *goto chap_2_endgame_challenge\n      #I ought to force my opponent's hand by bombarding Trimountaine.\n        *if sensibility >= 50\n          It is far from the most civilized measure, but it will work. No captain of any navy worthy of the name would stand by and let an enemy bombard the houses and families of ${pronoun_2} country${gender} without answer, not if ${pronoun_1} had the means to stop it under ${pronoun_2} command.\n          \n          You are loath to prey upon the finer feelings of your opponent thus, but in war, such things must be necessary.\n          *goto chap_2_endgame_bombard\n        *else\n          The Columbians have always been something of a rabble, ruled by the sensibilities of the mob rather than reason. Now you plan to use this weakness against them. By bombarding Trimountaine itself, you shall rile the populace. They would all but demand that your opposite number put [i]Delmarva[/i] to sea and attempt to stop you.\n          *goto chap_2_endgame_bombard\n\n*label chap_2_endgame_challenge\n*set hist_note_1 1\n*temp challenge_repeat 0\n\nYou spend the next while alone at your writing desk, thinking of the best way to put the intent of your challenge to words. It only takes a moment's introspection to realize that doing so shall not be an easy task. The tone of your message shall have to be balanced perfectly if it is to have the desired effect on your opposite number: too formal and ${pronoun_1} may yet suspect a trap, too personal and ${pronoun_1} may think that you write as a form of mockery.\n\nNo, you shall have to choose your approach carefully, and match the tenor of your words as perfectly to your own manner of thought as possible, to ensure that anyone who reads it is convinced of your sincerity.\n*label chap_2_challenge_2\n*choice\n  *hide_reuse #I shall be chivalrous, and propose a duel of honor like the knights of old.\n    *set hist_note_1 2\n    It is in circumstances such as these where displays of dignity and mutual respect are best displayed. After all, if you are going to kill someone, it does little harm to be polite.\n    \n    You begin to write:\n    \n    [i]To the Captain of the URS Delmarva, currently docked in Trimountaine Harbor,[/i]\n    *line_break\n    [i]As the Delmarva appears now ready for sea, I request you will do me the favor to meet the Foraker with ${ship_pronoun_3}, ship to ship, to try the fortune of our respective flags…[/i]\n    \n    *if ((gallantry >= 50) and (sensibility >= 50))\n      You go on to describe in detail the particulars of [i]Foraker[/i]'s armament and crew in the interest of full candor, while assuring your counterpart that it is a matter of duty and honor which compels you to draft this challenge, not personal vanity. The words come easy to you, and before long, you have written all that you have needed to write.\n    *if ((gallantry \u003c 50) or (sensibility \u003c 50))\n      You try to word your challenge with as much ceremony and romanticism as you can, but the words do not come easy to you. This is not the sort of message which you are used to drafting, and every word you choose seems to be the wrong one. After an hour of struggle, you print out a few stilted sentences, and decide to put an end to it.\n    *comment endif\n    \n    [i]…Favor me with a speedy reply. We are short of provisions and water, and cannot stay long here.[i]\n    *line_break\n    [i]I remain, your obedient servant,[/i]\n    *line_break\n    [i]Captain $!{name}, RN. HMS Foraker[/i]\n    \n    *if challenge_repeat = 0\n      You seal the letter and arrange it to be sent ashore by boat under flag of truce. Now all you can do is wait for a reply.\n    *if challenge_repeat >= 1\n      Again, you seal the letter, and arrange it to be sent ashore. Perhaps this approach will achieve a better result.\n    *page_break\n    *if ((gallantry >= 50) and (sensibility >= 50))\n      *goto chap_2_challenge_success\n    *else\n      *goto chap_2_challenge_failure\n  *hide_reuse #I must be gallant, but condescending enough to bait ${pronoun_3} into rashness.\n    It is not the most forthright of approaches, but you have often learned that guilelessness in war time is more vice than virtue. If a little bit of subtle goading is what you must engage in to ensure your enemy does as you wish, then so be it.\n    \n    You begin to write:\n    \n    [i]To the Captain of the URS Delmarva, currently docked in Trimountaine Harbor,[/i]\n    *line_break\n    [i]I must begin by assuring you that this letter
