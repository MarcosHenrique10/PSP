ave lost four days. \n    \n    You can only hope the delay does not prove fatal.\n    *return\n  #\"Furl all sail: we'll ride the storm out at sea.\"\n    *set date + 2\n    Burroughs looks askance at your orders, but ${pronoun_1} passes them on regardless.\n    \n    Over the next few hours, the sails are furled, sea anchors are dropped, cables are double-checked, the hatches are battened down, and [i]Foraker[/i] is positioned into the wind as the seas rise and the skies darken.\n    *page_break\n    The next day, the storm hits with all its fury. \n    \n    *if c_sailing >= 45\n      Yet ship and company weather the onslaught admirably. The rain lashes impotently against [i]Foraker[/i]'s oaken planks. The howling winds find no purchase on ${ship_pronoun_2} bare masts. With steadfast courage and consummate skill, your crew keep the bows pointed into the waves, so that the hull might slice through them instead of being tossed by the high seas.\n      \n      For two days, the wind blusters and the seas roar, but on the third, the storm exhausts itself. [i]Foraker[/i] emerges from its contact with the elements all but unscathed, and you waste no time in ordering full sail.\n      \n      You have a great deal of lost time to make up for.\n      *return\n    *else\n      *set date + 3\n      *set c_morale %-5\n      Things go well at first. The rain has little effect on [i]Foraker[/i]'s thick oaken skin, and the winds can find little purchase against ${ship_pronoun_2} bare masts. Yet as the storm rages on, the ship slowly, inevitably begins to slew to larboard. Despite the best efforts of your crew, the waves are soon smashing broadside against the hull, instead of being sliced through by the bows. Gunports splinter and shrouds snap under the force of the furious sea.\n      \n      When the storm finally blows itself out two days later, you take the ship's boat to survey the damage.\n      \n      It isn't good.\n      \n      In the end it takes three days of repairs to put the ship to rights. The crew's spirits sag as they are compelled to undo the damage wrought by a capricious and callous sea, with the fresh reminder that the works of ${gender_2} are ill proof against the wrath of God.\n      \n      As soon as it is practicable, you order the ship to resume its course, crowding every yard of sail you can. This storm has delayed you far too long, and you must make up for lost time.\n      *return\n  #\"I fear not this storm: we will use its winds to speed our way.\"\n    *set gallantry %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    Burroughs replies with a look of uncertainty. \"Are you sure, ${pronoun_5}?\"\n    \n    \"I am certain,\" you insist. \"Caution is well and good when the world is at peace, but we've our duty to think about today. We cannot allow even nature itself to get in the way of that.\"\n    \n    Your Sailing $!{master} protests no further. Instead, ${pronoun_1} throws ${pronoun_3}self into preparing [i]Foraker[/i] for what is to come as the seas rise and the skies grow darker.\n    *page_break\n    The next day, the storm hits.\n    \n    *if (c_sailing >= 65) and (sailing >= 65)\n      *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      It is no small matter to harness a tempest. Any ordinary ship might have met with misfortune, or even disaster in the undertaking of such a risky enterprise.\n      \n      But [i]Foraker[/i] is no ordinary ship.\n      \n      The sea brings all of its wrath, and you are there to meet it. Through the howling height of the storm, you stand tall on the quarterdeck. With expert precision, you ride the waves, calling out orders to the top${gender} on the masts, who furl and trim and set sails with no regard to rain or wind. For two days, the elements do their best to break you.\n      \n      But it is the storm which breaks first.\n      \n      [i]Foraker[/i] makes it out of the storm with ${ship_pronoun_2} hull unscathed and ${ship_pronoun_2} company jubilant in victory and filled with a new respect for your skills, for the sea is no less dangerous an enemy than the Gaulish or the Columbians.\n      \n      And it takes an extraordinary crew led by an extraordinary captain to take on the storm, and win.\n      *return\n    *elseif (c_sailing >= 65) or (sailing >= 65)\n      *set date + 3\n      *if c_sailing >= 65\n        The sea brings all of its wrath, and you are there to meet it. Through the howling height of the storm, you stand tall on the quarterdeck, trying to call out the orders to the top${gender} clinging to the masts that will keep the ship riding before the wind.\n      \n        It is tiring work, and the storm does not tire before you do. A moment of inattention, a wrong judgment in a split second. That is all it takes for the wind to carry away the main topgallant, and the top section of the mainmast with it. \n      *if sailing >= 65\n        The sea brings all of its wrath, and you are there to meet it. Through the howling height of the storm, you stand tall on the quarterdeck, calling out the necessary orders to keep the ship riding before the winds.\n      \n        Your crew move to fulfill your orders as fast as they can, but on the second day of the storm, they prove not fast enough. A sudden gust of wind rips the main topgallant free, and takes the fore topgallant with it along with shrouds, cables, and the top section of the mainmast.\n      *comment endif\n      \n      It takes three days to repair the damage and put [i]Foraker[/i] back to rights once the storm finally blows itself out. The crew do the work without rancor. In fact, they almost seem grateful as they hoist up replacement spars and sails.\n      \n      After all, it could have been far, far worse.\n      *return\n    *else\n      *set date + 6\n      *set c_morale %-10\n      *set c_str - 2\n      You are there to meet it, standing in the howling wind, shouting orders to the top${gender} you have placed in the masts in hopes of keeping [i]Foraker[/i] before the wind.\n      \n      Alas, neither you, or your crew are quick enough. Your plan quickly turns into a confusion of over-hasty decisions, lost orders, and a crew which simply cannot respond as fast as you need them to. [i]Foraker[/i] is tossed from wave-top to wave-top. Shrouds snap, cables tangle, and the sails beat themselves to shreds.\n      \n      After two days, the storm finally abates. Your topgallants and royals are gone, as are the top section of your foremast, several spars, and half a dozen of your best top${gender}, all carried away by the storm.\n      \n      It takes nearly a week to set the ship to rights. The crew labor in a cold sulk, cursing your folly all the while as they repair the damage nature has wrought. \n      \n      When [i]Foraker[/i] is at long last ready to get underway again, you order full sail. You do not have any more time to lose.\n      *return\n\n*label gosub_event_slaves\n*page_break\nHad things been any different, your prize would have gotten away. $!{ship_pronoun_2} was a barkentine, fast and sleek. Had the wind been in ${ship_pronoun_2} quarter, ${ship_pronoun_1} would have easily outpaced you.\n\nYet you were fortunate, having encountered ${ship_pronoun_3} just as [i]Foraker[/i] rounded a sharp headland in such a way that the Columbian found ${ship_pronoun_3}self squarely before your starboard broadside. The very sight of an Albionian frigate, even one with ${ship_pronoun_2} gunports closed, was more than enough to convince the Columbian to strike and heave to. You order your own ship closer and have a boarding party assembled.\n\n\"$!{pronoun_4} Bannister!\" you shout. \"Hail that bark and find out what ${ship_pronoun_1} is carrying.\"\n\n\"I do not think there is a need, ${pronoun_5},\" Bannister replies. \"The stench gives it away.\"\n\n\"Does it?\" you ask. You can smell nothing as of yet, but it seems your second lieutenant's nose is better than yours.\n\nBannister's expression screws itself up into a mask of disgust so profound that you do not think you have ever seen the like before.\n\n\"Slaves.\"\n*page_break\nDamnation.\n\nThe trade of slaves is illegal by Albionian law. It should be illegal by Columbian law too, though the slavers of Southern Columbia and the Rum Islands have not been unknown to find loopholes. More distressing to your own interests is the fact that because slaves are an illegal cargo to transport, they cannot be sold for prize money. Only the vessel itself may thus be sold off, likely for a pittance.\n\nBannister, standing beside you, is subject to a far less self-interested form of distress. $!{pronoun_1} served on the Royal Navy's anti-slavery patrol before ${pronoun_1} had been posted to [i]Foraker[/i], and ${pronoun_1} glowers at the vessel before you as if ${ship_pronoun_1} were a personal nemesis.\n*temp slave_outrage false\n*fake_choice\n  #Close in, the ship ${ship_pronoun_3}self must still be worth something.\n    You swallow your frustration as [i]Foraker[/i] closes in. Even if the slaves are contraband, you might make some small profit from the ship ${ship_pronoun_3}self.\n    \n    It may be illegal to sell human beings, but the timber and canvas and tar that carries them might yet be worth the trouble.\n  #Close in! We must do something for those poor people shackled in the hold!\n    *set slave_outrage true\n    [i]Foraker[/i] closes the distance with what feels like painful sluggishness, even as you feel your own sense of outrage building up within you.\n  \n    You have heard the stories of how slaves are treated, almost every ${gender} in Albion has. If you have the chance today to free your fellow human beings from the degradation and cruelty of a lifetime of servitude, then what choice have you but to seize it?\n  #Break off: this is a problem for the anti-slavery patrol.\n    You turn to your sailing ${master}. \n    \n    \"$!{pronoun_4} Burroughs! Wear ship, and take us out to sea. Have $!{pronoun_4} Markham take down that bark's name and description as best ${pronoun_1} can.\"\n    \n    Bannister turns to you, outrage bubbling to the surface. \"$!{pronoun_5}!\" $!{pronoun_1} protests. \"Those people—\"\n    \n    \"They will be brought to justice,\" you reply,\n    *if sensibility >= 50\n      teeth grit.\n    *if sensibility \u003c 50\n      doing your best to keep the heat from your voice.\n    \"But we are not the ${gender} to do it. A legal prize with an illegal cargo is more trouble than ${ship_pronoun_1} is worth.\n    \n    Your second lieutenant's eyes narrow. \"If not us, then whom?\"\n    \n    \"I trust you still have contacts from your prior service in the anti-slavery squadron?\" you ask, not even waiting the instant it takes for Bannister to nod before pressing on. \"We shall soon have that vessel's name and description. I shall trust you to deliver this intelligence to those who would make best use of it at soonest convenience.\"\n    \n    A little of Bannister's anger fades as ${pronoun_1} catches your meaning. The Royal Navy's anti-slavery patrol rarely ranges out this close to the Columbian coast, but for the possibility of catching a slave ship red-handed, they may just make an exception. If they manage to catch ${ship_pronoun_3}, they will be far better equipped than you to ensure that the slaver's human cargo do not find themselves shackled again.\n    \n    The Columbian bark carries on as [i]Foraker[/i] breaks off, but with luck and a bit of initiative on the part of your fellow Royal Navy officers, that slaver will not escape justice for long. \n    *return\n*page_break\nYou are still well out of musket shot when a strong and thoroughly horrid stench reaches your nostrils. It is a combination of sour sweat, stale excrement, putrid blood and dried pus: all the stinks of a battle's aftermath, rendered a hundred times more concentrated.\n\nYou look to your second lieutenant. \"Is that—\"\n\nBannister nods without turning, ${pronoun_2} eyes fixed upon the Columbian bark as if it were an old and hated enemy.\n\nTight-lipped and scowling, ${pronoun_1} follows you across to the slaver, knuckles clenched white against the hilt of ${pronoun_2} sword.\n*page_break\nThe bark is the [i]Amelia[/i], out of Henryville, and ${ship_pronoun_1} is indeed a slave ship, as the first mate readily admits in a flat, Dewarre's Land accent.\n\n\"The import of slaves is illegal, sure, but I'm just movin'em from one part of these United Republics to another!\" ${pronoun_1} protests. \"That's perfectly legal!\"\n\nAnd so it is by the letter of the law, though Bannister is less than mollified.\n\n\"With all due respect, ${pronoun_5}, I would suggest we let every one of those poor wretches below decks free this instant,\" ${pronoun_1} seethes as the two of you form a miniature council of war, \"and then set them upon their captors with cutlasses and pistols.\"\n*fake_choice\n  #\"As would I, were it not against the laws of humanity.\"\n    *set sensibility %+10\n    *set gallantry %+10\n    \"Laws of humanity?\" Bannister hisses incredulously. \"You can smell the stink from up here, ${pronoun_5}, but to see the conditions which hundreds of our fellow ${gender} are consigned to beneath our very feet, that is another thing entirely. To feel the heat of three hundred bodies shackled and packed in a hold barely fit for fifty; to hear the lamentations of those who have been torn from their families and homes, in tongues which will be beaten out of them by their overseers; to touch the sweat-soaked bodies of those killed by disease or thirst or sheer despair, left shackled to their fellows—\"\n    \n    Your second lieutenant takes a deep, shuddering breath. When ${pronoun_1} speaks again, it is with all the baleful finality of a hanging judge. \"The monsters who sail this ship have no respect for the Laws of Humanity, and ought to be given no protection by them.\"\n  #\"What they've done is legal. Disgusting, but legal. We owe them fair treatment.\"\n    *set sensibility %-10\n    *set gallantry %+10\n    \"Fair treatment?\" Bannister hisses incredulously. \"That is exactly what I would intend to deliver to these foul creatures. They who have ripped their fellow ${gender} from their families, who have packed them in cargo holds where they barely have the room to breathe, who have consigned them to heat, disease and despair. They who would deliver human beings to an auction block so that they may be condemned to joyless toil and violent servitude unto death.\"\n    \n    Your second lieutenant fixes the crew of the slaver with a darkest look you have ever seen ${pronoun_3} deliver. \"I would give them the same treatment they have rendered unto others. No judge on Earth could not reckon that unfair.\"\n  #\"By God, Lieutenant! That is murder!\"\n    *set sensibility %+10\n    *set gallantry %-10\n    \"And what is it to tear someone away from their family?\" Bannister hisses back. \"What is it to pack them with three hundred others in a space that fits fifty, to leave them to disease and thirst and despair? What is it to degrade them to the rank of cattle or oxen? To cut away their humanity? To flog them until they work and work them until they die, without pay or security or any purpose save mere commerce?\" \n    \n    $!{pronoun_1} fixes the crew of the slaver with a most baleful look. \"What is that then, if not murder?\"\n  #\"I suppose the Admiralty would object.\"\n    *set sensibility %-10\n    *set gallantry %-10\n    \"Perhaps they would,\" Bannister admits, \"but not if they could see for themselves. Not if they could feel the heat of three hundred bodies shackled and packed in a hold barely fit for fifty; or hear the lamentations of those who have been torn from their families and homes, in tongues which will be beaten out of them by their overseers; or touch the sweat-soaked bodies of those killed by disease or thirst or sheer despair, left shackled to their fellows—\"\n    \n    $!{pronoun_2} voice becomes flat, hard, and laden with barely checked fury. \"The Admiralty happily makes war upon Columbia for offending our interests. They make war on Gaul for offending our system of governance. Why should it not make war on those who offend all of humanity?\"\n*set gosub_index 200\n*gosub_scene gosub\n*page_break\n\"Ah, pardon me, \n*if gender = \"men\"\n  gentlemen,\"\n*if gender = \"women\"\n  ladies,\"\na voice calls out from the other side of the deck. The two of you turn to see a plump, middle-aged figure in straw hat and broadcloth approaching from the forecastle. \"Captain Beauregard, of the [i]Amelia[/i], a pleasure to make your acquaintance.\" Beauregard extends ${pronoun_2} hand. Bannister pointedly refuses it, turns on ${pronoun_2} heel, and walks away. \n\n\"Not fond of my kind of work, hmm?\" the slaver captain muses lightly, apparently unfazed by the snub. \"To be honest, I don't like ${pronoun_2} type none neither. That's why I'd prefer to deal with folk such as you.\" $!{pronoun_1} leans in. \"Now, I've got a hundred and fifty thousand dollars worth of cargo in the hold. If you take my ship as a prize, you won't see a penny of it, but if you let us go, I'll make a note of it. I've got friends in Chesterport, and this war ain't going to last forever. When things settle down, I'll send a note to your prize agent for, shall we say…a tenth?\"\n\nBeauregard reaches into ${pronoun_2} pocket and pulls out a folded piece of paper. \"Hell, I'll even put that promise in writing!\"\n\nA hundred and fifty thousand Columbian dollars. More than forty thousand Albionian pounds. Even a tenth of it would be equivalent to a rich prize indeed, but to the hundreds of souls under your feet, it would mean an eternity of suffering. How much gold would their lives be worth?\n*temp bannister false\n*label gosub_event_slaves_2\n*choice\n  *if slave_outrage = false\n    #\"Very well. We shall do things your way.\"\n      *set sensibility %-15\n      *set gallantry %-15\n      *set c_str - 2\n      *set c_morale %-10\n      *set slave_deal true\n      *set prize_money + 4000\n      *set gosub_index 200\n      *gosub_scene gosub\n      *check_achievements\n      *if not(choice_achieved_slavers)\n        *achieve slavers\n      \"Well ain't that something!\" Beauregard exclaims happily. \"Turns out even you duty-bound Royal Navy types have a price!\"\n    \n      Quietly, the two of you hatch a plan,\n      *if bannister = true\n        as Bannister stands to one side in stony silence:\n      *if bannister = false\n        keeping as far away from your other officers as possible:\n      you will put on a prize party and Beauregard will make all the show of having been taken. Then, at an opportune moment, the prize crew will relinquish command back to the Columbians, and allow them to sail on their way.\n    \n      Your plan concluded, you carefully pick out half a dozen of the most loyal ${gender} in [i]Foraker[/i]'s company, and inform them of your arrangement. A few of them protest, but after you offer them each triple their normal share of the prize money, they quickly find ways to enthuse themselves.\n    \n      With matters concluded, you return to the [i]Foraker[/i], and send the [i]Amelia[/i] on ${ship_pronoun_2} merry way.\n      *page_break\n      *if bannister = true\n        Lieutenant Bannister is, perhaps understandably, absolutely livid. \n      *if bannister = false\n        Lieutenant Bannister recognizes your plot immediately, if the absolutely livid expression that spreads over ${pronoun_2} face the moment the [i]Amelia[/i] slips away is any indication.\n      You have the feeling that only discipline and propriety prevent ${pronoun_3} from giving full vent to ${pronoun_2} feelings on the matter which you have just concluded, and it is likely only the matter of your superior rank which prevents ${pronoun_3} from calling you out over it.\n    \n      Bannister's disaffection spreads to your other officers too, almost as quickly as rumors of what you have done does. None of your lieutenants are comfortable with the bargain you have struck, and even Captain Mercer, whose family you know to have extensive holdings in the Rum Islands, looks more than a little discomfited.\n    \n      Still, there is little you can change about it now. What's done is done. Should the consequences of your action come to haunt you later, then they shall be able to wait until [i]Foraker[/i]'s current assignment is completed.\n      *return.\n  #\"I am afraid I must do my duty, Captain.\"\n    *set sensibility %-10\n    *set gosub_index 200\n    *gosub_scene gosub\n    *set c_str - 4\n    \"But…I—\" Beauregard sputters. \"You can't do this, Captain! You'll ruin me!\"\n    \n    *if bannister = true\n      \"Good,\" Bannister replies coldly.\n    *if bannister = false\n      \"I am afraid war ruins many ${gender},\" you reply dispassionately.\n    *label gosub_event_slaves_3\n    \n    And that is the end of any discussion on the matter.\n    *page_break\n    You put a prize crew on the Columbian slaver, and when the crew protests, you\n    *if sensibility >= 50\n      have them clapped in irons with no small amount of relish.\n    *if sensibility \u003c 50\n      have them clapped in irons.\n    *comment endif\n    \n    The matter concluded, your newly captured prize and ${ship_pronoun_2} unwilling cargo are sent towards Ismay, where if all goes well, the ship will be condemned as a prize and ${ship_pronoun_2} human cargo will be set free. [i]Foraker[/i] continues on ${ship_pronoun_2} way.\n    \n    As the slaver ship slips over the horizon, you breathe easier, knowing that you have done the right thing.\n    \n    You hope.\n    *return\n  #\"You may take your offer, and kindly go with it to hell.\"\n    *set sensibility %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    *set c_str - 4\n    \"But…I—\" Beauregard sputters. \"You can't do this, Captain! You'll ruin me!\"\n    \n    *if bannister = true\n      \"Good,\" Bannister replies coldly.\n    *if bannister = false\n      \"I can only hope it does,\" you reply coldly.\n    *goto gosub_event_slaves_3\n  *if bannister = true\n    #\"Your ship is now contraband. Your slaves will go free. And you will go to the devil.\"\n      *set c_str - 4\n      *set gallantry %+15\n      *set sensibility %+15\n      *set patronage %-15\n      *set gosub_index 200\n      *gosub_scene gosub\n      *set slave_release true\n      Bannister's expression resolves into a cold grin. Beauregard, on the other hand, all but loses ${pronoun_2} capacity for speech.\n    \n      \"But…You—\" ${pronoun_1} sputters. \"By God, Captain! You'll ruin me!\"\n    \n      \"Good,\" Bannister replies coldly.\n      \n      And you let your second lieutenant's simple answer suffice for you as well.\n      *page_break\n      You carefully brief the prize crew you put on the [i]Amelia[/i], instructing them to free the slaves from their shackles when practicable and to let them off in New Lancaster under a flag of truce. When the Columbians object to your plan, you eagerly take the opportunity to have them clapped in irons and put in the same stinking hold as their former cargo. \n      \n      \"I don't suppose the Admiralty will much like this,\" Bannister comments as the two of you transfer back to the [i]Foraker[/i].\n      \n      No, they more than likely will not. In seizing the [i]Amelia[/i]'s cargo for your own ends and out of bounds of prize law, you have effectively committed a war crime. There will likely be a court-martial when you return to Albion, though given the current sensibility against slavery back home, it is doubtful you will be punished severely for such a relatively minor breach.\n      \n      A commotion arises from the [i]Amelia[/i]'s deck as the first of the newly-liberated slaves emerge from the hold and take in the sunlight which had been so cruelly denied to them for so long. They hobble out, emaciated and stooped, their wrists blistered by shackles and their posture warped by their long, cruel confinement. Some cheer, others weep, Others simply stare out into the great blue sky, their expressions wide and joyous, luxuriating in the knowledge that they are at last, free.\n      \n      Bannister looks on, a faint smile on ${pronoun_2} lips. \"But even if the Admiralty objects on principle, they shall have to admit that you have done the right thing.\"\n      \n      You nod agreement, taking in the scene. \n      \n      Yet in the end, you can only hope.\n      *return\n  *hide_reuse #\"I must consult with my officers.\"\n    *set bannister true\n    \"Is that really necessary?\" Beauregard asks. \"What wrong with keeping things discreet?\"\n    \n    \"My entire company stands to benefit from the prize money,\" you explain, \"therefore my officers, at the very least, must be informed.\"\n    \n    Curiosity sated, the Columbian captain nods, apparently happy to accept your excuses.\n    *page_break\n    Bannister, naturally, proves less than receptive to the idea.\n    \n    \"Even more reason to take the ship as a prize,\" ${pronoun_1} fumes. \"To have the effrontery to try and bribe us to allow ${pronoun_3} to continue ${pronoun_2} abominable trade! Why, we ought to tow that wretched hulk back to Ismay and let those poor slaves free right on the docks!\"\n    \n    \"And then what?\" Captain Mercer asks. \"Slave trading may not be legal in Albion's colonies, but slavery still is. The Rum Islands run on it. What guarantee have we that those slaves will not be re-enslaved the moment they leave the docks?\"\n    \n    \"Slavery is legal by Columbian law, but some of its constituent republics have banned it outright,\" Bannister answers. \"If we sent them ashore in New Lancaster, or Bangor, they would be free${gender} the moment their feet touched the ground.\"\n    \n    Your other officers nod. Nobody seems fond of the idea of cutting a deal with a slaver, but then again, they have far less to gain than you. \n    \n    Yet as you return to the Columbian captain with Lieutenant Bannister in tow, your thoughts crystallize into decision.\n    \n    \"Well?\" Beauregard asks. \"Do we have a deal? Or don't we?\"\n    *goto gosub_event_slaves_2\n\n*label gosub_event_overboard\n*page_break\nThe next day, as you are making your rounds, you hear a sudden commotion from above. A dark shape tumbles from the spars and into the sea with a heavy splash.\n\n\"$!{gender_2} overboard!\" someone shouts. \"$!{gender_2} overboard to larboard!\"\n*comment endif\n\nAs officer of the watch, Bannister scrambles to the side rail a moment before you do. \"Damnation!\" ${pronoun_1} snarls as ${pronoun_1} recognizes the fallen figure. \"Of all the luck! It is Whitlock!\"\n\nYou cannot help but turn to the Second Lieutenant in surprise. \"You know ${pronoun_3}, $!{pronoun_4} Bannister?\"\n\n\"Twelve fore top${gender} on the larboard watch, and Whitlock is the only one who can carry a tune,\" the other officer growls, before letting his shoulders sag. \"Morale will be hard hit, though there is nothing we can do now.\"\n\nBannister has a point. The captains of 38-gun frigates are not in the habit of turning their ship about to rescue single lost top${gender}, no matter how popular they may be. Yet the seas are not too rough. Whitlock might yet keep ${pronoun_2} head above water for long enough to be rescued.\n\nBut surely, you cannot delay an entire {ship_gender} of war on the $!{monarch}'s urgent business for the sake of a single life. Can you?\n*choice\n  #\"No, there is nothing we can do now.\"\n    *set c_morale %-5\n    Bannister nods in grim approval. [i]Foraker[/i] is under orders, and it would not do to shirk them, even when someone's life is at stake.\n    \n    From the masts, Whitlock's companions watch in dismay as their castaway friend disappears into the distance and is finally swallowed by the waves.\n    \n    [i]Foraker[/i] sails on.\n    *return\n  #\"Furl all sail! Prepare the longboat! We go to Whitlock's rescue.\"\n    *set date + 1\n    *set c_morale %+5\n    *set gosub_index 200\n    *gosub_scene gosub\n    Bannister shoots you a dubious look, but carries out your orders regardless. After all, you are still the captain, and [i]Foraker[/i] is still your ship.\n    \n    The ship slows as the sails are furled and the longboat is set into the water with a dozen ratings at the oars. Slowly, they beat towards the castaway top${gender} as you and your second lieutenant look on from the quarterdeck.\n    \n    Then, after what seems like far too long, the Petty Officer at the head of the impromptu rescue operation throws Whitlock a line and pulls ${pronoun_3} aboard ${pronoun_2} tiny craft.\n    \n    The crew of the longboat returns with a soaked and shivering Whitlock to the cheers of the ship's company. Your top${gender} has been saved, but you have lost the better part of a day in the doing of it.\n    \n    *if sensibility >= 60\n      The hard, professional part of you protests at the delay, but you know deep down inside that it was the right thing to do.\n    *if sensibility \u003c 60\n      You can only hope the delay does not cost more lives than it has saved.\n    *return\n  #\"Send the launch to rescue Whitlock, but keep us underway.\"\n    It is a risky endeavor which you mean to undertake. Bannister and $!{lieutenant} furrow their brows in worry, but Burroughs assures you it can be done: with a good crew, the ship's launch could rescue Whitlock, then use ${ship_pronoun_2} oars and miniature sails to catch up to the [i]Foraker[/i]. \n    \n    You order it done, and quickly. Your cast-off top${gender_2}, like most sailors, cannot swim, and if you delay too long the issue shall become moot.\n    \n    Within minutes, a dozen [i]Forakers[/i] are driving the launch towards Whitlock under the direction of $!{pronoun_4} Iris, [i]Foraker[/i]'s senior midship${gender_2}\n    \n    Within another five minutes, they are fishing Whitlock out of the water to the cheers of the watching crew.\n    \n    But [i]Foraker[/i] is half a mile away now. The launch has retrieved the missing top${gender}, but now it must rescue itself.\n    *page_break\n    For the rest of the day, [i]Foraker[/i] continues on ${ship_pronoun_2} course. Worried eyes peer from the quarterdeck, watching the launch as it battles against the sea and your own ship's speed.\n    \n    *if c_sailing >= 65\n      *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      Then, at last, the launch gets close enough to take a line. Not a moment after Iris reports the line secure does [i]Foraker[/i]'s entire deck seem to tremble with the roar of \"Too-six! Heave!\" with what looks like a third of the crew hauling the line in.\n      \n      Iris, the launch crew, and Whitlock return to the ship amid the cheers of their fellows.\n      *if sensibility >= 60\n        \n        And the cheers of their superiors as well, you must admit.\n      *if sensibility \u003c 60\n        You give them a moment to revel in the high spirits, then order them back to work. [i]Foraker[/i] still has orders to fulfill.\n      *return\n    *else\n      *set c_morale %-5\n      *set c_str - 4\n      But it is a battle the launch steadily loses. Even with their best efforts, the dozen crew and their tiny sail cannot match [i]Foraker[/i]'s speed. With increasing dismay, you watch as the little boat slips further and further behind you.\n      \n      The crew of the little craft are not in much danger. The launch has enough biscuit and water for three days at least, the coast is close enough, and the Columbians have been known to be gallant enough to their prisoners, save for a tendency to gloat with some vulgarity. \n      \n      Yet the loss of the launch stings, and the loss of more than a dozen trained crew even more so. The crew's spirits sag from the loss.\n      \n      But there is nothing to be done about it now. [i]Foraker[/i] is under orders, and you must yet fulfill them.\n      *return\n\n*label gosub_event_deserters\nThe next morning, Captain Mercer knocks on your cabin door.\n\n\"Two of the waisters are missing, ${pronoun_5}. Their division heads tell me that they simply never showed up for duty,\" the captain of marines reports grimly. \"I've had their chests searched. Most of their clothes are still there, but personal effects and valuables are gone.\"\n\nIt's not hard to intuit what that means. \"They've deserted?\"\n\nMercer nods. \"It does appear so, ${pronoun_5}.\"\n\nYou suppose you shouldn't be surprised.\n*if c_morale >= 60\n  [i]Foraker[/i] may be happier than many ships in the service, but\n*if c_morale \u003c 60\n  Morale is not as good as it could be, and\nhard work, poor pay, and the ever-looming threat of harsh discipline can make the temptation of an unguarded and only nominally hostile coast a few hundred yards away too great to bear. The Columbians are well-known for harboring Royal Navy deserters, proud of it even. It was only a matter of time before someone thought to jump ship.\n\n\"There'll be more, of course,\" Mercer continues. \"Unless we put a stop to it.\"\n*choice\n  #\"Let them leave: the disaffected have no place in my crew.\"\n    *set c_morale %+10\n    *set c_str - 5\n    Mercer looks back at you quizzically. \"$!{pronoun_5}?\" Apparently that had not been the answer ${pronoun_1} had expected.\n    \n    *if gallantry >= 50\n      \"We are soon to go into battle, Captain,\" you explain. \"$!{gender} who cannot withstand the everyday hardship of serving aboard one of $!{pronoun_2} Majesty's ships at rest can only fail under the extraordinary hardship of serving aboard one of $!{pronoun_2} Majesty's ships in combat. Good riddance to bad rubbish, I say.\"\n    *if gallantry \u003c 50\n      \"Better they leave now than cause trouble at some later time,\" you explain. \"We may end up a little short-handed, but it is better to have a smaller, happier crew than one which is shot through with disorderly and dissenting elements.\"\n    *comment endif\n    \n    The marine officer thinks on that for a moment, then nods. \"Yes, you are probably right, ${pronoun_5}.\"\n    \n    You allow the desertions to continue. Over the next few days, more hands jump ship. Most are lands${gender}, but the strength of their arms will be missed.\n    \n    However, with many of the most disruptive and dissatisfied members of your crew gone, the mood of the whole company improves somewhat. Now that these evangelists of disaffection have been allowed to pass on to their promised land, those who remain begin to grow happier in their service.\n    \n    All the better, for you will need every one of them to do their utmost very soon.\n    *return\n  #\"Double the guard and patrol the deck: I want no more desertions.\"\n    *set c_morale %-5\n    \"Aye, ${pronoun_5}, a sensible precaution, ${pronoun_5}.\"\n    \n    By nightfall, the deck seems almost covered in scarlet coats, patrolling along the rails to ensure that nobody attempts to abscond under cover of darkness.\n    \n    The lobsters grumble, as they are apt to do any time when they are compelled to do anything, but still, they do their duty to the best of their ability, and the steady beat of their boots against the deck becomes a faint, but omni-present reminder to the crew against desertion.\n    \n    If anything, it is the rest of the ship's company which is most offended by the measure—not the sight of the marines themselves, but of the implication that they cannot be trusted to remain aboard ship even within sight of the enemy.\n    \n    Still, the desertions stop, and the complaints soon die down. A satisfactory outcome.\n    *return\n  #\"We must put the crew in a happier state to end these desertions.\"\n    It is not often that the captain of a $!{monarch}'s ship has the opportunity to attack a problem at its cause instead of its symptom, but such instances tend to be welcome nonetheless.\n    \n    \"Of course, ${pronoun_5},\" Mercer replies. \"What did you have in mind?\"\n    \n    *if leadership >= 65\n      *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      You give the matter a moment of thought before coming upon the best solution. \"Issue an extra ration of grog, but have it split over the next three days. It would not do to render the crew drunk. That will only cause further indiscipline.\"\n      \n      The marine officer touches ${pronoun_2} forehead in salute. \"Of course, ${pronoun_5}. I'll inform the purser, ${pronoun_5}.\"\n      \n      And thus, the matter is settled.\n      *page_break\n      The extra grog ration goes over exceptionally well. A third of a day's ration is enough of a boon to be noticed, but not enough to cause any problems. If anything, the ${gender} seem to appreciate it more for the fact that it is split over three days.\n      \n      Within a day, your crew seems happier and more enthusiastic in their duties. The salutary effect on morale lasts even after the last portion of the extra ration is ladled out, and the desertions stop completely.\n      *return\n    *else\n      *set c_morale %-10\n      *set c_str - 5\n      \"Issue an extra grog ration,\" you decide, resorting to the oldest and most reliable form of reward aboard ship. \"There is nothing like spirits to raise a crew's spirits, eh?\"\n      \n      The marine officer holds in a sigh as ${pronoun_1} touches ${pronoun_2} forehead in salute. \"Of course, ${pronoun_5}. I'll inform the purser, ${pronoun_5}.\"\n      \n      You close the matter rather pleased with yourself. Such measures are sure to restore morale.\n      *page_break\n      They do, for a time. The ${gender} rejoice in their extra spirit ration, but perhaps they rejoice a bit too much. The daily allotment of grog aboard a Royal Navy vessel is far from light as it is. Doubling that amount quickly renders a good portion of your crew insensible from drink. Shouting rises from below deck, fights break out. Mercer's marines—those sober enough to fall in—restore order with charged bayonets and the butts of their muskets.\n      \n      The harsh measures you are required to resort to undo any good the extra issue of grog might have fostered. Morale sinks further, the desertions continue.\n      \n      You cannot afford a blunder like this again.\n      *return\n\n*label gosub_event_smugglers\nLate the next night, you are wakened by a shout of alarm from the deck. By the time you pull on your boots, shrug on your jacket and step outside, a half dozen marines are already peering nervously at the shape of a small boat alongside [i]Foraker[/i]'s midships. As you watch, a pair of figures start climbing up the side, both of them carefully overlooked by loaded muskets and charged bayonets, despite their obvious civilian dress. \n\n\"They are Columbians from one of the nearby villages, ${pronoun_5},\" Captain Mercer reports. \"They say they are smugglers, that they have no quarrel with us, or $!{pronoun_2} Majesty's Forces, and that their sole aim is profit.\"\n\nWell, this ought to be interesting.\n*page_break\nSure enough, the two figures announce themselves as smugglers—\"independent merchants\" rather—looking to sell goods to your crew.\n\n\"Normally, we'd be goin' up to New Lothian to sell this stuff,\" one of them explains as ${pronoun_1} presents ${pronoun_3}self before you on deck. \"Can't do that now what with this blockade of yours—not that it were your fault. It's those dang Southerners in charge of the government who took us into this war, I never wanted no part of it—\"\n\nThe other Columbian nudges the first hard in the ribs. \"$!{pronoun_1} doesn't want to hear about that you idjit!\" ${pronoun_1} hisses.\n\nThe first smuggler straightens up. \"I—er, that is, we, have all sorts of wares your crew might want. Might help raise spirits 'round here. Certainly couldn't hurt. Say the word, we'll bring it all up for your ${gender} to take a gander.\" $!{pronoun_1} leans in, showing a gap-toothed, but earnest grin. \"Com'on Captain? What do ya say?\"\n*label gosub_event_smugglers_2\n*choice\n  #\"Very well, you may sell your wares to my crew.\"\n    *set gallantry %-10\n    *set patronage %-10\n    *set c_morale %+5\n    *set gosub_index 200\n    *gosub_scene gosub\n    The smugglers are exuberant beyond belief at your reply. Which means you get to see their expressions fall from excitement to disappointment as the sun rises, and only a few of the crew purchase any of their wares.\n    \n    Sailors are often strange creatures: profligates on shore, but parsimonious to an excessive degree while at sea. While many find the prospect of fresh fruit to be a tantalizing one, most seem to consider their pay better used for other purposes: the gin shops and bawdy-houses of Ismay and Chesterport, most likely.\n    \n    Thus, the smugglers depart the next afternoon, having made some profit, but nowhere near as much as they had expected. Likewise, a few of your ${gender} now seem better disposed, but nowhere near as many as you had hoped.\n    \n    Unfortunate, but such is the way of things at times.\n    *return\n  #\"I mean to purchase your wares on my crew's behalf, with my own funds.\"\n    *set gallantry %-10\n    *set prize_money - 250\n    *set c_morale %+15\n    *set patronage %-10\n    *set gosub_index 200\n    *gosub_scene gosub\n    The smugglers were not expecting that.\n    \n    It takes them a few moments to fully close their mouths, and a few moments more for your officers to compose themselves. You wake your steward and have ${pronoun_3} fetch your strongbox.\n    \n    The Columbians' prices are not cheap, as might be expected given the circumstances, and you end up spending a substantial fortune to purchase the whole of their cargo. You cannot imagine the Admiralty will be much pleased with your actions this night. While it is a common matter for captains to purchase additional foodstuffs or equipment for their crews, it is less regular for them to do so from the hands of smugglers who are, after all, criminals, regardless of political affiliation.\n    \n    On the other hand, your crew are very pleased by the sight of fresh fruit piled up on the deck, especially once they learn that its acquisition was by their captain's largess. Though you doubt such ${gender} would have been willing to spend their pay on such luxuries, the fact that you have paid on their behalf makes them more than happy to indulge in the mounds of juicy apples and pears now spread out before them.\n    \n    The Columbians depart satisfied, and your crew spend the day much enthused by their good fortune. You doubt they will forget your generosity any time soon.\n    *return\n  #\"I fear such an arrangement is impossible at the moment.\"\n    *set gallantry %-10\n    *set c_morale %-5\n    *set gosub_index 200\n    *gosub_scene gosub\n    The smugglers' faces fall in disappointment. \"Well that's a darn pity,\" one of them says. \"Perhaps some other time then,\"\n    \n    With that, the two Columbians climb down [i]Foraker[/i]'s side and depart in their little boat. As they fade into the darkness, you can hear the two of them bickering as they row, perhaps castigating each other over the failure of their venture.\n    \n    Some of your ${gender} will be disappointed too, you suspect, at least once the word gets around. But officers of the Royal Navy do not lower themselves to dealing with smugglers, at least not in an official capacity. \n    *if gallantry >= 50\n      As relatively harmless a crime as smuggling might seem, those ${gender} were still criminals, and it is only civility which kept you from ejecting them from your ship more forcefully.\n    *if gallantry \u003c 50\n      Perhaps if they had approached you more covertly, in a manner which would have not required you to record any interaction in your official logs, then something might have been arranged.\n    \n    As it stands though, there is nothing anyone can do about it now. You head back to your cabin, and go back to sleep.\n    *return\n  #\"I'll have no dealings with criminals! Captain Mercer! Remove these ${gender}!\"\n    *set gallantry %+10\n    *set c_morale %-5\n    *set gosub_index 200\n    *gosub_scene gosub\n    \"What? Wai—\"\n    \n    The smugglers stare at you goggle-eyed, but Captain Mercer doesn't. $!{pronoun_2} marines move into action instantly. With hard stares, and a few gentle proddings from the butts of their muskets, they herd the two Columbians back over the side.\n    \n    \"Gosh darn\n    *if gender = \"men\"\n      Jack Tars\n    *if gender = \"women\"\n      Jane Tars\n    with their gosh darn high and mighty—\" you hear one of them mutter as they climb down the side and shove off in their little boat.\n    \n    You are more than happy to see them go, though your men might not be once they hear what has happened tonight. Some of them do doubt would have welcomed the chance to buy a few comforts from solid land, but they would have also gotten into the custom of dealing with criminals. That is something you have no intention of allowing.\n    \n    The smuggler's craft disappears into the darkness. The matter settled, you go back to sleep.\n    *return\n  *hide_reuse #\"What sort of wares do you sell?\"\n    One of the smugglers shrugs. \"Coffee and spirits from the Rum Islands if we find those willing to sell. Cotton and iron if we ain't.\"\n    \n    \"We have no interest in cotton or iron,\" you reply truthfully. \n    \n    The other smuggler smiles. \"Thought as much. Not to worry my good Captain. We've brought more than that. We're both ${gender} of the sea, ain't we? We know how hard it can be, weeks away from shore, nothing to eat but salt beef and maggoty biscuit…\"\n    \n    For all of ${pronoun_2} effrontery, the Columbian has a point. The diet of a naval officer at sea is filling, but monotonous. For your ${gender} below decks, who do not have the advantage of personal stocks of coffee or wine, it can only be a rather worse predicament.\n    \n    The smuggler doesn't wait for a reply. $!{pronoun_1} reaches into ${pronoun_2} pocket and pulls out a glossy red sphere the size of your fist: a fresh apple, the first you'd seen in months. \n    \n    \"I've got three more sacks of these on my boat,\" the smuggler boasts. \"Another three sacks of pears, and even a bundle of fresh greens if any of you fine gentle${gender} want to make yourself a sallett. What do you say to that?\"\n    *goto gosub_event_smugglers_2\n  *hide_reuse #\"I must consult with my officers.\"\n    It takes you a while to extricate yourself from the smugglers and their coarse attempts to ingratiate themselves, but by the time you do, $!{lieutenant} is already on deck, along with $!{pronoun_4} Burroughs, and $!{pronoun_4} Prescott, the ship's purser. \n    \n    *if lieutenant = \"fisher\"\n      \"I don't like this, ${pronoun_5},\" Fisher growls as soon as you are all out of earshot of the two Columbians. \"I don't like this one damned bit. Common thieves coming to bow and scrape like this? Throw the whole dirty lot overboard, that's what I'd do. Admiralty'd probably agree.\"\n    *if lieutenant = \"simpson\"\n      \"Ah yes, the intrepid Columbian trader,\" Simpson sneers the second you are all out of earshot. \"I know the type. Utterly untrustworthy, unless they can make a profit off you, which means you can probably trust this pair implicitly if you mean to deal with them, not that the Admiralty will much approve, of course. They prefer to deal with grander crooks…like the exchequer.\"\n    *if lieutenant = \"shannon\"\n      \"They're thieves, ${pronoun_5}, and nothing more,\" Shannon concludes as soon as you are all out of earshot. \"Even if dealing with them would be to our advantage now, the Admiralty will certainly not like the idea of us dealing with…this sort of people.\"\n    *if lieutenant = \"pakenham\"\n      \"One would advise against it,\" Pakenham advises as soon as you are all out of earshot. \"Regardless of their stated opinions, they are still criminals, and citizens of an enemy power at that. The decision of whether one is to have any intercourse with such creatures is a matter for the Admiralty to decide, not we.\"\n    *comment endif\n    \n    \"I wouldn't know about that,\" Burroughs replies dubiously. \"They're offering a lot that the crew would love to get their hands on. To be honest, I wouldn't mind buying a bushel or two of fresh fruit too. It'll certainly raise spirits.\"\n    \n    Prescott hesitates a moment before speaking. As a mere warrant officer, ${pronoun_1} is the most junior figure present, but ${pronoun_1} presses on regardless. \"Begging your pardon, ${pronoun_5}, but I'm not sure how many of the crew could take advantage of that. Not a lot of the ${gender} have much in the way of money left over after they've spent their pay on rations. If you were to buy their stock of fruit and give them out to the crew as a reward for good service, would that not have more of an effect?\"\n    \n    The purser has a point, but then again, so do $!{lieutenant} and Burroughs. You consider the matter carefully, before returning to the smugglers with your decision:\n    *goto gosub_event_smugglers_2\n\n\n*label gosub_event_sick\n*temp sick\n*rand sick 1 2\nThat afternoon, you are strolling the quarterdeck when \n*if gender = \"men\"\n  Master Burroughs approaches you…with his wife in tow.\n*if gender = \"women\"\n  Mistress Burroughs approaches you…with her husband in tow.\n*comment endif\n\n\"$!{pronoun_5},\" ${pronoun_1} asks anxiously, \"might I speak to you about a private matter?\"\n\nYou look to your\n*if gender = \"men\"\n  sailing master, and then to the worried look on his wife's face. There are usually a few women aboard a man-of-war—wives of the crew for the most part—but they generally stay out of sight, occupying themselves with laundry and the care of their children. If the matter is enough to bring Mrs. Burroughs on deck, then it is a serious matter indeed.\n  \n  \"Our son is sick, sir,\" Mrs. Burroughs blurts out. \"He's very ill, and very weak. He needs his father with him.\"\n  \n  That's right. The Burroughs have a son, barely three years old. If he is indeed ill, then you cannot help but sympathize with his parents.\n  \n  \"I'd like to request a few days off duty,\" the sailing master continues, \"the surgeon says he might not last the week unless he sees a real doctor, but—\"\n  \n  You nod. [i]Foraker[/i]'s surgeon is trained to amputate limbs and cauterize wounds and not much else; a sawbones, not a true medical professional. The nearest real doctor is likely in Trimountaine. Given the lack, you can understand why Burroughs might want to be excused from duty: the days he requests with his son may be their last together.\n  \n  Still, Burroughs is [i]Foraker[/i]'s sailing master. Though his mates are fully capable of maintaining the ship adequately if he were to absent himself from duties for a few days, there is absolutely no doubt that neither ship nor crew will perform as well as it could under Burroughs's veteran hand.\n*if gender = \"women\"\n  sailing mistress, and then to the worried look on her husband's face. There are usually a few men aboard a lady-of-war—husbands of the crew for the most part—but they generally keep to themselves below decks, occupying themselves with laundry and the care of their children. If the matter is dire enough to bring Mr. Burroughs on deck, then it must be serious indeed.\n  \n  \"Our daughter is sick, ma'am,\" Mr. Burroughs blurts out. \"She's ill, damn ill, and very weak. She—she needs her mother.\"\n  \n  That's right. The Burroughs have a daughter, barely three years old. If she is indeed ill, then you cannot help but sympathize with her parents.\n  \n  \"I'd like to request a few days off duty,\" the sailing mistress continues, \"the surgeon says she might not last the week unless she sees a real doctor, but—\"\n  \n  You nod. [i]Foraker[/i]'s surgeon is trained to lop off infected limbs and little else; a sawbones, not a real medical professional. The nearest true doctor is likely in Trimountaine. Given the lack, you can understand why Burroughs might want to be excused from duty: the days she requests with her daughter may be their last together.\n  \n  Still, Burroughs is [i]Foraker[/i]'s sailing mistress. Although she has mates who are quite capable of maintaining the ship in her stead if she were to absent herself from duty for a few days, there is no doubt that the performance of ship and crew will suffer without her sure hand.\n*comment endif\n\nAnd yet, both parents look upon you with begging eyes, the expression of one no less pleading than the other.\n*if sensibility >= 50\n  Surely, you can offer them this little human kindness?\n*if sensibility \u003c 50\n  The sight alone would have been enough to move most, but you at least have the composure to make the decision dispassionately:\n*choice\n  #\"You are free from duty for the next week, $!{pronoun_4} Burroughs. See to your child.\"\n    *set sensibility %+10\n    *set c_sailing %-10\n    *set gosub_index 200\n    *gosub_scene gosub\n    \"Aye, ${pronoun_5}! Thank you, ${pronoun_5}!\" Both grateful parents are effusive in their thanks, but they do not linger long. Within moments, they are headed below decks to see to their stricken child.\n    \n    Without Burroughs keeping an eye on things, [i]Foraker[/i]'s company do not seem quite as steady as they were before. Perhaps it is just a trick of your mind, but you have been in the service long enough to know the effect that the absence of even a single good officer can make. The rigging seems to handle slower, watch reports seem less precise, and even your orders seem to be just a little slower in being carried out. It is as if your ship's crew were a bundle of reeds, now suddenly deprived of the one string that held them together and slowly beginning to loosen.\n    \n    *if sick = 1\n      Thankfully,\n      *if gender = \"men\"\n        Master Burroughs reports back to duty after two days absence, happy to report that his son is making a full recovery. \n      *if gender = \"women\"\n        Mistress Burroughs reports back to duty after only two days, happy to report that her daughter is on the mend and bound to make a full recovery.\n      At once, the situation aboard [i]Foraker[/i] seems to begin correcting itself, though you suppose it might be a while before things get entirely back to normal.\n      \n      Still, it is best outcome you could have hoped for.\n      *return\n    *else\n      *set c_morale %-5\n      *set c_sailing %-10\n      Unfortunately, things only get worse for\n      *if gender = \"men\"\n        Master Burroughs's son. Over the course of the next three days, he gets progressively weaker, until early one morning, he does not wake.\n      *if gender = \"women\"\n        Mistress Burroughs's daughter. As the days wear on, she gets progressively weaker, until early one morning, she does not wake.\n      *page_break\n      The burial of a child is never an easy thing, and\n      *if sensibility >= 40\n        your own mood is suitably somber\n      *if sensibility \u003c 40\n        and you force yourself into a suitably somber mood\n      as [i]Foraker[/i]'s chaplain says the words and has the sail-wrapped body of the Burroughs's child consigned to the cold waters of Trimountaine Bay.\n      \n      Both of them thank you for your kindnesses once the brief, scant ceremony ends, and you\n      *if sensibility >= 50\n        console yourself with the fact that you did everything you could.\n      *if sensibility \u003c 50\n        remind yourself that you did everything you could.\n      *comment endif\n      \n      *if gender = \"men\"\n        Master Burroughs returns to duty the next day, \n      *if gender = \"women\"\n        Mistress Burroughs returns to duty the next day, \n      but you can tell that ${pronoun_1} is still troubled by ${pronoun_2} loss. $!{pronoun_1} performs ${pronoun_2} duties without ${pronoun_2} usual alacrity and liveliness. The ill humor spreads among the rest of the crew, and it's all you can do to hope that time will do its healing work before [i]Foraker[/i] is forced into battle once again.\n      *return\n  #\"I cannot spare you, $!{pronoun_4} Burroughs. I am sorry.\"\n    *set sensibility %-10\n    *set c_morale %-5\n    *set gosub_index 200\n    *gosub_scene gosub\n    Burroughs's face falls. \"I see, I understand, ${pronoun_5}.\"\n    \n    *if gender = \"men\"\n      Your sailing master begins to turn away, but his wife is not about to give up so easily. She opens her mouth to protest, but before she can, her husband shakes his head.\n      \n      \"The Captain has made his decision, and it's his ship,\" he says despondently. \"I must return to my duty.\"\n      \n      And so he does,\n    *if gender = \"women\"\n      Your sailing mistress accepts your decision, but her husband does not. He opens his mouth to protest, but before he says a word, his wife shakes her head. \n      \n      \"The Captain's made her decision, and she is in command, not us,\" she says despondently. \"I must return to my duty.\"\n      \n      And so she does,\n    *comment endif\n    but not without a certain distractedness about ${pronoun_3}, coupled with a general ill humor which soon spreads to the rest of the crew. Burroughs's mind might be thrown into ${pronoun_2} work, but ${pronoun_2} heart is below decks, where ${pronoun_2} child lays sick, maybe dying.\n    \n    *if sick = 1\n      Finally, after three days, there is good news: the sickness is receding. With luck, Burroughs's child will soon make a full recovery. Your Sailing $!{master}'s mood begins to recover as well, though it may be a while before ${pronoun_1} entirely forgives you for not letting you be at ${pronoun_2} child's sickbed.\n      \n      Still, the matter is resolved, and in a happy manner as well. It is the best outcome you could have asked for.\n      *return\n    *else\n      *set c_morale %-10\n      *set c_sailing %-10\n      As the days pass, the news from below decks grows worse. Burroughs's child grows weaker and weaker, until finally, one day, ${pronoun_1} does not wake at all.\n      *page_break\n      There is a funeral of course. You make sure of that. The little body is wrapped in sailcloth and weighed down with grapeshot. [i]Foraker[/i]'s chaplain mumbles a few words before consigning the the poor child to the depths of Trimountaine Bay. \n      \n      *if gender = \"men\"\n        Mrs. Burroughs does not speak to you. She does even look at you before retreating below decks.\n        \n        Master Burroughs\n      *if gender = \"women\"\n        Mr. Burroughs does not speak to you. He fixes you with a hard glare before retreating below decks.\n        \n        Mistress Burroughs\n      *comment endif\n      continues to see to ${pronoun_2} duties, but ${pronoun_2} behavior only grows more sullen and listless. The loss of ${pronoun_2} child has affected ${pronoun_3} deeply, and everyone can see it. Without the energetic leadership Burroughs previously gave [i]Foraker[/i]'s crew, standards begin to slip, spirits begin to sag and a pall of gloom seems to settle over you all.\n      *return\n  #\"I am sending your child to Trimountaine, to be treated properly.\"\n    *set child_send true\n    *set sensibility %+10\n    *set gallantry %+20\n    *set c_sailing %-10\n    *set gosub_index 200\n    *gosub_scene gosub\n    \"I—you—I mean—\" Burroughs's face contorts through stations of surprise and confusion. Then, as what you have told ${pronoun_3} finally sinks in, ${pronoun_2} expression transmutes into one of pure joy.\n    \n    \"Oh thank you, ${pronoun_5}!\"\n    *if gender = \"men\"\n      Mrs. Burroughs exclaims. \"If only we had some way to repay you!\"\n    *if gender = \"women\"\n      Mr. Burroughs exclaims. \"If only we had some way to repay you!\"\n    *comment endif\n    You suspect that it is propriety alone which prevents either of them from embracing you bodily.\n    \n    *if sensibility >= 50\n      \"See that your child recovers, that is the only thanks I require,\" you reply softly.\n    *if sensibility \u003c 50\n      \"I am only doing my duty to look after my crew as best I can,\" you reply detachedly.\n    *comment endif\n    \n    But that does not deter them from thanking you further, and it is only after two or three minutes that they finally allow you to order a boat prepared to ferry the stricken child to shore.\n    *page_break\n    Within the hour, the little passenger is bundled aboard a ship's boat with a flag of truce fluttering from the bow, alone except for\n    *if gender = \"men\"\n      Mrs. Burroughs, who gives one last wave before she shoves off towards the coast.\n      \n      Your sailing ${master}\n    *if gender = \"women\"\n      Mr. Burroughs, who gives one last wave before he shoves off towards the coast. \n      \n      Your sailing ${master}\n    watches spouse and child go. They had time to say their goodbyes as their boat was readied, but it will be some time before they are all reunited again. Their separation could be for months, or years, if the war should end that long. Only the fact that such a parting brings with it the promise of proper treatment for their child makes it a boon instead of a curse.\n    \n    Yet as the days wear on, Burroughs remains distracted. At times you catch ${pronoun_3} staring longingly towards the distant houses of Trimountaine. You can only hope time will bring his thoughts back to the matter at hand.\n    *return\n\n*label gosub_event_rats\n*temp wheat 0\nTwo days later, $!{pronoun_4} Prescott, the ship's purser, appears in your cabin with a small cloth bundle and a worried look on ${pronoun_2} face.\n\n\"I was looking through this week's allotment of biscuit this morning, just my normal rounds, you understand, when I found this.\" $!{pronoun_1} pulls open the bundle in ${pronoun_2} arms, to reveal a stinking heap of ragged fur and blank eyes inside. Your cabin fills with the smell of putrid flesh. Inside the bundle are half a dozen black rats, every single one of them dead.\n\n\"I found'em like this, ${pronoun_5},\" Prescott reports. \"At first I thought one of the ship's cats had got to'em, or that some of the hands were hunting them down, but there's not a mark on'em, ${pronoun_5}. And these weren't the only ones. I found another two dozen in the sacks, just like these.\"\n\nFor an instant, you cannot help but wonder why Prescott is bothering you with this. A few dead rats isn't worth this sort of trouble. But then…\n  \n\"You fear that these creatures have been killed by our biscuit?\"\n  \nThe purser nods grimly. \"Aye, ${pronoun_5}. I think some sort of blight must have gotten into the food. I think it warrants a closer look.\"\n*page_break\nYou head down into the stores with Prescott and Morris, the surgeon's mate. Between the three of you, [i]Foraker[/i]'s food stores are subject to a thorough search.\n\nIn the space of an hour, you not only find dead rats, but a strange odor emanating from a section of the biscuit stores, about a fifth in all. \n\n\"If the source of that smell is what's killing the rats, then we'll need to dump all this biscuit,\" Morris concludes, \"I doubt it's safe for consumption.\"\n\n\"Can't you make sure?\" Prescott asks. \"The smell might be coming from something else, or maybe something else killed the rats.\" The purser has the most to lose if the biscuit has to be dumped. $!{pronoun_1} had bought it from the suppliers with ${pronoun_2} own money, to be made back when resold to the crew. Furthermore, if you dump that much of the ship's food supply, you'll need to put the crew on short rations, and you doubt they'll much like that.\n\n\"I could have the surgeon run some tests,\" Morris replies dubiously, \"but that will take time.\" $!{pronoun_1} looks to you. \"What would you have us do, Captain?\"\n*choice\n  #\"Let us not cause unwarranted alarm: leave the biscuit alone for now.\"\n    *rand wheat 1 10\n    The surgeon's mate gives you a dubious look, but a nobody else on this ship has the authority to countermand a captain's decision.\n    \n    If you decide the biscuit is to be left alone as if nothing was wrong with it, then that is what shall happen.\n    *page_break\n    *if wheat >= 6\n      The next few days are more anxious than normal. You keep an eye out for any sign of illness or strange behavior on the part of the ${gender}. Yet despite your best efforts, you find nothing amiss. The crew are as they have always been, and if any of them have been sickened by the strange-smelling stores, then they do not show it, either to you, or to the ship's surgeon.\n      \n      It seems that you have been worrying over nothing, this time at least.\n      *return\n    *else\n      *set c_morale %-15\n      *set c_str - 5\n      Then, over the next few days, your crew begin to fall ill. \n      \n      It's simple things at first: some ${gender} start reporting to duty feeling a little queasy or imbalanced. Then, as the days pass, some of the hands become dreadfully ill, vomiting everything solid they try to eat, and barely being able to keep down water. The crew turns on itself in suspicion, for diseases spread quickly aboard a cramped vessel like a ${ship_gender} of war, and none of the healthy members of your crew want to find themselves confined to hammocks, sweating and weak, with barely enough strength to avoid drowning in their own excreta. \n      \n      Morale plummets, and every division of the ship becomes shorthanded as more ${gender} fall ill. \n      \n      You have gambled with the health of your crew, and you have lost.\n      *return\n  #\"Throw the affected stores overboard and put the crew on short rations.\"\n    *set c_morale %-10\n    Needless to say, your decision is not a popular one.\n      \n    It is bad enough that a fair proportion of the crew is now required to hoist bags of the foul-smelling biscuit up through the hatches and over the side, the fact that they are doing so on shortened rations only adds to their agitation. The ${gender} grow increasingly more surly as bags of precious food splash into the water of Trimountaine Bay, consigned to the deeps for a crime no worse than smelling a little off.\n      \n    Still, it is better to be safe than sorry, even at such a blow to the ${gender}'s spirits.\n    *return\n  #\"Have the ship's surgeon examine the biscuit for disease.\"\n    *rand wheat 1 10\n    *set c_morale %-5\n    Morris takes a sack of biscuit to the cockpit for the surgeon's inspection. You send Prescott back to ${pronoun_2} post and order ${pronoun_3} to keep ${pronoun_2} mouth shut. The fewer people know about this, the better.\n    \n    Yet rumor has a habit of spread within the confined spaces of a ship. Before long, the crew are well aware that the surgeon is doing something to a pile of biscuit from the stores in the cockpit. Dire reports spread quickly. By noon, few are even daring to touch their rations. \n    \n    With mounting anxiety, you wait for the report from the surgeon, but it is not until nearly sunset that ${pronoun_1} finally delivers his findings.\n    *page_break\n    *if wheat >= 6\n      When it arrives, it comes with a sense of relief: as far as the surgeon can tell, there is naught amiss with the biscuit. As for the rats, they had been trapped under a mound of sacks and suffocated. The odd smell had been their putrefying bodies. Once each of the half-rotted carcasses are disposed of, the stink begins to fade.\n      \n      Morale recovers a little once all is explained, but the ${gender} spend a lot of extra time sniffing at their biscuit at each meal.\n      *return\n    *else\n      *set c_morale %-10\n      Unfortunately, your suspicions have been proved correct. The affected biscuit is covered with a greenish blight and possessed of a stink so strong that even the weevils which customarily infect ship's biscuit are noticeably absent. The stuff is almost certainly toxic.\n      \n      The crew do not take this news well. Not only is all of [i]Foraker[/i]'s supply of biscuit suspect, but they must now spend long hours hoisting the infested stores up through the hatches and over the side. As sack after sack splashes into Trimountaine Bay, the ${gender} grumble not only over the dubious quality of their food, but their soon-to-be curtailed issue of them, for with a fifth of your supply of biscuit now gone, you will certainly have to shorten rations.\n      \n      Still, at least nobody has fallen ill. You suppose things could have been much worse.\n      *return\n      \n*label gosub_event_grog\n*page_break\nYou are in your cabin, shortly after lunch when you receive a knock on the door.\n\nIt's Captain Mercer, with a grim look on ${pronoun_2} face, and one of your lands${gender} in tow.\n\n\"Sorry for the interruption, ${pronoun_5},\" your captain of marines says as ${pronoun_1} prods the ${gender_2} who is evidently ${pronoun_2} prisoner forward.\n\"One of my corporals caught this one trying to siphon off rum from the stores half an hour ago. Thought you ought to pass sentence.\"\n\nYou feel your brow furrow. Theft of spirits is normally a flogging offense on a ship where crew morale is tied strongly to the issue of grog, and you're sure the rest of the crew would agree. After all, the entire crew draws their drink from the same store. You motion the accused forward.\n\n\"Name?\" you ask.\n\n\"Bartlett, ${pronoun_5}, foredeck larboard watch,\" the thief answers. \"It weren't my fault! Twas Gunner Lewis wot made me do it!\" ${pronoun_1} protests. \"$!{pronoun_1} said it was expected for ${pronoun_3} to get extra, on account of ${pronoun_2} rate!\"\n\nMercer looks to you, and you can feel your brow furrow ever more. Lewis is one of your best gunner's mates, and possibly one of the best gunners on the ship. When it comes to fighting a ship, ${pronoun_1}'s worth twenty lands${gender} like Bartlett. \n\nYet the accused hand looks at you with pleading eyes. \"Please! I'm telling the truth!\"\n*label gosub_event_grog_2\n*temp confession false\n*choice\n  #\"Your excuses do not move me, Bartlett.\"\n    *goto gosub_event_grog_bartlett\n  #\"Let us see what Gunner Lewis has to say about this.\"\n    You have Captain Mercer fetch Lewis, and before long, you have the Gunner's mate standing before you next to Bartlett.\n    \n    \"You stand here accused of having deceived Bartlett into stealing from the rum store,\" you explain. \"Do you deny it?\"\n    \n    Lewis lowers ${pronoun_2} gaze, but out of deference, not shame. \"I deny it, ${pronoun_5}.\n    \n    *if leadership >= 55\n      *set confession true\n      *if sensibility >= 50\n        \"Then you are a brave figure Lewis,\" you reply calmly, \"to deny what you must know we already have proof of.\"\n        \n        For a moment, Lewis stares back, uncomprehendingly. Then, ${pronoun_3} shoulders sag in defeat. Your bluff has worked.\n      *if sensibility \u003c 50\n        You force Lewis to meet your gaze, and prevent ${pronoun_3} from finding any escape from it. You do not allow the accused gunner's mate of any sight save your own cold, pitiless eyes.\n        \n        \"Do you deny it?\"\n        \n        This time, Lewis cracks.\n      *comment endif\n      *page_break\n      Lewis admits to ordering Bartlett to steal the rum, but that is not all.\n      \n      Over the next half hour, the Gunner's mate confesses to keeping a hold over ${pronoun_2} section through an entire regime of bullying, back-dealing, and blackmail. In truth, Lewis's system is not as uncommon as some would hope within the Royal Navy. Informal systems of control have always asserted themselves, and given the level of control over the common crew some petty officers receive, it is not rare for them to demand certain perquisites.\n      \n      However, the level of abuse which Lewis has submitted ${pronoun_2} section to is beyond the pale. Worse yet, by using that system of abuse to steal from the common store of spirits, ${pronoun_1} has effectively turned that system against [i]Foraker[/i]'s entire company.\n      \n      Yet despite that fact, Lewis's section remains one of the best-performing on the ship. Perhaps it might be better to show leniency, for that reason alone.\n      \n      The whole cabin looks to you for a decision.\n      *goto gosub_event_grog_lewis\n    *else\n      You try your best to coax an answer out of Lewis, but the gunner's mate refuses to offer any useful answer.\n      \n      Oddly enough, ${pronoun_1} refuses to incriminate Bartlett as well, even when you make it clear that swearing Bartlett acted alone will clear ${pronoun_3} of any suspicion.\n      \n      In the end, you get nowhere. \n      \n      And you still have a decision to make.\n      *choice\n        #Punish Bartlett for the theft.\n          Lewis breathes a sigh of relief as you order ${pronoun_3} out. \n          *goto gosub_event_grog_bartlett\n        #I believe Bartlett: punish Lewis for the theft.\n          Lewis's shoulders sag as you order Bartlett out of your cabin. $!{pronoun_1} knows what is coming.\n        \n          Mercer turns to you. \"Sentence, ${pronoun_5}?\"\n          *goto gosub_event_grog_lewis\n        #Punish nobody.\n          *set c_morale %-15\n          Without a clear guilty party, fairness can only demand that you stay the hand of punishment, unless some future development were to make the situation more clear.\n        \n          So, you dismiss both Bartlett and Lewis without verdict and without sentence.\n        \n          No crime proven, no punishment given, and that shall be the end of it.\n          *page_break\n          Apparently, the rest of [i]Foraker[/i]'s company do not think so. The story of the incident spreads and grows in the telling. By the next day, the entire ship knows that Mercer's lobsters have caught a rum thief red-handed, and that you have refused to punish the culprit. \n        \n          The Navy is a strange service. A flogging captain may be forgiven if ${pronoun_1} at least punishes with reason. A captain who turns a blind eye to certain abuses might be acceptable if ${pronoun_1} fights well and brings in enough prize money. However, aboard a $!{monarch}'s ship, an indecisive captain spreads disaffection and disquiet as surely as the sight of a dead albatross. A captain who cannot be trusted to make a decision while a ship is at peace cannot be trusted to make one while ${ship_pronoun_1} is in battle, and in a service like yours, that could mean the difference between life and death.\n        \n          The crew know it, and by their grumbling, they make sure you know it too.\n          *return\n  *hide_reuse #\"Your thoughts, Captain Mercer?\"\n    \"Lewis has seemed a bit more drunk than usual these past few weeks, ${pronoun_5},\" the marine officer muses. \"Then again, that could just be my mind playing tricks on me.\"\n    \n    $!{pronoun_1} pauses, then frowns. \"Yet I would think it ill to take the word of a new hand of three months over that of a gunner's mate of fifteen years' service, even if it were not Lewis. If it were one of my marines thus accused, I would certainly demand a confession before passing sentence.\"\n    \n    Mercer glances at Bartlett, frowns, and then turns back. \"Still, that is not my decision to make.\" \n    *goto gosub_event_grog_2\n*label gosub_event_grog_bartlett\nBartlett's eyes go wide.\n*if sensibility >= 65\n  You take pains to keep your face still, even though the accused hand's pathetic display cannot help but seem worthy of pity.\n*if sensibility \u003c 65\n  You remain unmoved. You have made your decision, and no pathetic display can shift it now.\n*comment endif\n\n\"Please, ${pronoun_5}!\" ${pronoun_1} pleads as ${pronoun_1} sinks to ${pronoun_2} knees, \"I beg of you! I—\"\n\nMercer fixes Bartlett with a glare hot enough to melt protest into blubbering fright. \"That is enough out of you,\" ${pronoun_1} answers coldly, before turning to you. \"Punishment, ${pronoun_5}?\"\n*choice\n  #\"I shall be lenient: two months stoppage of rum.\"\n    *set c_morale %-10\n    Bartlett doesn't quite kiss your feet in gratitude, but that is more the work of Captain Mercer's retraining hand than anything else. \n    \n    In any case, the matter is settled, or so it would seem.\n    *page_break\n    Yet as time wears on, the news spreads: you have discovered Bartlett stealing from the rum stores, and only given ${pronoun_3} the lightest punishment acceptable. \n    \n    The crew do not like flogging captains, but they like captains who turn a blind eye to offenses against the entire crew even less. Worse yet, some of the other ${gender} start sneaking out their own extra shares of spirits, thinking that they shall not be harshly punished for it, though they are at least skilled enough to evade Captain Mercer's marines.\n    \n    Morale suffers, discipline suffers, and your reputation among the ship's company suffers too.\n    *return\n  #\"Half a dozen lashes.\"\n    *set c_morale %-5\n    *set c_gunnery %-5\n    Bartlett's eyes somehow manage to go even wider as ${pronoun_2} legs collapse out from under ${pronoun_3}. Mercer has to drag ${pronoun_3} out over ${pronoun_2} shoulder.\n    \n    When the day of the punishment arrives, Bartlett is no better state. Though the whip is designed to inflict pain and not permanent damage, a handful of lashes is enough to reduce the thief to a cringing, sobbing mess.\n    *page_break\n    Needless to say, Bartlett's flogging gets your message across, reassuring [i]Foraker[/i]'s company that any who attempt to steal from [i]Foraker[/i]'s common store of spirits will be punished, though some grumble that the punishment ought to have been harsher.\n    \n    As for Gunner Lewis, you notice ${pronoun_2} demeanor grow more and more surly over the course of the next few days. $!{pronoun_2} section's performance suffers, even as their head seems to become more and more sober. Perhaps Bartlett's story had some truth to it after all.\n    \n    Not that it matters any more. Bartlett's will has been almost completely broken by the experience. $!{pronoun_1} will never make a good sailor now. \n    *return\n  #\"A dozen lashes.\"\n    *set c_gunnery %-10\n    Bartlett's eyes somehow manage to go even wider as ${pronoun_2} legs collapse out from under ${pronoun_3}. Mercer has to drag ${pronoun_3} out over ${pronoun_2} shoulder.\n    \n    When the day of the punishment arrives, Bartlett is no better state. Though the whip is designed to inflict pain and not permanent damage, a mere dozen lashes is enough to reduce the thief to a cringing, sobbing mess.\n    *page_break\n    Bartlett's flogging certainly gets the message across, to the satisfaction of almost all. Now the crew know that any who might dare to steal from the communal supply of spirits will be punished severely.\n    \n    Oddly enough, one of the few people who doesn't seem to be satisfied is Gunner Lewis. Not only does ${pronoun_1} become progressively more surly, but the section under ${pronoun_2} command seems to grow more cringing and insolent towards ${pronoun_3} by turns. As if ${pronoun_1} had some spell of control over them, now suddenly broken. Perhaps Bartlett's story had some element of truth to it. \n    \n    Not that it matters any more. Bartlett's will has been almost completely broken by the experience. $!{pronoun_1} will never make a good sailor now. \n    *return\n*label gosub_event_grog_lewis\n*choice\n
