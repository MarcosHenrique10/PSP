 clad in a blue coat not much unlike your own. Upon her\nright shoulder hangs the single epaulette of a Master Commandant, the Columbian equivalent of a Royal Navy Commander.\n\n\"I have the honor to be Captain Jacobs, United Republics Navy, commanding the URS [i]Cordial[/i],\" ${pronoun_1} announces in a flat, broad New Lancaster accent as ${pronoun_1} takes ${pronoun_2} sword and offers it to you. \"I surrender my ship and crew, and offer you my parole.\"\n\nYou reach for the sword, and as your hand closes around its hilt, you hear the voices of your own crew rise up behind you.\n\n\"Three cheers for Captain—\"\n*choice\n  #Baker.\n    *set name \"baker\"\n    *goto prologue_3\n  #Brown.\n    *set name \"brown\"\n    *goto prologue_3\n  #Harrington.\n    *set name \"harrington\"\n    *goto prologue_3\n  #Ramsey.\n    *set name \"ramsey\"\n    *goto prologue_3\n  #Smythe.\n    *set name \"smythe\"\n    *goto prologue_3\n  #I don't like any of those names.\n    Then what is your name, Captain?\n    *input_text name\n    *goto prologue_3\n*label prologue_3\n\"Three cheers for Captain $!{name}!\" they shout.\n*fake_choice\n  #How exhilarating it is to be cheered! One can barely resist cheering with them.\n    *set sensibility + 20\n    It would be your fondest wish to cheer alongside your ${gender}, to grant your full-throated approval not only to their demonstration of affection, but to their own efforts through which your victory could have never been possible.\n    \n    Alas, you are an officer of the $!{monarch}'s Navy, and officers of the $!{monarch}'s Navy do not have the luxury of losing their dignity in moments of high emotion.\n  #It's wonderful to be cheered, though I mustn't seem too moved.\n    It is certainly no small thing to win the affection of your crew, and your heart cannot help but lift at the level of admiration which you are now subject to, but it would not do to make too much fuss of it. You grin, of course, and nod back, to show that such gestures are appreciated, but no more. Any more would give the impression that you lack composure, or worse yet, that you seek attention and adulation to an uncouth degree.\n    \n    So, you keep your expression fixed, and offer no greater outpouring of emotion than a knowing, imperious smile.\n  #I must keep my composure completely, anything else would be unseemly.\n    *set sensibility - 20\n    There are those in the salons of Lonsdale and Chesterport who would wax poetic about the virtues of sentiment, of the \"${gender_2} of feeling\" who lets their emotions drive their action and words without reserve. You, on the other hand, know that such persons have no place aboard a $!{monarch}'s ship. Feeling without the stern rule of reason is little more than anarchy, and ${gender} who cannot rule themselves are hardly fit to command others.\n    \n    So, you keep your expression tightly fixed, and your thoughts tightly controlled, lest your heart overmaster your head.\n*comment endif\n\nBut your crew has no such restrictions. \"Huzzah!\" [i]Foraker[/i]'s company shouts with nary a doubt or reservation. \"Huzzah!\" they shout until your ears ring with the sound of their voices. \"Huzzah!\"\n*page_break\nYet soon enough, the cheers fade, and the reality of the situation asserts itself: there is work to be done. [i]Foraker[/i] took little damage in the late engagement, but the same cannot be said of the [i]Cordial[/i]. Though the United Republics of Columbia's navy keeps its ships and crews almost as well-run and well-maintained as Albion's, the boarding action has not treated the Columbian vessel kindly. Decks that were once neatly holystoned are now awash with blood and strewn with corpses, and the crushed tangle of the [i]Cordial[/i]'s foremast as yet floats uselessly alongside ${ship_pronoun_3}.\n\nThe rest of the day is spent in furious labor. The dead are wrapped in canvas, weighted with shot, and consigned to the sea. The wounded are given a far worse fate: treatment at the hands of [i]Foraker[/i]'s surgeon. The screams of the sawbones's victims become a constant as [i]Cordial[/i] and [i]Foraker[/i]'s crews work side by side to put the Columbian ship to rights, their jobs made easier by their shared language and similar professional culture.\n*page_break\nFinally, as the sun begins to set, [i]Cordial[/i]'s lost foremast is cut away, ${ship_pronoun_2} deck is scrubbed to standard, and ${ship_pronoun_1} is at last ready to take on a prize crew and make the long trip north to your base in Ismay. \n\nThe only question is, how large of a prize crew do you mean to put aboard her? While [i]Foraker[/i]'s crew is almost at full strength, you certainly mean to take other prizes before you return to port, and every trained gunner or top-${gender_2} assigned to keep an eye on the [i]Cordial[/i] is another which you cannot put aboard some rich merchant${gender_2} worth ten times a naval brig in prize money.\n\nThen again, while the [i]Cordial[/i]'s captain has given ${pronoun_2} parole, the Columbians do possess a strong reputation for perfidy. They'd not shown much respect for the laws and customs of war when they had fought for their independence from Albion, and they have certainly shown no signs of improving their behavior in the forty years since, if their skirmishes with the pirates of Sahra or their depredations against the Gaulish were any demonstration.\n\nThen again, perhaps you are merely worrying over nothing, and casting aspersions on the honor of a perfectly upright officer.\n\nPerhaps.\n*fake_choice\n  #Assign the smallest prize crew practicable, I cannot spare more.\n    *set c_str - 5\n    *set cordial_escape true\n    A risky decision, but one which may yet pay off.\n  #Give the [i]Cordial[/i] a moderate-sized prize crew.\n    *set c_str - 10\n    *rand die_roll 0 100\n    *if die_roll >= 50\n      *set cordial_escape true\n    *set die_roll 0\n    Yes, perhaps the course of moderation would be wisest.\n  #I mean to take no chances: assign as large a prize crew as possible.\n    *set c_str - 20\n    Better safe than sorry.\n*comment endif\n\nIt is only the work of a few minutes to pick out the members of the prize crew and assign Callaghan, your Third Lieutenant, to command it. As the [i]Cordial[/i] slips away in the dim light of evening, the mood on board the [i]Foraker[/i] is jubilant. It is a rare thing to take a prize so early on a cruise, and rarer yet to take an enemy warship with only minimal loss.\n\nYet as you stride the quarterdeck in the lantern-lit gloom, you spot your First Lieutenant, peering at the [i]Cordial[/i]'s retreating form from the stern rail, and looking far from content.\n\nWho is your First Lieutenant, by the way?\n*choice\n  #Lieutenant Fisher, an army captain's eldest with the common touch.\n    *set hist_note_5 1\n    *set c_morale + 15\n    *set lieutenant \"fisher\"\n    Lieutenant Fisher had lost both of ${pronoun_2} parents before the age of ten, a tumultuous experience which left the young Fisher with a roughness around ${pronoun_2} character that the service was never quite able to polish out. As abrasive as this made ${pronoun_2} to ${pronoun_2} superiors, it quickly became evident that it gave the young officer a knack for dealing with those under ${pronoun_2} command. Though plagued with a short temper and an unsettling cleverness, Fisher's ability to gauge the spirits of the ${gender} and work a crowd of ratings like a smith working copper has proved useful more than once.\n    \n    \"The ${gender} are worried, Captain,\" ${pronoun_1} states plainly as you step up next to $!{pronoun_2}. \"They hide it well, but they are damned worried.\"\n    \n    \"They seem quite cheerful to me, ${pronoun_4} Fisher,\" you reply gamely.\n    \n    Fisher frowns. \"What you are seeing is relief, ${pronoun_5}. Relief that we have run into a puny twelve-gun brig, instead of one of the enemy's heavy frigates—which, if the rumors are to be believed—mount sixty guns each and have sides made of iron.\"\n    \n    \"Iron does not float,\" you contend. \"Surely they are just rumors.\"\n    \n    Your Lieutenant's frown deepens. \"They are not. I spoke with some of the officers on HMS [i]Chevalier[/i] after they were exchanged, just before we left Ismay. They told me that when ${pronoun_1} fought URS [i]Charter[/i], ${pronoun_2} shot bounced right off [i]Charter[/i]'s hull. As far as they were concerned, ${ship_pronoun_2} sides damned well [i]were[/i] made of iron.\"\n    \n    Fisher turns to face you, expression grim. \"The ${gender} may seem in high spirits now, but show them a Columbian heavy frigate on the horizon, and I assure you, ${pronoun_5}, that good cheer shall not last.\"\n    *goto prologue_end\n  #Lieutenant Simpson, a colonial with a talent for navigation.\n    *set hist_note_5 2\n    *set c_sailing + 15\n    *set lieutenant \"simpson\"\n    Lieutenant Simpson had been born in Ismay. $!{pronoun_2}\n    *if gender = \"men\"\n      father\n    *if gender = \"women\"\n      mother \n    had been a navy clerk and young Simpson had first joined the company of a $!{monarch}'s ship at the age of four. By the time ${pronoun_1} made lieutenant, ${pronoun_1} already had a decade of seniority, and a reputation as one of the best navigators in the service, a talent which has come in useful more than once.\n    \n    \"These are dangerous waters, Captain,\" ${pronoun_1} states as you step up next to ${pronoun_3}. \"The Columbian Navy is small, but heavily concentrated. If we remain this close to their coast, I suspect we shall see more of them yet.\"\n    \n    \"Then we shall see them off, just as we have today,\" you reply.\n    \n    Simpson frowns. \"It is not twelve-gun brigs which worry me, ${pronoun_5}, but their heavy frigates,\" ${pronoun_1} replies. \"If [i]Foraker[/i] finds itself opposed to one of those monsters-\"\n    \n    \"[i]Foraker[/i] is fresh from refit, with an excellent crew, and a heavy armament for ${ship_pronoun_2} class,\" you answer, trying not to take offense. \"If we are forced to do battle with a Columbian heavy frigate, we shall prevail.\"\n    \n    Your First Lieutenant's frown only deepens. \"I wish I could share your confidence ${pronoun_5}, but-\" $!{pronoun_2} voice lowers to a near whisper. \"I have spoken with officers from HMS [i]Chevalier[/i] after they were exchanged, just before we left Ismay. They told me that when ${ship_pronoun_1} fought URS [i]Charter[/i], the Columbian mounted fifty five guns at least, and that [i]Chevalier[/i]'s shot bounced off [i]Charter[/i]'s hull as if it had been made of iron.\"\n    \n    Simpson lets out a long, tense breath. \"Perhaps the account is exaggerated, but if there is any truth to them, then I do not fancy our chances.\"\n    *goto prologue_end\n  #Lieutenant Shannon, one of the most brilliant gunners you have ever known.\n    *set hist_note_5 3\n    *set c_gunnery + 15\n    *set lieutenant \"shannon\"\n    Lieutenant Shannon would have drilled the gun crews every day from sunrise to sunset if ${pronoun_1} had the authority and the funds to pay for the extra shot and powder. Instead, ${pronoun_1} had contented ${pronoun_3}self with an array of experiments involving sights, lenses, and other strange contraptions which you would have thought better suited for the Royal Academy than a $!{monarch}'s ship.\n    *comment endif\n    \n    Yet the results had spoken for themselves. Shannon's experimental sights have increased accuracy considerably, and you took the opportunity to have them installed on every gun while [i]Foraker[/i] was in refit at Ismay.\n    \n    Now, however, your First Lieutenant appears to be bedeviled by fresh anxieties.\n    \n    \"The gun crews performed well today, ${pronoun_5},\" ${pronoun_1} observes as you step up next to ${pronoun_2}, \"but I fear they shall be less steady against a real opponent.\"\n    \n    \"We did just take a Columbian warship today,\" you remind ${pronoun_3}, \"surely that must be some cause for confidence.\"\n    \n    \"A light brig mounting nothing heavier than a nine-pounder,\" Shannon scoffs. \"With all due respect, Captain, [i]Cordial[/i] is to a Columbian heavy frigate as a tomcat is to a tyger.\" $!{pronoun_1} leans in, voice dropping to a whisper. \"I spoke with the officers from HMS [i]Chevalier[/i] in Ismay, after they were exchanged. They told me about their action with URS [i]Charter[/i]. They told me that ${ship_pronoun_1} mounted sixty guns, and that [i]Chevalier[/i]'s shot bounced off ${ship_pronoun_2} sides as if they had been made of iron.\"\n    \n    $!{pronoun_1} shakes ${pronoun_2} head. \"If there is any truth to their account, then we must make precautions, or I suspect we shall soon find ourselves as the crew of [i]Chevalier[/i] did.\"\n    *goto prologue_end\n  #Lieutenant Pakenham, one of the most well-connected ${gender} in the service.\n    *set hist_note_5 4\n    *set lieutenant \"pakenham\"\n    *set patronage + 15\n    You suppose Lieutenant Pakenham is competent enough, all things considered, but 'competent enough' is plenty when\n    *if gender = \"men\"\n      your father is an earl, your father-in-law is a general, and your grandfather First Naval Lord. \n    *if gender = \"women\"\n      your mother is a countess, your mother-in-law a general, and your grandmother First Naval Lady.\n    Still, you know an officer with such connections is a resource worth cultivating in a service as prone to nepotism as the Navy, and Pakenham's customary good cheer makes ${pronoun_3} easy enough to get along with.\n    \n    Yet you hear none of ${pronoun_2} normal affability in ${pronoun_2} voice now. \n    \n    \"One must suppose we have been fortunate,\" ${pronoun_1} muses as you step up next to ${pronoun_3}. \"Our first encounter with the Columbian has not been quite as fearful as it might have been. A twelve-gun brig is naught but sport for a ship like [i]Foraker[/i], but I fear that we may soon encounter rather sterner adversaries.\"\n    \n    You catch Pakenham's meaning exactly. \"You speak of their heavy frigates?\"\n    \n    Your First Lieutenant nods. \"One does, ${pronoun_5}. One must have heard the rumors of them, that they mount twice the guns of any Albionian frigate, and that their hulls are impervious to our shot, and so forth.\"\n    \n    \"Merely rumors,\" you insist. \"Surely such obvious exaggerations cannot dissuade us from doing our duty.\"\n    \n    Pakenham frowns. \"They are not exaggerations. When one has read the reports of the bloody swathes they have cut through our lists of frigates and merchant${gender}, one cannot help but be anxious. In truth, one wishes ${pronoun_1} had your confidence, and one can only hope it is not misplaced.\"\n    *goto prologue_end\n*label prologue_end\n*page_break\n*if sensibility >= 50\n  \"Surely, once we make our rendezvous with [i]Courageous[/i], Admiral Warwick will be able to offer us more recent intelligence regarding the situation,\" you assure $!{lieutenant}. \"Perhaps your anxieties shall be made ridiculous then.\"\n  \n  \"Or perhaps they shall be confirmed, ${pronoun_5},\" ${pronoun_1} answers.\n*if sensibility \u003c 50\n  \"Surely, once we make our rendezvous with [i]Courageous[/i], Admiral Warwick will deliver us the facts of the matter,\" you assure $!{lieutenant}. \"Perhaps we shall see the situation is not so bad as all that.\"\n  \n  \"Perhaps, ${pronoun_5},\" your First Lieutenant answers dubiously. \"Perhaps it shall prove worse.\"\n*comment endif\n\nSomewhere behind you, the ship's bell rings, and $!{lieutenant} retreats to supervise the change of watch, leaving you alone with your own thoughts.\n*page_break\nPerhaps your First Lieutenant is right. Perhaps the heavy frigates of the Columbian Navy are worth being frightened of. In the past year of war, they have certainly done a great deal of damage to Albion's over-extended shipping and fleet. If the stories are anything near true, then [i]Foraker[/i] would be heavily outmatched indeed.\n\nYet the Columbian coast is vast, and the oceans vaster yet. If the Admiralty's latest intelligence is to be trusted, the Columbians do not possess more than half a dozen of the damned things. It is entirely likely that you shall not see hide nor hair of them at all.\n\nBut if you do…\n*fake_choice\n  #Then I would endeavor to be the first to take such a monster down.\n    *set gallantry + 10\n    *set sensibility + 10\n    True, a Columbian heavy frigate would be a daunting foe, but in your mind, that can only add to the luster of taking one. To face down a vessel which seemingly outclasses yours so comprehensively and prevail would not only burnish the reputation of the service, but do your own career no small good.\n    \n    And there is the simple shining glory of it, to be the instrument of Albion's vengeance upon these Columbian upstarts, to be the one to show that their hitherto-invincible little navy can be humbled after all. \n    \n    Perhaps there are those who would fear the prospect of an engagement with such a mighty foe. \n    \n    You relish it.\n  #The honor of the service would demand I give battle with utmost aggression.\n    *set gallantry + 10\n    *set sensibility - 10\n    There are some within the service who would chase after glory like a bloodhound after a fox, who would see an engagement with one of the Columbian Navy's feared heavy frigates as an opportunity to better their position and their reputation. You would like to think that you have more sense than that.\n    \n    Yet the cold hard facts are simple enough: Albion is at war with Columbia, and to deprive Columbia of one of ${ship_pronoun_2} heaviest warships would be a palpable blow to the United Republics' ability to make war, not to mention a substantial boon for Albion. Should the opportunity to engage a Columbian heavy frigate present itself, it would be your patriotic duty as a loyal subject and an officer of\n    *if gender = \"men\"\n      His Albionian Majesty's Navy\n    *if gender = \"women\"\n      Her Albionian Majesty's Navy\n    to do your utmost to sink or capture ${ship_pronoun_3}.\n    \n    Anything less would be unconscionable. \n  #Then I must let my fear of being named a coward master my fear of defeat, and fight.\n    *set gallantry - 10\n    *set sensibility + 10\n    The Royal Navy tolerates many faults: cruelty, drunkenness, stupidity, even a certain disregard for the institution of marriage (if kept discreet).\n    \n    It does not tolerate cowardice.\n    \n    Should you be faced with the prospect of an engagement with an enemy which you might have some reasonable chance of defeating, you shall have no choice but to give battle, regardless of whatever fell reputation that foe might have. To do otherwise would be to besmirch the reputation of the service, and tarnish the prestige which has made Albion's ships so feared in the eyes of ${ship_pronoun_2} enemies.\n    \n    To be guilty of such an offense would bring the severest consequences. At least one Admiral has been shot for it. \n    \n    You do not wish to find out what a court-martial would do to a mere captain for the same transgression.\n  #Then I must fight, even if I would rather not.\n    *set gallantry - 10\n    *set sensibility - 10\n    [i]Foraker[/i] is a fine ship, but it would take a fool to believe that ${ship_pronoun_1} would face a heavier-built, better-armed Columbian frigate with favorable odds. \n    \n    Yet unfavorable odds do not mean impossible ones, and if your years of service have taught you anything, it is that the duty of a $!{monarch}'s officer is to accept those odds, if the possible benefit be worth the risk. In the case of possibly depriving the Columbian Navy of one of ${ship_pronoun_2} most formidable warships, you could not possibly decline. Even if every muscle in your body screams with fear at the very thought, you must take the risk, for there is little room for sentiment among the cold equations of war.\n*page_break\nThe thought lingers in your mind as you watch the [i]Cordial[/i] shrink further and further into the distance as the last light of day begins to fade.\n\nBit by bit, ${ship_pronoun_1} slips over the horizon, until once again, you are alone on the cold dark sea.\n*page_break\n*goto_scene chapter_1\n\n*label gender_set\n*if gender = \"men\"\n  *set gender_2 \"man\"\n  *set ship_gender \"man\"\n  *set monarch \"king\"\n  *set pronoun_1 \"he\"\n  *set pronoun_2 \"his\"\n  *set pronoun_3 \"him\"\n  *set pronoun_4 \"Mr.\"\n  *set pronoun_5 \"sir\"\n  *set ship_pronoun_1 \"she\"\n  *set ship_pronoun_2 \"her\"\n  *set ship_pronoun_3 \"her\"\n  *set master \"master\"\n*if gender = \"women\"\n  *set gender_2 \"woman\"\n  *set ship_gender \"lady\"\n  *set monarch \"queen\"\n  *set pronoun_1 \"she\"\n  *set pronoun_2 \"her\"\n  *set pronoun_3 \"her\"\n  *set pronoun_4 \"Ms.\"\n  *set pronoun_5 \"ma'am\"\n  *set ship_pronoun_1 \"he\"\n  *set ship_pronoun_2 \"his\"\n  *set ship_pronoun_3 \"him\"\n  *set master \"mistress\"\n*return\n", "screenshots": "\n*script window.animateEnabled = false;\n*script changeBackgroundColor(\"sepia\")\n*label screen_1\n*set sailing 75\n*set gunnery 60\n*set leadership 35\n*set fighting 60\n*set patronage 35\n*set gallantry 78\n*set sensibility 23\n*set c_str 68\n*set c_sailing 45\n*set c_gunnery 71\n*set c_morale 82\n*text_image stats.png center This being the condition of HMS Foraker, a fifth-rate frigate of the Royal Albion Navy.\nCaptain Baker COMMANDING.\n\nCondition of Ship and Company, as of MAY 14, 1813.\n\n*text_image captain.png center Captain's Record\n*stat_chart\n  percent sailing Sailing\n  percent gunnery Gunnery\n  percent leadership Leadership\n  percent fighting Fighting\n  percent patronage Patronage\n  opposed_pair gallantry\n    Gallantry\n    Discretion\n  opposed_pair sensibility\n    Sensibility\n    Composure\n*line_break\n\n*text_image ship.png center Ship's Company\n1st Lieutenant: P. Simpson\n*line_break\nSecond Lieutenant: R. Bannister\n*line_break\nThird Lieutenant: L. Callaghan\n*line_break\nCaptain of Marines: M. Mercer, RM\n*line_break\nSailing Master: E. Burroughs\n*stat_chart\n  percent c_str Crew Strength\n  percent c_sailing Crew Sailing\n  percent c_gunnery Crew Gunnery\n  percent c_morale Crew Morale\n*page_break\n*goto screen_2\n*label screen_2\n\"Ah, pardon me, ladies,\" a voice calls out from the other side of the deck. The two of you turn to see a plump, middle-aged figure in a straw hat and broadcloth approaching from the forecastle. \"Captain Beauregard, of the [i]Amelia[/i], a pleasure to make your acquaintance.\" Beauregard extends her hand. Bannister pointedly refuses it, turns on her heel, and walks away. \n\n\"Not fond of my kind of work, hmm?\" the slaver captain muses lightly, apparently unfazed by the snub. \"To be honest, I don't like her type none neither. That's why I'd prefer to deal with folk such as you.\" She leans in. \"Now, I've got a hundred and fifty thousand dollars worth of cargo in the hold. If you take my ship as a prize, you won't see a penny of it, but if you let us go, I'll make a note of it. I've got friends in Chesterport, and this war ain't going to last forever. When things settle down, I'll send a note to your prize agent for, shall we say…a tenth?\"\n\nBeauregard reaches into her pocket and pulls out a folded piece of paper. \"Hell, I'll even put that promise in writing!\"\n\nA hundred and fifty thousand Columbian dollars. More than forty thousand Albionian pounds. Even a tenth of it would be equivalent to a rich prize indeed, but to the hundreds of souls under your feet, it would mean an eternity of suffering. How much gold would their lives be worth?\n*script changeBackgroundColor(\"black\")\n*fake_choice\n  #\"Very well. We shall do things your way.\"\n  #\"I am afraid I must do my duty, Captain.\"\n  #\"You may take your offer, and kindly go with it to hell.\"\n  #\"Your ship is now contraband. Your slaves will go free. And you will go to the devil.\"\n*goto screen_3\n*label screen_3\nA storm! Damnation!\n\nUnder normal conditions, the safest approach would be to find some secluded cove along the coast, drop anchor and wait the storm out, but that would take precious time you might not have. A riskier option would be to furl sail and ride the tempest out. You might lose less time that way, but [i]Foraker[/i] would also be at the mercy of the storm.\n\nThen, there is the really risky option: you could set topgallants and royals, and try to use the storm to your own advantage, riding its winds as best you can. Such a task would require no trivial amount of skill on the part of captain and company both, and failure could mean the loss of your sails, the topmen who must work them, or even a mast. \n\nBurroughs looks to you for orders.\n*script changeBackgroundColor(\"sepia\")\n*fake_choice\n  #\"Find me a protected cove nearby: we'll shelter there.\"\n  #\"Furl all sail: we'll ride the storm out at sea.\"\n  #\"I fear not this storm: we will use its winds to speed our way.\"\n*goto screen_4\n*label screen_4\n\"Damn! Damn! Damn!\" Fisher growls, each time louder and more vehemently than the last as he peers through his glass at the defiant little vessel. \"Of all the damned merchant captains in God's bloody ocean, we have to come across the one who wants to be a hero.\"\n\nYou feel your own frustration mounting as well. Merchant captains ought to know when they are outmatched. A naval officer may have a duty to do his utmost to hinder an enemy, but surely the captain of a merchant vessel has no business risking the lives and well-being of his crew thumbing his nose at a 38-gun frigate.\n\n\nThen again, were you in command of that brave little sloop, would you not do the same?\n*fake_choice\n  #If we can overtake them and cut them off, they will surely surrender.\n  #We could use [i]Foraker[/i]'s bow chasers to bring down their rigging.\n  #I might be able to bluff them into giving up.\n*goto screen_5\n*label screen_5\n\"Aye, sir,\" Burroughs replies. \"How shall it be done?\"\n    \nRamming two loads of shot down each gun will effectively double the weight of your broadside. Properly directed, the effect of such a salvo can be devastating. In the heat of battle, you will almost certainly not have a chance to double-shot your guns again. The type of ammunition you choose to have loaded for this first, crucial volley of fire may prove pivotal.\n*fake_choice\n  #\"Double round shot will give us the best chance of penetrating their hull.\"\n  #\"Load chain shot: their guns will be of little use if they have no rigging.\"\n  #\"I mean to erase their advantage in numbers: load grape shot.\"", "startup": "*title HMS Foraker\n*author Paul Wang\n*scene_list\n  startup\n  prologue\n  chapter_1\n  chapter_2\n  chapter_3\n  gosub\n  epilogue\n  ending\n\n*comment BASE ATTRIBUTES\n*create name \"none\"\n*create sailing 35\n*create gunnery 35\n*create leadership 35\n*create fighting 35\n*create patronage 35\n*create gallantry 50\n*create sensibility 50\n*create status \"unwounded\"\n\n*comment SHIP STATS\n*create c_str 80\n*create c_sailing 50\n*create c_gunnery 50\n*create c_morale 50\n*create lieutenant \"none\"\n*create lieutenant_status \"alive\"\n*create mercer_status \"alive\"\n*create training \"none\"\n\n*comment WORLD VARIABLES\n*create date 1\n*create date_2 0\n*create delmarva_phase 0\n*create location \"open_sea\"\n*create raiding false\n\n*comment STORY VARIABLES\n*create chapnum 0\n*create cordial_escape false\n*create worsley false\n*create new_lancaster false\n*create new_lancaster_2 false\n*create trimountaine false\n*create prize false\n*create bombard false\n*create child_send false\n*create retreat false\n*create marines \"deck\"\n*create marines_mod 0\n*create delmarva_sailing 50\n*create delmarva_gunnery 50\n*create delmarva_morale 50\n*create delmarva_crew 50\n\n*comment RANDOM EVENT VARIABLES\n*create transit_event_counter 0\n*create event_fish false\n*create event_sea false\n*create event_slaves false\n*create event_overboard false\n\n*create event_deserters false\n*create event_smugglers false\n*create event_sick false\n*create event_rats false\n\n*create event_grog false\n*create event_teach false\n*create event_spar false\n*create spar_fixed true\n*create event_fight false\n*create event_train_good false\n*create event_train_bad false\n\n*comment MECHANICAL VARIABLES\n*create gosub_index 0\n*create event_weight 0\n*create die_roll 0\n*create stat_state 1\n\n*comment PRONOUN VARIABLES\n*create pronoun_1 \"none\"\n*create pronoun_2 \"none\"\n*create pronoun_3 \"none\"\n*create pronoun_4 \"none\"\n*create pronoun_5 \"none\"\n*create ship_pronoun_1 \"none\"\n*create ship_pronoun_2 \"none\"\n*create ship_pronoun_3 \"none\"\n*create gender \"none\"\n*create gender_2 \"none\"\n*create ship_gender \"none\"\n*create monarch \"none\"\n*create master \"none\"\n\n*comment SCORING VARIABLES\n*create ending_index 0\n*create wingate_alive true\n*create sword true\n*create prize_money 500\n*create slave_release false\n*create slave_deal false\n*create smugglers false\n\n*comment ENDING VARIABLES\n*create ship \"foraker\"\n*create knight false\n*create baronet false\n*create commodore false\n\n*comment HISTORICAL NOTES\n*create hist_note_1 0\n*create hist_note_2 0\n*create hist_note_3 0\n*create hist_note_4 0\n*create hist_note_5 0\n\n*comment ACHIEVEMENT VARIABLES\n*create no_guns true\n*create impress false\n\n*achievement story_1 hidden 20 We Ne'er See Our Foes—\n  hidden\n  Receive orders to hunt a Columbian frigate.\n\n*achievement story_2 hidden 20 —But We Wish Them to Stay\n  hidden\n  Discover the Delmarva in Trimountaine.\n\n*achievement story_3 hidden 20 They Never See Us—\n  hidden\n  Face the Delmarva in battle.\n\n*achievement story_4 hidden 50 —But They Wish Us Away\n  hidden\n  Defeat the Delmarva in battle.\n\n*achievement shot hidden 20 Pour Encourager Les Autres\n  hidden\n  Face a firing squad for your failures.\n\n*achievement delmarva_unready hidden 20 Broad and Fat and Loose in Stays\n  hidden\n  Fight the Delmarva before it is ready for battle.\n\n*achievement stern_rake hidden 20 HMS Sternraker\n  hidden\n  Rake the Delmarva's stern.\n\n*achievement treasure hidden 20 Cruise the Seas for Columbian Gold\n  hidden\n  Win a fortune in prize money.\n\n*achievement no_guns hidden 50 We'd Fire No Guns\n  hidden\n  Defeat the Delmarva without firing Foraker's main battery guns.\n\n*achievement no_tears hidden 50 Shed No Tears\n  hidden\n  Defeat the Delmarva without losing any officers in battle.\n\n*achievement high_guns visible 20 We'll Fight and We'll Conquer\n  Gunnery is an exact science, and key to victory.\n  Raise Foraker's Crew Gunnery skill above 90.\n\n*achievement high_sailing visible 20 'Tis to Glory We Steer\n  To defeat the enemy, one must first outsail them.\n  Raise Foraker's Crew Sailing skill above 90.\n\n*achievement high_morale visible 20 With One Heart Let Us Sing\n  In war, the moral outweighs the material by a factor of three to one.\n  Raise Foraker's Crew Morale above 90.\n\n*achievement high_sense visible 20 We'll Rant and We'll Roar\n  Showing your emotions reminds your crew that you are still human.\n  Raise your Sensibility over 80.\n\n*achievement low_sense visible 20 Hold Fast\n  To show emotion is to show weakness.\n  Raise your Composure over 80.\n\n*achievement high_gallantry visible 20 Heart of Oak\n  If a Captain knows fear, they must never show it.\n  Raise your Gallantry above 80.\n\n*achievement low_gallantry visible 20 The Better Part of Valor\n  A Captain must always know when to cut and run.\n  Raise your Discretion above 80.\n\n*achievement commodore hidden 20 The Broad Pennant\n  hidden\n  Be appointed commodore.\n\n*achievement knight hidden 20 Knight of the Vigil\n  hidden\n  Attain a knighthood.\n\n*achievement baronet hidden 50 Peer of the Realm\n  hidden\n  Be awarded a baronetage.\n\n*achievement death_victory hidden 50 Don't Give Up the Ship\n  hidden\n  Defeat the Delmarva in battle and die doing so.\n\n*achievement delmarva_capture hidden 20 A Frigate Neat and Handy-o\n  hidden\n  Capture the Delmarva.\n\n*achievement unimpressed hidden 20 Completely Unimpressed\n  hidden\n  Defeat the Delmarva without resorting to impressment.\n\n*achievement slavers hidden 20 Blood Money\n  hidden\n  It's amazing what the conscience of an Albionian officer goes for in wartime.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  *image cover.png center HMS Foraker\n  *comment This should just be *image, it looks better in nightmode as is.\n  Command a royal warship and destroy your enemies at sea! As a veteran navy captain in the world of Choice of Broadsides, you’ll fend off (smugglers, slavers, and) foes of the crown to seize your place in history.\n\n  [i]HMS Foraker[/i] is an 85,000 word interactive novel by Paul Wang, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  It’s 1813, and you’re a key sailor in the naval war between Columbia and Albion, where aggression is rewarded and cowardice can get you killed. If you seize enough treasure, you could be set for life – but hesitate against the enemy and you could end up facing the firing squad.\n\n  Board enemy ships and force them to surrender, or use your connections to stay out of the fray. Will you steer your crew to glory, or go down in infamous defeat? What mercy will you show your prisoners? Can you control your composure while fighting a war? Revenge yourself on old rivals and reward your allies for their devotion. And whatever you do…\n\n  Don’t give up the ship!\n\n  • Serve the queen or the king, with an all-male or all-female crew.[n/]\n  • Captain the powerful warship HMS Foraker.[n/]\n  • Train your crew for combat, with kindness or cruelty.[n/]\n  • Parley with smugglers, slavers, and other unsavoury characters for tactical advantage or personal gain.[n/]\n  • Inspire devotion from your crew, or sway your superiors back home.[n/]\n  • Confront storms, accidents, and other maritime disasters.[n/]\n  • Master the balance between bravery and cowardice, cunning and folly.[n/]\n  • Win glory, treasure, promotion, a knighthood, or even a noble title.\n\n  *if choice_prerelease\n    [i]You can play the first chapter of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the first chapter now for free.\n        *goto purchased\n  *elseif choice_is_steam\n    [i]You can play the first chapter of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2025-11-20 $4.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]Choice of Broadsides: HMS Foraker[/i] is supported by advertisements, but you can buy the unlimited version\n      to turn off ads forever.\n      \n      *purchase_discount adfree 2025-11-20 $4.99 $2.99 purchased\n      *page_break_advertisement\n\n      *goto purchased\n    *else\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase_discount adfree 2025-11-20 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n\n*label purchased\n\n\n\n\n\n\n*image cover.png center HMS Foraker\n*comment This should just be *image, it looks better in nightmode as is.\n*page_break\n[i]\"I don't have to point out that any ambitious young officer would jump at the chance of serving in a frigate.\"[/i]\n*line_break\n-C.S. Forester, [i]Mr. Midshipman Hornblower[/i]\n*page_break\n*text_image intro.png center The year is 1813, in a world much like our own. In a far corner of the world, the crew of an Albion Royal Navy frigate closes in on their quarry. They are about to make their mark on history. This is their story.\n*page_break\n*goto_scene prologue\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
      const handler = DISPATCH[cmd];
      if (handler === undefined) {
        if (NOOP_COMMANDS.has(cmd)) return;
        throw this._err("Non-existent command '" + cmd + "'");
      }
      handler.call(this, data, line);
    }

    _printText(text) { this._para.push(stripMarkup(this.replace_variables(text))); }

    _flushParagraph() {
      if (this._para.length) {
        let joined = this._para.filter((p) => p !== "").join(" ");
        joined = joined.replace(/[ \t]+/g, " ").replace(/ *\n */g, "\n").trim();
        if (joined) this.io.text(joined);
      }
      this._para = [];
    }
  }

  // ---- command handlers (mirror engine._cmd_*) ---- //
  const E = Engine.prototype;

  E._evalLiteral = function (expr, line) {
    if (expr === "") throw this._err("no value specified: " + line.text);
    return this.evaluator.evalString(expr);
  };

  E._cmd_create = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    this.stats[variable] = this._evalLiteral(m[2].trim(), line);
    return false;
  };

  E._cmd_temp = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const rest = m[2].trim();
    this.temps[variable] = rest ? this._evalLiteral(rest, line) : null;
    return false;
  };

  E._cmd_create_array = function (data, line) { this._defineArray(data, line, false); return false; };
  E._cmd_temp_array = function (data, line) { this._defineArray(data, line, true); return false; };

  E._defineArray = function (data, line, temp) {
    const m = /^(\w+)([\s\S]*)$/.exec(data);
    if (!m) throw this._err("Invalid array instruction, no name specified: " + line.text);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const stack = tokenize(m[2].trim());
    if (!stack.length) throw this._err("Invalid array instruction, missing length: " + line.text);
    let length = Math.trunc(toNum(this.evaluator.evalValueToken(stack)));
    if (length < 1) throw this._err("Invalid array instruction, length must be a whole number > 0");
    let values = [];
    while (stack.length) values.push(this.evaluator.evalValueToken(stack));
    if (!values.length) throw this._err("Invalid array instruction, no value specified: " + line.text);
    if (values.length === 1) { const v = values[0]; values = new Array(length).fill(v); }
    else if (values.length !== length)
      throw this._err("array expected 1 or " + length + " values, got " + values.length);
    const target = temp ? this.temps : this.stats;
    for (let i = 0; i < length; i++) target[variable + "_" + (i + 1)] = values[i];
    target[variable + "_count"] = length;
  };

  E._cmd_set = function (data, line) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    if (!stack.length) throw this._err("Invalid set instruction, no expression: " + line.text);
    this._applySet(variable, stack);
    return false;
  };

  E._cmd_setref = function (data, line) {
    const stack = tokenize(data);
    const variable = String(this.evaluator.evalValueToken(stack)).toLowerCase();
    this._requireVar(variable);
    this._applySet(variable, stack);
    return false;
  };

  E._applySet = function (variable, stack) {
    // Leading operator => implicitly based on the variable's current value.
    if (stack.length && (stack[0].name === "OPERATOR" || stack[0].name === "FAIRMATH")) {
      stack.unshift(new Token("VAR", variable, "(implicit)"));
    }
    this.set_var(variable, this.evaluator.evalTokens(stack));
  };

  E._cmd_delete = function (data) {
    const variable = String(this.evaluator.evaluateReference(tokenize(data)));
    delete this.temps[variable];
    delete this.stats[variable];
    return false;
  };

  E._cmd_rand = function (data) {
    const stack = tokenize(data);
    if (!stack.length) throw this._err("Invalid rand statement, expected: varname min max");
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    const minimum = this.evaluator.evalValueToken(stack);
    const maximum = this.evaluator.evalValueToken(stack);
    if (stack.length) throw this._err("Invalid rand statement, expected three args");
    const lo = toNum(minimum), hi = toNum(maximum);
    const diff = hi - lo;
    if (diff < 0) throw this._err("rand min must be <= max: " + lo + " > " + hi);
    if (diff === 0) this.set_var(variable, lo);
    else if (Number.isInteger(lo) && Number.isInteger(hi))
      this.set_var(variable, lo + Math.floor(this._rng() * (diff + 1)));
    else this.set_var(variable, lo + this._rng() * diff);
    return false;
  };

  E._requireVar = function (variable) {
    if (!(variable in this.temps) && !(variable in this.stats))
      throw this._err("Non-existent variable '" + variable + "'");
  };

  // ---- control flow ---- //

  E._cmd_goto = function (data) { this._gotoLabel(this._resolveLabelName(data)); return true; };
  E._cmd_gotoref = function (data) {
    this._gotoLabel(String(this.evaluator.evalString(data)).toLowerCase()); return true;
  };
  E._resolveLabelName = function (data) {
    if (/[\[\{]/.test(data)) return String(this.evaluator.evaluateReference(tokenize(data)));
    return String(data).toLowerCase();
  };
  E._gotoLabel = function (label) {
    if (!(label in this.scene.labels)) throw this._err("bad label " + label);
    this.line_num = this.scene.labels[label];
    this.indent = this.scene.lines[this.line_num].indent;
  };
  E._cmd_label = function () { return false; };

  E._cmd_if = function (data) {
    if (truthy(this.evaluator.evalString(data))) this.indent = this._nextNonblankIndent();
    else this._skipBranch(false);
    return true;
  };
  E._cmd_else = function (data) {
    if (data) {
      if (/^if\b/.test(data)) throw this._err("'else if' is invalid, use 'elseif'");
      throw this._err("nothing should appear on a line after 'else': " + data);
    }
    this._skipBranch(true);
    return true;
  };
  E._cmd_elseif = function () { this._skipBranch(true); return true; };

  E._nextNonblankIndent = function () {
    const lines = this.scene.lines;
    let i = this.line_num + 1;
    while (i < lines.length && lines[i].is_blank) i += 1;
    return i < lines.length ? lines[i].indent : this.indent;
  };

  E._skipBranch = function (inElse) {
    const startIndent = this.indent;
    let nextIndent = null;
    const lines = this.scene.lines;
    while (true) {
      this.line_num += 1;
      if (this.line_num >= lines.length) return;
      const line = lines[this.line_num];
      if (line.is_blank) continue;
      const indent = line.indent;
      if (nextIndent === null) {
        if (indent <= startIndent) throw this._err("expected at least one line in 'if' true block");
        nextIndent = indent;
      }
      if (indent <= startIndent) {
        let parsed = null;
        if (indent === startIndent && line.command) parsed = [line.command.toLowerCase(), line.arg.trim()];
