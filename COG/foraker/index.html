  #\"I shall be lenient: two months stoppage of rum.\"\n    *set c_morale %-5\n    *set c_gunnery %+5\n    *set gosub_index 200\n    *gosub_scene gosub\n    *if confession = true\n      Lewis's shoulders sag in relief, even as Bartlett seems to seize up.\n    *if confession = false\n      Lewis's shoulders sag in relief.\n    \n    \"Thank you, ${pronoun_5},\" Lewis replies gratefully. \"I will not make you regret this.\"\n    *page_break\n    $!{pronoun_1} does not.\n    \n    Over the course of the next few days, Lewis's section seems even more tightly-run than before. Every moment of their idle time is given over to drill, and it seems the section makes every extra effort to go beyond what is required of them, almost as if they are straining to the utmost to maintain themselves in your good graces.\n    \n    Yet the rest of the crew is a different story. \n    *if confession = true\n      Much of the company had already known what Lewis was up to, but your unwillingness to punish it severely has spread disaffection. The captain is the sovereign of ${pronoun_2} ship, but as the bloody fate of the Gaulish monarchy reminds you, a sovereign who turns a blind eye to abuse may not find ${pronoun_2} throne a steady one.\n      \n      It is an analogy which cannot help but linger in your mind.\n    *if confession = false\n      Much of [i]Foraker[/i]'s company seem dissatisfied with Lewis' punishment, not because of its severity, but rather its lack of it. \n      \n      You can only wonder if they know something you don't.\n    *return\n  #\"A dozen lashes ought to be punishment enough.\"\n    *set c_morale %+5\n    *set c_gunnery %-5\n    *set gosub_index 200\n    *gosub_scene gosub\n    Lewis accepts the verdict with a tight-lipped stoicism. \n    *if confession = true\n      In between the confession ${pronoun_1} has given you and the lashes ${pronoun_1} is about to receive, you do not think ${pronoun_1}'s bullying shall be a problem again.\n    *if confession = false\n      If ${pronoun_1} is truly guilty of what you believe ${pronoun_3} to be, then ${pronoun_1} shows no sign of it.\n    *comment endif\n    \n    On the day of the punishment, the gunner's mate takes ${pronoun_2} lashes with as much dignity as ${pronoun_1} can muster.\n    *if confession = true\n       However, Lewis's suffering elicits little sympathy from the ship's company gathered to watch. Many of them have apparently known of Lewis's practices for some time, and watch the proceedings with the evident satisfaction of knowing that aboard this ship, abuse of power is not to be tolerated.\n    *if confession = false\n      Yet strangely enough, the rest of the ship's company seem to have little sympathy. For some reason, many of them actually seem to be watching with some degree of satisfaction. Perhaps they are privy to something you are not.\n    \n    The gunner's mate ${pronoun_3}self returns to duty with the utmost sullenness. The performance of ${pronoun_2} section suffers, as you might have expected it to, but if the opinion of the rest of the crew is any indication, then it is a small price to pay for justice.\n    *return\n  *if confession = false\n    #\"It's worse to scapegoat others than to commit a crime yourself. Disrate Lewis and give ${pronoun_3} a dozen lashes.\"\n      *goto gosub_event_grog_lewis_1\n  *if confession = true\n    #\"A thief is bad, a blackmailer doubly so. Disrate Lewis and give ${pronoun_3} a dozen lashes.\"\n      *label gosub_event_grog_lewis_1\n      *set c_morale %+10\n      *set c_gunnery %-10\n      *set gosub_index 200\n      *gosub_scene gosub\n      Lewis knows better than to beg, but you see the light behind ${pronoun_2} eyes go out when you order ${pronoun_3} disrated. With a word, you have erased decades of service, and hurled Lewis from a place near the top of the ship's hierarchy to its very bottom.\n    \n      By the day of the punishment itself, the lashes are laid on almost as a formality. The former gunner's mate is broken, and whatever spirit ${pronoun_1} had is long gone by the time ${pronoun_1} is cut down from the gratings and sent to ${pronoun_2} new post among the lowliest lands${gender}.\n      *page_break\n      Under normal circumstances, such a harsh punishment for stealing spirits might have elicited grumbling or disaffection,\n      *if confession = true\n        but enough of [i]Foraker[/i]'s crew know of the full measure of Lewis's abuses, and those who were ignorant of it before certainly know now. Most see the punishment as just desserts for a notorious bully, and proof that such petty tyrants are not tolerated aboard your ship.\n      *if confession = false\n        yet [i]Foraker[/i]'s company seem to welcome Lewis's punishment. Perhaps the former gunner's mate was more unpopular than you had imagined. Perhaps Bartlett's story was true after all. In any case, your gamble appears to have paid off, at least where the spirits of the vast majority of the crew are concerned.\n      *comment endif\n    \n      Lewis's former section is, of course, another story. For all of ${pronoun_2} faults, ${pronoun_1} had been a superb gunner, and although they are free from their former leader's grip, the ${gender} who had once been under Lewis's command now seem to fall apart without the common fear of their shared antagonist. \n      *return\n\n*label gosub_event_teach\n*page_break\nOne afternoon, you find a long stretch of solitude upon the quarterdeck interrupted by the arrival of Lieutenant $!{lieutenant}, with the [i]Foraker[/i]'s half-dozen midship${gender} in tow.\n\n*if lieutenant = \"fisher\"\n  \"Beg pardon, ${pronoun_5},\" Fisher reports. \"The middies have finished their lessons early today. They've made tremendous progress, every single one of them, even Blanchard, if you would believe it.\"\n*if lieutenant = \"simpson\"\n  \"Begging your pardon, ${pronoun_5},\" Simpson reports. \"The middies have finished their lessons, with three hours to spare. Even Blanchard is keeping up now.\"\n*if lieutenant = \"shannon\"\n  \"Begging your pardon, ${pronoun_5},\" Shannon reports. \"The middies have completed their lessons for the day already. They are all showing immense progress. Even Blanchard has caught up with the others.\"\n*if lieutenant = \"pakenham\"\n  \"If one might beg your pardon, ${pronoun_5},\" Pakenham reports, \"One would like to announce that these young gentle${gender} have far exceeded one's expectations in their lessons. They have exhausted the day's itinerary, and with three hours to spare.\"\n*comment endif\n\nYou feel your eyebrow rise. It is a regular thing for whoever is in charge of your midship${gender} for the day to report when the day's lessons have been completed, but three hours early? That is a wonder. \n\n\"And what, pray tell, have you been teaching them?\" you ask.\n\n$!{lieutenant} opens ${pronoun_2} mouth to answer, but a high-pitched voice behind ${pronoun_3} beats ${pronoun_3} to it. \"The taking of the [i]Lynx[/i], ${pronoun_5}!\"\n\nSo history was today's subject, and fitting history at that given your circumstances. You turn to the young officer—the child really—who had piped up. \"And what would you know about the [i]Lynx[/i], $!{pronoun_4} Blanchard?\"\n\n\"The Gaulish frigate [i]Lynx[/i], forty four guns,\" Blanchard recites. \"Launched 1799, taken on November 29th, 1803, in a frigate action off the Rum Islands by HMS [i]Dauntless[/i], thirty eight guns. Bought and commissioned into service as HMS [i]Lynx[/i].\"\n\nBlanchard's facts seem to be in order, and after a few more moments of quizzing, the others seem to have learned their lessons as well. \n\n\"$!{pronoun_5},\" Markham, one of the older midship${gender}, interjects worriedly as you finish your impromptu test, \"is it true that we are also going to have a frigate action soon?\"\n*fake_choice\n  #\"I would very much like to think so, $!{pronoun_4} Markham.\"\n    *set gallantry %+5\n    *set sensibility %+5\n    Some of the younger midship${gender} let out an eager cheer at that, loud enough to turn the heads of some of the hands on deck. The older ones are more subdued. They have seen what an engagement with a superior opponent looks like before, and they know that all the glory of battle comes with a cost.\n  #\"Perhaps, I would certainly accept one if offered.\"\n    *set gallantry %+5\n    *set sensibility %-5\n    The younger midship${gender} let out a cheer. Their elders are more subdued. Battle against a superior opponent brings glory, yes, but it also brings death, the older middies have already seen their fair share of that.\n  #\"I should hope not, unless the odds were in our favor.\"\n    *set gallantry %-5\n    *set sensibility %+5\n    The younger middies look a little disappointed at your answer, but the older ones nod sagely. They understand that though the service might require you to accept battle in whatever form it is offered, it is not cowardice to seek the best possible odds.\n  #\"Not unless one is forced upon us.\"\n    *set gallantry %-5\n    *set sensibility %-5\n    The younger middies look a little disappointed at your answer, but the older ones nod sagely. If you are forced to give battle, the traditions of the service will demand that you fight. But they, like you, have no desire to see [i]Foraker[/i] added to the ranks of HMS [i]Chevalier[/i], or any of the other frigates lost to superior Columbian forces.\n*set gosub_index 200\n*gosub_scene gosub\n\nFor a moment, the midship${gender} chatter amongst themselves, but that does not occupy them for long. Blanchard looks back up to you. \"Have you ever been in a frigate action before, ${pronoun_5}?\"\n\n\"I have,\" you reply truthfully. \"Many times, in fact.\"\n\nThat gets Blanchard's full attention, and the attention of ${pronoun_2} fellows too. \"What is it like?\" Markham asks.\n*choice\n  #\"When two ships are evenly matched, it becomes a matter of gunnery…\"\n    *if gunnery >= 55\n      *set c_morale %+5\n      *set c_gunnery %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      [i]Foraker[/i]'s midship${gender} may be young, but they are not untrained lands${gender}. They know the fundamentals of gunnery well enough, but that does not mean that they have anywhere near the experience and practical expertise you do.\n      \n      Over the next three hours, you do your best to impart some of your vast knowledge onto them. As they sit enthralled, you explain why Gaulish and Columbian gunners fire on the uproll while Albionian ones are trained to fire on the downroll, why a gun's point of aim shifts as it grows hotter with repeated firing, and a thousand other things you have picked up in your years of service.\n      \n      When night finally falls and your young students are called to supper, they retreat chattering excitedly to each other about what you have taught them. You look on with a deep satisfaction. Not only have the midship${gender} have learned much today, but their knowledge will make them more effective when laying the guns, and their high spirits will likely spread to the ${gender} under their command.\n      \n      The improvement may seem minor, but given your current assignment, you may need every advantage you can get.\n      *return\n    *else\n      *set c_morale %-5\n      You try your best to offer some advice on the matter of gunnery to the young officers, but every piece of information you offer proves to have been one which the midship${gender} are already aware of. More embarrassingly, you encounter some trouble satisfactorily answering the questions they ask in return.\n      \n      In the end, the midship${gender} go to supper disappointed, and you find yourself burdened with a severe sense of inadequacy.\n      *return\n  #\"One ship must outmaneuver the other to gain decisive advantage…\"\n    *if sailing >= 55\n      *set c_morale %+5\n      *set c_sailing %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      [i]Foraker[/i]'s midship${gender} have all been at sea long enough to know the rudiments of sailing and navigation, but it is one thing to know and another to have the deep knowledge which comes from years at sea aboard one of $!{pronoun_2} Majesty's ships.\n      \n      For the next three hours, you do your best to share some of that knowledge. You delve into the details of naval tactics, of how to 'double' an enemy line of battle and subject it to fire from two sides, of the exact effects of stern and bow raking, of the effects of a ship's cannon upon its balance in the water, and a thousand other things which come only from long experience and a lifetime of battle.\n      \n      When the bell finally calls your midship${gender} to supper, they head off chattering happily to each other about what you have taught them. You look on with a deep satisfaction. Not only have the midship${gender} have learned much today, but their knowledge will make them more effective members of [i]Foraker[/i]'s company, and their high spirits will likely spread to the ${gender} under their command.\n      \n      The improvement may seem minor for the moment, but given your current assignment, you may need every advantage you can get.\n      *return\n    *else\n      *set c_morale %-5\n      You try your best to teach what you know of naval tactics and sailing under fire, but every lesson you offer ends up being something your young audience already knows. Worse yet, when the midship${gender} respond with questions of their own, you find some difficulty answering them to their satisfaction.\n      \n      In the end, the midship${gender} go to supper disappointed, and you find yourself burdened with a severe sense of inadequacy.\n      *return\n  #\"The character of the captain and ${pronoun_2} officers is key…\"\n    *if leadership >= 55\n      *set c_morale %+15\n      *set gosub_index 200\n      *gosub_scene gosub\n      The majority of a midship${gender}'s instruction focuses on the technical aspects of service at sea: gunnery, navigation, sailing, geography and so on. Yet there is also another aspect, one which is not so much taught as imparted through the experience of commanding gun sections and top watches: the art of leadership.\n      \n      There is no lesson plan which might instill the qualities of a good leader into a mind, but there is plenty of advice you might offer to prevent your midship${gender} from becoming bad ones. You tell your enthusiastic audience of the captains which flogged too little, or too much; of those who not only proved cowards, but worse yet, showed their cowardice before their crews. For three hours, you explain the common failures of command you have seen in your years of experience as a sea officer.\n      \n      When the bell finally calls your midship${gender} to supper, they head off in a state of happy animation, excitedly discussing with each other the things you have taught them. You look on with a deep satisfaction. Not will [i]Foraker[/i]'s midship${gender} hopefully avoid the mistakes made by other, less fortunate officers, but the refinement of their ability to lead can only have salutary effects upon the sections of the crew which they command in their capacity as warrant officers.\n      \n      The improvement may seem minor for the moment, but given your current assignment, you may need every advantage you can get.\n      *return\n    *else\n      *set c_morale %-5\n      You try your best to offer what advice you can regarding the command of a ship and the leadership of ${ship_pronoun_2} ${gender}, but your best proves less than adequate. For every example you cite, the midship${gender} deliver counter-examples with all the tactlessness and precociousness of youth. Your lesson degenerates into a confusion, and nobody learns much of anything.\n      \n      In the end, the midship${gender} go to supper disappointed, and you find yourself burdened with a profound sense of your own inadequacy as a leader.\n      *return\n  #\"If you can carry the other ship by boarding, nothing else matters…\"\n    *if fighting >= 55\n      *set c_morale %+15\n      *set gosub_index 200\n      *gosub_scene gosub\n      Personal combat is not a subject often touched upon in a midship${gender}'s instruction. Generally, it is expected that a young officer learn to fight through first-hand experience. However, you cannot help but find it an oversight not to offer your young charges at least some instruction on the use of cutlass, pistol, and the difficult practice of fighting with both weapons in tandem.\n      \n      Over the next three hours, you turn the quarterdeck into an improvised fencing studio. As your midship${gender} watch enthralled, you show them how to keep their footing on a narrow beam, how to fight with the guard of a cutlass to best advantage, and how to pick the right moment to jump from one pitching deck to another. Then, you invite volunteers to duplicate your movements.\n      \n      When the bell finally calls your midship${gender} to supper, they head off exhausted, but in high spirits. You look on with a deep satisfaction. Not only have the midship${gender} have learned much today, but you know that the ${gender} tend to be more confident when in the charge of an officer who can show that they know how to fight. \n      \n      The improvement may seem minor for the moment, but given your current assignment, you may need every advantage you can get.\n      *return\n    *else\n      *set c_morale %-5\n      You try your best to teach your midship${gender} something of the principles of personal combat. Unfortunately, though you can explain the theory readily enough, you are far less successful when attempting to demonstrate the relevant actions in practice. Indeed, it seems that you only really succeed in making an ass of yourself as you repeatedly overbalance, trip yourself up, and fumble about,\n      \n      The midship${gender} are amused, at first. Then, they become apprehensive, and finally, disappointed. When the bell finally calls them away for supper, you are left feeling an acute sense of your own inadequacy.\n      *return\n      \n*label gosub_event_spar\n*page_break\n*set spar_fixed false\nThe next morning, $!{master} Burroughs comes to you with a worried look. \n\n\"The mainsail spar looks poorly, ${pronoun_5},\" ${pronoun_1} reports. \"I'd like to bring it down and have it replaced, with your permission.\"\n\nYou look up at the spar in question, and the expanse of canvas it holds up.\n*if sailing >= 60\n  At first, the wood only looks a little worn, but closer inspection shows you that the damage is likely worse than it looks. \n*if sailing \u003c 60\n  The spar certainly looks worn, but there's nothing which indicates it is in danger of breaking. Yet Burroughs has been at sea for as long as you have been alive, and if ${pronoun_1} says the spar is about to break…\n*comment endif\n\nWell, this is a fine predicament.\n\nThe mainsail is the largest sail the [i]Foraker[/i] has. If that spar snaps, then [i]Foraker[/i]'s ability to maneuver would be heavily compromised. Yet replacing a spar of that size is no small or simple task. Normal procedure would call for the ship to be anchored securely before a tackle can be rigged to take down the old spar and replace it with a new one. \n*if chapnum = 1\n  The process could take days, time which you may not have.\n*if chapnum = 2\n  The process could take days. If the [i]Delmarva[/i] uses that time to augment ${pronoun_2} company and armament, or worse, choose to sortie while [i]Foraker[/i] is still under repair…\n\nBurroughs looks to you for a decision. \"$!{pronoun_5}?\"\n*choice\n  #\"We shall have to chance it, and hope the spar holds.\"\n    Burroughs shoots another dubious look at the mainmast. \"Aye-aye, ${pronoun_5}.\"\n    \n    With that, your sailing ${master} returns to ${pronoun_2} duties, leaving you once again alone on the quarterdeck.\n    *return\n  #\"Very well, let us have that spar repaired.\"\n    *set spar_fixed true\n    *set date + 3\n    *if chapnum = 1\n      *set date + 1\n      It takes a day for Burroughs to get [i]Foraker[/i] to a decent anchorage. Only then does the real work begin.\n    \n    *comment endif\n    To replace a mainmast spar requires the attention and efforts of most of the officers and much of the crew. It takes the strength of dozens of ${gender} to lower the spar, and dozens more to fashion a new one out of the timber and parts carried in the [i]Foraker[/i]'s hold. \n    \n    *if chapnum = 1\n      Only a small portion of [i]Foraker[/i]'s company remain on watch for any approaching threats from land or sea. Thankfully, your three days under repair pass under incident, and as soon as practicable, you order [i]Foraker[/i] underway again.\n    *if chapnum = 2\n      Only a small portion of [i]Foraker[/i]'s company can be spared to remain on watch. If the [i]Delmarva[/i] or ${ship_pronoun_2} consorts were to sortie now, then you would be in no position to intercept ${ship_pronoun_3}, let alone fight ${ship_pronoun_3}. \n      \n      Thankfully, the iron-black hulls remain in Trimountaine Harbor, their sails furled, until your repairs are completed.\n    *return\n  #\"We've not the time, brace the spar and hope for the best.\"\n    Burroughs touches ${pronoun_2} fingers to ${pronoun_2} hat, yet cannot help but shoot another dubious look at the mainmast. Reinforcing the weak spar with a few pieces of timber might be enough to keep it in one piece until you can replace it for good, or it might prove to be of no use whatsoever.\n    \n    Still, the work takes less time than taking down the entire spar\n    *if chapnum = 1\n      and it can be done under sail too.\n    *if chapnum = 2\n      and it only requires a dozen hands to see it done.\n    *comment endif\n    \n    Within a few hours, the weak section of the spar is firmly splinted with two thick lengths of oak planking and a cocoon of six-inch line. Thus bolstered, the spar should hold until after your orders are fulfilled.\n    \n    You hope.\n    *if c_sailing >= 50\n      *set spar_fixed true\n      *return\n    *else\n      *return\n\n*label gosub_event_fight\n*page_break\nYou are doing your rounds below deck when you hear a commotion rising from the cable tier. You descend to find the room filled with ${gender}, perched atop the massive coils of hemp cable and packed against the outer bulkheads shoulder to shoulder. A full quarter of the crew must be down here. \n\nThe only clear space remaining is a rough ring in the center. There, a pair of figures, both stripped to the waist, face off against each other, their knuckles wrapped in canvas. One lunges for the other, throwing punches at ${pronoun_2} opponent's face. The other ducks and weaves with remarkable agility, deflecting every blow ${pronoun_1} does not dodge. Then, with a sudden reversal, the defender turns the tables, ducking below ${pronoun_2} adversary's last blow, and delivering a hard upper cut.\n\nThe blow hits hard. Its recipient totters backwards as if drunk, then tumbles to the deck with a crash.  \n\nA figure steps out of the crowd. You recognize ${pronoun_3} as Morris, the surgeon's mate. \"That's it!\" ${pronoun_1} shouts, voice clear over the cacophony. \"We have a winner!\"\n\nCheers of joy mingle with groans of dismay. The victor retreats into the raucous throng. The loser is dragged away by ${pronoun_2} mates into the darkness.\n\nThen Morris notices you, and you see ${pronoun_3} eyes go wide.\n*page_break\n\"It's just a bit of fun, ${pronoun_5},\" Morris explains when you pull ${pronoun_3} away from the crowd. \"It keeps the ${gender} in high spirits, lets them vent any frustrations they might have. Surely, there is no harm in it!\"\n\n\"Except for the bruises, cuts, and broken bones,\" you point out.\n\nThe surgeon's mate frowns. \"Well yes, there are those, but I have yet to see an injury which has not healed quickly, and the ${gender}, ${pronoun_5}! Listen to how they cheer! Fights like these are a healthier alternative to drink or gambling, and it raises the ${gender}'s spirits so readily. Surely a few scrapes and cuts are a small price to pay for that!\"\n\nScrapes and cuts, perhaps, but there is no guarantee that more of these fights will not lead to worse injuries. Such a hurt taken by a lands${gender_2} might be of little notice, but a gunner's mate with a broken arm or a sergeant of marines with a cracked skull is a different matter. [i]Foraker[/i]'s company relies on its petty officers to function. Losing one, even temporarily, would could be to the whole ship's detriment.\n\nYet Morris does have a point. The fights do seem to be doing a great deal for morale, and you have no doubt that putting a stop to them will have the exact opposite effect. \n\nThe surgeon's mate waits for your answer nervously. Behind ${pronoun_3}, the cable tier is silent. They too, await your decision.\n*choice\n  #\"These fights will cease, immediately.\"\n    *set c_morale %-5\n    Morris' face falls, but there is little ${pronoun_1} can do about it. You are the captain, and orders are orders.\n    \n    A chorus of disappointed groans rises from the cable tier as the surgeon's mate delivers the news of your decision.\n    \n    The fights stop. Some ${gender} grumble, but that seems to be the end of it.\n    *return\n  #\"The matches shall continue, with my compliments.\"\n    *set c_morale %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    A volley of cheers erupts from the cable locker as Morris leaves to convey your endorsement. \n    \n    Hopefully, you have made the right decision.\n    *page_break\n    The fights continue, but now they do so with your blessing. Without having to fear being punished, the audiences grow larger and larger. The matches become a regular occurrence, providing some extra excitement and entertainment for the crew.\n    \n    There are injuries of course, and not just the minor scratches which Morris had predicted. \n    *temp injury 1\n    *rand injury 1 2\n    *if injury = 1\n      *set c_sailing %-5\n      One of your top${gender} breaks a wrist in one particularly contentious match. Another is pummeled so hard that ${pronoun_2} nearly loses the use of an arm. Both will not be fit for service again for weeks, if not months.\n    *if injury = 2\n      *set c_gunnery %-5\n      One of your gunner's mates falls hard in one particularly hard-fought match, cracking ${pronoun_2} skull. Your surgeon assures you that ${pronoun_1} will not be fit to return to ${pronoun_2} gun section for weeks if not months.\n    *comment endif\n    \n    Yet a few injuries are a small price to pay for the positive effect the fights have on morale. The ship's company is animated with a new enthusiasm, and an aggressive spirit which will serve you all well when it comes time to fight the enemy.\n    *return\n  #\"Organize a tournament, with my blessing. A guinea to the winner.\"\n    *set c_morale %+15\n    *set c_gunnery %-5\n    *set c_sailing %-5\n    *set gosub_index 200\n    *gosub_scene gosub\n    Morris runs back excitedly to convey your decision. The wild thunder of cheers that greets it is loud enough to summon a pair of marines from the maindeck, bayonets fixed in fear of an incipient riot.\n    \n    Even if you have made the wrong decision, the crew certainly will not fault you for it.\n    *page_break\n    The day of the tournament itself proves a bloody affair. Three of your top${gender} leave the ring with severe injuries. So does a gunner's mate, and at least two corporals of marines. [i]Foraker[/i]'s company will certainly miss their presence as they recover.\n    \n    Yet when the victor, a battered and bloody carpenter's mate, staggers up to claim ${pronoun_2} guinea, the crew cheers as much for you as it does for ${pronoun_3}.\n    *return\n    \n*label gosub_event_train_good\n*page_break\n*if training = \"gunnery\"\n  *set c_gunnery %+5\n  Gunnery training goes particularly well over the next few days. Something has rendered the ${gender} particularly well-disposed to the work, at least for a while. \n  *if gunnery >= 65\n    *set c_gunnery %+5\n    You take advantage of this sudden increase in enthusiasm by intervening with your own expertise, offering advice or tutelage where you can.\n  *comment endif\n  \n  In such a happy state, [i]Foraker[/i]'s gun crews cannot help but improve with remarkable facility. Within a handful of days, they achieve a level of proficiency in exercising the guns that you had not expected to reach for at least another week or two. \n  *goto gosub_event_train_good_2\n*elseif training = \"sailing\"\n  *set c_sailing %+5\n  Sail drill proceeds particularly well over the next few days. The crew seems animated by a fresh wave of enthusiasm as they work the lines and climb the shrouds again and again.\n  *if sailing >= 65\n    *set c_sailing %+5\n    Needless to say, you try to make the most of this fleeting enthusiasm by intervening with your own expertise where you can, offering advice where warranted and tutelage where welcomed.\n  *comment endif\n  \n  In such a happy state, the state of the company's expertise cannot help but increase tremendously. Before long, they reach a level of proficiency in working the sails that you had not expected to reach for weeks.\n  *goto gosub_event_train_good_2\n*else\n  *set c_morale %+5\n  Morale increases dramatically over the next few days, even more so than you might have expected. The ${gender} seem more cheerful and respond to orders with an alacrity which you have never seen.\n  \n  *if leadership >= 65\n    *set c_morale %+5\n    You do your best to encourage the mood, offering encouragement where you can and commending those who behave particularly well in the hopes that such measures will cause this happy state to last.\n    *goto gosub_event_train_good_2\n  *elseif fighting >= 65\n    *set c_morale %+5\n    You do your best to put the crew's enthusiastic energy to good use. You organize extra singlestick training, and lessons on boarding tactics besides, ensuring that you put this unexpected good mood to some profitable use.\n    \n    Soon, you may have need of the dividends of such measures.\n    *goto gosub_event_train_good_2\n  *else\n    *goto gosub_event_train_good_2\n*label gosub_event_train_good_2\n*set gosub_index 200\n*gosub_scene gosub\n\nNaturally, such a happy state would merit some kind of reward, to encourage further good conduct. However, material encouragement that proves too stingy may only breed resentment, while too much might breed complacency. It would take a deft hand to ensure that any positive reinforcement does as it is intended.\n\nPerhaps it is better not to push your luck.\n*choice\n  #Give rewards to the crew for good conduct.\n    *if leadership >= 55\n      It does not take you long to think up of an appropriate reward for the crew: a pound of tobacco for \n      *if training = \"morale\"\n        *set c_morale %+10\n        those who perform the best during stick drills.\n      *if training = \"sailing\"\n        *set c_sailing %+10\n        the fastest up the rigging and those who particularly distinguish themselves by their conduct in the tops.\n      *if training = \"gunnery\"\n        *set c_gunnery %+10\n        the gun crew which can run out their cannon the fastest.\n      It proves an inspired choice. Tobacco does not dull the wits as an excess of grog does, and it is often traded as currency in the confines of the gundeck, meaning it has value even to those who do not smoke or chew the stuff. \n      \n      Training takes on a fierce, competitive quality, as the entire ship seems engrossed in honing their skills for that much-prized lump of brown fiber.\n      *set gosub_index 200\n      *gosub_scene gosub\n      *return\n    *else\n      You decide on offering a double ration of grog to \n      *if training = \"morale\"\n        *set c_morale %-5\n        those who perform the best during stick drills.\n      *if training = \"sailing\"\n        *set c_sailing %-5\n        the fastest up the rigging and those who particularly distinguish themselves by their conduct in the tops.\n      *if training = \"gunnery\"\n        *set c_gunnery %-5\n        the gun crew which can run out their cannon the fastest.\n      *comment endif\n      \n      Unfortunately, your choice of reward proves rather short-sighted. Extra grog is a much sought-after prize, but it also dulls the wits when consumed in excess. While a lively competition does begin to form in pursuit of the extra ration, those who win it rarely maintain their performance the next day.\n      *set gosub_index 200\n      *gosub_scene gosub\n      *return\n  *if training != \"morale\"\n    #I mean to take advantage of the current atmosphere to train the ${gender} harder.\n      You use the crew's contented nature as an excuse to drive them harder. You order yet more hours of\n      *if training = \"sailing\"\n        *set c_morale %-5\n        *set c_gunnery %+10\n        sail drill,\n      *if training = \"gunnery\"\n        *set c_morale %-5\n        *set c_gunnery %+10\n        gunnery drill,\n      not even allowing the crew time for leisure. \n      \n      The practice quickly bears fruit. Performance increases dramatically, though it comes at the cost of the happy state which had allowed you to push the ${gender} so hard in the first place.\n      *set gosub_index 200\n      *gosub_scene gosub\n      *return\n  *if training = \"morale\"\n    #Perhaps further measures might raise the crew's spirits yet further?\n      *set c_morale %+15\n      *set c_gunnery %-5\n      *set c_sailing %-5\n      You take advantage of the crew's fine spirits by endeavoring to raise them further. You allow them more time for leisure and sleep, even at the expense of their regular sail and gunnery drills.\n      \n      It works. Though the gunnery crews and top${gender} become a little more sluggish than before, morale increases dramatically over the next few days.\n      *set gosub_index 200\n      *gosub_scene gosub\n      *return\n  #I'll not meddle: things will continue as before.\n    Yes, the dynamics of the crew aboard a ship at sea is are a complex interplay of causes and effects, ones which you have not gained a full grasp of, even after so long at sea.\n    \n    You decide it is best not to tinker with them.\n    *set gosub_index 200\n    *gosub_scene gosub\n    *return\n\n*label gosub_event_train_bad\n*page_break\n*if training = \"gunnery\"\n  Gunnery training goes poorly over the next few days. The crew simply do not seem to have the energy for it, though they perform their regular duties well enough.\n  \n  *if gunnery >= 65\n    *set c_gunnery %-4\n    You try your best to make up the difference with your own expertise and enthusiasm, but the efforts of one individual, even a captain, can only go so far. \n    *goto gosub_event_train_bad_2\n  *else\n    *set c_gunnery %-8\n    Despite your best efforts, nothing seems to restore the crew's enthusiasm, and although you order the guns run out for practice every day anyway, you see little progress.\n    *goto gosub_event_train_bad_2\n*elseif training = \"sailing\"\n  Sail drill goes slowly over the next few days. Though the crew go through the motions, their hearts do not seem to be in it at all.\n  \n  *if sailing >= 65\n    *set c_sailing %-4\n    You try to make up the difference by calling upon your own expertise and experience, but there is only so much even the captain can do when an entire ship's company seems to lack all enthusiasm.\n    *goto gosub_event_train_bad_2\n  *else\n    *set c_sailing %-8\n    Despite your best efforts, nothing seems to restore the crew's enthusiasm, and although you order the hands aloft every day, you see little progress.\n    *goto gosub_event_train_bad_2\n*else\n  An odd mood besets [i]Foraker[/i] over the next few days, a strange sort of lethargy which leaves much of the crew listless and unenthusiastic.\n  \n  *if leadership >= 65\n    *set c_morale %-4\n    You do your best to raise their spirits again, offering some encouragement here, a little gentle prodding there, making sure that the ship's company stays busy instead of letting themselves fall to idleness. \n    \n    It works, sometimes, but not enough to raise spirits as much as you would like.\n    *goto gosub_event_train_bad_2\n  *elseif fighting >= 65\n    *set c_morale %-4\n    You do your best to instill some energy into the crew, stepping in to lead the singlestick drill personally.\n    \n    It helps. The ${gender} do seem a little more enthused, especially after you show off a few tricks, but it does not prove enough to raise spirits as much as you would like.\n    \n    Hopefully, with time and your efforts, such lethargy will not last the week.\n    *goto gosub_event_train_bad_2\n  *else\n    *set c_morale %-8\n    Despite your best efforts, nothing seems to raise the crew's spirits. Your program of rest and recreation, so effective at other times and aboard other ships, appears to have stalled, at least for the moment.\n    *goto gosub_event_train_bad_2\n*label gosub_event_train_bad_2\n\nThese things happen, of course, even with a veteran crew like [i]Foraker[/i]'s. There are ways around it too. The judicious employment of punishment would be the most obvious, though it would take a deft hand to avoid punishing too lightly, or too heavily, or even punishing those worst at hiding their deficiency instead of those who deserve it the most. \n\nGiven that, it might be better to simply wait it out.\n*choice\n  #I order the punishment of the worst laggards.\n    The next day, you pick out the most dilatory and the most sullen, call them up to the quarterdeck, and openly order that their grog rations be stopped for a week.\n    \n    *if leadership >= 55\n      *if training = \"sailing\"\n        *set c_sailing %+10\n      *if training = \"gunnery\"\n        *set c_gunnery %+10\n      *if training = \"morale\"\n        *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      It seems to work. Though the handful of ${gender} you have punished become quite sullen, the rest of [i]Foraker[/i]'s company begin to become more conscious of how they look and how they act before you. Given such a public jolt, the crew's lethargy falls away in short order and is even replaced with a new enthusiasm, though one motivated more by fear than love.\n      \n      Though not a perfect solution, it is the best you could have hoped for, given the circumstances.\n      *return\n    *else\n      *if training = \"sailing\"\n        *set c_sailing %-5\n      *if training = \"gunnery\"\n        *set c_gunnery %-5\n      *if training = \"morale\"\n        *set c_morale %-5\n      It seems to work, at first, but as time progresses, the state of your crew actually seems to decline. You can only assume that you have chosen your examples poorly, and that those who were truly deserving of punishment were somehow able to conceal their deficiency from your eyes.\n      \n      If anything, you have encouraged those who can hide their idleness well, and built resentment among those who cannot. \n      \n      A damned shame.\n      *return.\n  #Perhaps Lieutenant $!{lieutenant} might have some idea on how to resolve this.\n    Although you might be at your wits' end, Lieutenant $!{lieutenant} might not be. You assign the task of reinvigorating the crew to your first lieutenant, and concern yourself with your other responsibilities.\n    \n    *if (training = \"sailing\") and (lieutenant = \"simpson\")\n      *set c_sailing %+10\n      After a day or two, an improvement is already evident: Simpson has a natural talent for sailing, and ${pronoun_1} has used it to good advantage through leadership by example. With your first lieutenant leading every day's sail drill from the front, enthusiasm is quickly restored.\n      *return\n    *elseif (training = \"gunnery\") and (lieutenant = \"shannon\")\n      *set c_gunnery %+10\n      Within the day, Lieutenant Shannon has already begun putting ${pronoun_1} knowledge of gunnery to great effect, correcting previously undetected errors in the way [i]Foraker[/i]'s guns have been laid, and occasionally even stepping in ${pronoun_3}self to make changes. Under your first lieutenant's eye, enthusiasm returns to the gun crews with gratifying facility.\n      *return\n    *elseif (training = \"morale\") and (lieutenant = \"fisher\")\n      *set c_morale %+10\n      Lieutenant Fisher does not waste any time in putting [i]Foraker[/i]'s crew to rights. $!{pronoun_1} circulates among the ${gender}, raising their spirits with an inspiring word here, a reassurance there. $!{pronoun_1} listens to grievances, and dispenses justice with all the dash and purpose of a trained demagogue. Before long, the crew's spirits are on the mend.\n      *return\n    *else\n      *if training = \"sailing\"\n        *set c_sailing %-5\n      *if training = \"gunnery\"\n        *set c_gunnery %-5\n      *if training = \"morale\"\n        *set c_morale %-5\n      Unfortunately, despite your best efforts, Lieutenant $!{lieutenant} seems to be able to make no more headway than you. In fact, if nothing else, the issue has only become worse in your absence.\n      \n      It seems that only time will cause this problem to resolve itself.\n      *return\n  #I'll not act recklessly, that may only make things worse.\n    Perhaps there is a solution to the issue at hand, but any sort of direct intervention could easily make the problem worse. A ship's crew is a complicated collective of grievances, rivalries, conditions, and effects, all of which even you can barely claim to understand, even after your long years at sea.\n    \n    No, better to leave it well enough alone. You can only hope the problem will resolve itself in time.\n    *return\n   \n*label gosub_new_lanc_1\nThe only sail you can see in evidence are the small brigs and schooners of the Columbian coastal trade, heaving to and fro along the coast in great swarms.\n        \n*if sensibility >= 50\n  The very sight is fit to make your heartbeat quicken. \n*if sensibility \u003c 50\n  The sight cannot help but pique your interest.\nThe craft before you are hardly Iberian treasure galleons, but even a modest prize might fetch a substantial sum. Better yet, their smaller sail plans and shallower draughts give them little hope of outrunning a fully-rigged frigate like [i]Foraker[/i]. If you were so inclined, you could swoop in and take prizes with all the facility of a hawk diving amongst field mice. \n        \nThen again, your object is not to take prizes on this cruise, but to find the [i]Delmarva[/i], and you cannot be sure that ${ship_pronoun_1} is not in New Lancaster without sailing closer and surveilling the port yourself.\n        \nBut perhaps that can yet wait, if only for a few days…\n*return\n\n*label gosub_new_lanc_2\n*if raiding = false\n  However, the civilian trade which you had spotted on your first visit remains in evidence. The rich hunting grounds which such a thickly populated route represents to a bold captain tugs at your sense of aggression, not to mention your sense of self-advancement.\n        \n  Perhaps you ought to take a few prizes, while you still have the chance.\n*if raiding = true\n  There is no sign of civilian trade either. It seems that your previous depredations have well and truly scared the merchants and sailors of New Lancaster into staying behind their harbor defenses for now.\n*return\n\n*label gosub_worsley\nYet before [i]Foraker[/i] can begin the laborious process of tacking up the protected passage towards the city of Worsley itself, your lookout announces a new sighting: a frigate under full sail in hot pursuit. \n*page_break\nYou are about to order the [i]Foraker[/i] cleared for action when you spot the Royal Jack fluttering from the newcomer's foremast.\n  \n$!{ship_pronoun_1} is HMS [i]Bellevoir[/i], a frigate of thirty six guns prowling the coast in search of Columbian privateers. A brief exchange with ${ship_pronoun_2} company quickly reveals that [i]Bellevoir[/i] has taken several small enemy raiders in the past few weeks, but ${ship_pronoun_1} has seen neither hide nor hair of the regular Columbian navy. \n  \nAfter checking with ${pronoun_2} logs, Captain Shelley of the [i]Bellevoir[/i] can only offer ${pronoun_2} regrets, and the news that the [i]Delmarva[/i] could not have put into Worsley any time in the past four months.\n  \nIt seems you have come all this way for nothing.\n*return\n\n*label gosub_trimountaine\n*if trimountaine = false\n  *set trimountaine true\n  The sea is all but empty as you round the headland of Cabot's Hook, just a few days off the Columbian port of Trimountaine. Only a few coastal boats and fishing sloops dot the waters, and they quickly abscond at the sight of a fully armed Albionian frigate. It seems that the [i]Delmarva[/i] is not here.\n  *if (worsley = true) and (new_lancaster_2 = true)\n    Yet ${ship_pronoun_1} is not in Worsley, or New Lancaster either. \n        \n    Surely, that can only mean ${ship_pronoun_1} has hidden ${ship_pronoun_3}self away deep in the protected waters of Trimountaine harbor. \n        \n    There is no other possible explanation.\n    *return\n  *else\n      \n    At least not in the open: the coast this far north is full of coves and inlets in which even a heavy frigate might hide, and then there is Trimountaine harbor itself, a protected bay which may yet hold your quarry. \n      \n    Perhaps it would be prudent to take a closer look.\n    *return\n*else\n  The sea is still bereft of sail by the time the now-familiar shape of Cabot's Hook draws into view. Even the small coasters which had been in evidence upon your first visit are nowhere to be seen. \n      \n  The [i]Delmarva[/i] is not here, at least not out in the open.\n  *if (worsley = true) and (new_lancaster_2 = true)\n    Yet ${ship_pronoun_1} is not in Worsley, or New Lancaster either. \n        \n    Surely, that can only mean ${ship_pronoun_1} has hidden ${ship_pronoun_3}self away deep in Trimountaine Harbor. \n        \n    There is no other possible explanation.\n    *return\n  *else\n      \n    But if not here, then where?\n    *return\n \n*label gosub_marines\n*if marines = \"tops\"\n  *set delmarva_morale - 10\n  *set delmarva_crew - 5\n  The reedy crack of musketry sounds out from overhead. Mercer's marines are going into action. The range is still long, especially for a smoothbore musket, but [i]Delmarva[/i]'s entire deck is open to them from their high perches, and you can see their fire already having an effect on the enemy. \n  *return\n*else\n  *set delmarva_morale - 5\n  *set delmarva_crew - 2\n  To your side, you hear the staccato crack of musketry as Mercer's marines open up on the enemy. The range is long, especially for a smoothbore musket, and their positions on deck give them few targets, but you can see at least one or two balls strike their mark.\n  *return\n  \n*label gosub_marines_2\n*if marines = \"tops\"\n  *set delmarva_morale - 10\n  *set delmarva_crew - 5\n  As [i]Foraker[/i] drives towards the Columbian ship, the reedy crack of musketry echoes from overhead. The marines are going into action. The range is still long for a smoothbore musket, but Mercer's lobsters have the whole of [i]Delmarva[/i]'s deck exposed to their elevated positions. You can already see their fire beginning to have an effect.\n  \n  *return\n*else\n  *set delmarva_morale - 5\n  *set delmarva_crew - 2\n  To your side, you hear the staccato crack of musketry as [i]Foraker[/i] drives towards the Columbian ship. The marines are going into action, and though the range is long and their positions on deck give them few targets, they still keep up a steady enough fire for you to see at least some of their musket balls hit their mark.\n  \n  *return\n\n*label gosub_spar_break\n*set c_sailing %-10\nYet no sooner are the sails trimmed to catch the breeze do you hear a sharp crack from above you.\n\n\"It's the damned spar!\" Burroughs exclaims. \"It's going to break free!\"\n\nSure enough, the worn spar holding the mainsail is already splintering under the strain of the wind. Before your eyes, it snaps loose with a second, louder crack. The mainsail collapses in on itself, a tangle of canvas and line, as your top${gender} scramble to respond. The mainmast bends under the unexpected strain with the squeal of strained timber.\n\nYour sailing ${master} is already springing into action. In a situation like this, there is no time for the normal catch and relay of orders. \"Mains'l tops!\" $!{pronoun_1} shouts. \"Cut that sheet loose! Now! Before it carries the rest of the mainmast with it, damn-your-eyes!\"\n\nIt only takes a few moments for the rogue sail to be cut loose, but it feels like half an hour as the top${gender} walk out across the split spar, cutting cables loose with axes. At last, the expanse of canvas flutters away, taking half the spar with it as it flies into the sea with a crash.\n\nThe instant the moment of crisis is past, Burroughs orders the top${gender} back to their accustomed posts. There is no time to be lost, especially not now. \n*page_break\n*return\n\n*label gosub_reload_success\nBut [i]Delmarva[/i]'s crew do not falter. Despite the deadly effect of your fire and constant harassment from your marines, they are still working their guns.\n          \nBut so are your own gun crews, and long hours of training have honed their skills to a razor's edge. They work with an alacrity and purpose your adversary cannot match, and in the end, it is your guns which are reloaded first.\n*page_break\nBut only just.\n          \nAnother broadside thunders from [i]Foraker[/i] just an instant before [i]Delmarva[/i] replies with one of ${ship_pronoun_2} own. Albionian roundshot passes its Columbian counterparts in midair before slamming into their targets in a paroxysm of mutual destruction. Oak splinters, guns dismount. Columbians and Albionians, your tongues so similar even under normal circumstances, both cry out in the universal language of agony.\n*return\n\n*label gosub_reload_failure\nBut [i]Delmarva[/i]'s crew do not falter. Despite the deadly effect of your fire and constant harassment from your marines, they are still working their guns.\n\nAnd now it is their turn to reply.\n*page_break\n[i]Foraker[/i]'s hull shudders as the Columbian broadside hammers your ship. You feel ${ship_pronoun_3} stagger beneath you as the air is filled with flying splinters and the screams of wounded ${gender}. \n*return\n\n*label gosub_endgame_boarding_defeat\nThe foe circle around you slowly, none daring to make the first move. Someone—you are not sure who—shouts a demand that you surrender.\n\n*if gallantry >= 50\n  Yielding would mean saving your life and the lives of your crew, but at what cost? Would the humiliation of seeing [i]Foraker[/i] under Columbian colors, of languishing as a prisoner while the enemy's broadsheets make a nine days' spectacle out of you be a price worth paying? \n  \n  And more than your dignity, there is your future as a $!{monarch}'s officer to think of. Surrender would mean a court-martial back in Albion. \n  *if status = \"wounded\"\n    Wounds or no, the Admiralty might choose to make an example of you—scapegoats are much in demand in the course of an unsuccessful war.\n  It could mean dishonor, disgrace, the end of your naval career—even a firing squad should the blot on your honor be found too great.\n  \n  Death might be preferable.\n*if gallantry \u003c 50\n  Surrender would mean losing your ship, but saving your crew. The Columbians are not known for mistreating prisoners—at least not Albionian ones—and it is almost certain you will be exchanged within the year.\n  \n  *if status = \"wounded\"\n    And it is not as if a great many alternatives are open to you. Perhaps if you still had your feet, you could offer some last act of defiance, but wounded as you are, you've not the wherewithal to offer anything but the most token resistance.\n  *comment endif\n  \n  The service would court-martial you of course. Any captain who loses ${pronoun_2} ship faces that prospect. But surely, \n  *if status = \"wounded\"\n    your wounds are testimony enough to win an acquittal.\n  *if status != \"wounded\"\n    you have fought well enough and hard enough to win acquittal. \n  Even if public opinion scorns you as a coward or an incompetent, and you are forced to live a life in disgrace, it would at least still mean living.\n  \n  What good is honor to the dead?\n*choice\n  #What choice have I? I yield.\n    *if status = \"wounded\"\n      You do your best to prop yourself up with one hand as you pick up your sword with the other. Teeth clenched in pain, you raise the hilt towards the nearest Columbian, offering it in surrender.\n    *if status != \"wounded\"\n      Your heart pounds in your chest as you lower your sword. Then, slowly, you reverse the blade in your hand, and offer it out to the nearest of the Columbians in surrender.\n    *comment endif\n    \n    *goto gosub_endgame_surrender\n  *if status = \"wounded\"\n    #I will fight Albion's enemies to my last breath. \n      You resolve to die fighting, but in your current state, even that is harder than it seems. With one hand, you drag yourself towards the enemy, clutching the sword you now barely have the strength to lift in the other.\n      \n      At first, the Columbians seem to look upon you with almost a sense of astonishment as you crawl towards the nearest of them. Only when you desperately try to swing your sword at ${pronoun_3} do they realize that you are acting in deadly earnest.\n      \n      Pain bursts through your head as your shocked opponent lays you out across the deck with a sharp kick. Your sword skitters away from your weakened grip. Blood fills your mouth. Your vision blurs as the enemy close for the kill.\n      \n      This time, they take no chances. They assail you all at once, with cutlasses, pikes, and bayonets. You do not ask for quarter.\n      \n      None is given.\n      *page_break\n      *set ending_index 3\n      *goto_scene epilogue\n  *if status != \"wounded\"\n    #Surrender? Never. I will die on my feet.\n      So be it. \n      \n      With sword in hand, you throw yourself at the enemy, with your only objective to take as many of them with you as possible.\n      \n      *if fighting >= 70\n        They come at you from every side, but you fight with the abandon and ferocity of the damned. Pain slashes at your ribs, your arms, your legs. You ignore it. Your fighting sword lashes out again and again, drawing blood and screams with every whip-like stroke. The deck stains dark under you. Your vision blurs, even to breathe is pain. \n        \n        Something throws you back, sending you reeling with the sound of cracking bone as a fresh agony joins the half-dozen others. The abstract notion that you have been shot barely even registers through the haze of pain and desperate fury. You will yourself forward again, but your body does not obey. You feel your knees hit the deck with a jarring impact. \n        \n        You look up in time to see a Columbian rush forward with a boarding axe, just before he buries it in your head.\n      *if fighting \u003c 70\n        Yet desperation offers you little advantage against numbers. There are simply too many of the enemy, and they all come at you at once.\n        \n        With all the strength you can muster, you lash out with your blade, to be rewarded by a scream, a grunt of pain, a few more drops of blood on the deck.\n        \n        But such small victories offer a paltry revenge. Within seconds, your sword lies broken, and you stand only barely, as you bleed from a dozen mortal wounds, every instant a torment.\n        \n        When one of the Columbians steps forward to strike a killing blow, it comes almost as a mercy.\n      *page_break\n      *set ending_index 3\n      *goto_scene epilogue\n\n*label gosub_endgame_surrender\nIt takes a few seconds for your submission to register. A few seconds more for the last holdouts in your crew to be subdued. \n    \nBut after that, everything seems to happen at once. The Columbian Captain is asking for your parole over the cheers of ${pronoun_2} ${gender}. $!{pronoun_2} boarding parties leap over the side to take possession of your ship.\n    \nA moment later, the cheers on [i]Delmarva[/i]'s deck redouble. You do not have to turn towards [i]Foraker[/i]'s mizzen to see the union flag of Albion fall and the sun-and-stripes of Columbia rise in its place. One of [i]Delmarva[/i]'s officers claps you on the shoulder with a unseemly familiarity, shouting some sort of consolation in your ear, but you cannot hear it. \n    \nAll you can sense is the deafening sound of your defeat.\n*page_break\n*set ending_index 1\n*if status = \"wounded\"\n  *set ending_index 2\n*goto_scene epilogue\n\n*label gosub_achievement_test\n*check_achievements\n*if c_gunnery >= 90\n  *if not(choice_achieved_high_guns)\n    *achieve high_guns\n*if c_sailing >= 90\n  *if not(choice_achieved_high_sailing)\n    *achieve high_sailing\n*if c_morale >= 90\n  *if not(choice_achieved_high_morale)\n    *achieve high_morale\n*if sensibility >= 80\n  *if not(choice_achieved_high_sense)\n    *achieve high_sense\n*if sensibility \u003c 20\n  *if not(choice_achieved_low_sense)\n    *achieve low_sense\n*if gallantry >= 80\n  *if not(choice_achieved_high_gallantry)\n    *achieve high_gallantry\n*if gallantry \u003c 20\n  *if not(choice_achieved_low_gallantry)\n    *achieve low_gallantry\n*return\n", "prologue": "*text_image prologue.png center Prologue\n[i]March 29th, 1813[/i]\n\nThe shot from [i]Foraker[/i]'s bow chaser smashes into the Columbian brig's foremast in a cloud of splinters. With a slow inevitability and the shriek of tortured timber, it comes down in a tangle of lines, canvas, and shattered oak. \n\nA cheer rises from the crew as they see their quarry stricken. Beside you on the quarterdeck, your Third Lieutenant grins with evident satisfaction. \"They might as well strike now and save us the trouble, Captain.\"\n\nAlas, the Columbian Captain proves less than considerate in that regard. The sun and stripes of the United Republics continue to flutter stubbornly from the vessel's remaining mast. However, the Columbians' famed intransigence can make little difference now, not with one of the brig's masts shot away and a fully armed and fully crewed frigate of Albion's Royal Navy in full pursuit.\n\nYour officers look to you expectantly for orders. The day is yours, the only question is, how do you mean to seize it?\n*choice\n  #\"Let us see if a broadside cannot convince them to strike.\"\n    *set c_gunnery + 20\n    Your First Lieutenant conveys your orders immediately, and the crew spring into action.\n    \n    With practiced movements, your gun crews see to the black iron monsters lined up along [i]Foraker[/i]'s deck. With an expedience born of intensive training and long experience, each crew loads, rams, primes and runs out their gun with the coordination of a ballet troupe. \n    \n    It is often said that the Royal Navy possesses the finest gun crews in the world, but you know well enough that only a few ships can live up to the boast.\n    \n    HMS [i]Foraker[/i] is one of them.\n    *choice\n      #[i]Foraker[/i]'s gun crews are the best in the navy, I trained them myself!\n        *set gunnery + 25\n        You feel a swell of pride in your breast as [i]Foraker[/i]'s port broadside thunders forth iron and flame in explosive unison. The Columbian staggers as a quarter of a ton of solid shot slams home to the sound of splintering planks and screaming crew. \n        \n        Ever since you were a child, you had expressed no small amount of interest and skill in the art and science of ballistics. When you took command of [i]Foraker[/i], you did your best to impart that expertise upon your ship's company. Through long hours of training, your enthusiasm and knowledge has shaped your gun crews into the navy's finest. Every broadside [i]Foraker[/i] fires is a painting with your signature scrawled upon it.\n        \n        And as the smoke clears and the effects of your ship's fire are made evident, you find it hard not to consider this latest work no less than a masterpiece.\n        *goto prologue_1_guns\n      #[i]Foraker[/i]'s gun crews were exceptional before I took command.\n        The world shakes with artificial thunder as the [i]Foraker[/i]'s port broadside unleashes a storm of iron and flame in a single cataclysmic moment. The Columbian staggers as quarter of a ton of solid shot slams home to the sound of splintering planks and screaming crew.\n      \n        Your ship's company had already possessed a reputation for excellent gunnery before you even took command. In many ways, it was a stroke of fortune that the Admiralty had assigned you a crew already possessed of skills which you yourself lacked.\n        \n        That is not to say that you are entirely without use yourself, otherwise the Admiralty would have never given you such a fine ship in the first place.\n        *choice\n          #I am a first-rate navigator, which evidently counted for something.\n            *set sailing + 25\n            Far be it from you to cast aspersions on the nature of the service, but it has always seemed as if connections and birth counted for more than ability when it came to the Admiralty. Thus, it was a bit of a surprise when a plum command like [i]Foraker[/i] was given to you, as opposed to the heir or protégé of some old Admiral or other. \n            \n            Perhaps you were simply lucky, or perhaps the Admiralty had felt that your sterling reputation as a navigator and sailor counted for more than your relative lack of connections.\n            \n            Frankly, you rather hope it is the latter.\n            *goto prologue_1_guns\n          #My natural ability to lead must have played some part.\n            *set leadership + 25\n            You have always been popular with those under your command, a skill which is rather useful to have when trapped aboard a ship with the same group of people for months on end.\n            \n            Apparently the Admiralty had thought so too, certainly enough to assign you a plum command like [i]Foraker[/i] over the heads of far more senior officers.\n            *goto prologue_1_guns\n          #To be honest, I used my connections to get this command.\n            *set patronage + 25\n            Promotion within the Royal Navy is supposed to be based on merit, but it is no shameful thing to pull a few strings in a service where there are far more captains than there are ships. You used the skills you had, just as any talented navigator or gunnery expert might, and you have every right to [i]Foraker[/i] as any other captain might.\n            *goto prologue_1_guns\n  #\"It should be easy enough to outmaneuver them now.\"\n    *set c_sailing + 20\n    You inform your Lieutenants of your plan, and it is the work of half a moment for them to translate your words into shouted orders. Your crew adjust the sails with expert precision, and an alacrity which few crews in the Royal Navy can match.\n    \n    Within moments, the [i]Foraker[/i] is rapidly overhauling the enemy brig. The Columbians are too preoccupied with cutting loose the wreckage of their own foremast to offer more than the most desultory opposition, the shots from their light cannon buzzing overhead, or splashing harmlessly short as your own ship pulls ahead. Now all it will take is a single sharp turn to cut off the enemy vessel.\n    \n    The problem is that the turn has to be timed perfectly. Too soon, and the Columbian may yet escape. Too late and you will overshoot.\n    *choice\n      #I am the best sailor among my officers, I choose the moment to turn.\n        *set sailing + 25\n        \"Steady! Steady!\"\n        \n        The quartermasters at the wheel tense at the tone of your voice. They know you are about to order something sharp and risky, they have heard you do it often enough since you assumed command. Sure enough, they ready themselves, waiting for your order—\n        \n        \"Now!\" You shout. \"Hard to starboard!\"\n        \n        Your crew springs to action. [i]Foraker[/i]'s timbers groan as your ship heels and cuts across the Columbian, close enough to hear their shouts of alarm as they shorten sail in a desperate attempt to get free. \n        \n        But it is far too late. There is no escaping, not from [i]Foraker[/i], and not from you.\n        *goto prologue_1_sailing\n      #My Second Lieutenant is best suited to time the turn, my talents lie elsewhere.\n        You look to Lieutenant Bannister, who nods curtly. You have been with your officers long enough to not need to waste words, just as you have known them long enough to rely on their strengths in a way which complements your own shortcomings. Likewise, they have known you long enough to trust your own strengths, particularly:\n        *fake_choice\n          #My expertise in ballistics and gunnery.\n            *set gunnery + 25\n            It hadn't taken [i]Foraker[/i]'s officers and crew long to recognize your talent for gunnery. Then again, you'd made no secret of hiding it. Although the exigencies of the service had meant that you'd not had the time you would have liked to drill the gun crews to your own standards, you have no doubt that given time—\n          #My ability to lead and cultivate loyalty.\n            *set leadership + 25\n            Officers capable of shouting commands clearly and being obeyed are six-a-shilling in the Royal Navy, but an officer who can genuinely inspire the admiration or love of those under their command while maintaining discipline? They are a rare group indeed, and one you feel that you are honored to be part of. While you haven't quite been able to build the level of adulation you'd received from the crew of your last command, the salutary effects of your innate talents have certainly become evident among [i]Foraker[/i]'s company over the past few months. Given another year or two—\n          #My connections within the Admiralty.\n            *set patronage + 25\n            At first, your officers had not recognized the advantage of having a captain in possession of the patronage you possessed. Yet within a few months, the value of such professional connections soon became clear, as [i]Foraker[/i] was pulled away from the tedious duty of maintaining the Gaulish blockade and reassigned to the Columbian squadron, and the increased chance of glory and prize money that entailed.\n            \n            Not all your crew have yet recognized the exact cause of your new assignment, but surely, given enough time—\n        *comment endif\n        \n        \"Now! Hard to starboard!\"\n        \n        The crew springs to action at Bannister's command. [i]Foraker[/i] heels with a groan of stressed timber as the ship cuts in front of the path of the fleeing Columbian. The other vessel's company erupts in shouts of alarm as they frantically begin shortening sail in a desperate attempt to escape.\n        \n        But it is too late. They are trapped now.\n        *goto prologue_1_sailing\n  #\"Best we get to the point: make ready to board.\"\n    *set c_morale + 20\n    The crew raises a thunderous cheer when you make your intentions known, their stamping feet make the deck quiver under you. The service has always encouraged a certain level of aggression and loyalty among its crews, but the enthusiasm with which the [i]Foraker[/i]'s company all-but fight amongst each other to join Captain Mercer's half-company of red-coated marines belies a level of spirit few crews—even Royal Navy crews—could boast.\n    *choice\n      #As expected, of course: my leadership has made them devoted to me.\n        *set leadership + 25\n        A renewed cheer rises as you step down from the quarterdeck to join the boarding party.\n        \n        [i]Foraker[/i]'s company had not been particularly loyal when you had taken command, but over the months, your knack for leadership had become known. By knowing when to punish, when to reward, and when to make those grand gestures of leadership which stories are made of, you have managed to win their admiration, if not their love.\n        \n        A year ago, [i]Foraker[/i]'s crew would have not given you a second thought. Now, they will gladly die for you.\n        *goto prologue_1_leadership\n      #[i]Foraker[/i]'s crew has always been spirited, a blessing as my own talents lie elsewhere.\n        It had been a damned good thing you suppose, that you had found [i]Foraker[/i]'s company in the fine condition they were in. Though your years of service could not have helped but instill the basics of leadership, you are still ill-suited to play the part of an Arlington or St. Ormond, the sort of sea-captain who effortlessly wins the love of every crew they command.\n        \n        No, the morale of [i]Foraker[/i]'s crew is a matter rarely worth worrying about. It has always been high, and your Lieutenants are more than capable of keeping it so, leaving you free to rely on your own strengths, namely:\n        *choice\n          #My expertise in gunnery and ballistics.\n            *set gunnery +25\n            It hadn't taken [i]Foraker[/i]'s officers and crew long to recognize your talent for gunnery. Then again, you'd made no secret of hiding it. Although the exigencies of the service had meant that you'd not had the time you would have liked to drill the gun crews to your own standards, you have no doubt that given time you will have them rated the finest gunners in the Navy.\n            *goto prologue_1_leadership\n          #My ability as a sailing officer.\n            *set sailing + 25\n            You had already acquired a reputation as a first-rate navigator during your time as a lieutenant. Your time as Captain of the [i]Foraker[/i] has only served to show your crew the truth behind the stories. Over the months, you have impressed upon the ship's company your rather high standards for alacrity and precision in matters of sailing and navigation, and although you have not yet been able to make significant improvements in their performance, you must imagine it can only be a matter of time now.\n            *goto prologue_1_leadership\n          #My connections within the Admiralty.\n            *set patronage + 25\n            At first, your officers had not recognized the advantage of having a captain in possession of the patronage you possessed. Yet within a few months, the value of such professional connections soon became clear, as [i]Foraker[/i] was pulled away from the tedious duty of maintaining the Gaulish blockade and reassigned to the Columbian squadron, and the increased chance of glory and prize money that entailed.\n            \n            Not all your crew have yet recognized the exact cause of your new assignment, but surely, given enough time, the news must circulate.\n            *goto prologue_1_leadership\n\n*label prologue_1_guns\n*page_break\nThe Columbian's deck is a ruin of shattered planks and broken bodies. The shrieks of the wounded fill the air as blood trickles down the shot-splintered scuppers.\n\nYet the enemy flag continues to flutter from the mainmast. It seems you will have no choice but to board.\n\nYou give the order to make ready to board as you step down from the quarterdeck. Marines and sailors form a boarding party as you take your place at their head.\n*goto prologue_2\n\n*label prologue_1_sailing\n*page_break\nThe Columbian lurches forward through the water. With terrible inevitability the enemy vessel careens towards [i]Foraker[/i]'s broadside. \n\nYou step down from the quarterdeck to join the boarding party assembling amidships in anticipation of the inevitable collision and boarding action. Sailors and marines stand aside as you make your way to the fore.\n*goto prologue_2\n\n*label prologue_1_leadership\n*page_break\nBut the time for such reminiscence is past. Now is the time for action.\n\nYou head amidships to join the boarding party, sailors and marines parting before you as you make your way to the fore.\n\n*label prologue_2\n*fake_choice\n  #I shall lead the way, as befitting a Gentleman-officer of the King's Navy.\n    *set gender \"men\"\n    *gosub gender_set\n    Of course, as a King's officer, and the ship's captain besides, you must make at least some show of gallantry before the men. \n  #I shall take the lead, as befitting a Gentlewoman-officer of the Queen's Navy.\n    *set gender \"women\"\n    *gosub gender_set\n    Naturally, as a Queen's officer and as the ship's captain besides, you must show your bravery, lest the women of your crew think you unsuited for leadership. \n*comment endif\n\nThe question is, do you mean to stay in the midst of the fighting when the cutlasses are drawn and the battle is joined?\n*fake_choice\n  #Of course! Honor would demand nothing less!\n    *set gallantry + 20\n    So it does, and so you do. When [i]Foraker[/i] grinds up against ${ship_pronoun_2} quarry with a shuddering crash, you are the first Albionian to set foot on the Columbian's deck, sword in hand and a battle cry on your lips.\n    \n    Captain Mercer and ${pronoun_2} marines are right behind you, their scarlet coats bright in the cold sun as their leader—twenty stone of muscle and fury—leaps across with all the grace of a ballerina.\n    \n    Columbians charge in from the left and right, brandishing pistols and blades of their own. It appears the enemy wishes to make a fight of it.\n  #I aim for a middle course, keep my options open.\n    Perhaps that is for the best. When [i]Foraker[/i] grinds up against ${ship_pronoun_2} quarry with a shuddering crash, you let Mercer, your gigantic Captain of Marines go first, following only once ${pronoun_1} and a few of ${pronoun_2} scarlet-clad killers set foot on the enemy's deck.\n    \n    Already, the Columbians are offering their reply. They charge in from the left and right, teeth bared and cutlasses flashing. It appears they mean to make a fight of it.\n  #It is wiser, not to mention safer, to stay in the rear.\n    *set gallantry - 20\n    Wiser indeed. [i]Foraker[/i] cannot afford to lose ${ship_pronoun_2} captain to a stray musket ball, especially not in a minor action such as this one. That is not base self-preservation speaking, but mere fact.\n    \n    So, when [i]Foraker[/i] finally makes contact with the enemy vessel, you let Mercer, your gigantic Captain of Marines and ${pronoun_2} scarlet-coated killers go in first, before leaping over the side and onto the deck of the Columbian brig.\n    \n    The enemy do not hesitate to offer their reply. They charge in from the left and right, bearing pistols and cutlasses and bared teeth twisted into vicious snarls. It appears they mean to make a fight of it.\n*comment endif\n*fake_choice\n  #So much the better: I am a dab hand with sword and pistol.\n    *set fighting + 25\n    With deft precision, you bring your pistol to bear on the nearest Columbian and calmly empty it into ${pronoun_2} face. Without breaking step, you batter aside the blade of a second foe with your own before slamming the brass guard of your fighting sword into ${pronoun_2} stomach, sending ${pronoun_3} tumbling backwards.\n    \n    *if gallantry = 70\n      There are few ${gender} who could honestly boast that they are as skilled in a fight as they are brave.\n      \n      You are one of them.\n    *if gallantry \u003c= 50\n      There are some who might question your courage at times, but none do so in public, lest you call them out. For none can question your skill with pistol or blade.\n    *page_break\n    Before you can finish your stricken foe, a third assailant tries ${pronoun_2} luck, taking aim with a heavy pistol. Yet before you can even react, a giant in a scarlet coat sweeps the unfortunate Columbian off ${pronoun_2} feet with such force that ${pronoun_1} tumbles over the side, ${pronoun_2} weapon discharging harmlessly into the air.\n    \n    Captain Mercer turns towards you and touches the brim of ${pronoun_2} hat in quick salute, before turning back into the fray.\n  #No worry. I am quite capable of defending myself.\n    *set sailing + 5\n    *set gunnery + 5\n    *set leadership + 5\n    You may not be the best fighter in your ship's company, but you are more than fast enough to empty your pistol into a Columbian's chest as ${pronoun_1} charges you from across the deck. Yet another soon takes ${pronoun_2} place, fighting sword raised high and poised to strike.\n    \n    You parry the blow as best you can as you step to the side, and deliver a riposte of your own. Your foe screams as the blade grinds deep into ${pronoun_2} collarbone with a spray of crimson. With a sharp tug, you pull your weapon free just in time to beat aside your adversary's last desperate thrust. You raise your blade for a killing blow, and bring it down on the unfortunate Columbian's head.\n    *page_break\n    You look up again just in time to see a third foe aim ${pronoun_2} pistol at you from a mere five paces away. Yet before you can even react, a giant in a scarlet coat sweeps the unfortunate Columbian off ${pronoun_2} feet with such force that ${pronoun_1} tumbles over the side, ${pronoun_2} weapon discharging harmlessly into the air.\n    \n    Captain Mercer turns towards you and touches the brim of ${pronoun_2} hat in quick salute, before turning back into the fray.\n  #I'd best be careful, personal combat is not my strong suit.\n    *set fighting - 15\n    *set sailing + 10\n    *set gunnery + 10\n    *set leadership + 10\n    You curse every hour you decided to spend working on mathematics and elocution instead of your aim as you fire your pistol wildly at the oncoming Columbians. It is all you can do to keep your assailants at bay with wide sweeps of your fighting sword as they force you back, their blades slashing and stabbing from every direction.\n    \n    Then, one of your attackers gets through. $!{pronoun_2} cutlass thrusts low, too quick for you to parry. You stumble back, only to find yourself teetering on the edge of the deck. Your adversary smirks in triumph, and raises ${pronoun_2} blade for the killing blow—\n    *page_break\n    Only to find the razor-sharp spike of a bayonet stuck through ${pronoun_2} throat. \n    \n    The marine retrieves ${pronoun_2} weapon with a business-like professionalism as ${pronoun_2} comrades push on, sweeping all before them with short, vicious thrusts of their bayoneted muskets. With two mighty strokes of ${pronoun_2} cutlass, Captain Mercer cuts down another of your attackers, and puts the last one to flight. \n    \n    $!{pronoun_1} turns to you with a grin, touching the brim of ${pronoun_2} hat in quick salute before heading back into the fray.\n*page_break\nThe fight is sharp, but it does not last long. [i]Foraker[/i]'s company outnumbers the Columbian's by three to one, and before long, the enemy crew are dropping their weapons to the deck and putting their hands up in surrender. \n\nAt long last, the sun and stripes is hauled down from the foremast, and the Royal Jack of Albion raised in its place.\n\nA figure emerges from the Columbian crew, a\n*if gender = \"men\"\n  tall, spare man, perhaps a few years younger than you, clad in a blue coat which is not dissimilar to your own. Upon his\n*if gender = \"women\"\n  tall, spare woman, perhaps a few years younger than you,
