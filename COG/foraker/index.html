is no subterfuge. Unlike the officers of some navies, those in the service of $!{pronoun_2} Albionian Majesty have no need of it. Instead, I would mean to present myself and my ship, of inferior armament and strength of crew to your own as an opponent in a trial of arms and honor…[/i]\n    \n    *if ((gallantry >= 50) and (sensibility \u003c 50))\n      You go on to detail [i]Foraker[/i]'s various inferiorities compared to the [i]Delmarva[/i], while carefully insinuating that it is cowardice, not prudence, which has caused the Columbian captain to remain in harbor. While remaining outwardly civil, you deliver an endless cavalcade of subtle insults directed at the character of your adversary, ${pronoun_2} crew, and the United Republics themselves. Such cleverly hidden snubs come easily to you, and before long, you have hidden enough barbs in your words to ensure that your Columbian counterpart must think you in thorough need of a thrashing indeed by the time ${pronoun_1} is finished reading it.\n    *if ((gallantry >= 50) and (sensibility > 50))\n      You try your best to maintain the appropriate level of outward civility while concealing subtle insults and insinuations between the lines, but innuendo has never been your strong suit. Either your words become too muddled, or your attempts to cast aspersions on your counterpart's character exceed the bounds of wit and blunder straight into vulgarity. After an hour of struggle, you manage to print out a few lines which must, you hope, serve the purpose, for you are certain you can offer no better.\n    *comment endif\n    \n    [i]…Favor me with a speedy reply. I desire a good battle against a gallant foe and if one cannot be found here, I shall be compelled to look elsewhere.[/i]\n    *line_break\n    [i]I remain, your obedient servant,[/i]\n    *line_break\n    [i]Captain $!{name}, RN. HMS Foraker[/i]\n    \n    *if challenge_repeat = 0\n      You seal the letter and arrange it to be sent ashore by boat under flag of truce. Now all you can do is wait for a reply.\n    *if challenge_repeat >= 1\n      Again, you seal the letter, and arrange it to be sent ashore. Perhaps this approach will achieve a better result.\n    *if ((gallantry >= 50) and (sensibility \u003c 50))\n      *goto chap_2_challenge_success\n    *else\n      *goto chap_2_challenge_failure\n  *hide_reuse #I'll stress that it pains me to offer such a challenge, but that duty demands it.\n    It would not do to show too much eagerness. Given the obvious inferiority of [i]Foraker[/i]'s armament, it would likely accomplish nothing save convince [i]Delmarva[/i]'s captain that ${pronoun_1} would be sailing into a trap. No, better to play up your reluctance. \n    \n    You begin to write:\n    \n    [i]To the Captain of the URS Delmarva, currently docked in Trimountaine Harbor,[/i]\n    *line_break\n    [i]Let me begin by assuring you that it pains me greatly to write this letter, yet personal sentiment cannot stand in the way of one's duty. Our respective countries are at war, and it is by this extremity alone that I am obliged to offer you battle in the name of $!{pronoun_2} Albionian Majesty…[/i]\n    \n    *if ((gallantry \u003c 50) and (sensibility >= 50))\n      You do your best to establish your good faith by extolling the virtues of the United Republics and those that serve ${ship_pronoun_3}. You compliment the bravery and gallantry of ${ship_pronoun_2} soldiers and sailors, doing all that you can to let your counterpart know that you would not wish to fight and that if only honor would allow you to, you would happily withdraw and allow the proud ships of the Columbian Navy freedom of the sea once more. The words come easily enough to you, and before long, you have quite a convincing message.\n    *if ((gallantry > 50) or (sensibility \u003c 50))\n      Unfortunately, writing words of such a nature is a task unfamiliar to you. For someone used to a rather different form of expression, this feigning of regretfulness seems all too mawkish and improper. Still, you do your best to get the words out and although your sentences seem melodramatic and false at times, you manage a few sentences after an hour of struggle. Hopefully, they will do.\n    *comment endif\n    \n    [i]…Though I do not wish a battle, my honor must demand I offer one, just as yours must demand that you accept. For this, I offer my humblest apologies.[/i]\n    *line_break\n    [i]I remain, your obedient servant,[/i]\n    *line_break\n    [i]Captain $!{name}, RN. HMS Foraker[/i]\n    \n    *if challenge_repeat = 0\n      You seal the letter and arrange it to be sent ashore by boat under flag of truce. Now all you can do is wait for a reply.\n    *if challenge_repeat >= 1\n      Again, you seal the letter, and arrange it to be sent ashore. Perhaps this approach will achieve a better result.\n    *if ((gallantry \u003c 50) and (sensibility >= 50))\n      *goto chap_2_challenge_success\n    *else\n      *goto chap_2_challenge_failure\n  *hide_reuse #It is enough to be humble and formal, and no more.\n    The more you attempt to embellish your message of melodrama and false familiarity, the more likely it will be seen as pompous and insincere. Better to offer a bare and simple challenge. There would be no mistaking either your sincerity or your intention then.\n    \n    You begin to write:\n    \n    [i]To the Captain of the URS Delmarva, currently docked in Trimountaine Harbor,[/i]\n    *line_break\n    [i]I mean to be straightforward, as it is the least favor one captain in the service of ${pronoun_2} country might offer another: this is a challenge to a frigate action between your ship and mine…[/i]\n    \n    *if ((gallantry \u003c 50) and (sensibility \u003c 50))\n      You set out the conditions of the contest in as cold and detached a manner as you can. Once you have begun, it is easy to continue. Before long, you have before you a short sequence of sentences which do nothing but convey the information you need delivered in plain, unpretentious language, stripped of any ornamentation save that required to maintain a certain tone of civility. \n    *if ((gallantry \u003c 50) and (sensibility > 50))\n      At first, it seems simple to lay out the conditions of your challenge in the plainest, most unpretentious words you can, but as you struggle onwards you realize that to maintain such a style requires you to maintain as precarious a balance as any other. Too much formality and you begin to find yourself bogged down in extraneous pleasantry. Too little and you stray into vulgarity. It is only with the utmost difficulty that you are able to scratch out the few sentences you require to get your message across.\n    *comment endif\n    \n    [i]Please respond at your soonest convenience. I await your reply.[/i]\n    *line_break\n    [i]I remain, your obedient servant,[/i]\n    *line_break\n    [i]Captain $!{name}, RN. HMS Foraker[/i]\n    \n    *if challenge_repeat = 0\n      You seal the letter and arrange it to be sent ashore by boat under flag of truce. Now all you can do is wait for a reply.\n    *if challenge_repeat >= 1\n      Again, you seal the letter, and arrange it to be sent ashore. Perhaps this approach will achieve a better result.\n    *if ((gallantry \u003c 50) and (sensibility \u003c 50))\n      *goto chap_2_challenge_success\n    *else\n      *goto chap_2_challenge_failure\n\n*label chap_2_challenge_success\n*set date + 3\n*page_break\nOn the first day after your message is sent, you wait in eager anticipation for a reply.\n\nOn the second, your patience begins to wear thin.\n\nOn the third, you begin to wonder if your message has been received at all. Perhaps it has been lost? Perhaps your opposite number is indisposed, or perhaps ${pronoun_1} finds the idea of a formal challenge so ludicrous as to refuse to even dignify you with a reply.\n\nThen, a sudden shout from the tops sends you racing for the quarterdeck, glass in hand.\n*goto chap_2_end\n\n*label chap_2_challenge_failure\n*set date + 7\n*set challenge_repeat + 1\nYet no reply comes, even as the days pass and your patience wears thin. \n\n*if (date >= 65) or ((cordial_escape = true) and (date >= 55))\n  Then, just as consider giving up on the prospect, a shout from the tops sends you racing to the quarterdeck, with glass in hand.\n  *goto chap_2_end\n*else\n  After a week of waiting, it becomes clear that your challenge is not going to elicit a reply. Perhaps it never reached its intended recipient. Perhaps your counterpart found it too suspicious, too insincere.\n  \n  Perhaps you could try again with a different approach.\n  *goto chap_2_challenge_2\n\n*label chap_2_end\n\nYour eye is drawn to it the very instant you bring your glass up: [i]Delmarva[/i] is moving, ${ship_pronoun_2} decks wash with movement, ${ship_pronoun_2} masts crawling with animated specks, as the black-hulled frigate slides slowly towards the harbor mouth.\n\n*if retreat = true\n  Was ${ship_pronoun_1} drawn out by your ruse? Or does the [i]Delmarva[/i]'s captain finally think ${ship_pronoun_1} is prepared to sail? You suppose it doesn't matter now.\nWith a sluggish inevitability, the Columbian frigate slides out between the harbor batteries, ${ship_pronoun_2} spindly masts disappearing beneath an unfurling expanse of new canvas. \n*if retreat = true\n  You watch the Columbian carefully as [i]Foraker[/i] gets underway, wearing towards shore to intercept the foe. Faced with the sudden revelation of your ruse, [i]Delmarva[/i]'s captain might yet choose to refuse battle…\n  \n  But no, the other frigate does not waver in ${ship_pronoun_2} course. The Columbian is clearly as intent on settling accounts.\nOne by one, ${ship_pronoun_2} gunports open and iron muzzles run out in menacing rows along ${ship_pronoun_2} sleek sides as ${ship_pronoun_1} drives towards you and [i]Foraker[/i] under full sail.\n\nIt has finally come to this: [i]Delmarva[/i] is giving battle.\n*page_break\n*goto_scene chapter_3\n\n\n\n*label trial_end\n*check_purchase adfree\n*if choice_prerelease\n  *goto prerelease\n*if not(choice_is_steam) or (choice_purchased_adfree or not(choice_purchase_supported))\n  *label purchased\n  *return\n*label prerelease\nRemember earlier how we told you that the chapter of the game is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2025-11-20 $4.99 $2.99 purchased\n*abort\n", "chapter_3": "*set chapnum 3\n*check_achievements\n*if (date \u003c 35) or ((cordial_escape = true) and (date \u003c 25))\n  *if not(choice_achieved_delmarva_unready)\n    *achieve delmarva_unready\n  *goto chap_3_end_setup\n*elseif (date \u003c 45) or  ((cordial_escape = true) and (date \u003c 35))\n  *set delmarva_sailing + 10\n  *set delmarva_gunnery + 10\n  *set delmarva_morale + 10\n  *set delmarva_crew + 10\n  *goto chap_3_end_setup\n*elseif (date \u003c 55) or  ((cordial_escape = true) and (date \u003c 45))\n  *set delmarva_sailing + 20\n  *set delmarva_gunnery + 20\n  *set delmarva_morale + 20\n  *set delmarva_crew + 20\n  *goto chap_3_end_setup\n*elseif (date \u003c 65) or  ((cordial_escape = true) and (date \u003c 55))\n  *set delmarva_sailing + 30\n  *set delmarva_gunnery + 30\n  *set delmarva_morale + 30\n  *set delmarva_crew + 30\n  *goto chap_3_end_setup\n*elseif ((cordial_escape = true) and (date \u003c 65))\n  *set delmarva_sailing + 40\n  *set delmarva_gunnery + 40\n  *set delmarva_morale + 40\n  *set delmarva_crew + 40\n  *goto chap_3_end_setup\n*else\n  *set delmarva_sailing + 50\n  *set delmarva_gunnery + 50\n  *set delmarva_morale + 50\n  *set delmarva_crew + 50\n  *goto chap_3_end_setup\n*label chap_3_end_setup\n*temp double_shot \"none\"\n*temp quarterdeck_guns false\n*temp upwind false\n*temp fired false\n*text_image chap_3.png center Chapter 3\n\n*if lieutenant = \"fisher\"\n  \"—Why the cheek of these insolent dastards!\" Fisher snarls as ${pronoun_1} peers through ${pronoun_2} glass at the oncoming Columbian frigate. $!{pronoun_1} looks to you, face contorted in outrage. \"Do you see that flag ${ship_pronoun_1} is flying? On the mainmast?\"\n  \n  You take a look for yourself. The object of Fisher's offence is hardly small, but at such a great distance, you can barely make out the letters which are emblazoned upon it.\n  \n  \"Free trade and sailor's rights,\" you read out.\n  \n  \"Free trade and sailor's rights!\" Fisher echoes, with a simmering spray of scorn and venom. \"As if Albion has not been drowning in ${ship_pronoun_2} own blood these past twenty years to preserve such virtues from the likes of Bellaroque and the Gaulish! To fly such a putrid rag while sailing into action against us! The sheer effrontery!\"\n*if lieutenant = \"simpson\"\n  *if delmarva_sailing >= 75\n    \"$!{ship_pronoun_2} crew certainly handle ${ship_pronoun_2} sails well enough,\" Simpson observes as ${pronoun_1} peers through ${pronoun_2} glass at the oncoming Columbian frigate. \"$!{ship_pronoun_1} got under way far too quickly for my liking.\" \n  *if delmarva_sailing \u003c 75\n    \"$!{ship_pronoun_2} crew don't quite seem to know what they're doing, not yet,\" Simpson observes as ${pronoun_1} peers through ${pronoun_2} glass at the oncoming Columbian frigate. \"$!{ship_pronoun_2} hands still seem a bit sluggish, and ${ship_pronoun_2} sheets don't seem quite as handy as they could be. We've managed to get them to make sail before they were ready, thank God for that, at least.\"\n  *comment endif\n  \n  \"Is that worry I hear, $!{pronoun_4} Simpson?\" you ask idly, as you look through your own glass.\n  \n  *if delmarva_sailing >= c_sailing\n    \"Caution, ${pronoun_5},\" your first lieutenant replies. \"Pardon me for saying so, but our own sail drill could be better, and that is still not accounting for the way [i]Delmarva[/i] outmatches us in guns. We shall have to rely on the spirits of the ${gender} for an advantage, and I do not think it wise to rely wholly on such ephemerals.\"\n  *if c_sailing >= delmarva_sailing\n    \"Pragmatism, ${pronoun_5},\" your first lieutenant replies. \"Our crew may be better sailors, but [i]Delmarva[/i]'s got more hands, and more guns besides. Frankly speaking, we must leverage our advantages carefully. Blind aggression will do us no good here.\"\n*if lieutenant = \"shannon\"\n  \"I see at least a dozen carronades on ${ship_pronoun_2} quarterdeck, and a pair of long twelves on ${ship_pronoun_2} forecastle,\" Shannon reports anxiously as ${pronoun_1} peers at the oncoming Columbian frigate. \"We shall be quite plainly outnumbered in guns. If those carronades are thirty-twos, as I suspect they are, then we shall be handily outclassed in weight of broadside as well.\"\n  \n  \"Then we shall have to rely on the skill of our gun crews,\" you reply as you peer through your own glass.\n  \n  *if c_gunnery >= 80\n    Your first lieutenant nods. \"They should certainly be up to the task. So long as the Columbians have not engaged the services of some ballistic prodigy, or filled the ranks of their company with expert gunners from elsewhere, I dare say we shall have the advantage there, though I know not if it will overcome [i]Delmarva[/i]'s superiority in other aspects.\"\n  *if c_gunnery \u003c 80\n    Your first lieutenant frowns. \"If I may be entirely honest, ${pronoun_5}, I would not rely on them too wholly,\" ${pronoun_1} admits. \"Their state of readiness is not as it could be. They will perform as well as any other crew in the Navy, but I cannot answer for how superior they are to the crew aboard [i]Delmarva[/i].\"\n*if lieutenant = \"pakenham\"\n  \"It seems we have an audience,\" Pakenham notes as ${pronoun_1} sweeps ${pronoun_2} glass across Trimountaine Bay, looking not at the oncoming Columbian frigate, but at the swarm of smallcraft in its wake. \"Rather uncouth, one might think, like the throng about a public hanging.\"\n  \n  *if gallantry >= 50\n    \"Then they must acquaint themselves with disappointment,\" you reply smoothly, \"it is not we who shall be hanged.\"\n    \n    Your first lieutenant frowns. \"The good folk of Trimountaine seem to think differently, ${pronoun_5}. \n  *if gallantry \u003c 50\n    \"Yet who is to be hanged?\" you muse, \"us, or they?\"\n    \n    Your first lieutenant frowns. \"Judging by their response, it seems likely the good folk of Trimountaine have already divined an answer. \n  If one might oblige you to look there, along the harbor, if you would please?\"\n  \n  You bring your glass up, following Pakenham's finger until you see it too. It is difficult to make out at such a great distance, but you can discern what appear to be vast cheering crowds along the streets and rooftops. What's more, you can swear you can even perceive rows of celebratory banners and colored bunting along the buildings, as if the outcome of your action with the [i]Delmarva[/i] has already been determined in the Columbian's favor.\n  \n  My, that is rather uncouth, isn't it?\n*comment endif\n\nBefore you can carry on your exchange, Burroughs steps up beside you. \"The ship's cleared for action, ${pronoun_5},\" ${pronoun_1} reports. \"Given our relative speeds, it'll be another fifteen or twenty minutes before the [i]Delmarva[/i] enters cannon shot. If there's any last minute preparations you would wish to make, I suggest you make them now.\"\n*choice\n  #\"Let us make the most of our first broadside: double-shot the guns.\"\n    \"Aye, ${pronoun_5},\" Burroughs replies. \"How shall it be done?\"\n    \n    Ramming two loads of shot down each gun will effectively double the weight of your broadside. Properly directed, the effect of such a salvo can be devastating. In the heat of battle, you will almost certainly not have a chance to double-shot your guns again. The type of ammunition you choose to have loaded for this first, crucial volley of fire may prove pivotal.\n    *fake_choice\n      #\"Double round shot will give us the best chance of penetrating their hull.\"\n        *set double_shot \"round\"\n        Burroughs nods, turns away and repeats the order at a full-throated bellow down the length of the ship. \n        \n        The gun crews spring into action, sponging out their guns, before ramming home charge, wadding, and two solid iron cannon balls down the barrel. If the rumors about the Columbian frigates and their impervious hulls have any element of truth to them, then this might be the only way to punch through them. If they are not true, then double the shot will still wreak double the havoc that a normal broadside would.\n      #\"Load chain shot: their guns will be of little use if they have no rigging.\"\n        *set double_shot \"chain\"\n        Burroughs nods, turns away and repeats the order at a full-throated bellow down [i]Foraker[/i]'s length.\n        \n        The gun crews respond immediately, sponging out their guns before ramming home charge, wadding, and two sets of the peculiar chain shot which experience has proven so dreadfully effective against a ship's rigging and masts. If you mean to use [i]Foraker[/i]'s superior agility to full advantage, then you will have to cripple [i]Delmarva[/i]'s ability to maneuver, and you can think of no better method than this.\n      #\"I mean to erase their advantage in numbers: load grape shot.\"\n        *set double_shot \"grape\"\n        Burroughs nods, turns away and repeats the order at a full roar down [i]Foraker[/i]'s length.\n        \n        The gun crews spring into action, sponging out their guns before ramming charge and wadding down the barrel. Then, they load two lumpen canvas bags, each packed with dozens of quarter-pound iron balls. Such light projectiles deal little damage to a ship's hull, but their effect on an enemy crew could be easily likened to that of a scythe upon a field of wheat. In your experience, you have found no more swift or efficacious way of killing ${gender} in large number than a broadside of guns double-shotted with grape.\n    *comment endif\n      \n    As the guns are run out one by one, a double rank of scarlet assembles along [i]Foraker[/i]'s waist. \n    *goto chap_3_phase_1\n  *if gunnery >= 60\n    #\"I wish to inspect our guns, make sure they're positioned for maximum effectiveness.\"\n      *set hist_note_3 1\n      *set quarterdeck_guns true\n      Burroughs nods as you embark on a short tour of the main deck, where [i]Foraker[/i]'s eighteen-pounders are arrayed in neat rows. The spaces between the iron guns are crowded with moving, shouting, and toiling human bodies: it is seven ${gender} to a gun, and there is precious little space for them here in the dark confines of the main deck. \n      \n      No, there is nothing that can be done to enhance [i]Foraker[/i]'s broadsides. Every heavy gun aboard is already pointing in the right way, and even if you had more, the deck could hardly hold the weight of another eighteen-pounder.\n      \n      But what about ${ship_pronoun_2} bow chasers?\n      \n      The long nines in [i]Foraker[/i]'s bows are light pieces, too light to have much effect on the heavily-built hull of your opponent. But their crews are among the best in your ship's company, and the same lightness that makes them so useless against the hull also make them far easier to move and lay. \n      \n      You rush back to the quarterdeck, an idea forming in your head.\n      *page_break\n      \"$!{pronoun_4} $!{lieutenant}!\" You all-but-shout as you pace briskly back to [i]Foraker[/i]'s stern. \"I want the bow chasers placed on the quarterdeck and loaded with grape. When [i]Delmarva[/i] draws alongside, I want them to aim and fire individually at any likely target aft of the mizzen: officers, marines, the ship's wheel, if it can be struck.\n      *if sensibility >= 50\n        I want that space of deck to be as uninhabitable as the surface of the moon!\"\n      *if sensibility \u003c 50\n        I want to render any existence on that space of deck intolerable.\"\n      *comment endif\n      \n      $!{lieutenant} grasps your meaning immediately. \"Aye aye, ${pronoun_5}!\" ${pronoun_1} manages to bark before ${pronoun_1} hurries forward.\n      \n      The process does not take long, not with three dozen ${gender} heaving each gun up the length of the ship. Soon, they are bringing the two guns amidships, passing the double-rank of scarlet-coated marines formed along [i]Foraker[/i]'s waist.\n      *goto chap_3_phase_1\n  #\"I'm going up to inspect the rigging myself.\"\n    Burroughs touches the brim of ${pronoun_2} hat in salute before turning away to face the rest of the ship. \"Captain going aloft!\" ${pronoun_1} announces at a full bellow.\n    \n    A moment later, you are clambering up the shrouds, ratlines digging into bare feet as you climb towards the mainmast tops. \n    *if sailing >= 60\n      *set c_sailing %+20\n      *set gosub_index 200\n      *gosub_scene gosub\n      You breathe in lungfuls of fresh air as you climb higher and higher, your eyes picking out imperfections in the lines, sails set just a little off,\n      *if spar_fixed = false\n        that worn spar which you have not had time to replace, \n      and a dozen other issues. It has been far too long since you have been up here. The strictures of command rarely give you the time, and it is a damned shame that only the exigency of impending battle gives you the excuse to go aloft now. \n      \n      Speaking of which, you still have an enemy frigate bearing down on you. Now is not the time for introspection.\n      \n      You shout your findings to the top${gender}, and they quickly begin to remedy what they can. By the time you begin descending, you find the situation already much improved.\n    *if sailing \u003c 60\n      *set c_sailing %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      You look for any imperfections or problems you can find, but it is a difficult thing to do while keeping your balance atop a swaying mast. You have never been the best of sailors, and years in command may have only dulled the instincts which had once been so keen during your time as midship${gender_2}.\n      *comment endif\n      \n      You report what you can to the top${gender}, and begin heading back down. You can only hope that you have made some slight improvement.\n    *comment endif\n    *page_break\n    By the time you are back on deck, a double-rank of scarlet coats has formed up along the ship's waist. \n    *goto chap_3_phase_1\n  #\"Call all hands: I mean to deliver a few remarks.\"\n    Burroughs passes your order on. Within seconds, the shrill cry of the bosun's whistle rises from the deck. Your crew assemble quickly. Before long, they are gathered before you, waiting to hear your words.\n    \n    *if leadership >= 55\n      *set c_morale %+20\n      *set gosub_index 200\n      *gosub_scene gosub\n      \"Forakers!\" you begin, pitching your voice to carry over the deck. \n      *if (sensibility >= 50) and (gallantry >= 50)\n        \"I know that the odds look grim. Our adversary has the advantage in guns, in crew, and in construction. They have beaten our frigates thrice before. Yet despite all of the enemy's advantages, I am not dismayed, for I know I can rely on the only advantage that matters: the unshrinking resolve and noble spirit of the ${gender} before me! Follow your duty with the courage I know to be in your hearts, fight with the skill you have demonstrated so many times before, and we shall prevail!\"\n      *if (sensibility \u003c 50) and (gallantry >= 50)\n        *set hist_note_2 1\n        \"The Columbians have taken three of our frigates in this past year. They mean to take ours as their fourth. Yet they forget that it is only through disparity of force that they have won their victories. But today, we stand as equals: our foes may have superiority in guns and numbers, but I know that the exceptional discipline and skill of this ship's company serves to make up for our material weaknesses. The ${gender} aboard our adversary may think us another small and outgunned frigate ready for the taking, another easy victory, but I trust you to prove them wrong. Let us show them that there are still Albionians in the frigate who know how to fight!\"\n      *if (sensibility >= 50) and (gallantry \u003c 50)\n        \"I did not wish this battle upon us, but it has come, and the honor of the service gives us no alternative but to fight it out with a ship of superior size and armament, of a type which has beaten our frigates thrice before. I shall not waste words speaking to you of what is expected of you. I expect you all know well enough. I only ask you to remember what you are fighting for: your families, your homes, and for the right to see them again with your head held high, knowing that you have done all that honor demands of you.\"\n      *if (sensibility \u003c 50) and (gallantry \u003c 50)\n        \"I'll not lie to you. The enemy outmatch us in guns and in numbers. If the reports are to be believed, their hull can withstand our cannon shot from all but the closest ranges. Our chances of victory are not good, though if providence favors us, we may yet prevail. The honor of the service demands that we fight this battle, yet I know that it is your own resolve which will keep you at your station, and drive you to do your utmost to achieve victory, however unlikely it may be. It has been an honor to serve with you all these past few years, and it shall be an honor to fight—and if necessary, to die—alongside you today.\"\n      *comment endif\n      \n      You take a breath as you search for the words to close off your speech. You look into the eyes of your crew, and find them:\n      \n      *if sensibility >= 50\n        \"To your stations, ${gender}, and remember that you have the blood of hundreds of your country${gender} to avenge!\"\n      *if sensibility \u003c 50\n        \"Go quietly to your quarters. I feel sure you will all do your duty.\"\n      *comment endif\n      \n      The last of your words die out as they settle upon your crew, leaving only a silence filled by the sounds of the sea and the wind.\n      \n      *if sensibility >= 50\n        Then…\n        \n        \"Three cheers for Captain $!{name}!\" someone shouts in the gathered throng.\n      \n        Three thunderous cheers are ${pronoun_2} reply. Loud enough to shake [i]Foraker[/i]'s timbers. Loud enough to echo in your ears as the ${gender} return to their stations and prepare themselves for the battle to come.\n      *if sensibility \u003c 50\n        The ${gender} return to their stations in silence, as you knew they would, as you have bade them to. The newly confident expressions they now carry on their faces are all the evidence you need that your words have done their work, and stiffened their resolve for the battle that is to come.\n      *page_break\n      Within moments, the deck is cleared for action again, with only a double rank of scarlet coated marines still standing upon the scrubbed planks.\n      *goto chap_3_phase_1\n    *else\n      *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      You speak as best you can. You remind the ${gender} of their duty, of the course of the war which might be in some way determined by today's action. You remind them of the hopes and aspirations which their superiors, including yourself, have placed in them, and you do so until you run out of things to say.\n      \n      Yet for all your effort, you cannot seem to make your words sound like more than empty platitudes. Your courage, so glib and ready when facing cannon fire or musket balls, cannot so easily face the ordeal of speaking to a crowd.\n      \n      Still, some of the ${gender} cheer half-heartedly. Some even seem genuinely enthused by your dish watery address. As the crew return to their stations, you can only regret that you could not have spoken better. \n      *page_break\n      Within moments, the deck is cleared for action again. Only a double-rank of scarlet-coated marines remain standing before you.\n      *goto chap_3_phase_1\n  \n*label chap_3_phase_1\n\n\"[i]Foraker[/i]'s marines are all accounted for and ready for action, ${pronoun_5},\" Captain Mercer reports, somewhat superfluously, as ${pronoun_1} approaches the quarterdeck. \"I fear we shall have a difficult time of it though. [i]Delmarva[/i]'s deck is higher than ours, and we shall be at a disadvantage if you mean for us to sweep the decks with our musketry.\"\n\n\"We could put you in the tops,\" Burroughs suggests. \"You will have all the height you require then.\"\n\nThe captain of marines nods, but ${pronoun_2} expression does not soften. \"We would, but we would be too far up to assist practicably in any boarding action, nor would we be in position to defend the ship should we be boarded ourselves.\"\n\nBoth officers look to you for a decision.\n*fake_choice\n  #\"Keep the marines on deck: I need you ready as boarders.\"\n    *set marines \"deck\"\n    Mercer sketches a quick salute. \"Aye, ${pronoun_5}! Marines to remain on deck!\" ${pronoun_1} acknowledges, before relaying your order to ${pronoun_2} own subordinates.\n    \n    The deck echoes with the sound of booted feet as the lobsters move into position.\n    \n  #\"I must have accurate supporting fire: marines to the tops.\"\n    *set marines \"tops\"\n    Both your officers salute. \n    \n    \"Marines going aloft!\" Burroughs shouts, as Captain Mercer returns to ${pronoun_2} ${gender} and begins sending them up the shrouds to their new positions high above [i]Foraker[/i]'s deck.\n    \n    Within moments, the tops are covered with red coats, and their loaded muskets point out towards your approaching adversary like slim, accusatory fingers.\n    \n  #\"Captain Mercer, you know your ${gender} best, you decide.\"\n    *if c_morale >= c_gunnery\n      *set marines \"tops\"\n      \"I'll put them on the tops then,\" Mercer decides after a moment's thought. \n      \n      Burroughs nods. \"Marines going aloft!\" ${pronoun_1} shouts as Mercer returns to ${pronoun_2} ${gender} and begins sending them up the shrouds to their new places high above [i]Foraker[/i]'s deck.\n      \n      Within moments, the platforms above you are overrun with red coats, and loaded muskets point outwards like hedgehogs, ready to rain fire upon your adversary.\n      \n    *if c_gunnery > c_morale\n      *set marines \"deck\"\n      \"The deck would be best, ${pronoun_5},\" Mercer decides after a second's thought. $!{pronoun_1} wastes no time in turning back to ${pronoun_2} ${gender} and relaying ${pronoun_2} order to them.\n      \n      The deck echoes with the sound of booted feet as the lobsters move into position.\n      \n*comment endif\n*if not(choice_achieved_story_3)\n  *achieve story_3\nNo sooner are arrangements set than your attention pulled away by a new sound: the distant boom of a cannon. A moment later, a splash of white foam rises three dozen yards off [i]Foraker[/i]'s stern starboard quarter. \n\n*if lieutenant = \"fisher\"\n  \"Damn me, but ${ship_pronoun_1} is a fast one!\" Fisher exclaims. \"Within cannon shot already! Shall we reply with a broadside, ${pronoun_5}?\"\n*if lieutenant = \"simpson\"\n  \"A ranging shot,\" Simpson observes, \"and if ${ship_pronoun_1} is in range, then so are we. Shall we give them a broadside, ${pronoun_5}?\"\n*if lieutenant = \"shannon\"\n  \"Shot with a long twelve at…shall we say two degrees of elevation…\" Shannon observes, as he does the maths in his head. \"That should mean about thirteen hundred yards' distance between us, well within range of our eighteens. We could reply with a broadside, ${pronoun_5}.\" \n*if lieutenant = \"pakenham\"\n  \"Rather overeager, one might think,\" Pakenham observes. \"It will do them no good to paw about like this, throwing balls one by one. But if we are in range of their guns, then they must be in range of ours. Might we discourage them with a broadside, ${pronoun_5}?\"\n*choice\n  #\"Give them a broadside, aim for the rigging.\"\n    *set fired true\n    *set no_guns false\n    \"Hard a-larboard!\" Burroughs shouts, translating your orders into actions. \"Bring the starboard battery to bear!\"\n    \n    The quartermasters strain at the wheel as [i]Foraker heels[/i] in the water, straining against the wind to turn ${ship_pronoun_2} broadside towards the Columbian frigate. The gun crews hunch over their weapons in readiness, peering through the gunports at their distant target, waiting for the right instant as the sea beneath you sinks, then swells, then—\n    \n    \"Fire!\"\n    \n    [i]Foraker[/i]'s side disappears in a flash of smoke and flame, as the crash of ${ship_pronoun_2} broadside shakes the air with its thunder.\n    \n    *if c_gunnery >= 65\n      *set delmarva_sailing - 10\n      *set delmarva_crew - 5\n      *if double_shot = \"chain\"\n        *set delmarva_sailing - 10\n        *set double_shot false\n        Through the smoke, you see three black blurs cut through the air, twirling like a swarm of iron whirligigs. With an impossible slowness, they descend towards the [i]Delmarva[/i]'s masts in a deliberate arc.\n      \n        Then, the Columbian ship seems to explode in a paroxysm of violence. The bay fills with the sound of splintering spars and tearing sail as your shot scythes through the enemy's rigging. The [i]Delmarva[/i] reels in the water as a mass of rigging and masts tumble to the deck in a chaotic tangle.\n      *if (double_shot = \"round\") or (double_shot = \"none\")\n        *set double_shot false\n        Through the smoke, you see a wave of iron specks arc into the distance towards the Columbian frigate. Slowly, they descend towards your opponent, only to strike home with a sudden crash of splintering wood and explosion of white foam.\n        \n        One of [i]Delmarva[/i]'s sails comes loose as its spar is knocked askew, teetering crazily for a moment, and then tumbling into the sea, with sail, lines, and all.\n      *if double_shot = \"grape\"\n        *set double_shot false\n        Grape shot is not an ideal sort of shot for long range fire, but with so many projectiles in the air, some are bound to hit.\n        \n        And some do. The sea churns white under the impact of hundreds of projectiles, but it is the splintering of wood and the screams of stricken ${gender} which comes as the most welcome sound to your ears. [i]Delmarva[/i]'s forward mainsail seems to collapse in on itself, shredded by your opening broadside. \n      *comment endif\n      \n      A cheer rises from the gun crews as they witness the deadly effect of their fire, but it does not last long. Already, [i]Delmarva[/i] is heeling in the water, and bringing ${ship_pronoun_2} own broadside to bear.\n      *goto chap_3_phase_2\n    *else\n      *set double_shot false\n      *if double_shot = \"chain\"\n        Through the smoke, you see your opening broadside arc through the air like a swarm of iron whirligigs, ready to wreak havoc on any mast or rigging or ${gender} unfortunate enough to be caught in its path.\n        \n        Alas, none are. Your broadside falls short, splashing harmlessly into the water far short of [i]Delmarva[/i]'s hull.\n      *if (double_shot = \"round\") or (double_shot = \"none\")\n        Through the smoke, you see a wave of black specks descend upon [i]Delmarva[/i]'s rigging. For a moment, they disappear into the distance.\n        \n        Then you hear the sound of many splashes in quick succession and see a forest of white froth sprout up from behind the Columbian frigate' masts. You feel your heart sink: your broadside has gone long.\n      *if double_shot = \"grape\"\n        The grapeshot lashes the water with more than a thousand projectiles, churning the surface of the sea into a white froth. But none of them reach the [i]Delmarva[/i]. You have missed.\n      *comment endif\n      \n      Your gun crews groan in dismay, but they will soon have bigger problems to contend with. Already, your adversary is heeling to starboard, and bringing ${ship_pronoun_2} own broadside to bear.\n      *goto chap_3_phase_2\n  #\"Reply with a broadside, shoot for the hull.\"\n    *set fired true\n    *set no_guns false\n    \"Hard a-larboard!\" Burroughs shouts, translating your orders into actions. \"Bring the starboard battery to bear!\"\n    \n    The quartermasters haul hard on the wheel, their straining muscles pulling [i]Foraker[/i] against the wind to turn ${ship_pronoun_2} broadside towards the Columbian frigate. The gun captains crouch in readiness, lanyards in hand, peering through the gunports at their distant target, waiting for the right moment as the sea beneath you swells, then sinks—\n    \n    \"Fire!\"\n    \n    [i]Foraker[/i]'s side disappears in a flash of smoke and flame, as the crash of ${ship_pronoun_2} broadside shakes the air with its thunder.\n    \n    *if c_gunnery >= 65\n      *set delmarva_gunnery - 10\n      *set delmarva_crew - 5\n      *if double_shot = \"round\"\n        *set delmarva_gunnery - 10\n        Through the smoke, you see a swarm of iron specks arc through the air, rising and then falling with impossible, deliberate slowness, descending upon [i]Delmarva[/i]'s approaching form with a terrible serenity.\n        \n        Then, the Columbian frigate staggers with a terrible violence as ${ship_pronoun_2} hull seems to disappear in a cloud of splinters. [i]Delmarva[/i]'s sides may be made of iron, but ${ship_pronoun_2} bows certainly are not. Trimountaine Bay fills with the crash of snapping timbers and the screams of stricken ${gender}.\n        *set double_shot false\n      *if double_shot = \"none\"\n        Through the smoke, you see your opening broadside arc through the air, a volley of iron specks rising, and then falling on [i]Delmarva[/i]'s bows with a terrible, accurate inevitability.\n        \n        Your shots strike home with a crash of splintering timber. [i]Delmarva[/i]'s sides may be made of iron, but ${ship_pronoun_2} bows certainly are not. \n      *if double_shot = \"grape\"\n        *set double_shot false\n        Through the smoke, you see your opening broadside disappear into the distance, a blizzard of black iron.\n        \n        Then, a moment later, the sea around [i]Delmarva[/i]'s bows explode into a churning froth of white water and splintering wood. The Columbian frigate trembles under the storm of iron, its sails shivering like a frightened child.\n      *if double_shot = \"chain\"\n        *set double_shot false\n        Through the smoke, you see your opening broadside twirl through the air like a swarm of iron whirligigs as they rise, and then fall upon [i]Delmarva[/i]'s bows.\n        \n        Then, suddenly, the Columbian frigate staggers as a storm of solid iron and spinning chains rend [i]Delmarva[/i]'s jib boom like a toothpick under a wagon wheel. $!{ship_pronoun_2} bowspirit crumples under the force of your fire, and Trimountaine Bay echoes with the crash of splintering timber and the cries of stricken ${gender}.\n      *comment endif\n      \n      A ragged cheer rises from [i]Foraker[/i]'s gun crews as they watch their shot strike home, but they will not have long to celebrate. Already, [i]Delmarva[/i] is wearing to starboard, and bringing ${ship_pronoun_2} own broadside to bear.\n      *goto chap_3_phase_2\n    *else\n      *set double_shot false\n      *if (double_shot = \"round\") or (double_shot = \"none\")\n        Through the smoke, you see your opening volley arc through the air, rising and falling towards [i]Delmarva[/i]'s approaching form.\n        \n        Then, you feel your heart sink as [i]Foraker[/i]'s broadside crashes into the water a few dozen yards short. You have missed.\n      *if double_shot = \"grape\"\n        A thousand iron projectiles lash the water, churning the surface of the sea into a white froth. But none of them come close to reaching the [i]Delmarva[/i]. You have missed.\n      *if double_shot = \"chain\"\n        Through the smoke, you see your opening broadside twirl through the air like a swarm of iron whirligigs, ready to wreak havoc on any rigging, timber, or ${gender} in their path.\n        \n        Yet all they strike is water, crashing into the sea two dozen yards short of the [i]Delmarva[/i]'s bows, you have missed.\n      *comment endif\n      \n      Your gun crews groan in dismay, but they will soon have bigger problems to contend with. Already, your adversary is heeling to starboard, and bringing ${ship_pronoun_2} own broadside to bear.\n      *goto chap_3_phase_2\n  #\"No, we'll use this opportunity to get upwind of ${ship_pronoun_3} instead.\"\n    *set upwind true\n    \"Four points to starboard!\" Burroughs relays. \"Put ${ship_pronoun_3} into the wind.\"\n    \n    The quartermasters respond immediately, hauling the wheel into position with grunts of exertion. [i]Foraker[/i]'s deck twists and strains under your feet as ${ship_pronoun_1} is wrestled into ${ship_pronoun_2} heading, hauling just close enough to the wind to still make headway.\n    \n    [i]Delmarva[/i]'s form slips to port as [i]Foraker[/i] skews starboard, clawing ${ship_pronoun_2} way upwind to gain the weather gauge. Soon, you will have the superior position in this fight.\n    \n    The Columbians, however, seem less preoccupied with the \"soon,\" and more with the \"now.\" Instead of turning in to try and cut you off, your adversary wears towards the wind only slightly, closing the distance little, but bringing ${ship_pronoun_2} own guns to bear. \n    *goto chap_3_phase_2\n  *if double_shot != \"none\"\n    #\"No, let us conserve our fire until it can be employed to maximum effect.\"\n      \"Aye, ${pronoun_5}!\" Burroughs replies, \"holding course.\"\n      \n      [i]Foraker[/i] continues onwards, closing with the [i]Delmarva[/i] more and more with every second. The Columbian frigate begins to loom larger and larger before you, until it becomes clear just how much larger than your own ship your adversary is. \n      \n      Still, they come closer, close enough to see the figures scrambling up and down the [i]Delmarva[/i]'s lines without the aid of a glass. Close enough to see the figure in the long blue coat and golden epaulettes of a Columbian Navy captain standing rigidly on ${ship_pronoun_2} quarterdeck, staring back at you.\n      \n      Then, your distant counterpart stretches out an arm towards ${pronoun_2} own quartermasters at ${pronoun_2} wheel. You are too distant to hear the words, but the intent of the Columbian's command becomes obvious enough, as the black-hulled warship turns hard to starboard, and brings ${ship_pronoun_2} guns to bear.\n      *goto chap_3_phase_2\n*label chap_3_phase_2\n*page_break\nYou are close enough now to see the sun glint off the black muzzles of [i]Delmarva[/i]'s guns as they are run out, to see the flash of the flintlock triggers as they go off, an instant before the Columbian frigate's entire side is enveloped by a vast array of silent eruptions.\n\n*if lieutenant = \"fisher\"\n  \"For what we are about to receive—\" you hear Fisher mutter next to you.\n*if lieutenant = \"simpson\"\n  \"Here it comes—\" you hear Simpson mutter next to you.\n*if lieutenant = \"shannon\"\n  \"Now let's see how good their shooting is—\" Shannon mutters next to you.\n*if lieutenant = \"pakennham\"\n  \"And now we've a reply,\" Pakenham observes with detached sang-froid.\n*comment endif\n\n*if delmarva_gunnery >= 70\n  *set c_gunnery - 10\n  *set c_str - 2\n  [i]Foraker[/i]'s deck shudders under your feet as [i]Delmarva[/i]'s broadside strikes home. The sea around you churns white with foam as a ball of solid iron rips through midships, punching through a foot and a half of oak as if it were a hammer going through a snuff box. An eighteen-pounder gun goes flying with the sharp ring of metal striking metal at high velocity. A storm of splinters follows in its wake, reducing the gun crew into a red-stained mess of mangled limbs and screaming wounded. \n  \n  A gaggle of lands${gender} rush forward to secure the gun as the surgeon's mate begins dragging those who still might be saved below. The gore-splattered gun-crews to each side keep working, their eyes focused on \n  *if fired = true\n    reloading and running out their weapons, \n  *if fired = false\n    the growing target before them,\n  and not the terrible spectacle only three paces away.\n*if delmarva_gunnery \u003c 70\n  The sea turns white with froth as [i]Delmarva[/i]'s broadside slashes into the water, short of [i]Foraker[/i]'s hull, or just behind ${ship_pronoun_2}'s stern gallery. One ball goes high, tearing through the gaps between deck and rigging with the high and raspy scream which you have heard enough times before to grow accustomed to.\n  \n  Most of your gun crews are accustomed to it too. They pay the near-misses no \n  *if fired = true\n    mind as they reload their weapons and run them out again. \n  *if fired = false\n    mind.\n*comment endif\n\n[i]Delmarva[/i] is less than three cables away and closing. At such ranges, both the accuracy and effect of your broadsides can only increase. Yet the same applies to [i]Delmarva[/i]'s fire as well—and the Columbian mounts far more guns, and far heavier ones than [i]Foraker does[/i]. The skill of your gun crews might make up the difference, but if it doesn't…\n*choice\n  #\"Hold ${ship_pronoun_3} steady. I mean to shoot it out.\"\n    *set fired true\n    *set no_guns false\n    \"Steady as ${ship_pronoun_1} goes!\" Burroughs relays to the quartermasters, as [i]Foraker[/i] continues to angle ever closer to ${ship_pronoun_2} adversary.\n    \n    *set gosub_index 4\n    *gosub_scene gosub\n    \n    *if (upwind = true) or (double_shot != \"none\")\n      *if upwind = true\n        \"Larboard battery, ready to fire, ${pronoun_5}!\" $!{pronoun_4} Markham reports, voice cracking with anxiety.\n      *if upwind = false\n        \"Starboard battery, ready to fire, ${pronoun_5}!\" $!{pronoun_4} Blanchard shouts, voice high with youthful excitement.\n    *if (upwind = false) and (double_shot = \"none\")\n      \"Starboard battery reloaded and ready to fire, ${pronoun_5}!\" $!{pronoun_4} Blanchard shouts, voice high with youthful excitement.\n    *fake_choice\n      #\"Aim for the hull! Fire as ${ship_pronoun_1} bears!\"\n        Not a moment after your orders are given, [i]Foraker[/i]'s guns give a mighty roar, vomiting smoke and flame, and black iron.\n        \n        *set delmarva_gunnery - 10\n        *set delmarva_morale - 5\n        *if double_shot = \"round\"\n          *set delmarva_gunnery - 20\n          Your double-shotted broadside strikes home with a terrible cataclysm of splintering timbers and blood-curdling screams. When the smoke clears, you see ragged holes punched into your adversary's black-painted flanks, and glimpses of the carnage your guns have wrought.\n            \n          So, ${ship_pronoun_2} sides are not made of iron after all.\n        *if double_shot = \"chain\"\n          *set delmarva_gunnery - 10\n          Your double-shotted broadside scythes through the air, chain shot spinning like iron whirligigs. Some slam directly into [i]Delmarva[/i]'s side, but only seem to bounce off, leaving naught but shallow dents in the black-painted hull.\n          \n          Perhaps ${ship_pronoun_2} sides are made of iron after all.\n          \n          Yet [i]Delmarva[/i]'s guns and crew are not so lucky. Twirling shot knocks cannon askew with the piercing ring of iron-on-iron, and those unfortunates caught in the direct path of those terrible chains do not even have time to scream before they are dismembered in a most expedition and grisly fashion.\n        *if double_shot = \"grape\"\n          *set delmarva_gunnery - 10\n          Two broadsides worth of grapeshot fly through the air, and pelts [i]Delmarva[/i]'s side like a hailstorm. The light iron balls barely make an impression on the Columbian's heavily built broadside, but they wreak savage execution amongst the guns and crew, striking cannon with a cacophony of piercing rings, and crushing the body of any poor unfortunate caught in the blizzard of flying metal.\n        *if double_shot = \"none\"\n          Your broadside strikes home, but the shot that strikes the hull only bounces off, leaving deep dents in [i]Delmarva[/i]'s black-painted sides.\n          \n          The Columbian's guns and crew prove less resilient. Iron strikes iron with piercing metallic rings, and round shot plows through [i]Delmarva[/i]'s crew, leaving furrows of broken bodies and screaming ${gender} in their wake.\n      #\"Shoot for ${ship_pronoun_2} crew! Fire as ${ship_pronoun_1} bears!\"\n        Not a moment after your orders are given, [i]Foraker[/i]'s guns give a mighty roar, vomiting smoke and flame, and black iron.\n        \n        *set delmarva_crew - 5\n        *set delmarva_morale - 5\n        *if double_shot = \"grape\"\n          *set delmarva_crew - 10\n          *set delmarva_morale - 10\n          Two broadsides worth of grapeshot fly through the air, and tear across [i]Delmarva[/i]'s deck like a hailstorm of killing metal. The air fills with the sharp ring of iron striking iron, and the dull, sickening sound of quarter-pound balls smashing through human flesh and bone. Entire gun crews are annihilated in the deadly blizzard, as ${gender} are flung around like marionettes on strings by the force of each impact, before falling to the deck as broken, tattered human rags. \n          \n          The effect is so great that it takes a moment for the stricken survivors to start screaming.\n        *if double_shot = \"chain\"\n          *set delmarva_crew - 5\n          *set delmarva_morale - 5\n          Chain shot is not designed to be used against crew, but that does not mean its effect is not anything short of terrifying. Chains designed to scythe through masts and rigging tear through human bodies with equal efficacy, and those unfortunates struck by [i]Foraker[/i]'s broadside fall to [i]Delmarva[/i]'s deck in broken pieces.\n        *if double_shot = \"round\"\n          *set delmarva_crew - 5\n          *set delmarva_morale - 5\n          Round shot is best employed against oak, not flesh, but the volley of killing iron you unleash on the [i]Delmarva[/i]'s deck does not care in the least. Flesh and bone are smashed just as efficaciously by eighteen pounds of flying iron as any timber. Round shot strikes cannon with enough force to send them flying off their trunnions, crushing their screaming crews under the weight of three tons of falling iron. \n        *if double_shot = \"none\"\n          Your broadside hits its mark, sending more than a dozen iron balls tearing across [i]Delmarva[/i]'s decks, smashing any cannon or timber in its path. What it does to human bodies is even worse, striking limbs and chests with such force that the bone is reduced to the consistency of gore, and the gore reduced to naught but bloody smears on the deck.\n      #\"Fire as ${ship_pronoun_1} bears! Aim for the rigging!\"\n        Not a moment after your orders are given, [i]Foraker[/i]'s guns give a mighty roar, vomiting smoke and flame, and black iron.\n        \n        *set delmarva_sailing - 10\n        *set delmarva_morale - 5\n        *if double_shot = \"chain\"\n          *set delmarva_sailing - 20\n          A double broadside of chain shot flings itself into [i]Delmarva[/i]'s rigging, a swarm of iron whirligigs twirling through the air and tearing into your adversary's vulnerable masts.\n          \n          The Columbian frigate staggers under the force of the impact as heavy iron chains shred sail, line, spar, and top${gender} alike. Where just moments before there had been an orderly machine of canvas, wood, and crew, there is now only a smashed confusion of broken timbers, sundered shrouds and shattered bodies. The whole tangle totters, and then tumbles into the sea with a terrible crash and a gout of white foam.\n        *if double_shot = \"round\"\n          Round shot is not designed for the purpose of wrecking rigging, but an eighteen-pound ball of solid iron does not discriminate between mast and hull. Those that strike home strike with the sharp crack of splintering timbers, to the hard crunch of crushed human bodies and the screaming of wounded masts. A spar tumbles free from [i]Delmarva[/i]'s mainmast, dragging a sail and a vast tangle of line with it as it crashes to the deck.\n        *if double_shot = \"grape\"\n          [i]Delmarva[/i]'s sails shred under the storm of grapeshot your guns vomit into it. When the smoke clears, some of the Columbian's sheets are reduced to mere rags.\n          \n          So are some of ${ship_pronoun_2} top${gender}, falling from the rigging as broken wrecks of what once were human, their shattered bodies hitting the deck like sacks of loose flesh.\n        *if double_shot = \"none\"\n          Your broadside rips through [i]Delmarva[/i]'s rigging, smashing shrouds, masts and top${gender} alike. One lucky hit all-but splits a spar in two, sending it, and the sail it was supporting crashing down. A pair of screaming figures cling to the wreck as it tumbles, their terrified cries filling the air until they are suddenly cut short by a hard, wet thump.\n    *comment endif\n      \n    *if c_gunnery >= delmarva_gunnery\n      *set delmarva_gunnery - 10\n      *set c_gunnery - 15\n      *set c_str - 5\n      *set gosub_index 7\n      *gosub_scene gosub\n      *page_break\n      *goto chap_3_phase_2_2\n    *else\n      *set c_gunnery - 15\n      *set c_str - 5\n      *set gosub_index 8\n      *gosub_scene gosub\n      *page_break\n      *goto chap_3_phase_2_2\n  *if upwind = false\n    #\"Hard to starboard! We must rake ${ship_pronoun_2} stern!\"\n      Burroughs relays your order immediately. A moment later, [i]Foraker[/i]'s deck tilts under your feet as ${ship_pronoun_1} heels hard in the water, angling sharply towards [i]Delmarva[/i]'s stern.\n      \n      *if spar_fixed = false\n        *set gosub_index 6\n        *gosub_scene gosub\n      *set gosub_index 4\n      *gosub_scene gosub\n      [i]Delmarva[/i]'s captain reacts swiftly. The black-hulled frigate begins to shorten sail and wear away even before you complete your turn.\n      \n      *if c_sailing >= delmarva_sailing\n        Yet the Columbian's crew does not share the same alacrity as yours. [i]Delmarva[/i] begins to heel away only sluggishly, too slowly to escape [i]Foraker[/i] as ${ship_pronoun_1} closes and brings ${ship_pronoun_2} guns to bear.\n        \n        You are close enough to see the wide-eyed look of horror on your counterpart's face, the instant before your larboard broadside fires point-blank into [i]Delmarva[/i]'s exposed stern.\n        *goto chap_3_phase_2_rake\n      *else\n        By the time you begin to close the distance in earnest, the Columbian is already turning away and bleeding speed. Now, instead of stealing a clean shot up [i]Delmarva[/i]'s stern, your adversary is nearing a perfect angle to put a broadside through [i]Foraker[/i]'s delicately built bows.\n        \n        With \n        *if sensibility \u003c= 50\n          cool resignation,\n        *if sensibility > 50\n          a spike of anger,\n        you order Burroughs to call off the approach. Your moment of opportunity, so laborious in the making, has been lost. You have been outfoxed.\n        *page_break\n        *goto chap_3_phase_2_2\n  *if upwind = true\n    #\"Hard a-larboard! I mean to rake ${ship_pronoun_2} stern!\"\n      Burroughs relays your order. The quartermasters haul on the wheel, sending [i]Foraker[/i] heeling larboard to descend upon [i]Delmarva[/i]'s stern quarter with all the force of the sea wind.\n      \n      *if spar_fixed = false\n        *set gosub_index 6\n        *gosub_scene gosub\n      *set gosub_index 4\n      *gosub_scene gosub\n      [i]Delmarva[/i]'s captain reacts swiftly. The black-hulled frigate begins to shorten sail and wear away even before you complete your turn.\n      \n      *if (c_sailing + 30) >= delmarva_sailing\n        But [i]Foraker[/i] holds the superior position, and the wind is on your side. The Columbian's attempt to escape only further exposes ${ship_pronoun_2} and brings ${ship_pronoun_2} closer as you bring your guns to bear.\n        \n        You are close enough to see the wide-eyed look of horror on your counterpart's face, the instant before your larboard broadside fires point-blank into [i]Delmarva[/i]'s exposed stern.\n        *goto chap_3_phase_2_rake\n      *else\n        [i]Foraker[/i] holds the superior position, and you have the wind in your favor, but amazingly, impossibly, [i]Delmarva[/i] turns in the water as if ${ship_pronoun_1} were mounted upon a swivel. By the time you manage to close, ${ship_pronoun_1} is already bleeding speed fast enough to bring ${ship_pronoun_2} broadside directly to bear on [i]Foraker[/i]'s delicately built bows. \n        \n        With \n        *if sensibility \u003c= 50\n          cool resignation,\n        *if sensibility > 50\n          a spike of anger,\n        you order Burroughs to call off the approach. Despite all your advantages, despite the thoroughness of your preparations and the favorable nature of your circumstances, you have been outfoxed.\n        *page_break\n        *goto chap_3_phase_2_2\n  #\"We are outgunned, we must try to board as soon as possible!\"\n    *if upwind = true\n      \"Aye, ${pronoun_5}!\" Burroughs replies before turning to convey your orders to the crew. \"Reef the tops'ls! Hard a-larboard!\"\n      \n      [i]Foraker[/i] bleeds speed as the topsails are pulled in, even as ${ship_pronoun_2} rudder pulls ${ship_pronoun_2} hard to port, riding the wind to turn about alongside [i]Delmarva[/i] before the Columbian gets off another broadside.\n      \n      Your sailing ${master} watches the turn carefully, waiting for just the right moment before—\n      \n      \"Now! Let fly all sheets!\"\n      \n      Your ship seems to surge forward in mid-turn driving towards the enemy frigate before the full force of the wind.\n    *if upwind = false\n      \"Aye, ${pronoun_5}!\" Burroughs replies before turning to replay your orders. \"Four points to starboard! Get us alongside!\"\n      \n      [i]Foraker[/i] heels gently beneath your feet as ${ship_pronoun_1} angles towards the [i]Delmarva[/i], closer and closer, riding the wind as ${ship_pronoun_1} makes ${ship_pronoun_2} approach.\n      \n    *if spar_fixed = false\n      *set gosub_index 6\n      *gosub_scene gosub\n      \n    *set gosub_index 5\n    *gosub_scene gosub\n    \n    *if (upwind = true) and ((c_sailing + 30) >= delmarva_sailing)\n      With the weather gauge on your side, getting [i]Foraker[/i] into position is almost childs-play. By the time [i]Delmarva[/i] begins to try and bring ${ship_pronoun_2} guns to bear, you are already less than a cable length away and closing fast.\n      *goto chap_3_phase_3\n    *elseif c_sailing >= delmarva_sailing \n      [i]Delmarva[/i]'s captain at last reacts to your approach, but it is already too late. By the time your counterpart gives the order to bring ${ship_pronoun_2} guns to bear, you are already close enough to hear the words. Sure enough, by the time the other frigate begins to turn, you are already less than a cable length away, and closing fast.\n      *goto chap_3_phase_3\n    *else\n      *set c_gunnery - 10\n      *set c_morale - 10\n      *set c_str - 5\n      [i]Delmarva[/i]'s captain at last reacts to your approach. The Columbian's crew reacts with astounding alacrity, wearing away from you even as ${ship_pronoun_1} reefs yet more sail, bringing ${ship_pronoun_2} guns to bear at the same time. \n      \n      You are less than a cable length away when the enemy opens fire.\n      \n      At such a distance, it is almost impossible to miss. [i]Delmarva[/i]'s broadside has had no time to lose any of its velocity in flight, and the heavy iron shot punches through [i]Foraker[/i]'s hide with such force that some of them come out the other side.\n      \n      In betwixt one broadside and the other, the enemy's fire leaves havoc in its wake. Screams rise up from the maindeck in unending chorus, and through the main hatch, you see at least one gun roll freely, unsecured save for a scrap of line, and the severed hand still clutching it.\n      *goto chap_3_phase_3\n      \n*label chap_3_phase_2_rake\n*page_break\n*set fired true\n*set no_guns false\n*set delmarva_sailing - 15\n*set delmarva_crew - 15\n*set delmarva_morale - 15\n*set delmarva_gunnery - 15\n*if not(choice_achieved_stern_rake)\n  *achieve stern_rake\n\"Fire!\"\n\n*if double_shot = \"round\"\n  *set delmarva_gunnery - 20\n  The deck beneath your feet trembles as [i]Foraker[/i]'s guns thunder in unison, vomiting out smoke and fire and two broadsides worth of solid shot directly into the Columbian frigate's exposed stern.\n  \n  Warships are built with their stoutest planking along their flanks, and their weakest along their stern. [i]Delmarva[/i] is no exception. $!{ship_pronoun_2} stern gallery, a delicate construction of light timber and glass, all-but disintegrates under the storm of flying metal.\n  \n  Yet your broadside continues on its destructive course, passing down the length of the [i]Delmarva[/i]'s upper deck like a tide of killing iron, leaving the smashed remnants of timbers, masts, guns, and ${gender} in its wake, until the entire ship is gutted from stem to stern, like an eel spitted on a harpoon.\n  \n  For a long moment, the Columbian frigate reels, its sails a-shiver, as if it were a grievously wounded beast, ${ship_pronoun_2} cries of pain the shrieks of tortured planking and the screams of ${ship_pronoun_2} stricken crew. \n  *goto chap_3_phase_2_rake_2\n*elseif double_shot = \"chain\"\n  *set delmarva_sailing - 20\n  [i]Foraker[/i]'s guns thunder in unison, spraying a double broadside directly into the Columbian frigate's exposed stern.\n  \n  A swarm of iron whirligigs smash into the [i]Delmarva[/i]'s delicately-built stern gallery at point blank range, the twirling iron balls smashing through the glass and light planks like kindling before spiraling down the length of the ship, rending timbers, dismounting guns, crushing bodies, and slamming into [i]Delmarva[/i]'s masts and rigging. All along the Columbian frigate's length, spars and sails fall like rain as they are cut loose by scything chains.\n  \n  The screaming has not yet had a chance to begin in earnest before a monumental crack issues from the Columbian ship's mizzenmast. With a terrible, ponderous inevitability, the gigantic structure of timber, line, and canvas topples over the side, taking half a dozen screaming top${gender} with it as it crashes into the water.\n  *goto chap_3_phase_2_rake_2\n*elseif double_shot = \"grape\"\n  *set delmarva_crew - 10\n  *set delmarva_morale - 10\n  [i]Foraker[/i] shudders as ${ship_pronoun_2} guns thunder in unison, vomiting smoke and fire and a hail of killing iron directly into [i]Delmarva[/i]'s exposed stern.\n  \n  The double broadside of flying metal rips through the Columbian's lightly-built stern gallery as if it were made of paper, not slowing in the least as it continues their deadly passage down the length of [i]Delmarva[/i]'s hull and decks. The storm of quarter-pound balls smash through bulkheads and shred sails. They punch through the bodies of the Columbian's gun crews as easily as if they had been made of mud, leaving only ragged, bloody heaps behind. \n  \n  So shocking of the slaughter that it takes a long, awful moment for even the screaming to begin.\n  *goto chap_3_phase_2_rake_2\n*else\n  [i]Foraker[/i]'s guns thunder in unison as they empty a full broadside into [i]Delmarva[/i]'s exposed stern.\n  \n  The Columbian's lightly-built stern gallery all but disintegrates under the force of your fire. The heavy shot from [i]Foraker[/i]'s eighteen-pounders smash through glass windows and light planking with ease, only to continue on along the length of [i]Delmarva[/i]'s hull, punching through bulkheads, dismounting cannon, and smashing human bodies into bloody pulp as they continue on their deadly course. \n  \n  [i]Delmarva[/i] almost seems to physically reel from the force of the impact, even as the screams of the wounded and dying fill the air.\n  *goto chap_3_phase_2_rake_2\n*label chap_3_phase_2_rake_2\n*page_break\nYet despite the devastating effect of your stern rake, the [i]Delmarva[/i]'s captain responds with a surprising alacrity. Within moments, ${pronoun_1} is rallying ${pronoun_2} stunned crew and getting them back into action. As you pass beyond your adversary, the Columbian frigate is already turning about, pulling ${ship_pronoun_2} wrecked stern out of the line of fire of a second broadside.\n\n*label chap_3_phase_2_2\nThe next moment, it becomes plainly clear that the Columbian captain's patience for a gunnery duel has run out. [i]Delmarva[/i] heels towards you, making plain ${ship_pronoun_2} captain's intentions to close to a boarding action.\n\n$!{lieutenant} sees it too. $!{pronoun_1} looks to you, trying to hide the anxiety in ${pronoun_2} expression. Your adversary is in command of a larger ship, and a larger ship almost certainly means a larger crew. If they get close enough to board, they might overwhelm [i]Foraker[/i]'s crew by weight of numbers alone.\n\n*if quarterdeck_guns = false\n  Then again, if they are in a position to board you, then you will be in a position to board them back, and if [i]Foraker[/i]'s company proves superior in spirit and skill, then you might yet carry the day in a matter of pistol and cutlass.\n*if quarterdeck_guns = true\n  *set delmarva_morale - 20\n  *set delmarva_sailing - 20\n  *set delmarva_crew - 5\n  But you are not without ways to even the odds: one of the long nines you had placed on the quarterdeck recoils with a sharp crack. [i]Delmarva[/i]'s quarterdeck is blasted with a sudden hail of iron. One of the Columbian's officers goes down screaming, another is simply cut in two. Of the quartermasters at their wheel, there is only a heap of rags and gore. The wheel itself is all but gone. If the Columbian captain means to maneuver ${pronoun_2} ship, ${pronoun_1} will have to go below.\n  \n  Yet your counterpart shows no sign of veering off. $!{pronoun_1} still stands, clutching a fresh wound on the inside of ${pronoun_2} thigh with one hand and drawing a cutlass with the other. Clearly ${pronoun_1} still means to settle this with a boarding action.\n*if marines = \"tops\"\n  *set delmarva_morale - 10\n  *set delmarva_crew - 5\n*if marines = \"deck\"\n  *set delmarva_morale - 5\n  *set delmarva_crew - 2\n*choice\n  #\"I'll not risk a boarding action yet: keep ${ship_pronoun_3} at a distance and keep pounding ${ship_pronoun_3}!\"\n    *set fired true\n    *set no_guns false\n    *set gallantry - 10\n    *set gosub_index 200\n    *gosub_scene gosub\n    Burroughs passes your order along, and [i]Foraker[/i] wears away as [i]Delmarva[/i] drives closer. \n    \n    It is no easy matter to fire on a ship while simultaneously sailing away from it. It requires a careful balance, turning away for a minute or two as the guns reload, before turning back around to bring your broadside to bear. You must remain close enough for reasonably accurate fire, but far enough to maintain a comfortable lead. Worse yet, every turn bleeds off a knot or two of the precious speed you need to keep ahead, a burden which your pursuer has no obligation to match.\n    \n    *if c_sailing >= delmarva_sailing\n      *if marines = \"tops\"\n        *set delmarva_morale - 10\n        *set delmarva_crew - 5\n      *if marines = \"deck\"\n        *set delmarva_morale - 5\n        *set delmarva_crew - 2\n      In short, there is no way to keep your distance indefinitely without simply turning tail and running, but that does not mean [i]Foraker[/i]'s company does not try its damnedest to keep the distance open for as long as they can. Twice, [i]Foraker[/i] turns to bring ${ship_pronoun_2} guns to bear. \n      *if c_gunnery >= 70\n        *set delmarva_sailing - 15\n        *set delmarva_gunnery - 15\n        *set delmarva_crew - 10\n        *set delmarva_morale - 10\n        Twice, your broadside strikes home with devastating effect, smashing timbers, guns, and ${gender}. Yet you've not the speed to try for a third time. Now, there is naught you can do, but stand and fight, as [i]Delmarva[/i] bores in for ${ship_pronoun_2} final approach.\n        *goto chap_3_phase_3\n      *else\n        *set delmarva_sailing - 10\n        *set delmarva_gunnery - 10\n        *set delmarva_crew - 5\n        *set delmarva_morale - 5\n        Twice, [i]Foraker[/i]'s broadside thunders, and though few shots hit their mark, enough strike home to do serious damage, smashing timbers, guns, and ${gender}. Yet there is no question of trying for a third attempt. [i]Foraker[/i] has lost too much speed, and [i]Delmarva[/i] is far too close. All you can do is stand and fight, as the Columbian comes in on ${ship_pronoun_2} final approach.\n        *goto chap_3_phase_3\n    *else\n      It is a feat which proves impossible. As [i]Foraker[/i] turns to attempt a broadside, [i]Delmarva[/i] surges forward, closing the distance before your guns are even run out. You may not have wished to risk a boarding action, but a boarding action is now upon you, whether you wish it or not.\n      *goto chap_3_phase_3\n  #\"So be it, let them come!\"\n    *if gallantry >= 60\n      *if c_morale \u003c 85\n        *set c_morale + 15\n      *if c_morale >= 85\n        *set c_morale 99\n      The words come out of your mouth a bit louder than you had intended, and with a tone of high melodrama which you had certainly not meant.\n      \n      Yet your bravado seems contagious. The ${gender} around you raise a ragged cheer as they hear your words. Some even brandish their cutlasses with all the dash and enthusiasm of mounted dragoons.\n      *if marines = \"deck\"\n        Even a few of the normally-imperturbable marines seem impressed, as unlikely as that sounds.\n      *comment endif\n      \n      *if sensibility >= 50\n        Intended or no, the response is most welcome. \n      *if sensibility \u003c 50\n        The response is a bit uncouth for your taste, but not unwelcome.\n      You'll not spurn this sudden demonstration of aggressive spirit, certainly not with a fully-crewed Columbian heavy frigate bearing down upon you. Such bloodthirsty sentiments will be needed before long.\n      *goto chap_3_phase_3\n    *else\n      *if c_morale \u003c 95\n        *set c_morale + 5\n      *if c_morale >= 95\n        *set c_morale 99\n      You had not intended for your words to come out as forcefully as they did, and you'd certainly not spoken them as some sort of exhortation or encouragement. Yet that is how some of the ${gender} within your hearing take it, their aspects brightening despite the sight of fifteen hundred tonnes of Columbian warship bearing down on the lot of you.\n      \n      You do not begrudge them their good spirits. In a few moments, they will need all the good spirits they can muster.\n      *goto chap_3_phase_3\n  *if fired = true\n    #\"Load grape! Quickly! Give them one last broadside as they come!\"\n      *if upwind = true\n        \"Larboard broadside! Load grape!\"\n      *if upwind = false\n        \"Starboard broadside! Load grape!\"\n      $!{lieutenant} relays as [i]Delmarva[/i] surges ever closer. It is a race against time now. The gun crews must reload before the Columbian frigate can bring ${ship_pronoun_3}self alongside, for once the boarding actions begins, every ${gender_2} will be needed to defend the ship.\n      \n      *if c_gunnery >= 80\n        *set no_guns false\n        With mounting anxiety, you watch your gun crews work as the Columbian frigate continues towards you. $!{ship_pronoun_1}'s but fifty yards away now, close enough to see the packed boarding parties at ${ship_pronoun_2} waist. Close enough to see the black cockade on your counterpart's hat as ${pronoun_1} stands tall on ${pronoun_2} own quarterdeck, surrounded by officers of ${pronoun_2} own, just as you do.\n        \n        Forty yards now, thirty, twenty, fifteen.\n        \n        *if marines = \"deck\"\n          \"Marines! Prepare to receive boarders!\" Mercer voice shouts from the forecastle.\n        *comment endif\n        \n        Then…\n        \n        \"Battery reports ready to fire!\"\n        \n        *if sensibility >= 50\n          Now damn-your-eyes! Now!\n          \n          \"Fire!\"\n        *if sensibility \u003c 50\n          Now!\n          \n          \"Fire!\"\n        *page_break\n        *set delmarva_morale - 15\n        *set delmarva_crew - 10\n        [i]Foraker[/i]'s guns vomit a storm of black iron into the packed crew on [i]Delmarva[/i]'s deck. The Columbian throng disintegrates under the killing hail, reduced to broken bodies and severed limbs and screaming, gory wreckage by the blizzard of metal. Those who somehow manage to stay standing only stare wild-eyed in shock at the butcher's yard where just a moment before, human beings had stood.\n        \n        Blood runs from [i]Delmarva[/i]'s scuppers in rivulets as the Columbian ship finally closes the last few yards.\n        *goto chap_3_phase_3\n      *else\n        Yet as [i]Delmarva[/i] looms closer and closer it becomes clear that your gun crews will not be able to reload fast enough. The Columbian frigate is only thirty yards away now, close enough for you to see the boarding parties waiting on ${ship_pronoun_2} deck. If they get across while most of your crew are still trying to work the guns—\n        \n        \"Belay that last order,\" you command hastily as your adversary closes to within fifteen yards. \"All hands prepare to repel boarders!\"\n        \n        The guns are abandoned. Powder charges and linstocks are dropped in favor of cutlasses and pistols, as [i]Delmarva[/i]'s black-painted side closes the last few yards.\n        *goto chap_3_phase_3\n  *if fired = false\n    #\"At last! Give them a broadside as they close!\"\n      *set no_guns false\n      You watch in anxiety, as the Columbian frigate draws closer and closer. [i]Foraker[/i]'s gun crews wait in anticipation for the order, but you do not give it, not yet, not even when [i]Delmarva[/i] is less than fifty yards from where you stand. You have not yet ordered the guns fired in anger today, and you will not get another chance after this. You must ensure your fire is employed to maximum effect, that every gun hits its mark. \n      \n      Thirty yards now, close enough for you to make out the tense faces of the boarding parties crouched along [i]Delmarva[/i]'s rail, their cutlasses and pistols in hand.\n      \n      Twenty yards, fifteen. You have known of pistol duels fought at longer ranges than this.\n      \n      *if sensibility >= 50\n        Now damn-your-eyes! Now!\n          \n        \"Fire!\"\n      *if sensibility \u003c 50\n        Now!\n        \n        \"Fire!\"\n      *page_break\n      *set delmarva_crew - 5\n      *set delmarva_morale - 10\n      *if double_shot = \"round\"\n        *set delmarva_morale - 15\n        *set delmarva_crew - 5\n        [i]Foraker[/i]'s broadside disappears in a flash of smoke and flame as the air shakes with thunder. [i]Delmarva[/i] shudders as your fire strikes home, ${ship_pronoun_2} timbers cracking with a sound like a songbird being crushed by a cobblestone. \n        \n        A cascade of heavy iron shot rips across the Columbian frigate's deck. The piercing ring of metal striking metal is joined by screams of pain and the wet, terrible sound of human limbs and bodies being crushed to a pulp. When the smoke clears, it becomes all too easy to see the gaping holes your fire has ripped into [i]Delmarva[/i]'s bulkheads, and the blood-splattered gaps you have shot into [i]Delmarva[/i]'s crew.\n      *if double_shot = \"chain\"\n        *set delmarva_morale - 15\n        *set delmarva_crew - 5\n        The air trembles with thunder as [i]Foraker[/i]'s broadside vomits a double-broadside of chain shot into [i]Delmarva[/i]'s crowded decks.\n        \n        Cries of pain and the smashing of timbers echo as chains designed to sever stout spars scythe through the far less sturdy forms of the Columbian frigate's crew. When the smoke clears, [i]Delmarva[/i]'s waist is a butcher's yard, ${ship_pronoun_2} decks heaped with broken planks, dismounted guns, and the broken forms of eviscerated ${gender}.\n      *if double_shot = \"grape\"\n        *set delmarva_morale - 15\n        *set delmarva_crew - 15\n        [i]Foraker[/i]'s guns fill the world with thunder as they vomit a storm of black iron into the packed crew on [i]Delmarva[/i]'s deck. The assembled Columbian boarding parties crumple like a field of wheat under a summer hail, reduced to crushed limbs and shattered and screaming, gory wreckage by the blizzard of killing metal. Those who escape the carnage can only stare wild-eyed in shock at the butcher's yard where human beings used to stand.\n      *if double_shot = \"none\"\n        [i]Foraker[/i]'s broadside disappears in a flash of smoke and thunder. [i]Delmarva[/i] shudders as your shot strikes home to the sharp crack of wrecked timbers and the hard crunch of crushed human bodies.\n        \n        When the smoke clears, you have a close-up view of the destruction your fire has wrought, of the smashed bulkheads, the broken bodies, of the piteou
