or it to be of any good. The losses you have taken this day are catastrophic, ruinous. The decks of both ships are carpeted with bodies, and the waters around you are dark with blood. You barely have enough ${gender} still on their feet to sail one frigate, let alone two.\n  \n  In the end, there is only one decision you can make, though it pains you to do it. You take as many of the enemy officers and crew aboard [i]Foraker[/i] as you can, send the rest ashore in boats, and set your prize ablaze to deny ${ship_pronoun_3} to the enemy.\n  \n  [i]Delmarva[/i] burns quickly, seasoned wood and tarred canvas quickly turning a small flame into a roaring inferno $!{ship_pronoun_2} captain doesn't long outlive ${ship_pronoun_3}. An hour after the wreck slips below the waves, your surgeon pulls you aside to tell you that Captain Wingate of the [i]Delmarva[/i] is no more, dead of ${pronoun_2} wounds.\n  \n  Your orders fulfilled, you set a course northwards, and begin the long voyage back to Ismay.\n  *goto ending_2_2\n*else\n  The voyage back to Ismay is not an easy one, especially not with one battle-weary crew stretched thin sailing two damaged ships past a hundred leagues of hostile coast. Every hour is a chaos of fresh crises, of holed bulkheads, reopened wounds, and rigging on the verge of collapse. \n  \n  At least your prisoners remain docile. Perhaps it is the likelihood that they will be quickly exchanged for captured Albionian sailors once they arrive at Ismay. Perhaps it is the 32-pound carronade double-shotted with grape you order pointed at their enclosure belowdecks as insurance. Whatever the reason, it is only the Columbian wounded who cause you any real vexation, and after two or three days, the surgeon announces that most of them are out of danger.\n  \n  [i]Delmarva[/i]'s captain is not one of them. For a day, ${pronoun_1} lingers, fighting against ${pronoun_2} wounds with the same tenacity that ${pronoun_1} had fighting against [i]Foraker[/i]'s company, but it is not enough. It takes thirty hours of torment for Captain Wingate of the [i]Delmarva[/i] to die, and by the time ${pronoun_1} does, it comes almost as a mercy.\n  *goto ending_2_3\n  \n*label ending_1_5\n*comment Foraker surrenders.\n*goto ending_2_1\n  \n*label ending_2_1\n*page_break\n*set patronage - 25\n*if lieutenant = \"pakenham\"\n  *if lieutenant_status != \"alive\"\n    *set lieutenant \"none\"\n  *set patronage - 15\nYour time in captivity is not unpleasant, at least, the local population do not endeavor to make it so. Having given your parole, you and your officers are allowed full freedom of the city.\n*if child_send = true\n  The Columbians even allow Burroughs to be reunited with ${pronoun_2}\n  *if gender = \"men\"\n    wife and child, \n  *if gender = \"women\"\n    husband and child,\n  both healthy under the care of a local doctor.\n\n*if bombard = true\n  There are times when one uncouth individual or other takes pains to point out the holes which [i]Foraker[/i]'s guns had knocked into this house or that street, but for the most part, the people of Trimountaine\n*if bombard = false\n  The people of Trimountaine\nprove remarkably civil in their dealings with those in service to a hostile power. It seems the war is far from popular in this part of the United Republics. If anything, those you speak with consider the martial glory their navy has won this past year to be scant compensation for the volume of trade they have lost thanks to (in the words of one merchant you speak with) \"those damned Southerners and their damned war.\"\n\nThe \"Southerners\" in question seem far less magnanimous, or at least their newspapers are, if the broadsheets from Henryville and Worsley are any indication. It is not enough that they crow over their navy's victory with a most unseemly vulgarity, but they even go so far as to play loose with the facts, exaggerating the size of [i]Foraker[/i]'s company while never mentioning the multiple advantages [i]Delmarva[/i] had held over you. One particularly vile column goes so far as to claim that you had done no damage to your opponent at all, even though you had seen quite the opposite with your own eyes.\n\n*if sensibility >= 50\n  It is infuriating to see such slander written and to be given no chance to answer them, but given the circumstances, you suppose things could be worse.\n*if sensibility \u003c 50\n  Still, such humiliation is only a minor vexation, given the circumstances.\nFor the most part, you spend the summer in an atmosphere of warmth and comfort. Within a few months, you receive the news that you and your crew are to be exchanged. Transport is arranged with commendable speed, and by the beginning of September, you are already on your way north to Ismay, and an inevitable board of inquiry.\n*page_break\n*if patronage >= 65\n  Your appearance before the board of inquiry is nothing more than a formality. Given the amount of interest you and your officers possess, it could hardly be anything else. \n  \n  Indeed, most of the officers presiding over the board seem to be more concerned with presenting your actions in as favorable a light as possible. \n  *if prize = false\n    Only Admiral Warwick sits apart, a look of thinly veiled disgust on ${pronoun_2} face as ${pronoun_1} watches ${pronoun_2} subordinates fall over each other to perjure themselves.\n    \n    Yet even the Commander-in-Chief's animosity cannot change the ruling.\n  *if prize = true\n    Even Admiral Warwick seems well-disposed towards you. After all, as ${pronoun_1} ${pronoun_3}self points out, you had only been following ${pronoun_2} orders.    \n  It is quickly agreed that you acted in accordance with the highest traditions of the service. You cannot be faulted for your defeat at the hands of a superior ship with a much larger crew—indeed, if anything, you are to be commended for gallantry in the face of such daunting odds.\n  \n  It is all stuff, of course, but such is the power of patronage within the service that even a defeat can be turned into a triumph.\n  *page_break\n  *set knight true\n  *set ship \"kingsport\"\n  *if not(choice_achieved_knight)\n    *achieve knight\n  And such is the power of your patronage that by the time you return to Albion, you have even become something of a hero. You are paraded through the streets, and invited to dinners in your honor, lauded and feted as the complete fighting sailor. \n  \n  You are even presented to court, where the $!{monarch} ${pronoun_3}self makes you a knight-companion of the Order of the Vigil.\n  *comment endif\n  \n  It is the hollow and desperate gratitude of a war-weary nation looking for any excuse to celebrate, but it is gratitude nonetheless. \n  *goto ending_3_1\n*elseif patronage >= 45\n  *set ship \"albionian\"\n  The board of inquiry does not go easy on you. You spend a full afternoon at Admiralty House before Admiral Warwick and half a dozen of your fellow post-captains, being questioned for every course of action you chose. Every order you gave is examined, every possibility of misconduct or incompetence scrutinized.\n  *if bombard = true\n    Your decision to order Trimountaine subject to general bombardment is noted, \n    *if smugglers = true\n      as are your dealings with the Columbian smugglers,\n    *if slave_release = true\n      as is the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  *if bombard = false\n    Your potential failures during the fateful engagement are noted,\n    *if smugglers = true\n      as are your dealings with Columbian smugglers,\n    *if slave_release = true\n      as is the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  and half a hundred other factors.\n  \n  Yet in the end, the outcome was never really in doubt. You are not without friends in the Admiralty,\n  *if lieutenant = \"pakenham\"\n    *if gender = \"men\"\n      neither is Lord Pakenham,\n    *if gender = \"women\"\n      neither is Lady Pakenham,\n  and the officers presiding over the board know full well that even a captain without a command cannot be handled roughly if ${pronoun_1} has enough friends in high enough places.\n  \n  So, in the end, you and your officers are acquitted of all\n  *if prize = false\n    wrongdoing, despite the misgivings of your questioners, and despite the look of thinly-veiled disgust on Admiral Warwick's face when the ruling is announced. \n  *if prize = true\n    wrongdoing, with Admiral Warwick ${pronoun_3}self reminding the board that while you were defeated, you had carried out your orders to the best of your ability.\n  *comment endif\n  \n  Before long, you are headed back to Albion, to await a new command.\n  *goto ending_3_1\n*elseif patronage >= 25\n  The board of inquiry does not go well. \n  \n  For a full day, you are put to question by half a dozen of your fellow post-captains, headed by Admiral Warwick himself. Every motive is scrutinized, every course of action you chose examined. \n  *if bombard = true\n    Your decision to order Trimountaine subject to general bombardment is noted, \n    *if smugglers = true\n      as are your dealings with the Columbian smugglers,\n    *if slave_release = true\n      as is the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  *if bombard = false\n    Your potential failures during the fateful engagement are noted,\n    *if smugglers = true\n      as are your dealings with Columbian smugglers,\n    *if slave_release = true\n      as is the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  and half a hundred other factors.\n  \n  With each passing hour, you find yourself subject to more looks of disapproval, more low whispers. \n  *if prize = false\n    Admiral Warwick's expression progresses from a sullen anger, to disgust, to a strange breed of pity.\n  *if prize = true\n    Admiral Warwick offers a token defense of your actions, but soon, ${pronoun_1} too only offers a look of pity for what is about to be done to you.\n  *comment endif\n  \n  In the end, the board does not recommend a court-martial, but it does not fully clear you of wrongdoing either. Officially, you are neither to be punished or rewarded, but any who could read betwixt the lines knows the true meaning of the ruling. It is a black stain on your record, a knowing hint to any who might see it that you have bungled your command, and that you are not fit for another.\n  \n  When you return to Albion, you do so still a captain, but you know full well that you will never command a ${ship_gender} of war ever again.\n  *goto ending_3_2\n*else\n  The board of inquiry takes half an hour to recommend a court-martial, but you had known what the ruling would be the moment you saw the look on Admiral Warwick's face.\n  \n  The reason for it is obvious enough. An unpopular war needs scapegoats, and examples must be made. Who better than a defeated captain with no influence at court or the Admiralty to wield in ${pronoun_2} own defense?\n  *if lieutenant = \"none\"\n    Perhaps if Pakenham had still been alive, you would have been able to use ${pronoun_2} connections to some effect, but with your first lieutenant dead, you are truly friendless.\n  *comment endif\n  \n  The proceedings of the court-martial bids fair to be a procession of all your sins remembered. Every course of action you chose is placed in the worst possible light, whether it be\n  *if bombard = true\n    your decision to order Trimountaine subject to general bombardment,\n    *if smugglers = true\n      your dealings with the Columbian smugglers,\n    *if slave_release = true\n      the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  *if bombard = false\n    the way which you trained your crew,\n    *if smugglers = true\n      your dealings with Columbian smugglers,\n    *if slave_release = true\n      the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  or half a hundred other orders which had seemed inconsequential when you had given them.\n  \n  By the time the court is through, what reputation you still retained is in tatters. When they announce their verdict, you cannot help but wonder if you are destined to be shot as an example, like poor old Admiral Dorrien sixty years ago.\n  \n  But no, they choose 'merely' to cashier you, to have you struck from the captain's list, and ejected from the service. It is a mercy, after a fashion, but for one who has devoted ${pronoun_2} entire life to the Navy, it seems no better than a slow death by deprivation.\n  \n  At least a firing squad would have been quick.\n  *goto ending_3_3\n\n*label ending_2_2\n*page_break\nYou arrive in Ismay to a rapturous welcome. News spreads quickly in a time of war, certainly faster than a half-crippled frigate with a battle-depleted crew. By the time you are sailing under the guns of Castle Hill, boats are already casting off, filled to the gunwales with cheering well-wishers. New Lothian has felt the threat of Columbian raiders and privateers all too keenly this war. To its inhabitants, the crew of a ship which has gone toe-to-toe with one of the enemy's dreaded heavy frigates and won must seem nothing less than heroes.\n\n*if status = \"wounded\"\n  You spend six weeks recovering at Ismay's naval hospital, where you are given every possible comfort. \n  *if lieutenant_status = \"alive\"\n    $!{lieutenant} recovers from ${pronoun_2} own wounds in the cot next to yours, and the two of your spend the long days amusing yourselves\n  *if lieutenant_status != \"alive\"\n    You spend the long days amusing yourself\n  by reading the increasingly shrill denunciations of the Columbian papers as they seek new and ever-more fantastic scapegoats to excuse the defeat of one of their 'invincible' frigates. \n  \n  Not that the Albionian papers are any better of course. While the Lordsport Register's sketch of a thick-thewed Albionian tar tossing a grotesque caricature of a Columbian sailor into the sea is worth a laugh or two,\n  *if sensibility >= 50\n    you suppose it a bit beyond the bounds of tasteful parody.\n  *if sensibility \u003c 50\n    such depictions cannot help but seem a little distasteful to you.\n  the Columbians are still cousins after a fashion. They are not Gauls, after all.\n*if status != \"wounded\"\n  You and your crew spend six weeks as the toast of Ismay, the undisputed ${gender} of the hour. Even Admiral Warwick seems almost entirely pleased with your accomplishment, \"though I do wish you had been able to sail ${ship_pronoun_2} back as a prize,\" ${pronoun_1} does not hesitate to add, as something of a caveat. \"God knows what good a ship like that could do in our service.\"\n  \n  No doubt there are others who must think along the same lines, but you do not hear them. It is not easy to hear criticism when ones' ears are abuzz with triumph.\n*goto ending_2_3a\n\n*label ending_2_3\n*page_break\n*set prize_money + 1000\n*if patronage \u003c= 75\n  *set patronage + 25\n*if patronage >= 75\n  *set patronage 100\n*if not(choice_achieved_delmarva_capture)\n  *achieve delmarva_capture\nIt is a fine day indeed when you bring in your prize under the guns of Ismay's Castle Hill. The people of the town line the docks in welcome, some even paddling out into the harbor not only to catch a glimpse of one of the United Republics' vaunted heavy frigates, but of the captain and company of the ship that humbled ${ship_pronoun_3}. New Lothian has felt the threat of Columbian raiders and privateers all too keenly this war. To its inhabitants, the crew of a ship which has gone toe-to-toe with one of the enemy's dreaded heavy frigates and won must seem nothing less than heroes.\n\n*if status = \"wounded\"\n  You spend six weeks recovering at Ismay's naval hospital, where you are given every possible comfort. \n  *if lieutenant_status = \"alive\"\n    $!{lieutenant} recovers from ${pronoun_2} own wounds in the cot next to yours, and the two of your spend the long days amusing yourselves\n  *if lieutenant_status != \"alive\"\n    You spend the long days amusing yourself\n  by reading the increasingly shrill denunciations of the Columbian papers as they seek new and ever-more fantastic scapegoats to excuse the defeat of one of their 'invincible' frigates. \n  \n  New Lothian's own papers answer back in fine form. After all, with [i]Delmarva[/i] lying as a prize in Ismay's naval yard, it is all they must do to publish the captured Columbian frigate's dimensions and crew manifest to prove the lie. Naturally, the more bellicose portions of the Columbian press do not let that stop them, and the feud drags on interminably, until even the most ridiculous assertions become tedious.\n*if status != \"wounded\"\n  You and your crew spend six weeks as the toast of Ismay, the undisputed ${gender} of the hour. Even Admiral Warwick seems entirely pleased with your exploit. \"$!{ship_pronoun_1} will make a fine addition to our force here, if the Admiralty will buy ${ship_pronoun_3},\" ${pronoun_1} confides to you during one dinner in your honor. \"Give the damned rascals a taste of their own medicine.\"\n  \n  There are others who opine the like as well. Many see your capture of [i]Delmarva[/i] as a turning point in the Columbian War. Perhaps they are right.\n*label ending_2_3a\n*page_break\n*set stat_state 2\n*if patronage >= 80\n  *set prize_money + 2000\n  *set ship \"kingsport\"\n  *set commodore true\n  *set baronet true\n  *if not(choice_achieved_baronet)\n    *achieve baronet\n  The reception you get when you return to Albion is even more impressive. For a public starved of good news from the Columbian War, the news of your victory is a much welcome event, proof that perhaps that dreary conflict across the sea might be won after all. \n  \n  You become a national hero overnight, given the amount of influence and the number of connections you have at Court and in the Admiralty, it could have hardly been otherwise. You are again celebrated and toasted, with the sort of splendor Albion only reserves for those bound for her martial pantheon. The patriotic fund awards you a dress sword studded with rubies and diamonds. Lindy's of Lordsport grants you a set of plate worth at least a thousand pound. You are made a Colonel of Marines, a sinecure which brings much amusement to Captain Mercer, as well as five hundred pound a year. The Admiralty orders a naval medal struck in gold to commemorate your accomplishment. \n  \n  And the day you are presented at court,\n  *if gender = \"men\"\n    the King himself has you kneel before him, and invests you as a baronet.\n  *if gender = \"women\"\n    the Queen herself has you kneel before her, and invests you as a baronetess.\n  *page_break\n  A visit to your prize agent yields yet more good news:\n  *goto ending_3_4\n*elseif patronage >= 60\n  *set prize_money + 1000\n  *set ship \"kingsport\"\n  *set knight true\n  *if not(choice_achieved_knight)\n    *achieve knight\n  The reception you get upon your return to Albion is just as impressive as the one which greeted you in Ismay. For a public starved of good news from the Columbian War, the news of your victory is a much welcome event, proof that perhaps that dreary conflict across the sea might be won after all. \n  \n  Wherever you go, you are celebrated and toasted as the hero of the day.\n  *if bombard = true\n    Even when less than flattering accounts of how you subjected the city of Trimountaine to a general bombardment\n    *if (smugglers = true) or (slave_release = true)\n      *if slave_release = true\n        or how roughly you treated the crew of the slaver [i]Amelia[/i]\n      *if smugglers = true\n        or dealt with smugglers off the Columbian coast\n  *if bombard = false\n    Even when less than flattering accounts\n    *if slave_release = true\n      of how you abused the crew of a Columbian slaver and illegally confiscated ${ship_pronoun_2} cargo\n      *if smugglers = true\n        or how you dealt with smugglers off the Columbian coast\n    *if smugglers = true\n      of how you dealt with smugglers off the Columbian coast\n  come to light, your few friends in the Admiralty and at Court have more than enough influence betwixt them to keep such talk from dimming your ascendant star. Indeed, you are soon inundated with the rewards of a grateful nation. The patriotic fund awards you a dress sword worked in filigree and rubies. Lindy's of Lordsport presents you with a set of plate chased in gold. Even the miserly old ${gender} at the Admiralty order a naval medal struck in gold to commemorate your achievement.\n  \n  And most of all, on the day you are presented at court, the $!{monarch} ${pronoun_3}self has you kneel before ${pronoun_3}, and dubs you a Knight-Companion of the Order of the Vigil.\n  *page_break\n  More good news comes when you pay a visit to your prize agent:\n  *goto ending_3_4\n*else\n  *set prize_money + 500\n  You return to Albion as something of a hero. For a public starved of good news from the Columbian War, the news of your victory is a much welcome event, proof that perhaps that dreary conflict across the sea might be won after all.  \n  \n  For a brief, blinding moment, you are celebrated and toasted, subject to a level of admiration and goodwill which you have never tasted before.\n  \n  Then come other accounts, less flattering accounts, which emerge to tarnish your newfound glory, stories of\n  *if bombard = true\n    how you subjected the city of Trimountaine to a general bombardment\n    *if (smugglers = true) or (slave_release = true)\n      *if slave_release = true\n        or how roughly you treated the crew of the slaver [i]Amelia[/i],\n      *if smugglers = true\n        or dealt with smugglers off the Columbian coast,\n  *if bombard = false\n    *if slave_release = true\n      how you abused the crew of a Columbian slaver and illegally confiscated ${ship_pronoun_2} cargo\n      *if smugglers = true\n        or how you dealt with smugglers off the Columbian coast.\n    *if smugglers = true\n      how to dealt with smugglers on the Columbian coast.\n  and half a hundred other such nasty tales. Not all of them are true, of course, but that makes little difference. You have too few friends with the influence to stop the spread of such rumors, and too many enemies more than happy to disseminate them. Within the space of weeks, you become something of an embarrassment, or even an object of public disdain.\n  \n  The Admiralty happily uses the excuse to subject you to the most shabby treatment. For all of your efforts, you are given a token commendation. When the Patriotic Fund delivers the sword it had commissioned for you during your brief moment of glory, they do it privately, through a servant's entrance.\n  *page_break\n  At least a visit to your prize agent yields some good news:\n  *goto ending_3_4\n  \n*label ending_3_1\n*page_break\nAlbion also means a visit to your prize agent, who greets you with a bit of very happy news. The prizes that [i]Foraker[/i] took off the Columbian coast have already been purchased.\n*if slave_deal = true\n  In addition, your agent informs you of the delivery of a substantial amount of money from a confidential source.\n*comment endif\n\n*if prize_money >= 10000\n  *if not(choice_achieved_treasure)\n    *achieve treasure\n  Taken as a whole, it is a truly astronomical sum, enough to purchase a grand estate in the country, a fashionable townhouse in the city, and still have enough left over for investment in the funds to provide a comfortable income for the rest of your life.\n  *goto ending_3_1a\n*elseif prize_money >= 5000\n  All in all, it is quite the splendid windfall, enough to offer quite a tidy income once invested in the funds.\n  *goto ending_3_1a\n*elseif prize_money >= 2500\n  Altogether, the money is hardly an insubstantial amount, enough to offer a small income to supplement your pay once invested in the funds.\n  *goto ending_3_1a\n*else\n  It is not as much money as you could have hoped for, but it is still something, and it is enough to tide you over in some comfort for a few months at least.\n  *goto ending_3_1a\n*label ending_3_1a\n\nFor a season, you have the liberty of managing your new wealth, among other things. You have time to spare\n*if status = \"wounded\"\n  as you recover from your lesser wounds, and get used to the lingering pains which still mark the imperfect healing of your more grievous ones.\n*if status != \"wounded\"\n  as you wait for the Admiralty to assign you a new ship.\n*comment endif\n\nThen, one rainy day early in the new year, a messenger in the scarlet coat of a royal marine appears at your door, a set of sealed orders in ${pronoun_2} hand. You do not even have to read beyond the first sentence to know what is in store.\n\nYou are going back to sea.\n*page_break\n*if ship = \"kingsport\"\n  *set stat_state 4\n*if ship = \"albionian\"\n  *set stat_state 5\n*if lieutenant_status = \"dead\"\n  *set lieutenant \"bannister\"\n[i]April 11th, 1814.[/i]\n\n*if lieutenant = \"bannister\"\n  \"There ${ship_pronoun_1} is,\" Bannister observes as ${pronoun_1} peers through ${pronoun_2} glass. \"Our old friend, the [i]Delmarva[/i].\"\n*if lieutenant = \"fisher\"\n  \"Damn me,\" Fisher mutters under ${pronoun_2} breath as ${pronoun_1} peers through the glass. \"If it is not the bloody [i]Delmarva[/i] once again.\"\n*if lieutenant = \"simpson\"\n  \"It could not be anyone else,\" Simpson states as ${pronoun_1} looks through ${pronoun_2} glass. \"It is the [i]Delmarva[/i]. I am sure of it.\"\n*if lieutenant = \"shannon\"\n  \"$!{ship_pronoun_1}'s even got the same layout of guns as the last time,\" Shannon observes as ${pronoun_1} looks through the glass. \"It is [i]Delmarva[/i]. It must be.\"\n*if lieutenant = \"pakenham\"\n  \"It seems we've found ourselves a return engagement,\" Pakenham observes languidly as ${pronoun_1} looks through ${pronoun_2} glass. \"Either we have found the [i]Delmarva[/i], or $!{ship_pronoun_2} exact double.\"\n*comment endif\n\n[i]Delmarva[/i].\n\n*if gallantry >= 50\n  Your heart starts to race as your first lieutenant's words register. It is a rare turn of luck which allows a captain to revenge ${pronoun_3}self on a victorious foe, and rarer still for the odds to be so far in your favor,\n*if gallantry \u003c 50\n  A tightness grips your guts as your first lieutenant's words register. It has been nearly a year, but that name still fills you with a deep, irrational dread.\n  \n  But things will be different this time,\n*if ship = \"kingsport\"\n  for your new command outclasses your foe by a vast margin. Indeed, HMS [i]$!{monarch}sport[/i] was designed to inflict upon the Columbian heavy frigates a taste of their own medicine. Half again the weight of the old [i]Foraker[/i], and heaving nearly twice the weight-of-broadside, [i]$!{monarch}sport[/i] outmatches its quarry in every aspect.\n*if ship = \"albionian\"\n  for you are not alone.\n  \n  \"[i]Albionian[/i] to Flagship!\" you command. \"Enemy in sight! Am closing to engage!\"\n  \n  HMS [i]Albionian[/i] is practically a copy of the old [i]Foraker[/i], but the ship to which you are signaling is anything but. HMS [i]$!{monarch}sport[/i] is Albion's response to Columbia's heavy frigates, with a broadside twice as heavy as yours, and the hull planking of a ship-of-the-line. \n*comment endif\n\nThe enemy are outmatched, not just here, but everywhere. The tide of the war has turned. The Columbian armies are all in retreat, and its navy is on its last legs. Only [i]Delmarva[/i] and [i]Charter[i/] remain at sea now, and even that state of affairs is not to last for much longer, not if you have your way.\n\nNo, today you will have your\n*if gallantry >= 50\n  revenge.\n*if gallantry \u003c 50\n  redemption.\nYou fix your eyes on the distant shape of the Columbian frigate, and you bellow the words you have waited far too long to say again.\n\n\"All hands, clear for action!\"\n*page_break\n*goto_scene ending \n\n*label ending_3_2\n*page_break\nIt is with such a cloud over your fortunes that you return to Albion, and pay a visit to your prize agent for what is very likely to be the last time.\n\n$!{pronoun_1}, at least, has some happy news for you. The prizes that [i]Foraker[/i] took off the Columbian coast have already been purchased.\n*if slave_deal = true\n  In addition, your agent informs you of the delivery of a substantial amount of money from a confidential source.\n*comment endif\n\n*if prize_money >= 10000\n  *if not(choice_achieved_treasure)\n    *achieve treasure\n  Taken as a whole, it is an astronomical sum, some consolation for the loss of your command and the end of your prospects in the service. With your newly-made fortune, you purchase a vast estate in the country, and a fashionable townhouse in the city. As the year turns, you settle into the life of a member of the landed gentry,\n  *if gallantry >= 60\n    but no life of ease can quench your thirst for glory, for danger, for the thrill of sailing into battle under the Union Flag. \n  *if gallantry \u003c 60\n    and live a life of safety and ease. It is almost everything you have ever wanted, almost.\n  *goto ending_3_2a\n*elseif prize_money >= 6000\n  All in all, it is a substantial sum. In addition to your half-pay, it is enough to keep you in comfort for the rest of your life. You purchase a sizable parcel of land and a fine house in the country. As the year turns, you try to settle into your new routine, \n  *if gallantry >= 50\n    but all the comforts of your new home serve to do is make you miss the pitching cabin of a frigate even more.\n  *if gallantry \u003c 50\n    and you almost succeed, almost.\n  *goto ending_3_2a\n*elseif prize_money >= 2500\n  All told, it is hardly a small sum. In addition to your half-pay, it is enough to keep you in some level of comfort. You purchase a tidy cottage in the country, and as the year turns, you settle into the routines of a half-retired naval officer.\n  *if gallantry >= 50\n    Yet such a life of solitude sits with you poorly, and before long, you find yourself once again staring towards the sea, wondering what could have been.\n  *if gallantry \u003c 50\n    It is not a bad life, and not necessarily an uncomfortable one, but still, the old itch remains.\n  *goto ending_3_2a\n*else\n  The money is enough to tide you over for a little while, enough to buy a small cottage in the country, and a few other comforts. However, it does not last long. Before the year has turned, you are living off your half-pay, and certainly not in any condition which one might consider comfortable.\n  \n  *if gallantry >= 50\n    In the end, you are left with little more than your regrets, and a desire for battle which you know you will never have again.\n  *if gallantry \u003c 50\n    At first, the peace and quiet is rather welcoming, but as you begin to realize the limitations of your current means, your state of genteel poverty becomes more and more stifling.\n  *goto ending_3_2a\n*label ending_3_2a\n*page_break\nOn a warm, rainy day in April, you put on your captain's uniform and go into the city to collect your half-pay. For a day or two, you circulate with ${gender} who still tolerate you as one of their own, who politely, but coldly keep you up to date with the state of the wars against Columbia and Gaul. For a day or two, you walk the halls of the Admiralty, and stare for long moments at your name, still printed on the pages of the Captain's List.\n\nOne day, your name will come to the top of that list, and you will be promoted rear-admiral by virtue of seniority alone. But even then, you will be an admiral without a command, yellowing on the beach until your name is forgotten in favor of better ${gender}.\n\nAll that is left for you now is to wander the halls in your uniform, pretending for a day or two to still be a real officer, and to think on what might have been.\n*page_break\n*goto_scene ending\n\n*label ending_3_3\n*page_break\n*set stat_state 3\nIt is under this cloud of disgrace that you return to Albion, where you pay a visit to your prize agent for the last time.\n\n$!{pronoun_1}, at least, has some happy news for you. The prizes that [i]Foraker[/i] took off the Columbian coast have already been purchased.\n*if slave_deal = true\n  In addition, your agent informs you of the delivery of a substantial amount of money from a confidential source.\n*comment endif\n\n*if prize_money >= 10000\n  *if not(choice_achieved_treasure)\n    *achieve treasure\n  Taken as a whole, it is an astronomical sum, but it is also one which will have to last you the rest of your life. After the complete nature of your disgrace, there can be no question of seeking reinstatement, or any sort of career which one of your class might call respectable.\n  \n  So you use a fraction of your accumulated prize money to purchase a small, but comfortable cottage in the country, and invest the rest in the funds, ensuring at least enough of an income to maintain you in some comfort. As fall turns to winter, you begin to settle into the new circumstances of your life.\n  *goto ending_3_3a\n*elseif prize_money >= 6000\n  The sum with which you are presented seems a gigantic one, and indeed, it is, but it is the last such windfall you are likely ever to see. Given the complete nature of your disgrace, there can be no respectable career open to you now. You will have to live off your new fortune for the rest of your life.\n  \n  So, you use a fraction of your prize money to purchase a small, drafty cottage in the country, and invest what remains in the funds, guaranteeing you enough of an income to live off of, if only just. As the year of 1813 comes to an end, you begin to settle in to the meager new circumstances of your life. \n  *goto ending_3_3a\n*elseif prize_money >= 2500\n  Your accumulated prize money seems a substantial sum at first, but it shall have to last you the rest of your life. There can be no question of reinstatement, or entrance into any respectable career, not after the complete state of your dishonor. Instead, you spend the majority of your accumulated prize money on a small cottage in the country, and invest the remainder, in the hopes that it will deliver you some scant living.\n  \n  As the weeks turn to months, you begin to settle into your new, meager circumstances, learning to make economies and become acquainted with a life of genteel poverty.\n  *goto ending_3_3a\n*else\n  Had conditions been any different, the amount of money you received would have been more than substantial. But as the sum upon which you much live for the rest of your life, it is nothing less than contemptible. \n  \n  Yet you make do as best you can, buying a small cottage in the country with the majority of the money, and investing the rest in the funds, to provide some sort of income. Unfortunately, it is nowhere near enough to live off of comfortably, and before the end of the year, you are forced to approach family and friends to keep yourself fed, a humiliation which you know will persist until the day that you die.\n  *goto ending_3_3a\n*label ending_3_3a\n*page_break\nAs the seasons change and the new year begins, you grow accustomed to your terrible solitude. You cling to what few familiar parts of your old life are left to you, exercising what little power you have remaining over your tiny complement of servants the way you once ruled over a crew of three hundred. \n\nSome days, you imagine yourself back aboard the pitching deck of a ${ship_gender} of war shaping the affairs of kingdoms and empires as you once did. They say that the war against Columbia has turned in Albion's favor. They say that Bellaroque has been forced to abdicate ${pronoun_2} throne, and that Gaul is once again restored to its ancient royal house. But these are no longer matters which concern you, only frayed threads that connect you to a life to which you are now barred.\n\nSome days, you lose yourself in those reveries for a little while, and for a short time, you are almost happy. But something always pulls you back to the drab, tawdry present, leaving you only with bittersweet memories, and thoughts of what might have been.\n*page_break\n*goto_scene ending\n\n*label ending_3_4\nthe prizes that [i]Foraker[/i] took off the Columbian coast have already been purchased.\n*if slave_deal = true\n  In addition, your agent informs you of the delivery of a substantial amount of money from a confidential source.\n*comment endif\n\n*if prize_money >= 10000\n  *if not(choice_achieved_treasure)\n    *achieve treasure\n  Taken as a whole, your share of the prize money comes to an astronomical sum, enough to easily afford a grand estate in the country, a fashionable townhouse in the city, and still have enough left over to keep you in luxury for the rest of your life.\n  *goto ending_3_4a\n*elseif prize_money >= 5000\n  Altogether, your share of the prize money make for a princely sum indeed, enough to allow you to live a life of ease for the rest of your days. \n  *goto ending_3_4a\n*elseif prize_money >= 2000\n  Taken altogether, your share of the prize money is quite a substantial sum, enough to banish any worries about money for quite some time, perhaps even enough to retire on.\n  *goto ending_3_4a\n*else\n  It is not as much as you could have hoped for, not enough to retire on, certainly, but it is enough to keep you fed and housed and clothed in some level of comfort for a while yet.\n  *goto ending_3_4a\n*label ending_3_4a\n\nFor a season, you have the time to consider such far-sighted notions\n*if status = \"wounded\"\n  as you recover from your lesser wounds, and get used to the lingering pains which still mark the imperfect healing of your more grievous ones.\n*if status != \"wounded\"\n  as you await your new assignment.\n*comment endif\n\nThen, one rainy day early in the new year, a messenger in the scarlet coat of a royal marine appears at your door, and you know before ${pronoun_1} even begins speaking, that you are being ordered to sea again.\n*page_break\n*if ship = \"kingsport\"\n  *set stat_state 4\n*if ship = \"foraker\"\n  *set stat_state 6\n*if lieutenant_status = \"dead\"\n  *set lieutenant \"bannister\"\n[i]April 11th, 1814.[/i]\n\n*if ship = \"kingsport\"\n  \"There can be no doubt about it,\" Lieutenant Bannister reports as ${pronoun_1} peers through ${pronoun_2} glass. \"That is URS [i]Charter[/i]. We have our quarry.\"\n  \n  *if gallantry >= 50\n    You feel the familiar lift in your heart at your first lieutenant's words. \n  *if gallantry \u003c 50\n    You feel that old familiar tautness about your heart at your first lieutenant's words.\n  Much may have changed since you were in these waters last, the Columbian armies might be in retreat, and the United Republics Navy might be on its last legs now, but [i]Charter[/i] is still the deadliest and most infamous of the enemy's ships. This Columbian frigate will be no less formidable than your last.\n  \n  Yet this time, it is your ship which holds the advantage. HMS [i]$!{monarch}sport[/i] is a plum command, designed specifically to outclass ships like [i]Charter[/i]. $!{ship_pronoun_1} is half again larger than [i]Foraker[/i], and can throw nearly twice ${ship_pronoun_2} weight in broadside, more than a match for any Columbian warship.\n  \n  *if commodore = true\n    *if not(choice_achieved_commodore)\n      *achieve commodore\n    And more than that, you are not alone.\n    \n    \"[i]$!{monarch}sport[/i] to squadron,\" you command. \"Enemy in sight, prepare to engage!\"\n    \n    The signal flags shoot up the mast immediately, fluttering just below the broad pennant of a commodore—your pennant. \n    \n    Replies come almost immediately. \"[i]Foraker[/i] acknowledges, [i]Albionian[/i] acknowledges.\"\n    \n    You turn your attention back to your quarry.\n  *if commodore = false\n    You fix your attention onto your quarry.\n  $!{ship_pronoun_1}'s close enough to pick out in detail now, from the stark white stripe along ${ship_pronoun_2} gunports to the sun-and-stripes fluttering from ${ship_pronoun_2} mizzen. Closer and closer ${ship_pronoun_1} looms, the last of Columbia's heavy frigates still at sea.\n  \n  There is but one thing to do now.\n  \n  \"All hands! Clear for action!\"\n*if ship = \"foraker\"\n  *if lieutenant = \"bannister\"\n    \"There can be no doubt about it,\" Lieutenant Bannister reports as ${pronoun_1} peers through ${pronoun_2} glass. \"That is URS [i]Charter[/i]. We have our quarry.\"\n  *if lieutenant = \"fisher\"\n    \"That's ${ship_pronoun_3}, it has to be,\" Fisher growls as ${pronoun_1} peers through ${pronoun_2} glass. \"That is URS [i]Charter[/i], it damned well couldn't be anything else.\"\n  *if lieutenant = \"simpson\"\n    \"That's ${ship_pronoun_3}. I am sure of it,\" Simpson insists as ${pronoun_1} looks through the glass again. \"That is URS [i]Charter[/i], and ${ship_pronoun_1}'ll not evade us long.\"\n  *if lieutenant = \"shannon\"\n    \"It could be no one else,\" Shannon states flatly as ${pronoun_1} looks through the glass. \"URS [i]Charter[/i]. No other ship has that same gun layout.\"\n  *if lieutenant = \"pakenham\"\n    \"I ain't think it possible it could be someone else,\" Pakenham observes as ${pronoun_1} peers through the glass. \"Either that is URS [i]Charter[/i], or the Columbians have got another heavy frigate we ain't know about.\"\n  *comment endif\n  \n  *if gallantry >= 50\n    You feel the familiar lift in your heart at your first lieutenant's words. \n  *if gallantry \u003c 50\n    You feel that old familiar tautness about your heart at your first lieutenant's words.\n  Much may have changed since you were in these waters last, the Columbian armies might be in retreat, and the United Republics Navy might be on its last legs now, but [i]Charter[/i] is still the deadliest and most infamous of the enemy's ships. This Columbian frigate will be no less formidable than your last.\n  \n  Yet this time, you are not alone.\n  \n  \"Signal [i]Foraker[/i] to flagship!\" you shout. \"Enemy in sight!\"\n  \n  The signal flags shoot up the mizzen almost immediately, and a reply comes from the tall masts of HMS [i]$!{monarch}sport[/i] in less than a minute: \"Flagship acknowledges. Prepare to engage!\"\n  \n  You turn your attention back to your quarry. $!{ship_pronoun_1}'s close enough to pick out in detail now, from the stark white stripe along ${ship_pronoun_2} gunports to the sun-and-stripes fluttering from ${ship_pronoun_2} mizzen. Closer and closer ${ship_pronoun_1} looms, the last of Columbia's heavy frigates still at sea.\n  \n  There is but one thing to do now.\n  \n  \"All hands! Clear for action!\"\n*page_break\n*goto_scene ending \n\n*label ending_fail\n*set patronage - 30\n[i]Foraker[/i] returns to Ismay to find the whole town in a complete uproar. A terse message from Admiralty House quickly explains why: despite your best efforts, the [i]Delmarva[/i] has eluded you entirely, having refit and resupplied in Tremountaine Harbor before escaping again to open sea. Worse yet, $!{ship_pronoun_1} has already made ${ship_pronoun_2} presence known by taking half a dozen Albionian prizes. \n\nAdmiral Warwick is livid. $!{pronoun_1} calls a board of inquiry with such furious haste that you do not even get a full day ashore before you are hauled before a council of your peers, to examine the possibility and severity of your misconduct, and to determine the necessity of a court martial.\n*page_break\n*if patronage >= 60\n  *set stat_state 2\n  Yet a court martial is certainly out of the question. You have too many friends in high places to make such a dire prospect realistic, you know that well. Judging by the fell expression on the Admiral's face as ${pronoun_1} presides over the hearing, ${pronoun_1} knows it too.\n  \n  But there is only so much leeway your connections can afford you. In truth, you have bungled your duty royally sailing back and forth like an imbecile while allowing your quarry the freedom to refit in complete peace. To reward such a failure with a complete exoneration would be unthinkable.\n  \n  So, the board does it best to ruin you, as a warning to others. Officially, they claim that no court martial is necessary, but they do not absolve you of blame in the matter either. At a glance, such an outcome might seem like an acquittal, but in truth it is an admission that you have too many powerful protectors to allow the embarrassment of a court martial. It is an admission of your guilt, and although you are allowed to walk out a captain of the Royal Navy, it is understood by all involved that you shall never be allowed to command a ${ship_gender} of war ever again.\n  *goto ending_3_2a\n*elseif patronage >= 25\n  *set stat_state 3\n  The board of inquiry takes half an hour to recommend a court-martial, but you doubt that particular decision had ever been in doubt.\n  \n  With the Columbian war going the way it is, the public needs a scapegoat, someone to embody the failure of the government's policies, and to prove that the Admiralty is taking the conduct of the war seriously. Unfortunately, your genuine failure in intercepting the [i]Delmarva[/i] have made you the perfect candidate. \n  \n  Your friends in the Admiralty will protest, of course, but given the circumstances, you doubt they can do much more than that.\n  \n  The court martial itself is an exhaustive affair. Your motives are put to the question, your integrity put in doubt. Every decision you made is exposed to criticism, whether it be the way which you trained your crew,\n  *if smugglers = true\n    your dealings with Columbian smugglers,\n  *if slave_release = true\n    the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  or half a hundred other orders which had seemed inconsequential when you had given them.\n  \n  By the time the court is through, it is almost a relief. You have not known a court martial to be so utterly hostile before. Perhaps you are to be shot as an example, like poor old Admiral Dorrien sixty years ago.\n  \n  But no, they choose 'merely' to cashier you, to have you struck from the captain's list, and ejected from the service. Perhaps the court thinks it is a mercy, that they have left you your life. But what have you left, without the rank and reputation which you have spent more than half your life accumulating?\n  \n  At least a firing squad would have been quick.\n  *goto ending_3_3\n*else\n  *set stat_state 3\n  The board of inquiry does not take long to recommend a court martial. You might have expected as much. It is clear that Admiral Warwick means to make an example of you.\n  \n  As for the trial itself, it follows a depressingly predictable trajectory, at least at first. The Commander-in-chief seems adamant on having you broken from the service for your failure. Every word you can muster in your defense is contradicted, or dismissed. Every decision you made is exposed to criticism, whether it be the way which you trained your crew,\n  *if smugglers = true\n    your dealings with Columbian smugglers,\n  *if slave_release = true\n    the undiplomatic way in which you handled your encounter with the slaver [i]Amelia[/i],\n  or half a hundred other orders which had seemed inconsequential when you had given them.\n  \n  You are judged guilty. Guilty of dereliction of duty, of disobeying a direct order, and of failing to do your utmost to destroy the enemy. \n  *page_break\n  Yet as you await your sentence, events take a turn for the worse. \n  \n  Warwick is not the only one wishing to make an example of you. Word of your failure has spread to Albion, where an outraged public and the sorely aggrieved mercantile houses of Lordsport demand the harshest possible penalty for the bungler who has cost them so much in pride and blood and treasure. The mob wants a scapegoat, not just for this latest failure, but for all the others which have preceded it in this sordid little peripheral war. \n  \n  Friendless and already pilloried for your failure, you are the obvious candidate.\n  \n  Not even Admiral Warwick seems all too pleased with the sentence when it is read out, but it is read out all the same: \"Captain $!{name}, this court orders you to be taken to the quarterdeck of $!{pronoun_2} Majesty's Ship [i]Courageous[/i],and to thenceforth be put before a firing squad and shot. God save the $!{monarch}!\"\n  *page_break\n  *if not(choice_achieved_shot)\n    *achieve shot\n  The day of your execution dawns gray and rainy, the first signs of the autumn storm. The deck of the [i]Courageous[/i] is slick under your feet as the marines march you astern, to where the assembled crews of the Columbian Squadron and half of Ismay might witness the example that is about to be made of you.\n  \n  You do not receive a word in sympathy, not even a whisper. The ${gender} gathered around you know well enough the potential penalty for a surfeit of prudence. Old Admiral Dorrien had been shot for the same offense sixty years ago, a warning that such a similar fate might also be inflicted on any commanding officer in the service.\n  \n  A warning you did not heed.\n  \n  The marines are already lined up, their muskets shielded from the miserable drizzle by an awning rigged from the mizzenmast. Their sergeant steps forward, a length of white cloth in ${pronoun_2} hands.\n  \n  \"I am obliged to offer you a blindfold, ${pronoun_5}, should you require one.\"\n  *fake_choice\n    #\"Yes, it shall be terrible enough without having to see it coming.\"\n      *set gallantry %-25\n      *set gosub_index 200\n      *gosub_scene gosub\n      With a nod, the sergeant ties the cloth over your eyes. \n      \n      No light shines through the blindfold, but you can still hear the sergeant's footsteps as ${pronoun_1} steps back, the shuffling and whispers of the Courageous' assembled company as they look on.\n      \n      \"Shoulder…arms!\"\n      \n      A rattle of wood and iron, as the marines prepare themselves. Your heart pounds in your chest as your thoughts race.\n      \n      \"Present…arms!\"\n      \n      You wonder if your execution will actually do any good. Perhaps your fellow officers will find the aggression they need to turn the tide of this war, or perhaps they will only see this as politically motivated theater. You wonder if—\n      \n      \"Fire!\"\n      \n      The world explodes in the rolling thunder of musketry. And then you do not wonder about anything again.\n    #\"No. I will meet my end with dignity.\"\n      *set gallantry %+25\n      *set gosub_index 200\n      *gosub_scene gosub\n      The marine looks at you with something almost like respect before turning back to the firing party.\n      \n      *label ending_fail_2\n      \"Shoulder…arms!\"\n      \n      A rattle of wood and iron as half a dozen muskets clear the deck. You feel your knees begin to buckle under you. You force them to lock still. \n      \n      \"Present…arms!\" \n      \n      The firing party bring their weapons to bear. Six wide, bayoneted muzzles stare at you. With a steadiness that you do not feel, you stare back, looking your executioners in the eye, knowing that if you are to die, then you might at least make it a death worth watching, for posterity's sake if nothing el—\n      \n      \"Fire!\"\n      \n      The world explodes in flame and thunder. And suddenly, posterity does not matter any more.\n    #\"I am about to be shot. Do you really think I give a damn?\"\n      *set sensibility %+25\n      *set gosub_index 200\n      *gosub_scene gosub\n      The sergeant replies with a bitter chuckle before returning to the firing party.\n      \n      *goto ending_fail_2\n  *page_break\n  *goto_scene ending \n  \n*label ending_4_1\n*set stat_state 7\n*if not(choice_achieved_death_victory)\n  *achieve death_victory\nWelcome to Infopedia, the Free Online Encyclopedia.\n\nArticle: Capture of URS [i]Delmarva[/i]\n\nThe Capture of URS [i]Delmarva[/i], or The Battle of Trimountaine Harbor, was a naval battle during the Columbian War of 1812-1815, taking place between the Columbian heavy frigate URS [i]Delmarva[/i] and the Albionian frigate HMS [i]Foraker[/i]. \n\nThe battle began on the morning of \n*if date >= 65\n  June \n  *set date_2 (date - 64)\n  *goto ep_stat_date\n*elseif date >= 34\n  May \n  *set date_2 (date - 33)\n  *goto ep_stat_date\n*elseif date >= 4\n  April \n  *set date_2 (date - 4)\n  *goto ep_stat_date\n*else\n  March \n  *set date_2 (date + 28)\n  *goto ep_stat_date\n*label ep_stat_date\n${date_2}, 1813, when URS [i]Delmarva[/i] sailed out of Trimountaine Harbor to challenge HMS [i]Foraker[/i], which was blockading the port at the time[1]. After a short artillery duel, both ships closed to board. In the ensuing action,\n*if lieutenant_status = \"dead\"\n  both [i]Foraker[/i]'s captain, and first lieutenant were killed.\n*if lieutenant_status != \"dead\"\n  [i]Foraker[/i]'s captain was killed.\nHowever, the Albionian crew was able to rally under the command of Mercer, the captain of marines, and force the Columbians to surrender[2]. In all the action lasted 11 minutes. [i]Foraker[/i] and [i]Delmarva[/i]'s crews both suffered severe casualties. The captain of the [i]Delmarva[/i],\n*if gender = \"men\"\n  John Wingate, was heavily wounded during the battle, and died of his wounds the next day[3].\n*if gender = \"women\"\n  Joan Wingate, was heavily wounded during the battle, and died of her wounds the next day[3].\n\nThe outcome of the battle proved a major morale victory for the Albionian Royal Navy[4], which had suffered a series of defeats in single ship actions against Columbian frigates in the year before. HMS [i]Foraker[/i]'s victory proved that the Royal Navy was still qualitatively superior to its Columbian opponent, and that previous defeats had only been the result of a massive inferiority of force [neutrality disputed]. It is postulated by some historians [citation needed] that the capture of the [i]Delmarva[/i] marked the turning point of the Columbian War at sea, and eventually led to the end of the conflict in early 1815.\n\nSee Also:\nCapture of HMS [i]Chevalier[/i]\nCapture of URS [i]Leicester[/i]\nCapture of URS [i]Chancellor[/i]\nColumbian War of 1812-1815\n*page_break\n*goto_scene ending \n\n*label ending_4_2\n*set stat_state 7\nWelcome to Infopedia, the Free Online Encyclopedia.\n\nArticle: Capture of HMS [i]Foraker[/i]\n\nThe Capture of HMS [i]Foraker[/i], or The Battle of Trimountaine Harbor, was a naval battle during the Second Columbian War of Independence, taking place between the Columbian heavy frigate URS [i]Delmarva[/i] and the Albionian frigate HMS [i]Foraker[/i].\n\nThe battle began on the morning of \n*if date >= 65\n  June \n  *set date_2 (date - 64)\n  *goto ep_stat_date_2\n*elseif date >= 34\n  May \n  *set date_2 (date - 33)\n  *goto ep_stat_date_2\n*elseif date >= 4\n  April \n  *set date_2 (date - 4)\n  *goto ep_stat_date_2\n*else\n  March \n  *set date_2 (date + 28)\n  *goto ep_stat_date_2\n*label ep_stat_date_2\n${date_2}, 1813, when URS [i]Delmarva[/i] sailed out of Trimountaine Harbor to challenge HMS [i]Foraker[/i], which was blockading the port at the time[1]. After a short artillery duel, both ships closed to board. In the ensuing action,\n*if lieutenant_status = \"dead\"\n  both [i]Foraker[/i]'s captain, and first lieutenant were killed.\n*if lieutenant_status != \"dead\"\n  [i]Foraker[/i]'s captain was killed.\nShortly thereafter, [i]Foraker[/i]'s crew began to surrender, and the Albionian ship struck ${ship_pronoun_2} colors 10 minutes after the first shot was fired[2]. As a result of ${pronoun_2} conduct during the battle, the captain of the [i]Delmarva[/i],\n*if gender = \"men\"\n  John Wingate,\n*if gender = \"women\"\n  Joan Wingate,\nwas promoted to the rank of Commodore in August, 1813 [3][4].\n\nURS [i]Delmarva[/i]'s victory in this battle continued a string of Columbian victories in single-ship actions against Albionian frigates which would last until the capture of URS [i]Leicester[/i] by HMS [i]Caulfield[/i] in the January of 1814[5]. These victories would cement the United Republics's place as a maritime power to be reckoned with, and pose a direct challenge to Albion's rule of the seas [neutrality disputed]. \n\nSee Also:\nCapture of HMS [i]Chevalier[/i]\nCapture of URS [i]Leicester[/i]\nCapture of URS [i]Chancellor[/i]\nColumbian War of 1812-1815\n*page_break\n*goto_scene ending \n", "gosub": "*check_achievements\n*if gosub_index = 1\n  *set gosub_index 0\n  *goto gosub_training\n*if gosub_index = 2\n  *set gosub_index 0\n  *goto gosub_transit_turn\n*if gosub_index = 3\n  *set gosub_index 0\n  *goto gosub_blockade_turn\n*if gosub_index = 4\n  *set gosub_index 0\n  *goto gosub_marines\n*if gosub_index = 5\n  *set gosub_index 0\n  *goto gosub_marines_2\n*if gosub_index = 6\n  *set gosub_index 0\n  *goto gosub_spar_break\n*if gosub_index = 7\n  *set gosub_index 0\n  *goto gosub_reload_success\n*if gosub_index = 8\n  *set gosub_index 0\n  *goto gosub_reload_failure\n*if gosub_index = 9\n  *set gosub_index 0\n  *goto gosub_endgame_boarding_defeat\n*if gosub_index = 10\n  *set gosub_index 0\n  *goto gosub_endgame_surrender\n*if gosub_index = 101\n  *set gosub_index 0\n  *goto gosub_new_lanc_1\n*if gosub_index = 102\n  *set gosub_index 0\n  *goto gosub_new_lanc_2\n*if gosub_index = 103\n  *set gosub_index 0\n  *goto gosub_worsley\n*if gosub_index = 104\n  *set gosub_index 0\n  *goto gosub_trimountaine\n*if gosub_index = 200\n  *set gosub_index 0\n  *goto gosub_achievement_test\n  \n*label gosub_training\n*if chapnum = 1\n  You call in your division heads and wardroom officers for a meeting and ask for a report on the ship's company. After a few minutes of discussion, the state of [i]Foraker[/i]'s crew becomes clear:\n*if chapnum = 2\n  Your officers deliver their reports, one after the other, giving you a clear picture of the state of [i]Foraker[/i]'s company:\n*comment endif\n  \n*if c_str >= 80\n  You have more than enough able hands to do all that might be required, and a few dozen more besides, should they be needed to replace casualties or to form a prize crew.\n  *goto training_1\n*elseif c_str >= 60\n  You have enough crew to sail the ship and fight the guns, but only just. Should you take losses or need to set off prize crews, you may find yourself short-handed.\n  *goto training_1\n*elseif c_str >= 40\n  The ship is in sore need of able hands. While you might have enough ${gender} on hand to keep the ship sailing, you certainly have none to spare for prize crews or boarding parties, except in the most strenuous exigencies.\n  *goto training_1\n*else\n  The ship is severely under-crewed. There are barely enough able hands to keep ${ship_pronoun_3} afloat. Should you be boarded or take losses in battle, you shall not even have that.\n  *goto training_1\n*label training_1\n\nAs for the gun crews,\n*if c_gunnery >= 80\n  their state can only be described as superb, capable of working their pieces with an expedition and a grace that would be the marvel of any observer and the pride of any captain.\n  *goto training_2\n*elseif c_gunnery >= 60\n  their state is no worse than as could be expected of a frigate of the Royal Navy, though there remains a great deal of room for improvement.\n  *goto training_2\n*elseif c_gunnery >= 40\n  they are in a tolerable condition, but only just. They may prove more than a match for their counterparts aboard a Gaulish or Columbian frigate, but they are far below any standard fit for an Albionian ship.\n  *goto training_2\n*else\n  they are in a dire state. A long period of inaction has left their skills to atrophy, and it will take drastic measures to make any good come of them.\n  *goto training_2\n*label training_2\n\nThe top${gender} are in\n*if c_sailing >= 80\n  excellent shape, their handling of the [i]Foraker/i]'s rigging made smooth and swift through constant practice.\n  *goto training_3\n*elseif c_sailing >= 60\n  good shape, certainly well enough to ensure that [i]Foraker[/i] will be able to use every bit of maneuverability ${ship_pronoun_2} sleek lines and heavy complement of sail will allow.\n  *goto training_3\n*elseif c_sailing >= 40\n  barely acceptable shape. Though they do their duty without fault or error, they have grown painfully slow, far slower than the rigging crew of any Albionian ${ship_gender} of war ought to be.\n  *goto training_3\n*else\n  abysmal shape, having been allowed to grow lax during a period of relative inactivity. Given their sluggish and careless manner, it is almost a wonder that there have been no serious accidents.\n  *goto training_3\n  \n*label training_3\n*if c_morale >= 80\n  Morale remains exceptionally high. [i]Foraker[/i]'s company is likely one of the most high-spirited in the fleet, certainly the happiest in the Columbian squadron.\n  *goto training_4\n*elseif c_morale >= 60\n  Morale remains high, though whether that state of affairs would endure an enemy broadside or boarding action is a different question.\n  *goto training_4\n*elseif c_morale >= 40\n  Morale has begun to flag. Though the crew still see to their duties, there is a definite sullenness in the air.\n  *goto training_4\n*else\n  Morale is wretched. The crew is on the verge of mutiny. Stern measures must be taken if [i]Foraker[/i]'s company are to fight with any enthusiasm the next time you encounter real opposition.\n  *goto training_4\n*label training_4\n\n*if chapnum = 1\n  *goto training_chap_1\n*if chapnum = 2\n  *goto training_chap_2\n*label training_chap_1\nYour officers look to you for your orders, anxious to prepare and implement any changes you might choose to order in the ship's routine.\n*choice\n  #The current regime is satisfactory.\n    *return\n  *if training != \"gunnery\"\n    #Let us direct our efforts towards gunnery drill.\n      *set training \"gunnery\"\n      You inform your officers of your intentions. Gun drill is duly scheduled to take place each morning until such a time as you deem it necessary to discontinue it.\n    \n      Touching the brims of their hats in acknowledgment, they head off to inform the ${gender}. \n    \n      Now that you've put the matter of training to rights, what is to be done now?\n      *return\n  *if training != \"sailing\"\n    #Our efforts are best spent in sail drill.\n      *set training \"sailing\"\n      You make your officers informed of your intentions. Time is to be put aside each morning for the purpose of running the top${gender} through the sail drill until you are satisfied with the state of the crew's qualities in that regard.\n    \n      Touching the brims of their hats in acknowledgment, they head off to inform the ${gender}. \n    \n      Now that you've made arrangements in that quarter, what is to be done now?\n      *return\n  *if training != \"morale\"\n    #A period of light duties is required to raise the crew's spirits.\n      *set training \"morale\"\n      You inform your officers: [i]Foraker[/i] is to transition from two watches to three, the better to allow the ship's company more sleep. In addition, you announce your intentions to reduce the duties of the crew and allow them more leisure time.\n    \n      For a few minutes, your officers discuss your orders and offer suggestions of their own as to what activities might be introduced, to dissuade the crew from falling into harmful idleness. Once a consensus is reached, they touch the brims of their hats in acknowledgment and head off to inform the ${gender}. \n    \n      That's settled, what now?\n      *return\n      \n*label training_chap_2\nYour officers await your conclusions anxiously as you gather your thoughts.\n\n\"$!{pronoun_5}?\" $!{lieutenant} asks. \"Might we know what you intend to do?\"\n*return\n    \n*label gosub_transit_turn \n*if date >= 65\n  *set date + 21\n  *page_break\n  And so you continue for the next three weeks, sailing up and down the Columbian coast, searching the approaches to each port again and again until any enthusiasm you and your officers might have once had for your duty is dulled into utter tedium.\n  \n  Yet for all your efforts, you find nothing. The few coasters and fishing boats you do spot run hard for shore the instant you are spotted, and you see neither hide nor hair of anything larger, certainly not your intended quarry.\n  \n  By the end of June, [i]Foraker[/i]'s stores of food, water, and spirits begin to run low. With only a week's supply of fresh water and eight days of biscuit left, you at last give the order to give up your pursuit, and return to Ismay.\n  *set ending_index 8\n  *page_break\n  *goto_scene epilogue\n*set date + 4\n*if training = \"gunnery\"\n  *set c_gunnery %+10\n*if training = \"sailing\"\n  *set c_sailing %+10\n*if training = \"morale\"\n  *set c_morale %+10\n*set gosub_index 200\n*gosub_scene gosub\n*rand die_roll 0 100\n*if (die_roll + event_weight) \u003c 25\n  *set event_weight + 25\n  *return\n*else\n  *set event_weight 0\n  *goto transit_events\n  \n*label gosub_blockade_turn \n*set date + 7\n*if training = \"gunnery\"\n  *set c_gunnery %+20\n*if training = \"sailing\"\n  *set c_sailing %+20\n*if training = \"morale\"\n  *set c_morale %+20\n*set gosub_index 200\n*gosub_scene gosub\n*rand die_roll 0 100\n*if (die_roll + event_weight) \u003c 25\n  *set event_weight + 25\n  *return\n*else\n  *set event_weight 0\n  *goto blockade_events\n  \n*label transit_events\n*if transit_event_counter >= 10\n  *return\n*set transit_event_counter + 1\n*rand die_roll 0 100\n*if die_roll >= 90\n  *if event_fish = true\n    *goto transit_events\n  *else\n    *set event_fish true\n    *goto gosub_event_fish\n*elseif die_roll >= 80\n  *if event_sea = true\n    *goto transit_events\n  *else\n    *set event_sea true\n    *goto gosub_event_sea\n*elseif die_roll >= 70\n  *if event_slaves = true\n    *goto transit_events\n  *else\n    *set event_slaves true\n    *goto gosub_event_slaves\n*elseif die_roll >= 60\n  *if event_overboard = true\n    *goto transit_events\n  *else\n    *set event_overboard true\n    *goto gosub_event_overboard\n*elseif die_roll >= 50\n  *if event_grog = true\n    *goto transit_events\n  *else\n    *set event_grog true\n    *goto gosub_event_grog\n*elseif die_roll >= 40\n  *if event_teach = true\n    *goto transit_events\n  *else\n    *set event_teach true\n    *goto gosub_event_teach\n*elseif die_roll >= 30\n  *if event_spar = true\n    *goto transit_events\n  *else\n    *set event_spar true\n    *goto gosub_event_spar\n*elseif die_roll >= 20\n  *if event_fight = true\n    *goto transit_events\n  *else\n    *set event_fight true\n    *goto gosub_event_fight\n*elseif die_roll >= 10\n  *if event_train_good = true\n    *goto transit_events\n  *else\n    *set event_train_good true\n    *goto gosub_event_train_good\n*else\n  *if event_train_bad = true\n    *goto transit_events\n  *else\n    *set event_train_bad true\n    *goto gosub_event_train_bad\n    \n*label blockade_events\n*rand die_roll 0 100\n*if die_roll >= 90\n  *if event_deserters = true\n    *goto blockade_events\n  *else\n    *set event_deserters true\n    *goto gosub_event_deserters\n*elseif die_roll >= 80\n  *if event_smugglers = true\n    *goto blockade_events\n  *else\n    *set event_smugglers true\n    *goto gosub_event_smugglers\n*elseif die_roll >= 70\n  *if event_sick = true\n    *goto blockade_events\n  *else\n    *set event_sick true\n    *goto gosub_event_sick\n*elseif die_roll >= 60\n  *if event_rats = true\n    *goto blockade_events\n  *else\n    *set event_rats true\n    *goto gosub_event_rats\n*elseif die_roll >= 50\n  *if event_grog = true\n    *goto blockade_events\n  *else\n    *set event_grog true\n    *goto gosub_event_grog\n*elseif die_roll >= 40\n  *if event_teach = true\n    *goto blockade_events\n  *else\n    *set event_teach true\n    *goto gosub_event_teach\n*elseif die_roll >= 30\n  *if event_spar = true\n    *goto blockade_events\n  *else\n    *set event_spar true\n    *goto gosub_event_spar\n*elseif die_roll >= 20\n  *if event_fight = true\n    *goto blockade_events\n  *else\n    *set event_fight true\n    *goto gosub_event_fight\n*elseif die_roll >= 10\n  *if event_train_good = true\n   *goto blockade_events\n  *else\n    *set event_train_good true\n    *goto gosub_event_train_good\n*else\n  *if event_train_bad = true\n    *goto blockade_events\n  *else\n    *set event_train_bad true\n    *goto gosub_event_train_bad\n\n*label gosub_event_fish\n*page_break\nYou are a day and a half out when you spot a dozen crew clustered against the starboard rail. It is not just lands${gender} either, but petty officers and midship${gender} too. All of them peer over the side, regardless of rank or seniority, staring longingly into the deep blue water.\n\n*if sensibility >= 50\n  Curious, you cross the quarterdeck to the side to see for yourself. The sea no doubt has many wonders for lands${gender}, but it takes a spectacle indeed to astound an old salt of twenty years' service or more.\n  \n  It takes a while for you to see it, but when you do, the sight is unmistakable: a great shimmering silver cloud just beneath the surface of the water, a massive school of fish.\n  \n  *if lieutenant = \"fisher\"\n    \"Damn me,\" Fisher utters as ${pronoun_1} comes up to the rail next to you. \"I hate fish, but after two months of nothing but salt beef, beans, and biscuit, even I can see the appeal of a fresh, fat cod for dinner.\"\n  *if lieutenant = \"simpson\"\n    \"Cod, I think,\" Simpson observes as ${pronoun_1} comes up to the rail next to you. \"At this latitude it would have to be.\" Your first lieutenant shakes ${pronoun_2} head. \"I grew up eating the stuff in lieu of meat. I was ten when I had my first beefsteak. Yet after two months of salt beef and biscuit, I dare say even I cannot help but find the prospect of fresh fish for dinner attractive.\"\n  *if lieutenant = \"shannon\"\n    \"Halibut? Or is it pike?\" Shannon muses as ${pronoun_1} comes up to the rail next to you. \"No, but pike is a freshwater fish. I do rather hope it is halibut, though after two months of salt beef and biscuit, I could likely eat a Gaul, were ${pronoun_1} fresh-killed and well-peppered.\"\n  *if lieutenant = \"pakenham\"\n    \"Fish,\" Pakenham observes as ${pronoun_1} comes up to the rail next to you. \"One might certainly understand the appeal. As modest a desire as it is, a fresh fish has all the desirability of a fine roast after two months of naught but salt beef and biscuit.\"\n*if sensibility \u003c 50\n  Strange. The sea no doubt has many wonders for lands${gender}, but it takes a spectacle indeed to astound an old salt of twenty years' service or more. You order Lieutenant $!{lieutenant} to see what has captured the attention of so many of your crew.\n  \n  *if lieutenant = \"fisher\"\n    \"Fish, ${pronoun_5},\" Fisher reports once ${pronoun_1} returns. \"Damn me, a great gargantuan cloud of them, just beneath the surface. No wonder the ${gender} are so enraptured. I despise fish, but after two months of salt beef and biscuit, even I can see the appeal.\"\n  *if lieutenant = \"simpson\"\n    \"It's a school of fish, ${pronoun_5},\" Simpson reports. \"Cod, if I am not mistaken. I grew up on the stuff myself. For all the contempt that familiarity breeds, I cannot but understand the appeal of such a sight to ${gender} who have had naught but salt beef, split beans, and biscuit for the past two months.\"\n  *if lieutenant = \"shannon\"\n    \"A large school of fish, ${pronoun_5},\" Shannon reports. \"Halibut or cod or pike, maybe. Quite frankly, ${pronoun_5}, after two months of salt beef and biscuit, I really could not care what sort of fish it was, and I don't think the ${gender} do either.\"\n  *if lieutenant = \"pakenham\"\n    \"Fish,\" Pakenham reports simply. \"A great many of them. A rather quotidian sight at open sea, but one must suppose that after two months of salt beef and split beans and biscuit, anything else edible might seem a desirable novelty.\" \n*comment endif\n  \nIt is not uncommon for the captains of ships at sea to allow their crew a day or two of fishing, but that is time you may not have, given the current circumstances.\n\nStill, Lieutenant $!{lieutenant} has a point. A bit of variety in the crew's diet will do a great deal to increase morale. It may be worth the delay.\n*choice\n  #\"This is a ${gender_2}-of-war, not a fishing boat. $!{lieutenant}, send the ${gender} back to their posts.\"\n    *set c_morale %-5\n    $!{lieutenant} touches the brim of ${pronoun_2} hat in salute. \"Aye-aye, ${pronoun_5}.\"\n    \n    Your lieutenant gets to work. After a few moments of shouting, the assemblage at the rail return to their work, sullen and grumbling. As the day passes, some continue to cast forlorn glances over the side, but by sunset, the fish are nowhere to be seen.\n    \n    [i]Foraker[/i] continues on ${ship_pronoun_2} way.\n    *return\n  #\"Furl sail and drop sea anchors. Let the crew have their day of fishing.\"\n    *set date + 2\n    *set c_morale %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    A round of cheers rises from the ship's waist as $!{lieutenant} passes on your decision.\n    \n    For the rest of the day, the ship's company happily dangle lines over the rails and cast nets from the ship's boats. Before long, [i]Foraker[/i]'s deck is covered in piles of silvery-skinned cod.\n    \n    *if c_morale >= 75\n      That evening, your steward delivers to you a gigantic specimen, cooked with lemon and pepper: a gift from the crew.\n    *if c_morale \u003c 75\n      Through the evening, the crew salt the smaller specimens for later while they eagerly devour the largest and juiciest catches themselves amidst music and cheers, in an atmosphere more fit for a rustic celebration than a ${ship_gender}-of-war.\n    *page_break\n    It takes most of the next morning to put the ship back to rights, but the crew seem much happier in their labor as they dump piles of fish guts overboard and holystone the deck clean.\n    \n    By the early afternoon, [i]Foraker[/i] is once again underway.\n    *return\n  #\"Might there be a way to fish while still under sail?\"\n    You call a meeting on the quarterdeck to discuss the issue. Your lieutenants don't have any ideas, but $!{master} Burroughs offers a suggestion.\n    \n    \"There's a sort of fishing boat used in the channel, a dogger,\" ${pronoun_1} explains. \"Instead of lying still, it drags nets behind it, scooping up fish as it passes through. If we can keep alongside those fish, we could do something similar.\"\n    \n    Now there's a thought. \n    \n    Your order the crew to begin weaving together nets out of spare line. It is arduous work, and not necessarily the sort they are used to, but the prospect of fresh fish for dinner lends them a vigor which keeps their hands moving.\n    \n    By mid-afternoon, the first of the nets is ready.\n    *page_break\n    *if c_sailing >= 55\n      *set c_morale %+10\n      *set gosub_index 200\n      *gosub_scene gosub\n      The plan works marvelously. Burroughs and the crew keep [i]Foraker[/i] next to the school of fish with only minimal course adjustments. After only half an hour, the first net comes up again, bulging with writhing, silvery cod. Cheers shake the deck, and the next two nets are sent over the side with eager enthusiasm as jubilant hands begin to gut and sort their first catch right on the deck.\n      \n      *if c_morale >= 75\n        That evening, your steward delivers to you a gigantic specimen, cooked with lemon and pepper: a gift from the crew.\n        \n      *if c_morale \u003c 75\n        Through the evening, the crew salt the smaller specimens for later while they eagerly devour the largest and juiciest catches themselves amidst music and cheers, in an atmosphere more fit for a rustic celebration than a ${ship_gender}-of-war.\n        *comment endif\n        \n        Yet the revelry does not get in the way of [i]Foraker[/i]'s mission. \n      *comment endif\n      The next morning, the decks are scrubbed clean, the nets are stowed, and your ship continues on its way.\n      *return\n    *else\n      *set c_morale %-10\n      Unfortunately, the nets prove more trouble than they are worth. The increased drag beneath the waterline makes the ship most troublesome to maneuver, and despite Burroughs' best efforts, [i]Foraker[/i] simply cannot hold steady. \n      \n      By mid afternoon, the nets are empty, and the school of fish are nowhere to be seen.\n      \n      Sullenly, the crew pull the now-useless contraptions up. The disheartening experience of seeing all their toil come to naught has put them in a poor mood.\n      \n      Yet you cannot let that hold you from your orders. [i]Foraker[/i] continues on ${ship_pronoun_2} course. You have weightier matters to pursue.\n      *return\n      \n*label gosub_event_sea\n*page_break\nTwo days later, you wake to the presentiment of misfortune. It is not the cold fingers down the spine which presages real disaster, but a general unease, which seems to ebb and flow with every breath. Naught seems to be amiss when you stroll onto the quarterdeck that morning, but your sailor's instincts have been honed by years of hard service, and you have learned to trust them: something is wrong.\n\nThus, it is no surprise when $!{master} Burroughs approaches you with a worried look on ${pronoun_2} face.\n\n\"The barometer's dropping fast, ${pronoun_5},\" ${pronoun_1} announces. \"A storm is coming, a bad one.\"\n*page_break\n*if sensibility >= 50\n  A storm! Damnation!\n*if sensibility \u003c 50\n  A storm. A most unpleasant surprise.\nUnder normal conditions, the safest approach would be to find some secluded cove along the coast, drop anchor and wait the storm out, but that would take precious time you might not have. A riskier option would be to furl sail and ride the tempest out. You might lose less time that way, but [i]Foraker[/i] would also be at the mercy of the storm.\n\nThen, there is the really risky option: you could set topgallants and royals, and try to use the storm to your own advantage, riding its winds as best you can. Such a task would require no trivial amount of skill on the part of captain and company both, and failure could mean the loss of your sails, the top${gender} who must work them, or even a mast. \n\nBurroughs looks to you for orders.\n*choice\n  #\"Find me a protected cove nearby: we'll shelter there.\"\n    *set date + 4\n    *set gallantry %-10\n    *set gosub_index 200\n    *gosub_scene gosub\n    It doesn't take long to find a half dozen likely shelters. The Columbian coast is full of smuggler's coves and protected bays large enough and deep enough to handle a single frigate. Better yet, given how sparsely populated the country is, most of your likely candidates are far from habitation. The enemy might not even know that you are there.\n    \n    You order a course set for the closest candidate, and within a day, [i]Foraker[/i] is ensconced snugly within a small, circular cove, even as dark clouds fill the sky and the seas begin to rise with increasing violence.\n    *page_break\n    For two days, your ship sits placidly in protected waters as the wind and rain beat impotently against the natural breakwaters of your temporary harbor. When the storm blows itself out, [i]Foraker[/i] is entirely unscathed, though it takes another day to get ${ship_pronoun_2} out to sea again.\n    \n    The instant conditions allow it, you order your ship to resume ${ship_pronoun_2} course with all possible sail, but you h
