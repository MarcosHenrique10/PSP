s sight of one poor Columbian, ${pronoun_2} leg trapped under the weight of a dismounted carronade, trying to claw ${pronoun_3}self away with the stumps of two smashed arms.\n      *comment endif\n      \n      The screams are the only thing you can hear now, and all you can see are the rivulets of blood streaming off [i]Delmarva[/i]'s deck, Yet the Columbian ship does not falter. $!{ship_pronoun_1} continues on ${ship_pronoun_2} course, closing the last few yards to contact.\n      *goto chap_3_phase_3\n*label chap_3_phase_3\n*page_break\n[i]Foraker[/i] pitches under your feet, as ${ship_pronoun_1} and [i]Delmarva[/i] meet at last, smashing together with a tremendous, splintering impact.\n\nIt takes you a moment to regain your footing, but when you do, you can already see the Columbians readying themselves to jump the gap onto [i]Foraker[/i]'s deck. To your side, your own ${gender} are readying themselves to do the same. \n\nYour officers look to you for orders.\n*if marines = \"deck\"\n  *set marines_mod + 15\n*choice\n  #\"We'll let the enemy expend themselves first, then drive them back.\"\n    *goto chap_3_boarded\n  #\"We must board them: I shall lead, who volunteers?\"\n    *goto chap_3_boarding_lead\n  #\"$!{lieutenant}! Mercer! Lead the boarders across!\"\n    *goto chap_3_boarding_order\n    \n*label chap_3_boarded\n\"Steady! Steady!\" your officers shout to your anxious crew as they wait behind cover and brandish their weapons, ready to repel boarders.\n\n[i]Delmarva[/i]'s boarding parties leap down onto [i]Foraker[/i]'s deck with a mighty roar,\n*if (delmarva_crew + delmarva_morale) \u003c= ((c_str + c_morale) + marines_mod)\n  *set c_str - 10\n  *set c_morale - 10\n  *set delmarva_morale - 20\n  *set delmarva_crew - 20\n  *if c_str \u003c 1\n    and you do not have enough ${gender} left to oppose them. The few crew still on their feet do not last long before they are overwhelmed. \n    \n    Within moments, you are all-but surrounded by the enemy, trapped on the quarterdeck of your own ship with no way out.\n    *page_break\n    *set gosub_index 9\n    *gosub_scene gosub\n  *if c_morale \u003c 1\n    and few of your crew seem willing to fight them. Too many of your crew simply toss their weapons to the deck and raise their hands, while the few that resist are overwhelmed in short order.\n    \n    Within moments, you are the only one in sight still armed and standing. All around you, the enemy close in.\n    *page_break\n    *set gosub_index 9\n    *gosub_scene gosub\n  *if c_str >= c_morale\n    a blue-coated officer leading the way, but \n    *if marines != \"deck\"\n      [i]Foraker[/i]'s own company meets them with a ragged volley of pistol fire, and a sudden rush of cutlasses and bayonets.\n    *if marines = \"deck\"\n      [i]Foraker[/i]'s marines stop them cold with a disciplined volley of musketry and march in with fixed bayonets, your sailors following close behind.\n    *comment endif\n    \n    The Columbians fight well, but there are simply too few of them to push through. After a few moments of hard fighting,\n  *if c_morale > c_str\n    a steel-tipped tide of attackers in sailors' motley, led by a blue-coated officer. \n    *if marines != \"deck\"\n      [i]Foraker[/i]'s own company rushes forward to meet them with a ragged volley of pistol fire, and a ferocious rush of cutlasses and bayonets.\n    *if marines = \"deck\"\n      [i]Foraker[/i]'s marines stop them cold with a disciplined volley of musketry before marching in with fixed bayonets, your sailors following close behind.\n    *comment endif\n    \n    The Columbians fight well, and have the numbers, but they simply cannot match the sheer fury with which your ${gender} assail them. After a few moments of hard fighting,\n  the remnants of the boarding parties fall back to their own ship, leaving their officer and a great many of their number lying dead or wounded on [i]Foraker[/i]'s blood-slick deck. \n  \n  Your own losses are considerably less severe.\n*if (delmarva_crew + delmarva_morale) > ((c_str + c_morale) + marines_mod)\n  *set c_str - 20\n  *set c_morale - 20\n  *set delmarva_morale - 15\n  *set delmarva_crew - 15\n  *if c_str \u003c 1\n    and your crew are simply too few to offer any real resistance. Those still on their feet are overwhelmed in moments.\n    \n    Within moments, the enemy are rushing the quarterdeck in great number. They drive you back towards the stern rail, until there is nowhere left to retreat.\n    *page_break\n    *set gosub_index 9\n    *gosub_scene gosub\n  *if c_morale \u003c 1\n    and the already-tenuous morale of your crew simply breaks. Most of your crew throw their weapons to the decks and put their hands up. The few that try to fight are quickly overwhelmed.\n    \n    Within moments, you are the only one in sight still with any fight left in ${pronoun_3}. The enemy close in, weapons at the ready, until they surround you entirely.\n    *page_break\n    *set gosub_index 9\n    *gosub_scene gosub\n  a blue-coated officer at their head. Your crew do not hesitate to meet them with pistol and cutlass, but\n  *if marines = \"deck\"\n    even with your marines firing disciplined volleys into the enemy,\n  it takes long minutes of hard fighting to push the enemy back to their own ship. \n  \n  [i]Foraker[/i]'s deck is covered with dead, both yours and theirs.\n*page_break\n*if c_morale >= 60\n  Despite the hard fighting, your ${gender} remain in excellent spirits.\n  *if c_str >= 60\n    With most of your crew still on their feet, now is the perfect opportunity to take the fight to the enemy and carry the day.\n    *goto chap_3_boarded_2\n  *elseif c_str >= 30\n    Your crew have taken heavy losses, and you still have enough ${gender} on their feet to take the fight to the enemy.\n    *goto chap_3_boarded_2\n  *else\n    Few of your crew are still on their feet, but there may yet be enough to take the fight to the enemy and snatch victory from the jaws of annihilation.\n    *goto chap_3_boarded_2\n*elseif c_morale >= 30\n  There is still some fight left in your ${gender} yet, though how much exactly, you cannot say.\n  *if c_str >= 60\n    Yet you still have more than enough crew still on their feet to take the fight to the enemy and carry the day.\n    *goto chap_3_boarded_2\n  *elseif c_str >= 30\n    You still have enough crew on their feet to strike back against the enemy, but you do not know if it will be enough to carry the day.\n    *goto chap_3_boarded_2\n  *else\n    Worse yet, only a few of your crew are still fit for action. It will take a colossal stroke of fortune to secure victory now.\n    *goto chap_3_boarded_2\n*else\n  But your ${gender} will not take much more.\n  *if c_str >= 60\n    At least the majority of them are still on their feet. Perhaps, if you are fortunate, you might yet overwhelm [i]Delmarva[/i]'s crew with sheer numbers.\n    *goto chap_3_boarded_2\n  *elseif c_str >= 30\n    Though a good portion of your crew remain on their feet, you doubt they will stand up to another boarding attempt.\n    *goto chap_3_boarded_2\n  *else\n    Given how few are still left standing, they have good reason to waver. You may be entirely out of options.\n    *goto chap_3_boarded_2\n\n*label chap_3_boarded_2\n*choice\n  #\"I am leading a boarding party across, I need volunteers.\"\n    *goto chap_3_boarding_lead\n  #\"$!{lieutenant}! Mercer! Lead a counter-attack!\"\n    *goto chap_3_boarding_order\n  #\"It is no use: strike our colors, we must surrender.\"\n    *set gallantry %-40\n    *set gosub_index 200\n    *gosub_scene gosub\n    For a moment, there is only stunned, shocked silence.\n    \n    Then everyone begins speaking at once.\n    \n    \"Enough!\" you reply, raising your voice if only to remind them that [i]Foraker[/i] is still your ship. \"Our situation is untenable. The enemy have the numbers, and we cannot hold out when they make a second attempt.\"\n    \n    Sure enough, the advance parties of a second Columbian attack are already leaping over the bulwarks.\n    \n    \"We must strike,\" you conclude. \"That is an order.\"\n    \n    This time, there are no objections.\n    *page_break\n    *set gosub_index 10\n    *gosub_scene gosub\n    \n*label chap_3_boarding_lead\n*if lieutenant = \"fisher\"\n  \"Damn me,\" Fisher growls as ${pronoun_1} steps forward, \"to take a Columbian heavy frigate by boarding? I would not miss it for the world.\"\n*if lieutenant = \"simpson\"\n  \"I'll go,\" Simpson states grimly as ${pronoun_1} steps forward. \"There's not much need for me here. I might as well endeavor to render myself of use.\"\n*if lieutenant = \"shannon\"\n  \"I am with you, ${pronoun_5},\" Shannon states as ${pronoun_1} steps forth.\n*if lieutenant = \"pakenham\"\n  \"One does not suppose one shall be much use here,\" Pakenham muses as ${pronoun_1} steps forward. \"Better to be in the thick of it.\"\n*comment endif\n\nMercer steps forward too. \"There is no chance of my staying here,\" ${pronoun_1} declares. \"A marine officer's place is at the forefront.\"\n\n$!{master} Burroughs looks at you, and your other officers in turn, before offering a sigh and a nod. \"I'll remain here to keep the ship steady. Good luck to all of you, and Godspeed.\"\n\nYou leave Burroughs behind as you head forward with $!{lieutenant} and Mercer. \"Forakers to me!\" you shout as you draw your sword. \"Forakers to me!\"\n\n*if c_str >= 60\n  Your crew gather behind you, a vast tide of sailors\n  *if marines = \"deck\"\n    and marines\n  all waiting for you to lead the way across to the [i]Delmarva[/i]'s deck. \n  *goto chap_3_boarding_lead_2\n*elseif c_str >= 30\n  Those of your crew still on their feet rally to you. Within moments, a sizable force of sailors\n  *if marines = \"deck\"\n    and marines\n  stand at your back, waiting for you to lead the way across the gap to [i]Delmarva[/i]'s hostile deck.\n  *goto chap_3_boarding_lead_2\n*else\n  All those who are still on their feet answer your rallying cry. There are at least two dozen of them,\n  *if marines = \"deck\"\n    sailors and marines both,\n  but you all know that [i]Delmarva[/i] might still have hundreds of crew waiting for you.\n  *goto chap_3_boarding_lead_2\n*label chap_3_boarding_lead_2\n\nAhead, you can see the dark shapes of your Columbian counterparts waiting in the thickening powder fog, a mass of silhouettes bristling with muskets and cutlass blades. \n*if gallantry >= 50\n  You feel a surge of fear rise from the pit of your stomach, but you push it back down, hard. It is too late for fear to do any good now.\n*if gallantry \u003c 50\n  You feel a sudden terror course through you as you stand on the verge of mortal peril. You force it down, making sure it does not show on your face. No, you mustn't seem a coward now.\n$!{lieutenant} takes up position to your left, and you see Mercer's scarlet coat move up on your right. You take a deep breath, step back, and make the leap from your ship to your adversary's. Sword in hand, you pull yourself over [i]Delmarva[/i]'s bone-white rail, with a battle cry on your lips.\n*set hist_note_2 1\n*fake_choice\n  *if (gallantry >= 50) and (sensibility >= 50)\n    #\"A hero's grave, or glorious victory!\"\n      *if c_morale \u003c 90\n        *set c_morale + 10\n      *if c_morale >= 90\n        *set c_morale 99\n  *if (gallantry >= 50) and (sensibility \u003c 50)\n    #\"Follow me who can!\"\n      *if c_morale \u003c 90\n        *set c_morale + 10\n      *if c_morale >= 90\n        *set c_morale 99\n  #\"[i]Foraker[/i]!\"\n    *if c_morale \u003c 95\n      *set c_morale + 5\n    *if c_morale >= 95\n      *set c_morale 99\n  #\"For Albion!\"\n    *if c_morale \u003c 95\n      *set c_morale + 5\n    *if c_morale >= 95\n      *set c_morale 99\n  #\"God save the $!{monarch}!\"\n    *if c_morale \u003c 95\n      *set c_morale + 5\n    *if c_morale >= 95\n      *set c_morale 95\n*if c_morale >= 70\n  \"Huzzah!\" comes the thunderous response as your Forakers leap over [i]Delmarva[/i]'s rail after you with weapons in their hands and murder in their eyes.\n  *goto chap_3_delmarva\n*elseif c_morale >= 35\n  \"Huzzah!\" comes the reply, enthusiastic if a bit weary, as your Forakers climb over [i]Delmarva[/i]'s rail after you.\n  *goto chap_3_delmarva\n*else\n  Your Forakers do not cheer, but they do follow, climbing over [i]Delmarva[/i]'s rail, weapons in hand.\n  *goto chap_3_delmarva\n\n*label chap_3_boarding_order\nYour first lieutenant and captain of marines barely take the time to acknowledge the order before springing into action, carrying out their new charge with such ferocious enthusiasm that you cannot wonder if they had been waiting for you to express that very command this whole time.\n\nWithin moments,\n*if c_str >= 40\n  your two officers have assembled a sizable force from your company, almost everyone who could be spared for a boarding party.\n*if c_str \u003c 40\n  your two officers have scraped together almost all of your ship's company still in a condition to fight.\n*comment endif\n\n*if marines = \"tops\"\n  With [i]Foraker[/i]'s marines delivering covering fire from the tops, \n*if marines = \"deck\"\n  With the fixed bayonets of [i]Foraker[/i]'s marines backing them,\n$!{lieutenant} and Mercer take their hastily assembled force over the side and onto the Columbian deck.\n\n*if lieutenant = \"fisher\"\n  \"It is conquer or die!\" Fisher roars as the boarding party disappears into the powder fog. \"For Albion!\"\n*if lieutenant = \"simpson\"\n  \"With me, Forakers!\" Simpson shouts as ${pronoun_1} leads the boarding party into the powder-fog, sword in hand. \"Huzzah!\"\n*if lieutenant = \"shannon\"\n  \"No fear now,\n  *if gender = \"men\"\n    lads!\"\n  *if gender = \"women\"\n    girls!\"\n  Shannon cries as ${pronoun_1} leads the boarding party into the smoke. \"Huzzah!\"\n*if lieutenant = \"pakenham\"\n  Pakenham shouts something indistinct as ${pronoun_1} advances, but it is Mercer who leads the way sword in hand. \"Cut them down!\" ${pronoun_1} roars as ${pronoun_1} charges into the fog. \"Not an ounce of mercy until they strike! Huzzah!\"\n*page_break\nFor long minutes, you wait anxiously upon the quarterdeck as the crack of musketry and the ring of steel on steel echo from the smoke-obscured shadow of [i]Delmarva[/i]'s deck. Only the tops of the enemy ship's masts are visible through the powder-fog, but your battle-trained ears pick out every crack of a pistol, every thump of a musket butt striking home, every scream of pain. \n\nThe din of battle ebbs and flows, falling into lulls as the obscured combatants gather their breath, only to erupt into a fresh round of violence. \n\n*if ((c_str + c_morale) + (marines_mod)) >= (delmarva_crew + delmarva_morale)\n  Finally, the sound of fighting fades, and does not renew itself.\n  \n  Something like silence hangs in the air as the world seems to reduce itself to the sounds of flapping canvas, creaking timber, and the almost-imperceptible thump of bare feet against deck.\n  \n  Then, the Sun-and-Stripes of the United Republics falls from the [i]Delmarva[/i]'s mizzen, and the Union Flag of Albion rises to replace it.\n  *page_break\n  Elation sweeps across [i]Foraker[/i]'s deck in a wave. \n  *if gallantry >= 50\n    You feel your own spirits soar as the \"huzzahs\" wash over you in what seems like endless repetition, exultant rollers upon a victorious shore.\n    *if sensibility >= 50\n      You even hear your own voice roaring with them.\n    *if sensibility \u003c 50\n      Only your sense of propriety stops your own voice from joining them.\n  *if gallantry \u003c 50\n    You steady yourself on the binnacle as your knees weaken under you as the \"huzzahs\" wash over you. \n    *if sensibility >= 50\n      You let out the breath you did not know you had been holding, and for a brief, solitary moment, you give yourself over to the sentiment of victory.\n    *if sensibility \u003c 50\n      You force yourself to regain your composure. Even now, you cannot afford to show weakness.\n  *comment endif\n  \n  The air trembles with the sound of cheers, filling the air with such an expression of joy that your thoughts cannot help but float with it. For a few brief moments, there is nothing in the world but you, your ship, and the victory you have won.\n  \n  It is only when you see Captain Mercer return with $!{lieutenant}'s bloodied, lifeless body in ${pronoun_2} arms does reality make itself known once more.\n  *set lieutenant_status \"dead\"\n  *if not(choice_achieved_story_4)\n    *achieve story_4\n  *if impress = false\n    *if not(choice_achieved_unimpressed)\n      *achieve unimpressed\n  *if no_guns = true\n    *if not(choice_achieved_no_guns)\n      *achieve no_guns\n  *page_break\n  *set ending_index 4\n  *goto_scene epilogue\n*else\n  That is, at least, until the first of your ${gender} stagger out of the smoke, battered, bloodied, and thoroughly beaten.\n  *page_break\n  Within moments, that first trickle becomes a torrent, disorganized, disarmed, and utterly deprived of any fight they might have once had in them. Many clutch fresh and terrible wounds as they limp away from the fight, blood trickling through their fingers and staining the deck. As for your first lieutenant and captain of marines, they are nowhere to be seen.\n  \n  Instead it is the Columbians who emerge out of the powder-fog next. They too, are bloodied and battered, but these are no disordered stragglers. The aspect of victory is clear on their features as they charge out of the smoke, weapons at the ready.\n  \n  Within moments, those of your crew still on their feet are overwhelmed or tossing their weapons to the deck. The enemy are rushing past them, swarming forward to secure the forecastle, or storming the quarterdeck by the dozen. In what seems like an instant, you find yourself surrounded by the enemy, trapped on your own quarterdeck. \n  *set lieutenant_status \"dead\"\n  *set mercer_status \"dead\"\n  *page_break\n  *set gosub_index 9\n  *gosub_scene gosub\n  \n*label chap_3_delmarva\n*set gosub_index 200\n*gosub_scene gosub\nThe ragged staccato of pistol fire echoes from every direction, only to be met with a hurried return volley from your boarding party. You see some of your ${gender} slump to the deck, and some of powder-obscured silhouettes too.\n\nThen, the dark shapes in the smoke coalesce into reality, as [i]Delmarva[/i]'s crew charges out to face you, their killing steel gleaming in the dull light.\n*page_break\n*if c_str >= delmarva_crew\n  *if c_morale >= delmarva_morale\n    Your boarders pile into the Columbians as an irresistible wave, smashing into the enemy with such violence and ferocity that the shocked defenders can only goggle in disbelief as they are cut down. \n    \n    For a moment, it seems as if this first initial rush will be enough to carry the day, but then, a shout rises from the quarterdeck, incoherent in the din of battle. The Columbians begin to rally. [i]Delmarva[/i]'s crew are not out of the fight yet.\n    *goto chap_3_delmarva_2\n  *else\n    Your crew meet the enemy head on, cutlass to cutlass in a bloody, close-quarters melee. $!{gender} fall screaming around you. The Columbians fight with a violence which stops your boarders cold, but they do not have the numbers to force you off their deck entirely. For a moment, they draw back, the energies of their initial push exhausted.\n    \n    A shout rises from the quarterdeck. The din of battle renders in incoherent, but the sound of the voice alone seems to fill your enemy with renewed vigor. They rush forward again, their fury redoubled.\n    *goto chap_3_delmarva_2\n*else\n  *if c_morale >= delmarva_morale\n    Your boarders smash into the Columbians like a sledgehammer, the violence and ferocity of your ${gender} making up for any lack of numbers as your crew hack and slash their way through the defenders. \n    \n    Within moments, the enemy are falling back in dismay, but a voice from the quarterdeck cuts through the din of battle. The Columbians begin to rally, and within an instant, it is you and your [i]Forakers[/i] who are on the back foot.\n    *goto chap_3_delmarva_2\n  *else\n    Your boarders meet the oncoming foe as best they can, but they've neither the heart or the numbers to hold. Step by step, your outnumbered band is beaten back across [i]Delmarva[/i]'s deck as the Columbians attack with a ferocity that your ${gender} cannot hope to match.\n    *goto chap_3_delmarva_2\n*label chap_3_delmarva_2\n\nOne of them rushes straight for you, with cutlass raised high and lips pulled back in a terrible snarl. Another follows at ${pronoun_3} heels, a boarding pike in hand.\n\n*if fighting >= 65\n  You shift to the left as your attacker's blade comes down, sidestepping the blow as neatly as if you had been on a dancing-floor. You waste no time in turning the tables. In an instant, you are lunging forward, your assailant tumbling backwards with a choked scream as ${pronoun_1} frantic fingers scrabble at the bloody gash your own blade has just cut across ${pronoun_3} throat.\n  \n  The second Columbian rushes in now, but ${pronoun_1} has already lost ${pronoun_2} chance. With another step forward, you are inside your adversary's guard. With a sickening crack, you drive the brass guard of your sword into the Columbian's face, sending ${pronoun_3} tumbling to the deck in a nerveless heap.\n  *goto chap_3_delmarva_3\n*if fighting >= 35\n  You leap back as your attacker's blade passes not a hand's width from your face. Your pistol rises in your hand, your finger closing over the trigger before it is even level, the hiss-and-crack of its report a shock even to you. \n  \n  With a groan, the first Columbian falls to the deck, clutching the fresh wound in ${pronoun_2} thigh, even as the second rushes forward. \n  \n  It is only with the utmost haste that you are able to beat aside the first thrust of your second assailant's polearm. The second time, you press forward, entangling the blade of your fighting sword against the crossbar of your foe's weapon and pushing it away as you bring the butt of your pistol down on the Columbian's head with a hard, heavy thump. \n  *goto chap_3_delmarva_3\n*else\n  You stagger back as your attacker's blow slices through the air not a hairsbreadth from your face, but your footing is uneasy upon the blood-slick deck. You find yourself tottering backwards, even as your assailant prepares to finish the job.\n  \n  It is Mercer who saves you, striking the Columbian a blow of such tremendous force with the heel of ${pronoun_2} boot as to send your foe sprawling, even as the Marine officer turns to face your second attacker. By the time you regain your balance, Mercer is already hacking ${pronoun_3} down with savage blows of ${pronoun_2} fighting sword.\n  *goto chap_3_delmarva_3\n*label chap_3_delmarva_3\n*page_break\nWith the fall of your second attacker, you find a hard-won moment to catch your breath and regain your bearings.\n\nAhead, more foes eye you warily, waiting for an opening. Towards the forecastle, you see $!{lieutenant} armed with only half a blade, hard pressed by three of [i]Delmarva[/i]'s crew, with a fourth lying dead at ${pronoun_2} feet, the broken point of ${pronoun_2} sword still buried between the Columbian's ribs.\n\nTo your other side, Mercer and \n*if marines = \"deck\"\n  ${pronoun_2} surviving marines\n*if marines != \"deck\"\n  a dozen others\npush towards the quarterdeck. The Delmarvas there fight with especial ferocity, for at their head stands a tall, fierce-eyed ${gender_2} in the coat of a captain of the Columbian Navy,\n*if quarterdeck_guns = true\n  pale and limping from a a multitude of bloody wounds in ${pronoun_2} thigh, but defiant, with sword in hand.\n*if quarterdeck_guns = false\n  shouting encouragement to ${pronoun_2} crew and laying into your Forakers with equal vigor.\n*comment endif\n\n*if (delmarva_crew + delmarva_morale) \u003c= ((c_str + c_morale) + marines_mod)\n  Yet despite all the efforts of [i]Delmarva[/i]'s captain, you can sense the battle turning increasingly in your favor. Yet even so, it might be better to make a quick end of things: if you kill [i]Delmarva[/i]'s captain or force ${pronoun_3} to surrender, you will take the ship without further loss to your own crew. Of course, should you lose—\n  *goto chap_3_delmarva_4\n*else\n  Yet despite all the ground you and your crew have taken, it becomes increasingly clear that you are losing.\n  *if c_str >= c_morale\n    Already, you can see your ${gender} lose heart as every attempted advance is stymied, every push forward thrown back.\n  *if c_str \u003c c_morale\n    Though your crew fight on, their numbers dwindle with every moment. \n  Your only chance for victory now might be to go directly for [i]Delmarva[/i]'s captain. If you could kill ${pronoun_3} or force ${pronoun_3} to surrender ${pronoun_2} ship, the day may yet be yours, that is, if you win—\n  *goto chap_3_delmarva_4\n*label chap_3_delmarva_4\n\nA sudden cry pulls your attention away from the quarterdeck. $!{lieutenant} staggers backwards towards you, ${pronoun_2} face a mask of pain as one hand clutches a fresh wound in ${pronoun_2} side, even as the other tries feebly to ward off ${pronoun_2} attackers as they close in for the kill…\n*choice\n  #It is time to end this: I go for the [i]Delmarva[/i]'s captain.\n    *set gallantry %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    *set lieutenant_status \"dead\"\n    You fix all thoughts to the [i]Delmarva[/i]'s quarterdeck now. The time for deliberation is past. It is bold action which must carry the day now.\n    \n    *goto chap_3_delmarva_captain\n  #$!{lieutenant} is in mortal peril! I must go to ${pronoun_2} aid immediately!\n    *set gallantry %+10\n    *set gosub_index 200\n    *gosub_scene gosub\n    \"Forakers! To me!\" you shout as you rush to your first lieutenant's aid. A handful of your ${gender} rally to you as you lead the way.\n    \n    *if fighting >= 50\n      *if fighting >= 65\n        With a swift, fluid motion, you push your stricken officer behind you with one hand, and empty your pistol into the chest of ${pronoun_2} closest attacker with the other. \n      *if fighting \u003c= 65\n        With a single, lunging step, you put yourself and your blade between your stricken officer and ${pronoun_2} closest assailant. With a back-handed blow of your fighting sword, you lay the Columbian open, sending ${pronoun_3} tumbling back into the powder-fog.\n      *comment endif\n      \n      Three more foes come for you, but your crew are already rushing forward, giving you the time to pull $!{lieutenant} back out of immediate danger.\n      \n      Yet you get no more than three steps back before you hear a desperate and thunderous cry rise from both ends of the deck. \n    *if fighting \u003c 50\n      *set lieutenant_status \"dead\"\n      With a desperate lunge, you interpose yourself between your stricken lieutenant and ${pronoun_2} attackers. You lay into the closest Columbian with frantic strokes of your fighting sword, driving ${pronoun_3} back. With a final heave, you send ${pronoun_3} staggering backwards into the powder-fog.\n      \n      But it is not enough. You turn in time to see $!{lieutenant} fall with a final scream, as another of ${pronoun_2} assailants strikes a killing blow just a moment before ${pronoun_1} ${pronoun_3}self is struck down by one of your own crew.\n      \n      Poor $!{lieutenant}'s death barely has time to register before you hear a desperate and thunderous cry rise from both ends of the deck. \n    *set hist_note_4 1\n    \n    \"Don't give up the ship!\" The enemy captain roars as ${pronoun_1} leads a rush from the quarterdeck.\n      \n    \"[i]Delmarva[/i]!\" Roar the Columbians along the forecastle in reply as they charge down towards the waist.\n      \n    You leave $!{lieutenant} where ${pronoun_1} lies. You have more pressing matters at hand.\n    *goto chap_3_delmarva_5\n  #I will stand and fight on from here!\n    *set lieutenant_status \"dead\"\n    *set gallantry %-10\n    *if leadership >= 50\n      *set c_morale %+15\n      You gather your ${gender} to you, rallying them as best you can.\n      \n      *if sensibility >= 50\n        \"Fight hard\n        *if gender = \"men\"\n          my lads!\"\n        *if gender = \"women\"\n          my girls!\"\n        you shout, your voice wavering on the boundary of hysteria as you wave your fighting sword over your head. \"Just a little more and we shall have them beaten!\"\n      *if sensibility \u003c 50\n        \"Steady! Steady!\" you shout, your voice carefully pitched to carry over the din. \"They shall break soon enough! We'll need only outlast 'em!\"\n      *comment endif\n      \n      *if c_morale >= 45\n        A ragged cheer rises from the ${gender} around you. They throw themselves into the fray with fresh enthusiasm.\n      *if c_morale \u003c 45\n        Your words take an immediate effect. You can see them take hold of your ${gender}, putting some of the heart back in them. They fight on with renewed determination.\n    *if leadership \u003c 50\n      *set c_morale %+ 5\n      \"Forakers!\" you shout, \"stand and fight with me!\"\n      \n      Your crew rally behind at your call. Though you have never been a particularly inspiring leader, the sight of you at their head seems to fill your ${gender} with some small measure of enthusiasm.\n    *set hist_note_4 1\n    \n    Yet you are not the only one who has been rallying ${pronoun_2} crew. A cry rises from the stern of the ship, only to be joined by another, then more, on both sides, until the noise seems to come from all sides.\n    \n    \"Don't give up the ship!\" The enemy captain roars as ${pronoun_1} leads a rush from the quarterdeck.\n      \n    \"[i]Delmarva[/i]!\" Roar the Columbians along the forecastle in reply as they charge down towards the waist.\n    \n    You have just enough time to ready your blade before you are beset once again.\n    *goto chap_3_delmarva_5\n*label chap_3_delmarva_5\n*set gosub_index 200\n*gosub_scene gosub\n*page_break\nYour ${gender} do the best they can, but there is no resisting the ferocity of this fresh attack. Within moments, those at the forefront of your boarding party who have not been pushed back are simply overrun, and much of your hard-fought foothold aboard the [i]Delmarva[/i]'s deck is once again in Columbian hands. \n\n*if (delmarva_crew + delmarva_morale) \u003c= ((c_str + c_morale) + marines_mod)\n  The course of the battle, which had seemed so assured just a moment ago, is once again in doubt. As you fall back with the disordered survivors of your ${gender}, the enemy press forward, their confidence renewing by the moment.\n  \n  It is clear that you must regain the initiative. If you step forward and make yourself conspicuous, then your Forakers will follow. Perhaps that shall be the key to victory.\n  \n  But to place yourself in danger carries risks beyond the physical. A bold captain may raise the spirits of ${pronoun_2} ${gender}, but should that captain fall…\n*if (delmarva_crew + delmarva_morale) > ((c_str + c_morale) + marines_mod)\n  The course of the battle, already turned against you, is now all but settled. As you fall back with the dispirited remnants of your ${gender}, the enemy rush forward, ready to strike the final blow.\n  \n  Yet all is not lost. All cannot be lost. You may yet carry the day with bold action. If you were to make yourself conspicuous at the front of your ${gender}, they may yet rally, and perhaps even regain the initiative.\n  \n  Or perhaps it shall only make you a target, for the Columbians know as well as you do that the easiest way to break the spirit of a fighting crew is to bring down their captain…\n*fake_choice\n  #I must lead from the front, and make myself seen!\n    *set gallantry %+10\n    *if gallantry >= 50\n      You steel yourself and step forward. Better to mark yourself for death than to suffer the dishonor of losing this battle. \n    *if gallantry \u003c 50\n      You take a deep breath, taking a moment to force your hands to stop shaking before you step forward. To face death is one thing, but to face defeat, dishonor, and the ruination of your career is to die over and over again.\n    *comment endif\n    \n    \"With me,\n    *if gender = \"men\"\n      my lads!\"\n    *if gender = \"women\"\n      my girls!\"\n    you shout as you lay into the enemy with fresh abandon. \"With me for Albion!\"\n    \n    Your Forakers take up the call. \"Albion!\" they roar as they follow you back into the fray with a renewed purpose, piling into the Columbian advance and stopping it cold.\n    \n    The dull whir of a pistol ball buzzes over your head, and then another. A Columbian in the dark blue coat and red hackle of a marine officer points at you, ${pronoun_2} mouth open in mid-bellow. You cannot hear the words over the din of battle, but the enemy certainly can. Half a dozen of them come at you, cutlasses and bayonets glimmering in the dull light.\n    *page_break\n    *if fighting >= 75\n      *set c_morale + 25\n      The first strike comes from the right, too high and too hasty. You beat the blade away with your own, just in time to evade the thrust of a bayonet from your left. You lash out with your fighting sword at this new assailant, driving ${pronoun_3} back not a moment too soon, as another cutlass passes through the space where your head had been just a moment before, succeeding in only knocking your hat to the deck.\n      \n      Again and again the attacks come, and you are barely fast enough to parry or evade them. Your fingers grow numb around the hilt of your sword as you fend off what seems like half the Columbian Navy, and perhaps a good third of its Marine Corps as well. Your hands are slick with sweat now, and your breathing grows ever more labored. It will only be a matter of time before you make a mistake, or one of your attackers gets lucky, and then—\n      \n      But then nothing, for your ${gender} surge forward all around you, emboldened by your example. They fall upon your assailants with terrific blows.\n      \n      \"Huzzah!\" they roar as they drive the enemy back. \"Our Captain cannot be killed! Huzzah!\"\n      *goto chap_3_delmarva_6\n    *else\n      *set c_morale - 25\n      *set status \"wounded\"\n      Your first attacker comes from the right, and strikes you so terrific a blow that your hand goes numb from parrying it. Only blind chance lets you see the point of the bayonet thrusting in from your left in time for you to stumble away from its path.\n      \n      Yet you've not even a moment to recover your balance before fresh attackers rush in from all sides, blades flashing as you try frantically to ward them off, weaving and parrying with an energy you know you cannot sustain.\n      \n      All it takes is a single moment of inattention, a single blow spotted too late. Pain bursts from your temple as your hat topples from your head. Your legs buckle under you as something cuts a line of white-hot pain in your side. Your feet cannot keep themselves under your body as you tumble to the deck. A vast groan of dismay rises from your crew as they see you fall.\n      \n      Strong arms seize your shoulders, dragging you away from the fight, but already you can see your ${gender} lose heart and begin to way to the enemy.\n      *goto chap_3_delmarva_6\n  #I fight, but do not make myself conspicuous.\n    You cannot dare mark yourself out as a target under these circumstances, but that does not mean you will not fight to the best of your ability—no officer of the Albionian Navy could do any less.\n    \n    Indeed, the mere sight of you joining the fray in earnest with sword in hand seems to put some heart into your ${gender}. As you lay into the foe, your crew cannot help but raise a cheer and follow you.\n    \n    *if fighting >= 50\n      *set c_morale + 15\n      But the enemy do not let you cut them down unopposed, they come at you from both the left and the right, cutlasses glimmering in the dull light. You parry one blow just in time to dodge another, and it is only with the greatest fortune that you are able to press forward and get inside the guard of your first assailant before ${pronoun_1} has a chance to strike again. \n      \n      Your knee drives into the Columbian's stomach in a tight, vicious arc, sending your foe stumbling backwards, doubled over in pain. You have just enough time to steady yourself before your other attacker rushes in again, but this time, one of your ${gender} cuts ${pronoun_3} down, laying the Columbian out with a blow so terrific that it almost cleaves ${pronoun_2} head from ${pronoun_2} neck.\n      \n      \"Huzzah!\" the victorious Albionian shouts as more of your crew pile into the enemy with renewed vigor. \"Follow the Captain! Huzzah!\"\n      *goto chap_3_delmarva_6\n    *else\n      *set c_morale - 15\n      *set status \"wounded\"\n      But the enemy match you with equal fury. They strike from every quarter and it is only with the greatest fortune that you are able to ward off the first of their blows, and then the next.\n      \n      Yet when you try to parry a third, it strikes your blade with so terrific a force that it sends you reeling backwards, your fingers numb and your feet tripping out from under you. The heel of your foot catches on something wet and soft, and only barely do you regain your balance.\n      \n      But it is already too late. You have left your guard open. You do not see where the first blow comes from. You can only feel it as the pain explodes across the back of your head. Your vision blurs as your legs give way from under you, even as another white-hot line of pain cuts across your side. Some of the ${gender} fighting next to you look on in dismay as you fall, but at least one has the presence of mind to leap to your aid.\n      \n      Strong arms seize your shoulders and pull you to safety, as the rest of your crew fight on, disheartened, but still standing.\n      *goto chap_3_delmarva_6\n  #I must endeavor to keep myself out of danger.\n    *set gallantry %-10\n    It is one thing to show courage when it is warranted, but it is quite enough to so foolhardy as to expose oneself to danger for no purpose. If you fall, the spirits of your ${gender} will fall with you, and you cannot risk that, not now.\n    \n    You fall back to as safe a place as you can find on the smoke-filled battlefield of [i]Delmarva[/i]'s deck. Perhaps some might think you less of a fighting captain for staying back from the enemy, but you know that it is not foolhardy acts of gallantry that matter in the grand scheme of things, but results. If you sail back to Ismay with [i]Delmarva[/i] as a prize, they would not dare call you coward then, regardless what they might think of your conduct today.\n    \n    And you are far from idle. From your position, you coordinate the actions of your boarders, call out warnings, and drag away whatever wounded you can reach. They are not glamorous tasks, but in the midst of pitched battle, they are no less important.\n    *goto chap_3_delmarva_6\n*label chap_3_delmarva_6\n*set gosub_index 200\n*gosub_scene gosub\n*if ((c_str + c_morale) + (marines_mod)) >= (delmarva_crew + delmarva_morale)\n  *if c_morale > 100\n    *set c_morale 100\n  *page_break\n  *if status = \"wounded\"\n    Yet even as your crew begin to buckle, the enemy seem to begin losing heart completely. At the dulled edges of your vision, you begin to see isolated groups of Columbians fall back, or simply be overwhelmed. \n    \n    From your position, propped up against [i]Delmarva[/i]'s bulwark, you watch your crew rush forward, driven by the vision of a final, total triumph. The enemy retreat becomes a rout. The few who continue to resist are cut down as the rest begin to throw down their weapons in surrender.\n    \n    Your vision begins to blur as the smoke finally clears. The cheers of your ${gender} echo like dull thunder through your pain-fogged thoughts. \n    \n    Every moment you struggle to stay awake brings a fresh stab of agony. Every breath burns like fire, but there is at least one last thing you must make sure of. You open your mouth, something like words come out. A red-coated blur—Mercer?—nods, and relays something, your orders, you must assume. Even spent with the exertions of battle, your crew do not hesitate to obey. \n    \n    A moment later, the ragged remnants of the Sun-and-Stripes come down from [i]Delmarva[/i]'s mizzenmast, and in its place rises the union flag of Albion.\n    \n    It is the last thing you see before the pain takes you.\n  *if status != \"wounded\"\n    The Columbian attack begins to falter. Their last reserves of strength spent, the enemy are driven back, step by step at first, then with increasing speed as your ${gender} seize the upper hand. \n    \n    \"We have them now!\" you hear someone shout. \"Onward Forakers! Onwards to victory!\"\n    \n    Only when your crew roar in reply do you recognize the sound of your own voice. \n    \n    The enemy reel in the face of this fresh onslaught, and within moments, they are in a state of total collapse. Those few who resist are overwhelmed as your boarders sweep over them, even as those Columbians still on their feet throw down their weapons in surrender. \n    *page_break\n    The smoke begins to clear as the din of battle dies down, giving you a clear view of the deck at last. \n    \n    Only a few of the enemy remain on their feet, none of them in the coats of officers. \n    \n    \"Do you strike?\" you call out, your voice echoing across the suddenly silent expanse. \n    \n    At the quarterdeck, a bloodied, supine figure in a Columbian Navy captain's uniform lets out a low, defiant groan. $!{pronoun_1} tries in vain to lift the broken hilt of ${pronoun_2} sword, even as ${pronoun_1} bleeds from half a dozen wounds. \n    \n    *if gallantry >= 50\n      \"You have acquitted yourselves honorably and well,\" you shout. \"There is no shame in yielding now. I ask again, do you strike?\"\n    *if gallantry \u003c 50\n      \"You are in no condition to fight on,\" you shout. \"No more blood needs be shed today. I ask again, do you strike?\"\n    *comment endif\n    \n    If the enemy Captain protests again, you do not hear it. The next moment, the ragged remnants of the Sun-and-Stripes fall from [i]Delmarva[/i]'s mizzen, and the union flag of Albion is rising in its place.\n    \n    You wipe your blade clean as your crew give a roaring cheer. As you return your fighting sword to its scabbard, you feel the tension fall from your body, as you let out a breath you did not know you had been holding, and drink in the sweet, thunderous sound of victory.\n  *if not(choice_achieved_story_4)\n    *achieve story_4\n  *if lieutenant_status != \"dead\"\n    *if not(choice_achieved_no_tears)\n      *achieve no_tears\n  *if impress = false\n    *if not(choice_achieved_unimpressed)\n      *achieve unimpressed\n  *if no_guns = true\n    *if not(choice_achieved_no_guns)\n      *achieve no_guns\n  *page_break\n  *set ending_index 4\n  *goto_scene epilogue\n*else\n  *page_break\n  *if status = \"wounded\"\n    Without you to lead them,\n    *if c_str >= c_morale\n      your crew no longer have the heart to keep fighting in this face of this fresh onslaught for long. Within moments, most are throwing down their weapons in surrender, while others are simply overwhelmed. Those still armed and on their feet are retreating back to [i]Foraker[/i]'s deck, with all hope of victory lost.\n    *if c_str \u003c c_morale\n      your crew are quickly overwhelmed by the enemy's fresh assault. They simply do not have the numbers to hold out. Within moments, the handful of your ${gender} still armed and on their feet are retreating back to [i]Foraker[/i]'s deck.\n    *comment endif\n    \n    But there will be no refuge for them there. Already, you can see [i]Delmarva[/i]'s sailors and marines leap over the side, ready to take possession of your ship before they have even finished retaking their own.\n    \n    For you, even that prospect of momentary escape might be as impossible as a flight to the moon. You barely have the strength to hold onto your sword as you prop yourself back upright. By the time you do, the battle is all-but over, and you are all-but surrounded by the foe.\n  *if status != \"wounded\"\n    Yet for all of your efforts, the tide has turned irrevocably in the enemy's favor.\n    *if c_str >= c_morale\n      Your crew simply do not have the endurance to keep fighting, not in the face of this fresh onslaught. Within moments, some are already beginning to throw down their weapons in surrender, while others retreat back to [i]Foraker[/i]'s deck.\n    *if c_str \u003c c_morale\n      There are simply not enough of you left. Many of your ${gender} are simply overwhelmed by superior numbers, while others flee back over the side, retreating back to [i]Foraker[/i]'s deck.\n    *comment endif\n    \n    But there will be no refuge for them there. Already, you can see Columbian sailors and marines clamber over the side, ready to take possession of your ship even as they regain control of their own.\n    \n    For you, there can be no retreat. The enemy seem to have taken especial care to look for you, and before long, you are all-but surrounded by the foe.\n  *page_break\n  *set gosub_index 9\n  *gosub_scene gosub\n\n*label chap_3_delmarva_captain\n*if quarterdeck_guns = true\n  *if fighting >= 50\n    Even wounded, [i]Delmarva[/i]'s captain proves a dangerous opponent, beating aside the opening stroke of your blade, and lashing out low with ${pronoun_2} own sword. With surprising alacrity, the Columbian goes on the attack, driving you back a step with a series of furious blows. \n    \n    Yet already, your opponent's wounds are beginning to tell. Even as ${pronoun_1} presses the attack, you can see ${pronoun_2} contort with pain. There! There is your advantage!\n    \n    With a single fluid motion, you duck below your adversary's last stroke, and thrust at your enemy's foot. The Columbian stumbles backwards with a stifled cry of pain. Fresh runnels of blood run down ${pronoun_2} torn stockings as ${pronoun_2} wounded legs buckle under this new exertion. \n    \n    The Columbian's sword wavers, and with a sudden rush, you beat it aside and plunge forward, throwing your weight against your off-balance foe and throwing ${pronoun_3} back. With a wet, terrific crack, your opponent's head slams into the iron-bound oak of [i]Delmarva[/i]'s mizzenmast. $!{pronoun_2} sword falls out of ${pronoun_2} nerveless hands, as your opponent falls to the deck in a dazed and bloodied heap.\n    *goto chap_3_delmarva_captain_victory\n  *if fighting >= 25\n    *set status \"wounded\"\n    Yet even while bleeding from a half a dozen wounds, [i]Delmarva[/i]'s captain fights with a ferocity and skill which is hard to match. Without a moment of surprise or weakness, ${pronoun_1} batters aside your first blow, and ripostes with such alacrity that you are barely able to avoid having your neck laid open.\n    \n    No sooner do you recover your balance does your foe deliver another thrust, low and quick. Pain shoots through your leg as the Columbian's blade pierces your thigh. But as your adversary tries to retract ${pronoun_2} sword, ${pronoun_2} leg suddenly buckles under ${pronoun_3}, soaked with a fresh effusion of blood. \n    \n    Now! Now is your last chance!\n    \n    You shut out the pain, and bring down your fighting sword onto your opponent's exposed body, striking a blow so terrific that skin and flesh and bone part under it, until the bright steel of your blade is buried hilt-deep in your enemy's collar.\n    \n    For a single, dull second, the Columbian stares wide-eyed at the mortal blow you have just struck ${pronoun_3}. A gush of crimson gurgles betwixt parted and uncomprehending lips as ${pronoun_1} slumps backwards, stone dead.\n    *goto chap_3_delmarva_captain_victory\n  *else\n    *set sword false\n    Yet it only takes you a moment to realize that you have made a grievous mistake.\n    \n    [i]Delmarva[/i]'s captain fights with a speed and skill which far outmatches your own. With contemptuous ease, ${pronoun_1} beats aside your first blow, before riposting with an alacrity you would not have expected from an untouched opponent, let alone one already bleeding from half a dozen wounds.\n    \n    Already, you are on the defensive. It is all you can do to fend off your opponent's blows, and even then you find yourself slowly losing ground, until finally, you find your back pressing up against the stern rail.\n    \n    With a flash of steel, the Columbian batters aside your guard. An instant later, pain explodes through your body as your foe drives a balled fist into your stomach, an instant before ${pronoun_1} brings the clamshell guard of ${pronoun_2} sword down on your exposed wrist. With a gasp, your fingers spasm open, and your own sword tumbles out of your grasp, over the rail, and into the waters of Trimountaine Bay.\n    *goto chap_3_delmarva_captain_defeat\n*if quarterdeck_guns = false\n  *if fighting >= 75\n    [i]Delmarva[/i]'s captain proves a dangerous opponent, batting aside your opening strike with contemptuous ease, before offering a riposte so quick that you barely have time to parry it. Twice more, you try your foe's guard, only to be stopped, and turned back onto the defense with deft, whip-like strokes.\n    \n    Now it is your enemy who takes the initiative, ${pronoun_2} steel flashing and turning this way and that, feinting to the right only to deliver a thrust to the left, only to twist in mid-lunge into a backhanded cut. It is all you can do to keep out of the way, dodging and weaving and parrying as best you can, knowing that to make even one mistake against so skilled an opponent might well be a death sentence.\n    \n    Yet it is the Columbian who errs first. It is a tiny thing, a lunge extended a step too far, for a half a second too long. But it is enough: you take the all-but invisible opening with a single swift step forward. Your free hand lashes out, seizing your opponent's exposed wrist, and slamming it against the bulk of the mizzenmast behind ${pronoun_3} once, twice, until the sword falls out of ${pronoun_2} numbed hands.\n    \n    Then, you bring your own blade up, driving its guard hard into your adversary's face again and again, until the Columbian collapses to the deck as a senseless, bloodied heap.\n    *goto chap_3_delmarva_captain_victory\n  *if fighting >= 50\n    *set status \"wounded\"\n    You almost manage to get the drop of the [i]Delmarva[/i]'s captain, but the Columbian proves to be a skilled fighter. Your first blow, ${pronoun_1} batters aside with perfect ease, before replying with a cut so swift that you do not even notice it until the blood begins to trickle from your wrist.\n    \n    Stumbling backwards, you manage to avoid your opponent's next strike, reeling just out of reach an instant before it would have opened your neck. No sooner do you regain your balance does the Columbian's sword flash towards you again, in a low thrust that slices a red line through your thigh, staining your stockings red. Again, your foe strikes, high this time, but you are ready for ${pronoun_3}. You meet the enemy's blade with your own, pushing it out of the way as you lunge forward, bearing both you and your opponent to the deck with a crash.\n    \n    Yet not even this takes the fight out of the enemy captain. Pain explodes in your midsection as the Columbian drives ${pronoun_2} knee into your stomach, heaving you off and leaving you off balance long enough for the brass guard of ${pronoun_2} sword to strike you in the face with enough force to fill your vision with spots and your mouth with blood. \n    \n    But your own blade is already high over your head and poised to strike. You bring it down guard-first onto the Columbian's head; once, twice, three times, battering your counterpart with such force that you can feel the brass bite into your fingers. \n    \n    It is only after the third stroke that your opponent's body finally slackens. Only then does ${pronoun_2} sword finally clatter to the deck.\n    *goto chap_3_delmarva_captain_victory\n  *else\n    Yet it only takes you a moment to realize that you have made a grievous mistake.\n    \n    The Columbian parries your first stroke aside with contemptuous ease, with just the right movements to position ${pronoun_3}self for an immediate riposte. You could almost admire the sheer artistry of it, were you not suddenly fighting for your life.\n    \n    Fighting and losing: your opponent's attacks come so quick that they seem almost a blur. You manage to parry one and dodge another, but the third cuts a white-hot line of agony across your thigh. You stagger back in pain, but your foe does not relent. Pain explodes across your head as ${pronoun_1} drives ${pronoun_2} fist into your face, sending you tumbling backwards, your balance lost.\n    \n    You hit the deck hard, the shock of landing knocking your fighting sword from your pain-numbed fingers. With a deft, economical motion, the Columbian kicks it away, far out of reach.\n    *goto chap_3_delmarva_captain_defeat\n    \n*label chap_3_delmarva_captain_victory\n*page_break\nThe Columbian captain's fall has an effect almost immediately. Within moments, most of the enemy are throwing down their weapons on surrender. Only a few holdouts near the ship's forecastle continue fighting, and they are quickly overwhelmed.\n\nSo swift has been the enemy's collapse that you do not even notice the complete nature of it until one of your midship${gender} rushes past you and begins clambering up the mizzen, with a pair of intent eyes. \n\nA few seconds later, the Sun-and-Stripes of the United Republic falls from the mast, and in its place rises the union flag of Albion.\n\n*if status = \"wounded\"\n  It is the last thing you see before the pain finally takes you.\n*if status != \"wounded\"\n  A cheer rises from your Forakers, exhausted by the protracted struggle, but animated by the thought of such a total victory. As you wipe the blade of your fighting sword clean and return it to your scabbard, you feel the tension drain away from your body at long last, as the air shakes with the thunderous roar of victory.\n*if not(choice_achieved_story_4)\n  *achieve story_4\n*if lieutenant_status != \"dead\"\n  *if not(choice_achieved_no_tears)\n    *achieve no_tears\n*if no_guns = true\n  *if not(choice_achieved_no_guns)\n    *achieve no_guns\n*if impress = false\n  *if not(choice_achieved_unimpressed)\n    *achieve unimpressed\n*page_break\n*set ending_index 4\n*goto_scene epilogue\n\n*label chap_3_delmarva_captain_defeat\n*page_break\nThe Columbian holds ${pronoun_2} blade to your throat. It is clear ${pronoun_1} means for you to yield.\n\n*if gallantry >= 50\n  Surrender would mean abandoning any hope your crew might be able to carry the day, even without you. It would mean months or years in captivity. It would mean the ignominy of seeing your [i]Foraker[/i] sailing under a Columbian rag. It would mean humiliation in the Columbian papers for your defeat, and censure in the Albionian ones for your implied incompetence.\n  \n  And it would not end, not ever. Returning home would mean facing a court martial for the loss of your ship, for the shortcomings of your command, for the stain which you will have added to the honor of the service. It could mean a life on half-pay as an embarrassment to the Navy at best, and a firing squad at worst.\n  \n  Death might be preferable.\n*if gallantry \u003c 50\n  Surrender would mean losing your ship, but saving your crew. The Columbians are not known for mistreating prisoners—at least not Albionian ones—and it is almost certain you will be exchanged within the year.\n  \n  The service would court-martial you of course. Any captain who loses ${pronoun_2} ship faces that prospect. But surely, you have fought well enough and hard enough to win acquittal. Even if public opinion proves against you, and you are forced to live a life in disgrace, it would at least still mean living.\n  \n  Surely that is worth the price.\n*choice\n  #Very well. I've no choice but to yield.\n    *set gosub_index 10\n    *goto_scene gosub\n  #It is far better to die fighting than to surrender!\n    *set status \"dead\"\n    *set c_morale - 30\n    Surrender? No, that is not for you. Better to die facing your enemy, to expend your last breath fighting.\n    \n    You hurl yourself against your foe with a violent desperation, your fists whirling like the claws of a rabid animal. The Columbian takes only a moment to master ${pronoun_2} shock, and when ${pronoun_1} does, ${pronoun_1} wreaks a terrible vengeance, cutting deep into your body, splattering the deck below you with your blood.\n    \n    Yet you have long since stopped caring. You grit your teeth through the pain until your teeth crack, and you keep fighting, and when at last your legs give way underneath you and your vision begins to dim, you can at least console yourself by knowing that you have sold your life dear.\n    \n    At least you have done your duty.\n    *page_break\n    *set ending_index 3\n    *goto_scene epilogue\n", "choicescript_description": "Command a royal warship and destroy your enemies at sea! As a veteran navy captain in the world of Choice of Broadsides, you’ll fend off (smugglers, slavers, and) foes of the crown to seize your place in history.\n\n[i]HMS Foraker[/i] is an 85,000 word interactive novel by Paul Wang, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nIt’s 1813, and you’re a key sailor in the naval war between Columbia and Albion, where aggression is rewarded and cowardice can get you killed. If you seize enough treasure, you could be set for life – but hesitate against the enemy and you could end up facing the firing squad.\n\nBoard enemy ships and force them to surrender, or use your connections to stay out of the fray. Will you steer your crew to glory, or go down in infamous defeat? What mercy will you show your prisoners? Can you control your composure while fighting a war? Revenge yourself on old rivals and reward your allies for their devotion. And whatever you do…\n\nDon’t give up the ship!\n\n• Serve the queen or the king, with an all-male or all-female crew.[n/]\n• Captain the powerful warship HMS Foraker.[n/]\n• Train your crew for combat, with kindness or cruelty.[n/]\n• Parley with smugglers, slavers, and other unsavoury characters for tactical advantage or personal gain.[n/]\n• Inspire devotion from your crew, or sway your superiors back home.[n/]\n• Confront storms, accidents, and other maritime disasters.[n/]\n• Master the balance between bravery and cowardice, cunning and folly.[n/]\n• Win glory, treasure, promotion, a knighthood, or even a noble title.\n", "choicescript_stats": "*if stat_state = 1\n  *comment default\n  *goto stat_page_1\n*if stat_state = 2\n  *comment epilogue base\n  *goto stat_page_2\n*if stat_state = 3\n  *comment cashiered\n  *goto stat_page_2\n*if stat_state = 4\n  *comment kingsport\n  *goto stat_page_3\n*if stat_state = 5\n  *comment albionian\n  *goto stat_page_4\n*if stat_state = 6\n  *comment foraker again\n  *goto stat_page_5\n*if stat_state = 7\n  *comment dead\n  *goto stat_page_2\n\n*label stat_page_1\n*text_image stats.png center This being the condition of HMS [i]Foraker[/i], a fifth-rate frigate of the Royal Albion Navy.\nCaptain $!{name} COMMANDING.\n\nCondition of Ship and Company, as of\n*if date >= 65\n  JUNE \n  *set date_2 (date - 64)\n  *goto stat_date\n*elseif date >= 34\n  MAY \n  *set date_2 (date - 33)\n  *goto stat_date\n*elseif date >= 4\n  APRIL \n  *set date_2 (date - 4)\n  *goto stat_date\n*else\n  MARCH \n  *set date_2 (date + 28)\n  *goto stat_date\n*label stat_date\n${date_2}, 1813.\n\n*text_image captain.png center Captain's Record\n*stat_chart\n  percent sailing Sailing\n  percent gunnery Gunnery\n  percent leadership Leadership\n  percent fighting Fighting\n  percent patronage Patronage\n  opposed_pair gallantry\n    Gallantry\n    Discretion\n  opposed_pair sensibility\n    Sensibility\n    Composure\n*line_break\n\n*text_image ship.png center Ship's Company\n1st Lieutenant: \n*if lieutenant = \"fisher\"\n  J. Fisher\n*if lieutenant = \"simpson\"\n  P. Simpson\n*if lieutenant = \"shannon\"\n  P. Shannon\n*if lieutenant = \"pakenham\"\n  The Hon. E. Pakenham\n*comment endif\n*line_break\nSecond Lieutenant: R. Bannister\n*line_break\nThird Lieutenant: L. Callaghan\n*line_break\nCaptain of Marines: M. Mercer, RM\n*line_break\n*if master != \"none\"\n  Sailing $!{master}: E. Burroughs\n*stat_chart\n  percent c_str Crew Strength\n  percent c_sailing Crew Sailing\n  percent c_gunnery Crew Gunnery\n  percent c_morale Crew Morale\n*finish\n\n*label stat_page_2\n*text_image stats_captain_only.png center This being the service record of…\nCaptain $!{name}, RN.\n*line_break\n*if stat_state = 2\n  Currently without a command.\n*if stat_state = 3\n  Stricken from the Captain's List and broken from the service, Sept. 18th, 1813.\n*if stat_state = 7\n  Killed in action, June 1st, 1813.\n\n*text_image captain.png center Captain's Record\n*stat_chart\n  percent sailing Sailing\n  percent gunnery Gunnery\n  percent leadership Leadership\n  percent fighting Fighting\n  percent patronage Patronage\n  opposed_pair gallantry\n    Gallantry\n    Discretion\n  opposed_pair sensibility\n    Sensibility\n    Composure\n*line_break\n*finish\n\n*label stat_page_3\n*if gender = \"men\"\n  *text_image stats_kingsport.png center This being the condition of HMS [i]Kingsport[/i], a fourth-rate frigate of the Royal Albion Navy.\n*if gender = \"women\"\n  *text_image stats_queensport.png center This being the condition of HMS [i]Queensport[/i], a fourth-rate frigate of the Royal Albion Navy.\n*if baronet = true\n  Captain $!{name}, Bt.\n*if knight = true\n  Captain $!{name}, KOV\n*if (baronet = false) and (knight = false)\n  Captain $!{name} \nCOMMANDING.\n\nCondition of Ship and Company, as of April 11th, 1814.\n\n*text_image captain.png center Captain's Record\n*stat_chart\n  percent sailing Sailing\n  percent gunnery Gunnery\n  percent leadership Leadership\n  percent fighting Fighting\n  percent patronage Patronage\n  opposed_pair gallantry\n    Gallantry\n    Discretion\n  opposed_pair sensibility\n    Sensibility\n    Composure\n*comment end\n\n*if commodore = true\n  Currently in command of a detached squadron consisting of:\n  *line_break\n  HMS [i]$!{monarch}sport[/i], 50 (Flagship)\n  *line_break\n  HMS [i]Foraker[/i], 38\n  *if lieutenant_status = \"dead\"\n    (Captain Morrison commanding)\n  *if lieutenant_status != \"dead\"\n    (Captain $!{lieutenant} commanding)\n  *line_break\n  HMS [i]Albionian[/i], 38 (Captain Bryce commanding)\n*finish\n\n*label stat_page_4\n*text_image stats_albionian.png center This being the condition of HMS [i]Albionian[/i], a fifth-rate frigate of the Royal Albion Navy.\nCaptain $!{name} COMMANDING.\n\nCondition of Ship and Company, as of April 11th, 1814.\n\n*text_image captain.png center Captain's Record\n*stat_chart\n  percent sailing Sailing\n  percent gunnery Gunnery\n  percent leadership Leadership\n  percent fighting Fighting\n  percent patronage Patronage\n  opposed_pair gallantry\n    Gallantry\n    Discretion\n  opposed_pair sensibility\n    Sensibility\n    Composure\n*comment end\n*finish\n\n*label stat_page_5\n*text_image stats.png center This being the condition of HMS [i]Foraker[/i], a fifth-rate frigate of the Royal Albion Navy.\n*if knight = true\n  Captain $!{name}, KOV\n*if knight = false\n  Captain $!{name} \nCOMMANDING.\n\nCondition of Ship and Company, as of April 11th, 1814.\n\n*text_image captain.png center Captain's Record\n*stat_chart\n  percent sailing Sailing\n  percent gunnery Gunnery\n  percent leadership Leadership\n  percent fighting Fighting\n  percent patronage Patronage\n  opposed_pair gallantry\n    Gallantry\n    Discretion\n  opposed_pair sensibility\n    Sensibility\n    Composure\n*comment end\n*finish", "choicescript_upgrade": "*comment Only platform this should be visible on is iOS.\n*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements.\n  \n  *purchase_discount adfree 2025-11-20 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to remove in-game advertisements.\n", "ending": "*text_image historical_notes.png center Historical Notes\n\nThe plot of [i]HMS Foraker[/i] is based loosely upon the battle between USS [i]Chesapeake[/i] and HMS [i]Shannon[/i] outside Boston harbor on June 1st, 1813. USS [i]Chesapeake[/i]'s broadside was only slightly heavier than that of HMS [i]Shannon[/i], but the American ship possessed a significantly larger crew than her opponent, and was built from the same southern live oak which gave USS [i]Constitution[/i] her nickname of \"old ironsides.\"\n\n*if ending_index = 8\n  *goto notes_skip\nBy 1813, the Royal Navy had much of the eastern seaboard of the United States under blockade, but the US Navy's six large frigates—USS [i]Constitution[/i], USS [i]Constellation[/i], USS [i]Congress[/i], USS [i]President[/i], USS [i]United States[/i], and USS [i]Chesapeake[/i]—served as constant threats, as each ship could easily outmatch the more lightly built frigates used by the Royal Navy, as shown by USS [i]Constitution[/i]'s celebrated victories over HMS [i]Guerriere[/i] and HMS [i]Java[/i]. Thus, the battle in Boston harbor, and HMS [i]Shannon[/i]'s victory after 11 minutes of very hard fighting, proved that a British man of war with a sufficiently trained and motivated crew could still conceivably outfight a heavier American counterpart, something reinforced by the capture of USS [i]President[/i] by HMS [i]Endymion[/i] just before the end of the war.\n\nHowever, while this wider context is more or less similar to the setting of [i]HMS Foraker[/i], the particulars differ widely. For example, Philip Broke, the Captain of HMS [i]Shannon[/i], was in fact, a commodore in charge of a squadron of frigates. He had two ships blockading Boston in the spring of 1813, but sent one of them, HMS [i]Tenedos[/i], away so that HMS [i]Shannon[/i], his flagship, could try and coax the [i]Chesapeake[/i] out to battle on even terms. In harbor, USS [i]Chesapeake[/i] was, in fact, initially accompanied by two other ships, USS [i]President[/i] and USS [i]Constitution[/i], but [i]Constitution[/i] was in the middle of a refit, while [i]President[/i] slipped out in a fog a month before the battle.\n*if hist_note_1 >= 1\n\n  Captain Broke really did send a formal letter of challenge to Captain Lawrence of the [i]Chesapeake[/i]. However, it was not delivered in time. [i]Chesapeake[/i] had already gotten under way by the time the challenge was received.\n  *if hist_note_1 = 2\n    Some of the passages in the challenge the player character writes were taken verbatim from Broke's letter.\n    *if hist_note_2 = 1\n      As are several other dialogue options available to the player.\n*if hist_note_2 = 1\n  Several dialogue options available to the player are taken verbatim from Broke's words on the day of the battle.\n*comment endif\n\n*if hist_note_3 = 1\n  Broke really did call for some of Shannon's guns to be used as precision weapons. The British 9-pounder was known as a highly accurate weapon, and Shannon's were used to great effect during the battle with [i]Chesapeake[/i], repeatedly sweeping the American frigate's quarterdeck with grapeshot.\n  \n*if hist_note_4 = 1\n  Captain James Lawrence of the [i]Chesapeake[/i] did shout \"don't give up the ship!\" as [i]Chesapeake[/i] was being boarded. This phrase became a rallying cry for the US Navy, and would be used by Lawrence's friend and colleague, Oliver Hazard Perry, during his victory at the Battle of Lake Erie three months later.\n  \n*if hist_note_5 = 1\n  The character of Lieutenant Fisher is a rather anachronistic reference to Admiral Sir John Arbuthnot Fisher, the great reorganizer who remodeled Queen Victoria's navy into the one which would fight the world wars. \"Jackie\" Fisher's abrasive personality (and profane vocabulary) made him a great number of enemies in his life, and those same attitudes are reflected in the character based on him. \n*if hist_note_5 = 2\n  The character of Lieutenant Simpson is based on Provo Wallis. Born in Halifax, Nova Scotia, Wallis joined the navy early, and at 22, was Second Lieutenant aboard HMS [i]Shannon[/i] during her duel with USS [i]Chesapeake[/i]. By the time the battle was over, he was highest ranking officer still on his feet on either side. Afterwards, he would sail [i]Shannon[/i] into Halifax harbor as her acting captain and be promoted to commander for his bravery. He would eventually become Admiral of the Fleet and live to the improbable age of 100.\n*if hist_note_5 = 3\n  The character of Lieutenant Shannon is based on that of Captain Philip Broke himself. Broke was a known gunnery expert, and he really did install tangent sights on [i]Shannon[/i]'s guns. His meticulous planning, insistence on exhaustive training, and coolness under fire played a major role in [i]Shannon[/i]'s victory.\n*if hist_note_5 = 4\n  The character of Lieutenant Lord Pakenham is an oblique reference to the Pakenham family, the Duke of Wellington's in-laws. The most famous (or infamous) member of the family would probably be Sir Edward Pakenham, a man who had served ably as a regimental officer during the Peninsular War, before being assigned to the Americas with the coming of Napoleon's first abdication. He is best known for being responsible for the failure of the attack on New Orleans in 1815, a debacle which cost him his life.\n*comment endif\n\nThe intensity of the fighting between HMS [i]Shannon[/i] and USS [i]Chesapeake[/i] cannot be overstated. In a battle lasting less than a quarter of an hour, a third of [i]Shannon[/i]'s crew and nearly half of [i]Chesapeake[/i]'s became casualties, including the captains of both ships. James Lawrence of the [i]Chesapeake[/i] died of his wounds three days after the battle, and was given the funeral of a valiant foe in Halifax. Philip Broke of the [i]Shannon[/i] was wounded so severely that he was invalided home. He would be made a baronet and eventually retire a rear-admiral, but he would never hold a seagoing command again.\n\n-Paul Wang\n*goto end\n*label notes_skip\nThe British Royal Navy really did crack down very severely upon officers who demonstrated a lack of aggression in the face of the enemy. The charge of not doing one's utmost to engage or destroy the enemy was a very serious one, and the Articles of War declared such an offense punishable by death.\n\nThe most famous victim of this policy was Admiral John Byng. In 1756, Byng was commanding a sizable fleet of British ships when he refused to fully engage a slightly smaller French force off the cost of Minorca in the western Mediterranean. Byng's fleet was in poor condition and critically undermanned, but Byng's over-cautious orders during the inconclusive battle and the subsequent fall of Minorca to the French led to massive displays of popular outrage. Byng, the scion of a powerful aristocratic family, was court-martialled, sentenced to death, and shot on the quarterdeck of HMS [i]Monarch[/i], leading the French philosopher Voltaire to comment that in Britain, \"it does good, from time to time, to kill an admiral, to encourage the others.\"\n\nWhatever Voltaire might have thought, Byng's execution showed that no officer of the Royal Navy was above punishment if he failed to show the proper aggression. This almost certainly contributed to the culture of almost reckless bravery which characterized the Royal Navy of Lord Nelson's day, a sentiment which contributed substantially to great victories like those of Camperdown, Aboukir Bay, Cape St. Vincent, and Trafalgar.\n\n-Paul Wang\n*label end\n*page_break End\nWe hope you've enjoyed playing [i]Choice of Broadsides: HMS Foraker.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "epilogue": "*text_image epilogue.png center Epilogue\n*label phase_1\n*check_achievements\n*if ending_index = 1\n  *goto ending_1_1\n*if ending_index = 2\n  *goto ending_1_2\n*if ending_index = 3\n  *goto ending_1_3\n*if ending_index = 4\n  *goto ending_1_4\n*if ending_index = 5\n  *goto ending_1_5\n*if ending_index = 6\n  *goto ending_4_1\n*if ending_index = 7\n  *goto ending_4_2\n*if ending_index = 8\n  *goto ending_fail\n  \n*label ending_1_1\n*set stat_state 2\nThe Columbians prove to be gracious captors. Your crew are treated well, and your wounded are given the same consideration by [i]Delmarva[/i]'s surgeon as those of ${pronoun_2} own ship.\n\nNot that it matters. \n*if sword = true\n  Even if your sword is once again at your hip, it is only because Captain Wingate of the [i]Delmarva[/i] chose to return it to you. \nEven if you are allowed the liberty of the quarterdeck as [i]Foraker[/i] is brought into Trimountaine Harbor, it is only the meager freedom of an open cage. \n\nThat night, there is a banquet in Trimountaine, celebrating the latest of the Columbian Navy's victories. You and your\n*if lieutenant_status = \"dead\"\n  surviving\nofficers are the guests of honor, but it is your counterparts who are the ${gender} of the hour, and not even the toasts drunk to your gallantry and to your health can make up for the fact that you are a captain without a ship, a prisoner of war, and a defeated foe.\n*goto ending_2_1\n\n*label ending_1_2\n*set stat_state 2\nThe Columbians prove gracious victors. [i]Delmarva[/i]'s surgeon is quick to tend to your wounds, and your captors ensure that you and the other wounded in your company are kept in some level of comfort and dignity, even as they sail your ship into captivity in Trimountaine Harbor.\n\nYou spend the next six weeks recovering from your wounds at a marine hospital in Trimountaine's navy yard. There, you and your \n*if lieutenant_status = \"dead\"\n  surviving\nofficers are accorded all the comforts of honored guests. Yet every morning, as you look out over Trimountaine Harbor and you see the silhouette of [i]Foraker[/i]'s masts against the rising sun, you cannot help but be reminded that for all the compliments and privileges which your captors have accorded you, they are still the magnanimity of a victorious service towards a defeated foe.\n*goto ending_2_1\n\n*label ending_1_3\n*comment boarding, killed, success or failure.\n*set c_morale - 20\n*if (c_morale + c_str) > (delmarva_morale + delmarva_crew)\n  *comment victory\n  *goto ending_4_2\n*else\n  *comment defeat\n  *goto ending_4_1\n\n*label ending_1_4\n*if status = \"wounded\"\n  You awake three days later in [i]Foraker[/i]'s cockpit, your ship's surgeon hovering over you.\n  \n  Within moments,\n  *if lieutenant_status = \"alive\"\n    Lieutenant $!{lieutenant} is at your side, \n  *if lieutenant_status != \"alive\"\n    Burroughs is at your side,\n  hurriedly explaining the events of the last few days.\n  \n  The [i]Delmarva[/i]'s crew had given little trouble after the surrender,\n  *if (delmarva_gunnery + delmarva_sailing) \u003c 50\n    but the ship ${ship_pronoun_3}self had been battered into such a state that there was no question of saving ${ship_pronoun_3}.  \n    \n    *if lieutenant_status = \"alive\"\n      $!{lieutenant} \n    *if lieutenant_status != \"alive\"\n      Burroughs\n    made the decision to burn the prize, a harsh decision, but given the circumstances, it is difficult to think that you would have done differently.\n    \n    [i]Delmarva[/i]'s captain did not long outlive ${pronoun_2} ship. As your surgeon tells it, ${pronoun_1} was already grievously wounded by the time the battle ended, and there was little that could be done.\n    \n    There is no question of your resuming command now. Your wounds have far from healed. Instead, all you can do is lie back, and await recovery, as [i]Foraker[/i] continues on ${ship_pronoun_2} long journey back to Ismay.\n    *goto ending_2_2\n  *elseif c_str \u003c 30\n    but the battle had been so bloody and the losses so great that [i]Foraker[/i]'s own crew barely consisted of enough able-bodied ${gender} to sail one frigate let alone two.  \n    \n    *if lieutenant_status = \"alive\"\n      $!{lieutenant} \n    *if lieutenant_status != \"alive\"\n      Burroughs\n    made the decision to burn the prize, a harsh decision, but given the circumstances, it is difficult to think that you would have done differently.\n    \n    [i]Delmarva[/i]'s captain did not long outlive ${pronoun_2} ship. As your surgeon tells it, ${pronoun_1} was already grievously wounded by the time the battle ended, and there was little that could be done.\n    \n    There is no question of your resuming command now. Your wounds have far from healed. Instead, all you can do is lie back, and await recovery, as [i]Foraker[/i] continues on ${ship_pronoun_2} long journey back to Ismay.\n    *goto ending_2_2\n  *else\n    which is all well and good, given how thinly spread your crew must be to sail two ships instead of one. Nonetheless, your subordinates have managed admirably so far, repairing both ships, and keeping the Columbian prisoners docile on the long voyage back to Ismay, where they will no doubt be exchanged for captured Albionians.\n    \n    Unfortunately, [i]Delmarva[/i]'s captain will not be among them. As your surgeon tells it, ${pronoun_1} was already grievously wounded by the time the battle ended, and there was little that could be done.\n    \n    The surgeon assures you that your own wounds are not mortal, but that does not mean you are anywhere near fit to return to command. Instead, you are confined to your bed as [i]Foraker[/i] heads north, towards friendly waters.\n    *goto ending_2_3\n  \n*if (delmarva_gunnery + delmarva_sailing) \u003c 50\n  The [i]Delmarva[/i] is yours, but your prize is a burning wreck, ${ship_pronoun_2} ribs shattered and ${ship_pronoun_2} spars all in pieces. You send Burroughs over with the ship's carpenter to assess the damage, but when they return, they bear the grim looks of surgeons about to announce a death.\n  \n  $!{ship_pronoun_1} has been holed beneath the waterline and is flooding fast. With ${ship_pronoun_2} pumps smashed in the action and little chance of reaching a friendly port in time, there is only one choice left to you.\n  \n  With a heavy heart, you take as many of the enemy officers and crew aboard [i]Foraker[/i] as you can, set the rest in boats, and order your magnificent prize burned to deny ${ship_pronoun_3} to the enemy.\n  \n  [i]Delmarva[/i] burns quickly, seasoned wood and tarred canvas setting itself ablaze with a frightening facility. $!{ship_pronoun_2} captain doesn't long outlive ${ship_pronoun_3}. An hour after the wreck slips below the waves, your surgeon comes up to inform you that Captain Wingate of the [i]Delmarva[/i] is no more, dead of ${pronoun_2} wounds.\n  \n  Your orders fulfilled, you set a course northwards, and begin the long voyage back to Ismay.\n  *goto ending_2_2\n*elseif c_str \u003c 30\n  The [i]Delmarva[/i] is yours, but at too great a cost f
