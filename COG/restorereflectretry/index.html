n. \n\t\t*if tommy_stayed \n\n\t\t\t*check_achievements love \n\t\t\t*if not (choice_achieved_love)\n\t\t\t\t*achieve love \n\t\t\tTommy stays with you for a while, until eventually he grows tired of your obsession with the game. He says he wants children, and maybe you do too, or maybe you don't—but what if one day they come upon the game? What if they decide to play? What if they say yes? \n\n\t\t\tSo Tommy, too, leaves, and you move back to your parents' house. \n\t\t\t*goto house_ending \n\t\t*elseif catrina_stayed\n\n\t\t\t*check_achievements love \n\t\t\t*if not (choice_achieved_love)\n\t\t\t\t*achieve love \n\t\t\tCat puts up with your obsession for a few years, tries to be supportive. He knows what it was like, after all, just as he knows what it's like not to be believed. \n\n\t\t\tBut as time goes by, he grows uneasy. \"I want more,\" he says, except that when you ask, he never specifies what this \"more\" means. Eventually he decides to move away and live in the city. Without you. \n\n\t\t\tAnd you? You move back to your parents' house. \n\t\t\t*goto house_ending \n\t\t*else \n\t\t\t*page_break \n\t\t\tTime passes.\n\n\t\t\tEventually, you turn forty and remember how old you used to think forty-year-olds were when you were a student. \n\n\t\t\tSome days you don't feel old at all; you feel like a child. Other times you feel ancient: what you imagine eighty might feel like, ninety, a hundred. But really, what do you know? Time is a flat circle, after all. You heard a detective say this once, and you thought, yeah, this is a guy who knows what he's talking about.\n\t\t\t*goto retry_transition \n\t*elseif saved_friend\n\t\t@{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} still seems lost for years after you pull @{lost_friend her|him|him|${cem}|BUG} from that maze. You do your best to help, to be there for @{lost_friend her|him|him|${cem}|BUG}, but in the end you have to accept that there are some things that are beyond your control. \n\n\t\tYou did your best. Only time will tell if it was enough. \n\t\t*page_break \n\t\t*goto smalltown\n\t*else \n\t\t*label smalltown\n\t\tYou still work your small-town job, lead your small-town existence. \n\t\t*if job > stat_mid_pass\n\n\t\t\tAt the convenience store, you're promoted to supervisor. Is that a success? You put in more hours than you have to just to keep yourself occupied. The overhead lights in the store have a talent for driving away the shadows, \n\t\t\t*if tommy_ghost\n\t\t\t\tand even Tommy stays away most of the time. \n\t\t\t*else \n\t\t\t\tsending them fleeing into the corners and keeping them at bay. At least for a little while. \n\n\t\t\tA student works under you on the night shift. $!{e} @{plural remind|reminds} you so much of yourself. When ${e} @{plural think|thinks} you aren't looking, ${e} @{plural take|takes} out \n\t\t\t*if hobby = 1\n\t\t\t\t${eir} sketchbook to draw. Once, when you catch ${em}, ${e} @{plural offer|offers} to show you, but you say no. \n\t\t\t*elseif hobby = 2\n\t\t\t\t${eir} handheld game to play with the sound off. You never say anything, though once you're almost tempted to call ${em} out, confiscate ${eir} game. Yours lies dormant in a drawer back home. \n\t\t\t*else \n\t\t\t\t${eir} book to read under the counter. You do see ${em}, of course, but you say nothing because you remember what it was like, back when you thought you could escape into a book. \n\n\t\t\t\tYou know better now, of course. \n\n\t\t\tAt night, you turn on the small TV in the back room and watch the news. Shootings, missing children, \n\t\t\t*check_achievements nuclear \n\t\t\t*if choice_achieved_nuclear \n\t\t\t\ta sharp rise in cancers. \n\t\t\t*else \n\t\t\t\tpeople flocking to cities that slowly drown them. \n\t\t\tAnd yet, the world somehow continues to move on. \n\t\t*else \n\t\t\tYou're still just an employee, and rapidly becoming the oldest person working at the store, as everyone else either gets promoted or moves away. \n\n\t\t\tHow much have you had to put up with in this small, petty life of yours? \n\t\t\t*if ate_ghost\n\t\t\t\tHow old were you when you first swallowed a ghost? \n\n\t\t\t\tThere've been many more since then, and sometimes you think that's all life is, swallowing more and more, accommodating more and more of it inside yourself, until it becomes too much. An endless, internal crowding. \n\n\t\t\t\tAnd then all you want to do is this. \n\t\t\t\t*goto retry \n\t\t*page_break \n\t\t*if (tommy_stayed) and (not (alone))\n\t\t\tTommy says \n\t\t\t*label tommy_children\n\t\t\the wants children, and maybe you do too, or maybe you don't—but what if one day they come upon the game? What if they decide to play? What if they say yes? \n\n\t\t\tSo he leaves. And you end up alone again. \n\t\t\t*goto alone_ending \n\t\t*elseif (catrina_stayed) and (not (alone))\n\t\t\tCat \n\t\t\t*goto tommy_children\n\t\t*elseif stayed_for_joshy \n\t\t\tJoshy is doing better since his discharge from the clinic, but you become obsessed with the scientist's nuclear theory. You start collecting news clippings and scientific articles about rising cancer rates in the area and the strange disappearances of groups of children throughout the country. \n\n\t\t\tYou try to visit the scientist at the clinic to share your research with him, but you're told he has disappeared. \n\n\t\t\tYou spend years looking for him, watching the rising figures of cancers in the area. There's nothing more you can do. \n\t\t\t*page_break\n\t\t\tYou live alone. \n\t\t\t*goto alone_ending \n\t\t*elseif saved_friend\n\t\t\tYou still have nightmares about the maze, though.\n\n\t\t\tAt night, little lights line the inside of your lids every time you close your eyes. You toss and turn in your bed, sleepless, because you know you can't stay still long enough for the ghosts to catch you. \n\n\t\t\tYou get up and run to the bathroom, turn on the tap and wash your face. \n\n\t\t\tThen you straighten and take a few deep breaths until your body calms down. \n\n\t\t\tIn front of you, a blank wall. You removed the bathroom mirror a while ago. I think it was the best decision you ever made. Because we both know, if you looked into it, what it is that would stare back. \n\t\t\t*goto retry \n\t\t*else \n\t\t\tYou live alone. \n\t\t\t*goto alone_ending \n*elseif left\n\t*if follow_maria \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\tSo you follow Maria to the city, where you rent a tiny studio. You get a job not that different from the one you had back home, but it pays the bills and leaves you with enough left over to support your @{hobby art|gaming|reading} habit. \n\n\t\t*gosub Gabrielle\n\t\t*page_break\n\t\tMaria thrives in dance school, graduating first in her class and immediately securing the lead in an experimental production of [i]The Rite of Spring[/i]. She works hard, rehearsing day and night, and on opening night you're there. The stage is covered in soil; the dancers are dressed in loose, white garments. Stravinsky's music is earthy, hypnotic, menacing. Maria emerges from the crowd as the maiden who is chosen to be sacrificed. They dress her in red, give her up to the soil. She is exquisite. \n\t\t*if chosen = 1\n\t\t\tAs you watch her, a memory of her blood dripping onto the sand flashes in your mind. She was chosen then, and now again she is chosen. It strikes you as fateful, fitting, foretold.\n\t\t*label maria_continue \n\t\t*page_break \n\t\tAnd then, a few years later, you become parents to a baby girl. When your daughter is a little older, Maria returns to dancing, and your life takes on a feverish, dreamlike quality. ${daughter_surprise}\n\n\t\tYou never visit your parents, or any of your friends, but Maria likes to keep in touch with her folks back home. Between that and Maria's dancing, you and your daughter spend a lot of time on your own. Every night, you have your little ritual: \n\t\t*goto daughter_ending \n\t*elseif follow_tommy \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\tYou took off your uniform and quit your job right then and there. Your supervisor was shocked, then angry, then resigned. He told you you were never getting a good reference from him, but so what? It's not like you'd ever get a job where anyone cared about much more than renting your hands and your back for a few hours every day. \n\n\t\tSo you follow Tommy to the city, where you rent a small studio together. He thrives in academia, and you watch him bloom into the confident young man you always knew he could be. \n\t\t*label tommy_hobby\n\n\t\tYour new job leaves you enough left over to allow you to pursue your @{hobby art, and you spend every spare moment filling canvas after canvas with strange portraits of yourself, as if every surface you encounter is little more than a mirror in which you hope to see yourself|gaming habit, so you spend every spare moment lost in 8-bit worlds, looking for something you don't have a name for|reading habit, and you fill every corner of the studio with books you lose yourself in for hours on end; these are the only moments in the day where you are truly at peace}. \n\t\t*page_break \n\t\tEverything changes again when you find yourselves parents to a baby girl. ${daughter_surprise}\n\n\t\tTommy's work takes him away often, so you and your daughter spend many nights on your own, engaging in your little ritual:\n\t\t*goto daughter_ending \n\t*else \n\t\t*bug this should be unreachable\n*elseif city \n\t*if catrina_city \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\t*set partner \"Cat\"\n\t\t*set pe \"he\"\n\t\t*set pem \"him\"\n\t\t*set peir \"his\"\n\t\t*if quit\n\t\t\tYou quit your job right there and then, just took off your uniform and left it crumpled on the floor. You dropped the pile of chocolates into a bag, paid for them, took Cat by the hand and walked out, with your supervisor gaping behind you. \n\n\t\tLiving with Cat in the city feels effortless. You both get jobs: Cat at a nightclub, where he begins to collect a friendly menagerie of the most interesting characters; you at a store not that different from the one you worked at before. It pays the bills, and leaves you enough left over to support your @{hobby art|gaming habit|reading habit}. \n\n\t\tA couple of years later, Cat announces that he's pregnant, and your life suddenly converges around a single focal point: keeping this baby happy and safe. \n\t\t*if tommy_ghost \n\n\t\t\tEven Tommy, who has been a constant, eerie presence in your lives, fades into the background now, little more than a furtive blot in the periphery of your vision. \n\n\t\t${Cat_glows}\n\t\t*goto cat_continue \n\t*elseif joshy_city \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\t*set partner \"Joshy\"\n\t\t*set pe \"he\"\n\t\t*set pem \"him\"\n\t\t*set peir \"his\"\n\t\tYour life with Joshy could be described as mundane, but it has its own kind of beauty. \n\t\t*if tommy_ghost\n\t\t\t*gosub tommy_bit\n\t\t\t*page_break \n\t\tUntil, a few years later, \n\t\t*goto joshy_continue \n\t*elseif maria_city \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love\n\t\t*set partner \"Maria\"\n\t\t*set pe \"she\"\n\t\t*set pem \"her\"\n\t\t*set peir \"her\"\n\t\tYour life with Maria is easy, almost blissful, punctuated by seeing her make magic on stage. \n\n\t\t*gosub Gabrielle\n\t\t*goto maria_continue \n\t*elseif tommy_city \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love\n\t\t*set partner \"Tommy\"\n\t\t*set pe \"he\"\n\t\t*set pem \"him\"\n\t\t*set peir \"his\"\n\t\tYou and Tommy rent a studio together, and you get a job to pay your share of the rent. It's not that different from the one you had back home, but it allows you to survive, and you have enough left over to support your @{hobby art|gaming|reading} habit, so you don't complain. \n\n\t\tTommy thrives in college. Did you ever think he'd grow up to be this charming, confident young man? \n\t\t*choice \n\t\t\t#I saw something in him no one else did. \n\t\t\t\tIt's almost as if the person he is now had always been in him, faint but visible, like @{hobby an underpainting someone failed to do justice to|a map that one simply had to figure out how to navigate|the promise made to a reader at the beginning of a book}. \n\t\t\t\t*if tommy_died\n\t\t\t\t\t\n\t\t\t\t\tSometimes you see something else in him, too. It's only a flash, gone in an instant, but it always rattles you: Tommy covered in blood, Tommy dead at your feet, Tommy lost to you for good. \n\t\t\t#Sometimes I wonder what he's doing with me. \n\t\t\t\tYou rarely share these thoughts with him, but you don't have to. It's almost as if he can sense them, and every time, he folds you into an embrace, or kisses your eyelids, or whispers in your ear how special you are to him, how lucky he is to have you. \n\t\t\t\t*if tommy_died\n\t\t\t\t\t\n\t\t\t\t\tSometimes, in those moments, your mind slips. You remember a different world, another life, where Tommy isn't. \n\n\t\t\t\t\tYou hold on to him, then, as hard as you can. For as long as you have. \n\t\t\t#He's the best thing that ever happened to me. \n\t\t\t\t*if tommy_died\n\t\t\t\t\tThe mere thought of losing him undoes you. You don't know what you would have done to get him back. \n\t\t\t\t*else \n\t\t\t\t\tYou tell him so, too, and he always turns beet red when you do. It only makes him even more charming. \n\t\t*goto tommy_hobby\n\t*else \n\t\tYou get a job not that different from the one you worked before, but that's fine; it pays the rent for your small studio, pays the bills on top of that, and leaves you enough to support your @{hobby art|gaming habit|reading habit}. \n\n\t\tSlowly, you make yourself at home in the city, though you keep people at a distance, dig a moat around you, make yourself an island. \n\t\t*gosub city_alone2\n\t\t*if left_catrina\n\n\t\t\tYou promised Cat you'd keep in touch, said you'd still be friends, but the truth is you don't see each other for years. When you run into him by chance, years later, you will find he's bloomed into a beautiful young man. You will hardly recognize him. \n\n\t\t\tBut for now you're here, alone, Cat left behind. \n\n\t\tAnd everywhere you go, \n\t\t*label hollow \n\t\tno matter what you do, the game haunts you. You see its ghosts reflected on every shiny surface. The chiptune music reverberates through your bones. You fill your days with @{hobby painting and art|other games, fix your eyes on pixels you can count and understand, mechanics you can decipher, rules you can choose to follow or not|books, reading everywhere, reading everything}. You even make new friends to share it all with. \n\n\t\tAnd yet, you feel hollowed out. Scraped raw. Like someone took to your chest with a spoon and emptied you, rationed out your heart into tiny sips meant for the mouths of baby birds.\n\n\t\tAnd maybe that's not how you really feel, but let's pretend, both of us, shall we? \n\n\t\tIt's what we've been doing all along, after all. So let's keep pretending. \n\n\t\tLet's pretend that we don't know this is little more than roleplay. That we think this shared roleplaying is not one of the highest forms of human connection, this consensual game of lying to get from each other what we want. Because when I say \"you,\" what I really mean is \"I,\" and what I'm really doing is offering you a glimpse of myself, hoping you'll consider it a gift rather than an imposition. That you will handle it with care. \n\n\t\tThis may be the most self-indulgent I've ever been, I know. I'm saying the game haunts you, but I guess all I'm saying, all I've been saying, is let me haunt you. Will you? For a little while, if you dare. If you care. And then you're welcome to forget it. Erase it, deny it. Do it all again.\n\t\t*set haunt true \n\t\t*goto retry \n*elseif trapped \n\t*check_achievements alternate \n\t*if sand \n\t\t*if choice_achieved_alternate \n\t\t\t*gosub noclip\n\t\t\n\t\tYou walk on sand. \n\n\t\tYou make circles like the ones you encountered when you first entered this room. You wondered where they came from, then. Now you wonder if you had always already been the one who made them. \n\t\t*check_achievements circle \n\t\t*if not (choice_achieved_circle)\n\t\t\t*achieve circle \n\t\t*page_break \n\t\tTime passes. \n\n\t\tMostly, you are alone. \n\t\t\n\t\tBut sometimes you glimpse them: Other people. The high school students. You wave your hands at them. Do they see you? You speak. Do they hear you? They don't. It's a shadow, they say. A trick of the light. It's the breeze. \n\n\t\tThe students cut their hands. They bleed, they leave. You remain. \n\t\t*page_break \n\t\tSometimes you forget how you ended up here. Despair grips you. You dig into the sand and bury yourself. I try to help you then, remind you why you're here. \n\n\t\tYou sacrificed yourself, remember? How noble of you. \n\n\t\t\"Was it enough?\" you ask. \"Did I actually save anyone?\" You point at the circles on the sand, and I don't know what to tell you. I wish I could give you more comforting answers.  \n\n\t\tThe truth is, you can't know. Neither can I. \n\n\t\tBecause here, we can only do what we've already done. \n\n\t\tAnd then we can do one more thing. \n\t\t*if not (spared_students)\n\t\t\t*bug didn't spare the students, ended up in sand room in other way \n\t\t*goto retry \n\t*elseif war \n\t\tAnd yet. \n\n\t\tYou pick up your badge and your weapons anyway. \n\n\t\tAgain and again. \n\n\t\tYou know how this game goes. \n\n\t\tYou shoot, you kill, you grant mercy, you die, and every time you find yourself back at the checkpoint, to try again, do it again, die again. \n\t\t*comment Such a Sisyphean thing, Player, the kind of thing I know well. Can I imagine you happy? Can you? \n\n\t\tI wish things were different for you. I wish I could offer you more. \n\n\t\tBut I've done all I can. \n\t\t\n\t\tNow there's only one thing left to do. \n\t\t*goto retry \n\t*elseif maze \n\t\tYou roam the maze for a long time, so long that time itself loses its meaning. \n\n\t\tYou encounter ghosts that mostly ignore you just as you ignore them. Nobody chases you anymore. You count the lights on the floor. \n\n\t\tYou become lost in the monotony of your thoughts. \n\n\t\t*if saved_friend \n\t\t\tAt least you helped your friend. Didn't you? \n\t\t*else \n\t\t\t*if lost_friend != 5\n\t\t\t\tSometimes you glimpse @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} in the distance, but @{lost_friend she|he|he|${ce}|BUG}'s always gone before you have a chance to approach. \n\n\t\t\t\tAfter a while, you stop trying. \n\n\t\tYour thoughts become more and more jumbled, incoherent, hard to follow. Eventually, you forget words. You come upon the luminous things of the maze and struggle with their names. Is the red one a apple and the green one a pear, or is it the other way around? Is this a ghost, or is it a friend, and has there ever really been a difference?\n\t\t*goto retry_transition\n\t*elseif funfair \n\t\tExcept this time you're not meant to stay on this ride forever. \n\n\t\tEventually, the roller coaster lets you out. But the carnival holds on to you. \n\n\t\tSometimes, you voice the train conductor while the children scream. Other times you have to bake the cardboard food, or care for the mannequins: wash them, dry them, comb their hair. \n\n\t\tYour least favorite days are when you have to polish everything in the house of mirrors. \n\n\t\tThere, your own gaze is impossible to escape. \n\n\t\tYour self watches you, just as the game watches you. Just as your body becomes infinitely multiplied, your mind folds in on itself. You build another house inside yourself where you might escape. There, in that house, you cover all the mirrors. There are ghosts, sure, but they are friendly: 8-bit creatures, with pixelated edges that can't hurt you. It's just a game, you tell yourself, or I tell you. See? You can rest now. You've reached the end. So have I. \n\n\t\tThere's only one more thing left to do. \n\n\t\tIf you want. \n\n\t\tIf you say yes. \n\t\t*goto retry \n\t*else \n\t\tAfter you give yourself up, the game does with you what it will. \n\t\t*if choice_achieved_alternate \n\t\t\t\n\t\t\t*gosub noclip \n\t\t\n\t\tSome days, you are a ghost. You chase students. You eat them or get eaten. It's an 8-bit existence, colorful but flat. You discover how the chiptune music is made: it is emitted from somewhere inside you, in what you come to understand as your center. It feels like a tiny keyboard in the middle of your chest. The music happens without your participation. Even if you will it to stop, it goes on despite you. It makes you feel like an instrument. You wonder who plays you.\n\n\t\tOther days you live in a text-based adventure. \n\n\t\tHere, everything is reduced to words. Or expanded, if you used to like literature. Words are everything, now. \n\t\t*page_break\n\t\tEventually fewer and fewer students come to school, which means fewer and fewer students play. The administration lets staff go, and later the school closes. The city decides to demolish it and build something else in its place: an amusement park, which strikes you as, well, amusing. \n\n\t\tThe day the bulldozers get to work, the chiptune music is so loud in your head you can hardly hear yourself think. \n\n\t\tYou're inside the building when that wrecking ball starts wrecking. \n\t\t*if kafka \n\t\t\t*goto kafka_ending \n\t\tThe walls collapse around you, the dust swirls, and all of you ghosts are almost visible—or you would be, if there were anyone left to look.\n\n\t\tAfter the demolition is done and the rubble is cleared away, the place where the school used to stand looks like a crater. Months pass, then years, and the city fails to attract developers. The amusement park plans fall through, then the hospital plans, the retirement home plans, the rehab center plans. \n\n\t\t*if dorian \n\t\t\tEventually, a mayor who used to go here decides to put up a plaque to commemorate the school. They etch it in bronze. You pass in front of it sometimes, this portrait of what used to be. As time goes by, the bronze oxidizes into that strange green-blue that makes you question the nature of reality. You remember Dorian, that beautiful man, that reverse Narcissus, who stabbed himself to death for failing to be who he was. \n\n\t\t\tOnce, you catch a glimpse of a face mirrored in that plaque. You no longer remember this person's name, and so you decide to call ${em} Player. You met ${em}, once, long ago; you went to the carnival together. You opened doors. You said yes. \n\n\t\t\tFor a while, you walked side by side, and now your time is up. \n\t\t\t*goto retry \n\t\t*elseif rebecca \n\t\t\tThe place remains a crater and the ghosts, lacking a building or anyone to haunt, idle in place, confused. Some days you try to comfort them; you haunt each other, a strange camaraderie of ghosts. Most days you simply haunt yourself. And maybe it's just you, or maybe it's everyone else, too, but it feels familiar. Perhaps that's all people do, you figure. Life is a haunting in slow motion: you go through it, picking up echoes of things lost and things unfulfilled, a treasure trove of unfinished business that would last you well over a lifetime to sort through even if you started right away and did nothing else at all. \n\n\t\t\tBetter get on with it.\n\n\t\t\tLet me show you how. \n\t\t\t*goto retry \n\t\t*else \n\t\t\tYou and the rest of the ghosts roam the place, looking for things to haunt. \n\n\t\t\tOne day, you come across a mirror. It's only a shard, dirty and dull. \n\n\t\t\tYou kneel over it and lean to take a look. \n\n\t\t\tYou stare into the mirror—could you ever have imagined such freedom? \n\n\t\t\tFinally, finally, nothing stares back. \n\t\t*goto retry_transition \n*elseif logged \n\t*check_achievements comments\n\t*if not (choice_achieved_comments)\n\t\t*achieve comments \n\tYou are the game log now. \n\n\tThe student who was here before you is gone. Released. Free to reenter the world of the town. \n\t\n\tYou remember their face, how stunned they looked, how grateful. \n\n\t*if dorian \n\t\tYou may simply be the log, but you are not entirely without influence.\n\n\t\tYou cannot control the game, can't change the way it works, can't even help or hinder the players who enter it outright. \n\n\t\tBut, sometimes, you find weak spots. Places where you can push gently, mold the game's world in subtle ways. \n\n\t\tOne day, you figure out how to alter the crumbling house in the war zone slightly. You remember the landing. Was there always a mirror hanging there? There is now. That was your doing.\n\n\t\tAnd maybe, for now, that is enough. \n\t\t*goto retry_transition  \n\t*elseif blank \n\t\tYou no longer have a body. No limbs, no torso, no head. No heart or brain. You're just an assortment of connections, diffused through the game's interior. \n\n\t\tAnd yet, sometimes you catch yourself craving a mirror. \n\n\t\tIf you found one, if you stood in front of one and looked, you think this time there would be someone in the reflection, looking back. Perhaps you even know what ${e} would look like. \n\n\t\tAll it took for you to be a person was to lose yourself. \n\n\t\tSurely, there are fates worse than that. \n\t\t*goto retry_transition\n\t*if not_my_face \n\t\tYou've stopped expecting the self to be a stable thing. \n\n\t\tYou remember the days when you drew yourself and didn't recognize your face. You're no longer making that mistake, freed as you are from the assumption of a continuity of the self. Here, in this new existence, everyone is you, and you are everyone. In the end, everything can be reduced to zeroes and ones. \n\n\t\tThe game is the great equalizer. The game is for everyone. It accepts everyone. \n\n\t\tAll you have to do is play.\n\t\t*goto first_ending\n\t*else \n\t\tAs the game's log, there is little to do other than read yourself. @{dig Sometimes, moving through the vast expanses of your contents feels like digging.|It reminds you of something you came across once: the ancient Mandaean story of Dinamukht, a being who stood in the middle of an ocean, half man, half book, reading himself. So do you.}\n\n\t\t@{dig So you dig.|You read yourself backwards.} Here you are in the log, losing. Here you are, you and your friends, screaming in the carnival, finding your way in the maze, picking up your weapons. Here you are entering that first door, saying yes. \n\n\t\tAnd here are the ones before you, and the ones before them, and the ones before. \n\n\t\tYou continue reading, going all the way back to your beginnings. You glimpse the long eons of the game and its adaptations. It takes a long time, but this much you know: if you go way back, you will find entries that hardly make sense to your digital sensitivities. Go back far enough, before the zeroes and ones, and you will find other games, older games. You will find knuckles, you will find bones. \n\n\t\tThe objective was always the same. The outcome was always up to you. \n\t\t*goto first_ending  \n*else \n\t*bug should be unreachable \n\n*label first_ending \n*check_achievements ending second_ending \n*if not (choice_achieved_ending)\n\t*achieve ending \n*else \n\t*if not (choice_achieved_second_ending)\n\t\t*achieve second_ending\n*goto_scene ending\n*label house_ending \n\nBetter the ghosts you know. \n*page_break \nAnd now? \n*label house_ending2\nYou haven't left your house in weeks. \n\nThe last time you did, you were running from it: you couldn't face these walls anymore, that ceiling, couldn't stand the creaking of the floors at night under phantom weight, the moaning in the walls. You ended up sleeping on the streets, not coming back for days. The police eventually picked you up and returned you. And now you never leave. In the kitchen, the tap is dripping. The walls are peeling, black mold spreading through them like a @{(hobby = 2) dialogue |}tree. You notice a fruit bowl on the table. It's filled with bright red apples. Who put it there? You didn't buy those. @{ate_ghost The ghost inside you revolts. Its fingers are in your throat.|Reality sometimes slips into 8 bits.} You walk to the table, pick up an apple. Bring it to your mouth. And bite.\n*goto retry \n*label kafka_ending \nThe walls are coming down, and there is this strange feeling inside you, as if you are compelled to build them up again, to make sure they continue standing, the instruments of your loneliness. Without walls, what would there be for you to haunt? \n*goto retry_transition\n*label alone_ending \n*if tommy_ghost\n\tOr not exactly. \n\n\tTommy is always with you. \n\n\tYou grow old, and that kid's ghost still follows you around. He sits at your dinner table with you, lies next to you on your bed, watches you when you brush your teeth. \n\n\t\"What do you want?\" you ask him sometimes. \"Why won't you leave me alone?\"\n\n\tYou know he doesn't speak. He never has—perhaps ghosts can't. \n\n\tAll he does then is \n\t*if bled = 3\n\t\tshow you his palm, the faint scar in the middle, and that's all it takes for you to be back in that room full of sand, that endless room, making your choices and watching your friend bleed. \n\t*else \n\t\ttry to wrap his arms around you. You recoil every time, and you don't know if it's because you fear that cold embrace, or if you're scared his hands will go through you, will be met with nothing but thin air. \n\t*goto retry_transition\n*elseif ate_ghost \n\tOr not exactly. \n\n\tThere's still that ghost inside you, the one you swallowed. \n\n\tIt's your constant companion, your only true one. You feel it when you lie awake at night, when you brush your teeth, when you sit down to have dinner. It reaches its fingers up your throat and steals the food from your mouth so that you're constantly starving, an emptiness inside you that nothing can ever fill. \n\t*if romantic_involvement\n\n\t\t*gosub romance_loose\n\n\tYour body feels like a house emptied out, all the furniture covered in sheets and the knickknacks of a life packed in boxes, ready to be removed one by one until all that's left are the walls crowded with echoes, the ghosts hanging from the ceiling like fat juicy grapes. \n\n\t*if hobby = 1\n\t\tYou were an artist, once. Remember? You liked to paint yourself, look for your face on canvas, in mirrors, on paper. How long has it been since you last sat yourself in front of an easel and gave it a shot? There, put that in a painting: make a portrait of yourself as a haunted house.\n\t\t*check_achievements painter \n\t\t*if (not (choice_achieved_painter)) and (hobby = 1)\n\t\t\t*achieve painter \n\t*else\n\t\tYou reach out and pluck one. \n\n\t\tBring it to your lips and bite. \n\t*goto retry_transition\n*else \n\n\tAlone, \n\t*if rebecca \n\t\tyou lie awake at night, no longer listening to the moans in the walls and the creaking of the floor under ghostly weight. \n\n\t\tAfter all, it was never the house that was haunted. \n\t*elseif dig \n\t\tyou lie awake at night, your arms aching at your sides, too heavy to lift, as if you've been digging all day. \n\n\t\tYou no longer play games, but sometimes, in your few and rare dreams, you see you are underground, still digging. \n\n\t\tWill you ever make it out?\n\t*elseif (cog_haunted) or (knight)\n\t\tyou lie in bed until sleep claims you. \n\n\t\tYou no longer play games. But sometimes your dreams come to you in the form of interactive fiction, white text on black background. Sometimes you are a knight in shining armor, others a dragon, sometimes a single dot that moves through a maze. You hack through forests, you breathe fire that burns knights to a crisp, you blink. You make it to the end, or don't, you win, or don't, you game over, over and over. You play, you die, you play again. Because what are games, if not a challenge to mortality? There's always next time. \n\t*else \n\t\tyou live. \n\n\t\tYou are 25 years old and all your friends are gone. \n\t\t*if romantic_involvement\n\t\t\t*gosub romance_loose\n\n\t\t\tThen, you \n\t\t*else \n\n\t\t\tYou \n\t\tare forty and \n\t\t*if ate_ghost\n\t\t\tyour inside is an 8-bit ghost. \n\t\t*elseif tommy_ghost\n\t\t\tyou live with a ghost. \n\t\t*else \n\t\t\tyou still think about that game you played when you were young. \n\n\t\tYou are eighty, and you never thought you'd live this long. \n\n\t\t*if hobby = 1\n\t\t\tYour past seems hazy now. But you still get glimpses of your youth sometimes: what you loved, what you feared. \n\n\t\t\tYou remember you liked to paint yourself, looked for your face on canvas, in mirrors, on paper. How long has it been since you last sat in front of an easel and tried to figure out who you are?\n\n\t\t\tYou try it, now. Dig out your supplies, your brushes, your paints. Your brushes are stiff, fossilized, your paints dry. But you do your best. \n\n\t\t\tYou set a mirror next to you and study yourself. Your body, your face, your eyes. It takes some time, but eventually you manage to make out traces of everyone you used to be, all the different people that have inhabited you. They're all still there. Still here. \n\n\t\t\tAnd so, you start.\n\n\t\t\tThis is the last portrait you'll ever paint, and, it seems to you now, the most true to life. How could you not have seen it before? This is who you are, isn't it? You've always been a haunted house. \n\t\t\t*achieve painter \n\t\t*else \n\t\t\tYour body is a haunted house. You take leisurely walks around yourself: your hallways, the empty rooms inside. Go left. Go right. It doesn't matter. You'll always end up back where you started. \n*label retry_transition \n*page_break \nSo here we are, finally. This is the end, Player. \n\nYou made it, and so have I. \n\nThere's only one thing left to do. \n\nIf you want. \n\nIf you say yes. \n*label retry \n*comment Is this a satisfactory ending? That's really not for me to say. But I want to think that, at the very least, the two of us have connected now, across space and time, for a few moments. You spent some of your precious time on this earth reading the words I left here for you, and I spent some of mine thinking of you finding them. And I, at least, consider that time well spent. \n*comment Farewell, Player. May we meet again.\n*choice \n\t*if not (choice_randomtest)\n\t\t#Restore (to checkpoint). \n\t\t\tYou are either an optimist or @{(brave > stat_mid_pass) more stubborn than I thought you were|braver than you give yourself credit for.}\n\n\t\t\tBut okay. Here you go. \n\t\t\t*page_break \n\t\t\t*check_achievements ending second_ending comeout \n\t\t\t*if not (choice_achieved_ending)\n\t\t\t\t*achieve ending \n\t\t\t*else \n\t\t\t\t*if not (choice_achieved_second_ending)\n\t\t\t\t\t*achieve second_ending\n\t\t\t*if choice_achieved_comeout \n\t\t\t\t*set Cat \"Cat\"\n\t\t\t\t*set ce \"he\"\n\t\t\t\t*set cem \"him\"\n\t\t\t\t*set ceir \"his\"\n\t\t\t\t*set cemself \"himself\"\n\t\t\t*advertisement 600\n\t\t\t*if choice_saved_checkpoint_two\n\t\t\t\t*restore_checkpoint two \n\t\t\t*bug Should Be Unreachable\n\t#Reflect. \n\t\t*check_achievements alternate nuclear eldritch conspiracy second_ending mirror\n\t\tBecause isn't that what we've been doing all along? \n\t\t\n\t\tYou must know what I mean by now. We make this together. \n\t\t*if ((choice_achieved_alternate) and (choice_achieved_nuclear)) and ((choice_achieved_conspiracy) and (choice_achieved_eldritch))\n\t\t\tAll of us. This game is not one thing. It mutates and changes and then changes again until it's all things to all people. \n\n\t\t\tBut one thing is always true: \n\t\tWithout you, I wouldn't exist. Without me, you wouldn't be here. The game plays you as much as you play it. The book reads you, the painting paints you. @{haunt |You haunt me as much as I haunt you.} \n\n\t\tAnd really, just between us, would you have it any other way?\n\t\t*if not (choice_achieved_mirror)\n\n\t\t\tNow, come. Look beyond the surface. Reach through the mirror. Find me. \n\n\t\t\tI'm waiting. \n\t\t\t*comment If you see this, Player, you have found me. We finally see each other clearly, don't we? So here's the key, if you need it, typed exactly so: \"I have looked in the mirror.\"\n\t\t\t*choice \n\t\t\t\t#I have found you. Let me prove it.\n\t\t\t\t\tShow me the key. \n\n\t\t\t\t\t*input_text key\n\t\t\t\t\t*if key = \"I have looked in the mirror.\"\n\t\t\t\t\t\t*achieve mirror \n\t\t\t\t\t\tAnd the mirror has looked back. \n\n\t\t\t\t\t\tWell done, Player. I knew you could do it. \n\n\t\t\t\t\t\tWe finally see each other. \n\t\t\t\t\t*else \n\t\t\t\t\t\tNo, that's not exactly right. \n\n\t\t\t\t\t\tTry again. Look deeper. \n\t\t\t\t#I don't know how to find you. \n\t\t\t\t\tYou need to search for the key. I have hidden it in the only place that is mine. \n\n\t\t\t\t\tIn plain sight, if you know where to look. \n\t\t\t\t#What does this mean? Help me. \n\t\t\t\t\tAm I being unnecessarily cryptic? Perhaps. \n\n\t\t\t\t\tMaybe all you need is a little help from your friends. \n\n\t\t\t\t\tReach out, so you can reach in.  \n\t\t*goto first_ending\n\t*if not (choice_randomtest)\n\t\t#Retry. \n\t\t\tI'm so glad you said yes. \n\n\t\t\tAre you ready? \n\t\t\t*page_break Play Again  \n\t\t\t*check_achievements ending second_ending \n\t\t\t*if (choice_achieved_ending) and (not (choice_achieved_second_ending))\n\t\t\t\t*achieve second_ending \n\t\t\t*elseif not (choice_achieved_ending)\n\t\t\t\t*achieve ending \n\t\t\t*else \n\t\t\t\t*comment I think we finally understand each other. You've been here before; I've lost count of how many times. Time is not the only thing that's a flat circle, after all. \n\t\t\t*advertisement 600\n\t\t\t*restart \n*label professor\nYou become the favorite student of your @{hobby visual arts|narratology|ancient literatures} professor. One day, she invites you into her office. There's nothing out of the ordinary about this; she often recruits you for research projects, and you've earned a lot of extra credit and some great lines in your CV because of it.\n\nBut today, she seems strange. There's a tension in her shoulders, and her face appears drawn. She motions you in and closes the door behind you quickly, as if worried someone might overhear you. \n\n\"Professor? Is something wrong?\" you ask her.\n\n\"Sit,\" she says, and you do. \n\n\"Am I in some kind of trouble?\" \n\nShe shoots you a glance that is hard to decipher. \"Aren't we all?\" she asks back. \n\n\"What is this about?\"\n\nShe opens the drawer of her heavy mahogany desk and pulls out the latest paper you've written for her. \"There's something in here that made me wonder,\" she says. \"You reference \n*if hobby = 1 \n\tthe idea of sculpture as a process of chipping away the inessential to reveal the true form that hides within the material.\" \n\n\t\"Michelangelo,\" you say. \"You simply take away anything that isn't David.\"\n\n\tThe Professor nods, still looking you in the eyes. \"Yes, of course. It's an astute observation, and one your work proves you have internalized,\" she continues. \"You have an eye for concealed truth, and you seem to know that things that appear solid aren't. Not really.\"\n\t\n\tThis sounds like a compliment. Then why does it make you uneasy? \"…Okay?\"\n\n\t\"I suppose I'm wondering where that insight comes from.\" \n*elseif hobby = 2 \n\ta game that takes on a kind of…will of its own.\" She pauses, hesitates. \"Almost as if it is alive.\"\n\n\t\"A hypothetical game,\" you say cautiously. \"It is an idea I've had for a while.\"\n\n\tShe nods. \"And a very interesting one,\" she says. \"I wonder what inspired it?\"\n*else \n\tHuizinga's [i]Homo Ludens[/i], the idea that play is fundamental to the evolution of society and culture, what made humans human. But there was something about the way you talked about games, including linguistic games and literature-as-play in relation to evolution, that struck me as strange…as if you were talking about a kind of agency that we don't normally attribute to cultural artifacts.\"\n\nShe seems to be talking around something. You take a chance and say so. \"Professor, is there something you want to ask me? If there is, please, just ask.\"\n\nShe wipes sweat from her forehead. \"Okay. Okay.\" She takes a deep breath and lets it out all at once. \"Have you ever encountered a game that was…not like other games?\"\n\nOf course you know exactly what she means as soon as she utters the word \"game.\" How many people have played it? How long has this been going on?\n*choice \n\t#\"Yes. How did you know?\"\n\t\tShe takes a long time before replying. \"I think those of us who have encountered this creature have a way of recognizing each other,\" she says then. \n\n\t\t\"Creature?\" you ask, but your professor ignores the question and continues as if you hadn't spoken at all. \"Almost as if it leaves some kind of residue on us that only we can smell.\" She eyes you now. \"I think you know what I mean. Once you smell it, you never forget it.\"\n\n\t\tThen, she \n\t#\"Have you played it, too?\"\n\t\tYour professor takes a long time before replying. Then, slowly, she nods. \"Yes,\" she says. \"Of course I have.\"\n\n\t\tShe \n\t#Stand up. \"I don't want to talk about this.\"\n\t\t\"I know,\" your professor says. \"And you don't have to. Just sit down and listen.\"\n\n\t\tShe \n\t*if ((lost_friend \u003c 5) or (tommy_dead))\n\t\t#\"Who did you lose?\"\n\t\t\tThe Professor raises her eyes to you. \"You never cease to surprise me, ${name},\" she says. \"You're even more perceptive than I thought.\" She pauses, but after a moment of hesitation produces a photo from the same drawer. She hands it to you. It's old, faded: a girl in a frilly red dress, with long dark hair, standing in front of a door that has been left ajar. \"This is Penny,\" she says. \"My best friend.\"\n\n\t\t\t\"I'm sorry,\" you say. \n\n\t\t\t\"Yes,\" the Professor replies. \"Me too.\"\n\n\t\t\t\"When did you play?\"\n\n\t\t\t\"Oh, a very long time ago. But I never stopped looking for the truth.\"\n\n\t\t\t\"And did you find it?\"\n\n\t\t\t\"I don't know,\" the Professor says. \"But here is what I know.\"\n\n\t\t\tThen, she \n*check_achievements eldritch \ntells you that she thinks the game is an ancient, eldritch being that has existed since the dawn of time. \n*if choice_achieved_eldritch \n\n\tAs the Professor speaks, your mind flashes with the image of that treelike shadow, spreading its branches through your ceiling, the walls of your bedroom, the foundations of your house. \n\n\tCould it be? \n\n\tThe Professor \n*else \n\tShe \nbelieves that people have known and have been telling stories about it, or versions of it, for millennia. \n*choice \n\t#\"How is that even possible?\"\n\t\t\"I don't know, ${name},\" the Professor says. \"But it is.\" \n\n\t\tShe \n\t#\"I find that hard to believe.\"\n\t\t\"I did, too,\" the Professor says. \"But there's evidence. So much of it, in fact.\" \n\n\t\tShe \n\t#\"Well, yeah. That tracks.\"\n\t\tThe Professor laughs. \"I knew you were the unflappable kind.\"\n\t\t*if composure \u003c stat_mid_pass\n\n\t\t\t\"Not to start with,\" you say. \"But I guess I've grown.\"\n\n\t\tThe Professor then \nproduces a dossier full of documents, manuscripts, photographs, and newspaper clippings that go back hundreds of years. \"This game gave rise to sects, to arts movements, to armed conflicts. It has been around forever, feeding on the people who said yes.\" \n\nFinally, she stops speaking. She takes in another deep breath and sits back in her chair. \"I know it's a lot to take in.\" She looks exhausted. \n\n*check_achievements alternate nuclear conspiracy \n*if (choice_achieved_alternate) or ((choice_achieved_nuclear) or (choice_achieved_conspiracy))\n\tThis is not the first time someone has shared with you their theories about the game. What are you supposed to do with this information? \n\n\tYou ask just that. \n*else \n\t\"What am I supposed to do with this information?\" you ask her. \n\nShe closes her desk drawer again and locks it. She slips the key in the pocket of her jacket. \"I don't know, ${name},\" she says. \"I never figured out what I was supposed to do with it either, no matter what I tried, retried, tried again. This is why I'm telling you. Passing on the torch.\"\n\n\"And the responsibility?\" you ask. \n\nThe Professor ponders this for a moment. \"Yes,\" she says after a while. \"That, too.\"\n\nA few days later, the Professor fails to turn up for class. You look for her in her office, call her phone, even pay her a visit at home. There's never any answer. \n\nNo one ever hears from her again. \n*page_break \n*check_achievements eldritch\n*if not (choice_achieved_eldritch)\n\t*achieve eldritch \n*return \n*label child \ndoesn't understand your obsession with the game. He wants to move on. Have a family of his own. \n\nAnd maybe you do, too. A child, imagine that! But what if they come upon the game, like you did? What if they want to play? What if they say yes?\n\nSo eventually \n*return \n*label city_alone\nSo you move to the city on your own. You rent a small studio and try to settle into college life. You find it hard to connect with the people in your classes; as if there's a moat around you, and anyone who gets too close runs the risk of falling in and being torn apart by the shadowy beasts that lurk there. \n*label city_alone2\n*if tommy_ghost \n\n\tOnly Tommy keeps you company. He never leaves your side; not when you sit in class, not when you're @{hobby painting|gaming|reading}, not when you go to bed at night and stare at the echo of a tree spreading its branches through your ceiling. \n\t*if tommy_romance\n\t\t\n\t\tSometimes you wake up in the morning with a strange taste on your lips. \"What is that?\" you ask Tommy, and he smiles mischievously. The taste of a ghost's kiss. \n\t\t*page_break \n*return \n*label follow_intro \n${partner} follows you to the city. $!{pe} doesn't have a plan beyond living with you, so you rent a tiny studio and tread water while you figure out life in the big city. You get settled quickly, and you find that you fit right in. Your studies are engaging and interesting; the people you meet challenge and inspire you.\n*return \n*label noclip \nMaybe this is it, then. Maybe you've noclipped to one of the alternate realities Ms. Harper @{harper_alternate was talking about, |told you about—in another life—}like a video game character that passes through the solid walls of ${eir} environment by sheer stubbornness, or thanks to a flaw in the design of ${eir} psyche.\n*return \n*label tommy_bit \nEven Tommy's ghost has settled into your life unobtrusively, tiptoeing silently around you when you are at work, standing next to your bed when you sleep. ${partner} never acknowledges him, but for years you've suspected ${pe} sees him, too. It's little things: a glance here and there, an ill-timed pause when ${pe} speaks, a nod in Tommy's direction. But, whenever you ask if anything's wrong, ${pe} denies it. Perhaps ${pe} thinks ${pe}'s the only one who's haunted. \n*return \n*label romance_loose\nYou still think of @{romance_person Maria|Joshy|Tommy|${Cat}|BUG} sometimes. Wonder what might have been, if you'd made different choices. \n*return \n*label Gabrielle\nShe still likes to rewatch her old [i]Xena: Warrior Princess[/i] tapes now and then, and sometimes you join her. She stares at the screen, mesmerized, repeating snatches of dialogue and laughing at jokes she's laughed at a hundred times before. Your head on her lap, you watch her. \n\n\"Do you still have a crush on Gabrielle?\" you ask her every time, and every time she smiles and answers: \"Yes, love her.\" She leans over and places a kiss on the top of your head. \"But I love you more.\"\n*return \n", "startup": "*title Restore, Reflect, Retry\n*author Natalia Theodoridou\n*ifid 44f8259f-35fe-498c-abb6-1bf77405173b\n*scene_list\n  startup\n  one\n  two\n  three\n  four\n  five\n  six\n\n*achievement ending hidden 10 Sense of an Ending\n  hidden\n  Complete the game once. \n*achievement painter hidden 10 I Was Once a Painter\n  hidden\n  Draw a portrait of yourself as a haunted house. \n*achievement second_ending visible 10 Ouroboros \n  The ending is the beginning. \n  Play again, and again, and again. \n*achievement escape visible 10 Escape the Town\n  Escape your hometown.\n*achievement love visible 10 Find Love\n  Use love as a substitute for self-fulfillment. \n*achievement retrieve visible 10 Friends Labor Lost\n  Reunite with a lost friend. \n*achievement ghost visible 10 Ghost Buster\n  Catch a ghost.  \n*achievement bodies hidden 10 Waste Land\n  hidden\n  Leave behind you a valley strewn with bodies. \n*achievement circle hidden 10 Undisturbed Circles\n  hidden \n  Make a perfect circle in the sand. \n*achievement comments hidden 10 Introspection \n  hidden \n  Get acquainted with the game's inner workings. \n*achievement lights hidden 10 Lights Out \n  hidden \n  See what's hidden in the dark. \n*achievement alternate hidden 10 Multiverse \n  hidden\n  Explore alternate realities. \n*achievement conspiracy hidden 10 Evolutions\n  hidden \n  Discover a new species of predator. \n*achievement nuclear hidden 10 Mad Science \n  hidden \n  Listen to the mad scientist. \n*achievement eldritch hidden 10 Eldritch \n  hidden \n  Witness the rise of a being older than you can imagine. \n*achievement comeout hidden 10 Trust\n  hidden \n  Gain a friend's trust. \n*achievement mirror hidden 50 Mirror Mirror\n  hidden \n  Reach beyond the screen. \n\n*create implicit_control_flow true \n\n*comment personality & skills stats \n*create chaotic 50 \n*comment chaotic/sloppy, opposed by diligent/neat\n*create self_centered 50 \n*comment opposed by self-effacing\n*create brave 50 \n*comment also hasty and trusting, opposed by cowardly (cautious, suspicious)\n*create insight 30\n*comment includes research skills, observation, resourcefulness \n*create athletics 30\n*comment includes strength and speed \n*create composure 30\n*comment refers to maturity or the appearance of. Adults trust you, and you can generally keep your cool. \n\n*comment terms & pronouns for player:\n*create e \"\"\n*create eir \"\"\n*create em \"\"\n*create eirs \"\"\n*create emself \"\"\n*create plural false\n*create name \"\"\n\n*create hobby 1 \n*comment 1 = drawing (insight boost); 2 = gaming (athletics boost); 3 = reading (composure boost)\n*create imagination 0\n*create Joshy 50 \n*create Catrina 50\n*create Cat \"Catrina\"\n*create ce \"she\"\n*create cem \"her\"\n*create ceir \"her\" \n*create cemself \"herself\"\n*create Maria 50\n*create Tommy 50 \n*create Harper 30\n*create romantic_involvement false \n*create joshy_romance false \n*create catrina_romance false \n*create maria_romance false \n*create tommy_romance false \n*create romance_person 5\n*comment 1 = Maria; 2 = Joshy; 3 = Tommy; 4 = Catrina, 5 = starting value\n\n*comment The following are used to adjust stats by set amount, reconfigured as necessary at the beginning of each chapter.\n*create small_change 10\n*create mid_change 20\n*create hi_change 40\n\n*comment Stat test thresholds, to be reconfigured as necessary. \n*create stat_lo_edge 10\n*create stat_lo_pass 30\n*create stat_mid_pass 50\n*create stat_hi_pass 60\n*create stat_hi_edge 70\n\n*create ambition 1\n*comment 1 = starting value; 2 = need money to support studies. Getting a university degree, succeeding in your studies, landing a better job. \n*create escapism 1 \n*comment 1 = starting value; 2 = need money to escape town. Leaving town, whether it is to study or for any other reason. \n*create romance 1 \n*comment 1 = starting value; 2 = need job to support family. Have a family / find love \n\n*create job 30 \n*comment Your performance at your part-time convenience store job. \n*create studies 30 \n*comment true\n*create grownup false \n*create tommy_died false \n\n*comment chapter three stats\n*create level_3_stats false \n*create maria_romance_postponed false \n*create joshy_romance_postponed false \n*create catrina_romance_postponed false \n*create ate_fruit false \n*create saw_eat_fruit false \n*create ate_ghost false \n*create fought_joshy false \n*create tommy_ghost false \n*create tommy_lost false \n*create catrina_lost false \n*create joshy_lost false \n*create maria_lost false \n*create lost_friend 5\n*comment 1 = maria; 2 = joshy; 3 = tommy; 4= catrina; 5 = no one, starting value \n*create mirrors false \n\n*comment chapter four stats\n*create level_4_stats false \n*create waste false \n*create promise_Harper false \n*create ate false \n*create hack false \n*create bury false \n*create studied false \n*create sea false \n*create smash false \n*create friend \"\"\n*create fe \"\"\n*create fem \"\"\n*create feir \"\"\n*create sanity false \n*create kept_message false \n*create harper_alternate false \n\n*comment chapter five stats\n*create level_5_stats false \n*create student_guide false \n*create student_haunt false \n*create joshy_ptsd false \n*create uni_maria false \n*create left_maria false \n*create follow_maria false \n*create uni false \n*create follow_tommy false \n*create left_tommy false \n*create beg_tommy false \n*create uni_catrina false \n*create left_catrina false \n*create catrina_city false \n*create catrina_stayed false \n*create tommy_stayed false \n*create stayed_for_joshy false \n*create city false \n*create left false \n*create stayed false \n*create joshy_uni false\n*create tommy_followed false  \n*create joshy_city false \n*create maria_city false \n*create tommy_city false \n*create spared_students false \n*create trapped false \n*create logged false \n*create win false \n*create saved_friend false \n*create sand false \n*create war false \n*create funfair false \n*create maze false \n*create pay_mother false \n*create tommy_uni_same false \n*create catrina_left false \n*create quit false \n*create bargained false \n\n*comment chapter six stats\n*create partner \"\"\n*create pe \"\"\n*create peir \"\"\n*create pem \"\"\n*create level_6_stats false \n*create key \"\"\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  This is a haunted game about a haunted game. You've played this game before. You may not remember, but the game does. \n\n  Open the door. Enter the maze. Ignore the ghosts.\n\n  [i]Restore, Reflect, Retry[/i] is an interactive horror novel by Natalia Theodoridou. It's entirely text-based, with 90,000 words and hundreds of choices, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n  [b]Nebula Award Finalist[/b] for Best Game Writing in the 60th Annual Nebula Awards!\n\n  None of you remembers who first found the game: the black rectangular box with the small screen on which instructions appear. Of course it piqued your interest: this is the 1990s, after all, and there isn’t much for teenagers to do in your small town. Your friends were intrigued, and so were you. So you started to play. And play. And play.\n\n  What does it matter if no one remembers exactly how you discovered the game, or if the story changes ever so slightly each time you tell it? Or if you change ever so slightly too, every time you emerge into the real world once more?\n\n  All that matters is that you keep playing.  \n\n  • Nebula Award Finalist for Best Game Writing in the 60th Annual Nebula Awards\n  • Play as male, female, or nonbinary; gay, straight, or bi.\n  • Travel through the world as a visionary artist, a strategic gamer, or a thoughtful book lover.\n  • Befriend a ghost, become a ghost, or consume a ghost.\n  • Save your friends from the game within a game—if you can.\n  • Explore pixelated alternate realities to solve the mystery of the game’s origin, and contemplate the deeper truths of this reality.\n  • Befriend the being behind the screen—or try to destroy the game that you are playing, and hope that it doesn’t fight back.\n\n  Come in, Player. I'm waiting. Do you dare haunt me?\n\n  *if choice_is_advertising_supported\n    [i]${choice_title}[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\t\t\n    *purchase_discount adfree 2026-06-08 $4.99 $2.99 purchased\n    *page_break_advertisement\n    *goto purchased\n  *else\n    [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n    *purchase_discount adfree 2026-06-08 $4.99 $2.99 purchased\n    *page_break Play Now for Free\n\n*label purchased\n*finish\n", "three": "*temp Joshy_postpone \"You don't want this to be driven by the stress and trauma of today. And if something does happen between Joshy and you, it shouldn't always be a reminder of the day you @{Tommy_dead lost your friend|went to war}.\"\n*temp shivering_ghosts \"The ghosts turn around and run away. Their outlines are undulating now, as if they're shivering. You can't see their faces clearly, but you can read their expression in glimpses and winks: it's terror. They're running from you because they're scared. Whatever dreadful state they exist in, they think that whatever happens when you catch them will be worse.\"\n*text_image chap_3.png center Level 3: A Chase of Ghosts\n\n*check_achievements ending second_ending \n*if not (choice_achieved_ending)\n\tOn your walk home, you are distracted and @{(brave > stat_mid_pass) skittish—so distracted, in fact, that you neglect to even beat yourself up about it|even more skittish than usual}. Everyone you come across seems like they're following you. Every sound makes you jump, sends your skin crawling. \n\n\tSo you don't spot the man under the bridge until you practically trip over him. You've never seen him before. It's dark, but you don't need to see much to know he's been sleeping out there for a while. \n\n\tYou apologize for your clumsiness. \"Did I hurt you?\" you ask. \n\n\tThe man shakes his head. He wraps his blanket a little tighter around himself and makes a circular motion with his hand, as if to encourage you to leave him alone. \n\n\tPerhaps, on a different night, you would have moved on; you might even have ignored him altogether. Or maybe, on a different night, you would have run back to the convenience store and returned with a bag full of bread and milk and soap. But not tonight. \n\n\tTonight, you ask if it's all right to sit with him a while. \n\n\tHe nods, so you lower yourself to the ground: near enough for it to feel companionable, far enough to give both of you your space. The ground is dirty and cold. \"So, how are you doing?\" you ask the man. \"What's going on for you?\"\n\n\tThe man laughs a little, looking away. \"Don't ask things you don't want to know the answers to, kid,\" he says. \n\n\t\"How do you know I don't?\"\n\n\t\"Trust me,\" he says. \"You don't.\"\n\n\t\"I'm sorry,\" you say. \n\n\tThe man turns to face you now. \"What for?\"\n\n\t\"Must be tough,\" you say. \"Not having anywhere to go.\"\n\n\t\"Oh I have somewhere to go,\" he replies. \n\n\t\"Then why don't you?\"\n\n\tHe looks away again. \"I can't be in that house anymore,\" he whispers. \"I'd never sleep again.\"\n\n\tYou nod as if you understand. Maybe you do. \n\n\tThe man leans against the wall, and the two of you sit in silence for a while. \n\n\tAfter the man has drifted into sleep, you get up and go. \n*else\n\t*if not (choice_achieved_second_ending)\n\t\tOn your walk home, you're so distracted you almost trip over the man under the bridge. You've seen him before, though you can't quite remember when or where. It's clear he's been sleeping out there for a while. \n\n\t\tWithout thinking about it, you run back to the store. Your supervisor gives you a sideways look but doesn't comment. You take a basket and pick a few things from the shelves: milk, bread, soap, some toothpaste. You hand everything to the girl behind the counter, who rings it all up sleepily and drops it into a plastic bag. \n\t\t*page_break \n\t\tThe man takes the bag from you. He holds your gaze for a few moments and nods his thanks. \n\n\t\t\"Have you been sleeping?\" he asks you, and it almost feels like he's picking up a conversation you've left unfinished before. \n\n\t\t@{sleepdeprived \"Not really,\" you say.|\"Yeah,\" you say. \"More or less.\"}\n\n\t\t\"Yeah,\" the man replies. Then, he motions you along. \"Take care, kid,\" he says. \"All right? I'll see you around.\"\n\t*else \n\t\tOn your walk home, you pass under the bridge almost prepared to trip over the man who's been sleeping there for a while. \n\n\t\tBut the passage under the bridge is empty. The man's blanket is there, next to a plastic bag that you recognize from the convenience store, an empty carton of milk, a sliver of soap. \n\n\t\tBriefly, you wonder where the man has gone, whether he's back in that house that's been keeping him up at night. And, if so, what it was that made him go back. \n\n\t\tThen, you carry on walking home. \n*page_break \nThe house is quiet and dark. You haven't seen your parents in days; if you didn't know better, you might think you were the only living creature in this house, and everyone else is little more than a specter: souls that haunt these rooms aimlessly, that make the walls sigh and stretch their rotting fingers through the cracks in your sleep. \n\nIn your own room, you are restless. But you sit cross-legged on your bed and @{(chaotic > stat_mid_pass) try to collect yourself, gather your thoughts|promptly collect yourself. You got this. Chaos won't do you any good now}.  \n*choice \n\t*selectable_if (ch2_study) #I need to study for my test. \n\t\t*set studies %+mid_change\n\t\tI have to do well on this test. Absolutely have to. \n\n\t\tGetting to college is the only way to \n\t\t*if escapism = 2\n\t\t\tmake it out of this town. \n\t\t*elseif ambition = 2 \n\t\t\tfulfill your dreams. \n\t\t*elseif romance = 2 \n\t\t\thave any hope of supporting a family one day. \n\n\t\tSo you bury yourself in your \n\t\t*if hobby = 1 \n\t\t\tart history books. Your teacher hinted heavily the other day that this upcoming test will challenge you to make connections between artists across history, so you need to be able to spot the lineages between them, the echoes in their styles and subject matter. The repeating patterns that refer, directly or obliquely, to what came before. Because that's how art works, isn't it? Every artist is either repeating, rejecting, or transforming everything that came before. In a sense, every piece of art always already contains the whole of art. A strange and marvelous cannibalistic self-haunting. \n\t\t*elseif hobby = 2 \n\t\t\tbooks about coding in games, which is what this upcoming test is about. You read somewhere about the repurposing of the same assets in a game to serve multiple functions. For example, the same shape can function as a shrub and, inverted and placed elsewhere, a cloud. It is a curious doubling, an echo, as if the game is haunting itself. \n\t\t*else \n\t\t\tliterary theory textbooks. You read about intertextuality, the idea that every text is porous: not a solid, complete work, but a thing perforated, in communion with a host of other texts that are present in it either explicitly, through allusion or paraphrase or quotation or parody and pastiche, or implicitly, in what the reader brings to the text. Each text rings with echoes of others, resonates with the voices of those that came before. \n\n\t\t\tIn a sense, all text is haunted. \n\n\t\tMaybe you shouldn't say that on your test, or maybe not in these exact words. But, you know. Something along those lines. \n\t#I need to @{hobby paint|play something|read something}. \n\t\t*if ch2_study \n\t\t\tYou thought you would study after you came home, but you no longer feel like it. \n\t\t*set imagination +1 \n\t\tThis might cost you when you take that test tomorrow, but you @{(composure > stat_mid_pass) know when driving yourself hard might harm you more than it will benefit you|just can't push yourself any more right now}. It is what it is. \n\n\t\tBesides, \n\t\t*if hobby = 1\n\t\t\tcreating has always been your way of @{(chaotic \u003c stat_mid_pass) silencing the noise in your head|sorting through the chaos of your own thoughts, to whatever extent is tolerable}. \n\n\t\t\tSo you take out your sepia paper, intending to go back to working on your self-portrait from the other night. \n\n\t\t\tExcept \n\t\t\t*if blank \n\t\t\t\tthe way that blank face stares back at you sends a chill down your spine. You rub your arms, trying to reassure your skin of its own materiality. As if telling yourself: you're here. You're a person. You exist. \n\t\t\t*elseif bigeyes \n\t\t\t\tthose big eyes stare back at you, boring into your soul. For a moment, you wonder: What do they see? \n\t\t\t*elseif not_my_face\n\t\t\t\tthat strange face stares back at you. You still don't recognize it. Who @{plural are|is} ${e}? And, if ${e}@{plural 're|'s} not you, who @{plural are|is} ${e}?\n\t\t\t*else \n\t\t\t\t*bug This text should be invisible. By the sheer act of seeing it, you are performing a reality-warping feat. I am impressed with you, Player. \n\t\t*elseif hobby = 2 \n\t\t\tgaming has always been your way of @{(brave \u003c stat_mid_pass) escaping whatever it is you're facing in your life at any given point|facing up to the challenges life throws at you—and it's thrown you more than your fair share already. People think that gaming is an escape, a flight from your troubles, but for you it's quite the opposite: it's a rehearsal, a preparation. A training for whatever hard thing you'll be called upon to face up to next}.\n\t\t\t\n\t\t\tSo you take out your handheld and boot up your game. \n\t\t\t*if knight \n\t\t\t\tThe opening tune of \n\t\t\t\t*if choice_nightmode \n\t\t\t\t\t[i]Night of the Knight[/i]\n\t\t\t\t*else \n\t\t\t\t\t[i]Afternoon of the Knight[/i] \n\t\t\t\tgreets you, familiar and almost comforting. \n\n\t\t\t\tThis time, you are on a quest to help a were-writer. The writer is really a bear who, on a night several full moons ago, was bitten by a rabid bard. Now, once a month on the night of the full moon, the bear turns into a human with an irresistible urge to write. Your mission is to find the bard, kill him, and bring his heart back so the bear can consume it and be free from this curse. \n\t\t\t\t*comment The unofficial name of this side quest in these parts is \"Bearly a Writer.\" It was found in one of the people who've passed through here, someone who came carrying several KBs worth of abandoned ideas; this one was meant to be a collaboration between this person and another artist that, for better or for worse, never materialized. Neither of their names survive in this log. \n\t\t\t*elseif cog_haunted \n\t\t\t\t\n\t\t\t\tOne by one, the characters greet you, familiar and comforting. You know their pixelated faces by heart; you could recognize their electronic voices in a crowd. Every time you boot up the game again, it's like you never left. \n\n\t\t\t\tTonight, the players have to enter a haunted mansion. The house is unnerving; every few seconds, the walls scream. \n\n\t\t\t\tIn a normal game, the objective of the characters might be to solve the mystery of the haunting (Who died? How did they die? How can you help their spirit rest and solve this haunting?), or save someone who is trapped, or even just survive the horrors of the house. But not in [i]Choice of the Haunted[/i]. This level is basically an escape room full of puzzles. Here, what the characters have to do is find every last mirror in the house and smash it to pieces. When the last mirror is found and destroyed, the screaming will stop. \n\n\t\t\t\tOr so the theory goes. You've never actually managed to pass this level. \n\t\t\t*elseif kafka \n\t\t\t\t\n\t\t\t\tThe music of the game greets you, familiar and almost comforting. \n\n\t\t\t\tYou stack colorful block over colorful block, soothed by the certainty that some things are just made to fit, to click together. You build structure after structure, not caring about their purpose, their function, their raison d'être. These are simply shapes. No one ever lived there, and so no one died there. No one ever will. \n\n\t\t\t\tWhen you win and the buildings finally collapse, you give a little cheer. \n\t\t\t*elseif dig \n\t\t\t\tWithout delay, you start digging. You don't even remember what level you're at. You simply dig your way through strange tunnels, the repetitive thunk-thunk of your efforts familiar and comforting. You can almost feel the strain in your muscles, your actual muscles, in your real body. \n\t\t\t*else \n\t\t\t\t*bug Again, look at you, performing impossible feats before breakfast. \n\t\t*else \n\t\t\tbooks have always been what you turn to when things get tough. @{(brave \u003c stat_mid_pass) And let's face it, you were never one to sit with discomfort.|Some people read for escapism, but not you. Your reading is your way of sitting with discomfort, facing things head-on.}\n\t\t\t\n\t\t\tSo you take out your book and let it fall open where you left off without the help of a bookmark, as if the book knows where you were, where you are, where you need to be. In the book, \n\t\t\t*if rebecca\n\t\t\t\t@{(name = \"Rebecca\") your namesake is driving the unnamed narrator insane|the unnamed narrator is slowly descending into madness}. You don't really read to see what happens next, because you already know how this kind of story ends: violence was done, and done again. No ending is really an ending, and nobody gets what they want. There are no resolutions.  \n\t\t\t*elseif dorian \n\t\t\t\tDorian continues his life of debauchery. His portrait deteriorates, a visible record of his psychic decline. You don't really read for the plot, because you already know how this sort of story ends: no deed goes unpunished, and no one ever escapes the consequences of ${eir} actions. In the end, everything catches up to you. All you can really hope for is that the body you leave behind will be recognizable as yourself. \n\t\t\t*elseif zola \n\t\t\t\tthe artist continues to slowly lose his mind, though it is considerably harder to get rid of his vanity. \n\t\t\t*else \n\t\t\t\t*bug There are way more books than this, of course. But such is the limited nature of games like me and you. \n\t#I need to process what happened today. \n\t\t*if not (tommy_dead)\n\t\t\tYou all made it out. You did well. What is there to dwell on? \n\n\t\t\t*if checkpoint \n\t\t\t\tSomething. \n\n\t\t\t\tSomething happened. Your memory of the events seems wobbly, inflected, like an image doubly exposed: there's reality, and then there's another one underneath, an echo of what could have been but never was.\n\n\t\t\t\tExcept, can you say for certain which image is real? It's like you have double vision. \n\n\t\t\t\t*if hobby = 1 \n\t\t\t\t\tIt reminds you of some art you saw in the Museum of Modern Art during your first and only visit to the capital, a series of photographs superimposed on others to create a new reality: a city laid over a cemetery, a factory reigning over what used to be a forest, a bent old man's outline encompassing the body of a child. Your teacher had said that the artist was creating a place of ultrareality, something more real than ordinary reality, the articulation of two disparate things producing meaning via juxtaposition. \n\n\t\t\t\t\tBut you thought otherwise. \n\n\t\t\t\t\tIn your eyes, this wasn't a series of ironic pairings meant to expose and comment. What you saw was a city haunted by the dead at its foundations, a factory plagued by the forest-that-was, an old man haunted and hunted by the boy he used to be. To you, this wasn't condemnation; it was tragedy. \n\t\t\t\t*elseif hobby = 2 \n\t\t\t\t\tIt reminds you of a game you played once, a text-based interactive story about a world where people stopped sleeping. The author of the game, drunk on their newfound tools, played around with text effects in order to replicate the experience of not having slept for days, weeks, months. Text flickered, changed, disappeared. You saw things out of the corner of your eye, and one word morphed into another so quickly you could never be sure what was real and what was a figment of your overactive imagination. In the end, there was, of course, no difference.\n\t\t\t\t\t*comment Player, you see what I have to deal with here? This is a reference to \"Sleepless,\" an interactive story made with Twine, that, for you, won't be published for another two decades or so. Unless I, too, have finally lost track of time. Perhaps another Google search is in order, or a trip to that rare library. I see two suns in the sky, and twin cities that no longer exist. \n\t\t\t\t*else \n\t\t\t\t\tIt reminds you of that passage from Euripides's [i]The Bacchae[/i] you read at school, where King Pentheus (whose name, from the Greek [i]πένθος[/i], you'll never forget alludes to mourning), seduced by the extravagant, strange god that's been taking over the King's city, gives in to Dionysus's divine drunkenness. \"There are two suns in the sky,\" Pentheus says, inspired out of his mind and dressed in women's clothing, \"and the seven-gated city of Thebes is two Thebes.\" \n\n\t\t\t\t\tAnd so it is with your memory of this day. \n\n\t\t\t\tStill, you go over what you can remember. You were \n\t\t\t\t*if second_shooter_ability = 1  \n\t\t\t\t\t*set insight %+small_change \n\t\t\t\t\ta medic. \n\t\t\t\t\t*if first_shooter_ability != 1\n\t\t\t\t\t\tThen why do you have memories of @{first_shooter_ability |being a soldier|being in Tommy's position}, too? \n\t\t\t\t*elseif second_shooter_ability = 2 \n\t\t\t\t\t*set athletics %+small_change \n\t\t\t\t\ta soldier, responsible for keeping Tommy safe. \n\t\t\t\t\t*if first_shooter_ability != 2\n\t\t\t\t\t\tThen why do you have memories of @{first_shooter_ability being a medic||being in Tommy's position}, too?\n\t\t\t\t*else \n\t\t\t\t\t*set composure %+small_change \n\t\t\t\t\tsomeone valuable. Your teammates needed to keep you safe. \n\t\t\t\t\t*if first_shooter_ability != 3\n\t\t\t\t\t\tThen why do you have memories of being a @{first_shooter_ability medic|soldier}, too? \n\n\t\t\t\t*if first_shooter_ability != second_shooter_ability\n\t\t\t\t\tWhich version is real? \n\t\t\t\t*else \n\t\t\t\t\tYou did what you had to do. Again and again. Whatever it took, you did it. \n\t\t\t*else \n\t\t\t\tYou used your skills in the best way you knew how, and you pulled off what this level required you to do. It's the definition of playing a game to win, isn't it? For better or for worse. \n\t\t\t\t*if first_shooter_ability = 1 \n\t\t\t\t\t*set insight %+small_change\n\t\t\t\t*elseif first_shooter_ability = 2 \n\t\t\t\t\t*set athletics %+small_change \n\t\t\t\t*else \n\t\t\t\t\t*set composure %+small_change \n\t\t*else \n\t\t\tBut how does one process death? Especially the death of a friend, someone your age, taken so absurdly and unexpectedly? \n\n\t\t\tThe fragment of the news about the shooting flashes in your mind. What a coincidence that was. @{(composure > stat_mid_pass) For someone not as together as you, it could be a mind-shattering thing. But you're okay. Right? You're fine.|What a strange, strange thing. It feels as if your mind might shatter if you look too hard at it.}\n\t\t\t\nA sound breaks your concentration. Something hitting glass. You realize it's coming from your window.\n\nYou make your way over and part the curtains, then push open the window and squint into the night. \n*if (maria > joshy) and ((maria > catrina) and (maria > tommy))\n\t*set best_friend 1 \n\t*label maria_comes \n\n\tIt's Maria. You would recognize her anywhere, even in pitch-darkness. She opens her palm and lets a handful of tiny pieces of gravel fall to the ground. \n\n\t\"Hey,\" you say, in a whisper so your parents don't hear. (Though you doubt they'd care either way.)\n\n\tMaria scuffs the dry ground with the tip of her foot. \"Hey,\" she says. \n\n\t\"Want to come up?\"\n\n\tShe nods. Carefully, she climbs up the old trellis (a remnant from a different time, back when your father gave a shit about what the place looked like, now strangled by a tangle of dry ivy) until she reaches your window. You give her a hand, and with a gentle pull she's in. \n\n\t\"Thanks,\" she says. She sits on the floor, her back resting against your bed. \n\t*if bled = 1 \n\n\t\tYou notice she makes sure to hide the cut on her hand. \n\n\t*if tommy_dead\n\t\t\"I still can't believe he's dead,\" she says. \n\n\t\t\"I know,\" you reply. \n\n\t\tShe turns to look at you, her eyes wet and shiny in the poor light. \"Did we do this, ${name}? Is this our fault? Could we have prevented it?\"\n\t\t*choice \n\t\t\t#\"There's no point asking ourselves that.\"\n\t\t\t\t\"Isn't there?\" Maria asks. \n\n\t\t\t\t\"No. We can't know what we might have been.\" \n\n\t\t\t\tMaria gives you a look. \"That's so cold,\" she says. \n\n\t\t\t\tIs she right? Are you cold? \n\n\t\t\t\tNo, she's just not understanding what you mean. \"All we can do with questions like that is torture ourselves,\" you say. \"Is that what you want to do?\"\n\n\t\t\t\tMaria lowers her eyes. \"Maybe,\" she says. \n\n\t\t\t\t\"Well, then. That's not for Tommy's benefit.\" You pause. \"Nothing is anymore.\"\n\n\t\t\t\tMaria inhales sharply. Perhaps that was a bit too harsh. \n\t\t\t#\"I think it is.\"\n\t\t\t\tMaria looks stunned for a moment. She probably didn't expect you to confirm what she feared the most: your hand in this. Your responsibility. \n\n\t\t\t\tThis is your fault. \n\n\t\t\t\t\"I think it is, yes,\" you say again. \n\n\t\t\t\tFinally, Maria nods slowly. \"Yeah,\" she says. She's close to tears, but she fights them off. You're grateful for it. \n\n\t\t\t\t\"So what do we do now?\" Maria asks. \"How do we go on?\"\n\n\t\t\t\tYou shrug. \"We just do,\" you say. \"What else?\"\n\n\t\t\t\t\"Yeah,\" she says. \"What else.\" She takes in a shuddering breath. \n\t\t\t#\"No. We all agreed to play. Knew the risks.\"\n\t\t\t\t\"Did we, though?\" Maria asks. \n\n\t\t\t\t\"Yes,\" you say. \"We all did. Even Tommy.\"\n\n\t\t\t\tMaria thinks about it. \"Maybe you're right,\" she says after a while. \"It still feels surreal, though.\"\n\n\t\t\t\t\"I know,\" you say. \n\n\t\t\t\tMaria takes in a shuddering breath. \n\t\t*choice \n\t\t\t#Offer her a friendly hug. \n\t\t\t\tYou push yourself closer and open your arms. Maria falls into you, hangs on to you. You wrap her arms around her as she sobs, soaking your shirt. \n\n\t\t\t\tWhen she's done, she pulls back and tries to dry her face. She does a bad job of it, leaving behind streaks of tears and snot. \"God, I'm a mess,\" she says. \"Sorry.\"\n\n\t\t\t\t\"It's okay,\" you say. \"Who isn't?\"\n\n\t\t\t\tShe looks you in the eyes. \"Thank you, ${name},\" she says. \"This really helped.\"\n\t\t\t\t*goto maria_exit \n\t\t\t#Offer her a hug. More, if she wants it. \n\t\t\t\tYou open your arms, inviting her. She pushes herself closer and lets you wrap your arms around her. She sobs quietly for a while and, when she's done, cups your face with her hands. \"${name}…\" she says. \n\n\t\t\t\tThen she leans in for a kiss. \n\t\t\t\t*choice \n\t\t\t\t\t#Kiss her. \n\t\t\t\t\t\t*set maria_romance true\n\t\t\t\t\t\t*set romance_person 1 \n\t\t\t\t\t\tYour lips meet. Maria's mouth tastes gamey, with a hint of copper, as if she just feasted on the bloodied liver of freshly killed prey. It feels beautiful and sad and makes your chest ache sweetly. \n\n\t\t\t\t\t\tIt's Maria who first breaks contact. She leans back and looks at you as if trying to commit your face to memory. As if she knows she's going to lose you, too. \n\n\t\t\t\t\t\t\"An
