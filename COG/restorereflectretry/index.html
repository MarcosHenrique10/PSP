y regrets?\" you ask. \n\n\t\t\t\t\t\tShe shakes her head. \"None,\" she says. She glances at the window. \"But I think I should go.\"\n\n\t\t\t\t\t\t*goto maria_exit2 \n\t\t\t\t\t#I want to, but now is not the time. \n\t\t\t\t\t\t*set maria_romance_postponed true \n\t\t\t\t\t\t*set romance_person 1 \n\t\t\t\t\t\tGently, you place a finger on her lips, trace their outline. \"Maria, don't get me wrong,\" you say. \"I want to. But if we do this, I don't want it to be tied forever to the day our friend died.\"\n\n\t\t\t\t\t\tMaria looks disappointed, but then she nods. \"You're right,\" she says. She takes your hand and squeezes it. \"I understand.\" She glances at the window. \"Perhaps I should go.\"\n\n\t\t\t\t\t\t*goto maria_exit2\n\t\t\t\t\t#No, this isn't right. Our friend is dead. \n\t\t\t\t\t\tYou pull away, startling her a little. She recovers quickly. \n\n\t\t\t\t\t\t\"I'm sorry,\" she says.\n\n\t\t\t\t\t\t\"Tommy…\" you start, but she stops you. \n\n\t\t\t\t\t\t\"No, you're right,\" she says. \"This was a mistake.\" \n\n\t\t\t\t\t\tShe stands up and collects herself, glances at the window. \n\n\t\t\t\t\t\t*goto maria_exit2 \n\t\t\t#Keep my distance. \n\t\t\t\tDo other people's emotions always make you uncomfortable or leave you cold? Do you think it's safer if you never get close to anyone? \n\n\t\t\t\tOr is this specifically about Maria? \n\n\t\t\t\tEither way, she takes the hint. \n\n\t\t\t\t\"I'm sorry,\" she says. \"I shouldn't have come here.\"\n\n\t\t\t\tShe glances at the window. \n\n\t\t\t\t*goto maria_exit2\n\t*else \n\t\t\n\t\tOnce it's clear that Maria is not going to start talking on her own, you prompt her. \"So, what's up?\"\n\n\t\t\"I had a nightmare,\" Maria says. \n\n\t\tWithout meaning to, you glance at the ceiling, at that treelike thing pushing its branches through your sleepless nights. \n\n\t\t\"What did you see?\" you ask. \n\n\t\tMaria takes in a shuddering breath, then lets it all out, a torrent of sentences that only half make sense. In her dream, she says, you were back in the game, making your way through that broken city, except this time you had no weapons in your hands, no machetes or guns or brass knuckles, but carried organs instead, blood-dripping bundles of human flesh, hearts and livers and even the lace-vesseled lobe of a lung. \n\n\t\tAs Maria speaks, you shiver despite yourself. \n\n\t\tShe doesn't notice. \n\n\t\t\"And then we got to that building,\" Maria continues, \"and we got to the third floor, but this time there was no door. And when those people came at us, we didn't fight. What were we supposed to do anyway, you know? How do you defend yourself with a heart or a liver or a lung?\" There are tears streaming down her face now, but she doesn't stop, she keeps going. \"So they attacked us and there was nothing we could do. One of them had a machete. They pushed it through Tommy's chest and it cut him all the way through, as if his body was made of butter. He died right in front of us.\" She looks at you pleadingly. \"There was nothing we could do to save him, and no door to escape through, and nothing to come back to.\" \n\n\t\tMaria breaks down sobbing. She keeps talking, but you can't make out the words. \n\t\t*choice \n\t\t\t#Be a good friend and comfort her.  \n\t\t\t\tYou scoot closer to her on the floor and put an arm around her shoulders. \"Hey, it's okay,\" you say. \"You're okay, we're okay. It's over. We all made it out.\" You almost say [i]it was just a dream[/i], but it feels wrong somehow, so you don't. \n\t\t\t\t\n\t\t\t\tAfter a while, Maria's sobbing quiets down, and she dries her eyes. \"Thanks,\" she says. \"I'm being silly. I don't know what came over me.\" She looks at you. \"This helped.\"\n\t\t\t\t*goto maria_exit \n\t\t\t#Ask if she wants a hug. \n\t\t\t\tMaria nods.\n\n\t\t\t\tYou scoot over and fold her into a hug. She sobs in your arms, soaking your shirt with her tears. \n\n\t\t\t\tAfter a while, she seems to calm down. \"Thanks,\" she says. \"This really helped.\" But you notice she doesn't try to disentangle herself from your embrace. \"${name}…\" she says. Her hand cups your face. You have the feeling she wants to kiss you. \n\t\t\t\t*choice \n\t\t\t\t\t#Kiss her. \n\t\t\t\t\t\tSlowly, your lips meet. Hers are softer than you ever thought possible. She tastes faintly of apricots and something else, slightly darker and slightly dangerous, like the bitter kernels of their pits. Somewhere far away, fireworks go off, and the tips of your fingers tingle pleasantly. \n\n\t\t\t\t\t\tFinally, Maria pulls away, breaking contact. She laughs gently and wipes her eyes on her sleeve. \"Um,\" she says. \"I didn't think I was going to do that.\"\n\n\t\t\t\t\t\t\"Do you regret it?\" you ask. \n\n\t\t\t\t\t\tShe shakes her head. \"Nah. No way.\" She smiles. Her eyes are still wet with tears, but it feels as if something has lifted now, and there is something underneath you that buoys you both. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*set maria_romance true\n\t\t\t\t\t\t*set romance_person 1 \n\t\t\t\t\t\tThen, Maria glances at the window. \"Perhaps I should go,\" she says. \n\n\t\t\t\t\t\t*goto maria_exit2\n\t\t\t\t\t#I want to, but now is not the time.\n\t\t\t\t\t\tYou've just been through so much. If something's going to happen between you, it should not happen under this kind of stress.\n\t\t\t\t\t\t*set maria_romance_postponed true \n\t\t\t\t\t\t*set romance_person 1 \n\n\t\t\t\t\t\tYou try to explain all this. \n\n\t\t\t\t\t\tMaria looks disappointed, but she nods. \"I understand,\" she says. \"You're right. I was being stupid.\"\n\n\t\t\t\t\t\t\"No,\" you say, hugging her again. \"Not stupid at all. I just want to give us a chance,\" you say. \n\n\t\t\t\t\t\tMaria smiles sadly. Then, she glances at the window. \"I should go,\" she says. \n\n\t\t\t\t\t\t*goto maria_exit2\n\t\t\t\t\t#No, she misunderstood my intentions. \n\t\t\t\t\t\tGently, you pull away. \"Maria,\" you start, then trail off. \n\n\t\t\t\t\t\tShe understands. \"Sorry,\" she says. \"It's all right. I just got carried away.\" She wipes her eyes on her sleeve. \"I'm sorry.\"\n\n\t\t\t\t\t\tYou nod. \"Are you okay?\"\n\n\t\t\t\t\t\t\"Sure,\" she says. She glances at the window. \n\t\t\t\t\t\n\t\t\t\t\t\t*goto maria_exit2\n\t\t\t#Keep my distance. This is too much. \n\t\t\t\tDo other people's emotions always make you uncomfortable? Or is it just Maria's, specifically?\n\n\t\t\t\tYou say nothing. You offer Maria the dignity of your silence while she finishes sobbing and kind of collects herself. \n\n\t\t\t\t\"Are you all right?\" you ask then, as she wipes her eyes and nose on her sleeve. \n\n\t\t\t\t\"Sure,\" she says, sniffling. Then she gets up. \"Thanks for letting me hang out here for a bit. This helped.\"\n\t\t\t\t*label maria_exit \n\t\t\t\t\n\t\t\t\t\"That's what friends are for,\" you say. \n\n\t\t\t\tMaria starts moving towards the window, but you stop her. \n\t\t\t\t*label maria_exit2 \n\t\t\t\t\"I think it's okay for you to use the door this time,\" you say. \"We just need to be very quiet.\"\n\n\t\t\t\tCarefully, you lead her to the front door of the house. \"See you tomorrow?\" you ask. You don't mention anything about the game, but you both know the next level is not far away. It never is. \n\n\t\t\t\t\"Yeah,\" she says. \"Tomorrow.\"\n*elseif (joshy > maria) and ((joshy > catrina) and (joshy > tommy))\n\t*set best_friend 2 \n\t*label Joshy_comes \n\n\tIt's Joshy. He's been throwing gravel at your window. Even though he knows you've seen him, he throws another. It hits you in the arm, rolls off, falls to the ground. \n\n\t\"Hey, asshole,\" you say. \n\n\tJoshy grins. \"Can I come up?\" \n\n\t\"Sure,\" you say. \n\n\tYou don't need to say it twice. Joshy grabs the pipes that run alongside your window and before you know it he's hoisting himself through. He dusts himself off. \"Thanks,\" he says. He looks at you. \"Are you okay?\" he asks. \n\t*if bled = 2 \n\n\t\tYou notice the cut on his hand has almost healed. \n\t*if tommy_dead\n\t\t*choice \n\t\t\t#\"Sure.\"\n\t\t\t\t\"Yeah,\" Joshy says. He clearly doesn't believe you. \"Sure you are. So am I. Fucking wonderful.\" He sits on the floor, his back against your bed. \n\n\t\t\t\tYou join him. \n\n\t\t\t\tFor a while, neither of you speaks. Then you hear Joshy take in a shuddering breath. \n\n\t\t\t\t\"Are [i]you[/i] okay?\" you ask. \n\n\t\t\t\t\"No,\" he replies. He looks at you and his eyes are red and filled with tears. \"What have we done, ${name}?\" he asks. \n\t\t\t\t*choice \n\t\t\t\t\t#\"It wasn't our fault.\"\n\t\t\t\t\t\t\"I think it was,\" Joshy says. \"Our choice, and our fault.\"\n\n\t\t\t\t\t\tIs he right? \"Tommy chose as much as the rest of us,\" you say. \n\n\t\t\t\t\t\tJoshy laughs sadly. \"Tommy never made a choice in his life. He always did what the rest of us wanted.\"\n\n\t\t\t\t\t\t\"I don't think that's true,\" you say. \"I think we ought to give him a bit more credit than that.\"\n\n\t\t\t\t\t\tJoshy goes quiet for a moment. \"Maybe you're right,\" he says then. \"Sorry. I guess I'm just still in shock.\"\n\n\t\t\t\t\t\t\"Yeah,\" you say. \"Yeah.\"\n\n\t\t\t\t\t\tMaybe you are, too. But at least he came to you in his shock, in the night. Reached out to his friend instead of sitting in bed, staring at the branches of mold spreading through the ceiling. That's something, isn't it? That's not nothing.\n\n\t\t\t\t\t\tYou spend some time together, talking about nothing of importance. Still, it is the time that matters, not the words. \n\n\t\t\t\t\t\t\"I should go,\" Joshy says then. He \n\t\t\t\t\t\t*goto joshy_leaves  \n\t\t\t\t\t#\"We did what we could.\"\n\t\t\t\t\t\t\"Did we?\" Joshy asks. \"We didn't have to do any of this.\" He pauses. Looks at you. \"We still don't. Or not anymore.\"\n\n\t\t\t\t\t\tIs that true? \n\n\t\t\t\t\t\tYou think of the black rectangle of the game, inert in your backpack. \n\n\t\t\t\t\t\tYou have made a commitment, haven't you?\n\n\t\t\t\t\t\tYou've said yes, haven't you? Can't back out now. \n\n\t\t\t\t\t\tWhat's stopping you? \n\t\t\t\t\t\t*check_achievements ending \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#I want to see how this ends. \n\t\t\t\t\t\t\t\tAnd it's not just curiosity. It's a need, a drive. A compulsion, almost. \n\n\t\t\t\t\t\t\t\t\"You can quit if you want,\" you tell Joshy. \"But I don't think you do.\"\n\n\t\t\t\t\t\t\t\tJoshy goes quiet for a moment. Then, he looks at you. He doesn't have to say anything. You can see it for yourself: he doesn't want to, either. \n\t\t\t\t\t\t\t#I have to win. Nothing else matters. \n\t\t\t\t\t\t\t\tYou've lost at so much in your life. Your short, short life—barely eighteen years, and yet so much loss already. Is it any wonder, now that you're given the chance to win at this one thing, this rare and curious thing that the universe has presented you with, you and your loser friends in this nothing town, that you actually want to win? For once. For a change. \n\n\t\t\t\t\t\t\t\t\"I can't quit, Joshy,\" you say. \"And I don't think you want to, either.\" \n\n\t\t\t\t\t\t\t\tJoshy stares at you for a moment. And you can see it, plain as day: you're right. \n\t\t\t\t\t\t\t#The game makes me feel alive.\n\t\t\t\t\t\t\t\tIt's a strange feeling, aliveness. It brings its opposite—your normal state—into sharp relief: that dead feeling, that numbness, that dissociation. As if you're constantly either slightly outside yourself, hovering above your head, or slightly smaller than the outlines of your body, your actual self perpetually a few inches short of reaching the inside of your skin and filling out the entirety of the space inside you. \n\n\t\t\t\t\t\t\t\tBut when you're in the game? That gap is bridged, that too-much-space feeling disappears. As if the creature that is the real you finally @{(hobby = 1) gets to color all the way to your edges|unfurls to fit the garment of your skin}. The helium balloon of you no longer flies above you, barely tethered to the ground; someone pulls it back, cradles it, allows your feet to touch the earth again. \n\n\t\t\t\t\t\t\t\tJoshy stares at you. And you can see in his eyes that you don't actually have to say any of this, because he already understands. He feels it, too. \n\n\t\t\t\t\t\t\t\t\"Right,\" he says. \"Yeah.\"\n\t\t\t\t\t\t\t*if (choice_achieved_ending) \n\t\t\t\t\t\t\t\t#I know there's no way out. \n\t\t\t\t\t\t\t\t\tYou know I'm cheating, don't you? We've been here before, you and I. And we both know there's no such thing as quitting this game. \n\n\t\t\t\t\t\t\t\t\tAt least not in the way you mean. \n\n\t\t\t\t\t\t\t\t\tYour options are limited here. Except you do have one other option, and we both know it. It's the only one I cannot offer you. The one that only you can offer yourself, and if you choose to go that way, we both know that there's nothing I can do to stop you. \n\t\t\t\t\t\t\t\t\t*comment Except of course the one thing I've already done, the seed I have planted in your head, the tendril I have let unfurl inside your body and you have welcomed. Let's face it, let's face each other, let's never lie to each other again. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tJoshy? Is Joshy still here? For a moment, there's only the space between us, you and me, and no one else. \n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tFor a while, Joshy and you sit in silence. At least you are together. At least you have each other. \n\n\t\t\t\t\t\t\"I guess I should go,\" Joshy says then. He \n\t\t\t\t\t\t*goto joshy_leaves  \n\t\t\t\t\t#\"We failed.\"\n\t\t\t\t\t\tJoshy nods. \"We did fail.\" He goes quiet for a moment. \"I think we made a mistake,\" he says then, and at first you're not entirely sure what he means.  \n\n\t\t\t\t\t\t\"In the way we played?\" you ask. \n\n\t\t\t\t\t\tJoshy gives you a look. \"In agreeing to play at all.\"\n\n\t\t\t\t\t\tIs he right? Could you have just not played? Should you have? \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#\"We can't change the past.\"\n\t\t\t\t\t\t\t\tPerhaps that's true. \n\t\t\t\t\t\t\t\t*if checkpoint\n\t\t\t\t\t\t\t\t\tPerhaps it isn't. \n\n\t\t\t\t\t\t\t\tBut Joshy nods again. \"You're right,\" he says. \"What's done is done. That's what's so fucked up about this.\" He pauses, shows you his empty palms. \"How do we go on after this?\"\n\n\t\t\t\t\t\t\t\t*if composure > stat_mid_pass\n\t\t\t\t\t\t\t\t\t\"We just do,\" you say. You're almost adults at this point, and that's what adults do, isn't it? No matter whether you're ready or not, no matter whether you feel you're equipped to deal with the things life throws at you, you simply carry on.  \n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\"I don't know,\" you say. \"I really don't.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tSometimes you wish \n\t\t\t\t\t\t\t\t\t*if hobby = 1 \n\t\t\t\t\t\t\t\t\t\tsomeone had told you exactly what you need to do to get to where you want to be, achieve what you're trying to achieve. You wish life were a coloring book, its designs clearly compartmentalized and numbered, with a key of colors underneath and a set of crayons. Here, this is what you need to do: the sky is blue, the sun is yellow. Blood is red. Pick up your crayons and fill the pieces in. \n\t\t\t\t\t\t\t\t\t*elseif hobby = 2 \n\t\t\t\t\t\t\t\t\t\tlife came with a manual, with clear mechanics and rules. That someone would tell you, \"here, this is what you need to do to win. If you just follow these rules, this is what you will be tested on. And if you're good enough, you'll be all right.\"\n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\tlife were like a book. That you knew what genre it is, whether it's structured as a tragedy or a comedy or something else entirely. That way, you'd have a hint of what kind of arc you're on. It might not even be the one you want, might not even have a happy ending, but at least you'd know what to expect, how to be, how to go on. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tFor a while, you sit in silence. You may not be able to change the past, but at least you have each other. \n\n\t\t\t\t\t\t\t\t\"I should go,\" Joshy says then. He \n\t\t\t\t\t\t\t\t*goto joshy_leaves \n\t\t\t\t\t\t\t#\"Maybe you're right.\"\n\t\t\t\t\t\t\t\tIt's clearly not what Joshy wanted to hear. He laughs, but you notice his eyes are wet. \"You usually argue with me,\" he says. \"Now you decide to agree?\" \n\n\t\t\t\t\t\t\t\t\"Sorry,\" you say. And you are. You really, truly are. Aren't you?\n\n\t\t\t\t\t\t\t\tJoshy sniffles. You've never seen him cry before. \n\t\t\t\t\t\t\t\t*goto cry_Joshy_options\n\t\t\t\t\t\t\t#I break down. \n\t\t\t\t\t\t\t\tIt comes seemingly out of nowhere, just a flood of emotion, wave after wave overtaking you. Before you know it, your head is underwater, and you can't breathe. There is salt in your mouth. \n\n\t\t\t\t\t\t\t\tJoshy looks alarmed. \"${name}?\" he says. \"I'm sorry. What can I do?\" He inches closer, spreads his arms. He's offering you a hug. \n\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t#Accept it. \n\t\t\t\t\t\t\t\t\t\tYou let him hold you for a while, your tears soaking his T-shirt. \"It's okay,\" he says, again and again. \"It's okay.\" But it isn't, is it? Nothing is okay. \n\n\t\t\t\t\t\t\t\t\t\tVery gently, Joshy puts his hand under your chin and pushes your face up so he can look into your eyes. A moment of hesitation, and then he goes for your lips. \n\t\t\t\t\t\t\t\t\t\t*label Joshy_romance_options \n\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t#\"What the fuck?\"\n\t\t\t\t\t\t\t\t\t\t\t\t*label Joshy_wtf \n\t\t\t\t\t\t\t\t\t\t\t\tYou didn't see this coming. Joshy has completely the wrong idea. \n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd now he knows it. \n\n\t\t\t\t\t\t\t\t\t\t\t\tHe jerks back as if burned. \"Shit,\" he says. \"I'm so so sorry. I don't know where this came from.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"It's okay. We've been through a lot.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou understand. Pressure and trauma can make people think they want or need things they don't actually need or want. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"I'm really sorry,\" Joshy says again. He hangs his head. \"I feel so stupid.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"It's okay,\" you repeat. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Maybe I should go.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"All right,\" you say. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tJoshy \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label Joshy_leaves\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tglances at the window. \"You think I can use the front door this time?\" He rubs his upper arms, and you notice a slight trembling in his hands. \"I'm not sure I'm up for more climbing today.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Sure, I think that'll be all right.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou walk out of your room and to the front door of the house as quietly as you can. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAround you, everything is silent. Too silent, perhaps: as if the house itself is holding its breath. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"See you tomorrow?\" Joshy says, stepping out. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tNeither of you mentions anything about the game, though you both know there's more to come, soon. There always is. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Tomorrow.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto alone \n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"It's not that I don't want to. But not now.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set joshy_romance_postponed true \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set romance_person 2 \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t${Joshy_postpone} \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tJoshy nods. \"You're right,\" he says. He caresses the side of your face, wiping away your tears. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"I should go,\" he says then. He \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto joshy_leaves\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Get out.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set fought_Joshy true \n\t\t\t\t\t\t\t\t\t\t\t\t\t\tJoshy's cheeks are flushed, his eyes wide. He stands up. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour chest feels empty. As if something has passed through you and made space for something else that will follow. What will it be? What emotion will fill you next? \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"I'm sorry,\" Joshy mumbles as he heads for the window. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Take the door,\" you say. He doesn't object. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label joshy_tomorrow \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWithout speaking, you both head to the front door of your house. Joshy avoids your eyes. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Tomorrow?\" is all he says before stepping out. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Tomorrow.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBecause you both know this isn't over. No matter what happened today, you still have a game to play.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto alone \n\t\t\t\t\t\t\t\t\t\t\t#\"Um, I think you got the wrong idea.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*label Joshy_wrong_idea\n\t\t\t\t\t\t\t\t\t\t\t\t\"Shit, I'm so sorry,\" Joshy says, pulling away. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"I just don't see you that way,\" you continue. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"No, no, you don't have to say anything else,\" Joshy says. \"I understand.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou stay silent. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"It's just the stress of the day,\" Joshy says. \"I don't actually see you that way either.\" \n\n\t\t\t\t\t\t\t\t\t\t\t\tIt's obvious he's lying, but you let him have this. You're still friends, after all. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Guess I should go, huh,\" Joshy says. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Take the door this time, though.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto joshy_tomorrow \n\t\t\t\t\t\t\t\t\t\t\t#Kiss him. \n\t\t\t\t\t\t\t\t\t\t\t\tYour lips meet.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto joshy_kiss_continue \n\t\t\t\t\t\t\t\t\t\t\t#I want this, but now is not the time. \n\t\t\t\t\t\t\t\t\t\t\t\t*label Joshy_postpone_continue \n\t\t\t\t\t\t\t\t\t\t\t\t*set joshy_romance_postponed true \n\t\t\t\t\t\t\t\t\t\t\t\t*set romance_person 2 \n\t\t\t\t\t\t\t\t\t\t\t\t${Joshy_postpone} \n\n\t\t\t\t\t\t\t\t\t\t\t\tYou say so, as kindly and mildly as you can, and Joshy nods. \"You're right,\" he says. He reaches out to caress the side of your face but changes his mind. \"I should go.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"I think you should. Take the door this time, though.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tJoshy nods. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto joshy_tomorrow \n\t\t\t\t\t\t\t\t\t#Push him away. \n\t\t\t\t\t\t\t\t\t\tYou push Joshy away, and he doesn't insist, though he does look hurt for a moment. Do you care? You don't want a hug. You want Tommy to not be dead. \n\n\t\t\t\t\t\t\t\t\t\tBut you know that this time, just like every other time in your short life, you cannot have what you want. \n\t\t\t\t\t\t\t\t\t\t*label joshy_sorry \n\n\t\t\t\t\t\t\t\t\t\t\"I'm sorry,\" Joshy says. \n\n\t\t\t\t\t\t\t\t\t\t\"What are you sorry for?\" you ask. \n\n\t\t\t\t\t\t\t\t\t\t\"Everything,\" he replies. \"Just, everything.\" Then he \n\t\t\t\t\t\t\t\t\t\t*goto joshy_leaves\n\t\t\t\t\t\t\t\t\t#I don't deserve a hug. \n\t\t\t\t\t\t\t\t\t\tJoshy puts his arms around you, and you try to fight him off, but he holds on to you until you give up. Doesn't matter what you think you deserve; your friend is here. Whether you like it or not.  \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tAfter a while, Joshy lets go. \"I should head back,\" he says. \"I just wanted to see you.\" He \n\t\t\t\t\t\t\t\t\t\t*goto joshy_leaves\n\t\t\t\t\t#I'm devastated. I don't know what to say. \n\t\t\t\t\t\tSo you say nothing. You simply sit there silently, dumbfounded, while your friend sobs quietly. Then, he reaches for your hand. Touches it lightly. \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#Take it. \n\t\t\t\t\t\t\t\tYou hold hands for a while. \n\t\t\t\t\t\t\t\t*label hold_hands_Joshy_continue \n\t\t\t\t\t\t\t\tIt feels like an anchor, something tethering you to this world. For a moment you have this feeling of being completely insubstantial. If you let go of Joshy's hand, you might float away, drift out the window like a helium balloon. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Thanks,\" you say after a while. \n\n\t\t\t\t\t\t\t\t\"For what?\" Joshy asks. \n\n\t\t\t\t\t\t\t\t\"For coming,\" you say. \"For being here. For everything.\"\n\n\t\t\t\t\t\t\t\tJoshy nods, but he doesn't say anything else. \n\n\t\t\t\t\t\t\t\tYou stay there like that, in silence, for a long time.\n\n\t\t\t\t\t\t\t\tEventually, Joshy says he should go. He \n\t\t\t\t\t\t\t\t*goto joshy_leaves \n\t\t\t\t\t\t\t#Pull away. \n\t\t\t\t\t\t\t\tYou pull away and so does Joshy, as if that brief touch burned him. As if neither of you deserves this moment of comfort, of shared friendship. If Tommy can't have this, why do you get to? \n\t\t\t\t\t\t\t\t*goto joshy_sorry \n\t\t\t\t\t\t\t#Kiss him. \n\t\t\t\t\t\t\t\tYou push away his hand, cup his face instead. \n\n\t\t\t\t\t\t\t\tYou reach for his lips and he welcomes you. \n\t\t\t\t\t\t\t\t*label joshy_kiss_continue\n\t\t\t\t\t\t\t\t*set joshy_romance true \n\t\t\t\t\t\t\t\t*set romance_person 2 \n\t\t\t\t\t\t\t\tHe tastes like aftershave and strawberries. \n\n\t\t\t\t\t\t\t\tIt is a long, tender kiss, one between people who already know each other well, and that only adds to how much there still is to know. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I should go,\" Joshy says after a while. \"I just wanted to see you.\" He \n\t\t\t\t\t\t\t\t*goto joshy_leaves  \n\t\t\t#\"No.\"\n\t\t\t\tThere's no point in lying. Joshy is one of your best friends in the whole world, and there's even more that ties you now. Shared trauma has a way of binding people together, for better or for worse. \n\n\t\t\t\t\"Yeah,\" he says. \"Didn't think so.\" He looks at you for a while, then asks: \"What can I do? What do you need?\"\n\t\t\t\t*choice \n\t\t\t\t\t#\"Just hold my hand for a while.\"\n\t\t\t\t\t\t\"Okay,\" Joshy says. He reaches for your hand and holds it. \n\t\t\t\t\t\t*goto hold_hands_Joshy_continue\n\t\t\t\t\t#\"A hug.\"\n\t\t\t\t\t\tJoshy doesn't hesitate at all. The words are barely out and his arms are already around you. Joshy holds on to you, and you hold on to him in turn, for a long time. \n\n\t\t\t\t\t\tWhen his embrace finally loosens, you are reluctant to let go. \n\n\t\t\t\t\t\t\"Thank you,\" Joshy says. \n\n\t\t\t\t\t\t\"For what?\" you ask. \"You're the one comforting me.\"\n\n\t\t\t\t\t\tJoshy smiles sadly. \"That's the great thing about friendship, isn't it? And the worst thing about it.\"\n\n\t\t\t\t\t\t\"What is?\"\n\n\t\t\t\t\t\t\"It always cuts both ways.\"\n\n\t\t\t\t\t\tYou nod. Think of Maria, of ${Cat}. Of Tommy. \"Yeah,\" you say. \"Yeah.\"\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tAfter Joshy leaves, you lie alone in bed. \n\t\t\t\t\t\t*goto bed \n\t\t\t\t\t#\"Kiss me.\"\n\t\t\t\t\t\tThere's only a single moment of surprise in Joshy's eyes before he leans in to kiss you. Your lips meet. \n\t\t\t\t\t\t*goto joshy_kiss_continue\n\t\t\t\t\t#\"I neither want nor deserve anything.\"\n\t\t\t\t\t\tJoshy tries to put his arms around you and fold you into a hug, but you push him away. \"I just want to be alone,\" you say. \n\n\t\t\t\t\t\t\"Maybe that's exactly why you shouldn't be,\" Joshy says. \n\n\t\t\t\t\t\tYou realize there's nothing you can say or do to change his mind, so you sit side by side in silence for a while. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I should go,\" Joshy says then. He \n\t\t\t\t\t\t*goto joshy_leaves\n\t\t\t#\"What do you think?\"\n\t\t\t\tYour tone is a bit more abrasive than he expected, and for a moment he seems hurt. But he recovers quickly enough. \"I think we all just went through something traumatic,\" he says. \n\n\t\t\t\t\"Some more than others,\" you interject. \n\n\t\t\t\t\"And whatever you feel is okay,\" he continues. \n\n\t\t\t\tThat's, uh, very mature of him. You give him a long look. \n\t\t\t\t*label Joshy_ok \n\t\t\t\t\"Are you okay?\" you echo his question. \n\n\t\t\t\tIt's all it takes. He collapses on the floor with his back against your bed, hangs his head and sobs quietly for a long time.\n\t\t\t\t*label cry_Joshy_options\n\t\t\t\t*choice \n\t\t\t\t\t#Oh boy. \n\t\t\t\t\t\t*label Joshy_cry_reaction \n\t\t\t\t\t\tDo other people's feelings always make you uncomfortable? Or just Joshy's? \n\n\t\t\t\t\t\tYou wish he would go back to the sunny, carefree boy persona he usually puts on. Whip out his guitar, break into song. \n\n\t\t\t\t\t\tHe doesn't, though. He just sits there in his discomfort, with no help from you, vulnerable as anyone. And for a moment, you can't tell if that's his failure or yours. \n\n\t\t\t\t\t\tEventually, Joshy collects himself. \"I'm sorry,\" he says. \"I don't know what came over me.\"\n\n\t\t\t\t\t\tYou make some noncommittal noises that in your head sound comforting.\n\n\t\t\t\t\t\t\"I should go,\" Joshy says. He seems embarrassed. He \n\t\t\t\t\t\t*goto joshy_leaves\n\t\t\t\t\t#Comfort him, like a good friend. \n\t\t\t\t\t\tYou put a hand on his knee to let him know you're there for him, but you let him sob, get it all out. \n\n\t\t\t\t\t\t\"Sorry,\" he says after he calms down. \n\n\t\t\t\t\t\t\"Nothing to be sorry for,\" you reply. \n\n\t\t\t\t\t\t\"Thanks for letting me be a mess around you. Doesn't happen to me often.\"\n\n\t\t\t\t\t\tYou shrug, trying not to make it bigger than it is. \"Anytime, man,\" you say. \"I mean it.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tJoshy nods. He \n\t\t\t\t\t\t*goto joshy_leaves\n\t\t\t\t\t#Offer him a hug. \n\t\t\t\t\t\tHe accepts. You lean in and put your arms around him. Joshy melts into you, grateful for the contact. You let him sob against your chest for a while. \n\n\t\t\t\t\t\tThen, he pulls away slightly so he can look at you. He puts his hand on your chin, and leans in to kiss you. \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#\"What the fuck?\"\n\t\t\t\t\t\t\t\t*goto joshy_wtf\n\t\t\t\t\t\t\t#Kiss him back. \n\t\t\t\t\t\t\t\tYour lips meet. \n\t\t\t\t\t\t\t\t*goto joshy_kiss_continue\n\t\t\t\t\t\t\t#I want this, but not now.\n\t\t\t\t\t\t\t\t*goto Joshy_postpone_continue\n\t\t\t\t\t\t\t#I don't see him that way. \n\t\t\t\t\t\t\t\tYou turn away. \"Uh, you have the wrong idea,\" you say. \n\n\t\t\t\t\t\t\t\t*goto Joshy_wrong_idea\n\t\t\t#\"Never better.\" The sarcasm is palpable. \n\t\t\t\t\"Yeah,\" Joshy says. \"Same, tbh.\" \n\n\t\t\t\tHis tone is honest, unguarded. A complete lack of sarcasm in response to yours. You were not expecting that. \n\t\t\t\t*goto joshy_ok\n\t*else \n\t\t*choice \n\t\t\t#\"Why wouldn't I be?\"\n\t\t\t\t\"Oh, I don't know, maybe because we escaped a fucking war zone today,\" he says, shrugging.\n\n\t\t\t\tHe has a point. \n\t\t\t\t*label joshy_ok2\n\n\t\t\t\t\"Are [i]you[/i] okay?\" you ask back. \n\n\t\t\t\tJoshy doesn't speak for a while. He lets himself collapse onto the floor, his back against your bed. He hangs his head.\n\n\t\t\t\tYou've never seen him like this before. \n\n\t\t\t\t\"I had a nightmare,\" he says. \n\n\t\t\t\t\"What was the nightmare?\"\n\n\t\t\t\t\"We were playing our very first game,\" Joshy says. \"We stood outside the first door and had to choose someone to walk through the door. Except this time we knew that whoever we chose to walk in would never walk out again.\" \n\n\t\t\t\tThen, Joshy cries. You've never seen him cry before. Right now, he's at his most unguarded. \n\t\t\t\t*choice\n\t\t\t\t\t#I feel honored to be trusted like this. Comfort Joshy. \n\t\t\t\t\t\tIt takes guts to show someone how you truly feel. To let down your guard, open your belly, say: \"This is me\" and trust that they won't hurt you. \n\n\t\t\t\t\t\tYou put your hand on Joshy's shoulder and allow him to feel his feelings. This is the least and most you can do for him right now, and you both know it. \n\n\t\t\t\t\t\tAfter a while, Joshy calms down. \n\n\t\t\t\t\t\t\"Jesus,\" he says. \"I'm so sorry. I don't know what came over me.\"\n\n\t\t\t\t\t\t\"Nothing to be sorry about,\" you say. \"It's been a rough day. And I'm always here for you.\"\n\n\t\t\t\t\t\tJoshy nods. \"I should go,\" he says then. He \n\t\t\t\t\t\t*goto Joshy_leaves \n\t\t\t\t\t#This makes me uncomfortable. \n\t\t\t\t\t\t*goto Joshy_cry_reaction  \n\t\t\t\t\t#Give him a hug. \n\t\t\t\t\t\tYou put your arms around Joshy, and he lets himself cry against your chest for a while. \n\n\t\t\t\t\t\tThen, he pulls back a little and looks you in the eyes. A moment of hesitation later, he reaches for your lips with his own.\n\t\t\t\t\t\t*goto joshy_romance_options  \n\t\t\t#\"I'll be fine.\"\n\t\t\t\t\"Which means that right now you are not fine,\" Joshy points out. The words match his usual witty, couldn't-care-less self, but his tone is soft. Maybe he actually cares. \n\t\t\t\t*goto joshy_ok2\n\t\t\t#\"Just a little shaken.\"\n\t\t\t\t\"That's understandable,\" he says. \"I'm shaken, too.\" He half sits, half collapses on the floor, his back against the side of your bed. Sitting there quietly for a while, he seems so vulnerable. One thing that Joshy never does is show weakness, so this could actually be kind of endearing. Or at least give you license to feel your own feelings, whatever they are. \n\n\t\t\t\t\"Can I…uh. Can I hug you?\" Joshy asks. You have a sense he wants to do more than that. \n\t\t\t\t*choice \n\t\t\t\t\t#I'd love that and more. \n\t\t\t\t\t\t*set joshy_romance true\n\t\t\t\t\t\t*set romance_person 2 \n\t\t\t\t\t\tYou nod. \n\n\t\t\t\t\t\tSlowly, Joshy puts his arms around you and pulls you close. The heat from his body envelops you, makes you feel safe. Something in your body unlocks; your limbs relax, your joints loosen up. \"Is this okay?\" Joshy asks. \n\n\t\t\t\t\t\tYou nod again. \n\n\t\t\t\t\t\tThen, his lips are on yours. \n\t\t\t\t\t\t*goto joshy_kiss_continue\n\t\t\t\t\t#No. Keep my distance. \n\t\t\t\t\t\tYou shake your head. Joshy is disappointed, maybe even a little hurt, but he tries not to show it. \n\n\t\t\t\t\t\t\"That's all right,\" he says. Then, \"no, you're right, that was stupid. Sorry.\"\n\n\t\t\t\t\t\t\"Don't be,\" you say. You touch his hand lightly. \n\t\t\t\t\t\t\n\t\t\t\t\t\tJoshy nods. \"I should go,\" he says, then \n\t\t\t\t\t\t*goto Joshy_leaves \n\t\t\t\t\t#I would like that, but now is not the time. \n\t\t\t\t\t\t*set joshy_romance_postponed true \n\t\t\t\t\t\t*set romance_person 2 \n\t\t\t\t\t\tYou've been through so much. If this happens between you, you don't want it to be the result of extreme traumatic stress. \n\n\t\t\t\t\t\tYou say so, as gently as you can. \n\n\t\t\t\t\t\tJoshy nods. He understands. He agrees.\n\n\t\t\t\t\t\tSo this is not something that happens now. But maybe one day. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I should go,\" Joshy says. He \n\t\t\t\t\t\t*goto Joshy_leaves \n\t\t\t\t\t#I could use a friendly hug. \n\t\t\t\t\t\tYou say so, and Joshy puts his arms around you. He holds you like that for a few moments, and it feels as if he's hanging on to you as much as you're hanging on to him. It feels right. Because that's what friends are for, right? \n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter a while, Joshy says he should go. \"I just wanted to see you.\"\n\n\t\t\t\t\t\tYou nod. \"Thank you,\" you say. \n\n\t\t\t\t\t\tJoshy \n\t\t\t\t\t\t*goto joshy_leaves\n*elseif (catrina > joshy) and ((catrina > maria) and (catrina > tommy))\n\t*set best_friend 4\n\t*label catrina_comes \n\n\tIt's ${Cat}. $!{ce}'s been throwing gravel at your window. $!{ce}'s about to throw another piece when ${ce} sees you. \n\n\t$!{ce} lets the handful of gravel ${ce}'s still holding fall to the ground. \n\n\t\"Hey,\" ${ce} says. \n\n\t\"Come up,\" you say.\n\n\tAs if ${ce}'s done it a hundred times before, ${Cat} climbs up the trellis, hops on the ledge and then hoists ${cemself}, parkour-style, through your window and into your room with exquisite ease. \n\t*if bled = 4 \n\t\tThe only moment of uncertainty is when ${ceir} wounded palm catches on the windowsill and ${ce} winces in pain. \n\n\t\"Are you all right?\" you ask. \n\n\t${Cat} doesn't reply. $!{ce} sits on the floor, ${ceir} back against your bed, without being invited. \n\t*check_achievements comeout \n\t*if not (choice_achieved_comeout)\n\n\t\tShe looks uncomfortable in her clothes, perhaps her very skin. She adjusts her shirt, pulling at the tight compression garment she's wearing to make her chest appear flat. \n\n\t*if tommy_dead\n\t\t$!{ce} seems angry. \n\n\t\tBut then, ${Cat} always seems angry. \n\n\t\t\"What do you think?\" ${ce} asks back finally. \n\t\t*choice \n\t\t\t#\"I don't want to assume.\"\n\t\t\t\t${Cat} scoffs. \"Sure, be diplomatic about it,\" ${ce} says. \n\t\t\t\t*if composure > stat_mid_pass\n\t\t\t\t\t\"That's your MO, isn't it? Never express an opinion about anything, which means never risking anyone thinking less of you.\" \n\t\t\t\t*else \n\t\t\t\t\t\"Choose now as the only time to not speak what's truly on your mind.\"\n\n\t\t\t\t\"Why are you angry at me?\"\n\n\t\t\t\t${Cat} stares at you. $!{ceir} face is dark in the low light, but you can see the moment the anger melts away and turns into guilt. \n\n\t\t\t\t\"Don't be stupid,\" ${ce} says. \"I'm angry at myself.\"\n\t\t\t\t\n\t\t\t\tYou've always suspected as much. This is usually the deal with people who are perpetually angry, isn't it? The anger is a defense mechanism. If it's directed outwards, it's only because to do otherwise would threaten the self's survival. But this is a rare moment of self-awareness for ${Cat}, and you'd never expected ${cem} to admit this. \n\t\t\t\t*choice \n\t\t\t\t\t#\"${Cat}, it wasn't your fault.\"\n\t\t\t\t\t\tIt's as if your words break some kind of armor ${ce} had on, a rigid exterior that was not only protecting the soft creature underneath but also keeping ${cem} together. And now, without it, ${ce} collapses. $!{ceir} body crumples in on itself and ${Cat} dissolves into violent sobs. \n\t\t\t\t\t\t*label catrina_cry_choices \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#Hug ${cem}. \n\t\t\t\t\t\t\t\tYou sit on the floor next to ${cem} and fold ${cem} into a hug. You let ${cem} sob against your chest, wetting your shirt. \n\n\t\t\t\t\t\t\t\tThen, as ${ceir} crying subsides, ${ce} looks up at you and, cheeks glistening with tears, ${ce} goes for your lips. \n\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t#Kiss ${cem}. \n\t\t\t\t\t\t\t\t\t\t*label catrina_kiss \n\t\t\t\t\t\t\t\t\t\t*set catrina_romance true \n\t\t\t\t\t\t\t\t\t\t*set romance_person 4\n\t\t\t\t\t\t\t\t\t\tFor a long moment, your lips meet. $!{ce} tastes like liquorice, the slightly bitter kind, mixed with salt. \n\n\t\t\t\t\t\t\t\t\t\t${Cat} breaks contact first. \"I'm sorry,\" ${ce} says. \"I don't know what I was thinking.\"\n\n\t\t\t\t\t\t\t\t\t\t\"Do you regret it?\" you ask.\n\n\t\t\t\t\t\t\t\t\t\t$!{ce} looks at you with wet eyes. \"No,\" ${ce} says. \"Do you?\"\n\n\t\t\t\t\t\t\t\t\t\tYou shake your head. \n\n\t\t\t\t\t\t\t\t\t\t$!{ce} nods and rests ${ceir} forehead against your chest. For a while, you breathe together, letting the events of the day wash over you. \n\t\t\t\t\t\t\t\t\t\t*label catrina_leaves\n\n\t\t\t\t\t\t\t\t\t\t\"I should go,\" ${ce} says then. \n\t\t\t\t\t\t\t\t\t\t*label catrina_leaves2 \n\t\t\t\t\t\t\t\t\t\t\"But I'm glad I didn't talk myself out of coming here tonight.\"\n\n\t\t\t\t\t\t\t\t\t\tBefore you have a chance to respond, ${ce} stands up and moves towards the window. \n\n\t\t\t\t\t\t\t\t\t\t\"You can use the front door,\" you say, but ${ce} waves that away. \n\n\t\t\t\t\t\t\t\t\t\t\"Window is fine,\" ${ce} says. Then, a moment of hesitation later, ${ce} adds: \"Tomorrow?\" \n\n\t\t\t\t\t\t\t\t\t\t$!{ce} doesn't have to mention the game, and neither do you. But you both know that sooner or later, you'll have to play again. \n\n\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Tomorrow.\"\n\t\t\t\t\t\t\t\t\t\t*goto alone \n\t\t\t\t\t\t\t\t\t#I want this, but now is not the time. \n\t\t\t\t\t\t\t\t\t\t*label catrina_postpone_continue \n\t\t\t\t\t\t\t\t\t\t*set catrina_romance_postponed true \n\t\t\t\t\t\t\t\t\t\t*set romance_person 4 \n\t\t\t\t\t\t\t\t\t\tIf something happens between ${Cat} and yourself, it shouldn't be tinged with the @{tommy_dead sadness and heartbreak of today|stress of this day}. It wouldn't be fair to either of you to always wonder if the only reason you connected was that you were running from the pain of @{tommy_dead your friend's death|what you've been through}. \n\n\t\t\t\t\t\t\t\t\t\tYou tell ${cem} as much. In fewer, clumsier words. \n\t\t\t\t\t\t\t\t\t\t*label catrina_postpone_continue2\n\n\t\t\t\t\t\t\t\t\t\t${Cat} nods. \"You're right,\" ${ce} says. $!{ce}'s hurt but trying hard not to show it, which only makes you like ${cem} even more. \"I wasn't thinking. I'm sorry.\"\n\n\t\t\t\t\t\t\t\t\t\t\"There's nothing to be sorry for,\" you say. \n\n\t\t\t\t\t\t\t\t\t\t$!{ce} nods. \n\t\t\t\t\t\t\t\t\t\t*goto catrina_leaves \n\t\t\t\t\t\t\t\t\t#I think she has the wrong idea. \n\t\t\t\t\t\t\t\t\t\t*label catrina_wrong \n\t\t\t\t\t\t\t\t\t\tYou turn away, and ${Cat} jerks back as if burned. \"I'm so sorry,\" ${ce} says. \"I don't know what came over me.\"\n\n\t\t\t\t\t\t\t\t\t\t\"${Cat}, I just don't see you that way,\" you start saying, but ${ce} interrupts you, standing up. \n\n\t\t\t\t\t\t\t\t\t\t\"No, no, stop, I wasn't thinking.\" $!{ce} dusts herself off, as if the floor of your bedroom were covered in dirt. \"This was stupid. Can we forget it ever happened, please?\"\n\n\t\t\t\t\t\t\t\t\t\tBefore you have a chance to respond, ${ce}'s heading for the window. \n\n\t\t\t\t\t\t\t\t\t\t\"You can use the front door this time, if you want,\" you say, but ${ce} already has one leg over the ledge. \n\n\t\t\t\t\t\t\t\t\t\t\"I'll see you tomorrow,\" ${ce} says. \n\n\t\t\t\t\t\t\t\t\t\tFor a moment, you think of the game. Wonder what you'll be asked to play next. \n\n\t\t\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Tomorrow.\"\n\t\t\t\t\t\t\t\t\t\t*goto alone \n\t\t\t\t\t\t\t#Say something comforting. \n\t\t\t\t\t\t\t\t*check_achievements ending \n\t\t\t\t\t\t\t\tWhat would be comforting right now? You could say it's okay, though it really isn't, is it? \n\t\t\t\t\t\t\t\t*if tommy_dead\n\t\t\t\t\t\t\t\t\tYour friend is dead because you all chose to play a game. How is any of this okay?\n\n\t\t\t\t\t\t\t\t\tYou could tell ${cem} again it's not ${ceir} fault, and really you'd be saying it's not yours either, but is that true? Do you even believe that? Blame is such a strange beast; it has a way of worming itself into the heart of everything, reaching tendrils out through cracks impossible to see, and so impossible to mend. \n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t${Cat} needs a remedy for existential dread, and you really don't have one.\n\n\t\t\t\t\t\t\t\tSo in the end, all you can come up with is, \"I'm here.\" When you've been stripped of everything, all you can offer is your presence. And \n\t\t\t\t\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\t\t\t\t\tas life will teach you eventually, if it hasn't already, \n\t\t\t\t\t\t\t\t*else  \n\t\t\t\t\t\t\t\t\tusually, \n\t\t\t\t\t\t\t\tthat's enough. That's plenty. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSlowly, ${Cat}'s sobbing subsides. When ${ce} looks up at you, ${ceir} eyes look brighter, and that desperate shadow that was concealed behind ${ceir} anger is almost gone. \n\n\t\t\t\t\t\t\t\t\"Thank you,\" ${ce} says. \"This helped.\"\n\n\t\t\t\t\t\t\t\t\"Yeah?\" you ask. \n\n\t\t\t\t\t\t\t\t$!{ce} smiles. \"Yeah,\" ${ce} says. Then, ${ce} gets up. \"Think I can use the front door this time? Not sure I can brave the window again.\"\n\n\t\t\t\t\t\t\t\t\"Sure,\" you say. \n\t\t\t\t\t\t\t\t*goto catrina_door \n\t\t\t\t\t\t\t#Let ${cem} cry. $!{ce} clearly needs it. \n\t\t\t\t\t\t\t\tSometimes, silence is what a friend needs. \n\n\t\t\t\t\t\t\t\tIt's harder than people think, silence. It can be impossible to tolerate; when faced with a friend's desperation, you might be moved to rescue them, try to fix things, make it better, whatever it is. It takes a great deal of self-awareness to recognize the need to rescue people from their feelings and yourself from the discomfort of being witness to them. \n\n\t\t\t\t\t\t\t\tSo you say nothing. You simply sit there, allowing ${Cat} to feel whatever it is ${ce}'s feeling, and letting ${cem} know you're there for ${cem} by not running away or trying to shut it down. It's all you can offer ${cem}, and as it turns out, it is enough.\n\n\t\t\t\t\t\t\t\tAfter a while, ${Cat} dries ${ceir} eyes and looks up at you. $!{ce} gives you a lopsided smile. \"Thanks,\" ${ce} says. \n\n\t\t\t\t\t\t\t\tYou nod. Are your eyes wet, too? If they are, ${Cat} doesn't mention it. \n\n\t\t\t\t\t\t\t\t\"Guess I should go,\" ${ce} says. \n\t\t\t\t\t\t\t\t*goto catrina_leaves2 \n\t\t\t\t\t#\"I get it. I'm angry at myself, too.\"\n\t\t\t\t\t\t$!{ce} looks at you, surprised. \"You are?\" ${ce} asks. \n\n\t\t\t\t\t\t\"Of course I am,\" you say. \"I just also know it doesn't really serve anything. It doesn't bring Tommy back.\"\n\n\t\t\t\t\t\tThat seems to diffuse ${Cat}'s aggression a little. \"Perhaps it helps us not make the same mistake again, though,\" ${ce} says. $!{ce} doesn't sound very certain. \n\n\t\t\t\t\t\t\"What mistakes do you think we made?\"\n\n\t\t\t\t\t\t$!{ce} shrugs. \"Wrong choices. Thought we were better than we were.\" $!{ce} pauses. \"Or perhaps we shouldn't have played at all in the first place.\"\n\n\t\t\t\t\t\tAnd that's the crux of it, isn't it?\n\n\t\t\t\t\t\tIf you hadn't played, none of this would have happened. You could have spared yourselves a world of pain. \n\n\t\t\t\t\t\tIt's like watching a horror film and being exasperated at all the stupid mistakes the characters make. Don't you want to scream at the screen sometimes? Just don't go looking for the dark thing that goes bump in the night. Just don't open the door. Just don't go into the cabin in the woods. Just don't say yes. Just don't. \n\n\t\t\t\t\t\tExcept, now that you're in it, you know that's not how any of this works. \n\n\t\t\t\t\t\tBecause you are in it, aren't you? This is the genre. That is your arc. \n\t\t\t\t\t\t*check_achievements ending \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#No. @{choice_achieved_ending You make it sound|This sounds} so inevitable. I can make it. \n\t\t\t\t\t\t\t\tSure, maybe you can. At the very least, you can try. You can make different choices, break the cycle, etc. You are the master of your own fate. \n\t\t\t\t\t\t\t\t*check_achievements ending \n\t\t\t\t\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\t\t\t\t\tLike we all are. Right? None of us are trapped here. \n\n\t\t\t\t\t\t\t\tSo yeah, try. Give it your best shot. \n\t\t\t\t\t\t\t#People make the best they can of the hand they're dealt.\n\t\t\t\t\t\t\t\tAnd that's all you can do, isn't it? Maybe you can't do a whole lot to change your circumstances, but you can choose how you respond to them. \n\t\t\t\t\t\t\t\t*comment Isn't that the lie your parents were told, too? When they were given the mining jobs, when they were told they were lucky to have jobs at all—and then when the mining jobs were taken away, when they were blamed for their poverty and for their black lungs, when they were told all they could do was make the best of the lot they'd been given within this system, and that there was nothing they could do to change the system itself? But let's not get political. Let's not be unreasonable. Let's not get too angry, or too utopian, like those fools who end up aflame in the middle of the street. Let's stay desperate and down-to-earth, with our bootstraps and our 9-to-5s, our flames never quite ignited enough to consume us. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tBesides, what \n\t\t\t\t\t\t\t\t*goto hurdle \n\t\t\t\t\t\t\t#I can quit anytime I want.\n\t\t\t\t\t\t\t\t*check_achievements ending \n\t\t\t\t\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\t\t\t\t\tLol. Really? I have no mouth, and I must laugh. [i]I can quit anytime I want?[/i] Wonder where I've heard that one before. \n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\tBut okay. Let's say you can. What \n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\tSure you can. \n\n\t\t\t\t\t\t\t\t\tBut what \n\t\t\t\t\t\t\t\t*label hurdle \n\t\t\t\t\t\t\t\twould it say about you to quit at the first hurdle? (Because what is a friend's death in an absurd game with unclear rules, if not a first hurdle?) \n\t\t\t\t\t\t\t\t*if choice_achieved_ending\n\n\t\t\t\t\t\t\t\t\tI can't help but wonder what it would actually take for you to quit. I mean, don't take it personally. I wonder that about myself, too. But I also know it makes me sound like all those people who look at the battered spouse with the violent partner and go, \"Why didn't you just leave?\"\n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\tYou're not that kind of person, are you? You have to at least try. You're in this already. You have to do your best. \n\n\t\t\t\t\t\t\t\t\tOtherwise, Tommy died for nothing. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*check_achievements ending \n\t\t\t\t\t\tPerhaps you say some of that to ${Cat}. Perhaps you don't. For a few moments, it feels as if ${ce}'s not even here. \n\t\t\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\t\t\tAs if it's just you and me, the two of us. Just like it's always been. \n\n\t\t\t\t\t\t\tAnd then, \n\t\t\t\t\t\t*else \n\n\t\t\t\t\t\t\tThen, \n\t\t\t\t\t\tthe moment's gone. \n\n\t\t\t\t\t\t${Cat} is saying something about school, about a test in the morning. $!{ce}'s heading for the window. \n\n\t\t\t\t\t\t\"Don't you want to use the front door?\" you ask, but ${ce} already has one leg over the ledge. \n\n\t\t\t\t\t\t\"Nah, I'm fine,\" ${ce} says. \"See you tomorrow?\"\n\n\t\t\t\t\t\tYou think of the black rectangular device in your backpack, of all the games you've yet to play. Of all the times you've yet to say yes. \n\n\t\t\t\t\t\t\"Tomorrow,\" you say. \n\t\t\t\t\t#\"Perhaps you should be.\"\n\t\t\t\t\t\t${Cat}'s face twists into a grimace of pain. $!{ce} didn't see that one coming. And now, ${ce} breaks down. $!{ceir} body crumples in on itself, and ${ce} collapses into violent sobs.\n\t\t\t\t\t\t*goto catrina_cry_choices\n\t\t\t#\"I think you're fine.\"\n\t\t\t\t${Cat} scoffs. \"Yeah. Just peachy.\" It is meant sarcastically, of course, but ${ceir} tone is actually mild. $!{ce} turns to you with a look of concern on ${ceir} face. \"Are you fine?\"\n\t\t\t\t*choice \n\t\t\t\t\t#\"Sure. Never better.\" The sarcasm is palpable.\n\t\t\t\t\t\t${Cat} is not the only one who has sarcasm down to an art. But this time ${ce} recognizes that this is doing neither of you any good. And instead of putting up all ${ceir} defenses, like you are, ${ce} crumbles. $!{ce} breaks down into sobs. \n\t\t\t\t\t\t*goto catrina_cry_choices \n\t\t\t\t\t#\"Of course not. I'm not a monster.\"\n\t\t\t\t\t\t${Cat} nods. $!{ceir} expression is open. And, perhaps, vulnerable. You're not sure you've ever seen ${cem} like this before@{(Cat = \"Cat\") —except maybe that day when he first came out to you and your friends|}. \n\n\t\t\t\t\t\t\"I know you're not,\" ${ce} says. \n\n\t\t\t\t\t\t$!{ce} comes closer and offers you a hug. \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#I could use a friendly hug. \n\t\t\t\t\t\t\t\tYou let ${Cat} put ${ceir} arms around you, and you both stay there together, breathing for each other, comforting each other. Something you didn't know was there in the middle of your chest, frozen and hard, starts to melt away. \n\n\t\t\t\t\t\t\t\tFinally, ${Cat} breaks contact. \"Thanks,\" ${ce} says. \"This was nice. This helped.\"\n\n\t\t\t\t\t\t\t\tYou nod. \"Yeah,\" you say. \"It did.\"\n\n\t\t\t\t\t\t\t\t\"I should go, I guess,\" ${Cat} says. $!{ce} glances at the window, but before ${ce} starts moving towards it, you tell ${cem} ${ce}'s welcome to use the door this time. \n\t\t\t\t\t\t\t\t*label catrina_door \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tTogether, you make your way to the front door of the house as quietly as you can. \n\n\t\t\t\t\t\t\t\t\"See you tomorrow?\" ${ce} asks. Neither of you mentions the game, and neither of you has to. You both know that eventually you'll have to play again. \n\n\t\t\t\t\t\t\t\t\"Yeah,\" you say. \"Tomorrow.\"\n\t\t\t\t\t\t\t\t*goto alone \n\t\t\t\t\t\t\t#Kiss ${cem}. \n\t\t\t\t\t\t\t\t*set catrina_romance true \n\t\t\t\t\t\t\t\t*set romance_person 4 \n\t\t\t\t\t\t\t\tYou let ${Cat} hug you, and then you reach for ${ceir} lips. To your slight surprise, ${ce} welcomes the kiss. $!{ce} tastes like liquorice, the slightly bitter kind. \n\n\t\t\t\t\t\t\t\t${Cat} breaks contact first. \"Um…\" ${ce} says. \"I didn't see that coming.\"\n\n\t\t\t\t\t\t\t\t\"Do you regret it?\" you ask. \n\n\t\t\t\t\t\t\t\t$!{ce} doesn't hesitate. \"No,\" ${ce} says. \"No way.\" $!{ce} pauses. \"But it does feel a bit like cheating,\" ${ce} adds. \"Like we shouldn't be allowed this. Not today at least. Not after…\" ${ce} trails off, but of course you know exactly what ${ce} means. \n\n\t\t\t\t\t\t\t\t\"Yeah,\" you say. \n\n\t\t\t\t\t\t\t\tYou're both silent for a few moments. Then, ${Cat} speaks again. \"I guess I should go,\" ${ce} says. \n\t\t\t\t\t\t\t\t*goto catrina_leaves2\n\t\t\t\t\t\t\t#I want to kiss ${cem}, but now is not the time. \n\t\t\t\t\t\t\t\t*set catrina_romance_postponed true\n\t\t\t\t\t\t\t\t*set romance_person 4  \n\t\t\t\t\t\t\t\tYou accept the hug. ${Cat} wraps ${ceir} arms around you, and you both stay there, just breathing, being in each other's comfort. It's the first time today you've felt safe. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAfter a few long moments, ${Cat} lets you go. \"Okay?\" ${ce} asks. \n\n\t\t\t\t\t\t\t\tYou nod. \"Sure,\" you say. \n\n\t\t\t\t\t\t\t\t${Cat} nods, too. \"I better go,\" ${ce} says. \n\t\t\t\t\t\t\t\t*goto catrina_leaves2 \n\t\t\t\t\t\t\t#No. I'd rather be on my own. \n\t\t\t\t\t\t\t\tYou pull back enough for ${cem} to understand that you don't want to be touched. \n\n\t\t\t\t\t\t\t\t${Cat} looks hurt but tries to hide it. \"I think maybe I shouldn't have come here,\" ${ce} says. $!{ce} stands up and moves towards the window. \n\n\t\t\t\t\t\t\t\t\"You can use the front door,\" you say. \"You'll hurt yourself.\"\n\n\t\t\t\t\t\t\t\t$!{ceir} leg is already over the ledge. \"I'll be fine,\" ${ce} says. \"I'm sorry.\" \n\n\t\t\t\t\t\t\t\t$!{ce}'s gone before you can ask what ${ce}'s sorry for. \n\t\t\t\t\t#\"I'm okay, actually.\"\n\t\t\t\t\t\t$!{ce} seems a bit surprised, but ${ce} doesn't press you. Instead, ${ce} dissolves into loud, violent sobs. You've never seen ${cem} like this before@{(Cat = \"Cat\") —except maybe that day when he first came out to you and your friends|}. \n\t\t\t\t\t\t*goto catrina_cry_choices\n\t\t\t#\"I think what happened broke you a little.\"\n\t\t\t\t${Cat} doesn't respond. $!{ce} looks away, but you can tell from the way ${ce} holds ${ceir} shoulders that ${ce} is fighting off tears.\n\n\t\t\t\tCan you even remember the last time you saw ${Cat} cry? @{(Cat = \"Cat\") It was probably the day he came out to you and your friends—except those were happy tears.|Or any time?} \n\n\t\t\t\t\"Yeah,\" ${ce} says finally. \"Maybe I am.\" Then, ${ce} turns to you. \"Are you?\" ${ce} asks. \"A little broken?\"\n\t\t\t\t*choice \n\t\t\t\t\t#\"Of course I am. What did you think?\"\n\t\t\t\t\t\t\"I'm not completely heartless,\" you continue. \n\n\t\t\t\t\t\t${Cat} stares at you. $!{ce} moves closer. \"I don't think you're heartless at all,\" ${ce} says. $!{ce} sounds strange. Not the ${Cat} you're used to, but someone vulnerable and unarmed. $!{ce} puts a hand on your chest. \"${name}…\" ${ce} says. \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#Hug ${cem}. \n\t\t\t\t\t\t\t\tYou sit on the floor next to ${cem} and fold ${cem} into a hug. To your surprise, ${ce} doesn't resist. Instead, ${ce} goes for your lips. \n\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t#Kiss ${cem}. \n\t\t\t\t\t\t\t\t\t\t*goto catrina_kiss\n\t\t\t\t\t\t\t\t\t#I want this, but now is not the time. \n\t\t\t\t\t\t\t\t\t\t*goto catrina_postpone_continue \n\t\t\t\t\t\t\t\t\t#$!{ce} has the wrong idea. \n\t\t\t\t\t\t\t\t\t\t*goto catrina_wrong\n\t\t\t\t\t\t\t#Hold ${ceir} hand. Tell ${cem} it's going to be okay. \n\t\t\t\t\t\t\t\tYou take ${ceir} hand in yours and hold it there for a few long moments. You want to tell ${cem} it's going to be okay, that everything will be all right in the end, that you did nothing wrong, that it wasn't your fault. But you don't have to say anything. You find that simply holding ${ceir} hand and sharing this moment with ${cem} is enough. \n\n\t\t\t\t\t\t\t\tAfter a while, ${Cat} breaks contact. \"Thanks,\" ${ce} says. \"This helped.\"\n\n\t\t\t\t\t\t\t\t\"Yeah?\" you ask. \n\n\t\t\t\t\t\t\t\t$!{ce} nods. \n\n\t\t\t\t\t\t\t\tDoes it feel nice? Knowing that simply being there for a friend can make a difference?\n\t\t\t\t\t\t\t\t*goto catrina_leaves \n\t\t\t\t\t\t\t#Pull away. \n\t\t\t\t\t\t\t\t${Cat} looks startled. $!{ce} matches your backwards movement so that you're both pulling away, two similar poles of a magnet repelling each other. \n\n\t\t\t\t\t\t\t\t\"Sorry,\" ${ce} says dryly. \"I'm sorry.\"\n\n\t\t\t\t\t\t\t\tYou don't respond. What is there to say? That you don't deserve to be touched? That you don't want comfort? That there's nothing in the world that would make anything better, other than going back in time and making different choices? \n\n\t\t\t\t\t\t\t\tThere's so much to say, and so little that can be said. \n\n\t\t\t\t\t\t\t\tYou shake your head as ${Cat} looks away. \n\n\t\t\t\t\t\t\t\t\"I should go,\" ${ce} says. $!{ce} moves towards the window. \n\n\t\t\t\t\t\t\t\tYou think of telling ${cem} ${ce} can use the front door this time, but ${ce} already has one leg over the sill. \n\n\t\t\t\t\t\t\t\t\"I'll see you tomorrow?\" you ask. \n\n\t\t\t\t\t\t\t\t\"Yeah,\" ${ce} says. \"Tomorrow.\"\n\n\t\t\t\t\t\t\t\tYou don't mention the game, and you don't have to. You both know that sooner or later, you'll have to play again. \n\t\t\t\t\t#Pretend I'm all right. \n\t\t\t\t\t\t\"Nah,\" you say. \"I'm actually fine.\"\n\n\t\t\t\t\t\t${Cat} gives you an incredulous look. \"Why are you lying?\" ${ce} asks. \"You don't have to act around me, you know.\"\n\n\t\t\t\t\t\t\"I'm not acting.\"\n\n\t\t\t\t\t\t${ce} obviously doesn't believe you, and for good reason, but ${ce} \n\t\t\t\t\t\t*label catrina_continue\n\t\t\t\t\t\tdoesn't press it further. Instead ${ce} takes in a shuddering breath and then dissolves into sobs. \n\t\t\t\t\t\t*goto catrina_cry_choices \n\t\t\t\t\t#I actually feel fine. \n\t\t\t\t\t\tMaybe you're coldhearted. Maybe you're numb from the trauma. Who can tell? But the reality is you feel all right. If ${Cat} can't deal with that, that's ${ceir} issue, not yours. \n\n\t\t\t\t\t\tYou tell ${cem} so, in fewer words than that. $!{ce} probably doesn't believe you, but ${ce} also \n\t\t\t\t\t\t*goto catrina_continue \n\t*else \n\n\t\t\"Sure, I'm fine,\" ${ce} says, though ${ce} doesn't seem fine to you. \"Are you?\"\n\t\t*choice \n\t\t\t#\"No.\"\n\t\t\t\tYou join ${cem} on the floor but don't say anything more. The tension is palpable, though you couldn't tell exactly what it is; it's too large. Encompasses too much. Do you often feel that way? There's so much to say, and so little that can be said. \n\n\t\t\t\t${Cat} \n\t\t\t\t*label catrina_initiates_romance\n\t\t\t\tlooks away for a moment, and then ${ce} seems to have made some kind of decision. $!{ce} comes in for a hug, then reaches for your lips. \n\t\t\t\t*choice \n\t\t\t\t\t#Kiss ${cem}. \n\t\t\t\t\t\t*goto catrina_kiss \n\t\t\t\t\t#I would like to get closer, but now is not the time. \n\t\t\t\t\t\t*set catrina_romance_postponed true \n\t\t\t\t\t\t*set romance_person 4 \n\t\t\t\t\t\tIf something happens between you, it shouldn't be the result of a day as insane as the day you've had. What kind of a start to a relationship would that be? \n\n\t\t\t\t\t\t\"${Cat}…\" you say, allowing the hug but avoiding the kiss. You explain yourself as mildly and as clearly as you can. \n\n\t\t\t\t\t\t*goto catrina_postpone_continue2 \n\t\t\t\t\t#Keep it friendly. \n\t\t\t\t\t\t*goto catrina_wrong \n\t\t\t\t\t#What the fuck?\n\t\t\t\t\t\t*set catrina %-small_change\n\t\t\t\t\t\tYou pull away, avoiding both the hug and the kiss. \n\n\t\t\t\t\t\t${Cat} jerks back. $!{ce} looks stunned. $!{ce} starts blabbering. \"I'm so sorry,\" ${ce} says. \"I don't know what that was, I wasn't thinking.\"\n\n\t\t\t\t\t\t\"Clearly,\" you say. \n\n\t\t\t\t\t\t$!{ce} stands up, dusting ${cemself} off, as if the floor of your bedroom were packed with dirt. \"I should go,\" ${ce} says. \n\n\t\t\t\t\t\t\"Yeah. I think that'd be best.\"\n\n\t\t\t\t\t\t$!{ce} goes for the window, and you don't offer ${cem} an alternative. When ${ce} has one leg over the sill, ${ce} pauses. \"See you tomorrow?\" ${ce} asks.\n\n\t\t\t\t\t\tYou think of the rectangular device in your backpack. Of things broken, things mended. You both know that sooner or later you'll have to play, no matter what. \n\n\t\t\t\t\t\t\"Sure,\" you say. \"Tomorrow.\"\n\t\t\t#\"I'll be fine.\"\n\t\t\t\t\"Which means that right now you aren't,\" ${Cat} remarks. \n\n\t\t\t\t\"I guess that's what it means, yeah.\" \n\n\t\t\t\t$!{ce} \n\t\t\t\t*goto catrina_initiates_romance \n\t\t\t#\"Why wouldn't I be?\"\n\t\t\t\t\"Oh, idk, maybe because we spent half of today in a fucking war zone?\" $!{ce} laughs, though ${ceir} eyes are wet. \"Just a thought.\"\n\t\t\t\t\n\t\t\t\tFew people can do sarcasm as well as ${Cat}.  \n\n\t\t\t\tBut then, ${ce} goes silent. \"I actually had a nightmare,\" ${ce} says. \"That's why I came here.\"\n\n\t\t\t\t\"What was the nightmare?\"\n\n\t\t\t\t$!{ce} looks away. $!{ceir} face is blank, but when ${ce} speaks, ${ceir} voice sounds choked, as if ${ce}'s holding back tears. \"We were back in the game, in that city. We killed so many people we could hardly walk for all the bodies.\" $!{ce} pauses. \"I remember it so vividly, looking down and realizing I had just stepped on someone's face. The give of it.\" $!{ce} shudders, then continues. \"We made it to the building, but inside it was empty. Not just empty, but [i]empty[/i], like it didn't even exist. There wasn't just nothing in it. It was nothingness. It was a space that could only hold emptiness.\"\n\n\t\t\t\t\"And that scares you?\" you ask. \n\n\t\t\t\t$!{ce} looks at you. \"Yeah,\" ${ce} says.\n\n\t\t\t\t\"Why?\"\n\n\t\t\t\t\"Because that's what I feel sometimes. What it feels like to be inside my body: I am empty. I am not made to hold anything at all.\"\n\n\t\t\t\tFinally, ${Cat} dissolves into sobs. \n\t\t\t\t*goto catrina_cry_choices\n*elseif ((tommy > catrina) and ((tommy > maria) and (tommy > joshy))) and (not (tommy_injured))\n\t*set best_friend 3\n\t*if tommy_dead\n\n\t\tThere's no one there. \n\n\t\tThis has happened before, though. Some other night, back when there were still five of you, back before the game, Tommy would have shown up.\n\n\t\tYou imagine him now. He's standing in the back yard. He has his fist closed around a handful of pebbles. One after the other, he throws them at your window until you acknowledge him, smile down at him, only mildly scolding. Until you invite him in. For some reason, you know he can't come in unless you invite him. Then he climbs up and walks through your window in the effortless way of ghosts, sits on your floor, rests his back against your bed. \n\t\t*choice \n\t\t\t#I wish he would forgive me. \n\t\t\t\tYou start telling him how sorry you are, how you wish you could have done things differently, how much you need him to forgive you. But Tommy doesn't seem able to listen to you. \n\t\t\t#I wish I could hug him. \n\t\t\t\tBut you don't dare. You know that if you tried, your arms might go through him, and wouldn't that just be infinitely worse? \n\t\t\t#I wish I could kiss him. \n\t\t\t\t*set tommy_romance true \n\t\t\t\t*set romance_person 3 \n\t\t\t\tYou tell him how much you wish things were different, how you wish you had more time, how early he was taken from you, before you had a chance to tell him everything there was to tell. \n\n\t\t\t\tBut Tommy doesn't seem able to listen to you anymore. \n\n\t\tAll night he stays there, talking to you about that time when you entered a game and found yourself in the middle of a war, that time when you almost lost and he fell to the floor, bleeding. He thought he died, wasn't that funny? Gave him a right fright. Gave you one, too. \n\n\t\tTommy's ghost thumbs his abdomen, and his finger comes away bloody. You both look at it, marvel at it until morning light starts creeping in through the window and Tommy's gone, only a transparency left and the slight warmth of a body that was never there. \n\n\t\tIs this what it means to be haunted? \n\t*else \n\t\t*label tommy_comes \n\n\t\tIt's Tommy. He's standing on the street, a handful of gravel in his fist. You open the window and gesture for him to come in through the front door. If it'd been anyone else, you'd let them climb in through the window, but you don't quite trust Tommy to pull that stunt off. \n\n\t\tAs quietly as you can, you lead him back to your room and close the door behind you. You both keep your voices low. \n\t\t*if bled = 3 \n\t\t\t\n\t\t\tYou notice Tommy is holding his wounded hand behind his back, though the cut is mostly healed by now. \n\n\t\t\"Are you all right?\" you ask. \n\n\t\tTommy shakes his head. He seems close to tears. He says he had a nightmare.  \n\n\t\t\"What did you see?\" you ask. \n\n\t\tHis voice is low. He sounds so out of breath it's hard to understand what he's saying. \n\n\t\t\"There was a hole in the middle of my chest,\" he says. \"You tried to help me, but there was nothing you could do. I was telling you to look for something, something I lost, and you didn't know how. I was pleading with you to look for it.\" He pauses, wipes away the tears that are streaming down his face. \"In the end, you put your hand through the hole and when you pulled it out again, you show me your palm. I was just empty. There was nothing in me.\"\n\n\t\tTommy's voice fades, as if he's run out of air. \n\t\t*choice \n\t\t\t#Comfort him with a hug. Hate to see my friends like this. \n\t\t\t\tYou sit yourself next to him and fold him into a hug. \"It's all right,\" you tell him. \"It's not real. This never happened. You're here now, with me. We're safe.\"\n\n\t\t\t\tTommy looks up at you, his eyes still wet. \"Are we?\" he asks. You know what he means. You don't respond—you don't have to. The game lies inert in your backpack right now, but you know that sooner or later you'll play again. Which means that none of you is safe. Until the game is over, and you win. \n\n\t\t\t\tTommy composes himself, disentangles his body from yours. \"I'm sorry,\" he says. \"I'm always such a crybaby.\"\n\t\t\t\t*choice \n\t\t\t\t\t#\"It's why we love you.\"\n\t\t\t\t\t\tTommy laughs nervously, but you can tell he appreciates your words. \"I love you too, you know,\" he says then. \n\n\t\t\t\t\t\t\"I know,\" you reply. You tousle his hair. Sometimes it feels as if he's the little brother you never had. \n\n\t\t\t\t\t\tHe looks at you, his expression serious again. \"Will we make it, ${name}?\" he asks. \n\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t#Act more confident than I am. \n\t\t\t\t\t\t\t\t\"Sure we will,\" you say, best poker face on. \"Of course. Why wouldn't we? Besides, we have each other.\"\n\n\t\t\t\t\t\t\t\tDid it work? \n\n\t\t\t\t\t\t\t\tTommy looks so scared and fragile sometimes. But right now he looks hopeful. \n\n\t\t\t\t\t\t\t\tNow all you have to do is trust that's for the best. \n\n\t\t\t\t\t\t\t\tSince Tommy has calmed down, you part for the night. \n\t\t\t\t\t\t\t#I can't know that. We can only do our best.\n\t\t\t\t\t\t\t\tYou say so, hoping that Tommy will appreciate honesty more than he needs false hope. \n\n\t\t\t\t\t\t\t\tIt seems to work, though he still looks uneasy. But the very act of sharing his nightmare seems to have done something to lessen his anxiety, so you part for the night. \n\t\t\t\t\t\t\t#Of course we will. I'm sure of it. \n\t\t\t\t\t\t\t\tYou say so. And you actually believe it, don't you? Whether that makes you naive or confident, only time will tell. But at least you'll make your way to the end with no fear. That must count for something. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tTommy looks bolstered. He also believes you, or at least believes in you. For better or for worse. \n\n\t\t\t\t\t\t\t\tAnd now that Tommy has calmed down, it's time to part for the night. \n\t\t\t\t\t#\"Yeah, you're annoying AF, but we don't choose our friends.\"\n\t\t\t\t\t\tTommy knows you're teasing, and he laughs. \"I thought it was family we can't choose,\" he says. \"But we do choose our friends. That's the point.\"\n\n\t\t\t\t\t\t\"Yeah, well.\" You grin. \"There you go.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tTommy smiles. He actually looks touched. \"Thank you,\" he says. \n\n\t\t\t\t\t\tNow that he's calmer, you lead him back to the front door. It's time for you both to get some rest. \n\t\t\t\t\t#\"I wish I could cry.\"\n\t\t\t\t\t\tTommy raises an eyebrow while continuing to sniffle. \n\n\t\t\t\t\t\t\"You do?\" he asks. \n\n\t\t\t\t\t\t*if brave > stat_mid_pass\n\t\t\t\t\t\t\t\"Yeah,\" you say. You always put on that brave face, and okay, it's not just for show, but you also know that you don't always let people see who you truly are and what you feel. But you know this much is true, and you admit it to Tommy now: \"There's power in vulnerability,\" you say. \"It takes a lot to be open in front of someone else.\"\n\n\t\t\t\t\t\t\t\"You're not just anyone else,\" Tommy says. \"You're my friend. I feel safe enough to be open with you.\"\n\n\t\t\t\t\t\t\tYou put your hand on Tommy's shoulder, and the formality of your words is only slightly tongue-in-cheek: \"And what an honor it is, my friend.\"\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\tYou're not a brave person. So you know what it takes to let someone else see your true feelings: a great deal of guts. It's a leap of faith, letting your guard down, allowing someone past the defenses and walls you've been building meticulously, brick by brick, for years. You don't know if you'll ever be strong enough, feel safe enough, to do so. \n\n\t\t\t\t\t\t\tYou say as much to Tommy now, in more or less these words. And then, you add: \"So never feel bad about crying in front of me, or in front of anyone else for that matter. Okay? Maybe not everyone will appreciate the strength it takes, but I do. You should feel proud of yourself.\"\n\n\t\t\t\t\t\t\tIronically, your words bring more tears to Tommy's eyes, but this time you have the feeling they're good tears, healing tears even. You clasp his shoulder and squeeze. \n\n\t\t\t\t\t\t\t\"Thank you,\" Tommy says. \n\n\t\t\t\t\t\t\tYou simply nod. You've said all you needed to say, and all Tommy needed to hear.\n\n\t\t\t\t\t\tFinally, with Tommy calmer and both of you in a good place, it's time for you to get some rest. You lead Tommy back to the front door, and you are ready to part for the night. \n\t\t\t#Offer him a hug. He's so pretty when he's sad. \n\t\t\t\t*set tommy_romance true\n\t\t\t\t*set romance_person 3 \n\t\t\t\tYou sit next to Tommy and open your arms. Without hesitating, he snuggles up to you, and you fold your arms around him. You hold him there until his breathing becomes calm and steady again. \n\n\t\t\t\tIt feels nice, to be able to be there for someone. For your body to provide comfort and safety. And it feels nice to be close to Tommy in particular. \n\n\t\t\t\tAfter a while, Tommy pulls away. \"Thanks,\" he says. His voice sounds stronger, more confident. No longer the lost boy he was a few minutes ago. \"This helped a lot.\"\n\n\t\t\t\tYou smile. \"Any time,\" you say. \"I'm always here for you. You know that, right?\"\n\n\t\t\t\tTommy reaches for your hand, holds it for a moment, then lets it go. \"I know,\" he says.   \n\t\t\t\t\n\t\t\t\tIt's time for you to part, so you lead Tommy back to the front door. \n\t\t\t#Keep my distance. \n\t\t\t\t\"It was only a nightmare,\" you say. \"Doesn't mean anything.\" \n\n\t\t\t\tIt sounds cold when spoken out loud, and Tommy reacts by clamming up. \n\n\t\t\t\t\"Yeah,\" he says. \"You're right. I'm just being silly.\" He pauses. \"As usual,\" he adds. \n\n\t\t\t\tThere is a thin line before self-criticism becomes manipulative. It's like forcing people to come to your rescue by constantly talking shit about yourself and daring them to contradict you. \n\n\t\t\t\tYou see the trap, and you sidestep it by not engaging. \n\t\t\t\t\n\t\t\t\tYou leave Tommy no option but to pick up his own pieces, pull himself together, and stand up to go. \n\n\t\t\t\tWithout another word, you lead him back to the front door. You should both get some rest, anyway. \n\t\t\n\t\t\"See you tomorrow?\" you ask. You don't mention the game. Besides, you both know that sooner or later, you'll have to play again. \n\n\t\t\"Yeah,\" Tommy says. \"Tomorrow.\"\n*else \n\t*if chosen = 1\n\t\t*goto maria_comes \n\t*elseif chosen = 2\n\t\t*goto joshy_comes \n\t*elseif chosen = 4 \n\t\t*goto catrina_comes \n\t*else \n\t\t*if (not (tommy_dead)) and (not (tommy_injured))\n\t\t\t*goto tommy_comes \n\t\t*else \n\t\t\t*if bled = 1 \n\t\t\t\t*goto maria_comes \n\t\t\t*elseif bled = 2 \n\t\t\t\t*goto joshy_comes \n\t\t\t*else \n\t\t\t\t*goto catrina_comes \n*label alone \n*page_break\nThen, finally, you're alone in your bed again. \n*label bed \n\n*if composure > stat_mid_pass\n\tYou half expect your sleep to be riddled with nightmares, but actually you sleep like a baby. \n\t*if choice_nightmode \n\t\tNot even the dark frightens you. \n\t*page_break\n\tWhen you wake, the sky outside is the fake blue of a @{hobby Fauvist painting|Mario game|cheap paperback}. \n\n\tYou are ready for school. \n\n\tIt \n\t*goto school \n*else \n\tYou sleep for a few hours, and every one of them is riddled with nightmares. \n\n\tIn the one you remember most vividly, \n\t*if (not (dig)) and (chaotic \u003c stat_mid_pass)\n\t\tyou're somewhere underground, surrounded by nothing but earth. \n\n\t\tYou don't remember being buried. But here you are; you can feel the weight of all that soil pushing against your chest. It's a miracle you're able to breathe at all. You can't see anything except your hands. \n\n\t\tLook at them. \n\n\t\tYou don't recognize them, but you know they are your own. Your nails are broken and bleeding. There is dirt under them. \n\n\t\tYou realize it's from all the digging you've been doing. \n\n\t\tAnd now you need to dig some more. So you get to it. \n\t\t*page_break Dig \n\t\tYou dig and dig, clawing your way towards…something. What do you imagine it to be? Some other world, a new city, a hole in the center of the earth? Perhaps there's nothing on the other side, no other side at all, just soil, forever. \n\n\t\tAnd all you have to do is dig. Nobody's asking you for anything else. \n\n\t\tIsn't that comforting? Knowing you only have one well-defined purpose in this life, and that's simply to use your hands to claw through the world. \n\n\t\tThen you wake, with a feeling of calm in your heart and dirt under your nails. \n\t*elseif (not (hobby = 2)) and (not (dorian))\n\t\tyou're having your portrait painted. It's a gift from your mother; in the dream, it's actually the first present she's ever given you, and you feel elated to sit for the artist, whose face you never get to see—not once in the entire time you pose for them. \n\n\t\tWhen the artist is done, your mother is called into the room to inspect the portrait. She comes and looks; she seems delighted. She claps her hands and says the portrait looks exactly like you. \"The resemblance is uncanny.\" She glances at you as if just remembering you're there. \"Do you want to see, darling?\" she asks. She's never called you \"darling\" before. \n\n\t\tYou nod. \n\n\t\tYou step down from the podium where the artist had positioned you, and you approach the easel. \n\n\t\tThe artist proudly turns the painting and holds it for you to see. \n\n\t\tAt first, you don't understand what it is you're looking at, as if it takes a few moments for your eyes to focus or your brain to make sense of the markings on the canvas. Then you see it, your face: \n\t\t*if blank\n\t\t\ta blank. \n\t\t*elseif not_my_face\n\t\t\tthat stranger, looking back at you, wondering who you are. \n\t\t*elseif bigeyes\n\t\t\tthose big, inhuman eyes, staring back at you. \n\t\t*else \n\t\t\tsomething ancient, decayed beyond recognition. \n\n\t\tYou wake up pawing at the skin on your cheeks, tracing the outline of your jaw, your hands desperate to remember what you look like. \n\t*elseif (not (hobby = 1)) and (not (zola))\n\t\tyou're an artist. You're convinced that you have been struck with inspiration. It's the only way to describe that moment—as violence. Your mind tilted, and you suddenly grasped a truth of such greatness and beauty you knew you would be unable to express it in any adequate way. Still, you had to try. \n\n\t\tIn the dream, time compressed. You spent night after night, month after month bent over an enormous canvas, trying to do justice to that single moment of true seeing you had experienced. After a while, you started viewing yourself from the outside, as if you were levitating a few inches above your body. You looked emaciated, dehydrated, unhinged. Still, you kept going. Your strength abandoned you, your energy was depleted. Soon, your senses started to go: your vision, your hearing, your sense of taste and smell. \n\n\t\tThe last thing you felt before the feeling in your fingers finally went, too, was the canvas: the linen surface rising gently, breathing in. \n\t\n\t*elseif not (knight)\n\t\tyou're trapped in an overgrown forest. You can see nothing around you and above you but the naked branches of trees you can't name, armed with hundreds of thorns. You know you have to make your way through the forest, even though you have no idea what lies on the other side. You have no weapons: no sword, no machete, no knife. All you have are your arms, unprotected by your short-sleeved shirt. And so you know that no matter what direction you go in, this is going to hurt. \n\t\t\n\t\tAnd the worst thing? This feels totally normal. This is just the way things are, and there's nothing you can do about it. \n\t*elseif not (kafka)\n\t\tyou're a master builder. You command a small army of other builders, all of whom look to you to guide them. Your materials are colorful blocks: green, yellow, blue, red. They look like a child's toys, but they're heavy and sturdy. You direct people, telling them to make large structures out of the colorful blocks: this one needs to be rectangular, that one round. There, you'll build a pyramid. \n\n\t\tYour builders follow your commands, and you watch this strange city grow around you. As it does, so does the anxiety in your gut; you never show it or whisper a word of this, but you have no idea what you're building or why. Everyone thinks you've got this, that you know what you're doing, and deep down you're just a kid playing with your building blocks, making it up as you go along. You know that one day they'll figure it out, see you for the fraud you are. \n\n\t\tAnd when that day comes, what will become of you? \n\n\t\tYou wake up to the sound of things collapsing, drenched in sweat.  \n\t*elseif not (blank)\n\t\t*set mirrors true \n\t\tyou're trapped in a house of mirrors. There is nowhere to go, and you have no idea how to get out. No matter where you stand or where you look, your face stares back at you, except it's not your face, not the face of a person at all, but a lump of unformed clay. A blank thing, inconceivable. \t\n\t*elseif not (rebecca)\n\t\tyou've just moved into the mansion of your new spouse, having left behind everything and everyone you know. In the dream, you don't remember your name, and no one ever uses it to address you. This new house you inhabit is always full of people, whole crowds of them fillin
