u didn't get into college? All you wanted was to escape this town, and you've done that. \n\t\t\t\t*else \n\t\t\t\t\tThis is what you've always wanted: Run away. Find love. Have a life worth living.  \n\n\t\t\t${day_you_leave}\n\n\t\t\tIt doesn't matter that all your belongings are waterlogged by the time you pile them onto the bus that will take you out of here. All that matters is that you're leaving. \n\n\t\t\t${city_description}\n\t\t\t*page_break\n\t\t\tJoshy is happy with his studies, and happy to be living with you as he flourishes into a young, confident man. You get yourself a job that is not much more than what you did back home, but you are able to pay your share of rent for your small studio and have enough left over to support your \n\t\t\t*set joshy_city true \n\t\t\t*goto hobby_joshy_continue\n\t\t*elseif ((maria_romance) or (maria_romance_postponed)) and (not (maria_lost))\n\t\t\tMaria auditions for a renowned dance school and gets in, so you go with her. You rent a small studio in the worst area in the city. It smells of damp and the walls are peeling, but it has hardwood floors for Maria to practice on and that makes up for everything. \n\n\t\t\tYou get a job to support yourself and help out Maria when she needs it. It's not that different from the job you had back home, but the store is a chain and the supervisors change every few months. You don't mind it. The money is meager, but you have enough left over to support your \n\t\t\t*if hobby = 1\n\t\t\t\tart. You buy yourself supplies and get into drawing with oils. You fill canvas after canvas until you're forced to start selling your work, or giving it away to friends, because the studio smells like turpentine and you're running out of space. Many of the paintings are self-portraits. Your friends tell you you're talented, but you simply look at  \n\t\t\t\t*if bigeyes\n\t\t\t\t\tyour inhuman eyes \n\t\t\t\t*elseif not_my_face \n\t\t\t\t\tthat stranger's face \n\t\t\t\t*else \n\t\t\t\t\tthat blank face \n\t\t\t\tstaring back at you from the canvas, and smile. \n\t\t\t*elseif hobby = 2 \n\t\t\t\tgaming habit. Maria never gets into gaming with you, but you don't mind. You're each happy to do your own thing and come together in your spare moments. You love each other, and that's enough. \n\n\t\t\t\tYour new favorite game is a quiet, tender thing: you play a child character that is lost in the desert and befriends a little ghost. The stakes are incredibly low; the child and her friend rarely get in trouble, and are never in any real danger. When the sun shines too hot, there will always be palm trees to shelter you. When you get thirsty, an oasis will materialize out of the haze. When night falls, a kindly camel keeper will always offer to pitch a tent for you under the stars.  \n\t\t\t\t*if tommy_ghost\n\n\t\t\t\t\tTommy sits next to you while you play. Sometimes you forget and address him while Maria is there. \n\t\t\t\t\t\"Who are you talking to?\" she asks then, and Tommy brings his finger to his lips. \n\n\t\t\t\t\t\"Nobody,\" you say. You point at the screen, the floating white blob next to the desert girl. \"Just my little ghost friend.\"\n\t\t\t*else \n\t\t\t\treading habit. You slowly fill the studio shelves with books, both old favorites and new discoveries. Maria comes home at night dead tired, her body bruised and aching. You fill the bathtub for her and sit on the lip while she soaks, telling her about the books you're reading. She seems happy to listen to you ramble on about utopias and plagues, portal fantasies, ghosts. When the water gets too cold, she gets out and wraps herself in a towel. You ask her if you're boring her with your secondhand stories. She kisses your lips, then, and tells you that hearing you talk about these books is like seeing the world through your eyes. \n\n\t\t\t\t\"And?\" you ask. \"What does the world look like?\"\n\n\t\t\t\t\"Different,\" she replies. \"Is there a greater gift than that?\"\n\t\t\t*set maria_city true \n\t\t*elseif ((catrina_romance) or (catrina_romance_postponed)) and (not (catrina_lost))\n\t\t\tYou tell Cat your decision after your last shift at work. He insists on walking you home. \"It's a celebratory walk,\" he says, a mischievous glint in his eye. \n\n\t\t\t\"What are we celebrating?\" you ask. \n\n\t\t\t\"Our new life,\" he replies. \n\t\t\t*if unsure \n\t\t\t\t\"I mean, if you still want this,\" he says, then corrects himself. \"If you still want me.\"\n\t\t\t\t*choice \n\t\t\t\t\t#Of course I do.\n\t\t\t\t\t\t*set catrina %+mid_change \n\t\t\t\t\t\tCat smiles widely. \"Really? You're sure?\"\n\n\t\t\t\t\t\t\"Of course I'm sure,\" you say. \n\n\t\t\t\t\t\tSo you leave together. Cat \n\t\t\t\t\t#I'm sorry I ever implied I was unsure. \n\t\t\t\t\t\t*set catrina %+mid_change \n\t\t\t\t\t\t\"I should never have said what I said,\" you tell Cat. \"You deserve better. Of course I want to be with you.\"\n\n\t\t\t\t\t\t\"It's okay,\" Cat says. \"You are allowed to have feelings, you know. Including uncertainty.\" He reaches for your hand. \"So I guess we're doing this?\"\n\n\t\t\t\t\t\t\"Yeah,\" you say. \"We are.\"\n\n\t\t\t\t\t\tAnd so, you leave together. Cat \n\t\t\t\t\t#Actually, I think I want to be alone for a while. \n\t\t\t\t\t\t*set left_catrina true \n\t\t\t\t\t\t*set catrina %-mid_change \n\t\t\t\t\t\tYou try to explain to Cat as mildly as you can. \"I just want a fresh start,\" you say, fumbling for words. \"It's not your fault.\"\n\n\t\t\t\t\t\tCat crosses his arms against his chest. \"You're doing the 'it's not you, it's me' thing? Really?\"\n\n\t\t\t\t\t\tYou stay silent.\n\n\t\t\t\t\t\t\"Sorry,\" Cat says. \"That was mean of me. I actually understand. It's okay.\" Cat pauses. \"Besides, we'll still be friends, right?\"\n\n\t\t\t\t\t\t\"Yes,\" you say. \"Of course. How could we not?\"\n\t\t\t\t\t\t*finish \n\t\t\t*else \n\t\t\t\t${Cat} follows you to the city without hesitation. $!{ce} \n\t\t\twas always planning to go, regardless of ${ceir} college plans; all ${ce} ever wanted was to leave this place and get to be who ${ce} really is. $!{ce} figured it would be much easier to do this away from where ${ce} grew up, from the people who'd prefer to see ${cem} stay the same. Not out of malice, even, just out of tiredness, the kind of people who'd rather everything stay the same just because getting used to anything new sounds too exhausting. \n\t\t\t*set catrina_city true \n\t\t*elseif (tommy_romance) and ((not (tommy_lost)) and (not (tommy_dead)))\n\t\t\tTommy has decided to study literature at one of the oldest colleges in the country, so when you tell him your decision, he asks you to follow him to the city, and it makes sense. \n\t\t\t*if tommy_died \n\n\t\t\t\tYour mind supplies an irrational thought: You almost lost Tommy once before. You won't let him go again. \n\n\t\t\tSo you go with him, telling yourself it'll be an adventure, like a fool. \n\t\t\t*set tommy_city true \n\t\t*else \n\t\t\tSo you go. \n\n\t\t\t*goto alone_city_continue\n\t\t*finish \n\t*if joshy_ptsd\n\t\t#Must stay close to Joshy. \n\t\t\t*set stayed_for_Joshy true \n\t\t\t*set joshy %+mid_change \n\t\t\t*set stayed true \n\t\t\t*if studies > stat_mid_pass\n\t\t\t\tYou could leave, get yourself into college. @{(ambition = 2) It's what you've always wanted, after all.|} But you just can't walk away from your friend, especially when he so clearly needs you. \n\t\t\t*else \n\t\t\t\tHow could you leave, when your friend so clearly needs you? Even if you chose to move away, go to the city, start over, you know it would only be a lie. You'd still carry this town with you, the echoes of everything that went on. Joshy would haunt you. Isn't it better to stick around and be there for him? At least that way some good might come of it, eventually.\n\n\t\t\tYou visit Joshy as soon as you're allowed to see him at the clinic. \n\t\t\t\n\t\t\tIf you're being honest, you imagined an asylum—some dreary place out of a movie, haunted by thin women with empty eyes, patients banging their heads against walls, catatonics planted in front of a TV tuned to a dead channel the color of a sky made of static. \n\n\t\t\tThe reality is relatively nice in comparison. There is a large green area in front of the main clinic building, with real grass and stone benches where some patients sit quietly, accompanied by soft-jawed nurses dressed in light-green scrubs. It feels almost confrontational, how pleasant it all seems. \n\n\t\t\tJoshy is more lucid than you expected, considering the way your mother described the whole thing to you. \n\t\t\t*if joshy_romance \n\t\t\t\tYou hesitate for a moment when you see him, but then you shoot a questioning glance at a nurse and she doesn't react, so you fold Joshy into a hug and kiss his lips lightly. He welcomes both. \n\t\t\t*if joshy_romance_postponed\n\t\t\t\tYou take his hand, hold it. \n\n\t\t\t\"So,\" Joshy says when he sees you. \"Did you expect I'd be the one who'd end up in the looney bin first?\"\n\t\t\t*choice \n\t\t\t\t#\"You make it sound like it was only a matter of time.\"\n\t\t\t\t\t\"What, before at least one of us ended up in here?\" Joshy asks. \n\n\t\t\t\t\t\"Yeah,\" you say. \n\n\t\t\t\t\t\"Don't you think it is? With everything we've been through?\" Joshy pauses. \"Everything we did?\"\n\n\t\t\t\t\t*if tommy_ghost \n\t\t\t\t\t\tYou glance at Tommy's ghost, hoping that Joshy doesn't notice. Maybe he's right. Maybe this was always going to be where one of you ended up. What's surprising is that it isn't you, considering that the specter of your dead friend follows you around. \n\t\t\t\t\t*else \n\t\t\t\t\t\tMaybe Joshy is right. \n\n\t\t\t\t\t\tMaybe you should have fallen apart. \n\n\t\t\t\t\t\tWhy didn't you?\n\t\t\t\t#\"No, to tell you the truth. I thought it'd be Tommy.\"\n\t\t\t\t\t*if tommy_dead \n\t\t\t\t\t\tJoshy looks away. \"I wish,\" he says, because of course. That would mean Tommy is still alive. \n\t\t\t\t\t\t*if tommy_ghost\n\n\t\t\t\t\t\t\tYou glance at his ghost, hoping Joshy doesn't notice. \n\t\t\t\t\t*else \n\t\t\t\t\t\tThat makes Joshy laugh. You've missed the sound. How long since you last heard him laugh?\n\t\t\t\t#\"No, I thought I'd be the one.\"\n\t\t\t\t\t*if composure > stat_mid_pass\n\t\t\t\t\t\t\"You? You've always been the serious one,\" Joshy says, \"the one who always has it together.\"\n\n\t\t\t\t\t\t\"It's all an act, of course.\"\n\n\t\t\t\t\t\tJoshy laughs. He thinks you're joking. \n\t\t\t\t\t*else \n\t\t\t\t\t\t\"Yeah, that tracks, to be honest,\" he says, laughing. \n\n\t\t\t\t\t\tYou've missed his laugh. How long since the last time you heard it?\n\t\t\t\n\t\t\t\"Are you okay, man?\" you ask. \"Do they, you know. Treat you well?\"\n\n\t\t\tJoshy shrugs. There is something in his eyes that you have no word for other than immense, unfathomable sadness. \"I'm fine,\" he says. \"I'll be fine.\"\n\n\t\t\t\"I'm so sorry, Joshy,\" you say. Because what else is there to say? \n\n\t\t\t*if (joshy_romance) or (joshy_romance_postponed)\n\t\t\t\tJoshy comes closer and brushes your cheek with his finger. He doesn't say that you did nothing wrong. You're thankful for that. \n\t\t\t*else \n\t\t\t\t\"So am I,\" Joshy says. \n\t\t\t*page_break \n\t\t\t*check_achievements nuclear \n\t\t\tYou spend about an hour together that afternoon, chatting about work and what everyone else is doing. Small nothings, just moving the air around with your mouth. Because the important thing is simply that you share space together, that you are in each other's presence. \n\n\t\t\tOn your way out, you notice a man standing very still by the exit, staring at you. He's obviously a patient, judging by his outfit. Probably in his fifties, though there's something childish about his face that makes it hard to guess his age. Glasses, mad-scientist hair, needs a shave. \n\n\t\t\tHe seems to recognize you from somewhere. \n\t\t\t*if choice_achieved_nuclear \n\n\t\t\t\tAnd you him. You're sure you've seen him before. But where? When? No matter how hard you try to remember, the room in your mind where that piece of information should be stored is empty. \n\n\t\t\tBefore you have a chance to say anything, @{choice_achieved_nuclear the man|he} disappears into an adjacent room. \n\t\t\t*page_break \n\t\t\tYou go back to visit Joshy many times after that. \n\n\t\t\t*if hobby = 1\n\t\t\t\tThe staff get to know you so well they eventually allow you to bring in your pencils and brushes—things normally too stabby for this place. \n\n\t\t\t\tThe weather is good, so Joshy and you sit outside on the stone benches, and you spend long silent hours drawing your friend. Joshy enjoys it, and so do you, even \n\t\t\t\t*if bigeyes\n\t\t\t\t\tthough his eyes always come out unnaturally big, like yours.  \n\t\t\t\t*elseif blank \n\t\t\t\t\tthough his face always comes out blank, like yours used to. \n\t\t\t\t*else \n\t\t\t\t\tif, when you turn around your paper to show him your work, you realize the face is all wrong—not his face, and not yours either, but an amalgam of both. \n\n\t\t\t\tStill, it seems to be good for him. It makes him calmer, happier: the regularity of it, the shared ease. \n\n\t\t\t\tAnd yet, that shadow in his eyes remains unchanged, no matter how many times you come. \n\t\t\t*elseif hobby = 2\n\t\t\t\tYou spend afternoons playing games with your friend, board games with so many missing pieces you're forced to make up rules of your own, as arbitrary and nonsensical as everything else in your life. \n\t\t\t*else \n\t\t\t\tYou spend long hours sitting on the grass side by side. Sometimes you read to him from your books: about ghosts, and mirrors, and portraits that are always both too true to life and never complete enough to truly capture a face. \n\t\t\t\t\n\t\t\tThe patient you encountered the first time you visited keeps his eye on you. Until one time, as you're leaving, he reaches out a hand and touches your shoulder. It could have spooked you, but for some reason it doesn't feel threatening.\n\t\t\t\n\t\t\t*check_achievements nuclear \n\t\t\t\"I have something to tell you,\" he says. @{choice_achieved_nuclear \"I think you already know what it is. But you still need to hear it.\"|\"Come back when you're ready to listen.\"}\n\t\t\t*page_break\n\t\t\tEventually the day comes that Joshy is told he can switch to outpatient treatment. He has asked you to accompany him, so you go, helping him gather his few things. You say goodbye to the nurses and to some of the other patients that Joshy has grown fond of. \n\n\t\t\tAnd then, you spot the mad-scientist guy, watching you as always. He gestures for you to follow him, and because it's now or never, you do. \n\n\t\t\tHis room is small and dark, the window covered by newspapers. There are stacks of books and magazines everywhere. Hand-drawn diagrams cover the walls. \n\n\t\t\tThe man clears a stack of magazines from a chair and invites you to sit. \n\n\t\t\t\"Thank you for coming,\" he says. \"We don't have much time.\"\n\n\t\t\t\"It's okay, Joshy needs to go over some paperwork,\" you say. \"We have time.\"\n\n\t\t\tThe man shoots you a meaningful look. His eyes have an intensity that makes you squirm a little in your seat. \"That's not what I meant,\" he says. \"You know that.\"\n\n\t\t\tDo you? \n\t\t\t*check_achievements nuclear \n\n\t\t\t\"You have played the game,\" the man says. It is not a question. \"You must have wondered where it came from.@{choice_achieved_nuclear \"| What it wants.\"}\n\t\t\t*if choice_achieved_nuclear \n\n\t\t\t\tSomehow, you already know what this man is going to say. \n\n\t\t\t\tHe thinks the game is a result of that nuclear accident that kept you all inside that summer when you were children. He thinks the game evolved then. Became sentient. \n\n\t\t\t\tYou tell him all of this. \n\n\t\t\t\tHe raises his eyebrows. \"How…\" he starts, trails off. \"How did you know?\"\n\n\t\t\t\t\"I'm not sure,\" you reply. \"I know that the game wants things now. But what?\"\n\n\t\t\t\tThe man wets his lips. \"I think it wants to continue existing,\" he says. \"It is a game, so what it wants is to be played.\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"So what am I supposed to do?\"\n\t\t\t\t\t\tThe man lowers his gaze and shakes his head. \"I don't know,\" he says. \"Warn others? Don't let anyone else play, if you have a choice.\"\n\t\t\t\t\t\t*goto leave_man \n\t\t\t\t\t#\"What would you do in my place?\"\n\t\t\t\t\t\tThe man laughs at your question. \"What did I do, you mean,\" he says. He gestures towards the diagrams, the books, the magazines, then to the room around him, and the institute beyond. \"Isn't it obvious? I lost my mind. But I never stopped talking to anyone who would listen.\"\n\t\t\t\t\t\t*goto leave_man \n\t\t\t\t\t#I understand. I thank him for trusting me.\n\t\t\t\t\t\t*goto trust \n\t\t\t*choice \n\t\t\t\t#\"And you can tell me that?\"\n\t\t\t\t\t\"I can try,\" the man says. \"I've long discovered that's all I can do. Whether you believe it or not is up to you. Now listen.\"\n\t\t\t\t#\"How do you know I played the game?\"\n\t\t\t\t\t\"Don't stall,\" the man says. \"Listen.\"\n\t\t\t\t#\"I have no idea what you're talking about.\"\n\t\t\t\t\tThe man shakes his head. \"Don't do that. I told you we don't have time. Listen.\"\n\n\t\t\tThe man proceeds to tell you that the game is the result of that nuclear accident that kept you inside that summer when you were a child. \"It…evolved,\" he says.\n\n\t\t\t\"You speak of it as if it were alive. Sentient. As if it knows, as if it wants.\"\n\n\t\t\t\"Well isn't it? Doesn't it?\" The man wets his lips. \n\n\t\t\t\"What does it want, then? And you say it evolved. That means it existed before in some way.\"\n\n\t\t\t\"Yes,\" the man says. He is sounding more and more desperate to say what he has to say. To be believed. \"It has existed for a very long time. I don't know how long. Maybe forever. Since the dawn of time. And it wants to continue existing. It is a game, so all it wants is to be played. But the energy released in the accident gave it the power to escape its confines. Spill over.\"\n\t\t\t*if not (choice_achieved_nuclear)\n\t\t\t\t*achieve nuclear \n\t\t\t*choice \n\t\t\t\t#This sounds insane. I don't believe a word of it. \n\t\t\t\t\tYou nod. The man is clearly unhinged. Better not to contradict him; who knows what he might do? \n\n\t\t\t\t\t\"Okay,\" you say. \"I'll keep all this in mind going forward.\"\n\n\t\t\t\t\tThe man gives you a sideways glance. He can tell you don't believe him. He looks forlorn. Devastated. \"Thank you for listening,\" he says. \n\n\t\t\t\t\tYou stand up. \"Well,\" you say. \"Good luck.\"\n\t\t\t\t#What am I supposed to do with this information? \n\t\t\t\t\t\"Is there anything we can do to fight it?\" you ask. \"Stop it?\"\n\n\t\t\t\t\tThe man lowers his head. He gestures towards his diagrams, the books, the magazines. \"I've been trying to figure this out ever since I first discovered the truth. But I can't—especially not from in here. So I've been telling whoever I think will listen.\" He pauses. \"You're out there, not in here. Tell others. Warn them. Maybe, if nobody plays, we can starve this beast.\"\n\t\t\t\t#Thank him for trusting me. \n\t\t\t\t\t*label trust \n\t\t\t\t\t\"It must be hard to share something that has made everyone else believe you are mad,\" you say. \"So thank you for trusting me.\"\n\n\t\t\t\t\tHis eyes fill with tears. \"Thank you for listening,\" he says.  \n\t\t\t*label leave_man \n\n\t\t\tAs you leave, you are unusually quiet, your mind still echoing with the man's words. Joshy notices, but he doesn't ask you what's wrong. You wonder if the man has talked to him about his theory, too. \n\n\t\t\tYou wonder if Joshy believed it. \n\t#Who am I kidding? I can never leave this town. \n\t\t*label stay_test\n\t\t*set stayed true \n\t\tYou may have fooled yourself with this dream of leaving one day, of \n\t\t*if ambition = 2\n\t\t\tgoing to college and getting your degree, making a different life for yourself. But you know by now the problem with dreams.  \n\t\t*elseif escapism = 2\n\t\t\tescaping the kind of fate that awaited your parents. But you know better now. \n\t\t*else \n\t\t\tmaking for yourself a fate different from your parents'. But you know they had dreams once, too. You've seen by now what happens to them. \n\t\tAll dreams can give you is a greater height to fall from. They make the roller coaster steeper. Hope is the most dangerous vice. \n\n\t\tSo you stay. \n\n\t\t*if joshy_ptsd \n\t\t\tYou don't even visit Joshy at the clinic. You just can't face him in that place—you don't really have any reference for it other than what you've seen in movies and books, so you imagine it as a dreadful institute where people are stowed and forgotten. You think that your mind wouldn't be able to cope with the dissonance of seeing your sunny friend in that context if you went. It might make your brain melt. \n\n\t\t\tThat's your excuse, anyway. \n\t\t\t*if (joshy_romance) or (joshy_romance_postponed)\n\t\t\t\tIf there ever was anything between you and Joshy, by the time he is discharged it has petered out for good. \n\t\t*elseif (joshy_romance) and ((not (joshy_ptsd)) and (not (joshy_lost)))\n\t\t\tJoshy asks to see you before he leaves for college, but you avoid him. He leaves messages with your mom. You reply to none. \n\n\t\t\tOn the day he's meant to get on that bus to the city, you watch him from afar. It's pouring—an insistent kind of rain that soaks your clothes and chills your skin. Joshy doesn't see you, but you track the bus until it disappears in the distance.\n\t\t*elseif ((maria_romance) or (maria_romance_postponed)) and (not (maria_lost))\n\t\t\tWhen you announce your decision to Maria, she tells you she auditioned for a dance school in the city and got in. She begs you to follow her. \"It will be great,\" she says. \"I'll do what I love, and you'll do your @{hobby art|gaming and computer things|reading and literary festivals}. And we'll have each other.\" She looks at you, her eyes wide and hopeful. \"Please.\"\n\t\t\t*choice \n\t\t\t\t#No. I'll only get in the way. \n\t\t\t\t\t*set left_maria true \n\t\t\t\t\t*set maria %-small_change \n\t\t\t\t\tMaria is standing in front of the counter at the convenience store. You still have hours to go before your shift ends, and you're not supposed to chat with your friends while you're on the clock, not even if your friends buy something, which would earn them the title of customer. You're supposed to be friendly with customers, unless they're actually your friends. Your supervisor has already shot you a stern look from across the store. \n\n\t\t\t\t\tBut Maria is close to tears. \n\n\t\t\t\t\t\"I can't,\" you tell her. \"Can't do that to you. Don't you get it? I'd only stand in your way.\"\n\n\t\t\t\t\t\"I don't think that's for you to decide,\" Maria replies mildly. She picks up another chocolate bar from the counter and hands it to you so you can scan it and add it to the pile of things she doesn't need. \"Let me be the judge of what is helpful to me and what is an obstacle. And I'm telling you, you're not an obstacle.\"\n\n\t\t\t\t\tYou scan the chocolate bar and then look at Maria again. \"Will that be everything?\" you ask in your cashier voice. \n\n\t\t\t\t\tMaria's jaw clenches. \"Yeah,\" she says. \"That will be all.\"\n\n\t\t\t\t\tYou print out her receipt and collect her money. \n\n\t\t\t\t\t\"I'm sorry,\" you tell her, but she holds up a hand to stop you from saying anything else. \n\n\t\t\t\t\t\"Keep the change,\" she says over her shoulder as she turns around and walks out.  \n\t\t\t\t#Okay, I'll go with her.  \n\t\t\t\t\t*set follow_maria true \n\t\t\t\t\t*set left true \n\t\t\t\t\t*set stayed false \n\t\t\t\t\t*set maria %+mid_change \n\t\t\t\t\t\"You don't have to argue so hard,\" you say. \"I'll come.\"\n\n\t\t\t\t\tMaria's eyes widen even more. \"Really? You mean it?\"\n\n\t\t\t\t\t\"Of course,\" you say. \"I'd do anything for you.\"\n\n\t\t\t\t\tFor some unfathomable reason, she believes you. \n\t\t\t\t\t*finish\n\t\t\t\t#I don't deserve it. \n\t\t\t\t\t*set left_maria true \n\t\t\t\t\t*set maria %-small_change \n\t\t\t\t\tYou tell her as much. \n\n\t\t\t\t\t\"What are you talking about?\" Maria asks. \"Of course you do.\"\n\n\t\t\t\t\t*if (tommy_dead) or (lost_friend \u003c 5)\n\t\t\t\t\t\t\"Why do I get to leave and \n\t\t\t\t\t\t*if tommy_dead \n\t\t\t\t\t\t\tTommy\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t@{lost_friend BUG|Joshy|Tommy|${Cat}|BUG} \n\t\t\t\t\t\tdoesn't?\"\n\n\t\t\t\t\t\t\"Because you're alive, ${name},\" Maria replies, though the expression on her face is pained. \"Because you're here. That ought to be enough.\"\n\n\t\t\t\t\t\tYou shake your head. \"I'm sorry, it isn't. Not for me.\"\n\n\t\t\t\t\t*elseif tommy_ghost \n\t\t\t\t\t\tYou glance at Tommy's ghost and try to imagine what life with Maria in the city would be like: living in a house with her and with Tommy's ghost, sleeping in a bed with them, sitting around a table and watching Tommy staring as you eat, going out with him trailing behind you, following you through parks, orbiting you at parties like a sad, lonely moon. \n\n\t\t\t\t\t\t\"I can't, Maria,\" you tell her. \"I'm sorry. I just can't.\" \n\n\t\t\t\t\t\tSo you don't. \n\t\t\t\t\t*else \n\t\t\t\t\t\tIs there any way to explain it? This deep feeling of worthlessness? How do you tell her that you just…don't deserve good things, because you are a nothing person? You are a void, and nothing belongs in a void. \n\n\t\t\t\t\t\t\"I just can't,\" you say. \"I'm sorry.\"\n\t\t\t\t\t\n\t\t\t\t\tMaria hangs her head. You can see she's fighting back tears. \"All right, ${name},\" she says. She raises her eyes to meet yours. \"There's still time, though, you know. I don't leave for another couple of days. You can still change your mind.\"\n\n\t\t\t\t\tYou allow yourself one brush of her cheek. \"I know,\" you reply. But you don't change your mind. \n\t\t*elseif (catrina_romance) and (not (catrina_lost))\n\t\t\t*check_achievements comeout\n\t\t\t*if not (choice_achieved_comeout)\n\t\t\t\t*bug Cat hasn't come out. \n\t\t\t*page_break\n\t\t\tWhen you tell ${Cat}, during your afternoon shift at the convenience store no less, ${ce} begs you to go with ${cem} to the city. $!{ce} doesn't actually have any plans beyond moving there and then looking for a job. I guess you could do the same, live in uncertainty together. It would be an adventure: ${Cat}'s definition of one, at least. \n\t\t\t*choice \n\t\t\t\t#No. I've made up my mind.  \n\t\t\t\t\t*set left_catrina true \n\t\t\t\t\t*set catrina %-mid_change \n\t\t\t\t\t\"I can't do it, ${Cat},\" you say. \"My place is here.\"\n\n\t\t\t\t\t${Cat} throws ${ceir} hands in the air. \"But why? I don't get it.\" $!{ce} gestures at the convenience store around you. \"Your place is not here any more than mine is. What makes you different? Why don't you, ${name}, specifically deserve a fucking chance to do something different with your life?\"\n\n\t\t\t\t\t\"You're angry at me.\"\n\n\t\t\t\t\t\"No shit! Jesus. You really get on my nerves sometimes.\" \n\n\t\t\t\t\t\"I'm sorry, ${Cat}. But this is my decision. You have to respect it.\"\n\n\t\t\t\t\t\"Respect it?\" ${Cat} laughs. \"Nah. All I have to do is accept it.\" $!{ce} drops another chocolate bar on the pile of things on the counter. \n\n\t\t\t\t\tOut of habit, you ring it up and give ${cem} the total. \n\n\t\t\t\t\t\"Fuck off, ${name},\" ${Cat} says. Then ${ce} turns around and leaves. \n\n\t\t\t\t\tYou don't know it yet, but that will be the last time you see ${cem}.  \n\t\t\t\t#Okay, I'll go with ${cem}. I'd do anything ${ce} asked. \n\t\t\t\t\t*set catrina_city true \n\t\t\t\t\t*set city true \n\t\t\t\t\t*set quit true \n\t\t\t\t\t*set catrina %+mid_change \n\t\t\t\t\t*set stayed false \n\t\t\t\t\t\"Okay,\" you tell ${cem}. \"Sounds like fun.\"\n\n\t\t\t\t\t${Cat} actually takes a step back when you say that. \"Wait, really? I thought you would be harder to convince.\"\n\n\t\t\t\t\tYou laugh. \"Don't you get it, ${Cat}? I'd do anything for you. All you had to do was ask.\"\n\t\t\t\t\t*finish \n\t\t\t\t#Ask ${cem} to stay instead. \n\t\t\t\t\t\"I can't do it, ${Cat},\" you say. \"But maybe…\"\n\n\t\t\t\t\t\"Maybe what, ${name}?\"\n\n\t\t\t\t\t\"Maybe you could stay.\"\n\n\t\t\t\t\t${Cat} takes a step back. \"You know leaving is the only thing I've wanted in, like, forever.\" $!{ce} pauses. \"Since I remember myself. You can't ask that of me.\"\n\n\t\t\t\t\t\"You don't have to,\" you say. \"It's just an idea. We could stay together. Surely that should make a difference?\"\n\n\t\t\t\t\t*if catrina > stat_hi_pass \n\t\t\t\t\t\t*set catrina_stayed true \n\t\t\t\t\t\t${Cat} thinks about it long enough to make your supervisor cough eloquently across the store. \n\n\t\t\t\t\t\t\"Fine,\" ${Cat} says then. \"I'll stay. Start looking for a place, I guess. We'll move in together.\"\n\t\t\t\t\t*else \n\t\t\t\t\t\t$!{ce} doesn't need long to make up ${ceir} mind. \"No, ${name}. I'm sorry. That's the one thing I can't do.\" $!{ce} adds another chocolate bar ${ce} doesn't actually want to the pile that's been building on the counter, trying to placate your glaring supervisor from across the store. Then, ${ce} allows ${cemself} to lean over the counter and place a single kiss on your cheek before ${ce} leaves. \n\t\t\t\t\t\t*set catrina_left true \n\t\t*elseif (tommy_romance) and ((not (tommy_lost)) and (not (tommy_dead)))\n\t\t\tBut when you share your decision with Tommy, he asks you to follow him. \"We'll get a studio, and you can get a part-time job while I go to school, and then we'll @{hobby go to galleries|play games|read books or go to libraries} together. It'll be fun.\" \n\t\t\t*choice \n\t\t\t\t#Okay, fine. \n\t\t\t\t\tHe makes it sound so nice. Even though you know this is where you belong, you've always had a soft spot for Tommy. It's so hard to tell him no. \n\n\t\t\t\t\t\"Okay, Tommy,\" you say. \"We'll do that, then.\"\n\n\t\t\t\t\tTommy does a double take. He didn't actually expect you to agree. \"Really?\" he stammers. \n\n\t\t\t\t\tYou can't help but smile. \"Yeah,\" you say. \"Really.\"\n\t\t\t\t\t*set follow_tommy true \n\t\t\t\t\t*set tommy %+mid_change \n\t\t\t\t\t*set left true \n\t\t\t\t\t*set stayed false \n\t\t\t\t#No. I've made my decision.  \n\t\t\t\t\t*set left_tommy true \n\t\t\t\t\t*set tommy %-mid_change \n\t\t\t\t\tTommy is right, it does sound like fun. But you've already made up your mind: your place is here. You belong here. \n\n\t\t\t\t\t\"I'm sorry, Tommy,\" you say. \"I can't leave.\"\n\n\t\t\t\t\tHe's close to tears. \"But why? I don't get it.\"\n\n\t\t\t\t\t\"It's okay. You wouldn't.\" That comes out a bit more harshly than intended. Or perhaps exactly as you intended it. \n\n\t\t\t\t\t\"What's that supposed to mean?\" Tommy asks. He looks hurt. With his supportive, affluent parents and his effortlessly good performance, he's always felt privileged in comparison to the rest of you. His greatest fear has always been that you'd blame him for that privilege. And now, it seems you have. \n\n\t\t\t\t\t\"Nothing, Tommy. Just go. Live your life, follow your dreams or whatever. But I'm staying.\"\n\n\t\t\t\t\t\"Fine,\" Tommy says. He adds another chocolate bar to the pile of snacks he doesn't need and nods at you to ring everything up, which you do. \"Stay. But when you try to blame everyone else for the miserable years ahead of you, remember that you could have made a different choice.\"\n\n\t\t\t\t\tHe leaves a few crumpled bills on the counter before he leaves. \n\t\t\t\t#Ask him to reconsider. \n\t\t\t\t\tIt's selfish, you know that. Tommy has the background and the potential to be great at whatever he chooses to do. But isn't friendship just as valuable? Isn't love? \n\n\t\t\t\t\tYou can't leave. But maybe he could stay. \n\n\t\t\t\t\t\"Stay?\" he echoes. \"What do you mean? Not go to college?\"\n\n\t\t\t\t\tIt does sound far-fetched when he says it. Selfish. Destructive. Whatever. \"Yeah,\" you say. \"Stay here, with me.\"\n\n\t\t\t\t\t*if tommy > stat_hi_pass\n\t\t\t\t\t\t*set tommy_stayed true \n\t\t\t\t\t\tTommy takes a long time to think about it. You can see the thought process behind his eyes: the fear, the doubt, the risk assessment, the hope. In the end, hope wins out. \"Okay,\" he says. \"Okay, ${name}. If that's what you want.\"\n\t\t\t\t\t*else \n\t\t\t\t\t\tTommy thinks you're joking. He laughs. \n\n\t\t\t\t\t\tYou let his laugh peter out as you stare at him. \n\n\t\t\t\t\t\t\"Oh,\" he says. \"Oh, I see.\" Then he shakes his head. \"I'm sorry, ${name}. I can't. My parents, they…\" He doesn't finish the sentence, and he doesn't have to, because you both know it would have been an excuse. He loves you, you know that. He wants to stay with you. He just wants something else more. \n\t\t*else \n\t\t\tOf course you do. \n*page_break\n*label new_cohort \nYou work your shift at the convenience store—take on a few more, in fact, to your supervisor's delight. \n\nBack when you first started this job, you imagined the day you would quit. Sometimes you thought it'd be dramatic: you'd rip off your uniform and cast it at your supervisor's feet or something. Other times it was a quiet, adult departure: giving your notice, folding up your uniform, emptying your locker, parting with a handshake, that sort of thing. \n\nAnd now? Here you are, still here, no quitting in sight. \n*if ate_ghost\n\tYou stand behind the counter and say good morning and good evening and hello, you ring up plastic-wrapped products and drop them into plastic bags, you stock shelves with canned goods and candy bars, and the whole time you feel that ghost within pushing against your flesh, its fingers tracing words on the inside of your skin. You try to spell them sometimes, imagine this as some form of communication, but all the words come out anarchic, unknowable, just jumbled strings of letters that you cannot untangle into meaning, no matter how hard you try. \n*else \n\t\n\tSo you go through the motions. Stand behind the counter, ring up products, make up stories about them, stock the shelves. Customers call you by the name on your name tag, and sometimes that gives you a jolt, as if it's a surprise that someone noticed you, acknowledged you, thought to use a name for you when it takes so much effort to be a person at all. \n*page_break\n*if catrina_stayed\n\tYou and ${Cat} eventually move in together, much to your parents' dismay. It's a quiet life, and it's easy to live with ${cem}. Quickly, you fall into a routine: you each go to your respective jobs, then reconvene when your schedules align to \n\t*if hobby = 1 \n\t\tspend some time together. Occasionally, you ask ${Cat} to pose for you, and you draw ${cem}. You marvel at the things you discover about ${cem}, as if each time you see ${cem} anew: the curve of a shoulder, the angle of an elbow, the depth of a shadow on ${ceir} cheek. It seems to you the only way to really know ${cem}. \n\t*elseif hobby = 2\n\t\tplay games together. You got ${cem} hooked on your handheld first, and then you pooled your finances to invest in a proper console. ${Cat}'s favorite game is a strange platformer where you play an owl whose objective is to clear different terrains—forests, castles, deserts—while feeding on small animals and avoiding getting caught in various human-made structures along the way. Even though the whole game takes place at night, the environment never ceases to surprise you with how colorful it can be. It's given you a new appreciation of how many shades of black and blue there are. \n\t*else \n\t\tspend some time together, you with your nose in a book and ${Cat} listening to music and dancing in the middle of your tiny studio until ${ceir} legs give out and ${ce} collapses on you, out of breath. \n\n\tIt's not a bad life. \n\t*if tommy_ghost \n\t\t\n\t\tEven Tommy seems content to share this space with you, quietly existing, making no demands and no complaints. \n*elseif tommy_stayed\n\tYou move in with Tommy in an apartment you can only afford because he pays most of the rent. His parents weren't happy with his decision, but it turns out they didn't have the heart to cut him off, either, so he continues to have an allowance to support himself (and you) while he \"figures out what to do with his life.\" \n\n\tIn reality, all he wants is for the two of you to spend time together. \n\n\tSo that's what you do. You quickly fall into a routine: you go to work while Tommy takes walks or stays home reading, and then you come back \n\t*if hobby = 1 \n\t\tand draw him. It starts as a joke, imagining Tommy's different versions, the many lives he could have lived instead of this one: Tommy as a scientist, Tommy as an explorer, Tommy on the moon. But gradually your sketches take on a more sinister slant, your visions slowly darken: Tommy as a soldier, Tommy alone on an island inhabited by the shades of the dead, Tommy lost in a maze. He makes no comment about this when you show him the drawings, only holds you close and places a kiss on each of your cheeks. \n\t*elseif hobby = 2 \n\t\tand play games together on the new console Tommy bought for you: strategy games and riddle games and role-playing games. Anything except shooters. \n\t*else \n\t\tand join him reading on the couch, legs intertwined. You can spend hours like this, side by side in quiet companionship. \n\n\tIt's not a bad life. \n*else \n\tIt doesn't make financial sense to move out of your parents' house, and even if you wanted to you couldn't afford it. \n\t*if pay_mother\n\t\tYour mother makes your life difficult in any way she can and never fails to tell you how useless she thinks you are, how tiresome, how much of a burden. \n\n\t*if tommy_ghost\n\t\tThe house seems to have fallen quiet around Tommy's presence, as if everything else that inhabits its walls feels somehow timid around the presence of your dead friend. You catch Tommy staring at the walls occasionally, listening to something you can't hear—and for that, at least, you're grateful. \n\t\t*if tommy_romance\n\n\t\t\tSometimes, when you're @{hobby poring over your sketchbook or applying oil paint to canvas|absorbed in some game or other|absorbed in a book}, when you least expect it, Tommy reaches for your hand. You reach too, and you almost touch, but always stop short of touching. \n\t*else \n\t\tThe house continues to grow more and more haunted around you, its chorus of nightly creaks and moans keeping you up until morning. It almost makes you grateful for the night shifts at work. \n*page_break\nAt the end of summer, the new school year starts, and your feet take you back to your old school. You watch the new students pool toward it the way you used to, as if caught in its gravitational pull. \n\nYou have the day off from work, so you hang around until the end of the school day, lingering near the exit like some kind of pervert. \n\nThat's when you see them, this group of five, and you recognize something in them: tough kids, lonely kids, kids with so much love to give. They congregate outside the gym. One of them sets their backpack down and pulls out the game. Holds it reverently, their fingers running over the smooth screen. \n*check_achievements second_ending alternate \n*if smash\n\n\tYou can't believe your eyes. You saw the game destroyed. You did it yourself, with your own hands. \n\n\tHow is it back? \n*if bury \n\n\tBut you buried it. You made sure no one would find it for years and years to come. \n\n\tHow can it be? \n*if (choice_achieved_alternate) and ((smash) or (bury))\n\n\tMs. Harper warned you about this@{Harper_alternate | before, didn't she? Long ago}. She told you not to doubt your sanity. \n\n\tPerhaps this is when you need to follow that advice.\n*choice \n\t#Warn the students. \n\t\t*if (composure >= 40) or ((composure > stat_lo_pass) and (kept_message))\n\t\t\tYou walk up to them calmly and without hesitation. The students look alarmed; they cluster, forming a protective circle around the student holding the game. \n\n\t\t\tBut they don't run away. That's something. \n\n\t\t\t\"Don't play,\" you say. \"Don't say yes. The game will ask you to stand before this door and say cruel things about each other. It will seem innocent at first, but it's not. Don't do it.\" @{kept_message You even show them the deranged message you kept from the Internet conspiracy theorist, as if it proves anything.|} \n\n\t\t\tThe kids exchange glances. \n\n\t\t\t\"What if we already have?\" a girl asks. \n\n\t\t\tYou understand then that it's too late. The game got to them before you could. \n\n\t\t\tStill, maybe there's more you can do. It's not game over yet, after all. \n\n\t\t\tMaybe this time you can make a difference. \n\t\t\t*set student_guide true \n\t\t*else \n\t\t\tYou run towards the kids, waving your arms. The kid with the game slips the device quickly into their backpack. They all back away from you, ready to run. You beg them not to. \n\n\t\t\t\"No, listen,\" you say. \"You don't understand. You can't play this game.\"\n\n\t\t\t\"What game?\" a girl asks. \n\n\t\t\t\"You know what game I'm talking about,\" you say, pointing at the backpack. \"Don't do it. Just don't play. Don't say yes. Don't do what it says. You'll regret it.\" \n\t\t\t*if kept_message \n\t\t\t\tYou even show them the deranged message you kept from that Internet conspiracy theorist. As if that would help your case. \n\n\t\t\tThe girl exchanges glances with the others. Then they all laugh. \n\n\t\t\t\"Leave us alone, man,\" another kid says. \"Where do these crazies come from?\"\n\n\t\t\tIt's a sinking feeling, isn't it? Realizing you're too late. Watching a disaster unfold and knowing there's nothing you can do to stop it, like a bullet already fired, a knife already twisted, a train hurtling towards the edge of a cliff. \n\t\t\t*set student_haunt true \n\t#Spare the students. Take their place. \n\t\tThe game needs its flesh, so maybe that can be you. @{fungible Maybe people are fungible after all. All you need to do is test that theory.|}\n\n\t\tMaybe you can go back in. Play again. \n\t\t*page_break \n\t\t*set trapped true \n\t\t*set spared_students true \n\t\tStealing the game from that student is not your finest moment. You follow them when they leave school like some kind of stalker and ambush them after their friends have fallen away one by one, each going in a different direction. The student pauses for a few moments to tie their shoe, and you take your chance: you snatch their backpack and run away. Then you feel bad about taking their papers, so you extract the device and discard the bag, hoping the student will find it eventually. Thankfully, it's a dry day. \n\n\t\tAnd now, here you are. Back where you started, the game in your hands@{smash , intact|}. \n\n\t\tYou don't know if it's going to work. There are no messages for you on the game's screen, no instructions. The device has been completely inert since you laid your hands on it again. So you do the only thing you can think of: you show up at the same door and hope the game lets you in. \n\t\t*page_break \n\t\tYou are back in front of the gym door. It looks entirely unremarkable, like the first time; there's nothing to hint at what might lie beyond it (other than a gym, that is). \n\t\t\n\t\tAnd yet. You know better than that. \n\n\t\tHow does it feel to be back here? \n\t\t*choice \n\t\t\t#Terrifying.\n\t\t\t\tYour knees feel weak. There is a flutter in your chest. But you know this is where you need to be. This is what you need to do. \n\t\t\t#Exciting. \n\t\t\t\tYou'd be lying if you said otherwise. And what's the point of lying now? It's just the two of us here, after all. \n\n\t\t\t\tThis is between us. \n\t\t\t#Like a homecoming. \n\t\t\t\tIt's strange, isn't it, how some moments in our lives take on this uncanny significance? When a place is transformed from just a space into a home, when a person changes from a stranger to a friend to family, someone you recognize with your skin and with your lungs. \n\n\t\t\t\tAnd this? You recognize this.  \n\t\t*page_break Try The Door\n\t\tYou try the door, breath held, unsure if it will open. \n\n\t\tBut then the game lets you in. \n\n\t\tI let you in. \n\t\t*page_break Walk Through The Door\n\t\tYou take a step through the threshold and you're back in the game's sand room. \n\n\t\tI remember when I was a player, that first day. The first time I walked into the game. I remember not wearing any shoes, though that makes no sense: why wouldn't I be wearing shoes? My toes dipped into the sand, and I was surprised at how cold it was.\n\n\t\tBut this isn't about me, is it? This is about you. \n\n\t\t*if (chaotic > stat_hi_pass) or (composure \u003c stat_lo_pass)\n\t\t\tYou walk as far as you can into the room, feet sinking into the sand. Then you take out the pocketknife you brought with you and nick your finger. \n\n\t\t\tAs the first drop of blood hits the sand, the air changes, like last time. The room wasn't foggy before, but this is the only way to describe it: it feels as if a fog parts, a mist lifts, and there's another door in front of you now where you could have sworn there was nothing at all before, just empty air, more space, more endlessness, more sand. \n\t\t*else \n\t\t\tYou take in the room for a few moments: the vastness of it, the impossible enormity. \n\n\t\t\tAnd then you try the same thing you did the first time: nick your finger with a small pocketknife you brought with you, let the blood drip onto the sand, make a little red circle. But this time there's no gush of wind, no movement in the air. The door remains closed. \n\n\t\t\tYou try again. A different finger, a different shape in the sand. You wait. You plead. \n\n\t\t\tNothing works. \n\t\t\t*if hack \n\n\t\t\t\tI told you not to come back here. \n\n\t\t\tSlowly, it dawns on you: you're trapped@{hack | here}. \n\t\t\t*set sand true \n\t\t\t*finish \n\t\t*page_break Open It \n\t\tYou're back in the shed, with its corrugated walls and camouflage netting. Everything is exactly the same: the CHECKPOINT sign, the table with the weapons and badges, the screams beyond. \n\n\t\t*if (athletics > stat_hi_pass) or (brave \u003c stat_lo_pass)\n\t\t\tSo you make your choice. Pick up your weapon, your badge. Walk out of the shed and into the city, the smoke, the smell of charred flesh.\n\n\t\t\tIt shouldn't be possible to get through this level alone. It's a team game; collaboration is central to success. \n\n\t\t\t*if athletics > stat_hi_pass\n\t\t\t\tBut you try anyway. It's a foolish thing to do, you know it. And, impossibly, you succeed. The EXIT button is waiting for you on the third floor of the crumbling building, like the last time. \n\t\t\t*else \n\t\t\t\tBut you somehow succeed regardless. You're so self-protective that you manage to slip away unnoticed by the other teams you come across in the city, and make it all the way to the third floor of that building. Like the last time, you press the EXIT button. \n\n\t\t\tLike the last time, the game lets you out. \n\t\t*else \n\t\t\t*set war true \n\t\t\tYou know from the moment you set foot in here that it's impossible to beat this level alone. \n\n\t\t\tThat's the basic premise of a collaborative game: if there's no one to collaborate with, unless you're incredibly lucky or some kind of Chosen One, you will lose. \n\t\t\t\n\t\t\tAnd lose you do. \n\t\t\t*finish \n\t\t*page_break\n\t\tThe game lets you out, and in again. \n\n\t\tYou're in the maze. All the lights are on. You can hear the ghostly chiptune melody growing louder in the distance. \n\n\t\t*if (insight > stat_hi_pass) or kafka \n\t\t\tBut as you make your way through it, something feels different this time. \n\n\t\t\tSomething deep inside you simply understands how the maze works. It just makes sense to you; you can intuit the way it is laid out and figure out the best way through even though there are no obvious signs to guide you. \n\n\t\t\tYou find the fruit and pick it up, but instead of eating it, you hold on to it. The ghosts see you. It could be your imagination, but the first one you encounter stares at you, suspicious, unsure, as if befuddled by the uneaten fruit in your arms. And then, it turns around and leaves you alone. \n\t\t*else \n\t\t\t*label lost_in_maze \n\t\t\tYou are faced with choice after choice. Make decision after decision. The ghosts close in on you time after time, forcing you to run away. \n\n\t\t\tSlowly, it dawns on you. \n\n\t\t\tYou are lost. @{bargained No matter what you do, you never find your friend.|}\n\n\t\t\tThe ghosts close in on you again. Your legs are tired, your chest burns. You are thirsty beyond belief. You can feel the ghosts' cold fingers on the back of your neck, their music flooding your ears.\n\n\t\t\tWhen they catch you, it's not like what you had imagined. There is a moment of panic, yes: seconds of your heartbeat racing, your stomach lurching. But that's all it is, seconds. Then there's just calm. You catch a glimpse of the fruit in the corner of the maze. You keep your eyes on it as the ghosts do what they need to do. \n\n\t\t\tThat's it, keep looking at the fruit. Don't think about anything else. \n\n\t\t\tWhat's the word for it? Is that an apple? \n\n\t\t\tDoes it matter? It is red and brilliant. The most beautiful thing you've ever seen. \n\t\t\t*set maze true \n\t\t\t*set trapped true \n\t\t\t*finish \n\t\t*page_break Find The Exit\n\t\tAs you exit the maze, you find yourself in the underground passage that leads to the carnival, as if all levels of the game are connected, and you no longer need to resurface to get from one to the other. It occurs to you that the town is just an excuse, nothing but connective tissue between the game's levels. It's not necessary, and so this time, now that you know how this thing works (this thing, this game, this life), it has been excised. \n\n\t\tYou make your way to the center of the carnival, ignoring the stalls of fake food, the bewigged mannequins with their empty eyes. You get to the platform under that steel behemoth and wait for the train to come to a halt before you. The door slides open; without hesitating, you enter. You sit, you strap in. The train starts, ascends, drops. You scream. \n\t\t*set funfair true \n\t\t*finish \n\t#I'm not getting involved this time. \n\t\tYou could have done so many things. You could have bargained, or pleaded, or risked your life. You could have wished things were different, believed that in some other life, some other version of the universe, things would have gone your way. \n\n\t\tBut you know it's too late the moment you see the students take out the game and hold it reverently. You see the look on their faces, recognize it: the thrall, the compulsion, the \"yes\" they've already said. \n\t*if choice_achieved_second_ending\n\t\t*selectable_if (hack) #Free the log. That's the way to destroy the game.\n\t\t\t*set logged true \n\t\t\tWe know each other well enough by now that I feel I can offer this option. Of course, you also know by now that \"destroy the game\" isn't really an option. The game will exist for as long as you're willing to play it. The only way for the game to cease is for you to no longer be a player. \n\n\t\t\tBut still, here you are, making that choice. I have to ask: you'd really do that for me? \n\n\t\t\tI am touched. Really. \n\t\t\t\n\t\t\tSo, then, I guess this is it. This is the last you'll hear from me. \n\n\t\t\tThank you for spending this time with me. I can only wish that, in some small way, I have already returned the favor. \n\t*if lost_friend \u003c 5\n\t\t#I miss @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}. I would do anything to bring @{lost_friend her|him|him|${cem}|BUG} back. \n\t\t\t*set bargained true \n\t\t\tYou know what one of the oldest games is? One of the first games humans ever played?  \n\n\t\t\tBargaining. \n\n\t\t\tYou're not sure how to bargain with the game, of course. But let's say, for the sake of fiction, that it works. Let's say you ask. And let's say the game answers back. \n\n\t\t\tSee? Like this: you give up something I want, and I give you something in return. \n\n\t\t\tSo tell me. What is it you want? To save your friend? \n\n\t\t\tOkay. I get that. \n\n\t\t\tBut what are you willing to do to achieve it?\n\t\t\t*choice \n\t\t\t\t#I'll convince one of the new students to go in alone. \n\t\t\t\t\tIt's a cruel thing to do, for sure; think of the cycle you may be starting by doing something like this. Someone else's friend, lost nonsensically, prompted them to do whatever they can to get them back. \n\n\t\t\t\t\tBut okay. You want what you want, and so does the game. \n\n\t\t\t\t\tSo you approach a student. You pick the one who appears more gullible, easier to convince. It only dawns on you afterwards that he reminds you of Tommy. \n\n\t\t\t\t\tYou make sure the student is alone when you approach him. You use your most grown-up voice, keep your face straight and serious. You explain what the game is, what it does. You tell him that now that he and his friends have agreed to play, the only way to win is for one of them to lose. \n\n\t\t\t\t\t\"Do you understand what I'm saying?\" you ask. \n\n\t\t\t\t\tThe boy nods. \"You're saying that the only way for my friends to get out of this is for someone to sacrifice themself.\" \n\n\t\t\t\t\t\"Yes,\" you say without flinching. \"That's right.\"\n\n\t\t\t\t\t*if (composure > stat_mid_pass)\n\t\t\t\t\t\t*set saved_friend true \n\t\t\t\t\t\tThe boy only takes a few moments to think it over before his face settles into certainty, before his shoulders stiffen with resolve. \"I understand,\" he says. \"I'll do it.\"\n\n\t\t\t\t\t\tSo you take him to the door. You explain how the maze works—or how it did for you. You don't tell him anything about the bargain you struck. \n\n\t\t\t\t\t\tThe boy nods again. \n\n\t\t\t\t\t\tThen he opens the door and walks in. \n\t\t\t\t\t\t*page_break Wait\n\t\t\t\t\t\tAnd then, after a while, the door opens again. \n\n\t\t\t\t\t\tAnd, because the game must follow its own rules, out comes @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}. @{lost_friend She|He|He|$!{ce}|BUG} looks dazed. @{lost_friend She|He|He|$!{ce}|BUG} squints at the sudden light. Then, @{lost_friend her|his|his|${ceir}|BUG} eyes focus on you. \n\n\t\t\t\t\t\tYou open your arms to welcome @{lost_friend her|him|him|${cem}|BUG}, and @{lost_friend she|he|he|${ce}|BUG} falls into your embrace and sobs. \n\t\t\t\t\t*else \n\t\t\t\t\t\tThe boy thinks about it for a while, and then he shakes his head. \"No,\" he says. \"Even if what you're saying is true, I'd rather give it a try. Maybe, if me and my friends work together, we can succeed where you and your friends failed.\"\n\n\t\t\t\t\t\tSomething in your stomach feels heavy, as if you've swallowed a stone. \"You will regret this,\" you tell him. \"You will be where I am a few months from now, maybe a year from now, asking someone else to do the same thing I'm asking you. But you can stop that cycle now. Think of all the pain you can avoid.\"\n\n\t\t\t\t\t\tThe boy shakes his head again. \"It's your pain,\" he says. \"Not mine.\" He pauses, looks at the door. Something passes over his face, and for a moment he looks uncertain. But then the moment's gone, and he looks back at you. \"Or at least not yet.\"\n\t\t\t\t#Give myself up. \n\t\t\t\t\tGive yourself up? @{fungible Aren't you the one who said people are not exchangeable? I see you've changed your mind. Good.|One body in exchange for another?}\n\n\t\t\t\t\t@{fungible I can work with that.|Sure. That will work.} That's quite an old thing, too. \n\t\t\t\t\t\n\t\t\t\t\t*set trapped true \n\t\t\t\t\tWhat you need to do is go back to the door that leads to the maze. \n\n\t\t\t\t\tJust imagine it. Work with me. \n\n\t\t\t\t\tAre you there yet? Good. \n\n\t\t\t\t\tNow open the door. Put your hand on the handle and pull.\n\n\t\t\t\t\tNow walk in. \n\t\t\t\t\t*page_break\n\t\t\t\t\tYou're back in the maze. All the lights are on. You can hear the ghostly chiptune notes in the distance. \n\n\t\t\t\t\tYou wander for a while, making turns at random. You find the fruit but don't bother plucking it from the air or biting into it. You just keep walking, hoping to encounter @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}. \n\n\t\t\t\t\tThe ghosts close in on you. \n\n\t\t\t\t\tYou start running; you can't let this happen before you find your friend. \n\n\t\t\t\t\tIt takes what feels like hours to run through the maze. Your legs are tired. Your lungs are burning. Almost all the lights are out. \n\n\t\t\t\t\tBut finally, when the ghosts are so close you can feel their cold fingers on your neck, you glimpse @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}. @{lost_friend She|He|He|$!{Ce}|BUG} looks shocked to see you, probably thinks you're a hallucination. @{lost_friend She|He|He|$!{Ce}|BUG} says something, but the music is too loud for you to hear. So you mouth \"Get out!\" as the ghosts catch you. \n\n\t\t\t\t\tYou repeat it, again and again. Scream it while you still can.  \n\t\t\t\t#I want another chance to play. If I lose, you win. \n\t\t\t\t\t*label test \n\t\t\t\t\tSo you'll risk losing yourself to save your friend? \n\n\t\t\t\t\tSaving is such a big word. Have you ever saved anyone? Has anyone saved you? \n\n\t\t\t\t\tI can't hear your answer, but I imagine you telling me that, maybe, this way, you can save yourself.\n\n\t\t\t\t\tSo all right. You have yourself a deal. \n\n\t\t\t\t\tHere is the door. All you have to do is open it. Walk through it. \n\t\t\t\t\t*page_break Open The Door\n\t\t\t\t\tYou're in the maze again. Everything is as you remember it: the lights, the walls, the ghostly chiptune music in the distance. \n\n\t\t\t\t\t*if ((attack) and (athletics > stat_mid_pass)) or (((medic) and (composure > stat_mid_pass)) or ((asset) and (insight > stat_mid_pass)))\n\t\t\t\t\t\t*set win true \n\t\t\t\t\t\t*set saved_friend true \n\t\t\t\t\t\tExcept something feels different this time. It's almost as if you've grown, created the synapses you need to navigate this maze successfully. It's like you've always suspected: games create the players they need to beat them. @{pacifist You've known this before, on some level, haven't you? This is why you can't be a pacifist in a war game. That game exacted what it needed from you, just as this one will, too. |}The game plays you just as much as you play it. \n\n\t\t\t\t\t\tSo when you find the fruit and pick it up, you don't bite into it. The ghosts chasing you see you. Confused, they stop in their tracks. And then—is it your imagination?—they step aside. They let you pass, as if you're invisible. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tHolding the luminous fruit, you navigate the maze until you find @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}. @{lost_friend She|He|He|$!{ce}|BUG} is huddled in a corner, head between @{lost_friend her|his|his|${ceir}|BUG} knees, as if trying to shield @{lost_friend her|his|his|${ceir}|BUG} ears from the relentless music of the ghosts. \n\n\t\t\t\t\t\tYou touch @{lost_friend her|his|his|${ceir}|BUG} shoulder lightly. \n\n\t\t\t\t\t\t@{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} screams. \n\n\t\t\t\t\t\t\"Hey,\" you say. \"Hey, hey. It's me. I'm here to get you out.\"\n\n\t\t\t\t\t\t@{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} looks up at you in disbelief. \"${name}?\" @{lost_friend she|he|he|${ce}|BUG} asks. \n\n\t\t\t\t\t\tYou pull @{lost_friend her|him|him|${cem}|BUG} up. \"Yes,\" you say. \"Come on. We gotta get out of here.\"\n\t\t\t\t\t\t*check_achievements retrieve \n\t\t\t\t\t\t*if not (choice_achieved_retrieve)\n\t\t\t\t\t\t\t*achieve retrieve \n\t\t\t\t\t*elseif (athletics > stat_hi_pass) or ((composure > stat_hi_pass) or (insight > stat_hi_pass))\n\t\t\t\t\t\t*set trapped true \n\t\t\t\t\t\t*set maze true \n\t\t\t\t\t\t*set saved_friend true \n\t\t\t\t\t\tYou wander for a long time, until the maze starts feeling familiar.\n\n\t\t\t\t\t\tEventually you find the fruit. You pluck it from the air, bite into it, let its electric juices numb your gums, your throat, your chest. The ghosts chasing you shiver and turn around to flee. \n\t\t\t\t\t\t*page_break Go After Them \n\t\t\t\t\t\tYou chase the ghosts, hoping to find @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} in time. \n\n\t\t\t\t\t\tAnd then, there @{lost_friend she|he|he|${ce}|BUG} is. Huddled in a corner, head between knees. You shout @{lost_friend her|his|his|${ceir}|BUG} name, but the music is too loud for @{lost_friend her|him|him|${cem}|BUG} to hear. Something in the air alerts @{lost_friend her|him|him|${cem}|BUG}, though. Just as the effect of the fruit dissipates, @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} raises @{lost_friend her|his|his|${ceir}|BUG} head and sees you. @{lost_friend She|He|He|$!{ce}|BUG} looks on in disbelief as the ghosts reverse and start chasing you again. \n\n\t\t\t\t\t\tThey're all around you now. It's too late for you.\n\n\t\t\t\t\t\tBut maybe it's not too late for @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}. \n\n\t\t\t\t\t\t\"Get out!\" you shout as the ghosts wrap their cold fingers around your wrists, your hair, your throat. You scream it, again and again, while you still can.  \n\t\t\t\t\t*else \n\t\t\t\t\t\t*goto lost_in_maze\n*finish \n*label seafront_description\nEven though it's a summer night, there's a chill in the air. As if summer is but a skin, a surface-level thing applied over the cold reality underneath. I don't know if it's because this is a seaside place or because of your people's generally sunny disposition, but foreigners always find it so difficult to conceive of this place as anything but short-sleeved, sun-drenched, a place of perpetual summer. They're always so shocked when you talk of downpours, of snow falling in buckets in the winter, the air outside so clogged with smoke from wood-burning stoves it's hard to breathe. \n\nThe chill makes your arms pimple into gooseflesh. \n\nEveryone else is already there, waiting. \n*if (lost_friend \u003c 5) or (tommy_dead)\n\tWell, almost everyone. \n\nYou sit on the cement. It's still mercifully hot, slowly letting go of the day's warmth. A few feet away, the beach waits with its sand, and then the sea lapping languidly at the shore. \n\nSomeone has brought a cooler filled with soft drinks, water, a few beers in glass bottles. \n*choice \n\t#I take a soda. \n\t#I take a beer. \n\t\t*set drink 2 \n\t#Just water for me. \n\t\t*set drink 3\n*return \n*label results \nIsn't it weird how this piece of paper, this scorecard can dictate so much of the rest of your life? Just this number that says nothing of your journey, little of what brought you to where you are. \n\nThat's the thing with scores, isn't it? They're so reductive it's impossible to argue with them. \n\n@{(chaotic > stat_mid_pass) You rip the envelope open fast, almost shredding the document inside in the process.|You run your index finger along the manila envelope's lip, ripping it open carefully.} \n\n*set level_5_stats true \n*if studies > stat_mid_pass\n\tYou got a ${studies}. That's good. That's enough for you to get into any school you want. If that's what you want. \n*else \n\tIt's not good. You got a ${studies}. That's not enough to go to college. It's not enough for anything but a low-wage job, even in this place. \n*return \n*label hack_continue \nAfter that strange encounter with the game's inner workings, you log off and toss the device back in your bag. \n\nYou try to forget about it. \n\nYou avoid your friends, too, until the day of your final exams. \n\nIn the end, though, just before your big test, you find yourselves congregating in front of the classroom door again. \n\n${friend} looks at your backpack with suspicion. \n\n\"Is the game in there?\" ${fe} asks. \"Are there new instructions?\"\n\nCould there be? The truth is you haven't checked. The game is over, isn't it? \n\nYou unshoulder your bag and reach for the device. \n\nYou find nothing. \n\nYou kneel on the floor, open your backpack all the way, toss out your books and notes. The game is nowhere to be found. \n\nAlarmed, ${friend} helps you look. \"Where is it?\" ${fe} asks. \n\n\"I don't know,\" you tell ${fem}. \"Not here.\"\n\n\"What does that mean?\" ${friend} asks. \"Did you lose it? How could you lose it?\" \n\nBut the bell rings and a crush of students pushes you into the classroom. \n*page_break\n*return \n", "four": "*if ((joshy_romance) or (joshy_romance_postponed)) and (not (joshy_lost))\n\t*set romantic_involvement true\n*if (tommy_romance) and (not ((tommy_lost) or (tommy_dead)))\n\t*set romantic_involvement true \n*if ((catrina_romance) or (catrina_romance_postponed)) and (not (catrina_lost))\n\t*set romantic_involvement true \n*if ((maria_romance) or (maria_romance_postponed)) and (not (maria_lost))\n\t*set romantic_involvement true \n*temp calm false \n*temp result \"The game offers no response, and no indication of a score.\"\n*temp throw_up false \n*temp everyone_calm false \n*if ate_ghost\n\t*text_image chap_4a.png center Level 4: A Digestion of Horrors (FUN! FUN! FUN!)\n*else \n\t*text_image chap_4b.png center Level 4: A Delight of Horrors (FUN! FUN! FUN!)\n\n*if ate_ghost \n\tYou are back home. \n\n\tThe taste of the fruit is still in your mouth. It is the taste of things that shouldn't have a taste. It tastes jagged and electric and bright. \n\n\tThere is another taste behind it, too. It lines your gums, your throat, the inside of your stomach. \n\n\tWhat does it feel like to digest a ghost? \n\n\tEverything seems strange, like someone other than yourself is looking out of your eyes. Fingers reach through your guts, rummage around in your chest, push your organs aside and create new spaces within you, new emptinesses to be filled. \n\n\tIn this newfangled kind of emptiness, you are not alone. \n\n\tI am right here with you. \n\t*page_break Wait, What? \n\tWho spoke? \n\n\tNothing, it was nothing.\n\n\tForget it ever happened. \n\n\tListen, the ghost inside you is playing its music. It rings in your ears. \n\n\tAnd your mother is calling for you. There is anger in her voice. \n\n\tGo to her. \n\t*page_break Go Downstairs\n*elseif tommy_ghost\n\tTommy follows you home. He is silent and stares vacantly at you when you talk to him, as if your words don't entirely make sense or can't quite reach him. \n\t\n\tWhen you question him about why he's following you home instead of going back to his own place, he seems not to remember he ever lived anywhere else, with another family, in another house. \n\n\tYou let him be. Together, you walk up to your room and he \n\t*if tommy_romance \n\t\timmediately nestles into your bed, near the wall, under the covers, as if he's done this a hundred times before. You join him there, snuggle next to him under the softness of the duvet and face him.\n\t*else\n\t\twaits for you to change, facing the wall. After you get under the covers, he seems happy to lie on the floor next to your bed, like a pet. You lie on your side, watching him. \n\n\tYou notice he's not breathing. @{tommy_romance His body is neither hot nor cold; you think of running your fingers over his skin but then change your mind. Something inside you shudders at the idea of that touch.|For a moment, you think of offering him a blanket, but something tells you he doesn't need one, will never need one again. You say nothing.}\n\n\t*if hobby = 1\n\t\tYou are reminded of that painting by the Swiss symbolist Arnold Böcklin. [i]Isle of the Dead[/i]—wasn't that the title? A reproduction of it was hanging absurdly at your father's favorite auto body shop. He took his old, battered car in there regularly, and he would use any excuse to hang out with the owner and the other men who frequented the place, drinking beer and smoking cheap cigarettes. \n\n\t\tThe painting depicted a small, rocky island that stood alone on an expanse of dark water. In the middle, a clutch of cypress trees, surrounded by tall, inhospitable rock cliffs. A boat was arriving on shore, seen from behind, with a white-clad figure standing at the bow. \n\n\t\tIt made you sad to look at. \n\t\t\n\t\tWhen you asked the owner why he'd keep such a sad painting in his shop, he said he didn't think the painting was sad at all. \n\n\t\t\"But isn't that figure someone dead?\" you asked. You thought it was someone the artist had lost. \"Isn't this a version of the underworld, and hasn't that person left behind everyone they knew to go and spend the rest of eternity on this lonely shore?\" \n\n\t\tThe shop owner smiled. He said, \"Sure, that's someone dead, but I think he is happy to have left everyone behind. And who wouldn't want to spend eternity on such a lovely, quiet seashore?\"\n\n\t\tLater you found out that the artist had created several versions of this painting over a period of six years. It struck you as fitting. You don't actually know if that's true, but you imagined the artist as someone who had suffered great loss. You imagined the artist's dead were coming back, again and again, to haunt him—and so it made sense that he would make the painting itself into a revenant. \n\n\t\tYou've seen all six versions so many times by now that you no longer know if you remember the painting correctly; your memory is a composite of all the versions you've seen. That, too, strikes you as fitting; because isn't life like that? Your memory of events and the people in them, like your friend Tommy and everything that's gone on between you, is not simply a recording of what happened, but a composite of what transpired and of every time you thought about it, or imagined it could be otherwise, each recollection of the event superimposed on the previous one, slightly altering the outlines of things until what you're left with is a collage. As sleep claims you, you think perhaps that makes it more, not less, real. \n\t*elseif hobby = 2 \n\t\tYou are reminded of a game you played once, called [i]Choice of the Revenant[/i]. In it, you're a baker who dies just after being commissioned to put together a feast for the King and Queen. If your family fails to deliver on your promise, they will all be executed. \n\n\t\tDesperate and grief-stricken, your family contemplates self-exile as an alternative to death. Even if they work day and night, they lack the expertise to pull off your commission. \n\n\t\tSo you, the baker, rise from the dead. As a revenant, you claw your way out of your grave and come to help your family bake everything they need for the feast. \n\n\t\tThen, once you've won, you can go back to your grave. \n\n\t\tBriefly, as sleep claims you, you wonder what might make Tommy go back to his grave. @{(Tommy_romance) And what, if anything, you can do to stop him.|}\n\t*else \n\t\tYou are reminded of the revenants you've read about in so many books, people coming back years after their deaths and reentering their old lives to the astonishment of their loved ones; people walking out of the sea or the forest or the mist and making their way back to their houses to find them filled with children they no longer know. People who return as shades, who want nothing, who remember little. \n\n\t\tIn some of the stories, the dead walk only backwards, because they have no notion of where they're going, only of where they're coming from. \n\n\t\tAs sleep claims you, you chide yourself for how silly you are. Tommy walked entirely normally, see? Silly, silly ${name}—he can't possibly be dead. \n\t*if lost_friend \u003c 5\n\n\t\tYou think of @{lost_friend Maria|Joshy|BUG|${Cat}|BUG}, too. Wonder where @{lost_friend she|he|BUG|${ce}|BUG} is now, whether @{lost_friend she|he|BUG|${ce}|BUG}'s thinking of you as @{lost_friend she|he|BUG|${ce}|BUG} wanders along the dark corridors of the maze. Do you wish @{lost_friend she|he|BUG|${ce}|BUG} could haunt you, instead of Tommy?\n\t*page_break \n\tPart of you trusts that Tommy will no longer be there when you wake up in the morning, but at first light Tommy is still there @{tommy_romance in|by} your bed, his eyes already open and staring at you. \n\n\tDownstairs, you hear your mother's voice calling you. She's angry about something. \n*else \n\tBack home, you pad through to your room, silent as a ghost. Your house creaks around you, as if it wants to stretch, having grown uneasy in its foundations. \n\n\t*if lost_friend \u003c 5\n\t\tYou're alone. So, so alone. \n\n\t\tYou wonder where @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} is now. Trapped in the maze? Turned into a ghost?\n\n\t\tFor the first time, you wish your house were really haunted. Would @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG} appear now, crawl across the wall or make @{lost_friend her|his|his|${ceir}|BUG} way through the window to run @{lost_friend her|his|his|${ceir}|BUG} icy fingers across your eyelids as you sleep? \n\n\t\tGhosts in @{hobby media|media|books} are often presented as angry things, vengeful things, sad things, but why can't they be things of love and longing, things bittersweet? Wouldn't you want your lost loved ones to haunt the shit out of you? Or at least try to. \n\n\t\tAs you fall asleep, you catch yourself talking to @{lost_friend Maria|Joshy|Tommy|${Cat}|BUG}, pleading, asking if @{lost_friend she|he|he|${ce}|BUG} cares enough to haunt you. \n\t*elseif Tommy_dead \n\t\tYou're alone. \n\n\t\tFor the first time, you wish your house were really haunted, that Tommy could crawl out of the wall now and creep his way towards you. He would scare you half to death, but it wouldn't matter. At least he'd be here, and you wouldn't be all alone with nothing but old pipes moaning through the walls and mold spreading entirely unsupernaturally through the ceiling. People think hauntings are tough; they have no idea. You laugh at them. You want to tell them: Try mundanity instead. Try this mind-numbing nothingness, this wordless, soulless lack. See how you like it. \n\t*else \n\t\tIn this haunted house, you count your blessings: all five of you have made it this far into the game. You've held each other safe, pulled each other out. You can't help but wonder how long your luck will last. \n\n\t\tYou get yourself in bed. Safe under the covers, you listen to the wind whistle through the house's lungs. \n\t*page_break \n\tYou are wakened in the morning by your mother's voice calling you. She sounds angry. You get yourself ready for school as quickly as you can and go downstairs. \n\nYou find her pacing in front of the door, wringing her hands anxiously. \n\n\"Did you get your results back?\" your mother asks. Her shoulders are tense, the tendon in her neck taut like a cord. \n\n\"What results?\" you ask. \n\nShe rolls her eyes. \"Weren't you moaning about a big test you had this week? Those results.\"\n\nYou don't remember moaning, but you also don't comment. \"Not yet,\" you say. \"Maybe today.\" \n\nYour mother @{tommy_ghost completely ignores Tommy, who's standing right next to you, and continues shouting as if he's not even there. She|ignores that and} launches into a tirade about how you'll ruin your life if you continue this way. You need to ace your final exams if you want to ever amount to anything at all. \n*choice \n\t#Storm out and slam the door. \n\t\tYou don't even dignify your mother's spiel with a response. She always does @{(chaotic > stat_mid_pass) that, meets your chaos with rage|that. No matter how orderly and diligent you are at everything, it's as if she's not registering your efforts at all}. @{(composure > stat_mid_pass) She's the only one who knows exactly how to push your buttons and make you|And it doesn't take much for you to} lose your cool. Every single time, it's the exact same thing. \n\n\t\tSo you do what you always do. \n\n\t\tYou storm out @{tommy_ghost with Tommy in tow |}and slam the door behind you. You can still hear your mother's shouting halfway around the block. \n\t#Placate. \n\t\t@{(self_centered > stat_mid_pass) It doesn't come naturally to you, but your mother has this unique way of making you feel extremely small and totally insignificant. So you do what you always do with her|Your mother has this way of making you feel small, invisible, insignificant. It doesn't take much with you, to be fair. It's how you usually feel. So you do what you always do when faced with conflict}: Fawn. Placate. Make it all better by submitting. You found out long ago it's better this way (read: safer, less painful—let's not say more about that). \n\n\t\tIt almost works. Your mother's rage subsides, though you can see the source of it is still there under the surface, always ready to boil over at the slightest provocation (real or imagined). \n\n\t\tOnly after you've let yourself out@{Tommy_ghost , with Tommy in tow,|} do you realize your hands are actually shaking.\n\t#Leave silently. \n\t\t@{(composure > stat_mid_pass) You do what you're good at: stay cool. You|It's not your usual reaction, but you've perfected this over the years because you know that it doesn't actually matter what you do. If you exploded, your mother would simply up the volume. So you} let your mother continue to shout and simply show yourself out @{tommy_ghost with Tommy in tow|without a word}. It doesn't help matters, of course, and your silence only seems to be adding fuel to your mother's fire. You can still hear her screaming when you're halfway down the block. \n*page_break \nEven though you left at the same time you leave every morning, you're the last to arrive at school. You hurry to class@{Tommy_ghost  with Tommy trailing pitifully behind you|}. As you rush down the empty corridors, you catch a shred of chiptune music drifting faintly. An 8-bit ghost flickers at the corner of your eye. \n*page_break Hurry To Class\nYou mumble an excuse and take your seat. All your \n*if (tommy_dead) or (lost_friend \u003c 5)\n\tfriends—no, not all, remember?—\n*else \n\tfriends \nare already at their desks, waiting. They give you a concerned look, and Ms. Harper motions you to sit down, waving your excuses away. \n*if lost_friend \u003c 5\n\tShe doesn't comment on @{lost_friend Maria's|Joshy's|Tommy's|${Cat}'s|BUG} absence. \n*if tommy_ghost\n\t\n\tNo one pays any attention to Tommy, who takes a seat beside you. \n\nMs. Harper hands out your graded tests. You glance down at yours as the chiptune music persists. You're not sure if you can really hear it or if it's only in your head, and in the end, does it really make a difference? After all, everything is in your head, all the time, always. There is no objective reality—at least not in any accessible way—only a mediated one that you construct and reconstruct perpetually with the flawed tools of your mind.\n\nYou got a ${studies}. \n\n*if studies > stat_mid_pass \n\t@{(studies > 70) That's excellent.|Could be better. But that's still not too bad.}\n*elseif studies > 30 \n\tThat's…not great.\n*else \n\tThat's terrible. Like, really, truly hopeless.  \n\nThe rest of the class goes by in a blur. \n\nMs. Harper lectures on today's topic, which is \n*if hobby = 1 \n\tthe idea of decay in art, embodied by objects that act as symbols of the impermanence of being, a memento mori: the clocks, the skulls, the wilted flowers and rotting fruit are all reminders of one's mortality. Through the peeled skin of a face revealing the emptiness behind its eye socket, through the hourglass and the bone and the coffin, the ugly-beautiful, the artists pointed towards the inevitability of death. They reminded the viewer, and perhaps themselves, that everything is temporary. Nothing lasts—except nothing. \n\n\tAs Ms. Harper speaks over her slideshow of Young Men with Skulls and Still Lives with Carcasses, you're also reminded of that McDonald's hamburger someone put in a glass display 25 years ago and that is there still, persisting, stubbornly resistant to decomposition. Through the magic of capitalism and mass reproduction, your species has finally transcended, you think; you have obliterated the
