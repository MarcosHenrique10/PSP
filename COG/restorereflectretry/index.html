achete raised, bloodied, cutting through arteries, pushed through eyes. \n\n\t\t\tWhen the other team has been eliminated and all is quiet again, the number in the upper part of your vision increases by three. \n\t*else\n\t\t*set spared true \n\t\tYou realize they are all coming for you, as if magnetized by the star badge on your chest.\n\n\t\tYour friends close in around you, intent on protecting you, as if you're some kind of asset that needs to be defended at all costs. ${Cat} pounds one to the ground before they have a chance to get close, while Joshy takes out two. Maria cuts one of them down. Tommy shoots frantically. His aim is shit, but he manages to clip the last one in the leg just before they get to you. \n\n\t\tThe person falls to the ground by your feet. \n\n\t\tYou see Maria coming over with her machete raised, ready to finish them off. \n\n\t\tBefore you know what you're doing, you're on your knees, your body over that person's, that enemy's, as if to protect them. \"Please,\" you tell Maria. \"Don't.\"\n\n\t\tMaria's face is bloodied, her eyes wild. For a moment, she stares at you with a look of utter incomprehension, as if you're speaking a foreign language. But then, a moment later, her expression softens. She comes back to herself. She nods. \"Stay down,\" she tells the fallen person. \n\n\t\tYou catch their eye as you climb back on your feet. You don't expect gratitude, but neither do you expect what you find in their eyes: a look of contempt. \n\t\t*if bodycount > 1\n\t\t\t*set bodycount -1 \n*if survival\n\tThere are five of them, just as many as there are of you, in a parallel that does not escape you. It only cements your decision to do everything you can to survive. It's either them or you. You'd rather it be you who makes it out of here alive. \n\n\t*if brave > stat_mid_pass\n\t\tPerhaps it's not the bravest of attitudes. But it's one thing to be brave, and another to be stupid.\n\n\t*if medic \n\t\tThe other team closes in. \n\n\t\tThey all seem to be going after Tommy, as if the star on his chest is a target. You stay back, trying not to put yourself in the line of fire. \n\n\t\tMaria cuts off two of them, and ${Cat} is pounding a third into the ground. Joshy shoots down the final two, one of whom falls by your feet. \n\n\t\tTommy, frantic, kneels by that person. He seems crestfallen, close to tears. You wonder why; he doesn't even know them. Tommy turns to look at you, mouths a silent \"please.\" He wants you to help them.  \n\n\t\tAnd you think you could save them. It's as if your body possesses this new knowledge: how to stem bleeding, how to coax lungs to breathe, hearts to beat.\n\t\t*if helped \n\t\t\t\n\t\t\tAs if you've done this before. \n\t\t\t\n\t\t\tAnd yet, somehow, you have the feeling it didn't help. Wasn't worth it. \n\t\t*else \n\t\t\tBut if you let that person leave, who could say they wouldn't be waiting for you around the next corner, aiming for your head? \n\n\t\t*set bodycount +1 \n\t\tSo you stay where you are. You stay where you are and let that person bleed out in front of you. \n\n\t\tWhen the person stops breathing, Tommy stands. He won't look at you. \n\n\t\tThe bright neon number in the upper right corner of your vision increases by one. \n\t*if attack\n\t\t\n\t\tAnd, in this case, it seems that the best way to survive is to be as lethal as possible. \n\n\t\tThe others all seem to be going for Tommy, as if that star on his badge makes him a target. \n\n\t\t*if athletics > stat_mid_pass\n\t\t\t*if gun \n\t\t\t\tSo you raise your gun, and you shoot. Your aim is good. \n\t\t\t\t*if rampaged \n\t\t\t\t\tIt's like you've done this a hundred times before.\n\t\t\t\tYou take out three before they get anywhere near Tommy. Joshy and Maria finish the rest. \n\t\t\t*elseif hands\n\t\t\t\tYou don't hesitate. You throw yourself against the people who threaten your survival, your fists cracking cheekbones and crushing windpipes. By the end, you have taken out three people all on your own. Maria and Joshy have taken care of the rest. \n\t\t\t*else  \n\t\t\t\tYou don't even have to think. You raise your machete and run, hacking through arteries. Maria does the same, and Joshy is efficient with his gun. ${Cat} finishes people off with ${ceir} hands. \n\n\t\t\tWhen all is said and done, the number in the upper right corner of your vision goes up by three. \n\t\t\t*set bodycount +3 \n\t\t*else \n\t\t\tYou try to take out as many as possible without putting yourself in the line of fire, which proves a difficult thing to do. At one point, Maria drives her machete through someone's chest moments before they drive theirs through yours. It's a close call. \n\n\t\t\tYou do get one of them, though. \n\t\t\t*if gun \n\t\t\t\tYour bullet finds their leg and they fall, bleeding out in moments. Much faster than you'd ever expect. \n\t\t\t*elseif hands \n\t\t\t\tIt's someone Joshy has already felled with a bullet to the shoulder, and you get to them just before they reach for their gun. You punch them in the throat, watch as they gasp for breath, as they go still.\n\t\t\t*else \n\t\t\t\tYour machete finds their neck, and you watch as they fall, a look of surprise on their face, as if they hadn't quite realized what's at stake here. \n\n\t\t\tOnce every one of your opponents stops moving, the bright number in the upper right corner increases by one. \n\t\t\t*set bodycount +1\n\t*if asset\n\t\tBut everyone on that team seems to be coming for you, as if drawn by the star on your badge. Your own team closes in around you, intent on protecting you. \n\n\t\t*if (brave > stat_mid_pass) and (insight > stat_mid_pass)\n\t\t\tBut you're not about to let yourself be cornered. Sometimes offense is the best defense, right? \n\n\t\t\tSo you protect yourself in the best way you know how: by attacking. \n\n\t\t\t*if gun\n\t\t\t\tYou raise your gun, steady your hand, and shoot down one enemy after another. You get three on your own. Maria and Joshy take care of the rest of them. \n\t\t\t*elseif hands \n\t\t\t\tAs if sensing your intentions, Joshy and Maria get to work. They incapacitate as many of the enemy group as they can, and you move in to finish the others off by crushing their windpipes or beating them until they stop moving. \n\t\t\t*else \n\t\t\t\tYou raise your machete and charge, cutting your way through people as if your life depended on it. Because it does. \n\n\t\t\tWhen none of the other team is left standing, the number on the upper right corner of your vision goes up by three. Three whole people who died so you might live.  \n\t\t\t*set bodycount +3\n\t\t*else \n\t\t\tYour team does efficient work. \n\t\t\t*gosub asset_bit\n\n\t\t\tYou remind yourself you've made a decision to survive. Whatever it takes. \n\n\t\t\tSo you \n\t\t\t*if gun\n\t\t\t\ttake your gun, steady your hand, and shoot that person dead before they can do the same to you. \n\t\t\t*elseif machete \n\t\t\t\t${machete_bit}\n\t\t\t*else \n\t\t\t\t${hands_bit}\n\n\t\t\t${update_1}\n\t\t\t*set bodycount +1\n\n*gosub bodyimage\n*page_break Move On\nYou don't look at one another as you move on. Your team advances towards the building carefully, tentatively, every one of you alert. You turn the concept of \"moving on\" around in your mind: the idea of leaving things behind. Do you ever, really? Is that a thing? \n\nThe building seems closer, but to get there you need to cross a parking lot. \n\nMoving as one, your team comes to a halt. \n\n\"I don't like this,\" Joshy says. \n\nAnd you can see exactly what he doesn't like. \n\nThe parking lot is surrounded by trees and high buildings. If you cross, you'll be exposed to whoever might be hiding there. But you can't go around because someone has blocked the way, effectively herding everyone through it. Which means someone wants you on that parking lot. \n\nAnother thing not to like: the ground ahead is so littered with bodies you can hardly walk without stepping on them. As if the earth itself is made of nothing but layers and layers of bodies, sedimented, forming a new kind of ground. A geology of loss. \n\n*if second_checkpoint\n\tAs you step into the parking lot, you have the vivid feeling that you've been here before. You've crawled on those bodies, touched their skin with yours, looked into their eyes. \n\n\tYou shake your head, trying to get rid of the images, that sensation on your flesh. It doesn't work. \n\n\tBut at least nobody shoots at you. \n\t*page_break \n*elseif checkpoint\n\n\tCollectively, without speaking about it, you all agree to army-crawl across the parking lot. \n\n\tYou keep your body low, torso dragging across softening flesh, hands and knees pressing into faces you try not to look at. The putrid smell makes you gag. \n\n\tBut you make it to the other side of that parking lot without anybody shooting at you. \n\n\tThat's something. \n\t*page_break\n*else \n\t*if composure > stat_mid_pass\n\t\t\"I don't like it either. But there's no other way,\" you say. \"We have to get to that building, and that's the only way to do it.\"\n\t*elseif insight > stat_mid_pass\n\t\t\"It'll be fine,\" you say, knowing full well that it probably won't be fine. But you also know that's the only way to move forward, get to the building, and complete this bloody level of the game. \n\t*else \n\t\t\"Got a better idea?\" you ask. You don't. But maybe someone else does. \n\t\t\n\t\tNo one speaks. \n\n\t\t\"All right, then,\" Joshy says. \"I guess we're doing this.\"\n\t*page_break You're Doing This\n\tYou proceed into the parking lot, guns and machetes raised, scanning the perimeter as best you can, as if any of you has any actual idea what you're doing. You step carefully over the fallen bodies,\n\t*if enemies\n\t\ttrying not to look at their faces. These are still enemies.\n\t*elseif pacifist\n\t\tyour heart breaking for every one of these people. \n\t*else \n\t\ttrying not to trip. \n\n\tTo everyone's surprise, no one shoots at you. No one comes at you from the periphery. No one tries to stop you. \n\n\tWhich can only mean one of two things: either everyone else is dead, or they're waiting for you in that building. \n\t*page_break You're Still Doing This \n*check_achievements bodies \n*if not (choice_achieved_bodies)\n\t*achieve bodies \nUp close, the building reveals itself as not a government facility or town hall, which is what you'd imagined when you first saw it in the distance, but a mansion. \n\nYou enter the building in formation, carefully, all your senses alert, your body tense as a bowstring. \n\nYou find yourself in an entrance hall flanked by two formerly grand, curved stairwells, leading quite self-importantly to the upper levels. In the middle of the hall, a chandelier lies on the floor like a shattered Christmas bauble. Everything is covered in dust and pieces of plaster.\n*if choice_nightmode \n\t*line_break\n\tThe space feels darker than it should, considering that part of the roof has collapsed. \n\n\tAs if sunlight can't reach in here. \n\nYou realize that this used to be someone's house, a place where someone lived, once. For a moment your mind slips, and you imagine those people who used to live here entering the convenience store where you work. What would they have picked? They are dead now, you know this, you know it in your lungs and in your liver, but if they were still alive enough to visit a convenience store, perhaps they would have picked up orange juice with pulp, or a Kinder surprise. Or one of those jars of pink, hard candy, rose-flavored, imported from Bulgaria. You used to like those when you were little, though your mother only allowed you to have one every two weeks. \n\nFocus. \n\nThe objective of the game is not clear. All you know—not because anyone told you or the device gave you specific instructions, but because you can feel it—is that you have to get to the third floor. There will be a door there. You have to get to it. Walk through it. And then everything will be over. \n\nAll you have to do is get there. \n\n\"Which way?\" ${Cat} asks. \n\nYou look at the stairwells, size them up. They seem identical. \n\n*if not (checkpoint)\n\tThis is not a choice, you realize. It's a leap of faith. \n*else \n\tHow could you know which is the right way? Would taking one side over the other lead to your death? Can it really be this simple? This random, this cruel?\n*choice\n\t#Go right. \n\t\tYou take the stairwell on the right, \n\t#Go left. \n\t\tYou take the stairwell on the left, \nand ascend. \n*if not (checkpoint)\n\tThere's no sudden cliff. No boulder lands on you out of nowhere, Wile E. Coyote-style. \n\nParts of the stairs are missing, leaving big gaps you have to jump over one by one. In places, it seems as if there's no supporting structure underneath the marble steps; they just hover there, impossibly suspended in nothing. \n\nYou reach the first landing. \n\n*if dorian \n\t${portrait}. Gilded frame, cracked and peeling canvas. It's of an old man, well-dressed, his skin wrinkled, his eyes jaundiced and bloodshot. It feels as though the man's eyes follow you as you cross the landing. \n\t*if checkpoint\n\t\t\n\t\tAnd he seems familiar. Like you've seen him before.  \n*if rebecca \n\t${portrait}, of a woman in a flouncy dress. She's looking straight at you. It feels as if her eyes follow you, no matter where you stand. \n\t*if checkpoint\n\n\t\tShe seems familiar. Have you seen her before? \n*if zola \n\t*if checkpoint\n\t\tThere's a painting on the wall: an artist painting his self-portrait. \n\t*else \n\t\tThere's a painting on the wall. It's the city of Paris, judging by the Eiffel Tower. \n*if dig \n\tYour team pauses, and there is silence for a moment. It's eerie and strange, but you welcome it, this quiet, no gunshots and no explosions and no screaming. Not even the sound of your own heart beating. \n\n\tThen you hear it, faint and distant. The sound of digging.  \n*if cog_haunted \n\tYour team pauses on the landing, catching their breath. You want to urge them on. Grab them by their shoulders, shake them, ask them, \"Are you insane? Don't you know how this ends?\" Because you know: this place is haunted. As haunted as everywhere else in the world. If you stand still, even for a moment, you'll get caught. \n\n\tThe trick is never standing still. \n\t*set still true \n*if knight \n\tThere is a painting on the wall. It's of a castle: moonlit, windowless. At its base, a forest of thorns. \n*if kafka \n\tYour team pauses, and there is silence for a moment. And in that moment of quiet, it feels as if the whole building is shaking, coming apart, about to collapse. \n\n\tYou look at your teammates, but nobody seems to have felt a thing. \n*if blank \n\t${mirror}\n\n\tYou catch a glimpse of your reflection refracted, multiplied. In every one, your face is blank. \n*if bigeyes \n\t${mirror}\n\n\tYou catch a glimpse of your reflection in the glass refracted, multiplied. In every one, your eyes look uncanny: big, round, terrified. \n\n\tYou recognize them, those overlarge eyes in your sepia portrait. Perhaps something inside you already knew you'd end up here one day. Perhaps this is what you were painting all along. Nothing weird about it, nothing alien. Just terror.  \n*if not_my_face \n\t${mirror}\n\n\tYou catch a glimpse of your reflection in that mirror, except it takes you a minute to realize it's your reflection because the person in that glass is not you. And it's not just that you don't recognize yourself. This is literally not your face. \n\n\tYou look at your friends, who look the same as always. They're focused on their mission. Only Maria catches your eye, sees the confusion there. But she understands. Recognizes you. There's no time for words, so she just touches your wrist and tugs you away from that mirror and that landing and that stranger's eyes. \n*page_break Keep Going\nYou keep ascending. \n\nFinally, you reach the third floor. It's nothing but a long hallway, with a bedroom on the far side. \n\nYou know the door you're looking for is through that bedroom. \n*page_break Enter\nThe room looks like it's been turned inside out. There is glass on the floor, exposed woodwork behind the disintegrating walls. Something laid bare. It feels almost obscene. \n\nAnd then there's the bed. There is blood on the mattress. No bodies, or not anymore, just two oblong pools of blood, soaked into the beige like rusty Rorschach blots. \n\nIn your imagination, you resurrect the family that lived here. You make them walk through the convenience store once more, except this time you only have them pick up milk, and bread, and red wine in a carton for the Sunday meal. Mundane things, cheap things, things that make a life. \n\n*if insight \u003c stat_mid_pass\n\t\"Watch out!\" Maria shouts. \n\n\tYou see them too late. Two of them coming at @{asset you|Tommy}. \n*else \n\tBut something is making the hairs on the back of your neck stand on end. \n\n\tSomething's wrong. \n\n\tYou're the first to see them. \"Watch out!\" you shout. \n\n\tTwo people are coming at @{asset you|Tommy}. \nThey're holding machetes. \n\nEverything happens so fast. \n*fake_choice\n\t#I don't want this. \n\t\tBut it doesn't matter what you want. \n\t#I have been waiting for this.\n\t\tAnd now, here it is. \n\t#@{checkpoint No. Not again.|I'm ready.}\n\t\t@{checkpoint And yet.|Yes. You are. Is it enough?}\n\n*if checkpoint\n\t*if second_shooter_ability = first_shooter_ability\n\t\t*goto original_tommy \n\t*else \n\t\t*if second_shooter_ability = 1 \n\t\t\t*goto medic \n\t\t*elseif second_shooter_ability = 2 \n\t\t\t*goto attacker\n\t\t*else \n\t\t\t*goto asset \n*label original_tommy\n*if first_shooter_ability = 1 \n\t*label medic \n\tThe two assailants are too fast for your friends to react. One of them knocks the gun out of Joshy's hand, and the other evades Maria with remarkable skill, as if they're experts at this. You don't know this person's name, but you can easily imagine it topping the high score table of this game. \n\n\tThen, with one swift movement, they do what they came here to do. There's no fanfare, no buildup. They simply push their machete between Tommy's ribs. \n\n\tTommy stares, too surprised to react. He doesn't even fall, just stands there, holding his side, stunned. \n\n\tThe second assailant rips the star from Tommy's clothes, and then the two of them disappear through the door on the far side of the bedroom. They never say a word. \n\n\t*if (insight >= stat_mid_pass) and (composure >= stat_mid_pass)\n\t\tYour friends stare in horror as Tommy finally collapses onto the floor. Maria kneels next to him and tries to stop the bleeding with her hands, while Joshy turns his back. His skin is ashen, and he looks like he's about to faint. ${Cat} stares. \n\n\t\tYou remain poised. You know what to do. \n\n\t\tCalmly but firmly, you order ${Cat} to rip the sheets into strips to make a DIY bandage. You move Maria to the side and show her how to apply pressure properly while reassuring Tommy that he's going to be okay. \n\n\t\tYou've got this. You can do this. \n\t\t*if checkpoint \n\t\t\tThis time, you won't fail. No one has to die. \n\t\t*page_break \n\t\tOnce Tommy is properly bandaged, you push your shoulder under one armpit and Joshy positions his under the other. As gently as you can, you lift your friend. He can hardly walk, but you manage. \n\t\t*set Tommy_injured true \n\t*else \n\t\t*set tommy_dead true \n\t\tYour blood runs cold. Your knees disappear. There is no ground under you. \n\t\t*fake_choice\n\t\t\t#What do I do?\n\t\t\t#What can I do?\n\t\t\t#What should I do? \n\t\tTommy collapses. A pool of blood forms quickly under him. \n\t\t*if checkpoint \n\n\t\t\tNo, your mind screams, irrationally. \n\n\t\t\tNot again. \n\n\t\tMaria falls to her knees and tries to stem the bleeding without success. The blood just keeps welling up between her fingers. \"Please,\" she begs, addressing no one in particular. \"Somebody do something.\" \n\n\t\tYou hardly register what anyone else is doing. You can't move. Your whole body is paralyzed. You have no idea how to deal with this. You should. But you don't. \n\n\t\tYou can't tell how much time goes by before Tommy stops moving and his eyes glaze over. \n\n\t\tSomewhere far away, Maria sobs. \n*elseif first_shooter_ability = 2 \n\t*label attacker  \n\t*if (athletics >= stat_mid_pass) and (brave >= stat_mid_pass)\n\t\tThe two assailants are too fast for your friends to react. One of them knocks Joshy off his feet and disarms Maria with one swift movement. \n\n\t\tBut you're fast, too. Your body is ready for this, and your instincts take over. \n\t\t*if checkpoint\n\t\t\tThis time, you won't fail. \n\n\t\tYou push Tommy out of the way and take on both of them at once. \n\t\t*if gun \n\t\t\tYour bullet gets one in the leg. \n\t\t*elseif machete \n\t\t\tYour machete strikes one in the leg. \n\t\t*else \n\t\t\tYou punch one of them so hard in the face that they stagger backwards until they hit the wall. \n\n\t\tFinally, ${Cat} jerks into action. $!{ce} tears the other one off you. By the time ${ce}'s done, neither of them is moving. \n\n\t\tYou turn to Tommy and lift him off the floor. \"Are you okay?\" you ask, as calmly as you can. \"Are you injured?\"\n\n\t\tHe looks stunned, so you ask it again. He looks down at himself and slowly shakes his head. \"I'm all right,\" he says. \"I think.\" \n\n\t\t\"Yeah,\" you say, patting him on the shoulder. \"Yeah, you are.\"\n\t*else \n\t\tThe two assailants are fast and coordinated, as if they've done this a hundred times before. They quickly fell Joshy with a knock to the head and pull Maria's machete from her hand before incapacitating her. \n\n\t\tThen, they go for Tommy. \n\n\t\tYou're the only thing that stands between them and him. \n\t\t*fake_choice \n\t\t\t#I have to fight.\n\t\t\t#I have to save Tommy. \n\t\t\t#I have to do something. \n\t\t*if gun \n\t\t\tYou shoot, and you miss. \n\t\t*else \n\t\t\tBut you're not fast enough. \n\n\t\tYou watch in horror as the machete goes through Tommy, stuck between his ribs. Tommy stares, almost too surprised to react. One of the assailants rips the star from Tommy's clothes, and then the two of them quickly disappear through the door. They never utter a single word. \n\n\t\tAs soon as they're gone, Tommy collapses. Maria scrambles to his side and tries to stem the bleeding with her hands. She's too late. \n\n\t\t*set tommy_dead true \n\t\t*if checkpoint \n\t\t\tOnce again, you watch your friend bleed out. \n\t\t*else \n\t\t\tAlready, there's a pool of blood under Tommy. Joshy sobs. ${Cat} turns ${ceir} back, ${ceir} face ashen. \n\n\t\t\tIn mere moments, Tommy stops moving and his eyes glaze over. \n\n\t\t\tHe's dead. \n*else\n\t*label asset\n\tThe two assailants are too quick and too well coordinated. They knock the gun out of Joshy's hand and quickly incapacitate Maria and ${Cat}. \n\n\tThen, they come straight for you. \n\n\t*if (composure >= stat_mid_pass) and (athletics >= stat_mid_pass)\n\t\tYou sense Tommy's intention to get between you and your attackers. Before he has a chance to do that, you push him out of the way. He falls to the floor. \n\n\t\t*if checkpoint \n\t\t\tYour mind fills with irrational thoughts. \n\n\t\t\tNot again, it says. You won't watch your friend die a second time. \n\n\t\tYou're fast enough, skilled enough. \n\n\t\t*if gun \n\t\t\tYour bullet gets one of your enemies in the leg. \n\t\t*elseif machete \n\t\t\tYou get one of your enemies in the leg, slicing the tendons on the back of their knee with your machete. \n\t\t*else \n\t\t\tYou manage to beat back one of your enemies with your fist. \n\n\t\tFinally, ${Cat} collects ${cemself} and manages to help. $!{ce} tears the other one off you. Joshy joins ${cem}, without his gun. By the time they're done, neither of the strangers is moving. \n\n\t\tYou turn to Tommy and lift him off the floor. \n\t\t*choice \n\t\t\t#\"Are you okay?\" I ask. \n\t\t\t\tYou ask this as calmly as you can. \n\n\t\t\t\tTommy looks stunned, so you repeat the question, rephrasing for clarity. \"Are you injured?\"\n\n\t\t\t\tHe looks down at himself, passes his hands over his chest and legs. \"Yeah,\" he says. \"I'm fine. I think.\"\n\n\t\t\t\tYou pat him on the shoulder. \"Yeah,\" you say. \"Yeah, you are. We both are.\"\n\t\t\t#\"Never do that again!\" I shout. \n\t\t\t\tTommy looks stunned. \"I'm sorry,\" he says. \"I…\"\n\n\t\t\t\tHe was trying to save you. He was being brave, like \n\t\t\t\t*if brave > stat_mid_pass\n\t\t\t\t\tyou. \n\n\t\t\t\t\tYou lower your head. \"I know,\" you say. \"I know.\"\n\t\t\t\t*else \n\t\t\t\t\tan idiot. \n\n\t\t\t\t\tYou hug the idiot. \n\t\t\t\t\t*set hug true \n\t\t\t#\"Thank you.\"\n\t\t\t\tHe looks stunned. Did he think you wouldn't be grateful? Or maybe he's just surprised at himself. People have called Tommy many things before, but brave was never one of them. \n\n\t\t\t\t\"Thank you,\" he says. \"You saved me.\"\n\n\t\t\t\tYou smile. \"We saved each other,\" you say. \n\t*else \n\t\t*set tommy_Dead true \n\t\tTommy comes between you and those people. Their machetes go in through his back. Horrified, you watch the tips emerge from your friend's chest. \n\t\t*fake_choice\n\t\t\t#No.\n\t\t\t#It can't. \n\t\t\t#This isn't happening. \n\t\tMaria screams and runs her own machete through one of the people who killed Tommy. ${Cat} snaps the other one's neck. \n\n\t\tThe people who killed Tommy?\n\n\t\tYes, because Tommy is dead. \n\n\t\tHe's on the floor, bleeding, bleeding out, eyes already empty. He died to save you.  \n\t\t*if checkpoint \n\t\t\t*if first_shooter_ability = 3\n\t\t\t\tAgain. Something tells you this has happened before.\n\t\t\t*else \n\n\t\t\t\tA thought enters your mind, irrational, absurd: It doesn't matter how differently you tried to do things this time. Tommy still died. \n\n*if tommy_dead \n\tYour body count goes up by one. As if you're the one who killed Tommy. @{checkpoint Again.|}\n\t*set bodycount +1\n\n\t*gosub bodyimage\n\t*page_break \n\tFor a while, no one speaks. All you can hear is the roar of your own blood in your ears. \n\n\t*if checkpoint\n\t\tNone of it feels real. \n\n\t\tIn the distance, you hear Joshy say you should get out of here. That you've won, regardless. \n\n\t\tYour friends debate what you should do about Tommy. Tommy, your friend, who is really, really dead. \n\n\t\tThere are two buttons on the wall next to the door. The green one says EXIT. And there's a red one, with a CHECKPOINT sign underneath. \n\t*else \n\t\t*choice \n\t\t\t#I don't know what to say. \n\t\t\t\tAnd how could you? You've never been in a situation like this before. \n\t\t\t#I don't know what to do. \n\t\t\t\tAnd who could blame you? It's not every day that something like this happens. \n\t\t\t#I feel empty. \n\t\t\t\tYou look at your hands. They feel foreign, numb. \n\n\t\t\t\tYour torso feels empty, as if someone took a scoop to your chest cavity and emptied it out. \n\t\t\t#I can't believe this is happening. \n\t\t\t\tYou say so out loud. \n\n\t\t\t\tNone of your friends responds. As if they didn't hear you, or as if you never spoke at all. \n\n\t\t\"We should get out of here,\" Joshy says eventually. He points at the door. \"We still made it.\" \n\n\t\t${Cat} stares at him, uncomprehending. \"What about Tommy?\" ${ce} asks. \n\n\t\t\"I don't know,\" Joshy says. \n\n\t\t\"We can't leave him here!\" Maria shouts. \n\n\t\tYou walk up to the door. There's a big green button, with an EXIT sign underneath. \n\n\t\t\"What are we supposed to say?\" Joshy asks. \n\n\t\t\"The truth,\" ${Cat} says. \"That he was stabbed. By strangers.\"\n\n\t\t\"We'll be in trouble,\" Joshy says. \n\n\t\t\"Is that what concerns you right now?\" Maria protests. \"Tommy is dead! Like, really, actually dead!\"\n\n\t\tNext to the green button, there's another one. Red. \n\n\t\tUnder it, a circle, and inside the circle, a single word: CHECKPOINT. \n\n\tMaybe not all is lost. Maybe you can try again. Do it better @{checkpoint this|next} time. \n\t*choice\n\t\t#Get out of here. What's done is done.  \n\t\t\t\"Let's just go,\" you say. \n\n\t\t\tMaria looks at you strangely. \"Let's just go?\" she echoes, something rising in her voice, as if she's about to lose it.\n\t\t\t*choice  \n\t\t\t\t#\"There's nothing we can do for Tommy now.\"\n\t\t\t\t\tIt's true, isn't it? Nothing you can do for the dead. \n\n\t\t\t\t\t\"His parents will want to know what happened to him,\" Maria says. She sounds a little more calm now.\n\t\t\t\t#\"Some things cannot be undone.\"\n\t\t\t\t\tIs that true? Or is this one of the lies you tell yourself for comfort? \n\n\t\t\t\t\t\"Tommy's folks will want to know what happened,\" Maria says, softly now. \n\t\t\t\t#\"I'm sorry,\" I say mildly. Keep it together.\n\t\t\t\t\tIt takes everything you have to keep yourself from going to pieces. But you can't do that now. You can't afford it. No matter how sorry you are. \n\n\t\t\t\t\t\"People will want to know what happened to Tommy,\" Maria says. \"His parents. Others.\"\n\n\t\t\tAnd she's right. But your hand is already on the green button. You'll have to figure out how to deal with the fallout from Tommy's death later. \n\t\t#Go back and try again. [Restore to the previous checkpoint]\n\t\t\t*if checkpoint\n\t\t\t\t*set second_checkpoint true \n\t\t\t*else \n\t\t\t\t*set checkpoint true \n\t\t\t*if tommy_dead \n\t\t\t\t*set tommy_died true \n\t\t\t*set tommy_dead false\n\t\t\t*if not (second_checkpoint)\n\t\t\t\tIs it really possible to undo what's been done? \n\n\t\t\t\tIs this a world that affords second chances?\n\n\t\t\t\"No,\" you say. \"I won't accept this.\" Your hand is on the red button. \"We will give it another go.\"\n\n\t\t\t\"What?\" Joshy asks. \"What do you mean?\"\n\n\t\t\tBut you have already pushed the button. The door opens. \n\n\t\t\tYou walk through.\n\t\t\t*page_break\n\t\t\t*goto shed \n\t\t#@{second_checkpoint We'll have to live with the consequences of our shortcomings.|There are no second chances.}\n\t\t\t*if second_checkpoint\n\t\t\t\tThere comes a time when you have to accept failure. Is there any point in running from the consequences of your actions? It's a futile chase. You know that by now. \n\n\t\t\t\tSooner or later, they always catch up to you. \n\t\t\t*else \n\t\t\t\tEven if it were possible to go back and try again, who do you think you are to deserve a second chance? \n\n\t\t\t\tPeople need to live with the consequences of their actions, their failures, their shortcomings. Otherwise, nothing you do matters.\n\n\t\t\t\"Let's go,\" you say. Your hand is already on the green button. \n\n\t\t\t\"Tommy's parents will want to know what happened to him,\" Maria says. \n\n\t\t\t\"And we'll deal with that when the time comes,\" you say. \"Now let's go.\"\n\n\t\t\tYou push the button. The door sighs open. \n\n\t\t\tYou walk through.\n*else \n\n\t\"I guess we did it,\" Joshy says. \"Let's get out of here.\"\n\n\tYou walk up to the door. Put your hand on the big green button. \n\n\tAre you ready?\n\t*page_break Press The Button\n\tThe door opens with a sigh. \n\n\tYou walk through. \n*label exit \n*page_break \nOutside, everything looks normal. Just another day at school. \n\n${Cat} tries the door, but it won't open. You put your ear to the wall next to it, listen for the sounds of battle, for the collapsing building you left behind, but there's nothing. Nothing at all. \n\n*if tommy_dead\n\t\"I can't believe we left him behind,\" Maria says. She crumples to the floor and just sits there, back to the wall, head in her hands. Her eyes are blank. \"I can't believe he's gone.\"\n\t*choice \n\t\t#\"Only his body,\" I say. \n\t\t\tAs if that's somehow supposed to be comforting, or make the fact of the matter less horrible. \n\n\t\t\tDoes it?\n\t\t#\"There's nothing we could have done.\"\n\t\t\tExcept, maybe, not play. But you don't say that. \n\n\t\t\t\"Is that supposed to be comforting?\" ${Cat} asks. \n\n\t\t\t\"Is that what you're looking for?\" you ask. \"Comfort?\"\n\n\t\t\t${Cat} stares at you and doesn't respond. \n\t\t#\"I can't either.\"\n\t\t\t${Cat} puts a hand on your shoulder but avoids your eyes. \n\n\tFinally, Joshy speaks again. \"We should go. It's getting late.\"\n\n\tAnd it's true. You have your shift.\n*else \n\t*if not (hug)\n\t\tYou feel a hand on your shoulder. It's Tommy. He pulls you away from the wall and hugs you. \"Thank you,\" he says. \n\n\t*if tommy_injured \n\t\t@{hug Tommy is|He's} still bleeding, but @{checkpoint somehow you're sure it could have been worse. A lot worse.|it looks like he'll pull through. Probably.} \n\n\t\tStill, he needs to get to a hospital. And you have to go to work. \n\n\t\tYou say so. \n\n\t\t\"I'll take him,\" ${Cat} says. \n\n\t\t\"I'll come, too,\" Maria says.\n\n\t\tYou nod. You have to go. Leave all of this behind. For a little while. \n\nSlowly, you walk away. \n*page_break \n*check_achievements ending \nYou make your way to the convenience store. The day is running out, and the dark slowly comes. But the store waits for you, fluorescent and shiny as always. \n\n*if tommy_dead\n\tYou notice your hands are shaking slightly. \n\nYou walk in. Your legs carry you to the back, to your locker. You change into your uniform with no need for conscious thought. It's all automatic. \n*choice \n\t#Feels surreal to be back here. \n\t\tLike a ghost, you make your way from the back of the store to the front, position yourself behind the register. \n\n\t\tYou put your hand on the counter, feel the grain of the material. It seems solid, but you doubt its materiality. You know that, in reality, the surface before you is not solid at all: it's full of holes, 99.9 percent of it empty space. So is the floor you're standing on, and so is your body. \n\n\t\tFor a moment, you feel like falling. Falling forever through the gaps of this sparse universe. \n\t#I appreciate the normalcy of this place. \n\t\tThe mundanity of the store grounds you. You make your way from the back to the front and position yourself behind the register. You put your hand on the counter, feel for its solidity. You're grateful for it. For reminding you what's real. \n\t\t*if tommy_dead\n\n\t\t\tAnd Tommy? Isn't he real?\n\n\t\t\tAs in, really dead? \n\n\t\t\tYes, yes he is. This cannot be undone. \n\t#I want to go back. For a minute there, I felt alive. \n\t\t*check_achievements ending \n\t\tThe thought is chilling, but no less true. You were alert, present, fully in your body. All of you functioned, perhaps for the first time ever, as one whole well-tuned organism. No excess, no lack. Everything was just right. \n\n\t\t@{thrilling You already knew that about yourself. You like the thrill of danger. How does it feel to have it confirmed?|What does that say about you?}\n\t\t*if no_war_games\n\n\t\t\t*if choice_achieved_ending\n\t\t\t\tI thought you didn't like war games. \n\t\t\t*else \n\t\t\t\tPerhaps you do like war games, after all. \n\t\t*if scared_war\n\n\t\t\tYou were scared before, weren't you? \n\n\t\t\tHumans can get used to anything. \n\nYour supervisor is standing in front of you. You didn't even know he was here. Where did he come from? Sometimes it feels as if he is @{(hobby = 2) part of the store, generating in place like an NPC|bound to the store, like a prisoner. Or some kind of ghost}. He only exists within the store's context. \n\n\"Hey, ${name},\" he says. He even throws in a smile, which instantly makes you suspicious. \n\nYou nod at him, eyes narrowed, poker face on. \"Hey.\"\n\n\"So I need you to stay a couple of extra hours today and help me take inventory,\" he says. He doesn't exactly phrase it as a question. \n\nYour head is still swimming with what happened earlier today. Are you really here? Is this person really standing in front of you, asking you for your time? This is a life, your life. It comes with its own set of demands, things that the game doesn't care about. Can you take this life seriously? \n\nBecause it's true, you need the money, and you need this job. But you also need to study for your upcoming test. \n*choice \n\t#\"No can do, sorry. Must study.\"\n\t\t*set studies %+mid_change \n\t\t*set job %-mid_change \n\t\tYour supervisor \n\t\t*if chaotic > stat_mid_pass\n\t\t\tgives you a disbelieving look, like [i]really, ${name}? Who are you kidding?[/i] \n\t\t*else \n\t\t\tstares at you for a moment, blinking, uncomprehending. He's not used to being told no. \n\n\t\tAnd he's definitely not happy about it. But he's not going to argue. He'll probably just wait to get you later, punish you when you need his help changing your shift or something. \n\t\t*set ch2_study true \n\t#\"Of course, whatever you need.\"\n\t\t*set studies %-mid_change \n\t\t*set job %+mid_change \n\t\tYour supervisor looks \n\t\t*if composure > stat_mid_pass\n\t\t\tpleased, though he's trying not to smile, lest it give you ideas like self-worth, or the notion that you're a valued employee, or something. \n\t\t*else \n\t\t\tshocked. He was definitely not expecting that. So it was worth it, just for this look on his face. \"Okay,\" he mumbles. \"Right.\" He backs away, trying not to break eye contact. You might be possessed. \n\t#\"Sure, no problem.\" I can do both! \n\t\tRight? You can do anything you want if you put your mind to it. You're an enterprising youth. You are unstoppable. \n\t\t*if (chaotic \u003c stat_mid_pass) and (insight > stat_hi_pass)\n\t\t\t*set studies %+mid_change\n\t\t\t*set job %+mid_change \n\n\t\t\tYour supervisor looks pleased. \n\n\t\t\tOnce your shift ends, you stay back and help him inventory the whole store. You are diligent and efficient, and you actually finish up earlier than he'd ever thought possible. You manage to spend a good chunk of time studying while your supervisor finishes up. \n\n\t\t\tYou will get home with time to spare. You could even study some more, if you wanted. \n\t\t\t*set ch2_study true \n\t\t*elseif (chaotic \u003c stat_mid_pass) and (insight > stat_mid_pass)\n\t\t\t*set studies %+small_change \n\t\t\t*set job %+small_change \n\n\t\t\tYour supervisor looks mildly confused by your eagerness to help, but he doesn't comment, probably for fear of your realizing your mistake and taking it back. \n\n\t\t\tBut you pull through. After you finish your shift, you do your best to help, and you're fast enough that you manage to sneak in some study time while he finishes up. Not as much as you'd like, but it's not nothing either. \n\t\t*else \n\t\t\t*set studies %-mid_change \n\t\t\t*set job %-mid_change \n\t\t\tHell yeah you can do both. \n\t\t\t*page_break\n\t\t\tReader, ${e} could not do both. \n\t\t\t*page_break\n\t\t\tYou finish your shift and try to work as quickly as you can on the inventory so that you also have time to study later. But, in your haste, your work is sloppy and full of so many mistakes you have to redo the whole thing. Your supervisor is not pleased, and you get home even later than you had anticipated. There is no time to study. \n\nAs you get ready to leave and make your way back home, your supervisor turns up the little TV set he keeps in his office. \n\nThe sound of breaking news leaks into the store. \n\n[i]A shooting has left a number of people dead and dozens of others injured. The assailants have not been apprehended and their motives remain unconfirmed, but speculation—[/i]\n\nYou don't quite catch the number of victims as your supervisor changes the channel. \n\nA strange feeling passes through you. What is this feeling called? \n\nAnd why should you feel this way? This news has nothing to do with you. Right? Nothing at all. \n\nYou walk out of the store, into the quiet night. \n\nAnd then, that @{over_image familiar|bright neon} number flashes in @{over_image your field|upper right corner} of your vision. How many people did you kill today?\n\n*gosub bodyimage\n*if bodycount = 0 \n\t*bug bodycount is 0 \n\nSomething tells you that, one way or another, this number is going to haunt you. \n*finish \n*label bled_reaction \nWithout meaning to, your gaze keeps drifting to @{bled her|his|his|${ceir}|bug} bandaged finger. \n*choice \n\t#I feel guilty. \n\t\t*if chosen != bled \n\t\t\tWhy, though, this guilt? You didn't even choose @{bled her|him|him|${cem}|bug}. \n\t\t*else \n\t\t\tAnd maybe you should. Although your vote had as much weight as everyone else's. You all chose. \n\t#I want to take care of @{bled her|him|him|${cem}|bug}. \n\t\tYou've always been like this. Always drawn to the damaged, seeking to mend the broken. \n\n\t\tWhen you were little, you had this teddy bear. It was hideous, made of nylon, fluorescent green with a fuchsia belly. You hated that teddy. You must have been six or seven. Before then, you weren't even aware you could hate anything. And that violence, where did you learn it? You hit that teddy bear with everything you had. Beat it up with a wooden stick until it ripped at the seams. \n\n\t\tYour grandmother took it and mended it. And then it was so damaged and so scarred you felt an incredible tenderness towards it. It became your favorite toy. And you never hurt it again. \n\t\t*comment True story, Player. True story. \n\t#It. Is. Just. A. Game.\n\t\tHow many times, honestly? It's only a game. Besides, it was just a nick. Can people please stop being so dramatic? Jesus. \n*return \n*label flight_or_fight\nAnd your body takes over. You've read about this before, the body's possible reactions to threat that are coded inside you, deep in the oldest parts of your brain, the reptilian parts, the ones that remember being chased by tigers. When under threat, your body can either fight or flee. Your heart rate increases. It pumps blood from your organs to your muscles, so you can attack or run. Your pupils dilate so you can focus on what matters. Your blood becomes thicker, so you bleed less if you're injured. You feel nauseous: your body wants to empty your stomach so that you're lighter, more agile. Your digestive system shuts down and glucose stores are released to provide fuel. \n\nThere's another reaction, of course. You could freeze. Lie there immobile and prepare for death. Endorphins would flood your brain and numb you, raising your pain threshold so you suffer less while you're being savaged. This is obviously the least hopeful response. But there is a little hope left, now. It is the body's last resort: if you play dead, the tiger might carry you away instead of eating you on the spot. There, you might be given an opportunity to flee. \n\nThankfully, this time your body chooses to fight. \n*return \n*label injury \nYou see one of them go straight for Tommy, as if drawn by the star on his badge. Maria cuts them off—quite literally—with her machete. It all happens so fast. Somewhere in the blurry left side of your vision, ${Cat} is pounding someone into the ground, while Joshy is gunning people down. Tommy is shaking where he stands. \n\nThe person Maria stabbed is lying at your feet, screaming. The machete hit an artery in their leg; they'll bleed out soon if you do nothing. \n\nTommy falls to his knees next to the person, his hands on their leg. \n\nSomehow, your body knows what to do. Where to apply pressure, how to stem bleeding, how to coax a person's lungs to breathe, their heart to beat. You know what you need to do. Perhaps you could even save them. \n*return \n*label asset_bit \nMaria cuts one of them down with her machete, and you see ${Cat} pounding another one into the ground. Tommy shoots haphazardly, hitting one of them in the leg, and Joshy takes out another two. \n\nThe one Tommy hit in the leg is on the ground, but they're reaching for their gun. \n*return \n*label bodyimage\n*if bodycount = 0 \n\t*text_image body_count0.png center BODY COUNT: 0\n*elseif bodycount = 1\n\t*text_image body_count1.png center BODY COUNT: 1\n*elseif bodycount = 2\n\t*text_image body_count2.png center BODY COUNT: 2\n*elseif bodycount = 3\n\t*text_image body_count3.png center BODY COUNT: 3\n*elseif bodycount = 4\n\t*text_image body_count4.png center BODY COUNT: 4\n*elseif bodycount = 5\n\t*text_image body_count5.png center BODY COUNT: 5\n*elseif bodycount = 6\n\t*text_image body_count6.png center BODY COUNT: 6\n*elseif bodycount = 7\n\t*text_image body_count7.png center BODY COUNT: 7\n*elseif bodycount = 8\n\t*text_image body_count8.png center BODY COUNT: 8\n*elseif bodycount = 9\n\t*text_image body_count9.png center BODY COUNT: 9\n*elseif bodycount = 10\n\t*text_image body_count10.png center BODY COUNT: 10\n*elseif bodycount = 11\n\t*text_image body_count11.png center BODY COUNT: 11\n*elseif bodycount = 12\n\t*text_image body_count12.png center BODY COUNT: 12\n*elseif bodycount = 13\n\t*text_image body_count13.png center BODY COUNT: 13\n*elseif bodycount = 14\n\t*text_image body_count14.png center BODY COUNT: 14\n*elseif bodycount = 15\n\t*text_image body_count15.png center BODY COUNT: 15\n*elseif bodycount = 16\n\t*text_image body_count16.png center BODY COUNT: 16\n*elseif bodycount = 17\n\t*text_image body_count17.png center BODY COUNT: 17\n*elseif bodycount = 18\n\t*text_image body_count18.png center BODY COUNT: 18\n*elseif bodycount = 19\n\t*text_image body_count19.png center BODY COUNT: 19\n*elseif bodycount = 20\n\t*text_image body_count20.png center BODY COUNT: 20\n*elseif bodycount = 21\n\t*text_image body_count21.png center BODY COUNT: 21\n*elseif bodycount = 22\n\t*text_image body_count22.png center BODY COUNT: 22\n*elseif bodycount = 23\n\t*text_image body_count23.png center BODY COUNT: 23\n*elseif bodycount = 24\n\t*text_image body_count24.png center BODY COUNT: 24\n*elseif bodycount = 25\n\t*text_image body_count25.png center BODY COUNT: 25\t\t\n*else\n\tBODY COUNT: ${bodycount}\n*return \n"}};
