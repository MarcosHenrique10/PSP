natural order of things, cured humanity of its deadly anxieties, you've solved mortality. Decay? Pshaw. I hardly know her. \n*elseif hobby = 2\n\tthe social and environmental effects of the technological boom your world is experiencing. \"And by effects,\" Ms. Harper points out, \"without wanting to sound like a technophobe, I mean catastrophe.\" \n\n\tShe goes on to talk about the enormous footprint of the electronics industry on the environment through resource depletion, energy consumption, water pollution, and waste, and then complements that discussion with the unfathomable social impact it has on regions where electronics are manufactured. Child labor, human rights violations, health risks, and the undermining of education feed into a never-ending cycle of poverty. \n\n\tIn other words, your technology is turning the world into a wasteland, and it is using children to do it. \n\n\tYou think of a far future when the privileged few will have uploaded their brains to the Internet and the earth will be inhabited by two species of humans: those toiling in holes in the ground in order to produce the gadgets the rest have come to depend on, and those husks of people, detached from one reality and attuned to another, their bodies haunted by their own selfhoods. \n\t*set waste true \n*else \n\tthe Jacobean cult of melancholia, that cultural and literary tendency of seventeenth-century England, with its elegies and its malcontents, always mourning and preoccupied with sin, damnation, and salvation—like Shakespeare's Prince Hamlet, the \"Melancholy Dane.\" It was a movement obsessed with the meaning of life, the nature of reality, and the inevitability of death.  \n\n\tThe word \"melancholia\" comes from the Greek [i]µέλαινα χολή[/i], meaning black bile. According to ancient Greek and Roman physicians, the condition of melancholia arose when the humors in the body were out of proportion, with black bile being present in excess compared to the other humors. These were blood, which in excess would make one too happy, or sanguine (imagine that being a problem?); phlegm, too much of which made one too reserved, or phlegmatic; and yellow bile, which, in abundance, made one act angry, or choleric. \n\n\tAs Ms. Harper speaks, you try to picture them, those sad Jacobeans walking around mourning their own future deaths, devoted to their cult of decay. \n\t*if lost_friend != 4\n\n\t\t\"That's one religion I could get behind,\" ${Cat} mutters from the next desk. \n\t\t*choice \n\t\t\t#I laugh under my breath.\n\t\t\t\tOf course ${ce} would say that. ${Cat} likes everything dark. $!{ce} seems to revel in it: the sadness, the misery, the tragedy. Everything else feels boring and pat to ${cem}. \n\n\t\t\t\tYou wonder why ${ce}'s the exception and not the norm. People tend to gravitate towards positivity and light. But the world, have you seen it? Sometimes ${Cat}'s feels like the more natural response. \n\t\t\t#I shush ${cem}. \n\t\t\t\t$!{ce} makes a joke out of everything, and for some reason this particular topic doesn't amuse you. \n\n\t\t\t\tThere's something foreboding about the verses that Ms. Harper reads, the \"semper dolens\" and the flower \"born to blush unseen, and waste its sweetness on the desert air.\"\n\t\t\t#I feel the same way. \n\t\t\t\tMost people shy away from the sad things, the tragedies and their attendant symbols, the deaths and the skulls and the bleak lonely bones. But not you: you seem to thrive on the stuff. You're like, give me the pain, the depression, the misery, give me all of it. I'll build you a cathedral with it. \n\t*else \n\t\tAnd then you think of you and your friends and the strange games you play.\n\n\t\tAre you really that different?\n*page_break \n*if (studies \u003c stat_mid_pass) or (checkpoint)\n\t*check_achievements alternate \n\tAfter the bell rings, Ms. Harper asks you to hang back so she can have a word with you. \n\n\t\"${name},\" she says. \"Thanks for staying.\"\n\n\t\"Did I have a choice?\" you ask. \n\n\tMs. Harper smiles, surprised. \"Of course you did. We always have a choice.\"\n\n\tRight. Sure. \"Is this about my grade?\"\n\n\t*if (checkpoint) and (not (choice_achieved_alternate))\n\t\tMs. Harper inhales sharply. \"No, actually,\" she says. \"Though you're right that I should talk to you about that, too. You do need to try harder, ${name}. You know I believe in you.\" She pauses. \"But this is about something else a bit more, um, urgent.\"\n\n\t\tThis makes your torso stiffen. Suddenly you're aware of the weight of the game in your backpack. \n\n\t\t\"I know about the game, ${name}.\" \n\t\t*choice \n\t\t\t#That's interesting. Find out as much as I can. \n\t\t\t\tYou lower your voice. \"What do you know about the game, Ms. Harper?\"\n\n\t\t\t\tShe fixes you with her eyes, weighing you. \"At least as much as you do, and a little bit more, probably, considering that I've made it to my age and you haven't yet.\" She pauses. \"Because most people who play, you know, don't.\"\n\n\t\t\t\tIs she trying to scare you?\n\n\t\t\t\t@{(brave > stat_mid_pass) You don't do scared. Do you?|Are you scared?}\n\t\t\t\t\n\t\t\t\t\"Okay,\" you say. \"Tell me what I don't know, then.\"\n\t\t\t#Feign ignorance. Play it cool. \n\t\t\t\t\"What game?\" you ask, trying to sound innocent, or at least disinterested. \n\t\t\t\t\n\t\t\t\tShe tuts. \"Oh, come on, ${name}, don't do that. We don't have time for this. The game in your bag. The one the five of you have been playing. The one that will get at least one of you killed.\" She pauses. \"If it hasn't already.\"\n\n\t\t\t\t\"Okay,\" you say. There's no point pretending. \"What about it?\"\n\t\t\t#I don't think we should be talking about this. \n\t\t\t\tYou fumble for words, trying to find a way to weasel your way out of this conversation, but Ms. Harper puts a hand on your arm and says, \"It's okay. I know you're scared.\"\n\n\t\t\t\tAre you? Maybe you should be. \n\n\t\t\t\t\"You need to listen to me,\" Ms. Harper says. \n\n\t\t\t\tYou take a step back, until Ms. Harper's hand no longer touches you. \"Okay,\" you say. \"I am listening.\"\n\n\t\t\"Everything you're going through is real,\" she says. \"The least I can do for you is make sure you don't doubt your sanity.\" Something tells you she has. And that she knows this leads nowhere good. \"But that doesn't make what I'm about to tell you untrue.\" She takes a breath, and then launches into an explanation of what's happening to you. Some of it adds up, cohering fully with your encounters with the game so far, and some of it doesn't. \n\t\t*page_break Let's Hear It\n\t\tAccording to Ms. Harper, you are trapped in an alternate reality. At some point during the shooting game, you stepped through the wrong door and ended up in a pocket universe. She says \"pocket,\" but then goes on to explain that, even though the word may make it sound smaller than the \"universe proper,\" there's nothing actually smaller about it. The reality you're inhabiting is just as big as the one you came from; it just sits next to it, a little bit removed, like a moment of double vision, when your eyes are unfocused and what one sees doesn't line up perfectly with the other. \n\n\t\t\"There are points of contact between the two realities, moments when they overlap a bit too much, making one bleed into the other,\" Ms. Harper continues. \"You might experience these as glitches, or like flawed déjà vus, when things seem to have happened before, except not exactly in the same way.\"\n\t\t*set harper_alternate true \n\t\t*achieve alternate \n\t\t*choice \n\t\t\t#\"What am I supposed to do with this information?\"\n\t\t\t\t\"Not much,\" Ms. Harper admits. \"There's no way to get back to the original place you came from. I'm only telling you this to help you preserve your sanity,\" Ms. Harper says. \"And, I guess, your hope. If you start thinking that none of this is real, you might get reckless.\"\n\t\t\t#\"This sounds insane.\"\n\t\t\t\t\"I know it does,\" Ms. Harper says. \"That's exactly why I'm telling you this. If you start believing that none of what you're going through is real, you might start behaving recklessly. And that's not going to end well.\"\n\t\t\t#\"Okay. This makes perfect sense.\"\n\t\t\t\tMs. Harper gives you a disbelieving look. As if she's had that conversation with another version of you who behaved differently. \"It does?\" she asks. \n\n\t\t\t\t\"Sure,\" you say. \"It would explain so much of what's happening.\"\n\n\t\t\t\t\"It would, yes,\" Ms. Harper says. \"Because it's true.\" She takes a breath, as if to add something, but then she lets it out again. \n\t\t\n\t\tYou sense there's more she's not telling you. \n\n\t\t\"How do you know all this?\" you ask. \n\n\t\t\"Let's say the game has been around longer than you might think,\" Ms. Harper says. \"It's been played by many generations of students before you.\" She pauses. Something happens behind her eyes that makes her wince. It's quick—almost imperceptible. \"And it will be played by many more to come.\"\n\n\t\tAnd, with that, Ms. Harper dismisses you. \n\n\t\tBefore you leave the classroom, she wishes you good luck.  \n\t*else \n\t\t\"Yes,\" Ms. Harper says. \"You guessed correctly. What else would it be about?\" \n\n\t\t*if choice_achieved_alternate \n\t\t\tYou have a feeling it's more than that, but something is stopping your teacher from opening up to you. \n\n\t\t\tIn some alternate reality, Ms. Harper is talking to you about the game. Telling you it's been around for generations, eroding the fabric of reality one level at a time. \n\n\t\t\tBut this Ms. Harper says none of that. So you have no choice but to play along. \n\t\t*else \n\t\t\tThat last question was unnecessarily pointed. Almost felt like a jibe. Which doesn't make any sense. Ms. Harper likes you. Right?\n\n\t\t\"Are you going to tell me I need to try harder?\" you ask. \"To apply myself? That I'm special, et cetera?\"\n\n\t\tMs. Harper, who was standing by her desk, lets herself collapse into her chair now, exasperated. \"Yes, in fact. That's exactly what I was going to say.\" She gives you a sad smile. \"Almost word for word.\" She looks at you pleadingly. \"But you do, ${name}. You do need to try harder, if you want to make something of your life.\" She pauses. \"And you really are special.\"\n\n\t\tShe sounds like your mother. Apart from the being special part. \n\t\t*choice \n\t\t\t#\"But I don't want to.\" \n\t\t\t\t\"You don't want to make something of your life?\" Ms. Harper asks, shocked. \"Or you don't want to study?\"\n\n\t\t\t\t\"I don't know,\" you say. Both. Neither. \n\n\t\t\t\t*if chaotic > stat_mid_pass\n\t\t\t\t\tSometimes you wish people would just stop asking you what it is you want out of life. You don't have any of the answers, and the ones you do have never seem to satisfy any of the adults around you. Why can't they just let you be? If you're supposed to figure out what it is you need to be and do and become, you will. Eventually. Right? The world will force itself on you in the end, one way or another. Why hurry up? \n\t\t\t\t*else \n\t\t\t\t\tYou're normally so together, so organized, so on top of everything. The last few weeks have been a bit out of character for you, it's true. But perhaps this is what it means to grow into yourself, right? People think that becoming an adult is about taking on more responsibility and knowing what you want out of life. But really, have these people actually met any adults? Most of them are a right mess who don't know the first thing about anything. \n\n\t\t\t\t\"I understand things are difficult, ${name},\" Ms. Harper says. \"Especially for students in their final year. We're really asking too much of you too quickly, too early. I get it, I do. But that's just the way things are.\" She pauses, looks at you earnestly. \"But I promise that everything will make sense eventually. Even if you have to make some decisions before you really feel ready to. You just need to make them.\" She pauses again, her gaze turning inwards for a moment. \"That's how it is, sometimes. Some things you're never really ready for. First, you do them. And that, if you're lucky, makes you ready.\"\n\t\t\t#\"I'm trying my best. It's just not working.\" \n\t\t\t\t*check_achievements ending \n\t\t\t\t\"You just need to keep at it,\" Ms. Harper says, and a slight wince as she says it tells you she knows how much weight that \"just\" carries. \n\t\t\t\t*comment That simple word can do so much damage, Player, I know: four tiny little letters, and yet. Just get on with it. Just get a job. Just try again. Just leave. Why don't you just leave? Sometimes I wonder why you—all of you, English-speaking humanity as a collective—still haven't decided to strike it from your vocabulary and be done with it and all its cruelties. But that's just me.\n\n\t\t\t\tAnd you want to tell her, [i]don't you get it, Ms. Harper?[/i] \n\n\t\t\t\tMaybe you're not good enough. Maybe, no matter how hard you try, this is all you will ever be able to accomplish. \n\t\t\t\t\n\t\t\t\t*if self_centered > stat_mid_pass\n\t\t\t\t\tThis isn't like you, it's true. But then, the last few weeks have been full of things that have challenged your idea of who you are. And who knows, maybe you're evolving. Maybe that's who you're meant to be, who your life has been preparing you to become: someone who just isn't good enough. People have this idea that life moves on a perpetual upward trajectory, that things naturally keep getting better and better. Except that's not true, is it? All you need to do is look around. \n\t\t\t\t\t*if choice_achieved_ending \n\t\t\t\t\t\t\n\t\t\t\t\t\tWhat do you see? \n\n\t\t\t\t\t\tYeah. That's what I thought. \n\t\t\t\t\t*else \n\t\t\t\t\t\tIt's not like this town is teeming with success stories and people who managed to escape the confines of their circumstances. \n\t\t\t\t*else \n\t\t\t\t\tBut of course you would think so. You never thought much of yourself, and neither did anyone else. So why should you keep trying? If that's all anyone has ever expected of you, wouldn't it be easier, painless, more coherent to let go, accept who you were always meant to be, and finally become it?\n\n\t\t\t\t\tCan you imagine what a relief that would be?\n\n\t\t\t\tYou don't tell Ms. Harper any of that, of course. What would be the point? She will only tell you you're not giving yourself enough credit. That you just need to believe in yourself. Just trust, just keep going. \n\n\t\t\t\tJust.\n\t\t\t#\"I will. I promise.\" \n\t\t\t\tYou blurt it out, even though you know you shouldn't be making any promises. The last few weeks/months/years (how long has it been?) have taught you that much. You can promise you'll do your best, believe it even, intend it, and then walk through a door to a room full of luminous pills that you're meant to swallow, watch your friends die from a gunshot wound to the gut, sink into a sandbox with no bottom and be lost forever. \n\n\t\t\t\tBut Ms. Harper is smiling at you. She's satisfied with your response. \n\n\t\t\t\t*if composure > stat_mid_pass\n\t\t\t\t\tYou've always been great at telling people exactly what they want \n\t\t\t\t*else \n\t\t\t\t\tFor once in your life, you've told someone exactly what they wanted \n\t\t\t\tto hear. \n\t\t\t\t*set promise_Harper true \n\t*page_break \n\nYou meet up with \n*if (lost_friend \u003c 5) or (tommy_dead and (not (tommy_ghost)))\n\twhat remains of your team \n*else \n\tyour friends \nat the outer border of the school, near the edge of the forest. To enter this level, you have to climb down through a manhole. One of you has already removed the lid so you can all gaze at that dark, unseeing eye in the ground. \n\n\"Everyone ready?\" you ask. You move first, without waiting for an answer. @{tommy_ghost Tommy, fearless for the first time in his existence, is right behind you.|}\n\nYou search with your foot for a ladder until the tip of your shoe connects with the first metal rung. You descend slowly. When your feet connect with the ground, you let out a long breath. \n\nIt's pitch-dark down here. You feel for the walls and find them. And there, a metal flashlight waiting for you. You switch it on and signal for the others to join you. \n*page_break \nTogether, you all walk down the tunnel silently. The space smells damp, and the occasional sound of dripping echoes loudly in your head. \n*if romantic_involvement\n\tEvery now and then, @{romance_person Maria's|Joshy's|Tommy's|${Cat}'s|BUG} hand brushes yours lightly, sending electric currents through your arm. \n\nEventually, you find a heavy metal door. There is a balloon drawn on it with pink chalk. \n\nUnder it, the words: FUN! FUN! FUN!\n\nIt takes all your strength to push open the door. \n*page_break Enter \n*set level_4_stats true \nYou are at a carnival. The ground is dirt and straw, and everything smells like burnt sugar. Even though part of your brain knows you're underground, the rest of it has to reconcile with being in a vast, open-air space. The sun shines on your skin and the sky above you is cloudless. Most of the attractions are neon pink and bright blue. Carousel music fills the air. \n\nApart from you and your friends, there's no one else here. \n\nIn the middle of the carnival is a roller coaster. You know this is where you're supposed to go. Eventually. But not yet. \n\nStill, you understand that you have no choice but to play. This level is supposed to be fun. \n\n(FUN! FUN! FUN!)\n\nBecause who would want to keep playing an unfun game?\n\nBefore you get to the roller coaster, you think you have the option to explore the other rides, but you don't. This is a fake choice. \n*choice \n\t#Explore the haunted house. \n\t\tThe front door of the haunted house is locked. \n\n\t\tBut you knew from the moment you stepped onto the porch that this was not going to be a problem. Because this haunted house is your house. \n\n\t\tYou put your hand in your other pocket and retrieve your house key. You push it into the lock. The door opens. \n\t\t*page_break \n\t\tInside, the haunted-house-that-is-your-house looks exactly the same as your parents' house, except for the smell of burnt sugar. You lead your friends down the hallway, through the living room, past the kitchen and up the stairs to your bedroom. You pass your parents, who stand in the hallway mannequin-like, expressionless. You wave at them. They don't wave back. \n\n\t\tIn your bedroom, your friends crowd. The floorboards creak, the walls moan.\n\n\t\tOne of your friends points up at the ceiling. You see it then: the treelike shape that has grown into a forest, an expanse of mold that hangs above you, waiting. Watching. \n\n\t\t\"Sit anywhere,\" you tell your friends, forcing cheer into your voice, as if trying to convince yourself that this is a slumber party, that this can still be fun. \n\n\t\t(FUN! FUN! FUN!)\n\n\t\tYou take the bed but realize immediately that the mattress is made of cardboard. This is fake. \n\n\t\tThis bed, this room, this choice. \n\n\t\t\"Time to go,\" you say. You point at the window, and one by one your friends and you climb down the trellis. On the ground, you find a handful of pebbles. You pick them up and then, as if in superstition, toss them over your shoulder. \n\t#Explore the house of mirrors. \n\t\tThe outside is a concrete rectangle that betrays nothing of the glassy endlessness that envelops you as soon as you walk in. You are surrounded by mirrors on all sides. They multiply you infinitely and indefinitely, create such a vast internal space that it threatens to shatter your perception of both place and time. \n\t\t*if mirrors \n\n\t\t\tYou realize immediately that you've been in this place before, in a dream.\n\n\t\t@{lost_friend ${Cat}|Tommy|Joshy|Maria|${Cat}} next to you covers @{lost_friend ${ceir}|him|him|her|${ceir}} eyes with @{lost_friend ${ceir}|him|him|her|${ceir}} hands, trying to protect @{lost_friend ${cemself}|himself|himself|herself|${cemself}} from the brilliance of the mirrors. You can't quite tell where the light is coming from; there are no windows that you can see, and the ceiling is a mirror too, just like the floor. For a few moments, you feel suspended. \n\n\t\t\"How do we get out?\" @{lost_friend ${Cat}|Maria|Joshy|Maria|${Cat}} asks.\n\n\t\tYou look behind you for the entrance. There is nothing. Just mirrors and yourself, looking back. \n\n\t\tBut then, \n\t\t*if tommy_ghost\n\t\t\tTommy takes your hand in his. \"This way,\" he tells you in his ghostly voice, and you repeat his words. \"This way,\" you tell your friends, \"this is the way out.\"\n\n\t\t\tTommy leads you and you lead them in turn, \n\t\t*else \n\t\t\tout of the corner of your eye, you glimpse one of the labyrinth ghosts, its cerements trailing behind it, its music clashing with the pink-and-blue tune of the carousel. \n\n\t\t\tIs it you, or is the ghost motioning for you to follow it? \n\n\t\t\t\"This way,\" you tell your friends. \"I know how to get out.\"\n\n\t\t\tAnd so you follow the ghost, and together you lead them, \n\t\tyour multiplied friends, all hundreds, all thousands of you rushing towards the fun of this carnival under the earth. \n\t#Get something to eat. \n\t\t*set ate true \n\t\tYou walk along the pink and blue stalls, where everything keeps smelling of burnt sugar. \n\n\t\tThere is a hot dog stall, a cupcake stall, a popcorn stall. Every one of them is staffed by a mannequin dressed in a pink apron. Some wear neon-yellow wigs. None of them have faces. \n\n\t\t@{lost_friend ${Cat}|Maria|Joshy|Maria|${Cat}} picks the hot dog stall. The mannequin stares at @{lost_friend ${cem}|her|him|her|${cem}} lifelessly. There are five hot dogs on the counter, all ready for you on their paper plates. @{lost_friend ${Cat}|Maria|Joshy|Maria|${Cat}} pushes @{lost_friend ${ceir}|her|him|her|${ceir}} hand in @{lost_friend ${ceir}|her|him|her|${ceir}} pocket and retrieves a number of tokens. You have no idea how they got there. You check your pocket: your fingers brush a handful of tokens. @{lost_friend ${Cat}|Maria|Joshy|Maria|${Cat}} hands the tokens to the mannequin (which just means placing them on the counter, really, since the mannequin doesn't actually do anything) and retrieves the hot dogs. @{lost_friend $!{ce}|She|He|She|$!{ce}} offers one to you. \n\n\t\tYou take it, bite into it. It's fake, just like everything else in this place. You spit out a mouthful of cardboard that tastes like burnt sugar.  \n*page_break \n*if lost_friend = 1\n\t*set friend \"${Cat}\"\n\t*set fe \"she\"\n\t*set fem \"her\"\n\t*set feir \"her\"\n*elseif lost_friend = 2 \n\t*if (tommy_dead) and (not (tommy_ghost))\n\t\t*set friend \"Maria\"\n\t\t*set fe \"she\"\n\t\t*set fem \"her\"\n\t\t*set feir \"her\"\n\t*else \n\t\t*set friend \"Tommy\"\n\t\t*set fe \"he\"\n\t\t*set fem \"him\"\n\t\t*set feir \"his\"\n*elseif lost_friend = 3 \n\t*set friend \"Joshy\"\n\t*set fe \"he\"\n\t*set fem \"him\"\n\t*set feir \"his\"\n*elseif lost_friend = 4\n\t*set friend \"Maria\"\n\t*set fe \"she\"\n\t*set fem \"her\"\n\t*set feir \"her\"\n*else \n\t*if best_friend = 1\n\t\t*set friend \"Maria\"\n\t\t*set fe \"she\"\n\t\t*set fem \"her\"\n\t\t*set feir \"her\"\n\t*elseif best_friend = 2\n\t\t*set friend \"Joshy\"\n\t\t*set fe \"he\"\n\t\t*set fem \"him\"\n\t\t*set feir \"his\"\n\t*elseif (best_friend = 3) and ((not (tommy_dead)) or (tommy_ghost))\n\t\t*set friend \"Tommy\"\n\t\t*set fe \"he\"\n\t\t*set fem \"him\"\n\t\t*set feir \"his\"\n\t*else\n\t\t*set friend \"${Cat}\"\n\t\t*set fe \"${ce}\"\n\t\t*set fem \"${cem}\"\n\t\t*set feir \"${ceir}\"\nAs you move along the stalls again, a voice erupts over crackly loudspeakers. \n\n\"PLAYERS!\" the voice says. \"PROCEED TO THE ROLLER COASTER! IT'S TIME FOR THE RIDE OF YOUR LIFE!\"\n\n@{lost_friend ${Cat}|Maria|Joshy|Maria|Joshy} laughs. \"That doesn't sound ominous at all,\" @{lost_friend ${ce}|she|he|she|he} says. \n\nTogether, you make your way to the center of the carnival. \n\nThe roller coaster is colossal. It looms above you, an enormous steel behemoth of interlacing loops and spiraling twists. A marvel of engineering. Probably. \n\nAnd it doesn't exactly look new. It looks like it's been here for decades, maybe even longer. The structure is rusty, the whole thing creaking in the mild breeze as if it's about to topple with the next gust. \n\n\"Are we really going on that?\" @{lost_friend ${Cat}|${Cat}|Joshy|Maria|Maria} asks. \n\nBut no one responds, because the train glides to a halt at the boarding platform before you, and you're already moving towards it as a door slides open. The train used to be bright red, but the chipping paint makes it look diseased, like something shedding, riddled with sores.\n\nAnd yet, you board, because of course you do. \n\nThe loudspeakers crackle to life again, full of static. \"PASSENGERS!\" the voice shouts cheerfully. \"STRAP IN, IT'S GOING TO BE A BUMPY ONE!\"\n\nYou strap in. One side, then the other. The restraints are tight against your chest and legs. You're not sure if they're supposed to make you feel safe or trapped. ${friend} looks at you. There is fear in ${feir} eyes.\n\nThen the train lurches forward. \n*page_break Look At You Go\nImmediately, the coaster starts ascending an incline so steep your head presses against the headrest behind you painfully. You turn your face to the right and look out; the world shrinks beneath you in all its blues and pinks. \n\nThe train slows down the higher you get, until it reaches the top and pauses there for a moment, poised on the brink of a descent beyond your field of vision. \n\nThen, you plummet. You hurtle. You drop. \n\nIt feels as if the scream is plucked straight from your lungs. You don't have any say in this. Your participation is not required.  \n\nThe game takes from you what it will. \n*page_break \nAfter the drop, the coaster continues hurtling along the tracks with a thunderous roar. Out of the corners of your eyes, you see sparks fly where the wheels meet the rusty iron that keeps the train in place. You gaze up at the towering structure above you, its intricate network of beams stretching skyward. \n\nNext to you, ${friend} tries to reach for you, but the restraints won't allow it. \n\nAs the train loops around itself again and again, you realize there is nothing for you to do in this level but sit in the little car and scream. \n*choice \n\t#Try not to throw up. \n\t\t*set throw_up true \n\t\t*if ate\n\t\t\tYou try to keep the fake hot dog down, but after the second (third? fourthfifthsixth?) loop, it proves impossible. \n\n\t\t\tYou empty your stomach, bile burning the back of your throat. \n\t\t*else \n\t\t\tYou don't remember the last time you ate. Your stomach is empty, and all that comes up is bile, stomach acid. It burns the back of your throat and lines your teeth with something sour that stays in your mouth for hours. Longer, maybe. \n\t\t*gosub conductor \n\t#Try to remain calm. \n\t\tYou breathe through your nose, control the movements of your ribs, as if that small measure of self-mastery is enough to keep you from spiraling. It's harder to do than it sounds, especially when you're in a train that's literally spiraling endlessly through the air. \n\t\t*set calm true \n\t\t*gosub conductor \n\n\t\tAren't you having fun? \n\t#Try to retain my sanity. \n\t\t*set sanity true \n\t\tHow does one do that, exactly?\n\n\t\tMaybe you can try holding on to what you know is true: \n\n\t\tYour name is ${name}. Both of your parents are alive. You go to school. You have friends. You play this game. \n\n\t\tAll of these things are true. Aren't they?\n\n\t\tYou have a body. \n\t\t*if ambition = 2 \n\t\t\tYou want to get a university degree. \n\t\t*elseif escapism = 2\n\t\t\tYou plan to escape this town one day. \n\t\t*else \n\t\t\tYou want to find love, have a family. \n\n\t\tRight? Are these things true? \n\n\t\tYou are in a town. In a country. On a planet. \n\t\t\n\t\tThere is ground underneath. Sky above. \n\n\t\tRight?\n\n\t\tRight?\n\t\t*if tommy_ghost\n\n\t\t\tIn the end, it's the presence of Tommy's ghost that preserves your sanity (though is it really sanity if you talk to the dead?)\n\t\t*gosub conductor \n\t\t*page_break \n\t#Try to keep everyone calm. \n\t\t*set everyone_calm true \n\t\tYou use your words—and flash back to your mother saying that to you back when you were a child, one of the few occasions she actually mothered you, taught you to use your mouth, to plunder language for each of the unnameable things you felt and make them conform to a handful of letters at a time, imperfectly arranged. It stayed with you, that imperfection, that shortcoming, the fact that your words were always but a lossy copy of what you actually said, compressed too much or just enough. Because, in the end, the point was to be understood. To communicate, to be communicated—that was the goal, more or less achieved. Anything more was a gift, as unexpected and unhoped for as grace.\n\n\t\tSo you use your words. \n\n\t\t*if composure > stat_mid_pass\n\t\t\tEven now, you're good at it. Selecting the right ones, those that will hit your intended target, which in this case is whatever shred of self-assurance you can find in your friends, whatever remnant of hope they still have that everything will be okay in the end. \n\t\t*else \n\t\t\tAnd still, despite the years of practice, you're not very good at it. The rushing of the train car seems to knock not only the breath out of your lungs but the words out of your head with every forward lurch. Again and again, you lose your train of thought. \n\n\t\tTime passes. \n\t\t*gosub conductor \n\n\t\tNext to you, ${friend} screams. \n\t\t*page_break \nA lot of time passes. You're not sure how long. Hours. Days. Weeks?\n\nYour voice is the first to go, then your hearing, then your sense of direction. @{throw_up You empty your stomach again many times|Eventually, you do throw up, and continue to do so long} after there stops being anything in @{throw_up it|your stomach}. @{ate_ghost Only the ghost stays put.|}\n*page_break \nWhen, eventually, the train comes to a stop at the boarding platform and you are released from your restraints, you cannot feel your legs. \n\n${friend} falls over next to you. You help ${fem} up. \n\nThe ground swims beneath you. You empty your stomach again. \n\nNone of you says a word to each other. Silently, you head for the exit. \n\nYou hardly notice when the sky fades above you and you're pushing open that steel door. You hardly take stock of the tunnel, the dripping, the damp. \n\nYou climb out through the manhole and then, silently, you part. \n*page_break\n*if hunter \n\t*set studies %+mid_change \n*else \n\t*set studies %-small_change \nTo your surprise, your legs take you to work. You did not remember you had a shift. But some part of you knows best. \n\nThe first thing you notice when you get to the store is the date on the newspapers that fill the front stand. You realize you've been missing for @{hunter weeks|months}. And yet, you haven't been fired. Your supervisor doesn't even act surprised to see you. He talks to you about orders and chores, picking up an unfinished conversation you don't remember having. As if someone has been going in to work for you, doing your hours, collecting your paycheck in your place@{hunter , doing your homework|}. \n\nAnd then, when you return home, your father ignores you. Your mother yells at you to take off your shoes before you trail mud in. She tells you off for fooling around instead of studying for your final exams. \n\nWere you expecting a reunion? Tear-drenched embraces, a homecoming feast? The prodigal child returning from ${eir} adventures to a soul-expanding magnanimity, to unconditional love? Your parents seem to have barely registered your absence. \n\nPerhaps part of you has been here the whole time while your mind was stuck on that train, screaming. \n\nOr it may simply be that no one even noticed you were gone. \n*page_break \n*check_achievements eldritch \nYou go up to your room, the burnt sugar smell still in your nostrils. \n\nThe first thing you do is take the game out of your backpack. \n*if choice_achieved_eldritch \n\tIt leaves its slimy residue on your fingers. Smells like the ocean and the rotting things at its bottom. \n\nOn the screen, just two words:\n\n*text_image game_over.png center GAME OVER \n*choice \n\t#Did I win?\n\t\t${result}\n\t#Did I lose?\n\t\t${result}\n\t#It can't be over. \n\t\tCan it?\n\t\t*comment No. It isn't. How could it be? Because hear me out: Nothing ever ends, if you have memory. You can return to the game as often as you wish. Win or lose, you can play again, as long as you can imagine doing so. \n\nYou take stock of your passage through the game's levels. Wonder what it means to win. \n\nDoes the game win if you lose people to it? \n\nPerhaps the game won the moment you said yes, ${name}. \n\nTake it from me. \n\nIt doesn't matter to the game how you travel through its levels. The meat you leave behind is a bonus, sure. But it is in no way necessary to the game's existence. \n\nAll that matters to the game is that you play. \n\nAnd that you have fun, of course. Didn't you have fun? \n\n(FUN FUN FUN)\n\nYes? No? \n\nAnd now what are you going to do about it? \n*choice \n\t#Hide the game somewhere no one else can find it. \n\t\tYou think of places to hide it in your house: under your bed, in the back of your closet, under the floor. You actually try that last one, rip up the loose floorboard in the corner of your room and see if the game fits in the hollow below. But it feels wrong to keep it so close. You imagine sleeping with the game in the vicinity of your dreams and a full-body shudder shakes that idea out of your head. \n\n\t\tIn the end, you decide to bury it. \n\t\t*page_break \n\t\t*set bury true \n\t\tYou go to the forest that rings the school, with the game still in your backpack. You walk and walk until you are so surrounded by trees you can't see any signs of civilization in any direction and the sky above you is but a memory glimpsed between the interlacing branches of trees. \n\n\t\tYou kneel on the thick layer of pine needles that covers the ground and set your backpack next to you. Carefully, almost reverently, you take the game out. You wrap it in a soft white shawl you found in your mother's dresser. You don't quite know why you did this, but the thought of letting the soil touch the device twisted your stomach into a knot. It just felt wrong. So you went with it, trying hard not to question yourself too much. It's quite an art, this self-ignorance. @{(insight > stat_mid_pass) You're not very good at it, but you do try.|You excel at it.}\n\n\t\tThen you bring out the blue-handled trowel you stole from the family shed. You use it to dig a hole in the ground, deep enough to make sure no amount of rain will wash the dirt away any time soon. \n\n\t\tSlowly, you deposit the shrouded game in the hole, then pack the dirt over it as tightly as you can. Finally, you conceal the disturbed soil with a layer of pine needles. \n\n\t\tThere. \n\n\t\tYou stand back to assess your work. Good, you did good. It's as if there's nothing there at all. \n\t#Destroy it. \n\t\tWin or lose, you know this: the game can only bring misery. \n\n\t\tYou might be done with it—or it is done with you—but there will surely be others after you, other groups of five to walk through its halls of sand, its mazes, its crumbling war zones. If you let the game be, others will suffer for it. \n\n\t\tIt needs to be destroyed.\n\n\t\tHow are you going to do it? \n\t\t*gosub destroy_options \n\t\t*goto reunion \n\t#I don't have time for this. I must study. \n\t\tYou try to forget about the game. Put it out of your mind and focus on what matters. \n\n\t\tSo you bury yourself in your books. \n\t\t*if hobby = 1 \n\t\t\tFill your senses with paintings of the living and paintings of the dead, with studies on perspective and abstraction, surrealist dreams and a pointillist's take on reality, breaking it down to its smallest constituents, just tiny dots that together can paint any picture you want. \n\t\t*elseif hobby = 2 \n\t\t\tYou fill your mind with code, questions of logic and if-this-then-thats, and then you delve deeper, zeroes and ones, yeses and noes, pixels so tiny they hold nothing other than themselves, and yet can hold together everything. \n\t\t*else \n\t\t\tFill your mind with literary theory, notions of subjectivity and the porosity of selfhood, postmodernist ideas of what it means to be a person, theories of intertextuality, deconstruction, and the death of the author. You get hung up on a short story called \"On Exactitude in Science\" by Jorge Luis Borges. In it, a group of cartographers become so obsessed with representing the Empire accurately that they create increasingly large maps until they end up with a map so accurate that it matches the size of the Empire. In the end, the map covers the entire territory it was meant to represent. In Baudrillard's terms, the simulacrum replaced the real. \n\n\t\t\tYou put down your books and ponder that for a few minutes. \n\n\t\t\tImagine yourself as a map of yourself, a copy of you that precedes and concludes the original, a set of instructions that point towards the function of you, the meaning of your being. If you came across it, would you even know how to read yourself? \n\t\t*set studied true \n\t\t*set studies %+mid_change \n\t#I want to play again. \n\t\tYou handle the game, look for a button you can press that would restart the game. You've examined every inch of that device before, of course. You know very well that there are no buttons, nothing that would give you any kind of control over this game. Doesn't stop you from trying, of course. Even if you know it's pointless. \n\n\t\tIn the end, you are forced to give up. \n\n\t\tStill, you sit with that urge of yours for a while, question yourself about your goals and motivations: whether you want to play again so you can win (or lose), whether you have something to prove, and to whom. Do you wish you'd done things differently? \n\n\t\tIt's one of the basic premises of games that you can always play again. Try again, get better. In a sense, games train players in how to beat them. So this one not giving you the opportunity for a do-over feels like cheating. \n\n\t\tUnless it's not over yet. \n*label reunion \n*page_break\nYou don't see your friends again until the day of your final exams. You go to school in the meantime, sure, but either they're avoiding you or you're avoiding them, or someone is home sick, or you're all distracted by other things. \n\nIn the end, though, just before your big test, you find yourselves congregating in front of the classroom door. \n\n${friend} looks fearfully at your backpack. \n\n\"Is the game in there?\" ${fe} asks. \"Are there new instructions?\"\n\n*if ((sea) or (smash)) or (bury)\n\t*if bury\n\t\tYou think of the game in its pine-covered grave. \n\t*else \n\t\tAn image of the game @{sea disappearing under the surface of the sea|smashed into tiny pieces} flashes in your mind. \n\n\t\"No,\" you say. \"There will be no more instructions. No more playing.\"\n\n\t${friend} eyes you with suspicion. \"How can you be sure?\" ${fe} asks. \n\n\tYou almost, almost smile. \"I made sure,\" you say. \n\n\tThen \n*else\n\tYou haven't actually thought about the game in a while. Haven't even checked it after those words appeared on the screen. \n\n\tYou unshoulder your bag and reach for the device. \n\n\tYou find nothing. \n\t\n\tYou kneel on the floor, open your backpack all the way, toss out your books and notes. The game is nowhere to be found. \n\n\tAlarmed, ${friend} helps you look. \"Where is it?\" ${fe} asks. \n\n\t\"I don't know,\" you tell ${fem}. \"Not here.\"\n\n\t\"What does that mean?\" ${friend} asks, but the bell rings and \na crush of students pushes you into the classroom. \n*finish \n*label conductor \n\nYou come to think of the voice over the loudspeakers as the train conductor. \n\nThe train conductor, whom you never see but who on occasion speaks to you in his crackly electronic voice, tells you to have \n*line_break \nFUN FUN FUN!!!\n*return \n*label destroy_options \n*choice \n\t#Throw it in the sea.\n\t\t*set sea true \n\t\tYour father told you once that if you ever want something destroyed, truly destroyed and gone, then you should let the sea take care of it. Nothing escapes those teeth of salt: not ships, not rock, certainly not flesh. Not even mountains can withstand the constant lapping of the sea. Whatever the game is made of, the sea will, eventually, devour it. \n\t\t*page_break \n\t\tSo you make your way down to the seafront with the game in your backpack, as always. You stand on the promenade for a while, watching the water turn that steely gray it does in the overcast afternoons and listening to the ships moan in the port. You wonder at all the things the sea can accommodate, everything it can take and take without ever becoming full. Will it take the game, too? There's no way to know, only a way to trust, and only a way to hope. \n\n\t\tSo you trust. And you hope. \n\n\t\tYou take the game out of your bag and heft it in your hand like you did the very first time you held it, weighing its alien material, its silent screen. Then you lift your arm over your head and throw the game as far as you can. It hits the water without any sound and sinks immediately, with no trace. As if it was never even there. \n\t#Smash it in your father's shed.\n\t\tYou make your way to the shed and rummage around the old trunk of tools until you find your father's sledgehammer. \n\n\t\tNext, you wrap the game in a white shawl you found in your mother's dresser and place it on the concrete floor. \n\n\t\tAnd then, you bring the sledgehammer down on the game with everything you've got. Again and again. At first, it doesn't feel like your blows have much of an impact: maybe a dent or two, but you don't hear anything breaking. \n\n\t\tFinally, with the sixth or seventh blow, just as your muscles start screaming at you to stop, you feel the device give. With each subsequent blow, the game breaks a little more, until the sledgehammer hits concrete. \n\n\t\tYou let the sledgehammer drop and then, carefully, you unwrap the shawl. Your hands feel foreign; you can't quite feel your fingers. For a while, you think you might never again be able to make a fist. \n\n\t\tBut what you see when you unwrap the game from its shroud is enough to make it worth it: the device is nothing but a mess of broken bits now, smashed to nothing, its screen all but pulverized. \n\n\t\tThat will do. \n\n\t\tYou bundle up the shawl again and push it into your backpack, doing your best to put the game out of your mind once and for all. \n\t\t*set smash true \n\t*selectable_if (hobby = 2) #It's not enough to get rid of it. It must be destroyed from within. \n\t\t*set hack true \n\t\tYou could try to damage the device, but something tells you that taking a hammer to it or setting it on fire will achieve nothing. \n\n\t\tThe only real solution is to try to understand its inner workings and then make sure they stop. Destroy it that way. Render it inert.\n\n\t\tIn other words, you need to access the game's code. \n\n\t\tYou don't have the first clue where to start, so you do what any sane person would: search for the answers online. \n\t\t*page_break\n\t\tYou hole up in your room and use your dial-up connection to surf the Internet. Using a string of increasingly bizarre searches, you finally end up in one of the weirder corners of the WWW, at a discussion board frequented by conspiracy theorists and deranged hackers. \n\n\t\tYou post your message, a summary of your situation and some of the strange things that have happened to you, trying not to give away any identifying information. \n\n\t\tAnd then, you wait. \n\t\t*page_break \n\t\tA few hours later, your board inbox lights up with a message from GameBoyish1959.\n\n\t\tThe subject line is \"DELETE AFTER READING.\"\n\t\t*page_break Open It\n\t\t*check_achievements conspiracy \n\t\t\"It isn't a game. It's a predator for the Internet age. It evolved online and in the mass electronic graveyards of the New World Order. You must destroy it, and if you can't, at least get away from it. As far away as you can.\"\n\t\t*if choice_achieved_conspiracy \n\n\t\t\tIt sounds unhinged. But also familiar. As if you've heard all this before. \n\n\t\tThe message goes on like that for a while, at times making \n\t\t*if waste\n\t\t\tsense—you remember Ms. Harper's words about environmental catastrophe, the landfill sown with electronics parts. Wouldn't that be the ideal landscape for a predator like this to evolve?—and \n\t\t*else \n\t\t\tsense and \n\t\tat others descending into a delirium of conspiracy theories mixed with visions of the 8-bit apocalypse. \n\t\t*if not (choice_achieved_conspiracy)\n\t\t\t*achieve conspiracy \n\n\t\tBut what's more important is that the message concludes with a series of instructions on how to actually go in and tamper with the game's code.  \n\t\t*choice \n\t\t\t#Do it. Delete the message first. \n\t\t\t\tYou make a mental note of the instructions and then press delete on the message. \n\n\t\t\t\tYou're ready. \n\t\t\t#Do it. But keep the message. \n\t\t\t\t*set kept_message true \n\t\t\t\tYou never know when that message might come in handy. And clearly that person is at least a little bit deranged. You don't have to follow all of their instructions to the letter. Just the ones that will get you where you want to be. \n\t\t\t#Sounds like a bad idea. Delete the message and forget about it.  \n\t\t\t\tYou press delete, put the device back in your backpack, and try to forget you ever entertained the idea of getting anywhere near the game's inner workings. \n\n\t\t\t\tThat person on the discussion board sounded deranged. \n\n\t\t\t\tMaybe that's what they get for messing with what should be left alone. \n\t\t\t\t*return \n\t\t*page_break Follow The Instructions\n\t\tIt's an elaborate set of steps that involves typing in complicated URLs in your browser, followed by a series of commands in MS-DOS. You're not sure how a connection to the device is established without any cables, but as soon as you put in the final command, the game's screen comes alive and text starts scrolling. \n\n\t\tFor a few moments, little makes sense. But the longer you look at the scrolling text, the clearer it becomes. It's a log of all your moves through the game, in reverse chronological order. You and your friends are referred to not by name but by designations like P1, P2, P3, etc. You are P5. \n\t\t\n\t\tYes. Here you are, riding the roller coaster. Here you are in the maze. Here you are picking up your \n\t\t*if (checkpoint) and (second_weapon != first_weapon)\n\t\t\t@{second_weapon gun|brass knuckles|machete}—or was it @{first_weapon a gun|brass knuckles|a machete}? \n\t\t*else \n\t\t\t@{first_weapon gun|brass knuckles|machete}. \n\t\t@{tommy_dead Here you are, watching Tommy die.|}\n\n\t\tHere you are in that room of sand, here you are speaking cruel things in front of a door, here you are saying yes, here you are. \n\t\t\n\t\tSomething shifts then, in front of your eyes, a liquid, impossible movement, a trickle. \n\n\t\tThe text changes. \"Run away,\" it says. I say. Don't come back here. \n\t\t*finish \n*return \n", "one": "*comment Here's your opportunity to opt out, Player. I'm not the one offering it to you. Don't you see now? The choice was only ever yours. \n*hide_reuse \n*temp NPC false \n*temp maria_pick true\n*temp joshy_pick true\n*temp tommy_pick true\n*temp catrina_pick true \n*temp options 0 \n*temp loop 0 \n*temp like_attention false \n*check_achievements comeout \n*if choice_achieved_comeout\n\t*set Cat \"Cat\"\n\t*set ce \"he\"\n\t*set ceir \"his\"\n\t*set cem \"him\"\n\t*set cemself \"himself\"\n*text_image chap_1.png center Level 1: An Entanglement of Friends\n\n*if choice_randomtest\n\t*achieve ending\n\t*achieve second_ending\n*check_achievements ending second_ending \n*if choice_achieved_ending\n\tSure, you were given the opportunity to turn back. You can see that now. A chance to give up, get out, get away—whatever you want to call it. It, this: to save yourself, your friends. To opt out of the game. \n\n\tRemember? \n\n\tYou chose not to, of course. What kind of player would you have been if you had chosen not to play? No player at all, that's what kind. A player is what a player does. You know? And what does a player do? A player plays. It's as simple as that. \n\n\tLater, the game will say this was part of its rules; every game has them. People often think that rules are only for players, but that's incorrect. The game has to follow the rules, too. For the game to exist, for it to be valid (whatever that means), it has to offer players the option to quit early on. Like, really early on. In the prologue. Before you even hit @{choice_achieved_second_ending restart|start}. \n\n\tAnd it did, didn't it? \n\n\tBut nobody ever said no. You see? \n\n\t*if choice_achieved_second_ending \n\t\tAgain and again, we said yes. Yes, yes, I'll play. \n\t*else \n\t\tWe all had to play. \n\t*page_break\nThe convenience store is doused in bright white light, turning the windows into mirrors. You have the night shift again. The whirring of the refrigerators and the droning murmur of the fluorescent lights above have a hypnotic effect on you. It's almost meditative. If you're into that sort of thing. \n\nOutside, everything is dark. Even the single street light is out. It's a quiet night at the beginning of February—not that it makes a difference; it seems to you that all the nights are quiet, in this nothing town, this nothing place. Sometimes you wonder why the store remains open 24/7. They don't pay you much, but so few customers ever show up at night it can't possibly make sense. Like, from a financial point of view.  \n\nWorking the night shift means you get off work at 6 a.m., and school doesn't start until 8.15 a.m. If you time it right, you might even be able to squeeze in an hour of sleep. \n*choice \n\t#It hardly seems worth the trouble. \n\t\t*set chaotic %+mid_change\n\t\t*set sleepdeprived true \n\t\tBesides, sometimes you find that sleeplessness puts you in an interesting state of mind. Yields strange thoughts. \n\n\t\tAnd you need strange thoughts, these days. It's the kind of thing that can give you a certain edge. \n\t#I have no trouble sticking to a tight schedule. \n\t\t*set chaotic %-mid_change\n\t\tIt's important to keep yourself sharp and orderly. When everything around you is unpredictable and chaotic, you have to be your own constant. Especially now, with the strange odds you're facing. \n\t#I'm fine. Don't need much sleep anyway. \n\t\t*set brave %+mid_change\n\t\t*set sleepdeprived true \n\t\tOr at least that's what you tell yourself and everyone around you. You're the strong one, the dependable one. You can face any odds and never lose your nerve. \n\n\t\tRight? \n\t#I better get as much sleep as I can. Might need it. \n\t\t*set brave %-mid_change \n\t\tIt's best to be prepared, cautious, hedge your bets. Especially with the kind of strangeness you're facing. You never know what will be demanded of you. \n\n*check_achievements eldritch\nYou glance at your backpack. Feel the urge to reach inside, check the game again. Run your fingers along its black sides, wonder at the @{choice_achieved_eldritch strange smell, the slightly slimy residue it always leaves behind|material it's made of—too smooth to be plastic, too light to be metal}. See if new instructions have popped up on its dark green screen. \n\nBut you don't. Because your supervisor is standing in front of the cash register and staring you down. It's obvious he doesn't like you. He tolerates you, if that. \n*choice \n\t#I feel small. I hate being the center of attention. \n\t\t*set self_centered %-mid_change \n\t\tSometimes you wish you could be invisible.  \n\n\t\tSometimes you think you've got the art of self-effacement down so well that you believe you can actually make yourself disappear. \n\t#I stare right back. I like being the center of attention. \n\t\t*set self_centered %+mid_change \n\t\t*set like_attention true \n\t\tIf he doesn't like what he sees, that's his problem, not yours. \n\t#Who cares what he thinks? Rules are for losers. \n\t\t*set chaotic %+mid_change \n\t\tOther people's impressions of you don't concern you. Why would they? That's their business, not yours. Besides, you can't control what other people think. You can hardly control your own thoughts. \n\t#I become self-conscious. Is something wrong with my uniform?\n\t\t*set chaotic %-mid_change\n\t\tIndeed, there is. Your name tag is askew. Oh, God.\n\n\t\tYou rush to fix it as your supervisor disappears into the back room. \n\n\t\tHow could you let this happen? You're usually so careful. \n\t\t*goto tag\n\n\"Fix your name tag,\" your supervisor says. \n\nYou look down and realize your badge is askew. You unpin it from your uniform. \n\nYour supervisor gives you another stern look before disappearing into the back room, where he will pretend to work—on orders, budgets, whatever it is he does—but really you know he'll just nap until morning. \n*label tag\n\nYou look at your badge for a moment before pinning it to your lapel again. \n\nIt reads, in fake handwriting, \"Hi! I am\" and then, in your actual handwriting, your name follows:\n*choice \n\t#\"Sam.\"\n\t\t*set name \"Sam\"\n\t#\"Ashley.\"\n\t\t*set name \"Ashley\"\n\t#\"Jordan.\"\n\t\t*set name \"Jordan\"\n\t#\"Carson.\"\n\t\t*set name \"Carson\"\n\t#\"Alex.\"\n\t\t*set name \"Alex\"\n\t#Something else. \n\t\t*label name_input\n\t\tWhat is your name?\n\t\t*input_text name\n\t\t*set name \"$!{name}\"\n\t\tSo your name is \"${name}.\" Is that right?\n\t\t*choice\n\t\t\t*allow_reuse #Yes.\n\t\t\t*allow_reuse #No. \n\t\t\t\t*goto name_input\n\nThen, your pronouns follow:\n*choice\n\t#\"He/him.\"\n\t\t*set e \"he\"\n\t\t*set eir \"his\"\n\t\t*set em \"him\"\n\t\t*set eirs \"his\"\n\t\t*set emself \"himself\"\n\t#\"She/her.\"\n\t\t*set e \"she\"\n\t\t*set eir \"her\"\n\t\t*set em \"her\"\n\t\t*set eirs \"hers\"\n\t\t*set emself \"herself\"\n\t#\"They/them.\"\n\t\t*set e \"they\"\n\t\t*set eir \"their\"\n\t\t*set em \"them\"\n\t\t*set eirs \"theirs\"\n\t\t*set emself \"themselves\"\n\t\t*set plural true \n\t#Something else. Let me spell them for you.\n\t\t*label pronouns\n\t\tPlease enter the equivalent of \"he/she/they.\"\n\t\t*input_text e\n\t\tPlease enter the equivalent of \"his/her/their.\"\n\t\t*input_text eir\n\t\tPlease enter the equivalent of \"him/her/them.\"\n\t\t*input_text em\n\t\tPlease enter the equivalent of \"his/hers/theirs.\"\n\t\t*input_text eirs\n\t\tPlease enter the equivalent of \"himself/herself/themselves.\"\n\t\t*input_text emself\n\t\tIs your pronoun singular or plural?\n\t\t*choice\n\t\t\t*allow_reuse #Singular.\n\t\t\t*allow_reuse #Plural.\n\t\t\t\t*set plural true\n\t\tOkay. Your pronouns are: ${e}/${eir}/${em}/${eirs}/${emself}. Are these correct? \n\t\t*choice\n\t\t\t*allow_reuse #Yes.\n\t\t\t*allow_reuse #No. \n\t\t\t\tOkay, no problem. Let's try this again. \n\n\t\t\t\t*goto pronouns\n\n*check_achievements ending \nRight, so the other good thing about the night shift (wait, what was the first good thing?) is that you have ample time to kill, which means ample time to do what you love best: \n*choice \n\t#Draw. \n\t\t*set insight %+hi_change\n\t\t*check_achievements ending \n\t\tYou started when you were little. Drawing, painting, anything that leaves a mark on a surface—you've loved it all for as long as you can remember. You could make up a backstory here, about that favorite uncle/grandmother/schoolteacher who pressed an expensive sketchpad and a bunch of good pencils into your hands one Christmas/birthday/whatever holiday you most cherish now that you're almost, almost an adult, and told you to find your voice, be yourself, express what's in the dustier corners of your weird little heart. \n\n\t\tOr maybe you just picked up a napkin and a cheap ballpoint pen you found in a drawer and started drawing one day. \n\n\t\tAnd you were good at it. Very, very good. You're not good at many things—your mom sure keeps reminding you of that—but you were good at drawing. \n\n\t\tTonight, it's a self-portrait. \n\t\t*if choice_achieved_ending\n\t\t\tDescribe it to me, Player. Or at least pretend. \n\n\t\t\tHere, like this: \n\n\t\t\tIt's charcoal \n\t\t*else \n\t\t\tCharcoal \n\t\ton sepia, your most recent obsession. You've done so many of these, you even dream in sepia these days. @{sleepdeprived When you actually manage to catch some sleep.|}\n\n\t\tThis one is turning out a little strange, though.\n\t\t*choice\n\t\t\t#My eyes are too big. \n\t\t\t\t*set bigeyes true \n\t\t\t\tNot just big for the drawing; proportion is not the problem here, and you're too skilled to make that kind of mistake. This is something else. They look uncanny, like the eyes of something alien, barely human. Too wide, too open, too seeing. \n\t\t\t#My face doesn't feel like my own.\n\t\t\t\t*set not_my_face true \n\t\t\t\tYou wonder sometimes, do other people ever feel this way? Do they look in the mirror and fail to recognize themselves? Who is this stranger that wears your skin, bears your name, goes to your school? \n\n\t\t\t\tOnly the eyes are the same. \n\t\t\t#My face is a black hole. \n\t\t\t\t*set blank true \n\t\t\t\tYou managed to get every detail of your hair right, the texture of your skin, the shape of your ears. But your face is null, a nothingness. A dark smudge. \n\n\t\t\t\tYou can't decide if what you're drawing is an opaque, impenetrable surface, or the unfathomable depths of an abyss. Something that traps the light, and so becomes unseeable. \n\t\t\n\t\tBut you like it, anyway. It works. Whether anyone else would think so is not your concern. Besides, how would you ever know? Even if they tell you they do or they don't, there's no way to be absolutely, one hundred percent sure they're being truthful. \n\t#Play video games.\n\t\t*set hobby 2\n\t\t*set athletics %+hi_change\n\t\t*check_achievements ending \n\t\tYou reach into your backpack. Your hand hovers over the game for a moment, but you hold back, pull out your handheld console instead, and slip in one of your brightly colored cartridges. \n\n\t\tAs soon as the screen chirps alive, you turn the volume down—don't need your supervisor giving you another of those looks. But the familiarity of the tune calms you immediately, like this is a safe space, and like nothing could ever hurt you while you play. \n\n\t\t*if choice_achieved_ending\n\t\t\tBy now, of course, you know that's a dangerous thing to think. It lowers your defenses. Leaves you vulnerable. Gaming is anything but safe. At least here, at least now. At least for you and your friends. \n\t\t\t*page_break\n\t\tYou can't remember how young you were when you got hooked on video games. There wasn't much variety back then; it was either a ball bouncing on a moving platform across a black screen or a triangle that your imagination changed into a spaceship shooting at hordes of enemy crafts. But it was enough. \n\n\t\tTonight, though, you're playing your favorite. Your guilty little pleasure called:\n\t\t*choice \n\t\t\t#@{choice_nightmode Night|Afternoon} of the Knight. \n\t\t\t\t*set knight true\n\t\t\t\tIt's your basic RPG, where you play a knight whose goal is to save a princess locked away in a castle. In order to do so, you need to hack through fields upon fields of overgrown thornbushes, practically forests of the things. You start out with a basic wooden sword (how that's supposed to hack through anything has always been beyond you) and upgrade as you go. \n\n\t\t\t\tExcept you never find out who that princess is, why she was locked away, or why you need to save her. The game doesn't make that explicit, but you know by now that, in order for the game to be won, you need to decide what your motivation is on each playthrough. Do you want to save the princess for money? For glory? For love? To fill the dark hole in your heart, to muffle that little voice that always tells you you're too small, too insignificant, not good enough? Unless you know your reasons for hacking through those branches and letting those forests of thorns rip your arms to shreds, the game won't be satisfying.\n\n\t\t\t\tYou also meet a bunch of NPCs along the way that invite you to undertake side quests and challenges, or simply offer advice to help you on your way, presumably out of the kindness of their hearts. \n\t\t\t\t*choice \n\t\t\t\t\t#I usually go for these. \n\t\t\t\t\t\t*set brave %+mid_change\n\t\t\t\t\t\tYou \n\t\t\t\t\t\t*label knight_continue\n\t\t\t\t\t\tusually go for these quests and trust the advice you're given—occasionally to your detriment, not to mention that of the princess. You find people have been deceitful, which greatly disappoints you. Here you are, trying to be brave, trying to be useful, only to have people throw it back in your face and try to take advantage. You want to shout at them then, \"BUT I WAS ALREADY HELPING! WHAT MORE DO YOU WANT?\" There's no one to shout at, though, except pixels on a screen. Whenever this happens, you think back on those NPCs' portraits and wonder if there was something in their faces that you should have seen, some element of physiognomy that should have tipped you off. \n\t\t\t\t\t\t*if chaotic >= stat_mid_pass \n\n\t\t\t\t\t\t\tYou know better, of course. The world is not as neat as that, and not everything can be anticipated. You can't be prepared for everything. You can only do your best, however chaotic the circumstances. \n\n\t\t\t\t\t\t\tAnd then hope the game is winnable. \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\tBecause there must have been a clue, right? That's only fair. A clue would allow you to take responsibility for your mistake in failing to spot whatever it was that would have given you a better outcome. Otherwise, the world is chaos, and nobody can do a thing about it. \n\n\t\t\t\t\t\t\tBut games are fair. It's what makes them winnable. And that's what makes them worth playing. \n\t\t\t\t\t#I am always suspicious of these.\n\t\t\t\t\t\t*set brave %-mid_change \n\t\t\t\t\t\tYou are always suspicious of these. Because you know no one does anything without some kind of gain to win. Everyone has an agenda; even self-sacrifice, the greatest form of altruism, is fueled by self-interest: proving to yourself that you're a decent person, a worthy person, however briefly, before the lights go out for good. \n\n\t\t\t\t\t\tSo you try to intuit those NPCs' intentions and motivations by looking at their pixelated black-and-white portraits. Surely there must be something there that would clue you into their personalities, their internal workings, what makes them tick. \n\n\t\t\t\t\t\tOr perhaps people are fundamentally unknowable. \n\t\t\t\t\t#I am suspicious of these, but I go for them anyway. \n\t\t\t\t\t\t*set brave %+small_change\n\t\t\t\t\t\t*set chaotic %+small_change \n\t\t\t\t\t\tDespite your suspicions, you \n\t\t\t\t\t\t*goto knight_continue \n\t\t\t#Dig! \n\t\t\t\t*set dig true \n\t\t\t\tIt's a weird one, a cross between [i]Snake[/i], that game where you are a snake burrowing through a screen of soil, getting longer and longer and trying not to eat your tail, and a maze game, where you're trying to find your way out of the labyrinth or towards some kind of prize. \n\n\t\t\t\tExcept, in this game, you're not a snake. You can't actually see yourself, as [i]Dig![/i] has a first-person point of view, but you have the sense that, as the game proceeds, you get larger and larger, because everything around you becomes progressively smaller. The terrain keeps changing: from something gritty and thick, when you are presumably underground and digging your way through soil, to something more sturdy like cement, and eventually to something dark and airy, punctuated with bright points that could be stars, as if you've dug your way through the heart of the earth, pierced through the concrete city-crust of the planet, and then burrowed right into the sky. And then you kept going, digging your very own hole through the eye of the universe. \n\t\t\t\t*fake_choice\n\t\t\t\t\t#It's kinda meditative. \n\t\t\t\t\t\tYou can sink hours into that game. You kinda have—you've been playing it for at least a year now. \n\t\t\t\t\t#It's kinda sad. \n\t\t\t\t\t\t*set NPC true \n\t\t\t\t\t\tThere's a special kind of loneliness in [i]Dig![/i] The character in this game—whoever they are—has to make their way through the entire game on their own. They do meet NPCs that speak to them, but the character never answers, and it's never clear whether the NPCs could hear them even if the player spoke. As if they existed on a different plane. \n\n\t\t\t\t\t\tAnd that's sort of the heart of the game, isn't it? The character—and let's face it, that's you—keeps digging and digging, laboring and breaking themself against all manner of matter, keeps trying. But they never arrive anywhere. No one ever meets them. \n\t\t\t\t\t#It's a great way to kill time. \n\t\t\t\t\t\tThere's something soothing about the repetitiveness of it, and the game comes with a thunk-thunk kind of digging sound effect that is just so satisfying to listen to. And you have, for hours on end. \n\n\t\t\t\t\t\tExcept not when you're at the store. Here, you play with the volume all the way down to zero. \n\n\t\t\t\tYou never find out whether you're trying to escape the town—is it even a town, or have you projected that onto the cosmology of the game?—or whether you're trying to find an item hidden somewhere within the game's seemingly ever-expanding world. The poetry—or irony, however you want to look at it—of this does not escape you: here's a player who keeps growing, and the world grows around ${em}, expanding to accommodate ${em}. It's either terrifying or beautiful. Or both. \n\n\t\t\t\tYou also never find out what causes your expansion, whether it's time or something else, like consuming what you excavate, absorbing your surroundings. \n\n\t\t\t\tOr, perhaps, you grow precisely because the world keeps getting larger and you're simply trying to keep up. \n\n\t\t\t\t@{NPC The NPCs you come across|Along your journey of digging, you come across various NPCs who} give you tips on where you need to go, without ever being clear about what their motivations are for helping you—if they are indeed helping you. Sometimes you wonder if they're trying to mislead or trick you for some kind of personal gain, and if, therefore, the question the game poses is whether you can actually trust them, and which ones you should. \n\n\t\t\t\tYou look at their portraits then. Is there something in their faces that should tip you off? A quirk of their physiognomy that betrays what lies beneath, what moves a person? \n\n\t\t\t\tOr, perhaps, people are fundamentally unknowable. \n\t\t\t#Kafka's Builder. \n\t\t\t\t*set kafka true\n\t\t\t\tThis is a cross between Tetris and a builder simulator. You get a random stream of colorful building blocks that you're meant to use to make structures of specific shapes and specifications within a certain amount of time. If you make a mistake, the buildings collapse and you have to start over. If you run out of time, the buildings collapse and you have to start over. And that's the thing that players either love or hate about this game: if you win, if you do everything perfectly and beat the clock? The buildings collapse. You get to start over.\n\n\t\t\t\tNPCs pop up with dialogue boxes at regular intervals, shouting \"KEEP GOING!\" or \"USE MORE RED ONES!\" or \"MAKE SOMETHING POINTY!\" though the purpose of what you're making is never quite clear, just as it's never clear to you whether these exclamatory sentences are meant to sound motivational or domineering. Are these people cute little helpers spurring you on, or are they your masters commanding you to work faster/better/harder? You really don't know. You keep building, though. \n\n\t\t\t\tAnd perhaps that's the point. \n\n\t\t\t\tWhy do you keep building? \n\t\t\t\t*page_break\n\t\t\t\t*check_achievements ending \n\t\t\t\tSometimes, the NPCs point out that some of the bricks you've laid are wrong, or praise you for practically identical structures. You grow to learn that praise and criticism are arbitrary and bear no necessary connection or correlation to the actual quality of your work. They are only ever tied to the motivations of your employers. You realize it's a metaphor of some kind: capitalism and the pointlessness of labor, the normalization of exploitation, the Sisyphean trap modern humanity calls a life. Or something.\n\n\t\t\t\tIn any case, it's also made you think about the way these NPCs are presented through their portraits. Are these meant to offer an indication of their motivations? Can you tell if someone means well, if someone is an ally or an adversary, a comrade or an oppressor, by looking at their face? That's some Nazi shit, isn't it? That can't be right. And yet, something must be communicable through a face's features. You must be able to glean a person's intentions from their physicality, even if you can't see them. Otherwise, how can you connect with anyone? How can you know anyone at all?  \n\t\t\t*if choice_achieved_ending\n\t\t\t\t#Choice of the Haunted. \n\t\t\t\t\t*set cog_haunted true\n\t\t\t\t\tIt's a text-based game about a haunted game. In it, the player character and ${eir} group of friends (two boys, two girls, though one of them, you suspect, is actually also a boy) play a game that gives them increasingly suspect challenges. Eventually, the game overflows. It escapes the confines of its own physicality and haunts the players' reality. \n\n\t\t\t\t\tPerhaps if you had played the game when you were younger, it would make you wonder. Why do these people keep playing? It's obvious that the game is sinister, that nothing good can come of playing it. Why don't they just leave? \n\n\t\t\t\t\tYou know better now. \n\t#Read. \n\t\t*set hobby 3\n\t\t*set composure %+hi_change\n\t\tThe truth is, you've been reading for as long as you remember, long before you went to school. You taught yourself to read by peeking over your mother's elbow when she leafed through magazines and asking what the captions said under those photographs of unhappy women and shiny men. Your parents haven't done much for you, have rarely even noticed you, but they did do this for you: they saw your love for words, and they made sure you had things to read. \n\n\t\tNeither of them was much of a reader, so they opted for quantity rather than quality, and got you books wherever they could find them: yard sales, charity shops, any friend or relative with the tiniest bit of interest in getting you presents. And you still remember that time when your father, a handyman by necessity rather than by training or trade, came home with a cardboard box full of books. He had done a job for some lady who had even less money than your family did, and your father had agreed to be paid in kind. The box was full of novels, most of them for readers older than you, but you didn't mind. There, you found your first Tolkien and Verne, your first Le Guin, your first Delany, your first King. You read every last page in that box, read it again, then kept going. \n\n\t\tBut tonight, you're reading this: \n\t\t*choice \n\t\t\t#[i]The Picture of Dorian Gray[/i], by Oscar Wilde. \n\t\t\t\t*set dorian true \n\t\t\t\t*check_achievements ending painter \n\t\t\t\tDorian Gray is beautiful but understands that his beauty will one day fade. He sells his soul to live a life of hedonism that will leave him unmarked, forever young and beautiful. It is only his portrait, his picture, that becomes a record of his sins. \n\n\t\t\t\tYou knew what the book was about, of course, long before you started reading it. It's the kind of work one absorbs by osmosis, by simply being part of a \n\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\tculture, as we all are. (And when I say culture, I mean any culture, on account of anglophone cultural imperialism, etc.) \n\t\t\t\t*else\n\t\t\t\t\tculture and all its accompanying obsessions. \n\n\t\t\t\tWhatever your beliefs about hedonism, sin, and beauty—if you've already made up your mind about those—the book also made you think of portraits.\n\t\t\t\t*label portrait_thoughts\n\n\t\t\t\tWhat can a face tell you about the person underneath? Can you intuit someone's inner workings by looking at their features, their eyes, the way they hold their mouth? \n\n\t\t\t\tOr perhaps it's wrong to distinguish between a person and a face in the first place. Perhaps it's wrong to assume there's an \"underneath\" at all. \n\t\t\t\t*if choice_achieved_painter \n\n\t\t\t\t\tA strange feeling comes over you. \n\n\t\t\t\t\tAs if you know what it's like to paint a portrait of yourself and fail to find your face in it. \n\n\t\t\t\t\tYou've had such thoughts before, haven't you?\n\t\t\t\t\t*goto painter_continue\n\t\t\t#[i]The Masterpiece[/i], by Émile Zola. \n\t\t\t\t*set zola true\n\t\t\t\tIn it, an artist whose talent the world fails to appreciate gradually becomes fixated on a single painting, a spectacular view of the city of Paris. For this, he constructs an enormous canvas that he hopes will be able to contain his masterpiece. However, this obsession slowly consumes him. He becomes depressed, perhaps mad. \n\n\t\t\t\tYou haven't finished it yet, but you doubt it will end well for the artist. \n\n\t\t\t\tThe edition of the book you have shows the artist on the cover, hunched in front of a canvas, his palette in hand. But, strangely, the painting he is working on is not the titular masterpiece (or maybe it is?). Not the city of Paris, but a self-portrait. It seems to say: whatever they do, whatever the subject they choose to depict and the pains they go to just so they can get it right, in the end, an artist only ever paints themself. \n\n\t\t\t\tPerhaps that's true, perhaps not. Either way, it's made you think about portraits. \n\t\t\t\t*goto portrait_thoughts \n\t\t\t#[i]Rebecca[/i], by Daphne du Maurier. \n\t\t\t\t*set rebecca true\n\t\t\t\t*if name = \"Rebecca\"\n\t\t\t\t\tYou were drawn to it as soon as you saw it in the bookstore. Your name was on it, red on black, in exquisite calligraphy. How could you resist? \n\n\t\t\t\tIt's the quintessential Gothic novel: a young, unnamed ingénue marries a wealthy widower and moves into his creepy old house. Eventually, the young wife discovers that her husband's previous wife, the titular Rebecca, died in a sailing accident. So far so haunted. \n\n\t\t\t\tBut there is one scene in the novel that has stayed with you, and which you go back and read sometimes, even though you haven't yet gotten to the end. \n\t\t\t\t\n\t\t\t\tAt Manderley, the mansion where the novel takes place, there is to be a fancy dress ball. The housekeeper suggests that the master's new bride might take inspiration from one of Manderley's ancestral portraits. So she does. She picks one of a woman in a flouncy white dress and a wide hat and orders an outfit to match the one in the portrait. And then, at the ball, when she appears at the top of the grand staircase wearing that outfit, everyone falls quiet. \n\t\t\t\t\n\t\t\t\t“What is it?” she asks, not knowing what misstep she's made this time. “What have I done?” \n\n\t\t\t\tLater on, she finds out: Rebecca, her predecessor, once wore an identical costume to a similar ball. They looked so alike that everyone thought they'd seen a ghost.\n\n\t\t\t\tThe other thing that strikes you about the novel is that the woman never gets a name. Only the ghost does. \n\n\t\t\t\tAnd it makes you wonder. \n\t\t\t\t*fake_choice \n\t\t\t\t\t#Are we ourselves, or pictures of ourselves? \n\t\t\t\t\t#How do others perceive us?\n\t\t\t\t\t\tCan we ever be accurately perceived? Accurately represented? Rebecca's portrait, how true to life was it? \n\t\t\t\t\t#Are we doomed to repeat the scripts written for us? \n\t\t\t\t\t\tDo we simply slot ourselves into predetermined roles, mold ourselves into preexisting notions of what we think we should be? Like the nameless bride, fashioning herself after a picture. \n\n\t\t\t\tAnd that's the thing about portraits, isn't it? \n\t\t\t\t*goto portrait_thoughts\n\nDon't you ever think about this? \n*label painter_continue \nHow it's impossible to access anyone else's consciousness, think like they do, see what's in the secret folds of their brains? \n\n*if hobby = 1\n\tPerhaps, if you drew them. What can a portrait tell you? Does someone's personality manifest in their face? Their posture? \n*elseif hobby = 2\n\tWhen you play a game, are you yourself? When you pretend you are someone else, do you become them? And for those fleeting moments when you do, what happens to you? Where do you go? \n*else \n\tIs it ever possible to access someone's internal reality? \n\n\tThat's one of the reasons you read, anyway. Isn't it? \n*page_break The Door Chimes Open\n*check_achievements ending \nYour thoughts are interrupted by a customer walking in. It's an old lady (she must be like forty or something—really old). You wonder what she's doing out this late. Don't old people all go to bed by 10 p.m.?\n\n@{hobby You put away your sepia paper|You switch off your handheld|You put away your book} and wait for the old lady to slowly make her way through @{hobby this clean, well-lighted place|the store|the store} and pick up \n*if choice_achieved_ending\n\tblack milk, a tub of sand, and some of those long strings of tape people hang on their ceilings to trap ghosts.  \n\t*page_break Wait, What?\n\tNo, no, it's @{sleepdeprived the sleeplessness|this game—it's getting to you}, isn't it? The old lady puts the items on the counter and it's only normal things, only \nmilk, bubblegum, a book of crosswords, and some fly traps@{choice_achieved_ending |, which she deposits on the counter in front of you}. @{(hobby= 3) You half expect her to ask you for a packet of nada. You know, like the old man in that Hemingway story.|}\n\nSometimes, you look at the objects people select and come up with stories about them. Imagine their lives, their habits, the things that fill their days: the glass of warm, bubblegum-flavored milk on the worn wooden table, the rolled-up crossword used as a weapon against the horde of flies that have taken over her house. \n\nThe woman pays. Goes. You're alone again. \n*fake_choice \n\t#Time stands still. \n\t#My mind races. \n\t#I listen to the quiet buzzing of the lights. \nYou steal another glance at the game@{hobby  |—the game! The real game—| }and think over the first task it gave you. It was a bonding exercise. You had to find the first door, and at the door, you had to tell each other a hard truth, something you really believed about your friends—Maria, Joshy, ${Cat}, Tommy—but that you would never have dared say to their face had the game not insisted on it. It's innocent, you reassured each other. It's only a game. Innocent, if slightly cruel. \n\nYou'll never repeat what you told each of them. Just as you will never forget what they said about you: \n*choice \n\t#\"Your bravery lacks sense. It will get you killed.\"\n\t\t*set chaotic %+mid_change\n\t\t*if brave \u003c stat_mid_pass\n\t\t\tIt struck you as strange that they talked about you being brave. That's not how you see yourself. But you didn't have to agree with them, anyway. That wasn't the point of this. \n\t\t*else \n\t\t\tYou didn't agree with them, of course, but that wasn't the point of the exercise anyway. \n\t\t*set brave %+mid_change\n\n\t\tBesides, deep down, don't you think they're right? Not about the being killed part. They can't know that, can't predict the future. The chaotic part: you barely think before you act. You jus
