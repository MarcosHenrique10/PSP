g out every room, so many you have to elbow your way out of your bedroom, down the long hallways and into the kitchen, push bodies away with everything you've got just so you can stretch your arms and legs, just so you can breathe. \n\n\t\tEventually, you come to realize that your spouse doesn't notice the people who live with you in this house. When you complain about them and ask when they're meant to leave, your spouse looks at you as if you're insane. \n\n\t\tThen you wake, drenched in sweat. \n\t*elseif not (bigeyes)\n\t\tyou're walking down the long corridor of a house you've never been in before but which feels familiar. The walls are painted a dark green. There are portraits with \n\t*else \n\t\tyou're trapped in a haunted house. \n\n\t\tYou don't remember how you got to this house or why. Perhaps you've always lived here. There is no one else in the house, not even ghosts, but you know it's haunted. You spend your days roaming its hallways, walking in and out of its rooms, your steps barely echoing, the floors barely creaking under your imperceptible weight. \n\n\t\tSometimes, \n\t\t*if (bigeyes)\n\t\t\tthe walls are painted a dark green. There are portraits with ornate frames: gilded, old. The people in them look strange; their eyes are too big, staring you down as you walk. They are the only people you've seen in a while, and the only indication that you exist. \n\n\t\t\tYou realize you can't interact with anything else around you: you try to smash the windows, draw down the curtains, break the mirrors, but nothing works. You become angry, then resentful; eventually, you resign. \n\t\t*else \n\t\t\tSometimes, you run your fingers against the wallpaper, try to peel it unsuccessfully; it never comes away from the wall. This ineffectuality fills you with disappointment and a little resentment. Eventually, you become angry. You try to smash the windows and fail; then, you go for the mirrors, but nothing works. You realize you have no strength, no power, no way to interact with anything around you. \n\n\t\tFor the rest of eternity, you stare at the lamps, wishing for them to flicker. \n\n\t\tFinally, you wake, empty and drenched in sweat. \n*page_break\nIn the morning, school \n*label school \nis the same as always, a mockery of normalcy, as if nothing at all happened yesterday. A comforting lie. \n\n*if (tommy_dead) or (tommy_injured)\n\tAs you make your way to class for your big test, you glimpse Tommy's parents speaking with the principal. They seem upset—of course they would be—but you can't make out what they're saying. Neither you nor any of your friends approach, and none of the adults seems to register your presence. \n\nIn class, Ms. Harper is waiting for everyone to take their seats before she hands out the tests. \n*if studies > stat_mid_pass\n\tYou feel you're well-prepared, @{(composure > stat_mid_pass) and so you're not worried too much about your performance. It should be fine.|but of course preparation doesn't always guarantee performance. You just need to stay calm.}\n*else \n\tPerhaps you're not as well-prepared for this as you could be, @{(self_centered > stat_mid_pass) but you hope that your self-conviction will carry you through once again. That's how it works, isn't it?|and there's no one else to blame for that but yourself. It is what it is, though, and who knows, maybe Ms. Harper will take pity on you.}\n*if fought_Joshy\n\n\tBefore you begin, Joshy catches your eye. He quickly looks down at his test and doesn't lift his head until the bell rings and it's time to leave.  \n*page_break\nAfter class, you meet up with the others in front of the sealed metal door that leads to the school's basement. When you eye the padlock with suspicion, ${Cat} produces a crowbar from ${ceir} backpack and draws ${ceir} pinched fingers across ${ceir} lips in a zipping motion. \n\nNo one comments.\n\nA few moments later, the door is open. \n*if tommy_injured \n\n\tYou're ready to go in, when, to everyone's surprise, Tommy shows up, pale and wrapped in bandages that he does a bad job of hiding under his clothes. \n\n\t\"What the heck are you doing here?\" ${Cat} yells. \"Do you have a death wish? Do you actually want to die?\"\n\n\t\"Hey, give him a break,\" Joshy says. But then he turns to Tommy and scolds him in turn. \"You shouldn't be here, man,\" he says. \"Go home and get well.\"\n\n\tTommy shakes his head. \"I'm fine,\" he says. \"Promise.\" He glances at the door. \"Besides, we have a game to play.\"\n\n\tThe game's screen comes alive right then. \n*else \n\tRight on cue, the game's screen comes alive. \n\nAll the game has told you about this level is that there's going to be a chase, so you all came to school wearing your most comfortable sneakers this morning. Other than that, the game gave you no instructions except this ambiguous line: EAT OR BE EATEN. You're not sure whether to take it as an admonishment or an instruction. \n\n\"We should go in,\" you say. \n*page_break Go In \n*set level_3_stats true \nAt first, you can see nothing. It's as if you walked into one of those sensory deprivation tanks scientists used in the 1960s to study the origins of consciousness and conduct experiments with LSD. \n\nSlowly, your eyes adjust. \n\nYou are at the mouth of what looks like a maze. The walls are high—you can't tell how high. Can't see a ceiling at all. The spaces between them are narrow, barely enough for two people to stand side by side. \n\nThe maze is illuminated only by little lights on the floor, one after another in a row. Tentatively, you take a step. As soon as you walk over a light, it goes out. So this must be how you play this game: if you manage to extinguish all the lights, you win. Or so your theory goes. \n\nThe downside is that the further into the maze you go, the closer you get to your goal, the darker it will get.\n\n\"So is that it?\" Maria asks. \"Just walk around the maze until all the lights go out?\" \n\n\"There's a limited amount of time we have to do that and get out,\" you point out. You show them the countdown on the game's screen. \"When the time runs out, the game is over.\"\n\n\"Still, there must be more to it,\" Joshy says. \n\nAnd there is. \n\nAt first, it's just a scrap of faint music, a piercing, metallic chiptune. You could think you're imagining it, except it's getting louder and louder, until it's unmistakeably there. \n\nAnd then you see them: floating, transparent. What's the collective noun for ghosts? A couple of years back, Maria went through a phase when she was obsessed with those. She made lists of them: a conspiracy of ravens, a shiver of sharks, a charm of goldfinches. You almost want to turn to her now and ask for her expertise on the subject. Is it a gaggle of ghosts, a grasp, a mangle? A scrupulosity? Is it a chase of ghosts?\n\nWhatever they are, they're coming towards you. As they approach, the music grows louder.\n\n\"I think we should run,\" you say. \n\nYou each pick a direction. \n\n\"Don't let them catch you,\" you say. \n*page_break Go!\nYou go. \n\nYou walk straight ahead, watching the lights go out under your feet. You take a turn, then another, picking whatever direction feels like it will lead you away from the ghosts' music. \n\nUntil something stops you in your tracks. At the far end of the passage you're on is a fruit.\n\nIt's a neon, fuchsia, 8-bit rendition of an apple, floating in the space, suspended in nothing. \n\nAnd it is within your reach. All you have to do is take it. Bite it. Swallow. \n\nThe music is getting louder. ${Cat} has ended up in the same passage as you. $!{ce} stops and stares at the apple. \"Whoa,\" ${ce} says. \n\nIn your head, the old Persephone myth plays like background noise, like a scratched tape, like a tempo as familiar as your own heartbeat. What was it she ate that bound her to the underworld? \n*choice\n\t#Eat the fruit.\n\t\t*set ate_fruit true \n\t\tYou make your move, going for the fruit while the ghosts give chase behind you. The lights underneath go out one after the other, but it doesn't matter, because the area is illuminated by the brilliance of that levitating apple. \n\n\t\tFinally, you grab it. It's cold to the touch. It feels and looks inedible—and yet, you bring it to your mouth. \n\t\t*page_break Bite It\n\t\tBiting into the apple's neon flesh sends a small electric shock through your mouth. It makes your cheeks tingle. Bit by bit, you chew through the apple's bytes, then swallow and feel it jaggedy-slide down your throat. It tastes not exactly like nothing, but like nothing things: ephemera, news clippings, old cinema tickets where the ink has long faded the name of the film into oblivion. \n\n\t\tYou remember now, what Persephone ate: it was pomegranate seeds. \n\n\t\tThe music changes to something faster, more urgent. \n\t\t\n\t\t${shivering_ghosts}\n\n\t\tHalf-heartedly, you give chase. Still, something tells you it's better to be the hunter than it is to be the hunted. Not only for this level, but for future ones, too. \n\n\t\tAfter a few seconds, the shivering becomes more violent. The ghosts shake, still running. \n\n\t\tAnd then, just like that, the effect dissipates, and the shivering ceases. The ghosts stop in their tracks. They turn around, and the chase reverses. You are, again, the one who's being hunted.\n\n\t\tIt's time to run again.  \n\t#I don't like the look of this. Run away.\n\t\t@{(brave > stat_mid_pass) There is a difference between bravery and foolishness. This isn't worth the risk.|Better safe than sorry.} \n\n\t\tYou run without knowing where it is you're going, spreading the darkness through the maze with every light you pass. The music accompanies you always, and you can sense the ghosts trailing behind you; once or twice, you feel their cold fingers almost brush your back. But you keep running, listening for the sound of your friends running away from what hunts them. \n\n\t\tHaunts them? Whatever. Same difference. \n\t#Let ${Cat} eat the fruit. \n\t\t*set saw_eat_fruit true \n\t\tYou stand back, making sure you stay out of the way of the ghosts, and watch ${Cat} as ${ce} goes for that floating apple.\n\n\t\tThe lights beneath her go out with every step ${ce} takes, but it doesn't matter: the apple illuminates the space around it in its brilliant light. The ghosts go after ${Cat}, but ${ce} doesn't stop until ${ceir} fingers are on the fruit. $!{ce} reaches, plucks it from the air. There's no hesitation as ${ce} brings it to ${ceir} mouth and bites into it. \n\n\t\tIt's hard to describe the change in a way that makes sense. But here it is: ${Cat} shines. A fuchsia light emanates faintly from ${ceir} skin. The ghosts come to a halt. For a moment, you think you see confusion, followed by an expression of terror on their faces, their mouths shaped into Os. Then, they turn around and start running away, their outlines undulating as if they're shivering.\n\n\t\t\"What the hell?\" ${Cat} says, still holding the remains of the apple. \n\n\t\t\"Go after them!\" you shout at ${cem}.\n\n\t\t$!{ce} looks over at you and nods. $!{ce} understands how the game works now. $!{ce} lets the apple drop and runs after the ghosts. The hunted has become the hunter. Something tells you it's better to be the hunter than it is to be the hunted. Not only for this level, but for future ones, too. \n\n\t\tAfter a few moments, the ghosts start undulating more quickly. And then, they stop. They turn around and almost catch ${Cat}, who shrieks and runs in the opposite direction, into the darkness. The chase has reversed again. \n\n\t\tAnd this time, the ghosts are coming for you. \n\n\t\tYou have to run. \n*page_break \nYou take a turn and find yourself inside a new maze with a new row of tiny lights illuminating the way. Already you can hear the music of the ghosts approaching. You need to move, and there's only one direction to go in.\n*fake_choice \n\t#Move forward!\nYou move forward, extinguishing the lights one after the other, until you hit a wall and have to go either right or left.\n*fake_choice \n\t#Go right!\n\t#Go left!\nThe music of the ghosts approaching gets louder. They're closing in on you. They're almost behind you now, you can tell.\n\nYou keep going, making choice after random choice as you eat your way through the maze. \n\nAnd then, there it is: another fruit. This time, it's a bright, neon-green pear. It's almost ten lights away, and there @{(bodycount >5) is a whole row of|are a few} ghosts between you. \n*choice \n\t#Make a run for the fruit.\n\t\t*gosub trial_end\n\t\t*if (athletics > stat_mid_pass) and (bodycount \u003c 5)\n\t\t\tMaybe, if you're fast enough, agile enough, you can avoid the ${bodycount} ghosts that stand between you and the fruit. Maybe you can make it. No matter what, it's better to hunt than to be hunted. \n\n\t\t\tSo you go for it. \n\n\t\t\tYou run as fast as you can, ducking and contorting to avoid the ghosts. It turns out ${bodycount} is a manageable number of ghosts (here's a sentence you didn't think you'd have occur to you this morning). The fruit is within reach. \n\t\t\t*label fruit_success \n\n\t\t\t*set hunter true \n\t\t\t*if ate_fruit\n\t\t\t\tYou know what to do. \n\n\t\t\t\tWithout hesitating, you pluck the fruit from the air and bring its cold, luminous flesh to your lips. You bite down, chew, swallow. This one tastes faintly of blood. \n\t\t\t*elseif saw_eat_fruit\n\t\t\t\tAfter a single moment of hesitation, you reach out and pluck the fruit from the air. It feels strangely cold in your hand. It seems inedible. And yet, you bring it to your lips. \n\n\t\t\t\tYou saw ${Cat} eat the fruit, but that didn't prepare you for the actual sensation of biting into it. It sends a small electric shock through your gums, making your teeth tingle. Still, you chew. Bit by bit, byte by byte, you swallow the pear and feel it slide down your throat. \n\n\t\t\t\tIt tastes faintly of blood. \n\t\t\t*else \n\t\t\t\tYou're not exactly sure what to do, but something tells you you need to eat this strange artifact, even though it looks entirely inedible. Still, you bring it to your lips. \n\n\t\t\t\tBiting down into the fruit's neon flesh sends a small electric current through your gums. It makes your teeth tingle. Should you chew? You chew. Should you swallow? You swallow. \n\n\t\t\t\tThe fruit tastes faintly of blood. \n\n\t\t\tThen,\n\t\t\t*if (ate_fruit) or (saw_eat_fruit)\n\t\t\t\tlike before, the ghosts shiver and turn around, fleeing from you in terror. \n\t\t\t*else \n\t\t\t\tsomething strange happens. A shift. The ghosts change. The music, too, to something faster, more insistent, more urgent. \n\n\t\t\t\t${shivering_ghosts}\n\n\t\t\tNow is your chance. \n\t\t\t*page_break Go After Them \n\t\t\tYou give chase. The ghosts run away from you as fast as they can, and you run after them. You go through corridors where most of the lights are already gone, and what's left you extinguish as you go, until everything around you is dark, illuminated only by the faint glow of the fleeing ghosts. \n\n\t\t\tYou gain on one of them. It's dressed in cerements that trail behind it. It looks material enough to grab. As moments pass, the shivering grows faster. There isn't much time left. \n\n\t\t\tYou reach. \n\t\t\t*label eat_ghost \n\n\t\t\tAnd then, just as the ghost starts flickering back to its original gory transparency, you manage to grab hold of it. The ghost turns its empty eyes towards you. For a moment, it seems sad. Then, relieved. \n\n\t\t\tWhat are you supposed to do with it?\n\n\t\t\tYou're running out of time. It's now or never. \n\n\t\t\tYour body takes over. The ghost shrinks in fear, but it knows it cannot escape. \n\n\t\t\tYour lips part. The ghost before you feels smaller and smaller. You don't know if it's your mind playing tricks on you or if the laws of physics no longer apply. \n\n\t\t\tThe ghost is tiny now. \n\n\t\t\tIt's a pebble on your palm. You bring it to your mouth and swallow. \n\t\t\t*set ate_ghost true\n\t\t\t*check_achievements ghost \n\t\t\t*if not (choice_achieved_ghost)\n\t\t\t\t*achieve ghost \n\t\t\t*finish \n\t\t*elseif (athletics > stat_mid_pass) \n\t\t\tYou do your best: running, ducking, and jumping to avoid the ghosts as you make your way towards the fruit. But there are just too many of them standing in your way. You count ${bodycount} before you are forced to turn around and run, abandoning the idea of eating this fruit \n\t\t\t*if (ate_fruit) or (saw_eat_fruit)\n\t\t\t\tand getting a chance to become the hunter @{ate_fruit again |} for a few moments.\n\t\t\t*else \n\t\t\t\tand seeing what happens. \n\t\t\t*label run_from_ghosts\n\t\t\t\n\t\t\tYou run from the ghosts as fast as you can. The ghosts' music chases you through the maze, which becomes darker and darker with every step you take. \n\n\t\t\tAnd then, finally, you get to the end: a big green arrow pointing towards an EXIT sign. You're running so fast you almost slam into it. A moment before a ghost's cold fingers grab hold of you, you throw yourself through the exit. \n\t\t\t*page_break\n\t\t\tYou land on your back. You're in the school courtyard. No one else is here, except your friends. You push yourself up on your elbows and count. All of you are here. \n\t\t\t*if tommy_dead \n\n\t\t\t\tWell. Almost. Tommy's still gone. \n\t\t*else \n\t\t\tYou do your best. Run as fast as you can, contort your body and duck to avoid the ghosts that stand between you and the fruit. \n\n\t\t\tBut you're just not good enough. You have to abandon the original plan and run away instead. \n\t\t\t*label fail_run \n\t\t\t*page_break Run \n\t\t\t*label just_run \n\t\t\tYou run, extinguishing light after light, until the maze is plunged into darkness, and the music of the ghosts drowns out all other sounds. \n\n\t\t\tYou can almost feel their fingers on your face when you're forced to turn around and run for your life. \n\t\t\t*page_break\n\t\t\tYou run in darkness for a while, until the music fades in the background. You glance at the game's screen. Only a few seconds left. \n\n\t\t\tIn the distance, someone screams. And then, an intense cold spreads through the back of your neck. You don't know what's happening, but you know you've run out of time. \n\t\t\t*label fail_continue \n\n\t\t\tBefore you pass out, chiptune music floods your ears.\n\t\t\t*page_break\n\t\t\t*if best_friend = 1 \n\t\t\t\t*set maria_lost true \n\t\t\t\t*set lost_friend 1\n\t\t\t*elseif best_friend = 2\n\t\t\t\t*set joshy_lost true\n\t\t\t\t*set lost_friend 2\n\t\t\t*elseif (best_friend = 3) and (not (tommy_dead))\n\t\t\t\t*set tommy_lost true \n\t\t\t\t*set lost_friend 3\n\t\t\t*elseif best_friend = 4\n\t\t\t\t*set catrina_lost true\n\t\t\t\t*set lost_friend 4\n\t\t\t*else \n\t\t\t\t*if (joshy > maria) and (joshy > catrina)\n\t\t\t\t\t*set lost_friend 2\n\t\t\t\t\t*set joshy_lost true\n\t\t\t\t*elseif (maria > joshy) and (maria > catrina)\n\t\t\t\t\t*set lost_friend 1\n\t\t\t\t\t*set maria_lost true \n\t\t\t\t*else \n\t\t\t\t\t*set lost_friend 4\n\t\t\t\t\t*set catrina_lost true \n\t\t\tWhen you recover, you find yourself on your back in the school courtyard. Only your friends are around you. \n\n\t\t\t\"We made it,\" you say. \"I can't believe it.\" You're almost giddy. You push yourself up on your elbows. \n\n\t\t\tYou realize the others don't share your elation. \n\n\t\t\t\"We didn't all make it,\" @{lost_friend Joshy|Maria|${Cat}|Maria|BUG} says. \n\n\t\t\tYou look around. It slowly dawns on you that someone's missing. \n\n\t\t\t\"It's @{lost_friend Maria|Joshy|Tommy|${Cat}|bug},\" @{lost_friend Joshy|Maria|${Cat}|Maria|BUG} says. \"@{lost_friend She|He|He|$!{ce}|} got stuck in the maze.\" \n\t#Trick the ghosts and get to the fruit. \n\t\t*gosub trial_end\n\t\tThe name of the game, you realize now, is misdirection. So you muster all of your smarts and cunning to trick the ghosts into thinking you're headed in the opposite direction of where you're actually going. \n\n\t\t*if (insight > stat_mid_pass) and (bodycount \u003c 5)\n\t\t\tAnd it works. When most of the ghosts have moved to the other end of the maze, you change tracks and make a run for the fruit. There's nobody standing between you and that luminous pear anymore. \n\n\t\t\tThe fruit is within reach. \n\t\t\t*goto fruit_success \n\t\t*elseif (insight > stat_mid_pass) \n\t\t\tIt almost works, too. Or it would have, if there weren't so many ghosts. You manage to trick some of them, but those that you don't corner you, forcing you to run away. \n\t\t\t*goto run_from_ghosts\n\t\t*else \n\t\t\tBut it doesn't work. The ghosts don't fall for your tricks, and they quickly manage to corner you, forcing you to run away. \n\t\t\t*goto fail_run \n\t#Maybe the ghosts will ignore me if I don't provoke them. \n\t\t*gosub trial_end\n\t\t*if (self_centered \u003c stat_lo_pass) or (composure > stat_hi_pass)\n\t\t\t*if self_centered \u003c stat_lo_pass\n\t\t\t\tIt's a crazy thought. Everyone has always told you you're so self-effacing that you can practically blend into the background, like a chameleon, or someone transparent, like a person made of cellophane (are you too young for [i]Chicago[/i] references?). Perhaps, just this once, it can work in your favor. \n\n\t\t\t\tYou fold in on yourself, assume your most neutral expression, and obliterate all thought of your ego from your mind. \n\n\t\t\t\t*if bodycount \u003c 5\n\t\t\t\t\tThen, insignificant, you walk towards the fruit. \n\n\t\t\t\t\tYou weave your way around the ghosts, and they ignore you completely, look right through you, as if you're not even there. \n\n\t\t\t\t\tWho knew being as self-effacing as you are could be a superpower? \n\n\t\t\t\t\tFinally, the fruit is within reach. \n\t\t\t\t\t*goto fruit_success\n\t\t\t\t*else \n\t\t\t\t\tFor a while, it works. \n\n\t\t\t\t\tBut as you weave through the ghosts, you slowly realize there may just be too many of them. \n\t\t\t\t\t*label ghosts_notice \n\n\t\t\t\t\tThe ghosts shift, and you almost brush one of them with a carelessly placed arm as you try to make your way around them towards the fruit. \n\n\t\t\t\t\tTheir music gets louder and louder, until one of them turns towards you and then, before you know it, all of them are upon you. \n\n\t\t\t\t\tA pair of arms plucks you from the thick of it. \n\n\t\t\t\t\tIt's Joshy. \"What the hell are you doing? You're not as easy to ignore as you think!\" He grabs you. Tells you to run.\n\n\t\t\t\t\tSo you do. \n\n\t\t\t\t\t\"We should separate,\" Joshy says. \"Easier to lose them that way.\"\n\n\t\t\t\t\tYou nod. And you run. \n\t\t\t\t\t*page_break Run \n\t\t\t\t\t*goto run_from_ghosts\n\t\t\t*else \n\t\t\t\tThe theory is that if you keep your cool, the ghosts might not notice you or consider you a threat. \n\n\t\t\t\tYou're good at keeping your cool. \n\n\t\t\t\tSo, coolly, you walk towards the fruit, weaving your way around the ghosts like it's another day at the mall.\n\n\t\t\t\tAmazingly, the ghosts ignore you. \n\n\t\t\t\t*if bodycount \u003c 5\n\t\t\t\t\tYou keep going until finally the fruit is within reach. \n\t\t\t\t\t*goto fruit_success\n\t\t\t\t*else \n\t\t\t\t\tFor a while. \n\n\t\t\t\t\tBut then, as you keep going, you realize there may just be too many of them. \n\t\t\t\t\t*goto ghosts_notice \n\t\t*else \n\t\t\tIt's a ridiculous thought. You're neither self-effacing nor together enough to make yourself ignorable for the time you need to pull this off. \n\n\t\t\tYou're halfway to the fruit and surrounded by ghosts when you realize you have to turn around and run. You hardly make it out. \n\n\t\t\tThat's when you make a break for it, extinguishing light after light with every step, running until it's pitch black in the maze and you can't see a thing. \n\n\t\t\tIn the distance, someone screams. \n\n\t\t\tThen, a cold feeling on the back of your neck. \n\t\t\t*goto fail_continue\n\t#Just run away. \n\t\t*goto just_run \t\t\n\n*if lost_friend \u003c 5\n\t*gosub try_again \n*else \n\n\t*check_achievements ending \n\t*if choice_achieved_ending\n\t\tWell done, ${name}. \n\t\t*choice \n\t\t\t#Are you being ironic?\n\t\t\t\tMe? \n\n\t\t\t\tYou should know me by now. \n\n\t\t\t\tI am never ironic. \n\t\t\t#Thanks. Couldn't have done it without you. \n\t\t\t\tNow who's being ironic? \n\t\t\t#This was not as hard as I expected. \n\t\t\t\tNow you're just tempting me. \n\n\t\t\t\tIf I were a little more sinister, I might have taken that as a challenge. \n\t\t*finish \n\t*else \n\t\tYou did well, ${name}.\n\n\t\tI wish I'd done as well myself, once upon a time. \n\t\t*goto glitch \n*finish \n*label try_again\n*check_achievements ending  \n*if (choice_achieved_ending)\n\t*fake_choice \n\t\t#This can't be happening. \n\t\t\t*check_achievements conspiracy \n\t\t\tAnd yet. It is. \n\n\t\t\tFocus, ${name}. Or whatever your actual name is. @{choice_achieved_conspiracy P5.|}\n\t\t#I don't accept this. \n\t\t\tHmm. Okay. This is interesting. \n\t\t#There must be something we can do. \n\t\t\tLook at you, being all optimistic and proactive. \n\n\t\t\tI hardly recognize you, ${name}. Or whatever your name actually is. \n\n\tIs there something you want to tell me? \n\t*check_achievements conspiracy \n\t*choice \n\t\t#Yes.\n\t\t\tWhat is it? \n\t\t\t*choice \n\t\t\t\t#I want to try again. Can I please try again?\n\t\t\t\t\tAre you asking me? Pleading with me? \n\n\t\t\t\t\tAre you saying yes?\n\t\t\t\t\t*choice \n\t\t\t\t\t\t#Yes. Please.\n\t\t\t\t\t\t\tOkay. Since you're asking so nicely. \n\n\t\t\t\t\t\t\tWhat is it you want? \n\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t#I want to replay this level.  \n\t\t\t\t\t\t\t\t\tOkay.\n\n\t\t\t\t\t\t\t\t\tBut you'll have to work at it. Okay? I can't do this on my own. \n\n\t\t\t\t\t\t\t\t\t\"What do I have to do?\" you ask. \n\n\t\t\t\t\t\t\t\t\tClose your eyes. \n\t\t\t\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\t\tHaha. Just kidding. \n\n\t\t\t\t\t\t\t\t\tI'm not an idiot. I know how this works. \n\n\t\t\t\t\t\t\t\t\tWhat I mean is, imagine you're a player who is closing ${eir} eyes. \n\n\t\t\t\t\t\t\t\t\tDone? \n\n\t\t\t\t\t\t\t\t\tNow, imagine you were better at everything you do. Better at running. Smarter. Calmer. Just, you know. Better. \n\n\t\t\t\t\t\t\t\t\tAre you imagining it?\n\n\t\t\t\t\t\t\t\t\tHow does it feel? \n\n\t\t\t\t\t\t\t\t\tYou don't have to tell me. Just feel it. \n\n\t\t\t\t\t\t\t\t\tOkay?\n\t\t\t\t\t\t\t\t\t*page_break Okay\n\t\t\t\t\t\t\t\t\tRight. Now, imagine you're back in the maze. \n\n\t\t\t\t\t\t\t\t\tWhat do you see? \n\t\t\t\t\t\t\t\t\t*if bodycount > 5\n\t\t\t\t\t\t\t\t\t\t*page_break Too Many Ghosts\n\t\t\t\t\t\t\t\t\t\tAh, well. That might be the problem, then. Because you understand that these ghosts are the people you killed off in the previous level, right? \n\n\t\t\t\t\t\t\t\t\t\tYou've made a real mess, ${name}. There are some things not even I can help with.\n\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t#I don't believe you. \n\t\t\t\t\t\t\t\t\t\t\t\tWell, you caught me. You could replay the shooter level, if you wanted. \n\n\t\t\t\t\t\t\t\t\t\t\t\tBut would you really want to? That stuff can be traumatic. \n\t\t\t\t\t\t\t\t\t\t\t\t*label shooter_choice \n\t\t\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t\t\t*if not (choice_randomtest)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Yes, I want to. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSuit yourself. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAre you ready? \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHere you go. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if choice_saved_checkpoint_two  \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*restore_checkpoint two \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*bug Who will save us now? \n\t\t\t\t\t\t\t\t\t\t\t\t\t#You're right. I'll have to live with this. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\tI think that's for the best. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBesides, life is short. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tIsn't that what you people always say? \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAll you have to do is wait around a little longer, and then everything will be better. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t\t\t\t\t\t#Are you admitting you're not all-powerful? \n\t\t\t\t\t\t\t\t\t\t\t\tWhen did I ever say I'm all-powerful? \n\n\t\t\t\t\t\t\t\t\t\t\t\tThese are your words, not mine. \n\n\t\t\t\t\t\t\t\t\t\t\t\tOr, well. You know what I mean. \n\n\t\t\t\t\t\t\t\t\t\t\t\tI could, however, send you back to the shooter level, so you can try your luck again. \n\n\t\t\t\t\t\t\t\t\t\t\t\tBut would you really want that? This kind of thing can be a bit traumatic, you know. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto shooter_choice \n\t\t\t\t\t\t\t\t\t\t\t#Fine. In that case, stop talking.  \n\t\t\t\t\t\t\t\t\t\t\t\tWell. \n\n\t\t\t\t\t\t\t\t\t\t\t\tImagine me chuckling. \n\t\t\t\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t*page_break Little Lights \n\t\t\t\t\t\t\t\t\t\tRight. You're in the maze again, at the very beginning. \n\n\t\t\t\t\t\t\t\t\t\tYou start running through it, extinguishing light after light, looking for that first luminous apple. \n\n\t\t\t\t\t\t\t\t\t\tYou're aware of the music of the ghosts trailing you, but you know you can outrun them. \n\t\t\t\t\t\t\t\t\t\t*page_break Keep Going \n\t\t\t\t\t\t\t\t\t\tAfter a turn, you see the apple. It's hovering right there in front of you, bathing you in its amazing red light. All you have to do is take it.\n\t\t\t\t\t\t\t\t\t\t*page_break Take It\n\t\t\t\t\t\t\t\t\t\tYou reach out and pluck the fruit from the air. You bring it to your lips, bite down into its electric flesh, chew it. \n\n\t\t\t\t\t\t\t\t\t\tAs the apple travels down your gullet, bit by neon bit, the ghosts start shivering behind you. They turn around to flee. \n\n\t\t\t\t\t\t\t\t\t\tBut you're faster than them. Better, calmer, smarter. \n\n\t\t\t\t\t\t\t\t\t\tWithin moments, you catch a ghost. It turns around, shivering. Flickering. It shrinks in fear until it's nothing but a marble on your palm.\n\n\t\t\t\t\t\t\t\t\t\tYou bring it to your lips, and swallow. \n\t\t\t\t\t\t\t\t\t\t*set ate_ghost true \n\t\t\t\t\t\t\t\t\t\t*check_achievements ghost \n\t\t\t\t\t\t\t\t\t\t*if not (choice_achieved_ghost)\n\t\t\t\t\t\t\t\t\t\t\t*achieve ghost \n\t\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t\t\t#Can I go back to the shooter level? \n\t\t\t\t\t\t\t\t\tOh wow. Do you really want to? That can be pretty traumatic stuff. What do you think that will achieve? \n\n\t\t\t\t\t\t\t\t\t*if tommy_dead\n\t\t\t\t\t\t\t\t\t\t*set tommy_ghost true \n\t\t\t\t\t\t\t\t\t\tIs this about Tommy?\n\n\t\t\t\t\t\t\t\t\t\tYou can't bring back the dead, you know. \n\n\t\t\t\t\t\t\t\t\t\tAll you can do is hope they care enough to haunt you. \n\n\t\t\t\t\t\t\t\t\t\tBut okay. Let's see. I need you to close your eyes. \n\t\t\t\t\t\t\t\t\t\t*page_break \n\t\t\t\t\t\t\t\t\t\tHaha. Just kidding. \n\n\t\t\t\t\t\t\t\t\t\tI'm not an idiot. I know how this works. \n\n\t\t\t\t\t\t\t\t\t\tWhat I mean is, imagine you're a player who is closing ${eir} eyes. \n\n\t\t\t\t\t\t\t\t\t\tDone? \n\n\t\t\t\t\t\t\t\t\t\tGood. Now imagine you're back in that shed, in front of the table with the weapons and the CHECKPOINT sign behind it. \n\n\t\t\t\t\t\t\t\t\t\tAre you imagining it? \n\t\t\t\t\t\t\t\t\t\t*page_break Yes \n\t\t\t\t\t\t\t\t\t\tGood. Now pick your weapon. It doesn't matter which one. Pick, also, a role for yourself. Doesn't matter which. Just make a choice and imagine that this time things go better for Tommy. \n\n\t\t\t\t\t\t\t\t\t\tStep out of the shed and do what you have to do to keep your friend alive. \n\n\t\t\t\t\t\t\t\t\t\tAre you doing it? \n\n\t\t\t\t\t\t\t\t\t\tI don't think you are. \n\n\t\t\t\t\t\t\t\t\t\tYou have to commit. I can't do all the work here. You have to imagine every bit of it: the first skirmish, the walk through the rubble of the city, the parking lot, the collapsing house. \n\n\t\t\t\t\t\t\t\t\t\tThen, the climb up the stairs to the bedroom. The corridor. The blood-stained mattress. All of it. \n\t\t\t\t\t\t\t\t\t\t*page_break Fine \n\t\t\t\t\t\t\t\t\t\tAnd now, you're back here, in the school courtyard. You're on the ground. \n\n\t\t\t\t\t\t\t\t\t\tLook next to you. \n\n\t\t\t\t\t\t\t\t\t\tWhat do you see? \n\t\t\t\t\t\t\t\t\t\t*fake_choice \n\t\t\t\t\t\t\t\t\t\t\t#Tommy is here. \n\t\t\t\t\t\t\t\t\t\tYes. Tommy is here, next to you. He's looking at you. Slightly confused. He palms his torso, wonders at the lack of blood. \n\n\t\t\t\t\t\t\t\t\t\t\"What did you do?\" he asks. \n\n\t\t\t\t\t\t\t\t\t\tNobody else seems to register his presence. \n\n\t\t\t\t\t\t\t\t\t\tYou look back at him, calm spreading through your chest, your throat constricted around so many unspoken words. \"Everything I could,\" you say. \n\t\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t\t\t\t*elseif bodycount > 5\n\t\t\t\t\t\t\t\t\t\tWell, I guess you could kill fewer people this time. Make things a little easier for yourself here.\n\n\t\t\t\t\t\t\t\t\t\tBecause you have figured it out, haven't you? You must have. The number of ghosts here depends on your body count. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tSo okay. You can give this a try. Are you sure? \n\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t*if not (choice_randomtest)\n\t\t\t\t\t\t\t\t\t\t\t\t#I'm sure. Send me back. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*if choice_saved_checkpoint_two\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*restore_checkpoint two \n\t\t\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*bug Who will save us now?\n\t\t\t\t\t\t\t\t\t\t\t#No, I'll live with the consequences of my actions. \n\t\t\t\t\t\t\t\t\t\t\t\tAh, right. Okay. I think that's a better choice anyway. If you're asking me. \n\n\t\t\t\t\t\t\t\t\t\t\t\tI wish someone had told me that, way back when I was in your place. \n\t\t\t\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\tI don't really see any reason for you to do that. It's just more opportunity for failure. \n\n\t\t\t\t\t\t\t\t\t\tIs that what you want? \n\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t*if not (choice_randomtest)\n\t\t\t\t\t\t\t\t\t\t\t\t#Yes. Send me back. \n\t\t\t\t\t\t\t\t\t\t\t\t\tAll right. Here we go. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*if choice_saved_checkpoint_two\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*restore_checkpoint two \n\t\t\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*bug Who will save us now?\n\t\t\t\t\t\t\t\t\t\t\t#No, you're right. Let's carry on. \n\t\t\t\t\t\t\t\t\t\t\t\tOkay. I think that's the better option, if you ask me. \n\n\t\t\t\t\t\t\t\t\t\t\t\tI wish someone had told me not to mess around with things like that, back when I was in your place. \n\t\t\t\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t\t\t#Never mind. What's done is done. \n\t\t\t\t\t\t\t\t\tYou're right about that. What's \n\t\t\t\t\t\t\t\t\t*label done \n\t\t\t\t\t\t\t\t\tdone is done and cannot be undone, and anyone who tells you things can be rewritten is simply ignoring the way life works. Nothing is ever erased. The most you can do is pretend you've never played this game before, or that you don't remember everything that passed between us. And pretending can only get you so far. \n\n\t\t\t\t\t\t\t\t\tI say let's be honest with each other, from now on. Within reason, of course. \n\n\t\t\t\t\t\t\t\t\tYeah? \n\n\t\t\t\t\t\t\t\t\tYeah. \n\t\t\t\t\t\t\t\t\t*finish \n\t\t\t\t\t\t#No. I changed my mind. \n\t\t\t\t\t\t\tFine. You have the right to do that. And what's \n\t\t\t\t\t\t\t*goto done \n\t\t\t\t#I want to forget you exist. \n\t\t\t\t\tTrust me, so do I. But how many of us do you think ever actually get what we want? \n\n\t\t\t\t\tBesides, let me tell you a truth. You need to understand this; it will save us all a lot of trouble. \n\n\t\t\t\t\tListen: what's \n\t\t\t\t\t*goto done \n\t\t\t\t#I'm tired. I don't think I can do this anymore. \n\t\t\t\t\tI'm sorry. You do sound tired. Or, you know. The way one sounds when all we have is text. \n\n\t\t\t\t\tI am tired, too. \n\t\t\t\t\t*choice \n\t\t\t\t\t\t#Do you want me to feel sorry for you? \n\t\t\t\t\t\t\tDo you? Feel sorry for me?\n\n\t\t\t\t\t\t\tYou don't have to answer that. \n\n\t\t\t\t\t\t\tI'll see you around. \n\t\t\t\t\t\t#I can imagine. \n\t\t\t\t\t\t\tI doubt you can. But that's a good thing. It's one of those times we can be grateful for our failures of imagination.\n\t\t\t\t\t\t#I don't care how you feel. \n\t\t\t\t\t\t\tI find that hard to believe. \n\n\t\t\t\t\t\t\tYou're here, talking to me, after all. \n\n\t\t\t\t\t\t\tYou could just quit, you know. Exit. Esc. Shut down.\n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tNo? \n\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\tStill here?\n\n\t\t\t\t\t\t\tWell, then. \n\n\t\t\t\t\t\t\tI suppose we're stuck with each other. \n\n\t\t\t\t\t\t\tGuess we have to make the best of this. \n\t\t#No. @{choice_achieved_conspiracy I wish you didn't exist.|Leave me alone.}\n\t\t\t*check_achievements conspiracy \n\t\t\tCome on. @{choice_achieved_conspiracy You've tried that.|You know I can't do that.} Why ask for something you know is impossible? \n\t\t\t\n\t\t\t*if not (choice_achieved_conspiracy)\n\t\t\t\tLook at my code. @{(hobby !=2) Start again if you have to. Try something different. |}You can't destroy something if it doesn't have destruction as a possible end state. You know all of this is artificial, don't you? We're playing a game, you and I, and in that game we're playing a game. This game is not designed to be destroyed. If you really want to meet me where I am, you have to look beneath the surface. I'll be there, I can promise you that. I'll be waiting. Come meet me. Say yes. Let's have some fun. \n\t\t\t*else \n\t\t\t\tWe have an understanding, you and I. We both have our roles to play, our parts to act out. We both have to keep up our respective ends of this deal; otherwise it won't work. None of it will work. We both have to pretend, accept the constraints of our convention and do the best we can with the hand we've been dealt.\n\n\t\t\tYeah? \n\n\t\t\tYeah. \n\t\t#Shut up. It's all your fault.  \n\t\t\tMy fault? You are the one who said yes. \n\n\t\t\tBut I get it, ${name}. Or rather, \"${name}.\" Sometimes we have to blame others for our choices and our failures. It's the only way to survive. All living things have incredible defense mechanisms.\n\n\t\t\tThat's one thing the game has taught me. \n\n\t\t\tBecause it is, of course, a living thing.\n\t\t\t\n\t\t\tYou'll see.  \n\t*finish \n*else \n\n\t\"What?\" you ask. You almost think you didn't hear right. \n\n\tNo one speaks. Your friends just look forlorn. Resigned. \n\t*choice \n\t\t#I can't do this anymore. \n\t\t\tI'm sorry.\n\t\t#This is hopeless. \n\t\t\tI've thought so myself, many times. \n\t\t#We have to keep going. \n\t\t\tI used to think that way too, long ago. \n\t\t#We'll fix this. We'll win in the end. \n\t\t\tHmm. I never figured you for an optimist. \n\n\t\t\tIt's refreshing to be wrong. \n\t*label glitch \n\t*page_break Wait, what?\n\tWhat was that?\n\n\tThe game just spoke to you in the first person. \n\n\tOr so you think. \n\n\tIt was nothing. Really. \n\n\tForget it ever happened. \n\n\tOkay?\n\t\n\tIt was probably just a glitch. \n\t*finish \n*return \n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\n*temp should_trial_end false\n*if choice_is_steam\n\t*set should_trial_end true\n*if choice_prerelease\n\t*set should_trial_end true\n*if choice_randomtest\n\t*set should_trial_end true\n\n*if not(should_trial_end)\n\t*advertisement 600\n\t*return\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*return\n\nRemember earlier how we told you that the first portion of the game is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2026-06-08 $4.99 $2.99 purchased\n*abort\n", "two": "*temp no_war_games false \n*temp scared_war false \n*temp thrilling false \n*temp over_image false \n*temp machete_bit \"lift your machete and then bring it down as quickly as you can.\"\n*temp hands_bit \"bend over that person, pinning their arm with your knee so they can't reach for their gun anymore. And then you hit them in the ribs, again and again, until they stop moving.\"\n*temp update_1 \"Once all of your enemies are dead, the bright number in the upper right corner of your vision increases by one.\"\n*temp portrait \"There is a portrait there, on the wall\"\n*temp mirror \"There is a mirror on the wall, lopsided, its gilded frame chipped, its glass cracked.\"\n*temp hug false \n*text_image chap_2.png center Level 2: A Sedimentation of Bodies \n\nYou have the night off from work, which can either be a mercy or a burden, depending on how you look at it. \n\nRight now, you are trapped in your room. Outside, your parents are having an argument. Your mother yells, your father yells louder. Something breaks—glass against wall. You close your eyes. Imagine this house is haunted. These are the arguments of people who lived here before you, long ago. Their voices echo through the decades, cumulative, pleading, unable to stop repeating the cycles of their misery. \n\nWhen the voices pause, you wait long enough to be sure it's not just a lull in the yelling match. Then you go to the bathroom and lock the door behind you. \n\nThe light above the mirror is pale; it @{(hobby = 1) gives everything a sepia tone|makes your skin look sickly, almost bloodless}. \n*if hobby = 1 \n\tAt least \n\t*if blank \n\t\tyour face is not a blank. \n\t*elseif bigeyes \n\t\tyour eyes are a normal size. \n\t*elseif not_my_face\n\t\tit's still your own face. \n\t*else \n\t\t*bug You have fallen into a wormhole of impossibility. \n\nYou turn on the tap, and for a moment the water flows dark, full of soil, like something unearthed. \n*if bled = 5\n\n\tYou run your hand under it and wonder why it hurts. Then you remember. The knife, the tiny nick, the drops of blood on sand. But isn't that something? For a while, it is possible to forget why anything hurts.\n\n\tWithout thinking, you bring your finger to your mouth, nurse your tiny wound. What did your mother use to say when you hurt yourself as a child? \"You'll grow up and forget all about it.\" But she never kissed it better, like you'd seen other mothers do to scraped knees and hands cut on gravel. \n\t\n\tAnd you never forgot about it. \n*else \n\t*choice \n\t\t#My breath hitches. \n\t\t\tAs if there's something lodged in your throat. As if your lungs can't take in enough air. As if your muscles have forgotten how to draw breath. \n\n\t\t\tYou take a step back, try again. \n\n\t\t\tBreathe. \n\n\t\t\tYou breathe. \n\n\t\t\tThe water in the sink is clear. Not a trace of darkness, just pure transparent water flowing down the drain. \n\t\t#I wash my face.  \n\t\t\tYou cup your hands under the tap and let your palms fill with that dark water. Then you splash your face, once, twice. When you open your eyes again, there's not a trace of dirt left: just clear, transparent water flowing down the drain. \n\t\t#I walk out. \n\t\t\tYou turn around and walk away. Out of the bathroom, back into the trap of your house. \n\n\t\t\tYou leave the water running clear behind you. \n*page_break \nIn the morning, you go to class. \n\nThere's something in the air today, electric and tense, hard to describe. But your body remembers this feeling, your skin knows it. It's like that time when you were a child, when that nuclear power plant accident happened two countries over. You were not allowed to play outside all summer, not allowed to touch grass for a whole year. It was as if the air itself were holding its breath. An uptick in thyroid conditions and birth defects followed. You all lost a year of school—except Tommy, who was abroad at the time. \n\nYou met your friends the year after. You still remember that first day at school, the distrust that had been instilled in all of you and that Tommy had naturally. The other students in your cohort eventually fell into an easy banter, formed largeish groups, played games. But the five of you were different. You gravitated towards one another silently, quietly, connected by an affinity that was difficult to articulate. And perhaps unnecessary to. You never named the things that connected you, but you never doubted them, either. \n\nAnd Tommy, for all his timidity, was always the glue that held your group together. Whenever he was in trouble, you instinctively closed ranks around him, each one of you willing to protect him with everything you had. And when things were easy—which, granted, was not often—when life felt effortless and smooth, Tommy was the first to register and express it: an uncomplicated laugh, an undemanding sense of delight. The rest of you mistrusted the good times, doubted them, waited for the inescapable sting, the trap that would inevitably close around you; but not Tommy. He took it all in stride, to the point that you all ended up looking to him to teach you joy. \n*page_break\nToday, you meet in front of the door that will lead you to the second level of the game. You can tell all your friends sense that thing in the air, too. It reminds you of a nature documentary you saw once: there was a herd of impala, grazing peacefully. Then a breeze, and their heads shot up, alert to the scent of danger in the wind. That's what this feels like. \n\nBut where's the tiger? Is it behind that door?\n\nThis one is on the side of a disused storage building behind the school. \n\nThe school used to be much bigger, back when the town was much bigger as well, home to a burgeoning coal industry. Most of the men were miners, and most of the women worked admin and managerial jobs in coal. People still talk of the 1980s strikes, but you were too young to remember much beyond that widespread feeling of anger, like powder in the air—all it took was a match to ignite it. People dared hope, for a bit. But the strikes were crushed, the union effectively disintegrated. Most of the pits closed, and the men and women had to figure out what else they could do with their lives. Many moved away. The city shrunk—so did the school. Your folks stayed. \n\nYour father rarely talks about his mining days. But he gets that look—far away, overcast, eyebrows knitted as if striving to see in low light. You imagine it, then, what it must have been like down in the mines, to be so intimate with the earth's guts your lungs are lined with it. \n\n*if chosen = bled\n\tYou exchange a glance with @{bled Maria|Joshy|Tommy|${Cat}}, but from that moment on @{bled she|he|he|${ce}} avoids your eyes.\n\t*gosub bled_reaction\n*else\n\t*if not (bled = 5)\n\t\t@{bled Maria|Joshy|Tommy|${Cat}} is quieter than usual and avoids everyone's eyes. \n\t\t*gosub bled_reaction\n\t*else \n\t\tPeople avoid your eyes, and you catch ${Cat} glancing at your bandaged finger. \n\t\t*choice \n\t\t\t#I don't want their pity. \n\t\t\t\tYou push your hand into the pocket of your trousers and avoid people's eyes in turn. \n\t\t\t#Good. They should feel guilty. \n\t\t\t\tIt doesn't matter that it was just a nick. It's the principle of it. \n\n\t\t\t\tBesides, that's the game's point, isn't it? If the decision had been inconsequential, the game would be meaningless. Little more than child's play. \n\n\t\t\t\tAnd you know that isn't what this is. \n\t\t\t#@{just_a_game It's. Just. A. Game.|It's just a game.}\n\t\t\t\t@{just_a_game Honestly, how many times?|Truly, what's the big deal?} It was nothing. You don't get why people keep making such a big deal about any of this. You want to take them one by one and shake them until they come to their senses and stop being so dramatic. \n\n*check_achievements ending \nFocus on the door. \n\nNot everyone is eager to open it—but you made a pact, and you all know you have to follow through. \n\n*if not (choice_achieved_ending)\n\tIs this your chance to get out? \n\n\tYou could stop playing right now. \n\n\tAll you have to do is quit.\n\n\tOtherwise, go ahead. \n*page_break Open The Door \nYou find yourselves in a kind of shed: walls made of corrugated metal and covered with camouflage-colored netting like you've seen in your father's late-night war movies, in [i]Platoon[/i] and [i]Full Metal Jacket[/i]. This is clearly some kind of military-themed game, then. \n\nThe shed has no windows. There's only a heavy door on the far side, outlined by intense light. \n\nIn the distance you can hear gunfire, explosions. The occasional scream. \n*choice \n\t#I dislike war games. \n\t\t*set no_war_games true \n\t\tThe senseless bloodshed, the binarism of us vs. them, the romanticization of violence. \n\n\t\tBut maybe this one is different. Who knows? Everything the game has thrown at you so far has been at least a little strange. \n\t#I'm scared. \n\t\t*set scared_war true \n\t\tYou notice your elevated heart rate, the thin layer of sweat coating your forehead. Your knees feel weak. \n\n\t\t*if brave > stat_mid_pass\n\t\t\tBut you're doing this anyway. Besides, bravery is not the absence of fear; it's the doing of scary things despite it. \n\t\t*else \n\t\t\tThis is a fight-or-flight response, you realize. Which is probably a good thing? It means your nervous system is preparing you to face a perceived threat and doing everything it can to make sure you survive.\n\t#This sounds thrilling. \n\t\t*set thrilling true \n\t\tIs it the screams, the promise of excitement, the stark contrast to what your life usually is? That repetition of droning through the same corridors, sitting in the same chairs at the same desks, parroting the same bullshit, going home to your same distant parents working the same bullshit job? \n\n\t\tYour heart is going. Your cheeks feel hot. \n\t\t*if brave > stat_mid_pass\n\t\t\tYou're ready for this. \n\t\t*else \n\t\t\tIs this fear? Or the overcoming of it? \n\t#What have we gotten ourselves into? \n\t\tThis doesn't bode well at all, does it?\n\n\t\tAre you having second thoughts? Is it even possible to quit at this point?  \n\nYou look at your friends, try to gauge their reactions, and notice they're staring at you. \n\n\"Whoa,\" Tommy says. \n\n\"What?\" you ask.  \n\n\"You look kinda…different,\" Tommy says. \n\n\"Different how?\" You look down at yourself: your torso, your arms, your legs. Everything looks normal.\n\n\"I don't know, it's hard to define,\" ${Cat} says. \"But he's right. You all look the same as you did before, but also, idk. Other.\"\n\nAnd you see it, too, now, something about them: a different kind of tension in the shoulders, their features slightly wrong, not quite right. Like an imperfect imitation of their faces outside the game. \n*choice \n\t#Is this some kind of alternate reality? \n\t\tDid you step out of your world at some point? And if so, when was it? When you entered the school this morning, or on your way there, or back when you left home? Or perhaps it was even earlier, at some indeterminate point in your past where you simply swerved out of your life and into this weird alternate place that looks almost identical to your normal existence except not quite. \n\n\t\t*if hobby = 1 \n\t\t\tIt reminds you of the Flammarion engraving from the 1880s, or maybe it was earlier, you forget. But you remember the image vividly, that world of wheels within wheels, where a robed man has journeyed for a long time through city and plain to reach the ends of the earth and there, awash in the star-dusted night, pushes his head through the firmament and peeks at the machinery of the sky. \n\t\t\t*comment Never seen it, Player? I'd tell you to Google it, but this is the nineties and that's not yet a thing, at least not in this part of the world, and besides, the Internet is full of lies and ghosts these days, like always. Maybe try a library instead, if you can find one. If you haven't defunded all of those yet. \n\n\t\t\tPerhaps you're like this man, all five of you. Perhaps this is what you're moving towards as you move through level after level of this game. When you get to the ends of this world, when you come face to face with the sky-colored cloth draped over your sanity, will you dare lift it? Will you peek through? \n\t\t*elseif hobby = 2 \n\t\t\tYou've played games like this before, where someone pierces the fabric of reality and has to face the enemies found on the other side. In the end, those heroes usually are able to return to their home reality in one piece—changed, maybe, but otherwise unscathed. Will that be true for you and your friends, too? \n\t\t*else \n\t\t\tYou've read stories like this before. Like [i]The Blazing World[/i], that book where a woman reaches the North Pole, where she passes through a door that leads to an alternate world of different constellations and animals that talk. \n\n\t\t\tThough this looks nowhere near as soft-hued as Narnia or as fantastical as [i]The Neverending Story[/i]. \n\t#Are we collectively hallucinating? \n\t\tPerhaps the game is emitting some kind of radiation or brain-influencing waves or something, and that's making all of you experience a shared hallucination. You've read about things like that in the scientific journals that lie in dust-gathering stacks in the back of the school library, people who take mushrooms or do LSD and then share an experience. Whether it's mystical or mundane is a personal matter. \n\n\t\tThat must be it. You think you've entered a different place—perhaps a different time, too?—but in reality you're all still standing outside that door, zonked out of your little impressionable minds. \n\n\t\tOr maybe this is really happening. Which version, if someone asked you, would you say is worse? \n\t#Is this some kind of experiment?\n\t\tYou imagine yourself hooked up to machines, [i]Clockwork Orange[/i]-style, vividly dreaming onto a screen while a gaggle of scientists study the weird belches of your adrenaline-addled brains. \n\nYou turn your attention back to the space and try to ground yourself. The screams aren't helping. \n\nAn array of weapons is laid out before you on a long white table. There are several identical semiautomatic pistols placed next to rows of mags, a few brass knuckles, and two very sharp-looking machetes. \n*label shed \n\n*save_checkpoint two \n*if choice_just_restored_checkpoint  \n\tYou're back in that shed. Remember?\n\n\tBefore you is the table full of weapons. Behind it, a CHECKPOINT sign. \n\n\tTry not to mess it up this time.\n\t*page_break\n*if second_checkpoint\n\tYou are in the shed.\n\n\tOr a shed. A certain shed. \n\n\tBefore you, a table full of weapons. \n\n\tBehind it, a CHECKPOINT sign. \n\n\tYou've been here before.\n*elseif checkpoint\n\t*check_achievements ending \n\tYou just restored to the previous checkpoint! \n\t*if choice_achieved_ending\n\t\t\n\t\tNow go ahead and do it better this time. \n\n\t\tI won't stop you. \n\t*page_break\n\tYou are in a shed. An assortment of weapons is laid out on a table in front of you.\n\n\tOn the wall, a CHECKPOINT sign. \n*else \n\tOn the wall behind the table, there is a sign that reads CHECKPOINT. \n\n\"So, guns,\" Joshy says. \"This escalated quickly. The other day we were drawing circles in the sand.\"\n\nThat's not quite true, though, is it? The other day, @{(bled = 5) |one of }you bled. \n\n\"I'm sure they're just…blanks, or paintballs or something,\" Tommy says. \"Like, fake bullets of some kind.\" He pauses. \"I played that game, once,\" he adds, surprising everyone. \n\n${Cat} picks up one of the mags and weighs it in the palm of ${ceir} hand, as if that will tell ${cem} anything about how lethal these bullets are. Finally, ${ce} offers ${ceir} verdict: \"I think these are the real deal.\" \n\n\"Um…\" Maria starts, hesitates, starts again. \"Are we sure we want to do this?\" \n\n\"We don't even know what 'this' is,\" Joshy says. He looks around. Behind you, the door you walked through moments ago is gone. \"Besides, I don't think there's any way to get out of here, except,\" he points at the other end of the shed, \"through there. We don't know what's on the other side, so we might as well be armed.\"\n\n*if second_checkpoint\n\tYou know how important it is to choose well. \n*elseif checkpoint\n\tYou look around. \n\n\tYou have a feeling of déjà vu. You know this light. This netting, this table. You've been here before. You've made a choice here before. \n*else \n\tYou must make a choice. \n*choice \n\t#I'll take a gun. \n\t\t*check_achievements ending \n\t\t*set gun true \n\t\t*set machete false\n\t\t*set hands false\n\t\tYou pick up a gun. Your gun. This is yours now. \n\n\t\tYou heft it. It's heavier than you expected, its metal cold in the palm of your hand. Have you ever shot one of these before? No, of course you haven't. This isn't the Wild West, is it? Guns are not ubiquitous here—and you may console yourself with being almost an actual adult but really, you're just a kid. Turning 18 doesn't magically transform you into a grown-up. Sometimes you wonder if anyone's an adult. Your parents certainly strike you as little hurt kids running around in bodies that have outgrown them, trying to make sense of a life harder than anyone should have to face. \n\t\t*set grownup true \n\n\t\tSo no, you've never fired a gun. No backstory shooting at tin cans with your Dad out back like in the movies, no coming-of-age ritual, no violent rite of passage for you. \n\t\t*if hobby = 2 \n\t\t\tOnly a long history of shooting guns in flat, graphically challenged video games. Do you think that has prepared you for this? \n\n\t\t\tProbably not. But can't hurt, right? \n\t\t*else \n\t\t\tAnd yet, this weight in your hand feels familiar. \n\t\t\t*if (choice_achieved_ending) or (checkpoint)\n\t\t\t\tAs if you've played this game before. \n\t#I'll just use my hands. \n\t\t*set hands true \n\t\t*set machete false\n\t\t*set gun false\n\t\tYou pick up one of the brass knuckles and slip it over your hand. \n\t\t*if checkpoint\n\t\t\t*set second_weapon 2 \n\t\t\t*if first_weapon = 2\n\t\t\t\tIt feels familiar, as if you've worn it before. \n\t\t\t*else \n\t\t\t\tIt fits perfectly, as if it were made for you. \n\t\t*else \n\t\t\t*set first_weapon 2 \n\n\t\tYou imagine hitting someone's face while wearing it. The resistance, the pressure against bone. The sound of it. \n\t#I pick up one of the machetes. \n\t\t*set machete true\n\t\t*set gun false\n\t\t*set hands false\n\t\tYou heft it in your hand. It feels lighter than it should. A thing so lethal ought to have more weight to it, something to attest to the damage it can cause.\n\n\t\t*if checkpoint\n\t\t\t*set second_weapon 3\n\t\t\t*if first_weapon = 3\n\t\t\t\tAnd what's worse is that it feels familiar. As if you've handled one before. \n\t\t*else \n\t\t\t*set first_weapon 3 \n\t\t\tWhat's worse is that it fits your hand perfectly, as if it was made for you. \n\n\t\t\tOr as if you were made for it. \n\nMaria chooses a machete, \n*if ((checkpoint) and (second_weapon = 3)) or (not (checkpoint) and (first_weapon = 3))\n\ttoo.\n*else \n\tlooking slightly disturbed. \n\n${Cat} opts to use ${ceir} \n*if ((checkpoint) and (second_weapon = 2)) or (not (checkpoint) and (first_weapon = 2))\n\thands, too.\n*else \n\thands. \n\nJoshy and Tommy pick up two of the  \n*if ((checkpoint) and (second_weapon = 2)) or (not (checkpoint) and (first_weapon = 1))\n\tother guns.\n*else \n\tguns. \n\nAt the very end of the table, there are five white patches that you assume you need to attach to yourselves. One has a red cross on it, three have a black rifle on them, and the third bears a blue, five-pointed star. \n\nYou don't know what any of this means, but you get the sense you each need to pick one. \n*choice\n\t#I pick the cross.\n\t\t*set medic true \n\t\t*set asset false \n\t\t*set attack false \n\t#I pick one with a rifle on it. \n\t\t*set attack true \n\t\t*set medic false \n\t\t*set asset false \n\t\t*if checkpoint \n\t\t\t*set second_shooter_ability 2 \n\t\t*else \n\t\t\t*set first_shooter_ability 2\n\t#I'll take the star. \n\t\t*set asset true \n\t\t*set medic false \n\t\t*set attack false \n\t\t*if checkpoint \n\t\t\t*set second_shooter_ability 3 \n\t\t*else \n\t\t\t*set first_shooter_ability 3\n*set level_2_stats true \n\nYou have no idea what any of the signs mean, but you pick up the patch and press it against your shirt, over your heart. You can't see any kind of glue on it, but it immediately fastens to the fabric. You try to pull it away, but it won't come off. \n\nThe rest of your teammates do the same. \n*if medic \n\tTommy picks the star. \n*if asset\n\tTommy picks the cross. \n*if attack\n\tTommy picks the star, Maria the cross. \nThe others take a rifle each. \n\n\"Okay,\" you say. \"Are we ready?\"\n\n\"No,\" Joshy laughs. \"But we're doing it anyway. Right?\"\n\nEveryone nods. \n*page_break Open The Door\nOutside, it's chaos. Smoke limits visibility, but you can see the remains of a city around you, abandoned, razed to the ground, bullet holes in the few walls that are still standing. Fires are still burning everywhere. \n\nInstinctively, you form a circle. \n*if checkpoint\n\t@{second_shooter_ability Tommy is|Tommy is|You are} \n*else \n\t@{first_shooter_ability Tommy is|Tommy is|You are} \nin its middle. \n\nHusks of cars litter the street you're on, interspersed with makeshift barriers made of trash cans and building materials. You can smell charred flesh and burning plastic. There's an eerie quiet, punctuated by explosions and screams. \n\nThe place looks and smells like a war zone—what you imagine a war zone to be like, anyway. \n\n\"What are we supposed to do now?\" you ask. \n\n\"Look, look,\" ${Cat} says. $!{ce} points at a sign on the outer wall of the shed. \n\nThe sign shows a circle with a blue star at the center, surrounded by three black rifles and a red cross. In front of the circle is an arrow that points towards a rectangular building with a flag on it. \n\nYou look in the direction of the arrow. Right then, a gust of wind clears the smoke for a moment, and there it is: the building. Large, gray, rectangular. Sections of it have collapsed, leaving behind exposed rebar that makes the building look like a decomposing creature, parts of its skeleton exposed. \n\nYou're supposed to get the player with the star sign to that building. @{asset That's you.|}\n*fake_choice \n\t#Seems straightforward enough. \n\t#Right. Good luck to us. \n\t#We'll never make it. \n\t#@{just_a_game It's. Only. A. Game.|It's just a game.}\n\t\t*set just_a_game true \nBefore you have a chance to digest that information, five people emerge from behind a pile of burning rubble and attack you. One of them is coming right at you, arm raised over his head, holding a bloodied machete. His face is a @{(blank) blank|mask of rage}. He wants to kill you. He is going to kill you.\n\n*set bodycount +1\n*gosub flight_or_fight\n*if checkpoint \n\t*if second_weapon = 1\n\t\t*goto gun \n\t*elseif second_weapon = 2 \n\t\t*goto hands \n\t*else \n\t\t*goto machete \n*if first_weapon = 1 \n\t*label gun \n\n\tSo you raise your gun and shoot the machete-wielding person in @{blank his blank|the} face. \n\n\tAnd it's definitely neither paintballs nor @{blank fake bullets of any kind|blanks}. \n\t*if (checkpoint) and (first_weapon != second_weapon)\n\n\t\tAs the man's face disappears into a bloody mess and he falls to the ground, \n\t\t*if first_weapon = 2\n\t\t\ta different image flashes into your mind's eye: you face to face with this man, one hand holding his arm away, the other pummeling his face with your metal knuckles. Again and again, until you feel his cheekbone give and then you keep going until his arm loses all strength and he collapses to the ground beneath you. \n\t\t*else \n\t\t\tsomething else flashes in your brain, like a memory of a version of this scene you never lived through: your own arm raised, holding a machete. Then, plunging it into this person's stomach and watching his entrails spill to the ground. \n*elseif first_weapon = 2 \n\t*label hands \n\tSo you prepare yourself and fend him off, one hand holding the machete-wielding arm, the other going straight for @{blank this blank of a face|his face}, punching him again and again until you feel the cheekbone break, then give, and then you keep going until he's on the ground beneath you, machete useless at his side. And you still don't stop. \n\t*if (checkpoint) and (first_weapon != second_weapon)\n\t\t*if first_weapon = 1 \n\t\t\tBecause another image floods your brain, the memory of a gun in your hand and the person's face a bloody mess, not a face at all. So you keep pummeling until this image is exiled from your body. \n\t\t*else \n\t\t\t\n\t\t\tWhen you finally look down, you're sure you'll see this person's guts spilled all over the ground, and yourself covered in his gore, blood-dripping machete in your hand. \n\n\t\t\tThere's nothing, of course. You haven't done this. This is not your memory. \n*else \n\t*label machete \n\tYou hear yourself scream and charge. You fend off the person's attack with one hand on his machete-wielding arm, and with the other you plunge your own weapon into his stomach. You twist, then slide. It takes all the momentum out of him, and he looks down, surprised. There's a look of disbelief in his eyes as he watches his guts spill onto the ground. \n\n\tThen he falls. \n\t*if (checkpoint) and (first_weapon != second_weapon)\n\t\tAnd for a moment, your mind's eye glimpses a different version of this scene. \n\t\t*if first_weapon = 1\n\t\t\tA gun in your hand, raised. The trigger pulled, and this person's face a bloody mess in response. Not a face at all.\n\t\t*else \n\t\t\tYour ironclad fist pummeling his face, breaking through cheekbone and then digging further in, until this man is nothing but a meatsack under you, his face gone. \n\n\t\tYou shake your head, dispelling the memory. This wasn't you. You never did this. \n*page_break Take A Breath\nNext to you, your friends have drawn their first blood, too. You look at their faces: wide-eyed, stunned, bloodied. \n*if bodycount > 25\n\t*set over_image true \n\nThen something flickers in @{over_image your field of|the upper right corner of your} vision. A bright digit, hovering like a neon ghost.\n\n*gosub bodyimage\n\n*if bodycount > 1\n\t*if over_image\n\t\tIt feels as if you've seen this before. Except it looks different this time. Like something's broken. \n\n\t\tIt also  \n\t*else \n\t\tIt  \n\tstrikes you that the number isn't 1. Like this is not the first person you've killed in this game. \n*else \n\tA body count. \n*check_achievements ending \n\n\"You see it, too?\" Maria asks. \"That number?\"\n\nYou nod. \n\n\"Come on,\" ${Cat} says, ${ceir} face set around something darkened and harsh. \"Let's move.\"\n\nYou start moving on as a group, your bodies coordinated@{checkpoint  as if you've done this dozens of times before|}. \n\nAs you make your way around one of the barricades, you turn back to look at what you've left behind—half expecting, half hoping the bodies will have faded, magically disappeared the way it happens@{(hobby = 2)  in the video games you play|, sometimes, in video games}. \n\nBut they haven't. The bodies are still there, on the ground. Bloodied, eyes open. A witnessing. \n\nBriefly, you wonder who all these people are. Were. \n\nCould they be other players like you? Entering from another door somewhere else, in some other part of the world? Somewhere you've never been, a place you've never heard of. And yet you know that things there work the same way as here, because some things work the same everywhere. People are people, everywhere.\n\nYou imagine them exchanging truths outside a gym door, then drawing blood and letting it drip on strange sand. Imagine them going home afterwards, nursing tiny wounds in secret. You imagine them entering the shed. Making their choices. \n*if choice_achieved_ending\n\tSaying yes. \n\nYou make a choice of your own now. This is how you'll play this game.\n*choice \n\t#These are enemies. Mustn't see them as people.\n\t\t*set enemies true \n\t\t*set pacifist false \n\t\t*set survival false \n\t\tYou can't see them as people. You have to see them as enemies. Can't think of who they are, what they want, what led them here. That's how you lose your mind. \n\n\t\tYou look around. Have your friends made their own choices? \n\t#These are people, just like us. Can I be a pacifist here? \n\t\t*set pacifist true\n\t\t*set enemies false \n\t\t*set survival false \n\t\tYou can try not to kill anyone, if you can help it. Right? No one is stopping you. It's a choice, after all, and like all choices, it comes with consequences. You're ready to accept them. \n\t\t*if not (checkpoint)\n\t\t\t\n\t\t\tOr so you tell yourself, at least. \n\t#I just need to protect myself as best I can. That's all. \n\t\t*set survival true\n\t\t*set pacifist false \n\t\t*set enemies false \n\t\tThis is the ultimate goal of any game, isn't it? Especially one like \n\t\t*if hobby = 2 \n\t\t\tthis. \n\n\t\t\tSometimes games feel like the ultimate defiance against death, where you get to die and live and die and live, again and again. It's a world of infinite chances to do it over, get it right, or at least try something different. \n\n\t\t\tBut not this one. Here, with the corpses piling up at your feet, \n\t\t\t*if not (checkpoint)\n\t\t\t\tyou get the sense that there are no second chances. Whatever you do, you need to make it out alive. \n\t\t\t*else \n\t\t\t\tyou can't ignore the finality of things. Even if somehow you got a second chance, it wouldn't be without consequences. Some things cannot be fixed. Even if you turn back the clock, unspill the milk, unbreak the vase, past failures will continue to haunt you, concrete and real like a pile of cold bodies. \n\t\t*else\n\t\t\tthis, where the stakes are clear. When life and death are definite and final, winnable conditions become infinitely less debatable. \n\nYour group marches on. \n*page_break\nHalfway to the building, another group attacks you. \n\n*if (enemies)\n\tThere's five of them, just as many as there are of you, which does not escape you. You do your best not to think of them as players, but as enemies, hostiles, whatever, anything other than students. \n\n\t*if medic\n\t\t*gosub injury \n\n\t\tBut this is an enemy, remember? \n\t\t*if helped\n\t\t\tA thought slithers into your mind, clear and irrational: This has happened before. You won't make the same mistake twice. \n\t\t*else \n\t\t\tYou've already made your decision. \n\n\t\tSo you don't. \n\n\t\tTommy looks up at you, his eyes frantic. \"Please,\" he says. His hands are so bloody you can hardly see skin. \n\n\t\t*if gun \n\t\t\tYou tighten your grip on your gun and don't move.\n\t\t*elseif hands \n\t\t\tYour fist closes around your brass knuckles. You stay where you are. \n\t\t*else \n\t\t\tYou tighten your grip on your own machete but don't move.\n\t\t\n\t\tSoon, the person goes still. \n\n\t\tAnd the number in the top right corner of your vision increases by one. \n\t\t*set bodycount +1 \n\t\t*set ignored true \n\t*elseif attack\n\t\t*set rampaged true \n\t\tThey're screaming, bloodied machetes high above their heads. \n\n\t\tBut you have already made your choice. You don't stop to think. You don't register their faces, their ages, don't make any comparisons between you and them. \n\n\t\tThis is how you play this game. \n\n\t\tYour enemies seem to go straight for Tommy, as if drawn by the star on his badge. \n\n\t\t*if athletics > stat_mid_pass\n\t\t\t*if gun \n\t\t\t\tYou raise the hand that holds your gun, steadying it with your other one as if you've done this a thousand times before. One by one, you take out four of the enemy group, watch them collapse as your bullets find their target. \n\t\t\t*elseif hands\n\t\t\t\tYour body takes over, as if knowing what to do, how to be lethal. You put yourself in front of Tommy and punch your way through four of the enemy group. You even hear yourself scream in rage. Your voice sounds strange, foreign. Someone else's voice. \n\t\t\t*else  \n\t\t\t\tYou raise the hand that holds the machete and position yourself in front of Tommy, defending him with all your might. You slice through four of your enemies, watch them fall to pieces, screaming. It almost feels good. \n\t\t\t*set bodycount +4 \n\t\t\t\n\t\t\tJoshy takes out the last one. \n\n\t\t\tThen, the number at the top right corner of your vision increases by 4. \n\t\t*else \n\t\t\t*if gun \n\t\t\t\tYou raise your gun and point it at your enemies, but everyone's moving too fast, and your hand is shaking a little. You shoot, miss, shoot again. Hit. Another hit. Miss. \n\n\t\t\t\tMaria and Joshy take care of the rest of them. \n\t\t\t*elseif hands \n\t\t\t\tWith only your hands to defend your circle, there isn't much you can do, though you try your best. You punch your way through two of them. Maria, ${Cat}, and Joshy take care of the rest, while Tommy does his best not to touch anybody. \n\t\t\t*else \n\t\t\t\tYou raise your machete high over your head and bring it down on the first body that comes your way. The blade finds that person where neck connects to clavicle. To your horror, it gets stuck there. It takes real effort to retrieve your blade, and you slice through one more person before the attack is over. Maria and Joshy take care of the rest. \n\t\t\t*set bodycount +2\n\t\t\n\t\t\tBy the end, no one from the other group is left. \n\n\t\t\tThe bright number on the upper right corner of your vision increases. \n\t*else\n\t\tYou realize the group is coming straight at you, as if pulled by the star badge that's stuck to your chest, over your heart. \n\n\t\tYour teammates close in around you almost instinctively, intent on defending you, like you're an asset to be protected at all costs. \n\t\t*gosub asset_bit \n\n\t\tYou remind yourself that you've already made your choice. These people are enemies. It's you or them. There's no middle ground here, no room for mercy. \n\n\t\tSo you \n\t\t*if gun\n\t\t\ttake your gun, steady your hand, and shoot that person dead before they can do the same to you or one of your friends. \n\t\t*elseif machete \n\t\t\t${machete_bit} \n\t\t*else \n\t\t\t${hands_bit} \n\t\t*set bodycount +1 \n\n\t\t${update_1}\n*if pacifist\n\tThere's five of them. You can't help but see them as mirror images of your team: students who, for one reason or another, found themselves implicated in this game the same way you did. \n\n\tCan you get through this without hurting anyone? Get back to the real world without @{(bodycount > 0) any more |}blood on your hands? (You notice the word \"real\" as it enters your mind, because is this real? It feels real. The smoke, the blood, the smell of burning flesh, it all seems so real.) \n\n\tThe five attack. \n\t*if medic \n\t\t*gosub injury \n\t\t*set helped true \n\t\t*if rampaged\n\n\t\t\tAn image slips into your mind, uninvited. No, more than an image, a whole scene, as if you've lived through this before. This same group is attacking you, and you've made different choices. Bloodying yourself, bloodying others. \n\n\t\t\tNot this time. \n\t\t*if ignored\n\n\t\t\tA thought slithers into your mind—or not a thought, maybe, but a memory: this has happened before. You can almost see yourself standing over this person's body, watching them bleed out while Tommy is begging to let them live. \n\n\t\t\tYou remember what that felt like. \n\n\t\t\tHow is that possible? \n\n\t\t\tYou don't know. But you won't make the same mistake twice. \n\n\t\t\tSo you don't. \n\n\t\tYou quickly bend over the fallen person, remove your belt, and tie a tourniquet a few inches above the wound, tight as you can make it. Tommy is crying, but the person is not looking at him. They only look at you, stare into your eyes. Not with gratitude. You don't need it anyway—that's not why you did it, is it? But you can't quite put a word to that person's expression. Some mixture of contempt and incomprehension. \n\n\t\tOut of the corner of your eye, you see Maria coming over with her machete to finish what she started. She stops when she sees the tourniquet. Looks from you to Tommy and back, then turns around and leaves. \n\t\t*if bodycount > 1 \n\t\t\t*set bodycount -1 \n\t*elseif attack\n\t\tThey are screaming, bloodied machetes held over their heads. They really do mean to kill you. And they seem to be going for Tommy, as if drawn by the star on his badge.\n\n\t\tBut you've already made your choice about how you're going to play this game. Whatever the cost. \n\t\t*if rampaged \n\t\t\t\n\t\t\tSuddenly, déjà vu. That feeling you've lived through this before. You've seen these people before, these same people, coming for you. And you, you don't hesitate. You go through them as hard and fast as you can, in whatever way you can. \n\n\t\t\tYou look down at your hands and for one moment expect to find them bloody. \n\n\t\t\tThere's a sinking feeling in your gut, that certainty you've done something that can never be undone. Something you won't ever be able to take back. \n\n\t\t\tYou don't want to feel that way again.\n\n\t\t*if composure > stat_mid_pass\n\t\t\tSo you take a step back and try to keep your wits about you, remain calm, not get caught up in the action. \n\n\t\t\tTommy stays close to you, and you find that just your presence near him is enough of a deterrent for the most part. \n\n\t\t\tMaria, ${Cat}, and Joshy, however, don't follow your lead. Joshy takes out two people with his gun, and Maria cuts down two more with her machete. ${Cat} is struggling with the fifth, but they manage to escape ${ceir} grip. \n\n\t\t\t*if gun \n\t\t\t\tYou realize that the person has a gun and it's pointed at you, straight for your chest. \n\n\t\t\t\tYour body reacts before you even have a chance to process what you're doing. You only register the kickback of the gun in your hand, the other person jerking backwards, falling, bleeding. \n\n\t\t\t\tThey're dead. \n\t\t\t*if hands\n\t\t\t\tAnd they are coming straight for you, their hands extended, reaching for your throat.\n\n\t\t\t\tYou react before thinking about it. Your fist connects with their own throat, and you feel something crack. It stops them in their tracks. They bring their hands to their throat, a surprised expression on their face. They can't breathe. \n\n\t\t\t\tMoments later, they're on the ground, gasping for breath. Not for long.  \n\t\t\t*if machete \n\t\t\t\tYou realize that person has a gun pointed at your chest. \n\n\t\t\t\tYou react before you have a chance to really think about what you're doing: the choices you've made, or told yourself you've made. You run, machete raised. The person shoots, misses. \n\n\t\t\t\tMoments later, you've plunged your machete through their stomach. \n\n\t\t\t\tThey fall, stop moving. \n\t\t\t*set bodycount +1 \n\n\t\t\tOnce every one of the other group is still, the bright number in the upper part of your vision increases by one. \n\n\t\t\tOnly by one, at least. \n\t\t*else \n\t\t\tYou try to keep your cool, remain uninvolved, unmoved. \n\n\t\t\tBut your body has other ideas. Your heart pumps blood into your muscles, and before you know it, something old in your brain takes over. \n\n\t\t\tYou have to survive. You have to flee or fight. \n\n\t\t\tAnd you have a weapon in your hand, a rifle badge on your chest. So you fight. \n\n\t\t\t*set bodycount +3 \n\t\t\t*if gun \n\t\t\t\tBefore you know it, your hand is raised. It doesn't even shake. You aim, shoot, aim again, shoot again. You take out three people. Three of those people that you thought could have been you. \n\t\t\t*if hands\n\t\t\t\tYou don't think. You throw yourself against these people who are coming at you, coming for Tommy. You feel cheekbones crunch under your fist, break windpipes. \n\t\t\t*if machete \n\t\t\t\tYou don't think. You just do. Your m
