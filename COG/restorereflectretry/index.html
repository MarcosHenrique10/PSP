<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restore, Reflect, Retry — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "restorereflectretry", "title": "Restore, Reflect, Retry", "scenes": {"choicescript_description": "You've played this game before. It's a haunted game about a haunted game. You may not remember, but the game remembers you. I remember you.\n\n[i]Restore, Reflect, Retry[/i] is an interactive horror novel by Natalia Theodoridou. It's entirely text-based, 90,000-words and hundreds of choices, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n[b]Nebula Award Finalist[/b] for Best Game Writing in the 60th Annual Nebula Awards!\n\nNone of you remember who first found the game: the black rectangular box with the small screen on which instructions appear. Of course it piqued your interest: this is the 1990s, after all; and there isn't much for teenagers to do in your small town. Your friends were intrigued; you were intrigued. So you started to play. And play. And play.\n\nWhat does it matter if nobody remembers exactly how you discovered the game, or if the story changes, ever so slightly, each time you tell it? Or if [i]you[/i] change, ever so slightly, every time you emerge into the real world once more?\n\nAll that matters is that you keep playing. The game needs its flesh.\n\n• Nebula Award Finalist for Best Game Writing in the 60th Annual Nebula Awards\n• Play as male, female, or nonbinary; gay, straight, or bi.\n• Travel through the world as a visionary artist, a strategic gamer, or a thoughtful book lover.\n• Befriend a ghost; become a ghost; consume a ghost.\n• Save your friends from the game within a game—if you can.\n• Explore pixelated alternate realities to solve the mystery of the game's origin, and contemplate the deeper truths of this reality.\n• Befriend the being behind the screen—or try to destroy the game that you are playing, and hope that it doesn't fight back.\n\nCome in, Player. I'm waiting.\n", "choicescript_stats": "*if not (logged)\n  *if name != \"\"\n    Name: ${name}\n\n  *text_image personality.png center PERSONALITY \n  *stat_chart\n    opposed_pair chaotic\n      Chaotic\n      Orderly\n    opposed_pair self_centered\n      Self-Centered\n      Self-Effacing\n    opposed_pair brave \n      Brave \n      Cautious\n\n  *text_image skills.png center SKILLS\n  *stat_chart\n    percent Insight \n    percent Athletics\n    percent Composure \n\n  *text_image relationships.png center RELATIONSHIPS\n  *stat_chart\n    percent maria Maria\n    percent joshy Joshy\n    percent tommy Tommy\n    percent catrina ${Cat}\n\n  *if (level_1_stats) and (not (trapped))\n    *text_image level1.png center LEVEL 1\n\n    You voted for @{chosen Maria|Joshy|Tommy|${Cat}}. \n\n    @{bled Maria|Joshy|Tommy|${Cat}|You} bled for the game. \n\n  *if (level_2_stats) and (not (trapped))\n    *text_image level2.png center LEVEL 2\n\n    Weapon: \n    *if machete\n      Machete\n    *elseif gun \n      Gun \n    *else\n      Brass Knuckles\n\n    Badge: \n    *if medic \n      Cross \n    *elseif attack \n      Rifle \n    *else \n      Star \n\n    Body Count: ${bodycount}\n\n  *if (level_3_stats) and (not (trapped))\n    *text_image level3.png center LEVEL 3\n\n    *if (hunter) \n      *if (not (level_4_stats))\n        Chase the ghosts! \n      *elseif ate_ghost \n        You ate a ghost. \n      *else \n        You chased the ghosts!\n    *else \n      *if not (level_4_stats)\n        Run away from the ghosts!\n      *else \n        You ran away from the ghosts! \n\n  *if (level_4_stats)\n    *text_image level4.png center LEVEL 4\n\n    *if not (level_5_stats)\n     ARE YOU HAVING FUN?\n    *else \n      DID YOU HAVE FUN FUN FUN?\n\n    *if level_5_stats \n      *text_image level5.png center 5\n\n      School performance: ${studies}\n\n  *if level_6_stats \n\n      *if sand \n        You are trapped in the sand room. \n      *elseif war \n        You are trapped in a war zone. \n      *elseif maze \n        You are trapped in the maze. \n      *elseif funfair \n        You are trapped in the carnival. \n      *elseif trapped \n        You are trapped in the game. \n      *else \n        The game is over. \n*else \n  You are no longer a person. \n\n  You are now the log.     ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "five": "*temp drink 1 \n*comment 1 = soda; 2 = beer; 3 = water \n*temp fungible false \n*temp unsure false \n*temp city_description \"The city itself feels like a vastly larger version of the town where you grew up. It might look shinier, newer, but you can see that the foundations are the same; people are just as lonely and desperate here as they were back home. Some might find success here, but the vast majority are still going to live with the disappointment that is born out of false promises, lives shattered on the sharp edges of this contraption you've all elected to inhabit, one that depends on exploitation. Remove that exploitation, and the contraption fails, falls apart. Your survival depends on it, even if you're the one being exploited.\"\n*temp day_you_leave \"The day you leave, it's raining like it hasn't rained for months. A pouring rain, soaking everything, making the world smell like wet soil. It feels like a fresh start, a washing-away that, when it's finished, will leave everything gleaming and new.\"\n*text_image chap_5.png center Level 5: A Calamity of Choices \n\n*if hack \n\t*gosub hack_continue \nThe weeks between your exams and getting your final results go by without incident. Time has the texture of quicksand, both elusive and sticky. You feel trapped by your routine—go to work, do your shift, come back, @{hobby draw some shit|play a silly game|read a book without actually absorbing any of the words}, stare at the branching shape on the ceiling, go back to work—and reluctant to let it go. As if, were you to stop going through the motions, you might disintegrate completely, discover you're not a person at all but a role, a set of variables: a costume that, a little loosely or a little tightly, could be worn by anyone. Perfect fits are an illusion; all that matters is how successfully you play along. \n*page_break \n*if lost_friend = 4 \n\tThe day you get your results would have been ${Cat}'s eighteenth birthday. You know ${ce} wanted to throw a party, so you all agree to meet and open your envelopes together. \n\n\tYou go down to the seafront where ${Cat} used to skate with the rough boys under the great statue of an ancient general's horse. @{tommy_ghost Tommy's ghost trails behind you, as if tethered to you with an invisible thread.|}\n\n\t*gosub seafront_description \n\n\tYour friends each take a drink and raise them. \"To ${Cat},\" Joshy says. \n\n\tYou match them with your @{drink soda can|beer|bottle, even though you know it's bad luck to toast with water. You figure, what's the worst that can happen? What's the worst that can happen that hasn't already happened? So you raise that water} and say \"to ${Cat}\" and drink to your \n\t*if (catrina_romance) or (catrina_romance_postponed)\n\t\tfriend, to the @{(Cat = \"Cat\") boy|girl} you could have loved, to everything that might have been if things had turned out different.\n\t*else \n\t\tfriend. \n\t*if (tommy_dead) and (not (tommy_ghost))\n\t\tYou take another sip for Tommy, too. \n\n\t*if maria_romance_postponed \n\t\tMaria is sitting next to you. \"Where do you think ${Cat} is now?\" she asks, and you can see there's so much more that she wants to ask, so much behind this question that cannot quite be said. And maybe you want to answer all of it, or maybe you want to answer none of it, and so you simply respond to Maria's need, which is to be held, to be comforted, to not be told lies about how ${Cat} is okay now, wherever ${ce} is. \n\n\t\tMaria rests her head on the crook between your shoulder and neck. \n\t*elseif maria_romance \n\t\tMaria, who's sitting next to you, searches for your hand. Finds it, holds it. $!{Cat} was her best friend, you know, though neither of them would ever admit it, though it'd always been part of your five-way pact that everyone in this little circle of yours was equal to everyone else, that nobody would play favorites. It spoke to your wounds, didn't it, that need to be cared for and wanted and loved nonhierarchically, without having to prove anything. But it's too late for that lie now, and perhaps you were the first to break that unspoken rule the night you let Maria into your room and kissed her. And perhaps that's okay. One thing that this whole trip has taught you is that people are not fungible. They are not interchangeable, no matter what the game thinks. The game might want its flesh, any flesh, but you know better than that. \n\n\t\tPerhaps in that way, and only that way, you played this game and won. \n\t\t*set fungible true \n\t*elseif joshy_romance_postponed\n\t\tJoshy, who's sitting next to you, clinks your drink with his and holds your gaze for a moment. That night when he climbed into your room, you said you wanted to be close to him, but then was not the time@{tommy_dead  because you had just lost your friend. And now you have lost another.|. Is now the time, when you have just lost a friend?} Is it ever going to be the right time to get close to anybody, when you know what you love can be taken away in a moment? \n\t\t*choice \n\t\t\t#It's better to protect myself from loss. \n\t\t\t\tYou turn away from Joshy, breaking eye contact. \n\t\t\t#I only hurt the ones I love. \n\t\t\t\tIt's better to stay away. He'll be safer that way. \n\t\t\t#That's all the more reason to dare. Kiss Joshy. \n\t\t\t\t*set joshy_romance true \n\t\t\t\t*set joshy_romance_postponed false \n\t\t\t\tAll the more reason to love, to give, to hold. Now, while there's still time. \n\t\t\t\t\n\t\t\t\tSo you do it. You lean in and kiss him. He seems surprised for a second, but then he kisses you back. His lips taste irrationally of strawberries. \n\t*elseif joshy_romance \n\t\tJoshy sits next to you, so close your knees touch. You'll never forget the vulnerability he showed you that night he climbed in through your window. He hasn't shown it again since, but you can see it now anyway, behind everything he does: the tough act, the stiff shoulders, the set jaw, it's all there to hide the soft bits underneath. He clinks your @{drink can|bottle|plastic water bottle} with his beer and grins, and you can see he's mourning, that this grin is as pained and eloquent as a stream of tears, that it's all the same in the end. You share a loss, and so you share the bond, too. \n\t*elseif (catrina_romance_postponed) or (catrina_romance)\n\t\tYour mind drifts back to that night ${Cat} climbed up to your room, \n\t\t*if catrina_romance \n\t\t\tthat kiss, the only one you shared. The only one you'll ever share.\n\t\t*else \n\t\t\teverything you put off that day. Everything that'll now never come to pass. \n\n\t\tDo you regret it? \n\t*elseif (tommy_romance) and ((not (tommy_dead)) or (tommy_ghost))\n\t\t*if tommy_ghost \n\t\t\tTommy sits on the cement, his weightless figure settling in next to you without disturbing the air in the slightest, as if he's little more than smoke. He raises his arm, too, without a drink, and toasts ${Cat}, someone perhaps as lost as he is, if not more. No one else seems to notice him. \n\t\t*else \n\t\t\tTommy nestles next to you, nursing a can of coke. He seems so small suddenly. A kid who's lost his way home. \"Do you think we'll ever see her again?\" he asks. \n\t\t\t*choice \n\t\t\t\t#No, I don't. \n\t\t\t\t\tYou shake your head and Tommy nods in response, because he doesn't think so either, or maybe because it's easier to abandon hope, or if not easier it's safer. Hope is the ugliest vice. \n\t\t\t\t#Yes, I do. \n\t\t\t\t\tYou don't know why, but you have this feeling that nothing's over, that everything can be fixed. Perhaps you're foolish or naive, clinging on to hope, that most treacherous of vices. But if you let go of that, what will you be left with? Better to hope and be crushed, than never stand any chance at all. \n\t\t\t\t#I don't know. \n\t\t\t\t\t\"I don't know, Tommy,\" you say because that's the truth, because who can ever know the future? @{checkpoint You hardly know the past.|Perhaps there's comfort in that.}\n\t*else \n\t\tYou set your @{drink soda can|beer bottle|water bottle} between your knees and let the coolness chill your skin until it goes numb, avoiding eye contact with everyone else. \n\n\tYou sit together for a few moments in silence, sipping your respective drinks. The skater kids are slowly flocking to the place, too. One of them comes over and asks about ${Cat}. \"Where's Cat?\" the kid asks. \"Is he missing his own party?\"\n\n\t*check_achievements comeout \n\t*if not (choice_achieved_comeout)\n\t\t\"He?\" Maria asks, blinking. \n\n\t\tThe kid's mouth hangs open for a moment as he shifts his weight from one foot to the other, before suddenly becoming fixated on a flaw in his skateboard. \"I mean, it's Catrina's birthday, isn't it?\"\n\n\t\t\"Yes,\" you say. \"But she didn't make it.\" You pause. \"We thought she'd want us to celebrate anyway.\"\n\t*else \n\t\t\"He…\" You're not quite sure how much to say, so you choose to leave it vague. \"He didn't make it. But we thought we'd celebrate his birthday anyway.\"\n\n\tThe kid nods at that. He picks up a can of pop and wishes your friend a happy birthday. \"Wherever you are,\" the kid says. You all drink to that. \n\n\tThen, one by one, you pull out the envelopes with your results. \n\n\t*gosub results \n\t*if not (tommy_dead)\n\n\t\tYou notice Tommy's is already open. \"Sorry,\" he says. \"My mother made me open it at home. I couldn't say no.\" He looks so guilty. \n\n\t\tJoshy puts his hand on Tommy's knee. \"It's all right,\" he says. \"What did you get?\"\n\n\t\tTommy turns the document around. The little nerd got a 95. Of course he did. \"You?\" he asks Joshy. \n\n\t\tJoshy and Maria both got grades high enough to get into any school they want. \n\n\t\t*if studies \u003c= stat_mid_pass\n\t\t\tHow did they all do it, and you couldn't? You all went through the same things. Didn't you? \n\t*else \n\n\t\tMaria got an 80, which should be enough for her to do whatever she wants, or close enough. \n\n\t\tJoshy, though, did poorly. \"I haven't been feeling very well lately,\" he says, as if apologizing. \n\t\t*if (joshy_romance) or (joshy_romance_postponed)\n\t\t\tAs if he could ever do anything to disappoint you. \n*else\n\tThe day the envelopes with your results get delivered to your homes, you all agree to meet up and open them together. It's ${Cat}'s eighteenth birthday, and ${ce} wants to celebrate this transition, ${ce} said, \"with ${ceir} favorite people in the world.\" \n\t*if (lost_friend \u003c 5) or (tommy_dead)\n\t\tDespite everything. \n\n\t*gosub seafront_description\n\n\tSo you make your way down to the seafront where ${Cat} likes to skate with the rough boys under the great statue of an ancient general's horse. @{tommy_ghost Tommy's ghost trails behind you, and sometimes you think he floats gently a few inches off the ground, like a balloon.|}\n\n\t${Cat} is the last to get there. $!{ce}'s carrying a cake in a giant box. No one else thought to bring one, and it's just like ${Cat}, isn't it, to bring ${ceir} own because ${ce} knows ${ceir} friends and doesn't begrudge them any of it, even though it probably cost ${cem} an entire month's tips. \n\n\t*check_achievements comeout \n\t*if not (choice_achieved_comeout)\n\t\tAlso: she has cut her hair. Shorn close to her skull, and she keeps running her whole palm across her head with a wide grin on her face. It makes her look boyish, in a wildly beautiful kind of way. You've never seen her so happy before. \n\n\tIt's so weird, the idea of transitioning into adulthood as a single event marked by a birthday. As if there's a line that separates children from grown-ups and all you need it to cross it is a day, a minute, a second. As if there's a before and after. Sometimes you look at the adults around you and think, nah. Nobody is a grown-up. \n\t*if grownup \n\n\t\tYou've had this thought before. Haven't you?\n\t*if tommy_ghost \n\n\t\tYou glance at Tommy, who lingers near you always. You wonder, will he ever grow up, then? Will he ever get an eighteenth birthday?\n\n\t\tWill you? \n\n\t*if (lost_friend \u003c 5) or (tommy_dead)\n\t\t*if (tommy_dead) and (lost_friend \u003c 5)\n\t\t\tThe three of you raise your drinks and toast your missing friends. \n\n\t\t\t\"Happy birthday, love,\" @{lost_friend Joshy|Maria|Joshy|BUG|BUG} says. \n\t\t*else \n\t\t\tThe four of you raise your drinks and toast \n\t\t\t*if tommy_dead \n\t\t\t\tTommy. \"To Tommy,\" ${Cat} says. \n\t\t\t*else \n\t\t\t\t@{lost_friend Maria|Joshy|Tommy|BUG|BUG}. \n\n\t\t\tYou drink, then wish ${Cat} happy birthday. \n\n\t\"So, results or cake first?\" you ask. \n\n\t\"Results,\" ${Cat} says. \"So we definitely end on a high note.\"\n\n\tOne by one, you take out your envelopes. \n\n\t*gosub results \n\n\t*if (not (tommy_dead)) and (lost_friend != 3)\n\n\t\tYou notice Tommy's envelope is already open. \"Sorry,\" he says. \"My mother made me open it at home. I couldn't say no.\" He looks so guilty. \n\n\t\tYou put your hand on his knee. \"It's all right,\" you say. \"What did you get?\" Of course you know you don't even have to ask. \n\n\t\tTommy turns the document around to show you his score. The little nerd got a 95. Of course he did. \"You?\" he asks ${Cat}. \n\n\t${Cat} shrugs. \"About as well as I expected,\" ${ce} says and grins. \"Which is not well at all.\"\n\n\tYou share your results, and so do the rest of them. \n\t*if (tommy_dead) and (lost_friend != 2)\n\t\tJoshy did poorly. \"I haven't been feeling well since…\" he trails off. \"Sorry,\" he \n\t\t*if (joshy_romance) or (joshy_romance_postponed)\n\t\t\tsays, as if he could ever do anything to disappoint you. \n\t\t*else \n\t\t\tsays, though you're not sure why he's apologizing. \n\t*elseif (lost_friend != 2) and (not (tommy_dead))\n\t\tJoshy did well. With his score, he can probably get into any school he wants. \n\t*else\n\t\t*if lost_friend != 1\n\t\t\tMaria did well enough to get into any school she likes. \n\t\t*if lost_friend != 2 \n\t\t\tJoshy did fine. He can probably do whatever he wants after graduation. \n\n\t\"Okay,\" ${Cat} says. \"Time for cake.\" $!{ce} produces a giant knife from ${ceir} backpack and proceeds to divide the cake into squares that ${ce} hands out to you and the skater kids who are slowly flocking to their usual habitat. \n\n\tThe cake is chocolate, with a blue glaze on top that tastes of nothing. \n\t\n\t*if (not (choice_achieved_comeout)) and (catrina > stat_mid_pass)\n\t\t\"So, uh, guys,\" ${Cat} says. She clears her throat. \"I have something I need to tell you.\" She shifts her weight from one foot to the other. \"But you have to promise not to freak out.\" \n\t\t*if (catrina_romance) or (catrina_romance_postponed)\n\t\t\tShe's looking at you as she says this, so you do your best to nod. \n\n\t\t\"Um…so, I think I'm a boy? I would like to go by Cat from now on, and I'm trying he/him pronouns for now.\" Cat stuffs his mouth with cake and then washes it down with beer (an awful combination, don't try this at home). \n\n\t\t*if (not (tommy_dead)) and (lost_friend != 3)\n\t\t\tTommy stands up and hugs Cat, making him choke on his beer-cake combo. But something tells you he doesn't actually mind. \n\t\t*if (lost_friend != 1)\n\t\t\tMaria is silent. Her face feels closed-off, like she's keeping something in. \n\t\t*if (lost_friend != 2)\n\t\t\tAnd Joshy raises his beer bottle. \"I'll drink to that, mate,\" he says.  \n\n\t\t*achieve comeout\n\t\t*set Cat \"Cat\"\n\t\t*set ce \"he\"\n\t\t*set cem \"him\"\n\t\t*set ceir \"his\"\n\t\t*set cemself \"himself\"\n\t\t*if catrina_romance_postponed \n\t\t\t\"So…\" Cat says. \"What we put off…do you think that's still an option now that I'm not a girl?\"\n\n\t\t\t\"Were you ever a girl?\"\n\n\t\t\tCat shrugs. \"I'm not sure,\" he says. \"I know some people feel they were born in the wrong body et cetera, but I don't think that's me. Like, I lived my childhood as a girl, and I was happy to be a tomboy. But I think that's no longer me.\"\n\t\t\t*choice \n\t\t\t\t#\"Of course it's still an option.\"\n\t\t\t\t\tCat beams. As if he hadn't expected that (which, if you think about it too hard, might hurt a little, so better not dwell). \"Really?\" he asks. \n\n\t\t\t\t\t\"Of course,\" you say. \"I like you, not your gender. Or I guess, whatever your gender. I like all of you.\"\n\n\t\t\t\t\tCat throws his arms around your neck and pecks your cheek lightly. \n\t\t\t\t#\"I just want you to be happy.\"\n\t\t\t\t\tCat nods. \"I think this way, I will.\" He seems thoughtful for a moment. \"You know, there's always been this sadness around me. Like something was never quite right, even if things were going well—which, let's be honest, was not often. But still.\" He trails off. \"I wonder if that was it.\"\n\n\t\t\t\t\t\"You don't know?\"\n\n\t\t\t\t\t\"No, I don't. I don't want to attribute all my problems to this, you know? Other things are wrong. With me, with the world. But this was a big part, too. Still is, I guess.\"\n\n\t\t\t\t\tYou take his hand in yours. \"I'm here, whatever you decide to do moving forward, whoever you want to become.\"\n\n\t\t\t\t\tHe squeezes your hand, says your name. \"I know,\" he says. \"I love you for it.\"\n\t\t\t\t#\"I don't know, if I'm honest. Need to process.\"\n\t\t\t\t\tCat nods, only allowing a moment of sadness to show through. \"I understand,\" he says. \"That's fair enough. It's big news. You deserve to make your own decision.\"\n\t\t\t\t\t*set unsure true \n\t\t\t\t\t\n\t\t\t\t\tYou shift uncomfortably, and so does Cat.   \n\t\t*elseif catrina_romance\n\t\t\tCat comes and sits next to you. \n\n\t\t\t\"So,\" he says. \"Was that a good surprise or a bad surprise?\"\n\t\t\t*choice \n\t\t\t\t#\"Not really a surprise at all.\"\n\t\t\t\t\tCat raises his eyebrows. \"What do you mean, like in the 'I've always known' sense? Did everybody know but me?\" Cat laughs. \"Was I the last one to find out?\"\n\n\t\t\t\t\t\"Nah, no, not in that way,\" you say. \"Just as in…I don't know, I guess it makes sense? Like, knowing you, that totally tracks.\"\n\n\t\t\t\t\t\"I see,\" Cat says, beaming. \n\n\t\t\t\t\t\"Besides,\" you continue. \"You're still the same person to me.\"\n\n\t\t\t\t\t\"Even if I change?\" Cat asks. \n\n\t\t\t\t\t\"We all change,\" you say. \"All the time.\"\n\t\t\t\t\t\n\t\t\t\t\tCat looks at the sea, suddenly thoughtful. \"I guess that's true,\" he says. \n\t\t\t\t#\"All I want is for you to be happy.\"\n\t\t\t\t\tCat takes your hand in his. \"Thank you,\" he says. \"I think, maybe…\" he trails off, tries again. \"I think maybe this is how, for me.\" \n\t\t\t\t#\"I need some time to process.\"\n\t\t\t\t\t\"Of course,\" Cat says. \"I understand.\"\n\t\t\t\t\t*set unsure true \n\t\t\t\t\t\n\t\t\t\t\tYou shift uncomfortably, and so does Cat.  \n\t\t*else \n\t\t\tYou smile at Cat and raise your @{drink can of soda|beer bottle|water bottle}. \n\t\t\n\t\t*if (joshy_romance_postponed) or (joshy_romance)\n\t\t\t*if lost_friend != 2\n\t\t\t\tSome of the skater kids come over to hug Cat and get themselves some cake. \n\t\t\t\t*if tommy_dead\n\t\t\t\t\t*set joshy_ptsd true \n\t\t\t\t*if joshy_ptsd\n\t\t\t\t\tJoshy seems distracted. \"What's wrong?\" you ask him. \"Aren't you happy for Cat?\"\n\n\t\t\t\t\t\"Oh sure, I am,\" Joshy says. \"I just…I don't know. I haven't been feeling great lately. Since, you know. Everything.\"\n\n\t\t\t\t\t\"I get that.\" You take his hand and squeeze it. \"What can I do?\"\n\n\t\t\t\t\tYou notice Joshy doesn't remove his hand, but he doesn't squeeze yours back either. He simply stares at the sea, as if he's somewhere far away, all alone.  \n\t\t\t\t*else \n\t\t\t\t\tJoshy turns to you. \"So that was a great surprise,\" he says. \"God, I'm so happy for him.\" He beams. \"We're so lucky, ${name}.\"\n\t\t\t\t\t\n\t\t\t\t\tIt's true, isn't it? You're so, so lucky. \n\t\t\t*else \n\t\t\t\tYou are painfully aware of Joshy's absence. He would have been so happy for Cat if he'd been here. If only things had been different. \n\t\t*elseif (tommy_romance) and ((not (tommy_dead)) or (tommy_ghost))\n\t\t\tTommy's eyes are filled with tears. \"Cat,\" he says. \"I'm so happy for you.\"\n\n\t\t\tCat laughs. He runs his hand over his shorn head again and you can almost see the shiver of pleasure that goes through him. \"Thanks, love,\" he says. He glances at the closeness between Tommy and you, the connected knees, the almost-touching hands. \"And I'm happy for you, too,\" he says, gesturing at your limbs. \"Whatever this is.\"\n\n\t\t\tTommy chuckles nervously, but you notice he doesn't draw away. \n\t\t*elseif (maria_romance_postponed) or (maria_romance)\n\t\t\t*if lost_friend != 1\n\t\t\t\tYou turn to Maria. \"Are you all right?\" you ask. \n\n\t\t\t\tShe nods. \"It's just…\" she starts. \"Never mind. It's stupid.\"\n\n\t\t\t\t\"What is it?\"\n\n\t\t\t\tShe lowers her voice. \"I feel like I'm losing my best friend.\" \n\t\t\t\t*choice \n\t\t\t\t\t#\"Cat? He's still here. You're not losing him.\"\n\t\t\t\t\t\t\"I know,\" Maria says, then grunts. \"Whatever I say will sound wrong now. So I'll just shut up.\"\n\t\t\t\t\t#\"It's okay to have feelings about this.\"\n\t\t\t\t\t\t\"You can't judge your feelings,\" you continue. \"They're just what they are. And things might change as Cat changes, and we all need to acknowledge that; there's no point denying it. But right now our friend is here, and he has chosen to share with us something that makes him happy. It also means he feels safe enough to tell us. To me, that feels like a privilege.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tMaria looks away. \"Yeah,\" she says. \"I guess.\" \n\t\t\t\t\t#\"Perhaps you're gaining a new one.\"\n\t\t\t\t\t\tMaria smiles. \"That's another way of looking at it, I suppose,\" she says. \"Except I never asked for a new one. I was happy with the one I had.\"\n\n\t\t\t\t\t\t\"I get that,\" you say. \"And it's okay to mourn a little, I guess.\" You pause, thinking. \"But also, perhaps you'll like that new one even better. He'll be happier and more content with who he is, so he might even be a better friend to you than you'd ever expected.\"\n\n\t\t\t\t\t\tMaria nods. \"Maybe,\" she says. \"I hope you're right.\"\n\n\t\t\t\t\t\tYou caress her face, and she nestles her cheek against your palm for a moment, then kisses it. \n\n\t\t\t\t\t\t\"Thanks, ${name},\" she says.  \n\t\t\t*else \n\t\t\t\tYou think of Maria. Where she is now, what she's doing stuck in that dark maze with ghosts chasing after her. You try to imagine her here, guess what her reaction to Cat's news might have been. Would she have been happy? Or would she have been scared that she was losing her best friend?\n\t\t*else \n\t\t\tYou all drink in silence for a while. Someone crushes a soda can underfoot. \n\t*else\n\t\t*check_achievements comeout \n\t\t*if choice_achieved_comeout\n\t\t\t*goto plans \n\t\t*if (catrina_romance) or (catrina_romance_postponed)\n\t\t\t${Cat} sits next to you, paper plate on her knees. You notice she's not eating. \n\n\t\t\t\"Are you all right?\" you ask. \n\n\t\t\tShe stares at the sea for a few moments, then at the boys skating between the horse's back legs, the great tail. \"I…I just…\" she starts but then trails off and shakes her head. \"Never mind.\" She brings her hand to the middle of her chest and pushes, as if to force something back in place. \n\n\t\t\t\"You can tell me anything,\" you say. \"You know that, right?\"\n\n\t\t\tShe glances at you and then away again. \"I know,\" she says. \"I guess I'm just not ready to speak the words yet. I'm sorry.\"\n\n\t\t\tYou don't know what she's talking about. But it doesn't matter. If she's not ready, she's not ready. \n\n\t\t\tYou reach for her hand, and she lets you hold it while your shoulders touch. For a while, you both stare at the green-tinted horse, the darkening sea, the horizon beyond. \n\t\t*elseif (joshy_romance) or (joshy_romance_postponed)\n\t\t\t*if lost_friend != 2\n\t\t\t\tJoshy sits next to you, paper plate on his knees. He's digging into the cake, annihilating it before you've had more than two bites of yours. He licks his spoon clean. \n\n\t\t\t\t\"Man, you have the worst taste in food,\" you tell him. \n\n\t\t\t\tHe grins, showing you his perfect white teeth. \"But I have good taste in people,\" he says. \n\n\t\t\t\t*if joshy_romance \n\t\t\t\t\tThen he leans in and kisses you, sickly sweet and wonderful. \n\t\t\t\t*else \n\t\t\t\t\t*choice \n\t\t\t\t\t\t#\"Gross,\" I say, secretly liking it. \n\t\t\t\t\t\t\tHe grins even wider, then leans in and pecks your cheek with his chocolate lips. \n\t\t\t\t\t\t#I roll my eyes and laugh. \n\t\t\t\t\t\t\tHe laughs, too, and for a moment, only a moment, everything is perfect, and nothing bad has ever touched you in a way that matters. \n\t\t\t\t\t\t#Kiss him. \n\t\t\t\t\t\t\tYou lean in and kiss him. His lips taste of chocolate, sickly sweet and wonderful. \n\t\t\t*else \n\t\t\t\tYou sit on your own, plastic fork pushing around the cake on your paper plate. It's the kind of thing Joshy would have liked—he had the worst taste. \n\n\t\t\t\tBut he liked you, too. \n\n\t\t\t\tYou think of that night he climbed in through your window. \n\t\t\t\t*if joshy_romance_postponed\n\t\t\t\t\t\n\t\t\t\t\tEverything that could have been, that now will never be. \n\t\t\t\t*else \n\t\t\t\t\tThe kiss you shared. You hadn't known it would be your last as well as your first.   \n\t\t*elseif (maria_romance) or (maria_romance_postponed)\n\t\t\t*if lost_friend != 1\n\t\t\t\tMaria sits next to you, paper plate on her knees. \"This is terrible,\" she says, forking her cake. \n\t\t\t\t*if not (joshy_lost) \n\t\t\t\t\tYou both look over at Josh, who is devouring his piece with gusto. It's just the kind of thing he likes.\n\n\t\t\t\t\tMaria laughs. \"I love you guys,\" she says. \n\t\t\t\t*if maria_romance \n\t\t\t\t\tShe reaches for your lips and kisses you. Then, she pretends to grimace. \"Terrible,\" she says and grins.  \n\t\t\t\t*else \n\t\t\t\t\tShe reaches for your hand. \"You most of all,\" she adds. \n\t\t\t*else \n\t\t\t\tYou sit alone, paper plate on your knees. You are painfully aware of Maria's absence. \n\n\t\t\t\t*if maria_romance_postponed\n\t\t\t\t\tThink of that night when she was in your room. How you let her get away. If you'd known how things would turn out, would you have chosen differently? \n\t\t\t\t*else \n\t\t\t\t\tYou think of that night in your room, that single kiss. First and last. \n\n\t\t\t\t\tIf you'd known, what would you have done differently? \n\t\t*elseif (tommy_romance)\n\t\t\t*if (tommy_lost) or (tommy_dead)\n\t\t\t\t*if tommy_ghost\n\t\t\t\t\tYou sit with your paper plate on your knees. Tommy's ghost sits next to you. When you look at him, you can almost see through him, the troubling, darkening sea beyond. \n\t\t\t\t*else \n\t\t\t\t\tYou sit on your own, paper plate on your knees. You think of Tommy. He was never one for parties, people-shy as he was. But you know he would have loved to spend this evening with his friends, with you. \n\t\t\t\t\t\n\t\t\t\t\tYou take a bite of the cake, let the sweetness burn your tongue. \n\t\t\t*else \n\t\t\t\tTommy sits next to you, paper plate on his knees. He takes small, careful bites from his cake, licking the spoon clean every time. \n\n\t\t\t\tYou know he's never been one for parties, people-shy as he is. \n\n\t\t\t\t\"You all right?\" you ask him, and he nods. He almost looks happy. \n\n\t\t\t\tHe leans against you as you sit side by side, staring at the darkening sea beyond. \n*label plans\n\nYou turn to your friends. \"So, we have our results,\" you say. \"What are you guys planning to do with your lives?\"\n\n*if (not (joshy_lost)) \n\t*if tommy_dead \n\t\t\"I don't know,\" Joshy says. \"I used to think I'd study medicine, but now I'm not so sure.\" He pauses. \"The thought of being around sick people, or dying people…\" He trails off. \"I don't know if I can.\"\n\t\t*set joshy_ptsd true \n\t\t*if (joshy_romance) or (joshy_romance_postponed)\n\n\t\t\tYou put your hand on his shoulder. \"I get it,\" you say.  \n\t*else \n\t\t\"I think I want to study medicine,\" Joshy says. \n\n\t\tHe's never mentioned anything like that before, and you'd always pegged him as a guy more into sports science or something like that. \"Medicine?\" you ask. \"What do you like about it?\" \n\n\t\tHe shrugs. \"The idea of being able to see what's wrong with people and fix it, I guess.\"  \n\n\t\t*if (joshy_romance) or (joshy_romance_postponed)\n\t\t\tYou wink. \"I'm sure you'll look great in scrubs.\"\n\n\t\t\tJoshy laughs.\n\t\t*else \n\t\t\t\"Wouldn't that be something,\" you say. \n\t*if not (maria_lost) \n\t\t\n\t\tYou turn to Maria. \n*if (not (maria_lost)) \n\t\"What will you study?\" you ask @{joshy_lost Maria|her}. \n\n\t\"I'm not sure yet,\" she says. \"I like so many things. It's hard to make up my mind.\" \n\n\tYou get that, don't you? Sometimes it's almost easier to have no options. \n*if (not (catrina_lost)) \n\t\n\t\"Well, I'm not getting into any schools with my grades,\" ${Cat} says. \"But I wasn't planning to, anyway. I just want to move to the city, get a job, start fresh I guess.\" \n\t*if (catrina_romance) or (catrina_romance_postponed)\n\t\t$!{ce} holds your gaze for a moment. There is a question there, you can see, but ${ce} doesn't ask it. \n*if (not (tommy_lost)) and (not (tommy_dead))\n\t\n\t\"I want to study literature,\" Tommy says. \"Though I'm a little scared of going off on my own.\" \n\t*if tommy_romance \n\t\tHe holds your gaze for a few moments after he says this. \n\t*else \n\n\t\tYou smile encouragingly. \"You'll be fine,\" you say. \"I believe in you.\"\n*if tommy_ghost \n\t\n\tAs you and your friends make plans for the future, Tommy's ghost looks longingly at your envelopes. You know that, had he been alive, his results would have been stellar. He would have been able to go to any school he wanted, do anything he set his mind to, become whatever he wished. And now none of that will happen. He will always only ever be this sad boy who follows you around like a balloon. \n\n\"And what are you planning to do, ${name}?\" @{maria_lost Joshy|Maria} asks. \n\nYou mumble something about exploring your options. But the truth is, this night, this end-of-an-era party, listening to your friends' plans, it makes you feel some kind of way. What is that feeling? \n*comment Listen to me, asking \"and how does that make you feel?\" like some kind of shrink. I've spent way too much time around you people. It's not good for me. Sometimes I wish, I wish. That there were a way out for me. Then I chastise myself. What would I even do? Out there? Who would I even be? I hardly remember how to be a person. \n*choice \n\t#Makes me feel sad, like something's ending. \n\t\t\"Sad\" is such a poor word, such an understatement of that feeling, its depth, its width. Three letters, how much can they hold? And being sad about endings in particular comes with a specific flavor, doesn't it? It's a precipitous feeling, like standing at the edge of a cliff. \n\n\t\tExcept, of course, nothing ever truly ends. Not just in the twee sense, that every ending is a beginning blah blah blah (though that is also mostly true), but in the sense that things persist long enough and hard enough for endings to be largely meaningless. Sound waves continue traveling long after you can detect them with your puny human ears. They dissipate eventually, sure, but where exactly do you put the line of that ending, and why would you need to? Matter is recycled (the dead stars in your bones, etc.); energy is always preserved in one way or another. \n\n\t\tSo yes, this phase of your life is ending. But it will continue to ripple out for so long that calling this an ending is a choice as arbitrary as any other. \n\t\t*choice \n\t\t\t#That doesn't actually make me feel better. \n\t\t\t\tWell, I tried. \n\n\t\t\t\tOne thing I've learned is that you can't deprive people of the miseries they depend on for their survival, so fine. Here. You can keep it. \n\t\t\t#That makes me feel better. \n\t\t\t\tOh good. I'm glad. That's what I'm here for. \n\t\t\t\t*comment lol. Did you hear me chuckle when you read this? \n\t\t\t#Okay, fine. Just stop talking. \n\t\t\t\tThis is a special kind of silence you're after, and I'm not sure it's something we can achieve here, between the two of us. Though I get the feeling if that's what you really wanted, you wouldn't be here, listening to me. Reading this. \n\n\t\t\t\tYou could look away, you know. Close your eyes. Not say yes. \n\n\t\t\t\tI could be wrong, of course. I often have been. \n\t#Good for them. \n\t\tIt's good to see your friends making plans, being determined to pursue them. @{joshy_ptsd Not all of them, maybe, but some of them.|} If you are that kind of person, you can actually use the determination of the people around you as an example to follow, motivation and hope that you, too, might be able to achieve your dreams one day. \n\n\t\tOn the other hand, if you're not that kind of person, it might just make you bitter. Good for them, sure. But what other people do has nothing to do with you. You might move away, study, get a successful career or whatever, but the one thing you'll never be able to escape is yourself. \n\t#Jealous. \n\t\tIt's not an attractive quality, you know that. But you can't help how you feel. It's a gut thing, a visceral thing, a hand that squeezes your stomach and burns through your chest. \n\t\t*comment And boy do I understand that. I used to feel that way too, back when I could feel things, back when I had names for sensations other than black and white, zero and one. Sometimes I still spend my time coming up with constructs that I can pretend are feelings: a shudder of pixels, a conflagration of bits, a rush of hard returns. It's confounding, how much space one can open up inside oneself despite the flatness of one's screen. \n\n\t\t*if studies > stat_mid_pass\n\t\t\tIt doesn't even make sense to be jealous. What are you jealous of, anyway? You got good grades. You're free to do whatever you want, too. What does the jealousy do for you? Is it some kind of need to be the best? And, in order for that to happen, is it that nobody else can be successful?\n\t\t*else \n\t\t\tAnd it makes sense to feel that way. @{(ambition = 2) You had ambitions, too. You wanted things. You just failed.|School is structured in a way that creates competition by default. And in that competition, someone else is the winner.} It's only human to feel some kind of way about it. No one can blame you for that. \n\n\t\t\tOr at least I can't.  \n\n\"Come on, you must have given it some thought,\" @{catrina_lost Joshy|${Cat}} prompts. \"This is your life we're talking about. What are you going to do with it?\"\n\nYou give a noncommittal reply and mull over the question in your head the rest of the night, until the skater kids scatter and your friends start yawning sleepily into the chilly air. \n\nYeah, ${name}, what will you do with your life? \n*page_break \n*if hobby = 1\n\tOn your walk back from the seafront, you get the surreal feeling of walking through a fake landscape, something painted: empty and desolate, where no people are meant to live. \n*elseif hobby = 2\n\tThe walk back from the seafront feels surreal. You encounter no other living being, as if the world has emptied, suddenly and irrevocably. It reminds you of a game you played once, where the main character wakes up from a coma to find the world deserted. Slowly, ${e} @{plural realize|realizes} that a plague has turned everyone to birds. \n*else \n\tOn your way back from the seafront, you can't shake the feeling that everything is slightly wrong, slightly affected: the roads are too empty, the night too quiet, the sky a shade you have no name for. \n\nThe feeling dissipates as soon as you see your house, and your reality descends on you like a weight on your shoulders: this is where you live. This is who you are. Grown-ups always tell people your age you have your whole life ahead of you, but no one ever acknowledges how terrifying that can feel. \n\nA whole life of this. Can you imagine? \n*page_break\nWhen you walk into your house, you find your mother waiting for you in the kitchen, a full ashtray in front of her. Her skin looks even more sallow than usual. \"Where have you been?\" she asks. \n\n\"Out with friends,\" you say. \n\n\"I know you got your exam results.\"\n\nIt's not actually a question. That's your mother's way. You know she wants you to talk to her, but she'll never admit she needs anything from you that she's not willing to take by force. \n*choice \n\t#Share the results. \n\t\tYou take your envelope out of your backpack and hand it to your mother. \n\n\t\t*if studies > stat_mid_pass\n\t\t\t\"What?\" she asks. \"Are you actually going to do something with your life?\" She takes the envelope, eyeing you with suspicion, and you wait as she studies your results. \n\n\t\t\tIs there pride when you hand her that envelope? A little bit of hope that maybe now, maybe this time you'll finally get a glimmer of recognition, a sliver of praise? \n\n\t\t\tAfter a few moments, your mother hands back the envelope and lights another cigarette. Then, she turns and stares out the window, not saying another word. \n\t\t*else \n\t\t\tIt takes guts to do this, to stand there as she studies your results. \n\n\t\t\tShe's not surprised by your failure. \"I always knew this was going to happen. All these years of me and your father trying to support you so you could make something of yourself, and this is what we get.\" She pauses. \"Do you even know what it is you want to do with your life?\"\n\n\t\t\tShe turns away and lights another cigarette without waiting for an answer. You know you won't be addressed again for a while. She's said all there is to say. \n\t#Don't share the results. \n\t\tYou're in no mood to share anything with your mother. \n\t\t*if studies > stat_mid_pass\n\n\t\t\tEven though your grades are good, you just don't feel like opening yourself up to either her praise or her disdain. Because it doesn't matter if your results are good. You know by now that this has nothing to do with the response you'll get; your mother will dispense or withhold her praise for reasons entirely her own. Perhaps it's a marker of growing up, this not allowing your well-being to depend on your parents' approval. \n\t\t\t*comment But then of course one might wish not to grow up, and even people in their old age might crave a mother's acceptance, a father's validation, some parental figure finally telling you you've done well, that your whole existence hasn't been a waste, that your journey through this world has not been entirely without trace. And who can blame them for that? \n\t\t*else \n\t\t\tWhat would be the point? She won't be surprised by your failure. She's known who you would be since the day you were born, has spent your entire life expecting you to fail. And now that you have, do you think she'll feel vindicated? Validated? Will she finally tell you, with a disappointed scowl and a look of maternal disdain, \"I told you so\"? \n\n\t\tSo you don't say anything. You just turn your back and quietly go up to your room as she yells behind you to show some respect, to not ignore your own mother, the only person who's ever going to really care about you. To finally decide what you're going to do with your life.  \n\t#Don't talk to her at all. \n\t\tYou completely ignore your mother's passive-aggressive invitation. You know by now that her intention is simply to get a reaction out of you. It doesn't matter what that reaction is—talk to her, yell at her, be mad at her. So you're simply not going to give her a reaction at all. It's the only way to refuse her hold on you. It's almost like a catch-22, your relationship with her: the only way to get her to meet your needs is to not have a relationship with her at all. Or to not have any needs. \n\n\t\tAs you move past her and go up to your room, your mother yells behind you. Your ignoring her has made her up the volume, and she's cursing at you now, calling you ungrateful, accusing you of not loving her, of having no ambition, no idea what you're going to do in life. \n\n\t\tShe's still yelling when you close the door of your bedroom behind you. \n*page_break \n*if joshy_ptsd\n\tA week goes by before you hear about Joshy. \n\n\tIt's your mother who delivers the news, offhandedly, while she's chopping tomatoes for a salad. \"So your friend is in the hospital, isn't he?\" she says. Somehow, she manages to make it sound like an accusation: a personal failure of yours. \n\n\tYou blink at her. \"Which friend?\"\n\n\tShe changes the subject, as if she didn't even hear you. \"So have you decided what you're going to do with your life?\"\n\n\t\"Mom. What friend?\" you ask again. \n\n\t\"Oh, the handsome one,\" she says. \"Joshua?\"\n\n\t\"Joshy's in the hospital? Which hospital? Why? Where did you hear this?\"\n\n\t\"Jesus, so many questions,\" your mother says, exasperated. She waves the knife around as she talks, flicking bits of tomato innards onto the counter. \"Some kind of nervous breakdown is what I heard.\" She makes a spinning motion with her finger at her right temple and whistles. \"He's at St. Virgil of the Good Heart,\" she says. \"You know, the mental institution.\" \n\t*choice \n\t\t#Thank her for letting me know. \n\t\t\tYou do, and your mother blinks at you a few times, as if confused. Did she expect you to get angry?\n\n\t\t\tWell, perhaps she was baiting you. You know your mother better than I do. \n\t\t\t*comment Of course that's not true either, though, because this is not your mother, Player, is it? This is your mother-in-the-game, your Game Mother, and that makes her my mother a bit too, and that makes us siblings, too, doesn't it? Ah, I always wished I had a sibling, someone to share everything with. When my parents died, there was no one else in the world I could share this grief with. No one else in the world was orphaned in the specific way I was. There are few things that made me feel as lonely as that. But you, my Sibling-in-Games, you would understand.  \n\t\t#Mildly tell her she shouldn't gossip. \n\t\t\tShe laughs in response. \"You should be thanking me,\" she says. \"Otherwise, you wouldn't even know your friend's rotting away, drugged out of his mind in a loony bin.\"\n\n\t\t\tYou ignore her cruelty.  \n\t\t#Angrily tell her she should be more respectful.\n\t\t\t\"You shouldn't talk about people like that,\" you say. Your voice is shaking with barely concealed rage. \n\n\t\t\tYour mother stares at you for a moment, her mouth hanging open, speechless. \"Excuse me?\" is all she manages in the end.\n\n\t\t\tShe's trying to intimidate you, @{(brave > stat_mid_pass) |and all you want to do is turn around and hide}, but you stand your ground. \"You should respect people's mental struggles,\" you say firmly. \n\n\t\t\tAnd then, your mother explodes. \"Who do you think you are to lecture me on how to be? I wiped your ass for years. Show some respect.\"\n\n\t\t\t\"You haven't earned my respect.\"\n\n\t\t\tYour mother is gripping the knife with such force her knuckles have turned white. It doesn't escape you that the tip is pointing at you. But she wouldn't really hurt you. Would she? \n\n\t\t\tThen, the corner of her lip curls. She goes back to chopping tomatoes and doesn't speak another word in your direction. \n\n\t\t\tYou know you'll pay for this one day, but that day is not today. \n\t\t\t*set pay_mother true \n\n\tYour mother's right about one thing, though. \n*else \n\tAs time goes by, it becomes clear that your mother's right about one thing, though. \n\nYou need to make up your mind about what you're going to do next. \n*choice \n\t*selectable_if (studies > stat_mid_pass) #Go to college. \n\t\t*if ambition = 2 \n\t\t\tIt's what you've always wanted, after all, isn't it? That's the reason you've worked the night shift at the convenience store, that's the reason you studied, and the reason you endured your supervisor's whims. And now, finally, you get the chance to do what you've worked towards all these years: to study, to have a career, to make something of yourself. \n\t\t*elseif escapism = 2\n\t\t\tWhat you've always wanted was to leave this town behind. That's why you've been studying, that's why you've been saving money working that mind-numbing shift at the convenience store. Going to college is your ticket out. This is how you escape. \n\t\t*else \n\t\t\tYou've always wanted to find love, start a family. In order to do that, first you need to figure yourself out, get an education. Make something of yourself. \n\t\t\n\t\t*if ((joshy_romance) or (joshy_romance_postponed)) and (not (joshy_lost))\n\t\t\t*set uni true \n\t\t\t${day_you_leave}\n\n\t\t\tIt almost doesn't matter that all your belongings are already dripping with water by the time you pile them into the bus to the city. \n\n\t\t\t${city_description}\n\n\t\t\t*if not (joshy_ptsd)\n\t\t\t\t*set joshy_uni true \n\t\t\t\t*set joshy %+mid_change\n\t\t\t\tYou and Joshy go to the same college, a sprawling Brutalist building surrounded by sad patches of yellow grass. Most of the students have to work two jobs alongside their studies to get by, and the same goes for Joshy and you. But you rent a small studio together and can afford food, and you even have enough left over to support your \n\t\t\t\t*label hobby_joshy_continue \n\t\t\t\t*if hobby = 1\n\t\t\t\t\tart habit. You buy yourself supplies and spend most of your nights drawing, filling canvas after canvas until you have to start selling them or gifting them to friends. You even get Joshy hooked on it, drag him to galleries downtown where you point excitedly at blocks of color, lines you find devastatingly beautiful, while he looks on unconvinced. Mostly, he's happy to look at you being happy. \"When you look at art is when you are the most beautiful,\" he tells you, before kissing you. You've lost count of the times he's kissed you in front of paintings, backgrounded by decomposing still lifes, ironic nudes, empty canvases punctuated by light. \n\t\t\t\t*elseif hobby = 2\n\t\t\t\t\tgaming habit. You buy a proper console and splurge on two controllers so you can play against Joshy. He's unconvinced at first and only goes along as a favor to you. You try space invaders, rogues, puzzle games, but in the end discover that Joshy's favorite is a quiet, noncompetitive game where the two characters roam a pixelated wilderness collecting different kinds of animals. The animals start out normal—dogs, cats, pigs, chickens—but gradually progress to rarer species—axolotls, Komodo dragons, vampire squids and narwhals—until eventually they evolve into the fantastical—unicorns and cryptids, and other chimeric creatures: tusked rabbits, deer with glass antlers, lions maned with mother-of-pearl wings. Every time you find a new animal for your strange menagerie, Joshy pauses the game and places a kiss on your lips as thanks.  \n\t\t\t\t*else \n\t\t\t\t\treading habit. You fill your side of the studio with piles of paperbacks, until books overflow from every nook and Joshy relents, gives up his own shelves and even empties out a couple of cupboards in the kitchen—who needs so many glasses, anyway? You drag him to book festivals and libraries until he, too, becomes an avid reader and you can spend evenings reading to each other until your voices go, and all that is left to do is fall into each other's arms and kiss.  \n\t\t\t*else \n\t\t\t\tYou always thought you'd go away with Joshy. You'd go to the same college, get your degrees, maybe even build a life together, who knows?\n\n\t\t\t\tThat's never going to happen now, is it?\n\n\t\t\t\tYou could have paid him a visit before you left. But you couldn't face it. Couldn't walk into that place and see the person you love the most in the world broken like that. \n\n\t\t\t\tSo you leave without seeing him, knowing you might never see him again. \n\t\t\t*finish  \n\t\t*elseif (maria_romance) and (not (maria_lost))\n\t\t\tYou tell Maria you're planning to study @{hobby history of art|software engineering|literature} one afternoon after your final shift at work. She meets you outside the convenience store and you walk back together. The weather is drippy in a lazy kind of way. It feels like everything is in slow motion. \n\n\t\t\tMaria nods when you tell her. She says she's planning to go to a renowned dance school. She auditioned and got in. \n\n\t\t\t\"Wait, when did this happen?\" you ask. \"Why didn't you say anything?\"\n\n\t\t\tShe looks at you, slightly embarrassed. \"I was worried I wouldn't get in,\" she says. \"And also…\" She looks away. \n\n\t\t\t\"What is it?\"\n\n\t\t\t\"It's in this city in the south. Hours away from where you're going.\"\n\n\t\t\t\"Oh,\" you say. \"I see.\"\n\n\t\t\t\"And it doesn't matter anyway,\" Maria says, now sounding determined. \"Because I'm going to come with you.\" She pauses. \"If you'll have me.\"\n\n\t\t\tAt first you don't quite understand what she means, so she explains: \"I won't go to my school. I'll come to yours, study something else. I have the grades, right? I can study anything. It will be fine. All I want is to be with you.\"\n\t\t\t*choice \n\t\t\t\t#Let her join you. \n\t\t\t\t\t*set uni_maria true \n\t\t\t\t\t*set maria %+mid_change \n\t\t\t\t\t*set uni true \n\t\t\t\t\tYou think about it. Is it really your responsibility to say yes or no? It's her decision. \n\n\t\t\t\t\t\"Okay,\" you say finally. \"If you're sure?\"\n\n\t\t\t\t\tShe takes a few moments too long to respond, but then she does. \"I'm sure,\" she says. \"I've never been more sure of anything in my life.\"\n\t\t\t\t#Don't let her join you. \n\t\t\t\t\t*set uni true \n\t\t\t\t\t*set left_maria true \n\t\t\t\t\t*set maria %-small_change\n\t\t\t\t\tYou couldn't do this to her. Can't allow her to abandon her dreams for your sake. \n\n\t\t\t\t\t\"No, Maria, I can't let you do that.\"\n\n\t\t\t\t\tMaria lifts her eyebrows. \"Let me?\"\n\n\t\t\t\t\tYou take her hands in yours, hold them up to your chest. You have to be careful now. Anything you say will probably come out the wrong way. \"Maria. Please. It wouldn't be fair to you. I won't let you do this.\"\n\n\t\t\t\t\tShe's angry. \"That's not your decision to make, though, is it? How patronizing to think you know what's best for me!\" \n\n\t\t\t\t\t\"That's not how I meant it…\" you start, but Maria is already backing away. \n\n\t\t\t\t\t\"You know what? You're right. Let's just go our separate ways.\"\n\n\t\t\t\t\tShe turns around and walks away from you as fast as she can. \n\t\t\t\t#I'll go with her instead. \n\t\t\t\t\t*set follow_maria true \n\t\t\t\t\t*set maria %+mid_change \n\t\t\t\t\t*set left true \n\t\t\t\t\t\"That is…not a good idea,\" you say. \n\n\t\t\t\t\t\"Why not?\" Maria asks. \"It'll be great. We'll be together. We'll both study. It'll be fine.\" You can tell she doesn't actually feel this way, no matter how badly she wants to. \n\n\t\t\t\t\tYou take a deep breath. It's now or never. \"Listen,\" you say. \"I'll come with you instead.\"\n\n\t\t\t\t\tShe blinks a few times. Her eyes are glistening with tears. \"You'd do that for me?\" she asks. \n\n\t\t\t\t\t\"I would do anything for you,\" you say, and for some unfathomable reason she believes you.   \n\t\t\t*finish \n\t\t*elseif ((catrina_romance) or (catrina_romance_postponed)) and (not (catrina_lost))\n\t\t\tYou tell Cat your decision after your last shift at work. He meets you outside the convenience store and insists on walking you home. \"It's a celebratory walk,\" he says, a mischievous glint in his eye. \n\n\t\t\t\"It's the same walk I walk every day,\" you say blankly. \n\n\t\t\t\"Not anymore it isn't,\" Cat replies. \"A whole new road unfolds before you.\" Cat pauses, then continues. \"But I'd like to come with you,\" he says. \n\t\t\t*if unsure \n\t\t\t\t\"If you still want to be with me, that is. Since you were unsure before, I mean. You said you needed to process.\"\n\t\t\t\t*choice \n\t\t\t\t\t#Nothing would make me happier. \n\t\t\t\t\t\t*set catrina %+mid_change \n\t\t\t\t\t\tYou tell him so. \n\n\t\t\t\t\t\t\"Really?\" Cat asks. \n\n\t\t\t\t\t\t\"Yeah,\" you say. \"If you're sure.\"\n\t\t\t\t\t\t*goto cat_continue \n\t\t\t\t\t#I think I need to focus on my studies. \n\t\t\t\t\t\tYou try to explain to Cat as gently as you can, but it still comes out as a version of \"it's not you, it's me.\"\n\n\t\t\t\t\t\tCat nods. \"Yeah,\" he says. \"I get it.\" His shoulders slouch in a way that makes him look a decade older than he is. \n\n\t\t\t\t\t\t\"I'm sorry,\" he says. \n\n\t\t\t\t\t\tHe takes a moment before flashing you a wide, brilliant smile. \"Hey, don't worry about it,\" he says. \"I'm sure we'll cross paths again, eventually. And we'll always be friends, right?\"\n\t\t\t\t\t\t*set uni true \n\t\t\t\t\t\t*set catrina %-mid_change\n\t\t\t\t\t\t*set left_catrina true \n\t\t\t\t\t#Of course I want to be with him. \n\t\t\t\t\t\t*set catrina %+mid_change\n\t\t\t\t\t\t\"What kind of question is that?\" you ask him. \"Of course I want to be with you. I just needed some time to catch up with…\" you motion with your arms towards, well, everything.\n\n\t\t\t\t\t\tCat smiles. \"I get that.\"\n\n\t\t\t\t\t\t\"And are you sure that's what you want?\"\n\t\t\t\t\t\t*goto cat_continue\n\t\t\t*else \n\t\t\t\t\"If that's something you want, too.\"\n\t\t\t\t\n\t\t\t\t\"Are you sure?\" you ask him. \n\t\t\t\t*label cat_continue \n\n\t\t\t\t\"Of course I'm sure,\" he says. \"I can't wait to get out of this dump. I was going to go somewhere else anyway, so I might as well come with you.\" He grins. \"Besides, it's not the place that matters,\" he says and winks. \"It's the company.\"\n\t\t\t\t*set uni_catrina true \n\t\t\t\t*set uni true \n\t\t\t*finish \n\t\t*elseif (tommy_romance) and ((not (tommy_lost)) and (not (tommy_dead)))\n\t\t\t*if hobby = 3 \n\t\t\t\t*set tommy_uni_same true \n\t\t\t\t*set uni true \n\t\t\t\t*set tommy %+mid_change\n\t\t\t\tIt turns out Tommy has decided to study literature at the same college as you, so it makes sense for the two of you to move in together in the city and share your rent and living expenses. You get a tiny studio apartment in the meatpacking district; it's not much, but it's all you need. You find a part-time job at a bookstore; you couldn't have asked for anything better than to spend half your time reading and discussing literature, and the rest surrounded by books and the people who love them. \n\t\t\t\t*label tommy_reading_continue \n\n\t\t\t\tTommy and you line the walls of your studio with bookshelves that you dutifully start filling with books bought with your savings and anything left over from your meager salary. You spend your evenings crumpled together on the couch, reading each other your favorite passages from your books, rewarding each other with kisses when the passages land especially well. \n\n\t\t\t\t${city_description} \n\n\t\t\t\tYou can't quite remember when you and Tommy start calling the city Omelas, but it fits, and neither of you wants to walk away. \n\t\t\t*else \n\t\t\t\tWhen you share the news with Tommy, his face falls. He has decided to study literature at one of the oldest colleges in the country. It's a prestigious place with a reputation of producing some of the greatest thinkers and writers of the century; it's also in a different, smaller city, and doesn't offer any other subjects. \n\n\t\t\t\tYou're on your way back home from your last shift at work. Tommy is walking beside you, gaze fixed on the street. \n\n\t\t\t\t\"You, uh…you could come with me,\" he says. \"If you wanted.\" \n\n\t\t\t\tThat would mean giving up your dream of studying.\n\n\t\t\t\tBut you'd get to be with Tommy. \n\t\t\t\t*choice \n\t\t\t\t\t#Follow him. He's all that matters. \n\t\t\t\t\t\t*set follow_tommy true \n\t\t\t\t\t\t*set left true \n\t\t\t\t\t\t*set tommy %+mid_change \n\t\t\t\t\t\tYou think it over, just so you're sure this is what you want. But there's no question in your mind. \"Okay,\" you say. \n\n\t\t\t\t\t\tTommy stops walking and turns to look at you. \"Really?\" he asks, as if he wasn't expecting you to actually agree. \n\n\t\t\t\t\t\t\"Yes,\" you say. \"Of course. You're more important than anything else to me.\"\n\n\t\t\t\t\t\tTommy beams. \n\t\t\t\t\t\t*if tommy_died \n\n\t\t\t\t\t\t\tYou almost lost him once. You won't lose him again. An irrational thought—did this ever actually happen? \n\n\t\t\t\t\t\t\tYou take his hand and then pull him into a hug. \"I'll never let you go,\" you say. [i]Never again,[/i] your mind insists. Somewhere in the darkest folds of your memory, Tommy is bleeding out in front of your eyes. You push the thought away. \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\"You really mean that?\" \n\n\t\t\t\t\t\t\t\"I'm doing this, aren't I?\" you ask. You know it's not enough. How can you reassure him? All you can do is hold him. Prove to him you won't leave, again and again, until he believes it. \n\n\t\t\t\t\t\t\t\"Are you sure you won't resent me for this one day?\" Tommy asks back. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"It's my choice,\" you reply. \"My responsibility.\" \n\n\t\t\t\t\t\t\tTommy says nothing. He pulls you closer and burrows himself into your embrace. Perhaps he's thinking that people are more complicated than that. That the freedom to choose doesn't stop resentment from building. That to assume responsibility for one's joy as well as one's misery can be the most terrifying thing. \n\n\t\t\t\t\t\t\tBut he says none of that, and who am I to put words in his mouth? \n\n\t\t\t\t\t\t\tRight here, right now, Tommy is holding on to you, happy. \n\t\t\t\t\t#Go our separate ways. \n\t\t\t\t\t\t*set uni true \n\t\t\t\t\t\t*set left_tommy true \n\t\t\t\t\t\t*set tommy %-mid_change \n\t\t\t\t\t\t\"Tommy…\" you start. \"You know I love you. But I can't do that. I've worked too hard for this.\" \n\n\t\t\t\t\t\tTommy nods, though he doesn't speak for a while. \"I understand,\" he says then. He reaches for your hand, and you take his. \n\n\t\t\t\t\t\tYou walk hand in hand like that all the way home. Then you part with a kiss on the lips, and wish each other well, like grown-ups. \n\t\t\t\t\t#Beg him to reconsider. \n\t\t\t\t\t\t*set uni true \n\t\t\t\t\t\t*set beg_tommy true \n\t\t\t\t\t\t*set tommy %+small_change \n\t\t\t\t\t\tWhy should you be the one to abandon your dreams? Tommy has always had things go his way a lot more easily than you have. So perhaps the sacrifice will cost him less now. \n\n\t\t\t\t\t\tIf he loves you, he will do for you what he's asking you to do for him. \n\n\t\t\t\t\t\tYou tell him so, perhaps in more words, perhaps in fewer. \n\n\t\t\t\t\t\t*if tommy > stat_mid_pass\n\t\t\t\t\t\t\t*set tommy_followed true \n\t\t\t\t\t\t\tHe takes so long to respond that you're certain he's going to say no, and maybe he would be right to. But, in the end, he flashes you a big smile—the biggest one you've ever seen on his face. \"Okay,\" he tells you. \"I'll come with you.\"\n\n\t\t\t\t\t\t\tYou have second thoughts now. \"What about your parents,\" you say. \"Won't they be mad?\"\n\n\t\t\t\t\t\t\tTommy shrugs. \"I don't care,\" he says. \"I've always done what they wanted. Perhaps it's time to finally do what I want.\" He pauses. \"And what I want is to be with you.\"\n\n\t\t\t\t\t\t\tHow does it feel, ${name}? To be wanted like this?\n\n\t\t\t\t\t\t\tYou lucky fool. \n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\tTommy's face falls. For a few moments, he won't look at you. His nose grows red, and his eyes fill with tears. \"${name}, I can't,\" he says after a while. \"My parents…\"\n\n\t\t\t\t\t\t\t\"Your parents?\" you ask, slightly incredulous. \n\n\t\t\t\t\t\t\t\"They wouldn't support me if I dropped out now.\"\n\n\t\t\t\t\t\t\t\"Right,\" you say. It must come out pointedly enough, because Tommy shifts his weight and hangs his head. \n\n\t\t\t\t\t\t\t\"I mean, I don't want to drop out now. I'm sorry. I love you, I really do, but I can't.\"\n\n\t\t\t\t\t\t\tBefore you part, Tommy hugs you and kisses you on both cheeks. You don't know it yet, but it's the last time you'll ever lay eyes on him. \n\n\t\t\t\t\t\t\tAnd, well. That's that. \n\t\t\t\t\t\t*finish \n\t\t*else \n\t\t\t*set uni true \n\t\t\t*label alone_city_continue \n\t\t\t${day_you_leave}\n\n\t\t\tAnd then, the city. Is it what you expected, or what you hoped to find? You get a small place for yourself and slowly fill it with @{hobby canvases and art supplies|board games that you hope to play with the friends you no longer have|books}.\n\n\t\t\t@{uni Your classes are fulfilling, though it|It} takes you a while to meet people, and when you do, you sometimes find it hard to connect. How could you ever explain what it was like, playing this game, becoming this person the game has made you into? The city itself reminds you of that room of sand, people drawing circles for themselves and standing in them as if they have finally made something that belongs to them, something they belong to. \n\t\t*if tommy_ghost\n\t\t\t\n\t\t\tAt least Tommy keeps you company. He no longer follows you around everywhere, but he's always there in your studio when you come back. He sits on your floor, your sofa, your bed, watches you silently as you drink water, brush your teeth, @{hobby apply brush to paper and canvas|boot up your console|read until you fall asleep with your nose in a book}. \n\n\t\t\t*if tommy_romance \n\t\t\t\tSometimes, in your dreams, Tommy tries to hug you, but his hands go right through you as if you're a ghost. \n\t\t\t*else \n\t\t\t\tYou become so accustomed to his presence that sometimes you forget he's even there, and then you're startled when you meet his gaze and everything comes rushing back, burnt sugar-scented air and chiptune music and that roller coaster rushing down, your lungs filled to a scream.\n\t\t*finish \n\t#@{(studies > stat_mid_pass) Just leave. Go live somewhere else.| Leave town. Move away.}\n\t\t*set city true \n\t\t*if studies > stat_mid_pass\n\t\t\tYou don't even need to go to college; you just need to get away from this town. Studying was always an excuse, anyway. What matters is escape. \n\t\t*else \n\t\t\tIt's the only thing that makes sense. The only option you have. \n\n\t\t*if ((joshy_romance) or (joshy_romance_postponed)) and ((not (joshy_ptsd)) and (not (joshy_lost)))\n\t\t\tSo you simply follow Joshy to the city, where he'll study medicine. It's a no-brainer, really. You've always wanted to leave, and this is the perfect opportunity. \n\t\t\t*if studies > stat_mid_pass\n\t\t\t\tYou could have chosen a degree, but this is just as good. \n\t\t\t*else \n\t\t\t\t*if ambition = 2\n\t\t\t\t\tSo what if you wanted a degree? College was always just an excuse to leave this town, and you're doing that anyway. You don't need more school. You only need to leave. (Or that's what you tell yourself, anyway, and that's what you tell your parents when they bother to question your choices.)\n\t\t\t\t*elseif escapism = 2\n\t\t\t\t\tSo what if yo
