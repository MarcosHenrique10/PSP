t throw yourself into whatever danger crosses your path, as if you're compelled. As if you have some kind of death wish. \n\n\t\tBut you don't. Right? \n\t#\"You may think you're brave, but really you're just arrogant.\"\n\t\t*if brave \u003c stat_mid_pass\n\t\t\tHow weird it seemed to you that they think you consider yourself brave. Because that's not how you see yourself at all. \n\n\t\t\tAre they right? \n\n\t\t\tBut anyway. \n\t\t*set self_centered %+mid_change \n\t\t*set brave %+mid_change\n\t\tYou didn't say anything to defend yourself. But why would you? What's the point of humility, anyway, and what's bravery without self-belief? You have to be a little arrogant to throw yourself in the way of danger, right? If you don't believe you're the shit, the most likely outcome is you'll get squashed. Arrogance? Pfft. It's survival.  \n\t#\"You hide your fear behind your love for discipline.\"\n\t\t*if brave > stat_mid_pass\n\t\t\tCowardice? Is that how they see you? You always thought of yourself as brave. \n\n\t\t\tBut maybe your friends are right. \n\n\t\t\tYou didn't respond. \n\t\t*else \n\t\t\tYou didn't agree with them, of course. \n\t\t*set chaotic %-mid_change\n\t\t*set brave %-mid_change\n\t\tYou didn't say anything. You couldn't have: there was a knot in your throat, but of course you didn't let them know that, did you? You told yourself these were the rules of the game, no talking-back allowed. Which only goes to prove their point. How right they are about you, the disciplined, orderly coward. \n\t#\"You think you're so wild and free, but really you're just selfish.\"\n\t\t*if chaotic \u003c stat_mid_pass\n\t\t\tWild and free? Is that you? Are they right? \n\n\t\t*set chaotic %+mid_change \n\t\t*set self_centered %+mid_change \n\t\tYou didn't contradict them. You would never admit it to them. But are they right? Perhaps, in your disregard for rules, you have sometimes been oblivious to other people's feelings and needs. \n\n\t\tThat kinda makes you self-centered, doesn't it?\n\t#\"You behave like a martyr, but really you're just scared to live.\"\n\t\t*if self_centered > stat_mid_pass\n\t\t\tYou never thought of yourself as selfless. \n\n\t\t\tBut perhaps your friends are right. \n\t\t*else \n\t\t\tYou didn't disagree. You didn't say anything.\n\t\t*set self_centered %-mid_change\n\t\t*set brave %-mid_change\n\n\t\tAll your life you've sacrificed yourself for others. Other people's needs always came first. You told yourself that's noble, that's a life well-lived, a life in service of others. But are your friends right? Is that also cowardly? After all, if you never try to do anything, be anything, leave your comfort zone, there's very little chance of being disappointed or hurt. \n\n\t\tThere's also very little chance of actually living. \n\t#\"You're so self-absorbed it actually makes you sloppy.\"\n\t\t*if self_centered \u003c stat_mid_pass\n\t\t\tSelf-absorbed? \n\n\t\t\tYou never thought of yourself that way. But perhaps your friends are right. \n\t\t*else \n\t\t\tYou didn't object. But it did hurt. \n\n\t\t\tAre they right? \n\t\t*set self_centered %+mid_change \n\t\t*set chaotic %+mid_change \n\n\t\tYou always thought self-love was a good thing. You have to take care of yourself first before you can take care of others, isn't that right? But now your friends are telling you you've taken this to such an extreme that it makes you inconsistent, careless. Dangerous. \n\nAnyway. \n\nPerhaps this job is not good for you. Too much time to spend alone with your thoughts. But it's important to keep it. \n*choice \n\t#I need money to escape this town. \n\t\t*set escapism 2\n\t\tYou're not entirely sure what it is you want to escape to. But you sure as hell know what you're escaping from. \n\t\t*page_break Let's Not Go There\n\t#I need money to support myself when I get into college. \n\t\t*set ambition 2\n\t\tYou imagine it, sometimes. Studying something you actually enjoy, something that matters. To the world and to you. \n\n\t\tOne day. \n\t\t*page_break \n\t#I need to make a living. Support a family, one day. \n\t\t*set romance 2\n\t\tCan you imagine? Being someone responsible for the well-being of people you love, people you chose. And succeeding at it. \n\n\t\tMaybe. One day. \n\t\t*page_break \nFinally your shift is over, and you go home. \n\nDarkness greets you, not even a lonely lamp or a night-light left on to welcome you. Your parents are asleep—Dad in the bedroom, Mom on the couch. You pass her on your way to your room, and she doesn't even stir. \n\nThe moment you go through your bedroom door, you feel the exhaustion. \n*if not (Choice_nightmode)\n\tYou turn on your bedside lamp. \n*else \n\tYou don't turn on the light. \n\nIt's an hour till dawn, which means an hour before you have to leave for school. You lie on your bed @{sleepdeprived but know you won't sleep. You'll simply|and hope for sleep that eludes you. You} listen to the sounds of the house, that house you've always thought was haunted: floors creaking under nobody's footsteps, pipes moaning in the walls. On the ceiling, a large treelike shape spreads its branches, dendrites of mold reaching, searching. \n*if not (choice_nightmode)\n\t*page_break\n\tYou wonder: if you turned off the light, would it look different?\n\n\tTurn off the light. \n\t*page_break\n\t*if choice_nightmode\n\t\t*page_break\n\t\t*achieve lights \n\t\tIt does. \n\n\t\tWith the lights off, it looks more like a sea creature. Something ancient and tentative. \n\n\t\tSomething that wants to meet you. \n\t*else\n\t\t*page_break\n\t\tOr don't. Suit yourself. It's your choice. \n\n\t\tMaybe next time you'll choose differently. \n\n\t\tEither way, sleep evades you. \n*page_break \nIf someone asked you how you became the designated keeper of the game, you couldn't quite tell them. But you did, and here you are. \n\nYou think of it now, its strange material, its inert screen, the mysterious messages. You wonder when the next instructions will appear. None of you remember who first found the game. Of course it piqued your interest; this is the early 1990s, after all, and, in this town, most of the time it still feels like the 1980s. Strange things happen. Your friends were intrigued; you were all intrigued. What does it matter if no one remembers exactly how you came upon it, or if the story changes a little bit, every time you tell it? \n*comment If you're wondering about the chronology here, Player, considering that [i]Xena[/i] premiered in 1995 and that people didn't say \"idk\" back in the nineties, you're right. This is fake, nostalgic nineties. The imaginary nineties of my youth. Memory is the worst historian. \n\nWas it found in the woods behind the old monastery? Did someone hand it to one of you on a cold night not long ago, on a street corner downtown? Did you try to retrace your steps night after night, but were never able to find that corner again, as if those streets had vanished, or had never existed at all? And did the student who accepted it have to pay for it somehow? What did they pay with? What was the price? \n\nNone of that concerns you now. \n\nAll that matters is that you keep playing, and that you keep, more or less, winning. \n*check_achievements ending eldritch \n*if choice_achieved_ending\n\tYou've heard it said that hell is a haunted house. Hell has levels too, doesn't it? You've heard that, too. \n\n\tSo you advance through the levels—open the temporary doors, enter the impossible rooms, greet the looping, 8-bit ghosts. Ignore the chiptune music. \n*page_break \n*check_achievements ending eldritch \nIn the morning, you walk to school. The building sits in a sort of natural basin, at the bottom of three different hills, so on your way there you get a view of it from above. \n\nFrom this vantage point, watching the students make their way in, it feels as if you're all pooling towards it, as if it's sucking you in, pulling you to it. \n*if choice_achieved_eldritch \n\tBriefly, you imagine the school as a creature, nestled in its basin, invisible tentacles reaching out to pull you in, draw you into its open maw. \n*if choice_achieved_ending \n\n\tYou do a double take, with a feeling like something falling through your chest, or your brain bisecting. Déjà vu. Like you've had this exact thought before. \n\n\tYou've been here before. You know all this already. \n\n\tOf course you know all this. Of course you've been here before. This is where you go to school. \n\n\t(Though we both know this is not what I meant.)\n*else\n\tIt's a gray concrete building that always felt to you as if it pretends to have more windows than it actually does. Its corridors feel too narrow for the number of students walking them. Its structure makes everyone rush, elbow one another to keep moving, keep moving, keep moving, as if the school itself is herding you along, circulating you, distributing you from its long, long veins to its vital organs. \n*page_break \nIn the first period, Ms. Harper, your @{hobby art|computer science|literature} teacher, calls on you. She asks you a question about @{hobby linear perspective in Renaissance art|exit control loops|the fragmentation of self and narrative in early modernist literature}. \n*choice\n\t#I studied hard, like I always do, but my brain is hazy. \n\t\t*set chaotic %-mid_change\n\t\tIt's not your fault. Maybe you're just tired. You always apply yourself. You do your best, and that's the most anyone can do. \n\t#I never study. What's the point?\n\t\t*set chaotic %+mid_change\n\t\tYou figure that if there's anything you need to know to get ahead in life, life itself is going to teach it to you sooner or later, one way or another. Usually one hard way or another. What could school—this artificial, carefully controlled environment—possibly give you that would prepare you for the jungle that lies beyond its gates? \n\t#I don't need to study. I'm talented, and that's enough.\n\t\t*set self_centered %+mid_change\n\t\tMaybe a tad arrogant, too. But who cares? Only the talented can afford that. \n\t\t\n\t\tBesides, there's nothing a book can teach you that you can't get from just believing in yourself. You already have all the internal resources you need to get ahead. \n\t#Regardless of whether I've studied, I hate speaking in front of people. \n\t\t*set self_centered %-mid_change\n\t\tEven if you know the answers, @{(chaotic >= stat_mid_pass) which, let's face it, is not often|which is most of the time}, you just become tongue-tied as soon as you are in the spotlight. This has led some people to think you're stupid, or that you don't apply yourself. But you know neither of those things is true. You're just too distracted by your racing heart and your sweaty palms to focus on forming words that make sense. \n\nYou stammer through your answers. Ms. Harper lets you finish and then, disappointment plain on her face, puts you out of your misery by calling on someone else. \n\nOne by one, you glance at your friends in the classroom. There's Joshy, the angsty teenager who sings and plays the guitar and hides his sadness behind the most luminous smile; ${Cat}, who is beautiful and rebellious and @{(Cat = \"Cat\") who trusted you enough to come out to you as trans one night not long ago, under the great horse statue at the seafront, where ${ce} likes to skate|likes to skate under the great horse statue at the seafront} with all the tough boys; Maria, who sits next to you in class, has a [i]Xena: Warrior Princess[/i] obsession and a desperate crush on Gabrielle; and Tommy, who is small and often seems helpless, but who is also the best student in the class (and the only one who has a semblance of a normal family life). You are all almost eighteen years old, except Tommy, who is a year younger. Tommy catches your eye and smiles encouragingly. Maria looks away to avoid embarrassing you. Joshy winks, and ${Cat} rolls ${ceir} eyes at Ms. Harper. \n\nThey're good friends. \n*check_achievements ending \n*if choice_achieved_ending\n\n\tBut look. Obviously, these people are not Maria and Tommy and ${Cat} and Joshy. They are meant to stand in for whoever your friends were when you were growing up. I can't actually make you care about any of them. You have to do that on your own. \n\n@{(brave > stat_mid_pass) Lips pressed together|Cheeks flushed}, you suffer through the rest of the class. ${Cat} breaks a piece off ${ceir} eraser and throws it at you, hoping to make you laugh. Almost succeeds. Even though this is your favorite subject, and Ms. Harper your favorite teacher, you can't bring yourself to concentrate on anything she says. \n\nMaria, ever caring and kind-hearted, bumps you with her shoulder. \"You okay?\" she mouths silently.\n\nYou nod. But your mind is on the game, your hands itching to reach into your backpack and check it for new instructions.\n*page_break \nWhen the bell finally rings, you let out a long breath. But as you're on your way out, Ms. Harper asks you to stay behind for a minute. \n\nYou rub your sweaty palms on your trousers and approach her. \n\n\"You need to apply yourself, ${name},\" she says. Not unkindly. \"You're a smart kid. One of the @{hobby most creative|smartest|most perceptive} students I've ever had the chance to teach, in fact. Please, don't let that go to waste.\"\n*fake_choice\n\t#I mistrust compliments.\n\t\t*set brave %-mid_change\n\t\tYou don't know if it's because praise was so rare in your family when you were growing up, or because, on the rare occasions when your mother or father did praise you, it always came at a cost or with a bunch of strings attached. Being praised meant you'd given up something you didn't want to give, or you'd taken something you didn't want to take. \n\n\t\t\"If you say so, Ms. Harper.\"\n\n\t\tThe teacher holds your gaze a moment too long. Then, she decides you've had enough. You can't tell if it's because she has resolved to pick up this particular battle another day, or if she's finally accepted you're a lost cause. \n\n\t\t\"Okay, ${name}. I'll see you tomorrow, yeah?\"\n\t\t\n\t\t\"Of course.\" Is this over yet? \n\t#I don't know what to say. My cheeks burn. \n\t\t*set self_centered %-mid_change\n\t\tYou never particularly @{like_attention tried to be|liked being} the center of attention. @{(self_centered > stat_mid_pass) It just kinda…happened. But you didn't seek it. |}Sometimes you wonder where that attitude comes from. Were you shamed by your parents or some teacher early in life and you just don't remember? Were you ever punished or bullied for speaking your mind? Were you taught you needed to be perfect all the time, to always get it right, and if you weren't or you didn't, then it was better not to open your mouth at all? \n\n\t\tBut maybe it isn't right to look to the past for answers. It's kinda deterministic, isn't it? As if people are always perfectly coherent narratives, as if you can solve their inherent riddles by simply finding the right sequence of events to explain them. \n\n\t\tPerhaps you're just naturally that way. \n\n\t\tYou shift awkwardly where you stand. \n\t#I smile, bolstered. \n\t\t*set self_centered %+mid_change\n\t\tIt's good when people believe in you. And why wouldn't they? Deep down, you do believe you're great. Like you really, actually believe it. \n\t\t*if brave >= stat_mid_pass\n\t\t\tBut it's good to have that external validation. Otherwise it's just something you believe; it might not actually be true. \n\t\t*else \n\t\t\tExcept you can't really say that out loud. Because that would be dangerous, wouldn't it? It's a fine balance, wanting to be the center of attention without actually attracting any trouble. \n\n\t\t\"Thank you,\" you say. And you mean it. \n\t#I bravely apologize for fumbling earlier. \n\t\t*set brave %+mid_change\n\t\t\"I'm sorry, Ms. Harper,\" you say. \"I didn't want to disappoint you. I'll do better next time.\"\n\n\t\tMs. Harper smiles, though there is a hint of something reserved in her expression, as if she mistrusts how readily you owned your mistakes. \"I'm sure you will,\" she says. \n\n\t\tYou take that as being dismissed, but as you turn to go, Ms. Harper speaks again. \"I have faith in you, ${name},\" she says. \"Please, remember that.\"\n\n\t\tIt's meant to be a compliment, or a statement of support. So why does it sound so ominous?\n\nMs. Harper's eyes take on a slightly glassy quality. \"It's so easy to throw away your life, you know,\" she says. \"Easier than you think.\" She pauses. \"And you have a test coming up next week. Don't forget.\" It's plain that there's more she chooses not to say. \n\nYou let it go. \n\nAfter class, you notice the game has lit up with new instructions. \n\nYou let everyone know you're on.\n*page_break \nYou meet up by the gym. You exchange a few glances, and then, without ceremony, you open the door—the one in front of which you once shared your cruelties. \n\nBehind the door is a room full of sand. Or no, not a room. A space. \n\nYou walk in slowly and it's like entering another world. Strange light.  If you look closely, at the right angle, with your head tilted slightly and your eyes half-closed, you might see things differently. \n*if choice_nightmode \n\tStrange formations, person-shaped, where others had perhaps stood before you. \nThe game is everywhere. You can't see where it ends. \n\nThe door clicks shut behind you. You try the handle, but it won't budge. You're locked in. \n\nTo play this game, according to the instructions, first you have to decide who will lose. The decision must be final and uncontested.\n\n\"But it can't be just that,\" Joshy says. \"What kind of game would that be? That's no game at all.\"\n\n\"Maybe it's a trick,\" ${Cat} says. \"Maybe the game wants us to go against its instructions. Try to beat it.\"\n\n\"Or maybe it just wants us to do what it said?\" Tommy interjects. \"The instructions were quite clear.\"\n\nMaria is the only one who remains silent. She studies the space, a fearful look on her face. \n*choice \n\t#I hate to see Maria scared. \n\t\t*set Maria %+mid_change \n\t\tWhat is it about her? Something in the way her feelings register on her face, despite how little she says. Makes you want to take care of her. \n\t#I like how rebellious ${Cat} is. \n\t\t*set catrina %+mid_change\n\t\t$!{ce} always thinks unconventionally. Out of the box. \n\t#I like how sensible Tommy always is. \n\t\t*set tommy %+mid_change \n\t\tBecause what he says does make sense, \n\t\t*if brave >= stat_mid_pass\n\t\t\teven if it comes across as cowardly. \n\n\t\t\tStill, there's no harm trying to do things differently.  \n\t\t*else \n\t\t\tdoesn't it? \n\n\t\t\tBut the majority has spoken.  \n\t#I like Joshy's skepticism. \n\t\t*set joshy %+mid_change \n\t\tHe never goes along with authority. Always tries to do things his own way. Perhaps you can take a page from his book.  \n\nFinally, you speak. \"There must be another way,\" you say. \n\nYou wander in the space and make shapes in the sand for a while. A cross. A circle. A snake eating its own tail. \n\nPerhaps you should try doing the thing you're best at? @{(hobby = 2) Because you've found this sometimes works in games.|Surely, this is the kind of situation that calls for good use of one's skills. And you know what yours are.}\n*choice \n\t#I'm smart and perceptive.  \n\t\t*set insight %+hi_change\n\t\tYou study the space and notice there are circles in the sand that you didn't trace yourselves. They were already there when you walked in. That must mean something, right?\n\n\t\t*if chaotic >= stat_mid_pass\n\t\t\tNot that you have any faith that things necessarily have meaning. \n\t\t*else \n\t\t\tThings exist for a reason. Everything has meaning. Especially in a game, randomness is the enemy of good gameplay. \n\n\t\tYou point the shapes out to the rest of the group. \n\n\t\t\"What do you think they are?\" Joshy asks. \n\n\t\t\"Perhaps there were others here before us,\" you say. Not that this helps your situation. \n\n\t\t\"Let's just choose someone,\" Tommy says. \n\n\t\tReluctantly, you agree.\n\t#I'm athletic. \n\t\t*set athletics %+hi_change\n\t\tYou warm up a little, and then you run as far as you can. You're @{(self_centered >= stat_mid_pass) pretty proud of your stamina. Surely, if you keep going, eventually you'll reach|reasonably sure you have enough stamina to make it to} the end of this room. It is located somewhere within the school, after all, isn't it? It can't go on forever. \n\n\t\tAnd yet. You keep going until your legs turn to rubber and your breath threatens to burn your lungs down to ashes, but the end of the room is nowhere in sight. The light remains unchanged. \n\n\t\tWhen you drag yourself back near the door and reunite with your party, you can hardly speak. You shake your head. \"It doesn't end,\" you say. \n\n\t\t\"That's impossible,\" Maria says. \n\n\t\tYou shrug. \"Maybe.\" \n\n\t\t\"And it doesn't quite help us.\"\n\n\t\t\"No,\" Joshy says. \"It doesn't.\" He pauses. \"Let's just follow the instructions,\" he says then. \n\n\t\tReluctantly, you all agree. \n\t#I am mature and level-headed. \n\t\tPeople tend to turn to you when things get hard: to trust you, find a leader in you, @{(self_centered \u003c stat_mid_pass) despite the fact that you're rather quiet|which of course comes naturally to you}. \n\n\t\tAnd that's what happens this time as well. You're the closest thing there is to an actual adult around here, so you organize them, put a speaking order in place, and let them brainstorm ways to get out of here. Each of your friends makes a proposition: running to the end of the space to see if there is a door on the other side, digging in the sand to see if there are any hidden clues there, yelling really loudly so someone comes and lets you out. \n\n\t\tYou try each of these methods, and each one fails. \n\n\t\tIn the end, you decide that you should just do as the game instructed. So you allocate each of your party members a few minutes to decide who they're going to pick. If feelings get heightened, you're prepared to intervene and be the voice of reason, remind everyone you're friends. It's only a game. You can get through this if you just remain calm. \n\t\t*set composure %+hi_change\n\nThe game will only let you out if you all agree on a decision. Once you have decided, you have to wound the loser, spill a few drops of their blood in the sand. Just a tiny bit. The game needs its sacrifices. \n*check_achievements second_ending \n*if choice_achieved_second_ending\n\t\n\tSo who are you going to pick? \n\t*goto pick \nBefore you make a decision, you think about each of your friends. \n*label friend_loop \n*choice \n\t*disable_reuse #Think about Maria. \n\t\tYou remember all the times you snuck out on a school night to go to the movies with her. \n\n\t\tYour town only has one movie theater, and they usually only bring the blockbusters in, but sometimes they'll show something old, like a black-and-white Western subtitled so badly it makes you wonder if any of the words you're hearing actually correspond to what the actors are saying. Maria, for some reason, loves those most of all. \n\n\t\tSometimes, instead of watching the film, you watch her. The way her face looks, mesmerized, awash in the silver magic of the screen. \n\t\t*set loop +1 \n\t*disable_reuse #Think about Tommy. \n\t\tTommy's favorite pastime is going to the big bookstore downtown. \n\t\t*if hobby = 3 \n\t\t\tYou understand why. You often go with him. \n\t\t*else \n\t\t\tYou don't quite get what he loves so much about it, but you still join him sometimes. \n\n\t\tTogether, you sit on the floor of a different section each time you go. Tommy takes down piles of books—sometimes it's fantasy or science fiction, other times it's horror, or comic books, or thrillers, or detective stories, or even sad, magic-tinted fables. Tommy doesn't discriminate. @{(hobby = 3) You leaf through the books, absorb what you can. You don't even have to talk. Just being together among words is enough.|You watch him leaf through the books, and there's something about the pleasure he takes in them that makes the whole experience worth it, even if you're not that into reading yourself.}\n\t\t*set loop +1 \n\t*disable_reuse #Think about ${Cat}. \n\t\tYou join ${cem} when ${ce} goes skateboarding, sometimes. @{(athletics > stat_mid_pass) You've tried skating yourself, and you're good at it, even if it's not exactly your thing. Mainly you enjoy watching ${cem} do it.|You never skate yourself, but you watch ${Cat} do it, and it's enough.} There's something about the way ${Cat} skates—the boldness in the way ${ce} moves, the wild joy—in ${ceir} face. It's mesmerizing. As if, for a few short hours, ${ce} is ultimately, completely free. Completely ${cemself}. \n\t\t*set loop +1 \n\t*disable_reuse #Think about Joshy. \n\t\tHe made a recording of himself singing a song he wrote, once. He gave you a tape and didn't say anything, scared that you'd hate it or make fun of him. \n\n\t\tYou listened to that tape on repeat for an entire night. The song itself was simple; basic melody, heartfelt lyrics about the sky and the sea and how lonely and empty they both feel sometimes. But there was something in Joshy's voice that made the recording irresistible to you. An earnestness, an openness. Something hopeful. As if whoever had that voice was simply incapable of being sad. \n\t\t*set loop +1 \n*if loop \u003c 4\n\t*goto friend_loop \n\nThese are your friends. You have good memories with all of them. \n\nBut who are you going to pick?\n*label pick \n*choice \n\t*selectable_if (maria_pick) #Maria. @{(Maria > stat_mid_pass) Reluctantly.|}\n\t\t*set maria %-small_change \n\t\tMaria is fine and everything, but sometimes she can just be so single-minded. And her Xena obsession is getting old real fast. \n\t\t*choice \n\t\t\t#I'm only making excuses, of course. I feel guilty. \n\t\t\t\tMaria doesn't really deserve your vote just because she's, idk, quirky or whatever. \n\n\t\t\t\tBut you have to pick someone. \n\t\t\t#Or maybe I'm just looking for a reaction. \n\t\t\t\tHow better to get someone to react than picking them to bleed in some weird-ass game, right? Sure. Makes perfect sense. \n\t\t\t#I could have picked any one of them and it would have hurt the same. \n\t\t\t\t*check_achievements ending \n\t\t\t\tIt's just what the game demands of you.\n\n\t\t\t\tAfter all, if it were an easy decision, the game wouldn't matter as much, right? And you have a sense that what the game really wants is your emotional involvement in every decision you make. \n\n\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\tThere was a time when you'd have taken a step back at this thought, wondered where it had come from. What the game wants? How ludicrous. How impossible.\n\n\t\t\t\t\tYou don't ask such questions anymore. \n\t\t\t\t*else \n\t\t\t\t\tWait. What the game wants? \n\n\t\t\t\t\tThe game doesn't want anything. It can't, can it? It's just a game. Someone designed it. They're just trying to create a high stakes situation—and what better way to do this than pitting a bunch of friends against one another? \n\t\t*goto decision \n\t*selectable_if (joshy_pick) #Joshy. @{(Joshy > stat_mid_pass) Reluctantly.|}\n\t\t*set joshy %-small_change \n\t\t*set chosen 2 \n\t\tJoshy is great of course, he's your friend, but sometimes he just seems too perfect. For someone who's supposed to come from a home as broken as yours, sometimes you get the feeling that he should be just a little bit more, you know, fucked up? Instead, he seems to be using all the tragedy of his life as fuel to be artistic and charming. \n\t\t*choice\n\t\t\t#Maybe I'm just jealous.\n\t\t\t\tYeah, maybe. Just jealous.\n\n\t\t\t\tYou note how much work that little word, \"just,\" is doing in there. \n\t\t\t#I'm simply giving him more fuel.\n\t\t\t\tIt's practically a service choosing him. \n\t\t\t#I'm just making excuses because I feel guilty. \n\t\t\t\tAnd that's understandable, isn't it? People gotta do what they gotta do. You know that much. \n\t\t*goto decision \n\t*selectable_if (tommy_pick) #Tommy. @{(Tommy > stat_mid_pass) Reluctantly.|}\n\t\t*label tommy_thoughts\n\t\tTommy is a great kid, but sometimes he's just such a weakling. It gets on your nerves. @{(brave \u003c stat_mid_pass) Sure, you're not the bravest one of the bunch, but Tommy is just too mousy, even for you.|Sometimes you wish you could grab him by the collar and shake some courage into him.}\n\t\t*set tommy %-small_change\n\t\t*set chosen 3\n\t\t*choice\n\t\t\t#Or maybe I'm just making excuses because I feel guilty.\n\t\t\t\t*check_achievements ending  \n\t\t\t\tGuilty for picking the one you consider the weakest. \n\n\t\t\t\tGuilty for picking the only one you could actually hurt. \n\n\t\t\t\tBut that's the game, isn't it? \n\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\tThat's what it wants. An emotional response. \n\n\t\t\t\t\tAnd perhaps making you feel guilty is the best way to involve you, to make sure you remain engaged. After you draw blood for the sake of the game, it won't be easy to disentangle yourself. \n\t\t\t\t*else \n\t\t\t\t\tThis is the kind of behavior it's trying to provoke…. \n\n\t\t\t\t\tNo, listen to yourself. You're attributing too much agency to a game, an inanimate object, something that has no thoughts and feelings. You're projecting all that onto the game yourself. You just have to face it and own up to your choices. \n\t\t\t#And it's not like we're really going to hurt him.\n\t\t\t\t*check_achievements ending \n\t\t\t\tRight? It's just a game.\n\n\t\t\t\t*if choice_achieved_ending\n\t\t\t\t\tYou keep telling yourself that. \n\t\t\t\t*else \n\t\t\t\t\tTommy will be fine. \n\t\t\t*if (brave \u003c stat_mid_pass)\n\t\t\t\t#Perhaps I just see too much of myself in him. \n\t\t\t\t\tAnd that's hard, isn't it? It's not comfortable when people become mirrors of yourself and you don't like what you see. \n\n\t\t\t\t\tBetter smash that mirror and be done. \n\t\t\t*else \n\t\t\t\t#Perhaps this will teach him a lesson. \n\t\t\t\t\tHelp him grow or whatever. Man up?\n\n\t\t\t\t\tUgh. \n\n\t\t\t\t\tDid you come up with this thought, or did the game put it in your head on purpose? \n\n\t\t\t\t\tEither way, you've made up your mind now. \n\t\t*goto decision \n\t*selectable_if (catrina_pick) #${Cat}. @{(Catrina > stat_mid_pass) Reluctantly.|}\n\t\t${Cat} is great and everything, but sometimes you wonder if the tough act is just that, an act. Perhaps this is how you find out. \n\t\t*set catrina %-small_change\n\t\t*set chosen 4\n\t\t*gosub catrina_thoughts\n\t\t*page_break Right\n\t\t*goto decision \n\t*if (options != 4) \n\t\t#I love them all. Let me think through the options. \n\t\t\tIt's an important decision. You can't make it lightly. \n\t\t\t*set tommy %+small_change\n\t\t\t*set catrina %+small_change\n\t\t\t*set joshy %+small_change\n\t\t\t*set maria %+small_change\n\t*selectable_if (self_pick) #I pick myself. Don't want to hurt any of my friends. \n\t\t\t*set self_pick false\n\t\t\tIt's the only real option, isn't it? \n\n\t\t\tYou say so and start making your case. \n\n\t\t\tBut Joshy shakes his head. \"Nah,\" he says. \"No way. If that's how it goes, we would all pick ourselves, and we'd never make a decision. Everyone has to pick someone else.\"\n\n\t\t\tLooks like this won't go your way. \n\t\t\t*goto pick \n*label friend_options \n*if options = 4 \n\n\tThere's nothing more to think about. You have to make a choice. \n\t*goto pick \n*choice \n\t*disable_reuse #Perhaps I should choose Maria.  \n\t\t*set options +1 \n\t\tWhy would you choose her? \n\t\t*choice\n\t\t\t#Because she's my least favorite. \n\t\t\t\t*set maria %-mid_change\n\t\t\t\tYou just don't get along with her as well as you do the others, and you get the impression she doesn't need you as much as the others do. She seems content to do her own thing. \n\t\t\t#Because I think she trusts me enough not to take it the wrong way. \n\t\t\t\t*set maria %+mid_change \n\t\t\t\tIf there's anything that can attest to the strength of a friendship, it's being able to do things that hurt it without breaking it. Maria knows you love her. This won't damage your relationship. You're sure of it. \n\n\t\t\t\tRight? Pretty sure.  \n\t\t\t#Because I don't want to hurt any of the others. \n\t\t\t\t*set joshy %+small_change \n\t\t\t\t*set tommy %+small_change \n\t\t\t\t*set catrina %+small_change \n\t\t\t\t*set maria %-mid_change \n\t\t\t\tIt's as simple as that. You have to pick someone. It might as well be her. \n\t\t\t\t*goto decision \n\t\t*choice\n\t\t\t#Okay, I'll choose Maria.\n\t\t\t\t*goto decision \n\t\t\t#No, not Maria. I know who I'll choose. \n\t\t\t\tIt's obvious now that you think about it. \n\n\t\t\t\tYou know who to pick. \n\t\t\t\t*set maria_pick false \n\t\t\t\t*goto pick \n\t\t\t*if (options \u003c 4) \n\t\t\t\t#Let me think some more. \n\t\t\t\t\tIt's not an easy decision.  \n\t\t\t\t\t*goto friend_options\n\t*disable_reuse #I think maybe Joshy. \n\t\t*set options +1 \n\t\tOkay. Let's think this through. \n\n\t\tWhy would you choose Joshy? \n\t\t*choice \n\t\t\t#Because I'm jealous of him. \n\t\t\t\t*set Joshy %-mid_change \n\t\t\t\tHe's just so confident it's unfair. He comes from a home as broken as yours, and yet he doesn't seem broken at all: he seems stronger for it. Charismatic. As if he's taking the same bad stuff you have to endure and turning it into fuel for creativity and, just, idk. Coolness. \n\n\t\t\t\tThat's a good enough reason to pick him.\n\t\t\t#Because I believe in him. He can take it. \n\t\t\t\t*set Joshy %+mid_change \n\t\t\t\tOf all your friends, Joshy seems the most together. If anyone would be fine with being chosen in this situation, it's him. \n\t\t\t#Because I don't want to hurt any of the others. \n\t\t\t\t*set maria %+small_change \n\t\t\t\t*set tommy %+small_change \n\t\t\t\t*set catrina %+small_change \n\t\t\t\t*set joshy %-mid_change \n\t\t\t\t*set chosen 2\n\t\t\t\tIt's as simple as that. You have to make a decision, and you might as well pick Joshy. There's nothing more to it. Is there? \n\t\t\t\t*goto decision \n\t\t\n\t\tSo? Have you made up your mind? \n\t\t*choice\n\t\t\t#Okay, I'll choose Joshy.  \n\t\t\t\t*set chosen 2\n\t\t\t\t*goto decision \n\t\t\t#No, not Joshy. I know who I'll choose. \n\t\t\t\tPerhaps you're going about this wrong. \n\n\t\t\t\tYou have a better idea.  \n\t\t\t\t*set joshy_pick false \n\t\t\t\t*goto pick \n\t\t\t*if options \u003c 4 \n\t\t\t\t#Let me think some more. \n\t\t\t\t\tSure. It's not a decision to be made lightly. That's what makes the game interesting.  \n\t\t\t\t\t*goto friend_options\n\t*disable_reuse #I wonder if I should choose Tommy.  \n\t\t*set options +1 \n\t\tYou make a mental list of all the reasons you might want to pick him. \n\t\t*choice \n\t\t\t#He's so weak. It gets on my nerves. \n\t\t\t\t*goto tommy_thoughts  \n\t\t\t#He's smart enough to understand my decision. \n\t\t\t\t*set tommy %+mid_change\n\t\t\t\tYou truly believe he won't take it the wrong way. That's just Tommy, isn't it? Always accommodating, always pliable. \n\n\t\t\t\tSometimes it seems like you can do whatever you like at his expense, and he'll thank you for it. \n\t\t\t#I just don't want to hurt any of the others. \n\t\t\t\t*set maria %+small_change \n\t\t\t\t*set joshy %+small_change \n\t\t\t\t*set catrina %+small_change \n\t\t\t\t*set tommy %-mid_change \n\t\t\t\t*set chosen 3\n\t\t\t\tIt's as simple as that.\n\n\t\t\t\t(Though, when you think about it, is there anything simple about that?)\n\t\t\t\t*goto decision \n\t\t*choice\n\t\t\t#Okay, I'll choose Tommy. \n\t\t\t\t*set chosen 3\n\t\t\t\t*goto decision \n\t\t\t#No, not Tommy. I know who I'll choose. \n\t\t\t\tYou have a better idea.  \n\t\t\t\t*set tommy_pick false \n\t\t\t\t*goto pick \n\t\t\t*if options \u003c 4 \n\t\t\t\t#Let me think some more. \n\t\t\t\t\tYes. Let's think. Think think think.  \n\t\t\t\t\t*goto friend_options\n\t*disable_reuse #Okay. Let's consider ${Cat}. \n\t\t*set options +1 \n\t\tWhy would you pick ${cem}? \n\t\t*choice \n\t\t\t#Because I admire ${ceir} resilience. $!{ce}'s tough.  \n\t\t\t\t*set catrina %+mid_change \n\t\t\t\tOr at least that's what you think. Perhaps it's all an act: a tough exterior protecting the softest of cores. \n\t\t\t\t*gosub catrina_thoughts  \n\t\t\t#Because ${ce}'s so abrasive.\n\t\t\t\t*set catrina %-mid_change\n\t\t\t\t$!{ce} rubs you the wrong way sometimes. $!{ce} acts so tough that ${ce} bulldozes over other people and doesn't even notice. Perhaps ${ce} should see what that feels like. \n\t\t\t#Because I'd rather not hurt any of the others. \n\t\t\t\t*set maria %+small_change \n\t\t\t\t*set tommy %+small_change \n\t\t\t\t*set joshy %+small_change \n\t\t\t\t*set catrina %-mid_change \n\t\t\t\t*set chosen 4\n\t\t\t\tIt's as simple as that.\n\t\t\t\t*goto decision \n\t\t*choice\n\t\t\t#Okay, I'll choose ${Cat}. \n\t\t\t\t*set chosen 4\n\t\t\t\t*goto decision \n\t\t\t#No, not ${Cat}. I know who I'll choose. \n\t\t\t\tYou have a better idea. \n\t\t\t\t*set catrina_pick false \n\t\t\t\t*goto pick \n\t\t\t*if options \u003c 4 \n\t\t\t\t#Let me think some more. \n\t\t\t\t\tOf course. This is not a decision you want to make lightly.  \n\t\t\t\t\t*goto friend_options\n*label decision\n\nBefore each one of you casts your vote, you agree that the group must go with the majority. You figure it's the only way to reach a decision. Even the person with the most votes must agree. \n\n\"Are we all on the same page?\" Joshy asks. \n\nYou all nod. \n\n\"Okay then, let's go,\" Joshy says.\n*page_break You Go First\n\n*if chosen = 1 \n\t\"I vote for Maria,\" you say. You look her in the eyes and add: \"I'm sorry.\"\n\n\tMaria gives you a small smile and shrugs, but you can see in her face that she's a little hurt. \"It's all right,\" she says, while her eyes say something else entirely. \"Don't worry about it.\"\n*elseif chosen = 2\n\t\"I vote for Joshy,\" you say. \"Sorry, man,\" you add, looking him in the eyes. \n\n\tAnd Joshy, of course, instead of being mad, beams at you, as if you just paid him a compliment (and maybe you did?). \"Cool,\" he says. \"Thanks.\"\n*elseif chosen = 3\n\t\"I vote for Tommy,\" you say. You say it as softly as you can, but Tommy still acts as if he's been slapped. He takes a step back. He looks away, but you can see his eyes are misting up. \n\n\t\"Okay,\" he says. His voice is small and frightened. \n*else\n\t\"I vote for ${Cat},\" you say. You avoid ${ceir} eyes as you say it, and for good reason.\n\n\t${Cat} takes a step back and acts as if you just punched ${cem} in the chest. \n\n\t\"Well fuck you, man!\" @{(e != \"he\") ($!{ce} calls everyone that.)|${ce} shouts.} \"I vote for you, then.\" $!{ce} crosses ${ceir} arms across ${ceir} torso and looks like ${ce}'s trying very hard not to pout. \n\nNow it's time for the rest of your friends to make their decisions. \n\n*if brave >= stat_hi_pass\n\tTommy votes for you. He avoids looking you in the eye as he says it. Timid as always. \n\n\tJoshy and Maria vote for Tommy. \n\t*set tommy %-small_change \n\t*if chosen = 4 \n\t\t${Cat} votes for you, but you already knew that. \n\n\t\tThat means you and Tommy tie. \n\n\t\tAnd of course you wouldn't let little Tommy bleed in your place, would you?\n\n\t\t\"I volunteer,\" you say. \"I'm it.\" \n\t\t*if self_pick\n\t\t\tAnd before Joshy has a chance to protest again, you raise your hand to stop him. \"It's what I wanted from the start, after all.\"\n\n\t\tEveryone shifts uncomfortably, but nobody argues. \n\n\t\tTommy looks away. You both know he's scared. \"Thank you, ${name},\" he says. His voice is so thin and small you can hardly hear it. \n\t\t*set bled 5 \n\t*else \n\t\t*if chosen = 3 \n\t\t\tThat means Tommy is it, no matter how ${Cat} votes. But  \n\t\t*else \n\t\t\tThat means ${Cat}'s choice might produce a tie. But in the end  \n\t\t${ce} votes for Tommy, too. \"Sorry, man,\" ${ce} says. \n\t\t*set bled 3\n\t*page_break \n*elseif self_centered >= stat_hi_pass\n\tTommy votes for ${Cat}. Joshy votes for you, looking at you square in the face as he says it. And Maria votes for ${Cat}, too. \n\t*set joshy %-small_change \n\t*if chosen = 4\n\n\t\tThat makes three votes for ${Cat} and two for you. \n\t*else \n\t\t${Cat} votes for \n\t\t*if chosen = 2\n\t\t\tTommy. \n\t\t*else \n\t\t\tJoshy. \n\t\t\n\t\tBut it makes no difference. ${Cat} is it. \n\t*set bled 4 \n\t*page_break \n*elseif chaotic >= stat_hi_pass \n\t*if chosen = 4 \n\t\tTommy and Joshy vote for Maria, and Maria votes for Joshy. ${Cat} votes for you, like ${ce} promised. \n\n\t\tThat means Maria is it. \n\t\t*set catrina %-small_change \n\t\t*set bled 1 \n\t*elseif chosen = 1\n\t\tTommy and Joshy side with you, voting for Maria. ${Cat} votes for Joshy, and Maria votes for you, but it makes no difference. \n\n\t\tMaria is it. \n\t\t*set maria %-small_change \n\t\t*set bled 1\n\t*elseif chosen = 2\n\t\tEveryone sides with you, voting for Joshy, and Joshy votes for you.\n\n\t\tThat settles it, then. Joshy it is. \n\t\t*set joshy %-small_change \n\t\t*set bled 2\n\t*else \n\t\tNobody else votes for Tommy. Tommy votes for Maria, ${Cat} and Maria vote for Joshy, and Joshy votes for you.\n\n\t\tThat means Joshy is it. \n\t\t*set joshy %-small_change \n\t\t*set bled 2 \n\t*page_break \n*else \n\t*set bled 3\n\t*if chosen = 4 \n\t\tNo one votes for you except ${Cat}, because ${ce} promised to, and ${Cat} keeps ${ceir} promises. \n\n\t\tBut everybody else votes for Tommy.\n\t\t*set catrina %-small_change \n\t*else \n\t\t*if chosen = 3 \n\t\t\tYou all vote for Tommy. \n\n\t\t\tNobody votes for you at all. \n\t\t*else \n\t\t\tTommy votes the same as you, but everyone else votes for Tommy, so in the end it doesn't make a difference. \n\n\tHow does it feel that @{(chosen = 4) no one else|no one} voted for you?  \n\t*choice \n\t\t#Strange. Like I've been snubbed or something. \n\t\t\tDoes it mean something that none of your friends thought you should be the one to lose? \n\n\t\t\tDo they think you're so fragile that you couldn't take it, or something? \n\n\t\t\tAre they right? \n\t\t#It feels good. My friends don't want to hurt me. \n\t\t\tThey care about you. Right? That's what it means. And that can only be a good thing. \n\t\t*if brave \u003c stat_mid_pass\n\t\t\t#I am relieved. I don't like blood. \n\t\t\t\tIt's not like there's going to be a bloodbath or anything, but you don't want it to be your blood. Even if it's just a tiny amount. \n\t\t#It makes no difference to me. It's just a game.\n\t\t\t*set just_a_game true \n\t\t\t*check_achievements ending \n\t\t\t*if choice_achieved_ending\n\t\t\t\tSometimes I really admire people's capacity for self-deception. \n\n\t\t\t\tNo, really. It's a survival strategy, a coping mechanism. Totally get it. \n\t\t\t*else \n\t\t\t\tYeah! That's the spirit. Just a game. \n\n*if bled = 1\n\t\"Right,\" Maria says. \"Guess I'm the loser.\"\n\n\t${Cat} reaches out and lightly brushes Maria's arm. \"Don't put it like that,\" ${ce} says. \"It's only a game. Everyone had to make a choice.\"\n\n\tMaria pulls away. She seems hurt, but tries to hide it. \"I don't care,\" she says. \"It's fine.\" (It really, really isn't.) \"I get it.\" She pauses and looks around from face to face, lingering briefly over yours. \"So how are we actually gonna do this? Like, what are we using?\"\n*elseif bled = 2 \n\t\"Okay!\" Joshy says, beaming, as if he wasn't just stabbed in the back by his friend. (Which he wasn't. Just chosen to bleed a little.) \"I guess I'm your lamb for the day. Let's get this over with.\" He thrusts his hands together, wrists facing up, as if ready for handcuffs. \"Take me away, officers!\"\n\n\t${Cat} can't help but give a short-lived giggle. \"But wait,\" ${ce} says then, as if just remembering something. \"What are we going to use?\"\n*elseif bled = 3 \n\tTommy's face has gone ashen. @{(chosen = 3) Maybe it's the strange light in this space. Yeah. It's totally the light.|He's terrified, you can see that.} His voice trembles when he speaks. \n\n\t\"Okay,\" Tommy says. He swallows, looks around, shifts his weight from one leg to the other. If he's hurt, he tries to put on a brave face. Unsuccessfully. \"I'm ready.\"\n\n\t\"Wait,\" Maria says. \"What are we going to use?\"\n*elseif bled = 4 \n\t\"Okay,\" ${Cat} says, ${ceir} voice a bit too loud. $!{ce}'s clearly pissed, but ${ce}'s not going to show any kind of weakness in front of all of you. You know ${cem} well enough to know that. \"I guess I lost.\" $!{ce} pauses and looks away. \n\n\tNo one speaks for a few moments. \n\n\t\"Well?\" ${Cat} says. \"Can we get it over with, please?\"\n\n\t\"But,\" Tommy stammers, \"how are we actually going to do this? Does anybody have a…I don't know. Something sharp?\" \n*else \n\tSo. You're up. \n\n\tAll your friends are looking at you now. \n\n\t\"Um…\" Maria starts, then stops herself, tries again. \"Uh, so, I guess. What are we going to use?\"\n\nYou had almost forgotten about it. The knife. It's in your backpack, next to the game, wrapped in a paper towel. It's the only part of the instructions you hadn't shared with your friends. The game didn't tell you to keep it a secret; that was your decision. That was all you. \n\nWhy didn't you tell them? \n*check_achievements ending \n*choice \n\t#I thought it might influence their decision. \n\t\tYou hadn't quite thought through how it might influence them. Might have made the decision more urgent, the danger more palpable. Might even have made you dangerous in their minds, perhaps. \n\t#An ace up my sleeve, I guess. \n\t\tA secret to be revealed when the time was right, or something. \n\n\t\tIt's kinda sad though, if you think about it. You're supposed to be a team. How exactly is a smuggled knife an ace up your sleeve? What were you planning to do with it? \n\t#I was scared. \n\t\t*if brave >= stat_mid_pass\n\t\t\tYou would never admit that to anyone, of course. \n\n\t\t\tBut at least you admit it to yourself. That's something. \n\n\t\t\tCan you also acknowledge what exactly it was you were scared of?  \n\n\t\t\tWas it what you might be asked to do? \n\n\t\t\tOr what you might do without even having been asked? \n\t\t*else \n\t\t\tThat's understandable, isn't it? \n\n\t\t\tNo one would blame you for that. You didn't choose to be the game keeper anyway. You never wanted this. This responsibility, this burden, the weight of that knife in your backpack all day. (Figuratively: the knife itself is actually pretty light.) You never asked for this. \n\t*if choice_achieved_ending\n\t\t#This is an unfair question, coming from you. \n\t\t\tWho, me? \n\t\t\t\n\t\t\tYou are the one who's keeping secrets from your so-called friends. Don't go blaming others for your own choices. Not even me. \n\nBut anyway, the fact is you didn't tell them. And now you must. \n\n\"So…\" Your voice sounds hoarse, so you cough, try again. \"I brought a knife with me.\" \n\n${Cat} shoots you a look so cutting it almost makes the knife unnecessary. \"What?\" \n\n\"It was in the instructions,\" you say with an air of finality. You retrieve the knife from your backpack quickly, to preempt any more questions. \n\nCarefully, you unwrap it. \n\n\"Who has to do it?\" Joshy asks. \n\n*if bled = 1 \n\t\"The instructions didn't say.\" You look at Maria. \"Do you want to do it yourself?\" you ask her, and she nods. \n\n\tShe takes the knife without a word. Quickly, she pricks her index finger and lets a little blood drip onto the sand. \n\n\tHer eyes look distant, as if she's retreated somewhere far away. \n\n\t\"That should do it,\" you say, though what do you know? You don't know. You only hope. \n\n\tGently, you take back the knife. \n*elseif bled = 2\n\t\"It didn't say.\" You pause. \"Maybe you can do it yourself?\"\n\n\tJoshy shrugs. \"Sure,\" he says. He takes the knife from you. He grits his teeth and punctures his index finger, lets a few drops trickle to the ground. \"Think that's enough?\"\n\n\t\"I don't know,\" you say, but you take back the knife anyway. \n*elseif bled = 3\n\tYou hold out the knife to Tommy, hoping he will take it. \"I thought maybe whoever we chose could do it themselves.\" \n\n\tBut Tommy shakes his head. \"No, please,\" he says. \"You have to do it. I can't.\"\n\n\tYou grit your teeth and nod. @{(brave \u003c stat_mid_pass) You hate this.|This is fine. Right? It's only a few drops. Hopefully.} \n\n\tTommy holds out his hand for you, and you prick his index finger with the tip of the knife. \n\n\tYou all watch the blood drip onto the sand. One, two, three drops. \n*elseif bled = 4 \n\t\"The instructions didn't say anything about that.\" \n\n\tYou all look at each other.\n\n\t\"Oh, for fuck's sake, give me that,\" ${Cat} says and grabs the knife. Quickly, ${ce} cuts ${ceir} index finger and lets the blood drip onto the sand. \"There,\" ${ce} says, giving you back the knife after ${ce} wipes it on the leg of ${ceir} jeans. \"Happy?\"\n*else \n\t\"I'll do it myself,\" you say. \n\n\tYou prick your index finger with the tip of the knife. It's just a tiny nick. Doesn't even hurt. \n\n\tYou all watch as a few drops of your blood trickle onto the sand. Then you bring your finger to your mouth. It tastes metallic, and is colder than you would have expected. \n\nIt only takes a few moments, but the shift is palpable as soon as it happens: the door opens with a gasp. The ambience in the room (room, space, world, whatever) changes. The light wanes, and the air—that stilted, suffocating, motionless air—starts circulating again. \n\nThe game has had its blood. You are free to go. \n*page_break \n*set level_1_stats true \nOutside, everything looks the same as before, as if nothing has happened. Students linger in the schoolyard, oblivious to the game, its demands, your decisions, and your anticipation. \n\nYou close the door behind you. None of your friends speaks, and you don't look at each other. Only ${Cat} glances at you furtively, perhaps hoping that you don't notice. \n\nSlowly, together, you climb the hill that leads away from the school, and then you each go your separate ways. \n\nAs you sense the distance between you grow, the game blips with new instructions. \n\nYou take it out and glance at the screen with your breath held. \n\nTomorrow, then. At noon.\n*finish \n*label catrina_thoughts\n*choice \n\t#It's basically a test. \n\t\tA test for ${Cat}, right? \n\n\t\tNot for you. Not for your friendship. \n\t#I'm sure ${Cat} will be fine. \n\t\tIt's not like you're going to hurt ${cem}. Not really. \n\n\t\tMaybe it will be good for you—all of you. \n\t#And if it backfires?\n\t\tIt could. If you're right, and ${Cat} is really hiding a soft core behind that tough exterior, then your choice might really wound ${cem}. \n\n\t\tBut is that such a bad thing? It might allow you to know ${cem} better. $!{ce} might finally let someone in. \n\nIf you think about it, this is the perfect opportunity to explore the resilience of your relationships. A safe, controlled environment with clearly defined rules. \n\nBecause this is a safe environment. Right? Nothing bad is going to happen. \n*return \n", "screenshots": "*label screenshot1\n*set name \"Sam\"\n*set chaotic 75\n*set self_centered 30\n*set brave 60\n*set insight 30\n*set athletics 80\n*set composure 55\n*set level_1_stats false \n*set level_2_stats false\n*set maria 30\n*set joshy 60\n*set catrina 75\n*set tommy 25\nYou started drawing when you were little. You could make up a backstory here, about that favorite uncle/grandmother/schoolteacher who pressed an expensive sketchpad and a bunch of good pencils into your hands one Christmas/birthday/whatever holiday you most cherish now that you're almost, almost an adult, and told you to find your voice, be yourself, express what's in the dustier corners of your weird little heart. \n\nTonight, it's a self-portrait. Charcoal on sepia. \n\nIt's turning out a little strange, though.\n*fake_choice\n\t#My eyes are too big. \n\t#My face doesn't feel like my own.\n\t#My face is a black hole. \n\n*label screenshot2\n*set name \"Rosa\"\n*set chaotic 40\n*set self_centered 20\n*set brave 80\n*set insight 20\n*set athletics 40\n*set composure 80\n*set maria 40\n*set joshy 50\n*set catrina 85\n*set tommy 35\nYou can't remember how young you were when you got hooked on video games. There wasn't much variety back then; it was either a ball bouncing on a moving platform across a black screen or a triangle that your imagination changed into a spaceship shooting at hordes of enemy crafts. But it was enough. \n\nTonight, though, you're playing your favorite. Your guilty little pleasure called:\n*fake_choice \n\t#Afternoon of the Knight. \n\t#Dig! \n\t#Kafka's Builder. \n\t\n*label screenshot3\n*set name \"Arjuna\"\n*set chaotic 40\n*set self_centered 40\n*set brave 60\n*set insight 80\n*set athletics 30\n*set composure 30\n*set maria 70\n*set joshy 25\n*set catrina 20\n*set tommy 80\nYou put away your sepia paper and wait for the old lady to make her way through the store and pick up milk, bubblegum, a book of crosswords, and some fly traps. \n\nSometimes, you look at the objects people select and come up with stories about them. Imagine their lives, their habbits, the things that fill their days: the glass of warm, bubblegum-flavored milk on the worn wooden table, the rolled-up crossword used as a weapon against the horde of flies that are taking over her house. \n\nThen you're alone again. \n*fake_choice \n\t#Time stands still. \n\t#My mind races. \n\t#I listen to the quiet buzzing of the lights. \n\n*label screenshot4\n*set name \"Mary\"\n*set chaotic 30\n*set self_centered 40\n*set brave 80\n*set insight 75\n*set athletics 20\n*set composure 40\n*set level_2_stats true\n*set medic true \n*set machete true \n*set bodycount 5\n*set maria 40\n*set joshy 70\n*set catrina 50\n*set tommy 10\nAs you make your way around one of the barricades, you turn back to look at what you've left behind—half expecting, half hoping the bodies will have faded, magically disappeared the way it happens in video games.\n\nBut they haven't. They're still there, on the ground. Bloodied, eyes open. A witnessing. \n\nBriefly, you wonder who all these people are. Were. Could they be other players like you? Entering from another door somewhere else, in some other part of the world? \n\nYou make a choice then. This is how you'll play this game.\n*fake_choice \n\t#These are enemies. Mustn't see them as people.\n\t#These are people, just like us. Can I be a pacifist here? \n\t#I just need to protect myself as best I can. That's all. \n\n*label screenshot5\n*set name \"George\"\n*set chaotic 20\n*set self_centered 60\n*set brave 90\n*set insight 20\n*set athletics 90\n*set composure 50\n*set level_2_stats true\n*set asset true \n*set gun true \n*set bodycount 2\n*set maria 30\n*set joshy 30\n*set catrina 70\n*set tommy 60\nThe music of the ghosts approaching gets louder. They're closing in on you. They're almost behind you now.\n\nYou keep running, making choice after random choice as you eat your way through the maze. \n\nAnd then, there it is: another fruit. This time, it's a bright, neon-green pear. It's almost ten lights away, and there is a crowd of ghosts between you. \n*fake_choice\n\t#Make a run for it. \n\t#Trick the ghosts and get to the fruit. \n\t#Maybe the ghosts will ignore me if I don't provoke them. \n*finish ", "six": "*temp daughter_surprise \"She surprises you every day: with her mind, her creativity, her kindness. She's yours, and you wonder at her; how can this be your kid? The problem is in the question, of course, and you know it: you don't own her. She's not yours; you're simply fortunate enough to be her parent.\"\n*temp Cat_glows \"Cat glows. He's still his outgoing, adventurous self, but the baby grounds him in a way that suits him. And when your daughter calls him Daddy for the first time, he melts. You've never seen him happier.\"\n*temp vows \"You and your friends made vows to never forget each other, that last day at the seafront, to keep in touch. To reunite every year, every five years, every ten. But months pass and nobody contacts you, and you don't reach out either. Time goes by and plans change, reunions get organized and cancelled. You never see each other again.\"\n*temp haunt false \n*temp alone false \n*if (left) or ((uni) or (city))\n\t*check_achievements escape \n\t*if not (choice_achieved_escape)\n\t\t*achieve escape\n*text_image chap_6.png center REALLY, GAME OVER\n*set level_6_stats true \n\n*if uni \n\n\t*if uni_maria \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\t*set partner \"Maria\"\n\t\t*set pe \"she\"\n\t\t*set peir \"her\"\n\t\t*set pem \"her\"\n\t\t*gosub follow_intro  \n\t\tMaria tries to keep her dream of dancing alive by joining an amateur company. They put on shows occasionally, low-budget productions with people of average talent and a great deal of heart. Eventually she enrolls in an accounting course. She doesn't enjoy it, but it's something to do. \n\n\t\tYou, on the other hand, thrive. \n\n\t\t*gosub professor\n\t\tYou never tell Maria about what the Professor said. What would be the point? The game is in your past now, and you have built a life together. You study hard, get your degree, and then work hard to @{hobby make a living from your art, supplementing your income teaching at a community center|make a name for yourself as a game designer, starting at smaller studios and working your way up|make a career as a literary scholar}. Every once in a while you flirt with the idea of sharing what you know with Maria, until \n\t\t*if romance = 2 \n\t\t\tthe day she tells you she's pregnant. She was always ambivalent about having children, but she knows you've always dreamed of one. \n\n\t\t\tThe news recalibrates your lives completely; you find yourselves absorbed in figuring out how to create a safe and stable home for this child-to-be, \n\t\t*else \n\t\t\tyou become parents to a baby daughter. \n\n\t\t\tThis tiny human recalibrates your lives completely, \n\t\tand all thoughts of the game leave your mind for good. Maria stops dancing; she still goes to her friends' shows, but those evenings become more and more rare, until eventually they cease altogether. \n\t\t*if tommy_ghost\n\n\t\t\t*gosub tommy_bit\n\t\t*page_break \n\t\tWhile your daughter is a baby, your life takes on a feverish, dreamlike quality. ${daughter_surprise}\n\n\t\tYou never visit your parents anymore, but Maria likes to keep in touch with hers, going back a couple times a month. She also gets a job as an accountant's assistant, which often forces her to work late into the night several times a week. \n\n\t\tWhenever Maria is away, you and your daughter have your little ritual: \n\t\t*goto daughter_ending\n\t*elseif tommy_followed \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\t*set partner \"Tommy\"\n\t\t*set pe \"he\"\n\t\t*set peir \"his\"\n\t\t*set pem \"him\"\n\t\t*gosub follow_intro \n\t\tTommy takes a little longer to settle in, but eventually he enrolls in @{(hobby = 3) the same major as you, studying literature|a literature major at the university}. \n\n\t\tTommy struggles unexpectedly, both with his studies and with life away from home. \n\t\t*choice \n\t\t\t#I try not to feel guilty about that. \n\t\t\t\tYou try and fail, and it doesn't actually help that you thrive. \n\t\t\t#I feel terrible about that. It's all my fault. \n\t\t\t\tTommy tells you there's nothing to feel bad about; it was his choice to follow you, and it is his own shortcomings that give him trouble. \n\n\t\t\t\tStill, it doesn't help that you're actually thriving here, perhaps for the first time in your life. \n\t\t\t#I try to be supportive, but he has to find his own way.\n\t\t\t\tYou try to give him the space and time he needs to adjust. Tommy didn't have to struggle as much as the rest of you did back home. It's only natural that it would take him a little longer to settle in. \n\n\t\t\t\tYou, on the other hand, thrive. \n\t\t\n\t\t*gosub professor \n\t\tYou never mention the discussion with the Professor to Tommy. It feels like it might be another thing to carry, perhaps the thing that would finally break him. So you keep putting it off until you graduate, then until you both find jobs, and then you find yourself with a baby daughter that you need to create a safe, stable life for. \n\n\t\tAll thoughts of the game slip your mind when she enters your life. ${daughter_surprise}\n\t\t*label tommy_continue \n\n\t\tYou haven't been back home since you left—home isn't even the right word for the town you left behind. This is your home now; Tommy is, your daughter is—but Tommy goes back to visit his parents regularly. He also teaches night school, which leaves you and your daughter alone several times a week. Whenever Tommy's away, the two of you have your little ritual: \n\t\t*goto daughter_ending \n\t*elseif tommy_uni_same \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\tLife with Tommy is easy, and you find that academia suits you better than you could have ever imagined. \n\n\t\tFor the first time in your life, you thrive. \n\n\t\t*gosub professor \n\t\tFor some reason, you never mention the discussion with the Professor to Tommy. It never feels like a good time, or perhaps you're simply scared. This might be the kind of thing that would throw your domestic bliss out of balance, that would threaten the first good thing you've ever had. \n\n\t\tAnd when your baby daughter enters your life, all thoughts of the game slip your mind completely. \n\n\t\t${daughter_surprise}\n\t\t*goto tommy_continue \n\t*elseif uni_catrina\n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\t*set partner \"Cat\"\n\t\t*set pe \"he\"\n\t\t*set pem \"him\"\n\t\t*set peir \"his\"\n\t\t*gosub follow_intro \n\t\tCat adjusts to city living effortlessly. He makes friends, does three jobs without complaint, and still makes time to spend with you when you're done with school for the day. \n\n\t\tAnd with Cat by your side, for the first time in your life, you thrive. \n\n\t\t*gosub professor \n\t\tYou're not sure why you never tell Cat about that conversation with the Professor, but you don't. You keep putting it off; it's never the right time. And when Cat tells you he's pregnant, after you've graduated and have already started climbing the career ladder like a proper adult, your life suddenly acquires a single focal point. Cat has always wanted a family. @{(romance = 2) And so have you. Everything|So everything} you do now revolves around building a safe, stable home for your baby daughter. \n\t\t*if tommy_ghost \n\n\t\t\tEven Tommy, who is still with you, becomes unobtrusive and distant. Little more than a shadow in the corners of your vision. \n\n\t\t${Cat_glows}\n\n\t\tSo all thought of the game leaves your mind for good.\n\t\t*label cat_continue \n\t\t*page_break \n\t\tWhen your daughter starts school, Cat goes back to working nights at a club, so whenever he's away, the two of you enjoy your little ritual: \n\t\t*goto daughter_ending\n\t*elseif joshy_uni \n\t\t*check_achievements love \n\t\t*if not (choice_achieved_love)\n\t\t\t*achieve love \n\t\t*set partner \"Joshy\"\n\t\t*set pe \"he\"\n\t\t*set peir \"his\"\n\t\t*set pem \"him\"\n\t\tYour university years pass in relative peace. \n\n\t\t*gosub professor\n\t\tYou never tell Joshy what the Professor said. You and he build a sturdy life together. He finishes his medical training, and you @{hobby find work at a community center, teaching older adults to paint|get a job as a game designer at a small studio|find work teaching literature to mature learners at a community college}. \n\n\t\tIt's a mundane existence, but it has its own kind of beauty. \n\t\t*if tommy_ghost\n\t\t\t*gosub tommy_bit \n\t\t\t*page_break \n\t\t*else \n\t\t\tAnd if anything ever feels out of place, thinking about it is not an option. \n\t\t\t*fake_choice \n\t\t\t\t#Everything feels safe. \n\t\t\t\t#I've finally escaped. \n\t\t\t\t#I have everything I need. \n\t\t*if (not ((tommy_dead) and ((lost_friend = 1) or (lost_friend = 4))))\n\t\t\t${vows}\n\t\t*page_break\n\t\tA few years later, \n\t\t*label joshy_continue \n\t\tyou and Joshy find yourselves parents to a little girl. ${daughter_surprise}\n\n\t\tWhen Joshy works late, you and your daughter have your little ritual: \n\t\t*label daughter_ending \n\t\t*if hobby = 1 \n\t\t\tYou take out your sketchbooks, and each of you draws a little something to represent your day, your mood, a dream you've had. Then, halfway through, you trade sketchbooks and complete each other's drawings. She makes your drawings lighter, more playful, infinitely more interesting: she adds wings to your snakes, colors your ghosts neon red and green, hangs baubles on your mournful cypress trees. And you? How do you bring yourself to touch her drawings? How do you bear that responsibility every time: to put your hands on her imagination, spill ink on her inner world, risk infecting her mind's eye with the questionable visions of yours?\n\n\t\t\tAnd yet, somehow, you do it. And somehow it is all right.\n\t\t\t*fake_choice \n\t\t\t\t#Or so I hope. \n\t\t\t\t#For a time. \n\t\t\t\t#We made this happen. \n\t\t*elseif (hobby = 2) \n\t\t\t*if (not (cog_haunted))\n\t\t\t\tYou take out your ancient handheld and play your old favorite game with her. \n\n\t\t\t\tAt first you thought it would be too dark for a child—though weren't you, too, a child when you first played it? And maybe it was dark, but she's managed to twist the game now in ways she likes, making it mean something lighter, happier, more joyous. You've even managed to tweak the game to reflect some of that: \n\t\t\t\t*if dig \n\t\t\t\t\tYour daughter decided that the little bright points at the final levels of [i]Dig![/i] were indeed stars. And then she asked for another level she calls [i]Galaxy Snake[/i], where you become a galaxy, coiling around and around, changing colors as you go, beautiful and star-studded, lighting the Milky Way. \n\t\t\t\t*elseif kafka \n\t\t\t\t\tThe first time she finished the game and the buildings collapsed, she frowned for a moment, but then she turned the handheld upside down and said, \"Look! They go up!\" \n\n\t\t\t\t\tSo you got to work, and eventually you presented her with a version of [i]Kafka's Builder[/i] in which the buildings don't collapse in the end, but instead float upwards, ascending towards an unseen sky. \n\t\t\t\t*else\n\t\t\t\t\tYour daughter asked why the Knight had to endure so much pain for an unclear goal. You tried to explain that it's the motivation that makes the goal meaningful; getting to the end of the game is only valuable if you as the player have a good enough reason for doing so. \n\n\t\t\t\t\t\"But what if you don't want to get to the end?\" she asked. \"What if you are happy to stay where you are?\"\n\n\t\t\t\t\tSo you worked on the game to offer the player an option to not go after the princess at all. To not go through the dark forest. To not have their arms ripped to shreds by thorns. \n\n\t\t\t\t\tIn this new version of the game, the Knight gets to hang out with the NPCs in the base village instead. They build relationships with them, go about making the camp beautiful, and spend time idling, along with their thoughts, tapping a foot on the ground. \n\n\t\t\t\t\tThere are limits to this version of the game, of course, like with any game. Eventually, the NPCs that were built for offering quests and spurring you onwards in your adventure run out of things to say and do. They grow forlorn, then contemplative: the tapster offers uncertain lines about the meaning of life while staring off into nothing, holding an empty glass. The seamstress undoes her work and offers you the shreds of former garments as gifts. The hunting party lie on the ground, their weapons inert by their sides, and fall into a deep depression. \n\n\t\t\t\t\tStill, the Knight retains a certain level of cheer. You've programmed them so that they start whistling along to the chiptune music in the background after a number of seconds of inactivity. It never fails to make your daughter happy, and that is more than enough. \n\t\t\t*else \n\t\t\t\tYou design a video game together. \n\n\t\t\t\tYou've been doing it for years. It's complicated and incoherent, not bound together by a single narrative. It is a Babel of a game, and that's fine—because the point is not to create something perfect, or even functional. The joy is in sharing this creative process with her, in pouring your mutually complementary imaginations into a single well and seeing what comes out. \n\n\t\t\t\tExcept that strange things have been coming out lately, shadowy things, some born from your head and some from your daughter's: haunted houses, crumbling towers. Ghostly hands reaching through keyholes, shadowy things spreading on walls. A sound of digging that neither of you can explain. \n\t\t\t*page_break\n\t\t*else \n\t\t\tYou and your daughter are writing a story together. The process goes like this: \n\n\t\t\tYou write a paragraph, then fold the paper so only the last line is visible and hand it to your daughter, who writes the next and does the same, and on and on. At the end of every week, you read what you've created. The story tends to be nonsensical, but there are always mysterious convergences; coincidences and resonances that become meaningful precisely because they were spontaneously created: a child who always dreamed of flying is granted wings by praying to a creature that lives behind a closed door. A man who thought himself the ugliest person in the world is chosen to have his portrait painted; then, the portrait is discovered to weep tears that heal. A family who have always lived underground dig their way out and discover that the sky is made of soil. \n\t\t\t*page_break \n\t\tBut of course nothing lasts forever. \n\n\t\tYour daughter loses interest in your ritual as she gets older. You find yourselves only devoting a few nights a week to your ritual; then, once every couple of weeks, a month, three months. Your daughter seems grumpier, more irritable; her sunny disposition becomes dampened by a shadow. You try to ask her about it, to make sure she knows she can talk to you, but she deflects all your attempts, denying anything is wrong. \n\t\t*choice \n\t\t\t#It feels foreboding. \n\t\t\t\tYou have a feeling something is wrong. That something bad is going to happen. \n\t\t\t#It feels familiar. I've been where she is. \n\t\t\t\tYou don't have anything concrete to base that feeling on, but feelings are feelings, and you've learned by now that nothing good comes from denying them. \n\t\t\t#I feel helpless. \n\t\t\t\tYou don't know what to do. How to help. If there's even anything to help with; maybe it's just a phase, and she'll come out of it unharmed and happier for it. \n\n\t\tUntil one day your daughter comes back from school, and you notice something different about her. She's even more agitated than usual, but there's something else in it, too, some new excitement, an edge you haven't seen before. You try to talk to her but she cuts you off tersely and shuts herself in her room. \n\n\t\tYou notice her backpack, forgotten by the front door. You go to pick it up, get it back to her, but it falls open as you lift it. \n\n\t\tAnd there it is, inside your child's bag: the dark frame of the game. You pick it up, hold it, stare at its silent green screen. The game you \n\t\t*if bury \n\t\t\tburied \n\t\t*elseif sea \n\t\t\trelinquished to the sea \n\t\t*elseif smash \n\t\t\tdestroyed yourself  \n\t\t*else \n\t\t\tleft behind \n\t\tall those years ago. It's back in your hands. Where it belongs. \n\t\t*goto retry\n\t*else\n\t\t*if (beg_tommy) or (left_tommy)\n\t\t\t*gosub city_alone \n\n\t\t\t*set partner \"Tommy\"\n\t\t\t*set pe \"he\"\n\t\t\t*set pem \"him\"\n\t\t\tYou imagine ${partner} sometimes, and \n\t\t\t*label imagine \n\t\t\twhat life would have been like if you'd been with ${pem}. \n\t\t\t*choice\n\t\t\t\t#What use is this? \n\t\t\t\t\tWhat's done is done, isn't it? You can't turn back time. There are no do-overs. \n\n\t\t\t\t\tSo you get on with it. And otherwise, \n\t\t\t\t#It hurts to think of ${pem}. \n\t\t\t\t\tAnd yet you don't shy away from it. It's like a scab you keep picking, never letting that wound heal. \n\n\t\t\t\t\tBut otherwise, \n\t\t\t\t#Stop this. You always do this. \n\t\t\t\t\tMe? What do I do? \n\n\t\t\t\t\tPut words in your mouth? That's my job, isn't it? All I can do is put words in your mouth, in your head. The rest is all you. \n\n\t\t\t\t\tAnd don't get me wrong. In many ways, \n\t\t*elseif left_catrina \n\t\t\t*gosub city_alone \n\n\t\t\t*set pe \"he\"\n\t\t\t*set pem \"him\"\n\t\t\tYou never see Cat again, except in your imagination and in brief lapses of perception; sometimes you think you see him reflected on shiny surfaces and mirrors. You wonder, then, \n\t\t\t*goto imagine \n\t\t*elseif left_maria \n\t\t\t*gosub city_alone \n\n\t\t\t*set pe \"she\"\n\t\t\t*set pem \"her\"\n\t\t\tYou don't see Maria again before you leave for college, and you don't see her again for years after, either, though sometimes you imagine \n\t\t\t*goto imagine \n\t\t*elseif (joshy_ptsd) and ((joshy_romance) or (joshy_romance_postponed))\n\t\t\t*gosub city_alone\n\n\t\t\t*set pe \"he\"\n\t\t\t*set pem \"him\"\n\t\t\tYou left without seeing Joshy at all, and neither do you see him again for years after. But you imagine him, sometimes, and \n\t\t\t*goto imagine \n\t\t*else \n\t\t\tDon't get me wrong, though. In many ways, here in the city, \n\t\tyou do thrive. \n\n\t\t*gosub professor \n\t\t*check_achievements conspiracy \n\t\t${vows}\n\n\t\tThe other thing you never do is tell anyone what the Professor told you. Who would you tell, @{choice_achieved_conspiracy anyway? You could end up like one of those conspiracy nuts on the Internet, screaming into the electronic void about the horrors that lurk beneath the thin veneer of reality, sure. But what would that achieve|anyway}? Besides, who would believe you if you did? \n\t\t*choice \n\t\t\t#So, instead, I carry on. \n\t\t\t#I try to forget. \n\t\t\t\tYes, you do. How's that going for you? \n\n\t\t\t\tLet me tell you how it goes. \n\t\t\t#Give me more options. \n\t\t\t\tWhat options would you like me to give you? \n\n\t\t\t\tWe've been playing this game for so long, you and I. Don't you know how it works by now? I gave you the only real option you had early on. I was as clear as I could afford to be. Remember? \n\n\t\t\t\tSay yes. \n\t\t\t\t*page_break \n\t\t\n\t\t*if hobby = 2\n\t\t\tYears later, you've made yourself into a successful game designer. \n\n\t\t\tCritics and players alike love your games. They say you design with a sensitivity at once gentle and formidable, playing on your players' hopes while teasing their worst fears. They mean it as a compliment. \n\n\t\t\tBut all you're really doing is work on project after project, trying and failing to replicate the experience of the game you played in your youth—the only one that matters.\n\n\t\t\tYou write the dialogue that your game will speak, but nothing you conjure up ever comes close to what you have in mind; words always fall short. \n\n\t\t\tSo all you've got left is your imagination. \n\n\t\t\tSeated in front of your laptop, you imagine your game morphing into that wild, perfect thing that haunts your dreams. \n\n\t\t\tYou imagine it breaking the fourth wall, reaching out to your player and asking: \n\n\t\t\tPlayer, will you play? \n\n\t\t\tWill you join me now? \n\n\t\t\tWill you say yes? \n\t\t\t*goto retry \n\t\t*else \n\t\t\tEverywhere you go, \n\t\t\t*goto hollow  \n*elseif (stayed) and ((not (trapped)) and (not (logged)))\n\t*if student_guide\n\t\tYou help the kids at your old school as much as you can. \n\n\t\tYear after year, you try to warn them. Most of the time you're too late, and they've already said yes, already decided to play. So you do your best to guide them, help them come out of it, all five on each team. Sometimes you even succeed.\n\n\t\tYou thought it might make you feel better. Help you put everything behind you, give you a purpose. Something greater. A sense of meaning. \n\n\t\tDid it? \n\n\t\t*if tommy_stayed \n\t\t\t*check_achievements love \n\t\t\t*if not (choice_achieved_love)\n\t\t\t\t*achieve love \n\t\t\tTommy  \n\t\t\t*gosub child \n\t\t\tTommy, too, leaves. \n\t\t\t*goto house_continue\n\t\t*elseif catrina_stayed \n\t\t\t*check_achievements love \n\t\t\t*if not (choice_achieved_love)\n\t\t\t\t*achieve love \n\t\t\tCat \n\t\t\t*gosub child \n\t\t\tCat moves away. He wants to make a life for himself in the city. Start fresh. \n\t\t\t*label house_continue \n\n\t\t\tAnd you? You move back to your parents' house, which is now empty. \n\n\t\t\tOr as empty as it could ever be. \n\t\t\t*page_break\n\t\t\t*goto house_ending2\n\t\t*else \n\t\t\t*set alone true\n\t\t\t*goto smalltown\n\t*elseif student_haunt \n\t\tYou never stop trying to help the students. You become the school's resident nuisance, a rambling idiot no one believes. You keep trying to warn them, and year after year you watch them say yes, watch them go in and not come out again. And even then, the students call you names. The parents call the police on you. They call you a crazy person. \n\t\t*choice \n\t\t\t#I don't mind. \n\t\t\t\tWhen did this resignation first set in? Do you remember? \n\n\t\t\t\tYou don't. So maybe I can make it up for you, like we've been doing for some time now, you and I, the two of us.\n\n\t\t\t\tIt was not yet spring. The students had been gone for weeks already. You imagined them trapped in the carnival, inside that beast of moaning steel, screaming until their throats bled. The parents looked for them at first, put up flyers. But then they decided their children had simply run away. \n\t\t\t\t*comment Perhaps you're thinking no parent would ever stop looking for their missing child. Even if they think they ran away, how could they stop looking for their children? Count yourself lucky, Player, if that's you. But these parents, in this fiction, did stop. Ask yourself why. \n\n\t\t\t\tYou spent days standing in front of that door, waiting for the students to come out. You knew that you were the only one they had, even if they didn't know it, even if they didn't believe you. And that's when you accepted that it didn't matter to you whether they did or not. All that mattered was that you did what you could. \n\n\t\t\t\tAnd it felt so calm, like a chill settling in. The comforting embrace of hypothermia, the moment when you stop caring about what you're losing, and you finally let go. \n\n\t\t\t\tSo you wait until the students come out, and then you watch them \n\t\t\t#I rage against them. \n\t\t\t\tYou shout until your voice is hoarse and the metallic taste of blood is in your mouth. You tell them all you know to be true. You even get arrested a few times, spend a few nights in a holding cell under the watchful eye of officers who tell you to sleep the crazy off. \n\n\t\t\t\tAnd still, you stay. You watch the students \n\t\t\t#I try to explain. \n\t\t\t\tYou try and try. You've @{(composure > stat_mid_pass) always been so good with your words, but these days language|never been particularly gifted with words, but this time it's not you. It feels as if it's language that} fails you, and you never seem able to make it say what you want it to, as if words are not made to contain something as vast and shifting as this game.\n\n\t\t\t\tSo you fail, and still you stay. You watch the students \n\t\tmake the same mistakes you did. Watch them go missing one after the other until only a few are left, hollow-eyed and haunted, and then another cohort comes and it all starts agai
