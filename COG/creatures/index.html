hanks to your incompetence. Please, bounce on back to your own base and get out of our hair.\" The local stewards reverse from undressing you to suiting you up.\n\n  #\"Wait, shouldn't I stick around?\"\n    Redhead's stares past your face, \"Fuck, no. You've done enough harm. I'm in charge here, and I've got my own group of tourists to attend to and explain why we're doing this stupid evacuation early thanks to your incompetence. Please, bounce on back to your own base and get out of our hair.\" The local stewards reverse from undressing you to suiting you back up.\n\n  #\"Fine, I'll go back\"\n    Redhead waves at the stewards, \"Finally. Hurry up and bounce on back to your own base and get out of our hair.\" The local stewards reverse from undressing you to suiting you back up.\n\nShe grabs ${MaxAffectionTarget} by the arm and leads ${AffectionTarget_zir} out of the room. ${MaxAffectionTarget} has time to give you a quick wave before leaving. Well, that's it. You'll never see each other again. It's not really the parting you were hoping for, but then what were you hoping for? Just getting to say goodbye?\n*if (AffectionLove = true)\n  Something more? It really couldn't have gone anywhere anyway. You two are in different worlds, different realities.\n*comment endif\n\nAs they latch on a fresh oxygen tank, you contemplate what you did wrong, how it all went so badly.\n\n*fake_choice\n  #\"I wasn't perceptive enough.\"\n    You should have seen this coming: the sickness, the evacuation, the meteoroid storm…the frame-up. You should have recognized that something was going wrong with it, that someone would have to take the blame.\n  #\"I shouldn't have gotten close to ${MaxAffectionTarget}.\"\n    $!{AffectionTarget_zhe} wouldn't have sacrificed ${AffectionTarget_zim}self if you hadn't gotten to know ${AffectionTarget_zim}.\n  #\"I didn't say the right things.\"\n    You could have laid out the case against Maselle better. You can see it now: you could have pulled up videos of Grant's arrival, shown them the records.\n  #\"I can't beat myself up over it: It wasn't preventable.\"\n    But of course, it was. You screwed up so bad that they thought it made sense to pin the problems on you and be done with it.\n*comment endif\n\nThe local stewards finish suiting you up. You screw on the helmet and make the long trip back in silence. The whole way back you contemplate on your massive failure.\n\n*label skip-ahead\n\n*finish Back at Base\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nAt this point in your life, you didn't think you'd be playing glorified tour guide on the moon, but at least you're good at it, and in a few years you'll be able to cash out. They pay pretty well for the isolation, tight living schedules, and the minor bone loss.\n\n\n\nYou sigh into the mirror. New clients today, which is always a stressful unknown. You passingly wonder if you have time to go through character creation in [i]Creatures[/i], but decide better of it. You can be patient; it's just one work cycle until you can game again. At any rate, you'd better get ready. You climb in for a military shower: rinse, turn off water, suds up, then rinse again. A process that would be cold if the bathroom weren't equipped with a heater to keep you warm.\n\n\n\nAs you lather up, you can't help but dwell on the ending of the game. It just seemed so sudden, so without resolution. It's frustrating. You play games to have something happy and positive in your life. This was just... depressing. You deal with that enough in real life: failure, death. So, why did they go with this ending? Why'd they make a game that was unwinnable?\n\n\n\n*fake_choice\n  #They thought it was the most dramatic.\n  #It was a comment on death's inevitability.\n  #They want you to replay to get the better ending.\n  #I could have beat it if I was better at the game.\n*script changeBackgroundColor(\"black\")\n\n\nYour offer of comfort hangs in the air for a long time. The jets stop and the water drains.\n\n\n\nHe finally speaks, \"I just.. I just wanted to get away from things. Sorry that I freaked out back there, and, I mean, I knew I was fine, I knew it would be okay, but I couldn't stop it; I couldn't get hold of myself.\"\n\n\n\nHe slumps down and collapses against the bulkhead, \"It's terrifying, losing control of yourself. I mean, you always think that your mind, your brain, is at least yours. That you can control your mind. But you can't.\" He doesn't mention it, but it must have been extra tough for him in front of his whole team.\n\n\n\nHe digs his hands into his scalp, \"That's the thing. Life is cruel, and it's worse that that kind of panic can just happen at any time.\" He looks down, \"And that's what's so terrifying about it, I think. We hate being reminded of the fact that life is so chaotic. How do people deal with it? The sheer terror of existence?\"\n\n\n\n*fake_choice\n  #We focus on the positives.\n  #We rely on others to keep us strong.\n  #We remember everything else we've overcome.\n  #I have no idea.\n*script changeBackgroundColor(\"sepia\")\n\nYour avatar waves Elegy down a lazily looping figure 8. Your character looks down at the ground, \"Listen, this time together, it's been short, but I've enjoyed getting to know you, getting to be around you. It's been such a blast, and I really want to let you know, I just wanted to tell you...\"\n\n\n\nElegy hovers in front of your avatar, much brighter than normal, \"I know what you mean. I feel so lucky that we got this chance to be together. You're... well, you're a lot more fun than boring X-ray charts.\" Elegy wraps around your character's body, melting into it with a soft, beautiful light. Your character sighs, closes her eyes, and tilts her head back in contentment.\n\n\n\nYou just wish that this moment could last forever. You and Elegy: together. Happy.\n\n\n\n*fake_choice\n  #Regretfully send Elegy away.\n  #Angrily send Elegy away.\n  #Go through the level with Elegy.\n\n\n\nDiana gives up fiddling with the water bag and turns to you, \"Well, it's definitely something that a lot of people are talking about. That ending. But I don't like to dictate to the players what was the right ending or the wrong ending or what should have happened. I let them decide that.\"\n\n\n\nJames contributes helpfully, \"You know, the whole Story Mode mechanic was specifically designed to help with that. You should have seen the test plans for that too - the art, the mechanics, the level flow all had to be tested multiple times on these progressively shortened level set pieces.\" \n\nGrant leans in thoughtfully, delighted to finally be able to hold a normal conversation, \"I've been thinking about that a lot, actually - the fans' reactions to the ending. Certainly, I have an interest in a financially successful game, but even I know that there's more to life than money. If we consider games as art, then does the art's meaning belong to the artist or to the viewer?\"\n\n\n\n*fake_choice\n  #The artist: it's a distillation of their thoughts and feelings.\n  #The viewer: it allows for personal interpretations.\n  #Both, equally.\n\n", "self-choice": "*comment Second part of the game\n\n*comment   *goto skip-ahead\n\nYou wake up and unstrap yourself from the bed before stumble-bouncing into the small bathroom. Your stomach is still in knots over that ending. It was a total existential punch in the gut, and now you're supposed to go out there and wow a bunch of snot-nosed tourists? You moan and stare into your mirror, really looking at yourself. Is this who you really are?\n\n*fake_choice\n\n  #A young…\n    *set age \"young\"\n\n  #A thirty-something…\n    *set age \"thirty\"\n\n  #A middle-aged…\n    *set age \"middle\"\n\n  #An older…\n    *set age \"older\"\n\n  #A near-retirement…\n    *set age \"older\"\n\n*fake_choice\n\n  #…East Asian…\n  #…West Asian…\n  #…Middle Eastern…\n  #…Northern African…\n  #…Southern/Central African…\n  #…Southern/Central American…\n  #…North American…\n  #…European…\n  #…Multi-national…\n  #…[other region]…\n    (What do you feel reflects your ancestry? Insert as many as desired, separated by commas.)\n    *input_text race\n    (Gotcha.)\n\n*fake_choice\n\n  #…cis man.\n    *set trans false\n    *set gender \"male\"\n\n  #…cis woman.\n    *set trans false\n    *set gender \"female\"\n\n  #…trans man.\n    *set trans true\n    *set gender \"male\"\n\n  #…trans woman.\n    *set trans true\n    *set gender \"female\"\n\n  #…person.\n    *set OtherGender true\n    *set trans true\n    *set gender \"person\"\n\n  #…[other gender].\n    *set OtherGender true\n    *set trans true\n    (What gender do you identify with?)\n    *input_text gender\n    (Gotcha.)\n \nAt this point in your life, you didn't think you'd be playing glorified tour guide on the moon, but at least you're good at it, and in a few years you'll be able to cash out. They pay pretty well for the isolation, tight living schedules, and the minor bone loss.\n\nYou sigh into the mirror. New clients today, which is always a stressful unknown. You passingly wonder if you have time to go through character creation in [i]Creatures[/i], but decide better of it. You can be patient; it's just one work cycle until you can game again. At any rate, you'd better get ready. You climb in for a military shower: rinse, turn off water, suds up, then rinse again. A process that would be cold if the bathroom weren't equipped with a heater to keep you warm.\n\nAs you lather up, you can't help but dwell on the ending of the game. It just seemed so sudden, so without resolution. It's frustrating. You play games to have something happy and positive in your life. This was just…depressing. You deal with that enough in real life: failure, death. So, why did they go with this ending? Why did they make a game that was unwinnable?\n\n*fake_choice\n  #They thought it was the most dramatic.\n    They wanted to make a game that would stick with you, that would keep you thinking about it, dwelling on it. They intentionally wanted to cause you turmoil, to make you invested in the game and then pull one of these kind of tricks on you. But, it worked. You can't stop thinking about it. Maybe this was supposed to be the encouragement they wanted so that you'd convince yourself to replay it, to go back and make things better.\n\n  #It was a comment on death's inevitability.\n    What a cheap trick to get through to you about the cruelty, the inevitability, the omnipotence of death. Not even zombies or ghosts can escape it. They were luring you in with a false sense of security, encouraging you to get attached to Elegy, and then had always planned to yank Elegy away. To remind you that one day you too will be yanked away. What dickbags: you don't need that kind of reminder.\n\n  #They want you to replay to get the better ending.\n    What a cheap trick to get you to engage in their Story Mode mechanics. To encourage and sustain replayability for what is otherwise a very linear and single-path game. And it's working. You can already feel yourself itching to play it over again, to start from the beginning and set things right.\n\n  #I could have beat it if I was better at the game.\n    The guards were just too tough, but if you practiced, if you were better at the timing, better at the movement, you could have beat them. It's your fault. But, you can get better at it. You can replay the level and get the real ending.\n\nYou rinse yourself off and step out to air dry in the warmth of the heater, still turning the ending over in your mind. Someone set out to make a game that was intentionally designed to put you through this kind of internal turmoil. Even if it's fixable, you sunk hours and hours into an experience that left you feeling depressed. That's not what you paid for.\n\n*choice\n  #They should have written a better ending.\n    *set InitialAnimosity true\n    I mean, there are endings that are meaningful and then there are endings that feel satisfying. And it's tempting to go for the meaningful ending, but it doesn't make for a good ending. Not when you get personally invested in the characters. Well, there must be a way to make it better.\n    *goto NextTime\n\n  #They should have balanced combat better.\n    *set InitialAnimosity true\n    Or at least, the game should have warned you that you weren't hitting a scripted failure, that you were expected to learn how to play without Elegy. You would have practiced that more, if you had known.\n    *goto NextTime\n\n  #Although, at least it was an ending that was actually interesting.\n    You've been dwelling on it for this long. Maybe that's what they intended? For it to make this kind of emotional impact? But even if that's what they intended, it feels pretty hollow. It doesn't feel satisfying. It feels like they made it to enjoy themselves, not for others to enjoy the result. Well.\n    *goto NextTime\n\n  #And maybe you'll get a better ending from replaying in Story Mode.\n    This time, you'll have the benefit of experience. You've got the mechanics better, you can avoid dead-end choices. It might even only be winnable in Story Mode, although that would be weird if it were true. Oh well.\n    *goto NextTime\n\n\n*label NextTime\nIt will go better next time.\n\nYou shake yourself out of the introspection and focus on the here and now: getting ready. It just seems so mundane. Doing the same thing day after day just to stay in place. Bending yourself over backwards for this endless stream of disaffected tourists. Does it really matter? Well, of course it matters. It matters to you, to them, and very much to Spacejoy. Every day you bring your best. Every day you are your best.\n\nYou glance over at the makeup box.\n*if (gender = \"male\")\n  As Director of Activities, the company prioritizes materials that make you look more \"professional,\" as a fashion-forward sort of guy.\n*if (gender != \"male\")\n  As Director of Activities, the company prioritizes materials that make you look more \"professional.\"\nIt's a privilege that many of your coworkers aren't afforded, so you're always split between not squandering it and not flaunting it.\n\n*label makeup-choice\n\n*fake_choice\n  #No makeup.\n    You've long ago accepted that beauty is a state of mind. The tourists pay attention to your attitude, not your appearance. And your attitude will keep them dazzled and delighted.\n\n  #Natural tones.\n    It always feels a bit like doing art restoration. Just minor concealer to hide the flaws, highlights to emphasize the features that work: minor shifts in emphasis, but nothing too gaudy. The kinds of changes that you wish you could make in your own life.\n\n  #Exciting lines.\n    You add some dramatically extended lines to your eyes. It's always a fun way to make a first impression and it makes you feel more confident. You mess up one of the lines, have to wipe it away and try again, but that's life, isn't it? The second attempt turns out much better.\n\n  #Exciting colors.\n    You brighten up your eyes a tad and heavily color your lips. You emphasize the blush and bronzer. It always helps set the mood of a fun and exciting atmosphere, and makes you feel more confident.\n\n  #Extra flair.\n    You put in some fun lines and colors, but draw some extra attention to your eyes by adding little freckles of colors below and to the side of your eyes. Perfect. Extravagant styles always make guests feel like they're in a more futuristic environment.\n\nYou look at yourself one last time in the mirror. You smile. Seeing yourself so put together helps reassure you. You're doing pretty well with your life, when it comes down to it. Maybe you're not doing what you originally wanted, but your job's important to you. And you're good at it. One of the best. You adjust your hair, then head on out. Maybe this week will be better.\n\n*label skip-ahead\n\n*finish Time to Shine\n", "startup": "*comment First part of the game.\n\n*title Creatures Such as We\n*author Lynnea Glasser\n*scene_list\n  startup\n  self-choice\n  day1-arrival\n  day1-lunch\n  day1-luggage\n  day1-afternoon\n  day1-dinner\n  creatures\n  day2-breakfast\n  day2-moonwalk\n  creatures-act2\n  day2-lunch\n  day2-exercise\n  path-evacuate\n  finale\n  newending\n\n*create name \"blank\"\n\n*create age \"blank\"\n*create race \"blank\"\n*create gender \"blank\"\n*create trans true\n*create OtherGender false\n*create pronounZhe \"zhe\"\n*create pronounZir \"zir\"\n\n*create oldProfession \"none\"\n*create InitialAnimosity false\n\n*create CreaturesProgress \"none\"\n*create UndeadIntroPlayed false\n\n*create zombie_zhe \"zhe\"\n*create zombie_zir \"zir\"\n*create zombie_zim \"zim\"\n\n*create elegy_zhe \"zhe\"\n*create elegy_zir \"zir\"\n*create elegy_zim \"zim\"\n*create elegyProfession \"medic\"\n\n*create ElegyGone false\n\n*create leadAffection 5\n*create writerAffection 5\n*create QAAffection 5\n*create programmerAffection 5\n*create artistAffection 5\n*create consultantAffection 5\n*create NobodyAffection 5\n\n*create fanSelfID false\n*create escortSick false\n*create pipePromise false\n\n*create helptarget \"nobody\"\n*create helptarget_zhe \"zhe\"\n*create helptarget_zir \"zir\"\n*create helptarget_zim \"zim\"\n\n*create MaxAffectionTarget \"nobody\"\n*create AffectionTarget_zhe \"zhe\"\n*create AffectionTarget_zir \"zir\"\n*create AffectionTarget_zim \"zim\"\n*create AffectionLove false\n\n*create Villain \"nobody\"\n*create villain_zhe \"zhe\"\n*create villain_zir \"zir\"\n*create villain_zim \"zim\"\n\n*create AndresLove false\n*create DianaLove false\n*create JamesLove false\n*create SadriLove false\n*create RenLove false\n*create GrantLove false\n\n*create ProjectAsked false\n*create SynthSupported false\n*create SynthDenied false\n\n*create washed false\n\n*create touristsKnowSickness false\n\n*create YouHavePoison false\n*create StewardHasPoison false\n\n*create SynthHated false\n\n*comment: artist, viewer, none\n*create ArtIsFor \"nobody\"\n\n*comment *image CSAWpic.jpg\n*comment *goto skip-ahead\n\n*if (choice_is_web) or (choice_is_steam)\n  *image spacejoy.jpg\n\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  [i]Creatures Such as We[/i] is a philosophical interactive romance novel by Lynnea Glasser, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n  Living on the moon is lonely, and stressful, and exhausting. Video games have always offered you an escape to a better life. The easy, happy life you wish you had. Which makes it so frustrating when the game you've been playing ends badly. But you have a chance to figure it out, because the next tourist group is the designers. You can debate with them about art, inspire them with the beauty of outer space, get closer to any one specific designer in particular, and finally find out how to get the ending you always wanted.\n\n  Awarded Second Place in the 20th Annual Interactive Fiction Competition (IFComp)[n/]\n  \"You absolutely need to play through [i]Creatures Such as We[/i]\" -- Leigh Alexander[n/]\n  \"Well-paced and richly written\" -- Emily Short[n/]\n  \"I couldn't tear myself away\" -- Game Theory Podcast\n\n  • Immerse in the beautiful setting of a moon-bound tourist destination a tourist destination.[n/]\n  • Explore the meaning of gaming as a form of artistic expression with a cast of game designers.[n/]\n  • Inspire profound discussions, courage, and even love with the visiting space tourists.[n/]\n  • Six unique character paths, with options to be romantic or maintain strict professionalism.[n/]\n  • Play both your character, and the character of the game-within-a-game.[n/]\n  • Decide for yourself the best way to bridge the gap between game players and designers.[n/]\n  • Inclusive options for gender identity, orientation, race, and age.\n\n  *if choice_is_steam\n    *if choice_prerelease\n      [i]You can play the first part of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n      *choice\n        #Sign up to be notified when the game is available.\n          *subscribe {\"now\": true}\n          *restart\n        #Play the first part now for free.\n          *goto purchased\n\n    [i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]Creatures Such as We[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n      \n      *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n      *page_break_advertisement\n\n      *goto purchased\n    *else\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n\n*label purchased\n\nStrolling through the final airlock, you feel satisfied that the facility's in order: the spacesuits are starched, the moon rocks are neatly arranged, and you personally checked that every stateroom is in perfect condition. Twice. Tomorrow's going to go great, and you're finally off the clock. You look back one last time anyway. Time between tourist stays always make you nervous: it feels difficult justifying your non-existent workload while everyone else still has regular maintenance duties.\n\nCompounding the lull in responsibilities has been the temptation of finishing the final level of [i]Creatures Such as We[/i]. Will you wipe out the last of the Traditionalists, or will Lauress elude your grasp at the last minute? Will you and Elegy have a happily ever after? The anticipation is giddily maddening. You hear chatty banter as you approach the passageway to the crew common area and laughter as you pass it. You hurry along. You're about to save the day, be the hero, put everything together.\n\n\n*choice\n  #You wish life was that simple.\n    *set washed true\n\n    You wash your face with astringent and brush your teeth with the smallest dab of toothpaste, rinsing with as little water as you can spare. It's so much work, so much sacrifice, living up on the moon. Living anywhere, really. Life is hard, and it's nice to play a story where it's not. Where everything is simple and easy. It's calming, reassuring. Makes all the sacrifice, all the strife feel worthwhile.\n\n    *goto PlayGames\n\n  #You enjoy the escapism.\n    *set washed true\n    You close your eyes and brush your teeth with the smallest dab of toothpaste, thinking on the digital world, where the colors are sharp, your purpose is clear, your name respected, and you never have to deal with annoyances like cramped quarters, monthly bone treatments, or strict water restrictions. You rinse with the smallest swig of water you can manage and wipe your face with astringent.\n\n    *goto PlayGames\n\n  #You just enjoy experiencing the story.\n    *set washed true\n    It'll be exciting to see where it all goes next. You hum as you wash your face with astringent and brush your teeth with the smallest dab of toothpaste, rinsing with as little water as you can. It feels like a soothing part of your gaming preparation ritual: the purification of self, the removal of distractions. The ability to just fully immerse yourself in the experience makes everything else feel that much better.\n\n    *goto PlayGames\n\n  #You can't wait to launch right in.\n    *label PlayGames\n    You set your walkie-talkie down on a nearby drawer, and lean back against the chair backing at the foot of your bed. You close your eyes as [i]Creatures[/i] boots up. The loading music alone just melts the mundane away. It's delicious.\n\n    Your ashen undead avatar walks towards the rubble as your ghost companion Elegy scouts ahead. These ruins are all that's left of your former base: a casualty to the crusade of Traditionalists and internal treachery. Elegy perks at something, then flits back and enters your body. The screen sparkles blue and the GUI updates as your powers mingle. Thanks to heightened senses, you are now aware of the nearby enemy guard. The first one is always the easiest, of course, but the combat will cascade into a heavy hack-and-slash. This is going to be fun. What's your preferred combat style?\n\n    *fake_choice\n\n      #Guns.\n        Your avatar unslings a rifle, and as you aim, the ghost's powers allow you to accurately account for everything from your target's trajectory to the air currents along the path. You aim, fire, hit. Elegy commends your character on a beautiful headshot. It was clean, but loud. An alarm sounds. They know you're here.\n\n      #Stealth melee.\n        Your avatar unsheathes two large daggers as the ghost enshrouds it in an unnoticeable cloud of apathy. You sneak right up to the guard and make your move: unnaturally silent, instantly deadly. The guard slumps before even making a sound. Elegy commends your character on such professionalism. No alarm sounds. You still have the element of surprise.\n\n      #Biting and clawing.\n        You propel your avatar faster than physically possible, bounding towards the target on all fours. She sees you coming, and hits an alarm. She reaches for a weapon next, but it's already too late. You leap into the air as your character's maw and claws are magically enhanced. You tear your target apart with visceral power. Elegy delights with your character at the ruthlessness.\n\n      #Channel ghost powers.\n        Elegy delights in helping channel ethereal power into flaming balls of energy, which your avatar flings at the guard. She slams against a wall and crumples. An alarm sounds. They know you're here.\n        \nYou progress through the compound, dispatching more and more guards. You pass piles of undead corpses and ectoplasmic ash: evidence of their cruel conquer. You will make sure this never happens again. Your mastery of the controls is an unstoppable force that leaves none alive. And then, in a flurry of magically enhanced efficiency, you are there: the command center. The final boss chamber. Your avatar's arrival interrupts a woman who was tapping away at a console from behind her personal glass blast shield. She turns to you as you enter, to give \"the speech\" and you smirk in preparation:\n\n\"I…I am sorry, so sorry for the what you have become. I should have been better, I should have been stronger about stopping it. I failed you, I failed you all. After…after my son, I realized how much time I had wasted with speeches, with words. I had to take real action. So I'm here, saving humanity. Saving it against your kind. And I know you're still human in there, somewhere. Please, stop this. Let humanity resurface. Stop being the monster.\" That was not exactly what you expected.\n\nYou're given options on how to respond.\n\n*choice\n\n  #(Just attack.)\n    Resolution, revenge. You just know that that her death will put things right, and the faster that happens, the faster you'll reach the positive ending. With supernatural speed and strength, you propel yourself up pipes, up scaffolds. Soon, she will be in reach.  \n    *goto hang-head\n\n  #Taunt her.\n    Such indignant self-righteousness from the villain. You can one-up that. Your avatar shouts, \"You hunted my kind, you murdered your own son; you are just another bigot holding back progress. You're the monster!\"\n    *goto hang-head \n\n  #Ask for sympathy.\n    There may you be a chance to talk this out, to stop this pointless feud. Your avatar pauses and addresses Lauress, \"I understand that someone like me, with my skin, my change in physiology, can be scary. But I am happy this way. Others who have chosen to change, we're happy this way. Please, just can't you accept us how we are? We don't do anyone any harm.\" \n\n    You roll your eyes. No way she'll listen to that.\n\n    She laughs. \"You think this isn't something I've heard hundreds of times in debates? You monsters seem to think that you're special, you're each unique. But you're all the same: demonic, evil destroyers of humanity. You need to be stopped. And that burden falls to me.\" Well, you tried.\n    *goto hang-head\n\n  #Offer to talk things out.\n    Your avatar takes a few steps forward at walking speed. \"Listen, I want to end the bloodshed, the pointless feud. Would you agree to a truce, an agreement, even just a plain ceasefire? Let us work together towards peace.\"\n    *goto peace\n\n  #Offer to join her.\n    \"I…I agree with you.\" your avatar stammers out, \"Can I work for you? I'd like to absolve myself of my condition.\"\n\n    She is understandably skeptical, \"You want to join us? This is…well, one of you finally realizes what needs to happen.\" She steps backwards, \"But forgive me if I don't believe you right away, since you murdered your way in. Why exactly do you want to join our resistance?\"\n\n    *fake_choice\n\n      #I'm disgusted with myself.\n        Your avatar continues, \"It's a burden, you know, being a monster. I hate it. But I can't go back. I want to put things right, to stop others from becoming the monster I see every day in the mirror.\" She seems genuinely touched, \"I know. But part of that means having to let go…and that's what I'm going to have to help you do right now.\"\n\n      #I just want the violence to stop.\n\n        *label peace\n\n        She sighs at this, \"Very noble. But unfortunately, that can really only be achieved when your kind is all dead. I'm sorry that you brought this on yourself.\"\n        *goto hang-head\n\n      #I just want chaos.\n        Your avatar continues, \"I don't really care which side I'm on, or who I'm fighting for. I just live for the thrill of the chase. I'll join you because it's fun destroying things.\"\n\n        Lauress bursts out laughing. You are impressed by how genuine-sounding her laugh is. You make a note to look up the voice actor later. \"Why, then, would I ever trust you? No. I'm afraid there's only one way to deal with this.\"\n\n      #I don't actually, I just wanted to hear what you'd say.\n        She seems taken aback by this, then quickly regains her composure, \"Hmph. I should have known not to let myself give way to hope that you could actually be reached.\"\n                \n*label hang-head\n\nShe hangs her head, and quietly pulls out a small remote device that she points at some nearby electronics. She presses a button, and strange lights and noises fill the room. They hurt your ears, so you turn the headphone volume down a bit. The ghost companion floats forward, howling in agony, and then freezes in front of your avatar. \n\nThe noise, the light: it's Elegy's resonance frequency. But, how? They're supposed to be so specific, as to be impossible to discover. The traitor. It must be the traitor who gave Elegy's frequency to them. Oh man, you haven't found the traitor yet. They must be the final boss, or maybe a teaser for a sequel?\n\nLauress turns to you. \"You know what is happening. Turn yourself over, allow yourself to be destroyed, and I will turn this off. The ghost will be saved from eternal dissolution.\"\n\n*fake_choice\n\n  #Turn yourself over.\n    Elegy has saved you from death countless times; it's the right thing to do. Plus, you're pretty sure that if you take the route of self-sacrifice on behalf of your ghost, you'll get a more romantically fulfilling ending. Your character allows two monstrous guards to cage you, and as she dutifully turns off the device, Lauress turns with a cruel grin back to you.\n\n    \"Thank you for making the right decision. But didn't you ever wonder how we got in, how your friend here managed to save your life so often?\" Realization dawns on both yourself and your avatar simultaneously. The villain gestures at Elegy and states the obvious, \"It gave us information in exchange for your life. You know: the access codes, its resonance frequency.\" She chides, \"Pity that you threw your end of the bargain away.\"\n\n  #Attack Lauress.\n    *goto attack-fail\n\n  #Attack the equipment.\n    *label attack-fail\n    Without the additional help of your ghostly powers, you're as slow and sluggish as a regular, untrained human. Your avatar makes it a few feet before two monstrous guards pop out. You attempt to fight them, but your unassisted combat skills are subpar. You only manage to get one to half health by the time they beat you, stun you, and drag you over to a cage on the command of Lauress.\n\n    \"How brave of you, ghostwhisperer. Pity you're no match for my Zourobras guard. Now tell me, didn't you ever wonder how we got in, how you managed to have such a knack for staying alive?\" Realization dawns on both yourself and your avatar simultaneously. The villain gestures at Elegy and states the obvious, \"It traded your life for information: the access codes, its resonance frequency.\" She chides, \"Pity that you threw your end of the bargain away.\"\n\nBetrayal. Elegy betrayed everyone, for you. It's your fault, Elegy's fault. Your avatar turns to the ghost.\n\n*fake_choice\n  #Why did you do it?\n    Your character's voice cracks and trails off in a sad whisper,\n    *goto SomethingWrong\n\n  #I'm sorry it had to end like this\n    Your character's voice cracks and trails off in a sad whisper,\n    *goto SomethingWrong\n\n  #You shouldn't have done it\n    Your avatar kneels in resignation,\n    *goto SomethingWrong\n\n  #I forgive you\n    Your avatar bows with clear absolution,\n    *goto SomethingWrong\n\n  #I can't forgive you\n    Your avatar looks down, away from Elegy,\n    *goto SomethingWrong\n\n  #Fuck you, ghost\n    Your avatar thrashes against the Zourobras guards to put enough volume and force behind the words,\n    *goto SomethingWrong\n*label SomethingWrong\nbut then the camera pans out and the audio fades: something is wrong. The camera immediately zooms back in on Elegy, still vibrating, more furiously than ever. \"Is it…\" Lauress leans towards it incredulously.\n\nA bright flash! \n\nTime warps to a near stop. For a brief moment, Elegy solidifies into a human shape and turns to your character. A sad, pale blue figure, it mouths [i]sorry[/i], and then closes its eyes. Time snaps back, and your companion condenses into a miniature black hole. Or at least, that's what the pulsing energy sphere pulling everything into itself reminds you of. Your avatar's body rag dolls against the side of the cage. The guards are sucked in. Lauress is pulled towards it, but she has the fortitude to grab some nearby pipes and scream.\n\nBut even the words are pulled into the void as the camera wipes to darkness.\n\nOver the darkness, with accompanying flash-forwards, your character narrates aloud what will happen next, \"They'll give me an award for this. They'll rebuild, put me in charge out of pity. But it won't mean anything. It won't mean anything without Elegy. I just wish…I wish I could go back and redo it all.…\" A cut-scene triggers, focusing on your outstretching hands. They clench into a fist before the camera pans to catch the black hole thing as it dissipates. Then the game fades out to black and the credits start rolling.\n\nWait, what? They can't have killed Elegy, just like that. You must have done something wrong. Something preventable. You've been a fan of the Cullected Games studio for a while now, and you've never known them to pull a dick move like this. So what was it?\n\n*fake_choice\n\n  #I should have been better at combat.\n    There were several points where you failed at combat, but the game let you continue anyway. It was those points, that's where you messed up. You should have worked harder, been better. You just weren't good enough to get the good ending. But then how could you ever win with Hard Mode? Without any ghost powers? You'd have to be a god.\n\n  #I should have sent Elegy away.\n    There were several places where you could send Elegy away, that might have been it. Maybe Elegy can only be saved if you switch the game to Hard Mode without the assistance of ghost powers. Of course, there might be some sort of affection threshold, before or after which Elegy refuses to go away. Or Elegy might just refuse no matter what you do.\n\n  #I didn't say the right things to Lauress.\n    There were other opportunities to speak to her, maybe to convince her to change sides, maybe to get to her some other way. You didn't really pursue those well enough during the rest of the game. There was probably some sort of decision counter and you should have been more consistent with how you dealt with her.\n\n  #It was not preventable.\n    Probably one of the designers really felt that this would be the most emotionally impacting ending that fit into some kind of hero's journey narrative. They probably went with it even if fans would hate it, to be true to the \"story\". What a bunch of bullshit. Although, now that you think about it, why include the Story Mode? Maybe they realized that players would fuck it up and created this as an easy way to replay the content and un-fuck yourself.\n\nYou'll find the way to fix it. You've unlocked Story Mode, which you're more and more certain is a sign that replay towards the good ending is encouraged.\n\n*if washed = true\n  You power down the device and push the computer back up against a wall. You get into the covers and turn it over in your head more. Maybe this internal conflict is the response that the designers wanted? But it doesn't feel satisfying; it doesn't feel right. You just wanted a good ending. As you velcro up your blanket, you wish that your scheduled internet browsing time wasn't a week away. You'd really like to look up the answer.\n*if washed = false\n  You power down the device. You sit in bed for a few minutes before getting up to go to wash your face and brush your teeth. What went wrong? Maybe this internal conflict is the response that the designers wanted. But it doesn't feel satisfying; it doesn't feel right. You just wanted a good ending. As you velcro up your blanket, you wish that your scheduled internet browsing time wasn't a week away. You'd really like to look up the answer.\n\n*label skip-ahead\n\n*finish Sleep until Tomorrow\n"}};
