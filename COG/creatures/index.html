otal farce. It would be fun watch those together.\n\n      #Ren.\n        She does have a pretty cute smile. And you appreciate her passion for beauty: the person who created the new standard for spirit worlds must be amazing herself. You wish it wasn't so hard to reach her, but then again, you know what it's like to get sucked up into your own world, to let reality fall by the wayside. You also wonder what game she's always swiping at. You'll have to ask her about it some time. Maybe it's even compatible with your walkie-talkie.\n\n      #Grant.\n        He does have a pretty cute smile. Well, you certainly hope he gets better, he seems like a nice enough fellow. Although, maybe his pleasantry is just a face he wears, like you wear your face. Oh! Maybe he knows that you're just putting on a face too, and understands. It must be stressful for him to be excluded from everyone else.\n\n      #Just them all, in general.\n        It's really cool having them aboard, it's been a long time since you've had guests that actually had interesting conversations. That thought sinks in. It's been months (maybe a year?) since you've been able to have an interesting conversation. Ouch.\n\n        And of course, their games are just awesome. You finally have the chance to ask them about their process. You've always wondered why they gave vampires blood-leeching hands instead of the iconic fangs in [i]Fleshweavers[/i]. What did they think it added? Or was it just something they changed to make their vampires unique? You can actually find out.\n\n    *goto mindWanderMerge1\n\n  #About my life.\n    It's not a terrible life, all things considered. You've had to forgo a lot of typical comforts in life for your term here, but once you return Earthside, you'll be able to more than make up for it. And you're patient. Plus, it's nice to get some distance from…everything. Although, well, it does get tiring how your life feels like it resets each week when a new group of people arrives. It would be nice to get some more permanency in your life. There's one more things that video games have going for them: at least those save your progress.\n    *goto mindWanderMerge1\n\n  #About my job.\n    It's not a terrible job, all things considered. You've managed to adapt to all-hours on-call duty, limited internet, and even the never-changing scenery. It is a bit lonely, what with the rest of the stewards being tasked with basic maintenance, while you spend all your time focusing on the tourists.\n\n    Really the worst thing is how incredibly repetitive it all feels. You do an amazing job and show a group of people around the moon—really make space sparkle for them—and then you never see them again. It just resets with a new group of people. And, you just wish you could get some more permanency in your life. There's one more thing that video games have going for them: at least those save your progress.\n    *goto mindWanderMerge1\n\n  *if (playingCreatures = true) #About saving Elegy.\n    You're pretty sure that the devs were pushing the Story Mode on you for a reason. There must be a way for you to save Elegy. There must be something you can do differently, maybe there's something you learned that makes more sense now, something you can know to avoid. You certainly hope you don't fuck it up, otherwise this is going to feel really shitty.\n    *goto mindWanderMerge1\n\n  #I try my best to just keep a clear mind.\n    'My mind is clear. My mind is free. I melt into my surroundings, listening to each sound, absorbing each sensation,' you internally chant to yourself. The technique always makes you feel better, and you can already feel your worries melting away. Your focus sharpens.\n    *goto mindWanderMerge1\n\n*label mindWanderMerge1\n\n*if (activity = \"exercise\")\n  You switch to your abs and back, doing crunches and lifts straight up, sideways, and upside-down. Then arms, and even face and fingers and neck. You match your breathing to the repetitions, focusing on the inhale and exhale. You get into the rhythm, and push yourself to lift at a constant rate and avoid slowing down. You glance at a nearby clock. You don't have that much more time until you need to face the tourists. What will you tell them about Grant?\n\n*if (activity = \"sun\")\n  Your body tingles delightfully with the warmth, and as you start to sweat a bit, you imagine yourself on a beach back on Earth, staring up at the real sun, with a towel laid down on sand that isn't gray or sticky and doesn't need to be scraped off the airlock filters every week. You imagine waves and gulls and maybe some other people nearby playing in the water. It is all perfect. You glance at walkie-talkie's clock. You don't have that much more time until you need to face the tourists. What will you tell them about Grant?\n \n*if (activity = \"games\")\n  *if (playingCreatures = true)\n    You settle on an avatar look that you like. Then you notice a button that you didn't before: \"Use previous appearance.\" Well, shit. You really like the new look you've got now, but you also gotten a bit attached to your old appearance. Which one do you use?\n    *choice\n      #The new appearance.\n        *goto zombieGameplayMerge\n\n      #The old (female) appearance.\n        *set zombie_zhe \"she\"\n        *set zombie_zir \"her\"\n        *set zombie_zim \"her\"\n        *goto zombieGameplayMerge\n\n      #The old (male) appearance.\n        *set zombie_zhe \"he\"\n        *set zombie_zir \"his\"\n        *set zombie_zim \"him\"\n        *label zombieGameplayMerge\n        With that settled, you continue the game, back at the room with the two zombies. The man takes a cutely timid step forward, \"Hey there. I'm the technician that will be assisting with scans and x-rays, monitoring your progress to make sure that the transition happens smoothly. I really look forward to working with you,\" he practically purrs.\n\n        The woman immediately follows, \"I'm the phlebotomist: I'll be monitoring the doctor administering the initial injection, and drawing your blood for periodic testing. I know it's not the most fun in the world, but I hope you won't hold it against me too much,\" she gently teases.\n\n        The receptionist turns to you, \"Well, you can either get your pre-injection scans or your blood work knocked out first. Who would you like to go with?\"\n\n        *label MedicChoice\n\n        *choice\n\n          *hide_reuse #Why do I have to choose?\n            The two medics laugh and exchange devious grins. Then they explain that while normally that sounds like a lot of fun, at the moment it's clearly a practical matter. After all, you can't be scanned at the same time that your blood is being drawn! They do hint about maybe later, though. That's actually pretty cool.\n            *goto MedicChoice\n\n          #The technician…he's cuter.\n            The phlebotomist practically pouts, \"Oh, well, are you sure? I don't have anyone else scheduled for another 15 minutes.\" \n\n            The technician teases the phlebotomist, \"Come on now, stop trying to steal all the cute ones for yourself!\" He shoots your character a devil-may-care smile and points to the door, \"Let's go get those scans done.\"\n            *choice\n\n              #Let's get scans indeed.\n                *set elegy_zhe \"he\"\n                *set elegy_zir \"his\"\n                *set elegy_zim \"him\"\n                *set ElegyProfession \"technician\"\n                *goto definite\n\n              #Actually, I'm switching to getting my blood drawn.\n                *set elegy_zhe \"she\"\n                *set elegy_zir \"her\"\n                *set elegy_zim \"her\"\n                *set ElegyProfession \"phlebotomist\"\n                *goto changedMind\n\n          #The phlebotomist…she's cuter.\n            The technician practically pouts, \"Oh, well, are you sure you wouldn't like to come with me first? I don't have anyone else scheduled for another 15 minutes.\"\n\n            The phlebotomist teases the technician, \"Come on now, stop trying to steal all the cute ones for yourself!\" She shoots your character a devil-may-care smile and points to the door, \"Let's go get that blood drawn.\"\n\n            *choice\n\n              #Sounds like fun.\n                *set elegy_zhe \"she\"\n                *set elegy_zir \"her\"\n                *set elegy_zim \"her\"\n                *set ElegyProfession \"phlebotomist\"\n                *goto definite\n\n              #Actually, I'm going with scans first.\n                *set elegy_zhe \"he\"\n                *set elegy_zir \"his\"\n                *set elegy_zim \"him\"\n                *set ElegyProfession \"technician\"\n                *label changedMind\n                The ${elegyProfession} practically jumps with delight at having won you over.\n                *label definite\n                $!{Elegy_zhe} leans in close while leading your avatar down a hallway, \"So, what made you decide to make the transition now? I hear that even Lauress is shutting up about it now, after her son.…\" An explosion interrupts ${elegy_zir} sentence and the camera view shakes wildly. A ringing noise drowns out background shouting, and you hear more blast noises. The camera pans over to show the ${elegyProfession} grab your arm and bite. Then everything fades to black.\n\n                You hit an autosave checkpoint, and check the time. Shit. You've only got one minute until you need to meet the tourists. As you power down, your mind starts running: what are you going to tell them about Grant?\n                *goto GrantWorryMerge\n\n  *if (playingCreatures = false)\n    You reach a new level. You're always uncertain whether this means you should keep going or stop and savor your victory. After all, if you keep going, it just means an even higher score that you'll have to beat next time, and you enjoy the sensation of making progress slowly but surely. You glance over at the computer's time. It decides for you, since you need to meet up with the tourists in a minute. Oh shit, the tourists. What are you going to tell them about Grant?\n\n*if (activity = \"pipes\")\n  You look over more and more pipes as you scooch through the crawlway. No problems, of course. There's only ever been one problem with the pipes in the years that you've been here. And you weren't even the one who found it. Well, but you're not really supposed to be doing maintenance tasks anyway, since you're supposed to be presentable and available at all times. But a favor is a favor. You finally reach the end and glance at a clock: there's not that much more time until you need to face the tourists. What are you going to tell them about Grant?\n\n*if (activity = \"shower\")\n  You turn the water off to lather, using a dime-sized drop of shampoo and as little bar soap as you can manage. You're grateful for the electric bathroom heater, which keeps these kind of showers actually tolerable. You turn the water back on to rinse quickly, and then exit. You dry off and glance over at the bathroom clock. You don't have that much more time until you need to face the tourists. What are you going to tell them about Grant?\n\n*if (activity = \"nearby\")\n  You make a wrong move. You'll be dead in four turns, maybe three. But it's not all bad: you have a chance at a high score, depending on which treasures are in the remaining tiles. You take some time to contemplate your options: go for a riskier tile that gives you fewer turns, or more stable tiles that will max out the time remaining. You glance at walkie-talkie's clock. You don't have that much more time until you need to face the tourists, so you save your progress. What are you going to tell them about Grant?\n\n*label GrantWorryMerge\n*fake_choice\n  #The doctors pulled him in for a checkup.\n    You finish and tidy up before meeting with the rest of the group. You do your best to appear encouraging and excited and not at all nervous. James asks about Grant. You take a deep breath. Then you politely inform him of the truth: The doctors wanted to see him again to double-check their tests. You can never be too careful, after all. \n  #Grant was feeling tired.\n    You finish and tidy up before meeting with the rest of the group. You do your best to appear encouraging and excited not and not at all nervous. James asks about Grant. You take a deep breath. Then you politely inform him of the truth: He was feeling tired from the anti-nausea medicine and couldn't come along for this event.\n  #Reiterate motion sickness cover.\n    You finish and tidy up before meeting with the rest of the group. You do your best to appear encouraging and excited and at all nervous. James asks about Grant. You take a deep breath. Then you politely inform him of the truth: He's still resting off his motion sickness.\n  #Implicate digestive problems.\n    You finish and tidy up before meeting with the rest of the group. You do your best to appear encouraging and excited and at all nervous. James asks about Grant. You take a deep breath. Then you politely inform him of the truth: He was a little over-eager with his lunch, which was ill-advised after feeling sick, and is now having digestive problems.\n  #Simply that Grant was feeling ill.\n    You finish and tidy up before meeting with the rest of the group. You do your best to appear encouraging and excited and at all nervous. James asks about Grant. You take a deep breath. Then you politely inform him of the truth: He wasn't feeling well, and didn't come.\nJames nods in acceptance, and the rest of them seem to go with his judgment. Well, that was much easier than you thought. But if he doesn't get better soon, they will get suspicious.\n\nSo as not to allow them any time for extra questions, you turn about and run-walk down the passageway to the Observatory. They slowly trail behind. You slather on that smile as you gesture to the nearby telescope booths. They all mill about expectantly. You're anxious to get them distracted again, and all that's left is for you to explain the telescope controls. What kind of instructions do you give them?\n\n*fake_choice\n  #Purely practical to let them discover on their own.\n    You go through the drill, \"The booths are specially designed to block out light from this room, so be sure to close the door in there tightly after sitting down. Then, remove the lens cap by pressing the 'Remove Cap' button. You can move with the mouse, and zoom in and out with the zoom wheel. The HUD will highlight all potentially interesting phenomena so that you can zoom into it, but you can turn that feature on and off with the 'Hide HUD' button.\" You then glance over at Ren, \"Oh, and uh, if you wear glasses, you are welcome to take them off and the machine will auto-adjust for you.\" You realize you've been racing through the description, so you pause to take a breath before continuing.\n\n  #Fully detailed so that they don't have to bother you with questions.\n    You go through the drill, \"The booths are specially designed to block out light from this room, so be sure to close the door in there tightly after sitting down. Then, remove the lens cap by pressing the 'Remove Cap' button. You can move with the mouse, and zoom in and out with the zoom wheel. The HUD will highlight all potentially interesting phenomena so that you can zoom into it, but you can turn that feature on and off with the 'Hide HUD' button. There's a list of known coordinates of interest, but if you would rather explore on your own, please do. Your HUD will show you an exclamation mark if you manage to find something interesting.\" You then glance over at Ren, \"Oh, and uh, if you wear glasses, you are welcome to take them off and the machine will auto-adjust for you.\" You realize you've been racing through the description, so you pause to take a breath before continuing.\n\n  #Tips and tricks so that they can find the cool stuff.\n    You blast through the basics to get at the good stuff, \"Press 'Remove Cap', and the movement works like a regular mouse. There's a list of known coordinates of interest, sorted by type of celestial object, but if you're interested in exploring, please do. Aim for clusters that are on the denser side, but not too dense or it can be difficult to distinguish them. Your HUD will show you an exclamation mark if you manage to find something interesting.\" You then glance over at Ren, \"Oh, and uh, if you wear glasses, you are welcome to take them off and the machine will auto-adjust for you.\" You realize you've been racing through the description, so you pause to take a breath before continuing.\n\n  #Just a list of good known coordinates.\n    You skip over the basics and just give what's really necessary, \"There's a list of known coordinates of interest on the drop-down menu, and list of instructions inside the booths. But of course, we'd be delighted if you found something new. Good luck, and enjoy!\" You realize you've been racing through the description, so you pause to take a breath before continuing.\n\n  #No instructions needed, they're given inside the device itself.\n    \"Well, here we are. Instructions are inside, it should all be fairly straight forward. Mouse around and explore the galaxy. It's really quite fun!\" You take a small pause that you hope sells your enthusiasm as genuine.\n\"Any questions? No? Great! Go on in there and explore!\" you herd them as quickly as they will move. Why do tourists always shuffle?\n\nYou sit in a nearby chair, waiting for the activity to end. It's certainly a lot of fun for the tourists, but there's not much for you to do except wait for them to be done. You pick at a bit of fluff on your outfit. At least you can still manage to be presentable.\n\n*comment If you chose nobody, it randomly assigns you a person to hopefully get you interested in them.\n\n*temp randomAssignScope 1\n\n*if (helpTarget = \"nobody\")\n  *set RefuseAvailable true\n  *rand randomAssignScope 1 5\n\n  *if (randomAssignScope = 1)\n    *set helpTarget \"Andres\"\n    *set helptarget_zhe \"he\"\n    *set helptarget_zir \"his\"\n    *set helptarget_zim \"him\"\n\n  *if (randomAssignScope = 2)\n    *set helpTarget \"Diana\"\n    *set helptarget_zhe \"she\"\n    *set helptarget_zir \"her\"\n    *set helptarget_zim \"her\"\n\n  *if (randomAssignScope = 3)\n    *set helpTarget \"James\"\n    *set helptarget_zhe \"he\"\n    *set helptarget_zir \"his\"\n    *set helptarget_zim \"him\"\n\n  *if (randomAssignScope = 4)\n    *set helpTarget \"Sadri\"\n    *set helptarget_zhe \"she\"\n    *set helptarget_zir \"her\"\n    *set helptarget_zim \"her\"\n\n  *if (randomAssignScope = 5)\n    *set helpTarget \"Ren\"\n    *set helptarget_zhe \"she\"\n    *set helptarget_zir \"her\"\n    *set helptarget_zim \"her\"\n\n*if (helpTarget = \"Andres\")\n  Then Andres pokes his head out, \"Hey! Come here, I need something.\"  \n\n*if (helpTarget = \"Diana\")\n  Then Diana pokes her head out, \"Hey! Come here, I'd like to ask about something.\"\n\n*if (helpTarget = \"James\")\n  Then James pokes his head out, \"Hey! Come here, I think I found something.\"\n\n*if (helpTarget = \"Sadri\")\n  Then Sadri pokes her head out, \"Oh, um, can I bother you for something?\"\n\n*if (helpTarget = \"Ren\")\n  Then Ren pokes her head out, \"Hey! I have a question about this.\"\n\n*if (helpTarget != \"Grant\")\n  *if (RefuseAvailable = true)\n    *choice\n      #Sure thing.\n        *if helpTarget = \"Andres\"\n          *set LeadAffection +3\n        *if helpTarget = \"Diana\"\n          *set WriterAffection +3\n        *if helpTarget = \"Sadri\"\n          *set ProgrammerAffection +3\n        *if helpTarget = \"Ren\"\n          *set ArtistAffection +3\n        *if helpTarget = \"James\"\n          *set QAAffection +3\n        *goto SureThing\n      #Actually, I'd better stay outside.\n        ${MaxAffectionTarget} holds a hand up in acceptance, \"No worries, I understand.\" You resume sitting and waiting. You check your walkie-talkie.\n        *goto GrantMerge\n\n*if (helpTarget != \"Grant\")\n  *if (RefuseAvailable = false)\n    *choice\n      #\"I'd love to see what you've found.\"\n        *goto SureThing\n      #\"Sure, just let me put a note where I am.\"\n        *goto SureThing\n      #\"Sure, the other tourists won't even notice.\"\n        *goto SureThing\n      #\"Sorry, I really shouldn't.\"\n        *goto GrantMerge\n\n  *label SureThing\n\n  You follow ${helpTarget_zim} into ${helpTarget_zir} booth. It's a small closet, to be sure, but there's plenty of room for the both of you.\n\n*if (helpTarget = \"Andres\")\n\n  Andres points excited at the view screen, \"I found a dwarf planet.\" The screen shifts a few pixels to re-center on the slowly rotating, but lopsided object.\n\n  That's actually fairly amazing of a find, not so much because they're rare (they're not), but because most tourists focus either on the neighboring planets, or on the far depths of outer space. Very few search their local asteroid or Kuiper belts.\n\n  He reads aloud some of the GUI-displayed details on his find, \"It's nearly twice the size of Pluto! It'll definitely be added to the list of recognized solar celestial objects, right?\" You freeze. Most astronomy organizations are hesitant to bloat the lists past the few objects that were grandfathered in. It will most likely be ignored. Maybe you should change the subject.\n\n  *COMMENT: ANDRES CHOICES\n  *fake_choice\n    #\"Probably!\"\n      This delights him to no end, \"And to think, I just managed to find it on a whim. You know, I was thinking about it: about the fact that most people focus on the big planets, but they don't think about the little guy. And they're important too. And really, they turn out to be even cooler, when you think about it.\"\n\n      *goto whyLimitedPlanets\n\n    #\"Well, what would you name it?\"\n      He gets stars in his eyes, \"Oh wow, naming it? It's definitely an honor, but also a bit of a burden, isn't it? What if the name is dumb, or boring, or is already taken? Wow, hmmm, this is a lot harder than I thought. You know, this is why I usually leave this kind of thing up to other people. I mean, my strength is in leaning on other people's strengths. How about you, what would you name it? Or at least, what kind of thing would you name it after?\"\n\n      *fake_choice\n        #\"Myself.\"\n          Andres laughs, \"Well, glad to know that you've got your priorities straight! I mean, what else important is there?\" He turns to the console, \"It's not a bad idea, actually. I mean, it's frowned upon to name something after yourself, but who doesn't want to be immortalized, to be remembered? Even as the name of some piece of rock that probably won't get looked at ever again.\"\n\n          The console beeps, and Andres traces a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. \"But look at that. 700 years is hardly immortal. You'd have made a mistake.”\n          *goto AndresMerge\n\n        #\"Something historical.\"\n          Andres groans, \"Ugh, let the past be dead and buried! Those old geezers had their chance, it's time to seize the now. Plus, everything else has a Latin or Greek name. Your object would just get lost in the crowd.\" He turns to the console, \"I mean, who's to say that some tiny little hunk of rock doesn't deserve a better name?\"\n\n          Andres traces a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. \"But look at that. It's destined to crash and burn anyway. Maybe it doesn't matter what it's named.\"\n          *goto AndresMerge\n\n        #\"Something from our culture.\"\n          Andres bursts into laughter, \"Haha, I love it! Let those dorks from the future figure out the significance of dwarf planet 'Balrog.' Plus, everything else has a Latin or Greek name. Who wants to just get lost in the crowd? \" He turns to the console, \"I mean, who's to say that some tiny little hunk of rock doesn't deserve a better name?\"\n\n          Andres traces a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. \"But look at that. It's destined to crash and burn anyway. Maybe it doesn't matter what it's named.\"\n          *goto AndresMerge\n\n        #\"Something futuristic.\"\n          Andres bursts into laughter, \"Haha, I love it! Let those dorks from the future groan about \"Laser-Crusher 4000.\" Plus, everything else has a Latin or Greek name. Who wants to just get lost in the crowd? \" He turns to the console, \"I mean, who's to say that some tiny little hunk of rock doesn't deserve a cooler name?\"\n\n          Andres traces a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. \"But look at that. It's destined to crash and burn anyway. Maybe it doesn't matter what it's named.\"\n          *goto AndresMerge\n\n    #\"Wow, how did you find it?\"\n      He seems quite proud, \"Well, I figured that the outer asteroids were usually overlooked. And I also figured that people were missing out on some really cool stuff, so I knew that if I just manually locked the depth focus and then swiveled around, I'd find something. And I found something pretty cool, I think.\"\n\n      *label whyLimitedPlanets\n      He turns to the display, \"Why do you think most people focus on the big ones nowadays? I mean, it made sense when they didn't have real telescopes. But now that we can see all the small and amazing things out there, why are we so limited?\"\n\n      *fake_choice\n        #\"Because of their historical clout.\"\n          You make the argument, \"I mean, traditionally they could only see and track the planets. And so that's what they made into maps. Planets are also what they discovered rotated around the sun instead of the earth, what they killed people for blaspheme over. They didn't kill anyone over dwarf planets.\"\n\n          Andres nods, \"Ah, you mean that planets just get extra attention from history classes? That's a good point. I suppose they just have better press agents, is all.\" He silently stares at the readout, tracing a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. He sighs, \"Perhaps that's what draws so many of the smaller bodies to merge with the giants, even when it means they will burn up in the process.\"\n          *goto AndresMerge\n\n        #\"Because they seem more Earth-like, more familiar.\"\n          Andres snorts, \"The red spot storm of Jupiter is so large that multiple Earths could fit inside. That's so fucked up that I can't even begin to wrap my brain around it. We can't even really land on Uranus, and Mercury's so hot, we'd melt. These planets aren't very Earth-like at all, they just have historical clout.\"\n\n          You slightly revise your argument, \"Maybe their oddities are so hard to contemplate that they just sort of get ignored. We just imagine that they're more relatable.\"\n\n          The console beeps, and Andres traces a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. \"Perhaps that perception problem is what draws so many of the smaller bodies to merge with the giants, even when it means they will burn up in the process.\"\n          *goto AndresMerge\n\n        #\"Because it's harder to find the small ones.\"\n          Andres snorts, \"Well, maybe it used to be, but it's not any more. I just found one right now. I mean, I guess it feels strange and more nebulous when all these new and exciting things can be found and discovered all the time. But that's more exciting, that's more real.\"\n\n          You pounce on that, \"Maybe that's it. People aren't in the mood to deal with the complexity of a more nuanced and constantly-revising system.\"\n\n          The console beeps, and Andres traces a finger along the newly-charted trajectory, which predicts the object crashing into Jupiter in 700 years. \"Or perhaps it's because they don't want to take the risk on finding something that might eventually crash and burn anyway.\"\n          *goto AndresMerge\n\n        #\"Because the large ones are steady and predictable.\"\n          Andres nods appreciatively, \"Oh yeah, well, and people do care about that. They like their stable paths, their measurable temperatures, their polite adherence to staying in specially designated areas. But you never get something that goes off the beaten path, that crosses over and does something different. You miss out on all the small and varied things that are out there.\"\n\n          You clarify, \"Well, yeah, but a lot of those small things usually aren't stable enough to predict what kind of pattern they will make. It's a bit strange.\" \n\n          The console beeps, and Andres scowls, turning to the newly-calculated trajectory, which predicts the object crashing into Jupiter in 700 years. His scowl softens into resignation, \"Well, huh. I guess even the little guys are drawn to something more stable. At this point is it even worth the attention?\"\n          *goto WorthItMerge\n\n    #\"Let's chart its trajectory first.\"\n      Andres nods, \"Man, isn't it amazing what kinds of calculations this thing just does after only a few minutes? I mean, its already got an estimated composition and temperature. Now it's just figuring out the velocity and direction, and trying to compare that against all these other crazy complicated variables. I can't even imagine what sort of thing this must be running to figure that out.\" You shudder, thinking of the days when they used to use slide rulers and visually interpret spectroscopy graphs.\n\n      The console beeps, and Andres turns to the newly-calculated trajectory, which predicts the object crashing into Jupiter in 700 years. His scowl softens into resignation, \"Well, huh. I guess this thing has a limited lifespan. I mean, they'll document it, but at this point is it even worth it?\"\n\n\n      *label WorthItMerge\n      *fake_choice\n\n        #\"Yes, it still matters even if it is small and will die.\"\n          Andres nods, \"I hope so, otherwise what are we even doing with our lives? I mean, jeez, I'd give anything to even get close to a 700-year lifespan. And there's no way I can ever hope to go out in such a blaze of glory as to smash into Jupiter.\" He looks off into space, \"I mean, I wish that it would just get the kind of recognition that it deserved.\"\n          *goto AndresMerge\n\n        #\"Yes, it might still veer off-course.\"\n          Andres gives a half-laugh, \"Hah, so its only saving grace is that our calculations might be slightly off? How depressing.\" He looks off into space, \"I mean, I just wish that it would get the kind of recognition that it deserves.\"\n          *goto AndresMerge\n\n        #\"No, since it's not going to survive.\"\n          Andres shakes his head, \"What a depressing way to look at things. Everything is temporary, that doesn't mean that it matters less. And man, seven-hundred years, I wish I could be so lucky!\" He looks off into space, \"I mean, I wish that it would just get the kind of recognition that it deserved.\"\n          *goto AndresMerge\n\n        #\"No, it's too unimportant, even if it were to survive.\"\n          Andres shakes his head, \"What a depressing way to look at things. Everything started out small. And you never know when something seemingly unimportant will turn out to be amazing. Well, or terrifying. Just ask Tunguska.\" He chuckles, then looks off into space, \"I mean, I just wish that it would get the kind of recognition that it deserves.\"\n          *goto AndresMerge\n\n  *label AndresMerge\n\n  You root for it, \"Well, think about how long it's survived so far,\" you posit, \"Maybe it has some extra tricks up its sleeves.\"\n\n  Andres raises an eyebrow at you, \"Oh yeah? What cool thing is my dwarf planet going to pull off before its fiery death?\"\n\n  *fake_choice\n    #\"It slingshots out of our galaxy.\"\n      Andres snorts, \"Oh yeah, that's much better. Instead of burning to a crisp, it rockets out into the lonely void of space, never to be heard from or noticed ever again. I know I'd prefer to actually have an…impact, with my life.\" He winks at you with a ridiculous grin.\n\n    #\"It smashes into Pluto instead.\"\n      Andres laughs, \"Good! Fuck Pluto. I'm glad my planetoid could at least take that self-righteousness hunk of rock down a peg before the end.\" He grins widely.\n\n    #\"It smashes a Jupiter satellite on its way down.\"\n      Andres laughs, \"Ha! Glad to know that it creates at some mischief before its death. And really, fuck those satellites. They think they know stuff? Well, did they see my planetoid coming? No.\"\n\n    #\"Outlast humanity.\"\n      Andres raises his eyebrows and laughs, \"Wow, that got dark! But I dunno, you're probably right. It's been around for longer than we have, and it might be around even after we aren't. I guess it's a bit self-centered to be thinking about having a name for it for 'only' the next seven-hundred years.\"\n\n  Andres strokes his chin, \"Well, thanks for all the help. I'm not sure how I feel about it, but I'm glad I got a chance to check it out. Anyway, I think I've got it from here.\" He waves you off and returns to his console. You step out and settle back into waiting, still excited over a guest actually finding a dwarf planet on your watch. You'll probably get extra high reviews from him. Well, provided that the corporate guy turns out okay. Your stomach twists as you remember Grant. Should you check on that situation?\n\n*if (helpTarget = \"Diana\")\n  Diana points excitedly at the view screen, \"I found a dead planet.\"\n\n  You try to hide just how incredibly underwhelming of a discovery it is. Pretty much every planet is a dead planet. But she continues, \"I was browsing through the planets marked as 'Near-Earth,' and this one was in that category. The atmosphere was dense in stable nitrogen, but now it's a soup of carbonic acid, and the temperature's increased a few hundred Kelvin.\" Well, now that does make things more interesting.\n\n  *COMMENT: DIANA CHOICES\n  *fake_choice\n    #\"It may have been a mistake.\"\n      Diana shoots you a incredulous look, \"No, I don't think so. I think a lot of attention would be paid to worlds that were even close to habitable. I think they'd double-check something like this. Or, at least I'd hope they would.\" She seems less certain. \"Space is so incredibly large, who could even double-check? They probably just accept it. Just a mad rush to collect data, accumulate points. They don't even care to examine each one closely, to find the story.\"\n\n      *fake_choice\n        #\"They're interested in the story of life.\"\n          Diana scoffs, \"Yes, I suppose that means finding planets that are inhabitable for us. Planets that fit into our expectations of what a proper, utilitarian planet should be.\" She sighs, \"But what if this obsession with chasing the one kind of planet is making us miss out on the rest of the universe? It isn't all just about us, you know.\"\n\n          She scrolls through the GUI, trying to find the category that the planet would fit into now. It's technically classified as \"Uninhabitable: +Tempeature -Atmosphere,\" but you know that's not a searchable term. Nobody's really cared to use it, before now. Diana hovers her fingers over the screen, almost unwilling to accept the implication. She speaks at last, \"I doomed it to obscurity. I killed this planet. It dies with me.\"\n          *goto DianaMerge\n\n        #\"They need those numbers to be able to find more stories.\"\n          Diana scoffs, \"They already have millions of data points. They aren't looking for new stories at this point, just collecting planets like belt notches.\" She gestures to the glowing numbers dominating multiple areas of the HUD, \"They just want to shove each one into its own classification and category. Not even caring what might be going on at the surface.\"\n\n          You continue to argue devil's advocate, \"That kind of granularity in interstellar story-telling is impossible. We're lucky enough to get data on the atmosphere, and maybe a moon or moon system.\"\n\n          She looks off, \"No wonder they put so much stock in collecting their cave-shadow numbers, it's the only thing they can see.\"\n          *goto DianaMerge\n\n        #\"The scientists can often miss the point.\"\n          Diana nods, \"I think it must give them some comfort to count, to organize, to have a word and a box for everything. Perhaps it's how they accept the fact that they can't get more information. That they're stuck here, with no way to go and look closer. So they convince themselves that the numbers are meaningful.\" She shutters, \"It must be terrible.\"  \n\n          She scrolls through the GUI, trying to find the category that the planet would fit into now. It's technically classified as \"Uninhabitable: +Tempeature -Atmosphere\", but you know that's not a searchable term. Nobody's really cared to use it, before now. Diana hovers her fingers over the screen, almost unwilling to accept the implication. She speaks at last, \"I doomed it to obscurity. I killed this planet. It dies with me.\"\n          *goto DianaMerge\n\n        #\"What do you think is the story behind this planet?\"\n          *goto deadPlanetStory\n\n    #\"We'll get to update the astronomy organizations.\"\n      She scrolls through the history of the entry, \"This was cataloged nearly sixty years ago. I have no idea if anyone has even looked at it since. Something happened in the past sixty years that made this planet completely change. And nobody noticed for decades. Will they even care? What's the point of collecting information if it's just sitting in some data table that nobody ever looks at?\" She looks up into space.\n\n      *fake_choice\n        #\"Space is just too overwhelming for them.\"\n          You gesture upwards, \"Out there is the real impossible geometry. There's black holes, dark matter, light that bends, time that fluctuates, velocities that increase with no real visible reason. Space is one giant Lovecraftian beast. And they're doing their best to tame it, to understand it.\"\n\n          Diana nods, \"But they can't, not all of it. So I guess they're just doing what they can, and trying to stay sane.\" She looks upwards, \"And what will happen to this dead planet? Is it another Elder Thing mystery to be tagged and processed? Can we really conquer the unknowable by giving it numbers and names and designations?\"\n          *goto DianaMerge\n\n        #\"They collect what they can and piece it together.\"\n          You explain it, \"They're stuck looking at the cave shadows, not because they refuse to turn their heads, but because reality prevents them from doing otherwise. The best we can do is atmospheric composition, temperature, and maybe a moon or moon system.\"\n\n          Diana looks upwards, \"No wonder they convince themselves that accumulating numbers is important.\" She scrolls through the GUI, trying to find the category that the planet would fit into now. It's technically classified as \"Uninhabitable: ++Temperature -Atmosphere\", but that designation isn't included in the search GUI. Diana hovers her fingers over the screen, almost unwilling to accept the implication. She speaks at last, \"They won't even look at this planet's numbers. I've killed it. It dies with me.\"\n          *goto DianaMerge\n\n        #\"They will probably be very interested in studying this change.\"\n          You explain it, \"This is actually one of the only planets where they can see a story unfold. It was inhabitable but changed. They'll search for what the change was. They'll want to prevent something like that from happening here.\"\n\n          Diana laughs cynically, \"Ah, of course. They will care about it, not for its own story, but because it might serve us. The exploration of space, it's not really about finding out what's out there. It's humanity's self-centered obsession with preserving itself, with living forever.\" She looks at you, resigned, \"They don't care about this planet for its own history. It's just important for how it relates to us.\"\n          *goto DianaMerge\n\n        #\"And what stories would you give them?\"\n          *goto deadPlanetStory\n\n    #\"What do you think happened?\"\n      *label deadPlanetStory\n      Diana stares off into space. It is a long time before she gives a reply, \"Well, I'd been thinking about that. There's a lot of stages of development the planet might have been at when it met its end: It could have been bacteria-only, or post-civilization, or proto-human, or even something else entirely.\" She pauses, trying to decide which she likes more. Do you suggest a direction?\n\n      *fake_choice\n        #Bacterial.\n          She nods furiously, \"Yeah, a planet in its infant state, just starting to find itself, just starting to rearrange small pieces of molecules into something meaningful, purposeful. And then it's just snuffed out before it can even really start. Because that's the cruelty of the universe. Things just die.\" She gestures at the screen, \"This planet did. After this reclassification, nobody will ever look at it again.\"\n          *goto DianaMerge\n\n        #Post-civilization.\n          She nods furiously, \"The intelligent species long ago destroyed itself, maybe all the life on it as well. Probably with toxic chemicals, or running out of resources, or even some sort of powerful infection. The planet was long ago dead, even as we were praising it for being habitable, the skeletons or carapaces, or cell walls of that species were rotting, turning to dust. And then some cataclysm came and was observed and cared about by no-one, because for them the planet had already been dead long ago.\" \n          *goto DianaMerge\n\n        #Proto-human.\n          She nods furiously, \"They had just started a language, made drawings, had tools. And they had just started looking up to the stars to start charting seasons. They saw their doom coming, maybe as an asteroid getting larger. And they foretold it as a boon, a blessing. Then it destroyed them, utterly. They asked for mercy, but there was none. And they died, without knowing why or how or having reached something better. Because that's the cruelty of the universe, the frailty of life.\"\n          *goto DianaMerge\n\n        #Something else entirely.\n          Diana brightens, \"How about this: \"It was terraformed by an intelligent race with completely different biological needs that us into a planet that was actually habitable.\" She half-smiles, \"Well, I amuse myself, at least.\" She turns back to the display, \"But something definitely did change that planet. And likely we'll never know what. And that terrifies us: the unknown creeping terror. The whim of the universe.\"\n          *goto DianaMerge\n\n        #(Wait for her to choose.)\n          She thinks to herself, lost in thought. Then: she brightens at the conclusion, \"The planet was never habitable. It was the invention of an astronomer who was frustrated at his lack of progress, who just wanted to boost his numbers. He lied about the results. He put it into the system, confident that nobody would ever discover his deception. And now here we are, sixty years later. And he's probably dead. He got away with it. All for a bit of extra prestige that people probably forgot about after a month.\"\n          *goto DianaMerge\n\n    #\"How sad for that world.\"\n      She nods gravely, \"We have no idea how many people, civilizations, were just wiped out. Or it might have been completely uninhabited, even by bacteria. But still we mourn for it, mourn for its loss. Is it still sad even if no lives are lost? Plenty of planets form, change, die. Why is an inhabitable planet give more deference?\"\n\n      *fake_choice\n        #\"Because it might have had life.\"\n          Diana snorts, \"That's so incredibly self-centered of us though, isn't it? What's to say that other life forms can't have completely different biologies, different needs. You know about our own bacteria that live in undersea vents or in the atmospheric troposphere. There's no way we humans could live there, but others things do. Maybe we're the weird ones. Maybe now that planet is considered by the rest of the universe to be habitable.\n\n          She scrolls through the GUI, trying to find the category that the planet would fit into now. It's technically classified as \"Uninhabitable: ++Temperature -Atmosphere\", but you know that's not a searchable term. Diana hovers her fingers over the screen, almost unwilling to accept the implication. She speaks at last, \"They won't even look at this planet again. I've killed it. It dies with me.\"\n          *goto DianaMerge\n\n        #\"Because we like to imagine traveling there.\"\n          Diana snorts, \"That's so incredibly entitled of us though, isn't it? The planet was never even available for us to begin with: it's billions of years away. But we're so obsessed with wanting to go there that we feel like it should be available to us anyway, just because we want it to.\" She shakes her head. \"But now, they won't care about this planet at all. I doubt that anyone else will ever look at it again. I've killed it. It dies with me.\"\n          *goto DianaMerge\n\n        #\"Because it scares us.\"\n          You explain, \"It reminds us, it shows us what could happen to our planet. It's terrifying.\"\n\n          Diana snorts, \"But that's so self-centered of us though, isn't it? We're sad not for their loss, potential though it may be, but for our own imagined problems. The fear is for ourselves. That's our real problem, I think. That the story of this planet can only be told through the lens of how it affects us.\" She sighs.\n          *goto DianaMerge\n\n        #\"Because we don't like for things to change.\"\n          You explain, \"Humans don't like change. Most of us are depressed about the eventual heat-death of the universe, even though by then nothing will be left, and certainly not any humans. We don't necessarily care what it is, we just want it to keep going, to be stable.\"\n\n          Diana nods, \"Yeah, I think…I think we want to live forever. And what does it say when the immortals—the planets, the stars, the galaxies—die? If even those end, then what hope have we?\"\n          *goto DianaMerge\n\n  *label DianaMerge\n\n  You agree with her, \"It's a tragedy.\"\n\n  She sniffles a bit, \"How do you deal with it? You live in space; you look up and see the stars every day. Doesn't it hurt?\"\n\n  *fake_choice\n    #I focus on my responsibilities.\n      You take a deep breath to defend it, \"I can't let it get me down. I have things I need to do, things that matter to me, things that I can actually improve and make better. I keep myself focused on what I need to do and don't dwell on it. Because once you dwell, you get stuck and then nothing gets done. And there are things I can do to make lives better. So I focus on that.\"\n\n    #I focus on people.\n      You take a deep breath to defend it, \"There are people who care about me and need me to keep going, and it matters to them, how I'm doing. And it matters to me, how they're doing. I can't help the whole world, I can't help the whole universe, but I can help the people nearby, and so I do. And that makes the world a better place. So I focus on that.\"\n\n    #I keep it in perspective.\n      You take a deep breath to defend it, \"It humbles me every day, and I appreciate the reminder of my place in the universe. It helps me focus on on those around me. Because there might have been civilizations on that planet, but if so, they had people that cared about each other. They had their own lives and concerns and support systems. They don't need me. And sure, it would have been cool to get to know them, but it would also be cool to learn Latin, but I can't do everything. So I focus on what I can do.\"\n\n    #It's rough, and nothing really helps you cope.\n      You let out a long stream of air before starting, \"It's creepy: our isolation, potentially their isolation. How we are these fragile, tiny things in the middle of an uncaring and turbulent universe. And we could get snuffed out and just be someone else's recorded number change, and nobody would ever know. And really, the only way you can ever get things done is to just do your best to try and not think about it.\"\n\n  Her eyeline drops as she quietly agrees, \"I suppose there's nothing else that can be done.\" She rests her arm on the control station, then her chin on her hand. She resumes a baseline smile for you, \"Hey, listen thanks again for coming in and checking this out with me. I appreciate it. Thanks for indulging me in my musings, you're sweet to do so.\" She winks at you, \"I'll let you know if I find something else anywhere near as existentially terrifying.\"\n\n  You smile cordially, back out, and close the door. Back to waiting, your mind churns over the thought of the dead planet. You idly wonder what kind of paper-pushing they'll need to do to reclassify it. That corporate guy would probably have some idea. Your stomach twists as you remember. Should you check on the Grant situation?\n\n*if (helpTarget = \"James\")\n  James points excitedly at the view screen, \"I found an inhabitable planet.\" \n\n  Your mouth involuntarily gapes for a moment before you regain your composure. The IR spectroscopy readout confirms it: water, oxygen-nitrogen composition, even a habitable temperature, which is usually the one that dooms other planets. This is pretty fucking amazing. What do you tell James?\n\n  *COMMENT: JAMES CHOICES\n  *fake_choice\n    #Mention how improbable this is.\n      He nods, \"I was under the impression that there were only a handful of other known inhabitable planets, so I almost didn't believe it. The reading, it isn't, well, overeager, is it?\" Is he suggesting that Spacejoy is faking the results to make guests feel more special? That would, well, be quite clever. But it actually isn't the case.\n\n      You reassure him, \"You just happened to get lucky, or perhaps you're just that good at being observant. I should sure hope so, for QA.\"\n\n      He laughs, \"Ha, not always in the real world, though. Maybe this whole search thing just another game. I figured that most people started in the top left corner, or went along the edges, or to spots they felt were random. So I started just offset of the bottom right corner. Can't believe that worked.\" He sits back contemplatively, looking at the speck on the screen, \"I wonder if they've found us too.\"\n\n      *fake_choice\n        #\"I don't think they could see us from their planet.\"\n          You elaborate, \"We can only see them because our view isn't obscured by an atmosphere, and we don't have to deal with the sun's glare or the Earth's reflection. They might not even be able to see us. You know, if there was even anyone there.\"\n\n          James stares into the console, \"Probably Earth was in a similar boat at some point. Being observed, with no way to know it. It just feels so lonely, space. There's literally no way to reach out to them and say 'Hi.'\" He pushes a finger against his temple.\n          *goto JamesMerge\n\n        #\"That planet might be dead already.\"\n          You elaborate, \"At fifty light-years, the planet could have exploded a decade ago, and we'd never know.\" You double-tap on the sun, checking its age, \"Well, but at least the sun isn't in danger of having gone supernova.\"\n\n          James leans back, \"Yeah, but it might have, and I couldn't have known by just looking at it. It's amazing, just a little dot. Just a stellar wobble. It's so fragile. That's what we look like, that's what we are.\" He pushes a finger against his temple.\n          *goto JamesMerge\n\n        #\"The planet might not even have life on it.\"\n          \"Oh, of course not,\" he agrees, \"Or it might just be stupid little bacteria. I wonder, if it was just stupid bacteria, would you jumpstart it: introduce some modifications to get evolution going? Or would that give their future intelligent races a complex about their origins? I don't know how I'd feel if I knew we were pushed along by some impatient, probably long-gone alien race.\" He pushes a finger against his temple.\n          *goto JamesMerge\n\n        #\"It would be cool.\"\n          James nods, \"But space travel is so much harder than it should be, so much harder than our imaginations. And I keep feeling like, maybe one day we'll find a way around it. Science has no limits, right? But there are always limits. There are always realities. And this is one of them.\" He pushes a finger against his temple.\n          *goto JamesMerge\n\n    #\"Ask if he wants his name attached to the report.\"\n      His eyes widen, \"Whoa, would they let me…would I get to name it?\" Spacejoy actually would be willing to negotiate for naming rights, but for the sums of money that you're sure James doesn't have.\n\n      You still want to indulge him, however, \"Well, what would you want to name it, if you could?\"\n\n      He sits back, enjoying flexing his creativity, \"Hmmm, well, that depends on what sort of thing you think is important enough to draw inspiration from. What do you think you'd want immortalized?\"\n\n      *fake_choice\n        #\"Myself.\"\n          James chuckles, \"I think we're obsessed enough with ourselves, and none of us are really amazing enough to set in stone like that. I bet that in a hundred years, the people studying 'James Prime' will just think I was an arrogant prick. That's not exactly how I'd like to be remembered.\" He presses a finger against his temple.\n          *goto JamesMerge\n\n        #\"Something I'm passionate about.\"\n          James nods, \"Yeah, maybe not me specifically, but something that I cared about. Something that mattered, then maybe people in the future studying 'ThoroughDocumentation Prime' wouldn't necessarily remember me, but they would sympathize with the name. And that's probably the best way to go about it.\" He presses a finger against his temple.\n          *goto JamesMerge\n\n        #\"Something from our culture.\"\n          James chuckles, \"Did you know that the dwarf planet Eris was almost named 'Xena' after a really old tv show? Too bad it wasn't. I've always thought it was bullshit that names from long-dead cultures were better respected as obviously superior names. They still are. It's ridiculous. I wouldn't mind being a trend-setter. Maybe then at least someone would be amused by 'Balrog Prime.' Maybe then it wouldn't just get lost in the giant catalogs.\" He presses a finger against his temple.\n          *goto JamesMerge\n\n        #\"Something that sounds futuristic.\"\n          James chuckles, \"Ha, something that really captures the imagination and drive of space travel, eh? Well, I could get behind that. Well, as long as it's actually futuristic, not just jumbled Latin or Greek. Then the people going to 'Laser-blast A' know that this is not some over-idealized New Atlantis or some such junk.\" He smirks, then frowns, \"Although, I wonder what the people of that planet call themselves. Maybe they'd be offended either way. But there's not really any way to respect their own self-identity is there? I mean, we couldn't even say 'Hi,' if we wanted to.\" He presses a finger against his temple.\n          *goto JamesMerge\n\n    #Offer to track the planet for him.\n      You looks around, uncertain about if—or why—he should feel offended before he responds, \"Oh yeah…it's really cool to be here.\n    *goto AndresWelcome\n\n*label AndresWelcome\nWell…gift shop time!\" He peers in through the passageway entrance, shouting back to the rest of the group, \"Hey, check it out! The original micro-transaction model!\" It elicits a few chuckles, but they all seem a bit tired out. He hangs back at the entrance, waiting for the rest of the group to get checked in.\n\nThe woman behind him sidles up to your right side. She has a bony, long face, with even longer straight black hair. She looks over at your check-in tablet, sighs, then clicks her tongue in disapproval. You pause your finger over her name on the list and look up at her.\n\nShe backs off immediately, \"Oh, I…sorry. It's not you. I just did some work on the back-end of that program, and you see that drop-down, well I still don't think the GUI editors quite represented the functionality right.\" She blushes and pushes some of her hair in front of her face, \"Oh, sorry again. I just get wrapped up…\" she trails off. There's a hint of an Indian accent that matches her skin, but it feels mixed with something else, you can't quite tell. You  swipe off Sadri Conner -Lead Programmer- from the list. \n\n*set programmerAffection +1\n*choice\n  #\"What do you think they got wrong with it?\"\n    She blushes, waving it off, \"Oh, no, the technical stuff is not really that interesting…just some efficiency standards I felt they didn't hit. Sometimes could cause it to chug.\" She looks around at the small group, \"But, I doubt you'd ever run into that problem.\"\n    *goto SadriWelcome\n\n  #\"It's always tough handing off work.\"\n    She sighs as her eyes deaden with haunted resignation, \"Yes, it can be so frustrating!\" She smiles and backs up, \"I am glad that you understand, at least!\"\n    *goto SadriWelcome\n\n  #\"Glad to have you aboard.\"\n    She blushes again, bobbing pleasantly, \"Oh yes, well, I am glad to be here.\"\n    *goto SadriWelcome\n\n  #\"It must be frustrating, having someone mess up the system you're implementing.\"\n    *set hostilityPoints +1\n    *set programmerAffection -1\n    She backs up and looks at you strangely, \"Oh yes…well, I suppose it is.\"\n    *goto SadriWelcome\n\n*label SadriWelcome\n\nAndres leans against the wall, \"She's a great perfectionist, really has an eye for that sort of thing. I'm lucky to know her. And what a math whiz!\" He waves her over and points towards the gift shop.\n\nShe joins him and looks in, \"Hmmm, interesting layout. An expensive centerpiece surrounded by the cheapest object in the shop? Must trigger a lot of impulse purchases…\" she trails off as the two of them step inside and get wrapped up in window shopping.\n\nA younger man steps forward and tilts his head into a sweetly disarming grin. He has a wiry frame and a smooth face; his dark skin mixed with an East Asian facial structure. \"This place is just gorgeous, but it must be rough having to deal with rich pricks all the time.\" You startle. You're not accustomed to that kind of cutting honesty from guests. You check off James Meng -Lead QA- from the list.\n\nYou can't cop to a sucky job. Well, you can, but you really shouldn't to a guest.\n\n*set QAAffection +1\n*choice\n  #\"It has its perks.\"\n    He raises a perfectly groomed eyebrow, \"Oh yeah? I suppose every now and then you must get someone really interesting.\"\n    *goto JamesWelcome\n\n  #\"It's definitely a great place to visit.\"\n    He nods his head and crinkles his mouth in a suppressed laugh, \"I get what you're saying.\"\n    *goto JamesWelcome\n\n  #\"Glad to have you aboard.\"\n    He raises a perfectly groomed eyebrow and chuckles to himself at your generic response.\n    *goto JamesWelcome\n\n  #\"Yeah, you know, some guests really are kind of annoying.\"\n    *set hostilityPoints +1\n    *set QAAffection -1\n    He raises both eyebrows and looks at Grant and Sadri in the gift shop, then back at the rest of the shamblers, \"Well, I didn't expect that kind of reaction. Interesting.\"\n    *goto JamesWelcome\n\n*label JamesWelcome\n\nHe starts to step away, then turns back to you, \"Hey, by the way, do most people usually jump around right away, or do they wait until they're alone? I'm just curious if we're following expected protocol or being ridiculously polite.\" But before you can even make to respond, he raises his hands in apology, \"Actually, I shouldn't hold up the line. You probably get jerks who do that all the time. I'll just wait.\" He walks off to the side and starts testing out small hops.\n\nAn older woman approaches the podium next, frizzed hair salted with grays, and a pale face without any makeup. Her dreamy smile evaporates into embarrassment. She doesn't have her ID out. She pats over her suit in a panic, and then backs off, waving ahead the next woman in line. Unfortunately, that lady is wrapped up in an electronic device, completely oblivious to the awkwardness unfolding in front of her. You clear your throat loudly. That doesn't get the second woman's attention. James looks up from his moon-hops to watch the situation unfold, and you hear a—hopefully unrelated—burst of laughter from inside the gift shop. \n\nThe woman finally finds her ID. \"Sorry,\" she grins sheepishly, \"I was just…thinking about what sorts of ghosts might be found in a place like this, and got a bit lost in it all.\" Her accent is distinctly Midwestern. You check off Diana Thorn -Head Writer- from the list. James tries to re-concern himself in the jumping, but it's obvious that he was hoping for something a bit more exciting to have shaken out. You focus your attention on Diana.\n\n*set WriterAffection +1\n*fake_choice\n  #\"I've often wondered what sorts of ghosts might be here myself.\"\n    She grins almost wickedly, \"I'd be curious to hear an expert's thoughts on the matter. You must have some interesting tales to tell.\"\n    *goto WriterWelcome\n\n  #\"You'll have to tell me their stories.\"\n    She grins almost wickedly, \"Well, give me a few days to feel out the setting first. I find the stories tell themselves from the environment.\"\n    *goto WriterWelcome\n\n  #\"Glad to have you aboard.\"\n    She smiles pleasantly at you, but her mind is already wandering.\n    *goto WriterWelcome\n\n  #\"Yeah…ghosts aren't real.\"\n    *set hostilityPoints +1\n    *set writerAffection -1\n    She frowns, \"Well, yes, I mean, I know, but I just…whatever; I won't bother you with the details.\"\n    *goto WriterWelcome\n\n*label WriterWelcome\n\nShe tilts her head, fixating on something inside the gift shop, and moves around the podium in a path that does not match her gaze. You amaze at the fact that she doesn't bump or trip on anything. James attempts to wave her down, but she doesn't notice and enters the gift shop. James shrugs and then follows after her, \"Hey, Diana! How'd you like some armor made of moon…\" his voice trails off.\n\nThe next woman is shorter and somewhat heavyset. You feel she's Asian, perhaps Pacific Islander. She's completely absorbed in her device, the glare reflecting off her large glasses. You clear your throat a second time, more forcefully. She startles, putting the device into a pocket while sizing you up. You hear a faint mumbling, \"Proportions…\" and then nothing else. She adjusts her glasses and then belatedly catches herself, \"Carried away there. Would you mind terribly if I sketched you?\" You smile politely at Ren Cho -Art Director- as you check her in.\n\n*set ArtistAffection +1\n*fake_choice\n  #\"I'd be honored.\"\n    She looks you over, then smiles by closing her eyes. \"Fantastic!\" she adds before stepping aside.\n    *goto RenWelcome\n\n  #\"Only if my likeness isn't killed off.\"\n    She delights with a sharp laugh before moving aside.\n    *goto RenWelcome\n\n  #\"Glad to have you aboard.\"\n    She nods at you and steps aside. \n    *goto RenWelcome\n\n  #\"Wouldn't that distract you from your work?\"\n    *set hostilityPoints +1\n    *set ArtistAffection -1\n    She frowns and rolls her eyes, \"You have to keep your skills sharp.\" She moves aside.\n    *goto RenWelcome\n\n*label RenWelcome\n\nAs she leans against a nearby wall, Ren glares at the last guy in line. He's been hanging back this whole time, and seems even now hesitant to move up. He gives Ren a half-smile, and she quickly pulls her device back out and buries her face in it. You hear more laughter and chatter from the gift shop as the rest of the group pour out. The last guy seems to realize that he can no longer delay his check-in.\n\nHe's pasty white, and slightly older, but built, with shoulder-length bleached blonde hair. You catch a glimpse of a white shell necklace under his spacesuit. He takes a deep breath and walks up. He stares past you awkwardly and breathes way too heavily. You follow procedure, despite there being only one person he could possibly be. \"Name?\" You cordially ask, attempting to get him to focus. He procures ID, affirming \"Grant Narell.\" Strange, he's not part of the development team. At least not that you recognize. Could he be a new addition?\n\nHe leans against the podium and attempts to carry a conversation, running his fingers through sweaty hair as he fumbles out, \"And you are…?\"\n\nYou almost feel bad for the man as you both point to your nametag and say your first name aloud:\n\n*label nametag\n\n*input_text name\n\n*if ((((((((((((((name = \"Andres\") or (name = \"andres\")) or (name = \"Diana\")) or (name = \"diana\")) or (name = \"James\")) or (name = \"james\")) or (name = \"Sadri\")) or (name = \"sadri\")) or (name = \"Ren\")) or (name = \"ren\")) or (name = \"Grant\")) or (name = \"grant\")) or (name = \"Maselle\")) or (name = \"maselle\"))\n  (You really shouldn't have the same name as one of the characters in the game. Please pick again.)\n  *goto nametag \n\nHis eyes flutter as what you say seems to barely even register, \"${name}? Did…did I get that right?\" His sweating intensifies. He must be really nervous around people. But it's your job to smile and accommodate.\n\n*choice\n\n  #\"Yes, that's right.\"\n    *set consultantAffection +1\n    *goto name-set\n\n  #Politely correct him.\n    *set consultantAffection +1\n    You are cheerfully insistent.\n    *input_text name\n    \"Not quite, it's ${name},\" you affirm.\n    *goto name-set\n\n  #\"Yes, good job reading what it says.\"\n    *goto name-set\n\n  #Rudely correct him.\n    You pour on the veiled condescension.\n    *input_text name\n    \"Ohh, you were so close, but actually it's ${name},\" you syrup out.\n    *goto name-set\n\n*label name-set\n\nBut by now he's lost his ability to focus on words. He staggers a few steps, then vomits a slurry of liquid. Much of it splashes onto the floor but a good amount stains the expensive, company-owned shuttle suit. He compounds the stains by wiping his chin on the sleeve. The other guests drop their banter and stare at him, horrified. You glare at one of the stewards, who then drops what he was unloading to get some cleaning supplies. You turn your attention back to the sick man. Well, that explains that. This is not exactly the smooth check-in that you were hoping for.\n\nHe continues retching, now spitting out clear liquid and streaming apologies between gasping breaths.\n\nHe clearly needs someone to escort him to the med bay, but it'll also take some professional charisma to lift the gloom this incident will impart on the rest of the group. You take the immediate action of notifying the medical staff with your walkie talkie, but now it's time to deal with the disaster directly.\n*if (hostilityPoints > 0)\n  You set aside your own personal annoyances and focus on asserting yourself professionally.\n\nYou weigh options: send him with the remaining steward, or escort him yourself.\n    \n*choice\n  #Escort the sick man.\n    *set consultantAffection +1\n    *set escortSick true\n    It's your job to see to the needs of the guests, especially someone who's not feeling well. You assign the one remaining steward to give the guide while you escort the man down a separate corridor to the med bay. The rest of the group mutter about your leaving. The steward you assigned to take your place gets their attention, while attempting to give the rest of the speech, but you can hear him stumble over words. He's not used to giving the tour, and especially not used to dealing with high-stress situations. But there's nothing that you can do about that. You've got to focus on your own task.\n\n    It's relatively easy to pull Grant along in the low-gravity: whenever he starts to fall, you have plenty of time to correct his trajectory. He apologizes while being dragged along, with increasingly more coherence. The med bay is a few passageways down: this time might be a good chance to ask him what happened.\n\n    *comment This variable tracks whether or not the player has asked him about anything to give two different \"just get there\" options.\n    *temp puke false\n\n    *label escort\n\n    *choice\n      *disable_reuse #\"What did you eat?\"\n        Although a few people opt out, the company usually provides an easily-digestable meal especially designed not to trigger any instances of nausea or allergies. \"The…the regular meal.\" he coughs out between deep breaths. You press further, \"Any allergies?\" He waves for a rest against a wall before answering, \"No. No allergies.\" Well, it doesn't appear to be the food, or else everyone else would be affected. At least, you hope nobody else is affected. You nervously check your walkie-talkie for updates.\n        *set puke true\n        *goto escort\n\n      *disable_reuse #\"Were you feeling sick on the ride over?\"\n        He waves his hand at you to signal, \"No,\" clearly trying not to talk. To be fine on the trip but then have a sudden onset of illness? That's not normal motion sickness. Grant staggers a bit, then continues along the way.\n        *set puke true\n        *goto escort\n\n      *disable_reuse #\"Did you use the head stabilizer pillows?\"\n        He clamps his head with his hands in the shape of the pillows to assent to having used them. Strange, that really should have helped keep his vestibular system stable.\n        *set puke true\n        *goto escort\n\n      *disable_reuse #\"Did you not take nausea medicine?\"\n        He seems confused by the resulting double negative, halts for a moment, then nods his head, \"I took it…everyone took it.\" You probe deeper: any drug resistances? Drug allergies? No, and no. Then why would he be getting sick now? Why is everyone else okay? Maybe he's just never used this drug before and didn't know about an allergy?\n        *set puke true\n        *goto escort\n\n      *if (puke = false) #\"Just focus on getting there quickly.\"\n        You help him along the way, taking occasional breaks for deep breaths. He slurs out apologies: about the floor, about the suit, about ruining the introductions. As he tries to hide wiping away a tear, you sigh with pity. Do you comfort him? \n        *goto self-blame-puke\n\n      *if (puke = true) #\"Focus on getting there.\"\n        You're almost there when he starts slurring out apologies: about the floor, about the suit, about ruining the introductions. As he tries to hide wiping away a tear, you sigh with pity. Do you comfort him? \n        *label self-blame-puke\n        *choice\n          #\"Don't worry about it.\"\n            *set consultantAffection +1\n            *goto comfort\n\n          #\"I'm glad you shook things up.\"\n            *set consultantAffection +1\n            You elicit a genuine, if somewhat sickly, grin.\n            *goto comfort\n\n          #\"I think it's fashion-forward.\"\n            *set consultantAffection +1\n            You elicit a laugh.\n            *label comfort\n            He seems to cheer up, at least if only for your benefit. \"I'm starting to feel better. Thanks, for making sure that I'm okay. I hope I didn't…Well, I hope I'm not a bother.\"\n\n            You brush it off, \"Oh, not at all! Although it was definitely the most original way to speed up the paperwork I've seen yet.\" He chuckles at this as you continue, ever the representative, \"We're just sorry that you aren't feeling well. We prefer to make your stay here enjoyable, and usually that precludes being sick.\" \n\n            He grins at this, emphasizing the point, \"Usually.\"\n            *goto at-medlab\n\n          #\"He needs to get there as quickly as possible.\"\n            You know that psychologically, it will help boost his confidence if you appear professional, so you go over standard med bay check-in procedure, letting him know what to expect. He seems to appreciate your attention, \"Thanks for taking care of me.\" You get a sickly smile.\n\n            *label at-medlab\n\n            As you two round a corner, a medically-trained steward opens the door for you, allowing you both in. She smiles and addresses Grant, \"I heard you weren't feeling well. I'll give you some extra-strength anti-nausea medication. You should be feeling better in no time.\"\n\n            Grant flops with relief onto a nearby chair. She turns to you, \"Thanks for the help; I've got it from here,\" then returns her attention to instructing Grant up onto the exam bed.\n\n            *choice\n              #Wish him a speedy recovery.\n                He waves you off, flashing one last smile. You really do hope that he gets better fast.\n                *goto pukeRejoin\n\n              #Say a plain goodbye.\n                He waves you off, flashing one last sickly smile.\n                *goto pukeRejoin\n\n              *if (puke = true) #Tell the technician what you learned.\n                The technician stoically nods, accepting your report, \"I appreciate that, but I will have to verify with the records and the patient. Don't worry, I know it's your job to make sure that everyone's taken care of, but for him, that's now my job.\" That is a relief. Sometimes it feels like you're in charge of everything around here.\n\n                *goto pukeRejoin\n\n            *label pukeRejoin\n            Well, by now, the rest of the group should be part way through with their tour. You have enough time to rejoin them, if you want. They should be somewhere…maybe around the recreation room by now? Or you could always just wait and meet them at lunch.\n\n            You step outside and see the full group standing around the med bay. Technically, the med bay would have been one of the earliest stops in the tour for safety reasons, but you'd thought that the steward would have had the presence of mind to skip over that. Apparently, you did not account for his incompetence, and now everyone is staring at you, with mounting awkwardness. How do you recover from this?\n\n            *fake_choice\n              #Quickly finish out the med center explanation and move on.\n                \"Fantastic timing!\" you bubble out, \"Grant will be fine, and I can take over from here!\" You move yourself in front of the group, \"This is where your personal medication bags are stored. Now, I certainly hope I still get to show you around the museum and the observatory: they're my favorites!\" They seem to relax as you retake command of the situation and send the substitute steward off. \n\n                As it turns out, you still \"get to\" show them around to pretty much all of the rooms. \n                *goto tourRoomChoose\n\n              #Just get the tour group to move on.\n                \"Fantastic timing!\" you bubble out, \"Grant will be fine, and I can take over from here!\" You move yourself in front of the group, \" Now, I certainly hope I still get to show you around the museum and the observatory: they're my favorites!\" They look at least a little less deer-in-headlights as you reassert command of the situation and send the substitute steward off. \n\n                As it turns out, you still \"get to\" show them around to pretty much all the rooms.\n                *goto tourRoomChoose\n\n              #Give an unhurried explanation of the med center.\n                \"Fantastic timing!\" you bubble out, \"Grant will be fine, and I can take over from here!\" You move yourself in front of the group, \" This is where your personal medication bags are stored. And of course, if you are ever feeling under the weather, you can report here, or make a call for assistance and one of our staff will help escort you if needed. Now, I certainly hope I still get to show you around the museum and the observatory: they're my favorites!\" They seem to relax as you retake command of the situation and send the substitute steward off. \n\n                As it turns out, you still \"get to\" show them around to pretty much all the rooms.\n                *goto tourRoomChoose\n\n\n  #Smooth things over with the main group.\n    *set leadAffection +1\n    *set writerAffection +1\n    *set QAAffection +1\n    *set programmerAffection +1\n    *set ArtistAffection +1\n    It's your job to deal with making sure that all the guests are comfortable, and there's nothing more discomforting that witnessing another person's distress. As another steward escorts Grant off, you address the group, \"While rare, it can happen that some people get an upset stomach on the trip over. It's definitely not the most fun way to start out a vacation, but we have the best medical facilities that money can bring over. I'll catch him up on the amenities later.\" \n\n    Your feigned lightness is good enough to fool them: you're met with nothing more insidious than disaffected stares. Really, you have no idea why he got sick, and that is scary. All the precautions should have prevented regular motion sickness. But you need to stuff those doubts down and launch into the tour.\n    *goto introductionStart\n*label introductionStart\n\n*fake_choice\n\n  #Standard introduction.\n    Your smile returns, then slowly cements as you revert into your memorized speech, \"When the first person set foot on the moon, they knew it was the beginning of a new era, of a deeper connection with the rest of the universe. For the next few days, you will have a chance to recreate that. You will have the chance to see space as never before.\" The pre- rehearsed tone hopefully assures them that things are going according to plan.\n\n  #Scientific introduction.\n    Your smile returns, but you put a bit of a dramatic flair to it, \"Welcome to the cusp of the universe. From here, you can see to the edges of what is possible, to black holes, newly forming planets, and even some of the earliest formations of the universe itself. Here, you will not just get to experience outer space hands-on, but also get an idea for just how much is left out there to discover, how vastly mysterious and amazing it all is.\" You take the time to pause dramatically and let them contemplate on this. You hope that it's theatrical enough to draw in their attention.\n\n  #Brooding introduction.\n    You arch an eyebrow, \"Our moon is one of the most beautiful, inhospitable places you can ever visit. It will afford you both the ability to truly see the universe, but also see your place in it. Here, you can see into the infinity, into the unending, and it will put your life in perspective, it will make you realize just how incredibly small we are. Being here on the moon is the ultimate expression of humanity's triumph and limit. It's an eye-opening experience, one that will never leave you.\" You give a dramatic pause and allow them to contemplate on this. Hopefully it is theatrical enough to be distracting.\n\n  #Romantic introduction.\n    You assume a mischievous smile, \"When space travel first became commercial, moon dust was believed to be an aphrodisiac. While I don't agree with
