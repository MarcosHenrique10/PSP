<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creatures Such as We — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "creatures", "title": "Creatures Such as We", "scenes": {"choicescript_description": "[i]Creatures Such as We[/i] is a philosophical interactive romance novel by Lynnea Glasser, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nLiving on the moon is lonely, and stressful, and exhausting. Video games have always offered you an escape to a better life. The easy, happy life you wish you had. Which makes it so frustrating when the game you've been playing ends badly. But you have a chance to figure it out, because the next tourist group is the designers. You can debate with them about art, inspire them with the beauty of outer space, get closer to any one specific designer in particular, and finally find out how to get the ending you always wanted.\n\nAwarded Second Place in the 20th Annual Interactive Fiction Competition (IFComp)[n/]\n\"You absolutely need to play through [i]Creatures Such as We[/i]\" -- Leigh Alexander[n/]\n\"Well-paced and richly written\" -- Emily Short[n/]\n\"I couldn't tear myself away\" -- Game Theory Podcast\n\n• Immerse in the beautiful setting of a moon-bound tourist destination a tourist destination.[n/]\n• Explore the meaning of gaming as a form of artistic expression with a cast of game designers.[n/]\n• Inspire profound discussions, courage, and even love with the visiting space tourists.[n/]\n• Six unique character paths, with options to be romantic or maintain strict professionalism.[n/]\n• Play both your character, and the character of the game-within-a-game.[n/]\n• Decide for yourself the best way to bridge the gap between game players and designers.[n/]\n• Inclusive options for gender identity, orientation, race, and age.\n", "choicescript_stats": "", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.", "creatures-act2": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Creatures Such as We[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n  *delay_break 900\n\n*label purchased\n\n*Comment CreaturesAct2 - Twelfth part of the game\n\n*comment *goto skip-ahead\n\n*temp farmLightsOff false\n*temp basementStealth false\n*temp EntrySeen false\n\nYou lock yourself in your room and try to shrug off the worries of the day as you boot up your computer. You smile at the startup music of [i]Creatures[/i]. Now, where did you leave off? Oh yes.\n\n*if (ElegyGone = false)\n  You and Elegy breeze through more back story: as recruits of the Department of Revenant Dignity you're assigned to stop the Traditionalists. You run some training missions and then you two receive your first field assignment: investigating an abandoned base. This is one of your favorite levels.  Elegy flits around you cheerfully, \"You know, I bet there's no Traditionalists there, never were. I bet it's some weird hazing ritual.\" Your avatar laughs it off, but you know that the creepy forest-surrounded farmhouse actually is an abandoned Traditionalist base. Well, mostly abandoned.\n\n  *fake_choice\n    #\"I doubt that.\"\n      Elegy hovers around you: a whispering cloud of mock seriousness, \"Well…in case it really is a hazing thing, don't drink whatever they give you. It'll probably be water.\"\n\n      You character smiles back, \"Thankfully, I've got you to warn me off!\" \n\n      Elegy flashes, \"Absolutely.\" Your avatar reaches out to embrace Elegy, wrapping itself in beautiful blue glowing light. The Ghost Power HUD appears on the screen.\n      *goto DungeonExploreStart\n\n    #\"Let's crash that party.\"\n      Elegy bounces up and down in a laugh, \"I'm glad to have you around. Things would get boring otherwise.\"\n\n      You avatar smiles back, \"Don't tell me you wouldn't find ways to occupy yourself: haunting a hotel or something?\"\n\n      Elegy flashes teasingly, \"Don't tempt me!\" Your avatar chuckles and reaches out to embrace Elegy, wrapping itself in beautiful blue glowing light. The Ghost Power HUD appears on the screen.\n      *goto DungeonExploreStart\n\n    #\"Let's get down to business.\"\n      Elegy bounces up and down in a laugh, \"Your work ethic will scare them back to the office!\" \n\n      Your avatar smiles back, \"I'm just worried about you deciding that this would be a great place to spend out your haunting twilight years and retiring early.\"\n\n      Elegy flashes teasingly, \"Ooh, that's not a bad idea!\" Your avatar chuckles and reaches out to embrace Elegy, wrapping itself in beautiful blue glowing light. The Ghost Power HUD appears on the screen.\n      *goto DungeonExploreStart\n\n    #\"Hey, actually, we need to talk.\"\n      Your avatar pulls Elegy aside. This part right here is one of the few chances you'll have to send off Elegy. Well, this and right before the final mission. Maybe it would be alright to wait. Elegy's blue light freezes, then starts rotating the opposite way, \"Oh? What about?\"\n\n      *choice\n        #\"Just…what do you think we'll find?\"\n          $!{Elegy_zhe} flits left and right in indecision, \"Oh, you mean for real? I hope nothing. Maybe some files. But they sent us together for a reason. We can take care of any problems we find.\" \n\n          Your avatar looks off towards the old farm house with trepidation, \"Yeah.. I hope so. It's just…\" but then ${zombie_zhe} just trails off. It's almost like your character knows it shouldn't get attached to Elegy. The love that cannot be. You sigh.\n\n          Elegy dances in front of your avatar's zombie face, \"Hey, we got this.\" Your avatars steels ${zombie_zim}self in determination, then embraces Elegy, allowing ${Elegy_zim} to suffuse it in beautiful blue glowing light. The Ghost Power HUD appears on the screen.\n          *goto DungeonExploreStart\n\n        #\"I've just got a bad feeling.\"\n          $!{Elegy_zhe} flits left and right in uncertainty, \"Yeah, me too. I can't quite place it, but something definitely feels off about this place. But they sent both of us for a reason. We got this.\"\n\n          Your avatar looks off towards the old farm house with trepidation, then reassures ${zombie_zim}self, \"Yeah. I hope so it's just…\" your character trails off then finishes suddenly, \"Let's just be careful.\" Your avatars steels ${zombie_zim}self in determination, then embraces Elegy, allowing ${Elegy_zim} to suffuse it in beautiful blue glowing light. The Ghost Power HUD appears on the screen.\n          *goto DungeonExploreStart\n\n        #\"I don't want anything to happen to you.\"\n          Elegy reassuringly dances in front of your avatar's zombie face, \"Hey, we got this.\" \n\n          Your avatar looks off towards the old farm house with trepidation, \"Yeah…I hope so too. It's just…\" but then ${zombie_zhe} picks it up, \"Well, I hope you're right.\"  It's almost like your avatar knows it shouldn't get attached to Elegy. The love that cannot be. You sigh. Your avatars steels ${zombie_zim}self in determination, then embraces Elegy, allowing ${Elegy_zim} to suffuse you. The Ghost Power HUD appears on the screen.\n          *goto DungeonExploreStart\n\n        #\"I need you to leave.\"\n          Elegy flits forward and backwards, dimming, \"Really? But, I thought we were a team? I thought that we had something going on?\" You feel hesitation, preemptive regret. And really, what does Elegy have other than this? It must be terrible to live without a real body. And you always have chances to send Elegy away later.\n\n          *choice\n            #\"I'm sorry…you need to leave.\"\n              Lights erupt from Elegy like spikes then ${Elegy_zhe} calms back to a placid sphere, \"I'm sorry too. I'll have to report this, you understand. But, whatever. Good luck on your solo mission.\" And with that, the ghostly flaming orb floats away. A GUI window pops up and fades, \"Hard Mode Engaged…\" This is probably what you need to do to save Elegy. It just hurts to do it; that's really what makes it Hard Mode.\n              *set ElegyGone true\n              *goto DungeonExploreStart\n\n            #\"Actually, please stay.\"\n              Elegy bursts like a pulsing star with happiness, \"I appreciate that you're so concerned about me, but don't you think that I'm concerned about you too? If something ever happened to you…I wouldn't be able to live with myself.\" You wince. You know that's already happened. Well, will have already happened. Maybe. But it's not yet set in stone. You're not going to fail Elegy again.\n              *goto DungeonExploreStart\n\n*if (ElegyGone = true)\n  You breeze through more backstory: Elegy is separately invited to join the Department of Revenant Dignity, but you don't really interact or work together. You're put on active duty, while Elegy is to assigned internal affairs. Turns out ghosts are really good at investigation. You acknowledge each other when you see each other around, but it's cold and distant.\n\n  That's perfect. This way, Elegy won't betray everyone for you: there won't even be the temptation to do so. You've saved ${Elegy_zim}. But this path feels so empty. Well, sometimes that's the sacrifice you have to make.\n\n  You turn your attention towards your first field assignment: the supposedly abandoned hideout. The forest-surrounded farmhouse is one of the creepier moments of the game, but Elegy had made it more of a fun adventure. Well, there is no use moping about Elegy. Time to start exploring.\n\n*label DungeonExploreStart\n\nHow should you make your way through into the building?\n\n*choice\n  *disable_reuse #\"Do some reconnaissance first.\"\n    You sneak around the grounds and in the forests, behind a chain-link fence whose lock you break, and you find a power generator. You switch it off.\n    *if (ElegyGone = true)\n      See how well those bastards see in the dark.\n    *if (ElegyGone = false)\n      Elegy laughs delightfully, \"Ha! Let's see how well those bastards see in the dark.\"\n    *set farmLightsOff true\n    *goto DungeonExploreStart\n\n  *if (ElegyGone = true) #\"Kick down the front door.\"\n    It takes several kicks, but you manage to splinter the door enough to enter.\n    *goto EntryDescription\n\n  *if (ElegyGone = false) #\"Burst down the front door.\"\n    You channel your ghost energy to blow the door off its hinges inwards.\n    *label EntryDescription\n    *set EntrySeen true\n    The place is old and deteriorating: peeling wallpaper, cracked ceilings, creaking floorboards. A bunch of furniture has been shoved in front of the windows, to give the house a normal-looking facade but the rest of the entry rooms are completely bare. Deep scratch marks cover the floor, evidence of large objects being dragged around. A wooden staircase leads up, and you remember the scratch marks leading down into the basement. The entire place is covered in dust, however, indicating that it has been abandoned for awhile.\n    *goto InsideHouse\n\n  #\"Climb a tree to a second-story window.\"\n    You practically run up the tree and then jump through the window, smashing it as you enter. It harms you a little bit, but you've already recovered most of that health passively. You end up in one of bedrooms: it's packed with two bunk beds underneath a heavy layer of dust, but not much else in the room. Even the open closet is empty. This is where the rank-and-file thugs must have had to spend their nights.\n    *goto InsideHouse\n\n  *if (ElegyGone = true) #\"Sneak through the back.\"\n    You stealthily enter through the back door, finding it an easy target to break into. It leads into a large, open kitchen that at some point must have been impressive. Now, however, the plumbing is ancient, and the wallpaper is peeling off. You're also pretty sure that the oven isn't attached to anything. There's not too much dust in here, but then everything else seems to indicate that it hasn't been used for a long time.\n    *goto InsideHouse\n\n  *if (ElegyGone = false) #\"Stealth in via ghost powers.\"\n    You shroud yourself in darkness, and as you enter through the back door, you quiet the squeaky hinges with the magical silence of the dead. You find yourself in an empty kitchen, large and open, which at some point must have been impressive. Now, however, the plumbing is ancient, and the wallpaper is peeling off. You're also pretty sure that the oven isn't attached to anything. There's not too much dust in here, but then everything else seems to indicate that it hasn't been used for a long time.\n\n*label InsideHouse\n\nYou remember from experience that the entry level has just a flavor pop scare, the upper levels have some backstory related to Lauress, and entering the basement triggers the rest of the level.\n\n*temp UpstairsExplored false\n*temp EntryExplored false\n\n*label HouseExploreOptions\n\n*if ((UpstairsExplored = true) and (EntryExplored = true))\n  You continue on the level to the basement.\n  *goto Basement\n\n*choice\n  *disable_reuse #Upstairs.\n    *set UpstairsExplored true\n    You check and are satisfied to note that the plumbing works in all the bathrooms. There are several bedrooms that have had all their furniture replaced with two sets of bunk beds each. However, each room is empty and covered with a fine layer of dust. The people who were staying here definitely cleared out. \n\n    The single study has an empty bookshelf and locked roll-top desk. You rip off the top and dig through the drawers. You find half a piece of paper that got stuck behind a drawer. It's a command from Lauress to enroll her son in the Zourobras experiments. \n    *if (ElegyGone = true)\n      Truly heartless.\n    *if (ElegyGone = false)\n      Elegy pulses purple at the revelation, \"Truly heartless.\"\n    Just to be thorough, you attack the empty book shelf, hoping for a secret door, but it results in nothing more interesting than normal environmental damage.\n    *goto HouseExploreOptions\n\n  *disable_reuse #The entry level.\n    *set EntryExplored true\n    *if (EntrySeen = false)\n      A bunch of furniture has been shoved in front of the windows while the rest of the room is completely bare. It gives the house a normal-looking facade from the outside. Deep scratch marks cover the floor, evidence of large objects being dragged around. Those lead to the basement.\n    The living room has a cabinet that's crawling with bugs. \n    *if (ElegyGone = true)\n      You open it to reveal fast food trash and scattering roaches. So gross.\n    *if (ElegyGone = false)\n      Elegy ghosts in, \"Oh, eww…so glad I don't have to eat anymore.\" The bugs scatter at ${Elegy_zir} flame. You open the doors to reveal rotting fast food trash. So gross.\n      The rest of the rooms with windows have facades similar to the entryway, but otherwise they've been completely cleaned out.\n    *goto HouseExploreOptions\n\n  #The basement.\n    *label Basement\n    *if (farmLightsOff = false)\n      You didn't notice it before, but of course now it seems incredibly suspicious that the lights are on in this basement. Someone has made sure the electricity is going.\n      *if (ElegyGone = false)\n        $!{Elegy_zhe} complains to you, \"I think at the point where you have to actually investigate the basement of an abandoned farmhouse, you're better off just torching the place.\"\n    *if (farmLightsOff = true)\n      *if (ElegyGone = false)\n        You easily navigate in the dark, with Elegy helping you illuminate the way ahead. $!{Elegy_zhe} complains to you, \"I think at the point where you have to actually investigate the basement of an abandoned farmhouse, you're better off just torching the place.\"\n      *if (ElegyGone = true)\n        You easily navigate in the dark, relying on your reflective eyes to see dim shapes and shadows. You glance around to see a (sharply highlighted) chainsaw with a gas tank.\n    There are empty cages with bars bent out. You hear something…terrible. A schlicking, meat-on-meat noise. The anticipation has hold of you.\n\n*fake_choice\n  #I love this part.\n  #It won't be that scary.\n  #It'll be kinda scary.\n  #It's a bit much for my liking.\n\nA monstrosity staggers forward, moaning low and painful. Your character can smell that it's a zombie, like you, but much larger. As it staggers closer, you can see its giant, perpetually reconstructing body. It's a Zourobras: multiple zombies grafted together, each original body part attempting to re-form over the other bodies in the construct, creating striations of consumption and destruction. The resulting creature is confused, frightened, and in unfathomable pain. It bellows and starts stumbling towards you.\n\n*choice\n  *if (ElegyGone = false) #Rip the zombie apart.\n    Elegy boosts your strength as you claw through the parts of flesh. Elegy channels dark flames from your claws, cauterizing the different zombie parts as you cut. You pull apart the separate chunks so small that they don't even attempt to reconstruct themselves. You're victorious.\n\n    *if (Elegy_zhe = \"she\")\n      Elegy revels with you in the kill, \"I may not be a phlebotomist anymore, but I still love drawing blood!\" Your character automatically snorts at the quip.\n    *goto BasementContinue\n\n  *if (ElegyGone = true) #Cut the zombies apart.\n    You grab the chainsaw from the work bench and hurriedly fill the gas tank. You can see the Zourobras approach faster and faster, and the filling-up mini-game controls nearly get away from you. But you finally drop the can, rev it up, and duck out of the way before turning the weapon towards the giant. You make a few cursory stabs at it before really jumping into it and chopping the thing up into separate pieces. Just in time too: the chainsaw has only a few seconds of fuel left. The pieces are hacked too small to even attempt to reconstruct themselves. You're victorious.\n    *goto BasementContinue\n\n  #Shoot its face out.\n    *if (ElegyGone = true)\n      You pull out both your guns and empty them into the Zourobras's face, but it keeps advancing. You try to kite it around, but there's not much room to maneuver in this small basement. You empty one clip, then another and another before finally defeating it, but you've used a heck of a lot more bullets that you would have liked to. You've got less than one clip left. You move on.\n    *if (ElegyGone = false)\n      You pull out both your guns and empty them into the Zourobras's face. Time slows, and you're able to use your ghost powers to direct each bullet into the different brain segments of the creature, putting it down with only one clip.\n\n      *if (Elegy_zhe = \"she\")\n        Elegy revels with you in the kill, \"I may not be a phlebotomist anymore, but I still love drawing blood!\" Your character automatically snorts at the quip.\n    *goto BasementContinue\n\n  *if (farmLightsOff = true) #Stay hidden in the darkness.\n     *set BasementStealth true\n     The Zourobras's night vision must be affected by the reconstruction process. It just stumbles past you, up to the ground level and out to freedom. The Department can recover it later, maybe even try to save it. You move on.\n    *goto BasementContinue\n\n  *if (farmLightsOff = false) #Burn it.\n    *if (ElegyGone = true)\n      You knock over the gas can, lure it into the puddle, rip the wiring from the walls and throw it onto the puddle. The Zourobras screams in pain, its flesh trying to reconstruct itself, but it melts into nothingness. You move on.\n      *goto BasementContinue\n\n    *if (ElegyGone = false)\n      You kite it around, nimbly throwing small bursts of flame at it to charge up a larger attack. Finally, you release a huge burst of flames. The Zourobras screams in pain, its flesh trying to reconstruct itself, but it melts into nothingness.\n\n      *if (Elegy_zhe = \"she\")\n        Elegy revels with you in the kill, \"I may not be a phlebotomist anymore, but I still love drawing blood!\" Your avatar automatically snorts at the quip.\n    *goto BasementContinue\n\n  #Try to reason with it.\n    You calmly step forward and address it like a person.\n    *if (ElegyGone = false)\n      Elegy helps you by projecting an aura of trust and understanding.\n    The Zourobras seems confused, but then just seems to enjoy hearing your voice making soothing noises. It sits down on the cold, concrete floor, then leans against the wall, closes its eyes and starts breathing deeply. Is it asleep? Should you risk going further on, or continue concentrating on keeping this thing pacified? You had no idea that this was a viable option the first time.\n\n    *fake_choice\n      #Stay a little longer to be sure.\n        You stay until you hear jagged snoring, then move on.\n\n      #Move on before it wakes up.\n        It flinches and mumbles, but it doesn't move after you. It must still be feeling pain in its sleep, but it does not wake up. You manage to move on.\n    *goto BasementContinue\n\n*label BasementContinue\n\n*if (BasementStealth = true)\n  A human wanders out of the next room, wondering what happened to the Zourobras he released to deal with the intruder. You take him out. That's one fewer human to deal with.\n\nA massive group of humans is beyond the next door. They have anticipated you, and launch a flame thrower in your face, halting your regeneration for a minute. You dispatch them in an especially elegant combo: firing off a few shots to burst open the flame thrower's fuel tank, \n*if (ElegyGone = false)\n  throwing some energy balls to ignite the spilling fuel,\n*if (ElegyGone = false)\n  causing one of them with an assault rifle to slip and fall, spraying bullets all around the room,\nthen climbing up and over furniture to maul two more enemies, and finally grabbing one of their assault rifles to take out the runner. You notice that the basement is much smaller than the first time: that Story Mode perk in action. You make your way into the final room, and cages full of Zourobras pour out.\n\n*if (ElegyGone = false)\n  You know it's supposed to be a scripted fail, but maybe if you survive this naturally, you can save Elegy?\nHow do you deal with them?\n\n*choice\n  #Kite them all and deal damage from afar.\n    *if (ElegyGone = true)\n      You never even had a chance, especially without ghost powers. You have just enough ammo from the assault rifles to take out one, then then rest get you.\n      *goto BasementFail\n    *else\n      You kite them up and outside, using a combination of ghost powers and assault rifle potshots to bring them down. But slowly you run out of bullets, then out of ghost power. You've only got melee powers left, but it's no use. You're just not good enough to bring them all down. Your timing's not tight enough. Maybe you could if you really practiced, but this isn't happening.\n      *goto BasementFail\n\n  #Exploit their size to engage in melee with one at a time.\n    *if (ElegyGone = true)\n      You never even had a chance, especially without ghost powers. You manage to rip apart one, but then the rest get you.\n      *goto BasementFail\n    *else\n      You back into a corner next to a table and hop back and forth between the table and the Zourobras, inching its health down. It's a slow but effective strategy. Or at least for awhile, until another Zourobras breaks the table, and suddenly you have nowhere to jump to to avoid blows. It's just not possible. Well, maybe if you did some really high-skilled combos, but you're just not good enough to bring them all down.\n      *goto BasementFail\n\n  #Focus on crowd control.\n    You run back to the stairs, and kite the Zourobras up the stairs, then jump down to damage the stragglers as they take the long way around to catch up. It's a solid enough strategy, but the individuals that end up as stragglers keep rotating, and you can never damage one enough before it manages to heal itself. It's a stalemate at best, and you're just not good enough to do it. They're slightly faster than you, and eventually they catch up.\n    *goto BasementFail\n\n  #Just run and make it to the extraction point.\n    They're slightly faster than you. You make it back to the first floor, then out the door, but once outside, they surround you.\n    *goto BasementFail\n\n*label BasementFail\n*if (ElegyGone = true)\n  You awaken to an armed rescue from the Department of Revenant Dignity. Guards rush pass you on either side, forcing the Zourobras into a retreat. Some of them fall. That's certainly bad, but it's much better than all of them getting wiped out. This path is definitely different. You feel like you're going to get a better outcome this time, for sure.\n  *goto ActOneEndMerge\n\nEven Elegy seems to panic: you hear from inside of you, \"Man, I had no idea, there's no way. This can't be happening.…\" This does not bode well.\n\nThe camera falls down to the floor, then swivels up to catch a mass of Zourobras before wiping to black. Five real seconds later, your avatar wakes up where it was left. Elegy hovers over it, flitting about fretfully, \"Oh, thank goodness you're awake! I led them away, but who knows how long they'll be gone. Let's go while they're distracted! Follow me!\"\n\nOf course, that's what Elegy says, but with the benefit of a second play through, you know otherwise. Elegy traded its resonance frequency for your freedom just now. The Traditionalists now have the access codes to your home base: you've just killed the whole rest of the Department of Revenant Dignity. Well, as long as you don't bring Elegy with you on the final mission, at least that means you can still save Elegy at least.\n\n*fake_choice\n  #\"Thank you for saving me.\"\n    Elegy bathes you in beautiful light, \"I couldn't leave you behind. Who would I have to look after?\" $!{Elegy_zhe} adds semi-seriously, \"But if you ever wanted to die for real and become a ghost, I'm all for it.\"\n\n    Your character laughs at Elegy, \"Thanks for the offer. If I ever decide to go through the process of becoming a will-o-the-wisp, I'll be sure to let you know so you can watch.\" \n\n    Elegy bobs in deadpan agreement, \"Thank goodness you are considerate of my inner voyeur.\"\n\n  #\"Alright, let's go.\"\n    Elegy pulses then flies towards an open door, \"This way! I'm so relieved that you're okay. I thought, I thought you were gone back there.\" $!{Elegy_zhe} adds semi-seriously, \"But if you ever wanted to die for real and become a ghost, I'm all for it.\"\n\n    Your avatar laughs at Elegy, \"Thanks for the offer. If I ever decide to go through the process of becoming a will-o-the-wisp, I'll be sure to let you know so you can watch.\" \n\n    Elegy bobs in deadpan agreement, \"Thank goodness you are considerate of my inner voyeur.\"\n\n  #\"I don't believe you.\"\n    Elegy dims, then brightens up again, \"Well, they're not as clever as they look. I just left your body and they all followed me, like moths. But they'll come back soon.\"\n\n    You character pushes it angrily, \"No. What really happened? Tell me what really happened.\"\n\n    Elegy dances left and right in frustration, \"Listen, I told you what happened. Now let's not dwell on it while they're still out there!\" That's pretty unconvincing. Elegy is such a bad liar. Elegy piles on even more, \"I just…I just care about you and want you to be okay.\"\n\n  #\"You should have left without me.\"\n    Elegy halts, \"What? Never! Listen, I'll leave you alone if that's what you really want, but first I'm getting you to safety, no matter what. I didn't risk myself back there just so that you could throw it away. Now let's go!\"\n\n    The camera obliges, following Elegy out.\nYour avatar runs on all fours towards the extraction point. The Zourobras follow right behind you, and it's a close shave to make it to the helicopter in one piece. But you do make it. Elegy loops a slow circle of relief before floating off into a corner and dimming; no doubt brooding on ${Elegy_zir} betrayal. Should you say something?\n\n*fake_choice\n  #I embrace Elegy in comfort.\n    Your avatar reaches out a hand and steps into Elegy's enveloping light. Elegy sighs with deep appreciation at your gesture. It might have been a stupid thing to do, but you forgive ${Elegy_zim}. Even Elegy deserves forgiveness.\n\n  #I say some kind words to Elegy.\n    Your avatar smiles at Elegy, \"Hey, I'm really glad that we managed to get out of there alive. Thanks for saving me.\"\n\n    Elegy floats somewhat awkwardly in front of your avatar, basking it in the blue light, \"I couldn't just abandon you. I'm glad you're here with us now.\"\n\n  #I say nothing. Let ${Elegy_zim} stew about it.\n    It's a long and awkward cut-scene of the two of you both, feeling uneasy. Your avatar looks at Elegy, opens ${zombie_zir} mouth, then closes it again. It wrenches your stomach. Maybe you're being too hard on Elegy.\n\n  #I tell Elegy off.\n    Your character turns to Elegy with frustration, \"Why did you do that? How could you do that? I can't believe that this is happening!\"\n\n    Your character fumes in ${zombie_zir} own corner, as Elegy tries to apologize, \"I…I wanted to make sure that you were safe. I just…I really care about you. You saved my life.\"\n\n    Your avatar's face softens, \"Hey, don't mind me being a douche. Just…those Zourobras really get to me. I'm sorry. I shouldn't have snapped.\" Elegy brightens a bit, but you can still see that ${Elegy_zhe}'s torn up over it all.\n\n*label ActOneEndMerge\n\nThe level ends. You take a deep breath to contemplate those consequences. Hopefully, it'll be enough to make a difference. You take a moment to readjust to the blank white walls in your room: to reality. It's almost lunch: time to get back to things. You turn off your computer and pack it away.\n\n*label skip-ahead\n\n*set CreaturesProgress \"Act2\"\n\n*finish Off to Lunch\n", "creatures": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Creatures Such as We[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n  *delay_break 600\n\n*label purchased\n\n*comment Creatures Such as We Part of the Game\n\n*comment Progress labels: firstFight,\n*comment Progress settings: none, Intro, firstFight, ActOne, ActTwo, ActThree\n\n*temp dayTwoWashed false\n*temp AndThenCounter 0\n\n*temp tookAmmo false\n\n*if (CreaturesProgress = \"Intro\")\n  *goto BothPartsMerge\n\n\nThe game creates a new save file for you as the prologue starts. Your character walks into a medical facility, past a television looping anti-zombie political arguments from the (recently missing) activist senator Lauress, and up to the check-in counter. The receptionist—a zombie—stands and waves you along, \"Come with me! They're ready for you.\" He chats as he walks, \"I'm glad you've elected to take the procedure, it's quite simple, and you can't imagine how fantastic you feel afterward, when your body is constantly at its best.\" He directs you into a room with two smiling zombies wearing lab coats.\n\nThe room has a full-wall mirror on one side, and as your character turns to look at the reflection in the mirror you see yourself as a zombie, and the game fades into the character select tool. Which gender do you choose for yourself?\n\n*label WouldBeNice\n\n*choice\n  #Male.\n    *set zombie_zhe \"he\"\n    *set zombie_zir \"his\"\n    *set zombie_zim \"him\"\n    *goto zombieChoice2\n\n  #Female.\n    *set zombie_zhe \"she\"\n    *set zombie_zir \"her\"\n    *set zombie_zim \"her\"\n    *goto zombieChoice2\n\n  *disable_reuse #You wish there were more choices.\n    The character creation was kind of nagging you the first time you went through character creation, but now the over-simplified options feel just totally glaring. How can you put yourself into the game with so much diversity stripped out? Maybe the lack of choice is something you can ask them about later.\n    *goto WouldBeNice\n\n*label zombieChoice2\n\nAnd then which base skin color do you choose for yourself?\n\n*label WouldBeNice2\n\n*fake_choice\n  #Caucasian.\n  #African.\n  #Asian.\n  *disable_reuse #This should have more choices, too.\n    It feels really glaring here. Why not offer more options that reflect real people?\n    *goto WouldBeNice2\n\n*label zombieChoice3\nAll of the options unlock, and the reflection solidifies into a preset zombified face. You have sliders where you can make minor adjustments: bone structures, hair styles, facial scars, body size. What sort of look are you going for with your zombie?\n\n*fake_choice\n  #Absolutely ruthless.\n    *goto nonRandomAppearance\n  #Gruff and troubled.\n    *goto nonRandomAppearance\n  #Lean and creepy.\n    *goto nonRandomAppearance\n  #Strict and no-nosense.\n      *goto nonRandomAppearance\n  #Beautifully stunning.\n    *goto nonRandomAppearance\n  #Sweet and kind.\n    *label nonRandomAppearance\n    You want it to look perfect, especially for all the action angles. As you adjust the details of the face, you really get into the groove of messing with the sliders.\n\n  #Hit \"random\" until I find something I like.\n    You're not sure exactly what you want, but you know it needs to look awesome. You hit the randomizer a bunch of times, noting and comparing different cool settings that could maybe work together.\n\n  #Just stick with the default.\n\nYeah, that looks good. Then you notice a button that you didn't before: \"Use previous appearance.\" Well, shit. You like the new look you've got now, but you're also a bit attached to the old appearance. Which one do you use?\n*choice\n  #The new appearance.\n    *goto zombieGameplayMerge\n\n  #The old (female) appearance.\n    *set zombie_zhe \"she\"\n    *set zombie_zir \"her\"\n    *set zombie_zim \"her\"\n    *goto zombieGameplayMerge\n\n  #The old (male) appearance.\n    *set zombie_zhe \"he\"\n    *set zombie_zir \"his\"\n    *set zombie_zim \"him\"\n    *label zombieGameplayMerge\n    With that settled, you continue the game. The man takes a cutely timid step forward, \"Hey there. I'm the technician that will be assisting with scans and x-rays, monitoring your progress to make sure that the transition happens smoothly.\" He practically purrs, \"I really look forward to working with you.\"\n\n    The woman immediately follows, \"I'm the phlebotomist: I'll be monitoring the doctor administering the initial injection, and then taking your blood for periodic testing. I hope you won't hold it against me too much,\" she gently teases.\n\n    The receptionist turns to you, \"Well, you can either get your pre-injection scans or blood work knocked out first. Who would you like to go with?\" It's hard to decide between the two.\n\n    *label MedicChoice\n\n    *choice\n\n      *hide_reuse #Why do I have to choose?\n        The medics laugh and exchange devious grins. Then they explain that while normally that sounds like a lot of fun, at the moment it's purely a practical matter. After all, you can't be scanned at the same time that your blood is being drawn! They do hint about maybe later, though. That's actually pretty cool.\n        *goto MedicChoice\n\n      #The technician…he's cuter.\n        The phlebotomist practically pouts, \"Oh, well, are you sure? I don't have anyone else scheduled for another 15 minutes.\" \n\n        The technician teases the phlebotomist, \"Come on now, stop trying to steal all the cute ones for yourself!\" He shoots your character a devil-may-care smile and points to the door, \"Let's go get those scans done.\"\n\n        *choice\n\n          #Let's get scans indeed.\n            *set elegy_zhe \"he\"\n            *set elegy_zir \"his\"\n            *set elegy_zim \"him\"\n            *set elegyProfession \"technician\"\n            *goto definite\n\n          #Actually, I'm switching to getting my blood drawn.\n            *set elegy_zhe \"she\"\n            *set elegy_zir \"her\"\n            *set elegy_zim \"her\"\n            *set elegyProfession \"phlebotomist\"\n            *goto changedMind\n\n      #The phlebotomist…she's cuter.\n        The technician practically pouts, \"Oh, well, are you sure you wouldn't like to come with me first? I don't have anyone else scheduled for another 15 minutes.\"\n\n        The phlebotomist teases the technician, \"Come on now, stop trying to steal all the cute ones for yourself!\" She shoots your character a devil-may-care smile and points to the door, \"Let's go get that blood drawn.\"\n\n        *choice\n          #Sounds like fun.\n            *set elegy_zhe \"she\"\n            *set elegy_zir \"her\"\n            *set elegy_zim \"her\"\n            *set elegyProfession \"phlebotomist\"\n            *goto definite\n\n          #Actually, I'm going with scans first.\n            *set elegy_zhe \"he\"\n            *set elegy_zir \"his\"\n            *set elegy_zim \"him\"\n            *set elegyProfession \"technician\"\n            *label changedMind\n            The ${elegyProfession} practically bounces with delight at having won you over.\n            *label definite\n            $!{Elegy_zhe} leans in close while leading your avatar down a hallway, \"So, what made you decide to make the transition now? I hear that even Lauress is shutting up about it now, after her son.…\" An explosion interrupts ${elegy_zir} sentence and the camera view shakes wildly. A ringing noise drowns out background shouting, and you hear more blast noises. The camera pans over to show the ${elegyProfession} grab your arm and bite. Then everything fades to black.\n\n*goto BothPartsMerge\n\n*label CreaturesIntro\n\n*comment THIS IS WHERE PART 2 STARTS IF YOUVE ALREADY DONE CHAR SELECT\n\nYou close your door behind you and flop down on your bed. This is way outside of your paygrade. Of course if things do get bad, you could just lock them all up. It wouldn't be great for PR, but then who would blame you for being on the safe side? Ugh, no, you can't do that. You just need to keep things pleasant for the next day or two.\n\nYou really need to just…unwind. You're craving some gaming, but should you do anything else first?\n\n*label preGameChoice\n*if (AndThenCounter = 1)\n  Anything else that you should do?\n*if (AndThenCounter = 2)\n  Anything else?\n*if (AndThenCounter = 3)\n\n  You're getting anxious to get back to [i]Creatures[/i]. You start it up.\n  *goto PlayTime\n\n*set AndThenCounter +1\n\n*choice\n  *disable_reuse #Do some deep breathing.\n    You sink into your bed. Breathing in…breathing out…you let yourself sink into your surroundings. You focus on relaxing each muscle. You feel better, more confident. You can do this. And you actually believe it. Ten minutes later, you sit up.\n    *goto preGameChoice\n\n  *disable_reuse #Wash up for bed.\n    You brush your teeth and wash your face. Always with the smallest amount of soap, toothpaste, and water. You feel much better, fresher and relaxed.\n    *set dayTwoWashed true\n    *goto preGameChoice\n\n  *disable_reuse #Play another game first.\n    You lie back on your bed and churn through a quick and casual dice-adapted game on your walkie-talkie. It feels nice to get some progress done.\n    *goto preGameChoice\n\n  #Just play [i]Creatures[/i].\n    *goto PlayTime\n\n  *comment You boot up the game again where you left off: having been bitten while in the exploding hospital.\n\n\n*label BothPartsMerge\n\nVision returns, focused on the ground. Your avatar looks at ${zombie_zir} hands. They've turned ashen gray, and you can see flesh reconstructing a gash in real-time. You stand up and look over to the ${elegyProfession}. $!{Elegy_zhe} has multiple pieces of debris piercing and pinning ${elegy_zim} to the ground. $!{Elegy_zhe} waves you over, \"Thank goodness you're alright. Listen, we need to get out of here, and I need your help. You're going to have to rip apart my body, and then allow it to reconstruct itself.\" Your character recoils as the ${elegyProfession} continues, \"I've been thinking about this while you've been out. It is the only way. Please.\"\n\nYou assess ${elegy_zir} body. The torso is pinned, but most of the pressure seems to be on a single pipe. If you ripped the body in half, it should be possible to rejoin the halves afterward. How do you start the process?\n\n*fake_choice\n  #Pull apart with my claws.\n    The ${elegyProfession} winces as your avatar rips and pulls. The flesh tries to reconstruct itself, so you have to work quickly and decisively. You notice the internal organs retract as you pull more and more of the body apart. Finally, all you have left is the spinal column. Your avatar digs both hands into ${elegy_zir} back and pulls from both sides, snapping it in half. Your avatar pushes together the parts and allows them to start reforming.\n\n  #Bite apart with my fangs.\n    You notice your character taking pains not to actually eat any of the flesh. Your character bites and pulls carefully and precisely to cut open the ${elegyProfession}. The flesh tries to reconstruct itself, so you have to work quickly and decisively. You notice the internal organs retract as you pull more and more of the body apart. Finally, all you have left is the spinal column. Your avatar digs both hands into ${Elegy_zir} back and pull both sides, snapping it in half. You push together the parts and allow them to start reforming.\n\n  #Cut apart the body with pieces of sharp and heavy debris.\n    Your avatar grabs a sharper piece of cement and brings it down heavily, decisively against the ${elegyProfession}'s torso. Again, and again: through the skin, the muscles, the spine. You watch as the flesh tries to reconstruct itself and as the internal organs retract away from the forming wounds. Your avatar pulls the halves out and then pushes together the parts and allows them to start reforming.\n\n  #Try to leverage off the debris.\n    You pull up some of the debris, and manage to shift the weight so that only part of the ${elegyProfession}'s body is trapped. Some metal rods are fixed in place, but you can pull the body through them to the other side. Even as the metal rips apart muscle and bone, you can see the flesh trying to repair itself along the wounds. Finally, you clear out the rest of the debris.\n\nThe ${elegyProfession} moans and sits up, \"Thanks. You're the best. I'm sorry that I rushed you through the procedure, but looks like that bite saved both our lives. I'm Elegy, by the way.\" A self-chosen name after turning, you're sure. Elegy looks your avatar over, and smiles. \n\nYou hear movement, see uniforms in the distance. A military rescue worker runs up, \"Any survivors?! Any survivors?!\"\n\n*fake_choice\n  #\"Here I am!\"\n  #\"There are two survivors here!\"\n  #\"Please, help Elegy here!\"\n\nThe worker runs towards your character and reaches into a pack for supplies. Then you hear a gunshot in the distance. Time seems to slow as you see the hatred in her eyes, the incorrect details in the uniform, the visible glint of a gun in the pack. The game constructs a quick projective cut-scene of her murdering you both.\n\nBut it hasn't happened yet. The woman is still reaching for the gun. Elegy jumps onto her, biting and clawing. You have to help.\n\n*fake_choice\n  #Attack the guard with claws and fangs.\n    You pounce at the fake rescuer. She struggles against Elegy, and fires once, twice. Elegy crumples. But the rescuer doesn't have time to turn against you. You rip at her face, her chest. You bite through her neck. There are screams, but you do justice.\n\n  #Smash debris against the guard's head.\n    You grab a slab of concrete and run towards the fake rescuer. She struggles against Elegy, and fires once, twice. Elegy crumples. But the rescuer doesn't have time to turn against you. You bash against her face, and she stumbles back screaming, dropping her gun and raising her arms to protect herself. You smash through the arms, and crush her skull. You do justice.\n\n  #Turn her gun against her.\n    You pounce at the fake rescuer. She struggles against Elegy, and fires once, twice. Elegy crumples. But the rescuer doesn't have time to turn against you. You rip her hand off from her arm and pull out the gun. You kick her down and fire the remaining bullets into her.\n\nElegy was not so lucky. The shots hit ${elegy_zir} head. That's not survivable. The only hope Elegy has is if you help ${elegy_zim} become ethereal. But your character has no idea how it's done. Well, last time you picked the option to hold the body. But maybe anything works?\n\n*fake_choice\n  #Hold the body.\n    You press it close to you, wrapping yourself around the flesh. Your character glows blue and sighs. There are whispers all around you. Your avatar shuts ${zombie_zir} eyes tightly.\n\n  #Eat the brain.\n    It can be dangerous to mix zombie-flesh bodies like this, but eating Elegy feels appropriate. You try not to cringe at the chewing, the swallowing, the bone-crunching noises. Your character glows blue and sighs. There are whispers all around you. Your avatar shuts ${zombie_zir} eyes tightly.\n\n  #Use your blood on the wound.\n    It hisses and steams. You have to cut deep to get ahead of your own self-healing, and to use enough to cover the whole brain and all its scattered locations. The steam condenses and coalesces into a floating blue flame.\n\n  #Immolate the body immediately.\n    You drag it to a fire, then go back for all the small brain bits. The body roasts furiously, almost immediately leaving behind ashes. The smoke condenses and coalesces in a floating blue flame. Elegy rises from the ashes, \"Well, this tingles.\"\n$!{Elegy_zhe} floats up, down, then rotates and expands, playing with ${Elegy_zir} new body.\n\n$!{Elegy_zhe} is now immortal, but at the cost of being practically immaterial. Elegy regards the remains of ${Elegy_zir} body, \"What a senseless waste. I didn't even get to eat anyone's brains.\" $!{Elegy_zhe} turns to you, \"Maybe we could fix that together?\" Some gunshots in the distance startle both the characters. The level is about to start. What preparation should you do before things get serious?\n\n*label ReloadStateOne\n\n*fake_choice\n  #Focus on healing to full.\n   You focus inward as your body stitches itself back together. Elegy approaches your character,\n  #Search the body for weapons.\n    *set tookAmmo true\n    You manage to find additional ammo, but no information. Disappointing. Elegy approaches your character,\n  #Help Elegy.\n    Elegy approaches your character first,\na flitting light. The air around ${elegy_zim} glows, \"We should work together: merge. It'll make you more powerful, and now that I'm…like this, well, I need a new job for starters.\"\n\n*fake_choice\n  #\"Of course, let's do it.\"\n    Elegy floats in front of your avatar, bouncing left and right, \"I am a bit nervous, forgive me if I don't do it quite right…\" but as the merging starts, Elegy trails off and your avatar glows blue, smiling in spreading delight. It must feel amazing. A real feeling of warmth and belonging washes over your own body as you watch.\n    *goto firstFightMergePreHUD\n\n  #\"Okay, but only for now.\"\n    Elegy floats in front of your avatar, bouncing left and right in hesitation, \"Yeah, I'm a bit nervous about it too. Speaking of which, um, forgive me if I don't do it quite right…\" but as the merging starts, Elegy trails off and your avatar glows blue, smiling in spreading delight. It must feel amazing. A real feeling of warmth and belonging washes over your own body as you watch.\n    *goto firstFightMergePreHUD\n\n  #\"I'm not sure that this is a good idea.\"\n    Elegy hesitates, \"Well, if you don't want to, I guess I'll just have to see if I can talk them into surrendering. Or annoy them to death.\"\n\n    Your avatar presses ${zombie_zir} hand to ${zombie_zir} temple before relenting, \"No, it's fine. I just…felt like something was wrong about joining.\" \n\n    Elegy pauses, \"Uh, well, I don't wanna merge if you don't wanna. Not gonna press it. Not sure if you know this, but we'd be ridiculously awesome as a team. You'd be nigh invincible. I'd be able to actually do a thing.\"\n\n    You pause. Sending Elegy away here would almost certainly save ${Elegy_zim}, but there will be plenty of other chances later on to send ${Elegy_zir} away. You could have fun with Elegy for at least some of the game.\n\n    *fake_choice\n      #\"Let's merge and kick some ass.\"\n        Elegy bounces in front of your avatar, \"Awesome, thanks! I just hope that…well, this is my first time trying this out so, um, forgive me if I don't do it quite right.\" Your avatar moves towards Elegy. As the merge starts, your character glows blue and Elegy trails off into silence. A smile spreads overs your character's face. It must feel amazing. A real feeling of warmth and relief washes over your own body as you watch.\n        *goto firstFightMergePreHUD\n\n      #\"I think we should separate.\"\n        *set ElegyGone true\n        Elegy flips backwards, \"I respect that. You do your thing. I'll do mine. I'm off to go 'Boo,' at them, or something. Warn people, at least. You do whatever you need to. Maybe I'll see you around, eh? Thanks again for saving me. I'll never forget it.\" $!{Elegy_zhe} floats off.\n\n        A GUI window pops up and fades, \"Hard Mode Engaged…\" This is probably what you need to do to save Elegy. That's why it's Hard Mode. You'll miss having ${Elegy_zim} around, but it's for the greater good. Well, here goes nothing. You run towards your first foes.\n        *goto firstFightMergePostHUD\n\n  #No.\n    Elegy flits left and right, radiating uncertainty, \"Uh, well, I don't wanna merge if you don't wanna. Not gonna press it. But, not sure if you know this, but we'd be ridiculously awesome as a team. You'd be nigh invincible. I'd be able to actually do a thing.\"\n\n    You hesitate. Sending Elegy away here would almost certainly save ${Elegy_zim}, but there will be plenty of other chances later on to send ${Elegy_zir} away. You could have fun with Elegy for at least some of the game.\n\n    *fake_choice\n      #\"I'm sure. Go away.\"\n        *set ElegyGone true\n        Elegy flips backwards, \"I respect that. You do your thing. I'll do mine. I'm off to go 'Boo,' at them, or something. Warn people, at least. You do whatever you need to. Maybe I'll see you around, eh? Thanks again for saving me. I'll never forget it.\" $!{Elegy_zhe} floats off.\n\n        A GUI window pops up and fades, \"Hard Mode Engaged…\" This is probably what you need to do to save Elegy. That's why it's Hard Mode. You'll miss having ${Elegy_zim} around, but it's for the greater good. Well, here goes nothing. You run towards your first foes.\n        *goto firstFightMergePostHUD\n        \n      #\"Actually, please stay with me.\"\n        Elegy bounces in front of your avatar, \"Awesome, thanks! I just hope that…well, this is my first time trying this out so, um, forgive me if I don't do it quite right.\" Your avatar moves towards Elegy. As the merge starts, your character glows blue and Elegy trails off into silence. A smile spreads overs your character's face. It must feel amazing. A real feeling of warmth and relief washes over your own body as you watch.\n        *goto firstFightMergePreHUD\n\n*label firstFightMergePreHUD\n\nA new piece of the HUD pops up: Ghost Power. It also glows bright blue. You chuckle at how much smaller it looks compared to the bar you've gotten used to at the end of the game.\n\n*label firstFightMergePostHUD\n\nYou approach your first set of foes: more disguised rescue workers searching for survivors. How do you take them out?\n\n*choice\n  #Guns.\n    *if ((ElegyGone = true) and (tookAmmo = false))\n      You fire at the enemies, but without the skill-boosting ghost powers or additional guns, you miss frequently and run out of ammo almost immediately. You're forced to reload a save state.\n      *set ElegyGone false\n      *goto ReloadStateOne\n\n    *if ((ElegyGone = true) and (tookAmmo = true))\n      You manage to take out the first wave of enemies, and refill your ammo just as you're about to run out. It's much more of a survival game without ghost powers boosting your skills, and you have to make every bullet count. But you manage to blast your way through wave after wave until real rescue workers arrive.\n      *goto levelOneMerge\n\n    *if (ElegyGone = false)\n      You blast through wave after wave of fake rescue workers until the real ones arrive. With the skill-boosting ghost powers, you are able to really slow down and focus on your aim, getting a near perfect ratio of headshots.\n      *goto levelOneMerge\n    *goto levelOneMerge\n\n  #Biting and Clawing.\n      *if (ElegyGone = true)\n        Without ghost powers, you aren't able to approach enemies quickly enough before they can see and shoot you. You take a lot of damage, and they end up getting the better of you. You're forced to reload from a save.\n        *set ElegyGone false\n        *goto ReloadStateOne\n\n      *if (ElegyGone = false)\n        You tear through wave after wave of fake rescue workers until the real ones arrive. With the skill-boosting ghost powers, you are able to pounce up walls, rip off limbs, and launch from target to target, moving faster than they can hit you.\n        *goto levelOneMerge\n      *goto levelOneMerge\n\n  #Stealth.\n      *if (ElegyGone = true)\n        It's fairly difficult without ghost powers, but you manage to get somewhat close to enemies before they notice you. They get a shot or two into you before you are able to run and close the distance, biting and clawing them into submission. You take time to sneak into a corner and recharge your health. It's slow going, but your adrenaline is pumping the whole time as you move from target to target.\n        *goto levelOneMerge\n\n      *if (ElegyGone = false)\n        Elegy shrouds you in silence. You sneak up to groups of enemies and snap one neck before jumping to the next target and clawing off his face. Usually, you manage to finish off whole groups before they can even get a shot in.\n        *goto levelOneMerge\n      *goto levelOneMerge\n\n  *if (ElegyGone = false) #Ghost powers.\n    Your avatar channels magical balls of energy and lightning through ${zombie_zir} one hand, flinging them into foes from a distance while holding up the other into a force field against bullets. At one point, an enemy tries to sneak up behind you, but you melee bash him with the force field before he can even get in a hit.\n    *goto levelOneMerge\n\n*label levelOneMerge\n*if (ElegyGone = false)\n  You enjoy Elegy's quips and goads as you tear through the bodies. You're glad you didn't send ${Elegy_zim} away.\n*if (ElegyGone = true)\n  You miss Elegy's quips and goads. The experience feels a bit empty, but you reassure yourself that it's for the best. You wouldn't have been able to save ${Elegy_zim} otherwise.\n*goto StoryModeBreak  \n\n*label StoryModeBreak\n\nYour body tingles at the rush. Thanks to Story Mode, the fighting portion is actually a lot shorter and soon the level ends and the game congratulates you. You breeze through the next level where the Department of Revenant Dignity inducts you as a new recruit. Your progress saves: one step closer to the finish. You can't wait to reach the ending. This time, it will go better; you're certain of it. \n\nBut that'll have to be another day. The stress of the day catches up with you, and you can feel that you should have gone to bed an hour ago. You power down and velcro back into your bed. Things are looking good.\n\n\n*finish Time for Sleep\n", "day1-afternoon": "*comment Sixth part of the game\n\n*temp activity \"blank\"\n*temp playingCreatures false\n*temp ElegyProfession \"blank\"\n*temp randPlanetStory 1\n*temp RefuseAvailable false\n\n*comment  *goto skip-ahead\n\nYou've got slightly less than an hour before the first scheduled activity; before you're responsible for the tourists again. This is the sort of time you've long ago learned to carve out for yourself doing basic maintenance. How should you spend the time?\n\n*choice\n\n  #Get some exercise\n    *set activity \"exercise\"\n    With the lessened gravity, regular exercise is contractually mandatory. Although, since people atrophy into frail skeletons even with disciplined routines, medical technology helps out. You strap testosterone patches around your legs and tie weights to your body. Legs first: squats, kicks, adductions, abductions, heel lifts. You even wiggle your toes. \n\n    [i]…Three, four, five…[/i]  You count the reps.\n\n    The routine is soothing, and you allow yourself to drift…\n    *goto mindWander1\n\n  #Get some \"sun\"\n    *set activity \"sun\"\n    The walls and windows of the building are specially designed to filter out the cancerous solar radiation. But the lack of real sunlight left people depressed over long periods of time. Spacejoy originally just fitted every employee's cabin with full-spectrum light bulbs, but they found that adding a low-intensity sun bed was a helpful supplement. And, of course, a tourist perk. What type of music do you listen to while relaxing?\n\n    *fake_choice\n      #Muted radstatic.\n        You set the machine for thirty minutes and put on protective eye-wear. You climb in close the lid. The bulbs turn on and you enjoy the sensation of your skin warming. The speakers start silent, but slowly the white noise of gentle static crescendos until you direct the volume to hold.\n\n      #Ancient orchestral.\n        You set the machine for thirty minutes and put on protective eye-wear. You climb in close the lid. The bulbs turn on and you enjoy the sensation of your skin warming. The speakers start silent, but slowly the soothing chords of brass, woodwinds, strings, and percussion crescendos until you direct the volume to hold.\n\n      #Pseudo-classical.\n        You set the machine for thirty minutes and put on protective eye-wear. You climb in close the lid. The bulbs turn on and you enjoy the sensation of your skin warming. The speakers start silent, but slowly the delicious familiarity of modern songs performed by soothing ancient string instruments crescendos until you direct the volume to hold.\n\n      #Modern tonal.\n        You set the machine for thirty minutes and put on protective eye-wear. You climb in close the lid. The bulbs turn on and you enjoy the sensation of your skin warming. The speakers start silent, but slowly the soothing chords of harps, chimes, humming, and bird chirps crescendos until you direct the volume to hold.\n    You quickly lose yourself in the music, and your mind starts to drift.…\n    *goto mindWander1\n\n  #Play some video games.\n    *set activity \"games\"\n    You return to your room and lock the door. A wave of relief washes over you as you boot up the computer. It will be nice to get some gaming done. You browse your library…[i]Creatures[/i] is certainly tempting, but you wouldn't have that much time to play it. Probably not even past character creation. There's other games too.\n\n    *choice\n\n      #A new game of [i]Creatures Such as We[/i].\n        *set CreaturesProgress \"Intro\"\n        *set UndeadIntroPlayed true\n        *set playingCreatures true\n        The game creates a new save file for you as the prologue starts. Your character walks into a medical facility, past a television looping anti-zombie political arguments from the (recently missing) activist senator Lauress, and up to the check-in counter. The receptionist—a zombie—stands and waves you along, \"Come with me! They're ready for you.\" He chats as he walks, \"I'm glad you've elected to take the procedure, it's a quite simple, and you can't imagine how fantastic you feel afterward, when your body is constantly at its best.\" He directs you into a room with two smiling zombies wearing lab coats.\n\n        The room has a full-wall mirror on one side, and as your character turns to look at the reflection in the mirror, the game fades into the character select tool. Which gender do you choose?\n\n        *label WouldBeNice\n\n        *choice\n          #Male.\n            *set zombie_zhe \"he\"\n            *set zombie_zir \"his\"\n            *set zombie_zim \"him\"\n            *goto zombieChoice2\n\n          #Female.\n            *set zombie_zhe \"she\"\n            *set zombie_zir \"her\"\n            *set zombie_zim \"her\"\n            *goto zombieChoice2\n\n          *disable_reuse #You wish there were more choices.\n            The character creation was kind of nagging you the first time you went through character creation, but now the over-simplified options feel just totally glaring. How can you put yourself into the game with so much diversity stripped out? Maybe the lack of choice is something you can ask them about later.\n            *goto WouldBeNice\n\n        *label zombieChoice2\n\n        And then which base skin color do you set the slider to?\n\n        *label WouldBeNice2\n\t\t\n        *fake_choice\n          #Caucasian.\n          #African.\n          #Asian.\n          *disable_reuse #This should have more choices, too.\n            It feels really glaring here. Why not offer more options that reflect real people?\n            *goto WouldBeNice2\n\n        All of the other options unlock, and the reflection solidifies into a preset zombified face. You have sliders where you can make minor adjustments: bone structures, hair styles, facial features, body size. What sort of look are you going for with your zombie?\n\n        *fake_choice\n          #Absolutely ruthless.\n            *goto nonRandomAppearance\n\n          #Gruff and troubled.\n            *goto nonRandomAppearance\n\n          #Lean and creepy.\n            *goto nonRandomAppearance\n\n          #Strict and no-nosense.\n            *goto nonRandomAppearance\n\n          #Beautifully stunning.\n            *goto nonRandomAppearance\n\n          #Sweet and kind.\n            *label nonRandomAppearance\n            You want it to look perfect, especially for all the action angles. As you adjust the details of the face, you start to really get into the groove of messing with the sliders, and your mind starts to wander.…\n            *goto mindWander1\n\n          #Hit \"random\" until I find something I like.\n            You're not sure exactly what you want, but you know it needs to look awesome. You hit the randomizer a bunch of times, noting and comparing different cool settings that could maybe work together. As you get into the groove of randomizing and locking various settings, your mind starts to wander.…\n            *goto mindWander1\n\n      #A puzzle game.\n        You choose \"Offline Mode\" (which, of course, it asks you to confirm every time.) Pushing blocks, chopping them into triangles to push around, then freezing them back into blocks. Freezing multiple blocks into larger cubes to get larger triangles. There's a specific rhythm to the game, and you comfortably fall into it. Your mind starts to drift.…\n        *goto mindWander1\n\n      #An action game.\n        A hack-and-slash arcade-style game where you mash through waves and waves of tiny enemies. It's a slog, but you enjoy the feeling of constant progress and powerful strength. You fall into the rhythm of the game and your mind starts to drift.…\n        *goto mindWander1\n\n      #Something more casual.\n        You pull out a restaurant-owning game. You cycle through menus and contemplate prices as customers start pouring in. You deal with staff issues, upgrade or fix broken parts of the facilities and start accumulating money. The game has a simple enough strategy with only a few curveballs, and you fall into a natural rhythm. Soon your mind starts to drift.…\n        *goto mindWander1\n\n      #An artistic game.\n        You pull out a rhythm-based table-flipping game. You start sorting through all the locations: homes, restaurants, underwater, and so on. As you go through the motions of setting up the perfect tables, your mind starts to drift.…\n        *goto mindWander1\n\n  *if (pipePromise = true) #Go inspect the pipes.\n    *set activity \"pipes\"\n    Well, you did promise that you'd do this favor. You crawl into an access panel close to the swimming pool. Before the pool can be refilled, the system needs a manual inspection to make sure that refilling it won't deplete the water reserves. You set the system to \"Test\" and follow the pipes to manually inspect for leaks as it runs. After the first five minutes of looking up and down pipes, your mind starts to wander.…\n    *goto mindWander1\n\n  *if (washed = false) #Go take a real shower.\n    *set activity \"shower\"\n    Astringent always leaves you feeling gummy towards the end of the day, and it would be nice to freshen up. You return to your room and lock yourself in, carefully setting aside your outfit for reuse. As the water starts to run, your mind starts to wander.…\n    *goto mindWander1\n\n  #Stay nearby on-call.\n    *set activity \"nearby\"\n    Tourists are always a bit antsy when they first shuttle up, and considering how potentially upsetting their welcoming was, they might be especially anxious for your help. You camp out in the (blissfully empty) employee lounge, and amuse yourself with a simple game system in your walkie-talkie: a path-optimizing game with a turn-based RTS element around claiming path advancement. As you fall into the plan-fight-expand rhythm of the game, your mind starts to wander.…\n    *goto mindWander1\n\n*label mindWander1\n\n*choice\n\n  #About the tourists.\n\n    Specifically…\n\n    *fake_choice\n      #Andres.\n        He does have a pretty cute smile. And you certainly appreciate his confidence. You wonder if he has dogs; he seems like a dog person. Maybe it's the authority that he commands. You then realize that you haven't thought about dogs or owning one in probably over a year. You wonder just how much space-living is changing you.\n\n      #Diana.\n        She does have a pretty cute smile. And you like someone who breaks out of the ordinary every now and then. You wonder if her ideas come to her in dreams. Although, maybe she doesn't dream. What must her mind be like if she comes up with those visions and doesn't dream?\n\n      #Sadri.\n        She does have a pretty cute smile. And she's clever. It must be pretty tough for her though, working in the tech industry. It's one of the few places that's lagging behind; no wonder that she's so shy all the time. It's more rare now, but they still have impassioned arguments over why 90-9-1 gender splits are the acceptable status quo. Ugh. She must have to deal with that all the time. And it can be even worse in a small, indie place. You wish there was some way you could reach out and help her. Just let her know that you appreciate her work.\n\n      #James.\n        He does have a pretty cute smile. And you appreciate his wit and perception. You're used to the guests here only thinking that they're smart while really being pretty dull. You wonder what he likes to do to relax. Maybe watch bad movies, those are always hilarious. They're definitely the best when the people making them put their heart and soul into it, and it comes out just a t
