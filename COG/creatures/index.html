rly certain that he can't hear you in here, considering his situation. How do you handle the call?\n\n        *label radioCallMerge\n        *fake_choice\n\n          #Completely pissed.\n            You do not hold back your wrath, \"What the fuck are you doctors doing? Grant was still sick, puking his fucking guts out. Do you know how incredibly bad this looks in front of all the other guests? Nobody's going to trust us, and they fucking shouldn't at this point because we look like incompetent assholes!\"\n\n          #With only a sprinkling of profanity.\n            You intone slowly and deliberately, taking the effort to restrain your wrath, \"What are you doctors doing? Grant was still sick, puking his guts out. Do you know how incredibly bad this looks in front of all the other guests? Nobody's going to trust us, and they fucking shouldn't at this point because we look like incompetent assholes.\"\n\n          #Mild frustration.\n            You intone slowly as though to a troublesome child, \"What happened? Grant was still sick, puking his guts out. Do you know how bad this looks in front of all the other guests? Nobody's going to trust us, and they shouldn't at this point because we look incompetent.\"\n\n          #Concern for Grant.\n            You anxiously tumble through your report, \"Grant was still sick, puking his guts out and I'm worried that it's something serious, so please find the problem as quickly as possible: I want him to actually get better.\"\n\n          #Concern for our image.\n            You anxiously tumble through your report, \"Grant was still sick, puking his guts out, and I'm worried that it's something serious, so please find the problem as quickly as possible: this looks really bad and scary to all our other guests. And I don't even want to think about the potential damage control if this gets out Earthside.\"\n        *comment endif\n\n        There's a small pause at the other end before the flavor crackle, \"Listen, motion sickness was the most reasonable conclusion: we screen for infections, cancers, clots, ulcers—everything—before they're allowed to come up. We gave him an anti-nausea injection, and he felt better. It was really unlikely that he was sick. We'll do additional tests.\" \n\n        \"Ass-covering prick,\" you think to yourself as the pause goes on longer than you think it should.\n\n        *if (GrantGone = true)\n          He continues, \"…oh yes, please let him in. Listen, the patient is here, and I will give him the utmost care. Thank you for your concern!\" You hope he gets better soon. You only have a small break before you'll need to figure out how to distract and entertain the rest of the group.\n\n          *goto finishMerge\n\n        *else\n          He continues, \"Pulled up his record. Nope, it looks clean. Well, just…bring him my way, as quickly as possible,\" then hangs up. You give Grant a sideways glance.\n\n          Of course, now you'll have to escort him yourself to sick bay. But that means escorting him past the rest of the tourists. They'll see that he's sick, and will become suspicious. Maybe panicky. How do you keep things smooth?\n\n          *goto sickBayEscortMerge\n\n      #Escort him to sick bay.\n        *gosub trial_end\n        *goto sickBayEscort\n\n    *label sickBayEscort\n    Grant pushes off your attempts to lead him out of the bathroom, spending a few more minutes draped across the floor. \n    *gosub WaterCode\n    As the minutes go by, you dwell on a strategy for getting him past the rest of the tourists.\n\n    *label sickBayEscortMerge\n\n    *fake_choice\n\n      #Try to avoid running into anyone else in the hallway.\n\n        *gosub weird\n        *gosub WaterCode\n        Then you wait in his chair until he feels well enough to walk the distance.\n\n        Finally, he's good enough to make a break for it. You hook your arm around him, and move at a snappish pace. You're going to run into someone, you know it. You can visualize it: their mistrust, their fear, their lawsuits, their demands for a refund, their negative reviews. And it'll come down on you. You'll be the sacrificial goat.\n\n      #Frame it like it's a checkup.\n\n        *gosub weird\n        *gosub WaterCode\n        Then you wait in his chair until he feels well enough to walk the distance.\n\n        You hook your arm around him and rehearse, \"Just a few additional tests,\" or \"We just like to be thorough!\" They are going to call your bluff, you know it. And Grant will not cooperate on this lie. You'll be caught, and they will freak out that he's still sick. You can visualize it: their mistrust, their fear, their lawsuits, their demands for a refund, their negative reviews. And it'll come down on you. You'll be the sacrificial goat.\n\n      #Be honest about his sickness.\n\n        *gosub weird\n        *gosub WaterCode\n        Then you wait in his chair until he feels well enough to walk the distance.\n\n        You hook your arm around him, and mentally prepare for the shitstorm. They're going to be afraid, sure. You can visualize it: their mistrust, their fear, their lawsuits, their demands for a refund, their negative reviews. But maybe if you're honest, it won't be so bad. It won't come down on you.\n\n      #Joke about astronaut food\n\n        *gosub weird\n        *gosub WaterCode\n        Then you wait in his chair until he feels well enough to walk the distance.\n\n        You hook your arm around him and mentally rehearse, 'Astronaut food doesn't agree with everyone!' or 'Guess we should have waited longer before all that pre-packaged food!' Those are terrible excuses. And they're not even jokes. You can visualize it: their mistrust, their fear, their lawsuits, their demands for a refund, their negative reviews. It'll come down on you. You'll be the sacrificial goat.\n\n      #Blame it on the lower gravity\n\n        *gosub weird\n        *gosub WaterCode\n        Then you wait in his chair until he feels well enough to walk the distance.\n\n        You hook your arm around him and mentally rehearse, 'Not everyone's stomach can handle lower gravity,' or 'Some people take time to get their space-legs.' That sounds reasonable, right? You hope so. Unless they did their homework, they won't know it's impossible with anti-nausea medicine. But if they know it's a lie? You can see it: their mistrust, their fear, their lawsuits, their demands for a refund, their negative reviews. It'll come down on you. You'll be the sacrificial goat.\n    *comment endif\n\n    *if (cartAvailable = false)\n      But nobody else is in the passageway. They're all inside their respective rooms, with doors closed. Unpacking, changing, using the bathroom. Whatever they're doing, it's not out here. You help Grant along slowly, relieved by the lack of confrontation.\n\n    *if (cartAvailable = true)\n      But nobody's in the passageway. They're all inside their respective rooms, with doors closed. Unpacking, changing, using the bathroom. Whatever they're doing, it's not here. You motion to the cart, and Grant looks at you oddly, \"Uhh—\" But then he brightens into understanding and grabs onto the cart edge, pushing it like a walker, \"Oh, I see what you meant! This is actually way easier.\" \n\n      Well, that works. You walk alongside Grant at a good pace, relieved at the lack of confrontation.\n    *comment endif\n\n    Silent shuffling towards the sick bay. Awkward embarrassment. Should you bring something up?\n\n    *label awkwardConvo\n\n    *fake_choice\n\n      #Ask about video games.\n        He chuckles, \"Heh. I'm not all that into video games, actually. I used to be, but then I just don't have time for it any more. I mean, they really crack the whip over there at Synthplay.\"\n\n      #Ask about Cullected Games.\n        He chuckles, \"Heh. I really don't know all that much about Cullected, beyond my basic background research that Synthplay provided me with.\"\n\n      #Ask about Earth.\n        He chuckles, \"Heh. The gravity's certainly much better. And it's got weather to talk about during awkward silences.\" You laugh as he backtracks a bit, \"But really, Earth can't be all that different from things up here? It's all just working for one company or another. Spacejoy can't be that much different than working for Synthplay.\"\n\n      #Ask about space travel.\n        He chuckles, \"Heh. I travel a lot, but never been somewhere quite so exotic. Planetside, the gravity's certainly much better. And it's got weather to talk about during awkward silences. But this fancy location is what I get for working at Synthplay.\"\n\n      #Ask about himself.\n        He chuckles, \"Me? Well, I'm originally from The States, got a degree in business, worked hard, rarely took breaks, and now I work for Synthplay.\"\n\n      #Ask about him being sick.\n        He sighs, \"I don't normally get sick like this. It's terrible, timing really. I'm trying to button this up for Synthplay.\"\n\n      #(The quiet is fine with me.)\n        It's apparently not fine with Grant, who strikes up a conversation, \"So, without weather, how do you make small talk on the moon?\" He chuckles at his own joke, but then sighs heavily, \"I'm sorry. I hate being thought of as a burden. And getting sick now, It's terrible, timing really. I'm with Synthplay…\" he waves for a halt.\n    *comment endif\n\n    The giant gaming conglomerate?  Who buys everything. Well, that must be who's bankrolling this little trip. Synthplay has a special deal with Spacejoy, so it's where they hold high-level retreats and conferences. And apparently acquisition deals.\n\n    He coughs and pauses before continuing, \"I'm a consultant there. I mean, I like meeting new people, bringing people together: finding ways to make things work, make everyone happy. And I'm really good at my job. That's why they sent me to oversee this acquisition. I can't really afford to drop the ball.\"\n\n    Your emotions scatter: Is Cullected cashing out? Will they still make games? Why sell now?\n\n    Grant laughs, \"Even in my state, I can guess what's going through your mind. Well, I'll let you in on a trade secret: they came to us with a mysterious pitch. Said they needed Synthplay-level resources. We're just here negotiating a way to accommodate a smooth transition.\"\n\n    *fake_choice\n\n      #\"Their games will stagnate.\"\n        He winces, \"I certainly hope not, otherwise why are we buying them? We want their imaginations, their creativity, their ability to make beautiful worlds. And we want to leave that be and let them have it. And on top of that, we want to give them the resources they need to make their next world.\" It sounds a bit tired and rehearsed: he must give this explanation frequently.\n\n      #\"Fans will hate this.\"\n        He winces, \"Certainly, fans are opinionated and fickle. But I think that once they see what Synthplay is allowing its future Cullected division to do, they'll come around. I'll tell you another trade secret: We'd love to enable Cullected to make the beautiful worlds it imagines in its mind. It would do wonders for our image, saving Cullected.\" It sounds a bit idealistic, but his enthusiasm is endearing.\n\n      #\"Sounds like a good, tactical move.\"\n        He grins then winces, \"I certainly hope so. We want their imaginations, their creativity, their ability to make amazing worlds. Can you imagine how beautifully it could come to life if we gave them Synthplay-level resources? It will blow everyone's minds.\" It sounds a bit tired and rehearsed: he must have really worked it over a lot in his mind. Probably his whole career is riding on this. You're glad that you don't have to deal with that kind of intense, single-point-of-failure business deal.\n\n      #\"I look forward to the first Cullected-Synthplay game.\"\n        He grins then winces, \"Oh, you have no idea. I'm glad to hear it. We want their imaginations, their creativity, their ability to make amazing worlds. Can you imagine how beautifully it could come to life if we gave them Synthplay-level resources? It will blow everyone's minds.\" The pitch sounds a bit tired and rehearsed: he must have really worked it over a lot in his mind. Probably his whole career is riding on this. You're glad that you don't have to deal with that kind of intense, single-point-of-failure business deal.\n\n      #\"What's the pitch?\"\n        He winces, \"I couldn't say. Synthplay is taking a gamble on an unknown, because we believe in Cullected. And—another trade secret—Synthplay really wants to be the ones that enabled Cullected to do something truly awesome. Wouldn't that be just so cool?\" It sounds a bit idealistic, but his enthusiasm is endearing.\n\n      #\"Can I use my Synthplay Points for their games?\"\n        He laughs, which then transforms into a cough, \"Certainly that's one of the perks we'd like to negotiate while I'm here. But those details aren't important, well not as much to me. I'm interested in allowing Cullected to continue making amazing worlds. We'd like to be the heroes that enabled Cullected to do something truly awesome.\" It sounds a bit idealistic, but his enthusiasm is endearing. He coughs again before continuing, \"Oh, but hey, now that you mentioned it, would you like some complimentary points? I keep some codes around.\" You shove them into your pocket, trying your best to appear grateful without being too over-eager.\n\n      #(Say nothing.)\n        Grant winces, \"I just hope my being sick doesn't screw up the negotiations.\" You nod understandingly.\n    *comment endif\n    *if stewardCall\n      *goto stewardConversationEnd\n\n    You approach the medbay airlock, which wooshes open as the doctor and a borrowed steward swoop in to grab Grant, \"We'll take it from here!\" the doctor chirps. Grant takes a moment to turn around and wave you off, \"Thanks…and sorry again.\" You really hope Grant gets better quickly. You've only got a short break to figure out how to distract the rest of the group.\n\n*label skip-ahead\n\n*label finishMerge\n\n*finish Take a Break\n\n*label weird\nYou let Grant spend a few more minutes draped across the toilet until he feels well enough to move. He apologizes, and you assure him that it's fine. And really, you've seen worse. Socialites can get…weird.\n*return\n\n*label WaterCode\n*if (Waterdone = false)\n  You punch in a complimentary water code on his account.\n*set Waterdone true\n*return\n\n*label trial_end\n*check_purchase adfree\n*if not(choice_is_steam) or (choice_purchased_adfree or not(choice_purchase_supported))\n  *label purchased\n  *return\nRemember earlier how we told you that the first part is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the rest of the game.[/i]\n\n*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*abort", "day1-lunch": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the next part of [i]Creatures Such as We[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n  *delay_break 300\n\n*label purchased\n\n*comment Fourth Part of the Game\n\n*comment  *goto skip-ahead\n\n*temp meal \"fish\"\n*temp refusedOnce false\n\nYou direct the guests to the two large boothed tables in the room. They divide up and you offer them all the \"Lunch Day 1\" menus: RepliMeat pastes, freeze-dried cubes, food sticks, astronaut ice cream, and even Tang. \n\nYou explain the options to the tourists, \"These are all selections based off of traditional spacefaring meals. Back then, they had to design meals that could be easily transported, stayed fresh for a long time, and didn't clog the air filters when consumed. These were the results. It's definitely a unique experience that I think none of you will forget!\" You don't understand how tourists eat the junk and actually enjoy it.\n\nAndres skeptically turns over his menu, \"And what's your favorite meal from this menu?\" Diana pipes up, \"Oh yes, I'm having a hard time deciding. What's good?\" They all turn to you expectantly.\n\n*fake_choice\n\n  #The sealed fish and dried gnocchi.\n    *set meal \"fish\"\n\n  #The dried tortellini.\n    *set meal \"pasta\"\n\n  #Cubed nut-paste mix.\n    *set meal \"nuts\"\n\n  #The tubed stroganoff.\n    *set meal \"beef\"\n\nYou sell it as worth a try. Andres smiles broadly, \"Well, then you should join us! You deserve a break every now and then, don't you?\" \n\nDiana agrees, \"Oh yes! I'd actually enjoy your insight, if you don't mind.\" Sit down for a meal with the designers? Technically, not breaking protocol, and you'd have the chance to ask them about the ending of [i]Creatures[/i]. \n\n\"Sure!\" you breathe out in what you hope can be interpreted as a neutral, pleasant tone.\n\nThere are two tables: lead Andres pulls over programmer Sadri and artist Ren, while writer Diana and QA James exchange knowing grins and sit down at their own table. Whose do you join?\n\n*label tablejoin\n\n*choice\n\n  #Andres, Sadri, and Ren.\n    *set leadAffection +2\n    *set programmerAffection +2\n    *set artistAffection +2\n\n    *if (refusedOnce = true)\n      Andres grins, \"Glad you decided to join us! So, tell me, are you a gamer at all? Can you even get video games up here?\"\n    *if (refusedOnce = false)\n      Andres greets you, \"So, tell me, are you a gamer at all? Can you even get video games up here?\" \n    *comment endif\n\n    Ren rolls her eyes as she sets down her device on the table. You glance over to catch what she's up to, but you don't recognize what's on the screen.\n\n    Ren expands on Andres's statement, \"He's fishing to figure out if you've played [i]Creatures Such as We[/i]. It's super-popular etely sidestepping the question.\n\n        *goto LeadEndingDiscussion\n\n      #Casually mention that you beat it\n        You don't want to appear over-eager.\n        *goto beatItLead\n\n      #Enthusiastically tell that you beat it\n        You gush. They deserve some fair praise.\n        *label beatItLead\n        Sadri smiles and stares off into space, \"The need for mastery, for gaming is universal, even out on the edge of civilization.\" She seems so touched that you haven't the heart to launch into just how commercialized the \"edge of civilization\" actually is. \n\n        Andres waves if off, \"We're just that good at making games that they've even heard of us up here.\" \n\n        Ren livens up and prods further, \"Well, but did you enjoy it? What did you like about it?\"\n\n        *fake_choice\n\n          #The beautiful world\n            Andres thumps the table, \"You see that! Real love, real understanding for our work. See how much they enjoy the world you made, Ren?\" She covers a blush and coy smile by adjusting her glasses.\n\n          #The seamless combat\n            Andres thumps the table, \"You see that! Real love, real understanding for our work. See how much they enjoy your mechanics, Sadri?\" She blushes and does a small squirm of enjoyment in her seat at the praise.\n\n          #The gripping story\n            Andres thumps the table, \"You see that! Real love, real understanding for our work. Sadri, Ren, look at the amazing stuff you create! Couldn't do it without their amazing talent.\" They both delight and halfheartedly dismiss the compliments. He continues, \"And you'll have to thank Diana later too, she's the head writer.\"\n\n          #I love it all, but can you explain the ending?\n            Andres thumps the table, \"You see that! Real love, real curiosity for our work. Sadri, Ren, look at the amazing stuff you create! Couldn't do it without their amazing talent.\" He beams, completely sidestepping the question.\n\n    *label LeadEndingDiscussion\n\n    Ren turns to you directly and then deliberately draws out, \"How about you…why don't you tell us what you thought of the ending?\" They all look at you expectantly.\n\n    *fake_choice\n      #\"It was an…interesting ending.\"\n      #\"I didn't get the ending.\"\n      #\"Are there multiple endings?\"\n      #\"Is there a way to save Elegy?\"\n\n    You put it to them as delicately as you can manage. They all exchange knowing glances and Andres seems to take point. But, before he can respond, a steward bearing everyone's meal arrives. She delivers your ${meal}, with not exactly the most charitable of looks. How do you handle the situation?\n\n    *fake_choice\n\n      #Ignore her glare\n        It's not technically against protocol, and you've served everyone else on this base at some point or another. Plus, if she needs to blow off some steam by glaring at you, then that's her right.\n      #Smile politely\n        You give her a sympathetic smile. She sighs and gives an accepting head shoulder shrug.\n      #Thank the steward profusely\n        You let her know how much you appreciate her work and help. She rolls her eyes, but maintains her professionalism, \"Oh, of course!\" she ices out. You wince. You must've laid it on too thick.\n      #Quietly offer to do her a favor later\n        You mention casually, \"I'm on for the pipe inspection later, right?\" You're not technically supposed to split your focus like that, but you do it occasionally, just to not be the odd-one out. She smiles and nods understandingly. Well, that's taken care of.\n      #Secretly remind her that this food sucks\n        You smile up and offer casually, \"How about I serve you your choice of any Lunch Day 1 meals later?\" Her face distorts in a mixture of bemusement and disgust but she otherwise maintains her professionalism and pretends to take you up on the offer. Well, that takes care of that.\n    Now you just have to pretend to enjoy your food. Ren unscrews and unseals tube packages while Sadri mixes some powder and water. As you pick up some utensils, you steer the conversation back, \"So, about that ending?\" \n\n    *comment BEGINNING OF LEAD PHILOSOPHY QUESTIONS\n\n    Andres leans over to smell his warmed stew, then cocks an eye at you, \"Sounds to me like that ending could have gone a little better.\"\n\n    Sadri contributes helpfully, \"You know, my innovation of the Story Mode was something quite new. You might like to take advantage of it.\" \n\n    Ren leans in thoughtfully, \"I've been thinking about that a lot, actually—the universally disliked ending. If video games are art, then to whom does the meaning of art belong: the artist or the viewer?\"\n\n    *choice\n\n      #The artist: it's a distillation of their thoughts and feelings\n        *label artistLead\n        Andres nods knowingly at this, \"Certainly: they made it; they own it. Otherwise the developers would have to split profits or sequel rights with every hack and their keyboard.\"\n\n        Sadri seems to hedge, \"I'm not sure, well, maybe. But what if there's someone who like comes along and does it better…like, a remake or an adaptation?\"\n\n        Ren gives up attempting to gracefully drink Tang down the side of a plastic bag-cup to rebuke Sadri, \"Perhaps. But who decides the 'better' version?\"\n\n        *fake_choice\n\n          #\"The original artist's vision.\"\n\n            Andres nods at this, \"Agreed. Otherwise the canon, the characters, would just fall apart into a mess of contradictions.\"\n\n            Sadri seems to hedge, \"Well, but, I mean, I built the systems that run all the characters, and even that Elegy isn't this one cohesive thing. It's a bunch of processes, spread out across the server. It's well, sort of a contradiction to start with.\"\n\n            Ren deliberately raises a finger, \"Hm…\" She lowers it after a pause to continue properly, \"Maybe the potential to maintain contradictions is art's true strength. Like an Escher painting: the mind makes it real.\"\n\n          #\"The most popular version.\"\n\n            Andres pushes back his spoon, \"I agree. I'm on board with modernization. Otherwise, think about it: we'd be stuck with racist and sexist relics from the past. Nothing fucking worse than that shit.\"\n\n            Sadri gasps at the language, but then catches herself and throws in her thoughts, \"Yes, certainly it's a boon, well, to get rid of those, but uh, what about when bad portrayals are the more popular versions?\"\n\n            Ren pauses to clean her glasses a bit, \"Ugh, yes. I've seen fan art of Elegy 'haunting' some busty lingerie. It was incredibly popular, but I'll be damned if that's the better version.\"\n\n          #\"Each version is equally valid.\"\n\n            Andres chuckles, \"Not one to commit, eh?\" He winks at you, \"That's alright, it's always nice to keep your options open.\"\n\n            Sadri seems to hedge, \"Well, but then the canon just falls apart. It's not consistent. Anything could be considered Elegy: a rock or a number, or a pool of water.\"\n\n            Ren deliberately raises a finger, \"Hm…\" She lowers it after a pause to continue properly, \"Maybe the contradictions are its strength. Like an Escher painting: the mind makes it real.\"\n\n          #\"None of it's real.\"\n\n            Andres chuckles, \"We are just the dreamers of the dream, eh? I suppose there's something to be said about the fact that it's not really representative of reality.\"\n\n            Ren deliberately raises a finger, \"Hm…\" She lowers it after a pause to continue properly, \"Maybe the contradictions are its strength. Like an Escher painting: the mind makes it real.\"\n\n            Sadri pushes some hair out of her face, brightening up a bit, \"Well, I mean, I built the systems that run all the characters, and even that Elegy isn't this one cohesive thing. It's a bunch of processes, spread out across the server. It's well, sort of a contradiction to start with.\"\n\n        *goto leadMerger\n\n      #\"The viewer: it allows for personal interpretations.\"\n\n        *label viewerLead\n        Andres frowns, \"Well, the fans certainly agree. You ever get a chance to look at the forums?\" He tears into some foiled flavor packets.\n\n        Sadri leans in, \"I saw a picture on the forums of someone who stacked ghost ash piles into 'sand castles', despite the physics not really supporting it all that well. That's what they really enjoyed about the game. But I realized, I can't tell them that they're playing the game wrong if that's what they're enjoying about it.\" \n\n        Ren gives up attempting to gracefully drink Tang down the side of a plastic bag-cup and chimes in, \"Well, that's one side, but then is all art is equally canonical? I've seen fan art of Elegy 'haunting' busty lingerie: now is that a 'real' part of the character? Or, I should say, what weight should fan art be given?\"\n\n        *fake_choice\n\n          #\"Fan art is just as real.\"\n            You insist, \"Well, if you view the character as its own entity, a unique and independent concept, then all representations of it are equally speculation, equally valid. Who can say that the first person to attempt to represent that character has any authority over future representations?\" Ren nods to concede the point.\n\n            Andres pushes back a spoon, \"That's ridiculous. You're saying I could just as accurately portray Elegy as a rock or a telephone, or even just the number '30?' At that point, there's no cohesive meaning to Elegy at all, it's just a nebulous concept that could mean anything.\"\n\n            Sadri wrinkles her nose skeptically, \"Yes, and I must say: there's no real reference point, no physical point of a single Elegy. Like, in the servers. Elegy's just just code hooks spread out across different functions.\"\n\n          #\"Fan art is like meta art.\"\n            \"Well, Ren, when you went to art school, you painted models, right?\" you point out.\n\n            Ren disapprovingly glances past her rims, \"Hm. Paints are old-fashioned and messy. But I did take sketching; I have sketched models.\"\n\n            You press home the point, \"So, then. You drew representations of those models. But nobody thought that the sketches were actually the real person. Fan art is the same, just the model happens to be digital.\"\n\n            Sadri startles, \"Oh!\" She blushes, then continues, \"They're both just copies of the original. That's really clever.\"\n\n            Andres give you a trump-card wink, \"But then here's the real question: is the Elegy in-game also considered copy? We could be right back to where we started.\"\n\n          #\"Fan art can't be as real as the official art.\"\n            You insist, \"If fan art is considered at all valid, then anything goes. Elegy would nonsensically fall apart into a mess of inconsistencies and contradictions.\"\n\n            Andres chimes in agreement, \"Yeah, it's hard enough maintaining cohesion just internally. Dealing with external contradictions? Forget it.\"\n\n            Ren deliberately raises a finger, \"Hm…\" She lowers it after a pause to continue properly, \"Maybe the potential to maintain contradictions is art's true strength. Like an Escher painting: the mind makes it real.\"\n\n            Sadri leans in, \"Which is interesting, when you think about it. I mean, I built the systems that run all the characters, and even our internal Elegy isn't this one cohesive thing. It's a bunch of processes, spread out across the server. It's well, sort of a contradiction to start with.\"\n\n          #\"In a way, fan art can be more real.\"\n            You insist, \"Well, think about it this way: They're not real characters, they're fictional. If the masses—or, say, a future director or writer—finds issue with the character and then fixes that issue, well, then they've made that character more real.\" Ren seems intrigued.\n\n            Andres jumps in to agree, \"Ah, you're talking about remakes? Which is the more 'valid' version then?\" But he immediately answers his own question, \"I guess I'd go for the one that better portrayed the character. That's a good point.\" He nods furiously.\n\n            Sadri skeptically spoons at some ice cream, \"Yes, but who decides what's 'best?' Popular vote? The most expensive version? The most recent one? I think it would be most correct to refer to each instance as equally valid in its own parallel universe.\"\n\n        *goto leadMerger\n\n      #\"Both, equally.\"\n        Andres snorts as he starts tearing open some foiled flavor packets, \"Well, way to commit!\"\n\n        Sadri wrinkles her nose, \"But then if everything's valid, excuse me if I don't follow, but what can make up canon? For example, with Elegy, what keeps Elegy consistent?\"\n\n        Ren deliberately raises a finger, \"Hm…\" She lowers it after a pause to continue properly, \"Maybe the potential to maintain contradictions is art's true strength. Like an Escher painting: the mind makes it real.\"\n\n        *fake_choice\n\n          #\"I just meant that each version is meaningful in its own way.\"\n\n            Sadri nods her head in half-agreement, \"I suppose that makes sense. Well, but wait. At that point what does it mean when you talk to someone else about Elegy? How do you know which version of Elegy you're talking about?\"\n\n            Andres samples a freeze-dried mini-tortilla wrap, \"Well, and then also how do you deal with copyright issues? If everything's valid in its own way, then nobody really owns the work, and anyone can make a copy or a sequel, and any narrative strength gets diluted.\"\n\n            Ren cocks her head, \"I am not convinced that distribution or reprinting of work isn't for the best. What if a remake or adaptation is a better version than the original?\"\n\n          #\"I meant that each version has the potential to be the best representation.\"\n\n            Sadri pushes aside some hair, \"Yes, I agree: What if a remake is a better version than the original?\"\n\n            Andres samples a freeze-dried mini-tortilla wrap, \"The likelihood of that happening is pretty low. You need great funding and resources to make the original. And then to make something even better? Bah.\" He waves it off.\n\n            Ren cocks her head, \"In a lot of cases, it's incredibly easy. Consider how many classics are just flat-out racist or sexist. Removing those parts makes an instant improvement.\"\n\n          #\"I meant that fan versions are meaningful to the fans.\"\n\n            Andres samples a freeze-dried mini-tortilla wrap, \"So you mean that they shouldn't be made to feel inferior for just doing the thing that they enjoy? I can get on board with that.\" He takes a bite.\n\n            Sadri leans in, \"I saw a picture on the forums of someone stacking ghost ash piles into 'sand castles', despite the physics not really supporting it all that well. That's what they really enjoyed about the game. It was weird.\" \n\n            Ren nods her head, \"That's the beauty of art. Who are we to say that they're enjoying it wrong?\"\n\n          #\"That's a great point, actually.\"\n\n            Andres samples a freeze-dried mini-tortilla wrap, \"Maybe, but people aren't comfortable forming emotional attachments to an Escher-thing from the uncanny valley.\" He takes a bite.\n\n            Sadri leans in, \"Which is interesting, when you think about it, I mean, I built the systems that run all the characters, and even our Elegy isn't this one cohesive thing. It's a bunch of processes, spread out across the server. It's well, sort of a contradiction to start with.\"\n\n            Ren cocks her head, \"The problem is that there's no original to reference. If there was a real, physical Elegy somewhere, would alternate versions lose their power?\"\n\n        *goto leadMerger\n\n    *label leadMerger\n\n    *choice\n\n      #In the end, I think there's something to be said about the artist having fiat\n        They all nod in agreement.\n        *set ArtIsFor \"artist\"\n        *goto leadMergerEnd\n\n      #In the end, I think there's something to be said about the public having veto power\n        They all nod in agreement.\n        *set ArtIsFor \"viewer\"\n        *goto leadMergerEnd\n\n      #In the end, I think it's too complicated for a single answer\n        They all nod in agreement.\n        *goto leadMergerEnd\n\n      #In the end, I think that there's some way to find a happy medium\n        They all nod in agreement.\n\n    *label leadMergerEnd\n\n    The dining room airlock opens and Grant steps inside. Everyone seems relieved at his arrival. He takes a few moments to appropriately amaze at the ceiling, then to adjust to the dark. You give him a moment before guiding him to his seat.\n    *if (escortSick = false)\n      You only feel a little bit guilty about the situation.\n\n    *fake_choice\n\n      #Are you feeling better?\n        He grins widely, \"Much! And now I am absolutely starving. Luckily, they radioed ahead my order.\"\n      #What can I order for you?\n        He grins widely, \"Luckily, they radioed ahead my order. I'm starving and they said it'd be ready by the time I made it here.\"\n      #Your seat's right here [guide to empty seat]\n        He grins widely, \"Fantastic!\" His face falls a bit upon noticing the empty plate, \"Oh, drat! I'd hoped my food would be here already: I'm starving and they radioed it ahead.\n        *if (escortSick = true)\n          Hey, but listen, thanks again for helping me out before. I appreciated it.\"\n        *if (escortSick = false)\n          Hey, but listen apologies again if I caused any trouble. I certainly didn't mean to hold things up.\"\n        *goto PleasantTone\n\n    *label PleasantTone\n\n    You wave it off, resuming a professionally pleasant tone, \"Oh please, is face in the menu.\n\n        Diana shrugs it off, and then turns back to you, \"So tell me, how well did we suck you in? Have you finished it?\"\n\n        *fake_choice\n          #Brag about how easy it was.\n            James celebrates with a relieved sigh, \"Oh, good! You have no idea how annoying it was to test those difficulty-scaling mechanics. I'm glad you enjoyed the results.\"\n          #Mention how you savored it.\n            Diana attempts to cover her delight behind a menu, \"Oh, you flatter me. I'm just glad that you enjoyed it.\"\n          #Admit that you just finished.\n            James raises an eyebrow, \"That seems somewhat improbable.\"\n\n            Diana hushes him, \"Well, we were coming today. Nothing off about that.\"\n          #Ask about that ending.\n            James grits his teeth, leading into a sideways shrug, \"Certainly, the ending, a lot of people were curious about that. Oh and, uh, by the way, there's a small typo here.\" He points to the menu, deliberately side-stepping your question, \"You're missing an apostrophe.\"\n        *goto WriterEndingDiscussion\n\n      #Casually mention that you beat it.\n        You don't want to appear over-eager.\n        *goto beatItWriter\n      #Enthusiastically tell that you beat it.\n        You gush. They deserve some fair praise.\n        *label beatItWriter\n        Diana pleasantly stares off into space, \"The need for narrative, for engaging in stories is universal, even out here on the edge of civilization.\" She seems so touched that you haven't the heart to launch into just how commercialized \"the edge of civilization\" actually is.\n\n        Perceptively enough, James does it for you. \"This is a tourist destination. It's not exactly as remote as they want you to think it is.\" He buries his face in the menu.\n\n        Diana shrugs it off, and then turns back to you, \"So tell me, what did you like about it the most?\"\n\n        *fake_choice\n          #\"The beautiful world.\"\n            Diana smiles, \"Ah, I'm glad I could help with that, creating a full and vibrant backstory was important to me. It's all in the details.\"\n\n            James adds matter-of-factly, \"You'll have to pay your compliments to Ren, the lead artist. She's a bit stiff, but she always enjoys speaking with people who appreciate her work.\"\n\n          #\"The seamless combat.\"\n            James breaks out into a stunning smile, \"Oh, you're too kind. I still think there were a few tweaks I should have pushed more on, but, I suppose that I'm rather happy with how it turned out.\"\n\n          #\"The gripping story.\"\n            Diana can't help but blush at your praise, \"Oh, you'll be the end of me. I still think there were things I could have introduced or dealt with better, or more options I could have offered, but  I'm glad others enjoyed it.\"\n\n            James rolls his eyes, \"We were already pushing the limits of our budget as it was.\"\n\n          #\"I love it all, but can you explain the ending?\"\n            Diana fiddles with her water bag, \"Ah, yes, the ending. It certainly…made an impact on a lot of people.\" James opens his mouth, then shrugs instead, saying nothing. They seem to be intentionally side-stepping your question.\n\n    *label WriterEndingDiscussion\n\n    Diana then turns to you directly and deliberately draws out, \"How about…why don't you tell us what you thought of the ending?\"\n\n    *fake_choice\n      #\"It was an…interesting ending.\"\n      #\"I didn't get the ending.\"\n      #\"Are there multiple endings?\"\n      #\"Is there a way to save Elegy?\"\n\n    But before you can actually reply, a steward opens the door and leads Grant into the room. He takes a moment to be appropriately awed at the ceiling before noticing you waving him over to the empty space at your table.\n    \n    *if (escortSick = true)\n      He slides on in with a sheepish smile and then warms up immediately, \"Hey, thanks for helping me earlier. One shot fixed me up, and now I'm starving. What's there to choose from?\"\n    *if (escortSick = false)\n      He slides on in with a sheepish smile and then warms up immediately, \"Hey, sorry about earlier. One shot fixed me up, and now I'm starving. What's there to choose from?\"\n    *comment endif\n\n    You push him a menu. Diana points to part of it, \"${name} recommended the ${meal}.\" You wince. None of it's really good enough to recommend. James gives you a knowing wink at your discomfort.\n\n    Grant buries his head, trying to not look disappointed at the selection, \"Oh, hmmm, I'll have to think about it. Go ahead continue your conversation.\" He grins sweetly and then returns to his options.\n\n    James picks back up, \"Yes, so tell us, what were you saying about the ending?\"\n\n    *fake_choice\n      #\"It was an…interesting ending.\"\n      #\"I didn't get the ending.\"\n      #\"Are there multiple endings?\"\n      #\"Is there a way to save Elegy?\"\n\n    *comment BEGINNING OF WRITER PHILOSOPHY QUESTIONS\n\n    Diana gives up fiddling with the water bag and turns to you, \"Well, it's definitely something that a lot of people are talking about. That ending. But I don't like to dictate to the players what was the right ending or the wrong ending or what should have happened. I let them decide that.\"\n\n    James contributes helpfully, \"You know, the whole Story Mode mechanic was specifically designed to help with that. You should have seen the test plans for that too—the art, the mechanics, the level flow all had to be tested multiple times on these progressively shortened level set pieces.\" \n\n    Grant leans in thoughtfully, delighted to finally be able to hold a normal conversation, \"I've been thinking about that a lot, actually—the fans' reactions to the ending. Certainly, I have an interest in a financially successful game, but even I know that there's more to life than money. If we consider games as art, then does the art's meaning belong to the artist or to the viewer?\"\n\n    *choice\n\n      #\"The artist: it's a distillation of their thoughts and feelings.\"\n        *label artistWriter\n        Grant nods knowingly at this, \"Certainly that's the legal view: they made it; they own it. Otherwise the developers would have to split profits and sequel rights. But what about on a deeper level?\"\n\n        Diana wrinkles her nose in frustration, \"I'm not sure, I don't always get it right. What if there's someone who like comes along and does my work better…like, a remake or an adaptation?\"\n\n        James takes a break from trying to slurp down some Tang to reply, \"Perhaps. But who decides the 'better' version? And, by the way, 'QA' is an acceptable answer.\" Diana laughs.\n\n        *fake_choice\n\n          #\"The original artist's vision is better.\"\n            James nods exhaustedly, \"Agreed. Otherwise the canon, the characters, would just fall apart into a mess of contradictions. Can you imagine sorting out what's a bug and what's design in such a system?\"\n\n            Grant contributes some enthusiasm, \"It sounds pretty unworkable, I agree.\"\n\n            Diana holds out her hands in a halting gesture, \"Yes, it's tough for us, but hear me out.\" She spits out rapid-fire, \"Maybe the ability to maintain contradictions is art's true strength. Like the impossible geometry of Lovecraft. It's real within the imagination. Or perhaps, beyond it. Reality can't do that.\"\n\n          #\"The most popular version is better.\"\n\n            James pushes back his spoon, \"I agree. I'm on board with modernization. Otherwise, think about it: we'd be stuck with racist and sexist relics of characters, and that just gets exhausting.\"\n\n            Grant nods over-eagerly, \"Well, in the past those negative stereotypes were popular because they were deemed 'safe', but also a lot of fan adaptations were worse. What happens when popular is an even worse portrayal?\"\n\n            Diana pauses to taste some flavored sugar crystals, \"Ugh, yes. I've seen slash fiction of Elegy 'haunting' two humans having sex. It was riddled with typos which, you know, whatever, but the voice was blandly out-of-character. Even with that, it was still incredibly popular. I'll be damned if that's the 'better' version.\"\n\n          #\"Each version is equally valid.\"\n\n            Grant chuckles, \"Work that diplomatic angle!\" He winks at you, \"That's alright, it's always nice to keep your options open.\"\n\n            James seems nonplussed, \"Well, but then the canon just falls apart. It's not consistent. Anything could be considered Elegy: a rock or a number, or a pool of water.\"\n\n            Diana holds out her hands in a halting gesture, \"Oh, wait!\" She spits out rapid-fire, \"Maybe the ability to maintain contradictions is art's true strength. Like the impossible geometry of Lovecraft. It's real within the imagination. Or perhaps, beyond it. Reality can't do that.\"\n\n          #\"None of it's real.\"\n\n            Grant chuckles, \"We are just the dreamers of the dream, eh? I suppose there's something to be said about the fact that none of it is real, that it's not really representative of reality.\"\n\n            Diana holds out her hands in a halting gesture, \"Oh, wait!\" She spits out in a flurry, \"Maybe the lack of reality is art's true strength. It can maintain contradictions. Like the impossible geometry of Lovecraft. It's real within the imagination. Or perhaps, beyond it.\"\n\n            Grant chimes in eagerly, \"Oh, wow, that's just something to think about isn't it?\"\n\n            James crosses his arms and leans back, \"Well, I'm not sure that people are really all that eager to get emotionally attached to a cthuloid creation, even if they can accept it as a valid kind of character.\"\n\n        *goto writerMerger\n\n      #\"The viewer: it allows for personal interpretations.\"\n        *label viewerWriter\n        James rolls his eyes, \"Well, the fans certainly think it belongs to them. You ever get a chance to look at the forums?\" He tears into some foiled flavor packets.\n\n        Diana leans in, \"I once saw a review of one of my games that praised the fact that it had a lens flare toggle. That's all he reviewed. Completely missed the vibrant setting, the story arc, the whole point of the game. Just the fact that you could toggle and scale the fucking lens flares. Depressing.\"\n\n        Grant grins, \"Well, that's one side, but then if that's what really brought them enjoyment, then who are we to tell them that they're playing the game incorrectly? What if they wanted to do something more story-based, like gender swapping a character? Or, I guess I'm asking, what weight should be given to fan interpretations?\"\n\n        *fake_choice\n\n          #\"Fan art is just as real.\"\n            You insist, \"Well, if you view the character as its own entity, a unique and independent concept, then all representations of it are equally speculation, equally valid. Who can say that the first person to attempt to represent that character has any authority over future representations?\" Grant nods to concede the point.\n\n            James pokes at some mostly-thawed pudding, \"That's ridiculous; at that point, there's no cohesive meaning to Elegy at all, it's just a nebulous concept that could mean anything. There'd be nothing to bug because anything would be fine.\"\n\n            Diana wrinkles her nose skeptically, \"Yes, but I must say: there's no real Elegy, no real thing to look to as a reference. Even my own reference documents aren't as, um, up-to-date as I should keep them.\"\n\n          #\"Even the artist isn't reliable.\"\n            You point out, \"Well, Diana, your story went through revisions, right?\"\n\n            Diana sighs, \"Oh, lots. And plenty of rejected proposals as well.\"\n\n            You press home the point, \"So, then, where do those fall on the canon spectrum? They were made by you, but didn't make it through.\"\n\n            James huffs rather insistent, \"I'd like to hope that rejects and mistakes are not considered canonical.\"\n\n            Grant gives a wink, \"But then here's the real question: who gets to decide what's a mistake? I think we've gone round back to the start again.\"\n\n          #\"Fan art can't be as the real art.\"\n            \"If fan art is considered at all valid, then anything goes. Elegy would nonsensically fall apart into a mess of inconsistencies and contradictions.\" you insist.\n\n            James chimes in agreement, \"Yeah, it's hard enough maintaining cohesion just internally. You should see the documentation and testing processes. Dealing with external variables? Forget it.\"\n\n            Diana holds out her hands in a halting gesture, \"Oh, wait!\" She spits out rapid-fire, \"Maybe the ability to maintain contradictions is art's true strength. Like the impossible geometry of Lovecraft. It's real within the imagination. Or perhaps, beyond it. Reality can't do that.\"\n\n            Grant chimes in, \"Oh, wow, that's just something to think about isn't it?\"\n\n          #\"In a way, fan art can be more real.\"\n            You take the time to explain it, \"Well, think about it this way: They're not real characters, they're fictional. If the masses—or, say, a future director or writer—finds issue with the character and then fixes that issue, well, then they've made that character more real.\" Grant seems intrigued.\n\n            James bobs his head thoughtfully, \"Ah, you're talking about remakes? Adaptations? Which is the more 'valid' version then?\" But he immediately answers his own question, \"I guess I'd go for the one that better portrayed the character. That's a good point.\" He nods, satisfied.\n\n            Diana skeptically spoons at some ice cream, \"Yes, but who decides what's 'best?' Popular vote? The most expensive version? The most recent one? I think they're all valid in their own way, because they all have different needs that they fulfill.\"\n\n        *goto writerMerger\n            \n      #\"Both, equally.\"\n        Grant snorts out a laugh, \"How diplomatic of you! You might have a future as a corporate consultant.\" He winks at you. Lovely.\n\n        James wrinkles his nose distastefully, \"They can't both be valid: they contradict. One of them has to be correct.\"\n\n        Diana holds out her hands in a halting gesture, \"Oh, wait!\" She spits out rapid-fire, \"Maybe the ability to maintain contradictions is art's true strength. Like the impossible geometry of Lovecraft. It's real within the imagination. Or perhaps, beyond it. Reality can't do that.\"\n\n        *fake_choice\n\n          #\"I just meant that each version is meaningful in its own way.\"\n\n            Grant nods his head in half-agreeing, \"I think that's a really interesting way to frame things. Of course, copyright lawyers would have to disagree with you. They're real sharks.\"\n\n            James pushes around his fork, \"How do you know which version of Elegy you're talking about? At that point, Elegy could be a rock or a number or a pool of water. I still don't think that this helps.\"\n\n            Diana cocks her head, \"I'm still thinking that there's something to be said about allowing for multiple viewpoints. After all, I know of plenty of remakes that are better than the original.\"\n\n          #\"I meant that each version has the potential to be the best representation.\"\n\n            Diana nods furiously, \"Yes, I agree: What if a remake is a better version than the original?\"\n\n            James samples a freeze-dried mini-tortilla wrap, \"Well, that's possible, but then at that point I think it ceases to be a fan work, and it becomes a whole new artist. Now you're back to square one.\"\n\n            Grant cocks his head, \"I've generally found that an artist by themselves can make excellent work, but it's the group effort of a team that makes something really fantastic—builds on each others' strengths—they can filter out the negative bits from the positive ones most effectively.\"\n\n          #\"I meant that fan versions are meaningful to the fans.\"\n\n            Grant laughs, \"And you'd be a great person to put in front of a camera!\" He tears into a RepliMeat package with his teeth.\n\n            James leans in, \"I mean, certainly it's a good sign when your fans are showing their appreciation by making their own art, their own versions. Means you're likely to get hired for the sequel.\" \n\n            Diana nods her head, \"And it gives them a chance to practice their own creative sides. We all have to start somewhere.\"\n\n          #\"That's a great point, actually.\"\n\n            Grant crams in a freeze-dried tortilla wrap, \"Maybe, but it still has to be enjoyable. Most people aren't comfortable forming emotional attachments to inconsistent characters. They don't feel real.\"\n\n            James cocks his head, \"That's true. About characters feeling real. Fans vastly prefer characters with only one or two salient personality traits, and don't like much deviation. You can't even change their costumes without a kerfluffle.\"\n\n            Diana grins broadly, \"Well, now we're back to Grant's original question. Are the characters for the artist or the viewer?\"\n        *goto writerMerger\n\n    *label writerMerger\n\n\n    *fake_choice\n      #I think there's something to be said about the artist having fiat\n        They nod in agreement.\n        *set ArtIsFor \"artist\"\n      #I think there's something to be said about the public having veto power\n        They nod in agreement.\n        *set ArtIsFor \"viewer\"\n      #I think it's too complicated for a single answer\n        They all nod in agreement.\n      #I think that there's some way to find a happy medium\n        They nod in agreement.\n    *comment endif\n\n    You glance around and notice that tourists are finishing up their food. You're stabbed by a quick moment of panic: you're wasting time chatting with clients. You should be working. The conversation's lull affords you an opportunity to resume duties. You reapply your professional facial configuration and cheerfully make your escape, \"Well, thanks for inviting me to join, it was a lot of fun! I'm going to go check on everyone's luggage, and we'll meet up after the free hour!\"\n\n    *goto bottom\n\n  *hide_reuse #\"Well, actually, I really shouldn't…\"\n    *set refusedOnce true\n    James picks up a menu, \"Come on! It'll be fun, and you do have to eat, right?\"\n\n    Sadri nods, \"You must get a break that often. Please, join us!\"\n\n    Well, maybe you could join one of the two tables. It's not against the rules, and you'd get to know the guests better. Andres gestures to his table with programmer Sadri and artist Ren, while writer Diana waves you to sit next to herself and QA lead James.\n    *goto tablejoin\n\n  *if (refusedOnce = true) #\"Sorry, but I can't.\"\n    Ren nods, \"Suit yourself.\" \n\n    The groups sit down to the respective tables. You focus on providing them excellent and attentive service. You catch threads of conversations, laughter. Grant shows up mid-meal, and you guide him to his seat. He seems much happier and healthier. While you of course feel satisfied in doing a job well done, it also feels empty, lonely. You take a step back out from the busy room and sigh. Well. It's really high time for you to go check on everyone's luggage.\n    *goto bottom\n\n*label bottom\n\n*label skip-ahead\n\n*finish Check on the Luggage\n", "day2-breakfast": "*comment Ninth Part of the Game\n\n*comment   *goto skip-ahead\n\n*temp GrantSwitchOff false\n*temp randomAssign 1\n*temp team \"none\"\n\n\n*temp WQAffection ((WriterAffection) + (QAAffection))\n*temp APAffection ((ArtistAffection) + (ProgrammerAffection))\n*temp LCAffection ((LeadAffection) + (ConsultantAffection))\n\n\n*comment
