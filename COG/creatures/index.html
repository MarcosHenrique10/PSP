 and (WQAffection > LCAffection))\n    *set team \"QAWrite\"\n  *if  ((APAffection >  WQAffection) and (APAffection > LCAffection))\n    *set team \"ProArt\"\n  *if  ((LCAffection >  APAffection) and (LCAffection > WQAffection))\n    *set team \"Leads\"\n\n*comment If Affection is still split, assigns randomly as a fallthrough.\n\n*if (team = \"none\")\n  *rand randomAssign 1 3\n  *if (randomAssign = 1)\n    *set MaxAffectionTarget \"QAWrite\"\n  *if (randomAssign = 2)\n    *set MaxAffectionTarget \"ProArt\"\n  *if (randomAssign = 3)\n    *set MaxAffectionTarget \"Leads\"\n\nRemarkably, it's your alarm that wakes you up. As opposed to a page in the middle of the night from a guest wanting booze or their \"personal medication\" stash stored in sick bay. You actually feel refreshed enough to look forward to dealing with breakfast buffet duties. You could get used to these guests; they're so damn polite. It's too bad they have to leave so soon. But that's just how it has to be.\n\n*fake_choice\n  #\"Just continue keeping them distracted.\"\n    As long as they don't suspect anything, they won't have the opportunity to complain or make a fuss. Just keep things going as planned, and it'll be fine. Everything will be fine.\n\n  #\"It would be nice to just isolate Grant.\"\n    Then you'd be sure about nothing spreading and you could just focus on giving everyone else a good time. Of course, doing that would probably make Grant file a report against you. And get you fired. It would be nice, but you've got no option but to focus on keeping things low-key. Too bad.\n\n  #\"It would be nice to just tell them about the evacuation.\"\n    That way it wouldn't be your fault. They'd blame Maselle, and you'd just be the messenger, with no say in the matter. They'd be prepared for the evacuation, and they'd have the chance to direct their annoyance at someone else when the time comes to actually get shipped back. Too bad you can't.\n\n  #\"It probably doesn't matter what you do.\"\n    They'll all be gone within a few days anyway, replaced with a new set of fresh-faced tourists. It's best to just try to ride this out as smoothly as possible. There's nothing to worry about, everything will be fine.\n*comment endif\n\nYou fold up your sheets and stretch, contemplating the itinerary: breakfast, moon walking, their business meeting, lunch, gymnastics, free swim time, one more night of sleep, and then tomorrow morning, bright and early, they all get shipped out. It's going to go fine today. Today is going to be fine. So let's get ready for it.\n\n*fake_choice\n  #No shower, no makeup.\n    You just brush your teeth and fix up your hair, checking the mirror really quickly:\n  #No shower, minimal makeup.\n    *goto yesGrooming\n  #No shower, exciting makeup.\n    *goto yesGrooming\n  #Quick shower, no makeup.\n    *goto yesGrooming\n  #Quick shower, minimal makeup.\n    *goto yesGrooming\n  #Quick shower, exciting makeup.\n    *label yesGrooming\n    You finish up after by brushing your teeth and fixing your hair. You check the mirror really quickly: as good-looking as ever. You hasten off to the kitchen to start carting out the breakfast goods: re-hydrated scrambled eggs, RepliMeat sausages, a few fruits, specially sealed fish, cereals, and the most-difficult-but-under-appreciated baked goods.\n\nYou plant yourself next to the spread. Now the only thing left to do is stand and wait. Their perk of free-entry breakfast means you're tasked to stand around and smile for an hour. To be a scarecrow against greedy tourists taking too much food. Well, and of course you have to get them drinks if they want it. \n\n*comment SKIPS JAMES\n\n*if (team = \"QAWrite\")\n  *goto JamesStart\n\n*if (team = \"Leads\")\n  James and Ren walk in together, laughing. Ren has a sort of snorting laugh, while James has much more of a bark. It's entertaining enough to give you a smirk at this early hour. They both nod at you in acknowledgment, fill up their trays and sit down to a spirited discussion. More laughing. You do your best not to look wistful.\n  *goto GrantStart\n\n*if (team = \"ProArt\")\n  James and Grant walk in together, laughing. You're relieved to see them both in such good spirits, but you're a little nervous about them being together. James is so perceptive, you're sure that he'll be able to pick up some subtle symptom, or that he'll figure out the evacuation plan. You shake off that gloomy train of thought and smile brightly to greet them. They both nod at you in acknowledgment, fill up their trays, and sit down. There's a lot of leaning in and expressive gesturing. It must be something interesting. You do your best not to look wistful.\n  *goto RenStart\n\n*label JamesStart\n\nThe door opens right at the start of the breakfast hour, and you smile brightly for James, who seems unusually chipper himself. You greet him.\n\n*comment JAMES\n*fake_choice\n  #\"Good morning!\"\n    James smiles back, \"Thanks! Say, are they still called mornings here on the dark side of the moon?\"\n  #\"How are you doing?\"\n    James smiles back, \"Great, thanks! Sleeping up here was just amazing. You practically float above the mattress!\"\n  #\"Please, help yourself to food.\"\n    James smiles back, \"Hey, it looks great, thanks!\"\n  #\"Can I get you anything to drink?\"\n    James shakes his head, \"I'm fine with water and juice for now, but thank you!\"\n*comment endif\n\nHe gives the food a cursory scan, glances around the room, and sidles on up to you, \"Hey, listen, I wanted to ask you something, since nobody else's here.\" He glances around again as though to double-check, \"About [i]Creatures[/i], well, games in general. I take it that you liked Elegy, right?\"\n\n*set QAAffection +2\n*choice\n  #\"Yeah, I felt like I got really close to Elegy.\"\n    He pours himself an orange juice, \"Yeah, and you were definitely supposed to. But that's what I'm worried about. I mean, it's fun to have that connection, but there's no place where in-game love interests will ever seriously tell you 'No.' The entire relationship dynamic is up to the player, and that worries me. Like, maybe we're not sending the right message about consent.\"\n    *goto JamesChoiceOne\n\n  #\"Yeah, Elegy was kind of fun.\"\n    He pours himself an orange juice, \"Yeah, that's what I'm worried about. I mean, you can form a romantic connection with Elegy, but it's kind of considered part of the expected game experience. I mean, a lot of people find that aspect fun, but there's no place where in-game love interests will ever seriously tell you 'No.' The entire relationship dynamic is up to the player, and that worries me. Like, maybe we're not sending the right message about consent.\"\n    *goto JamesChoiceOne\n\n  #\"Not really.\"\n    He raises an eyebrow, \"Really? Well, don't tell Diana; she'll be disappointed.\"\n\n    He pours himself an orange juice before continuing, \"Anyway, a lot of people did like Elegy, liked the romantic path. But that's what I've been wondering about with video games: there's no place where in-game love interests will ever seriously tell you 'No,' if you pursue them, and that worries me. The whole control over that dynamic…\" He gestures at you, \"Even if there is no romantic relationship at all: all the control is solely in the hands of the player. And I'm worried about that not sending the right message about consent.\"\n    *goto JamesChoiceOne\n\n  #\"I'm sorry, I need to focus on making sure that breakfast is ready.\"\n    *set QAAffection -2\n    James looks around at the empty room, and shrugs his shoulders, \"Fair enough!\" He loads up his plate and sits down by himself. You make up some food preparation tasks to make it look like you're busy. \n\n    *goto JamesEndMerge\n\n*label JamesChoiceOne\n\n*choice\n  #\"You can fail at romance games all the time.\"\n    He starts loading up a tray with RepliMeat bacon and eggs, \"Yeah, I suppose there is that. It's not an automatic win. At least, not all the time. But still, there's this system built in, where if you just say the right things, make the right choices, pretend to be someone you're not, you can win the affection like a prize. And that's just so incredibly entitled.\"\n\n    *choice\n      #\"But not everyone pretends to be someone they're not just to win the love.\"\n        You clarify, \"I mean, what if you're both really the kinds of people that would fall for each other in real life?\"\n\n        He frowns, \"I suppose, but that scenario isn't necessarily better. And a lot of games now tailor their love interests to match the player's choices. They literally change themselves to appease you. I dunno, that feels creepier. I mean, what are you really forming a relationship with? Some sort of shape-shifting platonic ideal?\"\n\n        He shudders, then contemplates, \"The problem is that they're always available. The player has all the power in the relationship.\"\n        *goto RelationshipPower\n\n      #\"But games are all about pretending to be someone else.\"\n        He frowns, \"I suppose, but that doesn't necessarily make it better: encouraging players to change themselves, to just jump through whatever hoops just so that the person you want will fall for you? And usually the romantic path forces you to ignore other people, other friendships, just to advance that one relationship. I dunno, that kind of system feels really creepy.\" \n\n        He shudders, \"The problem is that at that point, you've stopped becoming the kind of character you want to be, and started being the kind of character that your love interest wants you to be.\"\n\n        *choice\n          #\"I still think it's just some fun escapism.\"\n            He sighs, \"I don't disagree entirely, but I mean, how could living in that kind of fantasy not affect us?\" He shakes his head, \"Anyway, I guess I really shouldn't be getting into it that deep. My food's getting cold.\" He waves to his plate, \"But I'll catch you around, eh?\"\n\n            *goto JamesEndMerge\n\n          #\"Wait, so now you're saying that the player is the one being controlled?\"\n            He tilts his head, \"I guess that is a turn about from my original concern. But I mean, players are rewarded for pretending to be something they're not. That's definitely its own healthy relationship problem: the game rewards how much you appease the NPC instead of how much you take care of yourself. Maybe the affection system should be tied to the player's self-consistency.\"\n            *goto likeCheck\n\n          #\"There must be a way to encourage healthier relationships.\"\n            He sighs, \"That's just the problem. I've been thinking about it a lot, but I don't have a good solution. Something that still feels satisfying and logical to the player, but treats the NPCs with respect and consent. I'm not sure that there's a way.\"\n            *goto ConsentDesigns\n\n          #\"I think the system is fundamentally unhealthy.\"\n            He sighs, \"Yeah, that's what I'm worried about. That's my big fear. I mean, I work on video games, in QA. I'm used to deconstructing them, finding their flaws, suggesting fixes. And I can't find the fix for this one. Maybe there just isn't one. Maybe it's unfixable. That worries me, but what can you do about it?\" He shrugs, \"Maybe someone else will find the solution.\"\n\n            *goto JamesFinalChoiceMerge\n\n      #\"How can you better portray consent in games?\"\n        He furrows his brow, \"I suppose that's what I'm getting at. I'm not entirely sure that there is a way, I know that I definitely haven't come up with a good solution on how to give characters more autonomy. But I feel like there has to be something: some new kind of technique.\"\n        *goto ConsentDesigns\n\n      #\"I don't think there's a good solution to that problem.\"\n        He frowns, \"I suppose that's what I'm getting at. But I'm not convinced that it's impossible. Just…very difficult. And I'm not sure that I have the solution to it. But there has to be a way, some new kind of technique that can give video game characters more autonomy, more self-realization.\"\n        *goto ConsentDesigns\n\n  #\"People just want a simple love story.\"\n    He starts loading up with tray with RepliMeat bacon and eggs, \"It's true that real relationships are complicated, and maybe these games scratch that itch? I don't know, I'm still worried about there not being a clear enough delineation between the fantasy and the reality. I'm still worried about people getting their cues from the fantasy world and wishing they could apply it to real life.\"\n\n    *choice\n      #\"I think most people can tell the difference between the fantasy and reality.\"\n        He frowns, \"I don't disagree entirely, but I mean, you're still affected by that fantasy; it still colors your expectation. I mean, it wouldn't be a fantasy if you didn't wish that you could apply that same framework to your real life as well. How can that not affect us?\" He shakes his head, \"Anyway, I guess I really shouldn't be getting into it that deep. My food's getting cold.\" He waves to his plate, \"But I'll catch you around, eh?\"\n\n        *goto JamesEndMerge\n\n      #\"I guess the fantasy affects people's real-world expectations.\"\n        He frowns in contemplative agreement, \"I totally agree with that, but I don't know what to do about it. I feel like there has to be a way, some kind of new technique that can give video game characters more autonomy, more self-realization.\"\n        *goto ConsentDesigns\n\n      #\"How would you even start fixing things?\"\n        He frowns, \"I'm not entirely sure. Maybe have relationship experts on staff? Maybe get them to weigh in on what makes something healthy? But I feel like that'd just be a surface sweep to weed out totally abusive dynamics. I don't have any good thoughts on how to address the underlying system to accommodate consent.\"\n        *goto ConsentDesigns\n\n      #\"I don't think there's a good solution to the problem.\"\n        He frowns, \"I totally agree with that, but I don't know what to do about it. I feel like there has to be a way, some kind of new technique that can give video game characters more autonomy, more self-realization.\"\n        *goto ConsentDesigns\n\n  #\"I don't know how games can meaningfully recreate consent.\"\n    He starts loading up his tray with RepliMeat bacon and eggs, \"I suppose that's what I'm getting at. I'm not convinced that it's impossible. Just…very difficult. And I'm not sure that I have the solution to it. But there has to be a way, some new kind of technique that can give video game characters more autonomy, more self-realization.\"\n    *goto ConsentDesigns\n\n  #\"If gamers didn't find the relationship-building fun, they'd just watch porn.\"\n    He laughs so loudly that he almost drops the RepliMeat bacon from his tongs, \"I suppose there's something to be said about that. Relationships have definitely managed to survive over the years, even with porn up to your eyeballs. I'm not saying that relationships are going to be replaced with sexbots anytime soon, just that I'm worried about the relationships we do have being influenced by this weird one-sided fantasy relationship. The problem is that the player has all the power in gaming relationships.\"\n\n    *label RelationshipPower\n    *choice\n      #\"How would you give more power to the NPCs to say 'No'?\"\n        He frowns, \"I'm not entirely sure. I've been turning over some ideas in my head, but none of them really feel like viable solutions. I'm starting to worry that it's a fundamental problem, something unfixable.\"\n\n        *goto ConsentDesigns\n\n      #\"Make the fantasy-reality difference clearer in the game.\"\n        He raises his eyebrows and scrunches his face in surprise, \"I don't even know how you could do that. Maybe with a disclaimer? Or maybe make the romance cartoonish? But then, that would probably make it even worse. I think the problem comes from the simplification.\"\n\n        *goto JamesFinalChoiceMerge\n\n      #\"Except all the times you can fail at romancing the target.\"\n        He raises his eyebrows, \"Well, sure, sometimes you can fail, if you don't see your target enough, or if you say the wrong things to them. But the player always has the option of going back and retrying. It's not really a failure if you can just brute force it.\" \n\n        He furrows his brow and mutters, \"Hmm…maybe if you had to answer a questionnaire on what you did wrong. No that's stupid. That wouldn't work.\"\n\n        *label ConsentDesigns\n\n        *fake_choice\n          #\"An affection matchmaking system?\"\n            James nods, \"I guess, but I feel like that's something that's already part of most games. You match yourself up with the NPC that shares your interests, and you just ignore everyone—everything—else.\" He looks up to you, \"Maybe that's the solution: the game should take into account you spending time with other people, how much time you pursue your own interests. There should be a negative path for if you're too needy.\"\n            *goto likeCheck\n\n          #\"A game with real rejection stakes?\"\n            James nods, \"Yes, but how do you implement that? Randomly generated romanceable vs. non-romanceable characters? Affection thresholds? Any way you cut it, the NPC can always be gamed, if you just brute force it, like a total creeper. Well, unless you made a game where NPC's would always reject you, no matter what you did. But then, what kind of fun would that be? I don't know.\"\n            *goto PostLikeCheck\n\n          #\"A completely chaste game?\"\n            James hems, \"Eh, I'm not sure that's quite the kind of solution I was hoping for. It feels too…extreme. There has to be some kind of medium. Or maybe you're right, and it's best to just not portray people. They're so messy and complicated. Make a game about jumping, or pushing blocks. Reward them with points and glittery gold, not NPC's.\"\n            *goto PostlikeCheck\n\n          #\"Something else?\"\n            He nods, \"I've been thinking about what it means, to have a healthy relationship. The first step is always to get yourself in order, to focus on your own self happiness. Maybe, instead of an affection tracking system tied to the target NPC, it tracked how healthy your character was with their own self: how much time they took for their own needs, how often they stayed true to themselves instead of changing who they are to match their target NPC. It doesn't really address the issue of consent, but I think it at least makes the relationship that much healthier.\"\n            *goto likeCheck\n\n          #\"I really don't think it's possible to portray consent.\"\n            He sighs, \"Yeah, that's what I'm worried about. That's my big fear. I mean, I work on video games, in QA. I'm used to deconstructing them, finding their flaws, suggesting fixes. And I can't find the fix for this one. Maybe there just isn't one. Maybe it's unfixable. That worries me, but what can you do about it?\" He shrugs, \"Maybe someone else will find the solution.\"\n\n            *goto JamesFinalChoiceMerge\n\n      #\"But that power fantasy is why some people play video games.\"\n        He raises his eyebrows as high as they will go, \"Well, I mean…I guess so. But I'd hoped that players would want to be the kind of person who entered into healthy relationships. That that would be the fantasy. I guess you're right that not everyone shares that desire, but you know what? I'm not really all that interested in indulging that kind of negative relationship.\"\n\n        *goto JamesFinalChoiceMerge\n\n*label likeCheck\n\n*fake_choice\n  #\"I like it.\"\n    He smiles, \"Well, I'm glad you do. It feels like a good starting place, at least.\"\n\n  #\"I don't like it.\"\n    He shrugs, \"Well, I don't know. I'll figure it out, I suppose.\"\n\n*label PostLikeCheck\n\n*choice\n  #\"I'm glad that people like you are around to worry about this.\"\n    *set QAAffection +1\n    James smiles and blushes, \"Thanks, that means a lot from you.\"\n    *goto JamesFinalChoiceMerge\n\n  #\"I think you're doing the right thing.\"\n    *set QAAffection +1\n    James smiles and blushes, \"Thanks, that means a lot from you.\"\n    *goto JamesFinalChoiceMerge\n\n  #\"Don't worry about it, they'll solve it eventually.\"\n    James smiles with reassurance, \"Thanks, I sure hope so.\"\n    *goto JamesFinalChoiceMerge\n\n  #\"Just give people what they want; it's a game.\"\n    *set QAAffection -1\n    James frowns, \"Yeah, but I'm not sure that's the best attitude.\"\n    *goto JamesFinalChoiceMerge\n\n*label JamesFinalChoiceMerge\nHe looks at his fully-loaded plate, \"Well, anyway, thanks for indulging my rambling. I'm, uh…\" He glances nervously about the empty room, \"…going to grab a seat.\" He looks a bit uncertain sitting all by himself, but apparently decides to respect your professional duties. You peek at the clock. Just most of the hour left.\n\n*label JamesEndMerge\n\nAfter a few minutes, Ren and Grant walk in together. It's a relief to see Grant up and about, around the other tourists. It will help them think that everything's fine. That there's nothing to worry about. They nod at you cordially and load up their trays, sitting down next to James to chat.\n\n*goto MidBreakfastMerge\n\n*label RenStart\n\n\n*COMMENT Ren\nThen Ren walks in with a refined grace. You haven't noticed it before, but she's one of the few people that can walk without a bounce in lower gravity. You're jealously impressed. Those kind of gifts are always wasted on the kinds of people who will never need them.\n\n*fake_choice\n  #\"Good morning!\"\n    She bows slightly, then turns her attention to the table.\n  #\"How are you doing?\"\n    She yawns, \"A bit tired, but fine, thank you,\" then turns her attention to the table.\n  #\"Please, help yourself to food.\"\n    She nods, but pauses in front of the table, taking the time to deliberately decide.\n  #\"Can I get you anything to drink?\"\n    She tilts her head to the side, \"Oh, nothing for now. But that might change. Thanks.\"\nAfter some hesitation about your vigilance, she grabs a plate and piles on waffles, as many as she can fit. You cough, pretending not to look too overtly discouraging. She startles, then looks down sheepishly. \n\nRen puts a flask of (substitute) maple syrup on a heater, fiddles with the setting a bit, and then turns to you, \"So, I know you're busy, but I wanted to ask something. What did you think—really think—when you first saw that [i]Creatures Such as We[/i] was from the perspective of zombies and ghosts?\"\n\n*set ArtistAffection +2\n*choice\n  #\"I thought it would be about being the villain.\"\n    Ren starts monitors her syrup as she nods to you, \"I thought as much. You know, a lot of people were disappointed with the game, the fact that you were playing as a hero. They wanted a zombie simulator: a sandbox or dungeon crawl focused on eating as many people as possible.\"\n\n    *fake_choice\n      #\"That sounds like a lot of fun.\"\n        Ren shrugs, \"Maybe, but that kind of mindless violence feels done to death.\" Her eyes narrow, \"No pun intended. Really.\" She adjusts her glasses, \"But for us, we wanted to deal with something deeper, something that really spoke more towards the human experience, towards the fear of change and the other. I mean, ripping some random person's arms apart and chewing off their face is fun, and a great game…but it's just not a Cullected game.\" She sighs and starts pouring syrup, \"Or maybe it is. It's just frustrating that in order to make money, we had to hitch our story to this completely absurd amount of slaughter and horror. It undercut the anti-racism message.\"\n        *goto RenMessageMerge\n\n      #\"Why wasn't it a zombie sim?\"\n        Ren shrugs, \"We wanted to deal with something deeper, something that really spoke more towards the human experience, towards the fear of change and the other.\" Her voice turns bitter, \"But, of course, if you couldn't chew somebody's face off, then how would it sell?!\" She sighs and starts pouring syrup in an intricate pattern, \"It's just frustrating that in order to make money, we had to hitch it to the completely absurd level design that involved slaughtering scores of people. It undercut the anti-racism message.\"\n        *goto RenMessageMerge\n\n      #\"I think that would be fun for an hour or two.\"\n        Ren shrugs, \"That was my argument: if you want a zombie sim, make a zombie sim. Don't try to tack on a story. And likewise, don't try to tack on the violence to our story game when it didn't make sense. But of course, if we didn't have dungeon crawl fights in there, it wouldn't sell.\" She sighs and starts pouring syrup in an intricate pattern, \"It's just frustrating that in order to make money, we had to hitch our story to this completely absurd amount of slaughter and horror. It undercut the anti-racism message.\"\n        *goto RenMessageMerge\n\n      #\"I'd have preferred something with more story, more motivation.\"\n        Ren shrugs, \"That was my argument: if you want a zombie sim, make a zombie sim. Don't try to tack on a story. And, likewise, don't try to tack on the violence to our story game when it didn't make sense. But of course, if we didn't have dungeon crawl fights in there, it wouldn't sell.\" She sighs and starts pouring syrup in an intricate pattern, \"It's just frustrating that in order to make money, we had to hitch our story to this completely absurd amount of slaughter and horror. It undercut the anti-racism message.\"\n        *goto RenMessageMerge\n\n  #\"It was a new spin on the downtrodden outcasts.\"\n    Ren smiles up at you with satisfaction, \"It was definitely supposed to be an allegory about race struggles. Do you know, I modeled the hospital after the church in Birmingham?\" You did not. Ren flits her eyes to the warming syrup as she continues, \"But I've been thinking: I'm not sure that making an allegory about racial struggles is the right way to deal with it. I think that it allows racist players to still enjoy the game without getting it.\"\n    *goto RenMessageMerge\n\n  #\"It felt like a cool story reason for giving you awesome gameplay.\"\n    Ren actually gives you a mischievous grin, \"Ah, you mean like the health regeneration and ability to swap seamlessly between guns, magic, stealth, and parkour melee? Or the amazing experience of ripping someone's body apart with your bare hands? Well, that was all definitely a lot of fun to implement, but that's not why we did it.\"\n\n    She glances over at her syrup, \"It was supposed to be an allegory for racial struggles. A story with meaning. I think that message got lost in the gore, covered up by the fight mechanics.\" She sighs.\n\n    *choice\n      #\"Why not just release a game without fight mechanics?\"\n        Ren starts pouring syrup in an intricate pattern, \"Oh, you mean a story-only game? Then you really box yourself in. You get a reputation, you know, and suddenly you're not marketable, you can't move units. And profit's always a struggle, there's always stiff competition. So you have to compromise.\"\n        *goto RenMessageMerge\n\n      #\"I think the message still came through strongly.\"\n        Ren starts pouring syrup in an intricate pattern, \"Oh, well, thank you. But I think that you're perhaps…more perceptive than the average person.\" You try not to blush at the compliment as she continues, \"Plus, I know that people have a tendency to ignore the message and just focus on the parts they like. I just wish I didn't have to compromise, didn't have to always be appealing to the wider audience.\"\n        *goto RenMessageMerge\n\n      #\"I still really enjoyed the game's mechanics.\"\n        Ren starts pouring syrup in an intricate pattern, \"Oh, well I'm glad that you did. We did put a lot of effort into them. And I had always hoped that those kind of widely appealing features would be a sort of Trojan Horse that actually brought attention to more important issues, but now I'm not so sure. I think that the message doesn't really sink in. I just wish I didn't have to compromise, didn't have to always be appealing to the wider audience.\"\n        *label RenMessageMerge\n\n        *fake_choice\n          #\"Why bow to pressure? Why not just make what you want?\"\n            Ren sags her shoulders, \"Because I'm not—we're not—brave enough. What if it bombs? We can't take that kind of financial hit. And people run as soon as they see a game that's educational or fringe.\" She snorts in realizing the implication in her own statement, \"Anti-racism is still considered fringe.\"\n\n            She puts down the syrup, \"But if I had my way, we'd make a game that dealt with what it was like to live as a minority. Maybe dealing with slavery, maybe going through American Japanese concentration camps, maybe just something simply dealing with post-reparation micro-aggressions.\"\n            *goto RenGameIdeas\n\n          #\"I wish you could have made the message more explicit.\"\n            Ren straightens in annoyed agreement, \"I know! Ugh. We can't take that kind of financial risk, is the thing. And people run as soon as they see a game that's educational or fringe.\" She snorts in disgust, \"Anti-racism still considered fringe.\" \n\n            She puts down the syrup, \"But if I had my way, we'd make a game that dealt with what it was like to live as a minority. Maybe dealing with slavery, maybe going through American Japanese concentration camps, maybe just something simply dealing with post-reparation micro-aggressions.\"\n            *goto RenGameIdeas\n\n          #\"Villainizing extreme racism let players avoid self-examination.\"\n            Ren looks to g that comes from years of being ground down, of constant, wearing bias? While encouraging sympathy, and having good mechanics. It's so many things to balance.\" She smiles, \"But one day, I'd like to figure it out.\"\n\n  #\"I'm glad [i]Creatures[/i] talked about racial issues, even subtly, instead of ignoring them.\"\n    Ren pours herself some water, almost as an afterthought, before responding, \"I am grateful for that, at least. I think it helps minorities a little; like seeing the secret handshake and nod, and knowing that you're not totally alone. And it fights against racism. Shames it, discourages it. At least, that's what I hope.\" She smiles, \"Maybe one day I'll take the time to figure out how to be more overt.\"\n\n  #\"I think racist people won't get it any way you frame it.\"\n    Ren pours herself some water before turning to you and taking a deep breath, \"Well, I mean, you'll have the kind of people that just don't get it at all, to be sure. You can't reach everyone. At the end of the day, people will still be racist. But maybe you'll shame them into shutting up about it. Or maybe they'll leave to go play some other game and your chat servers will be better for it. Or you'll make the affected minorities feel happier and more comfortable. They need a break, some fun too.\" She smiles, \"There's a lot of reasons to avoid tailoring to ignorant racists.\"\n\n  #\"Are you okay with limiting your audience?\"\n    Ren slams a water glass down with a little too much force, \"When it comes to certain people, I'd much rather limit my audience. I don't want those kind of people playing my game, having fun. They don't even realize what it is that they're enjoying. I don't want that money. I want to create art that speaks directly to people. We should be able to be more direct, less dedicated to appealing to a wider audience.\" She bobs a goodbye, \"Anyway, I guess I shouldn't get into it that deeply,\" then goes over to join James and Diana.\n    *goto RenEndMerge\n\n*choice\n  #\"Well, thanks for fighting the good fight.\"\n    *set ArtistAffection +1\n    Ren pushes back her glasses and smiles, \"Thanks.\"\n    *goto RenFinalChoiceMerge\n\n  #\"I think your work is making a difference.\"\n    *set ArtistAffection +1\n    Ren pushes back her glasses and smiles, \"Thanks.\"\n    *goto RenFinalChoiceMerge\n\n  #\"It all sounds very artistic.\"\n    Ren pushes back her glasses, \"Thanks, I suppose. I hope it makes a difference, too.\"\n    *goto RenFinalChoiceMerge\n\n  #\"Just as long as you don't lose sight of the fun.\"\n    *set ArtistAffection -1\n    Ren frowns, \"Well, but I would hope that living a better life is its own enjoyment. Whatever.\"\n    *goto RenFinalChoiceMerge\n\n*label RenFinalChoiceMerge\nRen sits down, joining James and Grant, and the trio start talking up a storm.\n\n*label RenEndMerge\n\n*goto MidBreakfastMerge\n\n\n*label GrantStart\n\nThen Grant walks in, looking somewhat nervous and tired, but bolsters himself when he notices Ren and James already here. He waves at you pleasantly, and you greet him in return.\n\n*comment GRANT\n*fake_choice\n  #\"Good morning!\"\n    He breathes in deeply, \"Oh yes! It is indeed! And I have to say, I'm famished. I could eat a space horse. You do have those, right?\" You laugh like it is the funniest joke you have ever heard.\n\n  #\"How are you doing?\"\n    He breathes in deeply, \"Oh, you know, this time I'm really feeling better. Thank you for the concern. I'd just like to stuff my face.\" You express the greatest joy at this news.\n\n  #\"Please, help yourself to food.\"\n    He stares at the spread, \"Oh, you don't have to tell me twice! My appetite is back with a vengeance.\" You express the greatest joy at this news.\n\n  #\"Can I get you anything to drink?\"\n    He waves you off, \"I appreciate your attention to detail, but I think I'll be fine.\"\n\nGrant starts loading up his plate. You refrain from your usual ration-reminding cough and instead smile pleasantly. He takes a break from spooning some eggs to turn to you, \"Say, I wanted to ask you about something really quickly, if that's alright with you.\" He looks about somewhat nervously before speaking, \"So, when I was sick, I think I went a bit delirious. I was sort of thinking that to get better, I should just hit the restart button. I'm a little worried all this gaming stuff is going to my head.\" Oh man, he must be really sick. Maybe this evacuation is for the best.\n\n*set ConsultantAffection +2\n*choice\n  #\"Gaming is just part of the culture, it will end up influencing people.\"\n    He nods and starts adding some RepliMeats to his plate, \"Yeah, I suppose so. I think it was just so scary, because it felt so real. I mean, I'm a philosophy major, originally, and the whole dream argument always frightened me. I used to think that I could just know the difference between a dream and reality, but then I've had dreams where I've reasoned that I was awake. I've had dreams where I've fallen asleep and had dreams in them.\" He shudders, \"This just adds a whole extra layer of existential uncertainty.\"\n    *goto GrantDream\n\n  #\"I'm sorry that you weren't feeling well.\"\n    He nods and starts adding some RepliMeats to his plate, \"Yeah, well, I'm less concerned about the motion sickness, and more about the extra existential uncertainty dropped into my lap. I mean, I'm a philosophy major, and all that did was raise more questions. I used to think that I could just know the difference between a dream and reality, but then I've had dreams where I've reasoned that I was awake. I've had dreams where I've fallen asleep and had dreams inside the dream.\" He shudders, \"This just adds a whole extra layer of existential uncertainty.\"\n    *goto GrantDream\n\n  #\"At least it makes for a funny story.\"\n    He nods and starts adding some RepliMeats to his plate, \"Yeah, I guess. Maybe I'll think so too one day, but right now it's just creepy: it felt so real. I mean, I'm a philosophy major, originally, and the whole dream argument always frightened me. I used to think that I could just know the difference between a dream and reality, but then I've had dreams where I've reasoned that I was awake. I've had dreams where I've fallen asleep and had dreams in them.\" He shudders, \"This just adds a whole extra layer of existential uncertainty.\"\n\n    *label GrantDream\n\n    *fake_choice\n      #\"The blur between reality and imagination worries me too.\"\n        He leans in close, \"Yeah! That's the thing! That breakdown in boundaries is scary. What's real? What's fiction? Does reality mean anything?\" He raises his arms in an overly large shrug, pauses, then continues, \"It got me thinking. I used to concern myself with the people in my dreams. Were they real? Did they have independent thoughts? Was I killing them every time I woke up? But maybe I've been worrying about the wrong thing. What about video game characters? Are they real? Am I killing them every time I shut down the program?\"\n        *goto GrantBackOn\n\n      #\"But I can tell the difference between a dream and a reality.\"\n        He raises an eyebrow, \"Oh, really? Most people can't tell when they're in a dream. They don't realize it until they've woken up. Maybe you're special, but most of us are stuck with that uncertainty.\" He pauses, then continues, \"It got me thinking. I used to concern myself with the people in my dreams. Were they real? Did they have independent thoughts? Was I killing them every time I woke up? But maybe I've been worrying about the wrong thing. What about video game characters? Are they real? Am I killing them every time I shut down the program?\"\n        *goto GrantBackOn\n\n      #\"Maybe [i]The Matrix[/i] is just one giant video game.\"\n        He raises an eyebrow, \"Oh, well, I'm not advocating for a [i]Matrix[/i]-based reality, I mean, the logistics break down pretty quickly when you examine that scenario, but I guess I am getting at something kind of similar.\" He pauses to collect his thoughts, then continues, \"Ah, yes: dreams. I used to worry that I was killing the people in them when I woke up. But maybe I've been worrying about the wrong thing. What about video game characters? Am I killing them every time I shut down the program?\"\n        *goto GrantBackOn\n\n      #\"Well, I'm just glad you're not feeling nauseous anymore.\"\n        He gives you a half-smile, \"Yeah, I…I guess I am too.\" He finishes loading up his tray with bananas, then gives you a curt nod before bounding away.\n        *goto GrantEndMerge\n\n    *label GrantBackOn\n    *choice\n      *hide_reuse #\"But you bring them back to life every time you switch the game back on.\"\n        He puts his fully-loaded tray down to give you his full attention, \"Well, but do I? Or are they just clones? With all the same memories, the same thoughts? The same stats, variables, whatever? Even if they are just put into stasis, is that ethical? And what happens when that game is never turned back on, or deleted? I mean, I can't ask them how they feel about it.\"\n        *set GrantSwitchOff true\n        *goto GrantBackOn\n\n      *if (GrantSwitchOff = true) #\"I think the fact that you can't ask them about their experience means they're not real.\"\n        He shifts his hands up and down as though he were lightly juggling, \"Ehhhh…I suppose. But maybe just because we can't communicate doesn't mean that they wouldn't if we could. Or think about it this way: what if a character was programmed to beg you not to close the program every time you hit the Escape button? Is that better communication? Does that change things?\"\n\n        *fake_choice\n          #\"I think I'd feel bad, but it would just be for an illusion.\"\n            He nods thoughtfully, \"That's an interesting way to look at it. '[i]Ceci n'est pas une pipe[/i]' eh? I guess that works. Well, actually I'm not sure. It's still a pipe that can be interacted with, in some way. I don't know; it's a lot to think about.\"\n\n          #\"But that reaction isn't a real one.\"\n            He nods thoughtfully, \"But who gets to say what a 'real' reaction is? What if someone took your protests as a 'fake' reaction? Or do you mean that their reactions aren't 'real' because computer programs can only have reflexive reactions, never cognitive reactions? Now we'll get into stuff like determinism and free will, and that's its own other rabbit hole.\"\n\n          #\"I think the fact that they're 'alive' in a different way means that they don't really 'die' either.\"\n            He nods thoughtfully, \"Well, I hadn't really thought about something like that. I guess they don't really feel pain or the passage of time. From their perspective, they're enjoying full and valid lives. Interesting thought. I'll have to think about it more.\"\n\n          #\"I guess you'd just call it artificial intelligence.\"\n            He nods semi-convinced, \"Yeah, I'm definitely starting to think so. I think the thing that a lot of people miss about AI is the fact that there are already so many different kinds of brains. Maybe we're not modeling the complexity of a human brain, but something like a bug or a bird, we've got that nailed.\" He smiles, \"Parrot-level, for sure.\"\n\n        *goto GrantMerge\n\n      #\"Maybe they're a kind of artificial intelligence?\"\n        He nods semi-convinced, \"Well, maybe, but what does that mean? And does it even make sense to call something artificial intelligence? Why not just call it intelligence? I guess the differentiation comes down to whether you think digital life is as valuable as biological life.\"\n\n        *fake_choice\n          #\"I support all kinds of intelligence.\"\n            He shrugs, \"But who can tell if that's the right way to go about it? Who can tell if we're really just being tricked by their elaborate conditions and checks? But then I suppose, who's to say that's not what's n\n        *fake_choice\n          #\"At that point, I guess it's complicated enough to be its own entity.\"\n            He raises a single eyebrow, \"What, just because it was a collaboration? I was just pointing out that you couldn't pin this on one person. But I suppose, it's a collaboration by necessity because that sort of thing has gotten so complicated that it's impossible for one person to recreate.\"\n\n          #\"Humans are created via joint effort.\"\n            He raises a single eyebrow, \"Well, I suppose that's true. There's definitely an argument to be made that we're extensions of our parents. Or, everyone who's ever contributed to our cognitive development. But see? We're back to not being able to distinguish what makes human intelligence special.\"\n\n          #\"It's still just a series of well-conditioned responses.\"\n            He raises a single eyebrow, \"Well, I suppose that's true. And there's definitely an argument to be made that we're just results of our own checks and conditions, but then you get into determinism and free will, and that's its own rabbit hole.\"\n\n          #\"I just meant that they couldn't arise naturally, that they had to be made by a human.\"\n            He raises a single eyebrow, \"Well, but what happens when that's not the case? What happens when they're self-creating? Does their origin really matter? I mean, what if I make a biological clone: isn't it intelligent? And now we're back to not being able to distinguish what makes human intelligence special.\"\n\n        *goto GrantMerge\n\n      #\"They don't have real feelings or desires.\"\n        James snorts in surprise, \"Well…I think what you mean to say is that they don't have feelings or desires the same way we do, but even something like a released ball has a 'desire' to fall. Who's to say that AI desires are any less valid than ours?\"\n\n        *fake_choice\n          #\"It's the difference between internal and external motivation.\"\n            He raises his eyebrows, \"Well, but at the time when you've programmed in behavioral patterns, when it self-determines reactions, isn't that internal motivation? And if you're going to say that it's just responding to stimulus in the pre-programmed way that it must: then how are we any better?\" He waves his hands, \"But at that point you get into the whole free will thing, and that's its own rabbit hole.\"\n\n          #\"Game characters still don't really have motivations.\"\n            He raises his eyebrows, \"Well, but in a way they do: most have at least some kind of behavioral pattern AI. Isn't that internal motivation? Isn't that a desire? And if you're going to say that it's just responding to stimulus in the pre-programmed way that it must: then how are we any better?\" He waves his hands, \"But at that point you get into the whole free will thing, and that's a whole 'nother rabbit hole.\"\n\n          #\"Isn't saying that they feel 'differently' really just another way of saying they're not actually feeling?\"\n            He raises his eyebrows, \"Well, certainly it's a frightening thing to contemplate an intelligence that works on a completely different mode of thought, but is it really far-fetched enough to dismiss the possibility that they feel emotions? I mean, we see intelligent animals all the time, and accept that we just can't ever break that barrier of communication. We can't even convey that there is a barrier. I think it's like that.\"\n\n          #\"I guess that they're intelligent, in their own way.\"\n            He raises his eyebrows, \"Well, are they though? Who can tell if we're really just being tricked by their elaborate conditions and checks? But then I suppose, who's to say our own brains aren't just running their own system of conditions and checks? Are we really any different from the computer?\" He smiles at you, \"But that whole free will thing is its own rabbit hole.\"\n\n        *goto GrantMerge\n\n  #\"You should really talk to the doctor about this, not me.\"\n    *set ConsultantAffection -2\n    He gives you a half-laugh, \"Yeah, I guess you're right.\" He finishes loading up his tray with RepliMeats and bananas, then gives you a curt nod before bounding away.\n    *goto GrantEndMerge\n\n*label GrantMerge\nHe picks his tray back up and finishes loading it up by adding a banana, then turns to you and smiles, \"Well, I appreciate you letting me entertain the discussion, at least. I think it's been a bit inspiring, being up here on the moon.\"\n\n*choice\n  #\"I'm glad to have a discussion with such intelligence as yours.\"\n    *set ConsultantAffection +1\n    You wink; he turns around and laughs, \"You're nice to say so. And I'm glad to say that there wasn't anything artificial about it. It was a nice reprieve.\"\n    *goto GrantFinalChoiceMerge\n\n  #\"It's an interesting puzzle to thing to think about.\"\n    *set ConsultantAffection +1\n    You wink; he turns around and laughs, \"Well, that's life isn't it? Just one big puzzle, and the more you poke at it, the more you just get more questions. I'm glad at least that you were willing to indulge me!\"\n    *goto GrantFinalChoiceMerge\n\n  #\"I'm glad the moon is so inspirational.\"\n    *set ConsultantAffection +1\n    He nods, \"Yeah…I'm enjoying it a lot more today than yesterday. I think I'm really going to like my stay here. Anyway, thanks for indulging me!\"\n    *goto GrantFinalChoiceMerge\n\n  #\"I'm just glad you're feeling better.\"\n    *set ConsultantAffection -1\n    He nods, \"Yeah, me too. I'm really enjoying being up here. Now that I'm not motion sick anymore.\"\n    *goto GrantFinalChoiceMerge\n\n*label GrantFinalChoiceMerge\nHe laughs and again waves a farewell. After his back is turned for good, you wipe every surface he touched with antiviral gel.\n\n*label GrantEndMerge\nGrant sits down with James and Ren. They greet him loudly and offer him a nearby seat, launching into a new conversation that you can't quite make out from where you are. They don't seem nervous for Grant at all. They glance backwards at you, but you can tell that it's just a normal glance. No suspicion, no distrust. That's a load off. Maybe this whole stalling-until-evacuation will go easier than you think.\n\n*label MidBreakfastMerge\n\nEventually, they three pick up their plates and deposit them politely in the dirty dish bin. You shift your weight and check the time. You've passed the halfway mark.\n\n*comment DIANA\n\n*if (team = \"QAWrite\")\n  *goto DianaStart\n\n*if (team = \"ProArt\")\n  Diana and Andres saunter in together, absorbed in a heated debate. You catch glimpses of it, and surmise that it has to do with ratings and sacrifices. It takes you a few seconds to realize that the sacrifices are referring to animal sacrifices, and not necessarily giving up the things that you want in life. Diana seems convinced that they're necessary for the story, while Andres firmly disagrees. They wave to you, but focus on the food and their debate. You end up needing to glare at Andres as he attempts to overload his tray, but due to his concentration on the debate, he ignores you. Whatever. \n  *goto SadriStart\n\n*if (team = \"Leads\")\n  Diana and Sadri saunter in together, giggling. Sadri describes the contortions of bugged skeletons to Diana, who continues insisting that they should be able to use it somewhere. They wave at you politely; Diana doing her best not to collapse into a laughing fit, while Sadri shushes her with embarrassment. You smile politely and encouragingly. There's only ten minutes left in breakfast hour, when finally Andres shows up.\n  *goto AndresStart\n\n*label DianaStart\n\nYou stretch and then straighten up as Diana drags herself in, greeting you with a long yawn.\n\n*fake_choice\n  #\"Good morning!\"\n    Diana wipes away some sleep from her eyes and starts pouring some coffee before responding, \"Huuhhhh, yeah. Good morning.\"\n\n  #\"How are you doing?\"\n    Diana wipes away some sleep from her eyes, \"I'll be fine once I get some coffee, thanks.\" She starts pouring herself some immediately.\n\n  #\"Please, help yourself to food.\"\n    She wipes away some sleep from her eyes then starts pouring herself some coffee. \n\n  #\"Can I get you anything to drink?\"\n    She starts pouring herself some coffee, \"Nah, but I'll tell you what, you could really use some coffee in the state rooms.\" That was discontinued months ago, but you think better of mentioning it.\n\nDiana sips from the mug and sighs softly before putting the mug down on a tray. She glances at you, then up at the glass ceiling, but the stars are hard to see with the extra breakfast interior lights on. She turns back to you, \"Why do you think we make art?\"\n\nYou startle. It's not really something you've given much thought before now.\n\n*set WriterAffection +2\n*choice\n  #\"Art enriches our lives: it's fun.\"\n    Diana scrinches her nose while drinking her coffee, \"Yes, but what makes it fun? What do we enjoy so much about art that it permeates every age, every culture? What do we enjoy about it so damn much?\"\n\n    *fake_choice\n      #\"We love the beauty of art's simplicity, it's the kind of world we wish could be real.\"\n        She tilts her head, \"I suppose: a lot of the really old art was just everything idealized. There was a period where we couldn't stop painting pictures of Heaven, because we were just fixated on painting ourselves a perfect world. But I like to think that we've moved past the boring Adonis or Venus statues. Well, at least, mostly.\"\n\n        *fake_choice\n          #\"We've definitely progressed.\"\n            She raises an eyebrow, \"Well, I'm not entirely sure that we have. I mean, video games are still dishing out identical avatars, hero stories, villain motivations. It's like everyone's stuck in that same Adonis-Venus statue rut and can't get out. I keep trying to push for something more interesting: something bizarre, something off-beat, something completely new and unrecognizable, but I keep getting stoned down by society's insistence on high-bloom marble.\"\n\n          #\"I don't necessarily think that realism represents progress.\"\n            She raises an eyebrow, \"Well, I suppose that's fair. But you know what does? Diversity. I think that's what I'm worried about with video games. I mean, we're still dishing out identical avatars, hero stories, villain motivations. It's like everyone's stuck in that same Adonis-Venus statue rut and can't get out. I keep trying to push for something more interesting: something bizarre, something off-beat, something completely new and unrecognizable, but I keep getting stoned down by society's insistence on high-bloom marble.\"\n\n          #\"There's nothing wrong with enjoying the ideal.\"\n            She raises an eyebrow, \"Well, I suppose that's fair. But what about if that's all anyone produces? Video games are practically stuck in this Adonis-Venus statue rut where they all release the same thing: same avatars, same stories, same mechanics. I keep trying to push for something more interesting: something bizarre, something off-beat, something completely new and unrecognizable, but I keep getting stoned down by society's insistence on high-bloom marble.\"\n\n          #\"All art has meaning; I don't presume to judge its quality by presentation.\"\n            She raises an eyebrow, \"Well, I suppose that's fair. But that's the thing. Video games are missing that kind of diversity in high-quality productions, and I'm worried about it. I mean, we're still dealing with identical avatars, hero stories, villain motivations. It's like everyone's stuck in this same Adonis-Venus statue rut and can't get out. I keep trying to push for something more interesting: something bizarre, something off-beat, something completely new and unrecognizable, but I keep getting stoned down by society's insistence on high-bloom marble.\"\n\n        *goto DianaMerge\n\n      #\"We enjoy chronicling our lives, telling our stories.\"\n        She snirks out a self-amused laugh, \"Yes, I suppose that's why we would enjoy art, isn't it? We're the worst self-aggrandizers, aren't we? We do it because we think we're so special, so unique that we need to spread out our image, our likeness, our ideas to the world. I like it.\"\n\n        *fake_choice\n          #\"We are all interesting, in our own ways.\"\n            She raises an eyebrow, \"Heh, well, I suppose we all do have something unique about us. But it takes art's concentrating focus to distill that story into something meaningful and interesting. That's what I've always try to do with my stories, with my games. Bring something new to the table. It's just frustrating when all this lowest denominator trash gets published.\"\n\n          #\"It's in our biology.\"\n            She glances at the food and grabs her first piece, \"Slaves to our biology, eh? I suppose that's why people feel compelled to make art, even when they have nothing interesting that they want to say. That's why there's so many terrible video games: they just feel compelled to make something—anything—and people just buy it because they're accustomed to it. It's frustrating when you're trying to make something of quality, when you're trying to make something with a real meaning.\"\n\n          #\"It's what helps give our lives meaning and purpose.\"\n            She raises an eyebrow, \"I think it's more like, we already have meaning, but it takes art's concentrating focus to distill that story that makes it something we can understand, wrap our brains around. That's what I've always try to do with my stories, with my games. But then again, there's a whole bunch of art that doesn't have a message; it's just pretty. Or a fun diversion. And that stuff is frustrating when you're trying to make something of quality, when you're trying to make something that actually has meaning.\"\n\n          #\"But we're not actually unique, we just like thinking that we are.\"\n            She raises an eyebrow, \"Heh, well, I'll give it to you that we're not as unique as we like to think, but I don't think that's necessarily bad.\" She thinks, \"I suppose maybe that's why art speaks to so many of its viewers: it deals with the human experience. But it takes art's concentrating focus to distill that story into something interesting. That's what I've always try to do with my stories, with my games: bring something meaningful to the table. And then of course, it's just frustrating when all this lowest denominator trash gets played instead.\"\n\n        *goto DianaMerge\n\n      #\"We like the idea of creating something that will outlast us.\"\n        She snirks out a self-amused laugh, \"Yes, I suppose that's a part of it. We like feeling like we're important, like we've made a difference, left an impact.\" Her eyes glimmer mysteriously, \"But the real question is what we think we're getting out of it. What's the point of creating a legacy if you're not around to see it?\"\n\n        *fake_choice\n          #\"You still get to enjoy the art when you're alive.\"\n            She raises an eyebrow, \"Forgive me if it's not the same for other artists, but I find it almost impossible to enjoy my own art. I'm always frustrated with how I could have improved it, how I should have fixed this or that piece of it. And it takes way too much time to produce for what little fun I can get from it. I only enjoy art made by other people.\"\n\n            Her eyes darken, \"Well, some art. There's nothing I hate more than pretty drawings that have no meaning in them. And it's that much more frustrating when you're actually trying to create something that's interesting, something that has a message.\"\n\n          #\"You'll impact other people, and it will matter to them.\"\n            She raises an eyebrow, \"Well, that's definitely true. I've enjoyed lots of art in my day, and I guess I like giving back, having the change to add to that exchange of ideas.\"\n\n            Her eyes darken, \"Well, I should say that I've enjoyed some art. There's nothing I hate more than vapid nothingness. And that trash is so much more frustrating when you're actually trying to create something that's interesting, something that has a message.\"\n\n          #\"It's a way to achieve immortality, of sorts.\"\n            She raises an eyebrow, \"Well, that's certainly not the kind of immortality I'd wish for from a genie. But, I guess you've got a point. It's about keeping a part of your self alive, even if it's just one of your ideas or your philosophies. And that's what the art is capturing.\"\n\n            Her eyes darken, \"Well, I should say what some art is capturing. There's nothing I hate more than vapid nothingness. And that trash is so much more frustrating when you're actually trying to create something that's interesting, something that has a message.\"\n\n          #\"It's just us being selfish.\"\n            She raises an eyebrow, \"I guess you've got a point. It's about keeping a part of your self alive, even if it's just one of your ideas or your philosophies that you're selfish enough to think needs preserving or spreading. So you solidify it with art. I suppose there's nothing wrong with that.\"\n\n            Her eyes darken, \"Well, unless your art doesn't actually have a deeper meaning. There's nothing I hate more than vapid nothingness. And that trash is so much more frustrating when you're actually trying to create something that's interesting, something that has a message.\"\n\n        *goto DianaMerge\n\n      #\"It's something we invented to keep our minds occupied.\"\n        She snirks out a self-amused laugh, \"An interesting angle! But you've got a point. We humans always think to ourselves that we never have enough time in life, but we're also constantly bored. Go figure. I bet the first songs about death were sung hanging out in some cave when it got stormy and there was nothing to do.\"\n\n        *fake_choice\n          #\"Actually, I meant that that art keeps our mind off of death.\"\n            She raises an eyebrow, \"Well, that's a little more dull. You mean that it's just a distraction? Not about conveying meaning at all? There's nothing more pitiful than vapid, nothingness art. And that trash is so much more frustrating when you're actually trying to create something that's interesting, something that has a message.\"\n\n          #\"But at least art makes life interesting.\"\n            She raises an eyebrow, \"Well, maybe, but that feels like it's setting the bar really low. Not that it needs to convey any meaning? There's nothing more pitiful than vapid pastimes that have no meaning to them. And that trash is so much more frustrating when you're actually trying to create something that's interesting, something that has a message.\"\n\n          #\"But that art helped entertain other people.\"\n            She raises an eyebrow, \"Well, maybe that's what it's really about: the communal experience. About bringing joy to others. But of course, in order to do that properly, the art needs to have a meaning. There's nothing more pitiful than vapid, nothingness art. And that trash is so much more frustrating when you're actually trying to create something interesting, something that has a message.\"\n\n          #\"You think we'd be better off focusing on our mundane tasks?\"\n            She raises an eyebrow, \"Certainly not! We do enough of that as it is. Too much of that, for sure. I guess that's the thing that art really does: it cuts through the mundane, captures the human spirit. That's what makes it so hard to do right: how do you create something that's interesting, something that has a message?\" She shakes her head.\n\n        *goto DianaMerge\n\n  #\"Art allows us to collect our thoughts into a certain perspective.\"\n    Diana nods as she drinks deep from her coffee, \"Well, I certainly agree with you there, but let me ask you this: what about works that contain no deeper thought, no deeper message? Like a doodle or a shallow song? Does art need to have a message to be real art? Does it matter if people get that message?\"\n\n    *goto DianaArtMessage\n\n  #\"Art allows us to communicate with others.\"\n    Diana nods as she drinks deep from her coffee, \"So art is just the way we fix our ideas into a palatable enough form for others to understand quickly? I think there's something to that: it's how we speak to each other, tap into the universal human experience. But what about art that doesn't have a voice? Art without a message? Do you think that art needs to actually have something to say?\"\n\n    *label DianaArtMessage\n    *fake_choice\n      #\"Art ought to have a message to be considered real art.\"\n        She pauses contemplatively, \"Yeah, I definitely don't disagree with you; that's what I've been struggling with. There's so much vapid, nothingness art. It's weird, and I don't understand why people like it. It's even worse with games: there's so much high-bloom, unoriginal crap out there. It's even more frustrating when you're trying to make something new, something interesting, something with a message.\"\n\n      #\"Art doesn't need to have an intended message to be considered art.\"\n        She lets out a deep sigh, \"I mean, I suppose technically no, it doesn't, but I don't understand what the point to creating it, to consuming it would be if it didn't speak to you. It's just a pile of paint on a canvas, or a catchy set of chords. And it's frustrating, because that attitude is just so pervasive in video games. There's so much high-bloom, unoriginal crap out there. It's even more frustrating when you're trying to make something new, something with a message.\"\n\n      #\"Art is still art if a viewer can get their own message out of it.\"\n        She lets out a deep sigh, \"I mean, I suppose technically that's true, but what's the point of making art if you don't have anything important you wanted to say with it? What is it, just artistic small talk? I don't get it. And it's even worse in video games. There's so much high-bloom, unoriginal crap out there. It's even more frustrating when you're trying to make something new, something with a message.\"\n\n      #\"Just because you don't think it's meaningful doesn't mean it's not to the artist.\"\n        She lets out a deep sigh, \"I mean, I suppose technically that's true, but then what is it: just artistic small talk? Or an inside joke? I don't get it. Why release something so vapid or obtuse? It's just so frustrating when you're trying to make something new, something with a message.\"\n\n    *goto DianaMerge\n\n  #\"I'm sorry, but I really should focus on my work.\"\n    Diana nods as she drinks deep from her coffee. She moves towards the tables, then halts and turns back to load up her tray with food. She finally sits down at the empty table.\n    *set WriterAffection -2\n    *goto DianaEndMerge\n\n*label DianaMerge\nShe continues on, \"Do people value deeper meanings in their games, or is gaming all wrapped up in the superficial appeal?\"\n\n*choice\n  #\"A lot of gamers prefer philosophical challenges over skill challenges.\"\n    *set WriterAffection +1\n    Diana breathes out a sigh of relief, \"Yes, that's true. It's definitely a good point. I worry sometimes that the other kinds of games cover that up, obscure the rich diversity, but there are always different kinds of markets. There are always people who are interested in finding meaning.\"\n    *goto DianaFinalChoice\n\n  #\"People love games with good stories that speak to them.\"\n    *set WriterAffection +1\n    Diana breathes out a sigh of relief, \"Yes, I suppose so. But I still think that a lot of people are confused about what exactly a 'good' story means: they get overly focused on self-fulfillment. Anyway, it's a good point. All hope is not lost!\"\n    *goto DianaFinalChoice\n\n  #\"People enjoy all aspects of the game working together.\"\n    Diana breathes out a sigh of relief, \"Yes, I suppose so. And that says something: people prefer a well-rounded experience. They definitely care about meaning in their stories, at least on some level. All hope is not lost!\"\n    *goto DianaFinalChoice\n\n  #\"People play games to enjoy the fantasy, not to wrestle with philosophical truths.\"\n    *set WriterAffection -1\n    Diana sighs with resignation, \"Yes, I suppose that's so. And it kills me to say it, but I think you're right.\"\n    *goto DianaFinalChoice\n\n*label DianaFinalChoice\nDiana glances down at her empty tray as though just remembering its existence, \"I guess I should actually get something to eat. But thank you for hearing me out. I really do appreciate it.\" She distractedly spoons a bunch of random foods onto her plate, then goes to sit down.\n\n*label DianaEndMerge\n\nYou don't even have time to look up at the clock before Sadri and Andres enter the airlock. They giggle at the spread. Andres makes a crack about the food being the same as back on Earth as the two of them load up their plates. Andres gets fairly close to warranting a ration-reminding cough, but they leave to sit down with Diana before you have to resort to that. After a few minutes, they all three finish up and walk out, laughing. They wave you off as they leave.\n\n*goto EndBreakfastMerge\n\n*comment SADRI\n*label SadriStart\n\nSadri opens the airlock and slowly approaches, taking the time to really look around and take in the surroundings. She waves at you.\n\n*fake_choice\n  #Good morning!\n    Sadri yawns for what seems like a minute before returning the greeting. \"Oh, I'm sorry. I didn't sleep all that well last night. Bad dreams…\" She looks somewhat haunted, \"Do you um, think that games are too violent?\"\n\n  #How are you doing?\n    Sadri yawns for what seems like a minute before responding, \"Oh, well, I've been better. I didn't sleep all that well e combo of high-pressure and dominance-based mechanics. I think it makes people snap. And then, what's the point of being in a game?\" She sighs.\n\n        *fake_choice\n          #\"Sounds like we need more of those low-stress kinds of games.\"\n            Sadri chooses a muffin, \"Yes, I suppose, but I am also worried about excusing the people who do these things. They are still in control of their actions, and they should face that responsibility. After all, they are clearly saying things that are so vicious, but there is never any intervention, never anyone who tells them that what they are doing, what they are saying is not acceptable. They face no consequences.\"\n\n          #\"You don't think it has to do with violent subject material?\"\n            Sadri chooses a muffin, \"Well, maybe a little. I don't think you can necessarily role play non-consensual violence without that rubbing off a little. But I think what's even more important is that these people are never held responsible. After all, they are clearly saying things that are so vicious, but there is never any intervention, never anyone who tells them that what they are doing, what they are saying is not acceptable. They face no consequences.\"\n\n          #\"I think it's important to weed out the kinds of people that would snap.\"\n            Sadri chooses a muffin, \"Yes! That is it. I mean, these people are never held responsible. After all, they are clearly saying things that are so vicious, but there is never any intervention, never anyone who tells them that what they are doing, what they are saying is not acceptable. They face no consequences.\"\n\n          #\"But how can you recreate the victory glow that comes from winning a high-stress game?\"\n            Sadri chooses a muffin, \"I realize that it can feel good to win those kinds of games, but maybe we should be encouraging that good feeling from something more moderate, more healthy.\" She shrugs, \"Maybe you're right, and it's not nsible. After all, they are clearly saying things that are so vicious, but there is never any intervention, never anyone who tells them that what they are doing, what they are saying is not acceptable. They need consequences.\"\n\n          #\"They should be held more responsible.\"\n            Sadri chooses a muffin, nodding furiously, \"Yes! They are still in control of their actions, and they should face that responsibility. After all, they are clearly saying things that are so vicious, but there is never any intervention, never anyone who tells them that what they are doing, what they are saying, is not acceptable. They face no consequences.\"\n\n       *goto SadriMerge\n\n      #\"Do you want to talk about it?\"\n        Sadri sighs as she piles some scrambled eggs onto her toast, \"Oh, well. Some of it I'd rather not repeat, you know? But death threats, rape threats, demands to quit, calls to stop being lazy. And of course, we're all doing our best. It gets exhausting, and sometimes scary.\"\n\n       *fake_choice\n          #\"That's really terrible, I'm sorry.\"\n            Sadri chooses a muffin, \"Yes, it's frustrating. I don't understand it at all. But you know, I was raised to treat people politely, to consider their feelings. Maybe that is the problem. I mean, these people are never taught manners, and then are never held responsible. After all, they are clearly saying things that are so vicious, but there are never any consequences.\"\n\n          #\"I don't understand why anyone thinks that's acceptable.\"\n            Sadri chooses a muffin, \"Yes! That is it. I think the problem is that these people are never held responsible. I mean, they are clearly saying things that are so vicious, but there is never any intervention, never anyone who tells them that what they are doing, what they are saying, is not acceptable. They face no consequences.\"\n\n          #\"You're better than them.\"\n            Sadri laughs as she chooses a muffin, \"Yes, I certainly hope so! But you know, I was raised to treat people politely, to consider their feelings. Maybe that is the problem. I mean, these people are never taught manners, and then are never held responsible. After all, they are clearly saying things that are so vicious, but there are never any consequences.\"\n\n          #\"At least they've never acted on those threats.\"\n            Sadri chooses a muffin, \"Small comfort. Who knows if they will? You can never tell. And then you just go around with this stressful feeling in your stomach…and you get nightmares on your business trips. They have to know that even the threat is terrible. How can they not? Maybe they are not taught to be considerate. I mean, these people are never taught manners, and then are never held responsible. There need to be consequences.\"\n\n       *goto SadriMerge\n\n      #\"Why don't you fight back? Ban them, report them, call them out?\"\n        Sadri sighs as she piles some scrambled eggs onto her toast, \"You make it sound so easy, so obvious. But of course there are consequences, dangers to fighting back against that kind of harassment. They might escalate. The PR might backfire and then you are the unreasonable whiner. Or, most likely, you won't reach them or they won't care or nobody will ever notice and you are wasting your life tilting at thousands of tiny windmills.\" Her shoulders droop.\n\n       *fake_choice\n          #\"Every bit of fight helps.\"\n            Sadri chooses a muffin, \"Yes, but it is exhausting being tasked with fighting all the time. On top of your regular work load? Forget about it. I mean, I was raised to stand up for others, to treat people with respect, but even I can't be there all the time. Maybe that is their problem: they were never taught to consider others. They were never taught manners, and then are never held responsible. There are never any consequences.\"\n\n          #\"Surely they're not inhuman? They can be taught.\"\n            Sadri chooses a muffin and sighs, \"You would think so. I like to think that they just need to learn manners, to consider their actions more carefully. They should face responsibility for what they say. They need to face consequences.\"\n\n          #\"It sounds like a nightmare; I'm so sorry.\"\n            Sadri chooses a muffin, \"Yes, and it is exhausting. I think if they realized how it felt, what it did, they would not be so quick to say those things, do those things. I think that is the problem: they were never taught to consider others. They were never taught manners, and then are never held responsible. There need to be consequences.\"\n\n          #\"It sounds like there's nothing you can really do about it.\"\n            Sadri chooses a muffin, \"Yes, it's exhausting and terrible. And I hate it. Maybe one day, someone will figure something out, but until then, who knows?\" She gives you a resigned nod, then picks up her tray to go to join Andres and Diana.\n            *goto SadriEndMerge\n\n       *goto SadriMerge\n\n  #\"Sorry, but I should really focus on my work.\"\n    *set ProgrammerAffection -2\n    Sadri spoons some scrambled eggs onto her toast, \"Yes, sometimes I forget that you're a professional too who deserves respect. I mean, that's the thing I was wondering about. Because sometimes fans just get so disrespectful and I know how frustrating that is. Oh, but I'm sorry.\" She grabs a muffin, \"I was leaving you alone. I will um, I will sit down now.\" Andres waves her over, but she still ends up accidentally startling Diana with her approach.\n\n    *goto SadriEndMerge\n\n*label SadriMerge\nShe turns to you, \"I feel like there has to be something that can be done about their behavior.\"\n\n*fake_choice\n  #\"The best revenge is living a good life and making amazing games.\"\n    *set ProgrammerAffection +1\n    She bows slightly, almost whispering, \"I suppose that's the best you can hope for. Show them a better way to live. Thank you, for your advice.\" She smiles as she picks up her tray and heads over to the tables. Andres waves her over, but she still ends up accidentally startling Diana with her approach.\n\n  #\"Games and gamers should be better about policing that behavior.\"\n    *set ProgrammerAffection +1\n    She nods, \"Yeah. There should be systemic reinforcement of expected proper behavior. I like that solution. At least, kick them out so that they have nowhere better to go, reward the people who behave well. Thanks for chatting with me about it.\" She smiles as she picks up her tray and heads over to the tables. Andres waves her over, but she still ends up accidentally startling Diana with her approach.\n\n  #\"Just kill off the trolls.\"\n    She giggles, \"I like that solution. Enforce politeness through fear; that will keep them in line!\" She giggles again before straightening up, \"Well, maybe you could kill their avatars. Or give them severe debuffs. Make the game less fun for them and kick them out until they behave better. Thanks!\" She picks up her tray, smiles as farewell, and heads over to the tables. Andres waves her over, but she still ends up accidentally startling Diana with her approach.\n\n  #\"I don't have any good answers.\"\n    *set ProgrammerAffection -1\n    She looks over at the food and nods, \"I know. I don't think I do either.\" She gives a sad smile as she picks up her tray and heads over to the tables. Andres waves her over, but she still ends up accidentally startling Diana with her approach.\n\n*label SadriEndMerge\nDiana, Andres, and Sadri all take their time, chatting until the final few minutes of breakfast before they finish. They wave you off as they leave through the airlock together.\n\n*goto EndBreakfastMerge\n\n*label AndresStart\n\nHe stretches out his arms, transitioning into a wave at you.\n\n*comment ANDRES\n*fake_choice\n  #\"Good morning!\"\n    He gives you a great big smile. \"Hey there, ${Name}. This all looks delicious, thanks!\" He eyes the food
