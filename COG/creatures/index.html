. You laugh like you don't hear that suggestion every other month. Everyone else joins in, giving their own constellations. Ren: a crumpled dancer, Sadri: a traffic sign, Andres: a coffee cup, Grant: a pen over paper, Diana: a set of horns. \n\n    They each laugh over the various patterns.\n    *set MoonActivityTimer +5\n    *set UniverseDone false\n    *goto MoonTourStart\n\n  *hide_reuse #Play with lunar props.\n    *if UniverseJustDone = 2\n      You turn the field lights back on.\n    You summon over three remote-controlled replicas of an ancient moon rover. \"These can be controlled with the button panels on your suit's gauntlet. Try them out!\"\n\n    James and Diana claim one, working together to pretend like they're taking soil samples and scientific measurements. They actually coordinate quite well together.\n\n    Andres and Grant get overly competitive, steering the other two rigs in a race. Sadri allies herself with Grant, turning the race into a robot battle by using the digging arm to poke at Andres's robot. Ren voices her concerns about damaging the equipment, but you reassure that it's perfectly fine; they're designed to be durable. She pauses, then evens the score by controlling Andres's robot to attack Grant's rig.\n\n    They all seem to be having a great time.\n    *set PropsDone true\n    *goto MoonTourStart\n\n  *if (PropsDone = true) #Play with lunar props some more.\n    *if UniverseJustDone = 2\n      You turn the field lights back on.\n    You hop over to a nearby shed and pull out some flags.\n\n    Andres, Grant, Sadri, and Ren fight their robot battle with renewed vigor. The strategy has morphed from surface damage to attempts at overturning the other. Given the low gravity, this is fairly easy. Team Grant and Ren win. You stab a smaller flag near the winner, declaring victory as an official referee.\n\n    You pass over the rest of the flags to the tourists, who enjoy taking time to plant them into the ground and strike various heroic and silly poses. Not many tourists appreciate it, but regular lunar soil is actually incredibly difficult to plant a flag in because of how dense the regolith gets after a few inches.\n\n    Andres does the most traditional explorer poses. Ren enlists help in recreating the Iwo Jima flag-raising pose, while joking about the influence of Imperialism on art. Diana convinces James and Grant to pose for pictures as though they were about to be jousting, which makes you somewhat nervous, but they never progress to actual blows.\n\n    They really seem to be enjoying the props. You should get some additional ones.\n    *set MoonActivityTimer +5\n    *set PropsDone false\n    *goto MoonTourStart\n\n  *hide_reuse #Describe the moon dust.\n    *if UniverseJustDone = 2\n      You turn the field lights back on.\n    You launch into tourist mode, \"So the moon dust—or lunar regolith—as created over 4.4 billion years of asteroids beating and battering the surface. The dust was further shaped by a process known as 'space weathering,' with its exposure to cosmic rays. The stuff is actually considered a nuisance by most spacefaring endeavors. It's rough, more reactive than earth soil, and sticks to everything. But that's why we wash our suits off before returning back into the base, so feel free to enjoy it however you want.\"\n\n    Ren bends down and picks some up dust, enjoying watching it sift through her fingers. James attempts to throw a clump of dust like a snowball at Sadri, who ducks out the way. Diana starts drawing out a pattern in the dust by dragging her feet, while Andres and Grant just fascinate over the footprints they leave behind. The spacesuit shoes are specially designed to imitate the iconic moon boot pattern, and you feel a twinge of guilt remembering the time that Spacejoy actually attempted to copyright that boot pattern.\n\n    They really seem to be getting into the spirit of moon fun.\n    *set moonDustDone true\n    *goto MoonTourStart\n\n  *if (moonDustDone = true) #Play with the moon dust some more.\n    *if UniverseJustDone = 2\n      You turn the field lights back on.\n    You call out to everyone now that they've kicked up a good amount of dust, \"So, if we were on a side of the moon that faced the sun, all of this moon dust in the air would be creating this amazing feature: lunar crepuscular rays. This phenomena looks like streaks of sunlight, very similar to those caused by clouds. And, if we kicked up enough dust, our cloud could be visible from Earth as a reddish or white bright light.\"\n\n    Sadri decides that she's going to make herself a moon dust snow angel. You only intervene enough to instruct her to go face-down to avoid damaging her backpack. Andres and Grant help her back up after she's done and they all admire her handiwork. You can practically hear her blushing through the comms as they all \"ooh\" and \"aah.\" Diana continues her pattern: a fearsome alien creature. Ren graduates from mere dust-sifting to actually drawing out faces and symbols with a combination of depositing and wiping away the dust with her hands. It's actually incredibly impressive considering the clumsy gloves restricting her.\n\n    You do your best to ignore just how filthy everyone's suits are getting.\n    *set MoonActivityTimer +5\n    *set moonDustDone false\n    *goto MoonTourStart\n\n  *hide_reuse #Describe the moon base.\n    You direct everyone to look back to the building. \"That's Spacejoy's good old Moonbase 14. From here, you can see the massive storage tanks of water, oxygen, and other atmospheric gasses. You can also see the exteriors of employee personal areas, and storage bulkheads. On the other side is our observation room, and dining area, strategically opposite the exploration area so that the glare from the search lights and dust clouds don't interfere with the enjoyment of those areas. And, of course, you can see the openings for our protective dome. We raise it whenever we have warnings of a meteoroid shower, or if we are undergoing any sort of tourist-free maintenance. And, in case anyone was wondering, we call them meteoroid showers instead of meteor showers because we have no atmosphere on the moon to burn up the meteoroid into a meteor.\"\n\n    Nobody really seems all that interested in the explanation. They spend some time posing for pictures instead.\n    *set moonBaseDone true\n    *goto MoonTourStart\n\n  *if (moonBaseDone = true) #Describe the moon base some more.\n     You give more history about the building, \"While this is called Moonbase 14, it was actually built on the foundations of Moonbase 7. There are actually only 5 Spacejoy moon bases open for use right now, thanks to advancing technology. Earlier incarnations of structures on the moon did not properly account for wear and tear from the moon dust and the charged atmosphere from cosmic rays. But advancements have made possible more durable—and much roomier!—structures.\"\n\n    Everyone seems even more bored by this information. They spend some more time posing for pictures.\n    *set MoonActivityTimer +5\n    *set moonBaseDone false\n    *goto MoonTourStart\n\n*label MoonEmergency\n\nBut then it happens before any of the chaperones can stop it.\n*if (MaxAffectionTarget = \"Andres\")\n  Sadri \n*if (MaxAffectionTarget = \"Diana\")\n  Ren\n*if (MaxAffectionTarget = \"James\")\n  Grant\n*if (MaxAffectionTarget = \"Sadri\")\n  Andres\n*if (MaxAffectionTarget = \"Ren\")\n  Diana\n*if (MaxAffectionTarget = \"Grant\")\n  James\njumps too close to ${MaxAffectionTarget}, and they accidentally collide.\n\n${MaxAffectionTarget} is propelled backwards, and despite all ${AffectionTarget_zir} backpedaling hand gyrations, there's no atmosphere to push back against and right ${AffectionTarget_zir}self. You start bounding over to assist, but ${AffectionTarget_zhe} starts screaming at the realization of the unstoppable fall, \"Grab me, grab me, grab me, grab me…!\" and then ${AffectionTarget_zhe} lands hard against ${AffectionTarget_zir} backpack. The suit's designed to take it, but it can be a frightening experience. \n\nThe excessive oxygen intake alarm triggers as $!{MaxAffectionTarget} graduates into a full-blown panic attack, \"My suit is torn, my suit is going to tear, and my pack was damaged. My oxygen is leaking out. It's leaking, it's leaking out.\" $!{AffectionTarget_zhe} starts thrashing, unable to right ${AffectionTarget_zir}self in ${AffectionTarget_zir} panic. This spikes ${AffectionTarget_zir} oxygen even more. You're just a few steps away.\n\n*fake_choice\n  #\"We'll get you back inside.\"\n    ${MaxAffectionTarget} stops thrashing and latches onto this, \"Please, please, I know you'll help me.\" You pick ${AffectionTarget_zir} up as ${AffectionTarget_zhe} continues with the panicked babbling, \"Please, I just want to go back inside.\"\n\n  #\"Wait for me to help you.\"\n    ${MaxAffectionTarget} stops thrashing and latches onto this, \"Please, please, help me. You're the only one I trust.\" You pick ${AffectionTarget_zir} up as ${AffectionTarget_zhe} continues with the panicked babbling, \"Please, I just want to get out of here.\"\n\n  #\"The oxygen spike was from your panic.\"\n    ${MaxAffectionTarget} doesn't stop thrashing, \"Please, please, I don't have enough oxygen, I can't breathe.\" You have to almost fight against the thrashing, but you manage to carefully pick ${AffectionTarget_zim} up as ${AffectionTarget_zhe} continues with the panicked babbling, \"Please, I need replacement oxygen, I need more oxygen!\"\n\n  #\"Stop causing a scene.\"\n    You have the presence to at least communicate that over a private channel, \"You're fine.\" You confirm, \"I can see it on the report it's broadcasting. Now, you need to calm down so that we can take the next step.\" ${MaxAffectionTarget} stops thrashing and instead starts sobbing quietly, \"Please, I just want to go back. I just want to get out of here.\"\n\nYou feel pity for ${MaxAffectionTarget} as you lead ${AffectionTarget_zir} back to the entrance. That kind of panic in front of a group can be hard to live down. And of course, it puts a damper on everyone else's enjoyment. Hmm…which makes an interesting conundrum. You can escort and calm down ${MaxAffectionTarget}, or you could stay with the rest of the group and focus on keeping them calm instead.\n\n*choice\n  #Escort out ${MaxAffectionTarget}.\n    *goto EscortLove\n\n  #Stay with the rest of the group.\n    You start conveying this plan to ${MaxAffectionTarget}, \"I'm going to hand you off to another steward here…\" but ${MaxAffectionTarget} interrupts you. \"No, no no! Please, don't leave me. I want you to help me. Please.\" Wow, you've really had an effect on ${AffectionTarget_zim}. You don't really feel right sending ${AffectionTarget_zim} away with someone else.\n\n    *choice\n      #\"Okay, I'll escort you out.\"\n        *goto EscortLove\n\n      #\"Sorry, I really should stick with the rest of the group.\"\n        *goto StuckWithGroup\n\n\n*label StuckWithGroup\n*set AffectionLove false\nAnother steward has to practically peel ${MaxAffectionTarget} off of you. It's a sad situation for ${AffectionTarget_zim}, but it wouldn't be professional of you to leave the majority of the group behind for a single person. And this group already has dealt with enough morale and trust problems. You're probably going to get an official write up, after they all leave. There's been too many unpleasantries. But you're here to help console everyone else.\n\n*fake_choice\n  #\"Sometimes people to get a little extra nervous.\"\n    You reassure everyone that it's perfectly normal and that it's really just bad luck. Spacejoy is interested in providing a fun time for everyone, and it's definitely not fun for ${MaxAffectionTarget} to have gotten so nervous. Especially when everyone was having such a good time!\n\n    They seem reticent to continue space play, after witnessing that meltdown, but you've set the seeds of reassurance. Now it's time to distract them.\n    *goto BadmintonMerge\n\n  #\"Don't worry, there was never any real danger.\"\n    You reassure everyone that the suits are specially-designed to withstand the sort of stress that accompanies these sorts of activities. They have extra reinforcement on the packs, extra-strong seals, and multiple backup safety systems, none of which were even tripped because ${MaxAffectionTarget} didn't even damage anything. You reassure them that it's just some bad luck.\n\n    They seem to agree with this, that it was too bad ${AffectionTarget_zhe} was so quick to panic. Now, it's time to distract them.\n    *goto BadmintonMerge\n\n  #\"I'm just sad that ${MaxAffectionTarget} will be missing out on all the fun.\"\n    You keep it bright. Keep it chipper. You are determined to steer them back to a positive place. \"It really is too bad…\" You pause to build anticipation, \"Because I was just about to start a game of badminton!\"\n    *goto BadmintonMerge\n\n  #\"Let's play some badminton!\"\n    You don't even acknowledge what just happened: talking about it will only make them dwell\n    *goto BadmintonMerge\n\n*label BadmintonMerge\nYou bust out some ridiculously large racquets and two over-sized shuttlecocks, roping everyone into a game of moon badminton. There's plenty of team-switching and dubious score-keeping, but everyone eventually melts into laughing fits trying to keep afloat the multiple shuttlecocks. It's mindless and repetitive, but it requires the kind of active participation that keeps them distracted from the upsetting freak-out that just happened.\n\n*fake_choice\n  #Join in the game.\n    You join in yourself, making sure to play with less skill than you actually possess.\n\n  #Watch them.\n    You stand back and just enjoy them being silly.\n\n  #Try to sort out the score-keeping.\n    An an objective judge, you weigh in with your own opinions. They get into joking debates with you, but ultimately defer to your judgment.\n\n  #Take pictures.\n    Since that one steward left, there's one fewer around to take pictures. You fill in and make sure that their racquet antics, shuttlecock spikes, and silly guitar poses are fully documented.\n\nSoon, there's only fifteen minutes left before you should escort the rest of the tourists back. That's close enough to call it. You herd everyone back into the airlock and prepare them for what's about to happen next, \"So! Moon dust is sticky and corrosive, and not great for your health if you inhale it. Our suits are going to get a quick rinse off before we go back in. It will be a little bit like being in a car wash, or inside of a dishwasher. We ready for this?\" Everyone assents. Water blasts in from every angle, pushing in multiple different directions as the procedure progresses. One minute later it stops, and the interior door opens to the dressing room.\n\nYou let the stewards focus on the tourists, but you do at least remove your helmet so that you can address them when they're finished, \"I understand that you now have scheduled a business meeting. The meeting room should be fully prepared, it's at the end of the passageway where your staterooms are. Feel free to make full use of it whenever you would like to start. Hope it goes well!\" You're of course curious about the result of the meeting between Cullected Games and Synthplay, but it's a closed-door meeting. You'll have to sit it out.\n\nThey all thank you and start leaving. You make sure to send a text message to ${MaxAffectionTarget} reminding ${AffectionTarget_zir} of the meeting. And with that, you've taken care of your last responsibility for the morning.\n\n*goto MeetingTime\n\n*label EscortLove\nYou lead ${MaxAffectionTarget} back to the airlock, and opt for the smaller, faster, emergency lock. You warn ${MaxAffectionTarget} about the upcoming safety procedure, \"We're going to be cleaned off with water jets. It's to keep the moon dust out of the base. It will only take a minute, and it's perfectly safe.\"\n\nYou get no reply. $!{AffectionTarget_zhe} must just be totally numb about it all right now. Water jets hose you both down from all directions, but ${MaxAffectionTarget} doesn't even react, just stands there head down, occasionally taking a step back to help buffer against the pressure. The silence is heart-breaking. Should you say something?\n\n*fake_choice\n  #No, let ${AffectionTarget_zim} speak when ${AffectionTarget_zhe} feels comfortable enough to do so.\n    The jets stop and the water drains.\n\n  #No, you might say the wrong thing.\n    The jets stop and the water drains.\n\n  #\"So…how are you feeling?.\"\n    *goto BreakSilence\n\n  *if (MaxAffectionTarget = \"Grant\") #\"I'm sorry you've been having such a terrible time here.\"\n    *goto BreakSilence\n\n  *if (MaxAffectionTarget != \"Grant\") #\"I'm sorry that happened.\"\n    *goto BreakSilence\n\n  #\"Is there anything I can do for you?\"\n    *label BreakSilence\n    Your offer of comfort hangs in the air for a long time. The jets stop and the water drains.\n\n${MaxAffectionTarget} finally speaks, \"I just…I just wanted to get away from things. Sorry that I freaked out back there, and, I mean, I knew I was fine, I knew it would be okay, but I couldn't stop it; I couldn't get hold of myself.\"\n\n$!{AffectionTarget_zhe} slumps down and collapses against the bulkhead, \"It's terrifying, losing control of yourself. I mean, you always think that your mind, your brain, is at least yours. That you can control your mind. But you can't.\"\n*if (MaxAffectionTarget = \"Andres\")\n  He doesn't mention it, but it must have been extra tough for him in front of his whole team.\n*if (MaxAffectionTarget = \"Diana\")\n  She must be constantly preoccupied with her thoughts, with her mind.\n*if (MaxAffectionTarget = \"James\")\n  He seems more frightened by how his brain illogically reacted.\n*if (MaxAffectionTarget = \"Ren\")\n  She's uncharacteristically expressive for someone so usually reserved.\n*if (MaxAffectionTarget = \"Sadri\")\n  She alternates between pushing aside and pulling down on her hair, uncertain of how she's supposed to feel.\n*if (MaxAffectionTarget = \"Grant\")\n  He just seems so incredibly exhausted with all that he's had to deal with on this whole trip.\n\n  *fake_choice\n    #\"That experience would have been frightening for anybody.\"\n      $!{AffectionTarget_zhe} smirks, \"I think that's why everyone else is going to pity me. They don't want to face that it could have just as easily been them. That terror, that overwhelming loss of control, it could happen to anyone.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"And that's what's so frightening about it, I think. I mean, we hate being reminded of the fact that life is so chaotic.\n    #\"It's a self-preservation reaction.\"\n      $!{AffectionTarget_zhe} rubs a hand to ${AffectionTarget_zir} temple, \"That's just explaining why, but the terrifying thing is that it happens at all. That we could, any of us, just lose control of ourselves. That we still have this lizard brain fight-or-flight reaction.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"And that's what's so terrifying about it, I think. We hate being reminded of the fact that life is so chaotic.\n    #\"Sometimes, life is just scary.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"That's the thing. Life is cruel, and it's worse that that kind of panic can just happen at any time.\" $!{AffectionTarget_zhe} looks down, \"And that's what's so terrifying about it, I think. We hate being reminded of the fact that life is so chaotic.\n    #\"Well, I'm glad things turned out alright.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Except, I feel like, it just got delayed. That panic, could just happen at any time.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"And that's what's so terrifying about it, I think. We hate being reminded of the fact that life is so chaotic.\n  How do people deal with it? The sheer terror of existence?\"\n\n  *fake_choice\n    #\"We focus on the positives.\"\n      ${MaxAffectionTarget} smiles, \"I guess, but that just feels like you're distracting yourself, covering up the terror. The fright. But it's still there, still eating away at you. But I guess…\" $!{AffectionTarget_zhe} looks over at you, \"I guess it's the small things in life that help.\"\n\n    #\"We rely on others to keep us strong.\"\n      ${MaxAffectionTarget} smiles, \"I think that's probably right. We look to others for protection, put on a brave face for those around us. Work together.\" $!{AffectionTarget_zhe} looks over at you, \"I guess it's a good thing we're social creatures. That's a comfort, at least.\"\n\n    #\"We remember everything else we've overcome.\"\n      ${MaxAffectionTarget} shakes ${AffectionTarget_zir} head grimly, \"I think if I did that, I'd just cascade failure into a mess. Life is scary. I think I'd prefer to focus on the positives.\"\n\n    #\"I have no idea.\"\n      ${MaxAffectionTarget} nods vigorously, \"I'm constantly amazed we're doing as well as we are, although I guess a lot of it just gets covered up. I guess that's it: people are just good at hiding it. But we just work with what we have.\"\n\n\n*if (MaxAffectionTarget = \"Diana\")\n  ${MaxAffectionTarget} finally speaks, \"I…well, thank you for helping me out of that situation. Sometimes my brain just spirals out of control, and I just…I feel like death is just always hanging out nearby, waiting for some kind of slip-up, waiting to just grab me away.\"\n\n  $!{AffectionTarget_zhe} slumps down and collapses against the bulkhead, \"It's horrible, that knowledge that everything's going to eventually catch up to you. And, I mean, I try not to let it get me down, but sometimes it gets control over me. Sometimes death is a real annoying asshole.\"\n\n  *fake_choice\n    #\"That experience would have been frightening for anybody.\"\n      $!{AffectionTarget_zhe} sighs, \"I suppose it is a common experience. But then maybe that's what makes it especially terrifying: the fact that it happens to everyone at some point. People still around, people who have been dead for centuries. And people will still have the same fear for centuries to come.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I think that's why it's so awkward for other people to witness. It reminds them of their own situation.\n    #\"It's a self-preservation reaction.\"\n      $!{AffectionTarget_zhe} rubs a hand to ${AffectionTarget_zir} temple, \"That's just the knee-jerk reaction. The really horrible thing is our consciousness. We know what's going to happen.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"The real creeping horror isn't the fact that we're afraid, but that we know why we're afraid.\n    #\"Sometimes, life is just scary.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"That's it exactly. Life is the scariest thing we could ever experience. I mean, we just have to deal with the enormous weight of mortality every day, and it gets exhausting.\" $!{AffectionTarget_zhe} looks down, \"I know it weighs me down, every day.\n    #\"Well, I'm glad things turned out alright.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Well, maybe for today. Maybe for the next week. But it's one day it's not going to turn out alright. It's inevitable. And knowing that…it's just so exhausting.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I know it weighs me down, every day.\n  How do people deal with it? The sheer terror of existence?\"\n\n  *fake_choice\n    #\"We focus on the positives.\"\n      ${MaxAffectionTarget} smiles, \"Shut out the darkness with the light? Heh. But there are still shadows, still gnawing reminders, just waiting for your torch to go out.\" $!{AffectionTarget_zhe} looks over at you, \"I guess…I guess it's the small things in life that keep the darkness at bay.\"\n\n    #\"We rely on others to keep us strong.\"\n      ${MaxAffectionTarget} smiles, \"Strength in numbers? Humanity working together to fight against the impossible? I like it.\" $!{AffectionTarget_zhe} looks over at you, \"I guess it's nice to think about. We'll still fail, but at least we fought side-by-side.\"\n\n    #\"We remember everything else we've overcome.\"\n      ${MaxAffectionTarget} shakes ${AffectionTarget_zir} head grimly, \"Goodness, no. It's the memory, the knowledge that weighs me down. I'd rather not have to deal with it.\"\n\n    #\"I have no idea.\"\n      ${MaxAffectionTarget} nods vigorously, \"None of us do, and I think none of ever have. I mean, it says everything when you find the same sentiment in a poem that's thousands of years old.\"\n\n*if (MaxAffectionTarget = \"James\")\n  ${MaxAffectionTarget} finally speaks, \"I…wow, I really lost it back there. Oh man, I really just freaked out about nothing.\"\n\n  $!{AffectionTarget_zhe} slumps down and collapses against the bulkhead, \"It's horrible, knowing that you can just lose control of your senses like that. Your fears just take over, and make you into this complete other person and you feel like you're just witnessing someone else. Ugh, it's creepy.\"\n\n  *fake_choice\n    #\"That experience would have been frightening for anybody.\"\n      $!{AffectionTarget_zhe} sighs, \"I think that's exactly why it's frightening, because it feels like there's this other me inside. I mean, not like a split personality, but you know, something you can't stop. Something that's not entirely you.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I mean, I'm glad it doesn't reach [i]Twilight Zone[/i] levels, but then again, maybe having something else kick in when we're afraid is what saves us, protects us.\n    #\"It's a self-preservation reaction.\"\n      $!{AffectionTarget_zhe} rubs a hand to ${AffectionTarget_zir} temple, \"That's exactly it: it's this self-preservation personality that's not really the real you. Or, I guess technically it is, but it doesn't feel like it.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"It feels like a [i]Twilight Zone[/i] episode; I'll be honest, it really creeps me out.\n    #\"Sometimes, life is just scary.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"I mean, I guess that's why we can switch into panic mode. So that we don't have to deal with the fear, so that something else inside of us takes care of it for us.\" $!{AffectionTarget_zhe} looks down, \"But still…just the feeling that you've lost control of yourself, it feels like a [i]Twilight Zone[/i] episode.\n    #\"Well, I'm glad things turned out alright.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"I mean, I guess. I guess I have panicked James to thank for taking care of it.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"Even then…the feeling that you've lost control of yourself to some other entity, it feels like a [i]Twilight Zone[/i] episode.\n  Is that what it takes? To deal with the sheer terror of existence? Is there any other way?\"\n\n  *fake_choice\n    #\"Focus on the positives.\"\n      ${MaxAffectionTarget} smiles, \"Just enjoy the good parts and let the bad times roll off you, like some kind of Eloi? I guess that's one way to deal with it.\" $!{AffectionTarget_zhe} looks over at you, \"I like to think that maybe it's the small things in life that help.\"\n\n    #\"Rely on others to keep us strong.\"\n      ${MaxAffectionTarget} smiles, \"Society, then? That's what keeps the panic-mode Mr. Hyde at bay, eh?\" $!{AffectionTarget_zhe} looks over at you, \"I think it's less about the grander society, and more about having good friends to lean on.\"\n\n    #\"Our brains may have a weird strategy, but they've figured it out.\"\n      ${MaxAffectionTarget} shakes ${AffectionTarget_zir} head grimly, \"I guess I can't argue with that. I guess we've made it this far with that functionality. We just have to deal with life how it is.\"\n\n    #\"I have no idea.\"\n      ${MaxAffectionTarget} nods vigorously, \"I think even if we did, it's not like the panic-mode Mr. Hyde would listen. We just have to deal with life how it is.\"\n\n\n*if (MaxAffectionTarget = \"Sadri\")\n  ${MaxAffectionTarget} finally speaks, \"I…well, I can't believe that happened. I just felt like, it was just so frightening and I didn't know what to do, and I just felt like it was all going to end and I knew I was making a fool of myself, but I couldn't stop it. But I still can't believe I went that far.\"\n\n  $!{AffectionTarget_zhe} slumps down and collapses against the bulkhead, \"Who's going to take me seriously now? I mean, who even would? I know I wouldn't. Not after that.\"\n\n  *fake_choice\n    #\"Hey, that experience would have been frightening for anybody.\"\n      $!{AffectionTarget_zhe} sighs, \"Yeah, but I mean, it didn't happen to anyone, it happened to me. Because, of course.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I mean, I just feel like I'm always standing on edge, doing my best to put on a brave face. But it always just falls apart.\n    #\"There's nothing wrong with being human.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"No, regular people don't get like that. They know how to keep it together.\" $!{AffectionTarget_zhe} looks down, \"I should just…change my name. Quit my job. Nobody's going to respect me.\n    #\"Sometimes those things just happen.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"I mean, I guess, but now nobody's going to take me seriously. Maybe I should just change my name. Quit my job.\" $!{AffectionTarget_zhe} looks down, \"They all feel sorry for me now, because I was too emotional to just keep it together. Ugh.\n    #\"Well, it's over now.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Not really. I mean, I have to go back out there to them and work with them and see them every day, and they'll just think about the time I freaked out and cried on the moon.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"Nobody's going to take me seriously because I couldn't keep it together.\n  How do other people do it? Just…you know, be normal?\"\n\n  *fake_choice\n    #\"We keep things in stride.\"\n      ${MaxAffectionTarget} smiles, \"Just do your best to relax? Take things slowly? I…I suppose. I suppose that's all you can do.\" ${AffectionTarget_zhe} looks over at you, \"Although I think maybe it's the small things that help keep you grounded.\"\n\n    #\"We rely on others to keep us strong.\"\n      ${MaxAffectionTarget} smiles, \"I suppose that's the trick. Have some people you can rely on, some people to support you.\" $!{AffectionTarget_zhe} looks over at you, \"Someone you can trust.\"\n\n    #\"Nobody's really normal, they just pretend.\"\n      ${MaxAffectionTarget} laughs, \"I guess I'm glad to know that I'm in good company, at least. But you're right. I should remember that everyone else is wearing their own masks as well.\"\n\n    #\"I have no idea.\"\n      ${MaxAffectionTarget} nods vigorously, \"Oh good. I thought I was all alone. It's nice. To know that you're not alone, that is.\"\n\n*if (MaxAffectionTarget = \"Ren\")\n  ${MaxAffectionTarget} finally speaks, \"I can't believe that happened. I used to be fearless. Nothing could faze me.\"\n\n  $!{AffectionTarget_zhe} slumps down and collapses against the bulkhead, \"And then what happens? I fall down and go into hysterics? I hate being the stereotype.\"\n\n  *fake_choice\n    #\"It would have been frightening for anybody.\"\n      $!{AffectionTarget_zhe} sighs, \"Yeah, but I'm better than that. I'm stronger.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I mean, I have to be stronger.\n    #\"I don't think you're a stereotype.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"You don't think so? Some frail woman freaking out over nothing?\" $!{AffectionTarget_zhe} looks down, \"I should have been stronger.\n    #\"Sometimes those things just happen.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Right. But nobody's going to forget that it happened to me.\" $!{AffectionTarget_zhe} looks down, \"I should have been stronger\n    #\"Well, it's over now.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Exactly the opposite.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I should have been stronger.\n  I should have been better.\"\n\n  *fake_choice\n    #\"Nobody can be perfect all the time.\"\n      ${MaxAffectionTarget} smiles, \"Except I need to be: I need to bring my best, every day. I mean, it does get exhausting, but that's the price you pay.\" ${AffectionTarget_zhe} looks over at you, \"But it's definitely the small things that help.\"\n\n    #\"I think you're amazingly strong.\"\n      ${MaxAffectionTarget} snorts out a laugh, \"Well. I'm glad to hear that you think so, at least.\" $!{AffectionTarget_zhe} looks over at you, \"You feel like a good, objective judge.\"\n\n    #\"Any one of them would have done the same.\"\n      ${MaxAffectionTarget} sighs, \"Yeah, you're probably right. There's that, at least. That even if they think they're better, they're really just as weak. Still, I like to hold myself to a high standard.\"\n\n    #\"Whatever helps you steel yourself up.\"\n      ${MaxAffectionTarget} nods vigorously, \"I mean, it helps me to concentrate on how I can improve. How I can get better.\"\n*comment endif\n\n*if (MaxAffectionTarget = \"Grant\")\n  ${MaxAffectionTarget} finally speaks, \"I just…I just wanted to get away from things. Sorry that I freaked out back there, and, I mean, I knew I was fine, I knew it would be okay, but I couldn't stop it; I couldn't get hold of myself.\"\n\n  $!{AffectionTarget_zhe} slumps down and collapses against the bulkhead, \"It's just this place. It's so intimidating. I mean, being out on the edge is supposed to fun and an amazing, lucky experience, and who doesn't want to go to the moon? But, it's scary. And of course, I can't admit that, because then I'd be the killjoy.\"\n\n  *fake_choice\n    #\"What happened would have been frightening for anybody.\"\n      $!{AffectionTarget_zhe} sighs, \"Yeah, I guess.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I'm just worried about being perceived as someone who's boring, who can't take risks, who prefers to play it safe.\n    #\"A lot of guests feel uncomfortable with some of our activities.\"\n      $!{AffectionTarget_zhe} rubs a hand to ${AffectionTarget_zir} temple, \"Sure, but I feel like I need to put on a braver face, for the company's sake. And I just…I let it slip.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I can't let them think that I'm boring, that I'm not excited to be up here with them.\n    #\"Everyone is afraid of something in their lives.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Yeah, but normally they don't have it dragged out in front of everyone they're trying to impress.\" $!{AffectionTarget_zhe} looks down, \"I just don't want them to think that I'm not excited to be up here with them.\n    #\"Well, I'm glad things turned out alright.\"\n      $!{AffectionTarget_zhe} digs ${AffectionTarget_zir} hands into ${AffectionTarget_zir} scalp, \"Yeah, well, we'll see how it goes. Hopefully that didn't screw everything to hell.\" $!{AffectionTarget_zhe} looks down at the stewards helping ${AffectionTarget_zim} undress, then back up to you, \"I just don't want them to think that I'm not excited to be up here with them.\n  How do you all do it? Live out in space?\"\n\n  *fake_choice\n    #\"We get used to it, after awhile.\"\n      ${MaxAffectionTarget} smiles, \"I guess you would. Maybe by the end of the week, I'll be a seasoned professional.\" ${AffectionTarget_zhe} looks over at you, \"I'm sure you'll show me the ropes.\"\n\n    #\"We focus on what we can control.\"\n      ${MaxAffectionTarget} smiles, \"That makes a lot of sense.\" ${AffectionTarget_zhe} looks over at you, \"Keeps you from feeling completely helpless.\"\n\n    #\"We still deal with things that are scary.\"\n      ${MaxAffectionTarget} nods ${AffectionTarget_zir} head, \"I'm glad to hear that. I mean, not that you get scared, but that I'm in the company of others. Makes me feel like I'm not alone, you know?\"\n\n    #\"I have trouble with it myself.\"\n      ${MaxAffectionTarget} nods vigorously, \"You too? What a relief! I mean, it's just really nice to to know that you're not alone.\"\n\nYou can't help but agree. You glance at the other stewards and gesture at the suits. They sigh and oblige, packing away both ${AffectionTarget_zir} gear and yours as you start escorting ${MaxAffectionTarget} back to ${AffectionTarget_zir} room.\n\nWith every passing second, you can feel Spacejoy's official reprimand transforming into a commendation for helping talk down ${MaxAffectionTarget}. Although, at this point, you're just happy that you were able to help ${AffectionTarget_zim}.\n\n*if (AffectionLove = true)\n  ${MaxAffectionTarget} looks up at you, \"Hey, I know this is a weird time, and feel free to say no, but…could I ask you for a hug?\"\n\n  You let out a small sigh of pleasant surprise. $!{AffectionTarget_zhe} seems like ${AffectionTarget_zhe} could use it, but should you?\n\n  *choice\n    #Yes, it would be romantic.\n      *goto YesHug\n\n    #Yes, it would be pleasant.\n      *goto YesHug\n\n    #Yes, it would help ${AffectionTarget_zim}.\n      *label YesHug\n      You sit down on the floor next to ${MaxAffectionTarget} and wrap an arm around ${AffectionTarget_zim}, who nestles into the crook of your arm with a relieved sigh. You notice that ${AffectionTarget_zhe} smells amazing, it must be ${AffectionTarget_zir} hair. $!{AffectionTarget_zhe} pulls extra tightly into the embrace before slipping back out of it, leaving the two of you just leaning against a metal bulkhead in a random passageway on the moon.\n\n      *if (MaxAffectionTarget = \"Andres\")\n        Andres looks over at you, \"You know, it's hard for me. Hard to make myself vulnerable. I'm so used to being in control, being in charge. But it gets exhausting, keeping that up all the time. But with you, I feel like, I can finally relax. I can just be myself. So, thank you.\" He smiles.\n\n      *if (MaxAffectionTarget = \"Diana\")\n        Diana looks over at you, \"You know, it's hard for me. Everyone assumes that because my material is so dark, deals with death, that nothing frightens me. That because I toy with dark themes, I'm immune to it. But I'm not. I'm just as frightened as anyone else. But with you, I feel like, I can finally relax. Admit that I'm not what they think. So, thank you.\" She smiles.\n\n      *if (MaxAffectionTarget = \"James\")\n        James looks over at you, \"You know, it's hard for me. Everyone assumes that I'm supposed to be young and brave, some unflappable invincible youth. But I'm not, and some things are truly terrifying. I'm not any more courageous than anyone else. But I feel like you would actually understand me. So, thank you.\" He smiles.\n\n      *if (MaxAffectionTarget = \"Ren\")\n        Ren looks over at you, \"You know, I used to be in the Guerrilla Girls: the epitome of a strong woman. But being public like that meant that I couldn't ever show vulnerability. And I took that with me: never show any weakness, never anything they could attack. But I'm just as weak as anyone else. Just as scared. And I feel like I can admit that to you. So, thank you.\" She smiles.\n\n      *if (MaxAffectionTarget = \"Sadri\")\n        Sadri looks over at you, \"So, working where I do, I got lucky, and I have a good life, but I feel like I can't even enjoy it properly. Because you know, one day, it will all be over. It will be yanked away. And then what was the point of it? It's sad. I don't know how to face it properly. If there is a proper way to face it. It's hard. Oh, gosh. You're kind to listen to me ramble on about it. I do appreciate you being there for me.\" She smiles.\n\n      *if (MaxAffectionTarget = \"Grant\")\n        Grant looks over at you, \"You know, I don't think anyone at Cullected even likes me. Or at least, what I represent: being taken over by the evil overlords. That was just this terrifying thought: that I was on some place all alone with people who didn't even like me and wouldn't really care if something happened to me. But, I feel like you care, at least, and it means a lot to me. So, thank you.\" He smiles.\n\n      *goto HugDone\n\n    #No, it's dangerous.\n      *goto NoHug\n\n    #No, it's not professional.\n      *goto NoHug\n\n    #No, I don't really want to.\n      *label NoHug\n      *set AffectionLove false\n      You lay it out, \"I'm deeply sorry, but I can't do that. I do want you to know that I am very concerned for you, though. I mean, I care about how you're doing.\"\n\n      $!{AffectionTarget_zhe} flaps ${AffectionTarget_zir} head up and down trying to cover up the failed advance, \"Oh yeah, no, don't worry about it. I just needed some reassuring, don't worry.\" You sit down on the opposite side of the bulkhead.\n      *goto HugDone\n\n*label HugDone\n\n$!{AffectionTarget_zhe} doesn't wait for you to say something back, \"You know what I'd like? I'd like the ability to fucking restart that chapter.\"\n\n*fake_choice\n  #\"Sure, if you want.\"\n    $!{AffectionTarget_zhe} winks, \"Glad we agree.\"\n  #\"Yeah, I want that sometimes too.\"\n    $!{AffectionTarget_zhe} winks, \"Glad we agree.\"\n  #\"Not for me, thanks.\"\n    $!{AffectionTarget_zhe} wrings ${AffectionTarget_zir} hands, \"Well, you don't want it, that's fine. I'm just saying for me, that's what I'd like.\"\n  #\"You play too many video games.\"\n    ${MaxAffectionTarget} laughs, \"Maybe, maybe I do.\" \n${MaxAffectionTarget} stands up and stretches, \"Anyway, what time is it?\"\n\nYou check your walkie-talkie. The other stewards have finished up the moon walk: the rest of the tourists are just undressing now. And it's almost time for their business meeting. ${MaxAffectionTarget} waves you off at that news, \"I'm going to go shower and get ready for the meeting, but then I'll see you at lunch, yeah?\" And then that's that. Right after grappling with an existential crisis, ${AffectionTarget_zhe} has to just meet up with the others and put on a brave, smiling face. You see ${MaxAffectionTarget} off and head down separate passageways, glad that it worked out well enough.\n\n*if (AffectionLove = true)\n  You squirm with delight remembering the hug. The closeness. The touch. Just thinking about it flutters your stomach. You add a little skip to your stride.\nAt any rate, you've got two hours or so to yourself before lunch time.\n\n*comment Here's where the Love Variables are set.\n*if ((MaxAffectionTarget = \"Andres\") and (AffectionLove = true))\n  *set AndresLove true\n*if ((MaxAffectionTarget = \"Diana\") and (AffectionLove = true))\n  *set DianaLove true\n*if ((MaxAffectionTarget = \"James\") and (AffectionLove = true))\n  *set JamesLove true\n*if ((MaxAffectionTarget = \"Sadri\") and (AffectionLove = true))\n  *set SadriLove true\n*if ((MaxAffectionTarget = \"Ren\") and (AffectionLove = true))\n  *set RenLove true\n*if ((MaxAffectionTarget = \"Grant\") and (AffectionLove = true))\n  *set GrantLove true\n\n*label skip-ahead\n\n*label MeetingTime\n\n*finish You Deserve a Break\n\n\n*comment This GoSub Routine is down here so it won't damage anything.\n*label showMoonTime\n*set hours round((MoonActivityTimer - 30) / 60)\n*set minutes MoonActivityTimer modulo 60\n*if(MoonActivityTimer = 0)\n  no time\n*if(hours = 1)\n   1 hour\n*if(hours>1)\n  ${hours} hours\n*if((hours > 0) and (minutes > 0))\n  and\n*if(minutes = 1)\n  1 minute\n*if(minutes > 1)\n  ${minutes} minutes\n*return\n", "finale": "*comment Fifteenth part of the game\n\n*temp LastMinuteElegyGone false\n*temp AngryElegy false\n*temp LovedElegy false\n\n*temp GameChecked false\n*temp AffectionChecked false\n*temp VillainChecked false\n\n*temp GameEnding \"none\"\n*temp AdjectiveFail false\n*temp ReChoose false\n*temp ChoiceCounter 0\n*temp PerfectEnding false\n\n*temp curtainPulledBack false\n*temp NextParagraph \"\"\n*temp paragraphCount 0\n*temp paragraph1 \"\"\n*temp paragraph2 \"\"\n*temp paragraph3 \"\"\n*temp paragraph4 \"\"\n*temp paragraph5 \"\"\n*temp paragraph6 \"\"\n*temp paragraph7 \"\"\n*temp paragraph8 \"\"\n*temp paragraph9 \"\"\n*temp paragraph10 \"\"\n*temp paragraph11 \"\"\n*temp paragraph12 \"\"\n*temp paragraph13 \"\"\n*temp paragraph14 \"\"\n*temp paragraph15 \"\"\n*temp paragraph16 \"\"\n*temp paragraph17 \"\"\n*temp paragraph18 \"\"\n*temp paragraph19 \"\"\n*temp paragraph20 \"\"\n*temp paragraph21 \"\"\n*temp paragraph22 \"\"\n*temp paragraph23 \"\"\n*temp paragraph24 \"\"\n*temp paragraph25 \"\"\n*temp paragraph26 \"\"\n*temp paragraph27 \"\"\n*temp paragraph28 \"\"\n*temp paragraph29 \"\"\n*temp paragraph30 \"\"\n\nAs soon as you get in, your walkie-talkie registers a message from Maselle, \"Sorry about the confusion, ${Name}! Anyway, everyone has approximately 1-2 weeks of in-facility PTO while we manage repairs, so enjoy your time off!\" Pshh. Figures. Would starting a mutiny damage your resume too much? Oh, well. Spacejoy corporate will sort her out. You can explain everything in your report. Before you know it, the other stewards have removed and packed away most of your suit. You cram your helmet back into its case and slam the lid shut. This whole thing has been one big ball of stress, and you deserve something to defuse: the game.\n\nYou burn through levels in a furious haze: the rescue of Lauress' son, the infiltration of the Zourobras experimental facility, the decoy staging attack that leads you away from your base. Your competence, your mastery melts the anxiety away, and within the evening you're at the last level again. There's a distress call from your old base. Screams, shouts of betrayal. Your avatar looks appropriately shocked, then determined.\n*if (ElegyGone = false)\n  Elegy floats in front of you, \"We've got to hurry back!\" It hits you: this level is your last chance to stop Elegy from dying. This time, it has to stick.\n\n  *label ElegyChoiceStart\n\n  *choice\n    *disable_reuse #First, confess feelings for Elegy.\n      *set LovedElegy true\n      Your avatar waves Elegy down a lazily looping figure 8. Your character looks down at the ground, \"Listen, this time together, it's been short, but I've enjoyed getting to know you, getting to be around you. It's been such a blast, and I really want to let you know, I just wanted to tell you…\"\n\n      Elegy hovers in front of your avatar, much brighter than normal, \"I know what you mean. I feel so lucky that we got this chance to be together. \n      *if (Elegy_zhe = \"she\")\n        You're…well, you're a lot more fun than sticking people with needles.\"\n      *if (Elegy_zhe = \"he\")\n        You're…well, you're a lot more fun than boring X-ray charts.\" \n      Elegy wraps around your character's body, melting into it with a soft, beautiful light. Your character sighs, closes ${zombie_zir} eyes, and tilts ${zombie_zir} head back in contentment.\n\n      You just wish that this moment could last forever. You and Elegy: together. Happy.\n\n      *goto ElegyChoiceStart\n\n    #Regretfully send Elegy away.\n      Your character purposefully separates itself from Elegy, simultaneously making a pushing-away motion, \"Listen, it's going to be dangerous in there; we'll be up against something…unwinnable. I can feel it. Please, I know you'll disagree with me, I know you'll argue it, but I need us to separate.\" Elegy jerks back as your avatar lowers ${zombie_zir} hands and reiterates definitively, \"I need to go in there by myself.\"\n\n      Elegy bounces left and right nervously, \"I can't!\" $!{Elegy_zhe} rocks forwards and backwards while insisting, \"I'm sorry, but we're a team. I know you care about protecting me, but you think that I don't also care about protecting you? You think that you can make the choice to just sacrifice yourself for me, but I can't make that decision for you?\" Elegy hovers solidly in front of your avatar's face, \"I'm not going to let anything bad happen to you. If there's something so terrible in there, then there's no way you'll make it without me.\"\n\n      *choice\n        #\"I insist that you leave.\"\n          *goto ChainRattlingMerge\n\n        #\"I'm sorry, but you need to sit this one out.\"\n          *label ChainRattlingMerge\n          Elegy flares red, \"So if you die, if you don't make it, you're fine with forcing me to live out eternity with the knowledge that your death was completely preventable, completely my fault, for not being there? You want me to get my moaning ghost chains out now, or wait for after the funeral?\n          *if (LovedElegy = true)\n            You think I don't love you too? You think I don't care?\n          I'll leave, but I want you to think about how selfish, how dehumanizing, how unfair, to treat me like I'm some frail thing that needs your self-sacrificing protection.\"\n          *goto NoGhostMerge\n\n        #\"I'll meet up with you afterward, I promise.\"\n          Elegy flares red, \"Yeah, but what if you don't? So if you die, if you don't make it, you're fine with forcing me to live out eternity with the knowledge that your death was completely preventable, completely my fault, for not being there? You want me to get my moaning ghost chains out now, or wait for after the funeral?\n          *if (LovedElegy = true)\n            You think I don't love you too? You think I don't care?\n          I'll leave, but I want you to think about how selfish, how dehumanizing, how unfair, to treat me like I'm some frail thing that needs your self-sacrificing protection.\"\n          *goto NoGhostMerge\n\n        #\"Fine, you can come along.\"\n          Elegy cools deep blue, \"I know you care, and that you're worried about me, but there's no way that I could just leave you knowing that you were in danger.\n          *if (LovedElegy = true)\n            I love you too, and I couldn't live with myself if I let something happen to you.\n          Thank you for not dooming me to an eternity of chain-rattling ghostly misery.\"\n          *goto StayedWithElegy\n\n    #Angrily send Elegy away.\n      Your avatar's body shoves itself out of Elegy's protective aura, \"Listen, I've been putting up with you you for a long time, but here, I can't stand it anymore. I need you to go away.\" You avatar turns ${zombie_zir} back to Elegy, \"I don't care what you do, where you go, but just do it somewhere else. I'm going in alone.\"\n\n      Elegy jerks backwards suddenly, \"Wait…what? I thought we were a team. I thought we were together? How the hell are you planning on taking this on by yourself?\n      *if (LovedElegy = true)\n        I thought you…well. I thought you cared about me.\n      If you think you can just send me away, to protect me, think again.\" Elegy flits forward and backwards furiously, \"I want you to think about how selfish, how dehumanizing, how unfair, to treat me like I'm some frail thing that needs your self-sacrificing protection.\"\n\n      *choice\n        #\"Are you still here?\"\n          Elegy darkens purple, \"Whatever. I had…well, I won't bother you.\"\n          *goto NoGhostMerge\n\n        #\"I insist that you leave.\"\n          Elegy darkens purple, \"I understand. I'll leave you. But…I really thought we had something. And I'm sorry you want to throw it all away.\"\n          *goto NoGhostMerge\n\n        #\"I'm sorry, but you need to sit this one out.\"\n          Elegy flares red, \"What gives you the right to make that call? So, you're fine with forcing me to live out eternity with the knowledge that your death was completely preventable, completely my fault, for not being there? You want me to get my moaning ghost chains out now, or wait for after the funeral?\n          *if (LovedElegy = true)\n            You think I don't love you too? You think I don't care?\n          I'll leave, but I want you to think about how selfish, how dehumanizing, how unfair, to treat me like I'm some frail thing that needs your self-sacrificing protection.\"\n          *goto NoGhostMerge\n\n          *label NoGhostMerge\n          *set LastMinuteElegyGone true\n\n          $!{Elegy_zhe} floats up and away, becoming nothing more than a speck in the distance. Your avatar leans against a building, crestfallen, \"That's the way it had to be. I'm sorry.\" You see a GUI pop up, \"Hard Mode Engaged…\" Well. This really must be it. You reassure yourself that you're doing the right thing, but it feels hollow.\n\n          You slog through the level: the set design is short, but it takes much longer without Elegy's Ghost Power assistance. Your aim is worse, your speed is slower, and you don't have access to any spells except your natural regeneration. And there's the fact that you feel like a complete ass throughout the whole level. It barely even registers as enjoyable when you execute a technically flawless combo that wipes out the last group of elite guards.\n\n          You pause before the final boss room. This had better work. This had better be worth it. You take a deep breath, and press on into the final room. Lauress is there. Behind a shield, of course.\n          *goto BossFightNoElegyMerge\n\n        #\"Fine, you can come along.\"\n          Elegy cools deep blue, \"I know that you care about me, and that you're worried about me, but there's no way that I could just leave you knowing that you were in danger, that I could maybe do something to stop it.\n          *if (LovedElegy = true)\n            I love you too, and I couldn't live with myself if I let something happen to you.\n          Thank you for not dooming me to an eternity of chain-rattling ghostly misery.\"\n          *goto StayedWithElegy\n\n    #\"Go through the level with Elegy.\"\n      *label StayedWithElegy\n\n      You tap into your Ghost Powers and tear through the level. The set design is short and you're a master with the controls, but that just means that your last few minutes fighting together with Elegy are over too quickly. You can't think about anything other than how you've doomed Elegy. How Elegy's death is going to be your fault. All because, what? You wanted to make the ghost happy? Or is it because you know you're not good enough to save Elegy? It kills you inside every time ${Elegy_zhe} gives you a cheerful quip, and it barely even registers as enjoyable when your flawless combo wipes out the last group of elite guards.\n\n      You pause before the final boss room. Here it is, here is where Elegy will die again. You walk in. Lauress is there. Behind a shield, of course.\n\n      She sighs at your entrance, adjusting her necklace, \"So, you think I wasn't prepared for this?\" You bounce in delight: her dialogue is different! This is working! She continues, oblivious to your real-world glee, \"You think I don't know what your plan is? Just die already. I'm trying to make the world a better place. Trying to rid it of monsters like you. Do you even know how you got here?\"\n\n      *fake_choice\n        #\"I know that you should give up.\"\n          *goto GiveUpLauress\n\n        #\"I know that you're going down.\"\n          *label GiveUpLauress\n          She waves manicured hands around, \"Yes, yes, heroic speeches. But do you realize what you're doing? How you're destroying the world? No. I suppose you don't. Must be something with your zombie brain. Well. I'm not going to let it happen. I'm stopping it this time. Here and now.\" She presses a button, and two giant Zourobras guards enter from a side door.\n\n        #\"Wait, how I got here?\"\n          She waves manicured hands around, \"Of course you don't know. How would you? Must be something with your zombie brain. Well. I'm not going to let it happen. Not going to let monsters like you destroy this world. I'm stopping it this time. Here and now.\" She presses a button and two giant Zourobras guards enter from behind her.\n\n        #(Attack now.)\n          Your avatar starts the parkour run towards Lauress. She presses a button, releasing two giant Zourobras guards from a side door. She sighs, \"I'm not going to let monsters like you destroy this world. I'm stopping it this time. Here and now.\"\n\n      *goto GhostMerge\n\n*if (ElegyGone = true)\n  A creeping dread slowly takes hold of you as you progress. What if this doesn't work? What if all your hard work, your sacrifice, the whole damn replay is for nothing? What if Elegy is fated to die? Although, you're not quite sure how. The anxiety has you so worked up that you can't focus on enjoying the level, which reaches its end far too quickly.\n\n  You pause before the final boss room. This had better work. This had better be worth it. You take a deep breath and move forward. Lauress is there.\n\n  *label BossFightNoElegyMerge\n\n  Lauress adjusts her necklace as she notes your entrance, addressing you, \"So, you think I wasn't prepared for this?\" You bounce in delight: her dialog is different! This is working! She continues, oblivious to your real-world glee, \"You think I don't know what your plan is? Wait…where's the ghost? Didn't you have a ghost with you? Are you really all alone? Did you know?\"\n\n  *fake_choice\n    #\"I don't need a ghost to take you out.\"\n      Lauress laughs and presses a button. Two giant Zourobras enter from behind her. They leap down. You fight them off, using a combination of different attacks and escapes. You definitely feel like you're holding your own for awhile, but the fight area is too small, too restricted and their health regenerates too quickly. After a minute or two they have you pinned, forcing you to look up at Lauress who nods knowingly, \"Well, it sure seems like you're doing just fine on your own.\"\n\n    #\"Elegy's safe, where you'll never hurt ${Elegy_zim}.\"\n      Lauress rolls her eyes, \"That's fine, I'll start with you,\" as she presses a button. Two giant Zourobras enter from behind her. They leap down. You fight them off, using a combination of different attacks and escapes. You definitely feel like you're holding your own, but the fight area is too small, too restricted and their health regenerates too quickly. It definitely feels like a fixed fight, and, indeed, after a minute or two they have you pinned, forcing you to look up at Lauress who nods knowingly, \"Maybe you should have kept that ghost around.\"\n\n    #\"Did I know what?\"\n      Lauress waves a manicured hand around, \"Well, apparently you didn't. But believe me: I'm grateful how much easier you've made it for me rid the world of monsters like you.\" She presses a button and two giant Zourobras guards enter from behind her. They leap down. You fight them off, using a combination of different attacks and escapes. You definitely feel like you're holding your own, but the fight area is too small, too restricted and their health regenerates too quickly. It definitely feels like a fixed fight, and, indeed, after a minute or two they have you pinned, forcing you to look up at Lauress who nods knowingly, \"Maybe you should have kept that ghost around.\"\n\n    #(Just attack.)\n      Lauress sighs and presses a button releasing two giant Zourobras guards from behind her. They leap down. You fight them off, using a combination of different attacks and escapes. They deftly avoid your blows and even switch out when they get low on health. It definitely feels like a fixed fight, and, indeed, after a minute or two they have you pinned, forcing you to look up at Lauress who nods mockingly, \"Maybe you should have kept that ghost around.\"\n\n  Just when you're ready to call it a skill-check failure and restart to the last autosave, Elegy emerges from a side wall,\n  *if (LastMinuteElegyGone = true)\n    \"I know you sent me away, I know you were trying to protect me, but I can't let you face this by yourself!\"\n\n  *if (LastMinuteElegyGone = false)\n    flitting in front of you, \"Listen, the Department of Revenant Dignity assigned me to shadow you, to protect you. I know you sent me away, but right now we need to work together. I apologize in advance!\"\n\n  *fake_choice\n    #\"What?\"\n      Elegy ignores your protests.\n    #\"No!\"\n      Elegy ignores your protests.\n    #\"Stop, please!\"\n      Elegy ignores your protests.\n    #\"Alright, let's do this!\"\n  The ghost slams into your body, triggering a bright flash of light and the\n  *if (LastMinuteElegyGone = true)\n    re-emergence\n  *if (LastMinuteElegyGone = false)\n    appearance\n  of the Ghost Power HUD. Your avatar frees itself from the Zourobras in the chaos of the merge. Your adrenaline pumps as you realize that you've been given a second chance.\n\n*label GhostMerge\n\n*fake_choice\n  #Fight the Zourobras.\n    *goto ZourobrasFight\n\n  #Attack the equipment in the room.\n    You don't even make it within range of being able to destroy anything before the Zourobras reach you. You do your best to dance around them, but they do not let up. So you are forced to engage them.\n    *goto ZourobrasFight\n\n  #Attack Lauress.\n    You don't even make it within range of being able to climb the pipes up to Lauress before the Zourobras reach you. You do your best to dance around them, but they do not let up. So you are forced to engage them.\n    *goto ZourobrasFight\n\n  #Talk down Lauress.\n    Your character shouts it up to Lauress, \"Please, let's end the bloodshed, let's end the hatred. Let's make things new and better.\"\n\n    Lauress hangs her head, \"I wish this were about something as simple as bloodshed. But it's not. It's about survival. It's about allowing saving the world from your influence.\" By the time she finishes her sentence, you're already set upon by the guards.\n\n    *label ZourobrasFight\n    You kite the Zourobras around, stabbing them, hurling flaming energy at them, shooting them in the face. You're on your best game, the music is pumping you on, Elegy is cheering for you: it's just these two final enemies and then you win. You inch their health down: 90%, 70%, 50%. But one small slip in the pattern, and they're back to full. In frustration, your fingers falter. Your avatars strays too close to the Zourobras. And in that small instant, that small window of failure, they get you. They a second time. I can't bear to go through losing you again.\"\n\n    Whoa, the game tracks replays as part of the story?\n\n  #\"Fuck you, ghost.\"\n    Your avatar shouts it out, \"Asshole!\" Your character takes a breath and continues, \"I remember now! This all happened before! You: that portal! It sent me back, but it didn't work. I couldn't remember until just now, but it's happening again!\"\n\n    Wait, what?\n\n    Your character continues, \"You're sending me back to an infinite loop, you fucking idiot!\"\n\n    Whoa, the game tracks replays as part of the story?\n\nBut it's too late. Elegy turns momentarily solid, and mouths to you [i]next time[/i] before collapsing into the black hole-looking energy sphere. A time vortex? Once again, the screen goes dark, but this time when you regain sight, you notice that your hands are human, the dissipating black hole reveals a medical waiting room: the first level of the game. You were too frustrated to pay attention to the details the first time (or maybe they were deliberately obscured?), but the ending sends you back in time, back to when you were human. With an invitation to replay it, to get it right. But, you failed. You didn't get it right. Of course you would fail. You always fail. The credits roll. Should you even torture yourself by trying again?\n\n*temp FirmAway false\n*temp GhostDone false\n*temp ZombieOnlyDone false\n\n*temp ReplayCounter 0\n*temp GhostPowerCounter 0\n*temp ZombieOnlyCounter 0\n*temp PeriodCounter 0\n\n*label ReplayStart\n\n*set ReplayCounter +1\n\n*choice\n  *hide_reuse #Replay, sending Elegy away more firmly.\n    *set FirmAway true\n    *if (ReplayCounter = 2)\n      Each successive replay goes faster and faster, thanks to the Story Mode mechanics.\n\n    Elegy appears at the end, insisting that even the strongest need someone to look out for them. Elegy dies.\n    *gosub AvatarSadStory\n    *goto ReplayStart\n\n  *if (FirmAway = true) #Replay, sending Elegy away more softly.\n    Elegy appears at the end, insisting that people who care about each other need to stick together. Elegy dies.\n    *set FirmAway false\n    *gosub AvatarSadStory\n    *goto ReplayStart\n\n  *hide_reuse #Replay, focusing on improving your skill with ghost powers.\n    *set GhostDone true\n    *if (ReplayCounter =2)\n      Each successive replay goes faster and faster, thanks to the Story Mode mechanics.\n\n    You feel like you're getting the patterns better, but you're still not able to beat the failure point in the farmhouse. Elegy still dies at the end.\n    *gosub AvatarSadStory\n    *goto ReplayStart\n\n  *if (GhostDone = true) #Replay, continue focusing on improving your skill with ghost powers.\n    *set GhostDone false\n    You feel like you're getting the patterns better, but you're still not able to beat the failure point in the farmhouse. It feels almost like…almost like the difficulty of the Zourobras scale to match your skill level, and always beat you. Elegy still dies at the end.\n    *gosub AvatarSadStory\n    *goto ReplayStart\n\n  *hide_reuse #Replay, focusing on improving your skill without Elegy.\n    *set ZombieOnlyDone true\n    *if (ReplayCounter =2)\n      Each successive replay goes faster and faster, thanks to the Story Mode mechanics.\n    You feel like you're getting the patterns better, but you're still not able to beat the failure points at the farmhouse and the end of the game. Elegy still dies.\n    *gosub AvatarSadStory\n    *goto ReplayStart\n\n  *if (ZombieOnlyDone = true) #Replay, continue focusing on improving your skill without Elegy.\n    You feel like you're getting the patterns better, but you're still not able to beat the failure points at the farmhouse and the end of the game. It feels almost like…almost like the difficulty of the Zourobras scale to match your skill level, and always beat you. Elegy still dies.\n    *set ZombieOnlyDone false\n    *gosub AvatarSadStory\n    *goto ReplayStart\n\n  *if (ReplayCounter >= 7) #Continue retrying.\n    You try again.\n    *set PeriodCounter ReplayCounter\n    *label PeriodStart\n    *if (PeriodCounter > 30)\n      You finally give up.\n      *goto GiveUp\n    *if (PeriodCounter > 7)\n      *set PeriodCounter - 1\n      And again.\n      *goto PeriodStart\n    You work on everything: skill with Elegy, skill without Elegy, saying different things to Elegy, any small detail that might help. But nothing works. Elegy still dies. Elegy always dies.\n    *goto ReplayStart\n\n    *comment This is a subroutine based on number of attempts.\n    *label AvatarSadStory\n    *if (ReplayCounter = 2)\n      Your avatar mourns the fourth attempt, the inability to make any sort of change.\n    *if (ReplayCounter = 3)\n      Your avatar cries that this keeps happening, that it never ends.\n    *if (ReplayCounter = 4)\n      Your avatar sobs that they can't stop it. Your avatar asks for it to stop.\n    *if (ReplayCounter > 4)\n      Your avatar regards Elegy with deadened eyes and says nothing.\n    Retry?\n    *return\n\n  #Give up. It's not winnable.\n    *label GiveUp\n    They never intended for you to win.\n    *if (ReplayCounter > 3)\n      Otherwise, you'd have gotten it after this many replays.\n    They just wanted you to get wrapped up in the hopelessness of it all, to tell the story of the never-ending time loop. It's a bad ending. It'll always be a bad ending. It's why they were so cagey discussing it, why they're so focused on the importance of having a game with a message. They were perfectly satisfied to punch you in the gut multiple times and never give you a real resolution.\n\n*label GameOver\n\nYou power down and take the time off to take care of other self-maintenance errands. You get your dose of artificial sun. You work out to keep your muscles from atrophying, you trim your hair. You even get bored enough to help with the repair tasks.\n\nThere are reports, debriefings with higher Spacejoy representatives: they seem keenly interested in the meteoroid mishap. How exactly did it happen?\n\n*fake_choice\n  #Implicate Maselle.\n    They thank you for your side of the story, but it doesn't seem like they'll be able to do anything special with the information any time soon. You're sure that the evidence will bear it out, but it will probably take awhile. They thank you for your candor: it is not very easy to disagree with a superior. They schedule a disciplinary review for the next shuttle back. You hope that it will be permanent, once they see the paper trail.\n\n  #Reiterate the panicked guest story.\n    They thank you for admitting the truth, and agree that with the given evidence of the time, it was a rational decision to make. You're not sure if the evidence will bear it out, but you don't think that they'll look into this version of events all that deeply. They thank you for your time.\n\n  #Insist that it was your fault.\n    They thank you for admitting the truth, but ask that you not be so hard on yourself. They assure you that with the given evidence of the time, it was a rational decision to make. They thank you for your time.\n\n  #Plead ignorance.\n    They seem a little exasperated, and subtly question whether your are qualified for your current position, but they don't go so far as to recall you for a disciplinary review. Just mark you as un-advanceable and ineligible for raises or bonuses. You try to fight off the creeping feeling that you deserve it, but then again, maybe you do. At any rate, they thank you for your time. You'll probably be transferred to another base. Which is just fine with you. As is, the job already pays well enough, and in a few years you were going to cash out anyway.\n\nNearly a week later, you finally have internet access. It's a bit moot at this point, but you're curious about that [i]Creatures[/i] ending. Is your experience unique? Is it really unwinnable?\n\n*label InternetStart\n\n*choice\n  *disable_reuse #Look up the ending to [i]Creatures[/i].\n    *set GameChecked true\n    The internet confirms it: there's no way to get a good ending. Your character just goes deeper and deeper into depression about being stuck in the loop, being unable to find a solution. Fans are pretty furious about it, actually. A few places, here are there, are scattered theories about there being a way around it, but there's nothing verifiable.\n    *goto InternetStart\n\n  #Check your mail.\n    *goto MailCheck\n\n  *disable_reuse #See if anything happened with the acquisition.\n    *set AffectionChecked true\n    From what you can tell, the merger seems to be on track, at least according to unofficial rumors. There are conspiracies regarding a secret project between the two companies, but not even anyone on the internet has any idea what it could be about. Well, you're happy for ${MaxAffectionTarget} at least. This will be a good move for ${AffectionTarget_zim}, and ${AffectionTarget_zhe} definitely deserved to be happy.\n    *if (AffectionLove = true)\n      You just wish that you could have gotten to know ${AffectionTarget_zim} better, even though it wouldn't really have had a chance to go anywhere.\n    *goto InternetStart\n\n*label MailCheck\nYou've got a message from ${MaxAffectionTarget}. You open it immediately:\n\nHey ${Name},\n\n*comment WILL MAIL\n*if (MaxAffectionTarget = \"Andres\")\n\n  Betcha didn't think you'd hear from me again, what with all the security hubbub, but I wanted to send you a quick thanks. Not sure if you've heard, but Cullected is joining up with Synthplay. I'll still be in charge, of course, but it's largely ceremonial at this point.\n  *if ((SynthSupported = false) and (SynthHated = false))\n    I guess I'll miss the old structure, but you can never stand still, right?\n  *if (SynthSupported = true)\n    I know you thought it would be a good idea, and that helped. You never can stand still, right?\n  *if (SynthHated = true)\n    I know you thought it wouldn't be the be the best move, but you never can stand still, right?\n  Anyway, I don't want to get bogged down in all that.\n\n  *if (GameChecked = true)\n    I'm sure you've read up by now the fact that there's no \"good\" ending to [i]Creatures[/i], but I wanted to let you into our alpha \"fix\" of that scene.\n  *if (GameChecked = false)\n    I'm sure you've played through enough times by now to figure out that there's no \"good\" ending to [i]Creatures[/i], but I wanted to let you into our alpha \"fix\" of that scene.\n  It''ll be released in tandem with the official announcement of the Synthplay merge. It'll be an example of the gameplay technology that more funding gets us. My idea. Well, the marketing timing, at least. Anyway, I thought that hooking you up with an alpha key was the least I could do, as a thank you. Let me know if you think it's any fun; I've come to respect your opinion.\n  *if (AffectionLove = false)\n    Thanks! Email back.\n  *if (AffectionLove = true)\n\n    So definitely write back! It's obviously not the same as seeing each other in person, but, you know, I'd still enjoy chatting with you. Also, do you play any online games? Maybe we could play some co-op sometime. Or figure something else out. I definitely enjoyed getting to know you, and terran life seems a little bit boring without you. Let me know.\n\n*comment DIANA MAIL\n*if (MaxAffectionTarget = \"Diana\")\n\n  I'm sure you didn't think you'd get to hear from me again, after they spirited us away so quickly. Not sure if you've heard, but Cullected is joining up with Synthplay. I actually get to be in charge of a team of writers. A whole team! I've promised to be a benevolent dictator.\n  *if ((SynthSupported = false) and (SynthHated = false))\n    I guess I'll miss the old structure, but you can never stand still, right?\n  *if (SynthSupported = true)\n    I know you thought it would be a good idea, and that helped. You never can stand still, right?\n  *if (SynthHated = true)\n    I know you thought it wouldn't be the be the best move, b e} writes in, \"But for now…got time to play?\"\n\n*choice\n  #\"I'd love to.\"\n    *goto PlayTime\n  #\"It'd be fun to.\"\n    *goto PlayTime\n  #\"No, thanks.\"\n    *goto NoPlay\n  #\"I'd really rather not.\"\n    *label NoPlay\n    You close the chat window, and that chapter in your life. It's time to move on, move forward. Keep yourself focused on who you are and where you're going. You breathe in, breathe out. You enjoy your time. You do the things you love, that make you happy, on your own time. And that's what makes the vastness bearable.\n\n    *goto EndForReal\n\n*label PlayTime\n\nYou meet up with ${AffectionTarget_zir} zombie avatar, and fight together against hordes of Traditionalists. It's here in multiplayer mode that the gameplay becomes more open-ended and less story-driven. You two just enjoy melting faces for several levels. It's a lot of fun, but each checkpoint makes you painfully aware of how few hours you have left of internet time.\n*if (AffectionLove = true)\n  You reach a rest zone in the public park, and ${AffectionTarget_zhe} types \"wait\" as ${AffectionTarget_zir} avatar sits down. You move your own avatar next to ${AffectionTarget_zim}. You take the time to rotate the camera around, enjoying the beautifully bright blue sky, the crisp, waving greenery, the sounds of terran life. It's beautiful. You wish it didn't have to end. \n\n  $!{AffectionTarget_zhe} types out, \"It just hit me that I'm playing with someone on the moon. Man, how far things have come. It feels like you're right here with me. Like I could just reach out and touch you. That feel weird to you?\"\n\n  *choice\n    #\"I'm just enjoying being with you.\"\n      *goto RomanticGame\n    #\"It's strange, but I like it.\"\n      *goto RomanticGame\n    #\"I'd rather be with you, for real.\"\n      *label RomanticGame\n      $!{AffectionTarget_zhe} inches ${AffectionTarget_zir} avatar closer to yours, \"Yeah. I agree.\" ${MaxAffectionTarget}'s avatar performs a hug on yours,
