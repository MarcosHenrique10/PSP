*goto IsThatIt\n  #No. I think I'll stick with the ending I got.\n    It's refreshing, actually, that you're willing to accept the ending as it was. \n\n    I personally think that it's okay for some things to stay unresolved, that it's okay for some things to come out a bit messy, to think about how things could have gone better, while accepting things as they are, and I'm glad that you agree.\n\n    Thank you for understanding. Thank you so much for playing.\n    *goto FinalEnd\n\n*label IsThatIt\n\n*if (AffectionLove = true)\n  (You can pick multiple objectives. And if you want a better romance, you have to return to Earth first.)\n*if (AffectionLove = false)\n  (You can pick multiple objectives.)\n\n*label FinalObjectives\n\n*set ChangesMade +1\n\n*choice\n  *disable_reuse #I want Maselle fired.\n    You take your grievances up to the top brass of Spacejoy. The paper trail backs up your story, and the other employees corroborate on top of that. It turns out they weren't too happy either with how Maselle ran things, and that made for a poor work environment for everyone.\n\n    Maselle undergoes an official reprimand. Which, you have on good authority, she flubbed so badly they had to let her go. There's a few jokes about the \"mutiny\" being successful, but truth be told, Maselle's replacement is improves the morale of Moonbase 14 significantly.\n\n    *goto FinalObjectives\n\n  *disable_reuse #I want to quit my job.\n    *set QuitJob true\n    Spacejoy offers you an overly-generous severance package for all your difficulty, along with glowing letters of recommendation. It's clear that they're going above and beyond to make sure that you're happy with the outcome. While they never ask for it in writing, it's clear that they're not interested in you going public about this little incident. Of course, there's nothing stopping you from doing so, and you even turn the idea over in your head. Maybe you'll meet with a lawyer later, just to bounce the idea around. Or to be absolutely certain this isn't repeated with anyone else.\n\n    *if (Earthbound = false)\n      *set ChangesMade +1\n      You're given the next flight back to Earth.\n      *goto BacktoEarth\n\n    *goto FinalObjectives\n\n  *selectable_if (Earthbound = false) #I want to go back to Earth.\n    *label BacktoEarth\n    *set Earthbound true\n    The gravity back planetside is much more intense than you remember. Your body feels heavy and sluggish, like bags of water strapped to every body part, and even breathing feels strange. You take a few days of bed rest until you stop feeling dizzy, and get a temporary cane to help for the next few weeks. The bed rest was helpful for more than just acclimating back to Earth's gravity. There was something else you weren't expecting to find unsettling.\n\n    The openness of everything. How you can step outside and just breathe in blue sky. How you can go out whenever you want: to get food or drink or any other sort of entertainment. So many possibilities. And you're the one in charge of all of them. No more structured times, structured activities, schedules, and no more limited options. You're free to do whatever you want. It's both liberating and overwhelming all at once.\n\n    *if (QuitJob = false)\n      Spacejoy offers you a cushy earthbound job. If you want it, that is.\n\n    *goto FinalObjectives\n\n  *if (Earthbound = true)\n    *if (AffectionLove = true)\n      *disable_reuse #I want to be in a real relationship with ${MaxAffectionTarget}.\n        $!{MaxAffectionTarget} smiles when ${AffectionTarget_zhe} sees you again. \"Couldn't keep away? I'll be honest. I'm glad. The thought of you being up there, with me stuck down here, and a part of me hated the thought of that separation. But I couldn't ask you to quit your job for me. For someone you just met? That'd be too much.\"\n\n        $!{AffectionTarget_zhe} pulls you in closer. You can feel ${AffectionTarget_zir} warmth, smell ${AffectionTarget_zir} hair. \"But I'm so glad you came down. I feel so lucky that I get to be with you. That we get a real shot at this thing.\" $!{AffectionTarget_zhe} tilts ${AffectionTarget_zir} head, \"I'm so glad things worked out how they did.\"\n\n        There's a pause as you can see ${MaxAffectionTarget}'s eyes steady on yours, glance down at your lips, then back up to your eyes. You give a small smile and pull ${AffectionTarget_zim} in slowly for a kiss. The sensation of contact, of finally being together, nearly knocks you off balance and ${MaxAffectionTarget} helps prop you up, \"Careful now. Gravity...\" but ${AffectionTarget_zhe} doesn't get to finish ${AffectionTarget_zir} sentence as you silence them with another, fuller kiss. This one well-coordinated, and lasting almost longer than you'd think possible. Even after it's over, neither of you speak, just lean against each other, holding each other close. This is what you've wanted.\n\n        *goto FinalObjectives\n\n    *else\n      *disable_reuse #I want to be closer friends with ${MaxAffectionTarget}.\n        $!{MaxAffectionTarget} grins when ${AffectionTarget_zhe} sees you again, \"$!{Name}. My own personal hero.\" $!{AffectionTarget_Zhe} tries to keep ${AffectionTarget_zir} voice light, but you can hear it cracking. \"I'm really glad that you game down. I'm really glad I got to see you again.\"\n\n        $!{AffectionTarget_zhe} wipes ${AffectionTarget_zir} face, \"I've been thinking a lot about what happened up there. About how close things got. About all the things you've said. And I realized how important, how amazing it was to have someone like you in my life. Someone who understands and cares about me like you do.\" $!{AffectionTarget_zhe} smiles, deep crinkles in ${AffectionTarget_zir} eyes, \"And someone with such interesting thoughts and perspectives.\"\n\n        $!{MaxAffectionTarget} nods at your cane. \"I knew it would be hard for you, coming back, but I'm so glad you did. I knew I couldn't ask you to come down. I didn't have any right to that, as a friend you met on your tour. I honestly wasn't sure if you really cared about me, or if you were just really good at doing your job as a professional. But I'm glad to know there was more to it. And I'm glad that we'll be able to spend some time together.\" You smile and agree. You know that things are definitely going to be okay.\n\n        *goto FinalObjectives\n\n  *if (ChangesMade = 0) #I'm okay with things as they are.\n    Maybe it's okay that some things didn't go perfectly, that some things didn't get resolved. Sometimes that's just how life is.\n\n    Thank you for understanding. Or at least, for accepting things as they were. Thank you so much for playing.\n\n    *goto FinalEnd\n\n  *if (ChangesMade = 5) #I've got everything I want now.\n    Everything is as it should be. You're happy. The world makes sense. This is everything you've ever wanted. You can finally take a breath, relax, and just be happy.\n\n    And I am happy I was able to give you that. Thanks for playing!\n\n    *goto FinalEnd\n\n  *if ((ChangesMade > 0) and (ChangesMade \u003c 5)) #I've changed enough.\n    Things have come together, just how you wanted them to. Maybe not everything got fixed, but it's okay if not everything is perfect. But it's sometimes just nice to have some things go your way.\n\n    I'm happy I was able to make things better for you. Thanks for playing!\n\n    *goto FinalEnd\n\n*label FinalEnd\n\n*page_break End\n\nWe hope you've enjoyed playing [i]Creatures Such as We.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "path-evacuate": "*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Come back in a few minutes to play the final part of [i]Creatures Such as We[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n  *delay_break 1200\n\n*label purchased\n\n*comment Fourteenth part of the game\n\n*temp WorkersIgnored false\n*temp craterInfo \"none\"\n*temp sentback false\n\n*temp midwayMultiplier\n*rand midwayMultiplier 7 11\n*temp midwayTimeLeft (midwayMultiplier*5)\n\n*temp multiplier\n*rand multiplier 3 7\n*temp timeLeft (multiplier*5)\n\n*comment cut material\n*comment *if (Evacuate = false)\n*comment  *goto_scene path-bunker\n\n*comment *goto skip-ahead\n\nThey take the news better than you expected. James looks contemplatively out into space. Sadri and Diana just stare at you, mouths agape; Grant nods and smiles meekly to mask his mounting panic. Ren, strangely enough, seems completely unaffected.\n\nAndres attempts to get control of the situation by blustering at you, \"Now hold on a minute! If there are meteors falling on us, isn't going outside the worst thing we can do? I think we should stay right here and wait it out!\" You can almost see the mutiny in his eyes. They are going to revolt, and then the whole emergency is going to be painted as your fault. But you still have a chance to reassert control of the situation. You focus on allaying their fears:\n\n*fake_choice\n  #\"The meteoroid warning has passed.\"\n    James interjects confidently, \"Actually, that makes sense. It would have been part of a larger asteroid or something that's now long gone.\" \n\n    You jump on his clarification, \"Exactly right!\" Everyone else visibly relaxes, satisfied that even QA agrees with your plan.\n\n  #\"It's actually much safer in a suit than a building.\"\n    James interjects confidently, \"Actually, that makes sense. Has to do with vulnerable surface area, right?\"\n\n    You jump on his clarification, \"Exactly right!\" Everyone else visibly relaxes, satisfied that even QA agrees with your plan.\n\n  #\"It's the fastest way to get you home.\"\n    James interjects confidently, \"Actually, that makes sense. There might be extra difficulties to landing here now. It'd be better to use another facility.\" \n\n    You jump on his clarification, \"Exactly right!\" Everyone else visibly relaxes, satisfied that even QA agrees with your plan.\n\n  #\"Now is not the time to argue.\"\n    This prompts James into channeled action, \"Actually, now is exactly the time to argue. We can't just assume that what you're telling us is the best; you need someone to check your facts.\"\n\n    *if (MaxAffectionTarget = \"Sadri\")\n      Sadri fixes you with a determined stare, \"James, well, he gets upset sometimes, but I agree with him. For now, though: James, can you find any flaw in this path? If not, I think, well, then let's follow it.\" James scowls at Sadri but he doesn't voice any specific objections. Thank goodness. This is getting too edgy for your liking. You need to pull it all together.\n\n    *if (MaxAffectionTarget != \"Sadri\")\n      Ren fixes you with an over-the-glasses stare, \"James gets upset sometimes, but I agree with him. For now, though: James, can you find any flaw in this path? If not, let's go along with it.\" James scowls at Ren but he doesn't voice any specific objections. That's a relief.\n\nYou slide back into your smiling, assertive stance, and solidify your authority, \"Great then, it's settled! We will make the walk over to Spacejoy's MoonBase 12.\"\n\n*if (MaxAffectionTarget = \"Sadri\")\n  Ren\n*if (MaxAffectionTarget != \"Sadri\")\n  Sadri\nspeaks up, \"Yes, but what about the workers here? Do they not get to evacuate?\"\n\n*label WorkersStart\n\n*fake_choice\n  #\"As our guests, you're our first priority.\"\n    *goto WorkersOK\n  #\"They'll stay behind and wait for rescue.\"\n    *goto WorkersOK\n  #\"They'll stay behind and wait for repairs.\"\n    *label WorkersOK\n    This seems to satisfy\n    *if (MaxAffectionTarget = \"Sadri\")\n      Ren\n    *if (MaxAffectionTarget != \"Sadri\")\n      Sadri\n    who mumbles out an, \"Oh, okay. I can see that.\" You expected more of an argument, but then again, you suspect that she doesn't actually want to question her privilege too deeply. At least she had the presence to ask.\n    *goto WorkersMerge\n\n  *hide_reuse #\"Let's just focus on getting you out safely.\"\n    This ignites\n    *if (MaxAffectionTarget = \"Sadri\")\n      Ren\n    *if (MaxAffectionTarget != \"Sadri\")\n      Sadri\n    into insistence, \"No. What about their safety? Are we leaving people to die?\"\n\n    You can't really deal with this right now.\n    *set WorkersIgnored true\n    *goto WorkersStart\n\n  *if (WorkersIgnored = true) #\"We really should focus on your safety.\"\n    *if (MaxAffectionTarget = \"Sadri\")\n      Ren\n    *if (MaxAffectionTarget != \"Sadri\")\n      Sadri\n    stares at you, looking like she's going to square off over it, \"I guess.\" Oh, that's it. Apparently, she doesn't want to continue pushing the issue, but it still doesn't feel like you've really won over her confidence. And it's not the best time to have them distrusting you. You focus on moving on.\n    *if (MaxAffectionTarget = \"Sadri\")\n      *set AffectionLove false\n    *goto WorkersMerge\n\n*Label WorkersMerge\n\nYou herd them with outstretched hands, \"Let's start making our way to the suit room. We'll have to take an auxiliary passageway, so please don't mind the mess.\" You look at Ren with her device, \"Oh, and please no pictures.\"\n\nThey're all silent through the whole journey through the unpainted, metal service passages. It's not until they're being suited up that they start mumbling among themselves. The initial shock is wearing off, about to be replaced with another emotion. You need it to be trust. You turn to address the group.\n\n*fake_choice\n  #Matter-of-fact guidance.\n    You gather their attention, \"Spacejoy has multiple facilities, intentionally close together. We'll be walking over to another resort to use their shuttle to get you home as quickly as possible. \n\n    \"We're on the dark side of the moon, so once we leave the perimeter, we'll be relying on helmet lights. There's plenty of extra oxygen. Myself and several stewards will escort you.\"\n\n  #Encouraging guidance.\n    You gather their attention, \"Spacejoy has multiple facilities, intentionally close together. We'll be walking over to another resort to use their shuttle to get you home as quickly as possible.\n\n    \"We're on the dark side of the moon, so once we leave the perimeter, we'll be relying on helmet lights. There's plenty of extra oxygen. Myself and several stewards will be there to escort you. I know that we can do this: you'll all be great. Don't worry; we'll get you back to safety soon. Thank you! Now, are there any questions?\"\n\n  #Relaxing guidance.\n    You gather their attention, \"Spacejoy has multiple facilities, intentionally close together. We'll be walking over to another resort to use their shuttle to get you home as quickly as possible.\n\n    \"We're on the dark side of the moon, so once we leave the perimeter, we'll be relying on helmet lights. There's plenty of extra oxygen. Myself and several stewards will be right there with you the whole way. It should be a simple cakewalk. Now, are there any questions?\" \n\n  #Regretful guidance.\n    You gather their attention, \"I just wanted to say really quickly how sorry I am that your stay here had to end so abruptly, and on such a stressful note. Now, Spacejoy has multiple facilities, intentionally close together. We'll be walking over to another resort to use their shuttle to get you home as quickly as possible. \n\n    \"We're on the dark side of the moon, so once we leave the perimeter, we'll be relying on helmet lights. There's plenty of extra oxygen. Myself and several stewards will be there escorting you. And once again, I'm so sorry. Now, are there any questions?\" \n\nThey have none. They just look at you, sedated. Do they trust you? Well, they're going along with you, at least. You just hope it holds. James attempts to cut through the gloom by making some crack about lawsuits. You ignore it. Lawsuits are probably a reality at this point, but best not to admit it. You give an icy, non-committal smile in reply, but luckily nobody else finds the joke amusing or interesting. You thank the stewards who have just finished suiting you up.\n\n${MaxAffectionTarget} approaches you, eyes flitting about nervously, \"Hey, listen, I'm worried about, well, you know, freaking out again. What if something happens to me out there? What if I don't make it?\" \n\n*choice\n  #\"Don't worry, I'll supervise you.\"\n    This definitely reassures ${AffectionTarget_zim}. $!{AffectionTarget_zhe} smiles, \"Hey, I'm glad to know you've got my back. Who better?\"\n    *goto WorryMerge\n\n  #\"Don't worry, we're all here.\"\n    This seems to slight reassure ${AffectionTarget_zim}. $!{AffectionTarget_zhe} smiles halfheartedly, \"Misery loves company, right?\"\n    *goto WorryMerge\n\n  #\"Don't worry, I know you can do it.\"\n    This definitely reassures ${AffectionTarget_zim}. $!{AffectionTarget_zhe} smiles, \"Hey, it help to know that you've got my back. Who better?\"\n    *goto WorryMerge\n\n  *if (MaxAffectionTarget != \"Grant\") #\"Maybe you should stay behind?\"\n    $!{AffectionTarget_zhe} frowns, \"Well, I appreciate that concern, but I really don't want to be singled out like that, just shoved aside. I'd rather go with the group. Just could have used some reassurance. That's all.\" $!{AffectionTarget_zhe} leaves to get a helmet.\n    *goto WorryMerge\n\n  *if (MaxAffectionTarget = \"Grant\") #\"We really can't leave you behind.\"\n    $!{AffectionTarget_zhe} frowns, \"Well, I appreciate the concern, but that doesn't really make me feel any more comfortable about the situation. Just could have used some reassurance. That's all.\" $!{AffectionTarget_zhe} leaves to get a helmet.\n    *goto WorryMerge\n\n*label WorryMerge\n\nFive minutes later and you're leading everyone into the airlock. It's like walking through molasses. There's no buzz of anticipation, no excitement for exploration. They're facing the real unknown this time, and it's terrifying. Dread fills the room as air is sucked out of it.\n\nYou direct everyone to turn on their helmet lights, and as you pass the threshold of the field lights, you notice oxygen use spike, then level. They're probably thinking they'd prefer to be on the bright side of the moon, but it's actually much more dangerous. Seeing the looming Earth causes vertigo and disorientation. Some people have gotten lost and died just hundreds of yards away from their base doors. The darkness actually helps keep you grounded.\n\n*fake_choice\n  #Verbally check in with everyone.\n    Everyone sounds off, just their name. Nobody seems much in the mood to chat.\n\n  #Scroll through their oxygen levels.\n    Everyone has two hours, forty-five minutes left of oxygen, give or take. Nobody says anything to anyone for a long time.\n\n  #Scroll through their energy levels.\n    You check through the levels. They all seem acceptable so far: no energy leaks. Nobody says anything to anyone for a long time.\n\n  #Let things be.\n    Nobody says anything to anyone for a long time. Their breathing rate slowly increases.\n\nOut of nowhere, Diana laughs raucously and posits, \"Wouldn't it be nice if we could just die and respawn back on Earth?\"\n\nGrant sounds taken aback at this interjection, \"What, you mean like, in a video game?\"\n\nJames laughs, joining in, \"But that respawn point's too far away! Too long of a taxi trip, what are you thinking?\"\n\n*choice\n  #\"I think you want a teleport button instead.\"\n    *goto ActuallyYesRespawn\n  #\"Or how about just a portal?\"\n    *label ActuallyYesRespawn\n    Sadri jumps in, \"No, I agree with Diana. A respawn would be better: that way, no matter what happened, you would definitely be safe.\"\n\n    Andres whips his helmet light around to look at the group, \"I love how crazy you all are.\"\n\n    Ren keeps her beam focused straight ahead while responding, \"I agree. Respawn. It would be nice to beat death.\"\n\n    *fake_choice\n      #\"But think about the travel convenience!\"\n        You argue it through, \"You know, every day, no commute? Ridiculously fresh food?\"\n\n        James takes things in a different direction, \"If you're really trying to save yourself time, why not ask for sleep to be unnecessary? I know I'd sure like to get those eight hours back.\"\n\n        Andres pokes fun at him, \"Yeah, but then what if you want to spend a night with someone?\"\n\n        *fake_choice\n          #\"No sleep? Sounds like a plus to me.\"\n          #\"You just lay down and stare at each other awkwardly for the rest of the night.\"\n          #\"You pretend to sleep, to be polite.\"\n          #\"I guess you get up and watch cat videos afterward.\"\n\n        *if (AffectionLove = true)\n          ${MaxAffectionTarget} titters, \"Sounds like you'd be in for one super amazing night!\"\n\n        *if (AffectionLove = false)\n          Everyone laughs. You're relieved that their spirits are high enough to do so.\n\n        *goto MidPointMerge\n\n      #\"What about restore points?\"\n        James argues against it, \"But a restore point wouldn't extend your life in any meaningful way. From your internal viewpoint, you'd still have exactly the same lifespan.\"\n\n        Andres pokes fun at him, \"You're really saying you wouldn't like the chance to go back and fix your mistakes?\"\n\n        *fake_choice\n          #\"I know my life's been perfect.\"\n            Everyone laughs. ${MaxAffectionTarget} adds, \"No argument here!\"\n          #\"I think it would paralyze people with self-doubt.\"\n            ${MaxAffectionTarget} concedes your point, \"Yeah, I guess it would make things tough, always second-guessing yourself.\"\n          #\"You wouldn't be the same person without your mistakes.\"\n            ${MaxAffectionTarget} concedes your point, \"Yeah, I guess, how else would you become a better person?\"\n          #\"But you wouldn't even remember that you had made a mistake to fix.\"\n            ${MaxAffectionTarget} concedes your point, \"Yeah, I guess you'd just end up in an infinite loop. Creepy.\"\n\n        *goto MidPointMerge\n\n      #\"Everyone wishes they could beat death.\"\n        James laughs, \"What makes you think I won't?\"\n\n        Andres pokes fun at him, \"You gonna file a bug report on the fact that humans don't last long enough?\"\n        *goto ImmortalMerge\n\n      #\"Then why not just be immortal?\"\n        James laughs, \"What makes you think I'm not?\"\n\n        Andres pokes fun at him, \"Well, you gonna keep your secret to eternal life to yourself, or you gonna share?\"\n        *goto ImmortalMerge\n\n\n  #\"Why not just re-roll?\"\n      James laughs, \"What, and start over from level one?\"\n\n      Andres pokes fun at him, \"You really think you're anywhere close to max level?\"\n\n      *fake_choice\n        #\"I know my life's perfect.\"\n          Everyone laughs. ${MaxAffectionTarget} adds, \"Yeah, no argument here!\"\n        #\"I know I've at least maxed out the appropriate skills.\"\n          ${MaxAffectionTarget} laughs and adds, \"I'd love to hear which skills you're referring to.\"\n        #\"I wouldn't mind getting to sample different experiences.\"\n          ${MaxAffectionTarget} concedes your point, \"Yeah, I guess it would be interesting getting out of yourself, seeing things from different perspectives.\"\n        #\"I think constantly restarting would be paralyzing.\"\n          ${MaxAffectionTarget} concedes your point, \"Yeah, I guess you'd just end up in an infinite loop. Creepy.\"\n\n      *goto MidPointMerge\n\n  #\"But isn't a respawn just a clone?\"\n    James jumps onto the comm before you even finish your sentence, \"Yes! Finally! Someone else agrees! It does [i]me[/i] no good to have some clone running around: I'd still be dead!\"\n\n    Andres pokes fun at him, \"Yeah, but the rest of us would still have to deal with your replacement.\"\n\n    Diana chimes in, \"I think he just wants plain old immortality. How dull.\"\n\n    *label ImmortalMerge\n\n    *fake_choice\n      #\"I would love to be immortal.\"\n        ${MaxAffectionTarget} sighs, \"I know what you mean. I think it appeals to everyone.\"\n\n      #\"I wouldn't mind just a few hundred extra years.\"\n        ${MaxAffectionTarget} sighs, \"I know what you mean. Just enough time to get your life in order.\"\n\n      #\"The search for immortality never goes well.\"\n        ${MaxAffectionTarget} sighs, \"It's a complicated issue.\"\n\n      #\"I've come to grips with dying.\"\n        ${MaxAffectionTarget} sighs, \"I am jealous. I wish I had that certainty.\"\n\n    *goto MidPointMerge\n\n  #\"We should really focus on conserving oxygen.\"\n    You get a scattering of mumbles from the group. It makes the journey more stressful, but they don't drain oxygen as quickly from the inefficient sucking in and spitting out of words. You and everyone else continue bouncing along the plains at a constant rate. You're making good time.\n    *goto CraterMerge\n\n*label MidPointMerge\n\nYou take a break to cycle through everyone's oxygen and energy levels: their numbers look good. They're progressing at a better rate than you had hoped. Of course, it helps that the terrain is flat and even. The chatter is doing them good, and you're making good time.\n\n*label CraterMerge\n\nThen it appears at the forward edge of your light: a huge crater. It must be new, from the meteoroid storm. You walk up to it, peering down. Estimating by the depth, it must be at least half a kilometer wide, but you can't see the edges from here. You'll have to go around, but you'll lose time, and you have no idea just how much time. Perfect. And of course.\n\n*fake_choice\n  #Detail the new plan: going around it.\n    You turn around, and all the helmet lights focus on you. You ignore the glare, \"We're going to have to go around this crater, which will be a small extra delay, but it shouldn't take that long. And by the time we're around it we should be most of the way there. Stay away from the edges.\" Their oxygen use spikes. It's definitely draining faster that you're comfortable with. You lead them around one of the sides.\n\n  #Pretend like this was always here.\n    You don't even slow down to explain it, \"We're going to have to go around this crater, but by the time we're around it we should be most of the way there. Stay away from the edges.\" Their oxygen use increases a bit, but quickly levels back out. You lead them around one of the sides.\n\n  #Don't even acknowledge the crater.\n    You don't even slow down to explain it, only throwing in as afterthought, \"Avoid the edges.\" Their oxygen use increases a bit, but levels back out fairly quickly. You lead them around one of the sides.\n\n  #Try to scout the better route before sending them ahead.\n    You turn around, and all the helmet lights focus on you. You ignore the glare, \"This is new. I'm going to check the route just to make sure that it's safe.\" \n\n    There's a small oxygen spike, then it levels out, but the major oxygen drain from this will be the extra waiting time. You discover nothing untoward along the south route, so you lead everyone down that way. They seem to appreciate you being thorough, but their oxygen levels are now much lower than you're comfortable with.\n\nDiana's headlamp illuminates down into the crater, \"Can you even imagine? The slow death from falling into that crater, being unable to climb out? Sitting down and just waiting for your oxygen to run out. Or maybe opening your own suit to end it faster.\"\n\nJames seems unimpressed, \"You could totally just jump out.\"\n\nSadri seems to shiver in her suit, \"I don't think I'd like to try it.\"\n\n*choice\n  #Tell the truth: it's too steep to climb out of.\n    *set CraterInfo \"truth\"\n    This silences them for awhile, but their oxygen use hits a plateau for much longer than you're comfortable with.\n    *goto CraterInfoMerge\n\n  #Encourage them not to fall in.\n    They certainly don't need you to tell them twice, and, happily, there's not really any change in oxygen use.\n    *goto CraterInfoMerge\n\n  #Describe rescue procedures.\n    Their oxygen use steadily climbs as you describe the electric ladders and digging tools designed to help pull moon walkers out of craters. They don't seem very reassured by the facts.\n    *goto CraterInfoMerge\n\n  #Lie: Tell them that you could jump out.\n    *set CraterInfo \"lie\"\n    This comforts them, and their oxygen use actually slows. \n    *goto CraterInfoMerge\n\n*label CraterInfoMerge\nYou check on their resources: 1 hour, ${midwayTimeLeft} minutes of oxygen left. That's not the best time, but then again tourists always shamble.\n\nRen fixates on the crater as well, \"It looks bottomless from up here. I mean, without the light to see down into it. Just this terrifying, empty blackness.\"\n\nAndres's voice cracks over the comm, \"I won't lie, it's scaring the shit out of me. Like, what if something came out of it?\"\n\nSadri teases him, \"I think you've worked too much on zombie games.\"\n\nBut then it happens. Your feet feel a small tremor of movement and ${MaxAffectionTarget} shouts. You flip around, and count: one fewer tourist. Everyone's oxygen use goes crazy, yours included. ${MaxAffectionTarget} is missing. $!{AffectionTarget_zhe} must've fallen down.\n\n*temp EdgeCounter 0\n*comment This tracks how many options you've gone through when checking out the person stuck below.\n\n*label EdgeStart\n\n*if (EdgeCounter = 1)\n  *if (CraterInfo = \"lie\")\n    ${MaxAffectionTarget} attempts to scramble back up, then starts crying when it fails, \"I thought, I thought you said, that, you could, that I could get back up, but I'm stuck, it, it keeps, the sand, and it's too steep, and I can't do it, and I'm going to die.\" $!{AffectionTarget_zhe} trails off into a sobbing, shallow breathing fit.\n\n  *if (CraterInfo = \"truth\")\n    ${MaxAffectionTarget} doesn't even attempt to climb back up, sputtering out \"You said, that, you said that, there wasn't a way out, that I couldn't get back up, and I'm stuck, it, and I can't do it, and I'm going to die. Just sit down here and die.\" ${AffectionTarget_zhe} trails off into a sobbing, shallow breathing fit.\n\n*if (EdgeCounter = 2)\n  ${Villain} speaks up for the silent group, \"Are…are you going to save ${AffectionTarget_zim}?\" Your mind racks. You obviously need to save ${AffectionTarget_zim}, but the rest of the group shouldn't linger. They'll drain their oxygen while they gawk.\n\n*if (EdgeCounter = 3)\n  ${MaxAffectionTarget} sniffles, \"Please, don't let me die.\"\n\n*if (EdgeCounter = 4)\n  *goto RescueStart\n\n*set EdgeCounter +1\n\n*choice\n  *disable_reuse #Order everyone back.\n    They're all crowding around the edge, threatening to fall in themselves, \"Get back!\" You shout with all the authority that you can, \"I do not want anyone else to fall in as well!\" They oblige you. Good, at least they still trust you. Or maybe they just see the logic in your order. But you can't afford to second-guess yourself. You need to focus.\n    *goto EdgeStart\n\n  *disable_reuse #Look over the lip.\n    You turn your beam wide, then concentrated. ${MaxAffectionTarget} is staring back up at you, waving furiously. Well, that's good. That's definitely something, at least.\n    *goto EdgeStart\n\n  *disable_reuse #Check for damage.\n    You switch to ${AffectionTarget_zir} readout. You got lucky: the suit's fine and didn't even register any damage. Of course, there is an oxygen use warning, but that's from the hyperventilating. You mentally remind yourself to focus on controlling your own breathing pattern.\n    *goto EdgeStart\n\n  *disable_reuse #Talk to ${MaxAffectionTarget}.\n    You open a private channel, \"Hey, are you okay? Can you speak to me: slowly, calmly? Tell me your name? And what's my name?\"\n\n    $!{AffectionTarget_zhe} fights against the shallow, rapid breaths, \"Yeah…yeah…yeah…${MaxAffectionTarget}. And ${Name}.\"\n    *goto EdgeStart\n\n  #Figure this out.\n    *goto RescueStart\n\n*label RescueStart\n\nAs you try to focus on what to do next, your brain insists on dwelling on how it went wrong. How it's your responsibility. Your fault. There's not enough time to return with a crane, or even a ladder. You didn't have the foresight to bring one. There's not even any extra oxygen tanks. Because who didn't even think about that? You're going to have a tourist die on your watch. You will be unhireable. Maybe even arrested.\n\n*fake_choice\n  #I should have given the crater a wider berth.\n  #I should have been more explicit about avoiding the crater.\n  #I should have never agreed to an evacuation.\n  #It wasn't my fault.\n    But of course it was. You were in charge. You should have been better.\n\n*label YourFault\n${Villain} prods you out of your self-examination spiral, \"What are you going to do?\" You steel yourself. You're the best of the best. You're not going to let this get out of hand.\n\n*temp LadderAsk false\n\n*choice\n  #Ask everyone else to continue ahead while you take care of this.\n    The surge of clarifying adrenaline strengthens your voice as you address the group, \"Okay people, here's what's going to happen. You all are going to go with the rest of the stewards on to the MoonBase ahead. I will stay behind and rescue ${MaxAffectionTarget}.\" \n\n    You take a deep breath. Will they trust you? Have you built up enough goodwill that they'll follow your directions? \n\n    They oblige you. They trust you. It's a surprising relief. One less thing to worry about.\n    *goto ContinueMerge\n\n  #Radio for equipment in case your rescue attempt fails.\n    *set LadderAsk true\n    You open a private channel between the stewards, asking one of them to go back for a ladder. He starts bounding away in obligation. You feel the surge of clarifying adrenaline as you address the group, \"Okay people, here's what's going to happen. You all are going to go with the rest of the stewards on to the MoonBase ahead. I will stay behind and rescue ${MaxAffectionTarget}.\"\n\n    You take a deep breath. Will they trust you? Have you built up enough goodwill that they'll follow your directions? \n\n    They oblige you. They trust you. It's a surprising relief. One less thing to worry about.\n    *goto ContinueMerge\n\n  #Just take care of this right now.\n    You can feel the surge of adrenaline as everything clicks into focus, \"Okay people, here's what's going to happen. I'm going to anchor myself to this rock, and lean over. ${MaxAffectionTarget}, you're going to climb up. Please use my body as an anchor, and avoid hitting or putting pressure on my pack.\" \n\n    One of the other stewards turns to address the rest of the group, \"${Name} will stay behind, I will lead you all along to our goal.\" He adds on a private channel to you, \"So that they don't waste their oxygen, asshole,\" then starts escorting them away. Your insides crumble. He's right. You shouldn't have forced this delay on everyone else. Could you fuck this up more?\n\n    *label ContinueMerge\n\n    ${MaxAffectionTarget} has been hyperventilating up into a tizzy of a panic, \"What if…what if I die out here? A rock's going to tear open my suit when I climb up. Or I'm going to rip open your suit. It's not going to work. I'm going to die. And I knew this was going to happen.\" \n\n    '$!{AffectionTarget_zhe}'s probably right,' your brain insists to you. At least one of you is going to die out here. And it will be your fault. You fucked this up.\n\n    *choice\n      #Express confidence in ${AffectionTarget_zim}.\n        You keep it upbeat and firm, \"Hey, I know that you can do this.\n        *if (MaxAffectionTarget = \"Andres\")\n          You're the one that people look to, wish they could be. You're the brave leader. I know that you'll be able to do this and have an amazing story to tell about it later.\n        *if (MaxAffectionTarget = \"Diana\")\n          You're an amazing and strong person. If anyone is used to staring death and darkness in the face before spitting on it, it's you.\n        *if (MaxAffectionTarget = \"Sadri\")\n          You're an amazing and caring and thoughtful person. You're always considering others, and right now I want to return the favor and help you out too.\n        *if (MaxAffectionTarget = \"James\")\n          You're an amazing and perceptive person. I know you're used to seeing the negative in situations, but trust me that this will go well, and together we will do this.\n        *if (MaxAffectionTarget = \"Ren\")\n          You're an amazing and talented person. You see life on another level, and you know proportions, motion, movement, better than anyone. Visualize how this will work.\n        *if (MaxAffectionTarget = \"Grant\")\n          You're a kind and thoughtful person, and I know that this all has been stressful on you, but I also know that you've got this inner strength, and I need you to draw on that for me.\n        *if (AffectionLove = true)\n          I'm here for you.\n        Now, let's get you up!\" You hope that was sufficiently inspirational. $!{AffectionTarget_zir} breathing becomes more regular, at least.\n        *goto RescueReachStart\n\n      #Remind ${AffectionTarget_zim} that you're there for ${AffectionTarget_zim}.\n        You pause before leaning down, \"Hey, listen, I'm here. I'm not going to leave you. I'm going to make sure that you're okay. I'll keep trying for as long as it takes.\" $!{AffectionTarget_zir} breathing becomes more regular, at least, but on the other end of the line you're only met with sniffles.\n        *goto RescueReachStart\n\n      #Ask ${AffectionTarget_zim} to focus.\n        You take a deep breath and explain it out as calmly as you can, \"Hey, listen. You're an amazing person, and I'm here to get you out of this jam. We're going to get out of it together, but I need to you to focus on what I'm saying, on when I say it so that we can get you out.\" $!{AffectionTarget_zir} breathing becomes more regular, at least, but on the other end of the line you're only met with sniffles.\n        *goto RescueReachStart\n\n      #Start reaching down for the rescue.\n        *goto RescueReachStart\n\n    *label RescueReachStart\n    You grit your teeth, \"I'm going to reach down, and you're going to grab onto my gloves first. You will then get a solid foothold, and reach up for my belt. Another foothold and then up to my legs, and then you should be able to climb out. Are you ready?\"\n\n    The climb out won't require much strength with this lessened gravity, but it will require some coordination. There's always the risk of ${AffectionTarget_zim} kicking you and breaking a bone or part of your suit.\n\n    ${MaxAffectionTarget} reaches up for your gloves, then grabs on. But ${AffectionTarget_zhe} doesn't move forward. $!{AffectionTarget_zhe} seems paralyzed, and you notice ${AffectionTarget_zir} breathing rate is actually way too low, almost catatonic. That's scary. \"Come on, ${MaxAffectionTarget},\" you urge, \"Reach up for a foothold next.\"\n\n    $!{AffectionTarget_zhe} lessens ${AffectionTarget_zir} grip, \"Listen, what if I kill you? What if I knock out your oxygen tube, or tear open your suit? Is it worth risking your life for mine?\"\n\n    *choice\n      *if (AffectionLove = true) #\"I care about you.\"\n        ${MaxAffectionTarget} releases your gloves, \"Yeah, see, that's the thing. I care about you too. And what gives you the right to make this choice for the both of us? It makes more sense for you to leave me: for you to go on. Why do you get to sacrifice yourself for me? Why can't I make that choice?\"\n        *goto SaveOneMerge\n\n      *if (AffectionLove = false) #\"I care about keeping people safe.\"\n        ${MaxAffectionTarget} releases your gloves, \"Yeah, see, that's the thing. I care about keeping people safe too. And what gives you the right to make this choice for the both of us? It makes more sense for you to leave me: for you to go on. Why do you get to sacrifice yourself for me? Why can't I make that choice?\"\n        *goto SaveOneMerge\n\n      #\"It's my job to protect you.\"\n        ${MaxAffectionTarget} releases your gloves, \"Yeah, but see, what if it wasn't your job? What if it was my job to protect you? We'd be back to square one, wouldn't we? I mean, it makes more sense for you to leave me: for you to go on. Why do you get to sacrifice yourself for me? Why can't I make that choice?\"\n        *goto SaveOneMerge\n\n      #\"That risk is my call to make.\"\n        ${MaxAffectionTarget} releases your gloves, \"Yeah, but see, why can't it be my call? Just because you get paid by one company, and I get paid by another? I mean, it makes more sense for you to leave me, for you to go on. Why do you get to sacrifice yourself for me? Why can't I make that choice?\"\n        *goto SaveOneMerge\n\n      #\"The risk to me is minimal.\"\n        ${MaxAffectionTarget} releases your gloves, \"Yeah, but see, there's still a risk. What if I end up killing you? I mean, it makes more sense for you to leave me: for you to go on. Why do you get to sacrifice yourself for me? Why can't I make that choice?\"\n        *goto SaveOneMerge\n\n    *label SaveOneMerge\n    *fake_choice\n      #\"Because if I did die, I'd at least be happy knowing I was helping someone else.\"\n        ${MaxAffectionTarget} gives an exasperated sigh, \"See, that's what I'm talking about. You think I wouldn't die satisfied that I did the right thing? You think you're special? More deserving? You're not.\"\n\n      #\"Because I can't just leave you to die knowing that I could have done something.\"\n        ${MaxAffectionTarget} gives an exasperated sigh, \"See, that's what I'm talking about. You think I wouldn't face the same conundrum after killing you? Knowing that I could have saved your life if I hadn't been so greedy as to insist that you save mine?\"\n\n      #\"Because I'd be fired and arrested if I didn't try.\"\n        ${MaxAffectionTarget} gives an exasperated sigh, \"Well, I'm sure that would be very sad for you, but that's maybe the worst argument I've ever heard for giving up your life for someone else.\"\n\n      #\"Because you need saving.\"\n        $!{AffectionTarget_zhe} gives an exasperated sigh, \"Except, even if you did save me now, I'm still going to die. I'm still going to fade away. How do people deal with it? Just accept it? Well, that's not for me. It's too cruel.\"\n    *comment endf\n\n    $!{AffectionTarget_zhe}\n    *if (MaxAffectionTarget = \"Andres\")\n      chuckles, \"Man, fuck death. Right in the eye. It sure would be nice if I didn't have to deal with it.\"\n    *if (MaxAffectionTarget = \"Diana\")\n      states resignedly, \"Death's grasp is too strangling. It haunts me all the time. It would be nice to be free from that specter.\"\n    *if (MaxAffectionTarget = \"James\")\n      frustrates, \"We humans are too stupidly designed. We break so easily, and our lifespan's only about a hundred years. And then that's it.\"\n    *if (MaxAffectionTarget = \"Sadri\")\n      states resignedly, \"It frightens me, all the time, you know. Death. The thought of dying, of all the suffering. I wish that…that I didn't have to deal with it.\"\n    *if (MaxAffectionTarget = \"Ren\")\n      states factually, \"I hate death. Its finality, its immutability. Its cruel equality. I wish I didn't have to deal with it.\"\n    *if (MaxAffectionTarget = \"Grant\")\n      admits tearfully, \"I'm terrified every day of death, of failure, of ending and being unloved. I wish I didn't have to worry about it anymore.\"\n    *comment endif\n\n    Your mouth dries in terror. ${MaxAffectionTarget} isn't going to come back up. Then they're going to find a recording of this conversation and a jury is going to convict you of manslaughter for not talking ${AffectionTarget_zim} into just trying to climb up your pack. Your mind flashes to cover-up strategies before you shake the thought from your mind.\n\n    *fake_choice\n      #\"But life is such an amazing experience.\"\n        ${MaxAffectionTarget} breathes out a slow stream of air, \"Well, but is it? I dunno. I guess. No, you're right. I do like it.\"\n\n      #\"There are people who want to see you stick around.\"\n        ${MaxAffectionTarget} breathes out a slow stream of air, \"Well, that is true. There are people who would be sad.\"\n\n      #\"So stick it to death by staying alive another day.\"\n        ${MaxAffectionTarget} breathes out a slow stream of air, \"Heh, I like how you put it. I do like that attitude.\"\n\n      #\"You can tell me all about death after you get back up.\"\n        ${MaxAffectionTarget} lets out a small sigh-laugh, \"Well, that's one way to try and convince me.\"\n\n    $!{AffectionTarget_zhe} reaches out and pulls on your gloves, \"Thanks for helping me with…that. Sometimes, I'm just not sure what's what.\" $!{AffectionTarget_zhe} climbs up and over your back. You hold your breath, waiting for a ripping noise, a system failure alarm, something, but nothing happens. And then, it's over. You're both fine. The whole experience already starts to fade back into a surreal mist.\n\n*fake_choice\n  #\"I thought you were lost.\"\n    ${MaxAffectionTarget} has already started the trek forward, \"Yeah…I thought I was too.\"\n\n  #\"I'm glad you're safe.\"\n    ${MaxAffectionTarget} has already started the trek forward, \"Yeah…I'm glad too.\"\n\n  #\"Nobody dies on my watch!\"\n    ${MaxAffectionTarget} seems too surprised to adequately relish the victory and flatly responds, \"Yeah…I'm glad it worked out that way.\"\n\n  #\"Well, let's get on with it.\"\n    ${MaxAffectionTarget} only flatly responds, \"Yeah…sure.\"\n$!{AffectionTarget_zhe} retreats within ${AffectionTarget_ d my death.\"\n      You expound on your decision, \"There's nothing I can do to stop it. I've learned to come to peace with it.\"\n\n      ${MaxAffectionTarget} snorts, \"Well, I'm glad for you, but I'm not comfortable with it. I'd rather live longer. I don't understand why we don't fight back more against death, why we aren't spending all our resources coming up with a solution.\"\n\n  *fake_choice\n    #\"Death cannot be beaten.\"\n      *if (AffectionLove = true)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"I suppose. I suppose there's no beating death. But, it's things like this, people like you, who make it all worthwhile. If you hadn't been here, I don't know what would have happened to me. You're a really fantastic person. Thank you.\" \n      *if (AffectionLove = false)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"I suppose. I suppose there's no beating death. But it's still a fun trip. Thank you, for the reminder.\"\n\n    #\"We're trying.\"\n      *if (AffectionLove = true)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"I suppose. But any breakthroughs we find will be too late for me. Maybe by centuries. But, it's things like this, people like you, who make it all worthwhile. If you hadn't been here, I don't know what would have happened to me. You're a really fantastic person. Thank you.\"\n      *if (AffectionLove = false)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"I suppose. But any breakthroughs we find will be too late for me. Maybe by centuries. But it's still a fun trip. Thank you, for the reminder.\" \n\n    #\"We can only focus on enjoying life.\"\n      *if , full life is the best we can do.\"\n      ${MaxAffectionTarget} stays silent for several meters, \"Yeah, I mean, I guess so. But it just feels hollow, empty. I mean, how can you relax, have fun, knowing…knowing what's going happening?\" $!{AffectionTarget_zhe} crackles the comm with a sigh, \"I just…I wish I could at least know I'd be remembered. That I wouldn't completely fade into nothingness.\"\n\n    #\"Beating death means thinking about it all the time, and that's depressing.\"\n      ${MaxAffectionTarget} stays silent for several meters, \"Yeah, I mean, I guess that's right. If we let death control our lives, then it wins. We need to be free to enjoy life on our terms.\" $!{AffectionTarget_zhe} crackles the comm with a sigh, \"I just…I wish I could at least know I'd be remembered. That I wouldn't completely fade into nothingness.\"\n\n    #\"Death is just unbeatable.\"\n      ${MaxAffectionTarget} stays silent for several meters, \"Yeah, I mean, I guess so. But I hate that we just accept that. That we just put up with it. I don't want to die. I'd rather stick around.\" $!{AffectionTarget_zhe} crackles the comm with a sigh, \"I just…I wish I could at least know I'd be remembered. That I wouldn't completely fade into nothingness.\"\n\n    #\"Not everyone is terrified of death.\"\n      ${MaxAffectionTarget} stays silent for several meters, \"Yeah, I mean, I guess so. But I hate that we just accept that. That we just put up with it. I don't want that. I'd rather live.\" $!{AffectionTarget_zhe} crackles the comm with a sigh, \"I just…I wish I could at least know I'd be remembered. That I wouldn't completely fade into nothingness.\"\n\n  *fake_choice\n    #\"I wish I could be remembered too.\"\n      *if (AffectionLove = true)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"How about this? You'll promise to remember me, and I'll remember you. Heh. How could I forget you? After what just happened? Thank you, for everything.\"\n      *if (AffectionLove = false)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"I suppose we all do. It's something we all wish was assured. I'm glad to at least know I'm not alone. Not in that. Thanks, that helps.\"\n\n    #\"You'll be survived by those who care about you.\"\n      *if (AffectionLove = true)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"'Survived,' eh? A nice way to say 'remembered.' Well, I suppose that I'll definitely remember you. After…after all of what just happened. I guess you'd do the same for me. And maybe that's enough. To be remembered by someone you cared about. Thank you.\"\n      *if (AffectionLove = false)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"'Survived,' eh? A nice way to say 'remembered.' I suppose that's what matters: being remembered by those close to you, those whose lives you helped shape and influence. I know I'll remember you. After…after what just happened. Thank you.\"\n\n    #\"Your work will stick around after you've gone.\"\n      *if (AffectionLove = true)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"Maybe that's a large part of why I make it. Why I work so hard to get it just right. At least part of me survives, if that does. That's some comfort, at least. Well, thank you, for helping me put things in perspective. I appreciate you listening.\"\n      *if (AffectionLove = false)\n        You notice ${MaxAffectionTarget} stop and tilt ${AffectionTarget_zir} helmet light up towards the sky: the naked, infinite universe, \"Maybe that's a large part of why I make it. Why I
