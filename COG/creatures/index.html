 that property, I will say that the moon has its own beauty, mystery and allure. It will give you the ability to see beyond yourself, to connect with the whole rest of the universe in a way that's just not possible anywhere else. It truly is one of the most beautiful experiences you can have in your life.\" You pause and widely smile at everyone. You hope it was theatrical enough to be distracting.\n*comment endif\n\nNext, you point to the Gift Shop, trying not to cringe at having to deliver Spacejoy's mandatory money spiel, \"Most of you have already had a chance to check it out, but you can find pieces of the trip that you can make into your own personal reminder of your time here. For convenience, all the items in there are 'Display Only.' You'll be able to pick up any purchases when you return Earthside. Even moon dust!\" You wink. Diana yawns while Sadri whispers to Andres about something from the shop. Ren tilts her game system at a strange angle as she taps and swipes at it. You relax a bit. They're fine. You just need to get through the rest of the tour.\n*set firstRoom true\n\n\n*label tourRoomChoose\n\n*set roomCount +1\n\n*if (roomCount = 4)\n  *goto TourOver\n\n*if (roomCount =2)\n  *set firstRoom false\n\n*if ((firstRoom = true) and (escortSick = false))\n  Technically, the first room you visit would be the med bay, but you know better than to follow on the tail of the sick guy. Where should you show them around instead?\n\n*if firstRoom = false\n  You get the attention of the group, \"Well, shall we continue?\"\n\n*choice\n  *disable_reuse #Common rooms.\n    You drag them past the open airlocks that lead to the common areas: the meeting room, the observatory, and the museum. You describe each as you pass, but you always like to pause in the museum; it makes the chore feel more refined. Ren starts immediately snapping pictures of everything, while Diana traces her hands in the air above the old suits. James and Sadri laugh over a push-button activated replica of a moon rover claw. Andres walks around aimlessly; you can tell that he's already bored.\n\n    Diana pulls you aside, \"Hey, these suits are all pristine, don't you have anything older, tattered?\"\n\n    Andres abandons his pacing to throw in his opinion, \"I'd rather hope they should be a little more durable than that.\" He looks at you somewhat nervously, then presses you, \"They are more durable than that, right?\"\n\n    She shrugs her shoulders coldly, \"How often do things go exactly as they should?\"\n\n    *choice\n      #\"We do have some distressed suits, I can show you later.\"\n        *set writerAffection +1\n        Diana's eyes light up, \"Oh, you're the best! I'm really curious to hear how those suits can go wrong.\"\n\n        Andres scrunches his face in disgust, \"Come on, that's pretty much a fatal accident, right? I'd prefer to show a little more respect. Those were real people, wearing those suits.\"\n\n        Diana nods placatingly, \"Oh yes, of course.\" Andres doesn't look like he's buying it. Time to move on!\n        *goto tourRoomChoose\n\n      #\"What're you interested in the suits for?\"\n        *set writerAffection +1\n        Diana's eyes light up, \"Oh, well, I'm really fascinated by the bright colors on these older models. They remind me of the unrecoverable bodies on Everest. I was trying to think of a way to make a story connection.\"\n\n        Andres scrunches his face in disgust, \"Come on, those were fatal accidents. And any space suit accidents were probably fatal too. I'd prefer to show a little more respect. Those were real people, wearing those suits.\"\n\n        Diana nods placatingly, \"Oh yes, of course.\" Andres doesn't look like he's buying it. Time to move on!\n        *goto tourRoomChoose\n\n      #\"We put a lot of effort into your safety here.\"\n        *set leadAffection +1\n        Andres slacks his body in relief, then immediately straightens it again, \"I knew they'd run a professional outfit here. See, Diana? Not everything's a terrible death trap.\"\n\n        Diana folds her arms, unimpressed, \"Real professionals are just better at hiding it when things go wrong. And nothing can be perfect.\"\n\n        Andres shakes his head, \"Some people just want to relax and have fun. Please, don't go overboard.\" Diana looks pretty annoyed. Time to move on!\n\n        *goto tourRoomChoose\n\n      #(Lie) \"We've never had the kind of accident that would rip a suit.\"\n        *set leadAffection +1\n        Andres slacks his body in relief, then immediately straightens it again, \"I knew they'd run a professional outfit here. See, Diana? Not everything's a terrible death trap.\"\n\n        Diana folds her arms suspiciously, \"Never? Humph. Real professionals are just better at hiding it when things go wrong. And nothing goes perfect.\"\n\n        Andres shakes his head, \"Some people just want to relax and have fun. Please, don't go overboard.\" Diana looks pretty annoyed. Time to move on!\n\n        *goto tourRoomChoose\n\n  *disable_reuse #Recreational activity rooms.\n    You lead them past the closed airlocks, describing the fun activities that will take place under Spacejoy supervision: the gym and pool room (which will be filled with water by tomorrow), and the moon walk prep room. You gesture to a window that shows off the brightly lit moon walk area, and you take a break to let them crowd around and get their first real glimpse at a truly alien surface. It's a moment most tourists really get absorbed in, and almost everyone in your group gawks out with appropriately enraptured expressions.\n\n    Ren, however, scowls at the view, \"I never realized that the dust was so reflective. There's no way you could make that lighting look good.\" She returns to her device, glancing up occasionally.\n\n    Sadri jams her hair behind her ears in determination as she turns to Ren, \"I think that, well, technology makes up for what we can't do ourselves.\"\n\n    Ren gives a wry smile, \"Yes, but how exactly does that happen?\" She turns to you, \"You must take photographs up here. How do you account for all the glare?\"\n\n    *choice\n      #\"I'm impressed that you noticed the glare.\"\n        *set artistAffection +1\n        Sadri gestures towards you knowingly, \"Yes! That is because for most people, their brains just adjust to make sense of it. It is how you can wear colored glasses and become used to it. You know, metrics say that half the people don't even adjust their screen resolutions?\"\n\n        Ren frowns, \"That kind of adjustment takes time. It also doesn't work when the objects on the screen are wrong, but your surroundings aren't. You can see the contrast. And people notice.\"\n\n        Sadri rolls her eyes, \"Well, then, I say give people the idealized version. The fake one that works, even if it's not real. I'm sure you'll figure something out.\" Ren sighs in resignation and presses her face back against the glass, while the rest of the tourists seem to have lost their interest in ambient gawking. Time to move on.\n        *goto tourRoomChoose\n\n      #\"We treat it like snow; the conditions are similar.\"\n        *set artistAffection +1\n        Sadri points out the window, \"You see? This place, it feels so exotic, so different. But it's all just the same as back on Earth. The same problems, the same solutions. It all breaks down just the same.\"\n\n        Ren seems unimpressed, \"Except on the dark side there's no sun. And even with light, I'm sure the angle is all wrong. Then the lack of atmosphere, the lens of oxygen in your helmet against the vacuum. All the details are wrong. It's an uncanny valley.\"\n\n        Sadri rolls her eyes, \"Well, yes, but consider that metrics say that half the people don't even adjust their screen resolutions? They don't notice! You may be overestimating the importance of perfect graphics. Just figure out a way to make it work.\" Ren shrugs and presses her face back against the glass, while the rest of the tourists seem to have lost their interest in ambient gawking. Time to move on.\n        *goto tourRoomChoose\n\n      #\"We run all shots through post-processing programs.\"\n        *set programmerAffection +1\n        Sadri gestures towards you knowingly, \"Yes! This is what happens. You know, metrics say that half the people don't even adjust their screen resolutions? I think they are just excited for the experience, they don't notice the details that are wrong.\"\n\n        Ren frowns, \"Well, the problem is that most people's eyes automatically adjust to account for what they're seeing. You have to actively look for what's wrong with the lighting in real life to fix it for a game. But plenty of people notice when it's wrong in the game, even when they can't say why.\"\n\n        Sadri rolls her eyes, \"Well, then, I say give people the idealized version. The fake one that works, even if it's not real. You've figured out tougher puzzles before.\" Ren sighs in resignation and presses her face back against the glass, while the rest of the tourists seem to have lost their interest in ambient gawking. Time to move on.\n        *goto tourRoomChoose\n\n      #\"We take two shots with different settings and merge the two.\"\n        *set programmerAffection +1\n        Sadri points out the window, \"You see? This place, it feels so exotic, so different. But it's nothing technology, human advancement, can't solve. It all breaks down just the same.\"\n\n        Ren seems unimpressed, \"Except that means there's no way to recreate the reality. Most people will see and imagine it as some idealized place, compatible with human existence. But it's not, in every way. You can't even see here properly.\"\n\n        Sadri rolls her eyes, \"Well, so what? We're here anyway; thanks to technology that adapts it to work for us. Just figure out a way to make it work.\" Ren shrugs and presses her face back against the glass, while the rest of the tourists seem to have lost their interest in ambient gawking. Time to move on.\n\n\n        *goto tourRoomChoose\n\n\n  *disable_reuse #Their staterooms.\n    You show them each to their individual rooms. The quarters are pretty tight, but you're still proud to let them know that they each have their own private bathroom.\n\n    Everyone pokes around their rooms, but James pops back out almost immediately and inundates you with questions, \"I'm really curious how this is all feasible: how do you get supplies like food and water? How about the ummm…waste? And, I noticed that the beds were all singles, how do you accommodate couples? And what about you? Do you stay up here for years, or rotate out in monthly shifts?\" \n\n    He bounces a bit in place, \"I'm sure you get lots of people bugging you about stuff like this, but I don't see how it's at all practical.\"\n\n    *choice\n      #Answer everything truthfully.\n        *set QAAffection +1\n        You smile and take a deep breath, \"Well…we get regular shipments of food, and grow or synthesize our own. We recycle the…waste through bacteria, plant, and bottom feeder farms. A few of the walls between rooms are retractable, allowing beds to join together and double room size.\" You take a break for air.\n\n        He tilts his head, \"And what about you? What's your story? This a cool place to work, or not?\"\n\n        You hold up a finger of patience, \"And as for me, I'm up here for three more years until I hit my five year anniversary and get retired out.\"\n\n        He whistles, \"Whoa. Five years. That's a lot for even a job back on Earth.\" He glances around as the rest of the tourists pile out of their respective rooms. Time to move on.\n\n        *goto tourRoomChoose\n\n      #Answer truthfully, glossing over stickier details.\n        *set QAAffection +1\n        You smile and take a deep breath, \"Well…we get regular shipments of food, and grow or synthesize our own. We recycle the…waste through plants and other natural processes.\" He raises an eyebrow at this subtle avoidance, but doesn't interrupt, so you continue, \"A few of the walls between rooms are retractable, allowing beds to join together and double room size.\"\n\n        He tilts his head, \"And what about you? What's your story? This a cool place to work, or not?\"\n\n        You hold up a finger of patience, \"We all spend several years here. I definitely enjoy it.\" You leave out the specifics that you've got three of your five years left up here.\n\n        He whistles, \"Yeah, really? Gotta be honest, not sure I could do it, but more power to yah.\" He looks around him as the rest of the tourists pile out of their respective rooms. Time to move on.\n\n        *goto tourRoomChoose\n      #Dodge the personal questions.\n        You take a deep breath, \"Well…we get regular shipments of food, and grow or synthesize our own. We recycle the…waste through plants, shrimp farms, and other methods. A few of the walls between rooms are retractable, allowing beds to join together and double room size.\" You give a finalizing smile.\n\n        He tilts his head, \"And what about you? What's your story? This a cool place to work, or not?\"\n\n        You avoid mentioning that you've got three of your five years left up here, instead answering confidently, \"I really like it here. The time seems to just fly by.\"\n\n        He tilts his head, \"Impressive reframing!\" He looks as though he's about to press you further, but instead notices the rest of the group pouring out and decides against it.\n\n        *goto tourRoomChoose\n      #Dodge everything.\n        You smile confidently, \"It's definitely not easy. It takes a lot of work, a few patented recycling processes, and a heck of a lot of rocket grease.\" You wink at the last line, and then add almost as an afterthought, \"I wouldn't want to work anywhere else.\"\n\n        James squares his eyes at you skeptically, \"Come on, the NDA can't be that tight, can it? I'm just asking for something practical about how this all works.\"\n\n        Your mind cycles through the questions and you focus in on the one that you haven't addressed yet, \"Oh yes, couples! Well, you see, some of the walls are retractable, allowing us to join two rooms—and two beds—together. Quite a nifty trick, I think.\" He doesn't seem terribly impressed, but the rest of the group has started pouring out of their respective rooms and he decides not to press it.\n\n        *goto tourRoomChoose\n\n  #End the tour early.\n\n    *goto TourOver\n\n*label TourOver\n*if (roomCount = 3)\n  You smile as bright as you can go, \"And that's the end of the tour!\"\n*if (roomCount \u003c 3)\n  You smile as bright as you can go, \"And let's just move on, eh?\"\nYou up the chipper to get everyone's attention, \"I'm sure you're all hungry, so let's have some real space food, hmm?\" \n*if (roomCount = 3)\n  By now, none of them seem all that concerned about Grant being sick. In fact, they seem perfectly at ease: a triumph you celebrate completely internally.\nYou usher them into the brightly lit dining hall, and then dramatically reach for a nearby switch, \"Normally, we keep this lit with only minimal accent lights. You'll see why in a second.\" \n \nYou flip the lights off, and, on cue, they all gasp at the glass ceiling above. In the darkness, the universe is beautifully lit unlike anything you can see on Earth. They remain fixated on the spectacle for well over a minute. This is the first group you've had in a while to actually take the time to appreciate and enjoy the amazing view. You even get swept up yourself, wiping away a tear. Just when you thought you'd gotten used to it all, the sheer beauty of the universe teases out from you the first real smile you've had all morning.\n\n*label skip-ahead\n\n*finish Lunch Time\n", "day1-dinner": "*comment Seventh Part of the Game\n\n*temp Asker \"nobody\"\n*temp Asker_zhe \"zhe\"\n*temp Asker_zir \"zir\"\n*temp Asker_zim \"zim\"\n\n\n*comment  *goto skip-ahead\n\nThe Day 1 dinner is always high-quality. It's where the chefs show off how far spacefaring cuisine has come over the years thanks to engineered yeasts, specially-designed ventilator-ovens, and higher quality ingredients.\n\nIt will be a defusing meal, once you get them there. But you can just feel their curiosity building. Their silence gives it away: 'Where is Grant? Why isn't he joining us for dinner?' But you need to keep them distracted, focused on having a good time. Your best option at this point is to just smile and nod, smile and nod. But the silence is starting to bug you.\n\nDo you break it?\n\n*choice\n  #No, my best bet is to just drop them off as quickly as possible.\n    You try to pick up the pace, but tourists never respond. You end up being slowed down by a straggler: Ren, with her head down into her device.\n    *goto SilenceMerge\n\n  #No, I don't want them to think that I'm nervous.\n    You go at the leisurely pace that tourists prefer, but you deliberately avoid making eye contact or looking back at them.\n    *goto SilenceMerge\n      \n  #Yes, if I talk non-stop they won't have a chance to speak edgewise.\n    You flip around, walking backwards while talking, \"Well, I certainly hope that everyone found something cool out there!\n    *if (helpTarget = \"Andres\")\n      I know for certain that Andres over here found a new dwarf planet in our very solar system! Did you know that astronomers used to be obsessed with the possibility of discovering their very own 'Planet X'? At least, that was back when Pluto was considered a planet, and they didn't really have powerful enough telescopes to find, let alone catalog all the different solar objects in our own system.\"\n    *if (helpTarget = \"Diana\")\n      I know for certain that Diana over here found a dying planet: a place that was previously marked as inhabitable has changed its classification sometime over the past half century or so. Isn't it amazing to think about the fact that life keeps going on around us, and we don't even know or are unaware of it? I think it's quite the find, myself!\"\n    *if (helpTarget = \"James\")\n      I know for certain that James over here found an inhabitable planet. Do you know how difficult those are to find? For the longest time, scientists thought that Earth was the only real inhabitable planet. Well, that was before they improved their spectroscopy techniques. But then they also had to deal with interference that they hadn't figured out to effectively screen out. But it's always exciting imagining traveling to those far off distant realms, isn't it? Maybe encountering a new form of life? I think that would just be the coolest!\"\n    *if (helpTarget = \"Sadri\")\n      So, has anyone had any cool thoughts about how the whole telescope system works? Sadri over here was suggesting some very amazing game ideas for how to spice up the telescope searching—making it into a game, doing a sort of a competition. Would anyone potentially be interested in that later on? Or—how about this—doing a sort of a scavenger hunt for different kinds of celestial objects? I think that'd be a lot of fun too! What does everyone say to doing something like that later in the week—we could be the first to try it out!\"\n    *if (helpTarget = \"Ren\")\n      I know for certain that Ren found a forming star, and perhaps what could be the beginnings of its planets as well. It's difficult to think just on what kind of timescale it will be until that star finishes forming, and difficult to think about our own galaxy's past when we were just forming as well—bits of dust drifting in space. It boggles the mind to think that we all came from that, isn't it?\"\n    *if ((helpTarget = \"Grant\") or (helpTarget = \"nobody\"))\n      I remember my first time that I looked through those telescopes. I nearly fainted at the detail you can make out on some of the Andromeda galaxy structures. It really is amazing, when you think about it. Hard to imagine just how many many many stars and planets there are out there, isn't it?\"\n    *goto AwkwardNod\n    \n*label AwkwardNod\n\nThey all look at each other slowly and nod awkwardly. You can feel it working: they are following your cheerful lead. Here's hoping that they just get to enjoy the little bit of time they do have up here.\n\n*label SilenceMerge\n\n*comment There are other places where Max Affection is calculated\n*comment Calculating MaxAffectionTarget. Defaults to Andres if it's Nobody.\n\n*if (((((leadAffection > WriterAffection) and (leadAffection > ArtistAffection)) and (leadAffection > ProgrammerAffection)) and (leadAffection > QAAffection)) and (leadAffection > ConsultantAffection))\n  *set Asker \"Andres\"\n  *set Asker_zhe \"he\"\n  *set Asker_zir \"his\"\n  *set Asker_zim \"him\"\n\n*if (((((WriterAffection > leadAffection) and (WriterAffection > ArtistAffection)) and (WriterAffection > ProgrammerAffection)) and (WriterAffection > QAAffection)) and (WriterAffection > ConsultantAffection))\n  *set Asker \"Diana\"\n  *set Asker_zhe \"she\"\n  *set Asker_zir \"her\"\n  *set Asker_zim \"her\"\n\n*if (((((ArtistAffection > leadAffection) and (ArtistAffection > WriterAffection)) and (ArtistAffection > ProgrammerAffection)) and (ArtistAffection > QAAffection)) and (ArtistAffection > ConsultantAffection))\n  *set Asker \"Ren\"\n  *set Asker_zhe \"she\"\n  *set Asker_zir \"her\"\n  *set Asker_zim \"her\"\n\n*if (((((ProgrammerAffection > leadAffection) and (ProgrammerAffection > WriterAffection)) and (ProgrammerAffection > ArtistAffection)) and (ProgrammerAffection > QAAffection)) and (ProgrammerAffection > ConsultantAffection))\n  *set Asker \"Sadri\"\n  *set Asker_zhe \"she\"\n  *set Asker_zir \"her\"\n  *set Asker_zim \"her\"\n\n*if (((((QAAffection > leadAffection) and (QAAffection > WriterAffection)) and (QAAffection > ProgrammerAffection)) and (QAAffection > ArtistAffection)) and (QAAffection > ConsultantAffection))\n  *set Asker \"James\"\n  *set Asker_zhe \"he\"\n  *set Asker_zir \"his\"\n  *set Asker_zim \"him\"\n\n*if (( Asker = \"nobody\") or (Asker = \"Grant\"))\n  And then, it happens. \"Hey ${Name}, are you going to join us again?\" Andres says. Wait, they want to spend more time with you?  That's…not what you expected. It's certainly not unpleasant, though. Maybe there wouldn't be any harm in pressing your luck.\n  *goto DinnerJoinSkip\n\nAnd then, it happens. \"Hey ${Name}!\" ${Asker} calls out. Your hairs prick as ${Asker_zhe} finishes, \"Are you going to join us again?\" Your face warms and your face slips into a small, but real, smile. That's…not what you expected. It's certainly not unpleasant, though. Maybe there wouldn't be any harm in pressing your luck, in continuing like everything's normal.\n\n*label DinnerJoinSkip\n\n*choice\n  #\"Sure, I'd love to!\"\n    *goto DinnerDialogueMerge\n\n  #\"Sure, just let me serve everyone first.\"\n    You still feel a bit bad about making another employee serve you like you were a guest before. Not again.\n    *goto serverMerge\n\n  #\"Sure, just let me clear it with the management.\"\n    You know it's just a formality, but you go through the motions of swiping the request into your walkie-talkie to the boss. She did say that it would be a good idea to do whatever it took to make sure that the tourists were comfortable.\n    *goto DinnerDialogueMerge\n\n    *label serverMerge\n    You smile to the gums, \"But first thing's first: what would everyone like to eat?\"\n    *goto DinnerDialogueMerge\n\n  #\"I'd actually better go check on Grant instead.\" (leave)\n    *goto GrantInstead\n\n*label DinnerDialogueMerge\n\nEveryone goes for the special of the vegetable empanadas and Chilean RepliPork ragout. Ren and Sadri opt for the spicier versions. You get it all arranged and brought out. They seem pleasantly surprised at the inclusion of real forks, knives, and plates. You carry over the last tray—your tray—and pause. Whose table should you join?\n\n*choice\n  #Diana, Sadri, and Ren.\n    *set WriterAffection +2\n    *set ArtistAffection +2\n    *set ProgrammerAffection +2\n    Ren looks over the meal, putting aside her device. She turns to you quizzically, \"All of this is so much better than the lunch. Why even bother with that crap when you can obviously do better?\"\n\n    Sadri apologizes to you, \"Oh, hey, don't worry about Ren's rudeness. I think it's important to honor the past.\"\n\n    Diana flips over a fork in her hand. It's hollow metal, and the balance takes some getting used to. She turns to you, \"I too am curious what Spacejoy thinks we're supposed to get out of the exercise. I know what I got out of it, but what do you think about it?\"\n\n    *fake_choice\n      #\"A lot of tourists enjoy the native food experience.\"\n      #\"It's designed to show just how far space travel has advanced.\"\n      #\"It highlights how difficult the early space expeditions were.\"\n      #\"It's a trick to get you to appreciate having the quality of things we can actually cook.\"\n        Diana laughs, \"Ha! I knew it!\" Ren glares at her, then\n    Sadri chimes in, \"I know that I certainly enjoyed getting a chance to try out the old food. It was like, well, a strange roadside picnic. But it made me appreciate their hardships.\" She smiles and turns intently to her own meal, dumping in the spices. You try not to wince.\n\n    Diana stares off to the side and quietly remarks, \"I'll bet at some point in the past, some astronauts murdered each other over that kind of food. Blamed it on a malfunction.\" She cuts some of the RepliMeat pastry to play with balancing it on her fork.\n\n    Ren stares intently at you, \"Yes, thanks for the official Spacejoy reason for the food, but what's your opinion? Is there supposed to be some merit to suffering though terrible food?\" \n\n    *fake_choice\n      #\"Bad experiences help you appreciate the good ones.\"\n        Ren wrinkles her nose, \"Ah, you don't actually believe that, do you? How cruel to those who suffer.\" She shudders.\n\n        Sadri turns away and goes very quiet, \"There's definitely a lot of bad things in my life—in other people's lives—that I know that we shouldn't have had to go through. It's not fair to say to them that those times ended up making their lives happier. It's a way to justify why bad things happen to good people, but it forces the sufferers to accept it.\"\n\n      #\"Suffering doesn't enhance enjoyment.\"\n        Ren adjusts her glasses, \"Ah, good. I can't stand people who think that it does.\" She shudders.\n\n        Sadri turns away and goes very quiet, \"It's very privileged, you know, to tell people that they suffered for some better or ultimate reason. It's not fair to say to them that those times ended up making their lives happier. It's a way to justify why bad things happen to good people, but it forces the sufferers to accept it.\"\n\n      #\"Knowing what it means to suffer helps you appreciate the plight of others.\" \n        Ren adjusts her glasses and hums, \"Perhaps. But wouldn't it be better to just work towards bettering humanity?\"\n\n        Sadri turns, \"Well, yes, but I think that an important part of that is knowledge and outreach. Realizing that others are suffering, knowing what it means to suffer yourself, and wanting to help those others.\"\n\n        Diana drops her fork in a huff, \"Well, I think it's a very base view of humanity to say that we need to suffer ourselves to recognize that others should be spared it. I think we can do better than that.\"\n\n      #\"It's just a trick the company uses to save some money.\"\n        Ren gives an amused snort before elaborating, \"It's a cute idea, I'm sure. Sell crap as 'authentic' and 'old-fashioned.' I approve.\"\n\n        Sadri turns, \"Well, but you see, I'm not sure that it actually does. I mean, all of those products cost money, right? They might be more expensive than just shipping up raw ingredients, since you have to go out of your way to specially prepare them. Well, I dunno.\"\n    *comment endif\n\n    Diana slowly dissects her ragout, inspecting it thoroughly, \"You know, I bet that corporate kid has some insight into the motivations: marketing, or cost-saving, or whatever.\" They all look over at his empty chair. You tense up. Here it comes. Diana waves your nerves away, \"No, nothing like that. I've been thinking about him being sick, but like it's a story. Like, he needs to get sick and die to motivate the protagonist. That's pretty messed up, though I suppose.\" Sadri and Ren seem unfazed.\n   \n    *fake_choice\n      #\"Dark, but intriguing.\"\n        Diana grins mischievously, \"Glad you approve.\"\n\n      #\"Motivations for what?\"\n        Diana waves her hand, \"Oh, you know, to get some sort of revenge, to find the evildoer, to set things right. It's not all that deep, I will admit.\"\n\n      #\"Who would it be motivating?\"\n        Diana waves her hand, \"Oh, you know, the hero of the story. I guess that's a problem, since nobody knows him well enough to really care enough if he gets sick and dies. I guess he'd have to be like a side quest or something. It's not all that deep, I will admit.\"\n\n      #\"That's a bit cheap.\"\n        Diana waves her hand, \"Oh yeah, of course. It's not the most nuanced either, but that's just what it feels like.\"\n    *comment endif\n\n    Sadri speaks up, \"I don't like that, you know, treating him like he's an object.\" Her voice slowly trails off, \"It doesn't feel…\" She bounces upturned hands, as though searching to fill in the last word, \"Good.\"\n\n    Diana puts down a spoon full of filling, \"Oh of course. I mean, we have storyboard standards. But, well, people get sick in real life, and it does affect others. How about this: if the game was played from the perspective of the sick man? Accomplish your last goal before you croak.\"\n\n    Ren clicks her tongue, \"That sounds even worse,\" then sips at some hot tea from a ceramic mug.\n\n    *fake_choice\n      #\"How delightfully morbid.\"\n        Sadri waves, \"Oh, I think it could make for some amazing game mechanics. Maybe, a time limit, and each threshold you cross, you lose abilities. You have to move about and complete tasks before you become unable to do so.\"\n\n        Diana frowns, \"That sounds a bit more of a platformer than I had originally intended. But I suppose something like that would work too.\"\n\n        Ren glances up from a bowl of soup, \"It would be a fun project to blend the player's skin from healthy to ill. I definitely enjoyed the different textures used in [i]Creatures[/i].\"\n\n        Diana looks towards you, \"Now the important part: what kind of goals would the sick man have? What's so important that he needs to accomplish it before dying?\"\n\n        *fake_choice\n          #\"Revenge against his killer.\"\n            Ren grins, \"I think that's the most poetic. And it'd make an amazing piece of art.\"\n\n            Sadri points down at the table, \"Well, yes, but what if you're not dying from a murder or malice, just dying slowly from some disease, or old age?\"\n\n            Diana rests her chin against a palm, \"That's the thing, isn't it? There's no reason or cause for our eventual death. We just slowly break down until we stop working and it's nobody's fault. That's the most cruel ending of all.\"\n\n            *goto badEndings\n\n          #\"Save humanity.\"\n            Ren grins, \"That's the most heroic. And it'd make an inspiring piece of art.\"\n\n            Sadri points down at the table, \"Well, yes, but what if you're not someone special? What if you're just a regular person, caught up in a bad situation?\"\n\n            Diana rests her chin against a palm, \"That's the thing, isn't it that's most cruel? We're all—all of us—not that important. We'll just fade away, get lost in the sea of people worrying about their own eventual deaths. How many have died before us? How many will die un-mourned? But that's how it ends.\"\n\n            *goto badEndings\n\n          #\"Say goodbye to his loved ones.\"\n            Ren nods gravely, \"That's the most true to life. And it'd make an amazing piece of art.\"\n\n            Sadri presses against the table with her index finger, \"Well, yes, it makes good art, but what sort of mechanics would there be? I am not convinced that you could make it into something fun.\"\n\n            Diana grins bemusedly and rests her chin against a palm, \"That's the thing, isn't it? It's not fun. It's sad, and cruel, and unfair. That's what makes it the most frightening ending of all.\"\n\n            *goto badEndings\n\n          #\"Achieve immortality.\"\n            Sadri tilts her head, \"Wait, do you mean, finds a way to make himself immortal? Or, finds a way to make an impact on life?\"\n\n            Diana laughs, \"Well, what's really the difference? When you get to it: either way the protagonist's 'life' technically ends as soon as you finish and turn off the game.\"\n\n            Ren glares, \"Taking it seriously, now.\" Diana shrugs. Ren picks up where she left off, \"I think either way, the quest for immortality is something that speaks to all of us. It makes a good piece of art. Although, even more so if it ends tragically.\"\n\n            *goto badEndings\n\n      #\"That feels disrespectful.\"\n        Diana laughs, \"I think that the whole mentality of 'respecting the deathly ill,' has more to do with not reminding ourselves of our own mortality than it does with actually respecting the people who are ill.\"\n\n        Sadri pushes, \"Oh yes, I mean, I think it is worse, being treated like a non-person, being treated like you're not worthy of being a protagonist in the story. I can't tell you how long it was before there were any Indian heroes in video games.\"\n\n        Ren nods sadly, \"Yes. I've definitely had to deal with some unsavory art requests. I'd much rather prefer to have something that feels like it actually cares about the subject material.\"\n\n        *fake_choice\n          #\"What sorts of art requests?\"\n            Ren stabs at some crust, \"Oh, all sorts of crap, especially before I started working here. Boobplate or bikinis for women matched with real armor for men, racial caricatures, bad poses, sultry animations. Young, white, male concept and cover art. You name it, it happened. Luckily, it's a dying breed. But there are still some dinosaurs.\"\n\n            Diana sighs, \"Yeah, I've been with it for awhile now, and things can get pretty ridiculous. And then you've always got to pay that woman tax: you know, do you really belong here? Well duh, yes I do. But it gets exhausting.\"\n\n            Sadri points, \"I'm lucky not to be out in public like they are, but it can still be tiring. I have to listen to it all, deal with it in the back end. But again, it was much worse before I ended up here. Sometimes, I worry about us. About me. I've heard about other people having unhappy endings, and it's scary.\"\n\n            *goto badEndings\n\n          #\"Games still have a long way to go to really be inclusive.\"\n            Ren nods, \"I'm glad that you understand, that you care about it. There are still a few dinosaurs, but luckily they're a dying breed.\"\n\n            Diana sighs, \"Yeah, I've been with it for awhile now, and things can get pretty ridiculous. And then you've always got to pay that woman tax: you know, do you really belong here? Well duh, yes I do. But it gets exhausting.\"\n\n            Sadri points, \"I'm lucky not to be out in public like they are, but it can still be tiring. I have to listen to it all, deal with it in the back end. But again, it was much worse before I ended up here. Sometimes, I worry about us. About me. I've heard about other people having unhappy endings, and it's scary.\"\n\n            *goto badEndings\n\n          #\"I guess it would be nice to have a game about someone ill.\"\n            Diana grins, \"Well, I'm glad that you've come around. I know that while it can be very othering to never have a game about someone like you, it can also be worse if it's done badly.\"\n\n            Sadri perks up, \"Or almost as bad, get labeled as 'educational' and boring. Trying to get good educational game mechanics is something that I've always wrestled with.\"\n\n            Ren wipes at her frames, \"I think the problem with them is that they don't usually trigger the same sorts of emotional pressures, they can't have the same sort of draw as with regular games.\"\n\n            Diana nods furiously, \"Definitely. And they're never ballsy enough to have the bad endings. The really bad ones, you know, to properly motivate you into finding the right one. Everything always turns out sort of okay, no matter what.\"\n\n            *goto badEndings\n\n          #\"I still think it wouldn't be respectful.\"\n            Diana puts her hands in the air, \"Well, then, what sort of thing do you think would best respect life and our precious little time we have here? A game about a bunch of completely healthy youths having fun?\"\n\n            Ren shrugs, \"It would be pretty and sell, but it wouldn't be meaningful art. It would be empty.\"\n\n            Sadri puts down her water, \"Yes, but what is wrong with that? Not everything can be about death and bad endings. Nor should it.\"\n\n            *goto badEndings\n\n      #\"But you wouldn't get to enjoy the epilogue.\"\n        Ren holds up her hand in disagreement, \"I think that's actually a selling point of the game. Nothing prevents you from enjoying the epilogue from a ghost's-eye-view. You get to go into death knowing everything, seeing how everything worked out. That's certainly what we all wish could happen, I think.\"\n\n        You refill a glass of water for Diana as she replies directly, \"I don't know, I think there might be something to be said for a story where it just cuts to black when your character dies. No score, no epilogue, just blackness. Leaves the player to fill in the gaps, and makes it more poignant.\"\n\n        Sadri pushes around a pepper, \"I don't know, I am sure that people play games to escape that sort of hardship. I'd rather not get that kind of ending myself.\"\n\n        *goto badEndings\n\n      #\"Why does it have to be a man?\"\n        Diana smirks, \"Look at that. Look at our assumptions. You are absolutely right. I guess it gets to you after awhile, you know.\"\n\n        Ren laughs, \"Ha! There's still a lot of pressure to make games about the 'everyman.' Because everyone can identify to being a man. But not everyone can identify to being a woman, or even a third gender.\"\n\n        Sadri smiles sadly, staring intently at her plate, \"Well, let's just say that I'm glad that I work here now.\"\n\n        *fake_choice\n          #\"Have you had to deal with anything?\" \n            They all look around. Sadri pushes back some hair, \"Yeah, I mean, I had to deal with a lot of extra code reviews, promotion pass-overs, insulting jokes. Even ladder-kickers.\"\n\n            Diana nods, \"Yeah, and the worst part is how that culture makes you doubt yourself, and you just get too tired to disagree. It's insidious. I mean, even now, the marketed appearance for the [i]Creatures Such as We[/i] protag is male.\" she sighs, \"I should have fought it harder.\"\n\n            Ren chimes, \"That's how it gets you. Makes you feel like it's your fault, for not pushing back hard enough. I've lost fights about how women and men should be using the same walking animations. I still regret it.\"\n            *goto sexistTropes\n\n          #\"I'd like to advance past assumptions.\"\n            Sadri smiles, \"Oh, It's nice to hear that. You never know who will know who will end up being completely backwards. I've dealt with my fair share of ladder-kickers.\"\n\n            Diana nods, \"Yeah, and it just gets exhausting. But the more people that understand, that care, the easier it gets. And it's nice to get called out when you make assumptions.\"\n\n            Ren chimes in, \"Oh yes. I mean, part of the problem is that we just haven't gotten to the part where we imagine women as important in any role. Even in art, most of the exhibits are from dead old men.\" She pushes around her food, \"You know, despite all the progress.\"\n            *goto sexistTropes\n\n          #\"There's been a lot of progress.\"\n            Sadri looks off, forlorn, \"Yes, I suppose that I don't think I could be here if there wasn't.\"\n\n            Diana points at the three of them, \"Yeah, we all actually had to deal with a really bad ladder-kicker before we could move up. It was exhausting and really messed with your head. But knowing that so many people worked on it in the past, makes it easier to bear.\"\n\n            Ren snorts, \"Hm. I think there's a danger to focus on the victories of the past. It makes you complacent. There needs to still be a push for progress.\"\n            *goto sexistTropes\n\n          #\"I appreciate the standards that Cullected adheres to.\"\n            Sadri smiles, \"You know, it was actually easier. We didn't have to have separate code for men or women flirts, didn't need separate cameras because they were the same height, didn't need radically different art styles.\"\n\n            Diana points at the three of them, \"Well, once the three of us got rid of that ladder-kicker, and set some of the old guard around here straight.\"\n\n            Ren snorts, \"Yeah, the hard part was getting rid of the dinosaurs. I'm still pissed that we haven't done more.\"\n\n            Diana sighs, \"It is definitely frustrating.\"\n            *goto sexistTropes\n\n    *label sexistTropes\n\n    Sadri scrunches up her nose, \"The problem is that the sexist stuff seeps into the game. Taints it.\"\n\n    *fake_choice\n      #\"I hate bigotry in my games.\"\n        Diana pushes aside her plate, \"Everybody does. Or at least, everyone who's worth making a game for.\" They all three nod.\n\n      #\"I love sticking it to bigots in-game.\"\n        Sadri sighs deeply, \"I don't know, I am just so tired of it all. I'm sick of dealing with it, even when it's fake.\"\n\n        Ren twitches her hands, \"Well, I kind of like it. But only if the payoff is immediate. And it has to be thorough. It's nice to see a skeezeball have his skin turned inside-out.\"\n\n        Diana laughs, \"And I'm supposed to be the dark one! I don't know, On the one hand, I want to make stories that are true to form, but on the other hand—most people don't want to even have to go through the sexism. Most people who have to deal with it daily, at any rate.\"\n\n      #\"But some stories need that realism.\"\n        Diana looks off, \"I don't know. I'm on the fence about it. I feel like it's the only way to really stay true to some stories, but on the other hand, I realize that most people don't want to go through that in their games.\"\n\n        Sadri shakes her head, \"I know for a fact that I don't like it. It just makes me tired.\"\n\n        Ren pushes back a plate, \"It's a lazy trope that gets used too much to add dark or gritty realism to a story. I hate it, and I think its lost all its artistic merit.\"\n\n      #\"What about all the female-created games?\"\n        Sadri nods, \"Yeah, I've thought about going over to work on those. But, they have this stigma still, and I don't want to give up on the hard-core games.\"\n\n        Diana laughs, \"We can fix the men up, I swear!\"\n\n        Ren pushes back a plate, \"And it doesn't guarantee that you avoid sexism. In fact, those projects tend to be more sexist, because they're supposed to be marketing to a 'niche' audience, and do stuff like paint bucket everything pink. Ugh.\"\n\n    *goto DinnerEndMerge\n\n    *label badEndings\n    Sadri scrunches up her nose, \"The problem is the bad endings. Nobody likes bad endings.\"\n\n    *fake_choice\n      #\"Bad endings just aren't fun.\"\n        You press it home, \"We're playing a game to get out of reality. To travel to a place where we're in control. Bad endings remind us about what life is really like.\"\n\n        Sadri nods, \"Yeah, that's totally it.\"\n\n        Diana waves about, \"Ah, but who's to say that we don't need that reminder?\"\n\n        Ren finishes the last of her water, \"I don't. I'm just trying to live my life to the fullest. Speaking of which, that meal was excellent. Thank you very much.\"\n\n      #\"Endings should be whatever they need to be.\"\n        You press it home, \"The story is really what's in control, and sometimes it needs a good ending, but sometimes it needs a bad ending. You can't really choose one or the other just because you want it to go a specific way.\"\n\n        Diana nods, \"Yeah, I've definitely tried making that argument before. It usually falls flat.\"\n\n        Sadri ties her hair back, \"Ah, but when you're the dreamer of the dream, who's to say you can't shape the life of the story?\"\n\n        Ren finishes the last of her water, \"It's hard enough just trying to shape your own life. It's a chore just to relax and enjoy the small things in life.\" She puts down her glass, \"Speaking of which, that meal was delicious. Thank you very much.\"\n\n      #\"Bad endings are important.\"\n        You press it home, \"The story is really what's in control, and sometimes it needs a good ending, but sometimes it needs a sad ending. You can't really dip something in chocolate if that's not the direction that the story needs to go in.\"\n\n        Diana plays with her nails, \"Yeah, I've definitely tried making that argument before. It usually falls flat.\"\n\n        Sadri ties her hair back, \"Ah, but when you're the dreamer of the dream, who's to say you can't shape the life of the story?\"\n\n        Ren finishes the last of her water, \"It's hard enough just trying to shape your own life. It's a chore just to relax and enjoy the small things in life. Speaking of which, that meal was delicious. Thank you very much.\"\n\n      #\"That's why so many games don't have endings.\"\n        You press it home, \"Platformers, casual games, puzzle games. They don't have story. They just let you switch off your brain.\"\n\n        Diana looks taken aback, \"I personally only have my brain for a limited time. I plan not to waste any of it on something so frivolous.\"\n\n        Sadri shrugs, \"I dunno. I like it. It feels soothingly repetitive. And I like it when things just make sense and all fall into place together.\"\n\n        Ren finishes the last of her water, \"It's easy and fun, but I agree that there's something hollow about it. I don't really feel satisfied, I never feel like I reach a good stopping point.\"\n\n    *goto DinnerEndMerge\n\n  #Andres and James.\n    *set LeadAffection +2\n    *set QAAffection +2\n    Hopefully, you can just keep Andres and James distracted with the empty seat, considering that Grant won't be coming. James looks over the meal with a skeptical eye. He turns to you critically, \"All of this is so much better than the lunch. Why even bother with that crap when you can obviously do better than the past?\"\n\n    Andres flips over a fork in his hand. It's hollow metal, which takes some getting used to. He turns to you, \"So. I know what I got out of it, but what do you think? Why does Spacejoy have its tourists jump through the disgusting food hoop?\"\n\n    *fake_choice\n      #\"A lot of tourists enjoy the native food experience.\"\n      #\"It's designed to show just how far space travel has advanced.\"\n      #\"It highlights how difficult the early space expeditions were.\"\n      #\"It's a trick to get you to appreciate having the quality of things we can actually cook\"\n        Andres laughs, \"Ha! I knew it!\" \n\n    James shrugs and throws in his own thoughts, \"I guess it was interesting to see what it used to be like.\" He smiles and turns intently to the ragout, intentionally leaving the vegetables for later. You try not to look judgmental.\n\n    Andres stares at you intently, \"Ah, you haven't answered my question. That answers why Spacejoy does it, but how about how you feel about it?\" He cuts some of the pastry crust to balance it on his fork.\n\n    *fake_choice\n      #\"Bad experiences help you appreciate the good ones.\"\n        Andres skeptically contorts his face, \"Oh come on, you don't actually believe that, do you? How cruel!\" He butters an empanada. An odd choice of seasoning.\n\n        James laughs, \"If you'd believe our forums, you'd know that any negative experience, no matter how small, means that the whole thing is ruined.\"\n\n      #\"Suffering doesn't enhance enjoyment.\"\n        Andres adjusts his sleeve, \"Fucking good. I can't stand people who think that it does.\"\n\n        James leans against his hand, \"Nothing more privileged. It's a way to justify why bad things happen to good people, but it forces the sufferers to accept it. I have no idea why anyone thinks that.\"\n\n      #\"Knowing what it means to suffer helps you appreciate the plight of others.\"\n        Andres opens some non-carbonated soda, \"Perhaps. But wouldn't it be better to just work for the betterment of humanity?\"\n\n        James turns, \"Well, I suppose there is some merit when it comes to putting yourself in a position to be better empathetic towards others.\"\n\n        Andres huffs, \"It's a very base view of humanity to say that we need to suffer ourselves to recognize that others should be spared it. I think we can do better than that.\" James shakes his head, shrugging.\n\n      #\"It's just a trick the company uses to save some money.\"\n        Andres gives a giant smirk, \"It's a brilliant idea, I'm sure. Sell crap as 'authentic' and 'old-fashioned.' I approve.\"\n\n        James turns, \"Well, I'm not sure that it actually does. If they're custom-prepared, those products might be more expensive than just shipping up raw ingredients.\"\n    *comment endif\n\n    Andres slowly dissects his ragout, inspecting it thoroughly, \"I bet that consultant kid has studied it. I bet he'd know what was what.\" They both look over at his empty chair. You tense up. Grant is definitely not going to make it to dinner. Here it comes. Andres waves your nerves away, \"No, don't worry about it. I've been thinking about him being sick, as, like, a weird source of inspiration. Like, what kind of game could you make out of someone being sick. Maybe an ER casual game, where you can shock hearts, and pump stomachs, and stabilize bleeding. I think it'd be fun, but then I realized it was kind of wrong to go there, right?\"\n\n    *fake_choice\n      #\"I'd love to play it.\"\n        Andres smiles, \"Well, thank you.\"\n\n        James waggles an eyebrow at you, \"Be careful. It'll go to his head, and the next thing you know we'll be pumping out a healing mini-game with our next RPG.\"\n\n      #\"Tell me more about the mechanics.\"\n        Andres puts down his fork and looks semi-contemplative, \"Oh you know, you have to tap to the rhythm to perform CPR, swipe to do um…other things. I'd have to research it. Or maybe it could be a management sim. Like, you need to manage the doctors well enough to prepare for all kinds of emergencies.\"\n\n        James nods, \"That would definitely have better potential, ratings-wise. It's more…removed, from the dark realities.\"\n\n      #\"We have to draw motivations from life.\"\n        Andres smiles, \"Definitely! The games that speak to us the most are the ones where there's some meaning behind it, where there's something you can connect to.\"\n\n        James hedges, \"Well, you know, I'm just not sure that people would be able to really let loose and enjoy themselves in that kind of game. It's too morbid.\"\n\n      #\"I think it's disrespectful.\"\n        Andres cocks his head, \"Well, I'm not quite sure about that. I know we get squeamish around death and dying, but should we exclude that from our art? From our lives?\"\n\n        James nods, \"I actually think it's much more respectful than the endless shooters.\" Andres shoots him a critical look, to which James quickly adds, \"You know, ours excluded.\"\n    *comment endif\n\n    Andres puts down his glass of blue liquor, \"I think the question comes down to this: Should we avoid making games out of the sadder parts of humanity? And if so, why?\"\n\n    *fake_choice\n      #\"Making games helps us deal with reality.\"\n        Andres nods thoughtfully, \"Oh, I think it definitely helps take away death's sting, but is that necessarily a good thing?\"\n\n        James frowns, \"And why does death deserve a sting? Hasn't it had that particular power for long enough?\"\n\n        Andres sighs, \"I guess, it's more involved than that. I mean, if we come to grips with death, with our problems, then what motivates us to find solutions for them? When we accept hardship, we stop looking for ways to end it.\"\n\n        *fake_choice\n          #\"Without levity, we'd be trapped in depression.\"\n            James grins, \"I think that's true. We'd never be able to do anything. It's really too much for any one individual to bear. That's why we joke about  the bugs we find.\"\n\n            Andres pauses from cutting apart some RepliPork, \"Well, yes, but we joke about them so that the entitled, complaining players get drowned out by our self-aware humor. It's a strategy to get players to just deal with the annoyance.\"\n\n            James glares at Andres, \"Even if I joke, I still seriously care about them getting fixed.\"\n\n            *goto makeADifference\n\n          #\"It takes generations to deal with those kind of problems.\"\n            Andres grins grimly, \"Ah, so you're saying that because we won't be able to fix them any time soon, we should just be prepared to suck it up and deal with it?\"\n\n            James looks off thoughtfully, \"I suppose that's an interesting part of the problem: enjoy blissful denial, or suffer through life with the mental anguish. Is it worth it? For us?\"\n\n            *goto makeADifference\n\n          #\"Maybe games can help achieve that change.\"\n            Andres cracks a smile, \"Oh, you mean, make a game out of finding the solution for death? First prize is 1,000 points and the 'Not Going to Die' trophy?\"\n\n            James shrugs appreciatively, \"I think actually making it into a game makes it easier to tackle, easier to deal with. I like it. I'd play it.\"\n\n            *goto makeADifference\n\n          #\"We need to be reminded of the consequences.\"\n            Andres grins grimly, \"Ah, so we do need that mental anguish to motivate us? Is that a good thing?\"\n\n            James looks off thoughtfully, \"I suppose that's an interesting part of the problem: enjoy blissful denial, or suffer through life with the mental anguish. Is it worth it? What if we don't ever find the solution?\"\n\n            *goto makeADifference\n\n      #\"Making a game out of dying isn't fun.\"\n        Andres cocks his head, \"I think that the whole issue of 'respecting the deathly ill' has more to do with not reminding ourselves of our own mortality than it does with actually respecting the people who are ill.\"\n\n        James points a fork towards Andres, \"I agree, but I think we're rapidly reaching the point where we'd need to ask the opinion of the kinds of people that the game would be about. If they're offended, then who are we really serving? Assholes who enjoy the suffering of others?\"\n\n        *fake_choice\n          #\"We all need the reminder, though.\"\n            James looks down at his food, \"I'm not sure that I need the reminder. I have to admit, the fear weighs on me every day. I don't think I could deal with it it, if something happened to me.\"\n\n            Andres waves his hands straight ahead, \"That is what I am talking about! I think that having a game about it would make it so that you could deal with it! So that it would seem less scary.\"\n\n            *goto makeADifference\n\n          #\"Avoiding making games about whole groups of people isn't very inclusive.\"\n            James looks down at his food, \"I hadn't thought about it that way. But you know, it was pretty frustrating for me for a long time, when there weren't any minority protagonists in video games. I mean, some had characters you could make to be black. But that was never the default. Never advertised.\"\n\n            Andres nods, \"Oh yeah, have you heard of the super old movie [i]Freaks[/i]? It flopped for actually casting real people with deformities. Apparently, those kind of people didn't deserve the basic humanity of being their own actors. But society got beyond that.\"\n          \n            *goto makeADifference\n\n          #\"Not all games are about joy.\"\n            James puts down his water, \"Well, certainly some games are about deeper subjects. Helps us explore ourselves, get out of ourselves.\"\n\n            Andres shakes his head, \"Well, but at that point it's a real tough sell. Most people don't want to deal with dark issues in their spare time. They have enough of it in real life. They want something that makes them happier.\"\n\n            *goto makeADifference\n\n          #\"I agree that it's disrespectful.\"\n            James gulps back some water before chiming in, \"Well, I'm not sure that it's inherently disrespectful. It just has to be done in a way that fully realizes their personhood, that respects their autonomy.\"\n\n            Andres shakes his head, \"But I'm not sure that you could do that without sacrificing a lot of the gameplay.\"\n\n            *goto makeADifference\n\n      #\"I think the real test would be if people in hospitals liked it.\"\n        James nods knowingly, \"You never can discount the importance of good usability testing. Plus, maybe it's something they could use to have some fun escapism.\"\n\n        Andres takes the time to recover from shoving a whole empanada into his mouth, \"Ah, but here's the thing.\" He clears his throat, \"What if hospital workers really like the game—they find it calming and centering—but then patients find it disrespectful? Who then gets the final say?\"\n\n        *fake_choice\n          #\"Anyone who feels disrespected.\"\n            James takes a break from spooning up filling to agree wholeheartedly, \"Yes, absolutely. Otherwise the apathetic majority will always push down the suffering minority.\"\n\n            Andres pushes back his plate, \"Well, now hold on. What if the bigoted majority feels disrespected by your inclusive game? You don't even know the kind of outrage there was when they started making same-sex romances standard in games. It got ridiculous.\"\n\n            *goto makeADifference\n\n          #\"The more disadvantaged group.\"\n            James takes a break from spooning up filling to agree wholeheartedly, \"Yes, absolutely. Otherwise, the apathetic majority will always push down the suffering minority.\"\n\n            Andres pushes back his plate, \"Yeah, that's true. And while it's always hard to appeal to everyone, it's more important not to screw yourself over by freezing someone out.\"\n\n            *goto makeADifference\n\n          #\"The people who enjoy the game.\"\n            Andres laughs, \"Appealing to your audience, eh? You must have a background in marketing.\"\n\n            James frowns, \"Yeah, I don't know about that. When you market only to your core audience, then shit gets offensive. Then you have to deal with PR disasters. I've seen it: not pretty.\" \n\n            *goto makeADifference\n\n          #\"Whatever sells best.\"\n            Andres laughs, \"Wow, that's even cold for me.\"\n\n            James frowns, \"Yeah, I guess it's lucky that bigotry doesn't really sell all that well in this age. But thanks for taking a stand.\" \n\n            *goto makeADifference\n\n      #\"Games with a message don't do well.\"\n        James frowns, \"I disagree. I think that the message just needs to be a relevant part of the story. Otherwise, it does end up sticking out.\"\n\n        Andres laughs, \"Yeah, I take it you've never seen a preachy movie? Games can have messages, they're just more subdued.\"\n\n        James asks you point blank, \"Isn't there a message you'd like to get across to others, to the future?\"\n\n        *fake_choice\n          #\"Yes.\"\n            James gestures positively, \"Well then, there you go.\"\n            *goto makeADifference\n\n          #\"No.\"\n            James stares at you strangely, \"Well, I guess that's your business.\"\n            *goto makeADifference\n\n    *label makeADifference\n\n    Andres shakes his head, \"I just think that we can be doing something better with our games. Better than just telling a story, or being fun. We could be making a difference.\"\n\n    *fake_choice\n      #\"You are making a difference.\"\n        Andres gives a polite smile, \"I sure hope so.\"\n\n        James grins wholeheartedly back at you, \"I'm glad to hear that you think so.\" He finishes his drink and looks around.\n\n      #\"How would you do that?\"\n        Andres looks off, \"I'm not sure. But there must be a way that we can use our influence.\"\n\n        James grins wholeheartedly, \"I think we'll figure it out. We've got the expertise. We'll figure out a way. I know it.\" He finishes off his drink and looks around.\n\n      #\"Would the games still be fun?\"\n        Andres looks at you sharply, \"Why would you think they wouldn't?\"\n\n        James smiles, \"I know it's hard to believe, but it's possible to split your focus and achieve multiple goals.\" He finishes off his drink.\n\n      #\"I think better work could be done elsewhere.\"\n        Andres shrugs, \"Maybe, charities are definitely important. But I like to think we could help too.\"\n\n        James agrees, \"The goal isn't to do better work than the charities or to even match them, but to improve things for everyone.\" He finishes off his drink and looks around.\n\n*label DinnerEndMerge\n\nYou realize somewhat suddenly that everyone's finished. You spring to, somewhat embarrassed at being caught off-guard. You revert quickly into professional mode, solidifying your smile, \"I hope everyone enjoyed dinner! Now, there's an hour of free time, and then it is lights out for the rest of the staff. You are free to stay up, of course, and if you need anything at all…\" You pause a little longer than necessary, \"I will always be on call.\"\n\nThe tourists filter out and thank you for the delicious food. Now it is time to focus on the dishes, and then your time is your own. That bad ending has been bothering you all day and you'd really like to figure it out before the designers leave.\n\n*goto GameTimeEnding\n\n*label GrantInstead\n*set ConsultantAffection +2\n\nYou go knock on Grant's door. There's no answer. He's probably sleeping. Should you enter anyway?\n\n*fake_choice\n  #\"Yes, best be sure he's okay.\"\n    *goto enterGrant\n\n  #\"Yes, I'd just like to see him.\"\n    *label enterGrant\n    You swipe in the override. He's sprawled out on his bed, snoring. You breathe a deep sigh of relief. There's an almost-empty glass of water next to his bed stand. Should you refill it for him?\n\n    *fake_choice\n      #\"Yes, it'd be a nice gesture.\"\n        *goto FillWater\n      #\"Yes, since he's feeling ill.\"\n        *label FillWater\n        You set the glass down, and he mumbles groggily, \"Thank you…\" before drifting back off to sleep. Poor guy. Well, at least he's on the road to recovery. Probably some sleep will do him good. You back out of the room before you wake him up all the way and then head down the passageway back to your room.\n      #\"No, it'd risk waking him.\"\n        *goto LeaveQuietly\n      #\"No, he can take care of himself.\"\n        *label LeaveQuietly\n        You slowly back out, before you wake him up. Poor guy. Well, you're just glad that he's on the road to recovery. Probably some sleep will do him good. You head down the passageway back to your room.\n    *goto FinalThoughts\n\n  #\"No, he's probably fine.\"\n    *goto leaveGrant\n\n  #\"No, it's not something I have to deal with.\"\n    *label leaveGrant\n    You linger around his door, trying not to worry about it. He's fine. Definitely. You back away. No problem. You head down the passageway back to your room.\n\n*label FinalThoughts\n\nThat bad ending has been bothering you all day and you'd really like to figure it out before the designers leave.\n\n*label skip-ahead\n*label GameTimeEnding\n\n*finish Time to Relax\n", "day1-luggage": "*comment Fifth part of the game\n\n*temp minorLuggageFix false\n*comment helpTarget \"none\"\n*temp cartAvailable false\n*temp pukeDone false\n*temp GrantGone false\n*temp stewardCall false\n*temp Waterdone false\n\n*comment  *goto skip-ahead\n\nYou arrive at the staterooms: only half of the rooms have suitcases in front of them. Shit. There better be more on the way, since the shuttle's already on its return trip. You grind your teeth. You shouldn't have to be dealing with this. You're supposed to only have to deal with tourist relations. Well, considering that all the luggage hasn't arrived yet, it's probably good that you're getting involved. Things always feel like they're slipping around here, but it always feels awkward speaking up about it since you have the fewest responsibilities.\n\n*label topLuggage\n\n*choice\n\n  *hide_reuse #Check the luggage that's here first.\n    One piece is sitting outside of the wrong room. You rub your fingers against your temple, trying to stave off an anxiety attack. Who delivered these? Why do you have to fix it? Sure, the other stewards have more responsibilities, but it's no excuse for treating the tourists with apathy. You take a few deep breaths to center yourself before dragging the bag in front of the correct airlock. Now there's only the problem of finding the rest of the luggage before the rest of the tourists traipse into here and think less of this place.\n    *set minorLuggageFix true\n    *goto topLuggage\n\n  #Check the unloading area.\n    You bound quickly through the passages. Could there be a problem? Could some of the luggage have gotten left accidentally on the shuttle? You'll be skinned alive if that happened. Even though it's not really your responsibility, you should have been overseeing the unloading. Halfway there, you open an airlock to see a steward nonchalantly pushing along a second batch of luggage. Well, that's a relief. Still, why is he so late?  This should have been done twenty minutes ago.\n\n    *choice\n\n      #Professionally chastise.\n        You keep it matter-of-fact, \"Listen, the group is nearly finished with their lunch. This is cutting it a little closer than I'm comfortable with. Now, I'm happy to help, or to get someone else to help.\"\n\n        His eyes deaden, and he pauses to sigh, \"Yeah sure. I just didn't realize how late it was getting. But this is the last batch of it and I'm almost there.\"\n\n        You wince. He resents you. But you get paid a whole heck of a lot to make sure things are running smoothly for the guests.\n        *goto togetherUnloadLuggage\n\n      #Politely inquire.\n        \"Cutting it a bit close, was there a problem?\" You try to keep it as light as you can, hoping it doesn't come off harshly.\n\n        His eyes deaden, and he pauses to sigh, \"Yeah sure. I just didn't realize how late it was getting. But this is the last batch of it and I'm almost there.\"\n\n        You wince. He resents you. But you get paid a whole heck of a lot to make sure things are running smoothly for the guests.\n        *goto togetherUnloadLuggage\n\n      #Offer to help.\n        \"Oh good, there you are! I though I'd lend a hand and help get these to their rooms before the group finishes their lunch.\" You keep it light and airy.\n\n        He still rolls his eyes at your anxiety, \"Yeah sure. I mean, I'm almost there, and it's just move the bags to the separate doors. But, whatever.\" Well, that was ruder than necessary. But if he had just done his job on time, you wouldn't have to be hovering like this. You get paid a lot to keep track of these things.\n        *label togetherUnloadLuggage\n        You escort him the rest of the way, with a walk-run pace that you hope appropriately encourages him to speed up.\n\n        The two of you sort through the remaining luggage, and you sigh with relief as you drop the last piece down. He pushes the cart away and tips a finger from his forehead. You wave him off, just grateful that it's just over.\n        *if (minorLuggagefix = false)\n          Thinking quickly, you do one last cursory pass on the luggage, fixing one piece was in the wrong spot. There. You lean up against a bulkhead and take a deep breath, just as the group rounds a corner.\n          *set minorLuggagefix true\n        You lean against a bulkhead with just enough time to perk up in anticipation of the group's arrival.\n\n        *goto luggageMerge\n\n      #Take over.\n        \"Oh good, there you are! Why don't you let me take the rest of these? I'm sure that they could use you over in supplies.\" You keep it light and airy.\n\n        He rolls his eyes, \"Yeah sure. I mean, I'm almost there, but if you want to, go ahead and knock yourself out.\" He strolls off.\n\n        Well, that was ruder than necessary. You just get paid a lot to keep track of things like this. You push the cart faster. After all, how hard is it to prioritize our guests? You park the cart in the guest passageway. The bags are poorly organized, and you have a bit of trouble sorting them to their proper rooms as quickly as you'd like. Just as you drop the last one in place, you hear them rounding a corner. But the cart: the cart's still here. You grab onto it and lean against it nonchalantly.\n\n        *set cartAvailable true\n\n        *goto luggageMerge\n\n  #Radio a steward.\n    Another steward responds, letting you know that he's about to arrive with the rest of the luggage, and to just hold tight. He sounds annoyed, but someone has to check on these things. Someone has to make sure that things stay professional.\n    *if (minorLuggagefix = false)\n      You take the extra time to check on the luggage. One of the pieces is in the wrong spot. Do you really have to do everything here? You take a few deep breaths to center yourself before dragging the bag in front of the correct airlock.\n    *comment endif\n\n    Then he arrives, pushing the cart at what you'd swear is the slowest pace possible. Deep breaths. Deep. Breaths. The two of you sort through the remaining luggage, and you sigh with relief as you drop the last piece down. He pushes the cart away and tips a finger from his forehead. You wave him off, just grateful that it's just over. You lean against a bulkhead with just enough time to perk up in anticipation of the group's arrival.\n\n    *goto luggageMerge\n\n*label luggageMerge\n\nYou adjust your clothes and your smile. You just need to give a few quick words before letting them go unpack their things, but you usually offer your service if they want any help. Do you emphasize your offer of help to anyone in particular?\n\n*choice\n\n  #Andres: His passion is infectious.\n    *set helpTarget \"Andres\"\n    *set helpTarget_Zhe \"he\"\n    *set helpTarget_Zir \"his\"\n    *set helpTarget_Zim \"him\"\n    *set leadAffection +3\n    *goto helpSomebody\n\n  #Diana: Her mind has a dark allure.\n    *set helpTarget \"Diana\"\n    *set helpTarget_Zhe \"she\"\n    *set helpTarget_Zir \"her\"\n    *set helpTarget_Zim \"her\"\n    *set writerAffection +3\n    *goto helpSomebody\n\n  #Sadri: Her quirks are endearing.\n    *set helpTarget \"Sadri\"\n    *set helpTarget_Zhe \"she\"\n    *set helpTarget_Zir \"her\"\n    *set helpTarget_Zim \"her\"\n    *set programmerAffection +3\n    *goto helpSomebody\n\n  #James: His sharp intellect is refreshing.\n    *set helpTarget \"James\"\n    *set helpTarget_Zhe \"he\"\n    *set helpTarget_Zir \"his\"\n    *set helpTarget_Zim \"him\"\n    *set QAAffection +3\n    *goto helpSomebody\n\n  #Ren: You'd love to figure her out.\n    *set helpTarget \"Ren\"\n    *set helpTarget_Zhe \"she\"\n    *set helpTarget_Zir \"her\"\n    *set helpTarget_Zim \"her\"\n    *set artistAffection +3\n    *label helpSomebody\n    You sugar up that smile, \"And you should find all your things here! You have an hour to unpack and get settled in, please don't hesitate to ask me if there are any problems at all, or if you find you've forgotten something. Oh, and if anyone needs assistance with their luggage, I'm happy to help!\" You smile broadly, lock eyes with ${helpTarget} and give a wink. $!{helpTarget_Zhe} looks about with surprise, but then smiles deliciously.\n\n    And then Grant raises his hand, \"I'm still feeling a bit tired, maybe from that medicine. If you could help me drag my stuff inside, I'd appreciate it.\" Well. Looks like that's that. ${HelpTarget} has already started moving in without your help.\n\n    You turn your attention to Grant, squeaking out, \"Of course!\" He waves you off and flops down onto his bed. Hm. He's not even going to lift a finger? It's not like the luggage is super light up here, but whatever. You drag in his clothing trunk and place his personal bag onto his desk, then turn to him. He's sweaty. Oh, no.\n\n    *goto pukeMerge\n\n  #Grant: He seems sweet enough.\n    *set helpTarget \"Grant\"\n    *set helpTarget_Zhe \"he\"\n    *set helpTarget_Zir \"his\"\n    *set helpTarget_Zim \"him\"\n    *set consultantAffection +3\n    You sugar up that smile, \"And you should find all your things here! You have an hour to get settled in and unpack, please don't hesitate to ask me if there are any problems at all, or if you find you've forgotten something. Oh, and if anyone needs assistance, I'm happy to help!\" You smile broadly, lock eyes with Grant and give a wink. \n\n    He raises an eyebrow, then his hand, \"I'm still feeling a bit tired, maybe from that medicine. If you could help me drag my stuff inside, I'd appreciate it.\" Perfect.\n\n    \"Of course!\" you practically sing. It'll be nice to get to know him better. He flops down exhausted as you drag in his clothing trunk. Poor guy. You consult him about his personal bag, \"Where would you like this…?\" but then you notice that he's all sweaty. Oh, no.\n\n    *goto pukeMerge\n\n  #They're all kinda cute. I'd have trouble deciding.\n    *set leadAffection +1\n    *set writerAffection +1\n    *set programmerAffection +1\n    *set ArtistAffection +1\n    *set consultantAffection +1\n    *set QAAffection +1\n    *goto helpNobody\n\n  #Nobody, I'm maintaining professional distance.\n    *goto helpNobody\n\n  #Nobody, I'd rather get to know them better first.\n    *label helpNobody\n    You sugar up that smile, \"And you should find all your things here! You have an hour to get settled in and unpack, please don't hesitate to ask me if there are any problems at all, or if you find you've forgotten something. Oh, and if anyone needs assistance, I'm happy to help!\" You smile broadly and intentionally avoid eye contact with everyone. \n\n    Grant shyly raises his hand, \"I'm still feeling a bit tired, maybe from that medicine. If you could help me drag my stuff inside, I'd appreciate it.\" Well, that's reasonable enough.\n\n    You pivot that helpful radiance his way, \"Of course!\" Your voice goes so high it cracks. He waves you off and flops down onto his bed. Hm. He he's not even going to lift a finger. It's not like the luggage is super light up here, but whatever. You drag in his clothing trunk and place his personal bag onto his desk, then turn to him. He's sweaty. Oh, no.\n\n    *label pukeMerge\n\n    He stands up and glances about, confused, \"I—uh, I uh—\" He's clearly about to be sick again. How do you handle this?\n\n    *label bathroomFirstRepeat\n\n    *choice\n\n      *hide_reuse #First thing: help him to the bathroom.\n        *gosub trial_end\n        You guide him to the bathroom, with what you hope is a soothing enough voice, \"Hey, hey, it's gonna be okay, it's gonna be okay.\" His skin has lost all complexion and face is just sopping, contorted in agony. He points to his head, \"Can you…can you…\" He wants you to hold back his hair.\n\n        *choice\n          #Hold it back professionally.\n            You hold his hair back. It's soaked with sweat, and you have to move along with his body spasms for the next five minutes. You constantly remind yourself that you are a professional and that you are paid to ensure the comfort of the guests. At least you managed to avoid getting splashed with the resulting liquid. He finally stops and lies down on the floor, gasping out a repeating apology.\n            *gosub WaterCode\n            Alright, now what next?\n            *set pukeDone true\n            *goto bathroomFirstRepeat\n\n          #Hold it back sweetly.\n            You hold his hair back. It's slicked with sweat, and you have to move along with his body spasms for the next five minutes. You constantly remind yourself that he's in need of help and understanding. At least you managed to avoid getting splashed with the resulting liquid. He finally stops and lies down on the floor, gasping out a repeating apology.\n            *gosub WaterCode\n            Alright, now what next?\n            *set pukeDone true\n            *goto bathroomFirstRepeat\n\n          #Give him a hair tie instead.\n            You fish a hair tie out of your pocket and hand it out to him. He waves it away: he can't focus on that. You make the split-second decision to tie his hair back for him and then get up a reasonable distance away. He spews liquid.\n            *gosub WaterCode\n            Alright, now what next?\n            *set pukeDone true\n            *goto bathroomFirstRepeat\n\n          #Pretend you don't understand what he's saying.\n            You maintain some distance as he spews out the lunch for the next five minutes.\n            *gosub WaterCode\n            Alright, now what next?\n            *set pukeDone true\n            *goto bathroomFirstRepeat\n\n      #Call a steward to escort him to sick bay.\n        *gosub trial_end\n        *if (pukeDone = true)\n          You try to convey the urgency of the situation as Grant stumbles into the restroom. The steward dutifully reports, \"Yeah, sure.\" Grant lies down on the cold tiles to recover. \n\n        *if (pukeDone = false)\n          You convey the urgency of the situation to the steward between Grant's gut-wrenchingly loud heaves. The steward seems unaffected, only giving out a quick, \"Yeah, sure.\" Grant lies down on the cold tiles to recover. \n        *label OnTheirWay\n\n        \"Someone's on their way,\" you report to Grant as he wraps himself around the porcelain fixture.\n\n        \"Oh, good,\" he mumbles. Then there's awkward silence. Do you chat about anything while you wait?\n\n        *set stewardCall true\n        *goto awkwardConvo\n\n        *label stewardConversationEnd        \n\n        The steward arrives. You worriedly peek out into the passageway as they leave, but the doors to the other rooms are closed: nobody else has noticed Grant's relapse. You flop into a chair with relief, then startle with a realization: Now that Grant's gone, you have a few minutes to radio ahead to sick bay without Grant overhearing. How do you handle their incompetence?\n\n        *set GrantGone true\n        *goto radioCallMerge\n\n      #Call sick bay.\n        *gosub trial_end\n\n        As you press the buttons on your walkie-talkie, Grant retches and coughs from the other room. You're fai
