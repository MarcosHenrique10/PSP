I might fudge things here and there, but nowhere near if I was just trying to do it without the game. It keeps me feeling accountable. Which, in a way, also weirds me out: what do I think I'm being held accountable to? Why can't I just be the kind of person I want to, without this external motivator?\"\n\n      #\"Just enjoy yourself if you feel like it.\"\n        He grimaces as he spoons up a bowl of oatmeal, \"That's kind of what I'm trying to avoid. Mostly. I mean, I'm pushing it with the exciting coffee. I might be on sort-of vacation, but I'm still accountable to entering the food into the system. Which, I guess is kind of weird. I mean, feeling accountable to a game? Why can't I just be accountable to myself? Why do I need this external motivator?\"\n\n    *goto AndresMerge\n\n  #\"Have some fun up here.\"\n    He gives you a \"cheers\" motion, \"Exactly! I'll have plenty of time to recoup the XP. If I make up for it later with the allowed game mechanics, then who is anyone else to judge? The game wouldn't allow me to take certain liberties if it didn't plan out way to make it up.\"\n\n    *fake_choice\n      #\"I'm certainly not judging: do what works for you.\"\n        He nods as he spoons up a bowl of oatmeal, \"I mean, it does work, but only as long as I keep my mind focused on making it work, only as long as I do it consistently. The moment I forget or um, cheat, on a meal, it stops working. But then, it really only ever worked because I wanted it to. I don't get why my brain doesn't cut out the middle step and just keep myself accountable.\"\n\n      #\"Sounds like it helps keep you focused.\"\n        He nods as he spoons up a bowl of oatmeal, \"I mean, sure, it definitely keeps me feeling accountable. But it also weirds me out: what do I think I'm being held accountable to? Why can't I just be the kind of person I want to, without this external motivator?\"\n\n      #\"Does it really help if you still end up taking allowances?\"\n        He sighs as he spoons up a bowl of oatmeal, \"I mean, I might fudge things here and there, but nowhere near if I was just trying to do it without the game. It keeps me feeling accountable. Which, in a way, also weirds me out: what do I think I'm being held accountable to? Why can't I just be the kind of person I want to, without this external motivator?\"\n\n      #\"I still think you shouldn't stress about it that much.\"\n        He grimaces as he spoons a up bowl of oatmeal, \"That's the attitude I'm kind of trying to avoid. I mean, I'm pushing it with the coffee. I might be on sort-of vacation, but I'm still accountable to entering the food into the system. Which, I guess is kind of weird. I mean, feeling accountable to a game? Why can't I just be accountable to myself? Why do I need this external motivator?\"\n\n    *goto AndresMerge\n\n  #\"I'm a gamer too, I understand.\"\n    He nods, \"Well, yeah, but AR games are still vying for respect within the gaming community. And there's a lot of traditional-minded people who are against making chores or hard work more pleasant with games. They think that there's some detriment to not going through the suffering yourself.\" He rolls his eyes.\n\n    *fake_choice\n      #\"I'm certainly not judging: do what works for you.\"\n        He nods as he spoons up a bowl of oatmeal, \"I mean, it does work, but only as long as I keep my mind focused on making it work, only as long as I do it consistently. The moment I forget or um, cheat, on a meal, it stops working. But then, it really only ever worked because I wanted it to. I don't get why my brain doesn't cut out the middle step and just keep myself accountable.\"\n\n      #\"It sounds like it's working to keep you focused.\"\n        He nods as he spoons up a bowl of oatmeal, \"I mean, it is doing that; I definitely feel accountable. But it also weirds me out:  what do I think I'm being held accountable to? Why can't I just be the kind of person I want to, without this external motivator?\"\n\n      #\"Doesn't using a game steal some of your victory, though?\"\n        He laughs as he spoons up a bowl of oatmeal, \"I mean, does it really matter if it ends up working in the end? It's definitely going better than it would if I was just doing it alone. Which is kind of weird, when you think about it. Why does the game instill this extra sense of accountability? Why can't I just be the kind of person I want to, without this external motivator?\"\n\n      #\"Doesn't it feel weird being accountable to this game?\"\n        He laughs as he spoons up a bowl of oatmeal, \"Honestly? Yes. I know it has been working for me, but I don't get why it works. Why does the game instill this extra sense of accountability? Why can't I just be the kind of person I want to, without this external motivator?\"\n\n    *goto AndresMerge\n\n  #\"Why not just eat healthy without the game?\"\n    He rolls his eyes, \"Look, don't think I haven't tried in the past. It hasn't worked. But for some reason, this helps keep me motivated, helps keep me focused. And if that helps for me, then why shouldn't I use it?\"\n\n    *fake_choice\n      #\"If it works for you, then I guess that's great.\"\n        He nods as he spoons up a bowl of oatmeal, \"I mean, it does, but then only as long as I keep my mind focused on making it work, only as long as I do it consistently. The moment I forget, or um, cheat, on a meal, it stops. But then, it really only ever worked because I wanted it to. I don't get why my brain doesn't cut out the middle step and just keep myself accountable.\"\n\n      #\"But what makes it work?\"\n        He laughs as he spoons up a bowl of oatmeal, \"Honestly? I have no idea. And that weirds me out. Why can't I just be the kind of person I want to, without this external motivator? Why can't I just tell myself to do something and stick to it?\"\n\n      #\"But it's not like the game is actually controlling anything: it's still just you.\"\n        He laughs as he spoons up a bowl of oatmeal, \"I guess it's splitting hairs at that point: I mean, the game does the calculations, but I still have to do data entry. Something in the process of keeping track helps keep me motivated. I guess the question is more what part of that process influences me: why can't I just cut out the middle step and behave how I want, without this external motivator?\"\n\n      #\"Doesn't it feel weird being accountable to this game?\"\n        He laughs as he spoons up a bowl of oatmeal, \"Honestly? Yes. I know it's been working for me, but I don't get why it works. Why does the game instill this extra sense of accountability? Why can't I just be the kind of person I want to, without this external motivator? It weirds me out.\"\n\n    *goto AndresMerge\n\n*label AndresMerge\n\n*choice\n  #\"It's a way to trick our brains into obedience.\"\n    Andres spoons some brown sugar into his oatmeal, \"Yeah, I suppose so, but that's the really creepy part: what are we tricking? If we can consciously trick ourselves with something like that, then are we not really in control of our own minds? How much of our self-determination is an illusion?\" He shudders, \"I dunno, I don't like to think about it too much.\"\n    *goto AndresFinalChoiceMerge\n\n  #\"It's a way to collect our thoughts.\"\n    Andres spoons some brown sugar into his oatmeal, \"Yeah, I suppose so, but that's the really weird part: why can't we just determine to collect our own thoughts? Why do we need to focus them, channel them, through something else? It just makes me worry about how much control, how much access we really have to our own minds. If we can't even know what we're thinking, then are we not really ourselves?\" He shudders, \"I dunno, I don't like to think about it too much.\"\n    *goto AndresFinalChoiceMerge\n\n  #\"It's kind of pathetic that it actually works on us.\"\n    Andres spoons some brown sugar into his oatmeal, \"Yeah, I know! That's the part that I can't wrap my brain around: why does it work? Why can't we just tell our brains what to do? If we don't have control of our brains, if we're not really in control of our actions, then what are we, really? How much of our self-determination is an illusion?\" He shudders, \"I dunno, I don't like to think about it too much.\"\n    *goto AndresFinalChoiceMerge\n\n  #\"Do whatever motivates you.\"\n    Andres spoons some brown sugar into his oatmeal, \"Yeah, I guess that's just about all you can do.\"\n    *goto AndresFinalChoiceMerge\n\n*label AndresFinalChoiceMerge\nHe glances at you before adding an extra spoonful to his oatmeal, \"Anyway, I'm going to cheat a little more. Don't tell the game.\" He smiles.\n\n*fake_choice\n  #\"I won't, I promise.\"\n    *set LeadAffection +1\n    He nods, \"Thanks! Partners in crime.\" He glances down at his food, \"Yeah, I'll definitely catch up my XP later.\"\n\n  #\"Do whatever is right for you.\"\n    *set LeadAffection +1\n    He nods, \"Thanks! That's a really good way to put it.\" He glances down at his food, \"Yeah, I'll definitely catch up my XP later.\"\n\n  #\"Well, I'm glad you found something that helps you.\"\n    He nods, \"Yeah, I'll definitely catch up my XP later.\"\n\n  #\"Just don't take too much food.\"\n    *set LeadAffection -1\n    He looks at his tray and closes his eyes, \"Thanks…I'll definitely keep that in mind.\"\n\nHe gazes over at the empty seats and then back at you, and opens his mouth. For a moment, you think he's going to ask you to sit down and join him. But then he glances up at the clock and notices how few minutes are left in the breakfast hour and closes his mouth into a polite smile instead. Really, you should start packing things up pretty soon anyway.\n\n*label AndresEndMerge\n\nHe parks his coffee on the tray, picks a seat, and scarfs through the meal. As he finishes and heads towards the airlock, he waves you off, \"See you later!\" You return the farewell.\n\n\n*label EndBreakfastMerge\n\nYou're left alone with all the trays to replace and the leftovers to put away. The glories of being a space tour guide. At least the moon walk is next. That's always the high point of any visit. And then tomorrow, they'll all be gone. That sinks in. Oh. Tonight's the last night you'll see any of them ever again. You feel a little empty just thinking about it. But then of course, that was always going to be the case, even if you had had a few more days together. It's just…it's such a rare treat to meet tourists who are so interesting and friendly. You'll miss it.\n\n\n*label skip-ahead\n\n*finish Clean up and Prep for the Moon Walk\n\n", "day2-exercise": "*comment Thirteenth Part of the game\n\n*temp InspectionCounter 0\n*temp exerciseNPC \"nobody\"\n*temp exerciseNPC_zhe \"zhe\"\n*temp exerciseNPC_zir \"zir\"\n*temp exerciseNPC_zim \"zim\"\n\n*temp NobodyExercise false\n*temp ExerciseLove false\n\n*comment *goto skip-ahead\n\nYou ignore the giggling from a small group of stewards, which quiets as you approach anyway. You smile and give a cordial greeting, and they return it politely enough. You make sure that they're informed of the change in lunch location before heading off to prepare for the next scheduled activity: gravity play in the gym. Their chatting roars back to life as you leave for the passageway airlock.\n\nYou enter the gym and start looking over the equipment: the climbing wall, ropes, bars, mats, trampoline, and the flying rig. It's tedious, but someone's got to do it. The whole time, the potential consequences of their merger turn over in your mind. Soon you're joined by other supervising stewards, who wait for you to finish your duties. They sit and chat, enjoying the break.\n\nYou run through the final check and glance at the clock: a few minutes over time. They're all late. Their meeting must be running even later. You really hope they don't miss this: it'll be their last official activity here. After this is just free swim time, which is optional. But then the airlock opens. Your initial flood of relief calcifies over into dread. Each of them looks pissed. The meeting did not go well. Of course, and now it's going to be your job to have to cheer them up. You make clown music in your head.\n\n*label GreetingGuests\n\n*fake_choice\n  #Enthusiastic welcome.\n    You take a deep breath and turn the smile as far up as it will go, \"Now that everyone's had a chance to get accustomed to low gravity, it's time to have some fun with it! Here, you'll have a chance to play with all the equipment you want! Bounce as high as you can go! Climb ropes in the blink of an eye! Even have fun whizzing around in our flying rig!\" \n    *goto DescriptionMerge\n\n  #Athletic welcome.\n    You take a deep breath and turn the smile as far up as it will go, \"Now that everyone's had a chance to get accustomed to low gravity, it's time to have some fun with it! The lessened gravity means that your strength will be able to pull off physical feats that your body normally couldn't. Just be sure not to go overboard: you can still pull a muscle!\" \n    *goto DescriptionMerge\n\n  #Scientific welcome.\n    You take a deep breath and turn the smile as far up as it will go, \"Now that everyone's had a chance to get accustomed to low gravity, it's time to have some fun with it! The lessened gravity means that your baseline strength will allow you pull off physical feats that your body normally couldn't.\" \n    *goto DescriptionMerge\n\n  #Safety welcome.\n    You take a deep breath and turn the smile as far up as it will go, \"Now that everyone's had a chance to get accustomed to low gravity, it's time to have some fun with it! Just be sure not to go overboard: you can still pull a muscle!\" \n    *goto DescriptionMerge\n\n*label DescriptionMerge\nYou gesture to the extra nearby stewards, \"We're all here to watch over you and make sure that nothing dangerous happens. Don't worry!\"\n\nAndres goes to the flying rig, while Grant decides to follow and watch. Diana goes for the uneven bars, and James goes for the rings. Sadri tentatively steps towards the trampolines, while Ren just sits down on the mats and swipes away at her device.\n\nWho do you help supervise?\n\n*choice\n  #Andres: the flying rig can be dangerous.\n    *set exerciseNPC \"Andres\"\n    *set exerciseNPC_zhe \"he\"\n    *set exerciseNPC_zir \"his\"\n    *set exerciseNPC_zim \"him\"\n    He holds his arms up for you to maneuver him into the rig. You help strap him into the harness, carefully tightening every buckle.\n    *if (AndresLove = true)\n      Your breath halts as you brush up against his body. You feel blood flushing your face as you try to concentrate on the safety procedure.\n    Andres looks down at the tangle of straps and laughs, \"I must look quite the sight! So…tell me, how many times have you done this before?\"\n\n    *choice\n      #\"I do it all the time.\"\n        He tugs at one of the support cords, \"Well, I'm glad to know that my life is in your professional hands.\"\n        *goto AndresMerge\n\n      #\"Not that often.\"\n        He tugs at one of the support cords, \"Well, but you've done it enough, right? I mean, well, you've probably gone through intense training to even be able to do this.\"\n        *goto AndresMerge\n\n      *if (AndresLove = false) #\"It's been awhile.\"\n        He tugs at one of the support cords, \"Well, that really doesn't reassure me? But you've been trained on it at least, right?\"\n        *goto AndresMerge\n\n      *if (AndresLove = true) #\"Never with someone so good looking.\"\n        He blushes, hiding behind one of the support cords, \"Oh well, that's not exactly what I meant, but well. You're too kind.\" He takes a moment before flirting back, \"I'm in the same situation. With someone so good looking, I mean.\"\n        *goto AndresMerge\n\n      #\"This is dangerous: we should focus on your safety.\"\n        He tugs at one of the support cords, \"Well, that's reassuring at least. That you're so focused on the job.\"\n        *goto AndresMerge\n\n    *label AndresMerge\n\n    He becomes entirely too preoccupied in straightening out his shirt that got bunched up in the rig as he speaks, \"So, I've been wondering about something if you don't mind.\" He takes a deep breath as though steeling himself, then tumbles out a question, \"Well, what I've been wondering about is…if you're really happy up here? It seems kind of…unstable. Like you never have the chance to get close to anyone.\" He adds almost as an aside, \"I'd be lonely.\"\n\n    *goto LonelyMerge\n    \n  #Grant: there might be a bad reason why he's not exercising\n    *set exerciseNPC \"Grant\"\n    *set exerciseNPC_zhe \"he\"\n    *set exerciseNPC_zir \"his\"\n    *set exerciseNPC_zim \"him\"\n    You sidle up next to Grant. He smiles at your approach, but you can clearly see by his puffy eyes and slouching posture that he's actually exhausted. He's starting to show flu symptoms. Poor guy. But he still makes an effort to be cheery, \"Hey! You going to supervise Andres's flight? I thought I'd enjoy the experience from a more…landlocked perspective. Please, join me!\" \n    *if (GrantLove = true)\n      He gestures at the same mat he's sitting on. You try not to look too excited as you sit down next to him. So close. You take a steadying breath as he scooches even closer.\n    *if (GrantLove = false)\n      You sit down nearby.\n    He tries to keep his tone light and airy, but you can hear exhaustion creeping in, \"I'm sure you've watched these tourists go crazy enjoying themselves hundreds of times. Does it ever get old?\"\n\n    *choice\n      #\"I'm happy that they're happy.\"\n        Grant leans back against a stack of mats, chuckling, \"That's what makes a good entertainer.\"\n        *goto GrantMerge\n\n      #\"It pays the bills.\"\n        Grant leans back against a stack of mats, chuckling, \"Heh, and you never get to forget it, do you?\"\n        *goto GrantMerge\n\n      #\"It all seems to run together at this point.\"\n        Grant leans back against a stack of mats, chuckling, \"Don't you know it. But everyone thinks they're special.\"\n        *goto GrantMerge\n\n      *if (GrantLove = true) #\"Well, good spectating company helps.\"\n        Grant blushes and covers it up by picking at the corner of one of the mats, \"Oh, you flatter me! I just, well, I enjoy the chance to take a break every now and then.\" He tacks on in a flirtier tone, \"And share the fun with others.\"\n        *goto GrantMerge\n\n      *if (GrantLove = false) #\"I'm more of a spectator, myself.\"\n        Grant leans back against a stack of mats, chuckling, \"It's almost like being a parent, you have to let them run the show.\"\n        *goto GrantMerge\n\n    *label GrantMerge\n\n    He becomes entirely too preoccupied with straightening out the mats he's leaning against as he speaks, \"So, I've been wondering about something if you don't mind.\" He takes a deep breath as though steeling himself, then tumbles out a question, \"Well, what I've been wondering about is…if you're really happy up here? It seems kind of…unstable. Like you never have the chance to get close to anyone.\" He adds almost as an afterthought, \"I'd be lonely.\"\n\n\n    *goto LonelyMerge\n\n  #Diana: you can break your neck if you do uneven bars improperly\n    *set exerciseNPC \"Diana\"\n    *set exerciseNPC_zhe \"she\"\n    *set exerciseNPC_zir \"her\"\n    *set exerciseNPC_zim \"her\"\n    Diana wastes no time in hoisting herself up, her torso hugging the bars. She centers herself and extends out her legs, does one loop, then a second, and then hoists herself up against them into a sitting position, triumph beaming from her face, \"I haven't been on this kind of thing since I was a kid!\n    *if (DianaLove = true)\n      But if I lose my balance and fall, you're here to catch me, right?\" She winks,\n    *if (DianaLove = false)\n      I can't believe I still remember how to do all these things!\" She laughs,\n    \"I used to think I'd go pro, but it was just a stupid kid dream. I guess that's the stuff we're all made of, right? Dreams, I mean.\"\n\n    *choice\n      #Doesn't sound like a stupid dream to me\n        She shifts her weight against the bar, \"Well, that's sweet of you. Maybe not stupid…just limited. It never made sense, I never would have been happy without something to exercise my mind.\"\n        *goto DianaMerge\n\n      #I think kids need to aim for something\n        She shifts her weight against the bar, \"Well, that's sweet of you. I guess it did help me focus and practice dedication. Or maybe that's just what I tell myself so that I justify that time spent. Who knows?\"\n        *goto DianaMerge\n\n      #But you far exceed those dreams\n        She shifts her weight against the bar, \"Well, that's sweet of you. I like to think so. I like to think that I've made the right choices in my life. After all, I really like what I'm doing, but maybe that's only me self-justifying. Who knows?\"\n        *goto DianaMerge\n\n      *if (DianaLove = true) #Certainly, it is the stuff that you are made out of\n        She blushes and looks down at the bar as she shifts her weight against it, \"Oh, you're too sweet. Well, I always have my head in the clouds at least. I guess that's a pretty similar scenario.\" She smiles, then adds, \"You're pretty dreamy yourself.\"\n        *goto DianaMerge\n\n      *if (DianaLove = false) #And now you make dreams for others\n        She shifts her weight against the bar, \"Well, that's sweet of you. I like to think so. Well, I try. I just focus on making worlds that are interesting to me at least, and then if they make others happy, that's fine with me. Who knows?\"\n        *goto DianaMerge\n\n    *label DianaMerge\n\n    She looks down at the mat as she mechanically drops herself down from the bars, \"I guess what I'm really wondering is, are you happy here? Was this always your dream? Doesn't it get lonely up here? Don't you ever want something else from life?\" She adds almost as an aside, \"I know I would.\"\n\n    *goto LonelyMerge\n\n  #James: you can dislocate your shoulder pulling up on the rings\n    *set exerciseNPC \"James\"\n    *set exerciseNPC_zhe \"he\"\n    *set exerciseNPC_zir \"his\"\n    *set exerciseNPC_zim \"him\"\n    James dusts his hand in some chalk and claps them.\n    *if (JamesLove = true)\n      He pauses a moment to strike a ridiculous \"strong man\" pose for you before grabbing onto each ring.\n    *if (JamesLove = false)\n      He grabs onto each ring and takes a moment to glance over at the instruction diagrams nearby.\n    He pulls himself up, with what is still some amount of effort. He looks at you, proud, \"Heh! I've always wanted to do this!\" He looks around, \"Well, but now that I'm up here, I have no idea what to do next. There's not a lot of mobility with this activity. I think I'd get bored, just sticking in one place. What else are you supposed to do with rings?\"\n\n    *choice\n      #\"Loops, at least that's what the pro's do.\"\n        James looks a bit put-off, \"Well, that might be a bit beyond me.\" He jumps down instead.\n        *goto JamesMerge\n\n      #\"Move your legs like this…\"\n        He moves his legs in scissors, in reverse sit-ups, then even does an armwise split with the rings. \"Well, you're right. That killed thirty more seconds. I think rings just don't have enough repetition incentive.\"\n        *goto JamesMerge\n\n      #\"Whatever you want.\"\n        He laughs, \"You don't even know, do you?\" He moves his legs in scissors, in reverse sit-ups, then even does an armwise split with the rings. \"Well…that killed thirty more seconds. I think rings just don't have enough repetition incentive.\" He jumps down.\n        *goto JamesMerge\n\n      *if (JamesLove = true) #(Teasingly) \"Trust QA to choose an activity they dislike.\"\n        He laughs, moving down into armwise splits, \"Well, it's not my fault that I have standards! I'm just saying, I wouldn't buy this game.\" He jumps down and walks towards you, \"Besides, what does it mean for you that I find you fun?\"\n        *goto JamesMerge\n\n      *if (JamesLove = false) #\"Cut them down and we'll play a game of ring toss instead.\"\n        He laughs, moving down into armwise splits, \"Well, that certainly sounds like a lot more fun to me. You going to win me a kewpie doll?\" He jumps down.\n        *goto JamesMerge\n\n    *label JamesMerge\n\n    He makes a show of examining the chalk on his hands, \"So, I've been wondering about something if you don't mind.\" He takes a deep breath as though steeling himself, and then tumbles out a question, \"I guess what I'm wondering is, don't you get bored? How do you keep each day from falling into the next? You must go stir crazy up here. Or even get lonely?\" He adds almost as an aside, \"I know I would.\"\n\n    *goto LonelyMerge\n\n  #Sadri: even with padding, you can still cut yourself on the trampoline springs\n    *set exerciseNPC \"Sadri\"\n    *set exerciseNPC_zhe \"she\"\n    *set exerciseNPC_zir \"her\"\n    *set exerciseNPC_zim \"her\"\n    You watch as Sadri takes some tentative bounces, then some larger ones. She gasps, then her face brightens as she slows down, \"Oh, what?\" She stops bouncing and fixates on you as a sounding board, \"I thought it wouldn't make a difference! I mean, equal and opposite reactions, it means I shouldn't bounce higher.\" She takes a moment to puzzle, \"But then I guess you also add your own effort as force. It's not only based on weight. I didn't think about that.\" She looks at you more intently, \"That must happen to you a lot. People assuming they just know how things must work for you up here. It must get tiring.\"\n\n    *choice\n      #\"Yeah, most people don't really think about it.\"\n        Sadri nods, \"Oh, yes. I mean, we've never had to deal with it in our real lives. I mean, our terran lives. Gosh, even I'm doing it. I suppose that's how it is.\"\n        *goto SadriMerge\n\n      #\"It's just part of the experience of being up here.\"\n        Sadri nods, \"I suppose so, but it has to get exhausting. I bet there's something you have to always explain or ignore each time it gets brought up. Like, how you sleep or something. I don't know.\"\n        *goto SadriMerge\n\n      #\"It's a bunch of little things.\"\n        Sadri nods, \"I'm sure. Just everyday annoyances, missing pieces. I know how that feels.\"\n        *goto SadriMerge\n\n      *if (SadriLove = false) #\"I'm glad you thought about it.\"\n        Sadri nods, \"Well, I do enjoy figuring out how things work. I mean, I like to consider other people.\"\n        *goto SadriMerge\n\n      *if (SadriLove = true) #\"True, not all the tourists are as intelligent and perceptive as you are.\"\n        Sadri giggles and blushes, \"Oh, well, you…I just took physics as part of my computer science degree. And I was trying to apply it, but even I messed it up. I didn't think about everything. And then I thought what that must mean for you.\"\n        *goto SadriMerge\n\n    *label SadriMerge\n\n    She bounces towards you and sits down on the stretched tarp, \"So, I've actually been thinking about it a lot: what it must be like when you work with all these people who don't—can't—understand what your daily life is like. Who are just wrapped up in their own cares and assumptions. It must be isolating up here. It must get lonely.\" She adds almost as an aside, \"I'd get lonely.\"\n\n    *goto LonelyMerge\n\n  #Ren: she's actually sitting in a good spot where you can easily supervise everyone else\n    *set exerciseNPC \"Ren\"\n    *set exerciseNPC_zhe \"she\"\n    *set exerciseNPC_zir \"her\"\n    *set exerciseNPC_zim \"her\"\n    You sit down on the mats next to her. She sighs with satisfaction, \"…and save!\" as she jams her finger at a large button. She hands you the device, \"Finished!\"\n\n    *if (RenLove = true)\n      It's tion.\"\n        *goto RenMerge\n\n    *label RenMerge\n\n    She sits back up straight, focusing on trying to find a comfortable position before tumbling into a series of questions, \"But I have to say…this place, I don't know how many drawings I could actually get out of it. How do you find it here? Don't you ever get bored? Stir-crazy? Lonely?\" She adds almost as an aside, \"I'd get lonely.\"\n\n    *goto LonelyMerge\n\n  #I'll leave the one-on-one supervision up to the other stewards\n    *set NobodyExercise true\n    You sit in the \"lifeguard chair\" that affords a view of everyone. You supervise as Andres is strapped into the flying harness and Grant continues to chat his ear off. Diana plays with the uneven bars like a pro. She must have taken gymnastics when she was younger. James jumps up on the rings for a minute, then gets bored and joins Sadri jumping on the trampoline. They both laugh uproariously about something. Ren swipes for a minute or so before actually putting her device away and watching the others. \n\n    Andres is hoisted into the air and has a fun time pretending like he's zooming around as one of the stewards moves the controls about. Diana tries more and more complicated flips, while the bored pair of Sadri and James move on to the ropes, seeming much more satisfied with this activity. Ren tucks her device into her pocket and actually approaches the trampoline. She gives it a few experimental jumps, but seems uncertain about going higher.\n\n    *goto WereFucked\n\n*label LonelyMerge\n\n*if ((AffectionLove = true) and (exerciseNPC = MaxAffectionTarget))\n  *set ExerciseLove true\n\n*choice\n  #\"I do get lonely sometimes.\"\n    Saying it aloud makes it sink in that much more. Lonely. Alone. ${exerciseNPC} interjects, \"I'm sorry,\" but your mind is caught up in itself. That loneliness has always been there, weighing you down.\n\n    You turn back to ${exerciseNPC_zim} and give a weak smile, \"Oh, I'll figure something out.\"\n    *goto down and smile, \"Hey, I'm glad too.\"\n\n    *if (ExerciseLove = false)\n      ${ExerciseNPC} seems to identify with that, \"Well, I'm glad that you found something that works for you. I know I wish I had more time for myself.\"\n\n      You stuff that loneliness down and smile, \"Hey, that's what space is for.\"\n    *goto WereFucked\n\n  #\"No, I was just as isolated from society down there.\"\n    *if (ExerciseLove = true)\n      ${ExerciseNPC} reaches out and puts a hand on your arm, \"I'm sorry you went through that kind of isolation. But, you know, it's not all bad down there. I mean, just don't write us all off.\" $!{ExerciseNPC_zhe} pauses, then finishes it out, \"Well, for what it's worth, I'm glad I got to meet you.\" \n\n      You stuff that loneliness down and smile, \"Hey, I'm glad too.\"\n\n    *if (ExerciseLove = false)\n      ${ExerciseNPC} seems to identify with that, \"I'm sorry I pried, but I'm glad that you found something that works for you.\" \n\n      You stuff that loneliness down and smile, \"Hey, that's what space is for.\"\n    *goto WereFucked\n\n  #\"No, with the paycheck for being up here, I'll be able to retire early.\"\n    *if (ExerciseLove = true)\n      ${ExerciseNPC} reaches out and puts a hand on your arm, \"Well, just don't get so caught up with the destination that you don't get to enjoy your life.\" $!{ExerciseNPC_zhe} pauses, then finishes it out, \"And, for what it's worth, I'm glad I got to meet you.\" \n\n      You stuff that loneliness down and smile, \"Hey, I'm glad too.\"\n\n    *if (ExerciseLove = false)\n      ${ExerciseNPC} seems to identify with that, \"Well, at least you've got a plan, and I'm glad that I got the chance to meet you.\" \n\n      You stuff that loneliness down and smile, \"Hey, I'm glad too.\"\n    *goto WereFucked\n\n  #\"I'd rather not answer.\"\n    ${ExerciseNPC} is initially taken aback, but then immediately apologetic, \"I'm sorry I pried.\" \n\n    You stuff that loneliness down and smile, \"Hey, don't worry about it.\"\n    *goto WereFucked\n\n*label WereFucked\n\nYour walkie-talkie buzzes. You glance down at it: a hull breach notification. Your lungs arrest themselves. Your face drops and your eyes widen. Your first instinct is to cover this up. Throw the device and break it. You take a deep breath and reassure yourself:\n\n*temp Handle true\n*temp Professional true\n*temp Prepared true\n*temp Know true\n*temp SecondTimer 0\n\n\n*label ExtraFucked\n*if SecondTimer = 1\n  Well, but is that really true?\n\n*if SecondTimer = 2\n  You're even less certain the more you insist on it.\n\n*if SecondTimer = 3\n  You feel more and more paralyzed here, trying to convince yourself into confidence.\n\n*if SecondTimer = 4\n  It's time you were honest with yourself.\n\n*choice\n  *hide_reuse #I can handle this.\n    *set Handle false\n    *set SecondTimer +1\n    *goto ExtraFucked\n\n  *if (Handle = false) #I can't handle this.\n    *goto FreakOut\n\n  *hide_reuse #I'm a professional.\n    *set Professional false\n    *set SecondTimer +1\n    *goto ExtraFucked\n\n  *if (Professional = false) #I'm not a real professional.\n    *goto FreakOut\n\n  *hide_reuse #I've prepared for this.\n    *set Prepared false\n    *set SecondTimer +1\n    *goto ExtraFucked\n\n  *if (Prepared = false) #I haven't prepared for this.\n    *goto FreakOut\n\n  *hide_reuse #I know what to do.\n    *set Know false\n    *set SecondTimer +1\n    *goto ExtraFucked\n\n  *if (Know = false) #I don't know what to do.\n    *goto FreakOut\n\n\n*label FreakOut\n\nYou take a breath again after what feels like an hour. Your mind starts to run off with itself. A hull breach. From what? A meteoroid? Probably. You curse at your bad luck. That shouldn't happen, shields should be raised when meteoroids are spotted. This shouldn't be happening. The tourists are literally going to kill you.\n\nYour walkie-talkie buzzes again. It's Maselle. No doubt calling to tell you what you already know.\n*if (NobodyExercise = false)\n  ${exerciseNPC} looks at you concerned, \"What is it?\" Shit, you forgot you were near anybody. You can't keep a positive front up around them. You have to get away, now.\n\n  *fake_choice\n    #\"It's nothing.\"\n    #\"It's just a small notification.\"\n    #\"Don't worry about it.\"\n    #\"Sorry, I have to take this.\"\n  You mumble out the excusing words and dash away to privacy.\n\nYou press \"Accept\" and jam the receiver against your face while trying to avoid nervous pacing. Still have to maintain some semblance of competence.\n\nMaselle drawls out, \"Yeahhh, sorry about that. Some meteoroids peppered the base, nothing too serious. We'll just need to do a surface evacuation.\"\n\n*fake_choice\n  #\"What the hell happened?\"\n    You can hear her sucking in air on the other side before the answer comes, \"Well…we received a low-level threat warning of meteoroids. But you know…if we had raised the shields…\" You mentally slap your forehead. Of course. If the shields had been raised, the evacuation shuttle wouldn't have docked: standard safety procedures. It's all about that fucking early evacuation. She continues justifying the decision, \"I mean, it was really low risk, and evacuating them was the first priority.\" You hiss inside your head, [i]'No it fucking was not.'[/i]\n    *goto MaselleArgumentMerge\n\n  #\"Are we okay?\"\n    You can hear her sucking in air on the other side before the answer comes, \"Well…oh yes, we're fine. Just a small peppering of meteoroids. Only two rooms hit, with nobody even in them. No problem. And the meteoroid warning's over now, so we should totally be fine. So down to the evacuations: you'll have to walk them over to our neighbors.\"\n    *goto WeOK\n\n  #\"Procedure says we retreat everyone to the bunker.\"\n    *goto EvacuateWhat\n\n  #\"What do you mean exactly by 'surface evacuations?'\"\n    *label EvacuateWhat\n    You can hear her sucking in air on the other side before answering, \"Well…I know procedure says that we retreat everyone to the underground shelter, but I want you to evacuate them to our neighbors. They had a shuttle docked there when the meteoroid warning hit and they're going to give our tourists a lift back.\"\n\n    *label WeOK\n\n    *fake_choice\n      #\"Wait.…there was an meteoroid warning and we still got hit?\"\n        Maselle takes even longer to answer this question,\n        *goto shieldExplanation\n\n      #\"Why wasn't I informed of the meteoroid warning?\"\n        Maselle spits out defensively, \"Well, you know, I don't tell you people everything that's going on! I'm busy with running the place!\"\n\n        You press the issue, \"Yeah, but protocol says…\"\n\n        Maselle interrupts,\n        *goto shieldExplanation\n\n      #\"Why weren't our shields raised?\"\n        Maselle takes even longer to answer this question, \n        *label shieldExplanation\n        \"Yeaaah…here's the thing, it was a really low-level threat, so you know…\" You mentally slap your head. If the shields had been raised, the evacuation shuttle wouldn't have docked: standard safety procedures. It's all about that fucking early evacuation. She continues justifying the decision, \"I mean, it was really low risk, and evacuating them was the first priority.\" You hiss inside your head, [i]'No it fucking was not.'[/i]\n\n      #\"How the hell am I supposed to sell them on that?\"\n        Maselle replies airily, \"Just…don't mention the meteoroid warning.\" Of course. Maselle ignored the meteroid warning and didn't raise shields because then the evacuation shuttle wouldn't have docked: standard safety procedures. It's all about that fucking early evacuation. She continues justifying the decision, \"I mean, it was a super low-level risk and evacuating them was the first priority.\" You hiss inside your head, [i]'No it fucking was not.'[/i]\n\n*label MaselleArgumentMerge\n\n*choice\n  #\"Procedure says that we keep everyone bunkered up here.\"\n    *goto bunkerHereChoice\n\n  #\"I think that we'd be better off keeping everyone bunkered here.\"\n    *label bunkerHereChoice\n    Maselle sighs into the microphone, causing crackling artifacts, \"Listen…it's cute that you think you have a choice in this. But I'm your boss, and if you don't do it, then I'll just have you put in the brig and ask someone else, someone lower and less competent, to do it for you. The meteoroid warning's over, and we need them all gone. Understood?\" Then the connection is severed. Well, now to tell everyone that we're all fucked. Great.\n    *goto FuckedMerge\n\n  #\"I disagree, but I'll go along with it.\"\n    *goto EvacuateChoice\n\n  #\"Fine, if you think an evacuation is best.\"\n    *label EvacuateChoice\n    You can hear a sigh of relief from Maselle, \"Great! I know it's risky, but I really think that giving them a clear goal and something to focus on will really bring them all together and make them easier to work with. You won't have to deal with a stir-crazy panic. And anyway, the warning's over, and we need them all gone. Now, I know that if anyone can lead them out of this, it's you. Good luck!\" The connection is severed, and then nearly immediately after, you receive a smiley face text from Maselle. Great. Now to tell everyone that we're all fucked.\n    *goto fuckedMerge\n\n*label skip-ahead\n\n*label fuckedMerge\n\n*finish We're All Fucked\n", "day2-lunch": "*comment Thirteenth part of the game\n\n*temp ProjectMentioned false\n\n*comment *goto skip-ahead\n\nAs you start to head back, your walkie-talkie buzzes with a message from Maselle. You steel yourself before reading it: \"So, their meeting is running long and they'll need you to cater their lunches to the meeting room. Got it?\" Well, that's not so bad, and certainly makes sense. You reply in the affirmative.\n\nYou head on over to the kitchen and fill up the cart with trays—baked polenta, fried RepliMeat calamari, and individually-ordered pizzas, with a single wine bottle and some chilled dessert. You hum as you push the cart down the passageway.\n\nYour pleasant mood deflates as you open the airlock and everyone eye-daggers at your intrusion. They turn back to each other and there are a few attempts to restart whatever conversation was going on, but each sentence trails off before it even starts. This is definitely not a place you'd like to stay long.\n\n*fake_choice\n  #Keep your head down and avoid drawing attention.\n    You succumb to their stares and cower, which blissfully deflects their attention. They transition from glaring awkwardly to fiddling with papers and pens. You take your sweet time unpacking the cart, relieved at the reprieve from attention. After you can delay it no longer, you focus on the service.\n\n  #Just serve out the food quickly.\n    You pull out the cutlery sets and glasses, holding them up on display for everyone as excuses for your presence. They seem to accept it.\n\n  #Raise spirits by enthusing about the food.\n    You do your best to deflect their negative influence and cheerfully announce the meal: Italian food! Everybody loves Italian food! You think you manage to tilt the mood of the room more towards awkward pity for you, which is at least some improvement. You dial back the enthusiasm and focus on service.\n\n  #Prod about what's going on.\n    You try to bring the mood of the group back up, \"How's it going in here?\" But you only get a round of noncommittal one-word replies. Not well, it would seem.\n\nAs you start placing appetizers and drinks, ${Villain} finally resumes their discussion. $!{Villain_zhe} points at ${MaxAffectionTarget}, \"Now, I think that ${AffectionTarget_zhe} has some good points,\n*if MaxAffectionTarget = \"Andres\"\n  namely how much control we will lose over the direction of our games,\n*if MaxAffectionTarget = \"Diana\"\n  namely how much control we will lose over our creative direction,\n*if MaxAffectionTarget = \"Sadri\"\n  namely how much backwards compatibility we will lose by switching our base code,\n*if MaxAffectionTarget = \"James\"\n  namely how incorporating into a larger schedule will affect our quality,\n*if MaxAffectionTarget = \"Ren\"\n  namely how much control we will lose over our artistic direction,\n*if MaxAffectionTarget = \"Grant\"\n  that transition is always tough,\nbut I really think that we should be focusing on all the positive things that we all will gain by this transition.\n*if Villain = \"Andres\"\n  It's a lot of pressure for me to be responsible for everyone; I'd like a bigger safety net that allows me—and all of you—to relax.\"\n*if Villain = \"Diana\"\n  I know I have all these ideas, these directions, but I never get to pursue them because they're so far outside of our budget.\"\n*if Villain = \"Sadri\"\n  I know for me, it's exhausting, trying to hack our old engine to do the new and exciting things you all want it to do. I want more resources.\"\n*if Villain = \"James\"\n  I know I can't keep this up, without bigger teams of testers. Internal ones, not outsourced.\"\n*if Villain = \"Ren\"\n  I'd know I'd like to focus more on high-level concept art and direction.\"\n*if Villain = \"Grant\"\n   I know that you might not think that my opinion matters, but I'd really like for Synthplay to provide you with the resources you need to make your dreams reality.\"\n\n*if (Villain = \"Grant\")\n  Andres sighs, \"I'm not sure that we're covering anything new. I'm still not willing to commit with so many unknowns up in the air. Especially if we're going to move forward on this project.\" Grant looks at you nervously at the mention of the word \"project.\"\n\n*if (Villain != \"Grant\")\n  Grant sighs, \"I'd prefer to move on to hammering out contract details, not rehashing cold feet arguments. Especially if we're going to move forward on this project.\" Andres looks at you nervously at the mention of the word \"project.\"\n\nWhoa, they haven't even decided whether or not they're going to be joining up with Synthplay? You start serving out the individual dishes. You haven't given much thought to the planned merger, but now that the deal is at such a precarious tipping point, you're not sure exactly what kind of outcome you'd prefer more.\n\n*fake_choice\n  #They should join: their games would improve.\n    The resources would be good for them. You're excited to see their new directions, their new worlds. The kinds they're not able to make on an indie budget right now.\n\n  #They should join: their lives would be easier.\n    The resources would be good for them. They can't take risks, always have to live from game to game, and that's stressful. They deserve the chance to have a break.\n\n  #They shouldn't join: their games would homogenize.\n    They'll get more resources, but also more overhead, more oversight. They'll be forced to deliver, and that means broadening their appeal and watering them down.\n\n  #They shouldn't join: their lives would be more difficult.\n    They'll get more resources, but also more overhead, more oversight. They'll lose that ability to feel like they're in control of their lives. You know how it is with Spacejoy; it'll end up being the same with Synthplay.\n\n  #You're not certain how you feel about it.\n    But you're sure that they'll figure it out.\n\n  #It's not really your business, even to muse about internally.\n    You're sure that they'll figure it out; they definitely don't need your opinion on the matter.\n\n  #You're just really curious what the project is.\n    But you're sure you'll find out eventually.\n\nYou set aside the nitrogen-cooled tiramisu dessert, then pack up your cart and head towards the airlock. $!{MaxAffectionTarget} watches you pack up your things, then casually stands up and stretches, \"I'm going to take a bathroom break. I'll be right back.\" ${AffectionTarget_zhe} pushes ${AffectionTarget_zir} fork around and then slowly heads towards the same airlock you're exiting.\n\nYou push your cart slowly along the passageway, and almost immediately, ${AffectionTarget_zhe} waves you down, \"Hey, sorry our meeting's going so long. I was looking forward to you joining us all again. You've got some interesting thoughts.\"\n\n*fake_choice\n  #\"I was looking forward to it too.\"\n    *if (AffectionLove = true)\n      ${MaxAffectionTarget} blushes, then recovers, \"Well, there's the whole rest of the week to get to chat about things, right?\"\n    *if (AffectionLove = false)\n      ${MaxAffectionTarget} shrugs, \"Well, there's the whole rest of the week to get to chat about things, right?\"\n    You do you best to affirm that fact, but your cheerful lying skills are stretched to their limit.\n\n  #\"There will be more chances.\"\n    *if (AffectionLove = true)\n      ${MaxAffectionTarget} blushes, then recovers, \"That's right, there's the whole rest of the week to get to chat about things. I'm looking forward to it.\"\n    *if (AffectionLove = false)\n      ${MaxAffectionTarget} shrugs, \"That's right, there's the whole rest of the week to get to chat about things. I'm looking forward to it.\"\n    You do you best to affirm that fact, but your cheerful lying skills are stretched to their limit.\n\n  #\"Don't worry about it.\"\n    *if (AffectionLove = true)\n      ${MaxAffectionTarget} smiles, \"Aw, you're sweet. Anyway, there's the whole rest of the week to get to chat about things, right?\"\n    *if (AffectionLove = false)\n      ${MaxAffectionTarget} smiles, \"Thanks for understanding. Anyway, there's the whole rest of the week to get to chat about things, right?\"\n    You do you best to affirm that fact, but your cheerful lying skills are stretched to their limit.\n\n  #\"It sounds like the meeting needs all that extra time.\"\n    ${MaxAffectionTarget} grimaces, \"Yeah, it's going pretty rough in there. To be honest, I'm really glad for the excuse to walk out and get some air.\" $!{AffectionTarget_zhe} glances at an oxygen vent, \"Well, some space to think, at least.\"\n\n$!{AffectionTarget_zhe} turns to you, face scrunched in thought, \"What about you? Do you think \n*if (MaxAffectionTarget = \"Grant\")\n  Synthplay should go through with the acquisition?\"\n*if (MaxAffectionTarget != \"Grant\")\n  we should join up with Synthplay?\"\n\n*choice\n  *if (MaxAffectionTarget != \"Grant\") #\"I think you should join.\"\n    *set SynthSupported true\n    ${MaxAffectionTarget} barely even registers your opinion\n    *goto JoinQuestionMerge\n\n  *if (MaxAffectionTarget = \"Grant\") #\"I think they should join you.\"\n    *set SynthSupported true\n    ${MaxAffectionTarget} barely even registers your opinion\n    *goto JoinQuestionMerge\n\n  *if (MaxAffectionTarget != \"Grant\") #\"I don't think you should join.\"\n    *set SynthHated true\n    ${MaxAffectionTarget} barely even registers your opinion \n    *goto JoinQuestionMerge\n\n  *if (MaxAffectionTarget = \"Grant\") #\"I don't think you should go through with the acquisition.\"\n    *set SynthHated true\n    ${MaxAffectionTarget} barely even registers your opinion \n    *goto JoinQuestionMerge\n\n  #\"Do whatever you think is best.\"\n    ${MaxAffectionTarget} appreciates your encouragement\n    *goto JoinQuestionMerge\n\n  #\"It's not my place to say.\"\n    ${MaxAffectionTarget} accepts your reservations\n    *goto JoinQuestionMerge\n\n*label JoinQuestionMerge\nand continues musing aloud, \"I want to think that it would be good for the company, and good for our future.\n*if (MaxAffectionTarget = \"Andres\")\n    I know for me, it's so stressful being financially responsible for everyone's job. I always feel like we're one bad game away from going bust. But it feels like the easy way out, to just join up with Synthplay. Will we lose something special if we do?\"\n*if (MaxAffectionTarget = \"Diana\")\n    I know for me, it's so frustrating having these crazy worlds in my mind, but lacking the financial support to make them a reality. I'm always having to settle. But joining up with Synthplay? It feels like the easy way out. Will we lose something special if we do?\"\n*if (MaxAffectionTarget = \"Sadri\")\n    I know for me, it's frustrating being yolked with this old, crappy engine. I want something that's better designed, more cutting edge. I've hit the limit on what I can hack together. But it feels like the easy way out, to just join up with Synthplay. Will we lose something special if we do?\"\n*if (MaxAffectionTarget = \"James\")\n    I know for me, it's frustrating being yolked with so many testing responsibilities, and I can't catch everything; I can't keep everything together in my mind. But it feels like the easy way out, to just join up with Synthplay. Will we lose something special if we do?\"\n*if (MaxAffectionTarget = \"Ren\")\n    I know for me, it's frustrating having to deal with mundane art tasks. I want to focus more on creative visions. But it feels like the easy way out, to just join up with Synthplay. Will we lose something special if we do?\"\n*if (MaxAffectionTarget = \"Grant\")\n  I know for me, I want to facilitate them making themselves the best they can be. But it feels like something that will stir up controversy, them joining up Synthplay. Will fans just lose faith in them? Will it be for nothing?\" He smiles, \"I guess…I guess I'm just nervous. But I shouldn't be. Fans will love the new project, the new direction.\"\n*if (MaxAffectionTarget != \"Grant\")\n  $!{AffectionTarget_zhe} smiles, \"I guess…I guess I'm just nervous. But I shouldn't be. It'll be worth it, to be able to do this new project.\"\n\n*choice\n  #\"I hope things go well for you.\"\n    *if (MaxAffectionTarget = \"Grant\")\n      ${MaxAffectionTarget} puts ${AffectionTarget_zir} hands lightly against ${AffectionTarget_zir} head, \"I certainly hope so too.\"\n    *if (MaxAffectionTarget != \"Grant\")\n      ${MaxAffectionTarget} puts ${AffectionTarget_zir} hands lightly against ${AffectionTarget_zir} head, \"I guess I just need to figure out what that means for me.\"\n    *goto AdviceMerge\n\n  #\"I hope things go well for your companies.\"\n    ${MaxAffectionTarget} puts ${AffectionTarget_zir} hands lightly against ${AffectionTarget_zir} head, \"I guess I just need to figure out what that means.\"\n    *goto AdviceMerge\n\n  #\"I hope things go well, and, uh, what's the project?\"\n    ${MaxAffectionTarget} snorts out a laugh, \"Subtle! Well, I still appreciate your support. As for the project, well, it's still pretty secret. I will say that it has to do with better empowering the player: offering them more choices and better story potential. But I can't really say more than that. I hope you understand. But I think it'll be really big. The next big thing, for sure.\"\n    *goto AdviceMerge\n\n  #\"So…what's the project?\"\n    ${MaxAffectionTarget} snorts out a laugh, \"Oh, yeah, the project. Well, it's still pretty secret. I will say that it has to do with better empowering the player: offering them more choices and better story potential. But I can't really say more than that. I hope you understand. But I think it'll be really big. The next big thing, for sure.\"\n    *goto AdviceMerge\n\n  *if (MaxAffectionTarget != \"Grant\") #\"Just don't make the wrong decision.\"\n    ${MaxAffectionTarget} snorts out a laugh, \"Thanks! No pressure, eh? Glad to know that I can count on someone to help me relax and get some perspective.\"\n    *goto AdviceMerge\n\n  *if (MaxAffectionTarget = \"Grant\") #\"Just don't screw it up.\"\n    ${MaxAffectionTarget} snorts out a laugh, \"Thanks! No pressure, eh? Glad to know that I can count on someone to help me relax and focus on what I need to get done.\"\n    *goto AdviceMerge\n\n*label AdviceMerge\n\n$!{AffectionTarget_zhe} shakes it off, \"I guess I should actually go to the bathroom and get back in there, before they get suspicious.\" \n*if (AffectionLove = true)\n  $!{AffectionTarget_zhe} hesitates and looks you in the eyes. $!{AffectionTarget_zhe} catches ${AffectionTarget_zir} breath, grins, waves, and then bounds off, leaving you with the empty cart.\n*if (AffectionLove = false)\n  $!{AffectionTarget_zhe} bounds off, leaving you with the empty cart.\n\n\n*label skip-ahead\n\n*finish Finish Your Chores\n", "day2-moonwalk": "*comment Tenth Part of the Game\n\n*comment The GOTO SKIP AHEAD is further down so that you calculate out an affection target.\n\n*temp target_roll 1\n\n*temp SuitTarget \"nobody\"\n*temp SuitTarget_zhe \"zhe\"\n*temp SuitTarget_zir \"zir\"\n*temp SuitTarget_zim \"zim\"\n*temp Tiebreaker false\n\n\nEven though you just did it yesterday, you inspect everyone's suits again. You text a notification to the group that the moon walk is ready, and they all show up promptly. This really is an amazing group. They're even wearing the right outfits: full coverage clothing and long socks. You put out the ping on your walkie-talkie that suiting assistance will soon be needed. This will be the smoothest moon walk yet.\n\nYou stand up to address the group. What do you emphasize in the safety briefing?\n*fake_choice\n  #The danger.\n    You clear your throat and address the crowd, \"Listen, this is definitely one of the most fun parts of your stay here, but it's also the most dangerous. Being on the dark side of the moon makes for some amazing stargazing, but it also makes moonwalking that much more dangerous.  Keep within the bounds of the field lights.\n  #The fun.\n    You clear your throat and address the crowd, \"Listen, this is definitely one of the most dangerous parts of your stay here, but it's also the most fun. You'll get to wear a spacesuit, leave footprints in the moon dust, and—my personal favorite—see the night sky on the dark side of the moon. We will be taking pictures to memorialize the experience. But in order for everything to go smoothly, you need to stay within the bounds of the field lights. \n  #How the suits work.\n     You clear your throat and address the crowd, \"Listen, this is definitely one of the most fun parts of your stay here, but it's also the most dangerous. Your suits protect you against the freezing environment, cosmic radiation, and, of course, the lack of atmosphere. We're on the dark side of the moon, so while you do have a powerful helmet light, please stay within the bounds of the field lights. The packs have hours of oxygen on them, and I will be monitoring your reserves on my own readout.\n  #Just follow my lead.\n    You clear your throat and address the crowd, \"Listen, this is definitely one of the most fun parts of your stay here, but it's also one of the most dangerous. Don't go off on your own: don't leave the bounds of the field lights. Follow all instructions that you are given.\n*comment endif\n\n\"There will be several Spacejoy employees out walking with us. If anything goes poorly, or even if you'd just like to stop early, one of us will be happy to escort you back. The outside entrance has a large panel button to open it, no keys or codes required.\"\n\nThey all nod and look around for what to do next. You gesture around to the arriving stewards, \"Like putting on medieval armor, myself and the other stewards will help you get into your suit, to make sure it's all fixed up. Then we'll get suited ourselves, and after a quick systems and pressure check, we'll be on our way!\"\n\n*comment THIS WILL CALCULATE THE CURRENT MAX AFFECTION TARGET. IT WILL THEN BE OVERWRITTEN IF THE PLAYER CHOOSES SOMEONE ELSE AND HAS ENOUGH AFFECTION THAT THIS PERSON IS A VIABLE CHOICE. IF AFFECTION IS NOT GREAT ENOUGH, THEY WILL ONLY COUNTED AS A FRIEND. IF THERE IS NOBODY WITH ANY AFFECTION, IT WILL RANDOMLY SELECT AND THAT PERSON WILL STILL BE A FRIEND.\n\n\n*if (((((leadAffection > WriterAffection) and (leadAffection > ArtistAffection)) and (leadAffection > ProgrammerAffection)) and (leadAffection > QAAffection)) and (leadAffection > ConsultantAffection))\n  *goto MaxTargetAndres\n\n*if (((((WriterAffection > leadAffection) and (WriterAffection > ArtistAffection)) and (WriterAffection > ProgrammerAffection)) and (WriterAffection > QAAffection)) and (WriterAffection > ConsultantAffection))\n  *goto MaxTargetDiana\n\n*if (((((ArtistAffection > leadAffection) and (ArtistAffection > WriterAffection)) and (ArtistAffection > ProgrammerAffection)) and (ArtistAffection > QAAffection)) and (ArtistAffection > ConsultantAffection))\n  *goto MaxTargetRen\n\n*if (((((ProgrammerAffection > leadAffection) and (ProgrammerAffection > WriterAffection)) and (ProgrammerAffection > ArtistAffection)) and (ProgrammerAffection > QAAffection)) and (ProgrammerAffection > ConsultantAffection))\n  *goto MaxTargetSadri\n\n*if (((((QAAffection > leadAffection) and (QAAffection > WriterAffection)) and (QAAffection > ProgrammerAffection)) and (QAAffection > ArtistAffection)) and (QAAffection > ConsultantAffection))\n  *goto MaxTargetJames\n\n\n*if (((((ConsultantAffection > leadAffection) and (ConsultantAffection > WriterAffection)) and (ConsultantAffection > ProgrammerAffection)) and (ConsultantAffection > ArtistAffection)) and (ConsultantAffection > QAAffection))\n  *goto MaxTargetGrant\n\n\n*comment This only trips if you don't have anyone special yet.\n\n*if MaxAffectionTarget = \"nobody\"\n  *set Tiebreaker true\n  Everyone herds into the next room. You decide to help suit up…\n  *rand target_roll 1 6\n  *if (target_roll = 1)\n    *goto MaxTargetAndres\n  *if (target_roll = 2)\n    *goto MaxTargetDiana\n  *if (target_roll = 3)\n    *goto MaxTargetRen\n  *if (target_roll = 4)\n    *goto MaxTargetSadri\n  *if (target_roll = 5)\n    *goto MaxTargetJames\n  *if (target_roll = 6)\n    *goto MaxTargetGrant\n\n*label MaxTargetAndres\n*set MaxAffectionTarget \"Andres\"\n*set AffectionTarget_zhe \"he\"\n*set AffectionTarget_zir \"his\"\n*set AffectionTarget_zim \"him\"\n*set Villain \"Grant\"\n*set Villain_zhe \"he\"\n*set Villain_zir \"his\"\n*goto calculatorMerge\n\n*label MaxTargetDiana\n*set MaxAffectionTarget \"Diana\"\n*set AffectionTarget_zhe \"she\"\n*set AffectionTarget_zir \"her\"\n*set AffectionTarget_zim \"her\"\n*set Villain \"James\"\n*set Villain_zhe \"he\"\n*set Villain_zir \"his\"\n*goto calculatorMerge\n\n*label MaxTargetRen\n*set MaxAffectionTarget \"Ren\"\n*set AffectionTarget_zhe \"she\"\n*set AffectionTarget_zir \"her\"\n*set AffectionTarget_zim \"her\"\n*set Villain \"Sadri\"\n*set Villain_zhe \"she\"\n*set Villain_zir \"her\"\n*goto calculatorMerge\n\n*label MaxTargetSadri\n*set MaxAffectionTarget \"Sadri\"\n*set AffectionTarget_zhe \"she\"\n*set AffectionTarget_zir \"her\"\n*set AffectionTarget_zim \"her\"\n*set Villain \"Ren\"\n*set Villain_zhe \"she\"\n*set Villain_zir \"her\"\n*goto calculatorMerge\n\n*label MaxTargetJames\n*set MaxAffectionTarget \"James\"\n*set AffectionTarget_zhe \"he\"\n*set AffectionTarget_zir \"his\"\n*set AffectionTarget_zim \"him\"\n*set Villain \"Diana\"\n*set Villain_zhe \"she\"\n*set Villain_zir \"her\"\n*goto calculatorMerge\n\n*label MaxTargetGrant\n*set MaxAffectionTarget \"Grant\"\n*set AffectionTarget_zhe \"he\"\n*set AffectionTarget_zir \"his\"\n*set AffectionTarget_zim \"him\"\n*set Villain \"Andres\"\n*set Villain_zhe \"he\"\n*set Villain_zir \"his\"\n*goto calculatorMerge\n\n*label calculatorMerge\n\n*if (Tiebreaker = false)\n  ${MaxAffectionTarget} waves at you from across the room. Ooh, ${AffectionTarget_zhe} wants you to help ${AffectionTarget_zim}.\n  *choice\n    #Help out ${MaxAffectionTarget}.\n      *if (MaxAffectionTarget = \"Andres\")\n        *goto AndresChosen\n      *if (MaxAffectionTarget = \"Diana\")\n        *goto DianaChosen\n      *if (MaxAffectionTarget = \"James\")\n        *goto JamesChosen\n      *if (MaxAffectionTarget = \"Ren\")\n        *goto RenChosen\n      *if (MaxAffectionTarget = \"Sadri\")\n        *goto SadriChosen\n      *if (MaxAffectionTarget = \"Grant\")\n        *goto GrantChosen\n      *goto AirlockMerge\n    #(Maybe someone else).\n      You look down at your walkie-talkie, like you're reading off your assignment from a list. You choose…\n      *goto Allchoices\n    #Actually, I'd rather not help anyone.\n      You look down at your walkie-talkie, and frown as though you were running behind schedule. ${MaxAffectionTarget} is already being helped by another steward.\n\n      *goto AirlockMerge\n\n*label Allchoices\n\n*comment END OF THE MAX AFFECTION CALCULATOR\n\n*choice\n  #Andres.\n      *label AndresChosen\n      He grins excitedly, \"Glad to know that I'll be getting assistance from the best.\"\n      *set SuitTarget \"Andres\"\n      *set SuitTarget_zhe \"he\"\n      *set SuitTarget_zir \"his\"\n      *set SuitTarget_zim \"him\"\n      *set MaxAffectionTarget \"Andres\"\n      *set AffectionTarget_zhe \"he\"\n      *set AffectionTarget_zir \"his\"\n      *set AffectionTarget_zim \"him\"\n      *set Villain \"Grant\"\n      *set Villain_zhe \"he\"\n      *set Villain_zir \"his\"\n      *if (LeadAffection >= 6)\n        *set AffectionLove true\n        *gosub FlirtySuitUp\n\n      *if (LeadAffection \u003c 6)\n        You pleasantly and professionally take his measurements. You pick out an outfit that fits him best and return.\n\n      *goto boySuit\n\n\n  #Diana.\n      *label DianaChosen\n      She grins excitedly, \"Oh good. Now you, you're someone I trust with my life.\"\n      *set SuitTarget \"Diana\"\n      *set SuitTarget_zhe \"she\"\n      *set SuitTarget_zir \"her\"\n      *set SuitTarget_zim \"her\"\n      *set MaxAffectionTarget \"Diana\"\n      *set AffectionTarget_zhe \"she\"\n      *set AffectionTarget_zir \"her\"\n      *set AffectionTarget_zim \"her\"\n      *set Villain \"James\"\n      *set Villain_zhe \"he\"\n      *set Villain_zir \"his\"\n      *if (WriterAffection >= 6)\n        *set AffectionLove true\n        *gosub FlirtySuitUp\n\n      *if (WriterAffection \u003c 6)\n        You pleasantly and professionally take her measurements. You pick out an outfit that fits her best and return.\n\n      *goto girlSuit\n\n\n  #James.\n      *label JamesChosen\n      He grins excitedly, \"Glad to know that I'll be getting assistance from the best.\"\n      *set SuitTarget \"James\"\n      *set SuitTarget_zhe \"he\"\n      *set SuitTarget_zir \"his\"\n      *set SuitTarget_zim \"him\"\n      *set MaxAffectionTarget \"James\"\n      *set AffectionTarget_zhe \"he\"\n      *set AffectionTarget_zir \"his\"\n      *set AffectionTarget_zim \"him\"\n      *set Villain \"Diana\"\n      *set Villain_zhe \"she\"\n      *set Villain_zir \"her\"\n      *if (QAAffection >= 6)\n        *set AffectionLove true\n        *gosub FlirtySuitUp\n\n      *if (QAAffection \u003c 6)\n        You pleasantly and professionally take his measurements. You pick out an outfit that fits him best and return.\n\n      *goto boySuit\n\n\n  #Ren.\n      *label RenChosen\n      She smiles up past her thick glasses, \"I'll be getting assistance from the best.\"\n      *set SuitTarget \"Ren\"\n      *set SuitTarget_zhe \"she\"\n      *set SuitTarget_zir \"her\"\n      *set SuitTarget_zim \"her\"\n      *set MaxAffectionTarget \"Ren\"\n      *set AffectionTarget_zhe \"she\"\n      *set AffectionTarget_zir \"her\"\n      *set AffectionTarget_zim \"her\"\n      *set Villain \"Sadri\"\n      *set Villain_zhe \"she\"\n      *set Villain_zir \"her\"\n      *if (ArtistAffection >= 6)\n        *set AffectionLove true\n        *gosub FlirtySuitUp\n\n      *if (ArtistAffection \u003c 6)\n        You pleasantly and professionally take her measurements. You pick out an outfit that fits her best and return.\n\n      *goto girlSuit      \n\n\n  #Grant.\n      *label GrantChosen\n      He grins excitedly, \"Glad to know that I'll be getting assistance from the best.\"\n      *set SuitTarget \"Grant\"\n      *set SuitTarget_zhe \"he\"\n      *set SuitTarget_zir \"his\"\n      *set SuitTarget_zim \"him\"\n      *set MaxAffectionTarget \"Grant\"\n      *set AffectionTarget_zhe \"he\"\n      *set AffectionTarget_zir \"his\"\n      *set AffectionTarget_zim \"him\"\n      *set Villain \"Andres\"\n      *set Villain_zhe \"he\"\n      *set Villain_zir \"his\"\n      *if (ConsultantAffection >= 6)\n        *set AffectionLove true\n        *gosub FlirtySuitUp\n\n      *if (ConsultantAffection \u003c 6)\n        You pleasantly and professionally take his measurements. You pick out an outfit that fits him best and return.\n\n      *goto boySuit\n\n\n  #Sadri.\n      *label SadriChosen\n      She swirls her hair excitedly, \"Oh, that's good news! I'll be getting assistance from the best.\"\n      *set SuitTarget \"Sadri\"\n      *set SuitTarget_zhe \"she\"\n      *set SuitTarget_zir \"her\"\n      *set SuitTarget_zim \"her\"\n      *set MaxAffectionTarget \"Sadri\"\n      *set AffectionTarget_zhe \"she\"\n      *set AffectionTarget_zir \"her\"\n      *set AffectionTarget_zim \"her\"\n      *set Villain \"Ren\"\n      *set Villain_zhe \"she\"\n      *set Villain_zir \"her\"\n      *if (ProgrammerAffection >= 6)\n        *set AffectionLove true\n        *gosub FlirtySuitUp\n\n      *if (ProgrammerAffection \u003c 6)\n        You pleasantly and professionally take her measurements. You pick out an outfit that fits her best and return.\n\n      *goto girlSuit      \n\n  #Nobody, I should focus on getting suited up myself.\n    *goto AirlockMerge\n\n*label FlirtySuitUp\n$!{SuitTarget_zhe} looks at your eyes, glances at your lips, then back to your eyes before breaking the tension, \"So…what do we do next?\" Your face flushes at the closeness.\n\nYou try to maintain composure as you meet ${SuitTarget_zir} gaze, \"I'll need to take your measurements.\"\n\n$!{SuitTarget_zhe} steps closer and holds out ${SuitTarget_zir} arms, \"So, then. Measure away.\" You pull out some old-fashioned measuring tape and hold it against ${SuitTarget_zim}. Height, arms, shoulders. You brush up against ${SuitTarget_zir} arm; the unexpected contact sends shivers down your spine. Oh man, this is bad news. $!{SuitTarget_zhe} is so off-limits. Well, not technically, but practically.\n\nYou cough and straighten up, doing your best to conceal the warm blush spreading over your face. But ${SuitTarget} looks just as affected as you are, grinning madly and avoiding eye contact. Fantastic. Oh, but also terrible. You smile back, despite yourself. \"I have to go…go get the suit now.\" You practically sprint off.\n\nJust how bad is this?\n\n*choice\n  #Actually, this feels amazing.\n    You embrace the warm flush.\n    *goto SuitPickupMerge\n  #There's nothing wrong with it.\n    *goto YesRomance\n  #It's not the best idea, but why not enjoy it?\n    *label YesRomance\n    There's certainly no reason not to have some fun. There's nothing wrong with flirting, after all.\n    *goto SuitPickupMerge\n\n  #It's going to get you into trouble with your job.\n    *goto doubleCheckFriendsOnly\n\n  #It'll never work out.\n    You'll never see ${SuitTarget_zim} again after tomorrow. What good is one night together? Well, but then, what good is one lifetime together?\n    *goto doubleCheckFriendsOnly\n\n  #It's just not what you want.\n    *set AffectionLove false\n    *goto SuitPickupMerge\n\n  #There's multiple reasons not to get involved.\n    So you won't.\n    *set AffectionLove false\n    *goto SuitPickupMerge\n\n*label doubleCheckFriendsOnly\n\nYou pause to lean against some storage crates and really think it through: Should you get a handle on this, or allow yourself to have some fun?\n\n*choice\n  #I absolutely shouldn't get involved with one of these tourists.\n    *set AffectionLove false\n    You steel into resolve.\n    *goto SuitPickupMerge\n\n  #Well…maybe I can have a little fun. Just a little.\n    You melt into a hedonistic smile. Just a small one, though, before resuming your duties.\n    *goto SuitPickupMerge\n\n*label SuitPickupMerge\nYou run your fingers over crate labels until you find the one that's the best fit. It's slightly too big around the waist, but people usually suck it in for the measurements anyway. You haul out the crate of suit parts.\n\n*return\n\n*label boySuit\nYou take your time helping him into each piece of the suit. They're designed to be sturdy, flexible, and simple for the wearer, but that means they require a lot of work from the assisting valet. Layers, seals, buckles, electronic tests. You squinch your face in concentration. Finally, you finish and step back.\n\n\"How do I look?\" he asks.\n\n*goto SuitMerge\n\n*label girlSuit\nYou take your time helping her into each piece of the suit. They're designed to be fast and simple for the wearer, but that means they require a lot of work from you. Layers, seals, buckles, electronic tests. You squinch your face in concentration. Finally, you finish and step back.\n\n\"How do I look?\" she asks.\n\n*label SuitMerge\n\n*fake_choice\n  #Fantastic.\n  #Adventurous.\n  #Nimble.\n  #Ready for anything.\n\n$!{SuitTarget} strikes a heroic pose, but then loses it in a fit of giggles. You clap and bow, but seeing as how almost everyone else is nearly ready, it's high time you got suited up as well.\n\n\n*label AirlockMerge\nYour box has already been pulled out by another steward. You do you best to avoid eye contact. Your position feels privileged enough without being in a position where they have to act as your servant. You start with the pants—what looks (and feels) like plastic-infused canvas cloth. Then you lean on him as he helps you step into the ski-boot-like armored shoes. He bolts on your greaves and kneeguards as you slip into the plastic-canvas jacket. Then your least favorite part: the plating around your chest that goes down just past your natural waist. There goes most of your flexibility. \n\nThen the butt guard and adjustments to the back harness. You wiggle your fingers into the inner gloves, then the outer gloves that he holds open for you. He smooths your hair back to slip on the canvas hood, and then straps on the gauntlets and elbowguards, turning on the left gauntlet's electronic control panel. You feel a sudden down and backwards pull as two stewards load your pack onto the back harness—the battery, oxygen, and communications antenna. They hover behind you with digipads hooked up to several electronic ports all over your suit. All pre-helmet systems check out. You thank your co-worker profusely as your adrenaline starts pumping. You're about to go out into space. This never ceases to feel amazing.\n\nYou look over the tourists and fellow employee chaperones.\n\n*fake_choice\n  #\"Let's have a blast.\"\n  #\"Let's go exploring.\"\n  #\"Let's keep things moving.\"\n  #\"Let's get this over with.\"\n\nThey all follow your lead to the airlock. You instruct everyone to lock on their helmets. \"HUD and Com check. Everyone reply.\" You get excited confirmation pings from everyone. The interior airlock door seals behind you. The air evacuation starts. This is the point where if someone's going to panic, they do: cramped interior, the point of no return. How do you reassure everyone?\n\n*fake_choice\n  #\"Just relax everyone, this is standard procedure.\"\n    You notice a spike in oxygen use from the general group, but at least nobody tries to bolt. \n\n  #\"I can't wait to show you all the moon.\"\n    You get some nervous agreements from the group, just a few \"yeah,\" and \"yep,\" affirmations. But being pulled up to the top of the roller coaster is not the time when people are feeling all that talkative. There's a small spike in oxygen use from the general group, but nothing out of the ordinary.\n\n  #\"I hope everyone's excited.\"\n    You get some nervous agreements from the group, just a few \"yeah,\" and \"yep,\" affirmations. But being pulled up to the top of the roller coaster is not the time when people are feeling all that talkative. There's a small spike in oxygen use from the general group, but nothing out of the ordinary.\n\n  #\"How's everyone doing?\"\n    You get a few mumbled \"good,\" and \"okay,\" affirmations from the group. But being pulled up to the top of the roller coaster is not the time when people are feeling all that talkative. There's a small spike in oxygen use from the general group, but nothing out of the ordinary.\n\nEveryone using the airlock at once enforces a sort of herd mentality where emotional states are mostly shared. It highly discourages panic. At least for the single minute it takes to drain the chamber.\n\nAnd then the outer airlock opens. You bounce out backwards and gesture for everyone to follow. There's some hesitation—that slow tourist pace—and then they finally follow. They gawk at it all: the moon dust landscape, the universe above, the moon base exterior, each other in space suits. They're in the palm of your hand. The other stewards fan out, prepared to take pictures, roll video, and potentially deal with any emergencies.\n\nWhile the suits have three hours of oxygen and warmth, you always give a thirty minute buffer. Considering that some people have already burned fifteen minutes before getting out here, that's two hours, fifteen minutes left of exploration. Which activity do you start them on first?\n\n*comment : These track whether it's the first or a subsequent time doing moon stuff. Each activity takes Oxygen time, but the real thing keeping track of that is the Moon Activity Timer.\n\n*temp firstMoonTime true\n*temp MoonActivityCounter 0\n*temp MoonActivityTimer 150\n*temp hours 2\n*temp minutes 30\n\n*comment : These track whether the \"continue doing X\" options have been used or even used up. Note that that the \"true\" state means that they can be accessed, while the \"false\" state means that they cannot be accessed. This means that they will be in the false state before they can be used AND after they have been used up. First Activity = 15 minutes. Repeat = 10 minutes. Each ability can be repeated once.\n\n*temp moonDustDone false\n*temp moonExploreDone false\n*temp moonBaseDone false\n*temp UniverseDone false\n*temp PropsDone false\n\n*comment if this is less than 2, then the player isn't immediately looking at the universe again.\n*temp UniverseJustDone 0\n\n*label MoonTourStart\n\n*set MoonActivityTimer -15\n*set UniverseJustDone -1\n\n*if MoonActivityTimer \u003c= 60\n  *goto MoonEmergency\n\n*if (firstMoonTime = false )\n  You've got\n  *gosub showMoonTime\n  before you should think about returning everyone to base. What do you do next?\n\n*set firstMoonTime false\n\n*choice\n  *hide_reuse #Do some lunar exploration.\n    *if UniverseJustDone = 2\n      You turn the field lights back on.\n    You encourage the tourists to fan out and explore the local landscape. They slowly jump around to different spots within the exploration bounds, where Spacejoy recreates a natural-looking environment of small hills, craters, and rocks.\n\n    Sadri climbs down into a small crater, enjoying the chance to look closer at eye-level moon dust. Ren jumps down and joins her, delighting at the deliberately placed asteroid in the center. Diana kicks some dust into the crater.\n\n    James starts walking the paces of the boundaries, trying to determine the area of the playscape, while Grant jumps higher and higher, trying to determine the limits of space suit height on the moon. Andres gently tosses a small rock, amazing over how long it goes before touching the ground.\n\n    Everyone seems to be having an amazing time.\n    *set moonExploreDone true\n    *goto MoonTourStart\n\n  *if (moonExploreDone = true) #Explore the Lunar landscape some more.\n    *if UniverseJustDone = 2\n      You turn the field lights back on.\n    You point to the ground, \"So one of the greatest challenges out here on the dark side of the moon is the temperature. It's an average of negative 170 Celsius—that's around negative 275 Fahrenheit—which makes for a very chilly environment indeed. A large portion of our facility, and these suits, occupy themselves with insulation and heating. Now, the sunny side gets up to near boiling temperatures, and it's actually much trickier trying to cool that off than to heat this up.\" \n\n    James restarts his effort to measure the area of the playscape, while Sadri teases him. Andres, James, and Diana join together in a jumping contest, while Ren recites numbers off the top of her head, attempting to calculate temperature differences.\n\n    Everyone seems to be enjoying themselves.\n    *set MoonActivityTimer +5\n    *set moonExploreDone false\n    *goto MoonTourStart\n\n  *hide_reuse #Show off the universe.\n    You call all the tourists to you, \"Listen, everyone to me, I'm going to shut off the exterior lights. We're going to take the opportunity to look up at the universe.\" Everyone tilts their heads up expectantly. The lights dim before turning off (so as not to be frighteningly sudden) and then it's there. Nothing but the uninterrupted universe. No sun, no lights, no atmosphere, no reflection from Earth. Just the unending, beautiful eternity. There are audible sighs and gasps. You're certain you hear someone sniffling back a few tears, but you give them the benefit of not checking whose audio trace it was. \n\n    You could talk to them about specific features, but you just let them silently enjoy the view. Everyone seems completely engrossed in looking up at space.\n    *set UniverseDone true\n    *set UniverseJustDone 3\n    *goto MoonTourStart\n\n  *if (UniverseDone = true) #Show off the universe some more.\n    *if UniverseJustDone = 2\n      You continue allowing them to enjoy stargazing for several more minutes before interrupting.\n    *if UniverseJustDone \u003c 2\n      You regather everyone and turn off the lights again, allowing them several minutes to enjoy it before interrupting.\n    *set UniverseJustDone 3\n    You point upwards, \"One of the obvious benefits to being on the dark side of the moon is the fact that you can see so much more of the sky from here. Can any of you make out familiar constellations?\"\n\n    They all stare upwards, contemplating. \"I see toast!\" James jokes
