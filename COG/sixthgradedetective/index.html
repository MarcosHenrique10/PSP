py. What are you doing, hiding contraband?\"\n\t\t*set relE %+20\n\t\t\"Oh, yeah, pretty much,\" Evan grins dopily. \"I run a huge smuggling operation. Always under bridges, conducting midnight deals.\" \n\t\t\n\t#\"I wish you two would not roughhouse. Someone is going to get hurt.\"\n\t\t*set Respect %+20\n\t\t\"You sound like my mom,\" says A.J. \"'It's all fun and games until someone loses an eye!'\"\n\t\t\n\t\t\"Well, it is,\" says Evan. \"You can't just sneak up on people.\"\n\n\t\t\"What's your problem?\" says A.J. \"You hiding something in that bag?\"\n\t\t\n\t\t\"No. Get off!\"\n\n\t#\"Why don't you guys kiss already?\"\n\t\t*if(genA = gender)\n\t\t\t*set relE %+10\n\t\t\t\"What?\" Evan blinks, red-faced. \"I don't like…. Aw, you don't know what you're talking about.\" \n\n\t\t*if(genA != gender)\n\t\t\t\"Ha ha,\" Evan rolls his eyes. \"I'm not really into, you know, A.J.'s type.\"\n\t\t\t\n\t\t\t\"What type?\" A.J. flashes a smile. \"Super cool and good-looking?\"\n\n*comment endif\n\n\"What are you all doing cluttering the coat room? It's class time, last time I checked,\" barks an officious voice. It's Finnegan, the class brain. He strides in and hangs his coat on a hook.\n\n*fake_choice\n\t#\"Get off your high horse. You're late, too. You're no better than the rest of us riffraff!\"\n\t\t*set Respect %-10\n\t\t*set Secrecy %+10\n\t\t*set relF %-20\n\t\t\"I'm not late!\" Finnegan seems highly offended by the idea. \n\t#\"Gee, Finnegan, I never thought I'd see the day you'd be late! Are you okay? Are you sick?\"\n\t\t*set Secrecy %-10\n\t\t*set Respect %+10\n\t\t*set relF %-10\n\t\t\"Don't patronize me. I'm not late, for your information,\" Finnegan says witheringly.\n\t#\"You must have been doing something really important to be late to class. Was there a student council meeting or something?\"\n\t\t*set relF %+20\n\t\t*set Respect %+20\n\t\t*set Secrecy %-10\n\t\t\"I was!\" Finnegan puffs out his chest importantly.\n*comment endif\n\n\"I'm in Color Guard. I just raised the flag. I have permission to be late to class. Unlike some people I could mention.\" \n\n\"Okay, okay. We're going,\" says A.J., tossing ${his} jacket into a corner. \"Come on, ${Name}.\" \n\nYou exit into the classroom, followed closely by Evan. \n\n\"Well, well! Thanks for joining us,\" says Mrs. Greeley sarcastically. \"I was beginning to think it was a party in there. All of you, see me before lunch.\"\n\n\"Aww!\" A.J. groans.\n\n\"Now, if everyone is settled, we will continue our lesson on geology,\" says Mrs. Greeley. \"What are the three main types of rock? ${Name}?\"\n\n*fake_choice\n\t#\"Igneous, metamorphic, and sedimentary.\"\n\t\t*set relF %+10\n\t\t*set Respect %+20\n\t\tMrs. Greeley nods, and Finnegan shoots you an appreciative look. Bet he didn't think you knew that one!\n\t#\"Amethyst, malachite, and moonstone.\"\n\t\t*set relS %+10\n\t\t\"Very, ah, imaginative,\" says Mrs. Greeley. \"But, no.\" \n\t\t\n\t\tShashi turns around and grins at you. \"How did you know? Those are the main rocks in my game world!\"\n\t#\"Classic, punk, and alternative.\"\n\t\t*set relA %+20 \n\t\t*set Respect %-20\n\t\tMrs. Greeley frowns. A.J. stifles a laugh.\n\t#\"Ohh, I know this. Ummmm. Iguana, Metamucil, and…sedentary?\"\n\t\t*set relE %+10\n\t\tFinnegan snickers. \"Most rocks are sedentary.\" \n\t\t\n\t\tEvan shoots you a sympathetic look. \n\t#\"Oh, I have no idea. Ask Finnegan.\" \n\t\t*set relF %+20\n\t\t*set Respect %-10\n\t\t\"Igneous, metamorphic, and sedimentary,\" Finnegan pipes up right away.\n\t\t\n\t\tMrs. Greeley sighs, but Finnegan shoots you a winning smile. You know he appreciates having a chance to show off his smarts more than anything else!\n*comment endif\n\nJust then, the door to the class opens again. Mrs. Greeley puts on her glasses to peer at the newcomers. \"Vitessa! Is everyone late today?\"\n\n\"No, Mrs. Greeley. I was taking the new girl down to the office to get set up. Principal Sanchez said I could wait and escort her to class. I have a late slip.\" Vitessa steps forward and hands a piece of paper to Mrs. Greeley. A delicate-looking girl trails a few steps behind Vitessa. They are a study in opposites. Vitessa is tall and looks at least thirteen. She has bouncy hair and wears fashionable clothes. The new girl is short and chubby-cheeked, and she wears her hair in braids with pink ribbons. She could pass for nine easily. \n\n\"Of course, the new student,\" says Mrs. Greeley. \"We're happy to have you, dear. Why don't you tell us a little about yourself?\"\n\nThe new girl faces the classroom. Her eyes dart around the room nervously. She looks at Vitessa for support.\n\n\"Well?\" says Vitessa impatiently, hands on her hips. \"Say something!\"\n\n*fake_choice\n\t#\"Can't you see the girl is terrified? Step off, Vitessa!\" \n\t\t*set relV %-10\n\t\t*set relC %+10\n\t\t*set Secrecy %+10\n\t\t\"Excuse me,\" snaps Vitessa, \"but I just spent my whole morning helping the new girl, so don't you defend her against me. She and I are friends. Isn't that right, Corley?\" She puts her arm around her.\n\n\t\t\"So her name is Corley,\" pipes up Shashi from the front row. \"Now we're getting somewhere. Hi. I'm Shashi. Nice to meet you.\" \n\t#\"Tell us your name!\"\n\t\t*set relC %-10\n\t\t*set Secrecy %-10\n\t\tThe new girl blinks, flustered. \"Oh…right,\" she squeaks in a high, difficult-to-hear voice. \"My name's Corley.\"\n\n\t\t\"Hi, Corley!\" Shashi waves from the front row. \"I'm Shashi. Nice to meet you.\"\n\t#\"I don't see why the new girl has to stand alone up there and tell us about herself. We should tell her about ourselves!\"\n\t\t*set relC %+10\n\t\t*set Respect %-10\n\t\t\"What a good idea,\" says Mrs. Greeley, clearly annoyed. \"Let's make it quick, everyone. I'm Mrs. Greeley, the teacher.\"\n\t\t\n\t\t\"You know me. Vitessa,\" says Vitessa.\n\t\t\n\t\t\"I'm ${Name},\" you say.\n\t\t\n\t\t\"A.J.!\" calls A.J.\n\t\t\n\t\t\"I'm Corley,\" says the new girl in a soft voice.\n\t\t\n\t\tShashi sticks her hand out from her desk in the front row. \"Hi. I'm Shashi. Nice to meet you.\" \n*comment endif\n\t\t\nVitessa stops Corley from shaking Shashi's hand. \"Careful. It's critical to make the right friends on the first day. Avoid the nerds.\"\n\n\"Hey!\" says Shashi. \"I'm not a nerd.\"\n\n\"You're wearing a Renaissance Faire costume right now!\" Vitessa exclaims.\n\n\"It's not a RenFaire costume. It's a beautiful dress that I happened to get at a Renaissance Faire. You want a Renaissance Faire costume—\"\n\n\"Girls,\" Mrs. Greeley cuts in. \"We've spent quite enough time on this. Welcome, Corley. Take the empty seat next to Shashi. Now, everyone take out your homework.\"\n\nGroans and rustles fill the classroom. Corley seems grateful to be allowed to sit down. Shashi shares her textbook.\n\nDid you and A.J. do the homework? \n\n*fake_choice\n\t#I have mine here neatly organized in a clear plastic cover, but A.J. is without ${hiss}, as usual.\n\t\t*set Respect %+20\n\t#We both skipped it. Homework is tyranny.\n\t\t*set Respect %-20\n\t\t*set relA %+20\n\t#I did mine and A.J.'s too. No biggie. Homework is easy for me, and A.J. has an undiagnosed learning disability (probably).\n\t\t*set Respect %-10\n\t\t*set Greed %-10\n\t\t*set relA %+10\n\t#I did mine and A.J.'s too—for a small fee.\n\t\t*set Respect %-10\n\t\t*set Greed %+10\n\t\t*set relA %+10\n*comment endif\n\n*if(Respect \u003c 50)\n\t*temp morning_goes \"crawls\"\n\t*temp Finally \"Finally\"\n\t*goto morning_crawls\n*else\n\t*temp morning_goes \"flies\"\n\t*temp Finally \"Before you know it\"\n\t*goto morning_crawls\n\t\t\n*label morning_crawls\nThe morning ${morning_goes} by as the class moves through the paces of spelling, geography, and math. ${Finally}, the bell rings for lunch. \n\n\"All those who were late this morning, please stay seated,\" Mrs. Greeley reminds you. \n\nYou, Evan, and A.J. stop gathering your things and sit back down.\n\n\"Have fun,\" Vitessa smirks, sashaying toward the coat room with Corley on her arm.\n\n\"You, too, Finnegan, Vitessa, and Corley,\" says Mrs. Greeley.\n\nCorley freezes in terror. \n\n\"Um, I'm in Color Guard,\" Finnegan points out. \"I shouldn't be marked as tardy.\" \n\n\"And I had a note,\" Vitessa reminds her.\n\n\"I know,\" says Mrs. Greeley. \"I'm not punishing you. It's just that you all missed the morning announcements, and I wanted to make sure you have a chance to sign up for the school safety patrol. You see—\"\n\n\"Auuugh!\" comes a scream from the coat room. \n\nShashi bursts out of the room, clutching an open backpack to her chest. She looks near tears. \"I've been robbed!\" she wails. \n\n*finish\n", "ch2tomes_sc2negotiation": "Noon. The cafeteria. \n\n\"${Name}.\" Shashi plants her lunchbox on your table with a clank and sits down across from you and A.J. \"I hear you're a detective.\" \n\n\"That's what my card says,\" you say coolly.\n\n*if(relA >= 60)\n\tA.J. grins.\n*if(relA \u003c 60) and (relA >= 40)\n\tA.J. laughs a little into ${his} sandwich. \n*if(relA \u003c 40)\n\tA.J. rolls ${his} eyes. \n*comment endif\n\n\"Good. Because I need a sleuth. A gumshoe. A, um, answer finder,\" says Shashi. \"Can you figure out who robbed me?\"\n\n*temp suggested_pay_rate pay_rate_base * detectivePoints\n\n*set suggested_pay_rate *100\n*set suggested_pay_rate round(suggested_pay_rate)\n*set suggested_pay_rate /100\n*temp double_suggested suggested_pay_rate * 2\n*temp compromise_pay_rate suggested_pay_rate + 10\n*temp discount_pay_rate suggested_pay_rate - 10\n*if(discount_pay_rate \u003c 0)\n\t*set discount_pay_rate 10\n\n*choice\n\t#\"How much will you pay me?\"\n\t\t*set Greed %+20\n\t\t\"Would $${suggested_pay_rate}.00 be enough?\" Shashi asks.\n\t\t\n\t\t*goto negotiate_with_shashi\n\t\t\t\t\n\t#\"Of course. What are friends for?\"\n\t\t*set relS %+40\n\t\t\"Awesome! I knew being friends with you would come in handy someday,\" Shashi grins. \n\t\t*goto set_pay\n\t\t\t\n\t#\"Of course. If there is a thief at Camden School, they must be found and stopped.\"\n\t\t*set Greed %-20\n\t\t*set relS %+10\n\t\t*set Respect %+10\n\t\t\"That's so noble,\" says Shashi.\n\t\t*goto set_pay\n\n*label negotiate_with_shashi\n*choice\n\t#\"Sure, that's fine.\"\n\t\tYou and Shashi shake on it.\n\t\t*set tomes_pay_rate suggested_pay_rate\n\t\t*goto shashi_explains_crime\t\n\t#\"How about $${double_suggested}.00?\"\n\t\t*set Greed %+20\n\t\tShashi shakes her head. \"I'm willing to pay a little high because of the sentimental value of the book, but after all, at a certain point, I can just replace it. How about ${compromise_pay_rate}.00?\"\n\t\t\t\t\n\t\tYou shake on it. \n\t\t*set tomes_pay_rate compromise_pay_rate\n\t\t*goto shashi_explains_crime\t\n\t#\"Make it $${discount_pay_rate}.00. Friends and family discount.\"\n\t\t*set relS %+20\n\t\t\"Really? I get that? Cool,\" says Shashi.\n\t\t*set tomes_pay_rate discount_pay_rate\n\t\t*goto shashi_explains_crime\t\n\n*label set_pay\t\t\n\"And I was going to offer you money, too.\"\n\t\t\n*choice\n\t#\"How much?\"\n\t\t*set Greed %+10\n\t\t\"Well, I was going to offer $${suggested_pay_rate}.00, but—\"\n\t\t\n\t\t*goto negotiate_with_shashi\n\t#\"Oh, yes. My rate is ${pay_rate_half_string} dollars a day, plus expenses.\"\n\t\t*set relS %-10\n\t\t*set Greed %+20\n\t\t\"You want money every day? How do I know you'll be quick about solving the mystery then?\" says Shashi. \"I shouldn't be punished if you are a bad detective. How about a flat fee? I am prepared to offer $${suggested_pay_rate}.00.\"\n\t\t\n\t\t*goto negotiate_with_shashi\n\t#\"Keep your money! Let me do it as a favor to you.\"\n\t\t*set relS %+30\n\t\t*set Greed %-20\n\t\t\"You're too nice!\" Shashi beams.\n\t\t*set tomes_pay_rate 0\t\n\t\t*goto shashi_explains_crime\n\t#\"Keep your money! Thieves can't be roaming the school.\"\n\t\t*set relS %+20\n\t\t*set Greed %-30\n\t\t\"Oh, okay. Great!\" says Shashi. \n\t\t*set tomes_pay_rate 0\n\t\t*goto shashi_explains_crime\n\t\t\n*label shashi_explains_crime\n*set book_stolen true\n\nYou open your detective notebook to a new page. \"Now then, tell me about the robbery. What did they take?\"\n\n\"Something priceless beyond measure,\" says Shashi earnestly. \"[i]The Swordmaster's Sourcebook[/i]!\"\n\n\"Wait, are you talking about your rulebook?\" A.J. cuts in. \"For that weird fantasy game you play?\"\n\n\"That's right, but it's not weird. It's Swords and Sorcerers,\" Shashi nods. \"I had the book in my bag because I was going to play with my gaming group after school.\"\n\n\"That's not priceless beyond measure,\" says A.J. \"Doesn't it have a bar code on it?\"\n\n\"I had some game notes tucked into it. My ideas. My intellectual property. That's the priceless part,\" says Shashi impatiently. \"Plus, it's a really nice book, and it wasn't cheap! It's the special edition. The cover feels like real leather, and it's embossed in gold and encrusted in jewels. I mean, they are probably just cut glass, but they still look cool. It took forever to save up!\"\n\nConsidering your quest for a bike, you have a soft spot in your heart for people who save up to buy things. \n*if(tomes_pay_rate>0)\n\tPlus, you could use the money.\n\n\"All right,\" you say. \"Let's get started.\" \n\n*finish\n", "ch2tomes_sc3interviews": "Shashi leans forward eagerly. \"What do we do first?\" \n\n\"Let's narrow down the time of the crime,\" you suggest. \"Then we can figure out who had access to your bag at that time. When was the last time you saw the book?\"\n\n\"Saw it? This morning, when I packed my bag,\" says Shashi. \"I put my bag down in the coat room when I got to school. Sometime between then and lunchtime, it disappeared.\" \n\n\"It's hopeless. Anyone could have taken it out of the coat room,\" says A.J. \"The whole class hangs around there in the morning. The thief would just have to wait for you to go to your seat.\" \n\n\"Not really,\" says Shashi. \"The only entrance to the coat room is off the classroom. I'd have seen anyone walking out with my book. You can't exactly put it in your pocket. It's a two-inch-thick hardcover! Encrusted with—\"\n\n\"Jewels… We know,\" says A.J. \n\n\"Besides,\" Shashi adds practically, \"Band practice ran a little long, and I had to put my tuba up on the high shelf. I was the last one in the coat closet this morning.\"\n\n\"Except for the people who were late,\" you put in. \n\nA.J. ticks off names on ${his} fingers. \"Evan, Finnegan, Vitessa, and the new girl.\"\n\n*fake_choice\n\t#\"And you and me.\"\n\t\t*set Greed %-20\n\t\t*set relA %-10\n\t\t*set relS %+10\n\t\tA.J. frowns at you.\n\t\t\n\t\tShashi's eyes widen. She looks from A.J. to you. \"Well, I guess I can eliminate you guys, or I don't even know where to begin.\"\n\t\t\n\t\tYou shake your head. \"Don't eliminate us. I promise you, I will do my best to look into this fairly. But don't just take my word for it. Hold me to a high standard.\"\n\t\t\n\t\tShashi nods, looking awed. \"Yes, ${mam}.\"\n\t#\"That's right. That's the list of suspects.\"\n\t\t*set Greed %+20\n\t#\"Let's not jump to any conclusions. The field is still wide open.\"\n\t\t*set Greed %+10\n\t\t*set Secrecy %+10\n\t\t\"That's true. For example, there's a window in the coat room. Somebody could have come in through that,\" A.J. muses.\n\t\t\n\t\t\"It's barred,\" Shashi points out.\n\t\t\n\t\t\"I don't know. Somebody small,\" says A.J. \"Like a leprechaun.\"\n\t\t\n\t\t\"What are you talking about?\" Shashi giggles. \"Leprechauns aren't real.\"\n\t\t\n\t\t\"We can't rule out anything,\" you say staunchly.\n\t\t\n\t\t\"Well, we have to start somewhere,\" says Shashi. \n\t\t\n\t\t\"Yeah, let's leave the 'tiny person slipped through the bars' theory on the back burner for now,\" A.J. suggests.\n*comment endif\n\n\"Okay,\" you say, scribbling names in your notebook. \"Then let's start there—with Evan, Finnegan, Vitessa, and Corley.\"\n\nYou look around the lunchroom. Over at the popular girls' table, Vitessa is holding court, gesturing with her spork at a teen magazine. Vitessa seems to have taken Corley under her wing. Corley is sitting in the coveted place at Vitessa's side. She looks terrified.\n\nFinnegan and Evan are sitting with some of the nerdier boys. Finnegan has his head in a book. Evan is admiring another boy's [i]Evil Dead[/i] figurine.\n\nThere are just a few minutes before the end of the lunch period, so you can only interview one group. \n\n*choice\n\t#\"I'll talk to the girls.\"\n\t\t\"Want me to talk to the guys, then?\" says A.J. \n\t\t*if(deputyA)\n\t\t\t\"In my capacity as your deputy?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"Thanks, A.J. That would be great!\"\n\t\t\t\t*set assigned_aj true\n\t\t\t\t*set relA %+10\n\t\t\t\t\"We'll report back,\" you tell Shashi. With a businesslike salute to each other, you and A.J. head to your separate tables.\n\t\t\t#\"Actually, Shashi, why don't you take the guys?\"\n\t\t\t\t*set relA %-10\n\t\t\t\tA.J. frowns.\n\t\t\t\t\n\t\t\t\t\"No offense,\" you add. \"I just figured Shashi would want to be in on this.\"\n\t\t\t\t\n\t\t\t\t\"I do!\" says Shashi, jumping up. \"I'll tell you what I find out from Finnegan and Evan.\"\n\t\t\t\t\n\t\t\t\tYou walk over to Vitessa and Corley's table, aware of A.J.'s glare on your back as you walk away.\n\n\t\t*set you_talked_to_girls true\n\t\t*goto girls_table\n\t#\"I'll talk to the boys.\" \n\t\t\"Want me to talk to the girls, then?\" says A.J. \n\t\t*if(deputyA)\n\t\t\t\"In my capacity as your deputy?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"Thanks, A.J. That would be great!\"\n\t\t\t\t*set assigned_aj true\n\t\t\t\t*set relA %+10\n\t\t\t\t\"We'll report back,\" you tell Shashi. With a businesslike salute to each other, you and A.J. head to your separate tables.\n\t\t\t#\"Actually, Shashi, why don't you take the girls?\"\n\t\t\t\t*set relA %-10\n\t\t\t\tA.J. frowns.\n\t\t\t\t\n\t\t\t\t\"No offense,\" you add. \"I just figured Shashi would want to be in on this.\"\n\t\t\t\t\n\t\t\t\t\"I do!\" says Shashi, jumping up. \"I'll tell you what I find out from Vitessa and Corley.\"\n\t\t\t\t\n\t\t\t\tYou walk over to Finnegan and Evan's table, aware of A.J.'s glare on your back as you walk away.\t\n\t\t\n\t\t*set you_talked_to_girls false\n\t\t*goto guys_table\n\n*label girls_table\nYou slide into a seat across from Corley. Corley looks at you with wide eyes. Vitessa cuts herself off in the middle of a story about her jeans and gives you a suspicious look. \n\n\"What do you want?\" she asks.\n\n*choice\n\t#\"Do you want to help me find Shashi's missing book?\"\n\t\t*set Secrecy %-5\n\t\t*set relV %-10\n\t\t*set relC %-10\n\t\t*goto girls_colluding\n\t#\"Let's cut to the chase. I think one of you took Shashi's missing book.\"\n\t\t*set Secrecy %-20\n\t\t*set relV %+10\n\t\t*set relC %-20\n\t\t*goto girls_direct\n\t#\"How about that Vasco da Gama? He was a pretty inspiring explorer, huh?\"\n\t\t*set Respect %+20\n\t\t*set Secrecy %+10\n\t\t*set relV %-20\n\t\t*set relC %+10\n\t\tCorley nods.\n\n\t\t*goto girls_roundabout\n\t#\"What are you going to wear to the Starlight Dance?\"\n\t\t*set fancy true\n\t\t*set Respect %+10\n\t\t*set Secrecy %+10\n\t\t*set relV %+10\n\t\tVitessa gets a faraway look in her eyes, and you know she's thinking fondly about the topic. Then she shakes her head, snapping out of it, and gives you a suspicious look.\n\n\t\t\"I don't know yet,\" says Corley in a soft voice.\n\n\t\t*goto girls_roundabout\n\t#\"So do you think Mrs. Greeley is an alien, or are the eyes in the back of her head just a terrible genetic mistake?\"\n\t\t*set Respect %-10\n\t\t*set Secrecy %+10\n\t\t*set relV %-20\n\t\t*set relC %+10\n\t\tCorley giggles.\n\n\t\t*goto girls_roundabout\n\n*label girls_colluding\nCorley blinks at you like a nervous rabbit and looks to Vitessa for help. \n\nVitessa just rolls her eyes. \"Don't start, ${Name}. I can see right through you. You think I'm going to believe you want to recruit me as your little deputy? Yeah, right! You just want to schmooze so you can figure out if I did it.\"\n\nYou sigh, defeated. She has a point, though. \"Well,\" you say, \"did you?\" \n\n*goto girls_direct\n\n*label girls_direct\n\"Why would either of us want to take Shashi's game book? We,\" says Vitessa haughtily, \"would never play that ridiculous game. Wizards and monsters—who has the time for that nonsense? Besides, why would anyone like us ever want to pretend to be someone else? We're amazing the way we are. Isn't that right, Corley?\"\n\nCorley nods.\n\n*set vitessa_tomes_disdainful true\n*set corley_tomes_copies_vitessa true\n*goto lunch_bell\n\n*label girls_roundabout\nVitessa raises an eyebrow. \"What do you really want, ${Name}?\" \n\n\"What do you mean?\" you say innocently. \"I just came over to say hi. Get to know the new girl. Corley, right? I'm ${Name}.\"\n\n\"Corley's not going to be friends with your little group of nerds,\" says Vitessa, putting a protective hand on her shoulder. \"She's with me now. Isn't that right, Corley?\"\n\nCorley nods solemnly.\n\n*set vitessa_tomes_disdainful true\n*set corley_tomes_copies_vitessa true\n*goto lunch_bell\n\n*label guys_table\n\nYou slide into a seat across from Finnegan, next to Evan. Finnegan doesn't seem to notice you. He turns a page in his thick book, totally absorbed. Evan puts down his figurine and looks at you expectantly. \"Hey, ${Name}. What's up?\"\n\n*choice\n\t#\"Do you gentlemen want to help me find Shashi's missing book?\"\n\t\t*set Secrecy %-5\n\t\t*set relE %+10\n\t\t*set relF %+10\n\t\t*goto guys_colluding\n\t#\"Let's cut to the chase. I think one of you took Shashi's missing book.\"\n\t\t*set Secrecy %-20\n\t\t*set relE %-10\n\t\t*set relF %-10\n\t\t*goto guys_direct\n\t#\"How about that Vasco da Gama? He was a pretty inspiring explorer, huh?\"\n\t\t*set Respect %+10\n\t\t*set Secrecy %+10\n\t\t*set relE %+10\n\t\t*set relF %+10\n\t\tFinnegan nods thoughtfully, then shakes his head abruptly. \"In general, I find explorers inspiring, but I don't have time for a social studies conversation.\n\t\t*goto guys_roundabout\n\t#\"What are you going to wear to the Starlight Dance?\"\n\t\t*set fancy true\n\t\t*set Respect %+10\n\t\t*set Secrecy %+10\n\t\t*set relE %+10\n\t\tEvan grins. \"I got this great emerald green velour smoking jacket at the consignment store.\"\n\n\t\tFinnegan scoffs. \"I don't have time to think about such frivolous things. \n\t\t*goto guys_roundabout\n\t#\"So do you think Mrs. Greeley is an alien, or are the eyes in the back of her head just a terrible genetic mistake?\"\n\t\t*set Respect %-10\n\t\t*set Secrecy %+10\n\t\t*set relF %-10\n\t\t*set relE %+10\n\t\tEvan snorts milk through his nose, but Finnegan eyes you witheringly. \"I don't have time to trash talk teachers. \n\t\t*goto guys_roundabout\n \n*label guys_colluding\n\"Sure. I've always wanted to solve a mystery,\" says Evan cheerfully. \"I know I'd be upset if someone stole my copy of the [i]Swordmaster's Sourcebook[/i]. I have all the Swords and Sorcerers books at home. Maybe Shashi would like to borrow them.\" \n\nFinnegan nods. \"I normally don't like to get involved in projects that eat a lot of time and can't go on your resume. That's why I've never played the game, and that's why I usually leave the mystery solving to amateurs. But it looks awfully bad for the class president if his classmates are the victims of theft all the time. It's time for me to do something about this, once and for all.\"  \n\n\"What do we do first?\" Evan asks you.\n\n\"First, we need a list of everyone who had access to the coat room,\" says Finnegan. \"Then we need to question each suspect as to their means, motive, and opportunity. We should also dust the area for prints. Evan, you fingerprint everybody in the class. ${Name}, you make a list of suspects. Research their backgrounds. Provide me with a dossier by tomorrow morning. As project leader, of course, I'll conduct the actual interviews.\" \n\nYou frown. Since when did Finnegan become project leader? If he's going to be that bossy, maybe you don't want his help after all.\n\n*set finnegan_tomes_too_busy true\n*set evan_tomes_already_has true\n*goto lunch_bell\n\n*label guys_direct\n\"Ha!\" says Finnegan. \"I would never waste my time on that game. Do you know how much time Shashi puts into it? She's playing with two different groups, probably sinking eight, ten hours a week into it. I'd never put that much time into something I couldn't put on my resume. If you think the admissions officers for the magnet high schools are going to be impressed by your eleventh-level wizard, think again!\"\n\n\"Don't look at me,\" says Evan. \"Sure, I play the game from time to time, but I already have all the books at home. Why would I steal something I already have? Tell Shashi I'll lend her any book she wants, though.\" \n\n*set finnegan_tomes_too_busy true\n*set evan_tomes_already_has true\n*goto lunch_bell\n\n*label guys_roundabout\nI have to study for this math test.\" He sounds stressed.\n\n\"We don't have a math test coming up,\" says Evan. \"Do we?\"\n\n\"Not for school—for my weekend class. Number Theory for Prodigies.\" \n\n\"You have the weirdest hobbies,\" says Evan. \"You wouldn't catch me taking a class for fun.\" \n\n\"Well, you wouldn't catch me playing that silly game you and Shashi play,\" says Finnegan. \"I do feel sorry about her stolen property, but honestly, it's a waste of time. Maybe this will spur her to take up a more worthwhile hobby.\" \n\n\"I hope not,\" says Evan. \"She's the best Swordmaster I know! Maybe I can lend her my copy of the book. I barely use it. I'd rather play than be Swordmaster.\" \n\n*set finnegan_tomes_too_busy true\n*set evan_tomes_already_has true\n*goto lunch_bell\n\n*label lunch_bell\n*page_break\nThe bell rings. You glance across the lunch room at \n*if(assigned_aj)\n\tA.J., \n*if not(assigned_aj)\n\tShashi, \nwho nods back at you from\n*if(assigned_aj)\n\t${his} \n*if not(assigned_aj)\n\ther \nposition at the\n*if(you_talked_to_girls)\n\tguys' \n*if not(you_talked_to_girls)\n\tgirls' \ntable. \n\n*if(assigned_aj)\n\t*goto shashi_talk_after_lunch\n*else\n\t*goto aj_talk_after_lunch\n\n*label shashi_talk_after_lunch\nAs you stop by your table to grab your things, Shashi gets up to walk with you. \n\n\"Did you find out anything?\" Shashi asks. \n\n\"I'm not sure,\" you say slowly. \"It may turn out to be nothing, but….  I don't know. We'll see.\"\n\n\"Um, ${Name}…\" Shashi begins. \"I don't want to nitpick since you're helping me and all, but, well…. Oh, never mind. It doesn't matter.\" \n\n\"No, what is it?\" you say. \n\n*if(deputyA)\n\t\"I guess I'm just not sure if I'm okay with you using A.J. as your deputy,\"\n*if(deputyA = false)\n\t\"I guess I'm just not sure if I'm okay with A.J. helping in this investigation,\"\nsays Shashi. \"There was that whole thing with ${his} mom's bike, and ${he}'s friends with all those bad kids…. I know ${he}'s your friend, but, let's face it, ${he} has a history.\" \n\n*fake_choice\n\t#\"A.J. didn't do it. Maybe ${he}'s done some regrettable things in the past, but deep down, ${he}'s a good person, and I trust ${him} completely.\"\n\t\t*set relA %+30\n\t\t*set relS %-10\n\t\t*set Greed %+20\n\t\t\"If you say so,\" says Shashi, looking skeptical. \n\t\t*if(assigned_aj)\n\t\t\t*goto aj_thanks_consult\n\t\t*else\n\t\t\t*goto afternoon_session\n\t\t\n\t#\"I know. I haven't lost sight of that. I'll keep an eye on A.J.\"\n\t\t*set relA %-20\n\t\t*set relS %+10\n\t\t*set Greed %-10\n\t\tShashi nods, relieved. \"Good. Well, let me know if you find out anything else.\"\n\t\t\n\t\tAs she walks off, you feel a hand on your shoulder, and you turn around to see A.J. frowning. \"I heard what you said. Thanks a lot.\"\n\t\t\n\t\t\"Well, I'm sorry, but I am a detective. I have to be impartial,\" you say. \"I can't give you special treatment because you're my friend.\" \n\t\t\n\t\t\"Am I, though?\" A.J. asks. \"You could've stood up for me a little instead of throwing me under the bus. I'm not a thief! At least, well, I didn't take Shashi's book. Why would I? She's a good kid. Oh, forget it. You don't understand.\" A.J. thrusts ${his} hands in ${his} pockets and stalks off.\n\t\t\n\t\t*goto afternoon_session\t\t\n\t#\"We can't draw any conclusions yet. We have to see where the facts lead. Don't worry—I won't let my friendship with A.J. cloud my judgment.\"\n\t\t*set relA %-30\n\t\t*set relS %+10\n\t\t*set Greed %-30\n\t\tShashi nods, relieved. \"Good. Well, let me know if you find out anything else.\"\n\t\t\n\t\tAs she walks off, you feel a hand on your shoulder, and you turn around to see A.J. frowning. \"I heard what you said. Thanks a lot.\"\n\t\t\n\t\t\"Well, I'm sorry, but I am a detective. I have to be impartial,\" you say. \"I don't think you did it, but I can't give anybody special treatment.\" \n\t\t\n\t\tA.J. sighs. \"Okay, I guess I would be investigating me, too. But I didn't take Shashi's book. Why would I? She's a good kid.\"\n\n\t\t\"I agree. You don't have a motive,\" you say. \n\t\t*if(assigned_aj)\n\t\t\t*goto aj_agree_consult\n\t\t*else\n\t\t\t*goto afternoon_session\n\n*label aj_thanks_consult\n\"Well, let me know if you find out anything else.\"\n\nAs she walks off, you feel a hand on your shoulder, and you turn around to see A.J. grinning. \"Hey, I heard what you said. Thanks!\"\n\n\"No problem. I meant it,\" you say. \"Well? How did it go with the \n*if(you_talked_to_girls)\n\tguys?\n*if not(you_talked_to_girls)\n\tgirls? \nDid you find anything out?\"\n\n*goto aj_consult  \n\n*label aj_consult\nA.J. shrugs.\n*if(you_talked_to_girls)\n\t*goto aj_on_the_guys\n*else\n\t*goto aj_on_the_girls\n\n*label aj_agree_consult\n\"How about the \n*if(you_talked_to_girls)\n\tguys?\n*if not(you_talked_to_girls)\n\tgirls? \nDid you find anything out?\"\n\n*goto aj_consult\n\n*label aj_on_the_guys\n\"I thought Evan and Finnegan were good suspects because they're both nerdy, but I don't think they really have good motives. Finnegan thinks the game is a waste of time cause he can't put it on his resume, and Evan's already got that book. How about your conversation with the girls? You think Vitessa might have done it? She's a real jerk.\"\n*set finnegan_tomes_too_busy true\n*set evan_tomes_already_has true\n\n\"I don't like her, either, but she doesn't have a motive,\" you say. \"She hates the game, and she's got no beef with Shashi. I couldn't get much out of Corley.\"\n\n\"You think Little Miss Mouse might be our thief?\" \n\n*goto preliminary_corley_assessment\n\n*label aj_on_the_girls\n\"I tried to give them the old A.J. charm, but they weren't having it,\" says A.J. \"Vitessa hates my guts, of course. Always has. She's a real princess. But she doesn't play the game. She thinks it's dumb. How was your conversation with the guys? You think Evan might have done it? He plays the game, right?\"\n*set vitessa_tomes_disdainful true\n*set corley_tomes_copies_vitessa true\n\n\"Yeah, but he says he already has that book,\" you say. \"And Finnegan thinks the game is a waste of time. Did you talk to the new girl, Corley?\"\n\n\"Ish,\" says A.J. \"She was there, but she just sat there looking scared and agreeing with everything Vitessa said. We should try to rescue her from Vitessa's evil clutches…. Unless you think Miss Mouse might be our thief?\"\n\n*label preliminary_corley_assessment\n*fake_choice\n\t#\"Probably not. She seems so nice.\"\n\t\t*set relC %+10\n\t#\"Could be. I'll keep an open mind.\"\n\t\t*set Greed %-10\n\t#\"I don't like to discuss my thoughts before the evidence is in.\"\n\t\t*set Secrecy %+10\n*goto afternoon_session\n\n*label aj_talk_after_lunch\n\"Did you find out anything?\" A.J. asks. \n\n\"I'm not sure,\" you say slowly. \"It may turn out to be nothing, but….  I don't know. We'll see.\"\n\n\"I could help, you know,\" says A.J. \"I could talk to people. I could find out stuff.\" \n\n\"Sure, I know,\" you say. \"Maybe next time.\" \n\nA.J. frowns. \"You suspect me, don't you? You think I might have done it.\"\n\n\"Of course not,\" you say. \n*if(deputyA)\n\t\"You're my deputy. \n*if(deputyA = false) and (relA >= 60)\n\t\"You're my friend. \n*if(deputyA = false) and (relA \u003c 60)\n\t\"I don't have a shred of evidence against you.\nI just thought Shashi might want to get in on the ground floor of her own case.\"\n\n\"Oh,\" says A.J., mollified. \"Okay. I get that.\" \n\n\"I'll give you something to do, I promise. Just as soon as I get a breakthrough in the case.\" \n\nShashi catches up with you.\n*if(you_talked_to_girls)\n\t*goto shashi_on_guys\n*else\n\t*goto shashi_on_girls\n\t\n*label shashi_on_guys\n\"Well, I talked to the guys, like you said, but I don't think they did it,\" says Shashi. \"Finnegan hates anything he can't put on his resume, and I can confirm he doesn't play. Evan plays, but he's got his own complete set of Swords and Sorcerers books, including all the expansions. He says I can borrow any book I want!\" \n*set finnegan_tomes_too_busy true\n*set evan_tomes_already_has true\n\n\"That's great!\" you say. \n\n\"Did you get anything out of the girls?\" she asks. \n\n\"I don't know,\" you say. \"Vitessa's like Finnegan. She looks down on the game. Corley was just silent.\" \n\n\"It's her first day. She's scared,\" says Shashi. \"Poor thing. We should ask her to do something. Hey, maybe if I get my book back, I'll invite her to play. Find it quickly, okay?\"\n\n\"I'll do my best,\" you say.\n\n*goto afternoon_session\n\n*label shashi_on_girls\n\"Well, I talked to the girls like you said, but I didn't get anywhere,\" says Shashi. \"Vitessa doesn't play—she thinks the game is dumb. She tried to convince me that this is a sign that I should give up on childish games and get into fashion like her. I told her I love fashion, but I just like different things than she does. She likes designer couture, and I like the dress of an elf maiden.\" \n*set vitessa_tomes_disdainful true\n*set corley_tomes_copies_vitessa true\n\n\"What about the new girl, Corley?\" you say.\n\n\"Oh, she just sat there looking scared and agreeing with everything Vitessa said. Vitessa's sort of adopted her. If we don't watch out, Vitessa will make her over, and then there'll be no getting her back. Why? You don't think she did it?\" \n\n\"Probably not,\" you admit.\n\n\"Did you find out anything from the guys?\" Shashi asks. \n\n\"Not really. Finnegan hates anything he can't put on his resume, and Evan's already got that book. He says you can borrow his, by the way.\"\n\n\"Oh, score!\" says Shashi. \"I'd still like my own copy back, though.\"\n\n\"I'm working on it,\" you promise.\n\n*goto afternoon_session\n\n*label afternoon_session\n*finish\n", "ch2tomes_sc4search": "The afternoon drags. It's hard to concentrate on school when you're trying to solve a crime. But there's not much you can do from your seat, with Mrs. Greeley assigning a new worksheet every twenty minutes. \n\nFinally, the bell rings, and your classmates gather their things, getting ready to head out for the day.\n\nShashi stops by your desk. \"I don't want to rush you, but do you think you'll get my book back in time for tonight's game?\"\n\n\"Still don't have your book?\" Evan cuts in, overhearing her. \"I can lend you my copy.\"\n\n\"Thanks, but mine had my notes in it,\" says Shashi.\n\n*choice\n\t#\"Shashi, be nice! Borrow it anyway. Evan, why don't you walk her home? I'm sure you two have a lot to talk about.\"\n\t\t*set relS %-10\n\t\t*set relE %-10\n\t\tShashi and Evan glance at each other warily.\n\t\t\n\t\t\"I don't need to be walked home,\" says Shashi. \"I know the way.\"\n\t\t\n\t\t\"Of course,\" says Evan.\t\"I can just drop off the book. What time is your game?\"\n\t\t\n\t\t\"Five,\" says Shashi.\n\t\t\n\t\t\"Perfect!\" you say. \"Plenty of time for you both to get changed. Put on a little makeup.\"\n\t\t\n\t\t\"What, me? I don't wear makeup!\" Evan yelps.\n\t\t\n\t\t\"I meant Shashi,\" you say.\n\t\t\n\t\t\"Me? I don't really wear makeup either,\" says Shashi. \"Not unless I'm playing a witch or a sorcerer.\"\n\t\t\n\t\t\"Oh. Well, I have the best idea!\" you say. \"Evan, why don't you play in Shashi's game tonight?\" \n\t\t\n\t\tShashi and Evan blink at each other, and both begin to stammer.\n\t\t\n\t\t\"We kind of have a full group, so—\" Shashi stammers.\n\t\t\n\t\t\"I'm pretty busy tonight, so—\" Evan stammers.\n\t\t\n\t\t\"Oh, you two are hopeless,\" you say with a sigh.\n\t\t\n\t\t\"Okay, well, I'll get you that book. Bye,\" says Evan, taking this moment to make good his escape.\n\t\t\n\t\t*goto after_evan\n\t\n\t#\"Thanks anyway for the offer, Evan. If you ever lent me anything, I would borrow it.\"\n\t\t*set relE %+20\n\t\t\"Oh. Okay,\" Evan nods, a little blush creeping up his collar. \"Well, I'd be happy to lend you something if you ever need anything. Just let me know, okay?\" He walks backwards, trips over a chair, gets up, rights the chair, and runs for the exit.\n\t\t\n\t\t*goto after_evan\n\t\t\n\t#\"Evan, don't you see, it's not about the book. Shashi's game notes are irreplaceable, and I am going to do everything in my power to recover them.\" \n\t\t*set relS %+20\n\t\tShashi nods at you gratefully. \"You really understand! I wasn't sure if you would. So many people think the game is silly.\"\n\t\t\n\t\t\"I don't,\" you say loyally.\n\t\t\n\t\t\"I mean, I don't either,\" says Evan. \"But I can see you guys are having a moment here, so I'll see myself to the door.\" He makes his way out of the room.\n\n\t\t*goto after_evan\n\n*label after_evan\t\t\nShashi turns to you. \"I have a couple of hours before my game. What can we do now?\"\n\n\"Let's search the coat room for any clues we may have missed,\" you suggest. \n*temp shashi_present true\n\n*if(Respect \u003c 25)\n\t*temp jacket \"leather jacket\" \n\t*temp material \"leather\"\n\t*temp mean_note \"The Fonz called, he wants his look back.\"\n\t*goto jacket_descriptions\n*elseif(Respect \u003c 50)\n\t*temp jacket \"jean jacket\"\n\t*temp material \"denim\"\n\t*temp mean_note \"Do you think ${she_u} ever wears anything other than a T-shirt and jeans? It's like ${hers_u} uniform. I'm so bored, I want to stab myself.\"\n\t*goto jacket_descriptions\n*elseif(Respect \u003c 75)\n\t*temp jacket \"cardigan\"\n\t*temp material \"wool\"\n\t*temp mean_note \"Somebody's mommy dresses ${her_u}.\"\n\t*goto jacket_descriptions\n*else\n\t*temp jacket \"blazer\"\n\t*temp material \"tweed\"\n\t*temp mean_note \"I hope ${she_u} will be very happy selling real estate with the other 85-year-olds.\"\t\n\t*goto jacket_descriptions\n\n*label jacket_descriptions\nNow that all the other students have left, you and Shashi have the coat room to yourselves. It's mostly empty. Shashi's tuba case is on the high shelf, and her book bag is on the floor. The only coats on the hooks are your ${jacket}, Shashi's fuzzy white hoodie, and the yellow jacket with flower patches that you noticed this morning. A narrow shaft of afternoon sunlight streams in through the barred window. Below the window, an abandoned apple lies beneath the dusty radiator. Assorted crumpled worksheets paper the ground.\n\n*if(shashi_present = true)\n\t\"Somebody forgot their jacket,\" Shashi remarks, fingering the yellow denim. \n*set seen_jacket true\n\n*fake_choice\n\t#Examine the crumpled papers on the floor.\n\t\tYou find several old homework sheets caked with brown footprints, a permission slip from an old field trip, and a note in Vitessa's handwriting that says, \"Did you see what ${Name} was wearing today? ${mean_note}\" \n\t\t\n\t#Examine the window.\n\t\tThe window is narrow and barred. All the second-floor and higher windows are. A.J. thinks this is so nobody will jump. \t\n\t\t\n\t\tYou try opening the window. It slides open easily. There is no screen. You peer out. Directly below the window is a deep, wet mud puddle that never really seems to dry up, no matter how dry it gets. Kids push each other into it sometimes. \n\n\t#Examine the yellow jacket.\n\t\tThe jacket is a girls' extra small size. You don't think you've ever seen it before. You pick it up off the hook and look at the interior, which is lined with flowery flannel. The collar has a tag sewn into it which reads, \"Lovingly sewn for Corley by Grandma.\" \n\n\t\t*set know_corleys_jacket true\n\t#Examine the apple.\n\t\tIt's brown and shriveled, and it has a few creepy pinholes in it. You decide to leave it alone.\n*comment endif\n\n*if shashi_present\n\t\"${Name}, look!\" Shashi cries, pointing. \"There's something wedged in behind the radiator.\"\n*if not(shashi_present)\n\tAs your eyes sweep past the radiator, something makes you look back. Is there something wedged in behind there?\n*comment endif\n\nYou kneel at the radiator and examine it. Sure enough, there is a sheaf of papers wedged in behind it. The radiator is warm to the touch, and you probably shouldn't stick your bare hand behind it. \n\n*temp kicks 0\n*label radiator_choice\n*choice\n\t*if(seen_jacket)\n\t\t#Use the yellow jacket to protect my hand.\n\t\t\t*set Greed %+10\n\t\t\tOkay, it's not yours, but fine. You wrap your hand in the yellow jacket. \n\t\t\t*if(know_corleys_jacket = false)\n\t\t\t\tAs you do, you notice it has a tag sewn into it that reads, \"Lovingly sewn for Corley by Grandma.\" \n\t\t\n\t\t\t*set know_corleys_jacket true\n\t\t\t*goto jacket_smear\n\t#Use your jacket to protect my hand. \n\t\t*set Greed %-10\n\t\tWow, it's noble of you to risk messing up your own precious ${jacket}. You'll never get all the scuff marks off the ${material}.\n\n\t\t*goto jacket_smear\n\t*disable_reuse #Ask Mrs. Greeley for a yardstick.\n\t\tYou head back into the classroom. Mrs. Greeley is sitting at her desk, grading papers. You stand at her elbow and wait expectantly.\n\t\t\n\t\t\"May I help you?\" Mrs. Greeley asks.\n\t\t\n\t\t\"I'd like to borrow a yardstick, if I may,\" you say sweetly.\n\t\t\n\t\t*if(Respect > 60)\n\t\t\t\"Certainly,\" says Mrs. Greeley cheerfully, handing it to you. \"What are you doing, the extra credit project on measurement and metric conversions? Remember to start at 0, not the end of the ruler.\"\n\t\t\t*goto use_the_ruler\n\t\t*elseif(Respect > 40)\n\t\t\tMrs. Greeley eyes you suspiciously. \"Okay, but bring it back right away. And if I hear a single suspicious sound coming from that coat room, I am coming in immediately.\" \n\t\t\t\n\t\t\t*goto use_the_ruler\n\t\t*else\n\t\t\t\"I don't think so!\" Mrs. Greeley says with a laugh. \"What do you want it for, to play swords or simply for the base pleasure of hitting another student? I know you're not measuring anything. Go home, why don't you?\"\n\t\t\t\n\t\t\t\"Fine,\" you grumble, wandering back into the coat room. You didn't butter up the teacher enough to win a favor. You'll have to try something else.\n\t\t\t\n\t\t\t*goto radiator_choice\n\t\t\t\n\t*if(kicks = 0) \n\t\t#Kick the radiator!\n\t\t\t*set Respect %-10\n\t\t\tYou kiss your fingers, touch them to the toe of your boot, pull back, and kick! \n\t\t\t\n\t\t\tNo effect.\n\n\t\t\t*set kicks +1\n\t\t\t*goto radiator_choice\n\t*elseif(kicks = 1)\n\t\t#Kick again!\n\t\t\t*set Respect %-5\n\t\t\tYou kick again! The papers are jostled slightly. \n\t\t\n\t\t\t\"What's going on in there?\" comes Mrs. Greeley's voice.\n\t\t\n\t\t\t\"You're being loud,\" Shashi says worriedly.\n\t\t\n\t\t\t*set kicks +1\n\t\t\t*goto radiator_choice\n\t*elseif(kicks > 1) \n\t\t#Kick again!\n\t\t\t*set Respect %-5\n\t\t\tYou pull back doggedly for a third kick. Shashi covers her ears. \n\t\t\t\n\t\t\tYou kick again! Really hard this time! \n\t\t\n\t\t\tThere go the papers, fluttering to the ground beneath the radiator. Shashi gathers them up.\n\t\t\n\t\t\t*goto my_notes\n\t\t\n*label jacket_smear\t\t\nNo time to worry about that now. You slide your hand up behind the radiator, streaking the interior of the jacket with dust and grime, reach up, and grab the papers. With a little jostling, they come loose and fall onto the floor. Shashi gathers them up.\n\t\t\n*goto my_notes\n\n*label use_the_ruler\nYou hurry back to the coat room and shove the ruler down the back of the radiator, pushing the papers until they come loose and flutter onto the floor. Shashi gathers them up.\n\n*label my_notes\n\"My notes!\" Shashi cries joyously. \"My precious, precious notes!\"\n\n\"Those are your notes?\" you ask, surprised. \"Really? From the book?\"\n\nShashi nods, hugging them to her chest. \"Oh, man! I should probably run home and try to put these in some kind of order before the game.\" Shashi jumps to her feet. She tucks her notes into her (mostly empty) book bag, puts on her jacket, gets down her tuba, and awkwardly run-walks out the door.\n\nYou just stand there, looking at the radiator. How did the notes get there? And where is the book?\n\n*finish", "ch2tomes_sc5library": "While you're standing there, Mrs. Greeley pokes her head in. \n*if(Respect > 50)\n\tShe chuckles. \"I know you love school, dear, but you can go home now! By the way, did Shashi already leave?\"\n\t*goto leave_choice\n*elseif(Respect > 30)\n\tShe looks perplexed. \"What are you still doing here? You know you can go home now. Run along. Did Shashi already leave?\"\n\t*goto leave_choice\n*else\n\tShe looks annoyed. \"No loitering. You need to get going. Did Shashi already leave?\"\n\t*goto leave_choice\n\t\n*label leave_choice\n*choice\n\t#\"I'm afraid she went on to her game, Mrs. Greeley, but I'll certainly run after her with a message if you like.\"\n\t\t*set Respect %+20\n\t\t*set Secrecy %-10\n\t\t*if(Respect > 65)\n\t\t\t\"Thank you, dear, but it's probably nothing,\" says Mrs. Greeley.\n\t\t\t\n\t\t\t\"What's probably nothing?\" you ask.\n\t\t\t\n\t\t\t*goto greeley_lib_lead\n\t\t*elseif(Respect > 35)\n\t\t\tMrs. Greeley raises an eyebrow. \"Don't wear yourself out. It's probably nothing.\"\n\t\t\t\n\t\t\t\"What's probably nothing?\" you ask.\n\t\t\t\n\t\t\t*goto greeley_lib_lead\n\t\t*else\n\t\t\tMrs. Greeley eyes you suspiciously. \"Is that sarcasm or something? Either way, it doesn't matter. It's probably nothing.\" \n\t\t\t\n\t\t\tOkay, she's got you curious. \"What's probably nothing?\" you ask.\n\t\t\t\n\t\t\t*goto greeley_lib_lead\n\t#\"What's it to you?\"\n\t\t*set Respect %-20\n\t\t*set Secrecy %+10\n\t\t\"Manners!\" says Mrs. Greeley.\n\t\t*goto greeley_lib_lead\n\t#\"Wouldn't you know it? She disappeared in a puff of smoke!\"\n\t\t*set Respect %-20\n\t\t*set Secrecy %+10\n\t\t\"Ha, ha,\" says Mrs. Greeley dryly.\n\t\t*goto greeley_lib_lead\n\t\t\n*label greeley_lib_lead\n\"I stepped out for a moment, and the librarian left me a note asking to send her down first thing tomorrow morning. I thought if she was still here, I could save everyone some time. But she's gone home, so I'll just tell her tomorrow.\" \n\n\"What does Mr. Corvis want?\" you ask.\n\n\"I don't know,\" says Mrs. Greeley. \"Maybe she has an overdue book. It's not really my concern—or yours. Now get along home before your parents start to worry!\"\n\nYou walk downstairs to the first floor. The library is on your left. It might be nothing, but it can't hurt to check in! \n\nMr. Corvis is at the main circulation desk, stamping books. \n\nYou knock on the side of the door. He immediately jumps, startled.\n\n\"Um, you wanted to see Shashi?\" you say.\n\n\"Oh, right!\" Mr. Corvis adjusts his glasses and squints at you. \"You're not Shashi…are you?\"\n\n*choice\n\t#\"No, I'm ${Name}. I'm a detective, and I'm looking into anything unusual connected to Shashi.\"\n\t\t*set Secrecy %-20\n\t\t\"A detective?\" Mr. Corvis laughs nervously. \"Well, don't detect me!\"\n\t\t\n\t\t\"What?\" you say.\n\t\t\n\t\t\"What?\" says Mr. Corvis. He seems to regret his remark and is now pretending that he did not hear it, either. \"Anyway, I don't think this is a matter for any detective. Shashi seems to have misplaced one of her books.\"\n\t\t*temp shashis \"Shashi's\"\n\t\t\n\t\t*goto get_the_book\n\t#\"Let's just say I'm a friend.\"\n\t\t*set Secrecy %+20\n\t\t\"I didn't think you were Shashi, but I'm not very good with names,\" says Mr. Corvis. \"If you're friends with Shashi, maybe you can give her this book of hers.\"\n\t\t*temp shashis \"Shashi's\"\n\t\t\n\t\t*goto get_the_book\n\t#\"Yep, that's me.\"\n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t*set you_tell_corvis_youre_shashi true\n\t\t*if(gender = \"boy\")\n\t\t\t\"Oh?\" Mr. Corvis blinks at you, confused. \"I don't…. Huh. For some reason, I thought Shashi was a girl.\"\n\t\t\t\n\t\t\t\"Nope,\" you say. \"I am Shashi.\"\n\t\t\n\t\t\"Are you sure? I could have sworn….\" Mr. Corvis shakes his head. \"Of course, you know better than I do. Well, then, I think I have one of your books.\"\n\t\t*temp shashis \"your\"\n\t\t\n\t\t*goto get_the_book\n\n*label get_the_book\t\t\n\"A book?\" you repeat excitedly. Of course, the library. The perfect place to find a book!\n\n\"Yes. Here, let me get it.\" Mr. Corvis ducks behind the desk and emerges with a book wrapped in stiff, muddy paper towels. \"I'm afraid it's not in very good condition. This is how it came into my drop-off chute, I'm afraid. I spent all morning cleaning the chute! Mud was dripping from it. Dear, oh, dear. I don't like to see books treated this way. Anyway, this is ${shashis} signature, right?\" Mr. Corvis opens the cover, which flips back jerkily with a stiff whine. Hardened mud flakes onto the desk. The first page of the book, which is also heavily browned and water-damaged, is signed with a slightly blurred handwriting: \"Shashi.\" \n\n\"That's it, all right.\" You grab the book. You've found your prize! Although, as usual, you have more questions than answers. \n*set got_book true\n\nDespite your success, you walk home with a heavy heart (and a heavy backpack). Shashi will not be happy to see the book in this state. \n*if(tomes_pay_rate > 0)\n\tYou wonder if she will still pay you for a ruined book.\n*finish", "ch2tomes_sc6bookreturn": "\"${Name}! ${Name}!\" Shashi calls to you across the schoolyard. \n\nYou're on time to school this morning. (A.J. was still in ${his} pajamas when you stopped by, and ${he} told you to go on ahead.) But you're dreading this meeting with Shashi, having to show her the mangled book. She seems excited, poor thing, and breaks into a run. A brown-paper bag festooned with ribbons swings from her hand. You meet her under the old elm.\n\n\"I can't believe it!\" she squeals excitedly. \"Did you know about this?\" She reaches into the bag and pulls out…a shiny new copy of [i]The Swordmaster's Sourcebook[/i]. Perfectly clean and new-looking.\n\nYou can't believe your eyes. But…but…Shashi's book is in your backpack right now! You can feel the weight of it. And it's ruined. You cleaned it up as best you could at home, but its cover is still heavily stained; it's missing one of its jewels; and, worst of all, its pages are permanently brown, stiff, and wavy from soaking in muddy water.\n*set shashi_got_book true\n\n\"Was it you?\" Shashi asks. \"Did you give it to me?\"\n*temp you_took_credit false\n\n*choice\n\t#\"This isn't your book.\"\n\t\t*set Secrecy %-10\n\t\t*set Greed %-10\n\t\t\"I know,\" says Shashi.\n\t\t\n\t\t*goto new_copy\n\t#\"I wish it had been me, but no! It must have been a secret admirer. I'm glad somebody found your book, safe and sound!\"\n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t\"I wonder who it was, then!\" says Shashi. \"But whoever it was didn't find it. They bought it. It's a new copy.\"\n\t\t\n\t\t*goto new_copy\n\t*if(tomes_pay_rate > 0)\t\n\t\t#\"Yes, it was me. Please give me my money now.\"\n\t\t\t*set lie_count +1\n\t\t\t*set Greed %+20\n\t\t\t*goto you_take_credit\n\n\t#\"Yes, it was me. I just wanted to make you smile.\"\n\t\t*set lie_count +1\n\t\t*set relS %+20\n\t\t*goto you_take_credit\n\n*label you_take_credit\n*temp you_took_credit true\n\"Well, thank you, but you know, you didn't need to do this!\" says Shashi. \"You know, technically, if you buy me a new copy of the book, it doesn't really count as solving the case. I mean, of course I'm happy to have it.\n*if(tomes_pay_rate > 0) and (tomes_pay_rate \u003c 40)\n\tIt is a discount for me, I mean, I'm paying you less than the book costs!\nBut you didn't need to buy me a new copy.\"\n\n*goto new_copy\n\t\t\n*label new_copy\n\"You know it's a new copy?\" you say.\n\n\"Yes, of course. I'm not totally unobservant. Look.\" Shashi flips to the first page. \"I wrote my name in mine, but on the first title page, not the second one. And I always use a blue pen, but this one is black. Also, it's not my handwriting.\" \n\nYou nod. She's right, of course, on all counts. \n\n\"Also,\" Shashi goes on, \"I found the receipt.\" She flips to the back page of the book, where the receipt has been tucked in, and shows it to you. \"It's from the Eldritch Abyss. I didn't buy my book there.\"\n\n\"You didn't?\" you say. \"I would have thought that store would be your heaven. All gaming supplies and plushie monsters.\"\n\n\"I love it,\" says Shashi, \"but it's overpriced. Look, \n*if(you_took_credit = true)\n\tthis book cost\n*if(you_took_credit = false)\n\twhoever bought this spent\na full sixty dollars. I got my book online for half the cost.\"\n\n\"Too bad the buyer paid cash, or we'd have their name and signature,\" you say. \"Oh well. At least we know the time of the purchase—yesterday at 5:30 in the evening.\" \n\n*if(you_took_credit)\n\t\"I thought you said you bought it,\" Shashi grins slyly. \"I knew it! I knew you were lying!\"\n\t\n\t\"Arrgh, busted,\" you admit. \"Sorry. I just can't help looking for clues.\" \n*comment endif\n\n\"Remember, you're trying to find the thief, not the person who gave me this present,\" says Shashi. \"I'd love to thank them, but I don't think it's a priority.\"\n\n*choice\n\t#\"Maybe we should call off the hunt. Have you considered that the thief and the gift giver may be the same person?\"\n\t\t*set Secrecy %+20\n\t\t*set Greed %-10\n\t\t\"I thought of that,\" says Shashi. \n\t\t\n\t\t*goto same_person_consider\n\t#\"You're right. Theft is a crime, and gift giving is not. I'll focus my efforts on the thief.\"\n\t\t*set Greed %-20\n\t\t*set relS %+10\n\t\t\"That being said,\" Shashi continues, \"I can't ignore the possibility that the thief and the gift giver are the same person.\"\n\t\t\n\t\t*goto same_person_consider\n\t*if(tomes_pay_rate > 0)\n\t\t#\"You're the one paying me, so I'll focus on whatever you want me to.\"\n\t\t\t*set Greed %+20\n\t\t\t*set relS %+10\n\t\t\t\"Then let me run a theory by you,\" says Shashi. \"What if the thief and the gift giver are the same person?\"\n\t\t\t\n\t\t\t*goto same_person_consider\n\t#\"Just let me conduct my investigation my way. I can't go into details, but I have a theory.\"\n\t\t*set Secrecy %+30\n\t\t\"Is it that the thief and the gift giver are the same person?\" says Shashi. \"Because I thought of that.\"\n\t\t\n\t\t*goto same_person_consider\n\t\t\n*label same_person_consider\nShe's quicker than you gave her credit for. \n\n\"I mean, I thought it might be you,\" Shashi went on, \"because you have a vested interest in wanting the case to be closed. But I also thought, What if it's the thief? But I can't figure out why. If they have the money and the ability to go out and buy their own anytime they want, why did they steal mine to begin with?\"\n\n*choice\n\t#\"Maybe they felt guilty.\"\n\t\t*set Greed %-10\n\t\t*set Respect %+10\n\t\t\"If it's guilt, why not just return my original copy?\" Shashi asks. \"It's not like they accidentally mixed them up. They purposely wrote my name in the front to make me think it was mine.\" \n\t\t\n\t\tActually, you can think of a reason why. You think about the ruined book in your backpack.\n\t\t\n\t\t*goto show_choice\n\t#\"Maybe they felt the investigation heating up.\"\n\t\t*set Greed %-10\n\t\t*set Respect %-10\n\t\t\"If they just wanted out, why not just return my original copy?\" Shashi asks. \"It's not like they accidentally mixed them up. They purposely wrote my name in the front to make me think it was mine.\" \n\t\t\n\t\tActually, you know a reason why. You think about the ruined book in your backpack.\n\t\t\n\t\t*goto show_choice\n\t#\"Maybe they didn't have the money yet. Maybe they sold your copy and used the profit to buy you a new one.\"\n\t\t*set Greed %+10\n\t\t\"Where would they possibly make a profit?\" says Shashi. \"My copy was used—lightly used, but still. I don't think it would pass for new. And we know they bought the new copy at full list price. I don't think you're legally allowed to sell it for more than that.\" \n\n\t\t\"They could have sold it on the black market,\" you suggest.\n\t\t\n\t\t\"Why would there be a black market for something you can get legally?\" says Shashi. \"And why would the criminals charge more? Nobody would go to that market! It doesn't make sense.\"\n\t\t\n\t\tActually, you can think of another reason why the \"thief sold it\" theory doesn't hold water. You know they didn't sell the original copy, because it is right there in your backpack. \n\t\t\n\t\t*goto show_choice\n\t#\"Maybe they didn't want to be seen in a game store.\"\n\t\t*set Secrecy %+10\n\t\t*set relS %-10\n\t\tShashi makes a face at you. \"There's no shame in liking the game! Anyway, that couldn't have been too much of a problem for them, because they got over that to go to the game store last night. But if they just wanted this whole thing to be over, why not give me back my original book? It's not like they accidentally mixed them up. They purposely wrote my name in the front to make me think it was mine.\" \n\t\t\n\t\tActually, you can think of a reason why. You think about the ruined book in your backpack.\n\t\t\n\t\t*goto show_choice\n\t\t\n*label show_choice\n\"Anyway, whoever they are, I'm grateful,\" says Shashi, hugging the book to her. \"I felt really bad last night imagining what might have happened to my book. I had a nightmare about the teacher shredding it!\" She shudders.\n\nYikes! She is really not going to like knowing what happened to her book. \n\n*choice\n\t#Get it over with and show her the damage. The truth must come out. \n\t\t*set Secrecy %-20\n\t\t*set relS %-10\n\t\t*goto show_shashi\n\t\n\t#Gently break the news. This is the job I was hired for. Hey, maybe I'll get honesty points.\n\t\t*set Secrecy %-10\n\t\t*set Greed %+10\n\t\t*set relS %+10\n\t\t*goto show_shashi\t\t\n\t#Pretend I never found the book. Spare her the ugly sight. She doesn't need to see the carnage.\n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t*goto do_not_show_shashi\n\n\t#Say nothing. I'll spare myself a scene…and Shashi's wrath.\n\t\t*set Greed %+20\n\t\t*set lie_count +1\n\t\t*goto do_not_show_shashi\n\n*label show_shashi\nYou open your backpack and hand Shashi the mud-caked book. She looks horrified when she sees the damage. \n\n\"Aurgh!\" she yelps, as if in pain. \"What—what happened?\"\n\n\"I don't know. The librarian found it like this. He thinks it got dropped in the everlasting mud puddle.\" \n\n\"It smells like it. Oh man. Oh man.\" Shashi bites her lip, blinking at the book. Then she looks up at you with wild hope. \"Are you sure this is my copy?  Maybe this is some other poor sap's ruined book.\"\n\n\"Shashi,\" you say gently.\n\n\"Oh, I know.\" Shashi's eyes fill with tears. \"Who…who treats a book this way?\"\n\nThe bell rings, but Shashi keeps staring at her ruined book. \"You're still on the case, right?\" she asks you. \"You have to figure out who did this.\"\n\n*goto classroom_day2\n\n*label do_not_show_shashi\n\"I'm sure your book is safe and sound on the thief's shelf at home,\" you assure her. \"I'm sure it is being well taken care of.\"\n\n\"Well, we're no closer to figuring out who the thief is,\" Shashi complains. \"You're still on the case, right?\"\n\n*goto classroom_day2\n\n*label classroom_day2\nYou nod. \"First period is study hall. That's the perfect environment for interviewing the witnesses—and the suspects. We'll all be trapped in the library, and I can move from table to table asking questions. If the thief is there, I will suss them out. Mark my words!\"\n\n\"I'm marking them now,\" says Shashi, pulling a scrap of paper from her pocket. She writes, \"${Name} will figure out the thief by end of first period.\" She makes you sign it.\n\nNow all you have to do is find the thief!\n*finish", "ch2tomes_sc7studyhall": "*temp earned_your_money false\n*temp you_took_the_blame false\n*temp you_sold_out_corley false\n*temp you_sold_out_aj false\n*temp questioned_c false\n*temp talked_to_c false\n*temp maxconvos 6\n*temp minutelength 5\n*temp perlength maxconvos * 5\n*temp aj_apparently_knew false\n*temp corley_publicly_confessed false\n*temp you_sold_out_aj false\n*temp you_took_the_blame false\n*temp conversations \"conversations\"\nStudy hall. Your class gathers in the library to do homework, work on research, and study for upcoming tests. You are free to move around the room and have quiet conversations, as long as you don't speak loudly enough to attract the attention of Mrs. Greeley or the librarian. The period is ${perlength} minutes long, meaning you have time for ${maxconvos} ${minutelength}-minute ${conversations}. \n\nYou sit at a table by the encyclopedias, planning your attack. A.J. sits across from you, carving swears into the desk. At the other end of your table, Shashi is drawing an elaborate fantasy map and looking things up in her new copy of [i]The Swordmaster's Sourcebook.[/i] \n\nOn the other side of the reference section, Finnegan is sitting by himself, hunched over a large book. Over at the computer terminal, Evan is goofing around on the Internet. Vitessa is reading a [i]Seventeen[/i] in the periodicals corner. Corley is sitting alone, hunched in her yellow denim jacket, reading a book called [i]1001 of the World's Gut-Bustingest, Side-Splittingest Jokes[/i] with a deeply serious expression.\n\nMrs. Greeley has her grade book set up at the table by the door. Occasionally, she sweeps the room for improper behavior. Mr. Corvis is at the circulation desk, sorting through a cart of recently returned books.\n*temp convos 0\n*temp shashi_plays 0\n*temp you_talked_to_shashi false\n*temp aj_talked_to_corley false\n*temp you_talked_to_vitessa false\n*temp corley1_done false\n\n*label sh_choice\n*temp convos_left maxconvos - convos\n*temp timeleft convos_left * minutelength\n*set conversations \"conversations\"\n*if(convos_left = 1)\n\t*set conversations \"conversation\"\n*if(convos = 0)\n\tRemember, you have time for ${maxconvos} ${conversations}. Who would you like to speak to first?\n\t*goto sh_menu\n*elseif(convos_left \u003c= 0)\n\t*goto sh_timesup\n*else\n\tYou have ${timeleft} minutes left—time for ${convos_left} more ${conversations}. Who would you like to speak to next?\n\t*goto sh_menu\n\n*label aj_corley\n*temp endgame_begins maxconvos - 3\n*comment: leave 3 conversation at the end so this always happens, even if you talk to both a.j. and corley in one of the final convos\n*if not(aj_talked_to_corley) and (convos > endgame_begins) \n\t*temp aj_talked_to_corley true\n\tYou notice A.J. taking a seat across from Corley. Corley greets ${him} with a smile. A.J. says something and gently puts a hand on Corley's elbow. Corley looks serious—not upset, but serious. \n\t*if(aj_quit = true) or (deputyA = false)\n\t\tYou wonder what they have to discuss so intently.\n\t\t\n\t\t*return\n\t*else\n\t\tInteresting. A.J. pumping her for information, or is this purely a social call? \n\t\t\n\t\t*return\t\n*return\n\t\t\n*label sh_menu\n*set convos +1\n*if(convos > 8)\n\t*goto sh_timesup\n*else\n\t*choice\n\t\t*disable_reuse #A.J.\n\t\t\t*goto sh_aj\n\t\t*hide_reuse #Shashi\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_shashi\n\t\t*if(you_talked_to_shashi) #You know, I know talking to Shashi is probably not advancing my investigation, but it's fun, so I'm going to keep doing it.\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_shashi\n\t\t*disable_reuse #Finnegan\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_finnegan\n\t\t*disable_reuse #Evan\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_evan\n\t\t*disable_reuse #Vitessa\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_vitessa\n\t\t#Corley\n\t\t\t*goto sh_corley\n\t\t*disable_reuse #Mrs. Greeley\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_greeley\n\t\t*disable_reuse #Mr. Corvis\n\t\t\t*gosub aj_corley\n\t\t\t*goto sh_corvis\n\n*label sh_shashi\n\"Hey, Shashi,\" you say. \"What are you up to?\"\n\nShe looks up from her books. \"Just planning a new game session. What's up?\"\n\n*temp you_talked_to_shashi true\n\n*label sh_s_choice\n*choice\n\t*disable_reuse #\"Who do you think is our culprit?\"\n\t\t*goto sh_s_collusion\n\t*if(shashi_thinks_evan_likes_her)\n\t\t*disable_reuse #\"So you're not into Evan…. Is there someone else you'd rather take to the dance?\"\n\t\t\t*goto sh_s_juicychitchat\n\t*if(shashi_plays = 0) \n\t\t*disable_reuse #\"You want me to help you playtest your game?\"\n\t\t\t*set relS %+20\n\n\t\t\t\"That would be great!\" Shashi beams.\n\n\t\t\t*goto play_with_shashi\n\t*if(shashi_plays > 0) and (shashi_plays \u003c 5) \n\t\t#\"Can we play some more of the game?\"\n\t\t\t*goto play_with_shashi\n\t*disable_reuse #\"It's been fun working on this together. Do you want to, like, hang out sometime? Outside of school, I mean?\"\n\t\t*goto sh_s_flirting\n\t#\"I should go talk to some more people!\"\n\t\t*goto sh_choice\n\t\n*label sh_s_collusion\n\"I think Vitessa is the best bet,\" says Shashi. \"She hates the game, but she also hates me. She probably just threw away the book to be mean because that's what she does best: be mean.\" \n\t\t\n\"How about for the gift giver?\" you ask.\n\n\"I don't know if we need to track that person down,\" says Shashi. \"But to be honest? Evan stands out. He was nice enough to lend me his copy, so he knows I need one of my own. And he seems like a guy who wouldn't mind paying list price. He's always got the latest gadgets. He might be rich or something.\" Shashi pauses with her pencil over her fantasy map. \"You don't think…. Oh, never mind.\"\n\n\"What?\" you say.\n\nShashi carefully fills in an area of her map with trees, not meeting your eyes. She speaks hesitantly. \"You don't think it means, you know, that he likes me or something?\"\n*temp shashi_thinks_evan_likes_her true\n\n*fake_choice\n\t#\"Would that bother you?\"\n\t\t\"It would kind of be a drag,\" she admits.\n\t#\"Why? Do you like him?\"\n\t\t\"Only as a friend,\" says Shashi. \t\n\t#\"Yes.\"\n\t\t\"Aw, nerbs,\" Shashi curses. \t\t \n\t#\"No.\" \n\t\t\"Oh, good,\" Shashi sighs with relief. \n\"I don't want to, like, owe him or anything. If it turns out it was a love token or whatever, do you think that means I need to give the book back?\"\n\n*fake_choice\n\t#\"It would be fair to at least offer it back.\"\n\t\t*set Greed %-20\n\t\tShashi sighs. \"I was afraid of that.\" \n\n\t#\"Nah. Keep it. It was a present, and it was for you. What good does it do him?\"\n\t\t*set Greed %+20\n\t\t\"I guess,\" says Shashi. \"It just seems a little greedy or something.\"\n\n\t#\"Keep it and ask him to the Starlight Dance.\"\n\t\t*set Greed %+10\n\t\t*set relS %-10\n\t\tShashi shoots you an incredulous look. \"That's the worst option. That's just super weird. You can't buy a date to the dance.\"\n\n\t#\"Give it to charity.\"\n\t\t*set Greed %-20\n\t\tShashi looks confused. \"What good would that do? He'll assume I kept it, and I won't get to enjoy it.\"\n\n\t\t\"But someone will,\" you say. \"Some poor person.\"\n\n\t\t\"I don't know if there is a charity that takes game books,\" says Shashi skeptically.\n*comment endif\n\t\t\n\"Well, anyway, we don't even know that Evan gave you the book in the first place,\" you point out. \"It was given anonymously, so whoever it was clearly doesn't expect anything from you.\" \n\n\"Hey, that's right,\" says Shashi, relaxing. \"If you do figure out that it was Evan…maybe just don't let him know I know, okay? I need time to think about how to handle this.\"\n\n*fake_choice\n\t#\"Sure, Shashi.\"\n\t\t*set Secrecy %+10\n\t\t*set Greed %+10\n\t\t*set relS %+10\n\t\t\"I knew I could count on you,\" Shashi says with a smile.\n\t#\"I can't promise to keep secrets. My job is to uncover the truth.\" \n\t\t*set Secrecy %-10\n\t\t*set Greed %-10\n\t\t*set relS %+10\n\t\tShashi frowns. \"You're such a stick-in-the-mud.\"\n\t#\"What will you pay for my silence?\"\n\t\t*set Secrecy %+10\n\t\t*set Greed %+20\n\t\t*set blackmail_attempts +1\n\t\t\"I don't know, like, a dollar?\" Shashi says. \"I don't care that much.\"\n\t\t\n\t\tFair enough. You'll take it.\n\t\t*set Money +1\n*comment endif\n\t\t\n*gosub_scene subroutines RoundMoney\n\n*goto sh_s_choice\n\n*label sh_s_juicychitchat\n*if(relS > 80)\n\tShashi glances down at her game notes, and you notice there's a sketch of a superhero in the margin. It's a ${detectivetype} wearing a cape and carrying a magnifying glass.\n\t\n\t\"I don't know,\" she says. \"I always assumed I would just go with a group of friends. But if the right person asked me, I'd go with them.\" \n\t*goto sh_s_choice\n*elseif(relS > 50)\n\tShashi stares hard at her game notes. \"I don't know,\" she says, but there's a hint of nervousness in her voice. \"I'd go with a group of friends, but as for dating one particular person, I'm not sure if I really like anyone enough.\"\n\t*goto sh_s_choice\n*else\n\tShashi laughs. \"No way! Oh, I'll go to the dance, but with a group of friends. I'm not interested in one particular person or anything like that. Actually, it's hard to imagine going on a date with anyone in our class. I've known everyone for too long. I can't think romantically about someone I've known since I was five!\"\n\t*goto sh_s_choice\n\n*label sh_s_flirting\n*if(relS > 75)\n\tShashi grins broadly. \"You mean, like, a date?\"\n\t\n\t*choice\n\t\t#\"Yeah. A date. That would be awesome.\"\n\t\t\t*set datingS true\n\t\t\t*achieve romancer\n\t\t\t*if(datingA) or (datingE)\n\t\t\t\t*achieve multiromancer\n\t\t\t\"Cool,\" Shashi nods. \"Yeah, that'd be great. But you know what would be really cool?\" She nudges you. \"We can set it up later— now go solve my mystery!\"\n\t\t\t\n\t\t\t\"Yes'm!\" you nod.\n\t\t\t\n\t\t\t*goto sh_choice\n\t\t#\"Erm, I was thinking more like I could be in your gaming group.\"\n\t\t\t*goto you_join_shashis_group\n*else\n\t\"One of the players is leaving my game group next month,\" says Shashi. \"She has to move away. You could sub in if you want.\"\n\t\n\t*choice\n\t\t#\"I'd love to be in your gaming group, Shashi.\"\n\t\t\t*set relS %+20\n\t\t\t*goto you_join_shashis_group\n\t\t#\"Um, I was thinking more like a date.\" \n\t\t\tShashi winces sympathetically. \"You're nice, but I'm kind of interested only in people who game.\"\n\t\t\t\n\t\t\t*goto sh_s_choice\t\n\n*label you_join_shashis_group\n*set in_shashis_gaming_group true\n\"Great!\" Shashi beams. \"It's every Wednesday at five. Bring your own dice!\"\n\n*goto sh_s_choice\n\n*label play_with_shashi\n*set relS %+15\n*set shashi_plays +1\n*achieve highfantasy\n*if(shashi_plays > 1)\n\t*set convos +1\n\n*if(shashi_plays \u003c= 1)\n\t*goto character_creation\n*elseif(shashi_plays = 2)\n\t*goto first_monster\n*elseif(shashi_plays = 3)\n\t*goto campfire\n*elseif(shashi_plays = 4)\n\t*goto town\n*else\n\t\"Would you look at that? That's as far as I've gotten!\" Shashi says, turning to a blank page in her notebook.\n\t*if not(in_shashis_gaming_group)\n\t\t\"Why don't you join the regular group? Then we can play every week!\"\n\t\t\t\n\t\t\"Okay!\" you say. \"I'll be there!\"\n\n\t\t*set in_shashis_gaming_group true\n\t\t*goto sh_s_choice\n\t*else\n\t\t\"Well, since you're in my group, now we can play every week. I'll have more written by next session, I promise!\"\n\t\t\t\n\t\t\"I guess I should get back to the mystery,\" you realize.\n\t\t\t\n\t\t\"Oh, right!\" Shashi laughs. \"I was having so much fun, I forgot about it!\"\n\t\t\t\n\t\t*goto sh_choice \n\n*label stop_playing_with_shashi\n\"Oh. Okay. Well, let me know if you want to keep playing,\" says Shashi.\n\n*goto sh_choice\n\t\n*label character_creation\nShashi spreads out three worksheets in front of you. \"I've already got some characters rolled up here. Who would you like to play?\"\n\n\"What are my options?\" you ask.\n\n\"You can be Kiran, the fearless and noble warrior ${princess}; Starheart the Paladin, the golden champion of virtue and upholder of the law; Captain Dash, the charming but lawless pirate; or Wildwynd, the free-spirited druid who wields ancient and powerful nature magic.\" \n\n*choice\n\t#\"I'll be the ${princess}.\"\n\t\t*temp playing_char \"fighter\"\n\t\t*set Respect %+5\n\t\t*set Greed %+5\n\t\t*set Secrecy %-5\n\t\t*temp weapon \"longsword\"\n\t\t*temp damage \"6 damage. The wolf is wounded!\"\n\t\t*goto ready_adventure_1\n\t#\"I'll be the paladin.\"\n\t\t*temp playing_char \"paladin\"\n\t\t*set Respect %+5\n\t\t*set Greed %-5\n\t\t*set Secrecy %-5\n\t\t*temp weapon \"greatsword\"\n\t\t*temp damage \"8 damage. The wolf whimpers in pain!\"\n\t\t*goto ready_adventure_1\n\t#\"I'll be the pirate.\"\n\t\t*temp playing_char \"pirate\"\n\t\t*set Respect %-5\n\t\t*set Greed %+5\n\t\t*set Secrecy %+5\n\t\t*temp weapon \"cutlass\"\n\t\t*temp damage \"4 damage plus 6 sneak attack damage! You stab the wolf in the back!\"\n\t\t*goto ready_adventure_1\t\t\n\t#\"I'll be the druid.\"\n\t\t*temp playing_char \"druid\"\n\t\t*set Respect %-5\n\t\t*set Greed %-5\n\t\t*set Secrecy %+5\n\t\t*temp weapon \"crooked stick\"\n\t\t*temp damage \"3 damage. The wolf shrugs off the attack!\"\n\t\t*goto ready_adventure_1\n\t#\"Ummmm. I'll think about that and get back to you.\"\n\t\t*goto stop_playing_with_shashi\n\n*label ready_adventure_1\t\t\n*goto play_with_shashi\n\t\t\n*label first_monster\n\"You've just come back from raiding a dungeon…,\" Shashi begins.\n\n\"I have?\" you ask. \"When was this?\"\n\n\"Last session,\" Shashi says impatiently. \"I don't have time to fill you in. Just trust me. Okay, you've just been raiding a dungeon and you're making your way through the forest with your faithful companion, the beautiful sorceress Devina.\"\n\n\"That's you?\" you guess.\n\n\"Right. All of a sudden, two dire wolves leap out from the underbrush! Roll initiative!\"\n\n\"Ummm…\" You look at your dice.\n\nShashi rolls one for you. \"You go first. What do you do?\"\n\n*choice\n\t#\"I attack the nearest wolf!\"\n\t\t*goto attack\n\t#\"I rush to protect Devina!\"\n\t\t*goto protect\n\t#\"I cast a spell!\"\n\t\t*goto cast\n\t#\"I steal!\"\n\t\t*goto steal\n\n*label attack\n\"You attack the nearest wolf with your ${weapon}. You do ${damage}. \n*goto ready_adventure_2\n\n*label protect\n*set relS %+10\n\"Awww!\" says Shashi. \"Devina feels more warmly toward you. Okay, you \n*if(playing_char = \"druid\")\n\tcast Tree Shield on Devina. Her skin glows green with protective energy.\n\t*goto ready_adventure_2\n*if not(playing_char = \"druid\")\n\tjump in front of Devina, ${weapon} raised.\n\t*goto ready_adventure_2\n\n*label cast\n*if(playing_char = \"druid\")\n\t\"Okay,\" says Shashi. \"You cast Tree Tangle. Vines grow up from the ground and wrap themselves around the wolves' legs.\n\t*goto ready_adventure_2\n*elseif(playing_char = \"paladin\")\n\t\"All you have is buffs,\" says Shashi. \"You cast Cone of Courage. Devina looks more courageous!\n\t*goto ready_adventure_2\n*else\n\t\"You don't have any spells,\" says Shashi. \"Your turn ends. \n\t*goto ready_adventure_2\n\n*label steal\n*if(playing_char = \"pirate\")\n\t\"You pick the wolves' pockets,\" Shashi says agreeably. \"They don't have anything.\n\t*goto ready_adventure_2\n*else\n\t\"You're not skilled in the art of pickpocketing, but you suspect these wolves don't have much to steal,\" says Shashi. \"Your turn ends. \n\t*goto ready_adventure_2\n\n*label ready_adventure_2\nSuddenly, you see a flash of red light as Devina casts a fireball over the whole area. The wolves are incinerated on the spot!\"\n\n\"Whoa,\" you say.\n\nShashi nods. \"Whoa, indeed. Okay, you're safe…for now. This looks like a good place to make up camp.\"\n\n*choice\n\t#\"I pick up one of the glowing embers left behind from the fireball and make a fire. I begin roasting marshmallows.\"\n\t\t*goto play_with_shashi\n\t#\"It seems like you're a lot more powerful than me.\"\n\t\t\"Well, I've been playing a lot longer,\" Shashi explains.\n\n\t\t\"Hmmm,\" you say. This game is starting to seem rigged.\n\n\t\t*goto play_with_shashi\n\t#\"Looks like a good time to break. I need to return to my investigation.\"\n\t\t*goto stop_playing_with_shashi\n\t\t\n*label campfire\n\"You and Devina sit by the campfire,\" Shashi narrates. \"It crackles pleasantly. Somewhere an owl hoots. Would you like to take this time to do anything?\"\n\n*fake_choice\n\t#\"I oil my ${weapon}.\"\n\t\t\"Success! Your ${weapon} gleams with righteous oil!\" Shashi narrates.\n\n\t\t\"Sweet,\" you say.\t\t\n\t#\"I prepare my spells for tomorrow.\"\n\t\t\"You don't have to do that in this edition,\" Shashi informs you.\n\t\t*if(playing_char = \"fighter\") or (playing_char = \"pirate\")\n\t\t\t\"Besides, you don't have any spells.\"\n\t\t*comment endif\n\n\t\t\"I think I need to read the rulebook,\" you admit. \n\t#\"I'll take the first watch. Devina, you can sleep.\"\n\t\t*set relS %+10\n\t\tShashi seems genuinely touched. \"Thanks!\"\n\n\t\t\"Anytime,\" you say gallantly.\n\t#\"I tell Devina she looks lovely tonight.\"\n\t\t*set relS %+20\n\t\tShashi giggles. In her Devina voice, she says, \"The firelight favors your countenance as well, friend!\"\n\n\t\tYou wink.\n*comment endif\n\nShashi rolls a die. \"The night passes uneventfully!\" she announces. \"Morning dawns. Devina is meditating by the campfire. She smiles upon your waking and reminds you that you are headed to the town of Villathorp, just to the south.\"\n\n*choice\n\t#\"To the town!\"\n\t\t\"To the town!\" Shashi agrees. \"The sun is climbing high in the sky as you make it to the gates of the town.\"\n\n\t\t\"I don my Sunglasses of Power,\" you joke.\n\n\t\t*goto play_with_shashi\n\t#\"Forget the town. Let's continue wandering in the woods!\"\n\t\tShashi rolls her eyes. \"You try to continue wandering in the woods, but you get lost and end up at the gates of a strange town.\"\n\n\t\t\"I feel railroaded,\" you say.\n\n\t\t*goto play_with_shashi\n\t#\"This has been fun, but I really need to get back to my investigation.\"\n\t\t\"Friend, you forget, we are bound to investigate the strange doings at Villathorp!\" says Shashi in her Devina voice.\n\t\t\n\t\t\"I mean, in real life,\" you say apologetically.\n\t\t\n\t\t*goto stop_playing_with_shashi\n\n*label town\n\"It's a bustling port town. You can see ship sails in the distance. A merchant calls to you. 'Finest blades! Finest blades in all the land!' Beggar children play in a fountain. A man eating a turkey leg stumbles drunkenly from the entrance of the Shellmaid Inn. Somewhere a seagull cries. Devina turns to you.\" Shashi switches to her Devina voice and says, \"Remember, the prophet told us to visit the temple to learn of our fate! However, perhaps it would be wise to rest and restock our provisions first!'\"\n\n*fake_choice\n\t#\"Let's go shopping!\"\n\t\t*set relS %+20\n\t\tShashi excitedly opens [i]The Swordmaster's Sourcebook[/i] to a complicated table of items and their associated costs, everything from a battle-ax to a box of candles. After some consideration, you pick out a new pair of boots, a Fire Wand, and some rations.\n\t\t\n\t\t*goto what_next\n\t*if(playing_char = \"pirate\")\n\t\t#\"Forget this quest—I want to gather a group of brigands and sail the seven seas for treasure!\"\n\t\t\t*set relS %+30\n\t\t\t\"Now you're getting into character!\" says Shashi appreciatively.\n\t\t\n\t\t\t*goto what_next\n\t*if(playing_char = \"paladin\")\n\t\t#\"Let's help the poor beggar children in the fountain find adequate food and shelter!\"\n\t\t\t
