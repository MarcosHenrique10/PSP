Spleen.\n\t\t\t*set police_alias \"Avril LaSpleen\"\n\t*if(gender = \"boy\")\n\t\t#John Smith.\n\t\t\t*set police_alias \"John Smith\"\n\t\t#Justin Case.\n\t\t\t*set police_alias \"Justin Case\"\n\t*if(hank_alias != \"\")\n\t\t#\"${Hank_alias}\".\n\t\t\t*set police_alias \"${Hank_alias}\"\n\t#Mr. Wiggles.\n\t\t*set police_alias \"Mr. Wiggles\"\n\t#Dr. X.\n\t\t*set police_alias \"Dr. X\"\n\t#Poopbutt Smellington.\n\t\t*set police_alias \"Poopbutt Smellington\"\n\t#Something else.\n\t\tEnter your alias:\n\t\t*input_text police_alias\n\n*return", "ch1bike_sc4ajs_mom": "*if(been_home)\n\t*goto leave_home\n*else\n\t*goto arrive_neighborhood\n\n*label leave_home\nFreedom! You run down the steep hillside path, leaving your home in the dust behind you. \n\nAt the foot of the hill, you find yourself at A.J.'s familiar house.\n*goto ajs_home_described\n\n*label arrive_neighborhood\n6:05 PM. As you arrive in your familiar neighborhood, the horizon glows a brilliant pink. Crickets chirp cheerfully. \n\nYour house is silhouetted at the top of the hill, a rundown old Victorian with a wrought-iron gate and an unruly yard. You don't need to go home yet. Your mom will still be hard at work. Dad doesn't seem to notice what time it is. Dinner is usually somewhere between seven and nine. You still have some time to investigate before either of them starts wondering where you are.\n\nA.J.'s house is right here at the foot of the hill.\n*goto ajs_home_described\n\n*label ajs_home_described\nIt's a pleasant yellow house lit by bright street lights and a warm porch lamp. Mrs. Carver's Volvo is parked in the driveway, with its patchwork of bumper stickers: \"Save the Earth!\", \"Proud to Be Alcohol Free\", \"This Car Proudly Serviced by Quick Fix Motors\", \"Baby on Board\" (that's a very old one). You can hear \"Sounds of the Seventies\" radio wafting from behind the house.\n\n*if(who_has_gbu = \"you\")\n\t*goto decide_gbu\n*else\n\t*goto mrs_carver\n\n*label decide_gbu\t\nYou coast to a wobbly stop on the Great Brown Ugly. It's a pretty terrible riding experience, but it's intoxicating to be able to ride around on a bike. It feels like…power.\n\t\nIt's decision time. What will you do with the bike now that you've got it? \n\n*choice\n\t#Give it back to A.J., of course!\n\t\t*set gave_gbu_to_aj true\n\t\t*goto_scene ch1bike_sc5aj\n\t#Give it back to A.J.'s mom. Technically, it really belongs to her.\n\t\t*set Respect %+20\n\t\t*goto give_gbu_ajs_mom\n\t#Hide it. Hide it away. All for me!\n\t\t*set Greed %+40\n\t\t*set bike_hidden true\n\t\t*goto hide_gbu\n\n*label hide_gbu\nYou push up against the pedal, ready to speed off as fast as you can and never look back, but the pedal just spins uselessly. Something's wrong with the bike! You could have guessed the Great Brown Ugly had problems, but why now?\n\nYou get off the bike and bend down to examine the gears. As someone with no bike of your own, you're not exactly sure what's wrong, but it looks like the chain has come off the gears. You experimentally reach for the chain. Your fingertips are instantly black with oil.\n\n\"A.J.? Is that you?\" calls a voice from behind the house. It's Mrs. Carver. \n\nYou quickly stow the bike behind the neighbor's shrubbery.\n\n*goto mrs_carver\n\n*label give_gbu_ajs_mom\nYou hop off the bike and wheel it by the handlebars around to the back of the house. \n\n*gosub backyard_description\n\n\"Hello!\" you call.\n\nMrs. Carver startles and turns around. \"Oh, it's just you, ${Name}. I thought it was one of the neighbors. Oh my goodness!\" she breaks off, her eyes fixed on the Great Brown Ugly. \"Is that—it is! You found it!\"\n\n\"I sure did,\" you say proudly.\n\n*goto youre_a_wonder\n\n*label youre_a_wonder\n\"${Name}, you're a wonder!\" Mrs. Carver beams, running a loving hand over the Great Brown Ugly's frame. Clearly to her, it's far from ugly. \"A.J. thought it was stolen. I was so upset! You know, this bike has been in my family for decades. Where did you find it?\"\n\n*choice\n\t#\"Hank's Garage.\"\n\t\t*set Secrecy %-20\n\t\tMrs. Carver stiffens. \n\t\t*gosub mention_hanks_to_mrs_carver\n\t\t\"And I found your bike, so….\"\n\n\t\t\"Yes,\" Mrs. Carver exhales and smiles. \"Something good came of it this time. And I'm glad! But just promise me you'll find another way to walk home next time, okay?\" \n\t\t\n\t\t\"Um, okay,\" you say, mystified. \n\n\t\t*goto mrs_carver_takes\n\t#\"Oh, just around.\"\n\t\t*set Secrecy %+10\n\t\t*if(Respect > 50)\n\t\t\tMrs. Carver laughs. \"All this fuss over nothing! I keeping telling A.J., ${he} has to take better care of ${his} possessions. Especially when one of them is an heirloom!\"\n\n\t\t\t*goto mrs_carver_takes\n\t\t*else\n\t\t\tMrs. Carver glances back at you. \"Hmm. Maybe it's better if I don't know,\" she says. \"I guess it doesn't matter. I'm just glad to have it back!\"\n\t\t\t*goto mrs_carver_takes\n\t#\"Silly A.J. forgot ${he} left it at my house.\" \n\t\t*set Secrecy %+20\n\t\tMrs. Carver laughs. \"All this fuss over nothing! I keeping telling A.J., ${he} has to take better care of ${his} possessions. Especially when one of them is an heirloom!\"\n\t\t*goto mrs_carver_takes\n\t#\"I stole it.\" \n\t\t*set Secrecy %+20\n\t\t*if(Respect > 50)\n\t\t\tMrs. Carver laughs. \"No, really, where did you find it? Oh, I guess it doesn't matter. I'm just glad to have it back!\"\n\t\t\t*goto mrs_carver_takes\n\t\t*else\n\t\t\tMrs. Carver shakes her head. \"${Name}, I'm surprised at you…. Oh, maybe I'm not. Sometimes I want to take this bike from A.J. myself just to teach ${him} a lesson about appreciating it. Is that what you were doing? Never mind—don't tell me. I'm just glad to have it back!\"\n\t\t\t*goto mrs_carver_takes\n\n*label mention_hanks_to_mrs_carver\n*set mrs_carver_knows_hanks true\n\"Why were you at Hank's Garage?\"\n\t\t\n\"I was just walking down the alley in the back and I saw the bike. I knew it was A.J.'s, so I asked about it…. Why? What's wrong with Hank's Garage?\" you ask.\n\n\"It's a bad place,\" Mrs. Carver shoots back. \"Dangerous. You shouldn't play around there.\"\n*set mrs_carver_thinks_hanks_is_dangerous true\n\n*if(aj_thinks_hanks_is_dangerous)\n\tWhat is it with this family and Hank's Garage?\n*fake_choice\n\t#\"I thought it was pretty nice—for a garage. Hank is really sweet to his daughter.\"\n\t\t*set Respect %+10\n\t\t*set Greed %-10\n\t\t\"That may be, but I don't think a garage is any place for children,\" says Mrs. Carver.\n\n\t\tYou nod.\n\t#\"I agree. Trust me, I don't plan on going back there.\"\n\t\t*set Respect %+20\n\t\t\"Good!\" says Mrs. Carver. \"You're a smart cookie.\" \n\n\t\tYou nod.\n\t#\"I go where I want.\"\n\t\t*set Respect %-30\n\t\t\"Oh, you and A.J. are both so—so—headstrong!\" Mrs. Carver shakes her head. \"Just be careful.\" \n\n\t\tYou shrug.\t\n\t#\"We're not little kids anymore, Mrs. C. We have to spread our wings and fly free.\"\n\t\t*set Respect %-10\n\t\tMrs. Carver sighs. \"Don't be in such a hurry. You're only a kid once.\" \n\n\t\tYou shrug.\n*return\n\t\t\t\n*label mrs_carver_takes\n*set who_has_gbu \"Mrs. Carver\"\n*set bike_hidden false\n*if(mrs_carver_hired_you)\n\t\"So now there's just that matter of the fee we agreed on,\" you remind her.\n\n\t\"Right!\" says Mrs. Carver. She looks slightly bewildered. \"I didn't expect results so quickly! Well, I am certainly glad to have the bike back.\" She digs into her pocket and carefully counts out $${bike_pay_rate}. \"Do you know who took it?\"\n\n\t\"That I don't know. I'll keep working on that part,\" you promise. You add the money to your wallet, filled with the spirit of entrepreneurship.\n\t*set detectivePoints +1\n\t*set Money +bike_pay_rate\n\t*goto mrs_carver_takes_2\n*else\n\t\"I'm pretty good at finding things,\" you say. \"Tell your friends.\"\n\n\t\"I will. I don't know how you do it, but I have to give you credit,\" says Mrs. Carver. \"I'll tell anyone who asks that you are the best sixth-grade detective I know.\"\n\n\tYou beam.\n\t*set detectivePoints +1\n\n\t\"There's one thing I still don't understand, though,\" Mrs. Carver continues. \"Who took the bike in the first place? Can you tell me that?\"\n\n\tYou have to admit that you cannot.\n\t*goto mrs_carver_takes_2\n\n*label mrs_carver_takes_2\n*page_break\nMrs. Carver takes the handlebars of the Great Brown Ugly and leads it into the garage. \"Thank you again for finding it. A.J. is going to be so pleased! Do you want to take that basket of laundry inside and break the good news?\"\n\n*finish\n\n*label backyard_description\nThe backyard is much more interesting than the front. While the front is just a plain green lawn, the back is a maze of small vegetable plots, each neatly fenced off with twine and labeled with a sign made from a seed packet. Carrots grow in one corner; potatoes in another. The plots are separated by stepping stones made from some old concrete bricks that A.J. \"rescued\" from a construction lot. A long clothesline runs the length of the yard. \n\nMrs. Carver stands on the stepping path with her back to you, taking the sheets down from the clothesline and humming along with Fleetwood Mac on the portable radio.\n\n*return\n\n*label mrs_carver\nMrs. Carver bustles around the side of the house with a basket of linens. \n*if(Respect > 50)\n\tShe smiles when she sees you. \"Hi, ${Name}!\" Mrs. Carver is always glad to see you. You and A.J. have been friends for so long that you are like one of the family, and she often tells you that she is glad that A.J. has a nice friend like you.\n\n\t\"Good evening, Mrs. Carver,\" you say back with a smile.\n\n\t*goto mrs_carver_2\n*elseif(Respect > 30)\n\tShe jumps when she sees you. \"Oh! You startled me.\" You get along okay with A.J.'s mom, but you are not the best of buds. She always seems somewhat suspicious of you.\n\n\t\"Hi,\" you say, nodding quickly, hoping to make a quick getaway.\n\n\t\"Wait, ${Name}.\" \n\n\t*goto mrs_carver_2\n*else\n\t\"Oh, it's you, ${Name},\" she sighs. Mrs. Carver is not your biggest fan.\n\n\t\"What up, Mrs. C?\" you say with a mock salute. \n\n\t*goto mrs_carver_2\n\t\n*label mrs_carver_2\n*if(bike_hidden)\n\tMrs. Carver's eyes shift to your hand. \"What's that black stuff on your hand?\"\n\n\t\"Nothing,\" you say. \"Just dirt.\"\n\n\t\"Oh.\" She looks slightly disgusted. You move your oily hand into your pocket.\n\n*comment endif\n\nMrs. Carver shifts her basket to her hip. \"Actually, I'm glad I caught you. I was wondering if I could talk to you. I'm sure you know that A.J.'s bike was stolen today.\"\n\n*choice\n\t*if(who_has_gbu = \"hank\")\n\t\t#\"Yes! I saw it over at Hank's Garage!\"\n\t\t\t*set Secrecy %-25\n\t\t\t*set mrs_carver_knows_hanks true\n\t\t\t\n\t\t\t*goto tell_mrs_carver_about_hanks\n\t#\"What are you implying, that I did it? Anything bad that happens is my fault, is that it?\"\n\t\t*set Respect %-25\n\t\t\n\t\t*goto you_defensive_to_mrs_carver\n\t#\"Huh. What does A.J. say?\"\n\t\t*set Secrecy %+25\n\t\t*set relA %+10\n\t\t\n\t\t*goto you_cagey_to_mrs_carver\n\t#\"Would you like to hire me to find it?\" \n\t\t*set Greed %+25\n\t\t\n\t\t*goto mrs_carver_hires_you\n\t\n*label tell_mrs_carver_about_hanks\t\n\n\"Really?\" Mrs. Carver's eyes widen. \n*gosub mention_hanks_to_mrs_carver\n\n\"Anyway, that's where the Gr—the bike is, if you want it.\"\n\n\"Of course.\" Mrs. Carver nods. \"I should have thought to call Hank's Garage. The thief must have pawned it off there. Well, I'll just have to go down tomorrow and explain the situation. Thank you, dear.\"\n\n*if(mrs_carver_hired_you) and (bike_pay_rate > 0)\n\t\"Nothing says thank-you like payment for services rendered,\" you remind her.\n\t\n\t\"Oh, I forgot.\" Mrs. Carver sets down her basket of linens, reaches for her wallet, and then shakes her head. \"You little scamp! You knew where the bike was all along when I was hiring you.\"\n\t\n\t\"Business is business,\" you say. \"We did have a deal.\"\n\t\n\tMrs. Carver sighs. She pulls out a small change purse and unfolds wrinkled cash. \"I suppose you also know who took the bike.\" \n\t\n\t\"That I don't know,\" you admit. \"Yet. I'll work on that for you. Thank you for your patronage!\" \n\t*set detectivePoints +1\n\t*set Money +bike_pay_rate\n\t\n\t*goto mrs_carver_end\n*elseif(Respect >= 60)\n\n\t\"No problem,\" you say.\n\t*if(Secrecy \u003c 40)\n\n\t\t\"I'll tell you if I find out anything else.\"\n \t\t\n\t*goto mrs_carver_end\n*else\n\tYou duck your head, somewhat embarrassed to be thanked by someone's mom. It feels wrong, somehow.\n \t\n\t*goto mrs_carver_end\n\n*label you_defensive_to_mrs_carver\n*if(Respect > 50)\n\t\"What? My goodness, of course not!\" Mrs. Carver says with a laugh, surprised at your words. \"Nothing could be further from my mind. I just thought A.J. might have told you more details than ${he} told me.\" \n\n\t*goto you_defensive_to_mrs_carver_2\n*elseif(Respect > 30)\n\t\"What? No, I'm not accusing you of anything,\" says Mrs. Carver, confused. \"I was just wondering if you could give me any other details. Did A.J. say anything to you?\"\n\n\t*goto you_defensive_to_mrs_carver_2\n*else\n\t\"Not necessarily.\" Mrs. Carver narrows her eyes. \"But when bad things happen, you do have a tendency to be around somewhere in the background.\"\n\n\t*goto you_defensive_to_mrs_carver_2\t\n\n*label you_defensive_to_mrs_carver_2\n*if(bike_hidden = true)\n\t*goto bike_hidden_reveal_decision\n*else\n\t*goto i_know_nothing\n\n*label bike_hidden_reveal_decision\n*choice\n\t#\"I don't know anything.\"\n\t\t*set lie_count +1\n\t\t*set Secrecy %+20\n\t\t*goto i_know_nothing\n\t#\"Surprise! I recovered the bike for you!\"\n\t\t*set Greed %-20\n\t\t*goto give_bike_back\n\t#\"I'm afraid I can't tell you anything, unless, of course, you want to become my client. I'm still available for hire.\"\n\t\t*set Greed %+10\n\t\t*set Secrecy %+10\n\t\t*goto mrs_carver_hires_you\n\n*label give_bike_back\nYou lead Mrs. Carver to the shrubbery where you've hidden the bike. You reach in, tug on the handlebars, and pull it toward you onto the sidewalk. Mrs. Carver's eyes widen in surprise.\n\n\"Surprise!\" you say.\n\n*goto youre_a_wonder\n\n*label i_know_nothing\nYou shake your head. \"I don't know anything. I've been at the library.\"\n\n\"That's so strange,\" says Mrs. Carver.\n*goto mrs_carvers_story\n\n*label mrs_carvers_story\n\"A.J. came home today around four complaining that ${his} bike had been stolen. Again! What rotten luck we have. You know ${he}'s still not over the first one disappearing, and now the Schwizz is gone too! It's hard for me to even think about that. It's been in our family for decades, you know.\"\n\n*choice\n\t#\"It looked it.\"\n\t\t*set Respect %-20\n\n\t\tMrs. Carver gives you the hairy eyeball, letting you know she understood your little snide remark. \"Oh, I suppose I can't expect you kids to understand. \n\t\t*goto learn_to_love\n\t#\"A.J. must be very upset.\"\n\t\t*set Respect %+20\n\t\t*set lie_count +1\n\t\t\"Ha!\" Mrs. Carver laughs bitterly. \"I can tell ${he} is secretly a little glad. I know ${he} never loved that bike like I did. I suppose I shouldn't have expected ${him} to understand right away.\n\t\t*goto learn_to_love\t\t\n\t#\"You know A.J. never liked the Schwizz, right?\"\n\t\t*set Secrecy %-30\n\t\t*set Respect %-10\n\t\t\"I know ${he} never loved it like I did,\" Mrs. Carver says and sighs. \"I suppose I can't expect ${him} to understand right away.\n\t\t*goto learn_to_love\n\n*label learn_to_love\nYou need to grow to love that bike. It's not showy, but it's been there for me through all the hard times. You know what I mean?\"\n\n*choice\n\t#\"Absolutely. Children should have more respect for their elders, even if they are bikes.\"\n\t\t*set Respect %+30\n\t\t\"I'm not sure I would put it that way,\" says Mrs. Carver, but she looked pleased by your respectful attitude.\n\n\t\t\"Is there anything else I can do?\" you ask.\n\n\t\t*goto mrs_carver_asks_for_your_help\n\t#\"That makes sense. Loyalty is important.\" \n\t\t*set Secrecy %+10\n\t\t*set Greed %-10\n\t\t*set Respect %+10\n\t\tMrs. Carver gives a small smile. \"That's right.\"\n\n\t\tYou smile back. For a moment, it no longer feels like you are talking to a friend's mom; it feels like you are talking to a friend. \n\t\t\n\t\t*goto mrs_carver_asks_for_your_help\n\t\n\t#\"Not really. Objectively speaking, there is not a lot of value in a bike that doesn't ride well or look good.\"\n\t\t*set Greed %+20\n\t\t*set Respect %-10\n\t\t\"It has sentimental value,\" says Mrs. Carver.\n\t\t\t\n\t\t\"Oh, that,\" you wave your hand.\n\n\t\t*goto mrs_carver_asks_for_your_help\n\t\n\t#\"Um, no. That's the dumbest thing I ever heard.\"\n\t\t*set Respect %-30\n\t\tMrs. Carver shakes her head. \"You kids! You need to learn some respect.\"\n\n\t\t\"Is there anything else?\" you ask. \"Or are you just going to bash my generation?\"\n\t\n\t\t*goto mrs_carver_asks_for_your_help\n\t\t\t\t\n*label mrs_carver_asks_for_your_help\n\"Can I just ask you for one small favor?\" Mrs. Carver asks. \"If you find out anything about the theft, can you tell me? I know, I know, it's square to wheel and deal with an old mom like me, but I just want my bike back.\" \n\n*choice\n\t#\"You can count on me! Unfortunately, I don't know anything, but I'll be sure to pass along anything I find out.\"\n\t\t*set Secrecy %+20\n\t\t*set Respect %+20\n\t\t*set Greed %+10\n\t\t*set lie_count +1\n\t\t\"Thank you, dear.\"\n\t\t\n\t\t*goto mrs_carver_end\n\t#\"I'm afraid I can't promise that.\"\n\t\t*set Greed %-10\n\t\t*set Respect %-10\n\t\t*set Secrecy %+30\n\t\tMrs. Carver looks confused. \"So…do you know something?\"\n\t\t\n\t\t\"I can't say one way or the other. It's nothing personal,\" you say. \"All I can say is, I'm looking into the mystery, and I cannot reveal what I know while an investigation is underway. It's my policy.\"\n\t\t\n\t\t\"Oh, right. Your detective game.\"\n\n\t\t*if(Respect \u003c= 40)\n\t\t\tMrs. Carver rolls her eyes.\n\n\t\t*if(Respect > 40)\n\t\t\tMrs. Carver suppresses a smile.\n\n\t\t*if(Secrecy \u003c=60)\n\t\t\t\"It's not a game!\" you insist.\n\n\t\t*if(Secrecy >60)\t\t\n\t\t\t\"Right…a game,\" you play along.\n\t\t\n\t\t*goto mrs_carver_end\n\t#\"Urrrrrgh. I know something! I know something!\"\n\t\t*set Respect %+20\n\t\t*set Secrecy %-30\n\t\t*set Greed %-10\n\t\t*if(bike_hidden = true)\n\t\t\t*goto give_bike_back\n\t\t*else\n\t\t\t\"I know where the bike is!\" you cry. \"It's at Hank's Garage, okay? Hank's!\"\n\t\t\t*set mrs_carver_knows_hanks true\n\t\t\t*goto tell_mrs_carver_about_hanks\n\t#\"Are you saying you are ready to hire me?\" \n\t\t*set Greed %+20\n\t\t*goto mrs_carver_hires_you\n\t\t\n*label mrs_carver_hires_you\n\"You want me to hire you?\" says Mrs. Carver.\n\n\"That's right,\" you say. \"I'm a detective, and it's my business to find out things. Or just find things. If you would like me to figure out what happened to the brown bike, I would be happy to take on that job for you.\"\n\n\"Oh!\" says Mrs. Carver. \"Well, certainly, if that's how you want to think of it. Anything you can find out would be helpful. Thank you.\"\n\n*choice\n\t#\"Great. My normal charge is ${pay_rate_base_string} bucks a day, plus expenses.\"\n\t\t\"Errr,\" says Mrs. Carver. She laughs a little. \"I'm afraid I don't have a line item in my budget for a private eye on retainer. And what if you never find it?\"\n\t\t\n\t\tYou've already found it, so you're not worried about that, but you see her point. The Great Brown Ugly itself isn't worth ${pay_rate_base_string} dollars. \"How about this? I won't charge by the day. Instead, it's a flat fee.\"\n\t\t\n\t\t\"What kind of flat fee?\" says Mrs. Carver warily, but you take it as a good sign that she is willing to negotiate.\n\t\t\n\t\t*goto mrs_carver_fee\n\t#\"No problem, Mrs. C. I'll give you the friends and family discount.\"\n\t\t\"Discount?\" says Mrs. Carver warily. \"What kind of discount?\" She seems put out by the idea of a fee, but you take it as a good sign that she's willing to discuss it.\n\t\t\n\t\t*goto mrs_carver_fee\n\t*if(bike_hidden = true)\n\t\t#\"For you, my services are free. Tell your friends who solved the mystery. I already found your bike for you. I have it right here.\"\n\t\t\t*goto give_bike_back\n\t*if(who_has_gbu = \"hank\")\n\t\t#\"For you, my services are free. Tell your friends who solved the mystery. Your bike is at Hank's.\"\n\t\t\t*goto tell_mrs_carver_about_hanks\n\n*label mrs_carver_fee\n\"How about this? I'll charge ${pay_rate_half_string} dollars to find the bike, and another ${pay_rate_half_string} to figure out who took it,\" you suggest.\n\t\n\"Oh, all right. If you can manage to do that—why not?\" says Mrs. Carver. \"You've got yourself a deal.\"\n*set mrs_carver_hired_you true\n*set bike_pay_rate pay_rate_half\n\n*if(bike_hidden = true)\n\t\"Sweet!\" you say. \"I hope you've got your wallet handy, because I can give you your bike back right now. I have it here.\"\n\n\t*goto give_bike_back\n*else\n\t\"Sweet!\" you say. \"I hope you've got your wallet handy, because I can tell you right now the bike is at Hank's Garage.\"\n\n\t*goto tell_mrs_carver_about_hanks\n\n*label you_cagey_to_mrs_carver\n\"A.J. doesn't say much, unfortunately,\" says Mrs. Carver. \"I got home this afternoon and the bike was gone. A.J. said it has been stolen. I said, 'Who stole it?' A.J. says ${he} doesn't know. Says ${he} was at the library and when ${he} walked out, the bike was gone.\" \n\n\"Hmm,\" you say.\n\n\"It just seems like an odd story to me,\" says Mrs. Carver. \"I mean, do you believe that A.J. was at the library?\"\n\n\"I don't know where A.J. was,\" you say, truthfully but misleadingly.\n\nMrs. Carver frowns. You are not sure she believes you. \"Okay,\" she says slowly. \"Just to warn you. It's a tough world out there. Be on the lookout for suspicious characters.\"\n\n\"Will do,\" you say.\n\n*goto mrs_carver_end\n\n*label mrs_carver_end\n\"Well, have fun playing with A.J.\" Mrs. Carver hands you her laundry basket. \"Set these inside, will you? The door's open.\" \n\nShe turns back toward the yard. You run up the porch steps and let yourself in the front door. \n\n*finish", "ch1bike_sc5aj": "*if(gave_gbu_to_aj)\n\t*goto give_gbu_aj\n*else\n\t*goto walk_in\n\t\n*label give_gbu_aj\nYou knock on the front door. A moment later, A.J. throws open the door. Since you last saw ${him}, ${he}'s added a too-large leather biker jacket to ${his} all-black outfit.\n\n\"Hey, ${Name}! I was just watching the monster trucks and….\" Suddenly, ${his} eyes land on the Great Brown Ugly. A.J. blinks and stares in disbelief. \"Where…where did you find that?\"\n\n*fake_choice\n\t#\"Hank's Garage! Can you believe it?\"\n\t\t*set Secrecy %-10\n\t\t*gosub aj_hanks_reaction\n\t#\"I have my ways.\" \n\t\t*set Secrecy %+20\n\t#\"I cannot tell a lie: I was the one who stole it.\"\n\t\t*set Secrecy %+10\n\t\tWhat are you, a martyr? You didn't steal the bike. \n\t\t\n\t\tFor a moment, ${he} looks utterly confused, and then ${he} laughs weakly. \"Uh, yeah. Right.\"\n\t\t\n\t\t\"I did!\" you insist. \"I'm a dirty, dirty thief.\" \n\t\t\n\t\tWhat are you doing?! Oh, well, it's pretty clear the A.J. doesn't believe you in the slightest.\n\t#\"Under a bridge or something. Can I have my money now?\"\n\t\t*set Greed %+20\n\t\t\"Hey, I never said I'd pay you to recover the Great Brown Ugly,\" says A.J. \"That deal was Red Lightning only.\"\n\t\t\n\t\t\"A bike is a bike,\" you say.\n\t\t\n\t\tA.J. shakes ${his} head. \"No way. The Great Brown Ugly is no Red Lightning.\"\n\t\t\n\t\t\"Well, I never said the pay rate had to be the same,\" you mutter, but A.J. doesn't reach for ${his} wallet.\n*comment endif\n\nFor a long moment, A.J. just stands there in the doorway, staring at the bike morosely. You've never seen anyone look so disappointed to get back stolen property.\n\t\t\n*gosub aj_react_gbu_return\nTogether, you bring the bike inside. \n\n\"Come on,\" says A.J., leaving the Great Brown Ugly propped against the wall in the hallway. \"Let's go get a snack.\"\n\nYou follow ${him} into the kitchen, where ${he} throws open the fridge door and peers inside. \"What do you want?\"\n*set who_has_gbu \"A.J.\"\n\n*goto snack_choice\n\n*label aj_hanks_reaction\n*if(aj_thinks_hanks_is_dangerous)\n\t*return\n*else\n\t\"What were you doing at Hank's?\" A.J. asks. \"You don't have a bike or anything. Does your dad take the van to Hank now? I thought Mom had him going to Quick Fix Motors. I didn't think anyone I knew went to Hank's, actually.\"\n\t\t\n\t\"Uh, yeah, I think my folks usually use Quick Fix,\" you say, slightly confused by this turn of conversation. \"I'd never been to Hank's before. I was just walking by, and I saw he had bikes out back. Something told me to follow up!\"\n\t*set aj_thinks_hanks_is_dangerous true\n\t*return\n\n*label aj_react_gbu_return\n\"Aren't you glad to have it back?\" you ask. \"I mean, I know it's just the GBU, but it's better than no bike at all. Right?\" \n\n\"Yeah, no, of course! I mean, I thought it was stolen, and then you found it. That's great! I guess it's just that if I had my choice, I would have rather you found Red Lightning. But beggars can't be choosers. Thank you. It's really nice of you to find my missing property. You're…you're really great!\" A.J.'s smile seems more genuine now.\n\n*if(bike_hidden = true)\n\t\"You want to go outside and grab it? Maybe lock it up in case it gets stolen again?\" you suggest.\n\n\t\"Meh,\" says A.J.\n*return\n\n*label walk_in\n*if(bike_hidden = true)\n\tAs you reach the front door, you toss a glance over your shoulder at the shrubbery, where the GBU is still hidden. You're beginning to worry. What if it gets stolen again? Even if it doesn't, what will you do with it? You can't just ride it around as your own. A.J. or Mrs. Carver or someone else will surely recognize such a distinctive bike. Besides, it's a pile of junk. Maybe it's time to rethink the whole \"keeping the bike\" plan.\n*comment endif\n\nWalking into A.J.'s front hall, you're greeted with the familiar scents of your long childhood days here: apple pie–scented Yankee Candles and Fresh Meadow laundry soap. It used to smell like delivery pizza a lot, too, but nowadays there is more of an undercurrent of cooked cabbage. Mrs. Carver has been making an effort to cook at home. \n\n\"Hello?\" you call, setting the laundry basket on a precarious pile of magazines at the foot of the stairs.\n\n\"In the kitchen!\" calls A.J.\n\nYou walk down the hall to the kitchen, where you find ${him} peering into the fridge. Since you last saw ${him}, ${he}'s added a too-large leather biker jacket to ${his} all-black outfit. \n\n*if(relA >= 70)\n\tWhen ${he} glances over ${his} shoulder and sees you, ${he} grins. \"Hey, ${Name}! Want a snack?\" \n\n\t*goto snack_choice\n*else\n\tWhen ${he} glances over ${his} shoulder and sees you, ${he} nods. \"Hey, ${Name}. Want a snack?\" \n\n\t*goto snack_choice\n\n*label snack_choice\nIn the fridge, you see bread, milk, lunch meat, half a sleeve of Oreos, and several Tupperware containers of unidentified leftovers. In the crisper, you can just make out the shapes of some garden vegetables and a bag of apples. In the door, along with the usual condiments, there's a six-pack of beer. This is odd, because Mrs. Carver doesn't drink.\n\n*fake_choice\n\t#\"I'll have some Oreos.\"\n\t\t*set Respect %-5\n\t\t\"Great choice.\" A.J. tosses the Oreos onto the table and pours two glasses of milk.\n\t#\"May I please have an apple?\"\n\t\t*set Respect %+10\n\t\tA.J. tosses you an apple and takes out the Oreos for ${him}self.\n\t#\"Beer me.\" \n\t\t*set Respect %-20\n\t\t\"Sorry, but this isn't for you.\" A.J. pulls out the milk and Oreos instead.\n\t#\"One extra large sandwich with all the fixings, please! Also, do you have any chips?\"\n\t\t*set Greed %+10\n\t\tA.J. shrugs. \"Help yourself. Whatever you can find. Me, I'm going for cookies.\"\n*comment endif\n\n\"Why do you have beer, anyway?\" you ask. \"Your mom doesn't drink.\"\n\n\"Just a little something I picked up,\" says A.J. mysteriously.\n\n*if(Respect > 55)\n\tYou groan. \"The Whips sold it to you, didn't they?\" The Whips are a group of rebellious kids who hang around the hill behind the school, ride black bikes with flames up the side, and vandalize school property for fun. \"A.J., you know I don't like you hanging out with those punks.\" \n\t\n\tA.J. smiles sweetly. \"I'm reforming them!\"\n\t\n\t*goto aj_convo_1\n*elseif(Respect > 40)\n\t\"The Whips sold it to you, didn't they?\" You wrinkle your nose. The Whips are a group of rebellious kids who hang around the hill behind the school, ride black bikes with flames up the side, and vandalize school property for fun. \"I don't like those guys.\" \n\t\n\t\"They can be kind of rough,\" A.J. admits, \"but they're cool.\"\n\t\n\t*goto aj_convo_1\n*else\n\t\"Ooh. The Whips sold it to you, huh?\" you say. The Whips are a group of rebellious kids who hang around the hill behind the school, ride black bikes with flames up the side, and vandalize school property for fun. \"The Whips are so cool!\"\n\t\n\t\"Gotta love the Whips,\" A.J. agrees.\n\t\n\t*goto aj_convo_1\n\t\n*label aj_convo_1\nA.J. polishes off an Oreo and licks the chocolate dust off ${his} fingers.\n\n*choice\n\t*if(who_has_gbu = \"A.J.\")\n\t\t#\"So how did the Great Brown Ugly end up at Hank's, anyway?\"\n\t\t\t*set relA %-20\n\t\t\t*goto aj_hasgbu_direct\n\t\t#\"Are you glad to have the Great Brown Ugly back, or should I apologize?\"\n\t\t\t*set relA %+10\n\t\t\t*goto aj_hasgbu_indirect\n\t*else\n\t\t#\"Guess what! I found the Great Brown Ugly.\"\n\t\t\t*set Secrecy %-20\n\t\t\t*goto aj_nogbu_direct\n\t\t#\"Your mom says the Great Brown Ugly was stolen. What happened?\"\n\t\t\t*set Secrecy %+20\n\t\t\t*goto aj_nogbu_interro\n\t#\"What did you do today?\"\n\t\t*set relA %+20\n\t\t*set Secrecy %+20\n\t\t*goto aj_indirect\n\t#\"I like your jacket. It looks cool.\"\n\t\t*set relA %+40\n\t\t*goto aj_compliment\n\t\n*label aj_hasgbu_direct\nA.J. stares at you for a long moment, biting ${his} lip, apparently lost in thought. Finally ${he} says, \"Aw, how should I know? It was stolen. I guess the thief unloaded it there.\"\n\n*gosub aj_interro\n\n\"A.J.,\" you say sternly, \"just answer me this. Did you have something to do with the theft?\"\n\n\"How could I?\" says A.J. sulkily. \"Hank doesn't buy from minors.\" \n\n*finish\n\n*label aj_interro\n\n\"When was it stolen?\" you ask.\n\n\"Oh, you know, earlier this afternoon. I'm not sure of the exact time.\" \n\n\"Where was it taken from?\"\n\n\"You know, from school.\"\n\nYou shake your head. \"I saw you ride off on it.\"\n\n\"I went back,\" says A.J. testily. \"To get something.\"\n\n\"What did you need to get?\"\n\n\"Aw, why are you interrogating me?\" A.J. gets up from the table and walks over to the counter. \"I don't want to play detective. I'm the victim here, all right?\" \n\n*return\n\n*label aj_hasgbu_indirect\n\"Why apologize?\" says A.J. \"You did a nice thing.\"\n\n\"You didn't seem that thrilled to get it back,\" you say.\n\n*gosub aj_not_excited\n\n*finish\n\n*label aj_not_excited\nA.J. shakes ${his} head. \"I didn't mean to seem ungrateful. I know you were trying to do something nice. I'm just…surprised. That bike is like a bad penny.\" \n\n\"Um, A.J.,\" you say gently, \"did you…uh…have something to do with it going missing?\"\n\nA.J. stares at you for a long moment, biting ${his} lip, apparently lost in thought. Finally ${he} shrugs and gives you a tight smile. \"How could I? Hank doesn't buy from minors.\" \n*return\n\n*label aj_nogbu_direct\n*set detectivePoints +1\nA.J.'s eyes widen. \"You what?\"\n\n\"I,\" you repeat proudly, \"found the Great Brown Ugly. Am I the best detective ever or what?\n*if(bike_hidden = true)\n\tI found it at Hank's Garage. For you! I told you I was a good detective! It's outside in the shrubbery right now, as we speak!\"\n\t*set who_has_gbu \"A.J.\"\n\t*set Greed %-10\n\n\t*gosub aj_hanks_reaction\n\n\t*gosub aj_react_gbu_return\n\n\t*goto aj_nogbu_direct_2\n*elseif(who_has_gbu = \"Mrs. Carver\")\n\tIt was at Hank's Garage. I managed to convince him to give it to me. I gave it to your mom. It's in your garage right now!\"\n\t\n\tA.J. blinks. \"Um…what? Sorry. What?\"\n\t\n\tYou repeat your story.\n\t\n\t*gosub aj_hanks_reaction\n\t\n\t*gosub aj_react_gbu_return\n\n\t*goto aj_nogbu_direct_2\n*else\n\tIt's at Hank's Garage right now!\"\n\t\n\t*gosub aj_hanks_reaction\n\n\t\"Huh,\" says A.J., frowning.\n\n\tYou feel deflated. \n\t\n\t*goto aj_nogbu_direct_2\n\n*label aj_nogbu_direct_2\t\n\"You don't seem that excited,\" you observe.\n\n*gosub aj_not_excited\n\n*finish\n\t\n*label aj_nogbu_interro\n\"Oh, right,\" nods A.J. \"Yeah. It was taken. Just like Red Lightning! It's a dangerous world we live in.\"  \n\n*gosub aj_interro\n\n*finish\n\n*label aj_indirect\n\"Oh, you know, hung around. Did a little of this, a little of that.\" A.J. shrugs. \"Oh yeah, and, um, the Great Brown Ugly was stolen.\"\n\n*choice\n\t#\"What? Oh my God!\"\n\t\t*set Secrecy %+40\n\t\t*set relA %+10\n\t\t*goto feign_surprise\n\t#\"I know. Your mom told me.\"\n\t\t*set Secrecy %+10\n\t\t*goto i_know_mom\n\t#\"I know. I saw it at Hank's.\"\n\t\t*set Secrecy %-20\n\t\t*goto i_know_hanks\n\n*label feign_surprise\n\"It's not a big deal,\" A.J. says with a shrug. \"You know, I'm almost better off without it.\"\t\t\n\n*goto aj_notfound_choice\n\n*label aj_notfound_choice\n*choice\n\t#\"Tell me everything about the theft. Leave out no detail, no matter how small.\"\n\t\t*set relA %-10\n\t\t\"There's nothing really to tell,\" A.J. shrugs. \"I'm kind of an old hand at getting my bike stolen by now.\" \n\t\t\n\t\t*gosub aj_interro\n\t\t\n\t\t*finish\n\t#\"You want me to find it for you? I'm available for hire.\" \n\t\t*set Greed %+20\n\t\t\"Er, thanks, but no,\" says A.J. hastily. \"I'm not that eager to have it back. You can keep looking for Red Lightning, though.\"\n\t\t\n\t\t*finish\n\t#\"Now you can walk to school with me!\"\n\t\t*set relA %+40\n\t\t\"Hey, yeah!\" A.J. grins. \"Let's just forget this whole sordid Great Brown Ugly episode never happened. You want to watch the monster trucks?\"\n\t\t\n\t\t*finish\n\n*label i_know_mom\n\"You've been talking to my mom?\" says A.J. \"Does she seem upset?\"\n\n\"Sort of,\" you say. \n\nA.J. winces. \"She really liked that bike for some reason. But she'll get over it. She's got to. It was a really awful bike.\"\n\n*goto aj_notfound_choice\n\n*label i_know_hanks\n*gosub aj_hanks_reaction\n\n\"Huh,\" says A.J., frowning.\n\nYou feel deflated.\n\n*goto aj_nogbu_direct_2\n\t\t\n*label aj_compliment\n\"Thanks!\" A.J. grips the lapels of the jacket proudly. \"It's a gift from my uncle.\"\n\n\"I haven't seen you wear it before,\" you say. \"When did you get it?\"\n\n\"Oh, you know, last time my uncle was around. You want one like it? I can probably get you one.\" \n\n*choice\n\t#\"Sure! That would be awesome!\"\n\t\t*set relA %+30\n\t\t\"Consider it done!\" says A.J. \"Here, you want to try it on?\"\n\t\t\n\t\t*gosub wear_jacket\n\t\t*goto finish\n\t#\"Thanks, but it's not really my style. If you get your hands on a cardigan, though…\"\n\t\t*set Respect %+10\n\t\t*set relA %+20\n\t\tA.J. grins. \"You and your cardigans!\"\n\t\t*goto finish\n\t#\"You got a connection? How much are they? Let's buy a bunch and sell them at a markup.\"\n\t\t*set Greed %+20\n\t\t*set relA %+10\n\t\t\"Uhh, I don't know if I can get that many,\" A.J. says with a laugh.\n\t\t*goto finish\n\t#\"That's okay. It looks better on you. You look…really great.\"\n\t\t*set relA %+40\n\t\t\"Aw, jeez,\" A.J. murmurs, turning pink around the ears. \"I bet you'd look good, too. Here, try it on.\"\n\t\t\n\t\t*gosub wear_jacket\n\t\t*goto finish\n\t\n*label finish\n*finish\n\t\t\n*label wear_jacket\n*set haveJacket true\nA.J. shrugs out of the jacket and hands it to you. You put it on. It smells faintly of cigarettes and beer. \n\t\t\nA.J. grins. \"You look cool.\"\n\n\"Really?\" you say, looking down at the jacket, which is covered with silver buckles and rivets.\n*if(Respect > 50)\n\tYou feel sort of ridiculous.\n*if(Respect \u003c= 50)\n\tYou feel cool.\n*comment endif\n\t\n\"Here.\" A.J. steps up and gently adjusts your silver-zippered lapel. When ${he} looks up, ${his} face is very close to yours.\n\n*fake_choice\n\t#Laugh nervously.\n\t\t*set relA %+10\n\t\t\"Erm, sorry,\" A.J. murmurs, and takes a step back.\n\t#\"You know what? I don't like this jacket after all.\"\n\t\t*set relA %-10\n\t\tYou shrug out of it and step away quickly.\n\t\t\n\t\t\"Whatever,\" A.J. mutters.\n\t#\"Thanks for your help, Mom.\"\n\t\t*set relA %+20\n\t\tA.J. drops your lapel and steps back, grinning. \"Now, now, you can't go out looking like a ragamuffin!\" ${he} croaks in a mom voice, waggling a finger.\n\t#Gently brush the hair out of ${his} eyes.\n\t\t*set relA %+50\n\t\tA.J. stares at you steadily with deep brown eyes. Your heart skips a beat. Is this…are you…is ${he}…flirting?\n\t\n\t\t*gosub you_feel\n*return\n\n*label you_feel\nYou feel…\n\n*fake_choice\n\t#Confused. I don't know why I'm acting this way. Could A.J. and I really be more than friends? Do I even want that?\n\t#Relieved. A.J. likes me back?! That's amazing. I've wanted this for a long time. \n\t#Overwhelmed. I've daydreamed about this, but now that it's actually happening, I don't know if I'm ready for it. \n\t#Excited. I can't think straight, my heart is beating so fast. I want to keep this feeling going.\n\t#Nervous. I want to keep flirting, but I don't know how. What if I do something wrong? \n\t#Wary. I can't let myself get carried away. It's not a sure thing yet.\n\n*return", "ch1bike_sc6darren": "*temp done_with_kitchen false\n*set met_darren true\n*if(bike_hidden = true)\n\t*goto darren_intro_revealgbu\n*else\n\t*goto darren_intro_nogbu\n\n*label darren_intro_revealgbu\n*set who_has_gbu \"A.J.\"\n*set bike_hidden false\nAt that moment, the back door opens, and Mrs. Carver runs in. \"A.J., you'll never guess what I found!\"\n\nMrs. Carver holds open the door. In walks a strange man wheeling the Great Brown Ugly!\n\n\"Uncle Darren! And the Gr…the bike!\" A.J. blinks at the man. \"Where—how did you find that?\"\n\nThe man, apparently A.J.'s Uncle Darren, shrugs. From around a wad of chewing gum, he mutters, \"Your mom found it in the bushes outside.\"\n\n\"It was just sitting there!\" Mrs. Carver smiles. \"Can you believe it? I could have sworn we'd already looked everywhere. Actually, I'm sure of it.\" \n\n*choice\n\t#\"Maybe the thief felt guilty and put it back.\"\n\t\t*set Respect %+10\n\t\t*set Secrecy %+10\n\t\t\"Maybe so!\" Mrs. Carver agrees with you. \n\n\t\t\"Do you think that's what happened?\" A.J.'s eyes are fixed on Uncle Darren.\n\n\t\t\"Don't look at me!\" says Darren. \"I'm just as confused as you are.\"\n\n\t\t*goto darren_intro_revealgbu2\n\t#\"Maybe the thief didn't want it after all.\"\n\t\t*set relA %+10\n\t\t*set Secrecy %+10\n\t\t\"Probably!\" A.J. agrees with you, laughing bitterly.\n\n\t\t*goto darren_intro_revealgbu2\n\t#\"It was probably there the whole time.\"\n\t\t*set Secrecy %+20\n\t\t\"That's probably it,\" Uncle Darren agrees with you. \n\n\t\t\"I'm sure I looked there,\" says Mrs. Carver. \"As soon as A.J. said it was missing, I looked high and low! I must have peered into those bushes four or five times.\"\n\n\t\t\"Memory can play tricks on us,\" says Darren.\n\n\t\t*goto darren_intro_revealgbu2\n\t#\"It was me. I found it, and I stowed it there.\"\n\t\t*set Secrecy %-20\n\t\t\"Now, now,\" says Mrs. Carver. \"Just because you are trying to build your detective business doesn't mean you can take credit for everything that gets found. I'd be more interested in finding out how it got there. That's the real mystery.\"\n\n\t\t\"Not me!\" says A.J. \"If you're looking for bikes, focus on Red Lightning, okay?\"\n\n\t\t*goto darren_intro_revealgbu2\n\n*label darren_intro_revealgbu2\n\"Well, all's well that ends well. I'll put on a pot of coffee. Sit down and put your feet up,\" Mrs. Carver instructs Uncle Darren. \"You should have let me know you were coming. I would have made up the guest room!\"\n\n\"It was last-minute,\" says Darren. He slings his backpack onto a kitchen chair and pushes his shaggy blond hair behind his ear. \"I just arranged the interview this morning, and I got on the next bus. Don't put yourself out, Kim. I can crash on the couch.\"\n\n\"We sold the sofa. We just have a loveseat now.\"\n\n\"I can squeeze up small,\" Darren assures her. \"Aren't you going to introduce me to your little friend here?\"\n\n\"Oh, I forgot you two haven't met. This is A.J.'s friend ${Name},\" Mrs. Carver explains. \"${Name}, this is my little brother, Darren.\"\n\n*goto meeting_darren\n\n*label darren_intro_nogbu\nAt that moment, the back door opens, and Mrs. Carver comes in with a strange man. \"You should have told me you were coming. I would have made up the guest room!\" Mrs. Carver is saying. \n\n\"It was last-minute,\" says the man from around a wad of chewing gum. He slings his backpack onto a kitchen chair and pushes his shaggy blond hair behind his ear. \"I just arranged the interview this morning, and I got on the next bus. Don't put yourself out, Kim. I can crash on the couch.\"\n\n\"But I sold the sofa. We just have a loveseat now. If you'd told me… Oh, ${Name},\" says Mrs. Carver, spotting you. \"Darren, have you met A.J.'s friend ${Name}? ${Name}, this is my little brother, Darren.\"\n\n*label meeting_darren\nDarren grins—a wide, dimpled, charming smile, over a pointed goatee—and sticks out a hand for you to shake. \"Pleased to meet you! Any friend of A.J.'s is a friend of mine.\" \n\n*if(haveJacket)\n\tHe winks. \"You look great in my jacket, by the way.\"\n\n*comment endif\n\n*fake_choice\n\t#\"Pleased to meet you, too, sir.\"\n\t\t*set Respect %+20\n\t\t*goto pleased_to_meet \n\n\t#Go to shake his hand, but then pull it away at the last second and run a hand through my hair.\n\t\t*goto i_like_this_kid\n\t#\"Finally, I meet the infamous uncle! Tell me your life story. What was Mrs. Carver like as a little girl?\"\n\t\t\n\t\t*goto darrens_life_story\n\t*if(know_description_gbu_seller) \n\t\t#\"Were you at Hank's Garage today?\"\n\n\t\t\t*set Secrecy %-20\n\t\t\tDarren glances at A.J. for just a moment, then grins at you. \"No, must have been my evil twin.\"\n\n\t\t\t*goto darren_next\n\t#\"Careful. You don't know me. I might rob you blind.\"\n\t\t*set Secrecy %-20\n\t\t*set Greed %+20\n\t\t*set Respect %-10\n\n\t\t\"${Name}!\" says Mrs. Carver.\n\n\t\tDarren laughs. \"See, that's how I know I can trust you. You're honest.\" \n\n\t\t*if(Greed > 60)\n\t\t\tYou shrug. You warned him.\n\n\t\t*if(Greed \u003c= 60)\n\t\t\tHe has a point, but you still feel his logic is flawed.\n\n\t\t*goto romance_mockery\n\t\t\n*label pleased_to_meet\nDarren laughs. \"You don't have to call me 'sir'! I'm only twenty-one.\"\n\n*if(Respect >= 50)\n\n\tTwenty-one sounds pretty old to you, but you are too polite to say anything.\n\n\t*goto romance_mockery\n\n*if(Respect \u003c 50)\n\n\t\"That sounds pretty old to me,\" you say.\n\t\n\t\"${Name}!\" says Mrs. Carver.\n\t\n\t*goto i_like_this_kid\n\n*label i_like_this_kid\n\"You got me! I like this kid.\"\n*goto romance_mockery\n\n*label romance_mockery\n*if(genA = \"girl\") and (gender = \"boy\")\n\tDarren winks at A.J. \"So, what's the deal here? Is he your boyfriend?\"\n\t\n\t\"Aw, shut up, Unc,\" A.J. mutters gruffly, turning red.\n\n*if(genA = \"boy\") and (gender = \"girl\")\n\tDarren winks at A.J. \"So, what's the deal here, is she your girlfriend?\"\n\t\n\t\"Aw, shut up, Unc,\" A.J. mutters gruffly, turning red.\n\n*goto darren_next\n\n*label darrens_life_story\nDarren laughs. \"I like you, kid.\"\n\t\t\n*if(Respect >= 60)\n\t\"Give him a chance to settle in, dear,\" says Mrs. Carver, smiling at you.\n\n*if(Respect \u003c 60) and (Respect > 30)\n\t\"Now, now, ${Name}. Give him a chance to settle in,\" says Mrs. Carver.\n\n*if(Respect \u003c= 30)\n\t\"Don't be a pest,\" says Mrs. Carver.\n\n*comment endif\n\n*label darren_next\nDarren spits his gum into a receipt and tosses it in the trash. He turns to Mrs. Carver. \"Got anything to drink around here?\"\n\t\t\n\"If you mean alcohol, we don't keep it in the house, but you can have some milk or water. Have you had dinner?\"\n\n\"Nah, I came right from the bus station.\"\n\n\"How does pizza sound?\" says Mrs. Carver cheerfully. \n\n\"Yeah!\" A.J. and Darren cheer.\n\n\"Great. I'll call in an order, and then I'll go make up the guest room.\" \n\nMrs. Carver bustles out into the hall. As soon as she's gone, A.J. hands Darren a beer. Darren grins, cracking it open. \"Thanks, kid. I knew you'd come through.\" \n\n\"It's gonna be so awesome if you get that job,\" says A.J. \"Then you'll be here all the time.\"\n\n\"And I can help you get out of all your little scrapes!\" says Darren. \"You know me. I'm always up for mischief.\"\n\n\"Come on into the living room,\" says A.J. urgently, motioning. \"The monster truck rally is on!\"\n\n\"Race you!\" Darren shouts and leaps into the hallway. A.J. follows, laughing.\n\nSuddenly, you're alone in the kitchen. An empty sleeve of Oreos and some crumbs lie on the table. Darren's overstuffed backpack lies on a chair.\n\nYou sit for a moment and think. You almost have it worked out—how the Great Brown Ugly ended up at Hank's. You just need to fit all the puzzle pieces together.\n\n*label kitchen_alone\n*if(seen_darrens_stuff) and (seen_darrens_receipt)\n\t*set done_with_kitchen true\n*choice\n\t*disable_reuse #Go through Darren's stuff.\n\t\t*set Respect %-20\n\t\t*goto search_darrens_stuff\n\t*disable_reuse #Tidy up in here. Throw out the Oreo wrappers and stuff.\n\t\t*set Respect %+30\n\t\tCleaning always helps you think.\n\t\t\n\t\t*goto tidy_up_kitchen\t\t\n\t*disable_reuse #Have a cold beer.\n\t\t*set Respect %-40\n\t\tYikes, okay. I don't know if that will really help you think, but whatever.\n\t\t\n\t\t*goto have_a_beer\n\t#Enough fooling around. I think I know what happened.\n\t\t*goto enough_fooling_around\n\t\t\n*label search_darrens_stuff\t\nThe main compartment of Darren's backpack is stuffed with clothes. They all smell slightly stale and musty, a combination of cigarettes and lack of washing. The outer pockets are more promising. You find: \n\nA wallet containing a twenty-dollar bill and a driver's license with a picture of Darren, a birthdate twenty-one years ago, and the name Darren Shumacher. (Hold on–A.J.'s family name is Carver. …No, wait, that checks out. Darren is A.J.'s mom's brother, and Mrs. Carver still uses her married name, even though she's divorced.)\n\nSome ketchup packets.\n\n*if(haveFloss = false)\n\tA box of dental floss. \n*comment endif\n\nA ticket stub from Alpha Bus Lines. \n\nPassenger: Darren Shumacher\n*line_break\nBus #3029\n*line_break\nDeparting from: Greenfield—Time: September 27 12:25 PM\n*line_break\nArriving in: Camden—Time: September 27 2:55 PM\n\nA receipt for a pack of gum from Wall Drug #262, the one at 144 Chestnut Avenue here in Camden, dated September 27 at 3:05 PM.\n\nAn opened pack of gum with three sticks missing. (The gum story checks out.)\n\nA ticket stub for a showing of [i]Crow Monster vs. the Skater Chicks[/i] at Camden Pavilion Theater, today at 4:45 PM. Weird—he must have come from the movies. But he told Mrs. Carver he came right from the bus. \n\nThat's all you find. You want to take any of this stuff?\n*set seen_darrens_stuff true\n*temp took_darrens_money false\n*temp took_darrens_stuff false\n\n*label take_stuff_from_darren\n*choice\n\t*selectable_if (took_receipt = false) #The receipt.\n\t\t*set took_receipt true\n\t\t*set took_darrens_stuff true\n\t\tOkay, you got the receipt. Now you can return that pack of gum…well, you could have if he hadn't started chewing it. Do you want to take anything else? \n\t\t*goto take_stuff_from_darren\n\t*selectable_if (took_gum = false) #The gum.\n\t\t*set took_gum true\n\t\t*set took_darrens_stuff true\n\t\t*set Greed %+10\n\t\tFresh breath is important. But you pocket the gum for now. If you start chewing it, you might get caught. Do you want to take anything else?\n\t\t*goto take_stuff_from_darren\n\t*selectable_if (took_stub = false) #The ticket stubs.\n\t\t*set took_stub true\n\t\t*set took_darrens_stuff true\n\t\tOkay, you got the ticket stubs. I'm pretty sure they have no resale value, though. Anything else?\t\n\t\t*goto take_stuff_from_darren\n\t*selectable_if (took_darrens_money = false) #The money.\n\t\t*set took_darrens_money true\n\t\t*set took_darrens_stuff true\n\t\t*set Greed %+40\n\t\t*set Money +20\n\t\tRotten little thief. Okay, you now have a total of $${Money}. Anything else? \n\t\t*goto take_stuff_from_darren\n\t*selectable_if (haveFloss = false) #The floss.\n\t\t*set Greed %+20\n\t\t*set Respect %+10\n\t\t*set haveFloss true\n\t\t*set took_darrens_stuff true\n\t\tYou give your teeth a quick floss. Mm, minty fresh. Do you want to take anything else?\n\t\t*goto take_stuff_from_darren\n\t*if (took_darrens_stuff = false) \n\t\t#What? Nothing! What do you take me for, a thief?\n\t\t\t*set Greed %-40\n\t\t\t*goto kitchen_alone\n\t*else\n\t\t#That's all.\n\t\t\t*goto kitchen_alone\n\n*label have_a_beer\nUgh, why do adults like this? It tastes like paint thinner. You're beginning to see why Mrs. Carver doesn't drink. You take a few more sips, then give up and pour it down the sink.\n\n*if not(seen_darrens_receipt)\n\tYou lift the lid of the trash bin to throw out the beer can. The trash is mostly empty except for the crumpled receipt Darren threw out his gum in. \n\t\n\t*gosub darrens_receipt\n\t\n\tCuriouser and curiouser.\n\t*goto kitchen_alone\n*else\n\tYou toss out the can. Somehow, you thought that would be more fun.\n\t*goto kitchen_alone\n\n*label tidy_up_kitchen\n*if not(seen_darrens_receipt)\n\tYou lift the lid of the trash can to throw out the Oreo wrapper. The trash is mostly empty except for the crumpled receipt Darren threw his gum out in. \n\n\t*gosub darrens_receipt\n\n\tCuriouser and curiouser.\n\t*goto kitchen_alone\n*else\n\tThe kitchen looks so much neater.\n\t\n\t*goto kitchen_alone\n\n*label darrens_receipt\nOn impulse, you fish out the receipt and smooth it. \n\nThe gum covers most of the details—like what was bought and for how much. When you try to pry it off, the paper just tears and wads up. The only part you can read is the header:\n\t\t\nHank's Garage\n*line_break\nReceipt for Products Purchased\n*line_break\nDate: September 27\n*line_break\nTime: 4:22 PM\n\t\n*set seen_darrens_receipt true\n*return\n\n*label enough_fooling_around\nWhat do you think? \n*choice\n\t*disable_reuse #A.J. clearly knows more than ${he} is letting on, but I'm not willing to jump to conclusions.\n\t\t*goto solve_choice\n\t#A.J. and Darren are in cahoots. A.J. wanted that bike gone, and ${he} got Darren to do ${his} dirty work.\n\t\t*goto solve_choice\n\t#Maybe some random thief stole the bike. Okay, it looks bad, but…. Listen, A.J. is my friend.\n\t\t*gosub trial_end\n\t\t*set Greed %+20\n\t\t*set relA %+40\n\n\t\tFair enough. Your friendship with A.J. is more important than finding out the truth. After all, aren't you investigating all this for A.J.'s sake to begin with?\n \n\t\tYou join the others and watch monster trucks until the pizza comes. Putting the mystery out of your mind, you enjoy a nice meal with the family.\n\t\t\n\t\tLater, as Mrs. Carver catches up with her brother, you and A.J. sit around in ${his} room. You flip through some of A.J.'s comics. \"You know, they have comics at the library,\" you remark. \"You want me to get some out for you?\"\n\n\t\t\"No,\" says A.J. irritably.\n\n\t\t\"Why not? I'll just grab you some next time I'm there. It's no trouble, and it'll save you money.\"\n\n\t\t\"You're being too nice!\" A.J. barks suddenly.\n\n\t\t\"Huh?\" you say, looking up from your book. \"Hey. Are you okay?\"\n\n\t\t*goto aj_solve_indirect\t\t\n\n*label solve_choice\n*set detectivePoints +1\nWhat do you want to do about your suspicions?\n*choice\n\t*selectable_if (done_with_kitchen = false) #Keep investigating. I think there's more to learn in the kitchen.\n\t\t*goto kitchen_alone\n\t#Pull A.J. aside and talk to ${him} privately.\n\t\t*goto aj_solve_choice\n\t#Confront A.J. and Darren.\n\t\t*gosub trial_end\n\t\t*goto aj_darren_confront\n\t#Tell Mrs. Carver.\n\t\t*gosub trial_end\n\t\t*goto tell_mrs_carver\n\n*label aj_solve_choice\nYou stand in the doorway of the living room. \"Um, A.J.?\" you say. \"Can I talk to you alone?\"\n\n\"Ooooooh,\" says Darren. \"Telling secrets?\"\n\t\t\n\"C'mon, Unc,\" A.J. mutters, tossing a pillow at ${his} uncle. \n\nThen ${he} gets up and leads you up the stairs to ${his} room. \"What's up?\" A.J. asks, closing the door behind you both.\n\n*choice\n\t#\"Tell the truth for once. You and Darren sold the Great Brown Ugly to Hank, didn't you?\"\n\t\t*set relA %-30\n\t\t*goto aj_solve_direct\n\t#\"I'm kind of hurt that you didn't think enough of me to tell me the truth about the Great Brown Ugly. Maybe we're not as close as I thought?\"\n\t\t*set relA %+10\n\t\t*goto aj_solve_direct\n\t#\"We're best friends, right? Let's never keep secrets, okay?\"\n\t\t*goto aj_solve_indirect\n\t#\"They have comic books at the library. You want me to get some out for you?\"\n\t\t*set relA %+30\n\t\t*goto aj_solve_indirect\n\n*label aj_solve_indirect\n*gosub trial_end\n*if(relA > 80)\n\t*goto aj_breaks_down\n*else\n\t*goto aj_softens\n\n*label aj_solve_direct\n*gosub trial_end\n*if(relA > 80)\n\t*goto aj_breaks_down\n*elseif(relA > 65)\n\t*goto aj_crumples_under_questioning\n*else\n\t*goto aj_sullen_under_questioning\n\t\n*label aj_breaks_down\n\"Rrrrrrgh!\" A.J.'s hands form fists and then relax. \"Fine. I can't, I can't keep it from you anymore. You've got me, okay? It was my fault. I did it. I got rid of the Great Brown Ugly.\" \n\n\"Okay. Easy,\" you murmur, rubbing ${his} shoulder. \"You don't have to tell me if you don't want to.\"\n\nBut the story spills out of ${him}, very quickly. \n*goto aj_confesses\n\n*label aj_confesses\n\"After school I rode downtown to clear my head. The stupid bike was swerving all over the road, and some kids half my age laughed at me for being such a bad rider. At Depot Square I swerved right into a light pole. I got off the bike and kicked it. I never missed Red Lightning more!\"\n\n*fake_choice\n\t#\"You must have felt so frustrated.\"\n\t\t*set relA %+10\n\t\t\"Yeah, that's it exactly,\" A.J. nods. \n\t#\"How did you kick it so hard that it ended up at Hank's?\"\n\t\t\"I'm getting to that,\" says A.J.\n\t#\"Yeah, yeah. I get it: You're a victim of the Great Brown Ugly. Get to the crime part.\"\n\t\t*set relA %-10\n\t\t\"I'm getting to that,\" says A.J., annoyed.\n*comment endif\n\n\"While I was standing there in front of the bus station, I heard Darren's voice saying, 'Whoa there, Tiger!' I couldn't believe it! I didn't know he was going to be in town, I swear. It wasn't planned. We just got to talking about the Great Brown Ugly and how horrible it was. It was like that even when Darren was a kid. He hates it, too! Somehow, we came up with the idea of selling it.\"\n\n*fake_choice\n\t#\"Somehow? It was your idea, wasn't it?\"\n\t\t\"Yeah,\" A.J. admits. \"I'd actually thought of the plan before, but Hank wouldn't buy from me 'cause I'm a minor.\"\n\n\t#\"Somehow? It was Darren's idea, wasn't it?\"\n\t\t\"No, it was mine,\" A.J. admits. \"I'd actually thought of the plan before, but Hank wouldn't buy from me 'cause I'm a minor.\"\n\n\t#\"What did you do when Darren said 'Absolutely not'?\"\n\t\t\"Actually, Darren loved the idea,\" says A.J. \"He's not exactly a typical responsible adult. I was glad, because I needed his help. I'd actually thought of the plan before, but Hank wouldn't buy from me 'cause I'm a minor.\"\n*comment endif\n\n\"So Darren handled the actual transaction?\" you ask.\n\n\"Yeah. I didn't even go in. Before I knew it, Darren was coming out whistling and counting out money for me! I felt so guilty the moment the money was in my hand.\" A.J. shakes ${his} head. \"That's about it, I guess. Darren went to the movies because he figured it would look suspicious if we came home at the same time. I stopped off and got him some beer as a thank-you, and then I came home. And now it's now.\" A.J. looks at you. \"Any questions?\"\n\n\"Sure,\" you say. \"Why all the complications to get rid of a bike? Why didn't you just throw it on the train tracks?\"\n\n\"I guess I'm sentimental,\" says A.J. \"I wanted the bike gone, but I didn't want it destroyed. I mean, Mom loves it so much….\"\n\n\"Why didn't you just give it back to her, then? Tell her, 'This bike sucks. You can keep it.'\"\n\nA.J. sighs. \"She wouldn't have understood. She loves that dumb bike so much, she would have been so upset if I'd told her how much I hated it. I figured if it was stolen, it would just be gone and she wouldn't need to know. Oh, I don't know. I messed the whole thing up. You would have done it differently, I bet.\"\n\n*fake_choice\n\t#\"You should have told me. We used to tell each other everything.\"\n\t\t*set relA %+10\n\t\t*set Secrecy %-10\n\t\t*if(relA >= 70)\n\t\t\t\"I know. That is what I regret the most,\" says A.J. earnestly, looking into your eyes. \"I hated, hated keeping a secret from you. There were a hundred times I thought, What would ${Name} do? And I couldn't ask you.\"\n\n\t\t\tYou bite your lip. That's about the saddest thing you ever heard.\n\t\t*if(relA \u003c 70)\n\t\t\tA.J. looks pained. \"Yeah, I know. I don't like it either. But the thing is, when we were kids, we didn't have any secrets worth keeping. Can you honestly tell me you don't have any secrets from me now?\"\n\n\t\t\tYou pause. \"That's different. I'm a detective. There are certain things I can't tell. You know, to protect my clients.\"\n\n\t\t\tA.J. shrugs broodingly. \"Everybody has secrets.\"\n\n\t\t\t\"I just miss the way things were,\" you say.\n\n\t\t\tA.J. nods. \"So do I.\"\n\n\t\t\tThere is a heavy silence.\n\t#\"You should have asked for my help. I would have helped you negotiate with Hank to get more money. For a cut, of course.\"\n\t\t*set Greed %+10\n\t\t*set relA %-10\n\t\t\"I knew you'd get hung up on the money. It wasn't about that,\" A.J. protests. \"I didn't care about the money. I wish I hadn't made a profit at all.\"\n\n\t\tYou find this hard to understand. \n\t#\"You should have covered your tracks better. It was too easy to figure out.\"\n\t\t*set Secrecy %+10\n\t\t*set relA %-10\n\t\tA.J. looks offended. \"I didn't do it to give you a challenge, you know. I didn't expect you to investigate me at all.\"\n\n\t\t\"You should have,\" you say. \"And if you expect to get anything by me, you'll have to do better than that.\"\n\t#\"You should have just smashed the dumb bike with a hammer.\"\n\t\t*set Respect %-10\n\t\t*set relA %+10\n\t\t\"I knew you would say that,\" says A.J. fondly. \"I knew you'd think I was silly. You know, staging a theft and trying to protect my mom's feelings. You'd say it was too complicated.\"\n\n\t\t\"Simpler is always better,\" you say. \"Also, more smashing.\"\n\t#\"You shouldn't have done it at all. It was really disrespectful to your mom.\"\n\t\t*set Respect %+10\n\t\t*set relA %+10\n\t\t\"I knew you would say that,\" says A.J. fondly. \"That's exactly why I didn't tell you. I knew you would disapprove.\"\n\n\t\t\"Next time a little voice in your head tells you that I would disapprove of something, listen to it,\" you advise.\n\t#\"What's done is done. You weren't thinking straight.\"\n\t\t*set relA %+10\n\t\t\"Yeah, exactly,\" A.J. nods. \"It was a crime of passion, sort of. I mean, it was planned, but I was in a state of temporary insanity due to that terrible bike.\"\n\n\t\t\"I get it,\" you assure ${him}.\n\t#\"Of course. If I were going to try to pull off a caper like this, there's about a hundred things I would have done differently. You did a really bad job.\"\n\t\t*set relA %-10\n\t\t\"I know. I just said that,\" A.J. sulks. \"I'm an idiot. You don't have to rub it in.\"\n\n\t\t\"Just saying,\" you say.\n*comment endif\n\t\n*label what_now\n\n\"So…\" A.J. looks down at ${his} boots. \"Um…what are you going to do now that you know?\"\n\n\"Well, I…\" you begin.\n\nBefore you've gotten out two words, A.J. interrupts, \"Please don't tell my mom, okay? Please keep my secret. It's not hurting anyone.\"\n\n*choice\n\t#\"You're wrong. It's hurting your mom. I have to tell her.\"\n\t\t*set Secrecy %-40\n\t\t*set Greed %-20\n\t\t*set Respect %+20\n\t\t*set relA %-40\n\t\t*goto im_telling_mrs_carver\n\t#\"I will keep your secret, A.J., but you have to promise never to keep a secret from me again!\"\n\t\t*set relA %+40\n\t\t*set Secrecy %+40\n\t\t*set Respect %-20\n\t\t*set Greed %+20\n\t\t*goto ill_keep_your_secret\n\t#\"I'm sure we can work out a deal.\" \n\t\t*set relA %-20\n\t\t*set Respect %-20\n\t\t*set Greed %+40\n\t\t*set blackmail_attempts +1\n\t\t*goto blackmail_aj\n\t\t\n*label aj_softens\n\"Oh, ${Name}. There's something I really want to tell you but….\" A.J. stares off into the distance.\n\n\"But?\" you prompt.\n\n\"Never mind.\"\n\n\"No, come on, A.J.,\" you insist. \"You were about to tell me something. Was it about the Great Brown Ugly?\"\n\nA.J. looks at you sharply. \"Wow. You're going to be a really good detective someday, you know?\"\n\n\"I think you'll feel better if you tell me,\" you offer.\n\nA.J. sighs. For a long moment, ${he} is silent. Then the story spills out of ${him} very quickly.\n\n*goto aj_confesses\n\n*label aj_crumples_under_questioning\nA.J. goes silent, staring at ${his} hands.\n\n\"There's no point hiding it,\" you say. \"I have plenty of evidence.\n*gosub i_know_everything\nThe jig is up, man.\"\n\nA.J. bites ${his} lip and looks out the window. \"Guess I should have known you would figure it out. You're going to be a really good detective.\" \n\n\"Can you fill in the details?\" you ask.\n\nFor a long moment, ${he} is silent. Then, all at once, the story spills out of ${him}.\n*goto aj_confesses\n\n*label aj_sullen_under_questioning\nA.J. goes silent, not meeting your eyes. \"You can't prove anything.\"\n\n\"Maybe not,\" you say, \"but I can tell a pretty compelling story.\n*gosub i_know_everything\nTell me if I'm getting anything wrong.\"\n\n\"Jeez.\" A.J. paces from one end of the room to the other. \"What do you want me to say, huh?\"\n\n\"The truth would be a nice start,\" you suggest.\n\n\"Fine. You want the dirty details? Fine.\" A.J. crosses ${his} arms and stares out the window. For a long moment, ${he} is silent. You wonder if ${he} plans to speak again at all. Then, all at once, the story spills out of ${him}.\n*goto aj_confesses\n\n*label aj_darren_confront\nYou stride into the living room and stand in front of the TV.\n\n\"Hey!\" A.J. and Darren strain to see around you. \n\n\"The two of you might as well confess,\" you announce. \"I know everything.\"\n\nA.J. looks worried.\n\nDarren grins mischievously and winks at A.J. \"I'm sure I don't know what you mean!\"\n\nA.J. forces a smile. \"Yeah, ${Name}, you don't know what you're talking about.\" \n\n\"Oh, don't I?\" you say. \"I know a lot of things.\n*gosub i_know_everything\nI could go on….\"\n\nDarren laughs. \"Wow. Just wow.\" He turns to A.J. \"This kid is going to be a detective someday!\"\n\n\"That's right,\" murmurs A.J. \"The world's best.\" \n\n\"All right, you got us.\" Darren leans back in his chair, still smiling. \"I ran into A.J. outside the bus station this afternoon. I couldn't believe ${he} was riding my sister's horrible old bike! It was a wreck when [i]I[/i] was a kid. A.J. told me about the theft of Red Lightning. What a sore deal! We came up with the idea of selling the Schwizz and telling Kim it had been stolen, too.\"\n\n\"So her feelings wouldn't be hurt,\" A.J. puts in.  \n\nDarren goes on, \"I had to do the actual selling because Hank doesn't buy from minors. Then I went to a movie so that A.J. and I wouldn't be coming home at the same time. It was very secret agent. Lots of fun. And I bet you had fun figuring it out, too!\"\n\nA.J. doesn't say anything, just stares at ${his} hands, looking miserable.\n\n*goto what_now\n\n*label im_telling_mrs_carver\n*set you_told_mrs_carver_aj_sold_gbu true\nA.J.'s expression hardens. \"Fine,\" ${he} says crisply. \"Do what you need to do.\" \n\nYou find Mrs. Carver moving all the seed-starting equipment and other storage out of the guest room, trying to unearth the bed.\n\n\"Um, Mrs. Carver?\" you say. \"I figured out about the Schwizz, but I don't know if you're going to like it.\" \n\n\"Oh?\" Mrs. Carver puts down a trowel and listens attentively to your story.\n\nYou explain what you know, concluding with, \"The only thing I still don't really understand is why ${he} didn't just tell you ${he} disliked the bike in the first place.\"\n\n*gosub mrs_carver_troubled\n\nYou walk home slowly in the moonlight. You may have solved a mystery, but you fear you have lost a friend.\t\n*set aj_mad true\n*finish\n\n*label tell_mrs_carver\n*set you_told_mrs_carver_aj_sold_gbu true\nYou find Mrs. Carver moving all the seed-starting equipment and other storage out of the guest room, trying to unearth the bed.\n\n\"Um, Mrs. Carver?\" you say. \"I have a theory about the Schwizz, but I don't know if you're going to like it.\" \n\n\"Oh?\" Mrs. Carver puts down a trowel and listens to you attentively.\n\n\"Well, here's what I know.\n*gosub i_know_everything\nIt really seems to me that A.J. and Darren sold the bike to Hank this afternoon in an attempt to make it look like a theft. I don't know why ${he} didn't just tell you ${he} disliked it in the first place.\"\n\n*gosub mrs_carver_troubled\n\nYou walk home slowly. A.J. isn't going to like the way you handled this. You hope someday ${he} will understand that you did the right thing. \n*set aj_mad true\n*finish\n\n*label mrs_carver_troubled\nMrs. Carver looks troubled. \"I suppose ${he} didn't feel ${he} could tell me anything bad about it. I played up how wonderful it was, but of course, I was trying to get ${him} to look on the bright side. I know it's an awful bike, but I can't afford to buy a better one right now. I couldn't even really afford Red Lightning in the first place, but I splurged. I can't afford to do that again. Unless ${he} rode the Schwizz, ${he} wouldn't have a bike at all.\" \n\n\"Well,\" you say, \"now you know everything.\" \n\nMrs. Carver nods. \"I'll deal with A.J. appropriately. Thank you for telling me, ${Name}.\" \n*if(mrs_carver_hired_you)\n\tShe reaches into her pocket. \"Oh, and here's your pay, as promised.\"\n\t*set Money +bike_pay_rate\n*return\n\n*label ill_keep_your_secret\n\"This secret binds us together,\" you tell A.J.\n\n\"I know. Don't worry. I won't forget it,\" says A.J. \"I really owe you.\"\n\n*choice\n\t#\"You don't owe me anything. Friends do for each other, that's all.\"\n\t\t*set relA %+30\n\t\tA.J. nods and then throws open ${his} arms. \"Aw, c'mere.\" \n\t\t\n\t\tThe two of you hug for a long moment.\n\t\t\n\t\t*goto keep_secret_finish\n\t#\"That's right. You owe me a big favor to be named later.\"\n\t\t*set Greed %+10\n\t\t*set aj_owes_you_a_favor true\n\t\tA.J. nods solemnly. \"Anytime. You name the favor, I'll be there for you.\"\n\t\t\n\t\tYou shake hands.\n\t\t\n\t\t*goto keep_secret_finish\n\t#\"If you want, you can be my deputy and help me solve mysteries.\"\n\t\t*set relA %+10\n\t\t*set deputyA true\n\t\tA.J. nods. \"Absolutely! I'll help you with all your cases. You can count on me.\"\n\n\t\tYou shake hands.\n\t\t\n\t\t*goto keep_secret_finish\n\n*label keep_secret_finish\n*if(relA > 85)\n\t*goto askajdate\n*else\n\t*goto walkhome\n\t\n*label askajdate\nAs you step back, A.J.'s fingers linger on your hand. ${Hhe} coughs, ${his} face turning red. \"Um, so… Sometime, would you want to, um…\" \n\t\n*choice\n\t#\"What? Spit it out!\"\n\t\t\"Would you want to go on a date with me?\" A.J. asks very quickly. Then ${he} winces, as if ${he} expects you to say no.\n\t\t\n\t\t*goto ajdateyn\n\t#\"Don't say it.\"\n\t\t\"Say what?\" A.J. asks, looking guilty.\n\t\t\n\t\t\"Whatever you were going to say,\" you say warily. \"It wasn't going to be mushy or anything, was it?\"\n\t\t\n\t\t\"Naw,\" snorts A.J. \"As if. You wish. C'mon. Let's read comics.\"\n\t\t\n\t\t*set nocrushA true\n\t\t*goto walkhome\n\t\t\t\n\t#\"A.J., wait. Before you say anything else, I have to ask. Will you go on a date with me?\"\n\t\t*set relA %+20\n\t\tA.J.'s eyes widen. \"Okay. Wow.\"\n\t\t\t\n\t\t\"You don't have to say yes,\" you add hastily. \n\t\t\n\t\t\"No, I—it's funny. I was gonna ask you the same thing.\" A.J. grins. \"Of course I'll go out with you, ${Name}.\"\n\t\t\n\t\tYou feel a funny flutter in your stomach. Suddenly you feel shy. \"Okay. Great. Cool,\" you murmur. \"Um, so, tomorrow? The arcade?\"\n\t\n\t\t\"The arcade,\" A.J. repeats tenderly.\n\t\t\n\t\t*goto ajdatey\n\n*label ajdateyn\n*choice\n\t#\"Yes! Yes! A thousand times yes!\"\n\t\t*set relA %+20\n\t\tA.J. grins. \"All right! Tomorrow, then? The arcade?\"\n\t\t\n\t\t\"Sounds great!\" You're beaming so hard, you feel like you're going to pull a muscle in your face. The two of you stand there smiling at each other.\n\t\t\n\t\t*goto ajdatey\n\t#\"Oh. I'm very flattered, but no, thank you.\"\n\t\tA.J. looks down. \"Okay.\" \n\t\t\n\t\t\"I don't mean to hurt your feelings,\" you say.\n\t\t\n\t\t\"No, that's okay. It's no big deal.\" A.J. shrugs. \"Whatever.\"\n\t\t\n\t\t\"Still friends?\" you ask.\n\t\t\n\t\t\"Of course!\" A.J. offers you a smile. \"Forget I ever said anything. It was just an idea. Come on, let's read comics.\"\n\t\t\n\t\t*set nocrushA true\n\t\t*goto walkhome\n\t#\"Sure, yeah, I guess that would be cool.\" \n\t\tA.J. blinks, as if not quite believing that you said yes. \"Okay. Cool. Yeah. Okay. Tomorrow, then? The arcade?\"\n\t\t\n\t\t\"Whatever. Sounds good.\" You run a hand through your hair.\n\t\t\n\t\tThe two of you stand around for a few more minutes, leaning on things and nodding coolly at each other. \n\t\t\n\t\tYou don't know what to do next, so you punch ${him} lightly on the arm and saunter downstairs. You run all the way home.\n\n\t\t*set datingA true\n\t\t*achieve romancer\n\t\t*page_break\n\t\t*goto date_with_aj\n\t#\"Ha ha. Nice joke. You almost had me there for a minute.\"\n\t\t\"Yeah, I'm a real joker,\" A.J. agrees with you immediately. \"Ha! Ha! Can you imagine? Me and you? What a joke!\"\n\t\t\n\t\t\"Yep!\" you say. \"Ha ha!\"\n\t\t\n\t\t\"Just thought I'd lighten the mood.\" A.J. shrugs. \"Well, anyway. Want to read comics?\"\n\t\t\n\t\t*set nocrushA true\n\t\t*goto walkhome\n\t\t\n*label ajdatey\nYou don't know what to do next, so you give ${him} a quick hug and run all the way home.\n\t\n*set datingA true\n*achieve romancer\n*page_break\n*goto date_with_aj\n\n*label walkhome\nAs you walk home later that night, you wonder if you really did the right thing by keeping A.J.'s secret. But how can it really be wrong? Your relationship with A.J. has never been stronger.\n*finish\n\n*label date_with_aj\nThe next afternoon soars by way too fast. It's funny. You've been to the arcade with A.J. a million times. But it's never felt like this. Everything is more intense. The lights of the games seem brighter, the soda sweeter, the pizza more delicious. Each time A.J. looks at you, you feel overly warm. When ${he} adjusts your elbow to help you with the free-throw game, a tingle runs down your arm. A.J. seems to feel it, too, and ${he} quickly moves ${his} hand away, blushing furiously.\n\nA.J. insists on paying for the food, but you score big at Skee-Ball and win a toy for ${him}. You manage to find a cool teddy bear in a little black T-shirt and a bandana on its head, holding a pair of drum sticks. A.J. doesn't play the drums, but it reminds you of ${him} anyway.\n\nAs you walk home together in the glow of sunset, a nagging voice in the back of your mind wonders if you really did the right thing by keeping A.J.'s secret. But how can it really be wrong when it led to this? \n\nA.J. slips ${his} hand into yours, and all doubts fly out of your mind.\n*finish\n\n*label blackmail_aj\n\"What do you mean, a deal?\" says A.J.\n\n*if(mrs_carver_hired_you)\n\t\"I'll be honest. Your mom hired me to find out the truth about the Great Brown Ugly,\" you explain. \"I want to help you out, but I don't want to hurt my detective business. Of course, if you could match her price, then I could justify it as a good business decision.\"\n\t\n\t\"Oh,\" says A.J. \"I get it. I didn't know Mom hired you. Wow, your detective business is really growing! Okay, I guess I understand. How much was Mom going to pay you?\"\n\t*temp stars_rate bike_pay_rate * 10\n\t*temp double_rate bike_pay_rate * 2\n\t*temp discount_rate bike_pay_rate - 10\n\t*temp zero_rate pay_rate_half\n\t*temp double_zero_rate zero_rate * 2\n\t\n\t*choice\n\t\t#Shoot for the stars! \"$${stars_rate}.00!\"\n\t\t\t*set lie_count +1\n\t\t\t*set Greed %+20\n\t\t\t\"What? No way!\" says A.J. \"Mom wouldn't be dumb enough to pay that much to recover the bike, would she? It wasn't even worth that. I don't have that, anyway. How about $${double_rate}?\"\n\t\t\t\n\t\t\t\"I'll take it,\" you say. \n\t\t\t*set Money +double_rate\n\t\t\t*goto blackmail_end\n\t\t*if(bike_pay_rate > 0)\n\t\t\t#Be honest. \"$${bike_pay_rate}.00.\"\n\t\t\t\t*set Greed %-10\n\t\t\t\t\"Fair enough,\" says A.J., digging out a crumpled bill from the bottom of a Pringles can.\n\t\t\t\t*set Money +bike_pay_rate\n\t\t\t\t*goto blackmail_end\n\t\t\t#Give ${him} a break. Friends and family discount, right? \"$${discount_rate}.00.\" \n\t\t\t\t*set relA %+10\n\t\t\t\t\"Oh, okay. That's kind of a deal, really,\" says A.J., digging out a crumpled five from the bottom of a Pringles can.\n\t\t\t\t*set Money +discount_rate\n\t\t\t\t*goto blackmail_end\n\t\t*if(bike_pay_rate = 0)\n\t\t\t#Lie plausibly. \"$${zero_rate}.00.\"\n\t\t\t\t*set Greed %+10\n\t\t\t\t\"Fair enough,\" says A.J., digging out a crumpled bill from the bottom of a Pringles can.\n\t\t\t\t*set Money +zero_rate\n\t\t\t\t*goto blackmail_end\n\t\t\t#Be honest. \"It was a deal of honor—no money—but I would still feel bad reneging unless I had a good reason.\" \n\t\t\t\t*set Greed %-10\n\t\t\t\t\"I see,\" says A.J. \"Is this a good reason?\" ${Hhe} reaches into ${his} pocket and counts out $${double_zero_rate}.\n\t\t\t\t\n\t\t\t\t\"Pleasure doing business with you,\" you say with a nod, raking it in.\n\t\t\t\t*set Money +double_zero_rate\n\t\t\t\t*goto blackmail_end\n*else\n\t\"I know something that you don't want somebody else to know,\" you explain. \"I'm a detective. I'm supposed to find out the truth and make it known. But I'm also supposed to make money. You know what I'm saying? If I find out the truth about something, there's only one reason for me to keep it to myself, and that's if there's money involved.\"\n\t\n\t\"What about friendship?\" says A.J. \"Loyalty?\" \n\t\n\t\"Friendship and loyalty are exactly why I'm giving you the friends and family discount,\" you inform ${him}. \"Just ${pay_rate_half} bucks can make this all go away.\"\n\t\n\tA.J. thinks about this for a moment, then shrugs. \"I guess it's a pretty good deal, all things considered.\" You watch as ${he} digs out a wad of crumpled bills from the bottom of a Pringles can.\n\t*set Money +pay_rate_half\n\t*goto blackmail_end\n\n*label blackmail_end\n\nAs you walk home, your pockets heavier, you wonder if you did the right thing. But you're that much closer to affording your own bike someday!\n\n*finish\n\t\t\t\t\n*label i_know_everything\n*if(who_has_gbu = \"hank\")\n\tI know the brown Schwizz is at Hank's Garage. \n*if(who_has_gbu  always buy the Great Brown Ugly from Hank.\"\n\t\n\t\"Don't you dare!\" says A.J. \"It's not worth it. Trust me.\"\n\t\n\t*goto almost_late\n\n*label walkalone\nAfter an eventful week, you oversleep. The sun is shining overhead as you make the long walk to school. If only you had a bike!\n\nUp ahead, you spot a familiar short, jagged haircut. A.J. is ambling along the lane, passing a stick along the rungs of a fence.\n\n*choice\n\t#Ignore ${him}. \n\t\t*set relA %-10\n\t\tA.J. doesn't own the street. You hurry past ${him} with your head held high. \n\t\t\n\t\tYou think you hear ${him} mutter, \"Well, excuse me\" in a sarcastic voice as you pass, but you're not sure. \n\t\t\n\t\t*goto almost_late\n\t#Catch up with ${him}.\n\t\t*set relA %+20\n\t\t*set with_aj true\n\t\tYou speed up until you're alongside A.J. and then fall into step with ${him}. \"Hi,\" you say tentatively.\n\t\t\n\t\tA.J. glances at you quickly. \"Hey,\" ${he} says.\n\t\t\n\t\tYou walk along in silence, but it feels like a friendly silence. You already feel like things are getting better between you, at least a little. You take turns kicking a rock down the street.\n\t\t\n\t\t*goto almost_late\n\t#Take another route.\n\t\t*set Secrecy %+20\n\t\tThe last thing you need is to get into some drama with A.J. You promptly take the next right turn and left turn and walk to school on a parallel street.\n\t\t\n\t\t*goto almost_late\t\t\n\n*label almost_late\nUp ahead, you hear a distant school bell. You've dillydallied too long. You're going to be late for class!\n\n*choice\n\t#Run! I don't want to make Mrs. Greeley mad.\n\t\t*set Respect %+10\n\t\t*temp walk_this_way \"rush breathlessly\"\n\n\t\t*goto enter_class\n\t#Hurry! Getting to class late inconveniences everyone.\n\t\t*set Greed %-10\n\n\t\t*temp walk_this_way \"rush breathlessly\"\n\n\t\t*goto enter_class\n\t#Get moving! I don't want to miss any of the daily drama with my friends and classmates.\n\n\t\t*set Secrecy %-10\n\n\t\t*temp walk_this_way \"rush breathlessly\"\n\t\t*goto enter_class\n\t#Eh, I take my time. Who cares? It's just school.\n\t\t*set Respect %-10\n\t\t*set relA %+10\n\t\t*temp walk_this_way \"saunter casually\"\n\t\t*goto enter_class\n\n*label enter_class\nYou ${walk_this_way} to your classroom,\n*if(with_aj)\n\tA.J. at your heels.\n\t\n\t*goto tardy\n*else\n\tarriving at the door at the same moment as A.J. Your eyes meet but only for a moment.\n\n\t\"After you,\" A.J. mutters, stepping aside to let you go first. You're not sure if A.J. is making a friendly overture or if it's just that ${he} is in no rush to enter the classroom. You push the door open.\n\n\t*goto tardy\n\n*label tardy\nMrs. Greeley turns sharply toward the door when she hears you come in. \"Tardy!\" she snaps, picking up a red pen to mark her book.\n\n\"Old bag,\" A.J. mutters under ${his} breath as the two of you rush into the coat room, which is really a closet off the classroom. It's a small, dark room, lit only by sunlight from a narrow, barred window. The walls are lined with shelves and hooks for the students' book bags and jackets.\n\nYou're not the only ones who are late to class. Evan is standing on his tiptoes with his back to you, shoving his messenger bag onto the high shelf, next to Shashi's tuba case. His usual hook is taken up with a yellow denim jacket covered in flower patches. You assume it's not his. \n\n\"My man Evan,\" says A.J., playfully grabbing him around the waist where his shirt has ridden up. \n\n\"Augh!\" Evan startles visibly. \"Jeez! Give a guy a heart attack.\"\n\nA.J. steps back and shoves ${his} hands in ${his} pockets. \"Aw, some people have no sense of fun.\" \n\n*fake_choice\n\t#\"Take it easy on Evan, A.J. He's very sensitive.\"\n\t\t*set relE %-20\n\t\t\"I'm not sensitive,\" says Evan, hurt. \"I'm rough and tumble.\" \n\t\t\n\t\tA.J. snaps a finger lightly next to Evan's ear. Evan jumps. \n\t\t\n\t\t\"That was not a fair test,\" Evan protests. \n\t\t\n\t#\"Ha ha! Wow, Evan, you're jum
