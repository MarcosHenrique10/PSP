\n\t\t\t*set want_to_go_with \"admirer\"\n\t\t\t*set evan_present false\n\t\t\t*goto examine_note_choice\n\t\t#\"Both of you.\" \n\t\t\t*set relE %+10\n\t\t\t\"Oh, wow,\" says Evan. \"Okay. That could be cool. I guess I'll see you both there!\"\n\t\t\t\n\t\t\tYou hang up, feeling pleased. You didn't want to turn down Evan, but how can you pass up the chance to go to the dance with a mysterious admirer? You're glad you don't have to choose. Still, you don't know who this other admirer is!\n\n\t\t\t*set evan_knows_multiple true\n\t\t\t*set asked \"Evan\"\n\t\t\t*set want_to_go_with \"Evan\"\n\t\t\t*if(evan_present = false)\n\t\t\t\t*set evan_present true\n\t\t\t\t*set number_of_dates +1\n\t\t\t*goto examine_note_choice\n\t\t#\"Neither of you. I'm going by myself.\"\n\t\t\t\"Oh,\" says Evan, sounding disappointed. \"I was sort of hoping we could go together.\"\n\t\t\t\n\t\t\t\"Well, we can, as friends,\" you say.\n\t\t\t\n\t\t\t\"Okay,\" Evan agrees. \"That sounds good to me. I like being friends.\"\n\t\t\t\n\t\t\tYou chat for a bit longer and then hang up. You're happy that Evan doesn't mind going to the dance as just friends, but you're still confused about this secret admirer business!\n\t\t\t\n\t\t\t*set want_to_go_with \"friends\"\n\t\t\t*set evan_knows_multiple true\n\t\t\t*goto examine_note_choice\n\n*label ask_shashi\nYou call Shashi on the phone and ask directly. \"Hey, weird question. Did you write me a note asking me to the dance?\"\n\n*if(admirer = \"Shashi\")\n\t*temp he_askee \"she\"\n\t*temp agree_emotion \"excited. Spending time with Shashi is always an adventure…. An adventure into the imagination\"\n\t*goto ask_admirer\n*else\n\t\"Oh, wow!\" says Shashi. \"You have a secret admirer? That's so cool!\"\n\t\n\t\"So it wasn't you?\"\n\t\n\t\"No. That would have been cool, though. I could have left you a treasure map. Maybe some other time. Are you going to the dance with them? Whoever it is?\"\n\t\n\t*choice\n\t\t#\"Yes. It will be fun to go with the mystery person.\"\n\t\t\t\"I think so, too,\" says Shashi. \"I really like you, ${Name}, but if it were me, I would do exactly the same thing, to be honest.\" \n\t\t\t\n\t\t\tYou grin. \"I'm glad you understand.\" \n\t\t\t\n\t\t\t\"Well, I'll see you at the dance anyway. I am really interested to see who this admirer turns out to be!\"\n\t\t\t\n\t\t\tYou have to admit you are no closer to finding out.\n\n\t\t\t*set shashi_present false\n\t\t\t*set want_to_go_with \"admirer\"\n\t\t\t*goto examine_note_choice\n\t\t#\"Actually, I kind of wanted to go with you.\"\n\t\t\t*set relS %+10 \n\t\t\t\"Really?\" says Shashi happily. \"Hey, that would be awesome! I would love to go with you. We can play the game all night long. I will bring my books!\"\n\t\t\t\n\t\t\tYou chat for a bit longer and then hang up. You're excited about the dance now. Shashi will be a great date! Then you remember the admirer. What's going to happen there? You still don't know who it is. \n\n\t\t\t*set shashi_knows_multiple true\t\t\n\t\t\t*set asked \"Shashi\"\n\t\t\t*set want_to_go_with \"Shashi\"\t\n\t\t\t*if(shashi_present = false)\n\t\t\t\t*set shashi_present true\n\t\t\t\t*set number_of_dates +1\n\t\t\t*goto examine_note_choice\n\t\t#\"Actually, I'd love to go with both of you.\" \n\t\t\t*set relS %+20\n\t\t\t\"Cool!\" says Shashi enthusiastically. \"That would be really fun. You could just saunter in with one of us on each arm.\"\n\t\t\t\n\t\t\t\"I know, right?\" you say. \"I'm glad you agree. I am really looking forward to this now!\"\n\t\t\t\n\t\t\t\"Me, too! As long as it doesn't turn out to be someone gross,\" says Shashi. \n\t\t\t\n\t\t\tYou hang up, feeling both hopeful and wary. After all, Shashi is right. You still don't know who it is.\n\t\t\t\n\t\t\t*set shashi_knows_multiple true\n\t\t\t*set asked \"Shashi\"\n\t\t\t*set want_to_go_with \"Shashi and admirer\"\n\t\t\t*if(shashi_present = false)\n\t\t\t\t*set shashi_present true\n\t\t\t\t*set number_of_dates +1\n\t\t\t*goto examine_note_choice\n\t\t#\"No, I don't want to go with anyone.\" \n\t\t\t\"I kind of get what you mean,\" says Shashi. \"I like doing things in groups of friends instead of paired off in dates.\"\n\t\t\t\n\t\t\t\"Exactly,\" you say.\n\t\t\t\n\t\t\t\"Well, I'll see you there, then. As a friend!\"\n\t\t\t\n\t\t\t\"See you there, pal!\"\n\t\t\t\n\t\t\tYou hang up, pleased. Shashi gets you. There's still one thing you don't know, though—who is the admirer?\n\t\t\t \n\t\t\t*set want_to_go_with \"friends\"\n\t\t\t*goto examine_note_choice\n\n*label ask_admirer\n\"Who, me?\" ${he_askee} asks innocently. \"Why would I ever do something like that? By the way, you are going to the dance tomorrow, aren't you?\"\n\t\n\"Sure. If you want to,\" you agree, ${agree_emotion}.\n\t\n\"Great. Meet me…I mean, your secret admirer…on the steps of the school before the dance.\" \n\n*if(admirer = \"Evan\")\n\t*gosub tell_evan_color\n\t\nYou hang up with a smile on your face.\n*set know_admirer true\n*achieve figureoutadmirer\n*page_break\n*goto prep\n\n*label tell_evan_color\n*if(color = \"\")\n\t\"Okay,\" you say.\n\t\n\t\"Oh! One more thing. I need to know…I mean, so I can tell your admirer…what color are you wearing?\"\n\t\n\t*fake_choice\n\t\t#\"I think I'll wear blue. But please tell my admirer that they don't have to get me a flower or anything.\"\n\t\t\t*set relE %+10\n\t\t\t*set color \"blue\"\n\t\t\t\"Of course I do!\" says Evan cheerfully. \"It will be my pleasure.\"\n\t\t#\"Jade green silk. And catellya orchids are my favorite.\"\n\t\t\t*set relE %+20\n\t\t\t*set color \"jade\"\n\t\t\t*set corsage \"gorgeous plum-colored orchid\"\n\t\t\t\"Excellent!\" says Evan. \"You have exquisite taste. Don't worry, you won't be disappointed.\"\n\t\t#\"Black. Just black.\"\n\t\t\t*set relE %+10\n\t\t\t*set color \"black\"\n\t\t\t\"Classic choice,\" says Evan. \"Goes with anything.\"\n\t\t#\"It will be a surprise.\"\n\t\t\t\"Haven't narrowed it down yet, huh?\" says Evan sympathetically. \"Well, for reference, your admirer will be wearing violet, and you will be receiving an arrangement of white gardenias.\"\n*return\n\t\n\t\n*label ask_someone\nYou sit down with your phone, ready to ask someone to the dance.\n*if((datingA) and (datingS)) and (datingE)\n\tYou're dating three separate people right now—A.J., Shashi, and Evan—so things might get awkward at the dance! Which one will you pick to be your date? Or maybe you want to pick someone altogether different?\n\t*goto ask_someone_2\n*elseif(datingA) and (datingS)\n\tYou're dating both A.J. and Shashi right now, which might get awkward at the dance! Which one will you pick to be your date? Or maybe you want to pick someone altogether different?\n\t*goto ask_someone_2\n*elseif(datingE) and (datingS)\n\tYou're dating both Shashi and Evan right now, which might get awkward at the dance! Which one will you pick to be your date? Or maybe you want to pick someone altogether different?\n\t*goto ask_someone_2\n*elseif(datingA)\n\tRemember, you're dating A.J. right now, so ${he} might get miffed if you ask someone else.\n\t*goto ask_someone_2\t\n*elseif(datingS)\n\tRemember, you're dating Shashi right now, so she might get miffed if you ask someone else.\n\t*goto ask_someone_2\t\n*elseif(datingE)\n\tRemember, you're dating Evan right now, so he might get miffed if you ask someone else.\n\t*goto ask_someone_2\t\n*else\n\t*goto ask_someone_2\t\n\n*label ask_someone_2\nWho do you call?\n\n*choice\n\t*disable_reuse #A.J.\n\t\t*goto askdance_aj\n\t*disable_reuse #Shashi.\n\t\t*goto askdance_shashi\n\t*disable_reuse #Evan.\n\t\t*goto askdance_evan\n\t*disable_reuse #Corley.\n\t\t*goto askdance_corley\n\t*disable_reuse #Finnegan.\n\t\t*goto askdance_finnegan\n\t*disable_reuse #Vitessa.\n\t\t*goto askdance_vitessa\n\t#Never mind, I don't want to ask anyone. \n\t\t*goto examine_note_choice\n\n*label askdance_aj\n*if(admirer = \"A.J.\")\n\t\"Yes,\" says A.J. right away, almost before you finish asking the question.\n\t\n\tYou laugh. \"Wait, really? You really want to go to a dance?\"\n\t\n\t\"Duh. I knew you'd figure it out.\" Somehow, over the phone, you can tell A.J. is winking. \"See you there.\"\n\t\n\tGreat! You're excited about this dance now. \n\t\n\t*set asked \"A.J.\"\n\t*set want_to_go_with \"A.J.\"\n\t*set aj_present true\n\t*goto prep\n*if(datingA)\n\t\"Sure! I just sort of assumed we'd go together,\" says A.J. \n\t\n\t\"Really? Well…great!\" You're surprised that A.J. wants to go to a dance, but you're also pleased.\n\t\n\t*set asked \"A.J.\"\n\t*set want_to_go_with \"A.J.\"\n\t*if(aj_present = false)\n\t\t*set aj_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*elseif(relA > 75)\n\t\"Me and you? A dance? Well…sure!\" says A.J. \n\t\n\tYou're surprised that A.J. actually wants to go to the dance, but you're also pleased. \"Great!\" you say.\n\t*set asked \"A.J.\"\n\t*set want_to_go_with \"A.J.\"\n\t*if(aj_present = false)\n\t\t*set aj_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*else\n\t\"Uh…dances aren't really my thing,\" says A.J.\n\t\n\tOh well. You figured as much. \"Okay,\" you say. \"No worries.\" \n\t\n\tBack to the drawing board.\n\t*goto examine_note_choice\n\n*label askdance_shashi\n*if(admirer = \"Shashi\")\n\t\"Yes,\" says Shashi right away, almost before you finish asking the question.\n\t\n\tYou laugh. \"Well, okay then!\"\n\t\n\t\"I knew you'd figure it out. This will be so much fun! We can play the game all night. I'll bring my books.\"\n\t\n\t*set asked \"Shashi\"\n\t*set want_to_go_with \"Shashi\"\n\t*set shashi_present true\n\t*goto prep\n*if(datingS)\n\t\"Of course!\" says Shashi. \"I was about to call and ask you, actually. This will be so much fun! We can play the game all night. I'll bring my books.\" \n\n\t*set asked \"Shashi\"\n\t*set want_to_go_with \"Shashi\"\n\t*if(shashi_present = false)\n\t\t*set shashi_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*elseif(relS > 75)\n\t\"That sounds fun!\" says Shashi. \"I'd be happy to go with you, ${Name}. This will be so much fun! We can play the game all night. I'll bring my books.\"\n\t\n\t*set asked \"Shashi\"\n\t*set want_to_go_with \"Shashi\"\n\t*if(shashi_present = false)\n\t\t*set shashi_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*else\n\t\"Thanks for asking, but I'm kind of already going with someone else,\" says Shashi.\n\t\n\t\"Oh. Okay,\" you say. \"No worries.\" \n\t\n\tBack to the drawing board.\n\t*goto examine_note_choice\n\n*label askdance_evan\n*if(admirer = \"Evan\")\n\t\"Yes,\" says Evan right away, almost before you finish asking the question.\n\t\n\tYou laugh. \"Well, okay then!\"\n\t\n\t\"I knew you'd figure it out. This is going to be fun! I'll put together a really special look.\"\n\t\n\t*set asked \"Evan\"\n\t*set want_to_go_with \"Evan\"\n\t*goto prep\n*if(datingE)\n\t\"Of course!\" says Evan. \"I hoped you would ask. I was pretty sure you would. This will be fun! I'll put together a really special look.\" \n\t\n\t*set asked \"Evan\"\n\t*set want_to_go_with \"Evan\"\n\t*if(evan_present = false)\n\t\t*set evan_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*elseif(relE > 75)\n\t\"Really? You and me?\" says Evan. \"Well, I mean, yes! That sounds great. I'd be happy to go with you, ${Name}. I'll put together a really special look.\"\n\t\n\t*set asked \"Evan\"\n\t*set want_to_go_with \"Evan\"\n\t*if(evan_present = false)\n\t\t*set evan_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*else\n\t\"Thanks for asking, but I don't think so,\" says Evan. \"I'm kind of interested in someone else.\" \n\t\n\t\"Oh. Okay,\" you say. \"No worries.\" \n\t\n\tBack to the drawing board.\n\t*if(evan_present)\n\t\t*set evan_present false\n\t\t*set number_of_dates -1\n\t*goto examine_note_choice\n\t\n*label askdance_vitessa\n*if(admirer = \"Vitessa\")\n\t\"As you know, I will be there in a capacity as a reporter only,\" says Vitessa. \"But I'm sure we can sneak in a dance here or there.\"\n\t\n\t\"Really?\" you grin. \"Okay. Cool!\" \n\t\n\t\"I knew you'd figure it out,\" Vitessa adds in a softer, kinder voice. \"See you there.\" \n\t\n\t*set asked \"Vitessa\"\n\t*set want_to_go_with \"Vitessa\"\n\t*goto prep\n*elseif(relV > 75)\n\t\"As you know, I will be there in a capacity as a reporter only,\" says Vitessa. \"But I'm sure we can sneak in a dance here or there.\"\n\t\n\t\"Really?\" you grin. \"Okay. Cool!\" \n\t\t\n\t*set asked \"Vitessa\"\n\t*set want_to_go_with \"Vitessa\"\n\t*if(vitessa_present = false)\n\t\t*set vitessa_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*else\n\t\"Ha! Ha! Ha!\" Vitessa laughs. \"Hahahaha. No. No, no, no, no, no. No.\"\n\t\n\t\"Okay, okay, sheesh. I get it,\" you scowl.\n\t\n\tBack to the drawing board.\n\t*goto examine_note_choice\n\t\n*label askdance_corley\n*if(admirer = \"Corley\")\n\t\"Yes,\" says Corley right away, almost before you finish asking the question.\n\t\n\tYou laugh. \"Well, okay then!\"\n\t\n\t\"I knew you'd figure it out,\" she adds softly. \"I'm really glad you asked. Thank you.\"  \n\t\n\t*set asked \"Corley\"\n\t*set want_to_go_with \"Corley\"\n\t*goto prep\n*elseif(relC > 75)\n\t\"Really? You and me?\" Corley squeaks. \"Are you serious?\"\n\t\n\t\"Yes, of course,\" you say. \"Do you want to?\"\n\t\n\t\"Well—okay! Yes! Thank you!\"\n\t\n\t*set asked \"Corley\"\n\t*set want_to_go_with \"Corley\"\n\t*if(corley_present = false)\n\t\t*set corley_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*else\n\t\"Oh. Ummm. Thank you for asking, but, um…I kind of….\"\n\t\n\t\"Don't want to?\" you finish when Corley trails off.\n\t\n\t\"Is that okay?\" Corley asks in a quiet voice. \"I mean, I don't want to hurt your feelings.\"\n\t\n\t\"Perfectly all right,\" you find yourself reassuring her. \"I'm fine. No worries.\"\n\t\n\tBack to the drawing board.\n\t*goto examine_note_choice\t\t\t\n\n*label askdance_finnegan\n*if(admirer = \"Finnegan\")\n\t\"Yes,\" says Finnegan right away, almost before you finish asking the question.\n\t\n\tYou laugh. \"Well, okay then!\"\n\t\n\t\"I knew you'd figure it out,\" he adds confidently.\n\t\n\t*set asked \"Finnegan\"\n\t*set want_to_go_with \"Finnegan\"\n\t*goto prep\n*elseif(relF > 75)\n\tAs soon as you ask, there is a long pause. You wonder if Finnegan is figuring out how to let you down gently. Then he says, \"Well—you are almost as smart as I am. We would make quite the power couple. All right, I accept.\"\n\t\n\t\"Great!\" you say. \n\t\n\t*set asked \"Finnegan\"\n\t*set want_to_go_with \"Finnegan\"\n\t*if(finnegan_present = false)\n\t\t*set finnegan_present true\n\t\t*set number_of_dates +1\n\t*goto prep\n*else\n\t\"While I salute you for shooting for the stars, I'm afraid the answer is no,\" says Finnegan. \"It's not personal. I am only one man, and there couldn't possibly be enough of me to go around, considering all the people who want to date me.\" \n\t\n\t\"Oh,\" you say. \"Okay. I get it. No worries.\" \n\t\n\tBack to the drawing board.\n\t*goto examine_note_choice\t\n\n*label prep\nThe only thing left to do is prepare for the dance.\n*if(Money >= 100) and (yourBike = \"\")\n\tThat means one thing: wheels! You finally have enough money to buy a bike. You will arrive at the dance in style! \n\n\t*goto pickbike\n*else\n\tThat means one thing: clothes! What will you wear? \n\n\t*goto pickclothes\n\n*label pickbike\nHank looks suspicious when you walk into the garage waiting room. \"What do you want, kid?\"\n\n\"I'm back, and this time I have enough money for a bike,\" you confide, flashing cash.\n\nHank's frown turns upside down. \"Well, well, well! Let me show you my wares.\" He leads you to the showroom and gestures at the bikes on the wall. \"See anything you like?\"\n\n*label bike_choice\n*fake_choice\n\t*disable_reuse #The black mountain bike with all the red skulls for $250.\n\t\t*set Respect %-10\n\t\t*set bikeYouWant \"black\"\n\t\t*set bikeCost 250\n\t*disable_reuse #The yellow one with the flowery basket and the streamers for $175.\n\t\t*set Respect %+10\n\t\t*set bikeYouWant \"yellow\"\n\t\t*set bikeCost 175\n\t*disable_reuse #The top-of-the-line silver racing bike for $700.\n\t\t*set Greed %+10\n\t\t*set bikeYouWant \"silver\"\n\t\t*set bikeCost 700\n\t*disable_reuse #The plain beige one for $150.\n\t\t*set Secrecy %+10\n\t\t*set bikeCost 150\n\t\t*set bikeYouWant \"beige\"\n\t#The clunky, out-of-fashion one painted in two clashing shades of avocado green, a bargain at $100.\n\t\t*set Greed %-10\n\t\t*set bikeYouWant \"green\"\n\t\t*set bikeCost 100\n\n*set Money *100\n*set Money round(Money)\n*set Money /100\nYou check your pockets. You have $${Money}. \n\n*if(bikeCost > Money)\n\t*temp difference bikeCost - Money\n\tHank shakes head head. \"Not enough.\"\n\n\t\"Can't you give it to me for $${Money} or less?\" you wheedle. \"Pleeeeease? I really, really want it….\"\n\n\t*if(relH > 75) and (difference \u003c= 25)\n\t\tHank looks charmed in spite of himself. \"Augh, you're driving me out of business. But I can't say no to that face. We'll call it $${Money}. Come on—let's settle up.\"\n\t\t*set bikeCost Money\n\t\t*goto settle_up\n\t*else\n\t\t\"Can't do it, kid,\" Hank shakes his head curtly. \"You'll have to pick something you can afford.\"\n\n\t\t*goto bike_choice\n*else\n\t\"Okeydoke,\" says Hank. \"Come on—let's settle up.\"\n\n\t*goto settle_up\n\n*label settle_up\n*achieve buybike\nHank takes the bike down from the wall and wheels it into the office for you. You hand over $${bikeCost} and ride out with your very own new ${bikeYouWant} bike! You wanted something, you went out and made the money, and you bought it. You feel a deep sense of accomplishment. It's as if you have won at life!\n*set boughtBikeFairandSquare true\n*set yourBike bikeYouWant\n*set Money -bikeCost\n\nYou're all ready for the dance, except for one thing: What are you going to wear?\n\n*label pickclothes\n*temp buttonhole true\n*temp satin \"red satin\"\n*temp plainshirt \"plain white button-down shirt\"\n*temp hotpink \"iridescent hot pink\"\n*temp hawaiian \"Hawaiian print\"\n*temp black \"black\"\n*if(color = \"jade\")\n\t*set satin \"jade green silk\"\n\t*set plainshirt \"simple white button-down shirt with a jade green silk handkerchief sticking out of the pocket,\"\n\t*set hawaiian \"jade green silk\"\n\t*set hotpink \"jade green silk\"\n\t*set black \"jade green silk\"\n*if(color = \"blue\")\n\t*set satin \"cobalt blue satin\"\n\t*set plainshirt \"simple French blue cotton button-down shirt\"\n\t*set hawaiian \"blue and yellow Hawaiian print\"\n\t*set hotpink \"iridescent electric blue\"\n\t*set black \"blue\"\n*if(color = \"black\")\n\t*set satin \"black satin\"\n\t*set plainshirt \"simple black cotton button-down shirt\"\n\t*set hawaiian \"black and white harlequin print\"\n\t*set hotpink \"black silk\"\n*fake_choice\n\t*if(haveJacket)\n\t\t#A.J.'s black leather jacket, of course.\n\t\t\t*set relA %+20\n\t\t\t*set Respect %-20\n\t#My favorite T-shirt and jeans. It's just a school dance.\n\t\t*set Secrecy %+10\n\t\t*set Respect %-10\t\t\t\n\t\t*set buttonhole false\n\t*if(gender = \"girl\")\n\t\t#A classic A-line party dress in ${satin}. I want to look dressed up—and grown up.\n\t\t\t*set Respect %+20\n\t\t#A ${plainshirt} and gray skirt. I just want to blend in.\n\t\t\t*set Secrecy %+20\n\t\t#A ${hawaiian} off-the-shoulder top and leggings. I want to look nice, but, most importantly, to be ready to dance!\n\t\t\t*set Respect %+10\n\t\t\t*set Secrecy %-10\n\t*if(gender != \"girl\")\n\t\t#A classic suit with a ${satin} tie. I want to look dressed up--and grown up.\n\t\t\t*set Respect %+20\n\t\t#A ${plainshirt} and gray pants. I just want to blend in.\n\t\t\t*set Secrecy %+20\n\t\t#A ${hawaiian} bowling shirt and nice jeans. I want to look nice, but, most importantly, be ready to dance!\n\t\t\t*set Respect %+10\n\t\t\t*set Secrecy %-10\t\t\t\n\t#Leather pants and a billowing poet shirt in ${hotpink}. A single silver dangly earring. Eyeliner. Lots. Nobody will look as cool as me, guaranteed.\n\t\t*set Secrecy %-20\n\t#My nicest ${black} bandanna covered in skulls.\n\t\t*set Respect %-20\n\n*label pickflowers\nYour last stop before the dance is your garden, where you pick a flower for your\n*if(number_of_dates = 1)\n\tdate.\n\t\n\t*goto pickflowers2\n*elseif(number_of_dates > 1)\n\tdate…or dates.\n\t\n\t*goto pickflowers2\n*elseif(buttonhole = false)\n\tback pocket. No reason your jeans can't look a little fancy.\n\n\t*goto pickflowers2\n*elseif(gender = \"girl\")\n\twrist corsage.\n\n\t*goto pickflowers2\n*else\n\tbuttonhole.\n\n\t*goto pickflowers2\n\n*label pickflowers2\nWhat flower do you want to pick?\n\n*choice\n\t*if(admirer = \"Finnegan\")\n\t\t#A red carnation.\n\t\t\t*set flower \"red carnation\"\n\t\t\t*set relF %+10\n\t\t\t*set want_to_go_with \"admirer\"\n\t\t\t*goto on_your_way\n\t\t#A black carnation.\n\t\t\t*set flower \"black carnation\"\n\t\t\t*set relF %-10\n\t\t\t*if(want_to_go_with = \"admirer\")\n\t\t\t\t*set want_to_go_with \"nobody\"\n\t\t\t\n\t\t\tYou can't find a black carnation, so you find a white one and color it with a Sharpie.\n\t\t\t\n\t\t\t*goto on_your_way\n\t*if(color = \"jade\")\n\t\t#A cattelya orchid, of course.\n\t\t\t*set flower \"orchids\"\n\t\t\tLuckily, you grow orchids in the hothouse year-round, and cattelyas are your specialty. You pluck a particularly fine blossom.\n\n\t\t\t*goto on_your_way\n\t#A red rose. They're classic for a reason.\n\t\t*set flower \"red rose\"\n\t\t*set Respect %+10\n\t\t*goto on_your_way\n\t#A small white aster. Nothing too showy.\n\t\t*set flower \"white flower\"\n\t\t*set Secrecy %+10\n\t\t*goto on_your_way\n\t#Wild, flaming-orange devil's paintbrush. You want to make a splash!\n\t\t*set flower \"orange flower\"\n\t\t*set Secrecy %-10\n\t\t*goto on_your_way\n\t*if(asked = \"A.J.\")\n\t\t#Snapdragons, A.J.'s favorite.\n\t\t\t*set flower \"sprig of snapdragons\"\n\t\t\t*set relA %+10\n\t\t\t*goto on_your_way\n\t*if(asked = \"Shashi\")\n\t\t#A big sunflower, Shashi's favorite.\n\t\t\t*set flower \"sunflower\"\n\t\t\t*set relS %+10\n\t\t\t*goto on_your_way\n\t*if(asked = \"Evan\")\n\t\t#A calla lily, Evan's favorite.\n\t\t\t*set flower \"lily\"\n\t\t\t*set relE %+10\n\t\t\t*goto on_your_way\n\t*if(asked = \"Corley\")\n\t\t#A daisy. Cheerful daisies just remind you of Corley.\n\t\t\t*set flower \"daisy\"\t\n\t\t\t*set relC %+10\n\t\t\t*goto on_your_way\n\t*if(asked = \"Finnegan\")\n\t\t#Ivy. To represent the Ivy League school that Finnegan will surely attend.\n\t\t\t*set flower \"sprig of ivy\"\n\t\t\t*set relF %+10\n\t\t\t*goto on_your_way\n\t*if(asked = \"Vitessa\")\n\t\t#A small cactus. It reminds you of Vitessa, somehow.\n\t\t\t*set flower \"cactus\"\n\t\t\t*set relV %+10\n\t\t\t*goto on_your_way\n\t#A black, dead, rotting rose.\n\t\t*set flower \"black rose\"\n\t\t*set Respect %-10\n\t\t*goto on_your_way\n\n*label on_your_way\n*if(yourBike = \"\")\n\tAs you walk \n\t*goto oyw2\n*else\n\tAs you pedal \n\t*goto oyw2\n\n*label oyw2\nto the school gym on your way to the dance, \n*if(know_admirer)\n\t*goto confirm_admirer\n*else\n\t*goto realize_admirer\n\t\n*label realize_admirer\na sudden thought strikes you.\n*goto reflect_on_clue\n\n*label confirm_admirer\nyou picture the note in your mind. Now that you know the admirer was ${admirer} all along, it seems so obvious. \n*goto reflect_on_clue\n\n*label reflect_on_clue\n*if(admirer = \"A.J.\")\n\tThere was a lightning bolt drawn on the note. Like Red Lightning.\n\t*if aj_present = false\n\t\t*set number_of_dates +1\n\t\t*set aj_present true\n\t*if(know_admirer = false)\n\t\tIt has to be from A.J.\n\n\t*goto yay\n*elseif(admirer = \"Evan\")\n\tThe note writer was concerned about colors clashing. There is only one person who cares that much about aesthetics.\n\t*if(know_admirer = false)\n\t\tEvan.\n\n\t*goto yay\n*elseif(admirer = \"Shashi\")\n\t\"To boldly go\": The note was written like a [i]Star Trek[/i] voiceover. \n\t*if(know_admirer = false)\n\t\tIt has to be from Shashi.\n\n\t*goto yay\n*elseif(admirer = \"Corley\")\n\tThe note was written in vaguely fantasy language, which made you think maybe Shashi, but it also betrayed a startling lack of confidence.\n\t*if(know_admirer = false)\n\t\tIt has to be from Corley.\t\n\n\t*goto yay\n*elseif(admirer = \"Finnegan\")\n\tThe note was very direct, bossy, and precise. Just like the person who wrote it.\n\t*if(know_admirer = false)\n\t\tIt has to be from Finnegan.\t\n\n\t*goto yay\n*elseif(admirer = \"Vitessa\")\n\tThe note didn't actually ask you to go to the dance as a date. It asked you to hang out at the dance. That is a subtle but important distinction. You know that Vitessa will be covering the dance as a reporter. Therefore, she will not be bringing a date. But she can still hang out with you at the dance. Besides, only she would suggest making fun of other people as a romantic activity. \n\n\t*goto yay\n\n*label yay\n\n*if(want_to_go_with = \"admirer\")\n\tYou smile to yourself, pleased that you figured it out. You're not sure if you would have chosen to ask ${admirer} yourself, but you know what? You have new respect for ${him_a} now. This \"secret admirer\" business was fun!\n\t \n\t*goto reveal\n*elseif(number_of_dates = 0) or ((want_to_go_with != admirer) and (want_to_go_with != \"unknown\"))\n\tYou feel uneasy. Now that you know who it is, it's harder to imagine turning ${him_a} down. You wouldn't have asked ${admirer} to the dance yourself, but does that mean you shouldn't go together? You don't want ${him_a} to get the wrong idea and think you like ${him_a} \"that way\" or anything. But, still, maybe you would have a good time.\n\n\t*goto reveal\n*elseif(number_of_dates > 1)\n\tYou feel uneasy. Now that you have matched a name to the note, you can more clearly imagine the scene when your various dates meet each other. \n\n\t*goto reveal\n*elseif(know_admirer = true)\n\tYou speed up. You don't want to keep ${admirer} waiting.\n\t\n\t*goto reveal\n\t\n*else\n\tYou speed up. You don't know if your conclusion is true or if it's just wishful thinking, but that's exactly who you want to see standing on the school steps, waiting for you. \n\n\t*goto reveal\n\n*label reveal\n*if(know_admirer = true)\n\tTaking a deep breath, you round the final corner.\n\t\n\t*goto reveal2\n*else\n\tYou round the final corner, your eyes squeezed shut. Taking a deep breath, you open them.\n\t\n\t*goto reveal2\n\n*label reveal2\n*if(number_of_dates \u003c= 1)\n\t${admirer} is standing on the school steps. ${admirer_desc}\n\t*if(admirer = \"Evan\")\n\t\tHe is holding a ${corsage} in a clear box.\t\n\t\t\n\t*goto admirer_reaction\n*else\n\t*gosub number_of_dates_text\n\tThere are ${number_of_dates_text} figures standing on the school steps, watching you arrive.\n\t*comment: recalculate both v all, as the number of dates may have increased\n\t*if(number_of_dates > 2)\n\t\t*set both \"all\"\n\n\t*if(aj_present) or (admirer = \"A.J.\")\n\t\tA.J. leans on the banister. ${aj_desc}\n\t*if(shashi_present) or (admirer = \"Shashi\")\n\t\tShashi stands on the bottom step, smiling. ${shashi_desc}\n\t*if(evan_present) or (admirer = \"Evan\")\n\t\tEvan stands on the second step, holding a ${corsage} in a clear box. ${evan_desc}\n\t*if(corley_present) or (admirer = \"Corley\")\n\t\tCorley is pressed to the side, looking uncomfortable. ${corley_desc}\n\t*if(finnegan_present) or (admirer = \"Finnegan\")\n\t\tFinnegan stands in the dead center step, feet planted wide, hands on his hips. ${finnegan_desc}\n\t*if(vitessa_present) or (admirer = \"Vitessa\")\n\t\tVitessa stands in front of the staircase, arms crossed. ${vitessa_desc}\n\t*comment endif\n\n\t*if(yourBike = \"\")\n\t\tYou wave at ${both} of them.\n\n\t\t*goto multidate_confrontation\n\t*else\n\t\tYou dismount, lock up your bike, and head toward them.\n\n\t\t*goto multidate_confrontation\n\n*label admirer_reaction\n*if((want_to_go_with != \"unknown\") and (want_to_go_with != admirer)) or (number_of_dates = 0)\n\tYou offer a wave. ${admirer} smiles broadly.  \t\n\n\t*goto deal_with_bike\n*else\n\tYou release your breath and break into a smile, and ${he_a} smiles, too.\n\t\n\t*goto deal_with_bike\n\n*label deal_with_bike\n*if(yourBike = \"\")\n\tYou walk up to ${him_a}.\n\t\n\t*goto admirer_do_choice\n*else\n\tYou lock up your bike and walk up to ${him_a}.\n\n\t*goto admirer_do_choice\n\t\n*label admirer_do_choice\n*if(admirer = \"A.J.\")\n\t\"I thought you weren't the school-dance type,\" you say.\n\n\tA.J. shrugs. \"I'm not usually, but…come on. It's you. And me.\"\n\n\tYou glance down at your shoes, not sure how to respond.\n\n\"Did you like my note?\" ${admirer} asks shyly. \"Did you solve the mystery? Did you guess it was me?\"\n\n*choice\n\t#\"I knew it would be you. Well…I hoped.\"\n\t\t*goto your_dream_date\n\t#\"Not in time to get back to you. I'm sorry—this is awkward—but I'd rather not go to the dance together as dates.\" \n\t\t*goto psych\n\t#\"Sort of. Hey, just so you know, I only want to go to the dance as friends.\"\n\t\t*goto psych\n\n*label psych\n\"Oh, definitely! I know that!\" ${admirer} smiles. \"Did you think it was a love note? Ha, ha! No. I just wanted to give you a puzzle to solve.\"\n\nYou grin, feeling as if a weight has been lifted off your shoulders. \n*if(flower != \"\") and (number_of_dates > 0)\n\t*if(buttonhole = false)\n\t\tYou slip the ${flower} into your back pocket.\n\t\t*goto what_are_we_waiting_for\n\t*elseif(gender = \"girl\")\n\t\tYou slip the ${flower} behind your ear.\n\t\t*goto what_are_we_waiting_for\n\t*else\n\t\tYou pop the ${flower} into your buttonhole.\t\t\n\t\t*goto what_are_we_waiting_for\n*else\n\t*goto what_are_we_waiting_for\n\t\n*label what_are_we_waiting_for\n\"In that case, what are we waiting for? Let's go in!\" \n\n*set number_of_dates 0\n*goto dance\n\n*label your_dream_date\n${admirer} blushes and smiles broadly. \n*achieve romancer\n\n*if(admirer = \"Evan\")\n\tHe shyly opens the flower box. A sweet, floral scent surrounds you. You lift the corsage carefully and slip the ribbon around your wrist.\n\t\n*if(flower != \"\")\n\tYou hand ${him_a} your ${flower}.\n\t*if(flower = \"black rose\")\n\t\t${admirer} looks puzzled, but at your encouraging smile, gamely pins on the sickly sweet rotting flowers.\n\t\t*goto walk_in_together\n\t*elseif(flower = \"sprig of snapdragons\") and (admirer = \"A.J.\")\n\t\tA.J. joyfully snaps the snapdragons, then shoots you a goofy grin. \"You remembered.\"\n\t\t\n\t\t\"Of course!\" you say. \"How could I forget the summer we were going to be a crime-fighting team called the Snapdragons?\"\n\t\t\n\t\t\"Hey, in a way, we kind of are a crime-fighting team,\" A.J. points out. \"How about that?\"\n\t\t\n\t\t*goto walk_in_together\n\t*elseif(flower = \"sunflower\") and (admirer = \"Shashi\")\n\t\t\"Hey! How did you know I like sunflowers?\" Shashi asks, excitedly pinning the giant flower to her sleeve like a badge.\n\t\t\n\t\t\"It's the insignia on your shield, of course,\" you say. \"You see? I pay attention to your drawings.\" \n\t\t\n\t\tShashi grins. \"Well, that's only because I'm a paladin of the sun god. But I do also like the flower. Thank you. This was so sweet.\"\n\t\t\n\t\t*goto walk_in_together\n\t*elseif(flower = \"daisy\") and (admirer = \"Corley\")\n\t\t\"They're beautiful!\" says Corley. \"How did you know I like daisies?\"\n\t\t\n\t\t\"Oh, I just had a feeling.\"\n\t\t\n\t\tShe slips the daisies behind her ear and smiles sweetly at you, looking angelic.\n\t\t\n\t\t*goto walk_in_together\t\t\n\t*elseif(flower = \"lily\") and (admirer = \"Evan\")\n\t\tEvan inhales deeply. \"I love these. How did you know?\" \n\t\n\t\t\"When wooing a gentleman, it is imperative to memorize his favorite flower,\" you explain.\n\t\t\n\t\tEvan grins and affixes the lilies to his buttonhole. He looks very dapper.\n\t\t\n\t\t*goto walk_in_together\t\t\n\t*elseif(flower = \"orchid\") and (admirer = \"Evan\")\n\t\t\"This is beautiful! Your orchid is better than mine,\" says Evan ruefully. \"Do you want to trade back?\"\n\t\t\n\t\t\"Never! I love my orchid,\" you say, protectively cupping your corsage.\n\t\t\n\t\tEvan grins and affixes your orchid to his buttonhole. He looks very dapper.\n\t\t\n\t\t*goto walk_in_together\n\t*elseif(flower = \"black carnation\") and (admirer = \"Finnegan\")\n\t\tFinnegan looks confused. \"Wait, you don't want to go to the dance with me?\"\n\t\t\n\t\t\"Oh. Is that what that meant? I got confused,\" you say.\n\t\t\n\t\tFinnegan sighs fondly. \"Silly goose.\" And he pins the flower to his lapel anyway.\n\t\t\n\t\t*goto walk_in_together\n\t*elseif(flower = \"red carnation\") and (admirer = \"Finnegan\")\n\t\t\"You followed the directions!\" Finnegan exclaims as he pins the flower to his lapel.\n\t\t\n\t\t\"Of course I did!\" you say. \"They were very specific. Thank you for the direction.\"\n\t\t\n\t\t\"Anytime,\" says Finnegan fondly.\n\t\t\n\t\t*goto walk_in_together\n\t*elseif(flower = \"sprig of ivy\") and (admirer = \"Finnegan\")\n\t\t\"It reminded me of you. Classy. Scholarly,\" you explain.\n\t\t\n\t\t\"Oh. Well. In that case, I can't stay mad that you disregarded my specific instructions,\" Finnegan says, slipping the leafy tendril through his buttonhole. \"I suppose carnations are a little cliché, anyway.\"\n\t\t\n\t\t*goto walk_in_together\n\t*elseif(flower = \"cactus\") and (admirer = \"Vitessa\")\n\t\tVitessa raises a single eyebrow. \"Is this my corsage?\"\n\t\t\n\t\t\"It's spiky, like you,\" you explain.\n\t\t\n\t\tVitessa stares stonily at you, and for a moment you think you've made a misjudgment. But then she bursts out laughing and affixes the cactus to her hat. \"You're such a jerk. I love it.\"\n\t\t\n\t\t*goto walk_in_together\n\t*else\n\t\t${admirer} pins it on.\n\t\t*goto walk_in_together\n*else\n\t*goto walk_in_together\n\n*label walk_in_together\nYou take ${his_a} hand, and together, the two of you walk inside to the dance.\n*goto dance\n\n*label multidate_confrontation\n*temp mustchoose false\n\"Hi!\" you smile. \"Are you ${both} waiting for me?\"\n\n*if(shashi_present = true)\n\t*if(shashi_knows_multiple = false)\n\t\t*set relS %+10\n\t\t*set mustchoose true\n\t\tShashi nods. \"So…you're popular!\"\n\n\t*if(shashi_knows_multiple = true)\n\t\t\"Yup!\" Shashi nods. \"I'm ready if you and ${admirer} are.\" She holds out flowers to each of you.\n\n*if(evan_present = true)\n\t*if(evan_knows_multiple = false)\n\t\t*set mustchoose true\t\n\t\t\"Yeah. Ummm. Which one of us is actually your date, anyway?\" says Evan.\n\n\t*if(evan_knows_multiple = true)\n\t\t\"This is going to be interesting,\" says Evan, glancing nervously at ${admirer}. \n\n*if(aj_present = true) and (aj_knows_multiple = false)\n\t*set mustchoose true\n\t*set relA %-10\n\t\"I assumed just you and I were going to this thing together,\" says A.J., sounding hurt. \"But if you don't need me, I'll go.\"\n\n*if(finnegan_present = true)\n\t*set mustchoose true\n\tFinnegan sniffs. \"As I tried to explain, I am ${Name}'s first and only choice. Right, ${Name}?\"\n\n*if(vitessa_present = true)\n\t*set mustchoose true\n\t\"Come on,\" says Vitessa impatiently. \"Let's go inside, away from the…riffraff.\"\n\t\n*if(want_to_go_with = \"friends\")\n\t*set number_of_dates 0\n\t\"Just so you ${both} know, there are no dates here. I just want to go in a group, as friends,\" you say.\n\t\n\t*if(shashi_present = true)\n\t\t\"Okay by me,\" says Shashi.\n\t\t\n\t*if(evan_present = true)\n\t\t\"Friends sounds great,\" Evan smiles.\n\t\t\n\t*if(other_present = true)\n\t\t\"Of course!\" says ${admirer}. \"That note was just a puzzle. Just for fun.\"\n\t\t\n\t\"Great!\" you grin and hold out both hands. \"Let's all go in together!\"\n\t\n\t*goto dance\n*elseif(mustchoose)\n\t*goto you_must_choose_a_date\n*else\n\t*set shashicorley false\n\t*set shashievan false\n\t*set evanaj false\n\t*achieve multiromancer\n\t\"Okay, great!\" you grin and hold out both hands. \"Let's all go in together!\"\n\t\n\t*goto dance\t\n\n*label you_must_choose_a_date\nYou look from one face to another. Whom do you choose as your date?\n*comment *gosub debug\n\n*choice\n\t*if(aj_present)\n\t\t#\"I choose A.J.\"\n\t\t\t*set relA %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"A.J.\"\n\t\t\t*set his_a his\n\t\t\t*set him_a him\n\t\t\t*set he_a he\n\t\t\t*set dancing_desc aj_dancing_desc\n\t\t\t*set evanaj false\n\t\t\tA.J. grins and grabs your hand. You walk into the school together.\n\n\t\t\t*goto dance\n\t*if(shashi_present)\n\t\t#\"I choose Shashi.\"\n\t\t\t*set relS %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Shashi\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set dancing_desc shashi_dancing_desc\n\t\t\t*set shashievan false\n\t\t\t*set shashicorley false\n\t\t\tShashi grins and daintily holds out her hand for you to take. You walk into the school together.\n\n\t\t\t*goto dance\n\t*if(evan_present)\n\t\t#\"I choose Evan.\"\n\t\t\t*set relE %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Evan\"\n\t\t\t*set his_a \"his\"\n\t\t\t*set him_a \"him\"\n\t\t\t*set he_a \"he\"\n\t\t\t*set dancing_desc evan_dancing_desc\n\t\t\t*set shashievan false\n\t\t\t*set evanaj false\n\t\t\tEvan smiles gallantly and holds out his arm. You slip your arm into his, and the two of you prance into the school together.\n\n\t\t\t*goto dance\n\t*if(corley_present) or (admirer = \"Corley\")\n\t\t#\"I choose Corley.\"\n\t\t\t*set relC %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Corley\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set dancing_desc corley_dancing_desc\n\t\t\tCorley blushes with pleasure and steps forward. You take her hand and lead her into the school.\t\n\t\t\t\n\t\t\t*goto dance\t\n\t*if(finnegan_present) or (admirer = \"Finnegan\")\n\t\t#\"I choose Finnegan.\"\n\t\t\t*set relF %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Finnegan\"\n\t\t\t*set his_a \"his\"\n\t\t\t*set him_a \"him\"\n\t\t\t*set he_a \"he\"\n\t\t\t*set dancing_desc finnegan_dancing_desc\n\t\t\tFinnegan grins cockily. He puts his arms around your shoulders, and you walk into the school together.\n\n\t\t\t*goto dance\t\t\t\n\t*if(vitessa_present) or (admirer = \"Vitessa\")\n\t\t#\"I choose Vitessa.\"\n\t\t\t*set relV %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Vitessa\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set dancing_desc vitessa_dancing_desc\n\t\t\tVitessa lifts her chin, unsurprised. She takes your hand possessively and leads you into the school.\t\n\t\t\t\n\t\t\t*goto dance\t\n\t#\"I can't choose between you. I like ${both} of you equally. Can't we all go together as a group?\"\n\t\t*goto all_together_now\n\n*label all_together_now\n*if(shashi_present)\n\tShashi smiles. \"That's fine with me. I prefer it actually. I like big groups.\"\n\n*if(evan_present)\n\t\"Yeah, I guess that's okay. Why not?\" Evan nods. \"Just because you like someone else doesn't mean you like me any less.\"\n\n*if((shashi_present) and (evan_present)) and ((aj_present = false) and (other_present = false))\n\t*set admirer \"Shashi\"\n\t*set he_a \"she\"\n\t*set him_a \"her\"\n\t*set his_a \"her\"\n\t*set dancing_desc (shashi_dancing_desc & \" \") & evan_dancing_desc\n\t*set shashievan false\n\t*set shashicorley false\n\t*set evanaj false\n\t\"Great!\" you cry. Smiling, you give Shashi your left hand and Evan your right, and the three of you walk into the dance together.\n\n\t*goto dance\n*else \n\t*if(aj_present = true) or (admirer = \"A.J.\")\n\t\tA.J. shakes ${his} head. \"I don't think so. Not as dates anyway. If we're going to go together, we should be each other's one and only. If we're not, then we're just friends.\"\n\t\t*if(vitessa_present = true) or (admirer = \"Vitessa\")\n\n\t\t\tVitessa rolls her eyes. \"$!{he}'s right. And besides, I don't share.\"\n\n\t\t*goto final_multichoice\n\t*if(finnegan_present = true) or (admirer = \"Finnegan\")\n\t\tFinnegan shakes his head. \"Certainly not. In dating, as in life, there can be only one winner. Now is it me or what?\"\n\n\t\t*goto final_multichoice\n\t*if(vitessa_present = true) or (admirer = \"Vitessa\")\n\t\tVitessa shoots you an incredulous look. \"Nice try. I don't share.\"\n\n\t\t*goto final_multichoice\n\t*if(admirer = \"Corley\") or (corley_present = true)\n\t\t*if(shashi_present)\n\t\t\t*if(evan_present = false) and (aj_present = false)\n\t\t\t\tCorley glances at Shashi, then at you. \"Okay…but only because it's Shashi.\"\n\t\t\t\t*set admirer \"Shashi\"\n\t\t\t\t*set he_a \"she\"\n\t\t\t\t*set him_a \"her\"\n\t\t\t\t*set his_a \"her\"\n\t\t\t\t*set dancing_desc (shashi_dancing_desc & \" \") & corley_dancing_desc\n\t\t\t\t*set shashievan false\n\t\t\t\t*set shashicorley false\n\t\t\t\t\"Great!\" you cry. Smiling, you give Shashi your left hand and Corley your right, and the three of you walk into the dance together.\n\n\t\t\t\t*goto dance\n\t\t\t*else\n\t\t\t\tCorley glances at Shashi, then at you. \"Maybe, if it was only Shashi…but I don't like really big groups.\" \n\n\t\t\t\t*goto final_multichoice\n\t\t*else\n\t\t\tCorley shakes her head, looking down at the ground. \"I don't like big groups,\" she says softly.\n\t\t\t\n\t\t\t*goto final_multichoice\n\t*comment endif\n\n\t${admirer} shakes ${his_a} head. \"It's me, and only me, or nobody. I don't want to share you.\" \n\n\t*goto final_multichoice\n\t\t\t\n*label final_multichoice\n*choice\n\t*if(aj_present) or (admirer = \"A.J.\")\n\t\t#\"If I have to choose…I choose A.J.\"\n\t\t\t*set relA %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"A.J.\"\n\t\t\t*set his_a his\n\t\t\t*set he_a he\n\t\t\t*set him_a him\n\t\t\t*set dancing_desc aj_dancing_desc\n\t\t\t*set evanaj false\n\t\t\tA.J. grins and grabs your hand. You walk into the school together.\n\n\t\t\t*goto dance\n\t*if(shashi_present) or (admirer = \"Shashi\")\n\t\t#\"If I have to choose…I choose Shashi.\"\n\t\t\t*set relS %+20\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Shashi\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set dancing_desc shashi_dancing_desc\n\t\t\t*set shashievan false\n\t\t\t*set shashicorley false\n\n\t\t\tShashi daintily holds out her hand for you to take. You walk into the school together.\n\t\t\t*goto dance\n\t*if(evan_present) or (admirer = \"Evan\")\n\t\t#\"If I have to choose…I choose Evan.\"\n\t\t\t*set relE %+30\n\t\t\t*set number_of_dates 1\n\t\t\t*set admirer \"Evan\"\n\t\t\t*set his_a \"his\"\n\t\t\t*set he_a \"he\"\n\t\t\t*set him_a \"him\"\n\t\t\t*set dancing_desc evan_dancing_desc\n\t\t\t*set shashievan false\n\t\t\t*set evanaj false\n\t\t\tEvan smiles shyly and slips his hand into yours. You walk into the school together.\n\t\n\t\t\t*goto dance\n\t*if(finnegan_present) or (admirer = \"Finnegan\")\n\t\t#\"If I have to choose…I choose Finnegan.\"\n\t\t\t*set number_of_dates 1\n\t\t\t*set relF %+30\n\t\t\t*set admirer \"Finnegan\"\n\t\t\t*set his_a \"his\"\n\t\t\t*set he_a \"he\"\n\t\t\t*set him_a \"him\"\n\t\t\t*set dancing_desc finnegan_dancing_desc\n\t\t\t*set shashicorley true\n\t\t\t*set evanaj false\n\t\t\t*if(aj_present)\n\t\t\t\t*set evanaj true\n\t\t\tFinnegan smiles smugly. \"I never had any doubt.\"\n\n\t\t\t\"Come on.\" You grab his hand and walk into the school with him.\n\n\t\t\t*goto dance\n\t*if(vitessa_present) or (admirer = \"Vitessa\")\n\t\t#\"If I have to choose…I choose Vitessa.\"\n\t\t\t*set number_of_dates 1\n\t\t\t*set relV %+30\n\t\t\t*set admirer \"Vitessa\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set dancing_desc vitessa_dancing_desc\n\t\t\t*set shashicorley true\n\t\t\t*set evanaj false\n\t\t\t*if(aj_present)\n\t\t\t\t*set evanaj true\n\t\t\t\"Obviously!\" says Vitessa. Impatiently, she grabs your hand and pulls you along into the school.\n\n\t\t\t*goto dance\n\t*if(shashi_present) and (evan_present)\n\t\t#\"I guess it's just the three of us, then. Come on, Shashi and Evan.\"\n\t\t\t*set relS %+40\n\t\t\t*set relE %+30\n\t\t\t*set number_of_dates 2\n\t\t\t*set admirer \"Shashi\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set dancing_desc (shashi_dancing_desc & \" \") & evan_dancing_desc\n\t\t\t*set shashievan false\n\t\t\t*set shashicorley false\n\t\t\tSmiling, you give Shashi your left hand and Evan your right, and the three of you walk into the dance together.\n\n\t\t\t*goto dance\n\t*if(shashi_present) and ((other_present) and (admirer = \"Corley\"))\n\t\t#\"Then I will narrow it down to Shashi and Corley. Come on, girls.\"\n\t\t\t*set relS %+40\n\t\t\t*set relC %+20\n\t\t\t*set number_of_dates 2\n\t\t\t*set admirer \"Shashi\"\n\t\t\t*set he_a \"she\"\n\t\t\t*set him_a \"her\"\n\t\t\t*set his_a \"her\"\n\t\t\t*set dancing_desc (shashi_dancing_desc & \" \") & corley_dancing_desc\n\t\t\t*set shashievan false\n\t\t\t*set shashicorley false\n\t\t\tSmiling, you give Shashi your left hand and Corley your right, and the three of you walk into the dance together.\n\n\t\t\t*goto dance\n\n*label dance\n*page_break\nThe school gym is transformed into a shimmering blue and purple fairyland. Sparkly streamers crisscross the ceiling. A disco ball throws points of light across the room. Helium balloons point the way to a table laid out with cookies and punch. Romantic songs play over the sound system.\n*if(shashievan = true)\n\tOver by the food table, Shashi and Evan waltz stiffly, like an old-timey couple from the 1800s. Over the music, you can hear Shashi rapidly explaining which superpowers are best for fighters in Swords and Sorcerers. You smile. You knew they would get along.\n*comment endif\n\n*if(shashicorley = true) and (shashievan = false)\n\tOver by the speakers, Shashi and Corley are performing some sort of interpretive dance that looks as if they are both underwater.\n*comment endif\n\n*if(evanaj = true) and (shashievan = false)\n\tYou catch a glimpse of Evan and A.J. sitting under the bleachers, playing dice.\n*goto interact_with_date\n\n*label interact_with_date\n*if(number_of_dates = 0)\n\tYou and ${admirer} look at each other, nod, and make a beeline for the food. There is a giant buffet table of chips and salsa, vegetables and dip, and cookies dusted with rainbow sprinkles. You and ${admirer} happily chat, joke, and stuff yourselves. Your classmates' clumsy dance moves provide excellent entertainment while you dine.\n\n\t*goto conditional_flavor\n*elseif(number_of_dates = 1)\n\tYou turn to ${admirer} with a smile. \"Shall we dance?\"\n\n\t${admirer} nods, smiling back.\n\n\t*goto dancing_desc\n*else\n\tYou turn to your dates. \"Let's dance,\" you suggest.\n\n\tThey nod, smiling. \n\n\t*goto dancing_desc\n\n*label dancing_desc\n${dancing_desc}\n\n*goto conditional_flavor\n\n*label conditional_flavor\n*if(lie_count = 0)\n\t*page_break\n\tA slow dance begins, and Corley, too shy to dance, disappears into the hallway. She returns a moment later with a plate of cupcakes. She taps you on the shoulder and offers you one. \"I made them myself.\"\n\n\t\"So delicious!\" you exclaim. \n\n\t\"Really?\" She beams. \"Everyone says so, but I wasn't sure. I know I can trust you because you never lie. That is what I really admire about you. I've spent a lot of time keeping secrets and hiding, and getting caught up in a web of lies is more trouble than it's worth! You have inspired me to become a more honest person.\"\n\n\t\"Really?\" you say. \"That means a lot. Thank you.\"\n\n\tCorley blushes, waves, and prances off to offer a cupcake to Shashi.\n\n*if(blackmail_attempts = 0) and (boughtBikeFairandSquare)\n\t*page_break\n\tIn a break between songs, you grab a cup of punch and sit down on the bleachers next to Evan.\n\n\tHe grins and cuffs you on the shoulder. \"Hey, I saw your new bike out there. You finally got enough money?\"\n\n\tYou nod. \"I saved and saved. I thought I'd never get there, but I did!\"\n\n\t\"That's awesome.\" Evan smiles at you admiringly. \"I know kids think I'm so rich because I buy things, but it's only because I work so hard to earn my own money. Some people try to find a shortcut—like Kyle, who's always stealing or shaking people down. But you and I put in the hard work and do it the right way. And look at you now! You have a bike!\"\n\n\t\"It feels pretty good,\" you admit, grinning.\n\n*if(in_shashis_gaming_group)\n\t*page_break\n\t*if(number_of_dates = 0)\n\t\tWhile you're relaxing on the bleachers, draining the last bit of your cup of punch, \n\t*if(number_of_dates > 0)\n\t\tAs you're finishing up your mid-dance break on the bleachers, draining the last bit of your cup of punch,\n\tShashi drops down onto the seat next to you, grinning a manic grin and holding up her copy of [i]The Swordmaster's Sourcebook[/i].\n\n\t\"Game time!\" she squeals.\n\n\t\"Right here, right now?\"\n\n\tShe nods. \"Right here, right now. Right, guys?\"\n\n\tCorley dances up to you and settles down at Shashi's feet, pulling a wrinkled character sheet out of her pocket. On your other side, Evan nods, putting on a wizard hat.\n\n\t\"Let's do this!\" you cry.\n*goto suddenly\n\n*label suddenly\n*page_break\n*comment: Calculate 'most', 'service', and 'shape' for prize\n*temp topscore Greed\n*temp most \"Most Enterprising\"\n*temp service \"efficient and customer-oriented service to ${hers_u} fellow students, and for seeing challenges as opportunities\"\n*temp shape \"dollar sign\"\n*if(Secrecy > topscore)\n\t*set topscore Secrecy\n\t*set most \"Most Trustworthy\"\n\t*set service \"confidentiality and discretion in assisting ${hers_u} fellow students with delicate matters\"\n\t*set shape \"question mark\"\n*if((100 - Greed) > topscore)\n\t*set topscore (100 - Greed)\n\t*set most \"the Solomon Award for Fairness\"\n\t*set service \"wisdom and judgment in navigating various moral quandaries\"\n\t*set shape \"balance scale\"\n*if((100 - Secrecy) > topscore)\n\t*set topscore (100 - Secrecy)\n\t*set most \"the Junior Scientist Curiosity Award\"\n\t*set service \"dogged pursuit of the truth in the face of difficult puzzles\"\n\t*set shape \"magnifying glass\"\n*if(Respect > topscore)\n\t*set topscore Respect\n\t*set most \"Best Citizenship\"\n\t*set service \"tact and graciousness in resolving various issues while remaining an excellent ambassador of school values\"\n\t*set shape \"golden apple\"\n*if((100 - Respect) > topscore)\n\t*set topscore (100 - Respect)\n\t*set most \"Most Independent\"\n\t*set service \"unique solutions to unusual problems\"\n\t*set shape \"man raising his arms over his head\"\n\t\nSuddenly, the music cuts out, and Mrs. Greeley taps a microphone on the stage. \"It's time to give the class awards,\" she announces. \"First, Overall Best Student….\"\n\nFinnegan is already making his way to the stage, adjusting his bow tie. He wins, of course. \n\nThe awards go on. Vitessa wins \"Most Popular.\" Shashi gets \"Most Imaginative.\" Evan is pleased to win \"Most Fashionable.\" Corley wins \"Miss Cooperation,\" which is normally the biggest award of the night because it comes with a special tiara. But tonight it seems they've replaced it with a normal trophy. A.J. doesn't win anything; ${he} never does. \n*if(aj_present = false) and (evanaj = false)\n\t${Hhe} isn't here to accept an award, anyway.\n*comment endif\n\n*if(most = \"Secretive\")\n\t\"…And that concludes the awards,\" Mrs. Greeley finishes. The music comes blasting back over the speakers.\n\n\t${admirer} turns to you. \"Hey! How come you didn't win anything? You're such a great detective! Don't they know that?\"\n\n\t\"I guess not,\" you say. \"And I'd like to keep it that way. The part of my job that matters the most to me is keeping the secrets of my friends and clients. I will never become famous. But I still do good work. Actually, the fact that I am overlooked is a sign of a job well done.\"\n\n\t${admirer} nods. \"Well, in that case, I hope you never win an award…but I hope you know that I appreciate all that you do!\" \n\n\t\"Thanks.\" You grab ${his_a} hand. \"Come on. Let's dance!\"\n\n\t*goto dancing\n*else\n\t\"Finally,\" Mrs. Greeley announces, \"a new award. For ${hers_u} ${service}, we are proud to present ${Name} with ${most}!\"\n\n\tCheers fill your ears as you walk up to the stage to accept your prize. It is a small trophy in the shape of a ${shape}. \n\n\tThe music comes blasting back over the speakers. You jump down off the stage and rejoin your classmates.\n\n\t*goto dancing\n\n*label dancing\nIt's a fast number this time. \n*if(in_shashis_gaming_group)\n\tShashi, Evan, and Corley leave their dice and books on the bleachers, ready to dance another song before returning to the game.\n\n*if(number_of_dates = 0)\n\tYou and your friends shimmy and shake in a big group, singing and laughing along with the music, showing off your wildest and craziest dance moves. \n\n\t*goto cliffhanger\n*if(number_of_dates = 1)\n\tYou and ${admirer} shimmy and shake together, singing and laughing along with the music, showing each other your wildest and craziest dance moves.\n\n\t*goto cliffhanger\n*else\n\tYou and your dates shimmy and shake together, singing and laughing along with the music, showing each other your wildest and craziest dance moves. \n\n\t*goto cliffhanger\t\n\n*label cliffhanger\n*if(you_are_a_whip)\n\t*goto whip_cliffhanger\n*else\n\t*goto nonwhip_cliffhanger\n\n*label nonwhip_cliffhanger\nSuddenly, the principal runs into the gym, waving his arms. \"There's been a theft! The trophy case has been vandalized! Someone has stolen the Miss Cooperation tiara!\" \n\nEveryone looks at you. Nodding, you roll up your sleeves. There's work to be done. \n\n*goto an_ending\n\n*label whip_cliffhanger\nSuddenly, the fire alarm blares! Red lights flash and sirens wail in your ears. Chaos reigns in the gym. The chaperones clap their hands and try to form lines leading toward the exits. You feel a breeze behind you and turn to see Kyle beckoning from the open window.\n\n*if(aj_present)\n\t\"About time!\" A.J.'s gleeful voice raises over the blaring alarm. \"Let's blow this Popsicle stand!\" ${Hhe} scrambles up onto the sill and out the window. \n\n*if(admirer = \"Corley\")\n\tCorley looks at you with alarm. \"You're not going to leave me, are you?\"\n*if(admirer = \"Shashi\")\n\tShashi shakes her head, smiling. \"Go on, if you want. Sounds fun.\"\n*if(admirer = \"Evan\")\n\tEvan makes a face. \"You're not going to go with those jerks, are you?\"\n*if(admirer = \"Finnegan\")\n\tFinnegan rolls his eyes. \"What a bunch of hooligans. You aren't seriously thinking of going.\"\n*if(admirer = \"Vitessa\")\n\t\"This is what I get for my poor choice in dance dates,\" Vitessa sighs, but she is smiling. \"Go ahead. What do I care?\"\n*comment endif\n\n*label whip_cliffhanger2\nKyle holds his hand out to give you a boost up. \n\n\"Remain calm! It's a false alarm!\" the principal's voice booms over the din. \"Nobody may leave! There is no fire, but there has been a theft! The trophy case has been vandalized! Someone has stolen the Miss Cooperation tiara!\"\n\n*choice\n\t#Stay and investigate the mystery.\n\t\tNodding, you roll up your sleeves. There's work to be done.\n\t\t\n\t\t*goto an_ending\n\t#Go with the Whips.\n\t\tYou grip Kyle's hand and pull yourself up through the window. The cool breeze on your face is refreshing. You grin. The night is young, and there's mischief to be made.\n\n\t\t*goto an_ending\n\t\t\n*label an_ending\n*if(lie_count \u003c 1)\n\t*achieve nolies\n*if(blackmail_attempts \u003c 1)\n\t*achieve noblackmail\n*page_break End\nWe hope you've enjoyed playing [i]Sixth Grade Detective.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n*label number_of_dates_text\n*temp number_of_dates_text \"two\"\n*if number_of_dates = 1\n\t*set number_of_dates_text \"one\"\n*if number_of_dates = 3\n\t*set number_of_dates_text \"three\"\n*if number_of_dates = 4\n\t*set number_of_dates_text \"four\"\n*if number_of_dates = 5\n\t*set number_of_dates_text \"five\"\n*if number_of_dates = 6\n\t*set number_of_dates_text \"six\"\n*return\n\n*label debug\n\n${number_of_dates}\n\nAdmirer: ${admirer}\n\n*if datingS\n\tDating Shashi.\n*if datingA\n\tDating AJ.\n*if datingE\n\tDating Evan.\n*if aj_present\n\tAJ is present.\n*if evan_present\n\tEvan is present.\n*if shashi_present\n\tShashi is present.\n*if corley_present\n\tCorley is present.\n*if finnegan_present\n\tFinnegan is present.\n*if vitessa_present\n\tVitessa is present.\n*return\n\n", "choicescript_description": "Round up the usual suspects—the mean girl, the new kid, the bully, the nerd, maybe even your best friend! As the sixth grade detective, you'll spy on classmates for cash—will you keep their secrets or take the money?\n\n\"Sixth Grade Detective\" is a 109,000-word interactive young-adult novel by Logan Hughes, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nMatch wits with the criminal masterminds of middle school! Solve mysterious disappearances and thefts, trace rumors, track down your best friend's stolen bike, and most importantly—get a date to the dance.\n\nForge friendships, chase down thieves, or stick to your guns against bullies? Unmask them in public, or work behind the scenes to help a new friend? Will you protect the reputation of your clients, destroying evidence, or go so far as to hack your friend's cell phone to uncover his embarrassing secret?\n\n• Investigate six mini-mysteries.\n[n/]• Search for clues, question suspects, crack codes, dust for fingerprints, interview witnesses, and uncover your classmates' deepest secrets.\n[n/]• Reveal the truth, or keep silent for the greater good… or greater profit.\n[n/]• Shine in the classroom or cut school with the rebels.\n[n/]• Lie to the adults--if you can get away with it\n[n/]• Build friendships, create enemies, and find a date for the big dance.\n[n/]• Play as a girl, boy, or neither. Date classmates of any gender, or avoid romance altogether.\n[n/]• Find out who your secret admirer is\n", "choicescript_stats": "[b]Top Secret Notebook[/b]\n*if(name != \"confidential\")\n\t[b]of ${Name}, ${Ddetectivetype} Detective[/b]\n*line_break\nHere is where I keep track of the clues for my current case and other important information.\n\n*if(bikeYouWant != \"none\")\n\t[b]Goals:[/b]\n\t\n\tYou want the ${bikeYouWant} bike at Hank's Garage. It costs $${bikeCost}. \n\t*set Money *100\n\t*set Money round(Money)\n\t*set Money /100\n\t\n\t*if yourBike = \"\"\n\t\t*temp toGo (bikeCost - Money)\n\t\t*set toGo *100\n\t\t*set toGo round(toGo)\n\t\t*set toGo /100\n\t\tYou have $${toGo} to go!\n\t*if yourBike != \"\"\n\t\tYou have enough!\n*comment endif\n\n*if((newspaper_job != \"none\") and (newspaper_job != \"\")) or (you_are_a_whip)\n\t[b]Affiliations:[/b]\n\n\t*if(newspaper_job = \"crime\")\n\t\tYou write the crime beat for Finnegan's class newspaper.\n\t\t\n\t*if(newspaper_job = \"exposé\")\n\t\tYou write searing exposés for Finnegan's class newspaper.\n\t\t\n\t*if(newspaper_job = \"advice\")\n\t\tYou write the advice column for Finnegan's class newspaper.\n\t\t\n\t*if(newspaper_job = \"ads\")\n\t\tYou sell advertising for Finnegan's class newspaper.\t\n\n\t*if(you_are_a_whip)\n\t\tYou are a member of the Whips. \n*comment endif\n\n*if((hank_alias != \"\") or (police_alias != \"\")) or (you_tell_corvis_youre_shashi = true)\n\t[b]Aliases:[/b]\n\n\t*if(hank_alias != \"\")\n\t\tYou told Hank your name is ${hank_alias}.\n\n\t*if(police_alias != \"\")\n\t\tYou told the police your name is ${police_alias}.\n\t\t\n\t*if(you_tell_corvis_youre_shashi)\n\t\tYou let the school librarian, Mr. Corvis, think that you're Shashi.\n*comment endif\n\n*gosub clue_notebook\n\n[b]Stats:[/b]\n*gosub statchart\n*gosub reputation_feedback\n\n[b]Inventory:[/b]\n*gosub your_inventory\n\n*finish\n\n*label clue_notebook\n*if(ch6started = true)\n\t[b]Clues for[/b]\n\t*goto ch6clues\n*elseif(ch5started = true)\n\t[b]Clues for[/b]\n\t*goto ch5clues\n*elseif(ch4started = true)\n\t[b]Clues for[/b]\n\t*goto ch4clues\t\t\n*elseif(ch3started = true)\n\t[b]Clues for[/b]\n\t*goto ch3clues\n*elseif(ch2started = true)\n\t[b]Clues for[/b]\n\t*goto ch2clues\n*elseif(ch1started = true)\n\t[b]Clues for[/b]\n\t*goto ch1clues\n\n*return\n\n*label ch1clues\n[b]The Case of the Missing Bike:[/b]\n\nYou've been keeping an eye out for A.J.'s amazing red bike, Red Lightning, which was stolen last week. A.J. has been reluctantly riding its horrible replacement, the Great Brown Ugly. A.J. hates the Great Brown Ugly, but Mrs. Carver, A.J.'s mother, loves it and won't hear a word against it. \n\n*if(seen_gbu)\n\tThis afternoon, you watched A.J. ride away from school on the Great Brown Ugly. A few hours later, you saw the Great Brown Ugly in the lot behind Hank's Garage! \n\n*if(seen_receipt)\n\tA copy of a receipt at Hank's shows that Hank bought a bike matching the Great Brown Ugly's description from someone with illegible handwriting and the initials D.S. This happened today around 4:22 P.M., while you were at the library.\n\n*if(know_description_gbu_seller)\n\tHank says he bought the Great Brown Ugly from a man in his early 20s with blond hair and a small, pointed beard.\n\t\n*if(deal_with_hank)\n\tYou made a deal with Hank that he would give you the Great Brown Ugly if you could prove that it belonged to your friend.\n\t\n*if(mrs_carver_hired_you)\n\tMrs. Carver hired you to find out what happened to the bike.\n\t*if(bike_pay_rate > 0)\n\t\tShe will pay you ${bike_pay_rate} on completion.\n\n*if(met_darren)\n\tA.J.'s uncle Darren, a 21-year-old blond man with a pointed beard, has come to visit unexpectedly. At least, the visit was unexpected to Mrs. Carver. A.J. seemed to have advance notice of the visit and prepared by buying Darren's favorite beer.\n\n*if(seen_darrens_stuff)\n\tDarren claims he came to the Carvers' right from the bus station, but his bus ticket shows that he arrived in town around 3, several hours ago. Piecing together the ticket stubs and receipts, you come up with the following sequence of events: \n\t\n\t12:25 PM: Darren departed from Greenfield at 12:25 via Alpha Bus Lines \n\t*line_break\n\t2:55: Darren arrived here in Camden\n\t*line_break\n\t3:05: Darren bought gum at Wall Drug\n\t*line_break\n\t????\n\t*line_break\n\t4:45: Darren went to a movie at the Pavilion Theater\n\t*line_break\n\t6:45: Darren arrived at the Carvers'\n\n*if(seen_darrens_receipt)\n\tDarren spit his gum into a receipt, and you fished it out of the trash. It appears to be a copy of a receipt from Hank's Garage. It shows that the person who holds the receipt sold something to Hank's Garage today at 4:22 PM.\n\n*return\n\t\n*label ch2clues\n[b]The Disappearing Tome:[/b]\n\n*if(book_stolen)\n\tShashi's gaming manual, [i]The Swordmaster's Sourcebook[/i], was taken from her backpack in the coat room. Shashi would like you to find it.\n\t*if(tomes_pay_rate > 0)\n\t\tShe's paying $${tomes_pay_rate}.\n\tShashi had band practice that morning and it ran a little long, so she was the last one left in the coat closet that morning. She figures that narrows down the suspects to everyone who was late: you, A.J., and Evan (who were all just late), Finnegan (who had Color Guard), Corley (the new girl, who had to check in at the office), and Vitessa (who took Corley to the office).\n\n*if(evan_tomes_already_has)\n\tEvan already owns the Swords and Sorcerers books. \n\t\n*if(finnegan_tomes_too_busy)\n\tFinnegan is too busy to play Swords and Sorcerers.\n\n*if(vitessa_tomes_disdainful)\n\tVitessa thinks Swords and Sorcerers is dumb.\n\t\n*if(corley_tomes_copies_vitessa)\n\tCorley agrees with everything Vitessa says.\n\t\nA.J. was with you all morning, and you didn't take the book.\n\t\n*if(seen_jacket)\n\tWhen you searched the coat room after school the day of the theft, it was mostly empty, except for a yellow jacket, which you'd never seen before (except earlier this morning in the same coat room).\n\t*if(know_corleys_jacket)\n\t\tThe jacket has a tag in it identifying it as Corley's.\n\t\t\n\tThe coat room contains a radiator and a window overlooking a mud puddle.\n\n*if(got_book)\n\tYou found the book! Actually, the school librarian, Mr. Corvis, found it. Someone threw it down the school library's book return chute yesterday morning. Unfortunately, the book is waterlogged, covered in caked-on mud, and completely ruined.\n\t\n*if(shashi_got_book)\n\tSomeone anonymously gifted Shashi with a brand-new copy of the book! It can't be hers, because hers was destroyed. So now you are looking for a thief and a gift giver (maybe the same person). \n\t\n*if(you_talked_to_vitessa)\n\tCorley and Vitessa are willing to vouch for each other's movements this morning. Vitessa found Corley shivering outside without a coat and took her under her wing. \n\t\t\t\n*return\n\n*label ch3clues\n[b]The Secret of the Smartphone:[/b]\n\nFinnegan has started a newspaper. \n*if(newspaper_job = \"none\")\n\tHe invited you to work for him, but you declined.\n*if(newspaper_job = \"ads\")\n\tYou volunteered to go around to local businesses and ask them to buy ad space in the paper.\n*if(newspaper_job = \"crime\")\n\tYou volunteered to report on crime around the school.\n*if(newspaper_job = \"exposé\")\n\tYou volunteered to dig up secrets and write articles bringing those secrets to light. \n*if(newspaper_job = \"advice\")\n\tYou volunteered to write an advice column.\n\n*if(noticed_evans_slacking)\n\tEvan is supposed to be the sportswriter for the newspaper, but he has been blowing off meetings, failing to meet deadlines, and giving vague, mysterious excuses. \n*if(thief_theory)\n\tFinnegan has also noticed that Evan seems to have an awful lot of money. His family isn't especially rich. Finnegan wonders if Evan could be the school thief. He wants you to find out.\n\n*if(got_phone)\n\tFinnegan found Evan's phone and gave it to you to search for clues.\n\t\n\t*if(returned_phone = true)\n\t\tYou returned the phone to Evan right away. \n\t\t\n\t\t*if(got_address_from = \"web\")\n\t\t\tYou caught Evan working on a partially finished website called \"Miracles by Raven.\" There's an address and phone number.\n\t\t\t\t\n\t*if(phone_unlocked = false)\n\t\tIt's passcode-protected. \n\t\t*if(seen_phonescreen)\n\t\t\tThe passcode is a five-digit password made up of numbers.\n\t\t*if(tried_numbers != \"\")\n\t\t\tYou have tried the following numbers${tried_numbers} \n\n\t\t*if(know_andrew = false) and (know_raven = false)\n\t\t\tMaybe if you find out more about Evan, you'll be able to guess his password.\n\t\t*if(know_andrew) or (know_raven)\n\t\t\tYou've found out a little about Evan that may or may not be useful.\n\t\t\t*if(seen_evans_makeup)\n\t\t\t\tHe carries around a lot of lipstick.\t\t\n\t\t\t*if(know_andrew_brother) and (know_raven_poem)\n\t\t\t\tHe has a brother, Andrew, in college. Evan plays basketball, his favorite color is green, and his favorite poem is \"The Raven,\" by Edgar Allen Poe.\n\t\t\t*if(know_andrew_brother = false) and (know_raven_poem)\n\t\t\t\tHe has a copy of \"The Raven,\" by Edgar Allen Poe, inscribed by someone named Andrew.\t\n\t\t\t*if(know_raven_ss)\n\t\t\t\tIn Shashi's Swords & Sourcerors game, Evan plays a level-six healer named Raven. He knows Healing Whisper, Scent of the Spirits, and Windwalker. He is a deposed prince who was shunned from his people for having a raven-shaped birthmark, an evil omen.\n\t*if(phone_unlocked)\n\t\tYou were able to crack the code and get into the phone.\n\t\t\n\t\t*if(checked_email)\n\t\t\tIn Evan's e-mail, you saw a lot of messages from women trying to make \"appointments.\"\n\t\t*if(checked_outbox)\n\t\t\tIn the outbox, you found a message from Evan signed \"Raven.\" His signature included an address and phone number.\n\t\t*if(checked_calendar)\n\t\t\tIn the calendar, you found Evan's time blocked off in half-hour increments, each marked with a woman's name. \n\t\t*if(checked_web)\n\t\t\tEvan's web browser defaulted to a half-finished website called \"Miracles by Raven\" with an address and phone number.\n\t\n\t*if(made_appointment)\n\t\tYou called the number. It is the number of Wall Drug. You made an appointment with Raven after school.\n\n\t*if(heard_eavesdropconversation)\n\t\tAt the drugstore, you overheard some ladies raving about Raven, the resident makeup artist. He'll be there at 3PM the next day.\n\t\t\n*return\n\n*label ch4clues\n[b]The Book of Secrets:[/b]\n\n*if(know_whips_mocking_corley)\n\tCorley was upset. The bad kids who call themselves the Whips—Kyle, Adam, Max, and Rina—had been making fun of her for very personal reasons.\n*if(know_corleys_secret)\n\t(She wet the bed during an overnight at her old school.) \n*if(know_whips_mocking_evan)\n\tThe Whips were making fun of Evan, too. Somehow, they found out about his makeover business.\n*if(suspected_secret != \"\")\n\tKyle said he even knows a secret about you! He says they all know about your ${suspected_secret}. \n\t*if(suspected_secret_veracity = \"true\")\n\t\tHow could he have found out? \n\n*if(corley_hires_you)\n\tCorley asked you to find out how the Whips are getting their information.\n\n*if(book_investigation_direction = \"infiltrate\")\n\tTo learn more, you decided to go undercover and become one of the Whips!  \n\t*if(agreed_to_steal)\n\t\tTo prove yourself to the Whips, you promised to steal ${steal_object} from ${steal_owner}.\n\t\t*if(acquisition_method = \"borrowed\")\n\t\t\tInstead, you simply borrowed it. Ask, and you will receive, especially if you're asking a good friend.\n\t\t*if(acquisition_method = \"bought\")\n\t\t\tInstead, you bought it fair and square. \n\t\t*if(acquisition_method = \"stole\")\n\t\t\tYou did so. \n\t*if(you_are_a_whip)\n\t\tThanks to your nerve and charm, you successfully joined the Whips!\n\n*if(book_investigation_direction = \"tail\")\n\tTo learn more, you decided to tail the Whips to their hideout and spy on them! \t\n\n*if(seen_vitessas_book)\n\tYou learned that the Whips have a secret notebook, titled [i]The Book of Secrets,[/i] which contains mean gossip about you and all your classmates.\n\n*if(have_vitessas_book)\n\tYou got [i]The Book of Secrets[/i]! \n\t*if(know_book_is_vitessas = false)\n\t\tNow you have to inspect it for clues to find out who wrote it. \t\n\t*if(know_book_is_vitessas)\n\t\tWhile inspecting the book—which was full of more mean gossip than you could have imagined—it became clear beyond a shadow of a doubt that it was originally written by Vitessa. \n\t\t\n\t\tYou could piece together what happened pretty well now. Vitessa had been writing mean observations about class members. Adam stole Vitessa's notebook to prove himself to the Whips.  When the Whips discovered what was in the notebook, they used the information to embarrass other kids, including Corley.\n\t\t\n\t\tThe question is, what are you going to do about it? Vitessa was the victim of a theft. You should return her property…right? But she was using the notebook purely for evil, so does she deserve to have it? Besides, Corley hired you, not Vitessa. Shouldn't your allegiance be to her? \n\n*return\n\n*label ch5clues\n[b]The Return of the Bike:[/b]\n\n*if(solved_minigame = false)\n\tYou followed clues to find your birthday gift.\n\t*if(got_clue_one) and (got_clue_two = false)\n\t\tThe first clue read:\n\n\t\t[i]One, twelve, twenty-four,[/i]\n\t\t*line_break\n\t\t[i]Sing and open up the door.[/i]\n\t\t*line_break\n\t\t[i]To find your next birthday clue,[/i]\n\t\t*line_break\n\t\t[i]Find the bird who says…oh, well, you know! [/i]\n\t*if(got_clue_two) and (got_clue_three = false)\n\t\tYou got the second clue. It read:\n\t\n\t\t[i]You found the clue upon the hour.[/i]\n\t\t*line_break\n\t\t[i]You're clearly a detective of some power.[/i]\n\t\t*line_break\n\t\t[i]Your birthday should be sweet, not sour.[/i]\n\t\t*line_break\n\t\t[i]To make your cake, you need…[/i]\n\t*if(got_clue_three)\n\t\tYou got the third clue. It read:\n\t\n\t\t[i]The more you grow, the further you roam,[/i]\n\t\t*line_break\n\t\t[i]Traveling near and far from home.[/i]\n\t\t*line_break\n\t\t[i]I promise this gift is not a mirage.[/i]\n\t\t*line_break\n\t\t[i]To find it, go to the…[/i]\n*if(solved_minigame)\n\tThrough a series of clues, your parents led you to your birthday gift: a purple bike!\n*if(know_ajs_bike)\n\tUpon inspection, you discovered that your new bike is actually none other than A.J.'s stolen bike—Red Lightning—with a purple coat of paint.\n*if(giveplan)\n\tYou decided to give the bike back to A.J. \n*if(keepplan)\n\tYou decided to try to keep the bike. However, A.J. would probably recognize it. Your only hope is to disguise it. \n\t*if(disguise_rating > 3)\n\t\tYou disguised it effectively using tools from the hardware store.\n\t*if(disguise_rating >= 2) and (disguise_rating \u003c= 3)\n\t\tYou disguised it adequately using tools from the hardware store.\n\t*if(disguise_rating \u003c 2)\n\t\tYou made an effort to disguise it using tools from the hardware store. The disguise is…okay.\n*if(returned_bike)\n\tYou returned the bike to Hank; he refunded your mom's credit card.\n*if(tookcash)\n\tYou returned the bike to Hank in exchange for cold, hard cash.\n*if(exchanged_bike)\n\tYou returned the bike to Hank in exchange for the ${yourBike} bike.\n*if(bkmail_scenario != \"\")\n\tYou ran into the Whips in the woods. Kyle attempted to blackmail you, telling you that he knows your secret: You ${bkmail_scenario} A.J.'s bike!\n\t*if(giveplan)\n\t\tYou tried to tell him that you were planning on returning the bike to A.J. all along, but he didn't believe you.\n\t*if(blackmail_attempts > 1)\n\t\tThis had to be some kind of karmic payback for all the times you've tried to blackmail people.\n\t*if(you_paid_up)\n\t\tYou paid up, so you shouldn't have to worry about Kyle blabbing to A.J. Then again, Kyle is not very trustworthy.\n\t*if(aj_sided_with != \"\")\n\t\tKyle told A.J.\n\t*if(aj_sided_with = \"you\")\n\t\tLuckily, A.J. sided with you. Well, it's not totally luck—you guys have a good relationship!\n\t*if(aj_sided_with = \"Kyle\")\n\t\tUnfortunately, A.J. didn't believe your side of the story. ${He} sided with Kyle!\n\t*if(aj_sided_with = \"undetermined\")\n\t\tA.J. didn't know who to believe. ${He} needed time to think.\n*if(solved_rl)\n\tIn a bittersweet twist, you finally solved A.J.'s original case: You discovered what happened to Red Lightning. But it's not the answer you expected or wanted. It turned out A.J.'s mom was the original thief of Red Lightning! She felt terrible about it, but she sold it because she needed the money to pay the bills. She let A.J. believe it was stolen so that ${he} wouldn't be mad. \n\t*if(aj_knows = false)\n\t\tNow you just have to decide: Will you tell A.J.?\n\t*if(aj_knows)\n\t\tA.J. knows, and ${he} is mad. You hope ${he} and ${his} mom will work it out. \n*return\n\n*label ch6clues\n[b]The Last Dance:[/b]\n\nIt's time for the big dance!\n*if(seen_note)\n\tYou received a note from a secret admirer. \n\t*if(know_admirer = false)\n\t\tNow you just have to figure out who it's from!\n\t\t\n*if(asked != \"\")\n\tYou asked ${asked} to the dance. \n\t*if(asked = admirer)\n\t\tIs ${asked} the admirer? You couldn't get a straight answer….\n\t*if(asked != admirer)\n\t\t$!{asked} claimed not to be the admirer.\n*return\n\n*label statchart\n*temp greed_title \"Greed\"\n*temp charity_title \"Charity\"\n*if(Greed > 70)\n\t*set greed_title \"Rational Self-Interest\"\n\t*set charity_title \"Being a Sucker\"\n\n*set Money *100\n*set Money round(Money)\n*set Money /100\n*stat_chart\n\ttext Money\n\topposed_pair Secrecy\n\t\tSecrecy\n\t\tOpenness\n\topposed_pair Greed\n\t\tCorruption\n\t\tFairness\n\topposed_pair Respect\n\t\tRespect\n\t\tRebelliousness\n\tpercent relA Relationship with A.J.\n\tpercent relC Relationship with Corley\n\tpercent relS Relationship with Shashi\n\tpercent relE Relationship with Evan\n\tpercent relF Relationship with Finnegan\n\tpercent relV Relationship with Vitessa\n*return\n\n*label reputation_feedback\n\n*if(lie_count = 0)\n\tYou're scrupulously honest! You've told no lies.\n*if(lie_count = 1)\n\tYou've told 1 lie.\n*if(lie_count > 1)\n\tYou've told ${lie_count} lies.\n\n*if(blackmail_attempts > 0)\n\tYou're a sneaky wheeler-dealer! You've made ${blackmail_attempts} blackmail attempts.\n\n*return\n\n*label your_inventory\n*line_break\nYour detective notebook\n*line_break\nA pencil\n*if(haveCompact)\n\t*line_break\n\tA powder compact\n*if(haveCodebook)\n\t*line_break\n\tA book of codes and ciphers\n*if(haveFloss)\n\t*line_break\n\tA roll of dental floss\n*if(haveJacket)\n\t*line_break\n\tA black leather biker jacket\n*if(haveBinoculars)\n\t*line_break\n\tA pair of powerful binoculars\n*if(who_has_gbu = \"you\")\n\t*line_break\n\tThe Great Brown Ugly\n*if(yourBike != \"\")\n\t*line_break\n\tA ${yourBike} bike\n*return\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2024-02-22 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Name \"Addie\"\n*set Ddetectivetype \"Girl\"\n*set bikeYouWant \"none\"\n*set lie_count 0\n*set Money 2.17\n*set Secrecy 45\n*set Greed 36\n*set Respect 54\n*set relA 81\n*set relC 40\n*set relS 60\n*set relE 60\n*set relF 30\n*set relV 10\n\nYou scurry over to the tarp-covered bike rack, your heart pounding in your chest. For just a moment, your hand clasps the edge of the blue tarp. \n\nSuddenly, a voice rings out behind you. \"Hey, kid! What are you doing? Get out of there!\"\n\nA burly man in a jumpsuit is charging toward you. \n\n*fake_choice\n\t#Run!\n\t#\"What are you doing with my friend's bike, old man?!\"\n\t#\"Please don't yell at me, sir. I'm just a poor, lost little child.\"\n\n*script changeBackgroundColor(\"black\")\n\n*set bikeYouWant \"red\"\n*set bikeCost 200\n*set lie_count 1\n*set Money 22.17\n*set Secrecy 36\n*set Greed 48\n*set Respect 62\n*set relA 68\n*set relC 47\n*set relS 73\n*set relE 44\n*set relF 31\n*set relV 9\n\n\"Well?\" Shashi demands. \"You promised you'd have results by the end of the study period. So did you do it? Did you figure out the thief?\"\n\n\"Yes,\" you say. \"The thief is…\"\n\n*fake_choice\n\t#\"My best friend, A.J.\"\n\t#\"The shy new girl, Corley.\"\n\t#\"The cute boy, Evan.\"\n\t#\"The class president, Finnegan.\"\n\t#\"My nemesis, Vitessa.\"\n\t#\"The school librarian, Mr. Corvis.\"\n\t#\"The teacher, Mrs. Greeley.\"\n\t#\"You. Twist! You stole from yourself!\"\n\t#\"It was me. I did it! I confess!\"\n\n*script changeBackgroundColor(\"sepia\")\n\n*set newspaper_job \"crime\"\n*set Money 72.17\n*set Secrecy 22\n*set Greed 46\n*set Respect 68\n*set relA 77\n*set relC 56\n*set relS 80\n*set relE 54\n*set relF 44\n*set relV 9\n\nThe phone brightens to life! The screen looks like this:\n\nPASSWORD?\n*line_break\n_ _ _ _ _\n\n123\n*line_break\n456\n*line_break\n789\n*line_break\n0 \n\nYou need to enter a five-digit password made up of numbers. \n\n*fake_choice\n\t#11111\n\t#12345\n\t#54321\n\t#90210\n\t#24601\n\t#00451\n\t#Snoop in Evan's stuff for some clue to the password. \n\t#Dust the phone screen for fingerprints using your powder compact.\n\n*set lie_count 2\n*set Money 122.17\n*set Secrecy 58\n*set Greed 40\n*set Respect 72\n*set relA 83\n*set relC 71\n*set relS 84\n*set relE 39\n*set relF 54\n*set relV 9\n\nIt's t
