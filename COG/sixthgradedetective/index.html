\t\t\"Well…okay.\" Corley looks from side to side. \"You can't tell anyone….\"\n\n\t\t\tYou lean forward. \"Yes?\"\n\n\t\t\t\"I kind of, um, had some problems at my old school. I used to get made fun of a lot. Once I…\" She pauses for a long time.\n\t\t\t\n\t\t\t\"What?\" you ask finally.\n\t\t\t\n\t\t\t\"There was this contest at school. Read ten books in a month. I was one of the winners.\" Corley speaks very quickly, forcing the words out before she has a chance to change her mind. She's blushing. \"The prize was a party. A sleepover at school. They called it a lock-in. We stayed up late and played games. They ordered a bunch of pizzas, and we got to drink as much soda as we wanted! It was fun until…the accident.\"\n\n\t\t\t\"What did you do, wet the bed?\" you ask.\n\n\t\t\tCorley looks at you sharply. \"How did you know?\"\n\n\t\t\t\"I'm good at guessing,\" you explain. \"Detective and all.\"\n\n\t\t\t\"Right.\" Corley stares down at her hands. \"Before the Whips found out, it was so peaceful here! The kids at my old school were relentless. Every day, someone was shouting at me, 'Hey, bed-wetter!' 'Kindergarten baby!' Oh, gosh, it all sounds silly when I say it out loud. \n\t\t\t*temp corley_told_you true\n\t\t\t*goto after_corley_talk\n\t\t*else\n\t\t\tCorley shakes her head. \"Nothing. \n\t\t\t*goto after_corley_talk\n\t#\"Forget those guys. They're creeps.\"\n\t\t*set relC %+20\n\t\tCorley nods. \"You're right.\n\t\t*goto after_corley_talk\n\t#\"You want me to go ask them?\"\n\t\t*set Respect %-10\n\t\t*set relC %+10\n\t\t\"Oh, no!\" says Corley. \"I'd never make you talk to those jerks.\"\n\n\t\t\"It's really no trouble,\" you say.\n\n\t\t\"No. It's okay. \n\t\t*goto after_corley_talk\n\t#\"If you hire me, I'll find out where they're getting their information.\"\n\t\t*set Greed %+10\n\t\tCorley shakes her head. \"It doesn't matter, I guess…. It was just one time. \n\t\t*goto after_corley_talk\n\n*label after_corley_talk\nI'm probably making too much of this. I just need to have a thicker skin. That's what Shashi would say.\" She gives you a small smile, sniffles, and stands. \"Thanks for listening. I'm okay now, really.\" \n\nAfter she walks away, you stand there for a long moment, thinking. The Whips are up to no good once again!\n\n*label corley_doesnt_tell_you\n*page_break\nYou catch up with Corley again at the bus stop. She stands by the sign, hands on her backpack straps, peering down the street anxiously for the bus. Her eyes are still red, but she's stopped crying. \n\n*goto at_the_bus_stop\n\n*label at_the_bus_stop\n*set know_whips_mocking_evan true\nSuddenly, you hear cackling laughter from the hill behind the school. It's the hill where the Whips hang out. Evan comes walking very quickly down the path. His face is so red that it takes you a moment to realize there is something written on his forehead in red letters. \"Loser,\" it says. It's written in lipstick. \n\nThe Whips come sauntering down after him, laughing. Kyle, the leader, walks in front, wearing a biker jacket a lot like A.J.'s. Max lurks behind him in a long black coat. Rina, wearing a fuzzy leopard-print jacket that you happen to know she stole from a coat check, is tipping back Pixy Stix. Their newest recruit, Adam, was normal until five days ago, but now he is wearing shredded jeans with a bandanna tied around the knee. He is flipping a coin.\n\nThe Whips rule the school, and it's risky to get on their bad side. Still, it's clear they're bothering Evan. You know Evan wouldn't want you to make a big fuss. He looks like he just wants this whole situation to go away.\n\n*choice\n\t#\"Oh my goodness, you guys are the worst! Did you do this to poor defenseless Evan? I'm going to tell the principal on you!\"\n\t\t*set Respect %+30\n\t\t*set relE %-10\n\t\t*set relC %+20\n\t\tCorley nods at you encouragingly.\n\t\t\n\t\t\"Run to the principal if you want, goody-two-shoes. You can't prove anything,\" says Adam. \n\t\t\n\t\t\"That's right,\" says Kyle sweetly. \"I couldn't have done anything. Why, I've been in detention this whole time.\" \n\t\t\n\t\tEvan turns redder than before. \"Aw, just go away, ${Name}. This doesn't involve you.\"\n\t\t\n\t\t\"I'm just trying to help,\" you say. \"How did this happen?\"\n\t\t\n\t\tEvan shakes his head. \n\t\t*goto evan_explains\n\n\t#\"Ha ha, wow, Whips, you really got Evan good. How did you hold him down while you wrote on him with lipstick?\"\n\t\t*set Respect %-20\n\t\t*set relE %-30\n\t\t*set relC %-20\n\t\tCorley glares at you.\n\t\t\n\t\t\"He was asleep,\" Max admits.\n\t\t\n\t\tAdam nudges him. \"Don't reveal our secrets!\"\n\t\t\n\t\tEvan turns even redder than before and roughly wipes the lipstick from his forehead.\n\t\t*goto evan_explains\n\t#\"Oh, no! Evan, are you okay? Let me help you.\"\n\t\t*set Respect %+20\n\n\t\t*set relE %+10\n\t\t*set relC %+10\n\t\tYou and Corley step forward sympathetically and hover around Evan. You lick your finger and reach out to clean Evan's forehead, but he pushes you away. \"I'm fine,\" he mutters gruffly, rubbing a fist over the lipstick letters.\t\t\n\t\t*goto evan_explains\n\n\t#Nod at Evan, acting as if nothing is out of the ordinary.\n\t\t*set relE %+30\n\t\t*set relC %-10\n\t\t*set Secrecy %+20\n\t\tEvan shoots you a grateful look, relieved that you aren't making a big deal of this. You are glad that you and he understand each other. \n\n\t\tCorley looks back and forth between you, surprised and dismayed. She must have expected you to stand up for him.\n\n\t\t*goto whips_torment_corley\n\n*label evan_explains \n*if(evan_ostracized)\n\t\"Just another day in the life.\" \n\t\n\tYou wince. You still feel bad about making Evan reveal his makeup secret before he was ready.\n\t\n\t*goto whips_torment_corley\n*elseif(evan_secret_out)\n\t\"I knew there would be trouble.\"\n\n\t*goto whips_torment_corley\n*else\n\t\"Somehow, the Whips found out that I do makeovers! Someone must have told them!\"\n\t\n\t*goto whips_torment_corley\n\n*label whips_torment_corley\n\"Hello again, Sunshine!\" Kyle grins at Corley.\n\nCorley visibly stiffens. She stares straight ahead. \"I don't want to talk to you. Please go away.\"\n\n\"Hey, hey. Don't get your rubber panties in a twist,\" jokes Adam.\n\nCorley's face is bright red. \"I do not wear rubber panties!\" \n\n\"Really? Maybe you should,\" says Rina. \"It sounds like it would be a practical move for you.\" \n\n\"Bed-wetter!\" hoots Max to bring it home. \n\n*fake_choice\n\t#\"Hey, back off, you bullies! What did Corley ever do to you?\"\n\t\t*set relC %+30\n\t\t*set relE %+10\n\t\t*set Respect %+20\n\t\t*set Greed %-20\n\t\t\"Easy there, ${Name},\" says Kyle. \"We could tell stories about you, you know. We know all about your\n\t*if(corley_told_you = false)\n\t\t#\"Lighten up, Corley. It's just a joke. Everyone wets the bed when they're a baby.\"\n\t\t\t*set relC %-40\n\t\t\t*set relE %-10\n\t\t\t*set Respect %-20\n\t\t\t\"Baby!\" says Adam. \"Try last year.\"\n\t\t\t\n\t\t\t\"Aww, Pwecious was just so excited to be at the school sleepover!\" Rina squeals in a baby voice. \"Tell me, was that the first time you'd ever been away from your mommy and daddy for the whole, whole night?\"\n\t\t\t\t\t\t\n\t\t\tCorley turns away, biting her lip.\n\t\t\t\n\t\t\t\"How do you know all this?\" you ask.\n\t\t\t\n\t\t\t\"We know everything about everyone,\" says Kyle. \"We even know about your \n\t\t#\"Huh? Corley, did you wet the bed?\"\n\t\t\t*set relC %-20\n\t\t\t*set relE %-10\n\t\t\t*set Secrecy %-30\n\t\t\t\"Brilliant, Holmes!\" says Max.\n\t\t\t\n\t\t\t\"Is this true?\" you ask Corley.\n\t\t\t\n\t\t\t\"No!\" says Corley. \"Not…recently.\" \n\t\t\t\n\t\t\t\"Oh, please,\" says Rina. \"You make it sound like you were five. It was last year. The school sleepover. So I hear, anyway.\" \n\t\t\t\n\t\t\t\"How did you hear that?\" you ask.\n\t\t\t\t\t\t\n\t\t\t\"We hear everything,\" says Kyle. \"We even know about your\n\t*if(corley_told_you)\n\t\t#\"Lighten up, Corley. It's really kind of a funny story, if you think about it.\"\n\t\t\t*set relC %-40\n\t\t\t*set relE %-10\n\t\t\t*set Respect %-20\n\t\t\t\n\t\t\tCorley shoots you a look of betrayal.\n\t\t\t\n\t\t\t\"You know the story, too?\" Max grins. \"Word gets out, huh?\"\n\t\t\t\n\t\t\t\"How do you guys know it?\" you wonder.\n\t\t\t\n\t\t\t\"We know everything about everyone,\" says Kyle. \"We even know about your\n\t\t#\"How did you guys know about the Lock-in Bed-wetting Incident?\"\n\t\t\t*set relC %-30\n\t\t\t*set relE %-10\n\t\t\t*set Secrecy %-30\n\t\t\t\"${Name}!\" Corley hisses.\n\n\t\t\tKyle laughs. \"We know everything. We even know about your \t\t\t\n*gosub your_secret\n\nLaughing, the Whips walk off. They head to the bike rack and unlock their big black bikes, the ones with flames down the sides.\n\n*fake_choice\n\t#\"Where are the Whips getting their information? They need to be silenced!\"\n\t\t*set Secrecy %+30\n\t\t\"I agree!\" says Corley.\n\t#\"The Whips can't get away with this! I'm going to tell the teacher.\"\n\t\t*set Respect %+20\n\t\t*set Secrecy %-20\n\t\t\"Don't!\" says Corley. \"Then you'd have to explain—you know—what the secrets were.\"\n\t\t\n\t\t\"Well, my secret's out,\" Evan sighs. \"I have an appointment this afternoon. I just hope they don't show up and bug me at work.\"\n\t\t\n\t\tYou wince. \"I'm really sorry, Evan.\"\n\t#\"The Whips are actually kind of good detectives. I almost admire their ability to learn secrets.\"\n\t\t*set Respect %-20\n\t\tCorley looks at you with wide eyes. \"I don't! They're awful!\"\n\t#\"I'm really sorry this happened to you, Corley. You are nothing but sweet, and you don't deserve it.\"\n\t\t*set relC %+20\n\t\tCorley smiles shakily at you. \"Thank you.\" \n\t*if(evan_ostracized = false)\n\t\t#\"Evan, I promise I didn't tell them anything about the makeover stuff!\"\n\t\t\t*set relE %+20\n*comment endif\t\n\n*if(evan_ostracized = false)\n\t*if(relE >= 60)\n\t\t\"They must be spying on us somehow,\" says Eva n\t\t\t\t*goto update_book_pay_rate\n\t\t\t*else\n\t\t\t\tEvan nods. \"Fair enough. If you prove they have another source of information, then I can trust you again.\"\n\n\t\t\t\t\"That's fine, but keep in mind, I'm also prepared to pay you,\" says Corley.\n\t\t\t\t\n\t\t\t\t*goto update_book_pay_rate\n\t\t\t\n\t#\"I'll do it to protect my privacy.\"\n\t\t*set Secrecy %+30\n\t\t*set Greed %+20\n\t\tCorley nods. \"They have dirt on everyone. You'll be doing everyone a favor if you shut down their flow of information.\"\n\n\t\t\"Okay, but I mostly care about me,\" you remind her.\n\n\t\t\"I know,\" she says. \"Believe me, I know. Don't worry—I'm also prepared to pay you.\"\n\n\t\t*goto update_book_pay_rate\n\n\t#\"I'll do it to protect everyone's privacy.\"\n\t\t*set Secrecy %+30\n\t\t*set Greed %-20\n\t\t\"They have dirt on everyone. You'll be doing everyone a favor if you shut down their flow of information,\" Corley agrees. \"I'm also prepared to pay you a little. Don't argue—I want it to be a real business transaction.\"\n\n\t\t*goto update_book_pay_rate\n\t#\"I'll do it if you pay me.\" \n\t\t*if(detectivePoints > 1)\n\t\t\t\"Well, since you're a proven mystery solver, I guess you command a high price,\" says Corley.\n\t\t\t*goto negotiate\n\t\t*else\n\t\t\t\"To be honest, I'm not willing to put up much. So far, it seems like you haven't solved a lot of mysteries,\" says Corley. \n\t\t\t*goto negotiate\n\n*label update_book_pay_rate\n*set book_pay_rate /2\n*set book_pay_rate *100\n*set book_pay_rate round(book_pay_rate)\n*set book_pay_rate /100\n*goto investigate_choice\n\t\t\t\n*label negotiate\n\"How does $${book_pay_rate}.00 sound?\" Corley suggests. \"Cash. I have the money.\"\n\nYou shake on it—quickly—before she changes her mind.\n\n*goto investigate_choice\n\n*label your_secret\n*if((datingA) and (datingE)) and (datingS)\n\tlittle love affairs with A.J., Shashi, and Evan. At the same time! You dog! You know, you really should tell them about each other. It would be a shame if they heard about it on the street.\"\n\t\n\tCorley glances at you sharply. \"Is that true? Shashi never told me….\"\t\n\t*set suspected_secret \"dating A.J., Shashi, and Evan\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\t\n*elseif(datingE) and (datingS)\n\tlittle love affairs with Shashi and Evan. At the same time! You dog! You know, you really should tell them about each other. It would be a shame if they heard about it on the street.\"\n\n\tCorley glances at you sharply. \"Is that true? Shashi never told me….\"\n\t*set suspected_secret \"dating Shashi and Evan\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\t\t\n*elseif(datingA) and (datingS)\n\tlittle love affairs with A.J. and Shashi. At the same time! You dog! You know, you really should tell them about each other. It would be a shame if they heard about it on the street.\"\n\n\tCorley glances at you sharply. \"Is that true? Shashi never told me….\"\t\n\t*set suspected_secret \"dating A.J. and Shashi\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\t\n*elseif(datingA) and (datingE)\n\tlittle love affairs with A.J. and Evan. At the same time! You dog! You know, you really should tell them about each other. It would be a shame if they heard about it on the street.\"\n\t*set suspected_secret \"dating A.J. and Evan\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\n*elseif(newspaper_job != \"ads\") and (Greed > 75)\n\tlittle scam skimming money off the top of the newspaper ads! Shame if Finnegan found out about that.\"\n\t*set suspected_secret \"newspaper scam\"\n\t*goto your_secret_choice\n*elseif(in_shashis_gaming_group)\n\tsecret hobby playing Swords and Sorcerers with the losers!\"\n\t*set suspected_secret \"swords and Sorcerers\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\t\n*elseif(datingS)\n\tlittle love affair with Shashi!\"\n\t\n\tCorley glances at you sharply. \"Is that true? Shashi never told me….\"\n\t*set suspected_secret \"dating Shashi\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\n*elseif(datingE)\n\tlittle love affair with Evan!\"\n\t*set suspected_secret \"dating Evan\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\n*elseif(datingA)\n\tlittle love affair with A.J.!\"\n\t*set suspected_secret \"dating A.J.\"\n\t*set suspected_secret_veracity \"true\"\n\t*goto your_secret_choice\t\n*elseif(relS > 75)\n\tlittle crush on Shashi!\"\n\t\n\tCorley glances at you sharply. \"Is that true?\" \n\t*set suspected_secret \"crush on Shashi\"\n\t*goto your_secret_choice\t\n*elseif(relE > 75)\n\tlittle crush on Evan!\"\n\t*set suspected_secret \"crush on Evan\"\n\t*goto your_secret_choice\n*elseif(relA > 75) and (nocrushA = false)\n\tlittle crush on A.J.!\"\n\t*set suspected_secret \"crush on A.J.\"\n\t*goto your_secret_choice\t\n*else\n\tMickey Mouse underpants!\"\n\t*set suspected_secret \"Mickey Mouse underpants\"\n\t*goto your_secret_choice\n\t\n*label your_secret_choice\n*fake_choice\n\t#Gasp. \"How did you know about that?\"\n\t\t*set suspected_secret_veracity \"true\"\n\t\tKyle laughs. \"I told you. We know everything.\" \n\t\t\n\t#Shrug. \"I don't care if people know about that.\"\n\t\t*set suspected_secret_veracity \"true\"\n\t\tKyle winks. \"Good to know.\" \t\n\t\t\n\t*if(Money >= 5)\n\t\t#Frown stonily. \"Okay, you got me. What do you want? Will five dollars keep your mouth shut?\"\n\t\t\t*set suspected_secret_veracity \"true\"\n\t\t\t\"Uh, okay,\" says Kyle, surprised. \"Sure, that'd be great.\" \n\n\t\t\tYou hand him a five-dollar bill and sigh with relief.\n\t\t\t*set Money -5\n\n\t*if(suspected_secret_veracity != \"true\")\n\t\t#Laugh genuinely. \"What? That's not even true!\" \n\t\t\t*set suspected_secret_veracity \"false\"\n\t\t\t\"Surrre it isn't,\" says Kyle, drawing it out.\n\t\t\t\n\t#Force myself to laugh. \"What? That's not even true!\" (I lie.)\n\t\t*set Secrecy %+10\n\t\t*set suspected_secret_veracity \"true\"\n\t\t\"Surrre it isn't,\" says Kyle, drawing it out.\t\t\t\n\n*return\n\n*label investigate_choice\n*page_break\nHow would you like to begin your investigation?\n\n*choice\n\t#Secretly tail the Whips. Stealth is my best skill.\n\t\t*set Secrecy %+30\n\t\t*goto tailprep\n\n\t#Infiltrate the Whips. I'll become one of them and thus learn their secrets.\n\t\t*set Secrecy %-30\n\t\t*goto infiltrateprep\n\n\t#Infiltrate? Heck, I'll join the Whips. Sounds like fun.\n\t\t*set Respect %-30\n\t\t*goto infiltrateprep\n\t\t\n*label tailprep\nIt's too late to go after the Whips now. They've ridden away on their bikes, and you can't catch them on foot. You'll have to wait until tomorrow. Maybe you can catch one of them when they arrive at school. \n\n*gosub outfit\n\n*goto_scene ch4book_sc2btail\n\n*label infiltrateprep\nIt's too late to go after the Whips now. They've ridden away on their bikes, and you can't catch them on foot. You'll have to wait until tomorrow to ask to join them.\n\n*gosub outfit\n\nAfter school the next day, you head to the hill where the Whips hang out. As you walk up the path, you hear voices and laughter, and you know you've come to the right place. For a moment, you stand in the shadow of an old oak, watching them. \n\nA.J. is there, leaning against a tree directly across from you. ${Hhe} seems to be lost in thought. Rina is sitting on a stump, smoking a cigarette. Max is emptying his enormous pockets of pudding cups swiped from the cafeteria. Adam is sitting on the ground, looking admiringly at Kyle. And Kyle is flipping through a notebook, chuckling to himself.\n\n*goto_scene ch4book_sc2ainfiltrate\n\n*label outfit\nYou wake up the next morning ready and raring to get started on your investigation. How do you dress?\n\n*fake_choice\n\t#Browns, greens, and neutrals: forest camouflage\n\t\t*set Secrecy %+20\n\t\t*set camo \"forest\"\n\t#Khakis and a Camden Tigers hoodie: normal, preppie clothes that won't stand out at school\n\t\t*set Respect %+10\n\t\t*set camo \"school\"\n\t#All black: the rebel kid uniform\n\t\t*set Respect %-20\n\t\t*set camo \"rebel\" \n\t#A long trench coat, a fedora, sunglasses. Sure, it stands out a little, but I look like a detective on TV!\n\t\t*set Secrecy %-20\n\t\t*set camo \"detective\"\n\t#Tight jeans and a shimmery shirt that brings out the color of my eyes. (It's nothing to do with my investigation; I just want to look good.)\n\t\t*set relV %+10\n\t\t*set relE %+10\n\t\t*set Secrecy %-10\n\t\t*set camo \"none\"\n\t\t\n*return", "ch4book_sc2ainfiltrate": "*set book_investigation_direction \"infiltrate\"\nYou stride out from between two trees. \"Hey, guys!\"\n\nThe Whips look at you in surprise. \n\n*if(Respect > 25)\n\t\"What are you doing here?\" Adam asks.\n\t*goto hostile_whipchoice\n*else\n\t\"Hey, ${Name}!\" Kyle grins. \"What's up?\"\n\t*goto friendly_whipchoice\n\n*label hostile_whipchoice\n*fake_choice\n\t#\"I want to join your club.\"\n\t\t*set Secrecy %-10\n\t\tKyle snorts with laughter. \"I'll be sure to send you a membership application.\"\n\n\t\t\"It's not something you just join,\" Adam adds witheringly. \"You have to have the right stuff.\" \n\t#\"Do I need a reason to hang out with my friends?\"\n\t\t*set Respect %-10\n\t\t*set Secrecy %+10\n\t\t\"Friends?\" Rina repeats doubtfully. \"Honey, I've got news for you. Other than A.J., who has a weird soft spot for you, none of us is friends with a nerd like you.\" \n\t#\"Oh, wow, is this where you all hang out? I had no idea. Well, as long as I'm here…\"\n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t\"Oh, come on,\" says Max. \"Like you don't know where A.J. spends half ${his} time. Aren't you, like, ${his} babysitter?\"\n*goto aj_aside\n\n*label friendly_whipchoice\n*fake_choice\n\t#\"I want to join your club.\"\n\t\t*set Secrecy %-10\n\t\t\"It's not as easy as asking,\" Adam says.\n\n\t\t\"For ${Name}? It is,\" says Kyle. \"We've been trying to get this one for ages!\"\n\t#\"Not much. What's going on with you guys?\"\n\t\t*set Respect %-10\n\t\t*set Secrecy %+10\n\t\t\"Nothing yet,\" says Rina. \"What did you have in mind?\"\n\n\t\t\"Some kind of mischief, I hope,\" Max winks.\n\t#\"I was just passing through.\" \n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t\"As long as you're here, stay awhile!\" Kyle nods.\n\n\t\t\"Have a seat!\" Rina offers, vacating her stump.\n\n*comment endif\n\n*label aj_aside\n\n\"Um, ${Name},\" A.J. grits, smiling with only ${his} teeth. \"Can I talk to you for a second?\"\n\n\"Of course, A.J., old friend,\" you say.\n\nA.J. pulls you by the arm into a nearby cluster of trees. \"Okay, what exactly is this?\"\n\n\"What? I'm just trying to get to know your friends,\" you say.\n\n*if(Respect > 65)\n\t\"You don't want to get to know these guys. They're bad influences, remember? Ordinarily, you don't even want me to hang out with them….\n\t*goto oh_wait\n*elseif(Respect > 25)\n\t\"Why now? I thought you said they were creeps….\n\t*goto oh_wait\n*else\n\t\"I thought you said you were a lone wolf. You said you didn't need a gang of amateurs slowing you down….\n\t*goto oh_wait\n\n\n*label oh_wait\nWait.\" A.J. raises an eyebrow. \"Are you investigating a mystery?\"\n\n*fake_choice\n\t#\"What? No! I'm just trying to make new friends. Branch out a little.\" \n\t\t*set relA %-10\n\t\t*set Secrecy %+30\n\t\t*set lie_count +1\n\t\tA.J. shoots you a disbelieving look. \"Come on. You can't fool me. I know you too well.\"\n\n\t\t\"Okay, fine. They are somewhat connected to an ongoing investigation….\"\n\n\t\t\"I knew it!\" says A.J.\n\n\t\t\"But I'm also long overdue in getting to know them. If you like them, they can't be all bad, right?\" You flash a smile.\n\n\t\tA.J. crosses ${his} arms. \"Do you really believe that?\"\n\n\t\tYou shrug. \"The facts will speak for themselves.\" \n\n\t#\"I'm so glad you caught on. The fact is, I need your help.\"\n\t\t*set relA %+20\n\t\t*set Secrecy %+20\n\t\t\"You know these guys best,\" you say. \"If I have you on my side, I can blow this case wide open in no time.\" \n\n\t#\"I'm sorry, A.J., but it's for Corley. She's really upset that they know her secrets.\"\n\t\t*set Secrecy %-20\n\t\t*set relA %+20\n\t\tA.J. runs a hand through ${his} hair. \"Really? Oh, man. I told them that book was a bad idea….\"  \n\n\t\t*if(seen_vitessas_book = false)\n\t\t\t\"What book?\" you say.\n\n\t\t\tA.J. rolls ${his} eyes and shrugs as if to say, \"It's a long story.\" \n\n\t\t\"Well, will you help me?\" you say. \"For Corley?\"\n\n\t#\"You caught me. I'd never really want to join the Whips. They are bad influences, and you shouldn't hang out with them either!\"\n\t\t*set Respect %+20\n\t\t*set relA %-10\n\t\tA.J. sighs and stares up at the sky. \"We've had this conversation, ${Name}. You can't pick who I hang out with.\"\n\n\t\tYou pout. \"Well, they're bullying jerks. If you help me, you can be on the right side of this.\" \n\n*comment endif\n\nA.J. shakes ${his} head. \"These are my friends, ${Name}. Not your suspects.\"\n\n*if(deputyA)\n\t\"I thought you were my deputy,\" you say.\n\n\tA.J. sighs. \"I knew I'd live to regret that. Okay, fine. What do you need me to do?\"\n\n\t*goto aj_agrees_to_help\n*elseif(relA > 70) or (datingA)\n\t\"Pleeeeease?\" you put on your best doe eyes.\n\n\tA.J. sighs. \"You know I can't say no to that face. Okay, fine. What do you need me to do?\"\n\n\t*goto aj_agrees_to_help\n*else\n\t\"Come on. This will be a lot easier if you vouch for me,\" you say. \"Tell them I'm cool.\"\n\n\t\"You're on your own this time, ${Name},\" says A.J. \"I won't stand in your way, but I'm not going to try to manipulate my friends for you.\" \n\n\tYou make a face. \"Oh, fine. I don't need you anyway.\" \n\n\t*temp aj_helping false\n\t*goto back_in_the_group\n\n*label aj_agrees_to_help\n*temp aj_helping true\n\"Vouch for me, okay? Say I'm cool.\"\n\n*if(Respect >= 65)\n\t\"I'll do my best,\" ${he} says doubtfully.\n\n\t\"Your best is all anyone can ask,\" you say solemnly. \"If you do your best, you never need to be ashamed.\"\n\n\tA.J. shakes ${his} head. \"This is going to be a train wreck.\" \n\n\t*goto back_in_the_group\n*elseif(Respect > 25)\n\tA.J. nods. \"Okay. I'll give you the A.J. seal of approval.\"\n\n\t\"Great,\" you say with a grin.\n\n\tThe two of you do your special handshake.\n\n\t*goto back_in_the_group\n*else\n\tA.J. grins. \"Not that you'll need it. Come on.\" \n\n\t*goto back_in_the_group\n\n*label back_in_the_group\n\n*page_break\nBack in the clearing, the rest of the Whips are laughing as Kyle reads out loud from a notebook.\n\n*if(seen_vitessas_book)\n\tIt's the \"Book of Truths\", whatever that means.\n*if(seen_vitessas_book = false)\n\tThe cover says \"The Book of Truths\", and in smaller letters: \"Private. Keep Out!\"\n\n*comment endif\t\n\t\n*set seen_vitessas_book true\n\"'Miss Greeley always wears the same outfit on Monday, Tuesday, and so on. I bet she has day-of-the-week underwear,'\" Kyle reads.\n\nAdam laughs, but Rina says, \"Boo! We want to hear more kid secrets. Find out if there's anything in there about ${Name}.\"\n\n\"Oh, hi,\" says Max, nodding to you and A.J. \"Finished making out?\" \n\n*choice\n\t#\"Ha ha, no. We were just talking about an extra credit project we're doing together.\"\n\t\t*set lie_count +1\n\t\t*if(Respect > 25)\n\t\t\t\"Nerd!\" coughs Adam.\n\n\t\t\t\"You're not helping yourself!\" A.J. hisses sidelong.\n\n\t\t\t*goto back2\n\t\t*else\n\t\t\tRina laughs. \"Good one.\"\n\n\t\t\t*goto back2\n\t#\"Ha ha, no. We were just consulting about our side business making fake IDs.\"\n\t\t*set lie_count +1\n\t\t*if(Respect > 75)\n\t\t\tRina laughs. \"Yeah, right!\"\n\n\t\t\t\"Tone it down,\" A.J. hisses sidelong.\n\n\t\t\t*goto back2\n\t\t*else\n\t\t\t\"Really?\" Adam looks impressed.\n\n\t\t\t*if(Respect > 50)\n\t\t\t\t\"I doubt it,\" says Max, but he looks uncertain.\n\n\t\t\t*goto back2\n\t#\"Ha ha, no. We were just consulting about my mystery-solving business. A.J. is my deputy.\"\n\t\tThe Whips all eye you suspiciously. A.J. shoots you a look. It was probably a mistake to remind them that you are a detective. Now they feel that they are under suspicion. You'll have to keep quiet about it from now on…even if means lying by omission.\n\n\t\t*goto back2\n\t#\"Yes.\"\n\t\t*if(relA > 80) or (datingA)\n\t\t\tMax blinks. \"Oh.\" \n\n\t\t\tA.J. blushes violently. \n\n\t\t\t*goto back2\n\t\t*else\n\t\t\t\"Ha ha, ${she_u} called your bluff,\" Rina laughs at Max. \"But I happen to know that A.J. would never fall for ${hers_u} type. Seriously, what were you doing, telling secrets?\"\n\t\t\t\n\t\t\t\"Uhhh,\" you say.\n\n\t\t\t*goto back2\n\n*label back2\n\"So do you or don't you guys want to hear this list of the sixth-grade boys ranked by hotness?\" says Kyle, flipping through the notebook. \"A.J., you're number five.\"\n\n*if(genA = \"girl\")\n\t\"Very funny,\" A.J. rolls her eyes. You can tell she's exasperated at being called a boy, but kind of pleased at being called hot.\n*if(genA = \"boy\")\n\tA.J. buffs his fingernails on his jacket.\n\n*comment endif\n\n\"Here's an item about you, Max,\" says Kyle.\n\n\"I'm number one, right?\" Max grins widely.\n\n\"No, it's on the next page. 'Max thinks he's so cool, but those of us who've been here since kindergarten still remember him as the Incredible Dog Food Eating Boy.'\"\n\nRina bursts out laughing. Max's grin fades.\n\n*choice\n\t#\"I don't think you guys should be reading somebody's secret diary.\"\n\t\t*set Respect %+20\n\t\t\"Who's gonna stop us?\" says Adam. \"You?\"\n\t\t\n\t\t*goto regain_whip_respect\n\t\t\n\t#\"Nobody remembers that, Max. Don't let the diary drive a wedge between you.\" \n\t\t*set Respect %+10\n\t\tMax shoots you a grateful look, but Rina rolls her eyes. Pretending to be you, she scrunches up her face and pretends to push a pair of glasses up her nose.\n\t\t\n\t\t*goto regain_whip_respect\n\n\t#\"Ha ha. Who's a good boy, Max?\"\n\t\t*set Respect %-10\n\t\t\"Shut up!\" says Max.\n\t\t\n\t\tThe other Whips laugh. You feel a little bad for making fun of Max, but by behaving like a Whip, you have made a good impression on the others.\n\t\t\n\t\t*goto go_for_your_info\n\n*label regain_whip_respect\nThe other Whips are looking at you with suspicion. You realize you need to try to fit in more if you want to get good information.\n\n\"Naw,\" you say, forcing a laugh. \"Read whatever you like. But if you're looking for cheap thrills, have you tried the school library's banned-book list? Whoo! Some of those books are scorchers, let me tell you. Talk about adult content.\" \n\n\"You read banned books?\" says A.J. \n\n\"Of course! I just look at the banned-book list to know what to read,\" you brag. \"The school keeps them locked away, but you can get them if you know how. You just have to be sneaky.\" Actually, you don't have to be sneaky; you just have to ask your parents to sign a permission slip. Still, you feel you are regaining the respect of the group. Max looks especially interested. Hey, maybe you've secretly converted one of the Whips into a reader. \n\n*label go_for_your_info\nYou decide to seize the moment to oh-so-casually fish for more information. \"So, whose notebook is that, anyway? Did one of you write it?\"\n\n\"Nope,\" says Rina. \"Adam doesn't even know how to read.\"\n\n\"So where did you find it?\" you ask, hoping not to sound too inquisitive.\n\nAdam doesn't seem to mind the question. He grins. \"It's sort of a trophy.\"\n\n\"It's how Adam proved himself to the group,\" Kyle explains.\n\nYou know he means that Adam stole it. You wonder who the victim of the theft was. Corley? But it sounds like the book is full of mean comments, which are not her style. If it contains Corley's secret, though, it must belong to a close friend of Corley. Rather than ask a lot of questions and raise suspicion, you decide you need a closer look. \"Let me see,\" you demand, holding out your hand.\n\n*if(Respect > 25)\n\t\"Get out of here, ${Name},\" says Kyle. \"You're not even in the group.\"\n*if(Respect \u003c= 25)\n\t\"I don't know,\" says Kyle. \"Are you in the group now?\"\n\n*comment endif\n\n*if(aj_helping = false)\n\t*if(Respect > 25)\n\t\t\"Well, let me join,\" you say.\n\t*if(Respect \u003c= 25)\n\t\t\"That's up to you, I guess,\" you shrug.\n\n\t*goto group_decides\n*if(aj_helping)\n\t*goto aj_endorsement\n\n*label aj_endorsement\nYou nudge A.J.\n\nA.J. jumps. \"I think we should ask ${Name} to join.\n*if(Respect > 65)\n\tBeneath that goody-two-shoes exterior, ${shes_u} really an animal. You have no idea. Sure, teachers love ${her_u}, but that just makes it easier for ${her_u} to get away with stuff.\n\t*goto endorsement2\n*elseif(Respect > 35)\n\tMaybe ${Name} doesn't look tough or scary, but it's always the quiet, mild-mannered ones you have to look out for. You have no idea what kinds of crazy stuff is going on in ${hers_u} head. \n\t*goto endorsement2\n*else\n\tI mean, ${hers_u} reputation speaks for itself. If anyone is a true rebel, it's ${Name}.\n\t*goto endorsement2\n\n*label endorsement2\n*if(relA >= 75)\n\tBesides which, ${shes_u} just…awesome.\" A.J. glances at you, and you know that ${he} isn't kidding right now. \"My best friend. Seriously.\" \n\n\tYou smile, feeling warm and fuzzy.\n\n\t*goto group_decides\n*elseif(relA > 50)\n\tBesides which, ${shes_u} pretty fun to hang out with. I should know—we've been neighbors for years.\" \n\n\t*goto group_decides\n*else\n\tBesides which, ${shes_u} a pretty good friend, I guess. Sort of. We've had our ups and downs…but…yeah.\"\n\n\tYou frown. That's a pretty lukewarm recommendation.\n\n\t*goto group_decides\n\n*label group_decides\n\"What do you think, gang?\" says Kyle, looking at the others.\n*comment: acceptance = relationship with A.J. + inverse of Respect; 0-200 technically, but remember they're both fairmath so under 50/over 150 is unlikely\n*temp acceptance (relA + (100 - Respect)) \n\n*if(acceptance > 125)\n\t*goto enthusiastic_reception\n\n*elseif(acceptance > 75)\n\t*goto conditional_reception\n\n*else\n\t*goto refusal\n\n*label enthusiastic_reception\n\"Absolutely,\" says Rina. \n\n\"No question,\" says Max. \"I actually kind of think ${Name} should be our leader.\"\n\n\"I wouldn't go that far,\" says Kyle.\n\n\"Anyway, ${she_u} should definitely be in the group,\" says Rina.\n\n*label welcome\n*set you_are_a_whip true\nKyle nods. \"Congratulations, ${Name}. You're an official Whip.\" \n\n\"Great!\" you say. \"Then let me borrow the notebook.\" \n\n\"What are you going to do with it?\" says Adam.\n\nYou grin. \"Study up. Learn some secrets.\" \n\n\"Can't argue with that,\" says Kyle. \"Catch.\" He tosses you the book.\n\n*set have_vitessas_book true\nYou hang out for a little longer so as not to arouse suspicion, but your heart isn't really in it. You can't wait to get home and inspect the book!\n\n*goto finish\n\n*label refusal\n\"I don't think so,\" laughs Rina.\n\n\"Yeah, sorry, A.J., but your taste in friends sucks,\" says Max. \"No offense.\"\n\n\"The group has spoken. Get out of here,\" says Kyle. He lifts his leg as if to kick you. You get the message. No choice but to leave.\n\n*label new_plan\nYour new plan is simple: Crouch in the bushes for however long it takes, then tail whoever takes the book with them. You simply can't think of any other options. \n\nYou're in luck! The Whips get tired of the book after about twenty minutes, and from your perch in the woods, you can clearly see Kyle tuck it into an old stump. When they wander off about half an hour later, nobody takes the book. \n\nYou creep into the clearing, look around, reach your hand into the log, and remove the book.\n\nThis was easier than you thought. Not becoming a Whip was the best thing that happened to you! \n\nYou run home with the book, your prize, tucked in your arms.\n\n*goto finish\n\n*label conditional_reception\n\"I don't know,\" says Rina doubtfully. \"Does ${Name} have what it takes to be one of us?\"\n\n\"Let's put ${her_u} through the initiation,\" says Adam. \"Same thing I had to go through.\"\n\n\"I gotta admit, that's fair,\" says A.J.\n\n\"What's the initiation?\" you ask.\n\n\"Bring us back a trophy,\" says Kyle. \"Not a literal trophy, but some sort of prize that shows you have the qualities we admire in a Whip. Stealth, skill, attention to detail…\"\n\n\"He means steal something,\" Max explains.\n\n*label steal_choice\n*choice\n\t#\"I could never steal something!\"\n\t\t*set Respect %+20\n\t\t\"Told you ${she_u} didn't have it in ${her_u},\" Adam scoffs.\n\n\t\t\"Your choice,\" Kyle shrugs. \"But if you're not going to join us, get out of our hideout.\"\n\n\t\tFine. You know when you're not wanted. \n\n\t\t*goto new_plan\n\t*if(haveJacket) and (camo = \"rebel\")\n\t\t#\"Fool, how do you think I got this jacket? It used to be A.J.'s, you know.\"\n\t\t\t*set lie_count +1\n\t\t\t*if(aj_helping)\n\t\t\t\tA.J. nods. \"Oh, yeah, ${she_u} totally stole that from me.\"\n\n\t\t\t\t*goto that_counts\n\t\t\t*else\n\t\t\t\tA.J., true to ${his} word, neither confirms nor denies this claim.\n\n\t\t\t\t*goto that_counts\n\t*disable_reuse #\"Did you hear about Shashi's book? I was the one who stole it.\" \n\t\t*set lie_count +1\n\t\t\"The notebook says Corley did that,\" says Rina.\n\n\t\tYou frown. Who wrote this thing? \n\n\t\t\"Maybe we should ask Corley to join,\" Max jokes. \"Even she is tougher than this one.\"\n\n\t\t*goto steal_choice\n\t#\"I could bring you one of Shashi's books. She really keeps a tight watch on those now.\"\n\t\t*temp steal_target \"[i]The Swordmaster's Sourcebook[/i]\"\n\t\t*temp steal_owner \"Shashi\"\n\t\t*goto steal_thing\n\t*if(haveBinoculars)\n\t\t#\"I stole these binoculars from Finnegan.\"\n\t\t\t*goto that_counts\n\t*else\n\t\t#\"I know where Finnegan keeps his binoculars.\"\n\t\t\t*temp steal_target \"binoculars\"\n\t\t\t*temp steal_owner \"Finnegan\"\n\t\t\t*goto steal_thing\n\t*if(haveCompact)\n\t\t#\"I stole this powder compact from the drugstore.\"\n\t\t\t*goto that_counts\n\t*else\n\t\t#\"You want some makeup, Rina? I could steal some from Evan.\"\n\t\t\n\t\t\t\"You're on,\" says Rina.\n\n\t\t\t*temp steal_target \"face powder\"\n\t\t\t*temp steal_owner \"Evan\"\n\t\t\t*goto steal_thing\n\t*if(haveFloss)\n\t\t*disable_reuse #\"I stole this dental floss from the drugstore.\"\n\t\t\t\"Dental floss?\" says Rina. She laughs. \"Only a nerd like you.\"\n\t\n\t\t\t\"I bet ${she_u} didn't even steal it. I bet ${she_u} bought it lawfully with ${hers_u} money,\" says Max scornfully.\n\n\t\t\t*goto steal_choice\n\n\n*label that_counts\n\"Okay, that counts,\" says Rina.\n\n*goto welcome\n\n*label steal_thing\n*set agreed_to_steal true\nThe next afternoon, during study hall, you hear a knock at the window. It's Kyle and Max. They wave at you. It's go time. You're supposed to deliver your stolen item. \n\nAs Mr. Corvis chases them away from the window, you get up from your chair. You nod to A.J., who is sitting across the room. A.J. nods back. You stride across the room and sit across from ${steal_owner}.\n\n\"Hi!\" you grin.\n\n*if(steal_owner = \"Shashi\")\n\t*if(datingS) or (relS > 75)\n\t\tShashi giggles. \"Hi there. Come to put a spell on me?\"\n\n\t\t*goto steal2\n\t*else\n\t\tShashi grins back. \"Hi!\"\n\n\t\t*goto steal2\n\n*elseif(steal_owner = \"Evan\")\n\t*if(datingE) or (relE > 75)\n\t\tEvan smiles broadly and blinks his long lashes at you. You wonder if he is wearing mascara. \"Hi there,\" he murmurs.\n\n\t\t*goto steal2\n\t*elseif(relE > 40)\n\t\t\"Hey,\" he says.\n\n\t\t*goto steal2\n\t*else\n\t\tEvan looks wary. \"What do you want?\"\n\n\t\t*goto steal2\n*elseif(steal_owner = \"Finnegan\")\n\tFinnegan drags his eyeballs from his book and sighs. \"Yes?\"\n\t\n\t*goto steal2\n\n*label steal2\n*choice\n\t*disable_reuse #\"Can I borrow your ${steal_target}?\"\n\t\t*goto borrow\n\t*disable_reuse #\"Would you sell me your ${steal_target}?\"\n\t\t*goto buy\n\t*disable_reuse #\"Did you know your locker door is hanging wide open? You might want to check on it.\"\n\t\t*set lie_count +1\n\t\t*goto lie_to_steal\n\t\n\t#\"Never mind.\"\n\n\t\t*goto decide_not_to_steal\n\t\t\n\n\n*label decide_not_to_steal\n\n*set Greed %-20\n\nThere are limits. It's clear that ${steal_owner} doesn't want to part with the ${steal_target}. You decide to abandon this plan of trying to impress the Whips by bringing them a prize. \n\nThe next day, you creep back into the woods. This time, you quietly hang back in the brush and watch the Whips from afar. Again, they're fooling around with the book.\n\n\n*goto new_plan\n\n*label borrow\n*if(steal_owner = \"Finnegan\")\n\t*if(relF > 60)\n\t\tFinnegan smiles. \"Did you see an interesting bird? I'm glad you're getting into bird-watching. Just be really careful, okay? Bring them back in one piece.\" \n\n\t\tHe hands you his binoculars. Score!\n\n\t\t*set acquisition_method \"borrowed\"\n\t\t*set haveBinoculars true\n\t\t*achieve getbinoculars\n\t\t*goto score\n\t*else\n\t\t\"Uh, no,\" he says with a laugh. \"They're delicate equipment. I don't just lend them out.\" \n\n\t\t*goto steal2\n*elseif(steal_owner = \"Evan\")\n\t*if(datingE) or (relE >= 65)\n\t\t\"Of course!\" says Evan. \n\n\t\tHe looks around, then reaches into his bag, pulls out a small powder compact, and slips it to you across the table. Score!\n\n\t\t*set acquisition_method \"borrowed\"\n\t\t*set haveCompact true\n\t\t*achieve getpowder\n\t\t*goto score\n\t*elseif(relE >= 40)\n\t\t\"Oh, all right,\" says Evan. \"You need it.\" \n\n\t\tHe looks around, then reaches into his bag, pulls out a small powder compact, and slips it to you across the table.\n\n\t\t\"Make sure to cover up all the zits,\" he instructs you. \"Especially the big one on your nose.\"\n\n\t\t*set acquisition_method \"borrowed\"\n\t\t*set haveCompact true\n\t\t*achieve getpowder\n\t\t*goto score\n\t*else\n\t\t\"I don't owe you anything,\" says Evan. \"Buy your own powder.\"\n\n\t\t*goto steal2\n*elseif(steal_owner = \"Shashi\")\n\t*if((datingS) or (relS > 65)) or (in_shashis_gaming_group)\n\t\t\"Sure!\" says Shashi. \"You writing up an adventure? Ooh, I can't wait to play in it. Just make sure you bring it back clean and tidy, you know how I feel about my books!\"\n\n\t\tShe pulls the book out of her bag and hands it to you. Score!\n\n\t\t*set acquisition_method \"borrowed\"\n\t\t*goto score\n\t*else\n\t\t\"Ohh…I don't think so,\" says Shashi. \"Sorry. I'm kind of protective of my books. You understand. Evan will probably let you borrow his copy, though, if you want to write up an adventure.\"\n\n\t\t*goto steal2\n\n*label buy\n${steal_owner} looks confused by the offer. \"Um, sure, I guess if you offer me enough.\" \n\n*if(steal_owner = \"Shashi\")\n\t*temp enough 29.99\n\t*goto offer\n*elseif(steal_owner = \"Evan\")\n\t*temp enough 4.59\n\t*goto offer\n*elseif(steal_owner = \"Finnegan\")\n\t*temp enough 150\n\t*goto offer\n\n*label offer\nHow much do you want to offer for ${steal_owner}'s ${steal_target}?\n*temp ur_offer 0\n*input_number ur_offer 0 Money\n\n*comment: round the offer\n*set ur_offer *100\n*set ur_offer round(ur_offer)\n*set ur_offer /100\n\n*if(ur_offer > Money)\n\tYou don't have that much money. You have $${Money}. Try again.\n\n\t*goto offer\n*else\n\t*if(ur_offer >= enough)\n\t\t*goto person_accepts\n\t*else\n\t\t*goto person_declines\n\n*label person_accepts\n\"Okay, I can get a new one for that much, so, I guess, sure.\" ${steal_owner} hands you the ${steal_target}, and you hand over the money.\n\n*set Money -ur_offer\n*set acquisition_method \"bought\"\n*goto score\n\n*label person_declines\n${steal_owner} shrugs. \"I'm sorry, ${Name}, but that's just not enough. It's worth at least $${enough}. I really can't sell for any less than that.\" \n\n*label offer_choice\n*choice\n\t*selectable_if(Money > enough) #\"Okay. Here's $${enough}.\"\n\t\t\t*set ur_offer enough\n\t\t\t*goto person_accepts\n\t*disable_reuse #\"You sure you can't go any lower? After all, it's preowned.\"\n\t\t*if(steal_owner = \"Shashi\")\n\t\t\t\"Not really. It's practically new!\" says Shashi. \"You, of all people, know how important this book is to me. Come on, just buy your own. Or you can write your adventure at my house, okay?\"\n\n\t\t\t*goto offer_choice\n\t\t*elseif(steal_owner = \"Finnegan\")\n\t\t\t\"I guess I could go down to about $145,\" says Finnegan. \"But that's it.\"\n\n\t\t\t*set enough 145\n\t\t\t*goto offer_choice\n\t\t*elseif(steal_owner = \"Evan\")\n\t\t\t\"Fair enough. It's about half-used, so let's call it $2.29,\" says Evan.\n\t\t\t\n\t\t\t*set enough 2.29\n\t\t\t*goto offer_choice\n\t\t*else\n\t\t\t\"No,\" says ${steal_owner}.\n\t\t\t\n\t\t\t*goto offer_choice\n\t#\"I can't afford $${enough}.\"\n\t\t\"Fine,\" says ${steal_owner}. \"I didn't really want to sell it to you anyway, to be honest. I don't really know how we started talking about this.\" \n\n\t\t*goto offer_choice\n\t#\"Oh, just forget the whole thing. I don't really want your ${steal_target} that much.\"\n\t\t\"Fine,\" says ${steal_owner}. \"I didn't really want to sell it to you anyway, to be honest. I don't really know how we started talking about this.\" \n\t\t\n\t\t*goto decide_not_to_steal\n\n*label lie_to_steal\n\"My locker door? You're sure?\" ${steal_owner} looks concerned. \"I'm sure I didn't leave it open.\"\n\n\"You don't think someone tried to break in, do you?\" you say, putting on a concerned face. \n\n*if((Secrecy >= 60) or (lie_count \u003c 2)) or (Respect >= 50)\n\t\"You think? Oh man. I better go check on it.\" \n\n\t\"Now's a good time,\" you say, glancing over your shoulder. \"Mr. Corvis is distracted yelling at the Whips.\" \n\n\t\"Right. Thanks.\" ${steal_owner} jumps up, looks around, and darts out of the room.\n\n\tYou reach across the table and pull ${steal_owner}'s abandoned backpack toward you. After rooting around for a moment, you find your prize: the ${steal_target}. \n\n\t*set acquisition_method \"stole\"\n\t*goto score2\n*else\n\t*if (Respect \u003c 50)\n\t\t\"Like you?\" ${steal_owner} jokes. \"Hey, wait. You didn't try to break into my locker, did you?\"\n\t\n\t\tYou are kind of beginning to wish you did. \"No. Must have been someone else. I'm just telling you about it. I'm trying to, you know, be a good citizen.\"\n\t\n\t\t${steal_owner} laughs. \"Since when?\"\n\t\t\n\t\t*goto are_you_going_or_what\n\t*else\n\t\t${steal_owner} stares at you. \"There's something fishy about this.\"\n\t\t\n\t\t\"About what?\" you say innocently. \n\t\t\n\t\t\"The way you're talking. You sound like you're in a play or something.\" \n\t\n*label are_you_going_or_what\nYou try to bring the conversation back on track. \"So…are you going to go check on your locker or what?\"\n\t\n${steal_owner} frowns. \"It depends. Why do you want me to so badly?\"\n\n\"I don't! I don't care. If my locker door were hanging open, I would want to take care of it, that's all.\"\n\n\"You're being weird,\" says ${steal_owner}.\n\t\n\"Oh, forget it,\" you mumble. This isn't working.\n\t\n*goto steal2\n\n*label score\n*if(Respect > 60)\n\t\"Sure. Of course. Go ahead, ${Name},\" says Mr. Corvis pleasantly.\n\n\t*goto score2\n*else\n\tMr. Corvis eyes you suspiciously. \"Well, be quick about it.\"\n\n\t*goto score2\n\n*label score2\n*page_break\nFive minutes later, you meet Rina and Max in the stairwell and show them your prize. \n\n\"I have to admit, I didn't think you had it in you,\" says Max. \"But you proved me wrong.\"\n\n\"Welcome to the Whips,\" Kyle grins.\n*set you_are_a_whip true\n\n*fake_choice\n\t#\"Great! I better study up for my new position. Do you guys have any kind of manual?\"\n\t\t*set Respect %+20\n\t\t*set Secrecy %+20\n\t\tMax rolls his eyes. \"A nerd to the end, huh? No, we do not have a manual.\"\n\n\t\t\"You might want to read up on this, though,\" Kyle says. \"Very interesting reading, I assure you.\"\n\n\t#\"For my next act as a Whip, I'd like to really rag on some poor nerd. Can you give me any tips?\"\n\t\t*set Respect %-20\n\t\t*set Secrecy %+20\n\t\tKyle winks. \"Got a whole book of 'em.\" \n\n\t#\"Can I grab the notebook now?\"\n\t\t*set Secrecy %-20\n\t\t\"There's more to being a Whip than just reading the notebook,\" says Max. \"Is that all this is to you?\"\n\n\t\t\"Well, I don't blame ${her_u} for being curious,\" says Kyle. \"You have to admit, it's good reading.\" \n\n*comment endif\n\nGlancing back and forth, Kyle reaches into his bag, pulls out the secret notebook, and hands it to you.\n\n\"Hey! What's going on here?\" the vice principal's voice booms from up the stairs. \n\nKyle and Max scramble off, and you shove the notebook in your bag. As the vice principal passes you, you flash a smile. She frowns but passes by you without comment. Inwardly, you're cheering. You can hardly believe you have it. You can't wait to investigate further!\n\n\n*label finish\n\n*page_break\n\n*goto_scene ch4book_sc3inspectbook\n", "ch4book_sc2btail": "*set book_investigation_direction \"tail\"\nYou arrive at school early and watch the kids arrive. Some climb out of their parents' cars. Others ride up and chain their bikes to the rack. Kyle is one of the ones who arrives by car, making a face as his mom kisses him good-bye. You smile to yourself. He's not so intimidating, after all.\n\nKyle hops out of the car and begins walking toward you. You turn away and take a drink at the water fountain so he won't see your face. \n\nWhen you look up again, you can't find him. He should be near the doors now, but he's not. You scan the parking lot and just see a flash of his red jacket, way over near the fence. You watch him slip through a hole in the fence and walk up the hill behind the school.\n\nYou consider your options. If you walk a block down and cross the bridge over the train tracks, you'll have a pretty good view of the hilltop without much risk of being seen. Of course, you'll have a better view if you stick close to Kyle—but he might catch you.\n\n*choice\n\t#Stay close. Details are important here. I need to be able to hear what they are saying.\n\t\t*set Secrecy %+10\n\t\t*goto get_closer\n\t#Head for the distant observation spot. Better safe than sorry.\n\t\t*set Respect %+10\n\t\t*goto stay_further\n\t#Stay close. Worst-case scenario, I go onto plan B and infiltrate the Whips.\n\t\t*set Respect %-10\n\t\t*goto get_closer\n\t#Head for the distant observation spot. Plan B is not acceptable. The last thing I want to do is have a conversation with Kyle.\n\t\t*set Secrecy %-10\n\t\t*set Respect %+10\n\t\t*goto stay_further\n\n*label stay_further\nYou wait until the teacher monitoring the playground isn't looking, and you walk out through the gate and down the street. After you cross the overpass over the train tracks, you double back in the direction of the school, following the fence that lines the ravine. You follow the fence to a vacant lot behind an old warehouse. You find a good spot to stand behind a giant wooden spool.\n*goto further_outlook\t\t\n\t\t\n*label further_outlook\nFrom here, you're well concealed, and you have a good view of the hilltop across the ravine. You can clearly see several boys in black huddled on top of the hill. From this distance, they are not likely to see or hear you watching them.\n\nUnfortunately, it's also hard for you to see exactly what the boys are doing, and you can't hear them at all. You can't even tell which boy is Kyle, not that it matters. One Whip appears to be reading from a book, but you can't see what sort of book. \n\n*choice\n\t#Darn, I'll have to get closer after all. \n\t\t*goto get_closer\n\t*if(haveBinoculars)\n\t\t#No problem, I'll use my handy binoculars.\n\t\t\t*goto use_binoculars\n\t*else\n\t\t#Swing by a meeting of Finnegan's Ornithology Club to borrow a pair of binoculars.\n\t\t\t*goto ask_finnegan_binoculars\n\t#Spying from afar isn't really working for me. I'll go over there and introduce myself.\n\t\t*goto_scene ch4book_sc2ainfiltrate\n\n*label ask_finnegan_binoculars\nLuckily, it's an Ornithology Club day, so you know Finnegan will be presiding over the meeting in Room 304. You run there. \n\nFinnegan looks up as you arrive, panting, in the doorway.\n\n*label binoculars_choice\n*choice\n\t*disable_reuse #\"May I borrow your binoculars for a…project?\"\n\t\t*if(relF > 70) or (Respect > 70)\n\t\t\t\"Well, okay. I know you'll take care of them. But return them right away!\" says Finnegan, handing them to you.\n\t\t\t*set haveBinoculars true\n\t\t\t*achieve getbinoculars\n\t\t\t\n\t\t\t\"Thanks!\" you shout, already running back through the halls. You manage to make it back to your lookout spot within a few minutes. The boys are still hanging around, luckily.\n\n\t\t\t*goto use_binoculars\n\t\t*else\n\t\t\t\"No way. Why would I lend my binoculars to you? They're expensive equipment, and you are probably going to break them,\" says Finnegan.\n\n\t\t\t*goto binoculars_choice\n\t#\"I need to borrow a pair of binoculars! I saw a rare bird!\"\n\t\t*set relF %+30\n\t\t*set lie_count +1\n\n\t\t\"What kind of bird?\" Finnegan asks eagerly.\n\n\t\t\"Ummm…I'm not sure. It was all blue and purple….\"\n\n\t\tFinnegan rolls his eyes. \"Probably just a blue jay or a common grackle.\"\n\n\t\t\"No, no. It was also red and yellow.\" \n\n\t\tFinnegan frowns. \"Where did you see it?\"\n\n\t\t\"Up on top of the hill. I need to borrow your binoculars to get a closer look.\"\n\n\t\t\"I want to see it!\" says Finnegan. \"Show me where.\"\n\n\t\t\"Umm…\" You can't think of a good reason to explain why you need to go alone. You should have thought this through. Of course Finnegan would want to look at the rare bird. Oh well, if Finnegan comes with the binoculars, so be it. You'll figure it out when you get there. You lead Finnegan up to the spot across the tracks from the Whips.\n\n\t\t\"I saw it in that tree,\" you say, pointing across to the hilltop.\n\n\t\t\"There's all those people there. They'll have scared it off,\" says Finnegan.\n\n\t\t\"Maybe. Maybe not. Let me look where I saw it.\" You hold out your hands, and Finnegan grudgingly hands you his binoculars.\n\n\t\t\"Hmmm…\" You peer across at the boys. You can see that Kyle is holding a notebook. The cover of the notebook says \"The Book of Truths.\" You adjust the focus on the binoculars and you can even see smaller letters on the cover of the notebook. They say \"Private. Keep Out!\" The words were written in pink ink, and it looks like a girl's handwriting. Someone's diary, maybe.\n\t\t*set seen_vitessas_book true\n\t\t*achieve findsource\n\n\t\t\"I don't see anything moving,\" says Finnegan. \"I bet it's gone.\"\n\n\t\tYou hear the school bell ring below.\n\n\t\t\"Oh, no! That's third bell. We're supposed to be in our seats. Give me that!\"\n\n\t\tFinnegan grabs the binoculars.\n\n\t\t\"Go on ahead,\" you tell Finnegan. \"I just want to…to make sure the bird is….\"\n\n\t\tYou can save your breath. Finnegan is already halfway down the hill. You take another path, heading in the direction of the Whips. They have an important clue, and you need to get it!\n\n\t\t*goto get_closer\n\n\t#\"Somebody trashed the newspaper display outside the office!\"\n\t\t*set lie_count +1\n\t\t*set haveBinoculars true\n\t\t*achieve getbinoculars\n\t\t\"Oh, no!\" Finnegan jumps up and runs out the door, leaving behind his binoculars. You snag them and hurry back to your perch across the tracks from the Whips' hideout.\n\n\t\t*goto use_binoculars\n\n*label use_binoculars\nYou pull out your binoculars and peer toward the hilltop. It takes you a moment to find the boys in your line of sight and adjust the focus. Once you do, you see Kyle, Adam, and a handful of other Whips clearly. Kyle appears to be reading out loud from a marble notebook. You can just make out the pink writing on the cover:\n\n\"The Book of Truths\"\n\nYou adjust the focus and you can even see smaller letters:\n\n\"Private. Keep Out!\n*set seen_vitessas_book true\n*achieve findsource\n\n*choice\n\t#How low, stealing a girl's diary! Go over there and confront them.\n\t\t*set Secrecy %-30\n\t\t*set relV %+10\n\t\t*set Respect %+10\n\t\t*set Greed %-10\n\t\t*goto confront_whips\n\t#Sneak closer and listen in.\n\t\t*set Secrecy %+20\n\t\t*goto get_closer\n\t#Go over there and schmooze.\n\t\t*set Greed %+10\n\t\t*set Secrecy %-10\n\t\t*goto_scene ch4book_sc2ainfiltrate\n\n*label get_closer\nWalking slowly, keeping behind trees, and being very careful not to step on any loud twigs, you creep close to the Whips' clearing.\n*if(camo = \"forest\")\n\tLuckily, you're wearing your forest-green clothing, so you blend right into the trees. \nSoon you can hear voices.\n\n\"Listen to this,\" you hear Kyle say. In a high, girlish voice, he reads, \"Evan is such a teacher's pet. I swear I overheard him inviting Mrs. Greeley to discuss his grades over brunch. Match made in heaven?\"\n\nAdam, Max, and Rina laugh. A.J. shakes ${his} head.\n\n\"This is the best notebook ever,\" Rina gushes.\n\n*if(seen_vitessas_book = false)\n\tFrom here, you can see the notebook's cover very clearly. It says \"The Book of Truths\" in large pink letters. It looks like a girl's handwriting. In smaller letters, it says, \"Private. Keep Out!\"\n\t*set seen_vitessas_book true\n\t*achieve findsource\n*comment endif\n\nKyle hoots. \"Here's a list of the guys in school, rated by cuteness! I'm at the top, of course.\"\n\n\"No, you're not. Let me see that….\"\n\nThe guys seem to be scuffling. You hang back.\n\nDown the hill, you can hear the third bell ring. Will these people ever go to class?\n\n\"Gimme! Ow!\"\n\n\"Ha ha!\"\n\nApparently not.\n*if(Respect > 60)\n\tIt physically pains you to stay here, knowing you are being written up as tardy at this very moment!\n\n*comment endif\n\nIt's time to take action. Now, while they're distracted. Kyle and Adam are skirmishing, and Max and Rina are cheering them on. Adam steps on the diary, which lies forgotten on the ground. It's much closer to them than to you, and if you try to grab it, you'll have to run out and risk being seen.\n*if(camo = \"forest\")\n\tYour forest camouflage will help, but you'll still need some serious skills.\n*comment endif\t\nYou'll need to make it right out into the clearing and back without being seen. How much confidence do you have in your secrecy and stealth abilities?\n\n*choice\n\t#Lots. I'm basically a ninja. Try to steal the diary.\n\t\t*goto try_to_steal\n\t#I'm more of a \"face the problem head on\" kind of person. Confront them.\n\t\t*goto confront_whips\n\t#I may not be stealthy, but I'm charming. Get friendly with them.\n\t\t*goto_scene ch4book_sc2ainfiltrate\n\n*label try_to_steal\nYou crouch low to the ground like a salamander. Then you watch and wait for a moment when all the Whips' backs are turned. When it happens, you don't waste any time. You slither out into the clearing.\n\nYou freeze in place when a head turns to you. A.J. looks right at you, right in your eyes.\n*if(relA >= 70)\n\t${Hhe} grins, winks, and looks away.\n\t*goto try_to_steal_2\n*else\n\t*goto aj_alarm\n\n*label try_to_steal_2\nYou scoot forward one more inch, and you're close enough to reach out and grab the diary!\n*if(Secrecy >= 65)\n\tYour fingers close around the spine. A shout rings out, but it's only Adam poking Kyle in the eye. You have the good sense not to react. Instead, you scuttle backward, silently and swiftly, back into the shadows. You did it! You have the diary!\n\n\tYou stand, turn, and walk away very quickly, still being careful not to make a sound. As soon as you hear the distant cry of, \"Hey, where's the book?\" you break into a run.\n\n\tYou run at full speed down the hill to the school, pausing at the gate only long enough to drop the notebook into your backpack. You slide into your seat, panting. Mrs. Greeley gives you the hairy eyeball, but the delay was worth it. You don't know whether the stolen notebook is part of Corley's mystery or if it's a separate crime, but either way, you've scored a major clue!\n\n\t*finish\n*else\n\tYour fingers close around the spine. At that moment, a foot stamps down on the front cover. \"Well, well! What's going on here?\" Kyle demands, peering down at you. \n\n\t\"Looks like someone's stealing from us!\" says Adam.\n\n\tThey appear to have made up as quickly as they started fighting, thanks to their common enemy: you. You stand up, brushing the leaves off your shirt with great dignity. \"It's not stealing if it doesn't belong to you,\" you explain.\n\n\t*goto not_stealing\n\n*label aj_alarm\n\"${Name}?\" says A.J., surprised and not entirely pleased. \"What are you doing here?\"\n\nAll the other Whips drop what they are doing and turn and look at you. Adam has the presence of mind to snatch the book back up from where it lies near his foot.\n\nYou stand up, brushing the leaves off your shirt with great dignity. Looks like you are forced into a confrontation. \"Excuse me, but that book does not belong to you. I am going to take it back now.\" You hold out your hand confidently, but, of course, Adam doesn't give up the book.\n\n*goto not_stealing\n\n*label confront_whips\nYou burst out into the clearing. The Whips looks up in surprise.\n\n\"Excuse me, but that doesn't belong to you!\" you shout. \"I am going to have to take that back.\"\n\n*label not_stealing\nKyle laughs. \"What are you, the cops? You can't confiscate our things.\"\n\n\"Besides,\" says Adam, \"it doesn't belong to you, either.\"\n\n\"Well, I am going to give it back to its rightful owner,\" you say. \n\n\"So are we!\" says Rina, putting on a fake angelic face. \"When we're done with it.\" \n\n\"How are you going to take it?\" Kyle stands up from the log, drawing himself to his full height. He has about four inches on you, and he glowers down at you. The other Whips stand behind him menacingly. \"You gonna take it from us, shrimp?\"\n\nHmm. You didn't really think this through, did you? \n\n*choice\n\t#\"Yes. Put up your dukes!\"\n\t\t*goto fight\n\t#\"No, no. I couldn't, and wouldn't, just take it. I want to buy it.\"\n\t\t\"I'm listening…,\" says Kyle.\n\n\t\t*goto money_choice\n\n*label money_choice\n*choice\n\t*if(Money >= 20)\n\t\t*disable_reuse #$20.\n\t\t\t\"Okay, yeah. Sure,\" says Kyle enthusiastically.\n\n\t\t\t*set acquisition_method \"bought\"\n\t\t\tYou have the feeling he would have settled for less. Still, a deal is a deal. You give him twenty bucks, and he gives you the notebook.\n\t\t\t*set have_vitessas_book true\n\t\t\t*set Money -20\n\t\t\t*finish\n\t*if(Money >=10)\n\t\t*disable_reuse #$10\n\t\t\t\"Mmmm… Okay,\" says Kyle agreeably.\n\n\t\t\tYou give him ten bucks, and he gives you the notebook.\n\t\t\t\n\t\t\t*set acquisition_method \"bought\"\n\t\t\t*set have_vitessas_book true\n\t\t\t*set Money -10\n\t\t\t*finish\n\n\t*if(Money >=5)\n\t\t*disable_reuse #$5\n\t\t\t\"Uh…\" Kyle looks at his friends.\n\n\t\t\t\"Aw, just do it,\" says Adam. \"I don't think we'll get any more, and it's not like anybody else is offering.\"\n\n\t\t\tKyle hesitates, then nods. \"Okay. Give me the money.\"\n\n\t\t\tYou feel you have made a good offer. It's about the lowest Kyle would have accepted. You give him the five bucks, and he gives you the notebook.\n\t\t\t\n\t\t\t*set acquisition_method \"bought\"\n\t\t\t*set have_vitessas_book true\n\t\t\t*set Money -5\n\t\t\t*finish\n\n\t*if(Money >=1)\n\t\t*disable_reuse #$1\n\t\t\t\"You'll have to do better than that!\" says Kyle.\n\n\t\t\t*goto money_choice\n\t*if(Money >= 0.50)\n\t\t*disable_reuse #$0.50\n\t\t\t\"Are you kidding me?\" says Kyle. \"I couldn't buy a soda for fifty cents. Try again.\"\n\n\t\t\t*goto money_choice\n\t*if(Money >= 0)\n\t\t*disable_reuse #$${Money}\n\t\t\t*if(Money > 5)\n\t\t\t\t\"Sounds like a deal,\" says Kyle.\n\n\t\t\t\tYou hand over the money, and Kyle hands you the notebook. You feel victorious, but at the same time, your money is wiped out! You'll always wonder if you could have offered less.\n\n\t\t\t\t*set acquisition_method \"bought\"\n\t\t\t\t*set have_vitessas_book true\n\t\t\t\t*set Money 0\n\t\t\t\t*finish\n\t\t\t*else\n\t\t\t\t\"Sorry, not enough,\" says Kyle. \"What else have you got to offer me?\"\n\t\t\t\t\n\t\t\t\t*goto money_choice\n\t#A favor to be named later.\n\t\tKyle stares at you for a long moment. Then he grins. \"All right,\" he says. \"Let's write it out officially.\" He takes a blank page from the back of the notebook and writes \"One Favor, to be delivered from ${Name}, without complaint or argument, at any time.\" He shoves it at you. \"Sign.\"\n\n\t\tYou sign. Kyle grins, folds up the paper, puts it in his pocket, and hands you the notebook.\n\n\t\tYou gulp. You have the notebook now, but at what cost? Did you just sell your soul? You have no idea how big this \"favor\" is going to be or when it's going to come. You wonder if you should have just paid in money. \n\n\t\t*set acquisition_method \"indebted\"\n\t\t*set have_vitessas_book true\n\t\t*set owe_kyle_favor true\n\t\t*finish\n\n*label fight\nKyle throws the first punch and hits you squarely in the jaw. You gasp and swing wildly, but Kyle ducks, and Adam grabs you from behind. You made a bad decision!\n\n\"Hey, leave ${her_u} alone!\" A.J. shouts. \"Get off. Come on!\"\n\n\"Stop it. Ow! A.J.!\" cried Adam. There is the noise of scuffling. Adam drops you abruptly, and you tumble to the ground.\n\nA.J. kneels next to you and examines the bruise on your face. \n\n\"You have to spoil everything,\" Rina whines. \n\nShaking ${his} head, A.J. frowns sternly at the other Whips. \"It wasn't a fair fight.\"\n\n\"To be fair,\" Kyle points out, \"${she_u} started it.\" \n\nWhile the Whips are bickering, you notice that the secret notebook has somehow ended up on the ground. Nobody is looking at it—or at you. You quietly reach out and grab it, shoving it under your backpack.\n\nJust in the nick of time. Down the hill, a school bell rings. Max cracks open a soda. It's clear that Kyle, Adam, Rina, and Max don't plan on going into school anytime soon. \n\n\"Second bell. Come on, ${Name},\" says A.J. gruffly, helping you to your feet. You don't need to be told twice. You grab your backpack and begin walking briskly down the hill. So far, nobody seems to notice that you have their book. You'd like to keep it that way.\n\nA.J. walks after you, keeping close to you as you hurry off down the hill.\n\n*fake_choice\n\t#\"Thank you for rescuing me.\"\n\t\t*set relA %+30\n\t#\"You didn't need to interfere. I had it under control.\"\n\t\t*set relA %+10\n\t#\"Your dumb friends almost beat me up!\"\n\t\t*set relA %-10\n\n*comment endif\n\n*if(relA \u003c= 35)\n\t\"You didn't need to go and mess with those guys,\" A.J. scolds. \"They're dangerous.\"\n\n\t\"What do you see in them, anyway?\" you say. \"How can you be friends with them?\"\n\n\tA.J. shakes ${his} head. \"You just don't get it. You're always barging into trouble. I won't always be there to bail you out, you know.\"\n\n\tA.J. speeds up ${his} pace and walks on ahead. You frown. You wonder if A.J. even still likes you, even a little, or if ${he} would have done the same for anyone. \n\n\t*finish\n*elseif(relA \u003c= 55)\n\tA.J. looks at you and shakes ${his} head, laughing a little. \"You're either really brave or really dumb.\"\n\n\t\"Brave,\" you assure ${him}. \"But thanks anyway. To be honest, I wasn't sure if we were still rescuing each other out of jams.\"\n\n\t\"Nah, I'll probably be rescuing you forever,\" says A.J. wearily.\n\t\n\t*goto rela_choice\n*elseif(relA \u003c= 75)\n\t\"Don't make me pick between you and the guys,\" A.J. asks you. \"I know they're not your favorite people, but they're good guys if you follow the code. You just need to learn the code.\"\n\n\t\"I'll probably never get in good with the Whips,\" you say. \"But it's good to know you've got my back, either way.\"\n\n\t\"Always,\" says A.J. quietly.\n\t\n\t*goto rela_choice\n*elseif(relA > 75)\n\t\"Are you hurt? Let me look at you.\" ${Hhe} holds your chin in one hand and turns your face from side to side, looking for bruises.\n\n\t\"I'm fine. I'm fine!\" you grin, batting ${him} away. You bat your eyelashes at ${him} jokingly. \"My hero. My knight in shining armor.\"\n\n\t\"Aww, g'wan,\" A.J. mutters, but ${he}'s grinning. \"None of that. I take care of you, and you take care of me. That's how it's always been, and that's how it'll always be.\" \n\t\n\t*goto rela_choice\n\n*label rela_choice\n*choice\n\t#\"Okay. Well, I owe you one. See you later.\"\n\t\tNo time to fool around. You have a secret book to investigate!\n\n\t\t*finish\n\t#Punch ${him} playfully in the arm.\n\t\t*set relA %+10\n\n\t\t*if(relA > 60)\n\t\t\t\"Hey, now! No more fighting,\" A.J. warns, grinning. \"Or I'm gonna get you!\"\n\n\t\t\tThe two of you chase each other all the way down to the school. Later, you'll have to investigate the book, but for now, you're enjoying your friendship with your number-one sidekick.\n\n\t\t\t*finish\n\t\t*else\n\t\t\tA.J. offers you a smile, but then rubs ${his} arm. Maybe you shouldn't have punched so hard.\n\n\t\t\tAs the two of you walk down to the school in silence, your mind wanders to the notebook in your backpack. You wonder what secrets it holds! \n\n\t\t\t*finish\n\t#Kiss ${him}.\n\t\t*goto kiss\n\t*if(datingA)\n\t\t#\"I want to break up.\"\n\t\t\t*goto breakup\n\n*label kiss\n*if(relA > 65)\n\tYour heart still beating from the adrenaline of the moment, you lean forward and kiss A.J. smack on the lips! As you lean back shyly, A.J. blinks, then grins. Reaching out, A.J. takes your elbow in ${his} hand, pulls you close, and kisses you back.\n\t*set datingA true\n\t*achieve romancer\n\t*if(datingS) or (datingE)\n\t\t*achieve multiromancer\t\n\n\tThe two of you walk down the hill hand in hand in comfortable silence. Part of your mind is thinking about A.J. \n\t*if(datingS)\n\t\tPart of your mind is thinking about Shashi. \n\t*if(datingE)\n\t\tPart of your mind is thinking about Evan. \n\t*comment endif\t\t\n\tAnd part of your mind is thinking about the notebook in your backpack. You wonder what secrets it holds!\n\n\t*finish\n*else\n\tAs you lean forward, A.J. ducks backward, avoiding your kiss. \"Uh, what was that?\"\n\n\t*fake_choice\n\t\t#\"Don't you want to kiss me?\"\n\t\t\t\"Um, no,\" says A.J. \"Sorry.\"\n\n\t\t\t\"Oh,\" you say. \n\t\t#\"Nothing. Never mind.\"\n\t\t\tA.J. nods. \"We will forget this ever happened.\"\n\t\t#\"Umm? What was what?\"\n\t\t\tA.J. narrows ${his} eyes at you, then shrugs. \"Nothing.\" \n\n\t*comment endif\n\n\tAs the two of you walk down the hill in silence, you can't help but feel a little rejected. Still, you can't dwell on it. You have a top secret notebook in your backpack. You wonder what secrets it holds!\n\n\t*finish\n\n*label breakup\n*if(relA \u003c 35)\n\t\"Oh man. So do I,\" says A.J., looking relieved. \n\n\tYou shake on it. \n\n\tThe funny thing is, as you walk down the hill toward school, you feel closer to A.J. than you have since you started dating! \n\n\t*set datingA false\n\t*set relA %+20\n\t*finish\n*elseif(relA \u003c 75)\n\tA.J. frowns. \"You do?\"\n\n\t\"Don't you? It's just, you know, things are kind of weird between us, and I want to be free to see other people,\" you explain.\n\n\t\"Oh,\" says A.J. \"Okay. I guess. Whatever. I don't care. We're broken up. Okay?\"\n\n\t\"Okay,\" you say.\n\n\tA.J. speeds up and walks on ahead. You frown. You should feel relieved, but you wonder if you hurt A.J.'s feelings.\n\n\tOh well. You have a secret notebook to investigate!\n\n\t*set datingA false\n\t*finish\n*else\n\tA.J. looks stricken. \"What? No! Why?\"\n\n\t\"I don't know. I kind of want to be free to date other people,\" you explain.\n\n\t\"Well, couldn't you date them and me at the same time?\" A.J. asks.\n\n\t*choice\n\t\t#\"I don't think that would be fair to either of you, do you?\"\n\t\t\t*set relA %-20\n\t\t\tA.J. frowns. \"I guess not. Okay, fine. Whatever. Be free. Date whoever you want. Maybe I'll date someone else, too!\"\n\n\t\t\t\"Okay. Thanks,\" you murmur.\n\n\t\t\tAs A.J. walks on ahead, you wonder if you handled that the right way. But you don't have time to dwell on it. You're young, you're single, and you have a notebook full of secrets in your backpack!  \n\n\t\t\t*set datingA false\n\t\t\t*finish\n\t\t#\"The truth is, I just want out.\"\n\t\t\t*set relA %-40\n\t\t\tA.J. pouts. \"Fine. Whatever,\" ${he} mutters. \"I don't care. So we're broken up, okay?\"\n\n\t\t\tAs A.J. walks on ahead, you wonder if you handled that the right way. But you don't have time to dwell on it. You're young, you're single, and you have a notebook full of secrets in your backpack! \n\n\t\t\t*set datingA false\n\t\t\t*finish\n\t\t#\"Yeah, okay. That would work.\" \n\t\t\tA.J. nods. \"Okay. Great,\" ${he} says, but ${he} doesn't look super excited about this development.\n\n\t\t\tA.J. slips ${his} hand into yours and you walk down the hill together in silence. A.J. seems a million miles away. Soon, so are you. You're thinking about the notebook full of secrets that's in your backpack right now!\n\n\t\t\t*finish\n", "ch4book_sc3inspectbook": "Home at last. You place the notebook on your desk. The words on the cover seem to shout at you,\n\n[i]The Book of Truths[/i]\n*line_break\n[i]Private. Keep out![/i]\n\nYou know the notebook is full of unflattering information about everyone in class. So far, all of it has seemed to be true. You don't know who is figuring out all this stuff and writing it down. Maybe someone who is as good at detective work as you! You would learn a lot if you read the contents of the book.\n\nStill, this is somebody's private, secret notebook. Clearly, they didn't mean for it to get into the Whips' hands. You can't help but feel that if you look, you will be just as bad as the Whips are.\n\n*choice\n\t#Read it! Read it! Read it!\n\t\t*goto read\n\t#I cannot read it. I have too much integrity. I will have to track down its rightful owner in some other way.\n\t\t*goto dont_read\n\t#Well, maybe I'll just glance in the front cover to see if there's a name.\n\t\t*goto glance\n\n*label glance\nYou're in luck! Just inside the front cover, the following is written in pink pen:\n\n[i]This notebook belongs to Vitessa. If you are not Vitessa and you are reading this, stop! You won't like what you find….[/i]\n\nYou try your hardest not to read the facing page, but you can't help but catch your own name written in the text!\n\n*choice\n\t#Just see what it says about me.\n\t\t*goto read_about_self\n\t#No! Close the notebook now! \n\t\t*goto know_its_vitessas\n\n*label dont_read\nYou examine the outside of the notebook, careful not to flip open the pages. It's a standard black and white marble notebook. The words on the front cover are written in pink pen. Stick-on earrings are also stuck to it. You'd be willing to bet it belongs to a girl.\n\n*label whose_choice\n*choice\n\t*disable_reuse #Dust for fingerprints.\n\t\t*goto dust\n\t#Analyze the handwriting.\n\t\t*goto analyze_hw\n\t#Offer it to Corley. It doesn't matter whose it is. Corley hired you to find out how the secret got out, and that's what you did.\n\t\t*goto offer_corley_unsolved\n\n*label dust\n*if(haveCompact)\n\t*goto dust2\n*else\n\t*temp additional_foundation_options false\n\tYou don't have any powder to dust with. You need a fine, pale dust, something like makeup powder.\n\n\t*if(relE \u003c 30)\n\t\tEvan would probably have some, but you feel you've burned that bridge.\n\n\t\t*goto whose_choice\n\t*else\n\t\tStruck with inspiration, you call up Evan's phone. \"I need to borrow some face powder.\"\n\n\t\t*if(relE \u003c 50)\n\t\t\t\"Um, not likely,\" says Evan. \"Excuse me, I have work to do.\" And he hangs up.\n\n\t\t\tYou think he may be a bit miffed at you.\n\n\t\t\t*goto whose_choice\n\t\t*else\n\t\t\t\"It's not really the kind of thing you just borrow!\" he exclaims. \"You need a specific color and everything. And it's not hygienic to share brushes. Do you want to buy something from the store? Malibu Colors Number 489 would be best for you. It's $20.99 for a basic compact.\"\n\n\t\t\t*goto evanchoice\n\n*label evanchoice\n*choice\n\t#\"It's not for me. I want to dust for fingerprints.\"\n\t\t*set Secrecy %-20\n\t\t*goto tell_evan\n\t#\"It's not for me. It's for a friend.\"\n\t\t*set lie_count +1\n\t\t*set Secrecy %+20\n\t\t\"Well, how can you expect me to do a friend's colors over the phone? Have her come into the store,\" says Evan.\n\n\t\t\"Oh, forget it,\" you say. This is getting too complicated.\n\n\t\t*goto whose_choice\n\t*disable_reuse#\"Don't you have any cheaper compacts?\"\n\t\t*set relE %-10\n\t\t\"None that would work nearly so well for your skin tone,\" says Evan, aggrieved.\n\n\t\t\"Okay, but I'm on a budget. How much is the cheapest compact you have?\"\n\n\t\t\"It's $3.89, but I would not recommend it,\" says Evan. \"At least go with the Victoriana 490. It's $8.59.\" \n\t\t*set additional_foundation_options true\n\t\t\n\t\t*goto evanchoice\n\n\t*if(Money >= 20.99)\n\t\t#\"$20.99 is no problem. Can you deliver it?\"\n\t\t\t*set Secrecy %+10\n\t\t\t*set Greed %-20\n\t\t\t*set relE %+20\n\t\t\t*set Money -20.99\n\t\t\t\"Sweet!\" says Evan. \"I get a commission, you know. I'll drop it at your house between appointments. Have the money ready.\"\n\n\t\t\t*goto evan_over\n\t*if(additional_foundation_options = true) and (Money >= 8.59)\n\t\t#\"I'll take the $8.59 one.\"\n\t\t\t*set Greed %-10\n\t\t\t*set relE %+10\n\t\t\t*set Money -8.59\n\t\t\t\"Cool,\" says Evan. \"I get a commission, you know. I'll drop it at your house between appointments. Have the money ready.\"\n\n\t\t\t*goto dust2\n\t*if(additional_foundation_options = true) and (Money >= 3.89)\n\t\t#\"I'll take the 3.89 one.\"\n\t\t\t*set relE %-10\n\t\t\t*set Money -3.89\n\t\t\t\"Okay, but I can't be responsible for that travesty on your face. You can come to the store if you want to buy it,\" says Evan.\n\n\t\t\tFair enough. The errand takes you half an hour. Soon enough, you are back at home with your compact and your notebook, ready to dust!\n\n\t\t\t*goto dust2\n\t*if(additional_foundation_options = true) and (Money \u003c 3.89)\n\t\t#\"I can't afford any of those.\"\n\t\t\t*if(relE > 50)\n\t\t\t\t\"Too bad,\" says Evan sympathetically. \"Maybe when you're older, Mom will hire you to be a cashier. Or you can become an entrepreneur like me!\"\n\n\t\t\t\tYou chat a bit and then hang up. You're back to square one.\n\n\t\t\t\t*goto whose_choice\n\t\t\t*else\n\t\t\t\t\"Too bad. Gotta go,\" says Evan. \"Customers.\"\n\n\t\t\t\tYou hang up. You're back to square one.\n\n\t\t\t\t*goto whose_choice\t\t\t\n\n*label evan_over\nGood as his word, Evan drops by twenty minutes later with the compact. You pay him in cash.\n*if(Greed \u003c 40)\n\tYou offer him a tip, but he refuses.\n*if(Greed > 60)\n\tYou try to haggle, but he doesn't budge. \"I don't set the price,\" he explains.\n\n*if(datingE) or (relE > 80)\n\tHe can only stay a few minutes—he has an appointment—but it's a pleasure to see him, even for such a short time. You chat and eat cookies.\n\n\tAfter you hug him good-bye, you remember your task and run back to your room with the powder.\n\t*goto dust2\n*elseif(relE > 65)\n\tHe can only stay a few minutes—he has an appointment. You chat a bit, then wave him off. You're kind of glad he couldn't stay longer because you have work to do! You run back to your room with the powder.\n\n\t*goto dust2\n*else\n\tHe leaves as soon as the transaction is complete. You're kind of glad he couldn't stay longer because you have work to do! You run back to your room with the powder.\n\n\t*goto dust2\n\n*label tell_evan\n\"Oh, wow. Is this for an investigation? What are you dusting?\" says Evan. \n*if(relE > 65)\n\t\"Can I help?\"\n\n\t*goto tell_evan2\n*else\n\n\t*goto tell_evan2\n\n*label tell_evan2\nSuddenly, you feel you have been indiscreet. \n\n\"Um, nothing,\" you say. \"Never mind. It's confidential.\"\n\n*if(relE > 75)\n\t\"I understand,\" says Evan. \"Well, I'm always available to be your deputy.\"\n\n\t\"Thank you,\" you say. \"That means a lot. So what else is going on?\"\n\n\tYou chat a bit longer, then hang up and look at the notebook. You're back to square one. \n\n\t*goto whose_choice\n*else\n\t\"Aw, come on,\" says Evan. \"Tell, tell.\" \n\n\t\"Maybe later. So what else is going on?\"\n\n\tYou chat a bit longer, then hang up and look at the notebook. You're back to square one. \n\n\t*goto whose_choice\n\t\n*label dust2\nThe notebook has a shiny surface and you think there could be some good fingerprint speciments on there! You take out your powder compact. You gently shake a small amount of light-colored powder onto the notebook cover. You know from detective books that you may smear the fingerprints if you apply the powder with your hand or the brush, so you blow it lightly to spread it over the cover.\n\nThe powder clings to notebook in the shape of many fingerprints! \n\nFirst, you need to separate out yours. You know you handled the book. (You wish you'd worn gloves.) On a separate sheet of paper, you carefully make stamps of your own fingerprints to compare against. Several of the prints on the book look identical, so you know you can ignore them.\n\nYou also know that Kyle, and maybe the other Whips, also handled the book. You don't have a sample of Kyle's prints to check against, unfortunately. You realize that getting fingerprint samples will be the hardest part of this project. Where have you seen fingerprints before? \n\nSuddenly, you have a brainstorm. Last year, when you were out of school with bronchitis, your whole class painted you get-well cards as an art project. The paint was messy, and a lot of kids got fingerprints all over their cards. You dig around in your dad's unsorted scrapbooking box until you find the pile of cards.\n\nIt's a gold mine! A.J.'s card is the messiest, with fingerprints everywhere. Shashi actually fingerpainted h
