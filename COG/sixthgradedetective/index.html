er card, turning blue and purple thumbprints into little birds. Evan tried to be neat, but his card has a healthy number of accidental prints. Vitessa's has three perfectly formed, pink-painted prints, one thumb and two index fingers. Finnegan's card is the only one with no fingerprints or paint splotches whatsoever. Kyle wasn't in your class, so you didn't get a card from him.\n\nStill, you compare your other classmates' prints against the notebook. When you get to Vitessa's card, you are amazed! The most common print on the notebook matches Vitessa's prints in every way, from the size to the pattern, including a distinctive fold on the thumbprint. \n\nIt's Vitessa's notebook! Of course!\n\n*page_break\n*goto know_its_vitessas\n\n*label analyze_hw\nYou make careful note of the unusual features of the handwriting on the cover. \"The Book of Truths\" is written in block letters, which are very hard to analyze. Most people's block letters look alike. But \"Private. Keep out!\" is written in lower-case printing, and that seems to have more personality. It's large, loopy handwriting. It doesn't look like Mrs. Greeley's neat cursive or A.J.'s messy scrawl, but you don't know anyone else's handwriting off the top of your head. You need handwriting samples to compare it to. \n\nSuddenly, you have a brainstorm. Last year, everyone was required to give everyone else a card on Valentine's Day. You always thought it was silly, but now you're glad. You dig around in your dad's unsorted scrapbooking box until you find a pile of valentines.\n\nShashi's handwriting is tiny and neat. Finnegan's is perfect cursive. Evan's is wobbly and childlike. You don't have a sample of Corley's writing, of course. You're thinking about how you can get a hold of this when you see the valentine by Vitessa.\n\n[i]Dear ${Name},[/i]\n\n[i]Try to have a happy Valentine's Day even though you will never get a date.[/i]\n\n[i]From,[/i]\n*line_break\n[i]Vitessa[/i]\n\nThat's it. The \"a\"s with little hats, the upward-slanting \"e\"s. This is definitely Vitessa's writing.\n*page_break\n\n*goto know_its_vitessas\n\n*label read_about_self\n*if(suspected_secret = \"Mickey Mouse underpants\") and (suspected_secret_veracity != \"false\")\n\t\"${Name} is always bending over to look at loose receipts and little bits of fuzz on the ground. Clues, ${she_u} calls them. I say it's trash! Anyway, today ${she_u} had a huge rip in ${hers_u} pants and the rest of us got a full view of ${hers_u} Mickey Mouse underpants. Ha! Ha!\"\t\n\t\n\t*goto keep_reading\n*else\n\t\"Someone needs to tell ${Name} about deodorant.\" \n\n\tYou sniff your armpits. You think you smell okay…. But you're probably used to it.\n\n*label keep_reading\nYou can't help but keep reading. What else don't you know?\n\n*goto reading_book\n\n*label read\nAs you open the book, the first thing you see is the message on the inside cover: \n\n[i]This notebook belongs to Vitessa. If you are not Vitessa and you are reading this, stop! You won't like what you find….[/i]\n\nSo that answers that question. It figures that Vitessa has mean, private thoughts about everyone. You're dying to know what Vitessa has written about all of you. You keep reading!\n\n*goto reading_book\n\n*label reading_book\n*set read_vitessas_book true\nThe book is full of observations written about you and the other classmates. Some examples: \n\n[i]I saw A.J. eating out of the trash. Is ${he} poor or just disgusting?[/i]\n\n[i]Why does Evan carry around nail polish?[/i]\n\n[i]Finnegan looked shocked at his IQ test results. He threw away the page, but I fished it out of the trash later and it said his IQ was average. Ha! Ha! Maybe this will teach him some humility.[/i]\n\nWow. In some ways, Vitessa is a detective, too. A detective of meanness. \n\n[i]New girl today! Corley is quiet as a mouse and wears clothes her grandma made her. Gross. But she's the first new kid we've gotten in awhile. Maybe I can mold her into something useful.[/i]\n\n*if(datingA)\n\t[i]So A.J. and ${Name} are finally going out. They haven't said anything but it's so totally obvious. I hope they don't plan on having kids—their babies would be bank robbers.[/i]\n\n*if((datingA = false) and (nocrushA = false)) and (relA >= 75)\n\t[i]A.J. and ${Name} need to stop dancing around each other and make out already.[/i]\n\n*if(relA \u003c 40)\n\t[i]What happened between A.J. and ${Name}? They used to be joined at the hip. I thought they were going out, TBH. Maybe they had a lover's quarrel.[/i]\n\n*if(datingE) or (relE >= 75)\n\t[i]Evan is always smiling at ${Name}. He's crushing so hard.[/i]\n\n\tYou feel your face getting hot.\n \n*if(datingE = false) and (relE \u003c 75)\n\t[i]Evan is always smiling at A.J. He's crushing so hard.[/i]\n\n*if(datingS) or (relS > 75)\n\t[i]Shashi and ${Name} need to stop flirting in their dumb game. It's sickening.[/i]\n\n*if(datingA) and (datingE)\n\t*if(datingS)\n\t\t[i]Jeez, I think ${Name} is going out with A.J. AND Shashi AND Evan. Never thought ${she_u} had it in ${her_u}.[/i] \n\t*if(datingS = false)\n\t\t[i]Jeez, I think ${Name} is going out with A.J. AND Evan. Never thought ${she_u} had it in ${her_u}.[/i] \n\t[i]Wonder who will beat up who or if they will all just pile into one big cuddle-puddle?[/i]\n*comment endif\n\n[i]Gross, Corley is friends with Shashi now. That seals it. I can't help her.[/i]\n\n[i]Ha! Ha! Evan applies makeup to old ladies in his spare time. That explains a lot. Like why his favorite game is bridge! I wonder if he wears Depends?[/i]\n*if(evan_secret_out = false)\n\n\tHow did she know about the makeovers? You thought you were the only one who knew about that!\n*comment endif\n\n[i]Was wrong about Finnegan. He's worse than ever.[/i]\n\n[i]Just found out that Corley[/i]\n\nThe line cuts off at the end of the page. The next two pages are stuck together. From the orange tint, it looks like someone may have spilled orange soda while reading. How frustrating! You were about to find out for sure if Vitessa revealed Corley's secret in these pages. \n\nThe rest of the pages are blank. Just waiting for more mean notes.\n\nHow do you try to separate the stuck pages?\n\n*choice\n\t#Pull real hard.\n\t\t*set damaged_vitessas_book true\n\t\t*goto pull_hard\n\t#Wash them.\n\t\t*set damaged_vitessas_book true\n\t\t*goto wash\n\t*if(haveFloss)\n\t\t#Carefully slide dental floss between them.\n\t\t\t*goto slide\n\t#Make a rubbing on the next, blank page.\n\t\t*set damaged_vitessas_book true\n\t\t*goto rubbing\n\t#I don't want to mark or damage the book before returning it. Just peer at the stuck together pages in the light.\n\t\t*goto peer\n\n*label pull_hard\nQuick like a Band-Aid, right? You take the corners of the two stuck-together pages, work them apart until you can grip each with a thumb and forefinger, and pull!\n\nRrrrrip! Both pages tear in half! They're now still stuck together but also torn. \n\n*goto oh_well\n\n*label wash\nYou dampen a cloth and begin to carefully dab at the corners of the pages where the orange soda stain shines through. The good news is that the orange soda stain begins gradually to lighten. The bad news is that the pages, now damp, are even harder to separate than before. The writing is also washing off!\n\nYou stop. You are doing more harm than good.\n\n*goto oh_well\n\n*label peer\nWhen you hold the stuck-together pages to the light, you see a jumble of writing. It looks like both sides of the first page are covered in writing, as well as the front of the next. You also see the dark outline of the orange soda stain. It's impossible to read anything.\n\n*goto oh_well\n\n*label oh_well\nStill, you feel you have enough evidence to conclude that Corley's secret was probably on the next page and that the Whips found out about it from stealing and reading Vitessa's diary.\n\n*goto that_night\n\n*label slide\nYou pull out your trusty dental floss and carefully work a thread between the two pages. The floss is thin enough to slide into the narrow crack between pages, and strong enough not to get stuck or break. It takes careful, painstaking work, but eventually, you get it! The pages are separated.\n\nThe orange soda stain partially obscures the writing, but you can make out the first line easily:\n\n[i]\"I heard from my cousin that the bed-wetter from her school's lock-in last year is none other than Corley! I can't believe it.\"[/i]\n\nThat clinches it. The Whips definitely found out Corley's secret from this book.\n\n*goto that_night\n\n*label rubbing\nYou remember how to do rubbings from nature walks with your dad as a kid. You used to make rubbings of bark and seashells by placing paper over them and lightly rubbing the side of a crayon. The texture underneath the paper would create a pattern.\n\nThe same thing will work, you figure, for any indentations that have made their way onto the paper from the pressure of a pen writing on the previous page. \n\nYou find an old crayon and unwrap the paper from around it. Then, using a very light touch, you rub the first blank page. You are excited to find that the words Vitessa wrote on the previous page are very clear!\n\n\"Evan needs to lay off the cologne. We get it—you like grooming. Wash your hair.\"\n\n\"Dear Shashi: That thing you do where you pretend to make fireballs with your hands stopped being cute a long time ago. Especially in study hall. Do you think you are invisible?\"\n\n\"Mrs. Greeley always wears the same sweater. I think she will be buried in it.\"\n\nUnfortunately, nothing about Corley. But you realize that the end of Vitessa's sentence about Corley would have appeared on the back of the previous page. The indentation would be on the page before the stuck-together pages. But there is writing on that page, and you don't want to cover it up with your crayon. Besides, you're not sure you'd be able to read the rubbing over other writing.\n\n*goto oh_well\n\n*label offer_corley_unsolved\nThe next morning, Corley is waiting for you in the schoolyard. \"Any updates?\" she asks. \"How did the Whips know my secrets?\"\n\n\"They had insider tips,\" you explain. \"They were reading this.\" You pull the notebook from your bag.\n\n\"Ahem.\" \n\nYou look over your shoulder. Vitessa is standing behind you, her arms crossed. \"I think you have my notebook.\" \n\n\"This is yours?\" you say.\n\n\"Yes. I lost it last week. Give it back.\" \n\n\"Prove it's yours,\" you challenge.\n\n\"Look inside the front cover, genius,\" says Vitessa.\n\nYou do. Inside is written, \n\n[i]This notebook belongs to Vitessa. If you are not Vitessa and you are reading this, stop! You won't like what you find….[/i]\n\n\"Oh,\" you say.\n\n*gosub consider_options\n\n*goto do_about_it\n\n*label know_its_vitessas\n*set know_book_is_vitessas true\n*goto that_night\n\n*label that_night\nYou can piece together what happened pretty well now. Vitessa has been writing mean observations about class members. Adam stole Vitessa's notebook to prove himself to the Whips. When the Whips discovered what was in the notebook, they used the information to embarrass other kids, including Corley.\n\n*gosub consider_options\n\nYou can't sleep all night, thinking about it.\n\n*page_break\n*goto nextmorn_solved\n\n*label consider_options\nThe question is, what are you going to do about it? Vitessa was the victim of a theft. You should return her property…right? But she was using the notebook purely for evil, so does she deserve to have it? Besides, Corley is the one who hired you—not Vitessa. Shouldn't your allegiance be to her? \n*if(book_pay_rate > 0)\n\tEspecially since she's the one paying you. You won't get your money if you don't show her how the Whips got her secrets.\n\n*return\n\n*label nextmorn_solved\nThe next morning, you find Corley and Evan sitting at the edge of the schoolyard. Corley often sits alone and reads a book, while Evan usually plays ball with the guys. Today, it seems, he is excluded. \n\n\"Any updates?\" Corley asks eagerly. \"How did the Whips know my secrets?\"\n\n\"They found a diary,\" you explain. \"It was all written down.\n*if(evan_secret_out = false)\n\tYour secrets, too, Evan.\nThe writer dug up all our secrets and wrote them down. Then the Whips stole the notebook.\" \n\n\"Who was the writer?\" Evan asks.\n\n\"Do you have it? Can I have it, please?\" says Corley anxiously. \"I mean—not please. I mean, yes, please, but also I'm serious. That's what I want for my $${book_pay_rate}.00. The notebook. That way, I know nobody else can get to it.\"\n\n\"Notebook?\" says a voice. You turn around and see Vitessa staring at you, eyes narrowed, drumming her fingers on her elbow.\n\n*goto do_about_it\n\n*label do_about_it\n*choice\n\t#Let Corley decide what to do with the notebook. She hired me, after all. \n\t\t*set relC %+40\n\t\t*set relV %-20\n\t\t*if(book_pay_rate > 0)\n\t\t\t*set Greed %+20\n\t\t*goto give_corley\n\t#Return the notebook to Vitessa. She may be mean, but it is her property.\n\t\t*set relV %+40\n\t\t*goto give_vitessa\n\t#If both girls want the notebook, that sounds like an opportunity. Sell it to the highest bidder.\n\t\t*set Greed %+40\n\t\t*set relC %-20\n\t\t*set relV %+20\t\t\n\t\t*goto sell_notebook\n\t#Destroy the notebook. No good will come of anyone else seeing or reading it.\n\t\t*set Secrecy %+40\n\t\t*goto destroy\n\n*label give_corley\n*set detectivePoints +1\nVitessa watches in horror as you hand Corley the notebook. \"Hey!\" she cries. \"That's mine!\"\n\n\"It's Corley's now, and she can decide what to do with it,\" you declare. \n\nVitessa puts her hands on her hips. \"What gives you the right to give my property to Corley?\"\n\n\"What gives you the right to write mean things about people?\" you counter.\n\n\"It's not illegal to write mean things. Besides, it says 'private.' You weren't supposed to read it!\" says Vitessa.\n\n\"The information is out. The Whips read it first. You can't commit other people's secrets to paper. It could fall into the wrong hands,\" you explain. \n\n\"Oh, like yours?\" snorts Vitessa. \n\nCorley crosses her arms over the notebook, holding it tightly to her chest. \"I don't want anyone else to see it. Ever.\"\n\n\"Forget it,\" says Vitessa, waving her hand. \"I don't want it anymore. I can start a new notebook anytime I want. I don't care if you know what I think about you. I'll tell everyone. I think you are a [i]rat[/i]!\"\n\nShe stomps off, and you begin to wonder if she had a point. Then you look at Corley, hugging the notebook to her chest and smiling at you, and you feel you did the right thing.\n\n*if(book_pay_rate > 1)\n\tEspecially when Corley pays you $${book_pay_rate}.00. Cha-ching!\n\t*set Money +book_pay_rate\n*if(book_pay_rate > 0) and (book_pay_rate \u003c 1)\n\t*temp book_cents book_pay_rate *100\n\tEspecially when Corley pays you {book_cents} sweet cents. Cha-ching!\n\t*set Money +book_pay_rate\t\n*goto endingness\n\n*label give_vitessa\n*set detectivePoints +1\nYou turn to Vitessa. \"Here.\"\n\nVitessa looks surprised. \"Um, thanks,\" she says. The word sounds rusty in her voice, like a creaky door that hasn't been used much. \"Where did you find it, anyway?\"\n\n\"The Whips. They must have stolen it.\"\n\n\"You were the writer?\" Corley asks. She looks at Vitessa, betrayed. \"You wrote stuff about me?\"\n\n\"Well, nobody was supposed to read it. It says 'private,'\" says Vitessa, annoyed. \"Grow up, Corley. Nobody cares about your stupid sleepover accident.\"\n\nCorley looks down and sniffles quietly.\n\nVitessa turns to you. \"How about you? Did you read it?\"\n\n*choice\n\t#\"Just enough to know you're a terrible person.\"\n\t\t*set relV %+10\n\t\tVitessa sighs. \"Everyone is so uptight.\" \n\n\t\t\"But just because you are a terrible person, it doesn't mean you deserve to have things stolen from you. I found something that belonged to you, so I am returning it. It's only fair.\"\n\n\t\t\"I get it. You'd do it for anyone. You don't like me. Well, I don't like you either,\" says Vitessa. Then she smiles a little. \"But thanks.\" \n\n\t\tAs she walks off, you turn to Corley. \"I hope someday you'll understand.\"\n\n\t\tCorley just shakes her head. \"The deal is off.\"\n\t\t\n\t\t\"I kind of figured.\"\n\t\t\n\t\tShe shoves her hands in her pockets and trudges off. You feel bad for her, but you know in your heart you did the right thing.\n\t\t\n\t\t*goto endingness\n\t#\"Yes, and it's amazing! So many secrets! You are a really good detective.\"\n\t\t*set relV %+30\n\t\t*set relC %-20\n\t\tCorley gasps. \"You're on her side?\"\n\n\t\t\"Of course I am!\" you say. \"I wish I could find out that many secrets about people. Vitessa, will you be my deputy?\"\n\n\t\tVitessa smiles. \"I work for nobody,\" she says. \"But if you ever need to know a secret about someone, you know who to call.\" \n\n\t\tShe slides the notebook in her purse, tosses her hair, and walks off into the sunset.\n\t\t\n\t\t\"I hope you know the deal is off!\" Corley snaps.\n\t\t\n\t\tYou smile sweetly. \"Well, I got you to be more assertive. That's thanks enough for me.\"\n\n\t\t*goto endingness\n\t#\"No. Your secrets are safe with me.\" \n\t\t*set Secrecy %+20\n\t\t\"Surrre.\" says Vitessa, raising a disbelieving eyebrow. You hand her the notebook.\n\t\t*if(damaged_vitessas_book)\n\t\t\tShe flips through it. \"There are orange soda stains and crayon marks in it. And this page is torn.\"\n\n\t\t\tYou shrug. \"Er…the Whips must have done it.\"\n\n\t\t\tShe narrows her eyes at you. Then she sighs and turns away.\n\t\t*comment endif\n\n\t\tAs she walks off, Corley frowns at you. \"I can't believe you gave it back to her. The deal is off, I hope you know. She's just going to keep writing mean things and leaving them out where anyone can see!\"\n\n\t\t\"It was hers,\" you say. \"It's only fair.\"\n\n\t\t\"Oh, I guess,\" Corley grumbles. \"Why do you have to have so much integrity?\"\n\n\t\tYou smile. \"I'm glad you understand.\" \n\t\t\n\t\t*goto endingness\n\n*label sell_notebook\n*set detectivePoints +1\nThe bell rings then, but it's good timing. You want to get the girls' bids separately. \"Gotta go!\" you yelp and run into the school as fast as your legs will carry you without looking back.\n\nAt lunch, you find Corley sitting alone, reading a book. You sit down next to her. \"You really want to protect your secrets, don't you?\"\n\nShe looks up and nods.\n\nYou lift the corner of the notebook from the bag. \"Well, you know, I have the notebook right here where they're written. You can have it if you want….\" \t\t\nShe reaches for it.\n\n\"Ah…ah…ah,\" you say, pushing the notebook back down into your bag. \"Not so fast. How much would you pay for it?\"\n\nCorley looks confused. \"I don't know. However much I can afford. I told you I would pay you to stop the rumors. I guess if you give me the notebook, you're doing that.\"\n\n\"Let's talk numbers. I have to look after my interests, you know. If your price is too low, I can look elsewhere.\" \n\nCorley looks disgusted. \"We had a deal. I thought you were doing this to help me. Now you're trying to jack up the price? I can't believe you're being so mercenary about this. I thought better of you.\" \n\nYou walk away while she is still lecturing and find Vitessa by the vending machine.\n\n\"You want your notebook back, right?\" you say.\n\n\"You know that,\" she says warily.\n\n\"How much would you pay to…?\"\n\n*temp vitessa_pay_rate book_pay_rate*1.1\n*set vitessa_pay_rate *100\n*set vitessa_pay_rate round(vitessa_pay_rate)\n*set vitessa_pay_rate/100\n*if(vitessa_pay_rate \u003c 10)\n\t*temp vitessa_pay_rate 10.00\n\n\"$${vitessa_pay_rate},\" she says immediately.\n\n\"Done,\" you say.\n\nYou hand her the notebook, and she hands you the money.\n\n\"Pleasure doing business with you,\" you say.\n\n\"You as well,\" she smiles slightly. \"Surprisingly. We should do business more often.\" \n\nIt's strange. You've lost Corley's respect, but you and Vitessa have both come away both thinking better of each other.\n\n*set Money +vitessa_pay_rate\n*finish\n\t\t\n*label destroy\n*achieve destroysource\nAbruptly, you turn and walk to the edge of the playground. Corley watches you with a puzzled expression. As she and Vitessa watch, you toss the notebook over the fence and into the street, where it is run over by a car.\n\n\"What are you doing?\" Vitessa cries. \"That was my notebook!\"\n\n\"That notebook was too dangerous,\" you explain to them. \"Secrets hold too much power. Now nobody can have it.\" \n\nCorley and Vitessa walk up to the fence and stare at the notebook. Another car and a bus have run over it now, and it's completely torn apart and tire-blackened. That's the end of the notebook.\n\n*label endingness\n*page_break\n*temp ending_companion \"A.J\"\n\n*if(evan_doubted_you)\n\t*set ending_companion \"Evan\"\n\t*goto evan_apology\n*else\n\t*if(suspected_secret = \"crush on Shashi\") or (relS > relA)\n\t\t*temp ending_companion \"Shashi\"\n\t\tAs the bell rings, Shashi walks with you toward the school. \"Wow! I saw the whole thing. I can't believe Vitessa was the one spreading those mean rumors! Well, actually, I completely can. She is the worst. I hope Corley is okay.\"\n\t\t\n\t\t\"She's had a rough couple of days,\" you agree.\n\t\t\n\t\t\"She could probably use a friend. We should be nice to her. Especially with the Whips messing with her, too! They're even worse than Vitessa. You should do something about them.\" \n\t\t\n\t\t*goto whips_opinion\n\t*elseif(suspected_secret = \"crush on Evan\") or (relE > relA)\n\t\t*temp ending_companion \"Evan\"\n\t\tAs the bell rings, Evan walks you in toward the school. \"Oh, man. I saw the whole thing. I can't believe Vitessa was the one spreading those mean rumors! Well, actually, I completely can.\"\n\t\t\n\t\t\"They were mean,\" you agree. \"And very…specific. Still, she didn't intend for them to get out.\"\n\t\t\n\t\t\"That's true. It was the Whips who spread it around. Arrrgh! What a bunch of jerks. I just wish you could have brought them down. Given them what's coming to them.\" Evan kicks a rock. \n\t\t\n\t\t*goto whips_opinion\n\t*else\n\t\tAs the bell rings, A.J. walks with you toward the school. \"Another day, another messed-up situation, huh?\"\n\t\t\n\t\t\"Gotta love this place,\" you remark.\n\t\t\n\t\t*if(deputyA) and (relA > 75)\n\t\t\t\"How am I doing as deputy?\" \n\t\t\t\n\t\t\tYou grin. \"Not bad.\" \n\t\t*comment endif\n\t\t\n\t\tA.J. shakes ${his} head. \"I can't believe Vitessa was the one spreading those mean rumors. Well, actually, I completely can. She is the worst.\"\n\t\t\n\t\t\"They were mean,\" you agree. \"And very…specific. Still, she didn't intend for them to get out.\"\n\t\t\n\t\tA.J. glances at you sidelong. \"You're blaming the Whips for this? Aw, come on. They're not that bad. They're outcasts, too, you know. They just can't stand kids who are mean or snotty or suck-ups.\"\n\t\t*if(relE > 60)\n\t\t\n\t\t\t\"Evan's not mean or snotty,\" you protest.\n\t\t\t\n\t\t\tA.J. rolls ${his} eyes. \"He kind of is. Always flashing his money around.\"\n\t\t*if(relC > 50)\t\n\t\t\n\t\t\t\"What about Corley? She's a sweetheart,\" you point out.\n\t\t\n\t\t\tA.J. looks uncomfortable. \"Well…yeah. They shouldn't have messed with Corley. I'm gonna talk to them about that.\"\n\t\t\n\t\t*goto whips_opinion\n\n*label evan_apology\n*set Secrecy %+20\n*set relE %+20\nAs the bell rings, Evan walks with you toward the school.\n\t\n\"I wasn't sure about it until Vitessa put up a big stink about the notebook, but now it's obvious that Vitessa put my secret out there, not you,\" he says. \"I'm sorry I ever suspected you, even for a second.\"\n\n*if(datingE)\n\t\"That's okay,\" you say. \"I'm just glad it doesn't affect our relationship!\"\n\t\n\t\"I just wish you could have brought the Whips down. Given them what's coming to them. Bunch of jerks.\" Evan kicks a rock.\n\t\n\t*goto whips_opinion\n*else\n\t\"That's okay,\" you say. \"I'm just glad you know that I would never reveal a secret!\"\n\t\t\n\t\"It's good to have friends you can trust,\" Evan nods. Then he sighs. \"I just wish you could have brought down the Whips.  Given them what's coming to them. Bunch of jerks.\"\n\t\n\t*goto whips_opinion\n\n*label whips_opinion\n*fake_choice\n\t#\"The Whips are a menace, and someday I will bring them down.\" \n\t\t*set Respect %+20\n\t\t*set relA %-10\n\t\t*set relE %+10\n\t\t*set relC %+20\n\t\t*set relS %+10\n\t\t*if(ending_companion = \"A.J.\")\n\t\t\tA.J. sighs. \"Okay. You gotta do what you gotta do. Just don't expect me to help you with that one.\" \n\t\t\n\t\t*if(ending_companion = \"Shashi\")\n\t\t\t\"When you do, I'd love to help,\" says Shashi. \n\t\t\n\t\t*if(ending_companion = \"Evan\")\n\t\t\tEvan nods. \"Good.\" \t\n\t\t\t\n\t#\"The Whips are kind of cool.\"\n\t\t*set Respect %-20\n\t\t*set relA %+10\n\t\t*set relE %-10\n\t\t*set relC %-20\n\t\t*set relS %-10\n\t\t*if(ending_companion = \"A.J.\")\n\t\t\tA.J. smiles. \"Right?\" \n\t\t\n\t\t*if(ending_companion = \"Shashi\")\n\t\t\tShashi frowns. \"I guess they have a certain chaotic rogue charm, but I just wish they wouldn't make fun of my friends.\"\n\t\t\n\t\t*if(ending_companion = \"Evan\")\n\t\t\tEvan shakes his head. \"I guess you and I will never see eye to eye on this one. I hate them.\"\n\t\t\t\t\t\n\t#\"The Whips are just misunderstood.\" \n\t\t*set Respect %-10\n\t\t*set Greed %-10\n\t\t*set relA %+20\n\t\t*set relE %-10\n\t\t*set relC %+10\n\t\t*if(ending_companion = \"A.J.\")\n\t\t\tA.J. nods seriously. \"Yes. Exactly. You get it.\" \n\t\t\n\t\t*if(ending_companion = \"Shashi\")\n\t\t\tShashi frowns. \"I guess they have a certain chaotic rogue charm, but I just wish they wouldn't make fun of my friends.\"\n\t\t\n\t\t*if(ending_companion = \"Evan\")\n\t\t\tEvan makes a face. \"I'm sorry—I just can't agree. They're not just mean but boring. All black, all the time? Where's the imagination?\"\n\t\t\t\t\t\n\t#\"I'd be happy to take on the Whips if there were any money in it.\" \n\t\t*set Greed %+10\n\t\t*set relA %-10\n\t\t*set relE %+10\n\t\t*set relC %-10\n\t\t*if(ending_companion = \"A.J.\")\n\t\t\tA.J. sighs. \"Okay. You gotta do what you gotta do. Just don't expect me to help you with that one.\" \n\t\t\n\t\t*if(ending_companion = \"Shashi\")\n\t\t\t\"When you do, I'd love to help,\" says Shashi. \n\t\t\n\t\t*if(ending_companion = \"Evan\")\n\t\t\tEvan nods. \"Well, of course. That only makes good business sense.\" \t\n\t\t\n\t#\"I have no comment on the Whips at this time.\"\n\t\t*set Secrecy %+20\n\t\t\"Right,\" says ${ending_companion}. \"Playing it close to the vest, as always.\" \n*goto secret_test\n\n*label secret_test\n*if(suspected_secret = \"crush on Shashi\") and (suspected_secret_veracity = \"true\")\n\t*temp crush_object \"Shashi\"\n\t*temp he_co \"she\"\n\t*temp him_co \"her\"\n\t*temp his_co \"her\"\n\t*goto about_the_secret\n*elseif(suspected_secret = \"crush on Evan\") and (suspected_secret_veracity = \"true\")\n\t*temp crush_object \"Evan\"\n\t*temp he_co \"he\"\n\t*temp him_co \"him\"\n\t*temp his_co \"his\"\n\t*goto about_the_secret\n*elseif(suspected_secret = \"crush on A.J.\") and (suspected_secret_veracity = \"true\")\n\t*temp crush_object \"A.J.\"\n\t*temp he_co he\n\t*temp him_co him\n\t*temp his_co his\n\t*goto about_the_secret\n*else\n\t*goto unsecret_end\n\n*label about_the_secret\nMost of the playground has emptied out by now, and you and ${crush_object} are practically alone. You glance sidelong at ${him_co}. You feel a little awkward ever since the Whips teased you about ${him_co}, and you feel you have to bring it up. Scratching the back of your head, you begin, \"Um, I don't know if you've heard the rumors going around. About me…and you…\"\n\n\"Oh,\" says ${crush_object}, turning slightly pink. \"You mean that you, like, have a crush on me or whatever? Forget it. I figured that was made up.\"\n\n*choice\n\t#\"Right. Totally made up.\"\n\t\t*set lie_count +1\n\t\t${crush_object} nods. \"Rumors are dumb. Come on—race you to class.\"\n\t\t\n\t\tThe two of you run into the school together.\n\t\t\n\t\t*finish\n\t#\"Rumors are unreliable. Some are true, and some are false.\"\n\t\t*set Secrecy %+20\n\t\t\"Yeah, I guess.\" ${crush_object} looks confused. \"But wait….\"\n\t\t\n\t\t\"Tag, you're it!\" you shout, running away before ${he_co} can ask any follow-up questions.\n\t\t\n\t\t*finish\n\t#\"There might be a teeny, tiny grain of truth.\"\n\t\t*set Secrecy %+10\n\t\t*goto reveal_crush\n\t\n*label reveal_crush\n*if(crush_object = \"A.J.\")\n\t*if(relA > 85)\n\t\t*goto date_the_person\n\t*else\n\t\t*goto noncomittal_reaction\n*if(crush_object = \"Evan\")\n\t*if(relE > 85)\n\t\t*goto date_the_person\n\t*else\n\t\t*goto noncomittal_reaction\n*if(crush_object = \"Shashi\")\n\t*if(relS > 85)\n\t\t*goto date_the_person\n\t*else\n\t\t*goto noncomittal_reaction\n\t\n*label noncomittal_reaction\n\"Really?\" ${crush_object} blushes to the tips of ${his_co} ears. You've never seen ${him_co} look so flustered. \"Um. That's cool. That's really…cool.\"\n\nYou're sweating bullets, and you have no idea how to respond. \"Okay,\" you say. \"Well…just so you know.\" \n\n${crush_object} nods and shoots you a shy smile. \n\nThe second bell rings, and you and ${ending_companion} run ahead into the school.\n\n*finish\n\n*label date_the_person\n*if(crush_object = \"A.J.\")\n\t*set datingA true\n\t*achieve romancer\n\t*if(datingE) or (datingS)\n\t\t*achieve multiromancer\t\n\t*set relA %+30\n*if(crush_object = \"Evan\")\n\t*set datingE true\n\t*achieve romancer\n\t*if(datingA) or (datingS)\n\t\t*achieve multiromancer\t\n\t*set relE %+30\n*if(crush_object = \"Shashi\")\n\t*set datingS true\n\t*achieve romancer\n\t*if(datingA) or (datingE)\n\t\t*achieve multiromancer\t\n\t*set relS %+30\n\t\n\"Really?\" ${crush_object} grins widely. \"'Cause, uh…I kind of…maybe…feel the same way.\" \n\nYou hardly dare to believe it. \"Yeah? Well, um…would you want to go out sometime?\"\n\n${crush_object} nods, ${his_co} face pink. \"Sure. Yeah. Definitely.\"\n\nThe second bell rings, but you are too happy to care that you are late. You and ${crush_object} walk into the school hand in hand. \n\n*finish\n\n*label unsecret_end\n\"Whatever happens,\" you say, \"I have a feeling there are a lot more mysteries still to solve. I've really only just begun.\" \n\n\"You'll solve them,\" ${ending_companion} smiles. \"And I'll be right there with you.\"\n\nThe second bell rings, and you and ${ending_companion} run ahead into the school.\n\n*finish", "ch5bike2_sc1birthday": "[b]The Return of the Bike[/b]\n*set ch5started true\n\nYour eyes snap open. The clock reads 6:40 AM. Your alarm hasn't gone off yet and the room is still dark, your curtains drawn. So what woke you up? \n\nYou hear a creak on the floorboards, and as your eyes adjust to the darkness, you perceive a shadowy figure lurking in your doorway!\n\n*choice\n\t#Attack the figure.\n\t\t*set Respect %-10\n\t\t*set Secrecy %-10\n\t\t*goto attack\n\t#Pretend to be asleep. \n\t\t*set Secrecy %+20\n\t\t*goto pretend\n\t#Call out, \"Hello?\"\n\t\t*set Secrecy %-10\n\t\t*set Respect %+10\n\t\t*goto call_out\n\t#Call out, \"Get out of here, intruder!\"\n\t\t*set Secrecy %-10\n\t\t*set Respect %+10\n\t\t*goto call_out\n\t#Turn on the light. \n\t\t*set Secrecy %-20\n\t\t*goto light\n\n*label pretend\nNot only is there a shadowy figure in your doorway, but you can feel a strange object on your bed, near your feet. You don't know what's happening, and you kind of wish you hadn't even woken up. You remain motionless and pretend nothing is wrong.\n\nThe shadowy figure passes through the door into the hallway, quietly closing the door behind him. You hear footsteps walking away. Phew. You're glad that's over.\n\nWhen you're sure the figure is gone, you turn on the light and examine the object on your bed. It's a small gift-wrapped box. A note affixed to the box reads, \"Happy birthday, honey! Love, Mom and Dad.\"\n\nOh, right! It's your birthday. \n\n*page_break\n*goto open_gift\n\n*label attack\nYou leap out of bed and throw yourself against the shadowy figure. He's not expecting the attack and falls heavily to his knees. You begin pummeling him with your fists. He doesn't resist. He just says, \"Oof!\"\n\nWait, you recognize that voice. You stop punching, get up, and dust yourself off. \"Oh, hi, Dad.\"\n\n\"Happy…birthday,\" he groans.\n\nYou blink. Oh, right, it is your birthday. You flick on the light and glance back at your bed. There is a small gift-wrapped box there.\n\n*goto respond_to_dad\n\n*label light\nYou flip on your bedside lamp, flooding the room with a warm glow. Your dad is standing in the doorway. He blinks sheepishly in the light. \"I tried not to wake you. Well, the cat's out of the bag now.\" He nods toward a small gift-wrapped box sitting on the foot of your bed. \"Happy birthday, sweetie!\"\n\n*goto respond_to_dad\n*label call_out\n\"Shh, honey. You don't have to get up,\" the shadowy figure says in your dad's voice. \"Just a little visit from the Birthday Fairy.\" And he drops a small package on your bed.\nYou flip on the light. It's a small, gift-wrapped box. Oh, right! It's your birthday. \n*goto respond_to_dad\n\n*label respond_to_dad\n*fake_choice\n\t#\"Ooh, prezzie!\"\n\t\t*set Greed %+10\n\t\t*set relD %+10\n\t\t\"You're welcome.\" Dad winks.\n\t#\"Oh, Father, you shouldn't have. Being your ${child} is gift enough.\"\n\t\t*set Respect %+10\n\t\t*set relD %-10\n\t\t\"Okay, okay. You're laying it on a little thick,\" says Dad.\n\t#\"Okay, thanks, but you still can't go sneaking into people's rooms. I am twelve now—I need my privacy.\"\n\t\t*set Secrecy %+10\n\t\t\"Noted,\" says Dad.\n\"I'll leave you to open your present. Come downstairs when you are ready.\" \n\n*goto open_gift\n\n*label open_gift\nYou pick up the gift-wrapped box. It's very lightweight, small and rectangular, about right for a watch or a nice pen in a box. Too small to contain a bike, unfortunately.  \n\nYou hold it up to your ear. It emits no noise.\n\nYou sniff it. It is odorless.\n\nOkay, enough. There is only one way to find out what the gift contains. You tear off the wrapping paper and lift the lid.\n\nInside, there is nothing but a rolled-up scroll. A certificate for a gift to come later, perhaps? You unroll the scroll and read:\n\n*label clue_one\n*set got_clue_one true\n[i]One, twelve, twenty-four,[/i]\n*line_break\n[i]Sing and open up the door.[/i]\n*line_break\n[i]To find your next birthday clue,[/i]\n*line_break\n[i]Find the bird who says…oh well, you know! [/i]\n\n*choice\n\t*disable_reuse #\"Open up the door.\" Go to the front door.\n\t\t*goto door\n\t#\"Find the bird.\" Go to the cuckoo clock.\n\t\t*goto cuckoo\n\t*disable_reuse #\"Sing.\" Go to the shower.\n\t\t*goto shower\n\n*label door\nYou run down the stairs to the front door. You don't see anything unusual on the inside of the door—no gifts or clues. You open the door and examine the outside. \n\n\"Nice pajamas!\" remarks a passing dog walker.\n\nYou run back inside and shut the door. You think you hear your mother laughing somewhere.\n\nOkay, no clues on the front door… You review the clue.\n\n*goto clue_one\n\n*label shower\nYou run to the bathroom. The door is shut tight and locked! Is this part of the treasure hunt? Do you have to figure out how to open it? You shake the doorknob.\n\n\"Someone in here!\" calls your mother's voice. \n\nA moment later, she emerges, wearing a bathrobe. Her hair is wet from the shower. When she sees you standing there with the scroll, she smiles. \"Think there's a clue in the bathroom, huh?\"\n\n\"Is there?\" you say.\n\n\"I'll never tell!\" She walks down the hall and into her bedroom.\n\nYou're beginning to doubt there is a clue in the bathroom, and sure enough, you don't find any more scrolls around the tub area.\n\nYou review the clue.\n\n*goto clue_one\n\n*label cuckoo\nYou pad down the hall to the cuckoo clock. It looks normal. You examine the top and underside but don't see a clue. \n\nSuddenly, the clock strikes 7, the little door opens, and the wooden cuckoo bird pops out, holding a scroll in its bill! You grab the scroll. Here's what it says:\n\n*label clue_two\n*set got_clue_one true\n[i]You found the clue upon the hour.[/i]\n*line_break\n[i]You're clearly a detective of some power.[/i]\n*line_break\n[i]Your birthday should be sweet, not sour.[/i]\n*line_break\n[i]To make your cake, you need…[/i]\n\n*choice\n\t#Flour. To the kitchen!\n\t\t*goto flour\n\t*disable_reuse #Flowers. Your cakes always have little flowers. To the garden!\n\t\t*goto garden\n\t#Flower power. That's your parents' answer to everything. To the VW Bus!\n\t\t*goto fake_garage\n\t*disable_reuse #To cower. Cower and hide in place.\n\t\t*goto cower\n\n*label garden\nYou run outside into the garden. It's really more of a meadow. Instead of neat rows of veggies, like Mrs. Carver's garden, you just have an unkempt field of wildflowers. Your mom says she has no time for that kind of thing, and your dad claims he prefers things to be free and natural. You think maybe he just doesn't like to mow. \n\nYou spend an enjoyable twenty minutes frolicking through the black-eyed Susans and purple coneflowers. In the early morning sunshine, the flowers seem to glow. Dew drops sparkle on their leaves. \n\nNo new clues, though. You come back inside and review your second clue.\n\n*goto clue_two\n\n*label fake_garage\n*set solved_minigame true\nYou run outside and throw open the side door to the garage. Immediately, you see a shiny new purple bike! It has a red bow on it! Wow! You didn't expect the game to be over so quickly. And you certainly didn't expect a bike for your birthday. A wonderful bike! You run to it.\n\nYour parents appear in the doorway behind you. \n\n\"You found it!\" says your dad.\n\n\"Wow, you solved the treasure hunt quickly,\" says your mom. \"I didn't even see you go into the kitchen for the third clue…. Well, anyway, happy birthday!\"\n\n*goto inspect_bike\n\n*label cower\nYou crawl into a dark cabinet and wrap your arms around yourself. Nothing can get you here.\n\nYou also can't find any more clues. You haven't stumbled on any in the cabinet. You climb out again and review your second clue.\n\n*goto clue_two\n\n*label flour\nYou run down the stairs and into your narrow galley kitchen, where your dad is usually bustling around beneath a large rack of hanging copper pots. This morning, the kitchen is empty, although the scent of coffee and bacon lingers in the air. You hear muffled voices in the dining room.\n\n\"…clue number three already!\"\n\n\"Let's get into position.\"\n\nYou reach for the ceramic flour jar and open it. A clue is taped to the inner top of the jar.\n\n*label clue_three\n*set got_clue_three true\n[i]The more you grow, the further you roam,[/i]\n*line_break\n[i]Traveling near and far from home.[/i]\n*line_break\n[i]I promise this gift is not a mirage.[/i]\n*line_break\n[i]To find it, go to the…[/i]\n\n*choice\n\t*disable_reuse #Collage. Look behind the collage you made when you were five.\n\t\t*goto collage\n\t*disable_reuse #Massage. You need to go to massage school and become a qualified masseuse.\n\t\t*goto massage\n\t#Garage, right? It's got to be garage.\n\t\t*goto garage\n\n*label collage\nYou find the collage you made your mother for Mother's Day when you were five. It shows pictures you cut out of a magazine that remind you of her: a laptop computer, some beakers, a cup of coffee, a math equation, and a cake. You take the frame down from the wall and turn it over, but, to your surprise, there is no clue there. Darn, you were sure you had it that time….\n\nYou review the third clue.\n\n*goto clue_three\n\n*label massage\nWell, if you need to be a licensed massage therapist in order to get the next clue, this treasure hunt is going to last a long time. You march into the living room to argue this point with your parents, but just as you walk in, you catch them slipping out the front door. \n\nYou watch from the window as they cross the wildflower meadow and the gravel driveway and walk into the garage. You decide to follow them.\n\n*goto garage\n\n*label garage\n*set solved_minigame true\n*achieve treasurehunter\nYou open the door to the garage. Both of your parents are standing there, smiling. Between them is a shiny new purple ten-speed bike with a bow on it!\n\n\"Happy birthday!\" they chorus.\n\n\"Did you like our game?\" your mom asks. \"We know you like to play detective.\"\n\n*fake_choice\n\t#\"I loved it! Thank you!\"\n\t\t*set Respect %+20\n\t\t*set relD %+20\n\t\t*set relM %+20\n\t\tYour parents beam. \n\t#\"Are you kidding? It was mean! But I'll get you back. For your next birthday, I'll put your gift in a tank full of sharks.\"\n\t\t*set Respect %-20\n\t\t*set relD %+30\n\t\tYour dad laughs. \"I'm looking forward to it!\"\n\t\t\n\t\tYour mom looks at you both with fond exasperation.\n\t#\"It was sweet, but you really don't have to do stuff like that. I mean, I am twelve now. I'm getting a little old for games.\"\n\t\t*set relM %-10\n\t\t*set relD %-20\n\t\tYour parents look put out. \n\n\t\t\"Nobody's too old for games,\" says your mom. \"Games can teach us a lot.\"\n\n\t\t\"I guess,\" you say.\n\t#\"Child's play. Too easy.\"\n\t\t*set Respect %-20\n\t\t*set relM %+30\n\t\t\"Oh, it was, was it?\" Your mom smiles. \"I told you the clues were too easy, David. Don't worry, ${Name}. Next year, we'll make it five times harder.\"\n*comment endif\n\n*label inspect_bike\n\"Well, what are you waiting for?\" says Dad brightly. \"Ride your gift!\" \n\nYou pounce on the bike. It's perfect! You've only seen such a nice bike one other time in your life: A.J.'s Red Lightning. In fact, this bike looks like it could be Red Lightning's purple sister. \n\n\"This is so great!\" you gush. \"I'm going to call it Purple Thunder.\"\n\n\"I'm so glad you like it,\" says your mom. \"I wasn't sure if it would be too big.\" \n\n*fake_choice\n\t#\"It's perfect. How did you find such a wonderful model?\"\n\t\t*set Respect %+20\n\t#\"It is, a little. And it seems a little banged up.  But it's fine, it's fine.\"\n\t\t*set Respect %-20\n\t#\"It looks expensive. How did you afford it?\" \n\t\t*set Greed %+20\n\nYour parents exchange looks.\n\n\"To be honest, it's preowned,\" your dad admits. \"But it's in great condition. Completely refurbished.\"\n\n\"There's no shame in buying used,\" your mom reminds you. \"It's less wasteful and better for the environment.\" \n\n*label remove_bow\nAs you remove the bow from the handlebars, you see something that makes you freeze up. There's a lightning bolt carved into the frame, just below the seat. It's subtle, almost hidden beneath a layer of new paint, but it's still clearly visible if you know where to look.\n\nYou know that lightning bolt. You watched A.J. carve it with ${his} penknife. \n\nYour heart sinks. \n*set know_ajs_bike true\n*set hasBike \"you\"\n*set yourBike \"Purple Thunder\"\n*achieve bikefinder2\n\n*choice\n\t#\"Oh, no! This is A.J.'s bike!\"\n\t\t*set Secrecy %-20\n\t\t*goto its_ajs\n \n\t#\"Whoa, you guys stole a bike? I always knew you were weird, but I never thought you were thieves!\"\n\t\t*set Respect %-20\n\t\t\"Hey, whoa, whoa!\" says your dad. \"I may have gotten into trouble from time to time as a youngster, but I've never been a thief. I would certainly never steal a kid's bike!\"\n\n\t\t\"But this is A.J.'s bike,\" you say.\n\n\t\t*goto its_ajs\n\t#\"As much as I love and respect you both, I am afraid I must place you under citizen's arrest.\" \n\t\t*set Respect %+20\n\t\tYour mom raises an eyebrow. \"For what?\"\n\n\t\t\"Bike theft!\" you say. \"This is A.J.'s bike.\" \n\n\t\t*goto its_ajs\n\t#\"Gotta go!\"\n\t\t*set Secrecy %+20\n\t\t*goto leave_abruptly\n\n*label its_ajs\n\"The Carvers' brown bike? Oh, no, honey, it's used, but it's much newer than that,\" says your mom.\n\n\"No, ${his} old bike. The one that was stolen.\" \n\nYour dad scratches his head. \"Wasn't that one red?\"\n\nNow that you are looking for it, you can see faint streaks of red along the lower frame. You point them out. \"This one's been repainted.\" \n\n\"Good eye!\" says your dad. \"We had no idea. Are you saying we unwittingly bought stolen merchandise?\" \n\n\"Are you sure?\" Your mom frowns. \"So far, the evidence is slim. A lot of bikes are red.\" \n\nYou shake your head. \"I'm sure. Oh man. A.J. will know it's ${hiss} as soon as ${he} sees it. I can't keep it. Not unless I want to stop being friends with A.J.\"\n\n\"That might not be such a bad thing,\" your mom comments. \n\nDad shakes his head. \"You should never let a material possession get in the way of a friendship. But it's your present, sweetie. We'll support you no matter what you decide. What do you want to do with the bike?\"\n\n*choice\n\t#\"I want to return it to A.J.\" \n\t\t*set Greed %-30\n\t\t*set giveplan true\n\t\t*goto return_parents\n\t#\"I want to go to Hank and demand your money back.\"\n\t\t*set Greed %+20\n\t\t*set Respect %+20\n\t\t*goto demand_parents\n\t#\"Forget A.J.! A.J. and I are through, you hear, through. It's me and the bike now!\"\n\t\t*set Greed %+50\n\t\t*goto keep\n\n*label return_parents\n\"If you're sure it's even ${his} bike,\" says your mom doubtfully. \n\n\"Either way, I think giving it to A.J. is a very sweet impulse,\" says your dad. \"You're a nice kid.\" \n\nYou run a hand lovingly over the bike's sleek, shiny frame and sigh. \"No point in getting too attached. I'll go take it to ${him} now.\"\n\n*goto ajs\n\n*label demand_parents\nYour mom nods. \"Well, it's up to you. That's the receipt wrapped around the handlebars. Hank promised me that you could exchange or return it within three days, for any reason.\" \n\nYou put the receipt in your pocket, get on the bike, and head out.\n\n*page_break\n*goto_scene ch5bike2_sc2hanks\n\n*label leave_abruptly\nYou have to get out of there. You get on the bike and just start riding—out of the garage, down the drive, and down the street. The bike speeds effortlessly and noiselessly along the road. The wind feels good on your face.\n\nAs you pause at a stop sign, you notice that the receipt for the bike is still attached to one of the handlebars. Your parents paid $${GBUResaleCost} for Red Lightning. You feel a mix of emotions. The bike is wonderful, but it's not yours. A.J. will know it as soon as ${he} sees it. You can't keep it—not if you want to keep being friends with A.J. \n\n*choice\n\t#Give it to A.J.\n\t\t*set Greed %-30\n\t\t*set giveplan true\n\t\t*goto ajs\n\t#Return it to Hank and get my parents' money back. \n\t\t*set Greed %+20\n\t\t*set Respect %+20\n\t\t*goto_scene ch5bike2_sc2hanks\n\t#Keep it! I don't care! A.J. and I are through, you hear? Through! It's me and the bike now!\n\t\t*set Greed %+50\n\t\t*set keepplan true\n\t\t*goto keep\n\n*label ajs\nYou walk the bike all the way up A.J.'s walk and onto the porch. You ring the bell.\n\nUncle Darren answers! \"Oh, hey, kid. Nice wheels. A.J.'s not home, unfortunately. I'll tell ${him} you came by.\"\n\n\"Oh. Okay,\" you say.\n\n\"Oh, and guess what?\" says Darren.\n*gosub darren_convo\n\n*if(solved_rl = false)\n\tAs you cut across the lawn, walking the bike, you look over into the backyard and notice A.J.'s mom picking beans off the trellis. On impulse, you walk over and wave.\n\n\t*gosub ajs_mom\n\n*goto_scene ch5bike2_sc3blackmail\n\n*label darren_convo\n\"I got the job I was interviewing for, and I'm moving back to town. You'll be seeing a lot more of me, kid!\"\n\n*fake_choice\n\t#\"Oh, awesome!\"\n\t\tYou grin. Darren grins back.\n\n\t\t\"I'm really going to shape up. I've turned over a new leaf,\" says Darren earnestly. \"And\n\t\t*goto new_leaf\n\t#\"Oh, ugh.\"\n\t\t*goto not_thrilled\n\t#\"Oh, ah.\" \n\t\t*set Secrecy %+10\n\t\t*goto not_thrilled\n\n*label not_thrilled\n\"Not thrilled, huh? Most people aren't,\" says Darren cheerfully. \"I admit I'm a lazy layabout, but I've turned over a new leaf. \n*goto new_leaf\n\n*label new_leaf\nI'm really going to try to help my sister this time. I can spend time with A.J., help out around the house…. It's been tough for her since A.J.'s dad left.\"\n\nIt surprises you to hear that Darren wants to help Mrs. Carver, considering that he sold Great Brown Ugly right from under her nose. \"So you regret selling her bike?\" you ask.\n\n\"Hey!\" Darren looks up and down the street. It's empty. In a low voice, he says, \"I'd appreciate you not spreading that story around. It's not my proudest moment. Let's just keep it in the family, okay?\"\n\n\"Sorry,\" you say. So Darren values privacy. You file away this observation in your mind. If you want information from him, you may have to approach it in a roundabout manner.\n\nStill speaking quietly, he explains, \"And in my defense, I was trying to help A.J. Our family may not have much, but we still have our dignity. The brown bike just didn't suit A.J.'s style. I felt really bad about ${him} losing the red one.\" \n\n*choice\n\t#\"How much do you know about that theft?\"\n\t\t*set Secrecy %+20\n\t\t\"Nothing,\" says Darren. \"Why would I know anything? I wasn't even in town then.\"\n\n\t\t\"I don't know. I thought you might have heard something.\"\n\n\t\t\"Well, I didn't,\" says Darren.\n\n\t\t\"Okay,\" you say.\n\n\t\t*goto darren_confession_check\n\t#\"That's understandable. Any uncle would feel the same.\"\n\t\t*set Secrecy %+40\n\t\t\"Yeah, I guess,\" says Darren.\n\n\t\tYou wait, in case he wants to say more. He doesn't. There is a silence.\n\n\t\t\"I felt pretty bad about it myself,\" you add. \"Almost bad enough to do something about it.\"\n\n\t\tDarren doesn't respond to that. He just frowns.\n\n\t\t*goto darren_confession_check\t\t\n\t#\"You know, I'm still looking for the thief. And you have a history of stealing bikes from the Carver household.\"\n\t\t*set Secrecy %-20\n\t\t*goto darren_gets_the_implication\n\t#\"Did you steal Red Lightning?\"\n\t\t*set Secrecy %-40\n\t\t*goto darren_gets_the_implication\n\n*label darren_gets_the_implication\nDarren looks taken aback. \"Me? The thief?\" He claps a hand to his chest. \"You wound me. I wouldn't do that to A.J. I know how much ${he} loved that bike. Anyway, I couldn't have. I wasn't even in town then.\"\n\n\"Oh. Right,\" you say. \"Sorry. Never mind.\" \n\n*label darren_confession_check\n*if(Secrecy > 65)\n\t*gosub darrens_confession\n\t*return\n*else\n\tYou feel that Darren knows more than he is saying. But he obviously doesn't want to talk. His hand drifts in the direction of the doorknob. \"Well, so long!\" \n\t*return\n\n*label darrens_confession\nYou're about to turn around and leave, but Darren says, \"Wait.\" He looks thoughtful. \"A.J. says you have a reputation for being a good secret keeper. Is that true?\"\n\nYou nod. \"I find out a lot of secrets, and if I couldn't keep them, nobody would trust me.\" \n\n\"Good. I need to be able to trust you. Because I am going to tell you something that you can never, ever tell A.J. Okay? You know I love A.J., but this would hurt ${him}.\"\n\nYour eyes widen. \"What?\"\n\nDarren looks around cautiously. Lowering his voice, he says, \"Kim—A.J.'s mom—she stole the bike. I mean, not technically, since it was her property. She came to school that day, unlocked it, and sold it. She needed the money. That's why you need to drop this investigation. A.J. can never find out. It would ruin ${his} trust in ${his} mother. But she didn't do it to hurt ${him}. She needed the money to put food on the table and keep the lights on.\"\n*set solved_rl true\n\n*fake_choice\n\t#\"That's awful! Are things really that bad?\"\n\t\t*set Respect %+20\n\t\t\"They were,\" Darren nods solemnly.\n\t#\"That doesn't justify stealing someone's stuff. Adults suck.\"\n\t\t*set Respect %-20\n\t\t\"You have to look at it from her point of view. She was at the end of her rope,\" Darren explains. \n\t#\"In that case, I would have done the same. Desperate times call for desperate measures…and sometimes theft.\"\n\t\t*set Greed %+20\n\t\t\"Life is complicated,\" Darren sighs.\n\t#\"She should have asked A.J. for the bike. I'm sure ${he} would have been happy to help.\"\n\t\t*set Greed %-20\n\t\t\"Maybe so. I know she felt she had no choice,\" says Darren. \n\"Don't worry, though. Things are better now. She got a job. Plus, I'm in town now. I can help if things ever get that bad again.\"\n\nYou nod. \"Okay. Well, I'll go find A.J.\"\n\n\"Remember,\" says Darren, \"don't tell A.J. any of this!\"\n\n*set solved_rl true\n*return\n\n*label ajs_mom\n\"Hi,\" you say.\n\n*if(Respect > 60)\n\tMrs. Carver smiles warmly.\n\t*goto ajs_mom2\n*elseif(Respect > 50)\n\tMrs. Carver smiles.\n\t*goto ajs_mom2\n*else\n\tMrs. Carver smiles warily.\n\t*goto ajs_mom2\n\n*label ajs_mom2\n\"Hello, ${Name}. What a lovely bike.\"\n\nYou pause. You know Mrs. Carver well enough to know how to get on her good side. She likes nice, polite, honest children. Then again, do you want to get on her good side?\n\n*fake_choice\n\t#Narrow your eyes accusingly. \"Look familiar? It should.\"\n\t\t*set Respect %-30\n\t\tA flicker of concern passes over Mrs. Carver's face. Then she smiles again, but this time, the smile looks forced. \"I can't say that it does. I've never had a purple bike.\"\n\n\t\t\"Doesn't it look like Red Lightning?\" you persist.\n\n\t\tMrs. Carver looks down at her hands, not at the bike. \"Oh, I don't know, a little.\" \n\t#Sigh apologetically. \"Actually, it is Red Lightning. See, my parents…\" Tell the whole story.\n\t\t*set Secrecy %-20\n\t\t*set Respect %+20\n\t\tMrs. Carver looks pale. \"I never imagined you would end up with it. I suppose that's a happy ending…right? At least the bike has a good owner now.\" \n\n\t\t\"Aren't you upset that Hank bought it from the thief and resold it?\" you ask.\n\n\t\t\"Oh, I can't blame him. I'm sure he didn't know it was stolen.\" \n\t#Smile sweetly. \"Thank you. With your permission, I'd like to give it to A.J.\"\n\t\t*set Respect %+40\n\t\tMrs. Carver's eyes widen. \"Oh, my goodness! What a sweetheart you are! Of course, it's all right with me. That would be a dream come true, honestly. How did you come by it?\"\n\n\t\t\"It was a gift, but I think A.J. needs it more.\"\n\n\t\tMrs. Carver puts a hand to her mouth. \"Bless your heart.\"\n\t#Wink roguishly. \"You want to buy it?\"\n\t\t*set Greed %+20\n\t\t*set Respect %-20\n\t\t\"Buy it?\" Mrs. Carver repeats.\n\n\t\t\"You know, because Red Lightning was stolen. It would be a good replacement,\" you say. \"Only ${GBUResaleCostString} dollars.\"\n\n\t\tMrs. Carver looks uncomfortable. \"I'm not really in the market, I'm afraid. Money's tight.\"\n*comment endif\n\n\"I'm still trying to figure out exactly what happened the day Red Lightning was stolen,\" you explain. \n\n*if(Respect \u003c 60)\n\t\"Oh, dear. You and your detective game,\" sighs Mrs. Carver. \"What you need to learn is this, dear. Sometimes in this world, you don't find things out. Sometimes it's better that way.\"\n\n\t\"What do you mean?\" you ask.\n\n\t\"Never mind. Go play.\"\n\n\tYou can tell she's not going to tell you anything else. You get on your bike and ride away.\n\n\t*page_break\n\t*return\n*else\n\t*gosub ajs_moms_confession\n\t*return\n\n*label ajs_moms_confession\nMrs. Carver bites her lip. \"${Name}, you have always been a nice, respectful child. You are a good influence on A.J. That is why I am asking you to do the right thing now. Give up the case.\"\n\n\"Give up the case?\" you cry. \"How is that the right thing?\"\n\nMrs. Carver shakes her head. \"Knowing the truth will only hurt ${him}.\"\n\nYou frown. \"I take it you know the truth.\"\n\nMrs. Carver doesn't answer.\n\n\"This is hard for me,\" you explain. \"I want to do what you say, but I'm afraid that if I give up the case, I'm shielding a criminal. What if the thief strikes again?\"\n\n\"She won't,\" says Mrs. Carver. \"I know because…she's me. I'm the thief.\"\n*set solved_rl true\n\n*fake_choice\n\t#Gasp. \"You? But why?\"\n\t\t*set Respect %+10\n\t#Nod. \"I thought as much.\"\n\t\t*set Secrecy %-10\n\t#Glare. \"How could you?\"\n\t\t*set Respect %-10\n\t#Remain impassive. \"Tell me more.\"\n\t\t*set Secrecy %+10\n\n\"Thief is the wrong word,\" Mrs. Carver explains. \"Technically, the bike was my property. I bought it. Then, two months ago, I went to the school, unlocked it, put it on my car, and drove it to Hank's to sell it.\"\n\nYou shake your head. \"I don't understand. Why would you do that to A.J.?\"\n\nMrs. Carver sighs. \"You have to understand, being an adult is not always easy. I have to put food on the table and keep the lights on. All of that costs money. And two months ago, I had none. I was on my last dollar. The electric bill was past due, and there was no food in the house. It was all I could think of to do. If I had known how much it would hurt A.J., I don't know if I would have even done that. And I won't do it again. Things are better now.  I have a job. Darren can help out. I promise it was a onetime thing.\"\n\nYou shift uncomfortably from foot to foot. It makes you feel weird to hear about Mrs. Carver's money problems. You always thought adults had it all figured out.\n\n\"And one more thing,\" says Mrs. Carver. \"A.J. can never know. Promise me that. I don't want to lose ${his} trust.\"\n\n*choice\n\t#\"I understand completely. Your secret is safe with me.\"\n\t\t*set Respect %+30\n\t\t*set Secrecy %+30\n\t\tMrs. Carver hugs you. \"I knew you would understand. I'm counting on you.\"\n\n\t\t*return\n\n\t#\"Maybe you deserve to lose ${his} trust.\"\n\t\t*set Respect %-30\n\t\t*set Secrecy %-30\n\t\tMrs. Carver looks stung. \"That hurts my feelings, ${Name},\" she says quietly.\n\n\t\tYou feel strange. You didn't know you were capable of hurting an adult's feelings.\n\n\t\tShe blinks away a tear and swallows. \"I can see you don't understand. But please, don't hurt my relationship with my only child. Don't tell. I'm counting on you.\"\n\n\t\t*return\n\n\t#\"If you talked to A.J. honestly, I know ${he} would understand.\"\n\t\t*set Respect %+30\n\t\t*set Secrecy %-30\n\t\tMrs. Carver shakes her head. \"No. I know A.J., and ${he} would see it as a betrayal. I don't want that to happen. It won't happen again, the bike is back, and everything is fine now, so all I want is to put this sorry episode behind us. Please help, ${Name}. I'm counting on you.\" \n\n\t\t*return\n\n\t#\"Buy the bike, and I'll consider the matter closed.\"  \n\t\t*set Respect %-30\n\t\t*set Greed %+30\n\t\t*set blackmail_attempts +1\n\t\tMrs. Carver frowns. \"Are you blackmailing me?\"\n\n\t\t\"I'm offering a fair deal,\" you say. \"I just want A.J. to get ${his} bike back. You say you regret what you did. Buy it back, and you can undo that. Start fresh. Plus, by surprising ${him} with the bike, you can be a hero.\"\n\n\t\tMrs. Carver considers this. \"That's true. But I don't have much money. I can only offer you…say, ${pay_rate_base_string} dollars.\"\n\n\t\t*choice\n\t\t\t#\"Sold.\"\n\t\t\t\tYou know that the bike is worth much more, but you consider the sale a good deed. Mrs. Carver seems to feel the same way. She hugs you before you walk away.\n\t\t\t\t*set hasBike \"Mrs. Carver\"\n\t\t\t\t*set yourBike \"\"\n\t\t\t\t*set Money +pay_rate_base\n\t\t\t\t*return\n\t\t\t#\"Mrs. Carver, please. It is worth a lot more. I could get ${GBUResaleCostString} dollars on the open market.\"\n\t\t\t\t\"I know,\" says Mrs. Carver. \"That is how much I sold it for. But the money is gone. I used it to pay bills. I'm sorry, ${Name}. You are asking too much.\"\n\n\t\t\t\t\"You had your chance,\" you say with a shrug, walking the bike away.\n\n\t\t\t\tMrs. Carver lets you go.\n\n\t\t\t\t*set Respect %-20\n\t\t\t\t*set Greed %+20\n\t\t\t\t*return\n\t\t\t#\"Mrs. Carver, please. My parents paid ${GBUResaleCostString} dollars for the bike. I can't let them down.\"\n\t\t\t\tMrs. Carver seems moved by this argument, and after some haggling, you land on $${reducedGBUResaleCost}. \n\t\t\t\t*set hasBike \"Mrs. Carver\"\n\t\t\t\t*set yourBike \"\"\n\t\t\t\t*set Money +reducedGBUResaleCost\n\t\t\t\t*return\n\n*label keep\nIf you're going to keep the bike, your only hope is to disguise it. A coat of paint isn't enough. You ride out to the hardware store.\n\n*label hardware_choice\n*if(disguise_rating = 0)\n\tWhat would you like to pick up? \n\n\t*goto hardware_choice_real\n*elseif(disguise_rating \u003c 5)\n\tWith the gear you've bought so far, the bike is somewhat disguised, but you think it will still be recognizable to A.J. Do you want to pick up anything else?\n\n\t*goto hardware_choice_real\n*else\n\tGreat. The bike looks completely transformed with all the gear you bought. Do you want to pick up anything else, just to be safe?\n\n\t*goto hardware_choice_real\n\n*label hardware_choice_real\n*choice\n\t*disable_reuse #Wooden dowels, twine, and spray paint. I'll attach the rods to the bike and repaint it all together to disguise the shape of the frame. ($38)\n\t\t*if(Money \u003c 38)\n\t\t\tYou don't have enough money. You have $${Money}.\n\n\t\t\t*goto hardware_choice\n\t\t*else\n\t\t\t*set disguise_rating 5\n\t\t\t*set Money -38\n\t\t\t*set currentRLColor \"blue\"\n\t\t\tYou buy all the equipment, run out to the parking lot, and build your reassembled bike right there. It takes awhile to attach the dowels, but it really gives the bike a different look. You paint it all blue, because blue is further from red than purple, and you feel it's a nondescript color that won't get a second look. Also, the blue spray paint was on sale.\n\n\t\t\t*goto hardware_choice\n\t*disable_reuse #Neon lights and streamers. ($16)\n\t\t*if(Money \u003c 16)\n\t\t\tYou don't have enough money. You have $${Money}.\n\n\t\t\t*goto hardware_choice\n\t\t*else\n\t\t\t*set disguise_rating 3\n\t\t\t*set Money -16\n\t\t\tYou go outside and attach the neon lights and streamers right away. They're distracting, all right, but they don't really change the look of the bike in and of themselves.\n\n\t\t\t*goto hardware_choice\n\t*disable_reuse #Duct tape. Lots of duct tape. ($9)\n\t\t*if(Money \u003c 9)\n\t\t\tYou don't have enough money. You have $${Money}.\n\n\t\t\t*goto hardware_choice\n\t\t*else\n\t\t\t*set disguise_rating 4\n\t\t\t*set Money -9\n\t\t\t*set currentRLColor \"duct tape covered\"\n\t\t\tYou run outside and roll the entire frame in duct tape. It takes forever. The duct tape itself doesn't change the shape of the frame, but it does make the bike look different: lumpy, weird, and ugly. In some ways, you feel you may have ruined Red Lightning. But at least this way, it will be less attractive to thieves!\n\n\t\t\t*goto hardware_choice\n\t*disable_reuse #Decal for a cheaper bike brand. ($2)\n\t\t*if(Money \u003c 2)\n\t\t\tYou don't have enough money. You have $${Money}.\n\n\t\t\t*goto hardware_choice\n\t\t*else\n\t\t\t*set disguise_rating 2\n\t\t\t*set Money -2\n\t\t\tYou run outside and slap the decal onto the back of the bike. It's not a big change, but maybe someone who didn't know much about bikes would be fooled.\n\n\t\t\t*goto hardware_choice\n\t#I'm good, thanks. Nothing for me.\n\t\t*goto finish_disguising\n\n*label finish_disguising\nYou're just \n*if(disguise_rating > 0)\n\tadmiring your handiwork\n\t*goto finish_disguising_2\n*else\n\tgiving up and getting ready to go home\n\t*goto finish_disguising_2\n\n*label finish_disguising_2\nwhen you hear a voice say \"${Name}?\"\n\nYou turn around. It's A.J.'s Uncle Darren! He's walking up to the hardware store, pulling out a pack of cigarettes.\n\n\"Nice bike,\" he says as he lights one. \n\n\"Mm-hmm,\" you agree, not sure whether he recognized it or not. You smile, hoping to distract him, and ask, \"Nice day, isn't it? What are you up to?\" \n\nIt works.\n\n\"Just about to pick up some stuff for my new place,\" Darren grins. \n*gosub darren_convo\n\nDarren stubs out his cigarette and wanders into the store. You get on your\n*if(disguise_rating > 0)\n\tnewly disguised\n*comment endif\t\nbike and ride away as quickly as your legs will pump.\n\n*goto_scene ch5bike2_sc3blackmail", "ch5bike2_sc2hanks": "*temp hank_explained false\nYou arrive at Hank's and find him doing paperwork at the reception desk.\n*if(relH > 50)\n\tHe nods at you. \"Welcome back.\"\n\n\t*goto hanks2\n*else\n\tHe rolls his eyes. \"What do you want now, kid?\"\n\n\t*goto hanks2\n\n*label hanks2\n\"I received this bike from your shop as a present,\" you say, wheeling it in the door. \"I want to return it.\"\n\n*if(relH \u003c 50)\n\t\"Wait,\" says Hank. \"I didn't sell that bike to you. How do I know you didn't just steal that bike from some kid?\"\n\n\t\"My mom and dad gave it to me this morning as a present. See? Here's the receipt.\"\n\n\t\"You could have stolen the receipt, too,\" Hank points out. \"Do you want me to call your parents? Because I'll do it.\"\n\n\t\"Go ahead!\" you say. \n\n\tKeeping a suspicious eye on you, Hank consults his own receipt book and dials a number. After a brief conversation with your mom, he hangs up the phone. \"All right,\" he grumbles. \"Your story checks out.\"\n\n\t\"See?\" you crow.\n\n\tHank grunts. \n\t*goto why_hank\n*else\n\tYou hand Hank the receipt.\n\n\t\"Oh, right. You must be the science lady's kid. She told me you might be in,\" Hank nods.\n\t*goto why_hank\n\n*label why_hank\n\"What's the reason for the return?\"\n\n*choice\n\t#\"It's stolen property and never should have been sold.\"\n\t\t*set Greed %-30\n\t\t*goto stolen\n\t#\"It's a nice bike, but it's too big for me. I would like to exchange it for a different bike.\" \n\t\t*set Greed %+30\n\t\t*goto exchange\n\t#\"I just don't want it. I'll take the ${GBUResaleCostString} in cash.\"\n\t\t*set Greed %+20\n\t\t*goto refund\n\n*label refund\n*set hasBike \"Hank\"\n\"Your mom paid me by credit card. I can't refund in cash,\" says Hank. \"I can refund her card, or I can offer you store credit.\"\n\n*goto refund_choice\n\n*label refund_choice\n*choice\n\t#\"Okay, fine, refund her card. I don't care how my mom gets her money back. I just want to wash my hands of this sorry business.\" \n\t\t*set Greed %-20\n\t\t*goto refund_card\n\t#\"Store credit works. I'll pick a different bike.\"\n\t\t*set Greed %+10\n\t\t*goto exchange\n\t*disable_reuse #\"But, mister, my mommy told me to come back with cash.\"\n\t\t*set Greed %+30\n\t\t*set lie_count +1\n\t\t*goto doe_eyes\n\n*label refund_card\n*set returned_bike true\nHank writes up a return receipt and hands it to you. As you examine it, wondering if you should give it to your mom for her records or destroy the evidence, \n*goto goodbye_rl\n\n*label doe_eyes\nYou blink at Hank with large doe eyes and let your chin tremble. \"Pleeeeease? I wouldn't want to disappoint my mommy.\"\n\n*set relH %+20\n*if(relH > 70)\n\t\"Aww, I can't say no to a cute kid like you. What harm does it do? Have your refund any way you like, sweetheart.\" Hank writes up a return receipt and hands it to you. Then he opens his cash register and counts out ten twenty-dollar bills. He passes them to you over the counter one at a time. Crisp, sweet money! \n\t*set tookcash true\n\t*set Money +GBUResaleCost\n\t*goto goodbye_rl\n*else\n\t\"No dice, kid. I know kids like you. You're all scam artists. Now pick one: store credit or card refund. Before I change my mind!\"\n\n\t*goto refund_choice\n\n*label goodbye_rl\nHank steps out from behind the counter, takes the bike by the handlebars, and pulls it away from you. \"It's just one thing after another with this one,\" he grumbles. \"I think it's cursed.\"\n\n\"What do you mean?\" you ask. \n\n*if(relH > 50)\n\t\"This bike has been nothing but trouble since the moment I bought it,\" Hank sighs.\n\t*gosub hank_explains\n\n\tHank shakes his head. \"I can't get out of my head the thought that maybe something wasn't quite right about that sale. Oh well. It's too late to do anything about it now. Time for another tune-up.\"\n\n\t*goto goodbye_real\n*else\n\t\"Nothing,\" Hank shakes his head. He nods pointedly toward the door. \"Have a nice day, now.\" \n\n\t*goto goodbye_real\n\n*label goodbye_real\nYou stare at Red Lightning—now Purple Thunder—for a long time, wishing it a silent farewell. Then you plod toward home, bikeless.\n*set yourBike \"\"\n*set hasBike \"Hank\"\n\n*goto finish\n\n*label hank_explains\n*if hank_explained\n\t*return\n\"The lady who sold it to me looked nice and respectable enough, but she acted strange. She needed cash in a hurry, she said. Had to pay the bills and put food on the table. Spun some story, said her husband just left, she was out of money, and her only choice was to sell her kid's bike. I said, 'Save your sob story, sister, I'm not overpaying.' It is a nice bike, though, so I bought it.\"\n\n\"Did you know her?\" you ask. \n\n\"I think she may have come in for a tune-up a long time ago, but I haven't seen her recently. It was a double-'kay' sound. Kelly Carter, Kay Cutter, something like that.\"\n\nYour heart sinks. \"Kim Carver?\"\n\n\"Yeah, that's it!\" Hank snaps his fingers. \"How did you know?\"\n\n\"Lucky guess.\" \n*set solved_rl true\n*set hank_explained true\n\n*return \n\n*label stolen\n*if(relH > 65)\n\t\"Stolen, jeez,\" says Hank. \"I thought there was something fishy about that lady….\"\n\n\t\"What lady?\" you say.\n\n\t*gosub hank_explains\n\n\t*goto stolen_choice\n*else\n\t\"How many times do I have to tell you,\" says Hank, annoyed. \"I don't buy stolen merchandise!\"\n\n\t\"This time you did!\" you insist.\n\n\t*goto stolen_choice\n\n*label stolen_choice\nHank sighs. \"Well, even if it was stolen—and we can't prove that—what's done is done. What do you want me to do about it? I can't go back in time.\"\n\n\"I can return the bike to its original owner,\" you say, \"but it seems unfair that my parents should have to pay for that. All they wanted was to get me a birthday present. How about a refund?\" \n\n\"You want a refund and you want to keep the bike?\"\n\n\"To return to the owner!\" you remind him.\n\nHank eyes you. \"I wasn't born yesterday. You can either have your money back or you can keep the bike and do whatever you want with it—not both.\" \n\n*choice\n\t#\"Ugh, fine, I'll keep it.\"\n\t\t\"You just lost your chance at some serious good karma, mister!\" you tell Hank. You walk the bike back out the door, get on it, and ride away for home.\n\n\t\t*goto finish\n\t#\"Ugh, fine, just refund me.\"\n\t\t*goto refund\n\t#\"Ugh, fine. Let me exchange it.\" \n\t\t*goto exchange\n\n*label exchange\nHank leads you to the showroom. \"See anything you like?\"\n\n*label bike_choice\n*fake_choice\n\t*disable_reuse #The top-of-the-line silver racing bike, for $700.\n\t\t*set Greed %+10\n\t\t*set bikeYouWant \"silver\"\n\t\t*set bikeCost 700\n\t*disable_reuse #The black mountain bike with all the red skulls, for $250.\n\t\t*set Respect %-10\n\t\t*set bikeYouWant \"black\"\n\t\t*set bikeCost 250\t\t\n\t*disable_reuse #The yellow one with the basket and the streamers, for $175.\n\t\t*set Respect %+10\n\t\t*set bikeYouWant \"yellow\"\n\t\t*set bikeCost 175\t\t\n\t#The plain beige one, for $150.\n\t\t*set Secrecy %+10\n\t\t*set bikeCost 150\n\t\t*set bikeYouWant \"beige\"\n\t#The clunky, out-of-fashion one painted in two clashing shades of avocado green, a bargain at $100.\n\t\t*set Greed %-10\n\t\t*set bikeYouWant \"green\"\n\t\t*set bikeCost 100\n*set Money *100\n*set Money round(Money)\n*set Money /100\n*set GBUResaleCost *100\n*set GBUResaleCost round(GBUResaleCost)\n*set GBUResaleCost /100\n*temp budget GBUResaleCost+Money\n*set budget *100\n*set budget round(budget)\n*set budget /100\n\nYou check your pockets. You have $${Money}. With the store credit of $${GBUResaleCost} and $${Money} of your own, you have $${budget} to spend.\n\n*if(bikeCost > GBUResaleCost)\n\t*temp extra bikeCost - GBUResaleCost\n\t*set extra *100\n\t*set extra round(extra)\n\t*set extra /100\n\t\"The ${bikeYouWant} bike costs more than your store credit,\" Hank warns. \n\n\t*if(budget >= bikeCost)\n\t\t\"I know. I'll be adding $${extra} of my own,\" you explain.\n\t\n\t\t*set relH %+20\n\t\t\"Oh!\" Hank smiles, pleased. \"You have money. Great. Come on—let's settle up.\"\n\t\t*set bikeCost extra\n\t\t*goto settle_up\n\t*else\n\t\t\"Can't you give it to me for $${budget} or less?\" you wheedle. \"Pleeeeease? I really, really want it….\"\n\n\t\t*if((relH > 75) and (extra \u003c 100)) or (extra \u003c 20)\n\t\t\tHank looks charmed in spite of himself. \"Augh, you're driving me out of business. But I can't say no to that face. We'll call it $${budget}. Come on—let's settle up.\"\n\t\t\t*set bikeCost extra\n\t\t\t*goto settle_up\n\t\t*else\n\t\t\t\"Can't do it, kid,\" Hank shakes his head curtly. \"You'll have to pick something you can afford.\"\n\n\t\t\t*goto bike_choice\n*else\n\t\"Okeydoke,\" says Hank. \"Your store credit will cover that. Come on, let's settle up.\"\n\n\t*set bikeCost -GBUResaleCost\n\t*goto settle_up\n\n*label settle_up\n*set exchanged_bike true\nHank takes the bike down from the wall and wheels it into the office for you. \n*if(bikeCost > 0)\n\tYou hand over $${bikeCost}.\nNext thing you know, you're riding out with your very own new ${bikeYouWant} bike!\n*set hasBike \"Hank\"\n*set yourBike bikeYouWant\n*set Money -bikeCost\n*set Money *100\n*set Money round(Money)\n*set Money /100\n*goto finish\n\n*label finish\n\n*page_break\n*goto_scene ch5bike2_sc3blackmail", "ch5bike2_sc3blackmail": "As you cross through the woods\n*if(giveplan = true)\n\tlooking for A.J.,\n\t*goto blackmail2\n*else\n\ton your way home,\n\t*goto blackmail2\n\n*label blackmail2\nyou hear familiar voices and laughter up ahead. You realize the Whips must be having a weekend hangout-and-possibly-vandalize session. One of the voices is clearly A.J.'s.\n\n*if(yourBike != \"\")\n\tYou get off your bike and walk it.\n*if(yourBike = \"Purple Thunder\")\n\t*if(giveplan = true)\n\t\tYou want to surprise A.J.\n\t\t*goto blackmail3\n\t*elseif(disguise_rating > 0)\n\t\tThis will be the true test of your disguise.\n\t\t*goto blackmail3\n\t*else\n\t\tYou give the area a wide berth. You don't want to run into A.J. with the bike. \n\t\t*goto blackmail3\n\n*label blackmail3\n\"Hey, there,\" says a louder voice very near you. Kyle appears seemingly out of nowhere, leaning against a tree and grinning.\n\n*if(Respect \u003c 50)\n\tYou smile. \"Hey, Kyle. What's up?\"\n\t\n\t*goto blackmail4\n*else\n\tYou nod warily. \"Hey, Kyle. What's up?\"\n\t\n\t*goto blackmail4\n\n*label blackmail4\n\"Oh, not much.\" Kyle buffs his fingernails on his jacket. \"I've been seeing you all around town. You get up to some very interesting things.\"\n\nYou frown. \"What do you mean?\"\n\nKyle grins like the Cheshire cat. \n\n*page_break\n*goto bkmail_menu\n\n*label bkmail_menu\n*if(yourBike = \"Purple Thunder\") or (hasBike = \"you\")\n\t*if(disguise_rating > 0)\n\t\t\"Let's cut to the chase,\" says Kyle. \"I saw you disguise that bike outside the hardware store. It's A.J.'s, isn't it? I wonder why a person would make over A.J.'s bike to make it look completely different? Unless they wanted to hide the fact that they have it. I think A.J. would be very interested to know what I saw.\"\n\t\t*set bkmail_scenario \"stole and disguised\"\n\t\t*goto blackmail5\n\t*else\n\t\t\"That's a real nice bike you have. Reaaaal nice. It looks a lot like another bike a friend of mine used to have. What was it? Oh, yes, Red Lightning. That bike could be Red Lightning's cousin…except it's ${currentRLColor}, of course. But wait. Is that a streak of red?\"\n\n\t\tKyle isn't a very good actor. \"I get it,\" you say. \"You know it's Red Lightning.\"\n\n\t\t\"The thing I don't get is why you have it. I think A.J. would be very interested to know that you are holding on to ${his} bike.\"\n\n\t\t*if(giveplan = true)\n\t\t\t\"I was just about to give it to ${him},\" you explain. \"I'm taking it to ${him} right now.\"\n\n\t\t\t\"Oh?\" Kyle raises his brows. \"That's not the story ${he}'ll hear from me. I'm going to tell ${him} that you took it and you plan to keep it. That was your plan all along!\"\n\n\t\t\t\"But that's not true,\" you say.\n\n\t\t\tKyle shrugs. \"All I have to do is raise my voice and call for ${him}, and ${he} will hear my side of the story against yours.\"\n\n\t\t*temp bkmail_scenario \"stole\" \n\t\t*goto blackmail5\n*elseif(hasBike = \"Mrs. Carver\")\n\t\"Let's cut to the chase. I saw you conspiring with Mrs. Carver. You handed over a bike that looked suspiciously like Red Lightning.\"\n\t*temp bkmail_scenario \"conspired\" \n\n\t\"Yeah. I ended up with it by accident,\" you explain. \"She's going to give it to A.J.\"\n\n\t\"Oh, is she?\" Kyle laughs. \"You know she's the one who stole it in the first place, right?\"\n\n\t*if(solved_rl = true)\n\t\t\"Yes, I know. I trust her. She won't do it again,\" you say.\n\n\t\t\"You may trust her, but A.J. doesn't. A.J. doesn't trust any adult. And ${he} won't trust you, either. Not after I tell ${him} everything.\" \n\n\t\t*goto blackmail5\n\t*else\n\t\t\"Wait, what?\" you say.\n\n\t\t\"And now look—you are in cahoots with the thief. A.J. will be very interested to know that.\" Kyle shrugs smugly.\n\n\t\t*goto blackmail5\n*elseif(hasBike = \"Hank\") and (yourBike != \"\")\n\t\"Let's cut to the chase. I saw you go into Hank's Garage with a bike that looked suspiciously like Red Lightning. I saw you come out with that nice new piece of machinery.\" Kyle nods at your bike. \"Tsk-tsk. Bad, bad. A.J. would be interested to know that you sold something of ${hiss} for personal gain!\"\n\n\tYou turn red. It sounds so nasty the way he puts it.\n\t*temp bkmail_scenario \"sold for bike\"\n\t*goto blackmail5\n*elseif(hasBike = \"Hank\") and (yourBike = \"\")\n\t\"Let's cut to the chase. I saw you go into Hank's Garage with a bike that looked suspiciously like Red Lightning. I saw you come out empty-handed—but with, I assume, a fat wallet.\" Kyle shakes his head. \"Tsk, tsk. Bad, bad. A.J. would be interested to know that you sold something of ${hiss} for personal gain!\"\n\n\tYou turn red. It sounds so nasty the way he puts it.\n\t*temp bkmail_scenario \"sold for money\"\n\t*goto blackmail5\n\n*label blackmail5\n*choice\n\t#\"How did you figure all this out? Have you been following me, you jerk?\"\n\t\t\"It's more like I've been following Red Lightning,\" says Kyle.\n\t\t*gosub kyle_explains\n\t\t*goto blackmail_55\n\t#\"I'm sure A.J. would be interested to know that you know where Red Lightning is and haven't told ${him}, so there.\"\n\t\tKyle laughs. \"A.J wouldn't be surprised by anything I do. Now, you, ${he} can be disappointed in.\"\n\n\t\tYou frown. \"I still don't understand how you know all this.\"\n\n\t\t*gosub kyle_explains\n\t\t*goto blackmail_55\n\t#\"Wow. You are a good detective.\"\n\t\t\"It's a matter of being in the right place at the right time,\" Kyle explains.\n\t\t*gosub kyle_explains\n\t\t*goto blackmail_55\n\n*label kyle_explains\n\"I bet you don't know what I do in my spare time.\" \n\n*fake_choice\n\t#\"Paint swear words on brick walls?\"\n\t\t\"Aside from that,\" says Kyle.\n\t#\"Torture kittens?\"\n\t\t\"No!\" Kyle looks insulted.\n\t#\"Bake cookies?\"\n\t\tKyle shakes his head.\n\n*comment endif\n\n\"I babysit.\"\n\nYour jaw drops. Kyle? A baby-sitter? You can't imagine him being kind to children. Were those his flyers at the library?\n\nKyle smiles. Your confusion seems to please him. \"It's true. I am really good with kids. And one of the kids I baby-sit is little Angelina Appleby. You know, Hank's daughter? Of Hank's Garage? Sometimes, Hank even invites me over to the garage to keep her entertained while he works. Well, one day, I was there, playing with Angelina in the back room, and through the door, I hear a customer come in. It's a woman, and she sounds upset. 'I have to sell this, I don't have enough money to pay the bills, my electric b
