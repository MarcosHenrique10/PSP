ill is past due, blah blah blah.' I peep through the door, and it's Mrs. Carver! She's selling Red Lightning!\"\n\n*fake_choice\n\t#\"Whaaaat? I had no idea!\"\n\t\t*if(solved_rl = false)\n\t\t\t*set Secrecy %-10\n\t\t*if(solved_rl = true)\n\t\t\t*set lie_count +1\n\t\t\t*set Secrecy %+10\n\t\t\"Incredible but true!\" cries Kyle, clearly pleased to have blown your mind.\n\t#\"I already knew that.\"\n\t\t*if(solved_rl = true)\n\t\t\t*set Secrecy %-10\n\t\t*if(solved_rl = false)\n\t\t\t*set lie_count +1\n\t\t\t*set Secrecy %+10\n\t\t\"Yeah, right,\" Kyle scoffs.\n\t#\"No! It's not true! It's impossible!\"\n\t\t*set Respect %+10\n\t\t\"Search your heart. You know it to be true,\" Kyle intones.\n\t#\"I guess A.J. is right. You can't trust adults.\"\n\t\t*set Respect %-10\n\t\t\"Crying shame,\" Kyle agrees.\n\n*comment endif\n\n*set solved_rl true\n\"From that day on, I kept an eye on Red Lightning. I knew Hank was fixing it up to sell it. I planned to save my money to buy it. But the day it went on sale, your parents swooped in and bought it out from under me. I tracked you all day to see what you did with it. And now it's time to pay!\"\n\n*return\n\n*label blackmail_55\n\"So what now?\" you say. \n*if(yourBike != \"\")\n\t\"You are mad that I got the bike, so you are going to tell A.J. that I sold ${him} out?\"\n\t\n\t*goto blackmail_56\n*else\n\t\"Are you going to tell A.J.?\"\n\t\n\t*goto blackmail_56\n\n*label blackmail_56\n\"I don't have to,\" says Kyle. \"Not if\n*if(yourBike != \"\")\n\tyou give me the bike.\"\n\t*temp blackmail_price_num 0\n\t*temp blackmail_price_words \"bike\"\n\t\n\t*goto blackmail6\n*else\n\tyou give me $100.\"\n\t*temp blackmail_price_num 100\n\t*temp blackmail_price_words \"$100\"\n\t\n\t*goto blackmail6\n\n*label blackmail6\nYour eyes widen. \"Are you blackmailing me?\" \n\n*if(owe_kyle_favor)\n\t\"Not at all,\" says Kyle. \"I'm merely letting you know what I would like and the consequences if I don't get it. Do I need to remind you that you owe me a favor?\"\n\n\tHe has a point. You do owe him. Still, it sounds an awful lot like blackmail to you.\n*if(owe_kyle_favor = false)\n\tKyle grins. \"If the shoe fits…\"\n\nThis is so upsetting! You have never been blackmailed before. \n*if(blackmail_attempts > 0)\n\tYou are always the blackmailer. \n\n*comment endif\n\n*choice\n\t*if(Money >= blackmail_price_num) or (blackmail_price_num = 0)\n\t\t#\"Okay, Kyle, you got me. I'll give you the ${blackmail_price_words}…. Just keep quiet.\"\n\t\t\tGrudgingly, you hand over the ${blackmail_price_words}. \n\t\t\t*set Money - blackmail_price_num\n\n\t\t\t*if(owe_kyle_favor = true)\n\t\t\t\t*set owe_kyle_favor false\n\t\t\t\t\"Now we're even, okay?\" you say. \"No more favors.\"\n\t\t\t\t\"Sure, sure.\"\n\t\t\t\t*goto kyle_agreement\n\t\t\t*if(blackmail_price_num > 0)\n\t\t\t\tKyle counts the money gleefully before pocketing it.\n\t\t\t\t*goto kyle_agreement\n\t\t\t*else\n\t\t\t\tKyle pets the handlebars lovingly. Then he produces a bike lock from his back pocket and stashes the bike behind some trees.\n\t\t\t\t*set yourBike \"\"\n\t\t\t\t*set hasBike \"Kyle\"\n\n\t\t\t\t*goto kyle_agreement\n\t*if(blackmail_price_num = 50) \n\t\t#\"But, Kyle, I don't have any money. I am completely broke.\"\n\t\t\t*goto kyle_disbelieves\n\t#\"There is no way I am going to pay you anything. Tell A.J. whatever you want. I trust my relationship with ${him} against your fibs and rumors any day.\"\n\t\t*goto kyle_callsbluff\n\t#\"Do your worst, Kyle. Your threat just doesn't matter, because I don't care what A.J. thinks of me.\" \n\t\t*goto kyle_callsbluff\n\n*label kyle_agreement\n*set you_paid_up true\nJust then, A.J. comes sauntering down the path with Max and Rina. \"Oh, hi, ${Name},\" ${he} says. \"Happy birthday!\"\n\nIn all this excitement, you almost forgot it was your birthday. But it doesn't feel like a very happy one anymore. \n\n\"We were just chatting,\" says Kyle. \"You know, ${Name} is pretty cool.\"\n\n*if(relA > 60)\n\t\"I know,\" A.J. beams.\n\t*goto ag2\n*elseif(relA > 40)\n\t\"Aw, ${she_u}'s all right,\" A.J. says gruffly.\n\t*goto ag2\n*else\n\t\"I guess,\" says A.J. \n\t*goto ag2\n\n*label ag2\nCuffing you on the shoulder, A.J. nods toward the road. \"Come on. I'm heading home. We can walk together.\" \n\nThat's right. You'll walk together. Because neither of you has a bike.\n\n*goto finish\n\n*label kyle_disbelieves\n\"I don't believe you,\" says Kyle. \"But, fine. \n*goto kyle_consequences\n\n*label kyle_callsbluff\n\"Fine!\" says Kyle. \"See if I care! \n*goto kyle_consequences\n\n*label kyle_consequences\nIf that's how you want to play, I have no problem making good on my threat. A.J.!\" Kyle is screaming now at the top of his lungs. \"A.J.!\"\n\nA.J. comes running down the path. \"Kyle? What's up? Oh, hi, ${Name}. What are you doing here?\" \n\n*if(bkmail_scenario = \"stole\")\n\tKyle gestures at Purple Thunder. \"${Name} stole Red Lightning and painted it purple to throw you off the trail!\"\n\n\t*goto explain_why_you_have_rl\n*elseif(bkmail_scenario = \"stole and disguised\")\n\tKyle gestures at the mangled and overly fancy bicycle. \"${Name} stole Red Lightning and disguised it to throw you off the trail!\"\n\n\t*goto explain_why_you_have_rl\n*elseif(bkmail_scenario = \"sold for bike\")\n\tKyle gestures at your new bike. \"${Name} stole Red Lightning and traded it in for this bike!\"\n\n\t*goto explain_why_you_exchanged\n*elseif(bkmail_scenario = \"sold for money\")\n\tKyle gestures at your new bike. \"${Name} stole Red Lightning and sold it for profit!\"\n\n\t*goto explain_why_you_sold\t\n*elseif(bkmail_scenario = \"conspired\")\n\tKyle points at you accusingly. \"${Name} conspired with your mother to steal Red Lightning!\"\n\n\t*goto explain_why_you_conspired\n\n*label explain_why_you_have_rl\nFor a moment, A.J. just looks confused. Then ${his} eyes run over the bike's frame, taking it in. Finally, ${he} runs up to the bike and examines the spot just below the seat where the lightning bolt is carved. A smile lights up ${his} face. \"It is Red Lightning! I don't believe it!\" \n\n*gosub ajs_emotions\n\n*goto explain2\n\n*label ajs_emotions\nA.J. turns to you with a look of\n*if(relA > 70)\n\tcuriosity.\n\t*return\n*elseif(relA > 50)\n\tconfusion.\n\t*return\n*elseif(relA > 30)\n\tbetrayal.\n\t*return\n*else\n\tanger.\n\t*return\n\n*label explain2\n\"${Name}? Why do you have my bike?\"\n\n*label give_choice\n*choice\n\t#\"My parents gave it to me as a present, but as soon as I saw it was Red Lightning, I came right away to bring it back to you. Here.\"\n\t\t*if(giveplan = false)\n\t\t\t*set lie_count +1\n\t\t*goto giving_claim\n\t#\"My parents gave it to me as a present, and I'll be honest: I was tempted to keep it. But that would have been wrong of me. Here.\"\n\t\t*goto completely_honest\n\t#\"My parents gave it to me as a present, and I'm keeping it! So what if it used to be your bike? That was then! This is now! Mwa-ha-ha!\"\n\t\t*goto im_keeping_it\n\t*disable_reuse #\"This is not the bike you're looking for.\" \n\t\t*goto not_your_bike\n\n*label giving_claim\n*set yourBike \"\"\n*set hasBike \"A.J.\"\n\"Lies, all lies!\" Kyle butts in. \"Give it to you? Don't make me laugh. ${Name} was going to keep it!\"\n\n*if(relA > 66)\n\t*set relA %+30\n\t\"Aw, come on, Kyle. ${Name} would never do that,\" says A.J. Turning to you with a wide, brilliant smile, A.J. wraps you in a hug. \"Thank you so much! I can't believe you found Red Lightning!\"\n\n\t\"Well, I didn't exactly find it,\" you remind ${him} modestly.\n\n\t\"Whatever. You brought it back to me. I always knew you would.\" A.J. immediately climbs onto the bike and inhales deeply, looking as if ${he} is home. Again, ${he} grins at you and pats the rack behind the seat. \"Climb on. I'll give you a lift home!\"\n\n\t*set aj_sided_with \"you\"\n\t*goto finish\n*elseif(relA > 33)\n\t*set relA %+30\n\t\"You were?\" A.J. frowns. \n\n\t\"No!\" you say. \"I promise, I was always going to give it to you.\"\n\n\t\"Okay, well…it's back now, safe and sound. I guess that's all that matters.\" A.J. runs a hand lovingly over the handlebars as if he were petting a favorite puppy. \"If you did want to keep it, well, I'd understand. Just…thank you. Thank you for bringing it back.\"\n\n\t*set aj_sided_with \"you\"\n\t*goto finish\n*else\n\t*set relA %-30\n\t\"I can't believe you, ${Name}! You were going to keep it?\"\n\n\t\"No!\" you say. \"I was always going to bring it back.\"\n\n\tA.J. shakes ${his} head. \"You, of all people, should know how much this bike means to me. Thanks for stopping ${her_u}, Kyle. I'm just glad I have it back!\"\n\n\tClimbing angrily onto the bike, A.J. rides away, leaving you in the dust.\n\n\t*set aj_sided_with \"Kyle\"\n\t*goto finish\t\n\n*label completely_honest\n*set relA %+20\nKyle opens his mouth to retort, but then stops. He has nothing to accuse you of. By being completely honest, you have taken away his ammunition. \t\n\n\"Oh. Okay, well…it's back now, safe and sound. I guess that's all that matters.\" A.J. runs a hand lovingly over the handlebars as if he were petting a favorite puppy. \"If you did want to keep it, well, I'd understand. Just…thank you. Thank you for bringing it back!\"\n\n*set aj_sided_with \"you\"\n*set hasBike \"A.J.\"\n*set yourBike \"\"\n*goto finish\n\n*label im_keeping_it\n*gosub betrayal\n\nA.J. shakes ${his} head. \"We can't be friends if you keep that bike.\" \n\n\"I'm sorry to hear that. Well, catch ya later!\" You wave, hop on the bike, and ride away. \n\nA.J. shakes ${his} fist as you leave ${him} sputtering in the dust.\n\n*set aj_sided_with \"Kyle\"\n*set relA %-99\n*goto finish\n\n*label betrayal\nKyle looks dumbfounded. Clearly, he expected you to deny it. Since you are agreeing with his accusation, he has nothing more to say.\n\nA.J. pouts, hurt. \"I can't believe you! I thought we were friends!\"\n\n\"We are friends,\" you say, \"but I had to do what I had to do.\"\n\n*set aj_sided_with \"Kyle\"\n*return\n\n*label not_your_bike\n*if(disguise_rating > 4)\n\t\"Maybe… I guess not,\" says A.J. doubtfully, examining the bike from all angles. \"Yeah, it's a different bike.\"\n\n\t\"It's yours,\" Kyle insists. \"I saw ${her_u} disguise it!\"\n\n\t*if(relA > 50)\n\t\t\"${Name} would never do that,\" says A.J. confidently. \"Stop playing around, Kyle. ${Name}, I'm glad you got a bike. At least one of us has one!\"\n\n\t\tYou exhale a sigh of relief. A.J. bought your lie! Now you can still be friends, even though you secretly have ${his} beloved bike. It's the best of both worlds, except for your conscience nagging you….\n\n\t\tYou try to ignore it. You smile brilliantly at A.J. \"Come on,\" you say, patting the rack behind the seat. \"Get on. I'll give you a ride home.\"\n\n\t\t*set aj_sided_with \"you\"\n\t\t*goto finish\n\t*else\n\t\t*set relA %-20\n\t\t*gosub i_need_to_think\n\n\t\tYou hop on the bike formerly known as Red Lightning and head home. It's your bike now. But the ride doesn't feel quite as smooth as it did before. Was all this drama worth it?\n\n\t\t*set aj_sided_with \"undetermined\"\n\t\t*goto finish\t\n*else\n\t\"Um, no…no, it's my bike,\" says A.J. \"It's very clearly my bike.\"\n\n\t*goto give_choice\n\n*label i_need_to_think\nA.J. frowns. \"I…I don't know what to believe.\" \n\n\"Believe me,\" you suggest.\n\n\"Believe me,\" suggests Kyle.\n\nA.J. shakes ${his} head and squints ${his} eyes shut. \"I have to go clear my head.\"\n\nAs A.J. runs off, you glare at Kyle. \n\nKyle just grins, gloating. \"What? I told you to pay me.\"\n\n*set aj_sided_with \"undetermined\"\n*return\n\n*label explain_why_you_sold\n*if(relA > 66)\n\t\"Aw, quit kidding around, Kyle. ${Name} would never do something like that.\" A.J. cuffs you on the shoulder affectionately. \"Just ignore Kyle, ${Name}. He doesn't know what he's talking about.\"\n\t\n\tAs you and A.J. walk off, arm in arm, you can't help but turn your head and quickly stick your tongue out at Kyle.\n\t\n\t*set aj_sided_with \"you\"\n\t*goto finish\n*elseif(relA > 33)\n\t\"Is that true?\" A.J. looks at you with wide, confused eyes. \"Why would…\"\n\n\t\"I didn't steal it!\" you insist. \"Just…\"\n\n\t*choice\n\t\t#\"…I got it as a present, but I returned it because I didn't want to own stolen merchandise.\"\n\t\t\t\"Stolen from [i]me[/i],\" says A.J. \"Why didn't you return it to me?\"\n\n\t\t\t\"Well, that didn't seem right, either. I mean, my parents bought me a bike, not you,\" you say.\n\n\t\t\tA.J. shakes ${his} head. \"You're only out for yourself. Come on, Kyle. Let's get out of here.\"\n\n\t\t\t*set aj_sided_with \"Kyle\"\n\t\t\t*finish\n\t\t#\"…I never had it. Kyle is a total liar.\"\n\t\t\t*gosub i_need_to_think\n\n\t\t\t*finish\n\t\t#\"What? Yeah, I returned it. I didn't want your dumb bike—I wanted the cold hard cash, baby.\" \n\t\t\t*gosub betrayal\n\n\t\t\t\"I don't see how I can be friends with someone who profited off something that was stolen from me,\" says A.J.\n\n\t\t\tYou shrug. \"That's your choice, I guess.\" \n\n\t\t\tAngrily, A.J. walks off. \n\t\t\t*set aj_sided_with \"Kyle\"\n\t\t\t*set relA %-30\n\n\t\t\t*finish\n*else\n\t*set relA %-30\n\t\"I can't believe you, ${Name}! You had Red Lightning, and you sold it?\" A.J. looks horrified. \"You, of all people, should know how much that bike meant to me. Thanks for telling me, Kyle. Let's go!\"\n\n\tA.J. and Kyle walk off. \n\n\t*set aj_sided_with \"Kyle\"\n\t*finish\n\n*label explain_why_you_exchanged\n*if(relA > 66)\n\t\"Aw, quit kidding around, Kyle. ${Name} would never do something like that.\" A.J. cuffs you on the shoulder affectionately. \"This is a real nice bike, though! Did you get it for your birthday?\"\n\n\tYou nod.\n\n\t\"Cool! I'm glad one of us has one,\" A.J. smiles. \"Well, aren't you gonna offer me a ride?\"\n\n\tAs you pedal home, A.J. riding on the back of your bike, you breathe a sigh of relief. You don't know how A.J. would react if ${he} knew you had Red Lightning in your hands and you let it slip away. And you don't want to know! \n\n\t*set aj_sided_with \"you\"\n\t*goto finish\n*elseif(relA > 33)\n\t\"Is that true?\" A.J. looks at you with wide, confused eyes. \"Why would…\"\n\n\t\"I didn't steal it!\" you insist. \"Just…\"\n\n\t*choice\n\t\t#…I got it as a present, but I exchanged it because I didn't want to own stolen merchandise.\"\n\t\t\t\"Stolen from [i]me[/i],\" says A.J. \"Why didn't you return it to me?\"\n\n\t\t\t\"Well, that didn't seem right, either. I mean, my parents bought me a bike, not you,\" you say.\n\n\t\t\tA.J. shakes ${his} head. \"You're only out for yourself. Come on, Kyle. Let's get out of here.\"\n\n\t\t\t*set aj_sided_with \"Kyle\"\n\t\t\t*goto you_and_bike\n\t\t#…I never had it. Kyle is a total liar.\"\n\t\t\t*gosub i_need_to_think\n\n\t\t\t*goto you_and_bike\n\t\t#What? Yeah, I exchanged it. I didn't want your dumb bike—I wanted my own.\" \n\t\t\t*gosub betrayal\n\n\t\t\t\"I don't see how I can be friends with someone who profited off something that was stolen from me,\" says A.J.\n\n\t\t\tYou shrug. \"That's your choice, I guess.\" \n\n\t\t\tAngrily, A.J. walks off. \n\t\t\t*set aj_sided_with \"Kyle\"\n\t\t\t*set relA %-30\n\n\t\t\t*goto you_and_bike\n*else\n\t*set relA %-30\n\t\"I can't believe you, ${Name}! You had Red Lightning, and you exchanged it?\" A.J. looks horrified. \"You, of all people, should know how much that bike meant to me. Thanks for telling me, Kyle. Let's go!\"\n\n\tA.J. and Kyle walk off. \n\n\t*set aj_sided_with \"Kyle\"\n\t*goto you_and_bike\n\n*label you_and_bike\nYou ride home on your bike alone. \"Humph!\" you mutter to yourself. \"A.J. should understand how important a bike is. All I ever wanted was a bike, and now I have one!\" \n\nYou try your hardest to feel as if you have won. But it doesn't feel quite like a win when your best friend is mad at you.\n\n*goto finish\n\n*label explain_why_you_conspired\n*set aj_knows true\n\n\"What? I don't understand. You and my mom?\"\n*gosub ajs_emotions\n\nKyle sighs. \"Yeah, your mom was the one who originally stole and sold your bike. Whoops, the cat's out of the bag. And ${Name} was in on it!\"\n\n\"I wasn't in on it,\" you insist. \"I didn't even know she sold it until today. The important thing is that Red Lightning is back. Safe and sound. I left it at your house.\" \n\n*if(relA > 66)\n\tA.J.'s eyes widen. \"You mean you found it? It's back? I can ride it today?\"\n\n\tYou nod. \"Yes!\"\n\n\tA.J. breaks into a grin and pulls you into a bear hug. \"I knew you would do it! Thank you so much, ${Name}. Come on, let's run home and see it before my dumb mom sells it again!\"\n\n\tAs you run off with A.J., you toss a glance over your shoulder at Kyle. He stands there steaming, upset that his blackmail didn't work. You knew it wouldn't. Your relationship with A.J. is just too strong!\n\n\t*set aj_sided_with \"you\"\n\t*goto finish\n*elseif(relA > 33)\n\t*gosub i_need_to_think\n\n\tYou walk home, lost in thought. You only hope that A.J. and ${his} mom work everything out.\n\n\t*goto finish\n*else\n\t\"I can't believe it!\" A.J. shouts. \"My mom is a total witch! And you—you're on her side!\"\n\n\t\"I was just trying to—\" you try to explain.\n\n\t\"Save it! I don't want to hear it!\" A.J. snaps.\n\t*if(datingA)\n\t\t\"You know what? Our relationship is over!\"\n\n\tA.J. runs off, and Kyle shoots you a smug smile. \"Told ya you should have paid.\"\n\n\tYou stuff your hands in your pockets and make for home. You feel that A.J. is being unreasonable, especially after you returned ${his} precious bike. \n\t*if(datingA = false)\n\t\tMaybe this friendship has run its course.\n\t*if(datingA = true)\n\t\tMaybe it's okay that you are broken up now.\n\n\t*set datingA false\n\t*set aj_sided_with \"Kyle\"\n\t*goto finish\n\t\n*label finish\n\n*page_break\n*goto_scene ch5bike2_sc4epilogue\n", "ch5bike2_sc4epilogue": "*if(givePlan = true) and ((hasBike = \"A.J.\") or (hasBike = \"Mrs. Carver\"))\n\t*goto parents_give\n*else\n\t*goto visit_aj\n\t\n*label parents_give\nAs you crest the hill to your house, you see something that makes your heart skip. There's a bike chained to the front porch. You run the rest of the way up your walk and inspect the bike. It is shiny and new and a deep green, the color of sea glass. Whose is it? You don't dare to hope….\n\n\"Do you like it?\" \n\nYou were so engrossed in examining the bike that you didn't notice your mom and dad coming up behind you.\n\n\"A.J.'s mom called,\" says your dad. \"I guess A.J. has a new bike now. It's the one we gave you, isn't it?\"\n\n*fake_choice\n\t#\"Maybe. Maybe not.\"\n\t\t*set Secrecy %+10\n\t\t\"It doesn't take a genius detective to solve this mystery,\" says Mom.\n\t#\"I'm sorry I gave away your gift.\"\n\t\t*set Respect %+10\n\t\t\"Oh, honey, it's okay,\" says Mom. \n\t#\"I had no choice. It wasn't really mine.\"\n\t\t*set Greed %-10\n\t\t\"Of course you had a choice. You made the right one,\" says Mom.\n\t#\"I have the right to do what I want with my own birthday present.\"\n\t\t*set Greed %+10\n\t\t\"Of course you do. You did the right thing,\" says Mom.\n\"You gave up something you wanted because you felt it rightfully belonged to someone else. We are impressed by your willpower and sense of fairness.\"\n\n\"You're a true friend, kid,\" says your dad solemnly. Then he grins and tosses something shiny and silver in your direction. \"What are you waiting for? Go for a ride!\"\n\nYou catch the key to your new bike lock in one hand. You finally have your own bike, and this time, you know it's yours. The Green Tornado!\n*set yourBike \"Green Tornado\"\n\n*page_break\n*goto visit_aj\n\n*label visit_aj\n*if(yourBike != \"\")\n\t*temp locomote \"ride\"\n\t*goto visit_aj2\n*else\n\t*temp locomote \"walk\"\n\t*goto visit_aj2\n\n*label visit_aj2\nEarly the next day, you ${locomote} down your familiar hill to A.J.'s house.\n*if(relA \u003c 33)\n\t*goto aj_wont_see_you\n*else\n\t*goto ajs_house\n\n*label aj_wont_see_you\n*set estrangedA true\n\nDarren opens the door. \"Oh, hey,\" he says. \"I'll tell A.J. you're….\" He looks over to the left abruptly, and you hear muffled whispers. Darren turns back to you, smiling. \"Um, sorry, ${Name}, but A.J.'s not here.\" \n\nYou\n*if(yourBike != \"\")\n\tget on your bike and \nhead back home. You're certain that A.J. was there. You guess ${he} just didn't want to see you. \n\n*page_break\nBack in your room, you decide to write A.J. a letter telling your side of the story. You pick up a pen, turn your notebook to a fresh page, and write the greeting.\n*temp greeting \"\"\n\n*choice\n\t#Dear A.J.\n\t\t*set relA %+10\n\t\t*set greeting \"Dear A.J.\"\n\t\t*goto letter\n\t#Darling A.J.\n\t\t*set greeting \"Darling A.J.\"\n\t\t*if(datingA = true)\n\t\t\t*set relA %+20\n\t\t\t*goto letter\n\t\t*else\n\t\t\t*set relA %-10\n\t\t\t*goto letter\n\t#Hey\n\t\t*set greeting \"Hey\"\n\t\t*set relA %+10\n\t\t*goto letter\n\n*label letter\nWhat do you want to tell A.J. in the letter?\n*temp momthief \"\"\n*temp blamemom \"\"\n*temp notblamemom \"\"\n*temp athanks \"\"\n*temp sorry \"\"\n*temp giftmoney \"\"\n*temp giftbike \"\"\n*temp befriends \"\"\n*temp notbefriends \"\"\n*temp crush \"\"\n*temp love \"\"\n*temp breakup \"\"\n*temp letter_parts 0\n\n*label tell_aj_choice\n*if(letter_parts > 0)\n\tAnything else?\n\n*choice\n\t*if(aj_knows = false) \n\t\t*disable_reuse #Your mom was the thief.\n\t\t\t*set letter_parts letter_parts +1\n\t\t\t*set Secrecy %-40\n\t\t\t*set Respect %-40\n\t\t\t*set relA %-20\n\t\t\t*set momthief \"I don't know if you know this, but I feel you need to know. Your mom was the one who originally stole Red Lightning. She sold it to pay the electric bill.\"\n\t\t\t*goto tell_aj_choice\n\t*if(aj_knows = true) and (blamemom = \"\") \n\t\t*disable_reuse #Don't blame your mom. She was doing her best.\n\t\t\t*set letter_parts +1\n\t\t\t*set Respect %+20\n\t\t\t*set relA %+20\n\t\t\t*set notblamemom \"Please don't blame her. She was doing what she felt she needed to do. It must be hard to be a mom.\"\n\t\t\t*set letter_parts +1\n\t\t\t*goto tell_aj_choice\n\t*if(aj_knows = true) and (notblamemom = \"\")\n\t\t*disable_reuse #Do blame your mom for all this. She's the worst.\n\t\t\t*set letter_parts +1\n\t\t\t*set Respect %-30\n\t\t\t*set relA %-20\n\t\t\t*set blamemom \"Just goes to show what you've always said. Parents are the worst.\" \n\t\t\t*goto tell_aj_choice\n\t*if(hasBike = \"Hank\") \n\t\t*disable_reuse #Red Lightning is at Hank's.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %+20\n\t\t\t*set athanks \"Don't ask how I know, but as we speak, Red Lightning is for sale at Hank's Garage. It's painted purple, but it's still the same old bike.\"\n\t\t\t*goto tell_aj_choice\n\t#I'm sorry.\n\t\t*set letter_parts +1\n\t\t*set relA %+30\n\t\t*set sorry \"I'm deeply sorry for everything that happened between us.\"\n\t\t*goto tell_aj_choice\n\t*if(hasBike = \"you\") and (giftmoney = \"\")\n\t\t*disable_reuse #I'm sending over Red Lightning to your house for you. Please take it.\n\t\t\t*set letter_parts +1\n\t\t\t*set hasBike \"A.J.\"\n\t\t\t*set yourBike \"\"\n\t\t\t*set relA %+50\n\t\t\t*set giftbike \"As you can see, this letter is attached to Red Lightning. It's for you. I changed my mind about keeping it, and I want you to have it.\"\n\t\t\t*goto tell_aj_choice\t\t\t\n\t*if(hasBike != \"Mrs. Carver\") and (hasBike != \"A.J.\")\n\t\t*disable_reuse #Please take the enclosed $${Money}.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %+Money\n\t\t\t*set giftmoney \"I can't give you your bike back, but I hope that the enclosed $${Money} will somewhat make up for your loss and for any part I had in it.\"\n\t\t\t*set Money 0\n\t\t\t*goto tell_aj_choice\n\t*if(notbefriends = \"\") and (befriends = \"\") \n\t\t*disable_reuse #Let's still be friends.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %+30\n\t\t\t*set befriends \"I hope we can still be friends.\"\n\t\t\t*goto tell_aj_choice\n\t*if(notbefriends = \"\") and (befriends = \"\")\n\t\t*disable_reuse #Let's not be friends.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %-30\n\t\t\t*set notbefriends \"This letter concludes my business with you. Our friendship has been nice, but from now on, let's go our separate ways.\"\n\t\t\t*goto tell_aj_choice\n\t*if(datingA = false) and (notbefriends = \"\")\n\t\t*disable_reuse #I have a crush on you.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %+20\n\t\t\t*set crush \"Weirdly, I think I might have a little bit of a crush on you, haha.\"\n\t\t\t*goto tell_aj_choice\n\t*if(datingA = true) and (love = \"\")\n\t\t*disable_reuse #I really like you.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %+30\n\t\t\t*set love \"I really like you.\"\n\t\t\t*goto tell_aj_choice\n\t\t*disable_reuse #I love you.\n\t\t\t*set letter_parts +1\n\t\t\t*set relA %+30\n\t\t\t*set love \"I love you.\"\n\t\t\t*goto tell_aj_choice\n\t*if(datingA = true) \n\t\t*disable_reuse #I want to break up.\n\t\t\t*set letter_parts +1\n\t\t\t*if(love != \"\") or (crush != \"\") \n\t\t\t\t*set breakup \"But \"\n\t\t\t*set relA %-30\n\t\t\t*set breakup &\"I think we need to break up.\"\n\t\t\t*goto tell_aj_choice \n\t*if(letter_parts > 0)\n\t\t#Sincerely, ${Name}.\n\t\t\t*goto end_letter\n\n*label end_letter\nOkay, here's your letter:\n\n[i]${greeting},[/i]\n\n[i]${momthief} ${blamemom} ${notblamemom} ${athanks} ${sorry} ${giftbike} ${giftmoney} ${befriends} ${notbefriends} ${crush} ${love} ${breakup}[/i]\n\n[i]Sincerely,[/i]\n*line_break\n[i]${Name}[/i]\n\nYou fold the letter, slip it into an envelope, and seal it firmly. \n\n*if(giftbike != \"\")\n\tYou tape the letter to your handlebars and pedal over to A.J.'s as quickly as you can, before you change your mind. You leave Red Lightning on the front stoop, ring the bell, and run away.\n\n\tYou run home on foot, but you have never felt faster or lighter in your life.\n\n\t*finish\n*else\n\tYou run down to the corner and drop the letter in A.J.'s mailbox. Maybe ${he} won't see you, but ${he} will still know how you feel.\n\n\t*finish\n\n*label ajs_house\n*if(hasBike = \"Mrs. Carver\")\n\t*goto mrs_carver_gave_bike\n*elseif(hasBike = \"A.J.\")\n\t*goto aj_has_bike\n*else\n\t*goto aj_has_no_bike\n\n*label mrs_carver_gave_bike\n*if(aj_knows)\n\t*goto aj_conflicted_about_bike\n*else\n\t*goto aj_enjoying_bike\n\n*label aj_enjoying_bike\nYou can hear the joyful shouts from the top of the hill, and as you get nearer, you see A.J. zipping around on the purple bike! Mrs. Carver has given it to ${him} after all. You breathe a sigh of relief. A part of you still wondered if she would sell it again.\n\nA.J. grins when ${he} sees you. Hopping off the bike, ${he} runs to you.\n*if(yourBike != \"\")\n\tYou hop off your bike, too, leaving it in a heap on the ground, and run toward ${him}.\nYou meet in a big bear hug! \n\n\"It's back. Red Lightning is really back!\" A.J. exclaims.\n\nYou smile. \"You're pretty happy, huh?\"\n\nA.J. pulls back from the hug and examines your face. \"${Name}. Did you have anything to do with this?\"\n\n*fake_choice\n\t#\"Of course!\"\n\t\t*set Secrecy %-10\n\t\t*set relA %+10\n\t#\"Nope, it was all your mom.\"\n\t\t*set lie_count +1\n\t\t*set Secrecy %+10\n\t\t*set Respect %+10\n\t#\"I'll never tell.\"\n\t\t*set Secrecy %+10\n\n*if(yourBike = \"\")\n\tA.J. gives you a ride around the block, and then ${he} even lets you ride on your own for awhile. When you get back, you find A.J. sitting on the front steps, looking thoughtful.\n\t\n\t*goto as_happy\n*else\n\t*gosub biking_together\n\t*goto pre_as_happy\n\n*label biking_together\nYou and A.J. spend hours riding around the neighborhood on your bikes, the wind in your hair, shouting and laughing to each other as you pass one another. This is the way it was always meant to be—you can feel it!\n*return\n\t\n*label pre_as_happy\n*page_break\nYou're not allowed to bike at night, so as the shadows start to get longer, you head back to the hill. You chain your bikes to A.J.'s mailbox. A.J. is in a different mood now, quieter than before. You both sit down on the front steps. A.J. looks thoughtful.\n\n*goto as_happy\n\n*label as_happy\n\"As happy as I am to have her back, I'm still wondering what happened,\" says A.J. \"How did she get stolen? Do I have to worry it will happen again?\"\n\n*label tell_choice\n*choice\n\t#\"News flash: It was your mom.\"\n\t\t*set Secrecy %-40\n\t\t*goto you_tell_aj\n\t#\"Some things we can never know.\"\n\t\t*set Secrecy %+40\n\t\t*goto you_dont_tell_aj\n\t#\"How much do you want to know? Twenty bucks' worth?\"\n\t\t*set Secrecy %-20\n\t\t*set Greed %+40\n\t\t*goto you_sell_aj_info\n\n*label you_tell_aj\n*set aj_knows true\nA.J.'s jaw drops. \"It was Mom?\"\n\nYou nod and explain how Mrs. Carver sold the bike in order to pay the electric bill.\n\n\"It was Mom?\" A.J. repeats, sounding angry this time.\n\n*label blamechoice\n*choice\n\t#\"Don't blame your mom. She was doing her best in a bad situation.\"\n\t\t*set relA %+30\n\t\t*set Respect %+20\n\t\tA.J. frowns furiously, and you expect ${him} to disagree with you. Then all of a sudden the frown melts away and ${he} nods. \"I guess. That electric bill thing sounds pretty rough. I had no idea things were that bad.\"\n\n\t\t\"Well, hopefully they won't be again,\" you say. \"Darren says he'll help out.\"\n\n\t\t\"We'll see about that. Usually Darren is the one who needs help,\" A.J. grins. Then ${he} looks thoughtful. \"Maybe soon, I can get a job myself and help out.\"\n\n\t\t\"That sounds nice,\" you say. \"You know what? You're a nice kid.\"\n\n\t\t\"Aww.\" A.J. ducks ${his} head bashfully. \n\n\t\t*goto sunset\n\t#\"Let's be fair. Technically, it wasn't theft, since she was the one who bought the bike in the first place.\"\n\t\t*set ajs_relM_damaged true\n\t\t*set Respect %+30\n\t\t*set Greed %-10\n\t\t*set relA %-20\n\t\t\"Aww, that's bull,\" says A.J. \"She gave me that bike. It was mine. If it was so legit, why didn't she tell me? Huh? Mom knew full well she was stealing from me. I mean, following your logic, everything we own belongs to our parents.\"\n\n\t\t\"Well, it kind of does,\" you say.\n\n\t\tA.J. shakes ${his} head. \"I don't buy it. Just 'cause I'm a kid doesn't mean you can take my stuff without telling me. I have rights.\"\n\n\t\tAt that moment, Mrs. Carver steps out onto the porch to water her basil plant and waves. A.J. just stares at her, eyes narrow.\n\n\t\t\"I don't know about her,\" says A.J. \"I just don't know.\"\n\n\t\t*goto sunset\n\t#\"We may not always understand, but parents know best.\"\n\t\t*set ajs_relM_damaged true\n\t\t*set Respect %+40\n\t\t*set relA %-20\n\t\tA.J. makes a face. \"That's not true. Parents screw up a lot, you know. You trust them, then they do something like this.\" \n\n\t\tAt that moment, Mrs. Carver steps out onto the porch to water her basil plant and waves. A.J. just stares at her, eyes narrow.\n\n\t\t\"I don't know about her,\" says A.J. \"I just don't know.\"\n\n\t\t*goto sunset\n\t#\"Who knows why old people do what they do? You just can't trust them.\"\n\t\t*set ajs_relM_damaged true\n\t\t*set relA %+20\n\t\t*set Respect %-20\n\t\tA.J nods. \"That's right. You're the only one I can trust. You and the Whips.\" \n\n\t\tAt that moment, Mrs. Carver steps out onto the porch to water her basil plant and waves. A.J. just stares at her, eyes narrow.\n\n\t\t*goto sunset\n\t#\"No offense, but your mom is a real jerk.\"\n\t\t*set Respect %-20\n\t\t*set relA %+10\n\t\t\"Hey! That's my mom you're talking about!\" says A.J.\n\n\t\t\"Don't get mad at me. She's the one who sold your bike,\" you say.\n\n\t\t\"Well, that doesn't give you the right to call her a jerk,\" says A.J. \"I mean, the electric bill thing sounds pretty rough. I had no idea things were that bad…. Hey, I get what you're doing. You were being mean about my mom to reverse-psychology me, right? You really wanted me to defend her for myself.\"\n\n\t\t\"Um…sure,\" you say.\n\n\t\t*goto sunset\n\n*label you_dont_tell_aj\n\"Hmm,\" says A.J. \"I thought you were supposed to be curious, detective!\"\n\n\"Oh well, you can't solve everything,\" you say. \"Sometimes when you go poking into things, you find out things you'd rather not know. And sometimes you become the guardian of a secret that might hurt somebody if it got out. It's a lot of responsibility.\"\n\nA.J. looks confused. \"What does that have to do with this situation?\"\n\nYou put on a smile. \"Oh, nothing. Sometimes bikes get stolen. This is known. Get a better lock.\" \n\nA.J. nods. \"Yeah, that's probably the best idea.\"\n\n*goto sunset\n\n*label you_sell_aj_info\n\"Wait, you know?\" says A.J.\n\n\"Sure I know,\" you say casually. \"I also know that information has value. I don't just give it away for nothing.\" \n\nA.J. shoots you a skeptical look. \"Aw, you don't know.\"\n\n\"Why not give me twenty bucks and find out?\"\n\n\"In your dreams!\" says A.J. with a laugh.\n\n*goto sunset\n\n*label aj_conflicted_about_bike\nPurple Thunder, formerly Red Lightning, is chained to the front porch, so you know Mrs. Carver has given it to A.J. by now. You would have expected A.J. to spend ${his} first day back together with ${his} bike riding it. What's ${he} doing indoors? You knock.\n\nA.J. answers. \"Oh, hey.\"\n\n\"Hey,\" you say. \"I saw your good news.\" You nod back toward the bike. \"Reunited. How does it feel?\"\n\n\"Fine…\" A.J. steps out onto the porch, sits down on the railing, and stares at the bike. Finally, ${he} sighs. \"It's weird, actually. I know Mom expected me to be thrilled when she gave it back to me and I was, I guess…. But knowing what I do, it felt like she was trying to buy me off. You know, bribe me into not being mad. And now that I know she was the one who stole it in the first place, how do I know she won't do it again?\"\n\n*goto blamechoice\n\n*label aj_has_bike\nYou can hear the joyful shouts from the top of the hill, and as you get nearer, you see A.J. zipping around on the purple bike! A.J. grins when ${he} sees you. Hopping off the bike, ${he} runs to you.\n*if(yourBike != \"\")\n\tYou hop off your bike, too, leaving it in a heap on the ground, and run toward ${him}.\n*comment endif\n\nYou meet in big bear hug! \n\n\"Reunited!\" you say. \"How does it feel?\"\n\n\"Amazing!\" A.J. can't stop smiling. \"I don't know if I ever said this, but thanks–just really, thanks for finding it. I never thought I would see it again.\"\n\n\"Aw, well… That's my job,\" you say, waving your hand.\n\n*if(yourBike = \"\")\n\tA.J. pats the back of the bike. \"Hop on!\"\n\t\n\t*goto on_the_back\n*else\n\t\"Hey, is that yours?\" A.J. nods at your bike.\n\t\n\t\"Yep! I've got my own wheels now,\" you say with a grin.\n\t\n\tA.J. kneels and looks over your bike, every inch. After a thorough inspection, ${he} proclaims it \"sweet.\"\n\n\t*gosub biking_together\n\t*goto sunset\n\n*label on_the_back\nA.J. drives you up and down the block for hours. The streets are alive with the sounds of birdsong, children playing, and both of you, laughing into the wind. \n\n*goto sunset\n\n*label aj_has_no_bike\nYou walk up to the door and knock. A.J. answers.\n\n\"Hey,\" ${he} says. \"What's up?\"\n\n*choice\n\t*if(hasBike != \"you\") and (hasBike != \"A.J.\")\n\t\t#\"I'm sorry I didn't get you your bike back.\"\n\t\t\t*goto sorry_bro\n\t#\"Do you have a birthday present for me?\"\n\t\t*set Greed %+20\n\t\t*goto fish_for_present\n\t*if(Money > 20)\n\t\t#\"How are you guys doing? You need anything? Hey, let me order your whole family a pizza.\"\n\t\t\t*set Greed %-30\n\t\t\t*set relA %+20\n\t\t\t*goto order_a_pizza\n\t*if((yourBike != \"\") and (yourBike != \"Purple Thunder\")) or (hasBike = \"you\")\n\t\t#\"You want a ride on my bike?\"\n\t\t\t*goto give_ride\n\t\t#\"I want to give you this bike.\"\n\t\t\t*set relA %+50\n\t\t\t*goto give_other_bike\n\t*if(yourBike = \"\")\n\t\t#\"Let's go for a walk.\"\n\t\t\t*goto walk\n\n*label fish_for_present\nA.J. rolls ${his} eyes. \"Should've known you wouldn't forget. Yeah, I got something, but it's stupid. It's really stupid.\"\n\n*label insist\n\"I wanna see! I wanna see!\" you insist.\n\nA.J. sighs and leads you into the house. In the kitchen, you see a half-built birdhouse. It's put together all wrong, and you're not sure a bird could even get in.\n\nA.J. looks deeply embarrassed. \"I told you it was stupid.\"\n\n*choice\n\t#\"It's perfect.\"\n\t\t*set relA %+30\n\t\t\"Aw, shut up,\" A.J. blushes deeply, but there is a hint of a smile at the corner of ${his} mouth. \"It's terrible.\"\n\n\t\t\"No, it's perfect, because it came from you,\" you say. \"I'm going to put it up in my yard.\"\n\n\t\t\"As modern art maybe,\" A.J. mutters. But ${he} looks pleased. \"Come on. Let's go for a walk.\"\n\n\t\t*goto walktext\t\n\t#\"It looks like more of a present for Finnegan, not me.\"\n\t\t*set relA %-20\n\t\t\"Yeah, well.\" A.J. frowns. \"I didn't have a lot of choices. My mom didn't want to go out and buy something. She says a present is more thoughtful if you make it yourself. And this is the only make-it-yourself kit we had in the house. My grandpa gave it to me years ago. I don't even like birds. It's stupid. I hate it. I knew you would hate it, too.\"\n\n\t\t\"Hate is a strong word…. Aw, forget it,\" you say, feeling embarrassed. Of course, A.J. doesn't have enough money to buy you a present. Why did you put ${him} in this position? \"Who cares about birthdays, anyway? Come on. Let's take a walk.\"\n\n\t\t*goto walktext\n\t#\"Yeah, it's pretty crappy. You're a terrible builder.\" \n\t\t*set relA %+10\n\t\t\"Hey!\" says A.J., offended, but then ${he} rolls ${his} eyes and smiles. \"Yeah, okay, I am. I admit it.\"\n\n\t\tLooking at the birdhouse, you both begin to laugh.\n\n\t\t\"It really is terrible, isn't it?\" says A.J.\n\n\t\t\"Come on,\" you say. \"Let's take a walk. I feel like it's staring at me.\"\n\n\t\t*goto walktext \n\n*label order_a_pizza\n\"Pizza? Sure!\" A.J. grins. Then ${he} pauses, eyes narrow. \"Wait, are you trying to give us charity? Because you feel sorry for us?\"\n\n\"No. I just like pizza,\" you lie.\n\n\"Well, then, great! I haven't had pizza in ages. Mom! Mom! Mo-oh,\" says A.J., turning around. Mrs. Carver is standing right there. \"${Name} is going to order us a pizza, okay?\"\n\n\"I can't let you do that,\" says Mrs. Carver. \"We should be feeding you, not the other way around.\"\n\n\"Aw, it's okay, ${Name} has plenty of money. Anyway, ${she_u} insists on pizza,\" A.J. says. \"Actually, ${she_u}'s being a real brat about it!\"\n\n\"I am,\" you corroborate.\n\n\"Oh, well, I won't stand in your way.\" Mrs. Carver looks pleased, actually. \"Make mine pepperoni.\"\n\nYou order the pizza, and it is the most delicious piping-hot pizza you have ever eaten, even though you get only one slice because A.J. and Mrs. Carver scarf down the rest.\n\n*set Money -20\n\nAfter dinner, you and A.J. take a walk.\n*goto walktext\n\n*label give_ride\nA.J. hops on the back of your bike and you ride ${him} up and down the block. \n\nYou slow as you make it back to A.J.'s house. \"Where to next? Want to go downtown?\"\n\nA.J. hops off. \"Nah. It's a great ride, ${Name}. Really. But it's kinda too painful, you know?\"\n\n\"Bringing back old memories?\"\n\nA.J. shrugs. \"I guess I'll always sort of wonder what happened to it. Red Lightning, I mean.\"\n\nYou know what ${he} means.\n\n*goto tell_choice\n\n*label give_other_bike\n*set yourBike \"\"\n\"Really?\" A.J.'s eyes widen. \"You're giving that to me? No. No way!\"\n\n\"Way,\" you say.\n\nA.J.'s eyes narrow. \"This isn't just cause I'm poor and you feel sorry for me, is it?\"\n\nYou shake your head. \"Nah, I just like you.\"\n\nA.J. smiles a crooked smile and then cries, \"Well, all right! I'm not going to fight you. Whoo! Can I take her for a spin?\"\n\n\"She's yours now,\" you remind ${him}.\n\nYou watch A.J. ride joyfully through the street in wide arcs. You don't have a bike anymore, but you don't care. Watching A.J. so happy, you feel as if you have been given a million bikes. \n\nA.J. stops in front of you and lets you hop on the back.\n*goto on_the_back\n \n*label walk\nA.J. cringes. \"Do you have to rub it in?\"\n\n\"Well, as long as we're both walking,\" you say cheerfully, \"we might as well enjoy it. Come on. I don't even want to think about bikes right now.\"\n\n\"Ditto,\" says A.J. \"All right. Have it your way. You want to walk? Let's walk.\"\n\n*goto walktext\n\n*label walktext\nYou walk down the block in comfortable silence. You cross the vacant lot and walk up through the woods. You walk farther than you ever normally walk. The flowers are blooming, and the birds are singing.\n\n*goto sunset\n\n*label sorry_bro\n\"Listen, I just wanted to say I'm sorry I didn't end up getting you your bike back.\"\n\n*if(ajs_relm_damaged = true)\n\tA.J. shrugs. \"It's not really your fault. I'm mostly just mad at my mom.\"\n\n\t*goto blamechoice\t\n*else\n\tA.J. shrugs. \"It's not your fault. I guess maybe it'll be an unsolved case forever.\"\n\t\n\t\"Some cases are like that,\" you say. \"Come on—let's go for a walk.\"\n\t\n\t*goto sunset\n\n*label sunset\n*page_break\nAs the sun sets over the town, you find yourselves sitting side by side on the hilltop behind your house. Purple clovers and delicate white Queen Anne's lace stretches out like a carpet around you. Everything is tinged gold from the sun's rays. You feel as if all is right in the world. \n\nYou turn and smile at A.J., and A.J. smiles back.\n*if(hasBike = \"you\")\n\tYou feel a little guilty about keeping Red Lightning. But you know it's for the best. After all, you really need a bike.\n\t*finish\n*elseif(relA>80) and (datingA)\n\tYou turn back and gaze at the glorious pink and purple sky, your face warmed by the setting sun. Between you, your hands brush against A.J.'s, and after a moment, ${his} fingers interlace with yours.\n\t*finish\n*else\n\tYou know you two are going to be friends for a long, long time.\n\t*finish\n", "ch6dance": "[b]The Last Dance[/b]\n*set ch6started true\n*temp boughtBikeFairandSquare false\n*label set_admirer\n*temp his_a his\n*temp him_a him\n*temp he_a he \n*temp color \"\"\n*temp corsage \"cluster of white gardenias\"\n*temp flower \"\"\n\n*comment: Some jury-rigging to pick most likely for orientation\n*temp likes_girls false\n*temp likes_boys false\n*if(datingE)\n\t*set likes_boys true\n*if(datingS)\n\t*set likes_girls true\n*if(datingA) and (genA = \"boy\")\n\t*set likes_boys true\n*if(datingA) and (genA = \"girl\")\n\t*set likes_girls true\n\n*comment: if you like neither, you like both.\n*if(likes_girls = false) and (likes_boys = false)\n\t*set likes_girls true\n\t*set likes_boys true\n\n*temp toprelstat relA\n*if((likes_girls = true) and (genA = \"girl\")) or ((likes_boys = true) and (genA = \"boy\"))\n\t*set toprelstat relA\n\t*goto topstats_mainmenu\n*elseif(likes_girls = true)\n\t*set toprelstat relS\n\t*goto topstats_mainmenu\n*elseif(likes_boys = true)\n\t*set toprelstat relE\n\t*goto topstats_mainmenu\n\n*comment: identify the admirer\n*label topstats_mainmenu\n*temp aj_present false\n*temp shashi_present false\n*temp evan_present false\n*temp other_present false\n*temp finnegan_present false\n*temp vitessa_present false\n*temp corley_present false\n*if(relE > toprelstat) and (likes_boys = true)\n\t*set admirer \"Evan\"\n\t*set his_a \"his\"\n\t*set him_a \"him\"\n\t*set he_a \"he\"\n\t*set toprelstat relE\n*if(relS > toprelstat) and (likes_girls = true)\n\t*set admirer \"Shashi\"\n\t*set his_a \"her\"\n\t*set him_a \"her\"\n\t*set he_a \"she\"\n\t*set toprelstat relS\n*if(relC > toprelstat) and (likes_girls = true)\n\t*set admirer \"Corley\"\n\t*set his_a \"her\"\n\t*set him_a \"her\"\n\t*set he_a \"she\"\n\t*set toprelstat relC\n*if(relF > toprelstat) and (likes_boys = true)\n\t*set admirer \"Finnegan\"\n\t*set his_a \"his\"\n\t*set him_a \"him\"\n\t*set he_a \"he\"\n\t*set toprelstat relF\n*if(relV > toprelstat) and (likes_girls = true)\n\t*set admirer \"Vitessa\"\n\t*set his_a \"her\"\n\t*set him_a \"her\"\n\t*set he_a \"she\"\n\t*set toprelstat relV\n\t\n*if(admirer = \"A.J\")\n\t*set aj_present true\n*if(admirer = \"Shashi\")\n\t*set shashi_present true\n*if(admirer = \"Evan\")\n\t*set evan_present true\n*if(admirer = \"Corley\")\n\t*set corley_present true\n*if(admirer = \"Finnegan\")\n\t*set finnegan_present true\n*if(admirer = \"Vitessa\")\n\t*set vitessa_present true\n\n*label number_of_dates_check\n*comment: figure out number of dates.\n*temp number_of_dates 1\n*temp aj_knows_multiple false\n*temp evan_knows_multiple false\n*temp shashi_knows_multiple false\n*if(corley_present) and (not(admirer = \"Corley\"))\n\t*set other_present true\n\t*set number_of_dates +1\n*if(finnegan_present) and (not(admirer = \"Finnegan\"))\n\t*set other_present true\n\t*set number_of_dates +1\n*if(vitessa_present) and (not(admirer = \"Vitessa\"))\n\t*set other_present true\n\t*set number_of_dates +1\n*if(datingA) and (not(admirer = \"A.J\"))\n\t*set aj_present true\n\t*set number_of_dates +1\n\t*if(datingS) and (not(admirer = \"Shashi\"))\n\t\t*set shashi_present true\n\t\t*set number_of_dates +1\n\t*if(datingE) and (not(admirer = \"Evan\"))\n\t\t*set evan_present true\n\t\t*set number_of_dates +1\n\t*goto set_descs\n*elseif(datingS) and (not(admirer = \"Shashi\"))\n\t*set shashi_present true\n\t*set number_of_dates +1\n\t*if(datingE) and (not(admirer = \"Evan\"))\n\t\t*set evan_present true\n\t\t*set number_of_dates +1\n\t*goto set_descs\n*elseif(datingE) and (not(admirer = \"Evan\"))\n\t*set evan_present true\n\t*set number_of_dates +1\n\t*goto set_descs\n\n*label set_descs\n*temp both \"both\"\n\n*if(number_of_dates > 2)\n\t*set both \"all\"\n*temp aj_desc \"Dressing up for a dance isn't really A.J.'s thing, and you notice ${he} is wearing ${his} usual baggy black T-shirt and jeans.\"\n*temp shashi_desc \"She looks radiant in a long blue velvet gown. Around her neck is a choker necklace with a twenty-sided die. Her lipstick is bright blue, to match her dress.\"\n*temp evan_desc \"He looks cool and suave in skinny jeans and a metallic purple jacket. His hair is artfully teased, and you think he may be wearing a hint of mascara.\"\n*temp corley_desc \"She looks sweet as always in a pink satin dress. Sparkly star-shaped barrettes decorate her hair, and her lips are frosted with pale, shimmery lipstick.\"\n*temp finnegan_desc \"He stands tall and handsome in a perfectly tailored suit.\" \n*temp vitessa_desc \"She rocks an outrageous, electric-pink dress with zebra stripes and a vintage fascinator hat with a veil.\"\n*temp aj_dancing_desc \"A.J. dances like ${he} skulks: lithe and graceful. Moving with a light, pantherlike step, ${he} gazes at you with dark, intense eyes.\"\n*temp shashi_dancing_desc \"Shashi moves in slow, ethereal waves, gazing at the ceiling. As the blue light from the disco ball plays on her cheek, she looks like an underwater mermaid or a beautiful creature from another planet.\"\n*temp evan_dancing_desc \"Evan performs old-fashioned, complex steps, like a dancer from the 1800s. As his feet move effortlessly, he gives you a rakish smile and a wink.\"\n*temp corley_dancing_desc \"Corley stares at her feet as she dances, murmuring under her breath, apparently trying to remember steps she has learned in a class. She steps on your foot and jerks her head up to apologize, but when she sees your smile, she breaks into a lovely smile of her own. After that, she forgets about trying to remember the right way to dance and just moves in time with the music, enjoying herself.\"\n*temp finnegan_dancing_desc \"Finnegan's dance moves are modern, but precise and correct. He clearly educated himself on the latest dances the same way he does everything: through careful study. He is happy to share the knowledge with you, demonstrating moves and adjusting your posture. Soon enough, you are the best dancers on the floor!\"\n*temp vitessa_dancing_desc \"Vitessa is a flawless dancer. She moves with the music, making up her own steps completely in rhythm, the sashes and skirts of her dress swaying and swooping around her like a butterfly's wings.\"\n*if(admirer = \"A.J.\")\n\t*temp admirer_desc aj_desc\n\t*temp dancing_desc aj_dancing_desc\n*if(admirer = \"Shashi\")\n\t*temp admirer_desc shashi_desc\n\t*temp dancing_desc shashi_dancing_desc\n*if(admirer = \"Evan\")\n\t*temp admirer_desc evan_desc\n\t*temp dancing_desc evan_dancing_desc\n*if(admirer = \"Corley\")\n\t*temp admirer_desc corley_desc\n\t*temp dancing_desc corley_dancing_desc\n*if(admirer = \"Finnegan\")\n\t*temp admirer_desc finnegan_desc\n\t*temp dancing_desc finnegan_dancing_desc\n*if(admirer = \"Vitessa\")\n\t*temp admirer_desc vitessa_desc\n\t*temp dancing_desc vitessa_dancing_desc\n\n*comment: who goes to the dance with each other other than you (can be affected later)\n*temp shashievan false\n*temp shashicorley false\n*temp evanaj false\n*if((admirer != \"Shashi\") and (admirer != \"Evan\")) and (you_set_up_shashi_evan = true)\n\t*set shashievan true\n*if((admirer != \"Shashi\") and (admirer != \"Corley\")) and (shashievan = false)\n\t*set shashicorley true\n*if((admirer != \"A.J.\") and (admirer != \"Evan\"))\n\t*if(gender != \"boy\") or ((gender = \"boy\") and (genA = \"boy\"))\n\t\t*comment: if you're a boy Evan claims to only like boys, so he wouldn't date a girl like A.J.\n\t\t*set evanaj true\n\n*comment: who you want to go with (if you reveal it)\n*temp want_to_go_with \"unknown\"\n*temp he_want \"na\"\n\n*label start\n*comment *gosub debug\n\n\"Well?\" says Vitessa, striding up to you as you spin the combination on your locker. \"Who's it going to be?\"\n\n\"Who's what going to be?\" you ask.\n\nVitessa sighs. \"Your date? To the Starlight Dance? Did you forget it's tonight, or did you just not see the flyers everywhere? You need a magnifying glass, Sherlock?\"\n\n\"Ummm,\" you say. You've been so wrapped up in your detective business, you haven't gotten around to asking anyone to the dance.\n\n\"To be honest, I don't really care who you take,\" Vitessa admits. \"I just need to fill pages in the society column…. Oh, wait, I'm sorry. I'm sure it's a sore subject. You're probably not going, are you? After all, who would want to go with you?\"\n\n*choice\n\t#\"Don't worry, I have it all figured out. I'm only going with the most awesome person in school!\"\n\t\t*set lie_count +1\n\t\t*set relV %+10\n\t\t*goto i_have_a_date\n\t#\"My mother says we shouldn't be dating at our age anyway. I'll just go with friends.\"\n\t\t*set relV %-10\n\t\t*set Respect %+20\n\t\t*set want_to_go_with \"friends\"\n\t\t*goto mother_says\n\t#\"I can't decide. Who do you think I should ask?\"\n\t\t*set relV %+20\n\t\t*goto who_should_i_ask\n\n*label who_should_i_ask\n*if(admirer = \"Vitessa\")\n\t\"If you're thinking of asking me, forget it. You should have booked me weeks ago. You can't just expect me to drop everything and go with you,\" Vitessa chides. \n\n\t\"I didn't,\" you say, bewildered.\n\n\t\"Good. Because I'm going as a reporter. I'm going to cover it. So I can't really have a date anyway. Which you would know if you had asked anyone. Of course, if you want to hang out with me at the dance, that is up to you, but I won't be there as a regular dancer.\" \n\n\t\"Okay,\" you say. \n\n\t*goto locker_door\n\n*else\n\tVitessa looks pleased to be asked. \"Thank you. It's about time you left your love life up to me. Starting with the absolutely obvious, how about A.J.?\"\n\n\t*goto react_to_asking_aj_advice\n\n*label mother_says\nVitessa winces. \"Only lamers go to dances stag,\" she informs you. \n\n\"Well, I just think there's a lot more to life than romance and dating,\" you say. \"We'll have plenty of time for that when we're older. Right now, I just want to be a kid.\" \n\n\"So, A.J. turned you down?\" says Vitessa.\n\n*goto react_to_asking_aj_advice\n\n*label react_to_asking_aj_advice\n*if(relA \u003c 50)\n\tYou look at the floor. \"A.J. and I are kind of on the outs right now,\" you admit.\n\n\t\"A fight?\" Vitessa perks up. \"Give me the juicy details.\"\n\n\t\"Uh, no comment,\" you say quickly. You forgot who you were talking to for a moment.\n\n\t*goto locker_door\n*elseif(datingA)\n\t\"Oh, no. I would never ask A.J. to a dance. I mean, it's going to school after school. Voluntarily. Have you met A.J.?\"\n\n\tVitessa sighs. \"You two are the worst couple in history. Are you even dating?\"\n\n\t\"We're just not really into dances and that kind of stuff,\" you say. \n\t*if(datingS) and (datingE)\n\t\t\"Now Shashi or Evan, on the other hand…\"\n\t\t\n\t\t*set want_to_go_with \"A.J. and Shashi and Evan\"\n\t\t*set want_he \"they\"\n\t\t*goto tell_vitessa_dating_three\n\t*elseif(datingS)\n\t\t\"Now Shashi, on the other hand…\" \n\t\t\n\t\t*set want_to_go_with \"A.J. and Shashi\"\n\t\t*set want_he \"they\"\n\t\t*goto tell_vitessa_dating_two\n\t*elseif(datingE)\n\t\t\"Now Evan, on the other hand…\"\n\t\t\n\t\t*set want_to_go_with \"A.J. and Evan\"\n\t\t*set want_he \"they\"\n\t\t*goto tell_vitessa_dating_two\n\t*else\n\t\t*set want_to_go_with \"A.J.\"\n\t\t*set want_he he\n\t\t*goto aj_not_into\n*elseif(datingS) and (datingE)\n\t\"A.J.?\" you say, surprised. \"I'm kind of going out with Shashi, actually…I think. And maybe also Evan.\"\n\n\t*set want_to_go_with \"Shashi and Evan\"\n\t*set want_he \"they\"\n\t*goto tell_vitessa_dating_two\n*elseif(datingS)\n\t\"A.J.?\" you say, surprised. \"I'm kind of going out with Shashi, actually…I think.\"\n\n\t\"So what happened when you asked her?\" says Vitessa. \n\n\t\"Well…I didn't,\" you admit. \"What? Why is it all up to me? If she wants to go to the dance with me, she can always ask, you know.\"\n\n\t\"You're hopeless,\" says Vitessa.\n\n\t*set want_to_go_with \"Shashi\"\n\t*set want_he \"she\"\n\t*goto locker_door\n*elseif(datingE)\n\t\"A.J.?\" you say, surprised. \"I'm kind of going out with Evan, actually…I think.\"\n\n\t\"So what happened when you asked him?\" says Vitessa. \n\n\t\"Well…I didn't,\" you admit. \"What? Why is it all up to me? If he wants to go to the dance with me, he can always ask, you know.\"\n\n\t\"You're hopeless,\" says Vitessa.\n\n\t*set want_to_go_with \"Evan\"\n\t*set want_he \"he\"\n\t*goto locker_door\n*else\n\t\"Me and A.J.? Hey, look, just because we've been friends since the dawn of time doesn't mean we go to dances together or any of that,\" you say.\n\t*goto aj_not_into\n\t\n*label tell_vitessa_dating_two\n\"You have two dates?\" Vitessa blinks. \"You? You? I mean, you?\"\n\n\"Technically, I haven't actually asked either of them to the dance,\" you admit.\n\n\"I can see why!\" Vitessa says with a laugh. \"I guess it would get complicated!\"\n\n*goto locker_door\n\n*label tell_vitessa_dating_three\n\"You have three dates?\" Vitessa blinks. \"You? You? I mean, you?\"\n\n\"Technically, I haven't actually asked any of them to the dance,\" you admit.\n\n\"I can see why!\" Vitessa says with a laugh. \"I guess it would get complicated!\"\n\n*goto locker_door\n\n*label aj_not_into\n\"A.J. doesn't want to go to some school function.\"\n\n\"Are you sure?\" says Vitessa. \"Maybe ${he} is just waiting for you to ask.\" \n\nHmm. You really can't be sure.\n\n*set want_to_go_with \"A.J.\"\n*set want_he he\n*goto locker_door\n\n*label i_have_a_date\n\"The most awesome person in school, huh?\" Vitessa raises an eyebrow. \"And who would that be?\"\n\nRight. You didn't think this far ahead in the conversation.\n\n*choice\n\t#\"A.J.\"\n\t\t*set want_to_go_with \"A.J.\"\n\t\t*set want_he he\n\t\t*goto gowith_aj\n\t*if(datingE) and (admirer != \"Evan\")\n\t\t#\"Evan.\"\n\t\t\t*set want_to_go_with \"Evan\"\n\t\t\t*set want_he \"he\"\n\t\t\t*goto gowith_evan\n\t*if(datingS) and (admirer != \"Shashi\")\n\t\t#\"Shashi.\"\n\t\t\t*set want_to_go_with \"Shashi\"\n\t\t\t*set want_he \"she\"\n\t\t\t*goto gowith_shashi\n\t*if(admirer != \"Vitessa\") and (admirer != \"A.J.\")\n\t\t#\"${admirer}.\"\n\t\t\t*set want_to_go_with admirer\n\t\t\t*set want_he he_a\n\t\t\t*goto gowith_other\n\t#\"Myself.\"\n\t\t*set want_to_go_with \"myself\" \n\t\t*goto gowith_myself\n\t#\"You?\"\n\t\t*set want_to_go_with \"Vitessa\"\n\t\t*set want_he \"she\"\n\t\t*goto gowith_you\n\n*label gowith_aj\n\"Of course,\" says Vitessa. \"I should have guessed. You two are joined at the hip. You know, someday you'll realize there are other people in the world.\" \n\n*goto locker_door\n\n*label gowith_evan\n\"Huh,\" says Vitessa. \"No, no, I guess I can see it. It's just weird. I can imagine meeting up with Evan before the dance, for makeovers and outfit consultations, but I can't actually imagine going with him.\"\n\n*goto locker_door\n\n*label gowith_shashi\nVitessa shudders. \"As long as you don't mind going with someone who thinks a wizard hat is a good fashion choice, knock yourself out. To each ${hers_u} own, I guess.\" \n\n*goto locker_door\n\n*label gowith_other\nVitessa makes a face that indicates that she would not, personally, want to subject herself to such a fate, but she shrugs. \"To each ${hers_u} own, I guess.\" \n\n*goto locker_door\n\n*label gowith_myself\n*set want_to_go_with \"nobody\"\n\"I am my own date,\" you announce. \"I don't need or want anyone else.\" \n\nVitessa rolls her eyes. \"I hope you make yourself very happy.\" \n\n*goto locker_door\n\n*label gowith_you\n\"You only wish!\" Vitessa laughs. \n*if(admirer = \"Vitessa\")\n\t\"I can't go with anybody anyway, because I'll be there as a reporter.\"\n\n*goto locker_door\n\n*label locker_door\n*set seen_note true\nAs you pull open your locker door, a piece of folded notebook paper flutters to the floor. Someone must have stuck it in the vent. You snatch it up hopefully. It could be someone asking you to solve a mystery!\n\n\"What's that?\" asks Vitessa. Nothing escapes her eagle eyes. She peers over your shoulder and reads it aloud. \n\n*if(admirer = \"A.J.\")\n\t\"'I like you. Do you like me? Go to the dance with me.' Well, that's to the point, isn't it?\" Vitessa smirks. \"I don't know why there are lightning bolts drawn on it, but whatever. Who's it from?\"\n\n\t*goto turn_it_over\n*elseif(admirer = \"Evan\")\n\t\"'Dear ${Name}, Hi. Will you go to the dance with me? If yes, please write back with the color you are wearing so I can match a corsage.'\" Vitessa makes a face. \"Nobody wears corsages anymore. You've been asked out by a nerd. Who's it from?\"\n\n\t*goto turn_it_over\n*elseif(admirer = \"Shashi\")\n\t\"'Dance. The final frontier. To boldly go where no one has gone before: the gym. You in?'\" Vitessa knits her brows. \"Good Lord. What does that even mean? Is someone trying to ask you out? They sound like a gibbering madman. Who's it from?\"\n\n\t*goto turn_it_over\n*elseif(admirer = \"Corley\")\n\t\"'Please, will you please if you want to go to the dance with me. 'Twould make my heart sing a song of gladness, fair one. But only if you want to.'\" Vitessa looks like she might vomit. \"You've been asked out by a nerd. Who's it from?\"\n\n\t*goto turn_it_over\n*elseif(admirer = \"Finnegan\")\n\t\"'Dear ${Name}, I am writing this note to ask you to the dance. Meet me on the school steps at 7:30 PM. I will be wearing a red carnation. If you want to go with me, also wear a red carnation. If not, wear a black carnation so I know.'\" Vitessa raises an eyebrow. \"Kind of bossy for someone asking you out. Who's it from?\"\n\n\t*goto turn_it_over\n*elseif(admirer = \"Vitessa\")\n\t\"'Don't ask anyone to the dance. We'll hang out together and make fun of everyone else's outfits.'\" Vitessa begins to laugh. \"Now who left you that?\"\n\n\t*goto turn_it_over\n\n*label turn_it_over\nYou turn the note over. The back is blank. You turn it back and look at the letters. The handwriting looks vaguely familiar, but you can't place it. \"It's not signed,\" you say. \"I guess it's a secret admirer…or they forgot to sign it.\"\n\n\"Or they were too embarrassed to admit they like you in public,\" suggests Vitessa, \"and rightly so. Well? Are you going to do what the note says? Are you going to go to the dance with the person?\"\n\n*choice\n\t#\"Absolutely! A mystery admirer. How exciting.\"\n\t\t*set want_to_go_with \"admirer\"\n\t\t*comment the WORD admirer, ie you want to go with the mystery, to differentiate you independently liking whoever it is\n\t\t*goto yes\n\t#\"It depends on who it is.\"\n\t\t*goto depends\n\t*if((want_to_go_with != \"Vitessa\") and (want_to_go_with != \"myself\")) and ((want_to_go_with != \"unknown\") and (want_to_go_with != \"nobody\"))\n\t\t#\"I was hoping to go with ${want_to_go_with}, actually.\"\n\t\t\t*goto someone_particular\n\t#\"I was hoping to go with someone else.\"\n\t\t*goto i_want_someone_else\n\t#\"I'm not interested in dating. I'll just go alone.\" \n\t\t*goto alone\n\n*label yes\n\"That's the adventurous spirit!\" Vitessa grins. \"Keep me updated. I will be monitoring this situation. Surprisingly, you are the most interesting topic for my column right now!\" \n\nShe walks off.\n\n*gosub write_back\n\n*goto going_home\n\n*label write_back\n*if(admirer = \"Evan\")\n\tYou look at the note, turning it over in your hands. You're not sure how to write back, since the admirer is, well, secret. You're not sure the admirer really thought that part out. You take a piece of paper out of your bag. You can tape it to your locker, at least; maybe they will come back to check for a reply. What do you write?\n\t\n\t*fake_choice\n\t\t#\"Dear S.A., thank you for your kind invitation. I will wear blue. Sincerely, ${Name}.\"\n\t\t\t*set color \"blue\"\n\t\t\t*set Secrecy %-10\n\t\t\t*set Respect %+10\n\t\t\t*set relE %+10\n\t\t#\"S.A.—Jade green silk. Cattelya orchids, please, if available. Thx.\"\n\t\t\t*set color \"jade\"\n\t\t\t*set Secrecy %-10\n\t\t\t*set Greed %+10\n\t\t\t*set relE %+20\n\t\t\t*set corsage \"gorgeous plum-colored orchid\"\n\t\t#\"Black.\" That's it. Just \"Black.\" Your admirer will know what it means.\n\t\t\t*set color \"black\"\n\t\t\t*set Secrecy %+10\n\t\t\t*set Respect %-10\n\t\t\t*set relE %+10\n\t\t#Nothing. I won't leave a note. Let the admirer dangle.\n\t\t\t*set Secrecy %+20\n\t\t\t*set relE %-10\n*return\n\n*label depends\n\"You better figure it out, Detective!\" says Vitessa. \"And keep me updated. I will be monitoring this situation. Surprisingly, you are the most interesting topic for my column right now!\"\n\n*goto going_home\n\n*label someone_particular\n\"Maybe ${want_he} left the note,\" Vitessa suggests. \"You don't know.\" \n\n*if(want_he = \"they\")\n\t\"Together?\" you ask.\n\t\n\t\"Well, one of them. The odds are better when you like more than one person,\" Vitessa observes. \n\t\n\tShe has a point. \n\t\n\t*goto going_home\n*else\n\t\"I'm not sure,\" you say. \"Do you think ${want_he} would write a note like this?\"\n\t\n\tVitessa shrugs. \"You're the detective.\"\n\t\n\t*goto going_home\n\n*label i_want_someone_else\n\"You don't know who left you the note,\" Vitessa points out. \"Maybe it's exactly who you want to go with!\"\n\n*if(number_of_dates > 1)\n\t\"What if I want to go with more than one person?\" you say.\n\n\t\"I can't help you there,\" says Vitessa. \"I doubt the note was written by committee. Well, keep me updated. I will be monitoring this situation. Surprisingly, you are the most interesting topic for my column right now!\"\n\n\t*goto going_home\n*else\n\t\"What are the odds of that?\" you wonder.\n\n\t\"Well, you never know,\" says Vitessa. \"Keep me updated. I will be monitoring this situation. Surprisingly, you are the most interesting topic for my column right now!\"\n\n\t*goto going_home\n\n*label alone\n*set number_of_dates 0\n\"Right. Suit yourself,\" says Vitessa. \"I can see you are not going to be a fruitful source of juicy column topics.\"\n\n*goto going_home\n\n*label going_home\n*if(you_are_a_whip)\n\t*goto kyle_whip_reconsider\n*if(lie_count > 5) or (blackmail_attempts > 3)\n\t*goto kyle_whip_offer\n*else\n\t*goto note_at_home\n\n*label kyle_whip_reconsider\n*page_break\nAs you're walking home, mind swimming with thoughts of the note, a mountain bike comes to a stop in front of you. Kyle lifts his sunglasses. \"There you are. I've been looking all over for you.\"\n\n\"Um, did you try school?\" you ask.\n\n\"See, this is the problem with you,\" Kyle scolds. \"You are supposed to be a Whip, but you go to class every single day. On time! I've also heard some disturbing rumors. Almost everyone in your class has a story about how much you have helped them. I am beginning to think you only joined us for your own personal gain.\"\n\n\"Isn't that kind of a Whip-like thing to do?\" you ask.\n\nKyle considers this, then shakes his head. \"Maybe so, but I can't have a ${Scout} in the Whips. It makes us all look soft. So I have to ask. Are you in, or are you out?\"\n\n*choice\n\t#\"I'm in. Once you're a Whip, you're a Whip all the way.\"\n\t\t*set Respect %-20\n\t\t\"Just start acting like it, okay?\" says Kyle, waggling a finger. \"I don't want to hear about you helping any old ladies across the street. We have a certain image to maintain.\"\n\n\t\t\"The only reason I would help an old lady across the street is to pick her pocket,\" you promise.\n\n\t\tKyle nods. \"Glad to hear it. We're going TP'ing tonight, if you want in.\"\n\n\t\t\"Tonight?\" You wince. \"Um, I might be busy tonight.\"\n\n\t\t\"What could be more important? You're not going to that dumb school dance, are you? You better be going only so you can ruin it by, like, pulling the fire alarm or something. Actually, you should totally do that!\n\t\t*if(owe_kyle_favor)\n\t\t\tYou do owe me, after all.\n\t\tIt'll be hilarious. Or set off a stink bomb or whatever. I leave it up to your creative powers.\" \n\n\t\t*goto by_the_way_kyle\n\t#\"I'm out. Sorry I lied to get the notebook, but I don't really want to make trouble.\"\n\t\t*set you_are_a_whip false\n\t\t*set Respect %+20\n\t\tKyle scoffs. \"I should have expected that answer. Good luck in your perfect life, Teddy Bear.\"\n\n\t\tYou breathe a sigh of relief. It's nice not to be a Whip anymore. The whole thing made you kind of uncomfortable.\n\n\t\tKyle leans forward on his handlebars, about to ride off.\n\n\t\t*goto by_the_way_kyle\n\t#\"If you make me choose, I guess I'm out. I'm not much of a joiner. But maybe we'll work together in the future.\"\n\t\t*set you_are_a_whip false\n\t\t*set Greed %+10\n\t\t*set Respect %+10\n\t\t\"If you ever need a mystery investigated or you come across a deal that may be mutually beneficial, let me know,\" you say. \n\n\t\t\"Fair enough,\" says Kyle. \"If you ever some need mischief done, let me know. I don't drive too hard a bargain.\" He winks and laughs.\n\n\t\tYou're not a Whip anymore. Not officially, anyway. It feels good to be rid of the title. And you've kept Kyle as a resource. It's useful to have an underground connection for certain types of mysteries.\n\n\t\t*goto by_the_way_kyle\n\n*label kyle_whip_offer\n*page_break\nAs you're walking home, mind swimming with thoughts of the note, a mountain bike comes to a stop in front of you. Kyle lifts his sunglasses. \"There you are. I've been looking all over for you.\"\n\n\"Um, did you try school?\" you ask.\n\nKyle laughs. \"Do you honestly go to school every day? On time? You could be so much more. I've heard encouraging things about you, ${Name}. Your reputation has traveled.\n*if(lie_count > 5)\n\tYou're a pathological liar.\n*if(blackmail_attempts > 3)\n\tYou shake down your friends and family for money at every opportunity.\n*if(Respect \u003c 30)\n\tYou're relentlessly sarcastic, rude, and unpleasant to adults.\nIn any situation, your first thought is, How can I turn this to my advantage? In short, you are Whip material. I'm here to offer you a place in my elite team of liars, cheats, thieves, and underachievers. What do you say? Are you in?\"\n\n*choice\n\t#\"I thought you'd never ask. I'm the Whip the world has been waiting for.\"\n\t\t*set Respect %-20\n\t\t*set you_are_a_whip true\n\t\tKyle grins. \"Excellent! You have made the best decision of your young life. We're going TP'ing tonight, if you want in.\"\n\n\t\t\"Tonight?\" You wince. \"Um, I might be busy tonight.\"\n\n\t\t\"What could be more important? You're not going to that dumb school dance, are you? You better be going only so you can ruin it by, like, pulling the fire alarm or something. Actually, you should totally do that!\n\t\t*if(owe_kyle_favor)\n\t\t\tYou do owe me, after all.\n\t\tIt'll be hilarious. Or set off a stink bomb or whatever. I leave it up to your creative powers.\"\n\n\t\t*goto by_the_way_kyle\n\t#\"No, thank you. Whatever you heard, forget it. I am a fine, upstanding citizen.\"\n\t\t*set Respect %+20\n\t\tKyle laughs. \"See? That's what I'm saying. You lie! Don't deny it. This could have been a beautiful partnership, but it's your loss. See you around.\" Kyle leans forward on his handlebars, ready to leave.\n\n\t\t*goto by_the_way_kyle\n\t#\"I'm not much of a joiner. But maybe we'll work together in the future.\n\t\t*set Greed %+10\n\t\t*set Respect %+10\n\t\tIf you ever need a mystery investigated, or you come across a deal that may be mutually beneficial, let me know,\" you say. \n\n\t\t\"Fair enough,\" says Kyle. \"If you ever some need mischief done, let me know. I don't drive too hard a bargain.\" He winks and laughs.\n\n\t\tYou shake his hand, pleased with the way this turned out. You don't want to be tied down to a club, but it's useful to have an underground connection for certain types of mysteries.\n\n\t\t*goto by_the_way_kyle\n\n*label by_the_way_kyle\n*temp KYou \"You\"\n*temp kyoulittle \"you\"\n*temp KI \"I\"\n*temp KyleOrRina \"Kyle\"\n*temp Khe \"he\"\n*if(likes_boys = false)\n\t*set KYou \"Rina\"\n\t*set kyoulittle \"she\"\n\t*set KI \"We\"\n\t*set KyleOrRina \"Rina\"\n\t*set Khe \"she\"\n\"Wait, Kyle. Before you go,\" you say. \"${KYou} didn't, uh, give me a note today, did ${kyoulittle}? In my locker?\"\n\n\"Not likely. ${KI} didn't even set foot in school today,\" Kyle brags. \"Why? Did you get a threatening note? Blackmail, perhaps?\"\n\n\"Never mind,\" you mutter. You figure if Kyle knew anything about the note, he wouldn't be able to resist teasing you about its contents. It was a long shot, anyway. If ${KyleOrRina} liked you, ${Khe}'d probably let you know by leaving you a dead rat or something.\n\nKyle rides off, leaving you in a cloud of dust and confusion.\n\n*goto note_at_home\n\n*label note_at_home\n*page_break\nYou're at home after school, doing homework on the couch, when your dad walks in the front door holding a folded piece of paper. \"Hey, ${Name}, I think this is yours. I found it on the front porch….\"\n\nInstantly, your heart sinks. It's the secret admirer note! It must have fallen out of your pocket when you got your keys. You grab it out of your dad's hands. \"You didn't read it, did you?\"\n\n\"I sure did. How else would I know it's yours? Well, well, well. Baby's first love note!\" He grins. \"Soooo? Who's it from?\"\n\n*fake_choice\n\t#\"Could be anyone. I have so many irons in the fire.\" \n\t\t*set relD %+10\n\t\tDad laughs.\n\n\t\t*if(number_of_dates > 1)\n\t\t\tIf only he knew how true it was!\n\t#\"It's probably just a joke.\"\t\n\t\t\"Don't be so down on yourself! Who wouldn't want to go to a dance with my snookie-wookums?\" Dad pinches your cheeks.\n\t#\"I'd prefer not to tell tales out of school.\" \n\t\t*set Respect %+10\n\t\t*set Secrecy %+10\n\t\t*set relD %-10\n\t\tDad backs off, raising his hands. \"Fine, fine, forgive me for showing an interest!\"\n\t#\"Your mom.\"\n\t\t*set Respect %-20\n\t\t*set relD %+10\n\t\tDad laughs. \"Good one!\"\n*comment endif\n\n*label examine_note\nAlone in your room later, you examine the note. It is ordinary wide-ruled notebook paper, torn out of someone's notebook. The ruffly edges are still on the page. The words have been written in blue ballpoint ink. \n\n*label examine_note_choice\n*comment *gosub debug\n*choice\n\t*disable_reuse #Analyze the handwriting.\n\t\t*goto analyze_handwriting\n\t*if(haveCompact)\n\t\t*disable_reuse #Dust for fingerprints.\n\t\t\t*goto dust\n\t*disable_reuse #Post a status message asking the writer to come forward.\n\t\t*set Secrecy %-30\n\t\t*goto ask_around\n\t*if(datingA)\n\t\t*disable_reuse #Ask A.J. if ${he} sent the note.\n\t\t\t*set Secrecy %-20\n\t\t\t*goto ask_aj\n\t*if(datingS)\n\t\t*disable_reuse #Ask Shashi if she sent the note.\n\t\t\t*set Secrecy %-20\n\t\t\t*goto ask_shashi\n\t*if(datingE)\n\t\t*disable_reuse #Ask Evan if he sent the note.\n\t\t\t*set Secrecy %-20\n\t\t\t*goto ask_evan\n\t*if(asked = \"nobody\") and (want_to_go_with != \"admirer\")\n\t\t#Forget the note. It's my dance, and I want to ask who I want to ask.\n\t\t\t*goto ask_someone\n\t#Prepare for the dance. I'll know who sent it soon enough!\n\t\t*goto prep\n\n*label analyze_handwriting\nThe handwriting is messy; the writer seems to have scrawled the message in haste, possibly upright against the locker. There are no distinguishing marks, like an \"i\" dotted with a heart or anything like that.\n\nYou set to work comparing the handwriting with the handwriting on your valentines from years past. It's hard to tell if there is a match from such a small sample. \n\n*if(admirer = \"Vitessa\")\n\tYou close your eyes and try to remember the mean notebook. You can't rule out Vitessa as the possible note writer. The thought pleases you, because even though you think Vitessa is an unlikely option, and even though she is mean in some ways, you think she's smart and you sort of like her. \n\n\t*goto examine_note_choice\n*else\n\tThe only person you can definitely rule out is Vitessa. You saw plenty of her handwriting in her mean notebook, and this doesn't look like hers. You never really thought it was Vitessa anyway, but at least you don't have to worry about that horrible possibility!\n\n\t*goto examine_note_choice\n\n*label dust\nYou dust the paper carefully for fingerprints, but the paper is dull, and no fingerprints appear. It would work better if the writer had used glossy paper. \n\n*goto examine_note_choice\n\n*label ask_around\nYou post a status message online asking \"Okay, you jokers, which one of you wrote me an anonymous love note?\" \n\nSurprisingly, nobody comments! But everyone you know \"likes\" it. \n\n*goto examine_note_choice\n\n*label ask_aj\nYou call A.J. on the phone and ask directly. \"Hey, weird question. Did you write me a note asking me to the dance?\"\n\n*if(admirer = \"A.J.\")\n\t*temp he_askee he\n\t*temp agree_emotion \"surprised. You didn't know A.J. went in for this sort of thing. Then again, you're still getting to know A.J.'s romantic side\"\t\n\t*goto ask_admirer\n*else\n\t\"Whoa,\" says A.J. \"Somebody asked you to the dance? In a note?\"\n\t\n\t\"So it wasn't you?\"\n\t\n\t\"No way. I'd never do something that nerdy. Who is this joker? I'll sock 'em in the jaw.\" \n\t\n\t*if(Respect >= 50)\n\t\t\"Oh, you will not. Be nice.\"\n\t*if(Respect \u003c 50)\n\t\t\"Don't get your panties in a twist. It's just a note.\" \n\t\n\t\"Oh, all right,\" says A.J. \"I guess it's not the admirer's fault they admire you. You are pretty great. So who are you going to the dance with? Me or Secret A?\"\n\t\n\t*choice\n\t\t#\"You, of course.\"\n\t\t\t*set relA %+20\n\t\t\t\"Sweet!\" says A.J. You chat for a bit longer and then hang up, smiling. You feel happy but confused. Did A.J. just agree to go to a dance? And what's going to happen with the secret admirer?\n\n\t\t\t*set asked \"A.J.\"\n\t\t\t*set want_to_go_with \"A.J.\"\n\t\t\t*if(aj_present = false)\n\t\t\t\t*set aj_present true\n\t\t\t\t*set number_of_dates +1\n\t\t\t*set aj_knows_multiple true\t\n\t\t\t*goto examine_note_choice\n\t\t#\"I kind of want to see what happens with this secret admirer person.\"\n\t\t\t*set relA %-20\n\t\t\t\"Oh,\" says A.J., sounding disappointed. \"Okay. Whatever. Go with your admirer. I didn't want to go to some dumb dance anyway.\"\n\t\t\t\n\t\t\t\"You can still go,\" you say. \"Ask somebody else.\" \n\n\t\t\t*if(evanaj = false)\n\t\t\t\t\"No way,\" says A.J. \"Dances are the worst. I bet you all get food poisoning from the cupcakes. But, uh, have fun.\"\n\t\t\t*if(evanaj = true)\n\t\t\t\t\"Not likely,\" says A.J. \"Who else would want to spend the dance sitting under the bleachers and making fun of everyone else?\"\n\n\t\t\t\t\"I'm sure you can find someone. You're a catch,\" you assure ${him}.\n\t\t\t\n\t\t\tAs you hang up, you feel kind of bad but also kind of relieved. Dating A.J. has been fun, but you need a break. And you're really excited to see who this secret admirer is!\n\t\t\t\n\t\t\t*set want_to_go_with \"admirer\"\n\t\t\t*set aj_present false\n\t\t\t*set number_of_dates -1\n\t\t\t*goto examine_note_choice\n\t\t#\"Both of you.\" \n\t\t\t*set relA %-10\n\t\t\t\"You want to have two dates?\"\n\t\t\t\n\t\t\t\"At least!\" you quip.\n\t\t\t\n\t\t\t\"Hmm,\" says A.J. \"I don't know if I'm cool with that. I don't want to have to share you.\" \n\t\t\t\n\t\t\t\"I like lots of people, A.J. I don't want to just go to things with the same person all the time.\"\n\t\t\t\n\t\t\t\"Okay. Whatever. Go with your admirer. I didn't want to go to the dance anyway.\" \n\t\t\t\n\t\t\t\"Are you sure? You can still come.\" \n\t\t\t\n\t\t\t\"No way,\" says A.J. \"Dances are the worst. I bet you all get food poisoning from the cupcakes. But, uh, have fun.\"\n\t\t\t\n\t\t\tAs you hang up, you feel disappointed but also excited. You still need to find out who this secret admirer is!\n\t\t\t\n\t\t\t*set want_to_go_with \"admirer\"\n\t\t\t*set number_of_dates -1\n\t\t\t*set aj_present false\n\t\t\t*goto examine_note_choice \n\t\t\t\n\t\t#\"Neither of you. I'm going by myself.\"\n\t\t\t\"How can you go to a dance by yourself?\" says A.J. \"There will be people there. You will be with people.\"\n\t\t\n\t\t\t\"I just don't think I want to have a formal date,\" you say. \"I just want to hang out with friends.\" \n\t\t\t\n\t\t\t\"Okay,\" says A.J. \"As long as I'm one of the friends.\"\n\t\t\t\n\t\t\tYou chat a bit longer and then hang up. You're glad A.J. doesn't mind going as \"just friends.\" You're surprised that ${he} wants to go at all! But you're also pleased. This is shaping up to be a pretty fun dance. But you still don't know who your admirer is!\n\t\t\t\n\t\t\t*set aj_knows_multiple true\n\t\t\t*set want_to_go_with \"friends\"\n\t\t\t*goto examine_note_choice \n\n*label ask_evan\nYou call Evan on the phone and ask directly. \"Hey, weird question. Did you write me a note asking me to the dance?\"\n\n*if(admirer = \"Evan\")\n\t*temp he_askee \"he\"\n\t*temp agree_emotion \"feeling warm and fuzzy. Evan is such a romantic\"\n\t*goto ask_admirer\n*else\n\t\"Oh, no!\" Evan. \"Somebody wrote you a love note? Of course, lots of people must like you.\" \n\t\n\t\"So it wasn't you?\"\n\t\n\t\"No. I only wish I'd thought of something that romantic. Um, so, who would you want to go to the dance with? Me—or the admirer?\"\n\t\n\t*choice\n\t\t#\"You, of course.\"\n\t\t\t*set relE %+20\n\t\t\t\"Great!\" says Evan, breathing a sigh of relief.\n\t\t\t\n\t\t\tYou chat for a bit longer and then hang up. You're happy to have things settled with Evan, but you still don't know who the admirer is!\n\n\t\t\t*set evan_knows_multiple true\t\n\t\t\t*set asked \"Evan\"\t\n\t\t\t*set want_to_go_with \"Evan\"\n\t\t\t*if(evan_present = false)\n\t\t\t\t*set evan_present true\t\n\t\t\t\t*set number_of_dates +1\n\t\t\t*goto examine_note_choice\n\t\t#\"I kind of want to see what happens with this secret admirer person.\"\n\t\t\t*set relE %-20\n\t\t\t\"Oh. Okay,\" says Evan, sounding disappointed. \"That's understandable. Well, I better go.\"\n\t\t\t\n\t\t\tYou feel a little funny as you hang up. You think you might have hurt Evan's feelings. Still, how can you turn down the chance to go to a dance with a mysterious admirer? You still don't know who it is!\t\t\t\n\t\t\t
