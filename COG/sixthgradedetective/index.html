digit pass key? \n\n\t\t\tOh, right. The screen is not always a number pad. Sometimes it's something else, like an e-mail or a website. Evan has to touch the screen hundreds of times in all different places every time he uses his phone. \n\n\t\t\tOh, well. It was worth a shot. You wipe the powder off the screen. \n\n\t\t\t*page_break\n\t\t\t*goto phone_screen\n\t*else\n\t\t*disable_reuse #Dust the phone screen for fingerprints.\n\t\t\tYou saw this on TV once, with a security system number panel. The numbers that are hit the most often should have the strongest fingerprints. You won't know the order, but it will narrow it down to just a few combinations. \n\n\t\t\tUnfortunately, you have no powdery substance to dust the phone screen with.\n\n\t\t\t*page_break\n\t\t\t*goto phone_screen\n\t*if(in_shashis_gaming_group)\n\t\t*disable_reuse #Take a break and go to tonight's Swords & Sorcerers game.\n\t\t\t*goto shashi_game\n\t*else\n\t\t*disable_reuse #Interview Evan's friends. Maybe one of them has an idea.\n\t\t\t*set Secrecy %-10\n\t\t\t*goto friends_interview\n\t#Never mind, I'm not getting anywhere. Give the phone back to Evan.\n\t\t*goto_scene ch3evan_sc3returnphone\n\n*label auth_failed\nThe screen flashes, \"Authentication failed!\"\n*goto password_choice\n\n*label friends_interview\n*temp girls_roundabout_did false\n*temp girls_recruit_did false\n\nSurely one of Evan's friends will know where he goes each day. You start with Shashi, since you know she and Evan have gamed together. You find Shashi and Corley working on their comics page in the library.\n\n*choice\n\t#\"How are you two doing with your newspaper assignments?\"\n\t\t*set Secrecy %+20\n\t\t*set relC %+10\n\t\t*goto girls_roundabout\n\t#\"Evan's really been flaking out lately, huh? Do you know where he goes each day?\"\n\t\t*set Secrecy %-10\n\t\t*set relC %-10\n\t\t*goto girls_direct\n\t#\"Do you want to be my deputies?\"\n\t\t*set Secrecy %-20\n\t\t*set relS %+20\n\t\t*goto girls_recruit\n\n*label girls_direct\n\"Beats me!\" says Shashi cheerfully.\n\nCorley frowns. \"Be nice,\" she urges. \"Maybe he has a family emergency or something.\"\n\n\"You'd think he'd tell us,\" says Shashi. \"I'm kind of peeved at him, actually. He's been skipping game night, too, which is rough, because he really seemed to like it. He really connected with his character, I thought. But I'm thinking of kicking him out. We need a healer! Our characters are dying left and right. Hey, do you think he had a death in the family? Maybe he inherited money. That could explain why he has such a nice phone.\"\n\n\"Oh, Shashi,\" says Corley. \"Don't say that. What if someone really did die?\"\n\n\"What? It's dark humor!\" Shashi defends herself. \"You're too nice.\"  \n\n*choice\n\t#\"Do you know much about Evan's family?\"\n\t\t*goto evans_family\n\t*if(know_raven = false) \n\t\t#\"Tell me more about Evan's Swords and Sorcerers character.\"\n\t\t\t*set relS %+10\n\t\t\t*goto evans_character\n\t*selectable_if(girls_recruit_did = false) #\"If you're as curious as I am, I could really use a couple of helpers.\"\n\t\t\t*set Secrecy %-20\n\t\t\t*set relS %+20\n\t\t\t*goto girls_recruit\t\n\t*selectable_if(girls_roundabout_did = false) #\"You girls seem to have opposite attitudes. How is your collaboration going?\"\n\t\t\t*set relS %+10\n\t\t\t*set relC %+20\n\t\t\t*goto girls_roundabout\n\t\t\n*label evans_family\n\"His mom is a pharmacist. I know because I see her when I go to pick up my ADD medication,\" Shashi explains.\n\n\"Shashi! You don't have to tell ${her_u} that,\" says Corley.\n\n\"Why not? I don't care.\" \n\n\"What about Evan's dad?\" you ask, bringing them back on track.\n\n\"They're divorced, I think,\" says Shashi. \n\n\"Any brothers or sisters?\"\n\n\"Nope,\" says Shashi confidently.\n\n\"One brother. In college,\" Corley pipes up. \"His name is Andrew. Evan plays basketball, his favorite color is green, and his favorite poem is ‘The Raven,' by Edgar Allen Poe.\"\n\nShashi looks at her admiringly. \"How did you know that? You've only been here a few weeks!\"\n\nCorley blushes. \"I don't know. I talked to him. We talked about how we feel about having family members so far away. My dad is away a lot on business.\" \n\n\"People really open up to Corley,\" Shashi tells you. \"She seems so nonthreatening.\"\n\n\"I am!\" says Corley earnestly. \n\n\"Thanks, guys,\" you say. \"That's very interesting.\" \n\n*set know_andrew true\n*set know_andrew_brother true\n*set know_raven_poem true\n*set know_raven true\n\n*page_break\n*goto phone_screen\n\n*label evans_character\n\"He's a level-six healer,\" says Shashi. \"He knows Healing Whisper, Scent of the Spirits, and Windwalker.\"\n\n\"His name is Raven,\" Corley adds softly. \n\n\"Oh, right,\" says Shashi. \"He has a whole tortured backstory.\"\n\n\"He was a prince who was shunned by his own people for having a raven-shaped birthmark—an evil omen,\" Corley explains. \n\n\"Right. That,\" says Shashi. \"Personally, I think he should have taken Sure Shot instead of Windwalker. Less flavor, but it's more useful in combat.\" \n\n\"Thanks, guys,\" you say. \"That's very interesting.\" \n\n*set know_raven true\n*set know_raven_ss true\n\n*page_break\n*goto phone_screen\n\n*label girls_roundabout\n*temp girls_roundabout_did true\nCorley smiles radiantly. \"Wonderfully!\" Then she looks down and blushes. She seems to have startled herself more than anything.\n\n\"Yeah, it's great,\" says Shashi. \"Corley is really smart.\"\n\n\"And Shashi is fun and good at dealing with people,\" says Corley.\n\n\"You're good at people, too,\" Shashi informs her. \"People trust you because you're nice and you're quiet. I scare them off.\" \n\n\"But you don't get scared of the vice principal,\" says Corley. \"Or Finnegan.\"\n\n\"Oh, Finnegan is easy. You just have to be businesslike and efficient. He doesn't like anything that wastes even one second of his time. He respects people who are good at what they do and don't beat around the bush. Also, he likes flattery. Tell him he's wonderful and he's putty in your hands,\" Shashi explains. \n\n\"What about Evan?\" you ask.\n\n\"Oh, you should know how to deal with Evan. You two get along pretty well, don't you? I don't know, I think he also likes to be praised,\" Shashi says with a shrug. \"He likes it when I tell him he's doing well in battle in Swords and Sorcerers. Maybe his mom doesn't give him enough love.\"\n\n\"He doesn't like jokes about how he's girly,\" says Corley thoughtfully. \"He wants to be one of the guys. That's why he wanted to do the sports section. But I don't think he has time.\"\n\n*choice\n\t#\"Do you know what he's always so busy with?\" \n\t\t*goto girls_direct\n\t*if(know_raven = false)\n\t\t#\"Tell me more about Evan's Swords and Sorcerers character.\"\n\t\t\t*set relS %+20\n\t\t\t*goto evans_character\n\t#\"Tell me more about Evan's mother.\"\n\t\t*goto evans_family\n\n*label girls_recruit\n*set girls_recruit_did true\n\"Deputies? Are you working on another mystery?\" Shashi asks.\n*if(relS > 50)\n\t\"How can I help?\"\n*comment endif\n\n*if(relC > 65)\n\tCorley smiles. \"Who are you helping?\"\n\t*goto girls_recruit_choice\n*elseif(relC > 35)\n\tCorley looks hesitant. \"What are you trying to find out?\"\n\t*goto girls_recruit_choice\n*else\n\tCorley frowns. \"What are you doing, exactly?\"\n\t*goto girls_recruit_choice\n\n*label girls_recruit_choice\n*fake_choice\n\t#\"Finnegan thinks Evan might be the school thief, so I'm keeping an eye on him. \n\t\t*set Secrecy %-30\n\t\tFinnegan found his phone. I thought I might find his schedule on there, but it's password-protected,\" you explain.\n\n\t\t\"But he's innocent until proven guilty, right?\" says Corley, looking worried.\n\t#\"One of you should go on a date with Evan and pump him for information.\"\n\t\t*set Secrecy %-10\n\t\tShashi and Corley look at each other. \n\n\t\t\"Errr, how else can we help?\" says Shashi. \"Like, maybe we can just snoop in his stuff.\" \n\n\t\t\"What did Evan do?\" Corley asks.\n\n\t\t\"I don't know. That's what I'm trying to find out,\" you explain. \"I have his phone, but it's password-protected.\"\n\n\t\t\"But he's innocent until proven guilty, right?\" says Corley, looking worried.\t\t\n\t#\"I'm trying to hack a phone…. Never mind why.\"\n\t\t*set Secrecy %+10 \n\t\t\"I kind of want to know why,\" says Corley, looking worried. \n\n*comment endif\n\nShashi, though, looks interested. \"Hacking a password might not be too hard. How many digits is it?\"\n\n\"Five. All numbers.\"\n\n\"Oh, easy. You could just try a brute-force attack.\"\n\n\"What's that?\" says Corley, wide-eyed.\n\n\"You just try every single combination of numbers. 00000, 00001, 00002 and so on until you hit the right combo. It just takes patience,\" Shashi explains. \n\n\"How many different combinations would there be?\" you ask.\n\n\"Ummm…let's see. There are ten digits, one through nine plus zero. And there are five slots….\"\n\n\"So there are fifty options?\" you wonder. \"Ten times five?\" Fifty is a lot, but it's doable.\n\n\"Oh, no. Much more than that,\" says Shashi. \"Think about it. If there were only two slots, there would be a hundred combinations right there!\"\n\n\"Wait, why?\" you say.\n\n\"Oh! I think I get it,\" says Corley. \"One—or rather, zero-one—then zero-two, zero-three, and so on, up to ninety-nine. There are ninety-nine different two-digit numbers, after all.\"\n\n\"Right. Add zero-zero to that, and you have one hundred options,\" Shashi says, nodding. \"The way you find it is, you multiply ten by ten, because you don't just have ten options for the first slot and ten for the second—you have ten options in the second slot for each of the ten options in the first, if that makes sense.\" \n\n\"So then, how many combinations are there for five slots?\" you ask.\n\n\"I know!\" says Corley. \"A hundred thousand, right? Because you can go from zero—or rather, zero-zero-zero-zero-zero—all the way to ninety-nine thousand nine-hundred ninety-nine.\"\n\nShashi smiles at Corley, looking impressed. \"That's right. It's ten to the fifth power.\"\n\nYou shake your head. No way are you entering 100,000 different combinations. \"I'll have to figure out the combo some other way.\" \n\nOn your own, at home, you stare the phone some more, waiting to be struck by inspiration.\n\n*page_break\n*goto phone_screen\n\n*label shashi_game\n\"You came!\" Shashi grins, delighted, letting you into her home. \"I wasn't sure you would. Come on, we haven't started yet.\" \n\nYou follow her into the dining room, where Corley is sitting primly at the table, eating chips. \n\n\"What kind of character would you like to make?\" she asks, handing you a copy of the Swordmaster's Sourcebook.\n\n\"What are you?\" you ask.\n\nCorley smiles sweetly. \"I'm a raging barbarian.\"\n\n\"I don't think Evan is coming,\" says Shashi.\n\nCorley groans. \"Did he text you he's canceling again?\"\n\n\"No, but I bet he's ditching again. Why don't you play Evan's character, ${Name}?\" \n\nShashi hands you Evan's character sheet. It looks like this:\n\nName: Raven\n*line_break\nRace: Half-elf\n*line_break\nClass: Healer\n*line_break\nAge: 19\n*line_break\nHeight: 6'2\"\n*line_break\nWeight: 170 lbs.\n*line_break\nHair: Jet black\n*line_break\nEyes: Unknown\n*line_break\nStrength: 15\n*line_break\nMagic: 20\n*line_break\nBackground: Raven is the deposed son of a great monarch. He has a mysterious birthmark. He comes from a long line of magic rulers. He has magic blood. He always dresses in black and is very mysterious.\n\n\"We begin on a dark, stormy night. You're camped at the edge of the Cliffs of Shining Virtue,\" Shashi begins.\n\nThe three of you have a very nice night playing the game. By the time you get home, you have a strange feeling of inspiration….\n*set know_raven true\n*set know_raven_ss true\n*set know_raven_background true\n\n*page_break\n*goto phone_screen\n\n*label snoop_evans_stuff\nThe next morning, you wait until Evan arrives in the morning—he's late as usual—and then ask Mrs. Greeley if you can go to the coat closet to get your homework. \n*if(respect > 70) \n\t\"Of course!\" she says. \n\n\t*goto snoop2\n*elseif(respect > 40)\n\tShe sighs but then nods for you to go.\n\n\t*goto snoop2\n*else\n\tShe pauses, and for a moment, you think your plan is doomed. Then she says, \"You all need to remember to bring what you need for class. I can't have you all getting up all day to go to the coat closet. However, I'm impressed that you did your homework at all, ${Name}, so I'm going to let you go…this time.\"\n \n\t*goto snoop2\n\n*label snoop2\nIn the coat closet, you quickly find Evan's messenger bag. Inside, it's a total mess, a jumble of papers. At least he probably won't notice that someone was poking around in there. You find:\n\n—A folder labeled \"homework\" (Looks like he should have asked for permission to come back to the coat closet, too. Maybe he will! You should work quickly.)\n\n—His math textbook\n\n—A peanut-butter sandwich\n\n—Several unopened tubes of lipstick in various shades and a powder compact in Startling Ivory\n\n—A book of Edgar Allen Poe poems. It's inscribed: \"Merry Christmas, Ev. I hope you like 'The Raven.' It's my favorite! Love, Andrew.\"\n\n—Three twenty-dollar bills\n\nYou don't know what to think about all this. What's the deal with all the makeup? Evan doesn't seem to wear any. Certainly not in these bright, feminine shades. Is it a gift for someone?\n*if(know_andrew = false) \n\tAnd who's Andrew? \n*set know_andrew true\n*set know_raven true\n*set know_raven_poem true\n*set seen_evans_makeup false\n\n*fake_choice\n\t#Take the money.\n\t\t*set Greed %+20\n\t\t*set Money +60\n\t#Take the compact.\n\t\t*set Greed %+10\n\t\t*set haveCompact true\n\t\t*achieve getpowder\n\t#Bring Evan his homework folder.\n\t\t*set Greed %-10\n\t\t*set Secrecy %-30\n\t\tYou drop Evan's homework folder on his desk as you pass on your way back to your own.\n\n\t\t\"Hey, thanks!\" he says. Then he pauses. \"Wait, how did you…?\" \n\n\t\tLuckily, Mrs. Greeley yells at him for talking before he has a chance to follow that thought to its logical conclusion.\n\t#Just put the bag back the way I found it. \n\t\t*set Secrecy %+10\n\t\t*set Greed %-20\n*comment endif\n\nLater, holed up alone in a carrel in the library, you try the phone again.\n\n*page_break\n*goto phone_screen\n\n*label figure_out_raven\nYou have a good feeling about this. The word \"raven\" is important to Evan, and it has five letters. But how to translate it into numbers? \n\n*label code_choice\n*choice\n\t*disable_reuse #Go through the alphabet and assign each number to a letter—1 for A, 2 for B…26 to Z.\n\t\t*goto a1b2\n\t*disable_reuse #Phone keypads assign a number to each group of 3–4 letters: ABC to 2, CDE to 3…WXYZ to 9. \n\t\t*goto abc2def3\n\t*if(haveCodebook)\n\t\t#Consult my book on codes and ciphers.\n\t\t\t*goto consult_codes_book\n\t*else\n\t\t#Go to the library and look up codes and ciphers.\n\t\t\t*goto library_lookup_codes\n\n*label a1b2\nYou begin making yourself a chart:\n*line_break\nA = 1\n*line_break\nB = 2\n*line_break\nC = 3\n\nUnder this system, how would you write out RAVEN?\n\n*page_break\n\nWhen you've made your chart and encoded RAVEN, it looks like this:\n\n18-1-22-5-14\n\nNo, that won't work. Because some of the letters go to double-digit numbers, you end up with too many digits to input. You half-heartedly input the first five digits, 18122, just in case, but it doesn't work. You were pretty sure it wouldn't. You'll need a way to translate each letter into a single digit. \n\n*goto code_choice\n\n*label abc2def3\nAlthough Evan's phone keypad isn't showing the letters associated with each number at the moment, you know that phone keypads usually do this. \n\nAt home, you consult your parents' old landline. The buttons are labeled as follows: \n\n1\n*line_break\n2 ABC\n*line_break\n3 DEF\n\n4 GHI\n*line_break\n5 JKL\n*line_break\n6 MNO\n\n7 PQRS\n*line_break\n8 TUV\n*line_break\n9 WXYZ\n\nHow would you write out RAVEN? \n\n*page_break\n\nConsulting the keypad frequently, you carefully write out:\n\n72836\n\nThat looks great. That looks like a real code. You try that. \n\n\"Authentication failed.\" \n\nWhat! You were so sure about that one. Could it be that the password isn't Raven? Or maybe you just haven't figured out the right code? Trying one more couldn't hurt.\n\n*goto code_choice\n\n*label library_lookup_codes\nAt the library, you type \"codes and ciphers\" into the computer. The call numbers all seem to begin with Z103 or Z104, so you head to that section of the library, park yourself on the floor, and begin flipping through books. \n\nA lot of the books are about computer encryption. The math looks pretty complicated, and you hope to be able to \"hack\" the phone without resorting to high-tech methods. You focus on the books and chapters that are about simple codes a human could remember.\n\n*label consult_codes_book\nYou flip through your book of codes and ciphers, looking for anything useful. \n\n*label code_chart\nYou see lots of schemes for turning letters into other letters, numbers into letters, letters into symbols. Turning letters into single digits turns out not to be very useful for most codes, because it's really hard to decode. It was easy to turn RAVEN into 72836, but it would be really hard to turn 72836 into RAVEN because each number could be more than one letter. You wouldn't know if 7 referred to P, Q, or R, for example. Most codes and ciphers are meant to be coded as well as decoded. \n\nFinally, an interesting chart catches your eye. It looks like this:\n\n1  2  3  4  5  6  7  8  9  0\n*line_break\nA  B  C  D  E  F  G  H  I  J\n*line_break\nK  L  M  N  O  P  Q  R  S  T\n*line_break\nU  V  W  X  Y  Z\n\nThis is like the phone thing—another way to turn several letters into each number—but it's more shuffled. You're not sure Evan would be this sophisticated, but you write out RAVEN just the same:\n\n81254\n\nYou enter it into the phone. \n\n*goto phone_unlocks\n\n*label phone_unlocks\n*goto_scene ch3evan_sc4unlockphone", "ch3evan_sc3returnphone": "*set returned_phone true\nYou walk straight to Evan's house and ring the bell, but nobody answers. Nobody's home when you call later, either. So you just hold on to the phone until the next morning. Evan rushes in late, as usual, so you don't get a chance to talk to him before school, but you catch up with him in the library during study period. He's working on one of the computers.\n\nHe smiles at you but looks frazzled. \"Hi, ${Name}. Sorry, I can't really talk right now. Can you believe it? I lost my phone, so this is my only chance to catch up with my appoint—I mean, my e-mail.\"\n\n\"Your phone? You mean this?\" You hold out the phone. \n\n\"Oh my gosh! Thank you so much. You have no idea how much I need this!\" Evan snatches the phone from you and holds it close to his heart. \"Where did you find it?\"\n\n*choice\n\t#\"Finnegan found it. He wanted you to have it as soon as possible.\"\n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t*goto thank_you_phone\n\t#\"Finnegan found it. He wanted me to use it to spy on you!\"\n\t\t*set Secrecy %-20\n\t\t*set relE %+20\n\t\t\"Really?\" Evan's eyes widen. \"I'm really not worth spying on. Well, I'm glad you said no! You're a true friend.\" \n\n\t\t*if(datingE)\n\t\t\t\"I hope I'm more than that!\" you grin.\n\n\t\t\t*goto thank_you_phone\n\n\t\t*elseif(relE > 60)\n\t\t\t\"Right back atcha!\" you grin.\n\t\t\t\n\t\t\t*goto thank_you_phone\n\t\t*else\n\t\t\t\"Please. It's basic decency,\" you say. \"I would do it for anyone.\" \n\n\t\t\t*goto thank_you_phone\n\t#\"I bought it off Finnegan for ${pay_rate_base_string} bucks. Can you believe he was going to sell it? Can you reimburse me?\"\n\t\t*set Greed %+20\n\t\t*set Money +pay_rate_base\n\t\t*set relE %-10\n\t\t\"Oh! Really? Wow. I wouldn't have thought Finnegan would do that. I'm glad to have my phone back, though.\" Evan digs in his pocket and pulls out a crisp twenty.\n\t\t*goto thank_you_phone\n\t\t\n*label thank_you_phone\n*if(datingE)\n\t\"I should have known you would be my knight in shining armor,\" Evan smiles at you adoringly. \"Thank you so, so much.\"\n\n\tYou duck your head bashfully. \"Aw, it was nothing.\" \n\t\n\t*goto evan_asks_website\n*else\n\t\"I can't thank you enough for this,\" says Evan. \"I really owe you one.\"\n\n\t\"No problem,\" you say.\n\n\t*goto evan_asks_website\n\n*label evan_asks_website\nYou shift your gaze to the screen behind him. It's covered in computer code. \"What are you working on?\"\n\n\"Oh. Nothing.\" Evan minimizes his browser window. The screen behind it is a poorly designed website. It shows a giant, blocky star with the words \"Miracles By Raven!\" Beneath it is an address and phone number. \"Ack! That's also nothing.\" Evan closes the second browser window, too, but it's too late. You missed the phone number, but you've already committed the address to memory: 144 Chestnut Ave. \n\n*set got_address_from \"web\"\n\nBehind that is a Google search for \"how to design a website.\" \n\nEvan winces. \"You didn't see any of that, did you? Not that it's secret or anything, just embarrassing. Work in progress.\"\n\n*fake_choice\n\t#\"What's 'Miracles by Raven'?\"\n\t\t*set Secrecy %-20\n\t\t\"Nothing!\" says Evan quickly. \"Just a fake thing. I have to learn how to design a website for, um, my computer class. So I made up a fake business for myself.\"\n\t#\"You want help designing your website?\"\n\t\t*set relE %+10\n\t\t\"You know about designing websites?\" asks Evan. \"It's not important. I wouldn't want to bother you.\"\n\n\t\t\"No bother,\" you say. \"Just show me your designs.\"\n\n\t\t\"Nah,\" says Evan. \"Just something I'm trying to learn. Thanks for the offer, though.\"\n\t#\"I didn't see anything.\"\n\t\t*set relE %+20\n\t\t*set lie_count +1\n\t\t*set Secrecy %+20\n\t\t\"Oh, good,\" Evan releases a sigh of relief. \n*comment endif\n\nYou and Evan look at each other for a moment longer. You're waiting for him to put his secret website back up, but he doesn't. \n\n\"Well, I better get back to work,\" says Evan pointedly.\n\nHe waits until you're across the room to put his work back up, and that's only after tilting the screen toward the wall. \n\nIf Evan doesn't even want you to see his website, you know there's something at 144 Chestnut Avenue he doesn't want you to see. Clearly, you need to go there as soon as possible.\n\n*page_break\n*goto_scene ch3evan_sc4checkaddress", "ch3evan_sc4checkaddress": "*temp surprised true\nThe address 144 Chestnut Avenue seems familiar to you. You look it up online and discover that it's downtown, near the train station. You take the bus there the following afternoon. It can be kind of hard to find street numbers on the store doors, but you eventually find it in the window above the front door of Wall Drug. You realize why the address sounded familiar: It's on every receipt from Wall Drug you've ever seen. \n\n*if(got_address_from = \"web\")\n\tWhy would Evan have the address of Wall Drug on his website?\n*if(got_address_from = \"email\")\n\tWhy would Evan have the address of Wall Drug in his e-mail signature?\n*if(got_address_from = \"phone\")\n\tWhy did the person on the phone direct you to Wall Drug? \n*comment endif\n\nYou realize that this must be the drugstore where Evan's mother works. Maybe Evan was just noodling around, learning to build a website, and this was the first address he thought of. Or maybe he's running some kind of scam out of the store. You walk in.\n\n*page_break \nThe drugstore is cozy and old-fashioned, the walls decorated with vintage Coca-Cola ads. A high-school-age girl stands behind the counter, above a large glass display of candy sold by the pound. She's reading a magazine. She nods at you as you walk in.\n\nYou wander through the store. Everything looks normal. A few shoppers wander the aisles, reading medicine bottles and trying on reading glasses. \n\nYou hear a loud cackle of laughter, followed by some female voices. It sounds like there's something going on in the back of the store. You hurry down the baby aisle, following the noise. \n\nThe first person you see is Evan's mother, but she's not making any noise. She's bustling around behind the pharmacy desk, filling prescriptions. \n\nYou hear another cackle. Turning, you find a row of half a dozen older ladies sitting in a line against a counter facing the back windows. They're the ones chatting and laughing loudly. Then you realize the windows are actually mirrors and the ladies are putting on makeup. \n\n*choice\n\t#Join them.\n\t\t*set Greed %+10\n\t\t*set Secrecy %-10\n\t\t*goto join_them\n\t#Hide but eavesdrop.\n\t\t*set Greed %+10\n\t\t*set Secrecy %+10\n\t\t*goto hide_eavesdrop\n\t#Report them to the front desk clerk. Did they pay for that makeup?\n\t\t*set Greed %-10\n\t\t*set Respect %+10\n\t\t*goto did_they_pay\n\n*label hide_eavesdrop\nHow would you like to hide yourself while you listen in on the conversation?\n\n*choice\n\t#I will conceal myself under this cardboard stand of tube socks. \n\t\t*temp hide_method \"tube socks\"\n\t\tYou look around. When you're sure nobody is looking, you drop to your knees and crawl into the small hollow space in the bottom of the tube sock stand. There's no way the ladies can see you from here, but you can hear them clearly.\n\n\t\t*goto eavesdropconversation\n\t#I'll hide in plain sight and browse the end of a boring nearby aisle of…let's say, dental supplies.\n\t\t*temp hide_method \"floss\"\n\t\tThe dental aisle is a good choice because there are so many tiny products crammed into one small space: toothpaste, toothbrushes, toothpicks, dental floss…. It's completely believable you'd be shopping in this area for a long time. You pretend to comparison-shop for floss. You can hear the ladies clearly.\n\n\t\t*goto eavesdropconversation\n\t#I need to get as close as possible so I don't miss a thing. I'll shop the makeup aisle. \n\t\t*temp hide_method \"makeup\"\n\t\t*if(gender = \"boy\")\n\t\t\tYou feel a little silly looking at the makeup aisle as a boy. You know these products are not meant for you. All the pictures show beautiful women wearing lipstick or eye shadow. To be less conspicuous, you find one small display of \"men's grooming supplies\"—cologne, shaving cream, and something called bronzer. It's still close enough that you can hear the women very clearly.\n\n\t\t\t*goto eavesdropconversation\n\n\t\t*else\n\t\t\tYou pretend to examine lipstick. The women are so wrapped up in their conversation that they don't notice you, and you're so close, you can hear every word.\n\t\t\n\t\t\t*goto eavesdropconversation\n\n*label eavesdropconversation\nOne woman is talking about her son. The boy has just gotten his driver's license, and she's afraid he'll wreck the car. He keeps knocking over the neighbor's trash cans. The boy's name is not familiar, and you feel this story is not relevant to your case. Still, you know that part of detective work is being patient.\n\nAnother lady talks about a meeting of her book club. She's mad at a different woman—not present—for dominating the conversation. \n\n*if(hide_method = \"tube socks\")\n\tYour foot is starting to fall asleep. Being folded up in this display is getting very uncomfortable.\n\n\t*goto eavesdropconversation2\n*elseif(hide_method = \"floss\")\n\tYou thoughtfully examine the fine print on a bottle of mouthwash.\n\n\t*goto eavesdropconversation2\n*elseif(hide_method = \"makeup\")\n\tOne of the women gets up from the counter, puts a partially used lipstick marked \"Tester\" back on the shelf, and selects the tester of a different color. Self-conscious, you pretend to be very, very absorbed in the nearest \n\t*if(gender = \"boy\")\n\t\tbottle of cologne.\n\n\t\t*goto eavesdropconversation2\n\t*else\n\t\teyebrow pencil. \n\n\t\t*goto eavesdropconversation2\n\n*label eavesdropconversation2\nThe next lady tells the others about her recent trip to Europe. This sounds like it might at least be interesting, but it turns out she was sick the whole time and spent the entire week holed up in her hotel room, puking. \n\nJust as you are about to lose hope, a woman says, \"Jodie, that lipstick looks darling on you,\" and another responds, \"Oh, thank you—Miracles by Raven!\" \n\nThey all laugh. \n\n\"Isn't Raven wonderful?\" another woman asks. \"I have an appointment tomorrow at three. I can't wait.\" \n\nJust as you're getting interested, a voice behind you demands, \"Can I help you?\"\n\n*page_break\n*if(hide_method = \"tube socks\")\n\tWith difficulty, you rotate and crane your neck to see behind you. Evan's mother is standing behind the tube sock display with her arms folded, glaring at you. \n\n\t\"Er—I just, um, lost a penny,\" you explain, unfolding yourself and pulling yourself out of the display.\n\n\tEvan's mother narrows her eyes. She clearly doesn't believe you. All she says is, \"Please stay out of the displays.\" \n\n\tSo much for hiding. By now all the ladies at the makeup counter are staring at you. They begin to laugh. You dust yourself off with great dignity. \n\n\t*goto oh_well\n*elseif(hide_method = \"floss\")\n\tYou turn to find Evan's mother. She smiles at you. \"Looking for dental hygiene supplies? Maybe I can help. Did your dentist recommend something in particular?\"\n\n\t*choice\n\t\t#\"No, I'm just doing research for school.\"\n\t\t\t\"On dental hygiene? How fascinating!\" Evan's mom's eyes light up. \"I can tell you everything you need to know!\"\n\n\t\t\tOne lengthy lecture later, most of the women at the makeup counter have gone home. \n\n\t\t\t*goto oh_well\n\t\t#\"Yeah, um, floss. I need to start flossing.\"\n\t\t\tEvan's mother nods seriously. \"Flossing is very important. Too many people skip it. Did you know that regular flossing can add six years to your lifespan? We have several flavors—mint, cinnamon….\"\n\n\t\t\t\"I'll take mint,\" you say hastily, just hoping to end this quickly.\n\n\t\t\tEvan's mom leads you to the pharmaccy area and rings up your purchase. It costs $3.00.\n\n\t\t\t*if(Money >= 3)\n\t\t\t\t*set Money -3\n\t\t\t\t*set haveFloss true\n\t\t\t\tBy the time your purchase is all rung up and placed into a small bag, the ladies have moved on to another topic.\n\n\t\t\t\t*goto oh_well\t\n\t\t\t*else\n\t\t\t\tYou have to explain that you do not have the money. Evan's mom sighs and returns the floss to its place. By this time, the ladies have moved onto another topic.\n\n\t\t\t\t*goto oh_well\n\t\t#\"I would prefer to be left alone!\"\n\t\t\tYou say this more forcefully than you plan to, and the whole store seems to fall silent.\n\n\t\t\t*if(Respect > 50)\n\t\t\t\t\"Er, okay,\" says Evan's mom. \"I'll be right there if you need me.\" She returns to the pharmacy window.\n\n\t\t\t\tEventually, the ladies begin talking again, but they have moved on to another topic.\n\n\t\t\t\t*goto oh_well\n\t\t\t*else\n\t\t\t\tEvan's mom eyes you suspiciously. \"I'll be right there,\" she says, nodding toward the pharmacy window. She doesn't need to add, \"where I can keep an eye on you.\" She returns to the pharmacy without breaking her glare. You decide it's time to go.\n\n\t\t\t\t*goto oh_well\n\n\n*elseif(hide_method = \"makeup\")\n\t*set heard_eavesdropconversation true\n\tOne of the makeup ladies, the one who just swapped out her lipstick, is smiling at you. \"You look like you're new to this. Maybe I can help. Bronzer is nice, but you really should start with a nice powder foundation. You look like a number four. Of course, I'm no Raven….\"\n\n\t\"Who is Raven, anyway?\" you ask.\n\n\t\"Oh, Raven is wonderful!\" she smiles. \"He's the resident makeup artist. He really is quite good. You should make an appointment. You won't regret it. No one does!\"\n\n\tThe woman returns to her group of friends. You look down at the compact in your hands. Inside is a fine, light-brown powder. It might come in handy for dusting for fingerprints! It costs $9.00. Makeup is expensive! You have $${Money}. \n\n\t*goto buy_foundation_choice\n\n*label buy_foundation_choice\n*choice\n\t*selectable_if(Money > 9) #Buy it with my money! \n\t\t*set Money -9\n\t\t*goto buy_foundation\n\t#Steal it.\n\t\t*set Respect %-30\n\t\t*set Greed %+30\n\t\t*set haveCompact true\n\t\t*achieve getpowder\n\t\tYou glance around and slip the foundation powder into your pocket. \n\t\t\n\t\t*goto leave_drugstore\n\t*hide_reuse #Buy the cheapest powder compact they have. It's a tool, it doesn't need to look good.\n\t\tThe cheapest powder compact you can find is $4.00. \n\t\t*if(Money >= 4) \n\t\t\tYou have enough!\n\n\t\t\t*set Money -4\n\t\t\t*goto buy_foundation\n\t\t*else\n\t\t\tYou don't have enough money for even the cheapest one!\n\n\t\t\t*goto buy_foundation_choice\n\t#Eh…never mind. I'm saving my money, and I don't need to dust for fingerprints right now. If I ever do, I'll know where to come. \n\t\t*goto leave_drugstore\n\n*label buy_foundation\nYou take your foundation up to the front desk. The the girl rings you up and gives you your change. You now have $${Money}.\n\n*goto talk_to_clerk\n\n*label did_they_pay\n\"There are ladies in the back using makeup without paying,\" you tattle.\n\n\"Oh, that's fine. We have testers of everything. Sampling is encouraged,\" says the clerk. \"I know those ladies. That's the Raven Fan Club. They wouldn't steal.\"\n\n*goto talk_to_clerk\n\n*label talk_to_clerk\nYou notice a sign taped to the back of the cash register:\n\nMiracles by Raven\n*line_break\nTired of your look? Get a makeover!\n*line_break\nRaven is our resident makeover expert.\n*line_break\nBook your appointment today!\n*set heard_eavesdropconversation true\n\n\"What's the deal with this Raven person, anyway?\" you ask.\n\n\"Oh, Raven's great,\" says the girl. \"I had my colors done by him. I was skeptical at first because he just seems like a geeky little kid, but he'll surprise you. He's a really gifted artist. \n*if(gender = \"boy\")\n\tWould you like his card? Maybe your mother or sister would like to make an appointment. It's free.\" \n\n\t*goto raven_choice\n*else\n\tWould you like to make an appointment? It's free.\"\n\n\t*goto raven_choice\n\n*label raven_choice\n*choice\n\t*if(gender = \"boy\")\n\t\t#\"Can't boys get makeovers?\"\n\t\t\t\"Oh! Hmm. I guess so. Why not? Here, you can have his last open slot—four to four-thirty tomorrow afternoon. Arrive with a clean, well-scrubbed face and a good attitude!\"\n\n\t\t\t*goto your_own_appointment\n\t*else\n\t\t#\"Yeah, sign me up.\"\n\t\t\t\"Great! You're getting his last open slot—four to four-thirty tomorrow afternoon. Arrive with a clean, well-scrubbed face and a good attitude!\"\n\n\t\t\t*goto your_own_appointment\n\t#\"Raven does makeovers for free? How does he make any money?\"\n\t\t*set Greed %+10\n\t\t\"He gets a cut of whatever makeup you buy during the makeover,\" the clerk explains. \"I think he actually makes kind of a lot. People usually want to buy all the products he used on them.\"\n\n\t\t\"Sounds like a sweet gig. How do I get started?\" you joke.\n\n\t\tThe clerk laughs. \"Trust me, doing makeovers is not that easy. Have you ever done it? You have to know how to bring out people's natural best features, use the right colors to complement their skin tone—it's really an art. I guess you could ask Raven if he's willing to take on an apprentice. He'll be here tomorrow afternoon, from three to five, but he's pretty booked.\" \n\n\t\t*goto leave_drugstore\n\t#\"Uh-huh. So is it Evan, the pharmacist's son?\"\n\t\tThe clerk looks surprised. \"How did you know? He makes us all call him ‘Raven' in the store to conceal his identity. I guess he's embarrassed about what he does. He really is gifted, though. He'll be here all tomorrow afternoon, if you want to see him in action. It's really very impressive.\" \n\n\t\t\"Thanks,\" you say. \n\n\t\tHmm. It looks like you have this one pretty much cracked. Still, it would be best to verify it for yourself. You decide to come in tomorrow.\n\n\t\t*temp surprised false\n\t\t*goto someone_elses_appointment\n\n*label leave_drugstore\nYou head out of the drugstore, reviewing what you learned. You have a feeling that \"Raven\" is important to this case somehow. Luckily, you know he will be here at the drugstore at three tomorrow. You make a note to be there.\n\n*goto someone_elses_appointment\n\n*label oh_well\nOh well. At least you learned something. \"Raven\" will be here at three tomorrow. You make a note to be there.\n\n*goto someone_elses_appointment\n\n*label join_them\n\"Erm, hi,\" you begin.\n\n*if(Respect \u003c 50)\n\tThe ladies look at you in surprise. \n\n\t\"Hi, honey. Are you lost?\" says one of them.\n\n\t\"Are you looking for something?\" another asks.\n\n\t\"Uh…no…I was just wondering…what's up?\" Wow, you really don't know how to talk to adults. You need to work on this.\n\n\tThe ladies look at each other. \n\n\tThen one says, \"If you're lost, why don't you ask the front desk to page your mom?\"\n\n\tSo much for that plan. The women clearly don't accept you as one of their own. Time to resort to plan B: eavesdropping.\n\n\t*goto hide_eavesdrop\n*else\n\tThe ladies smile at you. You have always been good with adults. \n\t\n\t\"Welcome to the makeup club!\" says one lady. \"I'm Jodie. This is Susan, Carol, and Anne. And you are?\"\n\n\t\"${Name}.\"\n\n\t\"Pleased to meet you, ${Name}! Would you like to join us?\" Susan pulls up a stool for you.\n\n\t\"What's your season?\" asks Anne. \"Are you a winter, spring, summer, or autumn?\"\n\n\t\"Season?\" you repeat. \"My birthday's in November.\"\n\n\t\"Not your birthday, sweetie,\" Anne says with a patient smile. \"Your color palette.\"\n\n\t\"Do you have cool or warm undertones?\" Jodie asks.\n\n\t\"Ummm. I'm not sure,\" you say.\n\n\t\"You should make an appointment with Raven!\" says Carol. \"Then you'd know.\" \n\n\t\"You haven't seen Raven yet?\" Susan asks, wide-eyed. \"You must!\"\n\n\t*goto whos_raven\n\n*label whos_raven\n*set heard_eavesdropconversation true\n\"Who's Raven?\" you ask.\n\n\"Only the best makeup artist in the world!\"\n\n\"And we have him right here at Wall Drug!\"\n\n\"A real prodigy.\"\n\n\"When he makes it to Hollywood and does the makeup for the next big movie,\" Jodie says, \"I'll say, 'I knew him when!'\" \n\n\"I have his three o'clock tomorrow, but if you rush, he might be able to squeeze you in after,\" says Carol. \"He might be booked, though.\" \n\nYou make a mental note to come back tomorrow at 3. You have a feeling Raven is the key to this whole thing.\n\n*goto someone_elses_appointment\n\n*label someone_elses_appointment\nYou're delayed by a slow bus, but you make it to Wall Drug the next afternoon at 3:45. \n\n*goto_scene ch3evan_sc5confrontation\n\n*label your_own_appointment\nYou arrive early for your appointment, arriving at Wall Drug promptly at 3:45 PM. \n\n*goto_scene ch3evan_sc5confrontation", "ch3evan_sc4unlockphone": "*set phone_unlocked true\nThe password screen disappears, and you see a background image of a cool car behind several icons: e-mail, calendar, phone, and Internet. \n\nYou did it! You're in!\n\n*label phone_menu\n*choice\n\t*if(know_number)\n\t\t*disable_reuse #Call the number.\n\t\t\t*goto call\n\t*if(know_address)\n\t\t#Go to the address.\n\t\t\t*goto_scene ch3evan_sc4checkaddress\n\t*disable_reuse #Check Evan's e-mail.\n\t\t*goto e-mail\n\t*if(checked_email = true)\n\t\t*disable_reuse #Check the outbox.\n\t\t\t*goto outbox\n\t*disable_reuse #Check the calendar.\n\t\t\t*goto calendar\n\t*disable_reuse #Goof around on the Web.\n\t\t\t*goto web\t\n\n*label e-mail\nEvan keeps his inbox pretty tidy. There are no old e-mails, just new ones. You don't want to click on any of the e-mails and mark them as read, so you try to deduce what you can from the subject lines.\n\nFrom: Lisa Jackson / Subject: Need an appointment before Friday\n*line_break\nFrom: Diana Turner / Subject: Appt tomorrow\n*line_break\nFrom: Tech4Less / Subject: 24-Hour Sale Going On Now!\n*line_break\nFrom: Kelly Fuong / Subject: Have to cancel tomorrow. Postpone to next week?\n*line_break\nFrom: Ilsa Goldman / Subject: Tuesday's appointment \n*line_break\nFrom: Lee-Anne Summers / Time next week? \n\nHmm. Except for the advertisement, they all seem to be about appointments. And they're all from people with female names. You don't recognize any of them. Why is Evan making all these appointments with random ladies?\n\nDates? No. Nobody would call a date an \"appointment.\" But what are they then? Some kind of job? Is he providing a service? What kind of scam is he running? \n\n*set checked_email true\n*goto phone_menu\n\n*label outbox\nJackpot! Evan may delete his old incoming e-mails, but he doesn't bother to delete his outgoing ones. One thing you notice is that all his messages seem to come from the name \"Raven.\" He seems to have changed his name to Raven in his e-mail program. \n\nYou click on the first e-mail. It's from Evan, or rather Raven, to one Marilyn Thomas, with the subject line \"Re: First Session.\" \n\n[i]Dear Ms. Thomas,[/i] \n\n[i]Happy to have you. I've set up an appointment for you on Tuesday at 4PM, if that works. Please call the shop at 555-5302 if you need to make a change, especially if it gets close to the time. I can't always check my e-mail within 24 hours of an appointment. [/i]\n\n[i]You don't need to bring anything. Just your sweet self…with a clean face! [/i]\n\n[i]One more thing, how did you hear about us? If it was word of mouth, let me know who told you. I like to give some kind of freebie to ladies who refer me to their friends. And if you have any friends you'd like to send my way, please do! [/i]\n\n[i]Thanks, and see you Tuesday,[/i]\n\n[i]Raven[/i]\n*line_break\n[i]555-5302[/i]\n*line_break\n[i]144 Chestnut Ave.[/i]\n*set got_address_from \"e-mail\"\n*set checked_outbox true\n*set know_number true\n*set know_address true\n\n*goto phone_menu\n\n*label call\nYou have a phone, after all. Calling is easy. You go to the phone app and punch in the number: 555-5302.\n\nThe call is answered on the third ring. A woman answers. \"Hello, Wall Drug.\" \n\n\"Er…hello,\" you say, disconcerted. It's a drugstore? Is this the one Evan's mother works at? \"Is…Raven there?\"\n\n\"Sorry, this is Raven's day off. Would you like to make an appointment?\"\n\n\"Yes,\" you say impulsively.\n\n\"Okay, let me check his calendar. It's usually a week or two wait…. Actually, he's had a cancellation for tomorrow at four. Does that work for you?\"\n\n\"Sure.\" \n\n\"Okay, great. What name should I put down?\"\n*set made_appointment true\n\n*choice\n\t#\"${Name}.\"\n\t\t*if(gender = \"boy\")\n\t\t\t*goto boy_pause\n\t\t*else\n\t\t\t*goto set_appt\n\t*if(gender = \"boy\")\n\t\t#\"Joe Stevens.\"\n\t\t\t*set lie_count +1\n\t\t\t*set makeup_alias \"Joe Stevens\"\n\t\t\t*goto boy_pause\n\t#\"Mary Jones.\" \n\t\t*set lie_count +1\n\t\t*set makeup_alias \"Mary Jones\"\n\t\t\"Um, my name is Mary Jones,\" you say in a high, quavery voice, trying to sound like an older lady.\n\t\t\t\n\t\t*goto set_appt\n\t#\"Esmerelda Fitzgoat.\"\n\t\t*set lie_count +1\n\t\t*set makeup_alias \"Esmerelda Fitzgoat\"\n\t\t\"Why, my name is Esmerelda Fitzgoat, dahhhling,\" you say in a put-on voice, trying to sound like a rich and fabulous older lady.\n\t\t\t\t\n\t\t*goto set_appt\n\n*label boy_pause\nThere's a pause. \"Um…Raven doesn't usually do boys,\" the woman at Wall Drug says hesitantly.\n\n*choice\n\t#Give her your sweetest talking-to-adults voice. \"Could he perhaps make an exception for me?\"\n\t\t*if(Respect > 50)\n\t\t\t\"I suppose there's no reason why not if you really want it,\" says the drugstore clerk thoughtfully. \"Most boys aren't usually interested, that's all.\"\n\n\t\t\t\"Well, I am,\" you say.\n\n\t\t\t*goto set_appt\n\t\t*else\n\t\t\t*goto prank_call\n\t#Come up with a story, fast. \"Oh, it's not for me. It's for my sister.\"\n\t\t*set lie_count +1\n\n\t\t*if(Secrecy > 50)\n\t\t\t\"Oh, okay. You're all set then. Have your sister come here, Wall Drug, 144 Chestnut Avenue, promptly at four in the afternoon tomorrow. Raven will be set up in the back.\" \n\n\t\t\t\"Okay,\" you say.\n\n\t\t\t*set know_address true\n\t\t\t*goto bewildered\n\t\t*else\n\t\t\t*goto prank_call\n\t#Accept defeat. \"Okay then. Never mind.\"\n\t\t*goto accept_defeat\n\n*label prank_call\nThere's another pause. Then the woman asks, hesitantly, \"Is this a prank call?\"\n\n\"No,\" you say.\n\n\"Because we've had prank calls before, and…. Listen, I'm sorry, I have a customer.\"\n\n\"It's not a prank!\" you insist, but the line goes dead.\n\n*goto accept_defeat\n\n*label accept_defeat\t\nMaybe you can't make an appointment, but at least you know two things: Raven is free tomorrow at four. And he'll be at Wall Drug. You know a time and a place that something's going down, and you decide to be there, even if you don't know exactly what that \"something\" is.\n\n*goto arrive_at_355\n\n*label set_appt\n\"Okay, great,\" says the voice. \"You're all set for tomorrow. Be here at Wall Drug, 144 Chestnut Avenue, promptly at four. Raven will be set up in the back.\" \n*if(got_address_from = \"\")\n\t*set got_address_from \"phone\"\n*comment endif\n\n*label bewildered\nYou hang up, still bewildered.\n\n*label arrive_at_355\n*page_break\nYou arrive at Wall Drug prompty at 3:55 the next afternoon. \n\n*goto_scene ch3evan_sc5confrontation\n\n*label calendar\nAn image of the week pops up. Evan has planned each day carefully. Each school day has \"School\" blocked off from 8:15 AM to 2:45 PM. Today is the simplest afternoon. It just says: \"3:30 Game @ Shelby Gym.\" Looks like Evan is following up on his newspaper job today. But every other afternoon is crammed full of tiny boxes. Tuesday, for example:\n\n3-3:30: Anna Wilcox\n*line_break\n3:30-4: Jane Carlisle\n*line_break\n4-4:30: Melissa Jun\n*line_break\n4:30-5: Maribel Sanchez\n\nEach day is like that. Saturday is also booked off in half-hour increments with a female name next to each one. There are even some appointments from 7:30 to 8 in the morning, before school. That's why Evan is late so often! But what is he doing? Who are these ladies? \n\n*set checked_calendar true\n*goto phone_menu\n\n*label web\nThe first webpage that pops up must be the last one Evan looked at. It's got a black background and simply says:\n\n[i]Miracles by Raven[/i]\n*line_break\n[i]Need some help with your look? Just call or set up an appointment[/i]\n*line_break\n[i]Afternoons, weekends[/i]\n*line_break\n[i]555-5302[/i]\n*line_break\n[i]144 Chestnut Avenue[/i]\n\n*set checked_web true\n*set know_number true\n*set know_address true\n*set got_address_from \"website\"\nThen there's a little broken-image icon, meaning that someone tried to insert an image in the webpage but it didn't work out. You get the feeling this website is still under construction. \n\n*goto phone_menu\n", "ch3evan_sc5confrontation": "*temp did_makeover false\nYou hear Evan's voice before you see him. \"You look gorgeous!\" he's exclaiming.\n\nYou round the display of hair dyes and find Evan standing at the makeup table with a middle-aged woman. Several open packages of makeup are spread out on the table. The woman peers at herself in the mirror, puckering her lips. Evan is holding a mascara wand.\n\n\"I look twenty years younger!\" the woman declares. Since you didn't see her before, you can't verify this. She smiles at Evan. \"I don't know how you do it, honey. Miracles by Raven, indeed!\"\n\nEvan ducks his head modestly. \"I'm glad you like it. Now, remember, you want the Matte Rose lip color. And the liner is….\" Evan trails off. He's looking right at you.\n\n\"Pale Dusk. I know,\" the woman finishes, not noticing that Evan has frozen.\n\n*choice\n\t#\"What the…! You're doing makeovers now?!\"\n\t\t*set Secrecy %-10\n\t\t*set relE %-40\n\t\t*goto negative_reaction\n\t#\"Well, I've certainly stumbled on an interesting situation.\" \n\t\t*set Secrecy %+10\n\t\t*set relE %-30\n\t\t*goto negative_reaction\n\t#\"Oh, wow! You're the style king around here? This is so cool.\"\n\t\t*set relE %+40\n\t\t*goto positive_reaction\n\t*selectable_if(did_makeover = false) #\"Can I have a makeover?\"\n\t\t\t*set relE %+30\n\t\t\t\"Haven't you had a makeover yet? You should, absolutely!\" gushes Evan's client. \"Well, I'll let you get to your next client, dear. I'll take everything.\" She gathers all the products Evan used on her into her shopping basket and heads toward the front desk.\n\t\t\t\n\t\t\t*gosub makeover\n\t\t\t*goto post_makeover_dont_tell\n\n*label negative_reaction\nEvan stiffens.\n\n\"Are you a friend of Raven's?\" Evan's client asked. \"Isn't he darling? Well, I'll let you run and play, dear. I'll take everything.\" She gathers all the products Evan used on her into her shopping basket.\n\nEvan shoots her a quick, distracted smile, and she bustles off toward the front desk. As soon as she's gone, Evan turns back to you. \"I can explain,\" he says.\n\n\"I'm listening,\" you say.\n\n\"Well…I guess the explanation isn't very long,\" Evan admits. \"I'm good at makeup, okay? So sue me. It's not girly. Plenty of makeup artists are men.\" \n\n*choice\n\t#\"I'll be sure to tell that to Finnegan and everyone!\"\n\t\t*set relE %-40\n\t\t*set Secrecy %-40\n\t\t*goto please_dont_tell\n\t#\"It looks pretty girly from where I'm standing.\"\n\t\t*set relE %-30\n\t\t*goto please_dont_tell\n\t#\"There's nothing wrong with being girly.\"\n\t\t*set relE %-20\n\t\t*goto please_dont_tell\n\t#\"You're right. It's a very marketable skill. I'm almost jealous.\"\n\t\t*set Greed %+10\n\t\t*set relE %+20\n\t\t*goto please_dont_tell\n\n*label positive_reaction\nEvan's eyes widen. \"You think it's…cool?\" he repeats disbelievingly. \n\n\"Of course it's cool, darling,\" Evan's client assures him. She turns to you. \"Raven is an absolute wonder. I recommend him wholeheartedly, if you're in the market for a makeover. Darling, I'm going to buy all of these. Ta-ta!\" She loads up her shopping basket with all the products on the table and sashays toward the front desk. \n\nEvan turns to you with a desperate look. \"Are you making fun of me?\"\n\n\"No! This is neat.\" \n\n*goto please_dont_tell\n\n*label post_makeover_dont_tell\n\"Well, thanks,\" you say. As you tuck your wallet back into your pocket, you catch another glimpse of your reflection, and at first, you don't recognize yourself. \"I'll make a real splash at school tomorrow, that's for sure!\"\n\n\"About that,\" Evan bites his lip. \"Don't tell anyone who gave you the makeover, okay? Not that there's anything wrong with being a makeup artist…but the kids at school wouldn't understand. Especially Vitessa!\" \n\n*goto please_dont_tell_choice\n\n*label please_dont_tell\n\"Please don't tell anyone!\" Evan begs you. \"Not that there's anything wrong with being a makeup artist…but the kids at school wouldn't understand. Especially Vitessa!\" \n\n*label please_dont_tell_choice\n*choice\n\t#\"Sure they would! Don't be ashamed. Be Evan!\" \n\t\t*set relE %+30\n\t\t*set Secrecy %-20\n\t\t*goto be_evan\n\t#\"You're right. They wouldn't. Your secret is safe with me.\"\n\t\t*set relE %+50\n\t\t*set Secrecy %+50\n\t\t*goto secret_safe\n\t*if(newspaper_job != \"\")\n\t\t#\"This is bigger than your feelings. This is about journalism. I'm going to break this story!\"\n\t\t\t*set relE %-50\n\t\t\t*set Secrecy %-50\n\t\t\t*set Greed %-20\n\t\t\t*goto break_story\n\t#\"I've already been hired by Finnegan to find out what you do all the time. Can you match his price?\"\n\t\t*set relE %-30\n\t\t*set Greed %+30\n\t\t*set blackmail_attempts +1\n\t\t*goto blackmail_evan\n\n*label be_evan\n\"Being a great makeup artist is your special gift,\" you explain. \"Like being a detective is mine.\" \n\n\"I wish mine were something cool, like being a detective!\" says Evan. \n\nYou shake your head. \"Your special gift is your special gift. You can't pick and choose. But there's no use denying it or pretending you don't have it. Embrace it! It's wonderful to have a talent.\"\n\n\"I guess,\" says Evan. \"I do make an awful lot of money. And when I grow up, maybe I could move to Hollywood and be a makeup artist for the stars.\" \n\n\"That's the spirit!\" you say. \"You're the only one who feels weird about this. I'm sure everyone in school will think it's as cool as I do!\"\n\n\"Really? You think?\" Evan blinks. \"Wow. Maybe I've been worrying over nothing.\"\n\n\"Won't it be so much easier if you stop worrying and just let everyone know?\" you say. \"Plus, you can drum up business at school. I bet a lot of girls would like their makeup done before the Starlight Dance.\"\n\n\"The dance would be a really good business opportunity….\" Evan looks thoughtful. Then he grins. \"Okay, ${Name}. You've convinced me. Tomorrow, I'll tell everyone!\" \n\nYou grin. \"That's great, Evan! I'll be right by your side, every step of the way.\"\n\n\"Even when Vitessa finds out?\" Evan winces. \"She's the one I worry about the most. She has so much influence.\"\n\n\"I can handle Vitessa,\" you promise.\n\n*set evan_secret_out true\n*achieve helpevan\n*if(relV > 60)\n\t*goto handle_vitessa\n*else\n\t*goto be_you_ostracization_consequence\n\n*label handle_vitessa\n*page_break\n\nThe next afternoon, Evan runs up to you excitedly. \"Vitessa…she…she made an appointment! How did you manage it?\"\n\nYou grin. \"I guess she heard what a wizard you are. She also probably saw some before-and-after photos from your website.\" You wink.\n\n\"She just walked up to me in the halls and asked me. She knew I was Raven and didn't care. I couldn't believe it. I thought for sure she would say something snide, but…she just said she needed a new look.\" Evan still looks mystified. \n\n\"I convinced Finnegan to hold off on the write-up until Vitessa gives your services a try. If she likes the job you do, she'll give you a good review!\" you explain. \"So don't mess it up.\"\n\nEvan beams. \"I won't! This will be my greatest job yet!\"\n\nYou walk on down the hall, whistling. This has been your greatest job yet, too! Evan's secret identity is public, and thanks to your influence with Vitessa, everyone simply accepts it. \n\nOn top of that, because the secret's out, you got paid a tidy $${evan_pay_rate} for your information! Finnegan complained that it would have sold more papers if it had been an exclusive scoop, but you feel better about letting Evan go public on his own terms.\n*set detectivePoints +1\n*set Money +evan_pay_rate \n\nYou know Evan will do a great job on Vitessa's makeover and have more business than ever!\n*if(datingE)\n\tAnd your date with him is tomorrow night.\n\n\t*goto date_with_evan\n*else\n\t*finish\n\n*label be_you_ostracization_consequence\n*page_break\n*set relE %-20\n*set evan_ostracized true\n\nThe next day, after Evan's big announcement at lunch, you help him up and brush the potato chips and smushed tuna sandwiches out of his hair. \n\n\"Sorry,\" you say. \"I really thought that would go a lot better.\" You smile apologetically at the janitor who silently sweeps up the mess around you. It's just the three of you in the lunchroom now. Everyone else cleared out after the principal made the kids stop hurling food at Evan.\n\nEvan just glares at you. \"'Be Evan,' you said. 'Tell the truth,' you said.\"\n\n\"Again,\" you say, \"really, really sorry. This is totally my bad.\" \n\nEvan sighs. \"I should have trusted my instincts. I knew nobody would understand my interest in makeup and my friendship with older ladies. Who will be my friend now?\"\n\n\"Me?\" you suggest. \"I still want to be your friend.\"\n\n*if(relE > 70)\n\t\"Well, I guess that's something,\" Evan mutters.\n\t*goto be_evan_end\n*elseif(relE > 60)\n\t\"I guess,\" Evan mutters.\n\t*goto be_evan_end\n*elseif(relE > 40)\n\t\"Fat lot of good that does me,\" Evan mutters.\n\t*goto be_evan_end\n*else\n\tEvan doesn't answer. It seems that he may not want to be your friend after this.\n\t*goto be_evan_end\n\n*label be_evan_end\n\"And worse,\" Evan rants as you make your way down the hall, \"now everyone knows where to find me after school. What if those guys follow me to work and hassle me there? On top of ruining my life at school, you might have cost me my job!\"\n\n\"Um, excuse me,\" a soft voice pipes up. It's Corley.\n\nEvan eyes her suspiciously. \"Yes? What do you want?\"\n\n\"I was just wondering…um…could I get a makeover sometime?\" Corley pushes her glasses up her nose earnestly. \"I think it's time for a change. I have money.\" \n\nEvan's frown melts away. Pleased, he hands her a business card. \n\nYou smile. You have a feeling that, in time, things will turn out just fine.\n\n*finish\n\n*label secret_safe\nEvan sighs with relief. \"I'm glad I can count on you,\" he says. \"I know I probably can't keep it a secret forever. After all, this is a public place. But I just want to keep it as quiet as possible. The kids at school already think I'm a dork. Can you imagine if they knew I also did my mom's friends' makeup in my spare time?\"\n\n\"It would be awful,\" you agree. \"You're right to keep it a secret. Don't worry, Evan. I know a lot of things, and I always keep my mouth shut.\" \n\nEvan nods. \n*if(relE > 66)\n\t\"That's what I like about you. You're a true friend, ${Name}. How can I ever repay you?\"\n\n\t*goto repay_choice\n*elseif(relE > 33) and (Secrecy > 60)\n\t\"I know you're trustworthy. Thank you. How can I repay you?\"\n\n\t*goto repay_choice\n*else\n\t\"Well, I hope so. But I don't want to be in your debt. What can I do to make it even?\"\n\n\t*goto repay_choice\n\n*label repay_choice\n*choice\n\t#\"Money is a good start.\"\n\t\t*set Greed %+20\n\t\t*goto repay_money\n\t*selectable_if(did_makeover = false) #\"Give me a makeover.\"\n\t\t*set relE %+20\n\t\t*goto repay_makeover\n\t#\"No repayment necessary.\"\n\t\t*set relE %+30\n\t\t*set Greed %-20\n\t\t*goto repay_none\n\n*label repay_money\n\n\"Oh, of course!\" Evan digs in his pocket and produces a crisp twenty-dollar bill. \"It's all I have. But you can have some free makeup if you want. I have trial sizes.\"\n\n\"That's okay,\" you say. \"I only deal in cash. It's been a pleasure doing business with you!\" \n*set Money +20\n\nYou take home your money and add it to your bicycle fund. Even better, at school the next day, Evan keeps doing all kinds of little favors for you. He sharpens your pencils for you, offers you the pudding from his lunch, and lets you play games on his graphing calculator. You have a feeling you've made a friend—and a useful ally—for life!\n\n*finish\n\n*label repay_makeover\n\nEvan's eyes light up. \"Really? I've always kind of wanted to!\" \n\n\"Ha ha,\" you say nervously. \"Does that mean I look ugly?\"\n\n\"Oh, no,\" says Evan seriously. \"Your face is like a canvas.\"\n\nYou don't know how to respond to that. \n\n*gosub makeover\n\nSchool is interesting the next day.\n*gosub new_look\n\nAt lunch, you sit with Evan. The two of you are bound together now with a secret, and you have a feeling you will be friends for life.\n\n*finish\n\n*label repay_none\n\n\"You have so much integrity,\" says Evan, awed. \"I don't deserve a \n*if(datingE != true)\n\tfriend \n\t*goto repay_none2\n*elseif(gender = \"boy\")\n\tboyfriend \n\t*goto repay_none2\n*elseif(gender = \"girl\")\n\tgirlfriend \n\t*goto repay_none2\n*else\n\tspecial friend \n\t*goto repay_none2\n\n*label repay_none2\nlike you!\" \n\n\"I'm going to go now. And tomorrow,\" you promise him, \"it will be like this never happened.\" \n\n*if(datingE)\n\t\"And tomorrow,\" Evan adds, \"I'm not working. Let's have our date—finally.\"\n\n\tYou grin. \"You're on.\" \n\n\t*goto date_with_evan\n*elseif(relE > 75) and (datingE != true)\n\t\"Wait,\" Evan stops you before you go. \"Um…would you, well, would you want to go to Dairy Queen with me tomorrow? I'm not working. I'll treat you.\"\n\n\t*choice\n\t\t#\"Sure, I'll go on a date with you.\"\n\t\t\t*set relE %+40\n\t\t\t*set datingE true\n\t\t\t*achieve romancer\n\t\t\t*if(datingA) or (datingS)\n\t\t\t\t*achieve multiromancer\t\t\t\n\t\t\tEvan bursts into a wide grin.\n\n\t\t\tYou walk home with a spring in your step. You've solved the mystery, and you have a date! \n\n\t\t\t*goto date_with_evan\n\t\t#\"Er, okay, but only as friends, right?\"\n\t\t\t*set relE %-10\n\t\t\t\"Of course!\" says Evan. \"Pssh. Yeah, like I wanted to date you. Please. Obviously, just as friends.\"\n\n\t\t\t\"Great,\" you say. \"Well, see ya!\"\n\n\t\t\tYou walk home with a spring in your step. You've solved the mystery, and tomorrow you're getting free ice cream!\n\n\t\t\t*finish \n\t\t#\"Shouldn't you catch up on your newspaper work?\"\n\t\t\t*set Respect %+20\n\t\t\t*set relF %+10\n\t\t\t*set relE%-20\n\t\t\t\"Oh, right,\" says Evan dully. \"I forgot about that. I guess Finnegan's pretty mad, huh?\"\n\n\t\t\t\"Kinda,\" you say.\n\n\t\t\t\"I definitely need to get my article in to him, then. I don't want him asking any questions about what I do in the afternoons.\"\n\t\t\t*goto secretkeep_end\n*else\n\t*label secretkeep_end\n\tYou're as good as your word, and you don't tell a soul about Evan's secret. But it's not exactly as if it never happened. For the rest of the week, Evan follows you around. He sharpens your pencils, trades you nice things out of his lunch, and lets you play games on his graphing calculator. You have a feeling Evan will be your friend for a long, long time.\n\n\t*finish\n\n*label break_story\n\nEvan goes pale. \"You do what you have to do,\" he says crisply. \"But you should know, our\n*if(datingE) \n\trelationship\n\t*set datingE false\n\t*goto break_story2\n*else\n\tfriendship\n\t*goto break_story2\n\n*label break_story2\nis over.\" \n\nYou frown. \"Can't you at least see it as some free advertising? Maybe the girls at school will come to get their colors done!\"\n\n\"I don't want the girls at school to come,\" says Evan. \"They already think I'm a dork!\"\n\n\"You can't keep it quiet forever,\" you point out. \"This is a public place.\" \n\n\"I could keep it quiet a little longer,\" Evan insists. \"Anyway, you don't have to be the one to tell everyone.\"\n\n\"I'm sorry, Evan, but I do,\" you say. \"As a detective, \n*if(newspaper_job != \"none\")\n\tand as a journalist, \nI have a duty to the truth!\" \n\nEvan turns away and begins dusting the loose blusher off the table. \"Get out of my store.\"\n\n*page_break\n*set evan_secret_out true\n*set evan_ostracized true\n*achieve nameinprint\n\nThat night, you write up the story. When you show it to Finnegan the next day, he's delighted! He runs it on the front page of the very next issue. The headline is:\n\n\"Mild-Mannered Sixth-Grader Unmasked as Male Makeover Maven!\"\"\n\nThe issue comes out right before lunch. Finnegan holds a lunch meeting in the classroom with the newspaper staff to plan the next issue, and he awards you the first \"Reporter of the Week Award!\" Evan isn't there. You're not sure if he forgot or if Finnegan has fired him.\n\nEither way, Finnegan gives you your $${evan_pay_rate} for a job well done!\n*set detectivePoints +1\n*set Money +evan_pay_rate\n*if(newspaper_job = \"ads\")\n\tOn top of that, the papers are flying off the shelves, and you're sure you can get even more advertisers for the next issue. Finnegan promises to split the profits with you. You estimate that you'll make at least ${pay_rate_base_string} dollars over the next three issues.\n\n\t*set Money +pay_rate_base\n\t*goto break_story3\n*else\n\tOn top of that, Finnegan is charging money for the papers, and with your headline, they're flying off the shelves. Finnegan promises to split the profits with you, and he estimates you'll make at least ${pay_rate_half_string} dollars each.\n\n\t*set Money +pay_rate_half\n\t*goto break_story3\n\n*label break_story3\nAs you walk out of the meeting, you pass Evan in the hall, coming from the direction of the cafeteria. He's a mess! His shirt is covered in food stains. His hair is messed up, stiff with drying mayonnaise. He brushes mashed potato out of his eye.\n\n\"What happened to you?\" you ask.\n\n\"You happened to me,\" he says dully. \"The newspaper happened to me. Your article happened to me. When the kids found out I do makeup, they decided to give me a makeover—with their lunches.\" \n\n\"Ouch,\" you say. \"Food fight? I'm sorry.\" \n\n\"You should be,\" says Evan. \"I won't forget this, ${Name}. You've betrayed me.\" \n\nYou may be an ace reporter and a hotshot detective, but you have a hollow feeling in your stomach for the rest of the day.\n*finish\n\n*label blackmail_evan\n\n*if(did_makeover = false)\n\t*goto evan_offers_makeover_payment\n*else\n\t\"All right,\" says Evan. He opens his wallet and pulls out $${evan_pay_rate}.00.\n\n\t\"Pleasure doing business with you,\" you grin, pocketing the money. \n\n\t*set Money +pay_rate_base\n\t*goto blackmail_aftermath\n\n*label evan_offers_makeover_payment\n\"All right,\" says Evan readily. \"I can pay you in free makeover services.\"\n\n*choice\n\t#\"You've got yourself a deal.\"\n\t\t*gosub makeover\n\t\t*goto blackmail_aftermath\n\t#\"Cold, hard cash only.\" \n\t\t\"I know you're loaded,\" you add. \"You buy yourself stuff all the time. Business is booming, and you hardly have time to spend it all!\"\n\n\t\t\"Oh, all right,\" says Evan. He opens his wallet and pulls out $${evan_pay_rate}.00.\n\n\t\t\"Pleasure doing business with you,\" you grin, pocketing the money. \n\n\t\t*set Money +pay_rate_base\n\t\t*goto blackmail_aftermath\n\n*label makeover\n*achieve sopretty\n*set did_makeover true\n\"Sit down,\" Evan gestures at the stool next to the table. He examines you from one angle and then another. \"What kind of look would you like?\"\n\n*fake_choice\n\t#\"Professional.\"\n\t\t*set Respect %+20\n\t\t*set new_look \"professional\"\n\t#\"Punk rock.\"\n\t\t*set Respect %-20\n\t\t*set new_look \"punk\"\n\t#\"Layer it on. I need to be ready for the stage.\" \n\t\t*set fancy true\n\t\t*set new_look \"stage\"\t\t\n\t#\"What kind of look do you like?\"\n\t\t*set relE %+15\n\t\t*set new_look \"natural\"\n\t\tEvan looks pleased that you're asking his advice. \"Honestly, I prefer a natural look. I think makeup should bring out your natural best features, without looking too 'makeup-y.' I will put minimal products on you.\" He rubs his hands together, selects a few items from the shelves, and gets to work.\n*comment endif\n\nGetting a makeover is a strange experience. The various brushes and wands tickle your face. Evan keeps looking at you piercingly, which must be to check his work, but you feel very self-conscious. He is constantly touching your face, and his head is so close to yours,\n*if(relE > 90) or (datingE)\n\tyou keep feeling as if you are about to kiss.\n\n\t*goto makeover2\n*else\n\tyou can smell the chocolate on his breath. He must raid the penny candy.\n\n\t*goto makeover2\n\n*label makeover2\nFinally, Evan declares himself done. You look in the mirror. \n\n*if(new_look = \"professional\")\n\t*if(gender = \"girl\")\n\t\tYou're wearing striking lipstick, light blusher, and just a hint of mascara. Your hair has been pulled back with a chiffon scarf. You look so grown up!\n\n\t\t*goto makeover3\n\t*else\n\t\tYou're wearing tinted moisturizer, bronzer, and just a hint of mascara. Your hair has been swept back with gel. You look so grown up!\n\n\t\t*goto makeover3\t\t\n*elseif(new_look = \"stage\")\n\t*if(gender = \"boy\")\n\t\tYour skin is shiny with a thick layer of foundation. On top of that, Evan has thickened your eyebrows with a dark pencil, and filled in the space between your brows and eyes with dark shadow. A series of different color foundations contours your cheekbones. Your lips are outlined in red, and your cheeks are pink with blusher. You could definitely be seen from the back row of a crowded auditorium now. You look like a star!\n\n\t\t*goto makeover3\t\n\t*else\n\t\tYour skin is shiny with a thick layer of foundation. On top of that, Evan has layered sparkly eyeshadow winging out from your eyes. Long fake lashes flutter when you blink. A series of different color foundations contours your cheekbones. Your lips are outlined in red, and your cheeks are pink with blusher. You could definitely be seen from the back row of a crowded auditorium now. You look like a star!\n\n\t\t*goto makeover3\t\n*elseif(new_look = \"natural\")\n\tYou can barely tell you are wearing any makeup, but you look subtly nicer, somehow. Your cheekbones look higher. Your eyelashes look darker. You just look good. \n\n\t*goto makeover3\n*elseif(new_look = \"punk\")\n\tYou are wearing just a ton of eyeliner. You look so cool!\n\n\t*goto makeover3\n\n*label makeover3\nYou have to admit it: Evan has a gift. He did a perfect job. \n\n\"Well?\" says Evan nervously. \"Do you like it?\"\n\n*fake_choice\n\t#\"I love it!\"\n\t\tEvan beams. \n\t\t*set relE %+30\n\t#\"It's okay, I guess.\" \n\t\t\"Well, it's the look you asked for,\" Evan pouts.\n\t\t*set relE %-20\n\t#\"It's uniquely different.\"\n\t\t\"Huh?\" says Evan.  \n\t\t*set Secrecy %+10\n*comment endif\t\t\n\n\"What's the going rate for a makeover these days, anyway?\" you ask, reaching into your pocket for your wallet.\n\n*if(datingE)\n\t\"For you? On the house,\" Evan smiles. \"That's the fringe benefit of going out with me. Free makeovers on demand.\"\n\t\n\t*return\n*elseif(relE > 75)\n\t\"For you? On the house,\" Evan smiles. \"That's the fringe benefit of being friends with me. Free makeovers on demand.\"\n\t\n\t*return\n*elseif(relE > 60)\n\t\"First one's free. That's how I get you hooked,\" Evan winks.\n\t\n\t*return\n*else\t\n\tEvan blinks anxiously. \"On the house, okay? No charge. One good turn deserves another, right?\"\n\t\n\t\"What good turn did I do you?\" you ask.\n\t\n\tEvan looks hopeful. \"Maybe one in the future.\"\n\t\n\t*return\n\n*label new_look\n*if(new_look = \"\")\n\t*return\n\nEvery time you look in the mirror, you see a slightly unfamiliar face. Evan gave you trial sizes of the products he used on you, and you recreated the \"look\" at home this morning. \n\n*if(new_look = \"professional\")\n\t\"Very nice look!\" Mrs. Greeley compliments you as you take your seat.\n\n\tA.J. makes a face. \"What did you do to your face? You look dorky.\" \n\n\tVitessa turns around in her seat. \"A.J.'s right,\" she tells you in a pained voice, as if she's sorry to have to deliver the bad news. \"You look like a teacher.\"\n\n\tOh, well. You know you look great.\n\n\t*return\n*elseif(new_look = \"stage\")\n\t*set relV %+20\n\t\"${Name}!\" Mrs. Greeley cries, surprised. \"You look very…fancy. Are you experimenting with makeup? You might want to go a little lighter next time.\" \n\n\tBut Vitessa actually smiles as you walk past her desk. \"Nice. You look put together for once!\" \n\n\tA.J. makes a gagging noise. \n\n\tOh, well. You can't please everyone. \n\n\t*return\n*elseif(new_look = \"punk\")\n\t*set relA %+20\n\tMrs. Greeley recoils in horror when she sees your face. \"Oh, dear. Why did you do that to your lovely face? I just don't understand fashion these days.\"\n\n\tA.J. grins as you sit down next to ${him}. \"You look so cool!\" \n\n\tYou grin.\n\n\tVitessa turns around in her seat. She does not look impressed. \"You look like an evil clown,\" she tells you.\n\n\t\"Thank you,\" you say.\n\t\n\t*return\n*else\n\tIt's just like Evan said—nobody seems to be able to exactly tell that you're wearing makeup, but they all seem to pick up on the fact that you look somehow nicer than usual. Vitessa tells you you \"don't look like dog throw up today,\" which you take as her highest compliment. \n\n\t*return\n\n*label blackmail_aftermath\nEvan avoids you at school the next day. Although you've promised to keep his secret, he seems skittish and unsure.\n\n*gosub new_look\n\nAt lunch, Finnegan sits down across from you. \"Well?\" he asks eagerly. \"Did you find out about Evan?\"\n\n*choice\n\t#\"No, he eluded me.\"\n\t\t*set relF %-20\n\t\t\"You're not a very good detective, are you?\" Finnegan remarks. \"Oh well, you tried your best. Although you might want to sharpen up if you want to be a good reporter.\"\n\n\t\t*goto reporter_reaction\n\n\t#\"Actually, I don't feel right about spying on my friends. Let's leave Evan alone.\"\n\t\t*set relF %-10\n\t\t\"Boring!\" sighs Finnegan. \"You'll have to get over those pesky scruples if you want to be a good reporter.\"\n\n\t\t*goto reporter_reaction\n\n\t#\"Oh, his parents signed him up for some boring class.\"\n\t\t*set lie_count +1\n\t\t*set relF %+10\n\t\t\"Oh,\" says Finnegan, deflated. \"That's anticlimactic. Well, not every story can be a winner.\"\n\n\t\t*if(evan_pay_rate > 0)\n\t\t\t\"Do I still get my money?\" you ask.\n\n\t\t\t\"Heck, no! Not without a story I can run! Still, you should feel good about your work here today. Figuring out the truth is, like, half of what you need to be a good reporter. You just need to figure out how to make it sensational!\" \n\n\t\t\t*goto reporter_reaction\n\t\t*else\n\t\t\t\"Sorry,\" you shrug.\n\n\t\t\t\"Still, you should feel good about your work here today,\" Finnegan says consolingly. \"Figuring out the truth is, like, half of what you need to be a good reporter. Now you just need to figure out how to make it sensational!\"\n\n\t\t\t*goto reporter_reaction\n\n*label reporter_reaction\n*if(newspaper_job = \"none\")\n\t\"I don't want to be a reporter,\" you protest. \n\n\tFinnegan waves you off.\n\t*goto blackmail_end\n*elseif(newspaper_job = \"ads\")\n\t\"I don't want to be a reporter. I want to be a salesperson,\" you remind him.\n\n\tFinnegan waves you off.\n\t*goto blackmail_end\n*else\n\t\"I'll find something else to report on,\" you promise him. \"Something better.\" \n\n\t*goto blackmail_end\n\n*label blackmail_end\n\"I'm still keeping my eye on Evan, but I'm thinking he's probably not the thief after all,\" Finnegan confides. \"It turns out that smartphone was last year's model. He got it on eBay. Well, see you at the next meeting.\" \n\nFinnegan gets up and walks away. Across the cafeteria, Evan catches your eye and mouths, \"Thank you.\" \n\n*finish\n\n*comment: an optional epilogue\n*label date_with_evan\nThe next night, you sit in a booth at Dairy Queen, wearing Evan's jacket. High school kids sit in groups and pairs in the booths around you. You are dressed in your nicest \n*if(gender = \"girl\")\n\ttop and skirt. Your lipstick was recommended by Evan. It's darker than you would have chosen, but he was right: You look glamorous! \n*if(gender != \"girl\")\n\tbutton-down shirt and slacks. \nYou feel very adult and important. \n*if(datingA) or (datingS)\n\tYou've never been on such a datelike date. \n\t*if(datingA)\n\t\tYour date with A.J. was more like friends hanging out. You didn't dress up or go anywhere special. It was just that you both knew it was a date, and that made it romantic. This feels much more official. \n\t*if(datingS)\n\t\tYou never did go on a real date with Shashi—that is, in the real world. Her idea of a romantic night is to sit at the gaming table and act out your characters flirting with each other.\n\t\n\t*goto date_evan2\n*else\n\tYou are on a date, just like them! Your very first!\n\t\n\t*goto date_evan2\n\n*label date_evan2\nEvan returns to the table holding a sundae in each hand. He looks strikingly grown-up in a sport jacket over a V-neck shirt. You're not sure if the white shirt is bringing out his natural tan or if he's wearing bronzer. Either way, he looks great. His hair is artfully moussed, and when he leans close to put your sundae down in front of you, you detect just a hint of cologne.\n\nEvan sits across from you, behind his own sundae, and spreads his napkin in his lap. Glancing up and catching your eye, he shoots you a shy smile. \"I'm so glad we could do this.\"\n\n\"Me, too,\" you say.\n\nYou smile at each other for a moment, and then you both dig into your ice cream. \n\n*finish", "ch4book_sc1corley": "[b]The Book of Truths[/b]\n*set ch4started true\n*temp corley_told_you false\n*set book_pay_rate round(detectivePoints) * round(pay_rate_base)\n*set book_pay_rate *100\n*set book_pay_rate round(book_pay_rate)\n*set book_pay_rate /100\n\nIt's four-thirty in the afternoon, and you're still at school. You just got finished with\n*if(in_shashis_gaming_group)\n\ta game-planning session with Shashi.\n\t*goto intro2\n*elseif(relA > 70)\n\ta handball game with A.J.\n\t*goto intro2\n*elseif(Respect \u003c 30)\n\tdetention.\n\t*goto intro2\n*elseif(Respect > 70)\n\tsome work in the library for an extra-credit project.\n\t*goto intro2\n*elseif(newspaper_job != \"\")\n\ta newspaper meeting with Finnegan.\n\t*goto intro2\n*else\n\ta little extra tutoring. \n\t*goto intro2\n\n*label intro2\nAs you step into the coat room, you hear a sob. Looking around, you find Corley huddled in the corner, half-hidden under a hanging coat.\n\n\"Corley!\" you cry. \"Are you okay? What's wrong?\"\n\nShe sniffs and turns away. \"It's…it's nothing.\"\n\n*choice\n\t#\"You'll feel better if you tell me what's wrong. Maybe I can help.\"\n\t\t*set relC %+20\n\t\t*set Secrecy %-20\n\t\t*goto corley_divider\n\t#\"It's okay if you don't want to talk about it. But I'm here if you need me.\"\n\t\t*set relC %+40\n\t\t*set Secrecy %+20\n\t\t*goto corley_divider\n\t#\"Who made you cry? I'll go beat them up.\"\n\t\t*set relC %+10\n\t\t*set Greed %-20\n\t\t*if(relC > 50)\n\t\t\tCorley offers you a shaky smile. \"You don't have to beat anyone up.\"\n\n\t\t\t\"So what has you down?\" you ask.\n\n\t\t\t*goto corley_divider\n\n\t\t*else\n\t\t\tCorley looks taken aback. \"No violence,\" she says.\n\n\t\t\t\"Okay,\" you agree. \"If I promise to keep my fist in my pocket, will you tell me what's wrong?\"\n\n\t\t\t*goto corley_divider\n\t\n\t#\"Fine, don't tell me. See if I care.\" \n\t\t*if(relC > 70)\n\t\t\tYou begin to walk out, but Corley says, \"Wait.\"\n\n\t\t\tYou turn around. \n\n\t\t\t*goto corley_divider\n\t\t*else\n\t\t\tCorley bursts into fresh tears and runs out of the room. You feel a little guilty for being so mean. \n\n\t\t\t*goto corley_doesnt_tell_you\n\n*label corley_divider\n*if(relC > 70) and (Secrecy > 70)\n\t\"It's just….\" Corley hesitates.\n\n\t\"I'm listening,\" you say eagerly.\n\n\t*goto corley_tells_you\n*else\n\tCorley frowns, fidgets with her necklace, and stares out into the distance. \"Well…no. It's nothing.\" \n\n\t\"It doesn't sound like nothing,\" you say.\n\n\t*if(relC > 50) or (Secrecy > 70)\n\t\t*goto corley_tells_you\n\t*else\n\t\tShe shakes her head and then stands very suddenly. \"I have to go,\" she mumbles and flees.\n\n\t\t*goto corley_doesnt_tell_you\n\t\t\n*label corley_tells_you\nCorley takes a deep, shaky breath. \"I can trust you, right?\"\n\n\"Of course,\" you say. \n\n\"It's just…well, these kids I barely know were making fun of me for….\" Corley pauses. \"Very personal reasons.\" \n\n*fake_choice\n\t#\"What reasons?\"\n\t\t*set Secrecy %-30\n\t\t*set relC %-10\n\t\tCorley turns red. \"It doesn't matter.\" \n\t#\"Aw, I'm sorry, Corley. People can be so crummy.\"\n\t\t*set Secrecy %+20\n\t\t*set relC %+20\n\t\tCorley manages a small, grateful smile but shakes her head. \"It doesn't matter.\" \n\t#\"I want names.\"\n\t\t*set Greed %-20\n\t\t*set relC %+10\n\t\tCorley shakes her head. \"It doesn't matter.\" \n*comment endif\n\n\"Of course it matters,\" you say. \"When did all this happen?\"\n\n\"Just now. It was those mean kids in the Whips. Adam and Kyle and Max and Rina.\" Corley sighs. \"Shashi would say, 'Why do you care what they think?' And I don't, really. I guess…it's just so weird. How did they know that about me? I didn't tell anyone!\"\n*set know_whips_mocking_corley true\n\n*choice\n\t#\"Tell them what?\"\n\t\t*set Secrecy %-20\n\t\t*if(relC > 75)\n\t\t\t*set know_corleys_secret true\n\t
