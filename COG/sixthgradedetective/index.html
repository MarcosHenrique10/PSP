<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sixth Grade Detective — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "sixthgradedetective", "title": "Sixth Grade Detective", "scenes": {"ch1bike_sc1school": "[b]The Case of the Missing Bike[/b]\n\n3:00 PM. The end of the school day. As you walk out into the schoolyard, you scan the bike racks up and down for flashes of red. You see three red bikes, but none are the one you're looking for. The person who stole A.J.'s bike would probably not be stupid enough to come and lock it up at school, right where it had been stolen in the first place, but you never know.  \n\nYou walk up to rack 6G to take your fourteenth close look at the scene of the crime. Today there's a bike you've never seen before. Brown and rusty, held together with duct tape, it looks like it was built in the 1700s and has been buried under a pile of dirt ever since. The brand name, barely visible under the rust, is \"Schwizz.\" Not \"Schwinn,\" but \"Schwizz.\" \n\nThere is no lock on it. Whoever owns it should probably be told that there's a history of theft at this rack. But then, who would steal such a gross, rusty, old bike? Even you don't want it, and you're bikeless. \n\n\"Hey!\" A hand rests on your shoulder. \"Whatcha doin'?\" \n\nYou turn and see the smiling face of the owner of the missing bike—and your best friend in the world—A.J.  \n\nYou have known A.J. since kindergarten. A black hoodie and a surly look are A.J.'s usual uniform. With dark hair and eyes, full lips, and a smattering of freckles, A.J. was named cutest juvenile delinquent in Vitessa's secret underground gossip rag.\n\nWhy do you think you're such good friends? \n*set ch1started true\n\n*fake_choice \n\t#Like seeks like. Like A.J., I'm a rebel, a lone wolf, and no one can tame me. \n\t\t*set Respect %-25 \n\t\tYou and A.J. are lone wolves together.\n\t#Opposites attract. No one would expect a squeaky-clean upstanding citizen like me to be friends with such a troublemaker.\n\t\t*set Respect %+25 \n\t\tYou are such a good influence on A.J.\t\n\t#I'm the only person who gives A.J. a fair shake. Everyone else is either too judgy or too afraid.\n\t\t*set Greed %-25\n\t\t*set Respect %+10\n\t\tYou make up your own mind about things. A.J. respects your evenhanded approach to life.\n\t#I know how to keep my mouth shut, and so does A.J. We can confide in each other without worrying about our secrets getting out.\n\t\t*set Secrecy %+25\n\t\t*set Respect %-10\n\t\tYou and A.J. are as thick as thieves.\n\t#We make good business partners. A.J.'s underground connections turn up good opportunities for me to make money. \n\t\t*set Greed %+25\n\t\tYou and A.J. have a mutually beneficial relationship.\n\t#It's not just A.J. I'm friends with everyone. I just love talking to all kinds of people.\n\t\t*set Secrecy %-25\n\t\t*set relA %-10\n\t\t*set relS %+10\n\t\t*set relE %+10\n\t\t*set relF %+10\n\t\t*set relV %+10\n\t\tA.J., your teacher, the mailman… You just want to know everything about everyone!\n*comment endif\n\nBy the way…\n*gosub get_genA \n\nWhile I'm on the subject…\n*gosub get_gender \n\nAs long as I'm asking you questions…\n*gosub get_name\n\nAs you examine the bike rack, A.J. grins. \"Hey, hey! Did your parents finally cave? Did they finally get you a bike?\"\n\n\"No,\" you say. \"They still want me to earn the money on my own.\"\n\n${Hhe} groans. \"Parents. Am I right?\"\n\n*if(Respect >= 50)\n\t\"I think it will be good for me,\" you say optimistically. \"Get a head start on growing up.\"\n\n\tA.J. fixes you with a sympathetic look. \"You really believe that line, huh? It's all about helping you learn. It's not just because they're cheap.\"\n\n\t\"Oh, I don't know,\" you shrug. \"Maybe being a little cheap isn't so bad. I don't think I'd want everything in life to come easily.\"\n\n\t\"You keep telling yourself that,\" says A.J. \"So why are you staring at the other kids' bikes? Just to torture yourself?\"\n*if(Respect \u003c 50)\n\t\"I know, right?\" you sigh.\n\n\t\"Can't live with 'em…\"  A.J. begins.\n\n\t\"Can't legally live without 'em,\" you finish.\n\n\tA.J. grins. \"So why are you staring at the other kids' bikes? Just to torture yourself?\"\n*comment endif\n\n\"No. Well, not just that,\" you reply. \"I'm doing the usual. Looking for clues to the theft of Red Lightning.\"\n\n\"Oh, wow! You're still doing that?\" A.J.'s face lights up. \"If anyone can find it, it's you. I'm glad I have you in my corner!\"\n\n*fake_choice \n\t#\"What are friends for?\"\n\t\t*set relA %+25\n\t\tA.J. looks down bashfully. \"Aww. Thanks, buddy.\"  \n\t#\"Theft is a crime. It is not acceptable.\" \n\t\t*set Greed %-25\n\t\t*set Respect %+10\n\t\tA.J. nods seriously. \"Stealing someone's bike should be punished like kidnapping, especially when it's a bike as great as Red Lightning.\"\n\t#\"I want to find the jerk who stole that bike and pummel him.\"\n\t\t*set Respect %-25\n\t\t*set relA %+10\t\t\n\t\t\"You and me both!\" says A.J., pounding ${his} palm with ${his} fist.\n\t#\"Don't get mushy. I'm in it for the money. You're still willing to pay me, right?\" \n\t\t*set Greed %+25\n\t\t*set rl_pay_rate 20 \n\t\t\"Right,\" says A.J. \"Twenty bucks. Payable upon recovery of Red Lightning. It's a bargain, really. Red Lightning is the best bike in the world!\"\n*comment endif\t\t\t\n\n\"Get out of the way!\" a voice snaps. You turn and see Vitessa standing behind you with her hands on her hips. \"You're blocking my bike.\"\n\n\"Sor-ry, Princess,\" A.J. mutters.  \n\n*if(Secrecy \u003c 50)\n\t\"Hi, Vitessa!\" you wave. \"I like your outfit. Pinstripes. That's in, right?\"\n\t\n\t\"Mm. Not that you know anything about fashion,\" Vitessa sniffs, but you can tell she is at least a little pleased with your compliment.\n\t\n\t*if(Respect \u003c 50)\n\t\t\"Who does she think she is?\" you whisper to A.J.\n*comment endif\n\nVitessa brushes past you, unlocks her pink bike, and rides away. \n\nEvan is right behind her, waving hello to you both as he grabs his souped-up green racing bike. Shashi wanders up dreamily after that, lost in her own world, and rides off on her blue star-spangled bike.\n\nA.J. leans against a tree and watches the others longingly. You decide to change the subject from bikes.\n\n\"I just got my own library card,\" you say. \"I'm walking down to the library now. You want to come with?\"\n\nA.J. makes a face. You could have expected that. ${Hhe} hates reading. Except comic books. \"Aw, what do you want to go there for?\" ${he} asks.\n\n*fake_choice \n\t#\"It's important to study and do well at school so I can get into a good college and get a good job.\" \n\t\t*set Respect %+25\n\t\t*set Greed %+10\n\t\tA.J. sighs. \"You know what your problem is? You buy into the lies the adults tell you. You're wasting your time.\" \n\t#\"I like to secretly learn as much as I can so that my enemies will underestimate me.\" \n\t\t*set Secrecy %+25\n\t\t*set Respect %-10\n\t\tA.J. nods. \"Me, I like my enemies to overestimate me. Then they leave me alone.\"\n\t#\"I believe in the library. Everyone should have access to knowledge. Also, they do a lot for the community, like classes and story hour for kids.\"\n\t\t*set Greed %-25\n\t\t*set Respect %+10\n\t\t\"Spare me,\" says A.J. \"You sound like a public service announcement.\"\n\t#\"Where else can you get free books and DVDs and stuff? It's like legal piracy. It's crazy!\"\n\t\t*set Greed %+25\n\t\t*set Respect %-10\n\t\t\"Yeah, free doesn't cut it for me,\" says A.J. \"They'd have to pay me.\"\n\t#\"You can meet a lot of interesting people at the library. One time I talked for an hour with a homeless lady in the computer lab. And I once advised a librarian about his love life.\"\n\t\t*set Secrecy %-25\n\t\t*set Greed %-10\n\t\t\"I would consider that one of the downsides,\" says A.J. \"People. Yech.\" \n\t#\"They have all the books the school library banned for sex, violence, and bad morals.\" \n\t\t*set Respect %-25\n\t\t*set Secrecy %-10\n\t\t\"Yeah?\" A.J. looks interested for a moment, then shrugs. \"But you still have to read.\"\n*comment endif\n\t\t\t\t\nYou know the library issue is one that you and A.J. will never agree on. You shrug. \"Well, I'll walk with you down to the corner.\"\n\n\"Actually…\" A.J. looks embarrassed. \"I didn't walk today. I rode.\" \n\nYou're confused. A.J. doesn't have a bike, not since the theft. You look at the bike rack. It's empty, except for that horrible brown bike. \n\nWith a deep sigh, A.J. grabs the grimy handlebars and wheels the bike away from the rack. \n\n\"That's yours?\" you ask, surprised. \n\nA.J. looks pained. \"Unfortunately.\" \n\n*fake_choice \n\t#\"Ugh, it's horrible!\"\n\t\t*set Secrecy %-10\n\t\t*set Respect %-10\n\t\t\"Believe me, I know!\" says A.J. bitterly.\n\t#\"Yikes. People saw you riding that?\"\n\t\t*set Secrecy %+10\n\t\t*set Respect %-10\n\t\t\"Well, I tried to get to school really late so I wouldn't run into anyone,\" A.J. explains.\n\t#\"I wouldn't ride that bike if you paid me…. Well, maybe if you paid me enough.\"\n\t\t*set Greed %+10\n\t\t*set Respect %-10\n\t\t\"I'm starting to feel that way, too,\" says A.J. \n\t#\"It's…nice. Vintage.\"  \n\t\t*set Respect %+10\n\t\t*set relA %+10\n\t\t\"I know you're trying to be nice, but you don't have to lie. It's terrible,\" says A.J. firmly.\n\t#Just say nothing at all.\n\t\t*set Secrecy %+10 \n\t\t\"That bad, huh?\" sighs A.J. \n\"Mom says we should accept Red Lightning isn't coming back. So she dug this…thing…out of the basement. I think she used to ride it back in the seventies. I call it the Great Brown Ugly. And, trust me, it doesn't ride any better than it looks. It's creaky and rusty, and only one of the gears actually works. I hate it so much. It's worse than walking!\"\n\n*if(Respect > 50)\n\t\"Gosh, why don't you just walk then? You can walk with me,\" you point out. \"I'm sure if you talk to your mom, she will understand why you want to get rid of the bike. It is awfully old.\"\n*if(Respect \u003c 50)\n\t\"So walk,\" you say. \"Tell your mom she can keep her stupid bike.\" \n*if(Respect = 50)\n\t\"Why don't you just walk then? It's not that bad. I do it all the time,\" you point out. \"Tell your mom, 'Thanks but no thanks.'\"\n*comment endif\n\n\"I would but….\" A.J. shakes ${his} head. \"You know my mom. She's a saint, but she's deluded. She thinks this bike is amazing.\"\n\nThis is typical. For all A.J.'s bravado and petty criminal behavior, ${he} has a soft spot for ${his} mom. \n\n\"If only a thief would take this one,\" says A.J. wistfully. \"That would solve all my problems.\"\n\n*fake_choice \n\t#\"Don't even say things like that. Your mom would be so upset!\" \n\t\t*set Respect %+25 \n\t\t*set aj_hides_motive \"disapproval\" \n\t\t\"I guess,\" A.J. sighs. \n\t#\"Be up-front. Tell your mom how you feel.\" \n\t\t*set Secrecy %-25 \n\t\t*set aj_hides_motive \"disapproval\"\n\t\tA.J. shakes ${his} head. \"No way. She wouldn't understand. And don't you tell her, either!\"  \n\t#\"Just smash it with a hammer. Your mom can go soak her head.\"  \n\t\t*set Respect %-25 \n\t\t*set aj_hides_motive \"meanness\" \n\t\tA.J. shakes ${his} head. \"She'd cry. I can't handle that.\" \n\t#\"Give me twenty bucks, and I'll make it disappear.\" \n\t\t*set Greed %+25 \n\t\t*set aj_hides_motive \"greed\"\n\t\t\"Ha ha,\" says A.J. \"I'm not that hard up…yet.\" \n*comment endif\n\nWith a look of grim determination, A.J. climbs onto the Great Brown Ugly. You know ${he}'s a good bike rider—you've seen ${him} zip around on Red Lightning as if ${he} were born on a bike—but the Great Brown Ugly shakes and shudders and jerks uncontrollably in either direction as ${he} rides off. What a terrible bike! \n\nIt's just you left in the schoolyard. Everyone else has ridden off. You look down at your trusty sneakers and begin your long walk.\n\n*finish\n\n*comment: Subroutines\n\n*comment: GENDER\n\n*label gender_girl\n*set gender \"girl\"\nRock on, lady.\n\n*return\n\n*label gender_boy\n*set gender \"boy\"\n*set she_u \"he\"\n*set shes_u \"he's\"\n*set her_u \"him\"\n*set hers_u \"his\"\n*set child \"son\"\n*set youth \"man\"\n*set detectivetype \"boy\"\n*set Ddetectivetype \"Boy\"\n*set mam \"sir\"\n*set miss \"Mr.\"\n*set princess \"prince\"\n*set Scout \"Boy Scout\"\nRock on, sir.\n\n*return\n\n*label gender_neutral\n*set gender \"neutral\"\n*set she_u \"they\"\n*set shes_u \"they're\"\n*set her_u \"them\"\n*set hers_u \"their\"\n*set child \"child\"\n*set youth \"whippersnapper\"\n*set detectivetype \"kid\"\n*set Ddetectivetype \"Kid\"\n*set mam \"Detective\"\n*set miss \"Dr.\"\n*set princess \"monarch\"\n*set Scout \"goody-goody\"\nRock on, friend. You don't have to define yourself with constricting labels like \"girl\" or \"boy.\"\n\n*label get_gender\n*if(gender = \"confidential\")\n\tWhat's your gender?\n\n\t*fake_choice\n\t\t#Girl.\n\t\t\t*gosub gender_girl\n\t\t#Boy.\n\t\t\t*gosub gender_boy\n\t\t#It's not important.\n\t\t\t*gosub gender_neutral\n*return\n\n*label get_genA\n*if(genA = \"confidential\")\n\tWhat is A.J.'s gender?\n\n\t*fake_choice\n\t\t#Boy.\n\t\t\t*gosub genA_boy\n\t\t#Girl.\n\t\t\t*gosub genA_girl\n*return\n\n*label genA_boy\n*set genA \"boy\"\n*set he \"he\"\n*set his \"his\"\n*set hiss \"his\"\n*set him \"him\"\n*set Hhe \"He\"\n*set Hhis \"His\"\nRight, ${he}'s a bad boy.\n\n*return\t\n\n*label genA_girl\n*set genA \"girl\"\n*set he \"she\"\n*set his \"her\"\n*set hiss \"hers\"\n*set him \"her\"\n*set Hhe \"She\"\n*set Hhis \"Her\"\nRight, ${he}'s a tough girl. \n\n*return\t\t\n\n*comment: NAMES\n\n*label get_name\nWhat's your name? \n\n*fake_choice\n\t*if(gender = \"girl\")\n\t\t#Addie.\n\t\t\t*set name \"Addie\"\n\t\t#Leila.\n\t\t\t*set name \"Leila\"\n\t\t#Maribel.\n\t\t\t*set name \"Maribel\"\n\t*if(gender = \"boy\")\n\t\t#Bobby.\n\t\t\t*set name \"Bobby\"\n\t\t#Kamal.\n\t\t\t*set name \"Kamal\"\n\t\t#Marco.\n\t\t\t*set name \"Marco\"\n\t*if(gender = \"confidential\") or (gender = \"neutral\")\n\t\t#Alex.\n\t\t\t*set name \"Alex\"\n\t\t#Kiran.\n\t\t\t*set name \"Kiran\"\n\t\t#Ryu.\n\t\t\t*set name \"Ryu\"\n\t\t#Jaylin.\n\t\t\t*set name \"Jaylin\"\n\t\t#Ash.\n\t\t\t*set name \"Ash\"\n\t#Something different.\n\t\tEnter your name:\n\t\t*input_text name\n\n*comment endif\n\t\nPleased to meet you, ${Name}.\n\n*return\n", "ch1bike_sc2library": "*label library\n3:45 PM. You arrive at the library after a brisk half-hour walk through downtown. You can't help but reflect that, on a bike, the trip would have taken you five minutes. Someday!\n\nYour first stop is the bulletin board in front of the library, which advertises local events: a children's puppet show, old movies playing at the Rialto, \"Makeovers by Raven\" at the drugstore. There's even a flyer for your school's Starlight Dance. You didn't realize they advertised this far away from the school. The dance is going to be a pretty big deal. \n\nHow do you feel about the dance?\n\n*fake_choice\n\t#Proud to be old enough to go to a school that has a dance!\n\t\t*set Respect %+10\n\t\tGoing to a school dance is a sign that you have made it. You are practically an adult.\n\t#Not interested. Me? Go to school when I don't have to? No, thank you.\n\t\t*set Respect %-10\n\t\tTo be fair, there was that one time you and A.J. did go to the elementary school after dark, but it was Halloween and you were armed with raw eggs.\n\t#I can't wait to get dressed up and show off my fanciest clothes!\n\t\t*set fancy true\n\t\tYou are already planning your outfit. You are going to look smashing.\n\t#I'm not sure. Would it be more conspicuous to go or not go? \n\t\t*set Secrecy %+10\n\t\tYou'll have to poll your classmates to see if the majority of them are planning on going or not. You don't want to draw undue attention to yourself—by your presence or your absence.\n\t#I hope I get a date!\n\t\tBut really, you're pretty sure you can get a date if you set your mind to it. \n*comment endif\n\nThere is a small blank space in the middle of the bulletin board, between flyers for a babysitter and a guitar teacher. You take a small business card from your pocket and pin it into the space.\n\n[i]Need a Mystery Solved?[/i]\n*line_break\n[i]${Name}, Private Investigator[/i]\n*line_break\n[i]No Job Too Big or Small[/i]\n\nIt looks great! With a feeling of accomplishment, you stride into the library.\n\nThe library's books are organized with the Library of Congress system. What section do you visit? \n\n*fake_choice\n\t#CB-311: History of civilization—Geography of the ancient world.\n\t\t*set Respect %+10\n\t#HF-5386: Commerce—Business guidance.\n\t\t*set Greed %+10\n\t#HV-8073: Criminology—Investigation of crimes. \n\t\t*set Greed %-10\n\t#PE-3721: English language—Dictionaries of slang & swear words.\n\t\t*set Respect %-10\n\t#PN-6728: Periodicals—Comic books.\n\t\t*set Respect %-10\n\t#TT-500: Arts and crafts—Fashion.\n\t\t*set fancy true\n\t#Z-103: Writing—Codes and ciphers.\n\t\t*set Secrecy %+10\n\t\t*set haveCodebook true\n\t\t*achieve getcodebook\n\nYou gather a big stack of books to take out. You get to check them out under your own card. Your mom took you down to the library last week to get it. On the back, you signed your name in \n*if(Secrecy>=60)\n\ttiny, almost unreadable letters. You would have put down a false name, but your mother and the librarian were watching.\n\t*goto swipe_card\n*elseif(Secrecy\u003c=40)\n\tbig, flourishy letters. Also, you added sparklers and stars around it.\n\t*goto swipe_card\n*elseif(Respect > 50)\n\tneat cursive. You have excellent penmanship.\n\t*goto swipe_card\n*elseif(Respect \u003c=50)\n\tmessy printing. Mom says your handwriting looks like a third-grader's, but it's no worse than A.J.'s.\n\t*goto swipe_card\n\n*label swipe_card\nYou swipe your card, load your books into your backpack, and head out on your way.\n\n*finish", "ch1bike_sc3hanks": "*temp seen_first_receipt false\n*temp Hank_showed_first_receipt false\n*temp posed_bike_buyer false\n5:15 PM. You're making your way down an unfamiliar alley. You've never walked home from the library on your own before, and you're a little mixed up. You thought this alley between Paquito's Taqueria and Hair Today Salon would be a quick shortcut to Main Street, but now you're not so sure.\n\nThe alley is long and eerily silent, except the whistle of the wind. There's no traffic here, just dumpsters and steel doors marked \"Employees Only—Do Not Enter.\" The shadows are growing long, and your backpack is heavy. Somewhere a dog barks. \n\nThe salon building ends. A chain-link fence stretches into the distance. A large red sign reads \"Property of Hank's Garage—No Trespassing!\" The lot is a graveyard of disassembled cars. Tarps weighed down with cement blocks cover ghostly shapes.\n\nA tarp billows in a gust of wind, and underneath it, you glimpse a familiar flash of color. You stop in your tracks and wait for another gust. Yes, it's clear now. Under the tarp is a row of bicycles chained to a rack. You see flashes of narrow tires, gears, metallic frames in green and blue and red.\n\nYour heart thumps. Could Red Lightning be here?\n\n*page_break\n\nYou walk slowly along the fence, squinting at the tarps. It's hard to get a good look. There are at least three bike racks under tarps. As you get close to the padlocked gate, you see a lone bike, unchained, leaning against the fence, so close you could reach through the links and touch it. You stop short. You recognize that bike! It's the Great Brown Ugly! \n\nWhat? You shake your head. This is impossible. You saw A.J. ride off on this bike just a few hours ago. But there's no mistaking it. No bike in the world looks like the Great Brown Ugly. It's got all the same unique markings, from the rusty gears, to the mildew-stained seat, to the duct-taped old frame marked \"Schwizz.\"\n*achieve bikefinder\n*set seen_gbu true\n\nHow did it get here? Does A.J. know? Was the Great Brown Ugly stolen after all? And what are you going to do now?\n\n*choice\n\t#Climb the fence.\n\t\t*set Respect %-20\n\t\t*set Greed %+20\n\t\t*goto climb\n\t#Go around to the customers' entrance of the garage, like a normal person. Someone who works here must know something about this.\n\t\t*set Respect %+10\n\t\t*set Secrecy %-10\n\t\t*goto chat_with_hank\n\t#Look for a pay phone to call A.J.  \n\t\t*set Secrecy %-20\n\t\t*goto phone\n\n*label phone\nJust as you're the only person in the world without a bike, you're also the only person in the world without a cell phone. You circle the garage building looking for pay phones, but there's none in sight. \n\nGlancing through the front door of the garage—the customers' entrance—you can just see the reception desk. They've got to have a phone. You walk in.\n\n*goto reception_area\n\n*label climb\nYou hop up, grab onto the fence, and swing yourself up, shoving the tips of your shoes into the gaps in the chain links. Your backpack slams heavily against your back. You forgot you have all those books! Your shoulders ache, and the metal cuts into your fingers where they grip the fence. You begin to slip. You realize you need to jettison the backpack to go any further. One arm at a time, you disentangle yourself from your backpack and let it fall to the ground. \n\nRelieved of that burden, you scramble quickly to the top of the fence. You launch yourself over to the other side, climb down about halfway, and jump safely to the bottom. You're in the lot!\n\n*fake_choice\n\t#Look under the tarps for Red Lightning.\n\t\tForget the Great Brown Ugly. This is about Red Lightning. You scurry over to the tarp-covered bike racks, your heart pounding in your chest. \n\n\t\tFor just a moment, your hand clasps the edge of the nearest blue tarp. \n\t#Grab the Great Brown Ugly.\n\t\tNow what? You can't climb back over the fence with a bike. \n\t#I feel trapped! Hunt for another way out. \n\t\tThe padlock on the gate is secure from both sides. You begin walking along the fence toward the graveyard of old cars. \n*comment endif\n\nSuddenly, a voice rings out very close behind you. \"Hey, kid! What are you doing? Get out of there!\"\n*set relH %-30\n\nA burly man in a jumpsuit is charging toward you from the direction of the fence. The name patch on his uniform reads \"Hank.\" In his hand is your backpack. Behind him, the padlocked gate is open.\n\n*choice\n\t#Run!\n\t\t*set relH %-20\n\t\t*set Respect %-20\n\t\t*set Secrecy %+10\n\t\t*goto run_from_hank\n\t#\"What are you doing with my friend's bike, old man?!\"\n\t\t*set relH %-10\n\t\t*set Respect %-10\n\t\t*set Secrecy %-20\n\t\t*goto accuse_hank\n\t#\"Please don't yell at me, sir. I'm just a poor, lost little child.\"\n\t\t*set relH %+20\n\t\t*set Secrecy %+10\n\t\t*set Respect %+10\t\t\n\t\t*set lie_count +1\n\t\t*goto lie_to_hank\n\n*label run_from_hank\nYou sprint toward the nearest exit, the open gate on the other side of Hank. Hank looks unwieldy, but he is surprisingly fast for such a big guy. As you try to circle around him, he dashes to the side and grabs you by the arm.\n\n\"Come with me, young ${youth}!\" Hank snaps. \"It's over. You're caught. I am going to call your parents!\"\n\n*goto hank_yanks\n\n*label accuse_hank\n\"Ha ha!\" says Hank. \"Where do you get off accusing me when you are the one behind my private fence?\"\n\nOh. So he noticed that.\n\n\"Come on, kid. You're caught,\" says Hank. \"I am going to call your parents!\"\n\n*goto hank_yanks\n\n*label lie_to_hank\n\"Lost, huh?\" says Hank. \"I'm supposed to believe that you lost your way onto the other side of this fence? I know you came from over there. You left your backpack.\"\n\n\"Oh, you found it!\" you cry, putting out your hands. \"I thought I'd lost it forever! You see, I was just trying to find my way back from the library, and I got so turned around, and I saw this fence, and I thought maybe I had to go on the other side of it, but I was so confused….\"\n\nHank seems confused, too. \"Well—you didn't. Never climb a random fence. This is my property, and you're trespassing.\" \n\n\"I am?\" You widen your eyes.\n\n\"Come on,\" says Hank. \"Lost or not, you shouldn't be here. I am going to call your parents!\"\n\n*goto hank_yanks\n\n*label hank_yanks\n*page_break\nHank yanks on your arm, pulling you along. He leads you across the alley and through the double doors marked \"Staff Only.\" \n\nYou find yourself inside the garage. Two cars are parked right there on the concrete floor. The hoods are open, and men and women in jumpsuits are bent over the complicated-looking metal innards. \n\nYou are surprised to see a small girl with pigtails standing in the middle of all this, clutching a teddy bear. She's watching a man with a long beard work on a small pink bicycle. She looks up as Hank pulls you by.\n\n\"Daddy!\" she cries. \"And…who are you?\"\n\n*fake_choice\n\t#\"Hi, little girl! I'm ${Name}! Would you like to play with me?\"\n\t\t*set Respect %+20\n\t\t*set relH %+20\n\t\tHank glances at you with something like a smile, and his grip loosens on your arm. \n\n\t\t\"Yay!\" says the little girl, clapping her hands. \"I love playing. Daddy, let's play with the ${detectivetype}.\" \n\n\t\t*goto sorry_annabelle\n\n\t#\"Help! I'm being kidnapped! Call the police!\"\n\t\t*set Secrecy %-20\n\t\t*set relH %-10\n\t\t\"Oh, hush,\" Hank grumbles.\n\n\t\tThe little girl giggles. \"Okay. That's a fun game. Let's play Kidnappers. Will you play Kidnappers with us, Daddy?\"\n\n\t\t*goto sorry_annabelle \n\n\t#\"My name is Fudge McGillicuddy, and I am a wealthy industrialist. My, this garage looks like a fine investment!\"\n\t\t*set Secrecy %+20\n\t\t*set Greed %+10\n\t\t*set lie_count +1\n\t\tYou pretend to smoke an imaginary pipe, which is difficult when you are being dragged by one arm. \n\n\t\tThe little girl giggles. \"Okay. That's a fun game. Let's play Wealthy Indut—Induts—Industarists. Will you play Wealthy Indussarists with us, Daddy?\"\n\n\t\t*goto sorry_annabelle \t\n\n\t#\"I'm your worst nightmare, little girl.\"\n\t\t*set Respect %-20\n\t\t*set relH %-20\n\t\tYou bare your teeth. \n\n\t\t\"None of that!\" Hank barks, tightening his grip on your arm. \n\n\t\tBut the little girl just giggles. \"Okay. That's a fun game. Let's play Vampires. Will you play Vampires with us, Daddy?\"\n\n\t\t*goto sorry_annabelle\n\n*label sorry_annabelle\n\"I'm sorry, Annabelle,\" says Hank tenderly, patting the little girl on the head with his free hand. \"I have to deal with this trespasser.\"\n\n\"You always have to deal with a trespasser!\" Annabelle's chin trembles.\n\n\"Don't cry, sweetie!\" Hank looks panicked. \"Shel, will you give Annabelle a Choco-Lolly while I deal with this?\"\n\n\"Ooh, a Choco-Lolly!\" Annabelle immediately cheers up. \n\nOne of the mechanics wipes the oil off her hands and leads Annabelle to a vending machine. \n\nHank leads you across the floor and through a door marked \"Henry Appleby.\"\n*goto hanks_office\n\n*label hanks_office\nHank's office is a small room with a messy desk, covered in papers and car parts. Behind the desk, there are about a dozen crayon drawings signed \"Annabelle.\" Most of them are of kitties.\n\nHank sits behind his desk and orders, \"Sit down.\"\n\nYou move a stack of file folders from a metal chair and sit.\n\n\"Well,\" says Hank, \"first things first. What's your name?\" \n\n*temp stayed_silent false\n*choice\n\t#Give a fake name.\n\t\t*set lie_count +1\n\t\t*set Secrecy %+30\n\t\t*set Respect %-30\n\t\t*set Greed %+10\n\t\t*gosub get_hank_alias\n\t\t\"${Hank_Alias}, huh? Let's just see.\" \n\n\t\t*goto hank_checks_bag\n\t#Give my real name.\n\t\t*set Secrecy %-30\n\t\t*set Respect %+30\n\t\t*set Greed %-10\n\t\t\"${Name}, huh? Let's just see.\"\n\n\t\t*goto hank_checks_bag\n\t#Remain silent.\n\t\t*set Secrecy %+30\n\t\t*set Respect %-10\n\t\t*set Greed %-10\n\t\t*set stayed_silent true\n\t\t\"Not talking, huh? Let's just see.\"\n\n\t\t*goto hank_checks_bag\n\n*label hank_checks_bag\nHank picks up your backpack and goes through the front pocket. No! All your stuff is in there! Your detective notebook, your library books…\n\n*fake_choice\n\t#\"Hey! That's mine!\"\n\t\t*set relH %-10\n\t\t*set Respect %-10\n\t\t*set Greed %+10\n\t\tYou make a grab for the backpack, but Hank holds it away. \"Easy, tiger, before I have you restrained!\"\n\t#\"Hey! That's not fair!\"\n\t\t*set relH %-10\n\t\t*set Respect %-10\n\t\t*set Greed %-10\n\t\t\"Don't sass me, Smart Mouth,\" Hank snaps.\n\t#\"Please, please, please, can I have my backpack back? Pretty please? With cherries on top?\"\n\t\t*set relH %+20\n\t\tHank glances at you and seems to soften. \"You're really quite a young kid, aren't you? Let me tell you something. Climbing fences is wrong. Okay?\"\n*comment endif\n\nHank seems to find what he's looking for in the front pocket. It's your library card! Of course, your name is on that. He glances at it.\n\n*if(hank_alias != \"\")\n\t*set relH %-20\n\t\"${Name}. You lied to me. I'm hurt.\" \n\t*goto hank_returns_bag\n*elseif(stayed_silent)\n\t\"${Name}. Now we're getting somewhere.\"\n\t*goto hank_returns_bag\n*elseif(Secrecy \u003c 50)\n\t*set relH %+20\n\t\"${Name}. All right then. Just checking.\"\n\t*goto hank_returns_bag\n*else\n\t*set relH %+20\n\t\"${Name}. So you told the truth. I'm shocked.\"\n\t*goto hank_returns_bag\n\n*label hank_returns_bag\nHank drops the library card back into its pocket and shoves the bag across the desk at you. \n*goto negotiate_with_hank\n\n*label negotiate_with_hank\n\"Now the way I see it, there are only three ways we can go here,\" says Hank. \"I can call your parents. Or I can call the police. Or you can come clean to me. What were you doing nosing around my private property?\" \n\n*label negotiate_choice\n*choice\n\t*disable_reuse #\"I was looking for a friend's bike.\"\n\t\t*set Secrecy %-20\n\t\t*goto friends_bike\n\t*disable_reuse #\"I got lost! I was so scared!\"\n\t\t*set lie_count +1\n\t\t*set Secrecy %+20\n\t\t*set relH %+20\n\t\t*goto i_was_lost\n\t*disable_reuse #\"You can't do anything to me, old man. I know my rights.\"\n\t\t*set Respect %-20\n\t\t*set relH %-20\n\t\t\"You want to test me, kid?\" Hank asks menacingly.\n\t\t*goto call_hanks_bluff\n\n*label i_was_lost\n*if(relH > 50)\n\tHank gives you a sympathetic look. \"Poor kid,\" he mutters. \"Here, I'll give you directions. Where are you trying to go?\"\n\n\tYou ask for directions to the library. It's the first place you can think of. Hank provides them.\n\n\t\"Anything else I can do for you while you're here?\" he asks.\n\n\t*goto civil_conversation_choice\n*elseif(relH > 30)\n\tHank looks suspicious. \"Lost, huh? On the other side of my fence? Try again.\"\n\n\t*goto negotiate_choice\n*else\n\t\"Bull!\" Hank shoots back.\n\t*goto call_hanks_bluff\n\n*label call_hanks_bluff\nHe lifts the phone off the dock by the receipt book and dials three numbers. \"Hello, police?\"\n\n*choice\n\t#Run!\n\t\t*set Respect %-30\n\t\t*set Greed %+20\n\t\tYou bolt! You run out the door and down the street as fast your legs will take you. You're halfway home before you look over your shoulder. Good, Hank didn't follow you. That was a close one!\n\t\t*finish\n\t#No, stay. \n\t\t*set Respect %+30\n\t\t*set Greed %-20\n\t\t*goto see_how_police_plays_out\n\t\tYou want to see how this plays out.\n*comment endif\n\n*label friends_bike\n\"Why do you think I have your friend's bike?\" Hank wants to know. \n\n\"Well, it was stolen….\" you begin.\n\n\"You think I'm a thief?\" says Hank. \"You think I go around stealing kids' bikes? I run a respectable business here.\"\n\n*fake_choice\n\t#\"It's not personal. I have to explore all avenues.\"\n\t\t*set relH %-10\n\t\t*set Greed %-10\n\t\t\"Ha! You're a real cool customer,\" says Hank. \"A regular little bloodhound, aren't you?\"\t\t\n\n\t\t\"I try,\" you say.\n\t\t\n\t#\"I don't know what you do in your spare time.\"\n\t\t*set relH %-20\n\t\t*set Respect %-20\t\n\t\t\"You've got a mouth on you!\" says Hank. \"Don't respect your elders much, do you?\"\n\n\t\t\"They don't tend to respect me,\" you say.\t\n\n\t#\"My friend is just really, really upset about the bike. Did I mention it's my best friend?\"\n\t\t*set relH %+20\n\t\tHank sighs. \"Your friend is sending you to do the dirty work, huh?\"\n\n\t\t\"A.J. doesn't even know I'm here,\" you say. \"If I don't find the bike, no big deal, but if I do, imagine how great that would be!\"\n\t\t\n\t#Burst into tears.\n\t\t*set relH %+50\n\t\t\"Hey, hey!\" says Hank gently. \"Don't cry. It's okay, honey.\" \n\t\t\n\t\tYou sniffle. Hank hands you a grubby tissue.\n\n*comment endif\n\n*if(relH > 45)\n\t\"Tell me what your friend's bike looked like,\" says Hank.\n\t\n\t*choice\n\t\t#\"It's brown and rusty. An original Schwizz.\"\n\t\t\t*goto hank_explains_gbu\n\t\t#\"It's red with a lightning bolt down the side.\"\n\t\t\t*goto ask_hank_rl\n*else\n\t*goto hank_sends_you_on_your_way\n\t\n*label hank_sends_you_on_your_way\n\"I'm afraid I can't help you,\" says Hank. \"I don't deal in stolen merchandise. I only hope I can say the same for you. Now go home before I call the police for real. If I catch you sniffing around my property again, you're toast!\"\n\nYou grab your backpack and hurry out, glad to have escaped with your life. \n\n*finish\n\n*label ask_hank_rl\nHank hesitates. You think you see a flicker of recognition in his eyes.\n\nBut then he shakes his head. \"I don't remember seeing anything like that.\" \n\n\"Are you sure?\" you press.\n\n\"Of course I'm sure,\" says Hank coldly. \"Bikes are my business. Bikes and cars.\"\n\n*goto hank_shows_you_the_door\n\n*label hank_shows_you_the_receipt\t\n*if(seen_receipt)\n\tYou can't make any more of it than before. You're pretty sure the initials are D.S., but the rest of it is just squiggles.\n\t*return\n*else\n\tYou eagerly lean forward to read the receipt off the pad.\n\t*gosub the_receipt\n\t*return\n\n*label hank_explains_gbu\n*gosub hank_describes_darren \n\n*if(relH >= 65)\n\tHank glances down at the receipt book on the desk and flips back a page. \"Hmm. I can't read that chicken scratch, can you?\" He shows you the receipt. \n\t*gosub hank_shows_you_the_receipt\n\n\"I guess I just wonder how this blond-haired man came to have A.J.'s bike,\" you say.\n\t\n\"Maybe your friend gave it or sold it to him,\" Hank suggests.\n\n\"Or maybe the blond-haired man stole it,\" you say.\n\nHank shrugs. \"I'm sorry for your friend if that happened, but frankly, it's not my problem.\"\n\n*fake_choice\n\t#\"That's not fair. If you're buying stolen merchandise, you are part of the problem.\"\n\t\t*set Greed %-20\n\t\t*set Secrecy %-10\n\t\t*set Respect %-30\n\t\t*set relH %-20\n\t#\"You're right. I'm just so sad for A.J.\"\n\t\t*set Respect %+20\n\t\t*set Greed %+10\n\t\t*set relH %+20\n\t\tYou gaze sadly down at your folded hands in your lap and bite your lip.\n\t#\"This problem can go away right now. You didn't really want that junky old bike anyway, did you?\"\n\t\t*set Greed %+30\n\t\t*set Secrecy %+10\n\t\t*set Respect %-20\n\t\t*set blackmail_attempts +1\n\n*goto get_bike_or_not\n\n*label get_bike_or_not\n*if(relH > 70)\n\t\"I'm gonna regret this,\" Hank grits. \"But what the hey? It's instant karma, right? Hardly anything salvageable on that bike anyway. You want it? You got it.\" \n\t\n\tYou look up. \"Really? You mean it?\"\n\t\n\t\"Sure, why not? You're a good friend, kid. And just maybe a good swindler, Heaven help me.\"\n\t\n\tYou can hardly believe it, but ten minutes later, you're riding home unsteadily on the rusty, creaking Great Brown Ugly. It's the worst bike you've ever ridden, but at this moment, you couldn't be happier!\n\t\n\t*set who_has_gbu \"you\"\n\t*finish\n*else\n\t\"Anybody could come snooping around here and tell me that one of my bikes was stolen from a friend,\" Hank points out. \"I can't go around giving out bikes on the strength of a kid's word.\" \n\n\t\"What if I could prove it?\" you ask. \"Would you give back the Great—I mean, the bike, if I could prove that it belonged to my friend?\"\n\n\t*if(relH > 45)\n\t\t\"If you're willing to go to all that work for a rusty old thing like that? Sure,\" says Hank. \"I'll keep it intact for three days. After that, I'm cannibalizing it for parts. If you can prove your case by then, I'll give your friend the bike back. Deal?\"\n\n\t\tYou nod. \"Deal.\" You hold out your hand.\n\n\t\tHank grins as he shakes your hand. \"Okay, kid, you're all right. You've got spunk. Now go home. It's getting late. I won't call your parents this time, but if I catch you nosing around here again, all bets are off, you get me?\"\n\t\t\n\t\tYou nod eagerly.\n\n\t\tThirty seconds later, you're striding confidently down the street toward home, excited about the deal.\n\t\t*set deal_with_hank true\n\t\t*finish\n\t*else\n\t\tHank seems uninterested. \"You can do what you want, but don't count on anything. You've taken up enough of my time. I need to get back to work. Go on home, before I call the police on you, and if I catch you nosing around here again, you're dead. Got it? Now scat.\"\n\n\t\tThirty seconds later, you find yourself out on the street. Oh, well, Hank didn't say no to the deal. He'll be swayed by good enough evidence, you're sure. You make your way toward your own neighborhood.\n\n\t\t*set deal_with_hank true\n\t\t*finish\n\n*label chat_with_hank\nYou round the block to the front of the shop. The sign on the front door says \"Open,\" so you stroll right in.\n\n*label reception_area\n*gosub description_reception\n*choice\n\t#Ring bell for assistance.\n\t\t*set Respect %+20\n\t\t*goto ring_bell\n\t#Look through the papers on the desk.\n\t\t*set Respect %-20\n\t\t*goto snoop_reception\n\t#Call A.J. on the phone.\n\t\t*goto call_aj\n\t#Try to open the cash register.\n\t\t*set Respect %-20\n\t\t*goto cash_register\n\n*label description_reception\nThe reception area is a surprisingly small room. There's barely enough room to stand between the glass door that faces the street and the double doors marked \"Staff.\" Behind the double doors, you can hear the noise of the garage's drills and machinery.\n\nNobody is manning the reception desk. A small plaque reads \"Ring bell for assistance.\" On the desk is a cash register, a bell, a receipt book, a phone, and some random papers. On the wall behind the desk are several photos of a six-year-old girl with an angelic, gap-toothed smile.\n\n*return\n\n*label call_aj\nYou quickly dial A.J.'s number. A.J. answers. \"Hey, ${Name}!\" says A.J. cheerfully.\n\n\"Guess where I am,\" you say.\n\n\"Mount Rushmore.\"\n\n\"No. You'll never guess.\"\n\n\"Valhalla.\"\n\n\"No! Want me to just tell you?\"\n\n\"Hank's Garage.\"\n\nYou blink. \"How did you know?\"\n\n\"Wait—what?\" A.J. sounds alarmed. \"You can't be. Why are you there? Go home.\"\n\n\"Huh?\" you say.\n\n\"That place—it's no good,\" says A.J. urgently. \"Go home right now.\"\n*set aj_thinks_hanks_is_dangerous true\n\n\"Excuse me!\" booms a voice.\n\nYou look over your shoulder. \n\nA burly man in a gray jumpsuit stands behind you, his arms crossed. The name patch on his uniform reads \"Hank.\"\n*set relH %-20\n\n\"What are you doing using my phone?\" he demands.\n\nYou hang up quickly!\n\n*page_break\n*goto civil_conversation_hank\n\n*label cash_register\nYou examine the cash register, looking for a way to open the little drawer. You decide the most likely button is the one that says \"Cash Out.\" But when you hit it, nothing happens. You notice that the drawer has a lock on it, so it probably won't just pop open. It makes sense that they lock the place where the money is. But the security here isn't perfect: There is also a ten-dollar bill just sitting out on the desk.\n\n*if(Greed > 50)\n\tHumming to yourself, you pocket the money.\n\t*set Money +10\n\n\t*goto post_cash_register\n*else\n\t*goto to_steal_or_not_to_steal\n\n*label to_steal_or_not_to_steal\n*choice\n\t#Take it. That's ten free dollars! Cha-ching!\n\t\tYou pocket the money.\n\t\t*set Money +10\n\t\t*set Greed %+20\n\n\t\t*goto post_cash_register\n\t#Leave it alone. I'm no thief.\n\t\tYou ignore the money. You would never take anything that doesn't belong to you. \n\t\t*set Greed %-20\n\t\t*set Respect %+10\n\n\t\t*goto post_cash_register\n\t#Leave it alone. Missing money would probably tip someone off that I snooped.\n\t\tYou ignore the money. You prefer to come and go like a shadow, disturbing nothing.\n\t\t*set Greed %-10\n\t\t*set Secrecy %+20\n\n\t\t*goto post_cash_register\t\n\n*label post_cash_register\nYou hear noise on the other side of the door, and you jump away from the cash register just in time! For good measure, you hit the bell. The door immediately opens, and a burly man in a gray jumpsuit appears. The name patch on his uniform reads \"Hank.\"\n\n\"I thought I heard someone moving around out here,\" he says. \"What can I do you for?\" \n\n*goto civil_conversation_hank\n\n*label ring_bell\nYou ring the bell and wait patiently. After a moment, the door behind the desk opens, and a burly man in a gray jumpsuit appears. The name patch on his uniform reads \"Hank.\"\n\n\"May I help you?\" says Hank pleasantly.\n*set relH %+50\n\n*goto civil_conversation_hank\n\n*label snoop_reception\nYou rifle through the papers on the reception desk. There's a calendar indicating the time that different repairs are due. There's a purchase order for a gross of bolts. There's a receipt book flipped to a page in the middle. The pages underneath seem to be blank and alternate white and yellow pages: white Store Copy, yellow Customer Copy. The top-facing receipt and the ones before it have been written on, and the yellow carbon copies have been torn out.\n\nThe top receipt has today's date, September 27. \n\n*gosub first_receipt\n\nA high-pitched whirring noise starts up behind you, sounding very close. You glance over your shoulder, but the double doors are still shut.\n\n*label snoop_choice\n*choice\n\t#This is fascinating. Look at more receipts.\n\t\t*goto second_receipt\n\t#I'm getting nervous. Get out from behind the desk and ring the bell like a legit customer.\n\t\t*goto ring_bell\n\n*label first_receipt\n*temp seen_first_receipt true\n*line_break\nReceipt for Services Rendered\n*line_break \nDate: September 27\n*line_break \nTime: 4:54 PM\n*line_break \nMuffler replacement\n*line_break \nNew muffler, Honda…$120.00\n*line_break \nLabor: 2 hr @ $50…$100.00\n*line_break \nSubtotal…$220.00\n*line_break \nTax @ 10%…$22.00\n*line_break \nTotal due…$242.00\n*line_break \nPayment received…$286.00 (Visa, last four digits: 5434)\n*line_break \nTip…$44.00\n*line_break \nCustomer change…$0.00 \n*line_break \nCustomer Signature: Bill Marchand\n\n*return\n\n*label second_receipt\nThe next receipt is also from today. \n\n*gosub the_receipt\n\n\"Hey!\" snaps a voice. \"Excuse me. Who are you and what are you doing in my things?\"\n*set relH %-30\n\nYou jump and look around. You were so wrapped up that you didn't notice the door open behind you. A burly man in a jumpsuit is leaning in the doorway, his arms crossed. His craggy face resembles the cartoon on the logo, and the name patch on his uniform reads \"Hank.\" You surmise that this is Mr. Henry Appleby himself.\n\nYou step away from the receipts.\n\n*goto civil_conversation_hank\n\n*label civil_conversation_hank\nBefore either of you has a chance to speak, a little girl in pigtails bursts into the room and attaches herself to Hank's legs.\n\"Daddy, I want a snack!\" she shouts.\n\n\"Annabelle, pumpkin, I have a customer,\" says Hank.\n\n\"Pleeeease?\" The little girl's lower lip begins to tremble.\n\n\"Oh, all right,\" Hank mutters gruffly. He reaches into his pocket and pulls out a grubby dollar bill, which he hands to the little girl. \"Go and ask Shel to give you a Choco-Lolly from the vending machine. Tell her I said it was okay.\" \n\n\"Yes, Daddy!\" Annabelle agrees cheerfully. She disappears back into the depths of the garage.\n\n*if(relH > 50)\n\t\"Now then,\" says Hank. \"How may I help you?\"\n\t*goto civil_conversation_choice\n*else\n\tHank watches the girl leave with a smile on his face, but his smile fades when he turns to you. \"What do you want?\"\n\t*goto civil_conversation_choice\n\n*label civil_conversation_choice\n*choice\n\t*if(seen_receipt)\n\t\t*disable_reuse #\"This receipt matches the description of my friend's bike, but this is not ${his} signature! Explain!\"\n\t\t\t*set Secrecy %-20\n\t\t\t*set relH %-20\n\t\t\t\"What are you doing snooping in my receipts, you little skunk?\" Hank demands.\n\t\t\t\n\t\t\tYou evade the question. \"This description matches my friend's bike exactly, down to the 'Schwizz.' And I know ${he} didn't sell it.\"\n\t\t\t*goto hank_defensive\n\t*else\n\t\t*disable_reuse #\"One of your bikes in the back? It belongs to my friend. I believe it was stolen!\" \n\t\t\t*set relH %-20\n\t\t\t*set Secrecy %-20\n\t\t\t*goto hank_defensive\n\t*disable_reuse #\"Have you seen a brown bike, from the brand 'Schwizz'?\"\n\t\t*goto inquire_about_gbu\n\t*disable_reuse #\"Have you seen a red bike with a lightning bolt down the side?\"\n\t\t*goto inquire_about_rl\n\t*disable_reuse #\"Out of curiosity, do you buy used bikes?\"\n\t\t*goto ask_bike_buyer\n\t*if(posed_bike_buyer = false)\n\t\t*disable_reuse #\"I'm in the market for a used bike. Can I see what you have?\"\n\t\t\t*set relH %+30\n\t\t\t*goto pose_bike_buyer\n\n*label the_receipt\n*if not(seen_receipt)\n\t*set seen_receipt true\n\tReceipt for Products Purchased\n\t*line_break \n\tDATE: September 27\n\t*line_break \n\tTIME: 4:22 PM\n\t*line_break \n\tOne (1) used bicycle, brand Schwizz (??), color unknown (brown?)\n\t*line_break \n\tExtensive frame rust, general wear, cracks in seat/handles, permanent mildew damage\n\t*line_break \n\tCondition: POOR\n\t*line_break \n\tPayment rendered…$10.00\n\t\n\tYou look at the signatures on the bottom of the receipt. The buyer's signature is in fancy cursive, but you can just make out the name Henry Appleby. This must be Hank, the owner of the shop. The seller's signature is unreadable. The first letter might be a D or an O. The last letter might be an S or another D. The rest is just a scribble.\n\n*return\n\n*label inquire_about_gbu\nHank looks surprised. \"That's an oddly specific request. I've only seen a bike like that once or twice. Vintage, to say the least. In the market for something real budget-friendly, huh?\" \n\n*choice\n\t*if(posed_bike_buyer = false)\n\t\t#\"Yes. I am looking for a budget-friendly used bicycle.\" \n\t\t\t*set Secrecy %+10\n\t\t\t*goto pose_bike_buyer\n\t*if(posed_bike_buyer = true)\n\t\t#\"Yes. Exactly. Since, obviously, I can't afford anything in the showroom.\"\n\t\t\t*set Secrecy %+10\n\t\t\t*goto no_more_used_bikes\n\t#\"You misunderstand. I am looking for a particular bike. I believe it was stolen!\"\n\t\t*set Secrecy %-10\n\t\t*set relH %-10\n\t\t*goto hank_defensive\n\n*label no_more_used_bikes\n\"We do sometimes acquire fixer-uppers, but we don't sell them as is. Every model we sell, used or new, must meet our exacting standards for quality and safety,\" Hank explains. \"You've seen everything I have ready for sale right now. Maybe if you come back in a few weeks, we'll have new merchandise. Anything else I can do for you in the meantime?\"\n\n*goto civil_conversation_choice\n\t\n*label inquire_about_rl\t\n\"My friend's bike was stolen last week—a red ten-speed with a lightning bolt down the side,\" you explain. \"I noticed you have some red bikes under a tarp in back and…\"\n\n\"A lot of bikes are red!\" Hank cuts in. \n*goto hank_defensive\n\n*label hank_defensive\n\"Just what are you accusing me of? I don't buy stolen merchandise!\"\n\n*choice\n\t#\"Whoa, easy. I'm sure you don't mean to, but maybe there was a mix-up.\"\n\t\t*set relH %+10\n\t\t*set Respect %+20\n\t\t*set Greed %+10\n\t\t\"Even if there was, it's not my problem,\" says Hank staunchly. \n\t\t*goto hank_relationship_ifthen\n\t#\"That's exactly what a thief would say.\"\n\t\t*set relH %-30\n\t\t*set Respect %-20\n\t\t*set Greed %-20 \n\t\t\"You're trying my patience, kid!\" Hank rubs his temples.\n\t\t*goto hank_relationship_ifthen\n\t#\"Look, it doesn't matter to me. I won't tell anyone. I just want my friend's bike back.\"\n\t\t*set relH %-10\n\t\t*set Greed %+20\n\t\t*set Secrecy %+20\n\t\t\"I told you, no stolen bikes here,\" says Hank staunchly.\n\t\t*goto hank_relationship_ifthen\n\n\t#Burst into tears.\n\t\t*set relH %+40\n\t\t\"Whoa, whoa, there. Uh, here.\" Hank hands you a grubby tissue. You blow your nose with a loud honk.\n\t\t*goto hank_relationship_ifthen\n\n*label hank_relationship_ifthen\n*temp want_tries 0\n*if(relH > 75)\n\t\"Look, you're a nice kid, and I want to help you, but you have to help me out here. What is it you want?\"\n\t*temp max_want_tries 6\n\t*goto what_do_you_want_from_hank\n*elseif(relH > 50)\n\t\"You're starting to be a pain in my butt. You can ask for one thing, but then you have to get out of here.\"\n\t*temp max_want_tries 4\n\t*goto what_do_you_want_from_hank\n*elseif(relH > 25)\n\t\"Just what do you want from me, anyway, you little terror?\" \n\t*temp max_want_tries 2\n\t*goto what_do_you_want_from_hank \n*else\n\t*goto out_of_patience\n\n*label out_of_patience\n\"That's it!\" Hank rises from his chair. \"I'm out of patience. Get, get, get.\" He ushers you to the door.\n\nThat went well, you think as you skip home.\n*finish\n\n*label what_do_you_want_from_hank\n*if(want_tries > max_want_tries)\n\n\t*goto out_of_patience\n*if(want_tries > 0)\n\n\t\"Okay, now I want….\" \n\n*set want_tries +1\n\t\n*choice\n\t#\"I want the brown bike.\" \n\t\t*goto get_bike_or_not\n\t#\"I want to look under your tarp out back.\"\n\t\t*goto cant_be_done\n\t*if not(seen_first_receipt)\n\t\t#\"I want to review all your sales records for the last week.\"\n\t\t\t\"The last week? You've got to be kidding,\" says Hank. \"Here, just to appease you, you can see the most recent receipt.\" He flips open the receipt book and shows you the top page.\n\t\t\t\n\t\t\t*if not(seen_receipt)\n\t\t\t\tHere's what it says:\n\t\t\t\t\n\t\t\t\t*gosub first_receipt\n\t\t\t\tWell, that was remarkably unhelpful.\n\n\t\t\t\t*set Hank_showed_first_receipt true\n\t\t\t\t*goto what_do_you_want_from_hank\n\t\t\t*else\n\t\t\t\tYou've already seen that one.\n\t\t\t\t\n\t\t\t\t*set Hank_showed_first_receipt true\n\t\t\t\t*goto what_do_you_want_from_hank\n\t*elseif(Hank_showed_first_receipt) and (seen_receipt = false)\n\t\t#\"Can I see one more receipt? Just one more?\"\n\t\t\t\"Ugh, fine!\" Hank sighs. \"One more, if that will shut you up.\" He flips back one page on the receipt book.\n\n\t\t\t*gosub hank_shows_you_the_receipt\n\t\t\t*goto what_do_you_want_from_hank\n\t*if not(know_description_gbu_seller)\n\t\t*disable_reuse #\"I want more information about your purchase of the brown bike.\"\n\t\t\t*goto hank_explains_gbu\n\t*if(bikeYouWant != \"none\")\n\t\t*disable_reuse #\"I want the ${bikeYouWant} bike for free.\"\n\t\t\t*set Greed %+20\n\t\t\t*goto cant_be_done\n\t*else\n\t\t*disable_reuse #\"I want a brand-new bike, just for me.\"\n\t\t\t*set Greed %+20\n\t\t\t*goto cant_be_done \n\t*disable_reuse #\"I want a Choco-Lolly.\"\n\t\t*set Greed %+5\n\t\t\"Uh…really? That's all you want? Okay,\" says Hank. \"That I can do. Actually, I think I have one here.\" He rummages in a drawer, then hands you a foil-wrapped chocolate ball on a stick. \n\n\t\t*goto hank_shows_you_the_door\n\n*label cant_be_done\n*if(relH > 75)\n\tHank shakes his head. \"Sorry, kid, but I can't do that. Anything else?\"\n\n\t*goto what_do_you_want_from_hank\n*elseif(relH > 50)\n\tHank rolls his eyes. \"Not gonna happen. Try again.\"\n\n\t*goto what_do_you_want_from_hank\n*else\n\t\"Ha! Dream on,\" Hank guffaws. \"Are you done yet?\" \n\n\t*goto what_do_you_want_from_hank\n\n*label ask_bike_buyer\n\"Sure, I buy used bikes,\" says Hank. He narrows his eyes. \"But not from children like you. Children are little thieves. I learned that early on. If a child wants to sell me a bike, dollars to doughnuts, it's stolen from one of his thieving little friends. Or he's selling it without his parents' permission. So now I accept sales only from adults. If a child wants to sell me his bike, he needs to be accompanied by a parent or guardian.\" \n\n\"Okay,\" you say. \"Do you do many used bike sales?\"\n\n\"A fair number.\"\n\n\"Every day? Like today?\"\n\nHank eyes you suspiciously. \"I may have bought one or two pieces today. Why do you ask?\"\n\n*choice\n\t#\"I'm looking for a friend's bike.\"\n\t\t*set Secrecy %-20\n\t\t*goto friends_bike\n\t*if(posed_bike_buyer = false)\n\t\t#\"I'm in the market for a used bike.\"\n\t\t\t*set Secrecy %+10\n\t\t\t*goto pose_bike_buyer\n\t*if(posed_bike_buyer = true)\n\t\t#\"I was hoping you had some used bikes cheaper than the ones in the showroom.\"\n\t\t\t*set Secrecy %+10\n\t\t\t*goto no_more_used_bikes\n\t#\"It's for a school project.\"\n\t\t*set Secrecy %+20\n\t\t*set lie_count +1\n\t\t*goto school_project\n\n*label school_project\n\"I'm supposed to research a particular product and the ways it can be bought and sold,\" you bluff. \"Like, what are the options for buying it new and used, selling or recycling or trading it in. I picked bicycles. So I'm looking to interview someone who buys and sells used bikes.\" \n\n*if(relH > 50)\n\t\"Interesting project,\" says Hank gruffly. \"What do you want to know?\"\n\t\n\t*goto a_particular_sale\n*else\n\t\"I don't have time for an interview,\" says Hank.\n\t\n\t*goto a_particular_sale\n\t\n*label a_particular_sale\n\"Well, maybe it would help if I limited it to a particular sale,\" you add. \"Like, what was the last bike you bought?\"\n\n\"It happened to be a useless pile of parts,\" says Hank. \"Good to cannibalize maybe, but it'll never make it to the showroom floor. Boring. Very boring.\" You can tell he's trying to get you to go away, but that sounds exactly like the Great Brown Ugly.\n\n\"Okay, walk me through that sale,\" you say. \"What happened? Someone walked in and said, 'I'd like to sell you a bike?'\"\n\n\"Pretty much.\"\n\n\"What else can you tell me about this seller?\" you ask. \"Like…what did he look like?\"\n\n\"How is that relevant to your project?\" Hank asks.\n\n\"Just trying to, um, get a mental picture.\"\n\n\"He was just a man. Tall. Blond. Pointy little beard.\"\n\nYou frown. That doesn't sound familiar. \"How old?\" you ask.\n\n\"About twenty. I don't buy from minors.\" \n*set know_description_gbu_seller true\n\nStrange. That doesn't sound like A.J. or anyone else you know.\n\n*goto hank_shows_you_the_door\n\n*label hank_shows_you_the_door\nThere's a clatter from the back room and the sound of a child wailing.\n\n\"If that's all, I have things to do. Good-bye,\" says Hank, ushering you hurriedly to the door.\n\nYou walk slowly back toward your neighborhood, thinking things over.\n\n*finish\n\n*label pose_bike_buyer\n*set posed_bike_buyer true\nTechnically, telling Hank you're in the market for a bike is not actually a lie. You would love a bike of your own. You'd be prepared to buy one, too, if only you had any money. \n\n\"Well, that's another story,\" says Hank. \"Come into the showroom.\"\n\nHe leads you through the door marked \"Showroom.\" The room is large, open, and sunny. The wall facing the street is entirely glass, so passersby can look in on the three antique cars that sit in the middle of the room. Along the side walls are displays of hubcaps, mirrors, and fuzzy dice. Five shiny bicycles are hitched to the back wall. \n\n\"Built or fixed up these beauties all in-house,\" Hank boasts, gesturing at the bikes.\n\nThe first thing you notice is that not one of the bikes is Red Lightning. There's no red one at all. But they are all beautiful. You gaze lovingly at their shiny, colorful frames, glistening chrome gears, and fat new tires. Which one do you like the best?\n\n*label bike_you_want_choice\n*fake_choice\n\t#The black mountain bike with all the red skulls. \n\t\t*set Respect %-10\n\t\t*set bikeYouWant \"black\"\n\t\t*set bikeCost 250\n\t\tGreat choice. The black bike is so cool! You'd be the terror of the neighborhood on that rocket. \n\t#The yellow one with the flowery basket and the streamers. \n\t\t*set Respect %+10\n\t\t*set bikeYouWant \"yellow\"\n\t\t*set bikeCost 175\n\t\tGreat choice. The yellow bike is so pretty and cheerful! \n\t#The top-of-the-line silver racing bike.\n\t\t*set Greed %+10\n\t\t*set bikeYouWant \"silver\"\n\t\t*set bikeCost 700\n\t\tGreat choice. It looks expensive!\n\t#The plain beige one. \n\t\t*set Secrecy %+10\n\t\t*set bikeCost 150\n\t\t*set bikeYouWant \"beige\"\n\t\tGreat choice. The beige bike looks like everyone else's—easy to blend into a crowd.\n\t#The clunky, out-of-fashion one painted in two clashing shades of avocado green.\n\t\t*set Greed %-10\n\t\t*set bikeYouWant \"green\"\n\t\t*set bikeCost 100\n\t\tGreat choice. Sure, the green-on-green bike is sort of ugly, but maybe with a little paint and love…. Hey, you've always rooted for the underdog.\n*comment endif\n\t\t\n\"Well?\" says Hank. \"See anything you like?\"\n\n\"How much for the ${bikeYouWant} bike?\" you ask.\n\nHank checks the price tag, which reads: $${bikeCost}\n\t\t\n\"Oh,\" you say. You check your pockets. You have $${Money}. \"Um. Got anything cheaper?\"\n\n\"As soon as our bikes are ready to sell, we put them out here,\" says Hank. \"This is what's available right now.\" \n\n\"What about bikes that aren't ready?\" you ask.\n\n\"Oh, sure. We've got a big pile of trashed bikes and parts in the back. But I couldn't sell you anything off the back lot. Some of those bikes are missing important parts. They haven't been tested for safety.\" Hank ushers you back toward the reception area, telling you, \"Don't worry, we're fixing up new bikes all the time. Come back later and we'll have a different selection. Anything else I can help you with while you're here?\"\n\n*goto civil_conversation_choice\n\n*label hank_describes_darren\n\"That old bike is a piece of work, huh? They don't make 'em like that anymore,\" says Hank. \"I mean, they make 'em better. A guy came in to sell that to me today. I don't think I'll be able to sell it, so I threw it on the pile to scavenge for parts. It belongs to your friend, huh? Maybe that's the guy who came in to sell it to me.\" \n\n*if(genA = \"girl\")\n\t\"Couldn't be. A.J. is a girl,\" you say.\n\t\n\t\"Ah,\" says Hank. \"No, it wasn't a girl.\" \n*comment endif\n\t\n\"Can you tell me more about this guy who sold you the bike?\" you ask. \"How old was he?\"\n\t\t\n\"He must have been around nineteen or twenty,\" says Hank. \"I don't remember exactly. I know he was over eighteen, because I don't buy from minors. Cuts down on underhanded sales.\"\n\n\"What did he look like?\" \n\n\"Tall, blond, with a little blond beard. Sort of a goatee.\"\n\t\t\n*set know_description_gbu_seller true\t\n\"Did you catch his name?\" you ask casually.\n\t\n\"I don't remember. David? Dunham? Something like that.\"\n*return\n\n*comment: Police Section\n*label see_how_police_plays_out\nFive minutes later, you're sitting politely in a plastic chair in the police station. One hand is handcuffed to the chair. Officer Barkley sits at her desk next to you. Your backpack lies on her desk. She uncaps a pen and writes \"Trespassing\" on her paperwork.\n\nHank wasn't bluffing!\n\n\"Name?\" says Officer Barkley.\n\n*choice\n\t#\"${Name}.\"\n\t\t*set Respect %+20\n\t\t*goto police_after_name\n\t#Give a fake name.\n\t\t*set Respect %-40\n\t\t*gosub get_police_alias\n\t\t*goto police_after_name\n\n*label police_after_name\nYou don't know why Officer Barkley even asked, because she immediately opens the pocket of your backpack and pulls out your wallet. She examines your library card and copies your name from that onto her paperwork. \n\nOfficer Barkley looks up something on her computer and then dials a number. \"Hello there. Is this ${Name}'s father? Great. I have your ${child} here.\"\n\nOh, no.\n\n*page_break\n\"I am very disappointed in you, ${Name}!\" your father tells you as you strap yourself into the passenger seat of the van. \"When I committed acts of civil disobedience as a young protester, I wasn't arrested more than three or four times. Now, here you're eleven, and \n*if(Respect \u003c= 25)\n\tthis is the third time I've had to bail you out in as many months!\"\n\t\n\t\"Can it, old man,\" you mutter.\n\t\n\t*goto dad_puzzles\n*else\n\tyou've already been brought in.\"\n\t\n\t\"Just precocious, I guess,\" you say.\n\t\n\t*goto dad_puzzles\n\t\n*label dad_puzzles\n\"I just don't understand what you thought you were doing,\" says Dad. \"Hank Appleby is a decent mechanic. I used him once or twice, before Kim Carver introduced me to Quick Fix Motors. He never struck me as shady. Why did you trespass on his lot?\"\n\n*choice\n\t#\"Dad, he has A.J.'s bike!\"\n\t\t*set relD %+20\n\t\t*set Secrecy %-20\n\t\t\"Are you sure?\" says Dad. \"Hank would never steal a kid's bike.\"\n\t\t\n\t\t\"Maybe not, but the thief could have sold it to him,\" you point out. \"And, yes, I'm sure. Who else has a Schwizz?\"\n\t\t\n\t\tDad nods, considering what you've said. \"This sounds like something we should talk to your mother about at home.\" \n\t\t*goto home_with_dad\n\t#\"I'm an urban explorer. Fences are suggestions.\" \n\t\t*set relD %+30\n\t\t*set Respect %-10\n\t\t*set Secrecy %+10\n\t\t\"Ha! You better get over that philosophy if you want to get along in this world,\" says Dad, but he seems slightly pleased. Like father, like ${child}.\n\t\t*goto home_with_dad\n\t#\"I was smoking, huffing, and tagging everything in sight.\"\n\t\t*set Secrecy %+20\n\t\t*set Respect %-20\n\t\t*set relD %+10\n\t\t*set lie_count +1\n\t\t\"Very funny, but you know, if you keep getting in trouble with the law, I'll start to believe it!\" says Dad.\n\t\t*goto home_with_dad\n\t#Sniffle. \"I was lost!\"\n\t\t*set lie_count +1\n\t\t*set Secrecy %+20\n\t\t*set relD %-5\n\t\t\"Don't give me the old doe eyes,\" says Dad. \"I know every trick in the book. You climbed a fence. You knew full well you weren't supposed to be there.\" \n\t\t*goto home_with_dad\n\n*label home_described\n*if not(been_home)\n\tSome people find your house foreboding, with its towers and spires, and the bramble bushes that reach out their thorny tendrils through the gaps in the wrought-iron fence. To you, it's home. You know that the yard is overgrown because neither of your parents, a scientist and a musician, has the time to mow it. Besides, your dad says an untended meadow is a great source of free edible flowers. You know that the house is in a state of disrepair because your parents don't have a lot of money and it was cheaper to buy a fixer-upper. They always say they'll fix it up, but they lose interest in home improvement projects quickly. That's also why the house is half brown and half blue. \n\t\n\tYou close the creaky gate behind you and walk up the stone path, through the tall grass, past your favorite gnarly old chestnut tree, and skip up the rickety porch steps. \n\t*set been_home true\n*return\t\t\n\t\t\t\n*label home_with_dad\n*set grounded true\nYour dad turns from suburban streets onto the turnoff to your house. The van rumbles along the winding road that becomes gravel and then dirt as it reaches the top of the hill. \n\n*gosub home_described\n\nYou follow Dad inside. Your mom is working on her laptop in the front room. \n\n\"Well, they let ${Name} off with a warning,\" says Dad.\n\nMom looks up her from work. \"Oh, good. You wouldn't want a black mark on your permanent record. My goodness, ${Name}, what are we going to do with you?\"\n\n\"It goes without saying that you're grounded,\" says Dad. \"For at least a week!\"\n\n*choice\n\t#\"Fine! I'm going to my room!\"\n\t\t*set Respect %-10\n\t\t\"That's the one place you can go,\" Dad says cheerfully.\n\t\t\n\t\tYou stomp upstairs to your room.\n\t\t\n\t\t*goto go_to_your_room\n\t#\"Forget you! I'm outie.\" \n\t\t*set Respect %-40\n\t\t*set relD %-20\n\t\t*set relM %-20\n\t\tYou whirl around and run out the door, slamming it behind you. Your parents call after you, but you keep running and running down the hill.\n\t\t\t\t\n\t\t*finish\n\t#\"That's fair.\"\n\t\t*set Respect %+10\n\t\t\"I'll just go to my room and think about what I did,\" you offer.\n\n\t\t\"See to it that you do,\" says Dad.\n\n\t\tYou scamper upstairs to your room.\n\n\t\t*goto go_to_your_room\n\t#\"A week? How about two days?\"\n\t\t*set Greed %+10\n\t\t\"What? No. This is not a negotiation,\" says Dad.\n\n\t\t\"Three days,\" you wheedle. \"Three days and I'll throw in no TV.\"\n\n\t\t\"No TV?\" Dad raises his eyebrows. \"What about Family Movie Night?\"\n\n\t\t\"Except for Family Movie Night,\" you concede. \"Okay, so we have a deal? Should I just go to my room now and think about what I've done?\"\n\n\t\t\"Um, okay,\" says Dad, dazed.\n\n\t\t\"Pleasure doing business with you!\" you wave and make your escape. \n\t\t\n\t\t\"How does ${Name} do that?\" you hear your mom murmur as you scamper upstairs to your room.\n\n\t\t*goto go_to_your_room\n\n*label go_to_your_room\n*gosub your_room\n\nThere is only one thing to do if you want to continue this investigation. Escape! You make a rope from bedsheets and let yourself out the window.\n\n*finish\n\n*label your_room\nHere you are in your room, a small but cozy garret in one of the rounded spires of your old house. The walls are curved and the roof is slanted. Your bed is draped with an old star-patterned quilt. Your shelf is crammed with books your parents thought you would enjoy, everything from fairy tales to encyclopedias to detective novels to nature guidebooks. \n\n*if(Respect \u003c 40)\n\tOn the wall is an anarchy flag.\n\t*goto your_chair\n*elseif(Respect \u003c 50)\n\tOn the wall is a Jolly Roger flag.\n\t*goto your_chair\n*elseif(Respect \u003c 60)\n\tOn the wall is a pennant for the Camden Tigers.\n\t*goto your_chair\n*else\n\tOn the wall is a map of Ancient Rome.\n\t*goto your_chair\n\n*label your_chair\nYour shabby but comfortable chair is strewn with clothes and an empty black canvas messenger bag. It's a great bag because it's not too big and it has a ton of pockets, pouches, pen holders, and hidden compartments.\n\nUnder the narrow window is a heavy antique desk that looks as if it was hewn long ago from a massive tree. On it is a marble notebook, a pencil, \n*if(fancy) or (haveCompact = true)\n\t*set haveCompact true\n\t*achieve getpowder\n\ta compact of your favorite loose powder,\n*if(Secrecy > 60) or (haveCodebook = true)\n\t*set haveCodebook true\n\t*achieve getcodebook\n\ta book of codes and ciphers,\n*if(Secrecy \u003c 40) or (haveBinoculars = true)\n\t*set haveBinoculars true\n\t*achieve getbinoculars\n\ta pair of powerful binoculars,\n*if(Respect > 60) or (haveFloss = true)\n\t*set haveFloss true\n\ta roll of dental floss (because proper dental hygiene is very important),\n*if(Respect \u003c 40) or (haveJacket = true)\n\t*set haveJacket true\n\ta black leather biker-style jacket,\nand some Silly Putty. You gather these things into your bag and create a portable Detective Kit to carry with you everywhere! If you want to see the contents of your kit, check your Detective Notebook.\n*set haveKit true\n\n*return\n\n*label get_hank_alias\nWhat fake name do you give to Hank?\n\n*fake_choice\n\t*if(gender = \"girl\") \n\t\t#Mary.\n\t\t\t*set hank_alias \"Mary\"\n\t\t#Lady Weatherwax\n\t\t\t*set hank_alias \"Lady Weatherwax\"\n\t*if(gender = \"boy\")\n\t\t#Steve.\n\t\t\t*set hank_alias \"Steve\"\n\t\t#Lord Moocowington.\n\t\t\t*set hank_alias \"Lord Moocowington\"\n\t#A.J.\n\t\t*set hank_alias \"A.J.\"\n\t#Al B. Querque.\n\t\t*set hank_alias \"Al\"\n\t#El Diablo.\n\t\t*set hank_alias \"El Diablo\"\n\t#Something else.\n\t\tEnter your alias:\n\t\t*input_text hank_alias\n\n*return\n\n*label get_police_alias\nWow, to the police? Okay.\n\n*fake_choice\n\t*if(gender = \"girl\")\n\t\t#Jane Smith.\n\t\t\t*set police_alias \"Jane Smith\"\n\t\t#Avril La
