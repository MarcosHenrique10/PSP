*set relS %+30\n\t\t\t\"Now you're getting into character!\" says Shashi appreciatively.\n\t\t\n\t\t\t*goto what_next\n\t*if(playing_char = \"druid\")\n\t\t#\"I'm not comfortable in civilization. Let's return to the forest, where I can commune with the animals.\"\n\t\t\t*set relS %+30\n\t\t\t\"Now you're getting into character!\" says Shashi appreciatively.\n\t\t\n\t\t\t*goto what_next\n\t*if(playing_char = \"fighter\")\n\t\t#\"Nobody treats me with royal respect here. Let's go back to the kingdom I'm the ${princess} of.\"\n\t\t\t*set relS %+30\n\t\t\t\"Now you're getting into character!\" says Shashi appreciatively.\n\t\t\n\t\t\t*goto what_next\n\t#\"Let's go to the tavern, beautiful. I want to buy you a drink.\"\t\n\t\t*set relS %+40\n\t\tShashi giggles and blushes a little. In her Devina voice, she squeaks, \"My word, friend! You are forward, aren't you?\"\n\t\n\t\t\"You can stop calling me 'friend,'\" you say suavely, emboldened by the act of playing your cool ${playing_char} character. \"I think we both know we are much more than that.\"\n\t\t\n\t\tShashi giggles again.\n\t\t\n\t\t*goto what_next\n\t#\"That's my cue to take a break. We'll pick this up later.\"\n\t\t*goto stop_playing_with_shashi\n\n*label what_next\n\"What next?\" you ask.\n\nShashi pages through her notes.\n\n*goto play_with_shashi\n*label sh_aj\n\nYou turn to A.J.\n\n*label sh_a_choice\n*choice\n\t*disable_reuse #\"Who do you think took Shashi's book?\"\n\t\t*set relA %+15\n\t\t*goto sh_a_collusion\t\n\t*disable_reuse #\"Thanks for all your help on this. It's really fun working with you.\"\n\t\t*set relA %+20\t\n\t\t*goto sh_a_indirect\t\n\t*disable_reuse #\"C'mon. Was it you? Really. It was you, wasn't it?\"\n\t\t*set relA %-20\n\t\t*goto sh_a_accusation\n\t*disable_reuse #\"You look really nice today.\"\n\t\t*goto sh_a_compliment\n\t#\"I better talk to some other people.\"\t\n\t\t*goto sh_choice\n\t\t\n*label sh_a_compliment\n*set relA %+20\n\n*if(datingA)\n\tA.J. blushes to the roots of ${his} hair. \"Thanks,\" ${he} mumbles, not looking at you directly.\n\t*goto sh_a_choice\n*else\n\tA.J. shoves you playfully. \"Don't get mushy on me, now.\"\n\t\n\t*goto sh_a_choice\n\t\n*label sh_a_collusion\nA.J. shakes ${his} head. \"I don't know, man. It's a weird case. The crime doesn't fit with any of the suspects.\" \n\n\"How do you mean?\" you say.\n\n\"Nobody except Evan plays the game, but why would he take a book he already has? Only to be mean to Shashi, but he likes Shashi. Everyone likes Shashi. She's a nice kid.\"\n\n\"Vitessa doesn't like her,\" you point out. \"Vitessa doesn't like anyone.\"\n\n\"Yeah, but this isn't Vitessa's style. She'd never do something like this—just up and throw somebody's book in a mud puddle. It's dirty, for one thing. Vitessa hates dirt. She'd be more likely to, I don't know, plant the book in a circle of black candles to make it look like Shashi was doing demonic rituals. Or she'd have a replica book printed up with crazy rules to make Shashi do something weird. You know? Something with finesse.\" \n\n\"So who would do something like this?\" you wonder.\n\n\"Not Vitessa, not Evan, not Finnegan, and not you or me, obviously,\" says A.J. \"Honestly, the only person I haven't ruled out is the new girl.\" \n\n\"Corley?\" you say. \n\n\"I don't actually have a reason to think she did it, I just don't know her well enough to say she didn't,\" A.J. clarifies. \"She seems harmless, but who knows? It's always the quiet ones.\"\n\n*temp aj_suspects_corley true\n*goto sh_a_choice\n\t\t\t\n*label sh_a_indirect\nA.J. ducks ${his} head bashfully. \"Aw, don't mention it. I like this detective stuff. It's fun.\" \n\n*goto sh_a_choice\n\n*label sh_a_accusation\nA.J.'s eyes turn cold. \"That's not a very funny joke.\" \n\n\"It's not a joke. I can't let you off the hook just because we're friends—you know that. I have to be objective. I have to look at the facts, like an outsider would. You yourself have analyzed everyone and ruled them out. Except you. Now, you're a known thief. Your friends are all older kids with bad reputations.\"\n\n\"Aw, that's all, you know, what do you call that thing,\" says A.J., snapping ${his} fingers. \"That thing where you have no real reason to connect me to the actual crime. It's all he-said, she-said and guesswork.\" \n\nYou point to yourself. \"Look, it's me. We're friends, right? You can be honest.\"\n\n\"You want honesty? I honestly didn't do it,\" A.J. insists angrily. \"And if we were really friends, you wouldn't even ask. You know what? I quit. Don't expect me to share any more information with you.\" \n\nA.J. frowns and carves the desk with even more intensity than before.\n\n*set aj_quit true\n*goto sh_choice\n\n*label sh_corley\n*if(talked_to_c = false)\n\t\"Hi, Corley!\"\n\n\tAs you drop into the seat across from her, Corley jumps, startled, and drops her joke book onto the table in front of her. \"Sorry, sorry,\" she apologizes hastily, picking up the book and brushing it off. \"You scared me.\" \n\t\n\t*set talked_to_c true\n\t*goto sh_c_choice\n*else\n\t\"Hi again, Corley!\"\n\n\tCorley flinches again. She looks at you with wide, frightened eyes. \"What now?\"\n\n\t*goto sh_c_choice\n\n*label sh_c_choice\n\n*choice\n\t*disable_reuse #\"I'm glad you transferred to this school. It's nice to have you here.\"\n\n\t\t*set relC %+20\n\t\t*goto sh_c_indirect\t\n\t*disable_reuse #\"Describe the events of yesterday morning.\"\n\n\t\t*set relC %-20\n\t\t*goto sh_c_direct\n\t*disable_reuse #\"You did it, didn't you?\"\n\t\t*set relC %-50\n\t\t*goto sh_c_accusation\n\t*if(you_talked_to_vitessa) and (questioned_c = false)\n\t\t#\"Did you wear a jacket to school yesterday?\"\n\t\t\t\"Huh?\" says Corley.\n\t\t\t\n\t\t\t\"I was just talking to Vitessa,\" you explain, \"and she says that when she met you in front of the school, you were shivering without a jacket. Did you bring one?\"\n\t\t\t\n\t\t\tCorley is quiet for a moment. Then she says, \"I don't remember.\"\n\t\t\t\n\t\t\t*goto jacket_talk\n\n\t*if(you_talked_to_vitessa) and (questioned_c = true)\n\t\t#\"Why did you go into the coat closet with Vitessa?\"\n\t\t\t\"Hm?\" says Corley.\n\t\n\t\n\t\t\t\"I'm just wondering why you went into the coat closet at all,\" you say. \"You didn't have any homework to bring in because you're new, and Vitessa says you weren't wearing a jacket.\"\n\t\t\t\n\t\t\t\"Oh. I don't know,\" says Corley. \"I guess I just followed her in there.\" \n\t\t\t\n\t\t\t*goto jacket_talk\n\t\t\t\n\t*if(seen_jacket = true)\n\t\t*if(questioned_c = true) #\"When Vitessa took you to the coat closet yesterday, was that the first time you had ever been there?\"\n\t\n\t\t\tCorley nods slowly. \"Well, of course. I mean, it was my first day.\"\n\t\n\t\t\t*goto jacket_talk\n\n\t\t*disable_reuse #\"I just love your jacket.\"\n\t\t\t*set relC %+10\n\t\t\t\"Thank you,\" says Corley.\n\t\t\t\n\t\t\t\"It seems so familiar to me,\" you continue. \"I'm sure I've seen it before.\"\n\t\t\t\n\t\t\t\"Probably not,\" says Corley. \"It's handmade. It's one of a kind.\" \n\t\t\t\n\t\t\t*goto jacket_talk\n\t\t\t\n\t#\"Nice talking to you.\"\n\t\tCorley releases a sigh of relief and focuses hard on her joke book.\n\t\t\n\t\t*goto sh_choice\n\n*label sh_c_accusation\n\"Why—why do you say that?\" Corley stammers.\n\n\"I've eliminated everyone but you,\" you say. \"You're the wild card, Corley. I think you're the thief.\" \n\nCorley goes white. \"I—I don't, I would never, I'm not the kind of person who would throw other people's things in the mud. I'm a nice person. Please don't think that about me.\" A tear slips down her cheek. \"Why are you saying this? I don't think you're very nice.\"  \n\n\"Hm,\" you say. \"Who told you the book was thrown in the mud?\"\n\nCorley is crying too hard to answer.\n\n\"Excuse me.\" Vitessa is suddenly standing behind Corley, her hand on Corley's shoulder. \"What are you saying to my nice little new girl? Go harass someone else.\" She waves her hands and says \"Shoo!\" until you get up and move away. \n\n\"It's okay. ${Name} is gone now,\" Vitessa tells Corley as you walk off. After soothing Corley a moment longer, Vitessa returns to her magazine. Corley dries her tears and continues with her joke book, looking more distraught than ever.\n\n*goto sh_choice\n\n*label jacket_talk\n\"Hmm,\" you say. \"Okay. Just one more question. I'm curious. How did your jacket get to school ahead of you?\"\n\n\"Wha—what?\" Corley stutters.\n\n\"I saw it in the coat closet yesterday morning,\" you explain. \"Before Vitessa brought you to the classroom.\"\n\nCorley goes white as a ghost and says nothing. \n\n\"Now, I can think of two possibilities,\" you continue. \"Either you stole that jacket from the coat closet,\n*if(know_corleys_jacket)\n\tand sewed your own name into the label, \nor you had it with you all along yesterday. You were in the coat closet before class, weren't you? You were there when the book was stolen.\" \n\nCorley bursts into tears.\n\n*goto corley_confession\n\n*label sh_c_direct\nCorley goes pale. \"Am I—am I under investigation?\" she squeaks in a high, quiet, nervous little voice. \n\n\"Not necessarily. I'm asking everyone,\" you say. \"I just want to know everything about that day. You might have seen or heard something that helps me figure out what happened to Shashi's book.\" \n\n\"Didn't she get it back?\" Corley asks, confused. \"I thought someone left it for her on her desk. Good as new.\" \n\n\"No, that was a replacement. The real book was destroyed.\"\n\n\"Oh,\" says Corley. \"But I thought it had her name in it.\" \n\n\"It did, but we think that was a misdirect. Anyway, we're more concerned about finding the thief.\"\n\n\"Well, I guess I can't help you,\" Corley says. \"By the time I got to school yesterday, the book was already gone.\" \n\n\"What makes you say that?\"\n\n\"I don't know. We were only in there a few minutes before Shashi found the book was missing. I guess I just assumed it must have happened earlier, because there wasn't time for anything to happen after we got there.\" \n\n\"Who's 'we'?\"\n\n\"Vitessa and me. She was the one who found me by the school gate when I got there. She brought me to the office to sign in and get set up. She was with me the whole time.\"\n\nYou frown. Vitessa's word isn't much to go on. Still, it's worth checking to see if their stories match up. \"You both went in the coat closet together?\" \n\n\"That's right. A few minutes later, Shashi went in and found her book was gone, so I guessed it was already gone by the time we got there.\"\n\n\"Interesting,\" you say.\n\n*set questioned_c true\n*goto sh_c_choice\n\n*label sh_c_indirect\n\"Thank you,\" says Corley, offering a small, nervous smile. \n\n\"Tell me about yourself. Where are you from?\"\n\n\"Um, not far. Just about two hours away.\" \n\n\"Which do you like better—this school or your last school?\"\n\n\"So far? This one,\" says Corley, seeming to relax. \"Everyone is so nice. That girl Vitessa is really great. She showed me around yesterday. She's so beautiful. She looks like an angel.\"\n\n\"Uh-huh,\" you say, biting your tongue. There will be plenty of time for Corley to learn about Vitessa. Besides, maybe Vitessa really has changed. At least, she seems to be genuinely nice to Corley.\n\n*if(assigned_aj) and (you_talked_to_girls = false)\n\t\"And that ${genA} A.J is nice….\" Corley smiles, then frowns. \"The kids at my old school were sort of, um, not so nice.\"\n*comment endif\n\n\"Did they pick on you?\"\n\n\"Sort of. I guess they thought I was a nerd. Here it doesn't seem like it's so bad to be a little nerdy. I mean, nobody makes fun of that girl Shashi for playing her game.\" \n\n\"That's true,\" you say. \"Everyone likes Shashi. That's why we're all so upset that she lost her book.\" \n\nCorley bites her lip. \"But she got a new one, so it's okay, right?\"\n\n\"Corley,\" you say gently, \"do you know something about the theft?\"\n\nCorley shakes her head quickly. \"Why would I? I just got here. Can I get back to my book now?\" \n\n*if(you_talked_to_vitessa)\n\t\"In a minute. I was wondering something,\" you say. \"Were you wearing a jacket yesterday?\"\n\t\n\t\"Huh?\" says Corley.\n\t\n\t\"Vitessa says you weren't wearing a jacket when she found you outside the school yesterday morning,\" you explain.\n\n\t\"Oh. I don't know. I don't remember.\" \n\t\n\t*goto jacket_talk\n\n*else\n\t\"Okay,\" you sigh, giving up. Corley either knows nothing or she's clamming up. It does seem as if she's the sort of girl who would enjoy an escapist game, though, so you add, \"By the way, would you like to play Swords and Sorcerers with Shashi and me sometime?\"\n\n\t*if(relC > 60)\n\t\tUnexpectedly, Corley bursts into tears. \n\n\t\t\"There's…I need to tell you something,\" she whispers through her tears. \"It was me. I did it.\"\n\t\t \n\t\t*goto corley_confession\n\t*else\n\t\tCorley shakes her head vigorously. \"Oh, no. I couldn't. I'm not really into games about magic and demons and dragons and sword fighting and mystical creatures and rare jewels of power. Real life is much more interesting.\"\n\t\t\n\t\tYou raise an eyebrow doubtfully. Seems like she'd love the game, actually, but you can't make her play. You shrug and say, \"Suit yourself.\"\n\n\t\t*goto sh_c_choice\n\n*label sh_finnegan\n\"Go away!\" says Finnegan, not looking up, as you sit across from him. \"I'm studying.\" \n\n*choice\n\t*disable_reuse #\"What are you studying for, anyway? We don't have any tests coming up.\"\t\n\t\t*set relF %+20\n\t\t\"Entrance exams,\" Finnegan explains.\n\n\t\t\"For what?\" you say. \"We just got into middle school. We're here until eighth grade.\"\n\n\t\t\"Not me, hopefully,\" says Finnegan. He leans forward, a sparkle in his eye. \"St. John's Academy and Praxis University Prep School are both seventh-grade and up, and they both have exams! PUPS is my top choice, but St. John's is also a quality institution. If I want to get into either one, though, I need to spend all my spare time studying!\"\n\n\t\t\"So you want me to go away?\" you say.\n\n\t\t\"Brilliant deduction, Holmes!\" says Finnegan.\n\n\t\t*goto sh_choice\n\t*disable_reuse #\"When we were in the coat closet yesterday morning, do you think Shashi's book had already been stolen?\"\n\t\t*set relF %-10\n\t\t\"How should I know? I don't care,\" says Finnegan. \"Go bother someone else.\" \n\n\t\t*goto finn_ender\n\t#\"You stole Shashi's book, didn't you?\"\n\t\t*set relF %-5\n\t\tFinnegan laughs. \"Why would I do that? No, I don't even want to hear your harebrained theory. I'm busy.\"\n\n\t\t*label finn_ender\n\t\t\"You know, your uncooperativeness looks a lot like guilt,\" you point out.\n\n\t\t\"No, it looks like disinterest,\" says Finnegan. \"Go play detective somewhere else.\"\n\n\t\tHe sticks his nose back in his book. You are getting nowhere. But what can you do? You can't make someone talk to you. If you want to pin this on Finnegan, you'll have to do it through other evidence.\n\n\t\t*goto sh_choice\n\n*label sh_evan\n\"Hi, ${Name}!\" says Evan cheerfully as you pull up a chair to his computer carrel. \"What's up?\"\n\n*label sh_e_choice\n*choice\n\t*if(shashi_thinks_evan_likes_her)\n\t\t*disable_reuse #\"Do you like Shashi?\"\n\t\t\t*set Secrecy %-10\n\t\t\t\"Sure, I like Shashi,\" says Evan. \"She's pretty cool for a girl. And a great Swordmaster.\"\n\n\t\t\t\"I mean, do you like her, like her,\" you clarify.\n\n\t\t\t\"Ohhh,\" says Evan, letting the word draw out awkwardly. \"I…I don't know. I guess I never thought of her that way. She doesn't like me, does she?\"\n\t\t\t*temp evan_doesnt_like_shashi true\n\n\t\t\t*choice\n\t\t\t\t#\"She has a huge crush on you.\"\n\t\t\t\t\t*set lie_count +1\n\t\t\t\t\t*set Secrecy %-10\n\t\t\t\t\t*set relE %-5\n\n\t\t\t\t\tEvan looks panicked. \"Yikes. Really? You think so? An actual crush?\"\n\n\t\t\t\t\t\"Yes, absolutely. I can just tell these things. I am very good at reading people.\"\n\n\t\t\t\t\tFor a moment, he looks concerned, then he begins to smile. He runs a hand through his hair. \"Sometimes, being this good-looking is a burden.\" \n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Don't I know it!\"\n\t\t\t\t\t\t\t*set relE %+10\n\t\t\t\t\t\t\tEvan laughs. \"We should form support group for good-looking people.\" \n\t\t\t\t\t\t\t*goto sh_e_choice\t\n\t\t\t\t\t\t#\"Don't get a big head.\"\n\t\t\t\t\t\t\t*set relE %+5\n\t\t\t\t\t\t\tEvan nods seriously. \"That's good advice. I'll try not to let my attractiveness change me. After all, my humility is one of my most amazing qualities.\"\n\t\t\t\t\t\t\t*goto sh_e_choice\n\t\t\t\t\t\t#\"Why don't you ask Shashi to the Starlight Dance?\"\n\t\t\t\t\t\t\t*set relE %-10 \n\t\t\t\t\t\t\t\"Ask her to the dance? But…I don't even…. Well…\" Evan shrugs helplessly. \"Maybe. I'll think about it.\" \n\t\t\t\t\t\t\t*goto sh_e_choice\n\t\t\t\t#\"She thinks you're a nerd.\"\n\t\t\t\t\t*set relE %-20\n\t\t\t\t\t*set Secrecy %-10\n\t\t\t\t\tEvan looks hurt. \"Hey, she's one to talk. She's just as nerdy as I am. If not more so. I'll show her. I'll become the handsomest guy in the grade! Then she'll be sorry.\"\n\n\t\t\t\t\t*goto sh_e_choice\n\t\t\t\t#\"She only likes you as a friend.\"\n\t\t\t\t\t*set relE %+10\n\t\t\t\t\t*set Secrecy %-20\n\t\t\t\t\t\"Oh, thank goodness,\" Evan sighs with relief. \"I don't think I'm ready for this boy/girl stuff, to be honest.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto sh_e_choice\n\t\t\t\t#\"I don't know. It's none of my business, actually.\"\n\t\t\t\t\t*set Secrecy %+10\n\t\t\t\t\tEvan frowns, concerned. \"Okay. I think I just…won't bring it up. That works, right? God, I'm such a coward. I just don't think I'm ready for this boy/girl stuff, to be honest.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto sh_e_choice\n\t*if(evan_doesnt_like_shashi)\n\t\t*disable_reuse #\"So, if you don't like Shashi, is there anyone you do like?\"\n\t\t\t*set relE %+20\n\t\t\t*set Secrecy %-10\n\t\t\t*goto evan_who_do_you_like\n\t*disable_reuse #\"You gave Shashi the replacement book, didn't you?\"\n\t\tEvan shakes his head. \"Nope, I'm afraid I'm not that nice. I offered to lend her my copy, but it never occurred to me to buy her a new one. To be honest, I probably wouldn't have done it even if I had thought of it. Shashi's a good friend, but those books are pretty pricey, even at Ye Olde Book Shoppe, and it's not her birthday or anything. Is it? Man, we've been in the same class since we were five. I should probably know that.\"\n\n\t\t*goto sh_e_choice\n\t*disable_reuse #\"Have you ever been to the Eldritch Abyss?\"\n\t\t\"Sure, I've been there!\" says Evan. \"It's a great shop. The guys there are really nice. I got some dice there one time.\" \n\n\t\tInteresting that Evan is admitting to going there. If he were the culprit, you would expect him to be more nervous. Casually, you ask, \"Ever buy any books there?\"\n\n\t\t\"Nah, their books are way overpriced,\" says Evan. \"Those books are half the price at Ye Olde Book Shoppe, just two blocks down, over by Freedom Drug. Everyone knows that. Anyone who buys books at Eldritch Abyss must be either really loaded or not know the area very well.\" \n\n\t\t*goto sh_e_choice\n\t#\"I should get back to my investigation.\"\n\t\t*goto sh_choice\n\n*label evan_who_do_you_like\nEvan shrugs and looks down at his keyboard. He is actually handsome, in a boy-band sort of way. He has delicate features, high cheekbones, and eyelashes so dark you would swear he's wearing mascara if you didn't know better.\n\n\"I don't know,\" he says. \"Shashi is a nice girl, but….\n*if(Respect \u003c 50)\n\tI'm not really into nice.\n\t*if(gender = \"girl\")\n\t\tI like bad girls.\"\n\t\t*goto evan_flirting_choice\n\t*elseif(gender = \"boy\")\n\t\tOr girls. To be honest, I like bad boys.\"\n\t\t*goto evan_flirting_choice\n\t*else\n\t\tI like rebels.\"\n\t\t*goto evan_flirting_choice\n*elseif(Secrecy > 50)\n\tShe's a blabbermouth. If I ever go out with anyone, it will be someone I can trust with secrets. Someone quiet and kind of mysterious.\"\n\t*goto evan_flirting_choice\n*else\n\tShe's too lost in a fantasy world. I like people who go out into the real world and get things done. You know, people with drive. Ambition. Small business owners.\"\n\t*goto evan_flirting_choice\n\n*label evan_flirting_choice\n*choice\n\t#\"Like me?\"\n\t\t*set relE %+10\n\t\t\"You? I don't know. I guess you fit that description. I never really thought about it.\" Evan won't look directly at you but instead stares at this computer monitor, which is on a Wikipedia article about famous detectives. \n\t\t*goto flirting_with_evan\n\t#\"Okay. I'll let you know if I find anyone like that.\"\n\t\t*set relE %-20\n\t\t\"You do that,\" says Evan, looking defeated.\n\t\t\t\n\t\t*goto sh_e_choice\n\t#\"All this who-likes-who stuff is a waste of time.\"\n\t\t*set relE %-15\n\t\t\"Totally,\" Evan agrees, but his voice lacks emotion. You get the feeling he is just covering up his feelings, and there really is someone he likes.\n\t\t\n\t\t*goto sh_e_choice\n\t#\"Well, if you won't ask Shashi to the dance, maybe I will.\"\n\t\t*set relE %-10\n\t\tEvan knits his brows. He looks disappointed. Maybe he was bluffing and does like Shashi after all. After a moment, he smiles a small smile and says, \"That would be cool. Let me know if you want me to put in a good word for you.\"\n\t\t\n\t\t*goto sh_e_choice\n\n*label flirting_with_evan\nHe moves the mouse randomly but doesn't click on anything. You notice the time in the corner of the screen, and you realize your allotted time with Evan is almost up. \n\nEvan continues, \"Um…maybe we could hang out sometime. Like after school or whatever. I don't know.\"\n\n*choice\n\t#\"Absolutely. That would be great. Hey, what bands do you like?\"\n\t\t*set convos +1\n\t\t*set relE %+30\n\t\t*set datingE true\n\t\t*achieve romancer\n\t\t*if(datingA) or (datingS)\n\t\t\t*achieve multiromancer\n\t\tYou and Evan put your heads together and compare notes on your favorite bands for the next five minutes. You have a great time! Evan is a really neat guy.\n\t\t\n\t\tSuddenly Evan says, \"Hey, aren't you investigating something or something?\"\n\t\t\t\t\n\t\tOh, right! You should probably get on with your investigation now.\n\n\t\t*goto sh_choice\n\t#\"That sounds cool, but let's set it up later, okay? I have to get back to my investigation.\"\n\t\t*set relE %+20\n\t\t*set datingE true\n\t\t*achieve romancer\n\t\t*if(datingA) or (datingS)\n\t\t\t*achieve multiromancer\t\t\n\t\tEvan looks slightly disappointed, but then he smiles. \"Okay. I respect that. You've got a job to do. Let me know when you catch the bad guy!\"\n\t\t\n\t\t*goto sh_choice\n\t#\"We should just be friends.\"\n\t\t\"Oh,\" says Evan, face falling. \"Sure. Okay. Yeah, that's fine. That's what I meant. Did you think…? Ha! Ha! You and me? Laughable. Out of curiosity, do you like somebody else?\"\n\t\t\n\t\t*fake_choice\n\t\t\t#\"A.J. forever.\"\n\t\t\t\t*set Secrecy %-10\n\t\t\t#\"Shashi is cute.\"\n\t\t\t\t*set Secrecy %-10\n\t\t\t#\"Corley is sweet.\"\n\t\t\t\t*set Secrecy %-10\t\t\t\n\t\t\t#\"Finnegan is going places.\"\n\t\t\t\t*set Secrecy %-10\t\t\t\n\t\t\t#\"Vitessa is beautiful and terrible, like a righteous goddess.\"\n\t\t\t\t*set Secrecy %-10\t\t\t\n\t\t\t#\"I'm going out with someone in Canada. You wouldn't know them.\"\n\t\t\t\t*set lie_count +1\n\t\t\t\t*set Secrecy %+10\n\t\t\t#\"I like nobody. Only justice.\"\n\t\t\t\t*set Secrecy %-10\n\t\t\t#\"I don't want to talk about it.\"\n\t\t\t\t*set Secrecy %+10\n\t\t\t\t\n\t\tEvan doesn't look particularly comforted, but he nods grimly. \"All right. Well, I should get back to my, you know, stuff.\" He gestures vaguely at the computer.\n\n\t\t*goto sh_choice\n\n*label sh_vitessa\nVitessa raises a single eyebrow at you as you sit next to her. \"Have you been helped?\" she quips.\n\n*label sh_v_choice\n*choice\n\t*disable_reuse #\"It was nice of you to show Corley the ropes yesterday.\"\n\t\t*set relV %-20\n\t\t*goto sh_v_indirect\n\t*disable_reuse #\"Can you describe your whereabouts yesterday morning?\"\n\t\t*set relV %+10\n\t\t\"Right down to business!\" says Vitessa. \"At least you're not pretending to be my friend and buttering me up. That look so does not suit you.\"\n\t\t\n\t\t\"Can we get on with it?\" you say, glancing at the clock.\n\t\t\n\t\t*goto sh_v_direct\n\t*disable_reuse #\"You took Shashi's book, didn't you?\"\n\t\t*set relV %-10\n\t\t\"Really?\" says Vitessa. \"That's your interrogation technique? 'You did it, didn't you?' Are you just going around and saying that to everyone?\" She rolls her eyes. \"You just think I'm guilty because you dislike me. Fine, I'll tell you all about yesterday morning, if only to show you how wrong you are.\"\n\n\t\t\"I'm listening,\" you say.\n\t\t\n\t\t*goto sh_v_direct\n\t\n*label sh_v_indirect\nVitessa gives you a pained look. \"You can quit it with the fake nice-nice routine. I know when someone is trying to butter me up. You still think I took Shashi's stupid book, so just come out and say so.\"\n\n*fake_choice\n\t#\"Fine. Let's cut to the chase.\"\n\t\t*set relV %+10\n\t\t\"I do think you took it, to be honest, so prove me wrong,\" you say.\n\n\t\t\"Fine!\" says Vitessa, smiling smugly. \"At least you're being honest with me now.\"\n\t\t\n\t\t\"Then you'll cooperate?\" you ask.\n\t#\"I don't think anything. I don't have enough evidence to think anything yet.\" \n\t\t*set Secrecy %+10\n\t\t*set relV %-10\n\t\t\"Look at you, ${Miss} High and Mighty Detective!\" Vitessa snorts. \n\t\t\n\t\t\"That's right,\" you say brusquely.\n\t#\"I'm hurt that you think so little of me. Can't we be friends?\"\n\t\t*set Secrecy %-10\n\t\t*set relV %-20\n\t\t\"I don't need any more friends,\" says Vitessa.\n\n\t\t\"But you did help Corley,\" you point out. \n\n\t\t\"Yes. She was the last one. All my slots are full now. Application denied.\"\n\t\t\n\t\t\"Okay, so we're not friends. Will you at least talk to me?\" you say with a sigh. \n\t#\"I don't think you took it. Don't get me wrong, I still think you're a horrible, mean, bitter person.\"\n\t\t*set relV %+20\n\t\tVitessa smiles radiantly, her eyes dancing with light. \"Do you really? I'm touched. That's exactly how I want to be thought of—by you.\" \n\t\t\n\t\t\"Great,\" you say. It's funny, but you feel like this conversation is going about as well as it possibly could. You decide to press on with your questions.\n\"Can you tell me more about yesterday morning? Where you and Corley went, what you did?\"\n\nVitessa laughs, a chilling, joyless laugh. \"Ha! So you did want to interrogate me. I'm always right.\"\n*goto sh_v_direct\n\n*label sh_v_direct\nVitessa gazes at her fingernails, looking bored. \"Okay. I got to school just before the bell. I saw this new girl standing there at the gate. I knew she must be the new girl we were expecting because I didn't recognize her and she looked so scared. She was literally shaking. Of course, that could have been because she didn't have on a jacket or anything. I thought she was poor, so I figured I would get karma points by taking her in. I gave her my sweater and took her to the office to sign in and get her room assignment and everything. It turned out she'd gotten all that by mail, so it didn't take very long.\"\n\n\"Then what?\" you say.\n\n\"I just took her up to the classroom.\"\n\n\"Did you go into the coat room?\"\n\n\"We dropped in. She didn't have anything to drop off. I just put my jacket and purse down. We were in sight of each other the whole time. I didn't mess with Shashi's stuff. You can ask Corley.\"\n\n\"Is there anyone else who can corroborate that?\" you ask. \"You and Corley could be in cahoots.\" \n\n\"You and your detective jargon. You're a real [i]Law & Order[/i] episode, aren't you? Look, do you think Corley looks like the kind of girl who would lie? She's a perfect angel. It's kind of sickening, actually.\"\n\n\"I thought you two were friends,\" you say.\n\nVitessa shrugs. \"Maybe, until I get tired of looking at her prissy little face. Now go away—I'm already tired of looking at you.\" \n\n*set you_talked_to_vitessa true\n*goto sh_choice\n\n*label sh_greeley\nYou walk up to Mrs. Greeley's table and peer at her work.\n\n*label sh_g_choice\n*choice\n\t*disable_reuse #\"Grading papers? Can I help?\"\n\t\t*set Respect %+10\n\t\t*if(Respect > 70)\n\t\t\tMrs. Greely smiles. \"Sorry, ${Name}. I'm sure you would get them all right, but I can't let you see other students' grades. Why don't you work on an extra-credit project? I can assign something if you're bored.\" \n\t\t\t\n\t\t\t*goto sh_g_choice\n\t\t*elseif(Respect > 30)\n\t\t\tMrs. Greeley shakes her head. \"I'm afraid I can't let students grade each other. You know how it would look.\"\n\t\t\t\n\t\t\t*goto sh_g_choice\n\t\t*else\n\t\t\tMrs. Greeley raises an eyebrow, covering her gradebook. \"Nice try, ${Name}. I'm not letting you have access to my gradebook. Do you think I'm crazy? Go do your homework for once.\" \n\t\t\t\n\t\t\t*goto sh_g_choice\n\t*disable_reuse\t#\"Do you think any of the students in this class could be thieves or vandals?\"\n\t\t\"Other than \n\t\t*if(Respect \u003c 35)\n\t\t\tyou and \n\t\tA.J. Carver?\" says Mrs. Greeley. \"Look, \n\t\t*if(Respect >= 30)\n\t\t\tI appreciate that you're trying to help, \n\t\t*if(Respect \u003c 30)\n\t\t\tI know you like any excuse to intimidate and interrogate your fellow students,\n\t\t*comment endif\n\t\tbut Shashi's book was returned, so I think you should really let it go and focus on your studies.\"\n\t\t\n\t\t*goto sh_g_choice\n\t*disable_reuse #\"I think you took Shashi's book to make her focus on her work instead of her fantasy game.\" \n\t\t\"If I wanted to confiscate Shashi's book,\" says Mrs. Greeley, \"I would do it in full view of everyone, to send a message to the rest of class. I don't need to do it secretly.\"\n\n\t\tShe has a point. \n\n\t\t*goto sh_g_choice\n\t#\"Okay, bye.\"\n\t\t*goto sh_choice\n\n*label sh_corvis\nYou walk up to Mr. Corvis. \n*if(you_tell_corvis_youre_shashi = true)\n\n\t\"Oh, hello, Shashi!\" says Mr. Corvis, clearly pleased he has remembered your name. \"What can I do for you?\"\n*comment endif\n\n\"Tell me again how you found the ruined book in your drop-off,\" you request.\n\n\"It was the strangest thing!\" says Mr. Corvis. \"I was just getting the library ready for the day, and a book came tumbling down the slot. That in itself is not unusual, although children usually wait until library time to return their books. It was unusual that it was not a library book, though, and that it was covered in mud. It pained me to see it. I'm just lucky I had already cleaned out the drop bin, or it might have muddied up my other books.\"\n\n\"Exactly what time did the book come in?\" you ask. \n\n\"It was just about a minute before the first bell. I was wiping down the chute until first period! Maybe the person who dropped in the book thought it was a trash chute. I'll have to post a sign.\"\n\n\"Who do you think might have ruined the book?\"\n\n\"I'm sure I don't know!\" says Mr. Corvis. \"Who would ever treat a book so badly? I have to believe it was an accident. Are any of your classmates particularly clumsy? This is why you should always put your books in book covers. Not sticky ones, though. Those can gum up the covers.\n*if(you_tell_corvis_youre_shashi = true)\n\tCome by the library after school sometime, Shashi, and I'll show you how to make a book cover out of a brown-paper bag.\"\n*if(you_tell_corvis_youre_shashi = false) \n\tSend Shashi to me and I'll show her how to make a book cover out of a brown-paper bag.\" \n*comment endif\n\n*goto sh_choice\n\n*label sh_timesup\nThe bell rings, startling you. Oh, no! The period is up! And you haven't solved the mystery.\n\n\"Let's get going!\" Mrs. Greeley snaps her fingers. \"We have a lot to do back in the classroom. Line up, please.\" \n\nYou join the line. Shashi jumps into place behind you. \"Well?\" she asks. She waves the small, signed scrap of paper. \"You promised you'd have results by the end of the period. \n*if(shashi_plays > 2)\n\tI don't know how you had time, what with playing the game and all, but maybe you were waiting for word from one of your agents. Yeah, that must be it.\nSo did you do it? Did you figure out the thief?\"\n\n\"Yessss,\" you say. \"The thief is….\"\n\nYou look up and down the line.\n\n*choice\n\t#\"A.J.\"\n\t\t*set relA %-40\n\t\t*set you_sold_out_aj true\n\t\t\"Hey!\" says A.J. \"What did I ever do to you?\"\n\n\t\t\"Even you have to admit, with your history of troublemaking, you're a likely candidate,\" you point out.\n\n\t\tShashi nods, seeming convinced.\n\n\t\t\"That's not fair!\" says A.J. \"Just because I've done some stuff in the past doesn't mean I did this. Where's your evidence?\"\n\n\t\tShashi seems convinced by that, too. She looks at you expectantly.\n\n\t\t\"Umm,\" you say.\n\n\t\t\"You don't have any, and I know you don't, because I didn't do it. And what's more, I know who did,\" says A.J. \n\n\t\t\"You do?\" you say. \"Who?\"\n\n\t\t*if(aj_quit = true)\n\t\t\t\"I don't have to tell you. I quit, remember?\" says A.J. \"You'll have to do your own dirty work.\"\n\n\t\t*if(deputyA = false)\n\t\t\tA.J. juts out ${his} chin defiantly. \"I'm not telling!\"\n\n\t\t*if(aj_quit = false) and (deputyA = true)\n\t\t\t*set aj_quit true\n\t\t\t*set deputyA false\n\t\t\tA.J. juts out ${his} chin defiantly. \"I'm not telling! If being your deputy means I'm just going to be the fall guy whenever you don't know the answer to a mystery, I'm not interested. You can find someone else for the job. I quit.\"\n\n\t\t*choice\n\t\t\t#\"Pleeeeease tell me? As a friend?\"\n\t\t\t\t\"Why should I?\" says A.J. sulkily. \"You haven't been a very good friend to me.\"\n\n\t\t\t\t*goto class_consensus_aj\n\t\t\t#\"Is the information for sale?\"\n\t\t\t\t*set Greed %+10\n\t\t\t\t\"Not everything is for sale,\" says A.J. coolly.\n\n\t\t\t\t*goto class_consensus_aj\n\t\t\t#\"If you don't tell me who it really was, I'll assume it was you.\"\n\t\t\t\t\"Go ahead!\" says A.J. \"But you'll be wrong. And you'll never know the right answer.\"\n\n\t\t\t\tGah. ${He} knows how to hit where it hurts. Because you're really not sure. Not sure at all.\n\n\t\t\t\t*goto class_consensus_aj\n\t\t\t#\"I don't care who you say it was. I still think it was you.\"\n\t\t\t\t\"Well, you think wrong,\" says A.J. \"And you'll never know the right answer.\"\n\n\t\t\t\tGah. ${He} knows how to hit where it hurts. Because you're really not sure. Not sure at all.\n\n\t\t\t\t*goto class_consensus_aj\n\n\t#\"Corley.\"\n\t\tCorley bursts into tears. \"It's true! I did it!\"\n\n\t\tYou blink. You weren't expecting that.\n\n\t\t*achieve jaccuse\n\t\t*goto ajs_advice\n\t#\"Evan.\"\n\t\t*set relE %-30\n\t\t\"Hey!\" says Evan. \"Why are you picking on me?\"\n\n\t\t\"Actually, that makes sense,\" says Shashi. \"He's the only other Swords and Sorcerers player. Who else has a motive to take my book?\"\n\n\t\t\"I never liked him anyway,\" Vitessa puts in. \n\n\t\tIt seems the whole class has an opinion. And most of them are glaring suspiciously at Evan.\n\n\t\t*goto corley_interjects\n\t#\"Finnegan.\"\n\t\t*set relF %-30\n\t\t\"Hey!\" says Finnegan. \n\n\t\t\"Actually, that makes sense,\" says Shashi. \"I could see Finnegan as a Swords and Sorcerers player.\"\n\n\t\t\"But I'm not,\" says Finnegan. \"It's a waste of time.\"\n\n\t\t\"Well, with that attitude, you'd definitely want to hide it if you were a secret player,\" Evan points out.\n\n\t\t\"Also, Finnegan is super lame,\" Vitessa puts in. \"Just saying.\"\n\n\t\tIt seems the whole class has an opinion. And most of them are glaring suspiciously at Finnegan.\n\n\t\t*goto corley_interjects\n\t#\"Vitessa.\"\n\t\t*set relV %-30\n\t\tVitessa scoffs. \"Whatever. You're just accusing me because you dislike me.\"\n\n\t\t\"Actually, it makes sense,\" says Shashi. \"You're the only person in this class who would do something so heinous just to annoy me!\"\n\n\t\t\"Yeah,\" says Evan. \"Like the time you told me I had a giant spider in my hair just to see me freak out.\"\n\n\t\t\"It was funny!\" says Vitessa. \"You did a little dance.\"\n\n\t\tYou may have no actual evidence that Vitessa is the thief, but it looks as if you picked a good scapegoat. It seems the whole class has a grudge against Vitessa. They're all perfectly willing to believe that she is the thief.\n\n\t\t*goto corley_interjects\n\t#\"Mr. Corvis.\"\n\t\t*set Respect %-30\n\t\tMr. Corvis, standing nearby polishing his glasses, is so disturbed that he lets them slip right out of his hands. \"Er, um, what?\"\n\n\t\t\"Aw, he's nice,\" says Evan.\n\n\t\t\"No, actually, that makes sense,\" says Shashi. \"Who stands to lose the most from admitting he lost or damaged a student's book? The librarian, of course.\"\n\n\t\t\"I never trusted him,\" Vitessa piles on.\n\n\t\t*goto corley_interjects\n\t#\"Mrs. Greeley.\"\n\t\t*set Respect %-30\n\t\t\"Yes, ${Name}?\" says Mrs. Greeley, who hasn't been paying attention to the whispers in line until she heard her name.\n\n\t\t\"Teacher's the thief!\" Evan squeals, unable to help himself.\n\n\t\tThe class begins to laugh. Mrs. Greeley looks bewildered. Then she shoots you an angry look.\n\n\t\t*goto corley_interjects\n\t#\"You. Twist! You stole the book from yourself!\"\n\t\t*set relS %-30\n\t\tShashi blinks, confused. \"Wha—but why?\"\n\n\t\t\"You staged this whole thing just to confuse me!\" you bluff on. You have no idea yourself where this is going. But the rest of the class looks interested.\n\n\t\t\"Ugh!\" says Vitessa. \"You'll do anything for attention, won't you?\"\n\n\t\t\"But I,\" Shashi begins, still bewildered. \"I mean, what?\"\n\n\t\t\"Get it together, Shashi!\" Finnegan scolds.\n\n\t\t*goto corley_interjects\n\t#\"It was me. I did it! I confess!\"\n\t\t*set you_took_the_blame true\n\t\t\"You?\" Shashi looks confused. \"But why…?\"\n\n\t\t\"Actually, that makes sense,\" Vitessa is quick to put in. \"${Name} had a huge motive to cover up the theft once you hired her to look into it. Who better to bluff and make up fake clues and lead you on a wild goose chase?\"\n\n\t\tA.J. crosses ${his} arms. Shashi looks both confused and convinced. Evan looks at you with large, betrayed eyes.\n\n\t\t*goto corley_interjects\n\n*label corley_interjects\n*set corley_publicly_confessed true\n\"I can't. I can't do this anymore!\" a voice cries out.\n\nIt's a girl's voice, not quite familiar sounding. You all turn, looking for the source of it. It's Corley.\n\n*label ajs_advice\n*set aj_apparently_knew true\n*set corley_publicly_confessed true\n*if(aj_quit = true)\n\t\"Shut up, Corley!\" says A.J. \"You don't have to tell them anything.\"\n\n\t\"Yes, I do! I can't stand this. I can't stand this witch hunt!\" says Corley.\n*if(aj_quit = false)\n\t\"Corley, no,\" says A.J. \"It's okay. We don't have to do this now.\"\n\n\t\"Yes, we do! I can't stand this. I can't stand this witch hunt!\" says Corley.\n\"I did it. It was me! I stole the book!\"\n\n*label i_hear_talking\n\"Enough talking!\" Mrs. Greeley snaps. \"Come along now. We have a lot to do this morning. And zip your lips in the hallway! Other classes are trying to learn. The first person voice I hear is getting detention.\"\n\nAs the line moves quietly through the halls, Corley's shoulders shake with silent sobs.\n\n*goto final_confession\t\n\n*label class_consensus_aj\n\"Oh, please. ${He}'s just stalling,\" Vitessa puts in.\n\n\"Yeah, you were right the first time. It probably was ${him},\" Finnegan agrees. It seems the whole class has an opinion. And most of them are glaring suspiciously at A.J.\n\n*goto corley_interjects\n\n*label corley_confession\n*achieve jaccuse\nThe bell rings.\n\n*label final_confession\n*page_break\nYou can hardly wait until the next free moment to have a real talk with Corley. At lunch, you manage to get a table off in the corner with Corley.\n*if(aj_quit = false) and (deputyA = true)\n\tA.J. joins you in ${his} capacity as deputy.\n\t*goto tell_me_everything\n*elseif(relA > 75)\n\tA.J. joins you, of course.\n\t*goto tell_me_everything\n*elseif(aj_apparently_knew)\n\tSince ${he} apparently knew about all this even before you did, you ask A.J. to join you.\n\t*goto tell_me_everything\n*else\n\tA.J. insists on joining you, calling ${him}self Corley's \"representation.\"\n\t*goto tell_me_everything\n\n*label tell_me_everything\n\"Ready to tell me everything?\" you ask.\n\nA.J. puts a protective hand on Corley's arm. \"You don't have to say anything you don't want to.\"\n\n\"No, no. I want to. I want to get this off my conscience.\" Corley takes a deep breath. \"I never meant to do anything bad. I was at school early yesterday. Way early. I was wired. I couldn't sleep the night before. I was so nervous. I didn't know if I could make any friends or if everyone would think I was a loser or something. I was so early, there was hardly anyone at school yet, except teachers and the kids in band.\" \n\n\"Like Shashi,\" you say.\n\nCorley nods. \"I didn't know that yet, of course. I didn't know her at all. I'd gotten my room assignment in the mail, so I went to check out my classroom. I went in the coat closet and hung up my coat. There was nothing else there except a purple bag. I know now it was Shashi's. It was open, and the book was spilling out. At first, I just went to tidy it up. Then I saw the book, and it was…interesting. Really interesting.\"\n\n\"Had you ever played Swords and Sorcerers before?\" you ask.\n\nCorley shakes her head. \"I'd never heard of it. But the cover of the book had jewels and a picture of a unicorn and an elf woman with a bow. It looked really cool. I started looking at it. But it was dark in the coat closet, so I sort of leaned out the window to get a better look.\" \n\n\"And you dropped the book.\" \n\n\"It was an accident,\" A.J. adds, glancing at you.\n\nCorley nods miserably. \"That was the worst moment of my life! I just stared at the book in the mud puddle and thought, No, no, no, no! I ran outside to get it, and it was ruined. Just ruined. I was trying to think what to do. Kids were gathering in the schoolyard by then. I knew someone was going to see me and say, 'Hey, what are you doing with that muddy book?' So I dropped it in the book return.\"\n\n*fake_choice\n\t#\"That was dumb. You should have known it would be found.\" \n\t\t*set Secrecy %+10\n\t\t*set relC %-20\n\t\tCorley shrugs and looks down at her feet. \n\t#\"Why didn't you just find the owner of the book and explain what happened?\"\n\t\t*set Secrecy %-20\n\t\t*set relC %-10\n\t\tCorley looks at you, wide-eyed. \"I couldn't…I mean…she would have been mad!\"\n\t\t\n\t\t\"A little, but she would have gotten over it,\" you say. \"Shashi's not a dragon.\"\n\t\t\n\t\t\"Well, I don't know. I guess I just didn't think of it.\" Corley twists her heart-shaped mood ring nervously over her finger. Her mood is black. \n\t#\"I understand. You just wanted to forget the whole thing ever happened!\"\n\t\t*set Greed %+10\n\t\t*set relC %+20\n\t\tCorley nods. \n\t#\"That must have been horrible. I'm so sorry.\"\n\t\t*set relC %+30\n\t\tCorley offers you a shaky smile.\n\"Anyway, I was glad I got rid of the book, because a moment later, this beautiful girl came up to me and offered to help me find my way to class. She was so nice!\"\n\n\"Vitessa,\" you say. \n\n\"You know, she's not all that nice,\" says A.J.\n\n\"Well, anyway, I sort of forgot about the book until Shashi got upset,\" Corley explains. \"Then I knew it was hers. I felt terrible, so right after school, I went and bought a new copy for her.\" \n\n\"So that was you, too,\" you say.\n\nShe nods and lets out a breath. \"I'm almost glad it came out. This has been weighing on me.\" She looks at you with big, wet eyes. \n*if(corley_publicly_confessed = true)\n\t\"You don't have to tell her, do you? I'm so embarrassed. She seems really nice, and I don't want her to hate me. I made it right, didn't I? Can't we just leave it at that?\" \n\n\t*if(relC \u003c 50) or (Respect > 50)\n\t\t*if(relA >= 60)\n\t\t\t\"Be gentle,\" A.J. murmurs to you. \"She's a good kid. She just messed up.\"\n\t\t*if(relA \u003c 60)\n\t\t\t\"Don't make trouble,\" A.J. says warningly. \"She's a good kid. She just messed up. Can't you see that?\"\n*comment endif\n\n*if(corley_publicly_confessed = false)\n\t\"I just wish…I just wish there was some way to go back in time and make Shashi not hate me anymore. She seems so nice. Maybe we could have been friends, if only…if only….\"\n\n\tUnder ${his} breath, A.J. mutters a word you're not supposed to know. \"This sucks,\" ${he} murmurs to you. \"She's a good kid. Isn't there anything we can do?\"\n*comment endif\n\n\"Hey, you guys!\" Shashi walks up to your table. \n*if(corley_publicly_confessed = true)\n\t\"Well, is it case closed, then? Corley did it?\"\n\t*goto public_choice\n*else\n\t\"What are you three whispering about? Did you find out anything about the case?\" \n\t*goto unpublic_choice\n\n*label unpublic_choice\n*choice\n\t*if(tomes_pay_rate > 0)\n\t\t#\"No, Shashi. I couldn't figure it out, so I guess you don't have to pay me.\"\n\t\t\t*goto forgo_payment\n\n\t*if(tomes_pay_rate = 0)\n\t\t#\"No, Shashi. I couldn't figure it out. I guess I'm just a bad detective.\"\n\t\t\t*goto forgo_payment\n\n\t#\"I solved the case, but I'm sworn to secrecy.\"\n\t\t*goto sworn_to_secrecy\n\n\t#\"The case is cracked. Corley just confessed.\" \t\t\n\t\tCorley looks at you with betrayal in her eyes. \n\n\t\tShashi blinks in surprise. \"You, Corley? But why? You seemed so nice!\"\n\n\t\t*goto tell_shashi_everything\n\n\t#\"The case is cracked. A.J. just confessed.\"\n\t\t*goto sell_out_aj\n\n\t#\"I cannot tell a lie: I did it.\"\n\t\t*goto sell_out_yourself\n\n*label public_choice\n*choice\n\t#\"Yep, Corley did it, all right.\"\n\t\t*goto tell_shashi_everything\n\n\t*if(tomes_pay_rate > 0)\n\t\t#\"No, Corley was just bluffing to end the conflict. I couldn't figure out the real thief, so I guess you don't have to pay me.\"\n\t\t\t*goto forgo_payment\n\n\t*if(tomes_pay_rate = 0)\n\t\t#\"No, Corley was just bluffing to end the conflict. I couldn't figure out the real thief. I guess I'm just a bad detective.\"\n\t\t\t*goto forgo_payment\t\t\n\n\t#\"I can neither confirm nor deny. I solved the case, but I'm sworn to secrecy.\"\n\n\t\t\"But it's Corley, right?\" says Shashi. \"I mean…she confessed, so.\"\n\n\t\t\"I can't say,\" you say.\n\n\t\t\"Riiight. So, yes. Corley.\"\n\n\t\tYou shrug.\n\n\t\t*goto sworn_to_secrecy\n\n\t#\"Corley was just bluffing to protect the real thief—A.J.\"\n\t\t*goto sell_out_aj\n\n\t#\"Corley was just bluffing to protect the real thief—me. I did it.\"\n\t\t*goto sell_out_yourself\n\n*label sworn_to_secrecy\n*set Secrecy %+20\n*set Greed %-20\n*set relA %+10\n*set relS %-10\n*set relC %+10\n\"Sorry, but that sounds pretty lame to me,\" says Shashi, putting her hands on her hips. \"'Oh, I solved it, but I won't tell you the solution.' \n*if(tomes_pay_rate > 0)\n\tI mean, you can't expect me to pay you.\nHow do I know you even did anything?\"\n\n\"That's fair,\" you admit.\n\n\"Excuse me,\" mutters Corley, jumping to her feet. She grabs her tray and hurries to the trash can to dump her leftovers. \n\n\"I can't argue with that. That's your choice,\" you continue, bringing Shashi's attention back to you. \"All I know is that I can't betray any confidences. \n*if(tomes_pay_rate > 0)\n\tEven for money. \nEven for my reputation.\"\n\nShashi shakes her head. \"That all sounds noble, but where does that leave me? Sorry, but I can't really recommend you to my friends for any detective work they need done. Oh well. I'll just solve my own mysteries from now on.\"\n\n*goto epilogue\n\n*label tell_shashi_everything\n*set Greed %-10\n*set Secrecy %-30\n*if(tomes_pay_rate > 0) \n\t*set Greed %+10\n*set relA %-20\n*set earned_your_money true\n*set you_took_the_blame false\n*temp you_sold_out_corley true\n*temp you_sold_out_aj false\n\nCorley jumps up and runs from the lunchroom, her hands over her face, shoulders shaking. \n\n\"Wow!\" says Shashi. \"She's guilty, all right.\" \n\n\"She didn't mean to do it,\" A.J. says. \"It was an accident. And she was the one who got you the replacement book.\"\n\n\"Oh!\" Shashi sits down. \"Well, now I just feel bad. I didn't mean to hound that poor girl.\" \n\n*goto epilogue\n\n*label sell_out_aj\n*set Greed %+10\n*set Secrecy %+30\n*if(tomes_pay_rate > 0) \n\t*set Greed %+10\n*set relA %-30\n*temp earned_your_money true\n*set you_took_the_blame false\n*temp you_sold_out_corley false\n\n*if(you_sold_out_aj = true)\n\t\"This again?\" A.J. groans. \"Come on!\"\n\n\t\"Oh. So you were right the first time,\" says Shashi. \"I was hoping it wasn't true. This really hurts my feelings, A.J. I thought we were friends!\"\n*if(you_sold_out_aj = false)\n\t*set you_sold_out_aj true\n\tA.J. stares at you, disbelieving. \"What did you just say?\"\n\n\t\"A.J.? Really?\" Shashi looks at ${him} in surprise. \"Hey, I thought we were friends.\" \n*comment endif\n\n\"But I didn't….\" A.J. looks from you to Shashi to Corley. Corley is sniffling into her napkin. \"Oh, fine,\" A.J. groans. \"Yes, Shashi. I did it. It was me. What can I say? I'm a bad seed. I guess I'm just a klepto.\" \n\n\"Wow, A.J. You've got a problem,\" says Shashi. \"You should really get help.\"\n\n\"Maybe I'm just hanging around with the wrong people,\" says A.J., staring at you. \"I think I need to run with a different crowd.\" \n\n\"Maybe you should think about that,\" Shashi agrees. \n*if(corley_publicly_confessed = false)\n\t\"What does Corley have to do with all this?\"\t\n\n\t\"Oh…\" A.J. puts a hand on Corley's shoulder. \"Corley here caught me, and she made me buy you that new book to make up for it.\" \n\n\t\"Oh, yeah?\" says Shashi. \"Good going, Corley! \n\t*if(tomes_pay_rate > 0)\n\t\tSounds like I should pay you the detective fee. Sounds like ${Name} didn't do anything.\"\n\n\t\tYou shoot A.J. a dirty look. A.J. grins smugly. It's a grin that says, \"Now we're even.\"\n\t*if(tomes_pay_rate \u003c= 0)\n\t\tHere, let me pay you a reward for solving the case.\"\n\t*comment endif\n\n\t\"Oh, no,\" says Corley quickly. \"I don't want any money. I just…I'm glad you got your book. Excuse me.\" She gets up, red-faced, grabs her tray, and hurries to the trash can to dump out her leftovers.\n*goto epilogue\n\n*label forgo_payment\n*set Greed %-20\n*set Secrecy %+30\n*set relS %-20\n*set relA %+20\n*temp earned_your_money false\n*temp you_sold_out_corley false\n*set you_sold_out_aj false\n\n\"Really? You're throwing in the towel? Boo!\" Shashi shoves your shoulder good-naturedly. \"I guess it was just too hard for you, huh? Oh well. I don't mind. I got my book, so I guess it doesn't really matter what happened.\"\n\n\"Excuse me,\" says Corley, jumping to her feet. Her face is red. \"I need to go. Yeah.\" She grabs her tray and hurries to the trash can to dump her leftovers. \n\n*goto epilogue\n\n*label sell_out_yourself\n*set lie_count +1\n*set Secrecy %+30\n*set Greed %-20\n*set relS %-30\n*set relA %+30\n*temp earned_your_money false\n*temp you_sold_out_corley false\n*set you_sold_out_aj false\n\n*if(you_took_the_blame = true)\n\t\"It's like I said before,\" you explain. \"I was telling the truth. Corley was just trying to protect me.\"\n\n\t\"${Name}…\" Corley begins, but you ignore her.\n*if(you_took_the_blame = false)\n\t*set you_took_the_blame true\n\t\"You're kidding, right?\" Shashi looks confused. \"What do you mean, you did it?\"\n*comment endif\n\n\"I came into the classroom early and I saw your book bag. I saw the book, and it looked so enticing. I picked it up and started reading. Before I knew it, I was engrossed. I brought it to the window to see it better. Before I knew it, ohhhh! It had slipped through my fingers! I watched it fall into the mud puddle below with a sinking heart. I could not believe my clumsiness.\" You hang your head. \"I'm really sorry, Shashi.\" \n\n\"Oh. Well, that's okay, I just wish you'd told me first,\" says Shashi. \"Kind of silly pretending to investigate it when it was you all along. If you wanted to play my game, you could have just asked me!\"\n\n\"I know that now,\" you say, looking at Corley. She just stares at her food. \n\n\"Are you the one who got me the new copy, too?\" Shashi asks. \n\n*fake_choice\n\t#\"Yes.\"\n\t\t*set relS %+10\n\t\t\"Well, thanks for that, anyway,\" says Shashi. \"No harm done, right? I actually kind of like my new copy better. Just don't take any more of my stuff without asking, and, above all, don't lie! That's the only part I'm mad about, really. You can borrow my stuff—I just don't like lies.\" \n\n\t\tCorley jumps to her feet. \"Excuse me,\" she mutters. She grabs her tray and hurries to the trash can to dump her leftovers. \n\n\t#\"No, that was Corley.\"\n\t\t*set relC %+10\n\t\t\"Really?\" Shashi grins at Corley. \"Hey, thanks!\"\n\n\t\tCorley stands up, red-faced. \"Excuse me,\" she mutters. She grabs her tray and hurries to the trash can to dump her leftovers. \n\n\t#\"No, that was A.J.\"\n\t\t*set relA %+10\n\t\t\"Really?\" Shashi grins at A.J. \"Hey, thanks!\"\n\n\t\t\"Uh, no problem,\" says A.J., bewildered. \n\n\t\tCorley stands up. \"Excuse me,\" she mutters. She grabs her tray and hurries to the trash can to dump her leftovers. \n\n\t#\"No, that was Evan.\"\n\t\t*set relS %-5\n\t\t*set relE %-5\n\t\t\"Oh. Really?\" Shashi sighs. \"I guess he really likes me. Maybe I will ask him to the Starlight Dance. I don't know, we'll see.\"\n\n\t\tCorley stands up. \"Excuse me,\" she mutters. She grabs her tray and hurries to the trash can to dump her leftovers. \n\t\t*set you_set_up_shashi_evan true\n\n*goto epilogue\n\n*label epilogue\nThe lunch bell rings. \n\n\"Well, that's that!\" says Shashi. \n*if(earned_your_money)\n\t*set detectivePoints +1\n*if(tomes_pay_rate > 0) and (earned_your_money)\n\t\"Here's your money.\" \n\t\n\tShashi counts out $${tomes_pay_rate} and gives it to you. You fold it into your wallet.\n\t*set Money +tomes_pay_rate\n\n\t*gosub_scene subroutines RoundMoney\n*if(you_took_the_blame)\n\t\"No offense, but I'm kind of not going to trust you with any more of these cases. But if you want to play the game sometime, I'm always up for it. Even with kleptos.\"\n*comment endif\n\n\"Hey, listen, Corley is really interested in Swords and Sorcerers,\" you say suddenly. \"Why don't you ask her to play?\" \n\n\"Sure, okay. I always love meeting new players,\" says Shashi. \"You know, I was pretty upset this time yesterday, but this ended up great for me! I got a new book, a new potential player…. I'm going to go talk to Corley. Check you guys later!\"\n\n*if(you_sold_out_corley)\n\tA.J. turns to you. \"Wow, Shashi is forgiving. Did you know it would turn out that well? When you sold out Corley?\"\n\n\t*if((tomes_pay_rate > 0) and (Greed > 50)) and (Secrecy > 50)\n\t\t\"No,\" you admit. \"But I wanted my money.\"\n\t\t\n\t\tA.J. shakes ${his} head.\n\t\t*finish\n\t*else\n\t\t\"No. but I can't keep back the truth, A.J.,\" you say. \"It wouldn't be right.\"\n\t\t\n\t\tA.J. shakes ${his} head. \n\t\t*finish\n*elseif(you_sold_out_aj) and (relA >= 60)\n\tA.J. turns to you. \"It's going to be a long, long time before you live that one down.\"\n\n\tYou grin charmingly. \"Come on. You know you love me.\"\n\t*finish\n*elseif(you_sold_out_aj) and (relA \u003c 60)\n\tA.J. turns to you. \"You're on thin ice, as my mom would say.\"\n\n\t\"Come on. Didn't it turn out for the best?\" you say.\n\n\t\"Well…sure. It doesn't hurt me to be thought of as a thief. It would really hurt Corley.\"\n\n\t\"So it's all good!\" you say with a smile.\n\n\tA.J. eyes you. \"Just be careful what you accuse me of in the future!\"\n\t*finish\n*else\n\tA.J. turns to you. \"You're a good kid, ${Name}.\"\n\n\tYou shrug. \"I keep trying.\" \n\t*finish", "ch3evan_sc1paper": "[b]The Secret of the Smartphone[/b]\n*set ch3started true\n\n\"Great news!\" Finnegan announces, sitting down at the library table you're sharing with A.J., Evan, Shashi, Corley, and Vitessa. \"I'm founding a class newspaper. Mrs. Greeley says it's okay. I get to be editor in chief.\" \n\n\"How wonderful for you,\" says Vitessa, bored.\n\n\"It's not just about me,\" says Finnegan. \"I can't do it all myself. I need people to write things for the newspaper, which I can accept or reject.\"\n\n\"You're not making it sound any better,\" Evan says with a grin.\n\n\"Oh, come on,\" says Finnegan. \"Don't any of you have any ambition? The press has an important role, especially in a crime wave. What if we uncovered the thief who's been plaguing the school? We'd be heroes! Besides, school newspapers are great résumé builders.\" \n\n*fake_choice\n\t#\"You had me at 'crime.' I'm in.\"\n\t\t*set Greed %-20\n\t\t*set relF %+10\n\t\t\"That's the spirit!\" Finnegan nods importantly.\n\t#\"Yes! Let's find out all the secrets and tell everyone!\"\n\t\t*set Secrecy %-20\n\t\t*set relF %+10\n\t\t\"Knowledge should be democratized,\" Finnegan agrees.\n\t#\"Anything to help you get into private school, Finn.\"\n\t\t*set relF %+30\n\t\t\"Hey, thanks!\" Finnegan preens. \n\t#\"Do we get extra credit?\"\n\t\t*set Respect %+20\n\t\t*set Greed %+10\n\t\t*set relF %+20\n\t\t\"I like the way you think,\" says Finnegan. \"I'll talk to Mrs. Greeley about it. If we're going to be doing a lot of writing, it should count toward our English grade.\" \n\t#\"Do we get paid?\" \n\t\t*set Greed %+20\n\t\t\"Only in pride in a job well done,\" says Finnegan. \n*comment endif\n\n\"I'll write for you, Finnegan,\" says Evan. \"I can write a sports column on all the school's teams.\" \n\n\"I can draw a little,\" Corley volunteers in a small voice. \"I could do the comics section.\" \n\n\"Ooh, a comics section?\" says Shashi. \"I can make games for it…. You know, crosswords and stuff.\"\n\n\"I'll write a society column,\" says Vitessa. \"I already know what my first article will be about. It will offer constructive feedback on the unfortunate fashion choices of our class. For example, ${Name} always looks so sloppy. Would it kill ${her_u} to run a comb through ${hers_u} hair in the morning? Maybe learn how to use an iron?\" \n\nYou shoot Vitessa a withering glare.\n\n\"Well, it's important!\" says Vitessa. \"It's a public service, really. I don't want our class to show up at the Starlight Dance looking like a bunch of mole people. That reflects badly on me.\"\n\n\"Er, maybe your column should be anonymous, Vitessa,\" says Finnegan.\n\n\"Count me out,\" says A.J. \"I don't do activities. I don't stay at school any longer than I have to.\" \n\n\"I figured,\" says Finnegan. \"How about you, ${Name}? What will you write?\"\n\n*fake_choice\n\t#\"The crime beat.\"\n\t\t*set Greed %-10\n\t\t*set Secrecy %-10\n\t\t*set relF %+20\n\t\t*set newspaper_job \"crime\"\n\t#\"Exposés. Lots of exposés.\"\n\t\t*set Secrecy %-20\n\t\t*set relF %+20\n\t\t*set newspaper_job \"exposé\"\n\t#\"An anonymous advice column.\"\n\t\t*set Secrecy %+10\n\t\t*set relF %+20\n\t\t*set newspaper_job \"advice\"\n\t#\"Writing's not my thing. I'll sell ad space to local businesses and make us a lot of money.\"\n\t\t*set Greed %+10\n\t\t*set relF %+20\n\t\t*set newspaper_job \"ads\"\n\t#\"On second thought, forget it. I'm a lone wolf, like A.J.\"\n\t\t*set Secrecy %+10\n\t\t*set relA %+10\n\t\t*set relF %-20\n\t\t*set newspaper_job \"none\"\n\t\tVitessa rolls her eyes. \"Two lone wolves? You might want to check that math.\"\n\n\t\tBut A.J. gives you an approving nod.\n*comment endif\n\n\"Okay, team,\" says Finnegan, taking notes. \"We'll have a sports section, a comics page with games, a society column,\n*if(newspaper_job = \"ads\")\n\tand ads.\n\t*goto end_sc1\n*elseif(newspaper_job = \"advice\")\n\tand an advice column. Kind of light on hard-hitting content, but whatever. I can throw together some feature stories. \n\t*goto end_sc1\n*elseif(newspaper_job = \"crime\")\n\tand a crime beat. I guess I'll write the actual content. \n\t*goto end_sc1\n*elseif(newspaper_job = \"expose\")\n\tand lots and lots of exposés. I'll write the editor's letter, of course, and some filler stories. \n\t*goto end_sc1\n*else\n\tand, um, that's it. Kind of light on hard-hitting content, but whatever. I can throw together some feature stories. \n\t*goto end_sc1\n\n*label end_sc1\nBe back here on Wednesday, right after school, for our first official meeting.\"\n\n\"Oh, I can't do Wednesday,\" says Evan. \"I have an appointment.\" \n\n\"You mean like a doctor visit or something? Okay,\" says Finnegan. \"How's Thursday?\" \n\n\"Let me check.\" Evan pulls out his trendy smartphone and taps the screen a few times. \"Sorry. I'm all booked up for the week.\"\n\n\"Jeez, Evan, what are you doing all the time?\" says Shashi. She leans over to glance at the screen, but Evan angles it away, preventing her from seeing. \"You're sure not making it to our weekly game. What are you busy with all of a sudden?\"\n\n\"Oh, you know, I have stuff. This and that,\" says Evan vaguely. \"How about Friday? I have something at four, but if it's a short meeting, I can make it.\" \n\n\"That's almost a week away!\" Finnegan shakes his head. \"I want to get this started sooner than that. Whoever can make it Wednesday, come then. We'll do a quick catch-up on Friday, too. Thanks, everyone. This is going to be fun!\"\n\n*if(newspaper_job != \"none\")\n\t*if(Respect \u003c 40)\n\t\tYou have a sinking feeling. Things that Finnegan thinks are fun rarely are. Still,\n\t\t*goto sentence_two\n\t*elseif(Respect > 60)\n\t\tYou nod enthusiastically. You've always wanted to be a reporter. And \n\t\t*goto sentence_two\n\t*else\n\t\tYou nod thoughtfully. One thing's for sure:\n\t\t*goto sentence_two\n*else\n\tYou grin. Skipping out of this \"fun\" activity was a good idea. But you'd better keep an eye on things, all the same. Finnegan is right: The newspaper reporters may find out a lot of valuable things about the school. You should stay close to them.\n\t*goto scene_end\n\n*label sentence_two\n*if(newspaper_job != \"ads\")\n\tworking for a newspaper should help you uncover lots of secrets. \n\t*if(Secrecy > 60)\n\t\tIf only you didn't have to broadcast them to other people!\n\t\t*goto scene_end\n\t*elseif(Secrecy \u003c 40)\n\t\tAnd share them with everyone!\n\t\t*goto scene_end\n\t*else\n\t\t*goto scene_end\n*else\n\tselling ads for the newspaper should help you hone your business skills. \n\t*goto scene_end\n\t\n*label scene_end\n*if(datingE)\n\t*goto date_postponed\n*else\n\t*finish\n\n*label date_postponed\n*page_break\nLunchtime. You're standing at the vending machine in the cafeteria when you feel a tap on your shoulder. You look around and smile. It's Evan. \"Hi,\" you say.\n\n\"Hi,\" Evan says, grinning broadly, but there's a note of shyness in his voice. \"So, about Saturday. You know, our hangout or whatever…um, I'm afraid I'm going to have to cancel. No, not cancel, postpone. Just for now.\"\n\n*choice\n\t#\"If you don't want to go on a date with me, just say so.\" \n\t\t*set Secrecy %-10\n\t\t\"It's not you!\" Evan assures you. \n\t\t*goto really_busy\n\t#\"It's not right, the way you keep flaking on everybody.\"\n\t\t*set Greed %-10\n\t\t*set relE %-10\n\t\t\"It's not my fault,\" Evan pouts.\n\t\t*goto really_busy\n\t#\"What, you have your How to Be a Jerk class?\"\n\t\t*set relE %-20\n\t\t\"Hey, now, that's uncalled for,\" Evan says, frowning. \n\t\t*goto really_busy\n\t#\"I understand. No need to explain. Just let me know when you're free.\"\n\t\t*set relE %+10\n\t\t*set Secrecy %+10\n\t\t\"Oh, man. You're too nice! You're really way too nice. I hope you know, it's nothing to do with you,\" Evan assures you.\n\t\t*goto really_busy\n\n*label really_busy\n\"I want to hang out! I'm just really, really busy right now.\"\n\n\"Busy with what?\" you ask. \n\nEvan hesitates. He seems to be considering his options. Finally he tells you, \"Just a project. Don't worry. It's nothing bad. I should be more free after the holiday season.\" His phone buzzes, and he glances at it. \"I have to deal with this. Sorry.\" He steps into an alcove and begins texting away.\n\nYou frown. This relationship is going nowhere fast. \n\t\n*finish", "ch3evan_sc2finnterview": "*if(newspaper_job != \"none\")\n\t*if(Respect > 70)\n\t\tOver the next few days, you throw yourself into your new job on the newspaper.\n\t\t*gosub your_newspaper_work\n\t\tYour friends are equally busy.\n\t\t*goto friends_newspaper_work\n\t*elseif(Respect > 40)\n\t\tOver the next few days, you tentatively dip your toe into the news business.\n\t\t*gosub your_newspaper_work\n\t\tThe newspaper craze has really taken over with your friends.\n\t\t*goto friends_newspaper_work\n\t*else\n\t\tOver the next few days, you mostly forget about the newspaper, but you do make a few cursory stabs at doing your assigned job.\n\t\t*gosub your_newspaper_work\n\t\tThe newspaper craze has really taken over with your friends.\n\t\t*goto friends_newspaper_work\n*else\n\tOver the next few days, you notice that your friends seem busier than usual.\n\t \n\t*goto friends_newspaper_work\n\t\n*label your_newspaper_work\n*if(newspaper_job = \"ads\")\n\t*if(Respect > 60)\n\t\tYour job is to sell ads, and sell ads you will! You make a list of local businesses who might want to sell ad space in the paper and make preliminary inquiries at Hank's Garage.\n\t\t\n\t*if(Respect \u003c= 60)\n\t\tYou're supposed to sell ads to local business owners, which is easier said than done. But you already know one local business owner, sort of: Hank. On impulse, you swing by the garage on your way home from school one day.\n\t\n\t*gosub hank\n\t*return\n*elseif(newspaper_job = \"advice\")\n\tBut you can't very well write an advice column until you get letters, can you? Mr. Corvis lets you repurpose the library sale cash box into a mailbox for your column. You write a sign: \"Got a Problem? Drop a letter in the box for Miss Understanding's Advice Column!\" Advice columnists always have cheesy names like that. \n\t*if(gender != \"girl\")\n\t\tThey always seem to be \"Miss\" something, and the writers can't all be girls, right? Anyway, you figure posing as a \"Miss\" will help disguise your identity.\n\t\n\t*if(Respect > 50)\n\t\tNot one to do things by half-measures, you also begin combing the Internet for examples of advice columns, write to an advice column to ask how the writer got started, and start an online course in psychology.\n\t\t\n\t*return\n*elseif(newspaper_job = \"exposé\")\n\tYou write a list of possible exposés:\n\t*if(Respect \u003c 30)\n\t\t\"Mrs. Greeley's Secret Bat Baby.\" \"Finnegan: Evil Robot or Just a Jerk?\" Having made such a satisfactory list, you decide to take a nap.\n\t\t\n\t\t*return\n\t*elseif(Respect > 75)\n\t\t\"Grading Fairness at Camden: The Pernicious Teacher's Pet Rumor Put to Rest At Last.\" \"Where the Trash Goes.\" \"Why Do the Bad Kids Wear Black?\" You call and schedule interviews with each of your potential sources: Mrs. Greeley, Janitor Stevens, and A.J. Last but not least, you buy a steno pad!\n\t\t\n\t\t*return\n\t*else\n\t\t\"Mystery Meat in the Cafeteria: Is It Made From Raccoons?\" \"Does the School Really Recycle Our Recycling, or Are the Blue Bins Just Meant to Make Us Feel Good?\" You begin to brainstorm ideas for writing the exposé. Maybe the cafeteria workers or the janitor will let you tail them for a day. But if you write a bad story about them, they might get mad. Being a reporter might be tougher than you thought.\n\t\t\n\t\t*return\n*else\n\t*if(Respect > 70)\n\t\tYou take the job of writing the crime beat seriously. The vice principal is in charge of discipline, so you figure she is your best ally here. You ask her to give you a list of any crimes that occur in the school. While you are waiting for her report, you get out a boatload of library books on crime and criminology.\n\t\t\n\t\t*return\n\t*elseif(Respect \u003c 25)\n\t\tYou figure writing the crime beat will be pretty easy, because all you have to do is write up what you and your friends do.\n\t\t\n\t\t*return\n\t*elseif(relA > 70)\n\t\tTo keep on top of crime, you ask A.J. to keep you apprised of ${his} friends' criminal activities.\n\t\t\n\t\t*return\n\t*else\n\t\tTo keep on top of crime, you take to hanging around the principal's office after school, interviewing detainees to find out what they did to get detention.\n\t\t\n\t\t*return\n\t\n*label hank\n*if(relH > 60)\n\tHank is pleased to see you, and signs up for a half page ad advertising his bikes for sale.\n\t*return\n*elseif(relH > 40)\n\tHank looks slightly annoyed to see you, but he does sign up for a small ad.\n\t*return\n*else\n\tHank says he's not interested and tells you to go away, but you know in his heart he's glad to see you. \n\t*return\n\n*label friends_newspaper_work\n*set noticed_evans_slacking true\nShashi pores over notebooks, drawing grid after grid. \"Making a crossword is harder than it looks!\" she tells you. Corley spends every spare moment drawing. Vitessa snaps candid photos of you and A.J. as \"fashion don'ts.\" Finnegan writes and writes. \n\nEvan seems busiest of all, although you're not sure he's working on the paper. He's always messing with his phone. As soon as school lets out, he takes off running, and you never see him again until the next morning, when he always arrives just a few minutes late and out of breath. \n\nFinnegan complains about him after the Friday catch-up meeting. \"I held it for his benefit, and he barely stayed for five minutes. Everybody else has started on their job, but when I ask Evan how it's going, he has nothing to show. The basketball team played on Tuesday and the football team played yesterday, but did he go to either game? No! What is he so busy with? He won't tell! I'm in five other activities, not to mention president of the Ornithology Club, but I still get my newspaper work done.\" \n\n*fake_choice\n\t#\"You should cut him some slack. He's a good guy.\"\n\t\t*set relE %+10\n\t\t*set Greed %+10\n\t\t\"He's a flake, is what he is,\" Finnegan insists.\n\n\t\t\"I don't know. I try not to write people off too quickly,\" you say. \"When you dig into it, you can find a lot of different sides of people. I learned that pretty quick when I started investigating things.\"\n\n\t\t\"Right. You're a detective. I forgot. Hmm.\" \n\t#\"If he's a slacker, why not just fire him?\"\n\t\t*set relE %-10\n\t\t*set Greed %-10\n\t\t*set relF %+10\n\t\t\"I do have that power,\" Finnegan acknowledges with a self-important puff of his chest. \"But it's not like anyone else is volunteering to take his place. Still, if he keeps pulling this, I might have to kick him off. You don't want to write the sports column, do you?\"\n\n\t\t\"Ummm,\" you say. \"I'm pretty busy with my stuff. And I'm still looking for A.J.'s bike, you know.\"\n\n\t\t\"Oh, right. Your detective game.\"\n\n\t\t\"Job,\" you say, correcting him.\n\t\t\n\t\t\"You take this investigation stuff pretty seriously, huh?\"\n\t#\"Come on, it's just a silly class paper. Don't stress about it.\" \n\t\t*set relF %-20\n\t\t\"Just a silly paper? This is my life!\" Finnegan insists.\n\n\t\t\"For now it is, but how long until you go onto your next project?\" you say. \"Face it, you don't have the best track record for staying with one thing at a time.\" \n\n\t\t\"Oh, and you do?\"\n\n\t\t\"Well…yeah,\" you say. \"My thing is pretty much being a detective.\" \n\n\t\t\"Oh. Right. I forgot.\" \n\t#\"Ornithology Club? Tell me more!\"\n\t\t*set relF %+30\n\t\t\"I'm glad you asked!\" Finnegan smiles. He hands you a brochure. \"We study local avian wildlife from a distance with visual enhancement devices such as binoculars and telescopes.\"\n\t\t\n\t\t\"It's bird-watching,\" you clarify. The brochure is a picture of a robin that Finnegan has printed out on a high-quality laser printer. It says: Ornithology Club–Fridays at 8AM, Room 304. BYO Binoculars!\n\t\t\n\t\t\"Well, yes, but it's so much more. It is a natural history education!\" says Finnegan. \"My Life List is 104. How about yours?\"\n\t\t\n\t\t\"How many kids are in this Ornithology Club?\" you ask.\n\t\t\n\t\tFinnegan scowls. \"It doesn't matter. Even if it's a small club, it's still a lot of work to prepare and manage. What is Evan doing with his time, huh? I don't see him doing anything to better the school.\"\n\n\t\t\"I have no idea what Evan's doing,\" you admit.\n*comment endif\n\nFinnegan twirls his pencil between his fingers thoughtfully. \"Between you and me, I'm starting to think there's something fishy about this Evan character. You might want to investigate him.\"\n\n\"What do you mean?\" you ask.\n\n\"Well, think about it. He always has the latest gadget, but his family is not rich. His mom works at Wall Drug. That's a normal, ordinary job. He always has some mysterious place to be, but he won't tell anyone where. I think he's running some kind of shady underground business. Maybe he's selling drugs. Maybe he's fencing stolen goods. He could be the school thief!\"\n*set thief_theory true\n\n*fake_choice\n\t#\"Evan? I don't think so.\"\n\t\t*set relE %+10\n\t\t*set Greed %+10\n\t\t\"Look, I know you and Evan are friends, but that's exactly what makes you such a good candidate to investigate him,\" says Finnegan. \n\t#\"I've always thought there's something weird about that guy.\"\n\t\t*set relF %+10\n\t\t*set Greed %+10\n\t\t\"Right?\" says Finnegan.\n\t#\"Do you have any hard evidence?\"\n\t\t*set Greed %-20\n\t\t\"I don't know anything definite. It's more like a hunch at this point,\" Finnegan admits.\n\t#\"Oooh, are we gossiping now? Yes! What brought on your suspicions? Tell, tell, tell.\"\n\t\t*set Secrecy %-20\n\t\t\"Now, don't quote me. I don't know anything for sure,\" Finnegan admits.\n\"Just look into it, all right? If he's not the thief, no harm, no foul. But if he is, we'll have caught a thief! We'll be heroes! Think how great our first issue will be! I could even charge money!\"\n\n\"Oh, I see,\" you say. \"You've got dollar signs in your eyes.\"\n*set evan_pay_rate detectivePoints * pay_rate_base\n*set evan_pay_rate *100\n*set evan_pay_rate round(evan_pay_rate)\n*set evan_pay_rate /100\n\n\"Well, it's not just about money. It's also about journalistic integrity…. But I'd be happy to make it worth your while,\" says Finnegan. \"I'll give you $${evan_pay_rate}.00 if you solve the case to my satisfaction.\"\n\n*fake_choice\n\t#\"I'll do it for justice.\" \n\t\t*set Greed %-30\n\n\t\t\"Whatever works,\" says Finnegan.\n\t#\"I'll do it for the money.\"\n\t\t*set Greed %+30\n\t\t\n\t\t\"Whatever works,\" says Finnegan.\n\t#\"I'll do it to prove that Evan is innocent.\" \n\t\t*set relE %+10\n\t\t*set Greed %+10\n\t\t\n\t\t\"Whatever works,\" says Finnegan.\n\t#\"I'll do it because you asked me, as a friend.\"\n\t\t*set relF %+10\n\t\t\n\t\t\"Good!\" Finnegan nods. \n\t#\"I'll do it to help the newspaper.\"\n\t\t*set relF %+20\n\t\t\n\t\t\"Great!\" Finnegan says with a smile. \n\t*if(newspaper_job = \"exposé\")\n\t\t#\"Sweet, this will be my first expose!\"\n\t\t\t*set Respect %+10\n\t\t\t*set Secrecy %-20\n\t\t\t*set relF %+20\n\t\t\t\n\t\t\t\"Great!\" smiles Finnegan.\n*set got_phone true\n\"Then I have your first clue.\" He reaches into his pocket and presents you with Evan's shiny smartphone. \"Evan left the meeting so quickly, he left this behind. I'm entrusting it to you. Do with it what you will. Return it to him eventually, of course—but first, maybe you can find something out from it.\"\n\nFinnegan hands you the phone. It feels weighty and important in your hands. You have never held something so expensive.\n\n\"Good luck, Ace!\" says Finnegan. \"It's all up to you now. If you find any new leads, meet me in Room 304 on Friday mornings between eight and eight-thirty. Technically, that's when Ornithology Club meets, but I'm usually the only member present.\" \n\n*label investigation_choice\n*choice\n\t#Start pushing buttons! There are probably clues on here, and I must know them.\n\t\t*set Greed %+20\n\t\t*set Secrecy %-20\n\t\t*set relF %+10\n\t\t*goto_scene ch3evan_sc3examphone\n\t#Start pushing buttons! I need to inspect it; maybe I can resell it.\n\t\t*set Greed %+30\n\t\t*set relF %+10\n\t\t*goto_scene ch3evan_sc3examphone\n\t#Give it back to Evan without messing with it. It would be wrong to pry into Evan's secrets.\n\t\t*set Greed %-30\n\t\t*set Secrecy %+20\n\t\t*set relE %+10\n\t\t*goto_scene ch3evan_sc3returnphone\n\t#Give it back to Evan without messing with it. I don't want him to think I stole it, and if I touch it, I might get fingerprints on it.\n\t\t*set Greed %-20\n\t\t*set Secrecy %+10\n\t\t*set Respect %+10\n\t\t*set relE %+10\n\t\t*goto_scene ch3evan_sc3returnphone", "ch3evan_sc3examphone": "*temp try_next_number 0\n*temp try_next_string \"\"\n*temp tried_number 0\n\nYou've never used such a fancy phone, but you figure out how to turn it on by holding down the one button that's on there. The phone brightens to life!\n\n*label phone_screen\n*set seen_phonescreen true\nThe phone screen looks like this:\n\nPASSWORD?\n*line_break\n_ _ _ _ _\n\n123\n*line_break\n456\n*line_break\n789\n*line_break\n0 \n\nYou need to enter a five-digit password made up of numbers. \n\n*label password_choice\n*set try_next_number (try_next_number + 1)\n*if(try_next_number \u003c 10) \n\t*set try_next_string \"0000${try_next_number}\"\n\t*goto after_next_num_calc\n*elseif(try_next_number \u003c 100)\n\t*set try_next_string \"000${try_next_number}\"\n\t*goto after_next_num_calc\n*elseif(try_next_number \u003c 1000)\n\t*set try_next_string \"00${try_next_number}\"\n\t*goto after_next_num_calc\n*elseif(try_next_number \u003c 10000)\n\t*set try_next_string \"0${try_next_number}\"\n\t*goto after_next_num_calc\n*elseif(try_next_number \u003c  100000)\n\t*set try_next_string \"${try_next_number}\"\n\t*goto after_next_num_calc\n*else\n\t*goto after_next_num_calc\n\t\n*label after_next_num_calc\n*choice\n\t#${try_next_string}\n\t\t*if(try_next_number = 81254)\n\t\t\t*goto phone_unlocks\n\t\t*else\n\t\t\t*goto auth_failed\n\t*disable_reuse #12345\n\t\t*set tried_numbers (tried_numbers&\"; \")&\"12345\"\n\t\t*goto auth_failed\n\t*disable_reuse #54321\n\t\t*set tried_numbers (tried_numbers&\"; \")&\"54321\"\n\t\t*goto auth_failed\n\t*disable_reuse #90210\n\t\t*set tried_numbers (tried_numbers&\"; \")&\"90210\"\n\t\t*goto auth_failed\n\t*disable_reuse #24601\n\t\t*set tried_numbers (tried_numbers&\"; \")&\"24601\"\n\t\t*goto auth_failed\n\t*disable_reuse #00451\n\t\t*set tried_numbers (tried_numbers&\"; \")&\"00451\"\n\t\t*goto auth_failed\t\n\t#Enter another number.\n\t\tEnter a number to try as the password:\n\t\t*line_break\n\t\t*input_number tried_number 0 99999\n\t\t*if(tried_number = 81254)\n\t\t\t*goto phone_unlocks\n\t\t*else\n\t\t\t*set tried_numbers (tried_numbers&\"; \")&tried_number\n\t\t\t*goto auth_failed\n\t*if(know_andrew)\n\t\t*disable_reuse #ANDREW\n\t\t\tThe idea of entering a word or name is interesting, if you can figure out how to turn letters into numbers. But the password is only five digits. Andrew is too many letters. And the typical nicknames for that name, Andy and Drew, are too few. It's probably something else.\n\t\t\t*goto password_choice\n\t*if(know_raven)\n\t\t#RAVEN\n\t\t\t*goto figure_out_raven\n\t*disable_reuse #Snoop in Evan's stuff for some clue to the password. \n\t\t*set Secrecy %+10\n\t\t*goto snoop_evans_stuff\n\t*if(haveCompact)\n\t\t*disable_reuse #Dust the phone screen for fingerprints using your powder compact.\n\t\t\tYou take out your compact and sprinkle a little powder on the phone screen. Hundreds of fingerprints are immediately visible!\n\n\t\t\tUnfortunately, they're not limited to certain numbers. There are fingerprints all over the touchscreen. How can Evan have every single number in his five-
