 flight pattern. Without hesitating, Grog barrels forward and runs directly into the stream of Empress Vaccus's unleashed bloodmatter blast. \n\n\t\t\tThe bloodmatter beams smash into Grog with such force that it sounds like a sonic barrier shattering, but Grog bears the brunt of the blasts with a deafening scream. Mirrored Matron, if that blast had hit you as its intended mark, you would have been obliterated on contact. Empress Vaccus is now playing for keeps, it would seem.\n\n\t\t\t*label everyonefightnow\n\t\t\t*page_break\n\n\t\t\tAs the bloodmatter energy subsides, everyone around you primes their abilities—Pinkuju's oversized gun whines menacingly, you feel the wind off the lake pick up as Breeze lifts into the sky, and dark whisps of some shadowy energy begin to curl and crackle off the shrouded being.\n\n\t\t\tBut it's Lady Venuma who steps forward first.\n\n\t\t\t\"Who dares?!\" Lady Venuma bellows, clenching her golden fists tightly, dense balls of yellow energy radiating around them like stars. Lady Venuma then raises her fists and lets loose a barrage of energy so bright, you have to look away. Though you can still feel the blast's heat intensely, like you're standing next to a raging bonfire.\n\n\t\t\tLooking back, you are able to focus enough through the flashing stars blurring your vision to see Empress Vaccus streak backward into the woods. Lady Venuma's blast surely would have incinerated anyone else, but Empress Vaccus still appears to be alive. Blerg, just how powerful are these two?\n\t\t\t*goto followintowoodsfight\n\t\t*elseif (solo \u003c 35)\n\t\t\t*set mastery +1\n\t\t\t*set life -1\n\t\t\tNo one looks quite sure how to react yet, which gives Empress Vaccus the chance to fire two bloodmatter beams—directly at you.\n\n\t\t\tYou dive out of the way just in time—along with anyone else in your immediate vicinity. Though you dodge the brunt of the blast, some bloodmatter energy aura brushes your torso with licks of hot pain. Mirrored Matron, if that blast had hit its target, you would have been obliterated on contact. Empress Vaccus is now playing for keeps, it would seem.\n\n\t\t\tSo everyone suddenly shifts into gear with astonishing speed.\n\t\t\t\n\t\t\t\"Slave, block!\" Baron Airon shouts, lifting into the air in some kind of evasive flight pattern. Without hesitating, Grog barrels forward and runs directly into another duo of unleashed bloodmatter blasts. \n\n\t\t\tThe bloodmatter beams smash into Grog with such force that it sounds like a sonic barrier shattering, but Grog bears the brunt of the blasts with a deafening scream. Mirrored Matron, Grog must be pretty much invulnerable to survive that kind of a hit.\n\t\t\t*goto everyonefightnow\n\t\t*else\n\t\t\t*set life -3\n\t\t\tAfter all, you're not exactly skilled at negotiating team battles. Then Lady Venuma holds up a hand to keep everyone back.\n\n\t\t\t\"There are consequences to fighting other inhabitants on Versus,\" Lady Venuma shouts. \"We shall not engage this being until we know its true intentions.\"\n\t\t\t*goto rippedintothewoods\n\t#I'm the only one who can handle Empress Vaccus, so I need to knock it back into the woods to get enough cover and distance to fight truly dirty, alone.\n\t\t*set solo %+30\n\n\t\tYou dive and roll forward with surprising nimbleness, which you realize you must have acquired from ${deathone}. \n\n\t\t*if (solo > 75)\n\t\t\t*achieve soloachieve\n\t\t\t*set mastery +2\n\n\t\t\tAs fantastic as it feels to deftly duck under Empress Vaccus's bloodmatter blasts, you notice that if that blast had hit dead on, you would have been obliterated on contact. Empress Vaccus is now playing for keeps, it would seem.\n\n\t\t\t*label solofightnow\n\n\t\t\tThinking that you don't necessarily want to experiment with any other new borrowed abilities in such a high-stakes situation, you draw your grav-gun and crank it to the highest possible setting.\n\n\t\t\tThen you fire a devastating grav-gun blast directly into Empress Vaccus's chest, sending it reeling deeper into the woods.\n\t\t\t*goto followintowoodsfight \n\t\t*elseif (solo > 65)\n\t\t\t*set mastery +1\n\t\t\t*set life -1\n\n\t\t\tAs fantastic as it feels to duck deftly under Empress Vaccus's bloodmatter blasts, some bloodmatter energy aura brushes your torso with licks of hot pain. Mirrored Matron, if that blast had hit dead on, you would have been obliterated on contact. Empress Vaccus is now playing for keeps, it would seem.\n\t\t\t*goto solofightnow\n\t\t*else\n\t\t\t*set life -3\n\t\t\tGiven your tendency to fight in teams, you are distracted as Lady Venuma suddenly shouts:\n\n\t\t\t\"There are consequences to fighting other inhabitants on Versus! Do not engage this being until we know its true intentions.\"\n\t\t\t*goto rippedintothewoods\n\t\t\n*label rippedintothewoods\n\nYou're about to shout back in protest when suddenly two tendrils of slimy, solid bloodmatter wrap around your arms and burn through to your skin. Before you can react, you find yourself ripped forward by the tendrils and propelled deep into the woods like a slingshot.\n\nYou had no idea that Empress Vaccus could solidify its bloodmatter blasts—just another terrifying ability to add to the ever-growing list. As you land in the woods in a bone-rattling heap, you realize that Empress Vaccus is playing for keeps this time.\n\nAnd given Lady Venuma's warning, you can't be sure that anyone is coming to help you. Which means that you're on your own fighting Empress Vaccus. \n\nThat may be just fine—this fight is personal.\n\n*if (life \u003c 1)\n\t*goto deathsequence\n*else\n\t*goto thetuskchoice\n\n*label followintowoodsfight\n*page_break\n\nYou immediately sprint for the woods, because this is a fight you mean to finish. You wonder if any of the others will follow when Lady Venuma suddenly steps in front of you.\n\n\"There are consequences to fighting other inhabitants on Versus,\" she says, loud enough for all of the others to hear. \"We have a right to defend ourselves if attacked, but engaging that thing further would be a mistake. The Verses dictate—\"\n\n\"You don't understand, that thing has to be put down,\" you shout back, pushing your way past Lady Venuma. Luckily she doesn't try to stop you as you sprint across the lawn. \n\nHowever, given Lady Venuma's warning, you can't be sure that anyone is coming to help you. Which means that you're probably on your own fighting Empress Vaccus. \n\nThat may be just fine—this fight is personal.\n*goto thetuskchoice\n\n*label thetuskchoice\n*page_break Into The Woods\n\nYou second-guess this declaration, however, as you find yourself facing off against Empress Vaccus in a clearing in the woods. You stand far away enough from it that you escape its coldzone, but even from this distance, Empress Vaccus is without a doubt the most terrifying Blot you've ever seen. \n\nIts blacknamel tusks shift and twitch with autonomy underneath its crimson eyes, which set on you with a mix of curiosity and intensity. Tar-like sludge falls off Empress Vaccus's body and you can't tell if it's from the Onyx Ocean or of its own making. The sludge drips off Empress Vaccus's jagged rows of tusks methodically, sizzling in the dirt underfoot.\n\nYou take a step forward and suddenly find yourself within its coldzone, causing your skin to crawl with what feels like a cascade of wriggling insects. A burst of painful sinus pressure explodes behind your eyes, rattling your teeth and stinging your ears. You immediately find it hard to breathe, but the frozen silence compels you to focus through the pain.\n\nYou force yourself to think back to the advantage you saved for a situation just like this, from your first day. Then, as Empress Vaccus lurches forward with impossible speed, you react.\n\n*choice\n\t*selectable_if (tuskweapon) #Slash Empress Vaccus with its own tusk.\n\t\t*set mastery +1\n\n\t\tAs Empress Vaccus lunges, you reach into your belt pouch and grasp the broken tusk you picked up from the Arrival Runway. \n\n\t\tIn one fluid motion, you slash at Empress Vaccus's neck with the tusk before it can stab you with its own. The tusk immediately crumbles in on itself, but only after it delivers a nasty cut across Empress Vaccus's rotten flesh.\n\n\t\tEmpress Vaccus emits a high-pitched howl as it lurches back away from you. It presses its pitch-black hand against the wound on its neck—obviously it is not used to being hurt like this.\n\n\t\t[i]Well, it had better start getting used to it,[/i] you think, readying yourself for another round.\n\t\t*goto forcunclimax\n\t#Use the extra charge in my grav-glider to avoid Empress Vaccus's attack at the last second.\n\t\t*if gravsave\n\t\t\t*set mastery +1\n\t\t\tAs Empress Vaccus lunges, you boost over it at the last possible second with the extra grav-glider charge you saved.\n\n\t\t\tClearly not anticipating this, Empress Vaccus rams headfirst into a sturdy tree trunk, giving you a chance to land and square off again.\n\n\t\t\tEmpress Vaccus emits a high-pitched howl as it lurches back to face you—obviously it is not used to being hurt like this.\n\n\t\t\t[i]Well, it had better start getting used to it,[/i] you think, readying yourself for another round.\n\t\t\t*goto forcunclimax\n\t\t*else\n\t\t\t*set life -2\n\t\t\tAs Empress Vaccus lunges, you try to boost over it at the last possible second. Except that you don't have enough extra charge in your grav-glider to move quickly enough.\n\n\t\t\t*label anklegrab\n\n\t\t\tEmpress Vaccus then reaches up and grabs your ankle, tossing you across the clearing. You fly into a tree with a horrible thud, trying desperately to keep your focus.\n\n\t\t\tPopping back up to your feet, you fight the dizzy rush that quakes your head and steel yourself to square off against Empress Vaccus again.\n\n\t\t\t*if (life \u003c 1)\t\t\t\t\n\t\t\t\t*goto deathsequence\n\t\t\t*else\n\t\t\t\t*goto forcunclimax\n\t#Let Empress Vaccus get close enough to detonate a bombpac, since I have an extra life to spare from grav-gliding.\n\t\t*if (gravsave = false)\n\t\t\t*set mastery +1\n\n\t\t\tAs Empress Vaccus lunges, you defiantly toss a bombpac onto its neck. Then, before it has another moment to react, you roll to the side.\n\n\t\t\tClearly not anticipating this bold risk, Empress Vaccus is helpless as the bombpac detonates on its neck. It emits a high-pitched howl as it lurches back away from you. Empress Vaccus presses its pitch-black hand against the wound on its neck—obviously it is not used to being hurt like this.\n\n\t\t\t[i]Well, it had better start getting used to it,[/i] you think, readying yourself for another round.\n\t\t\t*goto forcunclimax\n\t\t*else\n\t\t\t*set life -2\n\n\t\t\tAs Empress Vaccus lunges, you defiantly toss a bombpac onto its neck. But Empress Vaccus evades the bombpac with astonishing speed, leaving you vulnerable. \n\t\t\t*goto anklegrab\n\n*label forcunclimax\n*page_break\n\nIt's only a matter of seconds before Empress Vaccus refocuses on you, ready for the next move in this grudge match. This is all happening so fast—it's completely surreal. Just a moment ago, you were a guest at Breeze's strange party….\n\nYou're pulled from this thought as one of those Squirlfrends darts across the ground in front of Empress Vaccus. It happens so fast your eye can't follow it, but Empress Vaccus must have scooped up the Squirlfrend, because the next thing you feel is a spray of warm blood coating your face and visor as Empress Vaccus rips it in two.\n\nChoking back your horror, you watch as Empress Vaccus unhinges its iron jaw and envelops the upper half of the Squirlfriend, letting the bottom half drop to the ground in a crimson puddle. Empress Vaccus begins to chew, its bloody eyes set on you as it crunches.\n\nReminding yourself to breathe, you decide to let the blood splatter remain on your Battlesuite visor. If Empress Vaccus wants to play intimidation games, you're going to have to step up, no matter how much you may want to vomit or weep or run. You don't want Empress Vaccus to do that to you….\n\nAll you can think is: you must destroy this foul stain of a creature.\n\n*page_break\n\nAs you gear yourself up to attack, Empress Vaccus reacts, spitting shards of shattered Squirlfrend tooth in your direction. You leap to the side to avoid the jagged fragments, shuddering as Empress Vaccus emits another shrill, piercing howl. \n\nYou roll forward, forcing yourself to shake off this display, focusing instead on Empress Vaccus's blacknamel tusks. You have no idea how many mindheart centers it might have, but you'd bet those tusks house something important, no matter what.\n\nTumbling into a fighting crouch, you lock eyes with Empress Vaccus to show it you mean business. The moment you do, you immediately wish that you hadn't: suddenly you are filled with a bottomless pit of emptiness; a dark, unfillable cavern of greed and need. Empress Vaccus is sending you this signal somehow, because it wants you to absorb one notion, one singular Blot desire. \n\nNo, not a desire—a biological imperative, a spiritual mission. \n\nInfect. Convert. Spread. Spread. Convert. Infect…\n\nAll of Versus.\n\n*page_break\n\nYou clamp your eyes shut and again fight the urge to vomit. You've never felt a desire so vile, or so…urgent. \n\nEmpress Vaccus's desire to kill is so potent that nothing else can exist alongside it. Except perhaps the lingering craving for Priscan enamel and tooth root…\n\nAs Empress Vaccus creeps towards you once again, you decide to stop fighting this infectious, deadly urge.\n\nInstead, you harness it.\n\nBecause you're going to make one last play to stop Empress Vaccus.\n\nRight now.\n\n*choice\n\t#Lure Empress Vaccus into an attack, then dodge at the last second to lodge one of its tusks in a tree. Then use the leverage to kick-snap the tusk in two.\n\t\t*set forceful %-40\n\n\t\tYou take one step forward, indicating to Empress Vaccus that you're going to attack. Then, as Empress Vaccus lurches forward with impossible speed, you step backward and spin sideways. \n\n\t\tYou can feel all of the sound and warmth sucked out of the air as Empress Vaccus flings itself at you, but you steel yourself to focus through the jarring transition. \n\n\t\tYou're fast enough to spin out of Empress Vaccus's reach, and you send it reeling into the tree that was directly behind you. As it embeds its tusk into the dense trunk, you land in a crouch beside the tree. The smell of Empress Vaccus threatens to knock you out—it's so pungent and rotten, it's all you can do to stop yourself from gagging.\n\n\t\tMaintaining your focus, you swing your knee up into the underside of the tusk with all of your strength and momentum. Your knee smashes into the tusk with brutal force, and you feel its shaft crack with a sickening crunch.\n\n\t\t*if (forceful \u003c 25)\n\t\t\t*achieve cunningachieve\n\t\t\t*set mastery +2\n\n\t\t\tDespite the pain that darts across your knee, you know that you've executed this blow perfectly. Rolling through your strike seamlessly, you tumble away from Empress Vaccus and out of its coldzone.\n\t\t\t*goto evbadlyinjured\n\t\t*elseif (forceful \u003c 35)\n\t\t\t*set mastery +1\n\t\t\t*set life -1\n\n\t\t\tA flash of pain darts from your knee up across your leg, indicating that you've hurt yourself with this blow. But not enough to do any significant damage, thankfully, as your Battlesuite visor reads that you've only lost 1 Life.\n\n\t\t\tRolling through your strike seamlessly, you tumble away from Empress Vaccus and out of its coldzone.\n\t\t\t*if (life \u003c 1)\n\t\t\t\t*goto deathsequence\n\t\t\t*else\n\t\t\t\t*goto evbadlyinjured\n\t\t*else\n\t\t\t*set life -3\n\n\t\t\tA flash of pain darts from your knee up across your leg, indicating that you've hurt yourself with this blow. You check your Battlesuite visor and see that you've lost 3 Life—though it'll be worth the sacrifice if you really injured Empress Vaccus.\n\n\t\t\tRolling through the pain seamlessly, you tumble away from Empress Vaccus and out of its coldzone to see what the outcome might be.\n\t\t\t*if (life \u003c 1)\n\t\t\t\t*goto deathsequence\n\t\t\t*else\n\t\t\t\t*goto evbadlyinjured\n\t#Strike at one of the tusks with full force.\n\t\t*set forceful %+40\n\n\t\tYou run forward without further hesitation, leaping up above Empress Vaccus a few steps in. You can feel all of the sound and warmth sucked out of the air as Empress Vaccus flings itself at you, not to mention the smell—it's so pungent and rotten, it's all you can do to stop yourself from gagging.\n\n\t\tMaintaining your focus, you spin through the air around one of Empress Vaccus's swipes and slam your fist down, directly into one of its tusks. Your fist smashes into its target with brutal force, and you feel the tusk shaft crack with a sickening crunch.\n\n\t\t*if (forceful > 75)\n\t\t\t*achieve forcefulachieve\n\t\t\t*set mastery +2\n\n\t\t\tDespite the pain that darts across your hand, you know that you've executed this blow perfectly. Rolling through your strike seamlessly, you tumble away from Empress Vaccus and out of its coldzone.\n\t\t\t*goto evbadlyinjured\n\t\t*elseif (forceful > 65)\n\t\t\t*set mastery +1\n\t\t\t*set life -1\n\n\t\t\tA flash of pain darts from your hand up across your arm, indicating that you've hurt yourself with this blow. But not enough to do any significant damage, thankfully, as your Battlesuite visor reads that you've only lost 1 Life.\n\n\t\t\tRolling through your strike seamlessly, you tumble away from Empress Vaccus and out of its coldzone.\n\t\t\t*if (life \u003c 1)\n\t\t\t\t*goto deathsequence\n\t\t\t*else\n\t\t\t\t*goto evbadlyinjured\n\t\t*else\n\t\t\t*set life -3\n\n\t\t\tA flash of pain darts from your hand up across your arm, indicating that you've hurt yourself with this blow. You check your Battlesuite visor and see that you've lost 3 Life—though it'll be worth the sacrifice if you really injured Empress Vaccus.\n\n\t\t\tRolling through the pain seamlessly, you tumble away from Empress Vaccus and out of its coldzone to see what the outcome might be.\n\t\t\t*if (life \u003c 1)\n\t\t\t\t*goto deathsequence\n\t\t\t*else\n\t\t\t\t*goto evbadlyinjured\n\t#Forget the tusks, use your newfound agility to crack off a smaller tusk and use it to repeatedly slash Empress Vaccus.\n\t\t*set mastery +1\n\t\t*set life -1\n\n\t\tYou take one step forward, indicating to Empress Vaccus that you're going to attack. Then, as Empress Vaccus lurches forward with impossible speed, you step backward and spin sideways. \n\n\t\tYou can feel all of the sound and warmth sucked out of the air as Empress Vaccus flings itself at you, not to mention the smell—it's so pungent and rotten, it's all you can do to stop yourself from gagging.\n\n\t\tMaintaining your focus, you spin through the air around one of Empress Vaccus's swipes and slam your fist down, directly into one of its smaller tusks. Your fist smashes into the tusk with brutal force, and you feel its shaft crack with a sickening crunch.\n\n\t\t*page_break\n\n\t\tA flash of pain darts from your hand up across your arm, indicating that you've hurt yourself with this blow.\n\t\t*if (life \u003c 1)\n\t\t\t*goto deathsequence\n\t\t*else\n\t\t\tBut not enough to do any significant damage, thankfully, as your Battlesuite visor reads that you've only lost 1 Life.\n\n\t\t\tRolling through your strike seamlessly, you tumble across the forest floor and snatch up the broken tusk. Then, with another graceful spin, you slash the tusk down across Empress Vaccus's back.\n\n\t\t\tBefore it can lurch in response, you leap backward and reposition yourself outside of Empress Vaccus's coldzone.\n\t\t\t*if (forceful > 50)\n\t\t\t\t*set forceful %+20\n\t\t\t\t*goto swipeinjury\n\t\t\t*else\n\t\t\t\t*set forceful %-20\n\n\t\t\t\t*label swipeinjury\n\t\t\t\t*page_break\n\n\t\t\t\tEmpress Vaccus begins to howl shrilly, grasping at the wound on its back. \n\t\t\t\t*goto runaway\n\n\n*label evbadlyinjured\n*page_break\n\nEmpress Vaccus begins to howl shrilly, grasping at its broken tusk. \n*label runaway\nYou brace yourself for it to lurch at you once again, but to your complete surprise, Empress Vaccus instead crouches low and launches itself high into the sky, careening away as it continues to howl.\n\nYou feel a surge of relief and pride—you just held your own against the most deadly Blot in existence. Empress Vaccus will definitely think twice about coming after you anytime soon, or after anyone else on Versus, for that matter. You just proved yourself to be a complete and utter badass.\n\n[i]Hey,[/i] you think, [i]maybe I can survive this Versus thing, after all.[/i]\n\n*page_break\n\n*if (life > 5)\n\t*set mastery +1\n\t*achieve surviveev\n\t*goto seeothers\n*else\n\t*goto seeothers\n\n*label seeothers\n\nAs the adrenaline starts to ebb, however, you feel your limbs begin to shake and you can suddenly taste the coppery tang of blood in your mouth. As you try to decide if this blood belongs to you or the Squirlfrend, your stomach turns and you heave in great, shuddering spasms.\n\nTrying to catch your breath, you lean against the nearest tree trunk. Just as you do, you see figures approaching from the direction of the party cottage—good, at least someone is coming to check on you. Especially since you're finding it harder and harder to breathe….\n\nAs you gasp for breath, your head goes light and the woods start to spin so quickly that you can't stand up. Between your full absorb of ${deathone} and this blowout fight with Empress Vaccus, it's possible that you pushed yourself a little too hard…\n\n…certainly hard enough that passing out face-first into a clump of grass doesn't feel so bad, right about now.\n\n*if masterytwentybonus\n\t*goto endofchaptereight\n*elseif (mastery > 19)\n\t*set masterytwentybonus true\n\t*achieve masterytwentybonusac\n\t*set lifemax +1\n\t*goto endofchaptereight\n*elseif masterytenbonus\n\t*goto endofchaptereight\n*elseif (mastery > 9)\n\t*set masterytenbonus true\n\t*achieve masterytenbonusac\n\t*set lifemax +1\n\t*goto endofchaptereight\n*else\n\t*goto endofchaptereight\n\n*label endofchaptereight\n\n*finish\n\n*label deathsequence\n*page_break\n\nBefore you can even think of making another move, you find your legs giving out from underneath you. As you hit the ground, you can hear a series of hissing snaps and pops crackle across your brain, almost like rubber bands snapping.\n\nThe last thing you see is the Life Meter on your Battlesuite visor suddenly flatlining.\n\n[i]No. Mirrored Matron, no.[/i]\n\nYou've taken too many hits, you haven't been careful enough….\n\n*page_break\n\nAs you feel your body shut down, you are flooded with so many questions. Who is Dhanthik hiding as? Why were you Selected for Versus? What will happen with Lady Venuma's plans? What will become of Mother, Father, and Gilo back on Prisca? \n\nYou won't get to learn the answers to those questions, at least not in this lifetime.\n\nAll you do learn as the last sparks of life sputter through your body is this:\n\nThe most important thing about your life, the one thing that added up to anything, is how you treated others. The legacy you leave remains with those you encountered, and you realize that all that matters in the end is how you allowed these people and these experiences to let you grow.\n\n*page_break\n*achieve deathlesson\n\nYou see it so clearly…growth is everything.\n\nEven if you are now nothing…\n\nGrowth paves the path of the Reborn.\n\nAs you breathe your last breath, you wonder: would you have Grown enough to be worthy?\n\n*ending\n", "v_five": "*comment é\n\n*image chap_5.png\n\n*image e_chap5.png\n\n${blank}\n\n*page_break\n\n\"I thought I said no visitors!\" Breeze scolds the Aye Ayenkeeper crouching next to you, but it just shrugs and scampers away.\n\n\"Oh,\" you say. \"I didn't mean to bother you, I—\"\n\n*if (rlshp_breeze > 54)\n\t\"It's not that,\" Breeze sighs, ${brehis} eyes hitting the floor. \"It's just…Lady Venuma told us to go home until the Voting Ceremony.\"\n\n\t\"Well, I haven't picked a home yet,\" you respond. \"So we're not breaking any rules, technically. Besides, who says Lady Venuma can tell us what to do?\"\n\t*goto lvbexplan\n*else\n\t\"After what you said back at Todrick's, I'm not sure what you mean to do,\" Breeze snaps. \"Besides, Lady Venuma told us to go home until the Voting Ceremony.\"\n\n\t\"Well, I haven't picked a home yet,\" you respond, trying to keep your tone even. \"Besides, who says Lady Venuma can tell us what to do?\"\n\t*goto lvbexplan\n\n*label lvbexplan\n\n\"I say so,\" Breeze answers flatly, crossing ${brehis} arms. \n\n*page_break\n\n*if (rlshp_breeze > 54)\n\t\"Okay, I'm sorry, but is there something going on between the two of you?\" you ask, unable to help yourself.\n\t*goto webefrends\n*else\n\t\"Okay, I'm sorry, but is there something going on between the two of you?\" you ask, trying to seem exasperated. You want to find a way to get Breeze talking, when ${breze} really has no reason to.\n\t*goto webefrends\n\n*label webefrends\n\n\"Lady Venuma and I have become very close friends,\" Breeze says, shifting ${brehis} weight from one foot to the other. \"Not that it's really anyone else's business.\" \n\n*if (kissvenuma) or (wantvenuma)\n\tYou try to feel relieved, considering what has already happened between you and Lady Venuma. However, you can't help but think back to the hello you witnessed between Breeze and Lady Venuma earlier, the one that seemed to be decidedly more than friendly.\n\n\tStill, for now you have to hope that Breeze is telling you the truth. The alternatives are not possibilities you want to consider yet.\n\t*goto firstpers\n*else\n\tHearing this, you can't help but think back to the hello you witnessed between Breeze and Lady Venuma earlier—and how it seemed decidedly more than friendly. Though you suppose it is very possible that this is how Lady Venuma treats every mortal she wants to remain close to.\n\t*goto firstpers\n\n*label firstpers\n\n\"Lady Venuma also happens to be the only person who has my back on Versus,\" Breeze adds, with a bit more force than ${breze} probably intended. \"If I want to survive this place, I have to listen to her.\"\n\nYou then watch as a look of pure fear seizes Breeze's pale blue face, one that sends a chill right through you.\n\n*page_break\n\n\"Mirrored Matron, what has everyone so spooked?\" you ask. \"I know that the Versus Matches must be scary, but who are these Destructives we have to face?\"\n\n*if (rlshp_breeze > 54)\n\t*goto explainunthing\n*else\n\tBreeze just hugs ${brehis} arms across ${brehis} chest, so you figure you probably still need to do some damage control with ${brehir}.\n\n\t\"Maybe if I knew more about things here, I'd be more helpful to you,\" you add, putting on a smile.\n\t*goto explainunthing\n\n*label explainunthing\n\nBreeze forces ${brehir}self to take a deep breath before looking back at you to answer. The fear hasn't entirely left ${brehis} face, but ${breze} does look a bit calmer, at least.\n\n\"Not all of the Destructives are completely terrifying. There's just this one we're all afraid of, at the moment.\" Breeze shudders, forcing ${brehir}self to go on. \"Toward the end of the last cycle, the Destructives kept voting in this…thing. Actually, it was so awful that we actually started calling it the 'Un-Thing.' It killed so many of us in the Versus Matches…no one thinks it can die, not really. We all just hoped it would be Reborn after last cycle. I was supposed to fight it too, until…\"\n\nBreeze stops ${brehir}self there, taking a few moments to collect ${brehis} thoughts once again. $!{Breze} then purses ${brehis} thin lips together, resolving not to speak of it.\n\n\"Anyway, we can't be sure, but Lady Venuma thinks the Un-Thing wasn't Reborn and that the Destructives will vote it into the first Versus Match again. And I…I can't face that monstrosity, ${name}. I just can't.\"\n\n*page_break\n\nYou watch Breeze's entire face fall and you can't stop another shiver from running through you. After all, a part of you knows that someday, perhaps sooner than later, you might have to face something like that in a Versus Match, too. Right now the idea of these Matches is all abstract knowledge posed by relative strangers, but every new detail you acquire rounds out the nightmare of the reality you are inevitably facing. \n\nAt the same time, you can't help but wonder if Todrick deserves to face this nightmare instead of Breeze. You immediately shelve that particular thought, though, knowing it won't get you anywhere constructive right now.\n\n\"Breeze, why have the Elite targeted you?\" you ask, trying to keep the conversation moving. \"What are you not telling me?\"\n\nBreeze looks directly into your eyes, \n*if (rlshp_breeze > 57)\n\tfull of emotion as ${breze} says: \"It's good to know you care.\"\n\n\tYou wait a few beats for Breeze to continue, but ${breze} just falls back into silence. You can tell ${breze} wants to tell you what happened last cycle, but Breeze just bites ${brehis} blue bottom lip and looks away.\n\t*goto thoughstill\n*elseif (rlshp_breeze > 43)\n\tseeming vulnerable as ${breze} says: \"Are you sure you really care?\"\n\n\t\"Yes, I do,\" you say, hoping that Breeze will believe you.\n\n\tYou wait a few beats for Breeze to continue, but ${breze} just falls back into silence. You can tell ${breze} wants to tell you what happened last cycle, but that ${breze} is still deciding whether ${breze} can trust you.\n\t*goto thoughstill\n*else\n\t${brehis} own turning stony as ${breze} says: \"To be honest, I don't think you really care.\"\n\n\t\"Yes, I do,\" you say, hoping that Breeze will believe you. Though from the way Breeze laughs and looks at the wall instead of you, you know you still have more work to do to make up for what happened earlier.\n\t*goto thoughstill\n\n*label thoughstill\n\nIf you're going to get Breeze to tell you what you need to know, you can already tell that you're going to have to play your reaction here perfectly. Right now it's more important to get information out of Breeze than to worry about how your relationship might affect your political affiliations, so you just need to focus on saying the right thing to get Breeze talking.\n\n*choice\n\t#\"Can I come inside and talk with you more…comfortably?\" you say, running your eyes up and down Breeze's body.\n\t\t*if (rlshp_breeze > 54)\t\n\t\t\t*set rlshp_breeze %+30\n\n\t\t\tBreeze smiles, ${brehis} hesitation and fear of the Un-Thing momentarily forgotten as ${breze} matches your gaze. \n\n\t\t\t\"Sure you can,\" Breeze says, holding ${brehis} door open a bit wider. \n\n\t\t\tAs you step inside, you're hit with a pleasant burst of warm air. Hopefully this is just the first sign of more pleasant things to come….\n\t\t\t*goto enterbreezeroom\n\t\t*else\n\t\t\t*set rlshp_breeze %-15\n\n\t\t\tBreeze stares at you, the anger on ${brehis} face growing more intense with every passing second.\n\n\t\t\t\"You really think I'm that easy?\" Breeze finally shoots back. \"Well, think again.\"\n\t\t\t*goto breezewarn\n\t#\"Look, I really want for us to stick together in this, and I hope you agree. But to do that, I need to know what's really going on.\"\n\t\t*if (rlshp_breeze > 43)\n\t\t\t*set rlshp_breeze %+25\n\n\t\t\tBreeze considers this, then raises ${brehis} eyes to meet your gaze with a smile. It appears ${brehis} hesitation and fear of the Un-Thing have been momentarily forgotten.\n\n\t\t\t\"I suppose I could always use some more friends here,\" Breeze says, holding the door open for you to come inside.\n\t\t\t*goto enterbreezeroom\n\t\t*else\n\t\t\t*set rlshp_breeze %-15\n\n\t\t\tBreeze stares at you, taking several seconds to decide how ${breze} wants to respond.\n\n\t\t\t\"Actions speak louder than words,\" Breeze finally says. \"So if you mean that, you're going to have to prove it to me.\"\n\t\t\t*goto breezewarn\n\t#\"Look, I know we may not trust each other yet, but you need my support, right? So can you at least help me understand why?\"\n\t\t*if (rlshp_breeze \u003c 44)\n\t\t\t*set rlshp_breeze %+15\n\n\t\t\tBreeze stares at you, taking several seconds to decide how ${breze} wants to respond.\n\n\t\t\t\"You make a good point,\" ${breze} says, taking another deep breath. Then Breeze steps aside and opens the door a little wider for you to come inside.\n\t\t\t*goto enterbreezeroom\n\t\t*else\n\t\t\t*set rlshp_breeze %-15\n\n\t\t\tBreeze stares at you, the anger on ${brehis} face growing more intense with every passing second.\n\n\t\t\t\"Wow,\" Breeze spits. \"It's good to know you don't trust me, because I trusted you before you said that.\"\n\t\t\t*goto breezewarn\n\t#\"Fine, I don't need you. But I do think you're going to need my support for whatever it is you're trying to accomplish here.\"\n\t\t*if (rlshp_breeze \u003c 44)\n\t\t\t*set rlshp_breeze %-30\n\t\t\tBreeze stares at you, looking both angry and frustrated at the same time. Though ${breze} decides to try and quickly cover this, stepping aside and opening the door wider for you to come inside.\n\n\t\t\t\"No need for us to be so serious,\" Breeze tries to laugh, plastering a fake smile on ${brehis} face. \"You're right, there are actually some things you should know.\"\n\n\t\t\tYou nod at Breeze as you enter, happy to have gotten exactly what you wanted.\n\t\t\t*goto enterbreezeroom\n\t\t*else\n\t\t\t*set rlshp_breeze %-30\n\t\t\tBreeze stares at you, the anger on ${brehis} face growing more intense with every passing second.\n\n\t\t\t\"Well, you're wrong,\" Breeze finally says.\n\t\t\t*goto breezewarn\n\n*label breezewarn\n\nAs Breeze stares you down in the doorway, ${breze} looks frazzled, as if any form of confrontation is unbearable for ${brehir}. Taking another deep breath, ${breze} finally musters the courage to speak again.\n\n\"Just don't get in the way of what Lady Venuma and I are planning,\" Breeze says, trying ${brehis} best to sound menacing through ${brehis} wavering voice. \"You may not know it yet, but we're your only chance to survive here on Versus.\"\n\n*page_break\n\n\"It sounds like my only chance to survive here on Versus is to become a member of The Elite Courte,\" you say, still trying to nudge Breeze into revealing as much as possible.\n\n\"I hate to break it to you, but that's not going to happen,\" Breeze almost laughs. \"And even if you were lucky enough to be chosen somehow, The Elite Courte's days are about to be num—\"\n\nBreeze then closes ${brehis} mouth tightly, realizing ${breze} has probably already said too much. \n\n\"Just do yourself a favor and stay out of our way,\" Breeze finally says, slamming the door in your face.\n\n*page_break\n\nAs you turn away and start to walk down the hall, you can already see how you maybe didn't play your cards exactly right there with Breeze. Still, you at least managed to get some of the information you needed—Breeze didn't say it in so many words, but this confirms that Lady Venuma is obviously planning some kind of coup d'état against The Elite Courte.\n\n*if venumafourclue\n\tYou have no idea if Lady Venuma has the numbers to pull off this coup, considering you've met so few people here on Versus. However, you bet that Lady Venuma must at least think she has enough to do so; otherwise, she'd never be so bold as to reveal her plans to a Newcomer like you, let alone someone as talkative as Breeze. She must know that anyone could rat her out to curry favor with The Elite Courte.\n\n\tThen again, there seems to be little interaction between the Elites and the Ords, so perhaps Lady Venuma is counting on that. Still, it stands to reason that Lady Venuma must have some other Elites ready to leave with her. This all just means that it's going to be very difficult for you to know which side will end up in power, if and when Lady Venuma does make her move.\n\t*goto wheertoside\n*else\n\tLady Venuma was very careful not to tell you about her plans directly, and so was Breeze, in ${brehis} own way. Even if you decided to side with them on whatever move they're planning to make, you'd have no idea if they'd be able to pull it off and protect you. \n\n\tIf you take your slim chances at joining this mysterious Elite Court, however, you still have no idea what kind of influence Lady Venuma still has over its members, despite her true intentions. Or whether it will indeed fall soon, as Breeze intimated.\n\t*goto wheertoside\n\n*label enterbreezeroom\n*page_break\n*set breezeinviteinside true\n*achieve breezeinviteinsideac\n\nYou settle into an oversized armchair in the corner of Breeze's Inn room, which is appropriately swathed in light blues and sand tones. The room feels rather like a beach bungalow, as light and airy as Breeze tries to seem. \n\nAs you take in the room, Breeze sits on ${brehis} plush bed, clearly trying to organize ${brehis} thoughts. You quickly decide that you had better direct the conversation instead.\n\n\"I have a feeling you know what Lady Venuma is planning,\" you start.\n\n\"You mean what Lady Venuma and I are planning,\" Breeze returns, not missing a beat.\n\n\"Of course, I'm sorry,\" you answer. \"So, fill me in. What's really going on?\"\n\n\"If I tell you, you absolutely have to promise to keep it a secret,\" Breeze says, looking very serious as ${breze} holds your gaze.\n\n\"I promise,\" you say, holding up your fist, until you realize that this is a sign of Priscan trust that probably doesn't translate. Indeed, Breeze regards your fist with confusion before taking yet another deep breath.\n\n*page_break\n\n\"So after the whole…after what happened last cycle,\" Breeze begins, \"Queen Ashe ended up deputizing Lady Venuma as the first ever Elite Ambassador to the Ords, to try to…patch things up. That's a pretty big deal, since The Elite Courte members aren't allowed to talk to us Ords once they ascend. Some of them find ways to, but for the most part, it's impossible.\n\n\"So when Lady Venuma visited me recently as part of her Ambassador duties, it was the first time I ever got to speak to her. We were both here last cycle, but when Lady Venuma arrived she was granted automatic Elite status as a Wone goddess, so we never got a chance to interact. Anyway, Lady Venuma and I instantly bonded over how unfair Queen Ashe's Elite system is. And we decided that we want to do something about it.\"\n\n\"Like some kind of coup d'état?\" you ask, still trying to nudge Breeze along. $!{Breze} nods seriously in return, as if ${breze} is communicating the most grave secret in the world. \n\nWhich, given the state of this current world, might actually be true. \n\n*page_break\n\n\"Lady Venuma has only just gotten this Ambassador position,\" Breeze continues, \"so there are still many of us Ords she hasn't met with yet. Actually, that's probably what she's doing right now, trying to make some new connections for us. \n\n\"Anyway, because the first Versus Vote of this cycle is happening this afternoon, Lady Venuma simply hasn't had enough time to gather the numbers we need to disrupt The Elite Courte majority.\"\n\n\"Right, and The Elite Courte majority is planning to vote you in because of…\" you pause, trying to decide how to put this. \"Uh, whatever happened last cycle?\" \n\n\"Yes,\" Breeze answers shortly, deciding once again not to shed any more light on that particular mystery. \"Which is why Lady Venuma and I need Todrick to volunteer in my place. I hate doing that to him more than anything, but he has made it very clear that he would never go against Queen Ashe and her Elites.\"\n\n*choice\n\t#\"And let me guess,\" I add, \"Todrick is the only one gullible enough to fall for something like this?\"\n\t\tYou say the words and immediately regret them, especially as you watch Breeze's entire face tumble into misery.\n\n\t\t\"I already said I didn't like it,\" Breeze scowls. \n\t\t*goto didntlikeit\n\t#\"Does that mean he deserves to die?\" I ask.\n\t\tYou say the words and immediately regret them, especially as you watch Breeze's entire face tumble into misery.\n\n\t\t\"I already said I didn't like it,\" Breeze scowls. \n\t\t*goto didntlikeit\n\t#\"That's…horrible,\" I say.\n\t\tYou say the words and immediately regret them, especially as you watch Breeze's entire face tumble into misery. You meant to sympathize with Breeze's position, not judge it.\n\n\t\t\"I already said I didn't like it,\" Breeze scowls. \n\t\t*goto didntlikeit\n\t#\"It looks like Todrick's devotion will be his downfall….\"\n\t\t\"You're right—if Todrick weren't so blinded by The Wone, maybe things would be different,\" Breeze scowls. \n\t\t*goto didntlikeit\n\n*label didntlikeit\n\"Besides, it was all Lady Venuma's idea, I'd never be clever enough to think up something like that. She and I both adore Todrick, but there's no other way. Lady Venuma made it very clear that it's either going to be me or him. Really, we have The Elite Courte to thank for that.\"\n\nAs Breeze puts on ${brehis} best angry look, you try to process what your next question should be. However, you can't seem to get around the fact that Lady Venuma and Breeze were lying to Todrick, point blank. There is no lofty Elite Courte position waiting for him… \n\n…only an open grave. \n\n*page_break\n\nBefore you can say anything else, Breeze stands up once again, suddenly looking nervous, like ${breze} already regrets telling you so much.\n\n\"The Versus Vote is soon, and I need to get ready. You should too,\" Breeze says, walking toward the door. \"But listen, it's really important that you not tell anyone else about our plans to overturn The Elite Courte, if it's going to work.\n*if (rlshp_breeze > 67)\n\tIt's so good to know you're with us, though. It's definitely your only shot at avoiding the Versus Vote in the future.\"\n\n\tBreeze pauses, ${brehis} eyes seemingly caught in a snag on the floor.\n\n\t\"You know, it's so nice to just have someone normal to talk to. It's been so lonely ever since…well, let's just say I don't get many visitors, nowadays. Save for Lady Venuma.\"\n\n\t*page_break\n\n\tYour mind can't help but wander into thoughts about just what Lady Venuma and Breeze do during these visits, but then Breeze lifts ${brehis} cloudy eyes to yours and something about the connection there is disarming. Gripping.\n\n\t\"And I guess maybe you, now?\" Breeze asks, a hopeful look on ${brehis} face. Without hesitating, you nod and smile in return. \n\n\tBreeze smiles too and approaches to give you a hug. As ${breze} does, you can feel warm air circulating around ${brehis} lean body. Breeze lingers for a moment, holding you close, pushing this hug into potentially new territory. Territory that you can push into as well, if you want….\n\n\t*if (kissvenuma) or (wantvenuma)\n\t\tThough your mind instantly flashes to your last encounter with Lady Venuma, and you can't help but let it color your thoughts on what to do here.\n\t\t*goto kkwbrech\n\t*else\n\t\t*label kkwbrech\n\t\t\n\t\t*choice\n\t\t\t#Kiss Breeze.\n\t\t\t\t*set wantbreeze true\n\n\t\t\t\tYou pull back just far enough for your face to hover in front of Breeze's, your hand still on ${brehis} lower back. $!{Breze} studies your face; up this close to ${brehir}, ${brehis} grey eyes almost seem to glow like stones in a stream.\n\n\t\t\t\tYou lean forward and feel a channel of warm air rush across your body, until…\n\n\t\t\t\t…Breeze suddenly pulls away.\n\n\t\t\t\t*page_break\n\n\t\t\t\t\"Oh,\" you say. \"I'm sorry, I didn't meant to—\"\n\n\t\t\t\t\"No, it's not you, it's just…\" Breeze stammers, taking a step back, out of your arms. \"It's not that I don't want to do this, it's just…could we maybe get to know each other a bit more first? I have a habit of…rushing into things. And there's a lot more to learn about me. I have to remember that. For me, more than anything.\"\n\n\t\t\t\t\"I'd like that a lot,\" you say, smiling through whatever embarrassment or disappointment you feel. Wanting to leave it at that, you step toward the door, giving Breeze an awkward little wave.\n\n\t\t\t\t\"Oh, but ${name}?\" Breeze calls out, causing you to stop and turn around. \"We won't take too long, I promise. Time on Versus is always limited, one way or another.\"\n\n\t\t\t\tYou hit Breeze with another smile, unsure if those words have now made you feel better or worse.\n\t\t\t\t*label wonderven\n\t\t\t\t*if (wantvenuma) or (kissvenuma)\n\t\t\t\t\tAll you do know is that, if you get involved with both Breeze and Lady Venuma, you had better know how to navigate that potentially precarious path….\n\t\t\t\t\t*goto walkthehall\n\t\t\t\t*else\n\t\t\t\t\t*goto walkthehall\n\t\t\t#I want to kiss Breeze, but I want to get to know ${brehir} better before I take that step.\n\t\t\t\t*set wantbreeze true\n\n\t\t\t\tYou pull back just far enough for your face to hover in front of Breeze's, your hand still on ${brehis} lower back. $!{Breze} studies your face; up this close to ${brehir}, ${brehis} grey eyes almost seem to glow like stones in a stream.\n\n\t\t\t\t\"Do you think we can get together again sometime?\" you ask, stepping out of the hug. \"There's a lot I'd like to learn about you, when we have the chance.\"\n\n\t\t\t\tBreeze blinks, as if ${breze} might be disappointed or embarrassed, but then ${breze} recovers with another smile. \n\n\t\t\t\t\"Yes, of course,\" Breeze says. \"I'd really like that.\"\n\n\t\t\t\t*page_break\n\n\t\t\t\tWanting to leave it at that, you step toward the door, giving Breeze an awkward little wave.\n\n\t\t\t\t\"Oh, but ${name}?\" Breeze calls out, causing you to stop and turn back around. \"Don't take too long, would you? Time on Versus is always limited, one way or another.\"\n\n\t\t\t\tYou hit Breeze with another smile, unsure if those words have made you feel better or worse.\n\t\t\t\t*goto wonderven\n\t\t\t#I don't ever want to get involved with Breeze, I just want to keep things friendly.\n\t\t\t\t*set justfriendsbreeze true\n\n\t\t\t\t\"Do you think we can get together again sometime?\" you ask, stepping out of the hug as promptly as you can without being rude. \"I'd really like for us to be good friends.\"\n\n\t\t\t\tBreeze steps away and blinks, as if ${breze} might be disappointed or embarrassed, but then ${breze} recovers with another smile. \n\n\t\t\t\t\"Yes, of course,\" Breeze says. \"I'd really like that, too.\"\n\n\t\t\t\t\"Great, me too,\" you say. Wanting to leave it at that, you step toward the door, giving Breeze an awkward little wave as you go.\n\n\t\t\t\tWell, at least you got the message across.\n\t\t\t\t*goto walkthehall\n*elseif (rlshp_breeze > 52)\n\tIt's so good to know you're with us, though. It's definitely your only shot at avoiding the Versus Vote in the future.\"\n\n\tYou just nod and smile at Breeze as you follow ${brehir} to the door, not needing to confirm or deny any such assumption just yet.\n\n\t\"Thank you, for everything,\" you say, giving Breeze a hug at the door.\n\n\t\"Hey, us Ords have to stick together, right?\" Breeze answers, beaming at you.\n\n\tAs you nod and wave your last goodbye, you know that's precisely the question you need to answer.\n\t*goto walkthehall\n*elseif (rlshp_breeze > 30)\n\tWe may not have started off on the right foot, but you must realize that if you want to avoid the Versus Vote, your only option is to join our secret little group. Us Ords have to stick together, right?\"\n\n\t\"Right,\" you say simply as you follow ${brehir} to the door, not needing to confirm or deny any such affiliations just yet.\n\n\tThough as you nod and wave your last goodbye, you know that's precisely the question you need to answer.\n\t*goto walkthehall\n*else\n\tWe don't have to like each other, ${name}, but you do realize that if you want to avoid the Versus Vote, your only option is to join our secret little group.\"\n\n\tBreeze obviously means this as a threat, but it sounds very thin, coming from ${brehir}. You just nod a silent goodbye at Breeze in return as you make your way out the door. \n\n\tBreeze may feel it necessary to give up all of ${brehis} information, but you don't feel the same need at all.\n\t*goto walkthehall\n\n*label walkthehall\n*page_break\n\nAs you turn and walk back down the cozy Inn hallway, your mind spins: this confirms what Lady Venuma hinted at when you spoke. She is indeed planning some kind of coup d'état against The Elite Courte.\n\nWhich means that you're probably going to have to figure out where you stand very soon.\n\n*if venumafourclue\n\tYou have no idea if Lady Venuma has the numbers to pull off this coup, considering you've met so few people here on Versus. However, you bet that she must at least think she has enough to do so; otherwise, she'd never be so bold as to reveal her plans to a Newcomer like you, let alone anyone as talkative as Breeze. Someone as astute as Lady Venuma must know that anyone could rat her out to curry favor with The Elite Courte.\n\n\tThen again, there seems to be little interaction between the Elites and the Ords, so perhaps Lady Venuma is counting on that. Still, it stands to reason that she must have some other Elites ready to leave with her. She'd need at least twelve to form a tie or a majority against the Elite, and she probably won't gather that from the Ord population alone, from what you've seen.\n\n\tUnfortunately, this all just means that it's going to be very difficult for you to know which side will end up in power, if and when Lady Venuma does make her move.\n\t*goto wheertoside\n*else\n\tLady Venuma was very careful not to tell you about her plans directly, which means that if you decided to side with her and Breeze, you'd have no idea if they'd be able to pull off their plan and protect you. \n\n\tIf you take your slim chances at joining this mysterious Elite Court, however, you still have no idea what kind of influence Lady Venuma still has over its members, despite her true intentions. Or whether it will indeed fall soon, as Breeze intimated.\n\t*goto wheertoside\n\n*label wheertoside\n*page_break\n\nYou had your ideas about what to do before, but that may all have to change now, based on what you've learned. There's so much to consider: do you take the risk of siding with Venuma's potential coup, having no concrete idea whether she can really pull it off? Or do you try to use this information against her to get yourself into The Elite Courte, without knowing who may secretly be on Lady Venuma's side? That's assuming the Elite will even give you a shot to do so, or that the Courte doesn't crumble before you can. \n\nWhatever the political considerations might be, you also must ask yourself whether you can allow Todrick to be manipulated the way he has been. If not, could you really betray Breeze to save him? What's the right thing to do? What's the smart thing to do? Should you just lie low until the correct move presents itself? Or will you be too late if you wait?\n\nBesides, you won't know how honest Lady Venuma is being about all of this until she makes a real move. Blerg, for all you know, she could be faking this little coup just to expose any Elite opposition. That doesn't seem likely, given what you've seen of Lady Venuma's ego, but you suppose you have to consider every possibility.\n\nForcing yourself to focus, you know that you can't lose sight of your ultimate goals here: to survive long enough to take down Empress Vaccus and hopefully learn more about Dhanthik's presence on Binaria. The idea of returning to Prisca to aid your family and answer Mother's call seems so distant now; you feel a burst of homesickness overtake you.\n\n*if (ruthless > 50) \n\tForcing this feeling away, you know that however you decide to handle your relationships and these politics, everything has to be in service of these most important goals.\n\t*goto manyspirallle\n*else\n\tYou try to force this feeling away along with your weariness; you've never been one for politics and find all this rather tiresome. Still, you know that you still must engage, in service of your more important goals. You just have to remember that, for you, engaging means building the right relationships, not playing at political games.\n\t*goto manyspirallle\n\n*label manyspirallle\n\n*page_break Many Spiraling Thoughts Later\n\nYou can't be sure how long you've been sitting on the Inn porch, but you can be sure that the debate raging in your mind has finally crystallized into one sharp point: you need to decide if you're going to allow Todrick to sacrifice himself for Lady Venuma and Breeze. \n\nYou can already tell that this is going to be the most important decision you've had to make on Versus so far, if not one of the most important decisions of your life. One way or another, it's going to signal exactly where you stand as you navigate the deadly political landscape here on Versus.\n\nAs far as you see it, the first path you can take leads you back to Todrick's cottage, where you'd encourage him to volunteer for the Versus Vote. This would be a ruthless move to cement your relationships with Lady Venuma and Breeze, signalling your loyalty to whatever coup they have brewing. You'd also be actively assuring that Todrick dies in the Versus Match, assuming what Lady Venuma and Breeze claim about this deadly \"Un-Thing\" is true.\n\nThe second path also returns you to Todrick's cottage, to dissuade him from volunteering at all. If Todrick listens to you, you'll be throwing your genuine support to The Elite Courte, making clear enemies of Lady Venuma and Breeze—though, again, if what they say about the Un-Thing is true, it sounds like Breeze wouldn't survive the experience. This may be very unpleasant for you in the short term, but when you do finally get to meet the Elite, you'll be able to prove your worth and loyalty by exposing what Lady Venuma tried to do—and show what you did to stop it from happening.\n\n*page_break\n\nOf course, the third potential path leads nowhere at all: you could simply stay put and allow Todrick to make the decision on his own, knowing that he's likely to volunteer under Lady Venuma's encouragement. You figure this inaction could be taken a few ways, depending on how you spin it….\n\nBy allowing Lady Venuma and Breeze to enact their plans to oppose The Elite Courte, you could be silently-but-genuinely endorsing their brewing coup. Conversely, you could also be allowing this to happen only to use it as proof to ruthlessly expose Lady Venuma's treachery to The Elite Courte later.\n\nYou could also just be seen as remaining neutral, allowing you to maintain your relationships until it's time to choose a side. While doing nothing would allow you to more comfortably wait and see where the majority falls, you can be sure that once you do choose a side, your influence will be that much lesser, since you took longer to join.  \n\n*page_break\n\nSo far, you've identified your goal as \n*if joinelite\n\t*if (ruthless > 50)\n\t\tjoining The Elite Courte as ruthlessly as possible,\n\t\t*goto hasthatchanged\n\t*else\n\t\tjoining The Elite Courte as genuinely as possible,\n\t\t*goto hasthatchanged\n*elseif joincoup\n\t*if (ruthless > 50)\n\t\topposing The Elite Courte as ruthlessly as possible,\n\t\t*goto hasthatchanged\n\t*else\n\t\topposing The Elite Courte as genuinely as possible,\n\t\t*goto hasthatchanged\n*else\n\t*if (ruthless > 50)\n\t\tstaying neutral, yet ruthless,\n\t\t*goto hasthatchanged\n\t*else\n\t\tstaying neutral, yet genuine,\n\t\t*goto hasthatchanged\n\n*label hasthatchanged\nbut it appears that now is the time to decide whether to switch goals or truly stay the course.\n\n*if extraworning\n\t\"This is a tough one, Priscy,\" Rosae's voice suddenly sounds. \"What you decide to do here will really lock you in, because you'll be sending a very visible sign. There will be no going back. That said, you should consider your previous actions, the relationships you've built, and what goal they're best suited for. You should do what you think is smartest, but do know that the more erratically you behave, the less effective your actions are. \n\n\t\"Whatever your goal was before, it's most important to keep your current Regime/Rebellion and Ruthless/Genuine tendencies in mind when making this decision.\"\n\t*goto formtime\n*else \n\t*goto formtime\n\n*label formtime\n\nAs the competing options clang around in your head, you realize how impossible this decision seems. The fate of two people may rest in your hands, not to mention your own future on Versus. You wish you had more time to consider and gather information, but the Voting Ceremony is only one hour away—which means that you only have time to make one move.\n\nSo what is it going to be?\n\n*choice\n\t#Convince Todrick not to volunteer for the Versus Vote, going against Lady Venuma and Breeze's wishes.\n\t\t*set todrickdie false\n\t\t*set deathone \"Breeze\"\n\t\t*set liveone \"Todrick\"\n\t\t*set genuineregime true\n\t\t*achieve genuineregimeac\n\t\t*set regime %+30\n\t\t*set ruthless %-30\t\t\n\n\t\tYou may not know this Elite Courte yet, but your gut tells you that your best chance to survive on Versus will be by playing to the existing regime as genuinely as possible.\n\n\t\tWhich means that when these \"Elite Trials\" come around, you need to make sure you stand out. You have to hope that having all this information on Lady Venuma's potential coup and saving Todrick will allow you to do just that. After all, once you go through with this, Lady Venuma will never trust you again. Neither will Breeze…if ${breze} even survives the experience, that is.\n\n\t\tHowever, those will be problems for later. Right now you have to focus on making sure Todrick doesn't volunteer.\n\t\t*if (rlshp_todrick \u003c 50)\n\t\t\tWhich may prove difficult, after your blunder during the meeting earlier. You can only hope Todrick is smart enough to listen to reason.\n\t\t\t*goto masterychecka\n\t\t*else\n\t\t\tYou seemed to make a good impression during your visit earlier, so you're hoping that he is inclined to listen to you now.\n\t\t\t*label masterychecka\n\t\t\t*if (regime > 70) and (ruthless \u003c 30)\n\t\t\t\t*set mastery +5\n\t\t\t\t*goto amphi\n\t\t\t*elseif (regime > 50) and (ruthless \u003c 50)\n\t\t\t\t*set mastery +3\n\t\t\t\t*goto amphi\n\t\t\t*else\n\t\t\t\t*goto amphi\n\t#Convince Todrick to volunteer for the Versus Vote, supporting Lady Venuma and Breeze's advice.\n\t\t*set ruthlessrebellion true\n\t\t*set regime %-30\n\t\t*set ruthless %+30\n\t\t*achieve ruthlessrebellionac \n\n\t\tYou have faith that your best shot at surviving is to stick with Lady Venuma and Breeze. They've been the only people here to reach out to you, but even if they weren't your only option, you have a feeling you'll be able to stay safe with them.\n\n\t\tYou feel terrible for sacrificing Todrick like this, but someone is going to have to fight this battle. If it's going to be Todrick no matter what, you might as well use his sacrifice to your advantage, to solidify your place with Lady Venuma and Breeze. It's a ruthless move in support of their potential coup, but it's the only way you think you'll survive.\n\n\t\tYou just hope this coup of theirs has enough steam to actually get off the ground; otherwise, The Elite Courte will probably not take kindly to your conspiring against them.\n\n\t\tBut that will be a problem for later. Right now you have to focus on making sure you can persuade Todrick to volunteer instead of scaring him off.\n\t\t*if (rlshp_todrick \u003c 50)\n\t\t\tWhich may prove difficult, after your blunder during the meeting earlier.\n\t\t\t*goto masterycheckb\n\t\t*else\n\t\t\tYou seemed to make a good impression during your visit earlier, so you're hoping this task proves to be easy.\n\t\t\t*label masterycheckb\n\t\t\t*if (regime \u003c 30) and (ruthless > 70)\n\t\t\t\t*set mastery +5\n\t\t\t\t*goto amphi\n\t\t\t*elseif (regime \u003c 50) and (ruthless > 50)\n\t\t\t\t*set mastery +3\n\t\t\t\t*goto amphi\n\t\t\t*else\n\t\t\t\t*goto amphi\n\t#Don't visit Todrick, knowing that he will probably volunteer on his own. Then, when the time comes, use this to signal your approval of Lady Venuma and Breeze's potential coup.\n\t\t*set genuinerebellion true\n\t\t*set regime %-30\n\t\t*set ruthless %-30\n\t\t*achieve genuinerebellionac\n\n\t\tYou have faith that your best shot at surviving is to stick with Lady Venuma and Breeze. They've been the only people here to reach out to you, but even if they weren't your only option, you have a feeling you'll be able to stay safe with them.\n\n\t\tYou feel terrible for sacrificing Todrick like this, but someone is going to have to fight this battle. Besides, you may be allowing it to happen, but it's not as if you're the one pulling the strings here. You're genuinely supporting Lady Venuma and Breeze's potential coup, since that's the only way you think you'll survive. You wish Todrick had chosen to side with the rebellion too, but his devotion to this Queen Ashe seems complete.\n\n\t\tYou just hope this little coup of theirs has enough steam to actually get off the ground; The Elite Courte members will definitely not take kindly to your conspiring against them, especially since you were at the meeting where Todrick was convinced to volunteer and you didn't stop it. Perhaps that's another reason Lady Venuma wanted you there—you're culpable, now. But that's fine: you've made your choice.\n\n\t\t*if (regime \u003c 30) and (ruthless \u003c 30)\n\t\t\t*set mastery +5\n\t\t\t*goto amphi\n\t\t*elseif (regime \u003c 50) and (ruthless \u003c 50)\n\t\t\t*set mastery +3\n\t\t\t*goto amphi\n\t\t*else\n\t\t\t*goto amphi\n\t#Don't visit Todrick, knowing that he will most likely volunteer on his own. Then, when the time comes, use this information to expose Lady Venuma and get in with The Elite Courte.\n\t\t*set ruthlessregime true\n\t\t*set regime %+30\n\t\t*set ruthless %+30\n\t\t*achieve ruthlessregimeac\n\n\t\tYou may not know this Elite Courte yet, but your gut tells you that your best chance to survive on Versus will be by playing to the existing regime as ruthlessly as possible.\n\n\t\tWhich means that when these \"Elite Trials\" come around, you need to make sure that you stand out. Especially since you were present at the meeting to manipulate Todrick into volunteering. When the time comes, you'll have to make sure it's clear that you always planned to rat out Lady Venuma, otherwise you'll seem guilty by association.\n\n\t\tPlus, assuming Lady Venuma is telling the truth, removing Todrick from the equation will also open up a spot in the Elite Trials for you to take. You just hope you'll get the chance to participate, because once you do this, Lady Venuma and Breeze will never trust you again.\n\n\t\t*if (regime > 70) and (ruthless > 70)\n\t\t\t*set mastery +5\n\t\t\t*goto amphi\n\t\t*elseif (regime > 50) and (ruthless > 50)\n\t\t\t*set mastery +3\n\t\t\t*goto amphi\n\t\t*else\n\t\t\t*goto amphi\n\t#Don't visit Todrick so that I can stay neutral and make my move later.\n\t\t*set officiallyneutral true\n\t\t*achieve officiallyneutralac\n\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+30\n\t\t\t*goto neutdi\n\t\t*else\n\t\t\t*set ruthless %-30\n\t\t\t*label neutdi\n\n\t\t\tYou may feel terrible for allowing Todrick to sacrifice himself like this, but someone is going to have to fight this battle. Besides, you may be allowing it to happen, but you're not the one pulling the strings. If you did interfere, you'd just be sacrificing Breeze instead.\n\n\t\t\tIt may be impossible to delay picking sides in the coming conflict for long, but there's no need to stick your neck out right now. Letting things be allows you to talk your way into or out of anything, as the politics continue to unfold. Besides, if you make the wrong decision now, before you know enough, you could be dooming yourself. \n\n\t\t\tThough you must keep in mind that, simply by being present at the meeting earlier, you might seem guilty by association when it comes to Todrick volunteering and Lady Venuma's coup. You'll also have to be careful not to wait too long for another reason: the longer you take to choose a side, the less influence you'll have once you do.\n\t\t\n\t\t\t*if (stayneut) and ((regime \u003c 70) and (regime > 30))\n\t\t\t\t*set mastery +5\n\t\t\t\t*goto amphi\n\t\t\t*elseif (regime \u003c 70) and (regime > 30)\n\t\t\t\t*set mastery +3\n\t\t\t\t*goto amphi\n\t\t\t*else\n\t\t\t\t*goto amphi\n\n*label amphi\n*set fourisgoalsreveal false\n*set fiveisgoalchosen true\n\nYou do know one thing, above all else—that no one, especially Lady Venuma, expected you, a small-planet nobody, to play such an integral role in the Versus proceedings. You can't believe it yourself, how you're navigating this new reality so deftly….\n\nYou just hope that you're making a decision you won't regret later.\n\n*page_break One Excruciating Hour Later\n\nYour eyes don't know where to look first. \n\nWhen one of the Aye Ayes insisted on escorting you away from the Versus Village, you figured that it wanted to take you to this Voting Ceremony you'd been told about. However, you did not figure that you'd end up someplace quite so…grand.\n\nThe Aye Aye led you down a path across the lake from the farm cottages and, after climbing several rolling hills, you came upon a hidden inlet of lake water set against a swath of emerald trees. Despite the shimmering sight, your eyes were immediately drawn up to a gleaming amphitheater floating high above the water. It looked like some ancient, crumbling coliseum gilded and silvered, set atop dozens of whining turbine engines. \n\nYou thought it was the most impressive sight you'd ever seen—until you entered the amphitheater.\n\n*page_break\n\nYou stand there now, frozen in place with your jaw hanging open.\n\nUnderneath your feet is a floor of clear glass, which shows the lulling waters of the lake hundreds of feet below. Above you stand pillars of solid gold, lined with bronze statues of grand figures, likely paying homage to important Versus legends. \n\nBelow these statues, rows of silver thrones are arranged around a wide-set stage. A tinted glass skybox hangs above the thrones; though you suppose that \"hangs\" is not quite the right word, since the opaque skybox seems to hover on its own power.\n\nThe metallics of the structure all gleam and shine off of the setting sun so brightly that you have to darken your Battlesuite visor to Sunshade Mode. Once you do, you are able to see that there are already several figures sitting on some of the silver thrones.\n\n*page_break\n\nYou spot Breeze first, fidgeting to get comfortable on ${brehis} throne. $!{Breze} looks up and spots you in the entrance, and as ${breze} does,\n*if wantbreeze\n\t${brehis} whole face lights up. Breeze smiles and nods at you, but ${breze} doesn't move to say hello or speak, for some reason.\n\t*goto lookaroundnow\n*elseif (rlshp_breeze > 67)\n\t${breze} smiles at you, then nods. However, Breeze doesn't move to say hello or speak, for some reason.\n\t*goto lookaroundnow\n*elseif (rlshp_breeze > 30)\n\t${breze} nods at you, but doesn't move to say hello.\n\t*goto lookaroundnow\n*else\n\t${breze} quickly looks in the other direction. \n\t*goto lookaroundnow\n\n*label lookaroundnow\n\nYou look around and find that everyone else gathered here is sitting on their silver thrones quietly, keeping to themselves. There must be some protocol you should probably figure out, but you're too distracted by the readouts that appear as you scan the amphitheater. \n\n*label amphichoice\n*choice\n\t*disable_reuse #Pinkuju.\n\t\t*goto pinkujuread\n\t*disable_reuse #Baron Airon.\n\t\t*goto aironread\n\t*disable_reuse #Grog.\n\t\t*goto grogthrone\n\t#I'm done reviewing the amphitheater readouts.\n\t\t*goto awklinger\n\n*label pinkujuread\n*set meetpinkuju true\n\nLooking to the right of Breeze, you recognize Pinkuju, the racer from the Arrival Runway who Breeze met at the Inn last night.\n\n[b]NAME:[/b] Shiro Demon / \"Pinkuju\"\n*line_break\n[b]SPECIES:[/b] Human\n*line_break\n[b]HOME PLANET:[/b] Resu\n*line_break\n[b]ABILITIES:[/b] Weapons Expertise, Racing Expertise, Martial Arts Expertise\n\nPinkuju's helmet is off now, and her long black hair is tied in two pigtails with pink bands. Her pale face is accented with bright pink lips and pink eye shadow painted over her oblong eyes, which also sport pink contact lenses. Pinkuju still wears her black-and-pink-striped racing suit, but with her helmet off she looks much younger than you expected. For someone so young, she still somehow commands the presence of an old soul. \n\nYou then take in the circle on Pinkuju's chest, which is split into black and pink havles, and start to realize that her entire persona seems built upon contrasts: a deadly doll, a wise youth, an honorable grifter. As you study her face, she catches your eye and winks at \n*if attractedtowomen\n\tyou. You smile back at her, surprised by the blush that finds its way onto your cheeks.\n\t*goto nextthroneb\n*else\n\tyou, so you nod politely and break eye contact.\n\t*goto nextthroneb\n\n*label nextthroneb\n*page_break\n\nMoving on to the next throne, you find a male figure sitting bolt upright. He wears a head-to-toe black bodysuit with some strange blurred quality to it. The suit almost looks stormy, flowing and rippling across the edges of the man's body. You can decipher nothing else distinct about him, except that he has large, broad shoulders and an impressive display of coiled muscles underneath the fluid suit.\n\n[b]READOUT UNAVAILABLE[/b]\n\nYou wonder what it is about this man that keeps him shrouded from your OtherBoard senses. Would he also be able to block your absorb powers, somehow? Whoever he is, he sits perfectly still, remaining infinitely creepy.\n\nThen, in the same instant, the shadowy suit shifts into the form of a crouched panther, strong and majestic. Its yellow eyes seem to pierce your very soul, before they suddely melt into the rounded, beady eyes of a massive vulture, its black beak open and ready to devour.\n\nYou nearly scream, but one blink later, the shape resets to that of a normal man. Feeling freaky and intensely uncomfortable, you decide to shift your eyes around to someone else, before the shrouded figure changes shape yet again. \n*goto amphichoice\n\n*label aironread\n*set meetairon true\n\nIn the next throne, you recognize the avian floating man from the Arrival Runway. He hovers just above his chair, sitting cross-legged and scowling.\n\n[b]NAME:[/b] Baron Airon VI\n*line_break\n[b]SPECIES:[/b] Humanoid-Avian Crossbreed\n*line_break\n[b]HOME PLANET:[/b] Blarfngard\n*line_break\n[b]ABILITIES:[/b] Flight, Speed, Avian Qualities\n\nBaron Airon's beady eyes meet yours as you study his beak-like nose and feathery black hair. You can't help but glimpse down at Airon's nearly naked body, especially since the ornate midsection cover he wears hangs a bit lower than when last you saw him, revealing a row of abdominal muscles cutting through his brown skin. \n*if attractedtomen\n\tBeads of sweat collect underneath the dark hair on his chest, causing his skin to glisten against the metallics.\n\n\tLooking up, you see that Airon stares back at you, his scowl fading slightly. You hold eye contact for several seconds, until the intensity of his gaze becomes too intense for you. Is he…interested?\n\t*goto amphichoice\n*else\n\tYou notice that Baron Airon's scowl grows wider as you look at him, so you decide to keep moving along.\n\t*goto amphichoice\n\n*label grogthrone\n*set meetgrog true\n\nThe next throne holds, or at least attempts to hold, the pale creature from the Arrival Runway. It has no hope of fitting inside the confines of the throne, so it sits lopsided with displaced limbs, keeping its eyes firmly fixed on the floor. You can hear its heavy, labored breaths all the way from here.\n\n[b]NAME:[/b] Slave #29 / \"Grog\"\n*line_break\n[b]SPECIES:[/b] Groogian\n*line_break\n[b]HOME PLANET:[/b] Blarfngard\n*line_break\n[b]ABILITIES:[/b] Durability, Strength, Resilience, Retractable Shellback\n\nYour eyes fall over Grog's ragged tunic down to its giant, callused fingers, which you are surprised to find are delicately manicured with intricate designs—designs that seem to match Baron Airon's midsection cover. You could tell on the Arrival Runway that Baron Airon and Grog seemed to be from the same planet, but you now also recognize Blarfngard as the fantastical planet where Todrick hails from.\n\nYou wonder if they all know each other, but when you shift your eyes to the final occupied throne, you see that Todrick is sitting there with his eyes closed tightly, crinkling the freckles on his cheeks.\n*goto amphichoice\n\n*label awklinger\n\nSince it is becoming increasingly awkward for you to linger in the entranceway without any introduction, you figure you should probably take a seat on your own throne. As you try to discern if one might be assigned specifically to you, you realize that there are still six empty thrones. That makes twelve thrones in total down here, so you deduce that this must be the Ord Section of the amphitheater. \n\nWhich means that that tinted glass skybox floating above you all must hold The Elite Courte. Of course they've found a way to remain elevated and separated, looking down on the rest of you from their secluded inner circle. You know Lady Venuma and A-08 must be up there, along with that \"Queen Ashe\" ruler, but you can barely fathom who the other nine Elite Courte members might be. \n\nWhoever—or whatever—they are, you would bet that your own wildest imaginings couldn't rival the reality of the power and diversity contained in that singular tinted skybox.\n\n*page_break\n\nAs you head for one of the remaining empty thrones, you wonder where the other five missing Ords might be. Could OtherBoard still be rebooting from your full absorb, or does she avoid these ceremonies anyway? You figure that's yet another question you can ask her later when you return to her camp, since you hope to MemoryTravel again tonight—whether OtherBoard has restarted herself or not. \n\nYou also note that \n*if fighthumm\t\n\tCel and Trig are missing.\n\t*goto prhapsthey\n*else\n\tthe two soldiers from the landing strip aren't here. \n\t*goto prhapsthey\n\n*label prhapsthey\nPerhaps they're keeping a low profile, or could it be that no one has told them about the Voting Ceremony yet? You wouldn't necessarily have known if Lady Venuma and Breeze hadn't filled you in, so you figure it's possible that they don't even know enough to be here.\n\nThat still leaves two thrones: one for the last Ord you haven't yet encountered and one for Empress Vaccus. You have considerable trouble thinking of Empress Vaccus as a \"Constructive\" being, though you suppose you should reserve judgment until you learn more about what these categories really mean. You suppose that \"Constructive\" doesn't necessarily have to mean \"good,\" nor does \"Destructive\" necessarily imply evil. After all, there are ways to be constructive that are devastating, like the murderous conversions that fuel the Blots' ever-expanding, parasitic population. Similarly, there are ways to be destructive that could be considered positive, like the fiery rebirth of a phoenix rising from its own ashes.\n\nAt any rate, you've been so busy deciding what to do about Lady Venuma, Breeze, and Todrick that it hadn't occurred to you what you'd do if Empress Vaccus actually showed up here. Thinking of it now, a fresh wave of fear rattles your body—you haven't had much time to consider how lucky you were to survive your encounter with the Blot General. You feel your skin crawl at the thought of facing it again—if Empress Vaccus were ever to get the best of you, you can be sure that your bloody insides will adorn its chest and the roots of your shattered teeth will slurp through its blackened lips like strands of spaghetti.\n\nShaking these horrendous visions off, you think that you should probably give some thought to how you hope to handle Empress Vaccus in the future, to avoid this grim fate.\n\n*choice\n\t#I need to focus on finding out information about Dhanthik, since Ze is the key to ending this war in every way. If I do that, Empress Vaccus won't be able to stop me.\n\t\t*set forceful %-5\n\t\t*goto onelastempty\n\t#I need to find a way for everyone to vote Empress Vaccus into the Versus Match sometime soon. If this Un-Thing really is as nasty as everyone says, maybe it will kill Empress Vaccus too.\n\t\t*set forceful %+5\n\t\t*goto onelastempty\n\t#If they really are as powerful as they claim, I need to enlist the help of these Wone to destroy Empress Vaccus.\n\t\t*set solo %-5\n\t\t*goto onelastempty\n\t#I still want to fight Empress Vaccus myself, perhaps even with some absorbed powers to even out the odds.\n\t\t*set solo %+5\n\t\t*goto onelastempty\n\n*label onelastempty\n\nIf you do manage to somehow prevent Empress Vaccus from returning to its Blot hordes, perhaps Prisca might stand a real chance of reclaiming freedom. Even now, you hope its absence has allowed Mother, Father, and Gilo to turn the tides against a now-unorganized Blot army. Then again, for all you know, some Blotboc might have already risen to warm Empress Vaccus's cold throne. As unpleasant as this thought may be, you allow it to remind you that your fight here against Empress Vaccus must remain urgent as ever.\n\nShelving this thought for now, you glance over the other empty Ord thrones and wonder: what happens if they aren't here to cast their votes? Suddenly it makes sense why Queen Ashe isn't necessarily in a rush to hold the Elite Trials for the thirteenth member and why Lady Venuma is delaying—with the Ords this scattered, there's no way they could gather twelve votes to rival The Elite Courte's unified block of votes in time.\n\nYou decide to pick an empty throne that faces Todrick, settling into the cool silver with surprising comfort. You fidget a bit to sit up straight, wanting to seem as dignified as possible, when Todrick finally reopens his eyes. He spots you first, but like everyone else, he doesn't say anything. Instead, he just nods at you knowingly. \n\n*if genuineregime\n\tOnce you made up your mind to visit Todrick, you went straight back to his cottage—just in time to see Lady Venuma once again taking flight from the front lawn. Luckily she didn't see you as you approached, which means she must think that she was the only one to return to have the last word with Todrick about his decision.\n\n\tYou instantly realized that this would now make your task that much \n\t*if (rlshp_todrick \u003c 50)\n\t\tharder, especially since Todrick felt he had no reason to trust you. How could your word possibly hold up against one of Todrick's so-called goddesses?\n\n\t\tHowever, \n\t\t*goto layitallout\n\t*else\n\t\tharder. How could your word possibly hold up against one of Todrick's so-called goddesses? It became clear that Todrick had his own suspicions and doubts once you reentered, however, so he still seemed inclined to trust you. \n\n\t\tThen, \n\t\t*label layitallout\n\t\twhen you laid out all you had learned about Lady Venuma and Breeze's true plans, Todrick was stunned—and furious. He asked you to leave so he could use what little time he had left to think. You can't be certain what he'll decide to do, but you are certain that your words ended up holding weight with Todrick.\n\n\t\t*set rlshp_todrick %+50\n\t\t*goto emptyseats\n*elseif ruthlessrebellion\n\tOnce you made up your mind to visit Todrick, you went straight back to his cottage—just in time to see Lady Venuma taking flight from the front lawn. She must have returned to have the last word with Todrick on his decision, which meant that your task would be that much easier.\n\n\t*if (rlshp_todrick \u003c 50)\n\t\tEven though you didn't leave things with Todrick on the best not
