e, you were able to lay out all the reasons you thought he should trust Lady Venuma based on what you had learned since your meeting. \n\t\t*goto layitalloutruth\n\t*else\n\t\tEspecially since Todrick still seemed inclined to trust you.\n\t\t*label layitalloutruth\n\t\tIt didn't take much encouragement to convince Todrick that volunteering would be in his best interest in the long run. \n\n\t\tYou know this is an outright lie, but still, the situation should end up being a win-win-win for you, in terms of your relationships with Lady Venuma, Breeze, and even Todrick—for however much longer he may be alive.\n\n\t\t*set rlshp_todrick %+15\n\t\t*goto emptyseats\n*else\n\tSince you chose not to visit Todrick again before the Versus Vote, you're still not sure exactly what he plans to do. You'd bet that Lady Venuma returned on her own before the ceremony to have the last word on Todrick's choice, but you suppose you'll have to wait and see what he decides to do along with everyone else.\n\t*goto emptyseats\n\t\t\n*label emptyseats\n*page_break\n\nYour thoughts on this matter are interrupted, however, as a wide sheet of water suddenly begins to fall from the center of the amphitheater stage into the lake below. As the sheet becomes solid, a beam of light is then projected onto it, turning the waterfall into a kind of liquid screen. The beam of light shines from seemingly nowhere, projecting a unique symbol: two overlapping letter V's. You wonder if this is somehow the official seal of the Verses, or Versus, or both, since you also remember seeing it on the map that—\n\n\"Voting will commence in two minutes,\" a new voice sounds from all directions, timed perfectly with the symbol's appearance. Hearing it makes your ears hot, like the voice is somehow scorching your insides. It fills you up with a strange burning feeling, one that also feels dangerously…bright. You immediately decide that the voice must belong to this Queen Ashe everyone has been talking about.\n\n\"The Elite Courte has convened, as is our sacred duty on Versus,\" Queen Ashe's voice rings again, sounding at once ethereal and superdense. \"As is our way, we shall deliver to you our solemn decision without unnecessary delay. \n\n\"It is our collective and unified opinion that the next brave warrior to enter the Versus Match will be…\" \n\n*page_break\n\n\"Jess Damon, our beloved Breeze of Millennith.\"\n\nAs Queen Ashe's words ring throughout the amphitheater, you look over at Breeze and find that ${breze} appears anything but beloved right now. Breeze can't even muster a fake smile to place on ${brehis} face—${breze} doesn't even attempt to feign surprise, as you might have expected ${brehir} to.\n\n\"We encourage all of you respected Ords to join in our celebration of Breeze,\" Queen Ashe adds, her voice seeming to take on new tones and reverberations as it rings out. \"As always, we extend an invitation to any willing volunteers who wish to fight in Breeze's stead.\"\n\nAs Queen Ashe's voice turns into a mighty echo, you turn to Todrick and suddenly find yourself holding your breath. \n\nIt's apparently now or never—so what is he going to do?\n\n*page_break\n\n*if todrickdie\n\t\"There is,\" Todrick says, standing from his throne. You can tell from here that his entire body is shaking, but he struggles to hide it by clasping his hands tightly together.\n\n\t\"=Signals devotion= and =aches desire= to be worthy of joining The Elite Courte,\" Todrick announces, raising his voice, which sounds thin and tinny against the metal amphitheater, especially compared to Queen Ashe's. \"As such, =volunteers willingness= to enter Versus Match and =offers praise= to the mighty Queen Ashe.\"\n\n\tOnce Todrick is done speaking, there is a tense stretch of silence. You take the chance to study the others as the silence trudges along, and if anyone else is upset or surprised by this turn of events, they don't seem to show it. You're so intent on studying their varied placid faces that you nearly jump as Queen Ashe's voice returns with a booming resonance.\n\n\t\"Although The Elite Courte offers the ultimate wisdom to its subjects, we also possess infinite reserves of respect for their wishes. As such, Todrick Tumpkin of Blarfngard, you have the support of The Elite Courte and the full blessing of The Wone to enter this first Versus Match.\"\n\n\t*if (ruthlessrebellion)\n\t\tAs Queen Ashe's sentence is passed, you can't help but feel a ripple of guilt. This feeling only intensifies as Todrick locks eyes with you, nodding solemnly. You nod back at Todrick, knowing that this exchange will certainly help signal your added role in this turn of events to Lady Venuma and Breeze. \n\n\t\tHowever, for better or worse, it also signals to everyone else that you had a hand in Todrick volunteering.\n\t\t*goto ayevote\n\t*else\n\t\tAs Queen Ashe's sentence is passed, you can't help but feel a ripple of guilt. While you may not have had a hand directly in making this happen, you didn't do anything to stop it, either. Though you suppose that's a feeling you may have to start getting used to, here on Versus….\n\t\t*goto ayevote\n*else\n\tTodrick remains seated on his silver throne as the seconds tick by, his hands folded in his lap and his eyes glued to the floor.\n\n\tNot too far away, you watch as Breeze blazes a hole through Todrick with ${brehis} stormy stare, as if willing him to speak. You imagine Lady Venuma is doing much the same in The Elite Courte skybox, but you know now that Todrick isn't going to volunteer.\n\n\t[i]Good for him,[/i] you think. Especially since this move is a direct result of your own advice. You think you might even get away with keeping your meeting secret… \n\n\t…until Todrick raises his eyes and looks directly at you, nodding solemnly.\n\n\t*page_break\n\n\tYou know Todrick requires a show of solidarity to go through with this bold refusal, so you nod back. \n\n\tYou refuse to look over at Breeze again after doing so, however, knowing that ${breze} must be staring daggers at you now. [i]Good,[/i] you think. You want Lady Venuma and Breeze to be angry: it'll only be more ammunition you can use against them later.\n\n\t\"In that case, The Elite Courte grants Breeze their full support in the Versus Vote,\" Queen Ashe concludes. \"May Breeze fight in the Versus Match with the full blessing of The Wone.\"\n\t*goto ayevote\n\n*label ayevote\n*page_break\n\nJust then, a holographic tablet hovers in front of your hands. Above it, a one-minute countdown timer begins ticking. You wonder if this holo-tablet appears for everyone on Versus, whether you're at the amphitheater or not, but this thought is quickly interrupted as a question prompt appears:\n\n*if todrickdie\n\t[b]Do you wish to join The Elite Courte in voting for Todrick Tumpkin?[/b]\n\t*line_break\n\t[i]All votes are anonymous.[/i]\n\n\tSeeing this, a thought occurs to you: you could potentially use your vote to stir up some confusion or direct attention elsewhere. As the thought settles, though, you realize that you only have a few seconds to decide—which is perhaps one of the reasons Queen Ashe has decided to make these proceedings so speedy.\n\n\t*choice\n\t\t#Stick to the plan and vote for Todrick.\n\t\t\tWithout another moment of thought, you select the [i]Yes[/i] option on this prompt, casting your vote for Todrick. As you do, you wonder whether Lady Venuma is right or wrong about Todrick's chances against the Un-Thing, whatever it is….\n\n\t\t\tYou are then hit with a moment of surreality: how in all Fathers Below did this become your life? You just cast a vote for someone to enter a death match they most likely won't survive. Nothing about this feels fair. Though however you feel, you suppose there's no use in wasting energy raging against it. If you can't beat it, you might as well join it, for now.\n\n\t\t\tSo as you wait for the countdown timer to run out, you can't help but think: \n\n\t\t\t[i]One vote down, twenty-three to go.[/i]\n\n\t\t\t*page_break\n\n\t\t\tOnce the voting time expires, the holo-tablet rearranges itself to reveal the immediate outcome of the Versus Vote. [i]Well, that's rather elegantly and ruthlessly efficient,[/i] you think.\n\n\t\t\t[b]OtherBoard:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Empress Vaccus:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Burnbone:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Royal A-08:[/b] 2 Votes\n\t\t\t*line_break\n\t\t\t[b]Todrick Tumpkin:[/b] 19 Votes\n\n\t\t\t[b]VERSUS MATCH ENTRANT:[/b] Todrick Tumpkin\n\t\t\t*achieve todrickvol\n\t\t\t*goto fallouttime\n\t\t#Vote for Empress Vaccus, to put it on everyone's radar as a threat.\n\t\t\tYou know Todrick will be going in no matter how you vote, but if you're going to make a pitch against Empress Vaccus in the future, you want to show everyone that you've always been committed to taking it down.\n\n\t\t\tSo you quickly select the [i]No[/i] option on the question prompt and instead fill in Empress Vaccus's name.\n\n\t\t\tAs you do, you wonder whether Lady Venuma is right or wrong about Todrick's chances against the Un-Thing, whatever it is…. \n\n\t\t\tYou are then hit with a moment of surreality: how in all Fathers Below did this become your life? You just cast a vote for someone to enter a death match they most likely won't survive. Nothing about this feels fair. Though however you feel, you suppose there's no use in wasting energy raging against it. If you can't beat it, you might as well join it, for now.\n\n\t\t\tSo as you wait for the countdown timer to run out, you can't help but think: \n\n\t\t\t[i]One vote down, twenty-three to go.[/i]\n\n\t\t\t*page_break\n\n\t\t\tOnce the voting time expires, the holo-tablet rearranges itself to reveal the immediate outcome of the Versus Vote. [i]Well, that's rather elegantly and ruthlessly efficient,[/i] you think.\n\n\t\t\t[b]OtherBoard:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Burnbone:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Empress Vaccus:[/b] 2 Votes\n kfire. And if that's not a good thing, you can just deny that you ever cast the vote.\n\n\t\t\tSo you quickly select the [i]No[/i] option on the question prompt and instead fill in Todrick's name. \n\n\t\t\tAs you do, you wonder whether Lady Venuma is right or wrong about Breeze's chances against the Un-Thing, whatever it is….\n\n\t\t\tYou are then hit with a moment of surreality: how in all Fathers Below did this become your life? You just cast a vote for someone to enter a death match they most likely won't survive. Nothing about this feels fair. Though however you feel, you suppose there's no use in wasting energy raging against it. If you can't beat it, you might as well join it, for now.\n\n\t\t\tSo as you wait for the countdown timer to run out, you can't help but think: \n\n\t\t\t[i]One vote down, twenty-three to go.[/i]\n\n\t\t\t*page_break\n\n\t\t\tOnce the voting time expires, the holo-tablet rearranges itself to reveal the immediate outcome of the Versus Vote. [i]Well, that's rather elegantly and ruthlessly efficient,[/i] you think.\n\n\t\t\t[b]OtherBoard:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Burnbone:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Empress Vaccus:[/b] 1 Vote\n\t\t\t*line_break\n\t\t\t[b]Todrick Tumpkin:[/b] 2 Votes\n\t\t\t*line_break\n\t\t\t[b]Royal A-08:[/b] 2 Votes\n\t\t\t*line_break\n\t\t\t[b]Breeze:[/b] 17 Votes\n\n\t\t\t[b]VERSUS MATCH ENTRANT:[/b] Breeze\n\t\t\t*achieve breezevol\n\t\t\t*goto fallouttime\n\n*label fallouttime\n\nAnalyzing the votes, you quickly deduce that it must be possible to vote for yourself, given the number of singular votes from the absentee Ords. Not only that, it seems likely that if you abstain from voting, as OtherBoard and Empress Vaccus must have, a self-vote is automatically cast against you. Is that what this mysterious Burnbone did as well? And who were the two to cast votes against Royal A-08? You'd bet that—\n\nThis thought is interrupted, however, as the waterfall screen suddenly stops flowing.\n\n*page_break\n\nThe tinted Elite Courte skybox suddenly begins to rise higher into the sky. It appears that The Elite Courte knows that the outcome of the Vote will always be a foregone conclusion, so they don't need to stick around for any more formal announcements.\n\nWithin seconds, the tinted skybox has glided away from the amphitheater and toward The Elite Courte Castle looming on the horizon. All of the other Ords start standing up, and you notice that the hover-platform that brought you up to the amphitheater has returned.\n\nIt looks like your very first Voting Ceremony is over, just like that. As you realize this, you  \n*if genuineregime\n\timmediately brace yourself for an encounter with Breeze. You're sure that ${breze} is going to have nothing but rage for you and Todrick….\n\n\t*choice\n\t\t#Try to avoid Breeze by exiting with Todrick.\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+5\n\t\t\t\t*goto orbtrack\n\t\t\t*else\n\t\t\t\t*set ruthless %-5\n\t\t\t\t*goto orbtrack\n\t\t#Just deal with Breeze directly—why delay the inevitable?\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+5\n\t\t\t\t*goto orbtrack\n\t\t\t*else\n\t\t\t\t*set ruthless %-5\n\t\t\t\t*goto orbtrack\n\t\t#Introduce myself to one of the other new Ords—I'd love to learn more about them and the planets they come from.\n\t\t\t*set growth +2\n\t\t\t*goto orbtrack\n\t\t#I don't want to talk to anyone—I just want to get out of here. \n\t\t\t*set growth -1\n\t\t\t*set solo %+10\n\t\t\t*goto orbtrack\n\n*else\n\ttry to decide who you should talk to as you exit. \n\n\t*choice\n\t\t#\"Congratulate\" Todrick.\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+5\n\t\t\t\t*goto orbtrack\n\t\t\t*else\n\t\t\t\t*set ruthless %-5\n\t\t\t\t*goto orbtrack\n\t\t#Talk to Breeze again. \n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+5\n\t\t\t\t*goto orbtrack\n\t\t\t*else\n\t\t\t\t*set ruthless %-5\n\t\t\t\t*goto orbtrack\n\t\t#Introduce myself to one of the other new Ords—I'd love to learn more about them and the planets they come from.\n\t\t\t*set growth +2\n\t\t\t*goto orbtrack\n\t\t#I don't want to talk to anyone—I just want to get out of here. \n\t\t\t*set growth -1\n\t\t\t*set solo %+10\n\t\t\t*goto orbtrack\n\n*label orbtrack\n*set meetoli true\n\nAs soon as you decide this, you find yourself suspended in a glass orb, rolling down a bright red track. Completely disoriented, you try to gain your bearings, but all you see are rolling and twisting sets of tracks in primary colors, all with life-size clear marbles rolling along.\n\nWhat the blerg? Where are you? How many times can you be transported in one blerging—\n\n\"Sorry for the jarring transition, but we don't have much time.\"\n\nYou look across the giant marble and find a person sitting there on a bench, against a setting of plush pillows. That's when you realize you're sitting on a plush bench as well, and it keeps you suspended level as the marble exterior rolls around you. This is why you must feel perfectly still, despite the marble's constant rolling.\n\n\"I had to pull your consciousness away to the brainplane while Queen Ashe was distracted, which never lasts for long. I have some questions for you.\"\n\n*page_break\n\nThe person stares back at you, completely calm, ${olihis} green eyes slightly obscured by ${olihis} glasses. The first thing you notice about ${olihir} is that ${olize} wears \"normal\" clothes, at least normal for you: jeans, boots, and a sweater. All simple, but still stylish and flattering. You had become so used to goddess gowns and racing stripes and even your own Battlesuite fatigues, you had almost forgotten what casual clothes look like.\n\nDespite your insane surroundings, the sight immediately feels like…home. A warm feeling washes over you, something foreign yet familiar at the same time.\n\n\"I know this is a lot to take in, but speaking would really help here,\" ${olize} quips.\n\nJust then, you notice another one of OtherBoard's standard readouts has appeared:\n\n[b]NAME:[/b] Oli\n*line_break\n[b]SPECIES:[/b] Humanoid\n*line_break\n[b]HOME PLANET:[/b] Unknown\n*line_break\n[b]ABILITIES:[/b] Psychic Projections, Wide Assortment of Applications\n\n*page_break\n\n\"What would you like me to say, Oli?\" you ask in turn. \"I think you're the one who owes me some explanation here, after all.\"\n\nOli cocks ${olihis} head just a touch, narrowing ${olihis} eyes at you.\n*if olifemale\n\t$!{Olihis} shoulder-length hair moves to the side, giving you a whiff of shampoo and something else—something good.\n\t*goto foramoment\n*else\n\t$!{Olihis} short hair moves to the side, giving you a whiff of clean soap and something else—something good.\n\t*goto foramoment\n\n*label foramoment\n\nIt makes you think about the last time you took a shower yourself, but then you're distracted as a pulse of calm blue light appears around Oli's forehead, standing out against ${olihis}:\n\n*fake_choice\n\t#Brown skin.\n\t#Pale skin.\n\t#Tan skin.\n\t#Peach skin.\n\t#Dark skin.\n\n\"Ah, using OtherBoard's readouts to mimic your occupied absorption abilities. That's clever,\" Oli says, ${olihis} eyes refocusing back on you as the blue halo disappears. \"Who did you vote for, ${name}?\"\n\n\"Did you just read my mind?\" you ask, wondering if such a thing is even possible. Though actually, you do suppose your own absorb powers could be described as some limited form of telepathy, if considered differently. \"Why even ask if you're going to barge right in?\"\n\n\"I can't read minds, but I can read Queen Ashe's Trial Files. I can also notice how your eyes were flickering from side to side, like A-08's eye-lights do when it reads something holographically invisible,\" Oli answers. \"Lastly, I can guess that you voted for ${deathone}, but it's really important that I know for sure, which is why I'm asking.\"\n\n\"Are you in The Elite Courte?\" you counter, not entirely willing to play by Oli's rules until you know what's really going on here. \"And where are we, exactly?\"\n\n\"You know the answers to both of those questions already,\" Oli says, smirking. \"We don't have time for you to be so slow. Why do you think you've been Selected by Versus?\"\n\n*page_break\n\nAs Oli says this, the giant marble around you suddenly slows down, rolling upward toward the peak of a long yellow arch. You can feel the tension as the marble spends its momentum on roll-climbing, a sensation not unlike reaching the top of a roller coaster. Your heart picks up its pace as the marble slows its own down. Oli seems to notice, too.\n\n\"They must have fixed the skybox docking locks, that was faster than usual,\" Oli says, looking off in the other direction. \"We'll have to finish this another time. I'm not sure when I'll get another chance to mindsneak away, so until then….\"\n\nOli turns to you, a slick smile hanging on ${olihis} face. As your eyes meet, you feel your heart skip another beat and you suddenly lose your breath. Oli just seems so…\n\n*choice\n\t#Intense.\n\t\t*set rlshp_oli %+5\n\t\t*goto asyouthinkthis\n\t#Smart.\n\t\t*set rlshp_oli %+5\n\t\t*goto asyouthinkthis\n\t#Annoying.\n\t\t*set rlshp_oli %-10\n\t\t*goto asyouthinkthis\n\t#Alluring.\n\t\t*set rlshp_oli %+10\n\t\t*goto asyouthinkthis\n\t#Challenging.\n\t\t*set rlshp_oli %+5\n\t\t*goto asyouthinkthis\n\t#Unreadable.\n\t\t*goto asyouthinkthis\n\t#Confounding.\n\t\t*set rlshp_oli %-5\n\t\t*goto asyouthinkthis\n\t#Familiar.\n\t\t*set rlshp_oli %+5\n\t\t*goto asyouthinkthis\n\n*label asyouthinkthis\n\nAs you think this, the marble finally reaches the very peak of the track. As a moment of temporary stillness arrives, Oli pulls up the sleeve on ${olihis} sweater and holds up the underside of ${olihis} wrist…\n\n…where you see your own wide eyes reflected in a mirror patch embedded in ${olihis} skin.\n\n\"Mirrored Mother, but you're a cute one,\" Oli sighs.\n\nAs these words leave Oli's lips, the marble pushes over the peak and you feel your stomach flip.\n\n*page_break One Drop Down\n\nYou blink and try to grip something, but only feel dirt under your palms. You look around and see drooping branches and green leaves, obscured by a wagging tail.\n\nAs Nermal licks your face with great slobbery swipes and Nards attempts to bite through your combat boots, you realize that you're sitting on the floor of OtherBoard's UniForest camp. Pushing both dogs away, one much more playfully than the other, you stand up to try to get your bearings.\n\nHow the blerg did you get back here? You can tell that the sun is about to finish setting, which means a good chunk of time must have passed while you were on that \"brainplane,\" much longer than you actually experienced. So what did the other Ords see as you left the amphitheater? Did your entire body get pulled away, or just your consciousness?\n\nThen the really important questions start piling up: who is this Oli person? Why did ${olize} take you away only to be so frustratingly obscure? And why in all Fathers Below does Oli have a mirror patch? You've only ever seen them implanted on Priscan cheeks, never on someone's wrist. Could another culture have adopted this mirrored tradition? Or is Oli somehow Priscan too, a kind you've never encountered before?\n\n*choice\n\t#Blerg the Purity Laws for keeping me so in the dark about the galaxy.\n\t\t*if priscannonbeliever\n\t\t\t*set growth +1\n\t\t\t*achieve unwavering\n\t\t\t*goto realizequickly\n\t\t*else\n\t\t\t*set growth +2\n\t\t\t*achieve achange\n\t\t\t*goto realizequickly\n\t#I have to believe the Purity Laws must have been protecting us from things it would hurt us to know.\n\t\t*if priscantruebeliever\n\t\t\t*set growth +1\n\t\t\t*achieve unwavering\n\t\t\t*goto realizequickly\n\t\t*else\n\t\t\t*set growth -1\n\t\t\t*achieve achange\n\t\t\t*goto realizequickly\n\t#Whatever the Purity Laws took from me in terms of knowledge, they returned in the form of an openness and willingness to learn and reflect. That's all that matters now.\n\t\t*set growth +2\n\t\t*if priscanconflicted\n\t\t\t*achieve unwavering\n\t\t\t*goto realizequickly\n\t\t*else\n\t\t\t*achieve achange\n\t\t\t*goto realizequickly\n\n*label realizequickly\n\nMoving on, you realize quickly that if Oli is indeed one of the The Elite Courte, as ${olize} claims, ${olize} won't be able to talk to you directly again for who knows how long. As much as you may want more answers to this new batch of nagging questions, you're going to have to wait. \n\nYou suppose you can just add Oli to the pile of mysteries you're accumulating here on Versus. It's a feeling you can already tell you're going to have to grow very accustomed to.\n\nSpeaking of feelings, you suddenly find yourself completely exhausted—you don't know if it's the day you've had or some side effect of what Oli did to you, but the idea of holding your body up for one more second has become entirely unbearable.\n\n*page_break\n\nStaggering your way over to OtherBoard's cot, it's all you can do to stay awake before you collapse down into its springy embrace. Just before you close your eyes, you spot OtherBoard still standing dormant in the corner—but a new holo-projection now shines from her face, indicating that she will be operational in another eight hours.\n\nWhich means that you can fall asleep without another second of delay, thankfully.\n\nOne last surge of excitement bursts through your heavy, drifting mind as you realize that sleep now offers another opportunity to MemoryTravel…and another chance to learn the truth about Dhanthik.\n\n*if (mastery > 9)\n\t*set masterytenbonus true\n\t*achieve masterytenbonusac\n\t*set lifemax +1\n\t*goto endofchapterfive\n*else\n\t*goto endofchapterfive\n\n*label endofchapterfive\n*finish\n", "v_four": "*comment é\n\n*image part_2.png\n\n*page_break\n\n*image chap_4.png\n\n*image e_chap4.png\n\n${blank}\n\n*page_break\n\n*set life +1\n\nYou're not quite sure where to wait, but for now this seems like as good a place as any. You sit in a rocking chair on the porch of the Verses Village Inn, overlooking a shimmering lake. Lady Venuma didn't tell you exactly where to meet her at the Inn, so you settled here, thinking it seemed like the most visible location. \n\nHowever, you haven't seen a single other soul so far. You weren't exactly sure what to expect in the Versus capital, but you certainly weren't expecting it to be a ghost town. Trying to shake off the eerie feeling creeping through your chest, you attempt to take advantage of the solitude to collect your thoughts. \n\nYou have a million questions for OtherBoard about your MemoryTravel experience, but she was still rebooting by the time you had to leave—your full absorb really disrupted her systems, more than you ever could have anticipated. You just hope she wakes up by the time you return from this meeting with Lady Venuma. You won't even allow yourself to consider the possibility that OtherBoard might not not wake up again at all….\n\nFeeling exhausted yourself—MemoryTravel isn't exactly what you'd call restful—you headed out for the Village, leaving yourself enough time for an easy walk. Your Battlesuite visor had just reminded you that your Life Count had been recovered its daily value and you didn't want to lose any more by overexerting yourself.\n\n*page_break\n\nYou look out over the lake, wondering if you should explore more of the Village to find Lady Venuma, since she is twenty minutes late. You've already poked around the lobby of this small Inn, and all you found was antique furniture, porcelain-filled cabinets, and rosy wallpaper. \n\nFrom your spot on the porch, you can see the small town nestled in front of the lake: a general store, a medical center, and a park with some benches. Next to the lake you can make out a few cottages set beside distinct green squares of sprawling farmland. It seems like this place is set up for some kind of small population, so where is everyone?\n\nYour gaze stretches out across the lake, up a winding mountain path that leads to a stony castle. It is partially obscured by some low-hanging purplish clouds, but even from this far away you can tell that the castle is impressive. It looks so surreal, up on the mountain with its spires and turrets, like something straight out of a Priscan fairy tale. Perhaps that's where everyone is: living up in the Elite Courte Lady Venuma mentioned, whatever that means. \n\nAt least that's what you're think until a twitchy, bucktoothed rodent steps up to you, presenting a glass of water.\n\n*page_break\n*set meetbreeze true\n\nAs you survey the creature's patchy, spindly fur and too-wide eyes, one of OtherBoard's readouts appears:\n\n[b]SPECIES:[/b] Aye Aye\n*line_break\n[b]HOME PLANET:[/b] Unknown / Found on Numerous Planets\n*line_break\n[b]ABILITIES:[/b] Superb Service Creatures\n*line_break\n[b]ADDENDUM:[/b] The Aye Aye are believed to be superstitious symbols marking those they encounter for death. However, there has been no scientific evidence to substantiate this myth.\n\n\"Uh, thank you?\" you say, taking the glass of water warily. The moment you do, the Aye Aye scampers back inside the Inn, its bushy tail swaying wildly.\n\n\"I take it that's your first time meeting one of the Aye Ayenkeepers?\" a breathy voice says, prompting you to turn around.\n\n*page_break\n\nStanding across the porch is a pale, blue-skinned person with cloudy grey eyes, wearing a white wetsuit.\n*if breandrog\n\tZe is lean and tall, with skinny limbs and a tuft of white hair that's almost blonde. Hir androgyny is\n\t*goto readoutbreeze\n*elseif bremale\n\tHe is lean and tall, with skinny limbs and a tuft of white hair that's almost blond. He's\n\t*goto readoutbreeze\n*else\n\tShe is lean and tall, with skinny limbs and a tuft of white hair that's almost blond. She's\n\t*goto readoutbreeze\n\n*label readoutbreeze\nstriking, if not attractive—something about ${brehis} features is a little too small for ${brehis} face, or maybe ${brehis} limbs are a little too gangly? The whole effect gives ${brehir} a distinctly youthful, endearing quality, like ${breze} hasn't quite grown into ${brehir}self yet.\n\nYou're used to absorbing ambient impressions from those you encounter to get a sense of them, but since that particular sense is currently dulled, it's nice to at least have OtherBoard's readouts to help:\n\n[b]NAME:[/b] Jess Damon / \"Breeze\"\n*line_break\n[b]SPECIES:[/b] Enhanced Human / Millennithian Humanoid\n*line_break\n[b]HOME PLANET:[/b] Millennith\n*line_break\n[b]ABILITIES:[/b] Wind Generation, Wind Manipulation, Wind-Supported Flight, Flight Altered Anatomy \n\n\"The Aye Ayes are the ones that keep Versus running and make sure we're all taken care of, especially those of us lazy enough to live in the Inn,\" Jess says, with a voice so light and airy it almost sounds like the wind itself. \"I'm Jess, by the way. But everyone calls me Breeze.\"\n\nBreeze reaches out ${brehis} hand, and you stand from your rocking chair to shake it. \"I'm ${name},\" you say, noticing as Breeze gives you a rather blatant elevator stare, sizing you up from head to toe. \"I, uh…I just arrived here yesterday.\"\n\n\"I know, Lady Venuma already told me,\" Breeze says, now studying your face. \"Sorry, that mirror patch on your cheek is just so rudarking cool. How did you have it done?\"\n\n*page_break\n\n\"Oh, all children on my planet have them implanted at birth,\" you say, absentmindedly bringing your fingers to your cheek. You forgot that you had removed your entire Battlesuite helmet when you got to the Inn, since the smell inside after not showering for a whole sweaty day had become rather unpleasant.\n\n\"It's really pretty,\" Breeze offers. $!{Brehis} smile travels all the way up to ${brehis} eyes, which are so vividly grey they almost shine. \"Anyway, Lady Venuma tends to have a…flexible interpretation of time, so we could be here for a while. Maybe I could fill you in on some stuff while we wait? I'm sure you must have a million questions that need answering.\"\n\nYou're not sure who you can trust here yet, but Breeze seems harmless enough. You should decide, however, if it's smartest for you to warm up to Breeze or keep your distance until you know more about ${brehir}.\n\n*choice\n\t#\"I'd love that,\" I say, flashing Breeze a flirtatious smile.\n\t\t*set rlshp_breeze %+10\n\t\t\n\t\tBreeze clocks your smile and seems to turn the wattage up on ${brehis} own in return.\n\n\t\t*goto breezebrants\n\t#\"That would be great,\" I say, remaining friendly.\n\t\t*set rlshp_breeze %+5\n\n\t\t*goto breezebrants\n\t#\"I guess we don't have a choice,\" I say, sitting down again.\n\t\t*set rlshp_breeze %-10\n\n\t\tBreeze catches your tone and ${brehis} smile shrinks for a moment, but then ${breze} recovers and moves right along.\n\t\t*goto breezebrants\n\n*label breezebrants\n\n\"Of course everyone in the modern galaxy finally knows now that Versus really does exist,\" Breeze starts, propping ${brehir}self up on the porch ledge and angling ${brehir}self toward a patch of sunlight. $!{Breze} sits sideways and turns to face you, ${brehis} dangling legs swinging as ${breze} speaks. \"But no one gets to know what really happens on Versus unless they're Selected. Even then, there's a lot we still don't get to know, more than I'd like, personally….\"\n\nBreeze grows quiet for a moment, and you feel the wind coming off the lake get a little stronger. The gust seems to fade as ${breze} shakes this thought off. That's…blerging incredible. \n\nYou wonder what it would be like to control the wind—no one back on Prisca has anything close to a special ability like that. Or rather, everyone there has the exact same special ability. You realize that you might get to create your own gusts one day, if you ever get to absorb from Breeze….\n\n\"I never understood why the Reborn who return from Versus don't speak about their experiences here,\" Breeze continues. \"Not that I ever got to meet one of the Reborn in person, but still. I guess now I'm starting to understand their vow of silence, though I suppose I won't really know until I'm Reborn. Assuming I get that lucky, of course.\"\n\nBreeze beams at you, and you have to admit that something about ${brehis} smile is infectious. Though ${breze} does hold it a beat too long, staring into your eyes like ${breze} doesn't notice the silence.\n\n*page_break\n\n\"So why are we here on Versus?\" you ask, shifting your gaze out to the lake for a moment, then back to Breeze's pale blue face.\n\n\"Well, isn't that the big question?\" Breeze laughs. \"I suppose the answer is probably different for everyone, and maybe if you figure that out, you get to be Reborn. Or at least, that's my take on it. To be honest, the most important thing to learn about is the Versus Vote. Has anyone told you about that yet? Wait, have you even met anyone else?\"\n\n\"Not many,\" you answer. \"Lady Venuma, that A-08 Binarian, and the Multinarian that lives in the woods, OtherBoard. Oh, and the other six who arrived along with me yesterday, though we didn't exactly meet.\"\n\n\"Ah, I've never really spoken to the androids. OtherBoard keeps to herself in the UniForest and A-08 hates anyone remotely human.\" Breeze sighs. \"I haven't met many of you Newcomers either, just Pinkuju. She's the racer girl…she seems really cool. She stayed in the Inn last night, though she was the only one. She slept a lot—she might actually still be sleeping….\"\n\n\"I thought there'd be more people in the village,\" you say, a few seconds after Breeze's thought doesn't spill into another one.\n\n*page_break\n\n\"There are only twenty-four of us here on this side of Versus,\" Breeze begins, which suddenly makes everything clearer. Only twenty-four? That places this whole Versus experience on a much smaller scale than you had originally thought. It also means that being Selected must be extremely rare, in the galactic sense.\n\n\"This cycle there are seven of you Newcomers and seventeen of us Holdovers. You'd think we'd all know each other well by now, but I haven't been able to meet as many of the others as I'd like. I suppose we have Queen Ashe's Elite Courte to thank for that divide.\" Breeze's last words come out with a bit more force, sounding almost stormy.\n\n\"Whoa, okay, hold on,\" you cut in, wanting to keep everything clear. \"What do you mean, 'this side?' Who is Queen Ashe, and what is this Elite Courte? Lady Venuma mentioned them both when I met her yesterday.\"\n\nBreeze laughs an airy laugh, flipping ${brehis} tuft of hair to one side. \"Sorry, I'm a bit scatterbrained, if you haven't noticed.\"\n\n*choice\n\t#\"I noticed.\"\n\t\t*set rlshp_breeze %-10\n\t\tBreeze catches your deadpan response and returns with ${brehis} own surprised glare. $!{Breze} then takes a moment to organize ${brehis} thoughts before ${breze} continues.\n\t\t*goto anywaybreek\n\t#\"It's okay, obviously there's a lot to explain.\"\n\t\t*set rlshp_breeze %+5\n\t\tBreeze smiles again, this time taking a moment to organize ${brehis} thoughts before ${breze} continues.\n\t\t*goto anywaybreek\n\t#\"There's nothing wrong with being a little scatterbrained.\"\n\t\t*set rlshp_breeze %+5\n\t\tBreeze smiles again, this time almost blushing as ${breze} organizes ${brehis} thoughts.\n\t\t*goto anywaybreek\n\t#\"I did. It's adorable.\"\n\t\t*set rlshp_breeze %+10\n\t\tBreeze smiles again, this time almost blushing as ${breze} organizes ${brehis} thoughts.\n\t\t*goto anywaybreek\n\n*label anywaybreek\n\n\"Anyway, yes, there are two halves to Versus, with twenty-four inhabitants on each side. We're on the 'Constructive' side, meant to challenge the 'Destructive' side. Those aren't official names or anything; it's more about what the Reborn from each side tend to do when they return home. We never get to interact with the Destructives, though: they're on the other side of the Versus Barrier, and not even The Wone can get through that thing. We only get to see whoever comes through in the Versus Matches.\"\n\n\"Versus Matches?\" you ask, trying to process everything Breeze is blowing at you. You double check that your OtherBoard Stats Screen is still recording all of this relevant information, and luckily it seems to be. That's good, since you can review this at your own pace later, if need be.\n\n\"Yep, you just keep getting to the most important stuff, smartypants,\" Breeze says, knocking you on the shoulder. \"Okay, so here's how it goes. Every three days, everyone on each side of the barrier casts a vote. Then the Constructive inhabitant with the most votes has to go into the Versus Match against the Destructive inhabitant with the most votes. \n\n\"Long story short, we do that twenty-four times. Then those deemed worthy are Reborn and returned home. Those of us left behind, the Holdovers, get a break for a few months. Then more Newcomers arrive to stack each side back up to twenty-four inhabitants, and we do the whole thing all over again.\"\n\n\"Okay, wait,\" you cut in again, your head still spinning. \"What happens to the losers of the Versus Matches?\" \n\n\"Oh,\" Breeze says, cracking ${brehis} first frown. \"Well…\"\n\n*page_break\n*set chapfourbreezeversus true\n\n\"They die.\"\n\nYour mind struggles to keep up with this revelation…. \n\nYou're stuck on a planet where, every three days, you might be voted into a death match against someone identified as a \"Destructive?\" \n\n*choice\n\t#There must be some reason Versus runs like this, as some kind of cosmic test of worthiness.\n\t\t*set versusquest true\n\t\t*set growth +1\n\t\t*goto breknowterrr\n\t#It's more likely I've been pulled into some twisted alien experiment than any great, sacred questing process.\n\t\t*set versusrandom true\n\t\t*set growth +1\n\t\t*goto breknowterrr\n\t#As usual, I should reserve further judgment until I know more, or at least until I can confirm what Breeze is claiming. Though this does seem to resonate with what Lady Venuma and OtherBoard have told me….\n\t\t*set versusavoidpurpose true\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto breknowterrr\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto breknowterrr\n\t#For me, being Selected by Versus has to have something to do with Empress Vaccus and Dhanthik, I just know it.\n\t\t*set versusquest true\n\t\t*set growth +1\n\t\t*goto breknowterrr\n\t#I don't believe in some greater cosmic purpose, but I do believe I can strive to make this experience count while I'm here.\n\t\t*set versusrandom true\n\t\t*set growth +1\n\t\t*goto breknowterrr\n\t#All that matters to me is surviving this experience, for many reasons.\n\t\t*set versusavoidpurpose true\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto breknowterrr\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto breknowterrr\n\n\n*label breknowterrr\n\n\"It's terrifying, I know,\" Breeze says, tilting ${brehis} head to the side as a show of sympathy. \"But don't worry, you're in good company to be meeting with Lady Venuma so early. The Elite may be in control of the vote, but Lady Venuma is about to change all—\"\n\n\"Greetings,\" Lady Venuma's songvoice suddenly echoes, interrupting Breeze with purpose. \"I see you two have already become acquainted.\"\n\nYou look up to find Lady Venuma floating down toward the porch, her toga-like black dress flapping in the wind so wildly that its studded gold plates clap and chime. As Lady Venuma lands beside Breeze, you instantly feel better, like you've suddenly slipped under a warm comforter.\n\n*page_break\n\nKnowing that this feeling isn't necessarily to be trusted, you peel your eyes off of Lady Venuma's gleaming golden skin long enough to notice that Breeze suddenly only has eyes for Lady Venuma, as well. $!{Breze} stares at her almost like an adoring pet, aching for attention.\n\nRight on cue, Lady Venuma reaches out her hand and strokes Breeze's cheek as a hello. \n*if venumataste\n\tYou feel a surge of poisonous jealousy seethe through your chest. Does Lady Venuma just seduce every mortal she can to get her way? Is that all your little encounter meant to her?\n\n\tAs soon as this thought settles, however, you're surprised at how quickly it seems to evaporate. You want Lady Venuma so badly that you don't really care what the conditions are. Could that emotion be purely your own?\n\t*goto breezevenchoice\n*else\n\t*goto breezevenchoice \n\n*label breezevenchoice\n\nAs you look from Lady Venuma to Breeze, you realize that you're going to have to decide how to start building your relationships with both right here and now, whether you're ready or not. If things really are a matter of life and death on Versus, then you're going to have to throw yourself into these situations headfirst. You need to decide quickly how you feel about these two:\n\n*choice\n\t*if (attractedtowomen) #I'm interested in Lady Venuma, no matter what.\n\t\t*set rlshp_venuma %+20\n\t\t*set rlshp_breeze %-10\n\n\t\tLady Venuma turns to you, as if she can somehow sense the desire coursing through your body. Her hand glides from Breeze's cheek to yours, and you take your turn watching Breeze's face sour with jealousy as the warm flush of Lady Venuma's touch burns into your skin. \n\n\t\tYou feel yourself surge once more, and you try desperately to remind yourself that you have to be careful with your emotions around Lady Venuma. Not only can she affect them, but it appears she can intuit them, too.\n\n\t\tAt the moment, though, you find yourself unable to grasp this concern.\n\t\t*if venumataste\n\t\t\tAll you want is another taste of Lady Venuma.\n\t\t\t*goto llone\n\t\t*else\n\t\t\tAll you want is a taste of Lady Venuma.\n\t\t\t*goto llone\n\t*if (attractedtowomen) #I could be interested in either Lady Venuma or Breeze—or both, potentially.\n\t\t*set rlshp_venuma %+20\n\t\t*set rlshp_breeze %+20\n\n\t\tLady Venuma turns to you, as if she can somehow sense the desire coursing through your body. Her other hand glides up to your cheek, and as the warm flush of Lady Venuma's touch burns into your skin, you feel connected to Breeze as well.\n\n\t\tYou surge once more, trying desperately to remind yourself to be careful with your emotions around Lady Venuma. Not only can she affect them, but it appears she can intuit them, too.\n\n\t\tAt the moment, though, you find yourself unable to grasp this concern.\n\t\t*if venumataste\n\t\t\tAll you want is another taste of Lady Venuma, with a side of Breeze.\n\t\t\t*goto llone\n\t\t*else\n\t\t\tAll you want is a taste of Lady Venuma, with a side of Breeze.\n\t\t\t*goto llone\n\t#It's too soon to tell, but I am certainly intrigued by Breeze.\n\t\t*set rlshp_venuma %-10\n\t\t*set rlshp_breeze %+20\n\n\t\tLady Venuma turns to you, as if she can somehow sense what you have just decided. She then promptly turns away and focuses all of her attention back on Breeze, causing a wave of jealousy to crash across you.\n\n\t\tYou feel the seething surge and you try desperately to remind yourself that you have to be careful with your emotions around Lady Venuma. Not only can she affect them, but it appears she can intuit them, too.\n\n\t\tIf you end up being serious about Breeze, something tells you that you're going to have to decide whether it's worth potentially angering Lady Venuma.\n\t\t*goto llone\n\t#It's too early to think about anything even close to a romance—I've got more important concerns. For now, I will consider both of them as friends and potential allies.\n\t\t*set rlshp_venuma %+10\n\t\t*set rlshp_breeze %+10\n\n\t\tLady Venuma turns to you, as if she can somehow sense what you have just decided. She lowers her hand from Breeze's check and nods, causing a surge of warmth to radiate out of your chest.\n\n\t\tSwimming through the feeling, you try desperately to remind yourself that you have to be careful with your emotions around Lady Venuma. Not only can she affect them, but it appears she can intuit them, too.\n\t\t*goto llone\n\t#I'm upset that Lady Venuma has tried to manipulate me and that Breeze seems to be in on it in some way.\n\t\t*set rlshp_venuma %-20\n\t\t*set rlshp_breeze %-20\n\n\t\tLady Venuma turns to you, as if she can somehow sense what you have just decided. She turns back to Breeze and as she does, you can feel the exteriors of your emotions begin to peel away. \n\n\t\tSwimming through the numbness, you try desperately to remind yourself to be careful with your emotions around Lady Venuma. Not only can she affect them, but it appears she can read them, too.\n\n\t\tWhatever access Lady Venuma thinks her influence grants her, you decide right here and now that you're not going to let her get the best of you.\n\t\t*goto llone\n\n*label llone\n\n\"So, little lost one,\" Lady Venuma says, stepping out to form a circle between you and Breeze. \"Are you ready to find your way?\"\n\nYou nod at Lady Venuma, even though you're not sure exactly what she means. All you do know is that you need to find a way to survive the first Versus Vote, whatever that entails. In light of this, suddenly your worries about Empress Vaccus, the Blots, Mother, and Dhanthik feel worlds away. \n\nNot so far away, however, for it to escape your notice that these powerful individuals might be able to help you solve those problems, too….\n\n*page_break Triple Liftoffs Later\n\nYou thought grav-glider flying was fun, but this is so much better. \n\nWhen Lady Venuma and Breeze told you that they planned to meet someone in one of the farm cottages, you mentioned that it seemed like a short walk. This did nothing but elicit a pair of airy laughs, because why walk when Breeze and Lady Venuma can both fly? \n\nEspecially when Breeze has the ability to generate and manipulate wind, meaning that ${breze} can glide you along to the cottage with ease. You soar through the crisp air with surprising control and buoyancy, feeling the stress temporarily melt off of your body and fall to the rolling green fields below.\n\n\"Having fun?\" Breeze asks, beaming. \"It used to be really hard to wind-ride anyone else, but I finally got the hang of it. I'm easy, my bones are hollow and my limbs are adapted for flight, all as a part of my unique power set. I used to be rudarking freezing all the time when the change first happened, though…thank mercy for this special thermal wetsuit Weavez gave me as a birthday present. He's a famous designer where I'm from, so it's kind of a big deal, but—\"\n\n*page_break\n\n\"Where are you from?\" you ask, figuring Breeze could go on forever if you let ${brehir}.\n\n\"Oh, Millennith?\" Breeze beams, thrilled that you've taken an interest. \"It's pretty separated from most other planets, galactically speaking, but we're considered special because almost everyone on the planet is born with unique abilities. The best thing to be there is a big-time hero, though that's not a very easy—\"\n\n\"Ah, there he is, reliable as always,\" Lady Venuma interrupts, angling her heeled boots down toward the ground as she enters her descent. You're not sure if Lady Venuma meant to interrupt Breeze, but you wish you could have heard more about where ${breze} is from. An entire planet made up of powerful heroes?\n\nThat sounds so blerging incredible.\n\n*page_break\n*set meettodrick true\n\nAs you float down toward the front lawn of a beautifully kept cottage, you spot a man roughly the age of Father, standing as tall as his five-foot stature will allow. Two of those Aye Aye creatures stand beside him, holding out trays of lemonade. As you focus on the man, another readout appears:\n\n[b]NAME:[/b] Todrick Tumpkin\n*line_break\n[b]SPECIES:[/b] Human\n*line_break\n[b]HOME PLANET:[/b] Blarfngard\n*line_break\n[b]ABILITIES:[/b] Farming Expertise, Nimbleness\n\nThe moment Lady Venuma alights on the lawn, Todrick bows deeply, waving his hand in some kind of ritualistic motion that resembles the number one, you think.\n\n\"Exalted Wone, =beams honor= to have you in my humble home,\" Todrick says, straightening back up with his shoulders held high. \"=Requests forgiveness= regarding my Aye Ayehands, =feels frustration= for unsuccessfully attempting to teach them to perform a proper bow.\"\n\nAs Todrick speaks, you strain to understand his verbs, which are actually less heard than felt. You suppose that might seem odd to others, but luckily you're used to absorbing emotional signals. Still, you've never experienced verbiage projections as a part of language before—they're surprisingly poignant.\n\n\"Worry not, friend,\" Lady Venuma says, holding out her hand for Todrick to kiss. \"The Aye Ayemaids at the Elite Courte Castle are similarly stubborn.\" \n\nWell, that confirms it—Lady Venuma is indeed one of these Elites, as you suspected. Hopefully you can learn what that actually means during your time here.\n\n*page_break\n\n\"I've told you time and time again,\" Lady Venuma continues, \"you don't have to dress up for our visits, Todrick.\"\n\n\"=Expresses embarrassment= but these clothes are better than farming overalls,\" Todrick says. \"If my sweet Todricka knew that =receives blessing= to host an Exalted Wone, she'd die of shame if =dresses poorly=.\"\n\n\"Well, I believe Todricka would =experiences pride=,\" Lady Venuma attempts. \n\nWhile you're impressed by Lady Venuma's emotional accent, you're surprised that she placed the subject incorrectly: Todrick's emotional verbiage seems to only be for the first person. Though you probably shouldn't get in the habit of correcting self-proclaimed goddesses…\n\n…or should you?\n\n*choice\n\t#Correct Lady Venuma directly.\n\t\t*set rlshp_venuma %-10\n\n\t\t\"Actually, the proper subject placement—\"\n\n\t\t\"Now, please tell me you've prepared your famous boysenberry bramble?\" Lady Venuma interrupts, shooting you a very clear silencing stare before turning her attention back to Todrick.\n\t\t*goto toldtimetime\n\t#Introduce yourself to Todrick in an attempt to show a proper example of the correct subject placement.\n\t\t*set rlshp_venuma %-5\n\n\t\t\"Todrick, I'd like to—\"\n\n\t\t\"Now, please tell me you've prepared your famous boysenberry bramble?\" Lady Venuma interrupts, entirely ignoring the fact that you had just begun to speak. Todrick pauses for a moment, then returns his attention to Lady Venuma.\n\t\t*goto toldtimetime\n\t#Don't say anything and follow Lady Venuma's lead, at least for now.\n\t\t*set rlshp_venuma %+20\n\n\t\t\"Now, please tell me you've prepared your famous boysenberry bramble?\" Lady Venuma asks. \n\t\t*goto toldtimetime\n\n*label toldtimetime\n\n\"=Communicates affirmation=,\" Todrick beams. \"Did the mighty Queen Ashe enjoy the last batch? Todricka would faint if she knew her recipe was being served to the Divine Royalty.\"\n\nFor a moment Lady Venuma seems to freeze, as if struck by an invisible bolt of lightning, but she quickly shifts into a smile and replies: \"Queen Ashe was nothing but delighted. In fact, I've been instructed to return to the castle with a fresh batch.\"\n\n\"=Radiates preparedness=,\" Todrick offers, smiling from ear to ear. \"Now might =offers greetings= to our other guests?\"\n\n*page_break Greetings Granted\n\nOnce Todrick finishes with his greetings, you all settle into his living room for something called \"coffee\" and some boysenberry bramble, both of which may be the most delicious things you've ever tasted. Though it may also be so delicious because it's the first thing you've eaten since you arrived on Versus yesterday. \n\nApparently this coffee drink is fairly common on most other worlds, and everyone was surprised you found it new. Prisca may be modernized by galactic standards, but since there's no foreign trade, there are some common commodities you're bound to find unfamiliar.\n\nIn order to not wolf down the entire contents of your second plate, you try to observe Todrick's cottage instead. In contrast to the brightness of his front lawn, Todrick's living room is surprisingly dark in hue, with maroon curtains and green-shaded lamps. The darkness isn't at all dreary, though, instead adding to the coziness of the frilly couches and pink pillows. \n\nTodrick's cottage couldn't be more different from your own Priscan house, but something about being here gives you a pang of sadness. It feels like a real home, which only reminds you of the home you've been forced to leave behind….\n\n*page_break\n\nYou direct most of your attention to the dozens of oil paintings hanging on the walls, all of which seem to depict scenes from some kind of fantasy world.\n\nYou see a flock of crimson sheep shepherded by a white dragon, a sword-making troll beside a handsome pirate whose hands glow with pink halos of magic, a brood of freckled children crowded around a couple that…wait, that looks like Todrick. And could that be his wife, Todricka? Looking across the room, you spot an easel and palette resting on a chair in the corner. Todrick must have painted all of these himself, perhaps to remind him of his homeworld.\n\nGazing again at the paintings, you're awed—could Todrick's planet, this place called Blarfngard, really possess all of these wonders? You then notice another series of paintings, featuring a pantheon of gods and goddesses, among whom you think you spot Lady Venuma wearing one of her signature black-and-gold dresses. They are all overshadowed, however, by a mysterious, majestic woman whose fiery hair obscures her face. Could she be this \"Queen Ashe\" everyone keeps mentioning? You imagine her in all her fiery glory, only allowing those she deems worthy to see her true face….\n\nYou wonder if all of these beings reside on one planet, or a system of planets orbiting the same sun, especially these Wone \"deities.\" Todrick clearly seems to worship them, but what makes them worthy of worship? \n\n*choice\n\t#Whatever the truth is, it doesn't invalidate my own beliefs. I believe truth comes in many forms: forms that are meant to coexist.\n\t\t*set growth +2\n\t\t*goto wondertod\n\t#These pretenders don't compare to the doctrine of Reflection, the Mirrored Matron, and the Fathers Below. That's the truest truth.\n\t\t*set growth -1\n\t\t*set lvskeptic true\n\t\t*set lvbeliever false\n\t\t*set lvfascinated false\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto wondertod\n\t\t*else\n\t\t\t*set regime %-5\n\t\t\t*goto wondertod\n\t#I want to learn more about Todrick's devotion to The Wone. I'm intrigued about how it may—or may not—change my own perspective.\n\t\t*set growth +2\n\t\t*goto wondertod\n\t#If Lady Venuma is considered a goddess, what does that make Dhanthik—or Empress Vaccus, for that matter?\n\t\t*set growth +2\n\t\t*goto wondertod\n\t#I want to believe in Lady Venuma's divinity more than anything else.\n\t\t*set lvskeptic false\n\t\t*set lvbeliever true\n\t\t*set lvfascinated false\n\t\t*set growth +2\n\t\t*goto wondertod\n\t#I'm completely uninterested in matters of divinity. I'm only interested in what these powerful beings can do for me.\n\t\t*set growth -1\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto wondertod\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto wondertod\n\n*label wondertod\n\nThinking about all of these impressive figures also makes you wonder what Todrick is doing here on Versus. Given this assemblage of potential power, why Select someone who seems so inherently docile? You may not be any legendary warrior yourself, but you at least know how to hold your own in a fight. You're not convinced you'd be able to say the same of Todrick….\n\n\"This all must come as a great shock for you, ${name},\" Todrick says as he pours you another cup of coffee, pulling you out of your daydream. \"Most =possesses knowledge= about Versus already find it to be a challenging transition, but =posits assumption= you've had to adapt to many new worlds at once, since arriving here?\"\n\n\"It has definitely been a lot to take in,\" you say between bites and sips. \"But I guess I always did want to travel.\"\n\n*page_break\n\n\"=Conveys agreement=. Never =experiences travel= off of Blarfngard, until =receives summons= to Versus,\" Todrick says. \"It can certainly =overwhelms newness=, but it's a nice place to live. Have you picked a home yet?\"\n\n\"I didn't even know I had a choice,\" you say. \"I stayed in the UniForest last night, but the Inn looks nice. Actually, I love your cottage the most, so far.\"\n\n\"Well, =offers invitation= to stay here until you get it all sorted,\" Todrick says, smiling at you. There's just something about the expression on Todrick's face, the creased laugh lines topped with that comically curly brown hair, that makes you believe he really means this offer.\n\n\"Who knows!\" Lady Venuma interjects. \"Perhaps ${name} can inherit this very cottage…\"\n\nLady Venuma allows the words to hang in the air for a moment, obviously wanting to build some suspense for her next statement: \n\n\"…when Todrick becomes a member of The Elite Courte.\"\n\n*page_break\n\nYou nearly jump out of your seat as Todrick's mug cracks against the floor—it's not even that loud, but something about this coffee seems to have made you extremely jittery. Still, you manage to focus instead on the look on Todrick's face—he seems ready to cry.\n\n\"=Expresses disbelief=,\" Todrick tries. \"The Mighty Queen Ashe is considering this one for The Elite Courte?\"\n\n\"That's what we're here to talk to you about,\" Lady Venuma says, smiling broadly.\n\nJust then, you feel a chill run through you, like some internal gust of wind. You instinctively turn to Breeze and sure enough, the look on ${brehis} face is equally chilly. You expect to perhaps find jealousy there, but instead, you think you see…guilt? Blerg, it's still weird to have to constantly read people like this, without ambient absorption.\n\nThis glance at Breeze makes one thing clear: you still don't really know what's going on here. Which means you should start asking some questions.\n\n\"Uh, sorry to interrupt,\" you start, \"but can someone fill me in on this whole Elite Courte thing?\"\n\n*page_break\n\n\"=Conveys agreement=,\" Todrick expresses first. \"=Requires time= to process.\"\n\n\"Very well then, I can provide you with the necessary essentials,\" Lady Venuma says, turning to you with a bored look on her striking face. \"The Elite Courte was established five cycles ago by Queen Ashe Solares, Empress of the Wone House of Light.\"\n\n\"Blessed be her name,\" Todrick mumbles, gesturing his one symbol again.\n\n\"After living on Versus for many cycles prior, Queen Ashe decided, in her infinite wisdom, to bring order to the perceived lawlessness of the proceedings surrounding the Versus Vote,\" Lady Venuma explains, with a hint of…venom in her voice? \"Queen Ashe decided to establish a ruling majority comprised of those she deemed most worthy. So for five cycles now, the thirteen Elite Courte members have controlled the Versus Vote.\"\n\n\"They vote for us 'Ords,' or 'Ordinaries,' as we've been dubbed,\" Breeze interjects, the venom in ${brehis} voice completely unhidden. \"Obviously there are eleven of us Ords to The Elite Courte's thirteen, so the eleven Ords rotate through all of the Versus Matches. Then whoever survives at the end may be selected for the Elite Trials, along with any Newcomers that catch Ashe's eye. The system is so unf—\"\n\n\"Which is why A-08 and I were out cataloguing the Newcomers yesterday,\" Lady Venuma cuts in, sending Breeze a quick-but-stern silencing glance. \"To see who Queen Ashe might want to invite to participate in the upcoming Elite Trials.\"\n\n*page_break\n*set chapfoureliterevealed true\n\nYou do your best to process this information, but it only seems to make matters worse. It's not enough that you face a death match vote every three days, but some immune ruling class is overseeing the rotation of the lesser beings through those death matches? \n\nThat's just blerging great.\n\n\"Wait,\" you interrupt, still trying to keep up. \"If no one from the Elite Courte ever gets voted into the Versus Matches, then how do spots open up?\"\n\n\"When Elite Members are Reborn, of course,\" Lady Venuma answers. \"Though the current thirteenth spot has opened for a rather…unorthodox reason.\"\n\nAs these words land, they seem to drop a heavy silence with them. Breeze practically levitates off ${brehis} chair, ${breze} looks so uncomfortable, and you can sense strong =anxiety= coming off Todrick. Lady Venuma, on the other hand, seems rather unaffected.\n\n*page_break\n\nWhat the blerg happened before your arrival that they're not telling you? What does it have to do with Breeze and this meeting with Todrick? Why are you even here? More importantly, is there going to be any way for you to become Elite as well? If not, you may have to face the Versus Vote and Match more than twice to survive here….\n\nYou can tell there's something going on just beneath the surface of this meeting, but you don't know exactly what yet. You are sure of this much, however: Lady Venuma must have invited you here for a reason. You'd bet she has some kind of agenda she must be pushing.\n\nYou also imagine that Lady Venuma wants to see where you'll fit into the little play she's currently directing, so you figure you should take Rosae's prior advice about setting clear intentions for yourself. You need to make a decision about your goals here, knowing that designating one will color the consequences of your future choices.\n\n*choice\n\t#Find a way to join The Elite Courte.\n\t\t*set joinelite true\n\t\t*set regime %+20\n\t\t*achieve joineliteac\n\n\t\tAs you make up your mind, suddenly a new readout appears in your peripheral vision—could your mind be unlocking new OtherBoard abilities as your brain adjusts to the full absorb? You flick your eyes to this readout and try to review it as quickly as possible, since you're sitting in a room full of relative strangers and don't want to seem completely crazy.\n\n\t\t[b]GOAL:[/b] Join the Versus Elite Courte\n\t\t*line_break\n\t\t[b]REQUIRED PREREQUISITES:[/b] Predilection for Supporting Regimes\n\t\t*line_break\n\t\t[b]CURRENT REGIME LEVEL[/b]: \n\t\t*if (regime > 65)\n\t\t\tExcellent\n\t\t\t*goto regimepolitics\n\t\t*elseif (regime > 50)\n\t\t\tSatisfactory\n\t\t\t*goto regimepolitics\n\t\t*else \n\t\t\tUnsatisfactory\n\t\t\t*goto regimepolitics\n\t#Attempt to oppose and abolish the Elite, if possible.\n\t\t*set joincoup true\n\t\t*set regime %-20\n\t\t*achieve joincoupac\n\n\t\tAs you make up your mind, suddenly a new readout appears in your peripheral vision—could your mind be unlocking new OtherBoard abilities as your brain adjusts to the full absorb? You flick your eyes to this readout and try to review it as quickly as possible, since you're sitting in a room full of relative strangers and don't want to seem completely crazy.\n\n\t\t[b]GOAL:[/b] Potentially Oppose the Elite Courte\n\t\t*line_break\n\t\t[b]REQUIRED PREREQUISITES:[/b] Predilection for Supporting Rebellions\n\t\t*line_break\n\t\t[b]CURRENT REBELLION LEVEL[/b]: \n\t\t*if (regime \u003c 35)\n\t\t\tExcellent\n\t\t\t*goto rebpolitics\n\t\t*elseif (regime \u003c 50)\n\t\t\tSatisfactory\n\t\t\t*goto rebpolitics\n\t\t*else\n\t\t\tUnsatisfactory\n\t\t\t*goto rebpolitics\n\t#Focus on building relationships, for now. I can decide which side to pick, if any, when I have more information.\n\t\t*set stayneut true\n\t\t*achieve stayneutac\n\n\t\tYou know that holding off on this decision will mean keeping your political Stats more neutral, which may hurt you later. For now, however, you feel it's your smartest move not to back yourself into any corners before you know exactly what you're getting yourself into.\n\n\t\tAs you make up your mind, suddenly a new readout appears in your peripheral vision—could your mind be unlocking new OtherBoard abilities as your brain adjusts to the full absorb? You flick your eyes to this readout and try to review it as quickly as possible, since you're sitting in a room full of relative strangers and don't want to seem completely crazy.\n\n\t\t[b]GOAL:[/b] Build Relationships, Remain Neutral\n\t\t*line_break\n\t\t[b]CURRENT PREDILECTION:[/b] \n\t\t*if (regime > 65)\n\t\t\tHeavily Supports Regimes\n\t\t\t*goto neutpolitics\n\t\t*elseif (regime > 50)\n\t\t\tSupports Regimes\n\t\t\t*goto neutpolitics\n\t\t*elseif (regime \u003c 35)\n\t\t\tHeavily Supports Rebellions\n\t\t\t*goto neutpolitics\n\t\t*else\n\t\t\tSupports Rebellions\n\t\t\t*goto neutpolitics\n\n*label regimepolitics\n\n[b]ADDENDUM:[/b] Livecast Relationship Readings\n*line_break\n[b]RELATIONSHIP POSSIBILITIES[/b]: Enemy, Tenuous Ally, Proven Ally, Trusted Friend, Romantic Prospect \n*line_break\n*if (ruthless > 50)\n\t[b]CURRENT SOCIAL MANNER[/b]: Ruthless; politically astute and capable of deceit, but difficulty earning trust or seeming genuine\n\n\t[b]SUBJECT TODRICK[/b]: Liked by Elite Courte; Loyal to Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Trusted Friend; use for leverage later\n\n\t[b]SUBJECT LADY VENUMA[/b]: Elite Courte Member; Loyalties Unclear\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Ally; keep distance until true affiliation known\n\n\t[b]SUBJECT BREEZE[/b]: Known Opposer of The Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Ally; while unnecessary to make as enemy, close affiliation might send improper signals regarding allegiance\n\n\t[b]CURRENT RUTHLESS LEVEL[/b]:\n\t*if (ruthless > 65)\n\t\tExcellent\n\n\t\t*label ruthregstat\n\t\t[i]NOTE[/i]: These goals are calibrated for Ruthless Regime Statistics; expect updated Statistics if goal changes\n\t\t*goto discussioncontinues\n\t*else\n\t\tSatisfactory\n\t\t*goto ruthregstat\t\t\t\n*else \n\t[b]CURRENT SOCIAL MANNER[/b]: Genuine; perceived as trustworthy and honest, but difficulty maneuvering politically or deceiving others\n\n\t[b]SUBJECT TODRICK[/b]: Liked by Elite Courte; Loyal to Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Trusted Friend; make inroads and acquire information\n\n\t[b]SUBJECT LADY VENUMA[/b]: Elite Courte Member; Loyalties Unclear\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Keep distance until true affiliation known\n\n\t[b]SUBJECT BREEZE[/b]: Known Opposer of The Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Enemy; any positive affiliation with Breeze will be deemed unfavorable by Elite Courte\n\n\t[b]CURRENT GENUINE LEVEL[/b]:\n\t*if (ruthless \u003c 35)\n\t\tExcellent\n\n\t\t*label genregstat\n\n\t\t[i]NOTE[/i]: These goals are calibrated for Genuine Regime Statistics; expect updated Statistics if goal changes\n\t\t*goto discussioncontinues\n\t*else\n\t\tSatisfactory\n\t\t*goto genregstat\n\n*label rebpolitics\n\n[b]ADDENDUM:[/b] Livecast Relationship Readings\n*line_break\n[b]RELATIONSHIP POSSIBILITIES[/b]:  Enemy, Tenuous Ally, Proven Ally, Trusted Friend, Romantic Prospect \n\n[b]SUBJECT TODRICK[/b]: Liked by Elite Courte; Loyal to Elite Courte\n*line_break\n[b]IDEAL RELATIONSHIP[/b]: Ally; while unnecessary to make as enemy, close affiliation might send improper signals regarding allegiance\n\n[b]SUBJECT LADY VENUMA[/b]: Elite Courte Member; Loyalties Unclear\n*line_break\n[b]IDEAL RELATIONSHIP[/b]: Trusted Friend or Romantic Prospect; learn if any opposition exists and, if so, become close to potential resistance members\n\n[b]SUBJECT BREEZE[/b]: Known Opposer of The Elite Courte\n*line_break\n[b]IDEAL RELATIONSHIP[/b]: Trusted Friend or Romantic Prospect; learn if any opposition exists and, if so, become close to potential resistance members\n\n*if (ruthless > 50)\n\t[b]CURRENT SOCIAL MANNER[/b]: Ruthless; politically astute and capable of deceit, but difficulty earning trust or seeming genuine\n\t*line_break\n\t[b]CURRENT RUTHLESS LEVEL[/b]:\n\t*if (ruthless > 65)\n\t\tExcellent\n\n\t\t*label ruthrebstat\n\t\t[i]NOTE[/i]: These goals are calibrated for Ruthless Rebellion Statistics; expect updated Statistics if goal changes\n\t\t*goto discussioncontinues\n\t*else\n\t\tSatisfactory\n\t\t*goto ruthrebstat\t\n*else\n\t[b]CURRENT SOCIAL MANNER[/b]: Genuine; perceived as trustworthy and honest, but difficulty maneuvering politically or deceiving others\n\t*line_break\n\t[b]CURRENT GENUINE LEVEL[/b]:\n\t*if (ruthless \u003c 35)\n\t\tExcellent\n\n\t\t*label genrebstat\n\n\t\t[i]NOTE[/i]: These goals are calibrated for Genuine Regime Statistics; expect updated Statistics if goal changes\n\t\t*goto discussioncontinues\n\t*else\n\t\tSatisfactory\n\t\t*goto genrebstat\n\n*label neutpolitics\n\n[b]ADDENDUM:[/b] Livecast Relationship Readings\n*line_break\n[b]RELATIONSHIP POSSIBILITIES[/b]: Enemy, Tenuous Ally, Proven Ally, Trusted Friend, Romantic Prospect \n*line_break\n*if (ruthless > 50)\n\t[b]CURRENT SOCIAL MANNER[/b]: Ruthless; politically astute and capable of deceit, but difficulty earning trust or seeming genuine\n\t\n\t[b]SUBJECT: TODRICK[/b]: Liked by Elite Courte; Loyal to Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Ally or Trusted Friend, until affiliation decided\n\n\t[b]SUBJECT: LADY VENUMA[/b]: Elite Courte Member; Loyalties Unclear\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Ally, Trusted Friend, or Romantic Prospect, until affiliation decided\n\n\t[b]SUBJECT: BREEZE[/b]: Known Opposer of The Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Ally, Trusted Friend, or Romantic Prospect, until affiliation decided\n\n\t[i]NOTE[/i]: These goals are calibrated for Ruthless Neutral Statistics; expect updated Statistics if goal changes\n\t*goto discussioncontinues\t\n*else\n\t[b]CURRENT SOCIAL MANNER[/b]: Genuine; perceived as trustworthy and honest, but difficulty maneuvering politically or deceiving others\n\n\t[b]SUBJECT: TODRICK[/b]: Liked by Elite Courte; Loyal to Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Ally or Trusted Friend, until affiliation decided\n\n\t[b]SUBJECT: LADY VENUMA[/b]: Elite Courte Member; Loyalties Unclear\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Unable to determine until affiliation decided\n\n\t[b]SUBJECT: BREEZE[/b]: Known Opposer of The Elite Courte\n\t*line_break\n\t[b]IDEAL RELATIONSHIP[/b]: Unable to determine until affiliation decided\n\t\n\t[i]NOTE[/i]: These goals are calibrated for Genuine Neutral Statistics; expect updated Statistics if goal changes\n\t*goto discussioncontinues\t\n\n*label discussioncontinues\n*set fourisgoalsreveal true\n*page_break\n\nBrowsing this information quickly, you find it incredibly useful, but also daunting. Luckily it has all been saved to your Stats Screen in case you need a refresher on how to behave or where everyone stands. It really is fascinating how the android mind calculates and quantifies human behavior. Despite how reductive it seems, you have to admit, the advice seems spot on…for now, at least.\n\n\"What matters today is that there is an open Elite Courte spot,\" Lady Venuma says, eyeing you with a look of concern. Once you snap out of your readout trance and return your focus to her, Lady Venuma turns to Todrick again.\n\n\"As Queen Ashe reviewed potential candidates last night, she expressed an interest in you, Todrick. She values your devotion quite highly. However, I believe that she requires a further show of bravery to prove you are worthy of qualifying for the Elite Trials.\" \n\n\"=Expresses willingness= to do anything for that!\" Todrick practically shouts. \"Anything at all!\"\n\n*page_break\n\n\"As you know, Todrick, becoming Elite requires proof of great strength and courage,\" Lady Venuma begins. \"Unfortunately, while you possess many assets, you have yet to prove yourself fiercely in battle, given last cycle's unusual nature. \n\n\"Of course, as the appointed Ambassador to the Ords, I am duty-bound to remain neutral. Selfishly, however, I want to see someone as devout as you rise to Elite status. Which is why I would like to offer you the most sound advice I can in an effort to make that dream a reality.\"\n\nLady Venuma then leans in toward Todrick, as if she is about to tell him some great, ancient secret. Todrick leans forward too, listening eagerly.\n\n\"It is my resolute belief that, if you are to stand out before the Elite Trials, you must volunteer to be voted into the next Versus Match.\"\n\n*page_break\n\n\"Volunteer?\" Todrick yelps, unable to hide his surprise. \"=Offers apology=, Great Lady. But =radiates fear=, what if the Destructives vote in the dreaded Un-Thing again?\"\n\nYou keep your eyes on Todrick and don't need any absorption powers to discern how terrified he seems. What in all Fathers Below is an Un-Thing? You figure that it's normal to be afraid of the Versus Match, but what has Todrick this petrified? More importantly, what is Lady Venuma angling at here in trying to convince Todrick to volunteer like this? Could her motives truly be as altruistic as she claims?\n\nBefore you can say anything, Lady Venuma reaches out a hand to soothe Todrick, no doubt applying some of her \"mortal charms\" to help this effort along.\n\n\"Naturally, we all share that concern,\" Lady Venuma answers. \"I am unable to share exactly how we are aware of this at the current moment, but I do have it on good authority that the Destructives will not send the Un-Thing into this first Versus Match. What is more, as a show of my confidence in you, I am prepared to personally bequeath you with a portion of my power, should you enter into the arena.\"\n\n\"Great Lady, that…=beams honor=,\" Todrick sputters. \"But =expresses doubt= about being strong enough. =Possesses nothing= close to power, aside from what you might generously provide.\"\n\n\"Loyalty is the strongest power there is,\" Lady Venuma says, holding up her chin as if she has just divulged some divine knowledge. \"In that regard, you are the most powerful among us.\"\n\n*page_break\n\nTodrick considers this, seeming moved by Lady Venuma's words. He takes a few beats to stare at the floor, then raises his head. \"=Requests inquiry=.\"\n\n\"Ask anything, of course,\" Lady Venuma replies.\n\n\"So you are not still thinking of…\" Todrick pauses, looking over at you and Breeze before turning back to Lady Venuma. \"=Discusses subject= at your last visit?\"\n\n\"Alas, I am no longer,\" Lady Venuma sighs. \"I must admit, I still believe that would be for the best, but it appears I stand rather alone in that belief. So if I cannot change the way of things, I must make The Elite Courte as strong as possible. This is why Breeze has joined me here today.\"\n\nLady Venuma nods at Breeze, as if this is ${brehis} cue to speak up. You and Todrick turn to Breeze, and it's all you can do to keep listening as your questions continue to pile up. It sounds like you were right in assuming that Lady Venuma had been planning something, but what does Breeze have to do with it?\n\n*page_break\n\n\"I'm here to let you know that the rest of us Ords support your Elite bid,\" Breeze adds. \"And that I'd count it as a personal favor to be repaid if you stepped up, after what happened last—\"\n\nBreeze catches ${brehir}self there, pausing to blink and swallow before ${breze} goes on. \"Given how The Elite Courte currently views me.\"\n\nAs Breeze trails into silence, you wish once again that you were able to access your normal absorption powers. What did Breeze do last cycle? Is that why ${breze} and Lady Venuma are—\n\n\"=Conveys gratitude=,\" Todrick says. \"Now what about ${name}? Why is ${youze} here?\"\n\n\"That is a very good question,\" Lady Venuma begins. \"I took an early liking to ${name}, and since ${youze} is so new not just to the Versus process, but to broader galactic culture as well, I wanted ${youhir} to begin to see how things work here on Versus. I also thought there would be no better mentor for ${name} than you, Todrick.\"\n\nLady Venuma turns her piercing gaze from Todrick to you, making your skin feel immediately warm.\n\n\"${name}, I know this is all new to you, but what do you think?\"\n\n*page_break\n\nLady Venuma delivers these words dripping with intent, and you can tell that your suspicions were correct: this is another test. Lady Venuma wants to see how you react to whatever she's trying to accomplish here.\n\n*if extraworning\n\t\"Remain calm, Priscy,\" Rosae's voice suddenly chirps in your ear. \"You are the only one who can hear me, a remarkable new feature of this Extra WorningBird functionality. It would seem that I am patched directly into your mind. This is good news, since I have a rather large warning for you.\n\n\t\"I'll keep it brief, but how you choose to respond to this situation will prove vital to your future on Versus. Whatever you decide to do, please consider how successfully ruthless or genuine you might be first, as well as your chosen political goal. This will only work out in your favor if you remain consistent and play to your strengths.\"\n\n\tJust as soon as Rosae's voice appears, it disappears. Which means you are left to sort out this decision on your own. It seems you had better do so quickly, since Lady Venuma, Breeze, and Todrick all sit with their eyes trained on you.\n\t*goto politicaljazzztime\n*else\n\t*goto politicaljazzztime\n\n*label politicaljazzztime\n\nYou may not know these people very well, nor do you know everything that is really going on, but you do know that for whatever reason, Lady Venuma seems to be trying to convince Todrick to volunteer for the Versus Vote in Breeze's place. So what are you going to do about it?\n\n*choice\n\t#I need to be completely honest with Todrick and expose whatever manipulation Lady Venuma is trying to pull here. I'm not one for subterfuge and petty politics.\n\t\t*set ruthless %-25\n\n\t\t\"I'm still adjusting to all of this and learning how things work here, but I do have a question,\" you begin, not waiting for permission to proceed. \"If Lady Venuma believes in you, Todrick, and wants to save you, Breeze, then why doesn't she just volunteer herself for the Versus Vote as a show of confidence? Then Lady Venuma can use her leverage as Ord Ambassador to ensure Todrick qualifies, and then empower him to succeed in the Elite Trials, whatever those entail. \n\n\t\t\"I guess I'm just not sure why Todrick should volunteer, unless Lady Venuma has some other reason for suggesting he do so…?\"\n\n\t\tYou finish your little speech and know that you sound innocent enough, but that your words carry much greater weight than anyone expected. Lady Venuma stares at you, her mouth hanging slightly ajar. She quickly closes it into a tight frown as you glance over. You'd bet that goddesses like her aren't used to being surprised, or questioned, this way. \n\n\t\tAcross from Lady Venuma, Breeze looks even more dismayed.\n\t\t*if (ruthless \u003c 35)\n\t\t\t*set rlshp_todrick %+30\n\t\t\t*set rlshp_venuma %-30\n\t\t\t*set rlshp_breeze %-30\n\t\t\t*set mastery +1\n\t\t\tEspecially because, from the troubled look on Todrick's face, you can tell that he seems to be taking your words very seriously.\n\n\t\t\t*page_break\n\n\t\t\t\"=Expresses gratitude= for your concern,\" Todrick begins. \"This is a very important decision, and your honesty will only help =considers matter= as fully as possible.\"  \n\n\t\t\tLady Venuma looks even more enraged after that, but she still manages to temper her words with her signature singsong sweetness as she turns her attention to Todrick. \"As astute as ${name}'s suggestion might seem, what our dear Newcomer recommends is unfortunately not possible. We all know that things don't work that way here.\"\n\n\t\t\t\"=Offers apologies=, but it did last cycle,\" Todrick says, dropping a stark silence along with his words.\n\n\t\t\tAs the silence in the room festers and stews, another readout appears in your line of sight:\n\n\t\t\t[b]UPDATE:[/b] Behavior optimal for joining the Elite Courte with Genuine motivations: Earned Todrick's Trust, Made Enemies of Lady Venuma and Breeze\n\n\t\t\t*if joinelite\n\t\t\t\t[i]Perfect,[/i] you think, as you bask in the tense silence.\n\n\t\t\t\t*set venumafourclue
