 true\n\t\t\t\t*goto meetingend\n\t\t\t*else\n\t\t\t\tHearing this, you make a mental note to consider redefining your goals as you move forward.\n\t\t\t\t*goto meetingend\n\t\t*else\n\t\t\t*set rlshp_todrick %-5\n\t\t\t*set rlshp_venuma %-15\n\t\t\t*set rlshp_breeze %-15\n\t\t\tUnfortunately, Todrick looks equally appalled by your suggestion.\n\n\t\t\t*page_break\n\n\t\t\t\"=Expresses doubt=,\" Todrick responds. \"=Begs forgiveness=, ${name}, but if you believe that what you suggest is possible, you know very little about how things work on Versus. And in this galaxy, for that matter.\"\n\n\t\t\tAs Lady Venuma takes this in, a smug smile begins to spread across her face. You had hoped to genuinely connect with Todrick by warning him about what you think is going on, but it would seem your efforts weren't deemed earnest enough, somehow. Now this misstep may have damaged all of your relationships.\n\n\t\t\tWhich means you'll have to be smarter about repairing things as you move forward, perhaps in a way more suited to your outwardly ruthless nature. If not, you'll at least have to redouble your efforts to be genuine in the future.\n\t\t\t*goto meetingend\n\t#I need to try to warn Todrick about whatever manipulation Lady Venuma seems to be attempting, but I need to do so without angering Lady Venuma or Breeze, by extension. \n\t\t*set ruthless %+25\n\n\t\t\"I know hardly anything about how things work here, so please forgive me if I speak out of turn somehow,\" you begin. \"But could there be another way for Todrick to prove himself, one that is less risky? If there really is no danger, why can't Breeze enter the Match, if that's what this Elite Courte wants? And then you both still recommend Todrick for the Elite Trials?\"\n\n\t\tLady Venuma stares at you, her mouth hanging slightly ajar. She quickly closes it into a tight frown as you glance at her—you'd guess that goddesses of her ilk aren't used to being surprised or questioned this way. \n\n\t\tAcross from Lady Venuma, Breeze looks even more dismayed.\n\t\t*if (ruthless > 65)\n\t\t\t*set rlshp_todrick %+30\n\t\t\t*set rlshp_venuma %+15\n\t\t\t*set rlshp_breeze %+15\n\t\t\t*set mastery +1\n\t\t\tEspecially because, from the troubled look on Todrick's face, you can tell that he seems to be taking your words very seriously.\n\n\t\t\t*page_break\n\n\t\t\t\"=Expresses gratitude= for your concern,\" Todrick begins. \"This is a very important decision, and your honesty will only help =considers matter= as fully as possible.\"  \n\n\t\t\tLady Venuma looks even more enraged after that, but she manages to temper her words with her signature singsong sweetness as she turns to Todrick. \"As astute as ${name}'s suggestion might seem, what our dear Newcomer recommends is unfortunately not possible. We all know that things don't work that way here.\"\n\n\t\t\t\"=Understands matter=,\" Todrick offers. \"Never =questions wisdom= offered by Lady Venuma, only =expresses gratitude= for ${name}'s concern. It will =makes decision= easier in the end. It =remains honor= to volunteer in the way you recommend, no matter what the circumstances.\"\n\n\t\t\tHearing this, Breeze seems to breathe a sigh of relief, while Lady Venuma nods and turns to you with a grim smirk. To her, it appears that your honesty might have helped Todrick arrive at this conclusion on his own, which signifies that you're on par with whatever political game she is playing here. \n\n\t\t\t*page_break\n\n\t\t\tThat's fine by you, since your true intention was to plant a seed of doubt in Todrick's mind—which you hope you did.\n\n\t\t\tAs you think this, another readout appears in your line of sight:\n\n\t\t\t[b]UPDATE:[/b] Behavior optimal for joining the Elite Courte with Ruthless maneuvers. Earned Todrick's Trust, Assuaged Lady Venuma and Breeze\n\n\t\t\t*if joinelite\n\t\t\t\t[i]Perfect,[/i] you think, as you bask in the easy silence that falls over the room.\n\n\t\t\t\t*set venumafourclue true\n\t\t\t\t*goto meetingend\n\t\t\t*else\n\t\t\t\tHearing this, you make a mental note to consider redefining your goals as you move forward.\n\t\t\t\t*goto meetingend\n\t\t*else\n\t\t\t*set rlshp_todrick %-5\n\t\t\t*set rlshp_venuma %-15\n\t\t\t*set rlshp_breeze %-15\n\t\t\tUnfortunately, Todrick looks equally appalled by your suggestion.\n\n\t\t\t*page_break\n\n\t\t\t\"=Expresses doubt=,\" Todrick responds. \"=Begs forgiveness=, ${name}, but if you believe that what you suggest is possible, you know very little about how things work on Versus. And in this galaxy, for that matter.\"\n\n\t\t\tAs Lady Venuma takes this in, a smug smile begins to spread across her face. You had hoped to plant seeds of doubt in Todrick without crossing Lady Venuma or Breeze, but it would seem your efforts weren't executed deftly enough. Now this misstep may have damaged all of your relationships much more than you anticipated.\n\n\t\t\tWhich means you'll have to be smarter about repairing things as you move forward, perhaps in a way more suited to your outwardly genuine nature. If not, you'll at least have to redouble your efforts to be ruthless in the future.\n\t\t\t*goto meetingend\n\t#I don't know that I agree with whatever Lady Venuma is doing, but that doesn't matter. All that matters is supporting Lady Venuma so that I can remain in her favor. And Breeze's too, for that matter.\n\t\t*set ruthless %+25\n\n\t\t\"I believe Lady Venuma would never advise you with selfish intentions,\" you say, trying to keep your response as short and sweet as possible.\n\t\t*if (ruthless > 65)\n\t\t\t*set rlshp_todrick %+5\n\t\t\t*set rlshp_venuma %+30\n\t\t\t*set rlshp_breeze %+30\n\t\t\t*set mastery +1\n\t\t\tYou hope your words land as you intended, and sure enough, Todrick turns to you with a smile.\n\n\t\t\t\"=Expresses gratitude= for your honesty,\" Todrick begins. \"You are wise to trust Lady Venuma, as =trusts word= of The Wone completely.\"  \n\n\t\t\tHearing this, Lady Venuma and Breeze turn to you, both looking quite pleased. Obviously they bought your act of support, whether you meant it or not. Which means that you've made a round of allies here to leverage in the future as you see fit.\n\n\t\t\tAs you think this, another readout appears in your line of sight:\n\n\t\t\t*if joincoup\n\t\t\t\t[b]UPDATE:[/b] Behavior optimal for opposing the Elite Courte with Ruthless maneuvers: Earned Trust of Lady Venuma and Breeze, Made Ally of Todrick\n\n\t\t\t\t[i]Perfect,[/i] you think as you bask in the easy silence that falls over the room.\n\n\t\t\t\t*set venumafourclue true\n\t\t\t\t*goto meetingend\n\t\t\t*elseif stayneut\n\t\t\t\t[b]UPDATE:[/b] Behavior optimal for remaining neutral with Ruthless maneuvers: Earned Trust of Lady Venuma and Breeze, Made Ally of Todrick\n\n\t\t\t\t[i]Perfect[/i], you think, as you bask in the easy silence that falls over the room.\n\n\t\t\t\t*set venumafourclue true\n\t\t\t\t*goto meetingend\n\t\t\t*else\n\t\t\t\t[b]UPDATE:[/b] Behavior optimal for opposing the Elite Courte with Ruthless maneuvers: Earned Trust of Lady Venuma and Breeze, Made Ally of Todrick\n\n\t\t\t\tHearing this, you make a mental note to consider redefining your goals as you move forward.\n\t\t\t\t*goto meetingend\n\t\t*else\n\t\t\t*set rlshp_todrick %-15\n\t\t\t*set rlshp_venuma %+5\n\t\t\t*set rlshp_breeze %+5\n\t\t\tYou hope your words land as you intended, but instead, the room suddenly grows unexpectedly tense. \n\n\t\t\t\"=Expresses doubt=,\" Todrick responds. \"=Begs forgiveness=, but your tone suggests you know something more. How could Lady Venuma's intentions possibly be selfish?\"\n\n\t\t\tHearing this, Lady Venuma glances at you, flashing a look of pure anger. The coldness of it sends a bolt right through you, though this look quickly fades as Lady Venuma returns her attention to Todrick.\n\n\t\t\t*page_break\n\n\t\t\t\"That's just a figure of Priscan speech,\" Lady Venuma explains, adding a short laugh. \"Forgive ${name}, ${youze} isn't used to communicating through the language barrier quite yet. We all have nothing but selfless intentions here, I promise you that.\"\n\n\t\t\tTodrick turns to you once again for reassurance, so you nod at him with the warmest smile you can muster. Obviously, you're not terribly good at stretching the truth just yet—a trait you'll have to fix if you plan to make any more ruthless political maneuvers. Especially since this misstep may not have advanced all of your relationships the way you had hoped.\n\n\t\t\tWhich means you'll have to be smarter about repairing things as you move forward, perhaps in a way more suited to your outwardly genuine nature. If not, you'll at least have to redouble your attempts to be ruthless.\n\t\t\t*goto meetingend\n\t#I want to trust Lady Venuma and Breeze and I want them to trust me, so I'm going to support their efforts here.\n\t\t*set ruthless %-25\n\n\t\t\"Todrick, I would think you brave and worthy if you were to go through with volunteering,\" you say. \"I may not know much about Versus yet, or have much say in anything, but I'd certainly support your Elite bid if you managed to survive the Versus Match.\"\n\n\t\t*if (ruthless \u003c 35)\n\t\t\t*set rlshp_todrick %+5\n\t\t\t*set rlshp_venuma %+30\n\t\t\t*set rlshp_breeze %+30\n\t\t\t*set mastery +1\n\n\t\t\tYou hope your words land with the intended support, and sure enough, Todrick turns to you with a smile.\n\n\t\t\t\"=Expresses gratitude= for your honesty,\" Todrick begins. \"Your support means a great deal.\"  \n\n\t\t\tHearing this, Lady Venuma and Breeze turn to you, both looking quite pleased as well. Obviously they believed your words of support, which means that you've made a round of allies here to work with in the future.\n\n\t\t\tAs you think this, another readout appears in your line of sight:\n\n\t\t\t*if joincoup\n\t\t\t\t[b]UPDATE:[/b] Behavior optimal for opposing the Elite Courte with Genuine motivations: Earned Trust of Lady Venuma and Breeze, Made Ally of Todrick\n\n\t\t\t\t[i]Perfect,[/i] you think, as you bask in the easy silence that falls over the room.\n\n\t\t\t\t*set venumafourclue true\n\t\t\t\t*goto meetingend\n\t\t\t*elseif stayneut\n\t\t\t\t[b]UPDATE:[/b] Behavior optimal for remaining neutral with Genuine motivations: Earned Trust of Lady Venuma and Breeze, Made Ally of Todrick\n\n\t\t\t\t[i]Perfect,[/i] you think, as you bask in the easy silence that falls over the room.\n\n\t\t\t\t*set venumafourclue true\n\t\t\t\t*goto meetingend\n\t\t\t*else\n\t\t\t\t[b]UPDATE:[/b] Behavior optimal for opposing the Elite Courte with Genuine motivations: Earned Trust of Lady Venuma and Breeze, Made Ally of Todrick\n\n\t\t\t\tHearing this, you make a mental note to consider redefining your goals as you move forward.\n\t\t\t\t*goto meetingend\n\t\t*else\n\t\t\t*set rlshp_todrick %-15\n\t\t\t*set rlshp_venuma %+5\n\t\t\t*set rlshp_breeze %+5\n\t\t\t\n\t\t\tYou hope your words land as you intended, but instead, the room suddenly grows unexpectedly tense. \n\n\t\t\t\"=Expresses doubt=,\" Todrick responds. \"=Begs forgiveness=, but you believe survival would be unlikely? Do you all feel this way?\"\n\n\t\t\tHearing this, Lady Venuma glances at you, flashing a look of pure anger. The coldness of it sends a bolt right through you, though this look quickly fades as Lady Venuma returns her attention to Todrick.\n\n\t\t\t\"That's just a figure of Priscan speech,\" Lady Venuma explains, adding a short laugh. \"Forgive ${name}, ${youze} isn't used to communicating through the language barrier quite yet. We all have nothing but confidence you would survive the Versus Match, otherwise we would not be here suggesting that you enter.\"\n\n\t\t\tTodrick turns to you once again for reassurance, so you nod at him with the warmest smile you can muster. You meant to genuinely support Lady Venuma's pitch, but now everyone seems suspicious of your intentions, thinking you insensitive somehow. Unfortunately, this misstep may not have advanced all of your relationships the way you had hoped.\n\n\t\t\tWhich means you'll have to be smarter about repairing things as you move forward, perhaps in a way more suited to your outwardly ruthless nature. If not, you'll at least have to redouble your efforts to seem genuine.\n\t\t\t*goto meetingend\n\n*label meetingend\n*page_break\n\n\"=Requests permission= to have time to =considers offer=?\" Todrick asks, his folded hands now fidgeting in his lap.\n\n\"Of course! You can make your announcement at the Voting Ceremony later today,\" Lady Venuma says. \"We will leave you to your thoughts, knowing you will make the right decision in the end.\"\n\nWith that, Lady Venuma stands, obviously expecting you and Breeze to follow. Just like that, this meeting is over.\n\n\"Thank you for being such a gracious host,\" you offer, as you stand. Todrick nods at you, but you can already tell that his mind is elsewhere.\n\nAfter all, he has quite a lot to consider.\n\n*page_break Out Again, Out Again\n\nAs soon as Todrick closes his door with a final goodbye, Breeze rounds on you, clearly burning with something to say. However, Lady Venuma jumps in before ${breze} can get it out.\n\n\"Breeze, thank you for joining us today,\" Lady Venuma says. \"Might you head back to your home and remain there until the Voting Ceremony? I'd like to have a word with ${name} before ${youze} does exactly the same.\"\n\nBiting ${brehis} lip and crossing ${brehis} arms, Breeze nods. Then, without further argument, ${breze} begins to float off the ground as a gust of wind blows across the lawn. You still feel a little thrill at seeing someone who actually possesses powers this grand.\n\n\"No, I should thank you, Lady Venuma,\" Breeze returns. \"I'll see you both at the Voting Ceremony later.\"\n\n*if (rlshp_breeze > 54)\n\tBreeze looks down at you: if ${breze} wants to say more, ${breze} won't defy Lady Venuma by doing so here. Fortunately for you, a smile and a nod is all it takes for you to know how Breeze feels about you right now. \n\n\tWith that, Breeze lifts further into the sky to take off. Before ${breze} goes, you make sure to return the gesture with your own knowing smile. You have a feeling you'll be talking with ${brehir} very soon again, anyway.\n\n\tYou marvel as Breeze floats off into the distance, until you're pulled back to the ground by Lady Venuma's words.\n\t*goto watchbreezego\n*else\n\tWithout giving you a second glance, Breeze lifts further into the sky. If ${breze} wants to say more, ${breze} won't defy Lady Venuma by doing so here. Before you can get a word in otherwise, Breeze shoots off into the sky, leaving you alone with Lady Venuma.\n\t*goto watchbreezego\n\n*label watchbreezego\n*page_break\n\n\"As I explained earlier, I invited you here along with Breeze so that you might begin to understand how politics operate on Versus,\" Lady Venuma announces. \"As well as to see how you might engage with these politics, of course. I have never met a Priscan before, but it does not take much for any mortal race to reveal its ways, especially to one of my stature.\"\n\nLady Venuma then steps nearer, close enough that her taut frame towers above you in a rather intimidating stance.\n\n\"All that said,\n*if (rlshp_venuma > 65) \n\tI am very impressed with how you handled yourself.\"\n\n\t\"I'm so happy you're pleased, Lady Venuma,\" you say, sighing with relief. \"I just hope you continue to include me in your plans. Is there anything more I can do?\"\n\t*goto knowallineed\n*elseif (rlshp_venuma > 40)\n\tit is truly fascinating to witness your behavior.\"\n\n\t\"How did I do?\" you ask, swallowing hard.\n\t*goto knowallineed\n*else\n\tI cannot fathom precisely what it was that were you were trying to accomplish in there.\"\n\n\t\"I bet it's very frustrating for someone like you to have a blind spot, to not know how I might react,\" you start, puffing up your chest to appear taller. \"I bet you thought I'd be much more pliable, given my lack of galactic experience. Tell me, am I getting close here?\"\n\t*goto knowallineed\n\n*label knowallineed\n*page_break\n\n\"I know all I need to know, for the moment,\" Lady Venuma responds, remaining close. \"Except for one matter. I cannot say whether you understood this situation, so I will strive to make it abundantly clear. Breeze has already been condemned by The Elite Courte for what ${breze} did last cycle.\"\n\n\"What did Breeze—\"\n\n\"That is Breeze's secret to tell, not mine,\" Lady Venuma interrupts. \"All you need to know is that Breeze will be voted into the Versus Match unless Todrick volunteers. And I can guarantee you that whoever enters this particular Match will not survive it.\"\n\nLady Venuma lets that news land with a thud. \n\nBlerg. \n\nSo Lady Venuma outright lied to Todrick when she said he would survive the Match? If that is true, what makes her think you'll believe what she says to you right now?\n\n*page_break\n\n*if venumafourclue\n\t*achieve venumafourclueac \n\t*if (rlshp_venuma > 40)\n\t\t\"The matter is simple. I am planning to change things here on Versus and I will need support to do so. Breeze has offered me that support, while Todrick has pledged his allegiance elsewhere. Breeze must stay, and since Versus forces us to make such choices, this is the only way to save ${brehir}. I do not like it, but I must play the hand I've been dealt. \n\n\t\t\"I am already risking a great deal telling you this much. For your own sake, you don't need to know more than that right now. However, I do need to know this much from you: will you support me in my endeavors?\"\n\t\t*goto yourcall\n\t*else\n\t\t\"It is clear you do not trust me, for whatever reason. So let me provide you with a reason to begin doing so. Know that I am planning to change the way of things here on Versus and that I will need support to do so. Breeze has offered me that support, while Todrick has pledged his allegiance elsewhere. Therefore Breeze must stay, and since Versus forces us to make such choices, this is the only way to save ${brehir}. I do not like it, but I must play the hand I have been dealt. \n\n\t\t\"I am already risking a great deal telling you this, but what I have planned will be for your benefit and the benefit of all Ords on Versus. For your own sake, you don't need to know more than that. However, I do need to know this much from you: will you support me in my endeavor?\"\n\t\t*goto yourcall\n*else\n\t\"Be assured that I do not enjoy this situation, but it is nonetheless where we find ourselves,\" Lady Venuma says. \"The reality also remains that I have future need of Breeze, for the benefit of all on Versus. Since we are forced to choose, I must strive to protect Breeze over Todrick. \n\n\t\"I cannot be sure that you truly care to remain on my good side quite yet, but let me say this: if you do care, you will not stand in the way of Todrick volunteering. What do you say to this?\"\n\t*goto yourcall\n\n*label yourcall\n\nAs Lady Venuma finishes speaking, you begin to feel that fog in your brain return, accompanied by a feeling of sympathy—Lady Venuma must be somehow ramping up her charms again. Now that you know what it feels like, however, you can decide whether to resist it or give in.\n\nYou stare back at Lady Venuma, knowing that despite your currently racing mind, your answer has to be perfect. Lady Venuma is obviously planning something, and you're going to have to find a way to use it to your advantage, one way or another.\n\n*if extraworning\n\t\"Priscy, you need to be careful here,\" Rosae chirps suddenly, obviously indicating another important decision is coming your way. \"Please remember your goal here: to \n\t*if joinelite\n\t\tsomehow join the Elite,\n\t\t*goto venumadecide\n\t*elseif joincoup\n\t\tpotentially oppose the Elite,\n\t\t*goto venumadecide\n\t*else\n\t\t*if (ruthless > 50)\n\t\t\tmake the right allies,\n\t\t\t*goto venumadecide\n\t\t*else\n\t\t\tcontinue making allies,\n\t\t\t*label venumadecide\n\t\t\tand to balance that against your ruthless or genuine strengths!\"\n\t\t\t*goto venumadecidetime\n*else\n\t*goto venumadecidetime\n\n*label venumadecidetime\n\n*choice\n\t#\"I will support you fully,\" I say, meaning it. \t\t\n\t\tYou know this is the most genuine way for you to potentially oppose the Elite, by throwing your support behind whatever opposition Lady Venuma seems to have brewing.\n\t\t*if (joincoup) and (ruthless \u003c 50)\n\t\t\t*set rlshp_venuma %+30\n\t\t\t*set regime %-25\n\t\t\t*set ruthless %-20\n\t\t\t*set mastery +1\n\t\t\t*goto venumareacts\n\t\t*elseif (stayneut) and (ruthless \u003c 50)\n\t\t\t*set stayneut false\n\t\t\t*set joincoup true\n\t\t\t*set rlshp_venuma %+30\n\t\t\t*set regime %-25\n\t\t\t*set ruthless %-20\n\t\t\t*set mastery +1\n\t\t\t\n\t\t\tIt also appears that, by choosing to treat Lady Venuma this way, you've decided to go from remaining neutral to opposing the Elite with genuine motivations.\n\t\t\t*goto venumareacts\n\t\t*else\n\t\t\t*set rlshp_venuma %+15\n\t\t\t*set regime %-10\n\t\t\t*set ruthless %-10\n\n\t\t\t*label notinlinesingular\n\n\t\t\tUnfortunately, you quickly realize that this outcome isn't in line with the goal you've just set for yourself. If you really want to survive on Versus, you're going to have to start behaving less erratically—or by redefining your goal the next chance you can, after this meeting.\n\t\t\t*goto venumareacts\n\t#\"I will support you fully,\" I lie, knowing that instead I'll plan to use this information against Lady Venuma to further ingratiate myself with the Elite when the time comes.\n\t\tYou know this is the most ruthless way for you to join the Elite: by getting Lady Venuma to trust you, only to be able to turn on her later as a show of loyalty to the Elite.\n\t\t*if (joinelite) and (ruthless > 50)\n\t\t\t*set rlshp_venuma %+10\n\t\t\t*set regime %+25\n\t\t\t*set ruthless %+20\n\t\t\t*set mastery +1\n\t\t\t*goto venumareacts\n\t\t*elseif (stayneut) and (ruthless > 50)\n\t\t\t*set stayneut false\n\t\t\t*set joinelite true\n\t\t\t*set rlshp_venuma %+10\n\t\t\t*set regime %+25\n\t\t\t*set ruthless %+20\n\t\t\t*set mastery +1\n\t\t\t\n\t\t\tIt also looks like, by choosing to treat Lady Venuma this way, you've decided to switch from staying neutral to joining the Elite with ruthless maneuvers.\n\t\t\t*goto venumareacts\n\t\t*else\n\t\t\t*set rlshp_venuma %-10\n\t\t\t*set regime %+10\n\t\t\t*set ruthless %+10\n\t\t\t*goto notinlinesingular\n\t#\"I won't be manipulated or controlled by you, Lady Venuma,\" I say.\n\t\t*if (joinelite) and (ruthless \u003c 50)\n\t\t\t*set rlshp_venuma %-30\n\t\t\t*set regime %+25\n\t\t\t*set ruthless %-20\n\t\t\t*set mastery +1\n\n\t\t\tYou hope that this will be the most genuine way for you to impress the Elite: by making an enemy out of Lady Venuma and whatever opposition she seems to have brewing. Admittedly, it is a big risk, but it's the only one you feel comfortable taking.\n\t\t\t*goto venumareacts\n\t\t*elseif (stayneut) and (ruthless \u003c 50)\n\t\t\t*set rlshp_venuma %+15\n\t\t\t*set ruthless %-20\n\t\t\t*set mastery +1\n\n\t\t\tThough these words are hard to say, you know that if you're not yet going to pick a side, being honest with Lady Venuma might be the only way to gain her respect.\n\t\t\t*goto venumareacts\n\t\t*else\n\t\t\t*set rlshp_venuma %-20\n\t\t\t*set regime %+15\n\t\t\t*set ruthless %-10\n\n\t\t\tAs the words leave your mouth, you realize that they'd be perfect if you were trying to join the Elite with genuine motivations, by making an enemy out of Lady Venuma and her potential opposition. Or if you were hoping to gain Lady Venuma's respect by being honest without choosing a side.\n\n\t\t\t*label notinline\n\n\t\t\tUnfortunately, you quickly realize that neither of these outcomes are in line with the goal you've just set for yourself. If you really want to survive on Versus, you're going to have to start behaving less erratically—or by redefining your goal the next chance you can, after this meeting.\n\t\t\t*goto venumareacts\n\t#\"I hope to support you,\" I say, knowing that I will only support Lady Venuma's potential opposition if it is likely to succeed.\n\t\t*if (joincoup) and (ruthless > 50)\n\t\t\t*set rlshp_venuma %+30\n\t\t\t*set regime %-25\n\t\t\t*set ruthless %+20\n\t\t\t*set mastery +1\n\n\t\t\tYou know this is the most ruthless way for you to potentially oppose the Elite: by throwing your support behind whatever rebellion Lady Venuma seems to have brewing. However, you're not going to commit until you know this brewing rebellion is really going to work.\n\t\t\t*goto venumareacts\n\t\t*elseif (stayneut) and (ruthless > 50)\n\t\t\t*set rlshp_venuma %+15\n\t\t\t*set ruthless %+20\n\n\t\t\tYou know this is the perfect way to remain neutral, but still generally ruthless: by throwing your support behind whatever rebellion Lady Venuma seems to have brewing, but not committing until you know it's really going to work.\n\t\t\t*goto venumareacts\n\t\t*else\n\t\t\t*set rlshp_venuma %+5\n\t\t\t*set regime %-10\n\t\t\t*set ruthless %+10\n\n\t\t\tYou know this is the most ruthless way for you to potentially oppose the Elite: by throwing your support behind whatever rebellion Lady Venuma seems to have brewing, but not committing in any concrete terms just yet.\n\n\t\t\t*goto notinline\n\n*label venumareacts\n\nLady Venuma considers your words very carefully, taking several moments to pick them apart. She then steps toward you with a fierce, burning look in her eyes. Your heart skips a beat despite yourself, then returns to thundering in your chest. \n\nYou have no idea if Lady Venuma believes what you just said—or what she is capable of doing to you if she doesn't.\n\n*page_break\n\n*if (rlshp_venuma > 70) and (attractedtowomen)\n\t\"I continue to find you positively…\" Lady Venuma begins, stepping so close, you can practically feel the warmth coming off her skin. \n\n\t\"Stimulating.\"\n\n\tLady Venuma stands before you, her eyes blazing holes through you, sending your hormones crashing through the roof. With this surge of emotion, all you can think is:\n\n\t*choice\n\t\t#I want Lady Venuma. Now.\n\t\t\t*set kissvenuma true\n\t\t\t*achieve kissvenumaac\n\n\t\t\t*if venumataste\n\t\t\t\t*label thekisshappens\n\t\t\t\tLady Venuma doesn't need any further permission, she just wraps her hand around the back of your neck and pulls your lips into hers.\n\n\t\t\t\tThe kiss is so deep and powerful that the force of it almost buckles your knees. You manage to remain standing, though, because you don't want anything to interrupt this moment. \n\n\t\t\t\tEver.\n\n\t\t\t\tLady Venuma's chest presses against yours and your dizzy mind spins out of control. You swear you can feel the power crackling and popping across Lady Venuma's wet, warm lips…until her tongue touches yours.\n\n\t\t\t\t*page_break\n\n\t\t\t\tThen seemingly as soon as it starts, the kiss ends. Lady Venuma steps back away from you, looking thoroughly pleased.\n\n\t\t\t\t\"I look forward to working together in the future, in many ways,\" Lady Venuma purrs, \"you utterly curious creature.\"\n\n\t\t\t\t*goto venumaexit\n\t\t\t*else\n\t\t\t\t*label firsttaste\n\n\t\t\t\tLady Venuma half-smiles and tilts her head, as if she can somehow sense the decision you've made. This kicks your heart up a few paces, until Lady Venuma steps even closer to you, which sends your heart into full thundering. Your whole body begins to pulse, and you feel yourself seething, your head suddenly growing clouded, heavy. All you can think of is satisfying the desire that now courses through you.\n\n\t\t\t\tYour eyes travel over every curve and muscle of Lady Venuma's body as she comes nearer still, stopping just in front of you. You can smell her now, a mix of clean rain and something sweeter, like vanilla. You're so wrapped up in it that you don't even realize Lady Venuma has reached out her hand until you feel her golden skin on your arm. The shock of it sends waves through your own skin, the warmth radiating out in circles.\n\n\t\t\t\tLady Venuma then runs her hand across your stomach, tracing her fingers up slowly to your chest, just high enough that you have to hold your breath. You want to touch her too, but you dare not, not without her permission. Lady Venuma's hand continues roaming and she makes eye contact with you. You can already tell: she likes what she feels. \n\n\t\t\t\tSo much so that you suddenly find her bright, deep eyes coming closer, until Lady Venuma's lips touch your neck. Your legs nearly give out as the sensation ripples over your skin. You almost moan, only holding back because you want to hear as Lady Venuma breathes in the scent of your own skin.\n\n\t\t\t\t*page_break\n\n\t\t\t\tYou've been intimate before, but this feeling is so overwhelming, so different—like the desire might swallow you whole.\n\t\t\t\t*if kissvenuma\n\t\t\t\t\t*goto thekisshappens\n\t\t\t\t*else\n\t\t\t\t\tYou feel your hands rise toward Lady Venuma, but then her own hands travel back down your body and brush below your belt. You gasp out loud from the moment of contact, until Lady Venuma steps back. It's all you can do to keep from collapsing once she does.\n\n\t\t\t\t\t\"Oh, that conjoining shall be rather epic,\" Lady Venuma says, closing her eyes. \"Your newness is mesmerizing. It has been quite a while since a mortal so thoroughly interested me.\"\n\n\t\t\t\t\tOpening her eyes again, Lady Venuma takes a deep breath. \"However, our time runs short. If we are to indulge, there must be hours to burn. My only hope is that I do not break you when we have our way.\"\n\n\t\t\t\t\tYou want to say something in return, something equally seductive, but you can still feel the pull of Lady Venuma all over you. The thought of having time to go further is almost more than you can handle.\n\n\t\t\t\t\t\"For now, there are more mundane matters to handle,\" Lady Venuma says, stepping further back. As she does, you can feel your judgment clearing, your pulse slowing, though only little. It still feels like you're listening to Lady Venuma through a lilting fog.\n\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto venumaexit\n\t\t#I want Lady Venuma, but right now I need to play hard to get, for many reasons.\n\t\t\t*set wantvenuma true\n\n\t\t\t\"There will be time for that later,\" you say, trying desperately to keep your voice even.\n\n\t\t\t\"I can feel the desire dripping off you, practically quaking,\" Lady Venuma says. \"You show impressive restraint.\"\n\n\t\t\t*if venumataste\n\t\t\t\tIf Lady Venuma is bothered by your decision, she doesn't make any show of it. She just continues to stare at you, a smirk crawling across her face. \n\n\t\t\t\t\"In that case, I look forward to working together in the future, in many ways,\" Lady Venuma says, stepping backward, \"you utterly curious creature, you.\"\n\t\t\t\t*page_break\n\t\t\t\t*goto venumaexit\n\t\t\t*else\n\t\t\t\t*goto firsttaste\n\t\t#I don't ever want to go there with Lady Venuma, I just want to keep things friendly.\n\t\t\t*set justfriendsvenuma true\n\n\t\t\t\"I am thankful for your trust,\" you say, stepping backward. \"And that is more than enough for me, I'm afraid.\"\n\n\t\t\tIf Lady Venuma is bothered by your rejection, she doesn't make any show of it. She just continues to stare at you, a smirk crawling across her face. \n\n\t\t\t\"Then I look forward to working together in the future,\" Lady Venuma says, stepping backward, \"you utterly curious creature, you.\"\n\t\t\t*page_break\n\t\t\t*goto venumaexit\n*elseif (rlshp_venuma > 70)\n\t\"You have earned my trust,\" Lady Venuma says. \"Now we shall see what you do with it.\"\n\t*goto venumaexit\n*elseif (rlshp_venuma > 50)\n\t\"I consider you an ally now,\" Lady Venuma says. \"Though your actions will assuredly speak louder than words, in the near future.\"\n\n\t*label vendes\n\n\t*if (venumataste)\n\t\tLady Venuma steps back to leave, but then pauses for a moment, looking into your eyes once again.\n\n\t\t\"Curious, that you wanted more from me earlier,\" Lady Venuma adds. \"I could feel the desire radiating off you. Know that now, if you decide that you should want that again, you are going to have to work for it.\"\n\t\t*goto venumaexit\n\t*else\n\t\t*goto venumaexit\n*elseif (rlshp_venuma > 30)\n\t\"I can tell that you do not trust me,\" Lady Venuma says. \"But I do not trust you, either. Fortunately, that doesn't preclude us working together…yet.\"\n\t*goto vendes\n*else\n\t\"I do not know why you have chosen to make an enemy of me,\" Lady Venuma says, her words laced with thunder. \"But I do hope you know what you're doing, little lost one.\"\n\n\t*goto venumaexit\n\n*label venumaexit\n\nWith that, Lady Venuma turns and rockets into the sky in an instant, the force of her departure knocking you backward. You steady yourself and watch her fly, figuring that she must be on her way to other important meetings before the Voting Ceremony. \n\nYou try to gather yourself, knowing that Lady Venuma instructed you to return to your home, the same way she did with Breeze. But even if you care about Lady Venuma's orders, you haven't chosen a home yet. \n\nBesides, you still have too many questions that need answering before this Voting Ceremony. What did Breeze do last cycle to be targeted by The Elite Courte? What is this \"Un-Thing\" everyone seems to be so afraid of? What is the truth behind what Lady Venuma is really planning? \n\n*if kissvenuma\n\tYou try to clear your mind enough to focus on these questions, but you have a feeling you'll be replaying that moment with Lady Venuma on repeat for a long time to come. After all, you just kissed an actual goddess, for blerg's sake.\n\t*goto questrise\n*else\n\t*goto questrise\n\n*label questrise\n*page_break\n\nAs these questions rise to the top of your seemingly never-ending list, you realize that all of the answers can be found by talking to one person: \n\nBreeze. \n\nEspecially since ${breze} doesn't seem to be the best at keeping ${brehis} thoughts to ${brehir}self. \n\nSo you set off for the Verses Village Inn, unsurprised as a heavy feeling settles into your chest. Given Lady Venuma's revised death sentence for the upcoming Versus Match, you realize that how you choose to handle things might truly be a life-or-death decision for Breeze or Todrick.\n\nFor you as well—if not now, then certainly in the very near future.\n\n*finish\n", "v_nine": "*comment é\n\n*image chap_9.png\n\n*image e_chap9.png\n\n${blank}\n\n*page_break\n\nYour eyes won't open, so you can tell that this is a dream. Though your dreams haven't exactly been reliable as of late, so you can't be sure what this feeling really is. All you do know is that you can still see Rosae fluttering in the distance, even though your eyelids are shut.\n\n\"Lateral…\" you think you hear Rosae chirping inside your eardrum, but her voice slips into distortion before you can hear the rest.\n\nYou try to move your limbs but find that's not possible, because you feel like you're floating in some kind of warm, buoyant liquid. It's both comforting and highly disconcerting at the same time.\n\n\"Injured…\" Rosae's chirp echoes once again.\n\nRosae is trying to tell you something, but you find that all you really want to focus on is the heightened effects of absorbing from ${deathone}. Just like your body, your mind flows with…\n\n*choice\n\t*if (todrickdie) #Lady Venuma's gifted goddess glow.\n\t\t*set energy +1\n\t\tThough how is that possible, when you didn't absorb anything from—\n\t\t*goto rosaetime\n\t*if (todrickdie = false) #Breeze's wind energy.\n\t\t*set energy +1\n\t\tThe breeze blows across your brain, scattering your thoughts as they—\n\t\t*goto rosaetime\n\t#${deathone}'s agility.\n\t\t*set agile +1\n\t\tIt jumps across your brain, making it feel agile, lighter, like—\n\t\t*goto rosaetime\n\t*if (todrickdie) #Todrick's technical farming knowledge.\n\t\t*set tech +1\n\t\tIt causes the the thoughts to plow across your brain like—\n\t\t*goto rosaetime\n\t*if (todrickdie = false) #Lady Venuma's goddess knowledge.\n\t\t*set tech +1\n\t\tThough how is that possible, when you didn't absorb anything from—\n\t\t*goto rosaetime\n\t#Lady Venuma's borrowed strength.\n\t\t*set strength +1\n\t\tThough how is that possible, when you didn't absorb anything from—\n\t\t*goto rosaetime\n\n*label rosaetime\n\n\"${name}, this is very dangerous,\" Rosae's voice suddenly chirps, cutting through the brainfog. \"This kind of comatose MemoryTravel, it shouldn't even be possible. It's somehow moving you sideways through time, I can't…\"\n\nDespite the seeming urgency in Rosae's tone, you find that her words have no weight in this strange, floating space. They just drop to the earth with a hollow pop, like bubbles breaking. That's when you feel the drop yourself—it's not altogether unpleasant, much more of a descending sensation than a plummeting. You suddenly feel just like a raindrop, free-falling to your intended, glorious end.\n\nUntil you find yourself inhabiting your body once again, floating in an actual rainstorm. This body is different, though, like some kind of ghost-body, because the other raindrops pass right through you as if you weren't even there. You find that you can move your limbs now, directing their motions through the falling raindrops without resistance. Wait, this must also mean you should be able to open your eyes, too….\n\nAnd when you do, you find that there's so much to see.\n\n*page_break\n\nThe sky rips open with lightning that crackles into a dark, violent sea. This ocean is a hundred feet beneath you, since you currently hover near a blunt cliffside populated by lush, rolling hills.\n\nYou expect the scene to be expansive, but it's impossibly contained. The hills end as abruptly as the ocean does, sectioned off by two parallel, milky-white walls. These barriers seem both fluid and unbreakable at the same time. Through all of the haze, you think you can see figures on either side, arranged neatly in seated spectator rows.\n\nSome urgent cosmic buzzer snaps you back into focus and that's when you see\n*if todrickdie\n\tTodrick standing on the clipped cliffside below you, bracing himself against the elements. The rainfall makes his curly hair fall heavily across his face. He wears a chestplate of some ancient armor and you notice that his hands course with warm, golden light. Even from here, you can tell that belongs to Lady Venuma—or at least, it once did.\n\t*goto staynd\n*else\n\tBreeze standing on the clipped cliffside below you, bracing ${brehir}self against the elements. That's when you realize this thunderstorm is entirely windless—you know it's somehow because of Breeze, or perhaps despite ${brehir}. Breeze's skin seems to take on a paler blue against the rain and ${breze} wears a chestplate of some ancient armor over ${brehis} white wetsuit. You notice Breeze's hands also course with warm, golden light. Even from here, you can tell that belongs to Lady Venuma—or at least, it once did.\n\t*goto staynd\n\n*label staynd\n\n${deathone} is focused, facing a fixed point in the distance. As your eyes travel to that point, atop a nearby hill, a primal fear strikes you. Because there stands…\n\n*page_break\n\nAnother soaked, grotesque Bominate.\n\nTwo syllables then rip through your mind: the Un-Thing. \n\nIt must be this Bominate, renamed here on Versus for its unholy nature. This model seems to have been updated yet again since the one you encountered at the Summit; its metal joints are painted a sickly green and it wears a strange faceplate, studded with tally marks, instead of a flesh mask. You really hope that you're wrong, but you suspect those thick black scrawls might stand for the Bominate's kills….\n\nThis must be the Versus Match, you realize with sudden clarity. Which begs several new questions:\n\n*fake_choice\n\t#How am I here, like some kind of ghost? Am I really here at all, or am I just haunting this match? Am I even alive right now? \n\t#Is this the past or the present? Is this whatever Rosae meant by comatose MemoryTravel? \n\t#Can I die here, or am I just here to observe? \n\t#Am I here somehow because of my full absorb, or from the injuries I sustained fighting Empress Vaccus?\n\nAll of these questions disappear, however, as the buzzing countdown finally breaks into silence. The moment it does, the Bominate's chest opens up to reveal some ticking, nuclear heartbomb. It looks like this modern Bominate has been made with some even more deadly upgrades.\n\nAs you see ${deathone} facing off against the Bominate, you realize why Lady Venuma thought the outcome of this Versus Match would be a foregone conclusion. You know better than most that Bominates are virtually unkillable—and you can be fairly certain that ${deathone} isn't properly equipped to enact one of the only two ways to kill a Bominate.\n\nYou wonder if the remote battery source that fueled the last Bominate can even reach Versus, but then you figure that this new Bominate probably has an even less discernible weakness, given the nature of its evolution so far. You're sure this Bominate's energy sourcing has something to do with that nuclear heartbomb, but even if that's the case, you can be fairly certain that ${deathone} isn't suited to destroy a Bominate one-on-one.\n\nWhich means that ${deathone} is about to die.\n\n*page_break\n\nThis thought grows even more grim as you suddenly find yourself lowering rapidly towards ${deathone}'s body—seconds later, your ghostly form fully inhabits ${deathone}. You aren't quite within, but you aren't exactly without, either. You try to bend your legs to somehow jump out of ${deathone}'s body, but merely bend ${deathone}'s legs instead. \n\nMirrored Matron, are you somehow influencing ${deathone}'s movements?\n\nYou want to know how that's possible, but the moment you exercise this control, you can already begin to feel it slipping away. You can sense that you're only going to get one shot at making this limited influence count. \n\nKnowing you don't stand a chance of killing the Bominate, you instead focus on its bizarre faceplate. Why does this Bominate have one, unlike the others? What is it hiding underneath? If you can't save ${deathone}, maybe at least you can use this time to discover something new, to make \n*if todrickdie\n\this \n\t*goto roasachirp\n*else\n\t${brehis}\n\t*goto roasachirp\n\n*label roasachirp\ndeath count for something.\n*page_break\n\n\"Priscy, I don't know how you're doing this,\" Rosae chirps, her voice sounding very far in the distance. \"This is totally unprecedented! Whatever you do here, rely on your absorption strengths!\"\n\nAs Rosae's voice fades further and further away, you find it reassuring that at the very least, hearing her probably means you're not dead. Perhaps this is some strange form of present MemoryTravel, though that wouldn't explain why you can suddenly influence ${deathone}'s actions….\n\nThat doesn't matter much right now, you tell yourself. All that matters is knocking the Bominate's faceplate off before your time here runs out.\n\n*if (tech > 10) and (energy > 10)\n\t*achieve techapprentice\n\t*achieve energyapprentice\n\tAs you turn your focus to your acquired abilities, you can suddenly feel that your Tech and Energy Absorptions have reached a new level—you've aquired a special level of beginner expertise in each area. You had better use this new technological or energetic skill to your advantage.\n\t*goto thebomchoice \n*elseif (tech > 10)\n\t*achieve techapprentice\n\tAs you turn your focus to your acquired abilities, you can suddenly feel that your Tech Absorption has reached a new level—you've aquired a special level of beginner expertise in that area. You had better use this new technological skill to your advantage.\n\t*goto thebomchoice \n*elseif (energy > 10)\n\t*achieve energyapprentice\n\tAs you turn your focus to your acquired abilities, you can suddenly feel that your Energy Absorption has reached a new level—you've aquired a special level of beginner expertise in that area. You had better use this new energetic skill to your advantage. \n\t*goto thebomchoice\n*else\n\tAs you turn your focus to your acquired abilities, you realize that so far, you've only been able to specialize in a few areas, based on your two full absorbs so far. You're sure that you'll be able to focus on strengthening other areas in the future, but right now you should focus on utilizing your strongest absorption trait.\n\t*goto thebomchoice\n\n*label thebomchoice\n\nEspecially since the Bominate is reaching down to remove the ticking heartbomb from its chest.\n\n*choice\n\t*if (todrickdie) #Use the energy gifted by Lady Venuma to blast off the Bominate's faceplate.\n\t\t*set energy +2\n\n\t\tYou curl your fists and feel semi-dense balls of energy forming between your fingertips.\n\n\t\tWithout hesitation, you raise Todrick's arms and fire off two pure glowblasts of golden energy.\n\t\t*goto energytest\n\t*if (todrickdie = false) #Use Breeze's wind energy to blast off the Bominate's faceplate.\n\t\t*set energy +2\n\t\t\n\t\tYou curl your fists and feel swirling balls of wind circulate around your fingertips. \n\n\t\tWithout hesitation, you raise Breeze's arms and shove off two gust blasts of pure wind force.\n\n\t\t*label energytest\n\n\t\t*if (energy > 10)\n\t\t\tThe blast connects with the Bominate's face and knocks the faceplate clean off, in an impressive display.\n\t\t\t*goto mutlitruth\n\t\t*else\n\t\t\tThe blast connects with the Bominate's face and knocks it askew. However, the blast wasn't strong enough to take it clean off.\n\n\t\t\tBlerg.\n\t\t\t*page_break\n\t\t\t*goto deathcometh\n\t#Use ${deathone}'s borrowed agility to get close enough to knock the faceplate off.\n\t\t*set agile +2\n\n\t\tWithout another moment's hesitation, you dart ${deathone}'s body forward toward the Bominate. Just as it thinks you're going to strike it head on, you feint ${deathone} left, then tumble right. \n\n\t\tYou roll ${deathone} across the ground and pop back up into a leap within the space of a second. As ${deathone} soars through the air, you see the Bominate raise its metallic arm to block—but ${deathone} is too fast for that.\n\n\t\tYou have ${deathone} spin tightly around the block, then force one leg up to connect with the Bominate's faceplate.\n\t\t*if (agile > 5)\n\t\t\tThe kick lands with enough force to knock the Bominate's faceplate clean off, so you tumble once again and dart off to put some distance between ${deathone} and the Bominate.\n\t\t\t*goto mutlitruth\n\t\t*else\n\t\t\tThe kick lands, but only with enough force to knock the Bominate's faceplate askew. Defeated, you tumble once again and dart off to put some distance between ${deathone} and the Bominate.\n\n\t\t\tBlerg.\n\t\t\t*page_break\n\t\t\t*goto deathcometh\n\t#Use your residual OtherBoard technical influence to remove the faceplate.\n\t\t*set tech +2\n\n\t\tAccessing the knowledge you acquired from OtherBoard, you try to think through the probable android design of the faceplate. Automatically, you see exactly the places where the faceplate is locked into the Bominate's face. \n\n\t\tWithout another moment's hesitation, you dart ${deathone}'s body forward towards the Bominate. Just as it thinks you're going to strike it head on, you feint ${deathone} left, then tumble right. \n\n\t\tYou roll ${deathone} across the ground and pop back up into a leap within the space of a second. As ${deathone} soars through the air, you see the Bominate raise its metallic arm to block—but ${deathone} is too fast for that.\n\n\t\tYou have ${deathone} spin tightly around the block, then force a leg up to connect with the Bominate's faceplate, in exactly the place where it attaches.\n\t\t*if (tech > 14)\n\t\t\tAs your strike lands, the fasteners unlock and the faceplate falls to the floor.\n\t\t\t*goto mutlitruth\n\t\t*else\n\t\t\tHowever, the coding slips through your fingers. You didn't acquire enough residual technological prowess to exert control like this.\n\n\t\t\tBlerg.\n\t\t\t*page_break\n\t\t\t*goto deathcometh\n\t#Use the strength gifted by Lady Venuma to rip the faceplate off.\n\t\t*set strength +2\n\n\t\tWithout another moment's hesitation, you push ${deathone}'s body forward toward the Bominate. Just as it thinks you're going to strike it head on, you feint ${deathone} left, then bank right.\n\n\t\tWith all the force you can muster, you swing ${deathone}'s fist at the Bominate's face. The fist crunches into the Bominate's faceplate with a painful clang, knocking it askew. You then spin and use your other hand to grab at the faceplate.\n\t\t*if (strength > 9)\n\n\t\t\tYou rip with all of Lady Venuma's borrowed strength, tearing the faceplate off. Then you tumble back away from the Bominate to get some distance.\n\n\t\t\t*if (strength > 10)\n\t\t\t\t*achieve strengthapprentice\n\t\t\t\t*goto mutlitruth\n\t\t\t*else\n\t\t\t\t*goto mutlitruth\n\t\t*else\n\t\t\tYou rip with all of Lady Venuma's borrowed strength, but the faceplate doesn't budge. Left vulnerable, you tumble back away from the Bominate to get some distance.\n\n\t\t\tBlerg.\n\t\t\t*page_break\n\t\t\t*goto deathcometh\n\n*label mutlitruth\n*page_break\n*set multiplicitytruth true\n*set mastery +2\n\nAs the faceplate hits the ground, you look at the thing's real face.\n\nAnd a wave of nausea flips your stomach upside down…\n\n…because printed on the Bominate's metal cheek are the letters \"OB.\"\n\nThe same letters you once saw printed on Multiplicity's cheek.\n\nBlerg, could someone possibly have used Multiplicity's body to create this latest Bominate? As the horror of this notion spreads through your limbs, you can only wonder one thing:\n\nCan OtherBoard see this through the fluid barrier, somehow?\n\n*page_break\n*achieve multiplicitytruthac\n*goto deathcometh\n\n*label deathcometh\n\nYou then feel your grasp of control over ${deathone} slip away as you float back into the air. Whatever allowed you to affect ${deathone}'s actions must be wearing off. You drift higher and higher like a full balloon, watching the Versus Match play out beneath your rising feet.\n\n*if todrickdie\n\tAs the battle continues, Todrick uses his knowledge of the terrain in combination with his nimble limbs to dodge the Bominate's acidic blasts, darting around the field. He stays in constant motion, showing much more agile prowess than you would ever have expected. Even from this high up, you can tell he is looking for the right moment to strike back.\n\n\tOnce Todrick finally sees that he has a clear shot, he takes the only one he can. He unleashes a full golden goddess glowblast at the Bominate, one that lights up the inside of its chest cavity. The Bominate explodes in a dazzling fizz of green acid, which Todrick protects against with a hastily crafted golden glowshield.\n\n\t*page_break\n\n\tAs the Bominate falls to the ground in a smoking heap, a look of sheer joy comes over Todrick. He must think that he has done it, that he has somehow achieved the impossible. You can tell, he truly believes the celebration will be epic, that his legend will reign unparalleled. \n\n\tYou know better though, as you float higher and higher in this fading fever dream. You know that, no matter what he believes, it won't be long before Todrick joins you up here in the clouds.\n\n\tSure enough, the last thing you see is the Bominate's body beginning to regrow, twice as fast as its predecessor.\n\t*goto wakeupcold\n*else\n\tAs the battle continues, Breeze uses ${brehis} wind manipulation to whip ${brehis} light limbs around fast enough to dodge the Bominate's acidic blasts, darting around the field like a hummingbird. Even from this high up, you can tell ${breze} is simply looking for the right moment to strike back.\n\n\tOnce Breeze finally sees that ${breze} has a clear shot, ${breze} takes the only one ${breze} can. Breeze unleashes a full golden goddess glowblast at the Bominate, one laced with added wind-force. The combination blast lights up the inside of the Bominate's chest cavity, cracking it apart with devastating force. \n\n\tThe Bominate explodes in a dazzling fizz of green acid, which Breeze protects against with a hastily crafted golden glowshield.\n\n\t*page_break\n\n\tAs the Bominate falls to the ground in a smoking heap, a look of sheer joy comes over Breeze. $!{Breze} must think that ${breze} has done it, that ${breze} has somehow achieved the impossible. You can tell, Breeze truly believes the celebration will be epic, that ${brehis} legend will reign unparalleled. \n\n\tYou know better though, as you float higher and higher in this fading fever dream. You know that, no matter what ${breze} believes, it won't be long before Breeze joins you up here in the clouds.\n\n\tSure enough, the last thing you see is the Bominate's body beginning to regrow, twice as fast as its predecessor.\n\t*goto wakeupcold\n\n*label wakeupcold\n*page_break\n\nAs your body rises into a pulsating storm cloud, you hear ${deathone}'s scream pierce the air.\n\nYou float higher and higher with one dreaded feeling, facing the horrible reality: \n\nSomeday, you will have to face this Versus arena yourself. \n\nUnless you do something to change your fate. \n\n*page_break Wide Awake\n*set life lifemax\n\nYou wake up to an Aye Aye hovering above you, wearing a white cap and reading some alien monitor beside your bed. You expect to feel terrible, but actually you feel great—at least physically. You're not in your Battlesuite armor, so you can't tell for sure, but you bet that your Life Meter would read full if you were.\n\n\"Ah, well that certainly took you long enough.\"\n\nYou hear Lady Venuma's voice and sit up straight in your bed. You look across the room to find her sitting in a dark corner, lit only by her own golden glow. You've never seen Lady Venuma at night before, so her shimmering body-halo is as surprising as it is mesmerizing.\n\n\"When I came to fetch you for the funeral, I did not expect you to still be healing,\" Lady Venuma sighs. \"It is easy to forget how frail mortals are…though I suppose not on this day.\"\n\nA somber look overtakes Lady Venuma, and that's when you understand that what you witnessed must really have happened. \n\n${deathone} is dead.\n\n*page_break\n\nLady Venuma stands, shaking off her sadness, and the Aye Ayenurse knows instinctively to scamper out of the room. \n\n\"What happened to Empress Vaccus?\" you ask first, before Lady Venuma can begin pursuing whatever agenda she came here to push.\n\n\"That blasphemous black thing?\" Lady Venuma says. \"It hasn't been seen since your little romp in the woods, which means you might have injured it rather badly. Inter-inhabitant violence is strictly forbidden on Versus outside of Matches. The aggressors of any conflict are not given medical attention, so you are lucky that Verses deemed you the defender in your conflict. What in all Stars Between was that thing?\"\n\n\"Empress Vaccus is the leader of a deadly race that—\"\n\n\"Never mind. We do not have time for such explanations,\" Lady Venuma interrupts, stepping closer to your bedside.\n*if (rlshp_venuma > 70)\n\t*if (justfriendsvenuma) or (attractedtowomen = false)\n\t\t*goto friendset\n\t*else\n\t\t*goto potentiallvrom\n*else\n\t*goto friendset\n\t\n*label potentiallvrom\n*page_break\n\n\"I am here to say that it is a great tragedy that Todrick had to die, but his sacrifice will ensure that things change here on Versus,\" Lady Venuma says. \"This will be Todrick's profound legacy.\"\n\nYou nod your head, because however you feel about it, what Lady Venuma says is not untrue.\n\n\"What I truly came here to do, however, is to \n*if ruthlessrebellion\n\tthank you for convincing Todrick to volunteer. I do wish you had the wisdom to run this decision by me first—and I suggest that you do so in the future. That said, I believe a reward is still in order.\"\n\t*goto romancelvtest\n*elseif (rlshp_venuma > 50)\n\treward you for your loyalty.\"\n\t*goto romancelvtest\n\n*label romancelvtest\n\nLady Venuma places a hand on your thigh, which you very suddenly notice is exposed underneath a thin medical gown.\n\n*if (wantvenuma) or (kissvenuma)\n\t\"I came here so we may have time to finish that which we started,\" Lady Venuma continues. \"We have less time than I would prefer, but it will suffice.\"\n\n\t*if brefinalromance\n\t\tYour mind flashes to Breeze. You have to decide—and quickly—whether you'll let what happened with ${brehir} affect what you do here.\n\t\t*goto lvdecidebefore\n\t*elseif obnsr\n\t\tYour mind flashes to OtherBoard. You have to decide—and quickly—whether you'll let your talk with her affect what you do here.\n\t\t*goto lvdecidebefore\n\t*else\n\t\t*label lvdecidebefore\n\n\t\t*choice\n\t\t\t#I still want Lady Venuma, right here and now.\n\t\t\t\t*goto lvhookupscene\n\t\t\t*hide_reuse #I still want Lady Venuma, but not right now.\n\t\t\t\t\"I'm afraid it's now or never, little lost one,\" Lady Venuma proclaims. \"Goddesses are not meant to be kept waiting. Or wanting.\"\n\t\t\t\t*goto lvdecidebefore\n\t\t\t#I just want to be friends with Lady Venuma.\n\t\t\t\t*label lvletdowneasy\n\t\t\t\t*set justfriendsvenuma true\n\t\t\t\t*set rlshp_venuma %-25\n\n\t\t\t\tLady Venuma hits you with an icy look, laced with surprise and amusement.\n\n\t\t\t\t\"Careful, little lost one,\" Lady Venuma teases, leaning in closer. \"Goddesses are not meant to be kept waiting. Or wanting.\"\n\n\t\t\t\t*label breezeinsultscene\n\t\t\t\t*if brefinalromance\n\t\t\t\t\t*set breezeinsult true\n\n\t\t\t\t\t\"You should also know that I've already had Breeze,\" Lady Venuma adds as she stands tall once again. \"Good luck getting ${brehir} to choose you over me.\" \n\n\t\t\t\t\tFor a moment, you are too stunned to speak—Breeze lied to you. Though you suppose it's entirely possible that Lady Venuma could be lying to you now, as well.\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto finallvresponse\n\t\t\t\t*else\n\t\t\t\t\t*page_break\n\t\t\t\t\t*goto finallvresponse\n\t\t\t#I am interested in someone else besides Lady Venuma.\n\t\t\t\tWith that, Lady Venuma resumes standing, towering tall above you.\n\t\t\t\t*goto lvletdowneasy\n*else\n\t\"I came here because I continue to find you utterly fascinating,\" Lady Venuma continues. \"As is the way of The Wone, it is my desire to experience the uncharted.\"\n\n\t*if brefinalromance\n\t\tYour mind flashes to Breeze; you have to decide—and quickly—whether you'll let what happened with ${brehir} affect what you do here.\n\t\t*goto lvdecidebeforetwo\n\t*elseif obnsr\n\t\tYour mind flashes to OtherBoard; you have to decide—and quickly—whether you'll let your talk with her affect what you do here.\n\t\t*goto lvdecidebeforetwo\n\t*else\n\t\t*label lvdecidebeforetwo\n\t\t\n\t\t*choice\n\t\t\t#I sill want Lady Venuma, right here and now.\n\t\t\t\t*goto lvhookupscene\n\t\t\t*hide_reuse #I still want Lady Venuma, but not right now.\n\t\t\t\t\"I'm afraid it's now or never, little lost one,\" Lady Venuma proclaims. \"Goddesses are not meant to be kept waiting. Or wanting.\"\n\t\t\t\t*goto lvdecidebeforetwo\n\t\t\t#I don't want a romance with Lady Venuma.\n\t\t\t\t*goto lvletdowneasy\n\t\t\t#I have my eye on someone else besides Lady Venuma.\n\t\t\t\t*goto lvletdowneasy\n\n\n*label lvhookupscene\n*set lvfinalromance true\n*achieve lvfinalromanceac\n*set rlshp_venuma %+30\n\nLady Venuma kisses you and from the very first instant, you realize that you've given up any trace of mortal control. Her tongue slides out of your mouth and finds its way to your chest, just before Lady Venuma rips open your medical gown. She drags her eyes across your naked body, taking in every inch and curve with an anticipation so fierce, you can feel it vibrating off her golden skin.\n\nLady Venuma puts her hands on your bare hips, her blazing grip burning holes into your flesh. She kisses you again, with considerable force, before she reaches between your legs. You force your eyes shut as she flicks her wrist. Uncontrollably, you explode.\n\nWhen you open your eyes again, golden glowenergy ripples across Lady Venuma's body, stripping away her clothes. As the golden hue drips off her gleaming, exposed skin and onto your own, you find yourself immediately ready for more.\n\nWhich is good, because Lady Venuma places both of her hands around your cheeks and guides your head between her thighs.\n\nWhat you find is…divine.\n\n*page_break Multiples Later\n\nYou might have all of your clothes back on and appear ready to move on, but you can tell that this experience will not leave you for a very long time. It was truly…\n\n…transformative.\n\n*if brefinalromance\n\t*set thruple true\n\t*achieve thrupleac\n\n\t\"Ah, I certainly recognize that look,\" Lady Venuma laughs, her own black jumpsuit already reformed. \"You look rather like Breeze did, after our first time.\"\n\n\tYou hear the words, but have a hard time at first discerning their meaning. The moment you do, it sends your heart crashing through your chest. You are too stunned to speak—Breeze lied to you. Though you suppose it's entirely possible that Lady Venuma could be lying to you now, as well.\n\n\tLady Venuma must catch the look of concern on your face, however, because she immediately adds: \"The three of us will have to get together, sometime.\"\n\n\tYou muster enough focus to nod at Lady Venuma, though all you really want to do is lie back down. Whether or not you could ever really follow through on such an offer, all you currently want to do is entertain the possibilities in your mind for a few hours.\n\n\t*page_break\n\n\t\"I know it will prove difficult,\" Lady Venuma continues, attempting to pull you out of your stupor, \"but we must return to reality. Do you think you can carry on, my love?\"\n\n\tYou conjure another nod for Lady Venuma, thinking perhaps that might be for the best. You could probably stay here forever, if given the option.\n\n\t\"Good,\" Lady Venuma says, now standing in front of the door. \"You and I have one last piece of business to attend to before we depart. I came to see you for many reasons, but the last is perhaps the most important, if you can imagine such a thing.\n\t*goto finallvresponse\n*else\n\t\"I know it will prove difficult,\" Lady Venuma begins, her own black jumpsuit already reformed, \"but we must return to reality. Do you think you can carry on, my love?\"\n\n\tYou muster enough focus to nod at Lady Venuma, though all you really want to do is lie back down and replay this experience over and over in your mind. \n\n\t\"Good,\" Lady Venuma says, now standing in front of the door. \"You and I have one last piece of business to attend to before we depart. I came to see you for many reasons, but the last is perhaps the most important, if you can imagine such a thing.\"\n\n\t*page_break\n\t*goto finallvresponse\n\n*label friendset\n*if genuineregime\n\t\"When I invited you to that first meeting with Todrick, I never once fathomed that he would ever listen to your word over mine, if you ever had the gall to cross me. I'm here to tell you that Breeze is dead because of you.\"\n\n\t*page_break\n\n\t\"And Todrick would have been dead because of you,\" you say in return, trying to keep your cool through the fury of emotion that descends upon you.\n\n\t\"You think that makes us the same?\" Lady Venuma almost laughs. \"You forget that it is my birthright to decide such things. Though this you will learn, one way or another. For I never make the same mistake twice.\"\n\n\tLady Venuma might pose this as a drop of wisdom, but you can certainly decipher a threat when you hear one. Before you can even respond, Lady Venuma continues.\n\t*goto finallvresponse\n*else\n\t*page_break\n\n\t\"I am here to say that it is a great tragedy that Todrick had to die, but his sacrifice will ensure that things change here on Versus,\" Lady Venuma says. \"This will be Todrick's profound legacy.\"\n\n\tYou nod your head, because however you feel about it, what Lady Venuma says is not untrue.\n\n\t*if ruthlessrebellion\n\t\t\"I also came here to thank you in person for convincing Todrick to volunteer. I do wish you had the wisdom to run this decision by me first—and may I expect you will do so in the future?\"\n\n\t\tLady Venuma might pose this as a question, but you can certainly decipher an order when you hear one. Before you can even respond, Lady Venuma continues.\n\t\t*goto finallvresponse\n\t*elseif (rlshp_venuma > 50)\n\t\t*goto finallvresponse\n\t*else\n\t\t*goto finallvresponse\n\n*label finallvresponse\n \n\"Really, I came here to ask one simple question, one that should provide all the answers I need about our little lost one,\" Lady Venuma says. \"${name} Thomil, tell me…\"\n\nLady Venuma sets her golden gaze on you and pauses, allowing her aura of suspense to build. Before she speaks, traces of a grin begin to spread across her lips, baring her gleaming teeth. Then, she finally asks her question:\n\n*page_break\n\n\"Do you believe in me?\"\n\nYou hear the question and immediately realize how important your answer will be. \n\nNot just because you're fairly certain that Lady Venuma can identify your intentions, but because this is where politics may meet purpose, for you. You haven't had much time to reflect on whether Lady Venuma's behavior has changed your views, on many things.\n\nSo what is your answer?\n\n*choice\n\t*if (lvfinalromance) #\"After that experience, I believe that anything is possible.\"\n\t\t*achieve lvbelieverac\n\t\t*set growth +1\n\t\t*set lvbeliever true\n\t\t*set lvskeptic false\n\t\t*set lvfascinated false \n\n\t\t\"Wondrous,\" Lady Venuma practically coos, a wide smile spreading across her golden face.\n\n\t\t*goto lvmasterytest\n\t#\"I believe gods walk among us: you, Queen Ashe, Empress Vaccus, Dhanthik. And I plan to follow in your footsteps.\"\n\t\t*achieve lvbelieverac\n\t\t*set rlshp_venuma %+30\n\t\t*set growth +3\n\t\t*set lvbeliever true\n\t\t*set lvskeptic false\n\t\t*set lvfascinated false \n\n\t\tYou wonder for a fleeting moment if Lady Venuma will somehow spark at the mention of Dhanthik's name, but that thought washes away as she responds.\n\n\t\t\"I suppose we shall have to see whether, to you, following means worshipping, or…becoming.\"\n\n\t\tAs Lady Venuma's words ring in your ears, you're surprised to learn that you're not entirely sure, yourself.\n\t\t*goto lvmasterytest\n\t#\"You possess great power, but I believe divinity is abstract, made of the forces that move us where we need to go.\"\n\t\t*achieve lvskepticac\n\t\t*set growth +3\n\t\t*set lvbeliever false\n\t\t*set lvskeptic true\n\t\t*set lvfascinated false \n\n\t\t\"Then you must believe Versus itself is divine,\" Lady Venuma responds, a curious, unreadable look passing across her face.\n\n\t\tAs Lady Venuma's words ring in your ears, you're surprised to learn that, whether or not you thought of Versus that way before, you certainly might start to now.\n\n\t\t*if (genuineregime)\n\t\t\t*set rlshp_venuma %-15\n\t\t\t*goto lvmasterytest\n\t\t*else\n\t\t\t*set rlshp_venuma %+15\n\t\t\t*goto lvmasterytest\n\t#\"I don't believe in anything. That is what makes me strong.\"\n\t\t*achieve lvskepticac\n\t\t*set growth -3\n\t\t*set rlshp_venuma %-5\n\t\t*set lvbeliever false\n\t\t*set lvskeptic true\n\t\t*set lvfascinated false \n\n\t\t\"Then I suppose we have different definitions of strength,\" Lady Venuma responds, a curious, unreadable look passing across her face.\n\n\t\t[i]You suppose, indeed,[/i] you think.\n\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+20\n\t\t\t*goto lvmasterytest\n\t\t*else\n\t\t\t*set ruthless %-20\n\t\t\t*goto lvmasterytest\n\t#\"I believe in what you are trying to do on Versus. That is enough, for now.\"\n\n\t\t\"Let us hope so,\" Lady Venuma responds, a curious, unreadable look passing across her face.\n\n\t\t[i]Let us hope so, indeed,[/i] you think.\n\n\t\t*if (ruthlessregime)\n\t\t\t*set growth +1\n\t\t\t*set regime %+20\n\t\t\t*set rlshp_venuma %+10\n\t\t\t*goto lvmasterytestnubbin\n\t\t*elseif (genuineregime)\n\t\t\t*set rlshp_venuma %-15\n\t\t\t*goto lvmasterytestnubbin\n\t\t*else\n\t\t\t*set growth +3\n\t\t\t*set rlshp_venuma %+30\n\t\t\t*set regime %-20\n\t\t\t*label lvmasterytestnubbin\n\t\t\t*if lvbeliever\n\t\t\t\t*achieve lvbelieverac\n\t\t\t\t*goto lvmasterytest\n\t\t\t*elseif lvskeptic\n\t\t\t\t*achieve lvskepticac\n\t\t\t\t*goto lvmasterytest\n\t\t\t*else\n\t\t\t\t*achieve lvfascinatedac\n\t\t\t\t*goto lvmasterytest\n\t#\"I believe only in the doctrine of reflection and openness. I will never believe in anything else.\"\n\t\t*achieve lvskepticac\n\t\t*set growth -3\n\t\t*set rlshp_venuma %-15\n\t\t*set lvbeliever false\n\t\t*set lvskeptic true\n\t\t*set lvfascinated false \n\n\t\t\"Then I fear you will lead a very small life, indeed,\" Lady Venuma responds, not bothering to hide the look of contempt that passes across her face.\n\n\t\tStill, all you can think is: [i]There is nothing wrong with a small life, if it is led with conviction.[/i]\n\t\t\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+20\n\t\t\t*goto lvmasterytest\n\t\t*else\n\t\t\t*set ruthless %-20\n\t\t\t*goto lvmasterytest\n\t#\"I believe you are selfish and petty and power-hungry.\"\n\t\t*set growth +3\n\n\t\t\"Then, according to many scriptures, you believe I am a god, after all,\" Lady Venuma almost laughs, a curious and amused look passing across her face.\n\n\t\tWhether that's true or not, you're quite comfortable allowing Lady Venuma to believe that, for now.\n\t\t\n\t\t*if (ruthlessregime) or (genuineregime)\n\t\t\t*set regime %+20\n\t\t\t*set rlshp_venuma %-30\n\t\t\t*goto lvmasterytestnubbintwo\n\t\t*else\n\t\t\t*set rlshp_venuma %-15\n\t\t\t*label lvmasterytestnubbintwo\n\t\t\t*if lvbeliever\n\t\t\t\t*achieve lvbelieverac\n\t\t\t\t*goto lvmasterytest\n\t\t\t*elseif lvskeptic\n\t\t\t\t*achieve lvskepticac\n\t\t\t\t*goto lvmasterytest\n\t\t\t*else\n\t\t\t\t*achieve lvfascinatedac\n\t\t\t\t*goto lvmasterytest\n\t#\"I have a savior in Dhanthik, and Ze is all I will ever need.\"\n\t\t*achieve lvskepticac\n\t\t*set growth +3\n\t\t*set rlshp_venuma %-15\n\t\t*set lvbeliever false\n\t\t*set lvskeptic true\n\t\t*set lvfascinated false\n\n\t\tYou wonder for a fleeting moment if Lady Venuma will somehow spark at the mention of Dhanthik's name, but that thought washes away as she responds.\n\n\t\t\"Then I hope that Ze leads you where you need to go,\" Lady Venuma responds, a curious, unreadable look passing across her face.\n\n\t\tAs Lady Venuma's words ring in your ears, all you can think is that you certainly hope so, too.\n\t\t\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+20\n\t\t\t*goto lvmasterytest\n\t\t*else\n\t\t\t*set ruthless %-20\n\t\t\t*goto lvmasterytest\n\t#\"I believe I have much to learn from you and the others on Versus.\"\n\t\t*achieve lvfascinatedac \n\t\t*set growth +3\n\t\t*set rlshp_venuma %+15\n\t\t*set lvbeliever false\n\t\t*set lvskeptic false\n\t\t*set lvfascinated true\n\n\t\t\"Indeed, there is a grand design to things, one it takes many years to be able to see,\" Lady Venuma responds, a curious, unreadable look passing across her face. \"Not all are destined to do so, but I believe you have the potential to see it someday, as well.\"\n\n\t\tAs Lady Venuma's words ring in your ears, all you can think is that you certainly hope so, too.\n\n\t\t*goto lvmasterytest\n\n*label lvmasterytest\n\n\"I have a question for you in return, great Lady,\" you say, seeing that you pique Lady Venuma's interest, if only with your boldness. \"I must ask: do you believe in me?\"\n\nLady Venuma stares back at you for what feels like forever, her shining eyes boring holes into your face. It is impossible to tell if your question has amused or enraged her, but you at least know that you have captured her full attention.\n\nLady Venuma then exhales and looks away, as if she has learned all she needs to make her final judgment. \n\n*page_break\n\nNaturally, Lady Venuma won't deign to inform you of whatever her answer might be…but still, you can feel all you need to know emanating from her glowing, golden skin.\n\n*if lvfinalromance\n\t*goto skipfriendachieve\n*if (rlshp_venuma > 70)\n\t*achieve lvfinalfriend\n\t*label skipfriendachieve\n\t*if (genuinerebellion) or (ruthlessrebellion)\n\t\t*set mastery +1\n\t\t*set status +2\n\t\t*goto tiemforfuneral\n\t*else\n\t\t*goto tiemforfuneral\n*elseif (rlshp_venuma > 50)\n\t*achieve lvfinalally\n\t*goto midgroundtest\n*elseif (rlshp_venuma > 30)\n\t*achieve lvfinalally\n\t*label midgroundtest\n\t*if (ruthlessregime) or (stayneut)\n\t\t*set mastery +1\n\t\t*set status +2\n\t\t*goto tiemforfuneral\n\t*else\n\t\t*goto tiemforfuneral\n*else\n\t*achieve lvfinalenemy\n\t*if genuineregime\n\t\t*set mastery +1\n\t\t*set status +2\n\t\t*goto tiemforfuneral\n\t*else\n\t\t*goto tiemforfuneral\n\n*label tiemforfuneral\n\n\"I'm afraid we have a funeral to attend,\" Lady Venuma finally sighs, stepping toward the door.\n\nUnfortunately, Lady Venuma is correct about that much.\n\n*page_break Next Chapter\n\n*image epilogue.png\n\n*image e_epilogue.png\n\n${blank}\n\n*page_break\n\nYou aren't sure just how mandatory other Versus ceremonies are yet, but you know this one is optional. Which is why it's stunning to see the crowd gathered around ${deathone}'s memorial statue.\n\nNo one says a word, but no one has to—you can feel their sadness and fear on the surface of the scene. You've rarely full absorbed anyone, let alone someone who has died in the middle of the experience. You can still feel ${deathone}, but the memories and abilities are already slipping away, like some invisible tether has been broken. You had no idea you needed life to sustain the absorb connection, but it does make sense.\n\nThis broken connection is perhaps why you can now feel the deep well of guilt radiating out of ${liveone}, the pity from Baron Airon, the confusion from Grog. Next to them, Pinkuju fails to stop herself from crying, though maybe she is just doubling up from the empty emotional wall you get from the shrouded being. \n\nPerhaps the most surprising is the outpouring of respect and honor coming from Cel and Trig, considering you didn't expect that they'd even be here. However, you figure now that funerals for lost warriors are an all-too-common occurrence, where they're from.\n\n*page_break\n\nYou're most touched, though, to see OtherBoard make her first public appearance. She stands on the outskirts, separate from the main group and lingering like a bundle of compiled nerves, but at least she is here.\n*if multiplicitytruth\n\tYou don't know if OtherBoard has learned the Multiplicity truth about this Bominate, but now is not the time to discuss it. There will be time for that later, you think sadly. You haven't even processed this grim reality yourself.\n\t*goto considerprese\n*else\n\t*goto considerprese\n\n*label considerprese\n\nYou consider that OtherBoard, Cel, and Trig's presence here today might mean that Lady Venuma has finally had a chance to formally meet with them, but that's yet another consideration for a later time.\n\nRight now, it is time to pay your respects to ${deathone}.\n\n*page_break\n\nThis memorial green should be a beautiful place, with its beds of flowers planted between winding turquoise streams, its sturdy, reassuring oak trees, and its deep thickets of bougainvillea vines.\n\nYes, there would be something beautiful about this place, if it wasn't so haunted. It's them: the silverized statues, fluid and pulsing in their stillness, stretching across the garden hills in tidy rows. There are hundreds of them, each representing a life lost on this strange, foreign planet. They issue a sentence of gravity that makes it rather difficult to breathe. \n\nEach silvery, fluid memorial statue represents a life lost on Versus, a soul vanished from its home, never to be seen again. You stare at \n*if todrickdie\n\tTodrick's, an opaque effigy to a life lived humbly: \n\t*achieve todrickdeathac\n\t*goto stoodnever\n*else\n\tBreeze's, an opaque effigy to a delicate life:\n\t*achieve breezedeathac\n\t*goto stoodnever\n\n*label stoodnever\none that never, ever stood a chance here on Versus.\n\nThat's when the cold reality grips you, the emotion solidifying in your chest, hardening full of dread.\n\n[i]You don't want to die here.[/i]\n\n*page_break\n\n*if (regime > 50)\n\tThis feeling is only reinforced by the tinted Elite skybox hovering safely above the ceremony, its members having handed down their condemnations from on high. You know, however, that your anger is only rooted in jealousy. \n\n\tYou want to be one of them.\n\t*goto quaspeech\n*else\n\tThis feeling is only reinforced by the tinted Elite skybox hovering above the ceremony like a great whopping [i]blerg you.[/i] It's insulting enough that The Elite Courte hands down its condemnations from on high, but for its members to come here and not even show their faces…\n\n\t…you want to rip them out of the sky.\n\t*goto quaspeech\n\n*label quaspeech\nPerhaps, if everything goes as you have planned, you'll actually get the chance to do just that.\n\nFeeling the familiar urge to reflect, you think about how all of your motivations have woven and intersected during your short time on Versus. Every aspect of what you believe has been tried and tested, and whether you've been aware or not, your political decisions have been colored by your unique Priscan perspective.\n\nYou know that moving forward, if you're going to continue to evolve and achieve your goals, if you're going to survive the trials to come, you'll have to build a deep well of resolve. You're going to have to continue to think critically about what drives you. \n\nSo, in this moment, what have you come to value, above all else?\n\n*choice\n\t#Everything I do is in service of finding Dhanthik and saving Prisca, despite—or perhaps because of—my planet's potential flaws.\n\t\t*set growth +3\n\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]PURPOSE-FULL.[/b]\n\n\t\t*if (regime > 50)\n\t\t\t*set regime %+20\n\t\t\t*goto ashebeginsspeaking\n\t\t*else\n\t\t\t*set regime %-20\n\t\t\t*goto ashebeginsspeaking\n\t#Just as I plan to change things on Versus, I also plan to change the way of things back on Prisca.\n\t\t*set growth +3\n\t\t*set regime %-20\n\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\t\t\n\t\t[b]REVOLUTIONARY.[/b]\n\t\t*goto ashebeginsspeaking\n\t#I value my unique Priscan perspective on sharing and reflecting above all else. I want to protect that by maintaining order wherever I can, even here on Versus.\n\t\t*set growth +3\n\t\t*set regime %+20\n\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]DISCIPLE.[/b]\n\t\t*goto ashebeginsspeaking\n\t#I will continue to do what suits me in the moment, without regard for consequences or purpose.\n\t\t*set growth -5\n\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]SELF-MOTIVATED.[/b]\n\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+20\n\t\t\t*goto ashebeginsspeaking\n\t\t*else\n\t\t\t*set ruthless %-20\n\t\t\t*goto ashebeginsspeaking\n\t#I plan to leave an important legacy. I will change not just this world, but many other worlds in the galaxy beyond once I am Reborn.\n\t\t*set growth +3\n\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]EVOLVING ICON.[/b]\n\n\t\t*if (regime > 50)\n\t\t\t*set regime %+20\n\t\t\t*goto ashebeginsspeaking\n\t\t*else\n\t\t\t*set regime %-20\n\t\t\t*goto ashebeginsspeaking\n\t#I will continue to do whatever it takes to achieve my goals. For me, the ends will always justify any means necessary.\n\t\t*set growth +3\n\t\t*set ruthless %+20\n\n\t\tAs
