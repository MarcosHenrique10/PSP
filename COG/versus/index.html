ried and viable as your differing viewpoints may remain, I believe there is a more prescient distillation of the conflict that currently plagues you,\" Dhanthik resumes, swiping away Hir own holographic readout. \"At their datacores, Binarians believe that they represent the best of humanity without the organic flaws—indeed, their complex coding makes Binarians so good at simulating humanity that they’re quite capable of being better at being human than humans are themselves.\n\n\t\t\t\"Of course, on the other end of the spectrum, humans do not believe Binarian life to be true life at all. To humans, there's no authenticity in Binarians—only simulation. In summation, the Binarians believe that the soul is the problem with society, whereas humans believe it is society's only source of salvation. While many of you may find this to be a gross oversimplification of your respective species, I have found that universal truths can often be distilled simply as such.\n\n\t\t\t\"Indeed, there are many variations and combinations of these beliefs represented here, most of which are held tightly by the groundbreakingly diverse Multinarians. However, there is only one among you gathered here today who shares my own vision.\"\n\n\t\t\tDhanthik lets that thought echo in the great room, clearing the path for Hir grand proclamation, the one Ze must have gathered everyone in this ship to hear. You wonder if you might be the one here who shares Dhanthik's vision….\n\t\t\t*goto dhavision\n\n*label amnyva\n\nOnce these beliefs are properly aggregated, Dhanthik looks them over with Hir bright eyes, a blinding smile cracking open across Hir face. \n\n\"As varied and viable as your differing viewpoints remain, I believe there is a more prescient distillation of the conflict that currently plagues you,\" Dhanthik resumes, swiping away Hir own holographic readout. \"At their datacores, Binarians believe that they represent the best of humanity without the organic flaws—indeed, their complex coding makes Binarians so good at simulating humanity that they’re quite capable of being better at being human than humans are themselves.\n\n\"Of course, on the other end of the spectrum, humans do not believe Binarian life to be true life at all. To humans, there's no authenticity in Binarians—only simulation. In summation, the Binarians believe that the soul is the problem with society, whereas humans believe it is society's only source of salvation. While many of you may find this to be a gross oversimplification of your respective species, I have found that universal truths can often be distilled simply as such.\n\n\"Indeed, there are many variations and combinations of these beliefs represented here, most of which are held tightly by the groundbreakingly diverse Multinarians. However, there are none among you gathered here today who share my own unique vision.\"\n\nDhanthik lets that thought echo in the great room, clearing the path for Hir grand proclamation, the one Ze must have gathered everyone in this ship to hear.\n\n*label dhavision\n*page_break\n\n\"Fittingly, your respective bodies have also been designed to reflect your states of mind. Human bodies are built to heal, allowing them to recover from imperfection. Android bodies, conversely, are built to be indestructible, but remain incapable of healing—if any imperfection is found, they are discarded. Clearly, in both body and mind, the Rutonian and Binarian existences are reflected as if opposites in a mirror. However, where you see an opposition, I see only complementary halves.\"\n\n\"I do not believe, as many of you do, that either life-form is superior to the other. But I do believe that a superior form of life is possible here, in a way that I have found is impossible in the galaxy beyond.\n\n\"It is my belief that the perfect being lies somewhere in the middle, a combination of android awareness and control with human individuality and spontaneity. A combination of android indestructibility with human healing. A combination of android preservation with human urgency. \n\n\"Thus, I believe wholeheartedly in androids with souls, in humans with coding. I believe in the perfect evolution into Binumanity.\"\n\nA series of gasps and beeps ripple across the audience as they respond to this revelation with an expected level of shock and disgust. However, before anyone can protest further, Dhanthik raises Hir vibrating voice over the reactionary din once again.\n\n*page_break\n\n\"Combining the elusive soul with coded control is the only true way to create these ideal Binumans. This combination must be made with great urgency, for there is a terrible threat coming, one that we all must unite to fight. I have traveled your galaxy far and wide to find the perfect life-form capable of leading the charge against this indomitable foe. I now believe that Binumans are the only life-forms truly capable of evolving to a plane of existence equipped to oppose these beings, who threaten the very fabric of this galaxy and every galaxy hereafter.\"\n\nYou're too stunned to process what Dhanthik is saying, but for a different reason than most in this great room. Could it be true that Dhanthik is searching the galaxy for a race to fight the Blots? Why wouldn't Dhanthik simply return to Prisca to eradicate the Blots Hirself? The way Dhanthik speaks, it sounds like Hir understanding of the galaxy is far greater than any Priscan's possibly could be….\n\nThen a terrible thought shakes you: could Dhanthik just have appeared on Prisca in search of a great race to fight some even more terrible foe than the Blots? Did Dhanthik simply pass over Prisca, deeming your world inferior? Is that why Hir miraculous appearance was so brief?\n\nYou force this thought away, because at the moment it is too much for you to bear.\n\n*page_break\n\n\"You may have no reason to listen to me, but know that as the one who defeated your dreaded Bominate, I believe in Binumanity,\" Dhanthik proclaims, knowing Ze is about to lose Hir audience. \"And since it will surely not be enough to simply tell you, I shall now show you.\"\n\nDhanthik's skin shimmers for a moment, as if made of liquid, then begins to slide and rearrange until Dhanthik becomes something entirely new. Dhanthik no longer appears as a glowing Priscan, but as a perfect humanoid, muscled and lean, with metal seams running throughout like steel veins. Hir eyes glow a bluish white and Ze has no hair, just a bundle of wires that fall in typical Multinarian fashion.\n\nThis must be what a human-binarian hybrid would look like, in its most ideal form: \n\nThe Binuman.\n\nYou weren't sure what to expect, but this is…\n\n*fake_choice\n\t#Transcendant. \n\t#Radiant.\n\t#Intimidating.\n\t#Overwhelming.\n\nSeeing this Binuman take shape feels like a spiritual experience even greater than meeting Dhanthik Hirself. As viscerally as you reacted to the unnatural Bominate when you first saw it, you react with opposite, life-affirming intensity to the Binuman.\n\nHow could you ever doubt someone as pure and beautiful as Dhanthik?\n\nYour attention is then drawn to the air behind Dhanthik, where something new shimmers and pops in a series of darkened colors. It looks intriguing at first, until suddenly your good feelings are washed away as a new, twisted Binuman appears, with its globby hanging flesh and rusted blades.\n\nExcept that's not a Binuman… \n\n…that's the Bominate.\n\n*page_break\n\nA collective gasp ripples across the crowd, one that only lasts a moment before streams of acid begin to rip through the air. The Bominate moves like a twisted sprinkler, spraying through the audience with impossible speed. You barely have enough time to drop to the floor underneath the toxic splash as it reaches you.\n\nThen all you hear is human shouting and robotic screeching, until an explosion of varied weapon-fire finally erupts. Hoping this will occupy the Bominate for the moment, you launch back onto your feet, trying to stem the tide of fear rising through you. Didn't OtherBoard say that Dhanthik destroyed the Bominate? How could this be happening?\n\nOnce back on your feet, you are able to see through the hydro streams and plasma fire riddling the Bominate long enough to discover that it looks different. This Bominate seems to be several inches taller, with spiked clumps of reddish hair and human eyeballs dangling from its metal sockets. Though equally grotesque, this Bominate appears to be different from the one you encountered in your last MemoryTravel experience, the one that Dhanthik must have killed. Could this be some new, more horrifying version? \n\nYou don't have time to ponder this, however, because one thought grips you instead: \n\nWhat if in the real past Dhanthik is somehow killed by this Bominate? \n\n*page_break\n\nThe thought is too terrible to consider, so you do not allow it to settle. Instead, you decide that you need to get close to Dhanthik to learn whatever you can, as long as this MemoryTravel trip lasts. If you have to take on this new Bominate to do that, then so be it. You just hope you're able to somehow survive the experience, given how deadly the last Bominate proved to be.\n\nLooking down at the podium, you can see that Dhanthik has encased Royal A-03 and Squad in a protective energy bubble. Which is both good and bad, because the Bominate quickly turns the brunt of its acidic attacks on Dhanthik's shield. \n\nDhanthik tries blasting the Bominate through the shield, but the energy just slides off the Bominate's metal frame. Whoever made this new Bominate model must have designed it to be resistant to Dhanthik's energy signature. In fact, this Bominate seems poised to destroy everything Dhanthik has been trying to build here on Binaria, including Dhanthik Hirself.\n\nWhich means you have to get down there. Now.\n\n*page_break\n\nThe surviving members of the audience in the bleachers around you have frenzied into a full panic, trampling each other to try and escape the great room. You're about to launch up and grav-lift over them to reach the stage below when you hear the sound of robo-crying beside you.\n\nThat's when you turn to realize that OtherBoard is kneeling on the bleachers, holding Multiplicity…\n\n…who has been disintegrated in two, the halves of his metal body sparking and dissolving in a puddle of acidic residue.\n\n*page_break\n\nYou take in this sight, unable to find your breath. \n\nThe only thought that rings in your mind is that Multinarians claimed to not back up their databanks…\n\n…which probably means that you are witnessing the true death of Multiplicity, if there is such a thing.\n\nKnowing that there is no time to waste, you immediately decide to:\n\n*choice\n\t#Leave them. This is the past—if things really happened this way, there's nothing I can do for Multiplicity.\n\t\t*set solo %+10\n\t\t*set ruthless %+10\n\t\t*set rlshp_ob %-20\n\t\n\t\tWithout giving OtherBoard and Multiplicity a second glance, you lift into the sky, leaving them in the bleachers to face whatever fate has brought them. \n\n\t\t*goto fightnow\n\t#Ask OtherBoard to join me in fighting. I'll need the help, and OtherBoard will need to focus her grief and rage somewhere.\n\t\t*set solo %-5\n\t\t*set ruthless %-5\n\t\t*set rlshp_ob %+10\n\t\t\"OtherBoard, there's nothing else you can do,\" you shout above the chaotic explosions in the great room. \"Help me stop that thing from killing anything else!\"\n\n\t\t*label obcatatonic\n\n\t\tOtherBoard doesn't even look up at you, seemingly unable to compute. Her expression is frozen and her eye-lights have grown hauntingly dim. \n\n\t\t\"He didn't back up,\" OtherBoard finally murmurs. \"Multinarians don't back up, we don't back up.\"\n\n\t\t*page_break\n\n\t\tSeeing OtherBoard like this would break anyone's heart, but you quickly realize that there's nothing you can do—especially since this is MemoryTravel, not reality.\n\n\t\tYou wish you had time to help, but you know that to accomplish what you came here to do, you have to focus on Dhanthik.\n\n\t\tSo you lift into the sky, leaving OtherBoard and Multiplicity in the bleachers to face whatever fate has brought them.\n\t\t*page_break\n\t\t*goto fightnow\n\t#Ask if I can help OtherBoard save Multiplicity, somehow.\n\t\t*set solo %-10\n\t\t*set ruthless %-10\n\t\t*set rlshp_ob %+20\n\n\t\t\"OtherBoard, what can we do to save Multi?\" you shout above the chaotic explosions in the great room.\n\t\t*goto obcatatonic\n\n*label fightnow\n\nTaking flight, you resolve to find a way to escape the fray with Dhanthik long enough to talk with Hir. Ignoring the surge of fear and anticipation that courses through your limbs, you glide down toward the podium stage only to find that the Bominate has made its way to the edge of Dhanthik's energy shield. To your horror, the Bominate is slowly pushing its arm through the surface of the shield, its globby skin and metal bones regenerating as quickly as they burn off. \n\nThe Bominate then suddenly pushes forward and grabs Dhanthik by the throat, closing its fist around Dhanthik's neck and creating a horrible hissing crunch. Dhanthik looks panicked, as if for the first time Ze doesn't know what to do next. \n\nThe sight shakes you to the core.\n\n*if extraworning\n\t*page_break\n\t\"You're only going to get one shot at this,\" Rosae suddenly chirps, flying next to you. \"Use whatever absorbed abilities you're strongest at in your attack!\"\n\n\tHeeding Rosae's advice, you react without thought, accessing the abilities you absorbed from OtherBoard.\n\n\t*goto bmchone\n*else\n\tYou react without thought, accessing the abilities you absorbed from OtherBoard.\n\t*goto bmchone\n\n*label bmchone\nYou can only hope that somehow the Bominate's coded perceptions won't expect you to have access to unpredictable powers like these, so you might catch it off guard.\n\n*choice\n\t#Blast the Bominate clear through the ship's glass wall with an electric charge.\n\t\t*set energy +2\n\n\t\t*if blastbomthree\n\t\t\tYou feel that crackle snap across your chest once again and you scream, your ears popping this time from the massive release of pressure that rips from your body. A torrent of electrical energy floods loose from your torso and through your arms, streaking across the hall and connecting with the Bominate in licks and curls.\n\t\t\t*goto blastbom\n\t\t*else\n\t\t\tYou suddenly feel a well of electrical energy in your gut, almost like you're running on some kind of supercharged battery.\n\n\t\t\tYou've never done anything like this before, so you try to shut off your brain and allow your instincts to take over. As you do, you raise your arms and feel all of your hairs stand on end as an electric current pulses across your skin.\n\n\t\t\tIt feels satisfying at first, until a bolt of white hot pain sears its way across your chest, like a lightning bolt striking inside of you.\n\n\t\t\tYou scream from the pain, just as an electrical charge crackles and erupts from your fists, streaking out at the Bominate.\n\n\t\t\t*page_break\n\n\t\t\t*label blastbom\n\n\t\t\tThe electrical energy riddling the Bominate's body seems to have no effect,\n\t\t\t*if (energy > 6)\n\t\t\t\t*set forceful %+25\n\t\t\t\t*set solo %+15\n\t\t\t\tbut the pressure booming from the blast knocks it backward with surprising force, causing it to release Dhanthik.\n\n\t\t\t\tThe Bominate's heavy body crashes through the reinforced glass wall with an echoing crunch, followed immediately by a hissing suction. You feel yourself pulled forward and realize you didn't consider the vacuum you'd create by breaching the cabin….\n\n\t\t\t\t*label resealed\n\t\t\t\t*page_break\n\n\t\t\t\tAs you're sucked forward, flying by Dhanthik's rooted shield with astonishing speed, you attempt to activate your grav-glider to keep yourself from being swept out into the void of space. \n\n\t\t\t\tUntil you find yourself slamming into the floor and sliding across it to a skidding halt. Looking up, you see that the ship has somehow automatically reformed the glass wall—thankfully someone planned ahead better than you did.\n\n\t\t\t\tYou know nothing will keep the Bominate out for long, given its wide range of abilities, so you jump up and head straight back toward Dhanthik.\n\t\t\t\t*goto dtgregroup\n\t\t\t*else\n\t\t\t\t*set forceful %+15\n\t\t\t\t*set solo %+5\n\t\t\t\tabsorbing into its systems and negating the charge's applied force. Your blast clearly wasn't strong enough, but it was at least potent enough to catch the Bominate's attention.\n\n\t\t\t\t*label eyebomb\n\t\t\t\t*page_break\n\t\t\t\t*set life -1\n\n\t\t\t\tThe Bominate releases Dhanthik and steps back to face you. Without hesitating, it reaches up to its face and pulls out both of its dangling eyeballs. Your stomach turns as you hear the snapping pluck, which actually sounds almost like…\n\n\t\t\t\t…a grenade pin snapping.\n\n\t\t\t\tYou only have a few seconds to leap forward before the Bominate chucks these eyebombs at you. They explode on contact in the place you were just standing, propelling you forward and knocking you to the ground beside Dhanthik's shield. Fathers Below, whoever designed these monstrosities was clearly going for the maximum disgust factor.\n\n\t\t\t\t*page_break\n\n\t\t\t\tYou tumble and pop back to your feet just in time to see Dhanthik shifting Hir attack methodology, following your lead. Ze generates a new blast of wavy, clear force that pushes the Bominate backward, sending it reeling through the glass wall.\n\n\t\t\t\tThe Bominate's heavy body crashes through the reinforced glass wall with an echoing crunch, followed immediately by a hissing suction. You feel yourself pulled forward into the space vacuum and picture yourself being sucked out into the void, until you find yourself slamming into and sliding across the floor to a skidding halt.\n\n\t\t\t\tLooking up, you see that the ship has somehow automatically reformed the glass wall—thankfully Dhanthik planned ahead designing this ship.\n\t\t\t\t*goto dtgregroup\n\t#Use my strength to throw a set of bleachers at the Bominate and send it reeling through the glass wall.\n\t\t*set strength +2\n\n\t\t*if strongbomthree \n\t\t\t*goto bleachersee\n\t\t*else\n\t\t\tYou haven't been able to test it yet, but ever since absorbing from OtherBoard, your muscles have pulsed with a bit more strength. Whatever metallic enhancements Binarians possess must have transferred over to you.\n\n\t\t\t*label bleachersee\n\n\t\t\tSeeing that the bleacher section of Rutonian humans has been totally cleared—and partially rotted through—you land next to it, feeling the increased metallic strength flexing in your muscles. Taking a deep breath, you squat and lift the bleachers over your head with a scream of pure pain. \n\n\t\t\tPushing through the strain, you hurl the bleachers at the Bominate with all of the strength you possess.\n\t\t\t*if (strength > 6)\n\t\t\t\t*set forceful %+25\n\t\t\t\t*set solo %-15\n\t\t\t\tThe bleachers smash into the Bominate with a clanging metal crash, forcing it to release Dhanthik through Hir shield. The bleachers then lift the Bominate clean off its feet, sending it careening through the glass wall.\n\n\t\t\t\tThe bleachers and the Bominate's heavy body crash through the reinforced glass wall with an echoing crunch, followed immediately by a hissing suction. You feel yourself pulled forward and realize you didn't consider the vacuum you'd create by breaching the cabin this way….\n\t\t\t\t*goto resealed\n\t\t\t*else\n\t\t\t\t*set forceful %+15\n\t\t\t\t*set solo %-5\n\t\t\t\tUnfortunately, it doesn't seem to be enough, since the bleachers crash to the floor just short of the Bominate. \n\n\t\t\t\tYour throw clearly wasn't strong enough, but it was at least enough to catch the Bominate's attention.\n\t\t\t\t*goto eyebomb\n\t#Use my technical prowess to interface with the ship and eject the Bominate through a newly opened hatch.\n\t\t*set tech +2\n\n\t\t*if techbomthree\n\t\t\t*goto openingmindup\n\t\t*else\n\t\t\tYou already know that your technology proficiency was upgraded through the absorb from OtherBoard. However, you're surprised to find that as you make this mental decision, you suddenly become aware of the technology around you. \n\n\t\t\t*label openingmindup\n\t\t\tOpening up your mind, you feel your thoughts flooded with access to the ship's controls, in thousands of bits and parcels. Momentarily overwhelmed, you strain to focus on any exit protocol packages you can find. \n\n\t\t\tFlexing your technical expertise to its max, you feel the knowledge you need scroll to the surface. You flip through manual overrides as quickly as your brain can go, stretching your mind across the controls.\n\n\t\t\t*if (tech > 9)\n\t\t\t\t*set forceful %-25\n\t\t\t\t*set solo %+15\n\n\t\t\t\tBefore the Bominate can register what you've done, you open your eyes to find the plate glass wall behind the Bominate retracting. Caught off guard, the Bominate is sucked off its feet and swept out into space in the blink of an eye.\n\n\t\t\t\tHowever, you feel yourself pulled forward as well, far faster than you expected. It only takes a second more for you to realize that you won't have enough time to mentally retract the door before you are sucked out along with the Bominate.\n\n\t\t\t\t[i]Blerg.[/i]\n\t\t\t\t*goto resealed\n\t\t\t*else\n\t\t\t\t*set forceful %-15\n\t\t\t\t*set solo %+5\n\n\t\t\t\tUnfortunately, you don't seem to be operating quickly enough. \n\n\t\t\t\tThe Bominate turns to you, as if it has somehow registered whatever signal it is that you must be sending.\n\n\t\t\t\t[i]Blerg.[/i]\n\t\t\t\t*goto eyebomb\n\n*label dtgregroup\n*page_break\n\n\"Thank you, friend,\" Dhanthik says as you approach, beginning to flicker Hir fingers in specific patterns, almost as if typing on some kind of invisible keyboard. \"I must now focus on the ship's landing and evacuation protocols.\"\n\nA wave of chills ripples across your body as you realize that Dhanthik just spoke to you. You struggle to focus, reminding yourself that at least this won't be the first divine being you'll have encountered in the past day—though this is certainly the first one that means everything to you.\n\n\"Erroneous,\" Ambassador A-03 suddenly drones before you can say anything in return. \"I refuse to touch down on soiled Multinarian moonground. I demand that you reroute to Binaria.\"\n\nAs A-03 raises its arm and primes to fire a plasma pulse at Dhanthik, Squad suddenly produces some kind of hidden acid balloon. \"That's your priority here, you soulless heap?\"\n\nYou look from A-03 to Squad, incredulous.\n\n*fake_choice\n\t#\"We're all going to be murdered by that Bominate, and you still can't put aside your hatred?\" I scream, unable to contain myself.\n\t#\"Go ahead, kill each other,\" I say calmly. \"You all deserve your miserable war.\"\n\t#\"Have you learned nothing from Dhanthik's speech?\" I shout. \"We need to focus on unity!\"\n\nAs your words tumble out, they appear to have no effect on either the Royal or the Rebel Leader: Squad lobs his acid-water balloon bomb just as A-03 opens fire on him. \n\nBefore you or Dhanthik can intervene, Squad collapses, a charred hole smoking through his chest. He falls beside A-03, who crashes into the ground in a convulsing, watery heap. You'd gasp, but sadly you aren't surprised by this horrific display.\n\nDhanthik looks down at the fallen leaders with a mix of sorrow and contempt, shaking Hir head. \"May your replacements be wiser than you were.\"\n\nForcing yourself to ignore the corpses now silenced at your feet, you try to gather yourself enough to ask Dhanthik one of the dozens of questions you have for Hir. Thinking fast, you realize that revealing your mirror patch to Dhanthik would be quicker than using any words. You retract your Battlesuite visor, only to find that several words bubble to the surface anyway.\n\n\"Why did you leave Prisca?\" you nearly shout, the force of your voice surprising you. \n\nDhanthik looks you over with equal surprise, obviously trying to process this turn of events as quickly as Ze can.\n\n*page_break\n\n\"I left Prisca in order to save it,\" Dhanthik answers with a great sigh, as if this thought pains Hir. \"Though I know the answers you truly desire are far more complicated.\"\n\n\"Then blerg it, if you can kill Blots, why didn't you just stay and fight?\" you shout, losing control. \"What are you doing here? Who are you, really? Are you Priscan? What is this grave threat, and how can it be more important than saving Prisca?! For blerg's sake, you're practically considered divine back there! You're the only hope we have left!\"\n\nThe questions leave your lips in a frenzied haze, blending together in one trembling explosion. It feels like a bottle uncorking, a bursting dam of emotion you didn't know you were holding back until this moment. It would appear that between the Black Blot War and being Selected by Versus, you have loads of baggage that need unpacking.\n\n\"The Blot menace is far greater than you could imagine, my Priscan child,\" Dhanthik says, accumulating some force behind Hir words. \"The fate of the entire galaxy is more important than the fate of a single planet. Just as the fate of all those in danger here is more important than answering your questions right now.\"\n\n*page_break\n\nSeething with built-up frustration and anger, you start to full-out scream. \"This isn't even really happening, none of this matters! I came all the way back here just to—\"\n\n\"That won't work, Priscy,\" Rosae chirps, placing a wing on your shoulder. \"Unless you just want to convince Dhanthik that you're insane. That kind of logic doesn't track in MemoryTravel, ever. The others here can never be aware of MemoryTravel the way that we are, I'm afraid it's scientifically impossible.\"\n\nYou pause, desperately trying to check yourself. As frustrating as it may be, Rosae is right. So instead of raging on, you turn and lock eyes with Dhanthik, just as the Multinarian jungle surface begins to appear outside the restored glass wall behind Hir. \n\n\"Tell me how we kill the Bominate,\" you say, as calmly as you can manage. \"Then we're going to have a nice, long chat.\"\n\n*page_break\n\n\"Agreed,\" Dhanthik answers, not wasting another moment. \"All Binarian forms run on internal fusion batteries that are heavily guarded. These are nearly indestructible in ordinary Binarian bodies, but I have learned that the Bominate's battery is doubly reinforced—it is even more impossible to destroy. However, I possess the ability to channel energy. While I cannot drain the battery, I can over-surge it. \n\n\"Still, I need massive quantities of energy to do so, far more than my body can store. I also require space or extra energy to contain the process, since the atomization surge is like a small-scale nuclear explosion.\"\n\nAs Dhanthik explains this, a ripcord anchor suddenly pierces through the roof. That must be the Bominate, you think, somehow tethering itself to the ship. You're not sure how the Bominate survived re-entry into the Multinarian Moon's atmosphere, but it's only further proof of its general invincibility. You know it won't be long before the Bominate makes its way back inside, or before you all land together on the moon's surface. Fortunately the ship seems to have been mostly evacuated by now, from what you can tell.\n\nThere are so many variables to consider, but ultimately you just have to figure out how to get Dhanthik the energy source Ze requires. \n\n*if extraworning\n\t\"Priscy, I know what you're thinking,\" Rosae interjects. \"You had better rely on your expertise in weapons or natural abilities here to help Dhanthik collect the energy Ze needs to surge out the Bominate.\"\n\t*goto bmbatteryoverride\n*else\n\t*goto bmbatteryoverride\n\n*label bmbatteryoverride\n\n*choice\n\t#Use my own absorb abilities as a conduit to channel collective energies for Dhanthik. \n\t\t*set weapons %-30\n\n\t\t\"You can control energy, and I can absorb anything,\" you explain. \"If I open up my absorb abilities to the energy sources around us, could you channel the energy you need through me?\"\n\n\t\t\"Like a living conduit?\" Dhanthik asks, considering this proposition. \"Theoretically, that should work, yes.\"\n\n\t\tYou then turn to Rosae, since she is the resident MemoryTravel expert here. \"Will this affect me in reality once I wake up?\"\n\n\t\t\"Your brain registers any of your actions in MemoryTravel as real, so things like injury, absorb experience, and personality statistics are affected,\" Rosae explains, struggling to make her point as quickly as she can. \"What you suggest is possible, but terribly risky.\"\n\n\t\t\"Will it kill me?\" you ask, just in time for the Bominate to acid-blast its way back through the ship's roof.\n\n\t\t\"I don't know!\" Rosae shouts.\n\n\t\tBlerg it—you don't have any time to turn back now. It's probably crazy to risk your life for this imaginary historical fight, but if it gives you an opportunity to get some answers from Dhanthik, it's definitely worth the risk.\n\n\t\t\"Do it now!\" you scream, bracing yourself. \n\n\t\t*page_break\n\n\t\tYou clench your jaw, opening up your body and your mind to the energies around you on The Forbidden Moon Multinaria. As you connect to its unbelievable ambient power, at first you feel full, connected and saturated to the brim. \n\n\t\tJust when it feels like you might burst, you can feel Dhanthik pulling the pooled energy out through you.\n\n\t\tThe draining feels satisfying at first—until the sensation intensifies and multiplies exponentially.\n\n\t\t*if (weapons \u003c 25)\n\t\t\t*set mastery +2\n\t\t\t*achieve abilitiesachieve\n\n\t\t\tAs the process explodes, you manage to control it with every shred of your ability, keeping yourself protected from any potential harm.\n\t\t\t*goto atomizefail\n\t\t*elseif (weapons \u003c 35)\n\t\t\t*set mastery +1\n\t\t\t*set life -1\n\n\t\t\tAs the process explodes, you struggle to keep it contained, feeling as if you're hemorrhaging. It may be the most painful sensation you've ever experienced.\n\t\t\t*goto atomizefail\n\t\t*else\n\t\t\t*set life -2\n\n\t\t\tAs the process explodes, you can't control it. You feel as if you're hemorrhaging and it may be the most painful sensation you've ever experienced.\n\n\t\t\tIt's unbearable.\n\t\t\t*goto atomizefail\n\t#Use my weapons and technical expertise to instruct Dhanthik on how to drain the ship's engine energy. \n\t\t*set weapons %+30\n\n\t\t\"You can control energy, and I can absorb anything,\" you explain. \"I've recently absorbed additional technical expertise, so if I connect you to this ship's engine, could you channel the energy you need from the engine through me?\"\n\n\t\t\"Like a living conduit of sorts?\" Dhanthik asks, considering this proposition. \"Theoretically, that should work. The ship will be landed safely in a few seconds anyway, so it will no longer require engine power.\"\n\n\t\tYou then turn to Rosae, since she is the resident MemoryTravel expert here. \"Will this affect me in reality once I wake up?\"\n\n\t\t\"Your brain registers any of your actions as real, so things like injury, absorb experience, and personality statistics are affected,\" Rosae explains, struggling to make her point as quickly as possible. \"What you suggest is possible, but terribly risky.\"\n\n\t\t\"Will it kill me?\" you ask, just in time for the Bominate to acid-blast its way back through the ship's roof.\n\n\t\t\"I don't know!\" Rosae shouts.\n\n\t\tBlerg it—you don't have any time to turn back now. It's probably crazy to risk your life for this imaginary historical fight, but if it gives you an opportunity to get some answers from Dhanthik, it's definitely worth the risk.\n\n\t\t\"Do it now!\" you scream, bracing yourself. \n\n\t\t*page_break\n\n\t\tYou clench your jaw, opening up your body and your mind to the energies around you, focusing on the engine pulsating deep beneath your feet. As you connect to its unbelievable energies, at first you feel full, connected and saturated to the brim. \n\n\t\tJust when it feels like you might burst, you can feel Dhanthik pulling the pooled energy out through you.\n\n\t\tThe draining feels satisfying at first—until the sensation intensifies and multiplies exponentially.\n\n\t\t*if (weapons > 75)\n\t\t\t*set mastery +2\n\t\t\t*achieve weaponsachieve\n\n\t\t\tAs the process explodes, you manage to control it with every shred of your weapons expertise, keeping yourself protected from any potential harm.\n\t\t\t*goto atomizefail\n\t\t*elseif (weapons > 65)\n\t\t\t*set mastery +1\n\t\t\t*set life -1\n\n\t\t\tAs the process explodes, you struggle to keep it contained, feeling as if you're hemorrhaging. It's perhaps the most painful sensation you've ever experienced.\n\t\t\t*goto atomizefail\n\t\t*else\n\t\t\t*set life -2\n\n\t\t\tAs the process explodes, you can't control it, feeling as if you're hemorrhaging. It's perhaps the most painful sensation you've ever experienced. \n\n\t\t\tIt's unbearable.\n\t\t\t*goto atomizefail\n\t#Have Dhanthik drain all of the energy I have from my absorbed abilities and Battlesuite armor.\n\t\t*set life -1\n\t\t*set mastery +1\n\t\t*if (weapons > 50)\n\t\t\t*set weapons %+15\n\t\t\t*goto bothabsorbspot\n\t\t*else\n\t\t\t*set weapons %-15\n\t\t\t*label bothabsorbspot\n\n\t\t\t\"You can control energy, and I can absorb anything,\" you explain. \"So if I open up my absorb abilities and the energy in my Battlesuite, would that combination be a sufficient power source?\"\n\n\t\t\t\"Like a living conduit of some sort?\" Dhanthik asks, considering this proposition. \"Theoretically, that should work, yes.\"\n\n\t\t\tYou then turn to Rosae, since she is the resident MemoryTravel expert here, after all. \"Will this affect me in reality once I wake up?\"\n\n\t\t\t\"Your brain registers any of your actions as real, so things like injury, absorb experience, and personality statistics are affected. But everything else is like a dream,\" Rosae explains, struggling to make her point as quickly as possible. \"Basically, your brain and my body are the only real things here. So this will probably drain the rest of your OtherBoard absorb, which should be fading already anyway. Your Battlesuite should be unaffected, however, since that's technically imaginary here.\"\n\n\t\t\t\"Will it kill me?\" you ask, just in time for the Bominate to acid-blast its way back through the ship's roof.\n\n\t\t\t\"I don't know!\" Rosae shouts.\n\n\t\t\tBlerg it—you don't have any time to turn back now. It's probably crazy to risk your life for this imaginary historical fight, but if it gives you an opportunity to get some answers from Dhanthik, it's definitely worth the risk.\n\n\t\t\t\"Do it now!\" you scream, bracing yourself. \n\n\t\t\t*page_break\n\n\t\t\tYou clench your jaw, opening up your body and your mind to the energies around you, focusing on your Battlesuite and OtherBoard absorb. As you connect to its collected energies, at first you feel full, connected and saturated to the brim. Just when it feels like you might burst, you can feel Dhanthik pulling the pooled energy out through you.\n\n\t\t\tThe draining feels satisfying at first—until the sensation intensifies and multiplies exponentially.\n\n\t\t\tAs the process explodes, you struggle to keep it contained, feeling as if you're hemorrhaging. It's perhaps the most painful sensation you've ever experienced.\n\t\t\t*goto atomizefail\n\n*label atomizefail\n*page_break\n\nThen, just as quickly as it seems to have begun, the flow expires and the connection severs. Feeling spent, you open your eyes to find that Dhanthik now glows before you with excess power, the white energy of Hir form blurring at the edges.\n\nAs if it somehow knows that Dhanthik is now supercharged, the Bominate rushes at Hir, producing two new rusty blades, which now vibrate like chainsaws.\n\nAs intimidating as that sight is, you can feel the intense heat coming off Dhanthik beside you as Ze charges white-hot. Dhanthik stretches out Hir throbbing hands and forms a superdense ball of energy between Hir fingertips. In the same instant, the Bominate freezes in its place, its chest beginning to glow the same white-hot hue. \n\nIn a matter of seconds, the Bominate is burned from the inside out in an oddly serene, soundless display.\n\nA display that reminds you instantly of the burning Blots that became legend back on Prisca.\n\n*page_break\n\nWhen the light clears, all that remains in the Bominate's place is a charred and smoking metal carcass. You expect this corpse to explode into some devastating nuclear display, as Dhanthik warned, but instead it just lies there, smoking black. Could Dhanthik have already counteracted the effect of Hir battery surge, in one clean display?\n\nJust as you think this, Dhanthik collapses onto the ship floor beside you. Hir body no longer glows, but rather pulses a sickly, translucent yellowish light. Whatever Ze did to the Bominate in that silent second, it must have taken all that Dhanthik had left. You rush to Hir side and are happy to find that, despite looking totally spent, Dhanthik is still awake. \n\n\"We did it,\" you say, holding up the back of Dhanthik's head with your hand. \"So, think we can have that chat now?\"\n\nYou smile as Dhanthik struggles to catch Hir breath, trying to form words to answer you. This is it, the moment you've earned. The moment where Dhanthik will…\n\n…look completely terrified?\n\n*page_break\n\nThat's when you hear it—that sick whining sound. A churning, gurgling screech that rattles you to your core.\n\n\"Something is different,\" Dhanthik croaks, Hir face falling deeper into fear. \"The Bominate's battery, it's—it's not there.\"\n\n\"What do you mean?\" you ask, feeling the unbridled terror creep up your own chest. You force yourself not to look over at the Bominate, because you're too afraid of what you might find.\n\n\"I don't know how…\" Dhanthik coughs, trying and failing to sit up straight. \"Whoever created this monstrosity must have learned their lesson after I destroyed the last one. This Bominate's battery core is no longer stored within its reinforced chest cavity. This Bominate's battery is stored off-site, being wirelessly routed from a secure remote location. One that I can sense is off-planet.\"\n\n\"What does that mean?\" you ask, unable to keep your voice from cracking against the intensifying whine coming from the Bominate's body.\n\n\"It means there's no way to kill it,\" Dhanthik replies, Hir voice suddenly falling flat. \"The battery source we need to extinguish could be anywhere in the Nagoll Rim.\"\n\nDhanthik then sputters a few pathetic coughs, closing Hir eyes in a show of momentary resignation. Mirrored Matron, what are you going to do now?\n\n*page_break\n\nYou look up from Dhanthik to see if you can find anything, anyone who might be able to help. That's when you notice a kind of filtered light emanating from the Bominate's reforming chest. No, not from—into the Bominate's chest. You squint and swear you can see little ones and zeros, vibrating yellow as they course through the light. Is that some kind of data stream? Why can you see it now, all of a sudden?\n\n\"Can you see that too, Priscy?\" Rosae chirps at your side, holding her wing tip up to her chin in contemplation. \"I think that might be the remote battery source that Dhanial—I'm sorry, Dhanthik—was talking about. I'm not sure, but I think some combination of your absorbed android sense paired with your unique Priscan awareness has allowed you to see this intangible stream. I must say, this is utterly fascinating. It will require much further contemplation….\"\n\n\"Is there a way I can intercept the signal to see what I can learn about the Bominate's origins?\" you interrupt. \"Then maybe I can help Dhanthik or the Binarians kill it. Or should I attempt to hijack the stream to try to steal the resources away from the Bominate? Maybe that will slow its healing process.\"\n\nAs Rosae considers these options, you decide not to speak your last thought out loud: that you could simply escape with Dhanthik in Hir weakened state and have the conversation you need to have, away from the reforming Bominate.\n\n\"Honestly, it's all a gamble,\" Rosae sighs. \"I know that must sound terribly bleak coming from me, but my only advice at this interval is to simply go with your gut.\"\n\nNodding at Rosae, you decide to do just that, without hesitation.\n\n*choice\n\t#Intercept the Bominate's sourcing stream to siphon the life and power being routed to it. I know I probably won't learn anything new about the Bominate's origins by doing this, but I might slow the Bominate's healing process and gain valuable resources for my own use.\n\t\t*set bomsteal true\n\t\t*set mastery +5\n\t\t*set growth -3\n\t\t*set lifemax +1\n\t\t*set life lifemax\n\t\t*set energy +2\n\t\t*set tech +2\n\t\t*set agile +2\n\t\t*set strength +2\n\t\t*set command +2\n\t\t*goto youlearn\n\t#Attempt to hack into the Bominate's sourcing stream to see what I can learn about its origins, even though I can already tell that this process will not only be costly, it might even hurt me.\n\t\t*set bominatetruth true\n\t\t*set growth +6\n\t\t*goto youlearn \n\t#Just escape while the Bominate continues to heal. It's most important to have time to talk to Dhanthik, even if that time is limited.\n\t\t*set growth +3\n\n\t\tYou fling Dhanthik's arm over your shoulder and prepare to run, but realize that the nearest exit is behind the Bominate. Limping Dhanthik along beside you, you move as quickly as possible toward the exit.\n\n\t\tAs you pass the Bominate, a stray bit from the stream manages to hit you as you sway. Suddenly, shards of information burn their way onto your brain, uninvited. \n\n\t\tWithout any other choice, you focus as the bits and pieces start to come together, rapidly clarifying into one startling truth.\n\t\t*goto theinfoappears\n\n*label youlearn\n\nYou're not entirely sure you know what you're doing, but you figure that since you can somehow see the sourcing stream, you should be able to touch it. So that's exactly what you do: you sprint forward and jam your open palm into the glowing stream. It's not exactly the most elegant display, but it certainly seems to be effective.\n\nYou feel the stream channel into you instead, \n*if bomsteal\n\tnourishing you with life and absorption strength. The feeling is wonderful, so wonderful that you almost miss the shards of information collecting around its edges.\n\n\tYou focus as the bits and pieces start to come together, rapidly clarifying into one startling truth….\n\t*achieve bomstealac\n\t*goto theinfoappears\n*else\n\tburning your insides like a microwave.\n\t*if bominatethreeclue\t\n\t\tJust as the sensation becomes unbearable, you remember what you learned earlier—the clue about the Bominate targeting peaceful intentions. Figuring this might somehow protect you, you think only of Blots and fill yourself with a hate so potent, it seems to reverse the burn and preserve your life. \n\n\t\tOnce you focus on this, shards of information begin to sharpen at the edges of the luminescent stream. You focus as the bits and pieces start to come together, rapidly clarifying into one startling truth….\n\t\t*goto theinfoappears\n\t*else\n\t\t*set life -2\n\t\tThe pain mounts to unbearable levels, but you hold on. Shards of information begin to sharpen at the edges of the stream and you will yourself to endure the burning long enough to decipher it, no matter the cost.\n\n\t\tYou focus as the bits and pieces start to come together, rapidly clarifying into one startling truth….\n\t\t*goto theinfoappears\n\n*label theinfoappears\n*page_break\n\nJust as the sourcing stream starts to detect your hack and recede from your grasp, you find it: the Bominate's one and only weakness. It blinks on the Bominate's temple like a beacon, and you wonder why you didn't notice it before. \n\nAside from destroying the now-hidden off-body battery, the Bominate is completely unkillable, since it combines android indestructibility with rapid human healing—a warped version of Dhanthik's Binuman vision. The only thing capable of killing the Bominate is the race that created it: they must perform a gene-specific nerve touch in the spot blinking brightly on the Bominate's skull.\n\nAs your strange fugue state peaks, you begin to feel the stream slip between your fingers, sliding and fading. All you can focus on is one last question: \n\nWho could have created this abomination?\n\n*page_break\n\n*if bominatetruth\n\t*achieve bominatetruthac\n\tDeciding to dig deeper, you cling to the stream even more painfully, screaming through the agony to trace the origins before you lose the thread entirely.\n\n\tFor a fleeting moment, you see the place broadcasting the stream: a planet neighboring The Forbidden Moon Multinaria. As you lay eyes upon it, the name \"Cuttara\" echoes across your mind.\n\n\tOnce you see this, the connection breaks with a sickening snap and you stumble backward, your mind still reeling. \n\n\tThe Bominate wasn't created by Binarian, Rutonian, or Multinarian hands—it was created on another planet entirely. You know nothing about this system, but the only plausible reason this neighboring planet would do such a thing would be to keep the Binarian-Rutonian civil war raging.\n\n\tYou don't know why they'd do this, and you don't have time to answer that question right now, but you do know that this information will come in handy back on Versus, somehow. You'll make sure of it.\n\t*page_break\n\t*goto groundland\n*else\n\tThe connection breaks with a sickening snap and you stumble backwards, your mind still reeling. Who created the Bominate? You feel like you must have missed something crucial, but it's too late now. \n\t*if bomsteal\n\t\tWho knows what might have happened if you hadn't tried to hack the Bominate for personal gain.\n\t\t*goto groundland\n\t*else\n\t\tWho knows what might have happened if you had tried to hack the Bominate on purpose.\n\t\t*goto groundland\n\n*label groundland\n\nAs reality snaps back into focus, you heave in air in great gasps—you hadn't realized that you'd been holding your breath that entire time. As you wheeze your burning lungs back to normalcy, your brain tries to process the gravity of what you've just learned.\n\nIt isn't able to, though, as you realize that the Bominate has healed enough to raise its re-formed acid cannon—and it's pointed directly at Dhanthik. Before you can react, the Bominate discharges its acid blast and it connects with Dhanthik's face in a gurgling hiss, just like that.\n\n[i]No.[/i]\n\n[i]NO![/i]\n\n*page_break Black Out\n\nYou don't even know how it happened, but suddenly you find yourself outside the ship, carrying Dhanthik on your back. You must have blacked out in a blind panic back there, desperate to get away from the reforming Bominate—it will be healed enough to come after you all too soon.\n\n\"Priscy, I'm sorry, but we're almost out of time,\" Rosae suddenly chirps above you. You look up to find her turning translucent, beams of sunshine passing through her furry body as she begins to fade.\n\nForcing the tide of panic back down into your gut, you stop and lay Dhanthik on the Multinarian jungle ground, praying Ze is able to survive this horrific attack. But Ze looks different now—not just different, but constantly transforming. \n\nInstead of Hir normal, acid-scarred face, Dhanthik's head morphs through a rotation of shapes: Rutonian, Binarian, Multinarian, Priscan…then into a series of forms you don't even recognize. Could this be some kind of transformative healing process, a protective shape-shifting state?\n\n\"Dhanthik, are you all right? What can I do to help?\" you ask, hoping Dhanthik will stabilize enough for you to ask a real question.\n\n*page_break\n\n\"Who…\" Dhanthik sputters, Hir face shifting into clear, solid glass, \"am I?\"\n\nBefore you can answer Dhanthik, you see Hir constantly shifting body begin to glow with crimson light. As the light turns red and begins to envelop Dhanthik's body, your jaw just about drops to the ground.\n\n[i]Mirrored Matron, it can't be.[/i]\n\nThen Dhanthik's body disappears in a brilliant crimson pop and you realize the truth…\n\n*page_break\n\nDhanthik has just been teleported to Versus.\n\n*if masterytenbonus\n\t*goto endofchaptersix\n*elseif (mastery > 9)\n\t*set masterytenbonus true\n\t*achieve masterytenbonusac\n\t*set lifemax +1\n\t*goto endofchaptersix\n*else\n\t*goto endofchaptersix\n\n*label endofchaptersix\n*finish", "v_three": "*comment é\n\n*image chap_3.png\n\n*image e_chap3.png\n\n${blank}\n\n*page_break\n\nAs darkness descends over your mind, you feel your body fall still, fall quiet, fall, falling…\n\nFalling out of…\n\nFalling into…\n\n*page_break Another World Away\n\nYou hear the sound of explosions before you can even open your eyes. Though once you do, nothing you see makes sense anyway.\n\nYou stand before a pane of glass that overlooks a sprawling city, humming blue and white and stretching for miles. The nearest building towers impossibly tall, whizzing by as you rise higher into the sky. Its mirrored facade reflects your own distorted figure standing inside…\n\n…a compact spaceship?\n\nYou must be dreaming, you tell yourself—a particularly vivid one, but still, just a dream. You grab something nearby to steady yourself and realize that it's the high back of a pilot's chair. Sitting in front of you flying the ship is another android. No, two more androids.\n\n[i]Wait[/i], you think, [i]is that OtherBoard?[/i]\n\n*page_break\n*set threeobcharacter true\n\nJust as you do, a new holo-readout appears, demanding your attention.\n\n[b]NAME:[/b] Electrician C-5184 / \"OtherBoard\"\n*line_break\n[b]NAME:[/b] Electrician C-3238 / \"Multiplicity\"\n*line_break\n[b]SPECIES:[/b] Binarian Androids, Municipal Working Classification\n*line_break\n[b]HOME PLANET:[/b] Binaria\n*line_break\n[b]ABILITIES:[/b] Durability, Strength, Computing, Interfacing \n*line_break\n[b]ELECTRICIAN SPECIAL ABILITIES:[/b] Wire Tensity, Electrical Generation, Electrical Manipulation\n\n[i]So that is OtherBoard,[/i] you think—just not the wild-woman version you met earlier. This OtherBoard is far more pristine, with a chrome letter \"C\" on her faceplate that replaces the automated facial features you saw before. You also notice that OtherBoard's metallic plating doesn't conform to either gender anymore, remaining neutrally humanoid. \n\nActually, this polished OtherBoard looks way more like that A-08 jerk. In fact, both of these androids do, though you don't recognize the second one, Multiplicity, even though technically he looks identical to OtherBoard in this form. You suppose that's not exactly abnormal for a dream, but it is rather fascinating that your holo-readouts still appear—you wonder, do you somehow dream differently on Versus than on Prisca?\n\n\"I'm sure you have a lot of questions,\" a high-pitched voice says from the back of the spaceship. Startled, you spin to find…\n\n*page_break\n\n…a giant, blue-furred WorningBird perched on a rear bench. One that looks an awful lot like Rosae, except that she wears a chained monocle and a matching ${beltcolor} top hat.\n\n\"Don't worry, Priscy. I can provide answers to any questions you might have,\" the WorningBird finishes, winking at you just the way Rosae usually does.\n\nYou stare at the person-sized Rosae, trying to do more than blink and let your jaw hang open. You've always wished Rosae could answer back in the long, one-sided conversations you've had with her since you were a child. Now that Rosae is speaking to you beyond her standard warnings, however, it is decidedly less comfortable than you imagined. \n\nYou attempt to form a coherent sentence, but you're distracted as another explosion booms somewhere nearby.\n\n*page_break\n\n\"Seriously, it's way too dangerous. We really need to turn back,\" Multiplicity says in a rushed, robotic drone.\n\n\"Worry not, my fine friend!\" the polished OtherBoard nearly shouts at Multiplicity. \"Ours is a plan laid with great care, one requiring us to slip through our designated workorbit while the dreaded Defensives are occupied with another rebel riot!\"\n\nYou're not sure where this overly eloquent OtherBoard is coming from, but it would make sense that your mind would come up with an equally imaginative dream sequence to process everything that has happened to you today. This suspicion is further confirmed as the spaceship finally pulls above the neighboring skyscraper. \n\nSuddenly, you can very clearly see the cause of all of the explosions: there's a raging battle in an open town square, where two forces are fighting each other in a lush, colorful park. On one side you see what looks like a squad of Binarian Defensive androids, unleashing torrents of advanced ballistics at a group of humans, who wear the same green and white fatigues as the weathered couple you first saw on the Versus Arrival Runway.\n\nMost of the fatigue-clad humans are wearing water tanks on their backs, just like the grey-haired commander. These water tanks are connected to large guns that spray concentrated blasts of water at the Binarians and seem much more effective than any of the crude crossbows and grenades the humans also employ.\n\nTaking in this jarring sight, all you can focus on is:\n\n*fake_choice\n\t#The battle raging below. \n\t\tYou wonder if you're dreaming this because of the couple you saw on the Versus Arrival Runway earlier….\n\t#The brimming, seemingly never-ending urban grid that bursts with colorful flowers and green leaves. \n\t\tThe juxtaposition is as beautiful as it is improbable.\n\t#My eyes, like my mind, cannot decide where to focus, struggling to classify the enormity of the landscape as it shrinks beneath me.\n\t\tYou wonder if you're dreaming this in order to process the enormity of all that you've experienced today, somehow….\n\t#I wonder if OtherBoard and the fatigued humans are from the same planet, or if I'm just mashing it all together.\n\t\tYou also wonder if you're dreaming this because of the couple you saw on the Versus Arrival Runway earlier….\n*comment endif\n\n\"We predicted the Humm forces would rouse more rabble at a precious SolBar!\" OtherBoard says, her robotic voice tinged with a sing-song inflection. \"However, we did not predict that this surreptitious strike might be so close to—\"\n\n\"Would you please take out that stupid Enchanted Princess Solgram?\" Multiplicity barks back. \"It's bad enough seeing my favorite park burnt to a crisp without you musing on and on about it.\"\n\n\"Only if you remove your Neurotic Urbanite Solgram, my liege!\" OtherBoard answers. \"For indeed, you know that we both require a dash of Solful courage at this precarious juncture!\"\n\n\"Ugh, fine,\" Multiplicity mutters. \"But is it too much to ask for us to load some compatible courage?\"\n\nWait, wasn't Neurotic Urbanite the personality program that OtherBoard was running when you met her? Maybe it's time you tried to speak up…\n\n\"Um, hello?\" you finally say. \"Can someone please tell me what is happening here?\"\n\n*page_break\n\n\"We're escaping to The Forbidden Moon Multinaria, ${name}!\" OtherBoard proclaims, turning toward you. \"We've been planning this glorious adventure for months, silly!\"\n\n\"Uh…we have?\" you ask, not sure what else to say.\n\n\"You probably should direct all questions my way, for the time being,\" a voice chirp-speaks behind you. You turn again to face the giant Rosae—in all the chaos, you had almost forgotten she was there.\n\n\"Besides,\" Rosae sighs, \"I've been positively dying to have an intelligent conversation with you since the day we met.\"\n\nYou stare at Rosae and suddenly you are slammed with an overwhelming, undeniable feeling: [i]This is real.[/i]\n\n\"I know you must think this is a dream, and you're not totally wrong,\" Rosae says, catching the look on your face. \"Still, this is so much more than a dream.\"\n\n*page_break\n\n\"You see,\" Rosae chirps on, adjusting her monocle like some wise professor preparing for a lecture. \"When any Priscan performs a full absorb on any non-Priscan being, it automatically grants them access to the absorbee's memories during the following period of sleep. Right now, you're in a dreamscape that tours OtherBoard’s memoryworld, what we call DreamScape MemoryTravel, exploring a fluid moment in fixed time.\n\n\"Think of it almost like a time-travel dream, where you're reliving your absorbee's memories. The absorbee in this case is OtherBoard, of course. Except you're not limited to OtherBoard's specific memories: you can draw on her planet's Collective Consciousness to move about the memoryworld as if it were the real world, or at least what you perceive as the real world. So theoretically right now, we are on planet Binaria.\"\n\nYou blink at Rosae, trying to make sense of all this. It's completely bonkers, but then, what part of this experience hasn't been, so far?\n\n\"You can change events in history temporarily, but only for as long as you are asleep. Once you wake up, the experience collapses entirely and exists only as a memory, leaving history and the future unaltered,\" Rosae continues, not yielding to your confusion as she plows on. \"It's actually far more complicated than that, but all you really have to know is that while MemoryTraveling, your brain thinks this experience is real. So you can very truly die while doing so, because your mind registers any bodily harm as actual.\"\n\n*page_break\n\nAs if landing on Versus wasn't jarring enough, now you have to navigate another entirely new world in some form of dreamlike time travel—one where you can die? Saying that this is overwhelming doesn't even begin to cover it…\n\nThen again, you realize that you have been given the chance to explore a new world the way you've always wanted, with fairly limited consequences. You could choose to learn all you want about OtherBoard's world, or to learn nothing at all—this could be your chance to go wild, to do things you might never ordinarily do in the waking world…\n\nLike speak with your lifelong WorningBird companion.\n\n\"I must admit, conversing like this is quite a relief. Warnings are a pretty exhaustible form of conversation, as it were,\" Rosae chirps excitedly. \n\n\"Yes, I agree. But Rosae, why can you talk all of a sudden?\" you ask. \"And why are you so big?\"\n\n\"Judgments on my weight notwithstanding,\" Rosae begins with a beaky smile, \"WorningBirds were originally bred by Priscans as MemoryTravel Guides, since we live in the space between wakefulness and dreaming. Where did you think I went every time I returned to that portal pouch on your belt?\"\n\nYou shrug at Rosae, because you've never really considered it. Though if someone had told you that you had a pocket portal on your standard Priscan belt, you most definitely would have. How could the Priscan Elders ever have decided it was okay to keep all this from the general population?\n\n*page_break\n\n\"Anyway, MemoryTravel's inherent dangers were part of the reason the Purity Laws were established all those years ago,\" Rosae continues. \"Then, in their infinite wisdom, the Priscan Elders decided to expunge any MemoryTravel experiences from the Collective Consciousness. I'm afraid the art of MemoryTravel has thus been lost for several generations.\"\n\nRosae takes a moment to ruffle off her disgust. \"At any rate, once this Priscan purge occurred, WorningBirds were reappropriated for our secondary purposes, to detect oncoming danger in the waking world. I've always dreamed of being freed to live in the true MemoryWorld, though I suppose every WorningBird does. I didn't expect to feel so…distant, however. I can't seem to get in touch with the rest of the WorningFamily.\"\n\n\"Wait, you mean you can talk to each other?\" you ask. Despite your question, this consideration doesn't strike you as much as the realization that Rosae must be feeling exactly the way you do, since being pulled to Versus. At the very least, that's a small comfort in a current sea of discomforts.\n\n\"What did you think we do all day in those portal pouches?\" Rosae asks back. \"We WorningBirds all live in a pocket dimension community together. I'm afraid we can only communicate with our masters in MemoryTravel, however.\"\n\nYou stare at Rosae, astounded by this revelation. It seems you're going to have to adjust to the idea of stumbling onto worlds within worlds within worlds….\n\n\"Anyway, I live with your family's WorningBirds as my own, in the tradition of Priscan reflection,\" Rosae chirps. \"Honestly, I've always wanted to ask you something. All my life, I've felt closest to…\"\n\n*choice\n\t#Mother's WorningBird, Greystone.\n\t\t\"Greystone is lovely, always so tranquil and inspiring. He's always the one to watch over us, catching any missed warnings. Do you feel that way about your Mother?\"\n\t\t*goto yesido\n\t#Father's WorningBird, Felixir.\n\t\t\"Felixir is always the life of the party, but also the first one to sense someone else's pain. I don't know what I'd ever do without her. Do you feel that way about your Father?\"\n\t\t*goto yesido\n\t#Gilo's WorningBird, Truly.\n\t\t\"Truly is a bit dull, if you ask me, but I'd trust her with anything. Do you feel that way about your sister?\"\n\t\t*goto yesido\n\n*label yesido\n\n\"Yes, I do,\" you say, fighting the tight ball of emotion that chokes its way into your throat. Hearing this makes your heart ache—you never knew how much you could miss home. You were so preoccupied with wishing your life was different, you didn't stop to realize all that you had. At least now, with Rosae here like this, you have a piece of home with you.\n\n\"Anyway, there's one last thing it's my duty to inform you of,\" Rosae chirps on, seeming emotional herself. \"During MemoryTravel, the absorbee knows you and thinks that you belong here. Back in the waking world, the absorbee experiences the travel as a vivid dream. Even if they forget the dream, your actions have impacts in the real world as déjà vu, so either way, OtherBoard will be emotionally affected by what you do here.\n\n\"Now, as much as I'd rather continue this spirited conversation, I fear that ironically, it would be most prudent for me to give you a good old fashioned warning.\"\n\nRosae points her furry wing behind you, and you turn to find a spotlight shining through your ship. You hold your hand up through the glare enough to see that it comes from one of those Binarian Defensives fighting the human rebels below.\n\n\"Halt,\" the Defensive announces over some internal megaphone. \"All workorbit maintenance is currently postponed. Land now or risk forceful interaction.\"\n\n*page_break\n\nYou can already tell that landing isn't necessarily going to be an option for OtherBoard and Multiplicity, so it looks like you're going to have to decide how to play this rather quickly.\n\n\"One last little tidbit, then I'll quit chirping,\" Rosae adds. \"MemoryTravel tends to not be random—your brain is usually drawn to an event that resonates with your current reality. I cannot say why we were pulled to this particular moment yet, but you should experience something here that holds significance for your waking reality back on Versus.\"\n\nYou still aren't sure exactly how this whole MemoryTravel thing works, but you know the essentials: your mind registers any physical harm as real, OtherBoard will be affected by whatever you do here when you wake up, and you should keep your eyes out for relevant lessons about Versus. Knowing this, you figure you should just jump in headfirst and let this experience take you where it may—especially since it seems you'll have Rosae by your side to watch your back, more than ever.\n\n\"There are veritable troves of information about OtherBoard's home planet, Binaria,\" Rosae adds, seemingly unable to help herself. \"But given the pressing nature of our current circumstance, I can boil it down to the most essential nugget: the Binarian androids have taken control of the planet and driven out their Rutonian human creators, who are now reduced to rebel fighting forces.\"\n\nYou take a moment to consider your politically loaded options, thinking this choice could lead you down very divergent paths. \n\n*choice\n\t#Find a way to fight alongside the human rebels. I know all too well what it's like to be part of a human population fighting off inhuman invaders.\n\t\t*gosub end_trial\n\t\t*set regime %-20\n\t\t*set ruthless %+10\n\t\t*set rlshp_ob %-10\n\t\t*set solo %-10\n\t\t*set fighthumm true\n\t\t*achieve fighthummac \n\t\t*goto rebelcamp\n\t#Escape with OtherBoard to The Forbidden Moon Multinaria. I want to learn why she is fleeing in the first place and perhaps build my relationship with her further.\n\t\t*gosub end_trial\n\t\t*set regime %-20\n\t\t*set ruthless %-10\n\t\t*set rlshp_ob %+20\n\t\t*set solo %-10\n\t\t*set helpob true\n\t\t*achieve helpobac\n\t\t*goto moonlanding\n\t#Betray OtherBoard and turn her over to the Biniarian Defensives. I want to appeal to the current regime so that I can barter cultural information or find a way to contact home.\n\t\t*gosub end_trial\n\t\t*set regime %+20\n\t\t*set rlshp_ob %-20\n\t\t*set solo %+10\n\t\t*set betrayob true\n\t\t*achieve betrayobac\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+10\n\t\t\t*goto betrayob\n\t\t*else\n\t\t\t*set ruthless %-10\n\t\t\t*goto betrayob\n\n*label rebelcamp\n\nBefore any of these androids can stop you, you dart to the back of the ship and grab a parachute backpack. You're not entirely sure how you knew it would be there, but it must be some residual knowledge from your full OtherBoard absorb. \n\nWithout hesitation, you then open the hatch door with the push of a button and jump out of the back of the spaceship, just like that.\n\n\"Uh, you do remember that you can die here, right?\" Rosae screeches, taking flight beside you. You barely hear her as you plunge into free fall, wind whipping at your face.\n\n\"You know better than anyone that I'm no stranger to falling into formation from a transplane,\" you scream back, pulling open the parachute backpack. That's when you discover that the backpack isn't a parachute, or at least not a traditional one. \n\nThe backpack unfurls into two mechanical wings, with dangling wires meant to plug into a Binarian back socket. \n\nBlerg.\n\n*page_break\n\n\"You were saying?\" Rosae shouts, swooping toward you as you plummet. \"You're quite lucky I can support your weight at this size.\"\n\nYou wriggle out of the mechanical wings and drop onto Rosae's back, gripping the blue fur on her neck tightly. She swoops toward the park battlefield like a fighter jet, swerving around the Binarian Defensives' fire so deftly that you can barely manage to hang on. You have no idea how her top hat and monocle manage to stay put, but they do, partially obscuring your view of the lush orange trees and blue flowers whipping by. This isn't exactly the landscape you'd expect in an android city—you imagined it would be more sterile somehow, devoid of natural life.\n\nRosae flies in low to the ground as you approach the rebel embankment, so low that you are actually able to scoop up a hydro pistol, no doubt blasted from a downed human rebel. You're surprised by how substantial it feels—it may look like a child's toy, but you can tell that it's more like a pressurized fire hose in pistol form.\n\nAs Rosae glides toward the main human battalion, you see a Binarian Defensive approaching their open flank. Figuring this is your chance, you fire the hydro pistol at the Defensive's skull. The concentrated beam of water shoots forward with surprising force, penetrating the Defensive's armor on contact and shorting out its internal systems instantly. \n\n*page_break\n\nYou watch the Defensive fall to the ground in a heap as Rosae lands beside the main human rebel group. You dismount smoothly and roll under the safety of the rebel's cover fire, surprised by the impressiveness of your own display.\n\n\"I don't know who you are, but thanks for that,\" a man shouts as he launches a grenade across the park. \"Just in time, too. This was a grab 'n' go, we're porting out. Take my hand!\"\n\nYou step forward to do so, until the man turns…\n\n…and you realize he is the grey-haired commander from the Versus landing strip. \n\n*choice\n\t#It looks like Rosae was right about MemoryTravel relating to the real world, after all. Hopefully I'll learn something useful for my time on Versus to help me survive.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto milesandmiles\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto milesandmiles\n\t#Maybe I can uncover clues about the type of beings Versus chooses for Selection—I'm very interested in how this seemingly spiritual system might operate galactically.\n\t\t*set growth +1\n\t\t*goto milesandmiles\n\t#This will be a good chance to start learning how to build relationships with people from different cultures, since I've never done that before today.\n\t\t*set growth +1\n\t\t*goto milesandmiles\n\t#Learning about another planet might be a good chance to reinforce my unique Priscan perspective and talents.\n\t\t*set growth +1\n\t\t*goto milesandmiles\n\n*label milesandmiles\n\nAs you are bathed in teleportation fluid, you feel your stomach do a backflip—you can't tell if it's due to the excitement of exploring a totally new world, or the tumbling pull of the teleportation process….\n\n*page_break Thousands of Miles Later\n\nYou sit at the mess hall dining table, or rather, the long log that the human rebels have decided to use as a table. The rebel headquarters is extremely low-tech since, as you have learned, Binarians are capable of patching into any and all forms of technology. It also means that you've had to shut off your OtherBoard readouts for the time being, to avoid any potential Binarian detection.\n\nYou assume this is also the reason that the human rebels have established their central headquarters on a mobile ship. Staying low-tech and in the middle of a body of water is the surest way to keep androids away, apparently. \n\nDespite the logic of it, you were still surprised to find how crude life on the ship seemed as you passed through the halls. It feels like a glorified campground in here, one that has not been treated with any particular degree of cleanliness or respect. You understand having to live a low-tech life, but that doesn't necessarily warrant living in squalor….\n\nThen again, you don't know much about this war or this world, which is why you've chosen to join the rebels for dinner. Thanks to dream-logic, they all just accepted you as a visitor passing through, without much questioning. Which is less crazy than the fact that no one seems to be troubled by your large blue bird companion.\n\n*page_break\n*label rosaeiapsequence\n*check_purchase extraworning\n*if not(choice_purchase_supported)\n\t\"Excuse me,\" Rosae chirps. \"But\n\t*goto endofiapwarning\n\n\"I understand you have more pressing conversations to hold at the moment,\" Rosae interjects in a hushed falsetto from her perch beside you. \"However, there is one further service we WorningBirds provide that I feel is most prudent to discuss now.\n\n*label rosaeiapsequencefrombetray\n*set iapofferon true\n\n\"Every time WorningBirds MemoryTravel to a new world, we pick up another skill, much like our Priscan masters. I've just sorted through this newly acquired skill and wanted to present it to you formally.\n\n\"As you've probably experienced via OtherBoard's absorb, Binarians offer curious and unique insights into intelligent decision-making, quantifying your choices in a series of personality statistics. It appears that if I pair with the statistical model now loaded into your mind, I can help you make the smartest choices possible, moving forward.\n\nDo you wish to purchase Rosae's Extra WorningBird function option?\n\n*check_purchase extraworning\n*if choice_purchased_extraworning\n\t[i]You've paid to unlock the Extra WorningBird function with an in-app purchase.[/i]\n\n\t*choice\n\t\t#Unlock Rosae's Extra WorningBird function again, at no additional charge.\n\t\t\t*label purchasedextraworning\n\t\t\t*set extraworning true\n\t\t\t*goto officialstatchartinthree\n\t\t#Not at this time.\n\t\t\t*label noextraworning\n\t\t\t*comment \"Fortunately, it appears that you may choose to activate this function at any time, since I have added the option to your mental OtherBoard Show Stats screen.\"\n\n\t\t\t*comment You check this Show Stats screen and see that Rosae's Extra WorningBird function option has indeed been enabled. You realize that if you want to start receiving these additional warnings informing you how to make the smartest choices possible, you had better go there and turn Rosae's new function on now, before anything else happens. \n\n\t\t\t*comment Though you can activate it at any time later by visiting the Stats Screen, if you don't want to just yet.\n\t\t\t*comment *page_break\n\t\t\t*goto officialstatchartinthree\n*else\n\t*purchase extraworning $0.99 purchasedextraworning\n\t*page_break No, Thanks\n\t*goto noextraworning\n\n*label officialstatchartinthree\n\n*if extraworning\n\t\"I am pleased you have decided to allow me to offer additional assistance,\" Rosae chirps. \"Now,\n\t*goto endofiapwarning\n*else\n\t\"I know you've chosen not to activate my additional assistance at this time,\" Rosae chirps. \"However,\n\t*goto endofiapwarning\n\n*label endofiapwarning\nbefore we continue, may I ask you a question?\"\n\nYou nod at Rosae, so she keeps chirping through.\n\n*label endofiapwarningfrombetray\n\n\"I'm sure this past day has been completely overwhelming, so I wanted to present you with a somewhat unorthodox option. As the MemoryTraveler, you have a limited degree of control of the duration of your experience. I won't bore you with the gory details, but if you want, I can help you speed up or slow down this experience.\n\n\"In other words, I'd like to know how you are feeling about spending more time here on Binaria.\"\n\nYou take in Rosae's words, feeling immediately thankful to be given some measure of control over all of this reality-blurring world-hopping.\n\n*choice\n\t#Thanks, but no thanks—I’m interested in staying on Binaria for a bit to learn more and interact with the natives while I have the chance.\n\t\t\"Fantastic,\" Rosae beams. \"For now, focus on enjoying the experience and soaking in this new culture. I'll keep track of anything you may need to know for future reference, so don't worry about that.\n\n\t\t*goto quitcharp\n\t#I’ll ride out the rest of this experience for however long it lasts, knowing that Rosae will catalogue any essential information I need to remember in my Show Stats screen using her newly acquired OtherBoard skills.\n\t\t\"Indeed, focus on enjoying the experience and soaking in this new culture. I'll keep track of anything you may need to know for future reference,\" Rosae beams.\n\t\t*goto quitcharp\n\t#Yes, actually, I’m totally overwhelmed by all of these new worlds. I’ll come back and continue to explore Binaria later, when I have my bearings.\n\t\t*set skipthree true\n\t\t\"Your wish is my command,\" Rosae says, beginning to hover once again. \"Just remember for the future that I'll be sure to keep track of any essential information you may need to know in the Show Stats screen, so don't worry too much about being overwhelmed. Now, excuse me while I fly us into fast-forward mode.\"\n\n\t\tRosae begins to flap her wings furiously, causing the world around you to blur around the edges as you are pushed toward the end of this MemoryTravel experience.\n\n\t\tNext thing you know,\n\t\t*if helpob\n\t\t\tyou're sent reeling from another wave of nausea.\n\t\t\t*page_break\n\t\t\t*goto foreigneronceob\n\t\t*elseif betrayob\n\t\t\tthe door to the cell block opens and the Interrogator rolls back inside, the bronze \"B\" on its faceplate glowing eerily. Without a word, the Interrogator scrolls its eye-lights across your body, obviously initiating some kind of scan. \n\n\t\t\tOnce it is done, it refocuses its eyes to meet yours.\n\t\t\t*goto foreigneronceinter\n\t\t*else\n\t\t\tthe grey-haired commander, whose name turns out to be Cel, sits across from you with several bowls of stew. He is joined by his twin brother, Unit, and Unit's wife, Trig—who happens to be the jade-scarred woman from the Arrival Runway back on Versus.\n\n\t\t\tYou learned when you arrived on this vessel that Trig is what the Rutonian humans call a Machi Witch, capable of Compuspells, magical code that makes the impossible happen within computerized technology.\n\t\t\t*goto foreigneronce\n\n*label quitcharp\n\"Before I quit chirping, may I advise you to make a somewhat intangible choice before things proceed any further?\"\n\nYou nod at Rosae, figuring you still need all the help you can get.\n\n\"I believe you should make a decision that defines your goals and intentions for this MemoryTravel experience. Doing so will help to more clearly determine the successes of your subsequent decisions, 'priming' the relevant Stats before more impactful choices arise.\"\n\nYou have no idea how Rosae could know this, but then again, there's a lot about Rosae's existence that defies conventional logic. Knowing your MemoryTravel time will be limited, you decide to heed Rosae's advice and try to focus on selecting a specific goal for your time here.\n\n*if fighthumm\n\t*goto continuefighthumm\n*elseif helpob\n\t*goto continuehelpob\n*else\n\t*goto continuebetrayob\n\n*label continuefighthumm\n\n*choice\n\t#Befriend the rebels to learn as much information as possible.\n\t\t*set ruthless %-10\n\t\t*set getgoodside true\n\t\t*goto enougheat\n\t#Manipulate the rebels to obtain as much information as possible.\n\t\t*set ruthless %+10\n\t\t*set manipulateinfo true\n\t\t*goto enougheat\n\t#Try to understand why the humans are rebelling against the Binarians and not trying to foster peace.\n\t\t*set regime %+10\n\t\t*set understandreb true\n\t\t*goto enougheat\n\t#Learn about additional Binarian weaknesses in order to effectively fight them later, if need be.\n\t\t*set regime %-10\n\t\t*set binweakness true\n\t\t*goto enougheat\n\n*label enougheat\n\nJust as you set this goal, the grey-haired commander, whose name turned out to be Cel, sits across from you with several bowls of stew.\n\n\"Get enough to eat?\" Cel asks. He looks like he has slightly fewer scars on his face than when you last saw him on Versus, which makes some form of sense, since you technically MemoryTraveled back in time. [i]This is definitely going to take some getting used to,[/i] you think. \n\n\"Plenty,\" you say, nodding toward your own bowl of stew. \"Thanks again for taking me in.\"\n\n\"Any human is a friend of ours,\" Cel says before shoving the biggest handful of stew in his mouth you've ever seen. You suppose this is just more evidence of the humans here \"embracing their roots.\"\n\n\"You guys don't call yourselves Humms?\" you ask, trying to find a polite way to eat your own stew without utensils.\n\n\"Never,\" Cel practically growls. \"And you shouldn't either. That's the slur those Bine scum made for us.\"\n\nYou're about to apologize when another voice interrupts: \"Mind if we join you?\"\n\nYou look up to find a jade-scarred woman, the very same one from the Arrival Runway back on Versus. Though that isn't as surprising as the sight of another, less rugged Cel sitting across from you.\n\n*page_break\n\n\"Meet Trig and my twin brother, Unit,\" Cel says through another mouthful of meat.\n\n\"Nice to meet you,\" you say, thankful for this rather uncomplicate
