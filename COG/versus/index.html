 this thought settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]POWERED BY CONVICTION.[/b]\n\t\t*goto ashebeginsspeaking\n\t#I believe I will only achieve my goals if I treat others with respect and honesty.\n\t\t*set growth +3\n\t\t*set ruthless %-20\n\t\t\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]EVER BENEVOLENT.[/b]\n\t\t*goto ashebeginsspeaking\n\t#What I do might not matter in the end, so I want to learn and experience as much as I can along the way.\n\t\t*set growth +5\n\n\t\tAs this conviction settles, you suddenly hear Rosae's chirp-voice echoing in your ears with the words…\n\n\t\t[b]PERPETUAL STUDENT.[/b]\n\t\t*goto ashebeginsspeaking\n\n*label ashebeginsspeaking\n\nRosae's voice sounds different somehow, assigned with droning importance. You're not sure if this is yet another facet of OtherBoard's full absorb, but you do know this much:\n\nThis designation feels absolutely right, to you.\n\nYou can't help but wonder whether choosing a role in this way, assigning meaning to your existence, is exactly what Versus wants. Could it be part of the path to being Reborn?\n\nYou suppose these are more questions you'll have to survive long enough to answer. \n*if (growth = 40)\n\t*achieve growthspurt\n\tSo far, however, you've prioritized Growth above all else—and done so as flawlessly as you possibly could have.\n\t*goto thesedaysdiff\n*elseif (growth > 29)\n\t*achieve growthspurt\n\t*goto thesedaysdiff\n*else\n\t*goto thesedaysdiff\n\n*label thesedaysdiff\n*page_break\n\n\"These days are always the most difficult,\" Queen Ashe's voice suddenly flares, so bright you can almost see it. \"But the difficult days are also the ones where we grow the most. And what is Versus truly about, if not Growth?\"\n\nYou wonder for a moment if Queen Ashe could possibly have known what you were just thinking, but then you figure that some version of this consideration must be on everyone's minds. Funerals are good for that much, at the very least.\n\n\"The loss of ${deathone} is unbearable, but the legacy ${deathone} leaves is undeniable,\" Queen Ashe continues. \"Every ally we lose to the dreaded Un-Thing teaches us something new. So fear not, for it is The Elite Courte's sovereign promise to find a way to defeat this wretched monster and rid the galaxy of its foulness.\"\n\nThere's a pause, and it seems this might be all Queen Ashe has to say on the subject.\n*if todrickdie\n\t*goto quamoveson\n*else\n\tYou thought there might be mention of whatever Breeze did to the Elite Courte to deserve this fate, but obviously no one wants to talk about it here. \n\t*goto quamoveson\n\n*label quamoveson\n*page_break\n\n\"This is why these upcoming Elite Trials may be our most important yet. Many of you Ords are new to Versus and have yet to explore its many mysteries. The Elite Courte possesses deities and royalty, costumed heroines and warlocks, angels and soldiers, warriors and advisors.\"\n\nYou take a moment to consider what these incredible beings might look like—and what it might be like to meet them, hopefully someday very soon. You also wonder what category Oli might fall under, up there in that tinted skybox….\n\n\"However, despite our might, we are always asking who might be worthy to join us next. You Newcomers and remaining Ords bring with you a refreshed sense of hope that we might all grow and be better together, and that we might vanquish the terrible enemy we face.\n\n\"In the spirit of this mission, we have carefully selected the candidates who will be eligible to enter The Elite Trials, which will begin without further delay tomorrow. Time marches forward on Versus, and the best way to honor our fallen is to protect the living.\"\n\nYour heart skips a beat—Queen Ashe is going to announce this now, of all times? You suppose everyone is gathered in one place, but still… \n\n*page_break\n\nThis thought is eclipsed, however, by the realization that you might be nominated to partake in The Elite Trials. What are you going to do if you are? Or if you aren't?\n\nYou realize you won't have to wait much longer to find out, as Queen Ashe plows on.\n\n\"After careful review of the data collected and analyzed by our Ord Ambassador and Selection Committee, the following Ords are invited to report to The Elite Castle tomorrow to enter The Trials, if they so desire. \n\nAs such, The Elite Courte humbly invites the following five individuals to The Elite Trials.\"\n\nQueen Ashe takes a dramatic pause, then announces…\n\n*page_break\n\n\"Sir Baron Airon, of the Soaring Sallytras of Blarfngard.\"\n\nBaron Airon accepts this news with a simple nod, as if this entire process is already a foregone conclusion. You suppose he must consider himself royalty already. \n\n\"The Unpronounceable One,\" Queen Ashe then announces without further flourishes—an announcement that elicits no response from the shrouded being. You only know Queen Ashe must be talking about him because of the happy nod offered by Pinkuju beside him.\n\n\"Thirdly, we invite…\"\n\n*page_break\n\n\"Shiro Demon, the mighty Pinkuju of Resu.\"\n\nHearing this, Pinkuju loses her smile. The look on her face is not at all comprised of fear or unhappiness, but rather solemn responsibility. You suppose that's fairly appropriate, given the circumstances.\n\n\"Our penultimate invitee shall be…Grog Groggian, Slave #29 of the Sallytran Collective of Blarfngard.\"\n\nGrog looks like it might faint, while Baron Airon looks like he might vomit. You'd pause to wonder why Baron Airon has such low regard for this Grog creature, but you're too preoccupied trying to untie the knots in your stomach as Queen Ashe builds to her final invitation.\n\nCould it possibly be for you? \n\n\"And finally, the last spot in the Elite Trials shall go to…\"\n\n*page_break\n\n\"${name} Thomil, of Prisca.\"\n\nYou hear your name and, before anything else, immediately wonder who you have to thank for this invitation. Lady Venuma? Oli? Or could it be that you were deemed worthy all on your own? \n\nYour second thought is of those not selected. OtherBoard, Cel, and Trig must be blocked because of the Binarian, Royal A-08. None of them seem surprised or upset to not be included.\n*if todrickdie\n\tBreeze, on the other hand, looks stricken. Even though ${breze} claims to oppose The Elite, ${breze} is clearly desperate to be a part of their exclusive club. Perhaps that's why Breeze opposes them in the first place…\n\n\tThen you think, there has still been no mention of whatever Breeze did to cross The Elite Courte, but you figure ${breze} will again be the target for the next Versus Vote—unless Lady Venuma succeeds in her plans to oppose The Elite's rule.\n\t*goto elitetrails\n*else\n\tTodrick, on the other hand, looks stricken. He must still believe he might have squandered his chance to be part of The Elite by not volunteering, despite the truth that you exposed.\n\t*goto elitetrails\n\n*label elitetrails\n\nThankfully there is no mention or consideration of Empress Vaccus. Though you would have liked to know who the mystery twelfth Ord is…\n\n…then you correct yourself.\n\nEleventh Ord, now that ${deathone} has fallen.\n\n*page_break\n\nAs everyone's eyes settle on you at the end of the invitations, you feel a rush of anticipation. You've been invited to enter The Elite Trials—who knows what lies ahead for you there?\n\nAll you do know is that you're going to enter, because after all, it will only help in your mission to expose Dhanthik by full absorbing everyone on Versus. Who knows, this may be your only shot at having access to The Elite Courte. You quake with fear and excitement, wondering not only what brave new worlds you'll get to explore, but also what life in The Elite Castle might be like, or what tests you'll have to endure to earn your place there.\n\nWhich leads you to another important consideration: if you're entering The Elite Trials, what will your goal be there?\n\n*page_break\n\n\"Let us now take this time to honor and remember ${deathone},\" Queen Ashe announces, interrupting your consideration. \"Who most assuredly would have been considered for The Elite Trials if this Versus Match had turned out differently. For better or worse, according to the great Verses Scriptures, we are all tested by Versus, one way or another.\"\n\nYou hear these words and have no idea if they are true, but standing here beside ${deathone}'s fresh memorial grave, you realize it doesn't matter, because this will be your own test. \n\nInstantly, you realize that determining your goal for entering The Elite Trials will be among the most important decisions you make on Versus.\n\nEver.\n\n*choice\n\t#I will try to win The Elite Trials earnestly, to become one of The Elite Courte.\n\t\t*set winjoin true\n\t\t*achieve winjoinac\n\t\t*set ruthless %-25\n\t\t*set regime %+25\n\n\t\tAnd you have no doubt that you'll have to fight hard to do so. \n\n\t\tYou're not sure what you plan to do about Lady Venuma's brewing coup—you figure you'll just have to keep it to yourself, since figuring out exactly who to trust with such loaded information isn't exactly your specialty. \n\n\t\tYou suppose the only one you can truly trust with this information will be Queen Ashe herself.\n\n\t\t*if genuineregime\n\t\t\t*label culmination\n\t\t\t*set mastery +2\n\t\t\tWhatever the case, you know this much: this selected agenda is the culmination of all of your hard work on Versus so far.\n\t\t\t*goto funeralends\n\t\t*else\n\t\t\t*label newmove\n\t\t\tWhatever the case, this is a new direction for you, one that potentially contradicts your work up until now. Still, you know that doesn't necessarily matter, as long as you feel this is the right thing to do.\n\t\t\t*goto funeralends\n\t#I will attempt to become Elite by offering to be a double agent, spying on the brewing coup for Queen Ashe.\n\t\t*set doubleagent true\n\t\t*achieve doubleagentac\n\t\t*set ruthless %+25\n\t\t*set regime %+25\n\n\t\tOffering to work as a double agent for Queen Ashe can only help your chances in The Elite Trials, or perhaps even render your need to win them entirely unnecessary. If you can't win outright, you'll change the rules of the game to earn your spot. \n\n\t\tYou still know that you'll have to figure out who you can trust and play this very, very carefully—luckily, this is your specialty. In the end, you know the only one you can truly trust with this information will be Queen Ashe herself.\n\n\t\t*if ruthlessregime\n\t\t\t*goto culmination\n\t\t*else\n\t\t\t*goto newmove\n\t#I will attempt to win The Elite Trials and join The Elite Courte, but only to become a spy for Lady Venuma's coup.\n\t\t*set coupspy true\n\t\t*achieve coupspyac\n\t\t*set ruthless %+25\n\t\t*set regime %-25\n\n\t\tThis agenda will give you maximum flexibility, allowing you to build the relationships you want with both The Elite Courte and those involved with Lady Venuma's coup. \n\n\t\tYou'll just have to be very careful with your political maneuvers and your decisions about who to trust—luckily, this is your specialty.\n\n\t\t*if ruthlessrebellion\n\t\t\t*goto culmination\n\t\t*else\n\t\t\t*goto newmove\n\t#I will use my time in The Elite Trials to bond with any hidden coup members Lady Venuma connects me to.\n\t\t*set coupbond true\n\t\t*achieve coupbondac\n\t\t*set ruthless %-25\n\t\t*set regime %-25\n\n\t\tYou're tired of maneuvering through the politics—you'd much rather focus on building bonds with the right people and rely on those relationships to guide you. Since you've decided the coup is where your loyalties lie, you'll have to figure out exactly who that means building relationships with inside the Elite Castle's walls.\n\n\t\tYou just hope you can really trust Lady Venuma in doing so.\n\n\t\t*if genuinerebellion\n\t\t\t*goto culmination\n\t\t*else\n\t\t\t*goto newmove\n\t#I will use my time in The Elite Trials to gather information and focus on finding Dhanthik.\n\t\t*set eliteinfo true\n\t\t*achieve eliteinfoac\n\n\t\tYou're simply not ready to commit either way, and there is nothing wrong with that. Let everyone else play their games—you plan to make your own rules.\n\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+25\n\n\t\t\t*label neuttest\n\t\t\t*if stayneut\n\t\t\t\t*goto culmination\n\t\t\t*else\n\t\t\t\t*goto newmove\n\t\t*else\n\t\t\t*set ruthless %-25\n\t\t\t*goto neuttest\n\n*label funeralends\n*page_break\n\n*if winjoin\n\t*if (ruthless \u003c 25)\n\t\t*set status +2\n\t\t*goto statregimetest\n\t*elseif (ruthless \u003c 50)\n\t\t*set status +1\n\t\t*goto statregimetest\n\t*else\n\t\t*goto statregimetest\n*elseif doubleagent\n\t*if (ruthless > 75)\n\t\t*set status +2\n\t\t*goto statregimetest\n\t*elseif (ruthless > 50)\n\t\t*set status +1\n\t\t*goto statregimetest\n\t*else\n\t\t*goto statregimetest\n*elseif coupspy\n\t*if (ruthless > 75)\n\t\t*set status +2\n\t\t*goto statregimetest\n\t*elseif (ruthless > 50)\n\t\t*set status +1\n\t\t*goto statregimetest\n\t*else\n\t\t*goto statregimetest\n*if coupbond\n\t*if (ruthless \u003c 25)\n\t\t*set status +2\n\t\t*goto statregimetest\n\t*elseif (ruthless \u003c 50)\n\t\t*set status +1\n\t\t*goto statregimetest\n\t*else\n\t\t*goto statregimetest\n*else\n\t*if (ruthless \u003c 25)\n\t\t*set status +2\n\t\t*goto statregimetest\n\t*elseif (ruthless > 75)\n\t\t*set status +2\n\t\t*goto statregimetest\n\t*else\n\t\t*goto statregimetest\n\n*label statregimetest\n*if winjoin\n\t*if (regime > 75)\n\t\t*set status +4\n\t\t*goto statregimetestend\n\t*elseif (regime > 50)\n\t\t*set status +2\n\t\t*goto statregimetestend\n\t*else\n\t\t*goto statregimetestend\n*elseif doubleagent\n\t*if (regime > 75)\n\t\t*set status +4\n\t\t*goto statregimetestend\n\t*elseif (regime > 50)\n\t\t*set status +2\n\t\t*goto statregimetestend\n\t*else\n\t\t*goto statregimetestend\n*elseif coupspy\n\t*if (regime \u003c 25)\n\t\t*set status +4\n\t\t*goto statregimetestend\n\t*elseif (regime \u003c 50)\n\t\t*set status +2\n\t\t*goto statregimetestend\n\t*else\n\t\t*goto statregimetestend\n*if coupbond\n\t*if (regime \u003c 25)\n\t\t*set status +4\n\t\t*goto statregimetestend\n\t*elseif (regime \u003c 50)\n\t\t*set status +2\n\t\t*goto statregimetestend\n\t*else\n\t\t*goto statregimetestend\n*else\n\t*if (regime \u003c 25)\n\t\t*set status +4\n\t\t*goto statregimetestend\n\t*elseif (regime > 75)\n\t\t*set status +4\n\t\t*goto statregimetestend\n\t*else\n\t\t*goto statregimetestend\n\n*label statregimetestend\n\nWith this final motivation set, you give yourself a moment to take stock of your progress, using a bit of OtherBoard's technological logic to assist your efforts. Now that you've chosen this goal, you calculate what your status might be for achieving it, almost like a campaign poll. This calculation should indicate how much influence and skill you might have in enacting your designated political goal.\n\nBased on your intended goal, statistical consistency, recent behavior, and the relationships you've built with Lady Venuma and ${liveone}, and even ${deathone} before the funeral,\n*if (status = 10)\n\t*achieve statusperfect\n\tyou have a perfect status—the highest possible, in fact. You're well suited to the task ahead of you and will have many advantages in carrying it out.\n\t*goto wrapuptime \n*elseif (status > 5)\n\t*achieve statushigh\n\tyou have a high status for your intended goal. You're well suited to the task ahead of you and should have many advantages in carrying it out.\n\t*goto wrapuptime\n*else\n\tyou have a low status for your intended goal. You'll need to work harder to accomplish this task and will encounter more difficulty doing so, but as you've proven already, anything is possible.\n\t*goto wrapuptime\n\n*label wrapuptime\n*set deathrevealed true\n\nThis status might make all the difference in The Elite Trials, so you'll have to be sure to keep it as high as possible as you move forward.\n\n*page_break\n\nAs silence stretches over the funeral gathering and your own thoughts alike, you experience a rare moment of peace. Whatever lies ahead, you've proven that you're capable of handling it, of evolving while staying true to what matters most to you. Something tells you that you'll have to keep doing that if you're going to have any chance of surviving or thriving on Versus.\n\nYou wonder what Mother and Father and Gilo would say if they could see you now. Would they even recognize you? Deep down, something tells you that they would, that you've simply become the person you've all always known you could be. Even if this isn't the life any of them would choose for you, you believe this much: Mother might not be surprised by your evolution at all.\n\nStill, there are so many questions you want to answer. Who is Dhanthik hiding as? Why have you been Selected by Versus? Will you survive long enough to be Reborn? Will you be able to save your planet and family? How will you choose to answer Mother's ultimate request? Will you be able to defeat Empress Vaccus? How will you fare in The Elite Trials? Will Lady Venuma be able to pull off her coup? Will you be able to kill the Bominate using the secrets you've learned? Will you ever be voted into the Versus Match? And if you are, will you survive it? \n\nOr will you become a silverized statute, just like ${deathone}?\n\n*page_break\n\nFor now, as you stand among these bright and diverse individuals with your own goals set, the answers to these burning questions don't seem to matter as much.\n\nAfter all, you've been given the chance to live out the adventure you've always dreamed of having…\n\n…and perhaps you've simply begun to write the Verses of your own story.\n\n*if (mastery > 29)\n\t*set masterythirtybonus true\n\t*achieve masterythirtybonusac\n\t*goto endofchapternine\n*elseif masterytwentybonus\n\t*goto endofchapternine\n*elseif (mastery > 19)\n\t*set masterytwentybonus true\n\t*achieve masterytwentybonusac\n\t*set lifemax +1\n\t*goto endofchapternine\n*elseif masterytenbonus\n\t*goto endofchapternine\n*elseif (mastery > 9)\n\t*set masterytenbonus true\n\t*achieve masterytenbonusac\n\t*set lifemax +1\n\t*goto endofchapternine\n*else\n\t*goto endofchapternine\n\n*label endofchapternine\n*page_break END OF BOOK ONE\n\nMake sure to save your game below! You'll need your saved game to continue where you left off in the next episode.\n\n*save_game v1_save\n\n[i]A note from the author of VERSUS:[/i]\n\nThank you SO MUCH for taking this crazy intergalactic ride with me…a ride I hope is just beginning. If you enjoyed it as much as I did, you might also get a kick out of my other Choice of Games series:\n*line_break\n*link https://www.choiceofgames.com/heroes-rise/redirect.php?src=v1 Heroes Rise: The Prodigy (Book One)\n*line_break\n*link https://www.choiceofgames.com/heroes-rise-2-hero-project/redirect.php?src=v1 Heroes Rise: The Hero Project (Book Two)\n*line_break\n*link https://www.choiceofgames.com/heroes-rise-3-herofall/redirect.php?src=v1 Heroes Rise: HeroFall (Book Three)\n*line_break\n[i]The Hero Project: Redemption Season[/i] (Book One: Expected Winter 2016)\n\nFor those of you who have read Heroes Rise, VERSUS may feel very different to you. Indeed, if we think of each Heroes Rise like a movie, I think of each VERSUS like an episode; there will be many more of them, and I hope to get them to you faster. However, whether that happens depends entirely on you!\n\nAs always, the success of these projects rests on you, the readers. We're always looking for ways you can give back (take, for example, the beautiful cover for VERSUS, done by Hero Riser fan artist Alexandra Tagkali), so make sure to head to our social media sites to be a part of the fan conversation and dive into additional [b]VERSUS Mastery, Growth & Strategy Guides[/b].\n*line_break\n*link https://www.facebook.com/TheVersusSeries VERSUS Facebook\n\nLastly, if you liked VERSUS and want the story to continue, make your voice heard! Let us know, tell your friends, post, share, like, tweet—but also make sure to leave a review on your purchase platform. Our projects rely almost entirely on word of mouth and the support of our fans, so 5-Star Reviews mean everything! \n\nThanks again for reading, and here's to hoping there's plenty more in store for ${name} Thomil, Lady Venuma, ${liveone}, OtherBoard, Oli, and the entire VERSUS cast of characters, old and new.\n\nA Million Thanks,\n*line_break\nZachary Sergi\n\n*page_break\n\n*feedback\n\nThank you for playing!\n\n*ending\n", "v_one": "*comment é\n\n*image part_1.png\n\n*page_break\n\n*image chap_1.png\n\n*image e_chap1.png\n\n${blank}\n\n*page_break\n\nThe light clears and all you can see is green, then blue sky. Your boots feel wet and the smell of fresh grass hits you. You appear to be on some kind of field, shaped almost like a transplane landing strip, except it is covered in tall blade stalks and impossibly colored wildflowers. The sound of birds chirping and leaves rustling hits you next, replacing the war cries and grav-blast bursts.\n\nYou don't know where the Blots have taken you or how they did it, but you fight the rising tide of panic in your chest and check your surroundings instead, as you've been trained to do. In one direction you see an overgrown forest that's so thick and lush, you can't make out anything through its outer border. [i]Okay, that's not too abnormal,[/i] you think, though you don't recognize the tree bark or twisting trunks as anything ever seen on Prisca, personally or collectively.\n\nSpinning in the other direction, you find a chain of mountains made of ice so clear you can see right through them, save for some snowy patches toward the top. It's a breathtaking sight, but not for the reasons you'd hope…. \n\nThe sight drops a stone of dread into your stomach, because there are no ice mountains on Prisca.\n\nWhere the blerg are you? \n\n*page_break\n\nThat's when you feel it—your connection to the Priscan Collective Consciousness has been cut off. Immediately you experience a deep well of loss, like some mental limb has been severed.\n\nYou fight the urge to vomit as the waves of disconnection roll through your mind, stripping away ties like rubber bands snapping. The feeling of isolation is so thick and whole, it threatens to choke you. \n\nYou've never felt so completely alone in your entire life.\n\nYou almost gag, but instead you force yourself to get a grip, to find some kind of anchor….\n\n*choice\n\t#Gilo.\n\t\t*set solo %-5\n\t\t*set rlshp_family %+15\n\t\tWith the Blotbocs appearing during this pivotal battle, will she be able to get to Mother—\n\t\t*goto chirproas\n\t#Mother.\n\t\t*set solo %-5\n\t\t*set rlshp_family %+15\n\t\tWith the Blotbocs joining the fight, will she and Gilo be able to—\n\t\t*goto chirproas\n\t#My communicator.\n\t\t*set solo %-5\n\t\t*set rlshp_family %+15\n\t\tYou flip to different channels through your Battlesuite visor, but each one is just filled with loops of static. Where could you—\n\t\t*goto chirproas\n\t#My excitement.\n\t\t*set solo %+5\n\t\t*set rlshp_family %-15\n\t\tIt may be wrong, but if you really have left Prisca somehow, this could be the escape you've been looking for, ever since—\n\t\t*goto chirproas\n\t#My fear.\n\t\t*set solo %+5\n\t\t*set rlshp_family %-15\n\t\tYou've never left Prisca before, and if you have now, you know that it can't be for anything—\n\t\t*goto chirproas\n\n*label chirproas\n\n\"Chirp. Company. Chirp,\" Rosae appears to say. She adds a jaunty little twirl as she wisps back into your ${beltcolor} belt, apparently unaffected by your foreign surroundings.\n\n\"I can't get any readings on my—unknown at posfour!\"\n\nYou spin and freeze as you encounter two figures standing across the grassy field. The first is a rugged, grey-haired commander, wearing dark green fatigues with a white H on his chest. He is covered from head to toe with knives, grenades, and belted pouches sure to be filled with even more weapons. Though is that a…water tank that you see strapped to his back?\n\nNext to the commander stands a weathered woman with short black hair, wearing the same green and white fatigues. Her dull white eyes stare at you, the jade-green scar across her eye glowing as she does. \n\n*page_break\n\nYou heft your grav-gun and thumb the trigger, but before you can say or do anything, the jade-scarred woman whispers something inaudible and twitches her fingers in an intricate pattern. Her eyes flash the same green as her scar and suddenly your grav-gun powers down.\n\n\"Disarmed,\" she says to the grey-haired commander. What the blerg? How did she just—\n\n\"Drop your weapon and identify yourself,\" the commander shouts at you, pulling out two throwing knives and holding them ready. You can tell from his hard expression that he doesn't just use those for show.\n\nYou struggle to compose yourself and form words, but that proves even more impossible when an enormous shadow is suddenly cast over the grey-haired commander.\n\n*page_break\n\n\"Holy furk,\" the grey-haired commander shouts, turning his knives toward the hulking creature. It stands nearly fifteen feet tall and half as wide, a solid wall of pale yellow skin pulled across thick muscle. Rotting grey teeth protrude from its brutish face and you can smell it from where you stand, a mix of rotten eggs and body odor.\n\nFaced with the grey-haired commander's knives, the pale creature raises its massive hands in defense. You force yourself to blink—what in all Fathers Below is that thing?\n\n\"I don't know who you are,\" a new, high-pitched voice suddenly rings. \"But if you maim a royal slave, even one as ugly as this brute, it will be the last thing you do.\"\n\nYou follow the sound of this voice to find a nearly-naked man floating above the pale creature, his arms crossed over his lean torso. He wears only a rectangle of delicately embroidered fabric across his midsection, revealing his abnormally long limbs and sleek olive skin. He is strangely beautiful, but his face looks less human than…avian?\n\nYour mind struggles to grip onto something, some detail that makes any sense. Priscans naturally possess many different skin hues and face shapes, but those differences are thought to be meaningless, entirely superficial. Those are nothing like what you see here—actual, biological differences. These beings have to be…\n\nAliens? \n\n*page_break\n\n\"Okay, how about we all put down the shiny weapons and talk this out first?\"\n\nThis new voice enters the mix and you turn to find a short woman covered in black leather with pink stripes, wearing a matching black and pink racing helmet. There's a massive pink gun on her hip, though this is not as intimidating, somehow, as the two sleek blackmetal wings strapped to her back.\n\n\"I was about to start the uni-race when I got bathed in teleportation energy,\" she says, looking around. \"Spawner's Spit, we couldn't possibly be on…\"\n\nBefore this racing weaponess can finish, however, she seems to register something and thumbs the gun on her hip.\n\n\"Actually, we may want to use our weapons on that thing.\"\n\n*page_break\n\nYou turn to look across the grassy strip and your heart nearly stops. \n\nIt sloshes across the field, but not the way a normal Blot does. It moves with purpose, its nimble limbs littered with dozens of blacknamel tusks. It's twice the size of an ordinary Blot, its towering head adorned with a crown of spikes. Though that's not what catches your eye—all you can seem to focus on is the blood-red V painted across its chest.\n\nThat's the Blot General, Empress Vaccus.\n\nYou only recognize it from images you absorbed in the Collective Consciousness, of course—no one has ever seen Empress Vaccus in person and lived to tell about it. Immediately, you recall the most chilling memory…\n\n*fake_choice\n\t#Of a village in Prisca's agricultural sector that was pillaged by Empress Vaccus personally.\n\t\tThis monster saw fit to rip each and every innocent Priscan from that village in two with its bare hands.\n\t#Of an elite Priscan Special Forces Unit that was sent to infiltrate Empress Vaccus's stronghold…\n\t\tOnly to be returned to Prisca's capitol in parcels that held nothing but charred limbs and ripped ligaments, delivered by rotting Blotbirds.\n\t#Of Empress Vaccus's rumored taste for Priscan teeth, which it bites off one by one with its unique ironclad jaw…\n\t\tWhile its victim still lives.\n\t#Of Empress Vaccus's true bloodlust. It is the only Blot you've ever heard of that kills its prey without the intent of Blot conversion.\n\t\tAny Priscan that has encountered Empress Vaccus simply turned into a pile of charred limbs and ripped ligaments.\n\t#Of the red V on Empress Vaccus's chest, which is said to be repainted with the blood of its victims regularly.\n\t\tWhat's worse, Empress Vaccus apparently forces its victims to watch while it paints with their insides, sometimes using their newly plucked teeth as a crude brush.\n\nYou have absolutely no idea what Empress Vaccus is doing here in this strange place, but one thought pierces through all the chaos in your mind: if you somehow manage to kill or capture it, you could end the Black Blot War right here, right now. Empress Vaccus is the Blot figurehead, mindlessly worshipped by the Blot hordes as the driving force behind their hive-minded invasion.\n\nThe thought that you can take Empress Vaccus yourself is laughable, though—it is the most powerful and deadly Blot any Priscan has ever encountered. It's also supposed to be the only Blot with some sort of awareness, directing its Blot army atop an utterly solitary throne.\n\nEmpress Vaccus is supposed to be virtually unkillable, but then again, you can tell it is as disoriented as you are right now, since it hasn't lurched to kill any of these strange beings yet. Perhaps there is a way to use this temporary confusion to your advantage….\n\n*page_break\n\nYou still have no idea where you are or why you are here, but you can sort those details out later. All that matters in this moment is finding a way to fight Empress Vaccus without getting yourself killed, which is going to be a lot easier said than done.\n\nYou could try to handle Empress Vaccus relying solely on your anti-Blot Battlesuite and Priscan abilities, since there's no telling who you can trust to fight alongside you just yet. If anyone in this insane bunch is at all smart, hopefully they'll follow your lead and find a way to back you up.\n\nHowever, you also quickly realize that you could try to flash-absorb the abilities of one of these strangers to better your chances against Empress Vaccus. You've always been warned that absorbing off-world can be dangerous, or even deadly, without proper training, but fighting Empress Vaccus either way is going to be a risk.\n\nNo matter what, you know that hesitation is not an option.\n\n*choice\n\t#Flash-absorb the abilities of one of these foreign strangers.\n\t\t*set solo %-10\n\t\t*set weapons %-10\n\t\t*set rlshp_newbies %-15\n\t\t*set absorbstranger true\n\n\t\tYou know that it would be nearly impossible for you to take down Empress Vaccus on your own, so you need to try something new, attempt to acquire some unexpected edge. \n\n\t\tAccording to Priscan lore, it's terribly risky to absorb the abilities of unknown entities, given all the unpredictable factors. Still, it's a risk worth taking if it gives you a real shot at Empress Vaccus. Besides, you've always suspected that this warning was just more rhetoric to uphold Prisca's Purity Laws….\n\n\t\tEither way, you suppose you're about to find out. Only one question remains: who should you flash-absorb? \n\n\t\t*choice\n\t\t\t#The grey-haired commander.\n\t\t\t\t*set command +2\n\t\t\t\tYou run forward into the crowd of strangers and stop next to the grey-haired commander. Physical contact works best for a full absorb, but you only need to be adjacent to perform a flash absorb—which is likely all you'll be equipped to handle, anyway.\n\n\t\t\t\tAs you initiate the flash absorb, your eyes shine like liquid mirrors and your entire body seizes. You wonder if this was a terrible mistake, until your mind is flooded with images of a life overthrown, wracked with civil war against the great android order. You have no idea what you are seeing and you feel like you might explode from the heaviness, but then you stabilize. \n\n\t\t\t\tOnce you do, you find that your mind now seethes with new tactical knowledge, perfectly suited for a cunning maneuver. \n\n\t\t\t\tThe grey-haired commander turns to you, wanting to speak but unable to express himself. However jarring that was for you, it must have been doubly so for him. Still, there's no time: you've got to act fast. You doubt you'll hold onto this borrowed power for long, since flash absorbs tend to wear off quickly.\n\t\t\t\t*goto fightev\n\t\t\t#The jade-scarred woman.\n\t\t\t\t*set energy +2\n\t\t\t\tYou run forward into the crowd of strangers and stop next to the jade-scarred woman. Physical contact works best for a full absorb, but you only need to be adjacent to perform a flash absorb—which is likely all you'll be equipped to handle, anyway.\n\n\t\t\t\tAs you initiate the flash absorb, your eyes shine like liquid mirrors and your entire body seizes. You wonder if this was a terrible mistake, until your mind is flooded with images of a life overthrown, wracked with civil war against the great android order. A life torn from quiet study, spent in uprising. You have no idea what you are seeing and you feel like you might explode from the weariness, but then you stabilize. \n\n\t\t\t\tOnce you do, you find that your mind now seethes with new magical knowledge—knowledge you can't quite seem to decipher.\n\n\t\t\t\tThe jade-scarred woman turns to you, wanting to speak but unable to express herself. However jarring that was for you, it must have been doubly so for her. Still, there's no time: you've got to act fast. You doubt you'll hold onto this borrowed power for long, since flash absorbs tend to wear off quickly.\n\t\t\t\t*goto fightev\n\t\t\t#The pale creature.\n\t\t\t\t*set strength +2\n\t\t\t\tYou run forward into the crowd of strangers and stop next to the pale creature. Physical contact works best for a full absorb, but you only need to be adjacent to perform a flash absorb—which is likely all you'll be equipped to handle, anyway.\n\n\t\t\t\tAs you initiate the flash absorb, your eyes shine like liquid mirrors and your entire body seizes. You wonder if this was a terrible mistake, until your mind is flooded with images of a world underground, buried in rubble, always building higher and higher, but never climbing, always sentenced to the shadows. You have no idea what you are seeing and you feel like you might explode from the lowliness, but then you stabilize. \n\n\t\t\t\tOnce you do, you find that your body now seethes with new borrowed strength, perfectly suited for a forceful attack.\n\t\t\t\t\n\t\t\t\tThe pale creature turns to you, wanting to speak but unable to express itself. However jarring that was for you, it must have been doubly so for it. Still, there's no time: you've got to act fast. You doubt you'll hold onto this borrowed power for long, since flash absorbs tend to wear off quickly.\n\t\t\t\t*goto fightev\n\t\t\t#The floating avian man.\n\t\t\t\t*set agile +2\n\t\t\t\tYou run forward into the crowd of strangers and stop below the floating avian man. Physical contact works best for a full absorb, but you only need to be adjacent to perform a flash absorb—which is likely all you'll be equipped to handle, anyway.\n\n\t\t\t\tAs you initiate the flash absorb, your eyes shine like liquid mirrors and your entire body seizes. You wonder if this was a terrible mistake, until your mind is flooded with images of a life spent in the clouds, moving fom palace to splendid palace, an endless parade of luxury built on the backs of brutes. You have no idea what you are seeing and you feel like you might explode from the loftiness, but then you stabilize. \n\n\t\t\t\tOnce you do, you find that your body becomes light and agile, perfectly suited for a cunning maneuver. \n\n\t\t\t\tThe floating avian man turns to you, wanting to speak but unable to express himself. However jarring that was for you, it must have been doubly so for him. Still, there's no time: you've got to act fast. You doubt you'll hold onto this borrowed power for long, since flash absorbs tend to wear off quickly.\n\t\t\t\t*goto fightev\n\t\t\t#The racing weaponess.\n\t\t\t\t*set tech +2\n\t\t\t\tYou run forward into the crowd of strangers and stop next to the racing weaponess. Physical contact works best for a full absorb, but you only need to be adjacent to perform a flash absorb—which is likely all you'll be equipped to handle, anyway.\n\n\t\t\t\tAs you initiate the flash absorb, your eyes shine like liquid mirrors and your entire body seizes. You wonder if this was a terrible mistake, until your mind is flooded with images of a life on fire, living from race to race, grifting and stealing and surviving on a whim. You have no idea what you are seeing and you feel like you might explode from the speediness, but then you stabilize. \n\n\t\t\t\tOnce you do, you find that your mind now ripples with trained skill, perfectly suited for a forceful attack.\n\n\t\t\t\tThe racing woman turns to you, wanting to speak but unable to express herself. However jarring that was for you, it must have been doubly so for her. Still, there's no time: you've got to act fast. You doubt you'll hold onto this borrowed power for long, since flash absorbs tend to wear off quickly.\n\t\t\t\t*goto fightev\n\t#Fight Empress Vaccus directly with my own anti-Blot Battlesuite.\n\t\t*set solo %+10\n\t\t*set weapons %+20\n\t\t*set rlshp_newbies %+15\n\n\t\tYou can't risk absorbing anything from these strangers, since it could do more harm than good. According to Priscan lore, it's terribly risky to absorb the abilities of unknown entities, given all the unpredictable factors. This riskiness was always cited as a reason for the establishment of the Purity Laws, though you've always wondered if that warning was truth or rhetoric. \n\n\t\tHowever, now is most definitely not the time to answer that question.\n \t\n\t\tYou pull out your backup grav-gun battery and crank the settings up to max power, readying yourself to utilize your entire Battlesuite arsenal against Empress Vaccus if necessary. \n\t\t*goto fightev\n\t#Try to stun Empress Vaccus with a shareburst mindbolt, if only to buy some time to plan my next move.\n\t\t*set solo %+10\n\t\t*set weapons %-20\n\t\t*set rlshp_newbies %+15\n\n\t\tYou can't risk absorbing anything from these strangers, since it could do more harm than good. According to Priscan lore, it's terribly risky to absorb the abilities of unknown entities, given all the unpredictable factors. This riskiness was always cited as a reason for the establishment of the Purity Laws, though you've always wondered if that warning was truth or rhetoric. \n\n\t\tHowever, now is most definitely not the time to answer that question.\n\n\t\tYou prepare your mind for the most powerful shareburst you're capable of generating, since the rush of shared cognition might stun Empress Vaccus. Sharebursts work best on intelligent life-forms, but have also been known to distract Blots temporarily—luckily Empress Vaccus is somewhere in between the two.\n\t\t*goto fightev\n\n*label fightev\n*page_break\n\nNow that you're properly armed, you need to decide how to attack Empress Vaccus.\n\nYou know that your only chance is to match how you've just equipped yourself with the proper forceful or cunning combat pattern.\n\nOnly the perfect combination will give you a real chance at taking down Empress Vaccus.\n\n*choice\n\t#Attack Empress Vaccus directly: don't give it a chance to react, just devastate it.\n\t\t*set forceful %+15\n\n\t\t*if (strength > 1)\n\t\t\tYou lurch forward, seething with the pale creature's strength. You can't tell if you're being incredibly brave or incredibly stupid, but either way you jump into Empress Vaccus's coldzone. Aside from the rush of empty silence, you immediately feel your skin crawl, as if it is covered in a thousand writhing spiders. A searing sting also erupts behind your eyes, a pressurized bolt of pain that rockets through your sinuses, making your teeth ache.\n\n\t\t\tIgnoring the added effects of this enhanced coldzone, you round on Empress Vaccus. Before it can react, you land a punch across its ironclad jaw that cracks one of its blacknamel tusks on contact. You experience a surge of confidence and unbridled terror from coming into contact with Empress Vaccus….\n\n\t\t\tThe blow sends Empress Vaccus reeling across the grassy strip, to your surprise. You had no idea you'd be able to hit that hard…but it felt really blerging good.\n\n\t\t\t*page_break\n\n\t\t\tYou watch as Empress Vaccus hits the ground, then you step forward to attack again, bracing yourself to re-enter its horrifying coldzone. \n\t\t\t*goto chaseevforrest\n\t\t*elseif (command > 1)\n\t\t\tYou've now got all of this tactical knowledge, but to utilize this skill most effectively, you'll need troops to command. \n\n\t\t\t\"That thing is deadly,\" you scream. \"We need to kill it, so everyone—\"\n\t\t\t\n\t\t\tBefore you can finish your sentence, however, you feel a bloodmatter blast slam into your body with crushing force.\n\t\t\t*goto blastedintoforrest\n\t\t*elseif (energy > 1)\n\t\t\t*label nocluespell\n\t\t\tYou feel magical energy seething through you as you run forward, except you have no clue how to channel it. You can almost see binary spells tumbling across the edge of your mind, but every time you try to grasp one, it slips away.\n\n\t\t\tThis thought is interrupted, however, as a bloodmatter blast slams into your body with crushing force.\n\t\t\t*goto blastedintoforrest\n\t\t*elseif (tech > 1)\n\t\t\tYou swipe the gigantic gun from the racing weaponess's hip holster, knowing intuitively how to use it from your flash absorb.\n\t\t\t\t\n\t\t\tThinking fast, you program the gun to fire a mini-missile and blast it toward Empress Vaccus. The missile blazes forward and explodes into Empress Vaccus, cracking one of its blacknamel tusks on contact. \n\n\t\t\tThe force of the explosion sends Empress Vaccus reeling across the grassy strip in a streaking haze. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\n\t\t\t*page_break\n\n\t\t\tYou watch as Empress Vaccus hits the ground, then you step forward to fire again.\n\t\t\t*goto chaseevforrest\n\t\t*elseif (agile > 1)\n\t\t\tYou fly up into the sky, amazed at how agile you suddenly feel. You're actually flying—you have to stop the wave of inappropriate giddiness that ripples through you and refocus on your plan of attack.\n\n\t\t\tYou begin to fly at Empress Vaccus at top speed, quickly realizing that using yourself as a battering ram is the only way to wield this power forcefully.\n\n\t\t\tThis thought is interrupted, however, as a bloodmatter blast slams into your body with crushing force.\n\t\t\t*goto blastedintoforrest\n\t\t*elseif (weapons > 50)\n\t\t\tWith your grav-gun at this high setting, you're only going to get one shot before needing a few minutes to recharge for another. Taking careful aim, you pull the trigger and stabilize the grav-gun with all your strength. \n\n\t\t\tThe concussive blast rockets forward and explodes into Empress Vaccus, cracking one of its blacknamel tusks on contact.\n\n\t\t\tThe force of the explosion sends Empress Vaccus reeling across the grassy strip in a streaking haze. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\n\t\t\t*page_break\n\n\t\t\tYou watch as Empress Vaccus hits the ground, then you step forward to fire again.\n\t\t\t*goto chaseevforrest\n\t\t*else\n\t\t\tHaving prepped your most powerful shareburst, you focus it at the tip of your mind and fire it directly at Empress Vaccus. You see the shareburst bolt shooting from your forehead like a beam of thought energy, projecting across the field and slamming into Empress Vaccus.\n\n\t\t\tUnfortunately, the shareburst bolt seems to have no effect on it. You should have known that if this attack tends to barely stun a normal Blot, it would never have worked as a brute-force attack.\n\n\t\t\tHowever, the bolt does capture Empress Vaccus's attention. It turns to you and you feel a burst of terror as its bloody eyes settle on you. Empress Vaccus then breaks off one of its blacknamel tusks and throws it at you like a projectile weapon. You duck underneath the flying tusk, then pop back onto your feet.\n\t\t\t*goto continuemindboltsucc\n\t#Perform recon to discover if Empress Vaccus has any weaknesses, since I've never faced a Blot of this magnitude. Then use that weakness to formulate a plan of attack.\n\t\t*set forceful %-15\n\n\t\t*if (strength > 1)\n\t\t\tYou lurch forward, seething with the pale creature's strength. You can't tell if you're being incredibly brave or incredibly stupid, but either way you jump into Empress Vaccus's coldzone. Aside from the rush of empty silence, you immediately feel your skin crawl, as if it is covered in a thousand writhing spiders.\n\n\t\t\tIgnoring the added effects of this enhanced coldzone, you round on Empress Vaccus. However, you realize too late that this new strength makes you slower—probably too slow to successfully pull off any sort of recon mission.\n\n\t\t\tThis thought is interrupted, however, as a bloodmatter blast slams into your body with crushing force.\n\t\t\t*goto blastedintoforrest\n\t\t*elseif (command > 1)\n\t\t\tYou've now got all of this tactical knowledge, but to utilize this skill most effectively, you'll need troops to command. \n\n\t\t\t\"That thing is deadly,\" you scream. \"We all need to attack it and see how it reacts!\"\n\t\t\t\t\t\n\t\t\tThe alien bunch just stares at you, except for the pale creature, which heeds your command without hesitation. The pale creature rushes forward, but as it does, Empress Vaccus raises its hand, generating a bloodmatter blast that hits the creature head on. You've heard that some of the most powerful Blotbocs could generate bloody energy blasts, but you've never been on the receiving end—it does not look like blerging fun.\n\n\t\t\tStill, the pale creature shrugs off the direct hit and lunges forward, landing a punch across Empress Vaccus's ironclad jaw that cracks a blacknamel tusk on contact. \n\n\t\t\tThe force of the blow sends Empress Vaccus reeling across the grassy strip. You experience a surge of confidence and unbridled terror at attacking Empress Vaccus like this, even indirectly….\n\n\t\t\t*page_break\n\n\t\t\tYou watch as Empress Vaccus hits the ground, then you step forward to take command again.\n\t\t\t*goto chaseevforrest\n\t\t*elseif (energy > 1)\n\t\t\t*goto nocluespell\n\t\t*elseif (tech > 1)\n\t\t\tYou swipe the gigantic gun from the racing weaponess's hip holster, knowing intuitively how to use it from your flash absorb. \n\n\t\t\tWhich means that you also quickly realize this gun would be better suited for a direct attack, not for recon purposes.\n\n\t\t\tThis thought is interrupted, however, as a bloodmatter blast slams into your body with crushing force.\n\t\t\t*goto blastedintoforrest\n\t\t*elseif (agile > 1)\n\t\t\tYou fly up into the sky, amazed at how agile you suddenly feel. You're actually flying—you have to stop the wave of inappropriate giddiness rippling through you to refocus on your plan of attack.\n\n\t\t\tYou have no idea if you're being incredibly brave or incredibly stupid, but either way you fly circles through Empress Vaccus's coldzone. Aside from the rush of empty silence, you immediately feel your skin crawl, as if it is covered in a thousand writhing spiders. A searing sting also erupts behind your eyes, a pressurized bolt of pain that rockets through your sinuses and makes your teeth ache.\n\n\t\t\tIgnoring the added effects of this enhanced coldzone, you keep flying, hoping to see if Empress Vaccus's reaction will illuminate any weaknesses. Sure enough, you do capture Empress Vaccus's attention. It turns to you and you feel a burst of terror as its bloody eyes settle on you. Empress Vaccus then breaks off one of its blacknamel tusks and throws it at you like a projectile weapon.\n\n\t\t\tYou catch the tusk in midair and maneuver to return an attack. Before you can make another move, however, Empress Vaccus suddenly leaps into the sky without missing a beat. With one bounding stride, Empress Vaccus careens deep into the forest, its bloody V gleaming as it soars closer to the sun. \n\n\t\t\tBlerg, you didn't know it could do that. Nor did you know it could prioritize anything other than mutilating Priscan targets. Could there be something about this place, or something about your attack, that has frightened Empress Vaccus into fleeing?\n\n\t\t\tWhatever it is, you plan to capitalize on it as fully as possible.\n\n\t\t\t*page_break\n\t\t\t*set mastery +1\n\t\t\t*set tuskweapon true\n\n\t\t\tFeeling your borrowed flight powers already wearing thin, you touch down and begin to chase after Empress Vaccus. You feel your body still seething with adrenaline—coordinating that attack and utilizing your abilities correctly was quite the rush. The fact that it was against Empress Vaccus means you've just done something no other Priscan has come close to doing…perhaps Mother was indeed correct to choose you over Gilo? Though you remind yourself that now is not the time for congratulations, not when Empress Vaccus is still out there.\n\n\t\t\tThat's when you suddenly realize that the broken blacknamel tusk in your hands isn't melting into a Blotbog. Empress Vaccus must have a more sophisticated composition than normal Blots—which must also mean that killing it is going to be much more complicated than killing a normal Blot.\n\n\t\t\tWhatever the case, you pocket the tusk on your way into the forest—unlike normal Blot tusks, this one might come in handy as a weapon later.\n\t\t\t*goto runintoob\n\t\t*elseif (weapons > 50)\n\t\t\tWith your grav-gun at this high setting, you realize that you're only going to get one shot before needing a few minutes to recharge for another. You know it probably won't kill Empress Vaccus, but hopefully it's strong enough to get the Blot General's attention and reveal some weakness to you.\n\n\t\t\tTaking careful aim, you pull the trigger and stabilize the grav-gun with all your strength. The concussive blast rockets forward and explodes into Empress Vaccus, cracking one of its blacknamel tusks on contact.\n\n\t\t\tThe force of the explosion sends Empress Vaccus reeling across the grassy strip in a streaking haze. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\n\t\t\t*page_break\n\n\t\t\tYou watch as Empress Vaccus hits the ground, then you step forward to fire again.\n\t\t\t*goto chaseevforrest\n\t\t*else\n\t\t\tHaving prepped your most powerful shareburst, you focus it at the tip of your mind and fire it directly at Empress Vaccus. You see the shareburst bolt shooting from your forehead like a beam of thought energy, projecting across the field and slamming into Empress Vaccus.\n\n\t\t\tThe shareburst bolt seems to have no effect on it, but that wasn't your intent—you wanted to see how Empress Vaccus might react and if your attack would illuminate any weaknesses. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\n\t\t\tSure enough, the bolt gets Empress Vaccus's attention. It turns to you and you feel a burst of terror as its bloody eyes settle on you. Empress Vaccus then breaks off one of its blacknamel tusks and throws it at you like a projectile weapon. You duck underneath the flying tusk, then pop back onto your feet, trying not to completely freak out.\n\n\t\t\t*label continuemindboltsucc\n\t\t\t*page_break\n\n\t\t\tBefore you can make another move, however, Empress Vaccus leaps up and careens toward the forest in a single bound, its bloody V gleaming as it soars closer to the sun.\n\n\t\t\tBlerg, you didn't know it could do that.\n\n\t\t\tNor did you know it could prioritize anything other than mutilating Priscan targets. Could there be something about this place, or something about your attack, that has frightened Empress Vaccus into fleeing?\n\n\t\t\tWhatever it is, you plan to capitalize on it as fully as possible.\n\n\t\t\t*page_break\n\t\t\t*set mastery +1\n\t\t\t*set tuskweapon true\n\n\t\t\tYou turn to give chase into the forest, your body still seething with adrenaline—coordinating that attack and utilizing your abilities correctly was quite the rush. The fact that it was against Empress Vaccus means you've just done something no other Priscan has come close to doing…perhaps Mother was indeed correct to choose you over Gilo? Though you remind yourself that now is not the time for congratulations, not when Empress Vaccus is still out there.\n\n\t\t\tYou run toward the forest, but before you make it more than a few steps, you realize that the broken blacknamel tusk isn't melting into a Blotbog. Empress Vaccus must have a more sophisticated composition than normal Blots—which must also mean that killing it is going to be much more complicated than killing a normal Blot. \n\t\t\t*goto scooptime\n\t#Focus on fracturing one of Empress Vaccus's many blacknamel tusks to see if it takes out a mindheart nervous system, then execute my planned attack.\n\t\t*if (strength > 1)\n\t\t\tYou lurch forward, seething with the pale creature's strength. You can't tell if you're being incredibly brave or incredibly stupid, but either way you jump into Empress Vaccus's coldzone. Aside from the rush of empty silence, you immediately feel your skin crawl, as if it is covered in a thousand writhing spiders.\n\n\t\t\tIgnoring the added effects of this enhanced coldzone, you round on Empress Vaccus. Before it can react, you reach forward and snap off one of its blacknamel tusks with your bare hands. The tusk cracks with ease, but as you drop it to the ground, you see that this blow doesn't even seem to faze Empress Vaccus.\n\n\t\t\tJumping back, you experience a surge of confidence and unbridled terror, coming into contact with Empress Vaccus….\n\t\t\t*goto tuskblasted\n\t\t*elseif (command > 1)\n\t\t\tYou've now got all of this tactical knowledge, but to utilize this skill most effectively, you'll need troops to command. \n\n\t\t\t\"That thing is deadly,\" you scream. \"We all need to target its blacknamel tusks—those are its only weakness!\"\n\t\n\t\t\tThe alien bunch just stares at you, except for the creature, which heeds your command without hesitation and rushes forward, landing a punch across Empress Vaccus's ironclad jaw that cracks a blacknamel tusk on contact. \n\n\t\t\tThe force of the blow sends Empress Vaccus reeling across the grassy strip. You experience a surge of confidence and unbridled terror, attacking Empress Vaccus like this, even indirectly….\n\t\t\t*goto tuskblasted\n\t\t*elseif (energy > 1)\n\t\t\t*goto nocluespell\t\n\t\t*elseif (tech > 1)\n\t\t\tYou swipe the gigantic gun from the racing weaponess's hip holster, knowing intuitively how to use it from your flash absorb.\n\t\t\t\t\n\t\t\tThinking fast, you program the gun to fire a mini-missile and blast it at Empress Vaccus. The missile blazes forward and explodes into Empress Vaccus, cracking one of its blacknamel tusks on contact. \n\n\t\t\tThe force of the explosion sends Empress Vaccus reeling across the grassy strip in a streaking haze. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\t\t\t*goto tuskblasted\t\n\t\t*elseif (agile > 1)\n\t\t\tYou fly up into the sky, amazed at how agile you suddenly feel. You're actually flying—you have to stop the wave of inappropriate giddiness that ripples through you to refocus on your plan of attack.\n\n\t\t\tYou have no idea if you're being incredibly brave or incredibly stupid, but either way you fly circles through Empress Vaccus's coldzone. Aside from the rush of empty silence, you immediately feel your skin crawl, as if it is covered in a thousand writhing spiders.\n\n\t\t\tIgnoring the added effects of this enhanced coldzone, you keep flying, hoping to see if Empress Vaccus's reaction will illuminate any weaknesses. Sure enough, you do capture Empress Vaccus's attention. It turns to you and you feel a burst of terror as its bloody eyes settle on you. Empress Vaccus then breaks off one of its blacknamel tusks and throws it at you like a projectile weapon.\n\n\t\t\tYou fly sideways to dodge the attack, watching as the tusk falls to the ground just beyond you.\n\t\t\t*goto tuskblasted\n\t\t*elseif (weapons > 50)\n\t\t\tWith your grav-gun at this high setting, you're only going to get one shot before needing a few minutes to recharge for another. Taking careful aim, you pull the trigger and stabilize the grav-gun with all your strength. \n\n\t\t\tThe concussive blast rockets forward and explodes into Empress Vaccus, cracking one of its blacknamel tusks on contact.\n\n\t\t\tThe force of the explosion sends Empress Vaccus reeling across the grassy strip in a streaking haze. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\t\t\t*goto tuskblasted\t\t\n\t\t*else\n\t\t\tHaving prepped your most powerful shareburst, you focus it at the tip of your mind and fire it directly at Empress Vaccus. You see the shareburst bolt shooting from your forehead like a beam of thought energy, projecting across the field and slamming into Empress Vaccus.\n\n\t\t\tThe shareburst bolt seems to have no effect on it, but that wasn't your intent—you wanted to see how Empress Vaccus might react and if your attack would illuminate any weaknesses. You experience a surge of confidence and unbridled terror, firing on Empress Vaccus like this….\n\n\t\t\tSure enough, the bolt gets Empress Vaccus's attention. It turns to you and you feel a burst of terror as its bloody eyes settle on you. Empress Vaccus then breaks off one of its blacknamel tusks and throws it at you like a projectile weapon. You duck underneath the flying tusk, then pop back onto your feet, trying not to completely freak out.\n\n\t\t\t*label tuskblasted\n\t\t\t*page_break\n\t\t\t*set tuskweapon true\n\n\t\t\tAs you move forward, you realize that Empress Vaccus's broken blacknamel tusk isn't melting into a Blotbog. Empress Vaccus must have a more sophisticated composition than normal Blots—which must also mean that killing it is going to be much more complicated than killing a normal Blot.\n\n\t\t\tWhatever the case, you scoop up the tusk before making your next move—unlike normal Blot tusks, this one might come in handy as a weapon.\n\n\t\t\tThis thought is interrupted, however, as a bloodmatter blast suddenly slams into your body with crushing force.\n\t\t\t*goto blastedintoforrest\n\n*label chaseevforrest\n*set mastery +1\n*set tuskweapon true\n\nUntil Empress Vaccus suddenly pops back onto its feet, that is, and leaps into the sky without missing a beat. With one bounding stride, Empress Vaccus careens deep into the forest, its bloody V gleaming as it soars closer to the sun.\n\nBlerg. You didn't know it could do that.\n\nNor did you know it could prioritize anything other than mutilating Priscan targets. Could there be something about this place, or something about your attack, that has frightened Empress Vaccus into fleeing?\n\nWhatever it is, you plan to capitalize on it as fully as possible.\n\n*page_break\n\nYou turn to give chase into the forest, your body still seething with adrenaline—coordinating that attack and utilizing your abilities correctly was quite the rush. The fact that it was against Empress Vaccus means you've just done something no other Priscan has come close to doing…perhaps Mother was indeed correct to choose you over Gilo? Though you remind yourself that now is not the time for congratulations, not when Empress Vaccus is still out there.\n\nYou run toward the forest, but before you make it more than a few steps, you realize that the broken blacknamel tusk isn't melting into a Blotbog. Empress Vaccus must have a more sophisticated composition than normal Blots—which must also mean that killing it is going to be much more complicated than killing a normal Blot.\n\n*label scooptime \n\nWhatever the case, you scoop up the tusk on your way into the forest—unlike normal Blot tusks, this one might come in handy as a weapon later.\n*goto runintoob\n\n*label blastedintoforrest\n*page_break\n*set life -1\n\nAs you sail limply through the air, you feel the sting of a thousand sharp pinches riddling your body, along with a bolt of sinus pain that causes your teeth to ache. You had heard that some of the most powerful Blotbocs could generate bloody energy blasts, but you've never been on the receiving end before. Getting smashed with one is not blerging fun, but you suppose you're lucky to still be alive.\n\nThe next thing you know, you're slamming into a tree trunk on the forest's edge, causing your Battlesuite visor to indicate another loss of Life. As you try to shake off the hit, you spot Empress Vaccus leaping into the air and disappearing into the forest in a single bound, its bloody V gleaming as it soars closer to the sun.\n\nBlerg—yet another ability you didn't see coming.\n\nYou also wouldn't have guessed that Empress Vaccus could prioritize something other than mutilating Priscan targets. Could there be something about this place that has frightened Empress Vaccus into fleeing? If that's the case, what kind of blerging chance do you stand?\n\nIgnoring this thought, you pop back to your feet and chase after Empress Vaccus. The next time you fight, you're going to have to utilize your strengths and abilities to form more strategic attack combinations. Otherwise you'll have no shot at surviving against Empress Vaccus. As you run, you can't help but wonder why Mother would ever choose you to lead over Gilo.\n*goto runintoob\n\n*label runintoob\n*page_break\n*if tuskweapon\n\t*achieve tuskweaponac\nAs you enter the thick forest to chase after Empress Vaccus, you try your best not to be distracted by your wild surroundings. The forest is filled with massive tree trunks whose branches all bend back into the ground, forming intricate caverns and tunnels. You think the whole forest might actually be made up of one singular tree, with drooping branches that become the roots of the next trunk.\n\nThere are brightly colored flowers everywhere and you can hear the buzzing of insects all around—Mirrored Matron only knows what kind of animals are in here. You force that thought from your mind, however, because you need to focus on one thing: catching up to Empress Vaccus, wherever it is now. Though you haven't even paused to wonder why Empress Vaccus is running in the first place—usually Blots are more concerned with dominating than fleeing. Especially a Blot as vicious and powerful as Empress Vaccus is supposed to be…\n\nThe farther you run and the longer you have to think, the more the weight of your reality begins to settle. You're all alone in some foreign place, fighting the most deadly creature your people have ever known. You scream at yourself for ever being curious about disconnecting from Prisca, because now that you have, you feel a dark hole gaping in the edge of your own consciousness.\n\nCreeping tendrils of cold panic start to seep out of that hole, so you try desperately to think of something, anything else. \n\n*page_break\n\nYour mind decides to fix on a night long ago, when your family was on one of its rare vacations and you got lost for the first time. You had been out exploring the legendary Priscan mirrorwoods, where it is said that shamed Priscans have traveled for generations to share the dark secrets they tell no one else. You expected the mirrorwoods to feel sinister or sinful, but you were awed by their bright, shining branches and crisp, metallic leaves. \n\nYou were so engrossed by the mirrorwoods and the secrets hidden in their refracted seeds, you completely lost track of time. Night fell quickly and before you knew it, it was too dark to find your way back. To make matters worse, your mobile communicator had lost its battery charge from searching for scant service in the mirrorwoods and your own connection to the Collective Consciousness had been dimmed by the reflective interference. It was the first time you felt truly alone, but even then as a child, you did not panic. \n\nInstead, you settled yourself against one of the sturdiest mirrortrunks, ignoring the sounds of the shardbugs and shatterwolves calling in the night. You dug in your heels and focused with all your might on projecting your presence as strongly as you could. It took hours, but eventually Gilo was the one to register your emotional signature. When she finally found you, her skin was flecked with cuts and her hair was matted with sweat—you realize she must have been looking for you tirelessly. \n\nThough what you remember most about that night in the woods was that…\n\n*fake_choice\n\t#Gilo lied and told our parents we were playing a game of hide and seek, so that I'd be allowed to go exploring again the next day. \n\t\tYou let the memory of Gilo's protection steel you now as you run through this strange forest.\n\t#Mother could feel my lingering fear, so she insisted we all camp in the mirrorwoods that night so I wouldn't be afraid of them ever again.\n\t\tYou let the memory of Mother's lesson steel you now as you run through this strange forest.\n\t#Father told me stories of magical wood convexias who protected lost children in the night, to show I never had anything to fear.\n\t\tYou let the memory of Father's tale steel you now as you run through this strange forest.\n\t#I was so proud for surviving on my own without any source of connection, like a true explorer.\n\t\tYou let the memory of that rare independence steel you now as you run through this strange forest.\n\nYou may be lost and disconnected again, but you'll find your way back to your family now, just like you did then. And once you do return, you know you'll find that Gilo and Mother overcame those dreaded Blotbocs and won the day. There simply isn't any other reality you can consider. \n\nThis thought warms you as you run deeper and deeper into the forest, so far that your legs ache and your breathing becomes labored. You start to seriously question whether you're really on the right track when you glimpse a black figure moving up ahead. You dash after it even faster, your hope rising, but find that you go flying forward as something unexpected tightens around your ankle. \n\n\"Chirp. Trap. Chirp.\" Rosae tries to warn you, but it's too late.\n\nBefore you know it, you are swept off the ground as your legs fly up above your head. You dangle awkwardly for a moment until some kind of net falls over you. You feel around, expecting to touch roots or rope, but are surprised to find you're wrapped in…\n\nWires? \n\nThe net appears to be some strange mix of coaxial, charging, and auxiliary cords. What are these doing in the middle of this forest?\n\n*page_break\n\n\"Joy, another crop of Newcomers to deal with,\" a robotic voice says from somewhere nearby. \"It won't be long before those snobby Elites come sniffing around, I suppose.\"\n\n\"Hello?\" you shout. \"Whoever you are, you need to let me down. There's a very dangerous creature loose in these woods!\"\n\n\"Seriously,\" the voice says, growing louder. You swivel as much as you can to find…actually, you don't know what you find. Or what to call it, save for a woman-shaped robot, covered in more wires.\n\n\"You don't know the half of it, sweetie.\" \n\n*page_break\n\nBlinking back your disbelief, you study the thing. Her body is made up of chunky metal consoles painted green and brown, which rest like plates of armor over a clear plastic frame. Inside the plastic you can see endless bundles of wires running like nerves through her body, all the way up through her head, where rubber-covered wires run out and fall to her waist like braids. Her faceplate is made to look human, save for the glowing white core that shines through the openings.\n\nShe also wears a tattered dress that covers her rusty, scratched frame. She looks like some kind of android gone wild—another being you have no idea how to classify. You don't know why this wild android woman has captured you, but you do know that you don't have time to figure it out. You have to break free before Empress Vaccus—\n\n\"Why are you looking at me like that?\" the wild android woman snaps, her robotic drone taking on a tone of concern. \"Wait, where are you from?\"\n\nYou would like to ask her the very same questions—you've read Priscan science fiction stories about sentient androids, but you didn't know they really existed. Or that they could look like this. Or live in a forest. \n\nPushing these thoughts aside, you try to break free from the net that holds you, but the wires are too tight. You can't even move, let alone escape. You're going to have to try to talk your way out of this one.\n\n*choice\n\t#\"Let me loose now and I won't have to hurt you once I free myself.\"\n\t\t*set ruthless %+10\n\n\t\t*if (ruthless > 55)\n\t\t\t*set rlshp_ob %+5\n\t\t\t\n\t\t\t\"Calm down,\" the wild android woman sighs. \"There's no need for violence. This net is here to protect my home, which you stumbled into. I'll cut you down and you can continue rushing wherever it was you were going.\"\n\t\t\t*goto obfollow\n\t\t*else\n\t\t\t*set rlshp_ob %-20\n\t\t\t\n\t\t\t\"Yeah, you're really in a position to make threats,\" the wild android woman answers. \"Especially since you're trespassing in my home.\"\n\t\t\t*goto obfling\n\t#\"I mean you no harm; sorry if I intruded on your space. I could use some help, actually.\"\n\t\t*set ruthless %-10\n\n\t\t*if (ruthless \u003c 45)\n\t\t\t*set rlshp_ob %+20\n\n\t\t\t\"Well, why didn't you just say so?\" the wild android woman sighs.\n\t\t\t*goto obfollow\n\t\t*else\n\t\t\t*set rlshp_ob %-5\n\n\t\t\t\"Nice try,\" the wild android woman snaps. \"But you don't exactly seem like the genuine, buddy-buddy type to me.\"\n\t\t\t*goto obfling\n\t#\"If you let me go, I'll protect you from the deadly thing in the woods.\"\n\t\t*if (ruthless > 50)\n\t\t\t*set rlshp_ob %-10\n\t\t\tYou know that you don't necessarily mean to follow up this offer, but this wild android woman doesn't have to know that. You just need her to free you so you can keep chasing Empress Vaccus—which is some version of protection, you suppose.\n\n\t\t\t\"What makes you think I need protecting?\" the wild android woman asks. \"Besides, you're the one who stumbled helplessly into my home.\"\n\t\t\t*goto obfling\n\t\t*else\n\t\t\t*set rlshp_ob %+10\n\t\t\tYou know that you truly mean this offer, so you hope the wild android woman believes you and sets you free.\n\n\t\t\t\"What makes you think I need protecting?\" the wild android woman snaps. \"I'd rather have some answers.\"\n\t\t\t*goto obfollow\n\n*label obfling\n\nYou feel the wires tense, then release as you're shot through the sky like a cannonball. Tumbling through the air just above the treetops, you try to get your bearings. That wild android woman may have slowed you down, but at least she seems to have flung you in the direction Empress Vaccus was heading.\n\nAs you plummet back down through the treeline, you activate your grav-glider and touch down to the ground safely.\n*goto holoface\n\n*label obfollow\n\nThe wire net suddenly opens and you drop to the ground with a painful thud. \n\n\"Sorry,\" the wild android woman mumbles. \"My bad.\"\n\nShaking this off, you pop back onto your feet and are running through the forest again within seconds. \n*label holoface\nYou don't know who that wild android woman was, but you can add that to the long list of questions you need to answer later. Right now, you need to keep moving if you have any hopes of catching up to Empress Vaccus.\n\n*page_break\n\nYou move as quickly as your legs will carry you across the tangles of roots and swaths of leaves. You're not entirely certain that you're moving in the right direction once again, but you don't have time to stop and second-guess yourself. \n\nAs you leap over another swooping trunk, you think you can see a clearing ahead through—\n\n\"What exactly are you chasing?\" The wild android woman's voice suddenly sounds. \n\nYou nearly jump out of your skin, not so much from the wild android woman's voice, but from the holographic image of her faceplate that begins to float beside you. You manage to keep running, but the wild android woman must catch the look of surprise on your face enough to explain:\n\n\"I have a ton of questions for you, but that doesn't mean I'm leaving my home. Not when my holo-avatar can reach a square mile.\"\n\n*if (rlshp_ob > 55)\n\t\"I've got a lot of questions for you, too,\" you say through labored breaths. \"But first we need to make sure that—\"\n\t*goto stopcluff\n*else\n\t\"I don't have time for this,\" you shout through labored breaths. \"I need to find—\"\n\t*goto stopcluff\n\n*label stopcluff\n\nYou stop short, however, as you come abruptly upon the clearing you spotted seconds ago…\n\n*page_break\n\nWhich actually turns out to be a cliff that overlooks a thick, black sea.\n\n\"Figures,\" the wild android woman sighs, her holo-head still hanging beside you. \"That's the Onyx Ocean. If whoever you're chasing went in there, they're not doing so hot, right about now.\"\n\nThe black water of the Onyx Ocean laps against the cliffside rocks in toxic splashes, and you realize that this would be the perfect place for Empress Vaccus to hide. Especially because, from the looks of that slimy water, you'd bet it's not someplace you can follow.\n\nSure enough, you see a glint of light reflect off of a crown spike and spot Empress Vaccus swimming through the muckwater. Frantic, you survey your surroundings and quickly grab a rock, deciding to test the waters before you jump in. You toss the rock into the ocean and it immediately dissolves in the acidic sludge. Your heart sinks. \n\nThere's no way you can follow Empress Vaccus into that water, if you can even call it water. \n\n*page_break\n\n[i]Wait,[/i] you then think, [i]maybe if I activate my grav-glider…[/i]\n\nBut that thought dissolves as well, as you see Empress Vaccus dive deep down beneath the surface of the muckwater. Your mind keeps racing with potential plans, all of them insufficient, until you are interrupted by the wild android woman again.\n\n\"I wouldn't try following, if I were you,\" she says, swiveling her holo-head back and forth. \"If that thing can swim through the Onyx Ocean, it could be anywhere on the planet in a matter of seconds. There are all sorts of underground rivers down there.\"\n\nBlerg. As much as you want to keep thinking of ways to follow, you know that…\n\n*choice\n\t#I don't stand a chance swimming through that muckwater. Following Empress Vaccus would be a deadly waste of time, as much as I might want to.\n\t\t*set forceful %+5\n\t\t*goto heavingchest\n\t#Even in the unlikely event that I'm able to actually catch up to Empress Vaccus, I'm not properly equipped to kill it in this state, anyway.\n\t\t*if (forceful > 50)\n\t\t\t*set forceful %+5\n\t\t\t*goto heavingchest\n\t\t*else\n\t\t\t*set forceful %-5\n\t\t\t*goto heavingchest\n\t#It would probably be smart to stop, regroup, and try to figure out exactly what's going on before I keep blindly reacting.\n\t\t*set forceful %-5\n\t\t*goto heavingchest\n\n*label heavingchest\nAs your chest heaves to regain your breath, you try to sort through the questions piling up in your brain. Where are you? Why have you been brought here? What does Empress Vaccus have to do with it? How is your family faring back in the battle on Prisca? How can you get back to make sure—\n\n\"Well then, sweetie, it looks like we may have time for that Q&A session after all,\" the wild android woman says, interrupting your thoughts once again. You take another deep breath, trying to figure out where to even begin.\n\n*if (rlshp_ob > 55)\n\t\"I have to admit, I have no idea where we are,\" you say. \"Or what you are, either.\"\n\t*goto obintro\n*else\n\t\"Where are we?\" you demand. \"And what exactly are you?\"\n\t*goto obintro\n\n*label obintro\n\n\"My name is OtherBoard, thanks for asking,\" OtherBoard grumbles. \"As for what I am, I'm a Multinarian, from The Forbidden Moon Multinaria.\"\n\n*page_break\n*set meetob true\n\nOtherBoard pauses, as if she expects this information to elicit some kind of specific reaction, but you just blink at her. She narrows her metallic eye slits, almost as if to glare at you.\n\n\"Not a fan? Fine, join the Humm club,\" OtherBoard says, shaking her holo-head as she speaks under her breath. \"Just what I'd expect from—\"\n\n\"I don't know anything about where you're from,\" you interrupt. \"Is that where we are right now, on your forbidden moon?\"\n\n\"How can you not know?\" OtherBoard says, not bothering to mask her contempt. \"We're obviously on planet Versus.\"\n\nOtherBoard stares at you as if she expects this announcement to elicit another reaction, but you just continue to stare back at her. OtherBoard opens her eye-lights much wider, simulating an expression of surprise.\n\n\"You haven't heard of Versus?\" OtherBoard nearly shouts. \"Just what kind of backwater planet are you from?\"\n\n*page_break\n\n*if (rlshp_ob > 55)\n\t\"A planet called Prisca,\" you say, trying not to be offended. \"It's located on the galactic edge and I've never been off-world.\"\n\t*goto oblearns\n*else\n\tYou're not planning on telling this OtherBoard character a thing, especially not after the way she has been treating you. Watching as her eyes flash white, however, you get the feeling that she might not need you to say anything in order to learn what she wants.\n\t*goto oblearns\n\n*label oblearns\n\n\"Prisca,\" OtherBoard says, her eye-lights scrolling back and forth as if she's reading some mental notes. \"Wow, that's a flyover planet if I've ever seen one. I had to dig deep into my databanks to even find it, it's so far on the galactic fringes…but wait, does this mean you haven't traveled to the Nagoll Rim?\"\n\n\"I don't even know what that is,\" you admit. \"Any off-world information is considered contraband on Prisca, to keep our culture pure.\" \n\nOtherBoard twists her automated metallic lips into a frown, hearing this. Reading her expression of disgust, you immediately respond:\n\n*choice\n\t#\"Trust me, I don't approve of the Purity Laws at all.\"\n\t\t*set regime %-5\n\t\t\n\t\t*if priscannonbeliever\n\t\t\t*set growth +1\n\t\t\t*goto staresintr\n\t\t*else\n\t\t\t*goto staresintr\n\t#\"I wouldn't expect you to understand our sacred customs.\"\n\t\t*set regime %+5\n\n\t\t*if priscantruebeliever\n\t\t\t*set growth +1\n\t\t\t*goto staresintr\n\t\t*else\n\t\t\t*goto staresintr\n\t#\"It may not be ideal, but there are certainly benefits to the Priscan community.\"\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto contested\n\t\t*else\n\t\t\t*set regime %-5\n\n\t\t\t*label contested\n\t\t\t*if priscanconflicted\n\t\t\t\t*set growth +1\n\t\t\t\t*goto staresintr\n\t\t\t*else\n\t\t\t\t*goto staresintr\n\t#\"Who are you to judge where I come from?\"\n\t\t*set growth +1\n\t\t*goto staresintr\n\n*label staresintr\n\n*if (growth = 1)\n\t*achieve stoodupbeliefs\nOtherBoard continues to stare at you, as if she is trying to figure you out. She rolls her eye-lights across your body, until suddenly her auto-frown begins to curl into something more like a curious
