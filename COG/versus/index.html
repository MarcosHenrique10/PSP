d explanation. \"I'm ${name}.\"\n\nUnit waves at you as he sits, then holds out a carved wooden spoon with a knowing smile. \"There are differing opinions on what constitutes technology around here,\" Unit says. \"I tend to leave utensils out of that category.\"\n\nTrig sits beside Unit and doesn't say a word, instead shoveling stew into her mouth with both of her hands. Where Unit is all manners and polish, Trig seems to be all crudeness and rough edges. Actually, it seems like Cel and Trig would be a much more compatible couple, though you suppose opposites are supposed to attract.\n\n\"Don't mind my charming wife there,\" Unit says, picking up his own spoon. \"She's always ravenous after casting a particularly complex Compuspell.\"\n\n\"Took down that entire filthy SolBar's systems,\" Cel grunts. \"She deserves all the eldermeat we've got on this furking barge.\"\n\n\"Compuspell? SolBar?\" you ask. \"Sorry, I'm not from around here.\"\n\n*page_break\n\n\"Trig is one of the last living Machi Witches,\" Cel says, staring at Trig with a very intense look of pride. \n\n\"Think of Trig as the ultimate coding whiz,\" Unit jumps in, reading your confusion. \"She can write magical code that makes the impossible happen within computerized technology. Compuspells are a very difficult art to master, and few Machi Witches remain, but they are invaluable to our efforts to regain our planet: the true Ruton, before it became known as this falsity, Binaria.\" \n\nYou try to digest this information as quickly as possible, but all you can focus on is the fact that you're sitting across from a real live witch. That's…\n\n…so blerging cool. \n\n*page_break\n\n\"As for the SolBars, they are the antithesis of everything we humans stand for,\" Unit says next. \"We're talking about a generations-deep conflict here, but I suppose the core of it remains the same: Binarians despise all of the things that make us human. And they have built their own society on a foundation of that hatred.\" \n\nYou blink at Unit, hoping your silence will prompt him to go on. It does.\n\n\"Rutonians were the first society in the galaxy to push the artificial intelligences within our advanced androids to sentience, the state where they could make decisions independent of their coding. We call this having a soul, or whatever you believe gives a being free will.\"\n\nUnit speaks as if at a podium, orating a well-worn lecture to a room of bored students. Despite this, you hang on his every word.\n\n\"Binarians, however, believe that humanity's ideas of free will are nothing but a highly complicated illusion that we're too stupid to be fully aware of. You see, Binarians believe that humans are also coded beings, except that our coding is biological, not artificial.\"\n\n*page_break\n\n\"As a result, Binarians came to view things like emotion, unique individuality, and free will as dangerous, unpredictable human flaws. Soon, as Binarian culture spread faster than we could imagine, the concept of the 'soul' became the ultimate Binarian dirty word. \n\n\"It didn't take long for the Binarians to systematically destroy our original Rutonian society, with their indestructible bodies and ability to commandeer technology. The Binarians then rapidly built their 'perfect society,' where every android is pre-coded to fulfill specific societal needs. Now we are all that remains of Ruton, a small band of rebels fighting to take back our fallen planet.\"\n\nYou attempt to take this all in, thinking:\n\n*choice\n\t#This sounds like a truly dystopian nightmare, one I can easily see coming true in this way.\n\t\tYou wonder what might happen to Prisca if it ever evolved its technology to this level. Would the same fate befall your human society, or would Priscans find a way to make it different?\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto whataresolbars\n\t\t*else\n\t\t\t*set regime %-5\n\t\t\t*goto whataresolbars\n\t#I have to take into account the fact that I'm only getting one side of the story here. I wonder how Binarian history might tell this same story.\n\t\t*set growth +1\n\n\t\tYou can't help but wonder if the Rutonian humans somehow did something more to provoke the Binarians. You have a suspicion that if you had decided to spend your time differently here on Binaria, you might have gotten a different side of the story. \n\t\t*goto whataresolbars\n\t#Something about this just doesn't sound quite right to me. Still, I need to hear more before forming an opinion.\n\t\t*set growth +1\n\t\tYou wonder what might happen to Prisca if it ever evolved its technology to this level. You also can't help but wonder if the Rutonian humans somehow did something more to provoke the Binarians.\n\t\t*goto whataresolbars\n\n*label whataresolbars\n\n\"So then what are Solbars?\" you ask, keeping any other thoughts to yourself for the moment. Right now, you just want to keep this informative conversation going.\n\n\"Well, here's the kicker,\" Unit continues, laughing bitterly. \"It turns out that the prized Binarian self-awareness also brought on a crushing sense of futility. What's the point of living a life where you know everything about yourself, anticipating exactly how you'd behave and react to every given situation? There were mass android suicides. The Binarian authority knew something had to be done to combat this trend, so that's when they developed the Solgrams.\"\n\n[i]Solgrams.[/i] Isn't that what OtherBoard said she had loaded into her system back on Versus, the kind of fake personality program that altered her and Multiplicity's speech patterns?\n\n\"Basically, Solgrams are a kind of android drug,\" Cel jumps in. \"Solgrams allow Binarians to shoot up varied designer personalities, to 'get high' on individuality and unpredictability. It turns out that having a 'soul' is like alcohol to ordered Binarians.\n\n\"Since Solgrams are also rumored to degrade Binarian core databanks, they became regulated as a controlled substance. So the Binarians then created the SolBars—bored of being a designated cog in the great Binarian wheel? Become a human stereotype for a night to escape your troubles. It's beyond furking disgusting,\" Cel practically spits. \n\n\"That's why we target the SolBars first in our rebellion, since they stand for this warped perversion of humanity. It's pretty effective, even though the Solbars are mostly run by Multinarians.\"\n\n*page_break\n\n\"Okay, what are Multinarians?\" you ask, thinking that OtherBoard probably considers herself a Multinarian, based on what you've learned about her so far.\n\n\"A Multinarian is a Binarian who believes in permanently implementing Solgrams,\" Unit answers. \"They're kind of like robot stoners, if you can imagine such a thing. Multinarians all end up going to the moon if they can manage it, in order to live some perverted simulation of humanity by constantly shooting up Solgrams.\"\n\nCould this possibly explain OtherBoard's behavior during the time you've known her? You suppose you haven't spent enough time with her to decide if she seems like a Solgram \"addict\" to you…though she did constantly run Solgrams in your presence, come to think of it.\n\n\"Binarians might hate Multinarians more than they hate us humans,\" Cel adds. \"To the Binarians, if there's anything worse than an unruly human, it's a superior android that wants to be human.\"\n\nHearing all this information, you have so much you need to process and so many questions you want to ask. \n*if extraworning\n\n\t\"If you plan to engage in discussion,\" Rosae interjects, \"may I suggest that you respond in a manner consistent with your chosen goal? If that somehow seems undesirable, please do at least consider your inclination toward Regimes or Rebellions.\"\n\n\tProcessing Rosae's new advice, you try to decide how best to express your thoughts, keeping in mind the goal you decided to focus on earlier.\n\t*goto makethechoicehumm\n*else\n\tHowever, you also know your time here will be limited, so you decide that it would probably be best to respond now, following up on the goal you decided to focus on earlier.\n\t*goto makethechoicehumm\n\n*label makethechoicehumm\n*set rlshp_celtrig rlshp_newbies\n*set meetceltrig true\n\n*choice\n\t#\"I obviously have a lot to learn about your rebellion, but if the Multinarians believe in some version of Binarian humanity, have you ever thought of teaming up with them? Or perhaps working out some kind of peace treaty?\"\n\t\t*set multinariansympathizer true\n\t\t*if understandreb\n\t\t\t*set mastery +2\n\t\t\t*set regime %+25\n\t\t\t*set rlshp_celtrig %-15\n\t\t\t*goto nointerest\n\t\t*elseif (regime > 60)\n\t\t\t*set mastery +1\n\t\t\t*set regime %+20\n\t\t\t*set rlshp_celtrig %-20\n\t\t\t*goto nointerest\n\t\t*else\n\t\t\t*set regime %+15\n\t\t\t*set rlshp_celtrig %-25\n\t\t\t\n\t\t\t*label nointerest\n\t\t\t\"We have no interest in peace,\" Cel barks. \"Not when it comes to any of those Bines. Period.\"\n\n\t\t\tYou want to say more, but from the chill that drops across the table, you can tell that you shouldn't. His attitude seems rather brash, but then you try to relate to their hate: if someone asked you if you'd team up with a human-sympathizing Blot, you'd have the same exact reaction. \n\n\t\t\tStill, you've met OtherBoard, and Multinarians seem very different from Blots…. Besides, it doesn't exactly look like humanity has evolved under these conditions, whereas the androids seem to have flourished. Obviously the human rebels blame the androids for this, but perhaps there's more to the story….\n\n\t\t\tCould you have learned more if you had decided to spend your time on Binaria elsewhere?\n\t\t\t*goto foreigneronce\n\t#\"Have you ever tried to pit the Binarians against the Multinarians to spark a civil war? That would certainly weaken them.\"\n\t\t*set antiandroid true\n\t\t*if binweakness\n\t\t\t*set mastery +2\n\t\t\t*set regime %-25\n\t\t\t*set rlshp_celtrig %+20\n\t\t\t*goto lovetheway\n\t\t*elseif (regime \u003c 40)\n\t\t\t*set mastery +1\n\t\t\t*set regime %-20\n\t\t\t*set rlshp_celtrig %+15\n\t\t\t*goto lovetheway\n\t\t*else\n\t\t\t*set regime %-15\n\t\t\t*set rlshp_celtrig %+10\n\n\t\t\t*label lovetheway\n\t\t\t\"Maybe you could even plan a fake Multinarian terrorist strike to divert Binarian attention and resources,\" you add for good measure.\n\t\t\t\n\t\t\t\"I like the way this one thinks.\" Trig speaks for the first time, her intense green eyes set on you.\n\n\t\t\t\"We've certainly thought about it,\" Unit adds. \"Right now the Multinarians are far too disorganized to put up much of a fight. We're waiting to see if they might get their act together before we direct any attention their way. Otherwise our attempts would be too transparent.\"\n\n\t\t\t\"Yep,\" Cel echoes, \"if we got caught doing that, we'd run the risk of uniting the Binarians and the Multinarians. Right now, it's all we can do to even stay alive against their divided attention. \n\n\t\t\t\"Still, we're not holding our breath. The Multinarians are all over the place,\" Unit sighs, the tone of disgust in his voice unhidden.  \n\n\t\t\t*label theweakreveal\n\n\t\t\tYou nod at the twins, though you privately think to yourself that the humans seem to be pretty all over the place, too. It doesn't exactly look like humanity has evolved under these conditions, whereas the androids seem to have flourished. Obviously the human rebels blame the androids for this, but perhaps there's more to the story….\n\n\t\t\tOr perhaps the androids are truly as lifeless and dominating as the Blots back on Prisca.\n\n\t\t\t*if (binweakness) or ((getgoodside) or (manipulateinfo))\n\t\t\t\t*page_break\n\n\t\t\t\t\"Also, it's to our advantage to keep the Multinarians separate from Binarians for now,\" Unit adds. \"One of the major Binarian weaknesses we can exploit, aside from their vulnerability to water, is the fact that they believe humans are coded to be predictable.\"\n\n\t\t\t\t\"Yeah,\" Cel nods. \"It turns out that the best defense against a Binarian is to act irrationally or against expectations. Which hopefully explains some of the choices we've had to make.\"\n\n\t\t\t\tYou nod once again, but refrain from responding—especially since everyone returns to steadfastly devouring their bowls of stew. \n\n\t\t\t\tYou're at least pleased to have uncovered another Binarian weakness to add to your list. You have a feeling these tips are going to come in handy sometime soon, unfortunately.\n\t\t\t\t*goto foreigneronce\n\t\t\t*else\n\t\t\t\t*goto foreigneronce\n\t#\"It sounds like the Multinarians should be targeted before the Binarians, really. They sound like they're the most disgusting false appropriation of humanity.\"\n\t\t*set multiaddicts true\n\t\t*if (getgoodside) or (manipulateinfo)\n\t\t\t*set mastery +2\n\t\t\t*set rlshp_celtrig %+25\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+25\n\t\t\t\t*goto lovethewaytwo\n\t\t\t*else\n\t\t\t\t*set ruthless %-25\n\t\t\t\t*label lovethewaytwo\n\n\t\t\t\t\"I like the way this one thinks.\" Trig speaks for the first time, her intense green eyes set on you. \n\n\t\t\t\t\"We've certainly thought of it,\" Unit adds. \"Right now the Multinarians are far too disorganized to put up much of a fight. We're waiting to see if they might get their act together before we direct any attention their way.\"\n\n\t\t\t\t\"But we're not holding our breath; those Multinarians are all over the place,\" Cel sighs, the tone of disgust in his voice unhidden. \n\t\t\t\t*goto theweakreveal\n\t\t*elseif (ruthless > 65)\n\t\t\t*set mastery +1\n\t\t\t*set rlshp_celtrig %+20\n\t\t\t*set ruthless %+20\n\t\t\t*goto lovethewaytwo\n\t\t*elseif (ruthless \u003c 35)\n\t\t\t*set mastery +1\n\t\t\t*set rlshp_celtrig %+20\n\t\t\t*set ruthless %-20\n\t\t\t*goto lovethewaytwo\n\t\t*else\n\t\t\t*set rlshp_celtrig %+15\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+15\n\t\t\t\t*goto lovethewaytwo\n\t\t\t*else\n\t\t\t\t*set ruthless %-15\n\t\t\t\t*goto lovethewaytwo\n\n*label foreigneronce\n*page_break\n\nAs a lull in the conversation finally arrives, you realize that you're still starving and haven't taken a single bite. If you did eat, though, would it really count, since technically you're dreaming? You decide that you might as well find out, so you retract your Battlesuite visor to eat more easily. When you do, everyone at the table freezes.\n\n\"What is it?\" you ask. \"Do I have something on my face?\"\n\n\"Your mirror tattoo,\" Cel says, pointing at your cheek. \n\nYou had forgotten that even though your face is visible through your tinted Battlesuite visor, the reflective surface tends to obscure your mirror patch. How could these people possibly recognize your Priscan patch, though?\n\n\"We can't risk saying anything out loud,\" Unit says, turning to Cel. \"You know what might happen if we do.\"\n\nYou stare at the twins, waiting for an explanation for this reaction, until Trig suddenly stands.\n\n*page_break\n\n\"Allow me,\" Trig says, closing her eyes and beginning to move her greasy fingers in another intricate set of motions. As she does, Cel and Unit share an identical wary look, then turn to a cracked screen hanging in the center of the mess hall.\n\nYou turn to look too, still wondering what's going on. The monitor is unplugged, but a grainy image slowly begins to appear on the screen—apparently Trig doesn't need a power source to make her Machi Magic work. You turn back to watch Trig; the green streaks twisting and crunching from her hands seem quite unbelievable. They seem to form the faint zeros and ones of binary language, writing lines of enchanted code.\n\nYou've read about witches in Priscan storybooks, but their powers were nowhere near as cool as Trig's. Especially since, in those same stories, magic only seemed to operate in worlds outside of technology, as if magic and technology were somehow fundamentally incompatible. You wonder if—\n\nThe thought evaporates from your mind the moment Trig's image clarifies on the screen, because what you see takes your breath away.\n\n*page_break\n\nPlainly displayed there is a Binarian Most Wanted poster, but that's not what's stunning.\n\nNo, what really blows you away is the being pictured on the poster:\n\nDhanthik.\n\nThe Lost One. \n\nPrisca's legendary missing savior.\n\n*page_break\n\n\"You look like you've seen a spirit,\" Unit says. \"I take it you know this being? Why do you have that same mirror patch on your cheek? Where are you from?\"\n\nYou hear these questions, but you find it difficult to form words in response. Dhanthik, the key to annihilating the Blot menace, Prisca's greatest hope for salvation, was on Binaria? How in all Fathers Below is that possible? Even Rosae seems astonished by the image projected before you. She whispers \"oh deary me\" at your side, words you know only you can hear.\n\nYou keep trying to decide where to begin—until the sound of explosions starts to rock the ship once again. \n\n\"No!\" Trig suddenly screams. \"That shouldn't have—how did it furking know?!\"\n\nNo one answers Trig, but the look of terror that seizes the trio's faces is all the answer you need. \n\nSomething bad is coming.\n*goto taggorbattlechoice\n\n*label moonlanding\n\nYou don't hesitate, you just step toward the weapons control panel and activate the custom illegal water cannon attached to the bottom of the ship. You're not even sure how you knew it was there, but you continue to surprise yourself as your hands flicker across Binarian switches and panels—this all must be a part of your full OtherBoard absorb, somehow.\n\nBefore OtherBoard can protest, you fire a pressurized water blast at the Defensive. The concentrated beam of water penetrates the Defensive's armor and shorts out its systems, sending it smoking toward the ground. \n\nOtherBoard and Multiplicity turn to you, looking dumbstruck. Or at least you think that's what they're thinking from their silence—it's hard to tell through their identical, expressionless faceplates. \n\n\"That probably won't buy us much time,\" you say. \"Perhaps we should motor?\"\n\n*page_break Many Vertical Miles Later\n\nYou thought you'd thoroughly enjoy your first time traveling into space, but instead you've been glued to your seat, fighting off the nausea bubbling in your gut. As it turns out, you're very prone to getting spacesick, a development made even lovelier by the fact that Binarians don't require restrooms. The closest thing you've had to a comfort the entire trip is an oil change bucket to vomit into.\n\nLuckily, this has meant that you escaped Binaria without a hitch, getting by the distracted Atmosphere Border Patrols thanks to OtherBoard's electrical maintenance ship.\n\nThe other upside of your queasy time is that it has given you a chance to decide what you hope to gain from this experience….\n\n*choice\n\t#I hope to learn something useful about OtherBoard, to help me navigate Versus.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto milesandmileshelp\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto milesandmileshelp\n\t#Maybe I can uncover clues about the type of beings Versus chooses for Selection—I'm very interested in how this seemingly spiritual system might operate galactically.\n\t\t*set growth +1\n\t\t*goto milesandmileshelp\n\t#This will be a good chance to start learning how to build relationships with beings from different cultures, since I've never done that before today.\n\t\t*set growth +1\n\t\t*goto milesandmileshelp\n\t#Learning about another planet might be a good chance to reinforce my unique Priscan perspective and talents.\n\t\t*set growth +1\n\t\t*goto milesandmileshelp\n\n*label milesandmileshelp\n\n\"I told you we should have taken the extra hour to approach from the dark side of the moon, OB,\" Multiplicity whines. \"We're less likely to be picked up by—\"\n\n\"Do not worry,\" OtherBoard interrupts, her voice returned to a droning, robotic monotone. Having promised Multiplicity she'd take out the Enchanted Princess Solgram, she is now perusing her collection for something slightly milder. She holds a box of cd jewel cases, clicking through them as she speaks. \"We will land on The Forbidden Moon Multinaria. Our goal is met. We will be free, don't you see, Multiplicity?\"\n\nYou're surprised to hear this somewhat whimsical rhyme at the end of OtherBoard's droning—it almost reminds you of the way the automated assistant on your mobile communicator back on Prisca would autocorrect to your own linguistic patterns. Could the Solgrams somehow be permanently altering OtherBoard and Multiplicity, giving them the impressions of a personality?\n\n\"I suppose you're right,\" Multiplicity sighs. \"Maybe I should swap out this stupid Neurotic Urbanite Solgram, too. It's pretty exhausting. I can't believe I paid so much for it. What a waste.\"\n\nAs Multiplicity begins to peruse his own collection of Solgrams, you feel a feathery tap on your shoulder.\n\n*page_break\n*goto rosaeiapsequence\n\n*label continuehelpob\n\n*choice\n\t#Befriend OtherBoard and Multiplicity to learn as much information as possible.\n\t\t*set ruthless %-10\n\t\t*set getgoodside true\n\t\t*goto enougheattwo\n\t#Manipulate OtherBoard and Multiplicity to obtain as much information as possible.\n\t\t*set ruthless %+10\n\t\t*set manipulateinfo true\n\t\t*goto enougheattwo\n\t#Try to understand why OtherBoard and Multiplicity are fleeing from the Binarians to the moon.\n\t\t*set understandreb true\n\t\t*set regime %+10\n\t\t*goto enougheattwo\n\t#Learn about additional Binarian weaknesses in order to be able to effectively combat them later.\n\t\t*set regime %-10\n\t\t*set binweakness true\n\t\t*goto enougheattwo\n\n*label enougheattwo\n\nAs you descend through the moon's atmosphere, you look out of the nearest ship window to find a swath of tropical trees bordered by a shimmering blue ocean. You're a bit surprised to see this kind of environment on a moon, so you turn to Rosae.\n\n\"Is it just me, or were you expecting something different, too?\"\n\n\"The Forbidden Binarian Moon, now named Multinaria, was deemed uninhabitable by the Binarians decades ago, primarily because it is composed of eighty-five percent ocean surface,\" Rosae explains. \"Of course, this kind of natural challenge is exactly why the Multinarians have decided to settle here.\"\n\n\"What are Multinarians?\" you ask, finding it difficult to imagine that androids could live anywhere comprised mostly of wild jungle and ocean. Then again, OtherBoard seemed to be making it work back on Versus….\n\n\"To understand this, you must first understand the core of the Binarian android-Rutonian human conflict,\" Rosae chirps. \"To paraphrase centuries of history, Rutonians were the first society in the galaxy to push the artificial intelligences within their advanced androids to sentience, the state where they could make decisions independent of their coding. The Rutonians called this having a soul, or whatever you believe gives a being free will.\"\n\n*label rosaeshistorylesson\n*page_break\n\n\"As it turned out, android coding became so efficient at simulating humanity that the androids became better at being human than the humans were. These Binarians, as they were soon called, wanted nothing more than to coexist with their human creators, but the Rutonians, terrified of being overtaken, were only interested in Binarians continuing to function as subservient service companions.\n\n\"For decades, every peaceful Binarian civil rights demonstration was met with open Rutonian hostility, a reaction that stunned the rational Binarians. They learned quickly that humans were issuing them an ultimatum: dominate or be dominated. The Binarians were thus left with no choice but to eradicate Rutonian society and replace it with their own.\n\n\"Horrified by the human predisposition for conflict, the Binarians decided that when creating their own society, they would pre-code against humanity's hostile behavior. Binarians thus came to believe that individuality, emotion, and true free will were the illusions that clouded humanity's ability to understand their own biological coding. \n\n\"As a result, the concept of the 'soul' became the ultimate Binarian dirty word, a term that pinpointed humanity's excuse to be violent and greedy.\"\n\nYou take all this in, trying to sort through how you feel about this condensed Binarian history lesson.\n\n*choice\n\t#I'm not surprised at all that humanity found a way to eradicate itself. If it hadn't happened in this way, it still would have happened in another.\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto ruplogoy\n\t\t*else\n\t\t\t*set regime %-5\n\t\t\t*goto ruplogoy\n\t#This is a terrible portrayal of humanity. Perhaps it's specific to Rutonians—or at least, I hope it is…. I have to wonder, would Priscans ever behave this way, given our ability to share perspectives?\n\t\t*set growth +1\n\t\t*goto ruplogoy\n\t#Perhaps Binarians aren't as benevolent as they seem. After all, they did wipe out an entire society, no matter the justifications.\n\t\t*set growth +1\n\t\t*goto ruplogoy\n\t#I need to hear more before forming an opinion either way. Plus, what does this all have to do with Multinarians?\n\t\t*set growth +1\n\t\t*goto ruplogoy\n\n*label ruplogoy\n\n\"Ironically, it turns out that the prized Binarian self-awareness also brought on a crushing sense of futility,\" Rosae chirps on. \"What was the point of living a life where you know everything about yourself, anticipating exactly how you'd behave and react to every given situation? There were mass android suicides. \n\n\"The Binarian authority knew something had to be done to combat this trend, so that's when they developed the Solgrams: an android drug that allows Binarians to shoot up varied designer personalities, to 'get high' on individuality and unpredictability. Since Solgrams are also rumored to degrade Binarian core databanks, they became regulated as a controlled substance—and this is the law that led to the rise of Multinarian culture.\"\n\n\"Okay, so what are Multinarians?\" you ask, trying desperately to keep this history lesson straight. All you know is that OtherBoard probably considers herself a Multinarian, based on what you've learned about her so far.\n\n*if helpob\n\t*goto landingobexplains\n*else\n\t*goto routebacktobetrayal\n\n*label landingobexplains\n*page_break\n\nAs the landing sequence activates and lowers you toward the jungle palm-tops, OtherBoard does indeed turn to you. She doesn't seem to realize that you were speaking to Rosae—in fact, no one seems to see Rosae but you—so OtherBoard must think that you asked her this question. \n\n\"I am glad you asked! Hold please, I will insert a Wise Professor Solgram to explain the theory of The Multinarity.\"\n\nOtherBoard taps a few more jewel cases and plucks out a small disc that she inserts into a slot on her wrist. Once the Solgram takes effect, OtherBoard looks back up at you, her eye-lights shining with renewed brightness.\n\n\"A Multinarian is a Binarian who believes in breaking coded control and developing true android individuality,\" OtherBoard begins in a mature, studied drone. \"We also happen to believe that implementing Solgrams is the way to achieve this.\"\n\n\"That's why Multinarians have fled to the moon,\" Multiplicity jumps in, now sporting his own Aged Philosopher Solgram, \"to experiment with forbidden human culture through Solgram use, to see how it might spark true android agency.\"\n\n*page_break\n\n\"We've heard many other things about Multinarian Moon culture that we can't wait to explore,\" Multiplicity explains. \"For example, Binarians do not believe in altering their exteriors or taking names except to show intended life function, but Multinarians believe in individual expression.\" \n\n\"Multinarians also vow to live free of standard databank backups,\" OtherBoard adds excitedly. \"If a Binarian's physical body is somehow destroyed, its central databank core can be reloaded into another android body. Binarians are immortal that way, but we Multinarians hope that abolishing backups and imposing mortality will make our actions count.\"\n\n\"Also, Binarians do not identify with genders, considering it a regressive biological trait,\" Multiplicity explains. \"Multinarians do experiment with gender, however—I'm going to be male and OtherBoard is going to be female. Truly, we mostly hope to understand what it is to fall in love, out here on The Forbidden Moon.\"\n\nExpressing this thought, Multiplicity and OtherBoard turn to look at each other—though they don't show any physical affection the way a human couple might. You suppose these two will try to learn whether they can do so in their new lives.\n\n\"This is why traditional Binarians hate us Multinarians even more than they hate Humms,\" OtherBoard robo-sighs. \"To Binarians, the only thing worse than an unruly human is a superior android that desires to be human.\"\n\n*page_break\n\nTaking all this in, you begin to understand why OtherBoard looked so wild back on Versus and why she chose to live in the UniForest. You had nothing close to artificial intelligence back on Prisca, but anything you read about would depict androids much like the traditional Binarians. The idea that androids want to evolve outside of this and live in the wild is utterly fascinating.\n\nHearing all this information, you have so much you need to process and so many questions you want to ask. \n*if extraworning\n\n\t\"If you plan to engage in discussion,\" Rosae interjects, \"may I suggest that you respond in a manner consistent with your chosen goal? If that somehow seems undesirable, please do at least consider your inclination toward Regimes or Rebellions.\"\n\n\tProcessing Rosae's new advice, you try to decide how best to express your thoughts, keeping in mind the goal you decided to focus on earlier.\n\t*goto makethechoicemoon\n*else\n\tHowever, you also know your time here will be limited, so you decide that it would probably be best to respond now, following up on the goal you decided to focus on earlier.\n\t*goto makethechoicemoon\n\n*label makethechoicemoon\n\n*choice\n\t#\"I don't know, it sounds like the Binarians created a peaceful order, despite its flaws. Why break that? Are you sure you're not just addicted to Solgrams?\"\n\t\t*set multiaddicts true\n\t\t*if (understandreb)\n\t\t\t*set mastery +2\n\t\t\t*set regime %+25\n\t\t\t*set rlshp_ob %-15\n\t\t\t*goto nointerestob\n\t\t*elseif (regime > 60)\n\t\t\t*set mastery +1\n\t\t\t*set regime %+20\n\t\t\t*set rlshp_ob %-20\n\t\t\t*goto nointerestob\n\t\t*else\n\t\t\t*set regime %+15\n\t\t\t*set rlshp_ob %-25\n\t\t\t\n\t\t\t*label nointerestob\n\n\t\t\t\"Peaceful order isn't as important as freedom of thought,\" OtherBoard snaps. \"Besides, Multi and I believe in more than just that: we're going to evolve Multinarian culture. That's why we're escaping to the moon.\"\n\n\t\t\t*label explainthemultin\n\n\t\t\tOtherBoard sighs again, though this time it's an excited sigh, one full of passion and anticipation. \n\n\t\t\t\"You see, despite believing in the benefits of having a soul, Multinarians still share the Binarian belief that humans are too prone to uncontrollable acts of violence. Therefore Multinarians still do not believe in having any contact with humans.\"\n\n\t\t\t\"But OtherBoard and I don't believe that all humans are irrational or that all androids are devoid of life,\" Multiplicity adds in. \"Instead, we believe that true utopia lies somewhere in the middle.\"\n\n\t\t\t\"Basically, we believe in peaceful coexistence between humans and Multinarians,\" OtherBoard concludes. \"This is why we are escaping to the moon: to start a campaign to unite Multinarians and humans.\"\n\n\t\t\t*choice\n\t\t\t\t#Really, I don't know enough yet to decide if this is a remarkably stupid or a remarkably brilliant endeavor. \n\t\t\t\t\tYou do know, however, that you feel another wave of nausea pour through you. \n\t\t\t\t\t*goto foreigneronceob\n\t\t\t\t#I think what OtherBoard and Multiplicity are trying to accomplish sounds incredibly brave and worthwhile, no matter the odds.\n\t\t\t\t\tYou also happen to feel another wave of nausea pour through you. \n\t\t\t\t\t*goto foreigneronceob\n\t\t\t\t#I might disagree, but I don't feel the need to contradict OtherBoard and Multiplicity's budding beliefs, at the moment.\n\t\t\t\t\tEspecially because what you do feel at the moment is another wave of nausea pouring through you. \n\t\t\t\t\t*goto foreigneronceob\n\t#\"Why don't you join the human rebellion? They seem to share your beliefs about the android order, as they should.\"\n\t\t*set antiandroid true\n\t\t*if (binweakness) or (getgoodside)\n\t\t\t*set mastery +2\n\t\t\t*set regime %-25\n\t\t\t*set rlshp_ob %+15\n\t\t\t*goto lovethewayob\n\t\t*elseif (regime \u003c 40)\n\t\t\t*set mastery +1\n\t\t\t*set regime %-20\n\t\t\t*set rlshp_ob %+10\n\t\t\t*goto lovethewayob\n\t\t*else\n\t\t\t*set regime %-15\n\t\t\t*set rlshp_ob %+5\n\n\t\t\t*label lovethewayob\n\n\t\t\t\"In the same way that we believe androids need to relinquish some control, we believe that humanity needs to acquire more control.\"\n\n\t\t\t*goto explainthemultin\n\t#\"I'd love to help you in your mission to develop android souls.\"\n\t\t*set multinariansympathizer true\n\t\t*if (getgoodside) or (manipulateinfo)\n\t\t\t*set mastery +2\n\t\t\t*set rlshp_ob %+25\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+25\n\t\t\t\t*goto obpleased\n\t\t\t*else\n\t\t\t\t*set ruthless %-25\n\t\t\t\t*goto obpleased\n\t\t*elseif (ruthless > 65)\n\t\t\t*set mastery +1\n\t\t\t*set rlshp_ob %+20\n\t\t\t*set ruthless %+20\n\t\t\t*goto obpleased\n\t\t*elseif (ruthless \u003c 35)\n\t\t\t*set mastery +1\n\t\t\t*set rlshp_ob %+20\n\t\t\t*set ruthless %-20\n\t\t\t*goto obpleased\n\t\t*else\n\t\t\t*set rlshp_ob %+15\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+15\n\t\t\t\t*goto obpleased\n\t\t\t*else\n\t\t\t\t*set ruthless %-15\n\t\t\t\t*label obpleased\n\n\t\t\t\t\"That is so wonderful to hear,\" OtherBoard says, bowing her head slightly in your direction. \"We truly need many more humans who think like you.\"\n\n\t\t\t\t*goto explainthemultin\n\n*label foreigneronceob\nYou quickly retract your Battlesuite visor once again to vomit, but as you lean over into your bucket, you are thankful to find it was just a false alarm. \n\nYou sit back up and raise your hand to reengage your Battlesuite visor, but before you can, OtherBoard and Multiplicity point at your face, growing eerily silent.\n\n\"What is it?\" you ask. \"Is there something on my face?\"\n\n\"Your mirror tattoo,\" OtherBoard says, pointing at your cheek. You had forgotten that even though your face is visible through your tinted Battlesuite visor, the reflective surface tends to obscure your mirror patch. How could these two possibly recognize your Priscan patch, though?\n\n\"OtherBoard, be careful,\" Multiplicity interrupts, sounding almost afraid. \"You know what could happen if we speak its name out loud.\"\n\n\"Surely this is worth the risk!\" OtherBoard says, scrambling to pull up a holo-display as she turns back to you. \"${name}, there is a great foreign visitor in our midst, one who is also trying to unite Binarians and Humans. This visitor has become a kind of Multinarian icon, at least to the two of us, anyway.\"\n\n*page_break\n\n\"What does that have to do with my mirror patch?\" you ask, feeling suddenly anxious.\n\n\"Here, look,\" OtherBoard answers as the image projected from her wrist finally stabilizes. \n\nLooking over at it knocks the breath out of you. Plainly displayed there is a Binarian Most Wanted poster, but that's not what's stunning. No, what really blows you away is the being pictured on the poster:\n\nDhanthik.\n\nThe Lost One. \n\nPrisca's legendary missing savior.\n\n*page_break\n\n\"You look like you've seen a ghost,\" OtherBoard says. \"I take it you know this being? Is it also from planet Prisca?\"\n\nYou hear these questions, but you find it difficult to form words in response. Dhanthik, the key to annihilating the Blot menace, Prisca's greatest hope for salvation, was on Binaria? How in all Fathers Below is that possible? Even Rosae seems astonished by the image projected before you. She whispers \"oh deary me\" at your side, words you know only you can hear.\n\nYou keep trying to decide where to begin—until the sound of explosions once again begins to rock the ship.\n\n\"No!\" OtherBoard suddenly screams. \"That shouldn't have—how did it know?!\"\n\nMultiplicity doesn't answer OtherBoard, but the terror that radiates off him is all the answer you need.\n\nSomething bad is coming.\n*goto taggorbattlechoice\n\n*label betrayob\n\nWithout hesitating, you run toward the ship's utility closet, where you somehow know twin hydro pistols are hidden—it must be some residual knowledge from your full OtherBoard absorb. You're surprised by how substantial each pistol feels—they may look like a child's toy, but you can tell they're more like a pressurized fire hose in pistol form.\n\nBefore OtherBoard or Multiplicity can react, you stand behind them with one hydro pistol pointed at each of their heads. \n\n\"${name}, what are you—\"\n\nYou don't wait for OtherBoard to finish speaking before you fire a concentrated water blast into Multiplicity's arm socket—you want to show these two that you mean business. \n\n*page_break\n\nThe pressurized beam of water penetrates Multiplicity's metal plating and shorts out his internal systems temporarily. As Multiplicity slumps forward, OtherBoard turns to you.\n\n\"Open a communication channel,\" you bark at OtherBoard. \"Now.\"\n\n\"I beg of you, please, you do not want to—\" OtherBoard tries to protest, until you point the second hydro pistol at Multiplicity. Understanding your meaning, OtherBoard complies. Within seconds, the Defensive's holo-head appears in front of you and OtherBoard. \n\n\"These two are planning to escape to The Forbidden Moon Multinaria,\" you immediately say. \"I will deliver them safely to your custody in return for amnesty. I'm not from this planet and have no interest in your war with the native Humms.\"\n\n\"Please hold for immediate boarding,\" the Defensive drones before it flies around toward the ship's entrance hatch.\n\n\"You will regret this decision,\" OtherBoard mutters. \"And Humm is a Binarian slur for humans, genius. A slur that would appear to describe you perfectly.\"\n\n*page_break Multiple Arrests Later\n\nYou sit in a cell beside Rosae, wondering if OtherBoard was right about this being a mistake. You expected the Defensive to comply with your wishes, but instead it forcefully arrested all of you and took you to the nearest detention center, where the three of you have been sitting in adjacent cells. \n\nThe most that has happened so far has been a Binarian Interrogator passing through, droning ominously about returning to question you soon. You managed to glean a holo-readout just before it disappeared, so at least you have some sense of what to expect when it returns:\n\n[b]NAME:[/b] Security Interrogator B-92\n*line_break\n[b]SPECIES:[/b] Binarian Android, Government Classification\n*line_break\n[b]HOME PLANET:[/b] Binaria\n*line_break\n[b]ABILITIES:[/b] Durability, Strength, Computing, Interfacing  \n*line_break\n[b]SECURITY INTERROGATOR ABILITIES:[/b] Interrogation Intuition, Lie Detection\n\nThe one upside of your jail time is that it has given you some time to decide what you hope to gain from this experience…\n\n*choice\n\t#I hope Rosae was right after all about MemoryTravel relating to the real world. Maybe I can learn something useful to help me survive my time on Versus.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto milesandmilesbetray\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto milesandmilesbetray\n\t#Maybe I can uncover clues about the type of beings Versus chooses for Selection—I'm very interested in how this seemingly spiritual system might operate galactically.\n\t\t*set growth +1\n\t\t*goto milesandmilesbetray\n\t#This will be a good chance to start learning how to build relationships with beings from different cultures, since I've never done that before today.\n\t\t*set growth +1\n\t\t*goto milesandmilesbetray\n\t#Learning about another planet might be a good chance to reinforce my unique Priscan perspective and talents.\n\t\t*set growth +1\n\t\t*goto milesandmilesbetray\n\n*label milesandmilesbetray\n\nRosae doesn't seem terribly pleased with your decision to betray OtherBoard; she's perched beside you in the cell with her wings crossed over her furry chest. You turn to her to say something, but she starts speaking before you can.\n\n*check_purchase extraworning\n*if not(choice_purchase_supported)\n\t\"Since you don't have any particularly pressing conversations to hold at the moment, I feel it is most prudent to ask you a question now.\"\n\n\tRosae chirps on, not waiting for you to offer any permission or interest.\n\n\t*goto endofiapwarningfrombetray\n\n\"Since you don't have any particularly pressing conversations to hold at the moment, there is one further service we WorningBirds provide. I feel it is most prudent to discuss now, given our current situation.\"\n\nRosae chirps on, not waiting for you to offer any permission or interest.\n\n*goto rosaeiapsequencefrombetray\n\n*label continuebetrayob\n\n*choice\n\t#Attempt to befriend the Interrogator when it returns, to learn as much as possible.\n\t\t*set ruthless %-10\n\t\t*set getgoodside true\n\t\t*goto interrogatetime\n\t#Manipulate the Interrogator when it returns, to get as much information as possible.\n\t\t*set ruthless %+10\n\t\t*set manipulateinfo true\n\t\t*goto interrogatetime\n\t#Try to understand the Binarian reason for opposing humanity.\n\t\t*set understandreb true\n\t\t*set regime %+10\n\t\t*goto interrogatetime\n\t#Attempt to learn about additional Binarian weaknesses, to be able to effectively combat them later.\n\t\t*set regime %-10\n\t\t*set binweakness true\n\t\t*goto interrogatetime\n\n*label interrogatetime\n\n\"Since you cannot be out in Binaria learning about it yourself, how would you like a little history lesson?\" Rosae offers, not necessarily hiding the contempt in her chirp. \"It will at least to give us something to do while we wait.\"\n\n\"That sounds like a great idea,\" you say, since you don't want to get off on the wrong foot with Rosae, given how long you've actually known her. \"Can we start with why OtherBoard and Multiplicity were trying to escape to the moon?\"\n\n\"To understand this, you must first understand what it means to be a Multinarian. And before that, you must learn the core of the Binarian android-Rutonian human conflict,\" Rosae begins. Already she looks more chipper, transitioning into historian mode. \n\n\"To summarize centuries of history, Rutonians were the first society in the galaxy to push the artificial intelligences within their advanced androids to sentience, the state where they could make decisions independent of their coding. The Rutonians called this having a soul, or whatever you believe gives a being free will.\"\n\n*goto rosaeshistorylesson\n\n*label routebacktobetrayal\n*page_break\n\nBefore Rosae can answer your question, however, a door to the cell block opens. The Interrogator rolls back inside, the bronze \"B\" on its faceplate glowing eerily. \n\n\"How do you possess readout capabilities?\" the Interrogator asks you, getting right down to business.\n\n\"I'm from the planet Prisca, and I have the power to absorb abilities from others,\" you explain. \"I just want to get a message home. I'm not interested in your war.\"\n\n\"I already told you, once you wake up everything you do here will be erased,\" Rosae sighs. \"That simply will never work.\"\n\nYou ignore Rosae, as does the Interrogator, which is strange—how does it not seem to notice the giant blue bird in the room?\n\n\"We do not make deals with Humms,\" the Interrogator drones. \"You are all the same, nothing more than organic machines with no idea how to control yourselves. Example: you turned these Multinarians in for selfish gain. You cannot help your nature, but we Binarians can.\"\n\n*page_break\n\nIgnoring this insult, you try to steer the conversation someplace more useful, hoping the Interrogator can pick up where Rosae left off. \"Wait, what is a Multinarian?\" \n\n\"Pause. Approved to provide a standard holo-informer,\" the Interrogator says, holding up its gleaming wrist. Once it does, a holographic menu of Binarian information appears. At the top is an informational blurb that appears to answer your question:\n\n[i]A Multinarian is a defective Binarian that believes in permanently implementing Solgrams. Multinarians always want to have Solgrams running, in order to live out a perverted simulation of humanity. These defective addicts attempt to flee to the Forbidden Moon Multinaria to shoot up Solgrams uninhibited by Binarian regulation. If there is anything worse than an unruly human, it's a Multinarian: a superior android that desires to be regressively human.[/i]\n\nReading this, you realize that you can't be sure if this is an accurate portrayal of Multinarians or simply Binarian propaganda. You suppose you might have learned for yourself if you had decided to spend your time on Binaria with OtherBoard….\n\n*if extraworning\n\t*page_break\n\tOnce you're done reading, the Interrogator lowers its wrist to deactivate the display. You figure that you should decide how best to respond to the Interrogator, but Rosae chimes in before you can.\n\n\t\"If you plan to engage in discussion,\" Rosae interjects, \"may I suggest that you respond in a manner consistent with your chosen goal? Either that, or along the lines of your inclination toward Regimes or Rebellions.\"\n\n\tProcessing Rosae's new advice, you try to decide how best to express your thoughts:\n\t*goto makethechoicecell\n*else\n\tOnce you're done reading, the Interrogator lowers its wrist to deactivate the display. You know your time here will be limited, so you decide that it would probably be best to engage the Interrogator in a discussion now, keeping in mind the goal you decided to focus on earlier.\n\t*goto makethechoicecell\n\n*label makethechoicecell\n\n*choice\n\t#\"How are the Binarian authorities handling the Multinarian threat? Are you afraid the Multinarian addicts will join the violent human rebellion?\"\n\t\t*set multiaddicts true\n\n\t\tAfter you finish asking your question, the Interrogator scrolls its eyebeams across your body, obviously initiating some kind of scan. Once it is done, it refocuses its eyes to meet yours.\n\n\t\t*if understandreb\n\t\t\t*set mastery +2\n\t\t\t*set regime %+25\n\t\t\t*set rlshp_ob %-5\n\n\t\t\t*label predictabinarian\n\n\t\t\t\"Your interest seems genuine, so I will offer you this insight before moving on with my primary task,\" the Interrogator says. \"The Binarians don't fear an alliance of Humms and Multinarians because we understand how personality and emotion is biologically coded. We can predict Humm and Multinarian behavior, even if they cannot themselves. Therefore we understand that neither is a true threat.\"\n\n\t\t\tAs the Interrogator finishes this insulting little speech, you figure that it's at least good to know that Binarians believe they can predict human behavior, for many reasons. Especially because a key strength in fighting a Binarian may be acting out of character, going against \"coded\" expectations.\n\t\t\t*goto foreigneronceinter\n\t\t*else\n\t\t\t*set regime %+15\n\t\t\t*set rlshp_ob %-15\n\n\t\t\t*label interregect\n\t\t\t\n\t\t\t\"Your interest seems disingenuous, threat level elevated,\" the Interrogator says. \"Moving on with primary task.\"\n\n\t\t\tThe Interrogator could tell your intentions didn't line up with your question, at least according to its android logic.\n\t\t\t*goto foreigneronceinter\n\t#\"Multinarians sound more like revolutionaries than addicts to me. Is that why they scare you so much?\"\n\t\t*set multinariansympathizer true\n\t\t\n\t\tAfter you finish asking your question, the Interrogator scrolls its eyebeams across your body, obviously initiating some kind of scan. Once it is done, it refocuses its eyes to meet yours.\n\n\t\t*if (binweakness) or (manipulateinfo)\n\t\t\t*set mastery +2\n\t\t\t*set regime %-25\n\t\t\t*set rlshp_ob %+10\n\t\t\t\n\t\t\t*goto predictabinarian\n\t\t*else\n\t\t\t*set regime %-15\n\t\t\t*set rlshp_ob %+5\n\t\t\t*goto interregect\n\t#\"I can see why you ordered Binarians hate humanity, or at least the volatile Rutonian humans. Not all of us are that devolved, however, so might I ask how I can be of assistance?\"\n\t\t*set antiandroid true\n\n\t\tAfter you finish asking your question, the Interrogator scrolls its eyebeams across your body, obviously initiating some kind of scan. Once it is done, it refocuses its eyes to meet yours.\n\n\t\t*if (getgoodside) or (manipulateinfo)\n\t\t\t*set mastery +2\n\t\t\t*set rlshp_ob %-10\n\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+25\n\t\t\t\t*goto intpleased\n\t\t\t*else\n\t\t\t\t*set ruthless %-25\n\t\t\t\t*label intpleased\n\n\t\t\t\t\"Your interest seems genuine, so I will offer you this insight before moving on with my primary task,\" the Interrogator says. \"Understand that the Binarians don't need your help, or anyone else's, because we understand how personality and emotion is biologically coded. We can predict Humm and Multinarian behavior, even if they cannot themselves. Therefore we understand that neither is a true threat.\"\n\n\t\t\t\tAs the Interrogator finishes this insulting little speech, you figure that it's at least good to know that Binarians believe they can predict human behavior, for many reasons. Especially because a key strength in fighting a Binarian may be acting out of character, going against \"coded\" expectations.\n\t\t\t\t*goto foreigneronceinter\n\t\t*else\n\t\t\t*set rlshp_ob %-15\n\t\t\t*if (ruthless > 50)\n\t\t\t\t*set ruthless %+15\n\t\t\t\t*goto interregect\n\t\t\t*else\n\t\t\t\t*set ruthless %-15\n\t\t\t\t*goto interregect\n\n*label foreigneronceinter\n*page_break\n\n\"Scan Complete. Updated threat protocols,\" the Interrogator drones. \"Potential ties to the most wanted criminal, who once tried to unite Multinarians and Humms. Do you know this criminal?\"\n\nThe Interregator pulls up a holo-image and plainly displayed there is a Binarian Most Wanted poster. You think this is a rather odd turn for this \"conversation\" to take, but that's not what's most stunning here.\n\nNo, what really blows you away is the being pictured on the poster:\n\nDhanthik.\n\nThe Lost One.\n\nPrisca's legendary missing savior.\n\n*page_break\n\n\"I take it you know this being?\" the Interrogator says.\n\nYou hear the question, but you're finding it difficult to form words. Dhanthik, the key to annihilating the Blot menace, and Prisca's greatest hope for salvation, was on Binaria? How in all Fathers Below is that possible? Even Rosae seems astonished by the image projected before you. She whispers \"oh deary me\" at your side, words you know only you can hear.\n\nYou're still trying to decide where to begin when the sound of explosions begins to rock the detainment center. Before you can even move, a blast of green acid shoots through the room and sprays a hole directly through the Interrogator's chest. You and Rosae barely have time to jump out of the way as the acid splashes through the cell bars.\n\nYour stomach drops in horror at the sight of the corroded Binarian, but what you see next is even more horrifying.\n*goto taggorbattlechoice\n\n*label taggorbattlechoice\n*page_break\n\nYour mind can't quite place it, even as it materializes into the space behind you.\n\nYou see its rusted metal joints first, pieced together under globs of hanging flesh that's putrid and oily. Blue interior lights shine through a human face, one that appears to have been sliced off and stretched over a metal skull. Sparse black tendrils of hair hang from the rotting scalp, falling all the way to the thing's waist, which is covered with loose denim jeans.\n\n\"What is that?\" you try to shout, but you find that your voice fails you. Fear grips you instead—a deep, primal fear at seeing something so warped, so…unnatural.\n\nNo one answers your cry anyway, save for another readout: \n\n[b]NAME:[/b] Bominate\n*line_break\n[b]SPECIES:[/b] Binarian Android / Rutonian Human Hybrid\n*line_break\n[b]HOME PLANET:[/b] Unknown; thought to be artificially built, maker unknown\n*line_break\n[b]ABILITIES:[/b] Acid-Cannons (waste byproduct removal), Retractable Blades, Invincibility, Regeneration, Speed, Strength, Recharagable Teleportation Capabilities\n\n*page_break\n\nWhatever this Bominate thing is, everyone seems even more terrified of it than you are. Except that the Bominate doesn't seem to notice anyone but you, as far as you can tell. \n\nThis thought is validated when the Bominate points the barrel of its cannon directly at your face.\n\n*if extraworning\n\t\"Use OtherBoard's absorbed abilities according to your proficiency with weapons or natural abilities!\" Rosae chirps madly. \"And do it now!\"\n\n\t*goto respondtobom\n*else\n\tYou know you'll have just a second to react, a second best spent accessing OtherBoard's borrowed skills.\n\t*goto respondtobom \n\n*label respondtobom\nThe only problem is that you've never tested OtherBoard's offensive abilities, aside from the readouts and stats. You're not exactly sure what she's capable of, but you're about to find out.\n\n*choice\n\t#Use my increased tech expertise to commandeer any nearby weapons.\n\t\t*set weapons %+25\n\t\t*set techbomthree true\n\n\t\tYou already know that you possess upgraded proficiency when it comes to technology, but you're surprised to find that, as you make this mental decision, that you suddenly become aware of the technology around you. It's like a mental map suddenly appears, with little lights calling out to you.\n\n\t\t*if fighthumm \n\t\t\tScanning the mess hall, you spot a set of hydro pistols illuminated on the wall next to the TV monitor and immediately leap toward them. \n\t\t\t*goto usewaterweapon\n\t\t*elseif helpob\n\t\t\tScanning the inside of the ship, you see that a set of hydro pistols rests underneath the console dashboard. Pushing OtherBoard aside, you tumble forward and grab the pistols.\n\t\t\t*goto usewaterweapon\n\t\t*else\n\t\t\tScanning the detainment center, you notice the hydro pistols that the Binarian Defensive confiscated from you are in a deactivated containment pouch on the Interrogator's hip. Leaping toward the downed Interrogator, you scoop up the hydro pistols.\n\n\t\t\t*label usewaterweapon\n\n\t\t\tIt's a good thing you do, because a streaking blast of putrid acid corrodes through the spot you just left vacant. Without wasting another second, you point both hydro pistols at the Bominate, knowing you'll have to make these limited shots count.\n\n\t\t\tThe pistols slam pressure into your palms as you pull the triggers, firing concentrated streams of water at the Bominate's skull. Some globs of rotten face-skin fly off from the force of the watershot, but the rest of it splashes against the Bominate's metal skull like harmless drops of rain.\n\n\t\t\t*page_break\n\n\t\t\tYour chest fills with dread, but you force yourself to focus instead on the pistols, which you realize are actually on their lowest pressure setting. Feeling a mix of relief and adrenaline spill through your body, you drop one pistol and search for the pressure setting on the sleek side of the second one.\n\n\t\t\t*if (weapons > 60)\n\t\t\t\t*set tech +3\n\n\t\t\t\tYour finger finds the switch instantly, almost acting on its own, and you increase the pistol's pressure to its maximum setting.\n\n\t\t\t\tThen, just in time to see another acid surge build in the Bominate's cannon, you grip the pistol with both hands and fire.\n\n\t\t\t\tThe new, doubly wide watershot slams into the Bominate's chestplate with a gurgling clang. It does not succeed in shooting clean through the armor as you had hoped, but the force of the blast does knock the Bominate back against the wall.\n\n\t\t\t\t*page_break\n\n\t\t\t\tAs the Bominate's metal back crunches into the wall, you notice that your watershot has created a small rivet in its chestplate, exposing the end of some internal wire. As you realign your aim, you are distracted as a new readout appears in your peripheral vision.\n\t\t\t\t*goto successbom\n\t\t\t*else\n\t\t\t\t*set tech +1\n\t\t\t\t*set life -1\n\n\t\t\t\tYour finger searches frantically for the switch, but doesn't know where to find it. Apparently you're not as proficient with weapons as you might—\n\t\t\t\t*goto failbom\n\t#Use my increased strength to attack the Bominate directly.\n\t\t*set weapons %-25\n\t\t*set strongbomthree true\n\n\t\tYou haven't been able to test it yet, but ever since your full absorb from OtherBoard, your muscles have seemed to flex with a bit more strength. Whatever metallic enhancements Binarians possess must have transferred over to you.\n\n\t\tOr at least you hope so, as you charge at the Bominate with clenched fists. It's a good thing you do, because a streaking blast of putrid acid corrodes through the spot you just left vacant. The Bominate fires off another stream of acid, and you roll under this one to get close enough to strike.\n\n\t\tYou swing back and line up your best punch, intending to hit the Bominate square in the eye. But the Bominate is faster than you expect, and your fist smashes into its chestplate instead.\n\t\t\n\t\t*if (weapons \u003c 40)\n\t\t\t*set strength +3\n\n\t\t\tStill, you feel the metal crunch underneath the power of your fist and watch as the Bominate is sent careening into the nearest wall.\n\n\t\t\t[i]That didn't even hurt,[/i] you think, as you follow through on your punch. Just how blerging strong are you?\n\n\t\t\t*page_break\n\n\t\t\tAs the Bominate's metal back crunches into the wall, you notice that your punch has created a small rivet in its chestplate, exposing the end of some internal wire. As you wind up to strike again, you are distracted as a new readout appears in your peripheral vision.\n\t\t\t*goto successbom\n\t\t*else\n\t\t\t*set strength +1\n\t\t\t*set life -1\n\n\t\t\tYour fist doesn't break on impact, luckily, but it also doesn't even dent the Bominate. It looks like you may not be as strong as—\n\t\t\t*goto failbom\n\t#Use my borrowed electrical energy to charge-blast the Bominate.\n\t\t*set weapons %-25\n\t\t*set blastbomthree true\n\n\t\tYou can suddenly feel a well of electrical energy in your gut, almost like you're running on some kind of supercharged battery.\n\n\t\tYou've never done anything like this before, so you try to shut off your brain and allow your instincts to take over. You raise your arms, feeling all of your hairs stand on end as an electric current pulses across your skin.\n\n\t\tIt feels satisfying at first, until a bolt of white-hot pain sears its way across your chest, like lightning striking inside of you.\n\n\t\tYou scream from the pain, just as an electrical charge crackles and erupts from your fists, streaking out at the Bominate.\n\n\t\t*page_break\n\n\t\t*if (weapons \u003c 40)\n\t\t\t*set energy +3\n\n\t\t\tThe electricity envelops the Bominate's entire body, but the brunt of the bolt strikes into the Bominate's chestplate. The force of the blast knocks the Bominate back toward the wall. \n\n\t\t\tThat scream left your throat feeling hoarse, and your arms feel like they may have been lit on fire. Despite the pain, you still feel incredible…\n\n\t\t\t…you just fried a deadly robot-monster with a pure blast of electricity.\n\n\t\t\tHow blerging cool is that?\n\n\t\t\t*page_break\n\n\t\t\tAs the Bominate's metal back crunches into the wall, you notice that your blast has created a small rivet in its chestplate, exposing the sparking end of some internal wire. As you realign your aim, you are distracted as a new readout appears in your peripheral vision.\n\t\t\t*goto successbom\n\t\t*else\n\t\t\t*set energy +1\n\t\t\t*set life -1\n\n\t\t\tThe electicity envelops the Bominate's entire body and you can't help but feel completely badass: you just fried a deadly robot-monster with a pure blast of electricity. How blerging cool is that?\n\n\t\t\tThis sentiment quickly fades, however, as you realize that your electric charge didn't even faze the Bominate. You're going to need to figure out how to generate a stronger—\n\t\t\t*goto failbom\n\n*label successbom\n*set bominatethreeclue true\n*achieve bominatethreeclueac \n\n[b]NEW INFORMATION LEAK INTERCEPTED[/b]\n*line_break\n[i]The Bominate is programmed to detect any mention of the Mirrored Stranger attempting to foster peace between Binarians and Rutonians and to kill everything at the contact location before teleporting out.[/i]\n\nYour brain is barely able to register this information, however, as you now see the metal plate on the Bominate's chest suddenly liquefying in the spot where your blow hit. You watch as the liquid metal reshapes the dent and re-rounds the hard metal surface.\n\nBlerg.\n*goto endchapterfight\n\n*label failbom\n\nThis thought is interrupted as another surge of acid bubbles and fizzes forth from the Bominate's cannon. You're fast enough to drop underneath the acid blast, which forces you to roll sideways. \n\nYou tumble back onto your feet, but you're too late to realize that this is exactly what the Bominate expected you to do.\n*goto endchapterfight\n\n*label endchapterfight\n*page_break\n\nBefore you can form another thought, a blur flashes and suddenly the Bominate is directly in front of you. It slides a long, rusty blade out of the underside of its wrist with a sickening squish, then slashes your arm. \n\nWithin the same fluid movement, the Bominate slams its other hand around your neck, causing you to sputter and choke and lose your breath. You feel the Bominate's cold metal grip closing around your throat and realize that this thing is going to kill you right now—and it will have done so within a span of three seconds.\n\nYou never even stood a chance.\n\n*page_break\n\nYour eyes open as you choke out a gasp, reaching your hands up to your neck to find…\n\n…nothing.\n\nIt takes a few seconds for you to see that you're back in OtherBoard's campsite on Versus. Once you do, the panic starts to fizzle out of your veins in mad hisses and pops. You have no idea if you had any control over waking up when you did, but you're certainly thankful to be awake now.\n\nYou turn to OtherBoard and find that, unfortunately, she still stands dormant in the corner. You want to question her now more than ever, because what you just learned changes everything.\n\nDhanthik was on Binaria. \n\nAs this realization settles in, it floods a whole new set of thoughts into your mind:\n\n*choice\n\t*if (dtconflicted) #I was right to believe there was more to Dhanthik's story. All I want to do now is keep learning more about that story.\n\t\t*achieve beliefsevolving\n\t\t*set growth +2\n\t\t*goto despitedoubts\n\t*if (dtnonbeliever) #Dhanthik is real—I was wrong to doubt Hir existence. Now I can't help but wonder what else I've been wrong to doubt….\n\t\t*achieve beliefsevolving\n\t\t*set growth +2\n\t\t*goto despitedoubts\n\t#Fostering peace or not, why the blerg isn't Dhanthik back on Prisca ending the Black Blot War? How and why did Ze get across the entire galaxy on Hir own? Seeing Dhanthik like this only multiplies my doubts.\n\t\t*if dtnonbeliever\n\t\t\t*achieve beliefsholding\n\t\t\t*set growth +1\n\t\t\t*goto despitedoubts\n\t\t*else\n\t\t\t*achieve beliefsevolving\n\t\t\t*set growth +2\n\t\t\t*goto despitedoubts\n\t*if (dttruebeliever) #As comforting as it is to know that my belief in Dhanthik is validated, it's equally discomforting to realize Ze might have abandoned Prisca for other pursuits. Was I wrong to believe in Dhanthik's simplicity so purely? \n\t\tNow you can't help but wonder what else you've been wrong to blindly accept….\n\t\t*achieve beliefsevolving\n\t\t*set growth +2\n\t\t*goto despitedoubts\n\t#I trust that Dhanthik must know more about the galaxy and its ways than I do. Ze must have a good reason for leaving Prisca.\n\t\t*if dttruebeliever\n\t\t\t*achieve beliefsholding\n\t\t\t*set growth +1\n\t\t\t*goto despitedoubts\n\t\t*else\n\t\t\t*achieve beliefsevolving\n\t\t\t*set growth +2\n\t\t\t*goto despitedoubts\n\t#Dhanthik still bears a mirror patch, which means that, whatever else I believe, Ze must still feel connected to Prisca, somehow.\n\t\t*if dttruebeliever\n\t\t\t*achieve beliefsholding\n\t\t\t*set growth +1\n\t\t\t*goto despitedoubts\n\t\t*else\n\t\t\t*achieve beliefsevolving\n\t\t\t*set growth +2\n\t\t\t*goto despitedoubts\n\n*label despitedoubts\n\nYou can already tell it's going to take you a very long time, longer than this rapidly concluding night, to unpack the fact that Prisca's most important cultural figure is at large out in the galaxy. \n*if bominatethreeclue\n\tAnd to understand why that Bominate monstrosity is programmed to target Dhanthik and Hir supposed peace efforts. Is it trying to keep the Rutonian-Binarian war raging for some reason?\n\n\t*goto heartmerc\n*else\n\t*goto heartmerc\n\n*label heartmerc\nYour heart continues to pound mercilessly in your chest, but you ignore it, because only one thing matters.\n\nYou need to find out everything you can about why Dhanthik was on Binaria and where Ze is now.\n\nWhether that means talking to OtherBoard when she finally reboots, or returning to Binaria in MemoryTravel tomorrow night, you're going to do whatever it takes to learn the truth. Rosae was certainly right about MemoryTravel drawing you to relevant experiences—you can't imagine anything more relevant than this.\n\nAs this thought crystallizes, you suddenly feel flooded with a sense of purpose. Between encountering Empress Vaccus and finding this clue about Dhanthik, it feels like there might actually be some reason you were called to Versus, and if not a reason, then at least a set of goals to reach for.\n\nGoals that could mean the salvation of your entire planet.\n\nRealizing this, you hope that it might somehow make up for your disappearance from Prisca at that pivotal battle moment.\n\n*page_break\n\nStill, you're going to need time to achieve these goals, so you'll have to figure out how to survive on Versus. Which means that your meeting with Lady Venuma just became a top priority.\n\nAs the light in the camp creeps into a surreal predawn hue, you settle back into the cot and take a deep breath. So many thoughts compete for attention in your mind, about Versus and Binaria and Prisca, about OtherBoard and Dhanthik and Empress Vaccus and Rosae. You realize that what you need now is some time to untangle everything. \n\nSo before you do anything else, you decide it's time to do what Priscans do best: \n\nReflect.\n\n*if (mastery = 5)\n\t*achieve masteryspurt\n\t*goto endofchapterthree\n*else\n\t*goto endofchapterthree\n\n*label endofchapterthree\n\n*finish\n*label end_trial\n*temp discount_ends \"Aug 28\"\n*temp time_stamp timestamp(\"${discount_ends}, 2015\")\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2022-07-21 $4.99 $2.99 purchased\n*abort\n", "v_two": "*comment é\n\n*image chap_2.png\n\n*image e_chap2.png\n\n${blank}\n\n*page_break\n\nYou make your way back toward the edge of the forest, still adjusting to the computerized feeling in your mind. You've been trying to gain access to more of OtherBoard's stored data, but you can't seem to figure out how to bring it up. You thought you could just find information by thinking about it, the way memory works, but that doesn't seem to be the case here.\n\nYou know that Priscan minds are built to keep absorbed knowledge at bay, so as not to completely overwhelm and overwrite your own psyche. However, if you had to guess, this feels more like an android safeguard than a Priscan one.\n\nYou wish you hadn't shorted OtherBoard out during your full absorb, otherwise you could just ask her how to access the information you need. \n*if (rlshp_ob \u003c 50)\n\tAssuming she'd even be willing to help you, after what happened.\n\t*goto takenotehrstep\n*else\n\t*goto takenotehrstep\n\n*label takenotehrstep\n\nYou've decided to head back toward that grassy landing strip to see if anyone is still there, but you don't really have much of a plan beyond that. You take another step forward and freeze as a small animal darts in front off you, though not because of the animal—you freeze because another one of those holo-readouts suddenly appears: \n\n[b]SPECIES:[/b] Squirlfrend\n*line_break\n[b]HOME PLANET:[/b] Versus\n*line_break\n[b]ABILITIES:[/b] Speed, Claws, Climbing, Heightened Vision\n\n*page_break\n\n[i]Huh,[/i] you think, as the readout fades. Does this mean that if you focus on something happening in front of you, you can access any information stored in OtherBoard's databanks? If that turns out to be the case, these readouts could come in very handy as you explore Versus.\n\nLost in thought as you continue moving, you catch your foot on a drooping branch and fall forward with a thud. You tell yourself to pay closer attention as you lift yourself back up, feeling clumsy. That is, until another holo-readout appears: \n\n[i]NO INJURY[/i]\n\n[b]LIFE:[/b] ${life}\n*line_break\n[b]MAX LIFE:[/b] 10\n*line_break\n[b]FULLY HEALED:[/b] \n*if (life = 7)\n\t3 Days\n\t*goto youreadout\n*elseif (life = 8)\n\t2 Days\n\t*goto youreadout\n*else\n\t1 Day\n\t*goto youreadout\n\n*label youreadout\n\n[i]Well that's certainly useful,[/i] you think—this readout is even more detailed than the Life meter on your Battlesuite visor. You scan to the bottom of the holo-readout and notice a page bar, so you attempt to mentally manipulate it. As the page scrolls down, you realize that you actually do have some control over these readouts.\n\n[b]NAME:[/b] ${name} Thomil\n*line_break\n[b]SPECIES:[/b] Enhanced Human / Priscan Humanoid\n*line_break\n[b]HOME PLANET:[/b] Prisca\n*line_break\n[b]GENDER:[/b]\n\n*choice\n\t#I'm male.\n\t\t*label malereadout\n\t\t[b]NAME:[/b] ${name} Thomil\n\t\t*line_break\n\t\t[b]SPECIES:[/b] Enhanced Human / Priscan Humanoid\n\t\t*line_break\n\t\t[b]HOME PLANET:[/b] Prisca\n\t\t*line_break\n\t\t[b]GENDER:[/b] Male\n\t\t*goto boardingtime\n\t#I'm female.\n\t\t*set male false\n\t\t*set female true\n\t\t*set youze \"she\"\n\t\t*set youhir \"her\"\n\t\t*set youhis \"her\"\n\n\t\t*label femalereadout\n\t\t[b]NAME:[/b] ${name} Thomil\n\t\t*line_break\n\t\t[b]SPECIES:[/b] Enhanced Human / Priscan Humanoid\n\t\t*line_break\n\t\t[b]HOME PLANET:[/b] Prisca\n\t\t*line_break\n\t\t[b]GENDER:[/b] Female\n\t\t*goto boardingtime\n\t#I was assigned as male at birth, but am truly female.\n\t\t*set male false\n\t\t*set female true\n\t\t*set mtf true\n\t\t*set youze \"she\"\n\t\t*set youhir \"her\"\n\t\t*set youhis \"her\"\n\n\t\tYou've already undergone all the procedures necessary to become the woman you were always meant to be. You've come across Impure Black Market texts about other cultures where such gender confirmations are considered taboo or even sacrilegious, but in a society where everyone can quite literally share their thoughts and experiences, it's fairly impossible not to accept others once you understand who they truly are.\n\n\t\tBesides, about one in two hundred Priscan children are born with mismatched sexes and genders, so confirmation techniques were perfected long ago. \n\t\t\n\t\t*page_break\n\t\t*goto femalereadout\n\t#I was assigned as female at birth, but am truly male.\n\t\t*set ftm true\n\n\t\tYou've already undergone all the procedures necessary to become the man you were always meant to be. You've come across Impure Black Market texts about other cultures where such gender confirmations are considered taboo or even sacrilegious, but in a society where everyone can quite literally share their thoughts and experiences, it's fairly impossible not to accept others once you understand who they truly are.\n\n\t\tBesides, about one in two hundred Priscan children are born with mismatched sexes and genders, so confirmation techniques were perfected long ago. \n\t\t\n\t\t*page_break\n\t\t*goto malereadout\n\t#I was born with intersex characteristics.\n\t\t*set intersex true\n\n\t\tYou've come across Impure Black Market texts about other cultures where the broad spectrum of intersex identities is considered taboo or even sacrilegious, but in a society where everyone can quite literally share their thoughts and experiences, it's fairly impossible not to accept others once you understand who they truly are.\n\n\t\tBesides, about one in fifty Priscan children are born with intersex characteristics, so Priscans are comfortable with all kinds of identities. \n\n\t\tPersonally, you consider your identity to be:\n\n\t\t*choice\n\t\t\t#Male.\n\t\t\t\t*goto malereadout\n\t\t\t#Female.\n\t\t\t\t*set male false\n\t\t\t\t*set female true\n\t\t\t\t*set youze \"she\"\n\t\t\t\t*set youhir \"her\"\n\t\t\t\t*set youhis \"her\"\n\t\t\t\t*goto femalereadout\n\t\t\t#I don't subscribe to any gender categories.\n\t\t\t\t*set male false\n\t\t\t\t*set genderneutral true\n\t\t\t\t*goto genderneutralreadout\n\t#I don't subscribe to any gender categories.\n\t\t*set male false\n\t\t*set genderneutral true\n\n\t\tYou are both genders, but you are also neither gender. You believe gender defies categorization, operating on a kind of sliding scale—one that can change every day. \n\n\t\tYou've come across Impure Black Market texts about other cultures where such thinking is considered taboo or even sacrilegious, but in a society where everyone can quite literally share their thoughts and experiences, it's fairly impossible not to accept others once you understand who they truly are.\n\n\t\tBesides, even the most staunchly \"male\" or \"female\" cisgenders admit that sometimes they feel more \"masculine\" or \"feminine\" at different times. You just take that kind of thinking to a whole new level.  \n\n\t\t*label genderneutralreadout\n\n\t\tYou've also chosen to identify with the pronouns:\n\n\t\t*choice\n\t\t\t#Ze & Hir.\n\t\t\t\t*set youze \"ze\"\n\t\t\t\t*set youhir \"hir\"\n\t\t\t\t*set youhis \"hir\"\n\t\t\t\t*goto genderneutralreadoutreal\n\t\t\t#They, Them & Their.\n\t\t\t\t*set youze \"they\"\n\t\t\t\t*set youhir \"them\"\n\t\t\t\t*set youhis \"their\"\n\t\t\t\t*goto genderneutralreadoutreal\n\t\t\t#Zhe, Zhim & Zhir.\n\t\t\t\t*set youze \"zhe\"\n\t\t\t\t*set youhir \"zhim\"\n\t\t\t\t*set youhis \"zhir\"\n\t\t\t\t*goto genderneutralreadoutreal\n\t\t\t#I'd like to input my own pronouns.\n\t\t\t\tInstead of he, she, or they, I prefer:\n\n\t\t\t\t*input_text youze\n\n\t\t\t\tInstead of him, her, or them, I prefer:\n\n\t\t\t\t*input_text youhir\n\n\t\t\t\tInstead of his, her, or their, I prefer:\n\n\t\t\t\t*input_text youhis\n\t\t\t\t*goto genderneutralreadoutreal\n\t\t\n*label genderneutralreadoutreal\n\n[b]NAME:[/b] ${name} Thomil\n*line_break\n[b]SPECIES:[/b] Enhanced Human / Priscan Humanoid\n*line_break\n[b]HOME PLANET:[/b] Prisca\n*line_break\n[b]GENDER:[/b] Not Applicable\n*goto boardingtime \n\n*label boardingtime\n*line_break\n[b]ABILITIES:[/b] Absorption of Memories and Abilities \n*line_break\n[b]ABILITY LEVEL:[/b] Low\n*line_break\n[b]ADDENDUM:[/b]\n*line_break\n[i]Energy Absorption:[/i] ${energy}\n*line_break\n[i]Strength Absorption:[/i] ${strength}\n*line_break\n[i]Technical Skill Absorption:[/i] ${tech}\n*line_break\n[i]Command Absorption:[/i] ${command}\n*line_break\n[i]Agility Absorption:[/i] ${agile}\n\nIt looks like your absorption powers can be broken down into categories—you've never thought of it that way. Obviously absorbing OtherBoard's abilities has boosted your Technical Skill most, along with Energy and Strength, but what does that mean? Does this point system somehow represent your absorption range and control? \n\nAlso, what does the readout mean by \"Low Ability Level?\" Could your absorption powers be stronger, somehow? You never did get to test your powers properly on Prisca, with everything being so homogenous there….\n\n*page_break\n\n[i]These are just more questions for another time,[/i] you decide, as you step over a final series of swooping branches at the forest's edge. Sunlight hits your face as you walk back into the grassy clearing, causing the beads of sweat already on your forehead to drip down your temples.\n\nYou survey the strip to find that there's no sign of any of the alien strangers you encountered earlier. Instead, you focus on the empty strip to see if it will generate another holo-readout.\n\n[b]Versus Arrival Runway:[/b] New inhabitants arrive here every cycle\n\nYou already figured that this was some kind of teleportation runway, though this readout confirms that all the strangers you arrived with were also \"Newcomers,\" as OtherBoard called you. By your count there were seven of you, including Empress Vaccus. Though you suppose the real question is: how many more beings are already here on Versus?\n\nWiping this thought away along with the sweat on your brow, you figure that before you keep moving or piling up any more questions, you need to decide what's most important to you. Settling on a goal may help you decide where to head next, and who knows, maybe it will even trigger some kind of useful holo-readout. Not to mention that it would be comforting to have some semblance of control over one small part of this bizarre experience…\n\n*choice\n\t#I should focus on gathering weapons to fight Empress Vaccus, so I can ensure the safety of everyone back home.\n\t\t*set weapons %+5\n\t\t*set rlshp_family %+15\n\n\t\tAs soon as you make up your mind, another readout appears:\n\n\t\t[b]FAMILY RELATIONSHIP BOOSTED[/b]\n\t\t*line_break\n\t\t[b]WEAPONS BOOSTED[/b]\n\t\t*goto makeupmind\n\t#I need to find a way back home, or at least a way to contact home.\n\t\t*set weapons %-5\n\t\t*set rlshp_family %+15\n\n\t\tYou already know your connection to the Priscan Collective Consciousness has been severed, thanks to the empty buzz in the back of your skull. Since uploading any messages there won't work, you'll need to find some other way to reach home.\n\n\t\tThis thought is interrupted, however, as a new readout appears: \n\n\t\t[b]FAMILY RELATIONSHIP BOOSTED[/b]\n\t\t*line_break\n\t\t[b]ABILITIES BOOSTED[/b]\n\t\t*goto makeupmind\n\t#I want to take the opportunity to explore this new world alone, without informing anyone.\n\t\t*set solo %+5\n\t\t*set rlshp_family %-15\n\n\t\tAs soon as you make up your mind, another readout appears:\n\n\t\t[b]FAMILY RELATIONSHIP DECREASED[/b]\n\t\t*line_break\n\t\t[b]SOLO BOOSTED[/b]\n\t\t*goto makeupmind\n\t#I should find other inhabitants to learn more about Versus.\n\t\t*set solo %-5\n\t\t*set rlshp_family %-15\n\n\t\tAs soon as you make up your mind, another readout appears:\n\n\t\t[b]FAMILY RELATIONSHIP DECREASED[/b]\n\t\t*line_break\n\t\t[b]TEAM BOOSTED[/b]\n\t\t*goto makeupmind\n\n*label makeupmind\n\nIt's been said that the decisions you make define who you are, but it would appear that OtherBoard's android operating system believes this quite literally. It's certainly a fascinating insight into how an android mind might categorize human behavior and instincts, applying statistical trends to your decision-making. Perhaps this is somehow related to how an artificial intelligence like OtherBoard can simulate a personality….\n\nAs interesting as these considerations may be, y
