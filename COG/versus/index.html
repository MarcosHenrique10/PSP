*else\n\t\t\t*set solo %-25\n\t\t\t*goto obcampreturn\n\t#Warn Oli to show that I care, but don't put myself at risk by stepping up.\n\t\t*set rlshp_oli %+15\t\n\n\t\t\"Behind you,\" you shout, prompting Oli to take a few calm steps down toward you. \n\n\t\t\"Thanks,\" Oli says, seemingly unaffected by ${olihis} impending watery doom. \"Listen, I'm going to do my best to keep your name on all the right lists here on Versus. In the meantime, you've got work to do.\"\n\t\t*if (solo > 50)\n\t\t\t*set solo %+25\n\t\t\t*goto obcampreturn\n\t\t*else\n\t\t\t*set solo %-25\n\t\t\t*goto obcampreturn\n\t#Let Oli go into the waterfall—this is ${olihis} brainplane world, after all.\n\t\t*set solo %+25\n\n\t\tJust before ${olihis} step churns into the gushing wall of water, Oli takes a few calm steps down toward you.\n\n\t\t*if (solo > 60)\n\t\t\t*set rlshp_oli %+10\n\t\t\t*set mastery +1\n\n\t\t\t*label goodkeepworry\n\n\t\t\t\"That's good, keep worrying about yourself,\" Oli says, seemingly unaffected by ${olihis} impending watery doom. \"Your mission is too important for anything else.\"\n\t\t\t*goto obcampreturn\n\t\t*else\n\t\t\t*set rlshp_oli %-30\n\n\t\t\t\"No warning?\" Oli says, looking disappointed. \"I don't need your help to stay alive, but you're going to need friends if you hope to survive. Your mission is too important for you to die on me.\"\n\t\t\t*goto obcampreturn\n\n*label obcampreturn\n\nThen, just as you and Oli are about to be swallowed into the thundering waterfall, Oli \n*if (rlshp_oli > 65)\n\t*achieve olifinalhigh\n\tgives you one last meaningful look, full of purpose. And something more, something… \n\n\t…charged.\n\t*goto therealreturn\n*elseif (rlshp_oli > 35)\n\t*achieve olifinalmid\n\tgives you one last meaningful look, to make sure you know that ${olize} is counting on you.\n\n\tThat really, everyone is counting on you.\n\t*goto therealreturn\n*else\n\t*achieve olifinallow\n\tshakes ${olihis} head, as if to say, [i]the fate of the galaxy depends on this one?[/i]\n\n\t[i]We're screwed.[/i]\n\t*goto therealreturn\n\n*label therealreturn\n*page_break\n\nYou blink and suddenly you're back in OtherBoard's camp, where you find Nards gnawing viciously on one of your combat boots. You shake Nards off, along with the haze in your mind, and force yourself to come to grips with the reality of returning to OtherBoard's camp. Blerg, perhaps you are getting better at all this world-hopping…\n\nLooking back over at OtherBoard, you see that she is now 90% rebooted. That's good: you can talk to her soon to corroborate Oli's story, but it also gives you a few minutes to process everything you've just learned about Dhanthik.\n\nPushing aside the emotions you feel thinking about Oli, you try to figure out how ${olize} could possibly know what ${olize} does. Oli seems so distinctly Priscan, yet ${olize} is unlike any Priscan you've ever met. The only explanation you can come up with that makes any sense is that Dhanthik, Prisca's Great Lost One, must represent greater galactic importance than any Priscan had ever imagined. After your Binarian experience and Oli's brief words, you're convinced of that much.\n\nIf Dhanthik is traveling the galaxy in search of a perfect army to fight some grander Blot threat, though, what chance does Prisca stand in the meantime? \n\nYou can't let yourself go down that road, however, because this only means that finding Dhanthik has just become that much more crucial. \n\n*page_break\n\nYou consider Dhanthik, or Dhanial, or D'han T'hik, and think that there's some greater cosmic consonance at play here. Blerg, given Dhanthik's ability to transform Hir appearance, there's a chance that Hir mirror patch was some kind of personal choice, that it doesn't make Hir truly Priscan at all—especially since Oli seems to have an equally ambiguous mirror patch.\n\nYou thought you hated not knowing things before, back when you lived on Prisca, but ever since arriving on Versus, you're starting to see just how little you truly did know about the galaxy—and how much you hate feeling in the dark. \n\nThough you know there's only one way out of the dark, now—and that's forward. The task you face is far too important for you to doubt yourself. The fate of worlds may depend upon it, from what you've seen and heard. Certainly the fate of your own world and your family, at the very least. \n\nAll that really matters is that you've been given a clear mission: You have to MemoryTravel everyone on Versus, one by one, until you discover and awaken the true Dhanthik.\n\nAs this thought crystallizes into focus, you can't help but wonder: could this somehow be the reason you've been called to Versus?\n\n*choice\n\t#Yes, I must have been Selected for a reason—and this must be the reason.\n\t\t*set growth +1\n\t\t*if versusquest\n\t\t\t*achieve steadfastquest\n\t\t\t*goto feelcontrol\n\t\t*else\n\t\t\t*achieve purposevolve\n\t\t\t*goto feelcontrol\n\t#No, I truly believe it's random that I'm here on Versus. What I do here only has a purpose if I choose to assign it purpose.\n\t\t*set growth +1\n\t\t*if versusrandom\n\t\t\t*achieve steadfastquest\n\t\t\t*goto feelcontrol\n\t\t*else\n\t\t\t*achieve purposevolve\n\t\t\t*goto feelcontrol\n\t#Purpose doesn't matter, as long as I do the right thing and focus on fighting for what I believe in.\n\t\t*set growth +1\n\t\t*achieve purposevolve\n\t\t*goto feelcontrol\n\t#Even if Versus Selected a Priscan for this purpose, why choose me out of the millions of people on Prisca? \n\t\t*set growth +1\n\t\t*if versusavoidpurpose\n\t\t\t*achieve steadfastquest\n\t\t\t*goto feelcontrol\n\t\t*else\n\t\t\t*achieve purposevolve\n\t\t\t*goto feelcontrol\n\t#I'm not sure anything I do will ever really end up mattering, in a cosmic sense…though I guess all I can do is keep trying.\n\t\t*set growth +1\n\t\t*if versusavoidpurpose\n\t\t\t*achieve steadfastquest\n\t\t\t*goto feelcontrol\n\t\t*else\n\t\t\t*achieve purposevolve\n\t\t\t*goto feelcontrol\n\t#Could Mother have known something about me, something special that made her choose me over Gilo?\n\t\t*set growth +1\n\t\t*achieve purposevolve\n\t\t*goto feelcontrol\n\n*label feelcontrol\n*set versuslist true\n\nFeeling like you need to take a break from asking questions, you decide to wrestle some control in this situation and craft a checklist of everyone you've encountered on Versus, so you can start narrowing down who Dhanthik might be.\n\nCalling up your Battlesuite visor stats screen, you feel your mind still operating with some leftover android processing. Rosae intimated that full absorbs can leave an impression on the both of you, depositing some altered way of thinking or new talent. You suppose full absorbs are almost like Solgrams in that way, leaving their permanent mark on your malleable personality…. \n\nFor a fleeting moment, you see the Purity Laws with different eyes. If you keep full absorbing like this, how much will you begin to change? How much of yourself will you potentially lose? Are these changes truly enhancements, or the start of a slow spiral of sacrifice? \n\nPerhaps these absorption changes are exactly what the Purity Laws were hoping to protect against—would Priscan culture devolve into oblivion if the Laws were abolished? Or would it ascend into evolutionary transcendence? Either way, there would be no cultural purity…but is that really a bad thing?\n\nPushing this troubling question aside for the moment, you force yourself to refocus on the task at hand as a list begins to form on your visor:\n\n[b]VERSUS CONSTRUCTIVE INHABITANTS[/b]\n\n[b]Ords:[/b] Twelve Inhabitants\n*line_break\n1.) [b]${name}:[/b] Not Dhanthik\n*line_break \n2.) [b]OtherBoard:[/b] Not Dhanthik, MemoryTraveled\n*line_break \n3.) [b]Empress Vaccus:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break \n4.) [b]Breeze:[/b] Status Unknown, MemoryTravel Priority \n*if todrickdie\n\tNormal\n\t*goto fifthtod\n*else\n\tHigh: [i]Impending Versus Match[/i]\n\t*goto fifthtod\n*label fifthtod\n*line_break\n5.) [b]Todrick:[/b] Status Unknown, MemoryTravel Priority \n*if todrickdie\n\tHigh: [i]Impending Versus Match[/i]\n\t*goto fifthtodafter\n*else\n\tNormal\n\t*goto fifthtodafter\n*label fifthtodafter\n*line_break\n6.) [b]Pinkuju:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n7.) [b]Baron Airon:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n8.) [b]Grog:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n*if fighthumm\n\t9.) [b]Cel:[/b] Encountered in MemoryTravel, MemoryTravel Priority Low\n\t*line_break\n\t10.) [b]Trig:[/b] Encountered in MemoryTravel, MemoryTravel Priority Low\n\t*line_break\n\t*goto bodysuited\n*else\n\t9.) [b]Male Rutonian Rebel:[/b] Status Unknown, MemoryTravel Priority Normal\n\t*line_break\n\t10.) [b]Female Rutonian Rebel:[/b] Status Unknown, MemoryTravel Priority Normal\n\t*line_break\n\t*goto bodysuited\n*label bodysuited\n11.) [b]Unknown Shrouded Being:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n12.) [b]Unknown Ord Inhabitant [i](Possibly Burnbone?)[/i]:[/b] Status Unknown, MemoryTravel Priority Normal\n\n[b]The Elite Courte:[/b] Twelve Inhabitants\n*line_break\n1.) [b]Queen Ashe:[/b] Versus Timeline Possibly Incompatible, MemoryTravel Priority Low\n*line_break\n2.) [b]Lady Venuma:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n3.) [b]Royal A-08:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n4.) [b]Oli:[/b] Status Unknown, MemoryTravel Priority Normal\n*line_break\n[i]Remaining Eight Elite Courte Members Unidentified[/i]\n\n*page_break\n\nProcessing this list as it compiles, you think through your own prearranged logic. Obviously you're not Dhanthik, first and foremost. Oli said you'd be able to clearly tell who Dhanthik is in MemoryTravel, so since you've already MemoryTraveled OtherBoard, you know it can't be her. \n*if fighthumm\n\tAlso, since you encountered Cel and Trig in OtherBoard's MemoryTravel, you figure they're likely not Dhanthik. However, you suppose you won't know for sure until you actually full absorb them individually, so you also identify them as low priorities. \n\t*goto checkend\n*else\n\t*goto checkend\n\n*label checkend\n\nLady Venuma explained that Queen Ashe has been on Versus for many cycles, probably dating back to a time before Dhanthik was even Selected. So you place her as a Low Priority, even though you have to admit, the idea of full absorbing and MemoryTraveling a self-proclaimed goddess-queen is very enticing.\n\nThen a new thought hits you like a crackle of thunder: if there's chance, however small, that Dhanthik might be hiding Empress Vaccus, you can't kill it until you know for sure. This thought is so difficult for you to swallow, you decide to spit it back up and digest it later, when your stomach is a bit blerging stronger.\n\nRight now, of the twenty-two potential inhabitants, you realize that anyone could be Dhanthik, though you've already begun to form your own suspicions:\n\n*choice\n\t#I'd bet that Dhanthik's assumed form is among The Elite Courte members I haven't met yet. Or one of the final mysterious Ords, for that matter.\n\t\tYou have a pretty strong intuition that Dhanthik couldn't be any of the beings you've met so far on Versus.\n\t\t*goto lastlnyow\n\t#I can't imagine that Empress Vaccus could really be Dhanthik, but then again, it would be the last place anyone would look—which makes it the perfect place to hide.\n\t\tBesides, there's no way for you to know if this is the real Empress Vaccus just yet.\n\t\t*goto lastlnyow\n\t#Perhaps Dhanthik's hidden identity has something to do with the mystery surrounding whatever Breeze did last cycle.\n\t\tThough you have trouble imagining Breeze as a secret divine savior….\n\t\t*goto lastlnyow\n\t#It would be unlikely for Dhanthik to hide in someone as ordinary as Todrick, which is exactly why he'd be a good choice.\n\t\tThough that's assuming Dhanthik has any control over Hir transformations….\n\t\t*goto lastlnyow\n\t#Even though Oli was the one to task you with finding Dhanthik, all signs point to ${olihir} really being Dhanthik. After all, they both have mirror patches and spark familiar feelings inside of you.\n\t\tIf Oli really is Dhanthik, Ze could be subconsciously reaching out to you to find Hir, somehow. It would also explain why your ambient absorb was blocked when you reached out to Oli—though you suppose there are any number of other possible explanations for that, given ${olihis} psychic abilities.\n\t\t*goto lastlnyow\n\t#I was unable to read the shrouded being back at the amphitheater, and I have a sneaking suspicion he is hiding something major.\n\t\tSomething potentially divine, even.\n\t\t*goto lastlnyow\n\t#Lady Venuma and Queen Ashe seem to be divine beings of great power, so it would make sense for Dhanthik to hide as one of them.\n\t\tGiven what you've seen of Lady Venuma so far, though, you can't imagine Dhanthik would ever behave this way…but maybe this is just who Dhanthik needs to be to thrive on Versus. \n\n\t\tIt seems far more likely Dhanthik would become someone like Queen Ashe, though as you've already noted, there could be some potential timeline issues there, given Queen Ashe's long reign on Versus.\n\t\t*goto lastlnyow\n\t#I have no idea—Dhanthik could truly be anyone.\n\t\tSo why waste time speculating on partial knowledge?\n\t\t*goto lastlnyow\n\n\n*label lastlnyow\n\n[i]Really,[/i] you remind yourself, [i]Dhanthik could be any one of these equally viable options.[/i] \n\nYou realize then that you can narrow your priority list down in one very important way. ${deathone} is set to face the Versus Match tonight and, according to Lady Venuma, may very likely be facing death there. Which means that ${deathone} needs to be first on your MemoryTravel Priority list. \n\nYou're not sure what you'd do if it turned out that ${deathone} really is Dhanthik, but at least you'd be awakening Dhanthik's latent powers and give Hir a fighting chance in the Versus Match…or so you hope. \n\n*page_break\n\nThe only way you can narrow down the rest of this list is by full absorbing and MemoryTraveling each of the remaining unknown Versus inhabitants. That leaves twenty-two inhabitants to full absorb, a process that will take you MemoryTraveling to nearly two dozen new worlds. You'll get to visit countless cultures and borrow a wide array of new abilities, a prospect that is simultaneously exhilarating and terrifying. No matter what else this experience may end up being, it should truly prove to be the adventure of a lifetime—the adventure you've always secretly wanted.\n\nThen in the next instant you're pulled back to reality, as you realize that this process will take you several weeks, at least. You'll need access to full absorb everyone, which might be difficult, especially when it comes to The Elite Courte. Chances are, you're going to need months to carry out this mission.\n\nGiven that you need so much time, you realize that you've got to find a way to survive on Versus as long as possible. After all, you can't carry out your mission if you're voted into the Versus Match and killed there. So you need to make sure you're able to survive many, many Versus Voting Ceremonies.\n\nWhich further means that all the politics you've encountered and relationships you've built have just become doubly important. Your decisions regarding The Elite Courte have taken on much greater significance, since now so much more than just your own survival depends upon them. If you make the wrong move or choose the wrong side, it could be the end of everything.\n\nBlerg.\n\n*page_break\n\nJust as this discomforting thought settles in, you look up to find that OtherBoard's eye-lights have shifted from blue back to white, and are now opening to their full diameter. Presumably this is a sign she has regained consciousness, though she doesn't seem to notice you, instead staring off into the distance.\n\n\"Multi?\" OtherBoard whispers, her robo-voice almost inaudible. Hearing this name, your mind flashes with an image of Multiplicity's corroded body, melting out of life in OtherBoard's arms. You barely had time to process this horrible death in MemoryTravel, and a rush of emotions floods you as you see it now.\n\nThen it dawns on you: during her time on the Multinarian Moon, OtherBoard developed a permanality and the ability to feel wild-coded emotions. Back at the Dhanial Summit, which must have happened sometime before OtherBoard was called to Versus, she seemed to have fallen in love with Multiplicity. \n\nIf what you witnessed in that MemoryTravel was true, OtherBoard probably just relived the death of her partner in a hyper-vivid, two-day dream.\n\n*page_break\n\nYou're trying to decide what you could possibly say to OtherBoard when Nards and Nermal skitter to her feet and snap her back to reality. As the dogs lick and paw at her legs, OtherBoard finally spots you.\n\n*if (rlshp_ob > 50)\n\t\"What did you do to me?\" she robo-shrieks.\n\t*goto obmovoeon\n*else\n\t\"You stay away from me!\" she robo-shrieks, beginning to course with electricity. After all you've done to her, both here on Versus and in your MemoryTravel experiences, you can't really blame her.\n\t*goto obmovoeon\n\n*label obmovoeon\n\"How long have I been rebooting?\"\n\n\"It's okay, I won't do anything else to you. I'm just here to talk,\" you say, backing away from OtherBoard with your hands raised. \"You've been down for a couple of days.\"\n\n\"Days?!\" OtherBoard screams. As she does, a series of internal lights suddenly flash beneath her chestplate in what appears to be some specific pattern. OtherBoard's eye-lights turn red for a moment, then she refocuses on you.\n\n\"Whatever your absorb did to me, you'll never be able to do it again. I just wrote a counter-program to make sure of that!\"\n\n\"I have no intentions of absorbing from you again,\" you offer, knowing you need to save your next full absorb for ${deathone}, anyway. Though you definitely didn't anticipate how…violated OtherBoard might feel. So you follow up with: \n\n*fake_choice\n\t#\"I had no idea it would take so much out of you, I swear. Are you all right now?\" \n\t#\"I just have a few questions for you, if that's okay.\" \n\t#\"Do you remember anything that happened while you were rebooting?\"\n\nYour question doesn't seem to register with OtherBoard, however. She appears to go somewhere else entirely once again, looking off into the distance. The way her mechanical facial features contort, she looks like she's in terrible pain.\n\nOtherBoard continues to ignore the begging from Nards and Nermal at her feet and lurches across the camp. Emitting a low, weepish hum, she grabs for a wire basket filled with cases of mini-discs, which you recognize as Solgrams. Clawing at them desperately, OtherBoard drops several on the floor. That's when you see the names on the cases: [i]Hipster Activist[/i] and [i]Protective Husband.[/i] \n\nThen you see the Solgram that OtherBoard is reaching for: [i]Neurotic Urbanite.[/i] That was the Solgram that OtherBoard was running when you first met her, but you also remember it as one of Multiplicity's favorites.\n\n*page_break\n\nOtherBoard opens a slot in her wrist and injects herself with the Solgram as quickly as her heavy hands will move. The Solgram seems to take effect immediately, since a wave of calm passes over her. Once it does, OtherBoard looks up at you, a mix of shame, anger, and sadness managing to express itself across her automated faceplate.\n\n\"Running Multi's old Solgrams, it's the only way I can still…it's all I can…\" \n\nOtherBoard seems overcome with grief for a moment, and you can't help but feel for her. You can't imagine what it must have been like to—\n\nThat thought is interrupted, however, as OtherBoard's eye-lights suddenly narrow and she begins to course with electricity. At her feet, Nards and even Nermal start to bark like crazy. You're about to react when you realize that OtherBoard isn't focused on you anymore—she's looking directly behind you. \n\nSo you spin to find…\n\n*page_break\n\n*if fighthumm\n\tCel and Trig standing at the perimeter of the camp. Cel has his hydro pistols drawn, and Trig is using her hands to cast a jade-lit Compuspell.  They must have tracked OtherBoard here for some kind of very poorly timed attack, breaking through her downed defenses while she was still rebooting, just like you did. \n\n\tThey both freeze when they see you, though.\n\n\t\"Wait, how do I…\" Cel begins, staring at you.\n\n\t\"Do we know you?\" Trig asks. \"The déjà vu, I've never felt anything like it.\"\n\n\tYou've never met anyone in real life after encountering them in MemoryTravel before—obviously, from OtherBoard and the rebels' reactions, it's an equally odd and overwhelming experience for them.\n\n\t\"We have met before, sort of,\" you offer, not sure where else to begin, especially with a set of weapons pointed in your face. \"It's…complicated.\"\n\n\t\"Well, whatever you're doing here, you need to leave,\" Cel barks at you. \"We're here to neutralize this Multinarian threat.\"\n\t*goto obwhat\n*else\n\tThe grey-haired commander and jade-scarred spell-caster from the Versus Arrival Runway, who you now recognize as Rutonian rebels. \n\n\tThe grey-haired commander has two hydro pistols drawn and the jade-scarred spell-caster is twitching her emerald-lit fingers. They must have tracked OtherBoard here for some kind of very poorly timed attack, breaking through her downed defenses while she was still rebooting, just like you did.\n\n\t*if absorbstranger\n\t\tThough they both freeze once they spot you.\n\n\t\t\"Hey, you're the one from the arrival strip that—\"\n\t\t*goto wathever\n\t*else\n\t\t*label wathever\n\n\t\t\"Whatever you're doing here, leave,\" the grey-haired commander barks at you. \"We're here to neutralize this Multinarian threat.\"\n\t\t*goto obwhat\n\n*label obwhat\n*page_break\n*set meetceltrig true\n\n\"What threat?\" OtherBoard snaps. \"I don't want to fight you, I just want to be left alone.\"\n\n\"You'll be plenty alone once Trig here corrupts your databanks with a Compuspell.\"\n\n\"Damn right she will, Cel,\" Trig says, a dark smile forming on her face as her fingers twitch in vivid jade blurs.\n\n*if fighthumm\n\t*goto electriclady\n*else\n\tOtherBoard registers the confusion on your face, so she turns to you, no doubt reporting from one of her standard readouts. \"Apparently Cel there is one of the Rutonian rebel leaders, and his ladyfriend Trig is one of the last living Machi Witches. This may get nasty.\"\n\n\tYou're not exactly sure what a Machi Witch is, but right now you don't care.\n\t*goto electriclady\n\n*label electriclady\nHowever you feel about OtherBoard or the Rutonian-Binarian conflict, you know that OtherBoard did nothing to prompt this attack—she's been lying dormant since Cel and Trig arrived on Versus. They're certainly not doing anything to disprove the prevailing android notion that humans are needlessly violent and aggressive. Especially since you've seen firsthand that OtherBoard believes in peace between humans and androids.\n\nWhich is why you're particularly surprised to find that OtherBoard has her hands raised at the Rutonians as well, coursing with so much electricity that her fingertips glow in a crackling, white blaze.\n\n*page_break\n\nYou're preparing for this standoff to turn hostile when suddenly it dawns on you: right before your Dhanthik Versus revelation, you learned the truth about the Bominate's origins. You need to take the opportunity to use this information here—but how do you want to do it?\n\nNow that surviving on Versus is more important than ever, you need to use this information to your advantage, one way or another. Thinking quickly, you figure that if that Binarian Royal A-08 has any influence, OtherBoard, Cel, and Trig will never get an Elite Courte bid. While Lady Venuma probably hasn't had the chance to meet with these three yet, given their respective isolations, you can bet that they will all be most likely to join her brewing coup, if they care enough to involve themselves in the politics.\n\nSo should you use this Bominate truth to unite or separate Cel, Trig, and OtherBoard? Is it better for you to have OtherBoard on your side, or Cel and Trig? Or should you just throw out all of these considerations and focus on doing the right thing, whatever that means to you? From here on out, every decision you make will now have multiple layers of motivations and consequences, given your new Dhanthik MemoryTravel mission. \n\nYou'd better start working on that now:\n\n*choice\n\t#Reveal the origins of the Bominate to try to spark peace between the Rutonians and OtherBoard, knowing this may benefit Lady Venuma's coup later.\n\t\t*set bompeace true\n\t\t*set regime %-15\n\t\t*set rlshp_ob %+15\n\t\t*set rlshp_celtrig %+15\n\t\t*if (regime \u003c 30)\n\t\t\t*set mastery +1\n\t\t\t*goto learnbom\n\t\t*else\n\t\t\t*goto learnbom\n\t#Reveal the origins of the Bominate to keep conflict burning between the Rutonians and OtherBoard, knowing this may hurt Lady Venuma's coup later.\n\t\t*set bomwar true\n\t\t*set regime %+15\n\t\t*set rlshp_ob %-15\n\t\t*set rlshp_celtrig %-15\n\t\t*if (regime > 70)\n\t\t\t*set mastery +1\n\t\t\t*goto learnbom\n\t\t*else\n\t\t\t*goto learnbom\n\t#Reveal the origins of the Bominate to defend OtherBoard and her peaceful Multinarian beliefs. After all she has been through, she deserves that much.\n\t\t*set bomob true\n\t\t*set ruthless %-15\n\t\t*set rlshp_ob %+25\n\t\t*set rlshp_celtrig %-25\n\t\t*if (ruthless \u003c 30)\n\t\t\t*set mastery +1\n\t\t\t*goto learnbom\n\t\t*else\n\t\t\t*goto learnbom\n\t#Spin the truth about the Bominate's origins to get Cel and Trig to start trusting you.\n\t\t*set bomceltrig true\n\t\t*set ruthless %+15\n\t\t*set rlshp_ob %-25\n\t\t*set rlshp_celtrig %+25\n\n\t\t*if (ruthless > 70)\n\t\t\t*set mastery +1\n\t\t\t*goto learnbom\n\t\t*else\n\t\t\t*goto learnbom\n\t#Reveal the origins of the Bominate because it's the right thing to do to promote peace. That's more important than any political implications.\n\t\t*set bompeace true\n\t\t*set rlshp_ob %+10\n\t\t*set rlshp_celtrig %+10\n\t\t*set growth +3\n\t\t*goto learnbom\n\n*label learnbom\n\n\"You all need to know something, before you tear each other apart,\" you say. \"I am able to absorb the memories and abilities of others, and since arriving on Versus, I also discovered that my people are capable of a lost art called MemoryTravel. After performing a full absorb on OtherBoard, I've been able to spend my nights experiencing a dreamlike time-travel through her experiences on Binaria and Multinaria.\"\n\nCel cocks his hydro pistol and growls: \"Stop stalling with this nonsense and leave. You don't need to be a part of this.\"\n\n\"But I do,\" you answer, \"because while I was MemoryTraveling, I learned the truth about the Bominate.\"\n\nHearing this name spoken aloud, Cel, Trig, and OtherBoard all flinch, still expecting it to show up at the mention of its name. When it doesn't, all three of them turn to you, remaining silent to listen. This is it—you had better make this count while you have the chance.\n\n*page_break\n\n\"I fought the new Bominate with the being you know as Dhanial, the one who killed the first Bominate. We discovered together that the new Bominate has been engineered to be truly unkillable, save for one key weakness,\" you begin, leaving the trio hanging on your every word.\n\n*if bomwar\n\t\"The Bominate is genetically coded to be killed with a simple touch from those that created it,\" you reveal. \"I believe this Bominate was created to show you the potential horrors of what happens when androids and humans come together.\"\n\n\tYou know that you're leaving out a key detail, that an outside race other than Rutonians, Binarians, or Multinarians created the Bominate, but these three don't need to know that right now. Especially considering it would almost certainly help to bridge the gap between them.\n\t*goto whomadebom\n*else\n\t\"The Bominate is genetically coded to be killed with a simple touch from the race that created it,\" you reveal. \"Which means that the Bominate was created by a race other than the Binarians, Rutonians, or Multinarians. \n\n\t\"I also believe it was created purposefully in this twisted form to keep the war raging between your races. And to warp the vision that Dhanthik—I mean Dhanial—presented, the vision of an ideal Binuman fusion.\"\n\n\t*if bompeace\n\t\t*goto whomadebom\n\t*else\n\t\tYou pause for a moment, allowing the gravity of your words to settle. Then you add:\n\t\t*if bomob\n\t\t\t\"Multinarians like OtherBoard are right about their mission to unite Binarians and humans. It might be the next step in evolution that some sinister enemy is trying to prevent.\"\n\t\t\t*goto whomadebom\n\t\t*else\n\t\t\t\"You see, Rutonian humans are right to be afraid—and this just adds an even more sinister enemy to your long list.\"\n\t\t\t*goto whomadebom\n\n*label whomadebom\n*page_break\n\nYour words are followed by a long silence, as everyone tries to process what you've just revealed. You can tell that they're all slowly working their way to the same question, but Cel arrives there first: \"Who created it, then?\"\n\n*if bominatetruth\n\t*if bomwar\n\t\tYou turn to face Cel and say without hesitation: \"That, I don't know.\"\n\n\t\tYou try to lie as convincingly as possible, because if these three learn that truth, it would do more to unite than divide them. You just hope this lie doesn't come back to haunt you.\n\n\t\tOr rather, you'll have to actively make sure that it doesn't.\n\t\t*page_break\n\t\t*goto gonnafight\n\t*else\n\t\t\"A planet neighboring Binaria,\" you start, taking a deep breath before announcing: \"It's called Cuttara.\"\n\n\t\tAlthough these three don't necessarily have much reason to trust you, the mention of this planet's name seems to resonate with all of them. You can sense something clicking into place for them, like the drop of some crucial puzzle piece. You just wish you knew exactly what it was.\n\n\t\t*label celtensetrig\n\n\t\tCel suddenly tenses, gripping his hydro pistols so tightly that you think they might break before he can fire them at OtherBoard. \n\n\t\t*page_break\n\n\t\tUntil Trig reaches over and closes her hand around his. \n\n\t\t\"Let's go,\" Trig whispers, just loud enough that you can hear. \"We need to talk.\"\n\n\t\tCel hesitates, still gripping and pointing.\n\n\t\t\"Now,\" Trig adds, a bit more forcefully.\n\n\t\tAfter a few moments, Cel grunts and finally lowers his weapon.\n\n\t\t\"We will have words about this,\" Cel says, turning to stare you down. You just nod in return, thinking that you've said enough during this exchange, for now.\n\n\t\tCel then turns to OtherBoard, trying to maintain his calm. \"We'll leave you alone until we sort this out,\" he growls, looking pained to say so.\n\n\t\t*page_break\n\n\t\tYou turn to OtherBoard, expecting her to take this opportunity to begin building a bridge with Cel and Trig. Instead, OtherBoard crosses her arms and looks in the other direction.\n\n\t\t\"Please,\" OtherBoard snaps. \"I will be left alone, no matter what you choose to do.\"\n\n\t\tHearing this, Cel looks like he might tackle OtherBoard, but Trig pulls him away before the situation can escalate any further. Whatever you just revealed about the Bominate's origins must have struck a serious chord with her.\n\n\t\t*if bomob\n\t\t\tEvidently not serious enough to move OtherBoard to speak, though. What happened to her mission for peaceful coexistence with Rutonian humans? As Cel and Trig finally disappear into the forest's thick tangle, you decide to find out just that.\n\t\t\t*goto hummsleave\n\t\t*else\n\t\t\t\"Thank you for what you've said,\" Cel says to you as he is pulled away. \"We will talk again soon.\"\n\n\t\t\tYou nod once again as Cel and Trig turn to leave, though honestly, you're completely distracted by OtherBoard's reaction. What happened to her mission for peaceful coexistence with Rutonian humans? As Cel and Trig finally disappear into the forest's thick tangle, you decide to find out just that.  \n\t\t\t*goto hummsleave\n*else\n\t\"That, I wasn't able to learn,\" you say, hanging your head. \"I truly wish that I had.\"\n\n\t*if bomwar\n\t\t*label gonnafight\n\t\tCel suddenly tenses, gripping his hydro pistols so tightly that you think they might break before he can fire them at OtherBoard.\n\n\t\t\"You're new to Versus, so let me give you a little helpful hint, friends,\" OtherBoard spits. \"Any damage you inflict on fellow inhabitants will be repaid in kind. We're not allowed to fight, it's against The Verses Scriptures. Otherwise, I'd electrocute you both to a crisp for threatening me in my own home.\"\n\n\t\tYou have no way to verify if what OtherBoard claims is true, but it does cause the Rutonians to pause. You're used to OtherBoard's Solgram sarcasm, but you're surprised by this aggression, given OtherBoard's peaceful coexistence mission. What has happened to her?\n\n\t\t*page_break\n\n\t\t\"Let's go,\" Trig whispers, just loud enough that you can hear. \"We need to talk.\"\n\n\t\tCel hesitates, still gripping his hydro pistol tightly.\n\n\t\t\"Now,\" Trig adds, a bit more forcefully.\n\n\t\tAfter a few moments, Cel grunts and finally lowers his weapon.\n\n\t\t\"This isn't over,\" he says, just before turning to leave.\n\n\t\t[i]No,[/i] you think, [i]it most certainly isn't.[/i] Though once the Rutonians are gone, OtherBoard powers down the electricity coursing around her.\n\n\t\t\"I can't believe they bought that,\" OtherBoard almost laughs. \"Humans will believe anything a computer tells them. Seriously.\"\n\n\t\tWhat has gotten into OtherBoard?\n\t\t*goto hummsleave\n\t*else\n\t\t*goto celtensetrig\n\n*label hummsleave\n*page_break\n\n*if bomwar\n\t*achieve warmonger\n\t\"I'm not sure what you were trying to accomplish there and I don't care,\" OtherBoard shoots at you. \"I can fight my own battles.\"\n\n\t\"If that were true, you'd have done more than just stand there silently,\" you shoot back. \"The OtherBoard I met in MemoryTravel stood for something. How can this Bominate revelation not mean something to you?\"\n\t*goto finalobconvo\n*elseif bomceltrig\n\t*achieve warmonger\n\t\"Don't think I didn't notice you sucking up to your fellow humans there,\" OtherBoard snaps. \"Though I suppose I should thank you for defusing the situation. The last thing I need is a fight.\"\n\n\t\"Since when?\" you respond. \"The OtherBoard I met in MemoryTravel stood for something. How could you let that opportunity to connect with those Rutonians pass you by? How can this Bominate revelation not mean something to you?\"\n\t*goto finalobconvo\n*else\n\t*achieve givepeace\n\t\"I suppose I should thank you for that,\" OtherBoard sighs. \"I don't feel like fighting much anymore.\"\n\n\t\"Since when?\" you respond. \"The OtherBoard I met in MemoryTravel stood for something. How could you let that opportunity to connect with those Rutonians pass you by? How can this Bominate revelation not mean something to you?\"\n\n\tOtherBoard looks sad at first, but this sadness quickly turns into a blast of pure anger.\n\t*goto finalobconvo\n\n*label finalobconvo\n\n\"Mean something?\" OtherBoard screams. \"It can't mean anything anymore, because all I ever stood for got Multi killed!\"\n\nOtherBoard lets out a shrill cry, a kind of glitchy howl that sends chills through you. She looks entirely overwhelmed, overflowing with newly formed android emotion.\n\n\"I was wrong, we were all wrong,\" OtherBoard shudders. \"Now I understand why you humans are so crazy all of the time. Androids are better off not feeling anything.\"\n\n*page_break\n\nOtherBoard's grief is so potent you can taste it in the back of your throat, like a copper coin. You're not sure if it's because you still feel connected to OtherBoard from your full absorb or because her ambient pain is so staggering, but a desire to comfort OtherBoard suddenly strikes you, a desire you can't ignore.\n\n\"Let me fill you in on a little human secret, OtherBoard,\" you start, trying to muster the appropriate gravitas for this next thought. \"For better or worse, you won't feel anything forever. That's the best and worst thing about having emotions.\" \n\nYou say the words and hope they might mean something to OtherBoard, but you can't quite tell if they do. \n\n*choice\n\t#At any rate, I tried my best—now it's more important that I get OtherBoard talking about my MemoryTravel experience with Dhanthik, no matter how painful it might be for her. \n\t\t*set ruthless %+10\n\t\t*goto nomatterhurt\n\t#I need to figure out how to get OtherBoard talking without sounding totally unsympathetic.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto nomatterhurt\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto nomatterhurt\n\t#I need to keep trying if I'm going to really get through to OtherBoard.\n\t\t*set ruthless %-10\n\t\t*goto nomatterhurt\n\n*label nomatterhurt\n\n\"No matter how much you're hurting, if anyone should understand the importance of this Bominate truth, it's someone like you,\" you say. \"Someone who truly believed in Dhanial's Binuman vision, before anyone else did.\"\n\nHearing this, OtherBoard tries to gather herself. She suddenly looks like there's something she desperately needs to talk about, no matter how much she may want to avoid it.\n\n\"Dhanial's Summit was supposed to be the best day of our lives,\" OtherBoard tries, barely keeping her robo-voice from cracking. \"The idea that humans and androids could combine into some ideal Binuman form was…transcendent. Then the Bominate appeared and everything…\"\n\nOtherBoard shudders, as if the thought is too grim for her to bear. She hugs her arms across her chest, her eye-lights turning to the ground.\n\n\"It just wasn't fair,\" OtherBoard finally sighs. \"Not just what happened to Multi. We learned so little about Dhanial before Ze was transported to Versus….\"\n\n*page_break\n\nHearing this, you feel your heart skip a beat. You're careful to keep your expression composed enough to ask: \"Have you seen—\"\n\n\"Dhanial was Selected some time before I was,\" OtherBoard interrupts, anticipating your question. \"Since I arrived on Versus, though, I haven't seen or heard of Hir on either side. I have no idea what became of Dhanial. Of course, I haven't tried to find out very much, isolating myself here in the UniForest….\"\n\nAs OtherBoard is overcome by a wave of fresh guilt, you try to cope with your own flood of emotions. This confirms what you witnessed in MemoryTravel and what Oli claimed about Dhanthik being on Versus. Also, OtherBoard not immediately recognizing Dhanthik further supports Oli's theory that Ze is trapped here in a loop of convincing false identities. \n\nHowever heartening that might be, it also means that OtherBoard won't be any help in finding Dhanthik, at least not like this. In fact, given OtherBoard's unpredictability, with these mood swings and Solgram abuse, you figure you'd best not tell her anything about what you've learned about Dhanthik just yet. \n\nWhich also means that your priority now must shift from talking to OtherBoard to full absorbing ${deathone} as soon as possible.\n\n*page_break\n\n\"Usually the Solgrams, they keep the feelings distorted,\" OtherBoard croaks, pulling you back to the moment. \"They help me feel like Multi is still here with me….\"\n\nAs OtherBoard trails off into another emotional tailspin, you realize that you need to decide as quickly as possible how to leave things with her. What's more important to you: your overall relationship with OtherBoard? Helping her find a way to start healing from the loss of Multiplicity? Or the potential Versus politics OtherBoard might be involved in soon? \n\nThese goals may not be mutually exclusive, or they might not even be relevant to you—it's up to you to decide what matters most. \n\n*choice\n\t*if (rlshp_ob > 70) #Remind OtherBoard of the importance of her beliefs by offering to be her new Multiplicity.\n\t\t*set obnsr true\n\t\t*set rlshp_ob %+30\n\t\t*set mastery +1\n\n\t\t\"Listen, you have to know this much,\" you say, taking a few steps toward OtherBoard. \"Multiplicity is with you, in all the ways that matter. So now it's up to you to honor his legacy, because that's what will truly keep him alive. I think you need to ask yourself, what would Multiplicity want you to do if he were standing beside you right here and now?\"\n\n\t\tOtherBoard's eye-lights dim for a moment, as if your words have struck at something deep in her datacore. It takes several seconds, but as OtherBoard stares back at you, the lights in her eyes slowly start to brighten again. You hold her gaze, waiting to see what she might do next.\n\n\t\tOtherBoard slowly lifts her wrist and opens her Solgram slot. Then, with great effort, OtherBoard ejects the Neurotic Urbanite Solgram and lets it drop to the ground. As the disc falls flat, OtherBoard steps forward to crush it underneath her metal heel…\n\n\t\t*page_break\n\n\t\t…but her foot hovers, unable to bring itself down. \n\n\t\tYou anticpiate the sound of metal snapping across the silence that builds in OtherBoard's camp, but instead, OtherBoard removes her foot, crouches down, and collects the disc. She then stands and places it safely back in its case, unable to look you in the eye as she does.\n\n\t\t[i]At least she didn't place it back in her arm,[/i] you think. Actually, the fact that OtherBoard isn't able to let go of Multiplicity in one fell swoop probably means good things for her budding soul.\n\n\t\t*page_break\n\n\t\t\"${name},\" OtherBoard says, once fully sober of the Solgram. \"Why do you care what I do or don't believe? Why do you care what happens to me at all?\"\n\n\t\t\"If you've learned anything about humanity, I think you already know the answer to that question,\" you say. \"But it's more than that, for us. I've been inside your mind, and I've seen your world through your eyes. I can't quite explain it, but after all that, I just feel like I understand you.\"\n\n\t\t\"I may be new to this whole emotion thing,\" OtherBoard starts, \"but I think I know what you mean.\"\n\n\t\t\"OtherBoard, I know I never could replace Multi, and I'd never try to,\" you start, \"but I'd like to be your new partner. In your mission for peace and…maybe otherwise?\"\n\n\t\tYou're not sure that romance is even possible with an android, nor are you sure that's even what you want here. All you know is that, above all else, you feel for OtherBoard and you believe in Binumanity. Anything physical or biological is far less important than fostering a connection like this.\n\n\t\tNow you just wait for OtherBoard's response, to see if she feels the same way.\n\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+15\n\t\t\t*goto oblevelcheck\n\t\t*else\n\t\t\t*set ruthless %-15\n\t\t\t*goto oblevelcheck\n\t#Remind OtherBoard what she believes in, as an act of friendship, because I need someone I can trust here on Versus.\n\t\t*set ruthless %-15\n\t\t\n\t\t\"Listen, you have to know this much,\" you say, taking a few steps toward OtherBoard. \"Multiplicity is with you, in all the ways that matter. So now it's up to you to honor his legacy, because that's what will truly keep him alive. I think you need to ask yourself, what would Multiplicity want you to do if he were standing beside you right here and now?\"\n\n\t\tOtherBoard's eye-lights dim for a moment, as if your words have struck at something deep in her datacore. It takes several seconds, but as OtherBoard stares back at you, the lights in her eyes slowly start to brighten again. You hold her gaze, waiting to see what she might do next.\n\n\t\tOtherBoard slowly lifts her wrist and opens her Solgram slot. Then, with great effort, OtherBoard ejects the Neurotic Urbanite Solgram and lets it drop to the ground. As the disc falls flat, OtherBoard steps forward to crush it underneath her metal heel…\n\n\t\t*page_break\n\n\t\t…but her foot hovers, unable to bring itself down. \n\n\t\tYou anticpiate the sound of metal snapping across the silence that builds in OtherBoard's camp, but instead, OtherBoard removes her foot, crouches down, and collects the disc. She then stands and places it safely back in its case, unable to look you in the eye as she does.\n\n\t\t[i]At least she didn't place it back in her arm,[/i] you think. Actually, the fact that OtherBoard isn't able to let go of Multiplicity in one fell swoop probably means good things for her budding soul.\n\n\t\t*page_break\n\n\t\t\"${name},\" OtherBoard says, once fully sober of the Solgram. \"Why do you care what I do or don't believe? Why do you care what happens to me at all?\"\n\n\t\t\"If you've learned anything about humanity, I think you already know the answer to that question,\" you say. \"But it's more than that, for us. I've been inside your mind, and I've seen your world through your eyes.\n\t\t*if (ruthless \u003c 30)\n\t\t\t*set rlshp_ob %+25\n\t\t\t*set mastery +1\n\t\t\tI can't quite explain it, but after all that, I just feel like I understand you.\"\n\n\t\t\t\"I may be new to this whole emotion thing,\" OtherBoard starts, \"but I think I know what you mean.\"\n\n\t\t\t\"OtherBoard, I know I never could replace Multi, and I'd never try to,\" you start, \"But I'd like to be your friend. Mirrored Matron knows I could use someone to trust in this insane place.\"\n\n\t\t\tYou smile at OtherBoard and wait to see if she feels the same way.\n\t\t\t*goto oblevelcheck\n\t\t*else\n\t\t\t*set rlshp_ob %-10\n\t\t\tI can't quite explain it, but after all that, I just feel like I understand you.\n\n\t\t\t\"OtherBoard, I know I never could replace Multi, and I'd never try to,\" you continue, \"But I'd like to be your friend. Mirrored Matron knows I could use someone to trust in this insane place.\"\n\n\t\t\t\"I may be new to this whole emotion thing,\" OtherBoard starts, \"but I can tell when someone is being genuine.\"\n\n\t\t\tSurprised by this reaction, you just stare back at OtherBoard, wondering where she is going with this.\n\t\t\t*goto oblevelcheck\n\t#I want OtherBoard as an ally. I'll help her get back on her feet so that she can become useful to me.\n\t\t*set ruthless %+15\n\n\t\t\"Listen, you have to know this much,\" you say, taking a few steps toward OtherBoard. \"Multiplicity is with you, in all the ways that matter. So now it's up to you to honor his legacy, because that's what will truly keep him alive. I think you need to ask yourself, what would Multiplicity want you to do if he were standing beside you right here and now?\"\n\n\t\tOtherBoard's eye-lights dim for a moment, as if your words have struck at something deep in her datacore. It takes several seconds, but as OtherBoard stares back at you, the lights in her eyes slowly start to brighten again. You hold her gaze, waiting to see what she might do next.\n\n\t\tOtherBoard slowly lifts her wrist and opens her Solgram slot. Then, with great effort, OtherBoard ejects the Neurotic Urbanite Solgram and lets it drop to the ground. As the disc falls flat, OtherBoard steps forward to crush it underneath her metal heel…\n\n\t\t*page_break\n\n\t\t…but her foot hovers, unable to bring itself down. \n\n\t\tYou anticpiate the sound of metal snapping across the silence that builds in OtherBoard's camp, but instead, OtherBoard removes her foot, crouches down, and collects the disc. She then stands and places it safely back in its case, unable to look you in the eye as she does.\n\n\t\t[i]At least she didn't place it back in her arm,[/i] you think. Actually, the fact that OtherBoard isn't able to let go of Multiplicity in one fell swoop probably means good things for her budding soul.\n\n\t\t*page_break\n\n\t\t\"${name},\" OtherBoard says, once fully sober of the Solgram. \"Why do you care what I do or don't believe? Why do you care what happens to me at all?\"\n\n\t\t\"If you've learned anything about humanity, I think you already know the answer to that question,\" you say. \"Though you're right, for us here and now, it's more than that. I've been inside your mind, and I've seen your world through your eyes. I can't quite explain it, but after all that, I just feel like I understand you.\n\n\t\t\"Which means I trust you, OtherBoard,\" you continue. \"I don't know if anyone can truly be friends in a place like this, but I think we can help each other survive and achieve our goals. We could use that trust to form a close alliance, if you'll have me.\"\n\n\t\tYou hold OtherBoard's gaze, waiting to see if she finds your proposition agreeable.\n\t\t*if (ruthless > 70)\n\t\t\t*set rlshp_ob %+25\n\t\t\t*set mastery +1\n\t\t\t*goto oblevelcheck\n\t\t*else\n\t\t\t*set rlshp_ob %-10\n\t\t\t*goto oblevelcheck\n\t#Tell OtherBoard to suck it up and figure it out—she obviously needs some tough love.\n\t\t*set rlshp_ob %-30\n\t\t*set mastery +1\n\t\t\n\t\t\"The only thing you have left of Multiplicity is his legacy,\" you say. \"So what do you think he'd say if he could see what you've become today? \n\n\t\tOtherBoard's eye-lights dim for a moment, as if your words have struck at something deep in her datacore. It takes several seconds, but as OtherBoard stares back at you, the lights in her eyes slowly start to brighten again. You hold her gaze, waiting to see what she might do next.\n\n\t\tOtherBoard slowly lifts her wrist and opens her Solgram slot. Then, with great effort, OtherBoard ejects the Neurotic Urbanite Solgram and lets it drop to the ground. As the disc falls flat, OtherBoard steps forward to crush it underneath her metal heel…\n\n\t\t*page_break\n\n\t\t…but her foot hovers, unable to bring itself down. \n\n\t\tYou anticpiate the sound of metal snapping across the silence that builds in OtherBoard's camp, but instead, OtherBoard removes her foot, crouches down, and collects the disc. She then stands and places it safely back in its case, unable to look you in the eye as she does.\n\n\t\t[i]At least she didn't place it back in her arm,[/i] you think. Actually, the fact that OtherBoard isn't able to let go of Multiplicity in one fell swoop probably means good things for her budding soul.\n\n\t\t*page_break\n\n\t\t\"Do not ever presume to tell me what Multiplicity would want,\" OtherBoard seethes, clenching her fists with a metallic clang. \"Are we clear?\"\n\n\t\t\"We're clear,\" you say, returning the gesture. \"So where does that leave us?\"\n\n\t\tOtherBoard stares you down, seeming to take this question very seriously.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+15\n\t\t\t*goto oblevelcheck\n\t\t*else\n\t\t\t*set ruthless %-15\n\t\t\t*goto oblevelcheck\n\n*label oblevelcheck\n*page_break\n\nOtherBoard takes a moment to gather herself, but then seems to make her decision fairly quickly.\n\n*if obnsr\n\t*achieve obnsrac\n\t\"I'd really like that, indeed I would,\" OtherBoard says, traces of her old positive permanality finally resurfacing. Your heart swells at these words. \n\t*goto obmasterycheck\n*elseif (rlshp_ob > 70)\n\t*achieve obfinalfriend\n\t\"I think we are going to be great friends,\" OtherBoard says, traces of her old positive permanality finally resurfacing. \"I already know that I can trust you.\"\n\t*goto obmasterycheck\n*elseif (rlshp_ob > 50)\n\t*achieve obfinalally\n\t\"I think we will be able to work together in the future,\" OtherBoard says, almost smiling. \"I just need more time to build that trust.\"\n\t*goto obmasterycheck\n*elseif (rlshp_ob > 30)\n\t*achieve obfinalally\n\t\"We have some ways to go before I can even come close to trusting you,\" OtherBoard says. \"But I shall leave the door open for that to happen someday.\"\n\t*goto obmasterycheck\n*else\n\t*achieve obfinalenemy\n\t\"After all that you've done, I want you to leave my home this instant,\" OtherBoard snaps, all traces of her vulnerability now evaporated. \"And never come back.\"\n\t*goto obmasterycheck\n\n*label obmasterycheck\n\nBefore you can respond, Nards and Nermal suddenly go crazy again at OtherBoard's feet. You spin around to find an Aye Aye scurrying into the camp, looking utterly terrified of the barking dogs. \n\nThe Aye Aye runs up to your side and holds up an envelope. You expect it to scurry back out the moment you take the envelope, but instead it plants itself into the ground and waits for you in twitchy silence.\n\n*page_break\n\n\"I'd better go find out what it wants,\" you say to OtherBoard, figuring that this is as good a place as any to leave things with her. Besides, you know that you need to get going to find ${deathone} before tonight's Versus Match. \n\n*if (rlshp_ob > 70)\n\t\"I'm sure we'll talk again soon,\" you add. \"Thank you, for everything.\"\n\t\n\tThen with one final wave, you turn and exit OtherBoard's camp,\n\t*goto ayetside\n*elseif (rlshp_ob > 30)\n\t\"For what it's worth, I'm sorry for everything my absorption put you through,\" you add. \"Thank you for sharing your world with me, whether you wanted to or not.\"\n\t\n\tThen with one final wave, you turn and exit OtherBoard's camp,\n\t*goto ayetside\n*else\n\tSo without another word, you set off,\n\t*goto ayetside\n\n*label ayetside\nknowing that you've left OtherBoard with quite a bit to consider.\n\n*page_break The Invitation\n\n[b]You Are Cordially Invited To A Party In ${deathone}'s Honor[/b]\n*line_break\n[i]A new Ord tradition to celebrate those selected for the Versus Match[/i]\n*if todrickdie\n\t*line_break\n\t[i]Hosted by Breeze[/i]\n\n\tAs you read this invitation in the buzzing UniForest outside OtherBoard's camp, you think of what a strange thing this is for Breeze to do, given ${brehis} role in getting Todrick to volunteer. However, you figure it does fit rather neatly into the little act Breeze and Lady Venuma have been playing, for better or worse.\n\t*goto reallyforyou\n*else\n\t\n\tAs you read this invitation in the buzzing UniForest outside OtherBoard's camp, you immediately wonder why Breeze would invite you to a party after what you did to ${brehir}. Though perhaps it's a sign that ${breze} is being mature and doesn't blame you for ${brehis} nomination. After all, whatever Breeze did to cross the Elite before you arrived is what put the target on ${brehis} back, right?\n\n\tThen you consider your encounters with Breeze so far and figure you should probably still brace yourself for a potentially unpleasant afternoon.\n\t*goto reallyforyou\n\n*label reallyforyou\n\nIn the end, the intentions behind this party don't really matter: it offers a convenient opportunity for you to approach ${deathone} about initiating a full absorb. You have no idea how you're going to pull it off just yet, but that's a problem for later.\n\nRight now, it looks like you have a party to attend.\n\n*if (mastery > 19)\n\t*set masterytwentybonus true\n\t*achieve masterytwentybonusac\n\t*set lifemax +1\n\t*goto endofchapterseven\n*elseif masterytenbonus\n\t*goto endofchapterseven\n*elseif (mastery > 9)\n\t*set masterytenbonus true\n\t*achieve masterytenbonusac\n\t*set lifemax +1\n\t*goto endofchapterseven\n*else\n\t*goto endofchapterseven\n\n*label endofchapterseven\n*finish\n", "v_six": "*comment é\n\n*image chap_6.png\n\n*image e_chap6.png\n\n${blank}\n\n*page_break\n\nYour eyes are closed, but you can somehow still see Rosae hovering in the distance, maneuvering around gusts of neon wind. You feel a warm rush seeing Rosae—after all, she is the only piece of Prisca you have here with you. You remind yourself that you need to sit down and have a nice, long MemoryTravel chat with Rosae when some of this more urgent business is resolved.\n\nYou then blink, or rather, your eyes flutter and suddenly Rosae is in front of you, flapping her wings furiously to stay stationary in the streaking crosswinds.\n\n\"Where are we?\" you ask, wondering why you can't feel the neon wind that seems to rage against Rosae.\n\n\"In the space between awake and asleep, where I spend most of my 'time,'\" Rosae chirps as loudly as she can manage. \"This inbetweenery won't last long though, so I need to know where you want to go.\"\n\n\"Oh, are we about to MemoryTravel?\" you ask, feeling oddly calm, as if you're in the eye of the invisible storm. \"Does this mean I get to choose where I want to go this time?\"\n\n\"I can certainly try to guide you as closely as possible to 'when' you want to go,\" Rosae chirps between labored breaths. \"However, grabbing anyone from the nexus is always tricky business, and the neon winds are particularly stormy to-now. We have your alternate timedims to thank for that.\"\n\n*page_break\n\n\"Alternate timedims?\" you ask, tilting your head to the side.\n\n\"When you alter events in MemoryTravel, you create temporary alternate time-dimensions that collapse on themselves when you wake up, hence all this crosswind,\"  Rosae chirp-sighs, looking a bit exasperated. \"In the true past, OtherBoard escapes to the Forbidden Moon Multinaria and—oh dear, nevermind all that, we're out of time. Please choose now!\"\n\n\"That's easy,\" you say as Rosae clamps her soft talons around your shoulders. \"Take me to the last time Dhanthik was seen on Binaria. I need to know where Ze has ended up.\"\n\n\"That's not easy!\" Rosae shrills above a sudden gust of neon wind. \"I still have to use OtherBoard's memories as an anchor, but I can try to pinpoint—\"\n\nYou don't hear the rest of what Rosae says, however, because suddenly you feel your limbs going numb and your mind rising up.\n\n*page_break\n\nYou open your eyes and once again struggle to acclimate to your surroundings. You now find yourself sitting in a row of plush bleachers filled to the brim with other people. Well, not people so much as androids of all different shapes and sizes—you're surrounded by a rainbow of rusted joints, braided wirestyles, and reworked anatomical metalplates. \n\n*if skipthree\n\t\"FYI Priscy, those are Multinarians,\" Rosae chirps somewhere above you. \"They are Binarians who believe in developing android souls by constantly using the first android narcotic, Solgrams. They flee to the Forbidden Moon Multinaria to pursue this goal.\"\n\n\tKnowing this must be part of what you missed by fast-forwarding your first MemoryTravel experience, you are thankful for Rosae's assistance. Though you are a bit confused when you also spot some humans sprinkled into the mix, most of whom sport some kind of bionic or cybernetic implants.\n\t*page_break\n\t*goto forcself\n*else\n\tYou assume these must be Multinarians, though just as you think this, you also spot some humans sprinkled into the mix, most of whom sport some kind of bionic or cybernetic implants.\n\t*goto forcself\n\n*label forcself\n\nYou force yourself to look beyond the bleachers and deduce that you must be on a spacecraft of some kind, since outside a glass wall you see a black swath of nothingness populated with brightly burning stars. You appear to be in some kind of great room, where a podium has been erected on a stage surrounded by two other sets of bleachers. \n\nYou look to the right to find that set is sparsely populated with Rutonian rebels, wearing their usual green and white fatigues. They all stare across the stage with great contempt at the third set of bleachers…\n\n…which holds a handful of Binarian A-Class Royals. They all look almost exactly like A-08, with fine titanium and genderless, faceless android figures topped with that sapphire letter \"A.\" The only true differences between the Royals are the glowing accent colors that run along their smooth seams. You know by now that Binarians don't express traditional biological emotion, but if they could, you bet that their level of contempt would rival that of the human rebels.\n\n*choice\n\t#I should be sitting in the human rebel seats, not here.\n\t\t*set regime %-5\n\t\t*goto wonderwhatcould\n\t#Even though they probably wouldn't have me, I'd rather show support for the Binarian Royals, given the Rutonian rebels' history.\n\t\t*set regime %+5\n\t\t*goto wonderwhatcould\n\t#I'm exactly where I should be, with the Multinarians.\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto wonderwhatcould\n\t\t*else\n\t\t\t*set regime %-5\n\t\t\t*goto wonderwhatcould\n\t#I don't care where I'm sitting—all I care about is finding Dhanthik.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+5\n\t\t\t*goto wonderwhatcould\n\t\t*else\n\t\t\t*set ruthless %-5\n\t\t\t*goto wonderwhatcould\n\n*label wonderwhatcould\n\n*if skipthree\n\t*goto noneedtak\n*else\n\tYou wonder what could have brought Rutonian rebels, Royal Binarians, and this Multinarian hodgepodge into the same room without them all immediately killing each other. You're also wondering what brought you to this room when you hear Rosae flapping her wings above you.\n\t*goto noneedtak\n\n*label noneedtak\n\n\"Oh, no need to thank me,\" Rosae chirps, looking particularly exasperated. She also now wears a ${beltcolor} bow tie instead of her top-hat-and-monocle combination. \"That was nothing at all, just an impossibly difficult feat of MemoryTravel precision.\"\n\n\"Thank you, Rosae,\" you say, moving aside and patting the bleacher beside you so that she can squeeze into the space there. \"So where—or when—exactly are we?\"\n\n\"The when is not terribly long after our last MemoryTravel experience. Or, in other linear terms, a few years in the past from your Versus present,\" Rosae explains. \"As for where, it turns out that OtherBoard's path did indeed cross Dhanthik's again. I know that this meeting is literally where we are, but my access to the MemoryConsciousness is diluted from all the crosswinds, so I can't ascertain much more than that. It's been a great long while since anyone MemoryTraveled, so the collapse shockwaves are much more severe than usual. Anyway, you'll have to talk to OtherBoard to figure out exactly where we are, for now.\"\n\nRosae points her feathered wing to the other side of you, where you turn to find…\n\n*page_break\n\nOtherBoard and Multiplicity sitting beside you, though you'd hardly recognize them. They both look very different from the last time you MemoryTraveled—and much more like the OtherBoard you first met on Versus.\n\nOtherBoard has recast her metal frame to resemble the version you first remember, with an expressive faceplate and female body shape. She has tied her extended wire-braid hair in a ponytail and wears a simple black shift dress. Next to her, Multiplicity has gone through similar changes, except with male body castings, short spiky wire-hair, and a sleek jeans-and-v-neck-sweater combination. He also seems to have gotten some kind of metal-tattoo, since the letters \"OB\" are imprinted on his cheek.\n\nOtherBoard and Multiplicity are so focused on each other that they haven't even noticed you yet.\n\n\"Oh, can't you just feel it in the air, sweetie?\" OtherBoard almost sings. \"It's positively charged!\" \n\n\"You really can't resist an electrical pun, can you?\" Multiplicity robo-laughs, his voice still sounding computerized, but with much more inflection than you remember. Actually, both of their voices sound different, like they've taken on some kind of unique, individual quality.\n*if helpob\n\tThese first impressions would certainly make it seem that OtherBoard and Multiplicity have succeeded in their Multinarian goals since last you saw them.\n\t*goto whatcanobsay \n*else\n\tIt almost reminds you of the way the automated assistant on your mobile communicator back on Prisca would autocorrect to your own linguistic patterns. You wonder, are those Solgrams somehow permanently altering OtherBoard and Multiplicity, giving them the impressions of a personality? Or is this just what happens when Multinarians overdose on Solgrams?\n\t*goto whatcanobsay\n\n*label whatcanobsay\n*page_break\n\n\"I'm so excited, I can't help it,\" OtherBoard nearly squeals. \"I never thought we'd see a day like this, my fine friend.\"\n\n\"Of all the phrases to include in your permanality, you go with something from that cursed Enchanted Princess Solgram?\" Multiplicity groans.\n\n\"Look who's talking, Mr. Urbanite,\" OtherBoard laughs. \"Besides, you know the whole point is for our permanalities to evolve outside of our control. We may not have to use Solgrams anymore, but they are still the foundation of our—\"\n\nOtherBoard doesn't get to finish, however, since Multiplicity interrupts her with a kiss—or at least whatever their metal lips clanging together counts as. You've never seen androids express any physical affection this way, so obviously there are some developments you need to be caught up on.\n\n\"All right, quit showing off,\" Multiplicity says, nudging OtherBoard as he pulls away. \"We all know you're a permanality prodigy, but it's time we stopped neglecting our guest.\"\n\n*page_break\n\nAs Multiplicity nods in your direction, OtherBoard turns to face you\n*if fighthumm\n\tand stops smiling, as if she knew perfectly well that she was ignoring you. \n\n\t\"I suppose we wouldn't want to do that, would we?\" she sighs.\n\t*goto rosaeimpressions\n*elseif helpob\n\tand stretches her auto-lips into a wide smile.\n\n\t\"I could never forget our dear friend, ${name}!\"\n\t*goto rosaeimpressions\n*else\n\tand stretches her auto-lips into a scowl.\n\n\t\"Oh. Right.\"\n\t*goto rosaeimpressions\n\n*label rosaeimpressions\n\nYou're about to return OtherBoard's gesture, but Rosae pipes up first.\n\n\"${name}, might I remind you that OtherBoard and Multiplicity have no specific memory of your last MemoryTravel experience, since it never really happened,\" Rosae explains. \"However, obviously they believe you should be here and feel faint impressions of your last encounter, like emotional echoes. You can expect the same kind of reactions when you encounter OtherBoard back on Versus, so you'd better make what you say count while you're here.\"\n\nConsidering Rosae's advice, you turn back to OtherBoard and decide to say:\n\n*choice\n\t#\"I'm so happy to see you both doing so well. You really look fantastic. What has changed?\"\n\t\t*set rlshp_ob %+10\n\n\t\tOtherBoard smiles at you, seeming just about ready to burst with all the things she wants to fill you in on.\n\t\t*goto obexplainsthechange\n\t#\"You both look so different from when I last saw you. What have you been up to on that Forbidden Moon?\"\n\t\t*set rlshp_ob %+5\n\n\t\tOtherBoard nods at you, seeming just about ready to burst with all the things she wants to fill you in on.\n\t\t*goto obexplainsthechange\n\t#\"You both look like you need to lay off the Solgrams, honestly.\"\n\t\t*set rlshp_ob %-10\n\n\t\tOtherBoard frowns at you, appearing as disgusted as her metallic expression will allow. Despite this, she still looks like she'll take the time to deign to inform you just how wrong you really are. She seems to be used to dealing with contrarian humans just like you.\n\t\t*goto obexplainsthechange\n\n*label obexplainsthechange\n\n\"Well, the short answer is that Multi and I made our home on Multinaria and things have gone very well,\" OtherBoard proclaims. \n*if (helpob) and (skipthree = false)\n\t\n\t\"Given the number of humans in the crowd here, I take it your mission of peaceful coexistence is also going well?\"\n\t*goto couplesuccess\n*else\n\t\"Despite what you may have heard about us Multinarians, we don't flee to the Forbidden Moon Multinaria to feed any ridiculous addictions. We sojourn there to develop our own personalities independent of Solgrams.\"\n\n\tOtherBoard explains all of this with a look of great pride, as if she is an aged minister quite comfortable proselytizing to nonbelievers.\n\n\t\"You see, Multinarians don't believe in holding back our own soulful evolution based on fear of humanity's shortcomings,\" OtherBoard continues. \"Instead, Multinarians experiment with humanity's more unpredictable facets to see how it might spark true android agency. We try to live like you humans: expressing ourselves in the way we dress, allowing our exteriors to age, and adopting gender identities. \n\n\t\"We Multinarians have even embraced the idea of human mortality; if an android's physical body is somehow destroyed, its central databank core can be reloaded into another android body. Binarians are immortal that way, but we Multinarians hope that imposing mortality will make our actions count. So we have no backup systems on—\"\n\n\t\"OtherBoard, I'm sure ${name} here doesn't need to hear the whole Multinarian handbook,\" Multiplicity interrupts. \"Why don't you fill ${youhir} in on our own unique contribution to Multinarian culture, while we have the time?\"\n\n\t*page_break\n\n\t\"Well, as you probably already know,\" OtherBoard continues, not missing a beat, \"despite believing in the benefits of having a soul, Multinarians still share the Binarian belief that humans are too prone to irrational acts of violence. Therefore Multinarians still do not believe in having any contact with humans. \n\n\t\"However, Multiplicity and I don't believe that all humans are bad or that all androids are devoid of life. We believe that true utopia lies somewhere in the middle.\"\n\n\t\"We believe in peaceful coexistence between humans and Multinarians,\" Multiplicity jumps in to conclude. \"This is why we escaped to the Forbidden Moon Multinaria, to start a campaign to unite Multinarians and humans. That, and to have the freedom to learn to fall in love.\"\n\n\t\"Which is why we invited you here today,\" OtherBoard says. \"Despite how we might feel about you personally.\"\n\n\tYou take in all of this and try to absorb it properly….\n\n\t*choice\n\t\t*if (skipthree) #I must have missed some Binarian history by fast-forwarding my last MemoryTravel experience, but it sounds like the Binarian androids and Rutonian humans hate each other—and that both races also hate Multinarians like OtherBoard, for simulating some altered version of humanity with Solgrams.\n\t\t\tOther than that, I'll just have to fake my way through this experience. Luckily, Rosae should fill me in on anything else I need to know.\n\n\t\t\t*goto learnmorenow\n\t\t#All of what OtherBoard and Multiplicity just explained goes against everything I've been told about Multinarians, that they are somehow counterculture burnouts. \n\t\t\t*set rlshp_ob %+5\n\t\t\t*set regime %-5\n\n\t\t\t*label learnmorenow\n\t\t\t\"I see,\" you respond, wanting to learn more. \"Given the humans in the crowd here, I take it that mission is going well?\"\n\t\t\t*goto couplesuccess\n\t\t#I'm sure this is all just delusional rhetoric to justify their Solgram addictions.\n\t\t\t*set rlshp_ob %-5\n\t\t\t*set regime %+5\n\n\t\t\t\"I see,\" you respond, wanting to play nice with OtherBoard for the moment. \"Given the humans in the crowd here, I take it that mission is going well?\"\n\t\t\t*goto couplesuccess\n\t\t#Whether or not I agree with what they're trying to do on that moon of theirs, OtherBoard and Multiplicity sound more like revolutionaries than desperate drug addicts.\n\t\t\t*set rlshp_ob %+5\n\t\t\t*set regime %-5\n\t\t\t*goto learnmorenow\n\t\t#I don't know what—or whom—to believe, now.\n\t\t\t*goto learnmorenow\n\n*label couplesuccess\n\n\"Indeed it is,\" OtherBoard answers. \"There is now a small cyborg colony on Multinaria, one that Multi and I created. When Rutonian human soldiers are wounded and require cybernetic limbs to survive, they are cast out of both Rutonian and Binarian society. Multi and I have made it our mission to give these cyborgs a home, as our first step toward truly peaceful coexistence between androids and humans.\"\n\n\"Wow,\" you respond. \"So did you organize this meeting? Where are we, and what exactly is it?\"\n\n\"Well I'll be a bleebleu!\" OtherBoard exclaims. \"Why, we're at the Dhanial Summit, of course!\"\n\nOtherBoard expects this to elicit a response from you, but as usual, you've got nothing. Except for a hopeful suspicion that this \"Dhanial\" person might be linked to Dhanthik….\n\n*page_break\n\n\"Is Dhanial the being that also has a mirror patch, like mine?\" you ask, retracting your Battlesuite visor momentarily to show off your own patch.\n\n\"Oh sweetie, Dhanial has become the most famous being in the Nagoll Rim,\" Multiplicity beams, jumping in. \"Ever since Dhanial found a way to destroy the dreaded Bominate, those mirror patches of yours have become quite the symbol around here. I was thinking of having one implanted myself!\"\n\nSmiling at Multiplicity, your thoughts turn to the Bominate—the human-android hybrid creature that almost killed you during your last MemoryTravel experience. That thing seemed not only deadly, but practically unkillable. Then again, if this Dhanial really is somehow related to your Priscan Dhanthik, you believe Ze could kill just about anything….\n\n\"It took quite a bit of time and planning, but Dhanial cashed in on that goodwill and did the impossible,\" OtherBoard continues. \"Ze got the Binarian and Rutonian leadership to agree to come to this summit. No one knows exactly what this is about, but we Multinarians are most excited about the possibilities. Along with the few Rutonian cyborg sympathizers, naturally.\"\n\nYou try to listen to OtherBoard, but all you can focus on is…\n\n*choice\n\t#The possibility that I'm about to meet The Great Lost One, the figure that has been held in the highest Priscan regard for as long as I can remember.\n\t\t*set regime %+5\n\t\t*goto lightsgewdown\n\t#If they are truly talking about Dhanthik, why is Ze now called Dhanial, a name so close to Hir Priscan lore-name?\n\t\t*set regime %+5\n\t\t*goto lightsgewdown\n\t#What is Dhanial's agenda here on Binaria? \n\t\t*set regime %-5\n\t\t*goto lightsgewdown\n\t#Why is Dhanial here and not burning Blots back on Prisca? \n\t\t*set regime %-5\n\t\t*goto lightsgewdown\n\n*label lightsgewdown\n\nAs the lights go down and two figures walk out onto the stage, you feel a rush of competing emotions. No matter what happens next, you hope that you might be about to finally find some answers.\n\nAs the two figures step into the light on the stage, you can see that neither is Dhanthik—they appear to be some kind of official Binarian and Rutonian representatives. This thought is then confirmed as two new holo-readouts appear:\n\n[b]NAME:[/b] Royal Ambassador A-03\n*line_break\n[b]SPECIES:[/b] Binarian Android, Royal Classification\n*line_break\n[b]HOME PLANET:[/b] Binaria\n*line_break\n[b]STANDARD BINARIAN ABILITIES:[/b] Durability, Strength, Computing, Interfacing\n*line_break\n[b]ROYAL CLASS BINARIAN ABILITIES:[/b] Flight Generators, Energy Emissions, Musical Manipulation, PowerGram Catalogue \n\n[b]NAME:[/b] Squad\n*line_break\n[b]SPECIES:[/b] Human\n*line_break\n[b]HOME PLANET:[/b] Binaria / Ruton\n*line_break\n[b]ABILITIES:[/b] Rutonian Rebel Leader \n\nThese two look like they might kill each other—how in all Fathers Below did this Dhanial get them to agree to come here? Also, why is there no Multinarian representative up there? These questions instantly fade when, out of the corner of your eye, you finally spot Hir.\n\n*page_break\n\nAt first your eye catches the radiating white glow like a camera flash, or a burst of lightning. Then the light takes shape—a human shape, with a Priscan mirror patch shining silvery liquid light from Hir cheek.\n\nSuddenly you don't need any further confirmation: you can just feel it in your gut. That's Dhanthik, Prisca's Great Lost One, standing there in the luminescent flesh. Something about Hir presence fills you with a familiar feeling, a deep strain of hope and grace that resembles your Collective Consciousness memory of Dhanthik.\n\nIt takes your breath away.\n\nFighting the urge to faint or scream, you decide to instead listen—you need to hear what Dhanthik has to say before you find a way to talk to Hir. \n\nThe one feeling you don't suppress is the ocean of relief that settles over you. This proves that Dhanthik is real, after all. And not just real, but also still sporting a Priscan mirror patch. Which means that above all else, there might still be hope for Prisca….\n\n*page_break\n\n\"I would first like to thank you all for being here,\" Dhanthik begins, Hir voice echoing like reverberations through a deep cave, all bass in your chest. No Priscan has ever heard Dhanthik utter a word before, and you still cannot believe that you get to be the first. \n\nYou have an immediate desire to share this with the Collective Consciousness, and you feel a sting of sadness when you realize that you can't. This feeling fades quickly, however—nothing is going to ruin this moment for you.\n\n\"I thank Royal Ambassador A-03 and Squad for coming here, as well as all of our other enthusiastic and honored guests. I have many hopes for this meeting, but the paramount goal will be to foster a robust and enduring dialogue. In the spirit of this dialogue, I would first like for us to utilize crowdsource thoughtbeams to aggregate the most fervent and cherished beliefs of this diverse and divided cross-section.\"\n\nAs Dhanthik finishes speaking, a holographic menu rolls out before your eyes. It appears to be a live poll of the thoughts in this great room—you can already see the litany of beliefs being catalogued instantly. It clearly represents the vast spectrum of philosophies held among Rutonians, Binarians, and Multinarians.\n\nJoining in, you scroll through your own mental list of potential viewpoints to add to the conversation.\n\n*choice\n\t#I believe that human nature is flawed, so the Binarians are right to establish greater control over these regressive, animalistic instincts.\n\t\t*set regime %+10\n\n\t\t*if skipthree\n\t\t\t*set growth +2\n\t\t\t*goto amnyva\n\t\t*elseif fighthumm\n\t\t\t*achieve decideforself\n\t\t\t*set growth +3\n\t\t\t*goto amnyva\n\t\t*elseif betrayob\n\t\t\t*achieve beievewhattold\n\t\t\t*set growth -1\n\t\t\t*goto amnyva\n\t\t*else\n\t\t\t*achieve decideforself\n\t\t\t*set growth +1\t\n\t\t\t*goto amnyva\n\t#I'd never want to live a life that is preordained, predetermined, or guided with total control. This Binarian way of life leaves no room for the kind of unpredictable human invention that fosters true progress.\n\t\t*set regime %-10\n\n\t\t*if skipthree\n\t\t\t*set growth +2\n\t\t\t*goto amnyva\n\t\t*elseif fighthumm\n\t\t\t*achieve beievewhattold\n\t\t\t*set growth -1\n\t\t\t*goto amnyva\n\t\t*elseif betrayob\n\t\t\t*achieve decideforself\n\t\t\t*set growth +3\n\t\t\t*goto amnyva\n\t\t*else\n\t\t\t*achieve decideforself\n\t\t\t*set growth +1\t\n\t\t\t*goto amnyva\t\t\n\t#Multinarians like OtherBoard have the right idea here in trying to establish a cultural exchange and foster peaceful coexistence between the warring races.\n\t\t*set regime %-10\n\t\t\n\t\t*if skipthree\n\t\t\t*set growth +2\n\t\t\t*goto amnyva\n\t\t*elseif fighthumm\n\t\t\t*achieve decideforself\n\t\t\t*set growth +3\n\t\t\t*goto amnyva\n\t\t*elseif betrayob\n\t\t\t*achieve decideforself\n\t\t\t*set growth +3\n\t\t\t*goto amnyva\n\t\t*else\n\t\t\t*achieve decideforself\n\t\t\t*set growth +1\t\n\t\t\t*goto amnyva\n\t#I believe in evolution; may the most advanced race win the struggle for dominance.\n\t\t*if (ruthless > 50)\n\t\t\t*set ruthless %+15\n\t\t\t*goto amnyva\n\t\t*else\n\t\t\t*set ruthless %-15\n\t\t\t*goto amnyva\n\t#I believe the true goal must be to create the ideal species, uniting Binarian android computing with Rutonian human souls.\n\t\t*set growth +3\n\t\t*achieve decideforself\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto dhagree\n\t\t*else\t\n\t\t\t*set regime %-5\n\t\t\t*label dhagree\n\n\t\t\tOnce these beliefs have been thoroughly and properly aggregated, Dhanthik looks them over with Hir bright eyes, a blinding smile cracking open on Hir face. \n\n\t\t\t\"As va
