…smile?\n\n\"Well I'll be a bleebleu,\" OtherBoard murmurs.\n\n\"Bleebleu?\" you ask. \"What's a…wait, how can I even understand you? You know how to speak Priscan?\"\n\n\"Oh, they rewire all of our language centers when we arrive here, but some words just don't translate,\" OtherBoard explains, suddenly seeming a bit more chipper. \"Bleebleu is honey that comes from juwjuw-bees. Don't have those where you come from, I take it?\"\n\nYou shake your head—no, you don't have juwjuw-bees where you come from. Or robotic wild-women. Or floating men or giant creatures or just about anything you've seen since you touched down in this strange, insane place.\n\n*page_break\n\n\"You must find me very odd, then. I don't always talk like this, for the record,\" OtherBoard goes on. \"This is just a Solgram, a kind of personality matrix. This one's called 'Neurotic Urbanite.'\" \n\nOtherBoard pauses after saying this, her eye-lights and lips turning down in a way that almost simulates sadness. It's as if mentioning this is painful for her, somehow—assuming she can even feel emotion. OtherBoard takes another few seconds before her holo-head swivels back up toward you.\n\n\"I can swap it out for another, if you don't like it,\" OtherBoard offers.\n\n\"It's…fine,\" you say, trying to understand why OtherBoard has suddenly dropped the attitude and taken an interest in pleasing you.\n\n\"I'll swap it anyway, wouldn't want to make too bad of a first impression,\" OtherBoard says. \"I'll switch over to 'Jolly Rancher.'\"\n\nOtherBoard's eye-lights turn red for a few moments, and whatever she is doing to herself, you can't see it from this distant holo-projection. All that you know is that once OtherBoard's eye-lights return to white, they seem to look at you with a renewed softness.\n\n*page_break\n\n\"Well, ah'll be, we got a truly untouched innocent on our hands,\" OtherBoard says, her voice suddenly sounding deeper and, well, jollier. \"Ya have ta forgive mah earlier rudeness, most humans don't take too kindly to the android kind 'round where ah'm from. Now where do ah even begin? You've really never heard of planet Versus before? Or The Verses Scriptures?\"\n\n\"Never,\" you say. \"I tried to read as much about the galaxy as I could back on Prisca, but it wasn't exactly…easy.\"\n\nThat's when it really hits you: you're not standing on Priscan soil right now. All you've ever dreamed about was leaving your home planet to explore the galaxy, but you always assumed it would be a voluntary process. As this confirmed reality really settles in, all you can think is:\n\n*fake_choice\n\t#I don't want to leave now, not yet, not like this…not when my family needs me most. Not after what Mother asked of me.\n\t\tThough perhaps you'd feel better if you knew why and how you were brought to this \"planet Versus\" and how to get back to Prisca.\n\t#Despite my shock and fear and trepidation, I still feel a little pang of excitement somewhere deep in my chest. \n\t\tThough you'd feel even better if you knew why and how you were brought to this \"planet Versus.\"\n\t#I had always hoped to be hit with something unexpected, something truly bold and new, so I suppose my current situation falls into the \"be careful what you wish for\" category.\n\t\tThough perhaps you'd feel better if you knew why and how you were brought to this \"planet Versus.\"\n\t#Am I finally free? Or did I just trade one planetary trap for another?\n\t\tPerhaps you'd feel better if you knew why and how you were brought to this \"planet Versus.\"\n*comment endif\n\n\"Lucky you, stumbling onto me first,\" OtherBoard says, almost as if reading your mind. \"All us Multinarians have historical and cultural encyclopedias loaded as a standard part of our databanks. Ah can tell ya just about anything ya need to know about Versus.\"\n\n*if (rlshp_ob > 55)\n\t\"I happen to have the ability to absorb memories and abilities from others,\" you explain. \"I've never used it on a robot before, though. Actually, I've only ever used it on one non-Priscan before today.\"\n\n\t\"Well now, my grandparents were robots, darlin'. Ah'm a sophisticated Multinarian android,\" OtherBoard answers. \"But still, ain't that absorbin' business fascinatin'? Ah can't say how your mind might handle the data transfer, but ah could give you a small bit, just the essentials, if ya like. Might save us some time.\"\n\n\tOtherBoard has been nothing but kind to you, so you want to trust her intentions…but you still know almost nothing about her, or this Versus place. Could absorbing be the fastest way to learn what you need to?\n\t*goto abobtime\n*else\n\tYou're about to tell OtherBoard about your absorption powers, but think better of it. Even though she has suddenly become very kind, you can't be sure that you can trust OtherBoard's intentions yet. You still know almost nothing about her, or this planet you've been brought to.\n\n\tSince OtherBoard claims to know so much, perhaps you should just absorb what you need from her and move on?\n\t*goto abobtime\n\n*label abobtime\n*page_break\n\n*if absorbstranger\n\tYour absorption experience earlier didn't cause any damage, so perhaps the Priscan warning about absorbing from foreign entities isn't true. Though that was only a flash absorb: a full absorb could be much more difficult and hazardous.\n\t*goto fullabsorbexplain\n*else\n\tEven though it's supposed to be terribly risky to absorb the abilities of unknown entities, it's definitely a risk worth taking if it gives you the information you need to handle this situation.\n\t*goto fullabsorbexplain\n\n*label fullabsorbexplain\n\nFlash absorbs are great for acquiring surface skills and thoughts for a few minutes, but full absorbs give you access to the target's complete range of abilities and memories for up to forty-eight hours, whether you want the absorb to last that long or not. \n\nYou haven't had to perform a full absorb since your upper school graduation exams, but you think you remember how. It can be tricky, potentially causing harm to you or the absorption target if not performed properly. Not to mention the fact that you have no idea how full absorbing an android through a holo-extension might work, either. They didn't exactly offer that in any course of Priscan studies.\n\nConsidering all of this, how do you want to go about initiating the full absorb?\n\n*choice\n\t#Full absorb from OtherBoard only with her permission—and very cautiously.\n\t\t*set ruthless %-15\n\t\t*set rlshp_ob %+20\n\t\t*set solo %-10\n\n\t\t\"Would it be okay if I tried to absorb a bit, just to get my bearings?\" you ask.\n\n\t\t\"It'll be faster than me explaining it all to ya, that's for sure,\" OtherBoard answers. \"What do ah hafta do?\"\n\n\t\t\"You don't have to do anything,\" you say, taking a deep breath as you prepare for the full absorb. \"Just hold still.\"\n\n\t\tYou reach out your hand toward OtherBoard's holo-projection and close your eyes, hoping for the best.\n\n\t\t*if (forceful > 50)\n\t\t\t*set forceful %+10\n\t\t\t*goto absorbnrun\n\t\t*else\n\t\t\t*set forceful %-10\n\t\t\t*goto absorbnrun\n\t#Force the absorb from OtherBoard, then make a run for it. \n\t\t*set ruthless %+15\n\t\t*set rlshp_ob %-20\n\t\t*set solo %+10\n\t\t*set forceful %+10\n\t\t\n\t\tWithout warning, you reach forward and push your hand through OtherBoard's holo-projection, initiating the full absorb as quickly as possible. \n\n\t\tIt may be harsh, but this insane situation calls for extreme measures.\n\t\t*goto absorbnrun\n\t#Ask OtherBoard her permission to absorb to avoid conflict, but initiate the absorb even if she says no.\n\t\t*set ruthless %+15\n\t\t*set rlshp_ob %-10\n\t\t*set solo %-10\n\t\t*set forceful %-10\n\n\t\t\"Would it be okay if I tried to absorb a bit, just to get my bearings?\" you ask.\n\n\t\t\"It'll be faster than me explaining it all to ya, that's for sure,\" OtherBoard answers. \"What do I hafta do?\"\n\n\t\t\"You don't have to do anything,\" you say, taking a deep breath as you prepare for the absorption. \"Just hold still.\"\n\n\t\tThen, without giving OtherBoard a chance to protest, you reach forward and push your hand through her holo-projection, initiating the absorption process as quickly as possible.\n\t\t*goto absorbnrun\n\t\t\n*label absorbnrun\n*page_break\n\nThe absorption process feels odd at first, like picking up an instrument you haven't played in years. Then suddenly all of the right notes come back to you, trudging up that odd feeling of pulling and filling. It's almost like a kind of reverse sneeze, or an oddly angled stretch.\n\nYou had hoped the full absorb would work through the holo-projection channel, which basically seems to be an extension of OtherBoard's consciousness. As you feel your mind begin to tip and peak, you realize that you were right.\n\nSuddenly you experience a mad rush, like memorizing an equation while plummeting down a thrill ride. Your brain flips and flails, expanding until it feels bigger than your body, brimming with the information offloading from OtherBoard. \n\nThe sensation is singularly overwhelming. \n\n*page_break\n*set tech +6\n*set energy +3\n*set strength +3\n\nJust when you think you might pass out, you sever the connection and end the absorption. \n\nThen, when you open your eyes again, you find yourself lying flat on your back, staring at the sky through the twisted treetops.\n\nYou slowly sit up, just in time to see OtherBoard's holo-projection beginning to short out.\n\n\"Rebooting…restarting functions…reb—\" is all that comes through before the image of OtherBoard's holo-head disappears. \n\nBlerg. The full absorb must have shut down OtherBoard's systems somehow, which now means that you have no idea how to sort through whatever you just absorbed from her. At least you still seem to be fine….\n\nYou feel woozy, but in an ordered kind of way, like you want to vomit information. You also feel stronger, like electricity flows through your veins instead of blood. You feel around your body to see if anything has changed—usually Priscan absorbs only trigger mental changes, despite any physical abilities you might acquire. Priscan physiology is uniquely evolved to withstand such physical changes, but you do feel one difference:\n\n*fake_choice\n\t#My tall, lean body…\n\t#My short, stocky body…\n\t#My curvy body…\n\t#My wide-but-strong body…\n\t#My soft, delicate body…\n\t#My muscled body…\n\n…feels heavier somehow—honestly, it feels like your skin itself weighs more, like it has taken on some kind of metallic sheen. You wonder why your body allowed for this single physiological change, but as you plant your hands on the dirt to stand, you find that you have more pressing changes to address. \n\nA holographic readout has suddenly appeared in front of your face, just beyond your Battlesuite visor:\n\n[i]Versus is a mysterious and infamous planet, governed by the laws of the ancient Verses Scriptures. It remains a sacred space, where those selected are called to face the ultimate test.[/i] \n\n[i]Versus is said to be a place of great spiritual awakening, rehabilitation, and rebirth. However, it is also rumored to be a place of great danger. Those few who survive the Versus competition return to their worlds Reborn as legends.[/i]\n\n[i]All others perish.[/i]\n\n*page_break\n\nThe mysterious readout disappears, but what you've seen is enough to send your mind reeling. How have you never heard of this planet Versus before, from the bits of contraband knowledge you managed to smuggle? Why were you called here? What is this competition you have to survive? Who are the other strange alien beings here? Where are they from and what can they do? And what could you do if you absorbed their power? \n\nYou have so many questions to answer and so many decisions to make, but you realize one thing with striking clarity: you cannot do anything sitting here all alone. If you have any chance of making it back to Prisca to save your family or surviving this insane experience, you're going to have to figure this situation out.\n\nWhich means that it's time to do what you've always done best: explore this \"planet Versus\" and see what you can find.\n\n*finish\n", "v_prologue": "*comment é\n\n*image main_image.png\n\n${blank}\n\n*page_break\n\n*image prologue.png\n\n*image e_prologue.png\n\n${blank}\n\n*page_break\n\nThere would be something beautiful about this place, if it wasn't so haunted. It's them: the silverized statues, fluid and pulsing in their stillness, stretching across the garden hills in tidy rows. There are hundreds of them, each representing a life lost on this strange, foreign planet.\n\nPlanet Versus.\n\nYou haven't decided whether being called here is a blessing or a curse, but then you've only been here a few days. Up until now it's been nothing but shock and awe, wonder and adventure. Take your present company, for example: you stand beside a devastated android and a coding witch and a war-torn commander, an avian airprince and his towering slave, a racing weaponess and an alien deity. Where you're from, this wouldn't be near the realm of possibility, but here on planet Versus, any limits on the impossible have been cracked wide open.\n\nIn a way, it's everything you've ever dreamed of for your once-sheltered life. It's also more terrifying than you could have imagined. After all, you stand here at the funeral of someone you've just met—someone whose death you had a direct hand in sentencing. You stand underneath their memorial statue, knowing that before your time here is through, you're likely to see many more statues populate these hills. \n\nThat is, if your own doesn't take shape first. \n\n*page_break\n\nThat's when the cold reality grips you: \n\n[i]You don't want to die here.[/i]\n\nSo what are you going to do to make sure you survive planet Versus?\n\n*page_break Three Days and Two Worlds Ago\n\nToday is supposed to be a different day, a special day, but so far it's looking like all the others. You sit in the same seat in the same combat transplane, staring out the same window at the same set of scenes. You know you're supposed to be nervous, because today's battle is more important than any one you've faced before—but that's the thing: all you've ever faced is battle.\n\nWhen all you've ever wanted is something more.\n\nThough as usual, all you get is more of the same. Like now, looking out the window at the Priscan capital blurring by. You know that you've explored every crack and cobblestone that makes up the city, just as you've explored every cave and corner that makes up planet Prisca. You see the familiar anti-Blot warning posters, the ads for shared data plans, the banners bearing the Dhanthik Reflection, and wish that for once you'd see something you didn't expect to see.\n\nSo you try to put yourself somewhere else, the same way you do every day.\n\n*choice\n\t#I'm on a planet made of fire, steering a lava log through a molten lake.\n\t\t*set strength +1\n\t\tThe muscles in your arms flex as you use your icecore oar to navigate the bubbling molten rapids. You've been down this river dozens of times before, since you're the only explorer strong enough to collect the expensive elements forged in these riverbanks.\n\n\t\tAs you spot a cluster of glowing metals, you smile—tonight, you can afford to buy whatever you want.\n\n\t\tThough first you're going to have to steer your way clear of the lava fall gushing ahead.\n\t\t*goto memorysee\n\t#I'm behind a waterfall, hidden in a cavern of crystals pulsating distinct emotions.\n\t\t*set energy +1\n\t\tYou touch a red crystal and feel its energy pour through you, lighting your nerves with power and anger. \n\n\t\tThen you touch a blue crystal and feel cool satisfaction flow. Grounded green. Bright, happy yellow. Dark, black despair.\n\t\t*goto memorysee\n\t#I'm in an endless foreign city, negotiating the price of some mysterious delicacy. \n\t\t*set tech +1\n\t\tYou may not have any money, but you do know how to fix the cook's broken register system. She berates you for failing to pay for the eldermeat stew you just devoured, but it only takes a few hack commands from you to get the register up and running again.\n\n\t\tThen it's all you can do to find room in your stomach for the tartcrumbles the cook offers you as thanks.\n\t\t*goto memorysee\n\t#I'm leaning back in my Galactic Council chair, weighing the fate of worlds. \n\t\t*set command +1\n\t\tYou could allow the invasion hordes to conquer their neighboring planet, but is securing their minister's signature on your eon-construction contract worth those thousands of lives? You know that someone will have to rebuild in the face of all that destruction… but what of your sworn duty to intergalactic peace?\n\n\t\tPower and influence are such tricky things, aren't they?\n\t\t*goto memorysee\n\t#I'm jumping out of a bedroom window, hoping to escape the furious father chasing me.\n\t\t*set agile +1\n\t\tJust a moment ago all you felt was skin on skin, until a massive father barged in wielding a blade and cursing at you.\n\n\t\tWithin seconds you were flipping across the room and swinging down to the ground, wishing you had remembered to grab your clothes first.\n\t\t*goto memorysee\n\n*label memorysee\n*page_break\n\nThis is perhaps your most cherished memory and you remember it vividly, even though it isn't truly yours. \n\nYou absorbed it years ago from a stranded pilot who accidentally crash-landed in your backyard. You were just a child then, luckily, so the authorities didn't even suspect you had absorbed the memory. Though the fact that you did, and that you have kept it a secret all these years, breaks two of Prisca's most sacred laws.\n\nYou're pulled from this blasphemous thought as your sister Gilo hisses your name from the seat next to you: \n\n*choice\n\t#\"Caprica.\"\n\t\t*set name \"Caprica\"\n\t\t*goto genderchoice\n\t#\"Nilo.\"\n\t\t*set name \"Nilo\"\n\t\t*goto genderchoice\n\t#\"Godessa.\"\n\t\t*set name \"Godessa\"\n\t\t*goto genderchoice\n\t#\"Bludgeono.\"\n\t\t*set name \"Bludgeono\"\n\t\t*goto genderchoice\n\t#\"Gailford.\"\n\t\t*set name \"Gailford\"\n\t\t*goto genderchoice\n\t#\"Bohari.\"\n\t\t*set name \"Bohari\"\n\t\t*goto genderchoice\n\t#\"Kgoins.\"\n\t\t*set name \"Kgoins\"\n\t\t*goto genderchoice\n\t#\"Hillsaint.\"\n\t\t*set name \"Hillsaint\"\n\t\t*goto genderchoice\n\t#\"Phershorn.\"\n\t\t*set name \"Phershorn\"\n\t\t*goto genderchoice\n\t#Select your own name.\n\t\tYour first name is:\n\t\t*input_text name\n\t\t*goto genderchoice \n\n*label genderchoice\n\n\"${name}, show some respect!\"\n\nIgnoring Gilo's punch to your thigh, you turn your attention back inside the transplane, where it probably should remain. Mother is giving one of her speeches and you know that troops from all over Prisca would kill to hear a rallying cry from her, today of all days. You just don't imagine that Mother will say anything much different from the dozens of speeches you've heard before.\n\n\"I don't have to remind you how important this battle is,\" Mother continues, one hand resting on the holstered grav-gun at her side. That special edition grav-gun is like Mother's security blanket, or better yet, a kind of permanent extremity. You can't remember a time you've ever seen her without it laid against her hip, coursing with power and command.\n\n\"I will remind you, nonetheless. Today, the future of our entire planet depends upon us.\" Mother pauses, lapsing into one of her signature dramatic breaks. You watch as the troops sit a little straighter in their transplane seats—when Mother speaks, people listen. After all, she is the greatest Priscan general who ever lived.\n\n\"We've fought hard to keep the Blots from advancing this far, but the enemy we face is relentless. If they take control of the Collective Lifeplant, Prisca is lost forever. Which means that today, we must win.\"\n\nYou look to your right and see Gilo sitting still, her square jaw set, always the perfect soldier. Then you look across the transplane to the Medic Bay, where Father stares at Mother, a broad smile curved under his bushy moustache. As usual, he is practically made of pride—you can feel his emotions flowing freely through the cabin with everyone else's as Mother finishes her speech.\n\n\"Today must be the end of this black war,\" Mother finishes. \"Which means today must also be the first day of our new lives.\"\n\n*page_break\n\n\"In Dhanthik's glory, we share!\" Mother finishes, raising her fist in the air. You shout a cheer with the rest of the troops and immediately feel the swell of courage and terror and resilience in the transplane, passing from soldier to soldier. \n\nAutomatically, you feel your mind opening up, offering your own thoughts and feelings freely. You've always wondered what it might be like on other planets, if other cultures value sharing the way that Priscans do. You know firsthand that when you live in a world where everyone can absorb the abilities and memories of others, reciprocity becomes the golden standard. Still, you've always wondered what it would be like to keep things to yourself. What would it feel like to have a mind entirely untouched by others?\n\nThese are questions that have plagued you your entire life, though you suppose you already know a bit of what it's like to withhold. As the emotional shareburst builds into a frenzy inside the transplane, you bury your stolen pilot memory deep in the most private pocket of your mind, holding back just enough to keep that part of yourself hidden.\n\n*page_break Not Long After\n\nYou stand in a circle with your family in the private command office, reciting the standard pre-war Dhanthik Reflection. This always makes you think of your very first pre-war Reflection, back when you were in grade school, before anyone knew how grave and encompassing the Black Blot War would become. Mother has always been stern, but she was not yet a General to you then. You remember how much younger she had looked, before her light grey eyes turned entirely to steel.\n\nYou'd been playing in the pondpool with Gilo, losing at some intricate game she had created with trapballs and floating rings. Whenever the game shifted in your favor, the rules also seemed to shift to suit Gilo—which was fine by you, since you had long since learned to cheat at Gilo's games, anyway. She was so loyal and obedient, Gilo didn't even consider the possibility that someone might cheat, so she never thought to look for the signs. Though you suppose Gilo cheated in her own way, setting up her malleable rules to begin with…\n\nMother had come out into the yard in the middle of the game, dressed in her full Priscan Battlesuite armor, which she somehow wore as effortlessly as a summerdress. Father trailed behind her, as he often did, wearing not much more than a smile. Though something was different about Father's smile that day—it took on a labored quality, like it was stretched too tightly to hold for very long.\n\nFather toweled you and Gilo dry before Mother knelt down to speak to you both, smelling of metal and gravity fluid.\n\n*page_break\n\n\"I must go on a tour now, I hope to not be gone for long,\" she said. \"Gilo, I expect you to protect the family while I'm gone.\"\n\nGilo nodded and raised her hand across her broad chest, finding a way to salute in her own way before she even knew what it truly meant. She was a born soldier even then, with her sturdy frame and plain, pliable face.\n\n\"And ${name}, I want you to make sure to keep Father busy tending to the cuts and sprains from all of your exploring. Can you do that for me?\"\n\nYou nodded as well, though you were unable to mask the wave of fear that poured through you, seeing Mother off like this. She sensed this immediately, as all Priscan mothers do, and drowned out your fear with a burst of her own shared courage.\n\n\"It's high time I taught you both the pre-war Reflection,\" she said then, taking your hands into her own. \"It is meant to remind us to be a source of shared strength in all things, but especially in times of strife.\"\n\nThat was the first time you recited this Reflection as a family, but none of you knew then it would be far from the last…\n\n*page_break\n\n\"We are mirrors, forever reflecting, hiding nothing, sharing everything,\" your family whispers in unison now, echoing these same words across your shared minds.\n\nAs you repeat the words, you sneak open your eyes and see everyone's reflections continue infinitely, bouncing from mirrored wall to mirrored wall. Almost every structure on Prisca is made of mirrors, a powerful reminder to see yourself in everything, so that you may reflect everything in yourself. The metaphor is so potent, in fact, that all Priscans are branded with mirror patches on their left cheeks upon birth.\n\nYou stare into your own mirror patch now, reflecting your image endlessly across the ship. You wonder what it would be like if you could dive into this infinite abyss, if somehow the mirror could melt into a portal to take you to some new world, someplace new and uncharted. \n\nThough really, you'd even settle for a different life here on Prisca…\n\n*choice\n\t#I'd love to be a doctor, like Father.\n\t\tFather, of course, has supported your medical studies more than anyone, teaching you all he could about tourniquets and tonics. Still, time has always been too short for you to truly engage in anything but war—training a soldier takes far less time than training a medic, after all.\n\n\t\t*label stuckstuck\n\n\t\tSo you've been stuck serving as a soldier since you came of age. You've always felt trapped by this service, but you fear this feeling isn't confined simply to the war. It has always been hard for you to forget the fact that you're stuck on planet Prisca, period. \n\n\t\tThis portal fantasy is one you play on repeat, sadly, for no one has been allowed on or off Prisca for generations.\n\t\t*page_break\n\t\t*goto portalfant\n\t#My dream is to be an artist of some kind.\n\t\tThough Mother couldn't begin to understand such an endeavor, Father has always found ways to support your art, sneaking you supplies here and there. Still, time has always been too short for you to truly engage in anything but war.\n\n\t\t*goto stuckstuck\n\t#On second thought, I really do just want to be a galactic explorer outside Prisca.\n\t\tMother and Father have always done their best to quench your constant thirst for exploration, taking trips across Prisca's diverse terrain as often as possible. Still, time has always been too short for you to truly engage in anything but war.\n\n\t\tWhich is why this portal fantasy is one you play on repeat. Unfortunately, even were it not for the war, you fear your dreams of exploration would remain unfulfilled. \n\n\t\tFor no one has been allowed on or off Prisca for generations.\n\t\t*page_break\n\t\t*goto portalfant\n\t#I'd like to pursue an academic profession, to become a teacher or a lawyer.\n\t\tThough Mother couldn't begin to understand such an endeavor, Father has always found ways to support your studies, sneaking you ancient texts and lawbooks here and there. Still, time has always been too short for you to truly engage in anything but war.\n\t\t*goto stuckstuck\n\t#I want to be a Priscan Purist, serving as part of the Reflectionist Elders.\n\t\tWhile Mother couldn't begin to fathom a life of quiet study and prayer, she has always respected your desire to become a Reflectionist Elder, as a Priscan loyalist herself.\n\n\t\tInstead, Father has been the one to truly support your Purism, sneaking you mirrored symbols and reflectionbooks here and there. Still, time has always been too short for you to truly engage in anything but war.\n\t\t*goto stuckstuck\n\t#I've always dreamed of a simple life as a farmer.\n\t\tThough Mother couldn't begin to understand such a desire, Father has always found ways to support your passion, sneaking you gardening supplies and farming texts here and there. Still, time has always been too short for you to truly engage in anything but war.\n\t\t*goto stuckstuck\n\t#Truly, I see myself as some kind of political revolutionary.\n\t\tWhile Mother couldn't begin to fathom a life of debate and exposition, she has always respected your desire to become a political force, as a Priscan loyalist herself.\n\n\t\tInstead, Father has been the one to truly support your ambitions, sneaking you newstablets and history books here and there. Still, time has always been too short for you to truly engage in anything but war.\n\t\t*goto stuckstuck\n\t#Actually, I'm happy serving as a soldier, defending my planet.\n\t\tStill, there's a large part of you that wishes you could explore the galaxy beyond. Which is why this portal fantasy is one you play on repeat—especially because no one has been allowed on or off Prisca for generations.\n\t\t*goto portalfant\n\n*label portalfant\n\nIt has been centuries since the Priscan Elders decided it was imperative to protect the Collective Consciousness from any and all \"culturally impure\" alien knowledge. Whatever else you may believe, you've always found it difficult to understand the point of having the ability to share everything when everyone is the same and there's nothing new to learn. \n\nPrisca's Impure Black Market tries its best to keep you supplied with galactic textbooks and foreign holozines, exotic fiction and alien scripture, but you know the truth: There's an entire galaxy beyond Prisca filled with bold and exciting planets brimming with strange and wonderful cultures, and you hardly know anything about them.\n\nWith this in mind, do you still consider yourself a good Priscan?\n\n*choice\n\t#Yes, in every other regard, I open myself to others.\n\t\t*set ruthless %-10\n\t\t*set regime %+10 \n\t\t*set priscantruebeliever true\n\n\t\tYou believe that Priscans are meant to absorb and share everything they possibly can, to serve as human conduits of knowledge and culture. While you may not love the Purity Laws, you have no idea what Prisca would be like without them.\n\t\t*goto nonematter\n\t#No, I am a master of keeping secrets and hiding my true intentions.\n\t\t*set ruthless %+10\n\t\t*set regime %-10\n\t\t*set priscannonbeliever true\n\n\t\tYour mental stockpile of contraband knowledge is just the beginning—you've learned to hide a lot about yourself over the years. Who knows, maybe you could have devoted your life to changing things on Prisca if you hadn't had to constantly fight in this endless war…\n\t\t*goto nonematter\n\t#I believe in Prisca's doctrine of openness, but I do not believe in the Purity Laws.\n\t\t*set ruthless %-10\n\t\t*set regime %-10\n\t\t*set priscanconflicted true\n\n\t\tYou believe that Priscans are meant to absorb and share everything they possibly can, to serve as human conduits of knowledge and culture. You also believe that there should be no limitations on this sacred exchange. This is a belief you might have devoted your life to promoting, had it not been for this endless war…\n\t\t*goto nonematter\n\t#I want to be a good Priscan and am ashamed of my behavior, but I can't seem to help it.\n\t\t*set ruthless %+10\n\t\t*set regime %+10\n\t\t*set priscantruebeliever true\n\n\t\tWhile you may not like the Purity Laws, you have no idea what Prisca would be like without them. You've always wanted to respect the Laws, but no matter how hard you try, you've never been able to abide by them. \n\n\t\tSo you've spent your life ashamed of your secret lifestyle, constantly trying and failing to change your ways. Who knows, maybe you could have devoted your life to changing things on Prisca if you hadn't had to constantly fight in this endless war…\n\t\t*goto nonematter\n\n*label nonematter\n\n\"In Dhanthik's mighty name, we hold ourselves up in Hir stead, awaiting the glorious return.\"\n\nPulling your mind back from its usual wanderings, you close your eyes again. You try to focus on repeating the Reflection, on opening your mind to the desires of your family. Right now you all have the same desire: to win this war. Which is so…expected. \n\nFocusing harder, you push your powers to peek behind this desire, looking to find the more personal projections. It's considered impolite to dig further beyond what is offered by another Priscan, but you've gotten good at browsing surreptitiously through the minds of loved ones.\n\nWithin moments, you can feel how Mother wants to win the war for world peace, to save the lives of the troops under her care. The desire feels sharp, made entirely of edges. Father wants to win so your family can be safe and finally live a normal life, a feeling of ceaseless smoothness and roundness. \n\nGilo wants to win the war…actually, it doesn't feel like a want so much as a need. You're not sure what Gilo would do if the war ended, since a life in combat is all she has ever dreamed of. Still, she needs to win for the glory of victory. It's a feeling so bold and loud, it almost drowns out everything else.\n\n*page_break\n\n\"Mirrored Matron, ${name},\" Mother says as the Reflection comes to a close. \"I know we're meant to share all, but how many times must I tell you that it's poor manners to pry during a Reflection?\"\n\nYou feel your ears start to burn—you thought you had slipped through everyone else's desires undetected. Usually you're good at doing so, but something about your nerves today must be making you sloppy. You look at Mother's stern, unadorned face as you try to think up another explanation for your behavior. \n\n\"Don't mind Mother,\" Father says. \"You know how she gets before a big battle.\"\n\nFather kisses Mother and, as usual, he has a calming effect on her. She even tries to smile, but that's never been her strong suit. You've all faced battle together before, but never one this big, or this important. \n\n\"May I please have a moment alone with ${name}?\" Mother says. Father and Gilo don't seem pleased by this, but they are used to doing what Mother says without question. Once they have exited, Mother turns to you, her usually stern face set ablaze with worry.\n\n*page_break\n\n\"${name}, I've always known you have the most willful and curious nature in all of Prisca,\" Mother sighs. \"Mirrored Matron knows this war has been hard on all of us, but I have no doubt it has been the hardest on you. I know there are a hundred ways you'd rather be living your life. So trust me when I say that I fight this war for your freedom, as hard as I fight it for anything else.\"\n\nYou feel the urgency behind Mother's words as you listen, forcefully merging with your own. Still, as much as you appreciate them, you know these are not the words Mother has called on you to deliver.\n\n\"Despite all this, there is still something I must ask of you. I have thought on this matter a great while and have long since made up my mind, but there has not yet been a time I felt you needed to know. I fear that time has now come, for there has never been a battle more vital than the one we face today—or more dangerous.\"\n\nAs Mother pauses to clear her throat, you feel something from her you've never, ever felt before…\n\nFear.\n\n*page_break\n\n\"There is a chance today, more than any other day, that I may fall.\"\n\nMother says the words and she grimaces from the force of your own projected rejection, but she pushes through, determined as always.\n\n\"If that were to happen, all eyes would certainly fall on Gilo to inherit my command position, in Priscan tradition. While Gilo is the fiercest soldier I have ever known and I love her with all of my heart, she is meant to carry out orders, not command them.\"\n\nThe words land with a slap across your mind, but Mother's face remains even. How could she say that about Gilo? You've never met anyone more suited for war or leadership than your older sister….\n\n\"I can already feel that it will take you time to understand, and that comes as no surprise,\" Mother carries on. \"However, someday you will indeed understand. I will fight today with all that I have to keep the worst from happening, but if I should fall, I must ask you one dying wish.\"\n\n*page_break\n\n\"If I am to fall, you must promise to inherit the command of the Priscan army and win this black war in my stead.\"\n\nYou hear these words and are truly baffled by them. You're not sure what stings most, the idea of Mother dying or the fact that she has asked you to inherit the position Gilo covets most in the world—a position you'd much rather do without. After all, a soldier's duty always eventually ends, but a General's responsibility lasts for life. \n\nDespite your shock, Mother's steely eyes still demand a response. How can you even begin to answer such an impossible request?\n\n*choice\n\t#\"I… I don't know that I can accept this responsibility,\" I say earnestly.\n\t\t*set ruthless %-15\n\n\t\t*if (ruthless \u003c 50)\n\t\t\t*set rlshp_family %+20\n\n\t\t\t\"Your honesty is welcome, ${name},\" Mother replies, her expression finally softening. \"Mirrored Matron knows there is no greater evil than deception. However, your honesty, while valued, remains irrelevant. If Prisca is to survive where I should not, you must prepare for this role.\"\n\n\t\t\t*label whyme\n\n\t\t\t\"Why me?\" you ask, feeling quite incapable of considering anything else, at this moment. You're a good soldier in a fight, that much is true, but you're nowhere near as good as Gilo. She lives for this service and as the oldest, the army is hers to inherit. Even knowing that your Mother has uttered these words would break Gilo's heart. How will you ever manage to hide this from her, when you see her in a few moments?\n\n\t\t\t\"As I said, my child, someday you will understand,\" Mother sighs. \"I know you feel your purpose lies beyond Prisca, that you are somehow trapped here. However, you must hear me when I say this: Prisca needs you, like she needs all of us.\"\n\n\t\t\tAfter this, Mother pulls you into as much of a hug as your Battlesuite armors will allow. Mother is not one for hugs, so you know this means her final word on the subject has been spoken. Still, how can mother place the weight of a whole world on your shoulders like this? \n\n\t\t\tThen it occurs to you she has been carrying this weight for most of her life.\n\n\t\t\tAs you hug Mother tightly, you try to quiet your raging mind. You just hope, for every reason you can think of, this hug with Mother won't be your last.\n\t\t\t*goto groundrushes\n\t\t*else\n\t\t\t*set rlshp_family %-20\n\n\t\t\tMother instantly hardens, hearing your words.\n\n\t\t\t\"I'm afraid you don't have a choice, ${name},\" she says. \"If Prisca is to survive where I should not, you must prepare for this role.\"\n\t\t\t*goto whyme\n\t#\"I accept your request with honor,\" I say, hiding my true feelings of doubt.\n\t\t*set ruthless %+15\n\n\t\t*if (ruthless > 50)\n\t\t\t*set rlshp_family %+20\n\n\t\t\tYou cannot tell whether you have fooled Mother, but you can tell that she respects your words either way.\n\n\t\t\t\"That is good, ${name},\" Mother sighs. \"For if Prisca is to survive where I should not, you must prepare for this role.\"\n\t\t\t*goto whyme\n\t\t*else\n\t\t\t*set rlshp_family %-20\n\t\t\t\n\t\t\tMother instantly hardens, hearing your words.\n\n\t\t\t\"If you are going to lie, you'll have to do so more skillfully than that,\" she says. \"Mirrored Matron knows there is no greater evil than deception. And If Prisca is to survive where I should not, you must prepare for this role in earnest.\"\n\t\t\t*goto whyme\n\t#\"I don't have a choice in this, do I?\" I say. \"I've never had a choice.\"\n\t\t*if (ruthless > 50)\n\t\t\t*set rlshp_family %-10\n\n\t\t\t\"You may be right,\" Mother sighs, frowning. \"Still, if we do not win this war, no Priscan will know choice ever again. If Prisca is to survive where I should not, you must prepare for this role.\"\n\t\t\t*goto whyme\n\t\t*else\n\t\t\t*set rlshp_family %+10\n\n\t\t\t\"You may be right,\" Mother sighs, frowning. \"Still, if we want our world and our choice back, it seems we will have to earn it. If Prisca is to survive where I should not, you must prepare for this role.\"\n\t\t\t*goto whyme\n\n*label groundrushes\n*if (rlshp_family > 50)\n\t*achieve familyhigh \n\t*goto endofpro\n*else\n\t*achieve familylow\n\t*goto endofpro\n\n*label endofpro\n*page_break Too Soon After\n\nIt's deafening, the silence that comes before war. It's something you've heard your entire life, full of restlessness and anticipation, fear and adrenaline. The silence never lasts for long, though, a fact that is proven as you free-fall from the transplane with your squadron.\n\nAs the ground rushes up toward you, you can see the blackness creeping over the horizon, the withering tide of the Blots. This is what they do: they surge forward, propelled by their mindless imperative, consuming all life in their path, churning out the tar lakes and scorched earth they need to thrive. The Blots have already succeeded in converting a sixth of Prisca's terrain, but today their rotting march must end.\n\nOtherwise they will blot out your entire world.\n\n*page_break\n\nThe grav-glider in your standard Priscan Battlesuite activates and you swoop down toward the front lines with your squadron. You hit the ground and find yourself facing three trodding Blots, advancing as quickly as their sloshing limbs will carry them. \n\nYou've seen thousands of Blots before, but every time you see another, it sends a fresh chill up your spine. Each Blot stands eight feet tall, a tower of rotten black flesh that slimes and decays as it moves. Blots have no eyes or ears, no nose or mouth, just featureless black heads spiked with two protruding blacknamel tusks. They are like giant slugs with limbs, except they happen to smell ten times worse.\n\nAs you step forward, you see a Blot lurch violently and overwhelm a Priscan soldier, stabbing him with its long tusks. Blots are generally slow, but once in proximity to their prey, they experience surges of speed to stab mercilessly. The stricken soldier's skin begins to turn a purplish-grey within seconds, as the Blot drains the blood from his veins through its tusks. \n\nThe soldier is then tossed away, his body already beginning to bloat black, transforming into another number in the soulless Blot army.\n\n*page_break\n\n\"Chirp. Blot. Chirp,\" Rosae suddenly appears, fluttering around your head. You're comforted by Rosae's arrival, if only for a moment. She's your WorningBird, a special Priscan avian breed that remains incorporeal except to warn their masters of certain oncoming events. This particular warning may be obvious now, but Rosae has saved your life dozens of times by warning you of a Blot you didn't see coming. \n\nRosae has just enough time to twirl her small, blue-furred body across your line of vision before evaporating back into her pouch on your belt. Rosae has lived on your customary Priscan belt long before it was upgraded for combat, ever since your fifth birthday.\n\nBefore you were given your own WorningBird belt, you had always been jealous of Gilo's. She chose a belt colored of cold steel, to match Mother's. You thought long and hard about your own WorningBird, imagining that she'd become best friends with Gilo's. Except you always imagined your own WorningBird would live in a belt colored of…\n\n*choice\n\t#Blood red.\n\t\t*set beltcolor \"blood red\"\n\t\t*goto forceignote\n\t#Lively pink.\n\t\t*set beltcolor \"lively pink\"\n\t\t*goto forceignote\n\t#Lightning yellow.\n\t\t*set beltcolor \"lightning yellow\"\n\t\t*goto forceignote\n\t#Regal purple.\n\t\t*set beltcolor \"regal purple\"\n\t\t*goto forceignote\n\t#Giving green.\n\t\t*set beltcolor \"giving green\"\n\t\t*goto forceignote\n\t#Oceanic blue.\n\t\t*set beltcolor \"oceanic blue\"\n\t\t*goto forceignote\n\t#Sunny orange.\n\t\t*set beltcolor \"sunny orange\"\n\t\t*goto forceignote\n\t#Select your own color.\n\t\tYour chose the color:\n\t\t*input_text beltcolor\n\t\t*goto forceignote\n\n*label forceignote\nAs Rosae disappears back into your ${beltcolor} belt, you force yourself to ignore the burst of fear that erupts in your gut facing a fresh wave of Blots. Instead, you harness the adrenaline it provides and try to focus on your training and experience. \n\nBlots can survive most bodily harm, but they have one key weakness: if you destroy their mindheart nervous system centers, they die—assuming you believe that Blots were ever really alive to begin with. These mindhearts are located in the Blots' blacknamel tusks, but it's never clear which one, making destroying a Blot tricky, dangerous work.\n\nKnowing you need to destroy the correct tusks, how do you attack the three closest Blots?\n\n*choice\n\t#Grav-blast the Blots apart to incapacitate them. Then use bombpacs to explode their mindheart tusks all on my own.\n\t\t*set forceful %+10\n\t\t*set solo %+10\n\n\t\tYou pull your grav-gun up out of your hip holster and hold its 36-inch body steady with both hands. Priming the grav-converters, you take aim and fire several devastating blasts of redirected gravity at the Blots. You target the Blots' slick limbs, which blast off with ease from the concussive force of your grav-blasts.\n\n\t\tThe grav-gun blasts aren't strong enough to fracture blacknamel tusks, however. So once the Blots are reduced to useless torso stumps, you roll forward to deploy the bombpacs—forcing you to get much closer to the Blots than you would ever prefer.\n\n\t\tThe smell of the Blots' fetid corpse bodies is almost as overwhelming as the silence they bring. Blots project a field around their bodies that emulates the dead of space: frigid temperatures, limited air, and no sound. To be close to a Blot is to feel as lifeless as their countless hordes. \n\n\t\tAs you enter the Blots' coldzone, you feel a rush of chilled silence, a dense pocket of nothingness that you try desperately to focus through.\n\n\t\t*label puttylike\n\t\t*page_break\n\n\t\tIgnoring the wave of emptiness that washes over you, you toss out several bombpacs, targeting the Blots' blacknamel tusks. Once deployed, these putty-like packs are attracted to the tusk surfaces, sticking to them like magnetized projectiles.\n\n\t\tThe bombpacs succeed in obliterating the tusks of two Blots, shattering their mindhearts and triggering the decomposition process. You're about to move on to your next target when you realize that the third Blot is still standing, with both of its tusks intact. \n\n\t\tThe Blot managed to evade the bombpacs, somehow—a development that is made alarmingly clear as the Blot launches its stump at you, pinning you to the ground.\n\t\t*goto solobattle\n\t#Coordinate grav-blasts with my squadron to incapacitate the Blots. Then use bombpacs to explode their mindheart tusks while covered by my squadron.\t\n\t\t*set forceful %+10\n\t\t*set solo %-10\n\n\t\t\"Line 'em up, one, two, and three!\" you shout at your squadron, digging your feet into the dirt.\n\n\t\tYou pull your grav-gun up out of your hip holster and hold its 36-inch body steady with both hands. Priming the grav-converters, you take aim and fire several devastating blasts of redirected gravity at the Blots. You target your designated Blot's slick limbs, which blast off with ease from the concussive force of your grav-blasts.\n\n\t\tThe grav-gun blasts aren't strong enough to fracture blacknamel tusks, however. So once the Blots are reduced to useless torso stumps, three of you roll forward toward your Blot target—forcing you to get much closer than you would ever prefer.\n\n\t\tThe smell of the Blots' fetid corpse bodies is almost as overwhelming as the silence they bring. Blots project a field around their bodies that emulates the dead of space: frigid temperatures, limited air, and no sound. To be close to a Blot is to feel as lifeless as their countless hordes. \n\n\t\tAs you enter the Blots' coldzone, you feel a rush of chilled silence, a dense pocket of nothingness that you try desperately to focus through.\n\n\t\t*page_break\n\n\t\tIgnoring the wave of emptiness that washes over you, you toss out two bombpacs, targeting your chosen Blot's blacknamel tusks. Once deployed, these putty-like packs are attracted to the tusk surfaces, sticking to them like magnetized projectiles.\n\n\t\tThe bombpacs succeed in obliterating the tusks of your Blot target, shattering its mindheart and triggering the decomposition process. You're about to move on to your next target when you realize that the third Blot is still standing, with both of its tusks intact. \n\n\t\tThis Blot must have managed to evade the bombpacs, somehow—a development that is made alarmingly clear as the Blot launches its stump at one of the other soldiers in your squadron, pinning her to the ground.\n\t\t*goto teambattle\n\t#Go heat-invisible on my own and plant bombpacs on each of the Blots' tusks.\n\t\t*set forceful %-10\n\t\t*set solo %+10\n\n\t\tYou roll forward and activate your heat-invisible tech, forcing you to get much closer to the Blots than you would ever prefer.\n\n\t\tThe smell of the Blots' fetid corpse bodies is almost as overwhelming as the silence they bring. Blots project a field around their bodies that emulates the dead zone of space: frigid temperatures, limited air, and no sound. To be close to a Blot is to feel as lifeless as their countless hordes. As you enter the Blots' coldzone, you feel a rush of chilled silence, a dense pocket of nothingness. \n\n\t\tLuckily Blots can't see their prey; they can only detect when new heat signatures enter their coldzones. With your heat signature masked, Blots usually cannot detect you until you've done the damage you need to do.\n\t\t*goto puttylike\n\t#Have the squadron run a diversion so I can go heat-invisible and plant bombpacs on each of the Blots' tusks. \t\n\t\t*set forceful %-10\n\t\t*set solo %-10\n\n\t\t\"Line 'em up, one, two, and three!\" you shout at your squadron, digging your feet into the dirt.\n\n\t\tYou pull your grav-gun up out of your hip holster and hold its 36-inch body steady with both hands. Priming the grav-converters, you take aim and fire several devastating blasts of redirected gravity at the Blots. You target your designated Blot's slick limbs, which blast off with ease from the concussive force of your grav-blasts.\n\n\t\tThe grav-guns aren't strong enough to fracture blacknamel tusks, however. So once the Blots are useless torso stumps, you roll forward and activate your heat-invisible tech—forcing you to get much closer to the Blots than you would ever prefer.\n\n\t\tThe smell of the Blots' fetid corpse bodies is almost as overwhelming as the silence they bring. Blots project a field around their bodies that emulates the dead zone of space: frigid temperatures, limited air, and no sound. To be close to a Blot is to feel as lifeless as their countless hordes. As you enter the Blots' coldzone, you feel a rush of chilled silence, a dense pocket of nothingness. \n\n\t\tLuckily Blots can't see their prey; they can only detect when new heat signatures enter their coldzones. With your heat signature masked, Blots usually cannot detect you until you've done the damage you need to do.\n\n\t\t*page_break\n\n\t\tIgnoring the wave of emptiness that washes over you, you toss out several bombpacs, targeting the Blots' blacknamel tusks. Once deployed, these putty-like packs are attracted to the tusk surfaces, sticking to them like magnetized projectiles.\n\n\t\tThe bombpacs succeed in obliterating the tusks of two Blots, shattering their mindhearts and triggering the decomposition process. You're about to move on to your next target when you realize that the third Blot is still standing, with both of its tusks intact. \n\n\t\tThis Blot must have managed to evade the bombpacs, somehow—a development that is made alarmingly clear as the Blot launches its stump at one of the other soldiers in your squadron, pinning her to the ground.\n\t\t*goto teambattle\n\n*label teambattle\n*page_break\n\nYou rush toward the pinned soldier and immediately kick the Blot off her. She is about to thank you when the Blot springs up once again and knocks into you, pinning you to the ground instead.\n\n*goto teambattlejoin\n\n*label solobattle\n*page_break\n\n*label teambattlejoin\n*set life -1\n\n\"Blerg!\" you curse as you slam into the ground. You feel yourself take a hit to the back of the head and sure enough, your Battlesuite visor indicates that the hit has lowered your Life Count. Luckily this only takes you down one notch, but you can be sure there will be more damage if the Blot on top of you manages to sink its tusks into you. \n\nSo far you've been fighting\n*if (forceful > 50)\n\tforcefully,\n\t*goto probtest\n*else\n\twith cunning maneuvers,\n\t*goto probtest\n\n*label probtest \nso it's probably smartest to keep mastering that trait. This time, though, you should also sharpen your weapons skill or your natural abilities.\n\n*choice\n\t#Use another bombpac to take out both of the Blot's tusks, even though I'm in close proximity to the explosion. \n\t\t*set forceful %+15\n\n\t\tYou reach into your Battlesuite chest compartment and pull out two more bombpacs with lightning speed. You toss both up and watch as they stick to the Blot's blacknamel tusks plummeting toward your chest.\n\n\t\tJust as the Blot is about to sink its tusks into you, the bombpacs go off and send it reeling backwards.\n\n\t\t*if (forceful > 53)\n\t\t\t*set weapons %+10\n\t\t\t*set mastery +1\n\t\t\t*goto battleover\n\t\t*else\t\n\t\t\t*set weapons %+5\n\t\t\t*set life -1\n\n\t\t\tHowever, the explosion also catches you in close proximity. The heat of the blistering blast lowers your Life Count once again, though not much, thanks to your protective Battlesuite layers.\n\t\t\t*goto battleover\n\t#Crack one of the Blot's tusks with my bare hands and hope I choose the tusk that contains the mindheart.\t\n\t\tJust as the Blot is about to sink its tusks into your chest, you reach up with both hands and grab one. With all your strength, you crack the tusk in two, hoping you chose the right one.\n\t\t*set forceful %+15\n\n\t\t*if (forceful > 53)\t\n\t\t\t*set weapons %-10\n\t\t\t*set mastery +1\n\n\t\t\tSure enough, the Blot torso falls to the ground beside you, its nervous system successfully shattered.\n\t\t\t*goto battleover\n\t\t*else\t\n\t\t\t*set weapons %-5\n\t\t\t*set life -1\n\n\t\t\tThe Blot is temporarily stunned, but doubles back on you—that wasn't the correct tusk.\n\n\t\t\tJust as the Blot is about to strike with its remaining tusk, you reach up and grab it—but you quickly realize that you're too weak to crack a second tusk this quickly.\n\n\t\t\t*label gilosave\n\t\t\tYou think you're doomed, until the tusk suddenly explodes in your grip.\n\n\t\t\tYou scream from the pain of the blast spray hitting you, but when that clears, you look up to find Gilo standing nearby, pulling a fresh bombpac out of her Battlesuite chest compartment.\n\n\t\t\tBlerg. She's never going to let you live that save down.\n\t\t\t*goto battleover\n\t#Trick the Blot into biting down on my tuskbuster wristunit, which is indestructible.\n\t\tYou wave your wrist, hoping the fast motion is enough to draw the Blot's attention.\n\t\t*set forceful %-15\n\n\t\t*if (forceful \u003c 47)\n\t\t\t*set weapons %+10\n\t\t\t*set mastery +1\n\n\t\t\tSure enough, the Blot reacts and sinks its teeth into your wrist unit. Or at least it tries to, shattering both tusks on contact.\n\t\t\t*goto battleover\n\t\t*else\t\n\t\t\t*set weapons %+5\n\t\t\t*set life -1\n\n\t\t\tThe Blot doesn't take the bait, however, and tries to skewer you instead.\n\t\t\t*goto gilosave\n\t#Use a Priscan shareburst bolt to weaken the Blot, then retreat and take out its tusks from afar.\n\t\t*set forceful %-15\n\t\tSharebursts are the most common Priscan attack, a concentrated burst of mental matter that overwhelms most targets. Sharebursts work best on intelligent life-forms, but have been known to occasionally distract Blots.\n\n\t\tSince a distraction is just what you need right now, you unleash a torrent of memories and emotions at the Blot on top of you. You can see the shareburst bolt shooting from your forehead like a beam of thought energy, slamming into the Blot's putrid, blank face.\n\n\t\t*if (forceful \u003c 47)\n\t\t\t*set weapons %-10\n\t\t\t*set mastery +1\n\n\t\t\tThe Blot slows its tusk attack, temporarily stunned, giving you just enough time to knock it off and grab a fresh bombpac to finish the job.\n\t\t\t*goto battleover\n\t\t*else\n\t\t\t*set weapons %-5\n\t\t\t*set life -1\n\n\t\t\tThe Blot pauses for a second, but then quickly resumes its tusk attack. This is one tough Blot….\n\t\t\t*goto gilosave\n\n*label battleover\n*page_break\n*if (life = 9)\n\t*achieve prolifehigh\n\t*goto prochievetwo\n*else\n\t*goto prochievetwo\n\n*label prochievetwo\n\nWith the trio of Blots finally killed, you watch as their rancid bodies turn into a blackish jelly, a consistency somewhere between marrow and pudding. The gelatinous corpses melt into the ground, forming a tar-like pond that scorches whatever is underneath. The only things that can move across these quicksand-corpse Blotbogs once they have formed are other Blots. This is the Blot's final gift in death: more ruin.\n\nYou've only seen one being ever survive contact with the Blotbogs before—well, you didn't actually see it yourself, you experienced it as a top priority memory in the Priscan Collective Consciousness. Though you wouldn't need to tap into any collective memories to know who Dhanthik is—Hir presence has permeated almost every facet of Priscan culture since the Black Blot War began….\n\nSeveral years ago, in the early days of the war, there was a pivotal battle outside of Prisca's smallest city. Still unaccustomed to the relentless nature of the enemy they faced, the Priscan troops were being overwhelmed by the Blot hordes—until, seemingly out of nowhere, a large ball of pure white light fell from the sky. The radiating orb darted through thousands of Blots within seconds, burning them cleanly from the inside out and turning them to ash instead of their signature Blotbogs.\n\nOnce the legion of Blots had been thoroughly crisped, the orb hung in the air for a few moments before twisting and crackling its shape into that of a Priscan human, mirror patch and all. When the light cleared, the figure was swathed head-to-toe in white energy armor, obviously much mightier than the average Priscan. Much mightier than anything any Priscan had ever seen, for that matter.\n\n*page_break\n\nThe few surviving Priscan troops were stunned—no one had ever found a way to cleanly kill Blots before. The troops were further stunned when they tried to reach out to the figure and their absorption powers were completely blocked. Then, before they could learn any more about this strange savior, there was a bright streak of white light and the figure disappeared.\n\nMany attribute Prisca's early survival against the Blots to the appearance of this mysterious savior: surely the planet would have been overwhelmed without the advantage provided in this pivotal early battle. Since that epic showing, there have been many competing theories on who this godlike warrior might have been and where Ze might be now….\n\nIs the savior some kind of evolved Priscan, or some other being entirely? Is Ze lost somewhere on Prisca? Taken as a prisoner of the Blots? Transformed in shape and hiding among normal Priscans? Despite these questions, the enduring hope is that this revered warrior, this bright star capable of burning Blots from the inside out, will return someday to end the Black Blot War.\n\nThis figure was given the honor of a rarefied Olde Priscanian name: Dhan Thik, meaning literally \"the great one, lost to be found.\" \n\nAnd so the Legend of Dhanthik, The Lost One, was born.\n\n*page_break\n\nGiven the pervasiveness of the Black Blot War, Dhanthik has been elevated to a kind of deity in Priscan culture, a figure of hope to be respected and emulated above all else. A small minority, however, believe that the memory is a phantom creation, planted in the Collective Consciousness by the Priscan Elders to provide hope to an army of desperate and weary troops.\n\nThe memory tastes real to you—if it is somehow a fabrication, it is the most unprecedented forgery you've ever encountered. \n\nStill, what do you believe?\n\n*choice\n\t#The Legend of The Lost One has gotten me through some of my toughest battles. \n\t\tYou believe in Dhanthik wholeheartedly and without question.\n\t\t*set regime %+10\n\t\t*set dttruebeliever true\n\t\t*goto needfocustask\n\t#Honestly, I don't believe in the Legend. The only explanation for Dhanthik's brief stay and total disappearance is that the Priscan Elders needed to keep it short to successfully fake the event. \n\t\tTo you, Dhanthik is nothing more than an idol of false hope.\n\t\t*set regime %-10\n\t\t*set dtnonbeliever true\n\t\t*goto needfocustask\n\t#I believe in Dhanthik, but I believe there's more to the story than our limited knowledge provides. What if Dhanthik isn't even Priscan, but rather from the galaxy beyond? \n\t\tPerhaps Ze was just passing through for some reason you common Priscans don't understand.\n\t\t*set dtconflicted true\n\n\t\t*if (regime > 50)\n\t\t\t*set regime %+5\n\t\t\t*goto needfocustask\n\t\t*else\n\t\t\t*set regime %-5\n\t\t\t*goto needfocustask\n\n*label needfocustask\n\nRight now, however, you really need to refocus on the battle at hand. You activate your grav-glider and lift above the forming Blotbog, wincing as the sound and heat rushes back outside the collapsed coldzone. For a moment you can hear blasts and booms, screams of battle and rattles of death, but then the sound vanishes as another Blot approaches.\n\nYou can immediately tell that this is no ordinary Blot, as it flies over you on wings as black as night. It's a Blotboc, the only Blots capable of cognition—though that's being generous. Blotbocs only appear for crucial battles, their beady red eyes darting around with tepid awareness. These Blotbocs command the Blot hordes via their singular hive mind. In this way, you've always thought of Blots as a twisted reflection of Priscan values—Blots share everything too, though all that they have to share is the singular imperative to spread and assimilate.\n\nYou know Blotbocs are much more difficult to kill than ordinary Blots, especially since they retain one useful trait or skill after their Blot conversion—apparently this flying Blotboc had wings in a former life. Blotbocs also happen to have multiple mindheart nervous systems stored in various extra tusks that stick out of their bodies at odd angles, so killing them is much trickier.\n\nYou're already strategizing on how best to take this soaring Blotboc down when Gilo screams: \"It's heading toward the General's Station!\"\n\nHearing Gilo's voice, your mind flashes to Mother's final request in the private command office and you quickly cover it up—now is not the time for Gilo to learn this terrible truth. Instead, you spin to find that the Blotboc is indeed flying toward your Mother's squadron…\n\n*page_break\n\nAlong with three other Blotbocs approaching from opposite directions, each one gnarled with some gruesome individuality. One has nails as long and sharp as daggers, another has an extended tongue that lashes and flaps like a whip in the wind, and the last has limbs coiled with writhing blacksnakes.\n\nWithout hesitation, you reactivate your grav-glider, because you have to stop those Blotbocs. Mother's command squadron could no doubt handle one, maybe two Blotbocs at the same time—but never four at once. If Mother were to be taken in this battle, life as you know it would end, in every way. \n\nIn that moment, everything flashes before your eyes: Gilo's loyal games. Father's unconditional support. Mother's command position. Your own dreams. You know that the next move you make is crucial: it will mean life or death for your family. Maybe even for all of Prisca….\n\nYou fly forward, ready to coordinate with Gilo and her squadron, when suddenly you feel your stomach drop. The edges of your vision blur and deep red light begins to creep into the corners, until it pours over you entirely. \n\nThen the red light envelops everything and all you can feel is your body being burned apart, the world breaking into fluid crimson shards.\n\n*page_break\n\nThen you scream.\n\n*finish", "v_seven": "*comment é\n\n*image part_3.png\n\n*page_break\n\n*image chap_7.png\n\n*image e_chap7.png\n\n${blank}\n\n*page_break\n\n*if (lifemax = 11)\n\t*if (life \u003c 11)\n\t\t*set life +1\n\t\t*goto startseven\n\t*else\n\t\t*goto startseven\n*elseif (life \u003c 10)\n\t*set life +1\n\t*goto startseven\n*else\n\t*goto startseven\n\n*label startseven\n\nWhen you open your eyes back on Versus, the first thing you see is the wilder version of OtherBoard still standing dormant across the camp. As Nermal bounds forward to lick your face awake, Nards growls and yips at you from the doghouse. You force yourself to sit up and absentmindedly pet Nermal behind the ears, because your mind is still struggling to deal with the reality you have just uncovered:\n\nDhanthik is somewhere on Versus.\n\nYou briefly experience a flutter of purpose, a determined calm like a wave settling over the shore. In all of this chaos and uncertainty, have you found something to truly ground you? \n\nThis calm feeling only lasts a moment, however, before a new wave of questions comes crashing down.\n\n*page_break\n\nThe question that rises above all the others is by far the most terrifying: How did the MemoryTravel event happen in the true past? You were able to assist and save Dhanthik from the Bominate in your experience, but what really happened when you weren't there to intervene? Could it possibly be that Dhanthik was killed by the Bominate at that Summit?\n\nThe thought explodes a bomb of despair in your chest, but then you realize: if Dhanthik was killed in the true past, why would you see Hir bathed in Versus teleportation energy in MemoryTravel? Wouldn't that last Bominate acid shot just have killed Hir? Rosae said that MemoryTravel events tend to echo history, even with your presence there to disturb things. \n\nThen you think: you should be able to confirm this theory with OtherBoard once she finally wakes up. Looking over at her again, you find that her eye-lights have returned, projecting a status bar that reads: [b]25% Rebooted[/b]. You can already hear her internal cooling fans beginning to whir again.\n\nDhanthik's potential presence on Versus will have to be the first of the many questions you have for OtherBoard. Trying to work out some logic on your own, however, you suspect that since you haven't encountered Dhanthik yet:\n\n*choice\n\t#Dhanthik is probably one of The Elite Courte members I haven't met yet.\n\t\t*goto findmult\n\t#Dhanthik might possibly be on the Destructive side, given Hir clean-burn energy. Though I really hope not.\n\t\t*goto findmult\n\t#When Dhanthik was teleported to Versus, Ze was injured and constantly transforming, with no sense of self. Could Ze somehow be unknowingly living as someone else on Versus?\n\t\t*goto findmult\n\t#Dhanthik could have already been Reborn from Versus since Hir arrival. Or, far worse, Dhanthik could have died in a Versus Match.\n\t\t*goto findmult\n\n*label findmult\n\nYou find that these possible scenarios only continue to multiply as you consider them, so you stop yourself. Especially since one point becomes perfectly clear: the only way you'll learn the truth about Dhanthik is by finding out everything you can about the other inhabitants here on Versus.\n\nImmediately, you attempt to reengage with OtherBoard's databank readouts, but that's when you feel it—your full absorb of OtherBoard's abilities has been completely depleted. Could that be why she is finally rebooting? As you realize this, you also sense your general absorb abilities slowly returning, a feeling not entirely unlike your ears popping or your sinuses clearing.\n\nYou step toward OtherBoard to find that her status bar has progressed up to 35%, which means that she must be waking up soon. You know that however OtherBoard feels about you after your MemoryTravel experiences, talking to her will be—\n\nBefore you can finish that thought, you suddenly find yourself facing the crush of a surging waterfall. The sound of the water is so deafening that you instinctively cover your ears. Mirrored Matron, you'll never get used to these jarring, otherworldly transitions. Where the blerg are you now?\n\n*page_break\n\nYou look left and right to find that the waterfall before you has no end, nor does it seem to have any bottom that you can find. Looking directly down, you realize that you stand before the waterfall on…\n\n…an escalator? What the blerg? You spin to look behind you to find that the escalator reaches down as far as your eye can see. Spinning back around, you look up ahead…\n\n…and that's when you see Oli standing about ten steps up. \n\n[i]At least this now makes some kind of twisted sense,[/i] you think. Despite your current sensory overload, you still feel a little jolt hit your body at seeing Oli again.\n\nOli smirks as you spot ${olihir}, then says something you have no chance of hearing.\n\n*page_break\n\n\"I can't hear you,\" you scream, though even the sound of your own voice is drowned out by the thundering waterfall.\n\nOli crinkles ${olihis} brow for a moment before realizing something and laughing. Then ${olize} waves ${olihis} hand and silence overrides the sound, a transition that is almost as overwhelming as the waterfall, at first.\n\n\"Sorry, I forgot about the brainplane sensement. I always do that,\" Oli says, taking a few steps down toward you. $!{Olize} is dressed sharply but comfortably, in dark jeans and a black cardigan. A few droplets from the waterfall sprinkle ${olihis} glasses and \n*if olifemale\n\tOli pulls her sweater down a little to wipe them off, revealing a bit more of her chest. You look up, trying desperately not to stare.\n\t*goto aftersweater\n*else\n\tOli lifts ${olihis} sweater to wipe them off, showing off a tight patch of stomach muscles.\n\t*goto aftersweater\n\n*label aftersweater\n\nOli waves ${olihis} hand again, and all of the water droplets suddenly deflect away from you, as if bouncing off some invisible shield. You remember that your absorb abilities are finally restored, so you should be able to pick up some surface thoughts or emotions….\n\nWhen you reach out with your absorb powers, however, all you can sense is a warm, protective aura surrounding Oli. Every time you try to peek behind it, the light seems to slip further away, just out of your grasp. For whatever reason, Oli is blocking your ambient absorption—which you suppose is just another question to add to the ever-growing pile. \n\n*page_break\n\n\"Anyway, we have until the top of this escalator ride, then Queen Ashe will be done with the baptishower ceremony,\" Oli says, slipping ${olihis} glasses back on. \"After that, it might be some time before I can slip away again undetected, so I need to tell you what I need to tell you very quickly.\"\n\n\"What you need to tell me is why you have a Priscan mirror patch on your wrist,\" you say, proud of yourself for cutting through the distractions enough to focus on the most pertinent question. Something tells you that will prove to be a vital skill here on Versus, absorption powers or not.\n\n\"Priscans, always upset with others for what they choose not to know,\" Oli says, stepping down in front of you. \"There's just no time, unless you want to go for a swim.\"\n\nOli nods ${olihis} head to the top of the escalator, where there are only about thirty steps until it disappears into the middle of the waterfall.\n\n\"Really we only have time for this,\" Oli says, suddenly stepping closer and pulling you to ${olihir}. You can smell ${olihis} clean scent and feel ${olihis} skin on yours, making you dizzy for a moment. What is it about Oli that makes you react this way? \n\nAs Oli leans ${olihis} face down closer to yours, you realize quickly that you don't need to know.\n\n*page_break\n\n\"Sorry in advance for this,\" Oli says, before lifting ${olihis} wrist to your cheek. \n\nBefore you can protest, Oli presses ${olihis} mirror patch against yours. You've never seen two patches pressed together like this and you wonder why, because the sensation is euphoric.\n\nThe mirrors seem to bond and reflect, fusing and flowing at the same time. You feel a satisfying rush pulse through you and suddenly feel stripped naked—but in a comfortable, wonderful way. \n\nPeeling yourself away from the mirrormerge, you look up to find that Oli now floats in a blank space…\n\n*choice\n\t#Standing with a hammer in ${olihis} hands, ready to defend me.\n\t\t*set rlshp_oli %+15\n\n\t\t*label reflectionshows\n\n\t\tThen, reflected back from Oli's mirror patch, you see yourself doing the very same thing.\n\n\t\tWhat is this? Could this mirrormerge be another lost Priscan tradition, like MemoryTravel? Or is Oli just projecting this mirror patch commonality as an illusion to connect with you in this weird brainplane?\n\t\t*goto afterreflect\n\t#Standing naked, touching ${olihir}self.\n\t\t*set rlshp_oli %+30\n\t\t*goto reflectionshows\n\t#Standing with a baby in ${olihis} arms, both smiling the same smile at me.\n\t\t*set rlshp_oli %+30\n\t\t*goto reflectionshows\n\t#Standing with a book of secrets, ready to read to me.\n\t\t*set rlshp_oli %+15\n\t\t*goto reflectionshows\n\t#Standing with a knife, ready to plunge it into my back.\n\t\t*set rlshp_oli %-30\n\t\t*goto reflectionshows\n\t#Disappearing steadily from the feet up.\n\t\t*set rlshp_oli %-15\n\t\t*goto reflectionshows\n\n*label afterreflect\n\nYou then scream as a sharp pain pierces your cheek, like someone ripping an old bandage off of your dry skin. You feel a swirl and a rush and a pop, and suddenly Oli returns to normal, standing in front of the raging waterfall once again.\n\n\"Blerg, do I hate those,\" Oli sighs. \"But at least now we know we're on the same page. Which means I can trust you with the search for D'han T'hik.\"\n\n[i]Well, the hits just keep on coming,[/i] you think.\n\n*page_break\n\n\"Is Dhanthik still on Versus?\" you ask, skipping several other important questions that bubble to the surface of your mind, including how Oli even knows who Dhanthik is, or why ${olize} is pronouncing Hir name with those odd emphases. As Oli said, you have little time, and you know that the answer to this first question matters more than anything else.\n\nYour question also seems to catch Oli off guard, for a change—you have to admit, that feels really good. It feels even better when Oli looks you over with new eyes, seeming impressed.\n\n\"We're going to have to talk about how you figured that out already, if we ever get a chance,\" Oli says. \"But the answer to your question is more important.\"\n\nOli looks over ${olihis} shoulder to see there are only fifteen or so steps remaining. $!{Olize} then turns back to you and takes a quick, deep breath.\n\n\"D'han T'hik was indeed Selected by Versus and still resides on the Constructive side. Ze arrived here badly injured and in an amnesic coma. To protect Hirself, D'han T'hik then entered a transformative healing state, assuming the form of a new being. As a result, D'han T'hik does not remember who Ze really is.\"\n\n*page_break\n\nYou have no idea how Oli could know all this, but you suppose that if you yourself figured out half that much in a couple of days, anything is possible. You can somehow feel that what Oli says is true, not just because it resonates with your MemoryTravel experience, but also because something about that strange mirrormerge bonded you, whatever it was. As much as you want to figure out how Oli knows this, right now, you need to find out everything you can about Dhanthik.\n\n\"Okay, so if Dhanthik was teleported here a certain number of years ago, can't we figure out the exact cycle when Ze arrived and—\"\n\n\"I wouldn't risk coming to you like this if it were that simple,\" Oli interrupts. \"I don't know exactly why or how yet, but I have discovered that D'han T'hik is operating as an anomaly in the Verses System, a kind of repeating glitch. Somehow, even if D'han T'hik's assumed identity is killed or Reborn, D'han T'hik simply returns to Versus in a completely new assumed persona. I think it may have something to do with D'han T'hik's unique biology, placing Hir in some vegetative amnesic loop or a kind of cosmic coma that—\"\n\n\"Five steps left,\" you interrupt, nodding toward the nearing top of the escalator. \"How do we wake Dhanthik up from this coma glitch or whatever it is?\"\n\nOnce again impressed with your directness, Oli quickly answers: \"That's where you come in. D'han T'hik's false identities are crafted to be so thoroughly comprehensive that they can evade all kinds of psychic detection. This false identity believes itself to be real on every level. Nothing has been able to detect who D'han T'hik is hiding as so far, and I believe that Priscan MemoryTravel is the only way to identify D'han T'hik and awaken Hir from this cosmic coma.\"\n\n*page_break\n\n\"You're the first Priscan to enter Versus since D'han T'hik's disguised arrival,\" Oli rushes to finish. \"So you're going to have to MemoryTravel every single Constructive inhabitant on Versus until you find and awaken D'han T'hik. It appears The Great One is Lost to be Found by you, ${name}. Not to sound totally clichéd, but the fate of the entire galaxy may depend upon it.\"\n\nThere it is again, the suggestion that Dhanthik's mission—and by extension the Black Blot War raging on Prisca—has some greater galactic significance. Dozens more questions surge through your mind, but you sift through them with surprising clarity once again.\n\n\"How will I know in MemoryTravel who Dhanthik really—\"\n\n\"You'll know it when you see it, trust me,\" Oli answers. \"And your WorningBird should be able to help with—\"\n\nYou don't hear the rest of what Oli says, however, as the crushing sound of the waterfall rushes back into your ears. Oli doesn't seem aware of it, however, even though ${olihis} escalator step is about to be eaten up by the surging water. \n\n*if extraworning\n\t\"Go with your Soloist or Team Playing instincts here!\" Rosae abruptly chirp-shouts in your mind, leaving you only a moment to react.\n\t*goto oliwaterfalls\n*else\n\tYou only have a second to decide what to do.\n\t*goto oliwaterfalls\n\n*label oliwaterfalls\n*choice\n\t#Pull Oli down toward me to safety.\n\t\t*set solo %-25\n\n\t\tYou pull Oli down a few steps, giving ${olihir} a few more seconds to respond.\n\n\t\t*if (solo \u003c 40)\n\t\t\t*set rlshp_oli %+25\n\t\t\t*set mastery +1\n\n\t\t\t\"Good looking out,\" Oli says, winking at you. \"Listen, I'm going to do my best to keep your name on all the right lists here on Versus. In the meantime, you've got work to do.\"\n\t\t\t*goto obcampreturn \n\t\t*else\n\t\t\t*set rlshp_oli %+10\n\n\t\t\t\"That's nice and all, but I need you to stop worrying about others and start prioritizing keeping yourself alive,\" Oli says, crossing ${olihis} arms. \"Your mission is too important.\"\n\t\t\t*goto obcampreturn\n\t*if (rlshp_oli > 60) #Pull Oli down to safety, but also into a tight hug.\n\t\t*set rlshp_oli %+30\n\t\t*set mastery +1\n\n\t\tYou pull Oli down a few steps and into your arms, pressing ${olihis} body against yours. Oli locks eyes with you, so close that your lips almost touch.\n\t\t\n\t\t\"Blurgg, are you going to be dangerous for me,\" Oli says, shaking ${olihis} head.\n\t\t*if (solo > 50)\n\t\t\t*set solo %+25\n\t\t\t*goto obcampreturn\n\t\t
