ou definitely don't need to be told how each of your decisions impact these statistics. So you turn this function off by mentally pressing the [i]Disable Notifications[/i] button on the bottom corner of the holo-readout. Thinking that these stats might come in handy at some point, however, you save this information to access in the future on the Show Stats screen. \n\nAs you mentally rearrange these settings, you notice a Map Icon in the bottom left corner of your vision. Wondering how you possibly could have missed that before, you mentally click on it to find a 3D holographic map of Versus.\n\n[i]Fathers. Below.[/i]\n\n*page_break\n\n*image v_map.png\n\nYou look over the map and try to orient yourself in some small way. You're obviously on the Arrival Runway, having just come from the UniForest. To the north, the destinations seem more structured—there's a capital star over the Verses Village, which is in close proximity to the Farming Cottages. Then across the Love Lake is something called the Elite Courte Castle—is there some kind of regressive monarchy or feudal land system here? The map gives no indication of what the population might be, so it's very hard to tell what any of this really means.\n\nYour eyes wander south to below the Onyx Ocean, where the terrain seems far more wild—and treacherous. Reading the names listed there, you have visions of gushing magma rivers and haunted labyrinths, underground deathcaves and rusted thrillscapes. \n\nThis is all bookended by something called the Versus Barrier, which appears to be some kind of hemispheric border line. This must mean that Versus is not terribly large, certainly not even as large as Prisca—which is a below-average-sized planet to begin with, as far as you've been able to tell from your contraband readings. \n\n*page_break\n\nAs much as you'd love to explore all of these places, you figure you should head toward the place marked as the Versus Capital, the Verses Village.\n\nIn order to access the Verses Village, it looks like you'll have to get to the other side of the Icecap Mountains—you can either go over them or around them. Looking across the Arrival Runway, you see the Icecaps looming on the border, faint wisps of steam rising off their surface in the afternoon sunlight. As clear as the ice is, you still can't make out anything on the other side through the fluid distortion.\n\nOf course it would be faster to go over the Icecaps, but probably way more dangerous and strenuous. It would be much safer to go around the mountains, but that would also take much more time. The path around would take you through something called the Graceful Gardens. These sound lovely, but you're not sure you have time to take the scenic route right now.\n\nAs if that wasn't enough to consider, you also realize that you could utilize your grav-glider to get to the Village, or you could try to jog. It appears there are two tradeoffs to consider: time and distance, battery charge and lifestrain. \n\nSo what's your travel mode of choice?\n\n*choice\n\t#Jog around the Icecaps.\n\t\t*set weapons %-20\n\t\t*set forceful %-10\n\t\t*set life -1\n\t\t*set gravsave true\n\t\t*achieve gravsaveac \n\n\t\tYou may be putting strain on your body by doing so, but you'll also be saving precious grav-glider battery. After all, who knows when you might be able to recharge again?\n\n\t\tRunning forward and setting your pace, you head for the path that leads around the Icecap Mountains.\n\t\t*goto goaroundic\n\t#Grav-glide around the Icecaps.\n\t\t*set weapons %+20\n\t\t*set forceful %-10\n\t\t*achieve lifesaveac \n\t\n\t\tYou may be using precious grav-glider battery, but at least you won't be putting any unnecessary strain on your body and Life Count.\n\n\t\tJumping forward and activating your grav-glider, you head for the path that leads around the Icecap Mountains.\n\t\t*goto goaroundic\n\t#Hike over the Icecaps.\n\t\t*set weapons %-20\n\t\t*set forceful %+10\n\t\t*set life -1\n\t\t*set gravsave true\n\t\t*achieve gravsaveac \n\t\t\n\t\tYou may be putting strain on your body by doing so, but you'll also be saving precious grav-glider battery. After all, who knows when you might be able to recharge again?\n\n\t\tRunning forward and setting your pace, you head straight for the Icecap Mountains.\n\t\t*goto gooveric\n\t#Grav-glide over the Icecaps.\n\t\t*set weapons %+20\n\t\t*set forceful %+10\n\t\t*achieve lifesaveac\n\t\t\n\t\tYou may be using precious grav-glider battery, but at least you won't be putting any unnecessary strain on your body.\n\n\t\tJumping forward and activating your grav-glider, you head straight for the Icecap Mountains.\n\t\t*goto gooveric\n\n*label goaroundic\n*page_break Longer Later\n\nThe divination pollen sweeps in through your nostrils, and though it tickles, the sensation is distinctly euphoric. This side path is definitely taking you much longer, but it turns out that the scenic route has undoubtedly been worth it.\n\nYou were initially taken with how tranquil the Graceful Gardens seemed, with their carefully trimmed hedges and symmetrical floral bunches and closely cropped lawns. You were also daunted by how far the garden seemed to stretch, since its sheer size appeared completely at odds with its emptiness. It must take an absurdly large staff to keep the gardens so beautifully manicured, but you haven't encountered a single soul yet.\n\nOnce you stopped sneezing out what OtherBoard's readouts referred to as \"divination pollen,\" you started feeling rather tranquil and symmetrical yourself. You hadn't noticed how anxious and overwhelmed you were feeling about all of this until the calmness settled across you, like a wave receding. \n\nIn its wake, only thoughtful considerations about the paths behind and before you remain. Even Mother's mandate seems less daunting, somehow. Whatever \"ambient graceful forces\" this pollen possesses, it must do the same work on you that it does on the plants.\n\nYou have no idea how long you'll be here on Versus, but you do hope that you'll have a chance to return and spend some more time in these Graceful Gardens.\n\n*goto fleetvenomaarrive\n\n*label gooveric\n*page_break Shortly Thereafter\n\nYou feel the sweat pour down your forehead and wonder how mountains made of ice can exist in such insane heat. The moment you began to ascend the Icecaps, you noticed that the higher you climbed, the higher the temperature seemed to rise. \n\nNow that you're near the top of the first snowy peak, OtherBoard's readout tells you it's hotter than most Priscan summer days. How can this Icecap mountain exist in this kind of heat?\n\nYou consider taking off part of your Battlesuite upperarmor when you notice something frosty moving along the surface of the ice. You pause to catch your breath for a moment and examine the surface more closely. You are then rather surprised to find some kind of miniature snow-creature sliding slowly down the Icecap surface. As it slides, it spews a trail of fresh snow, seemingly re-frosting the mountain.\n\nOn cue, another one of OtherBoard's readouts rolls out:\n\n[b]SPECIES:[/b] Snoüman\n*line_break\n[b]HOME PLANET:[/b] Versus\n*line_break\n[b]ABILITIES:[/b] Snow and Ice Generation \n*line_break\n[b]ADDENDUM:[/b] Sole purpose to maintain the greatest work of Snoüman culture, the Versus Icecap Mountains\n\n*page_break\n\nYou lean closer to the miniature Snoüman and find it is made up of three ice cubes fused together, with a coating of powdery snow. Its eyes are made of dark blue jewels and its slotted mouth is filled with mini icicle teeth. It seems to smile up at you as it slides, so you reach out to pet it. \n\nThough you are quite surprised when the Snoüman frostbites the tip of your finger. \n\nPulling back, you make sure not to bother any of the dozens of other Snoümen you now spot sliding down the Icecaps.\n*goto fleetvenomaarrive\n\n*label fleetvenomaarrive\n*page_break\n\nBefore you can go any farther, however, you hear what sounds like a transplane soaring behind you. You feel its rattle reverberate through your chest and your stomach drops uncomfortably. \n\n\"Chirp. Incoming. Chirp,\" Rosae says, appearing to warn you of this impending company before you can even spin around. By the time Rosae disappears back into her belted home, you turn to see what—or who, you suppose—is approaching.\n\nWhat you find makes your jaw drop.\n\n*page_break\n\nYou see the thing making the roaring sound, first. It appears to be another android, one that would almost remind you of OtherBoard, except this would be the high class version. This model looks more like some kind of statuesque centurion, streamlined with sleek, shiny metal pieces made of titanium so fine, they don't require any paint. The centurion has a genderless humanoid shape topped with a white, featureless faceplate that has a solid sapphire \"A\" fused to its front.\n\nAs you lay eyes upon the centurion, its engines suddenly kick from a boom to a quiet whir. Evidently it employed these sounds so as not to sneak up on you, which is slightly reassuring. Though there is something decidedly less reassuring about the figure you see flying next to the centurion, since she may be the most striking woman you've ever seen.\n\nShe appears to be over six feet tall, with limbs that are impossibly long and lean. She wears a high-slitted, flowing black dress covered in gold chain links and thigh-high black boots plated with equally fine gold. The most stunning part of her look, however, is her own gold-toned skin and jet-black hair.\n\nYou certainly never met anyone back on Prisca who looked like this. If you had, you imagine that pretty much everyone would be attracted to her. Considering that all Priscans experience every form of sexuality from the Collective Consciousness upon entering adulthood, Priscans are accustomed to the idea of a sliding scale of sexuality. That being said, you discovered long ago that:\n\n*choice\n\t#I am only attracted to men.\n\t\t*set attractedtomen true\n\t\t*set olimale true\n\t\t*set bremale true\n\n\t\tGrowing up on Prisca, you've had complete freedom to explore your own sexuality without any cultural biases or stereotypes. While other Priscans may have more fluid attractions, you find that you are most consistently attracted to men.\n\n\t\tLooking upon the glow of this golden goddess, however, you can see why someone might try to alter that predisposition….\n\t\t*goto venumatalk\n\t#I am only attracted to women.\n\t\t*set attractedtowomen true\n\t\t*set olifemale true\n\t\t*set olize \"she\"\n\t\t*set olihis \"her\"\n\t\t*set olihir \"her\"\n\t\t*set brefemale true\n\t\t*set breze \"she\"\n\t\t*set brehis \"her\"\n\t\t*set brehir \"her\"\n\n\t\tGrowing up on Prisca, you've had complete freedom to explore your own sexuality without any cultural biases or stereotypes. While other Priscans may have more fluid attractions, you find that you are most consistently attracted to women.\n\n\t\tAnd this golden goddess is without a doubt the most gorgeous woman you've ever laid eyes upon.\n\t\t*goto venumatalk\n\t#I don't see gender, I see people. Gender, or lack thereof, doesn't concern me.\n\t\t*set attractedtomen true\n\t\t*set attractedtowomen true\n\t\t*set pansexual true\n\t\t*set breandrog true\n\t\t*set breze \"ze\"\n\t\t*set brehis \"hir\"\n\t\t*set brehir \"hir\"\n\n\t\tYou don't rely on categories to decide who you're attracted to. \n\n\t\tIf push were to come to an absolute shove, however, you do find yourself most often attracted to:\n\n\t\t*choice\n\t\t\t#Men.\n\t\t\t\t*set olimale true\n\n\t\t\t\tStill, this golden goddess is without a doubt the most gorgeous person you've ever laid eyes upon.\n\t\t\t\t*goto venumatalk\n\t\t\t#Women.\n\t\t\t\t*set olifemale true\n\t\t\t\t*set olize \"she\"\n\t\t\t\t*set olihis \"her\"\n\t\t\t\t*set olihir \"her\"\n\n\t\t\t\tAnd this golden goddess is without a doubt the most gorgeous woman you've ever laid eyes upon.\n\t\t\t\t*goto venumatalk\n\t\t\t#Androgyny.\n\t\t\t\t*set oliandrog true\n\t\t\t\t*set olize \"ze\"\n\t\t\t\t*set olihis \"hir\"\n\t\t\t\t*set olihir \"hir\"\n\n\t\t\t\tIt doesn't matter what this golden goddess is—she's unequivocally the most gorgeous person you've ever laid eyes upon.\n\t\t\t\t*goto venumatalk\n\t#I'm most attracted to androgyny and uncategorizable identities, but I don't necessarily discriminate.\n\t\t*set attractedtomen true\n\t\t*set attractedtowomen true\n\t\t*set androgsexual true\n\t\t*set oliandrog true\n\t\t*set olize \"ze\"\n\t\t*set olihis \"hir\"\n\t\t*set olihir \"hir\"\n\t\t*set breandrog true\n\t\t*set breze \"ze\"\n\t\t*set brehis \"hir\"\n\t\t*set brehir \"hir\"\n\n\t\tIt doesn't matter what this golden goddess is—she's unequivocally the most gorgeous person you've ever laid eyes upon.\n\t\t*goto venumatalk\n\n*label venumatalk\n\n\"Now, what have we here?\" the golden goddess says as she lands beside the centurion, just a few feet in front of you. You try to gain your bearings enough to speak, but find it very difficult. You knew that the galaxy was full of diverse beings, but blerg…these two are beyond even your own wildest imaginings.\n\nAs the pair's metal-clad feet press into the ground, dual holo-readouts suddenly appear before your eyes. Taking a moment, you try to focus on them quickly before saying anything.\n\n[b]NAME:[/b] Royal A-08\n*line_break\n[b]SPECIES:[/b] Binarian Android, Royal Classification\n*line_break\n[b]HOME PLANET:[/b] Binaria\n*line_break\n[b]STANDARD BINARIAN ABILITIES:[/b] Durability, Strength, Computing, Interfacing \n*line_break\n[b]ROYAL CLASS BINARIAN ABILITIES:[/b] Flight Generators, Energy Emissions, Musical Manipulation, PowerGram Catalogue \n\n[b]NAME:[/b] Lady Venuma Grecca\n*line_break\n[b]SPECIES:[/b] Demigoddess\n*line_break\n[b]HOME PLANET:[/b] Wone\n*line_break\n[b]ABILITIES:[/b] Flight, Durability, Strength, Enhanced Senses, Energy Redirection, Knowledgeability, Charms, Intuition\n\n*page_break\n\n\"This Humm just data-read us,\" Royal A-08 says in a robotic, monotone drone that pulls you out of your readout trance. \"How can that…I see.\"\n\nRoyal A-08 doesn't say anything more, nor does it have any way to make expressions given its complete lack of facial features, but you can still somehow sense disgust radiating from it. At first you think this is just your Priscan ability to pick up on ambient emotions, but then you remember that this sixth sense is dampened when you're flooded with a full absorb. \n\nAs you feel around the edges of Royal A-08's disgust, you realize that it seems thinner, less organic than usual emotions. Perhaps you can feel it because of some mechanistic sense you picked up from OtherBoard?\n\n\"This Humm is capable of absorbing abilities,\" Royal A-08 finally drones—though since it has no mouth, you're not exactly sure where its voice is coming from. Your best guess would be a set of speakers situated somewhere on its chest. \"It had the audacity to extract from a Binarian. Even taking from a filthy Multinarian is a crime punishable by—\"\n\n\"A-08, you are not on Binaria anymore,\" Lady Venuma interrupts, her voice ringing like some ancient bell. \"You are well aware that those rules do not apply here.\"\n\n\"I have the information we require,\" A-08 reports flatly. \"I will depart before the compulsion to expunge this monstrosity becomes unalterable. Stay if you wish.\"\n\nWith one last blast of intangible hate, A-08 reactivates its flight systems—at the loudest possible decibel level—and rockets back into the sky.\n\n*page_break\n\n\"That A-08, all charm,\" Lady Venuma laughs. She watches as A-08 disappears into the distant horizon, then turns back to you. When she does, you could swear that sunlight shines directly out of her eyes. Her golden features are so sharp and symmetrical, it's almost as if they've been carved out of stone. The effect is at once stunning and cutting.\n\n\"Never mind that. I am Lady Venuma Grecca, Demigoddess of The Wone. Now, just who might you be?\"\n\n\"I'm ${name} Thomil, of planet Prisca,\" you say, before you can even stop yourself. There's just something about Lady Venuma that makes you want to trust her. No, it's more than that: you absolutely know that you can trust her…\n\n\"Chirp. Coercion. Chirp,\" Rosae suddenly appears to say, hovering behind your ears as if to avoid Lady Venuma's gaze.\n\nWell, that would certainly explain the warm fuzzies you're suddenly feeling. This must be what the holo-readout meant when it listed one of Lady Venuma's abilities as \"Charms.\" Would this also mean that Lady Venuma is truly considered a goddess, in some way? You're not entirely sure what that means, but you're definitely eager to find out.\n\n\"How…quaint,\" Lady Venuma says, staring daggers at Rosae before your WorningBird evaporates back into her ${beltcolor} pouch on your belt. Lady Venuma then turns her attention back to you, a warm smile spreading across her face. \"All of my kind possess the divine charm over mortals. If it is not to your liking, I can dampen the effects. Now, let us see, planet Prisca…\"\n\n*page_break\n\nLady Venuma peers deep into the distance for a few moments, giving you a chance to take in her incredible physique. It seems anatomically impossible, her long limbs and taut torso connected to her broad, ample curves. It's almost as if she is an action figure or fashion doll brought to life. You soak in the sight, feeling awed just to be in her presence. \n*if (attractedtowomen = false)\n\tYou wonder if the men from Lady Venuma's planet have equally breathtaking bodies…\n\t*goto venulok\n*else\n\tCould all the \"goddesses\" from Lady Venuma's planet possibly be this gorgeous?\n\t*goto venulok\n\n*label venulok\n\nLady Venuma gazes at you again and you try to look away quickly, unable to fight the blush that flushes into your cheeks. It almost feels as if she can see right through you, somehow, like you're both invisible and infinitely visible to her, in every way.\n\n\"Stars Between, it certainly is rare to encounter an intelligent planet in this galaxy that The Wone have not yet enlightened,\" Lady Venuma says. \"Though this does explain why you did not kneel upon my descent.\"\n\n\"Are you really a…goddess?\" you ask, hating how dumbstruck you must sound. You can't seem to help it, no matter how hard you try to focus through Lady Venuma's charms.\n\nLady Venuma laughs a thick laugh, then steps closer, as if to examine you. Being this near to her lights every one of your nerves on fire and stands all of your hairs on end. You can practically feel the power oozing off her skin. \n\n*fake_choice\n\t#Standing this close to Lady Venuma is intoxicating. I want to believe she is truly a goddess.\n\t\t*set lvbeliever true\n\t#I've never believed in anything other than the Mirrored Matron and the Fathers Below, abstact figures that provide the impetus for constant self-reflection on Prisca. I'm not sure I believe there could be such a thing as a \"goddess\" that exists as flesh and blood.\n\t\t*set lvskeptic true\n\t#The only thing resembling religion back on Prisca is the devotion to Reflection and the Purity Laws, paired with a ubiquitous reverence for Dhanthik. I'm fascinated by the idea of other potential belief systems….\n\t\t*set lvfascinated true\n\t#Power does not equal divinity—I wonder if Lady Venuma knows the difference.\n\t\t*set lvskeptic true\n\nWhatever you believe, something tells you that Lady Venuma has this overwhelming effect on just about everyone, if she wants to. With some practice, you hope you'll be able to resist her charms…assuming that you even want to.\n\n\"I have found that the word 'goddess' is a very tricky thing of late,\" Lady Venuma begins. \"In some worlds, many worlds, I am considered a divine force. As most Wone do, I once thought myself divine, even as a mere Demigoddess. However, being trapped on this planet has allowed me to see things…differently.\"\n\nLady Venuma creeps even closer, leaning to whisper in your ear. As she does, you feel a warm chill ripple through your body.\n\n\"After all, to the simple dog, the master seems a goddess, does she not?\" Lady Venuma whispers. \"I have learned that divinity is all a matter of perspective.\"\n\nLady Venuma steps in front of you, a staggering tower of beauty and wisdom. Suddenly your body \n*if attractedtowomen\n\tthrobs with respect, standing face-to-face with Lady Venuma.\n\t*goto lllone\n*else\n\tquakes with respect and awe, despite your best efforts to seem unaffected.\n\t*goto lllone\n\n*label lllone\n\n\"And power, of course,\" Lady Venuma finishes. \"Tell me, do you desire a taste of my power, little lost one?\"\n\n*page_break\n\nThrough all the fog clogging your mind, a little voice tries to pierce through: [i]She's testing you,[/i] it says. [i]She's never met a Priscan before; she wants to see how you'll react to her.[/i]\n\nYou try to listen to this voice inside your head, but it's just a drop in the downpour gushing through your mind. Lady Venuma's invitation is impossible to resist, but thankfully you're unable to absorb anything further until OtherBoard's full absorb subsides. \n\nKnowing this, you struggle to speak without stammering:\n\n*choice\n\t#\"You're not my type, lady.\"\n\t\t*set ruthless %+10\n\n\t\t*if (ruthless > 55)\n\t\t\t*set rlshp_venuma %-5\n\t\t\t*set mastery +1\n\n\t\t\t\"You are bold. I like bold,\" Lady Venuma says. \"That being said, I do not abide disrespect. You will be sure to mind your tone in the future, I am sure.\"\n\n\t\t\t*goto vvexplainv\n\t\t*else\n\t\t\t*set rlshp_venuma %-25\n\n\t\t\t\"If there is anything I hate more than rudeness,\" Lady Venuma begins, \"it is posturing. Do not overstep your bounds, little lost one.\"\n\n\t\t\t*goto vvexplainv\n\t#\"I have to admit, I definitely could use a friend to help me figure this planet out.\"\n\t\t*set ruthless %-10\n\n\t\t*if (ruthless \u003c 45)\n\t\t\t*set rlshp_venuma %+15\n\t\t\t*set mastery +1\n\n\t\t\t\"That, I can certainly help with,\" Lady Venuma says, seeming to sense your platonic push.\n\t\t\t*goto vvexplainv\n\t\t*else\n\t\t\t*set rlshp_venuma %+5\n\n\t\t\t\"Could you, now?\" Lady Venuma says, narrowing her eyes at you, as if she can see through your attempt at faux friendliness.\n\t\t\t*goto vvexplainv\n\t#\"I'd like more than a taste, my lady.\"\n\t\t*if attractedtowomen\n\t\t\t*set ruthless %-10\n\t\t\t*set rlshp_venuma %+25\n\t\t\t*set mastery +1\n\t\t\t*set venumataste true\n\n\t\t\tLady Venuma half-smiles and tilts her head, curious. This kicks your heart up a few paces, until Lady Venuma steps even closer toward you, which sends your heart into full thundering. Your whole body begins to pulse, and you feel yourself surge, your head suddenly growing clouded, heavy. All you can think of is satisfying the desire that now courses through you.\n\n\t\t\tYour eyes travel over every curve and muscle of Lady Venuma's body as she comes nearer still, stopping just in front of you. You can smell her now, a mix of clean water and something sweeter, like vanilla. You're so wrapped up in it that you don't even realize Lady Venuma has reached out her hand until you feel her golden skin on your arm. The shock of it sends waves through your own skin, the warmness radiating out in circles.\n\n\t\t\tLady Venuma then runs her hand up across your stomach, tracing her fingers up slowly to your chest, just high enough that you have to hold your breath. You want to touch her too, but you dare not, not without her permission. Lady Venuma's hand continues roaming and she makes eye contact with you. You can already tell, she likes what she feels. \n\n\t\t\tSo much so, you suddenly find her bright, deep eyes coming closer, until Lady Venuma's lips touch your neck. Your legs nearly give out as the sensation ripples over your skin. You almost moan, only holding back because you want to hear as Lady Venuma breathes in the scent of your own skin.\n\n\t\t\t*page_break\n\n\t\t\tYou've been intimate before, but this feeling is so overwhelming, so different—like the desire might swallow you whole. You feel your own hands rise toward Lady Venuma, but then her hands travel back down your body and brush below your belt. \n\n\t\t\tYou gasp out loud from the moment of contact, and Lady Venuma steps back. It's all you can do to keep from collapsing once she does.\n\n\t\t\t\"Oh, that conjoining shall be rather epic,\" Lady Venuma says, closing her eyes. \"Your newness is mesmerizing. It has been quite a while since a mortal so thoroughly stimulated me.\"\n\n\t\t\tOpening her eyes again, Lady Venuma takes a deep breath. \"However, our time runs short, and if we are to indulge, there must be hours to burn. My only hope is that I do not break you when we do have our way.\"\n\n\t\t\tYou want to say something in return, something equally powerful and seductive, but you can still feel the pull of Lady Venuma all over you. The thought of having the time to go further is almost more than you can handle.\n\n\t\t\t\"For now, there are more mundane matters to handle,\" Lady Venuma says, stepping back. As she does, you can feel your judgment clearing, your pulse slowing, though only little. It still feels like you're listening to Lady Venuma through a lilting fog.\n\t\t\t*page_break\n\t\t\t*goto vvexplainv\n\t\t*else\n\t\t\t*set ruthless %+10\n\n\t\t\tYou're not attracted to women, but that doesn't mean you can't try to get on Lady Venuma's good side. She obviously wants you to want her, so why not give her what she wants? \n\n\t\t\t*if (ruthless > 55)\n\t\t\t\t*set rlshp_venuma %+10\n\t\t\t\t*set mastery +1\n\n\t\t\t\t\"You're bold. I like bold,\" Lady Venuma says. \"You're also clever enough to tell me what you think I want to hear. Fascinating.\"\n\n\t\t\t\t*goto vvexplainv\n\t\t\t*else\n\t\t\t\t*set rlshp_venuma %-10\n\t\t\t\t\n\t\t\t\t\"You presume that I cannot tell you don't truly desire me?\" Lady Venuma says. \"Poor liars utterly bore me.\"\n\n\t\t\t\t*goto vvexplainv\n\n*label vvexplainv\n*set meetvenuma true\nLady Venuma takes a moment to consider something, then focuses back on you.\n\n\"At any rate, given your…unique position, what with all those pesky little Purity Laws, it seems pertinent to give you some of the most essential details about this situation we find ourselves in. I have to be on my way soon, but is there a question you would ask of me before I depart?\"\n\nYou try to stop your jaw from going completely slack, because when you woke up this morning, you would never have fathomed that you'd have the opportunity to ask a \"divine entity\" a question. As you try to narrow down the field, you realize that as much as it may pain you, there is one fairly large but entirely ordinary question that's more important than all of the others.\n\n\"How did I get to Versus? How can I leave? Or send a message home?\" \n\n\"I believe that counts as three questions,\" Lady Venuma laughs. \"Though luckily for you, all of your questions have but one answer.\"\n\n*page_break\n\n\"Once you are Selected by Versus, you cannot leave until the planet deems you worthy of doing so.\"\n\nThe weight of Lady Venuma's words land across your mind with a clarifying crash. \"I…I don't think I understand,\" you struggle to say, trying to process this troubling revelation.\n\n\"I think that you do understand, but rather that you require further explanation,\" Lady Venuma begins. \"The only way to access Versus is to be Selected by the planet itself. In some cultures, Selection is seen as the greatest honor, indicating wells of untapped potential. While in other cultures, Selection is a sign of being one of the most hopeless and ruthless of souls.\n\n\"Once Selected, you must survive long enough for Versus to deem you worthy of returning home, an honor known as being Reborn. The Reborn return to their homeworlds to become planetary legends, forces for monumental change.\n\n\"I am afraid that short of being Reborn or slain, those of us here on Versus live in complete isolation—there is no way to communicate with or escape to the galaxy beyond. In that regard, Versus is still a place of universal mystery—no one knows why they are chosen or how Versus truly works. That information, rather frustratingly, is not even furnished to us Wone.\"\n\n*page_break\n*set versusunlock true\n\nYou try to process everything Lady Venuma has just thrown at you, but you find it nearly impossible to absorb—which is certainly a new feeling for you. Fortunately, you notice in the corner of your vision that thanks to OtherBoard's abilities, this information has been automatically collected and catalogued in your Stats Screen. \n\nInstead, all you can really think is that you've simply swapped one planet you cannot leave for another. At least this one couldn't be more different than Prisca….\n\n\"I am sure that you have many more questions, but it is already past due time for me to return,\" Lady Venuma finishes. \"My fate is not my own, for the time being. You will soon find that Versus has certain…divisions. You will have to choose where you stand. Or, I suppose, you will choose if you're lucky. The great Queen doesn't deem everyone worthy, after all.\"\n\n\"Queen?\" you ask, finding it improbable that someone of Lady Venuma's stature would have to answer to anyone else. \"Worthy of what?\"\n\n\"Becoming Elite,\" Lady Venuma says, with a detectable edge in her voice. \"Though there will be time to explain all of that. Meet me in the Verses Village Inn tomorrow at noon. I'll be attending to some affairs and will have ample time to provide you with a more comprehensive lay of the land.\"\n\nYou nod at Lady Venuma, because at the moment, you can't think what else to do. She nods back at you and turns to take flight, but stops and turns back to face you, her bright eyes blazing through you for several more seconds before she resolves to speak again. \n\n*page_break\n\n\"I do not usually do this, but may I ask you a rather important question?\" Lady Venuma poses, proceeding only after you nod once again. \"Would you say that you are more inclined to accept the way of things, or challenge them?\"\n\nYou stare back at Lady Venuma, realizing that she's attempting to ask you something without really asking, once again. You know that somehow your answer here will speak volumes.\n\nYou're not sure exactly what the right answer might be—do you stand up for your beliefs? Tell Lady Venuma what you think she wants to hear? Remain open to learning more? Whatever you decide, you figure that you'd better mean what you say, given Lady Venuma's considerable intuition.\n\n*choice\n\t#\"I accept the way of things, provided that they work.\"\n\t\t*set regime %+10\n\n\t\t*if (regime > 50)\n\t\t\t*set rlshp_venuma %-10\n\t\t\t\"I see,\" Lady Venuma says, her expression unwavering.\n\t\t\t*goto withthatlv\t\n\t\t*else\n\t\t\t*set rlshp_venuma %-5\n\t\t\t\"Then we shall have to see if you think that things are in working order here, I suppose,\" Lady Venuma says, her expression unwavering.\n\t\t\t*goto withthatlv\t\t\n\t#\"I prefer change. Especially if it seems necessary.\"\n\t\t*set regime %-10\n\n\t\t*if (regime \u003c 50)\n\t\t\t*set rlshp_venuma %+10\n\t\t\t\"Perfect,\" Lady Venuma says, her expression softening. \"Then our relationship may very well continue to grow.\"\n\t\t\t*goto withthatlv\n\t\t*else\n\t\t\t*set rlshp_venuma %+5\n\t\t\t\"I hope you mean that truly,\" Lady Venuma says, her expression unwavering. \"Though I suppose we will find out soon enough, one way or another.\"\n\t\t\t*goto withthatlv\n\t#\"I'm loyal to my allies, above all else.\"\n\t\t*set rlshp_venuma %+10\n\n\t\t*if (regime \u003c 50)\n\t\t\t*set regime %-5\n\t\t\t\"Perfect,\" Lady Venuma says, her expression softening. \"Then our relationship may very well continue to grow.\"\n\t\t\t*goto withthatlv\n\t\t*else\n\t\t\t*set regime %+5\n\t\t\t\"Then let us hope that you come to consider me an ally,\" Lady Venuma says, her expression unwavering.\n\t\t\t*goto withthatlv\n\t#\"I prefer to learn as much as I can before I make any such judgments.\"\n\t\t*set rlshp_venuma %-10\n\n\t\t*if (regime > 50)\n\t\t\t*set regime %-5\n\t\t\t\"I see,\" Lady Venuma says, her expression unwavering.\n\t\t\t*goto withthatlv\n\t\t*else\n\t\t\t*set regime %+5\n\t\t\t\"Then we shall have to see how fast you can learn, I suppose,\" Lady Venuma says, her expression unwavering.\n\t\t\t*goto withthatlv\n\n*label withthatlv\n\nWith that, Lady Venuma begins to hover off the ground, her long dress flowing and flapping in the wind.\n\n\"I suggest that you find someplace safe to sleep soon, little lost one,\" Lady Venuma says, gaining altitude. \"I would hate to see something so fresh devoured in the still of the night.\"\n\nThen, in the blink of an eye, Lady Venuma vanishes into the sky, streaking into nothing more than a golden speck in the distance. \n\nYou feel a cold sadness spill through you as she departs.\n\n*page_break\n\nBefore today, your entire world was made up of Priscans and Blots and Dhanthik, interspersed with the odd reading that provided a glimpse into the hidden galaxy beyond Prisca's veiled sky. Now, within the span of a few hours, you've traveled to a sacred and dangerous foreign planet, encountered half a dozen alien races, absorbed the mind of an advanced android, and held audience with a goddess.\n\nThere's so much information colliding in your brain right now that you don't even know where to begin. All you do know is that, for whatever reason, this strange planet Versus has Selected you, and you're going to have to find a way to adapt if you have any chance of surviving. And if you're in the company of beings as powerful as Lady Venuma and Empress Vaccus, then you're going to have to do so very quickly.\n\nAt least you can be sure of one thing, as the sun begins to set: \n\nYou're going to sleep quite soundly tonight.\n\n*page_break\n\nAs you finally allow yourself to feel how exhausted you really are, you also realize that if you truly are trapped here on Versus, then Empress Vaccus must be trapped as well. You then wonder how the Blot horde hive-mind must be operating without its figurehead. You experience a flash of hope, thinking the Blots might all fall limp without Empress Vaccus—that is, until you remember the Blotbocs.\n\nAllegedly, Blotbocs are made when Empress Vaccus decides to convert one of its victims, which is meant to be taken as a rare show of worthiness—hence the specialized retention of certain individual traits. Empress Vaccus passes some of its cognition on to these twisted Blotboc children, allowing them to command their own Blot divisions. So while the Blot hordes might still be up and sloshing, at the very least, you hope that their efforts have become less coordinated without Empress Vaccus's solitary intellect to guide them.\n\nWhatever the case, if Empress Vaccus really is trapped here, that means you will also have more time to find a way to destroy it as you learn how Versus works. Which also means that your first priority can now be finding somewhere safe to sleep tonight, so that you can go meet Lady Venuma in the Verses Village tomorrow. \n\nSince you're not sure how much longer it might take to reach the Verses Village or what you might find there, you decide that your safest bet will be to turn around and spend the night in the UniForest home that OtherBoard mentioned. The journey to it is not too far back, and you know exactly where it is. \n*if (rlshp_ob > 55)\n\tPlus, you seemed to make a good impression on OtherBoard earlier, so you hope she'll welcome you, assuming she has rebooted by now.\n\t*goto witoutwaste\n*else\n\n\tIf you're lucky, maybe OtherBoard will still be rebooting when you return, so you can make yourself at home without worrying about the impression you made during your earlier encounter.\n\t*goto witoutwaste\n\n*label witoutwaste\n\nSo you turn around and head back toward OtherBoard's UniForest home, without wasting another moment, hoping that whatever you find there will at least be moderately comfortable.\n\n*page_break Just Before The Setting Sun\n\n*if (rlshp_ob > 54)\n\tAfter waiting for OtherBoard to answer your knocks on her makeshift, wire-fenced campsite door, you let yourself in.\n\t*goto interiorob\n*else\n\tYou note several defensive traps leading up to the entrance of OtherBoard's wire-fenced campsite, all of which seem unarmed. In fact, you are able to walk through the front door without any impediment.\n\t*goto interiorob\n\n*label interiorob\n\nOtherBoard's camp is almost exactly what you'd expect, for a change: a few logs set around a fire that still burns, a tarp hanging between two branches to serve as a roof, and a small cot. The only things that seem out of place are the wires and screens everywhere; their power source seems to be OtherBoard herself, as some appliances still remain plugged into her hip sockets.\n\nSpeaking of OtherBoard, she stands motionless in the corner with her core-lights dormant, so you assume that she must still be rebooting. You really hope that your full absorb didn't somehow damage—\n\n\"Chirp. Pooches. Chirp,\" Rosae flutters out to announce, winking at you before disappearing.\n\n*page_break\n\nYou look across the campsite to find two dogs emerging from a wood-carved doghouse. Your eyes are immediately drawn to the larger dog, which is sized more like a small horse. Great globs of drool hang from its frighteningly large jawline. You can't quite tell what mood it's in, so you spot a tag on its collar that reads [i]Nermal[/i] and immediately say the name out loud.\n\nAfter this, Nermal's stubby tail gets to twitching, and he rushes you excitedly. Luckily you grew up around all kinds of pets, including dogs, so you know just where to pet Nermal to get him rolling belly-up in no time.\n\nYou're so distracted by Nermal that you barely pay attention to the miniature chihuahua hanging back at its heels. You note its name, Nards, and reach out your hand. \n\nWhich apparently signals to Nards that it's okay to growl viciously and nip at your fingers.\n\n*page_break Shortly Thereafter\n\nAfter a few minutes of being ignored, Nards disappeared into his doghouse, emitting only a pathetically high-pitched warning growl every so often. Meanwhile, Nermal fell fastidiously asleep at OtherBoard's feet. You poked around at OtherBoard a bit to try to wake her up, then searched unsuccessfully for something to eat. It would appear OtherBoard doesn't require any food, which makes sense.\n\nAs a rattling yawn seizes your jaw, you decide it's time to get some sleep. You climb into OtherBoard's cot and try to stop your mind from racing. Despite yourself, you can still feel the aftereffects of your encounter with Lady Venuma. You can't shake the feelings she brought upon you, whether they were truly genuine or not.\n\nYou dated a bit back on Prisca, though The Black Blot War didn't really leave much time for that. Besides, everyone on Prisca always ended up seeming the same to you. You’ve always been looking for something more, something new, someone that would take you by surprise and shake you to your core. \n\nA part of you knew you’d probably never find that on Prisca, and that part froze over long ago.\n\n*choice\n\t#If I want to survive this experience, perhaps it's best that part remains frozen.\n\t\t*set solo %+5\n\t\t*goto spentmuchtime\n\t*if (venumataste = false) #Though I can feel that very same part thawing now, melting into the possiblity that I might just find what—or who—I've been looking for here….\n\t\t*set solo %-5\n\t\t*goto spentmuchtime\n\t*if (venumataste) #Though I can feel that very same part thawing now, melting into the possibility that I might just find what I've been looking for here…perhaps even with Lady Venuma.\n\t\t*set solo %-5\n\t\t*goto spentmuchtime\n\t#I shake this thought off because I don't want to get my hopes up. Still, who knows what other wonders Versus might have in store for me?\n\t\t*set solo %-5\n\t\t*goto spentmuchtime\n\n*label spentmuchtime\n\nYou then feel a pang, some combination of fear and homesickness, thinking of your family back home on Prisca. You don't dare dwell on how the pivotal battle played out without you there to help—all you can do now is hope for the best. \n\nIf you truly are stuck here, your family is going to have to learn to get on without you, one way or another. Though the thought that they might think you willfully abandoned them, that you somehow left of your own accord when they needed you most, is unbearable—especially after Mother's strange inheritance request. At the very least, you hope your disappearance might have spared Gilo some pain in finding out about this decision.\n\nThen again, your family will have no way to understand what has happened to you. It is more likely that they will think you were vaporized by a rogue bloodmatter blast than transported to some sacred, legendary planet. You picture them now, mourning you, and it nearly breaks your heart. \n\nAssuming all of your family even survived the battle, that is.\n\nPushing these terrible thoughts from your mind, you feel yourself drifting rapidly toward sleep. You can already tell that you're going to have to get very good at moderating your thoughts in this way—you're sure that you're going to be bombarded with newness and diversity at every turn from now on. \n\nSomething tells you that how you handle all that newness, how you manage this unfettered growth, will define everything about your experience here on Versus. \n\n*finish\n"}};
