<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VERSUS: The Lost Ones — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "versus", "title": "VERSUS: The Lost Ones", "scenes": {"choicescript_description": "Steal alien powers and absorb their memories! Can you outlast your opponents to escape from planet Versus?\n\n[i]Versus: The Lost Ones[/i] is a thrilling 123,000-word interactive novel by Zachary Sergi, author of our best-selling [i]Heroes Rise[/i] trilogy. Your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nBecome an interstellar warrior, gifted with the power to ransack the thoughts and abilities of others. Transported to an unfamiliar world beyond your wildest dreams, you must invade the minds of your fellow captives to survive.\n\nSeduce Lady Venuma, a self-proclaimed goddess, or clash with Empress Vaccus, a tusked monster and the sworn enemy of your home world. Triumph in gladiatorial combat, or in the deadly politics of planet Versus. Absorb the right talents, and you just might save the galaxy!\n\n• Fight for humans or androids in a morally ambiguous civil war[n/]\n• Play as male, female, transgender, intersex, or a non-categorizable gender identity[n/]\n• Subvert the corrupt Elite Courte, or join them to suppress rebellion[n/]\n• Romance aliens, crossbreeds, and intergalactic royalty, or go it alone--the choice is yours[n/]\n• Dive into a sci-fi hybrid of space operas, futuristic dystopias, fantasy epics, and political chess\n", "choicescript_stats": "*label display\n\n*if meetob\n\t*set obstatname \"OtherBoard\"\n\n*if meetvenuma\n\t*set venumaname \"Lady Venuma\"\n\n*if meetceltrig\n\t*set celtrigname \"Cel & Trig\"\n\n*if meetbreeze\n\t*set breezename \"Breeze\"\n\n*if meettodrick\n\t*set todrickname \"Todrick\"\n\n*if meetoli\n\t*set oliname \"Oli\"\n\n*label officialstatchart\n*image battle_stats.png\n*stat_chart\n\ttext life Current Life\n\ttext lifemax Maximum Life\n\topposed_pair Forceful\t\n\t\tCunning\n\topposed_pair Solo\t\n\t\tTeam\n\topposed_pair Weapons\t\n\t\tAbilities\n\ttext energy Absorption Energy\n\ttext strength Absorption Strength\n\ttext tech Absorption Technical Skill\n\ttext command Absorption Command\n\ttext agile Absorption Agility\n*comment endif\n\n\n*image social_stats.png\n*stat_chart\n\topposed_pair Ruthless\n\t\tGenuine\n\topposed_pair Regime\n\t\tRebellion\n\tpercent rlshp_family Family\n\tpercent rlshp_ob ${obstatname}\n\tpercent rlshp_venuma ${venumaname}\n\tpercent rlshp_breeze ${breezename}\n\tpercent rlshp_todrick ${todrickname}\n\tpercent rlshp_oli ${oliname}\n\tpercent rlshp_celtrig ${celtrigname}\n*comment endif\n\n*image progress_stats.png\n*stat_chart\n\ttext Mastery\n\ttext Growth\n*comment endif\n\n[b]Collected Versus Information:[/b]\n\n*choice\n\t*if (false and iapofferon) #Rosae's Extra WorningBird function.\n\t\t*goto iaprundown\n\t*if (versusunlock) #Versus Inhabitants.\n\t\t*goto characterrundown\n\t*if (versusunlock) #The Verses.\n\t\t*goto versesrundown\n\t*if (fourisgoalsreveal) #Elite Courte Goal.\n\t\t*goto elitecourtegoalrundown\n\t*if (fiveisgoalchosen) #Political Goal.\n\t\t*goto politicalgoalrundown\n\t*if (versuslist) #Dhanthik MemoryTravel Checklist.\n\t\t*goto checklistrundown\n\t#Achievement Structure.\n\t\tOnce you have unlocked every Achievement, you have fully experienced every variation of VERSUS: The Lost Ones. \n\n\t\t[i]Tip:[/i] this will require multiple readthroughs.\n\n\t\t*page_break\n\t\t*goto officialstatchart\n\t#Mastery.\n\t\tGain Mastery points by making decisions consistent with your existing Stat Levels. These Levels will be continuously tested and rewarded with Mastery points.\n\n\t\t[i]Tip:[/i] Once you choose a stat characteristic, keep making decisions to master that Stat. For example, if you choose to be Ruthless, remain as Ruthless as possible throughout your experience.\n\n\t\t[i]Tip:[/i] Mastering different combinations of Stats in new readthroughs will unlock new story outcomes and Achievements.\n\t\t*page_break\n\t\t*goto officialstatchart\n\t#Growth.\n\t\tThis Stat measures your character evolution. How successfully do you navigate new cultures? How do you respond to belief systems that potentially conflict with your own? Does your own perspective evolve or remain unchanged?\n\n\t\t*page_break\n\t\t*goto officialstatchart\n\n*label iaprundown\n\nDo you wish to purchase Rosae's Extra WorningBird function option?\n\n*choice\n\t#Yes. (Approximate Cost: $.99)\n\t\tIAP CODING\n\t\t*set extraworning true\n\t\t*comment achieve extraworningac\n\n\t\t\"You won't regret it, Priscy!\" Rosae chirps cheerily.\n\n\t\t*page_break\n\t\t*goto officialstatchart\n\t#Not at this time.\n\t\t*goto officialstatchart\n\n*label versesrundown\n\n*image v_map.png\n\n[b]Planet Versus[/b]\n*line_break\nVersus is a mysterious and infamous planet, governed by the laws of the ancient Verses Scriptures. Planet Versus remains a sacred space where those Selected are called to face the ultimate test. It is said to be a place of great spiritual awakening, rehabilitation, and rebirth, but it is also a place of great danger.\n\nThe ony way to access planet Versus is to be Selected by the planet itself. In some cultures, Selection is seen as the greatest honor, a sign of extreme wells of untapped potential. In other cultures, Selection is a sign of being one of the most hopeless and ruthless of souls. \n\nOnce Selected, you must survive long enough for Planet Versus to deem you worthy of returning home, an honor known as being Reborn. The Reborn return to their homeworlds to become planetary legends, forces for monumental change.\n\nInhabitants of Versus live in complete isolation—there is no way to communicate with or escape to the rest of the galaxy. Planet Versus is still a place of universal mystery—no one knows why they are chosen or how Versus truly works, not even The Wone.\n\n*if chapfourbreezeversus\n\t*goto chapfourrules\n*else\n\t*page_break\n\t*goto officialstatchart\n\n*label chapfourrules\n\n[b]Versus Rules[/b]\n*line_break\n-- Planet Versus is split in two by the Versus Barrier, with twenty-four inhabitants on each side. \n*line_break\n-- You're on the Constructive side, meant to challenge the Destructive side.  \n*line_break\n-- The Versus Vote occurs every three days. The Constructive and Destructive inhabitants with the most votes go into the Versus Match against each other.\n*line_break\n-- After twenty-four Votes and Matches, those deemed worthy among the twenty-four remaining survivors are Reborn.\n*line_break\n-- The Holdovers break for a few months until Newcomers arrive to restore each side to twenty-four inhabitants, and the Versus cycle begins again.\n\n*if chapfoureliterevealed\n\t*goto chapfourelite\n*else\n\t*page_break\n\t*goto officialstatchart\n\n*label chapfourelite\n\n[b]The Elite Courte[/b]\n*line_break\nQueen Ashe selects a worthy ruling majority of thirteen to control the Versus Vote. The eleven remaining \"Ords\" rotate through the twenty-four Versus Matches. Whoever survives at the end of the cycle may be selected for the Elite Trials, along with any Newcomers that catch Queen Ashe's eye.\n\n*page_break\n*goto officialstatchart\n\n*label characterrundown\n\n[b]NAME:[/b] Royal A-08\n*line_break\n[b]SPECIES:[/b] Binarian Android, Royal Classification\n*line_break\n[b]HOME PLANET:[/b] Binaria\n*line_break\n[b]STANDARD BINARIAN ABILITIES:[/b] Durability, Strength, Computing, Interfacing \n*line_break\n[b]ROYAL CLASS BINARIAN ABILITIES:[/b] Flight Generators, Energy Emissions, Musical Manipulation, PowerGram Catalogue \n\n[b]NAME:[/b] Lady Venuma Grecca\n*line_break\n[b]SPECIES:[/b] Demigoddess\n*line_break\n[b]HOME PLANET:[/b] Wone\n*line_break\n[b]ABILITIES:[/b] Flight, Durability, Strength, Enhanced Senses, Energy Redirection, Knowledgeability, Charms, Intuition\n\n*if threeobcharacter\n\t*goto addobhere\n*else\n\t*page_break\n\t*goto officialstatchart\n\n*label addobhere\n\n[b]NAME:[/b] Electrician C-5184 / \"OtherBoard\"\n*line_b pgrade": "*label start\n*check_purchase adfree extraworning\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 9[/b]\n\n  Unlock chapters 4 through 9!\n\n  *purchase_discount adfree 2022-07-21 $4.99 $2.99 start\n\n*if choice_purchased_extraworning = false\n  [b]WorningBird Hints[/b]\n\n  Supercharge Rosae, your WorningBird, for in-game hints!\n\n  *purchase extraworning $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 9[/b]\n\n  You've paid to unlock chapters 4 through 9.\n\n*if choice_purchased_extraworning\n  [b]WorningBird Hints[/b]\n\n  You've paid to unlock in-game hints with Rosae's Extra WorningBird function.\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set life 4\n*set lifemax 11\n*set forceful 12\n*set solo 78\n*set weapons 78\n*set energy 3\n*set strength 3\n*set tech 19\n*set command 0\n*set agile 1\n\n*set ruthless 92\n*set regime 88\n*set rlshp_family 40\n*set obstatname \"OtherBoard\"\n*set rlshp_ob 78\n*set venumaname \"Lady Venuma\"\n*set rlshp_venuma 89\n*set breezename \"Breeze\"\n*set rlshp_breeze 93\n*set todrickname \"Todrick\"\n*set rlshp_todrick 45\n*set oliname \"Oli\"\n*set rlshp_oli 53\n*set celtrigname \"Unknown\"\n*set rlshp_celtrig 50\n\n*set mastery 20\n*set growth 23\n\nEmpress Vaccus's desire to kill is so potent that nothing else can exist alongside it. Except perhaps the lingering craving for Priscan enamel and tooth roots…\n\nAs Empress Vaccus creeps towards you once again, you decide to stop fighting this infectious, deadly urge.\n\nInstead, you harness it.\n\nBecause you're going to make one last play to stop Empress Vaccus.\n\nRight now.\n\n*fake_choice\n\t#Lure Empress Vaccus into an attack, then dodge at the last second to lodge one of its tusks in a tree. Then use the leverage to kick-snap the tusk in two.\n\t#Strike at one of the tusks with full force.\n\t#Forget the tusks, use your newfound agility to crack off a smaller tusk and use it to repeatedly slash Empress Vaccus.\n\n*script changeBackgroundColor(\"black\")\n\n*set life 9\n*set lifemax 10\n*set forceful 25\n*set solo 55\n*set weapons 40\n*set energy 0\n*set strength 3\n*set tech 7\n*set command 1\n*set agile 0\n\n*set ruthless 20\n*set regime 75\n*set rlshp_family 44\n*set obstatname \"OtherBoard\"\n*set rlshp_ob 62\n*set venumaname \"Lady Venuma\"\n*set rlshp_venuma 57\n*set breezename \"Breeze\"\n*set rlshp_breeze 62\n*set todrickname \"Unknown\"\n*set rlshp_todrick 50\n*set oliname \"Unknown\"\n*set rlshp_oli 50\n*set celtrigname \"Unknown\"\n*set rlshp_celtrig 50\n\n*set mastery 4\n*set growth 4\n\nYou can tell there's something going on just beneath the surface of this meeting, but you don't know exactly what yet. You are sure of this much, however: Lady Venuma must have invited you here for a reason. You'd bet she has some kind of agenda she must be pushing.\n\nYou also imagine that Lady Venuma wants to see where you'll fit into the little play she's currently directing, so you figure you should take Rosae's prior advice about setting clear intentions for yourself. You need to make a decision about your goals here, knowing that designating one will color the consequences of your future choices.\n\n*fake_choice\n\t#Find a way to join The Elite Courte.\n\t#Attempt to oppose and abolish the Elite, if possible.\n\t#Focus on building relationships, for now. I can decide which side to pick, if any, when I have more information.\n\n*script changeBackgroundColor(\"sepia\")\n\t\n*set life 7\n*set lifemax 10\n*set forceful 45\n*set solo 40\n*set weapons 55\n*set energy 6\n*set strength 3\n*set tech 6\n*set command 0\n*set agile 0\n\n*set ruthless 48\n*set regime 55\n*set rlshp_family 63\n*set obstatname \"OtherBoard\"\n*set rlshp_ob 68\n*set venumaname \"Lady Venuma\"\n*set rlshp_venuma 50\n*set breezename \"Unknown\"\n*set rlshp_breeze 50\n*set todrickname \"Unknown\"\n*set rlshp_todrick 50\n*set oliname \"Unknown\"\n*set rlshp_oli 50\n*set celtrigname \"Unknown\"\n*set rlshp_celtrig 50\n\n*set mastery 1\n*set growth 0\n\nLady Venuma creeps even closer, leaning to whisper in your ear. As she does, you feel a warm chill ripple through your body.\n\n\"After all, to the simple dog, the master seems a goddess, does she not?\" Lady Venuma whispers. \"I have learned that divinity is all a matter of perspective.\"\n\nLady Venuma steps in front of you, a staggering tower of beauty and wisdom. Suddenly your body quakes with respect and awe, despite your best efforts to seem unaffected.\n\n\"And power, of course,\" Lady Venuma finishes. \"Tell me, do you desire a taste of my power, little lost one?\"\n\n*fake_choice\n\t#\"You're not my type, lady.\"\n\t#\"I have to admit, I definitely could use a friend to help me figure this planet out.\"\n\t#\"I'd like more than a taste, my lady.\"\n\n*set life 10\n*set lifemax 10\n*set forceful 75\n*set solo 45\n*set weapons 70\n*set energy 1\n*set strength 3\n*set tech 7\n*set command 0\n*set agile 0\n\n*set ruthless 80\n*set regime 35\n*set rlshp_family 67\n*set obstatname \"OtherBoard\"\n*set rlshp_ob 45\n*set venumaname \"Lady Venuma\"\n*set rlshp_venuma 40\n*set breezename \"Breeze\"\n*set rlshp_breeze 48\n*set todrickname \"Unknown\"\n*set rlshp_todrick 50\n*set oliname \"Unknown\"\n*set rlshp_oli 50\n*set celtrigname \"Unknown\"\n*set rlshp_celtrig 50\n\n*set mastery 5\n*set growth 3\n\nYour mind struggles to keep up with this revelation…. \n\nYou're stuck on a planet where, every three days, you might be voted into a death match against someone identified as a \"Destructive?\" \n\n*fake_choice\n\t#There must be some reason Versus runs like this, as some kind of cosmic test of worthiness.\n\t#It's more likely I've been pulled into some twisted alien experiment than any great, sacred questing process.\n\t#As usual, I should reserve further judgment until I know more, or at least until I can confirm what Breeze is claiming.\n\t#I don't believe in some greater cosmic purpose, but I do believe I can strive to make this experience count while I'm here.\n\t#All that matters to me is surviving this experience, for many reasons.\n\n\n", "startup": "*title VERSUS: The Lost Ones\n*author Zachary Sergi\n\n*scene_list\n\tstartup\n\tv_prologue\n\tv_one\n\tv_two\n\tv_three\n\t$ v_four\n\t$ v_five\n\t$ v_six\n\t$ v_seven\n\t$ v_eight\n\t$ v_nine\n\n*product extraworning\n\n*create ruthless 50\n*create regime 50\n*create forceful 50\n*create solo 50\n*create weapons 50\n*create absorb 50\n*create mastery 0\n*create growth 0\n*create life 10\n*create lifemax 10\n*create strength 0\n*create energy 0\n*create tech 0\n*create command 0\n*create agile 0\n*create rlshp_family 50\n*create rlshp_newbies 50\n*create rlshp_ob 50\n*create rlshp_venuma 50\n*create rlshp_breeze 50\n*create rlshp_todrick 50\n*create rlshp_celtrig 50\n*create rlshp_oli 50\n*create name \"Unknown\"\n*create rlshp_airon 50\n*create rlshp_pj 50\n*create rlshp_grog 50\n*create rlshp_brawl 50\n*create status 0\n\n*create versusunlock false\n*create meetob false\n*create obstatname \"Unknown\"\n*create meetvenuma false\n*create venumaname \"Unknown\"\n*create threeobcharacter false\n*create iapofferon false\n*create extraworning false\n*create meetceltrig false\n*create celtrigname \"Unknown\"\n*create meetbreeze false\n*create breezename \"Unknown\"\n*create meettodrick false\n*create todrickname \"Unknown\"\n*create meetoli false\n*create oliname \"Unknown\"\n*create chapfourbreezeversus false\n*create chapfoureliterevealed false\n*create fourisgoalsreveal false\n*create fiveisgoalchosen false\n*create meetpinkuju false\n*create meetairon false\n*create meetgrog false\n*create versuslist false\n*create deathrevealed false\n\n*create male true\n*create female false\n*create mtf false\n*create ftm false\n*create intersex false\n*create genderneutral false\n*create youze \"he\"\n*create yo s and abilities of others. Transported to an unfamiliar world beyond your wildest dreams, you must invade the minds of your fellow captives to survive.\n\t \n\tSeduce Lady Venuma, a self-proclaimed goddess, or clash with Empress Vaccus, a tusked monster and the sworn enemy of your home world. Triumph in gladiatorial combat, or in the deadly politics of planet Versus. Absorb the right talents, and you just might save the galaxy!\n\t \n\t• Fight for humans or androids in a morally ambiguous civil war[n/]\n\t• Play as male, female, transgender, intersex, or a non-categorizable gender identity[n/]\n\t• Subvert the corrupt Elite Courte, or join them to suppress rebellion[n/]\n\t• Romance aliens, crossbreeds, and intergalactic royalty, or go it alone--the choice is yours[n/]\n\t• Dive into a sci-fi hybrid of space operas, futuristic dystopias, fantasy epics, and political chess\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\t*comment endif\n\n\t*purchase_discount adfree 2022-07-21 $4.99 $2.99 purchased\n\t*label page_break\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n*goto_scene v_prologue\n", "v1_save": "*ending", "v_eight": "*comment é\n\n*image chap_8.png\n\n*if todrickdie\n\t*image e_chap8a.png\n\t*goto quotestart\n*else\n\t*image e_chap8b.png\n\t*goto quotestart\n\n*label quotestart\n\n${blank}\n*page_break\n\nOf all the surprises you've encountered on Versus, at least you can place this one in the positive column. \n\nYou stand in the entranceway of a beautiful hardwood log cabin overlooking the lake, trying to absorb the sight. It's breathtaking on its own, but made infinitely more interesting by the guests occupying the warm decor.\n\nYou see several familiar faces—or at least familiar from the voting amphitheater and Arrival Runway. Looking at them, you immediately miss OtherBoard's handy readouts popping up, though you know you still store them in your visor Stats Screen. At least losing OtherBoard's readouts means that you can now access your ambient emotion absorbs, which usually prove to be equally useful.\n\n*page_break\n\nThe avian floating man, Baron Airon, sits regally in a chair while being served a tray of grapes by a very bored-looking Aye Aye. Baron Airon looks up at you as you enter and eyes you like a piece of eldermeat once again, except this time you can feel the pure lust radiating off Airon's oiled skin. It's filthy.\n\nIn the corner behind Baron Airon, the slave creature Grog sits with a cup of water, staring at the floor. You don't feel anything from it at all, which is strange.\n\nJust outside the living room, on a deck overlooking the lake, Pinkuju and the mysterious shrouded being stand chatting. Pinkuju laughs at something, which seems odd, given how stoic the shrouded being appears. You faintly sense a common bond between these two: it feels like unity in the form of complimentary opposites.\n*if (mtf) or (ftm)\n\tIt tastes something like…gender transition? Of course, you'd know that feeling anywhere. Could they both be transgender, too?\n\t*goto alllookatyou\n*else\n\tOddly, the emotion has a very specific mental timbre…one you can't quite place. \n\t*goto alllookatyou\n\n*label alllookatyou\n\nThe diverse gathering of guests all look at you as you stand in the doorway, and you realize that you should probably do something.\n\n*set rlshp_airon rlshp_newbies\n*set rlshp_pj rlshp_newbies\n*set rlshp_grog rlshp_newbies\n*set rlshp_brawl rlshp_newbies\n\n*choice\n\t*if (attractedtomen) #Send my own lustful look back at Baron Airon, because he's really hot.\n\t\t*set rlshp_airon %+15\n\t\t*set growth +1\n\n\t\tBaron Airon meets your gaze and smiles back, holding eye contact as it intensifies. Just when you think you might buckle under the gaze, Baron Airon nods toward one of the bedrooms. Wait, is he asking you to hook up? Right here and now?\n\t\t*goto btinterrupt\n\t*if (attractedtomen = false) #Smile at Pinkuju, because I think she's really pretty.\n\t\t*set rlshp_pj %+15\n\t\t*set growth +1\n\t\t*label pinkwave\n\n\t\tPinkuju smiles back, lighting up her entire face. She waves for you to come outside, and you step forward to do so.\n\t\t*goto btinterrupt\n\t#Introduce myself to everyone at once.\n\t\t*set rlshp_airon %+5\n\t\t*set rlshp_pj %+5\n\t\t*set rlshp_grog %+5\n\t\t*set rlshp_brawl %+5\n\t\t*set growth +1\n\n\t\t\"Hey everyone, I'm ${name},\" you say.\n\n\t\tNo one is sure who should speak up first in response, so the awkwardness of these forced-together strangers only intensifies. You can practically taste the tension.\n\t\t*goto btinterrupt\n\t#Don't do or say anything; let the others come to me to see what tone they set, if any.\n\t\t*set rlshp_airon %-5\n\t\t*set rlshp_pj %-5\n\t\t*set rlshp_grog %-5\n\t\t*set rlshp_brawl %-5\n\t\t*set growth +1\n\n\t\tYou stand in awkward silence, which is only broken by a loud burp from Grog.\n\t\t*goto btinterrupt\n\t#Don't do or say anything, because these other beings seem strange.\n\t\t*set rlshp_airon %-5\n\t\t*set rlshp_pj %-5\n\t\t*set rlshp_grog %-5\n\t\t*set rlshp_brawl %-5\n\t\t*set growth -3\n\n\t\tYou stand in awkward silence, which is only broken by a loud burp from Grog.\n\t\t*goto btinterrupt\n\t#Smile and wave at Pinkuju and the shrouded man outside.\n\t\t*set rlshp_pj %+10\n\t\t*set rlshp_brawl %+10\n\t\t*set growth +1\n\n\t\t\"Hey everyone, I'm ${name},\" you say, making sure to direct your wave to the deck outside.\n\t\t*goto pinkwave\n\t#Smile and wave at Baron Airon.\n\t\t*set rlshp_airon %+10\n\t\t*set growth +1\n\n\t\tBaron Airon nods in your direction, but doesn't get up or say anything.\n\t\t*goto btinterrupt\n\t#Smile and wave at Grog.\n\t\t*set rlshp_grog %+10\n\t\t*set gro s the words leave Breeze's lips, you can tell that they aren't entirely true.\n\n\"What is it?\" you say, standing back up. \"You can tell me.\"\n\n\"It's…my situation down there, it's…complicated,\" Breeze says, keeping ${brehis} eyes on the floor. \"Where I'm from, it's not okay to be anything other than one gender.\n*if bremale\n\tI identify as a guy, I really do. But I also happen to be born…\"\n\t*goto whereicomefrom\n*elseif brefemale\n\tI identify as female, I really do. But I also happen to be born…\"\n\t*goto whereicomefrom\n*else\n\tI don't know if you could tell, but I was born…\"\n\t*goto whereicomefrom\n\n*label whereicomefrom\n\nBreeze can't stop staring at the floor and ${breze} begins to shiver so visibly, you think ${breze} might faint. You immediately place your hand on Breeze's shoulder, and ${breze} finally looks up into your eyes.\n\n\"I'm…\"\n\nBreeze takes a deep breath, willing ${brehir}self to try and stop shaking.\n\n*page_break\n*label breezesaysit\n\n\"I'm intersex.\" \n\nBreeze speaks this last word in a whisper, barely audible. \n\n\"I never, ever told anyone that,\" Breeze says, hugging ${brehis} arms across ${brehis} chest and eyeing the floor once again. \"At least, not before I came to Versus…\"\n\nBreeze can't seem to look back up at you, and you can feel ${brehis} vulnerability overtake every other emotion in the room. You respond without hesitating.\n\n*label areyouokaywithit\n*choice\n\t*if (intersex) #\"Breeze, I am too.\"\n\t\t*label youyouare\n\t\t\"You…you are?\" Breeze sputters, suddenly seeming to grow calmer. \"I've never…that's…\"\n\n\t\t\"…incredible,\" Breeze says, smiling from ear to ear.\n\n\t\t\"I'm glad you think so,\" you say, smiling back. \"Right now, all that matters is that I'm attracted to you for you, Breeze. The rest we can figure out together, okay?\"\n\n\t\t\"I like that plan,\" Breeze answers. \"I like that plan a lot.\"\n\t\t*goto deepconnection\n\t*if ((intersex) or ((genderneutral) or ((mtf) or (ftm)) *set growth -3\n\n\t\tBreeze nods, looking like ${breze} is happy just to have this conversation end. However, you can also feel waves of hurt coming off Breeze.\n\n\t\tCan you really be surprised? You just dismissed Breeze based on a superficial quality, for being different than you expected. You immediately wonder how it might feel if Breeze questioned ${brehis} attraction to you because of some small part of your identity, because that's the kind of reflection Prisca has ingrained in you.\n\n\t\tStill, you're attracted to what you're attracted to—how can you possibly change that?\n\n\t\tThough you do suppose, as Breeze finally moves on, that the least you could do is be open to the possibility of change….\n\t\t*goto moretosharee\n\n*label deepconnection\n*set growth +6\n*achieve breezebonus\n\nBreeze stares back at you, and you don't need a trace of ambient absorption to feel how deeply connected you are in this moment. \n\nBreeze's eyes begin to fill with tears, but before they can fall, you kiss Breeze again, hard.\n\n*page_break\n\n\"Listen, we should probably get back to the party soon, we've been gone a while,\" you say, still holding the back of Breeze's neck. \"Besides, I want to make sure we have nothing but time once we…you know.\"\n\n\"Me too,\" Breeze says, biting ${brehis} lip. \"I seriously can't wait for that, now. Seriously.\"\n\n\"Me either,\" you say, kissing Breeze one last, long time. As you do, all you can feel is anticipation to get to know Breeze better…and hopefully help ${brehir} come to terms with who ${breze} really is. And maybe even who ${breze} wants to be.\n\n*label moretosharee\n*page_break\n\nOnce you're finished and both fully reclothed, however, you can tell Breeze still has more to share with you.\n*goto youcanrelate\n\n*label youcanrelate\n\n\"Before we go back out there, I need to ask: have you figured out what this meeting is really all about?\" Breeze whispers, suddenly looking around like you're in danger of being spied on.\n\nYou blink at Breeze, knowing that ${breze} will probably just fill in the blanks for you if you wait long enough.\n\n\"It's the first official meeting of our coup d'état!\" Breeze hisses with excitement, spitting words so quickly you have to strain just to keep up. \"The idea to make it seem like a farewell party was all mine, Lady Venuma thought it was so smart. She hasn't been able to meet with everyone yet, so it's not a full house, of course. But it's such a good start, isn't it?\"\n\n*page_break\n\nBreeze then pauses, trying ${brehis} best to regain ${brehis} composure and seem serious. \"Obviously you're one of our first and most trusted members, so I know you'll keep this secret with us.\"\n\n*if bretimeprocess\n\t\"Of course I will,\" you answer, not missing a beat. \n\n\tAs an awkward silence falls over the room, you can tell Breeze wants you to say more. However, all you can do is try to process what Breeze has just revealed about the coup—you don't have the bandwith to process ${brehis} other revelation just yet.\n\n\t*goto processtherev\n*else\n\t\"Of course I will,\" you answer, not missing a beat. \"I'm just so glad that we're…doing what we're doing.\"\n\n\tYou kiss Breeze one last time, not just because you want to, but because it also provides you with a moment to process this revelation.\n\t*goto processtherev\n\n*label processtherev\n*if ruthlessrebellion\n\t*set ruthless %+15\n\t*set regime %-20\n\t*label verygoodthang\n\tIt's a very good thing to see the coup actually taking shape, and an even better thing to be considered among its ranks this early. \n\n\tHowever, you suppose you can't be too excited until you see how everyone else responds to this idea.\n\t*goto todrickinterrupts\n*elseif genuinerebellion\n\t*set ruthless %-15\n\t*set regime %-20\n\t*goto verygoodthang\n*elseif ruthlessregime\n\t*set ruthless %+15\n\t*set regime %+20\n\tYou're not sure whether this first secret meeting is a good thing or a bad thing, but you do know this much: no matter what, it's fantastic for you to be considered an insider and to have this knowledge at your disposal.\n\n\tThough you're probably getting too close to Breeze, considering what you'll have to do once you betray ${brehis} coup. Still, you suppose you should just enjoy the experience while it lasts.\n\t*goto todrickinterrupts\n*else\n\tYou're not sure whether this first secret meeting is a good thing or a bad thing, but you do know this much: no matter what, it's probably good for you to have this knowledge at your disposal.\n\n\tThough ou're probably getting too close to Breeze—you're not exactly being neutral here. Still, you suppose you should just enjoy the experience while it lasts.\n\n\t*if (ruthless > 50)\n\t\t*set ruthless %+15\n\t\t*goto todrickinterrupts\n\t*else\n\t\t*set ruthless %-15\n\t\t*goto todrickinterrupts\n\t\n*label normalbreezescene\n\t\t\n*if (rlshp_breeze > 50) \n\t\"I'm so glad you came to the party, isn't this exciting?\" Breeze squeals. \"I haven't had a reason to dress up in forever. This whole thing was my idea, of course. Isn't it just totally brill?\"\n\n\tActually, you think this party is a bit weird and probably in bad taste for Todrick, but before you express that sentiment, you figure you'd better see what else Breeze has to say in this little chat.\n\n\t\"Since we didn't get to talk about it yesterday when you had your weird trance thing, I wasn't sure you'd get the invitation,\" Breeze goes on. \"But I'm glad the Aye Ayes found you. We really pulled off this whole Todrick thing without a hitch, huh?\"\n\n\tYou nod at Breeze, but you quickly realize that you're going to have to give more of a response to keep ${brehir} talking.\n\t*goto breezefinalechoice\t\n*elseif (rlshp_breeze > 30)\n\t\"I'm a bit surprised to see that you came, but it's still a good thing,\" Breeze says. \"This whole thing was my idea, of course. Aren't you glad I decided to invite you?\"\n\n\tActually, you think this party is a bit weird and probably in bad taste for Todrick, but before you express that sentiment, you figure you'd better see what else Breeze has to say in this little chat.\n\n\t\"Since we didn't get to talk about it yesterday when you had your weird coma thing, I wasn't sure you'd get the invitation, but obviously the Aye Ayes found you. This will be a good test to see if we can actually trust you.\"\n\n\tBreeze gives you a superior look and you struggle to keep your cool as you formulate your own response.\n\t*goto breezefinalechoice\t\n*else\n\t\"Honestly, I'm surprised to see that you actually came,\" Breeze says, ${brehis} voice chilly. \"This whole thing was my idea, of course. I actually didn't want to invite you, but it wasn't my decision. So I hope you're glad to be here.\"\n\n\tActually, you think this party is a bit weird and probably in bad taste for Todrick, but before you express that sentiment, you figure you'd better see what else Breeze has to say in this little chat.\n\n\t\"I just wanted to ask that you be respectful, since I know that's hard for you,\" Breeze adds with a superior look. You instinctively bite your lip, struggling to keep your cool as you formulate your own response.\n\t*goto breezefinalechoice\n\n*label breezefinalechoice\n\n*if extraworning\n\t\"Priscy, pardon the intrusion,\" Rosae's voice suddenly chirp-echoes in your mind. \"I'm sure I don't have to remind you, but make sure to consider the alignment of all of your social goals when responding to Breeze, especially your Ruthless and Genuine strengths.\"\n\t*goto responctothatbreez\n*else\n\tAs you consider this response, you make sure to take into account the alignment of all of your social goals.\n\t*goto responctothatbreez\n\n*label responctothatbreez\n*choice\n\t#Hide how I really feel about this party and instead see if I can get Breeze to help me recruit more members to the coup.\n\t\t*set ruthless %+15\n\n\t\t\"This party was such a good idea, Breeze,\" you lie. \"Maybe we can also use it to feel out if anyone else might interested in our resistance efforts.\"\n\t\t*if (ruthless > 70)\n\t\t\t*set regime %-20\n\t\t\t*set rlshp_breeze %+20\n\n\t\t\tBreeze smiles at you, practically bursting with excitement.\n\n\t\t\t*goto breezerevealsreb\n\t\t*else\n\t\t\t*set regime %-10\n\t\t\t*set rlshp_breeze %-10\n\n\t\t\tWhen Breeze hears this, ${brehis} blue lips immediately turn down at the corners. \n\n\t\t\t\"Don't patronize me,\" Breeze scowls, crossing ${brehis} arms. \"I can tell you're not really excited about the party. Besides, don't you think I already thought of that? Now isn't the time.\"\n\t\t\t\n\t\t\tBreeze then turns ${brehis} head away, indicating that the conversation is over before you can say any more. \n\n\t\t\t*if (rlshp_breeze > 70)\n\t\t\t\t*achieve brefinalfriend\n\n\t\t\t\t\"I expect more from my friends, ${name}\" Breeze finishes.\n\n\t\t\t\t*label breezesensitive\n\n\t\t\t\tWow, Breeze is even more sensitive than you thought. You're going to have to remember to be extra careful how you speak to ${brehir} in the future. You suppose Breeze expected you to behave more genuinely, somehow.\n\t\t\t\t*goto breezelivetest\n\t\t\t*elseif (rlshp_breeze > 50)\n\t\t\t\t*achieve brefinalally\n\n\t\t\t\t\"I expect more from my allies, ${name}\" Breeze finishes.\n\t\t\t\t*goto breezesensitive\n\t\t\t*elseif (rlshp_breeze > 30)\n\t\t\t\t*achieve brefinalally\n\n\t\t\t\t\"You haven't proven you can be trusted yet, and I'm not telling you a thing until you do,\" Breeze finishes.\n\t\t\t\t*goto breezesensitive\n\t\t\t*else\n\t\t\t\t*achieve brefinalenemy\n\n\t\t\t\t\"I guess I shouldn't be surprised to hear that from you,\" Breeze finishes.\n\t\t\t\t*goto breezesensitive\n\t#Be honest with Breeze about my feelings on the party, but do so in a kind way that also considers ${brehis} feelings.\n\t\t*set ruthless %-15\n\n\t\t\"I know it's all for the best, but I just feel bad for Todrick,\" you say. \"What you're doing is very kind, but shouldn't we be sensitive to .\n\t*goto reacttocoupnews\n\n*label normalreveal\n\n\"It's the first official meeting of our coup d'état!\" Breeze hisses with excitement, spitting words so quickly you have to strain just to keep up. \"The idea to make it seem like a farewell party was all mine, Lady Venuma thought it was so smart. She hasn't been able to meet with everyone yet, so it's not a full house, of course. But it's such a good start, isn't it?\"\n\nBreeze then pauses, trying ${brehis} best to regain ${brehis} composure and seem serious.\n*if (rlshp_breeze > 70)\n\t*achieve brefinalfriend\n\t\"You're one of our first and most trusted members and you've proven to be a loyal friend, so I know you'll keep this secret with us.\"\n\n\t\"Of course I will,\" you answer, not missing a beat. \"I'm just so glad that we're friends.\" \n\t*goto reacttocoupnews\n*elseif (rlshp_breeze > 50)\n\t*achieve brefinalally\n\t\"You're one of our first and you've just proven we can trust you, so I know you'll keep this secret with us.\"\n\n\t\"Of course I will,\" you answer, not missing a beat. \"I'm happy to be trusted.\"\n\t*goto reacttocoupnews\n*else\n\t\"I'm only telling you this because we want to give you a second chance to prove your loyalty. So I know you'll keep this secret with us.\"\n\n\t\"Your secret is safe with me,\" you say, knowing there is no other appropriate response.\n\n\t*if (rlshp_breeze > 30)\n\t\t*achieve brefinalally\n\t\t*goto reacttocoupnews\n\t*else\n\t\t*achieve brefinalenemy\n\t\t*goto reacttocoupnews\n\n*label reacttocoupnews\n*page_break\n\nYou reach out to shake Breeze's hand, which gives you a moment to process this news.\n\n*if (ruthlessregime) or (officiallyneutral)\n\tYou're not sure whether this first secret meeting is a good thing or a bad thing, but you do know this much: no matter what, it's fantastic for you to be considered an insider and to have this knowledge at your disposal. \n\n\tNow you've just got to keep blending in to see how the rest of this \"party\" plays out.\n\t*goto breezelivetest\n*else\n\tIt's a very good thing to see the coup actually taking shape, and an even better thing to be considered among its ranks this early. However, you suppose you can't be too excited until you begin to see how everyone else responds to this idea.\n\n\tWhatever the case, you're anxious to see how the rest of this \"party\" plays out.\n\t*goto breezelivetest\n\n*label breezelivetest\n\nThen, as this moment finally settles into silence, you realize that\n*if (ruthlessrebellion) or (genuinerebellion)\n\t*if (rlshp_breeze > 70)\n\t\t*set mastery +1\n\t\t*set status +1\n\t\tyour relationship with Breeze is exactly where you want it to be, given your goals here on Versus.\n\t\t*goto todrickinterrupts\n\t*else\n\t\tyou could still stand to get closer to Breeze, to help reach your goals here on Versus.\n\t\t*goto todrickinterrupts\n*elseif ruthlessregime\n\t*if (rlshp_breeze \u003c 71) and (rlshp_breeze > 30)\n\t\t*set mastery +1\n\t\t*set status +1\n\t\tyour relationship with Breeze is exactly where you want it to be, given your goals here on Versus.\n\t\t*goto todrickinterrupts\n\t*else\n\t\tyou probably want Breeze to think of you more neutrally, given your goals here on Versus.\n\t\t*goto todrickinterrupts\n*else\n\t*if (rlshp_breeze > 50)\n\t\t*set mastery +1\n\t\t*set status +1\n\t\tBreeze obviously thinks ${breze} can count on you. You'll have to decide later if that's a good thing or not.\n\t\t*goto todrickinterrupts\n\t*else\n\t\tyou probably want Breeze to trust you a bit more, at least until you decide where your loyalties are going to lie.\n\t\t*goto todrickinterrupts\n\n*label todrickinterrupts\n*page_break\n\nBefore you or Breeze can say any more, there's a knock at the door. Breeze turns to open it and Todrick stands there, his hands still clasped.\n\n\"=Begs forgiveness=,\" Todrick projects. \"=Requests presence=\" at the party, =expresses doubt= about how to host such an affair.\"\n\n\"Of course, Todrick!\" Breeze answers. \"We'll come back out right now.\"\n\n\"=Offers thanks=,\" Todrick nods. \"You've helped so much. Truly.\"\n*if (rlshp_todrick > 50)\n\tTodrick says this last part to both you and Breeze with a gracious smile.\n\t*goto absorbfromt\n*else\n\tTodrick makes sure to address only Breeze, turning back around without greeting you.\n\t*goto absorbfromt\n\n*label absorbfromt\n\n\"Todrick, actually, can I talk to you privately for a moment?\" you ask. \"Breeze can tend to the guests in the meantime; this will only take a minute.\"\n\nBreeze turns to you to protest, but you wave ${brehir} away. \"I just have to ask Todrick about an, uh…an old Priscan luck tradition.\"\n\n\"I guess I should make sure everyone has drinks,\" Breeze says, trying to hide ${brehis} disappointment at being left out of another secret meeting. \"But don't be too long, you two!\"\n\n*page_break\n\nAs Breeze glides back into the living room, Todrick steps inside and looks at you with his round face, waiting for you to speak.\n\nYou probably should come up with some pleasantry, but you figure that time is too short for both you and Todrick for such empty gestures. This will likely be your only chance to full absorb Todrick before the Versus Match, so you had better make it count. \n\nYou have no idea if you'll even be able to MemoryTravel through Todrick's homeworld if he does indeed die tonight, but you know that you at least have to try.\n\nSo you lock eyes with Todrick and say, \"Todrick, I wanted to see you privately for a special reason…\"\n\n*choice\n\t#Tell Todrick the full absorb is a Priscan tradition to preserve memories.\n\t\t*set ruthless %+10\n\t\t*set rlshp_todrick %+10\n\n\t\t\"Priscans have an interesting perspective on death, I think,\" you begin. \"We believe those who pass are never truly lost, since our absorption abilities allow a part of the dead to live on within us. Todrick, I want to know if you would allow me this honor.\"\n\n\t\t\"That's very kind,\" Todrick says. \"=Posits assumption= you want to do this, just in case…\"\n\n\t\t*label weaknweak\n\n\t\tTodrick's trembling voice grows weaker and weaker until he is unable to finish—or, if he does complete this grim thought, you can't hear it. His fear wafts over to you with such strength that you almost shiver.\n\n\t\t\"I really do hope that this precaution ends up being unnecessary,\" you offer, placing a hand on Todrick's shoulder. Whatever else you know about the upcoming Versus Match, this much is true—and it is all that Todrick needs to know, right now.\n\n\t\tSmiling feebly, Todrick then nods, indicating that you may proceed. As Todrick's fear recedes a bit, you find it is replaced by thick sheets of your own guilt. \n\n\t\tBut there's no use for that now, so you take Todrick's clammy hand in your own.\n\t\t*page_break\n\t\t*goto todabsorb\n\t#Tell Todrick the truth: that you need his help to find something lost on Versus, and the only way is to absorb everyone one by one.\n\t\t*set ruthless %-20\n\t\t*set rlshp_todrick %+10\n\n\t\t\"That's very kind,\" Todrick says, seemingly uninterested in asking about whatever it is you're looking for. \"=Posits assumption= you want to do this, just in case…\"\n\t\t*goto weaknweak\n\t#Just force the absorb without permission.\n\t\t*set ruthless %+20\n\t\t*set rlshp_todrick %-30 \n\t\t*set forcetod true\n\t\t*comment enough to drive to enemy range\n\n\t\tYou simply reach forward and grab Todrick's hand, adding:\n\n\t\t\"Best of luck.\"\n\t\t*goto todabsorb\n\n*label todabsorb\n*set tech +3\n*set agile +1\n\nYou then initiate a full absorb, opening your mind with that simultaneous pushing and pulling feeling. Your eyes shine like liquid mirrors once again and your body tenses.\n\nAs your mind touches Todrick's, images as vivid as the paintings from his cottage flood your mind. You begin to feel lighter, like your body can handle so much more than your mind. Everything seems to simplify and heighten, as if you suddenly sense or understand so much less, but those things that you do perceive sharpen into full clarity. \n\nThen a brick of pure, unadulterated devoutness threatens to knock you over, until a pillar of kindness finally props you up. \n\n[i]Blerg, what does that even really mean,[/i] you ask yourself as the absorption process ends.\n\n*page_break\n\n*if forcetod\n\t\"=Demands answer= what you just did?\" Todrick says, stepping away from you.\n\t*goto toodisttoo\n*else\n\t\"=Ponders success=?\" Todrick asks, his big green eyes still set on you.\n\t*goto toodisttoo\n\n*label toodisttoo\n\nYou hear Todrick, but you're too distracted to answer right away. All you can feel is a sudden burst of grief. \n\nYou don't want Todrick to die tonight, because he simply doesn't deserve to. Without thinking, you pull him into an immediate, instinctual hug. \n\n\"Thank you, Todrick,\" you say, trying to hold back the tears that well behind your eyes. \"Thank you.\"\n\n*if (rlshp_todrick > 70)\n\t*achieve todfinalfriend \n\n\t\"No, =offers thanks= to ${name},\" Todrick replies. \"=Feels strongly= you have been such a good friend.\"\n\t*goto todrlshpcheck\n*elseif (rlshp_todrick > 50)\n\t*achieve todfinalally\n\n\t\"No, =offers thanks= to ${name},\" Todrick replies.\n\t*goto todrlshpcheck\n*elseif (rlshp_todrick > 30)\n\t*achieve todfinaltenuous \n\n\t\"=Feels strongly= should return to the party?\" Todrick asks, letting you go as quickly as might still be considered polite. He obviously doesn't want to offend you, but he doesn't want to hug you, either.\n\t*goto todrlshpcheck\n*else\n\t*achieve todfinaltenuous\n\n\t\"=Feels strongly= should return to the party. Now,\" Todrick says, obviously still angry with you.\n\t*goto todrlshpcheck\n\n*label todrlshpcheck\n*page_break\n\nAs Todrick steps out of your hug, you realize that politically speaking, \n*if (ruthlessrebellion) or (genuinerebellion)\n\t*if (rlshp_todrick \u003c 71) and (rlshp_todrick > 30)\n\t\t*set mastery +1\n\t\t*set status +1\n\t\tyour relationship with Todrick is exactly where you want it to be.\n\t\t*goto todrickinterruptsfake\n\t*else\n\t\tyour relationship with Todrick isn't where it should be.\n\t\t*goto todrickinterruptsfake\n*elseif ruthlessregime\n\t*if (rlshp_todrick > 70)\n\t\t*set mastery +1\n\t\t*set status +1\n\t\tyour relationship with Todrick is exactly where you want it to be.\n\t\t*goto todrickinterruptsfake\n\t*else\n\t\tyour relationship with Todrick isn't where it should be.\n\t\t*goto todrickinterruptsfake\n*else\n\t*if (rlshp_todrick > 50)\n\t\t*set mastery +1\n\t\t*set status +1\n\t\tyour relationship with Todrick is exactly where you want it to be.\n\t\t*goto todrickinterruptsfake\n\t*else\n\t\tyou probably want Todrick to trust you a bit more.\n\t\t*goto todrickinterruptsfake\n\n*label todrickinterruptsfake\nHowever, that doesn't really matter to you right now. \n\nYou know the bond you currently feel to Todrick is probably a result of the full absorb, but that doesn't make it any less consuming. The thought of losing him tonight is suddenly unbearable, especially given your role in making this nightmare a reality.\n\nYour only consolation is that, even if Todrick does die tonight, perhaps you'll still be able to MemoryTravel through his homeworld. Not just as a part of your Dhanthik quest, but to hopefully learn more about Todrick. In this way, in the truest Priscan tradition, Todrick will never be fully lost, since a part of him will always live within you.\n\nThankfully, the sound of voices out on the front lawn pulls you out of your potentially overwhelming emotional haze, as everyone reacts to a new arrival.\n*goto lvarrives\n\n*label separatesequence\n\nBefore you can do or say anything else, someone taps you on the shoulder. You turn around in the doorway to find Todrick standing there.\n\n\"=Offers greetings=,\" Todrick projects. \"=Requests permission= to speak privately?\"\n\nYou're not sure now is the best time for a private chat, but Todrick seems rather intent on having one, so you nod in agreement. \n\n*page_break\n\nYou enter a second bedroom, which is decorated warmly but impersonally with basic furniture and overlooks the woods beside the lake. You immediately notice the faded print on the wallpaper, which has the same overlapping V's that were projected onto the amphitheater screen and printed on the Versus map.\n\nTodrick steps into the room behind you and closes the door with a light slam.\n\n\"Firstly, =offers thanks= for your brave honesty before the Voting Ceremony,\" Todrick says, bowing his head a little. \"=Wonders deeply= what might have happened if you had not been so honest. =Radiates happiness= that you are here now, too. =Requests inquiry= as to why you left the voting amphitheater silently yesterday?\"\n\n[i]So that's what happened,[/i] you think—you must have gone into some kind of autopilot mode when Oli pulled your mind to the brainplane. You probably just walked straight back to OtherBoard's camp without a word, or at least that's what you hope happened.\n\n*page_break\n\n\"I, uh… wasn't feeling well,\" you try, not needing to get into the whole Oli thing until you know what it really means. You see instantly that Todrick looks unconvinced. \n\n\"It's a Priscan thing,\" you add. \"A kind of, uh…healing day-walking trance?\"\n\n\"=Offers understanding=,\" Todrick replies, though his expression betrays his claim. \"Well, =feels relief= that you are here now. =Posits question= whether should enter Breeze's party at all?\"\n\n*if extraworning\n\t\"Priscy, pardon the intrusion,\" Rosae's voice suddenly chirp-echoes in your mind. \"I'm sure I don't have to remind you, but make sure to consider the alignment of all of your social goals when responding to Todrick, especially your Ruthless and Genuine strengths.\"\n\t*goto todtimedec\n*else\n\tYou look back at Todrick, trying to decide what might be the smartest move for you both, given what you've done to Breeze. You also keep in mind your social goals.\n\t*goto todtimedec\n\n*label todtimedec\n*choice\n\t#\"We were invited, so shall we be polite and go inside to meet the others?\"\n\t\t*label playitnice\n\t\t*set ruthless %-15\n\t\t*set regime %+20\n\t\t*set rlshp_todrick %+20\n\t\t*set secretcoupmeeting true\n\n\t\t\"=Considers suggestion= a good idea, but…\" Todrick begins, promptly eyeing the floor as if he is afraid to go on.\n\n\t\t\"What is it, Todrick?\" you ask. \"You can tell me; whatever you say will stay between us.\"\n\n\t\t\"=Registers uncertainty=, but =posits assumption= this isn't really a party at all,\" Todrick begins, practically shaking. \"=Believes possible= this is really a secret anti-Elite rebel meeting.\"\n\n\t\tAs Todrick finishes speaking, suddenly everything snaps into focus—now this party makes much more sense. \n\n\t\tWhat doesn't make sense, however, is why Breeze would invite you and Todrick to this gathering after your clear acts of opposition to ${brehis} little coup. Could ${breze} be hoping to convert you? Or perhaps somehow make you seem involved to ruin your chances with The Elite Courte?\n\n\t\t*page_break\n\n\t\tWhatever the reason, you're here already, so you figure you might as well make the best of it. Whether that means learning more details about the coup, trying to somehow stop it from forming further, or truly mending things with Breeze, you suppose you'll have to wait and see.\n\n\t\t\"Thank you for telling me, Todrick,\" you say. \"I share your complete loyalty to The Elite Courte, so this news is very surprising. But since we're here already, let's go back to the party and see what we can learn?\"\n\n\t\tTodrick nods at you, looking much less sure that this is a good idea, but clearly wanting to trust you.\n\t\t*goto todrickrlshpcheck\n\t#\"Let's go inside and see if we can at least try to make things right with Breeze.\"\n\t\t*goto playitnice\n\t#\"I think we should go inside and try to ruin this party for Breeze.\"\n\t\t*label playitmean\n\t\t*set ruthless %+15\n\t\t*set regime %+10\n\t\t*set rlshp_todrick %-10\n\n\t\t\"=Requests forgiveness=,\" Todrick begins, his entire face falling. \"But =conveys disagreement= with this plan. =Rejects notion= that =possesses ability= to do such a thing.\"\n\n\t\tTodrick practically shakes where he stands, so you sigh and put a hand on his shoulder.\n\n\t\t\"That's all right, Todrick,\" you say. \"We won't do anything you don't want to do. Let's just go out there and see what happens, all right? I'll have your back either way.\"\n\n\t\tTodrick nods warily, looking much less sure that this is a good idea, but still willing to follow your lead. You'll have to remember in the future that Todrick is about as genuine as they come and he expects you to be, too.\n\t\t*goto todrickrlshpcheck\n\t#\"I think we should go inside and try to seem interested in Breeze's plans to oppose The Elite Courte.\"\n\t\t*goto playitmean\n\n*label todrickrlshpcheck\nNo matter what else happens at this \"party,\"\n*if (rlshp_todrick > 70)\n\t*set mastery +1\n\t*set status +1\n\t*achieve todfinalfriend\n\tat least you know that your relationship with Todrick is exactly where you want it to be.\n\t*goto breezeinterrupts\n*else\n\t*achieve todfinalally\n\tyou need to find a way to prove to Todrick that he can continue to trust you.\n\t*goto breezeinterrupts\n\n*label breezeinterrupts\n*page_break\n*set rlshp_breeze %-65\n\nYou open the door to re-enter the living room and nearly jump out of your skin when you find Breeze standing there, waiting for you. $!{Breze} has dressed up quite a bit for ${brehis} event, decked out in a\n*if (brefemale)\n\tlong white dress. It reveals slopes of her pale blue skin and almost matches her white hair, which she wears pinned up.\n\t*goto breannounsep\n*elseif (bremale)\n\twhite linen suit. It matches his combed-back white hair and makes the blue skin on his face even more vivid.\n\t*goto breannounsep\n*else\n\twhite linen pantsuit. It matches hir combed-back white hair and makes the blue skin on hir face even more vivid.\n\t*goto breannounsep\n\n*label breannounsep\n\nOnce the bedroom door is open, Breeze storms inside and slams it behind ${brehir}, a dark look raging on ${brehis} face.\n\n\"I can't believe either of you had the nerve to show your faces here, after what you've done,\" Breeze spits, ${brehis} voice shaking. \"Though I guess I'm glad you did show up, because it means now I can throw you out.\"\n\n*if (wantbreeze)\n\tBreeze then turns to you, looking particularly angry. \"I'm disgusted that I ever thought of you as anything other than slime.\"\n\t*page_break\n\t*goto breezeabsorbchoice\n*else\n\t*goto breezeabsorbchoice\n\n*label breezeabsorbchoice\n\nDespite this nasty display, you can see through Breeze's anger enough to know that ${breze} is really terrified. After all, ${breze} now faces almost-certain death tonight in the Versus Match. Even if Breeze brought this on ${brehir}self, you and Todrick are to blame for ruining ${brehis} last attempt to save ${brehir}self.\n\nSo you'd be inclined to follow Breeze's wishes and leave, but you know this will likely be your only chance to full absorb Breeze before the Versus Match. You have no idea if you'll be able to MemoryTravel through Breeze's homeworld later if ${breze} does indeed die tonight, but you know that you at least have to try.\n\nStill, how are you going to do that, with Breeze so angry at you? The fury vibrating off ${brehis} skin is so strong that it almost burns the back of your neck.\n\n*choice\n\t#Tell Breeze the absorb is a Priscan tradition to preserve memories and appeal to ${brehir} with flattery.\n\t\t*label brereluctant\n\t\t*set ruthless %-20\n\t\t*set rlshp_breeze %-10\n\n\t\t\"Priscans have an interesting perspective on death, I think,\" you begin. \"We believe those who pass are never truly lost, since our absorption abilities allow a part of the dead to live on within us. Breeze, I want to know if you would allow me this honor.\"\n\n\t\tYou see a small edge of Breeze's fury snap off as ${breze} considers your proposal.\n\n\t\t\"My memories are pretty important, so…\" Breeze trails off, ${brehis} trembling voice weaker and weaker until he is unable to finish—or, if ${breze} does, you can't hear it.\n\n\t\tThis small crack in Breeze's armor of anger seems to let loose a gale of new emotions Breeze was trying to hold in check. $!{Brehis} fear wafts over to you with such strength, you almost shiver.\n\n\t\t\"I really hope that this precaution ends up being unnecessary,\" you offer, placing a hand on Breeze's shoulder. Whatever else has happened between you two, you know that this much is true—you don't necessarily want to be responsible for anyone's death.\n\n\t\tSmiling feebly, Breeze then nods, indicating that you may proceed—Breeze looks afraid that if ${breze} talks, ${breze} may break down entirely. As Breeze's fear recedes a bit, you find it is replaced by thick sheets of your own guilt. \n\n\t\tBut there's no use for that now, so you take Breeze's cold hand in your own.\n\t\t*page_break\n\t\t*goto breabsorb\n\t#Tell Breeze the truth: that you need his help to find something lost on Versus, and the fate of the galaxy may depend upon it.\n\t\t*set ruthless %-20\n\t\t*set rlshp_breeze %-30\n\n\t\t\"You think I care what you need?\" Breeze snaps, crossing ${brehis} arms. \"You should have thought of that before you—\"\n\n\t\tBreeze stops ${brehir}self, looking afraid that if ${breze} finishes that sentence, ${breze} could break down entirely. This small crack in Breeze's armor of anger seems to let loose a gale of new emotions ${breze} was trying to hold in check. $!{Brehis} fear wafts over to you with such strength that you almost shiver.\n\n\t\t\"It is my sincerest hope that this precaution ends up being entirely unnecessary,\" you offer, placing a hand on Breeze's shoulder. Whatever else has happened between you and Breeze, you know that this much is true—you don't necessarily want to be responsible for anyone's death.\n\n\t\tWhich is exactly the same reason you do what you do next—too many lives are at stake for you to allow Breeze's anger to stop you. You clamp your hand down around Breeze's shoulder and brace yourself.\n\t\t*page_break\n\t\t*goto breabsorb\n\t#Just force the absorb without permission.\n\t\t*set ruthless %+20\n\t\t*set rlshp_breeze %-30 \n\n\t\tBefore Breeze even knows what you're doing, you reach forward and grab ${brehis} hand.\n\n\t\t\"Best of luck,\" you say, with a squeeze.\n\t\t*goto breabsorb\n\n*label breabsorb\n*set energy +3\n*set agile +1\n\nYou then initiate a full absorb, opening your mind with a simultaneous pushing and pulling feeling. Your eyes shine like liquid mirrors once again and your body tenses up.\n\nAs your mind touches Breeze's, images of a bright world flood your mind, full of primary colors and ascension and glory. You begin to feel lighter, as if your body could soar and float to new, unreachable heights. You feel hopeful and vital and young. \n\nThough you can't fight this creeping feeling that it's all a a facade, that below the shiny exterior there's something darker hiding. Then the brick of pure, unadulterated doubt threatens to knock you over, until a final pillar of denial props you up. Still, you feel yourself suffocating on secrets, layer upon layer of hidden secrets….\n\n[i]Blerg, what does that even really mean?[/i] you ask yourself as the absorption process ends. All you do know is that you suddenly feel a magnified burst of grief.\n\nYou don't want Breeze to die tonight, because you see now that ${breze} has barely had a chance to live, just like you.\n\n*page_break\n*achieve brefinalenemy\n\nWithout thinking, you pull Breeze into an immediate, instinctual hug. \n\n*if (rlshp_breeze \u003c 20)\n\t*set mastery +1\n\t*set status +1\n\n\tBreeze pushes you away, disgusted. \"How dare you! Don't you ever touch me again!\"\n\n\tSomewhere in the back of your mind, you remember that you're supposed to be acting like Breeze's enemy.\n\t*goto lvarriveslite\n*else\n\tBreeze just pushes you away, choking back tears. Somewhere in the back of your mind, you rememberthat you're supposed to be acting like Breeze's enemy.\n\t*goto lvarriveslite\n\n*label lvarriveslite\nHowever, that doesn't really matter to you right now. You know the bond you currently feel to Breeze is probably a result of the full absorb, but that doesn't make it any less consuming. The thought of losing ${brehir} tonight is suddenly unbearable, especially given your role in making this nightmare a reality.\n\nYour only consolation is that, even if Breeze does die tonight, perhaps you'll still be able to MemoryTravel through ${brehis} homeworld. Not just as a part of your Dhanthik quest, but to hopefully learn more about Breeze. In this way, in the truest Priscan tradition, Breeze will never be fully lost, since a part of ${brehir} will always live within you.\n\nThankfully, the sound of voices out on the front lawn pulls you out of your potentially embarrassing emotional haze, as everyone reacts to a new arrival.\n*goto lvarrives\n\n*label lvarrives\n*page_break\n\nYou walk out onto the front porch along with the rest of the partygoers, just in time to see Lady Venuma touching down on the lawn. She wears a black jumpsuit with a flowing cape, and today her only golden embellishment is the towering tiara upon her head. Lady Venuma's usually flowing black hair is tied up, and her gold-tone skin is more covered than usual, save for the sliver of cleavage the jumpsuit allows.\n\n\"That's her Versus Match outfit,\" Breeze says to everyone, or perhaps just to ${brehir}self. \"Always a tasteful jumpsuit.\"\n\n*if brefinalromance\n\tHearing this from Breeze, you can't help but feel a burst of pure jealousy—one you desperately try to suppress, for now.\n\t*goto thegestures\n*else\n\t*goto thegestures\t\n\n*label thegestures\t\n\nTodrick bows and gestures upon Lady Venuma's descent, along with Breeze, Baron Airon, Grog, and somewhat surprisingly, Pinkuju. Only you and the shrouded being make no visible shows of devotion. All he seems to offer is a quick shift into the form of a giant scarab beetle, though this vision disappears in the blink of an eye as well. \n\n\"How wonderful is it to see such a mighty and respected gathering,\" Lady Venuma announces, her golden gaze passing over each Ord in the crowd. \n\nWhen Lady Venuma's eyes finally fall upon you,\n*if genuineregime\n\t*set rlshp_venuma %-65\n\ther general smile turns cold, freezing into a glare of pure death. You fight against the chill running up your spine, though you can't say that you're surprised by her reaction, given your meddling. \n\t*goto respondtolv\n*elseif ruthlessrebellion\n\t*set rlshp_venuma %+45\n\ther smile broadens. She is obviously very pleased with your show of support and wants to single you out for it.\n\t*goto respondtolv\n*elseif genuinerebellion\n\t*set rlshp_venuma %+20\n\t*goto lvlevels\n*else\n\t*set rlshp_venuma %+10\n\t*label lvlevels\n\t*if (rlshp_venuma > 50)\n\t\ther general smile remains unperturbed, no doubt meant as some show of your general worthiness.\n\t\t*goto respondtolv\n\t*elseif (rlshp_venuma > 30)\n\t\tshe makes no attempt to distinguish you from the others, as if you're just one among her many subjects.\n\t\t*goto respondtolv\n\t*else\n\t\ther general smile hits a snag, as if the very sight of you is displeasing to her.\n\t\t*goto respondtolv\n\n*label respondtolv\n*page_break\n\nHaving properly greeted her audience, Lady Venuma steps within a few feet of the porch and then begins to hover off the ground, rising high enough that you all have to crane your necks to see her. She clears her throat regally, obviously gearing up for a speech. You must admit, it is a rather awesome sight, the hovering golden goddess—though you are taken out of the moment as you wonder how Lady Venuma's insanely high stilettos manage to stay on her feet as she hovers.\n\n\"Although we have many reasons to finally gather as one,\" Lady Venuma begins, \"the true reason we come together today is to support our dear and most honored friend, ${deathone}.\"\n\nEveryone turns to nod solemnly at ${deathone}, though you half expect them to turn and nod at you—adjusting to full absorbs is always a bit confusing. You still feel much lighter and much heavier thanks to ${deathone} floating around in your mind.\n\n\"We are here to celebrate ${deathone}'s bravery, but we are also here to provide ${deathone} with as much additional support and strength as possible,\" Lady Venuma resumes. \"As many of you already know, I have promised to pledge a portion of my power to ${deathone}, as much as the Versus Verses will allow.\"\n\nLady Venuma pauses as if she is expecting applause…and she actually does receive some from Baron Airon, Todrick, and Breeze.\n\n*page_break\n\n\"While of course this is our primary reason for gathering, we are also here to make sure another sacrifice, yet another mandatory risk, will not befall another Ord unnecessarily.\"\n\nAs a ripple stirs across the small audience assembled,\n*if secretcoupmeeting\n\tyou know exactly what Lady Venuma is hinting at. She is about to convene the first-ever meeting of her brewing anti-Elite coup d'état. You wonder just how—\n\t*achieve secretcoupmeetingac \n\t*goto timetoifinalizelv\n*else\n\tyou wonder if you've somehow missed some hidden subtext of this party. Is there some other reason Breeze organized this event that you—\n\t*goto timetoifinalizelv\n\n*label timetoifinalizelv\n\nThis thought shatters with every other, however, when you suddenly spot it emerging from the edge of the lakeside woods. It first appears as a black shadow, until the spikes on its crown catch the afternoon sunlight.\n\nSomeone invited Empress Vaccus.\n\nAnd it showed up.\n\n*page_break\n\nThe adrenaline courses into your veins with such force that you can feel it pumping and sloshing in your ears. In all that has happened with Dhanthik, the threat of Empress Vaccus had shrunk into the background on your list of concerns—but now it re-magnifies a thousandfold as Empress Vaccus trudges toward the cottage, the bloody V on its chest somehow dripping with newly painted blood.\n\nYou wonder for a moment if it might possibly have come in peace, but then it begins to charge two bloodmatter blasts around its midnight fists and you know it isn't here to party. Instantly, images of shredded limbs and disemboweled insides, harvested organs and toothless skulls bubble to the surface of your mind. Your teeth ache and your stomach drops.\n\nAre you ready to face this monstrosity again, now that it appears to be looking for a fight?\n\n*page_break\n\nInstantly you know that you have to take Empress Vaccus down, here and now, no matter your fear. You dare not kill it outright anymore, given the small chance that it might be Dhanthik in disguise, but you certainly cannot let it run rampant and potentially maim or convert the powerful guests assembled here. You have no idea if Empress Vaccus can turn any fellow inhabitants into Blotbocs here on Versus, but you're not willing to find out the hard way.\n\nSince you're the first one to see Empress Vaccus, you realize it's up to you to make the first move before it can do any damage.\n\n*if extraworning\n\t\"Priscy,\" Rosae suddenly chirps in your head, sounding far more severe than you've ever heard her. \"Only work with the others if you're well equipped to lead a team. Otherwise, you'll be better off fighting Empress Vaccus on your own.\"\n\t*goto evappraochchoice\n*else\n\t*goto evappraochchoice\n\n*label evappraochchoice\n*choice\n\t#Force the most powerful being here, Lady Venuma, into a fight with Empress Vaccus.\n\t\t*set mastery +1\n\t\t*set life -1\n\n\t\tYou dive forward and roll behind Lady Venuma just as Empress Vaccus raises its arms to fire. Before anyone else can register what's happening, two bloodmatter beams smash into Lady Venuma with such force, it sounds like a sonic barrier shattering.\n\n\t\tLady Venuma bears the brunt of the blasts with a deafening scream, though some bloodmatter energy splashes around and knocks you to your feet with licks of hot pain. Mirrored Matron, if that blast had hit you as its intended mark, you would have been obliterated on contact. Empress Vaccus is now playing for keeps, it would seem.\n\n\t\tAs the bloodmatter energy subsides, Lady Venuma stands defiantly, her jumpsuit smoking and frayed. She clenches her golden fists tightly, dense balls of yellow energy beginning to radiate around them like stars.\n\n\t\t\"Who dares?!\" Lady Venuma bellows, spotting Empress Vaccus sloshing onto the rim of the lawn. As soon as she does, she raises her fists and lets loose a barrage of energy so bright, you have to look away. Though you can still feel the blast's heat intensely, like you're standing next to a raging bonfire.\n\n\t\tLooking back, you are able to focus enough through the flashing stars blurring your vision to see Empress Vaccus streak backward into the woods. Lady Venuma's blast surely would have incinerated anyone else—blerg, just how powerful are these two?\n\n\t\t*if (solo > 50)\n\t\t\t*set solo %+15\n\t\t\t*goto followintowoodsfight\n\t\t*else\n\t\t\t*set solo %-15\n\t\t\t*goto followintowoodsfight\n\t#Convince everyone here to attack Empress Vaccus together as a team.\n\t\t*set solo %-30\n\n\t\t\"Listen everyone, we need to fight that thing together!\" you scream, pointing toward Empress Vaccus creeping onto the edge of the expansive front lawn. \"It's from my homeworld and it will infect or kill us all if we don't stop it!\"\n\n\t\tAs everyone turns to look, you're not sure if anyone has taken your warning seriously.\n\t\t*if (solo \u003c 25)\n\t\t\t*achieve teamachieve\n\t\t\t*set mastery +2\n\t\t\tThen as Empress Vaccus raises its fists to fire off a bloodmatter blast, everyone shifts into gear with astonishing speed.\n\n\t\t\t\"Slave, block!\" Baron Airon shouts, lifting into the air in some kind of evasive
