 of a threat Doctor Arachnus can be.\n *goto TheSabotage\n\n*else\n Twenty seconds before launch, the door clangs open, and someone hops into the seat beside you.\n \n \"I know you like to do the flirty stalker routine, ${cname}, but this is ridiculous.\"\n \n \"Is that how you treat your guests?\" ${che} responds, flashing you a smug smile. \"You're just as rude as your servants. Can you believe they shot at me?\"\n \n \"So that's what happened to them,\" you reply just as the countdown reaches zero. The intense gravitational force makes your entire body seem like it's being smashed into a marshmallow. It almost feels like the time the nautical supervillain Moby Richard, as big as his terrible name implies, belly flopped right on you during a villains-only pool party a few years back.\n \n Your stowaway seems annoyingly unfazed by the crushing force. ${checap} smiles at you and purrs in that annoyingly charming Russian voice.\n \n \"Don't worry, I'm here to help. Minotaur intelligence operatives have been monitoring your communications. I know about Doctor Arachnus's plans. I cannot convince the council, though, and so I am here on my own. If this stupid base is our best shot at stopping him, I have no choice but to make sure V.A.N.G.U.A.R.D. or anyone else doesn't get in your way.\"\n \n \"Why do you believe me, when your council doesn't?\" you ask, a bit relieved that this isn't going to turn into a stupid zero-gravity wrestling match.\n \n \"Because I am not twelve crazy clones constantly fighting for superiority. Because I am not obsessed with capturing a crazy fire-throwing clone sibling. Because I have seen Doctor Arachnus target you, when he ignores all others. Have seen his hatred of you. Maybe his fear. Because not believing carries too high a price.\"\n \n $!{che} actually sounds sincere. And it's not like you don't need the help…. This next part is going to be delicate, and you could really use someone watching your back. Besides, the only way to get rid of ${chim} right now would be to kick ${chim} out the airlock, and you're not really in the mood.\n \n \"So do you really think this satellite base will help you stop Arachnus?\" ${che} asks, in a \"the world is in peril\" version of small talk. Unbuckled from your seat, you fight the urge to play around and do flips as you float around the shuttle. Space is so cool!\n \n \"Maybe. Nautilus wouldn't or couldn't tell me what's actually coming. But in my experience, very few threats can stand up against an orbital death laser.\"\n \n You can see the look of discomfort on The ${cname}'s face. ${checap} clearly hates the idea of helping you build a powerful laser-equipped space base, but it's not like ${che} has a choice. Minotaur may think it's invincible, but at least The ${cname} knows just how big of a threat Doctor Arachnus can be.\n *goto TheSabotage\n  \n*label TheSabotage\n*page_break\nYou float your way down to the shuttle compartment, where the satellite's base is welded onto the floor. You attach a device and start inputting commands that will tell the device's nanobots what to do. Before you can finish, The ${cname} gives you some grim news over the ship's intercom.\n\n\"There's another ship heading this way, ${name}. You should come check it out.\"\n\nYou head to the front of the ship where all of the surveillance equipment is installed, but The ${cname} isn't there. In fact, the radar system shows that nothing is headed your way. You turn around to see ${chim} fusing shut the sliding door into the compartment with some kind of blowtorch weapon. Despite being in the control room, you can't open the door.\n\nThe ${cname} waves through the small glass panel on the door before heading to where the satellite base is. You wonder if this is just opportunistic betrayal, or if this was Minotaur's plan all along. After all, they probably think they can fight off Doctor Arachnus better than you can, without having to give you access to an immensely powerful space ray.\n\nStill, what kind of villain does ${che} take you for? As if you didn't plan for something like this. You have, like, an alphabet's worth of plans for people interfering with today's operation. You're barely going to have to crack Plan B here.\n\n*choice\n #Use the plasma cutter my goons hid on the ship.\n  Taking inspiration from some late-night video-gaming sessions with your less repellent goons, you've developed a small weapon that shoots bolts of hot plasma capable of cutting through most materials. You grab it from where your soldiers hid it under a bulkhead and use it to blast the sealed doors separating you from the satellite, then point it straight at The ${cname}.\n  \n  $!{che} lets out a frustrated sigh before stepping away from the satellite.\n  *goto CountDecides\n #Remotely activate the nanobot self-defense measures.\n  You can hear the shouts of pain from The ${cname} as a few of the nanobots emerge prematurely to attack. They've been designed to combine into mechanical mosquitoes that are hard to swat and hurt like heck when they bite.\n  \n  The distraction gives you enough time to finally break through the sealed doors and confront The ${cname}, who is backed up in the corner and still fighting off the mosquito drones.\n  \n  ${checap} lets out a frustrated sigh as you enter the room and deactivate the bots.\n  *goto CountDecides\n #Wake up \"the creature.\"\n  Before attaching the satellite, your goons were instructed to leave a caged creature in the cargo bay of the ship. Lab-designed to look like a scary extraterrestrial from your favorite sci-fi horror flick, it's intended for hunting down intruders.\n  \n  You can hear the shouts of terror from The ${cname} as the creature, remotely awoken and released, chases ${chim} around the room. The distraction gives you enough time to finally break through the sealed doors and confront The ${cname}, who is backed up in the corner and kicking at the creature to keep it away.\n  \n  ${checap} lets out a frustrated sigh as you command the creature to retreat.\n  *goto CountDecides\n  \n *selectable_if(planning>0) #Use the shrink ray I brought along. (Costs 1 Planning Point.)\n  It's about time you had a use for your expensive shrink ray! You quickly bring yourself down to size and climb up into the air vents that pump precious oxygen throughout the spacecraft.\n  \n  You make your way to the room where The ${cname} is and hop down, turning yourself to full size right behind ${chim}. Startled, ${che} jumps back with a look of defeat on ${chis} face.\n  *set terror %+5\n  *set ingenuity %+5\n  *set planning -1\n  *goto CountDecides\n  \n*label CountDecides\n\n\"Fine, you win,\" The ${cname} sighs. On ${chis} face is an expression of genuine defeat.\n\n\"What were you trying to do?\" you ask, as if it weren't obvious.\n\n\"If I had finished, Minotaur would have gained direct control over the base.\" Yeah, really not surprising, although the ease of ${chis} surrender kind of is.\n\n\"That's not going to happen,\" you reply while inputting the last few codes. In about a minute the nanobots inside the device will emerge, harvesting the rocket for the raw resources needed to build your awesome space base.\n\nTo your surprise, The ${cname} pulls out ${chis} Minotaur ID and drops it to the ground.\n*page_break\n\"My last act for those fools. They love their money and their power so much, but do they listen when I tell them what I know to be important? Of course not. More proof, they say, as though my instincts isn't all the proof they need.\"\n\n\"So you're quitting? Now?\" you ask incredulously.\n\n\"Yes. Now, I act only for myself.\" \n\n*choice\n #Ask ${chim} to join me.\n  *if countess > 7\n   \"Join me. You know that together we can stop Arachnus.\"\n  \n   The ${cname} nods in agreement immediately, almost as if ${che} was waiting for you to ask.\n  \n   \"Don't worry. No tricks this time,\" ${che} adds before extending ${chis} hand. You shake it just as the nanobots activate and start building the base.\n   *goto SteeleArrives1\n  \n  *else\n   \"Join me. You know that together we can stop Arachnus.\"\n  \n   The ${cname} shakes ${chis} head in rejection.\n  \n   \"You're no better than Minotaur. I will not throw off one foolish master only to accept another,\" ${che} sneers.\n  \n   Slightly disappointed, you decide to lock ${chim} in one of the ship's compartments just as the nanobots activate and start building the base.\n   *goto SteeleArrives2\n   \n #Try to imprison ${chim} at risk of a fight.\n  *if (countess > 5) and (combat > 75)\n   \"I'm locking you in one of the ship's compartments. You can either go quietly or in a body bag.\"\n  \n   The ${cname} nods in submission, letting you lead ${chim} to ${chis} temporary prison.\n  \n   \"Some much-needed time to think quietly. I should be thanking you,\" ${che} adds before stepping inside. You nod and shut the door just as the nanobots activate and start building the base.\n   *goto SteeleArrives1\n  \n  *else\n   \"I'm locking you in one of the ship's compartments. You can either go quietly or in a body bag.\"\n  \n   The ${cname} shakes ${chis} head in rejection. \"You know I won't go down without a fight. Never have, never will.\"\n   \n   \"Fair enough,\" you reply before pulling out a stun gun you always keep as a last resort—idea courtesy of your adventure with Nautilus. Before ${che} can react, you shoot several barbs into ${chis} body, instantly knocking ${chim} out.\n  \n   Slightly disappointed, you decide to lock ${chim} in one of the ship's compartments just as the nanobots activate and start building the base.\n   *set countess -2\n   *goto SteeleArrives2\n   \n #Kill ${chim}.\n  *if activist \u003c 50\n   \"It would have been great to work together, but I can't risk you getting in my way again.\"\n  \n   Just as you finish speaking, you walk up to a nearby control monitor, hold on firmly to something, and press a few buttons. Moments later, a nearby door opens to the outside, sucking everything out except you and the attached satellite. You close the door and peer out a small window to see The ${cname}'s lifeless body floating away into darkness. Such a waste.\n   *set countdead true\n   *set lethality +10\n   *goto SteeleArrives2\n  \n  *else\n   \"It would have been great to work together, but I can't risk you getting in my way again.\"\n  \n   Just as you finish speaking, you walk up to a nearby control monitor, hold on firmly to something, and press a few buttons. Moments later, a nearby door opens to the outside, beginning to suck everything out except you and the attached satellite.\n   \n   As The ${cname} holds on for dear life, ${chis} face of complete desperation and shock moves you. Though you'd like to get ${chim} out of your way, you'll need help in the struggles ahead. This is no time to kill a potential ally on a selfish whim. Reconsidering your decision, you press the monitor's touchscreen again to close the door. Looking at The ${cname}, you see ${che}'d already fallen unconscious and was only a second away from letting go to be sucked out into space. With the door closed, ${che} lies still on the floor.\n   \n   You decide to lock ${chim} in one of the ship's compartments, just as the nanobots activate to start building the base.\n   *set countess -2\n   *goto SteeleArrives2\n  \n *if(countfile = true) #Use the information I gleaned from Minotaur's files to convince ${chim} to join me.\n  \"I know why you're doing this,\" you say softly, and The ${cname} looks at you, wary.\n  \n  \"Oh? So easily you know my heart?\"\n  \n  You nod, solemn. \"I saw your file, back at the villa. Did you know that Minotaur knows about how you spend your money? The kids? The orphanages?\"\n  \n  ${checap} slumps in the low gravity. \"Suspected, perhaps. They have so very many eyes. And now you know, as well.\" ${checap} sighs. \"You know I will kill you if this information spreads?\"\n  \n  \"I know. I also know that those kids are in danger from Arachnus if he isn't stopped. And I know it would be easier to stop him with your help.\"\n  \n  ${checap} nods, not making eye contact. \"Yes, of course. No more tricks this time. I am yours.\" And ${che} extends ${chis} hand to shake just as the nanobots activate.\n  *if countess > 7\n   ${checap} looks up at you, and smiles. \"Thank you.\"\n   *goto SteeleArrives1\n  *else\n   *goto SteeleArrives1\n\n*label SteeleArrives1\n\nYou're pleased to see how fast the nanobots work as they spread from the satellite base, quickly transforming the rocket into a lavish space-borne base. Their first priority is constructing your telepad. Once it's active, more nanobots begin teleporting in, accelerating the construction process. In roughly two hours' time, the entire shuttle has been transformed into a decent-sized base with multiple rooms, fully stocked amenities, and a high-powered laser weapon roughly the size of a small building.\n\n\"Time to test this bad boy,\" you say to yourself while activating the laser's charging function. It'll take at least ten minutes to recharge, a lifetime to the average villain. Just think of how many times a superhero has managed to stop a deadly countdown just before it reached zero!\n*page_break\nWhile waiting, you feel something hit your space station with enough force to knock you off your seat. It doesn't hurt, since you float to the ground, but you're still confused about what it could be. Hopefully it's just space debris, and not your laser blowing up because you made a rounding error.\n\n\"You stay here. I'll check that out,\" you tell The ${cname} before taking an elevator up to the top level of your newly built base.\n*goto SteelFight\n\n*label SteeleArrives2\n\nYou're pleased to see how fast the nanobots work as they spread from the satellite base, quickly transforming the rocket into a lavish space-borne base. Their first priority is constructing your telepad. Once it's active, more nanobots begin teleporting in, accelerating the construction process. In roughly two hours' time, the entire shuttle has been transformed into a decent-sized base with multiple rooms, fully stocked amenities, and a high-powered laser weapon roughly the size of a small building.\n\n\"Time to test this bad boy,\" you say to yourself while activating the laser's charging function. It'll take at least ten minutes to recharge, a lifetime to the average villain. Just think of how many times a superhero has managed to stop a deadly countdown just before it reached zero!\n*page_break\nWhile waiting, you feel something hit your space station with enough force to knock you off your seat. It doesn't hurt, since you float to the ground, but you're still confused about what it could be. Hopefully it's just space debris, and not your laser blowing up because you made a rounding error.\n\nYou take an elevator up to the top level of your newly built base.\n*goto SteelFight\n\n*label SteelFight\n\nTo your surprise, a shiny chrome spaceship has attached itself to the outside of your base. As you watch, several soldiers in spacesuits emerge, followed by…Steelheart. You're not actually sure V.A.N.G.U.A.R.D. has any jurisdiction here, but you doubt that argument will hold a lot of water. As you strap into your own suit to go and meet them, you realize that they'll probably want to talk. If they'd wanted you dead, you know it's not outside V.A.N.G.U.A.R.D.'s remit to just blow you out of the sky.\n\n\"Welcome to my space base! Come inside, have a smoothie,\" you shout over the radio. Steelheart and ${shis} troops point their weapons at you.\n\n\"We're here to bring you in before that laser is fully charged. The last thing we need is a supervillain with a laser-equipped space base orbiting our planet.\"\n\n*if (((combat > 75) or (ingenuity > 75)) or (terror > 75))\n \"I'm afraid I can't let that happen,\" you reply before holding your thumb down, ancient Rome style.\n \n Not suspecting a thing, Steelheart and ${shis} troops get taken out by none other than ${sidekick}.\n *set notoriety +5\n *goto MinionAttack\n \n*else\n \"I'm afraid I can't let that happen,\" you reply before flinging yourself back through the airlock into your base.\n \n Instead of following you inside, Steelheart and ${shis} troops make their way to the laser on the exterior of the ship. You're going to be one ticked-off villain if they find a way to bust it up before it's fully charged. You should have had your minion standing by just in case this happened!\n *goto BarelyCharge\n\n*label MinionAttack\n\n*if hackmaster = true\n They don't see Hackmaster's mech coming. It makes short work of Steelheart's troops with its fifty-cal machine guns. Hackmaster then shreds their ship apart, sending it floating away in several pieces. \n \n Surrounded by the corpses of ${shis} troops, Steelheart silently glares at you as you take ${shim} into custody.\n *set Steele -10 \n *goto EasilyCharged\n\n*elseif star = true\n They don't see The Star coming. Within seconds, Steelheart's troops simply begin to vanish. You know they're being dragged into hidden access ports in the base's surface, but the effect is still eerie as hell. Soon, Steelheart is alone. ${shecap} doesn't protest as The Star appears beside ${shim} and leads ${shim} into your base.\n \n *goto EasilyCharged\n\n*else\n In space, no one can hear Slog punch them in the helmet so hard that their eyes cross. Which he does, over and over again, until Steelheart is the only one left awake. Hoisting the unconscious troops over his left shoulder, Slog casually bumps Steelheart's spaceship, which flies off into the darkness. Smiling amiably, he points toward the airlock, and the superspy grudgingly obliges.\n \n *goto EasilyCharged\n \n*label EasilyCharged\n\nYou return to your control room and are pleased to see that the laser is fully charged and ready to go. With Steelheart taken prisoner and unable to mess with your cannon, you have time to give an amazing speech on every television and computer screen on Earth. Forty-two glorious minutes later, you prepare to fire.\n*set theatricality %+5\n*goto LaserChoice\n\n*label BarelyCharge\n\nYou make it to your control room and are pleased to see that the laser is fully charged and ready to go. With Steelheart only seconds away from placing explosives on your laser cannon, you have no choice but to fire without so much as a preamble. Quite a shame, since you had an amazing speech ready to give to the entire world.\n*set steelfree true\n*set theatricality %-5\n*goto LaserChoice\n\n*label LaserChoice\n \nOkay, sure, the laser is mostly for dealing with Doctor Arachnus. But you've got to at least test it, right?\n\n*choice\n #Blast Madagascar off the map, lemurs and all.\n  *if lethality > 15\n   You press the launch button and watch as your powerful laser decimates the island into nothing. Now V.A.N.G.U.A.R.D. and anyone else planning to stop you will realize that you won't hesitate to use your new toy. The fact that you targeted a land with so much unique wildlife will make your ruthlessness even more clear.\n   *set lethality +20\n   *set notoriety +7\n   *set steele -5\n   *set nautilus -5\n   *goto BedChambers\n  *else\n   You press the launch button and watch as your powerful laser starts decimating the island into nothing. Although you enjoy it at first, you have a change of heart halfway through and cut the power, leaving only half the island. Maybe you're just not as lethal as you thought?\n\n   Even so, now V.A.N.G.U.A.R.D. and anyone else planning to stop you will realize that you won't hesitate to use your new toy. The fact that you targeted a land with so much unique wildlife will make your ruthlessness even more clear.\n   *set lethality +10\n   *set notoriety +2\n   *set steele -5\n   *set nautilus -5\n   *goto BedChambers\n   \n #Aim it at Merit City and demand huge reserves of cash and power.\n  *if activist \u003c 50\n   Merit City has no choice but to fork over most of their money into your bank account. They're lucky you didn't just blast the entire place and build a new, better city. Hmm, ${name} City has a nice ring to it.\n   *set notoriety +5\n   *set activist %-15\n   *set countess +5\n   *goto BedChambers\n  *else\n    Merit City has no choice but to fork over most of their money into your bank account. They're lucky you didn't just blast the entire place and build a new, better city. \n\t\n    But for whatever reason, you're left satisfied with half of the city's cash and let them keep some for themselves, out of pity. Maybe you're not as selfish as you thought?\n    *set notoriety +2\n    *set activist %-10\n    *set countess +5\n    *goto BedChambers\n   \n #Aim it at Merit City and demand that their government be disbanded.\n  *if (activist > 50) or (activist = 50)\n   Merit City has no choice but to chase all of their corrupt, foolish government officials out of office and the city. You'll be sure to make them make you their royal ruler sometime soon. The Kingdom of ${name} has a nice ring to it, after all.\n   *set notoriety +5\n   *set activist %+15\n   *set nautilus +5\n   *set steele +5\n   *goto BedChambers\n   \n  *else\n   Merit City has no choice but to chase all of their corrupt, foolish government officials out of office and the city. They're lucky you won't be forcing them to make you their royal ruler, even if the Kingdom of ${name} has a nice ring to it.\n   *set notoriety +2\n   *set activist %+10\n   *set nautilus +5\n   *set steele +5\n   *goto BedChambers\n   \n #Use the laser to project my favorite comedy movie, GolfHouse, onto the moon.\n  *if theatricality >80\n   You even fire giant bags of popcorn onto Earth, just to make sure they're enjoying the movie as much as you are. No audio, but heck, you already know it by heart. It's a real Cinderella story.\n   *set notoriety +5\n   *set theatricality %+15\n   *set nautilus +5\n   *set steele +5\n   *goto BedChambers\n   \n  *else\n   You only wish you had brought a giant bag of popcorn to fire at Earth, just so they'd have something to snack on while watching the movie. No audio, but heck, you already know it by heart. It's a real Cinderella story.\n   *set notoriety +2\n   *set theatricality %+10\n   *set nautilus +5\n   *set steele +5\n   *goto BedChambers\n\n*label BedChambers\n\n*if (steelfree = true)\n With your laser tested more or less to your satisfaction, you just have to make sure Steelheart doesn't destroy it. You make a quick call to ${sidekick} and explain the situation.\n\n \"On it,\" ${sidehe} says.\n\n You don't waste any time in getting to the laser cannon yourself. You meet ${sidekick} there just as Steelheart's men are beginning to set the explosives.\n\n *if hackmaster = true\n  Hackmaster's mech springs into action. Machine gun action. As you put your hands over your ears and wait in dread for her to set off the explosives by mistake, she takes out Steelheart's troops.\n\n  Surrounded by the corpses of ${shis} men, Steelheart fixes you with a glare. \"That was incredibly stupid, you know.\"\n\n  Still a little shaken yourself, you take ${shim} into custody without a word.\n  *set Steele -10\n  *goto BedOne\n\n *elseif star = true\n  It occurs to you too late that setting your unhinged minion loose in a room full of explosives might be a bad idea, but The Star doesn't do anything rash. Instead of the unwarranted pyrotechnics you feared, Steelheart's men simply begin to vanish. The Star is a silent opponent, snatching away soldiers before they even see him.\n\n  Alone, Steelheart doesn't protest when The Star appears beside you to lead ${shim} to a secure location.\n  *goto BedOne\n\n *else\n  Slog handles the situation as he handles most situations—with a lot of punching. He pummels Steelheart's troops into submission while you prevent Steelheart from interfering.\n\n  With unconscious men everywhere, Slog moves toward Steelheart. The superspy grudgingly lifts ${shis} hands into the air, and you take ${shim} into custody.\n  *goto BedOne\n\n*label BedOne\n*if Steele > 10\n\n A few hours later, there's a knock on your door. You're not surprised to see that Steelheart has escaped from your brig. But you're a [i]little[/i] surprised when ${she} leans forward and kisses you.\n *choice\n  #\"Flattering, ${sname}. But I'm sorry. My answer is no.\"\n   You've never seen the superspy look so flustered. ${shecap} mumbles some excuses about \"space madness\" and wanders back toward the brig to sleep. You turn away from the door, a little embarrassed yourself.\n   *set SteelRejected true\n   *goto BedTwo\n  #\"I'm sorry, ${sname}, but there's someone else.\"\n   You have no intention of spilling your secret desires to Steelheart of all people, but at least your partial explanation makes you feel less guilty over ${shis} hasty, flustered departure. You turn away from the door, suddenly curious what the one your heart belongs to is thinking tonight.\n   *set SteelRejected true\n   *goto BedTwo\n  #\"Finally.\"\n   You grab Steelheart's hand and lead ${shim} to your bed. \n   *goto SteelRomance\n*else\n *goto BedTwo\n\n*label SteelRomance\nSteelheart snorts. \"You don't waste any time, do you?\"\n\n\"Under the circumstances,\" you say, \"we don't really have time to waste.\"\n\n\"Fair point.\" ${shecap} runs ${shis} fingers through your hair and kisses you a second time. Then ${she} flops back against the pillows of your bed, a glimmer of amusement in ${shis} eyes. \"You amaze me. You aren't even surprised that a top V.A.N.G.U.A.R.D. agent would want to do this?\"\n*fake_choice\n #\"I know I'm irresistible.\"\n  ${shecap} barks a short laugh and shakes ${shis} head. \"Amazing.\"\n\n  You'll take it as the compliment it appears to be on the surface. \n #\"I was too happy to question it.\"\n  You blush under ${shis} sharp gaze but continue doggedly, \"If a supervillain can fall in love with someone from V.A.N.G.U.A.R.D., why couldn't it work the other way around?\"\n\n  You suddenly worry you've misinterpreted the whole situation. Confessing love isn't a very villainous activity to begin with, and if it turns out ${she} doesn't feel that way…\n\n  The warmth in ${shis} eyes calms your fear. \n #\"Good point. Why are you really here?\"\n  The question comes out a little sharper with suspicion than you intended it, but it's ${shis} own fault for raising doubts in your mind. Seducing you to stop your plans doesn't quite seem like Steelheart's style, but you haven't really known ${shim} long enough to be one-hundred-percent certain.\n\n  ${shecap} frowns. \"I don't have any ulterior motives, if that's what you're afraid of.\" At least ${she} doesn't sound annoyed. \n *comment endchoice\n\nSteelheart folds ${shis} arms and stares somewhere just over your shoulder, ${shis} gaze distant and soft. \"To tell you the truth, I'm not sure when I started feeling this way. Somehow, through all our conflicts and confrontations…I realized that despite everything, you're not such a bad person.\"\n\n\"Neither are you,\" you say after a moment.\n\n${shecap} smiles. \"It's not so unusual, you know. These things happen all the time. They usually end in heartbreak.\"\n*fake_choice\n #\"Well, we won't let that happen to us.\"\n  Your own sincerity and determination as you say it surprises you. It may not be the easiest path to take, but it's what you want. Your future includes Steelheart, and you won't give ${shim} up without a fight.\n\n  ${shecap} reaches up and twines ${shis} arms around your neck. \"You sound so confident, even I believe it.\"\n #\"It's a chance we have to take.\"\n  ${shecap} is right. Heck, even relationships between supervillains have a low success rate. Sooner or later, they end up on opposing sides of one crime or another.\n\n  On the other hand, there [i]are[/i] success stories. You and Steelheart could be one of them.\n\n  Steelheart cracks a smile. \"Are you a gambler, ${name}? Well, I'm willing to take a chance if you are.\"\n #\"No matter what happens, we'll always have tonight.\"\n  It would be nice to think you and Steelheart will have a long-lasting relationship, but you're a realist. Even assuming you both survive whatever Doctor Arachnus has in store—and you [i]will[/i]; accepting the slim possibility of failure doesn't make you a defeatist—your future won't be quiet and peaceful. Where's the fun in that?\n\n  But even if you turn against each other one day, it won't change the fact that here, on this night, you and Steelheart belonged together.\n\n  \"Then,\" Steelheart says, \"let's focus on tonight.\"\n #\"I'm sorry. Maybe we shouldn't do this.\"\n  You aren't sure what you were thinking when you invited Steelheart into your room. Regardless of any attraction you feel, you know this can't work out.\n\n  ${shecap} blinks at you in surprise, hurt visible in ${shis} eyes. \"Are you sure?\"\n\n  \"I'm sorry.\" You look down at your hands and don't look up again until you hear the door close behind the departing superspy.\n  *set SteelRejected true\n  *goto BedTwo\n\nFollowing Steelheart's lead, you set aside any misgivings and kiss ${shim}. What the future will bring you don't know, but for now you sink into contentment in Steelheart's arms.\n*set SteelBed true\n*achieve steelheart\n*goto BedTwo\n\n*label BedTwo\n*if (countess > 7) and (countdead = false)\n\n A few hours later, there's a gentle knock at the door of your bed chamber. Opening it, you see The ${cname}. From the look in ${chis} eyes, ${chis} intent is clear.\n *choice\n  #\"I don't think it would be a good idea, ${cname}. I'm sorry.\"\n   The look of shock on ${chis} face is priceless. You don't think ${che} gets turned down very often.\n\n   *if SteelBed = true\n    Propped up on one elbow, Steelheart watches you from the bed with a look of wry amusement. \"Well, you're certainly popular today.\"\n\n    ${shecap} doesn't sound too jealous, but you hurry back to ${shim} anyway and shake The ${cname}'s interest from your thoughts.\n   *set CountRejected true\n   *goto TheAlert\n  #\"I'm sorry, ${cname}, but there's someone else.\"\n   ${checap} appears shocked. You don't think ${che} gets turned down very often, especially in favor of another person.\n\n   *if SteelBed = true\n    Once The ${cname} leaves, you return to Steelheart, who appears both amused and pleased.\n   *set CountRejected true\n   *goto TheAlert\n  #\"I've wanted this since the moment we met.\"\n   \"As I suspected,\" ${che} says, ${chis} accent making even such a simple statement sound alluring.\n\n   *if SteelBed = true\n    A deliberate cough from behind you reminds you that you aren't alone. You step out of the door frame so Steelheart and The ${cname} can see each other. \"Um.\" All this effort toward villainy, not one but [i]two[/i] amazing people ready to spend the night with you, and the best you can come up with is \"um\"?\n\n    The ${cname} isn't nearly as ineloquent. \"My, my, what an unusual situation we've found ourselves in. To think that the three of us would meet under these circumstances…such an astonishing situation demands an astonishing resolution.\"\n\n    \"Oh?\" you ask, a little nervous about what ${che} might consider \"astonishing.\" A small war on your new space station isn't how you want to spend your evening, after all.\n\n    \"Let me put it this way,\" ${che} continues. \"I am willing to share.\"\n\n    Steelheart has spent the entire time watching the two of you in silence, and now ${she} rubs ${shis} chin. \"I didn't think this day could get any more unusual. I was mistaken. Strangely, the three of us seem to be on the same side for once. In honor of that, I agree with you, ${cname}. If ${name} wants you here, I have no objections.\"\n\n    You're almost lightheaded as The ${cname} steps inside and walks to your bed. If this sort of luck holds up, Doctor Arachnus doesn't stand a chance!\n    *goto CountRomance\n   *else\n    You're almost giddy as you lead The ${cname} to your bed.\n    *goto CountRomance\n*else\n *goto TheAlert\n\n*label CountRomance\nThe ${cname} clearly approaches romance with the same swift confidence ${che} does with everything else, as you barely reach the bed before ${che} pins you to it and kisses you. By the time ${che} lets you up for air, it has occurred to you that a night with ${chim} might be just as tiring as a battle. Still, you aren't going to protest.\n\n\"Tell me the truth,\" ${che} says, ${chis} accented voice a low growl, \"did you expect me to come here tonight?\"\n*fake_choice\n #\"Of course. Why wouldn't you?\"\n  \"Arrogant as ever,\" ${che} says, but with fondness. \"I suppose next you'll tell me you knew from our very first conversation that this night would come.\"\n\n  ${checap} might be teasing you, but you're too happy to take back what you said. \n  *if SteelBed = true\n   Beside you, Steelheart shakes ${shis} head and starts laughing.\n #\"No, but I hoped you would.\"\n  \"Ah,\" The ${cname} says. \"Longing for me, were you?\"\n\n  \"More than you know,\" you say. \"You've been at this much longer than I have. I may have built up a reputation for myself, but a part of me worried I'd always be the rookie troublemaker to you. I wasn't sure you'd look twice at me, much less…\" You stop, uncertain of just how far The ${cname}'s feelings for you go. The last thing you need is to give a corny, sentimental speech in front of ${chim}.\n\n  \"Mm,\" ${che} breathes out. \"Fear not. You won my admiration.\"\n #\"I'm still not sure why you did.\"\n  As soon as the words leave your lips, you regret them. At best, you'll sound self-deprecating; at worst, suspicious of the ${cman} you were just kissing. Neither will make a good impression.\n\n  \"Understandable.\" The ${cname} laughs softly. \"Perhaps I just prefer to be unpredictable.\"\n *comment endchoice\n\nYou take advantage of the brief silence that follows ${chis} comment to gather your thoughts. \"I'm happy,\" you finally say. \"Not only because you're here, but because I never wanted to be your enemy. I'm happy we're on the same side.\"\n\n\"For now.\" ${checap} sits up, releasing you from the hold ${che} still had you in. \"You never know what the future might bring.\"\n\n*if SteelBed = true\n Steelheart nods. \"This conversation sounds familiar. I don't know what you have in mind, ${cname}, but we decided not to waste time on what-ifs.\"\n\nYou study The ${cname}'s serious expression and recognize the question in ${chis} eyes. Considering who the two of you are, any sort of relationship might end in disaster.\n*fake_choice\n #\"I'm not going to give up. Are you?\"\n  Your determination is so strong that the question comes out almost as a challenge. It doesn't matter who you and The ${cname} are, or who you were. Nothing can make your relationship fall apart if you're willing to fight for it.\n\n  ${checap} laughs. \"Me? Give up? Hardly.\"\n #\"I'm willing to risk it if you are.\"\n  With The ${cname} no longer in Minotaur, there's less chance of further conflicts between the two of you, but that's no guarantee you'll always be allies. Then again, anyone with a secret identity has added relationship struggles that regular people don't face. At least you'll be on equal footing.\n\n  Besides, what worthwhile goal didn't involve risk?\n\n  \"I am not afraid to take a chance,\" ${che} says. \"Very well then.\"\n #\"Let's focus on the present, not the future.\"\n  ${checap}'s right. Anything could happen in the future. Even the immediate future has uncertainties, with Doctor Arachnus's plan looming over you. A future with The ${cname} could be one heck of a ride—not that you'd want it any other way.\n\n  But while you like to think of yourself as a long-term planner with great things ahead of you (which range from wealth and power to the world's largest pizza factory, depending on what sort of mood you're in and what you've been drinking), this is one time when you want to focus solely on the here and now.\n\n  Here and now, The ${cname} is with you.\n\n  \"So be it.\" ${checap} toasts you with an imaginary wineglass. \"To tonight.\"\n #\"I'm sorry. Maybe we shouldn't do this.\"\n  The initial excitement of The ${cname}'s arrival has faded into realism. It's never going to work…and the more you think about it, the more you realize it's a bad idea to even try.\n\n  Shocked disbelief flares in ${chis} eyes. \"Are…you certain?\"\n\n  \"Yes,\" you say quietly.\n\n  *if SteelBed = true\n   Steelheart doesn't say a word, but watches the two of you with a sad smile.\n\n  Without a word, The ${cname} rises. A few quick strides carry ${chim} to the door and out of the room. You stare down at your hands, feeling a pang of guilt.\n\n  *if SteelBed = true\n   \"These moments are always difficult to face,\" Steelheart says after a moment. \"If it helps, I think you made the right decision.\"\n\n   It helps.\n  *set CountRejected true\n  *goto TheAlert\n\nWith questions of the future taken care of, The ${cname} pins you again for another long kiss. You wrap your arms around ${chim} without hesitation now. There is nowhere you'd rather be.\n*set CountBed true\n*achieve countess\n*goto TheAlert\n \n*label TheAlert\n\n*if (CountBed = false) and (SteelBed = false)\n Later, in your lonely bedchambers, you're awoken by an alert and race to the base's control center.\n \n Your jaw drops as you gaze upon a massive UFO that appears to be headed straight toward Earth.\n *finish\n \n*elseif (CountBed = false) and (SteelBed = true)\n *page_break\n In your bedchambers, you're awoken by an alert. You quietly get out of bed, making sure not to wake up Steelheart. You make your way to the base's control center.\n \n Your jaw drops as you gaze upon a massive UFO that appears to be headed straight toward Earth.\n *finish\n \n*elseif (CountBed = true) and (SteelBed = false)\n In your bedchambers, you're awoken by an alert. You quietly get out of bed, making sure not to wake up The ${cname}. You make your way to the base's control center.\n \n Your jaw drops as you gaze upon a massive UFO that appears to be headed straight toward Earth.\n *finish\n\n*else\n *page_break\n In your bedchambers, you're awoken by an alert. You quietly get out of bed, making sure not to wake up either The ${cname} or Steelheart. You make your way to the base's control center.\n \n Your jaw drops as you gaze upon a massive UFO that appears to be headed straight toward Earth.\n *finish", "chapterfive": "*image chap5.png\n\nIt's good to be back in Merit City! Honestly, you didn't expect to miss this hero-infested place so much. The good news is that driving hundreds of miles across the horrendous wasteland that is the American Midwest gave you some time to think about your ultimate goal as a supervillain. Well, that and what your next costume redesign will look like. Should you add a cool hood to give yourself a mysterious look, maybe even include an awesome cape? How about a high turned-up collar to give everyone that \"dark and evil\" vibe? Looks aside, you should definitely implement one of the more practical ideas you had in mind.\n\n*choice\n #A wireless radio device to better organize troops during a scheme.\n  Your military exercises are brutal and demanding, as evidenced by the large \"No Crying\" signs throughout the training facility, but there's still a chance for your planned operations to get disorganized if a competent hero or villain interferes. Being able to constantly give orders to your troops will prove useful when things get unpredictable during a scheme.\n  *set combat %+10\n  *goto Thediner\n #A high-tech eye device that offers details on heroes and villains.\n  With the press of a button you'll receive juicy info on a target in the Darkspace database, including their worst fears, a numerical measure of how much of a threat they are, and how likely they are to date you. The next time a hero like The Postman (\"Neither sleet nor snow nor costumed malfeasance shall stop me in my quest!\") unexpectedly interferes with your schemes, you'll be immediately able to scan him and call in a crate of the dog breed he fears the most.\n  *set ingenuity %+10\n  *goto Thediner\n #A utility-belt expansion to make room for my new fear-gas bombs.\n  The Hayman was kind enough to share his powerful fear-gas formula in exchange for your family's famed chocolate cake recipe. (Seriously, it's that good. The secret ingredient…is a secret.) With these bombs you'll be able to distract cops and other would-be interferers by making them see their worst nightmares come to life. Classic!\n  *set terror %+10\n  *goto Thediner\n\n*label Thediner\n\nYou'll definitely get started on that…first thing tomorrow morning. It isn't like you'd get your gadget soon anyway. The shipping time on these things is murder. \n\nRight now you've got a ton of paperwork to get through that piled up during your vacation. It's funny how most people assume that the life of a supervillain is all fun and games. Sure, you get to blow stuff up, give threatening speeches, maybe even get away with cutting in line at the grocery store, but you're not without your mundane tasks to complete as well.\n\n*page_break\nYour cross-country trip has given you a weakness for diners. The cracked leather booths, the clink of silverware, the hearty smiles you can imagine wiped off guileless faces…. So, you decide to work at a local sit-down place instead of your office back at the lair. (It's also scary movie night at the base, and concentrating while your goons scream like infants is pretty much impossible.)\n\nThe diner you enter doesn't have the same cozy atmosphere as the one back west, but at least it's quiet. Sitting at one of the booths, you open up your laptop and hope people see you as just another loser sipping coffee and working on the amazing, revolutionary screenplay that you're always telling people about at parties.\n\n*if lethality > 1\n You take care of the Human Resources paperwork for dead minions first, finding it hilarious that they actually expect you to remember how each and every one died. Dead is dead, whether they were crushed by a massive robot, had their flesh melted off by a vigilante nemesis, or were accidentally blown to pieces by your poorly tossed explosives. You usually make up a death whenever that last one happens. Hiring a team to take care of such paperwork has crossed your mind, but then you'd be running the risk of everyone finding out just how dangerous working for you is. The last thing you need is a terribly organized goon labor strike on your hands. Having to read the misspelled signs alone would be headache-inducing.\n *goto paperwork2\n*else\n You take care of the Human Resources paperwork for injured minions first, cringing at each incident you're forced to list. Did one of your minions really walk into traffic while belting out nursery rhymes? Another thought it would be a good idea to test the lair's electrical system with a fork? And how did that one guy suffer third-degree burns while making popcorn? You seriously consider making up alternate explanations for the injuries. Hiring a team to take care of such paperwork has crossed your mind, but then you'd be running the risk of everyone finding out just how inept your minions can be. The last thing you need is for these absurd incidents to go viral.\n *goto paperwork2\n\n*label paperwork2\n*page_break\nNext up, it's time to send out emails to your suppliers and contractors that help keep your base stocked, clean, and ready for villainy. You arrange for someone to reapply hemotoxic venom to your spike traps, then order another few million gallons of lava. (Lava is the paprika of costumed villainy; you can never have enough.) Wow, there's a buy-one-get-one-free deal on giant lasers! You order six to make it an even dozen. And now that you think about it, your favorite torture chamber is long overdue for a visit from a pain-inflicting professional. You contact someone to…\n\n*choice\n #Update the psychological torture room with new propaganda messages.\n  Currently the room involves making the victim listen to someone say \"${name} is the best villain ever\" on a never-ending loop while watching videos of you performing mischievous deeds. Nothing wrong with that, but it couldn't hurt to toss in a few more lines or at least update the footage. You hadn't yet found the perfect look for your hair back then.\n  *set activist %+10\n  *goto Oldguy\n #Give my giant shark tank a good scrub-down.\n  Giant sharks tend to produce giant you-know-what, unfortunately. Hopefully this next guy can clean the tank without losing a limb, especially since their contracts clearly state that you have to pay additional fees for any lost body parts during the process. You're pretty sure the last guy let Chompers bite his leg off on purpose, just to make an extra few bucks. \n  *set theatricality %+10\n  *goto Oldguy\n #Provide routine maintenance to my human blender.\n  Yeah, it may be silly to call it a torture chamber when every victim is guaranteed to die a quick and brutal death inside The Juicer, but that's no excuse to keep it filthy! You may want the expert to make sure there's no buildup in the tubes that send the liquefied remains to your giant leech tank.\n  *set lethality +5\n  *goto Oldguy\n #Expand the brainwashing facilities so you can indoctrinate goons quicker.\n  The fact that it currently takes a full week of mental torture to forcibly recruit captured victims is unacceptable, especially when you can lose dozens of goons in a single scheme. Since they can now be replaced in a matter of hours, you'll be able to plan more schemes that require a few—[i]cough[/i]—sacrifices. The best part is, it will no longer seem awkward when you forget a goon's name, since none of them will likely last longer than three months!\n  *set activist %-10\n  *goto Oldguy\n\n*label Oldguy\n\nPounding away on your keyboard, you're suddenly distracted by a short old man barking loudly about his eggs not being cooked just right. What's worse, he's wearing a cheap suit and a fedora. Then, one of the biggest guys you've ever seen, wearing a grease-spattered apron and a blank expression, emerges from the back kitchen and agrees to take the plate away. What's this guy doing as a short-order cook, not a pro wrestler or bodyguard?\n*page_break\nEventually the big guy comes out and delivers another plate of food, which the same customer takes one bite of before spitting it out. Apparently now the food is overcooked, and once again the large man is forced to take the plate and try again. The old guy is clearly enjoying bossing around the hulking brute, but you have to wonder why Giganto doesn't just break the geezer in two and crack him like the eggs he keeps sending back.\n\nThe big guy (we're talking at least seven feet here, and all of it muscled) emerges again to bring you your plate. It actually looks pretty terrible up close. The pancakes are super dry, the eggs have pieces of shell in them, and your bacon looks like it was cooked with one of the giant lasers you just purchased. You notice the name \"Slog\" on his nametag as you look up at his face. He flashes you a surprisingly goofy smile.\n\n*fake_choice\n #\"Is this for me or should I feed it to my dog?\"\n #\"Why haven't you ripped that guy's tongue out yet?\"\n #\"You're doing all right, kid.\"\n\nSlog shrugs before going back into the kitchen. Must not be entirely right in the head, you think. You're hungry enough, though, that you'll probably enjoy this meal, terrible or not. It's not like the goons back home are any better at cooking. Soon you hear the rude little man in the other booth screeching away once again about the poor excuse for a meal he has just been served.\n\nIf you wanted to hear bickering during a meal, you'd go to your grandma's house and listen to her heated arguments with the toaster. (Long story—she thinks it's possessed by your grandpa's vengeful spirit, returned from the afterlife to burn her toast every morning.) It's time to get this old man to shut his yapper and let you eat in peace.\n\n*choice\n #I reject my food to see if Slog loses his cool.\n  *if combat > 55\n   \"The short guy's right, your cooking stinks,\" you announce to the whole diner. The old man, as if motivated by your words, stands up on the table and calls Slog a slew of names. He then picks up his plate and pushes it against the giant's apron, smearing it all over.\n   \n   \"You gonna take that, big guy?\" you shout to antagonize the over-sized cook. With your help, Slog finally loses his cool and punches the short man so hard you swear his fedora spins in the air for a second, like in a Saturday-morning cartoon. The man flies across the diner and lies motionless on the floor. Slog puts on a smile again before going back into the kitchen, leaving the other customers with their jaws dropped.\n   *set combat %+10\n   *goto TheStar\n  *else\n   \"The short guy's right, your cooking stinks,\" you announce across the whole diner. The old man, as if motivated by your words, stands up on the table and calls Slog a slew of names. He then picks up his plate and pushes it against the giant's apron, smearing it all over.\n   \n   Instead of smashing the man's face in, Slog picks him up like a small briefcase, carries him outside, then drops him on the street like yesterday's trash. Slog walks back in with a smile and returns to the kitchen, leaving the other customers with their jaws dropped.\n   *set combat %+5\n   *goto TheStar\n  \n #I quietly poison the man's food with toxin-carrying nanites.\n  *if ingenuity > 55\n   \"This place is terrible, right?\" you casually say after approaching the old man's booth. \"Tell me about it,\" he responds before going on about how this diner was amazing until that incompetent cook arrived. He complains with enough passion that he doesn't even notice you slip a few nanites into his coffee. \"At least the joe is still good,\" you say, prompting him to nod before sipping his drink. Moments later his face comes crashing into his plate. You walk back to your booth and shrug as nearby onlookers wonder why the old guy's now making out with his scrambled eggs.\n   *set lethality +5\n   *set ingenuity %+10\n   *goto TheStar\n  *else\n   \"This place is terrible, right?\" you casually say after approaching the old man's booth. \"Tell me about it,\" he responds before going on about how this diner used to be amazing before that incompetent cook arrived. He complains with enough passion that he doesn't even notice you slip a few nanites into his coffee. \"At least the joe is still good,\" you say, prompting him to nod before sipping his drink. Moments later he starts coughing uncontrollably, which is weird because he should be dead already. Maybe you didn't program the nanites correctly.\n   \n   You walk back to your booth as the old guy gasps for breath while going to the restroom. Later you realize he never actually came out of there. Not as efficient as you had hoped, but better late than never!\n   *set lethality +2\n   *goto TheStar\n  \n #I threaten the annoying man to get him to shut up and eat.\n  *if terror > 55\n   You approach the old guy's booth and look him straight in the eyes. \"Listen, old man, I've got work to do and I'm tired of hearing your whining. Be quiet, or I'll crack your head open like one of the eggs the kind cook prepared for you, capisce?\" His eyebrows raise almost enough to knock the fedora off his head. You return to your booth and give him the stink eye one last time for effect, prompting him to take a few bites of what's probably an undercooked piece of bacon before getting up and leaving the diner.\n   *set terror %+10\n   *goto TheStar\n  *else\n   You approach the old guy's booth and look him straight in the eyes. \"Listen, old man, I've got work to do and I'm tired of hearing your whining. Be quiet, or I'll crack your head open like one of the eggs the kind cook prepared for you, capisce?\"\n   \n   His eyebrows raise almost enough to knock the fedora off his head. You return to your booth and give him the stink eye one last time for effect, which causes him to laugh before quietly returning to his meal. That's when you realize you'd had a piece of food on your chin the entire time. Whether he found you threatening or just ridiculous, at least he shut up!\n   *set terror %+5\n   *goto TheStar\n\n*label TheStar\nNow free of elderly nuisances, you gobble down the flavorless meal before getting back to work. Let's see, you definitely should shoot an e-mail to Grease Monkey. What he lacks in skill at nefarious scheming, he makes up for with an unrivaled knack for fixing havoc-wreaking vehicles. Your transport could definitely use a good tune-up.\n\nJust as you're ready to move on to other tasks, a putrid stench hits your nostrils. It's comparable to getting smacked in the face by a vomit-filled water balloon. You look around and see a homeless-looking man make his way through the diner and sit down at a nearby booth. His hair is clumpy and greasy, and his torn unitard has stains of blood and burn marks. He looks like some kind of washed-up wannabe superhero with a secret weakness to soap and clean water. You can't quite put your finger on it, but you're pretty sure you've seen him before.\n\nYou try to get back to work but you can't get him out of your head—or nose, for that matter. Maybe by talking to him or something you'll recall where you've seen this guy. Or you can just find a way to make him leave before you hurl all over your laptop.\n\n*choice\n #Try buying him a meal, preferably to go.\n  \"Thanks but I'm not here to eat,\" he responds after you offer to buy him a plate. So what is he here for, then? To ruin this diner by making all the customers lose their appetites? Back at your booth, you watch him sit quietly as he stares out the large windows overlooking the busy street in front.\n  *goto Thestarvoice\n #Ask him to leave.\n  \"How about you take a bath and put on something decent before coming back in here?\" you suggest. The man stares into your eyes, not really in an intimidating fashion, but with unnerving intensity. He's clearly here to stay, so you return to your booth after he fails to say anything.\n  *goto Thestarlook\n #Make fun of his uniform.\n  \"So what's with the getup? You look like a zombie superhero with all that blood and dirt,\" you announce to the man, hoping he'll be offended enough to leave. Instead he offers a calm response: \"Clothes are clothes.\" Clothes are clothes? You scratch your head all the way back to your booth.\n  *goto Thestarcostume\n\n*label Thestarvoice\n\nHearing his strong, emphatic voice makes something click in your brain.\n\n*gosub StarIntro\n\n\n*goto EnterHackmaster\n  \n*label Thestarlook\n\nSeeing that fearless, piercing look in his eyes makes something click in your brain.\n\n*gosub StarIntro\n\n*goto EnterHackmaster\n  \n*label Thestarcostume\n\nSeeing his attire up close makes something click in your brain.\n\n*gosub StarIntro\n\n*label EnterHackmaster\n\nYou open up the Darkspace database on your laptop and search for The Star's file. Sure enough, \"DEAD\" in big red letters is written across his profile picture. The comments section of his page is flooded with celebratory remarks about his supposed passing, left by villains that no doubt had their lights punched out by him on more than one occasion. (The few commenters waxing nostalgic for The Star's more genteel brand of superheroism are quickly shouted down.) Apparently, no one knows he survived his encounter with Doctor Arachnus, although to be fair, few people ever do.\n\nYou're scrolling down his page when your laptop starts acting weird. First the cursor starts bouncing around, then your screen goes completely black. A few seconds later, a strange chat box pops up on the screen. Whoever is doing this, they seem to want to converse with you.\n\n\"Greetings, ${name}. I've been looking forward to speaking with you! I apologize for interrupting your work. How is your dinner going, by the way?\"\n*page_break\nYou can't tell if they're being serious or not. Either way, their overly friendly demeanor makes you a bit uneasy. You may as well type in a response.\n\n*fake_choice\n #\"It was going great until you started messing with my computer.\"\n #\"Terrible! I can't get any work done in this stupid diner.\"\n #\"The better question is, who the heck are you and what do you want?\"\n\n\"lol\"\n\nYou can only hope a fourteen-year-old didn't find a way to hack your $80,000 ultra-secure laptop. Embarrassing.\n\n\"I'm just glad to finally have a chat with the great ${name}. After all, your schemes have been attracting plenty of attention on Darkspace lately. To be honest, I never thought someone of your caliber would need the approval of has-beens to feel like a true villain. Sad, really.\"\n\nWait a second, did this person just mock you? If you wanted your feelings hurt online, you would have offered an opinion on social media and waited for the abuse to roll in. But hey, maybe it's a good sign. You're moving up on the villain pyramid so fast that cowards have to mess with you over the safety of the Internet.\n\n*fake_choice\n #\"Hey! Those washed-up villains are my friends!\"\n #\"What's sad is you can't insult me to my face.\"\n #\"Is this going to take long? I've got work to do.\"\n\n\"${name}, just consider yourself lucky that a mutual partnership between us is something I'm considering. If not, I'd have already sent a legion of drones to electroshock you to death.\"\n\nGreat, they've moved on to threats. This conversation is escalating quickly! You're not really convinced that someone hiding behind their computer screen could pose much of threat to you. It's time you found a way to get rid of this nuisance so you can get back to work.\n\n*choice\n #Attempt to counter-hack and then install a virus on their system.\n   *if ingenuity > 65\n    This hacker clearly doesn't know who they're dealing with, do they? After figuring out a way to open a command prompt, you send a nice virtually gift-wrapped package to their system: a crippling computer virus. If it works, your computer will return to normal, and any scandalous photos in the hacker's Pictures folder will be automatically posted on Darkspace. Sure enough, you're back in control of the laptop moments later. You keep the chat box open in case you want to taunt them with your superior computer skills.\n \n    \"Touche,\" the text box responds, \"not very many can give Hackmaster a taste of her own medicine.\"\n    *set terror %+10\n    *goto Hackmaster\n   *else\n    You manage to open up a prompt but remember you're pretty clueless when it comes to hacking. If only shooting rocket launchers or calling in one of your acid-spraying robots could help you right now.\n \n    \"Silly villain,\" the chat prompt responds, \"few can match The Hackmaster's technological ingenuity.\" Strangely enough, your computer returns to its unhacked state before receiving one last message: \"All you had to do was ask nicely.\" \n    *goto Hackmaster\n  \n #Track the hacker's location and threaten them.\n   *if ingenuity > 60\n    This hacker clearly doesn't know who they're dealing with, do they? You manage to open up a prompt and type in a few commands that let you know the hacker is using the diner's free wifi to mess with you. They must be close by. You execute another command to track their exact location: a van just down the street from the diner. \"I see your van\" you type into the chat box, and almost immediately your computer returns to its normal state.\n \n    \"Touche,\" the text box responds, \"not very many can outwit Hackmaster.\"\n    *set terror %+5\n    *goto Hackmaster\n   *else\n    You manage to open up a prompt, but then remember you're pretty clueless when it comes to hacking. If only shooting rocket launchers or calling in one of your acid-spraying robots could help you right now.\n \n    \"Silly villain,\" the text box responds, \"few can match The Hackmaster's technological ingenuity.\" Strangely enough, your computer returns to its unhacked state before receiving one last message: \"All you had to do was ask nicely.\" \n    *goto Hackmaster\n  \n #Keep chatting to see what they want.\n   \"You've gone to a lot of trouble to get my attention. You must have a crush on me, is that it?\" you type in, hoping they'll spill some vital info via simple bantering. \n\n   \"Yes and no,\" they reply. \"I am impressed by your passion for villainy but am not interested in developing a romantic relationship with you, if that's what you mean.\"\n  \n   You were just kidding, but it seems they thought you were serious, which you find a little funny. \"Well why don't we meet in person, and see if I can spark an interest in you?\" you respond with a grin on your face. If only you were this smooth in person.\n  \n   \"I would have loved to. That is, before I became Hackmaster,\" they reply. Strangely, your computer returns back to its normal unhacked self.\n   *goto Hackmaster\n\n*label Hackmaster\n\n\"Hackmaster?\" you say out loud. You've heard that name before, but where? Considering how unoriginal it is, you're not too surprised you've forgotten about it. If an explosives-loving villain called himself The Blower-Upper or The Bomb, you'd probably avoid wasting memory space in your brain on them. Kaboom, now that would be a cool name! You make a mental note to consider \"Kaboom\" as a late-career reinvention.\n*page_break\nYou search for Hackmaster on Darkspace and read all about Dani Klendon, once the most powerful woman in Silicon Valley. Besides being a technical genius, she was also a stunning beauty, at least before a rival attempting to take her CEO position at Harvest Tech decided to blow her up. The car bomb left Klendon disfigured, angry, and possibly insane, and she now devotes herself to villainy. She's racked up quite a body count, all while using only machines and computers to do her work. Very impressive!\n\nYou tab out of Darkspace and back to your email account, unable to accept how little work you've gotten done since you've started. Instead of getting some peace and quiet, you've had to deal with a nattering old dude, a cook who'd look more comfortable in the wrestling ring than the kitchen, a smelly ex-hero stinking up the place, and a hacker messing with your computer. This is why villains prefer staying in their lairs all day! At least things can't get any worse.\n*page_break\nSuddenly a figure crashes through the diner door with a whooping war cry. ${checap} holds an advanced-looking flamethrower in ${chis} hands as ${che} scans the room. You sigh. You really weren't looking to deal with a visit from The Drake today. The vigilante isn't well-known among the public just yet, but has been building up a distressing amount of Darkspace chatter from various badly singed villains. You have a sinking suspicion ${che} picked a dragon theme for ${chis} gimmick just to get an excuse to burn people. Definitely not the \"never kill\" kind of vigilante, which means you're likely to get toasted extra crispy if you're not careful.\n\nAnd wouldn't you know it, you're apparently just the person ${che}'s looking for. ${checap} casually walks over to your booth and points ${chis} gun at you. \"You're cuter in person than on your Darkspace photo,\" ${che} says before giving you a wink. Ooookay…not the opening gambit you expected, but you can banter-flirt with the best of them. Maybe. \n\n\"You're not too bad-looking yourself,\" you respond. You've run into one or two decent-looking wannabe heroes in your time as a villain, but this ${cman} is definitely up there on the list. Crazy as hell, obsessed with fire, but definitely cute. Sexual attraction aside, though, you probably should figure out how to get out of this mess without getting all your hair singed off. Maybe you can talk your way out of this one, or at least get ${chim} to drop ${chis} guard.\n\n*fake_choice\n #\"There's room for two in this booth, you know….\" \n  *set drake +2\n #\"You don't know who you're dealing with, do you?\"\n #\"How much does a toy like that cost? Looks fun.\"\n \n${checap} smiles before pressing the end of the flamethrower against your chest. \"A shame that such an infamous villain will be so easy to kill. Here I was, expecting an exciting fight! Don't worry, this will only hurt a little,\" ${che} says. Fortunately ${che} didn't notice you press the emergency backup button on your wristwatch, programmed to get you out of pickles like, say, getting murder-flirted with by a costumed pyromaniac. Now all you've got to do is wait for…\n\n*choice\n #A dozen of my armed troops to arrive and make ${chim} beg for mercy.\n  *if combat > 60\n   You've never been happier to see your goons as they storm into the diner with machine guns. However, The Drake uses ${chis} strength and reflexes to jump up into one of the roof tiles and disappear. You make a mental note to start working out so you can do that too.\n  \n   Your goons, baffled by the disappearance, decide to unload their clips into the roof in hopes of landing a hit. As they do that, The Drake breaks through the roof just behind them and torches them all with ${chis} flamethrower. You facepalm as they roll around in agony on the floor, screaming in pain as they burn to death.\n   *set combat %+10\n   *goto Drakepleased\n  \n  *else\n   You've never been happier to see your goons as they storm into the diner with machine guns, but it doesn't take long for you to realize how much they lack training. Since they ran in chaotically, The Drake easily torches them all just as they enter.\n   \n   You facepalm as they roll around in agony on the floor while burning to death.\n   *set combat %+5\n   *goto Drakepleased\n  \n #A special frequency to disable ${chis} precious toy and make ${chim} panic!\n  *if terror > 60\n   A look of confusion appears on ${chis} face as the weapon fails to torch you alive. \"Cute trick,\" ${che} voices before swinging the weapon at your head. You manage to dodge the blow and tackle ${chim} like an American football player, but in the struggle ${che} ends up on top. Before ${che} can gut you like a fish with one of ${chis} knives, you press a button on your suit that sends a wave of electricity through The Drake, which proves enough to knock ${chim} off.\n  \n   The good news is that the jolt was strong enough to get ${chim} off you. The bad news is that it fried your watch as well, meaning ${che} can use ${chis} flamethrower again.\n   *set terror %+10\n   *goto Drakepleased\n  \n  *else\n   A look of confusion appears on ${chis} face as the weapon fails to torch you alive. \"Cute trick,\" ${che} voices before swinging the weapon at your head. You manage to dodge the blow and tackle ${chim} like an American football player, but in the struggle ${che} ends up on top. Before ${che} can gut you like a fish with one of ${chis} knives, you smash a nearby plate on ${chis} head and get back up.\n  \n   The good news is that the plate was solid enough to get ${chim} off you. The bad news is that your watch got busted during the tussle, meaning ${che} can use ${chis} flamethrower again.\n   *set terror %+5\n   *goto Drakepleased\n  \n #Electromagnetic pulses to disable all nearby lights, allowing me to escape in the dark.\n  *if ingenuity > 60\n   Suddenly the diner becomes almost pitch-black, which you're hoping will startle ${chim} long enough for you to get away. It works for a moment, and you manage to scurry under a booth on the other side of the diner. Of course, it didn't occur to you that ${che}'d use the flamethrower to torch everything around ${chim}.\n  \n   Fortunately you didn't get caught in ${chis} chaotic flame blast, but now there's enough light from the burning booths for ${chim} to see where you are.\n   *set ingenuity %+10\n   *goto Drakedisappointed\n  \n  *else\n   Suddenly the diner becomes almost pitch-black, which you're hoping will startle ${chim} long enough for you to get away. It works for a moment, and you manage to scurry under a booth on the other side of the diner. However, the stupid lights come back on moments later. That's what you get for not testing them earlier!\n  \n   After a good laugh, The Drake starts torching all the booths in the area, hoping you'll be under one of them.\n   *set ingenuity %+5\n   *goto Drakedisappointed\n   \n *selectable_if(planning>0) #All three! Let's find out if The Drake can handle that. (Costs 1 Planning Point.)\n  *if (((terror > 60) and (combat > 60)) and (ingenuity > 60))\n   You've never been happier to see your goons as they storm into the diner with machine guns. But just as The Drake gets ready to fry them all with ${chis} flamethrower, you use your frequency-emission device to deactivate it.\n\n   Stunned that ${chis} weapon is of no use, The Drake uses ${chis} acrobatic skills to jump up into one of the roof tiles and disappear. Your goons, baffled by the disappearance, decide to unload their clips into the roof in hopes of landing a hit. As they do that, The Drake breaks through the roof just behind them and starts using martial arts to tear them a new one.\n\n   With things not going too well, you use an electromagnetic pulse to disable all nearby lights, giving your goons a better fighting chance—or so you hoped. They manage to land a blow or two on The Drake while swinging wildly, but eventually they all get taken down. Next thing you know, you feel a kick that sends you flying into a table. The impact breaks your frequency-emission device, allowing The Drake to start torching the dining hall.\n\n   Although you didn't finish The Drake off, at least you showed ${chim} that you're not another one of those easy villains ${che}'s used to destroying.\n   *set notoriety +2\n   *set ingenuity %+10\n   *set terror %+10\n   *set combat %+10\n   *goto Drakepleased\n   \n  *else\n   You've never been happier to see your goons as they storm into the diner with machine guns. But just as The Drake gets ready to fry them all with ${chis} flamethrower, you use your frequency-emission device to deactivate it.\n\n   Stunned that ${chis} weapon is of no use, The Drake uses ${chis} acrobatic skills to jump up into one of the roof tiles and disappear. Your goons, baffled by the disappearance, decide to unload their clips into the roof in hopes of landing a hit. As they do that, The Drake breaks through the roof just behind them and starts using martial arts to tear them a new one.\n\n   With things not going too well, you use an electromagnetic pulse to disable all nearby lights, giving your goons a better fighting chance—or so you hoped. They manage to land a blow or two on The Drake while swinging wildly, but eventually they all get taken down. Next thing you know, you feel a kick that sends you flying into a table. The impact breaks your frequency-emission device, allowing The Drake to start torching the dining hall.\n\n   Although you didn't finish The Drake off, at least you showed ${chim} that you're not another one of those easy villains ${che}'s used to destroying.\n   *set notoriety +2\n   *set ingenuity %+5\n   *set terror %+5\n   *set combat %+5\n   *goto Drakepleased\n  \n*label Drakepleased\n\n${checap} gives off an amused laugh, the flamethrower held firmly in ${chis} hands. \"I know you're missing most of your gear, but you still put up quite a fight. I love it when a villain bites back,\" ${che} admits with a grin. \"Sadly, it's time to end this once and for all.\"\n*set Drake +2\n*goto Minionhelp\n\n*label Drakedisappointed\n\n${checap} shakes ${chis} head in disappointment, the flamethrower held firmly in ${chis} hands. \"I know you're missing most of your gear, but I still didn't expect you to hide like a coward. I hate it when a villain bores me,\" ${che} admits with a frown. \"It's time to end this once and for all.\"\n*set Drake -2\n*goto Minionhelp\n  \n*label Minionhelp\n*page_break\nYou never thought it would end this way, at least not inside a dinky little diner. You always pictured getting zapped to death by a V.A.N.G.U.A.R.D. super laser after you took over the world, or maybe by an atomic bomb launched at your futuristic space station.\n\nJust then, you look over The Drake's shoulder and notice the only two people still left in the diner. One of them is Slog, the comically large brute working the griddle. He could probably knock The Drake's lights out in one punch. Near him stands The Star, watching the battle with a weird, creepy hunger on his bloodstained face. A security camera in the corner turns to point directly at you, and you realize that Hackmaster is still watching what's happening.\n\nThe two men are staring right at you, bodies tense. Slog is clearly pissed that this crazy superhero is torching his place. The Star…you have no idea what The Star wants, but his hands are twitching slightly. Looking down, you glance at your laptop and notice that the text box is back, a blinking message on the screen: \"Just nod if you want some help.\"\n\nWell, this is it. You either ask one of these three weirdos to help you out, or leave the diner in an urn. (Why not ask all three? Because you're desperate, but not so desperate as to deal with the Henchperson's Union for three separate hiring claims in a single day.) None of them fit the \"smoking-hot sidekick that can cook\" job position you were planning to advertise on Darkspace, but given that you suddenly find yourself a beggar, it's no time to be choosy. Who do you pick?\n\n*choice\n #Slog, the towering, muscular brute. A classic supervillain minion if I've ever seen one!\n  You lock eyes with the monstrous brute as The Drake approaches, flamethrower primed. You feel the hot flames from ${chis} weapon coming toward you, but only briefly since ${che} gets held up in the air by Slog. The flamethrower continues releasing a stream of fire at the roof of the diner, covering it in flames before Slog finally tosses The Drake across the room like a rag doll. Before ${che} can stumble to ${chis} feet, the big man runs up and gives the dragon vigilante an uppercut that knocks ${chim} out cold. If this were an official boxing match, you'd be raising Slog's hand up like a champ.\n  \n  Instead, you're patting down the small flames on your chest from the close encounter with The Drake's weapon. With the fire spreading quickly, you run out of the diner with Slog and watch along with several onlookers as the building burns down. \n  \n  \"Looks like you're out of a job. Lucky for you, I'm hiring,\" you tell Slog, who nods with a warm smile.\n  *set slog true\n  *set sidekick \"Slog\"\n  *set sidehe \"he\"\n  *set sidehim \"him\"\n  *set sidehis \"his\"\n  *goto Slogchosen\n  \n #The Star, the deranged ex-hero. Together we'd make a notoriously terrifying duo!\n  You lock eyes with the haunted former hero and mouth the words \"save me,\" the classic lure for do-gooders everywhere. You feel the hot flames from The Drake's weapon coming toward you, but only briefly as ${che}'s tackled and placed in a choke hold by The Star, who laughs hollowly as he strangles his victim. The flamethrower continues releasing a stream of fire throughout the diner. It misses you, but the building begins to burn. Slowly but surely, The Drake stops struggling and lies prone on the floor, either dead or unconscious. You're not sure if it was the choke hold or The Star's awful stench that did it, but you're grateful.\n  \n  With the fire spreading quickly, you run out of the diner with The Star and watch along with several onlookers as the building burns down. \"I'm looking for some backup,\" you tell The Star, \"but no superheroes allowed, if you know what I mean.\" The Star nods at you with empty eyes. \"No superheroes here, boss,\" he whispers in a smoke-damaged voice.\n  *set star true\n  *set sidekick \"The Star\"\n  *set sidehe \"he\"\n  *set sidehim \"him\"\n  *set sidehis \"his\"\n  *goto Starchosen\n  \n #Hackmaster, the cyber psychopath. I could use a bloodthirsty genius on my side!\n  You nod your head. Moments from roasting you, The Drake looks up in confusion as the diner's fire sprinklers turn on. They're enough to drench you both, but probably not enough to stop the stream of flame that's about to come out of The Drake's weapon.\n  \n  A curious floating drone suddenly breaks through one of the diner windows and shoots The Drake with several electroshock darts, causing ${chim} to howl in agony and spray flames all over the diner before falling to the floor, unconscious. Considering ${che} was covered in water, the darts probably packed a bigger wallop than usual. In fact, you felt some of the shock as well, but at least you're not face-first on the diner floor.\n\n  With the fire spreading quickly despite the sprinklers, you run out of the diner, laptop in hand, and watch along with several other onlookers as the place burns down. \"How about you work for me and put those skills to better use?\" you type into the chat box. \"But no hacking my stuff, okay?\"\n  \n  You smirk after reading her response: \"No promises :)\"\n  *set hackmaster true\n  *set sidekick \"Hackmaster\"\n  *set sidehe \"she\"\n  *set sidehim \"her\"\n  *set sidehis \"her\"\n  *goto Hackchosen\n  \n*label Slogchosen\n*page_break\n*achieve slog\n\nYou signal for Slog to follow you as a bigger crowd gathers and fire trucks arrive. Rounding the corner, you see The Star staring at you, soot now blackening his already filthy uniform. He doesn't say anything. He just stares, madness in his eyes, before fading back into the crowd. You suppress a shudder.\n\nMoments later, a van flies down the street at full speed toward you. Just before it flattens you to a villainous crepe, Slog pulls you aside. Is it just you, or is Merit City getting crazier by the minute? Watching the van screech away, you notice a small \"HM\" logo painted on its back. Hackmaster. Either she wanted to turn you into roadkill, or she's simply a terrible driver. Then again, she is from California.\n\nThey both seem kind of peeved that you didn't ask for their help. Heck, if you knew working for you was such a sought-after gig, you'd have had open tryouts or something, maybe even a show with a catchy title to air on the Villains Broadcasting Company channel. Here's hoping they're not ticked enough to get in your way in the future.\n\n*goto Drakelives\n\n*label Starchosen\n*page_break\n*achieve star\n\nYou signal for The Star to follow you as a bigger crowd gathers and fire trucks arrive. Before making it off the street you spot a disappointed Slog sitting at a bench, hands held in his face. He must have really needed that job, terrible as he was at it. Maybe he'll have an epiphany on that bench and realize he'd make the perfect wrestler. Masked, preferably, given what his face looks like. As you walk past, he glares at you and cracks the cement slab he's sitting on in two with his bare hands.\n\nMoments later, a van flies down the street at full speed toward you. Just before it flattens you to a villainous crepe, The Star pulls you aside. Is it just you, or is Merit City getting crazier by the minute? Watching the van screech away, you notice a small \"HM\" logo painted on its back. Hackmaster. Either she wanted to turn you into roadkill, or she's simply a terrible driver. Then again, she is from California.\n\nThey both seem kind of peeved that you didn't ask for their help. Heck, if you knew working for you was such a sought-after gig, you'd have had open tryouts or something, maybe even a show with a catchy title to air on the Villains Broadcasting Company channel. Here's hoping they're not ticked enough to get in your way in the future.\n\n*goto Drakelives\n\n*label Hackchosen\n*page_break\n*achieve hackmaster\n\nA bigger crowd
