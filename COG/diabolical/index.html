gathers as fire trucks arrive. Rounding the corner, you see The Star staring at you, soot now blackening his already filthy uniform. He doesn't say anything. He just stares, madness in his eyes, before fading back into the crowd. You suppress a shudder.\n\nBefore making it off the street you spot a disappointed Slog sitting at a bench, hands held in his face. He must have really needed that job, terrible as he was at it. Maybe he'll have an epiphany on that bench and realize he'd make the perfect wrestler. Masked, preferably, given what his face looks like. As you walk past, he glares at you and cracks the cement slab he's sitting on in two with his bare hands.\n\nThey both seem kind of peeved that you didn't ask for their help. Heck, if you knew working for you was such a sought-after gig, you'd have had open tryouts or something, maybe even a show with a catchy title to air on the Villains Broadcasting Company channel. Here's hoping they're not ticked enough to get in your way in the future.\n\n*goto Drakelives\n\n*label Drakelives\n*page_break\nLike a vigilante cherry on your psychotic villain sundae, a brief blast of flame shoots into the air from off atop a building not far away. The barely visible figure on the roof blows you a kiss before disappearing. It appears you weren't the only one to escape the diner fire. The Drake probably won't hesitate to fry you next time you meet. Of course, ${che}'ll have to get past your new minion first.\n*finish\n\n\n*label StarIntro\nIt's hard to believe, but you're pretty sure that the filthy man is none other than The Star, once the world's greatest superhero. You remember watching him fly around on the news, bashing your favorite villains in the face and spoiling their awesome schemes. You were still just a kid when the news broke that he had met his demise at the hands of Doctor Arachnus, giving his life to foil the madman's plot to steal all of the world's water. Apparently he survived, and he's still wearing that torched, bloodstained suit after all these years. (It's not like dry cleaners are all that expensive in this city, even if a few do balk at doing superperson business). The Star definitely must have lost a few marbles after getting replaced by another superhero as the city's favorite protector. People can be so cruel.\n*return", "chapterfour": "*temp gulch_canyon \"Gulch Canyon\"\n*temp the_gulch \"the Gulch\"\n*temp foil_ball_cap \"Foil Ball\"\n*temp foil_ball \"foil ball\"\n*temp s \"s\"\n*temp foil_ball_inn \"Foil Ball Inn\"\n*temp loc 1\n*image chap4.png\n\nA month passes, more eventfully than you'd have liked. V.A.N.G.U.A.R.D. finishes their move into the city, and their quadjets are becoming a distressingly frequent sight in the Merit City sky. You've had to scuttle two different fundraising plans (another bank robbery, and a hit on a local charity telethon that wouldn't have raised much money, but would have been absolutely hilarious on Darkspace) because other villains beat you to them. Your troops are just hanging around the base, and your killer robots spend most of their time gossiping about each other in binary. You still watch the news every night (your name is never mentioned), but both Doctor Arachnus and Nautilus have gone very quiet since V.A.N.G.U.A.R.D.'s arrival. Meanwhile, the Minotaur organization is grabbing all the headlines, apparently taking advantage of V.A.N.G.U.A.R.D.'s absence in Europe to consolidate their power. \n\nYou've put out a few tentative feelers into the organization, more as a courtesy than anything serious, but their subsequent silence makes it clear that you're simply not a big enough name yet to warrant their attention. And, as you've begun to realize, Merit City might not be the best place to grow your rep.\n\nYou've been kicking a plan around in the back of your head for the last week or so. Something that should give you a little cachet, a little breathing room, and, for the love of all that's unholy, something to do. Like millions of Americans before you, you feel the beckoning fingers of the open highways. It's time for a road trip.\n*page_break\nIt's one of those acknowledged weirdnesses of the supercrime phenomenon that the majority of costumed criminals favor urban environments over rural ones. In a way, it makes sense: big cities have big banks, big targets, big media to report on a megalomaniac's ego-swelling escapades. In any case, it means that your kind of malevolent mischief is a largely bicoastal affair, with vast swathes of the American Midwest derisively referred to as \"jetpack-over country\" by most villains. \n\nBut, you know, it's not like people in Iowa don't store their money in banks too. Besides, you're getting a little sick of how jaded Merit City's residents are about things like mass-murderers appearing in hundred-foot-tall holograms, or cadres of flying stormtroopers in sleek black armor. You have a duty, you assure yourself, to give a little of the old ${name} pizzazz to some people who might appreciate it a little more for having been neglected for so long.\n\nIt's settled. You'll sit down with HR tomorrow to lay out a few directives you want followed while you're gone, take a stroll through the barracks to put the fear of you in the troops, make sure someone's assigned to feed whatever's living in \"The Pit\" underneath your dungeon, and hit the road. Walking over to one of the massive bookshelves that line the walls of your sanctum, you find a recent U.S. atlas and begin poring over it, looking for the ideal target for your venomous little vacation.\n*page_break\nYou do some research on Darkspace's resource pages, which offer all kinds of valuable info. Details like known supervillains already terrorizing an area, the competency of local superheroes (if any), and even the highest-rated dry cleaners for villains like The Liquidator, whose work tends to get messy. You finally settle on three ideal targets.\n\n*fake_choice\n #\"Oooh, how about Gulch Canyon, Missouri, home of the world's largest ball of aluminum foil?\"\n #\"I like the sound of Tomesque, Kansas, site of the world-famous Corn Maze!\"\n  *set gulch_canyon \"Tomesque\"\n  *set foil_ball_cap \"Corn Maze\"\n  *set foil_ball \"corn maze\"\n  *set foil_ball_inn \"Corn Maze Inn\"\n  *set the_gulch \"Tomesque\"\n  *set loc 2\n #\"I love a challenge. Baymont, Ohio, boasts that it has the world's least-robbable banks!\"\n  *set gulch_canyon \"Baymont\"\n  *set foil_ball_cap \"unrobbable banks\"\n  *set foil_ball \"banks\"\n  *set s \"\"\n  *set foil_ball_inn \"Baymont Inn\"\n  *set the_gulch \"Baymont\"\n  *set loc 3\n\n*if (trademark = \"no calling card\")\n *goto arrival\n*else\n You make sure you have ${trademark} ready before you go.\n *goto arrival\n\n*label arrival\nThe sun is just setting as you pass the sign that says \"${gulch_canyon}, Population: Nice\" in your disguised vehicle.You've rigged the holoprojector to give your lethal personal transport the appearance of a wood-paneled station wagon, full of kids' toys and stained upholstery. If you're going to do the road trip thing, you figured, you might as well do it as authentically as possible. \n\nWithin seconds of crossing the border, you hear a light \"whoop\" sound and tense up as you see red and blue lights flash behind you. You remind yourself to keep calm, but you suddenly feel very vulnerable without your costume, which is sitting in the vehicle's storage compartment (Kevlar-laced Spandex is great for fighting off obnoxious do-gooders, but it sweats like the dickens on a long drive). You assure yourself that this is just a routine stop, or maybe a little light harassment from local law enforcement. The nearest military outpost equipped to deal with the kind of firepower loaded into your vehicle is six hundred miles away.\n\nYou pull to the side of the road, and wait. The car behind you has a big logo on its front of a smiling policeman, announcing that this is a vehicle of the Chattahaunches Sheriff's Department. The woman who steps out of the car a moment after it stops is equally smiling, although you can't see her eyes behind her large aviator sunglasses. From the silver in her hair, you imagine she's in her late forties, and she carries herself confidently but without swagger as she approaches your car. She gently raps her knuckles on your vehicle's steel-infused bulletproof windows, producing a strange, sonorous echo. For the hundredth time, you remind yourself to figure out a way to make the holoprojector disguise sounds, too, as you lower the window.\n\n\"Good evening! Don't want you to worry, stranger, just like to welcome people to the area. I like to think of it as part of my job as sheriff. What brings you to town?\" She smiles widely at you, eyes still hidden behind the shades. She hasn't made any threatening moves, but some instinct is warning you that this would be a good time to tread carefully.\n\n*fake_choice\n #\"Good evening, Sheriff. Just here to see the sights.\"\n  Her smile widens, almost impossibly. \n  *if (loc = 1) or (loc = 2)\n   \"Here to see the ${foil_ball}, huh? You know, my predecessor tried to have it torn down after what happened to the fella who made it. \n  *if loc = 3\n   \"Here to make a deposit at the world's least-robbable banks, huh? You know, my predecessor had to lock up a guy who wouldn't stop trying to rob them. Old Man Crenshaw, went mad. But it does bring new friends here from time to time.\" You smile back at her, subconsciously trying to match her friendly energy. Your face quickly begins to hurt. \n\n  \"You have anywhere to stay?\" she asks. You admit that you hadn't planned that far ahead, and she nods. \"Well, you're not spoiled for choice. The ${foil_ball_inn}'ll treat you right, though.\" She gives you quick directions (as in, drive down the street a ways, then stop) and leans back from your vehicle. If she's noticed that there's anything off about it, she hasn't let on.\n\n  \"Well, I think that's all the welcomin' my back can take at present. But don't worry, if you need anything, I'll be around. I'm always around. Always.\" And for just a second, her smile flickers off, and you're staring into the mirrored, pitiless wall of her sunglasses, your own face staring back at you. It looks nervous.\n\n  Then, the smile is back, bigger than ever, and she gives a little wave and walks back to her car. \n #\"Business.\"\n  She continues to smile at you, but doesn't speak for a moment, perhaps waiting for you to elaborate. When you don't, she nods. \"Business! Well, our little town could certainly use a little more of that! As long as it's the right kind, of course.\" She casually scratches her face, staring off into the distance.\n\n  \"$!{the_gulch} doesn't have much in the way of business accommodations, traveler, but there is a nice little motel down on Main Street. They'll treat you right.\" The sheriff gives you a few easily remembered directions, then stares off into the distance again. She seems lost in thought.\n\n  \"Well,\" she says, leaning back down into your window, mirrored shades staring blankly at you. \"I can't stand around jawing all day. You have a good time with your business, friend. I'm sure that, whatever you're up to, it won't be any trouble to me or my boys.\" Her face goes cold for a moment, the slightest implication of a threat on the edge of the moment. Then she smiles again, impossibly wide, and waves as she walks back to her car.\n #\"I go where I please, pitiful lawwoman! Prepare to taste fiery death!\"\n  You prepare your most withering, bombastic response. After all, you're here to relax and cause some damage, not to be harassed by the law. But just as you're about to unleash your latest masterpiece of vitriol and cackling laughter, you see something in the sheriff's face that gives you pause. It's not that you're afraid, because there are very few things left on this Earth that you fear. But the expression about the better part of valor does run through your mind.\n\n  Her lined, tan face, eyes hidden behind those damn sunglasses, studies yours. \"Quiet one, huh? Well, that's not a problem. No problem at all, which is good.\" She leans her head into your vehicle. If she notices that what her hands are resting on is a hard-light hologram, she shows no notice.\n\n  \"I don't much like problems in ${the_gulch}.\" She smiles, an impossibly wide smile, and for a moment you wonder if you haven't found someone even crazier than yourself. Then, she pulls her head back out of the window and stretches her back before giving you a few instructions to the town's only hotel. With a short wave, she walks back to her car, flashes her lights at you for a moment, and drives away.\n\n  Your heart rate is elevated, and you're honestly not sure why. \nAfter she pulls away, you realize she never told you her name. Just \"sheriff.\"  \n*page_break\nThe ${foil_ball_inn} is the sort of place people usually describe as having seen better days, but you're not actually sure that's true. Looking it over, you're pretty sure it was built crappy and has ridden the decades out in a sort of crap-stasis. The woman behind the counter smiles at you with an almost stunning lack of activity behind her eyes, but she dutifully notes down your chosen pseudonym in the logbook and hands you your key. Stepping out of the office and back into the hotel parking lot, you take a moment to look over the town.\n\n${gulch_canyon} isn't the ugliest place you've ever been, but it's a close thing. The town's official colors appear to be taupe and sand, and, in the flickering streetlight gloom, you can see pretty much the entirety of the bustling metropolis without even turning your head. In the distance, the ${foil_ball} loom${s}, suitably impressive, but beyond that the biggest attraction the place has to offer is the blinking red stoplight that hangs over the town's sole intersection. The people who live here are quiet, clean, dependable, and they've probably never imagined that they'd be the victim of an act of nefarious supercrime.\n\nYou smile to yourself. It's perfect.\n*page_break\nNow in your room, you decide to unwind as best you can in this dump before ironing out the last few details of your plan, which you'd usually already have thoughtfully outlined in your mind for weeks, even months, in advance. But this is a vacation, after all, and part of you wants to prove that you're good enough to send this little town into a frenzy without too much effort. Any spontaneous idea your mischievous mind produces is sure to be more than enough, even downright brilliant, you convince yourself. But first, you need something to relax yourself after hours of driving through long stretches of maddeningly boring scenery.\n\n*fake_choice\n #Take a hot bubble bath.\n  You sink into the probably not-so-sanitary tub full of steaming water and play with the bubbles for a while. Who says a villain can't enjoy a nice, warm bath every once in a while?\n #Lie on the bed for a while.\n  You're more pooped from the drive than you thought, making even the poor excuse for a bed in your room look comfortable. You lie on the scratchy covers and start pondering a few ideas, only distracted for a second by a giant cockroach in the corner of the ceiling.\n #Watch the news for a bit.\n  You may be in the middle of nowhere, but that's no reason you can't enjoy some TV. Maybe you could even catch up on any villainous acts that may have occurred in Merit City during your trip. You flip through the only three channels before shutting the TV off, realizing that you'd rather stare at the wall than watch a Mexican soap opera, a documentary on the domestication of cattle, and some barely visible black-and-white flick.\n*page_break\nOkay, you know\n*if loc = 1\n  the world's biggest waste of aluminum has \n*if loc = 2\n  the Corn Maze has \n*if loc = 3\n  the so-called non-robbable banks have \nto be part of your plan, no doubt about it. The question is: what can you do that will put this dull place on the map and, more importantly, earn you some kudos on Darkspace? Will you go for total destruction, or\n*if loc = 1\n  do something that will make the hunk of metal useful to you? \n*if loc = 2\n  do something that will make the hunks of corn useful to you? \n*if loc = 3\n  simply run off with as much cash as possible? \nYou can always send a message by targeting their government officials, or mess with their minds in a brilliantly villainous fashion.\n\nYou don't even notice yourself shake in excitement at all the potential ideas currently invading your mind!\n\n*if loc = 1\n  *goto foil_ball_options\n*elseif loc = 2\n  *goto corn_maze_options\n*else\n  *goto banks_options\n\n*label foil_ball_options\n*choice\n #Use the foil ball to crush their sad excuse of a city hall.\n  Just because these people already live dull, meaningless lives doesn't mean they shouldn't know just how powerless their sad local government is against good old-fashioned villainy.\n  *set activist %+20\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_foil\n  *goto crushcityhall\n\n #Steal the foil ball to sell for some easy cash.\n  If you're going to inflict mass hysteria on these folks via their precious tourist attraction, you might as well make some pocket change while you're at it.\n  *set activist %-20\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_foil\n  *goto stealsell\n\n #Use the foil ball to smash as much of Gulch Canyon and its residents as possible.\n  You briefly smirk at the thought of crushing this drab place with the very thing they use to make money off gullible tourists, especially if it gets to involve rockets. Villains love rockets.\n  *set lethality +10\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_foil\n  *goto enginecrush\n\n #Use the foil ball to reflect subliminal messages into everyone's minds.\n  You can't resist giving these people a good scare (or worse) in a way that's both memorable for you and traumatizing for them.\n  *set theatricality %+20\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_foil\n  *goto reflectmind\n\n*label crushcityhall\n\nAfter throwing on a jetpack to watch the whole spectacle unfold from above, you adjust the Darkspace camera before pressing the button on your suit that will get things started. Not a few seconds later…\n\n*choice\n #A high-tech magnetic machine appears just above the ball of foil…\n  *if ingenuity >= 60\n   …and picks it up. Using the controls on your wrist, which you programmed yourself so they're super easy to use, you comfortably guide the magnet to just above City Hall. The screams of fright as the massive aluminum ball floats above the townsfolk are like music to your villainous ears. Just as it's above City Hall, you press a button and send the beloved tourist attraction crashing through the building.\n \n   A loud crash echoes far as the building's dome gets decimated. Reminded of your dad's favorite saying, \"If it's worth doing, it's worth doing right,\" (a maxim he might have considered applying to better parenting, given what you're currently doing), you command the magnetic machine to pick up the oversize metallic sphere and drop it down a few more times. By the time you're done, City Hall is nothing more than rubble.\n   *set ingenuity %+10\n   *set terror %+5\n   *set lethality +5\n   *goto sherifftime2\n  \n  *else\n   …and picks it up. Using the controls on your wrist—which you programmed yourself, so they're not exactly intuitive—you struggle in guiding the magnet to just above City Hall. The screams of fright as the massive aluminum ball floats above the townsfolk are like music to your villainous ears. Just as it's above City Hall, you press a button and send the beloved tourist attraction crashing through the building.\n \n   A loud crash echoes far as the building's dome gets decimated. Reminded of your dad's favorite saying, \"If it's worth doing, it's worth doing right,\" (a maxim he might have considered applying to better parenting, given what you're currently doing), you command the magnetic machine to pick up the oversize metallic sphere and drop it down a few more times. By the time you're done, City Hall is nothing more than rubble.\n   *set ingenuity %+10\n   *set lethality +5\n   *goto sherifftime2\n\n #A huge robot version of me drops from the sky…\n  *if combat >= 60\n   …and uses one of its massive arms to grab the oversize tourist attraction. Like a ten-story-tall professional bowler available in three colors from your favorite supervillain catalog, the titanic robot sends the ball of metal rolling straight toward City Hall. All those resources you've put into Robot R&D paid off!\n\n   You celebrate like you just rolled a perfect 300 as the government building is torn in two by the fast-rolling aluminum ball. The ball continues to roll far into the distance, presumably on its way to even more magical and deadly adventures. You're sure at least one idiot on Darkspace will ask why you didn't just use the robot to crush City Hall, but hopefully the more intellectual villains will get the irony of smashing their administration building with the only thing that arguably made this place worth visiting.\n   *set combat %+10\n   *set ingenuity %+5\n   *set lethality +5\n   *goto sherifftime1\n  \n  *else\n   …and uses one of its massive arms to grab the oversize tourist attraction. Like a drunk bowler, the titanic robot clumsily sends the ball of metal rolling straight toward City Hall. You remind yourself to put more resources into Robot R&D so your giant robots don't look so silly.\n\n   You celebrate like you just rolled a perfect 300 as the government building is torn in two by the fast-rolling aluminum ball. The ball continues to roll far into the distance, presumably on its way to even more magical and deadly adventures. You're sure at least one idiot on Darkspace will ask why you didn't just use the robot to crush City Hall, but hopefully the more intellectual villains will get the irony of smashing their administration building with the only thing that arguably made this place worth visiting.\n   *set combat %+10\n   *set lethality +5\n   *goto sherifftime1\n\n #A massive flame bomb lands right next to the aluminum ball…\n  *if terror > 60\n   …which you've set to detonate on your command. You use your jetpack to get some distance, activate your vehicle's armored mode, and double-check that the bomb landed exactly where you calculated. \n\n   Shrieks of terror echo as soon as you set off the bomb containing explosive material, flammable liquid, and human skulls for good measure. The aluminum ball not only bursts into flames but also gets blown away with enough force that it eventually rolls straight into City Hall. Floating in the sky, you twist enthusiastically in the closest approximation of victory dancing that someone in a jetpack can perform as the building burns to the ground.\n   *set terror %+10\n   *set combat %+5\n   *set lethality +5\n   *goto sherifftime1\n  \n  *else\n   …which you've set to detonate on your command. You use your jetpack to get some distance, activate your vehicle's armored mode, and double-check that the bomb landed exactly where you calculated. \n\n   Shrieks of terror echo as soon as you set off the bomb, which contains both explosive and flammable materials, causing the hunk of wasted metal to not only burst into flame but also get blown away with enough force that it eventually rolls straight into City Hall. Floating in the sky, you twist enthusiastically in the closest approximation of victory dancing that someone in a jetpack can perform as the building burns to the ground.\n   *set terror %+10\n   *set lethality +5\n   *goto sherifftime1\n\n*label stealsell\n\nAfter throwing on a jetpack to watch the whole spectacle unfold from above, you adjust the Darkspace camera and then…\n\n*choice\n  #Use a shrink ray to reduce the ball of foil to a convenient size.\n   *if ingenuity >= 60\n    You whip out your high-tech shrink ray, which you've tested extensively on goons who clog your secret lair's toilets. The memory of them spinning in circles as you flush them down a different toilet is usually enough to put a smile back on your face.\n\n    Jaws drop to the floor as you reduce the oversize tourist trap to the size of an average orange, or pomegranate. Mango, maybe? Ignoring your sudden craving for a smoothie, you cackle gleefully as you gently slip the once-massive ball into your pocket. You can resize it later and sell it for a good wad of cash.\n    *set ingenuity %+10\n    *set terror %+5\n    *goto sherifftime1\n   \n   *else\n    You whip out your high-tech shrink ray, which you've only used once on a goon who clogged your secret lair's toilet for the fifth and decidedly final time. The memory of him spinning in circles as you flushed him down said toilet is usually enough to put a smile back on your face.\n\n    Jaws drop to the floor as you reduce the oversize tourist trap to the size of a small watermelon, or cantaloupe. Coconut, maybe? Ignoring your sudden craving for a smoothie and slight annoyance that it didn't shrink as small as you had planned, you cackle gleefully as you painfully force it into one of your large pockets. You can resize it later and sell it for a good wad of cash.\n    *set ingenuity %+10\n    *goto sherifftime1\n\n  #Call in a team to melt it down and collect the liquid.\n   *if combat >= 60\n    A helicopter soars above from which goons rappel down to your location. One yells \"Wheee!\" as he drops, and you remind yourself to flag his file when you get home. Equipped with flamethrowers and high-tech vac packs, they begin torching the oversize ball of foil while collecting the melted metal.\n\n    You're pleased with how quickly they do their job, especially since the only thing you've seen your goons do faster is hog up all the cake and pizza during the birthday parties your HR reps tell you are mandatory to maintain company morale. Before you know it, they've already climbed back into the low-flying chopper and flown off with the liquidated tourist attraction, leaving all the nearby people in a state of panicked awe.\n    *set ingenuity %+5\n    *set combat %+10\n    *goto sherifftime1\n   \n   *else\n    A helicopter soars above from which goons rappel down to your location. One yells \"Wheee!\" as he drops, and you remind yourself to flag his file when you get home. Equipped with flamethrowers and high-tech vac packs, they begin torching the oversize ball of foil while collecting the melted metal.\n\n    You're not pleased with how slowly they do their job, especially since the only thing you've seen your goons do slower is solve the puzzles you force on them to test their problem-solving skills. After an excruciating wait, they climb back into the low-flying chopper and fly off with the liquidated tourist attraction, leaving all the nearby people in a state of panicked awe.\n    *set combat %+10\n    *goto sherifftime1\n\n  #Call in a helicopter with a giant claw to fly the ball over the town.\n   *if terror > 60\n    Like in a giant crane game, the arm reaches down to grip the ball. And unlike the crane game back at Lopuzi's Pizza in your hometown, you don't have to break a toe kicking it to make the thing actually work. The enormous claw slowly clamps onto the oversize tourist trap, and the helicopter begins flying away with it.\n\n    Although no one gets hurt, it's still quite amusing seeing people faint at the sight of a massive ball of metal hanging over their crappy little low-equity house. Seriously, you're surprised a strong gust of wind hasn't toppled over most of this town yet. The thought of all these people getting poorer without their main attraction is enough to make you grin.\n    *set terror %+10\n    *set combat %+5\n    *goto sherifftime1\n\t\n   *else\n    Like in a giant crane game, the arm reaches down to grip the ball. And unlike the ker, crushing everything in its path and even setting a few buildings, trees, and people on fire. You make a mental note that you'll definitely want one of these for your next holiday-themed scheme. Fourth of July would be good. Maybe Chinese New Year, if you're feeling multicultural.\n   *set ingenuity %+10\n   *set lethality +5\n   *goto sherifftime2\n\n #Calling in my super-high-tech roller machine, a.k.a. The Crusher.\n  *if combat >= 60\n   You shake with excitement at the thought of finally using The Crusher for one of your schemes. You only placed a bid on the thing on supervillainbay.com because shipping was free. Only a few seconds after you press a button on your suit, The Crusher lands near the oversize tourist trap. A few onlookers appear to wet their pants before the show even truly begins.\n\n   The goon operating the massive machine drives near the giant aluminum ball and attaches The Crusher's two arms on each side. Combined, they become a deadly road-roller-like apparatus, bringing a smile to your face as every object in its path is flattened.\n   *set combat %+10\n   *set ingenuity %+5\n   *set lethality +5\n   *goto sherifftime2\n   \n  *else\n   You shake with excitement at the thought of finally using The Crusher for one of your schemes. You only placed a bid on the thing on supervillainbay.com because shipping was free. Only a few seconds after you press a button on your suit, The Crusher lands near the oversize tourist trap. A few onlookers appear to wet their pants before the show even truly begins.\n\n   The goon operating the massive machine embarrasses you as he struggles to figure out the controls at first. After ten agonizing minutes, he drives near the giant aluminum ball and attaches The Crusher's two arms on each side. Combined, they become a deadly road-roller-like apparatus, bringing a smile to your face as every object in its path is flattened.\n   *set combat %+10\n   *set lethality +5\n   *goto sherifftime2\n\n #Attaching rockets to blow up the foil ball in the sky and rain down debris.\n  *if terror > 60\n   You quickly jetpack up to the ball of metal and attach several high-powered rockets to its shiny metal surface. The spectators stand in awe as you set the rockets to explode a few seconds after they initially fire. A few even snap pictures of you with their phones, maneuvering awkwardly to get selfies with you and the ball in the background. You just hope they captured your good side.\n\n   Once a bigger crowd gathers, you press a button on your suit, and the oversize tourist trap shoots into the sky. Everyone still doesn't know quite what to make of it, until it explodes with a deafening sound. Like glorious confetti at a New Year's Eve party, sharp chunks of aluminum shrapnel rain down over a large radius. There's nothing like a loud bang, followed by the slicing of buildings and flesh, to bring a little terror into everyone's hearts.\n   *set terror %+10\n   *set combat %+5\n   *set lethality +10\n   *goto sherifftime1\n  \n  *else\n   You quickly jetpack up to the ball of metal and attach several high-powered rockets to its shiny metal surface. The spectators stand in awe as you set the rockets to explode a few seconds after they initially fire. A few even snap pictures of you with their phones, maneuvering awkwardly to get selfies with you and the ball in the background. You just hope they captured your good side.\n\n   Impatient, you press a button on your suit before a bigger crowd gathers, and the oversize tourist trap shoots into the sky. Everyone still doesn't know quite what to make of it, until it explodes with a deafening sound. Like glorious confetti at a New Year's Eve party, sharp chunks of aluminum shrapnel rain down over a large radius. There's nothing like a loud bang, followed by the slicing of buildings and flesh, to bring a little terror into everyone's hearts.\n   *set terror %+10\n   *set lethality +10\n   *goto sherifftime1\n\n*label reflectmind\n\nYour subliminal brainwashing device is ready to go. Now, it's just a matter of what message you want to send into these people's feeble minds via their precious ball of metal.\n\n*choice\n #Send highly opinionated subliminal messages into every brain.\n   You upload your amazing list of \"things people should know\" to the device. They're mostly opinions you jotted down from time to time while on the porcelain throne. Important issues concerning government, politics, morality, and why most foods are better with melted cheese. \n\n   You activate the device and watch the oversize tourist trap light up like a disco ball. You remind yourself to bring along your \"Best Disco Songs Ever\" mixtape the next time you use a giant metal ball to send brilliant beams of light shooting into nearby people's heads. They all kneel to the ground in confusion as their minds are bombarded by all the intelligent opinions you know to be cold, hard facts.\n   *set ingenuity %+10\n   *goto sherifftime2\n\n #Stun everyone, then call in troops to kidnap potential recruits.\n   You activate the device and watch the oversize tourist trap light up like a disco ball. You remind yourself to bring along your \"Best Disco Songs Ever\" mixtape the next time you use a giant metal ball to send brilliant beams of light shooting into nearby people's heads. The violently strobing light causes everyone who sees it to fall to the ground in an almost unconscious state.\n\n   You call in your goons, who drop from a helicopter overhead and quickly grab their stunned victims before using their own jetpacks to return to the flying vehicle. You figure becoming one of your goons, even by force, is the best thing that will ever happen to these people, considering that they've driven miles to see a big ball of aluminum.\n   *set combat %+20\n   *goto sherifftime2\n\n #Send them into a violent fury via horrifying images and noises.\n   You activate the device and watch the oversize tourist trap light up like a disco ball. You remind yourself to bring along your \"Best Disco Songs Ever\" mixtape the next time you use a giant metal ball to send brilliant beams of light shooting into nearby people's heads.\n\n   You smile as people go from \"cool as a cucumber\" to \"bridezilla with the wrong cake\" in a matter of seconds. If there's anything more horrifying than having your own loved one start beating you without warning, you don't know what it is! Unless you're one of those married people who are dying for an excuse to punch their in–law in the face.\n   *set terror %+20\n   *set lethality +5\n   *goto sherifftime2\n\n*label corn_maze_options\n*choice\n #Kidnap their mayor and drop him in the corn maze, naked.\n  Just because these people already live dull, meaningless lives doesn't mean they shouldn't know just how powerless their chief executive officer is against good old-fashioned villainy.\n  *set activist %+20\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_corn\n  *goto kidnapmayor\n\n #Steal all the corn to sell for some easy cash.\n  If you're going to inflict mass hysteria on these folks using their precious tourist attraction, you might as well make some pocket change while you're at it.\n  *set activist %-20\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_corn\n  *goto stealcorn\n\n #Plan a fun way to kill as many of the corn maze enthusiasts as possible.\n  You briefly smirk at the thought of wreaking havoc with the very thing they use to make money off gullible tourists, especially if it gets to involve fire or vicious animals.\n  *set lethality +10\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_corn\n  *goto deadlymaze\n\n #Change the maze in a way that's entertaining for me and traumatizing for others.\n  Corn mazes are supposed to be fun, right? You can't resist giving these people a good scare (or worse) in a way that's both memorable for you and awful for them.\n  *set theatricality %-20\n  *gosub sheriff_breakfast\n  \n  *gosub arrive_corn\n  *goto modifymaze\n\n*label kidnapmayor\n\nAfter throwing on a jetpack to watch the whole spectacle unfold from a nearby rooftop, you adjust the Darkspace camera before pressing a button on a device that will get things started.\n\nNot a few seconds later…\n\n*choice\n #The mayor arrives alone. The potential blackmail material I obtained from his computer may have something to do with it.\n  *if ingenuity >= 60\n   Hacking into his email account and using a few scandalous messages to lure him to the maze alone was the easy part. As per your deal, you won't release any info that will instantly end his political career and have him thrown in jail if he does one thing: streak through the corn maze. You may have threatened his entire family as well.\n\n   The random gasps you hear from people who failed to expect seeing a naked middle-aged man during their family trip make you giggle, but the occasional shrieks of \"Mr. Mayor? Is that you?\" leave your sides hurting from laughter.\n   *set ingenuity %+10\n   *set terror %+5\n   *goto sherifftime1\n  \n  *else\n   Hacking into his email account and using a few scandalous messages to lure him to the maze alone was harder than it sounds. As per your deal, you won't release any info that will instantly end his political career and have him thrown in jail if he does one thing: streak through the corn maze. You may have threatened his entire family as well.\n\n   The random gasps you hear from people who failed to expect seeing a naked middle-aged man during their family trip make you giggle, but the occasional shrieks of \"Mr. Mayor? Is that you?\" leave your sides hurting from laughter.\n   *set ingenuity %+10\n   *goto sherifftime1\n\n #Several of my armed soldiers arrive with the mayor at gunpoint.\n  *if combat >= 60\n   Armed to the teeth with laser weapons and decked out in armor, your troops easily infiltrated the mayor's building and captured him, all while doing away with any opposition. You're actually surprised they brought you the right guy.\n\n   Screams of fright and surprise echo from random people as your troops force the mayor to run through the maze in the nude. The whole thing makes you chuckle with joy, especially since your minions have to follow around a naked guy.\n   *set combat %+10\n   *set terror %+5\n   *goto sherifftime1\n  \n  *else\n   Armed to the teeth with laser weapons and decked out in armor, your troops still barely manage to infiltrate the mayor's building and capture him. At least they brought you the right guy.\n\n   Screams of fright and surprise echo from random people as your troops force the mayor to run through the maze in the nude. The whole thing makes you chuckle with joy, especially since your minions have to follow around a naked guy.\n   *set combat %+10\n   *goto sherifftime1\n\n #A mechanical spider holding the mayor crawls toward the maze.\n  *if terror > 60\n   Outfitted with cloaking and sticky web projectiles, your spider easily infiltrated the mayor's building and captured him, all while doing away with any opposition. You'd use such an effective machine more often, if it wasn't so similar to Dr. Arachnid's devices. It's bad enough people confuse you with that Scorpion villain.\n\n   Screams of fright echo from random people inhabiting the corn maze as the massive arachnid carries the mayor to the heart of the maze and drops him there, but not before tearing his clothes off and injecting a poison that scrambles his brain. Even more scattered gasps come from people who didn't expect to run into a naked, middle-aged zombie during their family trip. The whole thing makes you nearly wet yourself with laughter.\n   *set terror %+10\n   *set ingenuity %+5\n   *goto sherifftime1\n  \n  *else\n   Outfitted with cloaking and sticky web projectiles, your spider easily infiltrated the mayor's building and captured him, all while doing away with any opposition. You'd use such an effective machine more often if you weren't so frightened by it yourself.\n\n   Screams of fright echo from random people inhabiting the corn maze as the massive arachnid carries the mayor to the heart of the maze and drops him there, but not before tearing his clothes off and injecting a poison that scrambles his brain. Even more scattered gasps come from people who didn't expect to run into a naked, middle-aged zombie during their family trip. The whole thing makes you nearly wet yourself with laughter.\n   *set terror %+10\n   *goto sherifftime1\n\n*label stealcorn\n \nAfter throwing on a jetpack to watch the whole spectacle unfold from nearby, you adjust the Darkspace camera before setting your plan into motion to harvest the corn. Obviously, you don't want ground-up human flesh getting mixed in with the good stuff and lowering your price, so you get rid of all the people still wandering within by…\n\n*choice\n #Using a mind-control ray to lead all the people out.\n  *if ingenuity >= 60\n   You whip out your mind-control ray and adjust it to affect everyone inside the maze. They start filing out like little ants almost immediately due to your amazing programming. You add \"giant magnifying glass to fry people with the sun\" to your mental list of fun Christmas gifts for yourself.\n\n   Free from the trance, the people's jaws drop as a few helicopters move in and drop a giant corn harvester about the size of a football field. You watch as it makes short work of the massive cornfield, all the while trying to recall how you knew you'd need this machine someday. Then you remember that you're a genius.\n   *set ingenuity %+10\n   *set combat %+5\n   *goto sherifftime1\n   \n  *else\n   You whip out your mind-control ray and adjust it to affect everyone inside the maze. It takes a while due to poor programming, but eventually they start filing out like little ants. You add \"giant magnifying glass to fry people with the sun\" to your mental list of fun Christmas gifts for yourself.\n\n   Free from the trance, the people's jaws drop as a few helicopters move in and drop a giant corn harvester about the size of a football field. You watch as it makes short work of the massive cornfield, all the while trying to recall how you knew you'd need this machine someday. Then you remember that you're a genius.\n   *set ingenuity %+10\n   *goto sherifftime1\n\n #Calling in a team to force everyone out of the maze.\n  *if combat >= 60\n   A helicopter soars overhead, dropping a few of your goons down into the maze. Equipped with electroshock weapons, they begin zapping people to force them out of the maze as fast as possible. You're pleased with how quickly they do their job, especially since the only thing you've seen them do faster is hog up all the cake and pizza at the birthday parties HR keeps insisting have to be thrown to keep morale high.\n\n   Now out of the maze, the people's jaws drop as a few helicopters move in and drop a giant corn harvester about the size of a football field. You watch as it makes short work of the massive cornfield, all the while trying to recall how you knew you'd need this machine someday. Then you remember that you're a genius.\n   *set combat %+10\n   *set terror %+5\n   *goto sherifftime1\n   \n  *else\n   A helicopter soars overhead, dropping a few of your goons down into the maze. Equipped with electroshock weapons, they begin zapping people to force them out of the maze as fast as possible. You're somewhat disappointed with how sloppy they do their job, especially since the only thing you've seen them do with less discipline is your mandatory synchronized swimming tryout.\n\n   Now out of the maze, the people's jaws drop as a few helicopters move in and drop a giant corn harvester about the size of a football field. You watch as it makes short work of the massive cornfield, all the while trying to recall how you knew you'd need this machine someday. Then you remember that you're a genius.\n   *set combat %+10\n   *goto sherifftime1\n\n #Just letting my giant harvester scare them off.\ n\n   Shaking your head at government waste, you hack about a dozen of them, parked just outside the maze, and program them to harvest all the corn, whether there's a human in the way or not. This, of course, causes a chaotic scene as people run in fear of getting mowed down. An ear of corn lands near you, and you use your suit's blowtorch to turn it into popcorn so that you have something to munch on as you enjoy the show.\n   *set ingenuity %+10\n   *set terror %+5\n   *set lethality +5\n   *goto sherifftime1\n   \n  *else\n   You did your research and discovered the city is using a massive government agriculture grant to buy computer-controlled corn harvesters to eventually take down this ridiculous tourist trap and get ready to set it up again next year. \n\n   Shaking your head at government waste, you hack into a dozen of them, parked just outside the maze, but only manage to program half to harvest all the corn, whether there's a human in the way or not. This, of course, causes a chaotic scene as people run in fear of getting mowed down. An ear of corn lands near you, and you use your suit's blowtorch to turn it into popcorn so that you have something to munch on as you enjoy the show.\n   *set ingenuity %+10\n   *set lethality +5\n   *goto sherifftime1\n\n #Calling in an air strike to decimate the area.\n  *if combat >= 60\n   You decide not to think too hard and simply carpet bomb the area to smithereens, corn and people together. After pressing a button, several drones fly overhead and do just that without a single problem.\n\n   Easy and without any complications, unlike your dating life. All that time running drills with your troops is certainly paying off. You can't remember the last time a training exercise ended in name-calling, hurt feelings, and sobbing apologies.\n   *set combat %+10\n   *set ingenuity %+5\n   *set lethality +5\n   *goto sherifftime1\n   \n  *else\n   You decide not to think too hard and simply carpet bomb the area to smithereens, re allergic to it or just plain weird, you guess. You take a moment to add \"virally induced popcorn allergy\" to your mental list of evil schemes. Anyway, no one loves popcorn enough that they'd actually enjoy having it shot at them with enough force to bruise skin or poke an eye out.\n\n   You activate your microwave gun and listen to the sound of popping followed by shouts of pain as people are pelted by fast-flying popcorn. Soon after, several of your planes fly overhead, each dropping enough hot butter to bathe the entire corn maze. (Real butter, too. You're a villain, but not even you are monstrous enough to coat podunk yokels in hydrogenated soybean oil.) You manage to catch a few of the high-flying puffs of buttery corn and snack on them as you watch the hilarity ensue.\n   *set ingenuity %+10\n   *set terror %+5\n   *goto sherifftime1\n   \n  *else\n   Everyone loves popcorn, right? Unless you're allergic to it or just plain weird, you guess. You take a moment to add \"virally induced popcorn allergy\" to your mental list of evil schemes. Anyway, no one loves popcorn enough that they'd actually enjoy having it shot at them with enough force to bruise skin or poke an eye out.\n\n   You activate your microwave gun and listen to the sound of popping followed by shouts of pain as people are pelted by fast-flying popcorn. Soon after, one of your planes flies overhead, dropping long trails of hot butter on most of the corn maze. (Real butter, too. You're a villain, but not even you are monstrous enough to coat podunk yokels in hydrogenated soybean oil.) You manage to catch a few of the high-flying puffs of buttery corn and snack on them as you watch the hilarity ensue.\n   *set ingenuity %+10\n   *goto sherifftime1\n\n #Calling in a drone to drop laughing-gas bombs.\n  *if combat >= 60\n   Your secret weapons facility is packed with all sorts of incredible stuff that you rarely get a chance to show off. Heat-seeking missiles, high-voltage Tesla coils, you name it ry\n\n*label rob_vaults\nYou adjust the Darkspace camera, then get things started by…\n\n*choice\n  #Hacking the turrets inside the vault to fry the money.\n    *if ingenuity >= 60\n      You did your research and discovered that the bank uses laser-equipped turrets, ready to blast away anyone carrying money that isn't theirs. The turrets are inside the walls, too. You know, for safety. Using your refined hacking skills, you program them to shoot at the stacks of cash and other valuables, reducing them to nothing.\n\n      You watch from outside as the bank workers freak out, trying to open the vaults but quickly realizing that's not a good idea when lasers are bouncing around inside. Just so they know it's you, they're greeted with a nice image of you making mocking facial gestures whenever they try to hack their systems free.  \n\n      Curious to see how the city reacts to their dumb banks getting violated in such a humiliating fashion, you stroll back outside and use your jetpack to fly up and catch a bird's-eye view.\n      *set ingenuity %+10\n      *set terror %+5\n      *goto sherifftime1\n \n    *else\n      You did your research and discovered that the bank uses laser-equipped turrets, ready to blast away anyone carrying money that isn't theirs. The turrets are inside the walls, too. You know, for safety. Using your somewhat decent hacking skills, you program a few of them to shoot at the stacks of cash and other valuables, reducing them to nothing.\n\n      You watch from outside as the bank workers freak out, trying to open the vaults but quickly realizing that's not a good idea when lasers are bouncing around inside. Just so they know it's you, they're greeted with a nice image of you making mocking facial gestures whenever they try to hack their systems free.  \n\n      Curious to see how the city reacts to their dumb banks getting violated in such a humiliating fashion, you stroll back outside and use your jetpack to fly up and catch a bird's-eye view d flash grenades into the bank, leaving every customer and teller blind for several hours.\n\n      With everyone inside fumbling around in terror, you blow open the vault holding the money of several politicians and toss a few explosive grenades inside. You don't have to take the money to make them realize how vulnerable their banks actually are when it comes to a supervillain like you.\n\n      Curious to see how the city reacts to its dumb banks getting violated in such a humiliating fashion, you use your jetpack to fly up and catch a bird's-eye view.\n      *set terror %+10\n      *set ingenuity %+5\n      *goto sherifftime1\n    *else\n      Fun fact: people tend to panic when you blind them! This includes, annoyingly, a few of your goons who admit to being afraid of the dark. Anyway, you toss a few high-powered flash grenades into the bank, leaving most of the customers and tellers blind for several hours.\n\n      With everyone inside fumbling around in terror, you blow open the vault holding the money of several politicians and toss a few explosive grenades inside. You don't have to take the money to make them realize how vulnerable their banks actually are when it comes to a supervillain like you.\n\n      Curious to see how the city reacts to its dumb banks getting violated in such a humiliating fashion, you use your jetpack to fly up and catch a bird's-eye view.\n      *set terror %+10\n      *goto sherifftime1\n      \n*label stealall\n\nYou adjust the Darkspace camera before getting things started by…\n\n*choice\n #Using a mind-control ray to lead all the people out.\n   You activate your mind-control ray, which is programmed to make everyone inside the bank grab as much money as they can and leave it in a pile outside. They all file out like little ants, bags of cash in hand. An adorable little moppet struggles to drag a heavy gold bar behind himself, a sight certain to warm even the blackest heart. You can think of one or two goons who would probably l your troops to take off.\n\n   Curious to see how the city reacts to its dumb banks getting violated in such a humiliating fashion, you use your jetpack to fly up and catch a bird's-eye view.\n   *set combat %+10\n   *set ingenuity %+5\n   *goto sherifftime1\n  \n  *else\n   A helicopter soars overhead, dropping a few of your goons down onto the location. Equipped with electroshock weapons, they begin zapping people and dragging them into vaults, locking them in with several open helium tanks you've been dying to use in one of your evil schemes. They get the job done but not as efficiently as you'd hoped. At least none of them accidentally locked themselves in a vault like you'd feared.\n   \n   You giggle as the sound of high-pitched yelling and screaming echoes from behind the vault doors. After a few good laughs, you leave the bank and signal your troops to take off.\n\n   Curious to see how the city reacts to its dumb banks getting violated in such a humiliating fashion, you use your jetpack to fly up and catch a bird's-eye view.\n   *set combat %+10\n   *goto sherifftime1\n\n #Locking everyone in the bank with terrifying creatures.\n  *if terror > 60\n   With the help of a few minions you call in, you kick open the door and together toss more than a dozen large boxes filled to the brim with bats, snakes, bees, and spiders. (All good supervillains have a spider guy to keep their inventory of deadly arachnids in tip-top shape. And it turns out that the spider guy knows the bat guy, who's married to the snake lady. Networking is an important skill.) As creatures slither, flap, and crawl free, you seal the bulletproof entrance doors with a glue grenade. These people should consider themselves lucky that you already used all your flesh-eating cockroaches during a recent scheme.\n\n   You watch through the clear bulletproof glass doors as people run around in terror from some of their deepest fears. Several go so far as to lock themselves in vaults to stay safe. It's the kind of high-quality entertainment you just can't find on television these days.\n\n   Curious to see how the city reacts to its dumb banks getting violated in such a humiliating fashion, you use your jetpack to fly up and catch a bird's-eye view.\n   *set terror %+10\n   *set combat %+5\n   *goto sherifftime1\n  \n  *else\n   Since you didn't think about calling for help, you kick open the bank doors by yourself and toss in a few large boxes filled to the brim with bats, snakes, bees, and spiders. (All good supervillains have a spider guy to keep their inventory of deadly arachnids in tip-top shape. And it turns out that the spider guy knows the bat guy, who's married to the snake lady. Networking is an important skill.) As creatures slither, flap, and crawl free, you seal the bulletproof entrance doors with a glue grenade. These people should consider themselves lucky that you already used all your flesh-eating cockroaches during a recent scheme.\n\n   You watch through the clear bulletproof glass doors as people run around in terror from some of their deepest fears. Several go so far as to lock themselves in vaults to stay safe. It's the kind of high-quality entertainment you just can't find on television these days.\n\n   Curious to see how the city reacts to its dumb banks getting violated in such a humiliating fashion, you use your jetpack to fly up and catch a bird's-eye view.\n   *set terror %+10\n   *goto sherifftime1\n\n*label sherifftime1\n*page_break\nAdmittedly, you're giddier than a gamer during a Summer Steam Sale when you think about all the virtual applause you'll no doubt receive on Darkspace. Even the inevitable \"Who cares, you're in the middle of nowhere!\" troll comments won't bother you, because the feeling of finally executing a plan without interference is quite satisfying.\n\nUnfortunately, you spoke—or thought, in this case—too soon. Your danger-sensing jetpack automatically jerks you sideways to avoid a rocket aimed straight at you, which ends up flying past and blowing up in the sky. Since you're pretty sure that getting shot at by rocket-propelled explosives isn't part of your plan, you scramble to find who or what is behind this. Eventually you notice an all-too-familiar figure standing on a nearby rooftop: the sheriff.\n\nYour eyebrows rise as you notice the powerful bazooka resting on her shoulder, still smoking after nearly making tomorrow's headline \"Lame Supervillain ${name} Blown to Pieces by Heroic Sheriff.\" What's she doing with that kind of firepower, anyway? At least now you know why her smile covers forty percent of her face all the time. You'd smile too if you had that kind of weaponry. (You, do, of course. You smile a lot.)\n*goto sherifftime3\n\n*label sherifftime2\n\nAdmittedly, you're giddier than a gamer during a Summer Steam Sale when you think about all the virtual applause you'll no doubt receive on Darkspace. Even the inevitable \"Who cares, you're in the middle of nowhere!\" troll comments won't bother you, because the feeling brought by finally executing a plan without interference is quite satisfying.\n\nUnfortunately, it didn't last nearly as long as you wanted it to. You witness the ball of foil explode before it can do any more damage. This isn't part of the plan, you think, as you scramble to find who or what could have caused this. Eventually, you notice an all-too-familiar figure standing on a nearby rooftop: the sheriff.\n\nYour eyebrows rise as you notice the powerful bazooka resting on her shoulder, still smoking from nearly making tomorrow's headline \"Lame Supervillain ${name} Blown to Pieces by Heroic Sheriff.\" She tips her hat respectfully toward you quickly before beginning to load another rocket into the tube. At least you know why she smiles all the damn time. It's the smile of a woman who loves what she does, when what she does is apparently owning and maintaining a big bazooka.\n*goto sherifftime3\n\n*label sherifftime3\n\nYou're getting sick of this town. The food is bad, the hotel is worse, and the sheriff carries heavy ordnance. Of course, to make a getaway, you'll need your transport vehicle, which is across town, since your jetpack is already more than halfway out of fuel from floating for so long. And it remains to be seen whether the sheriff will just stand by and let you leave. You don't think she could stop you, but you also didn't think she'd have an RPG, so obviously the track record on the things you think isn't doing so hot today. Besides, it's not like you can let this sort of insult stand.\n*page_break\nYour villainous mind produces yet another fantastic set of options for dealing with her before making your grand exit.\n\n*fake_choice\n #Make a statement by capturing her and flying around for all to see.\n  If there's anyone you like humiliating more than your incompetent goons, it's an enforcer of the law that thinks she can take on a villain of your stature. You'll disarm her and carry her unconscious body for all to see. Perhaps the people of this town will finally realize how helpless they truly are when a real supervillain is involved.\n  *set activist %+20\n #Take her out and keep the bazooka as a memento.\n  Although this isn't your greatest scheme ever, it would be pretty cool to place her bazooka in your private museum where you keep objects that remind you of villainous deeds past. It will go perfect right next to the remote control for the giant mechanical gorilla you used to toss explosive barrels during a recent Merit City parade.\n  *set activist %-20\n #Give a speech that will demoralize her and earn me kudos on Darkspace.\n  Where the hell was this noble sheriff while you were using the city's most beloved landmark to rain pain and suffering on her law-abiding citizens? It's time to rub it in her face that you were too clever and quick for her to predict. You just need to focus on not sounding like a villain from a 1960s spy show, or else you'll receive more ridicule than praise from the guys and gals on Darkspace.\n  *set theatricality %-20\n #Blow her up with her own bazooka.\n  Maybe by ending her with her own firepower this town will realize just how out of hand the \"hand of the law\" can get. More importantly, she'll never disturb anyone with her smile again after you splatter her, along with her stupid dark sunglasses, all over the walls and streets.\n  *set lethality +5\n\nNot a second after you decide on your next move, the sheriff shoots her bazooka at you yet again. Your jetpack dodges the flying projectile as predicted, but then there's an ear-splitting crack and your body lurches forward. Heat runs down your back as the jetpack bursts into flames, engine whining angrily. You realize you have been shot—or at least your pack has—by some kind of long-range weapon. Wobbling downwards, you hit the pack's emergency release a few seconds before the pack explodes. You fall ten feet down to the ground. Just before you land, you catch a glimpse of a figure wearing the same clothes as the sheriff, a sniper rifle in his hands. You weren't shot by the sheriff, but you sure as hell were by her deputy. If only you had someone as reliable watching your back right about now….\n\nWait, how in the hell are the sheriff and her buddy not on the Darkspace resource pages? You're pretty sure you would have remembered a bazooka-shooting law-woman and her crack-shot sniper deputies. Realizing that the question will remain purely academic if you catch another bullet, you decide it's probably better if you simply hightail it out of here and exact your vengeance some other time.\n*page_break\n\n*if (ingenuity > combat) and (ingenuity > terror)\n You make a mad dash for your transport while tossing a few flashbangs to get some of the sheriff's cops off your back, making it into the vehicle and activating one of your most inventive features: cloaking. Perfect for sneaking into drive-ins and avoiding those annoying sign-holders that ask for money, but more importantly, perfect for getting away from cops.\n\n You turn it on and easily make your way toward the main (and only) highway, all while the cops drive around without a clue as to where you are. One minute you're terrorizing their town, the next you disappear into thin air. You'll definitely stay on their minds as the most ingenious villain they'll ever meet!\n *goto sherifffinale\n*elseif (combat > ingenuity) and (combat > terror)\n You make a mad dash for your transport while tossing a few flashbangs to get some of the sheriff's cops off your back, making it into the vehicle and quickly calling in an air strike. You can't think of a better way to cover your getaway and cause a bit more destruction.\n\n You watch as a few drones fly above and carpet bomb a nearby area of the town, sending a cloud of dust and smoke everywhere that disorients everyone—including the cops. Using your transport's powerful brights, you maneuver through the rubble and quickly find yourself on the main highway. You'll definitely stay on their minds as the most tactical villain they'll ever meet!\n *goto sherifffinale\n*elseif (terror > ingenuity) and (terror > combat)\n You make a mad dash for your transport while tossing a few flashbangs to get some of the sheriff's cops off your back, making it into the vehicle and hitting the pedal to the metal. You're driving so fast that you're at the main highway before you know it, but ahead you see several cops driving straight for you.\n\n You step on the gas, starting a deadly game of chicken with the oncoming police cars. For a second you recall reading about a villain named The Mad Chicken, whose gimmick was doing this very thing in each scheme. Pretty sure on his third or fourth attempt he ended up with a broken neck, so that didn't go too well. Instead of breaking your own neck, the cops fearfully get out of the way as you race past them. You'll definitely stay on their minds as the most terrifying villain they'll ever meet!\n *goto sherifffinale\n*else\n You make a mad dash for your vehicle, tossing a few flashbangs to distract the sheriff's cops nearby. Now inside, you're not quite sure how exactly you want to make your getaway. You can use the cloaking device to sneak away unnoticed, or you can just call in an air strike to cover your escape. There's also the \"drive at them full speed and hope they just get out of the way\" tactic.\n \n \"Wait, why not all three?\" you ask yourself before activating your vehicle's cloak and calling in an air strike. You wait for the carpet of bombs to lay waste to part of the town before driving through the cloud of dust and smoke with ease. Now on the main highway, you disable your cloak and have some fun with a few brave cops by speeding at them in a game of chicken. They get out of the way, of course, leaving you certain that the entire town will remember you as the most resourceful villain they'll ever meet!\n *goto sherifffinale\n\n*label sherifffinale\n*page_break\nConvinced that you've pretty much gotten away with your plan, you decide to do one last gesture just to rub it in these schmucks' faces while driving down the highway.\n\n*fake_choice\n #Give them all the finger as I drive out of sight.\n #Shoot off the fireworks I installed for an exciting occasion.\n #Blast my favorite villainous music as I drive into the distance.\n\n*if (((ingenuity \u003c combat) and (ingenuity \u003c terror)) and (ingenuity >= 60))\n Before you can do what you were thinking, your car starts slowing down as a bunch of funny characters and corrupted numbers appear on the vehicle's computer. You blink for a moment, stunned. You're being hacked. The crazy backwater cop is hacking your ridiculously expensive, advanced, and transmission-impervious assault transport. \n\n Not one to sit idly by while this humiliation continues, you quickly activate your transport's anti-hacking measures. Happily, your counter-hack software is the only thing you update more regularly than your Darkspace status (\"Killed a minion today, I feel fat, and I hate Mondays. #WantToTakeOverTheWorldProblems\"). The interference clears, and you gun the engine, blowing past a sign marking the county line and making your way toward home.\n\n A week later, you receive an email from none other than the sheriff. You don't know what bothers you more: the fact that she somehow sent you a message, or the fact that her email address is thesheriff@police.com.\n\n \"I'll be sure to update our software again, in case you ever come to visit.\"\n\n Who the hell is this lady? Your skills kept you safe, but you still got ambushed and put in a position of weakness. That wouldn't have happened if you had anybody even half as competent as that cop on your side….\n *goto leavewest\n\n*elseif (((ingenuity \u003c combat) and (ingenuity \u003c terror)) and (ingenuity \u003c 60))\n Before you can do what you were thinking, your car starts slowing down as a bunch of funny characters and corrupted numbers appear on the vehicle's computer. You blink for a moment, stunned. You're being hacked. The crazy backwater cop is hacking your ridiculously expensive, advanced, and transmission-impervious assault transport. \n\n Not one to sit idly by while this humiliation continues, you quickly activate your transport's anti-hacking measures. Nothing happens, and you curse yourself for not updating your software for months. You were planning on doing it when you got home, since of course you weren't going to run into some sort of tech-savvy supercop out in Nowheresville. Your vehicle sputters to a halt, and you start to panic as the hack activates the car's self-destruct mechanism. Diving out of the door, you barely avoid being scorched in the explosion. Stumbling past a sign that says \"County Line,\" you press the emergency button on your suit's palm, summoning the—sigh—Rescue Team to your position. You hate the Rescue Team. Everyone on the Rescue Team is smug.\n\n A week later, body and ego slowly recovering, you get an email from none other than the sheriff. You don't know what bothers you more: the fact that she somehow sent you a message, or the fact that her email address is thesheriff@police.com.\n\n \"I kept your license plate as a souvenir. Feel free to come back any time if you want to permanently visit it in our jail.\"\n\n Who the hell is this lady? Your lack of tech savvy almost got you killed on what was supposed to be a simple vacation. That wouldn't have happened if you had anybody even half as competent as that cop on your side….\n *page_break\n *goto rescue\n\n*elseif (((combat \u003c ingenuity) and (combat \u003c terror)) and (combat >= 58))\n Before you can do what you were thinking, you see a large vehicle up ahead that's way too large to be a regular car. You rub your eyes in disbelief at the sight of a military tank sitting in the middle of the road, with none other than the sheriff standing on top of it. She hops inside to start controlling the war machine, its barrel aimed straight at you.\n\n Not one to be outdone when it comes to destructive vehicles, you activate your dual front autocannons and fire away just as one of her shots hits your own vehicle. Boasting superior armor, your car spins out but is mostly undamaged. Still, the paint job is probably a total loss, which is irritating. The last time a goon sneezed near your vehicle, you made him wax it with his tongue.\n\n Your shots connect, and the tank bursts into flames. As you slowly drive past, the sheriff rises from the vehicle's wrecked hatch, wreathed in fire. The flames reflect ominously in her sunglasses as she stares at you, apparently oblivious to the burning wreckage around her. Tough lady. You could use help like that.\n *goto leavewest\n \n*elseif (((combat \u003c ingenuity) and (combat \u003c terror)) and (combat \u003c 58))\n Before you can do what you were thinking, you see a large vehicle up ahead that's way too large to be a regular car. You rub your eyes in disbelief at the sight of a military tank sitting in the middle of the road, with none other than the sheriff standing on top of it. She hops inside to start controlling the war machine, its barrel aimed straight at you.\n\n Unfortunately, you never really took the time to upgrade your vehicle's offensive capabilities, so your weapon-fire glances harmlessly off the tank's side. You flash back to your to-do list and the unchecked box next to \"Car guns suck, fix that.\"\n \n You're brought back to reality when a tank shell smashes into the side of your vehicle, sending you spinning off the road. Fire erupts in the transport's cabin, and you kick the dented door open and roll to freedom. You stumble, coughing, past the sign that reads \"County Line\" and press the emergency button on your suit's palm, summoning the—sigh—Rescue Team to your position. You hate the Rescue Team. Everyone on the Rescue Team is smug.\n \n The sheriff stands near the wreckage of your vehicle, apparently unwilling to pass jurisdictional lines into the next county. She stares at you, unsmiling, as the fires of your burning car reflect in her mirrored sunglasses. You almost died today because some podunk cop outgunned you. It might be time to invest in some backup.\n *goto rescue\n\n*elseif (((terror \u003c ingenuity) and (terror \u003c combat)) and (terror >= 58))\n Before you can do what you were thinking, you spot a human figure standing far off in the middle of the road. You keep approaching and eventually realize that it's none other than the sheriff, dark sunglasses and all. She has a rifle by her side. Better for you than a bazooka, but it'll still end the show if she gets you right between the eyes.\n\n Fearlessly, you drive as close to her as possible and step out of your vehicle, walking toward her without even a weapon in your hands. You can't see behind her dark sunglasses, but you know she's eyeing you up and down. Just like in your favorite Wild West movies, you stare at each other for a while. If only a tumbleweed rolled by, this moment would be perfect.\n\n The moment stretches, your steely eyes locked on their reflections. And finally, after what feels like hours, the woman backs down. She doesn't turn her back on you as she walks back to her car. For just a second, you see her hand shake as she grabs the vehicle's door. As good as it feels to finally turn the intimidation tables on this very, very scary cop, you know you're making it out of this nowhere town by the skin of your teeth after that ambush. You get back in your vehicle and wonder if you should have tried to recruit her. Hard to ambush someone who has that kind of backup looking after them.\n *goto leavewest\n  \n*elseif (((terror \u003c ingenuity) and (terror \u003c combat)) and (terror \u003c 58))\n Before you can do what you were thinking, you spot a human figure standing far off in the middle of the road. You keep approaching and eventually realize that it's none other than the sheriff, dark sunglasses and all. She has a rifle by her side. Better for you than a bazooka, but it'll still end the show if she gets you right between the eyes.\n\n You drive as close to her as possible and step out of your vehicle, walking toward her while hiding an electroshock pistol you'd kept in your car. You can't see behind her dark sunglasses, but you know she's sizing you up. Just like in your favorite Wild West movies, you stare at each other for a while. If only a tumbleweed rolled by, this moment would be perfect.\n\n However, the thought of her blasting your head off with that rifle starts to sink in, prompting you to quickly draw and fire your weapon. Boasting swifter hands, she manages to let off a shot before your electric projectile takes her down. Touching your pained shoulder, your fingers come away bloody, and you realize that the woman's elephant gun of a rifle managed to punch through your Kevlar-laced Spandex. You'll live, but you can't drive. You press the emergency button on your suit's palm, summoning the—sigh—Rescue Team to your position. You hate the Rescue Team. Everyone on the Rescue Team is smug.\n\n You glance back at the sheriff's unconscious body and briefly consider taking her with you for brainwashing and conversion before ultimately dismissing the idea. Still, if you had someone that scary watching your back, you wouldn't be bleeding all over some of America's ugliest farmland, waiting for Brad and the other jerks on the Rescue Team to pick you up.\n *goto rescue\n \n*else\n  *goto leavewest\n\n*label leavewest\n*page_break\nYou set your vehicle on cruise control and lay back for a while, running through all the events that unfolded since your arrival. Although your villainous plan was more or less a success, you can't help but think of how much better things would have gone if the sheriff hadn't stepped in—or rather, if you had someone as capable as she was watching your back during your plans.\n\nThis idea having crossed your mind a few times today, you convince yourself that it's time to recruit an assistant to help you become the greatest villain the world has ever seen.\n*set notoriety +5\n*finish\n\n*label rescue\n\nYou sit in the corner of the evac chopper as the folks on the Rescue Team throw a football back and forth, occasionally jostling you while giving a half-yelled apology. Technically they work for you, but there's something about the Rescue Team that always makes you feel kind of humiliated. Maybe because you only ever spend time with them when you've had your teeth kicked in. \n\nThis sort of thing could be avoided if you had a decent sidekick watching your back. It's time to change that—as Todd misses a pass and clunks you on the temple with the damned football.\n*set notoriety +2\n*finish\n\n*label sheriff_breakfast\nYou start the next day with a light breakfast at one of the local diners. Cracked laminate shifts under your elbows as you sip your coffee. Not long into your meal, you notice a familiar figure walk through the door. The sheriff. Her smile once again grows impossibly big as she spots you in your seat. She comes by and sits in the booth right across from yours. \"Mornin'! How was your stay at the inn? Quite the cozy little place, right?\"\n\n*fake_choice\n #\"Sure, if by 'cozy' you mean the kind of mystery where a dead body is found at the inn.\"\n #\"Can't complain. It was nice and cheap.\"\n #\"It was quite terrible, actually.\"\n\n\"I'm sure it was great!\" she responds, as if she didn't even care to listen to your answer. You briefly struggle to hold in a \"Fool, I'll destroy you all,\" your customary response to being ignored. \n\n\"Now you'll be all rested up for your trip home, unless you plan on checking out \n*if (loc = 1) or (loc = 2)\n  the ${foil_ball_cap}. \n*if loc = 3\n  one of our famous banks. \nCan't leave ${gulch_canyon} without doing that first, right?\" she asks with a penetrating glance. Does she do this to every stranger that drives through this awful tourist town or what? Maybe she gets more troublemakers coming through here than one would expect. Either way, it's impossible that she knows you're about to \n*if loc = 1\n  put this place on the map for a better reason than their stupid aluminum ball. \n*if loc = 2\n  put this place on the map for a better reason than their stupid maze. \n*if loc = 3\n  embarrass their least-robbable banks. \nMaybe she'll go away if you answer her with…\n*fake_choice\n #\"Nope, I'm heading off once I'm done here.\"\n #\"I may check it out first. Still not sure.\"\n #\"Seriously, you have a name, right?\"\n\nYou get a little anxious again as she simply stares at you from behind her darker-than-a-cosmic-void sunglasses, completely oblivious to your response. \"Well, I may or may not be at the \n*if loc = 1\n  ball of foil \n*if loc = 2\n  corn maze \n*if loc = 3\n  unrobbable banks \ntoday. Depends where my duty takes me. But if I see you there,\" she says as her smile briefly disappears, \"I'll be sure to say hello.\" With her ridiculous smile returned, she gets up and walks out of the diner.\n\nYou admit that the sheriff creeped you out again, and yet you can't help but get excited that you may actually run into a challenge while exacting your plan. After all, it's no fun if it's too easy, right? For a second you wish you had brought along one of your goons to follow her around, just to have an idea of what she's up to. Of course, you quickly remember that your goons are good at following specific orders but are probably too moronic to stalk someone incognito without getting caught. Just last week you caught several of them arguing in the locker room over who you liked the most, when you've made it pretty clear you don't care about any of them. A few even had pictures of you pasted inside their lockers. Idiots.\n*return\n\n*label arrive_foil\nYou go to the tourist trap, and there's already a line of numbskull tourists paying for the privilege of standing close to a big ball of metal. When the guide isn't looking, a few reach past big red signs that say \"PLEASE DO NOT TOUCH THE FOIL BALL\" to touch it. A man in sandals and souvenir shirt, with an expression indicating a dachshund-level intelligence lurking behind his eyes, approaches you to ask how excited you are to finally see the \"world-famous ball of aluminum foil.\"\n*goto poo\n\n*label arrive_corn\nYou head out to the maze and see that there's already a line of numbskulls actually paying for the privilege of getting lost in a bunch of tall plants. A man in sandals and souvenir shirt—who you're sure could be outsmarted by your mom's miniature poodle, Mr. Fluffington—approaches you to ask how excited you are to finally see the \"world-famous\" corn maze.\n*goto poo\n\n*label arrive_banks\nYou go to the town's biggest bank, and there's already a line of fools actually thinking their money is going to stay safe today. A man in sandals and souvenir shirt, holding a big burlap sack with \"Munney\" scrawled across
