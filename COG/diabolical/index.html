 kill. The older villains speculate about whether there were any ulterior motives for the prank. A few even wonder if Mackenzie was ever really released, or whether the senator that you saw being freed was some sort of clone or sleeper agent.\n \n You get into a long, involved discussion with an old cat burglar called \"The Capybara\" about the ins and outs of your museum robbery. He has some good things to say about your technique, and you manage to pick up a few pointers about finding easier ways past museum security systems.\n \n On other Darkspace boards, the reaction to V.A.N.G.U.A.R.D. planting itself on American soil is clearly provoking some anxiety from the community, mostly shown as a lot of idiotic boasting about how the government lackeys will be driven back across the sea like the dogs that they are. One villain, a guy you've never heard of called \"Oblivio,\" keeps breaking into discussion threads and insisting that the move is some sort of Minotaur plot to keep the attention off of their European activities. It's not a wholly unconvincing argument, but you're not sure the international criminal syndicate has the clout to pull off this kind of political maneuvering.\n \n Logging off, you see you have a message in your regular, non-Darkspace email. There's no address listed, but when you open it, there's a short note.\n\n *if museumkill =0\n  [i]I honestly wasn't expecting you to take my advice. Thanks.[/i]\n \n  [i]${sname}.[/i]\n \n  You log off the computer and head to bed. It's been a long day.\n  *set Steele +5\n  *set notoriety +5\n  *finish\n\n *else\n  [i]If I had known what kind of bloodthirsty monster you were, I wouldn't have helped you. Next time you're in my crosshairs, I'm pulling the trigger.[/i]\n  \n  [i]Steelheart.[/i]\n  \n  You log off the computer and head to bed. It's been a long day.\n  *set Steele -10\n  *set notoriety +5\n  *finish\n   \n*label darknauttwo\nYou close the message from Nautilus and browse through Darkspace. There's an almost superstitious fear on here of what Nautilus might do to people who interfere with its plans, and discussion is torn between whether you've done something amazingly brave, or suicidally stupid, by getting involved with Nautilus.\n\nOf course, your bravado isn't the only thing being discussed tonight. The reaction to V.A.N.G.U.A.R.D. planting itself on American soil is clearly provoking some anxiety from the community, mostly shown as a lot of idiotic boasting about how the government lackeys will be driven back across the sea like the dogs that they are.\n\nOne villain, a guy you've never heard of called \"Oblivio,\" keeps breaking into discussion threads and insisting that the move is some sort of Minotaur plot to keep the attention off of their European activities. It's not a wholly unconvincing argument, but you're not sure the international criminal syndicate has the clout to pull off this kind of political maneuvering.\n\nIt's been a long day. You shut off the computer and head to bed.\n*set notoriety +15\n*finish\n\n\n*label GetBent\n\"The rally was transformed into a bizarre piece of performance art by the enigmatic criminal known only as Nautilus.\"\n \n\"Apparently he thought visiting Senator Mackenzie would enjoy a hot-air-balloon tour of the city!\"\n \n\"That's a facile analysis, Mindy, and you should be ashamed.\"\n \n\"Get bent, Biff!\"\n*return\n\n*label ShutTV\n\"In fact, it appears that the criminal's bizarre stunt seems to have inadvertently saved Mackenzie's life. Several bombs were detonated only a few minutes after the senator's kidnapping on her proposed touring route, destroying several vehicles and claiming several lives. Although no one has claimed responsibility for the bombing, authorities have indicated to us that the materials used in the explosives marked this as a possible attack by Doctor Arachnus.\"\n\n\"A dark day for Merit City, Mindy. It makes you want to just huddle under the covers with a loved one.\"\n \n\"No one loves you, Biff. No one ever will. And now, Chip Dipson, with sports.\"\n \nYou shut the TV off.\n*return\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2024-08-01 $4.99 $2.99 purchased\n*abort\n\n", "chaptertwelve": "*temp yourending \"none\"\n*temp delay false\n*image chap12.png\n\n\"Well, Mindy, it looks like the only person with a heart colder than yours has returned to terrorize the entire planet.\"\n\n\"His bald head reminds me of you, actually. That's right folks, Biff wears a toupee. He went bald years ago.\"\n\n\"Marrying a psycho woman will do that to you, Mindy. But back to Doctor Arachnus. Today the maniacal mechanical madman announced his return to the public scene in a big way, releasing the following video to every news station on the planet. Let's watch.\"\n\nThe video flickers, and Doctor Arachnus's twisted visage stares into the camera. The hawk-like nose and lifeless eyes send a shiver down your spine, even more than does the spider-like machine to which his torso is attached. He looks exactly the way he did when you first laid eyes on him, on the day he invaded your mind, the day you robbed the Merit City bank.\n\n\"Greetings, insects. You know me as Doctor Arachnus, the murderer. Doctor Arachnus, the great. But that name is a lie, a joke of my own devising. The spider, to hunt the insects of the Earth, for my sport. But the day for games is over. It ended the day I drank the blood of your American President Johnson, gaining the clairvoyant powers granted to him by your secret constitution. And I saw then that a threat hid on your planet. Can you imagine, insects? A threat to me? And yet there was no escaping the terrible visions. And so I find myself forced to reveal myself to you, at last. Not Arachnus the mad doctor, but my true identity. Tremble, Earthlings, as I reveal the culmination of my plans for your pitiful planet. Tremble before the might of Ara-kunos the Eighth, Emperor of the Terrible Spacefaring People of Yod, and this, the vanguard of my battle fleet. Tremble before the ending of your world.\"\n\nWatching the news from your base, you shrug. An alien. You had not guessed \"alien.\"\n\n\"Soon my people will begin terraforming Earth, so that it can serve as our new home planet for as long as it suits us. Those of you who survive the process will have the glory of serving Yod as slaves. If you seek to change your fate, I await you on my ship, where my people will glory in watching their emperor reduce you to nothingness. Especially the one known as ${name}.\"\n\nThe video cuts just as Doctor Arachnus gives the high, terrifying laugh you've heard before.\n\n\"Scary stuff, Mindy. Very scary stuff.\"\n\n\"You said it, Biff. It appears four superheroes have already attempted to defeat Doctor Arachnus, and all of them have come plummeting back to Earth in metallic coffins. There's no word on what reaction ${name} has had to Doctor Arachnus's taunt, or why the mad space emperor would target this supervillain specifically.\"\n\n\"Mindy, it's times like this I wish things had gone different between us.\"\n\n\"What do you mean, Biff?\"\n\n\"Well, you know. What I mean to say is—\"\n\n\"Just shut up and kiss me, you fool!\"\n\nYou shut the TV off in your bed chambers, just as Biff and Mindy start kissing and groping each other excessively. Well, there's only one thing left to do….\n*fake_choice\n #Beg Doctor Arachnus to let me be his sidekick.\n #Take my space base to some other planet.\n #Call my mom to say goodbye.\n \nWait, that's just the uncontrollable fear talking! You've come too far up the totem pole of villainy to let Doctor Arachnus, Ara-kunos, King Yod, or whatever he's calling himself call you out without repercussion. If there's anyone who's going to make that idiotic news team kiss and make up out of pure fear, it's you!\n\nYou head to your control center, observing Earth as Doctor Arachnus's weather control devices wreak havoc on the surface. Countless tornadoes ravage every continent as the melted ice caps cause vast amounts of dry land to flood. You stare down at an Earth in torment, and you're not sure if you're feeling empathy or jealousy at the destruction being wrought. \n\nIn any case, it's time to show Doctor Arachnus what a homegrown villain can do when the chips are down. Of course, you'd rather not do it alone.\n*page_break\n\"${sidekick}, report to the combat room at once.\"\n\n${sidekick} has been moving up and down from your terrestrial base and the satellite, keeping your normal operations in check. Now ${sidehe}'ll be assisting you in what could be your last mission together. If there's anyone you want to have watching your back as you take on Doctor Arachnus, it's ${sidehim}.\n\nSteelheart is already waiting for you in the combat room. Regardless of what's gone on between you, ${she} knows full well that the Earth's best chance of stopping Doctor Arachnus lies here. V.A.N.G.U.A.R.D. is suddenly overwhelmed with bureaucratic infighting as its constituent nations drive themselves into a panic. What few resources aren't being consumed are taken up fighting the chaos the terraforming process has caused.\n\n*if countdead = false\n Next to ${shim} is The ${cname}, who well knows that you're the only supervillain with the cunning and resources to match Doctor Arachnus. \n *if countess \u003c 8\n  It isn't an easy alliance, but you'll both do whatever it takes to bring Doctor Arachnus down.\n *goto TheLaunch\n\n*else\n *goto TheLaunch\n \n*label TheLaunch\n\n\"Here's the plan,\" you begin. \"We're taking one of my satellite's escape pods straight to Doctor Arachnus's spaceship. Normally, those creepy insect drones swarming around it would rip us to shreds, but the satellite's laser will draw their attention. I'll set it to shoot just before we land on his ship, distracting them long enough to let us sneak in. At which point he'll probably send the drones to tear this place to shreds.\"\n\n\"So you'll be sacrificing your base for the slim chance that he doesn't see us coming. Tough call,\" Steelheart affirms. \"What do we do once we're on the ship? It's huge.\"\n\nYou shrug. \"Arachnus has to be using teleportation tech to get around in there. We'll find his nexus, deal with the traps, and take him down.\" The others nod.\n\n*if Fauxton = 10\n \"You'll need my firepower to stop Arachnus,\" announces a strangely familiar voice. You turn around to see Fauxton enter the room. You remember him, right? Sun-powered superhero. Flies, has super strength, can apparently breathe in space.\n \n \"I never forgot what you did. At first it drove me mad that you spared me, but now I see that it was fate. Together we will stop the greatest menace this planet has ever known!\"\n \n He extends his hand, which you shake while hoping he doesn't blast yours with his fire powers. He may be a filthy superhero but, as he said, you'll need all the help you can get at this point.\n *goto TimeToLeave\n \n*else\n *goto TimeToLeave\n\n*label TimeToLeave\n*page_break\nYou load your team into the base's escape vehicle. It's one of your favorite things in the world: artistic, graceful, beautiful. You're always a little bit in awe when you watch it move. You named it The Shanna.\n\nAs planned, your satellite laser fires at Doctor Arachnus's massive ship, but barely seems to damage it. Poor little thing, barely a few days old and already outclassed.\n\nAlerted to the base's presence, Doctor Arachnus's drones veer away from the ship's perimeter. As you watch, they tear the base apart in a matter of minutes. A tear rolls down your cheek as your precious space base becomes nothing more than space trash. It's the first time you've cried since the end of [i]Toy Tale 3[/i].\n\n\"Look,\" ${sidekick} says while pointing out a nearby window. You peek out to watch another space shuttle prepare to land on the other side of Doctor Arachnus's massive ship. Is it Minotaur? V.A.N.G.U.A.R.D.? The president of who-gives-a-crap?\n\nWhoever it is, they'd better not get in your way. You've brought your greatest gadgets and weapons along, with the sole intention of using them on this person, or cyborg, or Yoddite, or whatever he is…\n\n…and that's Doctor Arachnus.\n*page_break\nSlipping through one of the spaceship's airlocks, you and your team leave the pod behind and move through the miles of corridors that make up the ship. Every now and then, you spot what you assume must be Yoddites: short, pale creatures who utterly ignore you, apparently controlled by the metal harnesses implanted in their backs. You're not entirely surprised that Doctor Arachnus is a tyrant to his own people as well. Turning a corner, you reach a round room. Before you can cross it, all of the doors slide shut, and Doctor Arachnus's trademark mecha-spiders start emerging from nearby holes. They're fast, deadly, and programmed to tear off human flesh. The worst part is, they like to start with the face.\n\nFortunately, your team does an awesome job of eliminating every mecha-spider that comes their way, and eventually the mechs stop emerging. The massive door ahead of you opens, only to reveal a giant mecha-spider the size of a large bus. Without warning, it shoots a web net that catches everyone but you, electrocuting them whenever they try to struggle free.\n\nSince you like having your face attached to your head, you have no choice but to use something you intended to use against Doctor Arachnus….\n\n*choice\n #Inject a serum that temporarily gives me super strength.\n  *if combat > 75\n   Opting to fight the steel arachnid mano-a-mano, you inject a strength-enhancing super-steroid that gives you muscles of steel and bulletproof skin. Hopefully, also giant metal spider claw–proof skin.\n  \n   You dash up and grab one of the mecha-spider's legs, making sure to dodge the others it uses to try to slice you in half. After violently tossing and thrashing the giant arachnid against the floor, you finally use all of your might to swing it against the wall. It bursts into sparks and flames upon impact before falling apart, just as your enhanced strength wears off.\n   *set combat %+10\n   *goto FauxtonSacrifice\n   \n  *else\n   Opting to fight the steel arachnid mano-a-mano, you inject a strength-enhancing super-steroid that gives you muscles of steel and bulletproof skin. Hopefully, also giant metal spider claw–proof skin.\n  \n   You dash up and grab one of the mecha-spider's legs, ignoring the pain from some of the other legs that manage to graze your skin and leave what will be scars. After violently tossing and thrashing the giant arachnid against the floor, you finally use all of your might to swing it against the wall. It bursts into sparks and flames upon impact before falling apart, just as your enhanced strength wears off.\n   *set combat %+5\n   *goto FauxtonSacrifice\n  \n #Unleash my own machine for an epic robot-versus-robot battle.\n  *if ingenuity > 70\n   You drop a nanobot-filled gadget that forms a mechanical wasp seemingly out of thin air. Oh science, where would you be without it? The steel spider tries to put up a fight, but your wasp subdues it, slices its metallic abdomen open, and drops several bombs inside. The wasp stays latched on to keep the explosives from falling out.\n  \n   You drop to the floor as both machines explode, blasting shrapnel throughout the room. Both machines now lie scattered on the floor in several pieces. You give a brief lecture to your team about the predatory nature of the deadly spider wasp as you prepare to cut them free.\n   *set ingenuity %+10\n   *goto FauxtonSacrifice\n   \n  *else\n   You drop a nanobot-filled gadget that forms a mechanical wasp seemingly out of thin air. Oh science, where would you be without it? The steel spider tries to put up a fight, but your wasp subdues it, slices its metallic abdomen open, and drops several bombs inside. The wasp stays latched on to keep the explosives from falling out.\n  \n   You drop to the floor as both machines explode, blasting shrapnel throughout the room. Both machines now lie scattered on the floor in several pieces. Ignoring the pain from one or two pieces of shrapnel stuck in your body, you give a brief lecture to your team about the predatory nature of the deadly spider wasp as you prepare to cut them free.\n   *set ingenuity %+5\n   *goto FauxtonSacrifice\n  \n #Activate my \"Exterminator Mode\" to scare the metal arachnid.\n  *if (theatricality >70) and (terror > 70)\n   Your suit quickly takes the form of an exterminator's suit, but cooler. On your back is a giant container that looks just like a can of bug spray, which connects to a spray gun you hold in your hands.\n  \n   Of course, a mechanical spider doesn't share the same fear of exterminators that a regular spider would. That's why you start spraying your special liquid onto the steel foe. It tries to retaliate, but the liquid corrodes its joints and surface almost immediately, causing it to fall apart before it can even strike you down. God, you do love chemistry. And stuff melting. And costumes.\n   *set theatricality %+5\n   *set terror %+10\n   *goto FauxtonSacrifice\n   \n  *else\n   Your suit quickly takes the form of an exterminator's suit, but cooler. On your back is a giant container that looks just like a can of bug spray, which connects to a spray gun you hold in your hands.\n  \n   Of course, a mechanical spider doesn't share the same fear of exterminators that a regular spider would. That's why you start spraying your special liquid onto the steel foe. It tries to retaliate, but the liquid corrodes its joints and surface almost immediately, causing it to fall apart before it can even strike you down. God, you do love chemistry. And stuff melting. And costumes.\n   \n   What you don't love is part of the claw that landed far enough to hit your foot, which hurts like all hell. It's not enough to keep you down, but next time you'll definitely go for a stronger corrosive.\n   *set theatricality %+5\n   *set terror %+5\n   *goto FauxtonSacrifice\n  \n *selectable_if(planning>0) #Go all out and use everything I've prepared together! (Costs 1 Planning Point.)\n  You drop a nanobot-filled gadget that forms a mechanical wasp seemingly out of thin air—science, where would you be without it? While your wasp keeps the metal spider busy, you inject the super serum into yourself and jump in to help your wasp pound the steel spider.\n  \n  Severely damaged, the mecha-spider tries crawling away,probably to somewhere it can get quick repairs. That's not happening. You activate your Exterminator Mode and blast it with a metal-corroding liquid from your spray gun. Soon enough, the mechanical spider is rendered useless, unable to even pick itself up.\n  \n  Now, that's how you take down a super spider robot!\n  *set theatricality %+5\n  *set terror %+10\n  *set ingenuity %+10\n  *set combat %+10\n  *set planning -1\n*label FauxtonSacrifice\n\nAfter freeing your team from the electric net, you continue through the ship, eventually reaching a fork in the path. Suddenly you hear skittering behind you, and turn to see thousands upon thousands of spider robots streaming down the hall behind you, like ants fighting to defend the hive.\n\nYou open up a device that quickly scans the entire ship, giving you a holographic layout of every room and corridor. If you're right, and Doctor Arachnus is hiding near the ship's teleportation nexus, you'll need to pass through the ship's reactor to reach him. The spider horde moves closer.\n*page_break\n*if Fauxton = 10\n Your team runs, but the spiders don't have to worry about tripping, or fatigue, or anything except killing you and dragging your corpse before their master. And they're gaining.\n \n Suddenly, Fauxton stops in the middle of the hallway. His hands begin to glow. \"You go on. I'll buy you some time.\" There's not a trace of fear in his voice. Your eyes meet.\n \n \"Thanks\" is all you can think to say. Moments like these are when people in movies and comic books say something really cool, but that's all you've got. You turn and run as the temperature in the hallway starts to build and build. Stupid do-gooders. You try to hold on to that thought as you run from where your teammate is sacrificing himself to save you—and the world.\n *goto DrakeEncounter\n\n*else\n Your team runs, but the spiders don't have to worry about tripping, or fatigue, or anything except killing you and dragging your corpse before their master. And they're gaining.\n \n You've got no choice; you're bogged down with too much equipment. You tear some off and throw it behind you, buying yourself just enough time to escape.\n *set combat %-5\n *goto DrakeEncounter\n\n*label DrakeEncounter\n\nReaching the ship's main power reactor, you're met with a thoroughly improbable sight: The Drake is here, with several very angry-looking bound and gagged men and women taken hostage. You're not sure why this psychotic's personal business keeps intruding on your life, but you guess you're resigned to it by this point. Seeing you enter, ${che} turns to you, flamethrower leveled at your chest. Again. You hate that stupid flamethrower. Looking past it, you realize that the vigilante's hostages are the twelve cloned members of Minotaur's high council.\n\n\"Should have known you'd be here, ${name},\" The Drake shouts at you. \"You always seem to show up at the worst moments.\" You roll your eyes.\n\n\"What are you doing here, Drake? Why are they here?\"\n\n\"What do you think? As soon as Doctor Arachnus broadcast his message, these bastards loaded themselves onto a private rocket and shot themselves into space to 'discuss terms.' They wanted to serve the Earth up to Doctor Arachnus on a silver platter, with themselves as the surviving slaves.\" You stare at the council members, who look back at you with calm defiance. \"I knew I'd never get another shot at taking them all out at once, so I stowed away. And here we are. With you in my way, again.\"\n\nYou really do not have time for crazy-person clone-baby drama. \"My fight is against Arachnus, not Minotaur.\"\n\n\"Minotaur, Arachnus, ${name}…what's the difference? You're all a menace to this world. You all steal and destroy just to satisfy yourselves. I'd rather die trying to take down Arachnus myself than work with any of you.\"\n\nThe Drake has always been motivated by hatred, but the sound of frustration in ${chis} voice is something new. You suspect the revelation that ${che}'s the child of Minotaur's founder has been eating away at ${chim}. \n\nYou really don't have time for this crap.\n\n*choice\n #Attack The Drake while ${che}'s distracted.\n  You make your move, pulling out your laser blaster and firing toward The Drake. Unable to react in time, ${che} uses ${chis} flamethrower to block the shots, and the fuel tank on ${chis} back begins to hiss menacingly. The Drake hits a button on ${chis} wrist and the tank fires away from ${chim}, spiraling toward the reactor. The explosion tears a pipe loose, and alarms begin to blare.\n  \n  \"You idiot! I should have killed you long ago!\" The Drake shouts furiously as ${che} pulls out some of the incendiary grenades ${che} used back at the villa. \n  \n  *if combat > 65\n   Without much choice, you shoot the grenade in ${chis} hand and watch ${chim} burst into flames. The Drake yells in agonizing pain before falling to the floor, ${chis} body burning away like so many of ${chis} victims over the years.\n   *set drakedead true\n   *set combat %+5\n   *goto TheCore\n   \n  *else\n   Distracted by the damaged core, you fail to notice The Drake toss one of the flaming grenades among the kneeling Minotaur council members before running off through a nearby door. The grenade sets all the members in flames, quickly burning them to death. Your team attempts to chase after The Drake, but ${chis} bombs leave the corridor a burning mess that can't be passed through.\n   *goto TheCore\n   \n #Help The Drake eliminate the Minotaur council.\n  \"The world would be better without Minotaur, no arguments here,\" you reply, grabbing your gun and shooting the nearest clone in the head. The Drake starts to set the rest on fire with ${chis} flamethrower. Before ${she} can kill them all, though, one of them bursts free from her restraints. She pulls an explosive from somewhere and hurls it at the reactor core. Sickly green light flows from the core as the explosion blasts a crack in its surface. Alarms begin to blare, mixing with the laugh of the Minotaur council members as The Drake sets them aflame.\n  \n  *if activist > 50\n   \"I fight crime mostly out of boredom. You knew that, right?\" The Drake tells you once all the Minotaur members are dead.\n   \n   \"But you, ${name}. You actually want to make a difference. That's why you wanted Minotaur out of the way, right? Like you said, the world is better without them. I guess I can respect that. Trying to change the world, I mean.\"\n   \n   ${checap} walks your way and pats you on the shoulder the way football players or longtime friends would. It's weird, but better than getting an incendiary grenade shoved into your mouth.\n   \n   \"I'll stay out of your way on this one while you go deal with Arachnus. I've got more Minotaur agents to hunt down.\"\n   \n   The Drake gives you a wink before leaving the room. Instead of following, you'd better figure out what to do about the damaged reactor core.\n   *set activist %+5\n   *goto TheCore\n   \n  *else\n   \"I fight crime mostly out of boredom. You knew that, right?\" The Drake tells you once all the Minotaur members are dead.\n   \n   \"But you, ${name}. You're just always looking to fill your pockets. That's why you wanted Minotaur out of the way, right? The world is better without them because they'd be out of your way. Pretty lame.\n   \n   \"I'll stay out of your way on this one while you go deal with Arachnus. I've got more Minotaur agents to hunt down. But—and I know I say this every time we meet, but this time I mean it—the next time I see you, you're dead.\"\n   \n   The Drake gives you a wink before leaving the room. Instead of following, you'd better figure out what to do about the damaged reactor core.\n   *goto TheCore\n   \n #Try to convince The Drake to take over Minotaur.\n  \"Drake, look in their eyes. They're afraid of you. Not because they think you'll burn them. But because they know that Minotaur is yours by rights. It doesn't have to be about the petty whims of these little tyrants. It could be a force for good. Or vengeance. Or whatever you want it to be, when you are The Minotaur. When you claim your birthright.\"\n  \n  *if drake > 10\n   For whatever reason, The Drake listens to what you have to say. Perhaps your actions over the few times you've crossed paths have made ${chim} realize you're not just another insane villain.\n  \n   \"I could burn them all. Not just the criminals in the costumes. Everyone who does wrong, anywhere.\" Sometimes you forget for a second that The Drake is full-on crazy. Oh well. At least ${che} seems to like you.\n   \n   \"Well,\" The Drake says to the kneeling council members, \"what do you all think? And don't let my flamethrower influence your decision.\" ${checap} pulls off one's gag.\n   \n   \"Of course!\" he shouts. \"As the child of the great Minotaur, the Council of Twelve forfeit all our power to you.\"\n   \n   \"Good,\" The Drake announces before pointing ${chis} flamethrower at the council and setting them all alight. Because. The Drake. Is. Crazy. Before you can do anything to stop ${chim}, ${che} distracts you by tossing an incendiary grenade at the main reactor core. The vigilante makes ${chis} escape as alarms begin blaring, informing you that the reactor is leaking radiation.\n   *goto TheCore\n  *else\n   For whatever reason, The Drake doesn't listen to what you have to say. Perhaps your actions over the few times you've crossed paths have made ${chim} think of you as just another insane, selfish villain.\n  \n   \"No deal,\" The Drake says before pointing ${chis} flamethrower at the council and setting them all alight. Before you can do anything to stop ${chim}, ${che} distracts you by tossing an incendiary grenade at the main reactor core. The vigilante makes ${chis} escape as alarms begin blaring, informing you that the reactor is leaking radiation.\n   *set activist %-5\n   *goto TheCore\n\n*label TheCore\n\nGreen light is oozing from the damaged alien reactor. You're not sure exactly what sorts of rays it's shooting out, but you're pretty sure they're lethally bad for you and your team.\n\n\"Doesn't look good,\" Steelheart says. \"We need to get out of here, fast.\"\n\n\"It won't work,\" you say. \"This leak is quickly filling the entire ship with radiation. We'll be dead before we can reach Arachnus.\" You look up, hoping the proverbial lightbulb will appear so you'll know what to do. Of course, that doesn't happen.\n\n*if Slog = true\n Racking your brain for something that might get you out of this situation, you look around at your allies. To your surprise, Slog's expression hardens. It's strange: even though he's carried out your assignments, no matter how villainous, without complaint, you never really thought of him as having an inner darkness. But that inner darkness is present and very much at the surface now.\n\n \"Slog?\" you ask. \"What's wrong?\"\n\n \"We should die here,\" he says.\n\n If only this was just a sudden burst of defeatism, but you can tell it isn't. \"What are you talking about?\"\n\n \"We do bad things. We shouldn't live.\"\n\n You swallow. Slog always seemed a little uncomfortable with killing, but you didn't know it went this far.\n *choice\n  #Persuade him to stay on my side.\n   *if lethality \u003c 10\n    \"Slog, listen to me.\" You raise your hands, free of weapons, to demonstrate your goodwill. \"I never kill more than I have to. I know I've made you do things you don't like, but that can change. Things will be different from now on. I promise.\"\n\n    He stares at you and blinks slowly for a long moment, then nods. A smile spreads across his face. \"Thank you.\"\n    *goto CoreEscape\n   *elseif activist > 75\n    \"Slog, listen to me.\" You hold up your hands to demonstrate your goodwill. \"Maybe we do bad things, but we do good things, too! Just think about how you've helped change the world since you started working for me. We can help people. [i]You[/i] can help people, if you stick with me.\"\n\n    He stares at you and blinks slowly for a long moment, then nods. A smile spreads across his face. \"I can. You're right.\"\n    *goto CoreEscape\n   *elseif terror > 65\n    You take a step forward and fix him with your most threatening stare, despite his size and physical strength. \"Really, Slog? You would turn on me? You think you can stop me?\" The evil laugh you let out even scares you a little, and you privately congratulate yourself on devoting so much time to practicing it. \"Go on. Try it.\" Even as he shifts, you smirk. \"Betraying me will be the worst decision of your life.\"\n\n    Fear grows in Slog's eyes. After a moment, he lowers his head and backs away, trembling.\n    *goto CoreEscape\n   *else\n    Somehow, you always thought manipulating Slog would be easy. Perhaps you underestimated him. None of your arguments, pleas, or threats change the cold determination in his face.\n\n    You swallow hard. \"Slog, think this through! We're the world's only chance to stop Arachnus. No matter what you think of me, you must realize he's worse. We can work together at least until he's defeated, right?\"\n\n    He shakes his head. \"Others will fight him.\"\n\n    \"What others?\" you demand, even though the hard glint in his eyes tells you that Slog views you as little better than Doctor Arachnus. Despite your efforts to convince him that you're the only one who will stand up to Arachnus, his gaze never wavers.\n\n    By the time you realize this isn't going to work, you've run out of time to stop the radiation.\n    *goto SlogBetrayal\n  #Convince him to follow his own path in life.\n   \"You've never enjoyed killing, Slog, even on my orders. Will you really be happy if you cause our deaths here?\"\n\n   *if theatricality > 65\n    Uncertainty dances in his eyes for a second. Before he can recover, you launch into an impassioned speech. There's no reason he should help you, but he doesn't have to kill you, and he certainly shouldn't die with you. He has his whole life ahead of him. His luck has finally changed for the better, and a glorious future awaits.\n\n    Your description of the glory Slog could achieve if he sets his mind to it is so vivid, you almost feel jealous. Almost.\n\n    Slog watches you, and his grim expression changes to one of hope. He turns and runs back the way you came, and while you don't know how he intends to leave the ship, you wish him luck.\n    *set Slog false\n    *goto CoreEscape\n   *else\n    Uncertainty dances in his eyes for a second, and you attempt to explain to him how great his future could be if he leaves you alone and makes his own decisions. Your argument sounded pretty good in your head, but not so much out loud.\n\n    You swallow hard. \"Slog, if you stop me here, who will stop Arachnus? Will you just let him get away with his evil plan?\"\n\n    He shakes his head. \"Others will fight him.\"\n\n    \"What others?\" you demand, even though the hard glint in his eyes tells you that Slog views you as little better than Doctor Arachnus. That's why he won't leave you alive, even for his own sake. He doesn't believe that living in a world where you have power is worth it.\n\n    By the time you realize this isn't going to work, you've run out of time to stop the radiation.\n    *goto SlogBetrayal\n\n  #Kill him.\n   *if combat > 65\n    It doesn't matter how big Slog is, because you have the skills and equipment to take him down. You whip out your sidearm and fire a few quick bursts at his chest, followed by a good old-fashioned punch to the mouth as he staggers backward.\n\n    Slog recovers and charges. As alarming as it is to have that much angry minion racing toward you, you still have one trick he forgot about—allies. Steelheart attacks, and as Slog turns to face this new threat, you finish him off.\n\n    Such a waste. He was a good minion while his loyalty lasted.\n    *set Slog false\n    *goto CoreEscape\n   *else\n    You grab your sidearm and fire at Slog's chest, intending to punch him afterward. Unfortunately, you're too slow. He recovers from your attack and charges.\n\n    Hand-to-hand combat against Slog is not something you can handle. \n    *if countdead = false\n     Still, however tough Slog is, he can't face you, Steelheart, and The ${cname} all at the same time. Their attacks draw him away from you, and as he turns to face them, you finish him off.\n     *set Slog false\n     *goto CoreEscape\n    *else\n     You and Steelheart fight side-by-side, but Slog is just too strong. That's what you get for picking the biggest sidekick you could find, a distant part of you muses. He's implacable, like a force of nature, and nothing you do diminishes his assault.\n\n     Even Steelheart's help isn't enough to save you. The last thing you see before you fall into darkness is Slog's unreadable expression.\n     *goto SlogBetrayal\n*else\n  *goto CoreEscape2\n\n*label SlogBetrayal\n*page_break\nHow did it come to this?\n\nYou've heard stories, of course. Half the guides to supervillainy cover the tragic tales of countless villains who died at the hands of their own underlings. Sometimes, the sidekick wanted power. Other times, it was a calculated mutiny against a villain that went too far.\n\nAnd yes, sometimes the villain had in his or her organization a minion who was just too good for this line of work. Whether a reluctant ally from the start or just someone whose ideals gradually changed, they were often the most dangerous type of traitor, driven by justice rather than selfishness. Maybe if you'd paid more attention to Slog, you'd have seen this coming in time to stop it. In retrospect, you see your mistakes, but it's too late now.\n\nAs pain rises and your thoughts blur, you wonder what Slog will do next. Try to take on Doctor Arachnus alone? If he thinks you're too evil, surely he wants to stop Doctor Arachnus, too. The poor fool doesn't stand a chance….\n\nThen again, who knows? You won't be around to witness Doctor Arachnus's defeat, but this might be just what the world needs. People might take Slog as an example that anyone with enough nerve can stand up to a supervillain and win. They might band together and take down Doctor Arachnus themselves.\n\nIf they do, you hope they at least remember it all started with ${name}.\n*achieve badend\n*goto ending\n\n*label CoreEscape\n\nEven with that problem taken care of, you aren't in the clear yet. The core is still leaking radiation.\n*label CoreEscape2\n\n*if ingenuity > 60\n \"Fortunately, I've got just the thing for a problem like this,\" you say, opening a container with nanobots designed to repair virtually any form of mechanical damage. They get to work and seal the leak, allowing you to escape before the radiation can do any more damage.\n *goto ArachnusDoor\n \n*else\n *if Slog = true\n  \"I'll deal with it. You all leave,\" shouts Slog. Before you can say anything, he leaps over the railing and lands on the balcony. As you watch, he presses his massive body against the leak, absorbing the radiation. It's a death sentence. And looking down at his big, lumpy face, you can see that he knows it.\n  \n  You never looked for self-sacrifice from your minions. Loyalty, sure. Fear. But not this. Was it guilt over his attempted betrayal? Or something deeper? You wonder, just for a second, what kind of person Slog could have been in another world.\n  \n  \"Thank you.\" It's a whisper. You doubt he even hears it. But one of these days, there's going to be a statue in Merit City, and you're going to extract seven kinds of hell out of anyone that defaces it.\n  *set slogsacrifice true\n  *set Slog false\n  *goto ArachnusDoor\n \n *else\n  You manage to jury-rig something to slow the lethal flow. You can feel it sapping your strength, though, making your mind feel fuzzy. It's not the best footing to have for the hardest fight of your life.\n  *set ingenuity %-5\n  *goto ArachnusDoor\n\n*label ArachnusDoor\n*page_break\nThe ship becomes stranger the further you get—more alien, for lack of a better word. The hallways twist and warp, doorways shimmer, and whispers carry through the air. Lights dim and pathways multiply, until you feel more like you're in some twisted maze than a ship.\n\nSeveral times, you reach dead ends that force you to backtrack. At least you aren't alone. With help from the holographic map you made earlier, you manage to navigate your way to the deepest part of the ship, where a massive door awaits. Engraved spiderwebs cover every inch of the metal.\n\nThere's no sign of a doorknob, but a panel on the wall glows with green light.\n\n*choice\n #Put my hand on the panel.\n  Nothing else looks obvious, so this must be the way to open it. You press your hand against the panel. It's warm to the touch and sends a slight tingle through you. The green light flashes for what feels like an eternity. At last, the door slides open, but an alarm goes off at the same time. Great.\n  *set delay true\n  *goto DoorFight\n #Rewire the door's security system to force it open.\n  *if ingenuity > 70\n   It just takes you a few moments of studying the door and the panel beside it to decide which tools you need. You work quickly. The alien technology makes it tougher, but a few minutes with it helps you adapt. Within minutes, the door slides open.\n   *set ingenuity %+10\n   *goto DoorFight\n  *else\n   You don't really know what you're doing, which isn't a good thing when you're working with a security system powered by electricity and/or alien technology (you really aren't sure). Several jolts and missteps later, the door finally opens.\n   *set ingenuity %-5\n   *set delay true\n   *goto DoorFight\n #Ask Steelheart to open the door.\n  *if SteelRejected = true\n   Steelheart's glare burns with mixed incredulity and anger. With a sinking heart, you realize ${she} isn't over your rejection the night before. ${shecap} strides past you and studies the door, but with visible anger that suggests ${she} might not be taking as much care as ${she} could. Great, just what you need at a time like this.\n   *set delay true\n   *goto DoorFight\n  *else\n   Steelheart nods and walks past you to the door. \"Just leave it to me.\" ${shecap} gets to work at once, while you scan the area to make sure nothing sneaks up on you from behind. Steelheart is even more efficient than you expected, and the door slides open within minutes.\n   *goto DoorFight\n *if (countdead = false) #Ask The ${cname} to open the door.\n  *if CountRejected = true\n   The ${cname} fixes you with a cold stare. Lingering resentment and hurt pride from last night's rejection glow in ${chis} gaze. You may be working together, but ${che} clearly isn't pleased with your request for help. ${checap} stalks to the door without a word and sets to work, but ${chis} casual attitude suggests ${che} intends to take ${chis} time. Fantastic, nothing could make your assault on a supervillain's ship more thrilling than jealousy-induced endangerment.\n   *set delay true\n   *goto DoorFight\n  *else\n   \"I will handle it,\" The ${cname} says without hesitation. As ${che} studies the door, you keep your eye out to make sure Doctor Arachnus doesn't have any immediate surprises planned. The ${cname} is a true master, getting the door open in minutes.\n   *goto DoorFight\n *if (Slog = true) #Ask Slog to open the door.\n  Slog bounds forward with an eager smile, clearly pleased to have a job that puts his great technical skills to work. Oh. Wait. Before you can reconsider, your faithful sidekick begins to body slam the door. Not exactly what you had in mind, but it eventually gets the job done.\n  *set delay true\n  *goto DoorFight\n *if (Hackmaster = true) #Ask Hackmaster to open the door.\n  Hackmaster's mech glides past you silently. Who better to get past Doctor Arachnus's security than her? The door slides open almost immediately, and you make a mental note to name her Most Valuable Minion at the end of the year.\n  *goto DoorFight\n *if (Star = true) #Ask The Star to open the door.\n  The Star lets out a crazy laugh at your request and stares at the door like he's never seen one before. Just as you start to wonder if you should try something else, he attacks the door as though he has a personal grudge against it. A little unorthodox, but it gets the job done in the end.\n  *set delay true\n  *goto DoorFight\n\n*label DoorFight\n\nEven as the door opens, armored forms drop down from the ceiling all around you. You bite back a yelp of surprise—where were they hiding? A closer look reveals them to be pale aliens like the ones you saw earlier, mind-harnessed just the same. Their vacant expressions make you feel bad for them. Just for a moment. Once they start firing their weapons, you steel yourself against any misguided sentiment.\n\n*if delay = true\n There are too many of them! Too many to kill quickly, in quarters too narrow to effectively dodge their shots for long. As more and more Yoddite soldiers fill the corridor, you retreat through the open door, but enemies drop down from that side as well. Surrounded, you hesitate. It can't end like this.\n\n *if countdead = false\n  A pair of throwing knives slam into the chests of two Yoddites about to fire on you. The ${cname} steps in front of you, another set of knives already in ${chis} hands. \"If this is how it must end, so be it.\" When you don't move, ${che} casts an irritated glance in your direction. \"Run, you fool! Defeat Arachnus. Do not disappoint me.\"\n\n  \"You can count on me.\" \n  *if CountBed = true\n   You lean forward to give The ${cname} one final kiss. \"Please. Don't die.\"\n\n  \"You don't have time to waste,\" ${che} reminds you.\n\n  ${checap}'s right. It's a miracle you haven't been shot already. With a final glance back at the brave figure making ${chis} last stand, you turn and run through the door. After a moment, it closes.\n  *goto ArachnusEncounter\n \n *else\n  With no other option, you charge for the open door, taking out the enemies ahead of you \n  *if lethality \u003c 2\n   with your stun gun \n  even as you're attacked from all sides. Limping and wheezing, you finally break through. The door closes behind you.\n  *set combat %-10\n  *goto ArachnusEncounter\n*else\n Despite the surprise attack, you respond quickly and begin taking out the Yoddite soldiers \n *if lethality \u003c 2\n  with your stun gun \n after only a brief pause. They put up a good fight, but your team is stronger. You'll have enough time to get through the door before reinforcements arrive.\n\n *if countdead = false\n  As you head toward the door, The ${cname} sways and drops to one knee. ${checap} pants for breath and glances up at you with an ironic smile. \"Thought…I'd make it…to the final battle. Pity.\"\n\n  \"You're wounded?\" you ask. \"How bad is it?\"\n\n  \"Bad…enough.\" ${checap} waves a hand toward the door. \"Go on, finish this…for me. Prove I was…right.\"\n\n  \"You can count on me.\" \n  *if CountBed = true\n   You lean forward to give The ${cname} one final kiss. \"Please. Don't die.\"\n\n  \"Go,\" ${che} says. \"Don't…waste time.\"\n\n  ${checap}'s right. Reinforcements could be coming at any moment. With a final glance back at the brave figure preparing for ${chis} last stand, you turn and run through the door. After a moment, it closes.\n  *goto ArachnusEncounter\n\n *else\n  You continue on. After a moment, the door closes behind you.\n  *goto ArachnusEncounter\n  \n*label ArachnusEncounter\n*page_break\nYou finally reach the ship's heart, the teleportation matrix, where Doctor Arachnus awaits. Your eyes widen as you gaze upon the tall, menacing supervillain in person for the first time. \n\nHe's a monstrous mixture of flesh and steel. Dozens of tentacles and lethally sharp metal claws spread out from a wide, insectoid body. The appendages move constantly in a deadly ballet of inhuman force. \n\nAnd above it all, suspended in midair, lies the heart of the ship. The teleportation matrix. It swirls angrily, a dense bronze sphere resting at its center.\n\n\"Well if it isn't the little fly I allowed to keep buzzing about not long ago,\" Doctor Arachnus says. \"They said you would come.\"\n\n\"Wait, what?\" You had a big defiant speech all ready. Now you're a little confused.\n\n\"The visions. The one I stole from your elected leader. They told me to watch for you, that you would be the thorn in my side. And so I watched. Watched, with the power of my omnipotent Spacetime Sphere.\" He gestures at the bronze sphere floating above him. \"Watched, as you served my interests, distracting Minotaur and V.A.N.G.U.A.R.D. from my plans. Disappointing, really. You've been more help than harm.\"\n\nYou grit your teeth in anger. Really? A prophecy? That's why this psycho has been putting himself in the way of your well-intended mayhem? And hey, maybe you'd have tried a little harder if you'd known the world's greatest supervillain was watching you every step of the way. At least you managed to impress all the schlubs on Darkspace, even if most of them are currently hiding in their lairs, too scared to even look up at Doctor Arachnus's ship.\n\n\"And I see no reason you couldn't continue to help me. Join me. You're the most dangerous person on Earth, ${name}, as little as that means. Join me, and we can bring terror to the stars.\"\n\n*choice\n #\"No thanks. I play second fiddle to no one!\"\n  *if (hackmaster = true)\n   \"Sorry, Arachnus, but I'm not here to make friends.\"\n  \n   The sentence is barely out of your mouth when something wraps tightly around your neck with harsh steel fingers. \n   \n   \"I am,\" whispers Hackmaster as her exoskeleton's claws tighten on your throat.\n  \n   \"Dani, what the hell are you doing?\" you manage to wheeze out. She screams and lifts you in front of the exoskeleton's face port. For the first time since you've known her, she opens the port, revealing her badly scarred face. You thought she was merely controlling the mech, but instead she's actually inside it, which make sense since her van can't travel through space.\n   \n   \"My. Name. Is. [i]Hackmaster[/i]!\" she screeches, hurling you across the room. She turns her back on you and kneels before Doctor Arachnus.\n  \n   \"Master. Please. Teach me. I thought I knew what hatred was, but…but I look into your eyes and see the purity. Please.\"\n   \n   *if (ingenuity > 70) and (lethality > 15)\n    Just as Doctor Arachnus steps toward Hackmaster, she surprises you both by activating her suit's .50 caliber machine guns, unloading on the robotic freak in front of her. He shrieks in anger and frustration as the metal tentacles he uses to block the massive bullets are bent and shredded.\n\t \n    But before you can jump in and help, Doctor Arachnus gains the upper hand by sweeping Hackmaster off her feet with one of his tentacles. With several arms now holding her down, Doctor Arachnus gently pulls Hackmaster out of her exoskeleton.\n\t \n    \"Finish him off, ${name}. For me—\" she manages to shout before Doctor Arachnus snaps her frail body in two. You've lost your friend and closest ally but it wasn't in vain. Not only did she show Doctor Arachnus that he's not as invincible as he thought, instilling a slight fear in his heart, but she also inspired you. You'll make him pay…for her.\n    *set ingenuity %+30\n    *set Hackmaster false\n    *goto Arachnus2\n   *else\n    You try to warn her, but there's no breath in your lungs. And so you have to watch as one of Doctor Arachnus's tentacles casually, almost gently, pulls Hackmaster from her armor. There is a snapping sound. You shouldn't feel bad about it. She was a traitor. You shouldn't.\n    *goto Arachnus2\n  *else\n   *goto Arachnus2\n   \n #\"Where do I sign?\"\n  *if (hackmaster = true)\n   \"Why would he want you when he can have me?\" whispers Hackmaster as her exoskeleton's claws tighten on your throat.\n  \n   \"Dani, what the hell are you doing?\" you manage to wheeze out. She screams and lifts you in front of the exoskeleton's face port. For the first time since you've known her, she opens the port, revealing her badly scarred face. You thought she was merely controlling the mech, but instead she's actually inside it, which make sense since her van can't travel through space.\n   \n   \"My. Name. Is. [i]Hackmaster[/i]!\" she screeches, hurling you across the room. She turns her back on you and kneels before Doctor Arachnus.\n  \n   \"Master. Please. Teach me. I thought I knew what hatred was, but…but I look into your eyes and see the purity. Please.\"\n   \n   *if (ingenuity > 70) and (lethality > 15)\n    Just as Doctor Arachnus steps toward Hackmaster, she surprises you both by activating her suit's .50 caliber machine guns, unloading on the robotic freak in front of her. He shrieks in anger and frustration as the metal tentacles he uses to block the massive bullets are bent and shredded.\n\t \n    But before you can jump in and help, Doctor Arachnus gains the upper hand by sweeping Hackmaster off her feet with one of his tentacles. With several arms now holding her down, Doctor Arachnus gently pulls Hackmaster out of her exoskeleton.\n\t \n    \"Finish him off, ${name}. For me—\" she manages to shout before Doctor Arachnus snaps her frail body in two. You've lost your friend and closest ally but it wasn't in vain. Not only did she show Doctor Arachnus that he's not as invincible as he thought, instilling a slight fear in his heart, but she also inspired you. You'll make him pay…for her.\n    *set ingenuity %+30\n    *set Hackmaster false\n    *goto Arachnus2\n   *else\n    You try to warn her, but there's no breath in your lungs. And so you have to watch as one of Doctor Arachnus's tentacles casually, almost gently, pulls Hackmaster from her armor. There is a snapping sound. You shouldn't feel bad about it. She was a traitor. You shouldn't.\n    *goto Arachnus2\n  *else\n   *goto Arachnus2\n\n #\"After everything you've done, you think I'd join you?\"\n  *if (hackmaster = true)\n   \"You fool.\" Cold claws wrap around your throat. You choke as the fingers of Hackmaster's exoskeleton tighten.\n\n   \"Dani, what the hell are you doing?\" you manage to wheeze out. She screams, and lifts you in front of the exoskeleton's face port. For the first time since you've known her, she opens the port, revealing her badly scarred face. You thought she was merely controlling the mech, but instead she's actually inside it, which make sense since her van can't travel through space.\n   \n   \"My. Name. Is. [i]Hackmaster[/i]!\" she screeches, hurling you across the room. She turns her back on you and kneels before Doctor Arachnus.\n  \n   \"Master. Please. Teach me. I thought I knew what hatred was, but…but I look into your eyes and see the purity. Please.\"\n   \n   *if (ingenuity > 70) and (lethality > 15)\n    Just as Doctor Arachnus steps toward Hackmaster, she surprises you both by activating her suit's .50 caliber machine guns, unloading on the robotic freak in front of her. He shrieks in anger and frustration as the metal tentacles he uses to block the massive bullets are bent and shredded.\n\t \n    But before you can jump in and help, Doctor Arachnus gains the upper hand by sweeping Hackmaster off her feet with one of his tentacles. With several arms now holding her down, Doctor Arachnus gently pulls Hackmaster out of her exoskeleton.\n\t \n    \"Finish him off, ${name}. For me—\" she manages to shout before Doctor Arachnus snaps her frail body in two. You've lost your friend and closest ally but it wasn't in vain. Not only did she show Doctor Arachnus that he's not as invincible as he thought, instilling a slight fear in his heart, but she also inspired you. You'll make him pay…for her.\n    *set ingenuity %+30\n    *set Hackmaster false\n    *goto Arachnus2\n   *else\n    You try to warn her, but there's no breath in your lungs. And so you have to watch as one of Doctor Arachnus's tentacles casually, almost gently, pulls Hackmaster from her armor. There is a snapping sound. You shouldn't feel bad about it. She was a traitor. You shouldn't.\n    *goto Arachnus2\n  *else\n   *goto Arachnus2\n   \n*label Arachnus2\n \nDoctor Arachnus lets out a cackling laugh.\n\n\"Foolish mortal. Did you think my offer was genuine? Ara-kunos needs no assistance, has no equals. Only subjects, and slaves.\"\n\nThat's it, no one makes a fool out of you. Not even the world's deadliest supervillain.\n\n*if nautilushelp = true\n As you prepare to attack, the constantly shifting limbs and tentacles of Doctor Arachnus's armor suddenly seize up. For the first time, shock appears on the master villain's face as he works to regain control of his armor.\n \n Electricity crackles through the madman's body, apparently discharging from the armor itself.\n \n \"Now, ${name}!\" shouts a voice you remember clearly. Nautilus. He's giving you your chance. Time to take it.\n *set ingenuity %+10\n *set combat %+10\n *set terror %+10\n *set theatricality %+10\n *goto TheAttack\n\n*elseif nautilushate = true\n As you prepare to attack, Doctor Arachnus's armor begins to move even more rapidly and gracefully. He flexes his tentacles and claws, apparently relishing the sudden complete control, even if a look of confusion shows that he does not understand its source.\n \n A voice hisses from deep within the armor itself. A voice you remember from your trip to France, although it now contains some of Doctor Arachnus's keening whine. \"We're going to kill you, ${name},\" Nautilus whispers. \"You're going to die.\"\n *set ingenuity %-5\n *set combat %-5\n *set terror %-5\n *goto TheAttack\n*else\n *goto TheAttack\n\n*label TheAttack\n*page_break\nHere it is. Life or death. The ultimate fight. Choose wisely. The fate of the Earth depends on it.\n \n*choice\n #Use my combat skills to take down Doctor Arachnus.\n  Time to prove that when it comes to weaponry and coordination, no villain compares to you.\n  \n  \"Help me distract him while my super weapon charges! Aim for the bottom of his abdomen and I'll hit the face!\" you shout at Steelheart.\n  \n  \"Sure, just make sure you get to that weapon when it's ready,\" ${she} shouts back before you both start fighting.\n  \n  Steelheart does an amazing job, using ${shis} assault rifle to shoot at the abdomen each time Doctor Arachnus raises his arms to attack. When Doctor Arachnus tries to attack head-on, you carefully aim at his face with your laser pistol to keep him at bay.\n\n  *if SteelBed = true\n   You and Steelheart fight together as a perfect team, and despite the direness of the situation, part of your mind fantasizes about how it could be like this all the time from now on.\n  *comment endif\n  \n  Once your advanced man-portable energy weapon is ready, you run to it and leave Steelheart to fight off Doctor Arachnus alone. The weapon is designed to shoot a powerful laser capable of disintegrating almost anything. The longer you hold the charging button before firing, the more devastating the shot will be.\n  \n  Just as you place the large weapon on your shoulder, you hear a cry of pain as Doctor Arachnus manages to drive one of his sharp spider hands through Steelheart's abdomen. He tosses ${shim} aside before coming to do the same to you.\n\n  *if SteelBed = true\n   \"No!\" you scream. A red haze of rage fills your vision. \n  *if combat > 65\n   Before he reaches you, you unleash the tremendous power of the weapon at him. An enormous burst of blue energy shoots out, punching Doctor Arachnus through the ship's walls and into outer space with incredible force, shredding him to pieces in the process. You grab onto a pillar that connects the ceiling to the floor as debris, electronics, unidentifiable alien artifacts--everything not attached to the ship--is sucked out into space through the hole, including Steelheart's body….\n\t\n   Eventually the ship's auto-repair mechanism kicks in and repair-spiders rush to seal the hole. Doctor Arachnus is gone. The ship is masterless. And above you floats the bronze sphere that grants infinite power to those who touch it.\n   *goto SpacetimeSphere\n  *else\n   You attempt to fire the weapon, but the powerful blast is difficult to control, causing you to completely miss Arachnus and instead hit ship's strong bulkhead. Faster than you can see, Doctor Arachnus lunges at you, and suddenly there's a metal claw jutting out of your chest. It seems the combat and fighting skills you possess simply weren't enough….\n   *page_break\n   Lying in a pool of blood, Steelheart looks up in disbelief while watching how you meet the same fate. Doctor Arachnus tosses you aside, directly next to Steelheart. You now lie together, face to face, and for whatever reason, you take hold of each other's hands as life slowly fades out of you both.\n   \n   \"Maybe,\" ${she} manages to whisper, \"others are watching.\" ${shecap} coughs a few times as blood starts filling her lungs.\n   \n   \"They have seen our sacrifice. How we, a villain and V.A.N.G.U.A.R.D. agent, set aside our differences to fight a bigger threat.\"\n   \n   \"What if they have?\" you manage to respond softly as a stream of blood exits your mouth.\n   \n   \"Maybe they'll come and fight too. And stop Arachnus, before it's too late,\" ${she} says with ${shis} last breath.\n\n   *if SteelBed = true\n    Though it takes all your strength, you stretch close enough to kiss Steelheart one final time.\n   \n   As your life fades, you wonder if anyone will remember you, and your reign of villainy. Then you remember that your failure may have doomed Earth. Or, instead, maybe other villains and heroes will be inspired to work together to defeat Doctor Arachnus.\n   \n   If so, and if they defeat Doctor Arachnus, the world will remember you as one of the greatest villains of all time….\n   *achieve badend\n   *goto ending\n #Rely on my ingenuity to defeat the mass murderer.\n   You activate your Replicator. It's your ace in the hole, the one invention you always held back so that nobody could ever plan against it. Instantly, dozens of physical copies of you burst from the device. Each one even wields a unique weapon to use against Doctor Arachnus, including laser blasters and energy swords. Steelheart raises an eyebrow at you, but there's really no time for a friendly chat.\n   \n   On your signal, the clones rush Doctor Arachnus, who seems to be overwhelmed by them for a time. While your copies keep him busy, you take out a conductive cord and make your way to the bronze sphere at the heart of the nexus. In principle, this should be simple. Loop the cord around the sphere of infinite, omnipotent energy. Then, jab it into Doctor Arachnus's mechanical body and fry him. Yeah, simple. In principle.\n   \n   *if ingenuity > 65\n    You turn and see the last of your clones fall, dead, at Doctor Arachnus's feet, leaving Steelheart to keep the half-mechanical menace busy. ${shecap} does so for a time, but eventually makes a mistake that ends with one of Doctor Arachnus's sickle-like spider arms cutting through Steelheart's chest.\n\n    *if SteelBed = true\n     \"No!\" you scream. A red haze of rage fills your vision. \n\t\n    Just as the mass murderer raises his victim in the air to celebrate the kill, you run up and jam the energized cord into his abdomen. Doctor Arachnus roars in pain as unimaginable amounts of energy flow through his body, roasting his fleshy parts and melting his mechanical half.\n    *goto SpacetimeSphere\n\n   *else\n     You turn and see the last of your clones fall, dead, at Doctor Arachnus's feet, leaving Steelheart to keep the half-mechanical menace busy. ${shecap} does so for a time, but eventually makes a mistake that ends with one of Doctor Arachnus's sickle-like spider arms cutting through Steelheart's chest.\n\n    *if SteelBed = true\n     \"No!\" you scream. A red haze of rage fills your vision. \n\t\n    Just as the mass murderer raises his victim in the air to celebrate the kill, you run up and jam the cord right into his abdomen. Doctor Arachnus laughs as nothing happens. You stare at it as it hangs limply in your hand. You screwed up. Somehow you just weren't smart enough.\n\n    You don't have much time to reflect on your mistake. With a sneering laugh, Doctor Arachnus drops his heavy mechanical abdomen on you. Your bones and organs are instantly crushed, leaving you gasping for breath.\n \n    Lying in a pool of blood, Steelheart looks up in disbelief while watching how you meet the same fate. Doctor Arachnus swats you across the room, directly next to Steelheart. You now lie together, face to face, and for whatever reason, ${she} takes hold of your immobile hand as life slowly fades out of you both.\n \n    \"Maybe,\" ${she} manages to whisper, \"others are watching.\" ${shecap} coughs a few times as blood starts filling her lungs.\n \n    \"They have seen our sacrifice. How we, a villain and V.A.N.G.U.A.R.D. agent, set aside our differences to fight a bigger threat.\"\n \n    \"What if they have?\" you manage to respond softly as a stream of blood exits your mouth.\n \n    \"Maybe they'll come and fight too. And stop Arachnus, before it's too late,\" ${she} says with ${shis} last breath.\n\n    *if SteelBed = true\n      Though it takes all your strength, you stretch close enough to kiss Steelheart one final time. \n\n    As your life fades, you wonder if anyone will remember you, or your reign of villainy. Then you remember that your failure may have doomed Earth. Or, instead, maybe other villains and heroes will be inspired to work together to defeat Doctor Arachnus.\n   \n    If so, and if they defeat Doctor Arachnus, the world will remember you as one of the greatest villains of all time….\n    *achieve badend\n    *goto ending\n #Use the art of terror to vanquish my foe.\n  You've brought along a machine that can take specific images and transmit them into someone's mind. Unfortunately, it takes a while to charge.\n  \n  \"Don't worry, I'll keep him busy,\" says Steelheart, while you begin the machine's charging cycle. ${shecap} valiantly takes on Doctor Arachnus alone, dodging his fast-moving claws. Occasionally, you fire off a few blasts from your laser pistol, which distract Doctor Arachnus just long enough for Steelheart to do some damage with ${shis} assault rifle.\n  \n  Just as the device is ready to go, you hear a cry of pain as Doctor Arachnus manages to drive one of his sickle-like spider hands through Steelheart's chest.\n  \n  *if terror > 65\n   Without hesitation, you activate the machine, and your mind locks on to Doctor Arachnus's. For a moment, everything is blank as your minds fight for control. But slowly you push, deeper and deeper, into the madman's darkest fears. You know where to find them. You understand him now.\n   \n   The scene is strangely idyllic. A dinner table. A family gathered around it. And at the head of the table, preparing to serve his wife and children, is the man you know as Doctor Arachnus. Happy. Loving. Content. From within, you can feel the agony roiling beneath those warm, smiling eyes. Feel it rise as the bald head is lowered and grace is spoken. You push harder, and the scene accelerates. Church service. Backyard barbecues. Little League games. And with every moment, Doctor Arachnus's pain intensifies. But you are not merciful, and the cavalcade of the vile man's greatest fears and torments continues for a relative eternity.\n\n   Suddenly, you are back aboard the spaceship. Looking up, you see Doctor Arachnus's body slump, the brilliant mind that once controlled it dead. Steelheart's corpse slides from the bloody claws and falls to the floor.\n\n   *if SteelBed = true\n    \"No!\" you scream. All that…only to lose Steelheart. At least Doctor Arachnus paid with his own life.\n   *goto SpacetimeSphere\n  *else\n   Without hesitation, you activate the machine, and your mind locks on to Doctor Arachnus's. For a moment, everything is blank as your minds fight for control.\n   \n   And fails. \n   \n   Fear wells up in you as Doctor Arachnus pushes back, plunging himself into your subconscious. Soon, you're panicking, as your darkest fears are ripped from the places where you hide them and shoved into the light. Mediocrity. Obscurity. Worthlessness. You beg for mercy, but mercy is not in the nature of Doctor Arachnus. \n   \n   You return to reality, but your body has been crippled by the mental torment, stunned from all the terrible visions that swarmed your mind, vulnerable. Doctor Arachnus, the true master of terror, easily slides one of his sickles through your abdomen.\n   *page_break\n   Lying in a pool of blood, Steelheart looks up in disbelief while watching how you meet the same fate. Doctor Arachnus tosses you across the room, directly next to Steelheart. You now lie together, face to face, and for whatever reason, ${she} takes hold of your immobile hand as life slowly fades out of you both.\n   \n   \"Maybe,\" ${she} manages to whisper, \"others are watching.\" ${shecap} coughs a few times as blood starts filling her lungs.\n   \n   \"They have seen our sacrifice. How we, a villain and V.A.N.G.U.A.R.D. agent, set aside our differences to fight a bigger threat.\"\n   \n   \"What if they have?\" you manage to respond softly as a stream of blood exits your mouth.\n   \n   \"Maybe they'll come and fight too. And stop Arachnus, before it's too late,\" ${she} says with ${shis} last breath.\n\n   *if SteelBed = true\n    Though it takes all your strength, you stretch close enough to kiss Steelheart one final time.\n   \n   As your life fades, you wonder if anyone will remember you, or your reign of villainy. Then you remember that your failure may have doomed Earth. Or, instead, maybe other villains and heroes will be inspired to work together to defeat Doctor Arachnus.\n   \n   If so, and if they defeat Doctor Arachnus, the world will remember you as one of the greatest villains of all time….\n   *achieve badend\n   *goto ending\n\n #Put on a show. Theatricality is the key to winning this fight.\n  You've brought along a machine that will fill the entire room with a certain something that no brilliant performance should go without. Unfortunately, it takes a while to charge.\n  \n  \"Don't worry, I'll keep him busy,\" says Steelheart while you activate the machine's charging cycle. ${shecap} valiantly takes on Doctor Arachnus alone, dodging his lethal claws. Occasionally you fire off a few blasts from your laser pistol, which distract Doctor Arachnus just long enough for Steelheart to do some damage with ${shis} assault rifle.\n\n  *if SteelBed = true\n   Between your style and ${shis} practicality, you make a brilliant team. Despite the direness of the situation, part of your mind fantasizes about how it could be like this all the time from now on.\n  *comment endif\n  \n  Just as the device is ready to go, you hear a cry of pain as Doctor Arachnus manages to drive one of his sickle-like spider hands through Steelheart's chest.\n\n  *if SteelBed = true\n   \"No!\" you scream. A red haze of rage fills your vision.\n  \n  *if theatricality > 65\n   Without hesitation, you activate the machine and watch as it mass-produces popcorn at incredible speed. Doctor Arachnus looks around in utter confusion as his main chamber fills with the buttery snack to the point where you can't even see each other.\n\n   \"Is this some kind of silly joke?\" he whines while thrashing his massive skeletal body throughout the room in an attempt to crush the foolish foe that would dare mock the great Doctor Arachnus. So, yeah, you. \n\t\n   Unable to see, he eventually slams into one of the large glass windows, creating a vacuum that sucks him and Steelheart's body into space. You manage to hold on to something nearby long enough for repair-spiders to appear and fix the hole.\n   *goto SpacetimeSphere\n  *else\n   Without hesitation, you activate the machine and watch as it mass-produces popcorn at an incredible speed. Doctor Arachnus looks around in utter confusion as his main chamber fills with the buttery snack to the point where you can't even see each other.\n\n   \"Nice try, but if there's a villain that knows theatricality, it's me!\" he shouts before pressing a button on a control panel. A tube appears and starts sucking up everything in the room, including you and all the popcorn. You fly through the tubes and land in a concealed room where eventually boiling-hot butter will start slowly pouring down, sautéing you alive but giving the popcorn delicious flavor.\n\t\n   It seems you didn't have enough dramatic flair to upstage one of the most theatrical villains alive.\n   *page_break\n   In the massive room, you have nothing left to do but wait until the boiling butter comes down to kill you. Just then, you spot Steelheart still breathing. You make your way toward ${shim} and, for whatever reason, take hold of ${shis} hand.\n   \n   \"Maybe,\" ${she} manages to whisper, \"others are watching.\" ${shecap} coughs a few times as blood starts filling ${shis} lungs.\n   \n   \"They have seen our sacrifice. How we, a villain and V.A.N.G.U.A.R.D. agent, set aside our differences to fight a bigger threat.\"\n   \n   \"What if they have?\" you manage to respond softly.\n   \n   \"Maybe they'll come and fight too. And stop Arachnus, before it's too late,\" ${she} says with ${shis} last breath.\n\n   *if SteelBed = true\n    Though it takes all your strength, you stretch close enough to kiss Steelheart one final time.\n   \n   As the butter finally rains down and your life starts fading, you wonder if anyone will remember you, or your reign of villainy. Then you remember that your failure may have doomed Earth. Or, instead, maybe other villains and heroes will be inspired to work together to defeat Doctor Arachnus.\n   \n   If so, and if they defeat Doctor Arachnus, the world will remember you as one of the greatest villains of all time….\n   *achieve badend\n   *goto ending\n\n*label SpacetimeSphere\n*page_break\nWith Doctor Arachnus gone, you can now direct all your attention to his precious Spacetime Sphere, the heart of the ship, the device currently terraforming the Earth. If you understand the principles correctly, it can do anything. Literally anything, as long as you can properly visualize it. And if you can't…\n\n*if star = true\n Suddenly, The Star is standing behind you. He turns and looks you in the eyes.\n \n \"I hid. I'm sorry, I hid. ${shecap} died and I didn't do anything and I hid. But now I can help you.\"\n \n He reaches for the sphere, but you move between it and him. You're honestly not sure what your sidekick will do if he touches the sphere. His head jerks wildly.\n \n \"Don't you understand? It's this thing. This thing. It made me like this. He changed me. I was good and he changed me, and I need to destroy it. Please.\" He pushes you aside with incredible strength. His hands begin to glow as they touch the surface of the sphere.\n \n \"It has to go. It has to go, and we have to go, and then everything will be okay. We'll be heroes again.\" You realize he intends to destroy the sphere, and you and him with it.\n \n It is now that you realize there are only two choices: try to convince your sidekick to back down or finish him before he can end your life much sooner than you want it to. Convince him and keep your ally, but fail and lose your life.\n \n *choice\n  #Try to talk to him.\n   *if lethality > 20\n    \"We're not, though, Star. We never were heroes. You've helped me do so many things, old friend. So many wonderful, awful things. Do you think you can come back from that? Do you think destroying that thing will give you back your innocence? You're wiser than that. Wiser, and crueler.\"\n\t\n    He looks at you with those dead eyes, and you see that you've reached him. Without hesitation, he pulls his hands from the sphere and places them on himself. You think you see a look of peace, or maybe acceptance, on his face before he burns.\n    *goto FinalDecision\n   *elseif terror > 65\n    \"Do you think you can escape punishment this way, Star? Do you think there's anything but hell on the other side of this life? Would you kill me, then? So that I can be there, waiting for you on the far side, welcoming you to the torments you know I can inflict?\"\n\n    He looks at you, eyes wide. Shaken. He takes his hands from the sphere and places them on his face. You see a shudder of revulsion cross over it, just before he burns. \t\n    *goto FinalDecision\n   *elseif activist > 65\n    \"I understand, Star. You want to change the world. Change it back. I do too. It's what we've worked so hard to achieve. Would you throw it away now? Our better world? Old friend, please. Step back and look at what we could do.\"\n\t\n    He stares at you, eyes suddenly flaring with anger. \"I have.\" And in a second, his flaming hands are on his face, and with a flash, he burns.\n    *goto FinalDecision\n   *else\n    You try to find the words to reach him. But maybe it was never meant to be. You don't know what could've changed the decision he's made. You've never understood what made The Star tick, and now you're going to die alongside him. You cry out in anger and despair as his burning hands breach the bronze sphere, but your voice is swallowed by a torrent of deadly energy.\n    *goto StarBetrayal\n  #Wait and hope he realizes he's better off with me.\n   The Star is insane, and you've seen him like this before. Any sudden movement might provoke him, any comment might fuel the agony that burns inside him. On the other hand, he has his lucid moments. You try to look harmless, a reminder that his life isn't as bad with you as it was before.\n\n   He stares at you with his dead eyes, and you silently will him to remember the sort of villain you are. \n   *if lethality \u003c 10\n    When he finally speaks, his voice is hoarse. \"You don't kill unless you have to.\" He shakes his head, a look of mixed sorrow and wonder in his gaze, the gentlest emotions you've ever seen from him. \"Even though you're a villain…you have a chance. I have none.\"\n\n    By the time you realize what he's going to do, it's too late. In a second, his flaming hands are on his face, and with a flash, he burns.\n    *goto FinalDecision\n   *elseif activist > 70\n    At last, a low, despairing laugh comes from his throat. \"You want to change the world, don't you? You think your methods will make the world a better place. You really believe that….\"\n\n    \"Help me,\" you urge, daring to speak at last. \"We [i]can[/i] change things!\"\n\n    \"Change…\" He laughs again, and his laughter changes to a desperate giggle. Even as you try to figure out what he intends, he puts his flaming hands on his face, and with a flash, he burns.\n    *goto FinalDecision\n\n   *else\n    Whatever The Star sees in your face, it isn't what you hoped. With a harsh cry, he slams his burning hands into the bronze sphere. You cry out as well, but your voice is drowned out by a flare of deadly energy that leaves only silence behind.\n    *goto StarBetrayal\n  #Kill him.\n   \"I'm sorry.\" You look into his eyes, as dead as on the day you met him in that diner. Without saying a word, he turns away as you pull your laser pistol and place it against his head. His hands glow brighter, and you pull the trigger. \n   \n   \"Rest in peace,\" you whisper, and mean it.\n   *goto FinalDecision\n  \n*else\n *goto FinalDecision\n\n*label StarBetrayal\n*page_break\nIn your final seconds, as pain purges the world around you and the unstoppable energy from the sphere consumes all it touches, you dimly wonder what you could have done differently. Maybe if you'd understood The Star better, you would have known not to bring him here. Impossible though it seemed to get inside his head, if you'd even suspected that something on Doctor Arachnus's ship would trigger such a reaction, you'd have left him behind.\n\nDid he intend to destroy you this way? Or did he think you and he could survive the sphere's destruction? Even now, you can't understand his thought process.\n\nWhat did Doctor Arachnus do to him, so long ago? You'll never know for sure, but at least the secret will die with you. Though you didn't intend for your story to end here on this ship, you succeeded in defeating Doctor Arachnus. The Earth is now safe.\n\nAnd everyone will know it is because of ${name}.\n*achieve badend\n*goto ending\n  \n*label FinalDecision\n*page_break\nYou've come a long way from robbing banks and striving to impress everyone on Darkspace. Now, here you stand, having taken down the galaxy's greatest tyrant and with ultimate power within reach. For a moment, you just bask in the glory of your triumph and dream of the things you could accomplish, the heights you could reach…. Anything is possible.\n\nThen a harsh voice rips through your musings.\n\n\"Not…so…fast.\"\n*page_break\nYou spin around and stare in disbelief. It's impossible.\n\nImpossible or not, Doctor Arachnus stands before you. H
