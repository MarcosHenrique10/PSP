it, approaches you just to ask how excited you are to finally deposit at the world's least-robbable bank.\n*goto poo\n\n*label poo\n*fake_choice\n #\"I'm so happy I could poo.\"\n #\"Oh, I'm excited, very excited! This is probably the most amazing thing you'll see in your lifetime.\"\n #\"Get away from me.\"\n\nHe offers a goofy smile and turns around to snap more pictures of the parking lot, for some reason. Fortunately, meeting a nincompoop of his magnitude only further motivates you to set your diabolical plan into motion. You return to your disguised personal transport and press the button that makes the vehicle dress you in your latex costume in a matter of seconds. The mechanical arms are a bit rough, never failing to pinch you in all the wrong places at least twice, but it's a small price to pay for a quick wardrobe change.\n*return", "chapternine": "*image chap9.png\n\nYou marvel at the beauty of the Swiss Alps, still finding it hard to believe that the world's premier crime syndicate is whisking you away to their secret villa headquarters. It seems like only yesterday you weren't even on Minotaur's radar. (That's because yesterday you weren't.) Clad in your costume, you feel naked without your Darkspace camera, but you understand the organization's need for secrecy. Unless this is just a giant trap and you're about to be turned into mulch by a bunch of well-paid psychopaths. But hey, either way, free helicopter ride!\n\nLong, free helicopter ride. There's only so much breathtaking scenery you can take. What to do, what to do.\n\n*fake_choice\n #Try talking to the pilot.\n  \"So, how's working for Minotaur? Good benefits? Perks?\"\n  \n  The pilot makes a \"so-so\" hand gesture and continues flying quietly. So much for making small talk.\n #Take a nap.\n  It's a shame that Minotaur doesn't value you enough to spring for one of those deluxe helicopters with the built-in bed. You try to doze in your seat, but the constant jostling keeps you from getting any real rest.\n #Play a video game.\n  You pull out a portable gaming device and try to distract yourself with some virtual violence. Soon, though, the shaking of the helicopter starts to give you a nasty case of motion sickness, and you spend the rest of the ride trying not to throw up on yourself. Nothing makes a bad first impression like vomit.\n\nThe helicopter finally lands near a huge castle overlooking the natural beauty of the snow-capped mountains. It's lightly snowing, and the first gust of cold wind makes you shiver. You're wearing the only coat you own, but an urbane city villain like yourself just isn't accustomed to such temperatures.\n\nYou walk toward the estate only to find several people enjoying themselves in heated pools and hot tubs near the entrance. Busy chatting and sipping their drinks, they pretty much ignore you as you walk by. You imagine they're used to seeing people in elaborate costumes wandering around this place.\n\nWalking through the massive front door, you're greeted by a tall, attractive ${cman} in expensive business attire. \n\n\"It's a pleasure to finally meet in person,\" ${che} purrs in that accent you can't seem to get away from recently. \"When operating on Minotaur business, I am known as The ${cname}. Please, have a seat.\"\n\n${checap} leads you to a dining room that wouldn't look out of place in a five-star restaurant. There are tables with lit candles and fancy folded napkins throughout the room, many of them already occupied by well-dressed diners. Elegant chandeliers light the room, while a large fireplace on the far wall keeps the place at the perfect temperature. There are even a few musicians playing soft classical music in the corner. The effect is kind of like someone stole all of the \"fancy restaurant where someone finally proposes to their girlfriend\" scenes in romantic comedies and turned them into a single room.\n*page_break\n\"Tell me about the trip. Did you enjoy the scenery on your way up?\" ${che} asks now that you're both seated. A waiter arrives to pour you both a glass of wine.\n\n\"It's better than driving halfway across the country with my costume sweat-glued to my back, I'll tell you that,\" you reply.\n\n${checap} smiles and takes a sip of ${chis} drink, clearly not sure if you're joking or not.\n\n\"Go ahead,\" ${che} suggests, \"you won't find a better-tasting wine.\"\n\n*fake_choice\n #Take a drink.\n  Your eyes widen as the delectable taste fills your mouth. It's kind of unsettling that ${che} knew exactly what your favorite vintage was.\n #Refuse the drink.\n  \"No thanks, I don't drink,\" you say before setting the glass aside. All the soft lighting and tasteful decor in the world won't distract you from the fact that you're wining and dining with some very dangerous people right now.\n #Pretend to take a drink.\n  Considering the company you're in, drinking anything put in front of you might not be the healthiest decision. On the other hand, ticking them off could be even worse for your health. You lift the glass to your mouth and fake a sip.\n*comment endchoice\n\n\"I hope your rise to national prominence suits you. We find it impressive that a villain of your…limited experience…was able to reach the main vault. Only our 'esteemed colleague' Doctor Arachnus has ever managed it solo.\"\n\n*fake_choice\n #\"Apparently experience is overrated, since I beat your team to the gold.\"\n  ${checap} gives you a fake smile before taking another sip of ${chis} drink, clearly unamused by your response. Well, if Minotaur didn't want you interfering in their plans, they should have known to account for someone as awesome as you. \n #\"Feh, Arachnus. A mechanical madman with delusions of godhood and a face full of chrome.\"\n  ${checap} smiles before taking another sip of ${chis} drink, clearly amused by your response. It's a well-known fact that there's no love lost between the profit-minded Minotaur and the mayhem-loving Arachnus. \n #\"Say what you like about his attitude, but Arachnus gets things done.\"\n  ${checap} gives you a fake smile before taking another sip of ${chis} drink, clearly unamused by your response. Minotaur's antipathy for the mad doctor is well known and documented. \n${checap} quickly changes the subject.\n\n\"The life of a villain is an extraordinary one. Does that lifestyle allow you time for…personal interests?\" ${checap} stares at you with a sudden intensity.\n\nYou resist the urge to break into a sweat. There's no denying that The ${cname} has charm to go around, but ${chis} eyes give away a cold and calculating demeanor that reminds you that you're sitting across from someone with a body count that looks like a zip code. You need to stay on your guard here.\n\nOn the other hand, ${che} could be genuinely hitting on you. After all, you're great. Vast personal fortune, lots of exciting gadgets, more goons than you can name (literally). Why wouldn't a highly paid international assassin and agent provocateur want to get with you?\n\n*choice\n #\"I'm single, if that's what you're asking….\"\n  \"It comes with the job. The lonely life, I mean. Aside from the occasional one-night stand, of course,\" ${che} replies, ${chis} sparkling blue eyes looking into yours. ${checap} runs ${chis} fingers through ${chis} golden blond hair. If working for Minotaur doesn't work out, this ${cman} could land a job as a successful model, no doubt about it.\n  *set Countess +2\n  *goto CouncilCall\n  \n #\"What do you say we cut to the chase. Why am I here?\"\n  \"So impatient…. It's unseemly in one so young,\" ${che} replies with a calm tone. \"Is my company so dreadfully boring?\"\n  \n  \"Of course not,\" you respond. \"But your council didn't fly me halfway around the world to flirt.\" ${checap} smiles again, this time showing ${chis} pearly white teeth. Nice teeth, golden blond hair, although the sparkling blue eyes remain cold. If working for Minotaur doesn't work out, this ${cman} could land a job as a successful model, no doubt about it.\n  *set Countess -2\n  *goto CouncilCall\n  \n #\"So…what do you do around here for fun?\"\n  \"The heated pools are nice. We could always slip into something more appropriate and take a dip, if you'd like,\" ${che} replies, ${chis} sparkling blue eyes looking into yours. ${checap} runs ${chis} fingers through ${chis} golden blond hair. If working for Minotaur doesn't work out, this ${cman} could land a job as a successful model, no doubt about it.\n  *set Countess +2\n  *goto CouncilCall\n\n*label CouncilCall\n\nSuddenly there's a buzz, and The ${cname} reaches into ${chis} pocket and pulls out a slim black phone.\n\n\"Excuse me,\" ${che} says as ${che} brings it up to ${chis} ear. Whatever the message was, it must have been short, because almost immediately The ${cname} stands up.\n\n\"It's time. Everyone leave,\" ${che} announces loudly. Without hesitation, all of the other people in the dining room stream toward the exit, leaving unfinished drinks and meals at the tables. The waiter and the musicians are close behind. You wonder how much of this \"fancy restaurant\" scenario was just a way for Minotaur to get you to drop your guard.\n\nThe ${cname} leads you through a door at the back of the dining room into a small, technology-filled chamber. Twelve computer screens sit on the far wall, casting harsh blue light into the room. Suddenly they flicker, and twelve strange faces are staring at you. Six are men, and six are women, and they wouldn't be all that odd if they weren't almost identical. You feel like you've walked into something very strange.\n\n\"That will be all, ${cname}. Wait outside,\" one of the faces says. The ${cname} gives you a smiling eye-roll, out of view of the computer screens, as ${che} saunters out the door, closing it behind ${chim}.\n\nIt's pretty awkward having all twelve facing right at you, even if they aren't actually in the room. You're tempted to ask what the deal is with all the creepy clone stuff, but you get the feeling this is one of those \"We ask all the questions!\" meetings.\n\n\"Do you know who we are, ${name}?\"\n\n*fake_choice\n #\"A dozen crybabies upset because I thought of hitting Fort Klanx first?\"\n  One or two shake their heads while the rest smile. One even chuckles. No reason to beat around the bush, right?\n #\"I don't know, the New World Order?\"\n  All the faces give slight chuckles. It's pretty creepy hearing the same low cackle coming from twelve different people.\n #\"Aren't you guys the cast of [i]The Brady Bunch[/i]? Hey, where's your lovable maid, Alex?\"\n  The faces stare at you blankly. Apparently, nobody gets classic TV in Creepy Clone-Face Town.\n*comment endchoice\n\n\"You're quite the humorous one, ${name},\" one of them answers. \"You are speaking to Minotaur's Great Council, the Masters of the Maze of Crime. Our orders crush kings and raise beggars to the throne. Together, we command the limitless resources of the lords of crime. It would serve you well to listen to what we have to say.\"\n\n\"I'm listening,\" you respond, not sure of what else to say. Another one of the faces starts to speak in the same slightly high-pitched voice.\n\n\"We do not take interference lightly, ${name}. But your efforts have impressed us. Few could take Fort Klanx on their own. It took boldness, planning, and a wise use of resources. Those are all qualities we look for in a Minotaur agent.\"\n*page_break\nA third face starts to speak. Same voice, same inflections. These people are supremely creepy.\n\n\"We're sure The ${cname} has made your time here pleasant. ${checap} is the carrot, showing you the comfort and opulence we can provide. But now, it is time for the stick. You have proven yourself dangerous and resourceful…too resourceful to be allowed to operate outside our control. You will join Minotaur as our newest agent, free to work independently until the time comes to subordinate yourself to our will. Or you may refuse. But know this, ${name}. No one refuses Minotaur and lives to tell the tale.\" The wall below the screens slides open, revealing a line of deadly laser blasters pointed directly at your chest.\n\nDamn, these people really go for the hard sell. Do they really expect you to make a decision so quickly? A decision that will affect the rest of your life (or what's left of it, if you say no)? They could have at least given you a week or two. Heck, you'd be willing to think it over while relaxing in those outdoor hot tubs for a few hours.\n\nIt looks like you have no choice but to say…\n*page_break\n…nothing, as a body comes crashing through the door like a rag doll, taking down the computer screens and making a huge mess. The figure quickly stands up, holding a flamethrower you've seen before. It's hard to forget a sputtering gout of super-heated flame when it's been pointed directly at your chest.\n\n\"Long time no see, ${name},\" says The Drake with a voice full of cheerful psychosis. \"We'll chat later. I'm a bit busy.\"\n\nThe Drake hits the floor as several knives come flying into the room, narrowly missing you and striking the back wall, shattering the array of laser blasters. The vigilante quickly gets up and charges through the door, the flamethrower shooting a massive wall of heat.\n\nYou follow ${chim} to the dining hall and watch as The Drake and The ${cname} continue a battle that must have been going on ever since the door closed on the soundproof room. Most of the tables are smashed and part of the room is on fire, which tends to happen when The Drake is around. You're surprised by how quickly The ${cname} can move, jumping and rolling to avoid the bursts of fire from the deadly weapon. However, it's The Drake who seems to be getting the worst of it, as The ${cname} continues to pelt ${chim} with a seemingly endless supply of throwing knives.\n\n\"Vigilante pest! How did you find this place?\" spits the Minotaur agent as ${che} ducks behind a thick wooden pillar. As you watch, ${che} pulls several more blades from the recesses of ${chis} suit.\n\n\"I've had my eye on ${name} for some time,\" The Drake responds from behind a table ${che}'s laid sideways for cover. ${checap} quickly starts replacing the empty fuel canister on ${chis} flamethrower with a new one.\n\n\"Is that so? Or are you two working together?\" The ${cname} shouts as ${che} lets loose another volley of knives. They thunk deeply into the wooden table, splintering it in several places.\n\n\"Me? Work with a villain? Don't be crazy. But it was obvious you'd shown interest in this particular villain after being upstaged at Fort Klanx. I just had to wait and follow.\"\n\nThe Drake kicks away the table and blasts a giant wave of fire at The ${cname}, who has no choice but to retreat for cover ${chim}self. The intense fight takes them into another room, seemingly forgetting all about you.\n\nWhich is just fine, as far as you're concerned. Sure, there's a psychotic superhero running around, hoping to burn you alive. And Minotaur probably thinks you led the wacko here. But at least you're not being press-ganged into service as an international arms dealer or something, and you're all alone in a criminal base just ripe for all kinds of interesting mischief.\n\nYou run away from the fight and deeper into the villa, eventually coming across a stairway leading down to a door. Hoping it's more than just some basement where they keep old boxes or dead bodies, you head inside.\n*page_break\n*if murderdead = true\n *goto ComputerRoom\n \n*else\n *achieve professormurder\n\n Rounding a corner, you're shocked to see someone you'd honestly expected to never meet again.\n \n \"Professor Murder?\" you utter in disbelief. It feels like just yesterday that this old grandma was doing a lousy job of robbing your folks' place. How'd she end up in the basement of Minotaur's compound? Doesn't look like things are going great for her, though, since she's tied to a chair and looks like she's taken a wide variety of nasty beatings. You almost feel sorry for her, sitting there looking even more ancient and crazy than the first time you met. Key word being \"almost\" because you still remember her pointing a gun at your head.\n \n \"I remember you,\" she whispers, startling you. You honestly thought she was unconscious, or maybe dead. \"Took my crew. Took my credentials. Had no choice but to go to Minotaur. Mistake. Awful, awful mistake.\"\n \n You could have told her that. Hmm, maybe she'd be willing to help you out. There's also the chance that she'll tell Minotaur about seeing you down here just to get back on their good side. You should think fast because eventually either The Drake or The ${cname} is going to kill the other one and come looking for you.\n \n *choice\n  #I'm in a hurry so I just leave her there.\n   You give her a \"What can I do?\" shrug to let her know you don't have time to waste. You can hear her start weeping as you exit to the long corridor ahead.\n   *goto ComputerRoom\n  #I slip nanites into her brain to control her in the future.\n   *if ingenuity > 65\n    You check your secret pocket compartment—you know, the one that always has a pack of gum along with a small tube of nanites. The gum isn't there, no doubt thanks to a snooping goon back at the base, but the tube is.\n\t\n    You force Murder's head to the side and slip the liquid-like nanites into her ear. She barely struggles, almost as if without a care. It's a good thing a broken spirit is irrelevant when these bad boys take control of a host.\n    (You have earned a Planning Point!)\n    *set notoriety +5\n    *set planning +1\n    *goto ComputerRoom\n   *else\n    You check your secret pocket compartment—you know, the one that always has a pack of gum along with a small tube of nanites. Both are there, but the tube is very empty. Somehow you forgot to produce more nanites and stick them in your secret tube.\n\t\n    With no more time to waste, you leave.\n   *goto ComputerRoom\n   \n  #I end her misery by giving her a quick death.\n   She smiles as you pull out a pocketknife hidden in your boot. You carry it around for when you finally have to cut some kind of rope in a limited time, like in your favorite action movies. Or, you know, deliver a mercy killing to a washed-up villain in an Italian mansion.\n   *set murderdead true\n   *set lethality +5\n   *goto ComputerRoom\n   \n  #I ask her to work for me as a mole within Minotaur.\n   *if notoriety > 17\n    You pull a knife hidden in your boot and cut her free.\n   \n    \"Tell them you broke yourself out of your bonds; they seem to respect self-reliance. Work your way up, learn what you can, but never forget this moment: when they left you tied up in a chair, beaten and bloody, and I let you free. Together, we can bring them down. What do you say?\"\n   \n    She looks down in thought for a moment before staring at you with her mad little eyes, nodding with a smile. It should prove useful having someone send you juicy info once in a while. That is, if she ever proves her competence to them and doesn't end up in a body bag instead.\n   \n    (You have earned a Planning Point!)\n    *set notoriety +5\n    *set planning +1\n    *goto ComputerRoom\n \n   *elseif notoriety > 10\n    You pull a knife hidden in your boot and cut her free.\n   \n    \"Tell them you broke yourself out of your bonds; they seem to respect self-reliance. Work your way up, learn what you can, but never forget this moment: when they left you tied up in a chair, beaten and bloody, and I let you free. Together, we can bring them down. What do you say?\"\n   \n    She looks down in thought for a moment before staring at you with her mad little eyes, nodding with a smile. It should prove useful having someone send you juicy info once in a while. That is, if she ever proves her competence to them and doesn't end up in a body bag instead.\n   \n    *set notoriety +5\n    *goto ComputerRoom\n\n   *else\n    You pull a knife hidden in your boot and cut her free.\n   \n    \"Tell them you broke yourself out of your bonds; they seem to respect self-reliance. Work your way up, learn what you can, but never forget this moment: when they left you tied up in a chair, beaten and bloody, and I let you free. Together, we can bring them down. What do you say?\"\n   \n    She looks down in thought for a moment before giving a quick laugh. \"I have been following you on Darkspace and know that you don't compare to Minotaur. They may have me down here, but as a Minotaur member I'm still more than what I'd be under your command.\"\n\t\n    You shake your head before leaving the room, the sound of her laughter echoing behind you.\n    *goto ComputerRoom\n\t\n*label ComputerRoom\n\nAfter a long, dark corridor, you finally come across a room with several computers inside. There's one in particular that looks important, but it's being used by the only Minotaur agent in the room.\n \nYou pull out the knife you snuck into the villa and bring it to the man's throat.\n\n\"Here's the deal. You do as I say and I don't splatter your blood all over that computer screen, okay?\"\n\n\"Okay! Okay!\" he screams while shaking. You quickly grab the semiautomatic pistol from his belt. Minotaur really does have all the nicest toys.\n\n\"What's the deal with these computers?\"\n\n\"T-they're connected to Minotaur's main systems.\"\n\nIf only you had this kind of luck when you were holding Bingo night in the lair's rec room. You've just stumbled onto the one room in this villa that grants you access to Minotaur's plans and most important files.\n\n\"What do you want me to do?\" he asks after your brief silence.\n\nThat's a good question. Now you know the meaning of the phrase \"like a kid in a candy store.\"\n\nSo, what do you want? After a moment to think it over, you finally tell your captive Minotaur agent to…\n\n*choice\n #Implant a virus in the Minotaur system.\n  *goto AVirus\n #Give me access to all of Minotaur's files.\n  *goto MinFiles\n #Delete all of Minotaur's files.\n  *goto DelFiles\n\n*label AVirus\n\"Stick this in there and execute,\" you order the agent while handing him a flash drive. The man does so, which quickly causes Minotaur's advanced network-security systems to activate. Without asking, he quickly disables them, allowing your virus to infect Minotaur without alerting anyone.\n\n\"What's it do?\" the agent asks, a quaver in his voice. You figure you might as well tell him, since he probably doesn't have very long to live.\n\n*choice\n #\"Minotaur machines will randomly malfunction, causing hundreds of casualties.\"\n  You'll enjoy listening to those twits Biff and Mindy on the news talk about how Minotaur's plans keep backfiring. It's hard to keep going with an operation when your own tanks and robots start destroying each other halfway through.\n  *set lethality +5\n  *set Minotaur -5\n  *goto TimeToLeave\n #\"It'll periodically hijack Minotaur broadcasts with classic British comedy routines.\"\n  What better way to give Minotaur a good sense of humor! They'll probably thank you for introducing them to the hilarious one about the dead ostrich, or the knights who say ni.\n  *set theatricality %+10\n  *goto TimeToLeave\n #\"Sensitive Minotaur info will be sent straight to my computers.\"\n  You'll always have the upper hand when dealing with Minotaur from now on. If they plan an aerial strike, you'll come with anti-air troops. If they launch a seaborne strike, you'll have water mines and subs waiting. If they come with flying missile-launching robots that can blow up entire cities…you'll go on vacation.\n  *set activist %-10\n  *goto TimeToLeave\n \n \n*label MinFiles\n\"Open up Minotaur's database on active operations and profiles,\" you order the agent. The man does so, revealing a treasure trove of vital information on Minotaur missions currently taking place. There's also a ton of dossiers on high-value targets and potential international players. Glancing through the list, you locate your own file. Knowing what Minotaur thinks of you will be useful, but you don't have time to read it now.\n\nYou pull out a flash drive and copy your file to it. After a moment, you copy Minotaur's dossier on The ${cname} as well, along with a few others that could come in handy.\n*set countfile true\n\n\"What should I do?\" the agent nervously asks. At least he knows you're here to do more than peeking. You decide to have the agent…\n\n*choice\n #Alter data to disrupt all active Minotaur operations.\n  You smile as the man starts messing with numbers and other important information. This should set back Minotaur for a week, maybe even several months, letting the world breathe a sigh of relief, at least until you step in to fill the gap.\n  *set Minotaur -2\n  *set activist %+10\n  *goto TimeToLeave\n \n #Change my profile to: villain most likely to change the world.\n  *set activist %+10\n  *goto TimeToLeave\n #Change my profile to: villain who will stop at nothing to get what they want.\n  *set activist %-10\n  *goto TimeToLeave\n #Change my profile to: most breathtaking and entertaining villain ever.\n  *set theatricality %+10\n  *goto TimeToLeave\n #Change my profile to: blood-soaked butcher.\n  *set lethality +2\n  *goto TimeToLeave\n\n*label DelFiles\n\"Find Minotaur's database and destroy everything inside,\" you order the agent. He gulps, but at the moment you're a more immediate threat than Minotaur, however fleeting that moment might be. By the time you're finished, though, maybe it will be the norm.\n\nThe man gets through Minotaur's security systems and pauses with the database folder on the screen. \"You just want me to delete them?\" he asks.\n\nYou pause and finally decide it works most to your advantage if you…\n\n*choice\n #Just delete the files.\n  You don't exactly have time to waste, and those missing files will hurt Minotaur.\n  *set Minotaur -2\n  *set theatricality %-10\n  *goto TimeToLeave\n #Replace them with joke files.\n  You hand over a flash drive and instruct the agent to copy certain files into the now-blank Minotaur database. Some are blank, some contain rude images, some make horrible screeching sounds when opened—you outdid yourself this time.\n  *set Minotaur -2\n  *set theatricality %+10\n  *goto TimeToLeave\n #Corrupt the files beyond repair instead of deleting them.\n  It may be a little riskier, but even if Minotaur has the capabilities to recover the files once you're finished with them, it'll take a long time. Their operations will be stalled for weeks! You'd love to see the Minotaur higher-ups pulling out their hair over files that just won't open. Preferably from a safe distance, however.\n  *set Minotaur -2\n  *set activist %+10\n  *goto TimeToLeave\n    \n*label TimeToLeave\n\nBefore you leave, it'd probably be best to deal with your little companion here so that he doesn't spill the beans to anyone.\n\n*choice\n #Kill him.\n  \"So, where's the nearest exit?\" you ask. He points to an emergency door just on the other side of the room. \"Thanks for the help, friend,\" you whisper in his ear before putting a bullet into his skull.\n  *set lethality +2\n  *goto DrakeEncounter\n #Erase his memory.\n  *if ingenuity > 65\n   \"So where's the nearest exit?\" you ask. He points to an emergency door just on the other side of the room. \"Thanks for the help, friend,\" you whisper in his ear before injecting him with memory nanites that will make him forget everything from the last twenty-four hours. You also pistol-whip him and spill some of his coffee on the floor. For all they know, he slipped and hit his head hard enough to lose his memory.\n   *set ingenuity %+5\n   *goto DrakeEncounter\n   \n  *else\n   \"So where's the nearest exit?\" you ask. He points to an emergency door just on the other side of the room. \"Thanks for the help, friend,\" you whisper in his ear before injecting him with memory nanites that will make him forget everything from the last twenty-four hours. At least, you would have injected them if you hadn't forgotten to bring them with you.\n   \n   Instead, you pistol-whip him and spill some of his coffee on the floor. For all they know, he slipped and hit his head hard enough to lose his memory.\n   *goto DrakeEncounter\n   \n #Just knock him out.\n  *if combat > 65\n   \"So where's the nearest exit?\" you ask. He points to an emergency door just on the other side of the room. \"Thanks for the help, friend,\" you whisper in his ear before putting him in one of those headlocks you've always wanted to try out. You know, the ones that wrestlers always do, except not fake.\n   \n   With the guy knocked out, you're pleased that he won't be a problem and that you got to practice your combat moves.\n   *set combat %+5\n   *goto DrakeEncounter\n   \n  *else\n   \"So where's the nearest exit?\" you ask. He points to an emergency door just on the other side of the room. \"Thanks for the help, friend,\" you whisper in his ear before trying to put him in one of those cool headlocks that wrestlers always do. However, you eventually realize how poor your close-combat skills are when the guard easily gets out of it.\n   \n   Instead, you pistol-whip him and spill some of his coffee on the floor. For all they know, he slipped and hit his head hard enough to lose his memory.\n   *goto DrakeEncounter\n  \n*label DrakeEncounter\n*page_break\nYou head out the door and feel the frigid breeze hit you like a slap to the face. You're on the far side of the villa from the helicopter pad. If you're going to get out of here, it's with the same chopper you came in on. It's either that or freezing to death while trying to jetpack across the Swiss Alps.\n\nNearing the heated pools (now empty), you hear a loud blast coming from behind the big front doors. They burst into flames and fly through the air as The Drake runs out into the cold mountain air.\n\n\"You didn't happen to see that ${cname} agent run by here, did you?\" ${che} playfully asks while walking toward you.\n\n\"No, but I'm sure if you keep looking you two can continue your little game. I've got a flight to catch.\"\n\n\"Do you think if I burn the place down, ${che}'ll come scurrying out like a cockroach?\" There's something almost childlike about The Drake's curiosity.\n\n\"With what? Looks like you lost your toy,\" you respond, noticing that The Drake is without ${chis} flamethrower. Perhaps The ${cname} busted it with a knife, or it simply ran out of fuel.\n\n\"With this.\"\n*page_break\n${checap} takes a flame grenade in ${chis} hand and prepares to toss it through one of the villa's windows. But then ${che} turns around and sends it flying straight at you.\n\nOh yeah, you forgot. The Drake is [i]crazy[/i].\n\nYou use your stolen pistol to shoot the grenade out of the air, causing a fiery explosion between you both. The blast and smoke make it hard to see The Drake, preventing you from following up with more shots.\n\nBefore the smoke clears, ${che} sends two more grenades in your direction. This time you shoot them while dodging to the right, moving around the blast to get a clean shot.\n\nBut your opponent is nowhere to be seen. You finally spot The Drake looking down from one of the villa's upper balconies. Unfortunately for you, ${che}'s already thrown three more grenades toward you, which now sit at your feet. You never thought you'd actually miss ${chis} flamethrower.\n\nYou barely avoid the blast by jumping into the nearest heated pool. The water feels boiling hot on your face, but it's better than getting roasted by the grenades.\n\nInstead of emerging right away, you press a button on your suit while still underwater. This was meant for fighting The ${cname} if things got too hairy, but you don't really have a choice. In a matter of seconds…\n\n*choice\n #My suit becomes an armored exoskeleton, complete with a missile-shooting arm cannon.\n  *if combat > 65\n   You burst out of the water and quickly send a few missiles toward The Drake. One makes a direct hit and sends ${chim} twirling across the air. The impact from landing on the cold, hard ground from several stories up is enough to shatter ${chis} mask and knock ${chim} out momentarily.\n   *set combat %+10\n   *set notoriety +2\n   *goto CountReturns1\n   \n  *else\n   You burst out of the water and quickly send a few missiles toward The Drake. They all miss, but the blast from the explosion sends ${chim} twirling across the air. The impact from landing on the cold, hard ground from several stories up is enough to shatter ${chis} mask and knock ${chim} out momentarily.\n   *set combat %+5\n   *goto CountReturns1\n  \n #I release a swarm of advanced toxin-injecting bee-like nanodrones.\n  *if ingenuity > 65\n   The swarm bursts out of the water and speeds toward The Drake, who desperately tosses a flame grenade at them. Too fast for the grenade, the drones escape the blast and sting your foe several times, sending ${chim} plummeting off the balcony. The impact from landing on the cold, hard ground is enough to shatter ${chis} mask and momentarily knock ${chim} out.\n   *set ingenuity %+10\n   *set notoriety +2\n   *goto CountReturns2\n   \n  *else\n   The swarm bursts out of the water and speeds toward The Drake, who desperately tosses a flame grenade at them. It's enough to take out all your nanodrones, but the blast is close enough to send ${chim} plummeting off the balcony. The impact from landing on the cold, hard ground is enough to shatter ${chis} mask and momentarily knock ${chim} out.\n   *set ingenuity %+5\n   *goto CountReturns2\n  \n #I create the illusion of a portal from which the ghosts of dead villains emerge.\n  *if terror > 70\n   The spirits of various villains moan and shriek while flying throughout the area, courtesy of your suit's holographic projector. It's quite a terrifying ordeal if you're not expecting it, even more so if they're villains that you'd killed with your own hands…or flamethrower. Startled, The Drake loses ${chis} footing and falls off the second-story balcony. The impact from landing on the cold, hard ground is enough to shatter ${chis} mask and momentarily knock ${chim} out.\n   *set terror %+10\n   *set notoriety +2\n   *goto CountReturns2\n   \n  *else\n   The spirits of various villains moan and shriek while flying throughout the area, courtesy of your suit's holographic projector. It's quite a terrifying ordeal if you're not expecting it, even more so if they're villains that you'd killed with your own hands…or flamethrower.\n   \n   Apparently it's not scary enough since The Drake starts laughing uncontrollably at your cheap parlor trick. In hilarious fashion, though, The Drake laughs enough to lose ${chis} footing and fall off the second-story balcony. The impact from landing on the cold, hard ground is enough to shatter ${chis} mask and momentarily knock ${chim} out.\n   *set terror %+5\n   *goto CountReturns2\n  \n *selectable_if(planning>0) #I pull out the liquid-nitrogen grenades I've been carrying since my first encounter with The Drake. (Costs 1 Planning Point.)\n \n  If there's one thing that can cool down a fiery vigilante, it's a few nitrogen grenades capable of freezing their targets in a thick layer of ice. You've held on to them just in case you ever faced The Drake or another fire-spewing villain again.\n  \n  You burst out of the water and send your three ice bombs toward The Drake. ${checap} dodges two, but the third hits ${chim} while ${che}'s in the air. Immobilized by the ice, The Drake plummets to the ground from the second-story balcony. The impact from landing on the hard ground is enough to shatter the vigilante's mask (and the layer of ice) and knock ${chim} out momentarily.\n  *set terror %+10\n  *set ingenuity %+10\n  *set combat %+10\n  *set planning -1\n  *goto CountReturns2\n\n*label CountReturns1\n*page_break\nBefore you can even decide whether to blast The Drake into pieces or not, you fall to your knees in agony as jolts of electricity surge through your suit and body. They eventually stop, and your exoskeleton reverts back into your normal suit.\n\nYou look up to see The ${cname} standing above The Drake. It appears ${che} threw one of his electrically charged knives right at your exoskeleton's power cells. Not cool. Not cool at all.\n*goto TheReveal\n\n*label CountReturns2\n*page_break\nWith The Drake down, you take a moment to recover. It was a quick fight, but it nonetheless took a lot out of you, especially with the whole \"holding your breath in near-boiling water\" part.\n\nYou finally look up to see The ${cname} standing above The Drake. Apparently ${che} was waiting for you to use up your last-ditch emergency trap before striking. Not cool. Not cool at all.\n*label TheReveal\n\n\"Thank you, ${name}. I knew you two would try to kill each other if I just stepped out of the way long enough.\"\n\n${checap} lightly kicks The Drake, who turns over on the cold villa courtyard. Through ${chis} broken mask you catch a glimpse of ${chis} face, which is infuriatingly familiar.\n\n\"Can you hear me, Drake? I hope you can, because I have orders to tell you something before you die.\"\n\nDoes Minotaur know The Drake's secret identity? You were pretty sure ${che} was one of those heroes who spent all their time in their costume, slowly growing crazier and crazier. And why the hell does ${chis} face look so familiar? \n\n\"Minotaur is ruled by twelve individuals, all cloned from the greatest criminal mastermind who ever lived. A woman, whose name I am sworn to never reveal.\" The ${cname} kicks The Drake again, a vicious sneer on ${chis} beautiful mouth. \"But even geniuses make mistakes.\" \n\nClones. Well, that explains that. But what's the mistake? The Drake moans softly as The ${cname} kicks ${chim} again.\n\n\"That's right, Drake. She had a moment of weakness. And from it came a child. A genetically impure, pathetic, worthless child.\" Another kick, another wince of pain on a face that you now recognize as very similar to those you saw on the Minotaur monitors. \"Did you know, little hero? Is that why you have pursued my men, burnt my friends? Or are you an ignorant little cuckoo, acting on urges you never understood?\" Another kick. \"Answer me, little bird. [i]Answer me![/i]\" \n*page_break\nThe Drake suddenly grabs The ${cname}'s leg, tripping ${chim} to the ground. They scuffle on the icy ground, rolling around for a while before The Drake finally kicks The ${cname} off ${chim}.\n\nThey both stand up, breathing heavily and glaring at each other…and you. Hey, it's the Mexican standoff you've always dreamed of! Of course, now that it's finally happening you wish it was happening some place warmer—and against less deadly opponents. On the other hand, they both seem very focused on each other and much less so on you. You aren't sure if you should be relieved or offended.\n\n\"You're lying!\" The Drake shouts, now holding an incendiary grenade in each hand. \"It's not true!\"\n\n\"Of course it is, you delusional little orphan,\" The ${cname} yells back, knives in hand ready to be thrown.\n\n*fake_choice\n #\"Umm…you two have fun! I'm out of here….\"\n #\"My money's on the Minotaur agent.\"\n  *set countess +2\n #\"Burn ${chim}, Drake!\"\n  *set drake +2\n #\"Hey! I'm still here, you know!\"\n\nYou take a few steps toward the helicopter pad, but both The Drake and The ${cname} shadow your movements. It seems they haven't forgotten you after all.\n\nOnly one of you is getting off this snowy rock on that helicopter, and it sure as heck better be you.\n\nThe Drake tosses the two grenades at the same time, one at you and one at The ${cname}. You both manage to dodge the blasts, but the slippery ground causes you to slip and fall hard.\n\nThe ${cname} responds in kind, tossing knives at both you and The Drake. You manage to roll out of the way, while The Drake does some fancy acrobatic moves to avoid getting stuck ${chim}self.\n\nYou suddenly have a clear line on both of them. Pistol in hand, you take aim and…\n\n*choice\n #Shoot at The Drake.\n  All the bullets miss except one, grazing The Drake's thigh. ${checap} cries out in pain. The ${cname}, out of knives, winks at you before disappearing by jumping off a nearby ledge.\n  *set countess +5\n  *set drake -5\n  *goto TalkDrake\n  \n #Shoot at The ${cname}.\n  All the bullets miss except one, grazing The ${cname}'s thigh and dropping ${chim} to his knees. Out of grenades, The Drake takes the opportunity to run up and dropkick The ${cname} like a high-flying wrestler. The Minotaur agent is sent sliding off a nearby ledge, falling to what could be ${chis} death.\n  *set drake +5\n  *set countess -5\n  *goto TalkDrake\n  \n #Shoot at both of them.\n  In quick succession, you shoot a few bullets at your opponents. The ${cname} manages to evade your shots but slips off the edge ${che} stood by, sending ${chim} sliding off the mountainside.\n  \n  The Drake is less bulletproof. One of your bullets grazes ${chis} thigh, dropping ${chim} to the ground. But ${che} bites back the pain and gets up. You admire ${chis} resolve.\n  *set drake -5\n  *set countess -5\n  *set notoriety +5\n  *goto TalkDrake\n  \n*label TalkDrake\n\nThe Drake stalks toward you, eyes uncertain, shaken by The ${cname}'s revelations. You think you see an opportunity to break the hero's resolve, maybe even turn ${chim} into an ally. After all, you both have a bone to pick with Minotaur.\n\n\"Hold on a sec,\" you call out, wishing you had worded that a bit better. Shakespeare would sound pretty stupid, too, if he'd just gotten his butt kicked five different ways on a giant frozen mountain.\n\n\"I'm listening,\" The Drake says, stopping ${chis} advance.\n\n*choice\n #Appeal to The Drake's idealism and propose an alliance.\n  *if (activist > 75) or (Drake > 4)\n   \"We take out The ${cname}, burn this villa to the ground, then settle our differences some other time. It's not every day that a villain and vigilante have the same goal: to strike a solid blow against the planet's worst criminal organization. We both know the world would be a better place without Minotaur, even if only for a little while. What do you say?\"\n   \n   You watch the flames dance in The Drake's eyes as ${che} reaches a decision.\n   \n   \"Makes sense to me. Let's torch their little hideout. I'll just have to kill you some other time,\" ${che} responds with a smile.\n   \n   You both look over the ledge where you last saw The ${cname}, but ${che}'s nowhere to be seen. Since ${che} could be hiding anywhere on this mountain or the surrounding wilderness, you go ahead and start setting the entire villa on fire. It was already partially burned from the earlier fighting, but now it's completely engulfed in flames.\n   *set Minotaur -5\n   *set Drake +5\n   *goto DrakeAcceptEnd\n  \n  *else\n   \"We take out The ${cname}, burn this villa to the ground, then settle our differences some other time. It's not every day that a villain and vigilante have the same goal: to strike a solid blow against the planet's worst criminal organization. We both know the world would be a better place without Minotaur, even if only for a little while. What do you say?\"\n   \n   You watch the flames dance in The Drake's eyes as ${che} reaches a decision.\n   \n   \"It's a great idea. Except we both know you don't care about the world at all. Just yourself.\" Suddenly, there's another flame grenade in The Drake's hand. You have no idea where ${che} keeps getting these things.\n   \n   \"I'll only torch this place when you and The ${cname}'s bodies are inside.\"\n   \n   Well, it was worth a shot. Fortunately, you have one last trick up your sleeve, which only works when someone is dumb enough to get this close to you. You press a hidden button on your left wrist, and a cloud of high-impact pepper spray blasts The Drake in ${chis} unprotected eyes. ${checap} screams in pain and begins rubbing at them.\n   *set Drake -5\n   *goto DrakeRefuseEnd\n   \n #Catch The Drake off-guard to knock ${chim} out and make an escape.\n  *if (ingenuity > 60) and (combat > 60)\n   \"Hear me out,\" you say, inching your steps toward the deranged vigilante.\n   \n   \"We take out The ${cname}, burn this villa to the ground, then settle our differences some other time. It's not every day that a villain and vigilante—\"\n   \n   Instead of finishing your sentence, you spray The Drake with a cloud of pepper spray from a canister hidden on your left wrist. ${checap} screams in pain while trying to rub it out of ${chis} eyes. You follow it with a quick takedown move that leaves The Drake groaning on the cold, hard ground.\n   *set ingenuity %+5\n   *set combat %+5\n   *set Drake -5\n   *goto DrakeRefuseEnd\n   \n  *else\n   \"Hear me out,\" you say, inching your steps toward the deranged vigilante.\n   \n   \"We take out The ${cname}, burn this villa to the ground, then settle our differences some other time. It's not every day that a villain and vigilante—\"\n   \n   Instead of finishing your sentence, you spray The Drake with a cloud of pepper spray from a canister hidden on your left wrist. While screaming in pain, The Drake grabs you and wrestles you to the ground, trying desperately to put ${chis} hands around your throat. Instead, you manage to squirm out by head-butting ${chim} in the face.\n   *set Drake -5\n   *goto DrakeRefuseEnd\n   \n #Threaten The Drake so that ${che} backs off.\n  *if (terror > 75) and (lethality > 10)\n   \n   \"By now you realize I'll do anything to get my way. I'll face criminal organizations in their own base, fight strong vigilantes, you name it. You also know that I'm not above taking lives to get what I want.\"\n   \n   \"So here's the deal,\" you continue. \"I'll let you stay here and burn this villa to the ground. If you want, we can settle our differences some other time, with fewer distractions. But if you attack now, I'll make sure you never leave this place alive.\"\n\n   The Drake stares deep into your eyes for what feels like an eternity before walking toward the villa. Almost as if you no longer exist, ${che} starts doing work on the villa, tossing flame grenades and such.\n   *set terror%+10\n   *set Drake -5\n   *goto DrakeRefuseEnd\n   \n  *else\n   \"By now you realize I'll do anything to get my way. I'll face criminal organizations in their own base, fight strong vigilantes, you name it. You also know that I'm not above taking lives to get what I want.\"\n   \n   \"So here's the deal,\" you continue. \"I'll let you stay here and burn this villa to the ground. If you want, we can settle our differences some other time, with fewer distractions. But if you attack now, I'll make sure you never leave this place alive.\"\n\n   The Drake stares deep into your eyes for what feels like an eternity and then laughs. \"If you didn't want to play anymore, all you had to do was ask,\" ${che} replies before walking toward the villa. Almost as if you no longer exist, ${che} starts doing work on the villa, tossing flame grenades and such.\n   *set Drake -5\n   *goto DrakeRefuseEnd\n\n*label DrakeAcceptEnd\n\n\"Too bad The ${cname} disappeared like a coward. ${checap} needs to pay for those…those lies ${che} was spouting. In any case, I'm out of here. And remember, the truce is off next time we meet.\" The Drake turns ${chis} back on you before walking off into the mountains. You assume ${che} landed some kind of flying vehicle somewhere out there.\n\nBefore The ${cname} or anyone else can surprise you with another attack, you rush into the same helicopter you arrived in and take off. You set course for Merit City, watching the large cloud of black smoke rising from the burning villa you were wining and dining in only an hour ago.\n\n*if (countfile = true)\n On the way home, you open your laptop and transfer the files you took from Minotaur's database. More curious than ever about your adversary, you open The ${cname}'s dossier. \n\n What you read makes you stare at the screen in shock. Then you slowly smile. Who would have guessed that an elite member of a criminal organization would use most of ${chis} ill-gotten money to fund orphanages in Moscow?\n \n The better question is: does ${che} know that Minotaur is well aware of ${chis} little secret?\n *achieve countsecret\n*finish\n\n*label DrakeRefuseEnd\n \nBefore The ${cname} or The Drake can surprise you with another attack, you rush into the same helicopter you arrived in and take off. You set course for Merit City, watching the large cloud of black smoke rising from the burning villa you were wining and dining in only an hour ago.\n\n*if (countfile = true)\n On the way home, you open your laptop and transfer the files you took from Minotaur's database. More curious than ever about your adversary, you open The ${cname}'s dossier. \n\n What you read makes you stare at the screen in shock. Then you slowly smile. Who would have guessed that an elite member of a criminal organization would use most of ${chis} ill-gotten money to fund orphanages in Moscow?\n \n The better question is: does ${che} know that Minotaur is well aware of ${chis} little secret?\n *achieve countsecret\n*finish", "chapterseven": "*image chap7.png\n\nIt's Friday evening and you're getting ready to relax after a solid week of villainy. After the tough fight with Fauxton, you recovered your strength and stamina by pulling a few small-time schemes to keep money coming in and your name in the papers. There's nothing wrong with villains who spend months or even years whipping up brilliant plans to terrorize the entire city, but you prefer to stay active even if you've still got a few bruises in places that you didn't know could bruise.\n\n*if Fauxton = 5\n Part of you still wishes you could have gotten Fauxton to join you, but at least your efforts weren't a complete waste. After you leaked your information about him, it was only a few short hours before Darkspace flew into a frenzy about the rookie supervillain team that took out the poor hero.\n\n You made sure they learned you were responsible, of course. Credit where credit is due.\n\n*if Fauxton = 4\n Part of you still wishes you could have gotten Fauxton to join you, but at least your efforts paid off in the end. After you rested from the fight, you buckled down and researched the hero until you dug up enough information on him to leak to the public. Only a few short hours later, Darkspace flew into a frenzy about the rookie supervillain team that took out the poor hero.\n\n You made sure they learned you were responsible, of course. Credit where credit is due.\n\nOf course, you also know that a good villain deserves their rest every once in a while. You've already got the entire weekend planned out, with all sorts of fun activities to loosen up: jet-skiing in your indoor lake, miniature golf with the goons. Maybe you'll even take your trained hyenas out for a nature walk.\n\n${name}'s super chill weekend starts now! And what better way to get things started than some video games? You've been anxious to finally find some time for…\n\n*choice\n #Sweet Crumble Adventure, a colorful yet thought-provoking puzzle game!\n  Time flies as you mix and match your way across hundreds of levels, going through several real bags of your favorite candy in the process. Someone's going to have an upset stomach tonight.\n  *set ingenuity %+5\n  *goto TheBuffet\n #Call of Obligation 17, that fast-paced combat game all my villain friends play!\n  You have a blast gunning down chumps, leading an army of teammates into battle, and cheating with your modded rapid-fire controller. You only use it because they're probably cheating too.\n  *set combat %+5\n  *goto TheBuffet\n #Native Sin, that terrifying zombie game I have to play with the lights on.\n  A dozen wussy screams and twice as many gruesome deaths later, you finally get used to the atmosphere and start making some progress. Having your own zombie army would be pretty neat, you think.\n  *set terror %+5\n  *goto TheBuffet\n  \n*label TheBuffet\n\nYour cellphone buzzes a few times, but you ignore it while you're playing. Eventually you get hungry and head to your other entertainment room, the one with a slightly smaller television to make room for an always-ready buffet.\n\nThe custom-made steam tables are always filled to the brim with your favorite foods, from seafood and salads to baked sweets and fried everything. You always tell your culinary minions to keep it stocked and ready for when you get the munchies.\n\nAfter filling up a few plates with delicious food, you make yourself comfortable on the couch and turn on the evening news. It may be worth seeing what some of the other villains are up to before you channel surf for a decent show to watch (and given that it's not yet prime time, \"decent\" is probably going to be a stretch).\n\n\"Our top story: Merit City is currently suffering one of its most alarming catastrophes in recent times, as ten percent of its population has suddenly started attacking everyone in their path as they march, zombie-like, toward the edge of the city.\"\n\n\"They kind of sound like you, Mindy. That one Thanksgiving dinner when you thought your sister was hitting on me.\"\n\n\"She fed you pumpkin pie and licked the whipped cream off your fingers!\"\n\n\"I was just being friendly! What was I supposed to do, not accept the pie?\" \n\n\"It's still unclear exactly what is causing all these citizens to act in this manner. In an unfortunate coincidence, V.A.N.G.U.A.R.D. was called to help thwart a major attack elsewhere just before the attack broke out. When the task force's troops arrived in Mexico City, they found that the city was completely safe, and no request for help had been sent.\"\n\n\"That's right, Biff, you two-timing pig. Now Merit City's local authorities are left for the time being to deal with this situation on their own. Fortunately, all the infected people are headed outside of the city. We actually have live footage ready to show….\"\n*page_break\nNews footage plays of people walking like mindless zombies down a street. An innocent bystander, frozen in fear, gets pummeled for a while by one of the zoned-out citizens for standing in the way. The camera pans to where they're headed. The location looks unhappily familiar.\n\nAs the news channel returns to the bickering anchors, you shut off the TV and head for your secret aboveground observatory. You installed it a few months ago to watch police and traffic patterns—definitely not to watch that cutie who buys a cup of coffee at the same stand every Tuesday and Thursday between 7:45 a.m. and 8 a.m. Sometimes 11 a.m. if ${she} is running late. You'll introduce yourself someday, you tell yourself.\n\nYou orient the telescope toward the city. Sure enough, a group of zombie-like citizens are slowly but steadily making their way toward you. Either you've become so unpopular that your mind-control research team figured out a way to force people to hang out with you, or there's a rival villain out there that wants you beaten to death by a mob of the people whose lives you enjoy making miserable.\n\nBut you wouldn't be a true supervillain if you hadn't prepared something for the day the people of Merit City finally went mob-and-pitchfork on you. Although it'd be much more satisfying if they were actually sentient, you nonetheless prepare to activate one of your defensive measures that'll stop or slow them down just outside of your base's vicinity.\n\n*choice\n #Inflict psychological damage by stopping them with a reflection of their ravenous selves!\n  *if ingenuity > 65\n   A wall of mirrors as tough as bulletproof glass slides out from the ground, forming an impenetrable perimeter around your base. You've waited so long to watch the people of Merit City fail to take you down, with only their own hideous reflections to look at. To attack you is to attack themselves! They'll have to face their own inner villainy and finally admit that you and they are not so different after all. \n  \n   Yeah, that sounded a lot more deep the first time you thought of it.\n  \n   Of course, it would have worked perfectly against people that actually had control over their brains. Instead of looking at their reflections in horror, they're punching and kicking their way through the mirrors, some even breaking a limb to get through. You shake your head, bummed that you won't get to recycle the glass for the mirror maze you've been sketching in the margins of your planning notes.\n   *set activist %+10\n   *goto SteelCall\n   \n  *else\n   A wall of mirrors as tough as bulletproof glass slides out from the ground, forming an impenetrable perimeter around your base. You've waited so long to watch the people of Merit City fail to take you down, with only their own hideous reflections to look at. To attack you is to attack themselves! They'll have to face their own inner villainy and finally admit that you and they are not so different after all. \n  \n   Yeah, that sounded a lot more deep the first time you thought of it.\n  \n   Of course, it probably would have worked perfectly if the mirrors slid out all the way. Instead, the mobbing citizens merely trip over them and stand back up. It's like watching one of those crazy Black Friday videos where people fall but only one or two actually get trampled, all for a present they'll gift to a family member they can't stand.\n   *set activist %+5\n   *goto SteelCall\n  \n #Unleash a group of monkeys trained to steal wallets, snatch purses, and scratch faces!\n  *if terror > 70\n   The monkeys burst out of their secret cages and prepare to make off with plenty of cash and valuable possessions. They even know to scratch up the people that lack anything worth stealing. That'll teach the people of Merit City not to mess with you, no matter what part of the social hierarchy they belong too! You'll even make some easy cash in the process, which is always a bonus.\n  \n   Of course, only people that actually have control of their brains are afraid of vicious monkeys. Instead of acting according to plan, your monkeys are the ones running away after getting severe beatings from the mindless people inching toward you. You shake your head sadly. Monkeys aren't as cheap to stock as people think, and now you're going to have to table ${name}'s Circus of Terror for a while.\n   *set activist %-10\n   *goto SteelCall\n   \n  *else\n   The monkeys burst out of their secret cages and prepare to make off with plenty of cash and valuable possessions. They even know to scratch up the people that lack anything worth stealing. That'll teach the people of Merit City not to mess with you, no matter what part of the social hierarchy they belong too! You'll even make some easy cash in the process, which is always a bonus.\n  \n   Excited to be free from the stuffy cage they're always kept in, the monkeys eventually forsake all commands and all run into the city. You shake your head sadly. Monkeys aren't as cheap to stock as people think, and now you're going to have to table ${name}'s Circus of Terror for a while.\n   *set activist %-5\n   *goto SteelCall\n  \n #Bust out my giant double-barrel cannon that shoots glue and chicken feathers!\n  *if combat > 65\n   Hilarity ensues as you stop the people dead in their tracks with shots of strong glue, followed by a blast of chicken feathers. You can only assume their ridiculous appearance makes them realize just how foolish it is to try attacking you head-on. They'll think twice the next time they try to rise up against you.\n  \n   Of course, only people in their right mind care about how ridiculous they look. The brainless crowd continues toward you, while the ones that got stuck to the ground exhibit an incredible show of strength by pulling themselves away from the glue. You shake your head, realizing that someone somewhere is probably laughing at you right now.\n   *set theatricality %+10\n   *goto SteelCall\n   \n  *else\n   Hilarity ensues as you stop the people dead in their tracks with shots of strong glue, followed by a blast of chicken feathers. You can only assume their ridiculous appearance makes them realize just how foolish it is to try attacking you head-on. They'll think twice the next time they try to rise up against you.\n  \n   Of course, only people in their right mind care about how ridiculous they look. The brainless crowd continues toward you, while the ones that got stuck to the ground exhibit an incredible show of strength by pulling themselves away from the glue. You shake your head, realizing that someone somewhere is probably laughing at you right now.\n   *set theatricality %+5\n   *goto SteelCall\n   \n *selectable_if(planning>0) #Release my team of zombie hunters to kill them all! (Costs 1 Planning Point.)\n   It just so happens that you've been preparing for some kind of zombie-like invasion for your entire villainous career. Heck, even before you were a villain you had plans of turning your parent's lame mansion into some kind of anti-zombie fortress.\n   \n   To prepare, you trained a highly specialized team wielding every weapon you'd expect an undead slayer to have: shotguns, molotov cocktails, and even a cool jeep with a mounted turret.\n   \n   Your team has a blast, taking down about a quarter of the people before getting overwhelmed and consumed by the crowd. You didn't really expect them to take out such a huge part of the city, but at least they distracted the horde of undead for a while.\n   \n   You'd make a memorial for them later if you could even remember their names. Oh well.\n   *set planning -1\n   *set lethality +10\n   *set combat %+10\n   *goto SteelCall\n\n*label SteelCall\n\nMoments after your plan fails, you feel your phone rumbling in your pocket. Pulling it out, you see a ton of missed calls. Right, you ignored them while playing video games. Not good. The current call is coming up as \"Unknown,\" which, given your supercomputer's illegal database of cell phone numbers, shouldn't be possible. You warily pick up the call.\n\n\"Is this ${name}?\" asks a familiar voice that bewilders you at first, but finally after a few seconds you put a do-gooder face to it: Steelheart.\n\n*fake_choice\n #\"Hey, baby. Miss me?\"\n #\"Can I call you back later? I'm a little busy….\"\n #\"How the heck did you get this number?\"\n #\"${name} can't answer right now. Please leave a message.\"\n\n\"Look, I've been trying to get a hold of you all night, and I don't have a lot of time. Unless you're forcing half of Merit City to come to your birthday party, you're probably wondering what's going on.\n\n\"My team captured one of the infected people for study and discovered that they're suffering from a neurological virus that turns them into murderous half-mechanical puppets with super strength. It shows off a combination of theatricality, technical ingenuity, and total disregard for human life. Sound like anyone you know?\"\n\n\"Arachnus,\" you mutter as the hairs on your body stand up.\n\n\"I don't know what the hell you've done to piss him off, but the big man is gunning for you, and he's using innocents to do it. Normally, I couldn't care less what you villains do to each other, but those people are going to die in killing you if we can't stop them. I'm willing to help you if we can make an agreement that you'll work to let these people go.\"\n\n\"I'll see what I can do,\" you find yourself responding.\n\n\"Let's meet at the entrance to your base. I can get there about a minute before your welcoming party arrives. You'd better have a cure on hand when I arrive,\" ${she} says before hanging up.\n*page_break\nOnly the second-in-command of V.A.N.G.U.A.R.D. could be so clever. You can either take things into your own hands but piss off Steelheart, or make a cure that gets you out of this pickle and also gets you on ${shis} good side. Even if it does benefit you, it's hard convincing yourself to do something that would help that villain-hunting team you hate so much. Not only that, it would also take an exceptionally ingenious mind to make a remedy in such a short time. Doctor Arachnus didn't get to where he is today (which is trying to murder you, you remind yourself) by making his viruses easy to hack.\n\nWill you try to develop the cure and distribute it like Steelheart asked? If successful, you'd be getting rid of the half-mechanical army storming your base, while also earning some serious kudos from a certain task-force leader. However, you'd also bet that both V.A.N.G.U.A.R.D. and Merit City would be willing to pay some serious cash for this cure if you sold it to them instead of handing it out as a freebie.\n\nBetter yet, you could make a fake cure. It'd manipulate the nerve-attacking nanobots so that the infected people would be in your control, with Steelheart none the wiser. You think you might be smart enough to hijack Doctor Arachnus's signal, but it would be a gamble. Or you could just order your goons to shoot the mechanozombies. It'd be messy, but effective, regardless of what Steelheart would think.\n\nAnd here you thought choosing which video game to play was going to be the toughest decision of the night….\n\n*choice\n #Do what Steelheart asked and develop a cure to distribute.\n  It's the nice, clean way of dealing with the mob coming to bash your head in. You'll also get some brownie points with Steelheart, which is awesome. The downside is that you'll actually be helping some of Merit City's citizens return to normal. You just hope your heart doesn't grow three sizes for actually doing these people a favor.\n  *set activist %+10\n\n  *gosub smarterminions\n\n  Even with their help, it's all mostly on your ingenuity and brilliance to whip up a cure, hand it to Steelheart in exchange for a boatload of credit and a potential favor, and get back to your super-relaxing weekend. Hmm, the only problem is that you need a live specimen to study, draw blood from, et cetera. You'd be wasting valuable time if you did it yourself.\n\n  *page_break\n  *gosub SideKick\n\n  *gosub createcure\n\n  *gosub flirtsteel\n\n  You nod and call for your troops to follow you out of the base. Together you shoot the cure darts into every infected citizen, which prove to be easy targets since they're all moving straight toward you like mobile target-practice dummies, mouths agape and arms outstretched. Now you know what it's like to be a chocolate-filled piñata ready to get beat open by a crowd of candy-craving kids.\n\n  \"I'll give you a minute to get your people out of sight before I call in the cleanup teams,\" Steelheart tells you. As ${she} suggests, you and the team go back into your base just as a bunch of ambulances and other vehicles arrive to tend to the previously infected people.\n  *goto CureCheck\n  \n #Develop a cure and sell it to V.A.N.G.U.A.R.D.\n  It's the nice, clean way of dealing with the mob coming to bash your head in. You'll also get a decent amount of money for your trouble, which is always awesome. The downside is that you'll actually be helping some of Merit City's citizens for a change. You just hope your heart doesn't grow three sizes for actually doing these people a favor.\n  *set activist %-10\n\n  *gosub smarterminions\n  \n  Even with their help, it's all mostly on your ingenuity and brilliance to whip up a cure, hand it to Steelheart in exchange for a small fortune, and get back to playing video games and eating. Hmm, the only problem is that you need a live specimen to study, draw blood from, et cetera. You'd be wasting valuable time if you did it yourself.\n\n  *page_break\n  *gosub SideKick\n\n  *gosub createcure\n\n  \"Money. Cash. Dinero. I'll only cure those Arachnus puppets out there if you make it worth my while.\"\n\n  ${shecap} shakes ${shis} head before pressing a few buttons on one of ${shis} gadgets. \"Done. I'm sure what I he steps.\n\n  Instead of a hello or sarcastic remark, ${she} grabs you by the throat and starts choking you against the stair railing. Unless this is some rough form of foreplay, you're pretty sure ${she}'s trying to kill you. You squirm out of ${shis} grip and shove ${shim} hard enough so that ${she} goes tumbling all the way to the bottom of the stairway. Unfortunately, your gun also falls down the stairs.\n\n  \"Those who interfere with my plans always meet a gruesome fate, ${name}!\" ${she} growls out in a hideous, gurgling voice. ${shecap} is definitely infected and just delivered a message to you from Doctor Arachnus himself.\n\n  ${shecap} gets up and prepares to charge up the stairs again, leaving you no choice but to…\n\n  *fake_choice\n   #Kick ${shim} Spartan-style to send ${shim} down the steps.\n   #Try to grab my gun to blast ${shim} away.\n   #Dive at ${shim} like a pro wrestler off the top turnbuckle.\n \n  Before you even make your move \n  *if Slog = true\n   a hulking figure appears behind Steelheart and slams ${shis} head against one of your precious statues, breaking it to pieces and knocking Steelheart out cold. It's none other than Slog, the sidekick you forgot was back from vacation. He's probably been waiting this entire time for you to call him for help. At least he won't be surprised when you forget his birthday.\n \n   \"Toss ${shim} outside so V.A.N.G.U.A.R.D. picks ${shim} up later,\" you command. You could have Slog break ${shis} neck first, but hey, ${she} didn't put a bullet in your head when ${she} had the chance the first time you met.\n   *set combat %+5\n   *set theatricality %+5\n   *goto TheMassacre\n  *elseif Hackmaster = true\n   a flying machine appears above Steelheart and shocks ${shim} with some serious voltage, knocking ${shim} out cold. It's one of Hackmaster's toys, courtesy of the sidekick you forgot was back from vacation. She's probably been waiting this entire time for you to call her for help. At least she won't livering the specimen. You like the idea of a sidekick ready for action in case something comes up inside the city.\n *return\n*elseif Hackmaster = true\n \"Sure, why not?\" responds Hackmaster, indifferent that you finally called her up. You run up to your telescope room to watch her do her thing. A few minutes pass before you see her van coming down the road leading to your base. Now near the mob that's no more than twenty minutes away from your lair, a large claw emerges from the vehicle's roof and grabs one of the mindless citizens. Hackmaster then hits the gas and drives straight toward your base with the captured victim, running over a few of the infected people along the way.\n \n You hope Steelheart didn't see that. But hey, you can't complain when your sidekick gets the job done. Confident that you'll soon have this all under control, you tell her to head back into the city after delivering the specimen. You like the idea of a sidekick ready for action in case something comes up inside the city.\n *return\n*else\n All you hear is creepy laughter on the other side of the phone. You run up to your telescope room to watch The Star do his thing. A few minutes pass before you see him coming down the road on a motorcycle. Now near the mob that's no more than twenty minutes away from your base, he pulls up and tosses a net over one of the mindless drones before dragging him behind his bike all the way to your base.\n \n It was a bit terrifying to watch, and that guy is in for a world of hurt once he snaps out of it, but you can't complain when your sidekick gets the job done. Confident that you'll soon have this all under control, you tell The Star to head back into the city after delivering the specimen. You like the idea of a sidekick ready for action in case something comes up inside the city.\n *return\n\n*label createcure\nYou and your team run several tests on the infected specimen before developing a potential cure. You try it on the person whose blood you drew to create it, and moments later he wakes up almost as if he had simply taken a long nap. You and the team celebrate, which involves several of the terrible high fives you'd expect from nerds with poor hand-eye coordination and motor skills.\n\nThe true test will be on all the people outside, though. The team takes the next ten minutes to create more of the cure, making sure it's potent enough to require only a few drops to work. You have them rig a few semiautomatic tranquilizer guns with enough cure darts for the entire drone army. You take a gun and have the rest distributed to a few of your best combat troops, whom you then command to wait for your signal before following you outside the base. It's best if you meet up with Steelheart alone.\n\n*page_break\n\nYou arrive at your lair's grand entrance, complete with a giant staircase and several statues of yourself in various spectacular poses. Steelheart is already there, walking up the steps.\n\nInstead of a hello or sarcastic remark, ${she} grabs you by the throat and starts choking you against the stair railing. Unless this is some rough form of foreplay, you're pretty sure ${she}'s trying to kill you. You squirm out of ${shis} grip and shove ${shim} hard enough that ${she} goes tumbling all the way to the bottom of the stairway.\n\n\"Those who interfere with my plans always meet a gruesome fate, ${name}!\" ${she} growls out in a hideous, gurgled voice. ${shecap} is definitely infected and just delivered a message to you from Doctor Arachnus himself.\n\nCharging up the stairs to attack you again, ${she} instead falls limp as soon as you send one of your cure darts into ${shis} shoulder. Back to ${shim}self but still woozy, you help ${shim} to ${shis} feet.\n\n\"Took you long enough,\" ${she} announces, now able to stand on ${shis} own.\n\n*fake_choice\n #\"Thanks for trying to choke me to death!\"\n #\"Yeah, you're welcome….\"\n #\"Do I get a kiss for saving you?\"\n \n\"I'm not here to chat. Do you have enough of the cure for everyone or not?\" ${she} asks after shaking ${shis} head a few times.\n \n\"I do,\" you respond, \"but I'll only administer it to all the people outside on one condition.\"\n\n\"Yeah? What's that?\" ${she} responds.\n*return", "chaptersix": "*image chap6.png\n\n\"Kneel before the power of the sun!\"\n\nOnce again, Fauxton shoots out blasts of scorching solar energy from his hands, blowing to pieces the bulldozer you were just crouching behind not two seconds ago. It's pretty hard to hide from a sun-powered superhero that can fly, has super strength, and shoots scorching fire blasts from his hands—but hey, you're still alive. Suddenly, you regret giving your new sidekick permission to take the weekend off.\n\n\"Come out and play, villain! It is time you face the fires of justice!\"\n\nNo thanks, you think while leaning against one of the many large machines left behind at this abandoned construction site. It's the perfect place for a hero like Fauxton to fight a destruction-craving villain such as yourself. No innocent bystanders or important buildings to destroy. What a drag.\n\nRealizing that it's been far too long since Fauxton shouted his last annoying threat, you peek over the motor grader you're hiding behind, but fail to spot him. You then look up to see your do-gooder opponent flying directly above you, prepared to unleash yet another blast from his hands straight at you.\n\nMoments away from having your head torched off, you have a flashback to earlier in the day, when you were preparing for this encounter….\n*page_break\n[i]Early that morning…[/i]\n\nAs you sat in your office at the most comfortable office desk stolen money could buy (complete with a bobblehead toy of yourself), you pondered ways to counter fire-favoring opponents. You were a big fan of using fire yourself, and even owned a few flamethrowers, but the recent scrap you had with The Drake was too close for comfort. Close enough that you flinched every time you lit your gas stove.\n\nYour first few ideas weren't too great, especially the one with the giant fire extinguisher. But being the creative villain that you were, you eventually came up with several methods for dealing with a hotheaded opponent. The only question was: which one would take advantage of your best skills?\n\n*choice\n #Taking them out of their element by covering the battlefield with chilling weather.\n  *if terror > 60\n   \"Your end has come!\" shouts Fauxton as the fiery blasts shoot from his hands. You manage to roll out of the way while also activating your weather modifier. The flying hero launches several more blasts before stopping completely, his attention now on the snow and hail falling from the sky. \n  \n   Eventually, a thick fog rolls across the construction site, forcing Fauxton to land since he can no longer see more than a few feet ahead of him.\n   \n   \"I am not afraid of your renowned scare tactics, villain!\" he shouts with false vigor. Deep down he must know that his super strength, flying abilities, and fire blasts are useless if he can't see you. Too bad the fog can't do anything against his obnoxious battle phrases.\n   *set terror %+10\n   *set planning +1\n  \n   (You have earned a Planning Point!)\n   *goto WeatherFight\n   \n  *else\n   \"Your end has come!\" shouts Fauxton as the fiery blasts shoot from his hands. You manage to roll out of the way while also activating your weather modifier. The flying hero launches several more blasts before stopping completely, his attention now on the snow and hail falling from the sky. \n  \n   Eventually, a thick fog rolls across the construction site, forcing Fauxton to land since he can no longer see more than a few feet ahead of him. His super strength, flying abilities, and fire blasts are useless if he can't see his target! Too bad the fog can't do anything against his obnoxious battle phrases.\n   *set terror %+5\n   *goto WeatherFight\n  \n #Using a hacking device that programs nearby machines to attack high-energy targets.\n  *if ingenuity > 60\n   \"Your end has come!\" shouts Fauxton as the fiery blasts shoot from his hands. You manage to roll out of the way while activating your hacking device. The superhero launches several more blasts before grunting loudly as two cranes swing to crush him with their wrecking balls—sans Miley Cyrus. It's actually kind of like squashing a fly by clapping, which never really happens.\n   \n   A motionless Fauxton plummets into a large pile of bricks that some poor construction workers get to stack neatly again.\n   *set ingenuity %+10\n   *set planning +1\n\n   (You have earned a Planning Point!)\n   *goto CraneSmash\n   \n  *else\n   \"Your end has come!\" shouts Fauxton as the fiery blasts shoot from his hands. You manage to roll out of the way while also activating your hacking device. The superhero launches several more blasts before getting hit out of the sky by a crane swinging a wrecking ball—sans Miley Cyrus. It's kind of like a fly getting smacked with a rolled-up newspaper.\n   \n   Fauxton spins through the air before crashing through a large pile of bricks that some poor construction workers get to stack neatly again.\n   *set ingenuity %+5\n   *goto CraneSmash\n  \n #Using a combat reflector shield to give them a taste of their own tongue-burning medicine.\n  *if combat > 63\n   \"Your end has come!\" shouts Fauxton as the fiery blasts shoot from his hands. Before they can reach you, you activate your reflector device. It quickly expands from the size of a wristwatch to a three-foot-wide shield. The shield's special coating causes the fire blasts to bounce off straight back at their source.\n   \n   Thanks to all your training with this shield, which involved a lot of minion trips to your base's emergency ward, you manage to reflect every fireball back at Fauxton, sending him plummeting to the ground below.\n   *set combat %+10\n   *set planning +1\n\n   (You have earned a Planning Point!)\n   *got
