<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diabolical — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "diabolical", "title": "Diabolical", "scenes": {"chaptereight": "*hide_reuse\n\n*image chap8.png\n\nYou awaken, bleary-eyed and hungover. You're not sure how, but a planned weekend of fun and relaxation turned into a week-long event, complete with a bout of serious spending to keep you and your cronies entertained. You've still got plenty of reserve cash for when things get tough, but the gold-plated boat that's now embarrassingly decorating the bottom of Lake Merit did set you back financially. Plus that private trip to the moon. Rocket fuel, extra oxygen, mid-flight snacks…who knew space travel was so expensive?\n\nAfter laughing at the idea of getting a job or renting your lair's extra rooms to college kids, you decide to do the obvious: robbery. And while banks were fine when you were starting out, you feel like it's time to graduate to something larger. Besides, most of the bankers in this town have gotten pretty wimpy about their defenses. Token security forces, unlocked vaults…it's a damn shame, is what it is. You'll have to bring that up on Darkspace soon.\n\nInstead, you're going for the jackpot, even if it takes days to plan, dozens of troops, and your most expensive gadgets. That's right, you're going after the Federal Gold Depository at Fort Klanx.\n\nOnly a handful of villains have ever tried to pillage the place, and only two or three made it out alive, much less with anything in their pockets. Hopping on your computer, you scan your database for information about the fortress.\n\nIn case it wasn't obvious from the name, the place is heavily fortified. Thick metal walls, electric fences, more metal walls, and more electric fences. And, for those intrepid thieves with a taste for the old school, barbed wire fences, a crap-ton of video cameras, and a small horde of explosive mines tossed into the mix. It's like massive, impenetrable lasagna, except stuffed with beautiful gold instead of beef and cheese.\n\nThat's not to mention the thousands of heavily armed guards and military units watching the place 24/7. Crack squads all, they make Merit City's police force look like children wearing cheap Halloween costumes. If they don't get you, the tanks and attack helicopters probably will.\n\nYou know the juice is worth the squeeze, but it's all a matter of going at it the right way.\n*label AttackChoice\n\n*choice\n *hide_reuse #Lead an all-out assault with everything I've got.\n  *goto FullAssault\n *hide_reuse #Use my new teleportation device to sneak in my stealth squad.\n  *goto Teleportation\n *hide_reuse #Create a diversion by staging a fake alien invasion in a nearby city.\n  *goto AlienAttack\n\n\n*label FullAssault\n*page_break\n*if combat > 50\n [i]A week later…[/i]\n \n You immediately notify the goons in charge of your combat troops, making sure every one of your soldiers, tanks, and aircrafts is ready for war. Fort Klanx's troops may be eternally vigilant, but you're sure they'll be dropping gold bricks in their pants when they see what you're bringing to the party.\n\n The ground shakes as your expensive tanks hit the ground in unison, dropped from your even-more-expensive military aircrafts. The tanks are made from an advanced material so they're light enough to drop from parachutes, but strong enough to withstand plenty of punishment. In your head, and only in your head, you refer to it as Murder Mythril. Along with the tanks, hundreds of your armed troops land, brandishing military weapons of all types: machine guns, rocket launchers, rifles. There are even a few swords; they won't do much good in the attack, but they'll make things look cooler.\n \n Although you lose most of your aircrafts to the air defenses, the planes still manage to carpet bomb the entire area, severely crippling the ground defenses surrounding the fort. Fortunately, the place is proverbially sturdy, so none of your precious gold was damaged in the bombing. Now in position, your tanks start bringing a world of hurt on the remaining military units still daring to defend the place. You lose a good number of troops and war vehicles, but the gold you're about to take will more than cover it. Besides, you know they're all happy to die in the glory of your service. Or would be, maybe, if you actually cared.\n \n Realizing that they're facing the real deal, the last few soldiers standing in your way surrender. With only so much time before the National Guard arrives, you quickly have them rounded up before blowing open the front entrance of the fort. \n \n Only you, a highly trained explosives expert, and about a dozen armed goons enter Fort Klanx. In a matter of minutes, you charge through the place, dealing with security personnel along the way as you blow down walls to make an easy path for your vehicles to come in and fill up with gold.\n \n The explosives guy blows open the main vault door, and inside you find something quite unexpected….\n *goto FieldTrip\n*else\n [i]A week later…[/i]\n \n You immediately notify the goons in charge of your combat troops, making sure every one of your soldiers, tanks, and aircrafts is ready for war. Fort Klanx's troops may be eternally vigilant, but you're sure they'll be dropping gold bricks in their pants when they see what you're bringing to the party.\n\n The ground shakes as your expensive tanks hit the ground in unison, dropped from your even-more-expensive military aircrafts. The tanks are made from an advanced material so they're light enough to drop from parachutes, but strong enough to withstand plenty of punishment. In your head, and only in your head, you refer to it as Murder Mythril. Along with the tanks, hundreds of your armed troops land, brandishing military weapons of all types: machine guns, rocket launchers, rifles. There are even a few swords; they won't do much good in the attack, but they'll make things look cooler.\n \n However, you eventually realize how poor you are in the art of warfare, mainly strategy and placement, when Fort Klanx's defenses annihilate your army with one well-placed super bomb. In retrospect, positioning your entire awesome army in one spot might have been a bad idea.\n \n *gosub Whew\n *goto AttackChoice\n\n*label Teleportation\n*page_break\n*if ingenuity > 50\n [i]A week later…[/i]\n \n You make a few final tweaks to your brand new, very expensive teleportation device. The government can build all the walls it wants around the fort. It'll do them no good when you and a few infiltration experts instantly transport yourselves directly into the heart of their sanctum. You take a happy moment to imagine the looks on their faces when they finally realize they've been guarding empty vaults for who knows how long.\n \n You step away from the controls, confident they are properly set. You're in Elizabethville, a city about fifteen miles south of Fort Klanx, just close enough for your teleporter to work. Unfortunately, the device will need a few hours to recharge, so once you're inside you'll need to find another way out. Hopefully, the hologram generators you've brought along will distract the troops long enough to let you avoid getting shot about a thousand times in the face.\n \n Maybe in a few years you'll develop one that can teleport you to and from any location at any time. But until then, you'll have to use this one sparingly, on special occasions. Like entering heavily fortified gold reserves, or amusement parks. After all, they're the real villains, with their outrageous ticket prices and expensive cotton candy!\n \n You look around the compartment of the semi-trailer truck your device is hidden inside. In front of you sits your beautiful teleportation device, and around it a dozen goons trained for infiltration missions. They'll come with you to take down any armored personnel hanging out inside the vault.\n \n Prepped and ready to go, you and the goons step onto the teleportation pad. There's a stink of ozone in the air, and the next thing you know, you're standing in front of the largest stacks of gold your eyes have ever seen. At least you think it's gold. These purple and yellow polka dots flashing in your vision make it hard to tell. But hey, teleportation is a new science. Side effects are bound to happen. You'll just have to remember to count your toes when you get home tonight.\n \n You hear a sound behind you, and you and your goons turn to see something you definitely didn't plan for….\n *goto FieldTrip\n\n*else\n Prepped and ready to go, you and the goons step onto the teleportation pad. There's a stink of ozone in the air, and the next thing you know, you're struggling for breathe as you find yourself at the bottom of the Atlantic Ocean. It doesn't take a genius to know that you messed up some of the calculations.\n \n *gosub Whew\n *goto AttackChoice\n\n*label AlienAttack\n*page_break\n*if terror > 50\n [i]A week later…[/i]\n \n Dark storm clouds suddenly appear in the midday sky. Lightning crashes like the sound of doom. A few miles from Fort Klanx, the locals in the small town of Elizabethville watch a flying saucer descend from the heavens, firing laser blasts left and right. At least, it looks like a flying saucer. You know it's just one of your airborne assault vehicles, heavily modified to look like a hostile invader from an alien world. But hey, that's no reason to ruin the surprise for everyone else. You've always wanted to cause your own modern-day [i]The War of the Worlds[/i] panic!\n \n Crowds of people run in a panic as more of your crafts descend. A few land briefly, discharging your troops, now clad in weird metal armor and green skin. You assured your goons that the dye would wash off when they hit the shower tonight. Lying is fun.\n \n You rev up your stealth assault vehicle, preparing to head for the fort while its defenders rush to the town. But then your radio crackles to life, and your plan evolves.\n \n \"—attention. All residents of Elizabethville should evacuate the city. We have provided transportation that will take you directly into the safety of Fort Klanx. Find the military vehicles throughout town. I repeat, find a military vehicle to be taken to Fort Klanx.\"\n \n You give a few quick commands to your troops, and soon you and the rest of the squad are clad in tacky-looking clothes from VillainCo's \"Dumb Yokel\" fashion set. You and the squad find one of the waiting military vehicles and climb aboard, getting a free ride into the very place you plan to rob. The only thing that could make this better is if the guards started stuffing your pockets with gold bars!\n \n Once inside, you and your group sneak away from the rest of the civilians being escorted through the fort. Normally, it'd be impossible to breach security like this, but the majority of the fort's troops are busy dealing with the \"alien invasion.\" You head straight for the main vault and, with a curt nod, give your explosives guy the okay to blow the door.\n \n Once the smoke clears, you and your team are confronted with near-impossible amounts of gold. And something else, which you hadn't planned for….\n *goto FieldTrip\n\n*else\n Actually, you're not sure how comfortable you are with \"terror\" as an art form. Mildly spooky is the best you can usually manage. And since you're attacking the most heavily fortified place on Earth, it would probably be a good idea to bring your A-game.\n *goto AttackChoice\n \n*label FieldTrip\n*page_break\nKids. There are kids in the vault, getting germs on all your beautiful gold. One of them has his finger shoved entirely up his nose. \n\nYou can only guess that they are, or were, on some kind of field trip. Lucky little punks. The only trips your lame school ever went on were to your teacher's backyards, where you got to do \"community enrichment\" by painting fences and pulling weeds. You make a mental note to do something awful to that school once you have the free time.\n\nA heavy-set, frightened lady pushes past the kids, putting herself between you and them. Honestly, she looks a lot more frightened than any of her students. She shouts \"Don't hurt them!\" in a histrionic voice.\n\nThen, pale-faced, she faints. Which you didn't even know people still did. It's kind of embarrassing. Anyway, now it's just you and the kids.\n\n\"Are you here to steal the gold?\" a goofy-looking girl with glasses asks you.\n\n*fake_choice\n #\"Anyone ever tell you not to talk to strangers, kid?\"\n  \"Anyone ever tell you not to steal from vaults?\" she asks back before scratching her nose. Sass! You find yourself smiling despite yourself, for sass is well known as the first step on the long road to villainy. You resist an urge to give her one of your goons' laser pistols for practice.\n #I flick her glasses off her face and laugh.\n  Ah, the classics. You wonder if these kids have any candy you can steal. It puts you in such a good mood that you don't even mind when she kicks you in the shins after picking her glasses back up.\n #\"I need it to build the world's greatest chocolate factory!\"\n  \"Awesome!\" she shouts. Wait, she's right, that would be awesome…. You could make the chocolate, and market it to the world, and then never, ever, sell anyone a single bite. Except maybe this kid. You have to credit her enthusiasm.\n  \nMoral reflection moment: You're an evil person. You are a profoundly evil person. But you're not entirely certain you're an evil enough person to turn a group of kids into dust just because they got in your way. And even if you did, you've seen the responses that kid-killers get, both on Darkspace and in the real world. The combined superhero and V.A.N.G.U.A.R.D. efforts to wipe you from the face of the Earth would be nothing compared to the social ostracism you'd get from the villain community. Doctor Arachnus can pull this kind of stuff off because everyone's bone-deep afraid of him. But you're not Arachnus. Not yet, anyway. So instead, you:\n\n*choice\n #Convince them with a villainous monologue to help me escape.\n  *if theatricality >60\n   Now is as good a time as any for these kids to realize that the world is a sad, dangerous place.\n  \n   \"Listen up, kids. Let me tell you about what your lives are going to be like. You're going to grow up, and go to high school, and get pushed around and picked on by people telling you to follow the rules. Just like your parents do now. You'll go to college, and learn a whole new set of rules, about paying your bills, and your student loans, and not making a scene. Eventually you'll graduate and get a job where someone half as smart as you gets paid twice as much to tell you what to do. They're going to make you follow the rules for the rest of your life. If you let them.\n  \n   \"You know what I do every day? Whatever I want. And when someone tries to make me follow the rules, I tell them to go to hell. Because I'm a villain, and that means freedom. So…what do you kids want to be when you grow up?\"\n  \n   There's a long moment. And then a little fat kid in a brightly colored T-shirt stands up and shouts, \"When I grow up, I want to be a villain!\" Then another, a little dweeb of a girl in overalls: \"When I grow up, I want to be a villain!\" Soon, they're all on their feet, chanting. You raise your voice over the din.\n  \n   \"Why not be villains now? Help me escape with all this gold. Go distract the guards coming this way! All you have to do is yell wildly and run out of here. Doesn't that sound better than following the rules?\"\n  \n   Unable to contain themselves, the excited kids rush past you, streaming down the halls and yelling like crazy. You wipe your eyes. You never knew you could be so damn inspiring.\n  \n   After your goons pack millions of dollars' worth of gold into the bags (complete with classic money signs, of course), you prepare to leave when an all-too-familiar figure steps into the vault.\n   *set activist %+20\n   *set terror %+10\n   *goto SteelEncounter\n   \n  *else\n   Now is as good a time as any for these kids to realize that the world is a sad, dangerous place.\n  \n   \"Listen up, kids. Let me tell you about what your lives are going to be like. You're going to grow up, and go to high school, and get pushed around and picked on by people telling you to follow the rules. Just like your parents do now. You'll go to college, and learn a whole new set of rules, about paying your bills, and your student loans, and not making a scene. Eventually you'll graduate and get a job where someone half as smart as you gets paid twice as much to tell you what to do. They're going to make you follow the rules for the rest of your life. If you let them.\n  \n   \"You know what I do every day? Whatever I want. And when someone tries to make me follow the rules, I tell them to go to hell. Because I'm a villain, and that means freedom. So…what do you kids want to be when you grow up?\"\n  \n   There's a long moment. And then a little kid in a brightly colored T-shirt stands up and shouts, \"You can't fool us with your evilness, villain.\" Then another, a little dweeb of a girl in overalls: \"Let's be heroes and tell the guards!\" Soon, they're all on their feet, chanting. You scratch your head in complete disbelief.\n  \n   Unable to contain themselves, the excited kids rush past you, streaming down the halls and yelling like crazy. It didn't exactly go according to plan, but at least they'll be a distraction.\n  \n   After your goons pack millions of dollars' worth of gold into the bags (complete with classic money signs, of course), you prepare to leave when an all-too-familiar figure steps into the vault.\n   *goto SteelEncounter\n  \n #Scare them into carrying some of the gold for me.\n  *if terror > 75\n   Time to turn lemons into your own personal army of pack mules! They probably won't be able to carry much, but you're willing to bet no one will try harming them even if they're carrying your loot.\n  \n   \"All right, germ bags. Grab as much gold as you can and follow me, or else I'll tell your parents you behaved badly during this field trip.\" You make your face extra frowny so they know you mean it.\n  \n   Without thinking, the kids quickly start filling their backpacks with gold bars, then wait for your next order. You sigh a little sadly. You hate to see kids already so trained to follow authority, even if that authority is your own.\n  \n   Your adult goons start grabbing gold too, carrying quite a bit more than the children can. Soon, their sacks (complete with classic money signs) are full. You prepare to leave, haul in tow, when an all-too-familiar figure steps into the vault.\n   *set activist %-20\n   *set notoriety +2\n   *goto SteelEncounter\n   \n  *else\n   Time to turn lemons into your own personal army of pack mules! They probably won't be able to carry much, but you're willing to bet no one will try harming them even if they're carrying your loot.\n  \n   \"All right, germ bags. Grab as much gold as you can and follow me, or else I'll tell your parents you behaved badly during this field trip.\" You make your face extra frowny so they know you mean it.\n  \n   \"You can't tell us what to do!\" shouts a kid, then another: \"Yeah! We're not afraid of you!\" Before you know it, they all storm out of the vault without a bag in their hands. Either these kids are very desensitized by television or you've got a serious issue to resolve. If you can't scare kids into doing your dirty work, who can you?\n  \n   Your adult goons start grabbing gold instead, carrying quite a bit more than the children would have, anyway. Soon, their sacks (complete with classic money signs) are full. You prepare to leave, haul in tow, when an all-too-familiar figure steps into the vault.\n   *set activist %-5\n   *goto SteelEncounter\n   \n #Offer them cool weapons if they help me out.\n  *if combat >= 70\n   Time to trick them into thinking they'll actually get an expensive weapon from you in exchange for serving as your gold mules.\n  \n   \"All right, kids. Who wants one of these cool toys?\" You take one of your goon's guns and cock it to make that awesome [i]chk chk[/i] sound, which gets the kids all excited.\n  \n   \"I'll let you have one but you have to help me get all this gold out of here. Sounds fair, right?\"\n  \n   Without thinking, the kids quickly start filling their backpacks with gold bars, then wait for your next order. You sigh a little sadly. You hate to see kids already so gullible, even if you're the one fooling them. The sooner they learn that life is one empty promise after another, the better, right?\n  \n   Your adult goons start grabbing gold too, carrying quite a bit more than the children can. Soon, their sacks (complete with classic money signs) are full. You prepare to leave, haul in tow, when an all-too-familiar figure steps into the vault.\n   *set activist %+20\n   *set notoriety +2\n   *goto SteelEncounter\n   \n  *else\n   Time to trick them into thinking they'll actually get an expensive weapon from you in exchange for serving as your gold mules.\n  \n   \"All right, kids. Who wants one of these cool toys?\" You take one of your goon's guns and cock it to make that awesome [i]chk chk[/i] sound.\n   \n   \"I'll let you have one but you have to help me get all this gold out of here. Sounds fair, right?\"\n  \n   \"Guns are bad!\" several kids shout before they all run out of the vault, screaming wildly. Sure, in your hands guns might be. Either way, there goes your free labor.\n  \n   Your adult goons start grabbing gold instead, carrying quite a bit more than the children would have, anyway. Soon, their sacks (complete with classic money signs) are full. You prepare to leave, haul in tow, when an all-too-familiar figure steps into the vault.\n   *set activist %+5\n   *goto SteelEncounter\n\n #Offer them cool gadgets and equipment if they help me out.\n  You have to admit, one of the main reasons kids find supervillains entertaining is because of all the cool gadgetry. Time to see if it's enough to make them serve as your gold mules.\n\n  \"All right, kids. Who wants one of these cool toys?\" You hold up what looks like an ordinary watch, but which emits a holographic image at the press of a button. Gasps run through the assembled kids.\n\n  \"I'll let you have one but you have to help me get all this gold out of here. Sounds fair, right?\"\n\n  *if ingenuity > 65\n   With wild cheers, the kids quickly start filling their backpacks with gold bars, then wait for your next order. You sigh a little sadly. You hate to see kids already so gullible. It's almost enough to make you want to really give them the gadgets.\n  \n   Your adult goons start grabbing gold too, carrying quite a bit more than the children can. Soon, their sacks (complete with classic money signs) are full. You prepare to leave, haul in tow, when an all-too-familiar figure steps into the vault.\n   *set notoriety +2\n   *goto SteelEncounter\n\n  *else\n   \"I've gotten cooler toys from a cereal box!\" one kid shouts before they all run out of the vault. You tell yourself you aren't too insulted. You also make a mental note to check out the latest cereal-box prizes. More importantly, there goes your free labor.\n\n   Your adult goons start grabbing gold instead, carrying quite a bit more than the children would have, anyway. Soon, their sacks (complete with classic money signs) are full. You prepare to leave, haul in tow, when an all-too-familiar figure steps into the vault.\n   *goto SteelEncounter\n  \n*label SteelEncounter\n*page_break\n\"Steelheart,\" you mutter. The troops around you nervously point their weapons at the superspy. You just hope they don't do anything embarrassing while you're trying to act impressive. Steelheart barely seems to notice.\n\n\"What are you doing here?\" ${she} asks with genuine confusion. \"What are you doing with those kids?\"\n\n\"Didn't know they'd be here,\" you mutter, a little sheepish. To your annoyance, ${she} snorts with laughter.\n\n\"Are you serious? First Arachnus sends a mindless army to kill you, and now you decide to rob Fort Klanx the day my sister's kid is here on a field trip? You've got crap for luck, you know that?\" \n\n\"This isn't my fault. Besides, doesn't the second-in-command of the world's least competent anti-supervillain agency have better things to do than babysit? Or did they demote you for being careless enough to let Arachnus infect thousands of people?\" you respond with a grin. You're way, way off your plan, but you're not going to let ${shim} see you sweat.\n\n*if DroneArmy = true\n It occurs to you that Steelheart still has your control nanites floating around in ${shis} pretty little brain. It also occurs to you that you left the control mechanism you've been working on to activate the nanites at home. \n\n It occurs to you that this sucks.\n\n*if Steele > 5\n \"I'll let that sad excuse for a taunt slide, ${name}, but only because you're still on my very short list of villains I don't absolutely hate. But seriously, can you just get out of here? Grab a bar or two as a souvenir and get the hell out. I've got bigger fish to fry and can't have you getting in the way.\"\n \n Bigger fish? Getting in the way? You're the biggest fish around! You and Steelheart have an understanding, but you can't let this insult to your honor stand!\n *goto DealWithSteelheart\n \n*else\n \"But hey, it's your lucky day today, I guess, because I literally don't have time to shoot you and your little toy soldiers in the head. So why don't you drop the gold and get the hell out of here. I've got bigger fish to fry, and you're just going to get in the way.\"\n \n Bigger fish? Getting in the way? You're the biggest fish around! You don't say that, though, because you're worried it would sound stupid.\n *goto DealWithSteelheart\n\n*label DealWithSteelheart\n\nSince ${she}'s clearly not busy enough to just let you waltz out of here with the gold, you should probably come up with a quick plan to get ${shim} out of your hair. Of course, you didn't plan for any of this, so it's time to improvise.\n\n*choice\n #Fight ${shim}.\n  *if combat > 60\n   \"Just how we trained, fellas,\" you shout before signaling your troops to take action. They aim at Steelheart, but ${she}'s already in the air by the time they open fire. Steelheart lands on one of your goons and breaks his neck, then pulls out ${shis} pistol and takes out two more of your men.\n   \n   Too busy giving you a nasty HR problem to resolve, Steelheart doesn't notice you pull a hand grenade from your costume. You toss it into the stacks of gold nearest to Steelheart and your men, then grab two straggling kids watching the fight and dive behind another stack.\n   \n   The grenade explodes, bringing down an avalanche of gold bars that buries all but three of your goons—and Steelheart. You remind yourself just how tough the V.A.N.G.U.A.R.D. deputy is when ${shis} hand bursts out of the glittering pile. Slowly ${she} knocks heavy gold bars away, clearing the weight from ${shis} body. Luckily, ${she}'s only about halfway done when the strain of the beating proves too much, and ${she} collapses. \n   *goto EnterMinotaur1\n   \n  *else\n   You signal your troops to take action. They aim at Steelheart, but ${she}'s already in the air by the time they open fire. Steelheart lands on one of your goons and breaks his neck, then pulls out ${shis} pistol and takes out two more of your men.\n   \n   Before you have a chance to jump into the fray, Steelheart pulls out some sort of grenade and tosses it at the stacks of gold nearest to ${shim}self and your men, then dives across the room, putting ${shim}self between the explosion and the huddling schoolchildren. Without thinking, you roll away from the device.\n   \n   It explodes, bringing down an avalanche of gold bars that buries all but three of your goons. The remaining ones put their hands up to surrender. Cowards. But, you admit, it's not like what you're going to do to them for giving up is any worse than what Steelheart could do if they kept fighting.\n   *goto EnterMinotaur2\n  \n #Trick ${shim}.\n  *if ingenuity > 60\n   You smile before pressing a button on your suit. Seconds later, a dozen holographic versions of yourself appear to surround Steelheart. As you and the holograms all start circling ${shim}, ${she} fails to hide the priceless look of confusion on ${shis} face.\n   \n   Steelheart makes a move, using ${shis} pistol to shoot bullets straight through three of the holograms in quick succession. So…your relationship with the superspy is definitely escalating. Still, you manage to survive this bizarre variant of Russian roulette.\n   \n   The holograms then all charge at ${shim}, forcing ${shim} to punch and kick through air and intangible light. Distracted by your fakes, ${she} doesn't see your high-powered shock weapon coming. Strictly short-range, it's still powerful enough to knock out a resilient fighter like Steelheart.\n   \n   You deactivate the holograms as your V.A.N.G.U.A.R.D. foe lies on the ground, sleeping like a deadly, well-paid baby with terrible fashion sense.\n   *goto EnterMinotaur1\n   \n  *else\n   You smile before pressing a button on your suit. Seconds later, a dozen holographic versions of yourself appear to surround Steelheart. As you and the holograms all start circling ${shim}, ${she} fails to hide the priceless look of confusion on ${shis} face.\n   \n   Steelheart makes a move, using ${shis} pistol to shoot bullets straight through three of the holograms in quick succession. So…your relationship with the superspy is definitely escalating. Still, you manage to survive this bizarre variant of Russian roulette.\n   \n   You key in the command to send your holographic clones forward in a diversionary attack. To your dismay, though, they all disappear just as you're about to sneak up on Steelheart with your shock weapon. Damn prototypes. This is what happens when you let the tech nerds have air hockey tournaments on company time, no matter what your morale officer says.\n   \n   Your V.A.N.G.U.A.R.D. foe sees you coming and kicks the shock weapon out of your hands before landing another kick to your chest, sending you rolling backward. ${shecap} didn't literally kick your butt, but your rear end is bruised anyway….\n   *goto EnterMinotaur2\n  \n #Scare ${shim}.\n  *if terror > 65\n   \"You know what you have to do, men. Point your weapons at the kids.\" Your voice is as steely as you can make it, and your troops aim without hesitation. Steelheart puts ${shis} hand to ${shis} pistol but doesn't make a move, fear and a little disbelief on ${shis} face.\n   \n   \"Either you surrender and let us through, or my firing squad here opens fire. We both know this is the kind of tragedy you swore to prevent when you took the job.\" \n   \n   Your eyes lock. You do everything you can to put conviction in yours.\n   \n   With a deep sigh, Steelheart drops ${shis} pistol to the ground and puts ${shis} hands in the air. You smile coldly at ${shim} before nodding at your troops to administer a powerful electric shock, sending the V.A.N.G.U.A.R.D. agent sprawling into unconsciousness.\n   *goto EnterMinotaur1\n   \n  *else\n   \"You know what you have to do, men. Point your weapons at the kids.\" Your voice is as steely as you can make it, and your troops aim without hesitation. Steelheart puts ${shis} hand to ${shis} pistol but doesn't make a move, fear and a little disbelief on ${shis} face.\n   \n   \"Either you surrender and let us through, or my firing squad here opens fire. We both know this is the kind of tragedy you swore to prevent when you took the job.\" \n   \n   Your eyes lock. You do everything you can to put conviction in yours.\n   \n   With a deep sigh, Steelheart reaches down to drop ${shis} pistol…then brings it up again quickly and opens fire. Before you can react, each one of your goons is lying dead with a bullet through their head. You're not sure how ${she} saw through your bluff, but apparently you're not terrifying enough to pull this sort of stunt on a trained soldier of ${shis} caliber.\n   *goto EnterMinotaur2\n   \n *selectable_if(planning > 0) #What do you mean, I didn't plan for this? I [i]always[/i] have a plan. (Costs 1 Planning Point.)\n  \"Fine, you win. Put down your weapons, boys,\" you order. The troops do so and put their hands in the air.\n  \n  \"Is this some kind of trick? Since when does ${name} give up so easily?\" Steelheart asks with caution.\n  \n  \"No tricks. In fact, here's my weapon.\" You drop your backup shock weapon to the ground and kick it to Steelheart's feet. \"I want that back eventually, though. You have no idea how much trouble I had to get into to acquire it from Nautilus.\"\n  \n  \"Nautilus, huh?\" Steelheart asks with curiosity. ${shecap} goes to pick up the weapon. There's a popping sound, and ${she} collapses to the ground as hundreds of volts of electricity arc through ${shis} body. The weapon never belonged to Nautilus, but it does have a lot of other interesting features.\n  \n  You're just happy your research paid off. It's always a crapshoot with tips on Darkspace, but the rumor that Steelheart was a secret collector of Nautilus memorabilia was just too juicy to pass up. Your gun wouldn't have stood up for long against ${shis} collector's scrutiny, but it was enough to slip past ${shis} defenses.\n  *set notoriety +5\n  *set planning -1\n  *goto EnterMinotaur1\n \n*label EnterMinotaur1\n*page_break\n\"Steelheart is down. Not exactly according to plan, but the job is done.\"\n\nYou turn around to see the schoolteacher you'd forgotten about speaking into a device attached to her right ear. You notice for the first time a small bull's horn tattooed on her hand.\n\n\"There's someone else here. A supervillain. Took down Steelheart singlehanded, actually.\"\n*goto TheCountess\n\n*label EnterMinotaur2\n*page_break\nYou fall to your knees, ready to meet your fate at Steelheart's hands. You had a good run, you reflect. Decent, anyway. Adequate. Before you can bargain yourself down to \"dismal,\" you and Steelheart are both startled to see a dart suddenly sticking out of ${shis} neck. Almost immediately, ${she} falls to the floor, out cold and barely breathing.\n\n\"Steelheart is down, according to plan.\"\n\nYou turn around to see the schoolteacher you'd forgotten about speaking into a device attached to her right ear. You notice for the first time a small bull's horn tattooed on her hand.\n\n\"However, there's someone else here,\" she continues. \"A supervillain, after the gold. Put up a decent fight against Steelheart, actually.\"\n*goto TheCountess\n\n*label TheCountess\n\nThe lady nods a few times before pulling herself from the floor with surprising grace and walking toward you, a communicator extended.\n\n\"Put it on.\"\n\nNo one ever says please anymore, you think. Still, curiosity dictates that you at least find out what the hell is going on here.\n\n\"Your name, please,\" purrs a ${cman}'s Russian-accented voice through the earpiece.\n\n*fake_choice\n #\"I'll tell you my name if you tell me yours.\"\n #\"Can we chat later? I've got some gold to steal.\"\n #\"Someone who finds accents very sexy.\"\n  *set Countess +2\n\nAll you hear is silence for a moment.\n\n\"Voice analysis complete. Your name is ${name}, a supervillain from Merit City. Short operation time, but your track record is good. Your Darkspace reputation is solid, you've taken down a few heavy hitters, and Steelheart hasn't shot you yet.\n\nGreat, you've got a secret admirer. A secret admirer with really, really good records. Great.\n\n\"Hmm, they even have an image of you on Darkspace. A villain that's not hard on the eyes? Who knew?\" The ${cman} continues, \"It appears you're actually worth introducing myself to. I am The ${cname}, and I serve Minotaur.\"\n\nYour eyes widen upon hearing the name. Minotaur. The only group powerful enough to take on V.A.N.G.U.A.R.D. in a straight fight. The scourge of Europe. The Masters of the Maze of Crime. This is how bad your luck has gotten, that you've managed to run into both Steelheart and a Minotaur stooge on the same job. All you need now is your eighth-grade PE teacher to show up, and everyone you've been trying to avoid all your life would be here.\n\n\"It's not often people beat us to our goals, ${name}. Unfortunately, though, you're trying to steal gold already earmarked for Minotaur's technology budget. You understand how expensive it is to stay ahead of the competition in this game. So if you could just step away from our money and walk away, Ms. Trackton will let you live. You understand.\" The schoolteacher smiles at you coldly.\n\nYou went through all this trouble and ${che} expects you walk out of here without a dime? But the fact is you're dealing with a pretty serious criminal organization here. They've got ray guns, cloning devices, and a million other high-tech projects that put anything your research and development team has created to shame. Not to mention several literal armies of terrifyingly vicious groups. Simply put, they're rich, and they're powerful, and you're not.\n\nStill…you're not going to close the balance by just letting them waltz away with your money. And if you think you've got the skills and the reputation, you might be able to get them to back down.\n\n*choice\n #Try intimidating The ${cname} into letting me complete my plan.\n  *if (terror > 60) and (Lethality > 5)\n   \"I've killed so many, ${cname}. Heroes, villains, anyone who gets in my way. Do you think I'd hesitate to kill your little pawn here? To kill you? Do you think I'm afraid of you?\"\n   \n   ${checap} finally responds after a few seconds of silence. \"Most people choke on their own tongues when they hear of my employer. It is…intriguing to hear someone be so uncowed. You have earned my respect, ${name}. If only a little.\n   \n   \"However, you have not earned my gold. Please, step away before I am forced to respect your corpse.\"\n   *set Countess +5\n   *set Minotaur +5\n   *goto GoldenDecision\n   \n  *elseif combat > 60\n   \"Do you know what I hear in your voice, ${cname}? Complacency. You and yours have spent so long on the top of the hill that you've forgotten how vicious an underdog can be. You know so much about me, you must know how many troops I keep on payroll. What sort of firepower I carry. With all this knowledge, I have to wonder if you know the only thing that matters about me in this moment: that I'm not afraid of you.\"\n   \n   ${checap} finally responds after a few seconds of silence. \"Most people choke on their own tongues when they hear of my employer. It is…intriguing to hear someone be so uncowed. You have earned my respect, ${name}. If only a little.\n   \n   \"However, you have not earned my gold. Please, step away before I am forced to respect your corpse.\"\n   *set Countess +5\n   *set Minotaur +5\n   *goto GoldenDecision\n  *else\n   You try to come up with something scary to say, some bluff that would make The ${cname} back down. You fail, and hear a throaty Russian laugh from the other end of the line.\n   \n   \"Yes, that is what I thought.\"\n   *set Countess -5\n   *set Minotaur -5\n   *goto GoldenDecision\n\n #Try convincing The ${cname} to make a deal with me.\n  *if (notoriety > 10) and (theatricality > 60)\n   \"I have no desire to make you or Minotaur my enemy, ${cname}.\"\n\n   \"A wise decision.\"\n\n   \"But I'm not ready to give up all this gold, either.\"\n\n   \"And now a foolish decision to counter your previous wisdom.\"\n\n   \"Just think about the possibilities,\" you continue over ${chis} disapproving comment, injecting so much enthusiasm and sincerity into your voice that you almost feel genuine excitement. \"I may be a new villain, but I've already made a name for myself. You yourself even commented on it! With my abilities and your resources, we'd be unstoppable.\"\n\n   ${checap} finally responds after a few seconds of silence. \"Most people choke on their own tongues when they hear of my employer. It is…intriguing to meet someone bold enough to try to cut a deal. You have earned my respect, ${name}. If only a little.\n\n   \"However, the partnership you suggest exists only in your imagination. Please, step away from the gold before you become equally nonexistent.\"\n   *set Countess +5\n   *set Minotaur +5\n   *goto GoldenDecision\n\n  *else\n   You take a deep breath and launch into a rambling speech about how much it would benefit both you and The ${cname} (really!) to work together. It sounds like babbling even to you…and the throaty Russian laugh from the other end of the line suggests it sounded as weak as you feared.\n\n   \"Really? Trying to pull the old 'join me' trick on an agent of Minotaur?\"\n   *set Countess -5\n   *set Minotaur -5\n   *goto GoldenDecision\n \n #Figure out what to do with the gold before Minotaur arrives.\n  *goto GoldenDecision\n  \n*label GoldenDecision\n\n\"Sorry but first come, first serve,\" you quip before tossing the device to the ground and blasting the fake teacher with your shock weapon. Since talking is cheap and gold is expensive, you'd better figure out what to do with it before Minotaur's troops arrive and take the choice out of your hands.\n\n*choice\n #Only take half the gold and leave the rest to Minotaur.\n  If you only take half the gold, they can only be half as angry as if you'd taken it all, right? At least with half the gold you'd be able to buy some toys to defend yourself when Minotaur comes for you. You swear, some global crime syndicates never learned how to share.\n  \n  \"Time to get out of here,\" you mutter before pressing a button on your suit. The ground begins to shake and rumble as a massive, diamond-tipped drill bit bursts through the insufficiently armored floor. You'll have to give ${sidekick} some kind of bonus for coming up with this part of the plan. Much better than the original idea of escaping past all the military jets and helicopters in a hot-air balloon. That was the kind of plan that got booze banned from brainstorming sessions.\n  \n  Several goons jump out and start filling up the drill vehicle's storage compartment with gold bars. Once it's full and ready, the goons jump in and disappear to make way for another drill, which does the same. Once half the gold is gone, you hop into the last drill and make your escape.\n  *set Countess +5\n  *set Minotaur +5\n  *set activist %+10\n  *goto TheInvite1\n \n #Steal all the gold and leave none for Minotaur.\n  If you were good at sharing, you'd be a shareholder or a sharecropper or something. Besides, at least this way you'll have literal tons of money to spend on defending yourself when Minotaur comes to take it back.\n  \n  \"Time to get out of here,\" you mutter before pressing a button on your suit. The ground begins to shake and rumble as a massive, diamond-tipped drill bit bursts through the insufficiently armored floor. You'll have to give ${sidekick} some kind of bonus for coming up with this part of the plan. Much better than the original idea of escaping past all the military jets and helicopters in a hot-air balloon. That was the kind of plan that got booze banned from brainstorming sessions.\n  \n  Several goons jump out and start filling up the drill vehicle's storage compartment with gold bars. Once it's full and ready, the goons jump in and disappear to make way for another drill, which does the same. Once all the gold is gone, you hop into the last drill and make your escape.\n  *set Countess +2\n  *set activist %-10\n  *goto TheInvite2\n \n #Expose all the gold to radiation and tell no one.\n  All of this gold isn't going to do you much good if you're just going to spend it all on new gadgets to defend yourself from Minotaur. They'll no doubt come after you for stealing their prize, and since you went through all this trouble just to leave without a dime, you may as well teach them to not take you lightly in the future.\n  \n  \"They can have their precious gold,\" you mutter before pressing a button on your suit. The ground begins to shake and rumble as a massive, diamond-tipped drill bit bursts through the insufficiently armored floor. You'll have to give ${sidekick} some kind of bonus for coming up with this part of the plan. Much better than the original idea of escaping past all the military jets and helicopters in a hot-air balloon. That was the kind of plan that got booze banned from brainstorming sessions.\n  \n  Goons hop out of the drill to start filling it with gold, but you signal them to stop. You take off your entire suit and lay it in the center of the vault. Your troops look away awkwardly, doing their best to avoid seeing their villainous master in nothing but underwear.\n  \n  \"Let's go!\" you command as you press a button on the suit. Your suit's last-resort countermeasures kick in, showering the area with radiation. Most villains go with the classic self-destruct button when they're defeated, but you'd rather give whoever finally defeats you a slow, agonizing death.\n  \n  You're already in the lead-shielded drill when the suit reaches critical levels. You're certain your little surprise will take out quite a few of Minotaur's people. If you're lucky, some of the gold may even go into circulation and kill plenty of innocent victims as well!\n  *set lethality +10\n  *set activist %+15\n  *goto TheInvite3\n\n #Expose all the gold to radiation and tell the world.\n  All of this gold isn't going to do you much good if you're just going to spend it all on new gadgets to defend yourself from Minotaur. They'll no doubt come after you for stealing their prize, and since you went through all this trouble just to leave without a dime, you may as well teach them not to take you lightly in the future.\n  \n  \"They can have their precious gold,\" you mutter before pressing a button on your suit. The ground begins to shake and rumble as a massive, diamond-tipped drill bit bursts through the insufficiently armored floor. You'll have to give ${sidekick} some kind of bonus for coming up with this part of the plan. Much better than the original idea of escaping past all the military jets and helicopters in a hot-air balloon. That was the kind of plan that got booze banned from brainstorming sessions.\n  \n  Goons hop out of the drill to start filling it with gold, but you signal them to stop. You take off your entire suit and lay it in the center of the vault. Your troops look away awkwardly, doing their best to avoid seeing their villainous master in nothing but underwear.\n  \n  \"Let's go!\" you command as you press a button on the suit. Your suit's last-resort countermeasures kick in, showering the area with radiation. Most villains go with the classic self-destruct button when they're defeated, but you'd rather give whoever finally defeats you a slow, agonizing death.\n  \n  You're already in the lead-shielded drill when the suit reaches critical levels. You're certain your little surprise will take out quite a few of Minotaur's people. In a month or so, you'll let the world know about their deadly gold, inciting global panic. Maybe you'll even wait until your birthday. You know, as a lovely gift to yourself.\n  *set lethality +5\n  *set activist %+10\n  *set notoriety +5\n  *goto TheInvite4\n\n #Cover all the gold in chocolate. That's right—sweet, sweet chocolate!\n  All of this gold isn't going to do you much good if you're just going to spend it all on new gadgets to defend yourself from Minotaur. They'll no doubt come after you for stealing their prize, and since you went through all this trouble just to leave without a dime, you may as well teach them not to take you lightly in the future.\n  \n  \"They can have their precious gold,\" you mutter before pressing a button on your suit. The ground begins to shake and rumble as a massive, diamond-tipped drill bit bursts through the insufficiently armored floor. You'll have to give ${sidekick} some kind of bonus for coming up with this part of the plan. Much better than the original idea of escaping past all the military jets and helicopters in a hot-air balloon. That was the kind of plan that got booze banned from brainstorming sessions.\n  \n  Goons hop out of the drill to start filling it with gold, but you signal them to stop. You bark out an order to grab Device C-136 from the vehicle's glove compartment. Your scientists called you mad when you asked them to develop a bomb that would coat an area in delicious chocolate. They were probably right, but heck, that's why they're tech dweebs and you're a full-on supervillain! You laugh maniacally as you set the bomb to detonate. You're sad that you'll miss the best part, when Minotaur realizes that every bar of chocolate-wrapped gold is pressed with your logo.\n  \n  \"Let's go!\" you command, while pulling a chocolate bar from your Secret Emergency Chocolate pouch (all of this talk of chocolate has got you wanting some chocolate). You and your goons hop into the drill and take off as a massively delicious explosion rocks the tunnel behind you. Minotaur will get their precious gold, but they'll also realize they're not dealing with just any supervillain. If there's one thing Minotaur or V.A.N.G.U.A.R.D. can't stand, it's an unpredictable foe. You just hope some of their troops are allergic to chocolate.\n  *set nautilus +5\n  *set theatricality %+15\n  *set notoriety +5\n  *goto TheInvite5\n\n*label TheInvite1\n*page_break\n[i]Back at home, a few days later…[/i]\n\n\"My mother was a saint and you know it!\"\n\n\"Calm down, Biff. I'm just trying to accurately convey just how devastating Hurricane Norma will be once it hits the west coast. Moving on, can you please tell us what we've learned about the recent Fort Klanx attack?\"\n\n\"It appears that whoever sacked the seemingly impenetrable gold reserve managed to get away with nearly every bar. Bad news for the nation's economy, I'm afraid. The likely suspects are the notorious crime syndicate Minotaur, but a group of schoolchildren inexplicably at the scene claim another villain beat them to the punch, stealing half of the gold beforehand. The name they gave was ${name}. As ${trademark} was found, it matches ${name}'s pattern.\"\n\n\"Yes!\" you shout out while standing on your comfy recliner sofa. You're pretty sure the big news services are going to pick up this clip, which means you just became national news.\n*goto TheCall\n\n*label TheInvite2\n*page_break\n[i]Back at home, a few days later…[/i]\n\n\"My mother was a saint and you know it!\"\n\n\"Calm down, Biff. I'm just trying to accurately convey just how devastating Hurricane Norma will be once it hits the west coast. Moving on, can you please tell us what we've learned about the recent Fort Klanx attack?\"\n\n\"It appears that whoever sacked the seemingly impenetrable gold reserve managed to get away with nearly every bar. Bad news for the nation's economy, I'm afraid. The likely suspects are the notorious crime syndicate Minotaur, but a group of schoolchildren inexplicably at the scene claim another villain beat them to the punch. The name they gave was ${name}. As ${trademark} was found, it matches ${name}'s pattern.\"\n\n\"Yes!\" you shout out while standing on your comfy recliner sofa. You're pretty sure the big news services are going to pick up this clip, which means you just became national news.\n*goto TheCall\n\n*label TheInvite3\n*page_break\n[i]Back at home, a few days later…[/i]\n\n\"My mother was a saint and you know it!\"\n\n\"Calm down, Biff. I'm just trying to accurately convey how devastating it is that hundreds of people can't explain how they came down with radiation sickness. Moving on, can you please tell us what we've learned about the recent Fort Klanx attack?\"\n\n\"It appears that whoever sacked the seemingly impenetrable gold reserve managed to get away with nearly every bar. Not good for us, I'm afraid. The likely suspects are the notorious crime syndicate Minotaur, but the schoolchildren present at the scene also claim that a supervillain by the name of ${name} was involved. As ${trademark} was found, it matches ${name}'s pattern.\"\n\n\"Yes!\" you shout out while standing on your comfy recliner sofa. You're pretty sure the big news services are going to pick up this clip, which means you just became national news.\n*goto TheCall\n\n*label TheInvite4\n*page_break\n[i]Back at home, a few days later…[/i]\n\n\"My mother was a saint and you know it!\"\n\n\"Calm down, Biff. I'm just trying to accurately convey how devastating it is that there are now hundreds of bars of irradiated gold moving through the world's money supply. Moving on, can you please tell us what we've learned from the recent Fort Klanx attack?\"\n\n\"It appears that whoever sacked the seemingly impenetrable gold reserve managed to get away with nearly every bar. Not good for us, I'm afraid. The likely suspects are the notorious crime syndicate Minotaur, but the schoolchildren present at the scene also claim that a supervillain by the name of ${name} was involved. As ${trademark} was found, it matches ${name}'s pattern.\"\n\n\"Yes!\" you shout out while standing on your comfy recliner sofa. You're pretty sure the big news services are going to pick up this clip, which means you just became national news.\n*goto TheCall\n\n*label TheInvite5\n*page_break\n[i]Back at home, a few days later…[/i]\n\n\"My mother was a saint and you know it!\"\n\n\"Calm down, Biff. I'm just trying to accurately convey just how devastating Hurricane Norma will be once it hits the west coast. Moving on, can you please tell us what we've learned about the recent Fort Klanx attack?\"\n\n\"It appears that whoever sacked the seemingly impenetrable gold reserve managed to get away with nearly every bar. Not good for us, I'm afraid. The likely suspects are the notorious crime syndicate Minotaur, but the schoolchildren present at the scene also claim that a supervillain by the name of ${name} was involved. As ${trademark} was found, it matches ${name}'s pattern. Apparently, the villain coated the gold in, get this, chocolate before leaving the scene. Quite odd.\"\n\nYou shout for joy while jumping up and down on your comfy recliner sofa. You're pretty sure the big news services are going to pick up this clip, which means you just became national news.\n*goto TheCall\n\n*label TheCall\n*page_break\nYou settle back into your sofa when your phone starts ringing. Unknown number. Steelheart, maybe? You click to answer, a taunt ready on your tongue.\n\n\"It is rare that I underestimate people.\" The voice is velvet, the Russian accent amused. \"Clearly, you're more than just another one of Merit City's laughable supervillains. Minotaur respects power…as do I. Please, let us make it up to you with an invitation to our villa. Our high council would love to have a chat with you, and I would love to make your acquaintance in person. The helicopter escort will be at your compound in the morning. I'm sure you're too courteous to keep them waiting.\" And then there's a sound that might have been someone kissing the air in front of their phone.\n\nThe line goes dead, The ${cname} having already moved on to some other act of murder or flirtation or whatever else it is ${che} does. It appears you've impressed Minotaur enough that they want to have a chat with you in person. You've never really seen yourself as the global crime syndicate type, but it's not like having access to Minotaur's resources wouldn't let you catapult up to the A-list. Plus, you've always wanted to see a villa and figure out how it's different from a mansion.\n\nWhich isn't to say you trust them. If this is a trap, you'll be ready for it.\n\n*finish\n\n*label Whew\nSuddenly you find yourself yelling while landing on the floor next to your bed. Covered in sweat, you realize it was all just a dream and the attack on Fort Klanx isn't until another week. Whew!\n*return", "chaptereleven": "*temp steelfree false\n*image chap11.png\n\nA few months pass. You start a yoga class, and then stop a yoga class. One of the goons finds a monarch butterfly cocoon, and you spend a magical afternoon in the barracks, watching the beautiful creature transform and free itself. Oh, and you and your tech teams build the world's most advanced secret satellite base, complete with giant death laser. You'll be the envy of the world, once you can actually get it into space.\n\nUnfortunately, you won't have anyone to brag to. Your Darkspace credentials are suspended, and have been ever since you started passing around the information Nautilus gave you about Doctor Arachnus and his plans. At first, villains just made fun of you for claiming something big was in the works. Then people started getting scared. Then they got angry, calling you a superhero shill, trying to spread panic in the community. Right before you were banned, you saw factions starting to form between the old-school villains who tended to believe you and the newer ones who refused to accept it. You weren't really expecting any help from the \"supervillain community,\" but it's still disappointing that you won't have anybody to ooh and aah over your satellite.\n\nIn its current form, it's about the size and shape of a mini-fridge. It's compact and can barely hold two dozen cans of your favorite cola, let alone you, a death laser, et cetera. Once it launches into space, however, the millions of nanobots inside will start building part of the base around the rocket. They'll also build a teleportation device, allowing you to instantly send workers, resources, and prebuilt parts. Pure genius!\n\nOf course, all the cash you spent on research and funding left you with few resources to actually get the thing into orbit. Luckily, the International Space Agency has given you permission to borrow one of their rockets. And by \"borrow\" you mean \"steal,\" and by \"permission\" you mean they don't have a clue that you're coming.\n*page_break\nOkay, time to get this bad boy into space. After a week of preparation, you and your sidekick are ready to move in on the International Space Agency's launchpad at Cape Canoodle, hijack a rocket, and blast your payload into space.\n\n\"It's no Fort Klanx but there's still some decent security. You ready, ${sidekick}?\"\n\n*if hackmaster = true\n \"Of course. They won't know what hit them,\" Hackmaster's voice crackles from a speaker set into her mech. As usual, her physical self is in a van somewhere distant. You've still never seen her in person, but at this point you don't really care. For this mission she's controlling an advanced combat mech with boosters that allow it to fly, with a .50 caliber machine gun on each arm. You built it specially for the one-year anniversary of her recruitment to the cause.\n \n \"Do your thing. In two minutes, I'll follow,\" you command. Hackmaster's mech takes off, flying through the sky while unleashing a hail of devastating bullets on the military personnel in charge of protecting the place. They do their best in trying to shoot her down, but the mech is too fast and powerful, slicing the few tanks and attack choppers they have in half with her fifty-cal bullets.\n *goto PhaseTwo\n\n*elseif star = true\n The hollow-eyed former hero simply stares out at the patrols guarding the base. For this mission, you've equipped him with a belt that replicates many of his old powers: flight, super speed, and some measure of his old strength. There's nothing you can do about his mind, but after a year of service, you figured giving him a taste of his old life was the least you could do.\n \n \"Go crazy. In two minutes I'll follow,\" you command. The Star jets away, and for a moment he looks like his old heroic self, blazing across the sky. Then he starts tearing tanks apart with his bare hands, laughing as bullets bounce off his chest. As far as you can tell, he's not killing anybody over there, but he's definitely having the closest thing his shattered psyche can equate to fun.\n *goto PhaseTwo\n\n*else\n \"Ready for action, master,\" he replies excitedly while standing by your side. For this mission he's wielding a massive glue-spraying gun attached to a container on his back. A year into his employment, you think you have a handle on how best to use Slog. He gets moody if you ask him to kill, but there's nobody you'd rather have making a distraction for you.\n \n \"Immobilize them. In two minutes I'll follow,\" you command. Slog takes off, running through the base while spraying the powerful adhesive on any military personnel that dare stand in his way. He even flips over a few tanks like a guy whose team just won the pennant.\n *goto PhaseTwo\n\n*label PhaseTwo\n\nWith ${sidekick} keeping the security busy, you prepare to infiltrate the space camp's main building and gain access to the rocket's controls. Fortunately, you brought along just the thing….\n\n*choice\n #Wrist gauntlets that shoot powerful lasers.\n  In true villainous fashion, you walk through the base at a calm pace, blasting buildings and vehicles to pieces. You even set aflame a few fuel-storage tanks and walk away, making sure not to look at the explosion, because cool villains don't do that.\n  \n  You make it to the base of the rocket, taking a moment to bask in its brutal power. Then you press a button on your suit. Moments later, one of your planes flies by and drops twelve goons and the space satellite in via parachute. You route half of the squad through Mission Control, while the other six start scaling the rocket, looking for the right place to attach the satellite. \n\n  *goto TheLaunch\n #A high-tech jetpack able to produce an energy shield.\n  You take to the air and avoid most of the security that ${sidekick} hasn't gotten to yet. Some of them try shooting you down, but your energy shields block the bullets.\n  \n  You land at the base of the rocket, taking a moment to bask in the technological majesty it represents. Then you press a button on your suit. Moments later, one of your planes flies by and drops twelve goons and the space satellite in via parachute. You route half of the squad through Mission Control, while the other six start scaling the rocket, looking for the right place to attach the satellite. \n\n  *goto TheLaunch\n #A crate of rabid apes dressed in astronaut suits.\n  Hoping that all these people have seen too many movies, you unleash the apes and watch them terrorize the entire camp. You laugh as someone yells \"It's a mad house! A mad house!\" while running away from one of the hairy attackers.\n  \n  Moving amidst the chaos, you make it to the base of the rocket, taking a moment to bask in the sheer symbolic beauty of the thing. Then you press a button on your suit. Moments later, one of your planes flies by and drops twelve goons and the space satellite in via parachute. You route half of the squad through Mission Control, while the other six start scaling the rocket, looking for the right place to attach the satellite. \n\n  *goto TheLaunch\n *selectable_if(DroneArmy = true) #The army of Merit City drones I hijacked from Doctor Arachnus.\n  It feels like just yesterday that Doctor Arachnus infected ten percent of Merit City with a neurological virus that turns them into murderous half-mechanical zombies. Having made a fake cure that puts you in control of the nanovirus, you decided that today would be as good a time as any to use them. After all, there's no telling how long your nanites will last against their immune systems.\n  \n  Fooled into thinking that they've won a free tour of Camp Canoodle, the people are sitting patiently in buses nearby. You trigger a control on your suit, activating the virus. You watch as hundreds of citizens, their bodies transforming into mechanical zombies, tear their way out of the buses and begin wreaking havoc on the space center. \n  \n  Moving amidst the chaos, you make it to the base of the rocket, taking a moment to bask in the raw planning power required to build the thing. Then you press a button on your suit. Moments later, one of your planes flies by and drops twelve goons and the space satellite in via parachute. You route half of the squad through Mission Control, while the other six start scaling the rocket, looking for the right place to attach the satellite. \n  *set notoriety +5\n  *goto TheLaunch\n  \n*label TheLaunch\n\n\"Launch team, are you ready?\"\n\n\"Yes, master! Mission Control is ours. Our team is at the shuttle's controls and ready to launch,\" replies a goon through your receiver.\n\n\"Satellite team, is the space base secured onto the shuttle?\"\n\n\"Yes, master, but—\" is all that's said before it cuts out. You're not sure what happened to them, but if the satellite is attached then it's time to launch!\n\n\"We launch in one-hundred-eighty seconds,\" you say. \"${sidekick} will keep the military personnel busy until a chopper comes to pick you all up.\"\n\nYou climb into the elevator that stands next to the shuttle, watching the countdown on your wrist-mounted display. With about sixty seconds left, you reach the door of the shuttle. Soon after, you're strapped in. It's not like you've never been to space before (you're a supervillain, after all). But you still get a little thrill from being here.\n*page_break\n*if countess > 5\n Twenty seconds before launch, the door clangs open, and someone hops into the seat beside you.\n \n \"Glad you could make it, ${cname}.\"\n \n \"Thanks for the invite,\" ${che} responds. \"I apologize about your servants, though. They tried to shoot me, and I reacted…poorly.\"\n \n \"They're just goons,\" you reply just as the countdown reaches zero. The intense gravitational force makes your entire body seem like it's being smashed into a marshmallow. It almost feels like the time the nautical supervillain Moby Richard, as big as his terrible name implies, belly flopped right on you during a villains-only pool party a few years back.\n \n If what Nautilus told you was true, something very bad is coming for the Earth, with Doctor Arachnus at its helm. (Plus, even if you didn't care about the planet, you have it on good authority that Doctor Arachnus will be gunning for you specifically.) And as cool as having a giant laser in space is, you're not launching this thing just for the prestige. Given the delicacy of the plan, you just couldn't risk V.A.N.G.U.A.R.D. or the League of Good Guys or some random psycho like The Drake interfering. And so you invited along a representative of the one organization who'd act just as ruthlessly as you would to stop Doctor Arachnus from destroying the planet. And sure, you helped burn down ${chis} villa and screw with ${chis} operations, but you've developed a rapport with The ${cname}, enough to make you think you could trust ${chim} for backup. A little, at least. You're not crazy. (You are, a little, but not that crazy.)\n \n \"So do you really think this satellite base will help you stop Arachnus?\" ${che} asks, in a \"the world is in peril\" version of small talk. Unbuckled from your seat, you fight the urge to play around and do flips as you float around the shuttle. Space is so cool!\n \n \"Maybe. Nautilus wouldn't or couldn't tell me what's actually coming. But in my experience, very few threats can stand up against an orbital death laser.\"\n \n You can see the look of discomfort on The ${cname}'s face. ${checap} clearly hates the idea of helping you build a powerful laser-equipped space base, but it's not like ${che} has a choice. Out of courtesy, you passed along what Nautilus had told you to ${chim} about Doctor Arachnus's upcoming attack. Apparently, Minotaur's crazy clone council wasn't impressed. Minotaur may think it's invincible, but at least The ${cname} knows just how big
