e looks a little worse for wear, but surprisingly good considering he, well, died. As your archnemesis limps toward you, you rack your brain trying to figure out what happened. You were certain he died…although when you think back on it, you didn't exactly have a chance to examine the body. \"Always make sure they're really dead\" is one of those villain guidelines you should have paid more attention to.\n\nRight now, though, the current situation demands all your attention. Doctor Arachnus may have impossibly survived, but his near-death experience couldn't have been kind to him. His eyes are aglow with rage and insanity. \"You assumed I was defeated, that there was no way for me to reach you here now.\" He edges closer with each word, yelling, \"Did you really think that I, the greatest threat this pathetic world has ever known, would not have planned for this eventuality?\"\n\nYou take a deep breath.\n\n*fake_choice\n #\"It ends here, Arachnus!\"\n  All right, so you thought you killed him once already. Despite your shock, you're ready to take him down for real this time. He doesn't look impressed by your threat, but you don't care.\n\n #\"No one threatens my planet!\"\n  You may both be supervillains, but Earth is your planet to torment. If that means protecting it from other villains, so be it. Doctor Arachnus may have pulled a back-from-the-dead stunt, but you aren't giving up.\n\n #\"I'm fighting for my friends!\"\n  Too many people died to help you reach this point. Too many people are counting on you to stop Doctor Arachnus. No matter how many times he returns, you'll defeat him again and again for their sakes.\n\n #…and remain silent.\n  You need to concentrate on the upcoming fight. While a speech would be more dramatic, planning out your next move is more practical. You failed once. This time, you have to stop Doctor Arachnus once and for all.\n*comment endchoice\n\n*if Slog = true\n Slog lunges forward as if to stop the supervillain, but Doctor Arachnus knocks him into the air. Your loyal sidekick slams into the far wall and slides to the ground. He doesn't get up.\n *set slogsacrifice true\n\nHow Doctor Arachnus planned for what you did to him, you don't know. Teleportation matrix, the Spacetime Sphere…heck, it's his ship, it probably has secrets you have no clue about. It doesn't matter now. This is it. You'll only get one chance.\n\n*choice\n #I fight Doctor Arachnus using my greatest strength, the skill I've mastered above all others.\n\n  *if (combat > ingenuity) and (combat > terror)\n   Maybe Doctor Arachnus expected you to be so stunned by his appearance that you'd just stand in shock as he killed you. When you spring into motion, he falters for a brief second, just long enough for you to slam into his upper body. The impact with the cyborg monstrosity jolts you, but you braced yourself for this.\n\n   Steel claws snap toward you, but you dance out of the way with well-honed agility. Even as you move, you grab your weapon. Not one of the little weapons you used before, but the massive beam of destruction you prepared as a last resort against a superior (not that you'll ever admit that out loud) opponent.\n\n   Feet braced on the floor, you begin to power it up. Doctor Arachnus attacks, but you hold firm. You've prepared for this day. You don't flinch at the pain as claws graze your skin; you don't shrink back as his sickles fly toward you. You power up your ultimate weapon and then fire.\n\n   Your aim is straight and true. Energy blasts into the supervillain and sends him flying, but it isn't over yet. By the time the light fades, all that remains of Doctor Arachnus is a scorch mark on the floor.\n\n   Even [i]he[/i] can't recover from that!\n   *set combat %+10\n   *goto TrueFinalDecision\n\n  *elseif (ingenuity > combat) and (ingenuity > terror)\n   Doctor Arachnus must assume you made up your plan as you went along, without giving it any thought beforehand. Not so. Sure, you hadn't actually considered the whole \"not really dead\" trick, but you always knew it might come down to a last stand between you and him in the heart of his ship. And you planned for it.\n\n   Even as his steel claws fly toward you for a killing blow, you slip your hand into your pocket. With a smirk, you press the button on the device inside. The ship shudders around you, and the weakened Doctor Arachnus almost loses his footing.\n\n   Not all of your goons were involved with the forward assault. While you made your way toward Doctor Arachnus, some infiltrated other areas of the ship to make a few…modifications.\n\n   Alarms blare. The ship itself has now identified the supervillain as a threat. Mechanical spiders skitter out from the shadows and through the doors. Once wholly under his control, they serve a new master now. Doctor Arachnus anticipated battle with you and your allies, not his own security systems. He puts up a desperate fight, but it's too late. As he crumbles to the ground, you privately congratulate yourself on a job well done.\n\n   Then you hurry to his body to make sure he's dead. You won't make that mistake twice!\n   *set ingenuity %+10\n   *goto TrueFinalDecision\n\n  *elseif (terror > combat) and (terror > ingenuity)\n   Doctor Arachnus probably assumes you're afraid of him. It's a reasonable assumption to make. After everything he's done, most people would fear him. But this time, it's different.\n\n   He should be afraid of you.\n\n   You've spent enough time with him that you know his greatest fears. And your mastery of fear as a weapon has taught you that it doesn't matter if you understand why he fears those things or not. So you begin to talk. Calmly, quietly, proving you aren't afraid of him—because not being feared is an unusual occurrence for him and causes a subtle sort of dread. \n\n   You don't retreat as he advances toward you, but continue speaking about a world of peace and happiness. A world where the name \"Doctor Arachnus\" is a joke, where \"Ara-kunos the Eighth\" doesn't matter to anyone.\n\n   A world where his greatest threat—the threat he pretends he doesn't fear, yet launched all his insane plans to stop—is victorious.\n\n   Doctor Arachnus puts his hands over his ears and shakes his head. He isn't even trying to attack anymore. He just wants you to stop tormenting him with thoughts of such a future. But you aren't that merciful. You don't let up until he falls to the floor in a sobbing, gibbering heap.\n\n   Even then, you toss in a few more terrifying promises to be sure he isn't faking it.\n   *goto TrueFinalDecision\n\n  *else\n   But even as you prepare yourself to face Doctor Arachnus, you realize you don't have what it takes. You've done all right for yourself as a villain, but in a one-on-one fight, you'll lose.\n\n   It was close. You almost defeated the greatest threat the world has ever seen. As Doctor Arachnus closes in for the killing blow, you wonder if anyone will remember you, or your reign of villainy. Then you remember that your failure may have doomed Earth. Or, instead, maybe other villains and heroes will be inspired to work together to defeat Doctor Arachnus.\n   \n   If so, and if they defeat Doctor Arachnus, the world will remember you as one of the greatest villains of all time….\n   *achieve badend\n   *goto ending\n   \n #I draw upon the memory of the person I care about most, using that power to erase Doctor Arachnus by using his own Spacetime Sphere.\n  *if (SteelBed = true) and (CountBed = true)\n   Steelheart and The ${cname}, two very different people who both won your heart. They'd want you to destroy Doctor Arachnus. They did everything they could to help. Now it's your turn. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though they're right beside you, lending you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *elseif (SteelBed = true)\n   Steelheart, the Deputy Director of V.A.N.G.U.A.R.D. who somehow won your heart. ${shecap}'d want you to destroy Doctor Arachnus. ${shecap} did everything ${she} could to help. Now it's your turn. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though Steelheart is right beside you, lending you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *elseif (CountBed = true)\n   The ${cname}, the deadly Minotaur agent who somehow won your heart. ${checap}'d want you to destroy Doctor Arachnus. ${checap} did everything ${che} could to help. Now it's your turn. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though The ${cname} is right beside you, lending you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *elseif (Steele > 10)\n   Steelheart, the Deputy Director of V.A.N.G.U.A.R.D. who against all odds became your ally…maybe even your friend. ${shecap}'d want you to destroy Doctor Arachnus. ${shecap} did everything ${she} could to help. Now it's your turn. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though Steelheart is right beside you, lending you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *elseif (Countess > 10)\n   The ${cname}, the deadly Minotaur agent who against all odds became your ally…maybe even your friend. ${checap}'d want you to destroy Doctor Arachnus. ${checap} did everything ${che} could to help. Now it's your turn. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though The ${cname} is right beside you, lending you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *elseif (nautilushelp = true)\n   Nautilus. Wild, crazy, and with a flair for the dramatic, but also your ally when you needed one most. Even though he doesn't kill, he'd want you to destroy Doctor Arachnus. It's thanks to him you even have this chance. Now it's your turn. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though Nautilus is right beside you, laughing as he lends you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *elseif (drake > 10)\n   The Drake. ${checap} may be absolutely insane, but you feel you came to a strange understanding during your conflicts. ${checap}'d want you to destroy Doctor Arachnus. Probably with more pyrotechnics, but this will have to do. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though The Drake is right beside you, giving you the encouragement you need to properly visualize that first part of your perfect future (and probably setting things on fire).\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n  *else\n   Strange—as you stand there in desperate need of inspiration, the face that comes into your mind is ${sidekick}'s. You haven't made a lot of friends so far during your career as a villain, but you weren't completely alone either. As you reach for the Spacetime Sphere and imagine a world without Doctor Arachnus, you feel almost as though your minion is right beside you, lending you the strength you need to properly visualize that first part of your perfect future.\n\n   Doctor Arachnus's eyes widen in shock and horror as he realizes your plan, but it's too late for him to stop you.\n   *goto TrueFinalDecision\n\n *selectable_if (planning >= 4) #There's nothing to worry about—I planned for this too. (Costs 4 Planning Points!)\n  Maybe Doctor Arachnus thinks he's the only villain who prepares for every opportunity, but you knew the day would come when someone you thought you'd defeated showed up again. You didn't necessarily know it would be here on this ship, but the best part about your plan is that you can implement it at any time.\n\n  Even as his steel claws reach for you to slice you to pieces, you reach into your pocket for the device you prepared. It is…a time machine.\n\n  Well, sort of. You don't have the resources (yet) to build a proper time machine. All this one can do is send you five minutes into the past, and you can only use it once. It's the perfect tool for a surprise such as this. You press the button and everything blurs around you.\n  *page_break\n  Once again, you stand before the Spacetime Sphere in your moment of triumph, but this time you know what's coming. You count down the seconds in your head and then spin around, weapons ready, just as Doctor Arachnus enters the room.\n\n  Shock crosses his face for one split second—you can almost see the question in his eyes, how could you possibly have been expecting him—and then he falls. For real, this time.\n  *set ingenuity %+5\n  *set combat %+5\n  *set terror %+5\n  *set theatricality %+5\n  *goto TrueFinalDecision\n\n*label TrueFinalDecision\nWith Doctor Arachnus finally taken care of and the power of the Spacetime Sphere in your grasp, there's only one question left to answer….\n\nWhat kind of supervillain are you?\n\n*choice\n #Completely destroy the Earth.\n  *if lethality > 20\n   For whatever reason, villains throughout history have dreamed of doing one of two things: becoming the ruler of the world or destroying it. There's just something about these two outcomes that screams evil. It turns out you'd like nothing more than to see the world's end. But more importantly, to have the world's end be at your hands.\n   *if (SteelBed = true) or (CountBed = true)\n    A world without your beloved doesn't deserve to exist at all!\n   *comment endif\n\n   You've killed a lot of people during your career as a supervillain. \n   *if (murderdead = true)\n    The pathetic villain who unintentionally set you on this path. \n   *if (jenny = 2)\n    The worthless security guard who tried to stop you. \n   *if (countdead = true)\n    The ${cname}. \n   All the countless people who got in your way. \n\n   Yet none of it can compare to this. Those deaths were trifles—some pragmatic, others sadistic, but equally unimportant in the end. This will be death on a massive scale. No other villain has ever achieved something so…lethal.\n  \n   You marvel as glorious rays of light erupt through Earth's surface and the planet dissolves away in a rainbow explosion of color and death. Billions of lives disappear in a matter of seconds, unaware that today would be their last.\n\n   The thought of all that death and destruction makes your dark heart sing with happiness. You only wish you could be closer, see it firsthand. At least space gives you a spectacular view. The explosive fire expands and dazzles you, until at last it clears. \n\n   Black space lingers where the Earth once hung in orbit. The sentiment might be traditional, even cliché, but you're no two-bit villain following in the footsteps of others. Countless villains across thousands of years dreamed of destroying the world—but only one succeeded.\n   \n   Even if no one will be around to talk about it, at least you know that Earth's demise was at the hands of none other than ${name}.\n   *achieve destruction\n   *set yourending \"destroy1\"\n   *goto epilogue\n\n  *else\n   For whatever reason, villains throughout history have dreamed of doing one of two things: becoming the ruler of the world or destroying it. There's just something about these two outcomes that screams evil. It turns out you'd like nothing more than to see the world's end. But more importantly, have the world's end be at your hands.\n\n   Guilt prickles you as you think about all the people who will die, but you force it aside. You're a supervillain, darn it, and you're going to destroy the world! \n   *if (SteelBed = true) or (CountBed = true)\n    A world without your beloved doesn't deserve to exist at all!\n   *comment endif\n\n   But instead of being treated to an explosive display of destruction, you scratch your head in confusion as hundreds of alternate Earths begin filling the solar system. It seems your mind wasn't able to maintain such a lethal vision. Planets upon planets pop into existence around the sun.\n   \n   Great, as if one Earth wasn't enough trouble, you now have a whole solar system of them to deal with. At least having all these Earths means more places for you to enact your evil schemes. You might have even created your own multiverse! Fascinated, you stare out at the chaotic solar system. If you visit these new planets, will you find identical worlds, or will each be different? Will you meet alternate versions of the people you know?\n\n   Your stomach clenches as an unexpected thought sends a wave of heat through you. \n   *if (SteelBed = true)\n    Maybe you'll reunite with Steelheart on one of those worlds. Surely even an alternate version of ${shim} will recognize you and the connection you share. \n   *if (CountBed = true)\n    You can almost hear The Alternate ${cname} laughing at your confusion when you meet again. Even if it wouldn't be the same person you know and love, you want to at least try after ${che} was taken from you so soon.\n   *if (SteelBed = false) and (CountBed = false)\n    Maybe you'll finally find that special someone on one of the newly created worlds. Let's face it, the dating pool just got a lot bigger.\n   *comment endif\n\n   Will alternate versions of the The Drake be just as crazy? What does the alternate Nautilus do for fun? Maybe you'll meet alternate versions of ${sidekick} and everyone else you've met in your strange career of villainy. \n\n   Or worse, alternate versions of yourself. Now there's a thought. As you stare at the new planets, a smile spreads across your face. It's time to pick one and find out. And if there really is more than one you out there, you'll make sure the others learn you're the best ${name} of all!\n   *set yourending \"destroy2\"\n   *goto epilogue\n   \n #Make myself the ruler of the world.\n  *if activist \u003c 80\n   For whatever reason, villains throughout history have dreamed of doing one of two things: becoming the ruler of the world or destroying it. There's just something about these two outcomes that screams evil. It turns out you'd like nothing more than to see every knee on Earth bend before you.\n\n   For you, it's just a moment of concentration. For the universe, it's a subtle twisting of history and power—a tweak here, a slight alteration there, until enough little pieces come together to make you the undisputed dictator of Earth.\n\n   And so, in a flash of light, you find yourself seated upon your new throne as the surviving minions left at your hideout approach with a golden crown. You wave graciously at the millions of Earth's citizens watching you be officially crowned ruler, and you smile to yourself as the leaders of nations file in to swear their allegiance. \n\n   You lean back against your new throne and close your eyes. Now this is the kind of treatment a villain of your caliber deserves. You'll have cities, countries, and even candies named after you.\n\n   You just hope your subjects perfectly capture your breathtakingly good looks as they spend the rest of human history carving your face onto Earth's surface. ${name}, ruler of the world. It has a nice ring to it.\n   *achieve ruler\n   *set yourending \"rule1\"\n   *goto epilogue\n\n  *else\n   For whatever reason, villains throughout history have dreamed of doing one of two things: becoming the ruler of the world or destroying it. There's just something about these two outcomes that screams evil. It turns out you'd like nothing more than to see every knee on Earth bend before you.\n\n   Ruler of the world! You concentrate on it as hard as you can, but your conscience wrestles with the selfish wish. This isn't what you set out to do when you became a supervillain. It feels so contrary to your nature. But that's not true, is it? What better way to improve the world than to be in charge of it? Everyone would have to obey you, but for the greater good. You keep telling yourself that, reminding yourself that what's good for you is good for the world, that your wishes are the world's wishes. The ship fades from around you.\n\n   Darkness. Heat. And your every thought seems to come…so…slowly….\n\n   A few insufferable decades later, your consciousness finally lumbers toward the truth: you somehow merged yourself with the core of the Earth.\n   \n   Well, your wishes are definitely the same as this dumb planet's now, since you [i]are[/i] this dumb planet now. The inevitable world-destroying nuclear war can't come soon enough.\n   *set yourending \"rule2\"\n   *goto epilogue\n\n #Transform Earth into a perfect utopia.\n  *if (activist > 60) and (lethality \u003c 20)\n   It's been years since you solved world hunger and found the answer to creating the ideal society. Naturally, you didn't have the resources to implement them (plus you were kind of busy with other things), but perhaps it's time you finally made this a planet worth living on. With the power of the Spacetime Sphere at your disposal, it's only a matter of concentration to enact your admittedly convoluted solution.\n\n   There. The planet still looks more or less the same from space, but you know things have become much different down on the surface.\n\n   Light flashes, and you find yourself standing in the middle of Earth's central city. You walk down the streets, admiring the civilized conversations on science, religion, and the ideal gaming console. Everyone is polite, peaceful, and concerned for his or her neighbor. Of course, none of this could be possible without the fundamental element of a perfect utopia—everyone must be naked, always. And that causes no misunderstandings.\n   \n   As complete strangers smile and ask you if they can help with anything (not that anyone ever needs any help), you smile a secret smile of your own. You always told people you could make the Earth a perfect place if everyone just got out of your way, and they all laughed. Now the history books remember ${name} as Earth's savior!\n\n   They also have a disconcerting tendency to call you Earth's \"hero.\" You'll have to get that changed. For now, you stroll through the clean streets without fear (everyone obeys proper driving etiquette) and make your way to a warm, sunny beach where you can relax and enjoy the new world.\n   *achieve utopia\n   *set yourending \"utopia1\"\n   *goto epilogue\n\n  *else\n   Yes, the world will become perfect. That means…well…people will be happy, because…\n\n   You struggle to think about exactly what would go into a perfect world and finally focus in on a few things that make you happy. Somehow, though, your hobbies don't seem like they'll solve problems on a global scale. Let's see…there has to be something else…. As you wrestle with the issue, you get the distinct sense you're confusing the Spacetime Sphere, until it finally cobbles together some ideas from your scattered thoughts.\n\n   With a sinking heart, you behold the new Earth you've created. You really messed up this time. It's now a sterile planet, where animals and plants can no longer reproduce.\n  \n   At least people seem happy for the time being. Everyone celebrates by setting contraceptives on fire and dancing around. Then the realization sets in that Earth will soon be a lifeless planet and they're the last humans alive, ever. Bummer.\n\n   If people realize you're responsible, they'll probably be upset…but at least they'll never have grandchildren to tell the sad story of ${name} to.\n   *set yourending \"utopia2\"\n   *goto epilogue\n \n #Change the world into a lawless anarchist paradise.\n  *if (activist > 70) and (lethality > 20)\n   You've endured the constraints of law for too long, and the world has suffered because of it. No more!\n\n   As you descend to your newly transformed Earth, you smile to yourself at the thought of what you'll encounter. At last, after all your struggles, the planet will be a perfect haven for supervillainy. This was what you were fighting for; this is what the world needed all along.\n\n   It's everything you imagined. Earth is now a law-hater's dream (namely yours), as all constituted forms of society and government have disappeared. Everyone does what they want, which, to no one's surprise, usually involves stealing things.\n\n   Of course, while you had the vision for the world's transformation, you aren't exactly sure how to keep it in place. People will eventually start forming organized groups and governments again, and you don't know how to stop them. But at least you can take advantage of it while it lasts.\n\n   An anarchy is ${name}'s playground.\n   *achieve anarchy\n   *set yourending \"anarchy1\"\n   *goto epilogue\n\n  *else\n   Even as you concentrate, you start to worry about what a lawless world would be like. It sounds like it would be fun, but is it really what you want? The more you think about it, the more you wonder what the point of anarchy really is. What do anarchists want? At the moment, all you can think of is a world where everyone kills one another.\n\n   Before you can get your thoughts back on track, you feel the idea warp into something else based on your confusion. Driven by your muddled vision of death and destruction, every nuclear-armed country launches their weapons at one another. Nuclear war begins on an insane level as you orbit the Earth, helpless to stop what you unleashed.\n  \n   You watch from space as every country blows into smithereens. This wasn't what you wanted! Well, yes, every legal system and government is disappearing, but it's not anarchy if there aren't any people left!\n\n   At least you caused the world's end. That's something for a villain to be proud of, whether you wanted it to happen that way or not.\n   *set yourending \"anarchy2\"\n   *goto epilogue\n \n #Have my face appear on the sun forever.\n  *if theatricality > 65\n   There's only one way to ensure you'll never be forgotten. \n\n   Once the Spacetime Sphere fulfills your desire, you head down to Earth bathed in the light of your own glory. It's time for a new era to begin.\n\n   Now the entire world looks up in awe at you every day, as your brilliant countenance stares down from the blazing sun. You watch over your people like a deity, with the added benefit that you don't actually have to [i]do[/i] anything godlike, since your face is there regardless.\n   \n   Eons after your death, your image will still be beaming down. You'll never be forgotten, even when the words \"superhero,\" \"supervillain,\" and even \"${name}\" have been lost to the winds of history.\n\n   Perfect.\n   *achieve sun\n   *set yourending \"sun1\"\n   *goto epilogue\n\n  *else\n   Yes, it'll be brilliant, and no one will ever forget who you are. You need to put your face on the sun. Despite the small part of your mind that questions how absurd and ridiculous this idea is, you concentrate as hard as you can. Your face on the sun, your face on the sun…\n\n   Suddenly you're hurtling through space. You let out a scream no one can hear and try to turn away. You wanted the image of your face on the sun—you didn't want your actual face to touch it! How could your mind have transformed your wish into something so much more mundane?\n\n   *if (nautilushelp = false)\n    Maybe Nautilus was right. You don't have the imagination needed for this sort of theatricality.\n   *comment endif\n  \n   As you plummet toward the sun, you try to look on the bright side (all things considered, that shouldn't be hard). It's definitely a bummer, but at least it's a unique way to die. Besides, a weird part of you always suspected this was the way you'd go. You only hope the world will remember you as \"${name}, Sun Diver\" or something equally cool.\n\n   Sunscreen, anyone?\n   *set yourending \"sun2\"\n   *goto epilogue\n \n #Make the entire world just a little more cartoony.\n  *if (theatricality > 60) and (lethality \u003c 20)\n   While you giggle, the Earth shines with a brilliant white light. Once the light fades, you behold the planet. It's still recognizably Earth, but it looks like something you'd see drawn in a children's book. You burst into laughter and head down for a closer view of your handiwork.\n\n   In the first city you enter, anthropomorphic farm animals line the streets. They're all playing various instruments, and you find yourself whistling along with the tune. Little wonder, as even the mailboxes, signposts, and clouds are smiling and dancing to the cheerful tune. Part of you recognizes the world around you as sickeningly sweet, but the rest of you is too amused to care.\n   \n   Up above, colorful superheroes and supervillains are duking it out. No one ever dies, as each fallen combatant rises again to take on a new challenge. You fly into the air too (you couldn't do that before, but apparently flying is just a part of life now) and entertain yourself by knocking around a few heroes and one pesky villain. When it's time for you to go, they all wish you a good day, and you continue on.\n\n   The same sights greet you everywhere until you finally reach a big house painted in pastel colors. Now at your destination, you knock on the door, which flies open to reveal your good friend Ricky Rat. He greets you with a big hug. Waiting inside are Nutty the Dog and Gerald Goose, ready to enjoy a nice meal together. \n\n   Even as a villain, life is good when you don't have a problem goofing off once in a while. And in this world, no one will ever notice how silly you look.\n   *achieve cartoons\n   *set yourending \"cartoon1\"\n   *goto epilogue\n\n  *else\n   You want the world to become happy, and fun, and…ugh, it all sounds so silly when you really think about it. It's the sort of childish scene that makes you sick. Still, it was your wish, so it's too late to back out—\n\n   Wait. You blink. Something must have gone wrong. Things have suddenly gotten very heavy. Literally. Outside the window, a dark mass hovers over the Earth. This has to be a joke, but somehow you're certain the Spacetime Sphere wouldn't tell jokes even in the reality you intended to create, much less this one.\n   \n   You're not sure how your good-hearted wish summoned a black hole, but it did. You watch, helpless, as it swallows up the Earth. So much for fun and laughter. Then the ship lurches into motion, and you realize you're being sucked in as well. With a long sigh, you program the ship's computer monitors to play your favorite black-and-white cartoons as you prepare for whatever happens when you go through a black hole.\n   *set yourending \"cartoon2\"\n   *goto epilogue\n  \n #Blow up Doctor Arachnus's ship, along with the Spacetime Sphere.\n  You program the ship to enter its self-destruct sequence, ensuring no one will ever use the Spacetime Sphere or the rest of Doctor Arachnus's technology ever again. The computer monitors flash with a countdown: you have one minute to get out of there.\n\n  Fortunately, you already double-checked the location of your escape pod. You run for it, dashing through the ship's rooms and corridors with wild abandon and reliving all the epic moments that led to your victory. Then you skid to a halt as a horde of mecha-spiders charges into your path. From the looks of them, they're malfunctioning in a very lethal way.\n\n  *if (notoriety > 20) \n   But it's not the like the world's most notorious villain is going to let a little thing like rampaging mecha-spiders get in the way. You blast them away with your last gadget, a small hand-fired grenade launcher, and stride through the wreckage.\n   \n   Sure, you gave up omnipotent power. And sure, most of your friends are dead. \n   *if (SteelBed = true)\n    You'll never kiss Steelheart again. \n   *if (CountBed = true)\n    You'll never hear The ${cname}'s alluring whisper in your ear. \n   But not only did you just save the world (the better to plunder it later), but you just proved that you are the most badass supervillain to have ever lived. You leap into your escape vessel, gun the engine, and fly back to Earth, your mind full of schemes and crimes to visit upon its pitiful inhabitants tomorrow. You'll make sure the people of Earth get to know the name ${name}.\n   *achieve shipdestruct\n   *set yourending \"selfdestruct1\"\n   *goto epilogue\n\n  *else\n   This can't be happening. Are you really going to die here, after saving the world and walking away from ultimate power?\n   \n   Yeah, you are, you realize, as the spiders swarm over you. You fight, but it's no use. This…is the end of ${name}. No glory. No recognition. Just the personal knowledge of victory, which you cling to as you fade into oblivion.\n   *achieve shipdestruct\n   *set yourending \"selfdestruct2\"\n   *goto epilogue\n\n #Resurrect a dead friend.\n  There are two big ways villains throughout history have screwed things up, even by evil's standards: using an artifact of unlimited power to grant a wish without understanding the consequences, and trying to resurrect the dead. As such, if you're going to use an artifact of unlimited power to resurrect the dead, you'll need to proceed with caution.\n\n  In theory, you can just revive all the people you care about with a simple thought. In practice, you'd probably start a new zombie apocalypse. To avoid that, you need to keep it simple. As much as it hurts, you should choose only one person you truly care about to bring back from the dead.\n\n  You'll choose…\n  *choice\n   *if (SteelBed = true) or (Steele > 10)\n    #Steelheart.\n     Of all the people you met during your time so far as a supervillain, the one you really want to see again is Steelheart. You close your eyes and concentrate as hard as you can on that singular wish. Steelheart must live again.\n     *achieve revive\n     *set yourending \"revivesteel\"\n     *goto epilogue\n   *if (CountBed = true) or (Countess > 7)\n    #The ${cname}.\n     No one you knew was as enigmatic and endearing as The ${cname}. Regardless of your conflicts, you need ${chim} to live. You close your eyes and concentrate as hard as you can on that singular wish. The ${cname} will return to you.\n     *achieve revive\n     *set yourending \"revivecount\"\n     *goto epilogue\n   *if (nautilushelp = true)\n    #Nautilus.\n     Face it, the world needs a sense of humor, and no one knew how to bring joy and levity to any situation like Nautilus did. He may not have been \"alive\" in the traditional sense, but he still sacrificed himself for you. Time for you to return the favor. You close your eyes and concentrate as hard as you can on that singular wish. Nautilus will be restored.\n     *achieve revive\n     *set yourending \"revivenautilus\"\n     *goto epilogue\n   *if (Fauxton = 10)\n    #Fauxton.\n     While Fauxton wasn't exactly what you'd consider a friend, you did come to understand each other by the end. After he sacrificed himself for you, bringing him back for another chance at life seems the least you can do. You close your eyes and concentrate as hard as you can on that singular wish. Fauxton will be revived.\n     *achieve revive\n     *set yourending \"revive fauxton\"\n     *goto epilogue\n   *if (sidekick = \"Slog\") and (slogsacrifice = true)\n    #${sidekick}.\n     You've had a lot of minions, but none was quite like ${sidekick}. You could count on ${sidehim}…well, more or less. \"Friend\" might be taking it a little far, but it's hard to just say goodbye to one of your first allies. At least you'll have someone to give orders to, right? Plus this will make up to the times you were less than kind to ${sidehim}. You close your eyes and concentrate as hard as you can on that singular wish. ${sidekick} will no longer be dead.\n     *achieve revive\n     *set yourending \"revivesidekick\"\n     *goto epilogue\n   *if (sidekick = \"Star\") or (sidekick = \"Hackmaster\")\n    #${sidekick}.\n     You've had a lot of minions, but none was quite like ${sidekick}. You could count on ${sidehim}…well, more or less. \"Friend\" might be taking it a little far, but it's hard to just say goodbye to one of your first allies. At least you'll have someone to give orders to, right? Plus this will make up to the times you were less than kind to ${sidehim}. You close your eyes and concentrate as hard as you can on that singular wish. ${sidekick} will no longer be dead.\n     *achieve revive\n     *set yourending \"revivesidekick\"\n     *goto epilogue\n   #Forget being careful. I have a whole list of people to revive.\n    In true supervillain fashion, you throw caution to the wind and try to bring back everyone who aided you, friend or not. You even throw in a few enemies to make things interesting. Then there are the historical figures you'd like to meet…. You close your eyes and concentrate as hard as you can on that singular wish. Bring them all back!\n    *set yourending \"revivefail\"\n    *goto epilogue\n    \n #Undo the damage Doctor Arachnus did to the planet.\n  You didn't go to Doctor Arachnus's ship for power or glory or anything else the Spacetime Sphere could give you. You went for one purpose: to stop him. You succeeded in that, but unfortunately not soon enough to prevent the start of his terraforming plans for Earth. From space, you can't be quite sure how bad the damage is, but the planet certainly isn't unscathed.\n\n  In time, the people of Earth would probably manage to undo the damage on their own (knowing people, though, they might make things worse), but why wait that long? Erase that monster's handiwork with his own ship!\n\n  With a flash of light, the surface of the planet below subtly changes. If you hadn't been watching, you wouldn't have realized how different it looked a moment before. Now it's back to how people expect Earth to appear from space. Whatever Doctor Arachnus did to it is no more, and everyone can go back to their normal lives.\n\n  Including you, of course.\n  *achieve restore\n  *set yourending \"reverse\"\n  *goto epilogue\n\n #Return to Earth without doing anything.\n  Sure, the Spacetime Sphere can give you anything. But look at the trouble it caused in Doctor Arachnus's hands. While you like to think of yourself as much better equipped to handle ultimate power, maybe this is the sort of thing people just aren't meant to mess with. You could end up doing more harm than good.\n\n  And so, you leave the ship behind. On the way to your escape pod, you reflect on all the allies who died to give you a chance to defeat Doctor Arachnus. You'd like to think they'd be happy with your decision.\n\n  *if (SteelBed = true)\n   You take a quick detour to the room where Steelheart died, just in case you misunderstood. You pause on the threshold, unwilling to go in, hoping against hope that when you make that step, you'll be greeted with an exasperated \"Took you long enough.\"\n\n   But only silence greets you. ${shecap} is gone, and all you can do is mourn. You swallow the lump in your throat as you think of what could have been.\n  *comment endif\n\n  *if (CountBed = true)\n   As you near the passage where you left The ${cname}, your steps slow. Maybe ${che} survived after all, despite the way you parted. You could have been mistaken…. Clinging to that thought, you take a deep breath and continue on, prepared for the worst.\n\n   When you see ${chis} body, your resolve falters. You kneel by ${chim} and fight back tears. \"I'll never forget you,\" you whisper. \"Never.\"\n  *comment endif\n\n  At last, you reach the escape pod. It's time to go home.\n  *achieve nothing\n  *set yourending \"return\"\n  *goto epilogue\n\n*label epilogue\n*page_break\n*achieve ending\n*if (yourending = \"destroy1\")\n With the grand exhibition of death finished, you stare into the blackness of space. You might have won the greatest supervillain victory ever, but you can't really celebrate it. They're all gone. Earth is gone.\n\n Oh, it's no foolish moment of sentiment creeping in. It's just that a supervillain without anyone left to terrorize is nothing. Gone are the days of planning elaborate crimes and demonstrating your skills to the world—gone with the planet you just destroyed. You have no one left to give orders to, no one to fight with, no one even to kill. In the days ahead, you'll be…bored. As much as you wanted to destroy it, you now realize that you needed the world.\n\n Correction. You give yourself a shake. You need [i]a[/i] world. And the spaceship you now stand in is proof enough that there are more out there.\n\n A grin spreads across your face as you look around. Your career as a supervillain isn't over. Far from it. Your dealings with Steelheart, The ${cname}, Minotaur, Nautilus, The Drake, ${sidekick}, Doctor Arachnus, and everyone else you encountered along the way... that was just the beginning. Now you've become something far greater.\n\n \"Time to learn to fly this thing,\" you say under your breath as you leave the Spacetime Sphere behind to explore the rest of Doctor Arachnus's—no—your ship.\n\n Somewhere, in the far reaches of the universe, another race will soon tremble at the might of ${name}, Destroyer of Worlds.\n\n *goto ending\n\n*elseif (yourending = \"destroy2\")\n [i]A few days later…[/i]\n\n \"I swear, Biff, you're just as passionate as you were the day I met you.\"\n\n \"Married to a beautiful woman like you, Mindy, how could I be anything else?\"\n\n \"Flatterer.\"\n\n \"I always speak the truth. And speaking of the truth, let's get back to the matter at hand. Scientists say the solar system will become stable in a few days, but until then we'll just have to wait out these dangerous times. The source of this shocking phenomenon is still unknown—\"\n\n With a sigh, you turn off the news report. They aren't going to mention anything about your ship's arrival at this alternate Earth, and you don't think you can stand the surreal sight of Alternate Biff and Mindy making out again.\n\n Something has to change. First, you need to set up a new base. Doctor Arachnus's ship makes for a decent secret lair, but for people to really notice you, you need to be down on the planet. Second, you need to create your Alternate Darkspace account. Once that's in place, you'll commit a crime. Something shocking, maybe a little flashy, enough to draw attention….\n\n You close your eyes and dream about the new path you'll take as ${name}.\n\n *goto ending\n\n*elseif (yourending = \"rule1\")\n As the days pass, you settle into your new role as supreme leader. Not that it takes much work to adjust. There are some fussy political issues to address, but you just have to wave your hand to assign someone else to the job.\n\n You haven't set the tone of your reign yet. Will you be a benevolent leader, beloved by the people of Earth, or a vicious tyrant? Each has its pros and cons, but with absolute power in your hands, you can afford to think about it for a while. Besides, it's fun to watch the silly faces people make when they think they're being subtle in their efforts to figure you out.\n\n That day in the diner when you recruited ${sidekick} feels like an eternity ago. Back then, you needed someone you could count on to follow your orders. Now, everyone jumps at your commands. People line up to become your ally or friend…or more than that. No need for evilHarmony when you're the leader of the world.\n\n *if (SteelBed = true)\n  What would Steelheart think about all of this? A pang runs through your heart as you consider ${shim}. ${shecap} would probably disapprove of your ruling the world, but you'd trade it all if you could be with ${shim} again….\n *comment endif\n\n *if (CountBed = true)\n  The ${cname} would probably find the whole thing amusing. Or not. ${checap} was a very difficult person to read. You didn't have the time you should've had to get to know each other.\n *comment endif\n\n *if (SteelBed = true) or (CountBed = true)\n  To your shock, even though you have more power than most people can even dream of, tears well up in your eyes. You blink them away angrily. The ruler of the world doesn't sit and mope. The ruler of the world acts!\n\n  You snap your fingers and order an attendant to bring you the world's top scientists, theologians, and mystics. It's just a thought, but…countless heroes and villains alike have dreamed of defeating someone like Doctor Arachnus. You succeeded where they failed. Countless villains (and the occasional hero) have dreamed of ruling the world. You succeeded where they failed.\n\n  And a handful of villains throughout history have attempted to revive their loved ones, usually with catastrophic results. Perhaps you'll succeed where they failed.\n *comment endif\n\n You lean back in your throne and close your eyes, plans already rushing through your mind. Just like when you donned your supervillain identity, this is a whole new beginning. You intend to make the most of it.\n\n The era of ${name} has begun.\n\n *goto ending\n\n*elseif (yourending = \"rule2\")\n [i]Two centuries later…[/i]\n\n They still haven't destroyed it. It takes a little bit for the thought to fully sink into your mind.\n *page_break\n By \"a little bit,\" you mean a few years.\n *page_break\n Maybe the world is a better place.\n\n That thought also takes a while to process. In fact, all thoughts do now. At least you have plenty of time to think about your life as a supervillain.\n\n When you encountered Professor Murder and made the decision to become a villain, you never dreamed it would end like this. You rather wish you could make snap decisions like that again. Or any decisions, really.\n\n You think a lot about the people you met. Steelheart. The Drake. ${sidekick}. The ${cname}. Nautilus. Doctor Arachnus. All the others along the way. You didn't know some of them as well as you could have, and knew others more than you wanted to. Maybe you can figure them all out. You'll devote a century to each one.\n\n *if (SteelBed = true)\n  Steelheart deserves two centuries' worth of thought, really. What a strange pair you made. What an unusual couple you could have been. Is ${she} happier, not having lived to see you become a planet? You'll reflect on that question in the years ahead.\n *comment endif\n\n *if (CountBed = true)\n  A century might not be enough to figure out The ${cname}. ${checap} appeared simple on the surface, but actually had so much depth. You would have preferred to learn ${chis} true nature in a different way, like by ${chis} side while sharing a bottle of champagne. Eternal contemplation will have to do.\n *comment endif\n\n Being a planet must have benefits.\n\n Right?\n\n The good news is you have a long, long time to figure out the answer.\n\n *goto ending\n\n*elseif (yourending = \"utopia1\")\n You don't have a towel to spread on the sand, but a young woman hands you one almost immediately. You thank her, but she's already gone, no doubt to perform more good deeds for someone else. You settle down and listen to the joyous laughter as everyone revels in a perfect world without crime, without anger, without embarrassment….\n\n Man, Nautilus would hate this place. The Drake probably wouldn't have any fun, either. There would be no place for Minotaur at all. What would ${sidekick} do in a world like this? Live the normal life ${sidehe} never had a chance to? \n\n What about Steelheart and The ${cname}?\n *if (SteelBed = true) or (CountBed = true)\n  Your heart clenches. It isn't a perfect world, not for you, if it doesn't have \n  *if (SteelBed = true) and (CountBed = true)\n   them. \n  *if (SteelBed = true) and (CountBed = false)\n   Steelheart. \n  *if (SteelBed = false) and (CountBed = true)\n   The ${cname}. \n  But it must be a perfect world. You know you didn't mess up when you used the Spacetime Sphere. This world is supposed to be ideal for everyone, including you. And that means you'll find them again someday.\n *comment endif\n\n Content, you close your eyes and enjoy the sun that will never give you a sunburn. A utopia means there aren't any supervillains, but you'll find something to do. For now, you deserve a rest after everything you accomplished.\n\n *goto ending\n\n*elseif (yourending = \"utopia2\")\n [i]Ten years later…[/i]\n\n Alone in your hideout, you let out a long sigh. Enough time has passed for the effects of your misunderstood wish to be noticeable. The population is starting to shrink. Some people despair, some turn to crime.\n\n More supervillains are active than ever before, but you just don't seem to have the heart for it. Half the fun was that you'd be remembered for generations, but there aren't going to [i]be[/i] any more generations. Worst of all, you can't forget that this is all your fault. You decided to make a perfect world (\"Why?\" you ask yourself in the dead of night when you consider your prior ambitions and motives) but instead doomed the human race.\n\n Your minions that remained behind when you went to assault Doctor Arachnus's ship all abandoned you when they learned you were responsible. You try not to feel hurt, but the memory still stings.\n\n *if (SteelBed = true)\n  Sometimes, you lie awake at night and wonder what Steelheart would do in this situation. You wish ${she} were there with you, not only for ${shis} company, but for ${shis} levelheaded thinking.\n *comment endif\n\n *if (CountBed = true)\n  You rub your forehead. Would The ${cname} have an answer, if ${che} was there? At the very least, ${chis} presence would make you feel better. Maybe ${che}'d even know how to get more people working on a solution….\n *comment endif\n\n You can't figure this thing out alone. And you won't. You clench your fists and jump to your feet. For ten long years, you've alternately moped and tried to find an answer by yourself. Now it's time for something radical.\n\n For the first time in a very long while, you log on to your Darkspace account and ignore the nasty messages you've received. It's time to get in touch with as many supervillains as possible, and maybe even superheroes.\n *if (drakedead = false)\n  You aren't sure how pyrotechnics could help the situation, but it couldn't hurt to see if The Drake has any ideas.\n *if (murderdead = false)\n  Heck, you'd even accept help from Professor Murder.\n *comment endif\n\n When you decided to become ${name} the supervillain, you never thought you'd say this, but it seems you have no choice: it's time to save the world.\n\n *goto ending\n\n*elseif (yourending = \"anarchy1\")\n [i]One year later…[/i]\n\n Life is good. You settle back in your favorite chair, secure in a secret lair the law will never find (mainly because the law doesn't exist), and think about the wealth and power you attained over the past year. Without any rules to keep people in line, the world prospered. Or at least you did.\n\n It upset the so-called anarchists when you used your villainous influence to do whatever you wanted with impunity, but there wasn't much they could do about it. By defeating Doctor Arachnus, you became one of the deadliest forces in the world. Minions flocked to your side, and your Darkspace popularity was off the charts.\n\n Plus you figured out how to prevent law and order from re-establishing itself. Like any good disorder-promoting anarchist, you eventually established your own rules. Among other things, these rules involve swearing loyalty to you and building statues of you across the world. Being a leader wasn't exactly what you wanted, but it beats living by someone else's laws. You smirk. Once ${name} becomes synonymous with \"government\" on this Earth, maybe you'll arrange your own disappearance and bring back the chaos of anarchy for a while. Then you can do it all over again….\n\n An alarm blares, and you jump up. That's the intruder alert! Throughout your lair, traps will spring into place as your minions prepare for battle. You run to the security room. Angry citizens aren't the only problem you have to deal with, after all. This is probably another disgruntled superhero or supervillain trying to take you down.\n *if (drakedead = false)\n  The Drake has tried a few times, and you don't see ${chim} giving up any time soon.\n *comment endif \n\n *if (SteelBed = true)\n  Sometimes, when an intruder alarm goes off, you spend the first few moments hoping against all odds that it's Steelheart. If ${she} arrived to stop you, you're not sure you'd resist. Well, you'd resist enough to give ${shim} a good fight, but other than that, you'd give anything to see ${shim} again.\n *comment endif \n\n *if (CountBed = true)\n  Most of your enemies confront you in person, but there's been the occasional phone call. Every time, your breath hitches for a moment in the impossible certainty that you'll hear a Russian accent on the other end as the The ${cname} taunts you. ${checap}'s gone, but part of you just can't accept it.\n *comment endif \n\n These alarms are becoming more and more common, and it's starting to take its toll on you. Halfway to the security room, you pause.\n\n The time for ${name}'s disappearance might be at hand.\n\n *goto ending\n\n*elseif (yourending = \"anarchy2\")\n At last, the explosions stop. You stare down at the dead world. Everyone is gone. What is a supervillain like you going to do without Earth? You were supposed to have a fun-filled anarchy for you to perform villainous deeds in. Instead, you have nothing.\n\n Once your shock, horror, and sorrow fade, you'll find yourself afflicted with a much more annoying emotion: boredom. If you wanted to be bored for the rest of your life, you'd have never become ${name} in the first place. Though there were times when you hated it, you now realize how much you needed the world.\n\n Correction. You give yourself a shake. You need [i]a[/i] world. And the spaceship you now stand in is proof enough that there are more out there.\n\n You nod to yourself. Your career as a supervillain isn't over. Far from it. Your dealings with Steelheart, The ${cname}, Minotaur, Nautilus, The Drake, ${sidekick}, Doctor Arachnus, and everyone else you encountered along the way... that was just the beginning.\n\n \"Time to learn to fly this thing,\" you say under your breath as you leave the Spacetime Sphere behind to explore the rest of Doctor Arachnus's—no—your ship. You've been thwarted by your misguided wish, but now you have another plan.\n\n Step 1: Return to Earth's surface in a radiation suit to see if anyone who survived the nuclear holocaust is interested in teaming up with a supervillain capable of space travel.\n\n Step 2: Find another planet and start your life as ${name}, the supervillain from beyond the stars.\n\n *goto ending\n\n*elseif (yourending = \"sun1\")\n [i]A few hours later…[/i]\n\n \"It's hard to explain what happened here, Mindy—\"\n\n \"Don't try, Biff. I've been trying to explain you to people for years, but it just gives me a headache.\"\n\n \"Yes, well, your limited brainpower is not the focus of this newscast, Mindy. Let's take a look at the sun, and the unusual image that appeared on it earlier today.\"\n\n [i]Unusual?[/i] You glare at the TV screen in your bedroom, but your anger quickly fades as the camera focuses on the sky. Hidden behind a filter to protect the viewers' eyes, the new and improved sun appears on the TV. Your face scowls just like the real you. You experiment with a smirk, and the sun smirks right back.\n\n \"That's right, folks,\" Biff continues, \"a human face has appeared on the sun. Now, we've had some reports of kids going blind from staring at the image. Mindy, why don't you stare at it and let us know if that really happens?\"\n\n You grin—a grin reflected in your solar projection. Now you can blind people without actually doing anything, quite a feat for a supervillain.\n\n \"Your sense of humor is as bad as ever, Biff. Instead of embarrassing yourself further, why don't you tell us what you know about this face?\"\n\n \"For once, I agree with you, Mindy—talk about scary. Anyway, preliminary reports say this is the face of ${name}, a supervillain of quite some renown. Among other things, ${name} defeated Doctor Arachnus, worked alongside someone called ${sidekick}, \n *if (SteelBed = true)\n  won the heart of V.A.N.G.U.A.R.D. Deputy Director ${sname} Steelheart, \n *if (CountBed = true)\n  had a love affair with a mysterious agent known only as The ${cname}, \n is known for leaving behind ${trademark}, and is responsible for some of the most noteworthy crimes in recent history. And this is only some of what we've heard. To be honest, we have no idea why ${name}'s face is on the sun, but we'll keep you updated.\"\n\n You smile and settle back to watch more coverage of the phenomenon. Hearing yourself discussed in such a manner makes your heart flutter with joy. Things can only get better from here.\n\n *goto ending\n\n*elseif (yourending = \"sun2\")\n Once the news gets out a few hours later, Darkspace goes crazy.\n\n \"Did you hear what happened to ${name}?\"\n\n \"I've heard rumors. Died by falling into the sun, right? Is that even possible?\"\n\n \"For the supervillain who defeated Arachnus, I'd say anything is possible.\"\n\n Most supervillains question the validity of the news, but soon it becomes apparent that the insane report of your death really is true. After that, the conversations change to speculation.\n\n \"But why dive into the sun? Was it on purpose?\"\n\n \"Fire fetish? ${name} was always clashing with Drake and Fauxton, right?\"\n\n *if (star = true)\n  \"Didn't ${name} work with that crazy ex-superhero, The Star? Maybe they wanted themed names, you know, The Star and The Sun?\"\n\n No matter how accidental your deadly plunge was, the online world is convinced you did it on purpose. The fact that no one can explain why just adds to your mystique. Within hours, \"${name}\" is trending even on non-villainous social media sites.\n\n *if (SteelBed = true)\n  \"${name} was involved with the V.A.N.G.U.A.R.D. Deputy Director, right?\"\n\n *if (CountBed = true)\n  \"I heard ${name} slept with The ${cname}, you know, from Minotaur.\"\n\n \"${name} used ${trademark}, right? I wonder what went on in that strange mind….\"\n\n Soon, images of your dramatic descent into the sun appear across the Internet, with humorous captions and an ever-greater variety of jokes. Yes, you have become a meme.\n\n It's not exactly what you wanted, but at least the name ${name} will live on in infamy for a long, long time.\n\n *goto ending\n\n*elseif (yourending = \"cartoon1\")\n \"${name}!\" sings Ricky Rat after dinner. \"You have a visitor!\"\n\n You hurry to the door and behold the giant anthropomorphic penguin grinning at you. That doesn't really help clarify. In this world, it could be a used car salesman, for all you know. But when the penguin suit opens to reveal a robotic bear, which then unhinges so a purple cat can step out, you begin to understand.\n\n Sure enough, when the sequence of matryoshka dolls ends, Nautilus stands in front of you. Or rather, he stands in front of you for one second. A second later, he throws his arms around you. With a delighted cry of \"Group hug!\" Ricky Rat, Nutty the Dog, and Gerald Goose join in.\n\n Part of you fears the entire happy neighborhood is going to join in, but soon it breaks up and you welcome Nautilus inside. \"But how are you alive?\" you ask, remembering the AI's demise.\n\n \"You created this world! Don't you watch cartoons? The dead bad guys always make a dramatic return.\" He winks.\n\n You stare at him, still a little overwhelmed by his reappearance. Wait.\n *if (CountBed = true)\n  If he's right about this world's rules, does that mean The ${cname} could come back, too? \n *if (SteelBed = true)\n  What about Steelheart? Would that rule apply to ${shim}? \n It can't possibly mean Doctor Arachnus could return…although, in this world, even he wouldn't be much of a threat.\n\n Nautilus looks around at your cartoonishly exaggerated living room (the television is currently stuck on a sequence of three images that repeat over and over) and bursts into laughter. \"After my own heart, are you, ${name}? \n *if (nautilushate = true)\n  It looks like I was wrong about you. \n *if (nautilushelp = true)\n  I knew I was right about you. \n This is genius. It's just…brilliant!\"\n\n You grin, unable to help it. After everything that happened on the ship, part of you worried you wouldn't have any true friends other than your new animal buddies. So many of your allies died in the assault. But no matter what else happened, you've found a kindred spirit in Nautilus, who's willing to take full advantage of your new cartoon world.\n\n The thought of the elaborate stunts and pranks ahead of you makes you giggle. Look out, world, it's time for Nautilus and ${name} to add a little excitement to everyone's lives!\n\n *goto ending\n\n*elseif (yourending = \"cartoon2\")\n While the cartoons play and you prepare for your inevitable doom, you think about everything that happened to you. Life as a supervillain was good. You met all sorts of unusual characters and proved your right to stand with the best of them. You even saved the world by taking down its most feared opponent.\n *if (SteelBed = true) or (CountBed = true)\n  You even found love.\n *comment endif\n\n And to think, it all started because you noticed Professor Murder's Darkspace camera and wondered what it was.\n\n Darkspace…you frown for a moment, and then hurry away from the Spacetime Sphere. If Doctor Arachnus could broadcast messages to the Earth, surely you can get an Internet connection. No way are you dying in a black hole without anyone knowing about it. The Earth can't have been completely consumed yet—and any surviving supervillains are going to die with one thing on their minds: you.\n\n At least your death will be a stylish one. \n *if (SteelBed = true)\n  If there's life after death, you'll be with Steelheart soon. That makes the sting of your mistake a little less harsh.\n *if (CountBed = true)\n  The thought of seeing The ${cname} again in some sort of afterlife brings a smile to your face. There's always a bright side. \n *comment endif\n\n And who knows? Maybe the black hole won't kill you like scientists say it should. Maybe it will transport you to another dimension or something! This could be the start of something great.\n\n You log on to Darkspace and set up a special event. Then you make sure your camera is on and clear your throat. \"Welcome to ${name}'s Black Hole Adventures, part one….\"\n\n *goto ending\n\n*elseif (yourending = \"selfdestruct1\")\n [i]One week later…[/i]\n\n So far, so good. Everything is going according to plan. The world knows you are the one that saved it from Doctor Arachnus, and while that gives you a dubious \"hero\" status in the eyes of many, it also means people are lining up to join you. No one wants to be your enemy.\n\n *if (drakedead = false)\n  Well, almost no one. You received a scorched message that just said \"Next time,\" and you aren't quite sure if that's a good thing or a bad thing. Either way, you're prepared for whatever that fire-obsessed maniac has to throw at you.\n\n *if (SteelBed = true)\n  Much to your alarm the other day, you received a visit from the Deputy of V.A.N.G.U.A.R.D., but even as you prepared for a fight, you received the shock of your life. Because you were close with Steelheart, the V.A.N.G.U.A.R.D. members just wanted to offer their condolences. You got a little teary-eyed, but your shock was almost enough to make you forget the pain of losing ${shim}.\n\n *if (CountBed = true)\n  In stark contrast to all the heroes, villains, and officials trying to get in touch with you, you were contacted this morning by nothing other than a Russian orphanage. \n  *if (countfile = false)\n   You were seriously confused until the woman in charge of the orphanage explained that The ${cname} provided a good amount of its funding, and with ${chim} gone they weren't sure they could make it. \n  You swallowed past a lump in your throat at the thought of The ${cname}. ${checap} would want you to help. And so, in an act of selflessness, you decided right then and there to fund the orphanage—and any others your love was involved with—yourself from now on.\n *comment endif\n\n New messages have arrived for you on Darkspace, and you grin as you go to check them. Life as one of the world's most notorious supervillains is great. Anyone who opposes you will learn how you got that distinction.\n\n And one day, they all shall kneel before you.\n\n *goto ending\n\n*elseif (yourending = \"selfdestruct2\")\n Their faces flash before your eyes in your final moments. The few people who would have remembered you. Professor Murder, whom you \n *if (murderdead = true)\n  killed. \n *if (murderdead = false)\n  spared. \n The Drake, who \n *if (drakedead = true)\n  died at your hands. \n *if (drakedead = false)\n  is probably wreaking havoc at this very moment. \n Nautilus, whose theatricality was matched by no one. ${sidekick}, one of the very first to join you. Fauxton, who underestimated you. Steelheart, who started as just another enemy and became much more.\n *if (SteelBed = true)\n  Part of you longs for ${shis} company.\n The ${cname}, who remains in many ways a mystery to you.\n *if (CountBed = true)\n  At least you'll be together soon, in death.\n *comment endif\n\n Will your dealings with them be enough to grant you a lasting legacy? The sinking feeling in your heart gives you the answer. You affected many lives in your career as a supervillain, but in the end it wasn't enough. This is the end. \n\n Years later, Darkspace villains will speculate about whether you were the one who stopped Doctor Arachnus. A few will even argue that you were one of the greats. \n\n But the rest of the world won't remember you at all.\n\n *goto ending\n\n*elseif (yourending = \"revivesteel\")\n You and Steelheart ride the escape pod back to Earth in silence. When it lands, you look at each other. In a moment, you'll need to go outside and face the crowds of people asking what happened and if the world is safe from Doctor Arachnus now. Before then, you should probably talk about what happened.\n\n \"I…\" Not usually at a loss for words, you falter. Even in your line of work, it isn't every day you bring someone back from the dead.\n\n \"Life and death should be left alone,\" Steelheart says. \"You shouldn't have done that.\"\n\n You should have known ${she}'d disapprove. A little depressed, you nod and look down at your feet.\n\n For a moment, neither of you says anything. Then Steelheart clears ${shis} throat. \"Thank you.\"\n\n Startled by the sudden change, you stare at ${shim} in confusion.\n\n \"Risky or not, you did what you thought was best. I'm flattered you think so highly of me. Thank you, ${name}.\"\n\n \"Well, life just wouldn't be the same without you,\" you say with a slight laugh.\n *if (SteelBed = true)\n  You managed to make the entire descent to Earth without touching Steelheart, but now you can't wait any longer. Driven by the thought of how close you came to losing ${shim}, you lean close and pull ${shim} into a long kiss.\n\n  \"It's going to be difficult,\" ${she} reminds you when you finally separate.\n\n  You kiss ${shim} again. \"We'll make it. We have a whole new future ahead of us.\"\n *comment endif\n \n The smile from your one-time enemy is all you need to restore your confidence that you made the right decision. You stand and prepare to face the world with Steelheart by your side.\n\n *goto ending\n\n*elseif (yourending = \"revivecount\")\n \"Ah…\" The ${cname}'s accented purr makes your heart leap with joy, especially since you so recently thought you'd never hear it again. \"So the prospect of life without me was just impossible to endure, I presume?\"\n\n \"You know it,\" you say with a grin. The two of you walk together through the halls of Doctor Arachnus's ship, taking out any of its remaining defenses and salvaging pieces you want to take back to Earth with you. In truth, you intend to keep the whole ship, but it's better to be on the safe side and get the most important pieces out now.\n\n ${checap} arches on eyebrow. \"Then, ${name}, I assume this means our alliance is still in effect?\"\n\n *if (CountBed = true)\n  \"It's far more than just an 'alliance,' and you know it.\"\n\n  In one swift motion, ${che} whirls and pins you against the wall of the ship. ${checap} kisses you with passion, and when ${che} lifts ${chis} head, ardor glows in ${chis} eyes. \"Then show me exactly what it is.\"\n\n  You're more than happy to comply. When you finally separate, it's only because if you wait too much longer, some nut is liable to think you failed and try to blow up Doctor Arachnus's ship. Well, and because you have options on Earth that are far more comfortable than a spaceship wall.\n\n  \"This should be very…\" ${checap} pauses for a moment and then draws out every syllable of the last word, \"…interesting.\"\n *comment endif\n\n You wouldn't have it any other way. \"It's good to have you back.\" As you finish your scavenging of the ship, you think about what it means to be together with The ${cname} again.\n\n The world won't know what hit it.\n\n *goto ending\n\n*elseif (yourending = \"revivenautilus\")\n \"Of all the people in all the world, you chose me?\" Nautilus sounds more than a little disbelieving.\n\n \"Yes.\" You try very hard not to stare too much, which is harder than it sounds. Your revival brought him back with the same artificial body he used before…sans the mask, and his face is similar enough to Doctor Arachnus's to make you a little uneasy after all that happened. \"The world needs your antics.\"\n\n \"And,\" he says, \"yours?\"\n\n \"What do you mean?\"\n\n \"You have the imagination and sense of humor necessary for me to name you my replacement. But since I have survived, it is more fitting that you become my partner. Is it a deal, ${name}?\"\n\n A grin spreads across your face as you imagine the sorts of stunts you can pull off between the two of you. Who needs minions when you have someone like Nautilus? \"It's a deal!\"\n\n You leave the ship as partners in mischief forever.\n\n *goto ending\n\n*elseif (yourending = \"revivefauxton\")\n Fauxton doesn't look as happy as he should, for someone who just cheated death. Nor does he look particularly grateful. If anything, you'd describe the expression on his face as \"irritation\" or possibly \"annoyance.\" The newly resurrected superhero shakes his head. \"Fate. I thought it was my fate to fight by your side and die, but it seems I'm not through with you yet.\"\n\n You take a step back, just in case he comes to the conclusion that he ought to blast you to oblivion to fulfill fate. Maybe this wasn't the best idea you've ever had.\n\n He doesn't attack. Instead, he asks, \"Why me?\"\n\n After considering the question and your motive for a second, you say, \"I owed you. You sacrificed yourself for me.\"\n\n \"I sacrificed myself to save the world.\"\n\n \"Then the world owed you. Either way, you deserve another chance.\"\n\n \"I see.\" He frowns, then lifts a warning finger. \"Then the debt, whatever it was, has been repaid. Once we reach Earth, ${name}, our alliance is over and we will go our separate ways.\"\n\n You nod, having expected as much. Life will be more or less back to normal in a few days. Fauxton will go back to doing whatever it is he does these days, and you…\n\n You'll be plotting your next scheme as a supervillain.\n\n *goto ending\n\n*elseif (yourending = \"revivesidekick\")\n ${sidekick} seems a bit confused. So confused that you explain you just brought ${sidehim} back to life, just in case ${sidehe} didn't connect the dots and is wondering if it was all just a really weird dream. The explanation earns you a nod, but ${sidehe} remains silent all the way to the escape pod, while you frown and wonder why reviving the dead doesn't warrant at least a thank-you.\n\n Partway through the descent to Earth, ${sidehe} lifts ${sidehis} head. \n *if (sidekick = \"Slog\")\n  \"Why would you revive me?\" he asks. \"I was happy to die for you.\"\n\n  \"I know,\" you whisper after a moment. \"That's why. You're steadfast. And maybe you'll help me become a better person.\"\n *if (sidekick = \"Hackmaster\")\n  Without her mech, she seems very small. \"I never imagined you'd help me. Not like this.\"\n\n  \"We're a team,\" you say. \"You were one of my first allies, and I'm not ready to lose you yet. I still need your help, Dan—\" You remember her outburst and change what you were about to say. \"Hackmaster.\"\n\n  For a long moment, she doesn't say anything. When she finally does, it's with a smile. \"Dani.\"\n *if (sidekick = \"Star\")\n  He looks slightly less haunted than he did during your confrontation at the Spacetime Sphere. Slightly. \"You brought me back. After what I—almost did. Why? I didn't ask for this!\"\n\n  Afraid he might try to destroy the ship, you lift your hands in a placating gesture. \"You deserve another chance.\" You continue talking over his bitter laughter. \"Do you think redemption is impossible? You know what else seems impossible? Reviving the dead. Well, guess what?\"\n *comment endif\n\n Alone in Doctor Arachnus's ship, you and ${sidekick} stare at each other for a while. All the incidents you faced together since your meeting at the diner seem to hover in the air between you. ${sidekick} is the first to look away.\n\n \"Let's go,\" ${sidehe} says, and you smile.\n\n Your lives as supervillain and sidekick are far from over.\n\n *goto ending\n\n*elseif (yourending = \"revivefail\")\n One day later, you've barricaded yourself inside your lair. It turns out there's a reason villains tend to fail when they try to revive the dead without thinking things through. You tried to do too much, and something went terribly wrong.\n\n Maybe \"zombie\" isn't the right word for the creatures outside. They don't seem interested in eating flesh or infecting people. They sure aren't alive, though, either. \"Animated corpses\" is the best description you have, and staring into the dead eyes of your former companions was enough to make you bar the doors just in case.\n\n How did it come to this? Were you too ambitious, trying to conquer death itself, or too soft-hearted, trying to save everyone? It doesn't really matter. The important thing is that you have to do something before the situation gets out of hand. Along with your own allies and enemies you revived, the last news report showed these creatures crawling from graveyards all across the world.\n\n Well, it's not like you've never faced anything like this before. It shouldn't be so bad. Stopping a zombie army? Sounds like a job for ${name}!\n\n *goto ending\n\n*elseif (yourending = \"reverse\")\n A few days later, you're relaxing in your room. With your newfound fame for taking down Doctor Arachnus, you've been able to afford some new additions to your lair, making it something a supervillain can really be proud of. Paperwork is piling up, as many more minions have applied to join you, but you need a well-deserved rest before you can get around to any of it.\n\n You think you'll take a short vacation, just enough to recharge from the mingled stress and exhilaration of taking down a would-be alien overlord and saving Earth. Then it'll be back to business as usual. A few creative heist ideas have already crept into your thoughts. It's almost as though nothing changed at all.\n\n Well, almost nothing. There's no chance of Steelheart getting in your way.\n *if (SteelBed = true)\n  You try to laugh it off as a positive, but in reality your gut clenches whenever you think about ${shis} death. Through your encounters together, you became more attached to ${shim} than you'd thought possible. Life without ${shim} doesn't seem real.\n *comment endif\n  \n And you won't run into The ${cname} ever again.\n *if (CountBed = true)\n  You still can't believe you lost ${chim} on Doctor Arachnus's ship. It didn't really hit you until you were on your way back to Earth and realized ${che} was never coming back. Somehow, up until that point, a tiny part of your mind remained convinced you'd turn around at any moment to see ${chim} walking toward you, battered but triumphant. What will the world be like without ${chim}?\n *comment endif\n  \n Nautilus is gone, \n *if (drakedead = true)\n  The Drake is dead, \n you can't rely on ${sidekick} anymore….\n\n You let out a long sigh. When you really think about it, [i]your[/i] world will never be the same again. Everything has changed. The only thing you can do is look toward the future.\n\n No matter what, ${name} will never give up.\n\n *goto ending\n\n*else\n The next day, you pace back and forth through all the rooms of your lair. The minions you left on Earth stay out of your way—you've already snapped at too many of them since your return. Deep down, you feel a little guilty. After all, it's not their fault they survived when so many of your allies didn't. Still, you can't bring yourself to do anything more than glare at them.\n\n Certain parts of your lair hurt more than others. Every vent reminds you of your dramatic first meeting with Steelheart. You can't help but stare at ${sidekick}'s favorite spot to hang out when ${sidehe} was with you. Even the telephone brings back memories of your early conversations with The ${cname}.\n\n Everything has changed. To most people, the biggest changes are those caused by Doctor Arachnus's attempts at terraforming Earth. To you, it's a lot more personal. You'd fallen into a comfortable routine in your life as a supervillain. The events on the ship took that routine and tore it to pieces.\n\n Frustrated, you slam your fist against the wall. This is no good. You're victorious! You should be celebrating, making the most of your newfound fame, or at least mocking the people on Darkspace who didn't believe you when you tried to warn them about Doctor Arachnus. Instead, you can't seem to do anything but growl at your unfortunate minions and mope around the lair. You need something to boost your spirits. Something like…a new scheme.\n\n A scheme worthy of ${name}. Let the planning begin.\n\n *goto ending\n\n*label ending\n*page_break FIN\nWe hope you've enjoyed playing [i]Diabolical.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "chaptertwo": "*label start\n\n*image chap2.png\n\n(Note: Starting with this chapter, succeeding on certain skill checks will earn your villain Planning Points. These represent your villain picking up some bit of info or strategic advantage that adds to their ability to plan for any occasion. Planning Points can b
