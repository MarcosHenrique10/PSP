e spent to unlock certain, usually positive, choices in dangerous situations, helping you when you might normally fail.) \n\n[i]Six months earlier…[/i]\n\nIt's Friday night and, as has become depressingly more common lately, you're home alone. Mother and Father are, if their annoyingly frequent and unnecessarily lurid e-mails are anything to go by, really \"getting a kick\" out of their second honeymoon in Tibet. \n\nMeanwhile, all of your college \"friends\" (and you use the term loosely) are off enjoying a moron's idea of an exciting life. Scott is wingsuiting around South America, \"finding himself,\" which apparently involves bouncing his head repeatedly off of mountains. Lance is in New York, expanding his horizons by becoming the exact same amoral, joyless stockbroker his mother was. And Biffany is off somewhere in Africa, saving a lot of people who probably wish there was someone around to save them from Biffany.\n\nIt's all so terribly dull.\n*page_break\nYou console yourself by rummaging around in the mansion's enormous walk-in refrigerator, looking for something edible amongst the piles of nouveau riche junk your parents usually keep in here. Caviar, foie gras, five different kinds of quinoa…you're pretty sure your dad learned how to be a rich dude by reading comic books.\n\nEventually, you manage to assemble the makings of a half-decent grilled cheese sandwich and, after only getting lost twice, find your way out of the fridge. Sandwich assembled and cooked, and minor feeling of accomplishment relished, you ponder what to do with the rest of your night.\n\n*fake_choice\n #\"I should do something that improves myself.\"\n  You'll read a book! Or knit! Or…knit a book about reading?\n #\"I'm going to paint the town red!\"\n  You're going to party harder than…some very hard thing! Corundum! A 9 on the Mohs mineral hardness scale!\n #\"I should write Grandmother a letter!\"\n  That delightful old matriarch would well enjoy some thoughtful correspondence!\n*comment endchoice\n\nYeah, obviously you're not going to do that.\n\nCarrying your sandwich, you walk down the hall for the full minute it takes you to get to the TV room. Stupid mansion. You plunk down in your easy chair, the only piece of furniture in the entire room that cost less than $5000 (and the only one that doesn't hurt like hell to sit in), and flip on the ostentatiously large TV.\n\n\"More news out of Bell City tonight, where V.A.N.G.U.A.R.D. troops are still working with local authorities to clear the mecha-spider infestation out of the city sewers. Dozens are dead at the hands of the robotic menace, and while no parties have come forward, this bears all the hallmarks of an attack by the notorious Doctor Arachnus. Mindy?\"\n\n\"That's right, Biff. Arachnus, real name and doctoral status unknown, is well known for his reliance on robotic minions and utter indifference to human life. Some stories say he drinks his victims' blood, although there is no evidence to substantiate such claims. It's unclear what the malevolent miscreant, last seen publicly on the day he assassinated President Alex Johnson in Washington D.C., hopes to gain by filling the city sewers with mechanical eight-legged monstrosities, but we can be sure of one thing: it's probably not something nice. Biff?\"\n*page_break\n\"Thanks, Mindy, and, may I say, you're looking lovely today!\"\n\n\"Don't objectify me, Biff, it's disrespectful.\"\n\n\"Hey, lady, don't blame me. I'm just doing what the hack couples therapist you're making us go to told me to do. Now, in other news, allegations continue to come to light in the corruption scandal rocking the Federal Banking Authority.\n\n\"Leaked documents show that more than two hundred employees of the agency, tasked with monitoring and regulating all major financial transactions in the country, are on the payroll of the infamous international criminal syndicate known as Minotaur. It's unclear exactly how much this influence has aided the organization with their illegal activities, which include gun-running, human trafficking, and murder-for-hire, but conservative estimates put the damage in the tens of billions. Mindy?\" \n*page_break\n\"Finishing on a lighter note, dinosaurs walked the earth for the first time in millennia in the small town of Grover's Hamlet, Iowa, this week. Dinosaur holograms, that is! The Jurassic illusions, projected from what appears to be a hidden satellite in orbit around the Earth, are life-size but apparently harmless. According to paleontologists, the holograms are remarkably accurate, save for one detail—a small nautilus shell hidden on each one's hide.\n\n\"While older residents grumble about the 'disruptive' nature of the mysterious light show, the children of Grover's Hamlet have quite a different opinion….\"\n\nNews footage plays of children running through the streets of the small town, laughing with joy at the prehistoric \"invasion.\" Their parents look on with more concern.\n\n\"Hey, Mindy, that one looks like your mother!\"\n\n\"Keep talking, Biff. It's all going in my alimony papers.\"\n\nAs the news team continues to bicker, you take a moment to reflect on what you've seen.\n\n*choice\n #\"I hate that they always edit out the good parts of Doctor Arachnus's attacks.\"\n  Eh, you'll be able to find the juicy stuff on the net tomorrow, anyway.\n  *set lethality +1\n  *goto next\n #\"I bet Minotaur leaked those documents themselves. Classic.\"\n  They get to keep all the money and destabilize the regulators. You have to love their elegant approach to getting filthy rich.\n  *set activist %-10\n  *goto next\n #\"If I booked the flight tonight, I could be in Iowa tomorrow.\"\n  Try as you might, you've never managed to make it to a Nautilus \"crime\" in progress. This might be your chance to watch him or her in action, maybe get a few pointers!\n  *set theatricality %+10\n  *goto next\n*label next\n  \nYou are shaken from your reverie by the distinctive melody of breaking glass. From the sound of it, a window on the ground floor just shattered. Probably not of its own volition.\n*page_break\nYou grab the remote and switch the TV's input to the mansion's closed-circuit camera system, the source of much of your childhood paranoia. You quickly flip through the dozens of cameras arrayed throughout the mansion until you come upon an unsettling scene.\n\nSeveral people are standing in the mansion's downstairs den (as opposed to the upstairs den, the rec room, the TV room, or your dad's \"office,\" which earns those dismissive air quotes by nature of containing two pool tables but no computer). Most of them look like the kind of people you'd get if you searched the phone book for \"Thugs, Disreputable.\" They're all big, burly, and armed. Standing at their center is an older woman who wouldn't look out of place quietly judging people at a church social, if you ignore the ill-fitting suit covered in skulls and the heavy pistol bouncing nervously between her hands. She appears to be speaking animatedly to the others. You turn up the mic on the camera….\n\n\"—everything that isn't nailed down! These people are stupid loaded, and I want you stupid people to load the loaded stuff into the loading van, stupids!\" She seems to think this was a very clever thing to say, given the little gun flourish she finished it with. The thugs seem unimpressed, and rightly so.\n\n\"The whole family is out of the country with their servants, off in England or some stupid thing! The place is ripe for the taking. We'll make a killing tonight, boys, or my name's not Professor Murder!\"\n\nEngland? Your family's not in…oh, for God's sake. The Carmichaels. This idiot thinks this is the Carmichaels's mansion, and now she and her idiot thugs are going to ransack your house and kill you because she can't read an address properly.\n\nWell, to hell with that.\n\n*choice\n #Run for the panic room.\n  If making your way to the secure, high-tech nexus of the mansion's security system is cowardly, you don't want to be brave.\n  *goto panic\n #Make a quick dash for the downstairs armory.\n  For years, you've been suggesting overpowering firepower as the solution to problems, and nobody has ever agreed. Today, there's nobody to say no.\n  *goto armory\n #Stick to the shadows and look for traps to set.\n  When you were a kid, there was only one movie you loved more than [i]Batman[/i], and that was [i]Home Alone[/i]. Time to put all that training to use.\n  *goto traps\n  \n*label panic\n*page_break\nAs the steel-reinforced door locks shut behind you, you feel grateful, for the first time ever, to the fast-talking security company stooge who talked your dad into dropping six figures on the mansion's security hub (forcing you to put off your junior-year trip to Florence from spring break to summer, a social faux pas your high-school reputation never really recovered from). As computer monitors cycle through the mansion, showing the intruders moving from room to room, stuffing valuables into sacks, you grab the police hotline installed on the wall…only to be met with no dial tone, only silence. You honestly weren't expecting someone dopey enough to prance around calling herself \"Professor Murder\" to think far enough ahead to cut the mansion's external data connection.\n\nIt's time to take a moment to think.\n\n*choice\n #Rig the mansion's fire suppression systems to take down the thieves.\n  *goto fire\n #Get on the mansion's intercom system to scare them senseless.\n  *goto pa\n #Activate the security countermeasure system.\n  *goto countermeasure\n\n*label fire\nThe mansion is outfitted with dozens of tanks of fire-suppressant foam, ready to fire at the first sign of anything burning that might damage the house's resale value. Normally, there are security protocols in place to stop them from firing at normal temperatures, but you think you might be able to fake the system out by overloading the sensors.\n\n*if ingenuity > 50\n You spend a few minutes typing, drawing on all of your experience screwing around on script-kiddie hacking forums. Just when you're about to tear your hair out at yet another \"Invalid command, please try again,\" the system goes green. The security computer becomes immediately, disastrously convinced that the mansion is burning down. It springs into action, spraying more than half the rooms with the rapidly hardening fire-suppressant foam. This comes as something of a surprise to Murder's goons, many of whom are glued in place by the white gunk.\n\n Unfortunately, the \"fire\" also activates the panic room's backup emergency failsafe, unlocking and forcing open the door so that the occupants don't get roasted alive by the nonexistent flames, meaning that this place has probably outlived its use as a safe haven. Still, you've taken out several of the invading criminals and learned a bit about keeping yourself cool in a crisis. \n *set murderstrength -10\n *set planning +1\n \n (You have earned a Planning Point!)\n *goto roundtwo\n*else\n You spend several minutes screwing around with the computer system, but the fact of the matter is that all of your experience at getting DOS to print out \"BUTTS BUTTS BUTTS\" a hundred times in a row isn't really helping you here. The best you can do is screw with the computer-controlled pressurization on the foam tanks, rupturing one right next to a goon who was busy digging through your mom's third backup jewelry box. He falls back, knocked out. Apparently the system dislikes explosions: all of the monitors cut to black, while the panic room door slides open with the condescending smugness of a butler inviting an embarrassing distant relative to take his or her leave. You skulk out.\n *set murderstrength -5\n *goto roundtwo\n\n*label pa\nAlmost every room in the mansion has a small, nondescript intercom hidden in the wall near the floorboards. And despite what you have sworn to your mother on multiple occasions, as a kid you used to be pretty good at using them to scare the crap (literally) out of any of the dozens of humiliatingly weak-chinned, annoying lapdogs she's owned over the years.\n\n*if terror > 50\n This situation probably calls for more finesse. Instead of broadcasting to all of the rooms at once, you begin cycling from room to room. Did that thug just hear a distant gunshot? (No, it was you cracking your knuckles.) Does that roguish gunsel with bad memories of jail hear the sound of approaching sirens? (He does not, he hears you.) Within about ten minutes, you've worked Murder's crew into such a state that, when you do open the channel wide and give your best mocking, terrifying laugh, several of them drop their weapons and run for the door. Almost worth letting the rest know where you are, you think, as you force the panic room door open and slip back into the mansion proper.\n *set murderstrength -10\n *set planning +1\n \n (You have earned a Planning Point!)\n *goto roundtwo\n*else\n It turns out that professional criminals are a little harder to spook than an inbred toy poodle with a prescription for doggy anti-anxiety meds. The goons are merely non-plussed by your initial warbling \"whooooooo\" ghost sounds. They're actively amused when you try to convince them that there's some sort of invisible snake wandering around. And when you deploy your most menacing, most terrifying cackle, one of them starts laughing so hard that he cracks his head on the den's mantle, knocking himself out. You decide to count that as a win, even as you force the panic room door open while Murder's shrill voice orders her men to find you.\n *set murderstrength -5\n *goto roundtwo\n*label countermeasure  \nYou're vaguely aware that the house has devices placed in several rooms for exactly this kind of emergency, but you're honestly a little unsure of them. Your normally lax parents were frustratingly good at making it extremely clear how severe the punishments would be if they found you playing with this stuff. That being said, you do know the password to access them, and quickly type it into the security console. A panel unlocks, revealing a pair of joysticks.\n\n\"It's just like a video game!\" you say out loud to yourself, and then quickly look around to assure yourself that no one heard that incredibly cliché line. \n*if combat > 50\n Sadly, your expectations of wall-mounted flamethrowers and drop-down assault turrets are not to be. Each room is equipped instead with a small stun gun. Your experience on the firing range serves you well, and you manage to neutralize several of Professor Murder's goons before they start destroying the guns. Said destructions activate the panic room's failsafes, causing the door to open, and you sneak away before they come looking for you.\n \n (You have earned a Planning Point!)\n *set murderstrength -10\n *set planning +1\n *goto roundtwo\n*else\n Today, you learn a useful fact for the future, if you end up having one: playing a lot of shooters on your YboX doesn't translate well to blasting home invaders with stun guns, which is what you're doing (poorly) right now. You take out a single thug, mostly by mistake, before accidentally zapping the door to the room you're currently hiding in. Through some combination of bad wiring and Murphy's Law, you manage to short the entire system out. You slink out of the panic room.\n *set murderstrength -5\n *goto roundtwo\n\n  \n*label armory  \n*page_break\n\"The armory\" is a grandiose title for what is, essentially, a small storage closet that happens to contain things that could kill people. Most of the weapons on display here are prized more for their value as collector's items than as means of self-defense. Still, there are a few viable options. The fully functioning replica of the gun from the Filthy Ronny cop-vengeance movies, bought by your dad during a drunken online auction binge. The bow from the summer when \"Damn it, we're going to go out as a family and kill our own food!\" (Also known as 'The summer you snuck out to fast-food places all the time.') And a stun gun. There's no cool story for that one—it's just a stun gun. They're useful when you're rich and paranoid.\n*label weaponchoice\n*choice\n #I want to make them crap themselves. I take the pistol.\n  *set terror %+10\n  *goto pistol\n #I need to stay quiet. The bow'll have to do.\n  *set theatricality %-10\n  *goto bow\n *hide_reuse #I don't want to kill anyone. The stun gun's the right choice.\n  *set lethality -1 \n  *goto stungun\n  \n*label pistol\nAs you grab the ridiculous hand cannon, you hear movement behind you. Ducking behind a table, you desperately try to remember which drawer your mom stores the ammo in. You freeze as someone stomps in, laughs gruffly, and begins ransacking drawers on the other side of the room. The thug dumps one of the drawers onto the floor, and something rolls under the table toward you. You grab the bullet and quickly load it into the gun just as Murder's goon sees you and prepares to cry out.\n*choice\n #Fire at the goon, aiming to kill.\n  *set lethality +5\n  *goto killpistolshot \n #Fire at the goon, aiming to wound.\n  *goto woundpistolshot\n #Use the gun to threaten the goon.\n  *goto threatenpistol \n*label killpistolshot\nBefore the goon can finish crying out, you pull the trigger. Your aim's not great, but at a distance of three feet, it doesn't have to be. The first thing that happens is that his head snaps backward. Then a lot of other things happen that you don't process especially well at the moment, but which will serve as fodder for your recurring nightmares in the years to come. Aware that the shot must have alerted Professor Murder (shudder) and her (other, still alive) thugs to your location, you quickly grab more bullets from the floor, desperately wipe them clean, and flee.\n*set combat %+10\n*set murderstrength -5\n*goto roundtwo\n\n*label woundpistolshot\nThe thug cries out in pain as you aim at his leg and fire. You didn't pay enough attention in anatomy class to know what kind of veins are in that part of the leg, but as the thug falls to the ground, you notice that he sure is bleeding a lot. He continues to moan in agony, certainly drawing more of his comrades to the armory. Wasting no time, you flee for another part of the mansion. You console yourself that, one way or another, Murder is going to have to take care of her man, which should work as a useful distraction.\n*set murderstrength -10\n*goto roundtwo\n\n*label threatenpistol\nRising from behind the table, you casually point the gun between the goon's eyes and begin to speak. \"Friend, there's two ways this can end. Would you like to know what they are?\" Eyes wide with terror, the man nods slowly, careful not to make too sudden a movement. You smile at him, coldly. \"In one, you do something stupid, I pull this trigger, and you die here like a moron. It's not much of a future, is it?\"\n\nThe thug carefully shakes his head, eyes locked on yours.\n\n\"In the other, you tell me everything you know about Murder's operation. How many men are on your crew, whether she has any crazy powers or devices. Then, I knock you out and tie you up, take down your poorly dressed boss and former associates, and, when the cops come to clean up, I don't mention anything about the man who mysteriously escaped from my armory. I like that one, don't you? It offers many benefits over the first, but the most important, to my mind, is that it is longer. Much, much longer. What do you think?\"\n\nHe looks into your eyes, and you do your damnedest to project cold, dark certainty at him. You're not sure where these words are coming from, but you feel a thrill running through you, intermingling with the fear.\n\nHe tells you everything.\n*set terror %+10\n*set murderstrength -5\n*goto roundtwo\n\n*label bow\nYou lower the bow from the wall, only to realize that there are no arrows stored in here. At the same time, you hear approaching footsteps. Thinking quickly, you hide yourself behind the armory door. One of Murder's criminal associates barges into the room and gives a little laugh as he sees the modest array of weapons. Then he gives a little gurgle as you bring the bowstring down around his neck like the world's bulkiest, most awkward garrote. He's stronger than you, but you don't have a thick wire wrapped around your throat, so the fight is just about even. Finally, he slumps to the ground, unconscious. You find a few notes from Professor Murder (full of misspellings, which really throws the whole 'Professor' thing into doubt) detailing a few parts of their plans, which you commit to memory.\n*set murderstrength -5\n*set theatricality %-10\n*goto roundtwo\n\n*label stungun\nYou grab the stun gun, checking its charge level. It's full, although you know (from some very stupid, very drunk) personal experience that the small device only carries enough of a kick to knock out a grown person one time out of two. You're not crazy about those odds, and even less crazy about them a few seconds later, when you hear someone walking down the hall toward the armory's open door.\n\n*choice\n #Quickly rewire the stun gun to up its output.\n  *goto rewire\n #Take my chances with the stun gun at its current level.\n  *goto current\n #Abandon the stun gun and decide to use a different weapon.\n  You don't want to kill anyone, but you don't want to be killed, either. Looks like it has to be either the pistol or the bow.\n  *goto weaponchoice\n\n*label rewire\n*if ingenuity > 50\n You've been playing with electricity since you were a kid. It's the work of moments to turn the docile little stun gun into a hissing, sparking monster. The look on the incoming goon's face is priceless as you leap at him, Electric Mayhem Death Wand outstretched. The other expressions, as he spasms on the ground while electricity flows through him, are also pretty good.\n *set theatricality %+10\n *set murderstrength -5\n *set planning +1\n \n (You have earned a Planning Point!)\n *goto roundtwo\n*else\n It takes no time at all to pull out the stun gun's battery, flip it backwards, and shove it roughly back into the casing. According to your favorite sci-fi show, Dr. Space Journey, you've just reversed the polarity, turning the stun gun into a spatial screwhammer. You laugh madly as you leap at the incoming goon, barely noticing that the stun gun isn't actually working. You end up bludgeoning the thug over the head with it, although you take a few rib punches in the process.\n *set theatricality %+10\n *set murderstrength -5\n *set combat %-10\n *goto roundtwo \n\n*label current\nThe stun gun has enough juice for three full-power blasts. If the first one doesn't take the incoming goon down, the next one will. Or he'll shoot you. That's also a possibility.\n\nYou make things a little easier on yourself by scampering (you try not to think of it as scampering, but, watching the security footage later, scampering is the only word to describe it) behind the armory door. When the thuggish, heavily tattooed man walks into the room, he barely has time to register the signs of recent occupancy before you've thrust the small device against his neck and pressed the trigger.\n\nHe roars angrily, turning toward you. Before he can shoot you dead, which is, from the understandably upset look on his face, his intent, you shove the stun gun against his chest and fire it again.\n\nIf anything, this only makes him madder, and the goon backhands you viciously. You're just clearing the stars out of your head when you hear the click of his gun cocking. You reach forward from where you lie on the floor and zap his ankle once more with the stun gun. You barely manage to roll away before his now-comatose body slams into the ground next to you, accompanied by the smell of slightly cooked flesh.\n\nBut hey, you tell yourself as you run from the room, at least you didn't kill him!\n*set murderstrength -5\n*set activist %+10\n*goto roundtwo\n  \n*label traps\n*page_break\nYou realize that you have one major advantage over the goons who have invaded your home: you know the layout. Even if they have a map, thanks to Professor Murder's bungling it's not even a map of your home. You've spent your entire life in this place, learning all of its hidey-holes, its little quirks, the places that make it easiest to keep out of the way of well-meaning but self-absorbed and irritating parents. Or, you know, murderous psychopaths.\n\nA few ideas for traps come into your mind as you reconnoiter the mansion's upstairs rooms. However, if the sound of approaching ransackers is anything to go by, you'll only have time to implement one.\n\n*choice\n #Set up trip wires on the staircase.\n  *goto tripwires\n #Booby-trap the upstairs doors.\n  *goto doors\n #Trap the most-valuable things in each room.\n  *goto closets\n \n*label tripwires\nThere are three staircases that connect the upper floors of the mansion to the ground floor. Grabbing a roll of wire from a nearby storage closet, you manage to place near-invisible tripwires across two of them before Murder's crew gets too close. From a conveniently hidden alcove, you listen as the booted thugs make their way incautiously up the stairs. Long seconds pass…and then you hear a loud curse as someone walks mid-step into a taut, chest-high wire. \n\nWith a sound like a busy night at a bowling alley, the thug falls backward, crashing into the man following him. Both tumble down the stairs in a clatter of limbs and weapons. At the same time, goons moving up the second staircase hit their tripwire, with comparable results. From your hiding place in the shadows, you feel something well up deep within you. You consider holding the laugh in, but it seems to have a will of its own. You throw your head back, and a menacing guffaw echoes through the dark mansion.\n\nYou hear Murder's shrill, annoying voice cry out in the dark. \"There's someone here, stupids! Find it! Kill it! Obey me!\"\n\nYou abandon your hiding place, sticking to the shadows as you go.\n*set murderstrength -10\n*set terror %+10\n*goto roundtwo\n\n*label doors\nYou move quickly, gathering up anything heavy you can find and placing it precariously on top of every door you can get to. It's a lot like the old prank where you put a bucket of water over a door, except in this case the \"bucket\" is a thirty-pound iron statue of a horse given to your dad by a former President of China, and the \"water\" is a possibly fatal concussion.\n\nFrom a hiding spot under one of the house's many staircases, you hear Professor Murder's goons make their way through the upper floor. The first one to recklessly barge through a door gets a hideous marble paperweight to the brain for his troubles. The traps catch a few more of the goons before they wise up and open doors more cautiously. Still, you've taken out some of Murder's crew and learned a little bit about setting traps in the process.\n*set murderstrength -10\n*set planning +1\n\n(You have earned a Planning Point!)\n*goto roundtwo\n\n*label closets\nYou sneak from room to room, identifying whichever bit of loot will most likely draw a robber's eyes, and find some way to make grabbing it a perilous proposition. Tripwires in front of an ancient Ming vase. The cabinet containing the fine china rigged to fall forward at the slightest touch. A flat-screen TV rewired to zap anyone who touches it. With a few minutes of work, you've converted the upper floor of the mansion into the world's least friendly museum.\n\nRunning to a small, hard-to-see closet, you hide and listen for the results of your work. The traps manage to catch a few of the goons off-guard, but the actual damage is fairly minimal. Still, you did manage to freak the robbers out, and you grabbed your dad's guaranteed-authentic replica samurai sword while you were prowling around, so you're in a better position than you were ten minutes ago.\n*set murderstrength -10\n*set combat %+10\n*goto roundtwo\n\n*label roundtwo\n*page_break\nBreathing heavily, you run through the halls of your family's mansion. While you've taken out at least some of Professor Murder's crew, you know that more of them are moving through the mansion, and they almost certainly know by now that the place isn't as unoccupied as they thought.\n\nAnd despite that, you surprise the hell out of yourself by smiling. This situation is dangerous, terrifying, upsetting…and fun. For the first time in what seems like years, you don't feel like you're in danger of being bored to death. Stabbed, shot, maybe strangled to death, yes. But you're not bored.\n\nAll of these thoughts go out of your head, though, as you round a corner and run into a stone-eyed killer with a knife and no interest in witnesses.\n\n*choice\n #I intimidate the goon into turning and fleeing.\n  *goto roundtwointimidate\n #I tackle the thug without a second thought.\n  *goto roundtwotackle\n #I pretend to see someone behind him, then hit him.\n  *goto roundtwoingenuity\n  \n*label roundtwointimidate\n*if terror > 50\n  You smile coldly at the goon, looking completely unfazed by his weapon and his scary face and by the fact that he's, like, twice your size. \"You shouldn't be here,\" you whisper in your calmest voice. \"Only dead things are here.\" Then, you step backward, into the shadows of the dimly lit mansion, and give a sad little chuckle. The goon, suitably freaked out, turns and runs down the hallway.\n  *set murderstrength -5\n  *set theatricality %+10\n  *set planning +1\n  \n  (You have earned a Planning Point!)\n  *goto murderpartone\n*else\n  You raise your hands over your head and shout \"Boo!\" in your most frightening voice. The hardened criminal just rolls his eyes and advances on you, knife drawn. His mother should have taught him not to walk with rolled eyes, because he trips on the carpet and lands on top of you. The knife is between the two of you, and for a second you think you've been stabbed. Then you realize that the knife is also between two of the thug's ribs. He grunts angrily, staring into your eyes from beyond some far place as he dies. It takes you a while to recover enough to roll the corpse off you. But at least you've learned a little bit about what \"scary\" really means.\n  *set terror %+10\n  *set murderstrength -5\n  *set lethality +1\n  *goto murderpartone\n\n*label roundtwotackle\n*if combat > 50\n You throw yourself at the goon with reckless abandon. Your parents taught you a lot about fair play, honesty, and always giving the other guy a fair shake. You throw all of that aside as you beat on the home invader with no regard for decorum or decency. Eventually he falls unconscious, and a little bit after that you stop hitting him. \n *set theatricality %-10\n *set combat %+10\n *set murderstrength -5\n *set planning +1\n \n (You have earned a Planning Point!)\n *goto murderpartone\n*else\n You tackle the guard ineffectually, flailing at him with wildly swinging arms. By sheer luck, you manage to catch him in the temple before he can stick his knife in your lungs, and he goes down. You stare at your hand, amazed by your newfound power. Searching through the goon's pockets, you find a medical alert bracelet that informs you that he has epilepsy and should avoid any sudden head trauma. You feel slightly less amazing.\n *set murderstrength -5\n *goto murderpartone\n \n*label roundtwoingenuity\n*if ingenuity > 50\n You pull the old \"I see someone behind you, so you'd better turn and look so I can hit you\" ruse on the knife-wielding maniac. That doesn't work, so you improvise, switching to the almost-as-old \"I pretend to not see someone coming up behind you so that you don't notice them\" trick. This also fails, which means the goon does turn to look to see the person you're pretending to pretend not to see, and you smash a nearby vase over his head.\n *set theatricality %+10\n *set murderstrength -5\n *set planning +1\n \n (You have earned a Planning Point!)\n *goto murderpartone\n*else\n You pretend to see someone behind the goon. In your mind, this involves happily waving and shouting \"hello\" in the most convincing manner you can muster. Somehow, this fails to get the man to turn around and look. On the other hand, your frantic waving dislodges a small bronze statue on the nearby mantle, which falls on the robber's head before he can stab you to death with his stabbin' knife. You keep waving for a moment out of shock, and then stop when you remember that there's no one else actually there.\n *set murderstrength -5\n *set ingenuity %+10\n *goto murderpartone\n \n*label murderpartone\n*page_break\nYou hear a loud commotion from the kitchen. Suddenly, two pairs of thick hands grab you from behind, and you find yourself marched into the brightly lit room. \n\nIn the kitchen, you see Professor Murder lounging at the kitchen table. Her ill-fitting suit looks no less ridiculous in person than it did on the mansion's security cameras. You're struck by how little time has passed since you were last in here, before your boring night was disrupted by this chaos.\n*if murderstrength > 5\n\n Surrounding her are two or three more of her associates, their numbers thinned but not wiped out by your previous efforts. Murder watches her men drag you in with a crazy person's version of confidence. Her hair is long, gray, and poorly kept. Her eyes are bloodshot—and staring. You also notice a strange small device clipped to her lapel. It looks sort of like a camera, with a staring green eye. After a moment, she speaks.\n \n \"Well, well, what do we have here? An intruder in my perfectly laid plan? The house is supposed to be empty, you know, and Professor Murder doesn't take kindly to trespassers!\" You see two of her henchmen exchange slightly worried glances at this diatribe, but they're apparently used to their boss making little to no sense.\n \n Still, even if her words aren't exactly clear, the Professor's murderous intent is. If you don't do something, and quickly, she's going to kill you.\n *goto murderchoiceone\n*else\n\n Aside from the two goons carrying you, the kitchen is empty. You feel a small thrill of pride, knowing that, if nothing else, you've made this psychopath's job considerably harder. \n\n She stares at you, panic hiding behind the madness in her eyes. She distractedly sweeps a frail hand through her thin, gray, unkempt hair. You notice a strange device clipped to her lapel. It looks like a camera, with a green eye staring directly at you. Before you can wonder about what it could be, the madwoman speaks.\n \n \"So, this is the stupid little sneak that's been creeping around my mansion! Hurting my boys, slowing me down. Well, you know what we do to sneaky little stupid sneaks, don't you?\" The woman is clearly cracked, but that doesn't make her any less dangerous. If you're going to get out of this alive, you've got to do something.\n *goto murderchoiceone\n \n*label murderchoiceone\n*choice\n #Try to get her talking to buy time.\n  *goto murderlogue\n #Make a dash for the walk-in refrigerator.\n  *goto fridgefight\n *selectable_if(planning > 0) #Execute a cunning plan. (Costs 1 Planning Point.)\n  *goto cunning\n  \n*label murderlogue\n\"Who the hell are you, lady? How did you devise such a cunning, intricate plan?\" You've watched enough footage of rampaging supervillains to know that there are very few who can resist the urge to go on at length about how clever they are. True to form, despite her minions rolling their eyes, the Professor begins to speak animatedly.\n\n\"Is it possible, fool, that you do not know of…Professor Murder? Once the finest assistant professor of applied semantics ever employed by Metro City Community College, until that dark, stupid day, lo these many years ago, that the nefarious Dean Michaels revoked her tenure. You profess not to know of her turn to her true destiny, her true calling, of crime, and also murder?\" The Professor begins talking with her hands, rising from her seat and pacing.\n\n\"Certainly you have heard of my daring raid on the college bursar's office!\" You shake your head. \"The diabolical assassination of the advisory board for the School of Liberal Arts?\" Another head shake. The Professor is getting angrier and angrier, waving the gun in her hand around wildly. Her steps bring her closer to where you stand.\n\n\"Perhaps not, my ignorant ignoramus! But certainly, when the authorities find out that I've ransacked the home of the illustrious college president, Ronald Carmichael, killing…whoever you are—\"\n\n\"This isn't President Carmichael's house,\" you interject.\n\n\"—stealing his priceless treasures and burning the stupid place to the grou—wait, what?\" The Professor turns, shocked. Instead of answering, you break free from the hands gripping you and charge the old woman. Unsurprisingly, she goes down easily, and with a quickness you didn't know you possessed, you grab the gun, aiming it at her goons.\n*goto murderchoicetwo\n\n*label fridgefight\nTaking advantage of a momentary lapse in the goons' attention, you break free from their grip and run for the kitchen's vast walk-in refrigerator. A shot rings out behind you as Murder fires her comically large pistol. It just misses you as you yank the door open and dive into the packed, icy room. \n\nMoving swiftly, you lose yourself among the shelves of dairy products and years' worth of leftovers. You hear your pursuers following, and duck behind a giant slab of meat hanging from a hook in the ceiling. Shoving against it, you feel it connect with a goon, who goes flying against a shelf of milk bottles. Despite this moment of triumph, you hear a gun clicking, and turn to see Professor Murder taking aim. \n\nBefore she can fire, though, her foot slips on a puddle of spilled milk, and she falls. You take advantage of the moment, resisting the obvious pun and grabbing the weapon. \n*goto murderchoicetwo\n\n*label cunning\n*set planning -1\nIt strikes you that there a lot of things Professor Murder doesn't know. Whose house this is, for one. How to find a decent tailor, for another. And she especially doesn't know that you accidentally left a burner on in here when you were making your dinner earlier. She doesn't know that the chair she's sitting in is poorly balanced and notoriously easy to tip over. She doesn't know that giving you time to watch her people, watch her moves, and come up with a plan was just about the stupidest thing she could have done.\n\nYou raise your hands in a gesture of surrender that just happens to put them in position to rattle the rack of pots that stretches along the kitchen ceiling. The one that your mom keeps swearing she'll get around to fixing, since they're always dropping off. A giant brass saucepan crashing to the floor is enough of a distraction to let you step forward and gently tap Murder's chair backward with your foot. \n\nAs soon as her ratty, heavily hair-sprayed hair hits the still-lit burner, it goes up in an explosion of fiery chemicals, which causes the goons to flinch. She screams, running for the nearest sink. In her haste, the good professor's gun clatters to the floor, and you scoop it up with surprising speed.\n*set notoriety +10\n*goto murderchoicetwo\n\n*label murderchoicetwo\n*page_break\nSo, here you are. A supervillain at your mercy. A gun in your hand. Goons watching you, waiting to see what you'll do. And you know what you should do, really. You should have done it half an hour ago: grab the cellphone out of your pocket, call the police, and be done with this. You'll hold Murder and her boys in place until the cops get here, and then go back to your normal, boring life (with the added excitement of talking to insurance people about how you're going to cover all the damage).\n\nAfter that, you'll find a job somewhere. Maybe in the private sector, maybe with a not-for-profit. You'll meet someone, fall in love, start a family. Get old and boring and rich, just like your parents. Die surrounded by loved ones, with nary a regret and a lifetime of memories.\n\nHow does that make you feel?\n\n*choice\n #I resent the idea that I could ever have enough money.\n  *set activist %-10\n  *goto murderchoicethree\n #It makes me so bored I think I might cry.\n  *set theatricality %+10\n  *goto murderchoicethree\n #I can't let the world go on the way it is.\n  *set activist %+10\n  *goto murderchoicethree\n\n*label murderchoicethree\n*page_break\nHalf-distracted, you look at the unfortunate Professor, who watches your (previously her) gun warily. \"What's that thing on your lapel? The camera,\" you say.\n\nShe looks down at it. \"My Darkspace credentials? You fool, you'll never comprehend the majesty—\" You wave the gun, and she shuts up. You turn to one of her minions and ask the question again.\n\nHe responds, a little confused. \"Some sort of supervillain thing. Uploads footage of jobs to the Internet so that those other crazies can see it.\"\n\nYou look at the camera. It stares back at you, with its green unblinking eye. And the idea occurs to you, as small as a thought, as big as a destiny. \n\nYou could take it.\n*page_break\nYou've got money. You've got ideas. Hell, if you play your cards right here, you might even have the start of a crew. And you could certainly do a better job of it than the wild-eyed crazy woman sitting, terrified, on your floor. And with that camera broadcasting to Darkspace, the near-mythical supervillain social network, you could have even more. You could have excitement, fulfillment, respect.\n\nYou could be a supervillain.\n\nReaching forward, your other hand holding the gun steady, you pull the camera from Murder's lapel and attach it to your own. She whimpers angrily but says nothing. It's time to decide what to do with this has-been.\n\n*choice\n #I kill her, here and now. No half-measures.\n  *goto murderkill\n #I humiliate her in front of her goons and the camera.\n  *goto murderhumiliate\n #I knock her out and leave her outside the police station.\n  *goto murderknockout\n  \n*label murderkill\n*set lethality +5\n*set notoriety +10\n*set murderdead true\nProfessor Murder opens her mouth to speak, but you're in no mood to listen. Her death is quick, not because of some ill-placed idea of mercy, but out of cold efficiency. You turn to her stunned crew, who probably weren't expecting this sort of measured lethality from a trust-fund kid living in a mansion.\n\n\"She's gone, I'm here. You work for me, now.\" Your voice is steel. Nobody questions it.\n\n*goto chaptertwoepilogue\n\n*label murderhumiliate\n*set notoriety +15\nAs the Darkspace camera watches, you order Murder to take off her jacket. Clad in a ratty T-shirt, it's clear now more than ever that this is no force of earth-shattering malfeasance, only a mad old woman. Holding the gun steady, you order her to sing \"I'm a Little Teapot\" as her goons look on.\n\nShe tries to protest, but the gun in your hand makes the request deadly clear. She sings in her quavering voice. She even does the little motions. It would be funny, if it weren't so sad. When she's finished, you gesture with the gun, telling her to get the hell out of your house. She does so, sobbing as she goes.\n\nHer goons watch you warily. You smile at them, gun still in hand. \"Gentleman, I believe you've all just been placed back on the criminal job market. As it happens, I'm looking to hire.\"\n\n*goto chaptertwoepilogue\n\n*label murderknockout\n*set notoriety +5\n*set terror %+10\nYou bring the butt of the gun down on the old woman's frail skull. She whimpers a bit and collapses to the ground. You bark out orders to one of her minions to get her tied up and dropped off at the police station. The large man bristles at the command.\n\n\"Who the hell are you?\" he asks, stepping toward you, though still wary of the gun. You stare into his eyes and see the fear hiding beneath the bravado.\n\n\"I'm the person who just put you out of a job. And the person who can put you and your boys back into one, a hundred times more profitable than the ones you scored with this old bat. All you have to do is follow my orders, get her out of my damn house, and get rich. What do you say?\"\n\nLater, you're not entirely sure what made him back down. Maybe he heard the sense in your words. Maybe you got lucky. And maybe he saw something in your eyes, something that told him that there's only one way for this to end.\n\nHe's the first of your minions. He won't be the last.\n\n*goto chaptertwoepilogue\n\n\n*label chaptertwoepilogue\nYou get contact information from your new soldiers, then send them on their way with a promise of new work soon. You take half an hour to roam the trashed mansion, wondering what your parents will think when they see it.\n\nYou spend a few hours toying with the Darkspace camera, using its built-in firmware to log in to the dark website. Unsurprisingly, your takedown of a lightweight like Professor Murder has grabbed little attention. Fair enough. It might actually work to your advantage. You don't need everyone seeing your face, after all.\n\nYou get a welcome message from Obsidian_Heartbreak, the site's administrator. He sends you a link that allows you to reset Murder's account information.\n\nAmong other things, it asks you for a login name. By tradition, he explains, it's the name you'll always use as a member of the supervillain community. Not something to take lightly.\n\nThe first name that springs to mind is The Most Villainous of All Villains, but that's a little wordy. Perhaps Evil of Evils? Or maybe something subtle like MEG, which only another evil genius would recognize as an acronym for Most Evil Genius. Or you could just use something easy for your inferiors to grasp, like Great One.\n\nThen there are the dramatic names: Technomancer, Battle Master, The Specter…the possibilities are endless!\n\nAfter stressing over it enough to give yourself a headache, you finally think of the perfect name. It expresses everything you hope to do, and be, in this new, exciting life. You type it into the form:\n\n*input_text name\n\n*page_break\n(Are you sure you want to be ${name}? Remember, this will be your name for the rest of your villainous career!)\n\n*choice\n #I'm sure!\n  *goto EndChapter\n #On second thought…\n  *goto NameChoice\n\n  \n*label NameChoice\nAfter giving it a few minutes' thought (again!) you finally think of the perfect name. It expresses everything you hope to do, and be, in this new, exciting life. You type it into the form:\n\n*input_text name\n*page_break\n(Are you sure you want to be ${name}? Remember, this will be your name for the rest of your villainous career!)\n\n*choice\n #This time I'm definitely sure!\n  *goto EndChapter\n #Wait, let me try again….\n  *goto NameChoice\n  \n\n\n*label EndChapter\nOnce that's done, you take a few minutes to doctor the footage of your encounter with Professor Murder. Not much, just enough to obscure your true identity. Then you grab your laptop, all of your ready cash, and everything you'll need to access your trust fund, scrawl a brief note and tape it to the fridge, and vanish into the night. From this moment, your old life is over. You never really look back at the person you once were.\n\nNow, you are ${name}.\n\n*achieve villain\n\n*finish", "choicescript_description": "Start practicing your evil laugh! As the world's greatest criminal mastermind, choose a lair, hire a minion, and steal the world's largest ball of aluminum foil! (Or, destroy the world. FINE.)\n\n\"Diabolical\" is a 130,000-word interactive novel by Nick Aires, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\nFamous, feared, or filthy rich—why not all three? You've got the money and the motives to build an evil empire worthy of the most ruthless villain the world has ever seen. Crush the good guys and terrorize the populace! Stamp a big red \"FAIL\" on your enemies' foreheads! Plunder your way to world domination – or sit back and pet your kitty while your henchmen do it for you.\n\nWill you be a high-tech daredevil, a ruthless military soldier, or an apparition terrifying to behold? What calling card will you leave at the scene of your crimes? Whatever your choices, the results will be diabolical.\n\n• Play a villainous story of scheming, grandstanding, and laughing evilly.\n[n/]• Interview and hire the best possible (or best available) minion.\n[n/]• Decide when to use trickery, when to use force, and when to hide behind henchmen.\n[n/]• Choose the ultimate, guaranteed-to-be-infamous nickname.\n[n/]• Play as male or female, with straight, gay, and bisexual romance options.\n[n/]• Destroy the world!\n", "choicescript_stats": "*image character.png none\n*image notoriety.png none\n*stat_chart\n  percent Ingenuity\n  percent Combat\n  percent Terror\n  opposed_pair activist \n   Activism\n   Selfishness\n  opposed_pair theatricality \n   Theatricality\n   Pragmatism\n\n*line_break  \n*image deeds.png none\n*stat_chart\n  text Lethality\n  text Planning\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 3 through 12[/b]\n  \n  Unlock chapters 3 through 12, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2024-08-01 $4.99 $2.99 start\n*label page_break\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 3 through 12[/b]\n  \n  You've paid to unlock chapters 3 through 12.", "screenshots": "screenshots!\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Technomancer\"\n*set ingenuity 60\n*set combat 50\n*set terror 55\n*set activist 44\n*set theatricality 33\n*set lethality 5\n*set planning 0\n*set notoriety 10\n*set sname \"Jane\"\n*set sman \"woman\"\n*set she \"she\"\n*set shecap \"She\"\n*set shis \"her\"\n*set shiscap \"Her\"\n*set shim \"her\"\n*set cname \"Count\"\n*set cman \"man\"\n*set che \"he\"\n*set checap \"He\"\n*set chis \"his\"\n*set chiscap \"His\"\n*set chim \"him\"\n\n\nSomething whizzes past your ear and strikes the screen at high velocity, shattering it. Spinning around in your chair, you see a ${sman} clad in a tight leather jumpsuit leap down from a ventilation shaft high in the far wall. ${shecap} has some sort of glove-mounted gun pointed directly at your head. ${shiscap} other hand holds up a shining copper badge.\n\n\"${sname} Steelheart, V.A.N.G.U.A.R.D. Deputy Director. Are you ${name}?\"\n\n*fake_choice\n #I trigger the silent alarm under my desk and casually reach for my laser pistol.\n #I shout, \"Guards, seize the intruder!\"\n #I smile calmly. \"Good afternoon, Deputy Director. What can I do for you?\"\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"The Specter\"\n*set ingenuity 50\n*set combat 58\n*set terror 75\n*set activist 20\n*set theatricality 40\n*set lethality 15\n*set planning 3\n*set notoriety 22\n*set sname \"Jane\"\n*set sman \"woman\"\n*set she \"she\"\n*set shecap \"She\"\n*set shis \"her\"\n*set shiscap \"Her\"\n*set shim \"her\"\n*set cname \"Count\"\n*set cman \"man\"\n*set che \"he\"\n*set checap \"He\"\n*set chis \"his\"\n*set chiscap \"His\"\n*set chim \"him\"\n\nThe Drake smiles before pressing the end of the flamethrower against your chest. \"A shame that such an infamous villain will be so easy to kill. Here I was, expecting an exciting fight! Don't worry, this will only hurt a little,\" ${che} says. \n\nFortunately ${che} didn't notice you press the emergency backup button on your wristwatch, programmed to get you out of pickles like, say, getting murder-flirted with by a costumed pyromaniac. Now all you've got to do is wait for…\n\n*fake_choice\n #A dozen of my armed troops to arrive and make ${chim} beg for mercy.\n #A special frequency to disable ${chis} precious toy and make ${chim} panic!\n #Electromagnetic pulses to disable all nearby lights, allowing me to escape in the dark.\n #All three! Let's find out if The Drake can handle that. (Costs 1 Planning Point.)\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Angel\"\n*set ingenuity 79\n*set combat 55\n*set terror 50\n*set activist 75\n*set theatricality 30\n*set lethality 0\n*set planning 2\n*set notoriety 62\n*set sname \"Jane\"\n*set sman \"woman\"\n*set she \"she\"\n*set shecap \"She\"\n*set shis \"her\"\n*set shiscap \"Her\"\n*set shim \"her\"\n*set cname \"Count\"\n*set cman \"man\"\n*set che \"he\"\n*set checap \"He\"\n*set chis \"his\"\n*set chiscap \"His\"\n*set chim \"him\"\n\nFor whatever reason, you're feeling a lot more creative. After all, you did just get into the heart of a French bread factory without any of your own gear. It's not something you'll put on your villainous resume, but it does feel good to remember you can pull this stuff off without any fancy gadgets or troops.\n\nInspired, you decide to get rid of the factory worker by…\n\n*fake_choice\n #Being safe but boring by using the stun gun as Nautilus suggested.\n #Scaring him as some kind of ferocious yeast monster.\n #Knocking him out with a yeast-filled backpack.\n #Planting the stun gun in the yeast so he shocks himself.\n #Killing him. Kill, kill, kill.\n #Doing something that will really please Nautilus. (Costs 1 Planning Point.)\n\n\n*set name \"Purple Fox\"\n*set ingenuity 55\n*set combat 85\n*set terror 50\n*set activist 12\n*set theatricality 33\n*set lethality 32\n*set planning 5\n*set notoriety 44\n*set sname \"Jane\"\n*set sman \"woman\"\n*set she \"she\"\n*set shecap \"She\"\n*set shis \"her\"\n*set shiscap \"Her\"\n*set shim \"her\"\n*set cname \"Count\"\n*set cman \"man\"\n*set che \"he\"\n*set checap \"He\"\n*set chis \"his\"\n*set chiscap \"His\"\n*set chim \"him\"\n\nThe Drake tosses the two grenades at the same time, one at you and one at The ${cname}. You both manage to dodge the blasts, but the slippery ground causes you to slip and fall hard.\n\nThe ${cname} responds in kind, tossing knives at both you and The Drake. You manage to roll out of the way, while The Drake does some fancy acrobatic moves to avoid getting stuck ${chim}self.\n\nYou suddenly have a clear line on both of them. Pistol in hand, you take aim and…\n\n*fake_choice\n #Shoot at The Drake.\n #Shoot at The ${cname}.\n #Shoot at both of them.\n\n*set name \"Midnight\"\n*set ingenuity 70\n*set combat 57\n*set terror 50\n*set activist 24\n*set theatricality 35\n*set lethality 32\n*set planning 5\n*set notoriety 44\n*set sname \"Jane\"\n*set sman \"woman\"\n*set she \"she\"\n*set shecap \"She\"\n*set shis \"her\"\n*set shiscap \"Her\"\n*set shim \"her\"\n*set cname \"Countess\"\n*set cman \"woman\"\n*set che \"she\"\n*set checap \"She\"\n*set chis \"her\"\n*set chiscap \"Her\"\n*set chim \"her\"\n\n\"The life of a villain is an extraordinary one. Does that lifestyle allow you time for…personal interests?\" ${checap} stares at you with a sudden intensity.\n\nThere's no denying that The ${cname} has charm to go around, but ${chis} eyes give away a cold and calculating demeanor that reminds you that you're sitting across from someone with a body count that looks like a zip code. You need to stay on your guard here.\n\nOn the other hand, ${che} could be genuinely hitting on you. After all, you're great. Vast personal fortune, lots of exciting gadgets, more goons than you can name (literally). Why wouldn't a highly paid international assassin and agent provocateur want to get with you?\n\n*fake_choice\n #I'm single, if that's what you're asking…\"\n #\"What do you say we cut to the chase. Why am I here?\"\n #\"So… what do you do around here for fun?\"", "startup": "*title Diabolical\n*author Nick Aires\n*scene_list\n startup\n chaptertwo\n chapterthree\n $ chapterfour\n $ chapterfive\n $ chaptersix\n $ chapterseven\n $ chaptereight\n $ chapternine\n $ chapterten\n $ chaptereleven\n $ chaptertwelve\n \n*create ingenuity 50\n*create combat 50\n*create terror 50\n*create lethality 0\n*create theatricality 50\n*create notoriety 0\n*create activist 50\n*create planning 0\n*create orientation 0 \n*create jenny 0\n*create moneyburnt 0\n*create moneykept 0\n*create moneygiven 0\n*create jennydead 0\n*create murderstrength 20\n*create murderdead false\n*create name \"none\"\n*create sname \"none\"\n*create cname \"none\"\n*create genderpref \"none\"\n*create sman \"none\"\n*create she \"none\"\n*create shecap \"none\"\n*create shis \"none\"\n*create shiscap \"none\"\n*create shim \"none\"\n*create cman \"none\"\n*create che \"none\"\n*create checap \"none\"\n*create chis \"none\"\n*create chiscap \"none\"\n*create chim \"none\"\n*create Steele 10\n*create Drake 10\n*create Fauxton 10\n*create Slog false\n*create Hackmaster false\n*create Star false\n*create Countess 10\n*create Minotaur 10\n*create museum false\n*create mayor 0\n*create Nautilus 50\n*create wall \"none\"\n*create DroneArmy false\n*create sidekick false\n*create CountBed false\n*create SteelBed false\n*create CountRejected false\n*create SteelRejected false\n*create countdead false\n*create nautilushelp false\n*create nautilushate false\n*create countfile false\n*create sidehe \"none\"\n*create sidehim \"none\"\n*create sidehis \"none\"\n*create drakedead false\n*create slogsacrifice false\n*create trademark \"none\"\n\n\n*achievement villain visible 10 What Sort of Name Is Professor Murder?\n Begin your supervillain career.\n The world won't know what hit it.\n\n*achievement blind visible 20 Turn a Blind Eye\n Some crimes can be ignored.\n Took Steelheart's advice on a crime not worth V.A.N.G.U.A.R.D.'s time.\n\n*achievement slog visible 15 Brawn Over Brains\n He looks the part.\n Slog became your sidekick.\n\n*achievement star visible 15 Fallen\n A little insanity never hurt anyone.\n The Star became your sidekick.\n\n*achievement hackmaster visible 15 Hacked\n Cyber-attacks are the way of the future.\n Hackmaster became your sidekick.\n\n*achievement cured visible 15 Savior\n Zombies? No problem.\n Created a cure for the infected.\n\n*achievement drones visible 15 Manipulator\n Have you considered a career in mad science?\n The infected are under your control now.\n\n*achievement professormurder visible 20 Blast from the Past\n Reunite with an old...friend?\n Encountered Professor Murder again.\n\n*achievement countsecret hidden 20 Philanthropist\n hidden\n Learn the Count or Countess's secret.\n\n*achievement steelheart hidden 50 Star-Crossed Lovers\n hidden\n Start a relationship with Steelheart.\n\n*achievement countess hidden 50 From Minotaur with Love\n hidden\n Start a relationship with The Count or Countess.\n\n*achievement badend visible 30 Mission Failed\n Victory goes to your enemies.\n Despite your best efforts, an enemy killed you on Arachnus's ship.\n\n*achievement destruction visible 50 Boom\n Every villain wants to do this, right?\n Destroyed the Earth.\n\n*achievement ruler visible 50 Tomorrow, the World\n At last, you'll receive the recognition you deserve.\n Became Supreme Leader of Earth.\n\n*achievement utopia visible 50 World Peace\n Who says a villain can't have noble goals?\n Earth is now a utopia.\n\n*achievement anarchy visible 50 No Rules\n Let's see if people really want freedom from the law.\n All forms of government have fallen to pieces.\n\n*achievement sun visible 50 Sun God\n They'll never forget you if they always see you.\n The sun is emblazoned with your image forever.\n\n*achievement cartoons visible 50 Ricky Rat\n Cartoons are wonderful.\n Ricky, Nutty, and Gerald will be your friends forever.\n\n*achievement shipdestruct visible 50 With Great Power...\n No one has enough responsibility to handle this.\n Destroyed Arachnus's ship.\n\n*achievement revive visible 50 BFFs\n Life wouldn't be worth living without them.\n Used your wish to revive a fallen friend.\n\n*achievement restore visible 30 Turn Back the Clock\n Whatever Arachnus did to Earth, it's been undone.\n\n*achievement nothing visible 30 Leave It Alone\n Power like that isn't worth messing with.\n\n*achievement ending visible 100 True Villainy\n What sort of villain are you?\n In it to win it.\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Start practicing your evil laugh! As the world's greatest criminal mastermind, choose a lair, hire a minion, and steal the world's largest ball of aluminum foil! (Or, destroy the world. FINE.)\n\n  \"Diabolical\" is a 130,000-word interactive novel by Nick Aires, where your choices control the story. It's entirely text-based--without graphics or sound effects--and fueled by the vast, unstoppable power of your imagination.\n\n  Famous, feared, or filthy rich—why not all three? You've got the money and the motives to build an evil empire worthy of the most ruthless villain the world has ever seen. Crush the good guys and terrorize the populace! Stamp a big red \"FAIL\" on your enemies' foreheads! Plunder your way to world domination – or sit back and pet your kitty while your henchmen do it for you.\n\n  Will you be a high-tech daredevil, a ruthless military soldier, or an apparition terrifying to behold? What calling card will you leave at the scene of your crimes? Whatever your choices, the results will be diabolical.\n\n  • Play a villainous story of scheming, grandstanding, and laughing evilly.\n  [n/]• Interview and hire the best possible (or best available) minion.\n  [n/]• Decide when to use trickery, when to use force, and when to hide behind henchmen.\n  [n/]• Choose the ultimate, guaranteed-to-be-infamous nickname.\n  [n/]• Play as male or female, with straight, gay, and bisexual romance options.\n  [n/]• Destroy the world!\n\n  [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n  *comment endif\n\n  *purchase_discount adfree 2024-08-01 $4.99 $2.99 purchased\n  *label page_break\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n*label start\n\n*image chap1.png\n\nThe opulent, massive stained glass window overlooking the majestic lobby of Merit City First Financial Bank has a long and storied history, full of romance, dust, and a great deal of banking. But most stained-glass enthusiasts agree that, while many honorable and worthwhile adjectives could be applied to that noble old warhorse (austere, beautiful, large, red, and many others), \"exciting\" would not be one of them. At least, not until 2:37 p.m. Thursday afternoon, when the window exploded, showering the crowds below with rubble and broken glass.\n\nThe window did this with its normal dedication to a job well and thoroughly done, aided in its performance by the high-intensity directed plasma charges that had, until only moments before, been lining its frame. The force of their detonation transformed the handiwork of the artisan (Josef Brahamson, 1881–1937) from a stately statement on the majesty of wealth into a vibrant rainbow of tiny, very sharp fragments of glass. From the right perspective (that is, not cowering on the floor of a bank, deafened by a massive explosion, or watching from the outside, detonator in hand and earplugs in ear), the shards looked quite pretty as they rained down through the afternoon sunlight onto the heads of the hapless customers.\n\nAnd what of that detonator-clutching hand? What dastardly villain would so forcefully desecrate one of Merit City's greatest artistic treasures? Who would startle so many of Merit City's stalwart birds, nesting on nearby roofs? Who would be vile enough to so terrify so many law-abiding, checkbook-having citizens?\n\nOh, right. You.\n\nIt was you.\n*page_break\nThe bank's youngest, fittest security guard struggles to her feet as her co-workers continue to lie, stunned, on the bank's cold marble floor. Smoke and sunlight pour upon them through the hole where the bank's window used to be. Your shadow falls across the guard, and her eyes widen. \n\nLittle wonder, since she sees…\n\n*choice \n #A high-tech daredevil.\n  Clad in high-tech armor, you fly into the bank at high speed on a pair of flame-belching rocket boots, flanked by shiny black robot drones.\n  *set ingenuity 60\n  \n  As the guard watches, seemingly paralyzed, you hold up a small device you prepared earlier. A pulse of blue light radiates from it, and the guards drop, falling into dreamless unconsciousness.\n  *page_break\n  *goto entrance\n #A ruthless military attack.\n  A pair of dangerous-looking soldiers, each carrying high-powered firearms, storms the smoking entrance ahead of you. They spread to the side, allowing you to stride forward in your combat armor.\n  *set combat 60\n  \n  The soldiers move with practiced, hard-drilled efficiency, disabling the stunned guards with high-tech shock rifles. The sole guard on her feet scrambles behind a desk overturned in the explosion.\n  *page_break\n  *goto entrance\n #A terrifying apparition.\n  A growing darkness blots out the sun. All anyone can see of you is a long onyx cape and eyes that carry a bone-chilling lethality.\n  *set terror 60\n  \n  The guard stumbles back, hand over her heart, eyes wider than before. As her fellow guards moan in fear, she dives behind a desk overturned in the explosion. You enter the bank as a dark presence, and no one opposes your advance.\n  *page_break\n  *goto entrance\n\n*label entrance\n\n\"This is going remarkably well,\" you think as the last of the bank's guards falls before your powerful assault. Obviously, you had been expecting success. Today's attack on the bank was the culmination of months of meticulous planning. Alarm companies broken into, weapons manufacturers raided, costume shops plundered. You had left no detail untouched by your nefarious intellect. And yet, if you're being honest, you were expecting at least a little more of a challenge.\n\nYou take a moment to adjust the camera attached to your costume's lapel. The green light on the tiny device's chassis indicates that your exploits are being successfully uploaded to Darkspace, the Internet's number-one database for malignant misdeeds, vile victories, and general blow-stuff-up supervillainy. \"After all,\" you think, \"what's the point of robbing a stupid bank if nobody important hears about it?\"\n*page_break\nIn fact, it's probably time to do something to make an impression on the wider supervillain community. Considering that more and more rookies have been getting into the game in the last few years, inspired by the likes of the murderous Doctor Arachnus or the twisted, mysterious Nautilus, you're going to have to do something if you want to stand out. What to choose…\n\n*choice\n #Kill one of the guards.\n  *if ingenuity > 50\n   You command one of your drones to execute the nearest of the cowering guards. The others look away in terror as the drone's unblinking red eye begins to glow with deadly laser light.\n   *page_break\n   *set lethality +5\n   *set notoriety +2\n   *goto manager\n  *elseif combat > 50\n   You nod to the nearest of your loyal shocktroopers, Private Ellerby or Ellison or something, you can never keep them straight. At your signal, he expressionlessly opens fire on the nearest guard.\n   *page_break\n   *set lethality +5\n   *set notoriety +2\n   *goto manager\n  *elseif terror > 50\n   With your instinctive understanding of human fear, you quickly identify the weakest of the bank's guards, an old man with tired eyes and shaky hands. You stalk toward him wearing your most terrifying smile, knives held in each hand. Before you're a foot away, the old fool's heart gives out and he dies, gasping, on the marble floor.\n   *page_break\n   *set lethality +5\n   *set notoriety +2\n   *goto manager\n  *else\n   *finish  \n #Show off my power.\n  *if ingenuity > 50\n   Activating one of your handcrafted force gloves, you reach toward the nearest of the bank's many terrified patrons. Despite being ten feet away, the heavyset man jerks into the air as though something were grabbing his neck. His legs flail helplessly as you curl your fingers, pulling him toward you. You are gratified to see the awe on the faces of the other bank customers as your victim floats through the air. It's always nice when untested prototypes work on the first go. The man's face turns red as he hovers in front of you, but you think you've made your point. It's all you can do not to tell him that his lack of faith disturbs you as you drop him, gasping, back to the floor.\n   *page_break\n   *set notoriety +3\n   *goto manager\n  *elseif combat > 50\n   It's a bad day for glasswork at Merit City First Financial, as you tap the button on your costume's built-in communicator. The roof's skylight shatters as another squad of soldiers rappels down into the dusty, sunlit lobby. The backup squad leader, a tall, red-haired woman whose name is Glendel or Glenwood or something, salutes you before her soldiers establish a wider perimeter.\n   *page_break\n   *set notoriety +3\n   *goto manager\n  *elseif terror > 50\n   You drop a smoke bomb, quickly obscuring the already hazy light in the bank lobby. As your camera records, you duck in and out of visibility. Tensions run higher and higher as terror spreads among the guards. One fires his weapon, aiming nowhere near you and inciting even greater panic. Your laughter echoes through the lobby, followed by the quiet but distinctive sound of several grown adults losing control of their bladders. You smile to yourself at a job well done.\n   *page_break\n   *set notoriety +3\n   *goto manager\n  *else\n   *finish  \n #Give an evil laugh.\n  It's hard to beat the classics. You throw your head back and let loose with your best evil laugh. It starts deep in your belly before climbing into the higher, more maniacal registers. It goes on for a long time, taxing your stamina, and you feel it slip a few times into the dangerous realm of cackling. But you right the ship, get the beast under control, and bring it to a satisfying, throaty conclusion. The crowd of customers looks suitably cowed and impressed. You just hope no one watching on Darkspace realizes how many times you've practiced this in the bathroom mirror at home.\n\n  *set notoriety +2\n  *set theatricality %+20\n  *page_break\n  *goto manager\n\n*label manager\nYou quickly identify the bank manager, hiding behind his desk in the bank's back office. He offers little resistance as you drag him toward the bank's massive vault. Even if he doesn't open it for you, you want him to watch. After all, it's his job to manage the bank's money, which you're about to take. You pull out a rubber stamper you had made for situations just like this. Conveniently, he has a stamp pad on his desk. You press your stamper into the ink, then stamp the manager's forehead with the red word FAIL. He's actually crying a little, and there's a slimy fluid dribbling out of his nose. You try not to get any of it on your costume.\n\nNow, how to get the vault open?\n\n*choice\n #Tech my way into the vault.\n  As the manager whimpers quietly, you attach a small round device to the vault's massive vaultanium door. Invented by the enigmatic science-hero Professor Infinite before his death at the hands of the deadly crustaceous boxer Cassius Claw (see Professor Infinite #321, \"Float Like a Lobster, Kill Like a Crab,\" true believers!), vaultanium is supposed to be completely impervious to attack. Which is why it's pretty awesome that your new molecular disruptor actually works on the stuff, vibrating its molecules out of phase with each other and blowing the vault door apart in seconds.\n  *set ingenuity %+10\n  *page_break\n  *goto money\n #Blow the vault.\n  The bank manager watches with trepidation as you rummage through your pack for something with enough firepower to shatter the massive vault door. He ducks for cover as you pull out a small but feisty hand-fired rocket launcher. The first rocket barely dents the door (although it does trash the rest of the room and sends the manager fleeing for his life). The second through ninth do little more. But you didn't get into the villain game because you were a quitter, and with the tenth rocket (the launcher now reduced to a worthless piece of scrap) the door cracks open. You remind yourself to pay a compliment to your quartermaster when you get back to base.\n  *set combat %+10\n  *page_break\n  *goto money\n #Intimidate the bank manager.\n  You've been practicing making your eyes go completely dead. It's a neat trick at parties, but it also has practical applications. The manager stares at you, eyes transfixed like a mouse watching a snake, as you step toward him. Nothing you're doing is explicitly threatening, but you've honed your body language to express a simple, effective message. You don't even have to say it out loud.\n  \n  \"Open the vault, or die.\"\n  \n  The bank manager chooses the former with alacrity.\n\n  *set terror %+10\n  *page_break\n  *goto money\n\n*label money\n\nYou honestly didn't think banks still kept their cash in big giant piles like this. Don't they store them as bearer bonds or something? You remind yourself that you should probably do some more research on banks if you plan on robbing more of them in the future.\n\nIf you weren't already staggeringly rich, this would be a life-changing amount of money. As is, there's still more than a million dollars here. All piled up on the ground. You still think that seems really stupid.\n*page_break\n*if (ingenuity >= 60) \n  You order a few of your larger drones to collect the loot, and they use their tractor beams to carry the money out of the vault.\n  *goto callingcard\n*elseif (combat >= 60) \n  Your soldiers swarm like worker ants, carrying the loot back out into the lobby. A mixture of loyalty and fear keeps them from slipping your new property into their uniforms (which are also technically your property).\n  *goto callingcard \n*else \n  You focus on the larger bills, managing to scoop several hundred thousand dollars into your bags without slowing yourself down too much.\n  *goto callingcard\n\n*label callingcard\n\nBefore you leave, you pause to leave your calling card, the trademark you picked to symbolize yourself as a villain.\n\n*choice\n #A confetti cannon.\n  You set the confetti cannon on a desk in the bank lobby. No doubt the police will expect it to blow up or otherwise wreak havoc, and you almost wish you could see their flabbergasted faces when they figure out it's just a normal confetti cannon like any you'd find at a party. After making sure it's perfectly positioned to attract attention, you head for the exit.\n  *set theatricality %+5\n  *set trademark \"a confetti cannon\"\n  *goto jenny\n #A single feather.\n  The long feather drifts from your fingertips down to the floor, landing amidst the destruction with perfect grace. No birds in the area have feathers quite like it, so the police shouldn't make the mistake of thinking it's an accident. Before long, everyone will know what it means. With the feather in clear sight, you head for the exit.\n  *set theatricality %+5\n  *set trademark \"a feather\"\n  *goto jenny\n #A riddle.\n  Alongside all the weapons and gear you brought with you is a small scrap of paper. You pull it out and set it on a desk in the bank lobby. Upon it, you've written a short riddle. Not the sort of riddle that will lead clever detectives to your lair or foil your next plot—you aren't that crazy yet—but something to keep them guessing for a while. You read it over one last time and then head for the exit.\n  *set theatricality %+10\n  *set trademark \"a riddle\"\n  *goto jenny\n #A card with my initial on it.\n  Alongside all the weapons and gear you brought with you is a small card. You pull it out and set it on a desk in the bank lobby. The card is unadorned save for a single letter: your initial. Maybe it's pompous, but people will know who to credit for this crime. You make sure it's in a prominent location and then head for the exit.\n  *set theatricality %+10\n  *set trademark \"a card\"\n  *goto jenny\n #Nothing.\n  You head for the exit without leaving anything behind. Because really, why would you want to draw undue attention to yourself with a calling card?\n  *set theatricality %-5\n  *set trademark \"no calling card\"\n  *goto jenny\n\n*label jenny\n\nYou're almost to the lobby door, out into the street where your escape vehicle awaits, when a voice, shaking slightly, calls out behind you, \"Stop, thief!\"\n\nYou turn, amused as much as startled, to see a single bank guard on her feet, weapon pointed toward you. You recognize her as the one who witnessed your dramatic entrance. Clearly in better shape than her co-workers, the young woman has long auburn hair, bright green eyes, and a slightly humiliating name tag that declares her to be \"Jenny.\" Despite her obvious fear, her gun doesn't waver as it aims directly at your chest. This is a tense, dangerous situation.\n\nNow, in all likelihood your armor will be able to deflect the bullet's path. But it'll still hurt like hell if she shoots you, and it might gum up your getaway plans. You're left with a few choices.\n\n*choice\n #Kill this irritating do-gooder.\n  *if ingenuity >= 60\n   *set lethality +5\n   *set jenny 2\n   You slowly raise your hands into the air in the traditional gesture of surrender. The guard seems to relax, which is nice, because being vaporized by one of an evil genius's Kill-O-Bots is probably bad enough without having to be tense when it happens. You lower your hands, turn your back on the sad little pile of dust, and head for the door.\n   *goto escape\n  *elseif combat >= 60\n   *set lethality +5\n   *set jenny 2\n   The last thing Jenny Tragurson (daughter of Joel and Ellie, sister of Doug) learns in this sad world is that it's really, really hard to get the drop on someone who's backed up by a small army of well-trained soldiers. You're already turning toward the door when the shot rings out.\n   *goto escape\n  *else\n   *set lethality +5\n   *set jenny 2\n   She never saw it coming. That's not just an expression; she really never did. One smoke bomb, one knife, and a distressing number of bloody gurglings later, there's nothing left between you and escape.\n   *goto escape\n #Kill her, with regret.\n   *set lethality +3\n   *set jenny 2\n   You really don't like doing things like this. It's not that you have moral objections (it's pretty hard to get into this line of work with any of those intact); it just seems petty. Still, you like getting shot even less. \n\n   You rush the guard, and, held back by some quiet respect for the fragility of human existence, she hesitates in firing. You have no such compunctions, and once you've gotten the gun away from her, it's the work of a moment to finish her off. You drop the gun and sigh before turning for the door.\n   *goto escape\n #Knock her out.\n  *if lethality = 0\n   *if ingenuity >= 60\n    You're a thief, not a murderer. It takes less than a second for your hand to reach the controls for the neural suppressor you used when you first stormed into the bank. As the guard falls to the ground, you make a note to adjust the damn thing so people can't wake up and get the drop on you in the future.\n    *goto escape\n   *elseif combat >= 60\n    You're a thief, not a murderer. You smile at the young guard. She stares at you warily, but at least she's looking at you, and not Corporal What's-His-Name, who slams the butt of his rifle into he
