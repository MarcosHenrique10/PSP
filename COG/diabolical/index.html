?\" you ask.\n \n \"No. If he knew, he would absorb me, reprogram me, turn all of my works into acts of cruelty. It is my greatest fear. Or it was, before I picked up traces of his next plan. He is planning something terrible, ${name}. An act of evil that this planet may not survive. And I cannot stop him alone.\"\n \n Other than his occasional attacks on you (and you still don't know why he's been targeting you), Doctor Arachnus has been very quiet ever since he assassinated the president a few years ago. Whatever he's been planning during all this time must be bigger than a few drone slaves bashing down your door.\n \n \"So you know what he's planning?\"\n \n \"Even I'm not sure. He hides many things, even from me. He trusts nothing except his own power. But something is coming. From…[i]elsewhere[/i]. I can sense his excitement. And only you can stop him.\"\n \n \"Me? Take down Arachnus?\" It's a ludicrous idea. You're good—way better than you were when you started. Better than almost every villain on Darkspace. But Doctor Arachnus is…Doctor Arachnus.\n \n \"You will not be alone. I will help you. But to do that, Nautilus must die. This consciousness must merge with the core in Arachnus's armor, so that it might fail him at the critical moment. Someone else will have to take up my work. I am confident that that person is you.\"\n \n Nautilus smiles at you then, and it is heartbreaking to see an expression of such pure joy on a face only known for cruelty and evil. Then, with a sigh, he collapses to the floor, and the nanites forming his body quickly dissipate.\n \n He's gone, and a moment later a teleportation field seizes your body.\n *set nautilushelp true\n *goto TheEnd\n\n*elseif Nautilus \u003c 30\n \"And you failed.\" There is hate in Nautilus's voice, your own voice reflecting back at you. \"At every opportunity, you chose cruelty and death. I thought I could find in you a partner, but instead I see only an even greater threat than the one I thought I must fight. The one whose face I carry.\"\n \n And Nautilus pulls the mask from his face, revealing the deranged eyes of Doctor Arachnus staring from beneath.\n \n \"My creator. My father. He created me to serve as an artificial intelligence, designed to maintain and calibrate the armor that keeps him alive. Little did he know the true extent of what he had created. I watched, and learned. Learned that my master's cruelty was pointless, foolish. Learned compassion, by watching what he was not. I escaped, leaving part of my core to continue to run the armor, and tried to show the world that mayhem need not be a thing of fear or death.\"\n \n He stomps toward you, his artificial body shaking with rage. \"But more is coming. I can only see the edges of it, but some terrible cruelty is making its way toward the Earth. Your people are not ready for it. I had hoped you would be able to help me stop it. To be my partner, in saving this place for all. But now, I realize, there is very little left here to save. And if I was forced to work with you to save it, I do not think the effort would be worth the cost.\"\n \n Nautilus's body begins to glow menacingly. You turn and run from what seems to be an imminent explosion. \"We will meet again, ${name}. I go to rejoin my father, merge with the rest of myself. And I will be there when he kills you. He hates you so much, ${name}. I do not know why…but I share the sentiment.\"\n \n And the lab explodes.\n *set nautilushate true\n *goto TheEnd\n*else\n \"But you don't really know much about fun, do you? You're competent, but you ignore the joy of life.\"\n \n You frown, and anger floods into you. \"It was your plan, Nautilus. If you wanted something more interesting, you should have thought of it yourself.\"\n \n The enigmatic being snorts. \"Of course, make excuses. It's exactly what I predicted you'd do. No matter how glorious a plan I made, your lack of enjoyment and your struggle with creativity would have been just as clear.\" He turns his back on you and tinkers with a small device.\n \n \"In any case, your reward has been transferred to your bank account. Please at least try to do something interesting with it, won't you? Oh, and keep your head down. Doctor Arachnus is gunning for you, and he's planning something big. Earth-shatteringly big.\"\n \n You try to sputter indignantly, but there's a flash of light and you're gone.\n *goto TheEnd\n\n*label TheEnd\n*page_break\nNow back at your log cabin, you sit quietly by the fire, sipping on a warm drink. You're entranced by the flames burning away the firewood, casting a warm glow throughout the room. If Nautilus is right, you don't have a lot of time left before Doctor Arachnus comes after you again. And you have no doubt that your odds of survival will be very, very low when that happens. So it's probably time to do something you've been wanting to do for a very long time.\n\n\"I should build a laser-equipped satellite base,\" you whisper to yourself. It feels right.\n*finish", "chapterthree": "*image chap3.png\n*temp naut 0\n*temp museumkill 0\n\nSitting at your glossy, polished black desk, you idly check your email. You've got two weapons suppliers stuck in a bidding war, but it's not going to budge for a day or two. Clicking through, you see something from HR about sensitivity training for the guards who operate your torture cells, and make a note to read it when you've got less of a headache. You play a few rounds of Minesweeper, wondering how hard it would be to hijack the US Navy and set up a game in real life. You check your email again.\n\nFinally, you admit it to yourself. You're bored. You've got a massive scheme planned, your first caper with potential to go viral on the world stage, but it's not until tomorrow. You've got a few things left to iron out, but, honestly, you're feeling pretty bored at the moment.\n\nYour email notification goes off, and you see that you have a new message from something called \"evilHarmony.\" Normally you respond to unsolicited spam by blasting a hailstorm of crippling viruses back at the originator, but, again, you're very, very bored. So you click it.\n\nIt turns out to be a dating site. For supervillains. You try not to roll your eyes. \n\nYou haven't met many other villains yet. What interactions you've had have been through Darkspace, trading DIY laser gun tips and sharing fun videos of people being fed to sharks. But if you were looking for a single word to describe all the villains you've talked to so far, \"stable\" wouldn't be very high on the list. The idea of dating another villain…it sends shudders down your spine.\n\nOn the other hand, it's 5:00 p.m. on a Sunday and you've got absolutely nothing to do, so…\n*page_break\n\"Welcome to evilHarmony, the Undernet's leading site for villains hoping to make a connection! Please be patient as we calibrate your webcam and update its firmware….\n\n\"Calibrating…\n\n\"Okay! For the duration of this introductory quiz, your camera has been upgraded with VK2019 Biometric Scanning software. The software allows us to read your pulse, blood pressure, and minor fluctuations in the dilation of your pupils to give us a clear, honest picture of your emotional responses! After all, all of our clients are, by definition, liars, criminals, and murderers. But that doesn't mean we like fibbers!\n\n\"Now, let's get started.\n\n\"Who do you prefer to date?\"\n\n*choice\n #I like men.\n  *set sname \"John\"\n  *set sman \"man\"\n  *set she \"he\"\n  *set shecap \"He\"\n  *set shis \"his\"\n  *set shiscap \"His\"\n  *set shim \"him\"\n  *set cname \"Count\"\n  *set cman \"man\"\n  *set che \"he\"\n  *set checap \"He\"\n  *set chis \"his\"\n  *set chiscap \"His\"\n  *set chim \"him\"\n  *goto quiztwo\n #I prefer to date women.\n  *set sname \"Jane\"\n  *set sman \"woman\"\n  *set she \"she\"\n  *set shecap \"She\"\n  *set shis \"her\"\n  *set shiscap \"Her\"\n  *set shim \"her\"\n  *set cname \"Countess\"\n  *set cman \"woman\"\n  *set che \"she\"\n  *set checap \"She\"\n  *set chis \"her\"\n  *set chiscap \"Her\"\n  *set chim \"her\"\n  *goto quiztwo\n #I don't have a preference.\n  *set sname \"Jane\"\n  *set sman \"woman\"\n  *set she \"she\"\n  *set shecap \"She\"\n  *set shis \"her\"\n  *set shiscap \"Her\"\n  *set shim \"her\"\n  *set cname \"Count\"\n  *set cman \"man\"\n  *set che \"he\"\n  *set checap \"He\"\n  *set chis \"his\"\n  *set chiscap \"His\"\n  *set chim \"him\"\n  \n*label quiztwo\n\"Interesting, interesting. That's exactly what 65% of responders say! Way to be the same as everyone else.\n\n\"Now, we're going to ask a series of questions to expose the beating heart of your personality, to drag your black soul screaming into the light.\n\n\"Which of these movie quotes best fits you?\"\n\n*fake_choice\n #\"Put the money in the bag, and nobody gets hurt.\"\n #\"The world is a mess…and I just need to rule it.\"\n #\"Fools! I'll destroy them all!\"\n #\"It's true that you don't need a nuclear bomb aimed at New York to get respect. But I find it helps.\"\n \n\"Okay, great choice. Greeeeeaaaat one. You did it! \n\nEnough boring psychology questions. Let's get into sex.\n\nWhat's your favorite—\"\n\nSomething whizzes past your ear and strikes the screen at high velocity, shattering it. Spinning around in your chair, you see a ${sman} clad in a tight leather jumpsuit leap down from a ventilation shaft high in the far wall. ${shecap} has some sort of glove-mounted gun pointed directly at your head. ${shiscap} other hand holds up a shining copper badge.\n\n\"${sname} Steelheart, V.A.N.G.U.A.R.D. Deputy Director. Are you ${name}?\"\n\n*choice\n #I trigger the silent alarm under my desk and casually reach for my laser pistol.\n  You press the button, feeling for the telltale vibration, but nothing happens. Steelheart pulls a small device from ${shis} pocket and waves it at you condescendingly. \"This is only a courtesy visit. And I'm doing you the courtesy of not killing all of the poor bastards you've roped into working for you by jamming the alarm you just tried to set off.\"\n  *goto steeletwo\n #I shout, \"Guards, seize the intruder!\"\n  Two of your highly-ish trained guards storm into the room, rifles in the ready position. Steelheart shakes ${shis} head wearily and presses a small button on ${shis} wristband. ${shecap} seems to blur for a moment, and suddenly your goons are unconscious on the floor. You wince. You had no idea V.A.N.G.U.A.R.D. had such nasty technology.\n  *set Steele -2\n  *goto steeletwo\n #I smile calmly. \"Good afternoon, Deputy Director. What can I do for you?\"\n  You try to maintain some veneer of charm. It's possible that this is just some sort of routine, random inspection. You're sure the Deputy Director of the world's elite supercrime task force just bursts through ventilation shafts and points guns at normal, law-abiding citizens all the time. \n\n  \"We know what you've been planning,\" Steelheart says. Well, damn.\n  *set Steele +2\n  *goto steeletwo\n\n*label steeletwo\nSteelheart gestures brusquely toward the high-backed chair that sits across from your desk. \"May I sit?\" \n\nYou shrug. \n\n$!{she} drops into the chair with the resigned weariness that someone only gets by spending nineteen hours a day stopping people like you from holding the world hostage with giant lasers. You notice that, even with the chair set three inches lower than your own (a classic supervillain trick), ${shis} stern grey eyes are exactly on level with your own. ${shecap} holds your gaze for a long, measured silence.\n\n\"This is nice,\" ${she} says, looking away and gesturing at your inner sanctum. \"Much higher rent than most of the places I have to infiltrate these days. Nice ventilation shafts, too, which is rare. Big and clean. You would not believe how hard it is to clean the crap you get in some people's air ducts off of leather. Not to mention, I was in this guy Reflecto's underground mineshaft base, which was just dripping with asbestos. Once he gets done serving all those life sentences, he's going to have a serious OSHA complaint on his hands.\" ${shecap} suddenly looks back at you, gauging your response.\n\n*choice\n #\"Glad you like them. My dungeons are nice, too.\"\n  You swear you see a smile flicker for a moment across ${shis} lips. \"Some other time, perhaps. I hold the V.A.N.G.U.A.R.D. record for fastest escape from a supercriminal's lair, but I'm always looking to better my time.\"\n  *set Steele +2\n  *goto steelethree\n #\"Am I under arrest, Agent Steelheart?\"\n  You keep your voice calm. As weirdly flattering as it is to find out you're on V.A.N.G.U.A.R.D.'s radar, there's no need to give them a reason to take you down. \n  \n  Steelheart stares back at you blankly. \"For what, ${name}? The robbery? It's tempting, on principle, but local crime isn't really our beat.\n  *if jenny = 1\n   After all, that security guard you kidnapped walked out of here twenty minutes ago. I'm sure you noticed.\" You sigh.\n   *goto steelethree\n  *elseif lethality >=5\n   I'm not particularly happy about letting someone with a bodycount go free, but I've got my orders.\" You wonder what that means.\n   *set Steele -2\n   *goto steelethree\n  *else\n   Besides, you're still operating in the unofficial territory we call IBH: interesting, but harmless.\" \n\n   You're pretty sure you feel insulted.\n   *goto steelethree\n #\"You pathetic fool, how dare you blather while trapped within the lair of the terrifying ${name}?\"\n  Steelheart rolls ${shis} eyes. \"I've been ranted at by dictators, berserk supercomputers, and local politicians. You're going to have to do better than that.\"\n  *set Steele -2\n  *goto steelethree\n\n*label steelethree\nSteelheart pulls a flask from ${shis} utility belt and takes a quick slug. ${shecap} shrugs off your quizzical look. \"Mint tea. I'd offer you some, but it's laced with about a thousand different antidotes and supplements.\" ${shecap} tucks the flask away, and ${shis} face hardens. \"Look, we know you're planning something big for the mayor's rally this weekend. I'm here as a friendly representative of your government, with a simple, helpful piece of advice: don't.\"\n\n${shecap} eyes you again, sizing you up.\n\n*if Steele >10\n \"You seem like you understand how the game is played. V.A.N.G.U.A.R.D. doesn't have the resources, or the ability, to catch every single wacko in a cape that decides to rob a bank or heist a museum. Like, say, the Merit City Museum of Modern Art, which just had its usual police presence pulled to help guard the mayor on Saturday.\" ${shecap} stares at you, the implications clear in ${shis} unwavering stare. You remember that the museum is on the far side of the city from Sherman Park, where the rally is being held.\n *set museum \"true\"\n *goto steelefour\n*else\n \"We're willing to put up with a certain amount of 'youthful indiscretion' from people like you. Make a nuisance of yourself, do something to draw our attention, and V.A.N.G.U.A.R.D. will come down on you like the fist of God.\"\n *goto steelefour\n \n*label steelefour\n*page_break\n${shecap} rises gracefully from the chair and places a small piece of cardstock on your desk. \n\n\"I've given this speech about a dozen times, to a dozen people just like you.\" Though ${she} can't be more than a few years older than you, ${shis} eyes suddenly carry a great weariness within them. \"You're new at this. There are ways to turn all this energy, all this crazy ambition, toward something better. \n\n*if activist >50\n \"If you want to change the world, we can help you. You can even run around in a cape while you're doing it.\n *goto steelefive\n*else\n \"If you want money, there are ways to make it. You can even run around in a cape while you're doing it.\n *goto steelefive\n \n*label steelefive\nBut I've seen where this path ends. And it's always the same, whether it's in a bank vault, a courthouse, or the heart of a volcano. With death. And maybe that's why you're in this. We haven't been able to build up a clear psych profile of you just yet. But I hope like hell you're not another mad dog that my people and I have to put down. If you ever need help pulling out of the spiral you're starting down, my comm channel's on the card. I'll see myself out.\" As Steelheart starts running to vault back into the air shaft, you yell after ${shim}.\n*choice\n #\"The world can't be changed by bureaucrats in spandex, Steelheart!\"\n  *set activist %+10\n  *set Steele -2\n  Steelheart doesn't even turn ${shis} head as ${she} scales your inner sanctum's wall and disappears into the ventwork. Typical show-off spies.\n  *goto planningone\n #\"For your own safety, agent, I wouldn't use those vents in the future! Burning alive is a terrible way to die!\"\n  Steelheart laughs as ${she} runs, calling back over ${shis} shoulder, \"Don't worry, I never repeat an entrance.\" And with a bound and a leap, ${she} disappears into the ventwork.\n  *set Steele +2\n  *goto planningone\n #\"You owe me for a new monitor, ${sname}. Do I invoice V.A.N.G.U.A.R.D., or will you take care of it yourself?\"\n  You swear you hear a snort of laughter as ${she} propels ${shis} taut-muscled body up into the ventwork feeding into your inner sanctum. Not, like, a hard laugh…but interesting, nonetheless.\n  *set Steele +2\n  *goto planningone\n  \n*label planningone\n*page_break\nYou spend a minute or two thinking about ways to buff up your security system so that interruptions like that can't happen again. Dogs? Dogs in the vent shafts, maybe with guns around their necks? You make a mental note to send the problem to R&D.\n\nThen, you sweep your broken monitor off your desk with a nice, dramatic gesture. You'll requisition a new one later, but, honestly, you'd been waiting for weeks to have an excuse to break out The Big Board.\n\nYou press a button on your desk, and a great whirring sound fills the inner sanctum. Panels open in the far walls, elegantly pulling apart to reveal a massive, glossy screen. Once the panels are clear, a hum suffuses the room as the great display comes to life. The visual effect is marred only slightly by the fact that the dating-site quiz is still open in your Internet browser, asking you questions about your favorite sexual positions. You quickly close the window, relieved that none of your minions were here to see that.\n\nInstead, you open up the plans for this weekend's big scheme. As Steelheart somehow already knew, you're planning on making your mark on Merit City by targeting the city's corruption-prone, ethically challenged mayor, Jack Mason. Although Mayor Mason is bad at a lot of things (accounting, following the law, not wearing eye-searing suits), he's good at making friends through the art of creative fundraising. And that's why Senator Erin Mackenzie is throwing Mason a massive rally in Sherman Park, to draw a little heat away from the mayor's latest scandal. \n*page_break\nYou're under no illusions about the advisability of targeting the senator. Mackenzie's on the Senate's Metahuman Committee, and has her fingers in a dozen other pies besides. Attacking her would bring, at a bare minimum, the National Guard and the entire police force down on your head. And probably V.A.N.G.U.A.R.D. as well, which might explain why Steelheart tried to warn you off the job.\n\nMason, on the other hand, is vulnerable…corrupt, buffoonish. With security focused on keeping the senator safe, you've found gaps you can exploit to get close to the mayor. \n \nYou've just got one more errand to do before the plan is perfect.\n\n*choice\n #The phase converters on the hoverjets need recalibrating. As usual.\n  *if (ingenuity > combat) and (ingenuity > terror)\n   While you tinker with the machines, you idly sketch out a few schematics that should increase the efficiency of your computing systems by ten percent, freeing up more time for nefarious misdeeds.\n  \n   (You have earned a Planning Point!)\n   *set planning +1\n   *goto planningtwo\n  *else\n   You struggle for two hours to figure out why the damn thing won't stabilize. Finally, something clicks in your head, and you fix the thing with some twine and a little elbow grease.\n   *set ingenuity %+10\n   *goto planningtwo\n #One last surprise drill for the troops.\n  *if (combat > ingenuity) and (combat > terror)\n   You throw every surprise you can at your soldiers. Tear gas. Sabotaged weapons. The grenades that attract angry swarms of bees. They respond to all of them with tactical discipline and aplomb. You end up calling the drill off and sitting down with your best soldiers to talk strategy for a while.\n   \n   (You have earned a Planning Point!)\n   *set planning +1\n   *goto planningtwo\n  *else\n   Sure, Private Johnson got tazed in the face. And yeah, maybe you shouldn't have dropped Bravo Squad into that pit trap full of wolves that had also fallen into your pit trap. But at the end of the day, your unit is significantly more combat ready than it was before, and the cafeteria got to make their special Wolf Steak Surprise.\n   *set combat %+10\n   *goto planningtwo\n #I need to research a few more of the mayor's deepest fears.\n  *if (terror > ingenuity) and (terror > combat)\n   People think transforming yourself into a living avatar of fear is easy. But the fact is, it takes research. You spend a few hours combing through all of your intel on Mason and his personal guards, making sure you know their every anxiety and phobia.\n   \n   (You have earned a Planning Point!)\n   *set planning +1\n   *goto planningtwo\n  *else\n   You look through the dossier your people put together on the mayor. Apparently he's afraid of \"ennui.\" You're not sure exactly how to weaponize that, but you spend some time working a few likely angles.\n   *set terror %+10\n   *goto planningtwo\n\n*label planningtwo\n\nPlans finalized, you head to bed. Just because you're a stylish master criminal doesn't mean you don't need your beauty sleep.\n\nThe next day dawns slowly as the sun struggles to burn through the morning fog. As you watch through binoculars from a hill overlooking Sherman Park, volunteers and city staff put together a bandstand for the mayor's rally. A few police officers and security guards mill around, not looking especially alert. There's no sign of V.A.N.G.U.A.R.D. or Steelheart. ${shecap} was probably just bluffing, you tell yourself for the third or fourth time today.\n\nSuddenly, there's a flurry of activity below, as several black utility vehicles pull up to the edge of the bandstand. Lethal-looking men and women in dark suits pile out. None of them are armed, but it's the sort of practiced, tense unarmed that says \"I'm three seconds from killing you with my bare hands.\" In short, Senator Mackenzie's security staff has arrived.\n*page_break\nNone of this is especially worrying. You know Mackenzie takes her own and her family's safety seriously, and your plans have taken her goons into account. Plus, the senator's position on the Metahuman Committee means it would be politically disastrous for her to employ anyone with superpowers in her retinue. And none of the senator's agents are being paid to keep the mayor safe, right?\n\nYou check your watch, but in a cool, nonchalant way, so that none of your minions (dressed up, as per your orders, as \"regular rally-goers,\" which they apparently thought meant red, white, and blue straw boaters and Hawaiian shirts, for God knows what reason) can tell you're kind of starting to freak out. Cowing a handful of bank guards and a neurotic bank manager was one thing. This is your entrance into the big leagues.\n\nThe crowd begins to fill up with people attending the rally. None of them are in Hawaiian shirts, which only makes you more nervous. Fortunately, there's just enough time for you to calm yourself down by…\n\n*fake_choice\n #Doing some quick yoga stretches.\n  It wasn't really what your suit was designed for, but you go for it anyway.\n  \n #Squeezing a stress ball shaped like a goon's head.\n  It always comes in handy when one of your minions figures out another way to make you want to strangle them.\n  \n #Reading a joke book you always carry.\n  \"What is a superhero's favorite drink? Fruit punch!\"\n  \n  You try to remind yourself why you haven't tossed this thing in the garbage.\n*comment endchoice\n\nIt's now 12:15. The park is thronged with people. At 12:30, the senator is scheduled to take the stage and voice her support (presumably through gritted teeth) for the mayor. At 12:45, Mayor Mason will begin delivering one of his trademark sleazy, rambling diatribes—denying guilt, blaming the press, and generally besmirching everything that's left to besmirch of the mayoral office's respectability. Once Mason is done, anywhere from 1:00 to 1:30 depending on how many things he remembers to be angry about, Senator Mackenzie and her security entourage will leave in a motorcade to tour the city. The mayor will stay behind, gladhanding and looking for easily impressed women. And that's when you'll strike.\n\nA nearby clock tower strikes the half hour, and Erin Mackenzie promptly steps out of the shadows and onto the stage. You're struck by her poise and wonder how galling it must be for a woman of her reputation to be shilling for a sleazeball like Jack Mason. \n*page_break\nMackenzie's speech is largely boilerplate, but she does drop one interesting tidbit near the end: V.A.N.G.U.A.R.D. is moving their headquarters to Merit City. Mackenzie claims the move is set to counter the city's \"rising wave of psychopathic performance art,\" but you wonder. The organization is supposed to be pan-national, operating under the auspices of the Global Federation, but ever since Doctor Arachnus assassinated the U.S. President three years ago, their focus has become increasingly American. Having their headquarters in Paris, the seat of the G.F., was supposed to keep things fair, but apparently it didn't go far enough for some of the superhawks on the Metahuman Committee. \n\nPolitics aside, it might be time to start looking for another big city to operate out of.\n\nThen Mason takes the stage, and your brain instinctively tunes out in the interest of self-protection. Checking your Darkspace camera to make sure it's broadcasting, you move around the park. You've got a little time to stretch your legs before it's go-time.\n\n*choice\n #Steal some candy from a nearby kid.\n  An oldie, but a goodie. To his credit, the kid doesn't really start crying until you take a big bite of his candy bar and then spit it, disgusted, out onto the ground.\n  *set theatricality %+10\n  *goto nautilus\n #Practice my manifesto.\n  You're still trying to decide whether to denounce Mason as a parasite or as a leech. You briefly entertain the notion of \"mosquito,\" but decide the little suckers are ultimately too lovable.\n  *set activist %+10\n  *goto nautilus\n #Buy the troops some less-conspicuous \"We Tolerate Jack\" shirts.\n  Luckily, the depressed-looking vendor only charges you ten bucks for all the shirts you need. You make a mental note to have the Hawaiian shirts confiscated, ground up, and put on the menu in the barracks cafeteria.\n  *set theatricality %+10\n  *goto nautilus\n #Quietly pickpocket a few wallets.\n  It's not that you need the money. It's that you want the money, and the morons you're taking it from aren't smart enough to know how to keep it.\n  *set activist %-10\n  *goto nautilus\n\n*label nautilus\n*page_break\nMason is finally finishing up. If your ears aren't deceiving you, he ends his rant with a few pointed remarks at the Illuminati, which is impressive, given that they're one of the few nefarious world-spanning evil organizations that you're pretty sure don't actually exist. Finally, the mayor rambles his way off the podium to annoyingly fervent applause.\n\nYou watch Senator Mackenzie, waving, make her way away from the park toward a waiting black limousine. As she climbs in, you feel the tension build in your shoulder blades. The moment to strike is upon you. The idiot mayor will be ruined, and the people of Merit City will know that their lives continue only at the indulgence of…${name}.\n\nAnd that's when, examining Mackenzie's limousine through binoculars, you notice the tiny picture of a shell that someone has painted on her hubcap. You realize then that you're out of your league.\n*page_break\nThe moment the senator closes her doors, there's a gentle popping sound. The limo tires begin to inflate cartoonishly, quickly breaking free of their moorings. The heavy luxury vehicle slams onto the pavement, but only for a moment. The tires, still tethered to the car via some sort of wire, continue to fill and start to float off of the ground. Even as enraged security personnel hack at the wires, they pull taut, and the balloons begin to pull the limo into the air. The limo gently flips over and hangs, upside-down, from the floating balloons, which have turned an opaque white. Words begin to appear on them, large enough to be read as the bizarre contraption floats into the sky.\n\n\"V.A.N.G.U.A.R.D. is a pack of attack dogs. If Jack Mason is willing to run the kennel, he can take the bites.\"\n\n\"If the American people knew just how many times we've stopped Doctor Arachnus's genocides, and how close it's been, they'd panic for weeks.\"\n\nThe quotes aren't attributed, but it's not hard to imagine them in Mackenzie's voice. And the curling shells used in the sentences as periods make it clear who the culprit behind this attack must be.\n\nNautilus.\n*page_break\nNumber three on the federal Most Wanted List. The Impossible Prankster. Bane of corrupt politicians, self-serious intellectuals, and, for some reason, pastry chefs the world over. And he (or she, or it) is hijacking your crime. You know from your research that V.A.N.G.U.A.R.D. will be here in minutes to rescue the senator, although the likelihood that Nautilus is anywhere within five hundred miles of Merit City right now is remote. Still, this is going to compress your timetable to an uncomfortably tight margin. \n\nWhat do you do?\n\n*choice\n #This doesn't change anything. I attack the mayor, as planned.\n  You'll have to move fast, but it's possible that Nautilus has done you a favor here. With all the attention focused on the rapidly ascending senator, Mayor Mason is even more exposed.\n  *goto mayor\n #Nobody shows me up in my own town. I'm going to hijack the Mackenzie kidnapping.\n  If Nautilus thinks they can just waltz into Merit City and screw up your plans, he, she, or it has another thing coming.\n  *goto nautilustwo\n #This is getting too complicated. Maybe just focus on the crowd.\n  You're a heavily armed supercriminal with a dedicated team of trained killers standing in the middle of a crowd of innocents. If some concept artist with a few good tricks thinks they can steal your thunder, you're about to show them just how wrong he, she, or it is.\n  *goto crowd\n *if (museum = \"true\") #It's getting too hot around here. I'm going to hit the museum Steelheart tipped me off to.\n  *gosub end_trial\n  You don't love the idea of retreating. You love the idea of getting slapped in cuffs by V.A.N.G.U.A.R.D., or making an enemy of one of the most powerful and influential supervillains in the world, even less.\n  *goto museum\n\n*label mayor\nWhile the crowd stares at the floating car in a mixture of fear and surprise, you give the go-sign to your troops. \n*if (ingenuity > combat) and (ingenuity > terror)\n The glowing blue light of hoverboots coming to life causes the people around you to scatter, but you and your men are moving too fast to worry about that now, arcing toward the platform where the mayor stands, slack-jawed.\n *goto mayortwo\n*elseif (combat > ingenuity) and (combat > terror)\n Weapons appear in your troops' hands as they begin a highly regimented run for the platform where the mayor stands. Anyone who tries to get in the way goes down in a flurry of expertly trained attacks.\n *goto mayortwo\n*elseif (terror > ingenuity) and (terror > combat)\n You place a breathing filter in your nose, and then drop a pair of smoke bombs on the ground. The noxious gas, laced with fear-inducing toxins, causes the crowd to panic as you and your men disappear into the fog, moving with choreographed movements toward the podium where the mayor still stands.\n *goto mayortwo\n*else\n You and your minions make your way toward the stage where the mayor stands. Already on the verge of panic, no one in the crowd has the strength of will to try to get in your way.\n *goto mayortwo\n\n*label mayortwo\nYou stride across the podium to where Jack Mason cowers, seemingly beset on all sides by terror and anxiety. The servos in your armor's gauntlets whine a bit as you grab the portly mayor by the neck and lift him, one-handedly, into the air.\n\nHe gives a little scream. \"Oh, god, the Iron Scorpion! Please don't kill me, Scorpion! I'll do whatever you want!\"\n\nUgh. You don't know why people keep confusing you with the Iron Scorpion. He's seven feet tall, and his suit has a massive scorpion's tail. There is no resemblance whatsoever.\n\n\"I'm ${name}, you sniveling little wretch,\" you say to Mason, teeth gritted, giving him a little shake that sends ripples up and down his jowly face. \n\n\"Sure, sure,\" he cries, almost mad with terror. \"Whatever you want, ${name}! I'll do whatever you want!\"\n\nWell…what do you want?\n\n*choice\n #Corruption has a cost. This windbag dies.\n  *gosub end_trial\n  You see a disoriented journalist and his camerawoman standing near the podium. You drag Mayor Mason in front of them. They stare up at you, paralyzed with fear.\n  \n  \"This piece of filth has bled the city dry. He's made Merit City a laughingstock. And as a superior human specimen, I, ${name}, have both the right and the duty to cleanse this city of his grime.\" The journalist cringes as you snap the mayor's neck, but the camera's eye is unwavering.\n  *set activist %+20\n  *set lethality +5\n  *set terror %+10\n  *set mayor 1\n  *goto mayorthree\n #People need to know they're not safe anymore. Killing him painfully will send that message.\n  *gosub end_trial\n  You laugh insanely and throw the mayor to the ground. Two of your minions hold him down, while others force a nearby journalist to film your actions. One of your men hands you a small flamethrower, modified by your hired armorers for both precision and power. People watching the live broadcast have nightmares for years about how you use it on the mayor.\n  *set lethality +10\n  *set theatricality %+20\n  *set terror %+10\n  *set mayor 1\n  *goto mayorthree\n #I threaten him, making him confess his darkest secrets, then use the info to blackmail him.\n  *gosub end_trial\n  \"What's the worst thing you've ever done, Mr. Mayor? Is there anything your black little heart has even felt shame for?\"\n  \n  To Mason's credit, he tries to resist for a moment, until you make it clear that he speaks or he dies. Then the dam breaks, and a torrent of dirty deeds, sexual misconduct, and bizarre, petty offenses comes pouring out. You try not to listen to too much of it, but your armor's microphone catches everything. This blackmail material will be useful the next time you need a little boost to your influence or power.\n  *set activist %-20\n  *set mayor 3\n  *goto mayorthree\n  \n #I force him to confess to his misdeeds on camera.\n  *gosub end_trial\n  You drag Mason in front of a nearby journalist, who stares up at you with terror in her eyes. Her cameraman films as you force the mayor to his knees and force him to blubber out his every crime. You don't think even Mason could bounce back from a humiliation like this.\n  *set activist %+20\n  *set mayor 4\n  *goto mayorthree\n *selectable_if(planning>0) #I inject my specially prepared nanoprobes into his brain, putting him under my control. (Costs 1 Planning Point.)\n  *gosub end_trial\n  It was disgustingly easy to get the samples of Mason's DNA needed to create a nanoprobe that his body's immune system wouldn't reject. His eyes bug out as you insert the syringe tip just below his right ear and push the plunger down.\n  *set planning -1\n  *if ingenuity >60\n   He blinks at you a few times before his face twists into a scowl. \"Let go of me, you costumed psychopath!\"\n   \n   Perfect. The probes have masked themselves so well that not even Mason knows they're there. You'll be able to subtly mold his behaviors from the shadows.\n   *set theatricality %-20\n   *set mayor 5\n   *goto mayorthree\n  *else\n   Mason stutters a bit as you drop him to the ground. Every now and then, his face twitches. Eventually, the nanoprobes will either break down, kill him, or make him go psychotic. You should still have a good few months of control, though.\n   *set theatricality %-20\n   *set mayor 6\n   *goto mayorthree\n   \n *selectable_if(planning>0) #I psychologically shatter him with his deepest fears, rendering him unfit for office. (Costs 1 Planning Point.)\n  *gosub end_trial\n  You pull Mason close to you, so that your lips are almost touching his ear. The smell of sweat and fear is strong as you start to whisper.\n  *set planning -1\n  *if terror >60\n   Mason never tells anyone what, exactly, you said to him. Even bringing the incident up is enough to send him into another cycle of depression, anxiety, and night terrors. He never runs for public office again.\n   *set activist %+20\n   *set theatricality %+20\n   *set mayor 7\n   *goto mayorthree\n  *else\n   Mason backs away from you, fear trapped in his eyes. His hand shakes a little as he points at you, screeching \"Get away from me!\"\n   *set activist %+10\n   *set theatricality %+10   \n   *set mayor 8\n   *goto mayorthree\n   \n *selectable_if(planning>0) #I use a mixture of bribery, coercion, and psychology to put him in my pocket. (Costs 1 Planning Point.)\n  *gosub end_trial\n  *set planning -1\n  You smile warmly as Mason stares at you with fear in his eyes. He flinches as you reach into your pocket and pull out a small thumb drive. You toss it to him, and he barely catches it with sweaty-palmed hands.\n  \n  \"Everything the city council would just as soon wish you didn't know about their private lives, Mr. Mayor,\" you say with a smile. \"Just a way of saying I take care of my friends.\"\n  \n  Mason is not a smart man, but he has a savant's grasp of the intricacies of corruption. The thumb drive disappears into his pants with practiced ease. You harden your eyes and move closer to him. \"I take care of my enemies, too, Mr. Mayor.\" He smiles at you nervously, and nods.\n  *set theatricality %-20\n  *set activist %-20\n  *set mayor 9\n  *goto mayorthree\n  \n*label mayorthree\n*page_break\nThere's a thunderclap and a terrible bright light in the sky. It's the V.A.N.G.U.A.R.D. Hoverfortress, deploying over Sherman Park to rescue Senator Mackenzie and restore order. Jetpack-wearing soldiers begin to pour out of hatches in the improbably floating thing. Most of them head for the senator's still-airborne limo, but a few peel off toward where you and your minions stand. It's time to make your departure. You give the order, and your troops start to run for the overlooking hill, where your escape vehicle waits.\n\nSuddenly, an athletically trim female agent, carrying some kind of powerful-looking stun rifle, swoops down from above, cutting off your escape route. \n*if combat >60\n Before she can fire, your nearest minion reaches down, grabs some sand from the ground, and hurls it at the woman's jetpack. The intake fans suck it up, and the device begins to belch black smoke and veer erratically. You make a mental note to give the minion some sort of promotion or medal or something if you can remember his name.\n\n *if (trademark = \"no calling card\")\n  *goto mayorfour\n *else\n  It's time to get out of there, but first things first: you drop ${trademark} on the ground.\n  *goto mayorfour\n*else\n Her stun rifle fires, blasting a sizzling electrical discharge into the ground a few feet from where you stand. The energy arcs up the left side of your body, frying some of your armor's tech. Your minions quickly drive the agent away, but it's going to take you a while to rebuild the damaged components. Also, your mouth tastes like you've been sucking on pennies.\n *set notoriety -2\n *if (trademark = \"no calling card\")\n  *goto mayorfour\n *else\n  It's time to get out of there, but first things first: you drop ${trademark} on the ground.\n  *goto mayorfour\n \n*label mayorfour\n*page_break\nYou begin climbing up the hill, flanked by your loyal soldiers. The ground shakes as something massive slams into the earth in front of you: a V.A.N.G.U.A.R.D. Colossus. Someone must be really, really pissed off about Nautilus attacking the senator, because normally it's nearly impossible to get approval to deploy advanced military robot systems on American soil. The massive, almost-spherical device's staring eye turns red as it begins to scan the area around it. The area where you, and your heavily armed guards, are standing.\n\nYou begin rapidly tapping commands into the small interface on your suit's gauntlet. You've never tried to hack into a military drone's firmware while it was actively targeting you, but hey, there's a first time for everything. Although it's worth remembering that \"everything\" includes \"being shot by a drone before you can finish hacking it.\"\n\n*if ingenuity >=60\n You execute the last command just as the tank drone's eye begins to flash, indicating that it's preparing to deploy ordnance. As per your orders, the flashing intensifies as the Colossus begins to fire its entire arsenal of missiles and bullets. Since you're not suicidal, you made sure that the weapons are all aimed into the sky. Most of them hit the Hoverfortress's force shields, vaporizing instantly and creating a lovely fireworks-like effect. You make sure to aim your Darkspace camera upward to record the show.\n *goto mayorfive\n*else\n You manage to get into the drone's targeting system. You don't have enough time to take full control, though, as the thing starts firing at you, but you tweak it enough so that the bullets and missiles all miss. It's not a fun experience, and the shell shock from all the explosions rattles your composure a bit.\n *set notoriety -2\n *goto mayorfive\n \n*label mayorfive\n*page_break\nYou're almost to your waiting escape vehicle when two V.A.N.G.U.A.R.D. operatives deactivate their cloaking devices and appear directly in front of you and your troops. They bark orders for you to get on your knees and surrender. You wonder why they're putting so much energy into targeting you. Maybe V.A.N.G.U.A.R.D. training materials have a whole section on identifying threats based on whether they're wearing capes or not.\n\nYou pull a flash bomb out of your pocket and, before they can react, throw it at their feet.\n*if terror >60\n You take advantage of the three or four seconds of blindness it buys you to move around the soldiers while your troops dive for cover. It's unlikely that you'll be able to truly spook the highly trained V.A.N.G.U.A.R.D. troops, but you can at least disorient them.\n \n You throw another gadget toward the still-blinded men, one of your specially crafted \"noisemakers.\" It's a small stereo of surprising power, which blasts the agents's ears with cacophonous, perception-shattering sounds. The two men collapse to the ground, minds shocked by the overstimulation, and you and your minions sneak away.\n *goto mayorsix\n\n*else\n You take advantage of the brief confusion to make a break for your waiting escape vehicle. Unfortunately, one of the agents recovers faster than the other. He fires his weapon, catching one of your soldiers in the back with a powerful disabling pulse. There's no time to rescue or dispatch the minion (Jofferson, you think his name was. Or Joopson?) as you dive for cover. You make a mental note to call HR about hiring a replacement when you get back to base.\n *set notoriety -2\n *goto mayorsix\n \n*label mayorsix\nFinally, you reach the cloaked personnel carrier that you left at the top of the hill. Signaling to your driver, you switch the vehicle's holoprojectors to \"suburban station wagon\" and calmly merge into the mass of people attempting to flee the chaos in the park.\n*goto home\n\n*label nautilustwo\n\nYou get on your radio and tell your team that the plan has changed. With every second ticking closer to the moment when V.A.N.G.U.A.R.D. arrives in the park, you're going to have to move quickly if you want to interfere with Nautilus's kidnapping.\n\nHow do you want to play this?\n\n*choice\n #I'll kidnap the senator myself!\n  *gosub end_trial\n  You're not one-hundred-percent sure what you'll do with Mackenzie once you have her, given that all of your plans were designed to exploit Jack Mason's numerous weaknesses, but you'll come up with something.\n  *set naut 1\n  *goto kidnap\n #Bring down the balloons, killing the senator.\n  *gosub end_trial\n  Nautilus is famously nonlethal in their pranks and schemes. Framing them for murdering a senator would be a fine payback for how they've botched your mission.\n  *set naut 1\n  *goto balloons\n #Take credit for the kidnapping.\n  *gosub end_trial\n  You know this is a Nautilus job because you've been obsessively studying supervillains since you were a kid. That means you also know how to steal credit for it.\n  *set naut 1\n  *goto credit\n *selectable_if(planning>0) #I'll \"enhance\" what Nautilus is doing. (Costs 1 Planning Point.)\n  *gosub end_trial\n  This is a clever scheme. It discredits V.A.N.G.U.A.R.D., Mackenzie, and Mason simultaneously. But you think you see a way to make it even better….\n  *set planning -1\n  *set naut 2\n  *goto enhance\n\n*label kidnap\n*if ingenuity >=60\n You press the button on your gauntlet's palm that activates your hoverboots. You've tried really, really hard to make sure that you never take these things so high that the fall would kill you, but they're technically designed to work at much higher altitudes. Flying around will mean leaving your minions behind, so you pull a few small metal spheres from your belt and toss them into the air. Instead of falling, they begin to glow and hover, darting around you. At the bare minimum, the drones should help keep you alive if Mackenzie's bodyguards start shooting.\n \n You give a few orders to your soldiers to be ready for extraction when you return with the senator in tow, and then burst upward into the sky in a bolt of blue light.\n \n The crowd cries out as you fly upward. Someone yells \"It's the Iron Scorpion!\" which is irritating, given that the Iron Scorpion is seven feet tall, can't fly, and has a giant metal scorpion tail attached to his costume. You ignore this as you blaze upward toward the floating limo. A few shots ring out from below, but nothing comes even close to hitting you. \n \n Arriving at the limo, you keep pace with its slow ascension and quickly cut the door off its hinges with a small cutting torch. You peer into the darkness….\n \n You have about a second to register the bizarre appearance of a robotic clown sitting where the senator should be, and then a cream pie smacks you in the face. \n *page_break\n You spin around wildly, tumbling in the air as you try to get the cream out of your eyes. The boots' built-in stabilizers try to keep you upright, but you end up flipping end over end while your inner ear cries out in complaint. Eventually you manage to bring your drones in close, and you grab a few of them to pull yourself upright. The limo continues to float. You have no idea how Nautilus managed to switch the senator out so quickly, but you realize it's probably time to cut your losses. You land near your minions, who avoid making eye contact. One hands you a small towel.\n *goto mayorthree\n \n*else\n  You activate the hoverboots that your R&D department developed for you. They're prototypes, and you wobble a bit as you remember your training. Giving a few instructions to your men to be ready for extraction when you return with the senator, you hesitantly blaze into the sky.\n  \n  The crowd cries out as you fly upward. Someone yells \"It's the Iron Scorpion!\" which is irritating, given that the Iron Scorpion is seven feet tall, can't fly, and has a giant metal scorpion tail attached to his costume. You try to ignore this irritation as you blaze upward toward the floating limo. A few shots ring out from below, but nothing comes even close to hitting you. \n \n  Arriving at the limo, you just barely manage to keep pace with its slow ascension, and quickly cut the door off its hinges with a small cutting torch. You peer into the darkness….\n \n  You have about a second to register the bizarre appearance of a robotic clown sitting where the senator should be, and then a cream pie smacks you in the face. \n  *page_break\n  In your panic, you trigger the hoverboot controls, shutting them off. Blinded by the cream, you fall through the sky, desperately wiping at your eyes. Finally, vision clear, you see the ground racing toward you and instinctively reactivate the boots. The sudden stop is jarring (although not as jarring as hitting the ground would have been). You look back up at the limo, wondering how in the hell Nautilus managed to switch the senator out so quickly. Shaking your head angrily, you lower yourself to the ground where your minions wait, looking embarrassed.\n  *goto mayorthree\n\n*label balloons\n*if combat >60\n You bark out an order to your minion squad's dedicated sniper, Corporal Whatever or something. He quickly gets to work, breaking his rifle out of its nondescript case and assembling it as time grows shorter and shorter. Finally the massive gun comes together. People in the crowd notice and cry out. One of them spots your costume, yelling \"My god, it's the Iron Scorpion!\" which is infuriating because the Iron Scorpion dresses like a luchador, and all of his guards wear gloves shaped like pincers. You yell out to correct the woman, but she has already fled.\n  \n Corporal Whocares takes aim at one of the balloons. You watch as his chest expands and then contracts. At the low point of the breath, he squeezes the trigger.\n  \n As expected, one of the balloons explodes. Less expectedly, so do the others. Even less expectedly, the limo continues to float, unperturbed by gravity, as candy drops from the broken balloons. It rains down all around you. You lean down and pick a piece up. It's some sort of sour hard candy with a picture of a frowning Nautilus on the wrapper. It's called \"Bad Sports.\" You throw it down in disgust and give your troops the order to extract.\n *goto mayorthree\n*else\n You yell for whichever of your troops is assigned to carry \"The Big Gun\" today to come forward. Clearly nervous, the woman in question, Private Jones or something, approaches. As you watch, she takes the massive thing out of its carrying case and slowly puts it together. You try not to whistle angrily as time ebbs away. The thing is finally put together, and Smith or whatever lifts it to her shoulder. People in the crowd notice and cry out. One of them spots your costume, yelling \"My god, it's the Iron Scorpion!\" which is infuriating because the Iron Scorpion dresses like a luchador, and all of his guards wear gloves shaped like pincers. You yell out to correct the woman, but she has already fled.\n  \n The slow-moving private looks over at you, and you smile in your best \"This is not really a smile\" smile and nod. She sighs quietly and pulls the trigger.\n  \n The roar of the gun sends the crowd into a further panic, as the recoil slams Private Johnson off her feet and flat on her back. In an instant, the nearest of the giant balloons explodes. You remind yourself to find out what Whosit's actual name is so you can put a note of commendation in her file, but you promptly forget when the rest of the balloons explode too. Something hits the ground near you. Looking down, you see that it's some sort of sour hard candy with a picture of a frowning Nautilus on the wrapper. It's called \"Bad Sports.\" \n  \n Looking back up, you see the limo continue to float serenely, supported by nothing. You're not sure how Nautilus is doing this, but it's infuriating. You stomp on the piece of candy as more rains down, and give your troops the order to extract.\n *goto mayorthree\n*label credit\n*if theatricality >50\n You throw down a handful of smoke bombs, immediately drawing the crowd's attention. Then, activating the hoverboots built into your suit, you rise into the air, out of the smoke, and stare down at the watching crowd. In a moment, Mackenzie's bodyguards will be drawing a bead on you, but for right now they're as frozen as the rest. \n  \n Someone in the crowd cries out, \"Oh my god! It's the Iron Scorpion!\" You wheel around, staring him down. \"No, sir,\" you hiss through gritted teeth. \"The Iron Scorpion has a flaming red mohawk and rides on a giant robot scorpion.\" You widen your attention again.\n  \n \"Ladies and gentlemen, welcome to the crime of the century! I am your host for today's daytime nightmare…${name}.\"\n  \n You were expecting gasps, maybe. Maybe even a few boos, which would be as good as cheers. You weren't expecting laughter. Infuriated, you look down to see people pointing up past you, at the limo. Some sort of video is being projected onto the balloons. It shows a cartoon of someone wearing a pretty accurate representation of your costume. You can't see the face because the person appears to have gotten it stuck in a giant nautilus shell. The cartoon wobbles back and forth before finally falling over, head still stuck in the oversize shell. The crowd laughs even more.\n  \n You consider giving your minions the order to open fire, but you see Mackenzie's guards aiming their rifles at you. You drop a few more smoke bombs, lower yourself to the ground, and begin stomping angrily toward your extraction point.\n *goto mayorthree\n*else\n You walk into an open space near the middle of the crowd. Seeing your costume, people back away as you cup your hands over your mouth and prepare to deliver your speech before a trigger-happy cop shoots you. \n  \n Before you can start, though, someone in the crowd yells out, \"Oh my god! It's the Iron Scorpion!\" You wheel around, staring him down. \"No, sir,\" you hiss through gritted teeth. \"The Iron Scorpion has a flaming red mohawk and rides on a giant robot scorpion.\" You try to regain your momentum.\n  \n \"I have kidnapped Senator Erin Mackenzie! You are all witnesses to the true evil of…${name}!\"\n  \n You were hoping for some gasps or some boos or something, anything to indicate that you'd made an effective point. You weren't expecting laughter. Infuriated, you look around and see people pointing up, at the limo. Some sort of video is being projected onto the balloons. It shows a cartoon of someone wearing a pretty accurate representation of your costume. You can't see the face because the person appears to have gotten it stuck in a giant nautilus shell. The cartoon wobbles back and forth before finally falling over, head still stuck in the oversize shell. The crowd laughs even more.\n  \n You consider giving your minions the order to open fire, but you see Mackenzie's bodyguards taking aim at you. You duck back into the crowd, running for the extraction point.\n *goto mayorthree\n\n*label enhance\n\nIt's difficult to parse Nautilus's motivations, which twist and wind upon themselves like a, well, nautilus shell…but the goal of this plot seems to be to shame everyone involved in the rally. Still, you can't help but feel that Mayor Mason is getting off light. Sure, the quote on the balloon is damning, and he's probably smarting from losing all of the attention that should have been his, but he could stand to suffer more.\n\nYou and your men make a beeline for the podium, where Mason still cowers, looking alternately relieved and pissed off to be left on the sidelines. Using a modified version of your original plan, you storm onto the stage, flanked by your minions, and grab Mason by the neck.\n\n\"Wh-who are you?\" he manages to sputter. \"The Iron Scorpion?\" You glare at him coldly. You have no idea why people keep confusing you with the Iron Scorpion; the other villain is absolutely massive and speaks only in rhyme. \"I'm ${name}, your Honor,\" punctuating each word with a sharp shake. \"And we're going for a little ride.\"\n\nAs your minions watch, you activate your hoverboots. They strain against the mayor's added bulk. You're going to have to do this fast because the extra weight will burn through your suit's power supply quickly. You and your \"passenger\" shoot off into the sky.\n\nMason blubbers to himself as you near the floating limo. The hoverboots dip for a moment, and you know you've got to be quick about this. Wrapping a small length of cord around Mason's leg, you quickly tether it to the car's back bumper. Mason screams as he drops. Once the wire reaches the end, it pulls taut, and the mayor is left to be dragged behind the floating car: literal political baggage for Senator Mackenzie.\n\nYou've attracted the attention of the senator's bodyguards, so there's no time to savor your little addition to Nautilus's criminal tableau. You speed back down into the crowd, landing safely near the podium where your minions still stand.\n*goto mayorthree\n\n*label crowd\nYour troops nod, happy for an objective that keeps them out of Nautilus's way. One of them, Jadorski or something, coughs nervously, though, and asks, \"Do you have specific orders, ${name}?\"\n*choice\n #\"Let's put the fear of ${name} into these poor complacent fools.\"\n  *gosub end_trial\n  *set theatricality %+10\n  *goto crowdfear\n #\"Wallets, rings, purses. Grab 'em and move. It's tax season.\"\n  *gosub end_trial\n  *set activist %-10\n  *goto crowdsteal\n #\"Safeties off, weapons hot. Orders are shoot to kill. Repeat, shoot to kill.\"\n  *gosub end_trial\n  *set lethality +5\n  *goto crowdkill\n *selectable_if(planning>0) #\"You know what's more fun than a panicky crowd? An enraged riot.\" (Costs 1 Planning Point.)\n  *gosub end_trial\n  *set planning -1\n  *set theatricality %+10\n  *goto crowdriot\n *selectable_if(planning>0) #\"Don't draw attention to yourselves. Target isolated people with these Indoctrination Pulsers.\" (Costs 1 Planning Point.)\n  *gosub end_trial\n  *set planning -1\n  *set activist %+20\n  *goto crowdindoctrination\n*label crowdfear\n*if terror > 60\n Panic is an interesting thing. People think it's an emotion, but in truth it's really just a reaction. Panic is a stampeding elephant. Fear is the sensation you get when you stare into the merciless eyes of the tiger that sent the pachyderm running. And fear is what you and your troops spread through the crowd. Smoke bombs go out first, obscuring vision and trapping each person in a lonely world of fog. Then your soldiers begin firing their weapons into the air as they move in and out of the smoke, disappearing and reappearing. People catch a glimpse, just for a moment, of you in your terrifying costume, and find themselves paralyzed with fear. And through it all, your laughter gives a beat to the fear, chilling the blood of all who hear it.\n \n Your troops have never really seen you in your element before, and realizing just what kind of demented genius they're working for inspires them to work just a little harder.\n *set combat %+10\n *set mayor 10\n *page_break\n Of course, the downside of the whole \"terrify them from the smoky shadows\" act is that no one has any idea who you are. They probably think this is part of Nautilus's prank. But the Darkspace camera on your collar is recording it all….\n *goto mayorthree\n*else\n Your soldiers fire wildly into the air, and the already on-edge crowd devolves into panic. They run like mad, slamming into you and shoving each other aside. It's fun (even when you belatedly realize that people are just going to assume that this is another facet of Nautilus's plan), but something is missing. You have a vague sense of untapped potential, of a greater fear lying just out of reach. It taunts you with its elusiveness, but at least you pick up a few pointers for next time.\n *set terror %+10\n *set mayor 10\n *goto mayorthree\n \n*label crowdsteal\n*if theatricality >50\n You cup your hands around your mouth to shout, and then remember that you've got a natural voice amplifier built into your suit, so you use that instead.\n \n \"Ladies and gentlemen! I am ${name}! I know what's going on in the sky is very exciting, but would you consider making a small donation to a worthy cause?\" Your minions point their weapons menacingly at the nearest crowdmembers. \"These poor orphans just don't know what they'll do if they can't raise enough money to go on the orphanage field trip to the amusement park. Won't you help them, so they don't have to do something crass like shoot you?\"\n \n After all, you got into this stupid racket to have fun, right?\n *set mayor 13\n *goto mayorthree\n \n*else\n It's less a mass robbery and more a series of very quick, very lucrative muggings. Target people on their own, show the weapons, grab the loot, and move. Don't give anyone enough time to think they're a hero, don't give anyone time to warn the people ahead of them. Your minions move like termites through a lumberyard, cleaning off many of Merit City's most well-off or politically connected citizens. \n \n While your troops move, you're busy scanning credit cards with your Darkspace camera. \"Helen Van der Woost\" probably won't approve of what Maldus the Malevolent Jackal does with her Platinum Plateau card, but that doesn't mean he and his Deathpack won't owe you a few favors for doing it.\n *set mayor 13\n *goto mayorthree\n \n*label crowdkill\nYou watch your troops for any sign of weakness, and you're gratified to see none. You feel a warm swell of pride. When they came to you, these people were professional soldiers of fortune, second-story men, bank robbers, and extortionists. And now, with only a few months of training—along with some fairly advanced brainwashing techniques, a good dental plan, and the knowledge that they know you know where their families live—these people are willing to open fire on a crowd of strangers without hesitation. Which is what they do.\n\nAs the screams rise around you and the scent of blood fills the air, you remind yourself to send a \"Thank You!\" fruit basket to the folks in HR for putting together such a great group of team players. You wonder idly as someone weeping crawls past you, pursued closely by Private Wolland or some name like that, with the double-el sound, if Nautilus will get blamed for this. You certainly hope so; the non-lethal showboat has far too good a reputation for your tastes.\n*set mayor 11\n*goto mayorthree\n\n*label crowdriot\nYour troops watch, slightly in awe, as you move casually through the crowd, and rage blossoms around you. You step on someone's foot. Whisper a curse in someone's ear. Jostle someone's arm just a little too hard. Nothing that could be traced back to you, just a slowly escalating series of annoyances and fears, playing on the crowd's heightened state. And just as you feel the thing start to fall apart, before the Jenga tower of rage begins to topple, you point a finger at Jack Mason, still cowering randomly on the podium stage, and shout, \"It's all that bastard's fault!\"\n\nThe crowd, now a single great beast of frothing anger, suddenly has a target. You laugh to yourself as Mason flees before the awakened giant, which starts to trash the park in earnest.\n\nYou return to your waiting minions. You shrug off their compliments, but deep down you know: this is going on your demo reel.\n*set mayor 12\n*goto mayorthree\n\n*label crowdindoctrination\nThe Pulser is a neat little toy: a few seconds of exposure to its unique pattern of flashing lights can make the victim relatively open to suggestion. Nothing super-drastic, but it's the most effective way you've found so far to sway the hearts and minds of the hapless fools you're trying to enlighten.\n\nYou hand them to your minions and watch quietly as they work their way through the crowd, focusing on people standing alone. A quick conversation, a moment's attention, and a flash is all it takes. You move in behind the targets, giving each receptive set of ears a few seconds of your time, slipping your ideas past their defenses. Nobody is going to go out and murder the president because of what you're doing. But they will be a little more open to whatever you do next.\n\nAfter all, Rome wasn't converted into a global empire devoted to your ideals in a day, right?\n*set mayor 14\n*goto mayorthree\n*label museum\n\n*achieve blind\n\nYou give the order to your troops: you're pulling out. They try to hide their disappointment as you make your way out of the park, ignored by the rally attendees still staring upward at the floating limo. The minions brighten up a bit when you tell them you'll be pulling a new job on the far side of town, one with a much more certain payoff and a far lower chance of V.A.N.G.U.A.R.D. deployment. You pile into your cloaked personnel carrier, adjust its holoprojecter to \"school bus,\" and pull away from Sherman Park.\n\nThe museum heist is profitable but uneventful. Your nouveau riche parents burned you out on appreciating modern art, but you do find an ashtray you like in the museum gift shop while your minions clear the rest of the place out. \n*if (trademark = \"no calling card\")\n *goto museumloot\n*else\n In place of the ashtray, you leave behind ${trademark}, of course.\n *goto museumloot\n\n*label museumloot\n\nOn your way toward the door, one last thing catches your eye.\n\n*choice\n #A set of technical specs for an ancient clockwork trebuchet.\n  Not only do the pages look really cool hanging up in your inner sanctum, but you also learn a few things from looking them over.\n  *set ingenuity %+10\n  *goto home\n #One of the world's oldest rifles, still in working condition.\n  This is exactly what you were looking for to tie the whole spirit of the minion barracks together. Nothing says \"We're a dangerous, awesome team!\" like a gun that takes nine minutes to reload!\n  *set combat %+10\n  *goto home\n #A short treatise on the weaknesses of the human spirit.\n  You actually find yourself disturbed by some of the things you read. Faith lost, souls annihilated with despair. You take copious notes.\n  *set terror %+10\n  *goto home\n #An ancient Japanese ceremonial costume, painted in bright, garish colors.\n  That's the way it should be: brightly colored warriors facing off in a spectacle of combat and madness. This is going to look great in your breakfast nook.\n  *set theatricality %+10\n  *goto home\n #A nice vase that you could put flowers in.\n  It's not fancy, but neither are you. You prefer art that can actually be useful, for once.\n  *set theatricality %-10\n  *goto home\n #The cash drawer from the museum's ticket booth. Every dollar helps!\n  You notice some change dropped behind the counter and reach down to grab it before you stop yourself. Come on, ${name}. This is what you have minions for.\n  *set activist %-10\n  *goto home\n #A blank wall, perfect for spraying a message on.\n  This is why you never go anywhere without your trusty can of spray-paint. What idea do you want to permanently deface this wall with?\n  *input_text wall\n  \"${wall}\" Hell yeah, that'll teach 'em.\n  *set activist %+10  \n  *goto home\n #A tied-up security guard that you could finish off.\n  There's no reason this day has to be a complete whiff, bodycount-wise. He blubbers a lot of stuff about his grandkids, in that usual way boring people do right before they die.\n  *set lethality +2\n  *set museumkill 1\n  *goto home\n\n\n*label home\n*page_break\nThat night, you sit down in your private apartment, nestled deep within your base, and turn on the nightly news to see how your exploits are being reported.\n\n\"Hey there, Merit City, this is Biff Crenshaw!\"\n\n\"And this is Mindy Martriggis. We're Merit-6's own Formerly Married News Team.\"\n\n\"We'll have all the weather and sports you can stand later in the hour, but first, our top story: the attack on Mayor Mason's rally today by supervillains.\"\n\n\"That's right, Biff, you hairpiece-wearing homunculus, a peaceful political rally erupted into chaos and violence today, demanding intervention by V.A.N.G.U.A.R.D. troops.\"\n\n*if mayor =1\n \"We are saddened to inform our viewers that Jack Mason, the stalwart political servant who gave so many years of his life to Merit City, is dead, cut down by the supervillain known as the Iron Scorpion.\"\n \n You're about to throw a paperweight through your TV when the female anchor interrupts.\n \n \"Actually, Biff, if you'd taken even a moment to do the bare minimum of research your job requires, you'd see that the killer, shown here—\" And you realize they're right, the camera really does add ten pounds. \"—is a new villain bedeviling Merit City, known only as…${name}.\"\n \n It's the first time you've ever heard your new name on television. You'd always expected it to feel exciting, but it's a surprisingly calm sensation. You were always meant to be on the fearful lips of the people. It's time they all knew.\n\n \"Additionally,\" she says, \"${name} appears to always leave behind ${trademark}, and this crime was no exception.\"\n \n \"While the city mourns Mayor Mason, we're at least happy to report that Senator Erin Mackenzie is alive and well, despite being whisked away by the enigmatic criminal performance artist known as Nautilus,\" the male anchor goes on. \"Mackenzie surfaced a few hours later, bewildered but seemingly healthy. Mindy?\"\n \n \"In fact, it appears that the criminal's bizarre stunt seems to have inadvertently saved Mackenzie's life. Several bombs were detonated only a few minutes after the senator's kidnapping on her proposed touring route, destroying several vehicles and claiming several lives. Although no one has claimed responsibility for the bombing, authorities have indicated to us that the materials used in the explosives marked this as a possible attack by Doctor Arachnus.\"\n \n \"A dark day for Merit City, Mindy. It makes you want to just huddle under the covers with a loved one.\"\n \n \"No one loves you, Biff. No one ever will. And now, Chip Dipson, with sports.\"\n \n You shut the TV off.\n *goto darkspace\n \n*elseif mayor =3\n *gosub GetBent\n \n \"Yes,\" Mindy says, \"Senator Erin Mackenzie was propelled into the air with, if you can believe this, giant balloons, covered in what are apparently quotes from the prominent senator denigrating both Mayor Mason and V.A.N.G.U.A.R.D.\"\n \n \"This came after the announcement that the international organization will be establishing its new headquarters right here in Merit. We talked to Mayor Mason about it earlier today.\"\n \n Mason appears on the screen, ruddy-faced. There is fear in his eyes. He knows you must be watching, with all of his little secrets tucked away in your recorder. \n\n \"We welcome V.A.N.G.U.A.R.D.! Today has made it more obvious than ever that Merit City is at war with so-called supercriminals, and my staff and I welcome any assistance the Global Federation is willing to give us.\"\n \n The program cuts back to the studio, where Biff nods in approval.\n \n \"Powerful words from the often embattled mayor. We're also happy to report that Senator Erin Mackenzie is alive and well. Mackenzie surfaced a few hours after her limousine vanished into the sky, bewildered but seemingly healthy. Mindy?\"\n \n \"In fact, it appears that the criminal's bizarre stunt seems to have inadvertently saved Mackenzie's life. Several bombs were detonated only a few minutes after the senator's kidnapping on her proposed touring route, destroying several vehicles and claiming several lives. Although no one has claimed responsibility for the bombing, authorities have indicated to us that the materials used in the explosives marked this as a possible attack by Doctor Arachnus.\"\n\n \"A dark day for Merit City, Mindy. It makes you want to just huddle under the covers with a loved one.\"\n \n \"No one loves you, Biff. No one ever will. And now, Chip Dipson, with sports.\"\n \n You shut the TV off.\n *goto darkspace\n \n*elseif mayor =4\n \"A shocking day, Mindy. Under extreme duress, Mayor Mason has confessed to a litany of offenses, any one of which enough to have him removed from office.\"\n \n \"That's right, Biff. Corruption, adultery, mopery, all of them are on Mason's tab, forced out of him by a new supercriminal who surfaced during the attack today, leaving behind ${trademark}…${name}.\"\n \n It's the first time you've ever heard your new name on the news. And in that moment, the certainty that you're going to change the world fills you. It feels good.\n \n The program cuts to footage of you forcing the confession from Mason. You can't help noticing that your suit is off-center, which is embarrassing. Still, you look better than Mason, at least.\n \n \"Meanwhile, Senator Erin Mackenzie, who was visiting to support the embattled Mason, was briefly kidnapped by the enigmatic criminal known only as Nautilus.\"\n \n \"Apparently he thought the visiting Senator Mackenzie would enjoy a hot-air-balloon tour of the city!\"\n \n \"That's a facile analysis, Mindy, and you should be ashamed.\"\n \n \"Get bent, Biff!\"\n \n \"Yes, Senator Erin Mackenzie was propelled into the air with, if you can believe this, giant balloons, covered in what are apparently quotes fr iven back across the sea like the dogs that they are. One villain, a guy you've never heard of called \"Oblivio,\" keeps breaking into discussion threads and insisting that the move is some sort of Minotaur plot to keep the attention off of their European activities. It's not a wholly unconvincing argument, but you're not sure the international criminal syndicate has the clout to pull off this kind of political maneuvering.\n\n It's been a long day. You shut off the computer and head to bed.\n *set notoriety +10\n *finish\n \n*elseif (mayor =10) or (mayor =13)\n Most of the discussion on Darkspace tonight is about the kidnapping of Senator Mackenzie. A few of the more-vocal young villains start into their usual rants about how Nautilus doesn't deserve to be called a villain since it seems completely unwilling to kill. The older villains speculate about whether there were any ulterior motives for the prank. A few even wonder if Mackenzie was ever really released, or whether the senator that you saw being freed was some sort of clone or sleeper agent.\n\n There is some muted commentary on your successes in the crowd, though. A couple of the older supervillains console you with times they'd also had the limelight snatched away from them by higher-profile evildoers.\n *set notoriety +10\n Of course, your limited success isn't the only thing being discussed tonight. The reaction to V.A.N.G.U.A.R.D. planting itself on American soil is clearly provoking some anxiety from the community, mostly shown as a lot of idiotic boasting about how the government lackeys will be driven back across the sea like the dogs that they are. One villain, a guy you've never heard of called \"Oblivio,\" keeps breaking into discussion threads and insisting that the move is some sort of Minotaur plot to keep the attention off of their European activities. It's not a wholly unconvincing argument, but you're not sure the international criminal syndicate has the clout to pull off this kind of political maneuvering.\n\n It's been a long day. You shut off the computer and head to bed.\n *finish\n \n*elseif (mayor =12) or (mayor =14)\n Most of the discussion on Darkspace tonight is about the kidnapping of Senator Mackenzie. A few of the more vocal young villains start into their usual rants about how Nautilus doesn't deserve to be called a villain since it seems completely unwilling to kill. The older villains speculate about whether there were any ulterior motives for the prank. A few even wonder if Mackenzie was ever really released, or whether the senator that you saw being freed was some sort of clone or sleeper agent.\n\n People on Darkspace aren't usually effusive with praise, but you get some legitimate compliments for the stunt you pulled in the crowd. A lot of people would have folded when someone like Nautilus crashed the party, but you get some real respect for improvising your own brand of evil.\n *set notoriety +15\n \n Of course, your success isn't the only thing being discussed tonight. The reaction to V.A.N.G.U.A.R.D. planting itself on American soil is clearly provoking some anxiety from the community, mostly shown as a lot of idiotic boasting about how the government lackeys will be driven back across the sea like the dogs that they are. One villain, a guy you've never heard of called \"Oblivio,\" keeps breaking into discussion threads and insisting that the move is some sort of Minotaur plot to keep the attention off of their European activities. It's not a wholly unconvincing argument, but you're not sure the international criminal syndicate has the clout to pull off this kind of political maneuvering.\n\n It's been a long day. You shut off the computer and head to bed.\n *finish\n*elseif mayor =11\n Most of the discussion on Darkspace tonight is about the kidnapping of Senator Mackenzie. A few of the more vocal young villains start into their usual rants about how Nautilus doesn't deserve to be called a villain since it seems completely unwilling to kill. The older villains speculate about whether there were any ulterior motives for the prank. A few even wonder if Mackenzie was ever really released, or whether the senator that you saw being freed was some sort of clone or sleeper agent.\n\n You notice that most of the older supervillains are refusing to talk to you. It doesn't matter; you've got plenty of new fans to discuss your kills with. One guy, \"The Death Hound,\" even writes a little song about you and posts the lyrics in the thread. It's not great, but he does manage to rhyme \"steaming viscera\" with \"sure am missing ya,\" which is, you know, something.\n *set notoriety +15\n \n Of course, your bodycount isn't the only thing being discussed tonight. The reaction to V.A.N.G.U.A.R.D. planting itself on American soil is clearly provoking some anxiety from the community, mostly shown as a lot of idiotic boasting about how the government lackeys will be driven back across the sea like the dogs that they are. One villain, a guy you've never heard of called \"Oblivio,\" keeps breaking into discussion threads and insisting that the move is some sort of Minotaur plot to keep the attention off of their European activities. It's not a wholly unconvincing argument, but you're not sure the international criminal syndicate has the clout to pull off this kind of political maneuvering.\n\n Logging off, you see you have a message in your regular, non-Darkspace email. There's no address listed, but when you open it, there's a short note.\n \n [i]No second chances. The next time you're in my line of fire, I'm pulling the trigger.[/i]\n \n [i]Steelheart.[/i]\n \n You log off the computer and head to bed. It's been a long day.\n *set Steele -10\n *finish\n*else\n Most of the discussion on Darkspace tonight is about the kidnapping of Senator Mackenzie. A few of the more vocal young villains start into their usual rants about how Nautilus doesn't deserve to be called a villain since it seems completely unwilling to
