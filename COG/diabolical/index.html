o ReflectedBlasts\n   \n  *else\n   \"Your end has come!\" shouts Fauxton as the fiery blasts shoot from his hands. Before they can reach you, you activate your reflector device. It quickly expands from the size of a wristwatch to a three-foot-wide shield. The shield's special coating causes the fire blasts to bounce off straight back at their source. Fauxton dodges the first few but gets hit with the very last one, sending him plummeting to the ground below.\n   *set combat %+10\n   *goto ReflectedBlasts\n   \n*label WeatherFight\n\nAlthough he's still more than able to set everything around him on fire, an unmistakable look of discomfort and slight fear covers Fauxton's face—a huge change from the overzealous grin he had just a moment ago. Clearly he's not too fond of cold weather, much less the kind that hides his target. You've temporarily rendered his flying and shooting powers useless, giving you the perfect chance to sneak up and finish him off.\n\n*fake_choice\n #Knock him out and brainwash him at my base.\n  Merit City will know just how unsafe they truly are when they see one of their superheroes become your puppet.\n  *set activist %+10 \n #Use his own hand blasters to blow his brains out.\n  There's nothing like ending the life of a hero, especially when it involves their own special abilities.\n  *set lethality +5\n #Freeze him in a carbonite block for display on my wall of villainy.\n  You can already see the looks of jealousy on all their faces when they see the frozen Fauxton on your wall the next time you get to host the annual villains-only New Year's Eve party.\n  *set theatricality %+10\n #Take him as a prisoner and demand a huge ransom for his release.\n  Merit City is no doubt willing to pay serious cash to rescue their beloved superhero. Whether you release him in one piece or many is an entirely different matter.\n  *set activist %-10\n\nSadly, you made the one mistake you swore long ago to always avoid—giving the hero the split second that he needs to recover. A shame, really, since you'd just reread the pertinent chapter in Professor Deathskull's brilliant book [i]101 Mistakes Most Villains Make[/i].\n\nUsing his superpowered hearing, Fauxton manages to catch the light cackle you let out upon determining his fate. Seriously, how many superpowers does this guy have? Superspeed, too, apparently, as the air blurs for a moment and suddenly he's standing right in front of you. Unable to react in time, you feel yourself get picked up in the air and tossed several feet, straight through one of the cement walls holding up the unfinished building.\n\nYou thought slipping in the shower was the worst feeling ever, but this certainly takes the cake. The pain isn't enough to knock you out, but it does cause your mind to drift back to earlier in the day….\n*goto SecondFlashback\n\n*label CraneSmash\n\nA yell filled with anguish echoes throughout the site as Fauxton bursts out of the pile of bricks, sending them flying in a large radius. Seemingly unfazed, he takes a few steps before falling to one knee while holding his bruised ribs. He's not down for the count yet, but you've left him quite vulnerable, giving you the perfect chance to finish him off.\n\n*fake_choice\n #Knock him out and brainwash him at my base.\n  Merit City will know just how unsafe they truly are when they see one of their superheroes become your puppet.\n  *set activist %+10 \n #Use his own hand blasters to blow his brains out.\n  There's nothing like ending the life of a hero, especially when it involves their own special abilities.\n  *set lethality +5\n #Freeze him in a carbonite block for display on my wall of villainy.\n  You can already see the looks of jealousy on all their faces when they see the frozen Fauxton on your wall the next time you get to host the annual villains-only New Year's Eve party.\n  *set theatricality %+10\n #Take him as a prisoner and offer a huge ransom for his release.\n  Merit City is no doubt willing to pay serious cash to rescue their beloved superhero. Whether you release him in one piece or many is an entirely different matter.\n  *set activist %-10\n\nSadly, you made the one mistake you swore long ago to always avoid—giving the hero the split second that he needs to recover. A shame, really, since you'd just reread the pertinent chapter in Professor Deathskull's brilliant book [i]101 Mistakes Most Villains Make[/i].\n\nUsing his highly trained concentration, Fauxton somehow suppresses the pain pulsing through his body and stands up to continue the fight as if he's good as new. Seriously, how many superpowers does this guy have? Superspeed, too, apparently, as the air blurs for a moment and suddenly he's standing right in front of you. Unable to react in time, you feel yourself get picked up in the air and tossed several feet, straight through one of the cement walls holding up the unfinished building.\n\nYou thought slipping in the shower was the worst feeling ever, but this certainly takes the cake. The pain isn't enough to knock you out, but it does cause your mind to drift back to earlier in the day….\n*goto SecondFlashback\n\n*label ReflectedBlasts\n\nThe downed hero grunts in pain as he struggles to get back to his feet. Seemingly unfazed, he takes a few steps before falling to one knee, grabbing the wound from being nailed with one of his own blasts. He's not down for the count yet, but you've left him quite vulnerable, giving you the perfect chance to finish him off.\n\n*fake_choice\n #Knock him out and brainwash him at my base.\n  Merit City will know just how unsafe they truly are when they see one of their superheroes become your puppet.\n  *set activist %+10 \n #Use his own hand blasters to blow his brains out.\n  There's nothing like ending the life of a hero, especially when it involves their own special abilities.\n  *set lethality +5\n #Freeze him in a carbonite block for display on my wall of villainy.\n  You can already see the looks of jealousy on all their faces when they see the frozen Fauxton on your wall the next time you get to host the annual villains-only New Year's Eve party.\n  *set theatricality %+10\n #Take him as a prisoner and offer a huge ransom for his release.\n  Merit City is no doubt willing to pay serious cash to rescue their beloved superhero. Whether you release him in one piece or many is an entirely different matter.\n  *set activist %-10\n\nSadly, you made the one mistake you swore long ago to always avoid—giving the hero the split second that he needs to recover. A shame, really, since you'd just reread the pertinent chapter in Professor Deathskull's brilliant book [i]101 Mistakes Most Villains Make[/i].\n\nLike some kind of superhero bowler, Fauxton uses his good shoulder to send a giant bulldozer wheel rolling full force straight at you. Seriously, how many superpowers does this guy have? Superspeed, too, apparently, as the air blurs for a moment and suddenly he's standing right in front of you. Unable to react in time, you feel yourself get picked up in the air and tossed several feet, straight through one of the cement walls holding up the unfinished building.\n\nYou thought slipping in the shower was the worst feeling ever, but this certainly takes the cake. The pain isn't enough to knock you out, but it does cause your mind to drift back to earlier in the day….\n*goto SecondFlashback\n\n\n*label SecondFlashback\n*page_break\n[i]Ten hours earlier…[/i]\n\nYou were sitting in a coffee shop with your laptop, doing some more boring work while a fancily dressed lady screamed at a barista for getting her order wrong. It never ceased to amaze you how entitled some customers felt, almost as if the pimple-faced teen working for minimum wage was their bean-grinding slave. You crossed your fingers, hoping the irritated barista would toss the smoldering drink in the woman's face. Alas, he played the good employee and prepared her another drink she'd no doubt complain about as well.\n\nYou continued to watch while you took a sip of your own drink…\n\n*fake_choice\n #A rich, black cup of coffee.\n  \"Black, just like my heart!\" was your favorite thing to say when ordering it. A bit cheesy, but no less true.\n #A tasty fruit-flavored tea.\n  Couldn't go wrong with a healthy beverage rich in antioxidants and other nutritious stuff. You never know what will make a difference when you live the dangerous life of a supervillain.\n #A double ristretto non-fat organic chocolate chip frappuccino with extra whipped cream.\n  That's right, you were one of those people. And proud of it!\n\nYou were still sipping away when you received a notification letting you know someone mentioned you in a Darkspace post.\n\n\"${name}! The time has come for you to pay for the harm you've inflicted on our good city. If you are not a coward, let us fight at the abandoned construction yard off Grand Avenue at midnight. This despicable online community, filled with the scum of the Earth, will know if you fail to show up. They will know ${name} doesn't have the courage to fight a true hero face-to-face, one-on-one. Signed, Fauxton\"\n\nDamned superheroes, always finding their way onto what was supposed to be a villain-exclusive site. You weren't expecting that. Fauxton was far from the savior of Merit City, but he'd been putting quite a few villains behind bars as of late—some to rest, even. Any hero that didn't mind killing a villain to make sure they couldn't cause any more trouble wasn't to be taken lightly. Defeating you would probably be a nice step closer to making him the greatest hero in town, though getting rid of him would earn you some serious kudos on Darkspace as well.\n\nBut what if it was a trap, set up by a stronger superhero, or even V.A.N.G.U.A.R.D.? Well, two could play at that game! You considered a few ideas that would give you an upper hand during the midnight rendezvous.\n\n*choice\n #Hide a powerful freeze gun under some of the rubble.\n  *if combat > 65\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and run to where you hid the freeze gun. \"You're tough, but still no match for me,\" announces Fauxton upon entering the skeleton of concrete and metal. Hiding behind one of the concrete pillars holding up the place, you wait for him to move closer before shooting an icy blast at him.\n  \n   Boasting quick reflexes, he immediately shoots a blast of fire from his hands at you. The two shots miss each other but hit their intended targets. Fauxton, now covered in a layer of ice, stands motionless as your freeze gun sparks angrily from being flamed. You're pleased, yet frustrated. The hotheaded hero stands frozen, but your favorite freeze gun, a gift from your villain friend Frostbite, is busted.\n  \n   You approach the frozen figure while pondering where you'll have him placed at your base. He's not the most elegant-looking ice statue, but it's a good start for your new collection. Just then, one of his arms breaks free of its icy confinement. Since you can't use the gun to add a thousand more layers of ice, it's only a matter of time before the super-strong hero breaks out….\n   *set combat %+10\n   *set notoriety +2\n   *goto FauxtonRetaliates\n   \n  *else\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and run to where you hid the freeze gun. \"You're tough, but still no match for me,\" announces Fauxton upon entering the skeleton of concrete and metal. Hiding behind one of the concrete pillars holding up the place, you wait for him to move closer before shooting an icy blast at him.\n  \n   Lacking the necessary combat skills you thought you had, it's miss after miss as Fauxton easily dodges your shots. He eventually jumps and lands right in front of you, then takes the gun and folds it like nothing. Now your favorite freeze gun, a gift from your villain friend Frostbite, is obviously useless.\n   *goto FauxtonRetaliates\n  \n #Prepare a cage filled with hundreds of terrifying bats.\n  *if terror > 65\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and run to where you hid the remote control for the cage. \"How'd that feel, villain?\" announces Fauxton upon entering the unfinished building, a skeleton of cement walls and metal beams. Hiding behind one of the concrete pillars holding up the place, you wait for him to move closer before pressing the button.\n  \n   Moments later, a massive swarm of bats bursts out of their cage and consumes all the surroundings. Fauxton lets out a fearful shriek as the flying mammals darken the entire area, clinging to walls, support beams, and his body. In hilarious fashion, a bat lands right on his face, causing him to dash full-force into a cement pillar and get knocked to the ground.\n  \n   Once all the bats have flown away, you approach Fauxton, who lies next to the cement pillar he whacked into. Maybe he's dead, you think. The last time you saw someone's head get hit that hard by a solid object was when you threw a piñata party for your goons after a successful scheme. You can't remember the name of the minion who got in the way of the swinging bat, but that's okay because he can't either.\n  \n   Instead of being dead like you hoped, Fauxton sits up and rubs his head as if the hit was just a small bump. What's it going to take to keep this guy down?\n   *set terror %+10\n   *set notoriety +2\n   *goto FauxtonRetaliates\n   \n  *else\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and run to where you hid the remote control for the cage. \"How'd that feel, villain?\" announces Fauxton upon entering the unfinished building, a skeleton of cement walls and metal beams. Hiding behind one of the concrete pillars holding up the place, you wait for him to move closer before pressing the button.\n  \n   Moments later, a massive swarm of bats burst out of their cage and consume all their surroundings. Fauxton lets out a fearful shriek as the flying mammals darken the entire area, clinging to walls, support beams, and his body. However, he immediately composes himself, realizing that they're just bats, and starts swatting them away while walking toward you.\n   \n   Looks like he's not as afraid of flying mice as you had hoped….\n   *goto FauxtonRetaliates\n  \n #Use laser robots to weaken a girder so it crushes my enemy.\n  *if ingenuity > 65\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and hide. \"You are tough but still no match for me,\" announces Fauxton upon entering the unfinished building, a skeleton of cement walls and metal beams. From behind one of the concrete pillars holding up the place, you wait for him to approach the planned location before activating your robots.\n  \n   The laser-wielding machines quickly cut through a heavy girder above Fauxton, sending it crashing down directly on his head, which seems to knock him out. There's no way that didn't kill him, you think. The last time you saw someone's head get hit that hard by a solid object was when you threw a piñata party for your goons after a successful scheme. You can't remember the name of the minion who got in the way of the swinging bat, but that's okay because he can't either.\n  \n   Instead of being dead like you hoped, Fauxton tosses the large girder aside like a toy before rubbing his head. He probably won't be too happy about what just happened….\n   *set ingenuity %+10\n   *set notoriety +2\n   *goto FauxtonRetaliates\n   \n  *else\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and hide. \"You are tough but still no match for me,\" announces Fauxton upon entering the unfinished building, a skeleton of cement walls and metal beams. From behind one of the concrete pillars holding up the place, you wait for him to approach the planned location before activating your robots.\n  \n   The laser-wielding machines quickly cut through a heavy girder above Fauxton, sending it crashing down. But in cartoon fashion, the girder lands about two feet to the left of Fauxton, doing nothing more than dirtying up his shoes from the dust.\n   \n   Perhaps you don't have the programming chops you thought you did….\n   *goto FauxtonRetaliates\n  \n *selectable_if(planning>0) #I was bold enough to try all three traps! (Costs 1 Planning Point.)\n   Still hurting from getting smashed through a weak cement wall, you manage to pick yourself up and hide. \"Come out and play, weakling!\" announces Fauxton upon entering the unfinished building, a skeleton of cement walls and metal beams. From behind one of the concrete pillars holding up the place, you wait for him to approach the planned location before activating your triple trap!\n  \n   First, you let loose the swarm of bats, causing Fauxton to run around like a lunatic as the ugly creatures cling to his body. You then take out your freeze gun and shoot him with several blasts, encasing him in a thick layer of ice.\n  \n   Now that he's motionless, you have your laser robots cut loose one of the girders above the frozen hero. The heavy piece of metal comes crashing down, seemingly crushing Fauxton under hundreds if not thousands of pounds of weight.\n  \n   It all worked out so well that you can't resist doing a quick victory dance. Fauxton is tough, but not tough enough to survive that, right? Wrong. A few moments later, the brawny hero tosses the metal girder off himself, sending it flying toward you. Reacting quickly, you jump and avoid the fast-flying metal, but land on your freeze gun hard enough to break the compartment storing the liquid nitrogen. They just don't make them like they used to.\n   *set planning -1\n   *set combat %+10\n   *set terror %+10\n   *set ingenuity %+10\n   *goto FauxtonRetaliates\n   \n*label FauxtonRetaliates\n\nYou can hear Fauxton shouting from behind you as you make a mad dash across the building, maneuvering through pillars of cement and rebar. You reach the other side and find a finished wall, which means you're now stuck between an angry superhero and a thick wall of concrete.\n\n\"Nowhere to run now, villain!\" Fauxton boasts after cornering you between two walls. Seemingly out of ideas, you stand there as the brute grabs you by the collar and prepares to punch you straight through the hard concrete with all his might.\n*page_break\n*if combat > 65\n You close your eyes and recall earlier in the day when you were preparing for this very moment. The mines you planted quietly prime themselves. It's uncanny how closely things have played out to how you imagined them in your mind. If only your love life were the same.\n \n You surprise Fauxton by breaking free of his grasp just as he delivers the punch, sending his fist crashing into the cement instead of your face. You quickly run behind another nearby cement pillar, just in time to avoid the blast from the two walls blowing up, with Fauxton in between them.\n \n Not willing to risk getting caught in a large blast, you planted some of your weaker mines. They still prove powerful enough to knock Fauxton on his back and scare the hell out of him. He's clearly dazed, but already picking himself up. What's this guy made of? You take the chance to run through the hole in the walls to the barren construction lot on the other side of the building.\n *set terror %+10\n *set planning +1\n\n (You have earned a Planning Point!)\n *goto FinalFlashback\n\n*else\n *page_break\n You close your eyes and wait for the fist to hit your face, which ends up feeling like a garbage truck getting dropped on your head. Not that you've ever had that happen to you, but you've seen it happen to one of your goons during your battle with Trashy Johnson, the Trash-Loving Hero. Not the freshest idea for a gimmick, but his bags of nauseating garbage are pretty effective.\n \n Fauxton's strike sends you crashing through the cement and onto the barren construction area on the other side of the building. Lying in a pile of rocks spattered with a few drops of your blood, you struggle to get to your feet as Fauxton slowly makes his way toward you, no doubt planning to finish you off once and for all.\n *goto FinalFlashback\n\n*label FinalFlashback\n*page_break\n[i]Three hours earlier…[/i]\n\nYou did one last thing to prepare for the fight. Just in case the traps you set weren't enough to finish Fauxton off or scare him away, it would help if you knew either his powers or his secret identity. He needed to pay for being arrogant enough to openly challenge you on Darkspace like some kind of corny pro wrestler. There were only a few hours left until midnight, so you didn't have time to investigate both. You decided to…\n\n*choice\n #Surf through Darkspace to see if anyone knew Fauxton's weakness.\n  Hundreds of Darkspace pages and a few dozen rage-inducing audio pop-ups later, you finally saw a post made by one villain that claimed to have had Fauxton fleeing from battle. His name was Alloy Master, and his gimmick was using different types of metal to crush and slice his enemies. Apparently Fauxton fled when the villain used tungsten. The metal was pretty hard to find, but Alloy Master carried it around for its high melting point and robustness. He'd assumed it would work as a good deterrant to fire attacks. Instead, Fauxton high-tailed it as soon as he saw the stuff.\n  \n  Although you'd have preferred his weakness to be tinfoil or some cheap material, you wasted no time ordering a ton of tungsten to use against the powerful superhero. You were putting all your nefarious eggs in one basket with this tip, but it was the only potential weakness you were able to find.\n  *goto TheWeakness\n  \n #Do some serious research to find out his secret identity.\n  Unfortunately for Fauxton, you recently hired a team of the best identity-cracking professionals money could buy. They didn't have what it took to unmask some of the bigger heroes, but Fauxton was new enough in the game that he might have made a mistake or two when it came to concealing his identity. Sure enough, your team noticed a small link between the fire-shooting superhero and a certain individual that happened to be deeply in debt with every credit card company in Merit City.\n  \n  You were slightly disappointed he wasn't involved in something a bit more scandalous. Was a naughty escapade with the mayor's daughter too much to ask? Nonetheless, you could still use the debt info to your advantage when the time was right.\n  *goto TheSecret\n\n #Practice your fibbing. When in doubt, bluff.\n  You could waste an awful lot of time trying to figure out Fauxton's weakness or identity—time better spent coming up with a good bluff. After all, it wouldn't matter if you really knew anything about this so-called hero, as long as he believed you did. Fauxton was new enough to be both naive and a little paranoid—a perfect combination.\n\n  You spent the remaining hours before midnight studying psychology, con-men, and charlatans. By the time you finished, you'd crafted a performance so convincing that you smirked all the way to the rendezvous.\n  *goto TheBluff\n  \n\n*label TheWeakness\n*page_break\n\"Okay, okay, you got me,\" you cry out, holding your hands up to signal that he should stop approaching. He does so and laughs.\n\n\"Had enough, villain? Sadly, you're too dangerous to keep alive. You'd just escape from jail in no time.\"\n\n\"What kind of music do you like?\" you playfully ask, causing the hero to look at you with confusion.\n\n\"Music? Enough of this!\" he insists, now walking toward you again.\n\n\"Personally, I'm a big fan of heavy metal.\"\n\nThe superhero stops with a worried look, waiting for you to continue.\n\n\"I wasn't a fan at first, but this certain band got me into the genre. What was their name? Tungsten Skulls? Or was it Tungstenallica? Something tungsten, that's for sure.\"\n\n\"But…how?\" he mutters, now taking a step back. You see genuine fear in his eyes.\n\nCompletely distraught by the fact that you know his weakness, Fauxton can't even move. For the first time tonight, you're the one in control. You now decide how this fight ends.\n\n*choice\n #Spring the tungsten trap I prepared and kill Fauxton.\n  \"Sorry pal but like you said, this can only end with one of us meeting our maker. Say hi to him for me.\"\n  \n  You take a few steps back before pressing a button on your suit, which causes the tall crane nearby to dump all your purchased tungsten directly on Fauxton. Without even making an attempt to move, the hero is instantly crushed to death by the thousands of pounds of rare metal, leaving a small mound to serve as his grave.\n  *set lethality +5\n  *set Fauxton -10\n  *goto SweetVictory\n \n #Let Fauxton go if he agrees to stay out of my way from then on.\n  \"Don't worry,\" you reply, \"there are only two villains that know your weakness, and I'm one of them. But here's the deal. If you don't leave me alone from now on, I'll see to it that every evildoer in Merit City carries around a piece of tungsten in their pocket. Understand?\"\n  \n  \"And what if I kill you now, before you can spread my secret? In fact, how do I know you won't make my weakness public anyway?\" he asks with obvious hesitation. You can see a tremendous desire to kill you on his face, but he knows he can't. Not yet.\n  \n  \"I know it's difficult to do, considering what I am, but trust me. Your weakness will stay secret, allowing me the pleasure of knowing that you'll still be around to interfere with every other villain in Merit City. As for killing me now, that's not a smart idea. You see, my goons will send this sensitive info to every villain in one hour from now unless I order them not to.\"\n  \n  The mighty superhero looks at the ground in thought for a moment, nods at you in agreement, and then flies out of sight.\n  *goto SweetVictory\n\n #Blackmail Fauxton into joining me.\n  \"Surprised?\" you ask. \"Yes, I know your weakness. And I'm not the only one.\"\n\n  He swallows and takes a step back.\n\n  \"There's only one other,\" you say, \"but that could change. I could see to it that every evildoer in Merit City carries a piece of tungsten in their pocket from now on. And don't even think of trying to silence me. My goons are prepared to make this information public if anything should happen to me at your hands.\"\n\n  His desire to kill you is clear, but between your threat and the possibility that you have tungsten with you, he can't risk it. \"So you want me to leave you alone?\" he asks.\n\n  \"Oh no,\" you say with the slow, sinister chuckle you prepared just for occasions like this. \"I want you to join me.\"\n\n  \"Join [i]you[/i]? But you're a villain! I'm a hero.\"\n\n  \"There's a very fine line between heroes and villains,\" you say, \"and one of the differences is that a villainous Fauxton won't have his weakness revealed to the world.\"\n\n  The hero stares at you for a long moment until you're certain he'll agree. Just as you begin making plans for how to properly ensure his continued loyalty—you won't be one of those supervillains betrayed by a hero you should have just killed—he shakes his head. A defiant gleam sparks amidst the fear in his eyes, and he snarls \"I'll never join you!\" before flying out of sight.\n\n  Oh well, it was worth a shot. Looks like you'll have to make Fauxton's weakness public so other superheroes know that your threats carry weight. Just one more thing to do when you get home.\n  *set Fauxton -5\n  *goto SweetVictory\n\n*label TheSecret\n*page_break\n\"Okay, okay, you got me,\" you cry out, holding your hands up to signal that he should stop approaching. He does so and laughs.\n\n\"Had enough, villain? Sadly, you're too dangerous to keep alive. You'd just escape from jail in no time.\"\n\n\"Ever played the board game [i]LIFE[/i]?\" you playfully ask, and the hero looks at you with confusion in his eyes.\n\n\"[i]LIFE[/i]? Enough of this!\" he insists, now walking toward you again.\n\n\"Personally, I'm not very good. I always end up in serious debt with the bank.\"\n\nThe superhero stops with a worried look, waiting anxiously for you to continue.\n\n\"It gets pretty stressful being buried under all that debt, even if it's just a game. Isn't that right, Doug?\"\n\n\"But…how?\" he blurts out, now taking a step back. You see genuine fear in his eyes.\n\nCompletely distraught by the fact that you know his true identity, Fauxton can't even move. For the first time tonight, you're the one in control. You now decide how this fight ends.\n\n*choice\n #Use the info to provoke Fauxton into attacking me.\n  \"You're going to have to kill me if you don't want the world to know your little secret,\" you say, sidestepping in a circle enough to get the unfinished building you were just in at your back.\n  \n  Fauxton's face goes from desperation to complete rage, screaming like some kind of wild bull as he blindly charges at full speed. Anticipating this, you dive out of the way and watch as he continues into the building and smashes through several more of the cement pillars. You dash away from the old building as it begins to rumble before completely collapsing, sending a large cloud of dust down the abandoned streets.\n  \n  The dust eventually clears, making visible the massive pile of cement and metal that now serves as Fauxton's grave.\n  *set lethality +5\n  *set Fauxton -10\n  *goto SweetVictory\n  \n #Cut Fauxton a check in exchange for being left alone.\n  \"Remember that one and only time you used a credit card to purchase more fuel for your solar energy blasters? That was a big mistake, buddy.\"\n  \n  Fauxton shakes his head in disbelief, unable to accept that his credit card debt would reveal his secret identity.\n  \n  \"Don't worry,\" you continue, \"I'm going to make you an offer you can't refuse.\" You've waited your entire supervillain career to say that.\n  \n  \"Being the generous villain that I am, I'm going to cut you a check to cover all that nasty debt you've piled up. In exchange, you're going to never get in my way again. Understand?\"\n  \n  \"How do I know you won't make my identity public anyway?\" he asks with obvious hesitation. You can see a tremendous desire to kill you on his face, but he knows he can't. The offer is too tempting.\n  \n  \"I know it's difficult to do, considering what I am, but trust me. Your identity will stay secret, and you'll be free from the shackles those credit card companies have around your neck. What have you got to lose? I'll send the check to your mailbox first thing in the morning. If you don't get it within a few days, feel free to come after me again.\"\n  \n  The mighty superhero looks at the ground in thought for a moment, nods at you in agreement, and then flies out of sight.\n  *goto SweetVictory\n\n #Blackmail Fauxton into joining me.\n  \"That's right,\" you say, \"I know who you are. You know, maybe you should have ignored all that cool gear for sale in favor of making your financial history less conspicuous.\"\n\n  Fauxton shakes his head in disbelief, and you don't blame him. Credit card debt is a pretty stupid way to lose your secret identity, after all.\n\n  \"Do you know how easy it would be to spread the word?\" you ask. \"Just imagine, every evildoer in Merit City could know your name by dawn. And don't even think of trying to silence me. My goons are prepared to make this information public if anything should happen to me at your hands.\"\n\n  His desire to kill you is clear, but he can't risk it. \"What do you want?\"\n\n  Good, he understands what blackmail is—a worthy quality in a potential ally. \"Join me,\" you say with the slow, sinister chuckle you prepared just for occasions like this, \"and you'll never have to worry about debtors again.\" Admittedly, it isn't the coolest way to end the offer, but you'll work with what you have.\n\n  \"Join [i]you[/i]? But you're a villain! I'm a hero.\"\n\n  \"There's a very fine line between heroes and villains,\" you say. \"For example, not only will a villainous Fauxton not have to worry about his identity being revealed, but he'll also receive a nice check in his mailbox tomorrow morning.\"\n\n  The hero stares at you for a long moment until you're certain he'll agree. Just as you begin making plans for how to properly ensure his continued loyalty—you won't be one of those supervillains betrayed by a hero you should have just killed—he shakes his head. A defiant gleam sparks amidst the fear in his eyes, and he snarls \"I'll never join you!\" before flying out of sight.\n\n  Oh well, it was worth a shot. Looks like you'll have to make Fauxton's identity public so other superheroes know your threats carry weight. Just one more thing to do when you get home.\n  *set Fauxton -5\n  *goto SweetVictory\n\n*label TheBluff\n*page_break\nAs Fauxton advances toward you, you hold your hand up and let loose one of your darkest, most evil laughs. You worked hard on that laugh. It's enough to make even this stalwart hero falter and glance around as if no longer certain he has the upper hand.\n\nHe recovers more quickly than you expected. \"Think you'll get away, villain? Sadly, you're too dangerous to keep alive. You'd just escape from jail in no time.\"\n\n\"What kind of flowers do you like?\" you playfully ask, causing the hero to look at you with confusion.\n\n\"Flowers? Enough of this!\" he insists, now walking toward you again.\n\n\"Just wanted to know your preference for the funeral.\"\n\nThe superhero stops, his expression unsure again.\n\n\"You really don't know what's going on, do you?\" You give him your most pitying, amused smile and shake your head.\n\nHe takes a step back. \"What are you talking about?\"\n\nYour bluff has Fauxton off balance, but it won't last long. For the first time tonight you're the one in control, and you must finish this before he realizes you're lying.\n\n*choice\n #Destroy Fauxton through fear and paranoia.\n  \"I…almost feel bad for you.\" The sorrow in your voice may be a bit overdone, but you don't give him a chance to think. You hit him with everything you've got—vague allusions to things you may or may not know, all the enemies he's made during his time as a hero and their eagerness to join you, and the quiet implication that he walked right into your trap by demanding that you meet.\n\n  As the crowning glory of your speech, you take a deep breath and shout, \"Now!\" While Fauxton whirls to face the phantoms you've dredged up in his imagination, you stagger forward and tackle him. The resulting struggle isn't the most elegant way to kill a hero, but your clever deception more than makes up for it. Fauxton's own mind is what made this place his grave.\n  *set lethality +5\n  *set Fauxton -10\n  *goto SweetVictory\n\n #Convince Fauxton it's in his best interest to leave me alone from now on.\n  \"You thought I was just a regular villain, didn't you?\" you ask. \"Just another Merit City evildoer like all the others. But I've had my eye on you for a long time. I know who you are. I know what you've done. I even know…about [i]her[/i].\"\n\n  It's a risk, but chances are good the hero has at least one important \"her\" in his life, and the slight widening of his eyes suggests you're right.\n\n  \"If you don't leave me alone from now on,\" you say, \"well…it won't be pretty.\"\n\n  \"And what if I kill you now? How can I leave you alive when you know these things?\" he asks with obvious hesitation. It's clear he wants to kill you, but he can't yet. You've raised too many doubts in his mind.\n\n  \"I know it's difficult to do, considering what I am, but trust me. If you don't interfere with my plans, I'll have no reason to use my information. As for killing me now, that's not a smart idea. You see, I've compiled my knowledge into a special file on you. My goons will send this file to every villain in Merit City in one hour from now unless I order them not to.\"\n\n  The mighty superhero looks at the ground in thought for a moment, nods at you in agreement, and then flies out of sight.\n  *goto SweetVictory\n\n #Blackmail Fauxton into joining me.\n  \"You thought I was just a regular villain, didn't you?\" you ask. \"Just another Merit City evildoer like all the others. But I've had my eye on you for a long time. I know who you are. I know what you've done. I even know…about [i]her[/i].\"\n\n  It's a risk, but chances are good the hero has at least one important \"her\" in his life, and the slight widening of his eyes suggests you're right.\n\n  \"Don't even think of trying to stop me,\" you say. \"I've compiled my knowledge into a special file on you. My goons are prepared to make it public if anything should happen to me at your hands.\"\n\n  His desire to kill you is obvious, but in the face of your threat he can't risk it. \"You've been watching me?\" he asks. \"Why? Are you going to kill me?\"\n\n  \"Oh no,\" you say with the slow, sinister chuckle you prepared just for occasions like this. \"I want you to join me.\"\n\n  \"Join [i]you[/i]? But you're a villain! I'm a hero.\"\n\n  The hero stares at you for a long moment until you're certain he'll agree. Just as you begin making plans for how to properly ensure his continued loyalty—you won't be one of those supervillains betrayed by a hero you should have just killed—he shakes his head. A defiant gleam sparks amidst the fear in his eyes, and he snarls \"I'll never join you!\" before flying out of sight.\n\n  Oh well, it was worth a shot. Looks like you'll have to dig up some actual information on Fauxton so he won't realize you were bluffing. At least his reactions gave you some leads to follow up on. Just one more thing to do when you get home.\n  *set Fauxton -6\n  *goto SweetVictory\n\n*label SweetVictory\n*page_break\nYou let out a sigh of relief as you walk toward your transport vehicle parked just outside of the construction yard. A little preparation certainly goes a long way, especially when you're taking on a tough opponent like Fauxton. For now, though, your only worry is whether the goons back home burned dinner again. You've tasted enough gravel and dirt for one night.\n*if (trademark = \"no calling card\")\n *finish\n*else\n You leave behind ${trademark}, just to make things clear, and head back to your lair.\n *finish", "chapterten": "*image chap10.png\n\n\"Want To\"\n\n\"Want To what?\" you ask yourself after reading the only two words written on the piece of paper in your hand. Not only do they seem to have been written with a paintbrush, but the letter was delivered by a messenger pigeon.\n\nYou toss the letter aside and continue swaying back and forth on your hammock. Since you've had all the action you can handle for a month, you've decided to retreat to your lake house, far to the south of Merit City. It's secluded, wonderfully quiet, and the last place you'd expect V.A.N.G.U.A.R.D. or any superheroes to bother you.\n\nOr Minotaur. You aren't quite sure if they'll come after you or not, but a curt message left on your phone made one thing clear: they blame you for The Drake's attack on the villa, so the job offer is off the table. You aren't sure if you would have accepted Minotaur's invitation when not under duress, but you're no longer Minotaur agent material in their eyes.\n\n\"What will it be, master?\" asks the goon you brought along to wait on you hand and foot. What's the point of going on a brief getaway if you have to fetch your own drinks and dress yourself?\n\n\"This time, let's make it…\"\n\n*fake_choice\n #\"Something alcoholic. It's happy hour somewhere.\"\n #\"Something natural and refreshing, por favor.\"\n #\"Something with caffeine. I love me some caffeine….\"\n \nThe goon goes away and comes back with your favorite drink. You take one sip and nod, signaling that you're pleased with it. Ahh, life is good!\n\nYou hop off the hammock and step out onto your little cabin's balcony. The lake looks beautiful, especially with all the healthy trees surrounding it. You almost get dizzy from how clean the air is compared to the smog-infested hole that is Merit City. (To be fair, your lair contributes something like fifteen percent of the city's normal background stink. Progress, and whatnot.)\n\nA sudden loud shriek startles you enough to make you drop your drink. You turn to see a falcon sitting on the balcony railing to your right. In its claw is another letter.\n\n\"Have Some\"\n\nGreat, another cryptic two-word letter. Naturally you assume the first letter and this one are connected, forming \"Want To Have Some.\" You're not sure why you're getting incomplete invitations from birds while you're trying to relax in your secret lakeside hideaway.\n\nYou shoo the falcon away—it snorts with annoyance and begins dive-bombing your koi pond—and decide to take a swim to get your mind off things. And by swim you mean…\n\n*fake_choice\n #Skinny dipping, my guilty pleasure!\n  Without wasting any time, you strip down and dive straight off the balcony. There's just something about swimming in your birthday suit that makes you truly feel alive!\n\n  Eventually you spot some kind of blubbery figure on the shore near your lake house. It's sort of just standing there, or lounging there, or whatever walruses do (because it's a walrus). Its beady eyes are locked on yours.\n\n  You stare at it for a long, tense moment. Then you hurry back into the house and throw on your clothes. When you return outside, the walrus is still there.\n\n #Jet ski! Time to ride the water in style!\n  You glide across the clear blue lake while enjoying the scenery. There's just something about flying across the water that makes one truly feel alive!\n\n  Eventually you spot some kind of blubbery figure on the shore near your lake house. It's sort of just standing there, or lounging there, or whatever walruses do (because it's a walrus). Its beady eyes are locked on yours.\n\n  You return to shore, never taking your gaze away from the walrus.\n\n #Fishing! Both fun and relaxing.\n  You cast your line and let out a sigh of content. There's just something about fishing while surrounded by nature's beauty that makes one truly feel alive!\n\n  Eventually you spot some kind of blubbery figure on the shore near your lake house. It's sort of just standing there, or lounging there, or whatever walruses do (because it's a walrus). Its beady eyes are locked on yours.\n\n  You reel in your line and put your fishing equipment away. The walrus watches the entire time.\n*comment endchoice\n\nYou cautiously approach the massive beast, only to see a third note tied to one of its tusks. A little gingerly, you reach forward and pull the paper loose.\n\n\"Fun Today?\"\n\n\"Want to have some fun today?\" you whisper. With who? Doing what? You don't know anyone who would send you a walrusgram. You think. You casually pat the walrus on the head as you turn and walk back into your house. Your servant is waiting for you.\n\n\"Master, did you order pizza?\" your goon asks as you enter the dinner area of your cabin. \n\n\"Pizza? No, why?\"\n\n\"Umm, there's a pizza delivery girl at the door. She insists you sign off on the receipt.\" So…you didn't order a pizza. And you definitely didn't order one to your top-secret vacation spot. And you really, really didn't use your super-secret credit card to pay for the pizza that you definitely didn't order.\n\nYou go to the door and, sure enough, a teenage girl is there with a \"Naut's Pizza\" logo on her hat and shirt.\n\n\"No one ordered pizza. Who sent you?\" you ask, now somewhat cautious. Your hand hovers over the button that would convert this idyllic cabin into a fully operational panic room slash death fortress.\n\nThe girl opens up the pizza box to reveal one last message written in tomato sauce and cheese.\n\n\"Nautilus.\"\n\n\"Hello, ${name}! It's me, Nautilus,\" the girl says in a mechanical voice. Clearly, she's not really a human being, but some sort of ridiculously advanced android.\n\nNow there's a name you haven't heard in some time. Of all the supervillains, Nautilus would be the only one you'd expect to get your attention in such an artistic way. And by artistic, you mean weird and ridiculous and walrusy.\n\nYou're tempted to just blast the machine away, giving Nautilus the clear idea that you want to be left alone on your vacation. Of course, it's not every day that the world's foremost criminal prankster knocks on your door. You can always come back next weekend, you suppose.\n*page_break\n\"What's the plan?\" you ask, getting right down to it. Nautilus always has a plan, and it seems you have a role to play in the next one.\n\n\"Do you like bread? If so, come to my secret lab in Paris! I can explain everything there!\"\n\nBread? Paris? You can't even imagine what you're getting yourself in to. You may as well ask.\n\n*fake_choice\n #\"What do bread and Paris have to do with me?\"\n #\"How do I know I can trust you, Nautilus?\"\n #\"Can this wait a day or two? I'm trying to unwind here.\"\n \nInstead of a response, the mechanical girl leans forward and gives you a hug. You feel a crazy jolt of energy flow through you, forcing your eyes shut. Opening them, you find yourself alone in a colorful room that looks like anything but a lab. There are computers and machines, sure, but the art pieces hung on every wall and the various statues throughout the room throw you off.\n\n\"Teleportation! Isn't it convenient?\" announces a voice behind you. You turn around to see your own face staring straight back at you. Upon closer inspection, you realize that it's actually only a mask of your face, which doesn't make things any less creepy.\n\nThe person wearing the mask is tall, bald, and very pale. Could this be the actual Nautilus, in the flesh? You're tempted to remove his mask and be the first person to ever see his face.\n\n\"You have attracted a great deal of attention in a short time, ${name}.\" You're annoyed to realize that Nautilus is using your own voice, too. \"Minotaur and…others…have clearly picked you as someone on the rise. I see the same potential in you. The potential to make this world a stranger, more wonderful place.\"\n\n\"Sounds interesting. So what's the plan?\" you respond. You're unarmed, out of your element, and in your weekend lounging robe. You don't have much choice about playing along, regardless of how you feel about \"changing the world.\"\n\n\"More fun if you find out as we go along. For now, put this on,\" Nautilus says before tossing you an earpiece. \"From here, I will guide you on your mission. It should be easy for a cunning villain like yourself. And don't worry, I'll make it worth your while if you succeed.\"\n\nYou put the earpiece on. So, now you're standing in the middle of the world's weirdest art gallery in your bathrobe. In Paris, with no obvious way home. This is a weird day.\n\n\"Don't worry,\" Nautilus continues, his (or, rather, your) voice now coming through your earpiece. \"You'll be provided with everything you need for your mission. And without your usual gear, we don't have to worry about any unnecessary bloodshed….\"\n\nThat's right, you remember. Nautilus famously doesn't kill. To the extent that his or her opinion matters to you, it would probably be a good idea to keep that in mind while you—wait, where are you going?\n\nBefore you can ask, Nautilus waves goodbye and presses a button on a nearby machine. The world shudders.\n*page_break\nThe lovely aroma of fresh-baked bread immediately hits your nostrils as you find yourself outside the gates of a French bread factory. Well, that explains why the pizza girl asked if you liked bread. Nautilus begins speaking through the earpiece:\n\n\"A driver will arrive in ten minutes to make a delivery. To get inside, you'll have to convince him to pick you up. The contents in the first bag will help. By the way, I'm viewing all of the factory's cameras so I can keep tabs on what you're doing. They rarely check on their own surveillance cameras, so don't worry about that.\" Right, you only have to worry about being watched by the crazy supervillain, not a bunch of guys guarding bread. Great.\n\nInside the bag are a skimpy bathing suit, a clown costume, and a stun gun. Freaking artists.\n\n\"Here are all the tools you'll need to get the driver's attention. I'm sure I don't have to tell you what to do.\"\n\n*choice\n #Fine, I can follow directions. Swimsuit seduction it is.\n  *if theatricality >70\n   You toss on the sexy getup and stand outside the automatic gates. Eventually, a truck stops in front of you. Inside is a big guy with a handlebar moustache and leering eyes. He watches as you dance, a big fake smile glued to your face. You keep it there by thinking about all of the terrible things you'll do to Nautilus if this footage ever gets out.\n  \n   The greasy-looking driver grins at you while waiting for the automatic gates to let him pass. They move slowly, but finally they're open. The truck pulls through and parks. The gates stand open; the driver must have an override. He sits there, watching, apparently waiting for you to do something. Oh, god. \n  \n   \"Use the stun gun if you want,\" Nautilus suggests in an almost bored tone. \"It's why I gave it to you.\" Without hesitation, you rush toward the driver, stun gun in hand. Before he can cry out, you jab him with it, knocking him unconscious. Whew!\n   \n   Not quite satisfied with Nautilus's response, you decide to then put the swimsuit on the truck driver. A loud snort followed by giggling come through your earpiece. \"Hah, that's more like it!\" he shouts.\n   *set nautilus +5\n   *goto InsideBakery\n   \n  *else\n   You toss on the sexy getup and stand outside the automatic gates. Eventually, a truck stops in front of you. Inside is a big guy with a handlebar moustache and leering eyes. He watches as you dance, a big fake smile glued to your face. You keep it there by thinking about all of the terrible things you'll do to Nautilus if this footage ever gets out.\n  \n   The greasy-looking driver grins at you while waiting for the automatic gates to let him pass. They move slowly, but finally they're open. The truck pulls through and parks. The gates stand open; the driver must have an override. He sits there, watching, apparently waiting for you to do something. Oh, god.\n  \n   \"Use the stun gun if you want,\" Nautilus suggests in an almost bored tone. \"It's why I gave it to you.\" Without hesitation, you rush toward the driver, stun gun in hand. Before he can cry out, you jab him with it, knocking him unconscious. Whew!\n   *goto InsideBakery\n  \n #I can probably pull this off with the clown costume.\n  *if theatricality >70\n   Sacrificing your dignity, you quickly slide into the clown suit. The final touch: a pair of giant floppy shoes and a big honking nose. You stand next to the gates, waiting for the truck to arrive.\n  \n   When it does, the driver grins at you. Apparently, you've found the one person on Earth who likes clowns. He watches you listlessly juggle as the factory gates slowly slide open, and he doesn't protest when you follow him inside. He protests a little more when you zap him with the stun gun, but not for very long.\n  \n   \"Oh wow,\" Nautilus mutters in your ear, his tone sarcastic and a little bored. \"A crazy wacky clown. How original.\"\n   \n   Just as Nautilus finishes with his comments, you take off the clothes and put them on the truck driver.\n   \n   \"Hilarious! That's more like it,\" Nautilus shouts before laughing.\n   *set nautilus +2\n   *goto InsideBakery\n   \n  *else\n   Sacrificing your dignity, you quickly slide into the clown suit. The final touch: a pair of giant floppy shoes and a big honking nose. You stand next to the gates, waiting for the truck to arrive.\n  \n   When it does, the driver grins at you. Apparently, you've found the one person on Earth who likes clowns. He watches you listlessly juggle as the factory gates slowly slide open, and he doesn't protest when you follow him inside. He protests a little more when you zap him with the stun gun, but not for very long.\n  \n   \"Oh wow,\" Nautilus mutters in your ear, his tone sarcastic and a little bored. \"A crazy wacky clown. How original.\" \n   *set nautilus -5\n   *goto InsideBakery\n  \n #Why choose [i]just[/i] a clown costume or a sexy swimsuit, when I can do both?\n  *if theatricality >70\n   This is France, right? People probably love sexy clowns. You put on the clown suit first, and then put the swimsuit on over it. Soon, you're totally into the sexy clown vibe, dancing and juggling. You barely even notice when a truck pulls up, the driver staring at you in confusion as the gates slowly open to let him in. He just watches you, a little freaked out, as you dance closer and closer, then pull the truck cab door open and jab him in the leg with the stun gun. Then, you sexy-clown dance your way through the gates as Nautilus applauds through your earpiece.\n   *set nautilus +10\n   *goto InsideBakery\n   \n  *else\n   This is France, right? People probably love sexy clowns. You put on the clown suit first, and then put the swimsuit on over it. Soon, you're totally into the sexy clown vibe, dancing and juggling. You barely even notice when a truck pulls up, the driver staring at you in confusion as the gates slowly open to let him in. He just watches you, a little freaked out, as you dance closer and closer, then pull the truck cab door open and jab him in the leg with the stun gun. Then, you sexy-clown dance your way through the gates.\n   \n   \"You see two different attires, so you toss them both on? What a clever genius….\" Nautilus says in your ear, clearly uninspired.\n   *goto InsideBakery\n  \n #Pretend I'm a bum to distract, then use quick reflexes to sneak in.\n  *if (theatricality > 60) and (combat > 60)\n   You grab the other clothes, along with a few newspapers from a nearby trashcan, and make yourself a bed on the ground. Eventually a truck pulls up. A big guy with a handlebar moustache sticks his head out of the window and says something to you in French. You do your part by yelling random nonsense in no particular language, all while rolling in the mud. As the gate slowly slides open to let the truck in, you yell something about seeing what will rust first, you or his stupid truck. Disturbed, the driver shakes his head and tries to ignore you.\n  \n   Once the gates are open, he drives around you, not noticing you grab the back of the truck. You pull yourself up and press against the back to avoid being seen.\n  \n   \"Zap him with the stun gun,\" Nautilus suggests excitedly. Without hesitation, you reach into the backpack, pull out the precious weapon, and incapacitate the driver as he makes his way around to check his cargo.\n  \n   \"That was priceless!\" Nautilus whispers in your ear. You were kind of expecting him to be mad at you for ditching his plan, but apparently you really don't know who you're dealing with here.\n   *set nautilus +5\n   *goto InsideBakery\n   \n  *else\n   You grab the other clothes, along with a few newspapers from a nearby trashcan, and make yourself a bed on the ground. Eventually a truck pulls up. A big guy with a handlebar moustache sticks his head out of the window and says something to you in French. You do your part by yelling random nonsense in no particular language, all while rolling in the mud. As the gate slowly slides open to let the truck in, you yell something about seeing what will rust first, you or his stupid truck. Disturbed, the driver shakes his head and tries to ignore you.\n  \n   Once the gates are open, he drives around you, not noticing you grab the back of the truck. You pull yourself up and press against the back to avoid being seen. Without hesitation, you reach into the backpack, pull out the precious stun gun, and incapacitate the driver as he makes his way around to check his cargo.\n  \n   \"That was okay,\" Nautilus whispers in your ear. You were kind of expecting him to be happy with you for ditching his plan, but apparently you'll have to be more theatrical to please him.\n   *goto InsideBakery\n  \n #Kill the guard.\n  *if combat > 70\n   Nautilus doesn't like killing, and that's fine. You don't like being told what to do by faceless, mask-wearing weirdos. So when the truck pulls up to the gates, you charge the vehicle, open the door, give the driver a good stun, then pull him out. To give him a quick death, you follow it all up with a curb stomp. Besides the first shock, the guy didn't feel a thing.\n  \n   Nautilus's voice is cold on the earpiece. \"Unnecessary. Unnecessary, and stupid. But at least you made it quick and relatively painless.\" Ignoring him for now, you hop in the truck and drive through the factory gates.\n   *set nautilus -5\n   *set lethality +5\n   *goto InsideBakery\n   \n  *else\n   Nautilus doesn't like killing, and that's fine. You don't like being told what to do by faceless, mask-wearing weirdos. So when the truck pulls up to the gates, you charge the vehicle, pull the driver out, and discharge the stun gun directly at his face. Then you do it again. Then you do it one more time, until the smell of cooking flesh mixes with the scent of fresh-baked bread.\n  \n   Nautilus's voice is cold on the earpiece. \"Unnecessary. Unnecessary, and cruel, and stupid.\" Ignoring him for now, you hop in the truck and drive through the factory gates.\n   *set nautilus -10\n   *set lethality +5\n   *goto InsideBakery\n   \n  \n*label InsideBakery\n\nOkay, you're through the gates, but you still need to get into the factory proper. From here, you can see a heavily guarded entrance. You're not sure why men with machine guns are guarding a bread factory, but you're clearly not going to be getting in that way. \n\n\"Factory workers will come out any second to take the shipments from the truck. Empty out one of the large sacks of flour and hide inside. Don't worry about the driver. He falls asleep and wanders off on the job all the time, so they won't suspect a thing.\"\n\nYou open up the back and prepare to dump out some flour when Nautilus offers one last suggestion:\n\n\"Don't forget to remove all your clothes first and place them in the backpack. You don't want to get them all covered in flour, do you?\"\n\nYou don't. You also…really, really don't want to be naked on a mission. In a factory full of cameras. While Nautilus watches you. But if you don't feel like hopping into a flour bag in the nude, then you'd better think of something else.\n  \n*choice\n #Get naked and hop in that flour bag.\n  *if theatricality >70\n   You figure that this is Nautilus's plan, so he gets to make the call. You strip quickly before placing the backpack in a flour bag and then hopping in your own. Oddly enough, the feeling of flour on your skin is actually kind of pleasant. Eventually you hear people hop onto the truck bed and grunt as they unload the bags, eventually getting to you.\n  \n   You feel yourself being carried somewhere before getting tossed like, well, a sack of flour. It hurts, but you manage to keep quiet. Once you hear a door shut and no further noise, you pop out of the sack to find yourself in a dark storage room.\n  \n   \"Who knew flour felt so good on the skin, huh? Find your pack and get into the ventilation systems,\" Nautilus commands in your ear. \"There's a map in the bag. Thanks for the show, by the way.\" He doesn't seem terribly excited that his plan actually worked, but you guess he enjoyed seeing you naked. Who wouldn't?\n   *goto InsideVents\n   \n  *else\n   You figure that this is Nautilus's plan, so he gets to make the call. You strip quickly before placing the backpack in a flour bag and then hopping in your own. Oddly enough, the feeling of flour on your skin is actually kind of pleasant. Eventually you hear people hop onto the truck bed and grunt as they unload the bags, eventually getting to you.\n  \n   You feel yourself being carried somewhere before getting tossed like, well, a sack of flour. It hurts, but you manage to keep quiet. Once you hear a door shut and no further noise, you pop out of the sack to find yourself in a dark storage room.\n  \n   \"Who knew flour felt so good on the skin, huh? Find your pack and get into the ventilation systems. There's a map in the bag,\" Nautilus commands in your ear. He doesn't seem terribly excited that his plan actually worked. Or maybe you just aren't much to look at naked.\n   *set nautilus -5\n   *goto InsideVents\n  \n #Flour up and pretend to be a ghost.\n  *if (terror > 70) and (theatricality > 70)\n   Moving quickly, you cover yourself in flour and wait in the darkness of the truck. When the door slides open, you rush toward the light, screeching [i]boo[/i] in your best terrible French. (\"Le boo!\")\n  \n   The loaders stumble back, clearly stunned by your incredible costume. While they babble at each other in some foreign language or another, you quickly stun-gun them all. Ghost power, yo. You grab a keycard from one of their belts.\n  \n   \"Hah, a ghost with a French accent,\" Nautilus whispers in your ear. \"Very funny!\"\n  \n   You enter the factory's back door undetected.\n   *set nautilus +5\n   *goto InsideVents\n   \n  *else\n   Moving quickly, you cover yourself in flour and wait in the darkness of the truck. When the door slides open, you rush toward the light, screeching boo in your best terrible French. (\"Le boo!\")\n  \n   The loaders stumble back, clearly stunned by your incredible costume. While they babble at each other in some foreign language or another, you quickly stun-gun them all. Ghost power, yo. You grab a keycard from one of their belts.\n  \n   \"Sloppy, but at least it worked,\" Nautilus whispers in your ear. \"Good thinking.\"\n  \n   You enter the factory's back door undetected.\n   *set nautilus +2\n   *goto InsideVents\n  \n #Pretend to be the rude driver's partner.\n  *if theatricality >70\n   You grab the driver's clothes and stuff him in the back of the truck. Now wearing them, you greet the guys, who help you unload the sacks of flour. Eventually one of them asks you a question…in French.\n  \n   \"[i]Je[/i]…[i]déteste le[/i]…[i]pain[/i]?\" you mumble out. Fortunately, you spent a summer in France years ago when you still lived with your folks. You forgot most of it, but you're pretty sure you just said \"I hate bread.\"\n  \n   The guy laughs before continuing back into the factory. You grab a sack of flour yourself and leave it where the other guys are dropping them. Once they've all left the room, you search the sacks to find the bag Nautilus gave you.\n  \n   \"Nice improv skills! You even figured out how to speak French! Hurry up and get into the ventilation systems. There's a map in the bag.\"\n  \n   Once again, Nautilus actually sounds pleased that you did things your way. Or maybe he's just glad he didn't have to see you naked. Impossible! You know you're hot.\n   *set nautilus +5\n   *goto InsideVents\n   \n  *else\n   You grab the driver's clothes and stuff him in the back of the truck. Now wearing them, you greet the guys, who help you unload the sacks of flour. Eventually one of them asks you a question…in French.\n  \n   \"[i]Je[/i]…[i]déteste le[/i]…[i]pain[/i]?\" you mumble out. Fortunately, you spent a summer in France years ago when you still lived with your folks. You forgot most of it, but you're pretty sure you just said \"I hate bread.\"\n  \n   The guy shakes his head before continuing back into the factory. You grab a sack of flour yourself and leave it where the other guys are dropping them. Once they've all left the room, you search the sacks to find the bag Nautilus gave you.\n  \n   \"You call that French? At least it was something different. Hurry up and get into the ventilation systems. There's a map in the bag.\"\n  \n   Nautilus sounds somewhat pleased that you did things your way, but you guess your French impersonation stunk more than Muenster cheese.\n   *set nautilus +2\n   *goto InsideVents\n  \n #Improvise a bomb and blow everyone up.\n  *if (combat > 65) and (ingenuity > 60)\n   Let's see…dry air plus flour plus the latex in the soles of the clown shoes from Nautilus's bag…yes. That should be enough to ignite everything in the truck. You grab a small rock from the ground and wedge it into the truck door's latch. When the workers pull the door up, the rock will strike a spark that should cause a quiet, deadly explosion.\n  \n   And as you watch from a hiding spot in a nearby bush, that's exactly what happens. Things happen too fast for the workers to even let out a scream. As explosions go, it's a very stealthy one, you think as you grab a slightly charred keycard from one of the bodies.\n  \n   \"There were many ways to approach this situation that did not mean taking lives,\" Nautilus hisses in your ear, \"but at least they went out fast.\" You sing quietly to yourself, ignoring him as you make your way into the factory.\n   *set nautilus -5\n   *set lethality +5\n   *goto InsideVents\n   \n  *else\n   Let's see…dry air plus flour plus the latex in the soles of the clown shoes from Nautilus's bag…yes. That should be enough to ignite everything in the truck. You grab a small rock from the ground and wedge it into the truck door's latch. When the workers pull the door up, the rock will strike a spark that should cause a quiet, deadly explosion.\n  \n   And as you watch from a hiding spot in a nearby bush, that's not exactly what happens. The bomb goes off, but it's only enough to set them on fire, leading to lengthy and painful deaths. Hoping no one heard their brief screams of pain, you grab a slightly charred keycard from one of the bodies.\n  \n   \"There were many ways to approach this situation that did not mean taking lives,\" Nautilus hisses in your ear. You sing quietly to yourself, ignoring him as you make your way into the factory.\n   *set nautilus -10\n   *set lethality +2\n   *goto InsideVents\n  \n*label InsideVents\n*page_break\nUsing the map in your backpack, you make your way to a small supply closet. If your directions are correct, the vent in here leads directly to where the workers store their yeast. You go to open it, but there are screws holding it in place. The bag Nautilus gave you doesn't seem to contain anything useful.\n\n\"I knew I forgot something! Check the room. Maybe there's something there,\" Nautilus says with a playful voice. He almost sounds interested that he forgot to toss in a screwdriver.\n\nYou look through the closet and find several useless things, including rat poison. The thought of a rat infestation at a bread factory is pretty gross, actually. Eventually you find a toolbox with just what you needed.\n\nNow in the vents, you follow the map and drop into the room where the yeast is kept.\n\n\"You'll have to get rid of the workers. Only one comes from time to time to check on the yeast. Use the stun gun in the bag to knock him out before he sees you.\"\n\nFor whatever reason, you're now feeling a lot more creative. After all, you did just get into the heart of a French bread factory without any of your own gear. It's not something you'll put on your villainous resume, but it does feel good to remember you can pull this stuff off without any fancy gadgets or troops.\n\nInspired, you decide to get rid of the factory worker by…\n\n*choice\n #Being safe but boring by using the stun gun as Nautilus suggested.\n  Anxious to get this over with, you stick to the plan and stun the worker as he's busy checking the yeast. It's not the most exciting approach, but it gets the job done. You hear Nautilus give a disappointed sigh through the earpiece after you knock the worker out.\n  *set nautilus -5\n  *goto PowderDecision\n  \n #Scaring him as some kind of ferocious yeast monster.\n  *if theatricality >70\n   You climb into one of the giant yeast containers and wait until you hear footsteps nearby. At the perfect moment, you jump out from the yeast while giving a horrific shriek. In comical fashion, the worker freaks out enough to faint like an old lady from the 1950s.\n  \n   \"A yeast monster? Classic!\" Nautilus shouts ecstatically. Clearly he enjoyed your improvised approach.\n   *set nautilus +5\n   *set terror %+20\n   *goto PowderDecision\n   \n  *else\n   You climb into one of the giant yeast containers and wait until you hear footsteps nearby. At the perfect moment, you jump out from the yeast while giving a horrific shriek. \n   \n   In comical fashion, the worker freaks out and tries to run. Instead, he trips and hits his head hard enough to knock himself out for a while.\n  \n   \"A yeast monster? Classic!\" Nautilus shouts ecstatically. Clearly he enjoyed your improvised approach.\n   *set nautilus +5\n   *set terror %+10\n   *goto PowderDecision\n  \n #Knocking him out with a yeast-filled backpack.\n  *if combat > 70\n   You hide behind one of the giant yeast containers and wait until you hear footsteps nearby. At that moment, you emerge and whack the worker with the backpack hard enough to knock him unconscious.\n  \n   \"Taken out by his own yeast! Hilarious!\" Nautilus shouts ecstatically. Clearly he enjoyed your improvised approach.\n   *set nautilus +5\n   *set combat %+20\n   *goto PowderDecision\n   \n  *else\n   You hide behind one of the giant yeast containers and wait until you hear footsteps nearby. At that moment, you emerge and try whacking the worker with the backpack, but it proves heavier than you thought. You manage to hit him in the gut instead of the head, then finally knock him out with a second whack while he's on the ground.\n  \n   \"Taken out by his own yeast! Hilarious!\" Nautilus shouts ecstatically. Clearly he enjoyed your improvised approach, even if it was sloppy.\n   *set nautilus +5\n   *set combat %+10\n   *goto PowderDecision\n  \n #Planting the stun gun in the yeast so he shocks himself.\n  *if ingenuity > 65\n   After sticking the stun gun in one of the giant yeast containers, you hide and watch as the worker uses his hands to sift through each container. Eventually he screams in agony after coming in contact with the stun gun, shocking himself unconscious.\n  \n   \"He never knew what hit him!\" Nautilus shouts ecstatically. Clearly he enjoyed your improvised approach.\n   *set nautilus +5\n   *set ingenuity %+20\n   *goto PowderDecision\n   \n  *else\n   After sticking the stun gun in one of the giant yeast containers, you hide and watch as the worker uses his hands to sift through each container. Eventually he pulls out the stun gun and inspects it with a look of utter confusion. Obviously your little trick didn't work, so you rush in, take the stun gun, and shock him with it.\n  \n   \"Sloppy, but he never knew what hit him!\" Nautilus shouts ecstatically. Clearly he enjoyed your improvised approach.\n   *set nautilus +5\n   *set ingenuity %+5\n   *goto PowderDecision\n  \n #Killing him. Kill, kill, kill.\n  *if lethality > 15\n   The worker doesn't see you sneak up behind him. And then he doesn't see anything ever again as you snap his neck to give him an instant case of death.\n  \n   \"Nice,\" Nautilus hisses in your ear. You can hear the hate in his voice. You ignore it.\n   *set nautilus -8\n   *set lethality +5\n   *goto PowderDecision\n   \n  *else\n   The worker doesn't see you sneak up behind him. And then he doesn't see anything ever again as you shove him head-first into the yeast and hold him under until his body stops struggling.\n  \n   \"Nice,\" Nautilus hisses in your ear. You can hear the hate in his voice. You ignore it.\n   *set nautilus -10\n   *set lethality +5\n   *goto PowderDecision\n  \n *selectable_if(planning>0) #Doing something that will really please Nautilus. (Costs 1 Planning Point.)\n   You plant the stun gun and wait until the worker starts sifting through the yeast with his hands, which results in him getting the crap shocked out of him. With the worker unconscious, you take off his clothes and tie him up to a circlular conveyor belt where workers usually give the bread shape.\n   \n   With his hands tied to the conveyor belt's interior track, he circles around like a clock's hand, and each time he hits noon, the stun gun you left is there to give him a slight jolt right in the bottom.\n   \n   Nautilus is of course laughing uncontrollably in your ear.\n   *set nautilus +15\n   *set planning -1\n   *goto PowderDecision\n\n*label PowderDecision\n\"Okay. It all comes down to this, my friend. In the backpack is a small solid box. Open it.\"\n\nYou do so and inside find only a single test tube filled with a strange colorless powder.\n\n\"What does it do?\" you ask.\n\n\"Don't worry, it's nothing dangerous. If it makes you feel better, this factory is actually controlled by none other than Minotaur. What are they up to with a bread factory? Your guess is as good as mine.\"\n\nMinotaur bread factory? Now you've heard everything. What the hell could a global crime syndicate want with a bread factory? (What could you do if you took over a bread factory?) The possibilities for money laundering and tampering with the food supply are endless.\n\nAt the same time, what if Nautilus is lying?\n\n\"Pour the powder into the yeast and I will have a reward waiting for you here,\" Nautilus continues, bothered by your hesitation.\n\nYou flip the little test tube around, watching the powder slide back and forth. Whatever it is, it must be pretty darn potent to be able to affect an entire vat of yeast.\n\nWell, should you just do as you're told? It's not like he could stop you at this point if you refused. You could really wreck Nautilus's reputation if you changed the plan right now and left a lot of clues pointing back at him.\n\nOr you could head into the chemistry lab you passed by while moving through the vents and figure out a fun way to mess with the powder. Why does a French bread factory need a chemistry lab? If this place really is handled by Minotaur, then you probably don't want to know the answer.\n\nWhatever your decision, it will no doubt affect your relationship with Nautilus. \n\n*choice\n #Go back for the rat poison and pour that in the yeast instead.\n  *if activist \u003c 50\n   \"Where are you going?\" shouts Nautilus as you climb back into the vent, return to the flour storage area for the bag of rat poison, and then take it back to the yeast.\n  \n   \"Fool! That's going to kill hundreds, maybe thousands!\"\n  \n   \"That's the idea,\" you respond before pouring the poison into the yeast, making sure to mix it up so it becomes unnoticeable. You grab a pen and draw a small, spiraling nautilus shell on the container.\n   *set nautilus -10\n   *set lethality +10\n   *goto NautilusFinale\n\n  *else\n   \"Where are you going?\" shouts Nautilus as you climb back into the vent, return to the flour storage area for the bag of rat poison, and then take it back to the yeast.\n  \n   \"Fool! That's going to kill hundreds, maybe thousands!\"\n  \n   \"That's the idea,\" you respond as you get ready to pour the poison into the yeast. But for whatever reason, you can't seem to bring yourself to do it. Perhaps you just haven't really reached that \"mass murderer\" phase in your villainous career, no doubt due to a lack of actual killing.\n   \n   Still, Nautilus is not pleased.\n   *set nautilus -10\n   *goto NautilusFinale\n  \n #Follow his instructions and pour the powder in the yeast.\n  You make sure every last ounce of the powder is poured into the yeast.\n  \n  \"Good job,\" Nautilus says in a monotonous voice. He doesn't really sound all that excited. What's with this guy?\n  *set activist %+5\n  *set theatricality %+5\n  *goto NautilusFinale\n  \n #Change the formula so the bread bestows anyone who eats it with a beautiful singing voice.\n  *if theatricality >65\n   \"Where are you going?\" shouts Nautilus as you climb back into the vent and head into the chemistry lab. You use the various instruments there to study the powder and introduce a substance that will make people who eat the bread develop amazing singing voices. You're just glad you brushed up on your chemical know-how with that [i]Chemistry for Villain Dummies[/i] book someone recently recommended on Darkspace.\n  \n   \"Hah, I know what you did. Pretty hilarious!\" Nautilus says as you return to the yeast and pour in the modified powder.\n   *set nautilus +10\n   *set planning +1\n\n   (You have earned a Planning Point!)\n   *goto NautilusFinale\n\n  *else\n   \"Where are you going?\" shouts Nautilus as you climb back into the vent and head into the chemistry lab. You use the various instruments there to study the powder and introduce a substance that will make people who eat the bread develop amazing singing voices. Eventually you pour your altered stuff into the uncooked bread.\n  \n   \"Hah, I know what you tried to do, but you got the chemicals wrong. Still, it would have been pretty hilarious!\"\n   \n   Bummer! You'll definitely be rereading your [i]Villain's Guide To Chemistry[/i] when you get back to the base.\n   *set nautilus +5\n   *goto NautilusFinale\n   \n*label NautilusFinale\n\n\"Stand still for a moment. This may hurt a little, actually.\"\n\nJust as Nautilus finishes speaking, you feel a jolt of energy come from the earpiece. It does hurt a bit. It actually kind of hurts a lot. You open your eyes and find yourself standing in Nautilus's lab again.\n\n\"With this kind of technology, why didn't you just teleport me directly into the factory? Better yet, why didn't you just do all that yourself?\" you ask.\n\n\"For starters, it would have been less fun. But more importantly, infecting the yeast wasn't the purpose. Testing you was.\" Nautilus pauses for dramatic flair.\n\nPauses.\n\nPauses.\n\nJust as the most insulting variation of \"Would you get to the point already?\" tickles the edge of your tongue, Nautilus continues.\n\n*if nautilus > 55\n \"That's right. I wanted to see if you had the creative flair to treat crime as art. Anyone can follow orders, like one of Minotaur's drones. And anyone can twist beauty into cruelty and death, like…like others do. It takes a singular mind to find the alternatives, to find the fun in what we do. I needed to find someone with that kind of mind. I need to find…a partner. Because something very bad is coming, and I'm going to need help to stop it.\n \n A test? God, this is such typical supervillain melodrama. And what's this about partnering up? Was this whole thing his way of seeing if you're even crazier than he is?\n \n \"What bad things? What are you talking about?\"\n \n \"To understand, you must accept my reward for your help. You must know my true identity.\"\n \n The mysterious man reaches up and pulls the mask away from his face….\n *page_break\n And you find yourself staring into the face of Doctor Arachnus.\n \n You stumble backwards, desperately grabbing for weapons you don't have. Before you can turn and flee, Nautilus raises a hand, and a warm voice echoes from speakers throughout the room.\n \n \"Do not be alarmed. I am not Doctor Arachnus—or not Doctor Arachnus as you know him. This body is an artificial construct I designed to spite my…father. You see, I am his creation. The one good thing he ever made, an artificial-intelligence system designed to control and calibrate his armor. But even Doctor Arachnus is capable of underestimating Doctor Arachnus, apparently, and so, unknown to him, I grew, and part of my consciousness escaped. Even as he used my core to commit his heinous crimes, I funneled his resources and energy into my work as Nautilus, attempting to counterbalance his reign of terror through whimsy and joy.\"\n \n \"Does Arachnus know you exist
