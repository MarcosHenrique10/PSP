 day. The air heats up briefly, then cools down.\"\n\n  Dr Taube folds his arms and stares at the sink.\n  *goto end_week\n\n*elseif (haunting = 3)\n  The doctor spreads his arms and gestures at the floor. \"I record disturbances in the powder. Not footprints. Smaller disruptions in certain trails. They run everywhere: from door to door, behind and even underneath furniture. The effect seems to happen in a single burst. I will observe an undisturbed room, then return thirty seconds later to see fourteen or fifteen distinct trails.\"\n\n  You ask what this implies.\n\n  \"I don't know.\" He taps his teeth with a pen. \"But the phenomenon always coincides with a sudden drop in temperature.\"\n\n  He stares at his thermometers.\n\n  *goto end_week\n\n*else \n  *comment FURTHER HAUNTINGS HERE ======================================\n\n*comment #################################################################\n*label end_week\nYou think even The Crocodile may have burned through her fury by now, and be wondering why you are not in the office. You say goodbye to the doctor. \n\n\"One moment,\" he says. \"Some of these readings indicate a build-up of phantasmal activity within the house over time. I can't say what is causing it. Possibly its residents. Quite probably, your own actions. The energy levels look\n*if (activity > 30)\n  extremely hazardous.\n  *goto grunt_detector  \n*elseif (activity > 25)\n  dangerous.\n  *goto grunt_detector  \n*elseif (activity > 20)\n  significant.\n  *goto grunt_detector  \n*elseif (activity > 15)\n  a little worrying.\n  *goto grunt_detector  \n*else\n  relatively safe for now. But\n  *goto grunt_detector  \n\n*label grunt_detector\nI suggest you refrain from any behaviour which might stimulate this phantasmal activity. And before you ask, I have no idea what that might be. But if you allow the energy to get out of control, the entire building might be consumed.\" \n\nHe grunts and turns back to a detector without looking at you.\n\n*page_break\n\nA few days pass. You can't help but notice that ${rival} is looking relaxed. $!{He} stretches out at ${his} desk to take calls instead of ${his} usual newsreader pose; ${he} treats the juniors with something less than hostility; and one time, while you pass by on the hunt for coffee, you notice ${he} has ${his} shoes off under ${his} desk. Something is clearly going right for ${him} and that means something is going wrong for you.\n\nThe phone rings. It's Dr Taube. \"I would like your assistance in an experiment,\" he says. \"I have called in a colleague for a…well, a rather unorthodox session. We need somebody who has a little history with the property. I understand the owners are not available?\"\n\nYou suppress an unkind thought about the owners being eaten by crocodiles.\n\n\"But you have some history with this house now. Would you come over tonight? Say, at 9pm? And wear something formal. See you then.\"\n\nHe rings off without waiting for an answer to his question. You think about ignoring his summons. But then you think about ${rival}'s happy feet.\n\n*choice\n  #Turn up on time, in a dark grey suit.\n    The house is in darkness as you approach. Only a dim orange light flickers behind the side panels of the door. Dr Taube answers the door, glances you over and nods. \"Please come in,\" he says.\n    *set worklife %-5\n    *goto more_rent\n  #Turn up on time, but dressed casually.\n    The house is in darkness as you approach. Only a dim orange light flickers behind the side panels of the door. Dr Taube answers the door, glances you over and frowns. \"No sense of occasion,\" he mutters.\n    *set worklife %-2\n    *set friendly -1\n    *set activity +1\n    *goto more_rent\n  #Turn up late, but formal.\n    The house is in darkness as you approach. Only a dim orange light flickers behind the side panels of the door. Dr Taube yanks the door open, glances you over and nods. \"Good of you to join us,\" he says.\n    *set worklife %-2\n    *set friendly -1\n    *goto more_rent\n  #Turn up late and casual.\n    The house is in darkness as you approach. Only a dim orange light flickers behind the side panels of the door. Dr Taube yanks the door open, stares at you and frowns. \"I suppose I should be grateful you turned up at all,\" he snaps.\n    *set friendly -2\n    *set activity +1\n    *goto more_rent\n\n*comment #################################################################\n*label more_rent\n\"Now if you would come through…\"\n\n*if (weekonly) and (ruthlessness > 35)\n  You remind Dr Taube that your agreement was for one week only and that week has now expired. A further rent of £250 is now due for this week.\n\n  \"For heaven's sake!\" he says. \"We have an experiment to conduct. It's hardly appropriate to mention money at this stage.\"\n\n  You explain you will be pleased to participate in his experiment once you have received a cheque for the balance. You can't tell if the expression on his face is scientific frustration or simple personal rage. In any case, he writes the cheque.\n\n  *set money +250\n  *set ruthlessness %+10\n  *page_break\n\nThe parlour has been rearranged. The detectors have been pulled back to create space for three chairs around a small card table you don't recognise. Sitting in one of those chairs is a shapeless elderly lady in a black dress and bonnet which must have been fashionable in the 1930s. Her eyes, however are sharp and they fasten on you.\n\n\"This is Mrs Fairbrother,\" says Dr Taube. \"She is, well…she is capable of contacting the spirits. I have brought her in to do so tonight.\"\n\n\"How do you do?\" says Mrs Fairbrother.\n\nHow do you react to this, at the least, unconventional scientific approach?\n\n*choice\n  #With a degree of excitement.\n    A seance sounds fun. You shake Mrs Fairbrother's hand with such enthusiasm that the old lady lifts in her seat. Alarmed, she quickly extracts her hand.\n    *set worklife %+5\n    *goto sitting\n  #With polite neutrality.\n    You treat Mrs Fairbrother with a respect that befits her advanced years. She responds with grace, although those shrewd eyes never leave yours. Dr Taube beams.\n    *set friendly +1\n    *goto sitting\n  #With weary resignation.\n    You give Mrs Fairbrother a nod, because a smile seems too much like work. The tenants of Crowther Terrace seem dedicated to snaring you in schemes which are, frankly, bonkers.\n    *set worklife %-5\n    *goto sitting\n  #With general hostility.\n    History is full of so-called 'mediums' who have profited from vulnerable people through trickery and deception. Looking at Mrs Fairbrother, you're sure she's not an exception. Those eyes seem to know what you're thinking.\n    *set friendly -1\n    *set ruthlessness %+5\n    *goto sitting\n\n*comment #################################################################\n*label sitting\n\nThe doctor ushers you to a chair. \"I am at the stage in my investigation where I have enough raw data, and proceeding is a matter of interpretation. I have kept my findings strictly secret from Mrs Fairbrother. I regard her contribution as that of a valued peer.\"\n\nIf you didn't know better, you'd think he was sweet on the old bird.\n\nDr Taube lights a candle on the table. It spills a gentle yellow cast across the green felt table. Then he turns the parlour light off.\n\nMrs Fairbrother skewers the doctor with a searching look, then turns it on you. She extends each thin arm across the table, one towards Dr Taube, one towards you. The doctor takes her hand with reverence. You follow suit. Mrs Fairbrother closes her eyes. A tiny smile lifts the corner of her mouth. \n\nThen she blows out the candle.\n\n*page_break\n\nIt is very black and silent for a couple of minutes.\n\n*if (special = \"fengshui\")\n  You can almost taste the bad energy flow in the room.\n*comment endif\n\n*page_break\n\n\"There are restless spirits in this house,\" breathes Mrs Fairbrother. \"Lost entities, who should long ago have left this place, still drift here. They may come through. Do you have a question for them?\"\n\nDr Taube sounds startled. \"What is their function?\" he blurts. \"What is their, um, objective here?\" \n\nThe old lady pauses. \"It is difficult for the living to follow the paths of the dead,\" she says. Presumably she has not noticed the flour. You sense rather than see her face turn towards you. \"Do you have a question for the spirits, ${name}?\"\n\nYou become aware that you need to visit the lavatory. However, Mrs Fairbrother is gripping your right wrist and Dr Taube has your left.\n\n*choice \n  #Ask about the nature of the haunting here.\n    Mrs Fairbrother pulls you closer with her bony hand. \"The signs are all around you,\" she hisses. \"You need only have the patience to read them.\"\n\n    You hear Dr Taube draw breath. You also sense small balls of spittle on your cheek, the one which faces Mrs Fairbrother. However, your hands are still pinned.\n    *set friendly +2\n    *goto maybe_russell\n  #Ask whether you should change career.\n    Your eyes are adapting to the dark and you can just make out Mrs Fairbrother's stiff profile. When you ask about your career, she stiffens and her chin raises.\n\n    \"There are those,\" she intones, \"who still possess the gift of life. But the cycles of their existence are akin to those of the departed.\"\n\n    That didn't help. You wait for more wisdom from the afterlife, but none is forthcoming. \n    *set worklife %-20\n    *goto maybe_russell\n\n  #Ask what the lottery numbers will be for next week.\n    Mrs Fairbrother seems to slip away for a moment. Then she whispers, \"I see a word…fate. No…it's a four, then an eight. Four, eight, fifteen, sixteen, twenty-three, forty-two.\"\n\n    You repeat the numbers in your head. This is all nonsense, of course. But it will be worth investing a pound just to [i]check[/i] that it's nonsense.\n    *set ruthlessness %-10\n    *goto maybe_russell\n\n  #Ask if you will win The Crocodile's challenge.\n    It takes you a while to explain the situation. First Mrs Fairbrother thinks you own the house. Then she thinks you own the estate agency. Then she thinks you are trying to sell the house. Then she thinks the house belongs to The Crocodile, who you are careful to refer to as Mrs McCorquodale. Then she thinks you are talking about a game of Monopoly. In the end the atmosphere has been quite destroyed and you retract the question.\n    *set worklife %-10\n    *goto maybe_russell\n\n  #Ask what it will take to get the spirits to leave.\n    In what you hope is a sympathetic tone, you ask why the spirits are bound to this place, and what it will take to help them on their way. You don't feel the need to add that your motivation is to get regular paying tenants in.\n\n    Mrs Fairbrother begins to murmur. You can only catch small phrases: \"…our new home…those within…an ancient story…leave this place.\"\n\n    Hmm.\n    *set friendly -1\n    *goto maybe_russell\n\n  #No questions.\n    You politely decline to converse with the spirits. Dr Taube coughs. Mrs Fairbrother seems at a bit of a loss. There is an awkward silence.\n    *set ruthlessness %+5\n    *goto maybe_russell\n\n\n*comment #################################################################\n*label maybe_russell\n\n*if (vanished = false)\n  Mrs Fairbrother breathes in sharply. \"Oh my,\" she says. Dr Taube breaks away and the light comes on. He moves over to steady her as you blink. You gather the brief seance is at an end. You excuse yourself.\n\n  Dr Taube shakes your hand at the door. \"Thank you for coming,\" he says. \"I'll be in touch.\"\n\n  You feel a sense of anticlimax.\n  *page_break\n  *goto taube_exit\n\nYou begin to pull your hands away. \"Wait!\" says Mrs Fairbrother. Something about her tone makes you instantly obey.\n\nThen she says, \"${name}?\" in a slow, strange, familiar voice. It takes you a moment to place it, and then a chill runs down your neck.\n\nIt's Russell's voice.\n\n\"You sent me here,\" he says. \"You left me here.\"\n\n*page_break\n\n*temp fairbrother\n*set fairbrother 0\n\n*comment #################################################################\n*label multi_russell\n\n*rand bomb 1 7\n*if (bomb = 1)\n  It's hard to breathe. The room feels stifling.\n  *goto you_left_me\n*elseif (bomb = 2)\n  Dr Taube's hand trembles as it grips yours.\n  *goto you_left_me\n*elseif (bomb = 3)\n  You have a strong sense of being watched. Neither Dr Taube nor Mrs Fairbrother are looking at you.\n  *goto you_left_me\n*elseif (bomb = 4)\n  You can hear the old medium's breath rasp in her nostrils.\n  *goto you_left_me\n*elseif (bomb = 5)\n  You catch a brief whiff of something; like burnt toast.\n  *goto you_left_me\n*elseif (bomb = 6)\n  You think you catch a movement in the room, just out of sight.\n  *goto you_left_me\n*else\n  You feel your own heartbeat, loud in your chest.\n  *goto you_left_me\n\n*label you_left_me\n\n\"You left me here,\" Mrs Fairbrother repeats, in a ghastly, male echo of Russell's voice.\n\n*set worklife %-3\n\n*choice\n  *hide_reuse #Ask where Russell is.\n    \"I'm here,\" says Russell, with chilling simplicity. \n\n    You ask what that means.\n\n    \"There's only walls,\" he says. \"I'm here…forever.\"\n\n    Forever sounds like a long time.\n    *goto multi_russell\n\n  *hide_reuse #Ask how to get him back.\n    \"Back?\" The word hangs in the room for a few seconds. \"Back? I passed through. There is no way back. I was too young. I had so much life left. You put me here.\"\n\n    You swallow.\n\n    *goto multi_russell\n  *hide_reuse #Explain it was The Crocodile who made you leave him.\n    \"Mrs Mc-Cor-quo-dale?\" The word forms slowly. \"Was she real? So long ago now. She seems like a character…from a story.\"\n\n    You briefly wish she [i]was[/i] just a character from a story.\n\n    *goto multi_russell\n\n  *hide_reuse #Confess how guilty you feel about the situation.\n    Your voice catches in your throat as you admit you've been tormented by thoughts of Russell since his disappearance. A long silence follows.\n\n    \"I know you didn't want this for me,\" he says. \"You didn't expect it to happen. But you didn't make it right.\"\n\n    You remember that Russell was working on something for ${rival} and you stopped him.\n\n    *goto multi_russell\n    \n  *if (fairbrother = 0) #Urge Mrs Fairbrother to return.\n    You talk urgently to Mrs Fairbrother, using her name.\n\n    \"Don't ignore me,\" whispers Russell. \"You ignored me before, and look what happened.\"\n\n    You suddenly picture Russell in the office. Reliable, hard-working, and exploited by pretty much everybody.\n\n    *set fairbrother 1\n    *goto multi_russell\n\n  *if (fairbrother = 1) #Yell at Mrs Fairbrother to come back.\n    You raise your voice. In the dark you can just see the silhouette of Mrs Fairbrother, twitching as she attempts to return.\n\n    \"There was a girl I liked,\" hisses Russell. \"Books I wanted to read. Places I wanted to see. I had my whole life to live.\"\n\n    You catch yourself breathing hard.\n    *set fairbrother 2\n    *goto multi_russell\n\n  *if (fairbrother = 2) #Shake Mrs Fairbrother.\n    You slide your hand up Mrs Fairbrother's arm to the elbow, and use it to shake her vigorously. She moans, then suddenly pulls up and gasps like a drowning woman.\n\n    Dr Taube breaks away from your grip. Seconds later, the light goes on. Mrs Fairbrother is bent over the table, the black of her dress harsh against the green baize of the table. She grasps at her heart, then, very slowly, leans back, and blinks several times.\n\n    *set ruthlessness %+10\n    *goto after_seance\n\n  #Break the circle.\n    You snatch your hand away from Mrs Fairbrother. She screams, a desperate, cry which oscillates between a frail old-lady voice and a tortured echo of Russell's deeper tones. You jump from your chair and back away, knocking into something as you move.\n\n    The light comes on. Mrs Fairbrother is lying back in her chair, wild-eyed, breathing in thin snorts. Dr Taube stares at you in horror. You look down and see you have knocked over one of his EMP tripods. The sensor is smashed. \"Fool!\" Dr Taube hisses.\n\n    *set friendly -3\n    *goto after_seance\n\n*comment #################################################################\n*label after_seance\n\nMrs Fairbrother gurgles. Dr Taube attends to her. You feel surplus to requirements and excuse yourself.\n\nThe doctor nods, but he does not see you to the door. For a moment you think Mrs Fairbrother has raised a hand in farewell, but it might simply be a light spasm. You let yourself out of the house and wander down the path, exhausted.\n\n*page_break\n\n*comment #################################################################\n*label taube_exit\n\nNext day, Dr Taube rings you at the office. \"My investigation is concluded,\" he says. \"Thank you for the cooperation you were able to offer.\"\n\nYou offer him another week's residence at an attractive rate, but he turns you down almost before you finish the sentence. You're not sure, but you might have caught a bitter laugh from the other end of the line.\n\nJust as he is about to ring off, you ask him what he has discovered. He pauses.\n\n*if (friendly \u003c 10)\n  \"Considering your attitude throughout my stay, you can read about it in the journals, just like everyone else.\"\n\n  With that, he hangs up. You stare at the receiver, wondering exactly what you did to incur the doctor's displeasure. \n\n  A few days later, you find he left flour all over the floor.\n\n  *finish\n\n*page_break\n*set therefore true\n\n\"You were helpful during my stay, I concur. Perhaps I do owe you something. Of course it's not possible to say precisely what is occurring in 57 Crowther Terrace, but based on my readings and the input given by Mrs Fairbrother…\"\n\nHe tails off. It is all you can do not to interrupt him.\n\n*if (haunting = 1)\n  \"That house. It defies the axioms of Euclidean geometry. The layout of the interior does not correspond to the perimeter of the exterior. Rectangles within the walls are routinely skewed or distorted. And its measurements [i]change[/i]. In real time. I would advise you, and anyone else, not to pass through its doors again. If my data is to be believed, there is nothing to prevent the structure abruptly shrinking to the size of a doll's house with you—still at your current dimensions–inside. Consider yourself warned.\" He rings off.\n\n  Oh, great.\n  *finish\n\n*elseif (haunting = 2)\n  \"In the first days I visited, I used the house's water supply for sustenance. For tea and so on. The beverage had a strange tang to it. I sent water samples for analysis and they turned up nothing out of the ordinary. I provided my own teabags and sterilised the crockery. Still the taste was impaired. I brewed tea under control conditions, and sent that for analysis.\" He pauses. \"It contained traces of [i]rhododendron arborescens[/i]. Azalea. Highly toxic. How did that get into tea brewed in a sterilised environment, using uncontaminated water, and factory-sealed teabags? I can't account for it. But I recommend your next tenants are coffee drinkers.\" \n\n  And with that, he rings off. \n\n  You look over towards the office kitchen, where the kettle is emitting an unearthly whistle.\n  *finish\n\n*elseif (haunting = 3)\n  \"The house is not home to any single entity with a discernible intention. The activity happens in bursts, and when it does, it creates such a riot of readings that making sense of them is quite impossible. Trying to understand it reminds me of teaching a first-year undergraduate psychology class.\"\n\n  You're not sure what he means by the comparison.\n\n  \"It's like herding cats.\" He rings off.\n  *finish\n\n*else \n  *comment FURTHER HAUNTINGS HERE ======================================\n", "journalist": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette seven\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nYour new sense of determination lasts all the way to the office. 57 Crowther Terrace is full of potential. It's just a case of exploiting it.\n\nHowever you are brought up short by a note on your keyboard, written in The Crocodile's merciless hand. SEE ME IMMEDIATELY, it reads. You wish she would at least include a clue as to why you have incurred her wrath this time.\n\n${rival} smirks as you tap on her door.\n\n*page_break\n\nThe Crocodile holds a teacup under her nose, savouring its caustic vapour. Fortunately, she doesn't offer you one this time. \"${name},\" she says. \"Come in. I've been reviewing all these awkward properties that I assigned. Yours is 57 Crowther Terrace.\"\n\n\"Yes,\" you say.\n\n\"I didn't need it confirmed.\" She gives you an unnecessary glare. \"It's been…a few months. You have raised £${money} in rent and incidentals. Do you consider you've done well?\"\n\nThis is it. This is the make or break moment. What will you say?\n\n*choice\n  #The property is hopeless.\n    You begin with a critique of the house's old-fashioned decor, and its lack of proper white goods. You explain that investment is necessary to bring it up to spec, and this is not something you're liable to do when you're being judged on its balance sheet. You're just about to get onto the neglected garden when you catch The Crocodile's eye and shut up.\n\n    \"A good agent,\" she says, \"can let [i]anything.[/i] In my early days I let a flat where the owner was breeding snakes in the bath. If you can't see the possibilities in the property, how do you expect your tenants to?\"\n\n    *set crocodile %-10\n    *goto assessment\n\n  #You could have done better.\n    You admit you've made a few mistakes, some of them rather visible. But you hope you've learned from them and you're turning the property around now.\n\n    \"There comes a point,\" The Crocodile says, \"where you have to stop making mistakes and start being effective. Most agents reach that point after six weeks on the job. How many years has it been for you?\"\n\n    *set crocodile %-8\n    *goto assessment\n\n  #It's a fair result, given the circumstances.\n    You take a moment to recap the major incidents during the various tenancies. You're realistic about the choices made and what that meant for the agency's takings. In fact, you conclude by inviting The Crocodile to offer constructive criticism on what you could have improved.\n\n    \"Sometimes it's not about solving the problems,\" she says. \"Sometimes it's about not creating those problems in the first place.\"\n\n    *set crocodile %-5\n    *goto assessment\n\n  #You're quite proud of that figure.\n    You take a good couple of minutes to consider the unusual challenges faced with 57 Crowther Terrace. You sketch the tough spots and how you pulled out a result. It's been about creativity and working with the resources available. All told, you think you can hold up your head on this one.\n\n    The Crocodile's frown has been slowly deepening as you talk. Before you can quite reach your emotional climax, she begins a lingering, slow, golf clap.\n\n    *set crocodile %-10\n    *goto assessment\n\n  #Frankly, the tenants have been scum.\n    You let rip about the pool of potential tenants: the insipid family, the brainless students, and that couple who came on like big shots. They were all parasites; demanding a concierge service for a frankly pitiful monthly rent. At least the squatters were honest about contributing nothing.\n\n    You warm to your theme and The Crocodile lets you continue for a surprisingly long time. But then, she thinks all tenants are scum too.\n\n    *set crocodile %+5\n    *goto assessment \n\n*comment #################################################################\n*label assessment\n\nA silence descends on the room, broken only by the deathly heartbeat of the grandfather clock. The Crocodile looks at the Crowther Terrace file, spread on her desk, with Audrey's \"creepy\" comment still tucked into the bottom. Then she raises her eyes to you.\n\n*if (crocodile \u003c 12)\n  \"To be honest,\" she says, \"It doesn't really matter to me what you think, ${name}. And at this stage I don't particularly care how much you're earning for us. You're a liability to this agency and I'm letting you go. Your final cheque will be in the post.\" \n\n  She looks away, and just like that, you're fired.\n  *page_break\n  *goto_scene fired\n*elseif (money \u003c 800)\n  \"Personally I feel £${money} is an embarrassment, given the time and the support you've had. I had intended to continue this experiment a little longer, but what would be the point? I could employ a monkey and it would make more of that property than you have. Thank you for your years of service to this agency. Your final cheque will be in the post. Now get the hell out.\"\n\n  It takes a moment to absorb what she's just said. But it's pretty clear in retrospect. You're fired.\n  *page_break\n  *goto_scene fired\n\n*else\n  \"Frankly, I'm undecided. I'm going to assume the…incidents…so far have just been bad luck. I'll let you run with this property for two months longer. Who's viewing today?\"\n\n  You find a way to turn the question into a general discussion on strategy. The Crocodile would normally spot that. She must be tired.\n\n  \"Just one more thing,\" she says as you get up to leave. \"Some little shit of a journalist has been pestering me about the Crowther Terrace house. Pick it up, will you? Make sure the coverage is positive.\" She slides you a note. It shows the name BILL CUTTER and a phone number.\n\n  *set survived true\n  *page_break\n  *goto phone\n\n*comment #################################################################\n*label phone\n\nYou settle down at your desk. $!{rival} is on the phone, frowning and making aggressive hand gestures. You savour a small moment of pleasure in ${his} discomfort. Eventually you pick up your own phone and ring the journalist's number.\n\n\"Bill Cutter.\" His voice is thick and throaty. You introduce yourself.\n\n\"${name}. Thank you for calling back. I understand you manage the house at…I have the address here…57 Crowther Terrace. Yes?\"\n\nYou confirm this with a mild feeling of doom.\n\n\"Right. Well I'm with the [i]Evening Herald.[/i] Basically we'd like to give the house some coverage, tell its story, that sort of thing. Get a photographer in, give it a whole spread, you know? How does that strike you?\"\n\n*choice\n  #An article in the paper is just what's needed to attract tenants.\n    You haven't specifically dealt with the [i]Evening Herald[/i] before, but the agency has often seen its showhomes become features in the [i]Scotsman[/i] property section. This is more than simply useful to get business; it improves the image of the agency, and that's something The Crocodile cares about very much.\n\n    You arrange to meet Mr Cutter that afternoon at the house.\n\n    *set worklife +1\n    *page_break\n    *goto thanks\n  #This could be a good opportunity, but it requires careful handling.\n    Perhaps this house has been grinding you down; you always see the negative in things now. \"No publicity is bad publicity,\" they say. If you handle this correctly, the article will attract tenants, the agency will look good, and it will be a difficult thing for The Crocodile to ignore. Of course, it means a lot of extra work to cover the bases.\n\n    You arrange to meet Mr Cutter the following afternoon at the house and work late preparing for the interview.\n\n    *set prepared true\n    *set worklife %-3\n    *page_break\n    *goto thanks\n  #Sounds like more trouble than it's worth.\n    You understand how this house and everything connected with it works. It's a jinx. If somebody writes an article about it, it will make the house look bad, it will make you look bad, and ultimately, it will make The Crocodile look bad. The [i]Evening Herald[/i] is a rag. You try to blow this man Cutter off by playing down the house's importance and mentioning several attractive show homes in your portfolio.\n\n    \"When you've been in this game for a while,\" Cutter says, \"you can recognise when somebody's trying to get you off a story. I'm going to write it anyway. Call me back when you're ready to talk.\"\n\n    He hangs up. Sounds like you had better do some defensive research.\n    *set prepared true\n    *set worklife %-3\n    *page_break\n    *goto no_thanks\n  #All journalists are bastards.\n    The [i]Evening Herald[/i] is the worst kind of paper. It rakes up local muck, it sensationalises every story, and it thinks nothing of running consecutive front pages complaining about the poor state of the roads, and then the amount of corrective roadworks on city streets. Its journalistic standards are non-existent.\n\n    You tell Mr Cutter all this, and follow up with an impractical suggestion about where he can insert his story. To your irritation, he sounds amused.\n\n    \"You're entitled to your opinion. You must tell me what you think of the story after you read it, because I'm going ahead anyway. If you want to contribute, you have my number.\"\n\n    He hangs up. One of the juniors is staring at you, aghast at your language. You did get a moment of satisfaction there, but it's balanced by a feeling of general dread about this journalist.\n\n    *page_break\n    *goto no_thanks\n\n*comment #################################################################\n*label thanks\n\nYou get there an hour ahead to do a quick check around the house. The garden is a mess but the interior itself is presentable. Bill Cutter arrives ten minutes early, climbing out of an old Saab with tape on the wing mirror. \n\n\"Appreciate your time in helping out with this story,\" he says, fetching a notebook from inside his jacket. \"I talked to your boss first. Formidable old bird, isn't she?\" \n\nHe hasn't opened the notebook yet. What do you tell him about The Crocodile?\n\n*choice\n  #Tell him the truth, to gain his sympathy.\n    You tell him what your days are like: labouring to bring in rents, stuck between unreasonable tenants and an unreasonable boss. You make up a story about getting into the real estate business because of the satisfaction of seeing people happy in their homes, and how hard it is to retain that perspective in the agency culture. Cutter nods in sympathy. \"The newspaper business works on pretty slim margins these days,\" he says. \"Everybody's under pressure.\" He hasn't made any notes yet.\n\n    You open the house and lead the way inside.\n\n    *set badcroc true \n    *set worklife %+5\n    *set ruthlessness %-10\n    *page_break\n    *goto cutter1\n\n  #Keep it light and neutral.\n    You make a jovial and non-committal remark, then immediately turn the conversation to Bill Cutter himself. \"I've been at the paper fifteen years,\" he says. \"Lots of changes, I can tell you. But let's have a look at this house of yours.\"\n\n    You unlock the house and open the door for him.\n\n    *page_break\n    *goto cutter1\n\n  #Praise The Crocodile and her achievements.\n    You talk about the history of the company and how competitive the real estate business is in Edinburgh. You portray the agency's culture as \"work hard, play hard\", with a firm but fair oversight by Mrs McCorquodale. You describe a real incident where she fired an employee for turning up drunk. Her heroic side is a bit harder to include; you eventually manufacture a story about her staying with a junior all night in Accident and Emergency after they slipped in the street.\n\n    Cutter rubs his chins. \"She sounds a real powerhouse.\"\n\n    You open the house and lead the way inside.\n\n    *set ruthlessness %+5\n    *page_break\n    *goto cutter1\n\n*comment #################################################################\n*label no_thanks\n\nYou spend a fruitless day trying to rebrand Crowther Terrace as a holiday home for rich English and American tourists. There are some online possibilities, but the bulk of holiday homes are advertised in brochures compiled nine months in advance.\n\nAt home you try to relax, but Bill Cutter's rough voice keeps slipping back into your thoughts. As you look out into the twilight, you feel a dark suspicion. Throwing on a coat, you fire up the car, and take the familiar route to Crowther Terrace. Sure enough, there are two men at the gate to number 57, and the way the light is hitting it, it looks like a house designed by a committee: Vincent Price, Norman Bates, Charles Addams and Marilyn Manson.\n\nOne of the men has a camera on a tripod. With a sigh, you stop the car and get out.\n\n\"Ah! You're the ${name} I spoke to this morning,\" says the man without the camera. He has a grubby jacket, two chins and glittering eyes. \"I'm Bill Cutter. Sorry you didn't want to contribute to the article. We're getting some fantastic shots here apparently. Shame we missed Halloween.\"\n\nYou bow to the inevitable and agree to an interview by daylight the next day. Hopefully the house will look airy and welcoming.\n\n*set sensation +1\n*set nightphoto true\n*set activity +2\n*page_break\n*goto cutter1\n\n*comment #################################################################\n*label cutter1\n\nDaylight is streaming through the parlour windows as you give Cutter the ground floor tour. You catch a stale whiff from him, and perhaps the smell of booze on his breath. He introduces Lewis the photographer. Lewis is a lumbering figure whose clothes appear to be from the Seventies. His camera, however, looks up to date, and his eyes remain in gentle motion. You point out a couple of nice showcase shots and he snaps them. Something about the photographer's lazy manner worries you. He takes another shot which includes the thorny undergrowth outside.\n\n\"I understand the most recent occupants of the house were squatters?\" Cutter asks.\n\nHow did he hear about that? You hide your surprise. His notebook is out and his pen poised.\n\n*choice\n  #Deny it.\n    You admit to knowing the group in question, but invent a story about some irregularity in the lease. In your version, there was an administrative mistake and they ended up with an extremely short tenancy—just a few days.\n\n    \"Must have been a hassle, having to move twice like that,\" Cutter says. You agree.\n\n    *set ruthlessness %+5\n    *set nosquat true\n    *page_break\n    *goto cutter2\n\n  #Share your frustration at the situation.\n    You are honest about the squatters, characterising it as one of these things that happens to every estate agent at one time or another. You turn the discussion to their perhaps excessive rights under Scottish law, and the slow legal process necessary to evict them. Cutter nods politely, but you can see his article won't include a discussion of that particular issue.\n\n    *page_break\n    *goto cutter2\n  #Pass it off lightly.\n    You dig out a dry smile and talk about the squatters and their street theatre agenda, with the bizarre costumes and low-energy approach.\n\n    \"You think this place had a touch of the dramatic that attracted them?\" Cutter asks.\n\n    You neatly divert the question into a discussion of the house's period features. You're an estate agent. This is what you do.\n\n    *set worklife %+5\n    *set activity +2\n    *page_break\n    *goto cutter2\n\n*comment #################################################################\n*label cutter2\n\nLewis lies down on the floor, pointing the camera up the stairs. You know enough about photography to tell this is going to give him an angle Hitchcock would have been proud of.\n\nYou suggest he shoot the master bedroom while the light is flattering. Lewis glances at Cutter. Cutter nods.\n\n\"${name}. I think you misunderstand why we're here. I'm not writing for the property section. We're with Features.\"\n\nYou say nothing for a long moment, while an acid taste builds under your tongue.\n\n\"The story is that this house is haunted. Now you and I know that's nonsense, right? But the readers love it.\"\n\n*choice\n  #Withdraw your cooperation.\n    *label go_away\n    \"Come on,\" says Cutter. \"You've been in this game for a while, right? Did you really think we'd be featuring an old scabber like this in the property section?\" \n\n    Lewis keeps taking pictures. You block his shot with your hand and use your body to press him towards the door.\n\n    \"What do you think, that tenants won't be interested in a haunted house?\" Cutter gestures around the hall. \"Your phone'll ring off the hook. Come on.\"\n\n    *choice\n      #Insist they leave.\n        Cutter shakes his head. \"I'm going to write this story anyway. It would have been better for you if you'd been involved.\"\n\n        You're braced in the doorway, ready to tell him what you think of his paper. Then a flash pops in your face and you can't see anything for thirty seconds. When your sight returns, they're already gone.\n\n        *set sensation +1\n        *set worklife %-10\n        *set fiction true\n        *page_break\n        *goto article\n      #Reconsider.\n        Cutter watches you as you turn over the possibilities. Renting this dump has been impossible of late…a bit of Halloween flavour might indeed make a difference. You don't have to live here; just collect the rent.\n\n        The journalist's face creases into a smile as you relent and he pats you on the shoulder. You get a whiff of his personal aroma. You wish you hadn't.\n        *set ruthlessness %-10\n        *set worklife %-5\n        *page_break\n        *goto cutter3\n  #Act as if this makes no difference.\n    More prospective tenants read the features than the property section anyway. What difference does it make where the coverage appears? You carry on, with a mental note to be a little more guarded in your opinions.\n\n    Of course, maybe you could manipulate this story…\n\n    *set ruthlessness %+5 \n    *page_break\n    *goto cutter3\n  #Insist on a fee for the story.\n    *set sensation +1\n    Cutter's eyes narrow. \"We don't pay for puff pieces,\" he says. \"When we pay a fee, we expect complete access, and something juicy. Can you supply that?\"\n\n    You assure him you can, and proceed to negotiate.\n    *if (ruthlessness > 50)\n      Feeling on familiar ground, you push him up to £1000. From the look on his face, he'll have to explain himself to the editor later. He gives you a cheque made out to the agency.\n\n      *set money +1000\n      *page_break\n      *goto cutter3\n    *elseif (ruthlessness > 35)\n      Cutter makes a final offer of £500. It doesn't seem too bad, given that you could have a new tenant in the place tomorrow. He gives you a cheque made out to the agency.\n\n      *set money +500\n      *page_break\n      *goto cutter3\n    *else\n\n      Cutter thinks for a few moments, then shakes his head. \"In this case we're doing you a favour, stimulating interest in your property. I don't think we'd be prepared to pay a fee.\"\n\n      To show you can play hardball too, you ask the two of them to leave.\n\n      *goto go_away\n\n*comment #################################################################\n*label cutter3\n\n\"So. What do you know about the history of this place?\"\n\n*if (housestory = \"soldier\")\n  You tell the story of Corporal Drummond, who volunteered for the Great War but was killed hours before the ceasefire. You suggest that his passionate letters home to his sweetheart might still be hidden around the house somewhere.\n\n  Cutter takes notes with a practiced hand. \"That's great stuff for the ladies. We'll try to dig out a photograph. Unless you've already got one?\"\n\n  Sadly you have not.\n\n  *page_break\n  *goto cutter4\n*elseif (housestory = \"doctor\")\n  You talk about Doctor Drummond and the long nights he spent in this house during the Twenties, forgetting to eat and drink as he researched by candlelight.\n\n  Cutter takes notes with a practiced hand. \"Hmm. Might try a bit of a Dr Jekyll angle on that one. South Edinburgh's just the place for it.\"\n\n  *set sensation +2\n  *page_break\n  *goto cutter4\n*elseif (housestory = \"thief\")\n  Casually you mention Lord Drummond, the daring gentleman thief previously in residence, and his many charitable donations.\n\n  Cutter takes notes with a practiced hand. \"Maybe little things go missing around the house, eh? Yeah, I can see that working. Taken by the spirits. Nice.\"\n\n  *set sensation +1\n  *page_break\n  *goto cutter4\n*else\n  Put on the spot, you can't think of a convincing story. \"OK,\" says Cutter with a frown. \"We'll have a look in the archives.\"\n\n  *set sensation -1\n  *page_break\n  *goto cutter4\n\n*comment #################################################################\n*label cutter4\n\nYou carry on with your tour, including the upper floor. Lewis opens the door for a creepy shot of the cellar stairs and pops outside with a long lens to get the weathervane in a particular light.\n\n*if (inferno = false)\n  *goto cutter5\n*else\n  Cutter checks his notes and nods.\n\n  \"So there was a fire in the house? A couple of months ago wasn't it? The place clearly survived. What was the story there?\"\n\n  *choice\n    #Admit it was a bunch of inebriated students.\n      \"Students eh. Think they know everything. Don't know anything. Suppose I can include some speculation that they were doing Ouija board stuff and it got out of control. Yeah. That'll work.\" He scribbles in his notebook.\n\n      *set sensation +1\n      *goto cutter5 \n\n    #Try to pass it off as the work of unspecified supernatural forces.\n      You put together a package of details which include the fire having an \"uncanny aura\", one student speaking in tongues, and an Irish fireman refusing to enter the grounds. Cutter gives you a hard stare, but he takes it all down.\n\n      *set ruthlessness %+5\n      *goto cutter5   \n    #Tell a story of an ominous premonition you had.\n      *if (prepared = true)\n        You tell a story of a night you spent alone with a bottle of wine, a power cut, and how the guttering flame of the candle always pointed towards Crowther Terrace, even though there was no wind. Cutter's initial reserve seems to fade at the conviction with which you relate your entirely fictional account.\n\n        *set sensation +2\n        *set worklife %+5\n        *goto cutter5\n\n      *else\n        You tell a story of a night you spent alone with some strong cider, a broken pocket watch, and how you seemed to smell burning. Cutter's frown deepens as your improvised tale becomes contradictory and incoherent.\n\n        *set ruthlessness %-10\n        *goto cutter5\n\n*comment #################################################################\n*label cutter5\n\n*if (died = false)\n  *goto cutter6\n*else\n  You move through the parlour. Cutter watches you while attempting to disguise his intentions. \"There's been a recent tragedy here, hasn't there? A suspicious death. Would you say the house is cursed?\"\n\n  He's talking about Mrs Learmonth, just when you were beginning to put that particular incident out of your mind.\n\n  *set worklife %-5\n\n  *choice\n    #Play down Mrs Learmonth's death.\n      You beckon Cutter close and talk about Mrs Learmonth in gentle terms. Much as a gruesome fatality would enhance his story, you explain they were really quite a harmless, normal family, and her death was a dreadful but straightforward accident. You ask that he respect Mr Learmonth's privacy by not dredging it all up again.\n\n      \"Of course,\" he murmurs. \"Of course.\"\n\n      *set ruthlessness %-5\n      *set sensation +2\n      *goto cutter6\n\n    #Pretend to be too scared to talk about it.\n      You do your best to go deathly pale at the sound of her name and absolutely refuse to comment, despite a wall of questions from Cutter. In the end he seems to respect your silence. But have you convinced him of a supernatural hand at work?\n\n      *set activity +1\n      *goto cutter6\n\n    #Tell a story of an ominous premonition you had.\n      *if (prepared = true)\n        You talk about an early conversation you had with Marm Learmonth, and her particular, almost archaic vocabulary. By leaving your mouth open, you manage to make your throat dry out as you explain how those same, strange words appeared, again and again, throughout the day she was to die. By the end you have chilled even yourself with this inane story.\n\n        *set sensation +2\n        *set ruthlessness %+10\n        *set worklife %-10\n        *set activity +5\n        *goto cutter6\n\n      *else\n        The wood grain on your wardrobe leads to strange patterns, and they sometimes look like faces. You spin a story about seeing Mrs Learmonth's face that night, etched in the very structure of your wardrobe. Cutter half closes one eye to look at you.\n\n        *set worklife %-5\n        *set activity +2\n        *goto cutter6\n\n\n*comment #################################################################\n*label cutter6\n\n*if (vanished = false)\n  *goto cutter7\n*else\n  Cutter checks his notes again. \"Now, your agency's had some rough times lately, no matter how much of a battler the old dear is.\" He studies you. \"There was this young man who disappeared. Russell, wasn't it? What happened to him?\"\n\n  How did he hear about that? This one needs a careful answer.\n\n  *choice\n    #Hint that Russell had a drugs habit.\n      You take a confidential tone and speak about the ready availability of class A drugs throughout real estate circles—not the Moving Target agency, of course, Mrs McCorquodale keeps a tight ship. But Russell knew some other young men in the business, and who knows what he did in his spare time?\n\n      You shake your head and explain you expect his body will turn up in the canal. Cutter nods in sympathy as he scribbles notes.\n      *set sensation +1\n      *set ruthlessness %+10\n      *set worklife %-10\n      *goto cutter7\n    #Suggest that Russell was somehow involved with the strange goings-on at the house.\n      You significantly exaggerate how much you have explored the history of the house, and explain that nothing at all weird was recorded as happening before Russell made his first visit to the property.\n\n      Cutter seems interested. You elaborate the tale with a lot of detail about the Norwegian heavy metal that Russell liked and the horror film magazines he often left on his desk. Then you insist you can't be quoted on this.\n\n      *set sensation +1\n      *set ruthlessness %+10\n      *set worklife %-5\n      *goto cutter7\n    #Speculate that Russell was involved in gang warfare.\n      You take great pains to ensure that Cutter will not include your name in this section of the article. Then you construct some implausible fiction about Russell being involved with street fighting. You dwell on the horrific ends which previous combatants have suffered, and the fate that would no doubt befall you if they heard you had talked to the press.\n\n      Cutter stops writing in the middle of your story and gives you a flinty stare.\n      *set ruthlessness %-5\n      *set sensation -1\n      *goto cutter7\n    #Refuse to talk about it while a police investigation is under way.\n      Journalists spend a lifetime spotting lies. The safest course is to say nothing. You look pained and explain you can't talk about it for fear of compromising the ongoing investigation. Cutter clicks his tongue and looks dubious.\n\n      \"If that's the way you feel,\" he says. \"I've got a contact over at St. Leonard's cop shop. I'll get the story one way or another.\"\n      *set sensation +1\n      *goto cutter7\n\n\n\n*comment #################################################################\n*label cutter7\n\n*if (no_deal)\n  *goto notebook\n*comment endif\n\nHe flips back and forward through his notebook, then looks up.\n\n\"One last question,\" he says. \"Ridiculous to ask it, of course. But more than one witness has mentioned a…what was it…a 'levitating car'. Can you comment on that?\"\n\n*choice\n  #Admit you didn't see this yourself.\n    You talk about the damage to the lawn, and the frustration this causes an honest estate agent with a duty of care to the owners' property. You explain you were summoned to the property by a phone call and by the time you got here, the car was definitely not in the air.\n\n    Your candid and rational approach seems to satisfy Cutter and he nods as he scribbles.\n    *set worklife %+5\n    *goto notebook\n\n  #Laugh it off as an idea from a science fiction film.\n    You give a dismissive snort, and remark that enough strange things have happened around the house that you don't need to add floating cars to its story.\n\n    Cutter laughs with you and mentions that he read Fantastic Four comics as a child. They had a terrific floating car.\n    *set ruthlessness %+5\n    *set worklife %+5\n    *goto notebook\n\n  #Dismiss it as an attention-seeking stunt from the Hazelwoods.\n    You paint a picture of the Hazelwoods as floundering entrepreneurs, desperate to attract new clients to their business. You try not to think too much about how closely this picture resembles yourself at this moment.\n\n    \"I know the type,\" says Cutter. \"No wonder they were struggling if that was the best story they could come up with.\"\n    *set ruthlessness %+5\n    *set worklife %-5\n    *goto notebook\n\n  #Pretend you're covering something up.\n    You tell Cutter that his readers would never believe a story about a flying car. Although in fact, you saw something of that description yourself on your holiday in Las Vegas. You try to seem uneasy in the hope that he will think you are covering up.\n\n    \"Mmm-hmm,\" he says, and pauses in his note-taking. You're not sure whether your psychological ploy has worked.\n    *set sensation +1\n    *set ruthlessness %+5\n    *goto notebook\n\n*comment #################################################################\n*label notebook\n\nCutter dots the last sentence, flips over his notebook, and puts the cap on his pen. He scratches behind his ear. \"I think that covers it,\" he says. \"The feature won't be in tonight's paper. Probably not tomorrow's either. I expect you'll see something at the weekend. Thanks for all your help.\" He extends a hand to shake, and calls to Lewis, who has been poking around in the weeds. \"Ta-ra now,\" he says.\n\nYou watch him go with a familiar feeling of dread in the pit of your stomach.\n\n*page_break\n\n*comment #################################################################\n*label article\n\n*if (sensation \u003c 2) \n  The promised article never shows up. You're left torn between relief at deflecting any scurrilous coverage, and a general feeling of anticlimax. You did spend a lot of time with this obnoxious journalist, and there is no feeling of closure.\n\n  You take another drive past 57 Crowther Terrace, looking for inspiration to bring in tenants. None comes.\n\n  *goto_scene ghosthunter\n\nThe article turns up in the Saturday evening edition of the newspaper. \n*if (nightphoto = true) \n  The accompanying photographs show 57 Crowther Terrace by night, with an unearthly gleam to the windows that was surely added in Photoshop.\n  *set sensation +1\n  *goto article2\n*else\n  Two of the accompanying photographs show the interior to good effect, but most have been shot with a wide, distorted field of view that emphasises the looming character of the house. At least they're taken during the day.\n  *goto article2\n\n*comment #################################################################\n*label article2\n\nThe article reads:\n\n*if (fiction = true)\n  HOUSE OF FEAR\n\n  Rumours are once again flying in Edinburgh's South Side about the notorious \"haunted house\" at 57 Crowther Terrace. Stories about the property have circulated throughout the last century, with mention of footsteps in the attic, and a phantom figure which appears in an upstairs window.\n\n  One neighbour, who asked not to be named, said \"When I'm going to the shops, I always go the long way round so I don't have to pass that house. I feel a chill every time I look at it. How could people live there?\"\n\n  Seventeen people have allegedly died in the house over the last thirty years. Paranormal experts say this is consistent with the house being cursed, or infested with an evil spirit.\n\n  The [i]Evening Herald[/i] was contacted by a member of staff at the Moving Target Estate Agency, which handles the property. However as the story emerged, the agent became visibly terrified and refused to be interviewed further.\n\n  Speculation continues as to who will be the next victim of the deadly house.\n\n  *set crocodile %-20\n  *page_break\n  *goto crocpaper\n\n*else\n  *if (sensation \u003c 5)\n    HAUNTED?\n\n    An [i]Evening Herald[/i] investigation concluded this week into a notorious house in Edinburgh's South Side. 57 Crowther Terrace has drawn attention recently for sinister goings-on which have led some to claim it is haunted.\n\n    *set crocodile %-15\n    *goto article3\n  *else\n    SUBURBAN TERROR\n\n    Residents of Crowther Terrace, in Edinburgh's South Side, have been shocked by the latest revelations from a \"house of horror\" in their midst. Neighbours of the property at number 57 report strange lights and spine-chilling sounds at night. But this is only the beginning of the story.\n\n    *set crocodile %-30\n    *goto article3\n\n*comment #################################################################\n*label article3\n\nThe [i]Herald[/i] spoke to a representative of the Moving Target Estate Agency, which lets the house for mysterious foreign landlords. \n*if (nosquat = true)\n  The agent in question lied about the house's most recent occupants: squatters who left the property suddenly for unexplained reasons.  \n  *set worklife %-5\n  *goto article4\n*else\n  The house's most recent occupants were squatters, who left the property suddenly for unexplained reasons.\n  *goto article4\n\n*comment #################################################################\n*label article4\n*if (badcroc)\n  Our contact, who wished to remain anonymous, spoke of a culture of fear within the agency and regular drug use in this high-pressure environment.\n  *set crocodile %-15\n  *goto article5\n*else \n  Other estate agencies have been previously reported as supporting a culture where drug taking is rife.\n  *goto article5\n\n*comment #################################################################\n*label article5\n\n*if (vanished)\n  Earlier this year, one of the Moving Target staff, Russell McMurdo, disappeared while surveying the supposedly haunted property. Was he another victim of this drug culture, or something more sinister?\n*comment endif\n\n*if (died)\n  The story of 57 Crowther Terrace took a ghastly twist when a recent tenant, a Mrs Learmonth, died on the premises. Was this a simple accident? The odds seem to be against it.\n*comment endif\n\nOne thing is sure: the house has had many tenants in recent months, and none have stayed for more than a few weeks. What is this sinister force in the heart of the community, that so frightens the residents and neighbours?\n\n*if (sensation \u003c 5)\n  Or is the entire story a hoax, dreamed up by the agency to attract business in a recession? There is no way to know for sure, except to take up a lease on the house and move in. And you do that at your own risk.\n  *goto crocpaper\n*else\n  The [i]Herald[/i] didn't manage to catch a photograph of an actual ghost, but one thing is sure: a feeling of menace seeps through every room in 57 Crowther Terrace. How long this grim house will terrorise its neighbourhood remains to be seen.\n  *goto crocpaper\n\n*comment #################################################################\n*label crocpaper\n\n*page_break\nSunday seems to last a very long time. Surrendering to the inevitable, you go in to the office barely after dawn and wait for The Crocodile to arrive. You feel like a naughty child outside the headmistress's office. When she does sweep in, at seven forty-five, her look could freeze lava.\n\n\"So this is your idea of positive coverage, is it?\" She pauses for a moment.\n*if (crocodile \u003c 12)\n  \"Just collect your things and go. I can't even bring myself to shout at you.\"\n\n  And just like that, you're fired.\n\n  *goto_scene fired\n*else\n  \"I don't know why I even keep you on staff.\"\n\n  She goes into her office and pushes the door closed. It dawns on you, very slowly, that you still have a job. It seems inconceivable. You go back to your desk and let out a long, deep breath.\n\n  *finish\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set crocodile 33\n*set ruthlessness 25\n*set activity 10\n*set money 0\n*set worklife 49\n\nPatricia McCorquodale, AKA The Crocodile, is your boss. She founded the Moving Target Estate Agency with her husband Peter, and they ran it together for seven years before she devoured him alive. Well, that's never been proven, but it's the predominant belief around the office.\n\n\"Cup of tea?\" she asks, appraising you with hooded eyes. This is a trap. When The Crocodile offers people tea, she is assessing them.\n\n*fake_choice\n  #Accept a cup, but only pretend to drink it.\n  #Take a chance and drink it with gusto.\n  #Refuse politely.\n\n*script changeBackgroundColor(\"black\")\n\n*set crocodile 37\n*set ruthlessness 32\n*set activity 24\n*set worklife 44\n\nThe cellar appears to have four connected chambers under the body of the house. Sadly there are no marketable resources stored in any of them. You make a mental note to big it up as an \"ideal wine cellar\".\n\nA soft sound from a distant corner, like dry stones rubbed together, distracts you. Actually, it would be more accurate to say it scares the holy bejeezus out of you…but it might be rats. It's your professional duty to determine whether vermin control is required. You venture uneasily towards the source of the sound.\n\nIt comes again, but this time it's all around, a thick, rasping whisper which resonates from every wall, its dry echoes chilling the blood in your veins.\n\n\"Colin,\" it breathes.\n*fake_choice\n      #Well, this concludes my survey.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set ruthlessness 31\n*set activity 27\n*set worklife 36\n*set money 1130\n\nMr Learmonth calls yet again. He sounds absolutely exhausted. \"All this might seem far-fetched. But my wife, you know, she's run ragged. And the young ones aren't sleeping at all. I don't want to believe it's this house, but…I feel it's getting worse the longer we stay here. Building up to something.\n\n\"Do you have any other suitable properties in the area? Something to which we could transfer our lease.\"\n\n*fake_choice\n  #Let Mr Learmonth transfer his lease to another property.\n  #Allow him to end this lease early, but retain the £900 security deposit.\n  #Insist on sticking to the terms of the lease.\n\n*set crocodile 35\n*set ruthlessness 54\n*set activity 36\n*set worklife 34\n*set money 5780\n\nHe flips back and forward through his notebook, then looks up.\n\n\"One last question,\" he says. \"Ridiculous to ask it, of course. But more than one witness has mentioned a…what was it…a 'levitating car'. Can you comment on that?\"\n\n*fake_choice\n  #Admit you didn't see this yourself.\n  #Laugh it off as an idea from a science fiction film.\n  #Dismiss it as an attention-seeking stunt from the Hazelwoods.\n  #Pretend you're covering something up.", "setup": "*restart", "squatters": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette six\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nThere follows a week where Crowther Terrace lies empty. Then another. Then another.\n\nThe next Monday, you don't get up for work.\n\nThe alarm goes off all right; you simply shut it down and lie there, watching as a sunbeam squeezes through the crack in your curtains and slides up the bedpost with celestial torpor.\n\nThe office will call, of course, to check you are not lying in a pile of vertiginous electrical death at the bottom of some staircase. You'll fake a \"sore throat\" voice; there will be a suspicious exchange with Florence the admin lady; you will take a \"duvet day\" to recover your sanity; and life will resume tomorrow. \n\nExcept today, the office never calls.\n\n*page_break\n\nYou lie in bed until 2pm, trying to work out what this means. Are you fired? Are your efforts so irrelevant that the company does not notice your absence? You bury your head in your pillow for fifteen minutes, lamenting the career path which has led you to such desolation.\n\nThen you begin to get angry.\n\nSo angry, in fact, that you get out of bed, grab a pair of jeans, a raggedy T-shirt and a leather jacket, and make for your car. You'll tell everybody in the office what you think of them.\n\nTwo blocks later, you turn the car around. Better to go to Crowther Terrace and vent your anger on the property itself. That way you're only sabotaging your rent received, not ending your career in a few phrases of blissful release. You let the car engine roar.\n\nWhat's your plan?\n\n*choice\n  #Stand in the front garden and shake your fist in righteous anger.\n    You're a controlled kind of person. You have learned ways of unleashing your anger without doing the kind of permanent damage you'll bitterly regret in the morning. The neighbours might complain, but they can go screw themselves.\n\n    *set ruthlessness %+5\n    *goto occupied\n  #Lob a few half bricks in through the upstairs windows.\n    The best gestures of rage involve smashing glass. They give the satisfaction of the heady tinkle; the pieces dropping to earth; an almost childlike experience. And, of course, they are relatively inexpensive.\n\n    *set worklife +1\n    *goto occupied\n  #Break in and throw something out through the upstairs windows.\n\n    For those moments of rock'n'roll catharsis, there's really nothing to beat throwing a television out a window. However, as you remember it, this particular house does not have a television. Oh well. Perhaps you can find an armoire or something.\n\n    *set worklife %+5\n    *set ruthlessness %-5\n    *goto occupied\n  #Torch the place.\n    You used to have a life. It wasn't perfect by any means, but it didn't centre around this goddamn place, its weird phenomena and hopeless, pathetic tenants. Who cares if it means the end of your career, criminal prosecution and years in jail? You're going to let the house know who's boss.\n    *set worklife %+10\n    *set ruthlessness %-15\n    *goto occupied\n\n\n*comment #################################################################\n*label occupied\n\nWhen you actually march up to the front gate, you see something startling. 57 Crowther Terrace is occupied.\n\nThere are upstairs windows open, and movement in the parlour. A makeshift washing line is strung up around the side, and a couple of battered bicycles rest against the rail of the porch.\n\nYou can only think of one explanation. Somebody in the office—probably ${rival}—has stepped in during the last week and let Crowther Terrace without telling you. This is a grave contravention of unwritten rules. It's a turf grab, plain and simple. And it probably dashes your hopes with The Crocodile's challenge. Whoever did it might be in her office right now, waving a tenancy agreement.\n\nYou pull out your phone. You need to shout at somebody right now. What will you do?\n\n*choice\n  #Phone The Crocodile and demand answers.\n    \"Yes?\" snarls the voice of your nightmares. Your initial resolve to tell The Crocodile exactly what you think of her and her agency immediately evaporates. Instead, you manage a kind of half-baked stammering protest on professional grounds.\n\n    \"$!{name}? What the hell are you talking about? Why aren't you at work today?\"\n\n    Thirty seconds later you are convinced she knows nothing about any letting agreement for Crowther Terrace and you try to construct a coherent apology. By her tone, it hasn't worked.\n\n    *set crocodile %-10 \n    *page_break\n    *goto investigate\n\n  #Phone ${rival} and give ${him} hell.\n    \"Hello, Moving Target.\" $!{rival} is using ${his} silky telephone voice, the one ${he} uses to draw in the more impressionable clients. You give ${him} a three-minute blast, including ${his} lack of professional ethics, ${his} cowardly methods, ${his} uncertain, incestuous ancestry and ${his} bloody stupid silky telephone voice.\n\n    $!{he} patiently weathers the storm, and then says, \"I'm afraid, ${name}, that I really do not have the faintest idea what you are talking about. Now some of us have a business to run. You must excuse me.\"\n\n    The really irritating thing is, you believe ${him}.\n\n    *set worklife %-5 \n    *page_break\n    *goto investigate\n\n  #Phone a random junior and ruin his day.\n    You ring the office number and get a voice you don't immediately recognise. For some reason the agency has a high turnover among its junior staff. You read him the riot act at a shredding pace and blistering volume, implying several times that the whole thing is entirely his fault and it will spell the end of his career. When you pause for breath, he only manages to ask, \"Who's calling?\" before you launch into another acid assault.\n\n    Somewhere in the middle he checks the files and assures you no paperwork has been put through for Crowther Terrace. But you're not quite finished and you start on him again.\n\n    By the end, you feel strangely cleansed. However, you also have a lingering guilt about abusing the poor junior. If you had only asked his name you could have made it up to him later.\n\n    *set ruthlessness %+15\n    *set worklife %-10 \n    *page_break\n    *goto investigate\n\n*comment #################################################################\n*label investigate\n\nSo the question is, who are these people in Crowther Terrace? You can be pretty sure they are not undead, demons or ancient earth spirits; none of those types ride shabby bicycles.\n\nThe other obvious possibility is that you have suffered a psychological blackout and let the house without the assistance of your conscious mind. Given the last few weeks, this seems not entirely unbelievable.\n\nYou lay a hand on the gate. How will you investigate the situation?\n\n*choice\n  #Ask the neighbours.\n    It's not the most friendly of streets. Number 59 appears not to be at home. A dark-eyed lady opens the door of Number 55 wearing a veil. When you ask about the new residents, she makes a mysterious two-handed gesture and slams the door in your face.\n\n    In fact, the only information you get comes from the hook-nosed gent across the road. He refuses to release the security chain on his door, but he yells through the gap, \"Bloody hippies!\"\n\n    So much for gathering intelligence.\n    *set worklife -1\n    *page_break\n    *goto entry\n\n  #Impersonate an official from the electricity company.\n    For reasons which are best kept quiet, you already possess a fake ID for Scottish Power. You make a quick hop back home to collect a worn tie and a pair of cheap trousers.\n\n    Affecting a bored expression, you knock on the door of number 57. You have a cunning story prepared about a variety of new billing plans and the option to \"freeze their rate\" against anticipated future energy price increases. What you really want to see is how they react to being asked administrative questions about the house.\n\n    Nobody answers the door, although you can quite clearly hear a heavy tread within and see movement behind the green-yellow glass panels. You ring the bell twice more, then knock loudly on the door. They can hear you all right. They're just not answering.\n\n    So much for that plan.\n    *set activity +1\n    *page_break\n    *goto entry\n\n  #Steal around the garden and look through the windows.\n    *if (special = \"garden\")\n      You've only just made it around the side of the house when you are distracted by little horticultural details. Since you last examined the grounds, someone has put in maintenance effort. Several patches have been weeded, a diseased tree removed, and there is distinct evidence of new planting. This cheers you, just a little.\n      *set worklife +1\n    *comment endif\n\n    You work your way around until you reach a bush where you can spy on the parlour. Two slow-eyed girls sprawl on the sofa, smoking and watching TV. One stretches an arm over the arm of the sofa and taps her ash onto the floor.\n\n    It says a lot about the real estate business that your first response is a flare of glee and thoughts of keeping their security deposit. Then you remember than you don't have a deposit from these girls. The thought touches a dark place within you.\n    *set ruthlessness -1\n    *page_break\n    *goto entry\n\n\n*comment #################################################################\n*label entry\n\nSince the first strange happenings at the house, you have been keeping the spare Crowther Terrace keys with you at all times. You fetch a can of pepper spray from your car and slip it into your pocket. It wouldn't be the first time you had to incapacitate a tenant.\n\nOf course, the evidence suggests that these people are not tenants at all. You stiffen and your hands curl into fists. Then you head for the front door, bristling with professional ire.\n\nIt turns out the front door is not even locked. You let yourself into 57 Crowther Terrace. The first thing you notice is the smell; the hall is thick with the tang of overused underwear and unwashed armpits. Then you notice the costumes. Piled against the walls are a collection of outfits, from a raggedy ringmaster to a non-specific object assembled from broken lampshades.\n\nA naked man with a thick beard wanders past, rubbing his chin with one hand and scratching lower down with the other. \"Hey,\" he says to you. \"Don't piss this place off. The energy's pretty wild already. Keep it mellow, man.\" Behind him, you see four dozing forms around the parlour.\n\n*choice\n  #Look upstairs.\n    Upstairs there appears to be a party going on. Dull-eyed guys with long hair and sheepskin waistcoats sprawl across the landing, staring at unremarkable pieces of woodwork or giggling. The sitar music might have been playing on a loop since the 1960s.\n\n    In at least two of the bedrooms people are having sex: messy, moany, slow, goofy sex. A third is empty, but the pillow and sheets dance in a strangely choreographed wave, to the sickening rhythm of the sitar. You take a step towards this weird phenomenon, but the door slams in your face. When you open it, the bed is perfectly still.\n\n    *page_break\n    *set activity %+5\n    *goto squat\n\n  #Interrogate the beardy man.\n    You accost the naked beardy wanderer, trying to keep your eyes away from a nasty skin condition you observe around his buttocks. You ask, in what you hope is a cordial fashion, what the hell everybody is doing in this house.\n\n    He looks at you for a good thirty seconds. You can see his eyes focusing and refocusing like a camera with insufficient light. \"What?\" he says eventually. You repeat the question.\n\n    \"We live here,\" he says, and gives you a rather charming smile. Then he turns and wanders off, scratching.\n\n    You start feeling a little itchy yourself.\n    *page_break\n    *set worklife -2\n    *goto squat\n\n  #Confront the people in the parlour.\n    As you burst into the lounge, you have the ridiculous feeling that you are the intruder here. A couple of slack faces turn to you. They look like students who sat down fifteen years ago and could never be bothered getting back up—or changing their clothes.\n\n    You point out that this is a private house and ask by what right they have taken up residence here. A couple of them stare at you as if they can't understand the words you are saying. The others turn their attention back to a battered television which looks like it was picked up from a street corner. It is showing a programme where people agonise over expensive houses in the Home Counties.\n\n    This is getting you nowhere.\n    *page_break\n    *set worklife -1\n    *goto squat\n\n  #Enquire about the weird costumes.    \n    Perhaps a tangential approach will get to the bottom of the situation. You intercept a small girl with ratty white hair and ask what the costumes are all about. She tells you they are an art collective and stage impromptu street performances. The ringmaster is the narrator who explains their theme. They have several costumes depicting citrus fruits, but those are always going missing. And the thing with the lampshades represents how government keeps the truth from its people.\n\n    She offers to fill a bath and show you her monologue as \"the vortex\". You politely decline.\n    *page_break\n    *goto squat\n\n*comment #################################################################\n*label squat\n\nOK, these people are squatters. This is a problem on a number of levels. First, you can't let the place with them in residence; second, their departure will mean expensive repairs and cleaning; and third, actually getting them to leave won't be easy.\n\nYou try to remember your induction briefing on this stuff. Under Scottish law they don't have any right to be there, but neither do you have any right to evict them by force. Use violence, and you'll be up in court yourself on criminal charges. \n\nThe usual way to do this is through the courts. After a long process, you can engage sheriff officers to evict them. But by that time, The Crocodile will probably have devoured you completely, starting with the head.\n\n*page_break\n\n*comment #################################################################\n*label multi\n\n*if (resistance > 2) \n  So far you haven't made much of an impression on the squatters.\n  *goto multichoice\n*elseif (resistance > 1) \n  All right, so you've made the squatters uneasy.\n  *goto multichoice\n*elseif (resistance > 0)\n  If you can just push the squatters a little further, you think they'll leave.\n  *goto multichoice\n*else\n  *goto cheerio\n\n*label multichoice\nWhat's your next step?\n\n*choice\n  *hide_reuse #Get the police to evict them.\n    You speak to a civilian desk clerk who eventually finds you a disinterested sergeant.\n\n    \"I'm afraid it's not a matter for the police,\" he says. \"We wouldn't take any action while you still had civil remedy available. Now, if we had a report of criminal activity taking place on the premises, that would be a different matter.\"\n\n    You tell him there are seventeen unwashed hippies on the premises in a constant fug of illegal drugs. The sergeant doesn't say so, but you get the impression that busting slack-jawed, inert tokers is not a high priority for him.\n    *page_break\n    *goto multi\n  *hide_reuse #Reason with them.\n    *goto reason\n  *hide_reuse #Find them alternative accommodation.\n    That night, you head back to the office and search through the files. There is another vacant property in Blackford Avenue. You pull in a favour to copy the key, then you take it round to Crowther Terrace.\n\n    For the next couple of hours, you walk about the house talking about the imminent eviction and this amazing place only a few blocks away. You get a fairly lukewarm reaction, but you hang the key in the hall and constantly repeat the address. By the time you're ready to leave, the key has disappeared.\n\n    Best of all, the Blackford Avenue house is one of ${rival}'s properties.\n\n    *set resistance -1\n    *set ruthlessness %+10\n    *page_break\n    *goto multi\n\n  *hide_reuse #Report to the authorities that a crime is being committed.\n    *goto frame\n  *hide_reuse #Conduct your own campaign of terror against them.\n    *goto terror\n\n  #Hire a perhaps disreputable private security firm.\n    *if (security) \n      Big Dom nods slowly as you return to his office. \"I'm afraid it's the way with these people,\" he rasps. \"They're like dogs. You try to be polite, and they take advantage of you. There's only one approach they understand.\" He cracks his knuckles.\n\n      *goto special\n    *else \n      Enquiries lead you to \"Big Dom\", a gentleman with the physique of a retired boxer and the voice of a tonsilitic Darth Vader. He explains the time and expense necessary to secure a court possession order.\n\n      \"However,\" he rasps, \"we do have 'special methods' our firm has successfully employed in the past upon unauthorised occupiers. To request these, you pay by cash in advance. And we deny all knowledge of this activity.\"\n\n      *set security true\n      *goto special\n    *label special\n    *set price +150\n    \"The service I can offer you today is a total clearance of the property, for £${price} up front. Should there be any…complications…I will turn out to have been visiting a dear old aunt in Penicuik at the time. You might be well advised to make similar arrangements. So do we have a deal?\"\n\n    *choice \n      #Pay the £${price}.\n        With a feeling of disquiet, you hand over the money and try to arrange an impromptu night out.\n        \n        *set money -price\n        *if (worklife > 40)\n          You look up a couple of friends you've been neglecting and set up spontaneous dinner and drinks at a nice Italian place in the New Town. You're the life and soul of the party, making sure you keep drinking late—in pubs with prominent CCTV. You pay for the drinks at the nightclub by bank card.\n \n          *set worklife %+5\n          *goto complete\n        *else\n          The first three friends you phone all seem surprised to hear from you. They're busy tonight. The fourth seems to have trouble placing you. Dismayed, you go to a late night double bill at the cinema by yourself and make regular trips to the toilets and kiosk to ensure you show up on the CCTV.\n\n          *set worklife %-10\n          *goto complete\n        *label complete\n        In the morning, you find you have a text message from an unregistered number. It simply says, COMPLETE.\n        \n        *page_break\n        *goto cheerio\n\n      #Reconsider your options.\n        The thought of \"Big Dom\" and his special methods makes you deeply uneasy. There must be a safer approach you haven't yet explored.\n\n        *goto multi\n\n*comment #################################################################\n*label reason\n\nYou spend a fruitless two hours attempting to determine who is the leader of the squatters. Along the way you receive an intimate proposition by a sleepy man with snot on his spectacles, discover a purple ring around the bathtub, and are startled by a costume which appears to combine elements of two popular characters: Mickey Mouse, and Leatherface from [i]The Texas Chainsaw Massacre.[/i]\n\nWhat approach will you take to reason with them?\n\n*choice\n  #Suggest the South Side of Edinburgh is a cultural vacuum and they might be better placed elsewhere.\n    \"Yeah, man,\" says the naked beard from earlier, who appears to never wear clothes. \"That's why we're here. We need to shake things up. Take the radical to the conservative, you know? Once we get this thing sorted, there'll be street happenings. Pop-up theatre in the r
