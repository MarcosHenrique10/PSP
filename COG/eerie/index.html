dent1\n\nYour new tenants take possession of 57 Crowther Terrace and you hear nothing from them for a while. Out of professional curiosity—or is it professional nervousness?—you take a slow drive along Crowther Terrace one night. Lights are on in the parlour and a couple of very sporty cars are parked illegally in front of the house. You guess the Hazelwoods are holding one of their exclusive dinner parties for clients. \n\nNot for the first time, you suspect £${rent} was too low a figure for the monthly rent.\n\nYou drive home and heat up a Tesco ready meal in the microwave. It has a faint but distinct taste of plastic.\n\n*page_break\n\nNext day you are deep in some accounts when you hear one of the juniors say:\n\n\"${name}? You have a visitor.\"\n\nYou look up to see Rehab George Clooney approaching your desk. His hands are clasped awkwardly in front of him. In the background, you notice The Crocodile studying him like a piece of meat.\n\n\"I'm sorry to bother you,\" he says. \"My wife—Mrs Hazelwood—she wanted me to get in touch with you. She wanted me to ask, well, the vacuum cleaner is broken.\"\n\nIt occurs to you to ask why he has visited the office to talk about hoovers instead of making a simple phone call. The Crocodile gives a slow, disgusted shake of the head, but she watches to see what you do.\n\n*choice\n  #Arrange for the property's hoover to be repaired under an existing service arrangement.\n    You get out your diary and arrange for a technician to visit the house in the next few days.\n\n    \"Thank you,\" says Mr Hazelwood. \"Thank you very much.\" He stands there for a few moments longer, as if he might say something else. Then he leaves. The Crocodile gives you a suspicious look. You shrug in what you hope is a respectful manner and return to your accounts.\n    *page_break\n    *set crocodile %-3\n    *goto incident2\n  #Offer an immediate exchange of hoover from the agency's appliance pool.\n    You rise from your desk and steer Mr Hazelwood away from the savage arena that is the agents' working space—and from the evil eye of The Crocodile. Settling him with a glass of mineral water, you go off to search the cupboards and dig up a used but serviceable replacement hoover. You plug it in and give it a quick blast to test. \n\n    \"Thank you very much,\" says Mr Hazelwood. He looks genuinely relieved.\n\n    *if (ruthlessness \u003c 33)\n      You insist on carrying the hoover down to Mr Hazelwood's car and ask a few standard questions about how the couple are settling in. He frowns.\n\n      \"I think it's fine,\" he says. \"Plenty of space, garden, peace and quiet. I'm not so sure Irena…Mrs Hazelwood…is taking to it. She's worse than usual.\"\n\n      Before you can ask what \"worse\" means, you've reached the Porsche. You help him cram the new hoover into its tiny luggage compartment. He thanks you and tips you a fiver. You try to wave it off, but he has already slammed the door and fired up his engine. Oh well, that's a pint and a packet of crisps.\n\n      *set clooney true\n      *set worklife %+5\n    *comment endif\n    *page_break\n    *goto incident2\n  #Take a replacement hoover round there personally.\n    You give Mr Hazelwood the V.I.P. treatment. It begins to feel ridiculous when you are driving back to the house and you see his car just ahead of you at the traffic lights. You could just have given him the appliance. But gestures count with these corporate types.\n\n    At the front door of the house, you hand over the new hoover and accept his broken one. He tries to tip you but you wave him off.\n\n    \"Don't be fooled by Irena…Mrs Hazelwood,\" he says. \"She always shows her game face. Pretty fierce. But we do appreciate someone who puts in the extra effort.\" He seems like he might add something else, but instead he says goodbye and closes the door.\n\n    Back at the office, The Crocodile gives you a hard stare. \"Good service is all very well,\" she says. \"But you're not a concierge.\"\n\n    *set clooney true\n    *set crocodile %-5\n    *set worklife -1\n    *page_break\n    *goto incident2\n  #Charge a \"standard fee\" of £50 for a replacement.\n    The Crocodile raises an eyebrow when you explain the charge to Mr Hazelwood, but she says nothing. He looks pained for a moment, then digs out his wallet. \"I'd rather pay cash than charge it to our account,\" he says. There is something strange about the way he says it.\n\n    You find a relatively clean hoover in the cupboards and present it to Mr Hazelwood. He draws it close to his body and leaves the agency.\n\n    \"A word with you,\" snaps The Crocodile, and you step in among the horrified stuffed frogs.\n\n    \"I'm all for extracting maximum value from the rich clients,\" she says. \"But it seems you're treating Crowther Terrace as a special case. I'm not interested in every last fiver you can squeeze out of them. I want to see a solid, well-implemented letting strategy for consistent income. Got it?\"\n\n    You've got it. But you put the £50 in the accounts all the same.\n\n    *set money +50\n    *set crocodile %-5\n    *page_break\n    *goto incident2\n\n\n*comment #################################################################\n*label incident2\n\nA week later, you are examining a square chocolate delicacy when the phone rings.\n\n\"What are you going to do about this?\" a female voice says. \"It's completely unacceptable.\"\n\nThere follows a considerable monologue on how important an upcoming dinner party is. The menu apparently has six courses, including a fish which has been express shipped from a Chinese lake not commonly known in the West. The clients are apparently people from Paris and there is a very narrow window during which they may invest in a new design of staircase.\n\n\"Is this Mrs Hazelwood?\" you ask.\n\n\"Of course it's bloody Mrs Hazelwood. Who did you think it was, Madam Mao?\"\n\nYou resist the urge to draw any comparison and ask what the precise nature of her problem is.\n\n*page_break\n\n\"The precise nature of my problem is I am entertaining prestigious clients with an exquisite dinner party in four hours and\n*if (haunting = 1)\n  we cannot get the toilet door open. Either of them! What do you expect my clients to do, piss in the garden? Or should I cancel the wine—and the table water for that matter? And the bloody sorbet? And the tea?\"\n\n  You ask a few obvious questions. It appears this has been an ongoing problem despite efforts by Rehab George Clooney. Again, you resist the urge to ask why it has only been brought to your attention at this vital culinary moment.\n  *goto dinner\n*elseif (haunting = 2)\n  all my jars are full of tea!\"\n\n  You require clarification on this point, and in particular, why it would be the business of anybody's estate agent.\n\n  \"Well, it's this house you sold us on, isn't it? It's obsessed with tea. All the china appearing on the worktops, the constant smell of the stuff. Now my sea salt cellar, my garam masala pot, my olives, capers, sun-dried tomatoes, jam, marmalade, honey and every one of my twenty-four herb jars are full of tea leaves. What do you intend to do about it?\"\n\n  There is an awkward silence.\n  *goto dinner\n*elseif (haunting = 3)\n  my dining room stinks of cat urine!\"\n\n  You enquire as to why her room features this particular fragrance, and what led her to think that you might hold the solution.\n\n  \"Are you saying it's George's fault? Well, it's highly unlikely to be. I have had the misfortune to encounter George's urine on a previous occasion, and I can assure you it does not smell like [i]this[/i]. It's something about this Godawful house.\n\n  You are torn between shock at discovering Rehab George Clooney's name is actually George, and an uncomfortable speculation about the previous occasion she referred to.\n  *goto dinner\n*else\n  *comment FURTHER HAUNTINGS HERE ======================================\n  *goto dinner\n\n*comment #################################################################\n*label dinner\n\nWhat approach will you take to calm Mrs Hazelwood down?\n\n*choice\n  #Offer to go round personally.\n    You adopt a soothing tone and say you'll be round right away. Nevertheless, your heart sinks when you pull up in front of 57 Crowther Terrace and you are tempted to speed back up and drive away. \n\n    Rehab George Clooney admits you to the house with a slight cower. Mrs Hazelwood is so worked up her eyes appear to be pointing in different directions.\n\n    How will you try to help?\n\n    *set worklife %-10\n\n    *if (haunting = 1)\n      *fake_choice\n        #Carefully examine the doorframe and locking mechanism.\n          You look carefully at the door. It seems aligned correctly. You try the handle.\n        #Try to force the door open with an object.\n          You fetch a poker from the fireplace and look for a place to brace it. You will probably damage the woodwork, but…almost absently, you try the handle.\n        #Combine your strength with Mr Hazelwood.\n          As the two of you brace in an awkward tableau, you give the door handle an exploratory tug.\n \n      The door glides smoothly, effortlessly open, revealing a spotless bathroom.\n\n      Mr Hazelwood blinks. You wait for thanks from Mrs Hazelwood. None are forthcoming. She gives a quick \"Hmph!\" and a venomous glare, then wedges a chair to stop the door closing again.\n\n      *goto porsche\n    *elseif (haunting = 2)\n      *fake_choice\n        #Make a trip to the supermarket to replace her ingredients.\n          Rehab George Clooney drives you to the supermarket. The shopping takes a good hour, during which you ask yourself about ten times why you are doing this. When you return bearing the groceries, Mrs Hazelwood examines each jar in turn and makes dismissive comments on each particular brand.\n\n          You wait a few minutes for a word of thanks, but it doesn't come. You let yourself out.\n        #Suggest the Hazelwoods could order in from nearby restaurants.\n          You assemble a selection of takeaway menus and point out a combination that will offer several workable courses. Mrs Hazelwood looks disgusted and refers again to the fish from China. Mr Hazelwood tries to make the best of a bad situation and an argument starts. You give up and slip away.\n        #Offer to call a friend who has some talent in cookery.\n          Mrs Hazelwood offers you a vivid linguistic caricature of what she thinks of your friend. She then pulls at her hair, stomps over to a cabinet and reaches for a brandy bottle, taking a fierce swig.\n\n          It is full of tea leaves.\n\n          You sense this is your moment to exit.\n      *page_break\n      *goto porsche\n    *elseif (haunting = 3)\n      *fake_choice\n        #Try to track down the smell.\n          You and George crawl around on the floor, trying to locate the precise spot from which the stink emanates. After ten minutes of this you are no closer. Mrs Hazelwood throws open all the windows and begins making a sound like a broken klaxon.\n\n          \"I think you'd better leave,\" whispers George.\n        #Fetch her an odour suppression spray.\n          Rehab George Clooney drives you to the supermarket. The conversation is a little stilted because every time he makes smalltalk, you recall his wife's remark about his urine.\n\n          When you get back, Mrs Hazelwood snatches the spray from your hand and begins to cover the place in it. The sheer intensity of its lavender fragrance drives you from the house.\n        #Suggest they swap the furniture between the dining room and the parlour.\n          \"What a ridiculous idea,\" spits Mrs Hazelwood. There is a moment of silence. \"Well, George? Get going.\" \n\n          You stick around, mostly out of sympathy for Rehab George Clooney, until the heavy items have been shifted. Mrs Hazelwood begins to complain about how much the dishes will cool during the extra travel time from the kitchen. That's your cue to leave.\n      *page_break\n      *goto porsche\n    *else\n      *comment FURTHER HAUNTINGS HERE ======================================\n      *page_break\n      *goto porsche\n  #Book the Hazelwoods and their guests into an expensive restaurant.\n    \"I don't think you appreciate how business relationships work. We welcome clients into our home to show them they are more than just clients to us.\"\n\n    You wait patiently through three more minutes of corporate bullshit from Mrs Hazelwood. You say nothing and let her reflect on the current prospects for her dinner party. She finally takes the address of the restaurant and mutters a rather ungracious \"Thank you\".\n    *set worklife %+3\n    *page_break\n    *goto porsche\n\n  *if (haunting = 1)  \n    #Provide a quick-response joiner at her expense.\n      *goto fixer\n  *elseif (haunting = 2)\n    #Provide a quick-response prestige caterer at her expense.\n      *goto fixer\n  *elseif (haunting = 3)\n    #Provide a quick-response aromatherapist at her expense.\n      *goto fixer\n  *else\n    *comment FURTHER HAUNTINGS HERE ======================================\n\n*comment #################################################################\n*label fixer\n\nMrs Hazelwood calms down at your businesslike approach. You ring an overpriced firm you keep on standby for exactly this kind of situation. They always cut you in for 25%.\n\nFor the next few minutes you relax and look out the window, aware you are making easy money even in this state of idleness. You wonder whether you could get somebody in to give you a shoulder rub and declare it as a corporate expense.\n\n*set money +100\n*set activity %+4\n*set worklife %+6\n\n*page_break\n*goto porsche\n\n*comment #################################################################\n*label porsche\n\nYou are developing a slightly twitchy relationship with your office telephone. Sometimes the caller is a new client, but too often these days it's a tenant of Crowther Terrace.\n\nA mere few days after the dinner party emergency, you are surprised to receive a silent call. Listening closely, you hear what might be tortured breathing. You're about to write it off as a sex caller when a distant, small voice says. \"The Porsche.\"\n\nWith a slight sense of doom, you enquire of Mr Hazelwood about his expensive soft-topped sports car.\n\n\"It's floating,\" he says. \"Floating in the air. Outside.\"\n\nAs you get your coat, you are consoled by the fact that a levitating Porsche outside will do less damage to the house than it would inside. \n\n*page_break\n\nSomething makes you park around the corner. Approaching 57 Crowther Terrace, you see that the Hazelwoods' car is not in its usual space. Instead,\n*if (activity \u003c 20)\n  it is upside down on the front lawn, mirrors bent and windscreen shattered. You take a moment to examine its neat suspension and sophisticated exhaust system. \n  *goto george\n*elseif (activity \u003c 40)\n  its entire front end appears to be wedged deep into the front lawn. The windscreen has bent and shattered, and stray clods of earth have fallen into the driver and passenger footwells.\n  *goto george\n*else\n  you can only see the last six inches of its rear end, laid on the lawn so it faces the sky. It's only when you get close that you see the disturbance in the earth around it. It looks like like the entire car has been rammed through the lawn and these six inches are all that protrude, like an expensive sporty iceberg. You take a slow moment to reflect on the force that would require.\n  *goto george\n\n*comment #################################################################\n*label george\n\nA raggedy gang of local children peer at the car through the iron fence. Rehab George Clooney sits slumped on the front steps, chin in his hands. \n\n\"I looked out the window and it was hanging in the air,\" he says. \"Spinning. It was beautiful, actually. Like an advert. And then, well…look what happened.\"\n\nYou enquire as to the location of Mrs Hazelwood. \n\n\"She's taken something and gone for a lie down,\" he says.\n\n*choice\n  #Settle down on the steps beside Mr Hazelwood.\n    You take a spot beside Mr Hazelwood on the porch. Neither of you says anything. It's a pleasant afternoon, slipping towards evening. Gulls swoop along the street, following its curves. Above, flecks of orange colour the trail from a high jet plane. After fifteen minutes the gang of kids gets fed up and heads home for dinner.\n    *set worklife %+4  \n    *goto recovery\n  #Make Mr Hazelwood a cup of tea.\n    Without asking his permission, you step gently around Mr Hazelwood and make for the house kitchen. There you boil the kettle, find a caddy and brew a mellow, reassuring mug of tea with some sugar for medicinal reasons. You take it outside to him, with a pint of milk.\n\n    *if (haunting = 2)\n      Mr Hazelwood twitches a little when you present the mug, but after a moment, he accepts it.\n      *set activity -5\n    *comment endif\n    Minutes pass. The warmth and the aroma slowly appear to resuscitate him and soon he is taking healthy sips of the warm brew.\n    *set ruthlessness -2\n    *goto recovery\n  #Look very closely at Mr Hazelwood's eyes for evidence of drug use.\n    You draw to an intimate distance, and excusing yourself, raise Mr Hazelwood's chin. His pupils are a regular size, and the whites clear, but there is a quiet desolation there which is unsettling.\n    *set worklife %-5\n    *goto recovery\n\n*comment #################################################################\n*label recovery\n\n*if clooney\n  \"You knew it was haunted, didn't you.\" It's not really a question. \"I don't blame you. We've done worse in our line of work.\"\n*comment endif\n\nIn time you open a gentle discussion of how you might remove the stylish convertible from the lawn. You suggest a local recovery firm and Mr Hazelwood agrees without looking at you. When the firm hear the car is a Porsche, they cancel another job and come round immediately.\n\nA tow truck pulls up outside the house. A fat man with a thick brush of a moustache gets out. He looks at the car, takes off his cap and scratches his head. \"How'd it get in there?\" he asks. He points out the front gate of the house is only wide enough to accommodate the car on its side.\n\n*if (activity \u003c 20)\n  He thinks he can get the car out in two stages: first dragging it to the wall, then lifting it gradually over the railings. It sounds dubious, but Mr Hazelwood gives a weak nod.\n  *page_break\n  *goto recovery2\n*elseif (activity \u003c 40)\n  He believes he can get the vehicle out by temporarily removing a section of railing and backing his truck into the garden. This sounds dodgy, but what choice do you have? You can't let a house with a car embedded in its lawn.\n  *page_break\n  *goto recovery2\n*else\n  He walks round the protruding stump of the car a few times, shakes his head, and takes off his cap again.\n\n  \"I've no got the equipment for that pal. You'll need a crane to get that out. Want me to arrange it?\"\n\n  You and Mr Hazelwood exchange a glance. Your only alternative would be to bury it.\n  *page_break\n  *goto recovery2\n\n*comment #################################################################\n*label recovery2\n\nThe recovery in hand, Mr Hazelwood wanders brokenly off around the back of the house. You take the opportunity to go inside and inspect the interior. It's odd; the walls have been hung with expensive art, exotic plants added in the corners and a large, intricate rug unrolled as a central feature of the lounge. Yet everywhere there is disarray: hatstand knocked over, pot pourri scattered from a broken bowl, and a rack of what appear to be collectible wines shattered on the kitchen floor. Their contents swirl across the tiles.\n\nYou hear a loud, distinct thump from upstairs and return to the hall. Irena Hazelwood staggers on the stairs, mascara smeared, Cleopatra hair sticking up in an unruly spray on one side. The sleeve of her designer suit hangs loose from the body. She is gripping an antiqued iron candlestick upside down.\n\n\"You,\" she spits. \"We had a reputation. A client base. A portfolio. Web presence. And you persuaded us to rent this…house. You destroyed it all. You know what I'm going to do?\"\n\nShe moves towards you, swinging the heavy end of the candlestick like a club. After a couple of steps, she starts running. Then she yells like a barbarian.\n\n*choice\n  #Run.\n    One of the golden rules of real estate is \"never grapple an armed client\". You scramble from the house, pursued by Mrs Hazelwood. She follows you off the porch but is temporarily distracted by the workmen attempting to remove her Porsche from the lawn. You take your opportunity and quickly outdistance her on the flat.\n    *goto gone\n  #Punch her.\n    One of the golden rules of real estate is \"strike first\". \n    *if samurai\n      However, you are still intimidated from your early confrontation with Mrs Hazelwood. You hesitate for a fateful second.\n\n      *goto clonk\n    *else\n      You step towards the charging client and pop her a solid one in the left eye. She drops hard and the candlestick goes flying.\n\n      You check she is still breathing, then leave the premises at a professional pace.\n      *set ruthlessness %+10\n      *goto gone\n  #Grab for the candlestick.\n    One of the golden rules of real estate is \"do not allow yourself to be smacked in the face with a candlestick\". You wrestle with Mrs Hazelwood, and the two of you crash to the ground. You roll over and over with this howling harpie for dangerous seconds until Mr Hazelwood darts in and restrains his wife. You make your exit, somewhat out of breath.\n    *set worklife %-5\n    *goto gone\n  #Reason with her.\n    One of the golden rules of real estate is…\n\n    *label clonk\n    UGHHH. Mrs Hazelwood catches you behind the ear with her candlestick. You topple to the floor. Everything flares white. You look up to see Mrs Hazelwood, teeth gritted, raising the candlestick above her head to administer the death blow. Her husband races towards her…\n\n    You regain consciousness in Accident and Emergency. Mr Hazelwood looks very relieved to see you awake. \"I'm so sorry,\" he says.\n\n    Then he scarpers.\n\n    *set worklife %-15\n    *goto gone\n\n*comment #################################################################\n*label gone\n\nYou hear nothing further from the Hazelwoods. A couple of days later, you take a junior to the house and find it empty. The front garden still bears Porsche debris. You'll keep their deposit, of course, but repairing the damage will cost\n*if (activity \u003c 20)\n  £300.\n  *set money -300\n  *goto punchline\n*elseif (activity \u003c 40)\n  £800.\n  *set money -800\n  *goto punchline\n*else\n  £2500.\n  *set money -2500\n  *goto punchline\n\n*comment #################################################################\n*label punchline\n\nThe junior stares at the house and shivers. \"I wouldn't want to live there,\" she says. You stare at her until she looks away.\n\n*finish\n\n\n\n*comment #################################################################\n*label no_deal\n*page_break\n\nClearly Mrs Hazelwood knows how to negotiate. You give her an hour or so to calm down, then you call her. It goes to voicemail. \n\nYou leave a smarmy message thanking her for viewing Crowther Terrace, and indicate that the rent can be negotiable for the right class of tenant. You explain there are some other clients interested but they have not yet made a firm offer.\n\nMrs Hazelwood never calls you back. Against your better judgement, you call once more and get voicemail again.\n\nThe days drift into weeks and 57 Crowther Terrace stands empty.\n\nDamn.\n\n*set ruthlessness %-15\n*set no_deal true\n*finish\n", "death": "Three working days later, in the office of the Moving Target Estate Agency, a junior named Belinda grits her teeth, closes her eyes and taps on The Crocodile's door. \"Come in!\" roars a voice from within. \n\nBelinda crosses herself quickly and pushes open the door.\n\n\"I'm sorry to disturb you, Mrs McCorquodale,\" she stammers. \"It's just…I need some instruction about these properties. I don't know what you want done with them.\"\n\nThe Crocodile transfers her shrivelling stare slowly from Belinda to the offered files, then back to Belinda. \"These are ${name}'s files,\" she snaps. \"Ask ${name}.\"\n\nBelinda shrinks back. \"That's just it,\" she says. \"I don't think ${name}'s been in the office for days. Their in-tray's piling up, and there's been no phone call. The last log shows a visit to a property called…57 Crowther Terrace. Three days ago.\"\n\n\"Really?\" The Crocodile rises to her feet, hooded eyes glinting. Then she reaches for a personnel file and a permanent marker. With two swift slashes, she draws a large red X across the file. One leg of it scores out a photograph of you.\n\n\"You know what I say about that, Belinda?\"\n\n\"No, Mrs McCorquodale.\"\n\n\"One less mouth to feed.\"\n\nBelinda shivers and scurries from the office.\n\n*goto_scene ending end\n", "ending": "Your final work/life balance score is: ${worklife}%.\n\nThis game has several different endings. Why not play again to find them all? Can you somehow turn the tables on The Crocodile? Or will you find job satisfaction elsewhere?\n\n[i]For Rent: Haunted House[/i] was written by Gavin Inglis. If you enjoyed it you might also enjoy his next interactive novel from Choice of Games,\n*link https://www.choiceofgames.com/neighbourhood-necromancer/redirect.php?src=eea Neighbourhood Necromancer,\nor his collection of very short fiction about ineffective apparitions,\n*link http://www.gavininglis.com/crapghosts/ Crap Ghosts\n\n*label end\n*page_break End\nWe hope you've enjoyed playing [i]For Rent: Haunted House.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "family": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette three\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nYou return to the office after \n*if (worklife \u003c 50)\n  a weekend spoiled by nagging thoughts and fears about 57 Crowther Terrace.\n  *goto weekend\n*else \n  a refreshing weekend.\n  *goto weekend\n*label weekend\nYou skim your emails. Nothing seems very urgent compared to The Crocodile's challenge. The key thing is to get some tenants in. You open the new file on the property. The graphic designer has turned your floorplan sketch into her usual professional rendering. The photos, however, leave something to be desired. What with the bare trees and the dramatic upwards angle, it looks like you are trying to let the Addams Family house several years after they cancelled the maintenance contract.\n\nYou glance out the window. It's a cold but sunny Monday.\n\n*choice\n  #Get a professional photographer over there to do the house justice.\n    You have a couple of contacts you sometimes use for the more prestigious properties. Neither can make it until the end of the week. There is another guy you've used before, Rick Brick, but his output is very unpredictable. He can produce magazine-quality photographs, but he also went to art school and did a lot of drugs.\n    *choice\n      #Wait for the pro's availability and miss this week's listings.\n        Serena Saffron goes out to the house on Thursday afternoon and uploads her shots for Friday morning. They are magnificent; you almost feel like moving into Crowther Terrace yourself. However, she charges £450 for them.\n\n        The Crocodile notices your schedule is not in the listings. \"Some problem with Crowther Terrace, ${name}? I would have had a tenant in by now.\"\n\n        You explain about the photographs and show her the best shots.\n\n        \"Mm,\" she says. \n        *set crocodile -1\n        *set money -450\n        *page_break\n        *goto rent\n      #Take a chance with Mr Brick. \n        Rick Brick is very affable and assures you he understands your requirements. He takes £300 up front for \"necessary expenses\". You hand it over with a slight feeling of trepidation.\n\n        *set money -300\n        *rand bomb 1 4\n        *if (bomb = 3)\n          This turns out to be very perceptive, as Mr Brick turns in ten shots which remind you of a surreal Italian horror film you saw once on late-night television. Rather than go through this again, you run with the shots you have already. But you do make a point of deleting Mr Brick's contact details.\n          *set bad_photos true\n          *page_break\n          *goto rent\n        *else \n          However, Mr Brick turns in ten shots which would not be out of place in the celebrity features of Hello! magazine. You are delighted to replace the horror movie pictures you previously had, and make a note to use Rick Brick again.\n          *set worklife +1\n          *page_break\n          *goto rent\n      #Run the photos you have.\n        On a second look, the photos don't seem so bad. And you do have confidence in your own persuasive powers.\n        *set bad_photos true\n        *page_break\n        *goto rent\n  #Go by yourself—quickly, while the light is so good.\n    Edinburgh's weather can change very quickly. You grab your coat and drive over there, taking chances with the traffic lights. Pulling up, you see the problem straightaway—any shots from the ground make the house loom. You charm the people across the road into letting you take a couple of shots from their upstairs window. With judicious cropping, they'll look good.\n\n    In your hurry, you left your phone in the office. When you get back, you find The Crocodile has been trying to get hold of you.\n\n    \"I don't know which was more annoying,\" she snaps. \"Your absence or your whimsical ringtone.\"\n    *set crocodile -2\n    *page_break\n    *goto rent\n  #Run the photos you have.\n    Hey, a lot of people went to see the Addams Family films. These photos will appeal to a certain kind of tenant. You move on.\n    *set worklife +1\n    *set bad_photos true\n    *page_break\n    *goto rent\n\n*comment #################################################################\n*label rent\n\nOK. You check the schedule. Accurate floor plan.\n*if (haunting = 1)\n  Well, floor plan measured by eye.\n*comment endif\nUp to date photos. Located in a desirable suburban area, yet within walking distance of Edinburgh city centre. Seductive description written by your own fair hand. There is no reason why 57 Crowther Terrace should not enter the rental market as a serious contender.\n\nThe last thing is the question of rent. You're accounting by the month. Audrey had the property priced at £${rent} per month. That almost reeks of desperation; any prospective tenant would suspect something wrong at that price. The absolute top end rent for a prestige four bedroom property is about £2000 per month right now. What rent will you set?\n\n*temp rent1 \n*temp rent2\n*temp rent3\n*set rent1 (rent + 200)\n*set rent2 (rent + 400)\n*set rent3 (rent + 600)\n\n*choice\n  #Stick with £${rent} to get some tenants in quickly.\n    The house has been empty for too long. Even if you don't take as much as you could, The Crocodile is sure to be impressed if you let the place immediately. You can always hike the rent on them later.\n    *goto market\n  #Raise the rent to £${rent1}.\n    You have to be realistic about these things. A modest raise adds some perceived value to the property while still looking like a bargain in the current market.\n    *set rent rent1\n    *goto market\n  #Raise the rent to £${rent2}.\n    A little ambition is a good thing. Crowther Terrace looks really good on paper and you intend to present it as a property worth every penny.\n    *set rent rent2\n    *goto market\n  #Raise the rent to £${rent3}.\n    Screw it. Sales is about perception of value. Audrey undervalued the house and didn't get the tenants. £${rent3} might be an overvalue. So what? It might put off some cheapskates. Those aren't the tenants you need to win this thing.\n    *set ruthlessness +1\n    *set rent rent3\n    *goto market\n\n*comment #################################################################\n*label market\n\nYou do a last check of the description, searching for the inevitable auto-correct typo. There it is: \"four bedroom house in own groins\". You correct it, take a deep breath, and press Submit.\n\nYour listing will go up on the Web immediately, and it will be included in the agency's weekly paper summary of properties to let. Time to sit back, and get on with all the other paperwork you've neglected.\n\n*if (bad_photos = true)\n  $!{rival} immediately passes by on ${his} way to the kitchen. $!{he} stops and looks over your shoulder at the photos. \"Wow. Remember to take the stuffed corpse of the mother out of the window before you do any viewings,\" ${he} says.\n\n  Twat.\n  *set worklife -2\n*comment endif\n*page_break\n\nThe next day, you're deep in an internal debate about whether to make a third coffee or wait the seven minutes until 11am before doing so. The phone rings. The voice on the other end is pleasant and plummy.\n\n\"I'm calling about one of your properties,\" he says. \"Crowther Terrace.\"\n\nNo further caffeine is required. You instantly go from mild torpor to full charm. \"Ah! You have a good eye. That house is just on the market and I don't expect it to still be there by the end of the week.\"\n\n\"My name is Learmonth. Would it be possible to view the property this afternoon?\"\n\nYou pretend to check your diary for thirty seconds or so, then you agree to show the house at 2pm.\n\nMr Learmonth arrives early. He is a slightly tubby gentleman with a London accent. As you drive him through the busy streets, he explains he works in materials science and has been seconded to an Edinburgh office for six months with his family. What aspect of the house will you emphasise on the trip?\n\n*fake_choice\n  #The excellent school which serves the area.\n    \"Mmm,\" he nods. \"I have been worried about moving Nigel and Beatrice mid-term. And we can't really afford two places at the private schools.\"\n  #The shopping centre nearby.\n    \"That's handy,\" he says. \"Marm is always needing that one extra ingredient, you know.\"\n  #The wealth of cultural resources within a half-hour walk.\n    Mr Learmonth brightens. \"We don't have friends up here…I do look forward to strolling around the museums and galleries.\"\n  #The spectacular scenery nearby.\n    \"I have heard about this Arthur's Seat,\" says Mr Learmonth. \"Rather fun to have a dirty great hill in the centre of the city.\"\n\nYou pull up on Crowther Terrace and keep the chat flowing as you head for the property. The house casts a strangely dense shadow in the afternoon light. Mr Learmonth hesitates at the gate, but follows you after a moment.\n\nYou lead the way around the ground floor, then move upstairs and show each bedroom. He seems to brighten at the original old-fashioned fixtures. \n\n*if (housestory = \"soldier\")\n  You tell the story of Corporal Drummond, who volunteered for the Great War but was killed hours before the ceasefire. You suggest that his passionate letters home to his sweetheart might still be hidden around the house somewhere.\n\n  Mr Learmonth's eyes are shining. You've got him.\n  *page_break\n  *goto learmonth\n*elseif (housestory = \"doctor\")\n  You talk about Doctor Drummond and the long nights he spent in this house during the Twenties, forgetting to eat and drink as he researched by candlelight.\n\n  Mr Learmonth nods, clearly drawing parallels between the fictional doctor and his own researches in Materials Science.\n  *page_break\n  *goto learmonth\n*elseif (housestory = \"thief\")\n  Casually you mention Lord Drummond, the daring gentleman thief previously in residence, and his many charitable donations.\n\n  Mr Learmonth warms to the subject, and enthuses about the Raffles stories, which he has read several times.\n  *page_break\n  *goto learmonth\n*else\n  Mr Learmonth is beginning to nod. You can see him visualising his family here. You glance at your watch and casually mention that you have to return to the office soon because another client wants to view the property. You catch a flicker of alarm on his face.\n  *page_break\n  *goto learmonth\n\n*comment #################################################################\n*label learmonth\n\"I think this house would suit us very well,\" says Mr Learmonth.\n*if (rent > 1400)\n  *set rent1 (rent - 200)\n  *set rent2 (rent - 100)\n  \"There's just one thing…£${rent} is on the high side for us, with all the expense of moving and so on. Is there any room for negotiation? Say, to £${rent1} per month?\"\n  *choice \n    #Agree to a discounted rent of £${rent1}.\n      Eager to close the deal, you make a show of considering Mr Learmonth's offer. You pull out a pocket calculator and type some random digits into it. Then you agree, with a few comments about how the agency prefers to rent to respectable professionals and their families.\n      *set ruthlessness -1\n      *set rent rent1\n      *goto agreement\n    #Meet Mr Learmonth halfway at £${rent2}.\n      You look pained at his words, and ask him to give you a couple of minutes. You go through to the lounge and explain the situation to your phone without actually calling anyone. Eventually you return with your generous offer. Mr Learmonth is happy to split the difference.\n      *set rent rent2\n      *goto agreement\n    #Explain with regret that your hands are tied.\n      Mr Learmonth looks embarrassed to have brought the subject up, with that particularly British reticence about money. \"Of course, of course,\" he says, raising his palms.\n      *set ruthlessness +1\n      *goto agreement\n*comment endif\n\n*comment #################################################################\n*label agreement\n\nYou drive him back to the office by a scenic route, playing tourist guide while trying not to punch the air in triumph. You assure him he will have a delightful six months in Edinburgh, pass him the keys, and accept a cheque for the first month's rent of £${rent}, plus the same again as a security deposit.\n\nThe rest of the day passes in a pleasant haze, partly helped by The Crocodile's absence from the office. You startle several of your colleagues by smiling at them for no reason. You even get the urge to fetch a round of coffees for the entire staff. Would that be a step too far?\n\n*set money +rent\n*set money +rent\n\n*choice\n  #Get coffee for everybody—including ${rival} and the juniors.\n    It makes you feel strangely happy to treat everybody in the office to the particular exotic coffee they want. As you come up the stairs with the cardboard tray of steaming paper cups, you find yourself whistling.\n\n    Your mood is infectious. Within a few moments the office has a subtle new buzz, and even the sunlight seems brighter. You nurse your hot cup, look out the window and muse that every day could be like this.\n    *set worklife +5\n    *set ruthlessness -2\n    *goto problem_one\n  #Wait until ${rival} leaves the room and get coffee for everybody else.\n    Within the hour ${rival} leaves the office. You quickly take the opportunity to bring in a round of coffee. There are a few surprised faces, particularly among the underpaid juniors. They are not used to this kind of appreciation.\n\n    You take particular satisfaction in the moment when ${rival} returns and blinks at an entire room of happy colleagues with steaming cups. $!{he} goes to the kitchen and fiddles with the lukewarm jug of coffee on the faulty hotplate.\n    *set worklife +4\n    *set ruthlessness +1\n    *goto problem_one\n  #Get coffee for the senior staff you like.\n    You move around the room, taking a coffee order for your cronies, pointedly avoiding ${rival}. A couple of them give you a nod or a thumbs up. \n\n    Returning with a small tray of cups, you distribute them to the lucky ones. ${rival} doesn't look up. One of the juniors, a wheat-haired girl in a cheap suit, flashes a look of longing at your cup. She dips her head when she sees you looking at her.\n\n    You linger by the window with your cup and watch the shadows of clouds paint Princes Street Gardens.\n    *set worklife +1\n    *set ruthlessness +2\n    *goto problem_one\n  #Just get coffee for yourself.\n    In an environment like the Moving Target Estate Agency, it's important to mark every moment of personal triumph. There are not enough of them.\n\n    You order the most complicated drink you can think of and watch the barista struggle to keep it straight. The process of making it holds up the entire line.\n    *set worklife +1\n    *set ruthlessness +1\n    *goto problem_one\n\n*comment #################################################################\n*label problem_one\n\nEverything goes fine until the next week.\n\n*page_break\n\nYou haven't even thought about 57 Crowther Terrace for a couple of days and are shifting prestige flats with the easy grace of an orchestral conductor when the phone rings. It's Mr Learmonth. You ask him how he is getting on with his fabulous family residence.\n\n\"I'm sorry to bother you,\" he says. \"But I think we might have an infestation here. We hear noises at night. Something…moving around. It's been rather interfering with our sleep.\"\n\nEdinburgh is notorious for rats, and it's not totally unheard of for a few bats to settle in a roof space. You ask Mr Learmonth where the noises are coming from.\n\n\"Sometimes it's the attic. Sometimes in the walls.\" You can hear an edge in his voice. \"We can sleep through it, you know. But the children…they're so imaginative.\"\n\n*choice\n  #Send an exterminator.\n    *gosub end_trial\n    *if false\n      *label end_trial\n      *check_purchase adfree\n      *if not(choice_is_steam) or (choice_purchased_adfree or not(choice_purchase_supported))\n        *label purchased\n        *return\n      Remember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n      [b]To find out what happens next, please purchase the remaining chapters.[/b]\n      *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n      *abort\n    Reluctantly, you dial up the agency's usual exterminator. He makes a visit to Learmonth Terrace the following afternoon, and reports back by phone.\n\n    \"Ain't no vermin in that house,\" he says. \"No droppings at all. I checked the rafters, checked the cellar, lifted a few floorboards. Nothing. No obvious holes neither. The old boy's imagining it. Back at Hogwarts, ain't he. Suppose I don't blame him. Creepy old shack, innit?\"\n\n    He charges £220 for the full investigation. This is £30 more than last time. \"What can I say?\" You almost hear him shrug. \"Costs are up.\"\n\n    *set money -220\n    *set activity +3\n    *page_break\n    *goto problem_two\n\n  #Visit the house to investigate.\n    *gosub end_trial\n    You drive out to 57 Crowther Terrace. Mr Learmonth seems grateful to see you. Together you walk around the house, pausing in corridors to listen. You hear a young girl jabbering from one of the bedrooms. \"Do be quiet for a minute, Beatrice dear,\" Mr Learmonth calls. There is a minor tantrum, then sullen silence.\n\n    After half an hour Mr Learmonth is visibly embarrassed. \"I'm terribly sorry to have you come all the way out here for nothing,\" he says. \"During the night the noises can be quite clear and distinct.\"\n\n    You reassure Mr Learmonth that it is no trouble. You use a subtle psychological technique of looking at him just a little longer than you need to. It suggests that you are assessing his sanity. This ought to keep him off the phone.\n\n    *set ruthlessness -1\n    *set worklife -1\n    *page_break\n    *goto problem_two\n\n  #Reassure Mr Learmonth, but take no action.\n    *gosub end_trial\n    You talk about your long history in Edinburgh real estate, and how most of the old houses make noises: creaks and bumps. They're noticeable at night because that's when everything else is quiet. You have a particular soothing tone you adopt for these kind of conversations—learned from an introductory hypnosis tape years ago.\n\n    Mr Learmonth doesn't seem quite convinced, but you can hear him beginning to doubt his own recollections.\n\n    You recommend a cup of cocoa or Ovaltine before bed for the entire family and make up a story about it being the only thing to help your anxious cousin sleep at night. He thanks you and rings off.\n\n    *set ruthlessness +1\n    *page_break\n    *goto problem_two\n\n*comment #################################################################\n*label problem_two\n\nIt's another week before you hear from Mr Learmonth again. His voice is strained.\n\n\"I need to know…\" he says, \"I want to ask you…\"\n\nYou recline in your office chair and wait for him to get the point.\n\n\"Do you know…the previous tenants. Did they report anything—anything strange about this house?\"\n\nYour thoughts turn to Audrey and her general lack of tenants. You assure Mr Learmonth that nobody reported any previous issues with the house.\n*if (vanished = true)\n  Thoughts of Russell's disappearance flicker through your mind. You never did hear anything more about that.\n*comment endif\n\n\"You're going to think me silly. But I wonder if this place is…well, haunted.\"\n\nYou let the silence hang there for a moment. Then Mr Learmonth speaks again.\n\n\"I'm sorry. I'm wasting your time. I know it sounds ridiculous. When you can't sleep…you see things, you know. Think strange thoughts. We'll work it out. Sorry to have bothered you.\" He hangs up.\n\n*choice\n  #Go over there.\n    You march onto the porch of Crowther Terrace, undaunted beneath the house's looming eaves. Mr Learmonth takes some time to answer the door. He looks pale and tired.  Obviously surprised to see you, he asks why you've come over. He doesn't invite you in.\n\n    You explain that the comfort and satisfaction of your clients is the primary goal of the agency and you want to do all you can. He looks embarrassed, thanks you for such personal attention, but assures you the family are fine.\n\n    Some time later, you learn that he mentioned this visit to a colleague, and The Crocodile eventually got to hear about it.\n\n    *set ruthlessness -2\n    *set worklife -1\n    *set crocodile +1\n    *goto problem_three\n  #Ignore the call.\n    You shrug and get back to other business. It's not the first time a client has claimed a property is haunted. You still have a file somewhere of blurry, increasingly maniacal photographs of a pine banister taken by an unfortunate Swedish girl, who believed it whispered in Swedish at night.\n\n    *set worklife +1\n    *goto problem_three\n  #Start digging around for the history of the house.\n    Researching the house is a new experience for you, as you normally just make up the histories and there is nothing in Audrey's file. You quickly exhaust the obvious technique of just Googling the address. Stumped, you visit the city library on George IV Bridge and ask advice from the remaining librarians.\n\n    *if (haunting = 1)\n      They struggle to find anything about 57 Crowther Terrace. The only reference they can find have is an article from local government reports:\n\n      The Scotsman, 17th May, 1883: \"Is the reputation of Scotland's builders under threat? Local businessman Mr Ernest McKinnick spoke to a gathering of eminent gentlemen at the City Chambers about the problems of melancholy and monomania among his workers. On one particular endeavour, a new house at 57 Crowther Terrace, Newington, Mr McKinnick reported the consecutive absence of thirteen workers, perhaps caused by recurring and irreconcilable problems with the blueprints. 'I have never witnessed anything like it,' said Mr McKinnick. 'Previously reliable men unable to execute a design to plan. Straight corridors with a visible kink in the middle. Interior doors which fit snugly one day and over-extend the next. Either this property does not conform to God's own laws of geometry, or our proud building trade has lost its collective head.\"\n\n      So, perhaps Mr Learmonth is mad. Or just perhaps, 57 Crowther Terrace is built upon a warp in space and time.\n      *goto deal_with_it\n    *elseif (haunting = 2)\n      They direct you to the newspaper archive, and to your surprise you find several references to 57 Crowther Terrace. The key article comes as a bit of a shock.\n\n      The Scotsman, 24th November, 1926: \"The jury at Edinburgh's High Court yesterday returned a verdict of guilty in the case of Letitia Priest, the so-called 'South Side teatime poisoner'. Mrs Priest, of 57 Crowther Terrace, Newington, has been linked to five suspicious deaths in the area. A well-known face in the area, Mrs Priest was famous for her impromptu tea parties and popular home baking, which she often donated to church fayres. She is believed to have selected her victims from among the guests and doctored individual cups. The poisons used were largely derived from plants, some of which Mrs Priest grew in her own garden. Her motivation remains unclear. Mr Findlay McFadden, the renowned alienist, spoke in Mrs Priest's defence…\"\n\n      So in fact, Mr Learmonth might be hearing the ghost of a poisoner. Or her victims.\n      *goto deal_with_it\n    *elseif (haunting = 3)\n      They direct you to the newspaper archive, and a search of the index reveals only one reference to a small article. To your annoyance, the text has been damaged at the end:\n\n      The Scotsman, 13th April, 1954: \"Police today ruled out any foul play in the case of Stephen McIntosh, the 78-year old man found dead in his residence at 57 Crowther Terrace, Newington. A spokesman declared that Mr McIntosh had died from a heart attack and had likely lain in the house for three to four weeks before his body was discovered. Neighbours alerted the authorities upon hearing the desolate wailing of cats from the property—Mr McIntosh kept seventeen felines in total. The coroner's verdict took longer than usual because of the mutilated condition of the body. It appears that the cats…\" \n\n      So in fact, Mr Learmonth might be hearing the phantom of an old age pensioner who lived with seventeen cats. \n      *goto deal_with_it\n    *else\n      *comment FURTHER HAUNTINGS HERE ======================================\n      *goto deal_with_it\n\n*comment #################################################################\n*label deal_with_it\n\nHow do you feel about that?\n\n*choice\n  #In a bizarre way, I feel responsible.\n    You're not sure why you feel complicit in something which happened many years before you were born, but there it is. You knew there was something wrong with Crowther Terrace, and you let the Learmonths move in, all the same. Why? Because The Crocodile made you.\n    *set ruthlessness -5\n    *set worklife -3\n    *page_break\n    *goto problem_three\n  #A haunted house…pfah.\n    Maybe there are magnetic fields at work. Maybe psychological quirks deriving from the shape and positioning of the lot. But there is nothing actually spooky going on here. You are an estate agent and you have no truck with such ideas.\n    *set worklife +1\n    *page_break\n    *goto problem_three\n  #There must be some way I can exploit this.\n    Every year Halloween has become bigger. When you were young it was about turnip lanterns, dressing up and visiting the neighbours to entertain. Now it's about giant pumpkins, trashy decoration and bags of cheap sweets bigger than your head. You start thinking about ways you might generate extra rent from a \"haunted house\".\n    *set ruthlessness +1\n    *page_break\n    *goto problem_three    \n\n*comment #################################################################\n*label problem_three\n\nMr Learmonth calls yet again. He sounds absolutely exhausted. \"All this might seem far-fetched. But my wife, you know, she's run ragged. And the young ones aren't sleeping at all. I don't want to believe it's this house, but…I feel it's getting worse the longer we stay here. Building up to something.\n\n\"Do you have any other suitable properties in the area? Something to which we could transfer our lease.\"\n\nAs it happens, you do have another house in the area; a little smaller, but quite peaceful. Half a mile away. It would probably suit the Learmonths. But only rent from 57 Crowther Terrace counts towards the Crocodile's challenge.\n\n*choice\n  #Let Mr Learmonth transfer his lease to the other property.\n    You have a professional responsibility to your tenants and you hope The Crocodile recognises that. You move the family. A couple of weeks later, a package arrives for you. It contains a jar of home-made raspberry jam and a note of thanks. You feel appreciated. While you are enjoying your jam sandwiches, you try not to think about all that money leaving the Crowther Terrace account.\n    *set ruthlessness -2\n    *set worklife +4\n    *set money -rent\n    *set money -rent\n    *goto next\n  #Allow him to end this lease early, but retain the ${rent} security deposit.\n    You want to help, but point out your hands are tied. Agency procedure dictates he must open a separate lease on the new property. And while you can relieve him of his long-term obligations, there can be no question of refunding the family's deposit.\n\n    Mr Learmonth argues the point, but eventually concedes to your stonewalling and the family move out. You're free to re-let the house immediately…and you have earned two months' rent in one month. This kind of thing is what makes you a professional.\n    *set ruthlessness +1\n    *goto next\n\n  #Insist on sticking to the terms of the lease.\n    You explain that you don't have the authority to break a legal agreement signed on behalf of the company. Mr Learmonth makes some rather pitiful threats, then decides to stay. He slams the phone down on you. \n    *set ruthlessness +3\n    *page_break\n    A fortnight later, two tall gentlemen in grey suits come to the office and ask to see you. They flash warrant cards—they're detectives. The Crocodile, ever gracious towards influential strangers, offers her office for the interview.\n\n    \"You have tenants named Learmonth, is that correct? At…\" he checks his notebook, \"57 Crowther Terrace.\"\n\n    You confirm this, somewhat nervously. The Crocodile frowns at you.\n\n    \"I'm sorry to have to tell you that Mrs Learmonth is dead,\" says the lead detective. \n    *if (haunting = 1)\n      \"She apparently received a fatal crush injury in the cellar. We've yet to find the object which caused the lethal compression. \n      *goto questions\n    *elseif (haunting = 2)\n      \"She appears to have been poisoned.\n      *goto questions\n    *elseif (haunting = 3)\n      \"Her body bears what appear to be a number of claw marks.\n      *goto questions\n    *else\n      *comment FURTHER HAUNTINGS HERE ======================================\n      *goto questions           \n*label questions\nWe have some questions about the property, and Mr Learmonth.\"\n\nThey grill you for forty-five minutes. Shocked, you keep to the facts. There's no point in saying suspicious things about haunted houses. The cops will just think you are bonkers and investigate you.\n\nOnce the detectives depart, The Crocodile thumps her desk. \"This is not the kind of publicity this agency needs!\"\n\nThe incident makes all the papers. Mr Learmonth and family leave Crowther Terrace immediately. The Crocodile makes you return their security deposit. \"Would you switch me to another property?\" you ask. \"It'll be really difficult to let this house with a recent death on the premises.\"\n\nShe gives you a long stare. \n\n\"No,\" she says.\n\n*set activity +10\n*set died true\n*set crocodile -5\n*set money -rent\n*goto next\n\n*comment #################################################################\n*label next\n\nIt's time to look for new tenants.\n  \n*finish\n", "fired": "*comment *****************************************************************\n*comment Eerie Estate Agent, \"fired\" ending\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nIn a daze, you open cupboard after cupboard, looking for something to carry your belongings. In the end, you find an almost empty cardboard box with little catering packs of UHT milk. You dump them into the sink on top of the dirty dishes.\n\nThe box was hardly necessary. You pack a couple of pens, a diary, a few photographs and notebooks you kept in the drawer. There's nothing left for you here.\n\n*if (survived) and (ruthlessness \u003c 29)\n  *goto charity\n*comment endif\n\nYou take a last look out the window, at Edinburgh's sleepy gloom, and walk out of the office door with your head held high.\n\nYou only wish you could have done it without seeing the triumphant smile on ${rival}'s face.\n\n*page_break\n\nOn the final few stairs, you feel something scrape your thigh. Shifting the box to one arm, you feel around in your pocket. You are still carrying the keys to 57 Crowther Terrace.\n\nYou should probably take those back. But it's a long, long way up the stairs. Instead, you step outside. Camera-wielding visitors and grumpy locals push past you and your box. Where will your life lead from here?\n\n*choice\n  #Become a charismatic local drunk, telling ghost stories to tourists.\n    *rand bomb 1 4\n    You install yourself as a regular in a small pub at the top of the Royal Mile, not far from Edinburgh Castle. They have a dark alcove with a lantern which hangs at just the right angle to cast a shadow across your haunted visage.\n\n    After a few days of experimentation, you perfect your approach to rich-looking tourists. It begins with an enigmatic remark about Harry Potter and the [i]real[/i] supernatural secrets of Edinburgh's streets, and proceeds with a regretful look at your empty whisky glass.\n\n    If they buy you a single malt, you tell them of your experiences with 57 Crowther Terrace. If they make it a double, you add fanciful tales of your own invention. Such as \n    *if (bomb = 1)\n      the uncanny bagpiper who wanders, forever lost, in the tunnels beneath the Royal Mile.\n      *goto tour_director\n    *elseif (bomb = 2)\n      Spring-Heeled Jock, a prickly-bearded fiend from Victorian times, who can still be glimpsed leaping from roof to roof on foggy evenings.\n      *goto tour_director \n    *elseif (bomb = 3)\n      an elusive big cat, its tartan shroud made from the rags of its victims, which stalks unwary pedestrians on dark nights.\n      *goto tour_director\n    *else\n      the phantom cow of Bruntsfield Links, who comes out of the darkness with a sinister moo.\n      *goto tour_director\n    *label tour_director\n    \n    Two years later, the bar manager sets up his own ghost tour business and signs you on as a partner.\n\n    *set worklife %+10\n    *goto fired_exit\n\n  #Move into 57 Crowther Terrace.\n    On impulse, you sell your flat and all its furniture for a very satisfying sum. You save money by agenting it yourself. When you pack your remaining belongings into the car and drive over to Crowther Terrace, you feel a strange sensation of contentment in the pit of your stomach. The beds are big, and comfortable; the storage ample; and the facilities have the charm of yesteryear. Sure, occasionally objects move by themselves, or you hear strange noises from the attic or the cellar…but you just smile and go about your leisure.\n\n    Every now and then a junior from Moving Target brings round a prospective tenant. You rig wardrobes to collapse, construct weird symbols from twigs, and paint sinister messages in blood on the mirrors. As a last resort you burst from the cellar door screaming. It's not hard to scare them off—your personal hygiene has slipped since you became unemployed.\n    \n    In fact, you rather enjoy the sport of it.\n\n    *goto fired_exit\n\n  #Hang around and violently assault ${rival} as ${he} leaves.\n    You pop over to a tourist shop and purchase a reproduction claymore at a ridiculously inflated price. Nursing your rage, you hide the sword inside your jacket and wait by the side of the street door for ${rival} to appear.\n\n    After a few minutes, you hear footsteps on the stair. You slip your hand into your jacket.\n\n    \"Not so fast.\" A thick hand grips your wrist. You look up to see two imposing policemen, who press you back against the wall and relieve you of the claymore. \"Come on,\" says the older one. \"A night in the cells will do you the world of good. You'll thank us in the morning.\"\n\n    Cuffed in the back of the car, you ask what gave you away.\n\n    \"Moving Target Estate Agency?\" says the younger cop. \"We drive past every day. Always something happening there to threaten the public.\"\n\n    The next day, they release you with just a warning. The desk sergeant says, \"You probably had a good reason.\" \n\n    *set worklife %-10\n    *goto fired_exit\n  *if (worklife > 40) #Set up your own estate agency.\n    You take a few days off to work out some strategy. To your surprise, office space opens up next to the Moving Target agency and you take a six month lease.\n\n    Recruitment is easy: you simply leave the office door open and wait for a junior to emerge carrying a box and crying. Assembling an initial list of clients is also straightforward; indeed, all traffic from the Moving Target website is mysteriously redirected to yours for a fortnight until they work it out and change the password.\n\n    Finances are tough, but you persevere. You occasionally pass The Crocodile on the stairs. She tends to snarl. One day, you might think about bringing her agency down—but that's another story.\n    *set worklife %+5\n    *goto fired_exit\n  \n*comment *****************************************************************\n*label fired_exit\n*page_break Final score\n\n*goto_scene ending\n\n*comment *****************************************************************\n*label charity\n\nYou check your email one last time. Among the market updates and adverts for dubious enhancements, there is a message from an organisation called Housing For Heroes.\n\n*page_break\n\nDear ${name},\n\nI represent a specialist housing association. You may not have heard of us. Housing For Heroes finds accommodation for individuals who face financial troubles, but have distinguished themselves in serving the community. Many of our clients are servicemen and their families, but we also work with emergency services, volunteers and other individuals who have made a significant contribution. We have a small network throughout England and are now ready to open our first office in Scotland.\n\nYour name was brought to my attention by a tenant who reported you worked particularly hard on their behalf during a recent, somewhat troubled residence in Edinburgh's South Side. I understand you have significant experience in the industry and I would like to invite you to be our first Director in Edinburgh. Setting up the office will be a challenge, but the post comes with an attractive salary I believe you will find very competitive.\n\nI hope to hear from you,\n\nSandy Bevan\n*line_break\nHousing For Heroes.\n\n*page_break\n\nThe professional thing to do would be to leave the office, then call on your mobile phone. But you sit back down, and use the Moving Target landline.\n\nOf course, you talk slowly and clearly as you accept the job. You want the rest of the office to hear.\n\n\n*set worklife %+40\n\n*page_break Final score\n\n*goto_scene ending\n\n", "ghosthunter": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette nine\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nYou come into the office the following Monday with a new plan. You will rob a series of stores across the city in a brief crimewave, and then cook the books to make it look like the money came from 57 Crowther Terrace. Sure, you might get arrested and sent to prison, but it hardly seems worse than trying to rent out the same old hellhole. You bend over a city map and try to find a good route for your crime spree.\n\nYou hear the voice of one particularly nasal junior agent. \"A gentleman to see you.\" She sounds like a maid in some Victorian costume drama. You look up.\n\nBeside the junior is a man of retirement age with a thin face, thick glasses and a frayed brown woollen suit. \"I'm Jeremy Taube,\" he says, in a clipped voice straight out of the same Victorian costume drama. \"[i]Doctor[/i] Jeremy Taube.\" Then he gives you a long look.\n\n*choice\n  #Offer the gentleman a chair and a cup of tea.\n    You thank the junior girl, push aside your papers and sit the old boy down. He accepts a cup of black tea and watches you prepare it from across the office. It is mildly disturbing but you've suffered worse.\n    *set friendly +2\n    *goto hunter_intro\n\n  #Be friendly but brisk.\n    You affect the manner of somebody with a lot of business to attend to, which of course is true—that crime spree won't happen by itself. Then you turn to the man with a polite but neutral smile and ask how you can help. He looks around with a frown and takes a nearby colleague's chair.\n    *set friendly -1\n    *goto hunter_intro\n\n  #React suspiciously.\n    You frown and ask if Dr Taube is from the media. \"Good Lord, no,\" he says. \"I'm a scientist. Let me explain.…\" You reluctantly fetch him a chair.\n\n    *goto hunter_intro\n\n*comment #################################################################\n*label hunter_intro\n\n\"I am a paranormal investigator,\" he says, enunciating each syllable. \"I have studied many liminal sites, both in the UK and Europe. Perhaps you have heard of my pioneering work on the 'whispering pillar' anomalies of Bucharest?\"\n\nYou regret to tell him you have not. \n\n\"Hm.\" His nose narrows. \"Well, it's respectable work. Not sensational stuff like these television programmes where everybody screams and runs around. I take a rigorous scientific approach.\"\n\n*choice\n  #Ask Dr Taube if he has ever been on television.\n    The question seems to cause your visitor considerable irritation. \"Television people are not interested in hearing about structured scientific enquiry! They want night vision film of screaming girls in their underwear and smudged photographs of small children with their eyes lit up.\n\n    \"However, I did appear in an Austrian national special about dark entities,\" he sniffs.\n\n    You get the distinct sense he would very, very much like to be on television.\n\n\n    *set ruthlessness %+5\n    *set friendly -2\n    *goto study_house\n  #Seek more details on his paranormal experience.\n    When Dr Taube leaves, you will have to return to the soul-crushing experience of finding tenants for 57 Crowther Terrace. This means you are perfectly happy to hear him talk about his experience with orbs, light funnels, crowd demons and a troublesome poltergeist in a Belgian chocolate factory. He becomes animated and makes gestures to convey the substance of the spirits.\n\n    The Crocodile walks past and raises an eyebrow at your supernatural visitor. Half an hour later she walks past again and gives you a look which makes a shiver run down your spine.\n    *set friendly +3\n    *set crocodile %-5\n    *goto study_house\n  #Encourage him to get to the point.\n    You explain to Dr Taube that you are really very busy and the real estate business offers you no leisure to hear his fascinating stories. You think you managed to keep the sarcasm out of the word \"fascinating\". He looks over his glasses at you.\n    *set friendly -1\n    *set worklife %+2\n    *goto study_house\n\n*comment #################################################################\n*label study_house\n\n\"I hear you are the agent of note on the house at 57 Crowther Terrace,\" Dr Taube says. \"Its case has attracted some attention, but am I right in saying it has had no serious academic study as yet?\"\n\nYou confirm this is correct.\n\n\"Well.\" He smiles. \"I'm pleased to tell you I would be willing to spend some time—perhaps a few weeks—studying this house.\"\n\nYou perk up at how easily you have picked up a new tenant. You take another glance over his suit. It looks of good quality, but rather worn. What rent will you quote him for a month?\n\n*fake_choice\n  #£600.\n  #£1000.\n  #£1400.\n  #£1800.\n\nDr Taube adjusts his glasses and gives you a long look. \"I'm not accustomed to renting the properties I investigate,\" he says. \"Indeed, most of my clients have paid me for my professional services.\"\n\nYou stare at this guy. His eyes flick to the files on your desk a couple of times. You have been in this business a long time and have become a pretty good judge of potential tenants. You can tell two things about Dr Taube: he very much wants to investigate 57 Crowther Terrace, and he doesn’t have a lot of money.\n\nOn the other hand, you don't have tenants queuing down the stairs outside.\n\n*choice\n  #Give him a week to investigate, rent-free.\n    Any insights Dr Taube can offer into this abomination of a residence are more valuable than any meagre rent he can afford. You agree to accept his services in lieu of rent for a week.\n\n    *set friendly +3\n    *set weekonly true\n    *goto hunter_entry\n\n  #Offer to rent the house by the week instead of by the month.\n    You explain that the business is Mrs McCorquodale's and you only have a certain amount of latitude in such decisions. Dr Taube looks towards her door. Entertaining as it would be to watch her explode his internal organs using only the power of her mind, you agree to draw up a one-week lease for £250. He grumbles, but writes you a cheque. \n\n    *set money +250\n    *set weekonly true\n    *goto hunter_entry\n\n  #Insist on a month's rent in advance.\n    Dr Taube insists he cannot pay an entire month's rent and you offer your sympathies, bound as you are by agency rules. He leaves the office, shaking his head. You search your drawers for a squeezy executive toy you received from a grateful client. You squash it between your fingers and wait.\n\n    After five minutes, Dr Taube returns with chequebook in hand. You negotiate over the rent for some minutes. You settle on the disappointing sum of £750. However, from his grimace of pain as he writes the cheque, you can tell you have drained him to the max. It warms your professional heart.\n\n    *set ruthlessness %+10\n    *set friendly -3\n    *goto hunter_entry\n\n  #Send him packing.\n    This is not a laboratory and you only have one month left of The Crocodile's challenge. You need to generate rent to avoid career doom. You can't do that with a grumpy professor clogging up the parlour. You politely but firmly usher Dr Taube to the door. In fact, you walk down the stairs to be sure he leaves.\n\n    *set worklife %+10\n    *finish\n\n*comment #################################################################\n*label hunter_entry\n\nYou give Dr Taube a lift to Crowther Terrace, interested to see his initial evaluation of the property. He pauses at the gate.\n\n\"Of course, as parapsychologists, we have to distance ourselves from emotional reaction and restrict ourselves to the data,\" he says. But you think you see him shiver.\n\nYou let him into the house, and give him the tour. It seems strange that you used to have a life which didn't require you to do this all the time. Dr Taube peers into nooks and crannies as you move around the rooms.\n\n*page_break\n\n\"Do you know anything about the history of this house?\" Dr Taube asks, and looks at you.\n\n*if (housestory != \"truth\")\n  You take a deep breath and begin the tale of…\n*comment endif\n\n\"No.\" He holds up a finger. \"Better not. I don't want my impressions contaminated.\"\n\nYou hand over the key and leave Dr Taube to settle into the house. As you step out onto the porch, he says, \"If you are interested in my readings, come round in, say, forty-eight hours. The equipment will be set up then.\"\n\nYour first priority in the meantime is a takeaway of Chinese food.\n\n*page_break\n\nYou were ready to leave Dr Taube to his own devices. But come Wednesday, The Crocodile is crashing around the office yelling at people for no good reason. She thrusts a bony finger into your face. \"One month! One month left!\" She turns on a junior. You slip out and drive round to Crowther Terrace.\n\nDespite a chill in the air, Dr Taube is sitting out on the porch, on a dining room chair. Reels of paper are piled around him. You cough politely.\n\n\"Ah!\" he says. \"You'll find this interesting. Look.\" He hands you six long rolls of paper sellotaped together. On each is drawn a zig-zag line. Dr Taube stares at you expectantly.\n\n*choice\n  #Ask what you are looking at.\n    \"Well, isn't it obvious? This is a timeline. Each reel is the output from a different measuring device. They detect electricity, temperature and pressure. I have synchronised these results. They are being triggered at different times. What would do that? Something moving around the house.\"\n\n    You ask if Dr Taube has been moving around the house.\n\n    \"Obviously,\" he says. \"But not during the period of record. Why do you think I'm sitting out here in the cold?\"\n\n    *goto meters\n\n  #Attempt an educated remark on the subject.\n    *if (special = \"forensic\")\n      You glean that these are the outputs from sensors run in parallel, and you observe out loud that the bursts of activity on each appear to be sequential.\n\n      \"Yes!\" Dr Taube claps. You don't think he means it to be patronising. \"These three are EMF detectors; these two are thermometers; and that one is a barometer. They all show changes. But they show them one after another…as if something were moving around the house.\"\n\n      He stares into your face, his eyes alive with excitement. You are torn between feeling like an intellectual success and feeling weirded out. \n\n      *set friendly +2\n      *goto meters\n    *else\n      You gather that he has been interviewing witnesses and these are the results from their lie detector tests. You make some offhand remark about a trained mind being able to defeat the polygraph.\n\n      Dr Taube stares at you with undisguised contempt. \"These aren't polygraph results!\" he splutters. \"They're sensor readings.\"\n\n      You try to turn your remark around as if you knew this all along, but Dr Taube seems unconvinced, verging on hostile.\n\n      *set friendly -2\n      *goto meters\n\n  #Pass over the diagrams and ask to see his setup inside the house.\n    Dr Taube's face falls. \"Yes, I suppose this is a little abstract for a mind not trained in science. What qualifications do you require to work as an estate agent, mmm? Never mind, never mind.\"\n\n    You briefly fantasise about punching his pompous, educated face. But your position with The Crocodile is precarious enough right now.\n\n    *set worklife %-5\n    *goto meters\n\n*comment #################################################################\n*label meters\n\n\"I'll show you round,\" he says, and launches from his chair. \"I must caution you to walk where I walk, and in particular not to touch any of the equipment. The sensors are carefully calibrated, and I have several tripwires rigged in case of physical manifestation.\"\n\nThe door creaks open to a scene you barely recognise. The reception table has been turned upside down, forming the centrepiece of a network of threads which stretches from the floor to the upper staircase. A camera with an attachment you don't recognise has been set up facing the mirror, and the entire floor, except one narrow path, has been dusted with…\n\n\"Flour,\" Dr Taube says. \"Some entities disturb the ground as they move.\"\n\nLight tripods with unfamiliar attachments are distributed throughout the hall and the parlour. Dr Taube checks each one as he passes. He finally stops in the kitchen, which bears no signs of recent use.\n\n\"I can't categorically tell you this house is haunted,\" he says. \"But I [i]can[/i] tell you that the evidence I have gathered suggests it.\"\n\n*choice\n  #Respond with great enthusiasm.\n    You congratulate the doctor effusively and stop just short of slapping him on the back. His nose narrows and he gives you a hard stare.\n\n    \"This is not any kind of achievement, you know. Simply an anomaly that cannot be accounted for using regular methods. Unless you are complimenting me on my experimental technique, of course.\"\n\n    *set friendly -1\n    *goto observation\n\n  #Keep an open mind.\n    You've been in the real estate business too long to get worked up about experimental evidence of paranormal phenomena. You nod with what you hope is a serious expression.\n\n    Dr Taube looks at you a little longer than he needs to. This is a disconcerting habit of his.\n\n    *set friendly +1\n    *goto observation\n\n  #Take a sceptical view.\n    You press Dr Taube on the details of his observations. Surely doors opening will cause pressure changes throughout the house; some variation in temperature can be expected with the sun's movements, and so on.\n\n    To your surprise, he nods and raises a finger. \"Precisely,\" he says. \"I'm glad you are a fellow enquirer. Only through rigorous method shall we find the truth.\"\n\n    *set friendly +2\n    *goto observation\n\n*comment #################################################################\n*label observation\n\nYou take a step away from Dr Taube's scrutiny but then notice you have put a dirty great footprint in the flour. To give yourself time to cover it back up, you ask for a little more detail on his findings.\n\n*page_break\n\n*if (haunting = 1)\n  The doctor gestures at a nearby detector. \"The barometer is what really shows it,\" he says. \"Yes, you would expect a degree of atmospheric fluctuation; that is why these devices are used in meteorology. But I have never seen variations on the scale presented by this house. The changes are in some cases very rapid. Almost instantaneous.\"\n\n  You ask what would cause such changes.\n\n  \"A sudden movement of a door causing air flow. Or the action of a fan perhaps. To actually cause these shifts in pressure, assuming a constant size of container—the room in this case—we're talking about the abrupt entry or departure of large quantities of air.\"\n\n  Dr Taube becomes quieter and taps his teeth with a pen.\n  *goto end_week\n\n*elseif (haunting = 2)\n  The doctor points at three distinct pieces of apparatus. \"The EMF recorders pick up unusual activity in odd combinations,\" he says. \"But I wouldn't say it is of sufficient degree to merit remark. The real news is with this thermometer.\" He nods to a tripod-mounted case inside the kitchen. It contains both a digital readout and an old-fashioned glass tube with a scale.\n\n  You watch in silence for a moment. The readings don't appear to change.\n\n  \"Every day, approximately eight times, the temperature in this kitchen rises, then slowly returns to normal. These changes do not correspond to cloud cover or time of
