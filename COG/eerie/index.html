nce topped with spikes. It's a brown two-storey in the Mansard style, with a porch running round the right side to face west. It must have been a particularly romantic spot until somebody erected a grim glass shed of a hotel on the main road, directly blocking the sunset.\n\nYou park around the corner and approach. The house seems to loom towards you.\n\n*page_break\n*if (vanished = true)\n  There is no sign of Russell. You can't look for his car nearby because the Crocodile doesn't pay him enough to run one. He travels by bus.\n\n  Shouting does not attract his attention. You step up on the porch and press the brass bell, its worn button framed in verdigris. A dull chime echoes from the hall. Nothing stirs. \n  *if (haunting = 2)\n    Perhaps Russell's survey has finally located the toilet.\n*comment endif\n\nYour professional routine kicks in and you get out a notebook to begin your visual assessment of the grounds.  \n\nYou take a slow walk around the building, feeling your feet squelch on the grass. The gutters need clearing and the garden requires attention; obviously routine maintenance was not one of Audrey's elusive strengths. Nevertheless the structure itself seems perfectly robust, even attractive in a \"Peter Cushing goes for a dirty weekend with Agatha Christie\" style.\n\nA strangled squeak draws your attention. Hanging askew from the roof is an odd weathervane. You can't quite identify the twisted animal it depicts, but you're pretty sure it was never a cock.\n\nYou bring one personal speciality to your real estate work. What is it?\n\n*choice \n  #Horticultural knowledge; you're happiest when working on your allotment.\n    *set special \"garden\"\n    *if (haunting = 2)\n      The gardens were extensive at one time but have been choked by weeds. Among the withered stalks you recognise some species not native to Britain. It's difficult to say exactly what they were, but they might have been Asian in origin.\n      *goto frontdoor\n    *else\n      The garden has obviously been neglected for a couple of years at least. A small group of conifers is hanging on near the back wall, but nearer the house, weeds and disease have wrought havoc.\n      *goto frontdoor\n  #Forensic awareness; you have all the different CSI box sets.\n    *set special \"forensic\"\n    *if (haunting = 1)\n      Something bothers you about the shape of the house. Edinburgh is full of properties crammed into odd places and thus shaped strangely. But as you move from left to right, the roof seems to move in the wrong direction, like an optical illusion.\n      *goto frontdoor\n    *else\n      You briefly fantasise about finding Audrey's body inside the house, and following a string of subtle clues to prove she was murdered by ${rival}.\n\n      You shake off this pleasant daydream.\n      *goto frontdoor\n  #Feng shui; you have a well-developed sense of energy flows.\n    Something bothers you about the house. It's difficult to say exactly what. Perhaps a slight misalignment of the foundations, or the general disorder in the garden. Its energy is overwhelmingly negative and no amount of mirrors or trigrams are going to fix it. You're glad the average client has no idea about this stuff.\n    *set special \"fengshui\"\n    *goto frontdoor\n\n*comment #################################################################\n*label frontdoor\n\nSatisfied you've covered the grounds, you step up on the porch. The floor is covered in a complex pattern of tiles which leads the eye around the side of the house. They must have been beautiful when the house was new, but now they're chipped and dirty.\n\nEither side of the front door, a panel of green-yellow glass offers a glimpse inside the property. As you approach the door, you're startled by a movement at the rear of the dim hall. You stare for a moment. \n\n*if (vanished = true)\n  \"Russell?\" you call.\n*comment endif\n\nNothing. Then you notice another movement, across the glass. You look closely. It's a reflection of the tree behind you, shifting with the wind. You shrug and examine the door. It's heavy, dull wood with a black doorknob.\n\n*if (vanished = true)\n  Russell has left the door unlocked for any passer-by to open. You make a mental note to whack him on the back of the head with a rolled-up schedule.\n  *page_break\n  *goto interior\n*else\n  You fish out the keys you brought from the office. They're dull with lack of use, but they still turn smoothly in the lock.\n  *page_break\n  *goto interior\n\n*comment #################################################################\n*label interior\n\nYou step inside 57 Crowther Terrace for the first time.\n*if (haunting = 2)\n  Curiously, it smells of tea; something with a bit of citrus. \n  *if (vanished = true)\n    It's nice to know Russell found enough time to make a cuppa despite failing to complete a few simple measurements.\n  *goto hall\n*elseif (haunting = 3)\n  Abruptly, you sneeze.\n  *goto hall\n*else\n  It smells like old carpets.\n  *goto hall\n\n*comment #################################################################\n*label hall\nThe hall is an impressive affair which rises to the upper storey. A staircase with a deep red pile wraps around the panelled walls, painted by light from unseen windows above you. There is a hatstand, umbrella stand, an exceptionally wide dressing mirror and a reception table on which Audrey has situated two dead pot plants. The overall effect is rather grand, if a little worn.\n\nYou make a note to attract aspirational tenants: the kind of cretins who have stumbled into money, will wear ties with V-neck jumpers, and who will hang a series of pictures up the staircase of decrepit family members they never met. It's entirely possible that Audrey failed to attract that class of tenant by setting the rent too low.\n\n*if (vanished = true)\n  \"Russell?\" you call. No answer. He has either left or is hiding in a cupboard ready to pounce on you. Either way, you had better get on with the survey while it's still light.\n*comment endif\n\nIt's a tenet of advertising that every product needs a story. This is also true of real estate. What story will you use to interest people in this house?\n\n*choice \n  #Something romantic and sad about a previous owner who volunteered for the Great War but was killed hours before the ceasefire.\n    Ah, you look forward to telling the story of Corporal Drummond. It has everything: duty, epic conflict, passionate letters to his sweetheart, and a terrible, tragic climax in war-torn foreign fields. You should keep an eye out in the junk shops for an appropriate picture.\n    *set housestory \"soldier\"\n    *set drummond \"Corporal Drummond\"\n    *set ruthlessness +4\n    *set activity +4\n    *goto ground_floor\n\n  #A noble tale of a local doctor who worked for free among the poor and was eventually felled by the very diseases he laboured to stamp out.\n    You always have to tread carefully when disease is part of the story, but you'll set this one between the wars. You can see Doctor Drummond now, burning candles long into the night as he searches his notes for the elusive clue that will provide the key breakthrough; not knowing his own time is nearly up. He will have a beard.\n    *set housestory \"doctor\"\n    *set drummond \"Doctor Drummond\"\n    *set ruthlessness +2\n    *set activity +3\n    *goto ground_floor\n\n  #A thrilling yarn about a gentleman thief who contributed all his ill-gotten gains to charity.\n    You have used this story several times already for larger properties and it always slays them. Everyone loves a rogue with a heart of gold. You can already see Lord Drummond, peering through his monocle to crack the safe, then driving his Bentley up to the orphanage and leaving a bag of cash on the doorstep.\n    *set housestory \"thief\"\n    *set drummond \"Lord Drummond\"\n    *set ruthlessness +2\n    *set activity +2\n    *goto ground_floor\n\n  #Simply the truth—that the house is an overlooked bargain and a wonderful home.\n    You look again around the shabby grandeur of the hall. Perhaps this property has enough character to sell itself. It would certainly be less effort to keep your story straight.\n    *set housestory \"truth\"\n    *set ruthlessness -2\n    *set worklife +1\n    *goto ground_floor\n\n*comment #################################################################\n*label ground_floor\n\nYou do a circuit of the ground floor. The dining room has potential but is littered with furniture from a perennially unfashionable period. You can't exactly visualise new residents sprawled around the living space watching DVDs and firing up the Playstation. The atmosphere seems more conducive to elderly spinsters accusing each other of murder. \n\n*if (haunting = 3)\n  On the back of the couches, you notice a multitude of small rips in the fabric, inexpertly repaired.\n*comment endif\n\n\"Delightfully preserved\" just about covers this scene. Maybe \"desirable\". But you always write that.\n\n*if (haunting = 1)\n  The automatic has trouble measuring the rooms, the numbers flickering even when you hold it perfectly still. Strange. It's either sunspots, or the foundations conceal a giant electromagnet. You shrug and do the measurements by eye.\n*comment endif\n\n*page_break\n\nA little pantry connects to a spacious but under-equipped kitchen at the rear. It has that feel that old rooms sometimes have; that no matter how much it's scrubbed it will always look a bit yellowed and dirty. It does, however, have a long wooden work surface that will appeal to lovers of upstairs/downstairs period drama.\n\n*if (haunting = 2)\n  Along the counter facing the window are a grimy assortment of vintage jars. The labels are flaky and brown with age but you can make out a couple labelled PV. AC. BORIC and Tr. DIGIT.\n*comment endif\n\nYou could, of course, get in a team to redecorate this room. But that would keep it off the market for a couple of weeks, and you can be sure The Crocodile would take the decorator's charge into account. You write \"charming period kitchen\" in your description.\n\nA glance out of the rear window tells you the shadows are getting long in the garden and you haven't even been to the upper storey. You had better get this survey finished.\n\n*choice\n  #Have a token look around upstairs and scram.\n    Yeah, there are four bedrooms. They all have beds. You're done.\n    *set worklife +1\n    *page_break\n    *goto survey_complete\n  #Put in the extra hours to get a proper feel for the place.\n    The bedrooms are pretty much what you expected: roomy, draped in dust sheets and decorated by someone's great-grandmother. You eye the rickety four-poster in the master bedroom and wonder how many times Audrey granted her maidenly charms on its fragile surface.\n    \n    You settle on a faded window seat and take a moment to look at the garden.\n    *if (special = \"fengshui\")\n      Whoever laid it out bought their compass at Uncle Shun's Haphazard Energy Boutique. \n      *goto window_seat\n    *elseif (special = \"garden\")\n      Those flowerbeds really need attention.\n      *goto window_seat\n    *label window_seat\n    It might be a good idea to market this house as possessing \"the faded glamour of a bygone age.\" Come to think of it, that sounds like The Crocodile. Reluctantly, you push yourself up from the seat. It feels like a really peaceful place.\n    *set worklife -1\n    *page_break\n    *goto downstairs\n  #Include the attic space in your upstairs survey.\n    The bedrooms are pretty much what you expected: roomy, draped in dust sheets and decorated by someone's great-grandmother. You eye the rickety four-poster in the master bedroom and wonder how many times Audrey granted her maidenly charms on its fragile surface.\n\n    A trapdoor above you in the back corridor gives access to the attic but it's well out of reach. You try a few of the cupboards. They contain musty pillows and blankets, but nothing resembling a ladder.\n\n    One of the bedrooms had a high stool. You visualise the arc it would describe, should you climb upon it and topple towards the hall landing. Yup, you'd go right over the edge of the balcony.\n\n    You look out of the window at the setting sun, and declare your survey complete. Roof assessments are best done by roofers anyway. \n    *set activity +1\n    *set worklife -1\n    *page_break\n    *goto downstairs\n\n*comment #################################################################\n*label downstairs\nBack in the hall, you study your plan of the upper and lower floors. It seems complete apart from a void behind the panelling of the staircase.\n\nThat's rather creepy. Perhaps this is the secret of the house—a murder space hidden for generations, choked with skeletal remains, exerting a strange, unseen psychological pressure on prospective tenants. \n*if (special = \"forensic\")\n  You remember an episode of CSI about exactly that situation.\nThis would explain the low rent, and be yet another reason for Audrey's failure to…oh, hang on.\n*comment endif\n\nYou tap the wood which fronts the void until you find a piece of panelling that moves. Behind are the stairs to the cellar. Oh well, they had to be somewhere. You make a note to refer to this as the \"secret door\". People love that crap.\n\nThe cellar stairs are very dark.\n\n*choice\n  #Conduct a full survey of the cellar.\n    You brush spiderwebs out of the way and descend to the cellar floor, playing your torch beam around rough stone foundation walls. Your feet bump a little collection of dusty jars and make them clink. You're grateful for the light from the hall.\n\n    The cellar appears to have four connected chambers under the body of the house. Sadly there are no marketable resources stored in any of them. You make a mental note to big it up as an \"ideal wine cellar\".\n\n    A soft sound from a distant corner, like dry stones rubbed together, distracts you. Actually, it would be more accurate to say it scares the holy bejeezus out of you…but it might be rats. It's your professional duty to determine whether vermin control is required. You venture uneasily towards the source of the sound.\n\n    It comes again, but this time it's all around, a thick, rasping whisper which resonates from every wall, its dry echoes chilling the blood in your veins.\n\n    \"${name},\" it breathes.\n    *set activity +10\n    *comment      #Boldly investigate, like all the victims in bad horror films.\n    *comment        You've been in enough creepy old properties to know that the mind plays tricks on you and there is nothing to fear. You need to be professional about this. You calmly step forward, torch in hand.\n    *comment\n    *comment        The hall door slams abruptly, cutting off all natural light. Unfortunately this sudden, deafening noise startles you into dropping the torch. The bulb smashes and you are plunged into darkness.\n    *comment\n    *comment        Disorientated, you stagger back, feeling for the wall. But something breathes on the back of your neck as it reaches for you. And its breath is cold.\n    *comment\n    *comment        *page_break\n    *comment        *goto_scene death\n    *choice\n      #Well, this concludes my survey.\n        You leave the cellar at a professional pace.\n        *set worklife -8\n        *goto survey_complete\n  #Have a token glance around down there.\n    The cellar stairs creak beneath your feet. Spiderwebs hang across your path. There is an electric light switch on the wall, but flicking it does nothing. You play the beam of your torch around rough stone supporting walls. It doesn't reach to the extremities of the cellar.\n\n    You can see enough to work out the layout, and you are imaginative enough to think about the cellar door slamming behind you, shutting out the light from the hall, and the beam of your torch fading slowly…slowly… \n\n    Quickly, you return to the hall and write \"generous storage\" in your schedule.\n    *set activity +2\n    *goto survey_complete\n\n  #Return to the office.\n    Yeah, you don't get paid to investigate dark cellars in long-empty houses by yourself, particularly not at the precise moment the sun goes down. There's a cheerful pub down the road from the office, and one of its stools has your name on it.   \n    *set worklife +1\n    *goto survey_complete\n\n*comment #################################################################\n*label survey_complete\n\nYou drive back to the office through overcast streets. A cold wind whips around you as you leave the car, and you're thankful for the shelter of the office. It doesn't take long to complete your outstanding contracts.\n\n*if (vanished = false)\n  Russell is at his desk. You give the back of his head a meaningful look that promises future menace.\n  *goto next_chapter\n\nRussell has not shown up back at the office. You try his mobile but it goes immediately to voicemail. You make an actual physical note detailing various indignities you will visit upon him when he returns.\n\nHowever, the next day, he doesn't show up for work. You inform The Crocodile and she phones his landline. \"It's just ringing out,\" she spits. \"What was he doing the last time you saw him?\"\n\n*fake_choice\n  #Admit you sent him to survey Crowther Terrace.\n  #Invent a story about a giant robot convention in town.\n  #Claim to have no idea.\n\"Hm. Well I'll tell you how we're going to handle this. If he doesn't show up by the end of the week, I'm going to send him a letter of dismissal and think no more about it. One less mouth to feed. But don't think that gets you off the hook. His pay was a fraction of yours.\"\n\nWow. Your salary could hardly be described as generous. \"But shouldn't we inform the police? As a matter of legal responsibility?\"\n\n\"No.\" Her jaw closes to signal the end of the matter.\n\n*choice\n  #Forget about Russell and concentrate on Crowther Terrace.\n    It's hard to put aside thoughts of Russell, the tedious TV programmes he chattered about and his incomprehensible hairstyle. But you manage it after about five minutes.\n    *set ruthlessness +3\n    *goto next_chapter\n  #Disobey The Crocodile and phone the police.\n    \"${name}? I recognise that look in your eyes. If you go behind my back and call in the police, you'll make my next personnel decision a very easy one.\"\n    You hesitate.\n\n    \"Let me show you how this works.\" The Crocodile rises to her feet, hooded eyes glinting. She reaches for a personnel file and a permanent marker. With two swift slashes she draws a large red X across the file. One leg of it scores out a smiling photograph of Russell.\n\n    \"You know what this means, ${name}?\"\n\n    You do.\n    *set worklife %-10\n    *page_break\n    *goto next_chapter\n  #Obey The Crocodile, but check in on Russell in your spare time.\n    Over the next few days, you find the time to drive over to Russell's flat a couple of times. He never answers the door, or responds to his landline or mobile. When you check the third time, you know you should phone the police.\n\n    You also know, however, that you will now look mighty suspicious, having not called them in at the time. \n\n    You tell yourself Russell is probably deep into one of those games of Dungeons & Dragons where the participants forget to eat or sleep. He is better off without the Moving Target Estate Agency anyway. As you drive off, your conscience gives a twinge. It won't be the last time.\n    *set worklife %-15\n    *page_break\n    *goto next_chapter  \n\n*comment #################################################################\n*label next_chapter\nYour file on 57 Crowther Terrace covers the basics and includes a degree of creativity which is the hallmark of a true real estate professional. It could be a spacious family residence, a prestigious address for corporate clients, or a student residence of legendary proportions.\n\nThe advertisement will go into next week's newsletter, and before that, it will appear on the Web and be syndicated all over Scotland. When the enquiries come in, you'll show The Crocodile what you can do. You've got the story, you've got the location, and you've got the property they want.\n\nYou're ready for your first tenants.\n\n*finish\n\n", "tv": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette ten\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nYou get into the office early in the morning and call up your spreadsheet. You have raised…£${money} with Crowther Terrace. It's not bad, given that the experience has been like reading the complete works of Stephen King in one sitting. But is it enough to win The Crocodile's challenge? There is less than a month left.\n\nThe office door creaks and ${rival} comes in, wearing that double-breasted camel coat you hate so much. \"Morning,\" ${he} trills to the office. Then ${he} settles down to a light breakfast of hand-made granola and organic yoghurt, flicking up a real estate newsfeed on the computer. You. Hate. $!{him}.\n\nAnd suddenly you realise there is one approach you have not taken. You haven't gone to ${rival}'s property and sabotaged it.\n\n*page_break\n\n*if (rivalhouse)\n  You drive over to Memphis Crescent and locate ${rival}'s test property, a charming detached townhouse in small but lush grounds. A wave of rage passes over you at the depth of unfairness in this challenge. You park up and sit in your car for a couple of hours, like a private eye. You see various people come and go: a middle-aged woman, an elderly man, and two twin girls wearing tennis outfits. It looks like ${rival} may have dealt with the conversion issues by letting the property to three generations of the same family. That spells one thing: steady rent.\n\n  How will you sabotage this arrangement?\n\n  *fake_choice\n    #Put threatening anonymous letters through the letterbox.\n    #Pose as an official from Environmental Health and imply the house is infested with rats.\n    #Use liquid latex to fake a weird skin disease, then pretend to be a former resident who caught it from the house.\n    #Construct a map that shows ley lines and arcane masonic symbols, drawn in a pentagram around Memphis Terrace, and approach the householders with conclusive proof that their house is a daemoniacal epicentre.\n\n  You're on your way over to Morningside to purchase the necessary supplies, when your phone rings. It's The Crocodile.\n\n  *goto tv_offer\n\n*else\n  You need to get ${rival} out of the office so you can search ${his} desk for details of the test property. The best thing would be a phone call—your mobile number won't show up on the office landline. You wait until your usual coffee time, then walk up to the Royal Mile and find a quiet close. It is undergoing renovation and you are able to conceal yourself behind scaffolding. You won't be disturbed as you weave your cunning deceit.\n\n  What deceit should that be?\n\n  *fake_choice\n    #Pose as The Crocodile with a bad throat infection.\n    #Pretend to be the executor of a lucrative will that names ${rival}.\n    #Claim to be a writer from Estate Agent Quarterly, wanting to do a profile of the top agents in Edinburgh.\n    #Put on a Highland accent and claim to be a rich teuchter ready to set up a lucrative estate agency in the capital, who has carefully asked around and believes ${rival} is just the person to be its first director.\n\n  Just as you begin to dial, your phone rings. It's The Crocodile.\n\n  *goto tv_offer\n\n*comment #################################################################\n*label tv_offer\n\nShe's sounding polite, almost pleasant, which means she has a client in the room with her. \"When can you be back in the office, ${name}? I have a lady here from a television company who has a proposal relating to one of your properties.\"\n\nYou're pretty sure you know which property she's talking about.\n\nMere minutes later you arrive in her office to find a pale-looking media blonde in a short suit maintaining uneasy small talk with The Crocodile. Your boss is topping up her teacup. The media woman seems to have shifted the tea to a position on the desk where the vapours drift away from her face.\n\n\"I must go and terrorise some of the junior staff,\" The Crocodile says with a toothy grin. The media woman smiles because she thinks it's a joke. \"$!{name} here will take care of you.\"\n\nShe heads out with the remains of her tea, humming a cheerful melody. You don't bother looking around for a spare cup for yourself.\n\n*page_break\n\n\"I'm Madeleine Spector, from Evocative Productions. Pleased to meet you.\"\nThe woman seems to relax a little. \"We do mostly entertainment series for independent TV. Perhaps you've seen 'Antique Racers' or 'Office Combat'? Or the new format where members of a popular orchestra are voted off one by one?\"\n\nYou can't quite recall having seen any of these.\n\n\"Well it doesn't matter. You'll have heard of our flagship, I think. 'Spook Central'? We send a team of investigators to a haunted house with a camera crew. You know the idea. We have a historian, a psychic, a scientist and a couple of screamers. Well, we're overdue for one set in Scotland and my researchers picked up the house at…\" she consults her notes, \"…57 Crowther Terrace. I understand from Mrs McCorquodale that the house is already vacant? Excellent. Well, I'm prepared to offer the sum of £5000 for two weeks' access. Would that be acceptable?\"\n\n*temp price\n*set price 5000\n\n*comment #################################################################\n*label negotiation1\n\n*choice\n  #Accept a fee of £${price}.\n    \"Excellent.\" Ms Spector's face brightens and she brings a contract from her case. You read it carefully and delete a couple of unfavourable clauses which relate to additional access after their two weeks are up. The corner of her mouth twitches upwards. You each recognise that the other is used to screwing people over for a living.\n\n    That done, she writes you a cheque for £${price}. It looks good. You shake her hand and see her to the office door.\n\n    The Crocodile has been lurking by the window. She comes over and you show her the cheque. \"Good work,\" she says.\n    *set worklife %+5\n    *set crocodile %+5\n    *goto tv_start\n  #Try to negotiate the price up by 'power talk'.\n    You shift into your tougher persona, much respected by visiting American executives. Ms Spector narrows her eyes, gets out a contract, and pushes back her cuffs. She is no stranger to this process.\n\n    *rand bomb 1 100\n    *if (bomb \u003c ruthlessness)\n      You emphasise the consquences when an active property appears on television, and complications in subsequent tenancies arising from the air date being much later than the end of production.\n      *set price +1500\n\n      After five minutes of this Ms Spector agrees to raise the fee to £${price}.\n\n      *set ruthlessness %+5\n      *goto tv_start\n    *else \n      You emphasise the consquences when an active property appears on television, and complications in subsequent tenancies arising from the air date being much later than the end of production.      \n      *set price -500\n\n      Ms Spector produces figures which show the profitability of their featured properties goes up in the long term. You find it difficult to explain to her why the long term is no good in this case.\n\n      After five minutes you seem to have agreed that the agency will pay certain expenses which lowers the effective fee to £${price}.\n\n      *set ruthlessness %-10\n      *page_break\n      *goto tv_start\n  #Try to negotiate the price up by discussing the merits of the house.\n    You slip back into a familiar spiel about all the features 57 Crowther Terrace has to offer and point out many little ways it will save the production money.\n\n    *rand bomb 1 3\n    *if (bomb = 3)\n      *set price + 1000\n      Ms Spector taps her pen against her perfect teeth and nods. She agrees to raise the fee to £${price}.\n      *goto tv_start\n    *else \n      Ms Spector smiles. \"We have our own comprehensive mobile facilities for the cast and crew. I wouldn't be doing you a favour by letting you be responsible for every one of their little demands. Trust me.\"\n\n      Thinking about your previous tenants and their multitude of demands, you acknowledge the point and agree to £${price}.\n      *set worklife %+5\n      *goto tv_start\n\n  #Play hard to get.\n    These TV people have huge budgets. You dwell on the inconvenience of their presence and the compromises that will have to be made. Ms Spector acknowledges some points but appears increasingly frustrated. At one point she looks you in the eye and says, \"Are you simply playing hard to get?\"\n\n    You launch into another discussion of tenant retention and she says, \"Wait a moment, please.\" She gets up and leaves the room.\n\n    Two minutes later, The Crocodile comes in with her teeth grinding at the back. \"What do you think you're doing, ${name}? Sign the damn lease and take her money before they go across the street!\" She fetches Ms Spector back into the room and holds a fake smile until you sign the contract.\n\n    \"[i]Thank[/i] you,\" says Ms Spector, and sees herself out.\n\n    *set crocodile %-5\n    *set worklife %-5\n    *goto tv_start\n\n*comment #################################################################\n*label tv_start\n\nThings are slow around the office for a bit. The budget comes around and The Crocodile makes a few pointed remarks about finalising her challenge in a fortnight. $!{rival}'s relaxed attitude does not change and this only deepens your misgivings. You hold on to the knowledge that the TV people are arriving and their £${price} is already on deposit.\n*set money +price\n\nTo relieve the tension you drive down to Crowther Terrace and cruise the street as slowly as you dare. A van is parked outside the gates. You get a glimpse through its back door and see stacks of racks and trolleys. A young Asian woman is walking around with two runners and a clipboard while bearded men smoke on the porch. Lights glint behind the windows.\n\nJust for a moment, you remember being a kid and being excited when a fair or a circus came to town, watching them erect the tents and stalls the day before. The anticipation was always better than the actual events.\n\nBack in the office, there is a message from the production office. It seems they want you to feature in the programme!\n\n*page_break\n\nYou weigh up the pros and cons of appearing on 'Spook Central'. It might be fun, of course, but you'll be hearing about it for the rest of your career…and they edit these programmes to make people look stupid…and the camera adds five pounds…\n\nThe Crocodile overhears you discussing it with a junior. \"For God's sake, suck it up and phone them,\" she snaps. \"They'll pay you an appearance fee. Soon you might be needing every penny you can get.\"\n\nYou make the appointment and drive down to Crowther Terrace for a shoot that evening. The front of the house now features large lights and reflectors. Crew shift back and forward.\n\nA grizzled woman from the costume department meets you on the front path. How have you dressed for your TV appearance?\n\n*choice\n  #Your smartest suit.\n    \"This isn't the Royal Wedding we're covering here,\" she says. \"I can't have you showing up the presenters. Do you mind if I rough this up a bit?\"\n\n    Given it is your best suit, you actually do mind. You compromise on a different jacket from her stocks. It's a little short for you. \"No one will notice on the screen,\" she says. In the mirror, you see your wrists stick out too far. Before you can fix it, you are hustled towards the cameras. You try to hunch to hide the problem.\n    *set worklife %-10\n    *goto guess_who\n  #Standard suit; typical estate agent look.\n    \"Just what we want,\" says the woman. \"Off the peg, yesterday's style, and a bit stiff. Makes my life easier. Thank you.\" She points you towards the cameras.\n    *set worklife %-5\n    *goto guess_who\n  #Dressed down; smart but casual.\n    \"We need you slightly more formal,\" she says. \"The audience has to understand on an intuitive level that you're the estate agent. Here, pick a shirt.\"\n\n    You select a blue shirt which sets off your jacket rather nicely. You make a mental note to forget to return it at the end.\n    *set ruthlessness %+5\n    *goto guess_who\n\n  #T-shirt and jeans.\n    \"No. No.\" The woman waves her hands and checks her watch. \"We need you in a suit. What's your waist size? No, I've got nothing in that. How far away do you live? Go. Go! I'll tell them to put back your scene.\"\n\n    You feel rather deflated as you go home to change.\n    *set worklife %-5\n    *set ruthlessness %-10\n    *goto guess_who\n\n*comment #################################################################\n*label guess_who\n\nYou feel very self-conscious as you step up to the porch. You've been to this house so often now, and yet here it is, completely changed, lights rigged in the corners, people bumping around with sound booms and massive digital recorders. You look for Ms Spector but she does not appear to be on the crew.\n\nA makeup girl grabs you, stares at you critically, and says, \"Close your eyes.\" When you obey, she dusts your face with powder. The brush is soft and strangely relaxing.\n\nA chisel-faced boy with a clipboard flips a couple of pages and says, \"Who are you?\" You explain you are the estate agent. \"Estate agent?\" he says, and points a thumb back over his shoulder. \"We're shooting with the estate agent right now.\"\n\n$!{rival} is here? Taking the glory? You're going to kill ${him}. You push past the clipboard boy and into the parlour. But it's not ${rival}. You stop short when you see who it is.\n\n*page_break\n\nAudrey is standing under the lights, in a green suit with a hideous collar, talking to a slick woman in a brown leather coat. A bald man in a lab coat stands nearby. They all turn to look at you. The clipboard boy tumbles into the room behind you.\n\n\"$!{name}!\" Audrey says.\n*if (out_of_chair) \n  She looks genuinely pleased to see you.\n  *set worklife %+10\n*comment endif\n\nA leathery old snake in a Barbour jacket yells \"Cut! Who the hell is this?\"\n\nThere follows a tedious explanation of your respective involvements with 57 Crowther Terrace and some introductions. The woman in brown is Katie, the presenter. The Barbour man is the director and the bald guy is some rent-a-boffin.\n\nWhat attitude will you take towards Audrey?\n\n*choice\n  #Warmth towards a departed colleague.\n    You do feel a certain kinship with Audrey as possibly the only person on Earth who could entirely share your pain at having to manage this creaking deathtrap. The director sees your rapport and decides to include both of you.\n    *set ruthlessness %-10\n    *goto on_camera\n  #A polite neutrality.\n    You give Audrey a quick smile. \"We don't need two estate agents,\" spits the director, and glares at the clipboard boy.\n\n    \"Hold on, Magnus,\" says Katie. \"We've got before and after here. Two halves of the story. Let's shoot some scenes with the two of them and do separate interviews later.\" The director pauses, then nods. Katie gives you a wink as she turns away.\n    *goto on_camera\n  #Passive-aggressive.\n    You find yourself unaccountably hostile to Audrey. None of what has happened to you is her fault, unless you count being a dreadful estate agent and thus getting herself fired. But your time with this house has worn down your nerves, and you had hoped never to see her again.\n\n    Audrey seems oblivious to your tone. But the director seems to sense your hostility and gives a dark little smile. \"OK, can we shoot wider? Come closer to the group please, Estate Agent Number Two. Thank you.\"\n\n    *set worklife %-10\n    *set activity +1\n    *goto on_camera\n\n*comment #################################################################\n*label on_camera\n\nThe director waves everybody into place. \"And…action!\"\n\n\"So, Audrey.\" Katie leans close. \"This is the first time you've been back in the house since your experiences here. How do you feel?\"\n\nExperiences? You choke back a cutting remark. Audrey's experiences here looked like fumbling porn movies. But the camera guy goes for a slow zoom on her and the nation awaits what she has to say.\n\n\"It is really scary,\" Audrey says. There is a long pause during which Katie frantically wiggles her eyebrows for more. \"But I suppose…it's not too bad because there's a lot of people here this time. And all these lights.\" She gives an awkward smile.\n\nAll the lights go off. At least three people scream.\n\n*choice\n  #Hold steady.\n    It's just a TV gimmick. You stand motionless while the people around you howl like idiots. When the lights go back on, you will look cool and unruffled.\n    *set ruthlessness %+10\n    *goto lights\n\n  #Adopt a defensive position.\n    You never quite know what you're going to get with this house. You drop to a lowered stance, listening carefully for actual danger among all the panic.\n    *set activity +1\n    *goto lights\n\n  #Join in with the screaming for fun.\n    It's all good showbiz. You let rip from the throat with a good rising howl which ripples across the others. It's strangely cathartic.\n\n    *set worklife %+5\n    *goto lights \n\n\n*comment #################################################################\n*label lights\n\nThe lights flicker back on. Katie is making what you can only describe as an exaggerated grimace of palpably fake horror. Audrey is biting her nails. The lab coat guy is looking from side to side like a startled weasel.\n\nYou glance at the director to see if that light effect was rigged, but he gestures wildly to continue the scene. Katie gathers herself. \"That was very frightening. Did that happen to you before, Audrey? Can you explain it?\"\n\nAudrey blinks a couple of times and moves her mouth like a goldfish.\n\nKatie turns to you. \"I can't explain it either. And now we have ${name} here, who is the current letting agent for the property. Have you had any strange experiences in this house?\"\n\n*choice\n  #Talk about the students as if they were possessed.\n    You try to craft a haunted narrative about four nice posh kids who came to the house and were corrupted. However, you can't help remembering all the irritating things they did, and your story comes out as more of a rant. Katie gives a slight frown.\n    *set activity -1\n    *goto upstairs\n\n  *if (clooney) #Talk about the disintegration of the Hazelwoods.\n    Without using their name, you talk about a corporate couple who tried to make this a base for their business and saw their relationship destroyed as a result. Your conversations with Mr Hazelwood lend it a certain authenticity and out of the corner of your eye you see the director nodding.\n    *set activity +1\n    *set worklife %+5\n    *goto upstairs\n\n  #Talk about the disappointing theatrics of the squatters.\n    You try for a jovial remark about the squatters and their disorganised antics. It totally breaks the tone of the exchange. Katie looks at the director and you can see from the twist of his jaw that they're going to cut you out in the edit. That might mean no fee.\n    *set worklife %-10\n    *goto upstairs\n\n  #Talk about Mrs Fairbrother and the seance.\n    You talk about the ghost hunter and the medium he brought in. The crew appear to be lapping this up so you exaggerate a little. Nothing too dramatic…just balls of light hanging in the air and a ouija board on which all the letters turned to X.\n    *set ruthlessness %+10\n    *set activity +2\n    *goto upstairs\n\n  #Make up some crap about a figure who walks through walls.\n    You talk about an almost headless grey knight who appears after dark and seems to march a fixed path. You get into a theory that he was badly decapitated. It's only afterwards that you suspect you may have lifted his description from a Harry Potter book. Still, hopefully nobody will notice.\n    *set crocodile %-5\n    *goto upstairs\n\n*comment #################################################################\n*label upstairs\n\n\"We haven't had a scientific perspective on this yet,\" says Katie and turns to the bald guy in the lab coat. \"Everard, what's your opinion as a scientist?\"\n\nYou don't catch the beginning what Everard says because your entire brain is recoiling at the thought of parents who would abuse their child with the forename 'Everard'.\n\nJust then, three LOUD bangs sound from the ceiling, one-two-three. It sounds like a rhino stomping in one of the bedrooms.\n\nKatie stares for a moment, then sprints to the hall, her coat flapping behind her. She disappears up the stairs, trailed closely by the cameraman, the director and the sound guy, who is trying not to smack his microphone boom against the staircase.\n\nAudrey looks at you, wide-eyed.\n\n*page_break\n\nYou've been with this house too long. You've got to know. You follow them up the stairs.\n\nThe crew stand around in one of the bedrooms. Their portable lights flick around the old-fashioned furniture, creating a shadowy, creepy environment although nothing is actually happening.\n\n\"It's time we brought in our psychic,\" says Katie. \"Dennis, are you picking up anything in here?\" \n\nAn old guy with eye makeup, fake tan, a burgundy silk waistcoat and an obvious wig slides into shot. \"There is a presence here,\" he says. \"It's been here a long time. If I could have a moment of quiet, it may come through.\"\n\nEverybody hushes and stares at this withered fraudster. You wait for him to begin twitching and speaking in tongues. But because you're in the doorway, you're the only one who notices the dim glow from behind you. It comes from around the edges of the attic trapdoor. It's a pale green, and it appears to be, well…pulsating.\n\n*choice\n  #Draw the crew's attention to the weird trapdoor light.\n    You cough loudly and point at the trapdoor. The sound guy glares at you, then notices the light. The moment spreads silently around the crew. All of a sudden there is a riot of movement and Katy charges out to the landing and the crew attempt to follow her while keeping a shot. You are barged out the way.\n\n    The psychic looks miffed to be upstaged by a green light. \"I think it's coming through now,\" he calls. Nobody listens.\n    *page_break\n    *goto attic\n\n  #Investigate by yourself.\n    The weird light pulses above your head, out of reach. You remember a dressing table in one of the other bedrooms and drag it into place. Then you clamber up on top of it. The strange green light is close to your face now, almost inside your face. You feel like it is painting the back of your eyeballs.\n\n    You become aware of the banister behind you, and the drop to the ground floor. It doesn't seem threatening. It feels like you could drift down there, slowly, gently, restfully…\n\n    The sound guy comes charging out of the bedroom. He trips and whacks you on the side of your head with the boom. It knocks you off the table and onto the floor at the top of the stairs. \n    *set activity +1\n    *page_break\n    *goto attic\n\n  #Do nothing.\n    The psychic dithers for a bit.\n    *if (housestory = \"doctor\")\n      \"I'm seeing a doctor living here,\" he says. \"A researcher.\n      *goto psychic_crap\n    *elseif (housestory = \"soldier\")\n      \"I'm seeing a soldier,\" he says. \"Wearing First World War uniform.\n      *goto psychic_crap\n    *elseif (housestory = \"thief\")\n      \"I'm seeing a well-to-do gentleman,\" he says. \"But he's not what he seems.\n      *goto psychic_crap\n    *else \n      \"I'm seeing a landlord,\" he says. \"A determined businessman.\n      *goto psychic_crap\n\n*label psychic_crap\nHe wants to give us a message. It's coming through…it's coming through…\" He stiffens and lets his eyes roll back. His voice drops an octave. \"My name is…my name is…\"\n\nBut the director has noticed the glowing trapdoor. He grabs the sound and light guys and pushes them out the bedroom door.\n\nThe psychic notices the disturbance and comes out of his trance with a frown.\n*set worklife %+5\n*page_break\n\n*comment #################################################################\n*label attic\n\nThere is a momentary scramble beneath the trapdoor. A runner is dispatched to fetch some staging steps and returns in the company of a hard-faced Health and Safety woman. She looks at the banister, and takes out a pen and notebook. She begins to talk to the director, shaking her head and gesturing with the pen. The director makes fists of frustration. Meanwhile the sound and light techies are staring at the trapdoor. Green light is evidently a very big deal.\n\nKatie wrenches the steps from the hands of the runner and climbs them. The Health and Safety woman's eyes go wide. Katie stretches her hands up until her fingers brush the surface of the trapdoor, feeling for the right point. Then she pushes.\n\nA roar and a howling wind rush through the landing. \n*if (activity > 30)\n  The Health and Safety woman is blown over the banister and plummets to the floor below.\n*comment endif\n\nKatie is lifted so fast you hardly see it. First she is standing there; then her boots are all that pokes from the trapdoor; then she is gone and the door slams closed. The green light goes out. Then all the crew's lights go out again.\n\nThe house is plunged into darkness.\n\n*page_break\n\nThere is the unmistakable sound of an entire TV crew holding its breath in pitch darkness. Then comes the moan, a deep hollow sound which reverberates throughout the hall and shakes the floorboards. One of the crew swears. Another begins to cry.\n\nThen the green light is back. It picks out frightened faces, crouched on the landing. But this time it's not from the landing; it's from the bedroom they were shooting in earlier. The entire ceiling coruscates, an unearthly yellow-green which swirls towards the centre.\n\nAudrey and the psychic are still in that room. A breeze blows past your ears as the ceiling begins to bend towards them in a hideous, pulsating vortex. Audrey gapes, staring upwards, paralysed. Her feet lift from the ground, one inch, two inches.\n\n*choice\n  #Rush in and grab Audrey.\n    You push through the mob and run at Audrey through a green haze. She is now hovering two feet above the ground. You grab her around her ample thighs. For one awful moment your own feet are dragged from the ground and you feel the two of you suspended in space. Then your momentum carries both of you out of the vortex. You crash against a dresser. The vortex crackles and snaps back to the ceiling. The glow slowly fades.\n\n    A cameraman rushes over to where you are lying with Audrey, still rolling. Here comes your fifteen minutes of fame.\n\n    *set ruthlessness %-20\n    *set worklife %+15\n    *set crocodile %-5\n    *page_break\n    *goto saved\n\n  #Shout at the psychic to help her.\n    A hazy green stain slips through the air inside the room. You yell at the psychic, waving your arms. He backs against the wall, away from Audrey, who is now firmly caught in the vortex, rotating, arms flailing, her mouth hanging open.\n\n    As you watch, he tries to dart left, then right, to evade the spreading luminescence, but it fills the air. He turns to the window, yanks it open and leaps out. A second later, even from the hall, you hear an audible CRACK as he hits the ground.\n    *set worklife %-5\n    *goto audrey_pop\n  #Sit back and let the house do its thing.\n    This is the footage they wanted, after all, and this will put 57 Crowther Terrace on the map for eternity…you're ready to be done with it. Part of being a professional estate agent is knowing when to stand back and let the client soak it up.\n\n    Audrey is firmly caught in the vortex now, rotating in mid-air. Her arms flail, her little legs kick, and she gives a rollercoaster wail.\n\n    In the background, the psychic faints.\n\n    *set ruthlessness %+15\n    *goto audrey_pop\n\n*comment #################################################################\n*label audrey_pop\n\nAudrey's rotation speeds up until she seems to be a blur of mouths, eyes, limbs and crazy hair. Abruptly, with an immense sucking sound, she is drawn towards the ceiling and vanishes in a burst of sickly light. Not [i]through[/i] the ceiling; she vanishes about a foot [i]below[/i] the ceiling.\n\nThe cameraman is still rolling. Seconds pass, then minutes. Finally the lights go back on, and all that is left is a slight tang of singed hair.\n\n\"Cut,\" murmurs the director.\n\n*page_break\n*goto goodbye_forever\n\n*comment #################################################################\n*label saved\n\nYou help Audrey downstairs and out the front door. She staggers along the path to the road, shaking all the while.\n\n\"I'm going home,\" she splutters. \"I'm never coming back here.\"\n\nYou make sure she gets to her car. After she drops the keys in the gutter three times, you take them from her and call a taxi.\n\n\"Thanks for what you did,\" she says, before you close the door of the black cab. \"If you ever want to set up that estate agency with me, you just have to say.\"\n\nYou hold a frozen smile as the taxi drives off.\n\n*page_break\n\n*comment #################################################################\n*label goodbye_forever\n\nYou sit out on the porch for a few minutes, getting some air while the crew try to understand what just happened. It's a nice porch, and it must have been a beautiful place to watch the sunset in simpler times.\n\nThe makeup girl eventually comes out and tells you they have managed to get into the attic and search it. \"There was nobody there,\" she says. \"Just dusty old junk.\"\n\nCarefully, you ask how she feels about Katie's disappearance.\n\n\"You know how she seems really good fun on the show? And she's kind of flirty while you're shooting?\"\n\nYou had noticed that.\n\n\"Well, she was a total bitch to the crew.\" The girl gives a satisfied nod and heads back to her car.\n\n*page_break\n\nFor a moment, you catch the scent of smoke.\n*if (activity \u003c 40)\n  But it's only something exotic from the garden. You stand and look at 57 Crowther Terrace, feeling tired to the bone. You wish the damn place [i]would[/i] burn down.\n\n  *finish\n*comment endif\nThen you notice a green glow flickering on the railings. It's a reflection. You move off the porch and look back at the house.\n\nThe upper storey is ablaze with weird fire. It licks along the gutter, and dances around the window frames. The flames have an ugly green tinge. Smoke billows from the attic space. You've had the feeling the house was building up to something…this is it.\n\nThe crew come piling out, hustling equipment. Their faces are fixed, uncomprehending. People with clipboards chatter and tick off names. It takes ten minutes for the fire brigade to turn up. A burly firefighter thrusts you out of the way and opens up with a hose. It seems to make little difference.\n\nYou stand there and watch 57 Crowther Terrace burn, green flames leaping at the moon, until only a shell is left. A paramedic tries to usher you away but you shake her off.\n\nFive minutes later, your phone rings.\n\n*page_break\n\nIt's The Crocodile. Why is she calling you at this hour?\n\n\"Ah. ${name}. I am about to do you a very great favour.\"\n\nYou cannot have heard that correctly. There must have been something hallucinogenic in the smoke from that green fire.\n\n\"I have found you a tenant. An acquaintance of mine from London—a titled peer, no less. I want you to drop whatever you're doing and get round to 57 Crowther Terrace. Get the place shipshape. Every room! Work through the night if you have to. I shall show the property personally at 9.30am. Make sure I won't be embarrassed by its condition.\"\n\nYou open your mouth to explain what has happened to the house. Then you look at its gutted, blackened shell, the fragments still dancing with tiny green flames, and the column of smoke rising into the sky. You remember tomorrow's newspaper features a jobs page.\n\nYou smile and assure The Crocodile her viewing will go without a hitch. \n\n*set worklife %+10\n\n*page_break Final score\n\n*goto_scene ending\n\n"}};
