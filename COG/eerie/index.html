oad, you know what I'm saying? It's hearts and minds. Hearts and minds.\" He yawns, farts, and heads upstairs.\n\n    You don't get the impression that you achieved anything there.\n    *page_break\n    *goto multi\n\n  #Point out that their costumes might get damaged during any forced eviction.\n    You prowl the house until you find a girl sewing. From the colour of the fabric and the gold runes you gather she is constructing some kind of woodland sprite outfit. You settle down to discuss the depiction of Arwen in the [i]Lord of the Rings[/i] films and she becomes excited. It is obviously one of her favourite subjects.\n\n    Once you have exhausted your stock of synonyms for \"graceful\" you contrive to look sad. Elf girl notices and asks you what's wrong. You talk passionately about damage done during previous evictions, and how much work has gone into the costumes. You reassure her that she probably still has \"a day or two\" before the studded boots of the sheriff officers tear through her fine stitches.\n\n    As her eyes go wide, you head off with a cheery wave.\n\n    *set resistance -1\n    *set ruthlessness %+5\n    *page_break\n    *goto multi\n\n  #Be honest about The Crocodile, her challenge, and how your future is on the line here.\n    You go into the parlour, pull up a stool and turn off the television. There is a half-hearted moan, but you adopt an open stance and begin your story. It starts with the abuses heaped upon you as a junior at the agency, features a lot of appearances from ${rival} as a pantomime villain, and ends with the sleepness nights you've had about this property.\n\n    When you begin, only four of the squatters are there listening, but more drift in as you talk. You mean to manipulate them with a carefully filtered account, but you find yourself spilling the whole truth, and getting a bit tearful. It's obviously been weighing on your mind.\n\n    Your story does seem to have had an impact on what are basically nice people. By the end, a girl in a kaftan has her arm around your shoulders. \"Come back any time you need company,\" she says.\n\n    *set resistance -1\n    *set ruthlessness %-15\n    *page_break\n    *goto multi\n\n*comment #################################################################\n*label frame\n\nPerhaps you can scare the squatters off with a visit from the police. You drive to a random phone box a mile away—you don't want a fake crime report traced back to you—and ring the divisional headquarters on St. Leonard's Street.\n\nWho will you be?\n\n*choice\n  #A neighbour who has been disturbed by noise from the house.\n    The operator takes your fake name and the details of your complaint. \"I'd just like to clarify one point,\" she says. \"If you are currently being disturbed at home, why are you ringing us from a telephone box on the Meadows, a mile away?\"\n\n    You slam down the receiver and bolt from the box before they arrest you for wasting police time. You spend much of the evening watching for flashing blue lights.\n\n    *set worklife %-5\n    *page_break\n    *goto multi\n\n  #A concerned parent who thinks their daughter has been sold drugs.\n    The operator takes your fake name and the details of your complaint. She sounds a little dubious when you refuse to give an address, but you talk some crap about protecting your daughter. She assures you that the police will make enquiries.\n\n    Later that night, you sit across the road from 57 Crowther Terrace, slumped in your car with the lights off, and watch while two constables mildly harass the squatters, banging on doors and looking through windows, although they never actually enter the house. Good job.\n\n    *set resistance -1\n    *set ruthlessness %+5\n    *page_break\n    *goto multi\n\n  #A passer-by who has heard shouting and a violent struggle.\n    The operator asks for your name. When you refuse to give one, she seems a bit dubious about your report, but promises it will be investigated.\n\n    You drive to Crowther Terrace and cruise slowly past. A squad car is stopped outside the house, its lights flashing, and four police officers are standing about on the porch. Their body language is relaxed. Still, the squatters look alarmed by their presence.\n\n    *set resistance -1\n    *page_break\n    *goto multi\n\n\n*comment #################################################################\n*label terror\n\nYou go back to the car and think for a bit. It's a delicate balance, conducting a campaign of terror while retaining the good name of a respected estate agency. Still, this is why they call you a professional.\n\nThe obvious approaches to a campaign of terror start at the hardware store, costume hire or dog pound.\n\n*choice\n  #Buy a threatening power tool at a hardware store.\n    You notice a good deal on small electric chainsaws at a local B&Q, and buy one for £50. It takes six hours to charge, during which you find it difficult to settle, anticipating the rather unprofessional behaviour you are planning.\n\n    How will you conduct yourself on this visit?\n\n    *fake_choice\n      #Stand in the hall, revving the chainsaw and screaming.\n        You stand in the hall, take a deep breath and let rip. After a moment, several wide-eyed squatters lean over to look at your through the parlour doorway. Your throat quickly becomes hoarse as you try to outdo the noisy saw.\n\n      #Walk around the ground floor slowly, revving the chainsaw and staring meaningfully at the squatters.\n        Running seems like a bad idea. You pace very deliberately into the midst of the TV viewers, meeting the gaze of each of them in turn. You give the chainsaw a series of sinister bursts.\n\n      #Lurk in the garden and loom up at the windows, revving the chainsaw.\n        You see squatters through three workable windows, and appear at each in turn, pulling a ghastly face. The chainsaw glints in the moonlight.\n\n    After a bit of this you wonder if you should have got a heavier, fuel-powered chainsaw. You're getting a reaction, but you would describe it as closer to \"mild uneasiness\" than \"absolute terror\". Still, you've made your point and your only other option is to start slicing the property to chunks. You head home before the police come.\n\n    *set resistance -1\n    *set worklife %-5\n    *set ruthlessness %+10\n    *set activity +4\n    *page_break\n    *goto multi\n\n\n  #Acquire an eerie costume at a local emporium.\n    You spend some time sifting through the shelves, trying to find a character who would disturb you if they appeared in your bedroom in the middle of the night. You settle for a masked maniac with a bloodstained apron. It comes accessorised with a decapitated head.\n\n    That night, around 4am, you change in your car, let yourself into Crowther Terrace and ascend the stairs with a careful tread. For a moment you experience the curious, illicit thrill of being a masked fiend in the residence of strangers. Then you begin bursting into bedrooms, shrieking.\n\n    To your dismay, nobody seems particularly terrified. After an initial start at the loud noise, most roll over and pull the blankets over their head. One girl says, \"Bloody hell, not again, Alec.\" The beardy naked guy does not even wake up.\n\n    You return to the car, chastened and glum. This was totally not worth getting out of bed at 3am for.\n\n    *set worklife %-10\n    *set ruthlessness %-10\n    *set activity +2\n    *page_break\n    *goto multi\n\n  #Adopt an aggressive dog from a worthy charity.\n    A bloodthirsty hound racing around the house ought to put the wind up the sleepy squatters. Particularly the naked beardy guy.\n\n    You tour the cages at a charity pound, passing an array of imprisoned, cute, hairy mongrels who stare at you with needy eyes. At the end of the row is a surly bulldog with a black patch over one eye which makes him look like a pirate. He snarls from the corners of his mouth. The label on his cage reads SPIKE. He's perfect. The handler parts with him for a £50 donation and throws in a complimentary lead. She even walks Spike to your car.\n\n    *set money -50\n    *page_break\n\n    Spike sits in the back of your car staring out the window and growling at pedestrians. There is a patch of waste ground where you can take him for a walk and get to know him. You park, open the door, and reach in to attach the lead. Spike snaps at your hand. You lock eyes with the mutt and give him a stare of calm mastery.\n\n    *if (ruthlessness > 40)\n      Spike seems cowed by your personal aura of icy control. He bursts past you and charges away into the undergrowth. You spend two hours looking for him before returning to the car empty-handed. Spike is probably already causing mayhem elsewhere. You congratulate yourself on using a fake ID at the pound.\n      *set ruthlessness %+5\n      *set worklife %-5\n      *page_break\n      *goto multi\n    *else\n      Spike immediately springs at you and knocks you to the ground. AAUGH! His teeth sink into your arm. \n\n      You wrestle with him, rolling across the dirty wasteground, his teeth inches from your nose, until you are covered in mud, dog saliva, and blood from your arm. When you finally throw him off, Spike seems to lose interest and strolls off in the direction of a nearby pub, pausing only to raise one leg and mark his territory.\n\n      You suppose you should chase him, but going to hospital feels like a higher priority right now. And you won't be wearing this suit again—or what's left of it.\n      *set ruthlessness %-10\n      *set worklife %-10\n      *page_break\n      *goto multi\n\n*comment #################################################################\n*label cheerio\n\nThe next day, you drive slowly past 57 Crowther Terrace. The front door hangs open, and there is no movement from inside. You park up and investigate.\n\nThe house is trashed: cigarette butts piled on the floorboards, sofa upturned, stacks of plates piled up with slowly rotting food. You look upstairs. The beds are rumpled and some of the sheets soiled. But the squatters are gone.\n\nThe professional thing to do would be to call in a cleaning firm. But you get out the brush and mop, cloths and polish, and roll up your sleeves. For some proprietorial reason you want to do this yourself. You didn't make any money from these \"tenants\". It's not going to happen again.\n\n*finish\n", "startup": "*title For Rent: Haunted House\n*author Gavin Inglis\n\n*scene_list\n    startup\n    survey\n    family\n    students\n    corporate\n    squatters\n    journalist\n    band\n    ghosthunter\n    tv\n    climax\n\n*comment global\n*create crocodile 40\n*comment of 100 -- your approval rating with the boss\n*create name \"Sharon\" \n*create haunting 1\n*comment the nature of the disturbance changes from game to game\n*create money 0\n*comment how much you have taken from Crowther Terrace\n*create ruthlessness 30\n*comment of 100\n*create worklife 50\n*comment of 100 -- work/life balance\n*create activity 10\n*comment of 100 -- haunting activity level\n*create rent 900\n*comment pounds per month\n*create rival \"Angus\"\n*comment rival's name\n*create him \"him\"\n*comment rival gender pronoun\n*create his \"his\"\n*comment rival gender pronoun\n*create he \"he\"\n*comment rival gender pronoun\n*create special \"forensic\"\n*comment professional speciality (garden, fengshui)\n*create housestory \"doctor\"\n*comment which bullshit story (thief, doctor, truth)\n*create drummond \"Mr Drummond\"\n*comment shorthand version\n*create bomb 1\n*comment generic random variable\n*create low_threshold 12500\n*comment amount you need for a chance of winning\n*create high_threshold 16500\n*comment amount you need for an automatic win\n\n*comment setup \n*create warned false\n*comment whether Audrey tells you about Crowther Terrace\n*create out_of_chair false\n*comment whether you leave your chair to console Audrey\n\n*comment survey\n*create vanished false\n*comment whether Russell disappears in \"survey\"\n\n*comment family\n*create bad_photos false\n*comment whether you run with crap photos of the house\n*create died false\n*comment whether Mrs Learmonth dies\n\n*comment students\n*create pentagram false\n*comment whether you have officially spotted the pentagram\n*create inferno false\n*comment whether the students set the house on fire\n\n*comment corporate\n*create no_deal false\n*comment whether Mrs Hazelwood walks out on you\n*create samurai false\n*comment whether Mrs Hazelwood crushes your confidence\n*create clooney false\n*comment whether you gain Mr Hazelwood's trust\n\n*comment squatters\n*create resistance 3\n*comment how much effort remains to get them out\n*create security false\n*comment whether you have visited the security firm\n*create price 450\n*comment initial price for security clearance\n\n*comment journalist\n*create prepared false\n*comment whether you put in extra work before the interview\n*create nightphoto false\n*comment whether they take photos at night\n*create badcroc false\n*comment whether you bad-mouth The Crocodile\n*create nosquat false\n*comment whether you lie about the squatters\n*create fiction false\n*comment whether Cutter has to make it all up\n*create sensation 1\n*comment how sensational the article is\n*create survived false\n*comment if you make it past the first \"fired\" point\n\n*comment band\n*create rivalhouse false\n*comment whether you discover rival's property \n\n*comment ghosthunter\n*create friendly 10\n*comment how much he likes you on a scale of 1-20\n*create weekonly false\n*comment whether he gets an initial week only\n*create therefore false\n*comment whether he shares his conclusions.\n\n*comment climax\n*create cheat false\n*comment whether you rig the spreadsheet\n*create secret false\n*comment whether you discover The Crocodile's secret\n*create favour_factor 20\n*comment the figure required to swing the result\n\n*comment *****************************************************************\n*comment Eerie Estate Agent, vignette one\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  In [i]For Rent: Haunted House,[/i] it's your job to rent out a haunted house before your tyrannical boss has you fired.\n\n  How will you screw over your tenants? Will you ignore inconvenient supernatural phenomena, or use them to drum up publicity? How will you deal with ghost hunters, squatters, and celebrity tenants? Will you emerge as the top agent? Stage an office coup? Or will you become a permanent resident of 57 Crowther Terrace?\n\n  (This game used to be called [i]Eerie Estate Agent[/i], before we changed the name.)\n\n  *if choice_is_steam\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n      [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n    *page_break Play Now for Free\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]For Rent: Haunted House[/i] is supported by advertisements, but you can buy the unlimited version\n      to turn off ads forever.\n      \n      *purchase adfree $4.99 purchased\n      *page_break_advertisement\n      *goto purchased\n    *else\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase adfree $4.99 purchased\n      *page_break Play Now for Free\n\n*label purchased\n*rand haunting 1 3\n\nThe sun is setting behind Edinburgh Castle. From your desk in the agency, if you crane your neck just enough that it hurts, you can see the cityscape etched in evocative silhouette. The office, perched high above the bustling arc of Cockburn Street, offers a view of black spires and domes rising against a hazy pink sky. From the haphazard historic tenements of the Old Town down to the neat Georgian blocks of the New Town, the city seems at peace, and it works its magic on you.\n\nSure, a mid-level job at the Moving Target Estate Agency wasn't all that you aspired to in life. But despite the financial crisis, you're still here, in a warm office as the chill of winter creeps in; selling elegant city real estate, drawing an acceptable salary in the heart of Scotland's capital. You watch the failing sunlight paint the clouds. Soon it will be the end of the working day, and perhaps time for a quick drink in any of the ten welcoming bars within a few minutes' walk. You have a moment of utter, perfect contentment.\n\nThen Audrey ruins it by running into the office and wailing.\n\n*page_break\n\nAudrey cries like a deflating cat with nasal congestion. You quickly cover the mouth end of your smartphone. Last time she made that noise, the high frequencies blew out the sensor and you had to get it serviced.\n\nYou wait until she subsides. Audrey has come from The Crocodile's office. It's usually where the crying starts. Your boss is a shrewd businesswoman, but compassion is not among her priorities.\n\nIn fact, Audrey looks like she's seen a ghost. She sits at her computer and puts her hands on the edge of the keyboard. She makes no move to type; just stares through the keys. After a moment, she looks up, meets your eyes, and whispers, \"She fired me.\"\n\nYour colleagues are out showing properties and you are alone in the office with the shellshocked Audrey. You've never been great friends, but she's obviously distressed.\n\n*choice\n  #Stop what you're doing and go over to comfort Audrey.\n    You take a nearby seat and place your arm around Audrey's shoulders. Her face crumples, she leans into you and the strangled wail forms once more in her throat. Thinking of potential repair bills, you press her back into her chair and adopt a soothing tone.\n\n    \"Tell me what happened,\" you say.\n    *set ruthlessness -2\n    *set out_of_chair true\n    *goto audrey\n\n  #Ask what happened without leaving your desk.\n    With a nervous glance at the door to The Crocodile's office, you lean forward. \"What happened?\" you hiss.\n    *goto audrey\n\n  #Feign sympathy for her plight.\n    You turn your head and give Audrey something which you hope looks like a genuine smile. It hurts your face to hold it. She grimaces back. The seconds pass in waxwork empathy.  \n    *set worklife +2\n    *goto no_audrey\n\n  #Ignore her. She's history, and you might be next.\n    You look away, back at the accounts you're editing. She's the loser here and you don't want to be tainted along with her. If the Crocodile comes out, you're going to be working, a cool professional.\n\n    Audrey draws a sharp breath as she realises you are snubbing her.\n    *set ruthlessness +1\n    *goto no_audrey\n\n*comment #################################################################\n\n*label audrey\n\nAudrey snuffles. \"First she said it was just the financial climate. The company needed to downsize and I was the one who had been unlucky this time. Then she said who was she kidding and that I was a dreadful estate agent. You don't think I'm a dreadful estate agent, do you?\"\n\nAudrey is a dreadful estate agent. She photographs the wrong houses, seldom measures the layouts correctly, and occasionally, instead of closing the deal, she sleeps with a prospective client.\n*choice\n  #\"No. You're very good.\"\n    \"Thank you. I'm passionate about it, you know.\" Audrey stares at the floor for a moment. When she looks up, her eyes are wide. \"Oh my God! I've got an idea! You and I should go into business together. Start our own agency! That would show her.\"\n\n    Every muscle in your body stiffens. Going into business with Audrey would be like parking a rusty car on a steep slope, setting it on fire, throwing your life savings inside and letting off the handbrake.\n\n    \"I'm sorry,\" you say. \"I can't afford the risks of a startup right now.\"\n\n    She slumps. \"I could have done better. But I had such bad properties.\"\n    *set ruthlessness -1\n    *set crocodile -2\n    *page_break\n    *goto warning\n\n  #\"What does she know? She's not out in the field like you.\"\n    As soon as you say it, you wish you hadn't. The Crocodile encourages many things from her staff, but constructive criticism is not one of them. And her hearing is famously acute.\n\n    Audrey seems relieved. \"I know! It's all very well saying I should close more deals but she's not out there at the hard end dealing with these people. And some of the properties are a nightmare.\"\n\n    Keen to change the subject away from your boss, and keep Audrey calm, you ask about these properties.\n    *set ruthlessness -3\n    *set crocodile -10\n    *page_break\n    *goto warning\n\n  #\"This might be a good time to consider a change of career.\"\n    \"But I love being an estate agent,\" Audrey wails. \"Even when I was a little girl I used to let doll houses to my dolls.\"\n\n    \"Really?\"\n\n    \"I gave them little tenancy agreements and everything.\"\n\n    You blink. \"I'm sure you'll pick up something else with another firm. That kind of passion is rare in this business. You'll be running your own agency within two years.\"\n\n    Audrey snuffles a bit, but you can see her thinking it through. You get back to your accounts while your mask of sincerity holds. \n\n    *set worklife +1\n    *page_break\n    *goto audrey_end\n\n*comment #################################################################\n\n*label no_audrey\n\n\"The money I've made for this firm!\" Audrey cries. \"The hours I've put in tramping back and forward from dirty bedsits and deathtraps! Leasing flats to rude students and absconding fathers and benefit cheats and…and…\" \n\nAs she runs out of vocabulary, her little fists clench in tiny rage.\n\n\"And selling the furniture! It's all right for you over in Sales. Only rich people buy houses. Polite people. You don't know the…the depravity. And she's judging me based on one property. It's not fair!\"\n\n*choice\n  #Tell her about the depravity you encounter in Sales.\n    You tell Audrey about a recent, well-heeled client who required many large, open rooms to hold exotic pornographic statues; and also insisted on giving you a personal guided tour of his collection. Every time she tries to turn the conversation back to bad tenants, you interrupt with a little more detail on the poses depicted. Finally, when you describe the realistically rendered fluids, her face turns a greenish tint and she shuts up. \n\n    You get on with your accounts as Audrey fetches a cardboard box and begins to load it with her various knick-knacks. Although she sniffs quietly, her tidying becomes noisy and distracting. Eventually, she knocks over her chair. It crashes against the floor.\n    *set worklife +2\n    *page_break\n    *goto audrey_end\n  #Ask about the one property she has been judged on.\n    \"Based on one property? Which property was that?\" you ask. Audrey goes quiet and looks you in the eye.\n\n    \"You won't believe me,\" she says.\n\n    \"I'm sure I will,\" you say. This is a lie. Audrey always talks crap.\n\n    \"You'll laugh at me,\" she says.\n\n    \"I promise I won't.\" Beneath the table, you cross your fingers.\n\n    *page_break\n    *goto warning\n  #Tune out until she becomes exhausted.\n    You consider what you would like for dinner this evening. Audrey's shrill chatter continues for a surprisingly long time, detailing the legions of bad tenants she has endured. She does seem to have had rather a lot considering she only worked here for eighteen months. At least two of them sound suspiciously like characters from the popular TV soap opera, \"Coronation Street\".\n\n    The volume continues to increase until you hear a thump from behind The Crocodile's door and an almighty roar. \"If you are still out there in five minutes I am going to come and throw you down the stairs myself. By the ankles!\"\n\n    It might be your imagination, but you think that during that comment, the door bulged slightly outwards.\n\n    Audrey stops talking.\n\n    \"Right. Well, there's no sense in her firing you too,\" sniffs Audrey. But you can tell she feels snubbed. She drags out a cardboard box and begins thumping the contents of her desk into it.\n    *set worklife +1\n    *set crocodile -1\n    *page_break\n    *goto audrey_end\n  #Go back to your work.\n    Audrey chatters as you try to concentrate on your accounts. You're careful not to make eye contact. After about five minutes, she realises that you are not paying a blind bit of attention, and her whining drops off. She draws a slow deep breath. Audrey being Audrey, it's not that deep a breath.\n\n    \"Right,\" she says.\n\n    *set ruthlessness +1\n    *set worklife +1\n    *page_break\n    *goto audrey_end\n   \n*comment #################################################################\n\n*label warning\n\n\"There was one flat in Great King Street,\" Audrey says. \"It had a piano in the centre of the living room. And the survey said that the piano was so heavy, and the flat below so unsound, that if we moved it, it would fall through the floor and kill the downstairs neighbours. So I had to show the flat with this piano in the centre of the room. I used to stay awake nights worrying that they moved it.\"\n\n\"OK…\"\n\n\"And there was a maisonette in Dean. The owner had bricked up one room and moved to Malta. To get from the kitchen to the dining room you had to go up a flight of stairs and down a ladder.\"\n\n\"What was in the bricked up room?\"\n\n\"I don't know. He wouldn't say. The worst, though, was that awful place on Crowther Terrace. Number 57.\" She shivers. \"There's something…something very strange about it.\n*if (haunting = 1)\n  You know if you show a property enough times, you get a feel for it? Crowther Terrace isn't like that. Every time I went round there, it felt…different.\"\n              \n  \"Houses feel different depending on lots of things,\" you say, \"The light, or the time of day. Or the weather.\"\n\n  \"I know,\" says Audrey. \"But with this one you feel like builders have been in when you weren't looking.\"\n  *set warned true\n  *goto audrey_leaving\n\n*elseif (haunting = 2)\n  I like a cup of tea, you know? Not that weird stuff The Crocodile drinks. Just Tetley or Yorkshire Tea if I can find it. Any time I go abroad on holiday, I'm dying for a proper cup when I get back.\"\n\n  You give a gentle smile. Now is not the time to mention you could have happily slaughtered Audrey a hundred times for finishing off the last of the office milk.\n\n  \"Well…after I've been round Crowther Terrace, I can't face a cup for days. Isn't that strange?\"\n  *set warned true\n  *goto audrey_leaving\n*elseif (haunting = 3)\n  I always feel like I'm being watched there. Do you ever get that? Like somebody's got their eyes on you the whole time.\"\n\n  Come to think of it, you do feel like that—every time The Crocodile leaves her office door open.\n\n  \"It's not just that,\" says Audrey. \"It doesn't feel like one single person. It feels like…lots of them.\"\n  *set warned true\n  *goto audrey_leaving\n*else\n  *comment FURTHER HAUNTINGS HERE ======================================\n  blah\n  *set warned true\n  *page_break\n  *goto audrey_leaving\n\n*comment #################################################################\n\n*label audrey_leaving\n*choice\n  #Help Audrey gather her belongings.\n    You fetch a sturdy cardboard file box and put it on Audrey's desk. She sighs and begins to collect the tacky trinkets she has accumulated over the last eighteen months.\n    *set out_of_chair true      \n    *set ruthlessness -2\n    *set worklife -1\n    *goto audrey_end\n  #Ask for more details about Crowther Terrace.\n    Scenting something interesting, you lean forward. Audrey is obviously pleased to be the centre of your attention. \"Well,\" she says.\n    *set ruthlessness +1\n    *goto audrey_end\n  #Return to your work.\n    You have worked here long enough to develop a keen sense of The Crocodile's impending arrival, and that sense is tingling right now. You give Audrey an awkward smile and return to the accounts.\n    *set out_of_chair false\n    *goto audrey_end\n\n*comment #################################################################\n\n*label audrey_end\n\nThe door to The Crocodile's office thunders open. You can't stop yourself glancing up. She stands there, teeth bared, filling the doorframe in her tweed suit and salon perm, eyes locked on her ex-employee. Audrey has frozen in the timeless, primal stance of all prey, desperately hoping to blend into the background.\n\nThe Crocodile advances on her.\n\n*if (out_of_chair = true)\n  As she passes you, she glares briefly. \"You're away from your desk?\" She doesn't seem to want an answer. You scramble back to your chair.\n  *set crocodile -3\n*comment endif\n\n\"What in the seven hells are you still doing here?\" she snaps at Audrey. \"Out. Out! Right now!\" She thrusts the tearful girl through the office door. You just have time to see Audrey drop her belongings all over the landing before The Crocodile slams the door behind her. It rattles in the frame. \n\n\"Well,\" she hisses, \"that's one less mouth to feed.\"\n\nAs she turns back to the room, her hooded eyes settle on you. The room suddenly seems very quiet. You hear only the gentle humming of the PCs, and the traffic on the cold street below. \"Are those accounts done?\"\n\n*fake_choice\n  #\"Just give me five more minutes.\"\n  #\"Er…there's more than usual this week.\"\n  #\"I'm sorry, I was looking after Audrey.\"\n\n*set crocodile -2\n\n\"Pfah! I'm surrounded by dead wood. Get them finished and sent! Then come and see me in my office.\" She storms back into her den.\n\nYou turn back to the accounts with a heavy heart. It takes twenty minutes to finish them. This seems like an unacceptably long time, but you have the distinct feeling that if you screw these accounts up, they might be your last.\n\nFinally, you walk over to The Crocodile's door and tap on it. The sound seems unbearably fragile.\n\n\"Come in,\" she growls. \n\n*page_break\n\n*comment #################################################################\n*label interview\n\nThe Crocodile's office feels like a cross between the study of a headmistress and the parlour of a crazy old aunt. Historic maps of Edinburgh decorate the walls and vintage cabinets support a number of stuffed dead amphibians, posed so that they recoil in fear. A grandfather clock in the corner seems to tick only once every three or four seconds. Or maybe it's just that time itself slows down in here.\n\nThe Crocodile looks up, her face a craggy landscape sculpted in a thousand upmarket tea shops. \n\nBy the way…what's your name?\n\n*input_text name\n\nYour name is ${name}, is that right?\n\n*choice\n  # Yes.\n    *goto interview2\n  # No.\n    *goto interview\n\n*comment #################################################################\n*label interview2\n\nPatricia McCorquodale, aka The Crocodile, is the head of the Moving Target Estate Agency, and your boss. She founded the company with her husband Peter, and they ran it together for seven years before she devoured him alive. Well, that's never been proven, but it's the predominant belief around the office. Either way, she has been the owner for the last four years.\n\nThe Crocodile asks you to sit down and reaches for a teapot with its customary three bags of Lapsang Souchong. \"Care for a cup?\" she asks, appraising you with hooded eyes.\n\nThis is a trap. When The Crocodile offers people tea, she is assessing them. You want very much to be her tea buddy—especially right now—but you’re not sure you can keep a straight face while swallowing this caustic brew.\n*rand bomb 1 2\n*choice\n  #Refuse politely.\n    This interview looks like it might be tough enough already without trying to keep down her formidable tea. Apparently in China they use it to waterproof boats.\n    *set crocodile -1\n    *goto interview3\n  #Take a chance and drink it with gusto.\n    Any effort to bond with The Crocodile is worth making. It's regrettable that this requires drinking something which tastes like Chinese paint stripper. You take a mouthful of tea and\n\n    *if (bomb = 1)\n      immediately cough it back up. You get your hand up in time, but some of the splatter drops onto The Crocodile's antique leather-inlaid desk. You scramble to wipe it up. Somewhere in her slow, withering gaze you detect a hint of satisfaction.\n      *set crocodile -4\n      *goto interview3\n    *else\n      try very hard to keep a straight face as you swallow. After you keep down the second punishing mouthful, you think you see a grudging respect in The Crocodile's gaze. \n      *set crocodile +3\n      *goto interview3 \n  #Accept a cup, but only pretend to drink it.\n    The Crocodile sees straight through your ploy. \"Something wrong with my tea?\" she snaps. You see a hint of contempt in those eyes as she leans back.\n    *set crocodile -8\n    *goto interview3\n\n*comment #################################################################\n*label interview3\n\n\"You'll have realised that Audrey is leaving us, ${name},\" she says, and looks out the window. \"I very much regret it, of course, but with the current state of the market it's survival of the fittest.\"\n\nShe said \"us\". Maybe you're not fired.\n\n\"I've looked over the accounts, and concluded we need to shed two staff. Audrey was an obvious first choice. But in six months' time, we'll need to lose one more agent. How do you see your future with the firm?\"\n*choice\n  #\"I was hoping for a chance at assistant manager.\"\n    The Crocodile frowns. \"When were you planning to show some aptitude for it? No, don't answer that. \n    *goto interview4\n  #\"I'm very happy where I am.\"\n    The Crocodile frowns. \"It would be good to see a little ambition. In any case\n    *set crocodile -1\n    *goto interview4\n  #\"The firm has been good to me. I'll do whatever it needs.\"\n    The Crocodile frowns. \"Did you crib that answer from a careers manual?\n    *set crocodile -2\n    *goto interview4\n  #\"How do [i]you[/i] see my future with the firm?\"\n    The Crocodile raises an eyebrow. \"An interesting question.\n    *set crocodile +1\n    *goto interview4\n\n*comment #################################################################\n\n*label interview4\nI'm going to give you an opportunity to demonstrate your worth.\n\n\"Audrey's portfolio included a small number of…awkward…properties for rent. Each has been empty for much of the last year. I'm giving each agent at your grade one of these awkward properties to add to their portfolio. As an experiment, if you like. This should determine whether you have any aptitude in letting.\n\n\"In six months, I'll review the records. The agent who has made the most of that particular property will help me with our strategy going forward. The agent who has made the least of it will help me with our overstaffing problem.\"\n\nYou're pretty sure this is illegal. But it's nice to have it spelled out.\n*page_break\nThe Crocodile stands up and riffles through her filing cabinet.\n\n\"Your property is…Crowther Terrace. Number 57. A family house in small but attractive grounds with four bedrooms, three public rooms, two bathrooms and many original features. Victorian. Structurally sound, well situated twenty minutes south of the city centre by foot. Owner abroad for the long term. Attracted four weeks of rent in total over the last fifty-two. Appalling. Such was the work of our ex-colleague Audrey. I'm sure,\" she holds the file out towards you, \"you will do considerably better. Any questions?\"\n\n*if (warned = true)\n  You feel a little uneasy at hearing that address. It's the one Audrey mentioned earlier.\n*comment endif\n\n*choice\n  #\"Why was the house empty for so long?\"\n    \"I'm sure Audrey's unique professional style had something to do with it.\n    *goto interview5\n  #\"Does the file record any particular problems?\"\n    \"If—instead of wasting my precious time—you read the file, you will find out.\n    *set crocodile -1\n    *goto interview5\n  #\"Could I have a different property?\"\n    \"No. \n    *set crocodile -2\n    *goto interview5\n  #No questions.\n    \"Very good.\n    *goto interview5\n\n*comment #################################################################\n*label interview5\nNow I hope you understand the situation, and I look forward to seeing your efforts rewarded. Good night.\"\n\nShe looks back to her books, and suddenly you are sitting in silence under the glassy-eyed scrutiny of stuffed toads.\n\nAs you leave her office, you think you hear a derisory snort.\n\n*page_break\n\n*comment #################################################################\n\n\"Screwed up again, ${name}?\"\n\nThere is another agent who works in your office that you hate. Why?\n\n*choice\n  #He's arrogant and overbearing.\n    *goto rival_name\n  #She's always watching for a chance to undermine you.\n    *set him \"her\"\n    *set his \"her\"\n    *set he \"she\"\n    *goto rival_name\n\n*comment #################################################################\n*label rival_name\n\nWhat's ${his} name?\n\n*input_text rival\n\nSo ${his} name is ${rival}, is that right?\n\n*choice\n  # Yes.\n    *goto rival\n  # No.\n    *goto rival_name\n\n*comment #################################################################\n*label rival\nLooks like ${rival} has arrived back in the office during your interview with The Crocodile. $!{he} lounges in that chalkstriped suit you hate so much, actively enjoying your defeated entrance. At least you have the satisfaction of knowing something ${he} doesn't—${his} position in the firm is not as secure as it was an hour ago.\n\nThen you remember seeing ${him} work on clients with ${his} silver tongue, describing hovels like palaces, and you realise with a sinking feeling that ${rival} is who you're up against for the next six months. $!{he} is a manipulator, a sneak, and quite capable of doing anything to curry favour with The Crocodile and burn you out of a job.\n\nYou look at those mocking eyes and decide there and then that you are not going to be cowed. In fact, you'll do your best to take ${rival} down. You can do it. You gather your papers, make a point of locking your desk, and shrug on your coat.\n\n\"Leaving early eh?\" ${rival} checks ${his} expensive watch.\n\n\"I believe Mrs McCorquodale would like a word with you,\" you say, trying to make it sound ominous. Even that doesn't make ${his} smile slip. You stomp down the stairs, and out into the cold air.\n\n*finish\n\n", "students": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette four\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n*advertisement\n\nThe next day the office seems draughty and grim. The file server goes down and the IT guy can't come round for a couple of hours.\n*if (died = true) \n  You contemplate your options about letting The House of Recent Death. This is going to take some creative thinking.\n*comment endif\n\nOne of your cronies leans back in her chair. \"${name}?\" she says. \"That house of yours—the creepy one—how many bedrooms does it have?\"\n\n\"Four. Why?\"\n\n\"It's empty right now, yes? I've got four students looking for a quick let in the South Side…another agency let them down.\"\n\nYour heart jumps. This could be your only ticket to a quick let. But students often have little money.\n\n*if (ruthlessness > 40)\n  \"These students…where are they from?\" you ask.\n\n  \"Surrey, I think. I just spoke to somebody's father.\" You share a look. Not far outside London, Surrey is one of the richer English counties. \n*comment endif\n\n\"Want me to set up a viewing?\"\n\nYou sure do.\n\n*page_break\n\nYou arrive at the house an hour early to check it over. There are small signs of the Learmonths' occupation: furniture moved around, curtains looking fresher and some cleaning sprays left under the sink. You tour the interior again, trying to see it through the eyes of students.\n\n*if (activity > 15)\n  From the lounge, you hear a bump on the floor above you, then a second, then a third. But when you get up there, all is quiet.\n*comment endif\n\nYou check through the wardrobes and under the beds. There's nothing there except some old pillows. You remember the shabby furniture which featured during your student rental days. Within ten minutes the students will have posters up for obscure bands and French arthouse cinema. They'll hardly notice the interior.\n\nThe doorbell rings downstairs, a strange off-key clang. You head downstairs to romance your new tenants.\n\nFour faces present themselves at the door. Jemima is a short, sullen witch in a maroon vintage frock. Padbery is a wool-clad slowcoach with a Nepalese hat. Auroria has a turned-up nose and expensive boots. Dave blinks too much.\n\nHow will you approach this viewing?\n\n*choice\n  #Take an active interest in their academic pursuits.\n    Auroria is studying Fine Art and dismisses Edinburgh's many galleries. Dave is studying Computer Science and seems pleased that the science campus is nearby. Jemima complains that the honours programme in Psychology is over-subscribed. Padbery has trouble explaining what course he signed up for. \n\n    *set worklife -1\n    *goto rent\n  #Emphasise the spacious bedrooms and social areas.\n    Students are not the binge-drinking, drug-addled hellraisers they were in your day. However you emphasise the house as an ideal party venue, and you can see a certain light go on in the students' eyes.\n\n    Of course they might break the furniture. But that's why you take a security deposit—and you always overcharge for damages.\n\n    *set ruthlessness +1\n    *goto rent\n  #Imply this is better than average student accommodation.\n    As you show off each feature of the house—the long kitchen, the deep bathtub—you contrast them with the equivalent version in halls of residence or budget rentals. You wonder initially if you've laid it on too thick; Padbery, at least, looks like he came here to slum it. But slowly you see the psychology working.\n\n    *set activity -1\n    *goto rent\n  #Repeatedly refer to Edinburgh's charms as a student destination.\n    You take a genial approach, outlining the many opportunities the capital offers for long-term visitors who have as much free time as students do. You talk about live music, art, films and clubs; how jealous you are of them with all this in front of them.\n\n    Unfortunately you lay it on a bit too thick and end up reflecting on your own life and how your career has led you to work for a fiend like The Crocodile. Where did you go wrong?\n\n    *set worklife -2\n    *goto rent\n\n*comment #################################################################\n*label rent\n\n*temp rent1\n*temp rent2\n*set rent1 (rent + 200)\n*set rent2 (rent - 200)\n\nYou're not sure anybody in this group ever truly shows enthusiasm, but your instincts tell you they're interested, and at the end of your tour, they ask about the rent. You look them over carefully. Students are usually short of money. But are this group?\n\n*choice \n  #Raise the rent to £${rent1}.\n    You can tell they're from wealthy families. The students hardly blink at this extravagant figure, so you get them to sign the lease on the spot. \n    *set ruthlessness +2\n    *set rent rent1\n    *goto deposit\n  #Stick with the previous rent of £${rent}.\n    They don't seem fazed by the rent you charged the Learmonths. You stick with a good thing and produce the lease you brought with you.\n    *goto deposit\n  #Lower the rent to £${rent2}.\n    You have to be realistic about students and what they can afford. You knock a few pounds off the rent and are rewarded with an immediate crop of new tenants.\n    *set ruthlessness +1\n    *set rent rent2\n    *goto deposit\n\n*comment #################################################################\n*label deposit\nEach of the students brings out a separate chequebook. They all have three middle names. Auroria and Jemima uncap expensive fountain pens while Dave uses a chewed biro. Padbery borrows Dave's pen. Normally you would insist on a single cheque per group but under these circumstances you simply scoop up the first month's rent and security deposit.\n\nYou leave them four sets of keys and walk to the car with a spring in your step. You choose a route back to the office which goes via the bank.\n\n*set money + rent\n*set money + rent\n*page_break\n\nBack in the office, you find three post-it notes about missed calls from your new tenants. You ring back. Auroria answers. She sounds cross.\n\n\"The cooker is broken! When can you have a replacement to us?\"\n\nYou slide into your standard debug process for new tenants and determine Auroria has not powered on the electric cooker at the wall switch.\n\nFifteen minutes later you have an almost identical conversation with Padbery about the fridge. Half an hour after that, Jemima calls wanting someone to move the furniture around in the lounge.\n\nIt's clear you need a strategy for managing your demanding young tenants.\n\n*choice\n  #Dodge their calls for a few days.\n    You catch up on a series of \"out and about\" tasks during the day and pretend the cleaning staff have tidied away the coloured post-its on your desk.\n\n    Two days later The Crocodile nobbles you.\n\n    \"Why am I receiving phone calls from an irate man in Sussex about his son's car?\" she snarls. \"Sort. It. Out.\"\n\n    You ring Dave and explain the concept of restricted parking zones to him. You supply the phone number of the pound which has seized his BMW. He is indignant. \"Why can't we park outside? It's [i]our[/i] house!\"\n    *page_break\n    *set crocodile %-5\n    *set worklife %-5\n    *goto weird\n  #Try to find a book which explains the nuances of living away from one's parents.\n    A half hour of research unearths a book called \"Doing It Myself: All The Little Things Your Parents Never Told You About Home Maintenance\". You blow £6 of the Crowther Terrace budget on a copy and deliver it by hand. Jemima seems quite charmed at the present and makes you a peppermint tea. You only take one sip of it before leading her through to the kitchen and showing her the magic switch which makes the kettle heat up.\n\n    Soon the calls from Crowther Terrace reduce to a manageable level.\n    *page_break\n    *set money -6\n    *set worklife -1\n    *goto weird\n  #Refer them to a handyman the agency sometimes uses.\n    You introduce them to Nigel Whump, an aging but competent jack of all trades. The calls stop.\n\n    A week later Nigel calls. He is in a good mood. \"At first they thought I came free with the house. But they paid up without complaining. Queer bunch, aren't they? The things they read. And there's something off about that house. Not keen to go back there in a hurry.\"\n\n    Nigel sends you a cheque for £50—the agency's referrer fee on the work completed.\n    *page_break\n    *set money +50\n    *set worklife +1\n    *goto weird\n\n*comment #################################################################    \n*label weird\nAnother couple of weeks pass, and once again Crowther Terrace gets pushed to the back of your mind. You're looking at a map of the city, trying to make some strategic predictions about fashionable districts, when your telephone rings. You answer without taking your eyes off the map and find yourself speaking to a gruff English voice.\n\n\"What are you doing to my daughter?\" it asks.\n\n\"Pardon me?\"\n\n\"Jemima. She's your tenant, isn't she? \n*if (haunting = 1)\n  What's this nonsense about moving panels? Is this the kind of rot you have on Scottish independent television?\"\n\n  It takes you a minute to process this. You really have no idea what he's talking about.\n\n  \"Don't play dumb with me. She says there is a cupboard opposite her door when she goes to bed. Then when she wakes up in the morning, it's three feet to the right. Staircases with extra steps. Walls that bend. What kind of foolish reality television practical joker nonsense is this? She's a vulnerable young girl working on her education. I want the number of your producer. You're going to cut this out.\"\n\n  *goto woah\n*elseif (haunting = 2)\n  For seventeen years her mother and I have enjoyed regular cups of tea, morning, noon and night. Jemima has maintained a particular dislike of tea all this time, describing it specifically as 'like drinking dishwater with dirty leaves'. So tell me why, after two weeks in your house, she can talk about nothing besides tea parties.\"\n\n  Eventually, in an effort of supreme diplomacy, you ask the distant angry father why this is a problem, and why he thinks you have anything to do with it.\n\n  \"She's ill. You can hear it in her voice when I call unexpectedly. She's distracted. Says odd things. It started when she moved into your property. Almost to the day!\"\n  *goto woah\n*elseif (haunting = 3)\n  She needs to concentrate on her studies now. She doesn't have time to look after animals. Is this some kind of condition of this lease? I know you have an arcane legal system up there but I hardly think it's humane for the creature.\"\n\n  It takes a supreme act of professional will to ask this blethering English fool to clarify what he means.\n\n  \"Jemima has never shown the slightest interest in pets. Her mother and I offered her one for her seventh birthday. She said they were smelly and dirty creatures and if we got one she would 'throw it in the pond until it got tired'. So explain to me why she has met a 'remarkable and astonishing cat' in her new house and can no longer talk to us about anything else.\"\n  *goto woah\n*else\n  *comment FURTHER HAUNTINGS HERE ======================================\n  *goto woah\n\n*comment #################################################################    \n*label woah\nHe blusters on, deaf to your reassuring words for at least fifteen minutes. He ends with the suggestion that he may drive up and come to the office.\n\nIf Daddy's little girl has been experimenting with controlled substances, it's hardly the fault of her estate agent. But it sounds like he might make it your problem.\n\nYou had better see what's going on in Crowther Terrace.\n\n*choice\n  #Schedule an inspection of the house and contents.\n    The students grumble at the idea of a flat inspection so soon after moving in. You assure them this is standard practice and talk a load of bullshit about it being mainly to ensure they are getting best value from their residency.\n\n    On the scheduled date, Padbery is home alone. He lets you into the house and wanders about in a daze while you do your tour of the premises. The bedrooms are now decorated with posters for obscure bands and French arthouse cinema.\n\n    The place is visibly dirtier than two weeks ago but otherwise you notice nothing suspicious. What now?\n    *choice\n      #Ask Padbery about Jemima's state of mind.\n        Padbery seems to take a few minutes to remember who Jemima is. You ask some gentle questions about how she is settling in to the house. He pauses.\n\n        \"She's at classes,\" Padbery says.\n\n        \"Have you noticed any difference about her of late?\"\n\n        He thinks about this. \"She's at classes.\"\n          \n        You despair for Britain's future contribution to the world economy.\n\n        *set worklife %-5\n        *page_break\n        *goto stumped\n      #Draw out the inspection until Jemima comes home.\n        You begin to get picky about small points of maintenance, like whether the students have been scrubbing the grout in the shower and whether they put coffee grounds down the sink. Padbery becomes alarmed, and eventually scuttles upstairs. You find a comfortable chair and wait for Jemima to appear.\n        *set ruthlessness +1\n        *set activity +1\n        *page_break\n        *goto jemima \n      #Come back when the students are not expecting you.\n        A scheduled inspection never shows students in their natural environment. An unscheduled inspection might be more revealing. \n        *page_break\n        *goto night_visit\n  #Ask the neighbours if they have seen anything suspicious.\n    You knock on a few doors. An elderly lady across the road slams the door in your face when you gesture to number 57. Another gent with a hook nose keeps the door chain on and will only talk to you through a narrow gap. His dog barks so loudly that you cannot understand what he says.\n\n    This is very odd. Usually residents love to know their neighbours' estate agent. It gives them an opportunity to complain and to play spy. Finally you get a few words with the ex-military man who lives at number 59.\n\n    \"Harmless enough toffs,\" he says. \"Noise doesn't bother me of course. Been half deaf since I copped a shell in Korea. Must have a huge television, eh?\"\n\n    The question surprises you. The students have a fairly small television.\n\n    \"Really. Well, can't account for the strange lights over there of an evening. Purples and greens. Suppose they have their own disco, what?\"\n\n    The students do not seem to be \"home disco\" types. You thank the old soldier and resolve to see these lights for yourself.\n    *page_break\n    *goto night_visit\n  #Drop by for a quiet word with Jemima.\n    *label jemima\n    Jemima looks at you suspiciously. She wears a fussy two-piece which blends tweed and tartan. Her eyes are tired and bloodshot. \"Can we make this quick, please? I have reading to do. Why are you here?\"\n\n    Something about Jemima's state doesn't add up. It's still many months until final exams and she ought not to be this stressed.\n    *if (special = \"fengshui\")\n      You notice she is wearing a black brooch in the shape of a pig. One of its legs is missing. A limping pig is a dangerously negative symbol.\n    *comment endif\n\n    How will you approach the conversation?\n\n    *choice\n      #Admit Jemima's father called, and you are both concerned.\n        Jemima becomes very calm at the mention of her father.\n\n        \"It's most kind of you to come. Most kind. I understand everybody's very worried. But I'm fine, really. I'm going to get some more sleep this week, and try not to let things get on top of me so much. How very sweet of you to be concerned and to come down here. I know you must be very busy. But I'm all right. Truly. I'll be sure to call Daddy and let him know how kind you've been.\"\n\n        That might eliminate the immediate problem.\n        *if (special = \"forensic\")\n          But she looked straight at you the whole time. On CSI, that's what suspects do when they want a lie to be believed. Jemima is trying to blow you off. Your investigation will have to take a different track.\n          *set ruthlessness %-5\n          *set worklife %-5\n          *page_break\n          *goto night_visit\n        *else\n          But some instinct tells you Jemima is covering up the truth. You leave politely, but you're not taken in.\n          *set ruthlessness %-5\n          *set worklife %-5\n          *page_break\n          *goto night_visit\n      #Claim that one of her flatmates is worried about her.\n        \"Those vermin!\" she spits. \"I knew they'd turn on me.\"\n\n        Her sudden vehemence, combined with the ugly tartan/tweed outfit, reminds you of a primary school teacher you had. You try to explain that everybody concerned only wants her to be happy, but she is only interested in which flatmate called you in. As no such thing happened, you have to remain vague, and she gets more paranoid.\n\n        This is going nowhere fast. She hunches against the back of her chair. In her lap, fingers curl into claws. A thin trail of spittle splashes her tweed lapel. You excuse yourself and leave.\n        *set worklife %-5\n        *set activity +2\n        *page_break\n        *goto stumped\n\n      #Divert into a discussion of work-life balance.\n        Last year The Crocodile made all staff take compulsory classes in work-life balance in order to get the agency some extra funding. They ran on Friday evenings and killed your social life for eight weeks. \n\n        You give Jemima some half-remembered insight from these classes. By the end her face is a mask of frozen contempt. You sigh and leave the house. However, you've remembered a couple of techniques taught on the course that you never did get round to applying.\n        *set worklife %+5\n        *page_break\n        *goto stumped\n\n*comment #################################################################\n*label stumped\n\nWell, this is no good. You are getting pretty sick of your clueless, entitled, student tenants at Crowther Terrace. You're an estate agent, not a housemaid or guidance counsellor. You've already spent more time on this than you were obliged to. You need the £${rent} a month but you don't need the hassle. \n\n*if (ruthlessness > 42)\n  Of course, if you could evict them and claim the house was damaged, you could retain their security deposit, effectively an extra month's rent…\n*comment endif\n\nYou sit in your car for a moment and decide what to do.\n\n*choice \n  #Return to the office, determined to restore your relationship with the students to a formal basis.\n    The Crocodile has you chasing your own tail here. The key is to fall back on your professionalism. Students will always be students, and if they have personal problems, it's not up to their estate agent to solve them.\n    *set worklife +1\n    *goto disaster\n  #Take the rest of the afternoon off and get drunk.\n    You've worked plenty of overtime lately. It's time to ease back and remember that your entire life doesn't depend on The Crocodile. You call it a day, leave the car near the office, and get quietly plastered in a Royal Mile hideaway. You make friends with off-duty soldiers, a street magician, and an exotic dancer enjoying her day off. By the time you stagger out to hail a taxi, you feel a bit more normal.\n    *set worklife %+10\n    *goto disaster\n  #Come back at night to spy on the students.\n    You know yourself well enough to appreciate that you won't be able to relax until you get to the bottom of what is happening at Crowther Terrace. You go home, fix a good dinner, put your feet up for a couple of hours, then slip on a black jacket and start up the car. \n\n    You cruise over to Crowther Terrace.\n    *set worklife -2\n    *page_break\n    *goto night_visit\n\n*comment #################################################################\n*label disaster\n\nTwo nights later, you're settling in front of the TV with a steaming plate of gnocchi when you get a text message from one of your cronies in the agency.\n\nJUST DRIVEN CROWTHER T HOUSE ON FIRE \n\nYou try to call, but they don't pick up. Heart racing, you throw a pot lid over your dinner and scrabble for your car keys.\n\n*page_break\n\nBlue lights bathe the street and a police barrier stops you from driving down Crowther Terrace. You leave the car somewhere highly illegal and run past the barricade to see if the worst is true.\n\nIt is.\n\nAs you draw close to number 57, you see the entire east side of the upper storey is blackened. Dying trails of smoke billow from within. Fireman poke at the charred woodwork, hoses still at the ready.\n\nThe students are sitting on the wall outside the house. Dave is holding an old, scorched book, and looks glum. Auroria has what looks like dried blood spattering her shirt. Jemima is barefoot and wrapped in a duvet—you think you see the edge of a strange symbol daubed on her chest. Padbery appears to have lost his hat.\n\nAuroria notices you and wipes at her mouth. \"This is all your fault,\" she spits.\n\n*choice\n  #Grit your teeth and check the students are all right.\n    It causes you almost physical pain to be sympathetic under the circumstances. An ambulance arrives and you wait for the paramedics to check the students out. Once that's done, you usher them into your car, drive them to a nearby hotel, and see they get settled.\n\n    Auroria glares at you the whole time. But Dave looks you in the eye and says thanks.\n    *set ruthlessness %-10\n    *goto disaster_after\n  #Ask what happened.\n    Dave and Jemima look shifty. Auroria pouts. Padbery frowns at the house as if he barely recognises it.\n\n    You give up after five minutes and talk to the firefighters. One tells you it looks like the fire started in an upstairs bedroom but they can't be more specific without a daytime inspection.\n    *set worklife -1\n    *goto disaster_after\n  #Ignore them and inspect the damage.\n    You try to get a better look at the house but the firefighters won't let you into the grounds. It looks like the fire has been concentrated in an upstairs room, but you can't see how far it has spread.\n    *goto disaster_after\n  #Tell Auroria exactly what you think of her.\n    You remove your professional facade and tell Auroria she is a spoiled, uppity, privileged, snotty little brat who would be an utter failure in life without the silken cushion of her parents' money. \n\n    If she were here, The Crocodile would eat you alive for talking to a client this way. But it feels so, soooo good.\n    *set worklife %+15\n    *set crocodile %-10\n    *goto disaster_after\n\n*comment #################################################################\n*label disaster_after\n\nMaybe the students were smoking in bed. Or maybe it was some kind of drug-inspired daemonic sex inferno ritual. Either way, the implications of the damage to the house slowly sink in.\n\n*page_break\n\nThe students move out, of course. It is a quiet operation; after the building is declared safe, they retrieve their remaining belongings and shuffle off without contacting the agency again.\n\nYou get the repair bill for the house and nearly throw yourself out of the top window of the office. The damage was mostly contained to one bedroom, but the contractor's fee is still staggering. It looks like certain doom to your chances of winning The Crocodile's challenge. You glance over at ${rival} and see a little smile playing on ${his} features.\n\nWithout much hope, you write to each student's parents and enclose a breakdown of the repair costs. To your surprise you receive three cheques; Auroria's parents do not respond. However, even after these cheques and the security deposit, £3000 remains outstanding. You're not dead yet, but winning just got a lot harder. \n\n\"I've smoked students out of properties before,\" says The Crocodile, with a curl of her lip. \"But this is taking it a little far.\"\n\n*set inferno true\n*set crocodile %-10\n*set worklife -5\n*set money - 3000\n\n*finish  \n\n*comment #################################################################\n*label night_visit\n\nYou park the car around the corner and approach 57 Crowther Terrace on rubber-soled shoes. Parts of the exterior are illuminated with purple and green light which spills from random windows. Sills and overhangs cut silhouettes into the coloured glow.\n\nYou decide not to ring the bell. Instead, you slip up the drive and step around the side of the house to where weird light blazes from the parlour windows. You crane your head and look inside.\n\nThe students are sitting in a circle, holding hands. This would be a touching return to old-fashioned values of academic community except they have decorated their faces with odd sigils and chalked a pentagram on the previously spotless floorboards. You can hear chanting through the glass. They are clearly attempting to communicate with something extra-curricular.\n\n*choice\n  #Knock on the window and play the outraged professional.\n    The entire ring of amateur demonologists jumps as you tap on the glass. It takes thirty seconds before Dave works up the courage to approach the window and open it. You give them a good lecture about damaging the floor and point out the use of the property as a religious venue is forbidden under the terms of the lease. They look sheepish. You make some dark remarks about their deposit before you walk away. You enjoyed that.\n    *set ruthlessness %+10\n    *set pentagram true\n    *page_break\n    *goto eviction\n  #Return quietly to the door and ring the doorbell.\n    The bell clangs. You sense sudden movement inside the parlour. There is a rather long pause. You ring the bell again. Eventually Auroria comes to the door, face pink and newly scrubbed. You mention complaints from the neighbours about loud \"singing\". She promises that they will keep the noise down, but you have the distinctive feeling she will be painted back up and in the circle again as soon as you are gone. \n    *set ruthlessness -1\n    *set activity +5\n    *page_break\n    *goto eviction\n  #Walk away while you still can.\n    Their demonic play is harmless nonsense and you can ignore it. Or it's extremely dangerous and you don’t want to be here when it goes wrong. Either way, you're gone.\n    *set worklife +1\n    *set activity +10\n    *page_break\n    *goto disaster\n  #Hide in the bushes and throw stones at the window.\n    You find a shrub which offers a good view of the window and collect a supply of pebbles. Your first stone hits the window with a dry ping. The students leap into the air, breaking their circle. The faces which come to the window are wide-eyed. Dave and Auroria scrub at their face paint.\n\n    After a few minutes, you throw stones at other windows to move them around the house. You even slip from shrub to shrub until you can hit the other side of the house. For almost an hour you taunt them, and they remain too frightened to step outside.\n\n    You note this entire story to tell The Crocodile later. She loathes students.\n\n    *set crocodile +2\n    *set worklife -1  \n    *page_break\n    *goto eviction\n\n*comment #################################################################\n*label eviction\n\nThese students are obviously not the quiet, lucrative tenants you need for Crowther Terrace; in fact, they are an active risk. You've just received a new month's rent from them; you have a hunch that you will be able to throw them out, keep the rent, and have new tenants in place before the end of the month.\n\nYou drive over there for 7am and park right in front of the house. You clang the bell for at least three minutes before a bleary-eyed Dave answers the door. Striding straight inside, you summon the four of them to the parlour. Auroria and Padbery come down in pyjamas. Jemima wears a rather dashing Fifties robe. They have not bothered to erase the chalk pentagram.\n*if (pentagram = false)\n  You pretend you are responding to complaints from the neighbours, and make a point of noticing the pentagram with pantomime horror.\n*comment endif\n\nYou lay into them with the speech you've been practising all morning. It starts with a lecture on responsibility and damages to this fine period home. Then you frown even harder and launch into a stern warning about toying with demoniacal forces. You repeatedly gesture to the pentagram. Finally, you give them a week's notice to leave the house.\n\n\"We…we won't stand for this,\" stammers Auroria. \"I shall tell Father!\"\n\nYou let her know you will be pleased to tell her father—or any interested parents—about their wicked demonological activity. You speculate about how it may affect her allowance. Dread rises in her eyes and you stare back until her gaze drops.\n\nThe students move out by the end of the week and you get to keep the entire month's rent.\n*set money +rent\n\n*if (ruthlessness > 40)\n  Sensing weakness, you also keep the entirety of their security deposit.\n  *goto exit\n*else \n  You grudgingly hand back their security deposit, minus £400 for unspecified necessary cleaning. In practice, you take a wet cloth and wipe off the chalk pentacle.\n  *set money -rent\n  *set money +400\n  *goto exit\n\n*label exit\n\nBack in the office, you pull the Crowther Terrace file and examine the\n*if (bad_photos = true)\n  awful\n*comment endif\nphotos of the house.\n*if (died = true)\n  Mrs Learmonth's death has thankfully disappeared from the news cycle.\nIt's time for a different approach to finding your next tenants.\n\n*finish\n", "survey": "*comment *****************************************************************\n*comment Eerie Estate Agent, vignette two\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*advertisement\n\nYou try to get an early night, but sleep is slow to come. The wind whistles around the walls of your flat and rattles the bedroom windows. The roof creaks. It's difficult to relax for thinking about the unknown house in Crowther Terrace and ${rival}'s self-satisfied face.\n\nYou need to arrive at the office tomorrow with a solid plan, and get moving immediately. You reach for your alarm clock and stare at its cold green digits.\n\n*choice\n  #Get up two hours early and go to the gym.\n    The alarm seems to buzz just as you drop off. Did you even sleep at all? You stare out the window at the shrouded street, tinted yellow from the sodium lamps. It's still night. \n\n    Yawning all the way, you drag yourself to the gym, along cold, deserted lanes, past barricaded shopfronts. It's still dark when you swipe your card and head for the changing room.\n\n    It's hard to get started. But after twenty minutes on the cross-trainer and some weight work, you feel your stiff muscles loosen. By the time you come out of the shower, you feel ready for a fight.\n    *set ruthlessness +3\n    *set worklife -3\n    *page_break\n    *goto office\n  #Get up ninety minutes early and take a long walk to help you think.\n    Dawn is breaking as you stumble from the house. For the first five minutes you yawn constantly, and all you can think about is your bed and how warm it was.\n\n    Your route takes you along the Radical Road, a narrow path which skirts the side of the looming Salisbury Crags. From here you can see across the rooftops of the city, picked out in the glassy morning light. Under each one, prospective tenants are stirring. It feels like your domain; your empire.\n    *set ruthlessness +2\n    *set worklife -2\n    *page_break\n    *goto office\n  #Get up an hour early and follow your usual routine.\n    You feel a bit sluggish as you drag yourself from bed and into the morning routine: shower, breakfast, brushing your teeth. The news on the radio reports new housing legislation going through Parliament today.\n\n    Within the hour you're fully awake, fresh and ready for the office. Today, you're going to be the one laying down the law.\n    *set ruthlessness +1\n    *set worklife -1\n    *page_break\n    *goto office\n  #Get up at your usual time.\n    One thing you don't learn about real estate until you actually do the job is this: it's all about confidence. When you tell a buyer that there has been lots of interest in a property, they read your manner. If you're desperate, they sense it. If you seem unconcerned, they believe you, and it may tip them into an impulsive offer.\n\n    Crowther Terrace is just one more property, and rental psychology is no different from purchase psychology. You get a good night's sleep, wake fresh, and you arrive at the same time as ever, ready to do your thing.\n    *set worklife +1\n    *page_break\n    *goto office\n\n*comment #################################################################\n*label office\n\nThe office seems quiet without Audrey's irritating nasal rasp and occasional vacant comment. You get into the Crowther Terrace file. It is an exercise in futility. There are no floor plans, no photographs and the last survey was nine years ago. Beneath the description The Crocodile gave you yesterday, Audrey has added her professional opinion in curly purple biro—the word \"creepy\". You sigh.\n\nThe owners are not easily accessible either. There are a series of correspondence addresses: New York, London, Cairo, Kenya, Australia and, eventually, Shanghai. As these addresses would commonly be forwarded any monies received, they appear to have had little use.\n\nYou need to survey the place to know what you're dealing with, but you have a few hours of urgent paperwork for existing contracts. Your gaze falls on Russell, one of the juniors. He's a terrible nerd and has a haircut which looks like it came off a Lego figure. But he's usually reliable when it comes to the small stuff. You give him the address and ask him to do an initial survey.\n\n\"I'm doing some work for ${rival} right now,\" he says. ${rival} is not in the office.\n\n*choice\n  #Tell Russell with quiet authority to do your survey first.\n    *if (ruthlessness > 30)\n      Russell seems spellbound by your masterful managerial manner. He takes the address and heads out to do the survey. You return to your desk feeling quietly professional. \n      *set ruthlessness +1\n      *goto russell    \n    *else\n      Russell whinges about his strict instructions from ${rival}. You try a mild threat but it just doesn't come off. He says he has a slot to do the survey tomorrow. You look disgusted and return to your desk. You'll just have to do the survey yourself.\n      *set worklife -1\n      *goto no_russell\n  #Claim this is a priority job from The Crocodile.\n    *rand bomb 1 2\n    *if (bomb = 1)\n      The Crocodile appears in her office doorway. Your heart jumps.\n\n      \"It is most certainly [i]not[/i] a priority job of mine,\" she says. \"I suggest you take anything ${name} says today with a pinch of salt!\" Her predatory eyes follow you all the way back to your chair.\n      *set crocodile %-10\n      *set ruthlessness -3\n      *goto no_russell\n    *else\n      His eyes widen briefly. \"I'll get right on it then,\" he says, and goes up his coat. You feel a dark satisfaction as you watch him leave.\n      *set ruthlessness +2\n      *goto russell\n  #Bribe him with some geek toy.\n    You sit on Russell's desk. \"You know…my little cousin has moved on from his Transformers toys. They're planning to give them away. He might even have a good condition Optimus Prime. Would that be of interest to you, Russell?\"\n\n    Russell quickly grasps the dynamics of the situation. \"I'll get right on your survey,\" he says, and grabs his coat.\n    *set ruthlessness +1\n    *set worklife -2\n    *goto russell\n\n*comment #################################################################\n*label russell\n\nA couple of hours pass and you've nearly finished with the key contracts when your phone rings. It's Russell. He sounds strange.\n*if (haunting = 1)\n  \"I can't seem to measure this place,\" he says.\n      \n  \"Don't be ridiculous. Use the distance meter.\" This gadget bounces actual laser beams off facing walls to give an instant and accurate measurement. Every estate agent loves it.\n      \n  \"It won't settle. It says six metres, then six metres fifty. Then five metres. That's way off.\"\n      \n  \"So it's bust. Do it the old fashioned way.\"\n      \n  \"I tried that. I…can't seem to put the tape in a straight line. I lay it across the floor, then look back and it's squint. I fix it, then look back and it's squint in the other direction. I did it about twenty times.\"\n  *goto ffs\n*elseif (haunting = 2)\n  \"I'm not feeling very well,\" he says. This is unusual for Russell. He's a geek, but he never takes sick days. \n      \n  \"OK. Finish the survey, drop it in here and go home.\"\n      \n  \"That's just it. I can't concentrate on the survey. I feel like I…well, I…I need to pee all the time.\"\n      \n  You roll your eyes at the empty office. \"So go and pee. Or has your comprehensive survey not managed to locate the lavatory?\"\n      \n  \"I've gone already. Three times this afternoon. It doesn't matter how much. Every time I start the measurements, I get the feeling again. It's crippling.\"\n  *goto ffs\n*elseif (haunting = 3)\n  \"Is there something in here?\" he says. \"A pet maybe? Stuck in a cupboard?\"\n\n  You explain that the house has been empty for some months. Any pet is long dead.\n      \n  \"I can't concentrate on the measurements. Every time I try to do a diagram there's this tapping sound. Or scratching. I'm sure there's something in here with me. It's very distracting.\"\n      \n  You explain with great patience that if he hurries the hell up and finishes his work, he can come back to the office and forget all about it.\n      \n  \"You think it's rats, don't you?\" You can hear him shiver. \"I'm really scared of rats.\"\n  *goto ffs\n*else\n  *comment FURTHER HAUNTINGS HERE ======================================\n  *goto ffs\n\n*comment #################################################################\n*label ffs\n\nYou begin to wonder if it might have been more constructive to leave Russell working for ${rival}.\n\n*choice\n  #Tell Russell to go home and take the day off.\n    It sounds like he's getting sick. In any case, he's not concentrating, and you can't rely on a flawed survey. Russell makes a token protest, but you can tell he's relieved to get out of the job. You'll need to go over there and survey the house yourself.\n    *set ruthlessness -3\n    *goto visit_house\n  #Tell Russell to stop messing about and finish the survey.\n    You give him a stiff talking-to inspired by a grizzled coach with a heart of gold you saw in an inspirational sports film the other night. Russell protests at first, but in time he is caught up by your rhetoric and promises to see the survey through.\n\n    Two hours later, no phone call, no survey report, no Russell. You sigh and reach for your coat.\n    *set ruthlessness +1\n    *set vanished true\n    *goto visit_house\n  #Tell Russell to wait there for you.\n    At least while this buffoon is failing to achieve anything on your behalf, he is also failing to achieve anything for ${rival}. You grab an old metre stick on the way out the door. It's unlikely to be needed for measuring, but you can always smack Russell around the head with it.\n    *set worklife -1\n    *set vanished true\n    *goto visit_house\n*comment #################################################################\n*label no_russell\n\nIt's probably for the best that you visit the house yourself early on. What's needed here is not a standard floorplan and a sugary description. What's needed is vision and inspiration, both of which you possess in abundance. You enjoy a brief moment of professional satisfaction as you stroll down the stairs from the office. By street level it has already evaporated.\n\n*comment #################################################################\n*label visit_house\n\nYou fight your way through Edinburgh's lunchtime traffic.\n\nCrowther Terrace is a wavy street in the suburbs. One end is propped up with tired tenement flats, but as you drive further down, the houses become bigger and more exotic. You notice a couple of minor Queen Anne disasters and one particularly hideous hybrid with Tudor detailing.\n\nNumber 57 is on the outside of the last bend, set back from the pavement behind two leafless trees and a wrought iron fe
