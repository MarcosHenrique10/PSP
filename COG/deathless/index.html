Cass Chen; you.  Not to mention the client himself, an executive of Transdimensional Thaumaturgics, a thin pale man in a black suit.  You know him only as John Smith.\n\nThe world warps around him, and the stuff of nightmares bends.\n\n*page_break\n\nThe meeting wheels through old business to new.  Smith watches with cold black eyes, and seems almost bored, not at all as if your work is the only barrier between his firm and demonic invasion.\n\nAt last, Stone clears his throat, leans forward in his chair, cracks his knuckles, and asks if anyone has new business.\n\n*page_break\n\n*if (lie)\n\tVega leans back in his chair, innocent and calm.\n\t\n\tThat is, until you speak.\n\t\n\t\"Actually,\" you say.  \"It looks like there's a hole in the contract.  Something to do with the definitions of ownership.\"  You watch John Smith carefully, but see no reaction save a slight terrifying smile.  \"I wonder if there's more information you haven't told us.\"\n\n\tWhen Smith speaks, you almost miss his words: his voice is that ordinary, as if you don't hear his words so much as assume them.  \"I will need more details.\"\n\t\n\t\"You'll have them,\" Stone says.\n\t\n\tVega turns to you, and you catch your breath at the anger in his eyes.  But the meeting ends.\n\t\n\t*set Vega %-30\n\t*set Chen %+10\n\t*set Stone %+20\n\t*set Smith %+10\n\t*page_break\n\t*goto After_Meeting\n\n*else\n\t\"In fact,\" Vega says.  \"Last night, I discovered a weakness in the contract.  A minor hole, related somehow to definitions of ownership.  I'll send you the details.  We will need any documents you can provide connected with this manner.\"\n\t\n\t\"Of course,\" Smith says.  Smith's voice is so ordinary you don't so much hear his words so much as assume them.  \"I'll have the documents sent.\"\n\t\n\tAnd that's all.  No mention of your discovery.  No mention of Cass.  Across the table, you see Chen swell with rage.  Vega's taken your thunder, and  hers as well.\n\t\n\tShe opens her mouth.\n\t\n\t*choice\n\t\t#I stay silent.  Let Cass hang.\n\t\t\t*goto Cass_Speaks\n\t\t#I correct Vega's claim myself.\n\t\t\t*page_break\n\t\t\tYou start talking before Cass can speak.  \"Thank you,\" you say, though nobody addressed you.  Just keep moving your mouth, and you should be fine.  \"We were surprised to discover this yesterday.  The more information we have, the better.\"\n\t\t\t\n\t\t\t\"I would have preferred,\" Smith says, \"to learn this earlier.\"  But he doesn't press the issue.\n\t\t\t\n\t\t\tStone smiles.  You don't know why, and that worries you.  Vega, for his part, goes pale.\n\t\t\t\n\t\t\t*set Stone %+30\n\t\t\t*set Vega %-20\n\t\t\t*set Smith %+10\n\t\t\t*set Chen %+10\n\t\t\t*set Correct_Vega 1\n\t\t\t*goto After_Meeting\n\t\t#I try to distract her.\n\t\t\t*if ((charm > 40) or (Chen > 40))\n\t\t\t\t*goto Cass_Distract_Success\n\t\t\t*else\n\t\t\t\t*goto Cass_Distract_Fail\n\n*label Cass_Distract_Success\n\nBut she's interrupted by a crash as you knock your water glass off the table.  It shatters on the beast's stomach, and the table shakes as the creature groans and rolls in its sleep.  Everyone turns to you, and you apologize profusely.  As the others return to business, you shoot Cass an unmistakeable glare.\n\nShe sees, and stops, though she doesn't look happy.\n\n*set charm %+10\n*set Chen %+10\n*set Cass_Distract 1\n*set Correct_Vega 0\n*goto After_Meeting\n\n*label Cass_Distract_Fail\n*set Cass_Distract 0\n\nYou try to get Cass's attention, but if she sees your wave she ignores it.\n\n*goto Cass_Speaks\n\n*label Cass_Speaks\n\n\"The faster you can get us the information we need,\" Cass says, \"the better.  When ${Char_voc} ${Surname} and I discovered this weakness yesterday, we were shocked to find no one had fixed it yet.\"\n\n\"Of course,\" Smith says, smooth and entirely unperturbed.\n\nVega, though, seems quite perturbed indeed.  If looks could kill, Cass would be halfway in the grave already.\n\n*set Correct_Vega 0\n*goto After_Meeting\n\n*label After_Meeting\n*page_break\n\nThe nightmare ends, and you, Vega, Stone, and Cass wake in a fortieth-floor conference room.  Vega stands, brushes off his jacket, and excuses himself quickly.  Cass rises, flushed, obviously struggling to keep herself under control.  She rounds the table, but before she can reach you, someone speaks.\n\n\"${Char_voc} ${Surname}.  I find myself desiring coffee.  Would you care to accompany me?\"\n\nIt's Stone.  And from what you know of partners, this doesn't sound like a request.\n\n*choice\n\t#\"Of course, sir.\"\n\t\t\"Excellent.  Shall we?\"  He motions you ahead of him.  As you turn to go, you see Cass disappear around the corner.  She's obviously upset, but what else were you supposed to do?  Stone's name is on the front door.\n\t\t\n\t\t*set Chen %-10\n\t\t*set gunner %+20\n\t\t*set Stone %+20\n\t\t*set chat_with_stone true\n\t\t\n\t\t*goto Stone\n\t#\"Actually, I have a meeting with Ms. Chen.  Maybe in half an hour?\"\n\t\tStone frowns slightly.  \"No, unfortunately I'm busy in half an hour.  Another time, perhaps.\"\n\t\t\n\t\tHe nods to you, the barest minimum motion required for the gesture to qualify, and departs the conference room.  For a man of his size and bearing, \"depart\" is undoubtedly the proper verb.  \"Leave\" doesn't take long enough to say.\n\t\t\n\t\tYou turn back to Cass, whose anger has been replaced by open disbelief.  \n\t\t\n\t\t*set Chen %+20\n\t\t*set Stone %-20\n\t\t\n\t\t*goto Cass_Post\n\n*label Stone\n\nStone leads you out of the building, into sunlight and cool autumn wind.  You try, unsuccessfully, to remember the last time you were out during the day.  Mystic circles and demonic invasions have become more normal to you than the sun.\n\nStone stops at a Muerte Coffee a few blocks away.  There's a line straight to the door, and the two of you wait there, not talking.  By your estimate of Stone's billing rate, the ten minutes it takes you to reach the counter would cost something on the order of three thousand thaums.\n\nYou get your coffee to go.  Stone takes a right out of the shop door, and leads you further from the office.\n\n*page_break\n\nWhen he turns the corner, he says, without preamble:  \"So.  What do you think of Mr. Vega?\"\n*label Stone_Choice\n*choice\n\t#\"He's a good man.  Ambitious.\"\n\t\t\"Ambitious enough to take credit for your work, you mean.\"  He laughs.\n\t\t\n\t\t\"I didn't say that, sir.\"\n\t\t*set cunning %+10\n\t\t*set Stone %+20\n\t\t*page_break\n\t\t*goto Protege\n\t*if (not(lie)) #\"He tried to take credit for my work.\"\n\t\t\"You're honest, I see.  Most people wouldn't be, with me.\"\n\t\t\n\t\t\"I don't want to waste your time.  Or mine.\"\n\t\t*set power %+10\n\t\t*set Stone %+30\n\t\t*page_break\n\t\t*goto Protege\n\t#\"I don't think of him.\"\n\t\t*temp or_a_woman \"\"\n\t\t*if (char_gender = \"female\")\n\t\t\t*set or_a_woman &\"He glances at you, and takes another sip of coffee. \\\"Or a woman, either.\\\"\"\n\t\t\n\t\tStone frowns.  \"You should.  A Craft firm is a partnership, yes, but it's also an arena.  Never let a man take credit for your kills.\"  ${or_a_woman}\n\t\t\t\n\t\t\"Of course not.\"\n\t\t*set Craft %+15\n\t\t*goto Protege\n\t*hide_reuse #\"What do you think of him?\"\n\t\t\"I know what I think already,\" Stone says.  \"You may have mistaken this for a conversation between equals.\"\n\t\t*goto Stone_Choice\n\t\t\n\n*label Protege\n\n\"Vega,\" Stone says, \"is Nebuchadnezzar's protege.  Her pet associate, recently raised to counsel.  He wants to join the partnership.  This is his first big case.\"\n\nHe says this flatly, without accent or anger.  And yet.\n\n*if (cunning > 40)\n\tYou can't shake the thought that, of the three senior partners, Stone's the one whose name gets left out when Craftsmen name the firm in casual conversation.  And Nebuchadnezzar, well, [i]her[/i] name is left in.\n*if (cunning \u003c= 40)\n\tYou sense bitterness behind his words.\n*comment endif\n*if (lie)\n\t\"You did a good thing,\" Stone says, \"defending your own work against his incursion.  Not everyone at the firm is entirely pleased with Vega's meteoric rise.\"\n\t\n*if not(lie)\n\t\"Don't be afraid to defend your own work,\" Stone says.  \"Even if it means fighting dirty.  Not everyone at the firm is entirely pleased with Vega's meteoric rise.\"\n\t\n*choice\n\t#\"I don't understand what you mean, sir.\"\n\t\t\"Well,\" Stone says.  \"What do those desert prophets say?  Those who have ears to hear, let them wear earplugs.\"  He drains the rest of his coffee.  \"Or something.  I need to get back.\"\n\t\t*set Stone %-10\n\t\t*goto Office\n\t*if (cunning > 50) #\"I don't understand what you mean, sir.\"  But really, you do.\n\t\t\"Well then.\"  He drains the rest of his coffee.  \"There's not much left to discuss, is there?\"\n\t\t*set Stone %+30\n\t\t*set gunner %+20\n\t\t*goto Office\n\t*if (cunning \u003c 60) #\"I'll do my best to undercut him.\"\n\t\tStone takes as long to blink as most men take to yawn.  \"Nobody's saying you should undercut anyone.  The very notion's repellant to our general principles of community support.\"\n\t\t\n\t\t\"Of course, sir,\" you say.\n\t\t\n\t\tHe finishes his coffee, and the two of you return to the office.\n\t\t*set Stone %+20\n\t\t*set power %+10\n\t\t*set gunner %+10\n\t\t*goto Office\n\t#\"There's room enough at the top.\"\n\t\t\"That,\" Stone says, \"is the perpetual refrain of those who have not yet been close enough to the top to know how much room it may or may not afford.\"\n\t\t\n\t\tHe drains the rest of his coffee.  \"I need to get back.\"\n\t\t*set Stone %-10\n\t\t*set charm %+10\n\t\t*goto Office\n\t#\"So long as it doesn't keep us from serving the client.\"\n\t\t\"Ah, yes.  The client.  Have you, ${Char_voc} ${Surname}, spent much time in the presence of our honorable client, Mr. Smith?\"  He pauses, for effect—he knows you haven't.  \"Perhaps if you had, you would feel somewhat less concerned for his well-being.  There are stranger powers in the world than those we wield.\"\n\t\t\n\t\tHe drains the rest of his coffee.  \"I need to get back.\"\n\t\t*goto Office\n\n*label Office\n*page_break\n\nStone doesn't speak more on the way back to the office, or in the elevator.  You get off on your floor, and return to your office, pondering the brief conversation.\n\n*if (background = \"beggar\")\n\tYou're not used to this kind of backbiting and politics.  When you were a kid on the street, arguments were settled in the open, with insults or with fists or worse.  You don't like this back-room manipulation of a man's career.  No matter your feelings about Vega himself.  Then again, if that's how they play in this office, what does it matter to you?  These aren't your people or anything.\n*if (background = \"poor\")\n\tYou're not used to this kind of backbiting and politics.  If there were problems on the farm, people talked them out.  Or else if they nursed a grudge and told no one, they recognized this was damn fool behavior and didn't work to undermine one another.\n\t\n\tNew game, new rules.\n*if (background = \"comfortable\")\n\tSeems to you everyone's behaving like kids in grammar school.  Secret agendas, hidden plots, wheels within wheels.  Who likes who more, who's jockeying for what position.  You thought serious people would be better than this.\n*if (background = \"aristo\")\n\tThis is all too familiar.  You know the dance—you've seen your parents pass through a version of it every social season.  One of your earliest memories is of Grandmere warning your mother to hide her contempt for a society \"friend.\"  You'd expected the trades to have slightly less tolerance of such maneuvering.  Perhaps you were wrong.\n\t\n\tTiresome.\n*comment endif \n\nIt must be possible to be a partner in a firm without miring yourself in skulduggery.  Mustn't it?\n\nOn the way to your office, you pass Cass Chen's.\n\n*if (lie)\n\t*goto Cass_Post_Lie\n\t\n*label Cass_in_Office\n\nShe's pacing, with a sheaf of papers in one hand, but she is not reading the papers.  Her footsteps are heavy with anger.\n\n*choice\n\t#Cass can take care of herself.\n\t\tYou let her pace.  She's hotheaded.  She'll blow off steam, and get back to work when she's good and ready.\n\t\t\n\t\tYou return to your office, and get back to work yourself.\n\t\t*set Chen %-10\n\t\t*set power %+10\n\t\t*goto Work\n\t#I should encourage her.\n\t\tHer office door's open.  You slip through, and wait patiently.  She doesn't seem to notice your arrival, pacing back and forth.\n\t\t\n\t\t\"We'll be fine,\" you say, and she jumps.  Did she really not notice you were standing there?  \"Vega just tries to play the game.\"\n\t\t\n\t\tShe doesn't take long to overcome her surprise.  \"So we should smile while he steals our work?  Your work?\"\n\t\t*set power %+10\n\t\t*if Correct_Vega = 1\n\t\t\t*page_break\n\t\t\t\"No.  That's why I interrupted him.  And you.  But…it's dangerous.\"\n\t\t\t\n\t\t\tCass blinks.  \"Why, ${name}.  You do care.\"\n\t\t\t\n\t\t\t\"Sometimes.\"\n\t\t\t*set Chen %+20\n\t\t\t*goto Cass_on_Vega\n\t\t*else\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"Sometimes.  For now.  We're new at this, both of us.  We need to learn the ropes first.  Not jump in over our heads before we know how deep the water is.\"\n\t\t\t\n\t\t\t*if (char_gender = \"male\") or (char_gender = \"undefined\")\n\t\t\t\t\"Caution.  Consideration.  Look before you leap.  You sound like my father.\"\n\t\t\t*if char_gender = \"female\"\n\t\t\t\t\"Caution.  Consideration.  Look before you leap.  You sound like my mother.\"\n\t\t\t*comment endif\n\t\t\t\t\n\t\t\t\"I'm just trying to help.\"\n\t\t\t\n\t\t\t\"And it's the thought that counts?\" she asks.\n\t\t\t\n\t\t\t\"I hope so.\"\n\t\t\t*set Chen %+10\n\t\t\t*goto Cass_on_Vega\n\t#I should help her learn to play the game.\n\t\tHer office door's open.  You slip through, and wait patiently.  She doesn't seem to notice your arrival, pacing back and forth.\n\t\t\n\t\t\"You have to learn,\" you say, and she jumps.  Did she really not notice you were standing there?  \"This is a game.  There are rules.  Getting upset about the rules is like getting upset when someone castles in a game of chess.\"\n\t\t\n\t\tShe continues pacing.  \"I always hated chess.\"\n\t\t\n\t\t*if Cass_Distract = 0\n\t\t\t\"You did something very dangerous back there.  It was a risk, and we won't know for a long time whether it paid off.\"\n\t\t*if Cass_Distract = 1\n\t\t\t\"You almost did something very dangerous back there.\"\n\t\t*if Correct_Vega = 1\n\t\t\t\"I did something very dangerous back there.  It was a risk, and we won't know for a long time whether it paid off.\"\n\t\t*comment endif\n\t\t*set Chen %-10\n\t\t*set cunning %+10\n\t\t*goto Cass_on_Vega\n\t#I should ask her what's wrong.\n\t\tHer office door's open.  You slip through, and wait patiently.  She doesn't seem to notice your arrival, pacing back and forth.\n\t\t\n\t\t\"What's wrong?\" you ask. She jumps.  Did she really not notice you were standing there?\n\t\t\n\t\tShe seems happy to see you.  She discards the papers, and turns to face you.  She smiles, but it's a rueful sort of smile.  \"What do you think?\"\n\t\t\n\t\t\"You can tell me.\"\n\t\t*set chen %+10\n\t\t*goto Cass_on_Vega\n\n*label Cass_Post_Lie\n\nShe's pacing, with a sheaf of papers in one hand, but she is not reading the papers.  Her footsteps are heavy with anger.\n\nYou enter, and she rounds on you at once, as if she's been waiting for you to cross that threshold.  Her eyes go wide, not with surprise.  \"You.\"\n\nShe walks to the door, slams it.\n\n\"Why did you do that?  Why did you lie to Vega?\"\n\n*choice\n\t#\"You would rather I let him take the credit for our discovery?\"\n\t\t\"Is that the game we play, here?  No trust?  No reliability?\"\n\t\t\n\t\t\"We're necromancers.  Trust isn't in the job description.\"\n\t\t\n\t\t\"Maybe it should be.\"\n\t\t*set honor %-10\n\t\t*set power %+10\n\t\t*goto Cass_on_Vega\n\t*if (Craft > 60) #\"I knew the wards would hold long enough to give us a chance to tell the whole team.\"\n\t\t\"And you made Vega look like a fool in a meeting.  You might be good at the Craft, but you lose ground when it comes to people.\"\n\t\t\n\t\t\"You hate Vega.  And you know he'd have done the same to us if the situations were reversed.\"\n\t\t\n\t\t\"I'm not so sure,\" she says.\n\t\t*set Craft %+15\n\t\t*set Chen %-10\n\t\t*goto Cass_on_Vega\n\t#\"You're defending him now?\"\n\t\t\"Everything I've said about the guy in the past holds true.  But there must be a better way to handle him than lying.  Especially better than lying in a way that hurts us all.\"\n\t\t\n\t\t\"It didn't.\"\n\t\t\n\t\t\"You made us look weak in front of the client.\"\n\t\t\n\t\t\"Smith doesn't know I had the chance to tell Vega.  We're fine.\"\n\t\t\n\t\t\"Are we?\"\n\t\t\n\t\t\"Don't you trust me?\"\n\t\t*set charm %+10\n\t\t*set Chen %-10\n\t\t*goto Cass_on_Vega\n\t#\"An omission isn't technically a lie.\"\n\t\t\"That is a very, very slippery slope.\"\n\t\t\n\t\t\"We're not in an honorable and upright business.  In case you didn't notice.\"\n\t\t\n\t\t\"The business might not be inherently honorable.  That doesn't mean we have to be jerks.\"\n\t\t*set cunning %+10\n\t\t*set Chen %-10\n\t\t*goto Cass_on_Vega\n\n*label Cass_Post\n\nYou escort Cass into her office, and close the door behind you.\n\nCass sits back in her chair and swears, softly, in a Shining Empire dialect you don't recognize.  She opens her eyes, and stares up at the ceiling.  \n\n*if (lie)\n\t*goto Cass_Post_Lie_A\n\t\nYou sense she's waiting for you to talk.\n\t\n*choice\n\t#I should encourage her.\n\t\t\"We'll be fine,\" you say.  \"Vega just tries to play the game.\"\n\t\t\n\t\t\"So we should smile while he steals our work?  Your work?\"\n\t\t*set power %+10\n\t\t*if Correct_Vega = 1\n\t\t\t*page_break\n\t\t\t\"No.  That's why I interrupted him.  And you.  But…it's dangerous.\"\n\t\t\t\n\t\t\tCass blinks.  \"Why, ${name}.  You do care.\"\n\t\t\t\n\t\t\t\"Sometimes.\"\n\t\t\t*set Chen %+20\n\t\t\t*goto Cass_on_Vega\n\t\t*else\n\t\t\t*page_break\n\t\t\t\n\t\t\t\"Sometimes.  For now.  We're new at this, both of us.  We need to learn the ropes first.  Not jump in over our heads before we know how deep the water is.\"\n\t\t\t\n\t\t\t*if (char_gender = \"male\") or (char_gender = \"undefined\")\n\t\t\t\t\"Caution.  Consideration.  Look before you leap.  You sound like my father.\"\n\t\t\t\t*goto Cass_Chat_Encourage\n\t\t\t*else\n\t\t\t\t\"Caution.  Consideration.  Look before you leap.  You sound like my mother.\"\n\t\t\t\t*goto Cass_Chat_Encourage\n\n\t\t\t*label Cass_Chat_Encourage\t\t\t\t\n\t\t\t\"I'm just trying to help.\"\n\t\t\t\n\t\t\t\"And it's the thought that counts?\" she asks.\n\t\t\t\n\t\t\t\"I hope so.\"\n\t\t\t*set Chen %+10\n\t\t\t*goto Cass_on_Vega\n\t#I should help her learn to play the game.\n\t\t\"You have to learn,\" you say, and she flinches.  \"This is a game.  There are rules.  To let yourself get upset about that is like letting yourself get upset about a game of chess.\"\n\t\t\n\t\t\"I always hated chess.\"\n\t\t\n\t\t*if Cass_Distract = 0\n\t\t\t\"You did something very dangerous back there.  It was a risk, and we won't know for a long time whether it paid off.\"\n\t\t\t*goto Cass_Chat_Help\n\t\t*else\n\t\t\t\"You almost did something very dangerous back there.\"\n\t\t\t*goto Cass_Chat_Help\t\t\t\n\t\t*label Cass_Chat_Help\n\t\t*set Chen %-10\n\t\t*set cunning %+10\n\t\t*if Correct_Vega = 1\n\t\t\t\"I did something very dangerous back there.  It was a risk, and we won't know for a long time whether it paid off.\"\n\t\t\t*goto Cass_on_Vega\n\t\t*goto Cass_on_Vega\n\t#I should ask her what's wrong.\n\t\t\"What's wrong?\" you ask.\n\t\t\n\t\tShe smiles, more, you think, at your tone of voice than at the question itself.  \"What do you think?\"\n\t\t*set charm %+10\n\t\t*set Chen %+20\n\t\t*goto Cass_on_Vega\n\n*label Cass_Post_Lie_A\n\n\"Why did you do that?  Why did you lie to Vega?\"\n\n*choice\n\t#\"You would rather I let him take the credit for our discovery?\"\n\t\t\"Is that the game we play, here?  No trust?  No reliability?\"\n\t\t\n\t\t\"We're necromancers.  Trust isn't in the job description.\"\n\t\t\n\t\t\"Maybe it should be.\"\n\t\t*set honor %-10\n\t\t*set power %+10\n\t\t*goto Cass_on_Vega\n\t*if (Craft > 60) #\"I knew the wards would hold long enough to give us a chance to tell the whole team.\"\n\t\t\"And you made Vega look like a fool in a meeting.  You might be good at the Craft, but you lose ground when it comes to people.\"\n\t\t\n\t\t\"You hate Vega.  And you know he'd have done the same to us if the situations were reversed.\"\n\t\t\n\t\t\"I'm not so sure,\" she says.\n\t\t*set Craft %+15\n\t\t*set Chen %-10\n\t\t*goto Cass_on_Vega\n\t#\"You're defending him now?\"\n\t\t\"Everything I've said about the guy in the past holds true.  But there must be a better way to handle him than lying.  Especially not in lying in a way that puts us all in danger.\"\n\t\t\n\t\t\"It didn't.\"\n\t\t\n\t\t\"You made us look weak in front of the client.\"\n\t\t\n\t\t\"Smith doesn't know I had the chance to tell Vega.  We're fine.\"\n\t\t\n\t\t\"Are we?\"\n\t\t*set charm %+10\n\t\t*set Chen %-10\n\t\t*goto Cass_on_Vega\n\t#\"An omission isn't technically a lie.\"\n\t\t\"That is a very, very slippery argument.\"\n\t\t\n\t\t\"We're not in an honorable and upright business.  In case you didn't notice.\"\n\t\t\n\t\t\"The business might not be inherently honorable.  That doesn't mean we have to be jerks.\"\n\t\t*set cunning %+10\n\t\t*set Chen %-10\n\t\t*goto Cass_on_Vega\n\n\n*label Cass_on_Vega\n\nShe sighs.  \"Vega's a jerk.\"\n\n*choice\n\t#\"He's a fine person, I think.  Just in a bad situation.\"\n\t\tCass grimaces.  \"And that excuses everything?\"\n\t\t\n\t\t\"Of course not.  But maybe we should trust him a little more.\"\n\t\t\n\t\t*if(lie)\n\t\t\t\"That sounds rich, coming from you.\"\n\t\t\t\n\t\t\t\"Well.  Maybe I was wrong, to do what I did.\"\t\n\t\t*comment endif\n\t\t\n\t\tCass doesn't look convinced.  \"We'll see.\"\n\t\t\n\t\t*set charm %+10\n\t\t*goto Cass_Chat_End\n\t#\"He certainly is that.\"\n\t\tYou and Cass trade stories about Vega for much longer than either of you can afford: he sent her a letter at four o'clock in the morning with an \"urgent\" stamp, he addresses everyone as \"sir,\" and uses brutal amounts of pomade in his hair.  Before long you're both in a better mood—good enough, at least, for work.\n\t\t*set Chen %+15\n\t\t*set power %+10\n\t\t*goto Work\n\t#\"We'll get the best of him somehow.\"\n\t\t\"What does that mean?\"\n\t\t\n\t\t\"Nobody's perfect.  He'll slip up, and we'll be there when he does.\"\n\t\t\n\t\tCass nods, but she doesn't seem convinced.\n\t\t*set cunning %+10\n\t\t*goto Cass_Chat_End\n\t#\"Don't worry about him.  We can get through this if we stick together.\"\n\t\t\"Together, huh?\"  She looks at you for what feels like a very long moment.  Her eyes are dark, of course, you know that, but for some reason you really notice it now.  \"Together sounds good.\"\n\t\t\n\t\t*set charm %+10\n\t\t*set Chen %+20\n\t\t*goto Cass_Chat_End\n\t\t\n\n*label Cass_Chat_End\n*page_break\n\nYou excuse yourself, and return to your office—to your work.\n\n*goto Work\n\t\n*label Work\n\nYou sit down at your desk, ponder your pen and your knife and the journeyman Craft circle etched into the hard wood.  How do you work, knowing all that you now know?\n\n*choice\n\t#I work harder, on my own.\n\t\tYou'll shine so bright that Vega won't be able to claim the glow for himself.  Of course, this means more sleepless nights, more pots of black coffee, more stress dreams when you do manage to return home to your long-unwashed sheets.\n\t\t\n\t\tVega notices your extreme diligence, and approves.\n\t\t*set power %+20\n\t\t*set gunner %+10\n\t\t*set sleep %-10\n\t\t*set Vega %+10\n\t\t*goto Vega\n\t#I slack off.  Vega will take the blame.\n\t\tNo need to break your back for someone who will take credit for your successes.  Not that you're lazing on the job, of course.  Just—well.  Things take as long as they take.  You go out to drinks once or twice with your coworkers, because no one can begrudge you a social life.  And, wonder of wonders, you sleep.  Well.  For the first time in months.\n\t\t\n\t\t*if gunner > 60\n\t\t\tIt feels decadent.  It feels like cheating.  It feels…good.\n\t\t\t*set gunner %-20\n\t\t\t*goto slacker_stat_adj\n\t\t*label slacker_stat_adj\n\t\t*set cunning %+10\n\t\t*set gunner %-10\n\t\t*set sleep %+20\n\t\t*set Vega %-10\n\t\t*goto Vega\n\t#I look for flaws in Vega's work. \n\t\tVega's sharp, but you have an edge over him in sheer theoretical Craft.  You comb through his work, even work that other associates have checked many times, and find flaws.\n\t\t\n\t\tHere, a mis-drawn circle that might have allowed a demon to escape.  There, a truename poorly written.  A minor provision actually violates metaphysical law in some districts of Southern Kath.\n\t\t\n\t\tAll these you find, and send up the chain of command.  Vega thanks you for each, but you know he should have caught them before now…and Stone knows, too.\n\t\t*set Vega %+10\n\t\t*set Stone %+20\n\t\t*set Craft %+20\n\t\t*goto Vega\n\t#I work as closely with Chen as I can.  Safety in numbers.\n\t\tYou and Chen need one another.  You check one another's work, you visit one another's offices when questions come up.  Neither of you claims responsibility for the other's insights; over time, you build an implicit trust, and a reputation as a good team.  Which, you hope, reflects well on you both.\n\t\t*set Chen %+20\n\t\t*set charm %+20\n\t\t*set sleep %-10\n\t\t*goto Vega\n\n*label Vega\n\n*page_break\nThree weeks into your ongoing review of Smith's documents, Cass takes a brief vacation—her cousin's getting married.  \"I'm so sorry,\" she says on her way out the door.  \"I wish I could stay.\"\n\n*fake_choice\n\t#\"No you don't.\"\n\t#\"I wish you could, too.\"\n\t#\"Get out of here.\"\n\t#\"Like you'll miss this.\"\n\nShe laughs, and leaves.\n\n*page_break\n\nYou stay later than usual that evening, tying up loose ends.  At ten o'clock at night, you take a break and rise from the desk, leaving a bowl of blood to cool.  Your joints creak and crack as you proceed to the break room.\n\nIt's empty—or so you think, at first.  You pour yourself coffee, sip it, make a face, and turn.  Movement in the dark.  You tense, at first, then recognize Vega.\n\nHe leans against a table, coffee mug in hand.  The perfect hair looks mussed, and there are lines on his face you didn't see before.\n\nHe looks up.  His eyes are vacant.  \n\n*if (Vega > 50)\n\tHe sees you, though.  \"${Name}.  Late night?\"  \n\n*choice\n\t#I leave as fast as possible.\n\t\t\"Late night,\" you say.  \"As usual.\"\n\t\t\n\t\tYou leave him there, with steam rising from the coffee to frame his face.\n\t\t*set Vega %-10\n\t\t*goto Next_Day\n\t#I act friendly.\n\t\t\"You look tired,\" you say.  \"Is everything all right?\"\n\t\t\n\t\t*if (Vega \u003c 30)\n\t\t\tHe shakes his head.  \"Why should you care?\"\n\t\t\t\n\t\t\t\"Just making conversation.\"\n\t\t*comment endif\n\t\t\n\t\tHe smiles, a ghost of a smile.  \"I am tired.  Late nights, recently.\"\n\t\t\n\t\t\"No rest for the wicked, I guess.\"\n\t\t\n\t\t\"The more wicked the less rest.\"  He laughs.\n\t\t\n\t\t\"Plenty of rest when we're dead.\"\n\t\t*set Vega %+20\n\t\t*goto Vega_Chat_2\n\t\t\t\n\t#I'll talk, but I don't want to display much sympathy.\n\t\t\"Late night,\" you say, and lean against the table beside him.  \"But you know.  If you can't stand the heat, stay out of the hells.\"\n\t\t\n\t\tHe laughs, bitterly.\n\t\t*goto Vega_Chat_2\n\n*label Vega_Chat_2\n\n\"It is strange to be exposed,\" he says.  \"You work and you work, and at a certain point you realize that all your work only gives your enemies more chances to watch you fail.\"\n*choice\n\t#\"What do you mean by 'enemies'?\"\n\t\tHe shrugs.  \"There are many.  This firm is staffed by immortals of godlike power and nearly unlimited resources.  Do you expect they care much for any of us?  We are pawns to them, and a pawn useful to one side one day may be swept off the board by another.\"\n\t\t\n\t\t\"That,\" you say, \"is a bleak vision.\"\n\t\t\n\t\t\"Perhaps.\"  He stands, and sighs.  \"I am sorry.  I do not mean to fill your ears with my own late-night weakness.  We will be fine.  And you have nothing to worry about.  As far as I am aware, you are as yet unhated.\"\n\t\t\n\t\tYou walk back to your offices together in silence.  But the tone of his voice remains with you long after the words themselves have faded from the air.\n\t\t\n\t\t*set Vega %+10\n\t\t*goto Next_Day\n\t*if (chat_with_stone) #Tell him about my chat with Stone.\n\t\t\"You're right about that,\" you say, and tell him about your chat with Stone.  You keep it anonymous—a story from a friend—but you give him the general outline.\n\t\t\n\t\tHe nods, grimly.  \"I suspected as much.  Thank you for telling me, though.  Spend too long living with suspicion, and it catches up with you.\"  He stands, and sighs.  \"I am sorry.  We will be fine.  And I do appreciate your honesty, and your loyalty.\"\n\t\t\n\t\tYou walk back to your offices together in silence.  But as you lower yourself once more to your desk, you wonder if you have done the right thing.\n\t\t\n\t\t*set Vega %+40\n\t\t*set cunning %+10\n\t\t*set Stone %-20\n\t\t*goto Next_Day\n\t*if (not(lie)) #\"Is that why you took credit for discovering the breach?\"\n\t\tHe shakes his head.  \"Whoever presented the breach was likely to be blamed, both by the partner and by the client, for not discovering it earlier.  It is not the way matters should stand, but it is the way they do stand, more often than not.\"\n\t\t\n\t\t\"That,\" you say, \"is a kind gloss to put on the fact that you stole my work.\"\n\t\t\n\t\t\"I don't think it is a gloss.  But I may be wrong.  You see what happens?  One's instinct for self-preservation and self-advancement can become so automatic that one must even doubt one's own good intent.\"\n\t\t\n\t\tYou walk back to your offices together in silence.\n\t\t\n\t\t*set Vega %+20\n\t\t*set cunning %+10\n\t\t*goto Next_Day\n\t\t\n\t#\"You seem to be doing okay.\"\n\t\t\"Seemings can deceive.  A man climbs a cliff, only for the cliff to collapse when he strikes his piton into the face three quarters up.  Was he 'doing okay' at the halfway mark?\"  Vega shrugs.  \"Anyway, we should get back to work.\" \n\t\t\t\n\t\tYou walk back to your offices together in silence.\n\t\t\n\t\t*set Vega %-10\n\t\t*goto Next_Day\n\n\t*if (not(lie)) #\"Is there anything I can do to help?\"\n\t\tVega looks up at you in surprise.  \"You know, that's the first time in a long while around here that anyone has offered to help me.  As a human being, I mean, rather than as a Craftsman.  Thank you.\"  He finishes his coffee.  \"The offer itself is appreciated, even if there is nothing you can do beyond performing your duties admirably.\"\n\t\t\n\t\t\"Thanks,\" you say, \"I think.\"\n\t\t\n\t\tHe laughs.  The two of you walk together back to your separate offices.  Silent, he drifts closer to you—two warm bodies alone in the overwhelming shadows of the darkened, mostly empty office building.\n\t\t\n\t\tAs you part, he hesitates.  \"Thank you.\"\n\t\t\n\t\tHe's standing just on the edge of close, though maybe you're imagining it.\n\t\t*set charm %+10\n\t\t*set Vega %+30\n\t\t*choice\n\t\t\t*if (Vega > 50) #I try to kiss him.\n\t\t\t\t*if Vega > 60\n\t\t\t\t\tHe's still at first, so still, though his lips are warm.  Then, once he realizes what's happened, he starts to respond: he accepts your kiss, returns it, pulls you close.  He's hungry, in this dark hall.\n\t\t\t\t\t\n\t\t\t\t\tYou shouldn't be doing this.  But it's late, and you're worried, and so is he.  You [i]need[/i] each other more than [i]like[/i] each other, now.\n\t\t\t\t\t\n\t\t\t\t\t\"There's a room,\" he says.  \"Not far from here.  And dark.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\t\tHe leads you to a chamber set aside for the use of the nightmare telegraph—a narrow space and dark, with a small bed that smells of old fear.  The door, fortunately, locks.  Neither of you can see the other; the room is black as pitch.  All you can do is feel.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tFeeling is enough.  And there are other smells than fear.  You lie beside one another, tender and silent in the darkness.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tBut when it's done, the work remains.  You leave the room first, and he follows soon after.\n\t\t\t\t\t\t\t*set Vega %+20\n\t\t\t\t\t\t\t*set Vega_sex +1\n\t\t\t\t\t\t\t*goto Next_Day\n\t\t\t\t\t\t#\"Later.\"\n\t\t\t\t\t\t\t\"Very well,\" he says, and pulls away.  \"Thank you, though.  I needed that.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"The pleasure's mine,\" you say with a small smile, before you retreat into your office.\n\t\t\t\t\t\t\t*set Vega %+10\n\t\t\t\t\t\t\t*goto Next_Day\n\t\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t\t\"Very well,\" he says, and pulls away.  \"Thank you, though.  I needed that.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"The pleasure's mine,\" you say with a small smile, before you retreat into your office.\n\t\t\t\t\t\t\t*goto Next_Day\n\t\t\t\t*else\n\t\t\t\t\tHe's still at first, though his lips are warm.  Then, slowly, he takes you by the shoulders and steps back.  The pressure of his hands keeps you from following him.  \"I'm sorry,\" he says.  \"I appreciate the sentiment.  But please.  Not now.  There is so much to do.\"\n\t\t\t\t\t\n\t\t\t\t\t\"I understand,\" you say, though it stings.  \"Good luck.\"\n\t\t\t\t\t\n\t\t\t\t\t\"We do not need luck.  Merely skill, and hard work.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Well, I hope we have those, then.\"  And you smile.  You almost even feel the smile, inside.\n\t\t\t\t\t\n\t\t\t\t\tAlmost.\n\t\t\t\t\t\n\t\t\t\t\tYou enter your office and close the door.  Vega watches you, but there's little satisfaction in that.  Reluctantly, you bend yourself again to work, and taste the echo of his lips on yours.\n\t\t\t\t\t*goto Next_Day \n\t\t\t#\"Good luck.\"\n\t\t\t\t\"And to you as well,\" he says, and turns away.\n\t\t\t\t*goto Next_Day\n\t\t\t#I enter my office.\n\t\t\t\tPlenty of work left to do tonight.\n\t\t\t\t*goto Next_Day\n\t\t\n*label Next_Day\n*page_break\nThe next day's a weekend, but you're in the office as usual.  And as usual, the mail golem shows up at two, bearing packages from around the world.  You receive nothing, but you do hear it scuttle on many legs into Cass's office, and set down a heavy package on her desk.\n\nWhen the golem's gone, you step into Cass's office, and glance over the package.  It's a thick document box, marked with the ID glyph of the Transdimensional Thaumaturgics case.  Several red URGENT stamps glare at you from the sides.\n\n*page_break\n\nYou open the box.  After all, you told Cass you would.\n\nAs you rip open the parcel you feel the world grow a step darker, or possibly brighter.  Something's here.  You know it.\n\t\nYou spread the papers out on Cass's desk and shuffle through them.  Carbon copies, of an executive whose name you don't recognize from the TT board lists you've memorized over the last few months.\n\n*page_break\n*if (((Craft - (sleep_difficulty)) > 50) or ((Cunning - (sleep_difficulty)) > 50)) \n\t\n\tAnd yet, here's a letter—a simple letter in plain Kathic—which represents the dam as a \"joint project,\" and notes how it will \"offer both our firms a foothold in new territory.\"\n\t\n\tThis is it.  This is the hole.  It's small, but if the demon hordes of Akargath claim Transdimensional executives represented the dam as a joint project—they might be able to push for joint ownership.  And from there… You have a sudden image of demonic hordes sweeping out into the deep jungles of Southern Kath, to breed and grow and infest.\n\t*choice\n\t\t#I need help.  I bring the box to Vega.\n\t\t\t*set charm %+10\n\t\t\t*goto Vega_Known\n\t\t#I bring the box to Vega, and blame Cass for not being here to receive it.\t\n\t\t\t*goto Vega_Known_Blame\n\t\t#I don't need Vega.  I can fix this myself.\n\t\t\t*goto Solo\n\n*else\n\tBut none of it makes sense to you.  Something's here, you're certain, if only you could find it. \n\n\t*choice\n\t\t#I need help.  I bring the box to Vega.\n\t\t\t*set charm %+10\n\t\t\t*goto Vega_Unknown\n\t\t#I bring the box to Vega, and blame Cass for not being here to receive it.\n\t\t\t*goto Vega_Unknown_Blame\n\n*label Vega_Known\n\nVega's working through the weekend, like you and like always.  You run breathless into his office, interrupt his drafting of a summons, and explain what you've found.\n\n*set Vega %+30\n*goto Vega_Choice\n\n*label Vega_Known_Blame\n\nVega's here, working through the weekend, like you and like always.  You run breathless into his office, interrupt his drafting of a summons, and explain what you've discovered.  \"I can't believe we haven't seen this before now,\" you say.  \"If I hadn't happened to check Cass's mail while she was out—\"\n\nAnd maybe you do feel a pang of conscience about that, but what the hells, it reflects better on you than it does on Cass.\n\n*set Vega %+20\n*set Cass_Under_Bus true\n*goto Vega_Choice\n\n*label Vega_Unknown\n\nVega's here, working through the weekend, like you and like always.  You run breathless into his office, interrupt his drafting of a summons, and explain what you've found.\n\nHe pages through the contents of the package, and his face pales as he nears the end.\n\n*set Vega %+20\n\n*page_break\n*goto Vega_Reveal\n\n*label Vega_Unknown_Blame\n\nVega's here, working through the weekend, like you and like always.  You run breathless into his office, interrupt his drafting of a summons, and explain what you've found.  \"There's something here,\" you say.  \"I know.  If I hadn't happened to check Cass's mail while she was out—\"\n\nHe pages through the contents of the package, and his face pales as he nears the end.\n\n*set Vega %+20\n*set Cass_Under_Bus true\n*goto Vega_Reveal\n\n*label Vega_Reveal\n\n\"This is it,\" he says.  \"Nothing complex.  Just a letter, from a deposed executive—which claims the dam is a joint project, and says it will 'offer both our firms a foothold in new territory.'\"\n\t\n\"And that's all they need.  If Akargath can claim Transdimensional presented the dam as a joint project—they might be able to push for joint ownership.  And from there…\"  He shudders.  You have a sudden image of demonic hordes sweeping into the deep jungles of Southern Kath, to breed and grow and infest.\n\n*goto Vega_Choice\n\n*label Vega_Choice\n*page_break\n\n\"I don't know what we should do,\" he says.  \"This is big, and we need it fixed, fast.  We should call Stone.\"  He seems reluctant.\n\n*if ((charm > 50) or (cunning > 50)) and (Chat_With_Stone) \n\tAnd you know why: Stone could use this as an opening to help him in his slow war against Vega.  You don't know, any more, whether that's a good thing.\n\n*choice\n\t#\"We should bring Stone into the loop.\"\n\t\tVega sighs.  \"You're right, of course.  I'll send the letter.\"  His shoulders slump, and he looks at you like a man about to drown.  \"This is the right thing to do.\"\n\t\t\n\t\t\"Sure,\" you say.\n\t\t*set Vega %-20\n\t\t*goto Stone_Fix\n\t#\"We can fix it together.\"\n\t\tHe nods, slowly.  \"A good idea.  Together.  I can think of a few steps that will help, if you assist me.\"\n\t\t\n\t\tThis would be the perfect place to let him down.  But you decided against that already.  You nod.  \"Let's go.\"\n\t\t*set Vega %+10\n\t\t*goto Vega_Fix\n\t#\"Let me do it by myself.\"\n\t\tHe blinks.  \"What?\"\n\t\t\n\t\t\"Simple.  I can take care of this, then you report to Stone that I did it.  We both get credit, and neither of us has to look weak.\"\n\t\t\n\t\t\"You really think you can do this?\"\n\t\t\n\t\t\"I don't think,\" you say.  \"I know.\"\n\t\t\n\t\t*set Vega %+30\n\t\t*goto Solo\n\n*label Vega_Fix\n*set Vega_Fix true\n*page_break\nYou can see why Vega's on the fast track for promotion—and it's not just because he has a powerful patron.  Overstressed, overtired, he's still a genius.  You start to wonder if all he needed was your encouragement.\n\nBut what the hells.  At least it works.\n\nOnce shaken out of his distress, Vega moves through the building like a lightning spark moves between clouds: swift, shining, and aflame.  He dispatches messages by raven, rat, and nightmare to members of the firm you've never heard of before.  He summons dark powers to his beck and call.  Glyphs along the length of his body burn with silver flame, and the sclera of his eyes dim to black.\n\nYou enter the land of the gods again to block up the gap in the contract, together.  As you carve new lines into the darkness of the gods' domain, you see beyond the gap the writhing glass talons of the demon plane, and hear sounds quite like screams.\n\nAnd then, at the last, you go to notify the client.\n\n*set Craft %+20\n*set charm %+10\n*set power %+10\n*set cunning %+10\n*page_break\n\nNo nightmares for this; there's no time, and nightmares are too susceptible to observation.  The firm keeps a dedicated scrying mirror on the forty-first floor, and there you and Vega turn out the lights, and speak three times the secret name of the man called John Smith.\n\nCobweb razors brush your face, and he stands before you both.  Normal as ever: an unassuming man in an unassuming suit, with a chilling, angular smile.\n\nYou watch, and learn, as Vega presents your discovery.  And the solution, at least when set atop all the other work you've done this afternoon: \"We'll need to claim that you kicked this executive out because you discovered he was working against Transdimensional's interests.  Incompetence might also work.  If we can establish that, then we can minimize the effect of his letter.\"\n\n\"Her letter,\" Smith corrects.  And that grin, that broken grin, it grows.\n\nBut you've won.  Haven't you?\n\n*page_break\n\nThe mirror dims, and light returns.\n\nVega steps back, sweating, and for a moment, just a moment, he lets himself sag.  Human, after all that.  A human being with a human smile.\n*if (Vega > 70)\n\n\tThen he turns to you, laughs, and wraps you in a big hug.  He smells of expensive cologne and relief.\n\t  \n\tHe draws back, suddenly embarrassed, but still smiling.\n\t*goto Jaunty\n\n*label Jaunty\n\"Drinks are on me tonight.  I'll meet you down at CJ's!\"  And he leaves, swinging his arms.  Jaunty.\n\n*if (background = \"beggar\")\n\tYou've never used that word before.  Hells, when you were a kid you never thought you'd know anyone who that word might describe.  But there it is.  And for all his aristocratic edge, for all the superiority he doesn't even know he oozes, you can't help but feel happy for him.\n\n*page_break\n\nYou turn to leave.\n\nBut as you go, a glimmer of light from the mirror catches your eye.\n\n*goto Smith_Alone\n\n*label Stone_Fix\n*set Stone_Fix true\nYou never expected to see a senior partner so glad to work on a weekend.  Stone swans into the office, stepping so jauntily you could confuse him for a sprightly youth of a mere two hundred pounds.  He salutes you—a mock salute, but with a real smile underneath it.\n\nVega doesn't look as happy.\n*achieve stonefix\n\n*if (background = \"aristo\")\n\tYou've seen people stand like that before: cadet members of the family, or those who lost a manor or a few hundred souls at the poker table, would have the same shorn expression when they came to beg Grandfather for favors.\n*comment endif\n\nYour role in this drama, at least, is reduced.  Stone leads Vega through a complicated series of Craft procedures, and calls on aid from many mystical sources; from the pieces you catch of their conversation you can tell the depth of Stone's experience, and his power.\n\nAfter a hard day's work, when you've done all you can do, you go to see the client.\n\n*page_break\n\nNo nightmares for this; there's no time, and nightmares are too susceptible to observation.  The firm keeps a dedicated scrying mirror on the forty-first floor, and there Stone and Vega stand, and turn out the lights, and speak three times the secret name of John Smith.\n\nCobweb razors brush your face, and he stands before you.  Normal as ever: an unassuming man in an unassuming suit, with a chilling, angular smile.\n\nYou watch, and learn, as Stone presents the discovery.  And the solution, at least when set atop all the other work you've done this afternoon: \"We'll need to claim that you kicked this man out because you discovered he was working against Transdimensional's interests.  Incompetence might also work.  If we can establish that, then we can minimize the effect of his letter.\"\n\n\"Her letter,\" Smith corrects.  And that grin, that broken grin, it grows.\n\n*if (char_gender = \"female\")\n\tYou shiver.\n\nBut you've won.  Haven't you?\n\n*page_break\n\nThe mirror dims, and light returns.\n\nStone shoots his cuffs, and inspects them, finding not the slightest stain of sweat.  \"Well,\" he says.  \"Good job on calling me, Hal.\"  After brief confusion you recognize Vega's name.  \"We nailed that one.\"\n\n\"Of course,\" Vega says, though you hear a slight sadness in his voice.\n\nStone laughs.  \"Come on.  Give me a few minutes to settle things around the office.  Then we're off to CJ's.  I could use a bottle of wine or two after all this work.  And, ${Surname}.\"  He turns to you.  \"You come, too.\"\n\nThey leave together.  You linger in the room, turning over the day's events in your head, wondering what you should have done differently.  Or if.\n\n*page_break\n\nYou turn to leave.\n\nBut, before you go, a glimmer catches the corner of your eye.\n\n*goto Smith_Alone\n\n*label Solo\n*set sleep %-5\nSo, what do you do next?\n\n*choice\n\t*hide_reuse #Knowing the source of the problem, I can patch the hole in the contract.\n\t\t*if ((craft - (sleep_difficulty)) > 50)\n\t\t\tYou enter the land of the gods again to block up the gap in the contract, alone.  As you carve new lines into the darkness of the gods' domain, you see beyond the gap the writhing glass talons of the demon plane, and hear sounds quite like screams.\n\t\t\t\n\t\t\tIt's horrifying, but it works.\n\t\t\t*set craft %+20\n\t\t\t*set percent_complete +40\n\t\t\t*set ward true\n\t\t\t*set soul -500\n\t\t\t*goto Solo\n\t\t*else\n\t\t\tYou enter the land of the gods again to block up the gap in the contract, alone.  As you carve new lines into the darkness of the gods' domain, you see beyond the gap the writhing glass talons of the demon plane, and hear sounds quite like screams.\n\t\t\t\n\t\t\tYou can't do it.  Not enough, anyway.  You Craft your ward, but it's weak.\n\t\t\t*set craft %+20\n\t\t\t*set percent_complete +10\n\t\t\t*set soul -500\n\t\t\t*if soul \u003c 500\n\t\t\t\t*page_break\n\t\t\t\tBut you feel your soul ebbing away as you Craft the ward.  You've grown too weak; your mind shakes, and you can't continue.\n\t\t\t\t*goto Fail\n\t\t\t*goto Fail\n\t*hide_reuse #Let's claim the exec was speaking without authority.\n\t\tSimple enough.  Or it should be.\n\t\t\n\t\t*if ((cunning - (sleep_difficulty)) > 50)\n\t\t\tTurns out one of the three hundred twenty-five document boxes you've received from Transdimensional Thaumaturgics over the course of the last few months contains an employee handbook, and Appendix A in the bowels of that handbook has a great deal to say about representative statements and the cases in which an executive may present himself as speaking for the company.\n\t\t\t\n\t\t\tAs far as you can tell, none of those conditions were met.\n\t\t\t\n\t\t\tAlways good to have a little more help.\n\t\t\t\n\t\t\t*set cunning %+20\n\t\t\t*set percent_complete +25\n\t\t\t*set No_Authority true\n\t\t\t*page_break\n\t\t\t*goto Solo\n\t\t*else\n\t\t\tBut navigating HR policies and employee agreements makes your brain hurt.  Maybe if you'd had more sleep.  Maybe if you knew this area of the Craft better…  Well.  Too many \"if\"s here for your taste.\n\t\t\t*set percent_complete +10\n\t\t\t*goto Solo\n\t*hide_reuse #I prepare a flat denial that the letter's binding.\n\t\tNothing stops a claim quite like a baldfaced denial.  Well.  To be fair: nothing stops a claim quite like a baldfaced denial coupled with firepower.\n\t\t\n\t\t*if ( (power - (sleep_difficulty))>50)\n\t\t\tAnd you have firepower to spare.  You craft a statement with direct and cutting language, denying the executive's letter is binding on Transdimensional Thaumaturgics, denying that the language in the letter subjects Transdimensional's dam project to any outside control, denying that the letter had any bearing on the course of negotiations.  You stop short of denying that the letter was ever written, much less on paper, but you feel like you've got the point across.  \n\t\t\t\n\t\t\tAltogether, it's a nice piece of work.\n\t\t\t\n\t\t\t*set power %+25\n\t\t\t*set percent_complete +25\n\t\t\t*set Denial true\n\t\t\t*page_break\n\t\t\t*goto Solo\n\t\tYou find a standard template and base your work off that; it lacks a certain rhetorical flare, perhaps, and you wonder whether it could have been more persuasive, but it gets the job done.  Basically.\n\t\t\n\t\t*set percent_complete +10\n\t\t*page_break\n\t\t*goto Solo\n\t#I can contact the client.\n\t\tYou sure can.  There's even a dedicated scrying mirror on the forty-first floor that will let you reach John Smith.  But if you contact him, you'd better have all your i's dotted and your t's crossed first.\n\t\t\n\t\tAre you ready?\n\t\t*choice\n\t\t\t*hide_reuse #As always.\n\t\t\t\t*set power %+10\n\t\t\t\t*set gunner %+10\n\t\t\t\t*goto Test\n\t\t\t#As I'll ever be.\n\t\t\t\t*goto Test\n\t\t\t#On second thought, there are a few things I want to try first.\n\t\t\t\t*goto Solo\n\n*label Test\nYou give your progress one last review.\n\n*if (Ward)\n\tYou've created a solid, durable ward around the contract's weak point.\n\t\n*if (No_Authority)\n\tYou've found regulations that indicate the executive had no negotiation authority.\n\n*if (Denial)\n\tYou've constructed a strong denial of the letter's power and significance.\n*comment end_if\n\n*if (percent_complete >= 90)\n\tIf that isn't enough, you don't know what would qualify.\n\t*set solo_fix true\n*if (percent_complete \u003c 90) and (percent_complete >= 70)\n\tYou think this is enough.  You're pretty sure.  It must be.\n\t*set solo_fix true\n*if (percent_complete \u003c70) and (percent_complete >= 55)\n\tYou've made good progress.  But there's more to be done.  If only you could do it.\n*if (percent_complete \u003c55)\n\tYou don't have what you need.  There's no way you can go to the client with this.\n\n*choice\n\t#I can't do this alone.\n\t\t*goto Fail\n\t#There must be something more I can do.\n\t\t*goto Solo\n\t*selectable_if (percent_complete >=55) #It's time to call John Smith.\n\t\t*goto Smith\n\t\n*label Fail\n\nYou can't do it.  You can't continue, not on your own.  You have no other ideas.  You've tried everything, and nothing works.\n\n*choice\n\t#I ask Vega for help.\n\t\tYou go to Vega and tell him everything from your last meeting to this point, not leaving out your failure.\n\t\t\n\t\t*if (Vega > 60)\n\t\t\tHe nods.  \"It's okay.  You did what you could.\"\n\t\t\t\n\t\t\t\"I might have done more.\"\n\t\t*comment endif\n\t\t\t\n\t\t\"Well.  At least now we can get this fixed.\"\n\t\t\n\t\tHe strides out the door, and you follow him.\n\t\t\n\t\t*page_break\n\t\t*goto Vega_Fix\n\t#I ask Vega and Stone for help at once.\n\t\tYou send a message to them both before you go to look for Vega in his office.  You find him reading your message.  He looks shocked.  \"This happened on my watch?\"\n\t\t\n\t\t\"Not on your watch.  You had no way of knowing.\"\n\t\t\n\t\t\"Stone won't see it that way.\"\n\t\t\n\t\tYou don't disagree.\n\t\t\n\t\t*set Stone %+20\n\t\t*set Vega %-10\n\t\t*page_break\n\t\t*goto Stone_Fix\n\n*label Smith\n\nNo nightmares for this; there's no time, and nightmares are too susceptible to observation.  The firm keeps a dedicated scrying mirror on the forty-first floor, and you stand there, turn out the lights, and speak three times the secret name of John Smith.\n\nCobweb razors brush your face, and he stands before you.  Normal as ever: an unassuming man in an unassuming suit, with a chilling, angular smile.\n\n\"Why, ${char_voc} ${surname}.  I did not expect to have the pleasure of your company so soon.\"\n\nHe presses the tips of his fingers together, and looks at you, and you wonder if the thing to which you're speaking is human at all.  How much have you ever known about John Smith?\n\nOutside, of course, of the fact that he is your client.\n\n*page_break\n\nYou tell him about the letter.  About your efforts to protect Transdimensional.\n\n*if (percent_complete >= 95)\n\tSmith's eyes widen slightly when you describe the steps you've taken for him.\n\t\n\t\"You are…thorough,\" he says, and you really wish you didn't hear that as \"thoroughbred.\"  \"This is precisely the kind of work I expect from your firm.\"\n\t\n\t*set Smith %+50\n\t*set Stone %+40\n\t*set Vega %+20\n\t*set gunner %+20\n\t*achieve solofix\n\t*goto Final_Point\n\n*if (percent_complete \u003c95) and (percent_complete >=70)\n\t*if char_gender = \"male\"\n\t\tSmith nods as you describe your efforts.  \"Reasonable, and comprehensive.  I appreciate that work in a Craftsman.\"\n\t\t*goto HP_statadj\n\t*if char_gender = \"female\"\n\t\tSmith nods as you describe your efforts.  \"Reasonable, and comprehensive.  I appreciate that work in a Craftswoman.\"\n\t\t*goto HP_statadj\n\t*label HP_statadj\n\t*set Smith %+40\n\t*set Stone %+30\n\t*set Vega %+10\n\t*set gunner %+20\n\t*achieve solofix\n\t*goto Final_Point\n*if (percent_complete \u003c70)\n\tSmith frowns.  \"This work you're describing doesn't seem terribly…comprehensive.\"\n\t\n\t\"If you'd rather I wait to contact you until demons were swarming over your property, I'd be happy to do that.\"\n\t\n\tHe laughs, unpleasantly.\n\t*set Smith %+30\n\t*set Stone %-10\n\t*set Vega %-10\n\t*set gunner %-10\n\t*goto Final_Point\n*label Final_Point\n*page_break\n\nAnd you come to the final point: \"If true, it would help if you could claim you kicked this executive out because you discovered he was working against Transdimensional's interests.  Incompetence might also work.  If we can establish that, then we can minimize the effect of his letter.\"\n\n\"Her letter,\" Smith corrects.  And that grin, that broken grin, it grows.\n\n*if (char_gender = \"female\")\n\tYou shiver.\n\n*page_break\n\n*if cunning > 60\n\tAnd that grin makes you wonder.  \"You know,\" you say, conversationally.  \"It's strange that this letter didn't surface until so late in the case.  Almost as if someone hid it, to make sure it became a crisis, which would then allow you to take extreme measures to resolve.\"\n\t\n\tThe grin does not falter.  \"Every organization has its own politics,\" Smith says.  \"And we all must play the game.\"\n\t*set Smith %+30\n\t*choice\n\t\t#\"That's not the way I work.\"\n\t\t\t*set power %+10\n\t\t\t*set honor %+20\n\t\t\t\"Everyone has their flaws.\"\n\t\t\t*goto Smith_Alone\n\t\t#\"I know exactly what you mean.\"\n\t\t\t*set cunning %+10\n\t\t\t*set honor %-10\n\t\t\t\"I doubt you do,\" Smith says, \"but perhaps I'm wrong.\"\n\t\t\t*set Smith %+10\n\t\t\t*goto Smith_Alone\n\t\t#\"Who was she?\"\n\t\t\t*set charm %+10\n\t\t\t\"She didn't matter,\" he says.  \"Grist for the mill.  Her sponsors matter.  And her underlings.  We are all connected, you know, as in a spiderweb.  The question is only which strand to cut.\"\n\t\t\t\n\t\t\t\"If you have to cut a strand at all.\"\n\t\t\t\n\t\t\t\"All strands must be cut sometime.\"\n\t\t\t*set honor %+10\n\t\t\t*goto Smith_Alone\n\t\t#\"There must have been a way for you to get what you needed without exposing your firm.\"\n\t\t\t*set Craft %+10\n\t\t\t\"One of the things I wanted,\" he says.  \"Perhaps.  But not everything.\"\n\t\t\t*goto Smith_Alone\n\n*label Smith_Alone\n\nSmith stands in the mirror, waiting.  You feel alone.  Lonelier, even, than you would have felt without him there.\n\n\"What do you want?\" you say at last.\n \n\"I wonder,\" he says, \"how you would describe the inner workings of your team.\"\n\n*choice\n\t#\"So you can use that against us?  No thanks.\"\n\t\t\"Touching loyalty.  I wonder whether those you serve are worthy of it.\"\n\t\t\n\t\t*if (background = \"aristo\")\n\t\t\tThat word, [i]serve[/i], ices into you.\n\t\t*comment endif\n\t\t\n\t\t\"A pleasure talking with you,\" Smith says.  \"I'll see you again soon, I hope.\"\n\t\t\n\t\tAnd he vanishes.  Leaving you victorious, and alone.\n\t\t*goto Case_Denouement\n\t#\"Vega likes to take credit for things he shouldn't.\"\n\t\t\"A fair report.  It's a shame to see so little trust in a team.  I may discuss this with Mr. Stone on our next meeting.  Don't worry, though.  I won't mention that you were my informant.\"\n\t\t\n\t\t*if (background = \"beggar\")\n\t\t\t\"Informant\" was a dirty word where you come from.  He shouldn't know that.  But somehow, of course, he does.\n\t\t*comment endif\n\t\t\n\t\t\"A pleasure talking with you,\" Smith says.  \"I'll see you again soon, I hope.\"\n\n\t\tAnd he vanishes.  Leaving you victorious, and alone.\n\n\t\t*set Stone %+20\n\t\t*set Vega %-20\n\t\t*set honor %-20\n\t\t*goto Case_Denouement\n\t#\"Stone's suspicious of Vega, but it didn't hurt us much.\"\n\t\t\"A fair report.  It's a shame when underlings can't trust their manager.  I may discuss this with Mr. Varkath on our next meeting.  Don't worry, though.  I won't mention that you were my informant.\"\n\t\t\n\t\t*if (background = \"beggar\")\n\t\t\t\"Informant\" was a dirty word where you come from.  He shouldn't know that.  But somehow, of course, he does.\n\t\t*comment endif\n\t\t\n\t\t\"A pleasure talking with you,\" Smith says.  \"I'll see you again soon, I hope.\"\n\n\t\tAnd he vanishes.  Leaving you victorious, and alone.\n\n\t\t*set Stone %-30\n\t\t*set Vega %+10\n\t\t*set honor %-20\n\t\t*goto Case_Denouement\n\t\n*label Case_Denouement\n*page_break\n\n*comment add little paragraphs indicating with whom you're celebrating. (Or if you're celebrating at all.)\n*if Stone_Fix\n\tStone buys the drinks at CJ's.  He laughs loud, and talks louder.  The staff greet him by name, and escort the three of you to a recently-vacated table in the shadowy rear corners of the restaurant.  Vega joins in the banter, and you eat dinner and talk about anything but work for hours.  To all outward appearance, you celebrate victory.  Just don't look too deeply in Vega's eye, and ignore the ruddy glow of triumph that adds to Stone's alcoholic sheen.\n*if Vega_Fix\n\tYou and Vega head across the street to CJ's together, grab seats at the bar and toast to success.  The world's safe for at least tomorrow.  You touch glasses, and laugh, and let the last few hours' terror recede.\n*comment endif\n\nYou celebrate the victory…\n*choice\n\t#In style.\n\t\t…with a party to shake the heavens and make the gods complain.  And the headache's worth it.\n\t\t\n\t\t*set soul -100\n\t\t*set sleep %-10\n\t\t*goto Monday\n\t#With restraint.\n\t\t…with a few drinks, which leads to dancing, which leads, well, to more drinks—but before you manage to hit the dance floor again your body smacks you hard with the Exhaustion Mallet.\n\t\t*set sleep %-5\n\t\t*goto Monday\n\t#With a cup of tea and an early bedtime.\n\t\t…with a nice Chamomile and a pleasant feeling of accomplishment.  Not to mention a good night's sleep.\n\t\t*set sleep %+10\n\t\t*goto Monday\n\t\t \n*label Monday\n\nMonday morning comes too soon, though, as it always does, especially after a weekend spent working.  You pass the morning at your desk, trying to review documents, and nursing a cup of bitter, nasty break room coffee.\n\nYou do receive a note
