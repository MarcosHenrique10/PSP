man, permit them to carry out their dark designs through our work.  I reduced her, and I survived their attempted assassination, which I'm sure you can imagine didn't much endear them to me.  And now I'll take my advantage, and my leave.  Staggering back home with tales of a gallant negotiation, great success, and at the last, betrayal.\"\n\n*fake_choice\n\t#\"I won't let you do this.\"\n\t\t\"What makes you think you have any say in the matter?\"\t\n\t#\"And how do I fit into this plan?\"\n\t\t\"You don't, precisely.\"\n\t#\"Forced labor, godlike powers.  Great.  So how long do you think it will take to wrap all this up?  There's a ball game I'd like to catch back home at seven.\"\n\t\t\"You assume a great deal.\"\n\t#\"What makes you think this will work?\"\n\t\t\"Outside of the fact that it has already?\"\n*comment endif\n\nYou don't like the sound of that.\n\nAnd then you see it.  \"You can play demon king all you like—that contract will break the second someone realizes it was signed under duress.  A deal under duress is no deal at all.\"\n\n\"Exactly,\" he says.  \"And no matter how I warp this world to convince them—\" with a wave at the assembled silent demons, \"—this was all their idea to begin with, I couldn't do the same to whoever VNS sent along.  They'd have a demon's body, but wouldn't be part of this world any more than I am.  Add to that the other piece of evidence—the insurance, the activation of which I'd have to explain.  So I asked for you, for someone with a history of risking ${Char_pro_pos} own life to save mine.  I am sorry,\" he says, \"but you're about to have been tragically slain by an assassin's dart meant for me.  Valiant, really.  I'll make sure you have a glorious funeral.  My bonus this quarter will more than cover it.\"\n\n*page_break\n\nThen he tries to kill you.\n\n*set final_diff %-(craft / 5)\n*temp fight false\n\n*choice\n\t#Not if I try to kill him first!\n\t\t*set power %+10\n\t\t*set soul -500\n\t\tBefore he can bring his newfound might to bear, you throw out your hands.  Glyphs burn all up and down your forearm; clouds boil in the sky above, and lightning pours down upon Smith like water from the heavens.\n\t\t*if (power - sleep_difficulty) > (final_diff + 5)\n\t\t\tHe staggers beneath the onslaught, falls to one knee, bent double by the fury you've unleashed.\n\t\t\t\n\t\t\tHe stands, though, slow as a man under a heavy weight.  He snaps his fingers, and you fly back, hit the floor, skid.  You're up a second later, calling razor wire vines from the earth to snake around Smith's limbs.  He breaks them into shards, and the shards sweep through the air toward you.  A hastily-erected shield stops some of the splinters—some.  Others pierce your suit, your skin, and end up cutting into your flesh.\n\t\t\t\n\t\t\tYou can't take much more of this: Smith could draw off his own ill-defined powers forever, while yours—yours have a far more finite limit.  Time to take this battle on the move.\n\t\t\t\n\t\t\tYou call a sandstorm between you, and command it to seek out Smith's eyes, his lungs.  Perhaps he still thinks he's human enough to drown.  The sand burns to slag, but you're already moving, three illusions crafted to sprint in three different directions while you Craft a globe of fire to catch Smith and melt his flesh.\n\t\t\t\n\t\t\tHe doesn't bother to tell the difference between the illusions: simply raises his hand, and the ground beneath your feet shatters, and the stadium walls collapse.  You swing huge chunks of rubble at him with your mind; three disintegrate inbound, but one strikes him straight in the chest and he falls—only to rise again, and float toward you upon the empty air.\n\t\t\t\n\t\t\tYou sprint through the rubble out into Akargath, trailing fury.\n\t\t\t*set fight true  \n\t\t\t*set wounds +1\n\t\t\t*goto end\n\t\t*else\n\t\t\tThe onslaught washes off him like water.  Sparks leap from his diamond flesh and gavotte across the checkerboard floor.  He laughs.  His voice sounded human when he was speaking, but the laughter isn't.\n\t\t\t\n\t\t\tHe doesn't even move.  Fire sheaths your skin.  You fall, screaming, rolling on the ground.  Suck the flames into yourself, draw power from their hunger.  You scramble back to your feet, and run.\n\t\t\t*set soul +100\n\t\t\t*set wounds +3\n\t\t\t*goto end\n\t#I run.\n\t\t*set cunning %+10\n\t\t*set soul -600\n\t\tYou can't fight him here, in the open.  Not for long anyway.  You need time, and space, to come up with a plan.  Which starts with cover.\n\t\t\n\t\tThe tile floor around him is made of particles, same as air or anything else; you pour your own soulstuff into them, directing tile shards everywhere at once.  Dust fills the arena with a ceramic crack, and under its cover you run.\n\t\t*if (cunning - sleep_difficulty) > (final_diff + 10)\n\t\t\tSmith wasn't expecting that—he swipes angrily through the air around him, clearing wide clear swaths of dust, but more billows in to fill the space.  He lashes out in all directions, blindly shattering the floor and portions of the stadium wall; a flying shard of glass slices through your suit jacket and your arm beneath, but blood or whatever they have here in the demon world instead pumps hard in your chest and you don't feel the sting.\n\t\t\t*set wounds +1\n\t\t\t*goto end\n\t\t*else\n\t\t\tSmith didn't expect that, but it does not delay him long.  When you erupted the floor into dust, you forgot to summon enough wind to keep the dust in the air; with a swipe of his hand the billows settle.\n\t\t\t\n\t\t\tYou're already halfway to the exit, but he doesn't even need to move.\n\n\t\t\tFire sheaths your skin.  You fall, screaming, rolling on the ground.  Suck the flames into yourself, draw power from their hunger.  You scramble back to your feet, and run.\n\t\t\t*set wounds +3\n\t\t\t*set soul+100\n\t\t\t*goto end\n\t#I appeal to the demons, break his hold on them.\n\t\t*set charm %+10\n\t\t*set soul -600\n\t\tSmith has no limits here.  There's nothing he can't do.  But you remain a ${Craftsperson}, and though your powers are limited, they remain.  Smith's bound the remaining guards—and the entire stadium—to stillness.  But they have no duty to obey him, no bond, no fiduciary responsibility as they owe to K'lint.  You close your eyes, find that bond, and pull.\n\t\t\n\t\t*if (charm - sleep_difficulty) > (final_diff + 15)\n\t\t\tAnd the demons move.  They spring through the air, screams condensed to glass and given cutting edge.  Smith shatters them, wave after wave.  Glass rains onto the tile; a broken limb catches you in the arm and tears your suit and flesh.  One of the guards catches him in the side, and cuts him—the wound warps through many dimensions and closes up again.  Smith screams, though, which you like.\n\t\t\t\n\t\t\tHe advances through the slaughter toward you, eyes burning.  And you run.\n\t\t\t*set wounds +1\n\t\t\t*goto end\n\t\t*else\n\t\t\tThe demons remain in place.\n\t\t\t\n\t\t\tWell, it was a good idea, anyway.\n\t\t\t\n\t\t\tYou run, and make it halfway to the exit, but Smith doesn't even need to move.\n\t\t\t\n\t\t\tFire sheaths your skin.  You fall, screaming, rolling on the ground.  Suck the flames into yourself, draw power from their hunger.  You scramble back to your feet, and run.\n\t\t\t*set wounds +3\n\t\t\t*set soul +100\n\t\t\t*goto end\n\n*label end\n*page_break\n\n*if not(fight)\n\tYou make it to the exit, and sprint through the long narrow hallway out into the demon city, out into Akargath, bleeding and bruised.  \"Run all you like.\"  Smith's voice in the air.  He appears before you, in a splendor of chaotic wings.  \"I can feel you crawling on my skin.\"\n*if (fight)\n\tYour battle rages on through the stadium rubble, and out into the city.  You grow weaker with each failed assault.  You've spent so much soul you doubt you're even technically alive any more.  But if you don't fight, there will be no question of technicalities.\n\t\n\tYou catch Smith in a Xeno cage, but he crosses the uncrossable distance between its walls.  You make his component atoms hate each other—but you're not certain he even has component atoms any more.\n\t\n\tAnd, when you pant with exhaustion, Smith descends from the sky in a splendor of chaotic wings.\n*comment endif\n\nAbove, demon towers claw at the impossible sky.\n\n\"You're only delaying the inevitable.\"\n\nBreath doesn't come easy.  \"You seem pretty…evitable…to me.\"\n\nAnd the battle's joined again.\n\n*page_break\n\nYou fight beneath the broken, breaking demon sky.\n\n*if ((power > craft) and ((power > cunning) and (power > charm)))\n\tYou blast him with dark magics, and pour out your soul onto the foreign earth.  He staggers, and rises once more.  You break the world beneath him, but he does not fall.\n*if ((craft > power) and ((craft > cunning) and (craft > charm)))\n\tYou call upon all the ${Craftsperson}'s tricks you know, you invoke dread bargains with ancient and long-slumbering beings, you spread through time.\n*if ((cunning > craft) and ((cunning > power) and (cunning > charm)))\n\tYou duck and weave through the city, disappearing into its crystal towers, lashing out from hiding places.  You are a striking ghost.\n*if ((charm > cunning) and ((charm > power) and (charm > craft)))\n\tYou call upon demons to fight him.  Hordes arise and descend.  He bends them to his will, but more emerge.  Even gods have their limits, and you test his.\n*comment endif\n\nThe battle rages on for hours.  You bleed, and you ache, and you burn, and you scream.  He laughs, only laughs, and pursues.  You do not know how you will win this fight, but you'll think of something.\n\n*set wounds +5\n\nMaybe.\n\nBut then, at the last, you're tired.  Your power is at ebb, and Smith stands before you, resplendent in fury.\n\n*if(battle_redirect)\n\tYou bend his own power against him, to no effect.\n*if(battle_trap)\n\tYou spring elaborate traps, and he strides through them.\n*if(battle_talk)\n\tYou threaten him with retribution, you promise your friends will wreak vengeance upon him, but he does not care.\n*if(battle_run)\n\tYou flee, and he pursues you.\n*if(battle_disguise)\n\tYou hide, and he sees through your disguise.\n*if(battle_force)\n\tYou strike him with full mystic might, and he strides out through the dust cloud, unharmed.\n*if(battle_fistpunch)\n\tYou hit him in the face, even, which does not accomplish much but is, in fact, hilarious.\n*comment endif\n\t\nAnd then he strikes you, and you shatter.\n*finish", "demonworld2": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 8: The Demon World - Part Two\n\n*comment temporary variables\n\n*comment These are used for fun on-the-fly sentence constructing; see label heart_choice below\n*temp And_yet \"And yet you\"\n*temp you \"\"\n\n*temp friends_save_you false\n\n*if ((((((Chen + Wakefield) + Ngabe) + Vega) + Varkath) + Stone) + Nebuchadnezzar) > 300\n\t*set friends_save_you true\n\n*comment The player gets five chances to assemble a working personality out of the choices she's made up to this juncture.  Two choices are stat-bound, three choices are storybit-bound.\n*temp pieces_collected 0\n\n*comment Beat 1: Pull yourself together!\n*advertisement\n\nWhich brings you here.  Where you've always been.\n\nShards scatter and fall, spin and cut, and break into new fragments.\n\nCards shuffling on a green felt table.  Glasses clink on the evening of your first victory.  The ozone singe of Craftwork.  Wakefield's face contorts to demonic laughter.  Night after night after night you work bent over documents, altars, alchemists' retorts.  Ajaia's green grove greets the night sky.  You smell skin and sweat.  You taste fine wine.\n\nAll the pieces remain, though as they fall they decay, burning like comets in the sun.\n\nWhat kind of idea are you?  What kind of story was your life?\n\nYou don't have much time.  Well.  You don't know how time works here, or if it even exists, but better to be on the safe side.\n\n*comment each point you use to pull yourself back together reduces 'wound' count by 1\n\n*label pieces_of_you\n\n*if pieces_collected >= 2\n\t*goto pieces_of_you_2\n\n*choice\n\t*hide_reuse #A story about strength and conviction.\n\t\tYou gather memories of strength, of personal might.  Of battle and perseverance, sweat and victory.\n\t\t\n\t\t*if power >= 80\n\t\t\tThey fuse together: all those times you gritted and pressed through, every time you stated a bad truth baldly, each time you battered and struck.  Unmade, you're free to marvel at yourself.  You are a paragon of strength.\n\t\t\t*goto power_piece_logic\n\t\t*elseif ((power \u003c 80) and (power >=60))\n\t\t\tThey fuse together: all those times you gritted and pressed through, every time you stated a bad truth baldly, each time you battered and struck.  You look on them with pride.  But this itself is not enough to remake you.\n\t\t\t*goto power_piece_logic\n\t\t*else\n\t\t\tThere are few enough to choose from: scattered memories of defiance shouted into a whirlwind world.  Not enough.\n\t\t\t*goto power_piece_logic\t\t\t\n\t\t*label power_piece_logic\n\t\t*comment endif\n\t\tBut no story is one thing altogether.  What other kind of tale could this be?\n\t\t*set wounds -round(power / 50)\n\t\t*set pieces_collected +1\n\t\t*goto pieces_of_you\n\t*hide_reuse #A trickster story.\n\t\tYou sift among the broken pieces for the moments of true finesse, for the clever last-minute solutions, for the realizations that saved the day.\n\t\t*if cunning >=85\n\t\t\tThat tumbler-in-a-lock feeling returns to you in an instant; you assemble a mosaic of genius, insight, and sheer underhanded manipulation.  Once prepared, you look on yourself with awe, and not a little fear.  You would not want to be set up against this placer of traps and this wheeler of wiles.\n\t\t\t*goto cunning_piece_logic\n\t\t*elseif ((cunning \u003c 85) and (cunning >= 60))\n\t\t\tYou sift through and assemble a framework of clever arguments, of traps and realizations, some too late, some early enough to make a difference.  This was your life, and while it's not everything by itself, it's a great deal.\n\t\t\t*goto cunning_piece_logic\n\t\t*else\n\t\t\tIt's not enough.  Slivers, that's all.  A momentary realization here or there.\n\t\t\t*goto cunning_piece_logic \n\t\t*label cunning_piece_logic\n\t\t*comment endif\n\t\tBut no story is one thing altogether.  What other kind of tale could this be?\n\t\t*set wounds -round(cunning / 50)\n\t\t*set pieces_collected +1\n\t\t*goto pieces_of_you\n\t*hide_reuse #A story of community, of people, of kindness and coming together.\n\t\tFriends.  A winning smile.  A clever comeback, a kind request.  You placed your trust in people, and let them bear you up.\n\t\t*if charm >= 90\n\t\t\tYou were deft at the use of words and hands and slight angles of the head and mouth.  You talked your way into places into which you never should have talked your way; you'd con your way into trouble and out again minutes later.\n\t\t\t*goto charm_piece_logic\n\t\t*elseif (charm \u003c 90) and (charm >=70)\n\t\t\tAnd bear you up they did—not to the heights of fortune, true, but neither did they sink you to its depths.\n\t\t\t*goto charm_piece_logic\n\t\t*else\n\t\t\tBut you did not do so often; there were other paths for you.\n\t\t\t*goto charm_piece_logic\n\t\t*label charm_piece_logic\n\t\tWhat other kind of tale was yours?\n\t\t*set wounds -round(charm / 50)\n\t\t*set pieces_collected +1\n\t\t*goto pieces_of_you\n\t*hide_reuse #A story of mystical might.\n\t\t*if craft >=80\n\t\t\tYou were a ${Craftsperson} of great subtlety and power, weaving wards and building contracts to bind entities beyond mortal ken.  The uncanny was your metier and the unnatural your favored mode.  The world quaked when you whet your knife.\n\t\t\t*goto craft_piece_logic\n\t\t*elseif ((craft \u003c80) and (craft >=60))\n\t\t\tYou took well to the Craft.  You built your reputation with it, became a subtle manipulator of the forces that break the sky call the dead back to some semblance of life.  It was not the center of your being, but nearly.\n\t\t\t*goto craft_piece_logic\n\t\t*else\n\t\t\tAnd yet mystical might was not your path.  You chose others, again and again.\n\t\t\t*goto craft_piece_logic\n\t\t*label craft_piece_logic\n\t\tWhat other stories made you up?\n\t\t*set wounds -round(craft / 50)\n\t\t*set pieces_collected +1\n\t\t*goto pieces_of_you\n\n*label pieces_of_you_2\nYou've assembled a vague picture of a person, but who were you?  What did you do?  The assemblage of traits that hangs glittering in the dark before you is a being, yes, but it lacks a heart.  Where was yours?\n*label heart_choice\n\n*if pieces_collected > 5\n\t*goto beat_2\n\n*choice\n\t*hide_reuse #My heart belonged to duty, to my firm first and foremost.\n\t\t*goto firm_duty\n\t*hide_reuse #My heart belonged to friends rather than duty.\n\t\t*goto people_duty\n\t*hide_reuse #My heart belonged to love.\n\t\t*goto love\n\t*hide_reuse #My heart belonged to those in need.\n\t\t*goto helper\n\t*hide_reuse #My heart belonged to the pursuit of power.\n\t\t*goto power\n\t*hide_reuse #My heart belonged to the pursuit of knowledge.\n\t\t*goto mind\n\t#That's all I am.\n\t\t*goto beat_2\n\n*label mind\n*set pieces_collected +1\n\nYou sought after dark secrets.\n\n*if (craft_game_won)\n\tYou drew knowledge from the souls of those you met.  \n\t*set wounds -1\n*if (solo_fix)\n\tYou spied new avenues of attack in grand cases; you, alone, defended the world against invasion from the outer darkness.  \n\t*set wounds -1\n*if (rok_here)\n\tYou negotiated labyrinths of demonic bureaucracy.   \n\t*set wounds -1\n*if (deposition_succeed)\n\tYou probed the mind of a goddess.\n\t*set wounds -1\n*comment endif\n\n*set And_yet \"And yet you\"\n*set you \"\"\n*if (blessing)\n\t${And_yet}${you} gave up an opportunity to probe the mind of a goddess.\n\t*set wounds +1\n\t*set And_Yet \"\"\n\t*set you \"You\"\n*if not(gets_it_first)\n\t${And_yet}${you} failed to notice Wakefield's possession when the truth was staring you in the face.\n\t*set wounds +1\n\t*set And_Yet \"\"\n\t*set you \"You\"\n*comment endif\n\n*if pieces_collected > 5\n\t*goto beat_2\n*else\n\tWhere else did you place your heart?\n\t*goto heart_choice\n\n*label firm_duty\n\n*set wounds - (gunner / 30)\n*set pieces_collected +1\n\nIndeed it did.\n\n*if (solo_fix)\n\tYou defended your home against demon incursion, solo.\n\t*set wounds -1\n*if (Rok_here)\n\tYou succeeded in a nearly impossible [i]pro bono[/i] asylum case, increasing your reputation and the firm's.\n\t*set wounds -1\n*if (deposition_succeed)\n\tYou deposed the goddess Ajaia in her own sanctum.\n\t*set wounds -1\n*comment endif\n\n*set And_yet \"And yet you\"\n*set you \"\"\n*if (blessing)\n\t${And_yet}${you} betrayed the firm to the goddess Ajaia.  \n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if (cass_under_bus or Ngabe_under_bus)\n\t${And_yet}${you} threw your coworkers to the wolves at every opportunity.\n\t*set wounds +1\n*comment endif\n\n*if pieces_collected > 5\n\t*goto beat_2\n*else\n\tWhere else did you place your heart?\n\t*goto heart_choice\n\n*label people_duty\n*set pieces_collected +1\n\nYou put your trust in friends and the common good, not in the firm.\n\n*set wounds - round((100 - gunner) / 30)\n\n*if Vega_fix\n\tYou worked with Vega to defend the world agains demon incursion.  \n\t*set wounds -1\n*if rescued_wakefield\n\tYou rescued Ashleigh Wakefield from demonic possession.  \n\t*set wounds -1\n*if goddess_referred or goddess_settlement\n\tYou guided the goddess Ajaia in saving her people, rather than abandoning her to the depredations of the name partners.\n\t*set wounds -1\n*comment endif\n\n*set And_yet \"And yet you\"\n*set you \"\"\n*if (cass_under_bus)\n\t${And_yet}${you} threw Cass Chen under the bus, back when you fought against the demon world.  \n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if (Ngabe_under_bus)\n\t${And_yet}${you} threw Ngabe under the bus after your deposition of Ajaia.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if (fight_hard and not(Wakefield_rival))\n\t${And_yet}${you} fought the possessed Wakefield with no concern for the harm you would do ${Ash_pro_obj}.\n\t*set wounds +1\n*comment endif\n\n*if pieces_collected > 5\n\t*goto beat_2\n*else\n\tWhere else did you place your heart?\n\t*goto heart_choice\n\n*label love\n\nYou did love.\n*set pieces_collected +1\n\n*if Vega_relationship\n\tYou met Vega, you worked with him, you loved him.  You feel him still, through your entire body at once.\n\t*set wounds -2\n*if Chen_relationship\n\tYou loved Cass Chen: her fire, her ferocity, the rich smell of her, the give of her skin.\n\t*set wounds -2\n*if Wakefield_relationship\n\tYou're not sure what's going on with Wakefield, but you need to know how that turns out.  So, for that reason if for none other, you can't die here.\n\t*set wounds -2\n*comment endif\n\n*if pieces_collected > 5\n\t*goto beat_2\n*else\n\t*goto heart_choice\n\n*label helper\n\n*set pieces_collected +1\n\n*if Rok_here\n\tYou helped R'ok stay in the world of his choosing, kept him safe from his family.\n\t*set wounds -1\n*if (goddess_referred or goddess_settlement)\n\tYou helped the goddess Ajaia, even against your own firm and your own interests.\n\t*set wounds -1\n*if rescued_wakefield\n\tYou saved Ashleigh Wakefield from demon possession.\n\t*set wounds -1\n*comment endif\n\t\n*set And_yet \"And yet you\"\n*set you \"\"\n*if (cass_under_bus or Ngabe_under_bus)\n\t${And_yet}${you} threw your coworkers to the wolves at every opportunity.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if not(goddess_refuse or goddess_settlement)\n\t${And_yet}${you} let the goddess Ajaia go forward with her case, to be torn apart by superior forces.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*comment endif\n\n*if pieces_collected > 5\n\t*goto beat_2\n*else\n\tWhere else did you store your heart?\n\t*goto heart_choice\n\n*label power\n\n*set pieces_collected +1\n\nYou wanted it all.\n\n*if (deposition_succeed)\n\tYou deposed a goddess.\n\t*set wounds -1\n*if (cass_under_bus or ngabe_under_bus)\n\tYou threw your coworkers to the wolves when it served your ends, to improve your standing at the firm.\n\t*set wounds -1\n*if fight_hard\n\tWhen you had a chance to hit Wakefield (possessed or not) you hit ${Ash_pro_obj} hard.\n\t*set wounds -1\n*if panel_success\n\tWhen you were given a job, you did it, well and without hesitation.\n\t*set wounds -1\n*comment endif\n\n*set And_yet \"And yet you\"\n*set you \"\"\n*if not(cass_under_bus or Ngabe_under_bus)\n\t${And_yet}${you} displayed sentimental loyalty to your coworkers.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if (goddess_referred or goddess_settlement)\n\t${And_yet}${you} warned the goddess Ajaia when you could have easily let her destroy herself under the firm's command.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if not(fight_hard)\n\t${And_yet}${you} went soft on Wakefield when you faced ${Ash_pro_obj} in battle.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*if ((wakefield_relationship) or (chen_relationship or vega_relationship))\n\t${And_yet}${you} let sentimentality weigh you down on the eve of an engagement that could—and did—kill you.\n\t*set wounds +1\n\t*set And_yet \"\"\n\t*set you \"You\"\n*comment endif\n\t\n*if pieces_collected > 5\n\t*goto beat_2\n*else\n\tWhere else did you place your heart?\n\t*goto heart_choice\n\n*comment Beat 2: Ending the Story\n*label beat_2\n\nYou hang in a darkness that's no longer dark: a mosaic surrounds you, shards (sunset fading from smog-vermillion in the west to icepick stars overhead, taste of lips and wine, smell of crushed grass and ink and ozone, victory and defeat) melding into a human shape.\n\nThe shape has a name.\n\n${name} ${surname}, is what it calls itself.\n\nWhat I call myself.\n\n*fake_choice\n\t#\"Wait.  What?\"\n*comment endif\n\nOf course.  Who else would be here with you?  Who else would know how you feel, how you dream, how you taste?  Who else could know all the choices that face us, and help you navigate them?\n\nYou build us, and I am the structure built.  You tell us, and I'm the story told.  I am the shadow of your choices.\n\n*fake_choice\n\t#\"So, what now?\"\n*comment endif\n\nUsually my kind of question, isn't it?\n\n*if wounds \u003c 0\n\tYou've done a good job putting us back together.  Better than we were, even.\n\t*achieve woundzero\n*if wounds = 0\n\tWe're in perfect health.\n\t*achieve woundzero\n*if ((wounds >0) and (wounds \u003c=4))\n\tWe're hurt, but we're together enough for now.\n*if (wounds > 5)\n\tI won't lie—we're not in good shape.  But you've stitched us together enough for a few minutes' consciousness.\n\t\n*fake_choice\n\t#So let's save the day.\n\t#So let's wreak some vengeance.\n\t#So let's give Smith an unpleasant surprise.\n*comment endif\n\t\nMy sentiments exactly.\n\nThe glass in which you see yourself drifts forward, and we are one.  Together again.  You remember.  You see.  You [i]are[/i].\n\n*page_break\n\nThe sky above the demon city remains broken.  But you aren't, not any more.\n\nSmith stands before you, scintillating through his many dimensions.  But you've been through all those recently, and you know the edges of them now.  His final strike shattered the building around you; you stand on dust and glass beneath demon spires.\n\nFire fills Smith's eyes, but it doesn't look so sure as it did before you died.  (Or almost died.  I'm no metaphysician.)\n\n\"How does it end?\" you say.\n\nSmith blinks.  \"What?\"\n\n\"This story.  How does it end?\"\n\nYou hear a soft scraping—wind blowing dry leaves over concrete—and smile.\n\n\"I don't know what you mean.\"\n\nYou laugh.  \"Don't you get it?  You're outside the rules of this world.  Your power doesn't have limits.  But that's blocked you out.  You're not part of the story's ending any more.\"\n\n\"I am the ending.\"\n\n\"No.  Let me tell you how this ends.  It ends…\"\n\n*choice\n\t*selectable_if (blessing) #\"With divine intervention.\"\n\t\t\"What?\"\n\t\t\n\t\tYou reach inside, and there, in your core, Ajaia's blessing glows green.  Gods and goddesses lie beyond your world.  They press against it, warp it with their presence.  So they should be able to reach here, too.\n\t\t\n\t\t[i]If you ever want to pay me back,[/i] you think, [i]now's the time.[/i]\n\t\t\n\t\tYour heart beats harder, and warmth suffuses your chest.\n\t\t\n\t\tThe sky turns green, and descends.\n\t\t\n\t\t*page_break\n\t\t\n\t\tSmith raises one hand, and lightning rakes a razor across the green.  The wound he opens closes at once.  You close your eyes, and see the blackness around him a whirl of motion, the currents of a goddess's wrath.\n\t\t\n\t\tThe scraping noise grows, and he realizes too late it's coming from below.\n\t\t\t\t\n\t\tThe ground breaks open, and vines surge up through the glass pavement, twining Smith's legs.  He tries to fly, tries to flee, but the vines grow faster, and hold tighter.  These vines look…normal.  They're from your world, and while Smith may not be bound by the physics of the demon plane, he's susceptible to those of your home.\n\t\t\n\t\tSmith roars with rage and pain as the vines wind him up, and around, and crawl into his throat.  Fire tears at the green, but still they grow, denser, denser, and they flower.\n\t\t\n\t\tThen they thorn.\n\t\t\n\t\tSmith screams once.\n\t\t\n\t\tOnly once.\n\t\t\n\t\tThen the sky breaks, and the goddess is gone, and her hand recedes from your heart.  Good.\n\t\t\n\t\tGood enough.\n\t\t\n\t\tShe needed a channel into this world, and you served.  But you're left torn asunder.  The world grays.\n\t\t\n\t\tYou fall to your knees, and then to the floor, and the world goes black.\n\t\t*achieve goddesswin\n\t\t*set soul -1000\n\t\t*finish  \n\t*selectable_if (rok_token) #\"With the demons in revolt.\"\n\t\t\"The demons are my toys.\"\n\t\t\n\t\tYou reach into your pocket, and withdraw a small piece of graven glass: the token R'ok gave you before you entered the demon world.  \"You don't know much about the Craft, do you?  At this moment you may have powers so vaguely defined as to seem limitless.  But I have the expressly delineated ability to call R'ok's kin to aid me.  I think most of the time they'd have a choice whether to come, but since at the moment you seem to have turned off their minds…\"\n\t\t\n\t\t\"I have slain a hundred demons.  Why should I fear a few more?\"\n\t\t\n\t\t\"Well.  These aren't just a few.  Looks like K'lint was the patriarch.  Or matriarch.  Or however demons reproduce.  And they're a hive.  I don't think it's so much 'a few' as 'all'.\"\n\t\t\n\t\tAnd then he hears it: the scraping, closer, from everywhere at once.  Including from beneath.\n\t\t*page_break\n\t\tThe pavement breaks open beneath him, and talons pierce his legs, and barbed hooks.  Chains of light and lightning lasso his limbs.  He pulls at them, he shatters them, but more to take their place.\n\t\t\n\t\tAnd the others arrive soon, crawling and flying and scuttling over the ruins of their city: the hordes of Akargath blot out the sky with buzzing wings, and cover the earth with pincers and mandibles and chitin.  Smith strikes them, and you shield those you can, turning his power back upon himself while wave after wave tear into his flesh.  Each claw is a cut, and the cuts heal fast—but soon he's a statue swarming with demons, dripped with acid, pierced by mandible and torn by claw, and he begins to scream.\n\t\t\n\t\tIt lasts longer than you hoped.  Longer than you'd like.  But in the end, it's over.\n\t\t\n\t\tHe's dead.\n\t\t\n\t\tAnd you've spent your soul keeping him in check.  The world goes gray.  You fall to your knees.  Demons surround you, eyes multifaceted and blinking.\n\t\t\n\t\tThen you fall, and know no more.\n\t\t*achieve demonwin\n\t\t*set soul -2000\n\t\t*finish\n\t*selectable_if (friends_save_you) #\"With my friends coming to stop you.\"\n\t\t*goto friends_save\n\t*selectable_if (gunner > 60) #\"With my firm taking its due.\"\n\t\t*goto firm_save\n\t#\"With heroic self-sacrifice.\"\n\t\tSmith raises one hand.  \"If you want to sacrifice yourself, I'm happy to oblige.  But don't expect it to do you any good.\"\n\t\t\n\t\tYou call upon your Craft, and fly, faster, faster, toward that obscenity of a sun.  Smith pursues.  His edges slice a scream through the air, accelerating.  Higher and higher you rise, and throw lightnings behind you.  They glint and refract off Smith's skin.  He envelopes you in fire, and you burn, but the wind of your passage snuffs the fire out.  Chains rake the sky above you and you dance between them.  A shield summoned above Smith shatters when he flies through it.  Higher and higher you rise, faster and faster.  Flight burns soul like nothing else.  You've spent a luxury carriage's worth of soul on this mad plan so far.  Faster.\n\t\t\n\t\tYou are a pair of stars dancing in the sky, your light against his.\n\t\t\n\t\tHe hurts you, and you scream, but you fight through the pain.  You tear at those parts of him you can still grip—contracts that bind him to Transdimensional, his obligations to VNS, enough to stoke his rage.\n\t\t\n\t\tIt can't last forever.  He catches you by the neck, in the sky.  His grip burns.  One claw traces a line of agony down your face.  He licks his teeth, grown long into fangs.  \"Sacrifice,\" he says.  \"I like the sound of that.\"\n\t\t\n\t\tAnd then, he stops in midair.\n\t\t\n\t\t*page_break\n\t\t\n\t\tHis eyes go blank.  Light peaks through the edges of his crystal skin.  \"What—\"\n\t\t\n\t\tYou have so little soulstuff left, and less strength.  Enough, though, you hope.\n\t\t\n\t\tYou grab his hand around your throat.  \"You're a vacuum in the rules.  And those only last until nature fills them.  Looks like she's caught up with you.\"\n\t\t\n\t\tAnd then you pull with all your strength and all your Craft against the joint of his thumb.\n\t\t\n\t\tYou hear a sharp crack, and you're loose.  You fall.\n\t\t\n\t\tSo far.\n\t\t\n\t\tAbove you, a scream.  Smith erupts in waves of light and shadow as the demon world fills him in.\n\t\t\n\t\t[i]That's nice,[/i] you think, as you tumble toward the city below.\n\t\t\n\t\tEventually, everything stops.\n\t\t*set wounds +3\n\t\t*set soul -2000\n\t\t*achieve sacrificewin\n\t\t*finish\n\n*label friends_save\n*set friends_save true\n\n*if (battle_friends)\n\t\"You tried that line already.\"\n\t\n\tYou shrug.  \"It's different now.\"\n*comment endif\n\nThe scraping grows insistent.  Smith looks up, and everywhere, as space screams and tears and your friends step through the gaps.\n\n*temp NebStone \"\"\n*if Nebuchadnezzar > 60\n\t*set NebStone \"Angelica Nebuchadnezzar\"\n*if Stone > 60\n\t*set NebStone \"Damien Stone\"\n*if ((Nebuchadnezzar > 60) and (Stone > 60))\n\t*set NebStone \"Angelica Nebuchadnezzar and Damien Stone\"\n\n*if (Chen > 60)\n\tCassowary Chen.  \n*if (Ngabe > 60)\n\tPat Ngabe.  \n*if (Vega > 60)\n\tVega.  \n*if ((Wakefield > 60) and not(Wakefield_hurt))\n\tAshleigh Wakefield.  \n*if ((Wakefield > 60) and (wakefield_hurt))\n\tAshleigh Wakefield, leaning on ${Ash_pro_pos} cane.  \n*if (Rok_here)\n\tR'ok, free—as a resident of Domain, he's now immune to Smith's control.  \n*if (Varkath > 60)\n\tGolan Varkath, his skin-mask laughing.  \n*if ((Nebuchadnezzar > 60) or (Stone > 60))\n\tEven ${NebStone}, stern as ever.\n*comment endif\n\n*if (battle_friends)\n\tYou grin.  \"I told you so.\"\n\nThey stand in the air above you, and power pours forth from them.  You join yours to theirs, and together you force Smith to his knees.  He need not fear the demon world, but the powers that tear him apart have traveled a long way from home.\n\nHe screams, and burns like a cinder.\n\nYour soul spent, you fall to your knees, and know no more.\n*achieve friendswin\n*set soul -2000\n*finish\n\n*label firm_save\n\n*if (battle_firm)\n\t\"You tried that line already.\"\n\t\n\tYou shrug.  \"It's different, now.\"\n\t\nThe scraping grows insistent, and localized.  Smith turns back over his shoulder, just in time to see space scream and tear and Golan Varkath step through the gap.  His skin-mask smiles coldly.\n\n*if (battle_firm)\n\t\"Told you so.\"\n*comment endif\n\n\"Be careful, old man,\" Smith says.  \"Here I am like unto a god.\"\n\n\"Oh, really.\"  Varkath laces his fingers together and cracks them, slowly.  \"I have some practice dealing with gods.\"\n\n\"You stand before me alone, unarmed, in a plane that is not your own.\"\n\n\"Those of us who seem unarmed seldom are,\" Varkath says.  \"For example.\"  He snaps his fingers, and a rolled parchment appears in his palm.  \"Given the undisclosed nature of your visit here, Trandismensional Thaumaturgics has disavowed responsibility for your expenses.  Including our firm's fees for your hire of ${Char_voc} ${surname} here.  Since you're attempting to kill ${Char_pro_obj}, by terms of contract ${Char_pro_pos} engagement is formally terminated.  So we'd like ${Char_pro_pos} fee in full.  Counting the demonic time-lag, you've been here a week; at 800 thaums an hour, that comes out to slightly under a hundred forty thousand thaums.  The penalty clause for premature and short-notice dissolution of contract apply, as does the indemnification against personal damages.  So let's call it an even half-million thaums.\"\n\n\"I will instruct my people to pay you.\"\n\n\"I don't think you understand.  We are entitled to immediate payment, in full.\"\n*page_break\nVarkath snaps his fingers.\n\nAnd the light dies.\n\nSmith falls to one knee.  He seems to collapse on himself.  The arrogance of his power ebbs.  The dark light that flickered around his talons pales to grey.\n\nHe strikes at Varkath, and the shadows seem to pass through the Craftsman's body without leaving a trace.  Varkath's voice is calm.  \"You see how we dealt with gods when I was a boy.\"\n\nSmith fights, but the laws of debt run deep.  He drains.  Skin hangs limp from his bones.  His face is a shroud draped over a skull.  He screams, and lashes out once more, with all his strength and fury— not against Varkath.\n\nYou raise a shield to block, and it shatters.  Smith's fury strikes you full-bore and you fly through the air, fading, fading.  The last thing you see before the darkness takes you is Smith crumbling into dust.\n*achieve craftwin\n*set soul -2000\n*finish", "deposition": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 6: Deposition\n\n*comment Temporary Variables Here!\n\n*temp time 0\n\n*temp depo_1_diff 90\n*temp depo_2_diff 99\n\n*temp depo_1_succeed false\n*temp depo_2_succeed false\n\n*temp base_diff 70\n\n*if craft > 80\n\t*comment test craft level for difficulty purposes\n\n*set sleep_difficulty (round((((1-3)/9)*sleep)+20) + round(debt / 20000))\n\n\n\n*temp sleep_warning \"\"\n\n*if ((sleep \u003c 90) and (sleep >= 70))\n\t*set sleep_warning \"  You're jealous.\"\n*if ((sleep \u003c 70) and (sleep >=40))\n\t*set sleep_warning \"  You're jealous.  You'd hoped to catch some rest on the flight, maybe inch toward recovery.  You know your recent lack of sleep has hurt the quality of your work.\"\n*if (sleep \u003c40)\n\t*set sleep_warning \"  Gods, you're jealous.  The last three weeks have been solid deposition prep, all-nighters beneath black candles burning at both ends.  And the commute hasn't helped.  You tried reading a novel earlier on the flight, but the words swam on the page.  Hazards of the job.\"\n\n\n*comment Beat 1: the flight to Southern Kath\n*advertisement\n\nSunset glimmers off the gondola window.  Outside, above, the dragon's wing curves back, metallic and glistening.  Muscles strain and surge to bear you south.\n\nYour mouth's dry.  A half-drunk cup of blended whiskey vibrates on the tray before your seat.  Whiskey wants a heavy, proper glass, otherwise the flavor goes all wrong.  But there's no help for it; this is all the flight attendants had on offer.\n\nPat Ngabe sleeps in the seat beside you, head back, smiling softly, still.${sleep_warning}\n\nSomewhere up near the catering station, a bell chimes.  Ngabe turns, twitches, groans, and opens his eyes.  \"How long was I out?\"\n\n\"How can you sleep?\"\n\nHe grins.  \"You can't?  What's stopping you?\"\n\n*choice\n\t#\"Nerves.  This is a huge assignment, with no backup.  I want to get it right.\"\n\t\t\"Flying without a net.\"  He nods, serious.  \"I understand that.\"\n\t\t*set power %+10\n\t\t*goto plane_chat\n\t#\"You really think we're up for this.\"\n\t\t\"For taking a deposition on our own?  Of course.  We've done this before, many times.\"\n\t\t*set charm %+10\n\t\t*set Ngabe %+10\n\t\t*goto plane_chat\n\t#\"I'm having second thoughts about this whole thing.\"\n\t\t\"Conscience bothering you?  You really should have that removed.  Never get to sleep with it yammering on all the time.\"\n\t\t\n\t\t\"Not conscience.  I think we're being kept in the dark.\"\n\t\t\n\t\t\"Of course we are.\"\n\t\t*set cunning %+10\n\t\t*goto plane_chat\n\t#\"I've been thinking through the plan.\"\n\t\t\"Always thinking.  I like that about you, ${surname}.\"\n\t\t*set craft %+10\n\t\t*goto plane_chat\n\t\n*label plane_chat\n\n\"I've never deposed a goddess before,\" you say.  \"Not personally.  I've read records.  I've worked through the theory.  But the two of us, alone—we don't have much intimidation value.\"\n\nNgabe tugs on the lapels of his jacket.  He checks the alignment of his pocket square, and ensures the cuffs of his shirt peek out a coy millimeter from his jacket sleeves.  He removes a peck of lint from the left side of his trouser crease.  \"I'm glad.  If one of the senior partners came down here, Varkath or Nebuchadnezzar or even Stone, then Ajaia would be on her guard.  Her priesthood would close ranks.  We have a chance to surprise the goddess and her followers.  To hit them where they don't expect.  I'm glad for the opportunity.\"  He bares teeth in a broad, predatory smile.\n\n*choice\n\t#\"You don't like gods very much, do you.\"\n\t\t\"Why would anyone?\"\n\t\t\n\t\t\"They seem to inspire enough worship.\"\n\t\t*set Ngabe %+10\n\t\t*goto chat_end\n\t#\"I agree.\"\n\t\t\"I am glad.\"\n\t\t\n\t\tYou let the subject hang, but in the end, Pat speaks again.\n\t\t*set Ngabe %+20\n\t\t*goto chat_end\n\t#\"We shouldn't let personal vendettas shape our strategy.\"\n\t\t\"Of course not.  But motivation is vital to strategy.  If we do not understand our own motives, we do not understand our own limits.\"\n\t\t\n\t\t\"The more motives at play, the harder it is to serve them all.  We're already trying to get the information we need to win this case, and win respect from the bosses while we're at it.\"\n\t\t*goto chat_end\n\t#\"This goddess isn't the same as the ones you grew up with.\"\n\t\t\"All gods and goddesses are at root the same.  They spring from the same source, and grow along the same paths.\"\n\t\t\n\t\tYou wait.  He's not finished yet.  Even if it does take him longer to find his next words.\n\t\t*set Ngabe %+10\n\t\t*goto chat_end\n\t\n*label chat_end\n\n\"You were born in Kath,\" he says, and you nod.  \"In the New World, in the liberated territories.  Gods have never been a problem for you.  For me, not so.  In some parts of the Old World there is peace, but in others the God Wars never ended.  The rise of Craftsmen disturbed old balances of power, created new vacuums, and now gods and their followers make war.  I left the Northern Gleb when I was ten, with my parents: left the crawling fires and the night raids and the screams across the sky behind.  I have made a life in Shikaw.  I have a good wife, and strong children.  They grow in safety.  I feel no sentimentality for the old order and the death it brings.\"\n\n\"We'll do the job,\" you say.  There may be a better answer to him, but exhausted and half-buzzed on bad whiskey in a cheap glass, you can't come up with it.\n\nYou fly south over the Fangs of Kath, into the deepening dark.\n\n*page_break\n\nYou land in Tassadon sometime after one in the morning.  Flying south you don't fly into the future, or into the past—no illusions of chasing the sun, only the deep dark and your aching back and legs and shoulders to drive home that you've spent the last eight hours in a too-small gondola seat, so far above the ground that you cast no shadow.\n\nYou can't see much of the country on approach, only what moonlight and gaps in clouds reveal.  Tall trees, thick leaves a rich wet shade of black you expect the morning will repaint green.  Roads, a few of them, appear as razor-gash in the forest from overhead, bleeding light.  Some patches of the jungle shimmer smoky jade from underneath, the colors of a wine bottle placed over a candle flame, only bigger—a sheen the size of cities.  The stars are clear and bright overhead.  You're not used to seeing them back home in Shikaw.\n\n*page_break\n\nThe landing ground itself is the largest unforested patch you've seen, and torn by dragon claws.  Mooring docks for blimps needle up into the night, not quite as tall as the great trees.  You stand with a drum solo of popping joints, gather your bags, shuffle through the ghost-lit insanity of baggage claim to the taxi stand, and—at last—to your hotel bed, and a sleep haunted by dreams.\n\nBut what dreams?\n\n*choice\n\t#Nightmares of failure.  Of the goddess Ajaia tearing me to pieces while the partners laugh.\n\t\t*set power %+20\n\t\t*set gunner %+20\n\t\tIn the last few years you've grown intimately familiar with this suite of nightmares.  There's the vision in which you stand before the Court of Craft and open your mouth and the judge laughs and laughs.  You've attended countless dream-councils in your underwear, and walked out of a thousand depositions and checked your notes only to find you can't read them, that they're in fact stick-figures contorted into obscene positions.  You've double-booked yourself for meetings with name partners.\n\t\t\n\t\tThe worst part is when you wake up and realize how much this job has snuck under your skin. \n\t\t*goto preparation\n\t#I'm a rat running through mazes—mazes within mazes, and the center of each maze only leads me back to its beginning.\n\t\t*set cunning %+20\n\t\t*set gunner %+20\n\t\tOh, so it's [i]this[/i] dream again.  At least it's not the other, with the sweater you keep unravelling only to find you're actually made of wool and have been unravelling yourself along with your garment, but you can't stop because it's not done yet, and the holes in your body get bigger and bigger and you can't breathe because you've unravelled gaping rents in your chest and lungs and you're spilling out everywhere…\n\t\t\n\t\tReally, your subconscious gets so predictable at times.\n\t\t*goto preparation\n\t#Demons and blood, broken bargains, a shattered tower and a man aflame.\n\t\t*set craft %+20\n\t\t*set gunner %-20\n\t\tFor all the office politics, for all your scheduling difficulties and lack of sleep and student loans and conflicted loyalties, it's the Craft that haunts your nightmares.  Demons laugh at you beyond the borders of your worlds.  Lightning strikes tall towers and breaks them to spinning shards.  Flesh melts from skin to reveal the glistening pale bone that is your future, the future of all who give themselves to the Craft and its barren immortality…\n\t\t\n\t\tAnd you wake, remembering so little.\n\t\t*goto preparation\n\t#Um.  Well.  I'm, you know, naked, and there are other naked people there too, and it's quite nice actually.\n\t\t*set charm %+20\n\t\t*set gunner %-20\n\t\tOh, interesting.  Anyone we know?\n\t\t*choice\n\t\t\t*if (Wakefield > 60) #Ashleigh Wakefield.\n\t\t\t\tGolden hair and skin like cream and that slight sarcastic smile that never goes away, not even…well.\n\t\t\t\t\n\t\t\t\tYou wake twisted in sheets, and smiling.\n\t\t\t\t*set Wakefield %+20\n\t\t\t\t*goto preparation\n\t\t\t*if (Chen > 60) #Cass Chen.\n\t\t\t\tIt's a dream, sure, but it feels so damn real, so rich, that when you wake, sweaty and twisted in the sheets with a cruel dawn outside the blackout curtains, you blink and look around and wonder where she went.\n\t\t\t\t*set Chen %+20\n\t\t\t\t*goto preparation\n\t\t\t*if (Vega > 60) #Vega.\n\t\t\t\tA laugh, and lips, and cool hands, so smooth.  He looks like a blade without his clothes, not that you take much time to look—too much gravity pulls you together and light bends and you wake with a vague feeling of loss to mix with the dust dancing in the sunlight through the blackout curtains.\n\t\t\t\t*set Vega %+20\n\t\t\t\t*goto preparation\n\t\t\t#No one in particular.\n\t\t\t\tOh, it's just a parade inside your head: a confusion of body parts to satisfy the most lustful of serial killers.  No blood of course, just sweat and more than sweat, and you see faces too, and hear voices, and wake up with your only desire the continuance of the dream.\n\t\t\t\t\n\t\t\t\tPerhaps you've been working too late.  Look at you—thirty and still dreaming a fourteen-year-old's dreams.  But, hells, you get plenty of self-recrimination from your mirror in the morning.  At least your [i]subconscious[/i] is getting laid.\n\t\t\t\t\n\t\t\t\t*set charm %+10\n\t\t\t\t*goto preparation\n\n*label preparation\n*page_break\n\nYou were too out of it last night to notice any details about the hotel, but waking, you find that it's a tree.  The hotel's many rooms corkscrew up a trunk as broad as an ullamal stadium, with huge spreading leaves overhead.  The whole city looks like this, from what you can see out your window: buildings woven through trees, resting in giant bark.  Roads winding between groves, suspended by thick steel cables, society spread between different layers of canopy.\n\nNgabe doesn't seem to notice or care, but you've never seen anything like it.  Unfortunately, you've no time for tourism.  Tomorrow's the first day of your deposition, and you have to prepare.  This time you're on the defensive: Ajaia's suing Transdimensional Thaumaturgics (and your old friend John Smith) over water rights connected to that project you worked on way back with Cass and Vega, the one with the demons.  No partners here, though, no backup.  Just you and Pat, in the goddess's territory.\n\nSo, how do you spend your day?\n*label strategy_session\n*if time = 2\n\t*goto day_one\n*choice\n\t*hide_reuse #Rehearse with Pat.\n\t\t*set power %+10\n\t\t*set Ngabe %+20\n\t\tYou and Pat review the outlines of your strategy: the questions you need the goddess to answer, her likely evasions, your responses, her likely responses to those, deeper and deeper until the whole world begins to resemble an argument with an unknown number of participants and uncertain criteria for determining victory.\n\t\t*set time +1\n\t\t*if power > base_diff\n\t\t\tIt makes a difference, though.  Grinding again and again through your notes, you grow more confident.  This will work.  You hope.\n\t\t\t*set depo_1_diff -10\n\t\t\t*goto strategy_session\n\t\t*goto strategy_session\n\t*hide_reuse #Ask around about Ajaia and her priesthood.\n\t\tYou're here for business, but there's more to business than contracts and paperwork.  For a while, anyway, you tear yourself from the intense micro-focus of deposition prep to wander the city and learn what you can of the goddess and her priests.\n\t\t\n\t\tYou learn a great deal, some of it useful, some not: the appropriate terminal consonant for address to a goddess ('-t', it turns out), the general impression of Transdimensional Thaumaturgics (when you ask one cab driver if she's heard of the company she politely ends the conversation and, at the end of the ride, overcharges you), and some of the local God Wars history (bloody, with whole city-groves destroyed).  Maybe some of this will be useful; at least now you understand your opponents better.\n\t\t\n\t\tPat doesn't approve of your focus on the deity, but you know this will help.\n\t\t*set charm %+10\n\t\t*set Ngabe %-10\n\t\t*set time +1\n\t\t*if charm > base_diff\n\t\t\t*set depo_1_diff -10\n\t\t\t*goto strategy_session\n\t\t*goto strategy_session\n\t*hide_reuse #Review the theory of divine interaction.\n\t\tGods aren't like people.  They are larger, and more elemental: emergent from the interaction of communities, and shaped by the actions and transformations of those communities.  They obey different rules. Fortunately, those rules can be known, studied, and codified.\n\t\t\n\t\tYou spend the day reviewing Gerhardt and Schatten and Ghalbrisi and Xu, along with the books of horn you lugged all the way from Shikaw.  You know this stuff already—or at least you were supposed to have learned it back in the Schools—but it always helps to revisit.\n\t\t*set craft %+10\n\t\t*set Ngabe %+10\n\t\t*set time +1\n\t\t*if craft > 50\n\t\t\tHelps more than you expected, in fact—you discover a few points on the nature of sacrifice and the properties of divine intelligence that you must have missed back in the Schools, or perhaps are better-understood now than they once were.\n\t\t\t*set depo_1_diff -10\n\t\t\t*if time=2\n\t\t\t\t*goto day_one\n\t\t\t*else\n\t\t\t\tWhat next?\n\t\t\t\t*goto strategy_session\n\t\t*else\n\t\t\t*if time=2\n\t\t\t\t*goto day_one\n\t\t\t*else\n\t\t\t\tSo, what next?\n\t\t\t\t*goto strategy_session\n\t*hide_reuse #Try to find weaknesses in the goddess herself.\n\t\tAjaia may claim to be ineffable, but most things that are can be effed quite easily if you know where to look and keep your wits about you.  You visit the local library, a nestlike structure of glass and hardwood that grows between the leaves of a nearby magisterium tree, and devote yourself to the study of this goddess.\n\t\t\n\t\tShe is a lady of nature, which seems obvious enough from your surroundings.  But, despite her people's idiosyncratic architecture, she's not technically a tree goddess.  She moves through water: the water of the great rivers, the water that flows in the blood vessels of her subjects, the water that rises to the top of the trees.\n\t\t*set cunning %+10\n\t\t*set Ngabe %+10\n\t\t*set time +1\n\t\t*if cunning > base_diff\n\t\t\tBut she's not the only deity in this region.  You uncover a whole panoply of Southern Kathic gods, connected to a range of tribes and villages throughout the greater Ajaian River Basin.  One in specific, a nature spirit reputed to be the goddess's niece, shelters her people near the Transdimensional water project.  A coincidence, maybe.  But you're not in the business of ignoring coincidences.\n\t\t\t\n\t\t\tRegardless, you've learned all you can here.\n\t\t\t*set depo_1_diff -10\n\t\t\t*goto strategy_session\n\t\tThat seems like a good place to start, at least.\n\t\t*goto strategy_session\n\t\n*comment Beat 2: The First Day of Deposition\n\n*label day_one\n\nThe next morning's sunrise slants the shadows of branches and spears of pink sunlight across the suspended road.  The Temple Grove rises above the lesser trees, trunks fat and thick and scaled with ancient bark.  Branches broad as houses trail sleeves of moss.  A stairwell woven out of vines leads from the road to the dark arch of the temple entrance.\n\n\"Impressive,\" you say.  Craning your neck back until your muscles spasm, you still can't see the treetops.  They vanish into canopy.\n\n\"I've seen better,\" Pat replies, and rather than climb the ladder he rises through the air under his own power, wreathed momentarily in shadow.  You follow him.\n\nA hood-eyed priestess leads you mutely up a tunnel of interwoven branches, from which nightflowers bloom.\n\n*page_break\n\nAfter a long climb between levels of this turning maze you reach a bare broad platform of woven living branches.  The inner ring trees of Temple Grove tower around you, and the air's the gold of the underside of leaves.\n\nThe priestess retreats into the shadows from which she came.  You and Pat stand alone in the center of the sacred platform.\n\n\"It seems opposing counsel decided to sleep in today.\"\n\n*fake_choice\n\t#\"Maybe they're running late.\"\n\t#\"Good sign for us.\"\n\t#\"I guess we just wait.\"\n\t#\"Running scared, I guess.\"\n\t\n[i]No,[/i] the leaves say, and the wind, and the silence of trees shaped into a word.\n\nYou jump half out of your skin, and spin around, seeking a source for the voice.  It comes from everywhere at once.\n\nThe goddess.  Of course.  \"Lady,\" you say, tone respectful, turning still in search of a place upon which to rest your eyes.  Vines tremble.  Flowers open.  A gem-blue bird springs from a branch overhead and climbs toward the canopy, wheeling tight circles in the clearing.  \"Are your Craftsmen due to arrive soon?\"\n\n[i]There are none,[/i] the goddess says.  [i]I stand for myself, in the heart of my own power.[/i]\n\n\"That's…\"  Inadvisable, you're about to say, but Pat stops you with a glare.  \"Fine.    Shall we proceed, then?\"\n\n[i]Yes.[/i]\n\n*page_break\n\nThe goddess falls silent.  Pat sets his briefcase upon empty air, spins the combination dials, clicks latches open, and raises the black lid to reveal within arrays of silver and steel and crystal implements, knives and wands and bowls and candles, sextants and compasses and protractors, scalpels for cutting flesh and soul, thread for sewing it back together.\n\nFrom within, he produces a silver bowl and places it on the floor.  Each of you sheds a drop of blood into the bowl, and they mix.  You scribe a circle on the floor with a sharp-billed pen, and Pat completes the interior details, the wards and charms needed to support you through the deposition.\n\nThen, when it's ready, you both stand in the center and raise your hands.\n\n*page_break\n\nThe world goes dark.  The blood-circles take fire.  The sky peels open like the petals of a flower, and you hang in boundless green-charged space, within the light of the goddess.  She curves above and beneath you and to all sides, her face the sun and her drifting hair the sky, her arms horizons, the earth an arch of belly and swelling thighs.  Her skin's a translucent green-brown, and sap moves within her to the rhythm beat out by her heart.\n\nPat meets her galaxy-eyes without a hint of awe.  \"Goddess, we have come to ask you questions.  And we bind you to answer honestly.\"  His words change the space in which you hover: it acquires sharpness and solidity that remind you of wheels and gears and pulleys and levers.  The goddess hisses.\n\nAnd so the battle's joined.\n\nWhat's your strategy?\n\n*set depo_1_diff -(craft / 10)\n\n*comment Rather than have a distinct Craft choice here, I'm modifying the difficulty depending on the player's Craft score.\n*choice\n\t#Go easy on the goddess.  Try to lull her into complacency.\n\t\t*set charm %+10\n\t\tHuman depositions are an exercise in wrestling: straining against particular points and claims, one side pressing against a perceived weakness as the other side resists.  With gods, the process works differently.  Ajaia builds her own reality: her truth changes the world observed.  When she describes her original negotiations with Transdimensional, that agreement takes shape before you, around you, binding and limiting the course of your questions.  The wrestling match becomes closer to outright war, in which forces, terrain, and severity vary with each engagement.\n\t\t\n\t\tSo, rather than confront her directly, you press slowly against the truth she has built.  You alter the model she presents in small ways, trying to weaken it until it will collapse.\n\t\t*if charm > (depo_1_diff)\n\t\t\t*set depo_2_diff %-10\n\t\t\t*set depo_1_succeed true\n\t\t\tAnd you succeed.  Careful questions about the nature of the agreements she cites in her claim reveal that key promises were never committed to paper.  Pat begins to press the point, but you take him aside and caution him against it.  Plenty of time to challenge the goddess's version of events tomorrow, when you formulate a plan of attack.\n\t\t\t*goto day_one_end\n\t\t*else\n\t\t\tIt's a fine tactic.  If you were stronger—if the two of you were—it would work.  Without a Craftsman to advise her, Ajaia doesn't know what admissions hurt her.  She fights points of honor and lets major questions slide.  But she is a goddess nevertheless, and neither you nor Pat is strong enough to overcome her will.\n\t\t\t*goto day_one_end\n\t#We press her with question after question until she breaks.\n\t\tHuman depositions are an exercise in wrestling: straining against particular points and claims, one side pressing against a perceived weakness as the other side resists.  With gods, the process works differently.  Ajaia builds her own reality: her truth changes the world observed.  When she describes her original negotiations with Transdimensional, that agreement takes shape before you, around you, binding and limiting the course of your questions.  The wrestling match becomes closer to outright war, in which forces, terrain, and severity vary with each engagement.\n\t\t\n\t\tAll of which means that finesse isn't always the right path.  With no Craftsmen or Craftswomen to guard her against such tactics, a simple battering assault can work wonders.\n\t\t*set power %+10\n\t\t*if power > depo_1_diff\n\t\t\t*set depo_1_succeed true\n\t\t\t*set depo_2_diff %-10\n\t\t\tAs it does in this case.  You and Pat take turns attacking various elements of the agreement the goddess presents to you.  The Transdimensional Thaumaturgics negotiator, it turns out, was the same woman John Smith ended up getting fired for her demonic negotiations, and it's not hard to claim she made off-contract promises.  That counterargument slices through a huge subsection of the goddess's claim, and you have others.\n\t\t\t\n\t\t\tAt the end of the day, you and Pat are both blood-covered, and the goddess is bleeding.  But you've made good progress.  \n\t\t\t*goto day_one_end\n\t\t*else\n\t\t\tNot in this case, though.  Ajaia has no support, but she is a goddess nonetheless, and in her place of power, with a legion of worshippers at her summons, there's little you and Pat can do to unseat her.  Not that you don't try.  You're just not strong enough.\n\t\t\t\n\t\t\tOne of the partners would have been.  But they're not here, and you are.\n\t\t\t*goto day_one_end\n\t#We trap her in a contradiction.\n\t\tHuman depositions are an exercise in wrestling: straining against particular points and claims, one side pressing against a perceived weakness as the other side resists.  With gods, the process works differently.  Ajaia builds her own reality: her truth changes the world observed.  When she describes her original negotiations with Transdimensional, that agreement takes shape before you, around you, binding and limiting the course of your questions.  The wrestling match becomes closer to outright war, in which forces, terrain, and severity vary with each engagement.\n\t\t\n\t\tAn ounce of cunning here's worth a pound of strength.  The truths she creates, the creches of rules and arguments and deals, seem sound at first, but may contain within them impossible structures and logical contradictions.  Or, if you're careful, you can make common sense contradict itself.\n\t\t*set cunning %+10\n\t\t*if cunning > depo_1_diff\n\t\t\t*set depo_2_diff %-10\n\t\t\t*page_break\n\t\t\tIt works.  Barely.  You trap her in a claim about the final contract, and no matter how she tries to revise the world she's built, to re-weave the web of her story, you hold that single contradiction in place while Pat follows through.\n\t\t\t\n\t\t\tYou may have missed some more opportunities, but you've scored a major victory at least.\n\t\t\t*set depo_1_succeed true\n\t\t\t*goto day_one_end\n\t\t*else\n\t\t\t*page_break\n\t\t\tIt doesn't work, though.  Clever as you are, neither you nor Pat can overcome the difference in strength.  You're simply too young in the Craft.  You build mazes for the goddess only for her to lead you through them, and trap you in mazes of your own.  By sundown the world's turned in a hundred different directions, and when you return to your own body, it takes you a few seconds to regain the ability to distinguish dark from light.\n\t\t\t*goto day_one_end\n\n*label day_one_end\n*page_break\n\nYou return to the hotel with Pat, and without a word you both head for the bar.\n\nYou order drafts of the local lager, toast one another, and drink for a while in silence.\n\n*if (depo_1_succeed)\t\n\t\"That was a near thing,\" Pat says.\n\t\n\t\"Close,\" you agree.  \"I'm sure we missed something.\"\n\t\n\t\"Of course.  We're not partners.\"\n\t*goto day_one_end_2\n*if not(depo_1_succeed)\t\n\t\"So close,\" Pat says.\n\t\n\t\"Close,\" you agree.  \"We could have had her, we could have taken it, if we didn't… If we were stronger.\"\n\t\n\t\"Of course.  We're not partners.\"\n\t*goto day_one_end_2\n\n*label day_one_end_2\n\n\"She's representing herself,\" you say in disbelief.  \"I didn't think anyone actually did that.  Not at this level.  I mean, she's strong, but she has to know sheer strength won't help in a Court of Craft.  Varkath, or someone equally nuts, would tear her to pieces in five minutes.\"\n\n\"Of course,\" Pat says.  \"Why do you think we were sent?\"\n\n*fake_choice\n\t#\"What do you mean?\"\n\t#\"Oh.  I get it.\"\n\t#\"Because we were the best for the job?\"\n\t#\"Because they needed to give us a chance sooner or later?\"\n\n\"Because they don't want to scare her off,\" he says.  \"The partners knew, somehow, that Ajaia planned to represent herself.  Maybe they've dealt with her before.  Maybe they have spies in her priesthood.  If one of them came down here and showed her what Varkath Nebuchadnezzar Stone can really do, she'd understand—she'd have no choice but to seek representation.  As it stands, even the points we score, we score narrowly.  She won't encounter Craft of the name partners' level until it's too late to bring her own advisors on board.\"\n\n*choice\n\t#\"Do you think this is right?\"\n\t\t\"Does it matter what either of us thinks is right?  This works.  We will win this case.\"\n\t\t*set charm %+10\n\t\t*set gunner %-10\n\t\t*goto day_one_chat\n\t#\"So we're being set up to take a fall for the good of the firm?\"\n\t\tPat takes a deep drink of beer.  \"That's one option.  I hope not, but we'll have to watch ourselves once we get home.  Especially if we can't achieve at least a nominal success against the goddess.\"\n\t\t*set cunning %+10\n\t\t*goto day_one_chat\n\t#\"If the odds are against us, that will only make our success sweeter.\"\n\t\t\"I'll drink to that.  If we do succeed at this deposition, however narrowly, the partners will take notice.\"  He grins, baring teeth.  \"I plan to show no mercy.\"\n\t\t*set power %+10\n\t\t*set gunner %+10\n\t\t*goto day_one_chat\n\t#\"This isn't right.  Fact and Craftsmanship should determine who wins an engagement—not tricks.\"\n\t\t\"The whole Craft is a single enormous trick being played upon the world.  It started a hundred fifty years ago, and will continue forever.  Why should we complain when our partners choose to employ tricks of a more straightforward variety?\"\n\t\t*set craft %+10\n\t\t*set gunner %-10\n\t\t*goto day_one_chat\n\n*label day_one_chat\n\n\"So we're stuck here, fighting a superior enemy with inferior tools, in order to achieve an unearned victory.\"\n\n\"Welcome to office politics,\" Pat says, before he finishes his beer and calls for another.\n\n*page_break\n\nThe two of you drink until the buzz hits; after that, Pat turns in early, with plans to write his wife on the nightmare telegraph.  You're left alone in the bar.  You settle up your half of the check, and go for a walk.  \n\nOutside, the suspended sidewalk sways gently in the breeze, and night birds sing from branches overhead.  A fleet of bats flit by, dark and fast in the dim streetlights.  Far below, the eternal night grinds ashes into the carpet of the forest floor.\n\nA lone star glints through the leaves above—or maybe that's a dragon, high up, flying west.  They volunteer for aerial transport service, dragons do—young ones that haven't yet accumulated a hoard.  The work, the routine, the whole exercise amuses them.  And when it ceases to amuse, they stop.\n\nYou wish humans had it that easy.\n\n*comment Beat 3\n\n*choice\n\t#We're on the wrong side in this case.\n\t\t*set charm %+10\n\t\tBetween Ajaia and John Smith, if you had to choose who was on the right side of the case, you'd choose the former, not that you would ever admit this to Pat.  Smith unnerves you.  Even if he were a perfect gentleman, though, the approach Varkath's taken doesn't sit right.  If you beat the goddess fair and square, in a direct confrontation, you'd sleep easy.  But this—conning her into riding ill-equipped to battle…\n\t\t\n\t\tIt makes you feel dirty. \n\t\t*goto what_now\n\t#We're doing what we're paid to do.\n\t\tThe world's full of hard-luck cases.  Whatever else the God Wars were about, so many decades before your time, the people who fought in them chose [i]this[/i] world, where people build their own fate, over a world where higher powers doled out virtue and reward in good measure.  We build the truth these days.\n\t\t\n\t\tTransdimensional Thaumaturgics paid your firm to win this case.  It looks like they'll get what they've paid for.  What else matters?\n\t\t\n\t\tWhat indeed?\n\t\t*set power %+10\n\t\t*goto what_now \n\t#We're tiny gears within a grand machine.\n\t\tYour first mistake—your only mistake—was to think you were here for yourself.  You, ${name} ${surname}, are just one piece of the firm you serve, one gear within a great machine.  Few gears know why they turn, or what they grind when they do.  The machine has a purpose.  Even Varkath and Nebuchadnezzar and Stone might not know why the firm does what it does.  You're here to play a part, that's all.\n\t\t\n\t\tThat's all.\n\t\t*set craft %+10\n\t\t*goto what_now\n\t#We're being used.\n\t\t*set cunning %+10\n\t\tYes, you're an employee.  Yes, you're supposed to do what you're told.  But this is different.  It's one thing for the firm to ask you to lose sleep for a month or three preparing documents for a case that will never go to trial because of a last-minute settlement, it's one thing to have your mental and spiritual faculties directed to make a handful of Deathless Kings even more Deathless, it's one thing to be more familiar with the dead and undead than with the living.  It's quite another to be used as a duck blind.  You and Pat were sent as distractions.\n\t\t\n\t\tThat rankles.\n\t\t*goto what_now\n\n*label what_now\n\nWhat do you intend to do now?\n\n*choice\n\t#Hold back.  Let Pat do the dirty work.\n\t\tPat seems more comfortable with this deal than you are.  Fine.  Let him take point.  You don't plan to sabotage the case, but your heart isn't in this particular brand of deception.\n\t\t\n\t\tYou walk back to the hotel.  Beneath you, the deep forest shadows wait.  They're not as deep, though, as your dreams, nor quite as fearsome.\n\t\t*set Ngabe %-30\n\t\t*set gunner %-20\n\t\t*goto second_day_Pat\n\t#My job.  I give this assignment my all.\n\t\tPhosphorescent purple flowers unfurl from vines in the canopies of magisterium trees, lighting the dark with false stars.\n\t\t\n\t\tYou're here to do your job, and you will.  You chose this road a long time ago.  Flinching now will soothe nothing but your conscience.  The starflowers glare from the canopy, and you stare back, unblinking.  You realize you're smiling when the muscles of your face start to hurt.\n\t\t\n\t\tThose false stars stare at you in your dreams. \n\t\t*set Ngabe %+20\n\t\t*set gunner %+20\n\t\t*goto second_day\n\t#I need to talk to the goddess.  In private.\n\t\tYou wander through the city streets, crossing rope bridge after rope bridge between broad wooden petal-landings.  Ghostlight spills out from cafes and bars onto the street, and people dance in the light as a boy strums guitar.  Women wander in clutches of four or five, arm in arm in arm, and touch one another and look your way and laugh.  A circle of pot-bellied, black-haired men play poker; as you pass, one throws down his hand and decks the player to his right.  Somewhere someone screams pleasure and broad leaves shiver with anticipation.\n\t\t\n\t\tBrawling, loving, singing, strumming, throbbing city, it embraces you, gradual as the growth of vines.  Humid, she presses you close as a lover.  You sweat in your suit, and undo two buttons of your shirt.\n\t\t\n\t\tYou don't know this city well enough to direct your steps, but rope bridge leads to rope bridge.\n\t\t\n\t\tAt last, you come to trees that tower over even the monsters of this forest—a citadel of living wood, starflower-lit by night.  The Temple Grove awaits.\n\t\t*set sleep %-5\n\t\t*set craft %+10\n\t\t*set cunning %+10\n\t\t*set power %+10\n\t\t*set charm %+10\n\t\t*set gunner %-30\n\t\t*goto temple_night\n\n*label temple_night\n*page_break\nYou cross a creaky, narrow rope bridge toward a small side entrance, a gap between the trees so tight you barely squeeze through turned sideways.  Thick thorny vines writhe and uncurl to let you pass.\n\nA single creeper broader than most trees back home spirals up around a lesser trunk.  You climb on the creeper's back.  One hand clutches iron-hard magisterium bark, the other dangles over a long, long drop.  It might as well be eternal.  The stop would be, anyway.\n\nAfter a long climb you reach the Holy of Holies: the platform where this morning's deposition took place.  You pull yourself over the edge and crouch, panting, on the living wood.  Your suit's thorn-pierced and soaked in sweat; you have flowers and leaves in your hair.\n\nYou stand alone beneath the stars in the circle of skyscraper trees.\n\nAnd then you're not alone any more.  A goddess is there.\n\nAjaia whispers to you, in the leaves, in the wind, in the stars and silence.  And you answer.\n\n*choice\n\t*if (Wakefield > 50) #She needs counsel.  I refer her to Wakefield.\n\t\tIn the night, in her own grove, Ajaia is more than logic, more than words.  She thrills through your blood.  She is the breath of wet wind on the skin of your lower back.  She is thorn-prick and mud-musk and the rot of rutting love.\n\t\t\n\t\tAll of which is to say, she's not the best partner for a business conversation.  But you manage.\n\t\t\n\t\t\"You're in more danger than you know.  My bosses sent weaker members of the firm to convince you that you have a chance of victory, unrepresented.  If you press your suit alone, you will lose.  And there is no virtue in such a loss.\"\n\t\t\n\t\tThe trees laugh, and the stars, with the pride of a world that does not understand its own borders.  But then, what world does?\n\t\t\n\t\tYou search your wallet and produce a business card.  \"This is Ashleigh Wakefield's card.  ${Ash_pro_cap} is a good ${Ash_Craftsperson}, and works at a powerful firm.  Contact ${Ash_pro_obj}.  Explain yourself.  ${Ash_pro_cap} will help.  Do it tonight.  You may not have another chance.\"\n\t\t\n\t\tYou hold the card, feeling like an idiot.  Then, at last, you kneel, set the card down, turn, and leave.  The goddess's silence settles on your shoulders like a mantle, and ushers you down to the street.\n\t\t*set blessing true\n\t\t*achieve blessing\n\t\t*set goddess_referred true\n\t\t*goto Goddess_refuses_deposition\n\t#Scare the goddess.  Convince her she cannot win—she has to settle.\n\t\tIn the night, in her own grove, Ajaia is more than logic, more than words.  She thrills through your blood.  She is the breath of wet wind on the skin of your lower back.  She is thorn-prick and mud-musk and the rot of rutting love.\n\t\t\n\t\tAll of which goes to say, she's not the best partner for a business conversation.  But you manage.\n\t\t\n\t\t\"You're playing in deep waters,\" you say, and try to keep the edge of worship she inspires sheathed in your voice.  \"We're the smallest foretaste of our firm's strength.  You cannot win a direct confrontation.  You are great, but the world outside is greater.  Do not press this case to a final decision, because you will lose.  Offer a settlement.  Negotiate, and you achieve some measure of justice.  Press this through to the end, and you may lose everything.\"\n\t\t\n\t\t*if power > 80\n\t\t\tThe music of the wind in the leaves slows, and the lust-surge in your heart recedes.  The overshadow of the goddess pulls away from her grove and from your flesh, leaving you alone again.\n\t\t\t\n\t\t\tYou have been heard.  You hope.\n\t\t\t*set depo_2_diff %-20\n\t\t\t*achieve blessing\n\t\t\t*set blessing true\n\t\t\t*set goddess_settlement true\n\t\t\t*goto second_day\n\t\t*else\n\t\t\t*set depo_2_diff %+10\n\t\t\t*goto fail\t\t\t\n\t#Persuade her that she needs representation—a ${Craftsperson} to help her.\n\t\tIn the night, in her own grove, Ajaia is more than logic, more than words.  She thrills through your blood.  She is the breath of wet wind on the skin of your lower back.  She is thorn-prick and mud-musk and the rot of rutting love.\n\t\t\n\t\tAll of which goes to say, she's not the best partner for a business conversation.  But you manage.\n\t\t\n\t\t\"You're in trouble.\"  The moon is a smile of silver disbelief overhead.  \"My colleague and I were sent here to lull you into a false sense of security.  To keep you from seeking representation, which you really should have done before you pressed this suit.  You think you're wrestling with two half-trained magi, but when you come to the Court of Craft, you'll face men and women who have broken gods in half.  If you don't have someone to help you, someone to guide you, you'll lose.  I shouldn't tell you this.  But if you don't find help, a ${Craftsperson} of your own, then the battle will be a massacre.\"\n\t\t*if charm > base_diff\n\t\t\tThe music of the wind in the leaves slows, and the lust-surge in your heart recedes.  The overshadow of the goddess pulls away from her grove and your flesh, leaving you alone again.\n\t\t\t\n\t\t\tYou have been heard.  You hope.\n\t\t\t*set blessing true\n\t\t\t*achieve blessing\n\t\t\t*goto Goddess_refuses_deposition\n\t\t*else\n\t\t\t*set depo_2_diff %+10\n\t\t\t*goto fail\n\t#Betray my strategy tomorrow.\n\t\tIn the night, in her own grove, Ajaia is more than logic, more than words.  She thrills through your blood.  She is the breath of wet wind on the skin of your lower back.  She is thorn-prick and mud-musk and the rot of rutting love.\n\t\t\n\t\tAll of which goes to say, she's not the best partner for a business conversation.  But you manage.\n\t\t\n\t\t\"You're in trouble.\"  The moon is a smile of silver disbelief overhead.  \"I want to help prepare you for what's to come.  I know you don't trust members of the Craft.  I know you want to fight us yourself.  But you won't survive without help.  I can give you a few tips now.  That's all.\"\n\n\t\tYou describe the strategy you and Pat have laid out for the next day.  The night absorbs your words, and feel yourself wilt as they leave.\n\t\t\n\t\tWhen it's done, you stand on the platform beneath the goddess and you might as well be naked.   She surrounds you.  She knows you.  In her silence you hear leaves shift half a continent away.  The silence embraces and ennobles you.\n\t\t\n\t\tAnd yet still, leaving, you feel dirty.\n\t\t*achieve blessing\n\t\t*set blessing true\n\t\t*set gunner %-30\n\t\t*set soul +500 \n\t\t*set depo_2_diff %+15\n\t\t*goto second_day\n\t#Tell her my strategy tomorrow—but lie.\n\t\tIn the night, in her own grove, Ajaia is more than logic, more than words.  She thrills through your blood.  She is the breath of wet wind on the skin of your lower back.  She is thorn-prick and mud-musk and the rot of rutting love.\n\t\t\n\t\tAll of which goes to say, she's not the best partner for a business conversation.  But you manage.\n\n\t\t\"You're in trouble.\"  The moon is a smile of silver disbelief overhead.  \"I want to help prepare you for what's to come.  I know you don't trust members of the Craft.  I know you want to fight yourself.  But you won't survive without help.  I can give you a few tips now.  That's all.\"\n\t\t\n\t\tAnd you chart the false trail for her, the paths you will not take, embellishing the ruse with elaborate traps.  She listens.\n\t\t*if cunning > 70\n\t\t\tWhen it's done, you stand on the platform beneath the goddess and you might as well be naked.   She surrounds you.  She knows you.  In her silence you hear leaves shift half a continent away.  The silence embraces and ennobles you.\n\t\t\t\n\t\t\tStill, leaving, you feel dirty.\n\t\t\t*set depo_2_diff %-30\n\t\t\t*goto second_day\n\t\t*if cunning \u003c= 70\n\t\t\tBut she hears your lies for what they are.\n\t\t\t*set depo_2_diff %+10\n\t\t\t*goto fail\n\t\t\t\n*label fail\n*page_break\nThe sky and stars laugh, and the trees laugh too, in voices too deep for you to hear anywhere except deep within your chest.  The goddess presses against you from all around, and you feel yourself small, one of the teeming billions of insects upon her leaves, cupped and sustained by the breath and the flesh and the juice of her.  Your life is an instant within her eternity—she compasses you.\n\nOvercome, you stumble, and cry out in ecstasy and fear.\n\nThen the sensation's gone, and you kneel trembling and alone and sweaty on the living platform, brought to the verge of understanding and abandoned there.  A high, lonely sound escapes your clenched throat.\n\nYou push yourself to your feet, and go.\n*set soul -600\n*set wounds +1\n*goto second_day\n\t\n*comment Beat 4: Final Confrontation (or not!)\n\n*label second_day\n\n*comment What I'm going for in this difficulty-setting: the higher your Craft score, the ea
