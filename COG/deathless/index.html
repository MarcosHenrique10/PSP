sier the challenge.  So: a Craft score of 80, which is very high, will translate to a fairsubtraction of %-40, which will knock the difficulty down from 85 to something like 50, unless you've raised the difficulty by being a jerk to the goddess.  This means that if you have basically any secondary stat in any amount, you should be able to win the challenge—if you're a master or mistress of the Craft.  If you're a nebbish, then your Craft will give a comparatively small mod, and you'll need higher ability scores to compensate.\n\n*set depo_2_diff %-(craft / 5)\nThe next morning you and Pat return to Temple Grove together.  Pat looks well-rested, excited for the day's battles.  You wish you could say the same about yourself.\n\nAgain you draw blood and mix it.  Again you scribe the Craft circle about yourselves, and descend—or rise—into the world of the gods.  Again Ajaia takes shape above you, around you—again she gives the darkness form.\n\nWhat's your strategy today?\n\n*choice\n\t#I play good cop—distracting Ajaia from our aims, lulling her into false security.\n\t\t*set charm %+15 \n\t\t*if ((charm - (sleep_difficulty)) > depo_2_diff)\n\t\t\t*set depo_2_succeed true\n\t\t\tPat fits perfectly into the bad-cop role.  Your probes into the structure of Ajaia's memory encourage her to embellish certain details.  As a result, she's unprepared when Pat strikes other aspects of her story entirely—and, while she rushes in to protect herself faster than you would have believed possible, in a flood of fury, Pat gains significant ground.\n\t\t\t\n\t\t\tYou test the gates of Ajaia's memory palace; Pat storms its walls, weakens its foundations, arranges for betrayal from within.  The battle stretches until sunset, no breaks for rest or food.\n\t\t\t\n\t\t\tBut in the end, you have what you need.  Not as much knowledge as a senior partner would have gained, sure, but enough to build a case.  And more, you think, than Varkath expected you to learn when he sent you down here.\n\t\t\t\n\t\t\tYou and Pat manage to maintain your composure as you leave the Temple Grove, but in the taxi to the airport the two of you collapse.  And Pat laughs.\n\t\t\t*goto Flight\n\t\t*else\n\t\t\tGood cop, bad cop, the role you play doesn't matter if the adversary is too great.  Pat's an admirable Craftsman, and you're no slouch yourself, but Ajaia is a goddess, and after a near fight yesterday she's brought her full power to bear.  You've never felt anything like it.  Maybe Pat has.  You'll have to ask him, if you survive this.\n\t\t\t\n\t\t\tAjaia's memory palace has grown in the night to a dark lady's iron fortress like you used to hear whispered of in stories when you were a kid, an invulnerable demesne of pain and fire.  She breaks your essays against her with imperious will, with a cold natural certainty in her power no human could ever match.  You stole your fire from them, after all—from the gods.\n\t\t\t\n\t\t\tIt's a long, bitter day, and in the end your only satisfaction is the thought that you were supposed to fail all along.  And that's not much satisfaction after all.\n\t\t\t\n\t\t\tYou and Pat manage to maintain your composure as you leave the Temple Grove, but in the taxi to the airport the two of you collapse.\n\t\t\t*goto Flight\n\t#I play bad cop—I press against Ajaia's version of events until it breaks.\n\t\t*set power %+15\n\t\t*if ((power - (sleep_difficulty)) > depo_2_diff)\n\t\t\t*set depo_2_succeed true\n\t\t\tYou leave the social elegance and wit for Pat, and take arms.  After a stiff battle yesterday, Ajaia's entrenched her position.  Her memory palace has become a fortress, and while Pat circles it, scouting and prying for weaknesses, you hammer it with aerial bombardment, with catapults and with bombs from above.  \n\t\t\t\n\t\t\tShe meets you stroke for stroke, everywhere at once, consciousness humming in parallel, but as hours scrape into hours you make infinitesimal gains.  Not as much knowledge as a senior partner would have gained, sure, but enough to build a case.  And more, you think, than Varkath expected you to learn when he sent you down here.\n\t\t\t\n\t\t\tYou and Pat manage to maintain your composure as you leave the Temple Grove, but in the taxi to the airport the two of you collapse.  And Pat laughs.\n\t\t\t*goto Flight\n\t\t*else\n\t\t\tGood cop, bad cop, the role you play doesn't matter if the adversary is too great.  Pat's an admirable Craftsman, and you're no slouch yourself, but your opponent is a goddess, and after a near fight yesterday, today she's brought her full power to bear.  You've never felt anything like it.  Maybe Pat has.  You'll have to ask him, if you survive this.\n\t\t\t\n\t\t\tAjaia's memory palace has grown in the night to a dark lady's iron fortress like you used to hear whispered of in stories when you were a kid, an invulnerable demesne of pain and fire.  She breaks your essays against her with imperious will, with a cold natural certainty in her power that no human could ever match.  You stole your fire from them, after all—from the gods.\n\t\t\t\n\t\t\tIt's a long, bitter day, and in the end your only satisfaction is the thought that you were supposed to fail all along.  And that's not much satisfaction after all.\n\t\t\t\n\t\t\tYou and Pat manage to maintain your composure as you leave the Temple Grove, but in the taxi to the airport the two of you collapse.\n\t\t\t*goto Flight\n\t#I set traps for her, innocent openings that will lead to her downfall. \n\t\t*set cunning %+15\n\t\t*if ((cunning - (sleep_difficulty)) > depo_2_diff)\n\t\t\t*set depo_2_succeed true\n\t\t\tAfter a stiff battle yesterday, Ajaia's entrenched her position.  Her memory palace has become a fortress, wound in poisonthorn vines.  Why batter against it, why try to storm those formidable walls, when you can evade them?\n\t\t\t\n\t\t\tYou present weaknesses that aren't, encouraging her to move against you in ways that expose her to attack.  Joining her vines, you wind between the bricks of her fortress, until it becomes a part of your being—and then you simply step through, and find yourself within, her secrets for the taking.\n\t\t\t\n\t\t\tShe finds you, of course, parallel consciousness having its advantages, and she chases you from her store of secrets—but that only gives you an opportunity to find a new angle of attack.\n\t\t\t\n\t\t\tYou don't win.  You are wrestling a goddess, trying to out-trick a trickster.  But as hours scrape into hours you make infinitesimal gains, not as much as a senior partner would have learned, sure, but enough to build a case.  And more, you think, than Varkath expected when he sent you down here.\n\t\t\t\n\t\t\tYou and Pat manage to maintain your composure as you leave the Temple Grove, but in the taxi to the airport the two of you collapse.  And Pat laughs.\n\t\t\t*goto Flight\n\t\t*else\n\t\t\tGood cop, bad cop, the role you play doesn't matter if the adversary is too great.  Pat's an admirable Craftsman, and you're no slouch yourself, but your opponent is a goddess, and after a near fight yesterday, today she's brought her full power to bear.  You've never felt anything like it.  Maybe Pat has.  You'll have to ask him, if you survive this.\n\t\t\t\n\t\t\tAjaia's memory palace has grown in the night to a dark lady's iron fortress like you used to hear whispered of in stories when you were a kid, an invulnerable demesne of pain and fire.  She breaks your essays against her with imperious will, with a cold natural certainty in her power that no human could ever match.  You stole your fire from them, after all—from the gods.\n\t\t\t\n\t\t\tIt's a long, bitter day, and in the end your only satisfaction is the thought that you were supposed to fail all along.  And that's not much satisfaction after all.\n\t\t\t\n\t\t\tYou and Pat manage to maintain your composure as you leave the Temple Grove, but in the taxi to the airport the two of you collapse.\n\t\t\t*goto Flight\n\n\n*label second_day_pat\n*set ngabe_under_bus true\nThe next morning you and Pat return to Temple Grove together.  Pat looks well-rested, excited for the day's battles.  You wish you could say the same about yourself.\n\nAgain you draw blood and mix it.  Again you scribe the Craft circle about yourselves, and descend—or rise—into the world of the gods.  Again Ajaia takes shape above you, around you—again she gives the darkness form.\n\nBut when battle's joined, you hold back.  Pat's eager for this fight, and you let him press for his revenge, and his glory.  You're less convinced—and anyway you feel unsettled by your bosses' use of the two of you to mislead rather than to conduct actual Craftwork.  You support him when he needs it, but most of the work's his.\n\nPat fights way through the deposition, for hours upon hours, but in the end he can't carry the war himself.  At day's end, you know no more about the case than you did at dawn.  But Pat holds his head up proud as you descend to your cab, and leave for the airport.\n\n*set gunner %-30\n*set Ngabe %-30\n*page_break\n*goto Flight\n\n*label Goddess_Refuses_Deposition\n\nThe next morning you and Pat return to Temple Grove together.  Pat looks well-rested, excited for the day's battles.  You wish you could say the same about yourself.\n\nAgain you reach the Sanctum, and again you approach the bowl in which to shed your blood.  But before either of you can draw your knives, you hear a voice from the trees around you.\n\nAll of them.\n\nAnd overhead.\n\n\"No,\" the goddess says.\n\nPat blinks.  \"Excuse me?\"\n\n\"No,\" she repeats.  \"I am canceling this deposition.  I have decided to seek outside representation.\"\n\n\"What?\"\n*set goddess_refuse true\n*page_break\n\n*if (goddess_referred)\n\tYou hear footsteps on marble, a strange sound in a cathedral made from living wood.  Stranger still, though not unexpected, is the voice: \"Pleasure to see you again, ${surname}.\"\n\t\n\tThe voice of Ashleigh Wakefield.  \n\n\t${Ash_pro_cap} strides out of the shadows of the trees opposite, ice-cold and perfectly appointed in ${Ash_pro_pos} suit, briefcase in hand, one eyebrow arched—though that last might just be your imagination.\n\n\t*if (Wakefield_hurt)\n\t\tYour breath catches in your throat.  You knew Wakefield was injured in your battle with the demon that possessed ${Ash_pro_obj}.  You didn't know ${Ash_pro_pos} injuries' extent.  The hand that holds ${Ash_pro_pos} briefcase is a skeletal claw.  Silver runes gleam from the bone.  A black mask hides one eye and half ${Ash_pro_pos} face; behind the cutout for ${Ash_pro_pos} eye, a single black flame burns, like you've seen in the eyes of Deathless Kings.\n\t\t\n\t\tWakefield catches your eye, and while ${Ash_pro} smiles, a bit, there's a lot of weight behind that smile.  \n\t\t*goto Ash_retained\n\t\t\n\t*if not(Wakefield_hurt)\n\t\tWakefield looks sharp, bright-eyed, and brilliant—every bit the magus you wish you were.  A calculated effect, of course—how long did ${Ash_pro} spend in front of a mirror this morning?—but it gets you all the same.\n\t\t*goto Ash_retained\n\n\t*label Ash_retained\n\t\"Lady Ajaia,\" ${Ash_pro} says, \"has retained Kelethres Albrecht & Ao to represent her in this matter.  We're delaying these proceedings until such time as our client is properly prepared for your deposition.  And we plan to challenge the validity of such gains as you may or may not have made yesterday.\"\n\t\n\t*page_break\n\t*goto Pat_reaction\n*else\n\t\"I speak,\" the goddess says, \"and you hear.  I seek outside representation.  My priests are entertaining offers from many New World Craft firms.  As plaintiff, I choose my seasons for battle and for blossoming.  For now, I choose delay.\"\n\t\n*label Pat_reaction\n\nPat shakes his head.  \"We have planned for this.  We have come to work.\"\n\n*if (goddess_referred)\n\t\"Perhaps you have,\" Wakefield says.  \"Regrettable.  I hope, for your firm's and your clients' sake, that you marshall your resources more efficiently in the future.\"\n\t*goto Pat_angry\n*else\n\t\"And you will have your chance.  But later.\"\n\t*goto Pat_Angry\n*label Pat_Angry\n\nPat sticks his hands deep into his pockets, and rolls his shoulders back.  A muscle in his jaw stands out.\n\t\n*choice\n\t#\"Pat.  Let's go.\"\n\t\t*set power %+10\n\t\t*set Ngabe %+20\n\t\tFor a heartbeat you think he's about to start something neither of you want to finish.  Then he takes a breath, closes his eyes, and when he opens them again, says: \"Yes.\"\n\t\t*goto Departure\n\t#\"That settles that.  Thank you for your time.  Contact us when your schedule and goals are settled.\"\n\t\tYou assume center stage for the moment Pat needs to shake himself free of this sudden wave of anger.  When you glance left you see him relaxed, composed, again.\n\t\t*set charm %+10\n\t\t*set Ngabe %+20\n\t\t*goto Departure\n\t#I let Pat sort himself out.\n\t\tTension builds in the silence.  At last, Pat masters himself.  \"Very well.\"\n\t\t*goto Departure\n\t\t\n*label Departure\n\n*if (goddess_referred)\n\tWakefield smiles with precisely half ${Ash_pro_pos} mouth.  \"Have a nice flight.  And don't worry.  You'll be hearing from us.\"\n\t*goto leave_temple\n*else\n\t\"Go, then,\" the goddess says.  \"You will hear from me in time.  This is not over.\"\n\t\n\t\"It is not,\" Pat says.\n\t*goto leave_temple\n*label leave_temple\n\nYou descend from the temple, hail a cab, and let it bear you back through the city toward the airport.  Neither of you talk for a very long time.\n\n*goto Flight\n\n*label Flight\n\nIt's a long, smooth flight home.\n\n*if (depo_1_succeed and depo_2_succeed)\n\t*achieve depositionwin\n\tPat celebrates with whiskey and soda and a shocked wide smile.  \"I can't believe we did it.  I cannot believe we did it.  You know what this means.  We have succeeded, though narrowly, where we were supposed to fail.  What better proof can there be of our skill?\"\n\t*set Ngabe %+30\n*if ((depo_1_succeed or depo_2_succeed) and not(depo_1_succeed and depo_2_succeed))\n\tPat orders a whiskey and soda and sips it slowly as you fly north.  \"We did well.  Better than anticipated, I think.\"\n\t*set Ngabe %+10\n*if (not(depo_1_succeed) and not(depo_2_succeed))\n\tPat orders a whiskey and soda and sips it slowly.\n*comment endif\n\t\n*if Ngabe_Under_Bus\n\tYou sense the chill under his silence, and do not disturb it.\n\t*goto north_storm\n*else\n\t\"That's over, at least,\" you say as the dragon flies back north into the cold.\n\t\n\t\"I would not be so certain,\" he replies.  \"Nothing is ever over.\"\n\t*goto north_storm\n*label north_storm\n\nTo the north, a storm gathers, and a bolt of lightning kisses cloud and earth at once.  You shiver.  Weather [i]is[/i] destiny-sensitive—Cartoulli proved that, after all.  But it's only destiny-sensitive when there's an awful lot of destiny at stake.  You hope this particular storm has nothing to do with you.\n\n*fake_choice\n\t#Of course it doesn't.\n\t#I'm imagining things.\n\t#Can't be.  Everything seems to be going well.\n\t#I order a drink, to take the edge off my nerves.\n\nYou fly north, into the storm, and through.\n\n*goto Aftermath\n\n*comment Beat 5: Chat with Varkath afterward.\n*label Aftermath\n*page_break\n\nNot all weeks are created equal.  Some expand to fill months of subjective time—moving weeks, for example, in which each day raises a whole opera's worth of unexpected obstacles, miscommunications, unpleasant surprises and histrionic fits.  Other weeks pass in a breath.  A week devoted to a single massive task, finish this brief or perfect that outline or read these three thousand documents, evaporates as fast as a drunk's piss on a Badlands ghost town sidewalk at high noon.\n\nThe week after your return occupies exactly the length of a week.  On Friday afternoon, bent over your work, you hear the silence deepen.  You set down your knife, wipe the blood off your hands, and turn to see Varkath standing in your doorway.  Burning eyes watch you through the holes in the mask of his face.\n\n*if (depo_1_succeed or depo_2_succeed)\n\t*set deposition_succeed true\n\t\n\t\"${Char_voc} ${surname}.  I wanted to congratulate you on your success.  Do you have a moment?\"\n\t*goto of_course\n*else\n\t\"${Char_voc} ${surname}.  Do you have a moment to discuss your excursion to Tassadon?\"\n\t*goto of_course\n\n*label of_course\n\n\"Of course, sir.\"\n*page_break\n\n\"How did you find it?\"\n\n\"Find it?\"\n\n*if (not(depo_2_succeed) or (goddess_referred or (goddess_settlement or blessing)))\n\t\"The experience of combat with a goddess.  And of being outmaneuvered at the last.\"\n*if (depo_2_succeed)\n\t\"The experience of combat with a goddess.  And of victory.\"\n\n*choice\n\t#\"Enlightening.\"\n\t\t*set gunner %-10\n\t\t*set craft %+20\n\t\t*set Varkath %+20\n\t\tHe nods.  \"How so?\"\n\t\t\n\t\tYou choose your words carefully.  \"There's more to this business than I thought.  More than the Craft, even.\"\n\t\t\n\t\t\"Many neophytes in the Craft make the error of assuming that mystic might has value independent of its effect.  The Craft is a form of power.  That is all.  Other forms of power, applied correctly, are every bit as useful to the Craftsman, if not more.  As you have seen.\"\n\t\t\n\t\t\"As I've seen,\" you echo.  There are traps in his words, and you don't want to fall into one.\n\t\t*if(char_binary=\"woman\")\n\t\t\t\"Or Craftswoman.\"\n\t\t\t\n\t\t\t\"Quite so.\"  You think you hear a hint of humor in his voice.\n\t\t\t*goto end\n\t\t*goto end\n\t#\"Exciting.\"\n\t\t*set gunner %+30\n\t\t*set power %+20\n\t\t*set Varkath %+30\n\t\t\"You mean the experience of battle.\"\n\t\t\n\t\t\"I mean the entire affair.  I was sent down there, on my own, to decide the destiny of cities, and of gods.  I might not have the strength I need yet, but one day I will.\"\n\t\t\n\t\tVarkath nods.  \"You may at that.  You certainly have the determination you require.\"\n\t\t*goto end\n\t*if (Ngabe > 50) #\"I enjoyed working with Pat Ngabe.\"\n\t\tVarkath laughs.  \"You flew south on dragonback, confronted a goddess in her sanctum, and found comradeship with your partner the most memorable element of the case?\"\n\t\t\n\t\t\"He's a good guy,\" you say, defensively.  \"And given the pyrotechnics and all the rest of it, I was glad to have him by my side.  Even if we didn't always agree on everything.  Success requires more than raw power, intellectual or mystical or otherwise.  It needs people.\"\n\t\t\n\t\t\"People are overrated,\" Varkath says.\n\t\t*set gunner %-20\n\t\t*set charm %+20\n\t\t*set Ngabe %+20\n\t\t*set Varkath %-20\n\t\t*goto end\n\t#\"I know why you sent us there.\"\n\t\t*set Varkath %+50\n\t\t*set cunning %+20\n\t\t\"Direct,\" Varkath says.  \"I like your style, though I trust you will be more circumspect in court.\"\n\t\t\t\t\n\t\t\"You want the goddess to think we're weak.  You didn't care about the outcome of the deposition—not as much as you cared about convincing her to press forward without counsel.  Because you think her case is stronger than she does, and if she fights it through, you want her to have as little help as possible.\"\n\t\t\n\t\tWhile you speak, Varkath produces a square of paper from his suit pocket, and folds it into a paper crane.  The crane, formed, flutters up and perches on the shoulder of his suit.  \"And how does that make you feel?\n\t\t\n\t\t*choice\n\t\t\t#\"I don't like being used.\"\n\t\t\t\t*set Varkath %+20\n\t\t\t\t*set gunner %+10\n\t\t\t\t*set power %+20\n\t\t\t\t*set cunning %+20\n\t\t\t\tVarkath emits what might be the world's softest sigh.  \"No one does.  And yet the world turns, and turns, and no one stops using.\"\n\t\t\t\t\n\t\t\t\t\"Tools turn in the hands of those that wield them.  Friends don't.\"\n\t\t\t\t\n\t\t\t\tHe strokes the beak of his paper crane.  \"What do you mean by that?\"\n\t\t\t\t\n\t\t\t\t\"Keep me in the loop next time.\"\n\t\t\t\t\n\t\t\t\tYou match gaze with the fires behind his painted mask of skin.  \n\t\t\t\t\n\t\t\t\t\"I will consider it,\" he says at last.\n\t\t\t\t*goto end\n\t\t\t#\"Good.\"\n\t\t\t\t*set Varkath %+10\n\t\t\t\t*set gunner %+10\n\t\t\t\t*set craft %+20\n\t\t\t\t*set cunning %+20\n\t\t\t\t\"Good?\"  Whatever he expected you to say, it wasn't that.\n\t\t\t\t\n\t\t\t\t\"I'd rather know that I'm a soldier directed with skill by clever minds, than a minion of power-hungry fools.\"\n\t\t\t\t\n\t\t\t\t\"A single point of evidence does not a trend line make.\"\n\t\t\t\t\n\t\t\t\t\"Of course not,\" you say.  \"Which is why I'm watching our next moves carefully.\"\n\t\t\t\t*goto end\n\t\t\t#\"Does it matter?\"\n\t\t\t\t*set Varkath %-10\n\t\t\t\t*set gunner %-10\n\t\t\t\t*set craft %+20\n\t\t\t\t*set charm %+20\n\t\t\t\t\"Of course it should,\" he says.\n\t\t\t\t\n\t\t\t\t\"It should, sure.  But let's be honest.  If I say I'm disappointed that the firm would use me in this manner, or that I didn't like the way this deposition distorted the Craft, or anything like that, you'd find a way to placate me, and the next time you'd send Chen instead of me.  This organization won't change because we ask it to.  We're all gears, Mr. Varkath.  Even you.\"\n\t\t\t\t\n\t\t\t\tVarkath strokes the beak of his paper crane in silence. \n\t\t\t\t*goto end\n\t\t\t#\"It was wrong.\"\n\t\t\t\t*set Varkath %-20\n\t\t\t\t*set gunner %-10\n\t\t\t\t*set charm %+20\n\t\t\t\t*set power %+20\n\t\t\t\t\"Wrong,\" he says, in a tone that suggests he's unfamiliar with the meaning of the word.\n\t\t\t\t\n\t\t\t\t\"We went down there to work the Craft.  The goddess met us in good faith.  If we wanted to defeat her, we should have done it then, with all the power at our disposal.  I see the logic of your trap, but that does not excuse its cruelty, or the disrespect it entails to Ngabe or to myself.  We are not stalking horses for the great minds of the firm.  We're here to do good work.\"\n\t\t\t\t\n\t\t\t\tVarkath strokes the beak of his paper crane in silence for a time.  That mask has no expressions for you to read.  \"Do you really think the Craft is not cruel?\"\n\t\t\t\t\n\t\t\t\tFor that, you have no answer.\n\t\t\t\t*goto end\n\n*label end\n*page_break\n\nVarkath leaves you alone, in your office.  The dissected chicken lies on your work table, pinned open by silver needles, insides wet and glistening.  The entrails steam.  If they tell of a future, they do so in letters you cannot read.\n\nYou lift your scalpel again, and its glass blade reflects the light, and the blood, and you begin once more to cut.\n\n*if ((depo_1_succeed or depo_2_succeed) and not(depo_1_succeed and depo_2_succeed))\n\t*set deposition_halfway true\n\t\n*finish\n", "devilsasylum": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 4: The Devil's Asylum\n\n*comment Skill assignments for test purposes!\n\n*comment *set chen 85\n*comment *set vega 40\n*comment *set stone 70\n*comment *set power 30\n*comment *set cunning 60\n*comment *set craft 80\n*comment *set sleep 85\n*comment *set charm 40\n\n*comment Some vars to track who's helping you.\n\n*temp Cass_Help false\n*temp Pat_Help false\n*temp Vega_Help false\n*temp vega_sex_diff 70\n*temp chen_sex_diff 65\n\n*if vega_sex > 0\n\t*set vega_sex_diff -10\n*if chen_sex > 0\n\t*set chen_sex_diff -10\n\n*temp friend false\n*temp helper_name \"Scooby\"\n\n*temp know_about_posting false\n\n*comment Let's try variable difficulties for both the key tasks in this mission, which we can then adjust depending on what's happened so far.  Might be a useful technique.\n\n*temp contract_diff 60\n*temp embassy_diff 60\n*temp embassy_influence false\n\n*set sleep_difficulty (round((((1-3)/9)*sleep)+20) + round(debt / 20000))\n\n*temp sleep_warning \"\"\n\n*if ((sleep \u003c 90) and (sleep >= 70))\n\t*set sleep_warning \"  Then again, you haven't been sleeping enough recently, so it's  possible your judgment is a bit skewed.\"\n*if ((sleep \u003c 70) and (sleep >=40))\n\t*set sleep_warning \"  You've been too busy to get enough sleep recently—so strictly speaking you shouldn't be taking on more work.  But the opportunity was too good to pass up.\"\n*if (sleep \u003c40)\n\t*set sleep_warning \"  You're running on fumes—so little sleep that you can feel your mind coming apart at the edges.  Thank whatever gods watch out for bastards that you haven't yet nodded off in the middle of a conversation.  But still, you took the job.\"\n\n*comment Tracking success at the two parts of the scene task.\n\n*temp renegotiated false\n*temp visa false\n\n*comment A variable to track the amount of time spent on the investigation.  I want to\n*comment restrict the user's choice here a little more than in previous scenes.\n*temp Time 0\n*advertisement\n\nYou feel the sharp edge of the glass first.  Then you see the blood on your palm.  Then you feel the pain.\n\nYou strangle your urge to curse.  You stand in the open first floor of a deserted warehouse by the freight docks.  No ghostlights here, or even oil lanterns—only the light of the morning sun filtered through dirty and broken windows.\n\nThe cut's not deep, but it stings.  You checked the windowsill for glass before trying to climb through, but you must have missed some.  Oh, well.  You needed to get inside, and someone's padlocked the main door.\n\nSo now you're here, in this dirty, collapsing building, hunting for a monster.\n\nThis is what you get for taking on a [i]pro bono[/i] assignment.\n\n*page_break\n\nIt all seemed well and good when you saw the posting on the [i]pro bono[/i] opportunities board.  Angelica Nebuchadnezzar herself posted this one, so you knew it would be a high profile case.  Probably.${sleep_warning}\n\nThere are lots of reasons a person might want to take on a case for free.  Which one moved you to accept this particular case?\n\n*choice\n\t#I wanted to help someone.\n\t\tThis job doesn't offer many chances for unadulterated selflessness.  Most of your clients are Concerns or high-net-worth individuals, and one can only get so excited about helping immortal and immoral powers clash with others of their own ilk.\n\t\t\n\t\tThis should be a nice change.\n\t\t*set charm %+10\n\t\t*set gunner %-10\n\t\t*page_break\n\t\t*goto Case_Approach\n\t#I'll take any chance to pad the old resume.\n\t\tAssociates get lost in the machinery of a large-scale necromantic proceeding, or even in a major case—anonymous as infantrymen during a charge.  You want to stand out.  [i]Pro bono[/i] cases are a way to do that.  Nebuchadnezzar will be available to advise you, but the major decisions on this case are yours to make.\n\t\t\n\t\tWhich is pretty horrifying, if you think about it.\n\t\t*set cunning %+10\n\t\t*set gunner %+10\n\t\t*page_break\n\t\t*goto Case_Approach\n\t#I want to develop my skills.\n\t\tLet's be honest: large-scale Craft of the kind you've done since you started with Varkath Nebuchadnezzar doesn't tend to be great for personal development.  Partners talk a good game about professional growth, but if you're trying to carve apart a god, or build a barricade against demonic invasion, it's easier to give one person one job and expect them to do it.\n\t\t\n\t\t[i]Pro bono[/i] cases have limited stakes—mess up, and you won't be costing the firm anything more than your time.  So, on this case, the firm's willing to let you do…well…everything.  Strategy.  Tactics.  Wards.  Actual argument: wielding sorcerous weapons against faceless and stringent opposition.  This is what you wanted when you went to school.\n\t\t\n\t\tWhich may say something about your own relative mental stability, but we can cross that bridge when we come to it.\n\t\t*set craft %+15\n\t\t*set gunner %+10\n\t\t*page_break\n\t\t*goto Case_Approach\n\t#Nebuchadnezzar's the only name partner I haven't been able to work with yet.\n\t\tThe political logic here is simple.  You want to succeed at the firm.  Which means doing good work, yes, but also impressing the partners who will ultimately determine your fate.  You've met Varkath, which is more than most people can claim.  You've worked with Stone.  Nebuchadnezzar focuses on necromancy, while you're in the general Craftwork division; you won't have many more chances to work with her.\n\t\t\n\t\tYes, sure, this will let you help people.  And maybe you'll learn something, and maybe you'll pad your resume.  But you have your eyes on the prize.\n\t\t\n\t\t*set Nebuchadnezzar %+10\n\t\t*set power %+10\n\t\t*set gunner %+15\n\t\t*page_break\n\t\t*goto Case_Approach\n\n*label Case_Approach\n\nThe case is a straightforward demonic contract dispute.  Common enough.  Demons are visitors from worlds beyond the skein of our reality, and physical laws don't bind them in the same way they bind most people.  A demon, loose in our world, would have virtually unlimited power, though it would be profoundly unstable and probably die in short order.\n\nSo, summoned demons are bound by contracts.  The demon receives soulstuff and a gateway into the world; in exchange the contract sets rules binding it, and mandates the performance of certain services.\n\nMajor summoning Concerns are good at this sort of thing, and problems rarely arise.  Demons are set free, or bound to animate golems, or directed to perform any number of tasks.  But on the small scale, many disreputable Craftsmen and demons try to forge contracts exploitative to one side or the other.\n\n*page_break\n\nThat seems to be the problem here.  A demon claims to be bound by a bad contract, and wants professional help to break free.  That means you.\n\n*if (background = \"beggar\")\n\tYou've known too many people in your life who made bad deals out of desperation.  You did it once or twice yourself.  Nice to get a chance to help someone.\n*if (background = \"poor\") or (background = \"comfortable\")\n\tYour uncle was once on the receiving end of a particularly unfair deal.  He thought he knew what he was doing when he signed.  He lost his business because of it.  No demons involved that time, but nobody should have to suffer through that.\n\t\n\tNot even things that eat human flesh.\n*if (background = \"aristo\")\n\tYou shudder to imagine what it would be like to be bound by an unfair contract.  This is why people have Craftsmen to look after things for them, after all.\n\t\n*page_break\n\nSince this is your case, you can choose a team, if you want, or go it alone.\n\t\nOf course, as an associate in your second year, you still don't have a lot of pull—but you might be able to convince some of your colleagues to put in extra hours if you choose to.\n*label Ask_Friends\nDo you ask anyone else?\n*fake_choice\n\t*hide_reuse #Maybe Cass Chen will help me.\n\t\t*set Chen %+10\n\t\t*if Chen > 50\n\t\t\tCass listens, increasingly interested, as you describe the case.  \"I'd love to help,\" she says. \n\t\t\t\n\t\t\t\"Great!  Thank you.\"\n\t\t\t\n\t\t\t*if Chen > 70\n\t\t\t\t\"Hey, don't thank me.  This should be fun.  Plus, it's a chance to hang out without a giant stack of file folders between us.\"\n\t\t\t\t\n\t\t\t\t\"There'll still be file folders.  This is work, you know.\"\n\t\t\t\t\n\t\t\t\t\"Eh.  Even business can be pleasant sometimes.\"\n\t\t\t*comment endif\n\t\t\t\t\n\t\t\tShe grins.\n\t\t\t*set Cass_Help true\n\t\t\t*set helper_name \"Cass\"\n\t\t\t*set friend true\n\t\t\t*set gunner %-10\n\t\t\t*goto Last_Known_Address\n\t\t*if Chen \u003c=50\n\t\t\tShe looks interested in the facts of the case, but when you finish, she just shakes her head.  \"I'm sorry, ${name}.  I'd love to help, and thanks for asking me.  But I'm just so busy right now, with the First Chthonian thing.\"\n\t\t\t\n\t\t\t\"Of course,\" you say.  \"That's fine.\"  And you walk away.\n\t\t\t*set Cass_Help false\n\t\t\t*goto Ask_Friends\n\t*hide_reuse #I haven't worked with Pat Ngabe yet.  This might be a good chance.\n\t\t*set Ngabe %+10\n\t\t*if Ngabe > 40\n\t\t\tYou find Ngabe in one of the necromantic chambers, cutting up a dead woman's body with a knife made from lightning.  As he works, a smell of cooked meat and burnt hair rises from the body.  You describe the case, and he nods periodically, either to you or to the corpse, you're not sure which.\n\t\t\t\n\t\t\tWhen you finish, he looks over to you and smiles.  \"I do not like demons.  But I dislike bad Craftwork more than demons.  I will assist.\"\n\t\t\t\n\t\t\t\"Thanks,\" you say.  \"I knew I could count on you.\"\n\t\t\t*set gunner %-10\n\t\t\t*set Pat_Help true\n\t\t\t*set helper_name \"Pat\"\n\t\t\t*set friend true\n\t\t\t*goto Last_Known_Address\n\t\t*if Ngabe \u003c= 40\n\t\t\tYou find Ngabe in one of the necromantic chambers, cutting up a dead woman's body with a knife made from lightning.  As he works, a smell of cooked meat and burnt hair rises from the body.  You describe the case, and he nods periodically, either to you or to the corpse, you're not sure which.\n\t\t\t\n\t\t\tWhen you finish, he looks up from his knifework.  \"I do not like demons.  And I am busy.  But thank you for asking me.\"\n\t\t\t\n\t\t\t\"I figured it was worth a shot,\" you say.\n\t\t\t*set Pat_Help false\n\t\t\t*goto Ask_Friends\n\t*hide_reuse #Vega might want to lend a hand.  If he's not too busy.\n\t\t*set Vega %+10\n\t\tVega's not in his office; you wait around for a while, browsing his copy of this month's Scarfox Hunters' Quarterly (Our Reviewers Cover the Year's Best Destrier Breeds for Your Next Hunt!), and after a quarter-hour he storms into the office, hair in disarray, loosens his tie, slides it off over his head, and hangs it around a pewter figurine of a Camlaan highland piper on the shelf over his desk.  He leans against the window, and sighs.\n\t\t\t\n\t\tYou turn the page, and he starts and spins around to face you, drawing his knife from the glyph over his heart.  Then he sees you, releases the knife, and laughs.  \"You could have said something.\"\n\t\t\t\n\t\t\"You looked distracted.\"\n\t\t*page_break\n\t\t*if (Stone_Fix)\n\t\t\t\"Ever since the Transdimensional Thaumaturgics case, it's been one grind of an assignment after another.  I feel like I'm drowning.\"\n\t\t*if (Vega_Fix or Solo_Fix)\n\t\t\t\"Ever since the Transdimensional Thaumaturgics case, I've been the go-to boy for high-level wards.  It's great work, it's good for my career, but sometimes I feel like I'm drowning.\"\n\t\t*comment endif\n\t\t\t\n\t\tYou don your best winning smile.  \"If that's the problem, why not take a break from your work with some…other work?\"  He raises one eyebrow, but listens as you outline the particulars of the demon case.\n\t\t*page_break\n\t\t*if Vega > 60\n\t\t\t\"What the hells,\" he says.  \"The last thing I need right now is more work.  That said…it would be nice to help with something uncomplicated and morally correct for once.\"\n\t\t\t\n\t\t\t\"I hoped you'd say that.\"\n\t\t\t\n\t\t\t*set Vega_Help true\n\t\t\t*set helper_name \"Vega\"\n\t\t\t*set friend true\n\t\t\t*goto Last_Known_Address\n\t\t*else\n\t\t\t\"I'm sorry,\" Vega says.  \"It sounds like a good cause, and I wish I could help, but I'm just too busy.\"\n\t\t\t\n\t\t\t\"That's okay.  It was a long shot.\"\n\t\t\t\n\t\t\t\"Good luck,\" he says, as you leave.\n\t\t\t*set Vega_Help false\n\t\t\t*goto Ask_Friends \n\t#Help's for those who need it.  I'll do this on my own.\n\t\tThat's the spirit.  Who needs friends?  Or help?  Or someone to watch ${char_pro_pos} back?  Or advice when ${char_pro} gets in trouble?\n\t\t\n\t\tEh.  Don't listen to yourself.  Just a few nagging second thoughts.  This is a great idea: do this alone, and you'll reap an awful lot more glory.  Of course, glory at this firm seems to be synonymous with sleep deprivation.  Anyway, might as well head out.\n\t\t*set gunner %+20\n\t\t*set Sleep %-10\n\t\t*goto Last_Known_Address\n\n*label Last_Known_Address\n*page_break\n*if (friend)\n\tFirst step in a case like this is to meet with the client.  The posting listed an address; you send a letter announcing that you'll visit the next morning, requesting a reply if that schedule doesn't work.  You receive none, so the next day you and ${helper_name} take a cab to the address.\n*comment end_if\n\t\n*if friend = false\n\tFirst step in a case like this is to meet with the client.  The posting listed an address; you send a letter announcing that you'll visit the next morning, requesting a reply if that schedule doesn't work.  You receive none, so the next day you take a cab to the address.\n*comment endif\n\nAt which point the risks of getting involved with [i]pro bono[/i] work in an unfamiliar city become clear to you.  You see, if you knew Shikaw very well at all, you'd have recognized the address as belonging to a particularly sketchy part of the warehouse district.\n\n*if (background = \"beggar\") or (background = \"poor\")\n\tThe area feels just like home, for better and for worse.  People walk slower, because they don't have anywhere much to be.  Three girls on a street corner laugh at some private joke.  A couple of off-duty teamsters take a walk from the loading dock where they work, and pass a joint between them.\n\t\n\tWhat a weird twist of fate, that brings you to a place like this in a suit.\n*comment end_if\n*if (background = \"comfortable\")\n\tThis isn't the kind of place you envisioned your nice, respectable education taking you.  Two burly men dressed in loose, ragged clothing walk down a sidewalk, smoking a joint.  Robbers?  Muggers?  Or just locals?\n\t\n\tThe cab rolls past.  Your heart tightens in your chest.\n*if (background = \"aristo\")\n\tYou wouldn't pay people to visit a place like this.  Two men dressed in loose, ragged clothing walk down a sidewalk, smoking a joint.  A beggar sleeps in an alley, liquor bottle to hand.  Those women on the corner, are they prostitutes?\n\t\n\tTo what desperate straits your client must have sunk to seek refuge here!\n\t\n*page_break\n\nThe specific example of urban decay in front of which the cab deposits you is a broken-windowed and abandoned brick warehouse.  The front door's chained shut.  Your letter rests on the clean front step—opened by a single cut with a blade so sharp the paper didn't tear.\n\nYour client's in here.  Now all you need to do is find him.  It.\n\n*if (Cass_Help)\n\t\"I'll cover the back doors,\" Cass says, \"in case he tries to run away.  Which he might, if he's worried about people coming to drag him back to fulfill his contract.\"\n\t\n\t\"Which leaves me to go in alone.\"\n\t\n\t\"It's your case,\" she says with a cheerful smile.  \"If you need anything, just scream.\"\n*if (Pat_Help)\n\t*page_break\n\t\"I will watch from the roof,\" Pat says.  \"If anyone enters or leaves, I will inform you.\"\n\t\n\t\"From the roof?\"\n\t\n\tPat doesn't reply.  He steps forward, and as he does glyphs spark on his fingers and wrists and on the back of his neck, and shadowy wings unfold from his broad back through his suit jacket.  They beat twice and he rises through the air.\n\t\n\tHe lands lightly on the rooftop.  The wings disappear, and he waves down to you.\n\t\n\t\"Nice trick,\" you mutter under your breath as you make your way toward the warehouse.\n*if (Vega_Help)\n\tVega glances around, obviously tense, obviously uncomfortable.\n\t\n\t\"Nobody around here subscribes to Scarfox Hunters' Quarterly, I bet.\"  It's a cheap shot, but you can't resist, and luckily he gets the joke.\n\t\n\t\"Fortunately for their sake,\" he says.  \"The mean article quality has fallen off in the last few years.\"\n\t\n\t*if (background = \"poor\" ) or (background = \"beggar\")\n\t\tVega's not that bad, really, no matter if he was born rich.  At least he doesn't take himself too seriously.\n\t*if (background = \"comfortable\") or (background = \"aristo\")\n\t\tFear shared is halved.  Or something like that.  Anyway, you feel better having Vega here.\n\t\n\t*page_break\n\t\n\tHe draws his knife, kneels, and carves a curving sigil into the concrete.  The knife's fiery blade leaves spark trails where it cuts.  \"I'll ward the area.  Nobody will get in or out without our noticing.  You sent the letter; the client will expect you.  If you need me, just shout.\"\n\t\n\tIt's nice that someone has your back.  But still, you have to go in alone.\n*comment end_if\n\n*page_break\n\nThe front door is chained, so you vault through a nearby window that seems free of broken glass.  Emphasis on seems, as you end up with a long thin cut on your palm that oozes blood.\n\nWhich brings us up to the present.  Sunlight through broken windows does not render the warehouse welcoming.  Low ceilings, floors cluttered with refuse and rot, graffiti-stained brick pillars, walls marked with urine, rat droppings everywhere.  Hell of a place to live.\n\nClearly you'll have to search for your client.  \n*label How_To_Enter\nHow do you try to find him?\n\n*fake_choice\n\t#I want to try the direct approach.  No sense in sneaking around.\n\t\tYour client is almost certainly on edge.  Best to take a straightforward approach.  \"Hello!\" you say, over and over, as you circle through the first floor.  \"I'm looking for R'ok.\"  You're not sure you're pronouncing his name right.  Demon names can't really be written down, not in Kathic letters anyway.  \"R'ok, this is ${name} ${surname}, from Varkath Nebuchadnezzar.  Did you get my letter?\"\n\t\t\n\t\tYou don't find him on the first floor, but you do find stairs to the second—concrete stairs, fortunately.  You wouldn't trust wood in this place.  You climb, footsteps heavy.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe stairs lead to a narrow, dark second floor—fewer windows here.  But there is a makeshift camp in the shadows at the rear of the room: a torn mattress, a few books, a pile of threadbare pink blankets.\n\t\t\n\t\t\"R'ok?\"\n\t\t\n\t\tNo answer.\n\t\t\n\t\t*if power > 60\n\t\t\t\"I'm the ${craftsperson} from Varkath Nebuchadnezzar.  I'm here to help.\"\n\t\t\t\n\t\t\tYou hear a loud skittering from the corner.\n\t\t\t*set power %+10\n\t\t\t*goto Second_Floor_Succeed\n\t\t*else\n\t\t\tThe word echoes in the empty room.  Vast space opens around you.  You wonder if you should say something else, and you open your mouth—but before you can speak, something large and heavy and sharp strikes you in the side.\n\t\t\t*goto Second_Floor_Fail\n\t#I'd rather approach cautiously.  The client might be on edge.  And I don't know who else is in there!\n\t\tBetter to proceed with care.  Fortunately you're wearing sensible shoes; your footsteps fall soft on floorboards as you circle through the first floor.  Nothing.  Graffiti and trash, that's all.\n\t\t\n\t\tIn one corner of the building you find a set of concrete stairs.  You climb, footsteps light.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe stairs lead to a narrow, dark second floor—fewer windows here.  But there is a makeshift camp in the shadows at the rear of the room: a torn mattress, a few books, a pile of threadbare pink blankets.  You slide through the shadows, approaching softly.\n\t\t\n\t\tSomething moves in the corner.  Something big, and sharp.  You don't think it's seen you, yet.\n\t\t*page_break\n\t\t*if cunning > 60\t\t\n\t\t\tIf this is your client, you won't encourage him by sneaking.  You step louder. \n\t\t\t\n\t\t\t\"R'ok?\"  You're not sure you're pronouncing his name right.  Demon names can't really be written down, not in Kathic letters anyway.\n\t\t\t\n\t\t\t\"Yes,\" says a voice like crystal crushed.  The large, jagged shape emerges, slowly, from the shadows. \n\t\t\t*set cunning %+10\n\t\t\t*goto Second_Floor_Succeed\n\t\t*if cunning \u003c= 60\n\t\t\tYou err on the side of caution, approaching softly, softly, pressed against the wall on the bet that whatever it is, is watching the center of the room.  You slide behind a pile of debris, and in the shadow you see a four-legged, two-armed chitinous mantis-shape, facing away from you.\n\t\t\t\n\t\t\t\"R'ok?\"  You're not sure you're pronouncing his name right.  Demon names can't really be written down, not in Kathic letters anyway.\n\t\t\t\n\t\t\tAnd then it moves.\n\t\t\t\n\t\t\tPerhaps, you think just before it slams into you at high speed, sneaking up on a demon wasn't such a smart idea after all.\n\t\t\t*goto Second_Floor_Fail\n\t*hide_reuse #I use the Craft to find the client.\n\t\t*set craft %+10\n\t\t*if ((Soul > 500) and (craft > 50))\n\t\t\tYou close your eyes and see the world from a different point of view.\n\t\t\t\n\t\t\tNot all reality is visible.  Much isn't, in fact.  Bargains.  Contracts.  Souls, and the fine lines that bind them together.  Seen with eyes of Craft, your office building is a auroral cascade of power and obligation.  The warehouse is dark by comparison. Nothing's here.\n\t\t\t\n\t\t\tNothing, that is, except your client.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou follow the silver cord of his contract up the stairs to a narrow room, and you see him clearly, or the Craftwork shadow of him, crouching against the wall.\n\t\t\t\n\t\t\tYou open your eyes.  Grime and decay replace the clean edges of the Craft, and light washes out its darkness.\n\t\t\t\n\t\t\t\"R'ok,\" you say.  \"I'm ${name}, from Varkath Nebuchadnezzar.  I'm your ${craftsperson}.  I'm here to help.\"\n\t\t\t\n\t\t\tHe hesitates first, as who wouldn't, but then, at last, emerges from the shadows.  And you catch your breath.\n\t\t\t\n\t\t\t*goto Second_Floor_Succeed\n\t\t*else\n\t\t\tYou close your eyes and try to search for him with the Craft, but you're so low on soulstuff that it's hard to see straight.  Too much Craftwork recently, and not enough time spend on meditation, on savings.  You'll have to try this the old-fashioned way. \n\t\t\t*goto How_To_Enter\n\n*label Second_Floor_Fail\n*page_break\nBefore you can react, strong, sharp limbs grab you, lift, and throw.  You tumble through the air for a long horrified instant in which you seem to have enough time to regret every bad decision you've ever made.\n\nThen you hit the floor, hard.\n\nR'ok—it must be—lunges toward you, mandibles clashing.  In the yellowed glint of morning light through dirty glass, you see him: a five-foot-five mantis of gleaming jet, with long four-fingered scythelike preying hands.  Red eyes glimmer.\n\nThat's your client, all right, and he's leaping forward, claws outstretched.\n\n*choice\n\t#I fight back.\n\t\t*set power %+10\n\t\t*if power > 70\n\t\t\tOne claw scythes down to skewer you, but you're no longer where you were; instead, you spring toward R'ok, which you're pretty sure he wasn't expecting.  Hells, you were barely expecting it.\n\t\t\t\n\t\t\tAnd he certainly didn't expect you to ball up your fist and hit him under whatever mantises have in place of a chin.\n\t\t\t\n\t\t\tHe staggers back, stunned, and before he can recover you fix him with a fiery glare.  \"Do [i]not[/i] try to hit your ${craftsperson}.\"\n\t\t\t\n\t\t\tHe freezes.  \"What?\"\n\t\t\t\n\t\t\t\"I'm here to help you,\" you say.  \"Now, can you…\"  He isn't, you realize, holding any weapon that he might be able to put down.  \"Can we just talk about this like normal people?  In my office, maybe?\"\n\t\t\t*goto Conference\n\t\t*elseif (friend)\n\t\t\tOne claw scythes down to skewer you, but you're no longer where you were; instead, you spring toward R'ok, which you're pretty sure he wasn't expecting.  Hells, you were barely expecting it.\n\t\t\t\n\t\t\tAnd he certainly didn't expect you to ball up your fist and hit him under whatever mantises have in place of a chin.\n\n\t\t\tHe recovers almost instantly and head-butts you.  You stagger back, cursing, before he's on you again.  His girth blocks out the sunlight.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tBut then heat washes over you and you hear ${helper_name}'s voice.  \"Stop!  We're here to help you!\"\n\t\t\t\n\t\t\tMercy of mercies, R'ok stops.  \"What?\"\n\t\t\t\n\t\t\t${helper_name} doesn't waste time.  \"Come on.  We need to talk.  In our office.\"\n\t\t\t*set wounds +1\n\t\t\t*goto Conference\n\t\t*else\n\t\t\tOne claw scythes down to skewer you, but you're no longer where you were; instead, you spring toward R'ok, which you're pretty sure he wasn't expecting.  Hells, you were barely expecting it.\n\t\t\t\n\t\t\tAnd he certainly didn't expect you to ball up your fist and hit him under whatever mantises have in place of a chin.\n\n\t\t\tHe recovers almost instantly and head-butts you.  You stagger back, cursing, before he's on you again.  His girth blocks out the sunlight.\n\n\t\t\t*page_break\n\t\t\t\n\t\t\tHe presses down and your ribs creak.  That one there on your left side does something considerably more painful than creak.\n\n\t\t\t\"Help!\" you shout.  Certainly should have brought some.  \"I'm here to help you!\"\n\t\t\t\n\t\t\tThe pressure doesn't go away, but at least it doesn't increase either.  \"What do you mean?\"\n\t\t\t\n\t\t\t\"I'm from Varkath Nebuchadnezzar.  I'm your ${craftsperson}.  Let me up, and we'll talk.  In my office.\"\n\t\t\t\n\t\t\tYou hold your breath, not that there's much breath to hold.  But he does withdraw.\n\t\t\t*set wounds +2\n\t\t\t*goto Conference\n\t#I can't outfight him.  Time to dodge, get evasive.\n\t\t*set cunning %+10\n\t\t*if cunning > 70\n\t\t\tOne claw scythes down to skewer you, but you're no longer where you were; you dodge back out of reach.\n\t\t\t\n\t\t\tBefore he can recover and attack again, you fix him with your fieriest glare.  \"Do [i]not[/i] try to hit your ${craftsperson}.\"\n\t\t\t\n\t\t\tHe freezes.  \"What?\"\n\t\t\t\n\t\t\t\"I'm here to help you,\" you say.  \"Now, can you…\"  He isn't, you realize, holding any weapon that he might be able to put down.  \"Can we just talk about this like normal people?  In my office, maybe?\"\n\t\t\t*goto Conference\n\t\t*elseif (friend)\n\t\t\tOne claw scythes down to skewer you, but you're no longer where you were; you dodge back out of reach, clearing distance between you.\n\n\t\t\tNot quite enough distance, though.  He can jump further than you expected.  You topple back, cursing, under his abdomen.  His girth blocks out the sunlight.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tBut then heat washes over you and you hear ${helper_name}'s voice.  \"Stop!  We're here to help you!\"\n\t\t\t\n\t\t\tMercy of mercies, R'ok stops.  \"What?\"\n\t\t\t\n\t\t\t${helper_name} doesn't waste time.  \"Come on.  We need to talk.  In our office.\"\n\t\t\t*set wounds +1\n\t\t\t*goto Conference\n\t\t*else\n\t\t\tOne claw scythes down to skewer you, but you're no longer where you were; you dodge back out of reach.\n\n\t\t\tNot quite far enough, though.  He can jump further than you expected.  You topple back, cursing, under his abdomen.  His girth blocks out the sunlight.\n\n\t\t\t*page_break\n\t\t\t\n\t\t\tHe presses down and your ribs creak.  That one there on your left side does something considerably worse than creak.\n\n\t\t\t\"Help!\" you shout.  Certainly should have brought some.  \"I'm here to help you!\"\n\t\t\t\n\t\t\tThe pressure doesn't go away, but at least it doesn't increase either.  \"Who are you?\"\n\t\t\t\n\t\t\t\"I'm from Varkath Nebuchadnezzar.  I'm your ${craftsperson}.  Let me up, and we'll talk.  In my office.\"\n\t\t\t\n\t\t\tYou hold your breath, not that there's much breath to hold.  But he does withdraw.\n\t\t\t*set wounds +2\n\t\t\t*goto Conference\n\t#I just need to get through to him somehow!\n\t\t*set charm %+10\n\t\t*if (charm > 75)\n\t\t\tYou raise your hands, stand smoothly, and say in your most non-threatening tone of voice: \"I am not here to hurt you.  I'm a ${craftsperson} from Varkath Nebuchadnezzar.  You asked us for help.  That's why I'm here.\"\n\t\t\t\n\t\t\tHe freezes.  \"What?\"\n\t\t\t\n\t\t\t\"I'm here to help you,\" you say.  \"Now, can you…\"  He isn't, you realize, holding any weapon that he might be able to put down.  \"Can we just talk about this like normal people?  In my office, maybe?\"\n\t\t\t*goto Conference\n\t\t*elseif (friend)\n\t\t\tYou raise your hands, stand smoothly, and say in your most non-threatening tone of voice: \"I am not here to hurt you.  I'm a—\"\n\t\t\t\n\t\t\tHe doesn't let you finish.  He lunges; you stumble back, and fall.  Before you can rise again he's on top of you, pressing you down into the floor.  His girth blocks out the sunlight.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tBut then heat washes over you and you hear ${helper_name}'s voice.  \"Stop!  We're here to help you!\"\n\t\t\t\n\t\t\tMercy of mercies, R'ok stops.  \"What?\"\n\t\t\t\n\t\t\t${helper_name} doesn't waste time.  \"Come on.  We need to talk.  In our office.\"\n\t\t\t*set wounds +1\n\t\t\t*goto Conference\n\t\t*else\n\t\t\tYou raise your hands, stand smoothly, and say in your most non-threatening tone of voice: \"I am not here to hurt you.  I'm a—\"\n\t\t\t\n\t\t\tHe doesn't let you finish.  He lunges; you stumble back, and fall.  Before you can rise again he's on top of you, pressing you down into the floor.  His girth blocks out the sunlight.\n\n\t\t\t*page_break\n\t\t\t\n\t\t\tHe presses down and your ribs creak.  That one there on your left side does something considerably more painful than creak.\n\n\t\t\t\"Help!\" you shout.  Certainly should have brought some.  \"I'm here to help you!\"\n\t\t\t\n\t\t\tThe pressure doesn't go away, but at least it doesn't increase either.  \"Who are you?\"\n\t\t\t\n\t\t\t\"I'm from Varkath Nebuchadnezzar.  I'm your ${craftsperson}.  Let me up, and we'll talk.  In my office.\"\n\t\t\t\n\t\t\tYou hold your breath, not that there's much breath to hold.  But he does withdraw.\n\t\t\t*set wounds +2\n\t\t\t*goto Conference\n\t*selectable_if (soul > 200) #I stop him with the Craft.\n\t\t*set craft %+10\n\t\t*if craft > 55\n\t\t\tHe lunges again; you hold out your hand and close your eyes.\n\t\t\t\n\t\t\tYou can see the thorn-tree tangle of his soul, and the silver cord of the contract that binds him to this plane.  Demons are tricky to hold directly, but that contract should give plenty of leverage.  A few words, and you can fix the distance between you, make it an absolute property of your relationship.\n\t\t\t\n\t\t\tNo time for sigils or contracts or glyphs.  This is raw manipulation of soulstuff.\n\t\t\t\n\t\t\tYou speak the words.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou hear a sound very much like the impact of a wren on a patio door, and open your eyes.  R'ok hangs arrested in midair.  The sunlight fades, and the Craftwork glyphs printed on your skin burn with cold light.\n\t\t\t\n\t\t\t\"Never,\" you say, your voice heavy with the powers you control, \"try to kill your ${craftsperson}.  We don't like it.\"\n\t\t\t\n\t\t\tR'ok's ruby eyes widen.  \"My what?\"\n\t\t\t\n\t\t\t\"I'm here to help you,\" you say.  \"Now.  Let's go to my office, and talk this over like normal people.\"\n\t\t\t*if craft > 70\t\t\n\t\t\t\t*set soul -100\n\t\t\t*if craft \u003c=70\n\t\t\t\t*set soul -200\n\t\t\t*goto Conference\n\t\t*elseif (friend)\n\t\t\tHe lunges again; you hold out your hand and close your eyes.\n\t\t\t\n\t\t\tYou can see the thorn-tree tangle of his soul, and the silver cord of the contract that binds him to this plane.  A few words, and you can fix the distance between you, make it an absolute property of your relationship.\n\t\t\t\n\t\t\tNo time for sigils or contracts or glyphs.  This is raw manipulation of soulstuff.\n\t\t\t\n\t\t\tYou speak the words.\n\t\t\t*page_break\n\t\t\t\n\t\t\tThe binding sparks to life, only to shred on R'ok's spines and sharp chitin.  He strikes you in the chest.  You fall, cursing, beneath his weight.  Your eyes snap open.  His girth blocks out the light.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\n\t\t\tBut then heat washes over you and you hear ${helper_name}'s voice.  \"Stop!  We're here to help you!\"\n\t\t\t\n\t\t\tMercy of mercies, R'ok stops.  \"What?\"\n\t\t\t\n\t\t\t${helper_name} doesn't waste time.  \"Come on.  We need to talk.  In our office.\"\n\t\t\t*set wounds +1\n\t\t\t*goto Conference\n\t\t*else\n\t\t\tHe lunges again; you hold out your hand and close your eyes.\n\t\t\t\n\t\t\tYou can see the thorn-tree tangle of his soul, and the silver cord of the contract that binds him to this plane.  A few words, and you can fix the distance between you, make it an absolute property of your relationship.\n\t\t\t\n\t\t\tNo time for sigils or contracts or glyphs.  This is raw manipulation of soulstuff.\n\t\t\t\n\t\t\tYou speak the words.\n\t\t\t*page_break\n\t\t\t\n\t\t\tThe binding sparks to life, only to shred on R'ok's spines and sharp chitin.  He strikes you in the chest.  You fall, cursing, beneath his weight.  Your eyes snap open.  His girth blocks out the light.\n\t\t\t\n\t\t\tHe presses down and your ribs creak.  That one there on your left side does something considerably more painful than creak.\n\n\t\t\t\"Help!\" you shout.  Certainly should have brought some.  \"I'm here to help you!\"\n\t\t\t\n\t\t\tThe pressure doesn't go away, but at least it doesn't increase either.  \"Who are you?\"\n\t\t\t\n\t\t\t\"I'm from Varkath Nebuchadnezzar.  I'm your ${craftsperson}.  Let me up, and we'll talk.  In my office.\"\n\t\t\t\n\t\t\tYou hold your breath, not that there's much breath to hold.  But he does withdraw.\n\t\t\t*set wounds +2\n\t\t\t*goto Conference\n\n*label Second_Floor_Succeed\n*page_break\nNothing so large, so dangerous, should move so…delicately.\n\nHe skitters forward, and in the yellowed glint of morning light through dirty glass, you see him: a five-foot-five mantis of gleaming jet, with long four-fingered scythelike preying hands.  Gleaming red eyes.\n\nHis head bobs down.  Slightly.  Was that supposed to be a bow?\n\nJust another client, you tell yourself.  And then tell yourself again.\n\n*choice\n\t#\"I'm on your side.  Let's see if we can help you.\"\n\t\t*set charm %+10\n\t\tHe nods again.  If he can't speak Kathic, this is going to be a very strange case.  You know a few words of Demoniac, but the demon tongue has as many dialects as Minghua, maybe more.  The firm must have a translator, somewhere.\n\t\t\n\t\tBut then he says, \"Thank you.\"  And his voice is beautiful.\n\t\t*goto Conference\n\t#\"I'm your ${craftsperson}.  Come with me, and let's talk.\"\n\t\t*set power %+10\n\t\tHe nods again.  If he can't speak Kathic, this is going to be a very strange case.  You know a few words of Demoniac, but the demon tongue has as many dialects as Minghua, maybe more.  The firm must have a translator, somewhere.\n\t\t\n\t\tBut then he says, \"Thank you.\"  And his voice is beautiful.\n\n\t\t*goto Conference\n\t#\"The longer we stay here, the greater the risk someone who really doesn't like you will find us.\"\n\t\t*set cunning %+10\n\t\tHe nods again.  If he can't speak Kathic, this is going to be a very strange case.  You know a few words of Demoniac, but the demon tongue has as many dialects as Minghua, maybe more.  The firm must have a translator, somewhere.\n\t\t\n\t\tBut then he says, \"Thank you.\"  And his voice is beautiful.\n\t\t*goto Conference\n\t\t\n*label Conference\n*page_break\n*if (friend)\n\tYou bring R'ok back to the office, and sit him across the conference table.  ${helper_name} gets coffee for you all.  R'ok doesn't drink his coffee, but he holds the mug under his mandibles and wiggles scalpel mouthparts in the steam.  \"Thank you,\" he says, \"so much, for your help.\"\n\t\n\t\"We haven't helped you yet,\" ${helper_name} says.\n*if friend = false\n\tYou bring R'ok into the office, sit him across the conference table, and get him a mug of coffee.  R'ok doesn't drink the coffee, but he holds the mug under his mandibles and wiggles scalpel mouthparts in the steam.  \"Thank you,\" he says, \"so much, for your help.\"\n\t\n\t\"I haven't helped you yet.\"\n\t\n\t\"You have helped already, by coming for me.\"\n*comment endif\n\n\"Why don't you tell your story,\" you say.  \"Then I can think about what to do.\"\n\nR'ok sighs.\n\n*page_break\n\n\"I am,\" he says, \"an anomaly among my clutch.  I have no interest in the family—\" the next word is in his native tongue, and you don't catch it; it sounds like a raccoon being thrown through a plate glass window.  You don't flinch.  Much.  \"The hierarchy.  The meetings.  The assured future.  The eternal vendettas.  I wished to travel.  I wished to see other worlds.  I wished to create art using the materials of your plane.  To build sculptures which decay, to use your phase-transition physics and your odd indices of refraction and your mad geometries to create visions unimaginable in my world.\"\n\nYou nod, because he seems to expect you to.\n\n\"Ordinarily, one of my kind wishing entry to your realm must have a permit of some sort.  I was unfairly denied mine.  This meant I had to seek…non-traditional summoning.  Drakovic Partners offered a deal, and I accepted.  But their contract is harsh.\"\n\n*fake_choice\n\t#\"So, the underground summoner you hired turned out to be a bad guy.  Big surprise.\"\n\t\t\"This may seem amusing to you,\" R'ok growls.  \"You feel all big and good about yourself and your choices.  But this is my life, and I'm dealing with it.\"\n\t\t\n\t\tYou're not used to talking with demons who know this much Kathic.  Most don't go far beyond body language.\n\t#\"How so?\"\n\t#\"What did you expect?\"\n\t\t\"Nothing this bad,\" he says.  \"I thought they were as desperate for contacts in the demon realm as I was to come out here.  Not everyone can afford to work through the embassy.\"\n\t\t\n\t\t\"So what did they have you do?\"\n\t#\"I need more details.\"\n*comment endif\n\nR'ok bows his head.  \"We signed a contract which allows me relative freedom, and does not have a pre-set duration.  I am not bound inside a golem, not commanded to do math for all eternity.  But when my employers order, I must obey.  They subcontract my labor to the dockyards—I can work tirelessly, and lift far more than any human.  I am a cheap machine to them.\"  He clacks his mandibles together.  Laughter?  \"I know it was a stupid decision.  I came to learn, to travel, to explore, and for a year and a half I carried boxes.\"\n\n\"Then break the contract.\"\n\n\"The contract's provisions forbid me from breaking it.  I could only run because my supervisor, the one to whom my leash was given, he fell.  An accident.  And with no one around to command me, I fled.  I have disobeyed, and even now the deal burns inside me.  Worse, worse, all the time worse.\"\n\nYou nod.  \"Now, that I should be able to help you with.  Either side can break a contract—I could do it from here.  We can have you home in a few minutes.\"\n\n*page_break\n\n\"But,\" R'ok says, \"I do not want to go home.  I want to stay here.  Freely.  Or at least in a more permissive contract.\"\n\n*if (wounds = 0)\n\tYou press one knuckle into the middle of your forehead, focusing on the pain.  It helps you think.\n*if (wounds > 0)\n\tYou focus on the pain in your side.  It helps you think.\n\t\n\"I need to think this through,\" you say.  \"You can stay here for now, R'ok.  I'll figure out what's next.\"\n*if (friend = false)\n\tHe watches you retreat into the hall.\n*if (friend)\n\tHe watches as you and ${helper_name} retreat into the hall. \n*comment endif\n\n*page_break\n*label In_the_Hall\n\nWhat now?  You can pace here, freely, and fiercely, pondering your next steps.  They don't look good, but maybe that's your exhaustion talking.\n\n*if (wounds > 0)\n\tOr the pain in your side.\n*comment endif\n\n*if (friend)\n\t${helper_name} watches, silent, as you pace.  This is your case.  The direction has to come from you.\n*comment endif\n\nR'ok needs the Drakovic contract changed, not broken.  But no black-market demon summoner is going to change a deal just because you ask.  Besides, even if you can renegotiate the  contract, you'll still need to get R'ok a visa in order to let him stay.  Best if you can pre-date it to before his summoning.  If they wouldn't give him one before, though, why would they now?\n\n*label Case_Choice\n*if ((Time = 2))\n\t*goto Klint_Shows_Up\n\nSo—what's next?\n\n*choice\n\t*hide_reuse *if (friend) #Get advice from ${helper_name}.\n\t\t*goto Get_Advice\n\t*hide_reuse #Time to visit the demonic embassy.\n\t\t*goto Embassy\n\t*hide_reuse #Let's renegotiate the employment contract.\n\t\t*goto Contract\n\t*hide_reuse #There's more going on here than R'ok's telling me.  I need to ask some more questions.\n\t\t*goto Rok_Questions\n\t\n*label Rok_Questions\n\nYou return to the interview room, close the door, sit down, clasp your fingers, and fix R'ok with a level stare.\n\n\"I have more questions.\"\n\nHe drums long knifelike fingers against the conference table, leaving deep grooves that gash through the black veneer into the soft white wood beneath.  His maxillae tremble.  This is probably what demons look like when they're nervous.\n\nYou think.\n\n*if (background = \"beggar\")\n\tWhat's a dockside kid like you doing messing around with demons and Craftsmen anyway?\n\t\n\tThen again, you knew this job would be weird when you signed on.\n\n*label Rok_Questions_2\n*choice\n\t*hide_reuse #\"Why did you sign the agreement?\"\n\t\t\"I mean, you speak good Kathic, which means you're educated.  And you're clearly intelligent.  Why take such a bad deal?\"\n\t\t\n\t\t\"No deal's bad if it's the only one in town,\" R'ok says.\n\t\t\n\t\t\"You're just saying that because you don't have a lot of experience with deals.\"\n\t\t\n\t\tHe hisses.  \"How am I supposed to get that experience if I stay at home?  Behind walls?\"\n\t\t\n\t\tYou don't know much about the torture layer cake of demon society, but you're getting a sense that R'ok's from the uppermost icing.\n\t\t\n\t\t*if (background = \"beggar\") or (background = \"poor\")\n\t\t\tPoor little rich kid.  Still, no one deserves to be taken advantage of like this.\n\t\t*if (background = \"comfortable\")\n\t\t\tPoor guy.  Or, poor enormous crystalline mantis-thing, at least.  He didn't know what he was getting himself into.\n\t\t*if (background = \"aristo\")\n\t\t\tSounds familiar.\n\t\t*goto Rok_Questions_2\t\n\t*hide_reuse #\"Why didn't the demons give you a visa?\"\n\t\t\"My…family, you would call it,\" R'ok says.  \"Most of the demons you encounter have undergone rigorous training and selection.  If one's family does not wish one to leave, said family can interfere with relative ease.\"\n\t\t\n\t\t\"You don't have to talk like that just because I'm a ${craftsperson}, you know.\"\n\t\t\n\t\tHe blinks his scintillating red eyes.  \"Like what?\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Okay,\" you reply.  \"Why didn't your family want you to leave?\"\n\t\t\n\t\t\"I must be educated in proper objectives.  I believe their idea of proper objectives to be antagonistic to the continued existence of both our worlds.\"  He stops, and twitches.  The fires in his eyes dim.  His jet carapace dulls and clouds.  He shivers.  You wonder how one performs first aid on a demon.\n\t\t\n\t\tAfter a minute, he recovers.  \"I am sorry.  The pain of the contract comes in waves.  And it grows.  If you have more questions, ask them quickly.  When I suffer, so does my self-control.\"\n\t\t\n\t\tYou are very glad the conference room walls are reinforced. \n\t\t*goto Rok_Questions_2\n\t*hide_reuse #\"What do you want out of this?  What's your idea of a good outcome?\"\n\t\t\"Anything,\" he says, \"that lets me stay here as something other than a slave.  I don't want to return home.  I don't want to live at the mercy of another.\"\n\t\t\n\t\t\"That's a tall order.\"\n\t\t\n\t\t\"You asked what I want.  My desires need not be practical.\"\n\t\t*goto Rok_Questions_2\n\t*hide_reuse #\"Why did you come to us?\"\n\t\t\"Come to us?  You came to me.\"\n\t\t\n\t\tYou blink.  \"Wait.  What?\"\n\t\t\n\t\t\"I received your letter as an offer of aid.  This is the first I learned of your mission.\"\n\t\t\n\t\t\"Then how did your case get on our [i]pro bono[/i] board?\"\n\t\t\n\t\t\"I do not know,\" R'ok says.  \"I have never worked with your firm before.  Though I do appreciate your help.  Without you, I had no plan other than to remain in hiding until the pain became too great.\"\n\t\t*set know_about_posting true\n\t\t*goto Rok_Questions_2\n\t#\"That's all I need, thanks.\"\n\t\t\"Thank you.  I do not know what I would have done without the aid you offer.\"\n\t\t\n\t\tWell, however thankless this job might be in general, at least you have the gratitude of a demon.\n\t\t*page_break\n\t\t*goto Case_Choice\n\n*label Get_Advice\n\nYou bring ${helper_name} into an empty conference room, close the door, and sit on the table.  \"Do you have any thoughts?\"\n\n*if (Cass_Help)\n\t\"Of course,\" Cass says.  \"We need to help him.  That summoning Concern is abusing the limits of the Craft.  What they're doing is wrong, and riskier than wrong.  If they mess up, they could release someone—something—in the middle of the city, with no safeguards, no controls.\"\n\t\n\t\"We will help him.  That's why we're here.  I was hoping you could give me some more…practical advice.\"\n\t*page_break\n\t\n\tShe shrugs.  \"Sounds like the summoners' contract relies on our guy—[i]is[/i] he a guy?  I'm never sure what to call those things.\"\n\t\n\t\"I think he's a guy.  Ish.\"\n\t\n\t\"Sounds like the summoners' position depends on him having no other options.  So if you go to the demons first, get that visa, you should be able to argue the summoners into a better spot.  Like you said—breaking the contract's easy.  Doing it in a way that lets him stay here, that's hard.\"\n\t\n\t\"Well, at least that's a start.\"\n\t\n\t\"You don't need to sound so disappointed.\"\n\t\n\tYou nod absently, and head out.\n*if (Pat_Help)\n\tPat pyramids his fingers in front of his chest, and stares at the pyramid's peak.  \"Have you ever seen demons uncontrolled?\"\n\t\n\tYou're about to make a joke, but his voice stops you.  \"I didn't think that happened.\"\n\t\n\t\"I have seen it happen.  I do not wish a repeat viewing.\"\n\t\n\tYou wait, but he does not elaborate.  \"Do you think that's a risk, here?\"\n\t\n\t\"With demons the risk is always present.  When disreputable summoners insert themselves, the risk grows.\"\n\t*page_break\n\t\n\t\"So, what do we do?\"\n\t\n\t\"These people are already dealing in a dangerous business.  Threats will not get you far with them.  You will have to rely on superior argumentation.\"\n\t\n\t\"I can be threatening when I want to.\"\n\t\n\t\"I have no doubt.  But to intimidate these people, you would have to make so great a threat that you would be unwilling to follow through with it—and they will know this.\"\n\t\n\t\"Okay.  Thanks for the tip.\"\n\t\n\tHe nods.  \"Also.  If I were you, I would ask one of our partners to refer you to the embassy.  Demons respect hierarchy and precedent.  Alone, you will be seen as an upstart.  With a letter of introduction, you should be seen as an emissary.\"\n\t\n\t\"Should?\"\n\t\n\tPat laughs.  \"Well.  There are no guarantees in this life, especially where demons are concerned.\"\n*if (Vega_Help)\n\t\"R'ok is in big trouble,\" Vega says.  He starts pacing.\n\t\n\t\"I had that much figured out already.\"\n\t\n\t\"Bigger trouble than you think, I mean.  Demons have a strict hierarchy.  I'm impressed he had the willpower to leave unopposed.\"\n\t\n\t\"Which doesn't help us actually help him.  Any ideas on that front?\"\n\t\n\t*page_break\n\t\n\t\"Not much, except: don't go to the demons directly, if you can help it.  If you're close enough to one of the partners, see if they can arrange an introduction.  Their embassy should respect our hierarchies as much as their own.\"\n\t\n\t\"Should?\"\n\t\n\tHe shrugs.  \"Nothing's perfect.\"\n\n*goto Case_Choice\n\n*label Contract\n*set Time +1\n\nDrakovic Partners doesn't try to hide.  You find their address in a public directory, though when you arrive—a converted factory in what used to be the city's garment district before Shikaw's textiles industry gave way to tougher southern competition—you almost wish you hadn't.  Depressing is a poor name for a place like this.  Soul-sucking.  A dingy gray sign bolted to dingy red bricks next to a thick black door that might as well have \"Keep Out\" stenciled across.\n\n*page_break\n\nThe inside of the building is not much better.  Once you pass the welcome desk—unmanned and outfitted by the same cut-rate office furniture Concern every sleazy business in Shikaw uses—you enter a dim room lit only by the sun through tall smoked windows.  No ventilation, no artificial light, no air conditioning: just the smell of chalk and brick and solvent and blood.\n\nThe walls are lined with demons.\n\nYou count twelve, one on each wall, their eyes dark—sleeping, naturally or otherwise.  In the center of the floor stand six robed figures, facing the middle of an acid-etched summoning circle.   In the circle's center, a seventh robed figure holds a goat, its legs bound tightly together.  A knife flashes from the robed figure's sleeve, and the goat screams.\n\nBriefly.\n\n*page_break\n\n\"Excuse me,\" you say.  The woman in the circle looks up, shocked—you can see she's a woman, now, under the hood.  Blood pools at her feet.  One of her eyes is blue, the other black, and not in the recently-punched sort of way.\n\n\"Who the hells are you?\"  Her accent's Zurish, blunt vowels, dental fricatives converging to z's.  \"This is a place of business.\"\n\n\"Sure,\" you say.  \"And I'm a ${craftsperson}.  You can call me ${char_voc} ${surname}.  I represent one of your clients, a Mister R'ok'lint.\"  She tightens all over at the mention of his name, which is a good sign for you.  \"Do you want to do this here?  Or do you have a more private place where we can talk?\"\n\nShe glances over her shoulder at the steam rising from the goat's blood.  \"Goats are cheap.  Let's go to my office.\"\n\n*page_break\n\nNot much of an office, you discover.  A cheap desk, a safe, and that's all.  Then again, this outfit doesn't seem to be heavy on bookkeeping.\n\nDrakovic shucks off her robe, and hangs it from a coat rack.  Beneath, she wears loose sweats and a tank top.  She does not seem even remotely amused.\n\n\"What is this about?\"\n\n*comment if we've been to the embassy and have the adjusted visa, this is an easier argument.\n*if (visa)\n\t*set contract_diff -10\n\n*choice\n\t#Time to lay on the charm.\n\t\t*set charm %+10\n\t\t\"Look,\" you say.  \"I'm not here to try to throw my weight around.\"\n\t\t\n\t\t\"Good thing,\" she says, with an estimating look at your arms.  As if physical strength mattered in an affair like this.  Admittedly, you haven't been hitting the gym as much as you should, and desk jobs don't pack on muscle, but that hardly matters.\n\t\t\n\t\tDrakovic definitely hits the gym, though.  Hard.\n\t\t\n\t\t\"My client got in over his head.\"\n\t\t\n\t\t\"That's our stock in trade,\" Drakovic says.  \"Think of us as a summoner of last resort.\"\n\t\t\n\t\tYou're not even sure you want to know what that means.\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"But I would really appreciate it if you were to renegotiate his contract.\"\n\t\t\n\t\t\"That's what you bring to the table?  Appreciation?\"\n\t\t\n\t\t\"Appreciation,\" you say, \"can mean a lot.  Especially for someone who walks as close to the edge as you do.  I'd much rather we come to a deal, here.\"\n\t\t\n\t\tYou don't say what the alternative to a deal might be.  That's as much of a threat as you feel comfortable giving this woman.  Let her concoct her own worst-case scenario.  She's probably better at it than you.\n\t\t*page_break\n\t\t*if ((charm - (sleep_difficulty)) > (contract_diff - 20))\n\t\t\t*goto Contract_Succeed\n\t\t*else\n\t\t\t*goto Contract_Fail\n\t#I'll try to browbeat her.\n\t\t*set power %+10\n\t\t\"You're in a dangerous position,\" you say.  \"Operating on the edge.  All you have to do is slip up once, and a free demon takes out this entire shop.  That's if you manage not to get yourself killed before then.  Or taken out by the watch, who, as I understand, take a dim view of illicit summoning operations.\"\n\t\t\n\t\tShe cocks her head to one side.  \"That's your opening?  Threats?\"\n\t\t\n\t\t\"I'm not threatening you.  I just want you to understand your position.  And mine.\"\n\t\t*if ((power - (sleep_difficulty)) > (contract_diff + 5))\n\t\t\t*goto Contract_Succeed\n\t\t*else\n\t\t\t\"I understand my position perfectly.  I know the watch.  I know my clients.  And you don't know either.\"\n\t\t\t*goto Contract_Fail\t\n\t#I'll threaten to break her hold on the demons in the warehouse.\n\t\t*set craft %+10\n\t\t\"That,\" you say, \"is an impressive assortment of demons you have down there.  All of them, I think, bound by contracts like the ones that bind my client.\"  You pace gently back and forth, fingers steepled like Pat holds his when thinking.  You always find that creepy, and you hope the effect carries.  You wake your Craft glyphs—don't do anything with them, yet, but they glow a soft silver beneath your skin, gathering light through the window.\n\t\t\n\t\t\"What are you saying?\"  Drakovic sounds, maybe, you hope, just a little nervous.\n\n\t\t\"I'm saying that the contracts you gave them don't have an end date.  Which means you're asking for something of infinite value—demons don't die of old age, after all.  And you're offering finite value in return.  The contract's unstable.  I could break it right now, if I wanted.\"\n\t\t  \n\t\t*if ((craft - (sleep_difficulty)) > (contract_diff-5))\n\t\t\t*goto Contract_Succeed\n\t\t*else\n\t\t\t\"And risk letting all these demons loose?\"  Drakovic shakes her head.  \"I don't think you have it in you.\"\n\t\t\t*goto Contract_Fail\n\t#Point out a weakness in her contracts.\n\t\t*set cunning %+10\n\t\t\"I've noticed something interesting about R'ok's contract.\"\n\t\t\n\t\tShe cocks her head to one side, letting you continue—or giving you enough rope to hang yourself.\n\t\t\n\t\t\"It doesn't have a determined end date.  Which means you're asking for something of infinite value—demons don't die of old age.  You're offering finite value in return.  The contract's weak.  I could break it right now—no need for a Court hearing.\"\n\n\t\t*if (cunning - (sleep_difficulty)) > (contract_diff-15)\n\t\t\t*goto Contract_Succeed\n\t\t*else\n\t\t\t\"But you won't,\" she says, \"because no matter what you think of me, you're not willing to let an unbound demon loose in a city full of people.\"\n\t\t\t*goto Contract_Fail\n\n*label Contract_Succeed\n*page_break\nDrakovic settles into the chair behind her desk.  She looks smaller, sitting down.  \"What do you want?\"\n\n\"I want for you to get out of this line of work.  You're taking desperate people—\"\n\n\"They count as people to you?  They have knives for fingers.  They eat souls.\"\n\n\"You're selling them as slaves.  I don't even want to know what your…clients do with them.\"\n\n\"Manual labor,\" she says.  \"Gods.  Even to imply.\"  She shivers.  \"We run a class shop.\"\n\n\"I bet that's what they all say.\"\n\nDrakovic hates you now.  You can tell from the weight of her eyes.  But hers is the hatred of the beaten.  \"Tell me what will get you gone.\"\n\n*page_break\n\n\"Change R'ok's contract.\"\n\n\"Impossible,\" she says.  \"Not the way he wants.  He wanted to stay here forever—no determinate end date.  Too dangerous, if he is not limited.  I can relax his contract—reduce his obligations, end his work at the docks.  But if so, we have to agree on an end date to the contract.  Think what you want of me, but I am not a fool.\"\n\nShe opens a drawer.  You tense, thinking [i]weapon[/i], but she produces a pack of cigarettes instead, tamps them down, removes one, and lights it.\n\n*if visa = false\n\t\"Someone else could pick him up,\" she says.  \"But not without a visa.  And good luck getting one of those.\"\n*comment endif\n\nShe's telling the truth.  You don't have to like it, but you won't gain anything more standing here.  \"I'll send you the revised contract,\" you say, and leave.\n*set renegotiated true\n*goto C
