n years, your life in this city and around the world.  You've climbed handhold by handhold to the top of this edifice of dark magic, and while you can't deny the alternatives have their allure, you're not going to stop now.  There's more Craft to do, more power to gain, more knowledge to uncover.  The world is yours, and you are triumphant.\n\t\t\n\t\t\"I'm happy where I am,\" you say.  \"But thank you.\"\n\t\t*achieve partner\n\t\t*set final_job \"partner\"\n\t\t*goto end \n\t#I accept R'ok's offer.\n\t\t*set offer_accepted true\n\t\tYou think back over the last seven years, over your life in this city and around the world, working to the benefit of those with enough wealth to employ a firm's Craftwork team at several souls an hour.  If you've helped people, you did so at cross-purposes with the dread edifice of dark magic that has paid your salary since graduation.\n\t\t\n\t\tAt least with demons, the risks are clear, and your role straightforward.\n\t\t\n\t\tYou nod to R'ok.  \"I'd like to hear more about your offer.\"\n\t\t\n\t\t\"Good,\" he says.  \"I will have papers drawn up.\"\n\t\t*achieve rokoffer\n\t\t*set final_job \"demon\"\n\t\t*goto end\n\t#I don't accept any of the offers.  I want my freedom back.\n\t\tYou think back over the last seven years, over your life in this city and around the world, working to the benefit of those with enough wealth to employ a firm's Craftwork team at several souls an hour.  If you've helped people, you did so at cross-purposes with the dread edifice of dark magic that has paid your salary since graduation.\n\t\t\n\t\tThere's a whole brilliant world out there, yet since you joined the firm you've seen little of it save the inside of boardrooms and the abyssal dark of the astral plane.\n\t\t\n\t\t\"I'm sorry,\" you say.  \"Thank you.  But I plan to take some time off.  I've been a part of this firm for too long.  It's time to wander the earth, and find out what I want to do with myself next.\"\n\t\t\n\t\t*set final_job \"wander\"\n\t\t*if debt > 20000\n\t\t\tYou can barely say the words for the throb of your own pulse in your throat.  You're overcome with debt, and you don't know how you'll survive.  But you need to do this.\n\t\t\t\n\t\t\tDon't you?\n\t\t\t*goto end\n\t\t*if debt_repaid\n\t\t\tYou've repaid your student loans.  You have savings, and skills, and vast sorcerous might at your command.  What might you do?  Found a kingdom?  Build a Concern from scratch?  Wander beyond the furthest edges of the astral plane?  Found a consultancy?  Learn alligator wrestling, hitchhike across Camlaan, spend six years attaining enlightenment in a Shining Empire monastery?  Whatever you do, the firm will have no part of it, and that feels good.\n\t\t\t*achieve wander\n\t\t\t*goto end\n\t\t*if debt \u003c= 20000\n\t\t\tYou'll be just fine.\n\t\t\t*goto end\n\n*label wakefield_newstart\n\nA new firm means a new start.  Kelethres Albrecht & Ao has an even more selective reputation than VNS, and perhaps a new firm would feel better—or at least be less likely to get you almost killed every other case.\n\nYou don't think the odds of that are very good, but it's worth a shot.\n\n*if wakefield_relationship\n\tYou smother a twinge of physical regret as you turn to Wakefield and say, \"I'd like to hear more about your offer.\"\n\t\n\tAnd, for ${Ash_pro_pos} part, Wakefield does not betray the slightest reluctance.  \"Then let us discuss over coffee, shall we?  Say, this Sixthday at four?\"\n\t\n\tWell.  Maybe ${Ash_pro} does display a hint of reluctance after all.\n\t*goto end \n*else\n\tYou turn to Wakefield.  \"I'd like to hear more about your offer.\"\n\t\n\t${Ash_pro_cap} smiles.  \"Then let us discuss over coffee, shall we?  Say, this Sixthday at four?\"\n\n*label end\n*page_break\n\n\"Now, if you'll excuse me,\" you say, \"I have some thinking to do.\"\n\n*temp files_out \"files out\"\n*if ((wakefield_offer) and (not(wakefield_relationship) or (wakefield_relationship and (final_job = \"wakefield\"))))\n\t*set files_out \" and Wakefield file out\"\n*temp goddess_end \"\"\n*if blessing\n\t*set goddess_end &\"The goddess simply fades, leaving the plant, and the buds sprouted in her presence, behind.\"\n\nYour tone leaves little room for argument. R'ok ${files_out}.  ${goddess_end}\n\n*if (wakefield_relationship) and not(final_job = \"Wakefield\")\n\t*goto wakefield_post_decision\n*elseif (chen_relationship)\n\t*goto cass_in_office\n*elseif (vega_relationship)\n\t*goto vega_in_office\n*else\n\t*goto alone_in_office\n\t\n*label wakefield_post_decision\n*page_break\n\n*temp kissing_is_awesome \"\"\n*if (is_skeleton)\n\t*set kissing_is_awesome \"Turns out skeletons can kiss just as well as normal humans, once you're used to the lack of lips.  It's as much a state of mind as anything else.\"\n\nWakefield remains.  When the door's closed, ${Ash_pro} rises, and so do you.  \"Congratulations,\" ${Ash_pro} says, and kisses you.  ${kissing_is_awesome}\n\nThe kissing goes on for quite a while—praise be to whatever gods invented office doors that close.\n\nAt last, Wakefield pulls back.  \"I have to say, for a moment there I was afraid you might accept our office's offer.\"\n\n\"Afraid?\"\n\n*if not(final_job = \"partner\")\n\t\"In a manner of speaking.\"  ${Ash_pro_cap} laughs.  \"That said, I'm not sure I ever would have expected you to make [i]that[/i] decision.\"\n*if (final_job = \"partner\")\n\t\"In a manner of speaking.\"  ${Ash_pro_cap} laughs.  \"So, partner at Varkath Nebuchadnezzar.\"\n*comment endif for the sheer form of the thing.\n\n*choice\n\t*if (final_job = \"wander\") #\"I like the idea of being unrestrained for a while.\"\n\t\t\"Unrestrained is a novel way to say unemployed.\"\n\t\t\n\t\t\"There's a whole world out there to see.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"wander\") #\"Why not strive for freedom while I can?\"\n\t\t\"Did you really work so hard only to walk away from the Craft?\"\n\t\t\n\t\t\"I'm not walking away.  Just…taking a new perspective.\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"wander\") #\"You're only young once.\"\n\t\t\"If at all.\"\n\t\t\n\t\t\"That's what I'm saying.  If I stay at this job, I'll start to think this is all normal.  The long nights.  The weird hours.  The soul drain and the dark magics.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"partner\") #\"Varkath Nebuchadnezzar Stone, you mean.\"\n\t\t\"Is that the path you've decided to take, when presented with this new opportunity?  Pedantry?\"\n\t\t\n\t\t\"Just going for precision.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"partner\") #\"It suits, doesn't it?\"\n\t\t\"Could not have happened to a finer or more brilliant ${Craftsperson}.  Just don't let it go to your head.\"\n\t\t\n\t\t\"Oh, I think you'll take care of that.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"partner\") #\"Upset I beat you?\"\n\t\t\"Please.  Jealousy, because my firm didn't have to accelerate my decision process in order to buy off an angry client?  I'm quite happy where I am.\"\n\t\t\n\t\t\"And so am I,\" you say.  \"This is the beginning of…well, I don't know.  But it will be good.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"demon\") #\"Demons pay as well as any human employer.\"\n\t\t\"So long as you don't mind accepting the payment in damned souls.\"\n\t\t\n\t\t\"What else would I be paid in?\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"demon\") #\"I think I'll like working for the demons.  Feels more honest, somehow.\"\n\t\t\"It's not as if your firm ever presented itself as on the side of the angels.  In fact, come to think of it, I believe that mask of old Varkath's is made of angel-hide.  Or else of his own, I can never keep that straight.\"\n\t\t\n\t\t\"At least our clients tend to think we're the good guys.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if  (final_job = \"demon\") #\"I don't trust the demons in general, but I do trust R'ok.\"\n\t\t\"I hope he does not betray that trust.\"\n\t\t\n\t\t\"He knows what I've done for him.  For his people.  I'll be fine.\"\n\t\t\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"goddess\") #\"It will be interesting to work for the other side for a change.\"\n\t\t\"Be careful, is my point.  You never know with gods.  One minute you're working with them, the next you start to believe in them.\"\n\t\t\n\t\t\"You're worried about me.  That's sweet.\"\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"goddess\") #\"I always wanted to work abroad.\"\n\t\t\"Ah yes, in the backwaters of forever, where people still rely on their gods to save them.\"\n\t\t\n\t\t\"Tassadon is a beautiful place.\"\n\t\t*goto Wakefield_office_2\n\t*if (final_job = \"goddess\") #\"You've never wondered how the other half lives?\"\n\t\t\"Often.  And when I do, I generally thank the blind hand of chance that my wonder remains unsatisfied.\"\n\t\t\n\t\t\"It'll be fun.\"\n\t\t*goto Wakefield_office_2\n\t#\"I'll be fine.\"\n\t\t*goto Wakefield_office_2\n\n*label Wakefield_office_2\n*comment endif\n\"I suppose,\" ${Ash_pro} says.  \"I plan to continue with my own work at Kelethres Albrecht & Ao.  But I will be here for you.  Your future holds many successes, I am sure—and I would not want to miss them.\"\n\n\"Thanks,\" you say.\n\n\"Now.\"  ${Ash_pro_cap} brushes off the front of ${Ash_pro_pos} suit jacket.  \"I have tarried too long.  My own dread masters await.  Shall we have dinner tonight, when you get off work—and I do?\"\n\n\"Of course.\"\n\nYou kiss once more, and then ${Ash_pro} leaves, with an apologetic bow.\n*goto alone_in_office\n\n*label cass_in_office\n*page_break\n\n*temp kissing_is_awesome \"\"\n*if (is_skeleton)\n\t*set kissing_is_awesome \"Turns out skeletons can kiss just as well as normal humans, once you're used to the lack of lips.  It's as much a state of mind as anything else.\"\n\nThe door closes, and you sag into your chair—only to tense again when Cass Chen enters.\n\n*if not(final_job = \"partner\")\n\t\"Congratulations,\" she says, and smiles.\n*if (final_job = \"partner\")\n\t\"So you're taking the job,\" she says.\n*comment endif\n\n\"Hold on a second.  Were you [i]eavesdropping[/i]?\"\n\n\"I'm sorry,\" she says.  \"I was curious.\"  And before you can argue, she kisses you.  ${kissing_is_awesome}\n\nThe kissing goes on for quite a while—praise be to whatever gods invented office doors that close.  At the end, she pulls away.\n\n*if not(final_job = \"partner\")\n\t\"I wasn't going to say anything,\" Cass says.  \"I mean, it was your decision.  Still, I'm glad you made [i]that[/i] one.\"\n*if (final_job = \"partner\")\n\t\"So you'll be a partner.\"\n*comment endif for the sheer form of the thing.\n\n*choice\n\t*if (final_job = \"wander\") #\"I like the idea of being unrestrained for a while.\"\n\t\t\"There's a whole world out there to see,\" she says.  \"Would you like a partner?\"\n\t\t\n\t\t\"You'd give up the job?\"\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"wander\") #\"Why not strive for freedom while I can?\"\n\t\t\"Freedom,\" she says.  \"I like it.  Want a partner?\"\n\t\t\n\t\t\"You'd give up the job?\"\n\t\t\n\t\t\"Oh, because I'm clearly so happy here.  A change might be just what we need.  Both of us.\"\n\t\t\n\t\t\"I'd like that.\"\n\t\t*goto Chen_office_2\n\t*if (final_job = \"wander\") #\"You're only young once.\"\n\t\t\"You're missing the point,\" she says with a grin.  \"Most people aren't ever young at all.  Maybe we'll be.  Together.\"\n\t\t\n\t\t\"Together,\" you say.  \"I'd like that.\"\n\t\t*goto Chen_office_2\n\t*if (final_job = \"partner\") #\"I've worked toward this for a long time.\"\n\t\t\"Long enough to know it almost kills you.  Why not try something else?\"\n\t\t\n\t\t\"This is what I'm good at.\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"partner\") #\"It suits, doesn't it?\"\n\t\t\"I don't know,\" she says.  \"I thought you'd think of something…better to do with yourself.\"\n\t\t\n\t\t\"Give up everything I've worked for?  Leave this life behind?\"  You shake your head.\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"partner\") #\"Upset I beat you?\"\n\t\t\"You can only beat someone to a goal they mean to reach,\" Cass says.\n\t\t\n\t\t\"You don't want to become a partner?\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"demon\") #\"The demons made the best offer.\"\n\t\t\"I'll miss you when you're out of this world.\"\n\t\t\n\t\t\"I'm always out of this world,\" you say, and at least she laughs after she groans.\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"demon\") #\"I think I'll like working for the demons.  Feels more honest, somehow.\"\n\t\t\"I know what you mean,\" she says with a grin.\n\t\t\n\t\t\"I should be fine, provided they don't decide to eat me.\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if  (final_job = \"demon\") #\"I don't trust the demons in general, but I do trust R'ok.\"\n\t\t\"Plus, you did sort of save their city.\"\n\t\t\n\t\t\"There is that.\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"goddess\") #\"It will be interesting to work for the other side for a change.\"\n\t\t\"A goddess.\"  She shakes her head.  \"That is a bit far off the course, even for you.\"\n\t\t\n\t\t\"You're worried about me.  That's sweet.\"\n\t\t*goto Chen_office_2\n\t*if (final_job = \"goddess\") #\"I always wanted to work abroad.\"\n\t\t\"I've never visited Tassadon.\"\n\t\t\n\t\t\"It's beautiful.  You'll like it there, when you come to visit.\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"goddess\") #\"I think I'll like in-house work.\"\n\t\t\"Just so long as you like the house.\"\n\t\t\n\t\t\"You'll like Ajaia.  She's strange.\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"wakefield\") #\"I think Wakefield's firm will be a better fit for me.\"\n\t\t\"I'll miss you here,\" she says.\n\t\t\n\t\t\"So will I.\"\n\t\t\n\t\t*goto Chen_office_2\n\t*if (final_job = \"wakefield\") #\"At least then we won't have to tiptoe around fraternization rules.\"\n\t\t\"Fraternization?\"  She cocks an eyebrow at you.  \"So you think I'm your brother now?  That's weird even for you.\"\n\t\t\n\t\t\"Not remotely what I meant.\"\n\t\t\n\t\t*goto Chen_office_2\n\t#\"I'll be fine.\"\n\t\t*goto Chen_office_2\n\n*label Chen_office_2\n*comment endif\n\n*if (final_job = \"partner\")\n\t\"I didn't expect you to stay,\" she says, \"is all.  And I'm not sure I will.  There are so many places to go—there's so much world out there.  I'm almost ready to leave.  Not this year.  But soon.\"\n\t\n\t\"What does that mean for us?\"\n\t\n\t\"For now?\"  She shakes her head.  \"Not much.  But someday I'll probably go, and you'll stay.  I'm sorry.  I should be congratulating you.\"\n\t*choice\n\t\t#\"At least you're honest.\"\n\t\t\t\"Sure,\" she says, and kisses you again.  \"I have work.  I have to go.\"\n\t\t\t\n\t\t\tAnd then she leaves.\n\t\t\t*goto alone_in_office\n\t\t#\"I could go with you.\"\n\t\t\t\"Maybe,\" she says, and kisses you again.  \"We'll see.\"\n\t\t\t\n\t\t\tAnd then she leaves.\n\t\t\t*goto alone_in_office\n\t\t#\"I love you.\"\n\t\t\t\"We'll figure this out,\" she says.  \"Somehow.\"\n\t\t\t\n\t\t\tShe kisses you before she leaves.\n\t\t\t*goto alone_in_office\n\"I love that you're [i]doing[/i] something,\" she says.  \"Something big.  Something new.  I love that you're not going to just stay here forever.  I'm not ready yet—but I will be soon.  A year, maybe two, and then the sky's the limit.\"\n\n\"I love you,\" you say.\n\n\"I love you too.\"  She kisses you again.  \"But I have more work to do.  For now.  Dinner at eight?\"\n\n\"Of course.\"\n\nAnd then she leaves, reluctantly.\n*goto alone_in_office\n\n*label vega_in_office\n*page_break\n\n*temp kissing_is_awesome \"\"\n*if (is_skeleton)\n\t*set kissing_is_awesome \"Turns out skeletons can kiss just as well as normal humans, once you're used to the lack of lips.  It's as much a state of mind as anything else.\"\n\nThe door closes, and you sag into your chair—only to tense again when the door opens to admit Vega.\n\n*if not(final_job = \"wander\")\n\t\"Congratulations,\" he says, and smiles.\n*if (final_job = \"wander\")\n\t\"So you're leaving,\" he says.\n*comment endif\n\n\"Hold on a second.  Were you [i]eavesdropping[/i]?\"\n\n\"Not precisely,\" he says.  \"I wanted to talk more, but I arrived to find your office occupied.  And these new doors are thin.\"  You're about to argue, but then you're too close, and kissing.  ${kissing_is_awesome}\n\nThe kissing goes on for quite a while—praise be to whatever gods invented office doors that close.  At the end, he pulls away.\n\n*if not(final_job = \"wander\")\n\t\"I am glad of your final decision,\" Vega says.\n*if (final_job = \"wander\")\n\t\"You will leave us.\"\n*comment endif for the sheer form of the thing.\n\n*choice\n\t*if (final_job = \"wander\") #\"I'm sorry.\"\n\t\t\"So am I.\"\t\t\n\t\t\n\t\t*goto Vega_office_2\n\t*if (final_job = \"wander\") #\"Why not strive for freedom while I can?\"\n\t\n\t\t\"Freedom,\" he says.  \"You are giving up everything.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"wander\") #\"You're only young once.\"\n\t\t\"You only [i]live[/i] once,\" he says.  \"Which is to say, your mistakes remain.\"\n\t\t\n\t\t*goto Vega_office_2\n\t*if (final_job = \"partner\") #\"I've worked toward this for a long time.\"\n\t\t\"You have worked hard, and brilliantly,\" he says.  \"I am glad for you.\"\n\t\t\n\t\t\"It feels good.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"partner\") #\"It suits, doesn't it?\"\n\t\t\"I cannot think of a more deserving ${Craftsperson}.\"\n\t\t\n\t\t\"Now you're just flattering me.\"\t\t\n\t\t*goto Vega_office_2\n\t*if (final_job = \"demon\") #\"The demons made the best offer.\"\n\t\t\"In-house counsel for Akargath,\" he says, a note of wonder in his voice.  \"Not a job I would relish.\"\n\t\t\n\t\t\"Should be a nice challenge.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"demon\") #\"I think I'll like working for the demons.  Feels more honest, somehow.\"\n\t\t\"Honest?\"  He sounds confused.\n\t\t\n\t\t\"Don't worry about it.  I should be fine, provided they don't decide to eat me.\"\n\t\t\n\t\t*goto Vega_office_2\n\t*if (final_job = \"goddess\") #\"It will be interesting to work for the other side for a change.\"\n\t\t\"A goddess.\"  He shakes his head.  \"You do pick interesting allies.\"\n\t\t\n\t\t\"You're worried about me.  That's sweet.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"goddess\") #\"I always wanted to work abroad.\"\n\t\t\"I've never visited Tassadon.\"\n\t\t\n\t\t\"It's beautiful.  You'll like it there, when you come to visit.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"goddess\") #\"I think I'll enjoy in-house work.\"\n\t\t\"Just so long as you feel…comfortable in the house.\"\n\t\t\n\t\t\"You'll like Ajaia.  She's strange.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"wakefield\") #\"I think Wakefield's firm will be a better fit for me.\"\n\t\t\"I'll miss you here,\" he says.\n\t\t\n\t\t\"So will I.\"\n\t\t*goto Vega_office_2\n\t*if (final_job = \"wakefield\") #\"At least then we won't have to tiptoe around fraternization rules.\"\n\t\t\"Fraternization?\"  He cocks an eyebrow at you.  \"So you think I'm your brother now?  That's weird even for you.\"\n\t\t\n\t\t\"Not remotely what I meant.\"\n\t\t*goto Vega_office_2\n\t#\"I'll be fine.\"\n\t\t*goto Vega_office_2\n\n*label Vega_office_2\n*comment endif\n\n*if (final_job = \"wander\")\n\t\"This is the right thing for me to do,\" you say.\n\t\n\t\"Perhaps.  You know I can't go with you.\"\n\t*choice\n\t\t#\"I don't need you to go with me.  I would like you to [i]stay[/i] with me, though.\"\n\t\t\t\"I will try,\" he says.  \"This is a dance I've seen before.  The paths diverge, and what was, isn't any more.  Perhaps we will escape that fate.  I don't know.\"\n\t\t\t\n\t\t\tYou kiss, soft, bittersweet.  You hope that strange new taste isn't the taste of ending.\n\t\t\t\n\t\t\tAnd then he leaves.\n\t\t\t*goto alone_in_office\n\t\t#\"This doesn't have to be the end of us.\"\n\t\t\t\"Maybe,\" he says, and kisses you again.  \"We'll see.\"\n\t\t\t\n\t\t\tAnd then he leaves.\n\t\t\t*goto alone_in_office\n\t\t#\"I love you.\"\n\t\t\t\"We'll figure this out,\" he says.  \"Somehow.\"\n\t\t\t\n\t\t\tHe kisses you before he leaves.\n\t\t\t*goto alone_in_office\n\"This is a good path for you,\" he says.  \"I will remain here, of course.  And as for the future, we can build it as we must.\"\n\n\"I love you,\" you say.\n\n\"I love you too.\"  He kisses you again.  \"We must talk more—but I have work.  Of course.  Shall we dine at eight?\"\n\n\"Let's.\"\n\nAnd then he leaves.\n\n*goto alone_in_office\n\n*label alone_in_office\n\nAlone in your office, you turn and face the window.\n\n*temp final_graf \"\"\n\n*if (in_relationship or people_like_you) \n\t*set final_graf &\"But you're not alone, not really.  \"\n*if wakefield_relationship\n\t*set final_graf &\"Whatever happens, you look forward to seeing what happens between you and Wakefield.  Ashleigh.  Still getting used to that.  \"\n*if chen_relationship\n\t*set final_graf &\"Cass is there.  For as long as that lasts.  A while, hopefully.  Maybe forever.  \"\n*if vega_relationship\n\t*set final_graf &\"Vega is there with you.  For as long as that lasts.  A while, you hope.  Maybe forever.  \"\n*if people_like_you\n\t*set final_graf &\"Your friends won't forget you.  \"\n\t\n${final_graf}\n\n*if debt_repaid\n\tYou're debt-free, possessed of immense power, with no harder limits than your own imagination.\n\n*if is_skeleton\n\tYou have a new body, and eternity ahead.\n*comment endif\n\nThe pieces of your life hover before you, shimmering, spinning fragments.  You have a long path to walk.\n\nBut the sky above your world is whole.\n\n*page_break End\n*achieve win\n*label backpage\nWe hope you've enjoyed playing [i]Choice of the Deathless.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing! Try this one next:\n*link https://www.choiceofgames.com/deathless-the-citys-thirst/redirect.php?src=deathless Deathless: The City's Thirst\n\n*delay_ending 1200 $4.99 $0.99", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*comment Screenshots\n\n*set charm 80\n*set craft 40\n*set power 60\n*set cunning 40\n*set sleep 75\n*set gunner 80\n*set soul 1833\n*set debt 85000\n*set ngabe 70\n*set chen 30\n*set wakefield 45\n*set vega 60\n*set varkath 30\n*set nebuchadnezzar 35\n*set stone 50\n\n*script changeBackgroundColor(\"sepia\")\n\nYour enemy stands before you: a towering figure of glass and knives.  Cackling madly, he raises one hand.  Dark power crackles along his talons.\n\nThe battle's taken almost all your strength.  Your Craft, your own power, stands at ebb.\n\nIf you don't win this thing soon, you're done.\n\n*fake_choice\n\t#I wait for my enemy to attack, then redirect his power against him!\n\t#I strike while I can, and give no quarter.\n\t#I run and hide.\n*script changeBackgroundColor(\"black\")\n\nYour salary's 160,000 thaums—let's say 100,000 after all your various fees and obligations to the city of Shikaw are handled.  Debt, obviously, is debt: the Hidden Schools lay claim to your soul and all its future products.  As long as you carry this debt, you'll never be free.  Mad necromancers can and will hunt you to the ends of the earth.\n\nSo, that said, how much of your salary—after you take care of rent and living expenses—goes toward debt?  And how much of it is yours to spend?  \n*fake_choice\n\t#I want that debt gone.  I'll eat instant noodles for five years if I must.\n\t#There's no sense making myself miserable.  I'll balance debt-repayment with my own wants and needs.\n\t#School was hard.  I want to live a little.  I'll have plenty of time to pay down debt.\n*script changeBackgroundColor(\"sepia\")\n\"Akargath might be able to push for joint ownership of the dam.  And from there...\"  He shudders.  You have a sudden image of demonic hordes sweeping into the deep jungles of Southern Kath, to breed and grow and infest.\n\n\"I don't know what we should do,\" he says.\n\n*fake_choice\n\t#\"We should bring Stone into the loop.\"\n\t#\"We can fix it together.\"\n\t#\"Let me do it by myself.\"\n\nPat meets her galaxy-eyes without a hint of awe.  \"Lady, we have come to ask you questions.  And we bind you to answer honestly.\"  His words change the space in which you hover: it acquires sharpness and solidity that remind you of wheels and gears and pulleys and levers.  The goddess hisses.\n\nAnd so the battle's joined.\n\nWhat's your strategy?\n\n*fake_choice\n\t#Go easy on the goddess.  Try to lull her into complacency.\n\t#We press her with question after question until she breaks.\n\t#We trap her in a contradiction.\n\t\nThe faceless man leads you back to the stairs; you climb three flights, then turn around and descend five flights more.  The door on this floor, which you don't remember passing on your climb up, opens onto a closet sized room that looks exactly like your office back at the firm.  Exactly.\n\nRight down to the version of you sitting behind the desk.\n\n\"What can we do for you?\" the demon-you asks.\n\n*fake_choice\n\t#\"I need your help.\"\n\t#\"You can issue a post-dated exit visa for one of your citizens, pursuant to form XJ-723-99, a completed copy of which I have here.\"\n\t#\"I'm here to offer you a chance to be a hero.\"\n", "startup": "*title Choice of the Deathless\n*author Max Gladstone\n*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n\n*scene_list\n\tstartup\n\tcasinonight\n\tdarkness\n\tthefirstcase\n\tdarkness2\n\tdevilsasylum\n\tdarkness3\n\tcontinuingeducation\n\tdarkness4\n\tdeposition\n\tdarkness5\n\tdemonworld\n\tdemonworld2\n\tepilogue\n\n*comment I guess we need a name here.  And some sexual equipment.\n*create name \"Unnamed\"\n*create surname \"O'Nonymouse\"\n*create char_gender \"female\"\n\n*comment Fetuses are all female until how many weeks?\n\n*create Ash_gender \"female\"\n*create Ash_pro \"she\"\n*create Ash_pro_cap \"She\"\n*create Ash_pro_pos \"her\"\n*create Ash_pro_obj \"her\"\n*create Ash_pro_abs \"hers\"\n*create Ash_pro_abs_cap \"Hers\"\n*create Ash_pro_pos_cap \"Her\"\n*create Ash_voc \"Ms.\"\n*create Ash_binary \"woman\"\n*create Ash_hair \"blonde\"\n*create Ash_craftsperson \"Craftswoman\"\n*create Ash_pro_self \"herself\"\n\n*create char_pro \"she\"\n*create char_pro_cap \"She\"\n*create char_pro_pos \"her\"\n*create char_pro_obj \"her\"\n*create char_pro_abs \"hers\"\n*create char_voc \"Ms.\"\n*create craftsperson \"Craftswoman\"\n*create char_binary \"woman\"\n*create character_is_bi false\n\n*comment Oppositional stats first: \"Gunner\" is the degree to which the mc is work-driven\n*comment Opposed by \"Socialite\" which is the degree to which the mc is socially driven\n*comment \"Honor\" is opposed by \"Duplicity\" and represents trust capital.\n\n*create gunner 50\n*create honor 50\n\n*comment Then, a basic four-way stat split.  Decided to switch 'consciousness' which had some overlap with 'cunning' for 'power,' which represents more of the 'direct approach'.  Then I decided to rename 'power' to 'determination' at the last moment—it remains 'power' in the codebase.\n*comment Setting stats to 1 rather than to 0 because setting to 0 causes fairmath to complain that the value is out of bounds.\n\n*create craft 1\n*create charm 1\n*create cunning 1\n*create power 1\n\n*comment And then some money.\n*comment Soulstuff is spent to do magic; if more's spent than you have left, that goes to debt.\n*comment Debt, meanwhile, is used to determine your financial autonomy & how much you've paid back your student loans.  Muahaha.\n*create debt 200000\n*create soul 2000\n*create sleep 99\n*create soul_funds \"low\"\n*create commute \"close\"\n*create spending_profile \"thrifty\"\n*create rent 0\n*create debt_repayment 0\n*create sleep_difficulty 0\n\n*comment And a way to die!  Other than debt of course.  Wounds measures the character's physical health.  Characters that 'die', given sufficiently high stats, may be able to become skeletons in the end.  Still a failure condition for most scenes in the game, I think.\n\n*create wounds 0\n\n*create is_skeleton false\n\n*comment Some more variables to represent the many ways you can be screwed up in the head.\n\n*create has_claustrophobia true\n\n*create background \"poor\"\n\n\n*comment Relationships are fun and probably won't get you killed.\n*comment AHSM Should these be percentile variables?  If so, they shouldn't start at 0--that will cause a bug, as noted before.\n\n*create Varkath 20\n*create Nebuchadnezzar 20\n*create Stone 20\n*create Wakefield 30\n*create Chen 30\n*create Ngabe 30\n*create Vega 35\n*create Klint 50\n*create Rok 20\n*create Smith 20\n\n*create chen_sex 0\n*create vega_sex 0\n*create wakefield_sex 0\n\n*comment And here are some story bits that will transfer from chapter to chapter!  I hope to keep these to a minimum--one or two per chapter, and with luck a few chapters will have none.\n\n*create claustrophobia false\n*create battle_talk false\n*create battle_redirect false\n*create battle_force false\n*create battle_fistpunch false\n*create battle_trap false\n*create battle_run false\n*create battle_disguise false\n*create battle_friends false\n*create battle_firm true\n\n*create first_kiss \"girl\"\n\n*comment these are from poker night!\n\n*create beat_varkath false\n*create craft_game_won false\n\n*comment These are from The First Case.\n\n*create Stone_Fix false\n*create Vega_Fix false\n*create Solo_Fix false\n*create Cass_Under_Bus false\n\n*comment These are from the Devil's Asylum\n\n*create Rok_here false\n*create Rok_job false\n\n*comment these are from Continuing Education\n\n*create panel_success false\n*create Wakefield_rival false\n*create smith_hurt false\n*create wakefield_hurt false\n*create rescued_wakefield false\n*create fight_hard false\n*create gets_it false\n*create gets_it_first false\n\n*comment And these are from Deposition\n\n*create goddess_referred false\n*create goddess_refuse false\n*create goddess_settlement false\n*create blessing false\n*create ngabe_under_bus false\n*create deposition_succeed false\n*create deposition_halfway false\n\n*comment And these are from the Demon World\n\n*create in_relationship false\n*create vega_relationship false\n*create chen_relationship false\n*create wakefield_relationship false\n\n*create rok_token false\n\n*comment And these are from Demon World Pt 2\n\n*create friends_save false\n\n*comment And these are from Darkness\n\n*create debt_repaid false\n\n*achievement blessing visible 50 Aid a Goddess\n\tEarn a goddess's blessing.\n\tYou earned a goddess's blessing.\n*achievement partner visible 50 Become a partner\n\tMake partner.\n\tYou became a partner at Varkath Nebuchadnezzar Stone\n*achievement skeleton visible 75 Become a skeleton\n\tSome damage you can survive, but you can't heal.\n\tYou became an undead abomination. Awesome.\n*achievement wakefield visible 15 Bright college years\n\tShare a meal with an old college \"chum.\"\n\tYou had dinner with Ashleigh Wakefield.\n*achievement stonefix visible 10 Brutal politician\n\tEarn points with a partner through political gamesmanship.\n\tBy bringing in Damien Stone, you exposed Vega's weakness.\n*achievement wakefieldhurt visible 25 Consolation Prize\n\tYou can't save them all.\n*achievement demonwin visible 10 Demonic Intervention\n\tWin with a demon's aid.\n\tYou won thanks to the demons' aid.\n*achievement depositionwin visible 40 Depose a Goddess\n\tAs in \"take a deposition from.\" You're not that powerful—yet.\n\tYou successfully deposed the goddess Ajaia.\n*achievement die visible 15 Die\n\tIt's easier than you expect\n\tYou died! Let's see you get out of this one…\n*achievement goddesswin visible 10 Divine Intervention\n\tWin with a goddess's help.\n\tYou won thanks to divine intervention.\n*achievement sexyfuntimes visible 25 Eager romantic\n\tStart a romance as early as possible.\n\tYou don't wait around, do you?\n*achievement win visible 25 Finish the game\n\tFinish the game\n\tYou finished the game! Care to play again?\n*achievement wakefieldoffer visible 25 Firm Moves\n\tTake a different path.\n\tYou took a job at Kelethres, Albrecht, and Ao.\n*achievement chen visible 25 Get with Cass\n\tEnter a relationship with Cass Chen.\n\tYou started a romance with Cass Chen.\n*achievement vega visible 25 Get with Vega\n\tEnter a relationship with Vega.\n\tYou started a romance with Halcyon Alatriste y Vega.\n*achievement wakefieldlove visible 25 Get with Wakefield\n\tEnter a relationship with Ashleigh Wakefield.\n\tYou started a romance with Ashleigh Wakefield.\n*achievement solofix visible 50 Go it alone\n\tSolve Transdimensional's problem on your own.\n\tYou fixed the Transdimensional case on your own.\n*achievement woundzero visible 40 Heal Thyself\n\tPull yourself together.\n\tYou put yourself back together again.\n*achievement rokoffer visible 25 Hell of a Job\n\tTake a different path.\n\tYou took a job from a demon.\n*achievement wander visible 50 I Want My Life Back\n\tTake a different path.\n\tYou've freed yourself from the firm.\n*achievement goddessoffer visible 25 In-Temple Counsel\n\tTake a different path.\n\tYou decided to work with the goddess Ajaia.\n*achievement poker visible 15 Master player\n\tWho cares if he's killed gods? You don’t take a hand like that to the river.\n\tYou beat a Deathless King at poker. I hope that doesn't bite you later!\n*achievement getsit visible 15 One step ahead\n\tWhat's wrong with this picture…\n\tYou figured out that Wakefield was possessed in time to make a difference!\n*achievement friendswin visible 10 The Power of Friendship\n\tWin by the power of friendship.\n\tYour friends saved you.\n*achievement rokfix visible 25 Pro bono\n\tWork for the public good, well.\n\tYou helped R'ok achieve his dream.\n*achievement roksolo visible 50 Pro bono, solo\n\tWho likes group work anyway?\n\tYou helped R'ok on your own, without backup.\n*achievement fistpunch visible 20 Punch a dark god in the face\n\tWhy not use some old-fashioned fisticuffs?\n\tYou punched a nigh-omnipotent horror in the face. How did that work out for you?\n*achievement loans visible 70 Repay your debt\n\tPay off your student loans.\n\tYou paid off your student loans!\n*achievement sacrificewin visible 5 Sacrifice Play\n\tWin through self-sacrifice.\n\tYou won through self-sacrifice.\n*achievement wakefieldsafe visible 25 Save Ash\n\tProtect your friends—and your enemies.\n\tYou stopped the demon before it could hurt Ash.\n*achievement smithsave visible 15 Save Smith\n\tProtect John Smith.\n\tYou saved John Smith from the assassin. At least for now.\n*achievement craftwin visible 10 Sorcerous Rescue\n\tWin with your firm's help.\n\tYour firm saved you.\n\n*comment And I was going to put some variables from the epilogue here but those could just as well be temps so don't worry about it.\n\n*comment Remove the '*comment' in front of the following lines to get an easy chapter selector for fast playtesting!  Though you'll probably fail at all the challenges by virtue of lacking skillz and friends.  Maybe someday I'll just *set applicable ability scores inside the choice options for the relevant chapters, but that day is not this day.\n\n*comment This is a test of how much string concatenation I can get away with.\n\n*comment *create quote_test \"\\\"\"\n*comment *set quote_test &\"I don't like her very much\"\n\n*comment ${quote_test}\n\n*comment Where do you want to start?\n*comment *choice\n*comment\t#The Battle in the Demon World\n*comment\t\t*goto_scene battle\n*comment\t#Casino Night\n*comment\t\t*goto_scene casinonight\n*comment\t#Darkness\n*comment\t\t*goto_scene darkness\n*comment\t#The First Case\n*comment\t\t*goto_scene thefirstcase\n*comment\t#The Devil's Asylum\n*comment\t\t*goto_scene devilsasylum\n*comment\t#Continuing Education\n*comment\t\t*goto_scene continuingeducation\n*comment\t#Deposition\n*comment\t\t*goto_scene deposition\n*comment\t#The Demon World\n*comment\t\t*goto_scene demonworld\n*comment\t#The Demon World, Part 2\n*comment\t\t*goto_scene demonworld2\n*comment\t#Epilogue\n*comment\t\t*goto_scene epilogue\n\n*comment\tOLD IAP CODE\n*comment\t*check_purchase adfree\n*comment\t*if choice_purchase_supported and not(choice_purchased_adfree)\n*comment\t\tBattle demons and undead attorneys, and win souls to pay back your student loans! At the elite demonic-law firm of Varkath Nebuchadnezzar Stone, you'll depose a fallen god, find romance, and maybe even make partner, if you don't lose your own soul first.\n*comment\t\n*comment\t\t\"Choice of the Deathless\" is a necromantic legal thriller by Max Gladstone, Campbell Award-nominated author of [i]Three Parts Dead[/i] and [i]Two Serpents Rise[/i]. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination. \n*comment\t\n*comment\t\t• Explore a fantasy realm with a rich and evolving backstory, based on the novels published by Tor Books. \n*comment\t\t*line_break\n*comment\t\t• Play as male or female, gay or straight, dead or alive (or both).\n*comment\t\t*line_break\n*comment\t\t• Build your career on carefully reasoned contracts, or party all night with the skeletal partners at your firm.\n*comment\t\t*line_break\n*comment\t\t• Navigate intrigue and mystery in a world of scheming magicians and devious monsters. \n*comment\t\t*line_break\n*comment\t\t• Look for love in at least some of the right places.\n*comment\t\t*line_break\n*comment\t\t• Balance student loans, sleep, daily commute, rent payments, and demonic litigation—hey, nobody said being a wizard was always fun.\n*comment\t\n*comment\t\t*if choice_is_trial\n*comment\t\t\t[i]You can play the first part of the game for free right here. (Beware, it ends on a cliffhanger!) The rest of the game is available for purchase; just click on one of the store buttons below.[/i]\n*comment\t\n*comment\t\t\t*page_break Play Now for Free\n*comment\t\t\t*goto purchased\n*comment\t\t*else\n*comment\t\t\t[i]You can play the first part of the game for free. (Beware, it ends on a cliffhanger!) You can purchase the rest of the game below; purchasing the rest of the game will also turn off in-game advertisements.[/i]\n*comment\t\n*comment\t\t\t*purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n*comment\t\t\t*page_break Play Now for Free\n*comment\t\t\t*advertisement\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tBattle demons and undead attorneys, and win souls to pay back your student loans! At the elite demonic-law firm of Varkath Nebuchadnezzar Stone, you'll depose a fallen god, find romance, and maybe even make partner, if you don't lose your own soul first.\n\n\t[i]Choice of the Deathless[/i] is a necromantic legal thriller by Max Gladstone, Campbell Award-nominated author of [i]Three Parts Dead[/i] and [i]Two Serpents Rise[/i]. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\n\t• Explore a fantasy realm with a rich and evolving backstory, based on the novels published by Tor Books.[n/]\n\t• Play as male or female, gay or straight, dead or alive (or both).[n/]\n\t• Build your career on carefully reasoned contracts, or party all night with the skeletal partners at your firm.[n/]\n\t• Navigate intrigue and mystery in a world of scheming magicians and devious monsters. [n/]\n\t• Look for love in at least some of the right places.[n/]\n\t• Balance student loans, sleep, daily commute, rent payments, and demonic litigation—hey, nobody said being a wizard was always fun.[n/]\n\n\t*if choice_is_steam\n\t\t*if choice_prerelease\n\t\t\t[i]You can play the first two chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t\t*choice\n\t\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t\t*restart\n\t\t\t\t#Play the first two chapters now for free.\n\t\t\t\t\t*goto purchased\n\n\t\t[i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t\t*purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n\t\t*page_break Play Now for Free\n\t\t*goto purchased\n\t*else\n\t\t*if choice_is_advertising_supported\n\t\t\t[i]Choice of the Deathless[/i] is supported by advertisements, but you can buy the unlimited version\n\t\t\tto turn off ads forever.\n\t\t\t\n\t\t\t*purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n\t\t\t*page_break_advertisement\n\n\t\t\t*goto purchased\n\t\t*else\n\t\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t\t*purchase_discount adfree 2019-01-01 $4.99 $2.99 purchased\n\t\t\t*page_break Play Now for Free\n\n\n*label purchased\nThe sky over the demon world is broken.  Lightning licks the strange geometries of cloud.  Around you rises the demon-city Akargath, warped crystal and flame, thorns and razor wire.  And this is the nice part of town. \n\nGods, you hurt.  Your skin's a burned ruin.  Bones in your ribs grind when you breathe.  Your suit hangs in tatters from your body.\n\nYour enemy stands before you: a towering figure of glass and knives.  Cackling madly, he raises one hand.  Dark power crackles along his talons.\n\nThe battle's taken almost all your strength.  Your Craft, your own power, stands at ebb.\n\nIf you don't win this thing soon, you're done.\n\n*choice\n\t#I wait for my enemy to attack, then redirect his power against him!\n\t\t*set battle_redirect true\n\t\tAs the blast scythes toward you, you bind it with your own Craft and cast it back against your foe.  To catch such power in mid-flight is almost impossible, but you manage, a virtuoso display of finesse and improvisation.\n\t\t\n\t\tIf you survive this, you'll return to the Hidden Schools and rub this moment in the face of every professor who ever claimed you'd not amount to anything.\n\t\t\n\t\tIf.\n\t\t\n\t\t*page_break\n\t\t\n\t\tThe bolt shatters your enemy's chest to crystal shards.  They fall like rain, and reflect your battered face a million times in miniature.\n\t\t\n\t\tBut before your very eyes the crystal melts again and flows back to heal the wound you made.  He stands before you, mighty as before.\n\t\t\t\t\n\t\tThe effort's almost exhausted you.  You can't turn another hit like that.\n\t\t*set cunning +10\n\t\t*choice\n\t\t\t#Strike him down while I still can.\n\t\t\t\tYou throw the last dregs of your soul against him.  After the earlier blast, this seems to have more effect.\n\t\t\t\t\n\t\t\t\tHe staggers, and roars with agony and rage.  But he recovers all the same.\n\t\t\t\t\n\t\t\t\t\"No more games,\" he says.  \"Time to die.\"\n\t\t\t\t*set craft +10\n\t\t\t\t*goto Die\n\t\t\t#Say something.  Try to stall him.\n\t\t\t\t*label Talk\n\t\t\t\t*set battle_talk true\n\t\t\t\tYou scream into the whirlwind.  \"Others will come after me.  And after you.\"\n\t\t\t\t\n\t\t\t\tHe laughs.  \"Who?  Who do you think cares enough about you to risk their life for vengeance?\"\n\t\t\t\t*set charm +10\n\t\t\t\t*choice\n\t\t\t\t\t#My friends.\n\t\t\t\t\t\t\"My friends won't rest until they find you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Then they, too, will die.\"\n\t\t\t\t\t\t*set Ngabe +10\n\t\t\t\t\t\t*set Chen +10\n\t\t\t\t\t\t*set Vega +10\n\t\t\t\t\t\t*set battle_friends true\n\t\t\t\t\t\t*goto Die\n\t\t\t\t\t#Ashleigh Wakefield.\n\t\t\t\t\t\t\"Ashleigh will.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Perhaps.  Perhaps Wakefield will only squirm less before dying.\"\n\t\t\t\t\t\t*set Wakefield +20\n\t\t\t\t\t\t*goto Die\n\t\t\t\t\t#My firm.\n\t\t\t\t\t\t\"You kill me, and Varkath Nebuchadnezzar Stone will hound you to the end of time.  Do you think my partners can't find you here?  Or in whatever rathole you try to hide?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHis laugh is high and creaking, like a door on a poorly oiled hinge.  \"You think they'll seek vengeance on one of their most prized clients?  We'll settle eventually.  And you'll be long dead by then.\"\n\t\t\t\t\t\t*set battle_firm true\n\t\t\t\t\t\t*set Varkath +20\n\t\t\t\t\t\t*set Nebuchadnezzar +20\n\t\t\t\t\t\t*set Stone +20\n\t\t\t\t\t\t*goto Die \n\t#I strike while I can, and give no quarter.\n\t\t*set battle_force true\n\t\tYou're strong.  Stronger than this.  And you won't die here.\n\t\t\n\t\tOr at least you won't die alone.\n\t\t\n\t\tBefore he can attack, you throw your power against him—all the soulstuff you can summon, merged into a single spear of coruscating light.\n\t\t\n\t\t*page_break\n\t\t\n\t\tHe staggers, and falls to his knees.\n\t\t\n\t\tYou advance, dragging your broken leg over the ground.  Exquisite pain, but you've won.  You think.\n\t\t\n\t\tUntil he looks up, and smiles jagged teeth.  \"Is that all?\"\n\t\t\n\t\tIt was.  That was the plan.  What now?\n\t\t\n\t\t*set craft +10\n\t\t\n\t\t*choice\n\t\t\n\t\t\t#Talk to him.  Try to stall for time.\n\t\t\t\t*goto Talk\n\t\t\t#Pretend I'm going to blast him again.  Then punch him in the face.\n\t\t\t\t*set battle_fistpunch true\n\t\t\t\t*achieve fistpunch\n\t\t\t\tYou raise one hand, fingers curled into claws, and chant mystic nonsense.  He Crafts a shield between you, ready to ward off an assault of pure thaumaturgical power.\n\t\t\t\t\n\t\t\t\tHis shield's a piece of work.  Certainly would have stopped an assault of pure thaumaturgical power.  Doesn't stop your fist, though.\n\t\t\t\t\t\t\t\t\n\t\t\t\tUnfortunately, while it feels satisfying as hell to deck a nigh-omnipotent demonic horror, you can't say much for the effectiveness of the strategy.\n\t\t\t\t\n\t\t\t\tHis head snaps back, spins around, and settles onto his shoulders again.  It would be a comical effect if you weren't about to die.\n\t\t\t\t\n\t\t\t\tBlood runs down your hand.  You sliced your knuckle open on his cheekbone.  \n\t\t\t\t\n\t\t\t\tGreat, you think, in the instant before he hits you.\n\t\t\t\t*set power +20\n\t\t\t\t*set cunning +10\n\t\t\t\t*goto Die\n\t\t\t#Spring my trap.\n\t\t\t\t*set battle_trap true\n\t\t\t\tYou might not have hurt him much, but at least you pushed him into position.\n\t\t\t\t\n\t\t\t\tThe Craft circle you drew earlier springs to life, and glass shatters in the buildings overhead.  Steel and crystal fall like rain, sharp points and edges descending…    \n\t\t\t\t\n\t\t\t\tOnly to stop in midair, with a wave of your opponent's hand.\n\t\t\t\t\n\t\t\t\t\"Nice trick,\" he says, and strikes.\n\t\t\t\t\n\t\t\t\t*set cunning +20\n\t\t\t\t*goto Die\n\t#I run and hide.\n\t\t*set battle_run true\n\t\tDiscretion is the better part of valor.  Or at least of surviving long enough to think up a plan.\n\t\t\n\t\tYou sprint left down an alley, and burst through a loading dock into what in your world would be the back room of a clothing store.  The mannequins and racks of garments are interspersed with what look like displays from a torturer's supply company.\n\t\t\n\t\t*set cunning +10\n\t\t\n\t\t*page_break\n\t\t\n\t\tFootsteps approach.  Glass grinds underfoot.  This shop has plenty of hiding spaces, and you have a few seconds to choose.\n\t\t\n\t\t*choice\n\t\t\t#I hide in the supply closet.\n\t\t\t\tYou dive into the closet, and pull it shut behind you—softly, slowly, so he won't hear the click.\n\t\t\t\t\n\t\t\t\tYou're in a dark, close space.  Surrounded by pointy objects.  Hope you don't have claustrophobia.\n\t\t\t\t*choice\n\t\t\t\t\t#I do, actually.\n\t\t\t\t\t\tWell.  That wasn't a well-considered decision, was it?\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set claustrophobia true\n\t\t\t\t\t\t*goto Plan\n\t\t\t\t\t#Not really.  I swear.\n\t\t\t\t\t\tIt's really dark in here.  Are you sure?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#No.\n\t\t\t\t\t\t\t\t*set claustrophobia true\n\t\t\t\t\t\t\t\t*goto Plan\n\t\t\t\t\t\t\t#Yes.\n\t\t\t\t\t\t\t\t*set claustrophobia false\n\t\t\t\t\t\t\t\t*goto Plan\n\t\t\t\t\t#Would I have hidden in a closet if I had claustrophobia?\n\t\t\t\t\t\tMaybe.\n\t\t\t\t\t\t*set claustrophobia false\n\t\t\t\t\t\t*goto Plan\n\t\t\t#I disguise myself as a mannequin.\n\t\t\t\t*set battle_disguise true\n\t\t\t\tMost of these mannequins have several extra limbs and slick insectile faces, but there are a few humanoids, and a couple of those are draped in flowing hooded robes.\n\t\t\t\t*choice\n\t\t\t\t\t#I hide in a robe.\n\t\t\t\t\t\tSeconds to go.  Footsteps closing.  You whip a robe off a mannequin and wrap it around yourself.\n\t\t\t\t\t\t\n\t\t\t\t\t\tAfter a second's consideration you hide the now-naked mannequin inside an iron maiden.\n\t\t\t\t\t\t*set cunning +10\n\t\t\t\t\t\t*goto Plan\n\t\t\t\t\t#I hide among the humanoids.\n\t\t\t\t\t\tNothing for it but to stand immobile, and trust the reflections in the glass to confuse him.\n\t\t\t\t\t\t*set cunning +5\n\t\t\t\t\t\t*goto Plan\t\t\t\t\n\t\t\t#I crouch behind a rack.\n\t\t\t\tYou crouch behind a rack, upon which a humanoid mannequin that looks an awful lot like you lies splayed.\n\t\t\t\t\n\t\t\t\tThat's a coincidence.  Has to be.\n\t\t\t\t\n\t\t\t\t*goto Plan\n\t\t*label Plan\n\t\t\n\t\t\"You can't hide forever,\" he says from the alley.\n\t\t\n\t\tHe steps inside.\n\t\t\t\t\n\t\tWhat's your plan?  If you have one?\n\t\t*choice\n\t\t\t#What part of \"hide\" do you not understand?\n\t\t\t\tYou remain silent as his footsteps approach.  You stop breathing.\n\t\t\t\t\n\t\t\t\t\"This isn't your world,\" he says.  \"I can smell you, here.  I can feel your fear.\"\n\t\t\t\t\n\t\t\t\tThen your hiding place shreds to glittering razor-sharp ribbons, and you stand revealed before him.  Ruby eyes pierce you.\n\t\t\t\t*set cunning +5\n\t\t\t\t*goto Die\n\t\t\t#Once he's close enough, I spring my trap.\n\t\t\t\t*set battle_trap true\n\t\t\t\tYou don't have much power, and you didn't have much time, but enough at least to draw a little Craft circle on the floor in your own blood.  A channel for power.  And with a word, you let that power loose.\n\t\t\t\t\n\t\t\t\tThe storeroom shatters, and thousands of glass shards sweep toward him, sharp enough to cut him to ribbons.\n\t\t\t\t\n\t\t\t\tAnd then they stop, in midair.  And he laughs.\n\t\t\t\t\n\t\t\t\tWell, it was a nice idea, at least.\n\t\t\t\t\n\t\t\t\t*set craft +20\n\t\t\t\t\n\t\t\t\t*goto Die\n\t\t\t#No plan.  But if I get a shot, I'm taking it.\n\t\t\t\t*set battle_force true\n\t\t\t\tOne shot should do it.  You think you've judged his position right, from his footsteps and from the weight of his presence on your mind, on this world.  You sharpen your will into a spear.\n\t\t\t\t\n\t\t\t\tAnd you lash out.\n\t\t\t\t\n\t\t\t\tThe bolt tears through your hiding space, and he stands revealed in its path, slack-jawed with shock in the instant before your power strikes his chest.\n\t\t\t\t\n\t\t\t\tAnd scatters off it ineffectually.\n\t\t\t\t\n\t\t\t\tSo much for that idea.\n\t\t\t\t\n\t\t\t\t*set power +20\n\t\t\t\t*goto Die\n*label Die\n*page_break\n\nHe closes his clawed hand into a fist.  You crouch, ready for the attack.\n\nHe's powerful, but arrogant.  If you just hold out a few seconds more, you'll find some angle, some way to beat him.  As long as you can keep it together.\n\nThen claws of light and power strike you, and you shatter.\n\n*achieve die\n*page_break\n\nYour mind comes to pieces and the pieces tumble, sharp, spinning.  Seconds come unmoored from seconds.  Shards catch and reflect images of a once-familiar life: your past, spinning out of reach.\n\nYou have to fight back.  Have to stop him.  Defend yourself.  So hard to think.  What does thinking mean, anyway, outside of time?\n\nYou scramble amid the shattered, jagged facets of your self.  They cut your fingers, and blood flows into memory. \n\n*page_break\n\n*comment Character creation through character death!\n\nYou must remember.  You must fight.  You are…\n\nHells.  Who are you, anyway?\n\nThere must be an answer here, amid the slivers and glass confetti, among the kaleidoscope shapes.  If only you could grasp it.  You don't even have hands with which to grasp.  Or a body, for that matter.\n\nNo.  You have one.  You remember.\n\nYou are…\n\n*comment I think the first two options just about cover it.\n*comment At least, since we won't be explicitly between the sheets.\n*comment But I think the third one's kind of fun.  Let's see how much of a hassle it is.\n*choice\n\t#A man.\n\t\t*set char_gender \"male\"\n\t\t*set char_pro \"he\"\n\t\t*set char_pro_cap \"He\"\n\t\t*set char_pro_pos \"his\"\n\t\t*set char_pro_obj \"him\"\n\t\t*set char_pro_abs \"his\"\n\t\t*set char_binary \"man\"\n\t\t*set char_voc \"Mr.\"\n\t\t*set craftsperson \"Craftsman\"\n\t\tYou are a man.\n\t\t*goto Name\n\t#A woman.\n\t\t*set char_gender \"female\"\n\t\tYou are a woman.\n\t\t*goto Name\n*comment  Sexual tension turns out to be too central to the game for this to be an easy option to code.  Maybe.\n*comment\t#It doesn't matter.\n*comment\t\t*set char_gender \"neutral\"\n*comment\t\tYou are a human being.  You are…\n*comment\t\t*goto Name\n\t\t\n*label Name\n\nYour name, if you could just remember—names tie lives together, knit memories to memories.  And [i]your[/i] name is…\n\n*choice\n\t#Jamie.\n\t\t*set name \"Jamie\"\n\t\t*goto Surname\n\t*if char_gender = \"female\"\n\t\t#Sarah.\n\t\t\t*set name \"Sarah\"\n\t\t\t*goto Surname\n\t*if char_gender = \"female\" \n\t\t#Bahati.\n\t\t\t*set name \"Bahati\"\n\t\t\t*goto Surname\n\t*if char_gender = \"female\" \n\t\t#Ailing.\n\t\t\t*set name \"Ailing\"\n\t\t\t*goto Surname\n\t*if char_gender = \"male\" \n\t\t#John.\n\t\t\t*set name \"John\"\n\t\t\t*goto Surname\n\t*if char_gender = \"male\" \n\t\t#Xueyou.\n\t\t\t*set name \"Xueyou\"\n\t\t\t*goto Surname\n\t*if char_gender = \"male\" \n\t\t#Mark.\n\t\t\t*set name \"Mark\"\n\t\t\t*goto Surname\n\t#Something else.\n\t\tWhat is it?  So many shards tumbling out of reach, even as you grasp for them.\n\t\t*input_text name\n\t\t*goto Surname\n\t\t\n*label Surname\n\nThat's only part of it.  ${name}…\n\n*choice\n\t#Kang.\n\t\t*set surname \"Kang\"\n\t\t*goto History\n\t#Gaspard.\n\t\t*set surname \"Gaspard\"\n\t\t*goto History\n\t#Cavendish.\n\t\t*set surname \"Cavendish\"\n\t\t*goto History\n\t#Bly.\n\t\t*set surname \"Bly\"\n\t\t*goto History\n\t#Shepard.\n\t\t*set surname \"Shepard\"\n\t\t*goto History\n\t#None of these.\n\t\tA name for your family, for your people…\n\t\t*input_text surname\n\t\t*goto History\n\t\t\n*label History\n*comment Some options for how our PC spent his college career.\n*comment Maybe add another layer or two of choice?\n*comment My goal with stat setup is to provide primary, secondary, tertiary stats.\n\nHow did you get here, ${name}?  So many alternative pasts, so many options.  Dreamshards, timepieces.\n\nChildhood: the first stirrings of power.  You caught a falling star in a dead field, and held it burning in your hands.  Smelled the sweet iron of space and the world's heat, as fiery fingers crawled over your skin and into your flesh.\n\n*choice\n\t#I closed my hands around the star.\n\t\tYou closed your hands and the star's fire tore through you, burned along the channels of your soul, barbed into your young muscles.  It dragged across you like a steel knife over a guitar string.  As you passed out, you saw the world beneath the world, the world that remains when you close your eyes: a vast net of souls and exchange, a pulsing network of life and story and bargain and consequence.  Yours to twist, yours to command.\n\t\t\n\t\tWhen you woke, that vision remained, your first sight of a deeper world.  You would learn to use that strength one day.  But first, you had to grow up. \n\t\t*set power +10\n\t\t*goto life_path\n\t#I released the star into the sky.\n\t\tThe star twisted, lifelike, in your grip.  You raised your hands and opened your fingers and offered it to the sky.\n\t\t\n\t\tBurning with hidden wings, it rose, and spread, and rising spread more until it  shone triumphant in the dark.  You closed your eyes, but saw the star still, and more, by its light: a vast net of souls and exchange, a pulsing network of life and story and bargain and consequence.  Every node of the web whispered to every other.  As one, they sang.\n\t\t\n\t\tYou passed out, but when you woke, that vision remained, your first sight of a deeper world.  You would sing one day, with that world, with the stars.\n\t\t\n\t\tBut first, you had to grow up.\n\t\t*set charm +10\n\t\t*goto life_path\n\t#I ate the star.\n\t\tYou pressed the star past your open lips, tasted lightning on your tongue, and swallowed; liquid metal seared your esophagus, and you fell back onto the dead grass, screaming.  Galaxies wheeled above you, moonlight unbearably sharp.  You closed your eyes but that only replaced the punishing stars with another vision.\n\t\t\n\t\tThis is the world beneath the world: a vast net of souls and exchange, a pulsing network of life and story and bargain and consequence.  You see the terms of the Great Deal, the arguments and conditions upon which your world depends.\n\t\t\n\t\tYou could join that bargain.  Shape it.  But first you had to grow up.\n\t\t*set craft +10\n\t\t*goto life_path\n\t#I watched the star as it died.\n\t\tYou sat cross-legged on the grass and watched the star fade, slowly, through the night: first the outer edges of its corona died, and then the death crept inward.  Brilliance gone, you could trace its skeleton, its structure.\n\t\t\n\t\tHours passed.  The star was a dying coal in your cupped palms.  Your eyes followed it down, and as it faded you saw more, the fainter, subtler world that endures when you close your eyes: a vast net of souls and exchange, a pulsing net of life and story and bargain and consequence.  You could parse it all, if only you had time.\n\t\t\n\t\tWhen you woke up with the dawn, the vision had vanished, but the image remained.  You'd learn the world's secret ways.  But first you had to grow up.\n\t\t*set cunning +10\n\t\t*goto life_path\n\n*label life_path\nAnd growing up presented its own challenges.  You were…\n\n*choice\n\t#A beggar.\n\t\t…a child of hunger and circumstance, a drifter and occasional thief.  You grew hard, and you grew strong, and you set your sights on the high places of the world.  You would rise, or you would pull them down trying.\n\t\t\n\t\tHard to rise from such circumstances to the heights of the Hidden Schools.  Not impossible, but almost.  Your classmates were soft by comparison.\n\n\t\t*set background \"beggar\"\n\t\t*choice\n\t\t\t#And I told them so.\n\t\t\t\t*set gunner +20\n\t\t\t\t*set soul -500\n\t\t\t\t*set power +10\n\t\t\t\t*goto School\n\t\t\t#But I hid my contempt from them.\n\t\t\t\t*set gunner -20\n\t\t\t\t*set cunning +10\n\t\t\t\t*set soul -500\n\t\t\t\t*goto School\n\t\t\t#I envied them that security, and tried to blend in.\n\t\t\t\t*set gunner -10\n\t\t\t\t*set charm +10\n\t\t\t\t*set soul -500\n\t\t\t\t*goto School\n\t#Poor.\n\t\t…a scrapping farmer's child on the edge of the desert, your people survivors of the God Wars.  But city lights always beckoned behind the horizon, and your infant stirrings of power grew.\n\t\t\n\t\tYou set your sights upon the Hidden Schools, where professors who have slain gods in single combat teach their dark Craft to the next generation.\n\t\t*set cunning %+10\n\t\t*set power %+10\n\t\t*set gunner %+10\n\t\t*set soul -250\n\t\t*set background \"poor\"\n\t\t*goto School \n\t#Comfortable.\n\t\t…a merchant's child, supported and loved.  You were the product of your family's dreams, and of their determination to rebuild after the God Wars decimated Grandfather's business.  From the first day you showed interest in the Craft, your destiny was never in doubt.  You were bound for the Hidden Schools, to learn sorcery.\n\t\t*set background \"comfortable\"\n\t\t*set debt -50000\n\t\t*goto School\n\t#Rich.\n\t\t…a scion of a grand old family, with connections and powers stretching back  thousands of years, to the old days when gods ruled the world and human beings did not control their own destiny.\n\t\t\n\t\tThe God Wars destroyed mountain ranges, shattered continents, smote the gates of many heavens—but wealth has a habit of surviving.  Your family is not what it once was, but move by move your clan has reclaimed its ascendancy.\n\t\t\n\t\tAnd you are a pawn in that generations-long struggle for privilege and position.  Despite your (in Grandfather's eyes) foolish decision to attend the Hidden Schools rather than focusing your efforts on the family Concern.\n\t\t*set background \"aristo\"\n\t\t*comment I'd set it to \"aristo swine\" but I think that takes too long to type\n\t\t*set debt -100000\n\t\t*set soul +500\n\t\t*goto School\n\n*label School\n*page_break\n\nYou developed, in those conditions, from child to ${char_binary}.  Here's a cutting, tumbling shard of lips and skin—a first kiss…\n\n*choice\n\t#A girl I knew.\n\t\tA bright afternoon, a brief rest, a pressure of lips and hands and bodies.  Neither one of you was very good at kissing, or at anything else you tried, but it was a start, and it was sweet.  You wonder what became of her.\n\t\t\n\t\tYou'll never know.\n\t\t*set first_kiss \"girl\"\n\t\t*goto School_2\n\t#A boy I knew.\n\t\tA bright afternoon, a brief rest, a pressure of lips and hands and bodies.  Neither one of you was very good at kissing, or at anything else you tried, but it was a start, and it was sweet.  You wonder what became of him.\n\t\t\n\t\tYou'll never know.\n\t\t*set first_kiss \"boy\"\n\t\t*goto School_2\n\n\n*label School_2\nMore flashes from your years at the Hidden Schools, where you studied the dark arts men call Craft.  A century ago, you would have been burned at the stake for learning these skills—how to raise the dead from their graves, how to hold the power of the gods in your own hands.  Then the God Wars happened, and humans won.  The Hidden Schools rose in defiance of divine authority, and life became a lot better for people who chose to twist natural law in to their whims.  People like you.\n\nYou see, you remember…\n*temp lovers false\n*choice\n\t#Hours and hours of studying, sweating, bent at my desk.\n\t\tSo many exams.  Demonic voices in dark rooms.  Pentagram after pentagram, drawn by acid on stone, inscribed with forgotten runes.\n\t\t\n\t\tYou summoned demons.  You banished them again.  You raised men from the dead and made them walk, made them fight, made them sing.\n\t\t\n\t\tYou walked a lonely road, and gained strange powers there.\n\t\t*set gunner %+20\n\t\t*set craft %+40\n\t\t*set power %+20\n\t\t*set cunning %+10\n\t\t*goto AndThen\n\t#Keg stands and drunken revels, dancing, flesh, and joy.\n\t\tMemories of flesh and music.  The world spun as you hung suspended above it: a thousand feet in the air and still you walked the razor's edge.\n\t\t\n\t\tLovers' lips and hands and bodies flash and pass into darkness.  The Hidden Schools were the world's greatest party, all the finest minds of your generation gathered into one place and compressed until they either collapsed, or decided to explode.\n\t\t\n\t\tYou exploded.\n\t\t\n\t\tEvery moment's zenith had its nadir.  The one time after your Necro final you ended up wandering drunk through a bad part of southern Oxulhat, and got beaten black and blue by some people you shouldn't have bothered.  Another morning you woke on the Sevenfold Tower without your pants—either kind of pants.  But it was a good run.\n\t\t*set lovers true\n\t\t*set gunner %-20\n\t\t*set charm %+40\n\t\t*set power %+20\n\t\t*set craft %+10\n\t\t*goto AndThen\n\t#The gym.  The track.  Books when I had to, but always the field.  \n\t\tYou lived a life of iron.  The Hidden Schools for you were one long, slow, tooth-grinding max load rep.  Any time you weren't in the gym or on the field, you spent in books.  Your body, after all, would only last so long.\n\t\t\n\t\tYou broke your arm once in a clutch.  Pressed harder and harder to make that final yard.  Felt something snag your arm.  Ignored it.  Realized, when the ref called time, that your forearm hung at an odd angle from your elbow.\n\t\t\n\t\tYour teammates bore you on their shoulders, and you bore them in turn.  You sweated together.  You bled together.  You never were the smartest, but when you set yourself to a thing, it happens.\n\t\t*set gunner %+10\n\t\t*set charm %+20\n\t\t*set craft %+10\n\t\t*set power %+40\n\t\t*goto AndThen\n\t#Sneaking through and around the rules.\n\t\tYou climbed the Sevenfold Tower in a thunderstorm to see the light that played among its many tines.  What you saw there you've never told a single soul.\n\t\t\n\t\tProfessors warned you to stay within the rules, not to meddle in matters you lack the context to comprehend.  Yet you were the first in your class to wake a corpse from slumber.  Admittedly, it attacked the freshman dorms and started a zombie plague that almost infected the whole school.  Nobody tied that to you, though!  At least, not officially.\n\t\t\n\t\tYou learned the Hidden Names of Professor Halcyon.  You found six of the seven Immaterial Volumes of the Great Library.  You think you caught a glimpse of God—or, a God at least—in the outer reaches of the astral plane.  Once.\n\t\t\n\t\tYou were probably a bit unhinged.  But damn if you weren't unhinged in style.\n\t\t*set gunner %-10\n\t\t*set cunning %+40\n\t\t*set craft %+20\n\t\t*set power %+10\n\t\t*goto AndThen\n*label AndThen\n\nThe Hidden Schools were a realm of darkness and study, but no one ever accused the students there of monastic discipline.  What pleasures did you indulge in?  What loves?  What faces, what bodies, reflect in the falling shards of what used to be yourself?\n\n*choice\n\t*if (not(lovers)) #There was no time for love.\n\t\t*set power %+10\n\t\tYou walked a path.  No needs of the flesh would tear you from it.\n\t\t*goto AndThen_2 \n\t*if (first_kiss=\"boy\") #I discovered that I loved women.\n\t\t*set charm %+10\n\t\tYour career at the Hidden Schools, away from everything you thought you'd known, was an archaeology of the mind.  By brushing and chipping away ossified pieces of your former life, you learned yourself: who you were, and what—and whom—you liked.  Your first kiss with a woman was the opening of a door.  Many more followed.\n\t\t*goto AndThen_2 \n\t*if (first_kiss=\"girl\") #I discovered that I loved men.\n\t\t*set charm %+10\n\t\tYour career at the Hidden Schools, away from everything you thought you'd known, was an archaeology of the mind.  By brushing and chipping away ossified pieces of your former life, you learned yourself: who you were, and what—and whom—you liked.  Your first kiss with a man was the opening of a door.  Many more followed.\n\t\t*set Ash_gender \"male\"\n\t\t*set Ash_pro \"he\"\n\t\t*set Ash_pro_cap \"He\"\n\t\t*set Ash_pro_pos \"his\"\n\t\t*set Ash_pro_obj \"him\"\n\t\t*set Ash_pro_abs \"his\"\n\t\t*set Ash_voc \"Mr.\"\n\t\t*set Ash_binary \"man\"\n\t\t*set Ash_hair \"blond\"\n\t\t*set Ash_craftsperson \"Craftsman\"\n\t\t*set Ash_pro_abs_cap \"His\"\n\t\t*set Ash_pro_pos_cap \"His\"\n\t\t*set Ash_pro_self \"himself\"\n\t\t*goto AndThen_2\n\t*if (first_kiss=\"boy\") #I wanted men, and found men who wanted me.\n\t\t*set charm %+10\n\t\tThey were strong, they were brittle, they were brilliant, they were shortsighted, they were beautiful, they were unformed.  In short, they were young, and so were you.\n\t\t\n\t\tBut the process was fun for all involved.\n\t\t*set Ash_gender \"male\"\n\t\t*set Ash_pro \"he\"\n\t\t*set Ash_pro_cap \"He\"\n\t\t*set Ash_pro_pos \"his\"\n\t\t*set Ash_pro_obj \"him\"\n\t\t*set Ash_pro_abs \"his\"\n\t\t*set Ash_voc \"Mr.\"\n\t\t*set Ash_binary \"man\"\n\t\t*set Ash_hair \"blond\"\n\t\t*set Ash_craftsperson \"Craftsman\"\n\t\t*set Ash_pro_abs_cap \"His\"\n\t\t*set Ash_pro_pos_cap \"His\"\n\t\t*set Ash_pro_self \"himself\"\n\t\t*goto AndThen_2 \n\t*if (first_kiss=\"girl\") #I wanted women, and found women who wanted me.\n\t\t*set charm %+10\n\t\tThey were strong, they were brittle, they were brilliant, they were shortsighted, they were beautiful, they were unformed.  In short, they were young, and so were you.\n\t\t\n\t\tBut the process was fun for all involved.\n\t\t*goto AndThen_2 \n\t#I wanted both men and women.\n\t\t*set charm %+10\n\t\tYou chose the ones you loved, no matter the flesh they wore.  They were strong, they were brittle, they were brilliant, they were shortsighted, they were beautiful, they were unformed.  In short, they were young, and so were you.\n\t\t\n\t\tBut the process was fun for all involved.\n\t\t*set character_is_bi true\n\t\t*temp coin_flip\n\t\t*rand coin_flip 1 2\n\t\t*if coin_flip = 2\n\t\t\t*set Ash_gender \"male\"\n\t\t\t*set Ash_pro \"he\"\n\t\t\t*set Ash_pro_cap \"He\"\n\t\t\t*set Ash_pro_pos \"his\"\n\t\t\t*set Ash_pro_obj \"him\"\n\t\t\t*set Ash_pro_abs \"his\"\n\t\t\t*set Ash_voc \"Mr.\"\n\t\t\t*set Ash_binary \"man\"\n\t\t\t*set Ash_hair \"blond\"\n\t\t\t*set Ash_craftsperson \"Craftsman\"\n\t\t\t*set Ash_pro_abs_cap \"His\"\n\t\t\t*set Ash_pro_pos_cap \"His\"\n\t\t\t*set Ash_pro_self \"himself\"\n\t\t\t*goto AndThen_2\n\t\t*goto AndThen_2 \n\n*label AndThen_2\n\nAnd then you graduated, and went to work.\n\n*finish_advertisement\n\n", "temptation": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 7: Temptation\n\n*comment Temporary Variables Here!\n\n\nWe have three potential romances:\n\nVega\nChen\nWakefield\n\nWhat do we do?\n\nOptions:\n1. a scene that engages the three of them (very tangled)\n2. three microscenes depending on the degree of your relationship with each.\n\nSomething has to give.  ", "thefirstcase": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 3: The First Case\n\n*temp Percent_Complete 20\n*temp lie false\n\n*if craft > 60\n\t*comment CraftStatTest\n*if cunning > 60\n\t*comment CunningStatTest\n*if charm > 60\n\t*comment CharmStatTest\n*if power > 60\n\t*comment PowerStatTest\n\n\n*comment These next variables represent a trinary situation.\n*comment If we don't encounter the relevant branch, they remain at 2\n*comment If we do encounter the relevant branch, they're set to 0 (false) or 1 (true)\n*comment In principle we could use any number of representative outcomes—the important\n*comment thing is that there be an 'undefined' outcome to flag that the player did *not*\n*comment take the path in question.\n\n*temp Cass_Distract 2\n*temp Correct_Vega 2\n*temp Chat_With_Stone false\n\n*temp Ward false\n*temp No_Authority false\n*temp Denial false\n\n*set sleep_difficulty (round((((1-3)/9)*sleep)+20) + round(debt / 20000))\n\n*comment This will create a difficulty modifier ranging from -2 (a small bonus in case of high sleep) to +18 (a high penalty in case of low sleep), and an additional penalty somewhere from 0 (no student debt) to 10 (high student debt)\n\n*temp sleep_warning \"\"\n\n*if sleep \u003c 90\n\t*set sleep_warning \"  You hold back a yawn.  Too much work recently.  Always too much work.\"\n*if ((sleep \u003c 90) and (commute = \"long\"))\n\t*set sleep_warning &\"  Every minute on the trolley from the District is another minute you're not sleeping.\"\n*if sleep \u003c 90\n\t*set sleep_warning &\"  Anyway.\"\n*advertisement\n\nYou stand in a dark room, inside a glowing pentacle, and hold a knife of lightning to your wrist.\n\nSomewhere a clock strikes midnight.${sleep_warning}\n\nIt's time to work.  As always.\n\nYou press the knife point into your skin.  A drop of blood wells up.  You pull the blade away, and the blood drop falls, round and reflective, to the floor.  And when it splashes there, you fall, too.\n\nYou fall into the world of gods.\n\n*page_break\n\nThe material realm breaks around you, and for a moment you feel yourself a gnat passing through a beam of light, revealed to enormous beings who normally would not notice something so small.  But in this instant of exposure they might well reach out and destroy you, for their own amusement or only to pass the time.\n\nYou leave the light and find your destination.  You hover before a wall woven by spiders out of silver webs.  Most of the patterns are abstract, but a few resemble faces, the faces of people you know, screaming.\n\n*page_break\n\nThis has been the last three months of your life.  Transdimensional Thaumaturgics, your client, contracted with the demonic consortium of Akargath to build an enormous hydro project in the Southern Kathic jungle.  The demons then claimed the project was as much their property as TT's, which would give them a foothold in your world, a territory through which they could pass at will from their reality to yours, unlimited by the bonds of a summoning contract.  They would stride across the earth like gods.\n\nObviously, this is a bad outcome. \n\nYou've been tasked with document review, and minor ward maintenance.  How have you been handling these responsibilities?\n\n*choice\n\t#I've worked late every day, on my own.\n\t\t*set power %+10\n\t\t*set sleep %-10\n\t\t*set gunner %+10\n\t\tYou're exhausted, but you've been able to maintain the barrier between your world and the demons'.  Though if they press harder, you're not sure you could hold up against a direct attack.\n\t\t*goto found_something\n\t#I've searched for patterns in the demons' strategy, trying to work smarter.\n\t\t*set cunning %+10\n\t\tThe demons have been exploiting the contract in a predictable pattern, pressing against flaws in the definition of ownership.  You think you understand their strategy, but as yet, they've made little progress.\n\t\t*goto found_something\n\t#I've created an elaborate piece of Craft to do most of the work for me.\n\t\t*set craft %+10\n\t\t*set sleep %+10\n\t\tThe system you've conjured isn't particularly smart, but it can crawl over the massive wall-web of the contract, searching for weaknesses you've defined.  Which, in turn, leaves your mind and time free for other work.\n\t\t*goto found_something\n\t#I'm working in a team with my colleagues.\n\t\t*set gunner %-10\n\t\tMany hands make light work, and one advantage of working with a big firm like Varkath Nebuchadnezzar is that you have many hands available.\n\t\t\n\t\tOf course, working so closely with others reduces your chance of looking like a hero, but there are more important things than heroism.  Success, for example.\n\t\t*goto found_something\n\n*label found_something\nYou spend hours combing through the contract-wall, comparing it point by point to the written descriptions of the deal Transdimensional Thaumaturgics offered you.  \n\nThis is a bigger version of the classic summoning contract, in the same way a container ship is a bigger fishing boat.  The principle's the same, at least.  Demons hail from a realm parallel to your own; local laws of physics don't bind them.  When offering demons a path into your own reality, a good summoner can define their powers to exceed those of most humans.  But if demons could pass into your world without a clear contract, they would lack limits—singularities of possibility striding unrestrained across continents.  And singularities are bad.  A few demons were unleashed back during the God Wars, and the world still shudders from the consequences.\n\nSo you review the deal again. And again.\n\nAnd, at three o'clock in the morning, you say the words no one connected with the Craft ever wants to say, or hear.\n\n\"Huh.  That's funny.\"\n\n*page_break\n*temp chen_callback \"\"\n*if chen_sex > 0\n\t*set chen_callback \"Since casino night, the two of you have been all business.  No time for anything else, even nostalgia.  \"\n\nYou barely trust your own eyes.  Fortunately you have another pair to hand.  Cass Chen is also working late.  \"Hey, Cass.  Can you take a look at this?\"\n\nShe flies over from her portion of the wall.  These last few months haven't worn well on Cass.  She has dark circles under her eyes, and her face looks strained.  ${chen_callback}\"What's the problem?\"\n\nYou show her.\n\nThere's a hole in the wall.  A tiny hole, but demons don't need much room to wriggle through.\n\n\"We need to tell someone about this,\" she says.\n\nYou nod, and rise into the real world.\n\n*page_break\n\nYou stumble back into your own skin.  Flesh fits tight after freedom, and your wrist hurts like hell.  Mouth dry, world whirling, you turn for the door.  Have to grope twice in the dark to find the handle.\n\nYou wander down the ghost-lit hallway outside, looking for someone, anyone.  Soon, you find Vega: Halcyon Vega y Alatriste, elegant, tall, slim, dark-eyed and vicious, lately of counsel and a rapid climber in the firm.  He's in charge of the warding project, among other things.\n\nHe seems shaken, perhaps by the look on your face.  \"What's happened?\"\n*label tell_vega\n*choice\n\t#\"I found something.\"\n\t\t*gosub trial_end\n\t\t*set gunner %+10\n\t\t*goto Truth\n\t#\"We found something.\"\n\t\t*gosub trial_end\n\t\t*set gunner %-10\n\t\t*goto Truth\n\t#I lie. \"Nothing's wrong.\"\n\t\t*gosub trial_end\n\t\t*set lie true\n\t\t*goto Lie\n\t*hide_reuse #\"What's wrong with you?  You look tense.\"\n\t\t*set vega %+10\n\t\t\"I am tense,\" he says.  \"I've slept two hours a night for the last few months, just like the rest of us.  Now.  What's wrong?\"\n\t\t*goto tell_vega \n\t\t\n*label Truth\n\n\"There's a hole in the web,\" you say.  \"Looks like the contract isn't as complete as we thought.\"\n\nYou didn't think his brow could furrow much deeper.  \"Does it look like the demons know?\"\n\n\"No.\"\n\n\"We'll bring it up at the morning meeting,\" he says.  \"And.  ${name}.  Good job.  Get some rest, okay?\"\n\n*choice\n\t#\"You could use some, too.\"\n\t\t\"Rest.\"  He says the word the way some people say [i]heaven[/i].  \"When I'm dead, maybe.  Or when the case is over.  Whichever comes first.\"\n\t\t\n\t\tYou leave him, this worried, haunted man, in the hallway, and go home yourself to sleep.\n\t\t*set sleep %+10\n\t\t*goto Morning_Meeting\n\t#\"Thanks.\"\n\t\tHe doesn't seem to register your words.  You go home, though, and dream of demons, and holes in the world.\n\t\t*set sleep %+10\n\t\t*goto Morning_Meeting\n\t#\"I'm not leaving yet.  There's still work to do.\"\n\t\t*set gunner %+10\n\t\t*set sleep %-10\n\t\t\"Fair enough,\" he says.  \"Well.  Looks like I need to prepare for the meeting tomorrow.  I'll see you then.\"\n\t\t\n\t\tHe walks off down the hallway, leaving you alone, with your work.\n\t\t*goto Morning_Meeting\n\n*label Lie\n\n\"Nothing,\" you say.  \"Just stretching my legs.\"\n\nYou found this hole.  You and Cass.  If you tell Vega, he'll take the credit.  It's what you would do in his position.\n\nBesides, Vega's a popinjay, strutting around worrying over the case as if he's the only one with a reputation on the line.\n\nYou return to the pentacle room, relatively certain you've done the right thing.  Relatively.\n\n*set gunner %+10\n*set honor %-30\n*goto Morning_Meeting\n\n*label Morning_Meeting\n*page_break\n\nThe next morning you meet the client in a nightmare.\n\nIt's a straightforward nightmare as these things go: an immense scaly thousand-footed beast lies belly-up, and a table rests on a stretch of its stomach.  You and the others sit on the beast's upturned feet.\n\nEveryone's here: Damien Stone, the name partner in charge of the case, a heavy, dark Craftsman in his late sixties; Vega, in pressed suit jacket;
