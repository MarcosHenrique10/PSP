ase_Choice\n\n*label Contract_Fail\n\nShe's not moving, not any time soon anyway.  You hate negotiating from a point of weakness.  \"Look,\" you say.  \"Your contract obviously won't hold for long.\"\n\n\"No,\" she says.  \"But the choice remains.  He goes back to his home plane, or he gets back to work.\"\n\nShe opens a drawer.  You tense, thinking [i]weapon[/i], but she produces a pack of cigarettes instead, tamps them down, removes one, and lights it.\n\n*if visa = false\n\t\"Someone else could pick him up,\" she says.  \"Get him, as you say, out of my hair.  But not without a visa.  And good luck getting one of those.\" \n*comment endif\n\nYou won't get any further with her.  This hasn't gone well, but still.  Time to leave.\n\n*goto Case_Choice\n\n*label Embassy\n\nThere is a demonic embassy in Shikaw, down by Troutman and Hawkes—surrounded by tall fences and flickering lights in colors not even the city's most fashion-conscious have ever been able to name.  Getting in isn't the problem.  Finding what you want, that's the rub.  Nobody does bureaucracy quite like the denizens of the hell realms.\n\nIn a situation like this, a little sponsorship can go a long way.  A word from a friend in a high place could pave your path.\n\nYou do have friends in high places, don't you?\n\n*choice\n\t#I ask Stone for a reference.\n\t\t*set Stone %+10\n\t\tYou write Stone a quick, formally worded request—you don't want to waste his time, but he's your best option.\n\t\t\n\t\t*if Stone > 50\n\t\t\tYou don't receive a reply for a few hours, but when you do, his courier bears the answer you hoped—and a folded envelope bearing Stone's seal.  A letter of introduction.  That's all you could hope for.\n\t\t\t\n\t\t\tOff, then, to the embassy!\n\t\t\t*set Embassy_Influence true\n\t\t*if Stone \u003c= 50\n\t\t\tThe reply comes a few hours later, and you can tell by the slender heft of the envelope that the answer isn't encouraging.  In fact, it's one word: \"Busy.\"\n\t\t\t\n\t\t\tFair enough.  You can handle this yourself.  Off, then, to the embassy!\n\t\t*goto Embassy_Gates\n\t#I ask Varkath for a reference.\n\t\t*set Varkath %+10\n\t\tYou write Varkath a quick, formally worded request—you don't want to waste his time, but he's your best option.  Besides, as the managing partner you figure he'll have the most influence.\n\t\t\n\t\t*if Varkath > 50\n\t\t\tYou don't receive a reply for a few hours, but when you do, his courier bears the answer you hoped—and a folded envelope bearing Varkath's clenched-fist seal.  A letter of introduction.  That's all you could hope for.\n\t\t\t\n\t\t\tOff, then, to the embassy!\n\n\t\t\t*set Embassy_Influence true\n\t\t\t*set embassy_diff -10\n\t\t*if Varkath \u003c= 50\n\t\t\tThe reply comes a few hours later, and you can tell by the slender heft of the envelope that the answer isn't encouraging.  In fact, it's one word: \"Busy.\"\n\t\t\t\n\t\t\tFair enough.  You can handle this yourself.  Off, then, to the embassy!\n\t\t*goto Embassy_Gates\n\t#I ask Nebuchadnezzar for a reference.\n\t\t*set Nebuchadnezzar %+10\n\t\tYou write Nebuchadnezzar a quick, formally worded request—you don't want to waste her time.  You don't have much of a bond with her, but since she sponsored the case in question, she might be more interested in its outcome.\n\n\t\tYou don't receive a reply for a while, but a few hours after lunch her courier arrives, bearing the answer you hoped—and a folded envelope marked with her crossed-wands seal.  A letter of introduction.  You hope it's enough to speed your way.\n\t\t*set Embassy_Influence true\n\t\t*goto Embassy_Gates\n\t#No reference.  I go on my own.\n\t\t*set power %+10\n\t\tNo sense bothering the partners with a case like this.  True, demons thrive on hierarchy and authority, but the embassy has worked well with Varkath Nebuchadnezzar in the past, and you should be able to trade on the firm's own reputation to get what you want.\n\t\t\n\t\tYou hope.\n\t\t*goto Embassy_Gates\n\n*label Embassy_Gates\n*set Time +1\n*page_break\nThe demons built their embassy south and inland, on the ashes of buildings burned seventy years ago when the God Wars came to Shikaw.  Each city bears the Wars' scars in its own way; in ever-striving Shikaw, land of high property values, the damage offered a rare opportunity for new architecture.\n\nEmbassies rise here in a long row, each constructed after its own local custom: churches of Kos Everburning beside the mummy-palaces of Southern Kath; Iskari squid-temples and mead halls of the warrior-kingpins of northern Skael rub shoulders with somber black glass outposts of Dresediel Lex and Regis and Alt Selene.\n\nAnd then there's the Hell Embassy. \n\n*page_break\n\nThe Hell Embassy's hooked-chain fences enclose an area twice the footprint of any of its rivals, though the building within is small, a needle of glass barely wide enough for a narrow door.  You know better than to judge by outward appearances: within the fence, the laws of your universe do not rule uncontested.\n\nYou present your papers at the gate.  A creature with a liquid-metal face and eyes like a child's accepts your ID, and glances from you to the picture and back four times. At last, it ushers you inside.\n\nYou step through the gates, and for a moment you're drowning.  The sky above you reddens, then purples, then settles to its normal blue.\n\nYou advance toward the tower within the gate, which is much bigger than it seemed from outside.  The walk takes longer than you thought, too.\n\n*page_break\n\nThe doorman, who looks almost exactly human save for his teeth, directs you up the stairs to the tenth floor.  You climb, winding, alone.  Perhaps each person who comes here climbs the stair alone.\n\nThe door on the tenth floor opens onto a chamber the size of a ballroom but without any of a ballroom's ornament or charm.  Enormous crystalline beetles squat behind tall counters, discussing paperwork with a number of humans, none of whom seem any more eager to be here than you.  Mechanical tickers over the demons' heads display numbers.  A human at one counter starts shouting at the counter attendant, and is dragged away by a few almost-men in security uniforms.  The number above that counter increments from 67 to 68.\n\n*if (Embassy_Influence)\n\tYou take a number and sit down to wait, but almost as soon as you sit, you feel a scalpel-touch at your shoulder and look up to see a faceless man with long knives for fingers.  He hands you a piece of paper.  \"Please come with me.\"\n\t\n\tYou don't see much of a choice.\n\t*goto Back_Room\n\nYou take a number, sit down, and wait.  And wait.  And wait.\n*page_break\n\nAnd wait some more.\n\n*page_break.\n\nAt last, your number ticks up over a counter.  You approach the giant beetle there, but you are intercepted by a faceless man in a black suit, with long knives for fingers.  He hands you a piece of paper.  \"Please, come with me.\"\n\nMight as well.\n\n*goto Back_Room\n\n*label Back_Room\n\nThe faceless man leads you back to the stairs; you climb three flights, then turn around and descend five flights more.  The door on this floor, which you don't remember passing on your climb up, opens onto a closet-sized room that looks exactly like your office back at the firm.  Exactly.\n\nRight down to the version of you sitting behind the desk.\n\n\"What can we do for you?\" the demon-you asks.\n\n*if embassy_influence\n\t*set embassy_diff -10\n\n*choice\n\t#\"I need your help.\"\n\t\t*set charm %+10\n\t\t\"Don't you mean [i]my[/i] help?\" the demon-you asks.\n\n\t\t\"Kathic pronouns don't work that way.\"\n\t\t\n\t\tDemon-you blinks.  \"Oh.  I'm sorry.  I'm new at this doppelgänger thing.\"\n\t\t\n\t\tYou sigh.  \"I represent a person of your realm who's been summoned to ours under unfair terms.\"\n\t\t\n\t\t\"Did he consent to the terms?\"\n\t\n\t\t\"He did.  It was his only way to come here.  He was refused an exit visa.  I'm hoping we can fix that last part.\"\n\t\t\n\t\t\"If he was refused a visa, I can't help you.\"\n\t\t\n\t\t\"Look.  This guy's been—\"  You stop yourself from saying, \"through hell and back.\" \"He's had a really hard time.  All I ask is for you to look at his paperwork again.  If you help me, maybe I can help him.\"\n\n\t\t*if ((charm - (sleep_difficulty)) > embassy_diff)\n\t\t\t*goto Embassy_Succeed\n\t\t*else\n\t\t\t*goto Embassy_Fail\t\n\t#\"You can issue a post-dated exit visa for one of your citizens, pursuant to form XJ-723-99, a completed copy of which I have here.\"\n\t\t*set craft %+10\n\t\t\"Let me see that.\"  You pass the relevant paperwork to the demon-you, and you don't even flinch when your hand brushes your hand and you feel it from both directions.  At least you don't think you flinch.\n\t\t\n\t\t\"This form,\" ${char_pro} says, \"is only for individuals previously refused visas.  Also, the number of entries indicated here is 'zero'.\"\n\t\t\n\t\t\"The person in question was previously refused a visa, and has ended up in this world anyway.  I want to legitimatize his position, to extract him from an exploitative work contract.  You see, I've included your form 99b underneath, with the details.\"\n\t\t*page_break\n\t\t*if ((craft - (sleep_difficulty)) > embassy_diff)\n\t\t\tDemon-you shakes ${char_pro_pos} head.  \"In this situation, we'll also need a cross-signed 1073-d, with support from a local sponsor.\"\n\t\t\t\n\t\t\t\"Next page,\" you say, and allow yourself a small, self-satisfied smile as ${char_pro} turns the page and scowls at the perfectly-completed form.\n\t\t\t*goto Embassy_Succeed\n\t\t*else\n\t\t\tDemon-you shakes ${char_pro_pos} head.  \"In this situation, we'll also need a cross-signed 1073-d, with support from a local sponsor.\"\n\t\t\t\n\t\t\tDamn.  You knew you'd forgotten something.  \"I can serve as the sponsor.\"\n\t\t\t\n\t\t\tYou frown at yourself.  \"You'd need to return on a subsequent visit.  And there's five to seven days of processing time.  I'm sorry, but those are the rules.\"\n\t\t\t\n\t\t\tThose may be the rules, but you can tell that demon-you isn't all that sorry.\n\t\t\t*page_break\n\t\t\t*goto Embassy_Fail\t\n\t#\"I'm here to offer you a chance to be a hero.\"\n\t\t\"I am not in the hero business,\" demon-you says.\n\t\t\n\t\t\"A high-placed scion of an influential line of demons has been imprisoned by an unfair contract.  He can't break free or seek other employment without a visa that lets him be on this plane.\"\n\t\t\n\t\t\"Why doesn't he have one?\"\n\t\t\n\t\t\"He was denied.\"\n\t\t\n\t\tDemon-you frowns.  \"In which case I can't help you.  Paperwork is paperwork.\"\n\t\t\n\t\t\"Which made sense in your world—\"\n\t\t\n\t\t\"Don't you mean, 'my world?'\"\n\t\t\n\t\t\"Yes,\" you say.  \"But Kathic pronouns don't work the way you think.  You want to be creepy, but you're just being confusing.\"\n\t\t\n\t\tDemon-you blinks.  \"Oh.  I'm sorry.  I'm new at this doppelgänger thing.\"\n\t\t\n\t\tYou sigh.\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Look,\" you say.  \"The visa denial made sense in your home plane, because whoever was leaning on the bureaucracy there wanted to keep this guy from getting to ours.  But he got out anyway, and now he's being exploited here.  This is your chance to get him out, which I'm sure his family would appreciate.  And in the bargain, I'll throw in the identity of the Concern that summoned him.  Something for your people to shut down on this side of the veil.  What do you say?\"\n\t\t*if ((cunning - (sleep_difficulty)) > embassy_diff)\n\t\t\t*goto Embassy_Succeed\n\t\t*else\n\t\t\t*goto Embassy_Fail\t\n\n*label Embassy_Succeed\n*page_break\nDemon-you drums ${char_pro_pos} fingers on the table.  You wait.\n\n\"I can offer him the visa you want,\" ${char_pro} says at last.  \"But it will only work so long as he maintains a gainful employment contract here.  I can't do any better than that, and even so I know my bosses will hate this.\"\n\n\"That's enough,\" you say.  \"Thank you, so much.  It's been a pleasure.\"\n\nDemon-you doesn't seem so sure, but shakes your hand anyway.  You feel the handshake from both directions, and it feels good.\n\nIt's not proper to grin as you're leaving a successful interview, but damn if you don't do it anyway.   \n*set Visa true\n*goto Case_Choice\n\n*label Embassy_Fail\nDemon-you drums ${char_pro_pos} fingers on the table.  You wait.\n\n\"I can't do it,\" ${char_pro} says at last.  \"It's more than my job is worth to grant a visa to someone who has already been denied.  You understand.\"\n\n\"But the circumstances—\"\n\n\"The circumstances don't matter.  Procedure matters, and procedure's against you on this one.  I'm sorry.\"\n\nBut demon-you can't quite conceal a smile, and you doubt ${char_pro} is actually altogether sorry.  You leave the embassy, uncertain how to proceed. \n\n*set Visa false\n*goto Case_Choice\n\n*label Klint_Shows_Up\n*page_break\n*if (friend)\n\t${helper_name} finds you as you're getting a coffee and pondering your next steps.  \"There's a demon here who wants to talk to you.\"\n\t\n\t\"I know.  I'm still working on the case—\"\n\t\n\t\"Not R'ok.  Another demon.\"\n\n*if (friend = false)\n\tOne of the office secretaries finds you in the break room pondering your next step.  \"There's a demon here who wants to talk to you,\" he says.\n\t\n\t\"I know.  I'm working on his case—\"\n\t\n\t\"No,\" he says.  \"I mean, a different demon.\"\n\n*page_break\n\nYou don't know how the entity waiting for you in the lobby made it up the elevator, or the stairs for that matter.  It's at least seven feet tall, and ten feet long, a carapace of jet razors, a shield-like face with crimson multifaceted eyes and bobbing antennae.  It wears a necktie, and greets you with a dismissive nod.\n\n\"You are ${name} ${surname}, of this firm?\"  The demon's voice is undoubtedly male.\n\nYou nod.\n\n\"I am K'th'k'lint.  I am here to collect my son from your custody.\"\n\n*fake_choice\n\t#What?\n\t#What!\n\t#What.\n\t\n\"R'ok.  He is an impressionable and wayward boy.  He needs guidance of the sort he will not find in your realm.\"\n\n\"He's here on a contract—\"\n\n\"Which you know is, if not fraudulent, at least exploitative.  It will be broken.  He will return to us.\"\n\n\"That's not yet certain.\"\n\n\"My friend Ms. Nebuchadnezzar contacted me to indicate that you are working on his case.  Take me to him.\"\n\nYou lead the way.\n\n*page_break\n\nR'ok has been drowsing against the table; he looks up, blinking crimson eyes, and straightens as you enter the conference room.  \"I'm sorry,\" he says, \"I was just—\"\n\nHe stops when he sees his father.\n\nK'lint should not be able to pass through the conference room door, but he does—folding himself small along hidden seams, then unfolding to consume much of the conference room's empty space.  The effect's intimidating, as he no doubt expected.  \"Son.  It is time for you to return.  This ${craftsperson} will break the contract binding you here, and we will retreat to our home plane.\"\n\nR'ok turns to you.  \"Is that true?\"\n\n*choice\n\t*if (visa and renegotiated) #\"Not necessarily.  Your son's contract is fixed, and I've found him a visa.  He can stay, if he wants.\"\n\t\tK'lint turns to you, eyes burning.  He is very large, and you're here alone.  \"My son will return with me.\"\n\t\t\n\t\t\"Your attempt to keep R'ok home forced him to accept a contract tantamount to slavery.  I corrected that mistake.  He's free to seek other work now.  If he can't find any, he'll have to go home.\"\n\t\t\n\t\t\"Then he will find no further employment,\" K'lint says, in a voice dripping with menace.  \"I will make sure of that.\"\n\t\t\n\t\tYou meet his gaze.  \"Like you made sure he wouldn't leave home?  He wants this.  And he's strong.  I don't think you can keep it from him, unless you want to break him yourself.\"\n\t\t\n\t\tK'lint remains silent for a long time.  You try to hold his gaze, defiant.  It's hard.\n\t\t\t\t\n\t\t*set Klint %-20\n\t\t*set Rok %+20\n\t\t*goto Best_Bad\n\t\t\n\t*if (renegotiated and (visa=false)) #\"I've renegotiated R'ok's contract for him—it's more durable.  But once it's done, he'll have to go.\"\n\t\tR'ok hangs his head.  You wish you could have done more, but your options were limited.\n\t\t\n\t\t\"Look,\" you say.  \"The contract lets you remain, free—more or less—for a little while.  Then you go back, and you can do this the right way next time.  It's better than nothing.\"\n\t\t\n\t\t\"There will be no next time,\" K'lint says.\n\t\t\n\t\t\"Don't listen to your…father.\"  Your voice still skips when you say \"father.\"  You wonder if R'ok has a mother, too, and if so what [i]she[/i] looks like.  If \"she\" is the right word.  \"This is your option, R'ok.  You take it, and stay here for a little while, or you go home now.\"\n\t\t\n\t\t*set Klint %+10\n\t\t*set Rok %+10\n\t\t*goto Best_Bad\n\t*if (visa and (renegotiated = false)) #\"I've secured R'ok a visa, but I didn't manage to improve his contract.\"\n\t\t\"We have to break your current contract, and send you back.\"  You hate the way R'ok looks at you, as if you're letting him drown.  Giant mantises shouldn't be able to make puppy-dog eyes.  \"But you have your exit visa.  Once you're back home, you can look for better deals.\"\n\t\t\n\t\t\"There will be no deals,\" K'lint says.\n\t\t\n\t\t\"Don't listen to your…father.\"  Your voice still skips when you say \"father.\"  You wonder if R'ok has a mother, too, and if so what [i]she[/i] looks like.  If \"she\" is the right word.  \"This is your option, R'ok.  You take it, and have a chance of coming back.  Or you leave it.  Either way, you're going home.\"\n\t\t\n\t\t*goto Rok_Leaves\n\t#\"It is.  You should go back with your father now, R'ok.\"\n\t\t\"It's the only way for you to be safe,\" you continue.  \"I get what you were trying to do, coming here, but this was the wrong way to do it.\"\n\t\t\n\t\tHe nods, slowly, and sadly.\n\t\t*set Klint %+20\n\t\t*goto Rok_Leaves\n\t*if (visa and ((cunning > 75) or (craft > 75))) #\"Actually, I have a better idea.\"\n\t\t*goto Job_Offer\n\n*label Best_Bad\n\n\"I will stay here,\" R'ok says.  \"And I will return home when the time comes.\"\n\nK'lint and R'ok watch one another for a long while, not moving.  You start to wonder if you should leave, to give them privacy.  At last, K'lint rears up, and speaks.\n\n\"It is well,\" he says.  \"I will leave.\"  And he goes.\n\n*page_break\n\nYou escort him out, then return to the conference room to get R'ok.  The young demon extends one hand.  \"Thank you.  I could not have done this for myself.  I will not be here long enough to help you in return, but perhaps one day I will be able to repay your work.\"\n\n\"It's fine,\" you say, and after a brief hesitation, you take his knife-hand in yours, and shake.  You meet your own eyes in reflection in the black glass of his face.  \"Good luck, R'ok.\"\n\n*set Nebuchadnezzar %+30\n*set Rok_here true\n*achieve rokfix\n*if (Cass_Help or (Pat_Help or Vega_Help))\n\t*goto celebrate\n*else\n\t*achieve roksolo\n\t*goto Nebuchadnezzar\n\n\n*label Rok_Leaves\n\n\"I will go,\" R'ok says at last.  \"Thank you for your work.  I am sorry that I cannot remain to repay you.\"\n\n\"I'm sorry I couldn't do more.\"\n\nHis head bobs beneath the line of his shoulders—nodding, or shrugging.  It's hard to read the body language of demons.\n\nYou escort him out, with K'lint, and though you've helped free him, you wonder as you watch them go which set of chains he prefers.\n\n*set Rok_here false\n*goto Nebuchadnezzar\n\n*label Job_Offer\n\nBoth demons look at you with surprise.  \"What?\"\n\nThere was a time when such sudden focus would have broken you.  Before you came to Varkath Nebuchadnezzar, you'd only ever felt scrutiny this intense from your most vicious professors.  But you're used to judges' hooded stares and to the burning eyes of Deathless Kings by now, and your mouth barely goes dry at all.\n\n\"R'ok has an approved visa, allowing him to work in this realm.  And his current employers have set him an end date.  So I'm going to hire him.\"\n\nK'lint blinks—his red eyes go black, then burn again.\n\n\"The office has an internship program.  It doesn't pay much, but it doesn't ask much either.  R'ok will work here—under our scrutiny.  Is that acceptable, R'ok?\"\n\nThe demon nods.  \"Yes.  Yes, it is.\"\n\nYou turn your attention back to K'lint.  \"So that's settled, then.  Isn't it?\"\n\nAt last, K'lint nods.\n\nThere was a time when he would have been able to see your relief.  Instead, you manage to show him to the door before breaking into a smile.\n\n*set cunning %+20\n*set Nebuchadnezzar %+50\n*set Klint %-20\n*set Rok_here true\n*set Rok_job true\n*if (Cass_Help)\n\t*set Chen %+10\n*if (Cass_Help or (Pat_Help or Vega_Help))\n\t*achieve rokfix\n\t*goto celebrate\n*else\n\t*achieve roksolo\n\t*goto Nebuchadnezzar\n\n*label celebrate\n\"Well,\" you say to ${helper_name}.  \"Shall we go celebrate?\"\n\n*if Cass_help\n\t*page_break\n\tYou and Cass head to CJ's bar down the street, and after dinner and a few drinks you leave the business district's staid brass, dark wood, and leather, and head to a place Cass knows in Lakeshore that serves drinks cheaper than they are good.\n\t\n\tYou finally call it quits after several hours.  Sweaty and sloshed, you stagger back toward the tram, leaning on Cass—or is she leaning on you?\n\t\n\t\"It's nice to have made a difference,\" she says, \"for a change.  To have helped a person.  Or something like a person.\"\n\t*choice\n\t\t#\"That's just what I was thinking.\"\n\t\t\t\"I like you,\" she says, \"you know?  Everyone else, the whole firm, it all seems sometimes like everyone's racing to become a skeleton.  Like there's nothing under their skin but bones.\"\n\t\t\t\n\t\t\t\"I know.\"  You're not certain you do.\n\t\t\t\n\t\t\t\"I'm glad,\" she says, and then the tram comes.  She falls asleep against the window.  You watch her, and wake her when the tram reaches her stop.\n\t\t\t\n\t\t\t\"Thanks,\" she says, before she leaves.\n\t\t\t*set Chen %+20\n\t\t\t*goto Nebuchadnezzar\n\t\t#\"I don't know if we did the right thing.\"\n\t\t\t\"Of course we did.  We helped.\"\n\t\t\t\n\t\t\t\"He's a demon.\"\n\t\t\t\n\t\t\t\"We're all demons to someone,\" she says, and then the tram comes.  She falls asleep against the window.  You watch her sleep, and wake her when the tram reaches her stop.\n\t\t\t\n\t\t\t\"Thanks,\" she says, before she leaves.\n\t\t\t*set Chen %+10\n\t\t\t*goto Nebuchadnezzar\n\t\t*if (Chen > chen_sex_diff) #I kiss her.\n\t\t\tShe kisses you back.  She tastes of whiskey and lipstick and heaven.\n\t\t\t\n\t\t\tAnd she pulls you down, until your ear's even with her mouth.  \"Let's get a room.\"\n\t\t\t*set Chen %+20\n\t\t\t*choice\n\t\t\t\t#\"Yes.\"\n\t\t\t\t\t*label Chen_yes\n\t\t\t\t\tYou find a hotel not far from the lakefront dive.  It's not much, but it has a bed, and a bed's all you need right now.  You lie together, and laugh together, and after a while you scream together.  And when you wake in the morning, she's gone.\n\t\t\t\t\t*set Chen %+20\n\t\t\t\t\t*set Chen_sex +1\n\t\t\t\t\t*goto Nebuchadnezzar \n\t\t\t\t#\"Not tonight.\"\n\t\t\t\t\t\"You're a tease.\"\n\t\t\t\t\t\n\t\t\t\t\t\"We have work tomorrow.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Live a little.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Fine.\"\n\t\t\t\t\t\t\t*goto Chen_Yes\n\t\t\t\t\t\t#\"No.\"\n\t\t\t\t\t\t\t\"Fair enough.\"  She kisses you again.  \"Care to see me home?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThat, at least, you do.  She falls asleep against the window of the tram.  You watch her sleep, and wake her when you reach her stop.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Next time,\" she says, before she leaves.\n\t\t\t\t\t\t\t*goto Nebuchadnezzar\n\n*if Vega_Help\n\t*page_break\n\tOn Vega's suggestion, you repair to a tiny Telomiri restaurant in the Crowns.  The owner knows Vega, which helps, because the restaurant only has seven tables, six of which are occupied, and it's half an hour before closing.  But the host embraces Vega, they talk briefly in Telomiri, and he guides you to a seat.\n\t\n\t\"Old family friend,\" Vega says.\n\t\n\tThe food's delicious: pastas in light pan sauce, singed meats, and wine that tastes like it was stolen from a god's own table, and might well have been.  Just what you need after a long day.\n\t\n\tAfter the meal, Vega walks you to the tram station.  \"I live nearby, but the least I can do is see you on your way.\"\n\t*choice\n\t\t#\"Thanks.  We did good work today.\"\n\t\t\t\"Did we?\"  He shakes his head.  \"I'm not certain.  Demons are not kind, nor are they generous.  You may have helped this one, but who's to know what consequences might ensue?\"\n\t\t\t\n\t\t\t\"We'll deal with the consequences,\" you say, \"when they come up.  We can't shy back from helping people just because we don't know what might happen next.\"\n\t\t\t\n\t\t\t\"Perhaps,\" he says, and bows.  \"Your tram has arrived.\"\n\t\t\t*set Vega %+10\n\t\t\t*goto Nebuchadnezzar\n\t\t#\"I appreciate the company.\"\n\t\t\t\"As do I,\" he says.  \"Your company in particular.  It was a pleasure working with you.\"\n\t\t\t\n\t\t\tThe tram arrives.  You board, and lean against the window, wine-fogged.  The tram lurches to a start, and he recedes into the night.\n\t\t\t*set Vega %+20\n\t\t\t*goto Nebuchadnezzar\n\t\t*if (Vega > vega_sex_diff) #I kiss him.  \"We could go back to your place.\"\n\t\t\t\"We could,\" he says.\n\t\t\t\n\t\t\t\"Let's go.\"\n\t\t\t\n\t\t\tHis apartment's at first glance a nice place, elegant and clean and hung with expensive tapestries probably sent from his family's Old World estate.  But it's the elegance, the cleanliness, that comes from distance.  He doesn't spend much time here.  He doesn't read the few books on these shelves.  This place is a container for a man, more than a home.\n\t\t\t\n\t\t\tFortunately, a container's all you need right now.\n\t\t\t\n\t\t\tWell.\n\t\t\t\n\t\t\tThat, and the man.\n\t\t\t*set Vega_sex +1\n\t\t\t*set Vega %+30\n\t\t\t*goto Nebuchadnezzar\n*if Pat_Help\n\t*comment this is where we need more stuff for Pat!  And it fits here naturally.\n\t*page_break\n\tPat suggests a Talbeg restaurant a few blocks away from work—a small place, its air redolent with cardamom and lemon and sandalwood and fresh coffee.  You toast one another with imported beer.  \"To victory,\" you say.\n\t\n\t\"Victory indeed.\"  He gulps his beer, and exhales.  \"Though I must confess, I am not certain we did the right thing.\"\n\t\n\t\"Saving R'ok?  Helping him slide out from under his father's thumb?  Or, pincer?\"\n\t\n\t\"The boy seems inoffensive,\" Pat says.  \"I wish him the best in his new life.  But I am cautious about anything that increases trade between our world and the demon realms.  Unregulated demonic incursions are too dangerous.\"\n\t*choice\n\t\t#\"That's why we have wards, and Wardwalkers.\"\n\t\t\t*set power %+15\n\t\t\tPat shakes his head.  \"Last-ditch plans and special operations task forces are all well and good, but while I don't argue with their utility they have their limits.  Someday, there will be a confrontation no one expects, of a magnitude we are unprepared to handle.\"\n\t\t\t\n\t\t\t\"But why be nervous about R'ok?  He's a kid.  He's an artist.  Sure, he's also a seven foot tall transparent steel mantis-thing, but that's beside the point.  If we judged everyone on their appearances, I wouldn't have got far in life.\"\n\t\t\t\n\t\t\t\"Today it is the boy,\" Pat says.  \"Tomorrow, who knows?  Without formal treaties, our world and the demon planes exist in a state of mutual uncertainty.\"\n\t\t\t\n\t\t\tThe restaurant suddenly feels much larger, and much colder, than it did when you sat down.  You raise your beer, partly in toast, and partly as a weapon against the encroaching shadows.  \"At least we can profit from that uncertainty in the short term.\"\n\t\t\t\n\t\t\t\"At least,\" he says, and drinks as well.\n\t\t\t\n\t\t\tThe food, when it comes, is warm and hearty, and you almost forget the conversation.  Almost. \n\t\t\t*set ngabe %+10\n\t\t\t*goto Nebuchadnezzar\n\t\t#\"The more we deal with demons like R'ok, the less we have to deal with demons like his father.\"\n\t\t\tPat cocks his head to one side.  \"What do you mean?\"\n\t\t\t\n\t\t\t\"Full-scale commerce with the hell realms is pretty recent.  There's a lot of bad history for both sides to overcome.  Suspicion.  Most people associate the hell realms with nothing but pain and suffering.\"\n\t\t\t\n\t\t\t\"Understandable,\" Pat said.  \"Especially for those who have seen demons on the battlefield.\"\n\t\t\t\n\t\t\t\"Thing is, they don't have much reason to like or trust us either.  The old guard sees us as rivals.  The younger generation could go either way.  When R'ok goes home, he'll be a voice of reason.\"\n\t\t\t\n\t\t\t\"If his own people don't see him as hopelessly corrupted as a result of his time with us.\"\n\t\t\t\n\t\t\t\"There is that risk,\" you say, and raise your beer.  \"But I prefer to look on the bright side.\"\n\t\t\t\n\t\t\t\"That makes one of us.\"  But Pat returns your toast anyway.\n\t\t\t\n\t\t\t*set ngabe %+15\n\t\t\t*set charm %+15\n\t\t\t*goto Nebuchadnezzar\n\t\t#\"Honestly, I'm just interested in seeing what happens when a demon artist starts operating on this plane.\"\n\t\t\tPat cocks his head to the side.  \"What do you mean?\"\n\t\t\t\n\t\t\t\"An artist's work adds even more complexity to raw materials than most high-energy Craft—that complexity makes art a repository for soul, makes it valuable.  Usually we model art as an interplay of karmic fields, right, just like any other kind of invention: the artist's mind is the intersection of a number of different fields, and they manifest that complexity, encapsulate it in a work.  But demons have different bodies, different cultures, different physics and metaphysics even.  When R'ok expresses himself, will his art operate the same way as a human artist's does?  Its capacity, its complexity, might be like nothing we've ever seen before.\"\n\t\t\t\n\t\t\t\"You're saying, what, that you secured his visa for…scholarly purposes?\"\n\t\t\t\n\t\t\t\"I'm saying you should buy his early pieces before people catch on to what they're worth.\"\n\t\t\t\n\t\t\t\"And if your theory's wrong?\"\n\t\t\t\n\t\t\tYou shrug.  \"Always a good idea to support fledgling artists.  Think of it as community service.\"\n\t\t\t\n\t\t\tHe laughs, and your food arrives, and for the rest of the evening, you don't talk about demons.\n\t\t\t*set ngabe %+20\n\t\t\t*set craft %+15\n\t\t\t*goto Nebuchadnezzar\n\t\t#I'm playing the long game.\"\n\t\t\t\"You're doing this for political advantage.\"\n\t\t\t\n\t\t\t\"Not exactly,\" you say.  \"I like the kid, and I think he'll have a better experience here than under his father's thumb.  But I also think it wouldn't be a bad idea to have a demon lord owe me a favor in a few decades.\"\n\t\t\t\n\t\t\t\"And yet you are willing to risk a demon lord's displeasure right now.\"\n\t\t\t\n\t\t\t\"I don't deal too much with the demons on a day-to-day basis.  By the time I do, R'ok will be in a position to help me.\"\n\t\t\t\n\t\t\t\"Or else he will never again return home.\"\n\t\t\t\n\t\t\t\"Which would make this a miscalculation on my part, sure.  But in that case, the worst I've done was help a struggling artist get his career off the ground.  Which should be its own reward.\"\n\t\t\t\n\t\t\tPat laughs.  \"That is one thing I can say for the Craft.  At least one never need fear starving.\"\n\t\t\t\n\t\t\tAnd then your meals come, and for the rest of the evening you don't talk about demons.\n\t\t\t*set ngabe %+20\n\t\t\t*set cunning %+15\n\t\t\t*goto Nebuchadnezzar\n\t\n*goto Nebuchadnezzar\n\n*label Nebuchadnezzar\n*page_break\nTwo days later, Angelica Nebuchadnezzar summons you to her office.\n\nShe occupies one of the three corner offices on floor fifty-three, with windows facing south and east.  If you stood behind her desk, you could see embassy row from here, and beyond that the warehouse district, and the wharfs.  South, the city stretches for miles and miles.  Elevated trains chug down their tracks, rattling windows.\n\nIf you were standing behind her desk, you could see these things.  You can't, because you're not.  She is.\n\n*page_break\n\nAngelica Nebuchadnezzar is a dark-skinned woman in a light blue suit.  One of her eyes is gone, replaced by a ruby sphere.  You can't tell if the sphere is looking at you or not; her remaining eye is.\n\n\"${char_voc} ${surname}.  Did you enjoy your [i]pro bono[/i] case?\"\n\n*choice\n\t#\"I enjoyed stretching my abilities.\"\n\t\t*set craft %+10\n\t\t\"You performed admirably.  I'll have to see whether we can arrange a more comprehensive test for you next time.\"\n\t\t\n\t\tShe seems to be waiting for you to say something else, but you don't know what.  In the end, she smiles, and says, \"Thank you.  That will be all.\"\n\t\t*set Nebuchadnezzar %+10\n\t\t*goto End\n\t#\"I'm glad I could help you out of a tough spot.\"\n\t\t*set cunning %+10\n\t\t\"What precisely do you mean?\"\n\t\t\n\t\t\"Your friend asked you to find his son and send him home.  But why let yourself get caught up in a fight between a friend one hand, and the son he's trying too hard to protect on the other?  You put his problem up on the [i]pro bono[/i] boards.  That way, if the ${craftsperson} who picked up the case found a way to keep R'ok here, you could blame it on ${char_pro_obj}.  And if ${char_pro} failed, R'ok wouldn't blame you, because he doesn't know you could have saved him.\"\n\t\t\n\t\tNebuchadnezzar nods, once.  \"It's an interesting theory.  Leaves out one possibility, though.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\t\"What's that?\"\n\t\t\n\t\t\"The possibility,\" she says, \"that I might be interested in testing the abilities of a talented young associate.\"\n\t\t\n\t\t\"Might have been fairer if ${char_pro} knew ${char_pro} was being tested, though.\"\n\t\t\n\t\t\"The best tests are blind.  And the Craft, my dear ${name}, is never quite fair.\"\n\t\t*set Nebuchadnezzar %+30\n\t\t*goto End\n\t#\"I had a great time.\"\n\t\t*set power %+10\n\t\t\"I can see you did.\"  She smiles.\n\t\t\n\t\t*if (Rok_job)\n\t\t\t\"And R'ok's fitting in well.\"\n\t\t*if (Rok_here and not(Rok_job))\n\t\t\t\"And R'ok has a future ahead of him.\"\n\t\t*if Rok_here = false\n\t\t\t\"It's a shame we couldn't do more for him.\"\n\t\t*comment endif\n\t\t\n\t\t*if Klint \u003c 50\n\t\t\t\"Indeed,\" she says.  \"Though you should recognize that, in his father, you have made a powerful adversary.\"\n\t\t*if Klint >= 50\n\t\t\t\"Indeed,\" she says.  \"I appreciate your dedication to the task.\"\n\t\t*comment endif\n\t\t\t\n\t\t\"Thank you,\" you say, and excuse yourself before you can lose yourself in the maze behind her eyes.\n\t\t*set Nebuchadnezzar %+10\n\t\t*goto end\n\t\n*label End\n\nYou ride the lift back down to your office.  It's a long, slow descent, and with the doors closed you realize the entire lift cab is reflective.  Beneath you the shaft plummets for forty stories of dead air, and here you are, stuck in a box of your own image turned against you.  Shattering into pieces.\n\n*finish", "epilogue": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 9: Epilogue\n\n*comment Here's some bug testing code I forgot to comment out last time.  Huzzah!\n\n*comment *set in_relationship true\n*comment *set chen_relationship true\n*comment *set chen 70\n*comment *set wakefield 80\n*comment *set wakefield_hurt true\n\n*comment *set varkath 80\n*comment *set stone 30\n*comment *set nebuchadnezzar 50\n\n*comment *set panel_success true\n*comment *set rok_here true\n*comment *set gunner 30\n\n\n*comment Temporary Variables Ahoy!\n\n*comment This should be obvious\n*temp is_skeleton false\n*temp makes_partner false\n*temp accepts_partner false\n*temp final_job \"\"\n*temp offer_accepted false\n\n*temp naughty_person \"Naughty girl\"\n*if char_binary = \"man\"\n\t*set naughty_person \"Naughty boy\"\n\n*temp like_count 0\n*temp people_like_you false\n\n*if (Ngabe > 50)\n\t*set like_count +1\n*if (Chen > 50)\n\t*set like_count +1\n*if (Vega > 50)\n\t*set like_count +1\n\n*if like_count >= 2\n\t*set people_like_you true\n\n*temp partnership_score 0\n\n*if wounds >= 2\n\t*set is_skeleton true\n\n*comment Not sure if I need this many options but we'll see.  I think it does help maintain realism in the final scene.\n\n*temp debt_level\n*if debt > 100000\n\t*set debt_level \"colossal\"\n*if (debt > 50000) and (debt \u003c=100000)\n\t*set debt_level \"high\"\n*if (debt \u003c= 50000) and (debt > 20000)\n\t*set debt_level \"medium\"\n*if (debt \u003c=20000)\n\t*set debt_level \"low\"\n*if debt \u003c= 0\n\t*set debt_level \"none\"\n\n*temp wakefield_offer false\n\n*if wakefield > 65\n\t*set wakefield_offer true\n\n*comment as I start to write Beat 1, I click play on iTunes and 'Tubthumper' comes online.\n*comment Beat 1: Unfamiliar Ceiling.\n\nYou wake in a hospital bed beneath an unfamiliar ceiling.  You are alone.  Tall steel machines surround the bed, and a pitcher of water, a bell, and a newspaper rest on your bedside table.\n\n*if is_skeleton\n\tThe whole world seems off.  Colder, somehow.  The ceiling is white, yes, but the white is empty, a wavelength of light, a physical property without warmth or brilliance.  The rails of your bed and the instruments by its side are sterile steel, reflective, but they do not shine or glisten.\n\t\n\tYou reach out to touch them, and scream.\n\t\n\tYour hand is made of bone.\n\t*achieve skeleton\n\n*fake_choice\n\t#I ring the bell at my bedside table.\n\t\tSeconds later, a small round man in a nurse's uniform runs in.  \"You're awake,\" he says, surprised.  As if this were a remote possibility.  \"Let me get the doctor.\"\n\t#I call for help.\n\t\t\"Nurse!\"\n\t\t\n\t\tSeconds later, a small round man in a nurse's uniform runs in.  \"You're awake,\" he says, surprised.  \"Let me get the doctor.\"\n\t#I pass out again.\n\t\tSleep, as the poet wrote, is sweetest friend to gods and men.  Eventually, though, you have to wake up and face the world, and when you do, a doctor's there to meet you.\n\t#I read the newspaper until someone notices me.\n\t\tPage, page.  Transdimensional Thaumaturgics stock seems to have taken a hit.  You look for stories about John Smith, and don't find any.  Otherwise, the newspaper contains notes of trouble in Kavekana, a full spread on the Chartegnon autumn fashion shows, and a whole lot of nothing.\n\t\t\n\t\tYou hear a gasp from the door, and fold down the newspaper to see a small round man in a nurse's uniform.  \"You're awake,\" he says, surprised.  As if your waking was a remote possibility.  \"Let me get the doctor.\"\n*page_break\n*temp skeleton_vitals \" \"\n\n*if is_skeleton\n\t*set skeleton_vitals \"—gliding a probe over angular glyphs carved into the bones of your ribs and arms—\"\n\nDoctor Francone turns out to be a precise woman with a clipboard, a white coat, a stethoscope, and a tightly-drawn face.  She takes your vitals${skeleton_vitals}with an expression one of your professors at the Hidden Schools used to make when someone offered an unsatisfactory answer.\n\n*if is_skeleton\n\t\"On a scale of one to ten,\" she says, \"how lucky do you think you are to lie there talking to me?\"\n\t\n\tHer tone of voice doesn't leave any question as to the right answer.  \"Ten.\"\n\t\n\t\"Eleven.  You were a mess.  Not enough to heal, and barely enough order left in your body to complete the skeletization process.  You are very lucky your insurance doesn't have a lifetime cap, because you'd have passed it twice over.\"\n\t\n\tA nurse offers you a hand mirror, with which you examine what's left of your body: a bleached skeleton, bones gleaming with silver and blue glyphwork.  At least you've lost weight.  \"Technically, I'm not alive any more.\"\n\t\n\tYou pitched this as a joke, but Francone doesn't catch.  \"That you're still here is a testament to my and my colleagues' abilities, not to your own common sense.  That much is clear.\"\n\t*goto reaction_shot\n*else\n\t*if wounds \u003c= 0\n\t\tShe steps back and nods with grudging approval.  \"You pulled through.  This time.  I won't lie—when you were brought in, your prognosis was poor.  But your injuries turned out to be more cosmetic than extensive.  You'll have some scars to show off.  But don't.  Nobody likes that sort of thing.\"\n\t\t*goto reaction_shot\n\t*if wounds > 0\n\t\t\"On a scale of one to ten,\" she says, \"how lucky do you think you are to be alive?\"\n\n\t\tHer tone of voice doesn't leave any question as to the right answer.  \"Ten.\"\n\n\t\t\"More of a seven.  But don't get cocky.  Your injuries were severe.  Do you have any gods?\"\n\t\t\n\t\t\"Of course not.\"\n\t\t\n\t\t\"Shame.  If you did, you might want to thank them you didn't come to my operating table five years ago.  The Heimdall Tissue Regeneration Process didn't exist back then.  Fortunately, your firm's insurance covered most of it.\"\n\t\t*goto reaction_shot\n\n*label reaction_shot\n\n*choice\n\t#\"It could have been worse.\"\n\t\t\"My advice?  Don't think about what could have been.  Think about now, and think about what you're going to do next.\"\n\t\t*goto francone_leave\n\t#\"Thank you for doing what you could.\"\n\t\t\"No need to thank me.  This is my job, and I'm paid well for it.  Thank the people who mopped about half of you off of the OR floor.\"\n\t\t*goto francone_leave\n\t*if (is_skeleton) #\"This is the best you could do?\"\n\t\t\"If you'd come to me five years ago I wouldn't have been able to save any part of your right hand.  We're bound by time and technology.  You want better medicine, support basic research.\"  She reviews your chart.  \"And that's all.  Don't drink any blood for three weeks, and if you start speaking in tongues, see a qualified exorcist.\"\n\t\t*goto francone_leave\n\t*if (is_skeleton) #\"I wasn't using most of that meat anyway.\"\n\t\t\"I expect you weren't.  Someone who used their body might have taken better care of it.\"\n\t\t*goto francone_leave\n\t*if (is_skeleton) #\"I liked that body.\"\n\t\t\"Then you should have taken better care of it.\"\n\t\t*goto francone_leave\n\n*label francone_leave\nDoctor Francone turns to leave.\n\n*if(in_relationship)\n\tShe stops, though, at the door.  \"Oh, I nearly forgot.  Someone's here to see you.\"\n\t*goto friends_visit\n*else\n\tYou wait in the hospital room, alone with the newspaper.\n\t*goto beat_2\n\n*label friends_visit\n*if (wakefield_relationship)\n\t*goto wakefield_visit\n*if (chen_relationship)\n\t*goto chen_visit\n*if (vega_relationship)\n\t*goto vega_visit\n*else\n\tYou wait in the hospital room, alone with the newspaper.\n\t*comment THIS SHOULD NEVER HAPPEN—you only get here if you're in a relationship, and if you are you only have three options.  But error handling!\n\t*goto beat_2\n\n*label vega_visit\n\nThe doctor leaves, and after a silent minute or two, Vega steps tentatively into the room.  He's dressed in light grey, and carries his coat folded over his arm.\n\n*if (is_skeleton)\n\tHe blanches visibly when he sees you on the bed.  Which bothers you, but not as much as the way you feel when you see him.\n\t\n\tYou like him—you did, and you still do.  But there's something different about the liking.  The pleasure of his presence is sharper, more cerebral—an emotional woodcut compared to the painting you remember.  Or think you remember.\n\t\n\tSo this is what it's like to feel without a body.\n\t\n\t\"Hi,\" you say.\n\t\n\tHe walks over, hugs you, and kisses you on the pate of the skull.  You didn't notice with the doctor before, but his touch, too, feels strange—simple pressure, something missing.\n\t*goto vega_steps_back\n\n*else\n\tHe kisses you.  You kiss him back.  It feels good.  Still, you wince.\n\t\n\t\"I'm sorry.\"\n\t\n\t\"No, it's okay, it's… Guess I'm not all together yet.  Too long in this bed.\"\n\t*goto vega_steps_back\n*label vega_steps_back\n*comment endif\n\nHe steps back, sits.  \"We… I almost lost you.  I don't know if I can do that again.\"\n\t\n*choice\n\t#\"I'm still here.\"\n\t\t\"Obviously, or else we would not be talking.\"\n\t\t\n\t\t\"Still a wise-ass.\"\n\t\t\n\t\t\"There is, indeed, wisdom in the asses.\"  He leans forward on his knees.  \"I missed you.\"\n\t\t\n\t\t\"At least you don't need to miss me forever.\"\n\t\t*if is_skeleton\n\t\t\t\"Indeed,\" he says.  \"Do you want to talk about…what's happened to you?\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"I do, actually.\"\n\t\t\t\t\t\"Okay,\" he says.  \"How do you feel?\"\n\t\t\t\t\t*goto how_to_feel_vega\n\t\t\t\t#\"Not really.\"\n\t\t\t\t\t\"Okay,\" he says.  \"Take your time.  But for now…the partners want to see you.  The name partners, I mean.  Once you're better, I think you're up for review.\"\n\t\t\t\t\t*goto beat_2\n\t\t*else\n\t\t\t\"Indeed,\" he says.  \"Though you should take your time here.  When you're done, the partners want to see you.  I think you're up for review.\"\n\t\t\t*goto beat_2\n\t*if (is_skeleton) #\"You don't mind…what I've become?\"\n\t\t\"Not really.  It happens to all of us, if we're lucky.  If not…\"  He shudders.  \"I won't lie, though.  I miss the face on top of the skull.  How do you feel?\"\n\t\t*label how_to_feel_vega\n\t\t\n\t\t\"I don't know.  I don't know how to feel, yet, in this body.\"\n\t\t\n\t\tHe stands again, walks over, and touches your ribs.  \"Can you feel that?\"\n\t\t\n\t\tHis hand's shaking.\n\t\t*choice\n\t\t\t#\"Not like I should.\"\n\t\t\t\tVega's pale already, but he goes paler.\n\t\t\t\t\n\t\t\t\t\"And what does that mean for us?\"\n\t\t\t\t*goto mean_for_us_vega\n\t\t\t#\"No.\"\n\t\t\t\t\"And what does that mean for us?\"\n\t\t\t\t*label mean_for_us_vega\n\t\t\t\t*choice\n\t\t\t\t\t#\"It means I need some time to think things through.\"\n\t\t\t\t\t\t\"I'm willing to give you whatever time you need.  And whatever help.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Maybe you shouldn't be.  There's no guarantee with this.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I don't care,\" he says.  He might be lying, but if so he's doing a good job of covering it up.  That Old World, old-money gallantry on display again.  But there's something else beneath.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What's up?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The name partners,\" he says.  \"When you're well, Varkath, Nebuchadnezzar, and Stone want to meet with you.  I think you're up for review.\"\n\t\t\t\t\t\t*goto beat_2\n\t\t\t\t\t#\"It means we'll need to work through this, together.\"\n\t\t\t\t\t\t\"I'm willing to give you whatever time you need.  And whatever help.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Thank you.\"  But there's something more working at him.  \"What's up?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The name partners,\" he says.  \"When you're well, Varkath, Nebuchadnezzar, and Stone want to meet with you.  I think you're up for review.\"\n\t\t\t\t\t\t*goto beat_2\n\t\t\t\t\t#\"It means no.\"\n\t\t\t\t\t\tHe looks hurt, but he removes his hand, and draws back a step.  \"I see.  Thank you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou want to say something, but you can't think of anything to say.\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe composes himself first.  \"When you're well,\" he says, \"the name partners want to see you.  I think you're up for review.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd then he leaves, not that you blame him.\n\t\t\t\t\t\t*set vega_relationship false\n\t\t\t\t\t\t*set in_relationship false\n\t\t\t\t\t\t*goto beat_2\n\t\t\t#\"Enough.\"\n\t\t\t\t\"That's good,\" he says.  He strokes the bone.  \"That's good.\"\n\t\t\t\t\n\t\t\t\tHe's not convinced, you can tell, but you can work this through.\n\t\t\t\t\n\t\t\t\tHe looks up, into your eyes.  \"Once you're better…the partners, they want to talk with you.  I think you're up for review.\"\n\t\t\t\t*goto beat_2\n\t\t\t#I grab him back.\n\t\t\t\tYou grab him by the shoulder, pull him down, and sit up halfway to meet him with a kiss.  Almost a kiss.  Hard to kiss without lips.  It'll take you some practice to get the knack.  Fortunately, he doesn't seem to mind.\n\t\t\t\t\n\t\t\t\t\"Thank you,\" he says when you're both through.\n\t\t\t\t\n\t\t\t\t\"Is something wrong?\"\n\t\t\t\t\n\t\t\t\t\"Not much.  Just—the name partners.  They want to meet with you.  I think you're up for review.\"\n\t\t\t\t*goto beat_2\n\t#\"Just put a tracking glyph on me and you won't need to worry about it.\"\n\t\t\"Ah yes, because mutual surveillance is the cornerstone of a successful relationship.\"\n\t\t\n\t\t\"It isn't?  Maybe that's what I've been doing wrong all these years.\"\n\t\t\n\t\t\"It would explain the restraining wards.\"\n\t\t\n\t\t\"They're like love letters in reverse.\"\n\t\t\n\t\t*if is_skeleton\n\t\t\t\"Do you want to talk about…what's happened to you?\"\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"I do, actually.\"\n\t\t\t\t\t\"Okay,\" he says.  \"How do you feel?\"\n\t\t\t\t\t*goto how_to_feel_vega\n\t\t\t\t#\"Not really.\"\n\t\t\t\t\t\"Okay,\" he says.  \"Take your time.  But for now…the partners want to see you.  The name partners, I mean.  Once you're better, I think you're up for review.\"\n\t\t\t\t\t*goto beat_2\n\t\t\n\t\tHe looks down, then to off to the wall.  At last he says, lamely: \"The partners want to see you when you're better.  The name partners, I mean.  I think you're up for review.\"\n\t\t*goto beat_2\n\t*if (not(is_skeleton))  #\"I love you.\"\n\t\t\"I love you too,\" he says, gently, as if releasing a fragile bird.  It takes flight, and in the silence its wings flutter.\n\t\t\n\t\tThis, at least, is right.\n\t\t\n\t\tNeither of you know what to say next.  At last he finishes, lamely: \"The partners want to see you when you're better.  The name partners, I mean.  I think you're up for review.\"\n\t\t*goto beat_2\n\n*label chen_visit\n\nThe doctor leaves, and a moment later Cass Chen runs into the room, as if she'd been crouched outside waiting for the doctor's nod.  She probably was.\n\n\"${name}!\"\n\n*if (is_skeleton)\n\tBut she slows a little when she sees you on the bed.  Which bothers you, but not as much as the way you feel when you see her.\n\t\n\tYou like her—you did, and you still do.  But there's something different about the liking.  The pleasure of her presence is sharper, more cerebral—an emotional woodcut compared to the painting you remember.  Or think you remember.\n\t\n\tShe still jogs to your bedside, though, hugs you, and kisses you on the pate of the skull.  You didn't notice with the doctor before, but her touch, too, feels strange—simple pressure, something missing.\n\t*goto chen_bedside\n\n*else\n\tShe kisses you.  You kiss her back.  It feels good.  Still, you wince.\n\t\n\t\"I'm sorry.\"\n\t\n\t\"No, it's okay, it's… Guess I'm not all together yet.  Too long in this bed.\"\n\t*goto chen_bedside\n*label chen_bedside\nShe stands by your bedside.  \"We… I almost lost you.  I don't know if I can do that again.\"\n\t\n*choice\n\t#\"I'm still here.\"\n\t\t\"Yeah, except you almost weren't.\"  She's happy, but she's angry too.\n\t\t\n\t\t\"You do care about me.\"\n\t\t\n\t\t\"Good eyes, smart-ass.  As if that wasn't obvious already?\"\n\t\t\n\t\t\"Always nice to have confirmation.\"\n\t\t\n\t\t\"I missed you.\"\n\t\t\n\t\t\"Good thing you don't have to miss me forever.\"\n\t\t*if is_skeleton\n\t\t\t\"Yeah,\" she says.  \"Do you want to talk about…what's happened to you?\"\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"I do, actually.\"\n\t\t\t\t\t\"Okay.  How do you feel?\"\n\t\t\t\t\t*goto how_to_feel_chen\n\t\t\t\t#\"Not really.\"\n\t\t\t\t\t\"Sure,\" she says.  \"I get it.  On your time.\"  She shifts from side to side, clasps her hand behind her back, and looks for all the world like a person who's trying to think of a good way to bring up an uncomfortable topic.\n\t\t\t\t\t\n\t\t\t\t\t\"Gods, Cass.  Tell me already.\"\n\t\t\t\t\t\n\t\t\t\t\t\"The partners have a message for you,\" she says.  \"Varkath, Nebuchadnezzar, and Stone want to see you as soon as you're well.  I think you're up for review.\" \n\t\t\t\t\t*goto beat_2\n\t\t\t\t\t\n\t\t\"Good thing,\" she says.  \"Though I hope I don't have to miss you again.\"\n\t\t\n\t\t\"What do you mean?\"\n\t\t\n\t\t\"The partners.\"  The room's already plenty cold, but it grows colder.  \"Varkath, Nebuchadnezzar, and Stone say you're up for review.\"\n\t\t*goto beat_2\n\t*if (is_skeleton) #\"You don't mind…what I've become?\"\n\t\t\"Not really.  It happens to all of us, if we're lucky.  And, hells, you always had good bone structure.  How do you feel?\"\n\t\t*label how_to_feel_chen\n\t\t\n\t\t\"I don't know.  I don't know how to feel, yet, in this body.\"\n\t\t\n\t\tShe grins, wryly, leans over your bed, and places one hand firmly on your ribs.  \"Can you feel that?\"\n\t\t*choice\n\t\t\t#\"Not like I should.\"\n\t\t\t\tShe frowns, removes her hand, and crosses her arms.  \"Okay.  What does that mean for us?\"\n\t\t\t\t*goto mean_for_us_chen\n\t\t\t#\"No.\"\n\t\t\t\tShe frowns, removes her hand, and crosses her arms.  \"And what does that mean for us?\"\n\t\t\t\t*label mean_for_us_chen\n\t\t\t\t*choice\n\t\t\t\t\t#\"It means I need some time to think things through.\"\n\t\t\t\t\t\tShe sets her hand on your shoulder; no pressure like before, and you still can't feel that human warmth you miss.  But she's there.  \"Take whatever time you need.  I'm here for you.  We'll figure this out.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Maybe we won't.  There are no guarantees.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Of course not.  And, hells, guarantees don't work anyway.  But I imagine we can think of something.\"  Her forehead furrows briefly.  \"Unfortunately that's not the only reason I'm here.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What's up?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The name partners have a message for you,\" she says.  \"When you're well, Varkath, Nebuchadnezzar, and Stone want to meet.  I think you're up for review.\"\n\t\t\t\t\t\t*goto beat_2\n\t\t\t\t\t#\"It means we'll need to work through this, together.\"\n\t\t\t\t\t\tShe sets her hand on your shoulder; no pressure like before, and you still can't feel that human warmth you miss.  But she's there.  \"Take whatever time you need.  I'm here for you.  We'll figure this out.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Thank you.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"No need for that.\"  Her forehead furrows briefly.  \"Unfortunately pleasure's not the only reason I'm here.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What's up?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The name partners have a message for you,\" she says.  \"When you're well, Varkath, Nebuchadnezzar, and Stone want to meet.  I think you're up for review.\"\n\t\t\t\t\t\t*goto beat_2\n\t\t\t\t\t#\"It means no.\"\n\t\t\t\t\t\tShe looks hurt, but she removes her hand, and draws back a step.  \"Okay.  I think.  I mean.  Fine.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou want to say something, but you can't think of anything to say.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe composes herself first.  \"When you're well,\" she says, \"the name partners want to see you.  I think you're up for review.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd then she leaves, not that you blame her.\n\t\t\t\t\t\t*set chen_relationship false\n\t\t\t\t\t\t*set in_relationship false\n\t\t\t\t\t\t*goto beat_2\n\t\t\t#\"Enough.\"\n\t\t\t\t\"That's good,\" she says, and strokes the bone.  \"We can work from there.\"  She looks up, into your eyes.  \"I'm not just here for pleasure, though.  Once you're better…the partners, they want to talk with you.  I think you're up for review.\"\n\t\t\t\t*goto beat_2\n\t#\"Just do a better job keeping track of me next time.\"\n\t\t\"Oh, because you're so easy to track.  Nice seeing you, Cass, I'm off to Tassadon.  That was such a special night, Cass, but now I'm going to go off and get myself killed in the demon realms.  You're so sexy I can't stand to be in the same room with you for more than one night at a time.\"\n\t\t\n\t\t\"We're in the same room together now.\"\n\t\t\n\t\t\"Yeah, but you're not standing.\"\n\t\t\n\t\t\"There's room enough on this bed for two.\"\n\n\t\t\"${naughty_person}.  But the doctor says I'm to keep off until you're out of the hospital.  So think of this as a get well soon card.\"\n\t\t\n\t\t\"It's inspiring, for sure.\"\n\t\t\n\t\t*if is_skeleton\n\t\t\t\"Seriously though,\" she says.  \"Do you want to talk about…what's happened to you?\"\t\t\t\n\t\t\t*choice\n\t\t\t\t#\"I do, actually.\"\n\t\t\t\t\t\"Okay.  How do you feel?\"\n\t\t\t\t\t*goto how_to_feel_chen\n\t\t\t\t#\"Not really.\"\n\t\t\t\t\t\"Sure,\" she says.  \"I get it.  On your time.\"  She shifts from side to side, clasps her hand behind her back, and looks for all the world like a person who's trying to think of a good way to bring up an uncomfortable topic.\n\t\t\t\t\t\n\t\t\t\t\t\"Gods, Cass.  Tell me already.\"\n\t\t\t\t\t\n\t\t\t\t\t\"The partners have a message for you,\" she says.  \"Varkath, Nebuchadnezzar, and Stone want to see you as soon as you're well.  I think you're up for review.\" \n\t\t\t\t\t*goto beat_2\n\t\t*else\n\t\t\t*page_break\n\t\t\tShe shifts from side to side, clasps her hand behind her back, and looks for all the world like a person who's trying to think of a good way to bring up an uncomfortable topic.\n\t\t\t\n\t\t\t\"Okay.  What's going on?\"\n\t\t\t\n\t\t\t\"Who says anything's going on?\"\n\t\t\t\n\t\t\t\"Gods, Cass, just tell me already.\"\n\t\t\t\n\t\t\t\"The partners have a message for you,\" she says.  \"Varkath, Nebuchadnezzar, and Stone want to see you as soon as you're well.  I think you're up for review.\" \n\t\t\t*goto beat_2\t\t\n\t*if (not(is_skeleton)) #\"I love you.\"\n\t\t\"I love you too,\" she says, and hugs you, enfolds you.  You can feel her heartbeat through her clothes, and through your gown—though maybe that's your heartbeat instead.  It's hard to tell.\n\t\t\n\t\tThis, at least, is right.\n\t\t\n\t\tNeither of you know what to say next.  When she draws back, she has the guilty expression of a person trying to think of a good way to bring up an uncomfortable topic.\n\t\t\n\t\t\"What's up?\"\n\t\t\n\t\t\"I'm not here just for pleasure,\" she says.  \"The partners—Varkath, Nebuchadnezzar, and Stone all want to see you when you're better.  I think you're up for review.\"\n\t\t*goto beat_2\n\n*comment Wakefield's scene in the hospital\n\n*label wakefield_visit\n\n*temp wakefield_entrance \"\"\n\n*if wakefield_hurt\n\t*set wakefield_entrance &\"You hear the taps of Wakefield's cane before ${Ash_pro} enters the room.  \"\n*if (not(wakefield_hurt) and (is_skeleton))\n\t*set wakefield_entrance &\"Wakefield enters the room soon after Francone leaves, and while ${Ash_pro} plays it cool, you see a slight hitch in ${Ash_pro_pos} step as ${Ash_pro} appreciates the full extent of your condition.  \"\n*if (not(wakefield_hurt) and not(is_skeleton))\n\t*set wakefield_entrance &\"Wakefield sweeps into the room, hands in ${Ash_pro_pos} pockets, all insouciance and vigor.  \\\"Who would have guessed that we should both make it out of demonic entanglements alive and relatively unharmed?  Seems our teachers overestimated the dangers of the hell realms.\\\"\"\n*if (is_skeleton and wakefield_hurt)\n\t*set wakefield_entrance &\"${Ash_pro_cap} sees you on the bed, and one corner of ${Ash_pro_pos} mouth quirks up in a wry grin.  \\\"Don't we make a fine pair.\\\"\"\n*if (wakefield_hurt and not(is_skeleton))\n\t*set wakefield_entrance &\"${Ash_pro_cap} sees you on the bed, and one corner of ${Ash_pro_pos} mouth quirks up in a wry grin.  \\\"At least one of us emerged from this business relatively intact.\\\"\"\n*comment endif\n${wakefield_entrance}\n\t\n*if is_skeleton\n\tYou're not sure what you expected to feel when you saw ${Ash_pro_obj}.  You like Wakefield—you did, and still do.  But there's something different about the liking.  The pleasure of ${Ash_pro_pos} presence is sharper, more cerebral—an emotional woodcut compared to the painting you remember.  Or think you remember.\n*comment endif\n\nYou grin.  \"Good to see you again, Wakefield.\"\n\n\"A pleasure, as always.\"  ${Ash_pro_cap} leans back against the wall.  \"I did not expect to almost lose you so swiftly.  Not a pleasant experience.\"\n\t\n*choice\n\t#\"I'm still here.\"\n\t\t\"Ah yes, but for how long?  Perhaps you shall take it into your head to go off and singlehandedly conquer the Northern Gleb?  I hear King Clock's towers need a competent winder.  Or you might try to disarm the Golden Horde singlehanded.\"\n\t\t\n\t\t\"You're worried about me.\"\n\t\t\n\t\t*if(is_skeleton)\n\t\t\t\"Of course I am,\" ${Ash_pro} says.  \"Do you want to talk about your transformation?\"\n\t\t\t*choice\n\t\t\t\t#\"Yes.\"\n\t\t\t\t\t\"I thought you might.\"\n\t\t\t\t\t*goto wakefield_is_skeleton\n\t\t\t\t#\"No.\"\n\t\t\t\t\t\"Fair enough.  Take your time.  And I'm here when you need me.  But if I were you, I might hurry getting my emotional ducks in a proverbial row.  The word on the street—such as it is, you know—is that you're up for partnership review once you properly rejoin the land of the living.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Since when do you spend any time on the street?\"\n\t\t\t\t\t\n\t\t\t\t\t\"Clever.  But make yourself ready.  This is not a matter for jokes.\"\n\t\t\t\t\t*goto beat_2\n\t\t*else\n\t\t\t\"I am indeed,\" ${Ash_pro} says.  \"The word on the street—such as it is, you know—is that you're up for partnership review once you properly rejoin the land of the living.\"\n\t\t\t\t\t\n\t\t\t\"Since when do you spend any time on the street?\"\n\t\t\t\n\t\t\t\"Clever.  But make yourself ready.  This is not a matter for jokes.\"\n\t\t\t*goto beat_2\n\t*if (is_skeleton) #\"You don't mind…what I've become?\"\n\t\t*goto wakefield_is_skeleton\n\t#\"Oh, and I exist to provide you pleasure, do I?\"\n\t\t\"Doesn't the world?\"\n\t\t\n\t\t\"Wait,\" you say, \"I thought I was the solipsistic mastermind at the center of t y yourself to your firm.\"\n\t\t\t*goto beat_2\n\n*label beat_2\n*comment Beat 2: the partnership meeting\n*page_break\nTwo weeks later, fresh from the hospital, you stand once more in the name partners' audience chamber in Kreig Tower.  They sit as they did before your journey to Akargath, Nebuchadnezzar on the left, Stone on the right, Varkath between them.\n\n\"We're here,\" Varkath says, \"to discuss the question of your partnership.  After the events in the demon realms, we believe we must make a decision about how to proceed with your career at the firm.  We face pressure from Transdimensional Thaumaturgics to fire you, after recent developments.  If you were a partner in the firm, this request would be ludicrous.  But we do not offer partnership lightly.\"\n\n*comment More if statement paragraph stitching ahoy!\n*page_break\n*set partnership_score +(Varkath + (Stone + Nebuchadnezzar))\n\nNebuchadnezzar clears her throat.\n\n*temp nebquote \"\\\"\"\n*temp nebcount 0\n\n*if Nebuchadnezzar > 50\n\t*set nebquote &\"I personally like ${surname} as a candidate.  \"\n\t*set nebcount +1\n*if Vega_Fix\n\t*set partnership_score +20\n\t*set nebcount +1\n*if solo_fix\n\t*set partnership_score +30\n\t*set nebcount +1\n*if Rok_here\n\t*set partnership_score +30\n\t*set nebcount +1\n\n*if nebcount = 0\n\t*set nebquote &\"I cannot in good conscience recommend the candidate for promotion.\"\n\t*set nebquote &\"\\\"\"\n\n*if nebcount >= 1\n\t*set nebquote &\"  \"\n*if Vega_Fix\n\t*set nebquote &\"In the affair of the Transdimensional Thaumaturgics wards, ${char_pro} and Counselor Vega protected us against demonic incursion on their own.\"\n\t*set nebcount -1\n*if nebcount >= 1\n\t*set nebquote &\"  \"\n*if solo_fix\n\t*set nebquote &\"In the affair of the Transdimensional Thaumaturgics wards, ${char_pro} secured us against demonic incursion on ${char_pro_pos} own.\"\n\t*set nebcount -1\n*if nebcount >= 1\n\t*set nebquote &\"  \"\n*if Rok_here\n\t*set nebquote &\"${name} has al if (makes_partner)\n\t\t\t*goto varkath_speech\n\t\t*if not(makes_partner)\n\t\t\t\"We do not plan to rush you out of the firm.  Your path leads in a different direction from here; that is all.  You will have six weeks to arrange your affairs, and if we can be any help to you as you seek out new opportunities, please let us know.\"\n\t\t\t\n\t\t\t\"Thanks,\" you say, though the word's bitter in your mouth.\n\t\t\t*goto beat_3  \n\t*if (not(makes_partner)) #\"I'm disappointed, but I think it might be for the best.\"\n\t\t\"Indeed,\" says Stone.\n\t\t\n\t\tVarkath breaks the ensuing silence: \"We do not plan to rush you out of the firm.  Your path leads in a different direction from here; that is all.  You will have six weeks to arrange your affairs, and if we can be any help to you as you seek out new opportunities, please let us know.\"\n\t\t\n\t\t\"Thanks,\" you say.\t\t\n\t\t*goto beat_3\n\t*if (makes_partner) #\"Thank you.  Your offer's an honor.  But I don't think it's an honor I can accept.\"\n\t\tVarkath cocks his head to one side.  \"Why not?\"\n\t\t*fake_choice\n\t\t\t#\"I'm still recovering after Akargath.\"\n\t\t\t#\"I need some time to myself.\"\n\t\t\t#\"The last few years have almost killed me several times over.  I need a new line of work.\"\n\t\t\t#\"I don't think I'm a good fit for the life you lead.\"\n\t\t\"It is possible,\" he says.  \"Consider our offer nonetheless.\"\n\t\t*goto beat_3 \n\n*label Varkath_speech\nVarkath leans forward over the desk.  \"We have made the offer.  Do not be so hasty to accept it.  Understand what you accept with this offer: a life in which the struggles you have faced will become ordinary.  I have been three times a father, and once a mother, and none of my children speak to me any more.  My story is not ubiquitous among Craftsmen or Craftswomen of the highest standing—Damien has a fine relationship with his surviving children, for example.  But neither is it uncommon.  Do you understand?\"\n*fake_choice\n\t#\"Yes.\"\n\t#\"No.\"\n\t#\"Maybe.\"\n\"Go, then,\" he says, \"and consider.\"\n*goto beat_3\n\n*comment Beat 3: meeting aftermath\n*label beat_3\n*page_break\n\nYou wander back through long halls and down winding stairs toward your office, stunned, lost even in these familiar surroundings.  \n\n*if (Ngabe > 50) and (makes_partner)\n\tPat passes you in the hall, stops, and clasps your hand.  \"Congratulations.  You deserve it.  Drinks later?  To celebrate?\"  He's gone before you can ask him how he knew.\n*comment endif\n\n*if (chen_relationship and makes_partner)\n\t*goto chen_partner\n*if (vega_relationship and makes_partner)\n\t*goto vega_partner\n*else\n\t*goto your_desk\n\n*label chen_partner\n\nWhen you reach your office, Cass Chen is leaning against the doorframe, arms crossed.  She sweeps forward, spreads her arms, and hugs you.  \"You did it.  Congratulations.\"\n\nNo one's around—you have enough time to steal a kiss, and so you do.  This, at least, is an unalloyed good.\n\nShe kisses you once more, briefly, before you part.  \"Partner.  Damn.\"  She shakes her head.\n\n\"I just found out a second ago.  Did they send up flares?\"\n\nShe jabs a thumb toward your open door.  A new title has appeared beneath your name—succinct, and clear.  Partner.\n\n*fake_choice\n\t#\"That's a bit…presumptuous.\"\n\t\t\"They don't think there's much of a chance you'll turn them down.\"\n\t\t\n\t\t\"I'm not so sure.\"\n\t#\"I haven't accepted yet.\"\n\t#\"They don't waste any time, do they?\"\n\t\tShe cocks her head to one side.  \"You sound as if you're not certain you'll take the job.\"\n\t\t\n\t\t\"I'm not certain.\"\n*comment endif\n\nCass tightens—the corners of her eyes, the muscles of her shoulders, the angle of her neck.  \"This is your entire career, right here, in one offer.\"\n\n\"You think I should take it?\"\n\n\"I don't know,\" she says.  \"I'm not sure I would.  Once you're a partner, it's…hard to leave.  You're still at the firm's mercy, only in a different way.  And I want out.  I want to travel.  I want to find a job that doesn't involve quite so much tearing the world to pieces.\"\n\n\"You're saying—\"\n\n\"I'm saying don't worry about it.\"  She grabs you, and kisses you again.  \"We'll figure this out.  Somehow.  And we can talk more later.\"  One hand slinks beneath your jacket, walks across your back, grabs your ribs, and squeezes.  \"But, whatever you decide. Congratulations.\"\n\nAnd then she slips from you, and leaves you outside your office door.\n*page_break\n*goto your_desk\n\n*label vega_partner\n\nVega paces outside your office, arms crossed, head down.  He doesn't notice your approach.\n\n\"Hey,\" you say, and he starts, turns, and embraces you so hard your ribs creak.\n\n\"Congratulations.\"\n\n\"It went well,\" you try to say, but he kisses you.  And then you kiss him back, because what the hells.\n\n*if not(is_skeleton)\n\tA minute later, you step back, adjust your jacket, pat your hair into place, and catch your breath.  \"How did you know?  They don't send up flares or anything, do they?\"\n*if (is_skeleton)\n\tA minute later, you step back, adjust your jacket, and pat your hair back into place—only your fingers skitter over the rough pate of your scalp.  Of course.  Skeleton.  This will take a bit of getting used to.\n\t\n\t\"How did you know?\" you say.  \"Do they send up flares or something?\"\n*comment endif\n\nVega points to your door.  A new title has appeared beneath your name—succinct, and clear.  Partner.\n\n*fake_choice\n\t#\"That's a bit…presumptuous.\"\n\t\t\"You don't plan to accept?\"\n\t\t\n\t\t\"I didn't say that.  Just…a surprise, is all.\"\n\t#\"I haven't accepted yet.\"\n\t#\"They don't waste any time, do they?\"\n\t\t\"You don't plan to accept?\"\n\t\t\n\t\t\"I'm not certain.\"\n*comment endif\n\n\"I understand,\" he says.  \"This is a big offer.  Accepting ties you to the firm indelibly—even if you leave later, the connection endures.\"\n\n\"That didn't stop you from accepting when they made the offer.\"\n\n\"No, it did not.\"  Vega crosses his arms, and uncrosses them.  \"This is the life I wish for myself.  And I am…glad that life may include you as well.  But I cannot force such a choice upon you.\"\n\n\"You sure know how to liven up a moment.\"\n\n\"You're great,\" he says.  \"And I love you.  And I have to go—three more meetings before sundown.  Dinner later?\"\n\n\"Sure,\" you say.  \"Sure.  Dinner later.\"\n\nAnd he leaves.\n*goto your_desk\n\n*label your_desk\n\nYou close your office door, sit once more at your desk, and spin around.  The declining sun reflects off the daguerrotype of your graduation day.\n\nYour mind's a confusion of questions.\n\n*temp ponder \"\"\n\n*if debt_level = \"colossal\"\n\t*set ponder &\"You have a truly absurd amount of student loan debt.  The kind of debt where, if you default, they'll send people after you with knives.  \"\n*if debt_level = \"high\"\n\t*set ponder &\"You're carrying some pretty heavy student loans.  \"\n*if debt_level = \"medium\"\n\t*set ponder &\"You're carrying more debt than you'd like.  \"\n*if debt_level = \"low\"\n\t*set ponder &\"You're lucky—careful savings and frugal living have mostly wiped out your debt.  \"\n*if debt_level = \"none\"\n\t*set ponder &\"You're lucky—careful savings and frugal living have wiped out your student loan debt.  You're free.  \"\n*if (makes_partner)\n\t*set ponder &\"A partner's salary is [i]very[/i] large.  And it's more than salary—you'll have a share of the firm.  Then again, salary and ownership stake just mean you'll be working harder than you ever have before.  \"\n*if not(makes_partner)\n\t*set ponder &\"For all Varkath's kindness, you'll be out on your ear in a few weeks, cut free.  No salary, no insurance, no wards.  It's freedom.  \"\n*if (debt > 20000)\n\t*set ponder &\"But freedom with this kind of debt is scary.  \"\n*if (debt \u003c 20000)\n\t*set ponder &\"And with so little debt, you have more options than you otherwise would.  Maybe.  \"\n*if (is_skeleton)\n\t*set ponder &\"You've given this job so much.  Your flesh, for starters.  \"\n*if not(is_skeleton)\n\t*set ponder &\"You've given this job so much.  If things had gone even a little differently back in Akargath, who knows what might have happened.  \"\n*if not(makes_partner) \n\t*set ponder &\"And for all you've done, here you are, on your own.  How's that for loyalty?\"\n*if (makes_partner)\n\t*set ponder &\"Was that worth a partnership?  Or was a partnership worth that?  \"\n*if (((background=\"beggar\") or (background = \"poor\")) and makes_partner)\n\t*set ponder &\"You've grown so far from your roots.  Do you really have any other option but the financial security of the partnership?  \"\n*set ponder &\"You remade yourself in the demon world.  You told your own story.  How does that story square with this?  \"\n*if (wakefield_relationship)\n\t*set ponder &\"And how will everything square with…whatever it is you and Wakefield have?  If anything?\"\n*if (chen_relationship)\n\t*set ponder &\"And how will everything square with you and Cass?\"\n*if (vega_relationship)\n\t*set ponder &\"And how will everything square with you and Vega?\"\n*comment endif\n${ponder}\n\nA knock on the door breaks you from your reverie.\n\n*page_break\n\n*temp offer_count 1\n\n*if wakefield_offer\n\t*set offer_count +1\n*if blessing\n\t*set offer_count +2\n\t\n*temp visitors \"visitors\"\n\n*if offer_count = 1\n\t*set visitors \"a visitor\"\n\n*temp visitors_pronoun \"They're\"\n*temp vis_pro_obj \"them\"\n\n*if offer_count = 1\n\t*set visitors_pronoun \"He is\"\n\t*set vis_pro_obj \"him\"\n\nClaire, from your resource center, steps into your office.  \"${Char_voc} ${surname}, you have ${visitors}.\"\n\n*fake_choice\n\t#\"I'm busy.\"\n\t\t\"${visitors_pronoun} very insistent.\"\n\t\t\n\t\tInteresting.  \"Okay, fine.  Send ${vis_pro_obj} in.\"\n\t#\"Send them in.\"\n\t\t*if offer_count > 1\n\t\t\t\"All of them?\"\n\t\t\t\n\t\t\tYou hide your surprise.  \"No, I want you to leave some of them outside.\"\n\t\t\n\t\t\t\"Okay,\" she says, with a tone of voice that means, \"Your funeral.\"\n\t\t\t*goto offers\n\t\t*else\n\t\t\t\"Okay,\" she says, with a tone of voice that means, \"Your funeral.\"\n\t\t\t*goto offers\n\t#\"Who?\"\n\t\t\"I'm not sure I can rightly say.\"\n\t\t\n\t\tInteresting.  \"Fine.  Send ${vis_pro_obj} in.\"\n\t\t*goto offers\n\n*label offers\n*page_break\n\n*temp offers_1 \"She holds the door open for \"\n*temp offer_count_1 offer_count\n\n*set offers_1 &\"R'ok, tall and resplendent in a form of chitinous obsidian armor you've never seen him wear before\"\n*if wakefield > 70\n\t*set offers_1 &\"—followed by Ashleigh Wakefield.  \"\n*if wakefield \u003c= 70\n\t*set offers_1 &\".  \"\n*if blessing\n\t*set offers_1 &\"While you're still trying to appreciate this new development, Claire carries in a small potted plant, and places it on your desk.\"\n*comment endif\n\n${offers_1}\n\n*if blessing\n\t\"A plant, Claire?\"\n\t\n\tShe shrugs.  \"The packages come in, and I set them down.\"\n\t\n\t\"It couldn't come through the mail?\"\n\t\n\tThen you smell it—a deep, rich smell of jungle earth and starlight and mist.  The world colors, and tints green.  Your oak desk sprouts green shoots, and your walls speak with a voice you know.  \"Because goddesses,\" Ajaia says, \"do not travel through the mail room.\"\n\t\n\t*page_break\n*comment endif\n\n*if offer_count > 1\n\t\"What's going on here?  Are you working together?\"\n*if offer_count =1\n\t\"What's going on here?\"\n*comment endif\n\n*temp next_speaker \"\"\n*if wakefield_offer and wakefield_relationship\n\t*if blessing\n\t\t*set next_speaker \"Ajaia\"\n\t\t*goto next_speaker_text\n\t*else\n\t\t*set next_speaker \"R'ok\"\n\t\t*goto next_speaker_text\n*else\n\t*if wakefield_offer\n\t\t*set next_speaker \"Wakefield\"\n\t\t*goto next_speaker_text\n\t*else\n\t\t*if blessing\n\t\t\t*set next_speaker \"Ajaia\"\n\t\t\t*goto next_speaker_text\n\t\t*else\n\t\t\t*set next_speaker \"R'ok\"\n\t\t\t*goto next_speaker_text\n*label next_speaker_text\t\t\n*if (wakefield_offer and wakefield_relationship)\n\t\"Don't get excited,\" Wakefield says.  \"This is a business visit.\"\n*comment endif\n\n*if offer_count > 1\n\t\"We are here to the same purpose,\" ${next_speaker} says.  \"But we are not here together.\"\n\t\n\t\"I don't understand.\"\n\t\n\t\"We hear that you are near a point of transition in your life.  And before the moment passes,\" R'ok says, \"we would like to offer you jobs.\"\n*if offer_count = 1\n\t\"I hear that you are near a point of transition in your life.  And before the moment passes,\" R'ok says, \"I would like to offer you a job.\"\n\t*page_break\n*comment endif \n\n\"What?\"\n*page_break\n*if blessing\n\tAjaia speaks once more, and the shoots flower.  \"You saved me.  You guided me.  There is a place in Tassadon for you, if you wish it.  Your visit made clear my need for a loyal ${Craftsperson}.  I could support you, if you serve me.  Not in such royal estate as your current firm, but I can make you comfortable in my way.\"\n*comment endif\n\n*temp Wakefield_cane \"\"\n*if Wakefield_hurt\n\t*set Wakefield_cane &\"${Ash_pro_pos_cap} gloved hand tightens around the haft of ${Ash_pro_pos} cane.  \"\n\n*temp Wakefield_CoI \"\"\n*if wakefield_relationship\n\t*set wakefield_CoI &\"  Unfortunately, we would need to discontinue our…pleasant fraternization.\\\"  You wince.  \\\"Kelethres Albrecht & Ao is not so lax about conflicts of interest as some other firms I could mention.\\\"\" \n\n*if wakefield_offer\n\tWakefield crosses ${Ash_pro_pos} legs, and uncrosses them.  ${Wakefield_cane}\"I have spoken with my firm, and if you wish it, we have a counsel opening for you at Kelethres Albrecht & Ao.  My firm's likewise grand, and has a good reputation, but it will be no easier than what you've found here.  That's the best I can do, for now.${wakefield_CoI}\"\n*comment endif\n\n*temp Rok_AndI \"\\\"I,\\\"\"\n*if offer_count > 1\n\t*set Rok_AndI \"\\\"And I,\\\"\"\n\n${Rok_AndI} R'ok says, \"am here representing my convalescent father, and the demon consortium of Akargath.  You saved us.  We clearly require our own representation, in addition to our long-term relationships with human Craftsmen.  We would like you to join us in this capacity.\"\n\n*page_break\n\n*temp AllofYou \"\"\n*if offer_count > 2\n\t*set Allofyou \"\\\"All of you.\\\"\"\n*if offer_count = 2\n\t*set Allofyou \"\\\"Both of you.\\\"\"\n\n\"Thank you,\" you say.  ${Allofyou}\n\nOutside the window, cottony clouds streak the blue sky.  But between you and that sky hangs a pane of glass.\n\nHere you are again.  You face today, as every day, the same question you faced in that dark interval of shattered mirrors.  What life do you want to build?\n\n*choice\n\t*if (blessing) #I go with the goddess.\n\t\tYou think back over the last seven years, over your life in this city and around the world, working to the benefit of those with enough wealth to employ a firm's Craftwork team at several souls an hour.  If you've helped people, you did so at cross-purposes with the dread edifice of dark magic that has paid your salary since graduation.\n\t\t\n\t\tPerhaps the goddess will be better.  She has a community—she is a community.  Tassadon breathes, it lives, it grows.  Even if you don't stay there forever, you could learn a lot from Ajaia and her community.\n\t\t\n\t\t\"Goddess,\" you say, speaking everywhere and nowhere at once.  \"I'd like to hear more about your offer.\"\n\t\t\n\t\t\"I am glad,\" she says.  \"I will send you a formal letter.\"\n\t\t*set offer_accepted true\n\t\t*set final_job \"goddess\"\n\t\t*achieve goddessoffer\n\t\t*goto end\n\t*if (wakefield_offer) #I go with Wakefield.\n\t\t*set final_job \"wakefield\"\n\t\t*achieve wakefieldoffer\n\t\t*set offer_accepted true\n\t\t*goto wakefield_newstart\n\t*if (makes_partner) #I accept my firm's offer of partnership.\n\t\t*set offer_accepted true\n\t\tYou think back over the last seve
