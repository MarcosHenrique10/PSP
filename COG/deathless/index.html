y chair.\n\n*page_break\n\nWakefield grins at the shock you try and fail to hide.  \"Easier to do it this way than to summon her all the way from the far hells,\" ${ash_pro} says.  \"I'll see you when we're done—at Craige's, perhaps?\"  You watch in horror as Wakefield's grin widens and hardens until it's more a seizure than grin, the hysterical opposite of a stroke victim's arrest.  Those bright blue eyes roll up in their sockets, and keep rolling, and cease to be eyes at all but holes, pits welling with blood.\n\nA blood tear drips down Wakefield's cheek, and ${ash_pro} removes a red handkerchief to wipe it away.  The smile remains wide; ${ash_pro_pos} teeth now are pointed, and ${ash_pro_pos} tongue is thinner.\n\n\"Shall we begin?\" ${Ash_pro} says.\n\nYour stomach turns, but the moderator nods, and there's no way out but through.\n\n*page_break\n\nThe moderator's talking, but you don't pay much attention.  There's the crowd, and there's you.  You prepared extensively—pages of notes back in your office, pages and pages, but you can't just read from notes now.  Not with the audience watching.\n\nThe audience, which, you realize with a sudden sinking feeling, includes the obviously-pseudonymous John Smith of Transdimensional Thaumaturgics.  Who of course would be here; his Concern relies on demonic labor and investment.  But performing in front of the gray eminence of Varkath Nebuchadnezzar's largest client does not help preserve your calm.\n\nSo—how do you plan to play this panel?\n\n*choice\n\t#Focus on the mechanics of demon contracts.  That's why people are here.\n\t\t*set craft %+10\n\t\tYou keep within the boundaries of the panel description.  You know enough to discuss the special considerations that apply to deals with demons, the limitations and moral hazards of binding sentient beings in general, and the particulars of the soul economy.  Not to mention the finer points of wards and markets.\n\t\t\n\t\t*if (craft - (sleep_difficulty)) > (base_difficulty - 10)\n\t\t\tAnd it works, is the funny thing.  You expected to bore even such a specialized audience to death, but when you open your mouth, people lean in and seem to pay attention.  Who knows why.  It's entirely possible, as strange as this seems, that you actually know what you're talking about.\n\t\t\t*goto Conference_Succeed\n\t\t*else\n\t\t\tUnfortunately, these sorts of issues tend to be dry at the best of times, even if they are essential to preventing a wholesale demonic invasion of the mortal realms.  One of the skeletons in the back row yawns, though he tries to hide it with his hand.    \n\t\t\t*goto Conference_Fail\n\t#Charm the crowd.  \n\t\t*set charm %+10\n\t\t*set gunner %-10\n\t\tWhatever else the audience gets out of the panel, at least you can help them enjoy their experience.  You turn on the charm in a serious way, relying on as big and easy and honest a grin as you can muster, and your usual mix of affable charm.\n\t\t\n\t\t*if (charm - (sleep_difficulty)) > base_difficulty\n\t\t\tWhich…works surprisingly well, actually.  Your jokes and anecdotes don't contribute much to the panel as a whole, but your story about getting attacked by R'ok does secure a genuine audience laugh, one of the few of the day.\n\t\t\t*goto Conference_Succeed\n\t\t*else\n\t\t\tStill, it's hard to charm a crowd full of Craftsmen and Craftswomen.  Your jokes and stories are good, you think, but they fall on deaf or at least humorless ears.  Oh, well.  Their loss, if they don't understand why you getting jumped by R'ok is funny. \n\t\t\t*goto Conference_Fail\n\t#Talk about the firm's successes—this is an opportunity to promote your work.\n\t\tThink about it this way: everyone in this room is a client or a competitor—which, in your vocabulary, is just another word for \"possible employer.\"  This is an excellent platform to make Varkath Nebuchadnezzar look good, and more importantly, to make [i]yourself[/i] look good. \n\t\t*set cunning %+10\n\t\t*set gunner %+10\n\t\t*if (cunning - (sleep_difficulty)) > base_difficulty\n\t\t\tAnd there are plenty of ways to do that.  You talk about your personal successes, and the firm's.  The whole Transdimensional Thaumaturgics story, anonymized, becomes a test case in performance under pressure, as well as a compelling illustration of the risks Concerns run when they deal with demons.  People edge forward in their seats when you speak.\n\t\t\t*goto Conference_Succeed\n\t\t*else\n\t\t\tIt's easy, though, to take that approach to extremes of self-aggrandizement.  You try to hold back, but this makes you second-guess everything you say, and as a result you can't participate in the discussion naturally or glibly.\n\t\t\t*goto Conference_Fail\n\t#I don't want to \"play\" the conference at all.  I answer all questions completely and to the best of my ability.\n\t\tThere are as many ways to turn a simple discussion into a game as there are Craftsmen to try.  You don't have any ulterior motives, here.  People want information, and you want to give it to them with as little embellishment as possible. \n\t\t\n\t\t*set gunner %+10\n\t\t*set power %+10\n\t\t*if (power - (sleep_difficulty)) > base_difficulty\n\t\t\tOddly, this no-strategy strategy seems to work.  You answer questions, ask followup questions, and in general provide a solid core to a panel that might otherwise have meandered.\n\t\t\t*goto Conference_Succeed\n\t\t*if not((power - (sleep_difficulty)) > base_difficulty)\n\t\t\tOf course, there is a difference between straightforward and uninformative.  You think your answers to questions are complete and clear, but often you leave other panelists pressing you for further answers, which makes you look defensive.  And when the floor opens for questions, the few who direct their questions to you sit down looking unsatisfied.\n\t\t\t*goto Conference_Fail\n\n*label Conference_Succeed\n*set panel_success true\n*page_break\n\nAnd the rest of the panelists, well, they know what they're doing.  Especially the demon.  It's a veritable font of information on the many hells, and on the nature of their concern with mortal souls.\n\n\"Soulstuff,\" the demon says through Wakefield's mouth, \"is the essence of your reality, purified and condensed by the action of consciousness.  Through its acquisition, we learn about other worlds.\"\n\nWhich isn't exactly true, but it's the first time you've heard a demon speak on the subject.  The audience seems to enjoy themselves.  When the moderator glances at his watch and shrugs and says, \"It seems the time has come for this panel to end,\" the applause continues for a long while.\n\nOnce you gather your coat and exchange pleasantries with the panelists to your left and right, Wakefield's already gone.  No matter.  The post-panel glow is more than enough to keep you warm on the walk to the bar.\n\n*goto Bar\n\n*label Conference_Fail\n*set panel_success false\n*page_break\n\nThe rest of the panel never quite gets their act together, either.  Attendees talk past one another, make unconscious assumptions, veer into technical weeds, and in the end the five of you fail to reach even a reasonable disagreement.\n\nWakefield's demon is the one notable exception.  It's light on its feet, rhetorically sharp, and informative.\n\n\"Soulstuff,\" the demon says through Wakefield's mouth, \"is the essence of your reality, purified and condensed by the action of consciousness.  Through it, we learn about other worlds.\"  Which may or may not be true, but it's the first time you've heard a demon speak on the subject.  \n\nWhen the moderator glances at his watch and says, \"It seems the time has come for this panel to end,\" the applause lasts a necessary few seconds before it fades into insignificance.\n\nBy the time you've gathered your coat and finished exchanging pleasantries with the panelists to your left and right, Wakefield's already gone.  No matter.  The post-panel glow is more than enough to keep you warm on the walk to the bar.\n\n*goto Bar\n*comment Act 2: The Bar Afterward.\n\n*comment Beat 1: See Ashleigh with Smith.  [Professional threat / personal threat]\n*label Bar\n*page_break\n\nCraige's is a Camlaan-style pub a half-block down Lakefront Drive from the convention center—and, as you'd expect from a place that serves alcohol so close to a large concentration of Craftsmen, it's slammed.  When you step into the heat, there isn't enough room to brush the snow off your coat, and it starts to melt through.  You shoulder between a golem and a forbidding, green-faced woman in flowing black robes, ignore the beleaguered hostess's bleating, and find a square foot of clear ground to catch your bearings.\n\nA skeleton brushes past you, engaged in deep conversation with a sprite seated on her shoulder drinking something green out of a thimble-sized crystal cup; a tall and dapper reanimated gentleman in a tuxedo bows to a bronze-skinned woman with hair in long golden braids down to the middle of her back.  Everyone who's anyone is here, and about half those who aren't.  Across the room, you glimpse your panel's moderator huddled over a glass full of whiskey; you wave to him, but he either doesn't notice, or ignores you.\n\n*temp drink_number \"\"\n*choice\n\t#I order a drink, and look for Wakefield.\n\t\tYou shout your order to the bartender, who can't possibly have heard it over the noise in here.  She nods anyway, and passes you something orange and steaming—or is that smoke?  Either way, it tastes good.\n\t\t*set sleep %-5\n\t\t*set drink true\n\t\t*set drink_number \"drink\"\n\t\t*goto Ashleigh_Bar\n\t#I order two drinks, and look for Wakefield.\n\t\tYou shout your order to the bartender, who can't possibly have heard it over the noise in here.  She nods anyway, and passes you something orange and steaming—or is that smoke?  Either way, it tastes good.\n\t\t\n\t\tAnd so does the second one.\n\t\t*set sleep %-8\n\t\t*set drink true\n\t\t*set drink_number \"drinks\"\n\t\t*goto Ashleigh_Bar\n\t#I'm not here to drink.  Is Wakefield here, or not?\n\t\t*goto Ashleigh_Bar\n\n*label Ashleigh_Bar\n\n*if (drink)\n\tYou settle back against the bar with your ${drink_number}, and scan the crowd.\n*comment endif\n\nThe bar's a jumble of bodies and a roar of noise.  Outside, the snowstorm's picked up, and snowflakes the size of cotton balls hit the windows and stick.\n\nIn a corner booth, almost hidden by shoulders and backs and arms and bobbing heads, you catch a glimpse of Wakefield's face, laughing.  You stand on your tiptoes and crane your neck—you weren't wrong.  Wakefield raises a beer to ${Ash_pro_pos} lips and takes a long swallow.  For once ${Ash_pro} looks genuinely happy, without any ulterior motive or game.\n\nYou crane your neck to try to make out who ${ash_pro}'s drinking with, and there, when the mountain-man shifts out of the way, you see—\n\nIsn't that interesting.  John Smith, of Transdimensional Thaumaturgics.  Now what's your client doing drinking with your—what [i]is[/i] Wakefield to you, anyway?\n\n*choice\n\t#My rival.\n\t\t*set Wakefield %+10\n\t\tEvery blade needs a grindstone to abrade it sharp; you've served that role for each other since your time at the Hidden Schools.  Which makes this particular case strange—is ${Ash_pro} trying to steal your client?\n\t\t*set Wakefield_rival true\n\t\t*goto Ashleigh_reaction\n\t#My friend.  Even if ${ash_pro} is a bit of an entitled jerk.\n\t\tIt took you some time after first meeting Wakefield to learn that for all ${Ash_pro_pos} flaws, ${Ash_pro} wasn't a nasty person.  ${Ash_pro_cap} just grew up that way.\n\t\t\n\t\t*if (background = \"poor\") or (background = \"beggar\")\n\t\t\tThe world's full of such people—advancing under their own inertia, unaware of the ripples their actions cause, unaware even that many of their actions [i]are[/i] actions.  A statement can wound, an assumption can kill, or break another's life to pieces.  Better, in a way, to be born in circumstances where you can take nothing for granted.  You see the world clearer.\n\t\t\t\n\t\t\tYou hope.\n\t\t*if (background = \"comfortable\")\n\t\t\tIt's strange to see: how someone can come from a position even your family, who worked so hard and achieved so much, never quite managed to achieve, and yet take it all for granted.  But everyone lives with ${char_pro_pos} own blindness, and only rare people can identify their own.\n\t\t*if (background = \"aristo\")\n\t\t\tYou know the pressures well—or at least your family's equivalent of them.  At certain heights of wealth, ambition unmoors from human scale.  A child, or a ${char_binary} for that matter, is one more sentence in a story the great part of which has already been told.  Irony, distance, and dry humor are one possible response against creeping futility.\n\t\t\t\n\t\t\tThen again, maybe ${ash_pro} is just a jerk.  It's hard to tell for sure.\n\t\t*comment endif\n\t\t\n\t\tAnyway, it doesn't answer the main question—why is Wakefield drinking with Smith?\n\t\t*set Wakefield %+20\n\t\t*goto Ashleigh_Reaction\n\t#Just a classmate.\n\t\tYou weren't close to everyone you met in the Hidden Schools.  After graduation, the people you knew spread across the world.  Some are near, most far.  Wakefield's one of the near ones.\n\t\t*set Wakefield %-20\n\t\t*goto Ashleigh_Reaction\n\t*if (Wakefield > 50) #There might be some basic physical attraction at play.  Not that either of us would admit it.\n\t\t${Ash_pro_cap} does have a certain flare, in spite of, or perhaps because of, ${ash_pro_pos} disaffected attitude.  You're pretty sure the attraction's mutual, but neither of you have done anything about it.  Anything either of you said would amount to an admission of weakness, and ${ash_pro}'s the last person in front of whom you'd dare show weakness.\n\t\t\n\t\tSo much for that.  It doesn't address the main concern here.\n\t\t*set Wakefield %+30\n\n*label Ashleigh_Reaction\n*choice\n\t#Wakefield looks like ${ash_pro} wants to steal our client.\n\t\t*set gunner %+10\n\t\t*set cunning %+20\n\t\tThis could be a personal meeting.  They could be legitimately interested in one another, for any of a range of reasons.  They could both secretly be leopards transformed into human shape.  None of the above seems likely.\n\t\t\n\t\tTransdimensional Transactions is your firm's biggest client.  They don't work with Wakefield's firm, at least as far as you know.  If ${ash_pro} manages to net some business for them, it could be a huge coup for ${ash_pro_obj}.  Which isn't bad by itself, but—that business could just as easily have gone to you.\n\t\t*goto Interfere\n\t#Smith looks entirely too pleased for my comfort.  What's his angle?\n\t\t*set gunner %+10\n\t\t*set cunning %+10\n\t\t*set craft %+10\n\t\tThe question isn't so much why Wakefield might want to drink with Smith, as why Smith would want to oblige ${Ash_pro_obj}.  In your previous interactions with Smith, he didn't seem to be a terribly social human being—didn't seem like much of a human being at all, in fact.  People do show different sides outside the office, but is that what's going on here?\n\t\t\n\t\t*if (drink)\n\t\t\tA few facts float through the drink-haze in your mind.\n\t\t*if not(drink)\n\t\t\tA few facts float through your mind, seeking connections.\n\t\t*comment endif\n\t\t\n\t\tThe demon who rode Wakefield through the panel was sent by the consortium of Akargath: the same consortium which was trying to exploit Smith's contract down in Southern Kath—the demon invasion you stopped.\n\t\t\n\t\tThat kind of consciousness-sharing is not one-way.  The demon who rode Wakefield left some of itself inside, traces of which Ashleigh might not be conscious, but which will surface over the next few weeks in nightmares.  If Smith wants to steal a march on his competitor-partners, perhaps he could try to pry out those scraps of abandoned memory?  The process wouldn't be pleasant for Wakefield, though.\n\t\t*goto Interfere\n\t#I feel jealous of Smith.\n\t\t*set gunner %-10\n\t\t*set charm %+20\n\t\t*set Wakefield %+10\n\t\tYou wish there were some complex strategic reason to explain why the sight of Wakefield drinking with Smith rubs you the wrong way.  How nice to be able to say, oh, I'm concerned for Varkath Nebuchadnezzar's business, or I have some abstract ${craftsperson}'s reason for my interest.  Good old fleshy human feelings like jealousy don't tend to get a lot of respect or credit in the world you inhabit.\n\t\t\n\t\tBut, sometimes, the right answer isn't the glamorous one.\n\t\t*goto Interfere\n\n*comment Beat 2: What do you try to do about that?  [Interfere]\n*label Interfere\n\nSo, what do you do?  If anything.\n\n*choice\n\t#Look for an opportunity to talk to Wakefield alone.\n\t\tAfter a few minutes, Smith stands, stretches, and walks toward the restroom.  An ideal opening.  You swim through the crowd—slipping on the trailing hem of a woman's black gown in the process—and after a few missteps you reach the corner booth and sit down.\n\t\t\n\t\t\"Having a pleasant evening?\"\n\t\t\n\t\tWakefield's brow furrows, and ${ash_pro} draws ${ash_pro_pos} lips together.  \"What?\"\n\n\t\t\"We were supposed to meet here,\" you say, suddenly confused.\n\t\t\n\t\t\"Were,\" ${Ash_pro} says.  \"I am sorry, ${name}.  Other responsibilities have come up.  And opportunities.  I would prefer if you left me alone for now.\"\n\t\t\n\t\tWeird.  \"Fine.  Just be careful, okay?  Smith is not nice people.\"\n\t\t\n\t\t\"That's the idea,\" Wakefield says, drawing out the s.  Affectless voice, dead body language, complete lack of deprecating wit: something's very wrong, but ${ash_pro} is not about to tell you what.\n\t\t\n\t\tYou excuse yourself, and return to the bar.\n\t\t*set talk_to_ash true  \n\t\t*goto They_Leave\n\t#Intrude on their conversation.\n\t\t*set charm %+20\n\t\t*set power %+20\n\t\t*set intrude true\n\t\t*set talk_to_ash true\n\t\tYou could try to talk to one of them alone, but then it might look like you were conspiring with one of them against the other.  Or as if you had something to hide, which of course you don't.  So, awkward as it might seem, you swim through the crowd—slipping on the trailing hem of a woman's black gown in the process—and after a few missteps reach the corner booth.\n\t\t\n\t\t\"Hi,\" you say, \"Ash!  I was looking all over for you.  And, Mister Smith.\"  You nod to him, as if the last time the two of you met you parted close friends.  \"Always a pleasure.\"\n\t\t\n\t\tWakefield's face twists briefly into a quizzical expression.  Smith glances from ${ash_pro_obj} to you, and back; he lifts his glass, which contains a cocktail a hideous shade of pink, inside of which floats what looks to be a small octopus.  You can't tell whether the octopus is fake or real.\n\t\t*page_break\n\t\tSmith addresses you first.  \"${char_voc} ${surname}.  ${name}.  An unexpected pleasure.\"\n\t\t\n\t\t\"The best ones always are.\"\n\t\t\n\t\t*if panel_success\n\t\t\t\"I must congratulate you on the success of your panel.\"\n\t\t*if not(panel_success)\n\t\t\t\"Your panel was…intriguing.\"\n\t\t*comment endif\n\t\t\t\n\t\t\"Happy to discuss the subject further.\"  You turn back to Wakefield.  \"Should I get us all a round?\"\n\t\t\n\t\t\"Unfortunately,\" Smith says, \"your presence is unwelcome at this juncture.  We are in the middle of a professional discussion.\"\n\t\t\n\t\tWakefield smiles, without showing teeth.  \"I'm so sorry, ${name}.  I'll have to make it up to you later.\" \n\t\t\n\t\tWeird.  But you can tell when you're not wanted.  You excuse yourself, and return to the bar.\n\t\t*goto They_Leave\n\t#Look for an opportunity to approach Smith.\n\t\tAfter a few minutes Smith stands, stretches, and walks toward the restroom.  An ideal opportunity.  You swim through the crowd—slipping in the process on the trailing hem of a woman's black gown—and after a few missteps you reach the restrooms just behind him.\n\t\t\n\t\tYou lean against the wall beneath a bad painting of a hunting scene, and try to look as if you're not waiting for someone to come out of the bathroom.  You're pretty sure you fail.\n\t\t*page_break\n\t\tWhen Smith does exit, he looks fresher—hair combed, shirt freshly tucked, inhuman grin shellacked onto his lips.  It doesn't even falter when you step into his path.  \"Smith.\"\n\t\t\n\t\t\"Why, ${char_voc} ${surname}.  ${name}.  Been a while.\"\n\t\t\n\t\t*if panel_success\n\t\t\t\"I must congratulate you on the success of your panel.\"\n\t\t*if not(panel_success)\n\t\t\t\"Your panel was…intriguing.\"\n\t\t*comment endif\n\t\t\t\n\t\t\"I see you're having a chat with one of the participants.\"\n\t\t\n\t\t\"${ash_voc} Wakefield approached me after the panel, wishing to discuss business in a private setting.  I would invite you to join us, but I'm afraid it's not a discussion in which I feel comfortable including you at this juncture.\"\n\t\t\n\t\t\"Keeping secrets?\"\n\t\t\n\t\t\"As always.  Now, if you'll excuse me.\"  He doesn't wait for your reaction—steps around you instead, and returns to the corner booth without a backward glance.  Wakefield looks up as he approaches; ${Ash_pro} must have seen you, but either doesn't notice, or doesn't care.\n\t\t\n\t\tStymied, you return to the bar.\n\t\t*goto They_Leave\n\t*if ((craft > base_difficulty) and (soul > 500)) #I use the Craft to overhear their conversation.\n\t\t*set craft %+20\n\t\t*set power %+10\n\t\t*set soul -200\n\t\tThis is such a bad idea.  You're in a room full of Craftswomen and Craftswomen and all manner of other powers, any of whom could tell what you're trying to do in the blink of an eye.\n\t\t\n\t\tBut, hells, you've had bad ideas before, and they turned out okay.  Except for that one time when you set the relay baton on fire.  And, you know, a decent chunk of your professional career.\n\t\t\n\t\tThrowing perception is possible, but tricky, and easy to notice—much better to plant a glyph nearby and listen through that.  Better, that is, if you had a way to plant the glyph without their noticing.  You don't have a scrying ball to hand, and again, staring into a crystal ball would be a little obvious.\n\t\t\n\t\tWhat you can do, though, is clear a space in the air between your ears and their table: just a little tube of semisolid air above the heads of the crowd, leading from your ear over to their booth.  Doesn't take much power: the bar may be noisy, but sound waves are pretty low-energy.\n\t\t\n\t\t*page_break\n\t\t*if (craft - sleep_difficulty) > base_difficulty\n\t\t\tTakes a try or two to get the pathway right, and even at its best you can't hear them any better than you could if you were listening through a very long tube, but you do manage to catch a few snatches of conversation.\n\t\t\t\n\t\t\t\"—productive business relationship,\" Smith's saying, in that eerily normal voice of his.\n\t\t\t\n\t\t\t\"I understand exactly what you mean,\" Wakefield says.  ${Ash_pro} sounds [i]earnest[/i] for once.  \"And I would be willing to take you up on that trade—though this is obviously not the right location.\"\n\t\t\t\n\t\t\t\"I know a place,\" Smith says, and they get up to leave.\n\t\t*if not((craft - sleep_difficulty) > base_difficulty)\n\t\t\tThere is a problem with fiddling around with the Craft rather than intervening in direct and sociable ways: Craftwork is a slow, painstaking process at its core, involving precisely formed and considered language.  And you don't even want to close your eyes to see what you're doing, because others might notice.  You might as well be trying to draw a map from memory while blindfolded.\n\t\t\t\n\t\t\tWhich is do say—it doesn't go well.   \n\t\t*goto They_Leave\n\t#Nothing.  I watch, but they're one another's business now, not mine.\n\t\tPeople are entitled to their privacy.  Even people like Wakefield and Mr. Smith.  You watch the two of them together, from the bar.  At the other end, the moderator slumps in front of his second whiskey.  Wakefield and Smith seem to be enjoying one another's company, as why shouldn't they?\n\t\t*goto They_Leave\n\t\t\n*label They_Leave\n\nThe storm outside grows worse.  A layer of snow covers the bar's small high windows.  The door opens to admit or emit patrons, and each time gusts of cold wind draw curses from those still gathered inside.\n\n*if (drink)\n\tYou've been drinking at a slow but steady pace.  The bartender likes you, but you feel less controlled than usual.  Happens sometimes.\n\t*set base_difficulty +5\n*if not(drink)\n\tYou bought a cider to keep the bartender off your back, and you've nursed it since.  The bartender passes you by with an icy silence.  You decide she deserves a good tip.\n\t*set soul -10\n*comment endif\n\nWakefield rises first, and Smith follows ${Ash_pro_obj} to the door, buttoning his coat, obviously intrigued.\n\n*page_break\n\n*if (cunning > (base_difficulty + 15)) or (craft > (base_difficulty + 15))\n\tWakefield's behaving strangely—less vicious than usual, for one thing.  Ordinarily ${Ash_pro} would not give a snake like Smith the time of day—${Ash_pro} has a finely honed taste for Smith's brand of malice.  Perhaps Smith is smooth enough to overcome Wakefield's general dislike, but judging from body language, Wakefield seems to be doing at least half the leading in this scenario.\n\t\n\t*if talk_to_ash\n\t\tNot to mention that Wakefield didn't seem to remember ${Ash_pro_pos} offer to meet you here.  Or—and this really does throw you for a loop—${ash_pro} used your name.  Your [i]first[/i] name.\n\t*page_break\n\tSomething's going on here—some lingering result of the panel.  When ${Ash_pro} let that demon into ${Ash_pro_pos} body.  The demon, summoned for the panel—which, now that you recall, never formally ended.  \"The time has come to end this panel,\" the moderator said.  He didn't actually say the panel was over, just that its scheduled time had elapsed.  Not much of a loophole, but enough for a demon to exploit.\n\t\n\t*if talk_to_ash\n\t\tYou try to remember if you saw Wakefield's teeth, when you talked to ${ash_pro_obj} in the booth.  You can't.\n\t*comment endif\n\t\n\tThis is mad.  But the more you think about it, the more sense it makes.\n\t\n\tDemons hold long grudges.  And when it saw Smith in the audience, it must have seen its chance.  If it didn't know already.\n\t*set gets_it true\n\t*set gets_it_first true\n\t*achieve getsit\n*if not((cunning > (base_difficulty + 15)) or (craft > (base_difficulty + 15)))\n\tYou watch them go and lean back against the bar, pondering the maze inside your old classmate's brain, and the maze in Smith's.  Perhaps they are perfect for one another, now that you think it through.\n\t\n\tThen a waitress, come to clear the booth Smith and Wakefield have vacated, kneels beneath the table and rises, holding a familiar black briefcase.  \"Excuse me?\"  She scans the crowd, holding the briefcase high.  \"Does this belong to anyone?\"  You can barely hear her through the crowd noise.\n\t*page_break\n\tWeird.  You straighten, and force your way through the crowd to her side.  \"I think that might belong to my friend,\" you say.  \"Is there a monogram on the lid?  AJW?\"\n\t\n\tShe checks, and nods.\n\t\n\tWakefield wouldn't leave a briefcase.  Anyone else, in any other line of work, yes—but there's too much of ${Ash_pro_pos} soul, and ${Ash_pro_pos} firm's property, in that case for ${Ash_pro_obj} to leave it unintentionally.\n\t\n\t\"${Ash_pro_cap} was just sitting right here,\" you say.  \"If I run, I might be able to catch ${Ash_pro_obj}.\"\n\t\n\tPerhaps Wakefield's in trouble.  Perhaps Smith has some hold over ${Ash_pro_obj}.  Too many possibilities for your comfort. \n\t*set late_to_fight true\n*comment endif\n\nBut how can you catch up with them?\n\n*fake_choice\n\t#Run as fast as I can.\n\t\t*set power %+10\n\t\tYou shove through the still-crowded bar, knock the woman with the golden braids into a broad-faced young man who's woven steel threads through his cheeks for some reason, spill both their drinks, and burst out onto the street.\n\t\t\n\t\tFrozen wind screams off the lake.  Snowflakes whip through the cold and the dark, rising as often as falling.  You think you catch a glimpse of Wakefield's head a few blocks down, turning right, out onto a pier.\n\t\t\n\t\tThey have a head start, but you can run.  Lords and ladies, can you run.\n\t\t\n\t\t*if (power > (base_difficulty + 10)) and not(late_to_fight)\n\t\t\t*goto Get_There_First\n\t\t*else\n\t\t\tThe cold air stings your throat and lungs; you're breathing hard before you've sprinted half the distance to the pier.  Should have trained harder these last couple years.  Too much time behind a desk.\n\t\t\t\n\t\t\tYou turn onto the pier, skidding in snow, and run past shuttered shops and stanchions above the gray-black water.  Concrete thuds underfoot.  Through the whirl and white, you see them.\n\t\t\t*goto Get_There_Late\n\t#Think about where they might be going.\n\t\t*set cunning %+10\n\t\tYou slide through the crowd, thinking hard.\n\t\t\n\t\t*if (gets_it)\n\t\t\tWakefield—or the demon in Wakefield—wants Smith all to itself, with plenty of time to work.  A simple, quick death won't be enough.  It will want to hear the screams—and there aren't many places in this part of Shikaw where such screams will go unnoticed.  Still, it won't want to go far.\n\t\t*if not(gets_it)\n\t\t\tWhatever's going on here—whether Smith's using Wakefield or vice versa—they'll want privacy, which is hard to come by in this part of the Lakeshore district.  Hotels are all packed for the convention.  Bars and private clubs likewise.\n\t\t*comment endif\n\t\t\t\n\t\tFurther north along the shore, piers jut out into the water—empty most of the winter.\n\t\t\n\t\t*if (cunning > (base_difficulty + 10))\n\t\t\tThe two nearest piers were closed off to the public after a problem on a container ship released some pseudodemonic contaminant; if you stare through the chain link fences you can still see the piers beneath what looks like a field of sunflowers, green and growing, untouched by the frost.\n\t\t\t\n\t\t\tNeither of those.  Which means, if they didn't want to go far (and who would, in this cold) they're down Eddison Pier.  You jog through swirling snow, careful to keep your footing, and turn right.  At the pier's end, through the snow, you glimpse Wakefield's yellow hair.\n\t\t\t*if not(late_to_fight)\n\t\t\t\t*goto Get_There_First\n\t\t\t*if (late_to_fight)\n\t\t\t\t*goto Get_There_Late\n\t\t*if not(cunning > (base_difficulty +10))\n\t\t\tYou try the nearest pier, forgetting in your haste that it was closed off to the public a few months back after an accident on a container ship spilled pseudodemonic contaminants onto the concrete.  Through the chain link fence, behind the \"KEEP OUT\" sign, a field of sunflowers grow, green and yellow and black and huge, immune to the frost.  The sunflowers turn and watch you pass.\n\t\t\t\n\t\t\tThe next pier's also closed, but the third's the one you want.  Eddison Pier.  You jog through swirling snow, careful to keep your footing, and turn right.  Down at the end of the pier, through the snow, you glimpse Wakefield's yellow hair. \n\t\t\t*goto Get_There_Late \n\t*if (soul > 500) #Trace them using Craft.\n\t\t*set soul -200\n\t\t*set craft %+10\n\t\t*if not(gets_it)\n\t\t\t\"Can I see that for a second?\"  Before the waitress can refuse, you touch the case with both hands, and close your eyes.  The case belongs to Wakefield, without a doubt, and as with any close personal possession, frequent use has baked some of ${Ash_pro_obj} into its substance.  The case is, in a very real sense, part of ${Ash_pro_obj}.\n\t\t\n\t\t\tWhich means a bond connects them, even now: with your eyes closed you see it as a slender silver cord weaving and winding through the tangle of souls and contracts and bargains and exchanges of the bar.\n\t\t*if (gets_it)\n\t\t\tYou close your eyes and scan the room—a confusion of warped soulstuff in the service of these stuffy Craftsmen.  There, in the corner booth where Wakefield sat, you see a tangle of silver wire—the demon must have left ${Ash_pro_pos} briefcase.  Wakefield never would have done such a thing.\n\t\t\t\n\t\t\tA lucky break: the case belongs to Wakefield, and as with any close personal possession, frequent use has baked some of ${Ash_pro_obj} into its substance.  The case is, in a very real sense, part of ${Ash_pro_obj}.\n\t\t\t\n\t\t\tWhich means a bond connects them even now: with your eyes closed you see it as a slender silver cord weaving and winding through the tangle of souls and contracts and bargains and exchanges of the bar.\n\t\t*comment endif\n\n\t\t*if (craft > base_difficulty)\n\t\t\tYou can't run with your eyes closed, though, so you tangle that cord through the glyphs that circle the fingers of your right hand; now, eyes open, you still feel the cord's path, a subtle tug in the direction you should move.  You sprint toward the door, toppling bar patrons in your wake.\n\t\t\t*page_break\n\t\t\tCold storm wind stabs you in the chest and throat.  You can barely see, the snow's so thick.  It sticks to your hair and eyelashes and melts on your shirt.  No matter.  You don't need to see to know where you're going.  You could follow Wakefield anywhere.\n\t\t\t\n\t\t\tYou run down the road, pushing harder, and turn right onto a long pier.  The trail runs past shuttered shops and snow-covered benches.  Ahead, through the white, you glimpse a flash of golden hair.\n\t\t\t*goto Get_There_First\n\t\t*else\n\t\t\tYou try to follow the cord out of the bar, but it's hard to walk through a crowd with your eyes closed.  You topple a waitress into a clutch of bankers, stammer an apology, and stagger on.  When you reach the door and press out onto the sidewalk, you find that the wind, snow, and unsteady footing make progress even slower.  At last you settle on part-time vision, eyes closed to find the cord, then open to sprint a few hundred feet against the wind, then closed again.\n\t\t\t\n\t\t\tYour mind rewards your slow progress with visions of everything that could be going wrong due to your delay.  At last you reach a snow-covered pier.  The trail leads past shuttered shops and snow-covered benches.  Ahead, through the white, you glimpse a flash of golden hair. \n\t\t\t*goto Get_There_Late\n\t#Ask.  There are plenty of people on these streets.  Someone must have seen them.\n\t\t*set charm %+10\n\t\tYou push toward the door.  Plenty of \"excuse me\"s and \"pardon me\"s on the way out—curt, sure, but then, you're in a hurry.\n\t\t\n\t\t*if charm > (base_difficulty + 20)\n\t\t\tThe bar has a bouncer outside: a big, thick-cheeked guy with steel plates implanted on his forearms.  They glint in the gap between his coat cuffs and his leather gloves.\n\t\t\t\n\t\t\t\"Excuse me,\" you say.  \"I'm looking for a pair that just left here; a dark haired guy about yea tall with a creepy smile, and a ${Ash_binary} about my height, ${Ash_hair}.  Friends of mine.  They left something back at their table, and I want to catch them before they go too far.\"\n\t\t\t\n\t\t\tHe considers your question as if you've just asked him to sum up the meaning of life.  \"Down that way,\" he says at last, and points.  You expected his voice to sound more forbidding.  \"I think they turned at Eddison Pier.\"\n\t\t\t\n\t\t\t\"Thanks,\" you reply, and start to run.\n\t\t\t\n\t\t\t*page_break  \n\t\t\t\n\t\t\tCold storm wind stabs you in the chest and throat.  You can barely see, the snow's so thick.  It sticks to your hair and eyelashes and melts on your shirt.  No matter.  You reach Eddison Pier, turn right, and sprint past shuttered shops and snow-covered benches.  Ahead, through the white, you glimpse a flash of golden hair.\n\t\t\t*if gets_it\n\t\t\t\t*goto Get_There_First\n\t\t\t*else\n\t\t\t\t*goto Get_There_Late\n\t\t*else\n\t\t\tThe bar has a bouncer outside: a big, thick-cheeked guy with steel plates implanted on his forearms.  They glint in the gap between his coat cuffs and his leather gloves.\n\t\t\t\"Hey,\" you say.  \"Did you see a pair just go past, ${Ash_hair} about my height and a brown-haired creepy-looking guy about yea tall?\"\n\t\t\t\n\t\t\tHe shrugs.  \"Think they went that way.\"\n\t\t\t\n\t\t\tYou nod your thanks and sprint off.  Vague directions are better than none.  You stop a passing cop, who hasn't seen anything—the woman's face flushed with drink as a ward against the cold.  You get better leads from a pair of Craftsmen taking a stroll—they've surrounded themselves in a thin sphere of fire, vaporizing the snow as it falls and leaving puddles of ice behind them.  The shorter Craftsman, smoking a cigarette in a long holder, lisps that he saw a pair of your description going down Eddison Pier.\n\t\t\t\n\t\t\t*page_break\n\t\t\tCold storm wind stabs you in the chest and throat.  You can barely see, the snow's so thick.  It sticks to your hair and eyelashes and melts on your shirt.  No matter.  You reach Eddison Pier, turn right, and sprint past shuttered shops and snow-covered benches.  Ahead, through the white, you glimpse a flash of golden hair.\n\n\t\t\t*goto Get_There_Late\n*label Get_There_First\n\n*if gets_it\n\tWakefield—or the thing in control of Wakefield—stands very close to Smith, a ghost beside a shadow in the snow.  Something's wrong with Wakefield's hand, the one ${Ash_pro} holds behind ${Ash_pro_pos} back.  You can't see much.  But ${Ash_pro_pos} fingers are longer than they should be, and they seem to be tipped with glass.  Wakefield raises ${Ash_pro_pos} hand, and it glitters in the streetlights.\n\t\n*if not(gets_it)\n\tWakefield stands very close to Smith, a ghost beside a shadow in the snow.  Something's wrong with Wakefield's hand, though, the one ${Ash_pro} holds behind ${Ash_pro_pos} back.  You can't see much.  But ${Ash_pro_pos} fingers are longer than they should be, and they seem to be tipped with glass.  Wakefield raises ${Ash_pro_pos} hand, and it glitters in the streetlights.\n\n*fake_choice\n\t#I shout a warning to Smith.\n\t\t*set charm %+10\n\t\t\"Smith!  Get back!\"\n\t\t\n\t\tYour shout has two effects, one intended, the other less so.  Smith pulls away from Wakefield by reflex.  And Wakefield moves.\t\t\n\t\t\n\t\t*if charm > (base_difficulty +10)\n\t\t\tWakefield's glass-tipped claw sweeps through the air where Smith was an instant before.  Smith stumbles and falls; Wakefield looks down upon him and he screams in utter terror.\n \t\t\t\n\t\t\tThen Wakefield turns to you, and you see why.\n\t\t\t*goto Interfere_Success\n\t\t*else\n\t\t\tSmith might be enchanted, or he might be cold, or he might be drunk.  Regardless, he's not fast enough to dodge the claw that sweeps out, pierces him in the stomach, and tears upward.\n\t\t\t\n\t\t\tYou shouldn't be able to hear the squelch of blood and organs from this distance, but you do.  He falls into the snow.  Breath steams from his mouth, and from the second mouth Wakefield's claw has just opened in him.  Blood stains both the white snow and the glass glittering at the tips of Wakefield's fingers.  ${Ash_pro_cap} turns to you, slowly.\n\t\t\t*goto Interfere_Fail\n\t#I tackle Wakefield.\n\t\tNo time for subtlety.  Your legs pound.  Your body's a single straight line, on an intercept course with Wakefield and Smith, as Wakefield's claw comes up and around.\n\t\t\n\t\t*if power > 70\n\t\t\tYou slam into Wakefield, knocking ${Ash_pro_obj} down before ${Ash_pro} can complete ${Ash_pro_pos} swing.  The impact stops time for a second; your breath rushes out of you as if you'd just run full-force into a brick wall.  But Wakefield falls, and you fall on top of ${Ash_pro_obj}, and Smith falls, too, into the snow, unhurt.\n\t\t\t\n\t\t\tBefore Wakefield can react, you scramble up off ${Ash_pro_obj} and retreat—no sense grappling with someone who has knives for fingers.  ${Ash_pro_cap} rises without the intervention of anything so pedestrian as muscles or joints: rigid and in a smooth arc, like a mystery-play vampire from ${Ash_pro_pos} crypt.\n\t\t\t\n\t\t\t${Ash_pro_cap} smiles with sharp teeth.\n\t\t\t\n\t\t\t*goto Interfere_Success\n\t\t*if not (power > 70)\n\t\t\tYou're not fast enough.  Damn snow, damn ice, damn everything.  And Wakefield doesn't need to close a hundred-foot gap to act.  That glittering claw comes around, pierces Smith in the stomach, and tears upward.\n\t\t\t\n\t\t\tYou shouldn't be able to hear the squelch of blood and organs from this distance, but you do.  He falls into the snow.  Breath steams from his mouth, and from the second mouth Wakefield's claw has just opened in him.  Blood stains both the white snow and the glass glittering at the tips of Wakefield's fingers. ${Ash_pro_cap} turns to you, slowly.\n\t\t\t*goto Interfere_Fail\n\t*if (soul > 500) #I separate them with Craft\n\t\tThrowing the two of them apart should be easy: all you have to do is change their position relative to one another.  The trick is to work fast enough.\n\t\t\n\t\tYou blink your eyes closed to take inventory of the situation, and then you call power to you.  The snowstorm blocks out starlight and moonlight, and there isn't much heat around, so you have only your own soul to use to fuel your Craft.  Fortunately, you have soulstuff to spare.\n\t\t\n\t\tDistance between Wakefield and Smith is a relational property; all you need to do is convince the world that, no, there's actually a good deal more space between them than it appears at first glance.  After all, in some situations objects that appear close could be far from one another: forced perspective, tricks with mirrors, reflections.  Ten feet is all you need.\n\n\t\t*if craft > base_difficulty\n\t\t\t*set soul -400\n\t\t\t\n\t\t\tPower flows from you, and Wakefield and Smith fly apart as if each had been struck in the chest by an enormous fist.  Smith sprawls in the snow.  Wakefield somersaults in midair and lands on ${Ash_pro_pos} feet, facing you.  Steam rises from ${Ash_pro_pos} body.\n\t\t\t*goto Interfere_Success\n\t\t*if not (craft > base_difficulty)\n\t\t\t*set soul -250\n\t\t\tBut fast as you can argue, Wakefield's faster.  That glittering claw comes around, pierces Smith in the stomach, and tears upward.\n\t\t\t\n\t\t\tYou shouldn't be able to hear the squelch of blood and organs from this distance, but you do.  He falls into the snow.  Breath steams from his mouth, and from the second mouth Wakefield's claw has just opened in him.  Blood stains both the white snow and the glass glittering at the tips of Wakefield's fingers.  ${Ash_pro_cap} turns to you, slowly.\n\t\t\t*goto Interfere_Fail\n\t*if ((gets_it) and (soul > 500)) #Attack the demon in Wakefield's body.\n\t\t*set cunning %+10\n\t\t*set craft %+20\n\t\tIn a blink you see it, now that you know what you're looking for.  Like any ${Ash_craftsperson}, Wakefield is a tangle of wards and bargains and contracts, but there in ${Ash_pro_pos} heart, under all the rest, a jagged shape moves, cutting and fraying the cage of Wakefield's soul.\n\t\t\n\t\tAnd, seeing, you can strike more precisely.  A contract binds the demon to Wakefield's body; with time you can unwind it, but it'll be easier, and faster, just to hit the damn thing.\n\t\t\n\t\tPower surges from your outstretched hand, and Wakefield flies back.  ${Ash_pro_cap} lands in a mess in the snow, but in a flash ${Ash_pro}'s back on ${Ash_pro_pos} feet.  All ${Ash_pro_pos} fingers now end in knives, and ${Ash_pro_pos} teeth trail to sharp points.\n\t\t\n\t\tBut more than that you notice ${Ash_pro_pos} eyes.\n\t\t*goto Interfere_Success\n\t\n*label Interfere_Success\n*page_break\nWakefield's eyes are pits of blood.  Tears well from them, and roll down ${Ash_pro_pos} cheeks.\n\n*if not(gets_it)\n\tThese are the demon's eyes from before—the demon in the panel, the one ${ash_pro} summoned, the one who—\n\t\n\tOh.  Gods.  The one who was supposed to leave at the panel's end.  But the panel never formally ended, did it?  The moderator said it was time for the panel to end but never actually announced…\n\t\n\tAnd now, the demon's here.\n\t*set gets_it true\n\t*page_break\n*if (gets_it)\n\tExorcism was never your subject back at the Hidden Schools, but you put on your best banishment voice and try anyway.  \"Be gone from ${Ash_pro_obj}, demon!\"\n\t\n\tIt laughs, which is par for the course.\n\t*page_break\n*comment endif\n\n\"You're bound,\" you say.  \"By the contract that let you into Wakefield's body in the first place.  You have no power here other than what's been given to you.\"\n\n\"Ah,\" it says, \"but embodiment lends itself to so many interpretations.\"  It revels in its sibilants.  \"And I have no grand goal.  This man stole from us.  This man lied to the Consortium.  We shall rip our vengeance from him, and now, from you.\"\n\nAnd then it moves toward you, fast.\n*goto Fight_Back\n\n*label Interfere_Fail\n\nYou stare at the blood seeping out from Smith's wound, and in that second of distraction—footsteps.  The demon closes with you.  You hear the attack more than see it—fabric rushing against fabric, leather on concrete through snow.  You throw yourself back, but something slams hard into your side, and your skin feels wet.\n\nYou hit the ground hard, and slide, and scramble again to your feet.  When your vision clears, you see—\n*page_break\nWakefield, of course.  Staring at you.  ${Ash_pro_pos_cap} eyes are pits of blood.  Tears well from them, and roll down ${Ash_pro_pos} cheeks.\n\n*if not(gets_it)\n\tThese are the demon's eyes from before—the demon in the panel, the one ${ash_pro} summoned, the one who—\n\t\n\tOh.  Gods.  The one who was supposed to leave at the panel's end.  But the panel never formally ended, did it?  The moderator said it was time for the panel to end but never actually announced…\n\t\n\tAnd now, the demon's here.\n\t*set gets_it true\n\t*page_break\n*comment endif\n\n\"You're bound,\" you say.  Gods, your side hurts.  Losing blood, fast.  \"By the contract that let you into Wakefield's body in the first place.  You have no power here other than what's been given to you.\"\n\n\"Ah,\" it says, \"but embodiment lends itself to so many interpretations.\"  It revels in its sibilants.  \"And I have no grand goal.  This man stole from us.  This man lied to the Consortium.  We shall rip our vengeance from him, and now, from you.\"\n\nAnd then it moves toward you, fast.\n\n*set smith_hurt true\n*set wounds +1\n*goto Fight_Back\n\n*label Get_There_Late\n\nYou run toward the flash of gold, through the snow.  The brief flash of color resolves into two figures, Wakefield and Smith, just in time for you to see Wakefield stab Smith in the stomach.\n\nYou shouldn't be able to hear the squelch of blood and organs from this distance, but you do.  He falls into the snow.  Breath steams from his mouth, and from the second mouth Wakefield's blade has just opened in him.  Blood stains both the white snow and the glass glittering at the tips of Wakefield's fingers.  ${Ash_pro_cap} turns to you, slowly.\n\nOh gods.  You see it now.  Wakefield didn't use a blade.  ${Ash_pro_cap} used a claw—${Ash_pro_pos} fingers are tipped with long glass knives, and ${Ash_pro_pos} eyes… Those eyes…\n\n*set Smith_hurt true\n*goto Interfere_Success\n\n*label Fight_Back\n\nWith the demon riding ${Ash_pro_obj}, ${Ash_pro} moves fast, so fast—a blur of white and gold.  No time for analysis, for careful consideration of options.  You dodge to one side, but ${Ash_pro_pos} claws rip through your shirt and skin, drawing blood.  ${Ash_pro_cap} sweeps past before you can react, then turns, and licks your blood off ${Ash_pro_pos} talon.\n\n\"Good,\" ${Ash_pro} says with a manic grin.  And then ${Ash_pro} moves again.   \n\nA single thought flashes through your mind.\n\n*choice\n\t#Wakefield's trapped in there.  I need to save ${Ash_pro_obj}.\n\t\t*goto fight_easy\n\t#I need to protect myself, and Smith.\n\t\t*goto fight_easy\n\t#The demon's here to kill, whatever frame it wears.  I can't show any quarter.\n\t\t*goto fight_hard\n\t#If that demon escapes, it might break its contract.  I can't let that happen.\n\t\tThe contract that brought the demon to your world is already strained to its breaking point; if it somehow slips free, its powers will become undefined—limitless, at least for a short time.  The demon will die eventually, but before then, who knows what kind of havoc it might wreak.  You need to stop it now.\n\t\t*goto fight_hard\n\n*label fight_hard\n\nThis isn't the place for sympathy.  Wakefield isn't in control now.  The demon is.  If you think of ${Ash_pro_obj} as human, you won't be able to fight hard enough to stop ${Ash_pro_obj}. \n\n*set fight_hard true\n*goto Fight_Method\n*label fight_easy\n\nYou have to save yourself, and Smith.  And Wakefield, too.  ${Ash_pro_cap} is in as much danger here as the rest of you; more even, with ${Ash_pro_pos} soul overshadowed and ${Ash_pro_pos} body warped by the demon's power.\n\nYou have your skills, and your powers; the demon has its own, and a hostage: Wakefield's body.\n\n*label Fight_Method\n*choice\n\t*if (soul > 500) #I blast the demon with all the Craft I possess.\n\t\tThe demon advances.  Wakefield's smile widens, and widens, until the corners of ${Ash_pro_pos} mouth split on either side.  There are too many teeth in ${Ash_pro_pos} mouth.\n\t\t\n\t\tThis is no time for subtlety.\n\t\t\n\t\tThe demon launches itself at you; you draw your work knife from the glyph tattooed above your heart.  It departs shining from your flesh.  Snow hisses and spits and sizzles along the blade.\n\t\t\n\t\tAnd from the blade you unleash your power: no tricks here, no clever artifice.  Raw might, and horror.  Every dream, hope, desire, sorrow, compressed into a single scream of light, a burning spear aimed straight for the demon.\n\t\t\n\t\tThe demon tries at the last minute to dodge, but the single column of your attack splits into a storm of thorns, all burning.\n\t\t*page_break\n\t\t*set soul -400\n\t\t*if fight_hard\n\t\t\tThey catch Wakefield in the air.\n\t\t\t\n\t\t\tAnd they pierce.\n\t\t\t\n\t\t\t${Ash_pro_cap} screams with ${Ash_pro_pos} bleeding mouth, and the demon screams with ${Ash_pro_obj}.\n\t\t\t*set wakefield_hurt true\n\t\t\t*if (craft - sleep_difficulty) > (base_difficulty - 15)\n\t\t\t\t*goto Fight_Succeed\n\t\t\t*if not((craft - sleep_difficulty) > (base_difficulty - 15))\n\t\t\t\t*goto Fight_Fail\n\t\t*if not(fight_hard)\n\t\t\tAt the last possible instant before your arrows slam home you cool their fire, blunt their tips.  They strike Wakefield's body, hammering ${Ash_pro_obj} to the ground.  And they strike the demon beneath ${Ash_pro_pos} skin, too—you hear its howls as a claw scraped across your dreaming mind.\n\t\t*if (craft - sleep_difficulty) > (base_difficulty + 10)\n\t\t\t*goto Fight_Succeed\n\t\t*else\n\t\t\t*goto Fight_Fail\n\t*if (fight_hard = false) #\"Fight it!\"\n\t\tThe demon advances.  Wakefield's smile widens, and widens, until the corners of ${Ash_pro_pos} mouth split on either side.  There are too many teeth in ${Ash_pro_pos} mouth.\n\t\t\n\t\tYou stare into Wakefield's eyes.  They are pits of blood, yes, but they're human eyes as well, both at once somehow, the demon's identity imposing itself over the ${Ash_Craftsperson}'s.\n\t\t\n\t\t\"Fight it, Ash.  This thing can't control you.  It doesn't have the right.\"\n\t\t\n\t\tWakefield raises ${Ash_pro_pos} claws.\n\t\t*page_break\n\t\t*if (charm - sleep_difficulty) > (base_difficulty + 10)\n\t\t\tAnd smiles.  Blood leaks from ${Ash_pro_pos} lips, but it's [i]${Ash_pro_pos}[/i] smile—you'd know it anywhere.\n\t\t\t\n\t\t\t\"Not nearly pretty enough, either,\" ${Ash_pro} says, in ${Ash_pro_pos} own voice.  For a second, you allow yourself to hope.\n\t\t\t*goto Fight_Succeed\n\t\t*else\n\t\t\t*goto Fight_Fail\n\t#I'll take the direct approach.  [i]Cracks knuckles[/i]\n\t\t*set power %+20\n\t\tFacing a demon in hand-to-hand combat.  Pull it off, and that's a page for the record books.  Don't, and—\n\t\t\n\t\tWell, it's not like any witnesses will survive to tell stories of your stupidity.  What do you have to lose?\n\t\t*page_break\n\t\tThe demon advances.  Wakefield's smile widens, and widens, until the corners of ${Ash_pro_pos} mouth split on either side.  There are too many teeth in ${Ash_pro_pos} mouth.  ${Ash_pro_cap} raises one hand, tipped with long cold claws, and moves.\n\t\t\n\t\tAbout time, too.  \n\n\t\t*if fight_hard\n\t\t\tYou duck back to avoid the demon's strike, lash out with one hand, grab Wakefield's wrist, and twist it back against the arc of the swing.  Wakefield's momentum carries ${Ash_pro_obj} one way, but the twist of your hips and the force of your arms directs ${Ash_pro_pos} wrist another.\n\t\t\t\n\t\t\tThe bone gives with a loud crack.\n\t\t\t*set wakefield_hurt true\n\t\t\t*if (power - sleep_difficulty) > (base_difficulty - 10)\n\t\t\t\tBefore the demon can recover, you release the wrist, step behind its legs, and slam your shoulder into its chest.\n\t\t\t\t\n\t\t\t\tWakefield falls, and hits the cement walkway with shoulder first, then skull.  You hear several more loud cracks.\n\t\t\t\t*goto Fight_Succeed\n\t\t\t*else\n\t\t\t\t*goto Fight_Fail\n\t\t*else\n\t\t\tYou duck back to avoid the demon's strike, lash out with one hand, grab Wakefield's wrist, and twist it back against the arc of the swing.  Wakefield's momentum carries ${Ash_pro_obj} one way, but the twist of your hips and the force of your arms directs ${Ash_pro_pos} wrist another.\n\t\t\t\n\t\t\tRather than directing all that force back against the joint of the wrist, though, you let elbow and shoulder take the brunt—the demon buckles from the waist, and falls, hard, to the concrete.\n\t\t\t*if (power - sleep_difficulty) > base_difficulty\n\t\t\t\t*goto Fight_Succeed\n\t\t\t*else\n\t\t\t\t*goto Fight_Fail\n\t#I look for some way to tip the odds in my favor.\n\t\tCan't fight this damn thing hand-to-hand.  Craftwork's notoriously hard to use on embedded demons without affecting the human host—difficult to tell the entities apart when they're so closely entwined.  And this isn't some two-thaum mystery play where you can just appeal to the power of love to break a person free from mental domination.\n\t\t\n\t\tYou need to play this clever.\n\t\t\n\t\tSo you take inventory of your surroundings.  Streetlights glint off a patch of slick transparent ice on the concrete, beside a chair and tables some idiot left outside of their shuttered hot dog stand.\n\t\t\n\t\tOkay, so it's hardly the Victory of the Kulmaks over the Golden Horde, but it'll have to do.  The demon, after all, doesn't have much experience in this world—it's probably still sorting out local physical properties like friction.\n\t\t\n\t\tYou circle-step around the demon, slowly, as if you're trying to flank it, or draw it away from Smith.\n\t\t*page_break\n\t\tThe demon advances.  Wakefield's smile widens, and widens, until the corners of ${Ash_pro_pos} mouth split on either side.  There are too many teeth in ${Ash_pro_pos} mouth.  ${Ash_pro_cap} raises one hand, tipped with long cold claws, and moves.\n\t\t\n\t\tToward you.  Which means, toward the ice.\n\t\t\n\t\tWakefield's polished black leather shoes slip on the ice, and ${Ash_pro} falls, hard, on ${Ash_pro_pos} face.\n\t\t*if fight_hard\n\t\t\tYou don't wait for ${Ash_pro_obj} to recover.  You grab one of the iron chairs.  The metal's cold—ice bites at your fingers—and the chair's heavy with snow.  Your arms quake as you lift it over your head.\n\t\t\t\n\t\t\tAnd you bring it down.  \n\t\t\t*set wakefield_hurt true\n\t\t\t*if (cunning - sleep_difficulty) > (base_difficulty-15)\n\t\t\t\t*goto Fight_Succeed\n\t\t\t*else\n\t\t\t\t*goto Fight_Fail\n\t\t*if (cunning - sleep_difficulty) > base_difficulty\n\t\t\t*goto Fight_Succeed\n\t\t*if not((cunning - sleep_difficulty) > base_difficulty)\n\t\t\t*goto Fight_Fail\n\n*label Fight_Succeed\n\nThe demon-Wakefield isn't moving.  You stagger back.  Your breath steams in the cold air.\n\nYou're bleeding, you notice.  Strange that something like that could go unnoticed.  Not that you feel the pain yet.  You can see the blood, that's all.\n\n*set wounds +1\n*set Ash_fought_succeed true\n*set final_fight_diff -10\n\n*goto Save_Wakefield\n*label Fight_Fail\n\nThe demon-Wakefield isn't moving.  You stagger back.  Your breath steams in the cold air.\n\nHave you won?  Did that crazy plan [i]work[/i]?\n\nYou're bleeding, you notice.  Strange that something like that could go unnoticed.  Not that you feel the pain yet.  You can see the blood, that's all.  And.  Oh god.  There's a lot of blood.\n\nThe demon opens its eyes, looks at you, and smiles.\n\n*set wounds +3\n*goto Save_Wakefield\n\n*label Save_Wakefield\n\n*if wakefield_hurt\n\tWakefield bleeds from the wounds both you and the demon have inflicted, and ${Ash_pro} moves unsteadily, jerkily, more like a puppet than like a human being with joints and bones intact.  Struggling to advance.  To rise.  To kill.\n\t*set final_fight_diff -10\n*comment endif\n\nYou have a moment in which to act.  The demon's in Wakefield.  You might be able to get it out.  If not…\n\n*choice\n\t*if (soul > 500) #I try to banish the demon from Wakefield's body.\n\t\t*set craft %+20\n\t\tThe contract binding the demon into this world was never intended to be used this way.  The demon's taxing the deal to its limits already, driving Wakefield's body past the brink of injury.  You can use that deal to send the demon back.\n\t\t*if (craft - sleep_difficulty) > (final_fight_diff - 10)\n\t\t\tYou close your eyes.  The demon scintillates amid the tangle of Wakefield's soul, bound there by slender silver lines: the summoning Craft, the bargain.  With knife in hand, you unwind the deal.  The demon moves toward you, but too slow, too late.  One step, two, and it's lost the power of locomotion.  Another, and it can't see through Wakefield's eyes any more.  It has abused the contract in ways its plain language never intended to allow, and as a result it loses privileges.\n\t\t\t\n\t\t\tYou start to grey out, overwhelmed by the effort of your battle—but not before you pry the demon's last bond to Wakefield free: its experience of time in your plane.  Its mind breaks, and projection here becomes for it a timeless hell.\n\t\t\t\n\t\t\tIt departs, with a scream you hear in your heart.\n\t\t\t\n\t\t\tAbout time, too, you think, before you collapse into the snow.\n\t\t\t*set soul -450  \n\t\t\t*set rescued_wakefield true\n\t\t\t*goto Aftermath\n\t\t*else\n\t\t\tYou close your eyes.  The demon scintillates amid the tangle of Wakefield's soul, bound there by slender silver lines: the summoning Craft, the bargain.  With knife in hand, you unwind the deal.  The demon moves toward you, one step, two, three, and there it is, atop you, tearing at your flesh as you tear at its soul.\n\t\t\t\n\t\t\tYou've never felt pain like this before.  Many parts of you that should be on the inside are on the out.  You're screaming, you note, somewhere.\n\t\t\t\n\t\t\tAt equal distance, you hear someone shout, \"Stop!\"  But you're gone.\n\t\t\t*set wounds +2\n\t\t\t*goto Aftermath\n\t#I knock Wakefield out.  The demon can't use an unconscious mind.\n\t\tNo sense playing this slow, or smart.  You launch yourself at the demon before it can recover fully.  Wakefield's body feels like it's full of bricks rather than flesh, but ${Ash_pro} goes down all the same.\n\t\t*page_break\n\t\t*if (power - sleep_difficulty) > (final_fight_diff-5)\n\t\t\tWakefield's head hits the concrete, hard, and ${Ash_pro_pos} body goes limp.  Individual muscles twitch beneath ${Ash_pro_pos} skin, as the demon tries to puppet the body directly, but it's much less good at directing Wakefield's body than ${Ash_pro_pos} conscious mind.\n\t\t\t\n\t\t\tYou bend next to Wakefield's ear.  Blood from your scalp—why is your scalp bleeding—falls onto ${Ash_pro_pos} cheek.  \"Go now,\" you say.  \"Get out.  Or when ${Ash_pro_pos} wakes back up, I'll just hit ${Ash_pro_obj} again.  And you'll be stuck.  In ${Ash_pro_pos} dreams.  Forever.\"\n\t\t\t\n\t\t\tWakefield's body stills.  You close your eyes, and watch the demon withdraw.\n\t\t\t\n\t\t\tYou wait until it's fully gone before you let yourself pass out.\n\t\t\t*set rescued_wakefield true\n\t\t\t*goto Aftermath\n\t\t*else\n\t\t\tWakefield falls, and you fall on top of ${Ash_pro_obj}, but ${Ash_pro} doesn't stop fighting.\n\t\t\t\n\t\t\tPerhaps trying to grapple with someone who has claws was not the best idea.  You strike Wakefield in the throat, you try to lock ${Ash_pro_pos} limbs and dislocate ${Ash_pro_pos} shoulder.  You tangle and turn, hot breath mingled into clouds of fog.  Snow clutches the two of you close.  Blood's everywhere.  Yours.  ${Ash_pro_abs_cap}.  Many parts of you that once were inside now are out.\n\t\t\t\n\t\t\tSomewhere, a voice shouts, \"Stop!\"\n\t\t\t\n\t\t\t[i]Not likely[/i], you think as you slip from consciousness.\n\t\t\t*set wounds +2\n\t\t\t*goto Aftermath\n\t#I convince the demon to let Wakefield go.\n\t\t*set charm %+20\n\t\t\"You've failed,\" you say, as the demon recovers.  \"Your name is known.  Your chance was to frame Wakefield for Smith's murder—and that's gone now.  I told the bartender to call the cops.  I told them there was a demon in my friend.  Kill us and our people will find you.  They'll trap you in a bottle and they'll take everything away from you, even time.  You'll wake from nightmare into nightmare.  Your fondest pleasures they'll twist to pain.  They will strip even your own name away.\"  It's a bluff, but if you have to bluff why not bluff large?  \"Leave ${Ash_pro_obj}.  Now.\"\n\t\t*if (charm - sleep_difficulty) > (final_fight_diff + 10)\n\t\t\tThe demon stops.  Wakefield stumbles, and collapses to the snow.\n\t\t\t\n\t\t\tYou close your eyes, and watch disbelieving as the demon withdraws—the spines and spirals of its being pull free and the tangled skein of Wakefield's soul spins smooth.  It's gone.\n\t\t\t\n\t\t\t\"Oh,\" you say.  \"Good.\"\n\t\t\t\n\t\t\tAnd then you collapse. \n\t\t\t*set rescued_wakefield true\n\t\t\t*goto Aftermath\n\t\t*else\n\t\t\tIt almost works.  The demon stops, briefly, and cocks Wakefield's head to one side in a puppetry imitation of contemplation.\n\t\t\t\n\t\t\t\"I don't think so,\" it says, and springs toward you.\n\t\t\t\n\t\t\tYou fall beneath it.  You fight back, but it's strong, and its claws sharp.\n\n\t\t\tYou've never felt pain like this before.  Many parts of you that should be on the inside are on the out.  Somewhere far away, you're screaming.\n\t\t\t\n\t\t\tAt equal distance, you hear a shout: \"Stop!\"  But you're gone. \n\t\t\t*set wounds +2\n\t\t\t*goto Aftermath\n\t*if ((cunning > 80) or (gets_it and (cunning > 70))) #The demon's only supposed to be here until the end of the panel, right?  So if I just…end the panel…\n\t\tIt can't be that simple.  Can it?\n\t\t\n\t\tThe demon advances toward you, claws out.  You close your eyes, scan its contract faster, faster.  Yes.  There it is: all the subclauses bound by a single term: the length of the panel.  You reach out with the Craft and press against that point.  \"In the absence of a panel moderator, authority over panels at an Association of Craftsmen conference descends in order of seniority.  As the sole remaining member of the Association present—\"  The demon's close now, struggling against the contract already cutting into it.  One claw reaches for you.  \"As the sole remaining member of the Association present, I declare this panel complete.\"\n\t\t\n\t\tThe claw trembles—and shatters into a rain of ice.  Wakefield closes ${Ash_pro_pos} eyes and when ${Ash_pro} looks up, they're not full of blood any more.\n\t\t\n\t\t${Ash_pro_cap} crumples.  You catch ${Ash_pro_obj} as ${Ash_pro} falls, and lay ${Ash_pro_obj} to the ground.\n\t\t\n\t\t\"Wow,\" you say.  \"That worked.\"\n\t\t\n\t\tAnd then you pass out, too. \n\t\t*set rescued_wakefield true\n\n*label Aftermath\n*page_break\n\nYou wake in a hospital beneath an unfamiliar ceiling.\n\nYour mouth's dry.\n\n*if wounds >= 5\n\tYou reach for a glass of water, but you can't move your right arm.  You look down: it's swaddled in a cast, and hanging in traction.  An IV drip tube snakes into the bandages and vanishes.\n*if not(wounds >=5)\n\tYou reach for a glass of water.  Bandages—and healing skin beneath the bandages—pull and twitch.\n*comment endif\n\t\nA noise from the hallway attracts your attention—you glance over in time to see a nurse, wide-eyed, staring at you.\n\n\"You're awake!\"\n\nThat's not a good sign.\n\n*if wounds >= 5\n\tYou pass out again.\n\n*page_break\n\n*if wounds >= 5\n\tThis swoon lasts a few hours at most to judge from the wall clock, and when you wake, there's a doctor watching you.\n*if wounds \u003c 5\n\tA doctor sweeps into the room a few minutes later, holds a cold stethoscope to your chest, listens to your breathing and checks your pulse.\n*comment endif\n\t\nThat's not the end of your recovery, but it is the beginning.\n\n*page_break\n\nIt takes a few more days of physical therapy, healing, and recovery before you receive your first visitor—Damien Stone.\n\nStone saunters into the room, hands thrust deep in his trouser pockets, eyes downcast.  \"You made it.  We're glad.\"\n\n\"If you don't mind me asking, sir, what are you doing here?\"  You've recovered enough, at least, for banter.\n\n\"You really should designate an emergency contact on your health plan.\"\n\nYou nod.  \"Fair enough.  What happened?\"\n*page_break\n*if (rescued_wakefield)\n\t\"You got the demon out of Wakefield before you collapsed.  ${Ash_pro_cap} woke up soon after, and got you to safety.  If not for ${Ash_pro_obj}, you'd still be dead now.\"\n*if not(rescued_wakefield)\n\t*if not(smith_hurt)\n\t\t\"The demon hurt you.  Fortunately, Smith ran for help, and someone came in time.  Your dedication's admirable, but if not for him, you'd still be dead now.\"\n\t*if smith_hurt\n\t\t*set wounds +1\n\t\t\"You made a lot of noise.  So did Smith.  Some cops heard, and investigated.  They tackled Wakefield, kept ${Ash_pro_obj} contained until someone could pry the demon out.  Wakefield was hurt.  Badly.  And you should still be dead.\"\n\t\t*set wakefield_hurt true\n*comment endif\n\n\"Still?\"\n\n*if (wounds > 5)\n\t\"You spent a long time under.  We didn't know if you'd come back.  You'll be a long time recovering.  If you'd been hurt much worse we wouldn't have been able to do anything for the meat, even if we could have saved the mind.\"\n*if not(wounds > 5)\n\t\"You were only under for a few minutes.  But be careful.  Even when we can save the mind, we can't often save the meat.\"\n*comment endif\n\n\"I'll keep that in mind,\" you say.  \"How's Wakefield?\"\n\n*if (wakefield_hurt)\n\t\"You didn't do ${Ash_pro_obj} any favors when you put ${Ash_pro_obj} down.  Wakefield will be a long time recovering.  But ${Ash_pro} left a note for you.\"\n\t*achieve wakefieldhurt\n\t*goto note\n*else\n\t\"Fine.  ${Ash_pro_cap}'s fine.  ${Ash_pro_cap} left a note for you.\"\n\t*achieve wakefieldsafe\n\t*goto note\n*label note\nHe removes a sealed envelope from his jacket pocket, and places it by your left hand.\n\nStone nods.  \"How do you feel?  I must admit, I've never fought someone possessed by demons hand-to-hand before.  What was it like?\"\n\n*choice\n\t#\"Great.  You don't know what you're missing.\"\n\t\t*set Stone %-10\n\t\t*goto perhaps\n\t#\"You're not missing much.\"\n\t\t*set Stone %+30\n\t\t*goto perhaps\n\t#\"Just another problem to be solved.\"\n\t\t*set Stone %+40\n\t\t*goto perhaps\n\t#\"A unique challenge of the intellect.\"\n\t\t*set Stone %+20\n\t\t*goto perhaps\n\n*label perhaps\n\"Perhaps,\" he says.\n\nYou exchange a bit of conversation about open cases after that, but nothing important.  He leaves, and in the privacy of your hospital bed, one-handed, you open Wakefield's letter.\n\n*page_break\n\nIt's short.\n\n*if (wakefield_hurt) and (rescued_wakefield)\n\t\"I suppose I should thank you.  Hard to hold the proper perspective when I'm lying flat on this hospital bed, but you won me back to myself.  I appreciate what you've done.  When we're both well, perhaps we will laugh this through.\n\t\n\tI have enclosed a small fragment of the demon—collected from the site of our battle.  It may serve for a memento.  —A\"\n\t*set Wakefield %+10\n*if not(wakefield_hurt) and (rescued_wakefield)\n\t\"Thank you.  You saved me, and you did so without killing me.  Were our situations reversed, I am not certain I would have been so kind.\n\t\n\tYou always have impressed me.  I would not, I think, be writing this way if you were well.  But regardless, there it is.  I am in your debt.\n\t\n\tI have enclosed a small fragment of the demon—collected from the site of our battle.  It may serve for a memento.  —A\"\n\t*set Wakefield %+40\n*if not(wakefield_hurt) and not(rescued_wakefield)\n\t\"We make for a sorry lot, don't we?  I can't resist possession, and you can't save me from it.  But I appreciate your consideration, and your help.  Perhaps we will do better next time.\n\t\n\tI have enclosed a small fragment of the demon—collected from the site of our battle.  It may serve for a memento.  —A\"\n\t*set Wakefield %+30\n*if (wakefield_hurt) and not(rescued_wakefield)\n\t\"If you had to damage me so extensively, the least you could have done, I think, would be to actually remove the demon from my soul.  Nevertheless.  Perhaps we have learned from this experience.\n\t\n\tI have enclosed a small fragment of the demon—collected from the site of our battle.  It may serve for a memento.  —A\"\n\t*set Wakefield %-10\n*comment endif\n\nYou remove the shard from the envelope, and cradle it in your palm.  Sharp, sterile hospital lights glint off the demon-glass, and through it you see the reflection of other worlds.\n\nAnd then yours comes apart again.\n\t\n*finish", "darkness": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Darkness\n*advertisement\n\nInterlude: Broken\n\nThe image slips and fades but the blood remains.  You are more than you were.  Or at least, you remember more than you once remembered.\n\nYou're still falling, in pieces, in this darkness from which you cannot return.  More sparks and slivers of falling memory tumble around you.\n\nYou grope still for memories, for changes.  You passed your first year at the firm.  Little decisions altered your world, day by day.\n\n*temp anything_more \"anything\"\n*label control_panel\nWhat changes do you grab out of the cascading broken mirrors?\n\n*choice\n\t*hide_reuse #I moved to a new apartment.\n\t\tWhere did you move?\n\t\t*choice\n\t\t\t*if (commute != \"short\") #To a more expensive apartment, nearer to the office.\n\t\t\t\t*set commute \"short\"\n\t\t\t\t*set sleep %-10\n\t\t\t\t*set rent 18000\n\t\t\t\tAfter an exhaustive, and exhausting, search, you found a nice apartment near the office.  Expensive, but at least it's close.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (commute != \"medium\") #To a cheaper place, further from the office.\n\t\t\t\t*set commute \"medium\"\n\t\t\t\t*set sleep %-5\n\t\t\t\t*set rent 12000\n\t\t\t\tYou found a decent apartment some distance from the office.  You should be able to save a little more, living here.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (commute != \"long\") #To the cheapest place I could find.\n\t\t\t\t*set commute \"long\"\n\t\t\t\t*set sleep %-5\n\t\t\t\t*set rent 6000\n\t\t\t\tYou found a studio apartment a long way from the office.  You'll have to get up at the crack of dark to reach work in time, but at least the rent's cheap.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t*hide_reuse #I changed how much I saved.\n\t\tHow did you change your finances?\n\t\t*choice\n\t\t\t*if (soul_funds != \"low\") #I saved more to pay off my debt faster.\n\t\t\t\t*set soul_funds \"low\"\n\t\t\t\tWhat a sensible approach.  Debt hangs over your head like an executioner's sword.  Best get out from under it as quickly as possible.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (soul_funds != \"med\") #I gave myself a moderate amount of pocket money, and paid off my debt less quickly.\n\t\t\t\t*set soul_funds \"med\"\n\t\t\t\tMakes sense.  You work hard, and deserve a little comfort.  Though it does mean that debt will stick around…\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (soul_funds != \"high\") #I let myself spend a little more, and didn't worry so much about debt.\n\t\t\t\t*set soul_funds \"high\"\n\t\t\t\tYou can pay down your debt in your own sweet time.  For now, let yourself live a little!\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t*hide_reuse *selectable_if ((debt \u003c soul) and not(debt_repaid)) #I paid off my student loans. (Current debt: ${debt} thaums.  Current funds: ${soul} thaums)\n\t\t*label debt_paid\n\t\tOne sliver-moment shines from the cascade: the cold Secondday morning when you cut your final check to the soul-sucking bankers who held your student loans.  A weight you hadn't even realized you carried lifted itself from your shoulders, and you felt, for a blissful, earth-shaking moment…free.  The world was charged with life and possibility.  You saw colors you thought you had forgotten.  You could do anything.\n\t\t\n\t\tWhat you did, of course, was more work.  But the [i]possibility[/i], that was worth a lifetime.\n\t\t\n\t\t*set charm %+10\n\t\t*set craft %+10\n\t\t*set power %+10\n\t\t*set cunning %+10\n\t\t*set debt_repaid true\n\t\t*achieve loans\n\t\t*goto end\n\t#I didn't change ${anything_more}.\n\t\tAnd so you reach for another shard of your spinning mind, another reflection of a screaming face you barely recognize as your own…\n\t\t*goto stats_update\n\n*label stats_update\n*if (commute = \"short\")\n\t*set sleep %+10\n\t*set charm %+10\n*if (commute = \"medium\")\n\t*set sleep %-10\n\t*set charm %+5\n\t*set cunning %+5\n*if (commute = \"long\")\n\t*set sleep %-25\n\t*set cunning %+10\n\t\n*set debt round(debt * 1.05)\n\n*if soul \u003c 0\n\t*set debt -soul\n\t*set soul 0\n\n*if soul_funds = \"low\"\n\t*set soul +400\n\t*set debt -((50000 - rent) - 9000)\n\n*if soul_funds = \"med\"\n\t*set soul +700\n\t*set debt -((50000 - rent) - 12000)\n\n*if soul_funds = \"high\"\n\t*set soul +1000\n\t*set debt -((50000 - rent) - 18000)\n\n*if debt \u003c= 0\n\t*set debt 0\n\t*if not(debt_repaid)\n\t\t*goto debt_paid\n\t*if debt_repaid\n\t\t*goto end\n\t\n*label end\n\n*if debt_repaid\n\t*set soul +1000\n\t\n*finish\t", "darkness2": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Darkness\n*advertisement\n\nThe image slips and fades but the blood remains.  You are more than you were.  Or at least, you remember more than you once remembered.\n\nYou're still falling, in pieces, in this darkness from which you cannot return.  More sparks and slivers of falling memory tumble around you.\n\nYou grope for memories.  You grew in the aftermath of the demon case; you learned, you trained, you took on more responsibility with your firm.  A year passed.\n*label control_panel\n*temp anything_more \"anything\"\nHow else did your life change?\n\n*choice\n\t*hide_reuse #I moved.\n\t\tWhere did you move?\n\t\t*choice\n\t\t\t*if (commute != \"short\") #To a more expensive apartment, nearer to the office.\n\t\t\t\t*set commute \"short\"\n\t\t\t\t*set sleep %-10\n\t\t\t\t*set rent 18000\n\t\t\t\tAfter an exhaustive (and exhausting) search, you found a nice apartment near the office.  Fancy, and expensive, but at least it's close.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (commute != \"medium\") #To a cheaper place, further
