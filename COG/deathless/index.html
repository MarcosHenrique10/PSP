But the [i]possibility[/i], that was worth a lifetime.\n\t\t\n\t\t*set charm %+10\n\t\t*set craft %+10\n\t\t*set power %+10\n\t\t*set cunning %+10\n\t\t*set debt_repaid true\n\t\t*achieve loans\n\t\t*goto end\n\t#I didn't change ${anything_more}.\n\t\tAnd so you reach for another shard of your spinning mind, another reflection of a screaming face you barely recognize as your own…\n\t\t*goto stats_update\n\n*label stats_update\n*if (commute = \"short\")\n\t*set sleep %+10\n\t*set charm %+10\n*if (commute = \"medium\")\n\t*set sleep %-10\n\t*set charm %+5\n\t*set cunning %+5\n*if (commute = \"long\")\n\t*set sleep %-25\n\t*set cunning %+10\n\t\n*set debt round(debt * 1.05)\n\n*if soul \u003c 0\n\t*set debt -soul\n\t*set soul 0\n\n\n*if soul_funds = \"low\"\n\t*set soul +400\n\t*set debt -((50000 - rent) - 9000)\n\n*if soul_funds = \"med\"\n\t*set soul +700\n\t*set debt -((50000 - rent) - 12000)\n\n*if soul_funds = \"high\"\n\t*set soul +1000\n\t*set debt -((50000 - rent) - 18000)\n\t\n*if debt \u003c= 0\n\t*set debt 0\n\t*if not(debt_repaid)\n\t\t*goto debt_paid\n\t*if debt_repaid\n\t\t*goto end\n\n*label end\n\n*if debt_repaid\n\t*set soul +1000\n\n\n*finish\t", "darkness5": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Darkness\n*advertisement\n\nThe image slips and fades but the blood remains.  You are more than you were.  Or at least, you remember more than you once remembered.\n\nYou fall, in pieces, in this darkness from which you cannot return.  Sparks and slivers of falling memory tumble around you.\n\nAfter the deposition, after your return from Southern Kath, you set yourself on the path again.  Visions of divinity and regret.  A year passed.\n*label control_panel\n*temp anything_more \"anything\"\nHow did your life change?\n\n*choice\n\t*hide_reuse #I moved.\n\t\tWhere did you move?\n\t\t*choice\n\t\t\t*if (commute != \"short\") #To a more expensive apartment, nearer to the office.\n\t\t\t\t*set commute \"short\"\n\t\t\t\t*set sleep %-10\n\t\t\t\t*set rent 18000\n\t\t\t\tAfter an exhaustive (and exhausting) search, you found a nice apartment near the office.  Fancy, and expensive, but at least it's close.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (commute != \"medium\") #To a cheaper place, further from the office.\n\t\t\t\t*set commute \"medium\"\n\t\t\t\t*set sleep %-5\n\t\t\t\t*set rent 12000\n\t\t\t\tYou found a decent apartment, a decent commute away from the office.  You should be able to save a little more, living here.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t\t\t*if (commute != \"long\") #To the cheapest place I could find.\n\t\t\t\t*set commute \"long\"\n\t\t\t\t*set sleep %-5\n\t\t\t\t*set rent 6000\n\t\t\t\tYou found a studio apartment a long way from the office.  You'll have to get up at the crack of dark to reach the office, but at least the rent's cheap.\n\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t*goto control_panel\n\t*if not(debt_repaid) \n\t\t\t*hide_reuse #I changed how much I saved.\n\t\t\t\tHow did you change your finances?\n\t\t\t\t*choice\n\t\t\t\t\t*if (soul_funds != \"low\") #I saved more to pay off my debt faster.\n\t\t\t\t\t\t*set soul_funds \"low\"\n\t\t\t\t\t\tWhat a sensible approach.  Debt hangs over your head like an executioner's sword.  Best get out from under it as quickly as possible.\n\t\t\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t\t\t*goto control_panel\n\t\t\t\t\n\t\t\t\t\t*if (soul_funds != \"med\") #I gave myself a moderate amount of pocket money, and paid off my debt less quickly.\n\t\t\t\t\t\t*set soul_funds \"med\"\n\t\t\t\t\t\tMakes sense.  You work hard, and deserve a little comfort.  Though it does mean that debt will stick around…\n\t\t\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t\t\t*goto control_panel\n\t\t\t\t\t*if (soul_funds != \"high\") #I let myself spend a little more, and didn't worry so much about debt.\n\t\t\t\t\t\t*set soul_funds \"high\"\n\t\t\t\t\t\tYou can pay down your debt in your own sweet time.  For now, let yourself live a little!\n\t\t\t\t\t\t*set anything_more \"anything more\"\n\t\t\t\t\t\t*goto control_panel\n\t*selectable_if ((debt \u003c soul) and not(debt_repaid)) #I paid off my student loans. (Current debt: ${debt} thaums.  Current funds: ${soul} thaums)\n\t\t*label debt_paid\n\t\tOne sliver-moment shines from the cascade: the cold Secondday morning when you cut your final check to the soul-sucking bankers who held your student loans.  A weight you hadn't even realized you carried lifted itself from your shoulders, and you felt, for a blissful, earth-shaking moment… free.  The world was charged with life, and possibility.  You saw colors you thought you had forgotten.  You could do anything.\n\t\t\n\t\tWhat you did, of course, was more work.  But the [i]possibility[/i], that was worth a lifetime.\n\t\t\n\t\t*set charm %+10\n\t\t*set craft %+10\n\t\t*set power %+10\n\t\t*set cunning %+10\n\t\t*set debt_repaid true\n\t\t*achieve loans\n\t\t*goto end\n\t#I didn't change ${anything_more}.\n\t\tAnd so you reach for another shard of your spinning mind, another reflection of a screaming face you barely recognize as your own…\n\t\t*goto stats_update\n\n*label stats_update\n*if (commute = \"short\")\n\t*set sleep %+10\n\t*set charm %+10\n*if (commute = \"medium\")\n\t*set sleep %-10\n\t*set charm %+5\n\t*set cunning %+5\n*if (commute = \"long\")\n\t*set sleep %-25\n\t*set cunning %+10\n\t\n*set debt round(debt * 1.05)\n\n*if soul \u003c 0\n\t*set debt -soul\n\t*set soul 0\n\n\n*if soul_funds = \"low\"\n\t*set soul +400\n\t*set debt -((50000 - rent) - 9000)\n\n*if soul_funds = \"med\"\n\t*set soul +700\n\t*set debt -((50000 - rent) - 12000)\n\n*if soul_funds = \"high\"\n\t*set soul +1000\n\t*set debt -((50000 - rent) - 18000)\n\t\n*if debt \u003c= 0\n\t*set debt 0\n\t*if not(debt_repaid)\n\t\t*goto debt_paid\n\t*if debt_repaid\n\t\t*goto end\n\n*label end\n\n*if debt_repaid\n\t*set soul +1000\n\n\n*finish\t", "demonworld": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 7: The Demon World - Part One\n\n*comment temporary variables\n\n*temp sabotage false\n*temp meeting_Chen false\n*temp meeting_Vega false\n*temp meeting_Wakefield false\n*temp and_look \"\"\n\n*temp chen_sex_diff 75\n*temp vega_sex_diff 75\n*if chen_sex > 0\n\t*set chen_sex_diff -(chen_sex * 10)\n\n*if vega_sex > 0\n\t*set vega_sex_diff -(vega_sex *10)\n\n*temp base_diff 60\n\n*if blessing\n\t*set base_diff -10\n\t*set and_look \", which further strengthens your relationship even in light of the contested nature of the Ajaia case\"\n \n*temp party_diff base_diff+10\n*temp assassin_diff base_diff+20\n*temp save_diff base_diff+30\n\n*temp final_diff 75\n\n*set sleep_difficulty (round((((1-3)/9)*sleep)+20) + round(debt / 20000))\n\n*temp sleep_warning \"\"\n\n*if (sleep \u003c 90) and (sleep >= 70) \n\t*set sleep_warning \"  You stifle a yawn.\"\n*if (sleep \u003c 70) and (sleep >=40)\n\t*set sleep_warning \"  It looks so peaceful from this distance.  You touch the glass, trust its cold to keep you awake, keep you sharp.\"\n*if (sleep \u003c40)\n\t*set sleep_warning \"  Distance gapes to infinity beneath and before you.  You force yourself awake.  Sleep deprivation getting to you again.  Hazards of the job.\"\n\n\n*comment Beat 1: last night before the assignment\n*advertisement\n\nYou can see all Shikaw and half the lake from the partners' meeting room on top of Krieg Tower: your world for the last few years, laid out in miniature.  There's Gillespie's, the restaurant where you played poker with partners and demons.  Eddison Pier, where you confronted Wakefield when ${Ash_pro} was possessed, juts out into the gray waters of the lake.${sleep_warning}\n\n*if commute = \"long\"\n\tOn most days you could see your apartment from here.  The building happens to be invisible right now, though, since the old factory a block east of it's on fire.\n*if ((commute =\"medium\") or (commute=\"short\"))\n\tYou can even see your apartment from here. \n*comment endif\n\nYou wish you could sit back and enjoy the view.  But you're not here to enjoy anything.\n\nThe Partners have summoned you, and you come in obedience to their will.\n\n*page_break\n\nThe Big Three sit behind a tall desk, Varkath in the center, Nebuchadnezzar on the left, and Stone on the right.  Varkath clasps his hands.  Nebuchadnezzar rests hers one atop the other on the desktop.  Stone's folding a piece of paper into smaller and smaller pieces.\n\n*if goddess_settlement\n\tYou have no idea why they've summoned you.  Perhaps something to do with the deposition?  But Ajaia settled, out of court—a clean end to troublesome case.\n\t*goto made_impression\n*elseif goddess_referred\n\tYou have no idea why they've summoned you.  Could they have learned that you referred Ajaia to Wakefield?  That certainly would bring them all into the same room—Wakefield and ${Ash_pro_pos} firm have dragged what should have been an open-and-shut case out for a year with no end in sight.  But you told no one.  Unless the goddess let it slip somehow, or Wakefield did…\n\t*goto made_impression\n*elseif goddess_refuse\n\tYou have no idea why they've summoned you.  Do they know that you were the one who advised the Goddess Ajaia to employ her own Craftsmen?  For a goddess, she's displayed an admirable eye for talent, assembling a crack team.  But you told no one about your journey to the grove—unless the goddess herself let it slip…\n\t*goto made_impression\n*elseif blessing\n\tYou have no idea why they've summoned you.  They can't know you betrayed their plans to the goddess Ajaia—no one knows except you and the goddess.  You haven't let anything slip.  The goddess, then?  Impossible.  But here you are.\n\t*goto made_impression\n*elseif deposition_succeed\n\tYou have no idea why they've summoned you.  You're on target, working according to plan.  You even successfully deposed that goddess last year, when you weren't technically supposed to.\n\t*goto made_impression\n*else\n\tYou have no idea why they've summoned you.  You're on target, working according to plan.  You didn't entirely succeed at that deposition last year, but then again, that was the plan.\n\t*goto made_impression\n*label made_impression\n*comment endif\n\n\"You have made an impression,\" Nebuchadnezzar says.  Her one eye is cold as a blade at dawn.\n\nYou note she doesn't say what form of impression.\n\nStone speaks into the silence.  \"We've called you here because you have a significant opportunity.  You remember John Smith, of Transdimensional Thaumaturgics.\"\n\n\"I think,\" Varkath says, \"that ${char_pro} remembers.\"\n\nStone's chins quiver.  \"Smith has requested that you accompany him on a negotiating mission to Akargath.  To the demon city.\"\n\nAnd then they look to you for your answer.\n\n*choice\n\t#\"An exciting opportunity.  When do I leave?\"\n\t\tYou're still not used to the grinding rocks of Varkath's laughter.  \"An exciting opportunity, ${char_pro} says.  Though ${char_pro} is no expert in Craftwork negotiations, and there is no obvious reason Smith should want ${char_pro_obj} along.\"\n\t\t\n\t\t\"I am here, sir,\" you say.  \"And I am excited for the challenge.\"\n\t\t\n\t\t\"You'll be in another world.  Far from help.  Bound by contracts of your own.\"\n\t\t\n\t\t\"There's a first time for everything.\"\n\t\t\n\t\t\"Then you'll be ready to leave in the morning.\"\n\t\t\n\t\tWhich shuts you up.\n\t\t*set Varkath %+20\n\t\t*set Nebuchadnezzar %+20\n\t\t*set power %+10\n\t\t*set gunner %+20\n\t\t*goto leave_office\n\t#\"Why is Smith asking me?\"\n\t\t*set cunning %+10\n\t\t\"Ah,\" Nebuchadnezzar says.  \"The proper question.  Why indeed would he ask for you, when the firm has many other negotiators with more qualifications?  Granted, you saved his life, once, and your work has often intersected with his.  But the peculiar nature of his demand, and the time frame, indicate he has further reasons.\"\n\t\t\n\t\t\"Time frame?\"  That confuses you.\n\t\t\n\t\t\"Yes,\" she says.  \"You will leave tomorrow morning.\"\n\t\t\n\t\tThat's hard news to swallow.  \"He must be planning something.\"\n\t\t\n\t\t\"Of course.  But he represents a client with which we have a very close relationship.  So the question is: do you have a compelling reason not to go?\"\n\t\t\n\t\tAnd to that, you have no answer.  The logic's clear: if you were a more valuable employee, they wouldn't send you.  But you're a worthy test balloon.\n\t\t\n\t\t\"If I come back from this,\" you say, \"then I look forward to a conversation about my future at this firm.\"\n\t\t\n\t\t\"Indeed.\"\n\t\t*set Nebuchadnezzar %+20\n\t\t*set Stone %+20  \n\t\t*goto leave_office\n\t#\"I'm not an expert in negotiation.\"\n\t\t*set craft %+10\n\t\t\"Of course not,\" Stone says, gruffly.  \"Experts, we have.  But Smith did not ask for them.  He asked for you.\"\n\t\t\n\t\t\"Though,\" Varkath cuts in, \"you are not without expertise.  You have first-hand experience with demons, and Smith, in two separate instances—one formal, one personal.  We sent you to depose the goddess Ajaia for his concern${and_look}.  And your pro bono experience with demonic asylum may prove useful.  Add to this the fact that, unlike many of our experts, you are available in the time frame Smith requests.\"\n\t\t\n\t\t\"Which is?\"\n\t\t\n\t\t\"Tomorrow.\" \n\t\t*set Stone %+20\n\t\t*set Varkath %+20\n\t\t*goto leave_office\n\t#\"That seems oddly specific.  With all due respect, I'm not sure I trust Smith.\"\n\t\t\"With all due respect,\" Nebuchadnezzar replies, \"trust is a rare commodity in this business for a reason.\"\n\t\t\n\t\tSmith runs his thumbnail along a crease in his paper.  The nail produces a rasping sound, almost a tear.  \"He's asking for something precise, on short notice, because he thinks it can gain him an advantage.\"\n\t\t\n\t\t\"Short notice?\"  Visions of your many deadlines dart through your mind.\n\t\t\n\t\t\"Short indeed,\" Varkath says.  \"You leave tomorrow.\"\n\t\t\n\t\t*set charm %+10\n\t\t*set Varkath %+15\n\t\t*set Nebuchadnezzar %+15\n\t\t*set Stone %+15\n\t\t*goto leave_office\n\t\n*label leave_office\n*page_break\nWhich settles it for the meeting.  Tomorrow, you're bound for the demon realm with an executive you barely trust, even if you did save his life once.  Sort of.  \n\nYou retreat to your office to gather your equipment and check your mail.  Plenty of people expect work from you in the next few days, which leaves you with apologies to write and send.  At least you have a good excuse.  You wonder what you should post on your office door.  \"Out of town\" doesn't quite cover it.\n\n*if ((Chen > 60) or ((Vega > 60) or (Wakefield > 60)))\n\t*goto notes\n*else\n\tYou find nothing exciting in the mail—just note after note about projects you'll have to put aside until the end of this trip.  You answer them to the best of your ability, and head home to pack.\n\t*goto apartment\n\n*label notes\n*temp notes_count 0\n*if chen > 60\n\t*set notes_count +1\n*if vega > 60\n\t*set notes_count +1\n*if wakefield > 60\n\t*set notes_count +1\n\t\n*temp the_note \"the note\"\n*temp page \"page\"\n*temp has_have \"has\"\n*if notes_count > 1\n\t*set the_note \"the notes\"\n\t*set page \"few pages\"\n\t*set has_have \"have\"\n\t\n\n*comment Far too many notes for my taste!  And these options are quite hard to code. \nAmong the piles of requests and documents marked \"FYI\" (and why do people [i]do[/i] that anyway, it's not as if it takes more than a minute's thought to explain what the document is and what action you should take based on it), you find a ${page} that ${has_have} nothing to do with work.\n\n*if Chen > 60\n\tCass has sent you a note: [i]I heard about your trip.  Is there any way we can talk before you go?  Outside the office, I mean. —C[/i]\n*comment endif\n\n*if Vega > 60\n\tHere's a note from Vega: [i]Congratulations on your new assignment.  The partners show a great deal of faith in you.  But please don't take affront when I suggest caution.  Can we speak in private?[/i]  (It's signed with his seal, of course.)\n*comment endif\n\n*temp notesornot \"A\"\n*if ((Vega > 60) or (Chen > 60)) and (Wakefield > 60)\n\t*set notesornot \"And beneath the rest there's a\"\n*if Wakefield > 60\n\t${notesornot} note from Wakefield, on firm stationery.  [i]${surname}, we need to talk.  —W.[/i]  Wakefield's writing is sharp—even ${ash_pro_pos} loops have points.\n\nYou don't have time for private conferences, and you have too much to finish today to call off work early, but maybe one of them could meet you at home?\n\n\n*choice\n\t*if (Chen > 60) #Ask Chen to meet me at my apartment.\n\t\tYou dash off a note to Chen, and head home to pack.\n\t\t*set meeting_Chen true\n\t\t*goto apartment\n\t*if (Vega > 60) #Ask Vega to meet me at my apartment.\n\t\tYou dash off a note to Vega, and head home to pack.\n\t\t*set meeting_Vega true\n\t\t*goto apartment\n\t*if (Wakefield > 60) #Ask Wakefield to meet me at my apartment.\n\t\tYou dash off a note to Wakefield, and head home to pack.\n\t\t*set meeting_Wakefield true\n\t\t*goto apartment\n\t#Ignore ${the_note}.\n\t\tYou have packing to do.  And the fears of your friends and rivals will only make your own nerves worse.\n\t\t*goto apartment\n\t\n*label apartment\n*page_break\n\nYou finish work, make it home around half-past nine, and set yourself to frantic packing.  Drawers roll open of their own accord and items fly through the air into your suitcase.  Toothbrush, scalpel set, silver thread, fetish set, compass and astrolabe, lurid paperback, what else, what else…\n\n*choice\n\t#Books of horn.  Reference materials.  Truenames so I can call the firm if there's an emergency.\n\t\tGood.  Good.  No sense being without your tools when you're in the depth of another dimension.\n\t\t*set power %+20\n\t\t*goto knock_on_door\n\t#I've always wanted to read this book.  Plus I should bring the blue suit, and another charcoal, and some ties, and I wonder if they'll have dry cleaning in the demon plane…  \n\t\tYou're being invited as a consultant on negotiations, after all, not as an active ${Craftsperson}.  You're there to make an impression, and it might as well be a good impression.\n\t\t*if gunner > 60\n\t\t\t*set charm %+20\n\t\t\t*goto knock_on_door\n\t\t*else\n\t\t\t*goto knock_on_door\n\t#Mortar and pestle, retort, centrifuge, bloodcloth, a few test tubes, pen nibs of ivory, bone, horn, and damn it I have silver around here somewhere…\n\t\tYou're being sent to advise on negotiations.  You doubt you'll need to practice in Akargath.  But you never know.\n\t\t*set craft %+20\n\t\t*goto knock_on_door\n\t#Rope.  People always need rope.  First-aid kit.  Compass.  Knife.  A few tracking beads.  Odds and ends.\n\t\tThe Craft is a preparer's art, and while blasting bad guys with magic and calling the dead back from beyond the grave to do your bidding might be fun, it's not efficient.  Better to have a few useful tools to start, and then use the Craft as needed.  Which is to say: be prepared.\n\t\t*set cunning %+20\n\t\t*goto knock_on_door\n\t\t\n*label knock_on_door\n\n*if not(meeting_Chen or (meeting_Vega or meeting_Wakefield))\n\t*goto earth_sleep\n\nYou're debating how to fold your jackets when you hear a knock on the door.\n\n*if meeting_chen\n\t*goto knock_chen\n*if meeting_vega\n\t*goto knock_vega\n*if meeting_wakefield\n\t*goto knock_wakefield\n\n*label knock_chen\n*page_break\nYou open the door, and Cass Chen steps inside.\n\n*if (commute = \"short\")\n\tShe turns a slow circle on your rug, jaw slack, staring at the high ceilings, the granite counters, the brass fixtures and the beautiful view.  \"What the hells?  How do you afford this place?\"\n*if (commute = \"medium\")\n\tShe walks past you, leans against the back of the couch, and takes in your apartment in a brief silence which neither of you is willing to break.  \"This looks just like my place,\" she says at last.  \"I even have the same couch.\"\n*if (commute = \"long\")\n\tShe regards you with evident disbelief.  \"Do you have any idea what I had to go through to get here?  There's a fire a block uptown, and a riot three blocks over.  The cab wouldn't even stop within a quarter-mile radius of this place.  What possessed you to [i]live[/i] here?\"\n\n*choice\n\t*if (commute = \"short\")  #\"With great difficulty, trust me.\"\n\t\t\"I'll bet,\" she says.  \"How are those student loans coming?\"\n\t\t\n\t\t\"Is that really what you came here to talk about?\"\n\t\t*goto cass_why\n\t*if (commute = \"long\") #\"The District has a great street scene, actually.\"\n\t\t\"Which is great so long as you don't end up playing a starring role in that street scene.  Some nights it gets pretty dangerous out there.\"\n\t\t\n\t\t\"I can take care of myself.\"  But she doesn't look convinced, and anyway that's not why she's here.  \"You wanted to talk to me.\"\n\t\t*goto cass_why\n\t*if (commute = \"medium\") #\"Hey, it's a good couch.\"\n\t\t\"You don't see anything wrong with that?  We all come out of some Craft school or another, we end up in these office jobs, and then we all buy the same couch.\"\n\t\t\n\t\t\"The Craft trains good analysis and decision-making.  Seems reasonable that we'd end up making similar decisions.  And anyway, that's not why you're here.\"\n\t\t\n\t\t\"No,\" she says.  \"I guess it's not.\"\n\t\t\n\t\tYou wait for her to continue.  The silence isn't kind, but you're tired.  \n\t\t*goto cass_why\n\t#\"It's a place to sleep, that's all.\"\n\t\t\"That's one way to put it.\"  She shakes her head.\n\t\t\n\t\t\"What's up, Cass?\"\n\t\t*goto cass_why\n\t#\"Did you really come here to ask me about real estate?\"\n\t\tShe grins, though her grin's a bit sad.  \"No.\"\n\t\t\n\t\t\"What, then?\"\n\t\t*goto cass_why\n\t#\"Can I get you something to drink?\"\n\t\t\"Water's fine.  Thank you.\"\n\t\t\n\t\tYou get her a glass from the kitchen.  She takes a sip, then stares into it for a while, saying nothing.\n\t\t*goto cass_why\n\n*label cass_why\n\n\"I heard about the trip.\"\n\n\"Was I the last person to know?\"\n\nShe shrugs.  \"I think they got the request a few days ago.  It's been a running argument whether to let you go or not.\"\n\n\"And nobody told me.\"  You sit down.\n\n\"They didn't know what they would do.  But they're sending you.\"\n\n\"Why did you come here, Cass?\"\n\nShe looks over at you.  Her eyes are black and deep.  She grips the back of her neck, and squeezes.  \"I don't trust Smith.  He's dangerous.  They took so long to decide because they had to decide whether protecting you was worth the potential damage to their relationship with Transdimensional.  Now you know the answer.\"\n\n*choice\n\t#\"I don't trust him either.\"\n\t\tShe doesn't speak.  But she doesn't look away.\n\t\t*goto chen_silence\n\t#\"This is just a negotiation.  We'll be fine.\"\n\t\t\"If you say so.\"\n\t\t\n\t\t\"I do.\"\n\t\t*goto chen_silence\n\t#\"You're worried about me.\"\n\t\tCass looks away.  The color of her cheeks deepens just a shade.  \"I'm worried about our business.  That's all.\"\n\t\t\n\t\t\"Is that so?\"\n\t\t*goto chen_silence\n\t#\"Or they were deciding whether I could handle myself.\"\n\t\t\"Well, can you?  Can you really?\"\n\t\t*goto chen_silence\n\n*label chen_silence\n\nCass stops leaning on the couch, and stands in the middle of the room, hands in her pockets, looking everywhere but at you.\n\n*if commute = \"long\"\n\tGlass breaks outside.  A siren wails.\n*comment endif\n\nYour eyes meet.\n\n*if (chen > chen_sex_diff)\n\tCass approaches.  You feel the distance between you shrink.  And she kisses you.\n\t*comment Because I love Bioware but their \"none of our npcs ever take sexual initiative\" thing gets fucking OLD\n\t*goto chen_kiss\n\nCass stands in the center of the room, and you feel the moment tilt on an axis.\n\n*choice\n\t#\"Thank you for coming.  I'll be careful.\"\n\t\tShe hesitates a moment, then says, \"You're welcome,\" and leaves you in your living room with your suitcase.\n\t\t\n\t\tThe suitcase isn't fit company.  Your apartment feels lonely with her gone.\n\t\t*goto morning_commute\n\t#\"I should get some sleep.\"\n\t\t\"So should I,\" she says, fast, as if she'd been looking for some excuse to say it.\n\t\t\n\t\t*if Chen > 70\n\t\t\tShe shifts her weight to her back foot, as if she's about to turn and go.  But she hesitates to turn.\n\t\t\t*goto chen_hesitation\n\t\t*else\n\t\t\tThen she leaves you, in your living room, with your suitcase.\n\t\t\t\n\t\t\tThe suitcase isn't fit company, though, and your apartment feels lonely with her gone.\n\t\t\t*goto morning_commute\n\t#\"I'll be fine.\"\n\t\t\"I'm sure you will.  You're always fine, aren't you?\"\n\t\t\n\t\t*if Chen > 70\n\t\t\tShe smiles, sadly, and heads for the door.  But she pauses with her hand on the knob.\n\t\t\t*goto chen_hesitation\n\t\t*else\n\t\t\tThen she leaves you in your living room with your suitcase.\n\t\t\t\n\t\t\tThe suitcase isn't fit company, and your apartment feels lonely with her gone.\n\t\t\t*goto morning_commute\n\t#I try to kiss her.\n\t\tAnything you do will break the careful balance of this room, and the two of you, tonight.  So you might as well do it fast.\n\t\t\n\t\tYou walk to her, and touch her on the arm.  \"I'd like to kiss you now.\"\n\t\t\n\t\tBalance breaks, and the world changes.  She smiles.  \"About time.\"\n\t\t*goto chen_kiss\n\t\n*label chen_hesitation\n*choice\n\t#\"Wait.\"\n\t\tOne word shouldn't be so heavy as to change the balance of the world, or even of your living room.  But when the scales are so perfectly balanced, it's enough.\n\t\t\n\t\tShe walks toward you, so fast she's almost falling, reaches up to your face, and guides it down to hers.\n\t\t*goto chen_kiss\n\t#I kiss her.\n\t\tAnything you do will break the careful balance of this room, and the two of you, tonight.  So you might as well do it fast.\n\t\t\n\t\tYou walk to her, and touch her on the arm.  \"I'd like to kiss you now.\"\n\t\t\n\t\tBalance breaks, and the world changes.  She smiles.  \"About time.\"\n\t\t*goto chen_kiss\n\t#Let her go.\n\t\tYou wait. She waits.  And then she turns, and leaves you in your living room, with your suitcase.\n\t\t\t\n\t\tThe suitcase isn't fit company, though, and your apartment feels lonely with her gone.\n\t\t*goto morning_commute\n\n*label chen_kiss\n*page_break\nIn a language without a plural \"you,\" there's no good way to say what happens next.  \"You kiss\" sounds like it's just you doing the kissing, which the pressure of her lips, and the warmth of her hands on your cheek and the back of your neck, testify is not the case.  \"She kisses\" sounds like it's just her at work, as if you hadn't pulled her toward you, as if your lips weren't on hers.  You couldn't claim that—you wouldn't stand up in cross.\n\nYou won't be standing up in a few minutes anyway, at this rate.  Her hands are on the buttons of your shirt, and yours are already beneath hers.  Fast, maybe, but a hunger comes from a shifting of the balance.  You pull her so tight you lift her off her feet, and she laughs.\n\nSo: you kiss.  She kisses.  Y'all kiss.  There are many conjugations and declensions of kissing and pulling and holding and touching at play, few of which are strictly grammatical.\n\nSomewhere between the vertical and the horizontal, Cass presses on your chest, creates a foot of space between you, looks into your eyes and asks: \"Is this for tonight?  Or for real?\"\n*label chen_kiss_choice\n*choice\n\t*hide_reuse #\"Tonight.\"\n\t\t*set chen_sex +1\n\t\t*if chen_sex > 1\n\t\t\t\"Then this makes for an awful lot of 'just tonights.'  I don't want this to be all there is.  Either this is for real, or tonight's the last time we play this game.\"\n\t\t\t*choice\n\t\t\t\t#\"It's real.\"\n\t\t\t\t\t*goto chen_real\n\t\t\t\t#\"I need this tonight.\"\n\t\t\t\t\t\"So long as you understand.\"\n\t\t\t\t\t\n\t\t\t\t\tGods, you're so close.  You can feel her.\n\t\t\t\t\t\n\t\t\t\t\t\"I do.\"\n\t\t\t\t\t*goto chen_sex \n\t\t*else\n\t\t\t*label chen_sex\n\t\t\t\"Then we'll take tonight,\" she says, and pushes you down onto the bed.\n\t\t\t\n\t\t\tAnd then it's her, and you, and you're naked and she is, and the grammar gets complicated again, constructions active and passive and midway between.  Oh, forget it.  The linguist's endless rules and diagrams, the thick tomes with their bullet points and many subheadings, have never fully accommodated the endless invention of living human beings with tongues.  And fingers.  Palms.  Hips.  Thighs.  Not to mention other, wetter body parts.\n\t\t\t\n\t\t\tWere there a copy editor in your bedroom, he or she might learn a great deal about descriptive grammar and usage.  Among other matters.  Then again, he or she might be too distracted to learn much.\n\t\t\t\n\t\t\tSuffice it to say, you don't sleep tonight.  But gods, is the exhaustion worthwhile.\n\t\t\t*set sleep %-5\n\t\t\t*set soul +500\n\t\t\t*goto morning_commute\n\t*hide_reuse #\"Does it matter?\"\n\t\t\"Yes.\"\n\t\t*goto chen_kiss_choice\n\t#\"It's real, Cass.  It's real.\"\n\t\t*label chen_real\n\t\tHer dark eyes sharpen and her voice gets hard, and her grip tightens on your arms.\n\t\t\n\t\t\"Then don't you fucking die on me,\" she whispers in your ear.\n\t\t*set in_relationship true\n\t\t*set chen %+30\n\t\t*achieve chen\n\t\t*set chen_relationship true\n\t\t\n\t\tAnd then it's her, and you, and you're naked and she is, and the grammar gets complicated again, constructions active and passive and midway between.  Oh, forget it.  The linguist's endless rules and diagrams, the thick tomes with their bullet points and many subheadings, have never fully accommodated the endless invention of living human beings with tongues.  And fingers.  Palms.  Hips.  Thighs.  Not to mention other, wetter body parts.\n\t\t\t\n\t\tWere there a copy editor in your bedroom, he or she might learn a great deal about descriptive grammar and usage.  Among other matters.  Then again, he or she might be too distracted to learn much.\n\t\t\t\n\t\tSuffice it to say, you don't sleep tonight.  But gods, is the exhaustion worthwhile.\n\t\t*set sleep %-5\n\t\t*set soul +500\n\t\t*goto morning_commute\n\t\t\n*comment and now it's the Vega scene.\n\n*label knock_vega\n\nYou open the door and find Vega waiting, dressed in the same pale gray suit he wore to work.  He nods his head—not quite a bow, but the remnant of one.  You can take the man out of the Old World, but you can't quite take the Old World out of the man.\n\n\"May I come in?\"\n\nYou usher him past you.\n\n*if (commute = \"short\")\n\tHe reviews your living room in a blink, taking in the high ceilings, the granite counters, the brass fixtures and the beautiful view.  \"Homey.  I like it.\"\n*if (commute = \"medium\")\n\tThe alchemically-faked leather upholstery of your couch squeaks slightly beneath his touch.  \"Do you know, I think every associate at our firm but me owns the same couch?\"\n*if (commute = \"long\")\n\tYou expect him to blink at your choice of lodgings, but he takes it all in—the brick wall outside the window, the exposed insulation, the pounding music beneath the floorboards—as if he's used to run-down District crash pads with more than their fair share of local color.  \"Reasonable,\" he says.  \"Though the commute must be hell.\"\n*comment endif\n\n*choice\n\t*if (commute = \"short\")  #\"I wanted to sleep closer to work.\"\n\t\t\"I understand the desire,\" he says, \"though I myself often wish I could rest my head as far away from the office as possible.  Sadly, I would then face an impractical commute—harder to bill while stuck in traffic, though some partners manage.\"\n\t\t\n\t\t\"Is that really what you came here to talk about?\"\n\t\t*goto Vega_why_here\n\t*if (commute = \"long\")  #\"It's far enough out that I can get a seat on the bus, so I can work on the way.\"\n\t\t\"Ah, but you rob yourself of sleep, that sweetest friend to gods and men.\"\n\t\t\n\t\t\"I have enough friends,\" you say, and he laughs.  \"This isn't why you came.\"\n\t\t*goto Vega_why_here\n\t*if (commute = \"medium\")  #\"Hey, it's a good couch.\"\n\t\t\"It is not.\"\n\t\t\n\t\tYou laugh.  \"I guess not.  But it's my couch, so I should like it.\"\n\t\t\n\t\t\"I'm sure that is a fallacy of some sort.  It's almost an associative fallacy, but not quite.\"\n\t\t\n\t\t\"Fallacy of the couch.\"\n\t\t\n\t\t\"They'll add that one to the rhetorical encyclopedias I'm sure.\"\n\t\t\n\t\t\"You didn't come here to discuss furniture, though.\"  \n\t\t*goto Vega_why_here\n\t#\"It's a place to sleep, that's all.\"\n\t\t\"I'm more interested,\" you continue, \"in why you wrote me that letter.\"\n\t\t*goto vega_why_here\n\t#\"Did you really come here to ask me about real estate?\"\n\t\tVega's smooth face cracks in the slightest echo of a smile.  He parks one knuckle under his chin, and stares down into your floor.\n\t\t*goto vega_why_here\n\t#\"Can I get you something to drink?\"\n\t\t\"Water's fine.  Thank you.\"\n\t\t\n\t\tYou get him a glass from the kitchen.  He takes a sip, then stares into the glass for a while, saying nothing.\n\t\t\n\t\t\"You didn't come here for drinks, I know.\"\n\t\t*goto vega_why_here\n\n*label vega_why_here\n*page_break\n\n\"No,\" he says.  \"I just want you to be careful.\"\n\n\"I know Smith.  I've worked with him before.\"\n\n\"Not as closely as I have.  And trust me.  He's wheels within wheels.  He might put you in danger just to gain himself some ground.  I've seen it happen before.  I've been on the receiving end.  I spent an hour yesterday trying to convince Angelica—\" meaning Nebuchadnezzar—\"to stop them from sending you on this trip.  But they weighed the risks and found my advice wanting.\"\n\n*choice\n\t#\"I don't trust him either.\"\n\t\t\"It's more than a question of trust.  You'll be in the demon planes without any backup except for him.  I wouldn't wish that on an enemy, let alone a friend.\"\n\t\t\n\t\t\"Well,\" you say.  \"I'm going.  And I'll be careful.\"\n\t\t*goto vega_silence\n\t#\"What happened between you and Smith?\"\n\t\t\"You were on the wards case, a few years back.\"\n\t\t\n\t\t\"That was where we met,\" you say.\n\t\t\n\t\t\"I'm half convinced he allowed the weakness to happen—because it helped him gain clout in his firm, and sideline a rival.  He's not a nice man.  And demons are neither nice, nor men.  That's all.\"\n\t\t\n\t\t\"Thanks.  But I'm still going.  And I'll be careful.\"\n\t\t*goto vega_silence\n\t#\"You're worried about me.\"\n\t\tHe holds your gaze for a moment, then looks away.  His skin's porcelain-pale, and the trace of flush shows clearly.  \"I'm worried about our business.\"\n\t\t\n\t\t\"Of course.\"\n\t\t*goto vega_silence\n\n*label vega_silence\n\nHe stands beside the couch, purpose discharged, but the silence hardens around you both.  You become aware of a precarious balance, as if the room, and the pair of you, stood on the edge of a knife.\n\n*if (vega > vega_sex_diff) \n\tVega meets your eyes.  His irises are a grey so pale it's almost white.  \"I care about you,\" he says.  \"I care about you very much.  I want you to be safe.\"\n\t\n\t\"I will be,\" you say, though you can't and don't know that.\n\t\n\t\"I would like,\" he says, \"to kiss you now.\"\n\t*choice\n\t\t*if (vega_sex = 0) #\"What took you so long?\"\n\t\t\t*goto vega_kiss\n\t\t#\"Of course.\"\n\t\t\t*goto vega_kiss\n\t\t#\"No.\"\n\t\t\t*label Vega_no\n\t\t\tHe doesn't wilt, not that you can see.  He stands straight and strong, shoulders square.  He receives your refusal like an aristocrat, and acknowledges it with a bow.  \"As you wish.  Regretful as I am, I must assure you that my concern for your well-being, and my respect for you as a ${Craftsperson}, is not predicated on my desire for you as a ${char_binary}.\"\n\t\t\t\n\t\t\t\"It's okay an you'd hoped.\n\t\t\t*goto morning_commute\n\t#I try to kiss ${Ash_pro_obj}.\n\t\tAnything you try will break the careful balance of this room, and the two of you, tonight.  Not to mention expose you to merciless mockery for the rest of your life.  So you might as well get it over with.\n\t\t\n\t\tYou walk to ${Ash_pro_obj}, and touch ${Ash_pro_obj} on the arm.  \"I'd like to kiss you now, if that's okay with you.\"\n\t\t\n\t\tBalance breaks, and the world changes.  ${Ash_pro_cap} smiles.  \"Why don't we try it and see?\"\n\t\t*goto wakefield_kiss\n\t\n*label wakefield_hesitation\n*choice\n\t#\"Wait.\"\n\t\tOne word isn't much in the grand scheme of things.  But it's enough to break a stalemate, to tip a balance.\n\n\t\tWakefield advances toward you, and ${Ash_pro} seems to flicker, there's so much inside ${Ash_pro_obj} that's trying to get out.  ${Ash_pro_pos_cap} irises are ice and swift rivers.  \"${surname},\" ${Ash_pro} says, and then stops ${Ash_pro_self}, and says, determinedly, \"${name}.  You are a masterwork.  You are brilliant.  You are a rare rival.  I do not wish to lose you.\"\n\t\n\t\t\"I'm not going anywhere,\" you say, even though you are.\n\t\n\t\t\"And I would like,\" ${Ash_pro} says, \"to kiss you now.  And more.\"\n\t\t*choice\n\t\t\t#\"What took you so long?\"\n\t\t\t\t\"Aside from the fact that you are an inveterate smartass?\"\n\t\t\t\t\n\t\t\t\tBut before you can respond, ${Ash_pro} kisses you.\n\t\t\t\t*goto wakefield_kiss\n\t\t\t#\"Of course.\"\n\t\t\t\t*goto wakefield_kiss\n\t\t\t#\"No.\"\n\t\t\t\t*goto wakefield_no\n\t#I kiss ${Ash_pro_obj}.\n\t\t*goto wakefield_kiss\n\t#I let ${Ash_pro_obj} go.\n\t\t${Ash_pro_cap} leaves you in the silence of your living room, beside your open suitcase.  You listen to the nothing for a bit, then finish packing and get yourself to bed, though later than you'd hoped.\n\t\t\n\t\t*goto morning_commute\n\n*label wakefield_kiss\nIn a language without a plural \"you,\" there's no good way to say what happens next.  \"You kiss\" sounds like it's just you doing the kissing, which the pressure of ${Ash_pro_pos} lips and the pressure of ${Ash_pro_pos} hands on your shoulder and your hip testify is not the case.  \"${Ash_pro_cap} kisses\" sounds like it's just ${Ash_pro_obj} at work, as if you hadn't pulled ${Ash_pro_obj} toward you, as if your lips weren't on ${Ash_pro_abs}.  You could not make that claim—you wouldn't stand up in cross.\n\nYou won't be standing up in a few minutes anyway, at this rate.  ${Ash_pro_pos_cap} hands are unbuckling your belt, and yours are beneath ${Ash_pro_pos} shirt.  Fast, maybe, but a hunger comes from a shifting of the balance.  You pull ${Ash_pro_obj} so tight you lift ${Ash_pro_obj} off ${Ash_pro_pos} feet, and ${Ash_pro} laughs.\n\nSo: you kiss.  ${Ash_pro_cap} kisses.  Y'all kiss.  There are conjugations and declensions of kissing and pulling and holding and touching at play, few of which are strictly grammatical.\n\n*page_break\n\nAnd then it's ${Ash_pro_obj}, and you, and you're naked and ${Ash_pro} is, and the grammar gets complicated again, constructions active and passive and midway between.  Oh, forget it.  The linguist's endless rules and diagrams, the thick tomes with their bullet points and many subheadings, have never fully accommodated or described the endless invention of living human beings with tongues.  And fingers.  Palms.  Hips.  Thighs.  Not to mention other parts of the body, which have a tendency to speak for themselves.\n\t\t\t\nWere there a copy editor in your bedroom, he or she might learn a great deal about descriptive grammar and usage.  Among other matters.  Then again, he or she might be too distracted to learn much.\n\t\t\t\nSuffice it to say, you don't sleep tonight.  But gods, is the exhaustion worthwhile.\n*set sleep %-10\n*set soul +300\n*set Wakefield %+30\n*achieve wakefieldlove\n*set Wakefield_relationship true\n*set in_relationship true\n*goto morning_commute\n\n*label earth_sleep\n\nPacking done, you stand in your empty room, which has never seemed more empty than at this moment.  You pace the confines of your place.\n\n*if (commute = \"long\")\n\tThe fire outside's died down, but smoke still hangs in the air, smogging up the few stars you ordinarily could see.  Beneath you the music pounds.  You find your earplugs, and sleep, feeling the bass in your chest and stomach.  You try not to dream of demons.  You don't succeed.\n*if (commute = \"short\")\n\tOutside your windows and far below, the city's a web of jewels.  You know there's dirt, and grime, you know there are people living and breathing and screwing, but they're so far away from you now.  A few of them, at least, should be closer.\n\t\n\tYou go to sleep and try not to dream of demons.\n*if (commute = \"medium\")\n\tYou wander through your apartment, touching your couch, your bookshelves, your coffee table.  It all seems so cheap, and you wonder how else you might have spent your life.  When you force yourself to bed, you lie in the darkness and try not to dream of demons.\n*comment endif\n\t\nYou don't succeed.\n*comment endif\n*goto morning_commute\n\n*label morning_commute\n*page_break\n*comment Beat 2: Entry into the World\n\nYour commute to Krieg Tower takes longer than normal.  Heavy traffic on the carriageway, and a pileup at the intersection of Saitoh and Kosigan, but it's not just the traffic.  Even pedestrians seem to have slowed to a stately stroll, and the sun takes longer to climb the sky than usual.\n\nWhen you reach the VNS lobby on the thirty-third floor, John Smith is there already, waiting.  He always seems smaller in person than he did in that mirror so many years ago—though he doesn't seem to have aged much.  Still smooth-featured, still gray-dusted, still lipless, still immaculately dressed.\n\nHe extends one manicured hand, which you shake by professional reflex.  \"${Char_voc} ${surname}.  It has been too long.  I am pleased that the partners saw fit to permit you to accompany me.\"\n\n*fake_choice\n\t#\"I hope this trip will be less…remarkable than our previous encounters.\"\n\t\t\"Oh, certainly.\"\n\t#\"I'm not.\"\n\t\tHe turns his head to one side, as if he doesn't take your meaning.\n\t\t\n\t\t\"Every time we run into one another,\" you explain, \"something seems to be horribly wrong.  I'm not one to believe in fate, but if you toss a coin ninety-nine times and it comes up heads each time, odds are something's wrong with the coin.\"\n\t\t\n\t\t\"Certainly.  But with which side?\"\n\t#\"Why did you ask for me, anyway?\"\n\t\t\"We have history, and I prefer to work with people who understand my history.\"\n\t\t\n\t\t\"I doubt I understand your history.  I barely understand my own.\"\n\t\t\n\t\t\"Failing that,\" he says, with a slight smile, \"I prefer to work with people who have demonstrated some loyalty.  You have saved my life, if you recall.\"\n\t\t\n\t\tYou're not certain that was a good decision, but no sense saying that to his face.\n\t#\"The pleasure's mine.\"\n\t\t\"How gratifying that you should say so.\"\n*comment endif\n\n\"They're waiting for us upstairs.\"  You gesture to the lifts.  \"After you?\"\n\nYou ride up to the fifty-fifth floor together, neither speaking.  Smith hums slightly in the elevator, a song you don't recognize.  When you arrive, the name partners are waiting.  Smith steps forward to meet them, hand out, smiling.\n\n*temp Rok_condition \"\"\n*temp Rok_meeting \"\"\n*temp Rok_response \"\"\n\n*if (Rok_job)\n\t*set Rok_condition \"It's R'ok, of course—one arm laden with a pile of binders.  A few years of residence on this plane have ended up well for him.  The job's better than his previous, and last year you went to his art opening.  Didn't understand much of it, but then, you didn't expect to.\"\n\t*set Rok_meeting \"What's up, R'ok?\"\n\t*set Rok_response \"I hear you are going home.\"\n*if not(Rok_job)\n\t*set Rok_condition \"It's R'ok!  You haven't seen the big lug nearly as often as you'd hoped in the past few years.  He found some sort of custodial job down at the docks—better than his previous at least in terms of conditions, and last year you went to his art opening.  Didn't understand much of it, but then, you didn't expect to.\"\n\t*set Rok_meeting \"R'ok!  What are you doing here?  How did you even get into the building?\"\n\t*set Rok_response \"Aunt Angelica—\\\" followed by a nod to Nebuchadnezzar— \\\"asked me to come.  She says you are going…home.\"\n*comment endif\n\n*if(Rok_here)\n\tBefore you can follow him, you hear a voice of chimes and wind behind you.\n\t\n\t\"Excuse me?\"\n\t\n\tYou turn.  ${Rok_condition}\n\t\n\tHe beckons you with one claw.  Looks like Smith and the partners will be busy for another few seconds.  You step to one side.  \"${Rok_meeting}\"\n\t*page_break\n\t\n\t\"${Rok_response}.\"  That last word has a strange resonance in his mouth.  How would you sound after a few years in a place where even the physics were different?  \"With him.\"  He points to Smith.\n\t\n\t\"That's the plan.\"\n\t\n\tHe touches his chest, and you hear a slight crack.  He extends his claw to you, and within it you see a sliver of glass.  \"Here.  If you are in trouble, this will allow you to call upon my people for aid.\"\n\t*choice\n\t\t#\"That's generous.  But I don't need it.  I'll be fine.\"\n\t\t\t\"If you say so,\" he says, with some doubt.  The glass silver shimmers and melts back into his palm.  \"Be well.\"  He scuttles off into a side passage, and you turn back to the partners.\n\t\t\t*set power %+10\n\t\t\t*goto summoning\n\t\t#\"Thank you.  That's so kind.\"\n\t\t\tYou hold the sliver up to the light.  It's scalpel-edged, and you can barely grip it without cutting yourself; you see scratches on the surface, like writing.  Maybe an insignia?  Beautiful, but it means nothing to you.\n\t\t\t\n\t\t\t\"The world waits for you,\" he says, and scuttles away down a side passage without meeting your gaze.  You turn back to join the partners, and slip the token into your pocket.  You'll have to find a pouch or something for it later.\n\t\t\t*set charm %+10\n\t\t\t*set base_diff -10\n\t\t\t*set rok_token true\n\t\t\t*goto summoning\n\t\t#\"You're worried about nothing.\" But I take the token anyway.\n\t\t\t\"It is precisely nothing that concerns me.\"\n\t\t\t\n\t\t\tYou hold the sliver up to the light.  It's scalpel-edged, and you can barely grip it without cutting yourself; in the light, you see scratches on the sliver's surface, like writing.  Maybe an insignia?  Beautiful, but it means nothing to you.\n\t\t\t\n\t\t\t\"The world waits for you,\" he says, and scuttles away down a side passage without meeting your gaze.  You turn back to join the partners, and slip the token into your pocket.  You'll have to find a pouch or something for it later.\n\t\t\t*set base_diff -10\n\t\t\t*set rok_token true\n\t\t\t*goto summoning\n\n*label summoning\n*page_break\n\nNebuchadnezzar nods to you as you approach.  \"Your summoning contracts arrived an hour ago, as promised.\"  An aide hands you a scroll, which you unroll and scan.\n\nThe contract repeats its terms in High Telomiri, demonaic, and Kathic, with a bold declaration at the top that all the translations have identical meanings.  Reading the Kathic, you imagine linguists spinning in their graves.\n\nUpon your entry into the demon plane, you'll have a body roughly equivalent to yours in this world, and be subject to the equivalent of human limits as regards action over a distance, causality, and so forth.  Anchoring you in the local physics.  Fine.  In exchange for this, you and Smith pledge to negotiate in good faith a deal between Transdimensional Thaumaturgics and Akargath.  The contract's void in the event of your death.  \n\n*choice\n\t#\"Standard summoning deal.  Seems good.\"\n\t\t*set craft %+20\n\t\t*set Nebuchadnezzar %+20\n\t\t\"Indeed,\" Nebuchadnezzar says.  \"Now, if you'll step into the pentagram?\"\n\t\t*goto exit_light\n\t#\"Why the good faith clause?\"\n\t\t*set cunning %+20\n\t\t*set Nebuchadnezzar %+20\n\t\t\"Because,\" Smith says with a slight smile, \"they don't trust me.  Especially not after our last engagement ended in such an intriguing manner.\"\n\t\t\n\t\t\"Not a lot of trust to go around,\" you say.\n\t\t\n\t\t\"Well, this is Hell, after all.\"\n\t\t\n\t\t\"Indeed,\" Nebuchadnezzar says.  \"Now, if you'll step into the pentagram?\"\n\t\t*goto exit_light\n\t#\"Why so many limits on my capabilities?\"\n\t\tNebuchadnezzar frowns slightly.  You really should know this already.  \"Because without them, you would have none.  You're from outside their world, after all.  The internal structure of their plane has no place for you—but your consciousness asserts its own right of existence.  The situation's highly unstable.  Most of the time you'd manifest immense powers, then explode.  Remember, while from your perspective you're traveling to a demon world, from their perspective they're summoning a demon to theirs.\"\n\t\t\n\t\t\"Only from their perspective?\"  Everyone present gets Smith's joke, but no one thinks it's funny.  \n\t\t\n\t\tNebuchadnezzar certainly doesn't.  \"We're wasting time already.  Will you please step this way, into the pentagram?\"\n\t\t*set craft %+10\n\t\t*set Nebuchadnezzar %-10\n\t\t*goto exit_light\n\t\n*label exit_light\n*page_break\nThe summoning chamber takes up the entire Krieg Tower penthouse.  You stand in a room all of glass, and, with Smith, you step into a pentagram acid-etched in silver onto a broad flat stone that must have been quarried in Camlaan somewhere.  Your skin chills when you cross the line.\n\nBlack tapers are lit around the perimeter of the room.  Twelve of the firm's senior Craftsmen and Craftswomen step forth, hooded and cloaked, faces invisible—you know them from their voices, you've passed them in the break room, but for the purposes of summoning they must be anonymous.  Those who seek you from the demon plane lack your true name, or any secret keys to your soul, so they must settle for precise geometry to ensure they summon the correct person in the correct form.\n\nThe leader of the group—it might be Nebuchadnezzar based on the height, but you forget this knowledge with the practice and mental discipline of a true ${Craftsperson}—raises hands to the sky, and the black flames leap.  The sun dies.  Clouds burn away overhead.  Stars shine, bright, sharp, and the shadows feed on their fire.  You feel yourself seen.  Known to your marrow.  Your skin's flayed from you and you are vivisected, stuck to an entomologist's board, pinned open while immense eyes observe the strange machines of your soul.\n\nShadows close around you like a fist, and the world ends.\n\n*page_break\n\nAnd then it starts again.\n\n*page_break\n\nThe sun's wrong.  Or your eyes are.  Or the light.  Or your heart.\n\nA star hangs in the sky overhead, hundreds of millions of miles across and burning, exploding, searing, hot enough to evaporate steel and transform flesh to plasma.  The photosphere [i]wriggles[/i], and worms burst out from it to crawl across the stars, fanged mouths chewing chewing chewing at the sky…\n\nAnd it's a sun.  Just a sun, shining down onto a city of crystal spires, a city of towering thorns pressed against the jugular of the sky, a city of sharp edges and every edge caked with the blood of the slain.  A city where the wind screams as it blows.\n\nA city just like any other: buildings you almost recognize, with windows, and lights, and walls.  Turn your head one way, and they are crystalline monstrosities of trapped lightning; turn it another, and see the seams amid the brick.\n\nYou look down at yourself, and understand.  Your body is crystal, and shimmering, and so's your suit.  This double, triple, quadruple vision is the senses the summoning contract gave you trying to integrate with your mind.\n\nThis, you realize, is how a demon in your world sees [i]everything, all the time[/i].\n\n*fake_choice\n\t#\"Wow.\"\n\t#\"Woah.\"\n\t#\"Wild.\"\n\t#\"I think I'm going to be sick.\"\n\t#\"Hells.\"\n\t#\"…Metal.\"\n*comment I'm not sure I can get away with that last one but I want to SO BADLY.\n\nYour voice sounds like a wine glass made to sing.\n\n\"Indeed,\" a familiar voice replies.\n\nYou're comfortable enough with this strange altered sight to interpret the world around you.  You stand on a rooftop platform, within a summoning circle.  White flames flicker around the circle's edge.  Smith's on his knees, breathing heavily—Smith who looks normal if you squint, and crystal-faceted if you let your eyes relax.\n\nOutside the circle's edge stand seven robed spider-mantis-things, their many eyes gleaming.  Or is that what you really see after all, or only what you expect to see?  Blink, and you're surrounded by radiant forms of light, with spreading wings…\n\nYou shake your head to clear it.  You recognized that voice.  Who?\n\nYou don't have time to give your confusion voice.  The robed figure in front of you removes its hood with two long chitinous claws, and you see the graven face of K'lint, R'ok's father.  He bows to you, slightly.  \"Greetings, demons.  And welcome.  It is time…to feed.\"\n\n*choice\n\t#\"Wait.  What?\"\n\t\tK'lint's mandibles clack in what you suppose is a local equivalent of laughter.  \"I believe you have mistaken my meaning.  The sun—\"  He points, but you resist the temptation to look again at that horrible/normal star.  \"Falls toward the horizon, and we take a customary meal.  Which we have prepared for ourselves, and for you.\"\n\t\t\n\t\t\"You mean, it's time for dinner.\"\n\t\t\n\t\t\"That is what I said.\"\n\t\t*goto beat_3\n\t#\"Hold on, can't we talk about this first?\"\n\t\t\"We may indeed discuss.  But hunger is poor spice only to conversation.\"\n\t\t\n\t\t\"So's being eaten.\"\n\t\t\n\t\tK'lint's mandibles clack in what you suppose is a local equivalent of laughter.  \"I believe you have mistaken my meaning.  The sun—\"  He points, but you resist the temptation to look again at that horrible/normal star.  \"Falls toward the horizon, and we take a customary meal.  Which we have prepared for ourselves, and for you.\"\n\t\t\n\t\t\"You mean, it's time for dinner.\"\n\t\t\n\t\t\"That is what I said.\" \n\t\t*goto beat_3\n\t#I call upon the Craft to defend myself.\n\t\tThe world slips and slides beneath your mind as you impose your will upon it—but the contract ensures you commensurate powers to those you hold back home.  That horrid/normal sunlight quails and dims, dark magic dances through your veins, and the cloaked figures recoil.  \"That will be your last mistake.\"\n\t\t\n\t\tBut K'lint's mandibles clack in what you suppose is a local equivalent of laughter.  \"I believe you have confused my meaning.  The sun—\"  He points, but you resist the temptation to look again at that horrible/normal star.  \"Falls toward the horizon, and we take a customary meal.  Which we have prepared for ourselves, and for you.\"\n\t\t\n\t\t\"You mean, it's time for dinner.\"\n\t\t\n\t\t\"That is what I said.\"\n\t\t*goto beat_3\n\t*if (cunning > 70) #\"You basically just mean dinner, don't you?\"\n\t\t\"Indeed.\"\n\t\t*goto beat_3\n\n*label beat_3\n*comment beat 3: Dinner\n\n\"It's morning, our time,\" you say as Smith struggles to his feet.  But you do feel hungry.\n\n\"Your time is not relevant.  The bodies you wear are original to this plane.  And they require sustenance.\"\n\nYour stomach agrees with him.\n\n\"Can we leave the circle?\"\n\n\"Certainly,\" he replies.  \"Leaving the circle merely signals your final acceptance of the terms of the compact.\"\n\n*fake_choice\n\t#\"Fair.\"\n\t#I stay inside the circle.\n\t\tYou eye the border warily.  You have come here, but you don't trust K'lint and his people, and you don't trust Smith, and once you cross the border there's no going back.\n\t\t\n\t\tSmith, unfortunately for your planned defiance, chooses this moment to recover.  \"Well?  What are we waiting for?\"  He straightens his tie, and crosses out of the circle.  Nothing for it but to follow him.\n\t#I help Smith to his feet.\n\t\t\"Thank you,\" he says, still unsteady.  \"The time change is murder.  Not to mention the everything-else change.  Let's go.\"\n\t#\"And the compact binds you as well?\"\n\t\t\"Of course.  Were it not binding upon us, you would not be here.\"\n\t\t\n\t\tSeems fair.\n*comment endif\n\nYou step across the line, and feel something like reality—some excuse for it anyway—settle back upon your shoulders.  \"Lead the way.\"\n\nYour minders lead you downstairs, into the heart of the demonic tower, though beyond that your sense of direction falters again.  You're pretty certain you just walked in a circle only to end somewhere other than where you began.  For that matter, you're confident that when you turned the last corner you saw yourself turning away at the far end of the hall.\n\nYour mind's still clearly getting the hang of the local geometry.\n\n\"This is the hive of our clutch,\" K'lint says.  \"You will stay here—\" indicating with a forelimb a long winding flight of stairs, \"—in rooms prepared according to the manner of your people.  Retreat to them when you are exhausted.\"  You come to a large pair of double doors.  He clacks something in his demon-tongue, and the doors roll open.  \"Until then, enjoy the banquet.\"\n\n*page_break\n\nSay whatever you like about Smith and his repeated battles with the demon plane—you'd have a much kinder impression of all parties concerned if they featured this level of feasting more prominently.  The sun has set during your descent, though there doesn't seem to have been nearly enough time for that when you add it all up.  Whatever.  The stars are out, their constellations as alien as everything else in this strange plane.  Dancers and spiders and webs and geometric shapes—only when you blink they're not stars at all but massive eyes unknowably far away, each one staring at you.\n\nThe party, though, is grand.  You sit at a long table beside Smith and K'lint and demons of many shapes and forms—most insectine, mantises and centipedes with children's faces and immensely tall water striders with female torsos and no heads but mouths all over, and perhaps that's why he said \"clutch\" earlier.  \n\nDinner turns out to be something best described as a steak if they made steaks out of sex and hope and joy, accompanied by a red wine with notes of autumn childhood happiness and a light finish of your first kiss.  Which is all to the good, until you begin to ponder what they killed to make a steak that tastes like that, and which grapes they crushed to earn that wine.\n\nMusic plays—you think it's music, though sometimes the strings sound suspiciously as if they're screaming.  How do you spend the party?\n\n*choice\n\t#I talk to our host.\n\t\tSmith eats in silence, which leaves you the opportunity to chat with K'lint, who you haven't seen since the affair with his son.  \"How's time treated you?\"\n\t\t\n\t\t\"Well enough,\" he says, \"though our times are not quite identical.  You seem to have aged considerably since we last met.\"\n\t\t\n\t\t\"Thanks?\"\n\t\t\n\t\t\"It is well.  You have grown in power and the roots of your story run deep.  Maturation suits you.  It is a shame that we are adversaries in this matter.\"\n\t\t\n\t\t\"I'm just here to advise Smith.  He's your main adversary.\"\n\t\t\n\t\t\"And yet you have seemed inseparable from him since the earliest moments of our acquaintance.\"\n\t\t\n\t\tNo denying that.  Not that you like the way it sounds.  You raise your glass: \"To fruitful negotiations.\"\n\t\t*set power %+10\n\t\t*goto return_to_rooms\n\t#I mill around and dance.\n\t\tAfter dinner the music grows a spine, and percussion.  You can't tell one sex of demon from another, nor are you entirely certain that gender is a relevant concept for K'lint's clutch.  You lack antennae, mandibles, three-hundred-sixty-degree articulated forelimbs, and a color-shifting skin, but you find a group of dancers and join in.  They laugh, but what the hells.\n\t\t\n\t\tLiterally.\n\t\t*set charm %+10\n\t\t*goto return_to_rooms\n\t*if (not(Rok_here)) #Wait, that's R'ok over there!  I go talk to him!\n\t\tIs that…it is!  You mistook the eight-foot-tall spider-mantis-thing for K'lint earlier, but when it turns around you see it has fewer facial carvings, and longer mandibles.  You'd remember that face anywhere!  \"R'ok!  How's it going?\"\n\t\t\n\t\t\"${Surname}!\"  He scuttles over toward you, four arms wide, and while you hesitate briefly, you step within and let him hug you despite the razor edges of his limbs.  You don't get cut.  Much.\n\t\t\n\t\tYou find more of that suspicious wine, and the pair of you wander the party together, discussing old times.  He's doing well—working with his father (and the more you see of these creatures and this plane, the more you're starting to doubt the relevance of your gendered terms, and to wonder how you ever assumed they were appropriate in the first place), gaining new responsibilities, and he's even taken a trip or two to \"Hayl\" as he insists on calling your world.\n\t\t\n\t\t\"That's not what it's called.\"\n\t\t\n\t\t\"It was the designation chosen by our first explorer to discover you.  Is that not how names are determined?\"\n\t\t\n\t\t\"Not for people who have their own names.\"\n\t\t\n\t\t\"My survey of your history suggests differently.  And anyway, what do you call it?  I have encountered 'Alterre' among the Iskari, and in the Shining Empire 'Tyan Hsya,' and among the New Worlders there are many other names—\"\n\t\t\n\t\t\"For the planet?  Or the plane?\"\n\t\t\n\t\t\"Either.\"\n\t\t\n\t\t\"Craftsfolk call it Domain, formally.  But that hasn't really caught on in public, so it's anyone's guess.  Pretty philosophical question, what name you call the world.\"\n\t\t\n\t\t\"I suppose.\"\n\t\t*page_break\n\t\tAll things considered, though, R'ok's doing well.  A bit sad when he mentions his art career—hasn't had much time to sculpt recently, and materials in his home (which he insists on calling 'home') lack the physical properties that interest him, and possess others that don't.  But he's healthy, if sad.\n\t\t\n\t\tYou talk until late in the night, then decide to head off to sleep.\n\t\t*set charm %+20\n\t\t*goto return_to_rooms\n\t#Talk to Smith\n\t\tOutside of your chat with Smith before the mirror on the day of your struggle with the demons, the pair of you have never had a conversation.  So you pour more of the suspicious wine, and drink rainbows with him.\n\t\t\n\t\t\"Why are you here, anyway?\" you ask after you've spent an hour and change growing progressively more intoxicated.  (Turns out your body handles whatever passes for liquor here just the same way it does back home.)  \"Why you?\"\n\t\t\n\t\t\"We need their help again,\" he says, and raises a glass to the eye-stars.  \"We always need help.  And every time they try to take advantage of us.  Like last time, you remember—the affair in Southern Kath, their attempts to use us as a beachhead.  We need their help but we can't afford to let them outmaneuver us.\"\n\t\t\n\t\t\"But did you really need to come yourself?\"\n\t\t\n\t\tHe's slurring his words more as the night goes on.  \"Some things you can only do in person.\"\n\t\t*set cunning %+20\n\t\t*set craft %+10\n\t\t*goto return_to_rooms\n\n*label return_to_rooms\n*page_break\n\nLate that night—your new, almost-crystal body claims it's late, anyway—you find the double doors, and past them the long, winding stair that seems to go up for much longer than you spent going down at sunset, at the top of which is a row of rooms, all alike.\n\nNo way, of course, to tell which door belongs to you.  But as you turn to descend once more to the front hall and ask K'lint for help (when you left he was dancing something that looked an awful lot like a samba with the strider-legged female-bodied creature), one door opens of its own accord.\n\nThe demons don't seem to have updated these rooms in two centuries or so, and that's a good thing.  You have a suite large enough to host a tiny parliament meeting, and a four-poster bed large enough to host an orgy starring an entire gymnastics team with enough room left for a few figure skaters if they showed up late and wanted to join in.\n\nNot to mention the a bar, fully stocked, with cut crystal glasses and whisky that's older than you are.  And the balcony.\n\nYou pour yourself a drink and step out to watch the city, and be watched by the sky.\n\n\"Nice view, isn't it?\"  The words run together, but the voice is unmistakably human.  You look to your right and see Smith, drunk, in a bathrobe, on the balcony of his own room.\n\nHe raises a glass in your direction.  \"What do you think of the demons?\"\n\n*choice\n\t#\"Not so bad once you get to know them.\"\n\t\t\"The same can be said of any monster.  Of you!  Or me.  Every action makes sense given its own context.  Motives for everything, even if they're just hunger.\"\n\t\t*set charm %+10\n\t\t*goto smith_chat\n\t#\"Unnerving.\"\n\t\t\"Absolutely.  Though I suspect they'd say the same about us if they came to visit.  They must, you know.  Returning home with stories of the depredations we inflict on our unsuspecting surroundings.  'Do you know they shed an entire set of teeth after the first six years of life?' 'Can you imagine, [i]dreaming[/i]?' 'They can recover from nearly any wound!'  Each side finds the other anathema.\"\n\t\t*goto smith_chat\n\t#\"I can't wait to get home.\"\n\t\t\"Home is what they call this place, you know.  With its watchful stars and its quivering walls.  Everywhere's home, which means everywhere is just as terrifying as everywhere else, for someone.\"\n\t\t*goto smith_chat\n\t#\"You're drunk.\"\n\t\t\"As a lord.\"  He giggles at that, high-pitched and self-satisfied.  \"What a world we live in, eh?  Drinking with demons who but for that compact would gladly slit our throats, and us perfectly willing to do likewise.\"\n\t\t*goto smith_chat\n\n*label smith_chat\n\n\"Are you always this…\"  [i]Nuts[/i] is the first word that comes to mind, but that might strain the boundaries of your professional relationship. \"…bloody-minded when you're drunk?\"\n\n\"Only when drunk and surrounded by the enemies of our entire existence.\"  He gestures at the stars with his glass, fast enough to spill liquor over the rim onto his fingers.  \"Look at them.  They work with us because they know that someday they'll have the chance to destroy us.  To steal away all that makes us ourselves.  That's the nature of trade: their labor to us, and our souls to them.  Unless we beat them to the punch.  And me they want to kill especially.\"\n\n\"If that's so, why work with them at all?\"\n\nHe gestures to his chest, which is bare and pale beneath the open neck of his robe.  An amulet hangs there, ebony worked with silver on a silver chain.  \"Because I have good insurance.\"  He pitches the rest of his liquor over the edge of the balcony, and staggers back into his suite.  \"Big day tomorrow.  Sleep well.\"\n\nYou try.\n\n*goto meeting_day\n\n*comment Beat 4: Assassination\n*label meeting_day\n*page_break\n\nYou expected the meeting, the negotiation, would take place in a conference room of some sort, and that conference rooms would be much the same here as in your world, neutral places, mental and emotional dead zones stable enough for experimentation.  Probably with a fake plant in the corner beside a coffee thermos, a pitcher of lukewarm juice, and a box of bad tea.\n\nBut K'lint leads you, in a strange eight-legged cart with a driver but no horse, to a towering round structure that more closely resembles a stadium than an office.  You hope this is another case of misinterpretation, that in fact you'll be taken to a small office buried within this monstrosity-sized nest of crystal thorns and girders, but the \"stadium\" analogy holds as you're guided through long, narrow, echoing passages, out a recessed door, and find yourself standing, with Smith, on an oblong field in the center of which stands a round table.  K'lint sits across the table; from the stands watch, to your estimation, over a hundred thousand demons.\n\nSmith does not seem concerned.  He grins, advances to the table, and takes a seat.\n\nThe door behind you closes, and you have no choice but to follow, and take your seat beside him.\n\nThe stadium goes quiet.\n\n*page_break\n\nWhen K'lint speaks, his voice echoes over the field.  \"Smith.  Transdimensional Thaumaturgics has enticed us into contracts before with false promises and lies.  We have fought you for years over payment for our previous job.  Many of our brethren feel betrayed by the firm that sends you here.\"  All traces of the previous night's levity are gone.  You try to think of a leader back home who could discuss a sensitive subject in front of a crowd this size without losing control of it.  You can't.  Varkath, maybe.  \"What offers do you make this time?\"\n\nSilence.\n\nSmith pushes back his chair.  He stands.  Tugs once on his lapels.  Raises his hands.  Turns in a slow circle, to face the crowd.\n\nAnd you see a red dancing dot of light appear on the small of on his back.\n\nThis can't be good.\n\n*temp thing_that_blew \"\"\n*temp smith_up_down \"\"\n\n*choice\n\t#I knock him out of the way.\n\t\tYou dive for Smith, grab him by the waist.  No time to think.  You fall, heavy, on top of him on the checkerboard tile.\n\t\t\n\t\tNothing happens.  For a heartbeat you think you've just made a fool out of yourself in front of a hundred thousand denizens of the demon plane.\n\t\t\n\t\tThen the table explodes.\n\t\t*set thing_that_blew \"table\"\n\t\t*set smith_up_down \"Smith struggles to rise from where he's fallen.\"\n\t\t*set wounds +1\n\t\t*set power %+20\n\t\t*achieve smithsave\n\t\t*goto assassin_emerges\n\t*if (soul > 600) #Shield him with Craft\n\t\tYou call upon your powers, crippled as they are in the demon-plane, and surround Smith with a shield—the \"air\" here doesn't have the same chemical composition, doesn't even have what you'd call chemistry exactly, and as such it's harder to manipulate, slipping out from beneath your fingers.  The dot rises, quivers, come on, come on—\n\t\t\n\t\tYou hear a soft zip, and your shield shatters.  Shards of superheated crystal burst in all directions—one tears through your suit and bites into your shoulder.  You fall back, but not before you see that Smith—he's okay!  Your shield saved him.  He turns, shocked.\n\t\t*set craft %+30\n\t\t*set wounds +1\n\t\t*set soul -600\n\t\t*set thing_that_blew \"shield\"\n\t\t*set smith_up_down \"Smith stares open-eyed and open-mouthed as a netted fish.\"\n\t\t*achieve smithsave\n\t\t*goto assassin_emerges\n\t#\"Get down!\"\n\t\t*set charm %+20\n\t\tYour warning echoes in the stadium silence.  Smith turns to you and smiles his thin, angular smile.\n\t\t*goto smith_dies\n\t#Do nothing.  Watch.\n\t\tThe red dot quivers, rises, sinks, then settles over his heart.\n\t\t\n\t\tThis isn't right.  You should do something.  But you sit, and watch, and wait.\n\t\t*set cunning %+20\n\t\t*goto smith_dies\n\n*label assassin_emerges\n\nYou lift yourself off the floor, moving slowly— your ears ring, the world's in rapid decrescendo, screams of insect rage from the stands and shock and horror and the ping of the exploding ${thing_that_blew} all pianissimo and sinking.  Your shoulder hurts, and your ribs.  ${smith_up_down}\n\nThe crowd's a sea in storm.  Based on the direction of the red dot, you can sort of judge where the attacker must have been sitting, within an arc that only captures ten thousand demons or so.  Only.  You have your footing now, and you're on full alert.  Guards have advanced on many legs from the walls.  Their eyes burn with unholy fire.\n\nFortunately for you all, the attacker's determined.  From the spectator sea springs a creature of onyx and thorns; it lands amid the tiles and raises with one hand a complex mechanism of crystal and wires and flame, pointing toward Smith.\n\n\"For my people,\" the demon says, and this you hear—and recognize the voice, from a pier in Shikaw three years ago.  Only it was in Wakefield's mouth then.\n\n*choice\n\t#I rush the assassin myself.\n\t\t*set power %+20\n\t\tThe demon seems to have forgotten its earlier stealth, and subtlety.  Driven mad by the proximity of its target, perhaps, and its initial failure.  Nevertheless, it's recovering, bringing that deadly mechanism to bear even as it runs toward Smith.\n\t\t\n\t\tYou sprint to meet it.\n\t\t\n\t\tThe question of what, exactly, you plan to do when you [i]catch[/i] the giant spider-thing made of obsidian knives doesn't so much occur to you.\n\t\t*page_break\n\t\tTurns out the answer is \"tackle it.\"\n\t\t\n\t\tYou leap through the air, grab the demon around what passes for its neck, and let yourself fall.  Its legs buckle—some of them, anyway—and it tumbles onto its side, not (fortunately) before you're out from underneath.  It turns, thrashes.  Many arms and legs scythe through the air, and one of them holds the weapon.  You grab that arm and wrench it hard.  Chitin cracks.  The weapon falls.\n\t\t\n\t\tAnother hand grabs for it.  You grab the hand first, break it, punch the demon in the face.  It reels back.  But it has so many hands, and as it reels, one of them holds the weapon.\n\t\t\n\t\tAims.\n\t\t\n\t\tYou hit the demon in the face, and it goes down, even as the guards reach it and pile on.\n\t\t\n\t\tBut not before it fires.\n\t\t*goto smith_dies\n\t*if (soul > 600) #I take it down with the Craft.\n\t\t*set craft %+30\n\t\t*set soul -600\n\t\tHard to control a being when you don't know its name.  But air, [i]that[/i] you can stop (even if what you're manipulating is not the compound you usually think of as air).  You raise one hand and make the air around the assassin impermeable—after all, there's no particular reason its particles should bother to get out of the way.  Its weapon freezes, and the rest of it too.  Back home this would be a cinch, but here the natural world bucks and shifts beneath your grip.\n\t\t\n\t\tIt doesn't know, yet, that it should fear your will.\n\t\t\n\t\tBut it learns fast.\n\t\t\n\t\tGuards sprint toward the assassin, and you allow yourself a moment's spur of victory.\n\t\t\n\t\tThen something strikes you in the back of your knee.  You fall, your focus slips, the assassin regains its footing, the weapon rises again, and—\n\t\t \n\t\t*set sabotage true\n\t\t*goto smith_dies\n\t#\"Get him!\"\n\t\t*set charm %+20\n\t\tYou put all the command you've ever been able to summon, all the personal force and overwhelming need, into those words.  The guards blur forward, fast as a house centipede crossing a concrete floor.\n\t\t\n\t\tBut the assassin needs only raise its arm, bring the weapon to bear, and—\n\t\t*goto smith_dies\n\t#I spring my trap.\n\t\t*set cunning %+20\n\t\tWell, it's not a trap precisely, but it's the best you could do operating on unfamiliar territory with no time to prepare.  You expected this…guy?…to show up again, or else a friend of his, but without a truename or detailed personal descriptions there's only so much you could do.\n\t\t\n\t\tEasier, though, to bind Smith.  With no control over the venue, you wrote the Craft circle on your own skin, before you went to sleep last night.  Took some doing, but you brought the tools along.  A simple gesture, and Smith stands in a sphere of rippling light.  The sphere's a symbol—what it does is invert the vector of any force that crosses its borders.  Within it, Smith is perfectly safe, albeit somewhat cramped.\n\t\t\n\t\tUnless he were to do something stupid, like, say, step outside the sphere.\n\t\t\n\t\tLike he just did.\n\t\t\n\t\tYou dive to push him back in, and—\n\t\t*goto smith_dies\n\t\n*label smith_dies\n*page_break\nZip.\n\nAnother red dot appears, this time in the center of Smith's chest.  Only this one's not made of light.  And it spreads.\n\nHe blinks, looks down, and falls.\n\nYou run to him.  So does K'lint, but you get there first, and you're kneeling by his side when he breathes his last wet breath.  Your hands are red with his blood.  That, at least, keeps its color on this plane.\n\n\"Smith!\"  You shout his name.  You feel his pulse.  But he's gone.\n\n*comment Beat 6: Uh-oh\n*page_break\n\nHis white shirt's gone red, and there's a hole in his tie.  \n\nBut something shines beneath and through the red: a circle broken by the points of a star.  The same emblem on the insurance glyph he showed you last night.\n\nThe blood rolls back into Smith's chest, leaving his shirt white.  You draw back.  You've never seen this before.\n\nSmith's eyes open, and they are black on black, and stars burn within them.  He stands.  Brushes off his jacket.  He's alive.  But he's more, and less, than he was.\n\n*fake_choice\n\t#What\n\t#The\n\t#Fuck?\n\nSmith grins.  His grin has too many teeth.  There are dimensions to him that you've never seen before—actual dimensions, new physical elements orthogonal to all those you can describe.  He stands taller now.  His fingers lose their skin and lengthen into talons.  His hair's black flame.  The world bends and shivers with his laughter.\n\nK'lint needs no prompt to action.  He leaps for Smith, mandibles open, claws unsheathed.\n\nSmith raises his hand, and the movement blurs forward and backward in time at once.  K'lint flies back through the air, slams against the stadium wall, and breaks.  He lies still, spiderwebbed in cracks.\n\n*page_break\n\nYou stagger back, stunned.  Guards leap at Smith, and against these he does not even bother to gesture.  The guards explode.  Showers of crystal and obsidian rain down on the checkerboard stadium floor.\n\nThe stands are a net of screams.  He raises one finger to his lips, and the screams stop.\n\nHe does not seem human any more.\n\n*choice\n\t#\"What the hells are you doing?\"\n\t\t*set charm %+10\n\t\tHe smiles.  \"What does it look like?\"\n\t\t\n\t\t\"You just [i]died[/i].\"\n\t\t\n\t\t\"Don't you understand?\"\n\t\t*goto explanation\n\t#I tackle Smith.\n\t\t*set power %+10\n\t\tYou leap at Smith.  He doesn't need to move.  He simply blurs, and is elsewhere: atop the broken table, behind you, by your side.  You fall in a heap on the tile, and he appears again, his shoes—his feet—beside your face.\n\t\t\n\t\t\"Don't you get it?\"\n\t\t*goto explanation\n\t#I try to bind Smith with the Craft\n\t\t*set craft %+10\n\t\tYour power melts from him.  Grabbing hold of his soul is like trying to strangle water in your hand.\n\t\t\n\t\t\"Don't you get it?\"\n\t\t*goto explanation\n\n*label explanation\n\n*if (cunning > 85) or (craft > 85)\n\tAnd you do.  Late.  Too late.  \"You died.\"\n\t\n\t\"Of course I did.\"\n\t\n\t\"And so the contract's void.  The terms of the agreement.  You died, and returned to life here—that insurance medallion brought you back, because the contract guarantees that our Craft works in their world.  But since the contract's void, you're free now.  You have no rules.  Nothing binding you.\"\n\t*goto all_powerful\n*else\n\t\"Do I need to spell it out for you even now?  They killed me.  I died.  The insurance circle brought me back to life—their contract guaranteed all powers we brought with us into their world would work as in our own.  But now I'm alive after my own death.  The contract is void.  I'm free.  I have no rules.  Nothing binds me.  I am all-powerful.\"\n\t*goto all_powerful\n\n*label all_powerful\n\nHe grins.  \"All-powerful.  I like the sound of that.\"\n*page_break\n\"And for what?  Do you plan to kill them all?  The demons?\"\n\n\"Why would I?  They're excellent workers.\"\n\n\"You can't hold this power long.  Their world itself will split open.  You'll be unmade.\"\n\n\"I'll be gone before then.  All I need is to force this labor contract through.  I have them at my mercy now.  I won't make my predecessor's mistake—deal with them as if they're hu
