<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choice of the Deathless — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "deathless", "title": "Choice of the Deathless", "scenes": {"battle": "*restart", "casinonight": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 2: Casino Night\n\n*temp with_Chen false\n*temp with_Ash false\n*temp ditched_chen false\n*temp flirt_chen false\n*temp booze false\n\n*set sleep_difficulty ((90 - (100-sleep))/5)\n\nKrieg Tower rises like a black needle over the sprawling Shikaw skyline.  To the east stretches the Greatwater, slate gray broken by white chalk-line waves.  Below, and off to the west, broad gridded streets map the earth between buildings the size of city blocks, and beyond these lie older, red brick neighborhoods that never quite recovered from the God Wars.\n\nVarkath Nebuchadnezzar Stone occupies the top twenty floors of Krieg Tower; your new office, your first office ever, is a cubby on floor thirty-five, toward the lower bound of VNS territory.  It's empty but for you and the few personal possessions you're moving in—a single box, piled high with Craftwork books, and on top of them a few teetering personal effects, including a daguerrotype of your graduation.  You look so proud.\n\nYou set the box down, and sag into your chair.  You hear the subtle shift in the box and turn in time to see the picture fall.\n\n*choice\n\t#I catch it with the Craft.\n\t\tThe picture's yours—it has your name on the back.  Easy enough to grab hold of it, and stop its travel through space.\n\t\t\n\t\tThe picture stops in midair.  As you pluck it from your own mental grip, though, you feel a stab of pain in your thumb.  The sudden stop broke the glass, and you've cut your finger open on it.\n\t\t\n\t\t*set Craft %+10\n\t\t*set soul -3\n\t\t*goto Damn\n\t\t\n\t#I catch it with my hands.\n\t\tYou sweep a hand out and grab the picture before it hits the ground.  But you've misjudged your own strength—your thumb breaks the glass, and you feel a sudden stab of pain.\n\t\t\n\t\t*set Power %+10\n\t\t*goto Damn\n\t\t\n\t#Why catch it?  More interesting to fix it with the Craft once it's broken.\n\t\tThe falling picture strikes the side of the desk, and then the carpet.  You kneel beside it.  Cracks spiderweb your beaming face.\n\t\t\n\t\tYou set your hand on the glass, exhale, and set about convincing the glass that it should be one piece.  Not much time has passed since the break, and all these pieces of glass do in fact come from the same source, so the convincing isn't hard.  The cracks squeak as they seal shut.  Light flickers and fades around you as you work.\n\t\t\n\t\tFixed, the glass is weaker than it once was.  But if you don't break it again, you should be fine.  As you set the picture on the desk, though, you notice that you're bleeding.  Must have cut your thumb while fixing the glass.\n\t\t\n\t\t*set Cunning %+10\n\t\t*set soul -10\n\t\t*goto Damn\n\n*label Damn\n\n*fake_choice\n\t#\"Shit.\"\n\t#\"Hells!\"\n\t#\"Godsdammit.\"\n\t#No big deal.  I bandage my thumb and get on with my life.\n*comment endif\n\nYou wrap your thumb in tissue paper to stem the bleeding, which should help.\n\t\nYou hear a knock on the door, and a second later it opens to admit Cassowary Chen, another first-year associate at Varkath Nebuchadnezzar Stone.  She started a week ago, same as you, and for both of you the last seven days have been a solid wall of training.  \n\nShe's borne it well, better than you feel you have.  Like you, Cass wears a dark gray skirt suit; she's intense, five-foot-five or so, dark hair, expressive features, given to sharp broad gestures with her hands while talking.\n\nShe glances down at your thumb with concern.  \"Are you okay, ${name}?\"\n\n*choice\n\t#\"Oh, it's nothing.\"\n\t\t*set power %+10\n\t\tShe looks skeptical.  \"Nothing, huh?  Well.\"\n\t\t*goto Cass_Choice\n\t#\"I thought this place could use a little more color.\"\n\t\t*set charm %+15\n\t\t*set Chen %+20\n\t\tShe laughs.  \"I know just what you mean.  And it feels like blood's the only color they like seeing around here.  Trust me, I looked through the employee handbook.\"\n\t\t*goto Cass_Choice\n\t#\"HR sent a few more forms up for me to sign.\"\n\t\t*set cunning %+10\n\t\t*set honor %-10\n\t\t*set Chen %+10\n\t\tShe looks sympathetic.  \"After all the forms they've had us sign in the last few days, you think they'd give it a rest.  The body only holds so much blood, after all.\"\n\t\t*goto Cass_Choice\n\t#\"No, actually, this hurts a lot.\"\n\t\t*set charm %+15\n\t\t*set Chen %+15\n\t\t\"Oh, poor baby.  You know will make you feel better?\"  She grins.  \"Not being such a wimp.\"\n\t\t\n\t\t\"Gee, thanks.  I'll try that sometime.\"\n\t\t*goto Cass_Choice\n\t#\"What are you doing here?\"\n\t\t\"I don't know.\"  She sets her hands on her hips.  \"Common courtesy?  Us newbies need to stick together?  Basic friendliness?\"\n\t\t*set power %+10\n\t\t*set Chen %-10\n\t\t*goto Cass_Choice\n\t\t\n*label Cass_Choice\n\n\"Anyway,\" she says, \"Pat and I thought we might meet for dinner before this casino night orientation thing.  Pre-game a little.  You want to come?\"\n*choice\n\t#\"I'd love to!\"\n\t\t\"Great!\"  She shoots you a thumbs-up, and scribbles down the address of a bar not far from casino night.  \"We'll meet there at seven, okay?\"  Then she's gone, in a flare of jacket and skirt and clicking heels.\n\t\t\t\n\t\tIf you want to meet her by seven, you'd best get home.  You have some work to do.\n\t\t*set Chen %+15\n\t\t*set with_chen true\n\t\t*Goto Home\n\t#\"You're going to that?  I thought I might skip.  It's just more social, play-nice stuff, right?\"\n\t\t\"Skip?  You realize that everyone's going.  I even hear that Varkath might put in an appearance.  The Man Upstairs himself.  There's trying to build a hardworking, antisocial rep, and then there's just being stupid.\"\n\t\t\n\t\t\"Glad to hear you have such a high opinion of me.\"\n\t\t\n\t\t\"Hey, if the shoe fits.\"  She shrugs.  \"Okay, well.  We'll be meeting at seven, and here's the address.  See you there, or not.\"  Cass looks a bit disappointed, but maybe you're making that up.  You don't know what to make of people, anyway.\n\t\t\n\t\tShe turns to leave.  And speaking of leaving—you really should get home.  Even if you don't want to meet the others for dinner, maybe you should give this casino night a shot, and you have to get ready first.  Not to mention, unpack.\n\t\t*set gunner %+20\n\t\t*set Chen %-10\n\t\t*set with_chen false\n\t\t*goto Home\n\t#\"Pat?  Why not just the two of us?\"\n\t\tChen has refined eyebrow-raising to a high art.  A hint of a smile ghosts across her lips.  \"Why, ${name}, I'm sure I have no idea what you mean.\"\n\t\t\n\t\tMore than a hint of a smile.  You're sure of it.  Or delusional.  That's possible, too.\n\t\t\n\t\tShe passes you the address.  \"Here you go.  See you at seven.\"\n\t\t\t\n\t\tSeven.  Damn.  You'd best get home.  You have work to do.\n\t\t*set flirt_chen true\n\t\t*set with_Chen true\n\t\t*set charm %+10\n\t\t*set Chen %+20\n\t\t*goto Home\n\t#\"Eh.  I'll eat by myself.  Have fun.\"\n\t\tShe blinks.  \"Fine.  Well, enjoy that.  See you at the party.\"\n\t\t\n\t\tAnd she swishes away.  The door drifts shut behind her.\n\t\t\n\t\t*set with_Chen false\n\t\t*set Chen %-15\n\t\t*set gunner %+10\n\t\t*goto Home\n\n*label Home\t\n*page_break\nYou're still living out of boxes, and it would be nice to stop that one of these days.  You have barely enough time to get home, unpack a little, and return—lucky for you that it's still the first week of training.  In a month, once the Work picks up, you doubt you'll ever again see a sunset that's not filtered through glass.  Too many dead men to be raised, gods to be wrestled, laws of reality to be violated.  You know.  The usual life of a ${Craftsperson}.\n\nHome waits, though, for now.\n\nAnd where is \"home,\" anyway?  Rent's higher close to the office, but the closer you are, the shorter the commute—and short commutes mean more sleep, which makes everything in life easier.\n*choice\n\t#As close as I can get to the office.  Damn the expense.\n\t\tDowntown Shikaw is a pricy place, but this job will take enough of your life without you having to sacrifice more of it to a daily commute.  Even if you feel like your landlord is vampiric scum.\n\t\t\n\t\tNot that you have anything against vampires, mind.  Salt of the earth.  Well.  Not literally.\n\t\t\n\t\tYou walk home along downtown's steel canyons, and soon reach Castiel Towers, an Art Deco titan of steel and concrete, sides decorated with aluminum thunderbolts and brass suns.  The lobby's all plush cushion and chrome.  Not bad, not bad at all.\n\t\t\n\t\tThe elevator doesn't even whir as it drags you up to your fourteenth-floor apartment.\n\t\t*set commute \"short\"\n\t\t*set rent 18000\n\t\t*goto Cash\n\t#I tried to compromise between price and convenience.\n\t\tA trolley takes twenty minutes to escape the steel and glass titans of downtown and reach the brownstones and bricks of the Garment District.  Which, so far as you've been able to determine, has nothing whatsoever to do with garments or the textile industry these days.\n\t\t\n\t\tNot for the first time you wonder if you shouldn't have tried to find a job nearer to the place you grew up—where you knew the history, and the territory.  But in this business, you go where the work is.  You were lucky to get a chance at Varkath Nebuchadnezzar; the market's as harsh as it has been in years.\n\t\t*set commute \"medium\"\n\t\t*set rent 12000\n\t\t*goto Cash\n\t#The cheapest digs I can find.  I won't spend much time there anyway.\n\t\tYou have to transfer trollies twice, traveling north, to reach your place—a two-room flat with debatable heat on the top floor of a warehouse-turned-bar.  Fights sometimes break out late at night in the street.  When you gave HR your address, the guy filling out the forms shot you a very skeptical look.  But what can you do?  You have student loans, and you want out from under them as soon as possible.\n\t\t\n\t\tThe door sticks when you try to open it, but with a good kick or four it gives.  Think of it as an extra security feature.  You stagger inside, close the door, and lock the three locks.\n\t\t*set commute \"long\"\n\t\t*set rent 6000\n\t\t*goto Cash\n\n*label Cash\n*page_break\t\t\nSpeaking of rent, and commutes, and similar topics, what kind of life are you living exactly?  By which I mean: when you left the Hidden Schools to embark on this path of high thaumaturgy, you were carrying about ${debt} thaums in debt.  Currently, your soul's only worth about ${soul}. \n\nYour salary's 160,000 thaums—let's say 100,000 after all your various fees and obligations to the city of Shikaw are handled.  Debt, obviously, is debt: the Hidden Schools lay claim to your soul and all its future products.  As long as you carry this debt, you'll never be free.  Mad necromancers can and will hunt you to the ends of the earth.\n\nSo, that said, how much of your salary—after you take care of rent and living expenses—goes toward debt?  And how much of it is yours to spend?  \n*choice\n\t#I want that debt gone.  I'll eat instant noodles for five years if I must.\n\t\t*set debt_repayment 10\n\t\t*set soul_funds \"low\"\n\t\t*goto Moving\n\t#There's no sense making myself miserable.  I'll balance debt-repayment with my own wants and needs.\n\t\t*set debt_repayment 5\n\t\t*set soul_funds \"med\"\n\t\t*goto Moving\n\t#School was hard.  I want to live a little.  I'll have plenty of time to pay down debt.\n\t\t*set debt_repayment 1\n\t\t*set soul_funds \"high\"\n\t\t*goto Moving\n\n*label Moving\n\nYour apartment is a mess of boxes.  Piles by the door, in the hall, in the center of the room.  You have a bed, and pillows, but that's the limit.  Everything else is cardboard and packing tape.\n\nYou glance ruefully at your watch, set down your briefcase, and start unpacking.  At this rate, you might have time to do something other than unpack and go to firm functions sometime around two months from now.  Though that's an optimistic estimate.\n\nYou manifest a knife out of your own soulstuff and start tearing open boxes.  You'd have used something more prosaic, but your knives and scissors are, of course, packed.  Dammit.\n\nYou haven't looked at your watch in a while when you hear a knock on the door.\n\n*page_break\n\nAnswering it—chain in place, of course—you discover, to your surprise, Ashleigh Wakefield.\n\nYou haven't seen Wakefield since graduation.  You sort of hoped never to see ${Ash_pro_obj} again.  Ash Wakefield of the Southern Wakefields, the scion of a high family, and everyone in the Hidden Schools knew it.  Affluent, ${Ash_hair}, brilliant, and sculpted out of marble.  Metaphorically.  Though you never got close enough to check.\n\nKelethres Albrecht & Ao—one of the world's most prestigious Craft firms—hired Wakefield straight out of the Hidden Schools as an associate in their Shikaw office, and ${Ash_pro} made certain everyone knew.  Perhaps ${Ash_pro} was just excited.  That'd be a charitable way to look at it.\n\n\"${Surname},\" ${Ash_pro} says.  \"It's been quite a while.  Since we're both going to this party, I decided I might as well visit another lonely and bereft graduate in this dismal city.\"\n\n*if commute = \"long\"\n\tAshleigh glances up and down the street.  Not far away, you hear a sound of shattering glass.\n\t\n\t\"Would you please let me in before some local unfortunate decides to slit my throat?\"\n\n*page_break\n\nIt doesn't seem right to keep Wakefield waiting outside, so you undo the lock on the door, step aside, and let ${Ash_pro_obj} in.  ${Ash_pro_cap} glances around the piles of boxes without betraying the slightest hint of disdain.  Wakefield [i]conveys[/i] disdain quite well enough without having to betray it.\n\n*choice\n\t#\"How did you get this address?\"\n\t\t*set cunning %+10\n\t\t\"I prevailed,\" ${Ash_pro} says, \"upon our alumni office.  Said I wanted to help grow the Hidden Schools community in Shikaw.\"\n\t\t\n\t\t\"Do you?\"\n\t\t\n\t\t\"We'll see.\"\n\t\t*page_break\n\t\t*goto Ash_Choice\n\t#\"See anything you like?\"\n\t\t*set charm %+10\n\t\t*set Wakefield %+10\n\t\t\"Unlikely.  Though there's always a chance for surprise.\"  Wakefield shrugs.\n\t\t\n\t\t*goto Ash_Choice\n\t#\"I'm a bit busy, if you don't mind.\"\n\t\t*temp aristo_tag \"\"\n\t\t*if ( background = \"aristo\")\n\t\t\t*set aristo_tag \"Ashleigh grins.  \\\"Working for a living.  If only the venerable forebears could see us now, eh?\\\"\"\n\t\t\"We're all busy, these days.  And trust me, you haven't seen the half of it.\"  ${aristo_tag}\n\t\t*set Wakefield %+10\n\t\t*goto Ash_Choice\n\t#\"I knew I should have shut the door in your face.\"\n\t\t\"Always too little, too late.\"\n\t\t\n\t\t\"I could make you leave.\"\n\t\t\n\t\t\"But why?\"\n\t\t\n\t\t*set power %+10\n\t\t*page_break\n\t\t*goto Ash_Choice\n\n*label Ash_Choice\t\t\n\nWakefield turns on ${Ash_pro_pos} heel to face you, and spreads ${Ash_pro_pos} arms wide.  \"I came to invite you to dinner.  I have been forced to attend this particular brand of inter-firm madness, and drinks and a vague excuse for intelligent conversation might provide an appropriate stimulant for the early evening.\"\n\n*choice\n\t*if (with_chen) #\"I have plans.\"\n\t\t\"Change them.\"\n\t\t*choice\n\t\t\t#\"Fine.  Even you're preferable to networking.\"\n\t\t\t\t*set with_Ash true\n\t\t\t\t*set Wakefield %+20\n\t\t\t\t*set honor %-10\n\t\t\t\t*set chen %-10\n\t\t\t\t*set ditched_chen true\n\t\t\t\t\"Lovely.  Shall we?\"\n\t\t\t\t*goto Ash_Dinner\n\t\t\t#\"What part of 'No' don't you understand?\"\n\t\t\t\t\"Well.\"  Wakefield shrugs.  \"Your loss.  I'll see you at this damn party.  And steer clear of me at the card table, if you expect to walk away with your soul intact.\"\n\t\t\t\t\n\t\t\t\t${Ash_pro_cap} has a catlike way of being kicked out, as if leaving was ${Ash_pro_pos} idea all along.\n\t\t\t\t*goto Assoc_Dinner\n\t*if (with_chen) #\"I'm meeting some friends for dinner.  You're welcome to come.\"\n\t\t\"Flattering,\" Wakefield says.  \"Much as I would relish being immersed in your social pool,\" and from ${Ash_pro_pos} tone of voice you can tell ${Ash_pro} means the shallow kind with cattails around the edge, a vague green scum on top, and an unpleasant stench hanging about, \"I shall keep my own company.  Another time, perhaps.\"\n\t\t\n\t\t\"Another time,\" you say, and escort ${Ash_pro_obj} to the door.\n\t\t*set Wakefield %+20\n\t\t*goto Assoc_Dinner\n\t#\"Against my better judgment, let's.\"\n\t\t*set with_Ash true\n\t\t*if (with_Chen)\n\t\t\t*set honor %-10\n\t\t\t*set chen %-10\n\t\t\t*set ditched_chen true\n\t\t*set Wakefield %+20\n\t\t\"Lovely.  Shall we?\"\n\t\t*goto Ash_Dinner\n\t#\"So I can be a warmup bout over drinks?  No thanks.\"\n\t\t\"What makes you think you'd even be a warmup?\"  Ash shrugs.  \"Well, your loss.  Hail, and farewell.  Not that I expect you to.\"\n\t\t\n\t\t\"Go jump in a lake and die,\" is probably what you should have said, but Wakefield's already gone—out the door, and into the night.\n\t\t\n\t\tStill takes too long for you to calm down enough to prepare for dinner, though.  You end up tying your tie in the cab over.\n\t\t*if (with_Chen)\n\t\t\t*goto Assoc_Dinner\n\t\t*else\n\t\t\t*goto Casino\n\n*label Ash_Dinner\n*achieve wakefield\n\nWakefield's choice in restaurants is as rarified as the rest of ${ash_pro_obj}: an Iskari thaumaturgical gastro place, where they present very small servings of things man was not meant to eat on very large and artfully shaped plates. \n\n*if (background = \"aristo\")\n\tIt's not the finest restaurant you've seen in your life, but you stand a bit straighter as you enter.  The maître d's stare reminds you of your grandfather's, that same peculiar mix of authority and casual disdain.  Well, screw him.\n*if (background = \"comfortable\")\n\tThe walk to the table feels longer than it is: the whole way you're rising through class strata, and adding up the bill in your head.  What kind of a person chooses a place like this for a casual dinner?\n*if (background = \"poor\") or (background = \"beggar\")\n\tYou feel overdressed and underdressed at once.  People have walked beyond the edge of the world, you know, in the vacuum beyond the atmosphere's envelope, and they needed special clothes to keep alive, to keep from exploding into space.  Your suit feels like that—like it's all that allows you to live here.  And everyone else seems to know it, too, even Ash, though ${Ash_pro} doesn't say anything.\n\n*page_break\n\nYou both order—Ash gets a prix fixe built around meats that have somehow been transformed into vegetables.  You order the chef's choice, after deciding that your own instincts won't serve you well in this place.\n\nAsh keeps the conversation light, cutting, and erudite—disingenuous philosophy, fashion criticism, and vicious parodies of professors ${Ash_pro} hated back at school.\n\nFinally, after ${Ash_pro_pos} steak salad arrives—leaves rare and bloody—and your soup noodles—some slight membrane containing the still-liquid soup—${Ash_pro} asks you the question you think ${Ash_pro} has been working toward all night.\n\n\"So, ${surname}.  Tell me.  What do you hope to accomplish at Varkath Nebuchadnezzar?\"\n\n*choice\n\t#\"I want to make partner.  I want to succeed.\"\n\t\t*set power %+10\n\t\t*set gunner %+10\n\t\t*set Wakefield %+10\n\t\t\"It's a hard road, you know.  I do sympathize with the ambition.  Good luck getting there at Varkath Nebuchadnezzar, is all.\"\n\t\t\n\t\t\"What do you mean?\"\n\t\t\n\t\t\"All I'm saying is, if you want to climb a mountain, be sure you're climbing the right mountain.\"\n\t\t\n\t\t*goto Ash_Chat\n\t#\"I want to give something back to the world.\"\n\t\t*set charm %+10\n\t\t*set gunner %-10\n\t\t*set Wakefield %-10\n\t\t\"Give back to the world?\"  In the small, quiet restaurant, ${Ash_pro_pos} laughter sparks like shards of glass falling through a sunbeam.\n\t\t\n\t\tGlass, falling, beyond the edge of reason, turning in the mind.  You shake your head, banishing the edge of uneasy memory.\n\t\t*page_break\n\t\tAsh is still talking: \"…could have anything you want, and here you are, babbling about giving something back to a world you don't owe anything.  You've earned your place here.  And do you even think you'd be happy outside of private practice?  Away from all this?\"\n\t\t\n\t\t\"Away from the pleasure of your company, you mean?\"  You smirk. \n\t\t*goto Ash_Chat\n\t#\"Does it matter?  I came here because I want challenging, complex work.  That's all.\"\n\t\t*set cunning %+10\n\t\t*set Wakefield %-10\n\t\t\"That's exactly the attitude I was afraid you might have.  You do realize that devoting your brain to any problem they give you will lead you exactly nowhere but where they want you to go.\"\n\t\t\n\t\t\"So you're saying if I work hard I'll end up doing my job well.  That doesn't sound bad.\"\n\t\t\n\t\t\"Follow that road, and you'll just be doing a job.  That's what I'm afraid of.\"\n\t\t*goto Ash_Chat\n\t#\"You know.  The usual.  Amass overwhelming power.  Cackle over the corpses of my enemies.\"\n\t\t*set Craft %+10\n\t\t*set gunner %+10\n\t\t*set Wakefield %-10\n\t\t\"And that's the future you see for yourself?  Same old boring Deathless King line of work?  Transformed to a skeleton by sixty, only oh, maybe you'll set yourself with jewels and a few iron claws.  So tiresome.\"\n\t\t\n\t\t\"People don't argue with power.\"\n\t\t\n\t\t\"Of course they do.  Everyone does.  They just don't argue where power can hear, until it's too late.\"\n\t\t*goto Ash_Chat\n\n*label Ash_Chat\n\n\"Look,\" you say, \"what's your problem?  Would any answer satisfy you here?\"\n\n\"I don't know,\" ${Ash_pro} says, you think honestly.  \"I'm always interested in watching how others resolve their problems.  It's like spying on ants with a magnifying glass.  But when, or if, you do come around to a sensible way of looking at the world, we might be able to find a place for you at Kelethres Albrecht & Ao.\"\n\n*fake_choice\n\t#\"I wouldn't like having to slow down enough to work with you.\"\n\t#\"Ash, I don't think I could manage there, what with the rarified stench and all.\"\n\t#\"It's cute that you disguise your own insecurity as concern for me.\"\n\t#\"I'd rather the two of us be separated by as many walls as possible.\"\n\t#\"You invite me out, insult me, and offer me a job.  Are you crazy?\"\n\t\n*label Ash_finish\n\"Well.  Perhaps.\"  And ${Ash_pro} calls for the check.  \"Shall we go see what sort of games these mortals play?\"\n\nWhat a relief to reach the taxi.  You pretend to be very interested in the view, to avoid the risk of further conversation on the road over.\n\n*set soul -125\n*goto Casino\n\n*label Assoc_Dinner\n*page_break\nYou arrive at the Horseshoe a few minutes after seven, and shoulder your way through the barside crowd past the hostess's stand into the dining area.  Fortunately, you see Cass before the hostess catches up with you.  She half-stands, waves, and smiles. \n\nPat turns too, and smiles even broader, but he doesn't stand, doesn't wave.  He's a big guy, a slow-mover, but smart.  Older than you and Cass, too, old for an associate.  Dignified: short curly hair, dark skin, Iskari cuffs on his pressed shirts.  He has a family, even, from what you've heard.  A wife at home, and a kid on the way.\n\nThe waitress swings by.  \"What'll you have?\"\n\n*choice\n\t#Beer.\n\t\t*set booze true\n\t\t*goto get_right_on_that\n\t#Wine.\n\t\t*set booze true\n\t\t*goto get_right_on_that\n\t#Whiskey, straight up.\n\t\t*set booze true\n\t\t*goto get_right_on_that\n\t#The manliest cocktail your bartender can man up to make.\n\t\t*set booze true\n\t\t*goto get_right_on_that\n\t#An appletini.\n\t\t*set booze true\n\t\t*goto get_right_on_that\n\t#Tea.\n\t\t*set booze false\n\t\t*goto get_right_on_that\n\n*label get_right_on_that\n\"I'll get right on that.\"\n\nYou drink, and eat, and talk, and before long the conversation turns, as it always does, to work.  This time, the subject is goals, and specifically Cass Chen's lack of them.\n\n\"I don't know,\" she says.  \"Working for the firm develops skills, and connections, and all that.  But in the end, so much of what we do is abstract thaumaturgics.  It doesn't connect to people.  To human lives.  What does it matter if a Concern recognizes an extra percent of profit?\"\n\n\"To the many who work for that Concern,\" Pat Ngabe replies, \"an extra percent of profit, or a fraction of it, might matter a great deal.  And regardless, we must think of our own lives and careers before we ponder abstract injustice.  It is enough, I think, to care for our families, and for those close to us.\"\n\n\"When the world's suffering?\"  Chen shakes her head.  \"What do you think, ${name}?  What do you want out of your work with the firm?\"\n\n*choice\n\t#\"I want to make partner.\"\n\t\tShe doesn't seem satisfied.  \"But why do you want to make partner?\"\n\t\t\n\t\t\"It's an end in itself, isn't it?  Security.  Power.  Influence.\"\n\t\t\n\t\t\"You think a partner has influence?\"  She frowns.  \"I'm not so sure.  My mother's a partner in Kelethres Albrecht, and I think she feels a lot more like the puppet than like the puppeteer.\"\n\t\t\n\t\t\"That,\" Ngabe says, \"may be the source of our disagreement.  You stand in the position I wish for my children to reach: a level of comfort and security in the world which enables you to choose your position within it.\"\n\t\t*set Ngabe %+20\n\t\t*set power %+15\n\t\t*set gunner %+15\n\t\t*set Chen %-10\n\t\t*goto Assoc_Dinner_2\n\t#\"I'd like to give something back to the world.  If I can.\"\n\t\t\"But what,\" Pat says, \"can you give?  Such a statement strikes me as dangerously vague.  Many of the early missionary forces into the Gleb, you know, believed they came to spread the virtues of their various gods.  They brought great destruction on the peoples they found there.  My people.\"\n\t\t\n\t\t\"I don't mean conquest,\" you say.  \"There's war in the world.  Poverty.  Starvation.  And we have power—to call water from a clear sky, to bring the dead to life, to ride the lightning and quake the earth.  There must be something we can do.  Something real.\"\n\t\t\n\t\t\"That's just what I mean!\"  Cass almost spills her beer, but you catch it.  There's a light in her black eyes.  \"We could do something.  We could change the world!\"\n\t\t\n\t\t\"Change it,\" Pat says, \"into what?\"\n\t\t*set Ngabe %-10\n\t\t*set Chen %+20\n\t\t*goto Assoc_Dinner_2\n\t#\"As long as they keep giving me interesting work, I'll do it.\"\n\t\t\"But you must have some objective,\" Pat says.  \"Otherwise you are simply a tool in the hands of those greater than yourself.\"\n\t\t\n\t\t\"Right now,\" you say, \"my objective is to learn.  Plenty of time for all that other stuff later.\"\n\t\t\n\t\tChen frowns.  \"That other stuff is the rest of your life.\"\n\t\t\n\t\t\"Like I said.  Plenty of time.  And if I learn enough, my life could last forever.\"\n\t\t\n\t\t*set cunning %+15\n\t\t*set Ngabe %+10\n\t\t*set Chen %+15\n\t\t*goto Assoc_Dinner_2\n\t#\"I don't know about you, but I always wanted to amass infinite power and laugh over the corpses of my enemies.\"\n\t\t\"A traditionalist,\" says Pat, with a wide smile.\n\t\t\n\t\t\"I'm not joking,\" Chen says.\n\t\t\n\t\t\"Neither am I.\"  You try to keep a straight face, but can't manage for long.\n\t\t\n\t\tShe wads a napkin up and throws it at you.\n\t\t\n\t\t*set Craft %+15\n\t\t*set Ngabe %+10\n\t\t*goto Assoc_Dinner_2\n\n*label Assoc_Dinner_2\n*page_break\n\"I,\" Pat says, \"will make partner.  Once I have established a place for myself and my family in this city, then my children can concern themselves with personal gratification, not to mention this nebulous 'giving something back' with which Cassowary seems so concerned.\"\n\n\"Now you're just being mean,\" Cass says.  \"And it's not like I don't want to succeed.  I just think there's more we're supposed to do here than try to get as big as we can until we explode.\"\n\nPat raises his beer in a salute.  \"Bigger is better.\"\n\n\"You know what I mean,\" Cass says.\n\n\"Not really.\"\n\nThe conversation spins on for a while, but time's wasting and you're all more than fashionably late already.  You get the check, and head out to Casino Night!\n\n*set soul -50\n*goto Casino\n\n*label Casino\n*page_break\nVarkath Nebuchadnezzar, Kelethres Albrecht & Ao, and a few other firms have rented out a swanky waterfront restaurant.  A chandelier dangles from thin gold chains over a room swarming with Craftsmen and Craftswomen clad in pinstripes and slick silk.  Cocktail glasses clink.  Dice thud and roll over green felt tables.  Everywhere you hear the flushed-bird sound of shuffled cards.  \n\nOutside and overhead, a few stars have survived the onslaught of the city lights.  They glitter over the black waters of the lake. \n\n*if (with_ash)\n\tWakefield slaps you on the shoulder, and says: \"Well, ${surname}, that was an excellent dinner.  Now if you will excuse me, I'm off to lose myself in a game or two of chance.  Feel free to catch up, if you so desire.\"\n\n*page_break\n\nYou wander the floor for a moment to take everything in, and score a drink from the bar.  When you turn back, you take inventory of the room.  The ever-practical Pat Ngabe is playing blackjack—the best odds on the floor given perfect play.  Cass Chen flits from conversation to conversation; she's on her second cocktail of the night, not counting her dinner's drinks.  This may not end well for her.\n\n*if not(with_ash)\n\tAshleigh Wakefield should be milling with the rest of the KAA crowd, standoffish and superior as always, but ${Ash_pro}'s not.  You find ${Ash_pro_obj} at one of the poker tables, seated next to…  Oh.  Gods.\n*if with_ash\n\tYou turn, at last, to the poker tables—Wakefield's already dealt in, seated next to…  Oh.  Gods.\n*comment endif\n\nThat skeleton in green, with the hands of cold iron and the glyphs burning on the pate of his bared skull, and the mask of cured leather—that's Golan Varkath.  As in, the named partner Golan Varkath.  You've seen his portrait, but you've never seen him in person before.\n\n*temp first_choice true\n*temp from_menu false\n*label Party_Choice\nSo, what do you do next?\n\n*choice\n\t*hide_reuse #Mill around for a while.  Talk to people.\n\t\t*goto Mill\n\t*hide_reuse #Try to network with senior partners.\n\t\t*goto Partners\n\t*hide_reuse #I want to win all the souls I can.\n\t\t*goto Game_1\n\t*hide_reuse #Find a true test of my mental fortitude.\n\t\t*goto Fortitude\n\t*hide_reuse *if(ditched_chen) #I find Cass Chen and apologize for ditching her.\n\t\t*set from_menu true\n\t\t*goto Apologize\n\t#I head straight for the poker table.\n\t\t*goto Game_2 \n\n*label Apologize\n\n*if (from_menu)\n\tYou head straight for Cass.  \"Excuse me.\"\n\t\n\tShe turns around, and looks confused.  \"Hey!  We missed you at dinner.  What happened?\"\n*if not(from_menu)\n\tYou start toward the crowd, but before you've made much headway your path's obstructed by Cass Chen.  \"Hey!\"  She looks confused.  \"We missed you at dinner.\"\n*comment endif\n\n*choice\n\t#\"I'm so sorry.\"\n\t\tShe shrugs.  \"That's okay.  Don't worry about it.  You'll just have to make it up to me later.\"\n\t\t\n\t\t\"Name a date.\"\n\t\t\n\t\tShe grins.  \"You're oh for one on dates.  But we'll see.\"\n\t\t*if first_choice\n\t\t\t*set chen %+10\n\t\t\t*set charm %+10\n\t\t\t*set first_choice false\n\t\t\t*set ditched_chen false\n\t\t\t*goto Party_Choice\n\t\t*elseif from_menu\n\t\t\t*set chen %+5\n\t\t\t*set charm %+5\n\t\t\t*set ditched_chen false\n\t\t\t*goto Party_Choice\n\t\t*else\n\t\t\t*set ditched_chen false\n\t\t\t*goto Mill\n\t#\"I haven't seen Wakefield in months, and ${Ash_pro} showed up out of nowhere, and—\"\n\t\tShe raises an eyebrow.  \"You're missing a bit.\"\n\t\t\n\t\tYou think for a moment.  \"That'd be the part where I say I'm sorry, right?\"\n\t\t\n\t\t\"Bingo.\"\n\t\t\n\t\t\"I am,\" you say.  \"Sorry, I mean.\"\n\t\t\n\t\t\"I'll take that under consideration.\"\n\t\t\n\t\t\"What does that mean?\"\n\t\t\n\t\t\"It means I'll take it under consideration.  Now, if you don't mind, I have a party to, um.  Party.\"  She grins, and swishes away beyond your social sphere.\n\t\t*if first_choice\n\t\t\t*set ditched_chen false\n\t\t\t*set chen %+5\n\t\t\t*set charm %+5\n\t\t\t*set first_choice false\n\t\t\t*goto Party_Choice\n\t\t*elseif from_menu\n\t\t\t*set ditched_chen false\n\t\t\t*set charm %+5\n\t\t\t*goto Party_Choice\n\t\t*else\n\t\t\t*set ditched_chen false\n\t\t\t*set chen %-5\n\t\t\t*set charm %-5\n\t\t\t*goto Mill\n\t#\"Can I make it up to you?\"\n\t\tShe smiles slantwise at you.  \"Just launching into expiations without an I'm sorry or an attempt at a story?\"\n\t\t\n\t\t\"I'm sorry,\" you say, automatically.\n\t\t\n\t\t\"Well, sure, now that I say you are.  It's okay, don't worry about it.  I'm sure you felt you had to do whatever you did.  No worries.  Let's have a good time at the party, okay?\"\n\t\t\n\t\t\"Okay.\"\n\t\t\n\t\tShe grins, and swishes away beyond your social sphere.\n\t\t*if first_choice\n\t\t\t*set ditched_chen false\n\t\t\t*set charm %+5\n\t\t\t*set first_choice false\n\t\t\t*goto Party_Choice\n\t\t*elseif from_menu\n\t\t\t*set chen %-5\n\t\t\t*set charm %-5\n\t\t\t*goto Party_Choice\n\t\t*else\n\t\t\t*set ditched_chen false\n\t\t\t*set chen %-10\n\t\t\t*set charm %-5\n\t\t\t*goto Mill\n\n*label Mill\n*if (first_choice)\n\t*set charm %+20\n*set first_choice false\n*temp chen_dropin \"\"\n*if not(ditched_chen)\n\t*set chen_dropin \"You catch up with Cass briefly, before she whisks off on her own version of the social dance.  \"\n\t*set Chen %+15\n*if ditched_chen\n\t*goto Apologize\n\nYou wander for the duration of a drink, chatting with coworkers and advisors.  You exchange a few pleasant words with Vega, a senior associate on the fast track to promotion or destruction, between throws of craps.  ${chen_dropin}Before long you can sense the beating heart of the party, under the decor and elegance.  There are real people here.  Which is nice.\n\n*set gunner %-10\n*set charm %+10\n*set Vega %+15\n*goto Party_Choice\n\n*label Partners\n\nThere are plenty of impressive people at this party, and you do manage to exchange a few words with some of them, but most are talking with other impressive people.  Most of the higher-up guests seem more interested in mingling than gaming.  Perhaps this entire casino night concept was a ploy to draw Varkath out of his sanctum for once.\n\nPat notices you orbiting a conversation in which Angelica Nebuchadnezzar is arguing about the proper preconditions for the resurrection of a dead god with a parter from KAA you don't recognize.  Pat raises a glass to you in salute—recognizing a fellow traveler.  You salute back, notice your drink's empty, and retreat to the bar.\n\n*if (first_choice)\n\t*set power %+20\n*set gunner %+10\n*set Ngabe %+15\n*set power %+10\n*set first_choice false\n*goto Party_Choice\n\n*label Fortitude\n\nRoulette, craps, several variations of blackjack, Tarocco, sparrows, and of course poker.  Let's rule out roulette first, as a game of pure chance with odds in the house's favor.  It's only here because people like the sound of the wheel.  Craps, arcane betting aside, is less a game of the mind than a game of the dice.  Blackjack has structure, and one can win, but over a long period of time, and then only if one is quite careful.  \n\nTarocco—well, you don't have that kind of time.  You never learned sparrows, though from what you're given to understand it's something like gin, only with tiles.  Which brings you back to poker.  And Varkath.  And Wakefield.\n\nOh well.  Stealing their souls probably won't get you in too much trouble at work.\n\nProbably.\n\n*if (first_choice)\n\t*set cunning %+20\n*set cunning %+10\n*set first_choice false\n\n*choice\n\t#Go straight to the poker table.\n\t\t*goto Game_2\n\t#I'm not done with the rest of the party.\n\t\t*goto Party_Choice\n\n*label Game_1\n\nYou close your eyes and scan the room.  In the dark beyond your eyelids, the games appear as glowing webs woven by drunk spiders and blown by a strong wind: the transfer of soul to soul from casino to players and from one player to the next.  Webs of transactions, bound by the rules of the game—gambling's like a smaller-scale version of the Craft.  No wonder so many in your line of work are drawn to it, though Craftsmen and Craftswomen aren't known for their general attraction to risk.\n\nThe many lesser games pale when set beside the poker table where Varkath plays.  It folds and collapses upon itself, erupting into the darkness of your mind.\n\n*if (first_choice)\n\t*set Craft %+20\n*set Craft %+10\n*set first_choice false\n\n*choice\n\t#That's it.  That's the one I want.\n\t\t*goto Game_2\n\t#Later.  Let me see more of the party first.\n\t\t*goto Party_Choice\n\n*label Game_2\n\nYou join Varkath, Wakefield, and a few other monsters at the table.  The goddess of the game hovers above the felt, shifting and glorious, calling each player in turn to his or her destruction.\n\nNo sense waiting.  You sit down.\n\nWakefield looks up from the cards.  \"Decided to button up your trousers and play in the big leagues?\"\n\n*fake_choice\n\t#\"Shame you can't play as good a game as you talk.\"\n\t#\"I wanted to give you a head start.  And a chance.\"\n\t#To the rest of the table: \"Has ${Ash_pro} been this bad all night?\"\n\t#I say nothing and let the dealer deal me in.\n\nVarkath says nothing; neither does anyone else.  The big blind this deal is a Craftswoman who's replaced her skin with scales, and the little blind's Varkath.  You glance at your cards when the bet comes around to you, and raise.\n\nWhat's your plan for the evening?\n\n*temp game_result 0\n\n*choice\n\t#I want to win.  Why else would I be here?\n\t\t*goto Test_Power\n\t#I'm here to talk, more than to play.\n\t\t*goto Test_Charm\n\t#I want to get Wakefield.  I don't care about the rest of the game.\n\t\t*goto Test_Cunning\n\t#I want to beat Varkath.\n\t\t*goto Test_Varkath\n\t#I want to taste as many souls as I can, and see what I can learn.\n\t\t*goto Test_Craft\n\t\n*label Test_Cunning\n\nThe game continues.  You you watch for your opening, playing slow and tight and watching Wakefield until you think you have ${Ash_pro_obj} figured out.  You chase a few hands that don't make sense, and you think ${Ash_pro} gets the point.\n\nSo, the next time Wakefield pulls a good hand, you make the same outsized raise you've made three times previously when chasing a flush.  Even though you have three of a kind.\n\nYou and Wakefield raise one another back around the board.  Others drop out.  The goddess of the game swells, proud and hungry, over the table.  Your soul joins with Wakefield's inside the goddess; you live outside yourself.\n\nAnd when the time comes, Wakefield calls.\n\n*page_break\n\nYou flip your cards over, and show the three of a kind.\n\n*if (cunning >= 40)\n\tWakefield blinks, and ${Ash_pro_pos} face goes slack.  ${Ash_pro_cap} slides ${Ash_pro_pos} cards into the center of the table, face down.\n\t\n\t\"You're too clever by half,\" ${Ash_pro} says.\n\t\n\t\"That's the idea,\" you say, before the goddess smiles on you and you lose yourself in a wash of soul.\n\t\n\t*set soul +100\n\t*set cunning %+20\n\t*page_break\n\t\n\tThat's the play of the night, for you.  Unfortunately, to set Wakefield up, you had to lose almost as much soul as you won.  You're a little ahead for the evening, but when the game breaks and the goddess dissolves back into the players from whose souls she was formed, you find yourself about even.\n\t*set game_result 1\n\t*goto Aftermath \n*if (cunning \u003c 40)\n\tWakefield flips over ${Ash_pro_pos} cards, though, and shows the straight.\n\t\n\t\"Better luck next time, chum,\" ${Ash_pro} says, as your soul flows out into ${Ash_pro_obj}.  Light and life leaves the world, and the music from the swing band on stage is nothing more than a vibration in the air governed by mathematical formulae and physical law.\n\t\n\t*set soul -400\n\t*set game_result 2\n\t*page_break\t\n\t*goto Lose\n\n*label Test_Varkath\n\nThe game continues and you wait for your opening, playing slow and tight and watching Varkath's slick leather mask and clawed iron hands until you think you have the senior Craftsman figured out.  Skeletons have fewer tells, is all.\n\nSo, the next time he pulls a good hand, you make the same outsize raise you've made three times before when chasing a flush.  Even though you have three of a kind.\n\nVarkath does not seem to react, but he raises.  Others drop out.  The goddess of the game swells, proud and hungry, over the table.  Your soul joins with the partner's within her, and you feel him, cold and sharp, a will of iron; you live outside yourself.\n\n*page_break\n\nAnd then, he knows.  You don't know how he knows, but the glass eyes of his leather mask turn toward you, and one iron claw scrapes along the back of his cards and dammit but you've been made.  His mask shouldn't be able to move, but its scrawled-on lips seem to smile.\n\nWhat do you do?\n\n*choice\n\t#I've come this far.  Let's push it through.  Call.\n\t\t*if (cunning > 50)\n\t\t\tYou call.  He slides a claw beneath his cards and turns them over, and you have him beat.\n\t\t\t\n\t\t\tYou do your best not to smile as you feel his soul slide from the goddess into you.  It's not hard.  He's cold.\n\t\t\t*set game_result 1\n\t\t\t*set cunning %+20\n\t\t\t*set soul +200\n\t\t\t*set beat_varkath true\n\t\t\t*achieve poker\n\t\t\t*goto Aftermath\n\t\t*else\n\t\t\tYou call.  He slides a claw beneath his cards and turns them over, and—\n\t\t\t\n\t\t\tWhat.\n\t\t\t\n\t\t\tWhere did that straight come from?\n\t\t\t\n\t\t\tAnd then the world grays out.\n\t\t\t*page_break\n\t\t\t*set soul -600\n\t\t\t*set game_result 2\n\t\t\t*goto Lose\n\t#He knows I have him.  That was the plan.  Fold.\n\t\tYou muck your cards into the center of the table, face down.  Varkath cocks his head to one side, briefly confused.  Then your soul seeps from you, and the world goes gray.\n\t\t*set game_result 6\n\t\t*set beat_varkath true\n\t\t*set soul -400\n\t\t*goto Lose\n\n*label Test_Power\n\nYou play fiercely, viciously.  You lean into the whirlwind of the goddess, and each time you raise, you feel a little closer to the edge.\n\n*if (power > 40)\n\tIt works.  You chase good players off hands that should have been theirs.  The few times you get called out, you have the cards to back it up.  All in all, this is a good night.\n\t\n\t*set soul +200\n\t*set power %+20\n\t*set beat_varkath true\n\t*set game_result 3\n\t*goto Aftermath\n\n*if (power \u003c=40)\n\tAnd, well, that goes down like a lead balloon.  Once you think you have Varkath on the hook, but it turns out he slow-played you.  There's a particular kind of embarrassment when someone without eyes beats you in a card game, but that's rapidly wiped away by the graying out of the world as your soul is lost.\n\t*set soul -100\n\t*set game_result 2\n\t*goto Lose\n\n*label Test_Craft\n\nHere's the thing about playing poker: every time you bet, a portion of your soul flows into the goddess in the center.  It doesn't leave until you fold, or until you lose.  Which means that, if you're careful, and you go in a lot, you might be able to feel the contours of the other players' souls.  Who knows what you might be able to learn?\n\nSo you throw yourself into the game, not because you want to win, but because you want to know.\n\n*page_break \n\n*if (Craft > 40)\n\tAnd you learn.  Oh, my.  You learn.  Impressions at first, a wash of emotion.  But over time, you can suss out the cold edges of Varkath's soul; Wakefield's, hot and swift like an eel in warm water; the reptile-woman's, massive and grinding like toothed gears.\n\t\n\tOver the course of the evening you dance around their souls, pulling images from them, and once, even, from the edge of Varkath's dreams, you feel what it's like for a god to die beneath your hands.\n\t\n\tMaybe you could have lived without knowing.\n\t\n\t*page_break\n\t\n\tYou don't win.  You lose quite a bit, in fact.  But you [i]learn[/i].\n\t*set craft_game_won true\n\t*set beat_varkath true\n\t*set craft %+25\n\t*set soul -200\n\t*set game_result 4\n\t*goto Aftermath\n\t\n*if (Craft \u003c= 40)\n\tBut what is there to know?  The pot's an angry roil of soulstuff and ambition, conflicting dreams and deadly will.  You try to mix yourself with their minds, but how, and why?  You're torn and tossed on the tempest of your fellow players' minds, and in the end you're drawn too deep.  You bite on a bad play, and then, the world goes gray.\n\t*set soul -400\n\t*set game_result 2\n\t*goto Lose\n\n*label Test_Charm\n\nYou make small talk.  You play, sure, but you don't take many risks, nor do you try anything particularly ambitious.  You aim for rapport.\n\n*if (Charm > 40)\n\tAnd you achieve it.  People laugh at your jokes.  You lose hand after hand, but once in a while you dig in and pull yourself out of a hole.  By the end of the night, even Varkath seems to appreciate your presence.\n\t*set beat_varkath true\n\t*set charm %+ 20\n\t*set soul -100\n\t*set game_result 5\n\t*goto Aftermath\n*if (Charm \u003c= 40)\n\tNo one seems to be listening, though.  Your jokes fall on silence, and you can't draw anyone out into conversation.  You play a long, losing game, which you expected, and you don't have much fun doing it.\n\t\n\tBut at least it doesn't last forever.\n\t*set game_result 2\n\t*set soul -200\n\t*goto Aftermath\n\n*label Lose\n\nThat's the night's big play, for you.  You're not dead, nor are you so far reduced as to qualify for zombie-hood, but you feel low and bruised.  When the game breaks up and the goddess dissolves back into the players from whose souls she was formed, you're only too happy to push yourself away from the game and stagger off toward the bar.\n\n*goto Varkath_chat\n\n\n*label Aftermath\n\nThe game breaks by unseen agreement, and the goddess returns your souls.  The dance of cards is done.  You rise, stretching against tense muscles, and stagger off to the bar for a drink.\n\n*label Varkath_chat\n\nBefore you travel far, though, you hear a voice behind you, harsh and melodic in weird directions, like a house key scraped over a violin string.\n\n\"${char_voc} ${surname}.  A pleasure to play with you.\"\n\nYou turn, and see Varkath.\n\n*page_break\n\n\"Sir.\"\n\nHis mask is painted to resemble a young man's face.  Perhaps his, from a long-vanished youth.  You think the mask's made of cowhide.  You fervently hope it's made of cowhide.\n\n*if (game_result = 1)\n\t\"You got what you wanted.  But you lost on the game, overall.  That's rarely a good plan.\"\n*if (game_result = 2)\n\t\"Next time, try to achieve what you set out to do.\"\n*if (game_result = 3)\n\t\"There is more to proper play than simply barreling through the world.\"\n*if (game_result = 4)\n\t\"All the stolen wisdom in the world won't help if you lose too much of your soul to make that wisdom good.\"\n*if (game_result = 5)\n\t\"Laughter, trust, and companionship are three things that will never turn a knife from your throat.\"\n*if (game_result = 6)\n\t\"Never spare someone you hold at the point of your sword.  I have learned that the hard way.\"\n\n*choice\n\t#\"I'll remember that, sir.\"\n\t\tHard to read the expression on that mask—if there is any expression for you to read at all.\n\t\t\n\t\tHe turns away.\n\t\t*set Varkath +10\n\t\t*goto Drinks\n\t*if (game_result != 2) #\"I got what I wanted.\"\n\t\t\"There is virtue in desire,\" he says.  \"Even if it is a limited sort of virtue.\"\n\t\t\n\t\tHe turns away, leaving you alone.\n\t\t*set Varkath +30\n\t\t*goto Drinks\n\t*if (game_result = 2) #\"Better to experiment in a casino than in a courtroom, sir.\"\n\t\t\"Perhaps.\"  He shrugs, and turns away.\n\t\t\n\t\t*set Varkath +20\n\t\t*goto Drinks\n\t#\"Some people are never happy.\"\n\t\t\"Some people,\" he says, with a slender smile, \"are barely people.\"\n\t\t\n\t\tHe walks away, without so much as a goodbye.  Then again, of the two of you, he's the one with nothing to prove.\n\t\t\n\t\t*set Varkath +50\n\t\t*goto Drinks\n\t#\"What were you hoping to see?\"\n\t\t\"Some spark,\" he says, and turns away.\n\t\t*goto Drinks\n\n*label Drinks\n\nYou feel exhausted.  Long day, long night, and more long days to come.  Many more of them, if this life works out the way you've planned.\n\nChen and Pat are talking at the edge of the dance floor.  They look like they're ready to go.  Meanwhile, the dance itself is heating up, and you see some people there you wouldn't mind heating up as well.  And there is always the bar.  Not to mention your bed, though it seems so far away now.\n\n*choice\n\t#I catch up with Chen and Ngabe, and walk them to the trolley.\n\t\tYou walk your fellow associates to the trolley.  Pat won a decent amount of soul at blackjack, and while Cass didn't gamble, she's a bit out of it from the booze.  You part at Hub Station, friends under the streetlights.  And when you finally reach your apartment, you fall into bed like a piece of broken glass, a memory, tumbling, spinning forever in the night.\n\t\t*set Ngabe %+10\n\t\t*set Chen %+10\n\t\t*set charm %+10\n\t\t*finish \n\t#The night is young!  I try to drag Chen and Ngabe out for drinks.\n\t\tThey're reluctant at first, but by the time you find a bar they've both warmed to the idea.  Pat, at least, is flush with soulstuff off a successful evening, and you dance and toast and drink and have a grand old time, free from the watchful eyes of partners.  The night blurs together in drunken memory, but it was worth it, though you won't think so come tomorrow morning.\n\t\t\n\t\t*if ((chen >= 55) or ((chen >=40) and flirt_chen)) \n\t\t\t*goto chen_eyes_you\n\t\t\n\t\tAnd when you finally reach your own bed, you fall into it and keep falling, tumbling like a shard of glass through the darkness.\n\t\t*set Ngabe %+20\n\t\t*set Chen %+20\n\t\t*set charm %+10\n\t\t*set sleep -20\n\t\t*finish\n\t#Let's see what we can do on that dance floor, shall we?\n\t\tYou grab a drink first, then hit the dance floor, spinning and shouting and twisting along with the music.  You find some good partners.  You find some bad partners.  But you do find partners, and the rest of the night scintillates and tumbles like broken glass down a dark well.\n\t\t*set charm %+20\n\t\t*set gunner %-20\n\t\t*set sleep -30\n\t\t*finish\n\t#I need to get some rest.\n\t\tYou make your way home on your own, pondering the events of the day.  The towers of Shikaw rise into the night, clutching for the broken-glass splinters of the stars.\n\t\t\n\t\tAnd for a moment, you reach out with them, overcome by the sense you're missing some shard or shred of memory.  Like there's a puzzle out there and the pieces are just out of reach.\n\t\t\n\t\t*if (booze)\n\t\t\tBut, hells.  It's late, and you're drunk, and at least you have a bed to call your own.\n\t\t\t*set gunner %+10\n\t\t\t*set sleep %+10\n\t\t\t*finish \n\t\t*else\n\t\t\tBut, hells.  It's late, and at least you have a bed to call your own.\n\t\t\t*set gunner %+10\n\t\t\t*set sleep %+10\n\t\t\t*finish \n\n*label chen_eyes_you\n\nIn the crowded cab between the third and fourth club—or was it between the fifth and sixth—you feel a hand on your thigh.  The hand belongs to Cass; your eyes meet, and the black behind those eyes is hungry.  But the instant passes, and she takes her hand away, with an apology and a laugh and the slightest smile.\n\n*temp apartment_description \"\"\n\n*if commute = \"long\"\n\t*set apartment_description &\"to the pulse of music through the thin floor and the meat-and-bone thuds of a fistfight in the alley outside\"\n*if commute = \"medium\"\n\t*set apartment_description &\"under the eyes of an optician's billboard through your bedroom window\"\n*if commute = \"short\"\n\t*set apartment_description &\"bodies lit by the glittering penthouse gardens visible from your bedroom window.  The great and powerful play there, but their play doesn't match yours\"\n*comment endif\n\n*choice\n\t#I let it go.\n\t\tNo sense reading too much into these things.  You live the night, dancing and drinking, and when you finally reach your own bed, you fall into it and keep falling, tumbling like a shard of glass through the darkness.\n\t\t*finish\n\t#I dance with her, but I don't push anything.\n\t\tYou take the hint, or at least you think it was a hint—you hope it was a hint.  What a nice hint that would be.  At the next club when the music gets heavy you pull Cass out onto the dance floor.  She presses against you in the dance, and you return the favor.  Her smile's a star and when she spins, her necklace glints again and again like glass tumbling through the darkness.\n\t\t*set chen %+20\n\t\t*finish\n\t#When we have a moment's privacy, I invite her up to my place.\n\t\t\"Aren't you forward,\" she says, in the shadows of the Alabaster on Bleeker and 49th, and the blacklights make her teeth shine purple.  \"Can you stay quiet about this?  We don't want word around the office.\"\n\t\t\n\t\t\"I can stay quiet,\" you say.\n\t\t\n\t\t\"Not when I'm through,\" she says, and slips her hand beneath your jacket, against the small of your back.  \"Let's go.\"\n\t\t\n\t\tGo you do.  In your box-crowded apartment, you move together on the bed, ${apartment_description}.\n\t\t\n\t\tAnd at the last, the pressure builds and you both break into a million slivers of glass.\n\t\t*achieve sexyfuntimes\n\t\t*set chen %+30\n\t\t*set chen_sex +1\n\t\t*finish\n", "choicescript_description": "Battle demons and undead attorneys, and win souls to pay back your student loans! At the elite demonic-law firm of Varkath Nebuchadnezzar Stone, you'll depose a fallen god, find romance, and maybe even make partner, if you don't lose your own soul first.\n\n[i]Choice of the Deathless[/i] is a necromantic legal thriller by Max Gladstone, Campbell Award-nominated author of [i]Three Parts Dead[/i] and [i]Two Serpents Rise[/i]. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\n• Explore a fantasy realm with a rich and evolving backstory, based on the novels published by Tor Books.\n• Play as male or female, gay or straight, dead or alive (or both).\n• Build your career on carefully reasoned contracts, or party all night with the skeletal partners at your firm.\n• Navigate intrigue and mystery in a world of scheming magicians and devious monsters.\n• Look for love in at least some of the right places.\n• Balance student loans, sleep, daily commute, rent payments, and demonic litigation—hey, nobody said being a wizard was always fun.\n", "choicescript_stats": "*if (name != \"Unnamed\")\n  ${name} ${surname}\n  *goto statblock\n*else\n  Your Character\n  *goto statblock\n\n*label statblock\n*stat_chart\n  percent Charm\n  percent Craft\n  percent Cunning\n  percent Power Determination\n  percent Sleep\n  opposed_pair Gunner\n    Socialite \n  text Soul\n  text Debt\n  \n  percent Ngabe\n  percent Chen\n  percent Wakefield\n  percent Vega\n  percent Varkath\n  percent Nebuchadnezzar\n  percent Stone\n\n[b]A brief guide to the Choice of the Deathless statblock:[/b]\n\n[b]Charm[/b]: Your personal style, savoir faire, empathy, and social acumen.\n\n[b]Craft[/b]: Your facility with the sorcerous Craft, used for magical battles and a range of professional tasks.\n\n[b]Cunning[/b]: Your native cunning, wit, and raw intellectual ability.\n\n[b]Determination[/b]: Your bullheaded determination, will to power, and stick-to-it-iveness.  Everything your hypothetical football coach wanted you to \"bring onto the field.\"\n\n[b]Socialite / Gunner[/b]: Are you clawing for advantage, desperate for work experience, eager to gain partners' approval? Or are you more of a people person?\n\n[b]Sleep[/b]: The less you sleep, the harder everything is.\n\n[b]Soul[/b]: The Craft can accomplish miracles—or great blasphemies—so long as you have the soulstuff with which to fuel it.\n\n[b]Debt[/b]: Your student loans are a daily drain on your life and sanity. \n  \n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove all ads and delays.\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  You've paid to remove ads and delays.\n", "continuingeducation": "*comment Copyright 2013 by Max Gladstone.\n*comment \n*comment Choice of the Deathless\n*comment \n*comment Scene 5: Continuing Education\n*advertisement\n\n*comment Chapter-specific Variables\n\n*temp base_difficulty 60\n\n*temp drink false\n*temp intrude false\n*temp talk_to_ash false\n*temp late_to_fight false\n*temp Ash_fought_succeed false\n*temp final_fight_diff 70\n\n*set sleep_difficulty (round((((1-3)/9)*sleep)+20) + round(debt / 20000))\n\n*temp sleep_warning \"\"\n\n*if ((sleep \u003c 90) and (sleep >= 70))\n\t*set sleep_warning \"  Hells, there's barely enough time for you to sleep most days.\"\n*if ((sleep \u003c 70) and (sleep >=40))\n\t*set sleep_warning \"  You can't remember the last night you got a good, long sleep.  It can't be healthy.  You've caught yourself in the middle of stupid mistakes, errors of Craft you'd never have made well-rested.  How many more mistakes have you missed?\"\n*if (sleep \u003c40)\n\t*set sleep_warning \"  You can't even sleep through the night any more.  You're so tired that you lie awake in your apartment, staring up at the ceiling, imagining death.  Not because you're suicidal, mind.  But if you weren't alive, no one would expect you to go to work in the morning.  You've kept yourself together, but the quality of your work's slipping.  If only your commute was shorter, maybe you could get more sleep…\"\n\n\n*comment Act 1: The Conference.\n\nYour hand spasms in pain.  You frown, make a fist, and turn it in a circle, counting the cracks and pops from your joint.  Too much work recently.  Not enough relaxation.  No vacations since you joined the firm—there never was a good time.  That makes, what, three years now?  Four?${sleep_warning}  The small muscles of your body cord around themselves.\n\nYour cab plods south through traffic.  In the carriage to your left, a man in a dark suit reads a comic book; to your right, a woman drowses against her window.  Today, at least, you aren't working.  Today, you're going to a conference.\n\n*page_break\n\nTo be more specific: you're presenting at a conference.  Varkath Nebuchadnezzar wants you to discuss the mechanics and attendant risks of demonic labor at the annual Shikaw Craft Summit.  You're no master of demonology, but between the Transdimensional Thaumaturgics case and your work with R'ok, you have a certain degree of personal experience.  Either that or, more likely, everyone else higher than you on the food chain pled out of the responsibility.\n\n*if (Rok_here)\n\tR'ok finds the prospect of you presenting yourself as an expert on demons quite amusing.  He's given you a few tidbits you might find useful, but you doubt the panel will be interested in the finer points of demonic table etiquette.  Of which, it turns out, there are many.\n\t*set base_difficulty -5\n*comment endif\n\nWhat do you think about this situation?\n\n*choice\n\t#I'd rather be back at the office.\n\t\tThat's the spirit.  There are hours to be billed, documents to review.  Not to mention you still need an answer to that question about binding language for Transdimensional Thaumaturgics' Iskari division.\n\t\t\n\t\tBest get all this pesky socialization and sunlight out of the way as soon as possible, and return to the more important desk-work.\n\t\t*set power %+10\n\t\t*set gunner %+10\n\t\t*goto Arrive_Conference\n\t#Human interaction, unmediated by paperwork?  Sign me up!\n\t\tYou managed to keep a straight face when you received the assignment—probably a bad idea to look [i]too[/i] eager about being sent away from the office for work that doesn't involve wading through pages and pages of contracts, or evidence, or mystic sigils.    But—what a relief!  It's nice to remember that there's more to your work, more to your life, than the limits of your desk. \n\t\t*set charm %+10\n\t\t*set gunner %-10\n\t\t*goto Arrive_Conference\n\t#Perhaps I will learn useful sorcerous techniques.\n\t\tCraft Summits are more social engagements than they are loci for the exchange of mystic knowledge.  One shows up, attends a few symposia, strolls through booths of exhibits for Concerns that specialize in various limited areas of the Craft, and for the most part leaves unenlightened.  But!  Any opportunity to rub shoulders with some of the finest Craftsmen and Craftswomen in the city, and learn their secrets, should not be overlooked.  Even if you have to (alas) socialize.\n\t\t*set craft %+10\n\t\t*set gunner %+10\n\t\t*goto Arrive_Conference\n\t#Connections I build here could be useful later.\n\t\tThis could be an excellent opportunity.  Summits like this are one of the few opportunities you have (as a young associate who spends most of ${char_pro_pos} time working) to meet people outside your own firm in a non-adversarial fashion.  No matter how loyal you are to Varkath Nebuchadnezzar, there's always the chance [i]they[/i] won't be loyal to [i]you[/i]…\n\t\t\n\t\tYou can use this conference to network, and prepare.\n\t\t*set cunning %+10\n\t\t*set gunner %-10\n\t\t*goto Arrive_Conference\n\n*label Arrive_Conference\n\nDecades past, this stretch of lakefront was home to the Temple of Bridging Waters, a sprawling complex of marble and granite dedicated to the meeting of the Greatwater gods with those of the inland rivers.  Those gods are dead now, dead since the Wars, and Caerlon Convention Center stands in the place of the razed temple.  The new building does not waste time evoking a sense of peace and prosperity.  It looks like an unfinished nest of thorns—all the structural supports and ductwork are [i]outside[/i] its walls, in the service of some thirty-years-antiquated Iskari design philosophy.  It's hell to clean in the winter; massive icicles hang from struts and ducts.\n\nThe cab lets you off up the street.  You raise the collar of your coat against the cold, and walk along a sidewalk crammed with shivering suited figures toward the door marked \"panelists.\"\n\n*page_break\n\nThe air inside is wet with the snow melting off a thousand coats.  You collect your badge from a bored woman at the attendees booth, puzzle through a map posted on a nearby wall, and head off toward your panel chamber.\n\nYou make it five steps before a shout from behind brings you up short.  \"${surname}!\"\n\nYou recognize the voice.  Wakefield.\n\n*page_break\n\nYou turn and see ${Ash_pro_obj} approaching across the crowded entry hall.  In a world of blacks and charcoals, ${Ash_pro} wears a suit the color of a pencil grazed across a sheet of white paper, and a sapphire shirt open at the collar.  A few years of work have done nothing to mellow ${Ash_pro_pos} aristocratic disposition.\n\n\"A pleasant surprise to see you here.  When I encountered your name on the program I thought they must have misprinted.\"\n\n*choice\n\t#\"A pleasure to see you, as well.\"\n\t\t\"Ever unflappable, ${surname}.\"  Wakefield catches up with you, and slaps you hard on the arm.  \"Shall we?  You don't have long before your panel begins.\"\n\t\t\n\t\t\"Nothing like cutting it close.\"\n\t\t\n\t\t\"A ${char_binary} after my own heart.  Shall we?\"\n\t\t\n\t\t\"You're coming?\"\n\t\t\n\t\t\"I wouldn't miss any chance to see you humiliate yourself in front of a roomful of Craftsmen.\"\n\t\t\n\t\t\"Noble as always.\"\n\t\t*set charm %+10\n\t\t*set Wakefield %+10\n\t\t*goto Conference\n\t#\"I have somewhere to be.  I'm not interested in playing games.\"\n\t\t\"Quite a shame.  Games make life interesting.\"  Wakefield falls into step beside you, and the two of you proceed around the edges of the con floor toward the panel chamber.  \"No need to walk so fast,\" ${Ash_pro} says.  \"You have plenty of time.\"\n\t\t\n\t\t\"Don't you have anything better to do than bother me?\"\n\t\t\n\t\t\"Is that truly all we are to one another?  A bother?\"  Wakefield mocks a hurt expression better than anyone in the New World.\n\t\t\n\t\t\"I wasn't aware we were anything to one another.\"\n\t\t*set power %+10\n\t\t*set Wakefield %-10\n\t\t*goto Conference\n\t#\"I should think you'd have something more important to do than stalk me.\"\n\t\t\"Oh, yes,\" ${Ash_pro} says, falling into step beside you.  Together, you proceed around the edge of the con floor toward your panel chamber.  \"But nothing quite so fun.\"\n\t\t\n\t\t\"So that's your main motive here?  Finding fun at my expense?\"\n\t\t\n\t\t\"Expense is hardly the word I would choose.  Does my presence tax you?\"\n\t\t\n\t\t\"In the sense that it is an unwelcome and periodic occurrence?  Yes.\"\n\t\t\n\t\tWakefield laughs, but if you didn't know better, you would think that laughter contained just a trace of pain.\n\t\t*set cunning %+10\n\t\t*set Wakefield %+10\n\t\t*goto Conference\n\t#\"I have been involved in more demonic Craftwork than usual.  The organizers must recognize that.\"\n\t\t\"Always true to the point, so long as the point involves the theory or practice of dark sorcery.  ${surname}, I have [i]missed[/i] you.  Come on, we'll be late for your panel.\"  Wakefield takes you by the arm and pulls you through the exhibit hall toward the panel rooms at the rear of the chamber.\n\t\t\n\t\t\"Are honest answers to implied questions funny now?\"\n\t\t\n\t\t\"When delivered with the proper timing,\" ${Ash_pro} says with an arch smile.\n\t\t*set craft %+10\n\t\t*set Wakefield %+10\n\t\t*goto Conference\n\n*comment Beat 3: Conference.  Ashleigh joins you on the stage.  \"You're not on the program.\"  \"That's because I'm not speaking.  Someone's speaking through me.\"\n\n*label Conference\n*page_break\n\nThe panel will take place in a dingy, yellow-lit room with yellow wallpaper and an unfortunate corpse-gray carpet. The audience is half-full already with various Craftsmen and Craftswomen, most of whom are human.  A few Deathless Kings and Queens sit near the back, skulls matte and pale save for the one who's had his (or her—hard to tell with skeletons) bone inlaid with ebony.  In the rear corner, a shriveled, leathery Craftswoman bobs in a tank of water carried within a ten-foot-tall copper wire automaton.  Her hair drifts like clouds around her bowed head.\n\nA man in the third row turns to the next page of his newspaper, and checks his pocket watch.\n\nThe other panelists are already in place, placards in front of each one.  Only two seats are empty: yours, and the one belonging to the demonic guest, a representative of the coalition of Akargath.  Who were, of course, your adversaries in the Transdimensional Thaumaturgics case.  You hope the demon, when he, or she, or it, shows up, holds no hard feelings.  Business is business.\n\n*page_break\n\nYou jog to the front of the room, excuse your way to the stage, and sit down behind the placard that reads \"${name} ${surname}, Varkath Nebuchadnezzar Stone.\"\n\nThe audience looks a good deal more intimidating when you're seated at the front of the room.\n\nYou exchange a nod with the moderator, a skeleton with two painted porcelain globes in place of eyes.   \"Excellent,\" he says.  \"Now that you're here, we can start.\"\n\n\"Shouldn't we wait for the other panelist?\"\n\nThe moderator points with one long, bony finger.  You turn in time to see Wakefield settle down into the empt
