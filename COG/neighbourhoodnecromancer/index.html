<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neighbourhood Necromancer — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "neighbourhoodnecromancer", "title": "Neighbourhood Necromancer", "scenes": {"ask": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, ask\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\nYou find the banshee drifting around what used to be your parents' bedroom. She has your mother's crafting supplies spread all over the floor and is frowning at ink pads and collage glue. Three pairs of crinkle-cut scissors are already embedded an inch deep in the wall, as if some frustrated supernatural being flung them in a rage. In the centre of the floor, three tiny, plastic stars are glued to a bit of mangled cardboard. The glue has seeped onto the carpet.\n\nYou begin with a bit of chat about how much you appreciate her presence and how valuable she has been around the house. By the time you get around to asking for advice, her stare is fixed on you. Slowly, her mouth turns up at the corner, into an unsettling smile.\n\n\"'Ere you ask me a question, you must answer three of mine.\"\n\nThat's fine. It might be valuable to have some bonding time with this levitating, wild-haired maniac. You settle down on the floor, narrowly missing what you now realise is a spilled puddle of blue poster paint.\n\n*rand bomb 1 7\n\n*page_break\n\n*comment *****************************************************************\n*label q1\n\nThe banshee grins. You've seen her happy before and it's never led to anything good. But you sense that backing out at this point would lead to a tantrum on a scale rarely seen by mortals.\n\nYou have a sense of the room darkening around you. The banshee asks her question:\n\n*if (bomb = 1)\n  [i]Which of the following films used a real human skeleton instead of an artificial prop?[/i]\n  *set solution \"chainsaw\"\n  *goto a1\n*elseif (bomb = 2)\n  [i]Which film was originally to be entitled \"Night of Anubis\"?[/i]\n  *set solution \"night\"\n  *goto a1\n*elseif (bomb = 3)\n  [i]Which film was released in Germany under the title \"Dance of the Devils\"?[/i]\n  *set solution \"evil\"\n  *goto a1\n*elseif (bomb = 4)\n  [i]Which film introduced the concept that sunlight was lethal to vampires?[/i]\n  *set solution \"nosferatu\"\n  *goto a1\n*elseif (bomb = 5)\n  [i]Which vampire movie never mentions the word \"vampire\"?[/i]\n  *set solution \"near\"\n  *goto a1\n*elseif (bomb = 6)\n  [i]Which film was originally based on an H.P. Lovecraft short story?[/i]\n  *set solution \"reanimator\"\n  *goto a1\n*elseif (bomb = 7)\n  [i]After shooting which film did the principal star and director become engaged?[/i]\n  *set solution \"resident\"\n  *goto a1\n\n*comment *****************************************************************\n*label a1\n\n*choice\n  #Dawn of the Dead.\n    *set answer \"dawn\"\n    *rand bomb 1 8\n    *goto r1\n  #Resident Evil.\n    *set answer \"resident\"\n    *rand bomb 1 8\n    *goto r1\n  #Re-Animator.\n    *set answer \"reanimator\"\n    *rand bomb 1 8\n    *goto r1\n  #Night of the Living Dead.\n    *set answer \"night\"\n    *rand bomb 1 8\n    *goto r1\n  #Near Dark.\n    *set answer \"near\"\n    *rand bomb 1 8\n    *goto r1\n  #The Evil Dead.\n    *set answer \"evil\"\n    *rand bomb 1 8\n    *goto r1\n  #The Texas Chain Saw Massacre.\n    *set answer \"chainsaw\"\n    *rand bomb 1 8\n    *goto r1\n  #Nosferatu.\n    *set answer \"nosferatu\"\n    *rand bomb 1 8\n    *goto r1\n  #Interview with the Vampire.\n    *set answer \"interview\"\n    *rand bomb 1 8\n    *goto r1\n\n*comment *****************************************************************\n*label r1\n\n*if (answer = solution)\n  *goto q2\n*else\n  *goto bzzzt\n\n*comment *****************************************************************\n*label q2\n\n\"Mmmmmm.\" The banshee studies you as if locked in some titanic psychological struggle. \"Of course you would be an expert in the cinema of the small hours. But how is your knowledge of anatomy?\"\n\nHer hair floats behind her head in an unsettling manner.\n\n*if (bomb = 1)\n  [i]Where is the smallest bone in the body located?[/i]\n  *set solution \"ear\"\n  *goto a2\n*elseif (bomb = 2)\n  [i]Where is the strongest bone in the body located?[/i]\n  *set solution \"thigh\"\n  *goto a2\n*elseif (bomb = 3)\n  [i]Where in the body are the zygomatic bones?[/i]\n  *set solution \"cheek\"\n  *goto a2\n*elseif (bomb = 4)\n  [i]Where in the body is the clavicle?[/i]\n  *set solution \"shoulder\"\n  *goto a2\n*elseif (bomb = 5)\n  [i]Where in the body is the radius?[/i]\n  *set solution \"forearm\"\n  *goto a2\n*elseif (bomb = 6)\n  [i]Where in the body is the patella?[/i]\n  *set solution \"knee\"\n  *goto a2\n*elseif (bomb = 7)\n  [i]Where in the body is the fibula?[/i]\n  *set solution \"lowerleg\"\n  *goto a2\n*elseif (bomb = 8)\n  [i]Where in the body are the cuneiform bones?[/i]\n  *set solution \"foot\"\n  *goto a2\n\n*comment *****************************************************************\n*label a2\n\n*choice\n  #The forearm.\n    *set answer \"forearm\"\n    *rand bomb 1 7\n    *goto r2\n  #The nose.\n    *set answer \"nose\"\n    *rand bomb 1 7\n    *goto r2\n  #The thigh.\n    *set answer \"thigh\"\n    *rand bomb 1 7\n    *goto r2\n  #The cheek.\n    *set answer \"cheek\"\n    *rand bomb 1 7\n    *goto r2\n  #The shoulder.\n    *set answer \"shoulder\"\n    *rand bomb 1 7\n    *goto r2\n  #The knee.\n    *set answer \"knee\"\n    *rand bomb 1 7\n    *goto r2\n  #The lower leg.\n    *set answer \"lowerleg\"\n    *rand bomb 1 7\n    *goto r2\n  #The foot.\n    *set answer \"foot\"\n    *rand bomb 1 7\n    *goto r2\n  #The ear.\n    *set answer \"ear\"\n    *rand bomb 1 7\n    *goto r2\n  #The spine.\n    *set answer \"spine\"\n    *rand bomb 1 7\n    *goto r2\n  #The hand.\n    *set answer \"hand\"\n    *rand bomb 1 7\n    *goto r2\n  #The hips.\n    *set answer \"hips\"\n    *rand bomb 1 7\n    *goto r2\n\t\n*comment *****************************************************************\n*label r2\n\n*if (answer = solution)\n  *goto q3\n*else\n  *goto bzzzt\n\n*comment *****************************************************************\n*label q3\n\nThe banshee's green gown seems to spread out across the floor. She thinks for a long time. Although her face remains locked, you sense that she is very much enjoying herself. A pitch for a new TV quiz show called \"Ask The Banshee\" unfolds in your mind.\n\n\"That was just a lucky guess,\" she says. \"For your third question…how about something to do with the world at large…\"\n\n*if (bomb = 1)\n  [i]Where might you find the funerary practice of leaving bodies on mountain tops to be devoured by birds?[/i]\n  *set solution \"tibet\"\n  *goto a3\n*elseif (bomb = 2)\n  [i]Where might the lungs, liver, stomach, and intestines of the deceased be removed and placed in four separate jars?[/i]\n  *set solution \"egypt\"\n  *goto a3\n*elseif (bomb = 3)\n  [i]Where might you find elaborate, colourful coffins constructed in the shape of something loved by the deceased?[/i]\n  *set solution \"ghana\"\n  *goto a3\n*elseif (bomb = 4)\n  [i]Where might you see coins placed on the deceased as payment for a journey into the afterlife?[/i]\n  *set solution \"greece\"\n  *goto a3\n*elseif (bomb = 5)\n  [i]Where might you expect the heart of a deceased person to be weighed against a feather in the afterlife?[/i]\n  *set solution \"egypt\"\n  *goto a3\n*elseif (bomb = 6)\n  [i]Where might you hear jazz music as an integral part of a funeral procession?[/i]\n  *set solution \"usa\"\n  *goto a3\n*elseif (bomb = 7)\n  [i]Where might you see a celebration where the dead are removed from their crypt to be re-wrapped and danced with?\n  *set solution \"madagascar\"\n  *goto a3\n\n\n*comment *****************************************************************\n*label a3\n\n*choice\n  #Tibet.\n    *set answer \"tibet\"\n    *goto r3\n  #Scotland.\n    *set answer \"scot\"\n    *goto r3\n  #India.\n    *set answer \"india\"\n    *goto r3\n  #Madagascar.\n    *set answer \"madagascar\"\n    *goto r3\n  #Ancient Egypt.\n    *set answer \"egypt\"\n    *goto r3\n  #Ghana.\n    *set answer \"ghana\"\n    *goto r3\n  #United States of America.\n    *set answer \"usa\"\n    *goto r3\n  #Ancient Greece.\n    *set answer \"greece\"\n    *goto r3\n\n\n*comment *****************************************************************\n*label r3\n\n*if (answer = solution)\n  *goto victory\n*else\n  *goto bzzzt\n\n\n*comment *****************************************************************\n*label bzzzt\n\n\"BZZZZT! Wrong! Thanks for playing!\"\n\nThe banshee swirls up from the floor, cackling and waving. She actually dances, spinning like some kind of drugged-out, green helter-skelter, red hair flying. This apparition cartwheels across the landing and down the stairs, to where a dire afternoon quiz show is playing on TV.\n\nYou really could have done with some advice. But she seems so happy for a change. It would be a shame to disturb her. \n\n*page_break\n*set luck %+5\n*set stagetwo +1\n*page_break Next Day\n*goto_scene stagetwo\n\n*comment *****************************************************************\n*label victory\n\n\"Correct! Now for your final question…\"\n\nYou remind the banshee in a gentle-but-firm manner that you promised to answer three of her questions. Not four. Her shoulders droop.\n\n\"You're such a killjoy. All right, what did you want to know?\" \n\nShe lies back on one elbow. Her reclining form begins to drift, as if perched on a low-voltage magic carpet. Yet those green eyes peer into yours; you see the wisdom of centuries there.\n\nWhat will you ask?\n\n*choice\n  #What's this humanity/corruption thing about?\n    The banshee gives a lazy blink.\n\n    \"You did not ask to be given the command of the dead, $!{name}, but you received it all the same. The choices you have made—the choices you still must make—these show your character. Those who resist the rules of undeath may retain their humanity but they risk trouble with their minions. Those who embrace the grave will surely become stronger but they may never again return to their former ways.\"\n\n    She tips her head to one side.\n    *if (humanity > corruption)\n      \"You still lean towards your humanity.\"      \n    *if (corruption > humanity)\n      \"The darkness speaks strongly to you.\"\n    *if (corruption = humanity)\n      \"You have not yet committed yourself.\"\n    *comment endif    \n    \n    You ponder this for a moment.\n\n    \"Also,\" she says, \"did you know you can score 100% in either characteristic? Not both, of course. But it would be a terrible, painful waste of your time to try.\" Her smile makes you feel a little queasy.\n\n    *page_break\n    *goto prize\n\n  #What are control, energy and luck?\n    The banshee glances at the ceiling, then frowns at you.\n\n    \"These three measures represent the characteristics you require to succeed in your endeavours. A necromancer must possess a sharp awareness of any situation, and an iron will to compel the dead to follow ${his} orders. Such control comes with a price, and without sufficient stamina you may tire too quickly during a major battle. Proper rest will restore your energy levels.\n\n    \"And luck? You clearly possess that already. How else could you have answered my questions?\"\n\n    Nose in the air, she drifts off.    \n\n    *page_break\n    *goto prize\n\n  #What are zombies and skeletons good for?\n    The banshee narrows her eyes.\n\n    \"They are good for being cherished and respected. They have suffered all the troubles of your own existence plus the trauma of death. Treat them better!\"\n\n    She stares you down for a moment, then relents.\n\n    \"Of course you mean, what are their relative strengths? Well. Zombies are slow but relentless, obedient, and single-minded. Skeletons are bony, old anarchists: fast, agile, and fun-loving to the marrow. But difficult to exert precise control over. Also, if you believe your D&D [i]Monster Manual[/i], they are resistant to damage from bladed weapons.\"\n\n    You can't help but feel that the wisdom of the centuries could be reading something more highbrow.\n\n    *page_break\n    *goto prize\n\n  #What's the best strategy to win this game?\n    She gives you a sidelong look.\n\n    \"You will be challenged to the limits of your ability in the days to come. Some general advice for life is also applicable in this situation. Make yourself the best you can be. If you are not an all-rounder, play to your strengths. And seek help from others. A burden shared is a burden eased.\n    *if ((vampire) or (animal_help))\n      You have already recruited such help, if you can only use it correctly.\"\n    *comment endif\n\n    She frowns. \"I don't mean me, by the way. This is me helping right now. I'm done. I hope you got what you wanted.\"\n\n    *page_break\n    *goto prize\n\n  #What's her favourite scary movie?\n    The banshee cradles her pale chin and floats for a moment.\n\n    \"I'm going to take your question as genuine and not some lame postmodern reference. In which case I think it's…[i]Psycho 2[/i]. Pull that face if you like. But it's an underrated story which walks a delicate line along sanity's edge. It retains more than a touch of Hitchcock and it benefits from the twenty-year gap and Perkins' physical aging. Yes, it perhaps dilutes its strengths with too much lingering gore, and the denouement may be overly-complicated, but I still think it bears repeated viewing.\"\n\n    You protest that you weren't pulling any face. You were just relaxing your face.\n\n    \"Oh,\" she says. \"Sorry.\"\n\n    *page_break\n    *goto prize\n\n  #Why does this weird bone give you the power to command the dead?\n    The banshee studies the glowing humerus.\n\n    \"I fear my answer will disappoint you. The item you carry would lend anybody the power to control the departed, were they of sufficient mental fortitude to cope with its rigours. If you mean, why did it come to you in particular, I must refer you to various doom-laden myths and creative writing textbooks about the hero's journey.\"\n\n    You press her a little further on the technology of the thing.\n\n    \"Ah. Well, for that explanation I would look towards an installation on the fringes of town.\"\n\n    She's talking about The Base.\n\n    *page_break\n    *goto prize\n\n\n*comment ### MORE HERE ###\n\n*comment *****************************************************************\n*label prize\n\nYou open your mouth to ask the banshee a second question, but she cuts you short. \"Our bargain is complete.\" She floats off downstairs in the direction of the television.\n\nPerhaps this wouldn't work as a quiz show after all.\n\n*set luck %+10\n*set stagetwo +1\n*achieve banshee\n*page_break Next Day\n*goto_scene stagetwo\n", "base": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, base\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\nYou've lived near The Base all your life. You've seen soldiers in town, covered trucks rumbling through the gates, strange lights in the distance at night. But you've never been inside and the people who have don't talk about it.\n\nYet your life has been turned around by an off-duty soldier and this strange glowing bone he was carrying. It caused the death of your parents; and if they had been different people, you might have cared a lot about that.\n\nSo you need answers. Why did that soldier come back to life? Why are you now able to command the dead? Where will your life go after this?\n\nFor the answers, you know what you need to do. You need to get inside The Base.\n\n*page_break\n\nYou know the perimeter of The Base quite well, but you take a long walk around it just to be sure. The fence is three times your height and topped with razor wire. The front gates are reinforced and watched from a control booth twenty-four hours a day. The soldiers don't actually display guns, but it seems likely they have arms in there somewhere.\n\nYou find two possible weaknesses in the security. At one point, a stream passes through the perimeter and it looks like there is a gap in the wire underwater. At another point, a tree has overgrown the fence. You could conceivably get across there. Also, with some assistance, you might be able to sneak in through the gate.\n\n*choice\n  #Try the underwater route.\n    A secret underwater assault sounds like a terrific plan until you are actually beside the stream and you dip your hand in to test the temperature. A chill runs straight up your arm and down your back. Do you really want to immerse yourself in this? During a winter night?\n\n    *choice\n      #Go ahead with the underwater plan.\n        You take a deep breath and plunge in. You have to suppress a scream as the icy water soaks through your underwear. Still, there is a gap in the wire, and with a bit of effort you can open it wide enough to let the undead pass through. You slip through into the grounds of The Base and scramble from the water.\n\n        Your horde passes beneath the freezing stream without incident. You've effected a silent entry to a strange military facility. It will, however, be a while before the shivering wears off.\n\n        *set max_energy %-10\n        *set energy %-30\n        *page_break\n        *goto inside \n\n      #Try the tree instead.\n        *goto tree\n\n      #Go and get a hot chocolate.\n        Some might suggest that breaking into a military base at all is stupid. It's unlikely that any of them would change their point of view if you invited them to first immerse themselves in icy water.\n\n        You head back to town with an easy stride, your horde shuffling after you. The coffee shop would normally be open at this time but it appears to have been abandoned. The door hangs at an angle, bumping its frame when the wind blows. You let yourself and your minions in.\n\n        Behind the glass counter, you have the strange feeling of playing at \"shops\". The ingredients are all there, many in packets labelled with the store brand. How will you construct your hot chocolate?\n\n        *fake_choice\n          #Find an instruction book.\n            Behind the counter is a corporate manual. It promises step-by-step instructions for every drink listed on the board. However, it also has several chapters on \"constructing a memorable experience for customers\". Almost every page has a smiling person in a suit holding a coffee while looking at a laptop or tablet. After five minutes of looking for the hot chocolate recipe, you give up and eat several chocolate nutty crunch bars instead.\n\n          #Experiment.\n            You find powdered chocolate in a bag, a thing that makes steam, a rack of flavoured syrups, squirty cream, flaked nuts, toffee sprinkles, and jars of multi-coloured toppings. Any ordinary person would be intimidated but not you. You line up fifteen mugs and begin your research.\n\n            *if (zombies > 0)\n              After tasting each creation, you give it to a zombie to finish. Soon the floor is splattered with a hideous pattern of sugar, milk, sticky syrup, and gooey zombie fluids.\n            *comment endif\n\n            Your fifteenth creation is the best. If only you had written down exactly how you got that tasty blend of cherry, almond, cinnamon and chilli.\n\n          #Cram as much chocolate into one mug as you can.\n            At first, you make the elementary mistake of filling the bottom of the mug with chocolate powder. However, you realise you can maximise the choco content by beginning with the large pieces. \n\n            So on the third try, you begin with mini chocolate brownies. Next you pour the small chocolate balls used as ice cream toppings. Chocolate sprinkles for coffee help fill the gaps between those, and finally the chocolate powder allows you to pack the whole thing down and level it off with the rim of the mug. You dribble a little hot water on for show, but most of it runs over the edge to drip on the floor. In the end, you wedge a stick in there and eat it like a lollipop.\n\n        *comment end fake_choice\n        Sitting in the shop without any other live customers proves to be relaxing. You browse their bookshelf and nose around the stores.\n\n        Didn't you have other plans for tonight? Oh yeah, the freezing river. Well, maybe you could try that on another night. When it's warmer.\n\n        *set stagetwo +1\n        *set luck %+10\n        *set humanity +6\n        *achieve hotchoc\n        *page_break Next Day\n        *goto_scene stagetwo\n\n  #Use the tree.\n    *label tree\n    The tree is in a quiet spot behind a terrace of houses. You slink down there under cover of night, armed with your departed father's wire cutters and a pair of cobwebby gardening gloves. By sliding along a larger branch, you can reach the line of razor wire. With slow, careful movements, you split the wire and peel it aside. The way is clear for you to drop down inside The Base. Getting out will be another matter, of course. Well, you still have the wire cutters.\n\n    Getting your horde across the wire is a challenge. \n    *if (skeletons > 0)\n      A skeleton walks the branch behind you, balancing with easy grace. Maybe whatever holds the bones together serves as a spooky gyroscope.\n    *if (zombies > 0)\n      A zombie has trouble getting into the tree. You end up going back, grabbing it by the ankles (trying not to think about your hands getting wet), and shoving. It blunders through the leaves and clambers along the branch.\n      *if (luck \u003c 62)\n        Then, with a certain inevitability, the zombie drops onto the fence. The wire cleanly slices it in two at the waist. Inside the base, its arms pat the gaping hole where its stomach used to be. Outside, its legs bump against the earth for a moment, then lie still.\n\n        *set zombies -1\n        *set minion_count -1\n        *if (minion_count = 0)\n          You stare at the two halves. This was not how you expected to end your dark, glamorous career as a necromancer. \n\n          *page_break\n          *goto_scene exile\n        *else \n          *page_break\n          *goto inside\n      *else\n        Just past the wire, it drops off the branch and lands on its head. Something squelches lightly.\n        *page_break\n        *goto inside      \n    *page_break\n    *goto inside\n\n  #Attempt to board a supply truck.\n    The trucks always take the same route through town, and the drivers are often half-asleep. If you could get one to stop for thirty seconds or so, you could smuggle your horde inside.\n\n    The first part of your scheme involves anticipating the arrival of a supply truck. You do this by the subtle device of watching from an upstairs window until you see one in the distance. By slipping through your back garden, you manage to reach a nearby street in time to press the button at a pedestrian crossing and hold up the truck for precious seconds. Your horde climbs on the back. Then you slip round the back yourself just as the truck begins to move off.\n\n    You can't see a foothold. For a moment you freeze, then you leap for the tailgate. You cling there for a moment before undead hands pull you on board.\n\n    *set visibility +2\n    *page_break\n\n    The truck does not contain any mysterious supplies. At least, if it does, they are hidden inside cartons of milk, boxes of hamburgers, and crates of boots. You try the best you can to conceal a horde of excitable undead around a moving vehicle while maintaining complete silence.\n\n    A bump and a clatter tells you that you are entering the gates of The Base. The truck pulls to a halt. Rays of light spill through the side. You hear gruff voices from the front.\n\n    \"Got the schedule?\"\n\n    \"Yeah.\"\n\n    \"Anything extra in there?\"\n\n    \"Don't worry. I didn't forget.\"\n\n    The driver's door opens and two sets of footsteps come around the side of the truck. You slip your hand against the humerus. It pulses beneath your jacket. Is it your imagination, or is the light changing faster? If the guard comes in, you'll have to—\n\n    An arm slips through the back and gropes around for something in the corner. You hear the clink of a small bottle, then the hand withdraws.\n\n    \"Just don't start it while you're still on duty, eh?\"\n\n    \"Not likely.\"\n\n    You breathe out. The truck drives further into the base, turns, and stops. You take your chance and scramble out the back. Urging your horde to follow, you fade into the darkness.\n\n    *if (luck \u003c 39)\n      A voice snaps out. \"Hey! Is someone there? Stop!\" \n      *set base_alert true\n    *page_break\n    *goto inside\n\n  *if (vampire) #Ask the vampire to help you get inside.\n    $!{vampname} is on the sofa sipping tomato juice from a wine glass. He seems gripped by a rerun of \"Dynasty\". You know him well enough by now to wait for the commercial break before you ask.\n\n    \"It's a military base, you say? Hm. Can't say I care for such places. Too many detectors and light outside the visible spectrum.\"\n\n    You try a small emotional guilt trip about his free accommodation and entertainment.\n\n    \"Oh, fine. But I'm only getting you through the gate, I'm not coming in to help. Now do shove off and let me watch the end of this. Blake's trying to track down a mysterious woman who can clear his name.\"\n    *page_break\n    An hour later, you marshal your forces just out of site of the front gate of The Base. $!{vampname} yawns. \"Filthy night,\" he says. \"Rather you than me.\"\n\n    He walks over to the gate, skirting the brightest pool of illumination. He coughs loudly to attract the guard from the control booth. The man comes over, frowning.\n\n    \"Good evening,\" $!{vampname} says. The guard stares at the vampire. Over the next ten seconds, the only movement is the slow descent of his lower jaw. Then the guard returns to his booth and the gate slides open.\n\n    Wary, you march the horde inside. From his illuminated booth, the guard stares through you, into the distance. $!{vampname} yawns again and vanishes in the direction of home.\n\n    *set luck %+10\n    *page_break\n    *goto inside    \n\n\n*comment #################################################################\n*label inside\n\nThe interior of The Base is a network of narrow roads, odd embankments, and connected compounds. You crouch behind a low wall.\n*if (base_alert)\n  *rand bomb 1 4\n  *set visibility +5\n  *if (bomb = 1)\n    Klaxons sound from both sides. They are strangely muted, as if they are not intended to be audible outside the perimeter.\n    *goto inside2\n  *elseif (bomb = 2)\n    Somewhere towards the fence, you hear several pairs of running footsteps and a low shout.\n    *goto inside2\n  *elseif (bomb = 3)\n    Multiple torch beams play across the road behind you.\n    *goto inside2\n  *else\n    Engines kick into life: one, then another. Are those jeeps? You hear the scratch of tyres as they begin to move. You can't quite place their location.\n    *goto inside2\n*comment endif \n\n*label inside2\n\nThere seem to be three buildings you could investigate. Nearby, off to your left, a low bunker is topped by various aerials. To your right stands a crude, brick hut without windows. Ahead, in the distance, you can just make out movement around a complex of buildings with connecting walkways. Is that a familiar green-yellow light from one window? Or just your imagination?\n\n*choice\n  *selectable_if (security = false) #Investigate the building with the aerials.\n    *set security true\n    *goto security\n  *selectable_if (records = false) #Investigate the windowless building.\n    *set records true\n    *goto records\n  #Set off towards the main complex. \n    *goto lab\n  #Leave while you still can.\n    *goto baseexit\n\n\n*comment #################################################################\n*label security\n\nYou slink towards the bunker. A shadow passes across its narrow window. You alter your course to come at the bunker from the side, keeping your horde in the cover of a sharp embankment.\n\nTwo figures are talking inside, silhouetted against a desk lamp. Light spills on printed documents and open files. As you watch, one of them lifts a folder and moves to the door. Quickly, he disappears into the night.\n\nIt looks like there is only one man left inside. And behind him, a darkened doorway.\n\n*choice\n  #Scare him off.\n    *set humanity +3\n    The appearance of a walking member of the undead is usually enough to frighten any right-thinking person. You send the clerk a\n    *if (skeletons > 0)\n      skeleton, bony limbs clacking and a look of mischief in its hollow eyesockets.\n      *goto scare\n    *else\n      particularly hideous zombie, moaning and staring with a single bloodshot eyeball.\n      *label scare\n      You even get it to stagger away from the door to offer the clerk a working escape route. \n\n      Instead, he snatches up a microphone on a cord and thumps a button on the desk. \"Post 5 here. We've got an outlier. Looks like a type B. Just walked right into the room with me. Will evac as per procedure. Deploy a squad.\"\n\n      He circles his desk carefully, keeping it between him and your minion. Then he sprints out the door and down the road. He looks back before disappearing. Did he see you?\n\n      The room's clear now. But you didn't exactly scare him.\n      *set base_alert true\n\n      *choice\n        #Leave before the squad he mentioned arrives.\n          *goto inside\n        #Quickly investigate the interior.\n          The papers the man was working with are spread out on the desk. They seem to be accounts for base facilities and schedules for regular transports; nothing out of the ordinary. However, there is another doorway at the back of the room.\n\n          *goto revealed\n  #Slaughter him.\n    *label secure_slaughter\n    You feel a strange shiver of relief as you send the horde charging through the door. The clerk inside gasps and freezes for a moment. That's all it takes for your horde to overpower him. He stumbles and topples, taking the chair with him. \n    *if (zombies > 0)\n      A zombie tries to chew its way into his cranium by way of his ear.\n      *goto security2\n    *else\n      A skeleton tears at his ribs with savage glee.\n      *goto security2\n      \n    *label security2\n    Blood sprays across the pool of lamplight, spattering the table and the crisp, white documents.\n    *if ((luck \u003c 43) and (base_alert = false))\n      As he fades, his hand fumbles for a large button and thumps it. Sirens blare from distant parts of The Base.\n      *set base_alert true\n      *set luck %-10\n    *comment endif\n     \n    The dripping documents on the table seem uninteresting: transport schedules and accounts for fuel and electricity purchases. You skirt the carnage and move to the doorway at the back of the room.\n    *set energy %-15\n    *set bodycount +1\n    *set corruption +1\n    *page_break\n    *goto revealed\n\n  #Sneak inside, alone.\n    The door opens silently. The man is bent over his paperwork, making annotations in pencil. The documents seem to be dry, financial stuff. Occasionally he gives a little shake of his head. He reaches for a mug of coffee and drinks without raising his eyes from the columns of figures.\n\n    With slow, deliberate steps, you work your way to the back of the room. \n        \n    *if (control \u003c 44)\n      \"Hey!\" the clerk snaps. \"Who are you?\" He thumps a red button on the desk. In the distance, alarms blare.\n      *set base_alert true\n      *choice\n        #Throw your horde at him.\n          *set luck %-10\n          *goto secure_slaughter\n        #Bluff it.\n          You try to look panicked and claim there is a fire at the front gates and every man is needed. The clerk looks at you for a moment.\n\n          \"I see,\" he says, and stands up. \"Show me?\" As you turn, you hear a sudden movement.\n\n          *set luck %-10\n          *if (energy > 41)\n            You step sideways just in time. A black baton swings through the space where your head was. The clerk closes in on you as you back towards the door. From outside, you hear approaching boots. It doesn't seem like a smart move to fight this guy and a squad of presumably armed soldiers. You sprint off into the gloom, your horde following in their own raggedy way.\n            *set luck %+5\n            *set energy %-10\n            *goto inside\n          *else\n            Everything goes white, then black.\n            *set luck %-15\n            *page_break\n            *goto capture\n        #Run.\n          The clerk leaps from his chair as you move but you stay ahead of his grasping fingers. You burst through the door and charge off into the darkness. His footsteps only follow you for a few seconds. Perhaps he can't leave the building unattended.\n\n          *set luck %-10\n          *set energy %-10\n          *goto inside\n    *else\n      You reach the doorway at the back of the room. The clerk doesn't look up.\n      *page_break\n      *goto revealed\n      \n  #Try somewhere else.\n    *goto inside\n\n*comment #################################################################\n*label revealed\n\nThe anteroom has no windows and is in total darkness. Fumbling around the doorway, you find a light switch. A bare bulb hanging from the ceiling clicks on. It takes you a moment to process what you see.\n\nAlthough the room is compact, its walls are covered with detail. A large map shows the perimeter fence of The Base as it meets the town. A second, on a smaller scale, shows the whole of $!{town}. The map is covered in plastic, and arrows have been drawn on certain streets in red marker. What does it mean? A third map shows…are those air traffic routes? Some have been deleted. It looks like planes have been diverted from flying over this area. Why would anybody do that?\n\nIt's what's on the third wall that makes your veins freeze.\n\n*page_break\n\nOne entire board is covered with photographs of you.\n\nThey have you struggling back from the shops with bags of groceries, sitting on the sofa watching TV, making food in the kitchen. Whoever took these was studying your house with a telephoto lens. You look more closely. In one, your mother's picture of a couple in evening dress dancing on the beach is missing. Your minions broke that only yesterday.\n\nOther photographs relate to the undead. A moment looking back in the street, not long ago, \n*if (chippy_attacked)\n  debris left in the fish and chip shop,\n*if (raised) \n  disturbed plots in the graveyard,\n*if (hair_window)\n  the broken window of Geena's salon,\n*if (sam >= 2)\n  you talking to Sam,\n*if (council_mayhem)\n  surrounded by mayhem in the council chamber,\na zombie drooling on your shoulder, that unfortunate incident with the lawnmower.\n\nIt's clear. They know. They know who you are, they know where you live, and the evidence seems pretty conclusive that you command the dead. Any day now, they will come for you. The question is: will they come with handcuffs or a body bag?\n\nIf you get back home in one piece, you should set up an early warning system. What will it be?\n\n*choice \n  #Station undead in the bushes.\n    Any human would complain about spending long, chilly nights concealed in a thorny bush. Fortunately, the undead don't particularly care whether they are in a lonely, freezing grave or a lonely, freezing shrub. And presumably, they don't show up on infrared.\n\n    Also, it will keep them off the carpet.\n\n    *set early_warning \"sentinel\"\n    *set control %+5\n    *goto back_out\n\n  #Rig a simple tripwire.\n    The army will be expecting to hit a simple, suburban house, not a combat zone. They won't be looking for traps. You can set up something with wire, tin cans, and leftover cola bottles. Although you just know any zombie that comes in or out will knock it over. Better set up several.\n\n    *set early_warning \"tripwire\"\n    *set luck %+5\n    *goto back_out\n\n  #Lay noisy stuff on the ground.\n    It involves a bunch of spadework but you could shift gravel from a neighbour's garden and spread it around. Broken glass would work as well. There might be something satisfying about the physical labour. Of course, it means you will spend the long evenings listening for the crunch of boots on gravel. Better that than the whine of a bullet.\n\n    *set early_warning \"crunch\"\n    *set max_energy %+5\n    *set energy %+5\n    *goto back_out\n    \n*label back_out\n\nYou slip back out into the night. It seems much colder.\n\n*page_break\n*goto inside\n\n\n*comment #################################################################\n*label records\n\nFew lights cover the area around the hut. You get the feeling this was left over from some earlier structure and they built the base around it. Slivers of crimson paint have flaked from the wooden door.\n\nYou listen, ear pressed against the wood. Silence. A heavy padlock secures the door. Neither you nor any undead minion has experience with lock-picking. However, the latch seems a little loose in the frame. You might be able to wiggle it free.\n\n*choice\n  #Try to slip the latch from the frame.\n    Delicate fingerwork becomes harder whilst in near-total darkness on a restricted military installation. You rock the fitting back and forward in the aged frame. It starts to shift—\n    *if (control > 52)\n       and slips free. You will easily be able to reinsert it when you exit, and leave no trace. This is like walking through walls.\n       *set luck %+5\n       *set energy %-5\n       *goto records2\n    *else \n       and the frame splinters. You're in but this is going to be an obvious break-in when the next patrol comes by. \n       *set energy %-5\n       *set visibility +4      \n       *goto records2\n     \n  #Get an undead to knock down the door.\n    *set visibility +8\n    *if (zombies > 0)\n      A drooling specimen with a broken jaw and eyes pointing in different directions steps forward. He begins to wrestle with the door, moving like an ineffective ballroom dance partner. After thirty seconds of this, the doorframe cracks and the entire door topples outwards.\n\n      The zombie crawls out from beneath it. Its head seems a bit squashed. When a guard sees the door, they're going to know you were here all right. Best make it quick.  \n      *goto records2\n    *else\n      A skeleton takes a long run at the door, leaps, and crashes against it. It bounces off like a loose collection of dry bones. Dazed, it veers back, then tries again. It's difficult to see frustration on a face that's lost all fleshy features, but you think you do. It resorts to kicks, elbows, and finally a series of headbutts to the door. Under this assault the door splinters and breaks. It's not so much \"open\" now as \"still closed but with a hole through the middle\".\n\n      That wasn't quiet. You had better limit the time you spend inside.\n      *goto records2\n      \n  #Go somewhere else.\n    *set control %+5\n    *goto inside\n\n*comment #################################################################\n*label records2\n\nThe interior is cramped. It barely has room for a desk and a few filing cabinets. Rather than risk the glare of the ceiling lights, you switch on a small anglepoise lamp clipped to the desk and play its beam around. This is some kind of archive.\n\nThe filing cabinets are locked. You lack the time to prise them open but there are also shelves of box files running around the room. Which file will you examine?\n\n*fake_choice\n  #SITE.\n    Inside the box file are copies of land ownership deeds and a record of changes made to the site. The land was bought from a local farmer by compulsory purchase in 1921. By the 1930s it was a functioning explosives factory. It remained that way throughout World War II and into the 1960s, when the factory was decommissioned. Entries in the late 60s show the demolition of a number of units and a shift in personnel from civilian to military. They also show a number of increased security measures. What would make someone increase security on a site once it stops manufacturing explosives?\n\n    From outside, you hear the tramp of a squad marching. Unless you want to be cornered in a hut the size of your bathroom, you had better move.\n    *page_break\n\n  #EVAC.\n    \"…In the event that political or public scrutiny should render a managed withdrawal from the site impossible, use the following protocol. Legacy devices to be placed and detonated in buildings 17, 21 and 23 in order to simulate chain explosion in an appropriate manufacturing facility. Decontamination crews to eliminate all further evidence of the labs and their specimens. Remaining tanks to be incinerated. Files coded INFRARED and above to be…\"\n\n    From outside, you hear the tramp of a squad marching. Unless you want to be cornered in a hut the size of your bathroom, you had better move.\n    *page_break\n\n  #PRECEDENT.\n    \"ACHILLES. Arrow wound, removed from funeral pyre by goddess THETIS. BODHIDHARMA. Appeared to an ambassador three years after his death. JESUS CHRIST. Crucified but rose from his tomb on the third day. OSIRIS. Dismembered, retrieved and reassembled by wife ISIS. POOMPAVAI. Bitten by venomous snake but raised by SAMBANDAR.\"\n\n    From outside, you hear the tramp of a squad marching. Unless you want to be cornered in a hut the size of your bathroom, you had better move.\n    *page_break\n\n  #Forget it.\n    Reading random files is not going to help you understand why you are a necromancer. You need to understand the humerus itself.\n*comment endif\n\nOn the way out, you catch sight of a line of black and white photographs on the wall. Each is a soldier, men and women standing stiff in military uniform, eyes proud beneath peaked caps. They are mostly young. These might be photos of their graduation from military academy.\n\nEach is stamped with one word in red, and a date. The word is DECEASED.\n\nOne photograph in particular bothers you, of a young man with light eyes and a hint of freckles. Something makes you snatch it from the wall. You scramble into the dark as a patrol comes into view. They make straight for the hut you've just left.\n\nSafe behind another embankment, you examine the photograph again in the yellow glow from a nearby lamp. The face seems familiar…someone you've seen in town…something to do with the Kendall kids?\n\nAt last you have it. This is the soldier that Sean Kendall stabbed, the soldier whose body then rose and walked by itself. This is the soldier you got the humerus from—and your powers of necromancy. There's just one thing about the picture; the date of death stamped on it is two weeks before all that happened.\n\n*set control %+5\n*page_break\n*goto inside\n\n\n*comment #################################################################\n*label lab\n\nA jeep roars past, its headlights picking out a gap you scuttled across only ten seconds ago. Once your eyes readjust to the darkness, you can see a patrol threading its way across the open space, static lights covering the approaches, and a couple of guard posts. Getting to the complex without being caught is going to be tricky. \n\nWhat approach will you take?\n\n*choice\n  #Move fast and try to elude the patrol.\n    *if (energy > 52)\n      The soldiers are watching every shadow, weighed down by automatic weapons, helmets, and armoured vests. You watch the rhythm of their torch beams and dart from hideyhole to hideyhole. The horde blunders after you but at least it blunders quietly.\n\n      *goto lab2\n    *else\n      The soldiers are watching every shadow, weighed down by automatic weapons, helmets, and armoured vests. You watch the rhythm of their torch beams and dart from hideyhole to hideyhole.\n\n      \"There!\" A voice hisses behind you. There is a second patrol following the first, showing no lights—\n\n      A rifle butt flashes and cracks against the side of your head. Everything goes dark.\n      *page_break\n      *goto capture\n\n  #Create a diversion.\n    *if (zombies = 0)\n      You send a skeleton off towards the perimeter and wait. Five minutes later, it begins to bang against the fence. Between that and its bones rattling, it sounds like a drum kit falling apart. The main patrol peels off to investigate and your route is clear.\n\n      *goto lab2\n    *else\n      You find a box of matches in your pocket and send a zombie off with specific instructions to set light to something. It wanders off towards the perimeter. Five minutes later, through the humerus, you feel painful feedback as you attempt to convey the simple movement of scratching the match against the side of the box.\n\n      There is a stage wait.\n\n      *if (luck > 61)\n        BOOM! The ground shakes beneath your feet and a fireball billows into the air some way off. The zombie has managed to set fire to a fuel tank. From here, it looks like a massive roasting marshmallow.\n\n        A siren whines into life ahead. But the main patrol turns away and rushes towards the blaze. Your route is clear.\n\n        *set energy %-10\n        *set luck %+5\n        *set base_alert true\n        *goto lab2\n      *else\n        Ow! You drop the humerus as pain blazes across your skin. You stare after the zombie. Something is on fire, a red, sooty flame flickering with yellow and lilac highlights. It looks sort of human-shaped…yes, it's your zombie. It has followed your instructions by setting fire to itself.\n\n        *set zombies -1\n        *set minion_count -1\n        *if (minion_count = 0)\n          You watch your final minion stagger around until it drops, looking like particularly unappealing barbeque food. This was not how you wanted to end your career as a necromancer.\n\n          *set energy %-10\n          *page_break\n          *goto_scene exile\n        *else\n          Still, the patrol goes to investigate. Your route is clear. You grab the humerus with your sleeve and return it to your pocket before continuing.\n\n          *set energy %-10\n          *goto lab2\n\n  #Forget about stealth and use the undead in a brute force assault.\n    All this sneaking around is not worthy of a necromancer. You can overpower them with the dead. You gather your forces and throw them at the patrol. An undead figure flickers through a torch beam.\n\n    \"Outlier, 2 o'clock.\" As soon as you hear the calm response you know you've made a mistake. The patrol forms up, torchlight trained on the advancing figure. A burst of red light burns the scene onto your retinas.\n\n    *if (skeletons > 0)\n      A skeleton freezes in the crimson radiance, bones dropping as the mysterious force which binds it departs. The skull seems to hang in space for a moment, jaw dropped in surprise, before it, too, falls.\n      *set skeletons -1\n      *set minion_count -1\n    *comment endif\n\n    *if (zombies > 0)\n      A zombie twists in the light, limbs stretched in a frozen, tortured pose. Then it drops like a sack of potatoes. Old potatoes.\n      *set zombies -1\n      *set minion_count -1\n    *comment endif\n\n    *if (minion_count = 0)\n      Left without minions, you flee as fast as you can.\n\n      *page_break\n      *goto_scene exile\n    *else\n      You pull the remainder of your horde away while you still can.\n      *set luck %-10\n      *set control %-10\n      *page_break\n      *goto baseexit\n\n  #Shift from cover to cover to circle around the back of the complex.\n    It's all about shadows and patience. You match the rhythm of the patrols, flitting from one hidden spot to the next, taking a wide route around the building. The darkness is on your side.\n\n    *if (control > 62)\n      It takes a long time but your way to the complex is finally open. You approach from the rear.\n\n      *goto lab2\n    *else\n      In one of the final hiding spots, your foot snags a loose piece of metal. It scrapes on the stone. A red spot moves through the darkness ahead. Is that the end of a cigarette—\n\n      Something slams you in the side of the head and you feel yourself fall.\n      *page_break\n      *goto capture\n\n\n*comment #################################################################\n*label lab2\n\nThere seem to be three buildings connected by enclosed walkways. Little, orange, glowing motion detectors cover the obvious approaches. Perhaps you could get up onto the roof and find a skylight—\n\nA fire exit crashes open to your right. A young man in a labcoat rushes out and doubles up against the wall. He coughs. The coughs become spasms until it seems like he might throw up into the bushes.\n\nWhile he is preoccupied, you slip through the open door. Undead feet shuffle after you.\n\n*set luck %+5\n*page_break\n\n*comment #################################################################\n*label lab3\n\nYou prowl the corridors, your horde following closely behind. The company of the undead brings back the confidence you've been lacking for the last half hour. You pass darkened labs, small lecture rooms, blinking in the light from the overhead fluorescents. Details loom out at you: an anatomy skeleton hanging beside a smartboard, a colourful timeline with a small, black skull marked at a different point on each row, a charred outline on a linoleum floor, and a warning notice reading ONLY YOU CAN PREVENT RECURSIVE FATALITY.\n\nFinally, you reach a narrow window through which you can see a working laboratory. Two women and a man in labcoats and safety goggles watch an assortment of liquid-filled glassware on a bench top. They don't appear to have noticed you. What will you examine first?\n\n*fake_choice\n  #The experiment in progress.\n    You never paid much attention in chemistry class but it seems like three colourless liquids are being combined, one drop at a time. At one stage, the product passes through a gentle flame. At another, it is shaken hard for a period of about ten seconds. And at the end…the mixture has a familiar green/yellow glow.\n\n  #The scientists involved.\n    All three scientists are young—perhaps recently out of university. Their manner is not military; the man has long hair tied in a ponytail. One woman taps a computer tablet while the other records numbers in a large notebook. All three are intent on the process, and yet they never seem to go close to the beaker which contains the output from the experiment. It has a green/yellow glow. Almost like…\n\n  #Security precautions.\n    There do not appear to be any guards in the room. The door might be locked but it features a large, glass panel. There are two cameras at the ceiling, a fire axe mounted on the wall in a glass-fronted box, and a large red button on the wall. It might be an alarm, but the surface reads \"STOP\".\n\n  #The lab's facilities.\n    The lab seems to be a general-purpose setup, with shelves of glassware, sinks, benches with gas taps, a fume cupboard, three computers, a microphone hanging from the ceiling, and two floor-to-ceiling fridges. The rest of the equipment looks extremely expensive and specialised. One unit might be a coffee machine that also does soup.\n\n*page_break\n\nEverything goes wrong in an instant. One of your minions leans on the door, which swings open. The undead topples inside, knocking three beakers from the bench. They smash on the floor.\n\nImmediately, the three occupants of the room look up. Usually this would be when they would recoil in fear. But instead, they move in three different directions.\n\nThe first woman elbows a nearby glass panel and reaches for the fire axe. The second sprints towards a prominent, red button inside a perspex box on the wall. The man snatches up a phone and begins to dial. Your horde awaits an order.\n\n*choice\n  #Prioritise the woman with the axe.\n    If in doubt, stop the onrushing person with the lethal weapon. Your horde overpowers her through sheer force of numbers and the man on the phone is knocked over, the flex pulled out of the wall. However the second woman makes it to the wall, lifts the box and slams her palm onto the button.\n\n    The lights flare red and you stagger back. \n\n    *if (control > 49)\n      Your control of the undead flickers. Terrible pain spikes through your head on every connection. Somehow you overpower the researchers and force them to the ground—but the effort saps you. You slump against the doorframe.\n\n      *set control %-30\n      *set luck %-30\n      *set max_energy %-20\n      *set energy %-50\n      *page_break\n      *goto lab4\n    *else\n      *if (zombies > 1)\n        To your horror, all your zombies drop to the floor, inert. \n      *if (zombies = 1)\n        To your horror, your zombie drops to the floor, inert.\n      *if (skeletons > 1)\n        Your skeletons begin to reel around as if drunk. Individual bones clatter to the floor as the weird force binding them is released.\n      *if (skeletons = 1)\n        Your solitary skeleton begins to reel around as if drunk. Its bones tumble to the floor as the weird force binding them is released.\n      *comment endif\n\n      She has hit some kind of emergency necro-shutdown mechanism. This is extremely bad.\n\n      *if (energy > 42)\n        You see two soldiers approach. You have nothing to fight them with. The only option left is to sprint back the way you came, barging out into the darkness. \n\n        *set luck %-25\n        *page_break\n        *goto_scene exile\n      *else\n        Two soldiers storm into the laboratory and grab you. You struggle but it's hopeless. They drag you to a cold room with no windows and a low bunk.\n\n        *page_break\n        *goto pow \n\n  #Prioritise the woman racing to the button.\n    Your horde gets between the woman and whatever unwelcome emergency stop procedure the button initiates. \n    *if (zombies > 0)\n      Her friend with the axe swings and manages to take the head off a zombie before being overpowered.\n      *set zombies -1\n      *set minion_count -1\n    The man is on the verge of connecting his call when you seize a nearby reference book and fling it at his head. No cranium can resist the thousand pages of [i]A Methodological Approach to Command-Directed Revivification Under the Neuberger Model.[/i] He goes down.\n\n    You and the horde can handle two of them between you. Soon you have the researchers on the floor against the bench.\n\n    *set luck %+5\n    *page_break\n    *goto lab4\n\n  #Prioritise the man on the phone.\n    A minion leaps from bench to bench, kicking the handset away from the man as he dials. \n    *if (minion_count > 1)\n      Another staggers towards the woman with the axe and she comes at it swinging. \n    You are left to throw yourself between the onrushing woman and the button she wants to press.\n\n    \"You little fool,\" she spits in your face as you grapple. \"You're messing with something you don’t understand.\"\n\n    It seems a little late in the game to point this out. Nevertheless, something in her eyes worries you. She eases off as a minion approaches and you push her down to join her colleagues on the floor.\n    *set energy %-15\n    *set control %+5\n    *set luck %-5\n    *page_break\n    *goto lab4\n\n  *if (minion_count > 1) #Try a complicated combo attack.\n    *if (control > 67)\n      It feels like a Bruce Lee moment. Or one of those unlikely slow-motion sequences in more modern kung fu films. One minion intercepts the axe and turns, throwing the axe wielder into the man on the phone. The handset goes flying, its cord coiling in the air in a particularly arty way. The axe drops and spins. A second minion blocks the woman reaching for the red button, slapping her hand away. It blocks once, twice, three times, then simply turns its back and leans on her. She thumps to the floor.\n\n      And it's over. All three researchers are on the floor; your multiple minions are poised and unharmed. You impress even yourself.\n\n      *set control %+10\n      *set luck %+10\n      *set energy %-25\n      *page_break\n      *goto lab4\n    *else\n      One minion keeps the woman away from the red button but a second gets involved in a struggle for the axe. The man with the phone ducks behind a bench. \"Emergency!\" he snaps. \"Incursion, Lab H!\"\n\n      So much for that. You had better split while you can. You kick off the remaining woman and flee down the corridor, minions stumbling after you. Incredibly, they all seem present and accounted for.\n\n      You burst into the night air and head for the cover of darkness. Did you learn something from that?\n\n      *set luck %-20\n      *page_break\n      *goto baseexit\n\n*comment #################################################################\n*label lab4\n\nThe researchers stare up at you, glancing at the undead. The way they look tells you two things: they are not surprised to see the dead walking, and they all know who you are. You have the distinct feeling that they know why this is all happening.\n\nYou don't have long. You borrow some line from a gritty cop TV show about the first one to speak getting to keep their good looks.\n*if (skeletons > 0)\n  A skeleton's yellow teeth clack together one inch from the man's ear.\n*if (zombies > 0)\n  A zombie leans close and drools directly into the ear cavity of one woman.\n*comment endif\n\nThey all talk at once.\n\n\"It's an efficiency project, really—\"\n\n\"We're not military, we're civilian contractors—\"\n\n\"The project harnesses residual voltages, the body's magnetite, and established neural paths. Originally we thought cerebral implants would be necessary but it turns out that with chemical capture and a focused will in charge, the tissues of the deceased can be animated and controlled—\"\n\nYou shut them all up and demand an explanation from the woman in the middle, who seems the most coherent.\n\n*page_break\n\n\"It comes down to resilience,\" she says, her eyes wide and clear. \"The army expects a soldier to continue to fight upon equipment failure. If their vehicle is wrecked they proceed on foot. If their rifle breaks they switch to a sidearm or improvised weapon. The one failure which stops a combatant is…when the human's life is extinguished. So this project was set up to overcome that difficulty. With this technology, the soldier continues to fight beyond the point of death.\"\n\nYou stare at her.\n\n\"You have a bone filled with fluid, yes? It's a focus for command distribution, normally used by a commanding officer in theatre. It was one of our early, autonomous units and it went missing. One of our…fresher subjects managed to take it and go AWOL. They don't lose a lifetime of habits, even in death. But you've probably noticed that.\" She gives a hesitant smile. \"They bond to strong personalities. You might have done well in the army.\"\n\nThis is a lot to think about. You want to stay and get every detail—but you know how that ends: guards flooding in and you becoming the latest test subject for the puppet makers here.\n\n*set revelation true\n*achieve truth\n\n*choice\n  #Spare the woman and kill the other two, as promised.\n    *label killtwo\n    It's hardly fair. They all wanted to talk. You selected the woman who would get the free pass. But life's not fair. They chose to experiment with mortality, to take a military contract, and now the consequences have arrived from beyond the grave. It may not be fair but it's not entirely unfair, either. You send in the undead.\n\n    The researchers huddle together, eyes squeezed shut. \n    *if (minion_count = 1)\n      Your minion falls on them with enthusiasm, tearing and chewing.\n    *if (minion_count > 1)\n      Undead come at them from either side, yellow teeth gleaming.\n    *comment endif\n    \n    The blows are fast and deep. The two on the outside go down gurgling. The woman in the middle shakes but you pull back your horde with a strain that makes your hands shake. White eyes stare at you from a face covered in blood.\n\n    Time to leave.\n\n    *set corruption +6\n    *set bodycount +2\n    *page_break\n    *goto baseexit\n\n  #Kill all of them.\n    *label killthree\n    These three have danced with death in the name of their research. Well, the music is about to stop.\n    *if (minion_count = 1)\n      You simply ease off your control and let your minion have its way.\n\n    *if (minion_count > 1)\n      You send your minions in from both sides.\n    *comment endif\n\n    Two of the researchers wail, scrambling across the floor. The man tries to grab the edge of the bench even as undead hands tear at his spine. He coughs blood, hands pounding the wall, spattering messy red symbols like fingerpaint. His last publication. The first woman continues to scream until a minion grabs her neck and twists it all the way round.\n\n    The second woman, the one who told you the truth, makes no sound. She simply stares you in the eye until undead legs block your view. She dies softly, quietly, her final breath barely a whisper.\n\n    *set corruption +3\n    *set bodycount +3\n    *page_break\n    *goto baseexit\n\n  #Spare them and leave the area.\n    *label killnone\n    Undead instincts pull at you, urging murder, carnage. Perhaps these three deserve it for the forces they harnessed, the damage they did to your life. But they've looked death in the face, here and now. They will be thinking about this day for a long time, and they might never sleep well again.\n\n    You command a minion to lean close and gaze at each of them in turn. OK, now they've [i]definitely[/i] looked death in the face. You pull with the humerus and your minion comes. The researchers huddle together on the floor, trembling. Their eyes follow you as you turn away.\n\n    *set humanity +10\n    *page_break\n    *goto baseexit\n\n  #Give the bone back.\n    You pull the humerus from your jacket. Its eerie glow reflects in the three pairs of eyes before you. They follow its light as you walk forward and slap the thing down on the lab bench. There it sits, one gnarled stump at either end of the liquid interior. Could you give it up? It would mean no more cleanup, no more moaning in the night, no more sharing your living space with the dead. And yet…it would be the end of the power you have. The end of feeling special.\n\n    When you turn away, the humerus is back in your hand. You don't remember picking it up.\n\n    *set control %+5\n    *set humanity +2\n\n    *choice\n      #Kill two of the researchers but leave the woman who explained.\n        *goto killtwo\n      #Slaughter all of them.\n        *goto killthree\n      #Kill nobody and make your escape.\n        *goto killnone\n\n\n*comment #################################################################\n*label capture\n\nYou come to on a bunk in a white room with dazzling lights. Your head throbs. Your first urge is to reach inside your jacket to feel for the humerus, but you check that instinct as you spot a camera in the corner of the ceiling. Instead, you shift a little on the bunk. The bone touches your ribs. Seems like they haven't searched you. But they surely will, and if they take the humerus away, you will be helpless.\n\nYou roll over a little and slip a hand inside your jacket to touch the humerus. Closing your eyes, you can feel the horde, still out there somewhere, roaming the grounds.\n\nAs you sit up, pain flares in your temple. You are going to have some nasty bruising there. You try the door. It's locked.\n\n*choice\n  #Call the undead.\n    You turn your back on the camera and send a desperate call for aid using the humerus. Nothing happens for twenty minutes. Then you hear a scream in the corridor, two shots, a thump, a siren, and finally a slow dragging outside the door.\n\n    There follows a slow, ineffective beating on the door. Eventually the lock clicks and you pull it open.\n\n    *if (zombies > 0)\n      A zombie leans against the doorframe. It has somehow managed to get its foot wedged into the mouth of a dead man in camouflage. A smear of blood along the corridor shows how far it has dragged the unfortunate soldier.\n\n      There is something so pitiful about the sight that you take valuable time to extract its stump of a foot from the man's mouth.\n\n      *if (skeletons > 0)\n        You grab the humerus for a quick update on the situation. One skeleton has gone down and is not responding.\n        *set skeletons -1\n        *set minion_count -1\n      *set bodycount +1\n      *goto saved\n    *else\n      A skeleton stares at the door as it opens, fascinated by the simple mechanism which can be used to authorise or prevent entry to the room beyond. You make a mental note to introduce it to \"handles\" back at home. Down the corridor behind it, a soldier lies with his head twisted at a lethal angle.\n\n      *if (zombies > 0)\n        You grab the humerus for a quick update on the situation. One zombie is not responding. You suspect it now lies in several pieces.\n        *set zombies -1\n        *set minion_count -1\n      *set bodycount +1\n      *goto saved\n    *label saved\n    You have obviously lost the element of surprise. Do you still want to investigate the complex—or is being captured once enough for today?\n\n    *set base_alert true\n    *choice\n      #Press on through the complex.\n        You've come too far tonight. You're not going home without finishing the job.\n        *set control %-5\n        *goto lab3\n      #Make a discreet exit.\n        A cold breeze blows from down the corridor. You follow it, stepping over more soldiers with tell-tale punctures in their necks, until you reach an exterior door hanging open. You slip out into the night.\n        *set control %-5\n        *goto baseexit\n\n  #Wait for the door to open, then make a desperate burst for freedom.\n    Nothing changes for nearly an hour. Then you hear footsteps in the corridor. The lock clicks. Two burly figures block the doorway—\n    *if (energy > 68)\n      but you slip between their legs and bolt down the corridor.\n\n      \"Oi!\" They charge after you. You race down corridors painted in institutional green, passing warning notices, cabinets containing…but you can't slow down to see. You find a fire exit and burst outside into the dark.\n\n      Any hope you had of investigating this place is shot for now. You sprint for the fence, gathering undead as you run.\n\n      *set luck %+10\n      *set base_alert true\n      *page_break\n      *goto baseexit\n    *else\n      and grab you the moment you try to bolt.\n\n      *label pow\n      \"Search him,\" orders the one with the hard face and little moustache. The other grabs your jacket. You hold off for about ten seconds, holding on to the humerus with all your strength. But before you can send a summons, the soldier tears it from you and swats you to the floor. The liquid inside the bone seems to fade. You feel your connection to the undead dissipate, like the last sparks from a dying firework.\n\n      *page_break\n      *goto_scene fail\n  *if (vampire) #Call $!{vampname}.\n    You turn your back on the camera and send a desperate call for aid using the humerus. Nothing happens for half an hour. Then the lock clicks and the door opens.\n\n    $!{vampname} stands there, wiping his mouth. He looks cross. Behind him, you see two soldiers on the floor, blood pooling beneath them. \n\n    \"I didn't sign up for this kind of shindi
