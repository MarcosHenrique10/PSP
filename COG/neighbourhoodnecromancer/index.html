   *set energy %-50\n      *goto stone2\n\n    *label stone2\n    Derek Stone slams a fist into his palm. \"Come on!\" he yells. You look into his eyes and see for the first time that he is not quite as sure of himself as he was. But what condition are you in?\n\n    *set control %+10\n    *set max_energy %+5\n    *choice\n      #Finish it by hand.\n        Angry but in control, you think about that volleyball to the face. You concentrate on Derek Stone's sneering visage and go in hard.\n\n        *if (energy > 41)\n          He lands a couple of blows on your shoulder but he is tiring and moves too slowly. You land one to his guts, one to his neck, and one in the eye. He drops like a sack of cabbage.\n\n          You look around at the spectators, trying for icy control in your moment of victory. They seem distracted. You look around.\n\n          *set luck %+15\n          *set humanity +1\n          *page_break\n          *goto post_fight\n        *else\n          Your initial assault knocks him back but he recovers his balance. You lunge and miss; something slams against the side of your head. Then you're on the ground, eating dirt.\n\n          \"Hah!\" spits Derek Stone. You expect a boot to the ribs but you see his feet turn, and he bolts.\n          *set control %-15              \n          *set humanity +1\n          *page_break\n          *goto post_fight\n      #Allow the undead to torment him.\n        *goto humiliate\n      #Allow the undead to kill him.\n        *goto slaughter\n  #Order the undead to humiliate him.\n    *label humiliate\n    This necromancy business has caused you a lot of personal bother. You're not about to put aside the benefits for somebody else's idea of a fair fight. You give the order.\n\n    *if ((humanity > 7) and (control \u003c 38))\n      Yet before you've even completed the command, you feel resistance from your minions; a bloodthirst which blots out your instructions.\n      *set luck %-10\n      *goto humiliate_fail \n    *comment endif\n\n    *if (scommit > 0)\n      A skeleton darts forwards and pulls down Derek Stone's trousers. In fact, it pretty much rips them off, and his underwear with them. His combat stance falters, then his hands flash down to cover his junk.\n\n      *goto humiliate2\n    *else\n      A zombie lumbers forward. Derek Stone pops it once, twice, three times in the face. You hear a matching series of squelches. Even as Derek's face wrinkles, the zombie paws his front and then begins to chew on his trousers. As he batters it off, the fabric rips and both trousers and underwear come off in the zombie's mouth. Derek's hands flash down to cover his junk.\n\n      *label humiliate2\n      There is a strange silence. You can see the other kids trying to work out how to react. On one hand, undead terror from beyond the grave. On the other, bloke with no trousers on. Eventually they seem to opt for what they know, the fingers raise and the giggles begin. Derek Stone stomps off with as much dignity as anybody can manage with torn trousers around their ankles.\n      *set luck %+10\n      *set humanity +2\n      *page_break\n      *goto aftermath\n  #Order the undead to slaughter him.\n    *label slaughter\n    The thing about these guys is, they're used to being in charge. But they're not in charge. You are a [i]bona fide[/i] necromancer and you do things differently. You give the order.\n\n    *label humiliate_fail\n    *if (zcommit > 0)\n      A zombie lumbers forward. Derek Stone pops it once, twice, three times in the face. You hear a matching series of squelches. Even as Derek's face wrinkles, the zombie reaches its arms around his neck to embrace him. He tries to pull away—and the zombie bites into his face.\n      *goto slaughter2\n    *else\n      A skeleton skips forward. Derek Stone punches it in the face. Its skull snaps back, then forward again. \"Ow!\" Derek yells, shaking his hand and blowing on the knuckles. The skeleton raises its hand, flat, stiffens—and rams the fingers into his throat.\n\n      *label slaughter2\n      It bears him hard to the ground. The bystanders shriek and split all around you. You watch them go as blood sluices across the tarmac. Your minion finishes Derek Stone off. When it stands up, it's red and dripping.\n      *set luck %+10\n      *set corruption +2\n      *set bodycount +1\n      *page_break\n      *goto aftermath\n  *if (minion_count > 1) #Scatter the undead for general mayhem.\n    You flick your fingers over the humerus and send your forces in opposite directions. In the resulting panic, Derek Stone is momentarily distracted. You slip through fleeing schoolkids to a safer distance.\n    *set energy %-15\n    *goto wall\n\n*comment *****************************************************************\n*label post_fight\n\nWhile you've been concentrating on the fight, your control over the undead seems to have slipped. \n*if (minion_count = 1)\n  It wheels around the area, lunging towards random kids.\n*if (minion_count > 1)\n  They roam around the school grounds with predatory intent.\n*comment endif\n\nThe less committed spectators have scrambled to a safe distance. A first-year boy is standing frozen, screaming, a spotless sports bag strung around his neck. \n\nSome older kids seem prepared to make a stand. One boy has a cricket bat. Two girls flank him with hockey sticks. You recognise them from the snooty, popular crowd. One of the girls tripped you up once and laughed. \n\n*set slipped true\n\n*page_break\n*goto hitandrun\n\n*comment *****************************************************************\n*label mob\n\n*if (minion_count = 1)\n  Your minion advances to the attack. There might only be one of it but it's animated through supernatural means. That's got to be worth something.\n  *set luck %+5\n  *goto mob2\n*else\n  Your horde charges the resisting schoolkids in its own awkward way.\n  *set luck %+5\n  *goto mob2\n\n*label mob2\n\nAny idea that your fellow pupils will be a pushover is quickly dispelled as the girls form a cross-block with two hockey sticks, holding the undead in place for a strike with the cricket bat.\n\nLike yourself, they've seen all the zombie films. Most of them probably have up-to-date console games too. In fact, they probably feel more comfortable fighting undead than learning advanced trigonometry.\n\n*choice\n  #Throw your own combo attack back at them.\n    *goto control_attack\n  #Repeatedly feint to wear them down.\n    *goto energy_attack\n  #Forget subtlety. Just whack them.\n    *goto luck_attack\n\n*comment *****************************************************************\n*label hitandrun\n\n*if (minion_count = 1)\n  *goto mob\n\nYour minions circle the little group of resisting schoolkids. The girls turn and jab at them, keeping them at the length of a hockey stick. Every time one gets too close, the boy swings the cricket bat at its head.\n\nLike yourself, they've seen all the zombie films. Most of them probably have up-to-date console games too. In fact, they probably feel more comfortable fighting undead than learning contemporary literature.\n\n*if (slipped)\n  You have to get the horde back under control without getting them wiped out.\n*comment endif\n\n*choice\n  #Hit the kids early and fast.\n    *set control %+5\n    *goto luck_attack\n  #Overwhelm them with small attacks.\n    *set control %+5\n    *goto energy_attack\n  #Try something intricate and misleading.\n    *set control %+5\n    *goto control_attack\n\n*comment *****************************************************************\n*label control_attack\n\n*if (scommit > 0)\n  A skeleton uses its bones as a cross-block, attempting a disarm.\n*if (zcommit > 0)\n  A zombie impales itself on a hockey stick to immobilise one of the girls.\nYour adversaries frown and try to compensate.\n\n*if (control > 44)\n  One minion pulls off a counter and strike that Bruce Lee would have been impressed by. Using one of the hockey sticks as a lever, it locks all three of the enemy together and trips them as one.\n  *goto triple_victory\n*else\n  One minion counters, shifts—but the movements are just too subtle and there are too many variables to keep track of. The girls lock their sticks and move like bratty kung fu twins.\n  *goto triple_defeat\n\n*comment *****************************************************************\n*label energy_attack\n\n*if (scommit > 0)\n  A skeleton jabs its bony fingers at the trio, dancing in and out with malevolent glee.\n*comment endif\n*if (zcommit > 0)\n  A zombie tries a new tactic of repeatedly getting bonked on the head, but only with glancing blows.\n*comment endif\nYour adversaries grit their teeth and persist.\n\n*if (energy > 41)\n  They falter first. The bat and the sticks take a lot of energy to swing. They slow…then lower a little. Your minion seizes the right moment and gets inside their guard.\n  *goto triple_victory\n*else\n  These are kids who ate sugared cereal for their breakfast less than an hour ago. You are deploying an uncanny power you don't understand to control the undead. It seems kind of obvious in retrospect that you would tire first.\n  *goto triple_defeat\n\n\n*comment *****************************************************************\n*label luck_attack\n\n*if (scommit > 0)\n  A skeleton shuffles in front of the group in a sort of uncanny version of the Charleston.\n*comment endif\n*if (zcommit > 0)\n  A zombie, still moving slowly, executes a nice lean-and-twist maneouvre which allows it to slide through the hockey sticks. \n*comment endif\nYour adversaries blink, suddenly confused.\n\n*if (luck > 45)\n  The moment is enough. Your minion steps in with a sort of elbow-knee-drunken-monkey combo move and somehow ends up with the cricket bat. It swings with an enthusiastic lack of finesse.\n  *goto triple_victory\n*else\n  The kids shake it off quickly and move with new purpose. Their simple discipline and vigour overwhelms any daft attempt at distraction your undead might make.\n  *goto triple_defeat\n\n*comment *****************************************************************\n*label triple_victory\n\n*set energy %-40\n\nThe boy is knocked to the ground, then one of the girls. The second girl stares at your advancing minion and takes to her heels. \"Help! Help! They've got Natalie!\" she yells.\n\nNatalie crawls around on the tarmac, blood dripping from the corner of her mouth. The boy shakes his head, eyes unfocused. One hand seems to be trying to find his cricket bat.\n\n*set control %+5\n*set luck %+10\n*page_break\n\n*if (lethal)\n  *goto kill_triple\n*else \n  *goto spare_triple\n\n*comment *****************************************************************\n*label spare_triple\n\nYou advance on the helpless pair. They peer up at you, breathing hard. The humerus pulses through your fingers. You tell them you're sparing their lives so they can spread the word. It's the end of the reign of the popular kids. From now on, if you hear about bullying, whoever did it will be getting a visit from the dead, when they least expect it. And the dead prefer to come by night.\n\nYou watch the words sink in, and then you turn away.\n\n*if (humanity > 12)\n  It takes a moment before you realise \n  *if (zcommit > 0)\n    a zombie hasn't moved with you.\n    *goto spare_triple2\n  *else \n    a skeleton hasn't moved with you.\n    *goto spare_triple2\n*else\n  *set humanity +2\n  *page_break\n  *goto aftermath\n\n*label spare_triple2\nIt's resisting your commands! You turn back and concentrate, gripping the humerus, forcing your will into its limbs.\n\n*if (control > 55)\n  It freezes for a moment, then steps back, seemingly under your control again. This is something you will need to look out for.\n  *set humanity +2\n  *set luck %+10\n  *page_break\n  *goto aftermath\n*else\n  Too slow. It falls upon the boy, pounding his head into the tarmac. There is a sickening crack and he slumps, body loose.\n\n  You didn't do that. You didn't do that. \n\n  The girl stares at you. You turn away. This time, the minion obeys.\n  *set bodycount +1\n  *set control %-15\n  *set luck %-10\n  *page_break\n  *goto aftermath    \n\n*comment *****************************************************************\n*label kill_triple\n\nYou advance on the helpless pair. They peer up at you, breathing hard. The humerus pulses in your fingers.\n\n*if (minion_count = 1)\n  Your remaining minion knows what to do without a command. It moves closer, homing in on their fear. Then it lunges. Their necks snap—CRACK! CRACK!—and they lie still.\n  *goto kill_triple2\n*else\n  Your minions know what to do without a command. They advance with the slow steps of inevitable death. Then they drop, and—CRA-CRACK!—you hear your enemies' necks snap.\n  *goto kill_triple2\n\n*label kill_triple2\n\nYou look across to the school building, its empty windows reflecting a hazy sun. One thing is sure. School will never be the same again.\n\n*set bodycount +2\n*set corruption +2\n*set control %+5\n*set luck %+10\n*page_break\n*goto aftermath\n\n*comment *****************************************************************\n*label triple_defeat\n\n*set energy %-40\n\n*if (scommit > 0)\n  The skeleton loses its balance and goes down onto one knee. The girls peel off to each side and launch a rain of blows at its joints: shoulders, elbows, knees. One particularly well-placed swing dislocates its hip. It topples, jaw loose, a strange picture of confusion. The boy steps forward and smacks it in the face. With a CLUNK, the head drops to the ground, rolling over and over.\n  *set skeletons -1\n  *set minion_count -1\n  *set scommit -1\n  *set luck %-10\n*if (zcommit > 0)\n\n  You try to pull out the zombie but it turns too slowly. The trio are on it. The cricket bat strikes again, again, each impact sounding like a blow to a wet punchbag. The hockey sticks slice into the putrefied flesh. Slowly, inevitably, the zombie is cut to pieces in front of you.\n  *set zombies -1\n  *set zcommit -1\n  *set minion_count -1\n  *set luck %-10\n*comment endif\n\nIt's obvious what will happen next. You make yourself scarce while the trio examine the carnage they have created.\n\n*page_break\n*goto aftermath\n\n*comment *****************************************************************\n*label aftermath\n\nYou find a quiet spot near the back of the school where you can climb up, catch a breather, and still have an escape route over the wall. You guess you're not going to classes any time soon.\n\nAfter a moment, you hear the click of approaching feet. Weary, you get ready to flee. Then a familiar face peers around the corner. It's Max, one of the in-crowd and someone you've always found it difficult to take your eyes off of.\n\n*choice\n  #Wait for Max—who's a girl—to notice you.\n    You've been in a few classes with Max. Her full name is Maxine, but everybody calls her Max. It seems inappropriate because she's quite a minimal person. Her clothes and jewellery are simple but look expensive. Even when her crowd get excitable and raucous, she's always a little detached, with a smile that says she sees more and knows more than she lets on.\n\n    *set mhim \"her\"\n    *set mhis \"her\"\n    *set mhe \"she\"\n    *set mbf \"girlfriend\"\n    *set humanity +1\n    *goto max_wall\n\n  #Wait for Max—who's a boy—to notice you.\n    You've been in a few classes with Max. His full name is Maxwell, but everybody calls him Max. It seems inappropriate because he's quite a minimal person. His clothes, his watch, his shoes—they're simple but look expensive. Even when his crowd get excitable and raucous, he's always a little detached, with a smile that says he sees more and knows more than he lets on.\n    *set mhim \"him\"\n    *set mhis \"his\"\n    *set mhe \"he\"\n    *set mbf \"boyfriend\"\n    *set humanity +1\n    *goto max_wall\n\n  #Drop over the wall and get out of there before Max sees you.\n    You shift your legs over the edge and drop out of sight.\n    *if ((zcommit > 0) or (scommit > 0))\n      With one hand on the humerus, you issue a recall order to the undead.\n    *comment endif\n\n    Today was complicated enough and you're out of idle conversation.\n\n    *page_break Next Day\n    *goto_scene stageone\n\n*label max_wall\nMax's eyes finally meet yours. \"What are you doing up there?\" $!{mhe} doesn't really seem to expect an answer. $!{mhe} climbs up and sits beside you. You're not sure how to react. The wall feels uncomfortable all of a sudden.\n\n\"Big day, huh?\" Max says. \"Undead roaming the school grounds. Beats that time Nik Shields stole the JCB digger and drove it down the steps.\"\n\n*set max 1\n\n*fake_choice\n  #Claim not to have seen any undead.\n    \"Yeah? Like hell.\" Max punches you on the shoulder, but not hard. \"I suppose you missed the screaming and the panic too.\"\n  #Agree and act cool.\n    You nod and make a noise of assent in your throat. Max nods too.\n  #Ask if Max is OK.\n    \"I'm fine,\" ${mhe} says. \"Going to take a while to forget that smell though.\"\n  #Tell another story about Nik Shields.\n    You remember an incident about Nik Shields setting a flag on fire and jumping off a roof with it. Max snorts. \"Yep,\" ${mhe} says. \"Sounds about right.\"\n*comment endif\n\nMax shifts on the wall to straddle it and sits in silence for a moment. You feel ${mhis} eyes on you. \"Of course, I know who brought them,\" ${mhe} says. \"I didn't realise you were a necromancer.\" Max grins. \"You never show it in class.\"\n\nYou risk a glance at Max, at those blue eyes and that immaculate frame of blonde hair. There is something conspiratorial in that gaze, something you can't quite read. The corner of ${mhis} mouth turns up and ${mhe} blinks slowly.\n\n*choice\n  #Admit it and talk a little.\n    You own up to being a necromancer but explain you're new to the game.\n\n    Max nods like ${mhe} already knows all about it. \"If it were me, I'd have brought them to school too,\" ${mhe} says. \"Lots of irritating people you can shut up in one day.\" $!{mhe} looks past you for a moment and smiles. \"But I've got to tell you—you did it with a certain style.\"\n\n    *set max +1\n    *goto max_wall2\n  #Deny it.\n    \"$!{name},\" Max says, ${mhis} voice gentle. \"I saw you. Not everybody did. A lot of these bozos just saw walking corpses and ran. But I saw you concentrating, making those little movements. Even now, I can see that weird thing shining in your pocket. You can keep on denying it but it'll just make for a tedious conversation.\"\n    *set humanity +1\n    *goto max_wall2\n  #Slip over the wall and withdraw from this conversation.\n    You break Max's look and slide over the wall, thumping to your feet. You stride away as quickly as you can manage, your heart hammering in your chest. You realise this whole necromancer thing can't go on indefinitely. In fact, it probably won't go on for very long at all.\n\n    \"Hey! $!{name}! Don't be like that.\"\n\n    $!{mhis} voice is smooth, persuasive. You head home before you change your mind.\n\n    *set control %+5\n    *page_break Next Day\n    *goto_scene stageone\n\n  *if (minion_count > 0) #Pull a minion back to kill Max.\n    You make a little movement with the humerus, then turn to face Max. You say some non-committal things and keep ${mhis} attention on you. Even as you notice your minion approaching in your peripheral vision, you resist the urge to look at it.\n\n    \"So,\" Max says. \"Do you…\"\n\n    Your minion tears ${mhim} off the wall. Max lands on ${mhis} head and cries out. The kill happens fast, undead limbs flashing down and down again. There is a soft noise, a spray of blood, and Max is no more.\n\n    The undead has its savage way with the corpse, tearing limbs this way and that. You give it a minute before recalling it to head home.\n\n    *set corruption +3\n    *set bodycount +1\n    *set max 99\n    *page_break Next Day\n    *goto_scene stageone\n\n*label max_wall2\nMax looks in your eyes again. $!{mhis} attention is flattering. $!{mhe} stretches out a finger and touches you lightly, just under your ear. $!{mhe} strokes down to your chin. The skin tingles. Something stops you pulling away. \n\n\"You can do something special here,\" Max says. \"I expect mayhem on a grand scale. An epic scale. I'll be watching.\" $!{mhe} slips off the wall and walks away, giving one quick glance over ${mhis} shoulder.\n\nYou really don't know how to feel about that.\n\n*set max +1\n*page_break Next Day\n*goto_scene stageone\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*comment ####################################################################\n*comment Neighbourhood Necromancer screenshot file\n*comment ####################################################################\n*set control 57\n*set luck 45\n*set energy 64\n*set corruption 13\n*set humanity 12\n*set visibility 1\n\n\nYou wait until late afternoon, when the light is fading. As you draw close to \"Cut and Colour\", you see figures inside. There are three women sitting around, and an elderly man in the chair. Geena, the stylist, is sporting a purple, ruffled blouse and has her hair pulled up in an unearthly bun. She looks over her shoulder at her cronies as she snips. Even from a distance, you are nervous about her customer's ears.\n\nAs you consider your approach, she waves a hand mirror at the man and removes the protective cape. He pays up and staggers from the shop, patting regions of his head.\n\nHow will you approach your mission of wrath against the hairdressers?\n\n*fake_choice\n  #Get a haircut and improvise while in the chair.\n  #Attempt to lure the inhabitants out into the open.\n  #Send a zombie in for a trim.\n  #Full-on undead assault.\n\n*comment ####################################################################\n*script changeBackgroundColor(\"black\")\n*set control 36\n*set luck 51\n*set energy 73\n*set corruption 18\n*set humanity 19\n*set visibility 5\n\nYou slip around the side of the building and peer in the window.\n\nAl is squaring up to the zombie behind the counter, his hands knotted into beefy fists. \"Gerraway!\" he shouts. \"I just got the hygiene certificate back for this place!\" He seems about to throw a punch at the zombie's festering face, then thinks twice and shoves it in the chest. The zombie staggers back against the tiled wall.\n\nAl, for some reason, takes the opportunity to slip his hands into blue latex gloves.\n\n*fake_choice\n  #Press the attack.\n  #Topple the boxes of supplies.\n  #Contaminate the fryer with zombie fingers.\n\n*comment ####################################################################\n*script changeBackgroundColor(\"sepia\")\n*set control 65\n*set luck 74\n*set energy 39\n*set corruption 44\n*set humanity 38\n*set visibility 48\n\nThese skeletons represent half your undead army. You can't afford to lose them. Worse, whatever mayhem they cause will be blamed on you. It's not that you are against mayhem, exactly. You just like to select the form it takes.\n\nYou can follow the trail of devastation from the house towards the town. Dustbins have been turned over and garden furniture stacked into odd towers. It leads you to a small side street with a music shop on it.\n\nYou've often passed this shop. It's rarely open, and you have never seen it sell anything. But its window has been smashed and there are two instruments missing from the dusty, faded display. Both trumpets.\n\nAs you examine the display, you hear the trumpet sound again, a brash fanfare with more enthusiasm than skill.\n\n*fake_choice\n  #Examine the window for clues.\n  #Try to reason out how a skeleton could play a trumpet.\n  #Hurry in the direction of the trumpet sound.\n\n*comment ####################################################################\n*set control 56\n*set luck 35\n*set energy 64\n*set corruption 76\n*set humanity 54\n*set visibility 65\n\nYour horde charges the resisting schoolkids in its own awkward way.\n\nAny idea that your fellow pupils will be a pushover is quickly dispelled as the girls form a cross-block with two hockey sticks, holding the undead in place for a strike with the cricket bat.\n\nLike yourself, they've seen all the zombie films. Most of them probably have up-to-date console games too. In fact, they probably feel more comfortable fighting undead than learning advanced trigonometry.\n\n*fake_choice\n  #Throw your own combo attack back at them.\n  #Repeatedly feint to wear them down.\n  #Forget subtlety. Just whack them.\n\n*comment ####################################################################\n*set control 86\n*set luck 43\n*set energy 49\n*set corruption 33\n*set humanity 82\n*set visibility 38\n\nYou have to pop out to the corner shop for supplies: milk, bread, skin cream for the zombies, mineral oil for the skeletons, and industrial-strength cleaner for…well, everything. On the way into the shop, you collide with a black-clad figure in big, goth boots. It's Sam, whom you know from school. You feel heat in your cheeks and mutter apologies as you squeeze past.\n\nIs it because you find Sam attractive? Admit it.\n\n*fake_choice\n  #Yes, and Sam's a boy.\n  #Yes, and Sam's a girl.\n  #I am a solitary necromancer with a secret life. I find no-one attractive.\n", "setup": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, setup\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\nThe street is thick with mangled cars and billowing smoke. All around, the cries of the dying form brief, unsettling harmonies with the moans of the shambling dead.\n\nA red double-decker bus tilts over you at an alarming angle, tyres punctured, emergency exit door hanging open. Its driver lies slumped across the steering wheel, sightless eyes staring ahead to a junction he will never reach. The limbs of luckless passengers trail from broken windows.\n\nA water main has ruptured. Its flow is tainted with blood; dark swirls in a new river head for the oblivion of black drains. Soon those drains will fill beyond capacity and the street will begin to flood with the remnants of dead.\n\nYou should run. The dead are here, all around you, their faces tinged a sickly blue. They seem lost, without direction. Yet others are approaching with an odd, red cast to their features. Their rage is concentrated on you.\n\n*choice\n  #Run!\n    *set max_energy +1\n    *set energy +1\n    *page_break\n    *goto real_start\n  #See if anybody else needs help.\n    *set humanity +1\n    *page_break\n    *goto real_start\n  #Use a wounded person to distract the attackers.\n    *set corruption +1\n    *page_break\n    *goto real_start\n  #Try to find a tactical advantage.\n    *set control +1\n    *page_break\n    *goto real_start\n  #Check nearby cars for a weapon.\n    *set luck +1\n    *page_break\n    *goto real_start\n\n\n*comment *****************************************************************\n*label real_start\n\nYou stare down at the little grid of city blocks and the brightly-coloured plastic figures spread across it. It doesn't matter how much you use your imagination. [i]Zombie Wars[/i], the boardgame, sucks. Everything you want to do means rolling at least fifteen dice and adding them all up, and most of the time, the number you get means FAIL.\n\nRobbie, however, is bobbing in his seat across the table. He thinks he is winning and also he has drunk too much cola. He stares at a handful of creased cards and bites his lip. He is a total dork but he is also your only actual friend at school.\n\nYour blue zombies are scattered all over the street. Robbie's red zombies are pouring out from behind a wrecked bus. It's your move. What will you do?\n\n*choice\n  #Try to topple the bus onto the red zombies.\n    Robbie's eyes widen with excitement as you try this elaborate and stylish move. There is a ten-minute interval while he buries his face in the rulebook. \"You have to roll twenty-eight with seven dice,\" he announces.\n\n    You roll thirty-one!\n\n    Unfortunately, Robbie plays the Zombie Slowdown card which forces you to roll again. It takes you so long to topple the bus over that most of the red zombies have already come around the front. You hit one zombie and cause a minor leg wound.\n    *set max_energy +15\n    *set energy +15\n    *set control +15\n    *set luck +10\n    *goto turn2\n\n  #Overwhelm the lead zombies with sheer numbers. \n    You do the zombie equivalent of a tank rush, moving them all together in a big clump. You attack one zombie from seven different directions and destroy it. \n\n    Robbie peers at his cards and sighs. \"If I had Gut Detonator, you'd be in trouble.\"\n    *set max_energy +10\n    *set energy +10\n    *set control +15\n    *set luck +15\n    *goto turn2\n\n  #Form a pincer movement around either side of the bus.\n    You peel off two waves of zombies in blue, plastic curves. While one wing keeps the incoming red pieces blocked, the other slips around to his rear flank and starts picking off stray units one by one. It is a masterstroke.\n\n    Robbie sucks air between his teeth and plays a card called Sewer Reinforcements. He replaces all the zombies that you killed.\n    *set max_energy +10\n    *set energy +10 \n    *set control +20\n    *set luck +10\n    *goto turn2\n\n  #Whatever. \n    You move the blue pieces around in random ways and hopefully leave them vulnerable. The sooner Robbie kills them all, the sooner you can get on with something more interesting.\n\n    Robbie moves to play a card, then snatches it back. Then he chooses another one but pulls it back at the last instant. He goes back to the original card. \"Hmmm,\" he says.\n    *set max_energy +10 \n    *set energy +10 \n    *set control +5\n    *set luck +25\n    *goto turn2\n\n*comment  #BETA: Skip to the actual undead.\n*comment    *set control 50\n*comment    *set max_energy 50\n*comment    *set energy 50\n*comment    *set luck 50\n*comment    *goto sleep\n\n*comment  #DEBUG: Skip to the main loop.\n*comment    *set control 50\n*comment    *set max_energy 50\n*comment    *set energy 50\n*comment    *set luck 50\n*comment    *set bodycount 2\n*comment    *set skeletons 2\n*comment    *set zombies 2\n*comment    *set minion_count 4\n*comment    *set visibility 5\n*comment    *set stageone 1\n*comment    *goto_scene stageone\n\n\n*comment #################################################################\n*label turn2\n\nThis game seems to have been going on for a long time. You look out the window while you wait for Robbie to take his turn. He shuffles a couple of zombies around with no discernable plan.\n\nWhich card will you play now?\n\n*choice\n  #Spleen Strike.\n    One of your zombies performs a targeted attack through the enemy's ribs and obliterates a rival zombie's internal organs. Robbie consults his book and nods. \"Every turn now, he'll take one hit point of damage because his immune system is damaged.\" This seems at odds with the whole concept of being a zombie.\n    *set max_energy +10 \n    *set energy +10 \n    *set control +15\n    *set luck +10\n    *goto turn3\n\n  #Zombie Clothesline.\n    Your blue zombies link hands and charge across the map, knocking down the red ones in the way. You inflict a number of important casualities. However, the arms fall off several of your zombies.\n    *set max_energy +5\n    *set energy +5\n    *set control +15\n    *set luck +15\n    *goto turn3\n\n  #Dialogue of the Dead.\n    Robbie frowns as you play this card. \"We're supposed to play a whole minigame now where the zombies moan at each other,\" he says. \"Actually, I meant to take that card out because it looks kind of boring.\"\n\n    You agree to skip it and take a +1 to your next attack instead. Robbie looks relieved.\n    *set max_energy +5\n    *set energy +5\n    *set control +5\n    *set luck +25\n    *goto turn3\n\n\n*comment #################################################################\n*label turn3\n\n*rand bomb 1 6\n\nRobbie checks a few rules and then \n*if (bomb = 1)\n  arranges his pieces into a letter Z shape.\n  *goto bonus\n*elseif (bomb = 2)\n  sacrifices one piece by having the others tear it apart.\n  *goto bonus\n*elseif (bomb = 3)\n  makes one of his zombies put on the bus driver's uniform.\n  *goto bonus\n*elseif (bomb = 4)\n  has four zombies use a fifth one as a battering ram.\n  *goto bonus\n*elseif (bomb = 5)\n  plays the Solar Eclipse card.\n  *goto bonus\n*else\n  does something with a three-card combo that you don't really understand.\n  *goto bonus\n\n*comment #################################################################\n\n*label bonus \nThis gives him a huge bonus.\n\nA second wave of his zombies approaches from the other direction. You are surrounded. What will you do?\n\n*choice\n  #Split your forces and fight on two fronts.\n    This strategy has historically never worked. But the course of history has never been decided by garish, plastic figures and a bucketful of dice.\n\n    Robbie starts on a new turn where his red zombies push your blue zombies back as a team. \"They took these rules from an old American football game,\" he says with incomprehensible glee. Your pieces are crushed together and eliminated very slowly. Robbie beams.\n    *set max_energy +15\n    *set energy +15\n    *set control +10\n    *set luck +20\n    *goto robbiewin\n\n  #Attempt to eliminate Robbie's original zombies before the new wave arrives.\n    You take the aggressive approach and fall upon Robbie's forces hard. For a couple of turns, you hold your own, then he plays a card called Zombie Piledriver to accelerate his new pieces towards you in a flying wedge. You are obviously beaten but it still takes twenty-five minutes to roll all the dice.\n\n    You examine this Zombie Piledriver card. The back is crooked and it looks suspiciously like it has been created on an inkjet. \"It's from the print-and-play expansion,\" Robbie says. \n    *set max_energy +20\n    *set energy +20\n    *set control +20\n    *set luck +5\n    *goto robbiewin\n\n  #Try to form an acrobatic pyramid out of your zombies and thus win on style points alone.\n    You recall Robbie talking about some optional rules for winning conditions and reach for the rulebook. \"What do you need that for?\" he hisses. You maintain an enigmatic front as you consult the table for acrobatic stunts.\n\n    The pyramid requires you to roll over twenty-five but below thirty-two on ten dice. You go for it. It takes two turns but you manage to get fourteen out of fifteen zombies into your pyramid. However, during this period, Robbie commandeers an ice-cream van. His zombie drives it very slowly through your base layer and collapses the pyramid. You score zero style points.\n    *set max_energy +10\n    *set energy +10\n    *set control +25\n    *set luck +10\n    *goto robbiewin\n\n  #Rage quit.\n    You knock over your plastic zombies and spread your duff hand of cards on the table. Robbie pulls a face. He is pleased to have won but you have successfully denied him the joy of slowly crushing you.\n\n    \"Ha!\" he says. But it lacks something.\n    *set max_energy +10\n    *set energy +10\n    *set control +20\n    *set luck +15\n    *goto robbiewin\n\n*comment #################################################################\n*label robbiewin\n\nYou have lost this game of [i]Zombie Wars[/i].\n\n*page_break\n\nRobbie does an embarrassing victory dance which involves a double fist pump and some rolling of hips. You stare at him until he stops.\n\n\"Let's play one more game before you leave,\" he says, turning to his shelves. \"I've got a new one\n*rand bomb 1 6\n*if (bomb = 1)\n  called [i]Space Multipliers[/i].\n  *goto leave\n*elseif (bomb = 2)\n  called [i]Stalin Dice[/i].\n  *goto leave\n*elseif (bomb = 3)\n  called [i]Tigerbox[/i].\n  *goto leave\n*elseif (bomb = 4)\n  based on the Dutch Civil War.\n  *goto leave\n*elseif (bomb = 5)\n  about Charles Dickens that my mum bought me for school.\n  *goto leave\n*else\n  called [i]Corridor Clangers[/i].\n  *goto leave\n\n*comment #################################################################\n*label leave\nI haven't really read the rules though.\"\n\nYou need to get out of here right now. What approach will you take?\n\n*choice\n  #Admit you've had enough gaming for the afternoon.\n    Robbie looks glum. \"I wish we had more people so we could play [i]Submarine Simulator 2000[/i]. You need at least five, though.\"\n    *set luck +15\n    *goto outside\n  #Claim your dinner is earlier than usual today.\n    Robbie gives a little frown. Now you think about it, you may have used that excuse before.\n    *set max_energy +15\n    *set energy +15\n    *goto outside\n\n  #Attempt to suggest that Robbie's victory dance has hurt your feelings.\n    You make a point of not responding to his conversation and put on your jacket with a series of sullen jerks. Robbie sticks out his bottom lip.\n    *set control +15\n    *goto outside\n\n\n*comment #################################################################\n*label outside\n\nYou leave Robbie's house and tramp away down the street. These occasional nerd sessions are the price of his friendship. It's not so bad though. Your last best friend used to\n*rand bomb 1 3\n*if (bomb = 1)\n  wait until you'd left your bedroom and then he'd draw a penis inside one of your favourite books.\n  *goto outside2\n*elseif (bomb = 2)\n  sit beside you at school dinners and make you trade your chips for spinach.\n  *goto outside2\n*else\n  make you babysit her poopy little sister.\n  *goto outside2\n\n*label outside2\n\nThere just aren't that many fun people in a small town like…what's your town called?\n\n*choice\n  #Bradford.\n    *set town \"Bradford\"\n    *goto gender\n  #Paisley.\n    *set town \"Paisley\"\n    *goto gender\n  #Sunderland.\n    *set town \"Sunderland\"\n    *goto gender\n  #Stoke-on-Trent.\n    *set town \"Stoke-on-Trent\"\n    *goto gender\n  #Dundee.\n    *set town \"Dundee\"\n    *goto gender\n  #Basingstoke.\n    *set town \"Basingstoke\"\n    *goto gender\n  #Something else.\n    What is the name of your town?\n\n    *input_text town\n    *goto townexit\n\n*label townexit\n\nYou live in $!{town}. Is that right?\n\n*choice\n  #Yes.\n    *goto gender\n  #No.\n    *goto outside2\n\n\n*comment #################################################################\n*label gender\n\nRight. And are you a boy or a girl?\n\n*choice\n  #A boy.\n    *set gender \"boy\"\n    *set master \"master\"\n    *goto outside3\n  #A girl.    \n    *set gender \"girl\"\n    *set him \"her\"\n    *set his \"her\"\n    *set he \"she\"\n    *set master \"mistress\"\n    *goto outside3\n\n*comment #################################################################\n*label outside3\n\nThere just aren't that many fun people in a small town like $!{town}. \n\nThe walk home from Robbie's house is kind of scary, especially when it's getting dark. He lives near The Base. The fence is three times your height, and razor wire runs along the top. You have to walk past a long stretch to get back to the town centre. There are trees in the way but occasionally you catch a glimpse of a low building. Yellow light gleams in the windows. It seems to get brighter, then dimmer.\n\nYour father said it was an army base where they send soldiers to train. But you're not so sure. When the wind blows in just the right direction, you can hear some strange noises coming out of there. \n\n*page_break\n\nYou shiver as you leave The Base behind and make it to the town centre. It's quite dark now. The shops are closed and the streets are empty. Noise blares from the pub and the kebab shop. It stops you hearing the tell-tale voices ahead until it's almost too late. The Kendall kids come around the corner.\n\nDenzil, Mikey and Sean don't pick on you, in particular. They pick on nearly everybody. When you were eight, they stole your shoe and pushed it down the drain. When you were ten, they threw you into the canal. At twelve, you stood up to them like it says in the books and they \n*if (gender = \"boy\")\n  punched you in the stomach until you threw up.\n  *goto confrontation\n*else \n  cut off your ponytail with a knife.\n  *goto confrontation\n\n*comment #################################################################\n*label confrontation\n\nYou don't think they've seen you yet. But they definitely will, within seconds.\n\n*choice\n  #Walk boldly past them.\n    You stride past the Kendall kids without looking them in the eye. They seem to be punching each other in the arm for fun. At the vital moment when you pass them,\n    *if (control > 40)\n      they are still preoccupied and don't notice you. Whew.\n      *goto escape\n    *else\n      Mikey turns and spots you.\n      *goto caught\n\n  #Sprint down a side street.\n    There's no point in enduring that long moment of dread where they decide whether or not to beat you up. You tear across the road in front of the Kendall kids and run for it, using all the energy you've stored up by sitting down for the entire afternoon eating snacks and playing board games.\n\n    *if (energy > 40)\n      As you sprint, you hear shouts from behind, and a patter of feet. But fear and sugary snacks speed your feet and within thirty seconds, you're round the corner and halfway down the street. They're not going to catch you this time.\n      *goto escape\n    *else\n      You get a good head start but the Kendall kids thunder after you. One of them giggles. \"Run, piggy, run!\" Your foot snags on something and you go down hard. Before you can get up, three long, black shadows fall across you.\n      *goto caught\n\n\n  #Hide down the back of the chemist.\n    You slip down the narrow alley and crouch behind a cardboard box labelled LOZENGES. Ten seconds later, the dark shapes of the Kendall kids appear and stop. You now realise you've backed yourself into a dead end.\n\n    \"Down here,\" hisses Sean. You prepare to make a break for it but they don't immediately grab you. Instead, you hear whispering and the quiet rustle of plastic. You hold your breath for a long, slow count of ten.\n    *if (energy > 40)\n      Finally there's the sound of a slap. \"Oww!\" whines Denzil. Their footsteps tap back to the street, then they're gone. You sink against the wall, relieved.\n      *goto escape\n    *else\n      \"Just a minute, lads,\" Mikey says. \"What do we have here?\" The worst thing is the obvious relish in his voice.\n      *goto caught\n\n*comment #################################################################\n*label caught\n\n*page_break\n\nMikey drags you over to the wall and presses you up against it. His face presses close to yours and his breath stinks. \"I thought we told you the last time. This is our territory and you can't come here without paying the toll. Denzil, check ${him}.\"\n\nYou struggle as Denzil searches your pockets for money. You try to kick him but Mikey blocks the movement easily. \"Can't find nothing,\" Denzil says.\n\n\"Tsk tsk,\" Mikey says. \"Guess it's into the bin with you.\" He drags you over to a large green collection bin. Black plastic bags of rubbish are piled inside, amid six months of sludge.\n\n\"Just a minute.\" Sean grins. He slips out a knife. Your heart jumps but he reaches into the bin and slices open all the bags he can reach. Rotten food spills out of the holes, its stench filling your nose. Then Denzil grabs your legs and they chuck you into the bin. The lid clangs down and you are left alone in the dark, slipping on filth, as their laughter recedes.\n\nIt takes you a long time to get the lid open.\n\n*set luck %-10\n*set visibility +1\n*set caught true\n*page_break\n*goto outside4\n\n*comment #################################################################\n*label escape\n\n*page_break\n\nEven though you're safe, it takes you five minutes to calm down. Living in $!{town} sucks.\n\n*set luck %+5\n*goto outside4\n\n*comment #################################################################\n*label outside4\n\nYou reach the end of your street and head home. All you want to do is kick off your shoes and relax for the evening. At the door, you sniff for the first delicious hint of what your dinner will be tonight.\n*if (caught=true)\n  Unfortuantely, all you can smell is the lingering stink of the bin they dumped you in.\n  *goto family\n*else\n  You smell nothing except the insides of your father's running shoes.\n  *goto family\n\n*label family\n\nYour father is sitting in front of the TV with a beer, watching a football game. His feet are up on a stool. He scratches himself. Your mother has the laptop open on the dining table. She is playing one of the internet bingo games they advertise during inferior soap operas. \n\nBy the way, what's your name?\n\n*label name\n\n*if (gender = \"boy\")\n  *choice\n    #Niall.\n      *set name \"Niall\"\n      *goto father\n    #Zayn.\n      *set name \"Zayn\"\n      *goto father\n    #Liam.\n      *set name \"Liam\"\n      *goto father\n    #Harry.\n      *set name \"Harry\"\n      *goto father\n    #Louis.\n      *set name \"Louis\"\n      *goto father\n    #Something else.\n      OK then. What is your name?\n\n      *input_text name\n      *goto namecheck\n*else\n  *choice\n    #Cheryl.\n      *set name \"Cheryl\"\n      *goto father\n    #Nicola.\n      *set name \"Nicola\"\n      *goto father\n    #Sarah.\n      *set name \"Sarah\"\n      *goto father\n    #Kimberley.\n      *set name \"Kimberley\"\n      *goto father\n    #Nadine.\n      *set name \"Nadine\"\n      *goto father\n    #Something else.\n      OK then. What is your name?\n\n      *input_text name\n      *goto namecheck\n\n\n*label namecheck\n\nYour name is $!{name}. Right?\n\n*choice\n  #Yes.\n    *goto father\n  #No.\n    OK, try again.\n    *goto name\n\n*comment #################################################################\n*label father\n\nYour father yells without taking his eyes off the football. \"Is that you, $!{name}? Come here. I need you to go out for fish suppers.\"\n\nYou look more closely at the football game. A team with green shirts are playing a team with black and white stripes. It is a game from last year. You recognise it because he has watched it three times already.\n\n*if (caught = true)\n  You point out that you have been out all day and that you badly need a shower.\n  *goto shoes\n*else\n  You point out that you have been out all day and that you're tired.\n  *goto shoes\n\n*label shoes\n\n\"Still got your shoes on then,\" he says, and waves a twenty pound note in your direction.\n\n*choice\n  #Go and get the fish suppers.\n    This isn't the first time the fish supper conversation has happened. Your father is ruthless when he makes up his mind. The last time, he logged onto his online banking and slowly reduced your weekly allowance until you agreed to go. Better to just succumb to the inevitable—and pocket the change.\n    *set max_energy %+10\n    *set energy %+10\n    *page_break\n    *goto fishsupper\n\n  #Tell him to get them himself.\n    Your father watches these matches as if they were live, \"to recapture the excitement\". Even when he goes to the toilet, he doesn't pause the game because he enjoys the pressure of having to pee quickly. It's pathetic, really. You fold your arms and refuse to be his delivery ${gender} yet again.\n\n    \"It's your birthday next month, isn't it?\" he says, still holding up the twenty. \"Be a shame if you didn't get what you wanted.\"\n\n    Dammit. You take the twenty.\n\n    On the way out, you remind him that the green shirt team will win 2-1. You slam the door on his angry retort.\n    *set luck %+5\n    *page_break\n    *goto fishsupper\n\n  #Try to get your mother to take your side.\n    Your mother smiles without looking at you. \"I can't speak to you right now, dear. This card is worth eight pounds seventy-five.\" She stares intently at the grid of small green balls.\n\n    Robbie's mother often talks to you about centuries of struggle for women's rights. You sometimes feel your mother is not making the most of them.\n    *set control %+5\n    *page_break\n    *goto fishsupper\n\n*comment #################################################################\n*label fishsupper    \n\nYou trudge along the gloomy road to the fish and chip shop. On the way, you pass the hairdressers, an establishment called \"Cut and Colour\". On their sign, a little rainbow with the wrong colours comes arcing out of the word \"Colour\". \n\nYou automatically touch your head, checking your hair is still there. Last time they cut it far too short. The time before that, the woman was talking to her friend and she made a thin patch at the back. The time before that, you explained what you wanted and they laughed at you.\n\nThe chip shop is busy. There are two guys working: a fat one and one with a moustache. You have to wait in the queue for nearly ten minutes, staring at the battered black puddings which have been in the fryer too long, and listening to the slow-moving staff making racist jokes.\n\nJust as you are about to get served, a skinny woman with a bright, fake tan and too much makeup on breezes in. She wears a padded, sleeveless jacket with furry armholes. The fat guy behind the counter stands up straight. \"Hello, Al,\" she purrs.\n\n\"What can I get you?\" he stammers.\n\n*choice\n  #Point out that there is a queue.\n    You interrupt and direct the orange-skinned woman to the rear of the queue. She turns and glares at you.\n\n    *if (control > 40)\n      *set control %+5\n      *set luck %+5\n      A retort forms on her lips but it dies as you stare her down. \"Put a king rib in for me, Al,\" she says, as she struts to the back of the queue. \n      *if (gender = \"boy\")\n        Under her breath she hisses, \"Little wanker.\"\n        *goto leavechippy      \n      *else\n        Under her breath she hisses, \"Little bitch.\"\n        *goto leavechippy      \n    *else\n      \"This is one of our VIP customers,\" says Al. \"She gets to skip the queue.\" The woman grins, showing expensive teeth, and gives you a withering look. You're left fuming as she goes away with some elaborate combination of battered meats at a heavily discounted price.\n      *goto leavechippy\n\n  #Keep quiet.\n    You make it a rule not to piss off people who are about to serve you food, so you stand there patiently. One of these days, though, it's going to be payback time.\n    *set max_energy %+10\n    *set energy %+10\n    *goto leavechippy\n\n  #Squirt tomato ketchup down the back of her jacket.\n    One of the few redeeming features of this particular fish and chip shop is that they provide unlimited tomato ketchup in a small, squeezable bottle shaped like a tomato. While Al is bewitched by this deep-fry hussy, you surreptitiously obtain the plastic tomato, aim, and squeeze.\n\n    *if (luck > 30)\n      A rich stream of ketchup paints the back of her body warmer. It looks like she has been stabbed between the shoulderblades. She is too busy smirking to notice.\n\n      As she struts from the shop clutching her bag of battered meats, she leaves a trail of red drips across the floor. You see Al's jaw drop. But nobody in the queue talks.\n      *set control %+10\n      *page_break\n      *goto leavechippy\n\n    *else\n      The tomato is surprisingly difficult to aim. You squirt a line of ketchup across the floor and up the front of the counter. It looks exactly like blood spatter from \"CSI\". You slip the plastic tomato back onto the counter and look away.\n\n      When the queue-jumper turns, she narrowly misses standing in a pool of ketchup. She glares along the queue. Nobody seems concerned. She struts from the shop with a sniff.\n\n      Al blinks at the mess and fetches a mop.\n\n      *set control %+5\n      *page_break\n      *goto leavechippy\n\n*comment #################################################################\n*label leavechippy\n\nFinally, you reach the head of the queue and order three fish suppers. Al shovels out chips which look distinctly undercooked and you point this out.\n\n\"Well, if you want to wait a bit longer, join the back of the queue,\" he grunts. Then he overcharges you for a can of cola.\n\nYou're tempted to storm out of the shop. But your father will only send you back and then you'll have to endure this all over again. You accept three hot packets of fish and chips in a thin bag. On the side is written: HAPPY TO SERVE YOU—COME AGAIN!\n\nYou move fast with the bag of hot fish suppers. If you can just get home without any more incidents, you can finally relax for the night.\n\n*page_break\n\nThe quickest route is through the square in front of the pub. Sometimes people shout at you there but they never actually follow you. You're just rounding the corner when you hear a familiar voice. \"Come on then, soldier boy!\" It's the Kendall kids again. On instinct, you duck into a bush. The branches scratch at your clothes as you peer out to see what's happening.\n\nIt's exactly what it sounds like. The Kendall kids are taunting an off-duty soldier outside the pub. A lot of men from The Base drink in there. The soldier laughs it off until Denzil comes up behind him and cracks a plank over his head. Then the three boys swarm him.\n\nThe soldier easily takes on two of them at once, locking Denzil's arm and using the younger boy as a shield against Mikey. His foot lashes out, cracking against Mikey's knee. Mikey wails and drops to the ground like an action figure with its leg twisted the wrong way. But Sean steps up behind the soldier, silent as usual. He slips his hand into his jacket and comes out with a thin, gleaming blade.\n\n*choice\n  #Yell to warn the soldier.\n    You jump out from the bush and shout, \"Behind you!\" The soldier's head turns to look at you. A moment of distraction is all it takes. Sean plunges the knife into the small of the soldier's back and twists it. The soldier stiffens in pain and turns, using Denzil's body to knock Sean away. Both brothers fall to the ground.\n\n    A river of blood flows from the knife wound, staining the soldier's trousers a dark crimson. He turns to look at you, trying to speak. Blood spills over his bottom lip. Then he crashes to the ground.\n    *set exposed true\n    *set humanity +2\n    *set luck %-5\n    *page_break\n    *goto aftermath\n  #Throw something at Sean.\n    You find a stone on the ground which fits your palm. Stepping out of the bush, you fling it at the eldest Kendall kid.\n    *set exposed true\n    *set humanity +2\n    *if (luck > 45)\n      The stone cracks Sean on the head, a split-second too late. He stumbles and goes down, but as he has already rammed the knife into the soldier's back, he drags the man down with him. Denzil goes down with both of them. The soldier starts coughing blood.\n      *set luck %+10\n      *page_break\n      *goto aftermath\n    *else\n      Your aim is off and the stone flies behind Sean's head. He grabs the back of the soldier's collar and rams the knife into the small of his back. The soldier stiffens in pain and twists, throwing Denzil to the ground as he grasps for the knife. Blood floods from the wound, staining the soldier's trousers a dark crimson. It begins to spill from his mouth. He topples.\n      *set luck %-5\n      *page_break\n      *goto aftermath\n  #Stay hidden until the Kendall kids leave the area.\n    The soldier twists and forces Denzil to the ground beside his brother. With a snarl, Sean thrusts the knife into the soldier's back. The man cries out and reaches for the wound. Sean pulls the knife and thrusts again. The soldier collapses to his knees, dragging the knife from Sean's hand. Sean staggers back, blood dripping from his fingers.\n    *set visibility 0\n    *page_break\n    *goto aftermath\n*comment #################################################################\n*label aftermath\n\nThe soldier flails on the ground for a moment, then his body slackens and he goes silent. The Kendall kids get to their feet. Sean retrieves his knife. Dark, gleaming blood drips from its blade.\n\nMikey pokes the soldier's head. \"He's dead, man! You killed him!\" Denzil's mouth hangs open.\n\nSean crouches down and gazes into the soldier's eyes. Then he gets up and looks methodically around the square. There's nobody else around.\n*if (exposed = true)\n  His eyes stop on you.\n  *if (caught = true)\n    \"You again,\" he says.\n  A couple of strides bring him close. \"If you ever…say…anything…\" He lifts the knife. \"I'll do the same to you. That's a promise.\"\n  *set visibility +4\n*comment endif\n\n\"Come on, lads,\" he says in a low voice. \"We were never here.\" They scuttle into the darkness, leaving you alone with the corpse.\n\n*page_break\n\nThe soldier's head is turned towards you. The eyes are wide open, unblinking. You can't help but look into them. Something has left. Although you've never seen a dead body before, you're sure this man is dead. \n\nYou either need to call the police or you need to get out of here right now. Did anybody see you? Did you drop anything? You fumble to find your phone. As you glance away, a strange, yellow glow illuminates the kerb. What was—\n\nThe soldier's left leg is moving. It lifts and lowers, bumping on the ground. After a moment, the right one joins in. His torso twists and his fingers splay. His body rises from the ground in an impossible arc. The entire time, his head remains turned to the side, pointing in your direction. The eyes are dull and glassy.\n\nThe dead soldier turns and moves off, reeling from one side of the road to the other. He is heading in the direction of The Base.\n\n*set control %+5\n*page_break\n\nYou had better move. Either something very creepy has just happened or living here has finally snapped your mind. You turn and your foot clatters against something on the ground.\n\nIt's…a bone. It looks about twelve inches long, rounded at one end, flat and V-shaped at the other. A section of its length has been exposed, the marrow removed, and a clear tube of luminous liquid has somehow been inserted. The yellow-green fluid slides around inside. It reminds you of a spirit level your father showed you when you were small.\n\nThe liquid changes colour almost imperceptibly as it pulsates. It shifts between a murky yellow and a pale green. Nevertheless, something makes you want to pick it up.\n\nWhen you look up, the dead soldier has disappeared from view.\n\n*choice\n  #Take the bone with you.\n    The bone feels dry and cold against your fingers. You glance around the square. It looks like nobody is watching. You shove it into a deep pocket and head for home.\n    *set bone true\n    *goto home\n  #Leave it behind.\n    You're not in the habit of picking up strange bones in the street. And if the soldier dropped it, it might belong to the military. If you hurry, you can get these fish suppers home while they're still warm and try to forget that anything ever happened.\n    *set humanity +1\n    *goto home\n  #Take it into the pub and ask an adult what to do.\n    You step through the doors and are stopped in your tracks by a blast of bright light and beer fumes. Men sit in groups drinking and occasionally roaring. Once your eyes adjust, you see an older lady sitting by herself. You approach her.\n\n    Before you can get there, a big man with a moustache gets in your way. \"No kids after six,\" he says. \"Out.\"\n\n    You protest and show him the bone you found outside. It glimmers in your hands.\n\n    \"It's not Halloween yet,\" he says.  \"Out.\"\n\n    He bundles you back through the door. A couple of drinkers look up as you get thrown out, still waving the bone around. \n    *set bone true\n    *set visibility +3\n    *page_break\n    *goto home\n  #Kick it down a drain.\n    You're not sure what that thing is but you're definitely not touching it. And you don't like the idea that a curious toddler could happen by tomorrow and pick it up.\n\n    You nudge it with your shoe, rolling it over to the grate. It rolls between the bars and drops into the dark. For a second, you see the shaft walls outlined in a weird shade of green. Then the bone is gone, swallowed by the darkness. Or is it? Can you still see something glowing down there?\n\n    A shiver passes across your shoulders as you head for home.\n\n    *set humanity +1\n    *set control %+5\n    *page_break\n    *goto home\n\n*comment #################################################################\n*label home\n\nYou turn it over in your mind as you walk: You just saw somebody die. Never mind what happened afterwards. You're trembling by the time you reach your street and it's a relief to close the house door behind you.\n\nYour father is now watching another old football game: an orange team versus a blue team. He takes his fish supper without looking at you and snaps his fingers. \"Change,\" he says. You give him the remaining money with shaky hands.\n\nYour mother smiles absently as you hand over the fish supper. She has moved on from bingo to browsing online bead craft supply stores. You stand there for a few moments, staring at them, waiting for them to notice you, to ask what's wrong.\n\nAfter five minutes, you dump your fish supper in the kitchen and go upstairs.\n\n*page_break\n\n*if (bone = true)\n  *goto google\n\nYou rip off your shoes and sit on your bed. Only then do you notice the bone is lying on your bedside table, glimmering with yellow-green light. [i]How did it get there?[/i] \n\n*set bone true\n\n*comment #################################################################\n*label google\n\nYou fire up the computer and start searching for pictures of bones. You identify it quickly. It's the humerus, the top part of an arm. A human arm. This is not a comforting thought.\n\nThe adrenaline from earlier is wearing off. You're becoming very tired.\n\nWhat will you do with this glowing humerus?\n\n*label nosmash\n\n*choice\n  *hide_reuse #Smash the interior tube to get the liquid out.\n    You line the tube up on the edge of your windowsill and bang it with your fist. It makes a dull clunk. You use your alarm clock as an impromptu hammer and thump it harder. Nothing. On the third attempt, you take a chunk of wood out of your windowsill.\n\n    Whatever this tube is made of, it's not glass.\n\n    What now?\n\n    *set max_energy %+5\n    *set energy %+5\n    *goto nosmash  \n\n  #Throw it out the window.\n    You open your window, reach out, and hurl the eerie bone as far as you can. It disappears over a high hedge, into a neighbour's garden, its glow winking out among the foliage.\n\n    It feels good to close and latch the window on the weird thing. You yawn. As you settle down under the covers and close your eyes, you try not to think about it still being out there.\n    *set bone false\n    *set luck %+5\n    *page_break\n    *goto sleep\n\n  #Put it somewhere safe until the morning.\n    This is a genuine occult artifact. The best place for it is your sock drawer. You put it carefully inside and close the drawer. When you slip into bed and turn out the light, you can see its gentle glow from the edges of the drawer. It feels oddly soothing.\n    *set bone true\n    *set control %+5\n    *page_break\n    *goto sleep\n\n*comment #################################################################\n*label sleep\n\nYou lurch, disoriented. It's dark outside. Were you sleeping? Did you just hear something? What time is it? You turn to look at your alarm clock. \n\nThe bone is back on your bedside table, its sickly pulse much faster now. It was definitely not there when you closed your eyes. You stare at it. How is this even possible? \n\nYou hear a distinct, loud THUMP from your parents' bedroom.\n\n*page_break\n\nYou creep through the dark hallway, feeling your way along the banister. Your thigh bumps something cold. It's only the fire extinguisher. From inside your parents' bedroom you hear somebody—no, two people—moaning and bumping around.\n\nThis would be a definite signal to go back to bed and put in the earplugs except for one thing: the bedroom door hangs open, off its hinges. It has been cracked across the middle.\n\n*choice\n  #Peer around the door.\n    Your breath sounds very loud as you slink up to the doorway. Keeping your head as low as you can, you peer around the frame.\n    *set control %+10\n    *set bone false\n    *goto dead_parents\n\n  #Grab something heavy and go in swinging.\n    You glance around quickly for something like a baseball bat. The fire extinguisher will be too slow. Unless you use an entire chair, the only likely weapon is the creepy humerus currently lighting up your room. As you curl your fingers around it, you instantly feel calmer, balanced, despite what might be violent intruders next door. It's a very strange sensation. \n\n    Still, the plan hasn't changed. You summon up a shriek and charge through the doorway. What you see there brings you up short.\n    *set max_energy %+10\n    *set energy %+10\n    *set bone true\n    *goto dead_parents\n\n  #Return to your room, make the bed, and hide underneath it.\n    Anything strong enough to break the door like that is strong enough to break you in exactly the same way. The best plan for survival is to pretend you're not in the house.\n\n    *set nolook true\n    *set control %+5\n    *set luck %-5    \n    *goto under_bed\n\n  #Try to slip past the door and go for help.\n    You pad along the carpet, shivering in the cold air, holding your breath. The stairs are right ahead. Not far…but as you pass the doorway, you can't help glancing inside. Your body freezes at what you see.\n    *set luck %+15\n    *set bone false\n    *goto dead_parents\n\n*comment #################################################################\n*label dead_parents\n\nYour father is still in bed, still wearing his red-striped pyjamas. However, his head is missing. A thin man in a dark formal suit is holding it upside down, chewing on the stringy tendons of the neck. He looks round at you. Streaks of pale makeup cross his face, partly covering its green-tinged flesh. His tie may have originally been black; it is currently swamped by a flood of glistening gore.\n\nYour mother seems to be on the floor behind the bed. All that is visible of her is a trailing, pallid arm and her bloodied ankles protruding over the top of the mattress. A young woman in a black frock straddles her, gorging on what appears to be a large handful of dark spaghetti. On one side of this woman's face, raggedy hair dangles over a sunken eye. On the other, the scalp has parted to show bone. She clambers onto the bed.\n\n*set bodycount +2\n\n*if (bone = true)\n  As you lift the bone to club them, the intruders stop in their tracks.\n  *page_break\n  *goto bone_control\n*comment endif\n\nThe man lumbers towards you. You stumble backwards and fall.\n\n*page_break\n\nBy the time you find your feet, the two intruders have blocked the landing. You scramble back to your bedroom and slam the door in their decomposing faces.\n\nTHUD. THUD THUD. They begin to pound the door. You can already see it straining in the frame. As you look around, your eyes are drawn by the strange bone on your bedside table. Its light is now flickering fast.\n\n*label siege\n*choice\n  #Pick up the bone to use as a weapon.\n    The door crashes in. You seize the weird artifact and turn, ready to club at the intruders' heads. As you lift it, the liquid inside gleams. Abruptly, you are swept by a deep sense of peace.\n\n    It is totally inappropriate. But the advancing figures have stopped in their tracks.\n    *set control %+5    \n    *goto bone_control\n  #Use the bedside lamp instead.\n    You lift the lamp. It feels heavy in your hands. It is still, however, plugged into the wall. The door splinters and breaks. The ghastly woman lumbers into the room, hunched and malevolent.\n\n    As you try to swing the lamp, it snags, the cord extended to its full length. The woman advances. You yank desperately at the cable. It finally breaks and you topple towards the intruder. \n\n    There's just enough time to put your full weight behind a clumsy swing. You ram the lamp into the side of the woman's face. There's a dry crack, a revolting, soft sensation of suction, and she drops to the ground, inert. The lamp goes with her, protruding from her eye socket. The man steps over her and comes at you.\n\n    The only weapon left to grab is the weird bone. As your fingers touch it, you are startled by an immediate feeling of peace. The man freezes immediately, staring at you from across the room.\n\n    *set zombies -1\n    *set minion_count -1\n    *set luck %+10\n    *page_break\n    *goto bone_control\n    \n  *hide_reuse #Try to get out of the window.\n    This would have been much easier before you got double glazing. Or, in fact, before your father lost the key to the windows in his bedroom and took yours to replace it.\n\n    The thumping on the door intensifies. THUD TH-THUD THUD THUD.\n\n    OK, that didn't work. What now?\n    *set luck %-5\n    *goto siege\n\n  #Hide under the bed.\n    They didn't look like the smartest of intruders. You crawl under the bed, among shoes and other junk, holding back a sneeze as the dust goes up your nose. You just have time to pull in your legs before the door crashes in and footsteps advance into the room.\n\n    You keep very, very, quiet.\n    *set luck %-5\n    *page_break\n    *goto under_bed2\n\n*comment #################################################################\n*label under_bed\n\nYou straighten out the bedclothes so the room seems unoccupied. Then you slip under the bed. It's tight in among all the junk you've stored under there, but you pull your legs and arms in and wait, staring up at the wooden slats and the underside of your mattress. \n\nYou try to stay very quiet. Dust catches in your throat. You hear thick footsteps in the corridor, clumsy and heavy. Two sets. They don't sound like your parents.\n\nThey advance into the room and stop. You can see a pair of immaculate, black men's shoes, and a smaller pair of feet in bare, black stockings. Now you look closely, there is a broken piece of strap around the woman's ankle. And her skin is a strange colour…\n\n*page_break\n\n*comment #################################################################\n*label under_bed2\n\nA hollow-eyed female face, crowned with ratty hair and breathing the stink of the grave, appears inches from yours. Putrescent fingers reach towards your eyes. You flail with your fists and feet as well as you can in the confined space. One good kick connects and the woman reels back, crashing against your bedside table. The second intruder's cold fingers lock around your ankle. You feel your back slide on the carpet as he begins to pull you out.\n\nSomething thumps to the floor ahead. It's the bone you found in the square. On instinct, you grab it and hammer at your attacker.\n\nHe freezes.\n\nOn the other side of the room, the woman has half-risen. She crouches, eyes on you, perfectly still.\n\nYou slip your ankle free and crawl out from under the bed.\n\n*page_break\n\n*comment #################################################################\n*label bone_control\n\n*if (zombies \u003c 2)\n  *goto bone_control_singular\n*comment endif\n\nYou hold out the glowing humerus in front of the intruders. They hold their positions, neither coming closer nor backing away. The eerie light casts ugly shadows across their pock-marked faces. \n\nThe stink of the grave. Grimy clothes. Decaying skin. A twisted poise and what seems suspiciously like a hunger for human flesh. A hundred films, graphic novels, TV series, and motivational smartphone apps for runners have briefed you for this moment. These are zombies.\n\nYou experiment by waving the humerus from left to right in a slow, even arc. The zombies lean a little to follow its progress. Does it control them?\n\n*fake_choice\n  #Try to turn them around.\n    You gesture in an awkward circle. The zombies shuffle around, as if playing some very slow party game.\n  #Try to back them off.\n    You make a sort of \"brushing away\" gesture. The zombies back up against the wall.\n  #Try to make them sit down.\n    You point the bone towards the floor. The zombies begin a series of jerky motions. Eventually, one topples to the carpet with a dry thump, followed by the other.\n  #Lower the bone for a moment to see what happens.\n    Your heart pounds as you risk lowering your defences. Nothing happens. You raise the bone again and gesture to the other side of the room. They shuffle in that direction.\n\n*goto bone_control2\n\n*comment #################################################################\n*label bone_control_singular\n\nYou hold out the glowing humerus in front of the intruder. He holds his position, neither coming closer nor backing away. The eerie light casts ugly shadows across his pock-marked face. \n\nThe stink of the grave. Grimy clothes. Decaying skin. A twisted poise and what seems suspiciously like a hunger for human flesh. A hundred films, graphic novels, TV series, and motivational smartphone apps for runners have briefed you for this moment. This guy is a zombie.\n\nYou experiment by waving the humerus from left to right in a slow, even arc. The zombie leans a little to follow its progress. Does it control him?\n\n*fake_choice\n  #Try to turn him around.\n    You gesture in an awkward circle. The zombie shuffles around, as if playing some very slow party game.\n  #Try to back him off.\n    You make a sort of \"brushing away\" gesture. The zombie backs up against the wall.\n  #Try to make him sit down.\n    You point the bone towards the floor. The zombie begins a series of jerky motions. Eventually, he topples to the carpet with a dry thump.\n  #Lower the bone for a moment to see what happens.\n    Your heart pounds as you risk lowering your defences. Nothing happens. You raise the bone again and gesture to the other side of the room. He shuffles in that direction.\n\n*comment #################################################################\n*label bone_control2\n\nThe reaction seems too complicated, too accurate for such a simple gesture. You look at the man and, without moving the bone at all, you imagine him raising his arm.\n\nHe raises it.\n\n*set zombies +2\n*set minion_count +2\n\n*if (nolook)\n  You edge out of the room and look into your parents' bedroom. A huge pool of blood is slowly drying around their slumped and torn bodies. \n  *set bodycount +2\n*comment endif\n\nOK, so here is the situation. You are an orphan who—\n\nYour musing is interrupted by a THUMP from downstairs.\n\n*page_break\n\nThe military? Can they have tracked the bone to your house? But that didn't sound like the front door.\n\nYou pad down the stairs. The noise is coming from the kitchen. Something is moving in there. Since the weird humerus also doubles as a night light, you shine its greenish glow into the room.\n\nAs you watch, the slats which cover the cellar entrance lift one by one and topple aside. A hand rises from the gap—a hand with no flesh. A skull crashes through the remaining slats, surveying the room through empty sockets. Bony arms pull an entire animated skeleton into the room. It turns to look at you, jaw hanging open in a cheerful grin. It raises one fleshless arm—and waves.\n\nYou resist the urge to wave back and try to control its arm with the bone. It moves!\n\nA second skeleton climbs out of the cellar entrance. Wait, there were two bodies down there all this time?\n\n*set skeletons +2\n*set minion_count +2\n*set army_state 1\n*page_break\n*goto_scene stageone\n", "stageone": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, stageone\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*comment reset tactical variables\n*set zcommit 0\n*set scommit 0\n*set vcommit 0\n*set mcommit 0\n*set gcommit 0\n*set advantage false\n\n*if (stageone > 0)\n  *goto main\n*comment endif\n\nOK, recap. You are an orphan who possesses a strange military occult artifact created from the upper arm of a presumably-deceased person. Through it, you have obtained the power to command the dead.\n\nYou spend the following hours sitting in the kitchen, staring at your cold, untouched bag of fish and chips. Greasy fat has built up around its base. The glass of the back door is broken, and small pieces of zombie are still impaled on the shards.\n\nEvery now and then, you lean back on the stool to look into the living room. The undead are standing there, inactive. The skeletons hang loose, relaxed, as if warming up for an exercise class. It is not clear what keeps their bones upright and together.\n*if (zombies = 1)\n  The zombie sways, head tilted back as if gargling a fine wine. It appears to be examining the ceiling.\n  *goto parents\n*else\n  The zombies sway, heads tilted back as if gargling a fine wine. They appear to be examining the ceiling.\n  *goto parents\n\n*comment #################################################################\n*label parents\n\nThe immediate problem is your dead parents upstairs. No doubt you will have a tearful moment about their demise at some point, but there is no sign of that moment yet. And, frankly, they weren't contributing to society in any obvious way. In the meantime, there's the question of decomposition and flies and maggots and all that stuff. Plus, the bone seems to bring things back to life. The last thing you want is your headless father stumbling around your bedroom at night, leaving intestine all over everything.\n\n*label parents_choice\n*choice\n  *hide_reuse #Phone the police and ask for help.\n    You have the handset to your ear and your finger on the number pad before you pause to consider what you are going to say. The undead attacked your house but you survived because you have a bone which can command them. Which you got from a soldier who died. Who then got up and walked away.\n\n    Yes, you could do some amateur dramatics like having a skeleton chase you out of the house when the police arrive. But you feel in your gut that this call will lead you to one of three locations: jail, for murder; a mental hospital, for claiming the dead walk the earth; or a secret military detention centre for the rest of your miserable life.\n\n    *choice\n      #Make the call.\n        The emergency operator answers. \"Fire, police or ambulance?\" You feel a shiver of relief as you ask for the police.\n\n        She puts you through. A man's voice comes on, deep and patient. \"Police. What has happened?\" You take a deep breath, and explain. You fully expect him to cut you off for wasting his time. But you get to tell the whole story. After about fifteen seconds, there are a couple of clicks on the line.\n\n        When you finish your account, there is a moment of silence. Then a voice says. \"Please wait there. Help is on the way.\"\n\n        It's strange, but you could swear that wasn't the same voice.\n\n        *page_break\n\n        About seven minutes later, an ambulance pulls up. Two paramedics hurry to reach you at the door. The first is a woman with thin lips and hair pulled into a tight bun. Her partner is a tall, wiry man with a shaved head.\n\n        You explain you called the police. \"They're right behind us,\" she says. \"For now, we need to get you inside and safe. You said there were…dead people…in
