*********************\n*label recruit\n\nYou shiver as you walk among the headstones. It's one thing controlling a shambling figure of wasting flesh or a clackety, hyperactive collection of bones. But these are still people, lying deep in the earth, some for a very long time. Do you really want to interrupt their eternal rest to boost your horde?\n\n*choice\n  #Recruit in the older section of the graveyard.\n    *label oldgrave\n    You stand among the old stones and take out the humerus. Its weak pulse is difficult to see in daylight; it manifests as a sickly tint on your skin. If it's responding to the presence of bodies in the ground, they must be buried deep—or perhaps they have decayed beyond the point where they can be animated. Who knows? They don't teach this stuff in school.\n\n    *choice \n      #Attempt to pull undead from the ground with an active force of will.\n        *gosub_scene end_trial\n        You plant both feet square on the earth and adopt a dramatic and hopefully solid stance. You close your eyes.\n\n        The bone channels your will. You send a command deep into the ground, calling the long-time dead. [i]Come. Now is your time. Arise and serve me.[/i] It's old-fashioned, hokey stuff, but then, there's not a single tombstone in this area more recent than the 1930s.\n\n        *set zcommit 0\n        *set scommit 1\n        *set scommit +(round(control/25))\n        *if (scommit > 1)\n          *set scommit -1\n        *comment endif\n        *set control %+5\n        *page_break\n        *goto rise\n      #Try to free your mind and contact the dead.\n        *gosub_scene end_trial\n        You sit on the grass, rest the humerus between your palms and close your eyes. A chill wind buffets your face. You try to visualise…you're not sure what, exactly. Damp from the grass begins to seep through your clothes. \n\n        *if (humanity >= 10)\n          You stick it out for a good twenty minutes but you just can't seem to engage with the dead here. Perhaps you could try with more recent bodies…but you're tired and cold, and you want to go home.\n          *set humanity +1\n          *set control %-10\n          *page_break Next Day\n          *goto_scene stageone\n        *else\n          Finally, it happens. You're thinking about the myriad bodies lying down there. Your mind lifts and you have a vision: a sort of X-ray image of the dead, bones lying spaced in a neat grid, distributed all around you in three dimensions. The flesh of your hands begins to tingle and you touch them to the earth.\n\n          *set zcommit 1\n          *set scommit ((round(luck/25)) -1)\n          *set luck %+10\n          *page_break\n          *goto rise\n      #Move to the newer section instead.\n        *goto newgrave\n  #Recruit in the newer section of the graveyard.\n    *label newgrave\n    You walk to the back section. This area is better-tended and shows signs of recent visitation: plots cleared of debris and flowers still clinging to life in their memorial pots. \n\n    By the dates on the stones, you can see that the dead here are far more recent—fresher, if you like. But you can't ignore the evidence that the bereaved visit here, and if you summon their dearly departed, they will find a large corpse-shaped hole where the neat plot used to be. Very upsetting.\n\n    *choice \n      #Change your mind.\n        You hate almost everybody who lives in this town. But some scrap of decency prevents you from hurting them in this particular way. Today, at least.\n        *set humanity +1\n        *set luck %+10\n        *page_break Next Day\n        *goto_scene stageone\n      #Take a few.\n        *gosub_scene end_trial\n        You examine a few names and dates on the stones. Some of them were younger; in their thirties, twenties, even. They can't have been finished with this life when they were forced to leave it. Could you offer them another chance?\n\n        You take out the humerus and walk the paths, reaching down with your instincts, trying to call the dead who already rest uneasily. You have no idea if this mental communication can get through to them in any way. But you promise if they come, they will have a second chance.\n\n        *set zcommit 1\n        *set zcommit +(round(humanity / 5))\n        *if (zcommit > 1)\n          *set zcommit -1\n        *comment endif\n        *set humanity +1\n        *set control %+5\n        *set luck %+5\n        *page_break\n        *goto rise\n\n      #Take every corpse you can.\n        *gosub_scene end_trial\n        You prowl the stones. DEARLY DEPARTED. IN LOVING MEMORY. REST IN PEACE. A dark, joyful energy fills you. You grip the humerus like a baton. You feel like you could march all day. They're all down there, waiting.\n\n        In a moment, it will begin, like ripping off a bandage, like tearing the scab from a wound. You feel it somewhere deep inside you.\n\n        *set zcommit 1\n        *set zcommit +(round(corruption / 5))\n        *if (luck > 50)\n          *set scommit 1\n        *comment endif\n        *set corruption +2\n        *set max_energy %+10\n        *page_break\n        *goto rise\n  #Take your time and look at the stones.\n    *gosub_scene end_trial\n    *if (graveyard = 1)    \n      You haven't been up here in a long time. The older section is full of crumbling stones and faded names: Alberts and Archibalds, Marjories and Maudes. From time to time, you see a mossy angel, or even a skull and crossbones—although you doubt it means a pirate is buried here.\n\n      Something about the names gets to you, the family relationships. You trace your fingers across the rough top of a granite grave marker. Perhaps you don't need more undead minions that badly.\n\n      *goto stones\n    *elseif (graveyard = 2)\n      Wandering through the newer section, you find a shiny, black stone with a name that startles you. MIRIAM KENNEDY, it reads. This is Mrs Kennedy, the mother of Darren Kennedy who used to live around the corner. You remember her: a red-faced woman with ginger hair who made banana scones and loved to give them out to Darren's classmates. Banana shouldn't have worked as a scone flavour but it really did. \n\n      Your mother never mentioned what Mrs Kennedy died from. And Darren moved away to live with his grandparents. But her body is still under here. Do you really want to disturb it?\n\n      *goto stones\n    *elseif (raised)\n      Workers seem to have filled up most of the holes you left the last time you recruited minions here. Some of the headstones stand crooked or lie flat. Was that your fault? Not that it means much with the body gone. But all the same…\n      *goto stones\n\n    *else\n      You know the layout by now. You're only putting off the decision.\n\n      *goto stones\n\n    *label stones\n    *choice\n      #Recruit in the older section of the graveyard.\n        *goto oldgrave\n      #Recruit in the newer section of the graveyard.\n        *goto newgrave\n      #Leave flowers instead.\n        The florist is way over on the other side of town. But maybe you can find something nearby. You vault over the graveyard wall and search the wild perimeter of the nearby fields.\n\n        *rand bomb 1 3\n        *if (bomb = 1)\n          You're able to collect a small armful of bluebells. They look vibrant against the cold stone of the graveyard.\n          *goto flowers\n        *elseif (bomb = 2)\n          You quickly put together a spray of delicate pink flowers. They stir in the cold breeze.\n          *goto flowers\n        *else\n          You find a few large heads of what looks like giant, yellow daisies. Raindrops sparkle on their vivid petals.\n          *goto flowers\n\n        *label flowers\n        You're careful to shield the flowers as you climb back over the wall.\n\n        There are enough of them to leave on several graves. You walk between the stones. With some, the name draws you in. Others you stop at because they look neglected. In each case, the colourful flowers brighten the grave.\n\n        You feel a bit better about yourself as you head for home.\n\n        *set humanity +2\n        *set luck %+20\n\n        *if (horde_family = false)\n          *page_break\n          Back home you watch your various unfortunate companions as they stumble around the house. They are a nuisance, true, but they're also welcome company. If it wasn't for their moaning and bumping into the furniture, the house would be very quiet and you might have to think harder about what's going on. Better to have a family like this, such as it is.\n\n          On an impulse, you pick flowers from a neighbour's garden and put them in a vase with water, to brighten up the room.\n\n          The vase lasts almost an hour.\n       \n          *set horde_family true\n          *set luck %+5\n        *comment endif\n\n        *page_break Next Day\n        *goto_scene stageone\n\n*comment *****************************************************************\n*label rise\n\n*if ((zcommit = 1) and (scommit = 0))\n  Wind whistles around you. In the distance, a magpie chatters. The cold gets under your coat and into your bones.\n\n  Finally, you hear irregular footsteps crunch on the grass. A single zombie staggers in from another section of the graveyard. It approaches you at a drunken angle. When it stops, it stares at the ground beside you and drools.\n\n  That did not seem worth it.\n\n  *set zombies +1\n  *set minion_count +1\n  *set luck %-10\n  *if (raised = false)\n    *achieve raise\n  *comment endif\n  *set raised true\n  *set corruption +1\n  *page_break Next Day\n  *goto_scene stageone\n*if ((scommit = 1) and (zcommit = 0))\n  Something grabs your ankle!\n\n  You roll backwards, gasping cold air as you tear your foot away.\n\n  A collection of tiny bones sprouts from the earth like a bleached plant. As you watch, it pats the earth. Turf cracks around it and a skeleton heaves itself into view. It shakes out its arms and legs, tilts its head to one side and stares at you.\n\n  This one's a joker. You can tell.\n\n  *set skeletons +1\n  *set minion_count +1\n  *set control %-10\n  *if (raised = false)\n    *achieve raise\n  *comment endif\n  *set raised true\n  *set corruption +1\n  *page_break Next Day\n  *goto_scene stageone\n*else\n  In front of you, the earth cracks and parts, as the dead rise again at your command.\n\n  *if (scommit > 0)\n    *if (scommit = 1)\n      Two bony hands emerge from the grass, clearing dirt from the path of a yellowed cranium. A new skeleton heaves itself into view.\n      *goto newzombie     \n    *else\n      Bones slide from the broken ground, twisting and reassembling into \n      *set number scommit\n      *gosub number\n      new skeleton warriors. Grave dirt drains from their cavities as they ready themselves for action.\n      *goto newzombie\n\n*label newzombie\n\n*if (zcommit > 0)\n  *if (zcommit = 1)\n    A solitary zombie tears itself from its resting place, still wearing the stained remains of its burial suit. It promptly falls over onto its face. You help it to its feet and it gives a guttural moan as it attempts to relearn balance.\n    *goto exit_graveyard\n  *else\n    You feel a moment of savage power as\n    *set number zcommit\n    *gosub number\n    recently-dead claw themselves from the ground. The stench hits you like a punch to the face. You shift upwind while examining your shabby new footsoldiers. A ${master} of necromancy can't afford to throw up every time ${he} summons new minions.\n    *goto exit_graveyard\n\n*label exit_graveyard\n\n*if (groundskeeper)\n  A sharp CLANG reminds you of the presence of the groundskeeper. He has discarded the spade and is running for the gate, holding on to his cap. You try to urge a new minion after him…but you can't quite find the energy.\n  *set visibility +10\n  *set control %+5\n*comment endif\n\nA wave of fatigue pours over you. Calling the dead requires serious concentration. You head for home with weary steps, your obedient, new undead trailing behind. \n\n*set zombies +zcommit\n*set minion_count +zcommit\n*set skeletons +scommit\n*set minion_count +scommit\n*if (raised = false)\n  *achieve raise\n*comment endif\n*set raised true\n*set corruption +1\n*page_break Next Day\n*goto_scene stageone\n\n*label number\n*comment *****************************************************************\n*if (number = 2)\n  two\n  *return\n*elseif (number = 3)\n  three\n  *return\n*elseif (number = 4)\n  four\n  *return\n*elseif (number = 5)\n  five\n  *return\n*elseif (number = 6)\n  six\n  *return\n*elseif (number = 7)\n  seven\n  *return\n*elseif (number = 8)\n  eight\n  *return\n*elseif (number = 9)\n  nine\n  *return\n*elseif (number = 10)\n  ten\n  *return\n*else\n  more than ten\n  *return\n*comment endif\n", "hairdresser": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, hairdresser\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\nYet another indignity of living in a small town is that there is only one place to go and get your hair cut. Unless you want to take your chances on that woman with the lazy eye who goes to people's houses.\n\nNo matter what time of day you go there, \"Cut and Colour\" is full of women who talk too loudly. The exact composition of the group changes from hour to hour but there are always familiar faces, and their tone is consistent: they know better.\n\nAt first you thought they were waiting for a haircut. Then you noticed it never seemed to be their turn. Finally you realised that what they liked was a warm room to hang out in, with free magazines and a captive audience. It is a sort of day care centre for bigots which also offers haircuts.\n\nVidal Sassoon supposedly said that with a small pair of scissors, he could make a woman cry for a week. Imagine what you can do with an undead horde.\n\n*page_break\n\nYou wait until late afternoon, when the light is fading. As you draw close to \"Cut and Colour\", you see figures inside. There are three women sitting around, and an elderly man in the chair. Geena, the stylist, is sporting a purple, ruffled blouse and has her hair pulled up in an unearthly bun. She looks over her shoulder at her cronies as she snips. Even from a distance, you are nervous about her customer's ears.\n\nAs you consider your approach, she waves a hand mirror at the man and removes the protective cape. He pays up and staggers from the shop, patting regions of his head. \n\nHow will you approach your mission of wrath against the hairdressers?\n\n*choice\n  #Get a haircut and improvise while in the chair.\n    *gosub_scene end_trial\n    If this goes right, it might be a long time before you can get a trim again, so you should take advantage of the opportunity. You go in.\n\n    *label haircut\n    The bell over the door clangs. You walk into a fog of hairspray and 80s synthpop music. Geena is using a floor brush to add hair to a small pile under the counter. \"Take a seat.\" She flashes a split-second smile and gestures at the empty chair in front of the mirror.\n\n    As you cross the floor, you feel her cronies' eyes travel up and down your body.\n\n    *page_break\n\n    Geena flourishes the protective cape. It makes a crinkly sound. She fastens it around your neck and moves the seat up a notch, while continuing to talk to her salon hangers-on. \n\n    \"She's always going on about her friends from the Home Counties and how they go on the vineyard tours together and all that. But I looked her up on Facebook and she's friends with a right bunch of skanks. Pardon my language, dear. What'll it be today?\"\n\n    How would you like your hair styled?\n\n    *if (gender = \"boy\")\n      *fake_choice\n        #Just the split ends trimmed.\n        #A little off the top.\n        #A spiky new look to suit your necromantic career.\n        #Something off-centre and dramatic.\n        #[i]Edward Scissorhands[/i] big, goth hair.\n        #A slick Wolverine job with points.\n        #A flat-top like Dolph Lundgren from [i]Rocky IV.[/i]\n        #Shaved sides and a stripe of colour.\n      *goto mmm_hmm\n    *else\n      *fake_choice\n        #Just the split ends trimmed.\n        #A little off the top.\n        #A spiky new look to suit your necromantic career.\n        #Something off-centre and dramatic.\n        #[i]Edward Scissorhands[/i] big goth hair.\n        #A Louise Brooks bob.\n        #A flat top like Bridgette Nielsen from [i]Rocky IV.[/i]\n        #Shaved sides and a stripe of colour.\n      *goto mmm_hmm\n\n    *label mmm_hmm\n\n    \"Mmm-hmm. And there are some photos of those wine tastings. Vineyards, my eye! They're sitting around the back of some bed and breakfast looking pie-eyed and sunburnt at ten in the morning.\"\n\n    Geena's scissors click around your temples. One of the cronies pitches in.\n\n    \"She had Trevor and me round their house once for an 'evening of cards'. Of course he was right keen, thought they would be playing poker and pontoon and so on. I was just hoping for a good game of canasta. And when we got there, do you know what it was? Bridge.\"\n\n    Geena and the other two cronies make a synchronised sound of disgust.\n\n    \"I looked at her and she looked at me and I knew she had just invited us for a bit of one-upmanship. I mean, when would we have learned to play Bridge? And that wasn't the worst. She had invited that awful Polish man who works in the off license.\"\n\n    *choice\n      #Claim to be Polish and take offense.\n        You interrupt in what you hope is a slight Eastern European accent and claim to be from Warsaw. There is a momentary silence before she speaks again.\n\n        \"Of course, he's not awful because he's Polish, love. He's awful and he's Polish. The Germans are worse, of course. I'm not a racist, but…\" She proceeds to say mildly racist things about German food, the French work ethic, and Bulgarian immigrants. Geena nods as she continues to trim.\n\n        You don't fancy your chances of sustaining the accent so you simply have to sit and listen.\n\n        *set energy %-20\n        *set control %+5\n        *page_break\n        *goto haircut2\n      #Interject that Bridge is a terrific card game.\n        You have a book of card games back home and you point out that Bridge is a game of deep subtlety which requires challenging partnership—so it's a good game for couples to learn.\n\n        \"Mmm-hmm,\" says Geena. A large chunk of hair falls past your eyes. You decide not to follow up your comment.\n        *set luck %-15\n        *set control %+5\n        *goto haircut2\n      #Stay silent.\n        You say nothing. Geena runs a comb across the top of your head and pauses to make a point, leaving it stuck in your hair.\n        *set energy %-10\n        *set luck %-10\n        *page_break\n        *goto haircut2\n      #Call a dramatic undead assault through the window.\n        *label cape_wrath\n        Under the cape, you find the humerus. You can almost see its green-yellow glow in your mind's eye. As you feel the undead respond and begin to charge, you pull away from Geena and lift the cape up to protect your eyes.\n\n        *set energy %-5\n        *set luck %+5\n        *goto hair_window\n  #Attempt to lure the inhabitants out into the open.\n    *gosub_scene end_trial\n    You find a good spot behind a boarded-up shop. Peering round the corner, you have a view of the entire hairdressers. You reach for the humerus and send a minion to tap on the window.\n\n    At first, you make it tap and then retreat out of sight. It feels like a bit of harmless mischief. However, the people inside do not react.\n\n    Geena settles on the arm of her chair and makes some crucial point with a head shake and pointing finger. You try again, ordering the undead to stay in view this time. Still no reaction. Geena puts her hands on her hips and appears to be feigning outrage at one of the other women. You try for a thump on the window. Still nothing. Worse, this delicate control is difficult to sustain. It would be easier to just break the window.\n\n    *set energy %-30\n    *set control %+5\n    *choice\n      #Get the haircut.\n        After all, it looks like there's no queue. You take a deep breath and enter the shop. The bell over the door clangs.\n\n        *goto haircut\n      *selectable_if (zombies > 0) #Send a zombie in for a trim.\n        *goto zombie_trim\n      #Send everything you have through that window.\n        *goto hair_window\n  *selectable_if (zombies > 0) #Send a zombie in for a trim.\n    *gosub_scene end_trial\n    *goto zombie_trim\n  #Full-on undead assault.\n    *gosub_scene end_trial\n    *goto hair_window\n\n*comment *****************************************************************\n*label haircut2\n\nGeena continues to shape your hair into something conservative yet awkward, which is definitely not what you asked for.\n\n\"Of course it's the young ones you have to watch,\" another crony pitches in. \"They have such short attention spans. Always checking their phones and watching pop videos on the bus. And they teach them nothing at school. That music they like, that iTunes, it's not even real music, it's all made on the computer….\"\n\n*achieve haircut\n\nYou've pretty much had enough of this. Time to get serious.\n\n*choice\n  #Criticise Geena's professional technique.\n    You insist that you have never seen such shoddy scissorwork. Geena is startled, then offended.\n\n    \"I was taught in the salons of Milan!\" she squawks, snipping her scissors in a careless gesture. A strip falls off her frilly blouse. She begins to rant about how Italians are a better class of customer and how she often had an anisette before work. The scissors swing rather close to your ear.\n\n    \"You don't need to put up with that, Geena!\" hisses a crony. \"You're the best stylist in $!{town}!\".\n\n    \"So I am. The cheek! Get out. Get out! I'm not serving you.\" She hustles you from the chair and out the door.\n\n    *choice\n      #Return home in moral triumph.\n        You take a last look at Geena before heading off. Her nose is thin, her lips pursed and her chest puffed up in outrage. But you can see a hint of doubt there. Could it be she was never good enough for the discerning citizens of Milan and that was why she ended up in $!{town}? Whatever, you've touched a nerve.\n\n        Your undead horde follows you home, fidgety and listless. As you go, you pat your hair. It seems a lot longer on one side than the other.\n\n        *set luck %-10\n        *set control %+10\n        *set visibility +2\n        *set humanity +2\n        *page_break Next Day\n        *goto_scene stageone\n      *selectable_if (zombies > 0) #Send a zombie in for a trim.\n        Geena stares as you walk away. You get out of sight first, then slink back to a hidden vantage point behind an old phone booth.\n\n        *set visibility +2\n        *set control %+5\n        *goto zombie_trim\n\n      #Send the undead in force.\n        Throw you out, will she? Give you half of a bad haircut, will she? You'll show her!\n\n        *set visibility +2\n        *set max_energy %+5\n        *set energy %+5\n        *goto hair_window      \n\n\n  #Send in your undead forces at last.\n    *goto cape_wrath\n  #Tell the women exactly what you think of them.\n    You wait just long enough for Geena to even up the hair on the other side of your head. Then you move her cutting hand aside, tear off the cape and stand up.\n\n    One by one, you confront the salon women. You point out that they could well benefit from a little European culture and style, that many interesting forms of new music are made and distributed worldwide with computers, and in fact almost everybody in the world is achieving more than they are by spending all day in a hairdressers grousing in their uninformed way.\n\n    Finally, you turn to Geena. You point out that she never listens to what her customers want, she never gives them her full attention, and the only reason she stays in business is that she has the only salon in town. You finish up by pressing money into her hand and telling her to make the most of it because you might set up an alternative hairdressing business nearby and then she'll have to watch out.\n\n    You are out the door before she can reply. Where did that last bit come from? No way do you want to be a hairdresser in $!{town}.\n\n    Well, you won't be going back to Geena's salon any time soon. But it felt good to say all of that. Listless undead footsteps follow you home.\n    *set luck %+30\n    *set visibility +5\n    *set humanity +4\n    *page_break Next Day\n    *goto_scene stageone\n\n*comment *****************************************************************\n*label zombie_trim\n\nYou send the zombie shuffling along the pavement to the hairdressers. It struggles with the door and eventually opens it, more by leaning against the handle than anything requiring fine motor control. You wait for the screaming and the running in terror. Geena's cronies size up the new customer. Geena offers it the chair while brushing up hair from the previous client. This is not what you expected.\n\nWhile you ponder what to do, the zombie shambles over to the chair and sits down stiffly. Er, what?\n\nGeena drapes it in a cape while continuing to yack to her hangers-on. Perhaps the zombie retains some kind of kinetic memory, drawn to repeat familiar patterns of motion from its life? That could be useful. But the cape seems like a setback in your campaign of graveyard mayhem.\n\n*set luck %+10\n*choice\n  #Let Geena get on with the zombie haircut.\n    Geena looks into the mirror and notices the zombie's bad skin. She recoils for a moment but covers it with professional haste. Lifting the spray bottle, she gives a couple of scooshes and begins to work with the scissors.\n\n    She chatters and cuts. The zombie's mouth hangs open. One of the hangers-on produces knitting from her bag. The scene is strangely compelling. Ten minutes later, Geena is winding things up. Now comes the interesting question of payment.\n    *set control %+5\n    *set energy %-10\n    *set humanity +1\n    *choice\n      #Watch what happens.\n        Geena removes the cape, trying not to touch the zombie's skin. Without instruction, the zombie stays in the chair, staring at its new look. You see Geena talk, then frown, as the zombie remains inert.\n\n        She puts a hand on her hip and points a threatening finger. She mimes with an invisible phone and mouths the word \"witnesses\". Her cronies sit up, scenting drama.\n\n        *set energy %-10\n        *set control %+5\n        *set visibility +1\n        *choice\n          #Go home and leave the zombie there.\n            You don't want to be discovered nearby if the police are involved. The zombie has already taken some initiative. Maybe it can get home by itself.\n\n            *goto zombie_home\n          #Instruct the zombie to leave without paying.\n            *goto haircut_runner\n          #Instruct the zombie to attack.\n            *goto zombie_attack\n          #Send in the rest.\n            *if ((zombies = 1) and (skeletons = 0))\n              In the excitement of the zombie haircut, you forgot that you do not actually have any more undead minions. You are gripped by a sudden sense of failure and a desire to put your necromantic career down to fate. As the scene inside the hairdressers becomes awkward, you turn away and head home. If the zombie follows you, that will mean something. If not, that will mean something too.\n\n              *goto zombie_home\n            *else\n              *goto hair_window               \n      #Go in and pay for the haircut.\n        Geena removes the cape, trying not to touch the zombie's skin. Without instruction, the zombie stays in the chair, staring at its new look. You see Geena talk, then frown, as the zombie remains inert. It's the right moment to step in. The bell over the door clangs.\n\n        Geena pays little attention until you bring out your money.\n\n        \"So this is your older…brother?\" she says. \"…Sister? Very kind of you to look after—very responsible—\"\n\n        You pay up and usher the zombie from the shop. The bell clangs again as you open the door to leave. The zombie bumps against the doorframe. You're halfway home before you realise that Geena did an entire haircut without noticing whether her customer was male or female.\n\n        Well, you got a zombie groomed and paid the bill. That was surely one of the strangest afternoons of your life.\n\n        *set control %+15\n        *set luck %+10\n        *set humanity +4\n        *set visibility +1\n        *page_break Next Day\n        *goto_scene stageone\n      #Instruct the zombie to become aggressive.\n        *goto zombie_attack\n      #Send in the rest of your horde.\n        *if ((zombies = 1) and (skeletons = 0))\n          In the excitement of the zombie haircut, you forgot that you do not actually have any more undead minions. You are gripped by a sudden sense of failure and a desire to put your necromantic career down to fate. As the scene inside the hairdressers becomes awkward, you turn away and head home. If the zombie follows you, that will mean something. If not, that will mean something too.\n\n          *goto zombie_home\n        *else\n          *goto hair_window               \n  #Order the zombie to get back up and attack.\n    *goto zombie_attack\n  *selectable_if (skeletons > 0) #Now send in a skeleton.\n    The skeleton swaggers forward towards the shop. It grasps the handle in a bony grip and leans around the door, grinning. Geena's cronies look up.\n\n    \"Auugh!\" one screams. \"It's the reaper come for me! Like the cards said he would!\" She leaps up and runs across the shop in terror. Now this is the kind of reaction you wanted. The skeleton steps inside and raises its arms as if in a particularly cheap black-and-white movie.\n\n    The zombie rises from the chair and rips the protective cape from its shoulders. A small chunk of neck goes with it. Geena gasps.\n\n    *if (minion_count = 3)\n      Your remaining minion surges past to pile into the salon after the skeleton. So much for your bodyguard.\n    *comment endif\n    *if (minion_count > 3)\n      Your remaining minions surge towards the salon and stumble in, jamming against each other as they all try to use the door at once. You're left alone in the street. It seems sophisticated tactics do not come naturally to this particular squad.\n    *comment endif\n\n    *set max_energy %+5\n    *set energy %+5\n    *set control %-5\n    *set visibility +1\n    *page_break\n    *goto general_mayhem\n\n\n*comment *****************************************************************\n*label zombie_attack\n\nThe zombie rises from the chair and rips the protective cape from its shoulders. A small chunk of neck goes with it. The zombie staggers back against the mirror, knocking over applicators, disinfectant and bottles of mousse. You see the salon hangers-on straighten up at the excitement.\n\nGeena, however, is having nothing of it. Instead of backing off, she stands her ground and folds her arms, tapping her foot like a primary school teacher. The zombie is clearly not her first difficult customer.\n\n*choice\n  #Instruct the zombie to attack Geena.\n    The zombie raises its decaying arms and reaches towards Geena's face. She looks disgusted and batters it off like a drunk suitor. It staggers back under the force of her blows. You concentrate hard to get it upright again.\n\n    *set luck %-5\n    *set control %+5\n    *set energy %-10\n\n    *choice\n      #Persist with the attack.\n        *goto zombie_salon_fight\n      #Pull the zombie out.\n        *goto haircut_runner\n      #Send in everything else.\n        *if ((zombies = 1) and (skeletons = 0))\n          You issue the command for reinforcements, forgetting for a moment that one zombie is all you have. The salon women move in on it. You had better get it out of there.\n          *goto haircut_runner\n        *else\n          *goto hair_window\n  #Instruct the zombie to attack Geena's cronies.\n    The zombie lurches past Geena and advances on the salon ladies. They gasp in unison. One gets flustered and throws her handbag into the air.\n\n    Geena reaches over and grabs the zombie by the back of its collar. She hauls it away from the other women and thumps it against a mirror. You guess that will leave a nasty stain.\n\n    *set luck %+5\n    *set energy %-5\n\n    *choice\n      #Turn the zombie on Geena instead.\n        *goto zombie_salon_fight\n      #Withdraw it in the face of superior firepower.\n        *goto haircut_runner\n      #Send in everything else.\n        *if ((zombies = 1) and (skeletons = 0))\n          You issue the command for reinforcements, forgetting for a moment that one zombie is all you have. The salon women move in on it. You had better get it out of there.\n          *goto haircut_runner\n        *else\n          *goto hair_window\n  #Have the zombie make a break for it.\n    *label haircut_runner\n    Perhaps there is no need for murder and mayhem in the pursuit of revenge. A smelly customer who dodges the bill might be payback enough. You send the zombie lurching towards the salon door. It leans on the handle. The door opens towards it.\n\n    *if (luck > 42)\n      The door clips the zombie and spins it around. Whether by accident or instinct, it ends up facing the right way and staggers from the shop. Geena seems stunned for a moment but recovers and starts after it.\n      *set advantage true\n      *goto hair_chase\n    *else\n      The door clips the zombie and spins it around. It reels back into the shop and falls face-first against Geena. She yanks her hands away and sticks out her tongue in disgust. You reorient the zombie and pull it out. Geena pounds in pursuit.\n      *set luck %-5\n      *goto hair_chase\n\n*comment *****************************************************************\n*label zombie_salon_fight\n\nThe zombie wraps grisly fingers around the frills of Geena's blouse. She recoils from its fetid breath, but can't pull away. Her cronies seem frozen in their chairs. Geena drags the zombie towards her workspace, knocking over the chair. One hand scrabbles around as the other fends off the zombie.\n\nShe grabs up a pair of long scissors\n*if (luck > 54)\n  and plunges them deep into the zombie's breast. It doesn't seem to notice as it wrestles her to the floor.\n  *set luck %+10\n  *goto zombie_salon_fight2\n*else\n  and plunges them deep into the side of the zombie's head. You feel a stab of pain in your own head. The zombie convulses and crashes to the floor, still gripping Geena's purple frills. She goes down with it.\n  *set control %-10\n  *goto zombie_salon_fight2\n\n*label zombie_salon_fight2\n\nGeena's cronies are on their feet now, moving towards the fight. You have to inch closer to see through the window. In fact, you're easy to spot now. You'll just have to hope a zombie brawl will keep their attention.\n\n*page_break\n\nGeena rips herself away, leaving the purple frill in the zombie's grasp. There are objects scattered all over the floor. Which will you instruct the zombie to attack with?\n\n*fake_choice\n  #A can of hair mousse.\n    The zombie grabs up a shiny can of hair mousse. It clearly has a finger on the trigger because white foam spurts from the live end, coating the zombie and Geena together. As the experienced hair professional, Geena has a natural advantage. She slams the zombie under the chin and scrambles to her feet, brushing foam from her eyes.\n  #A spiky brush.\n    The zombie clutches at the nearest brush and rakes it across Geena's face. Unfortunately, it seems to be one of the soft brushes she uses to clean stray hair off customer's necks at the end. This only annoys her. She clobbers the zombie in the face and climbs to her feet.\n  #The cape.\n    Perhaps you can smother her with her own protective cape. The zombie reaches for the shiny, black fabric but becomes confused by its folds. Geena has time to back off. She lashes out with a foot and catches the zombie in the face.\n  #A spray bottle of water.\n    Zombie fingers wrap around the plastic bottle, bring it up and squeeze. Unfortunately, the bottle is pointing at the zombie's own head. It gets a couple of good scooshes off, soaking itself, before Geena rams the bottle into its face. She scrambles to her feet as it reels back.\n  #Just attack bare-handed.\n    Geena scrabbles back along the floor towards her cronies. The zombie crawls in pursuit. After a few seconds of this, the more assertive of the ladies smashes it with her chair. Geena has time to get to her feet.\n*comment endif\n\nThe four women surround the zombie as it gropes around the floor. They wield umbrellas and knitting needles. One formidable matron grabs the hatstand and lifts it above the prone undead.\n\nThis looks extremely bad. You are clearly going to lose this zombie unless you cause a distraction. \n*if ((zombies > 1) or (skeletons > 0))\n  It's too late to bring in the rest of the undead.\nYou need to act immediately.\n\n*choice\n  #Accept it.\n    You turn away, but not quite fast enough. Out of the corner of your eye, you see the hatstand descend. Your link with the zombie drops, and as it does, you feel a smothering sadness.\n\n    The salon will need quite a bit of cleaning, for sure. But it doesn't seem quite the glorious revenge you had planned.\n\n    *set zombies -1\n    *set minion_count -1\n    *page_break Next Day\n    *goto_scene stageone\n  #Throw something heavy through the window.\n    You search your surroundings for something detachable. Littered around the street are empty lager cans, plastic clothes hangers, and a half-eaten bag of fish and chips. Finally you notice\n    *if (luck > 35)\n      a broken piece of metal pipe and snatch it up. You toss it at the salon window. It strikes with a satisfying TSCHAAK and the window shatters, slivers of glass raining to the ground. The noise distracts the women and you try to propel the zombie towards this large, new exit.\n\n      *set hair_window true\n      *if (control > 50)\n        Concentrating, you manage to get it to its feet. It veers towards the window and topples over the remaining section of wall. Still, it's outside, and the prospect of being hit in the face by a second pipe seems to dissuade the women from following. Your zombie staggers away, listing heavily to one side.\n\n        After a minute, you follow it in the direction of home. You don't think anybody spotted you.\n        *set luck %+15\n        *set visibility +1\n        *page_break Next Day\n        *goto_scene stageone\n      *else\n        Concentrating, you manage to get it to its feet. However, either you haven't mastered its navigation yet or something important in its head is broken, because it veers towards the door and runs into the wall. It topples back down again. Geena takes hold of the hatstand, steps close…and you feel your link with the zombie abruptly severed.\n\n        A strange sense of loneliness afflicts you on the road home.\n        *set zombies -1\n        *set minion_count -1\n        *page_break Next Day\n        *goto_scene stageone\n    *else\n      a headless dolly in a grimy pinafore. It's the best you can do so you grab it and throw. The dolly bounces off the window with a dull THUD. The angry women don't even notice. You can't quite see what happens to your zombie but a spray of green ichor ruins Geena's purple blouse seconds before your connection to it drops.\n\n      A strange sense of loneliness afflicts you on the road home.\n      *set control %-5\n      *set zombies -1\n      *set minion_count -1\n      *page_break Next Day\n      *goto_scene stageone\n  #Enter the salon yourself. \n    Without thinking, you push the door open. The bell over the door clangs. This doesn't seem quite enough so you put your hands to your head and let off a short scream. The women freeze and stare at you.\n\n    You ask what they're doing to the person on the ground and whether they refused to pay. This causes enough confusion for you to urge the zombie towards the door, which you tactically keep open with one foot.\n\n    *if (energy \u003c 20)\n      You're too tired, however, to control the zombie accurately. Geena follows its movements, puts a platform heel on the back of its head, and stamps. You gasp as its undead skull gives a wet crack. As the connection drops, you sag against the door.\n\n      *set zombies -1\n      *set minion_count -1\n      *goto zombie_salon_fight3\n    *else\n      With some last reserve of energy you get the zombie outside. Geena tries to follow but you stand in the doorway and detain her with a barrage of confused questions about \"that man with the weird skin\". The zombie gets around a corner and staggers away.\n\n      *set luck %+15\n      *goto zombie_salon_fight3\n\n*label zombie_salon_fight3\n\nThe salon is suddenly quiet. The women stare at you. You can see the suspicion in their eyes. You try your best to play the part of someone whose regular appointment for a trim has been interrupted by unexpected undead mayhem. You're not sure if they believe you.\n\nIt looks like no more appointments are being taken today in the wrecked salon. You head home, feeling weary.\n\n*set visibility +3\n*page_break Next Day\n*goto_scene stageone\n\n*comment *****************************************************************\n*label hair_chase\n\nThe zombie sways through the evening gloom. The angry hairdresser makes good time despite her platform heels. You are caught up in the excitement of the chase for a moment and so are slow to realise that the zombie is homing directly in on you.\n\n*set energy %-15\n*page_break\n\n\"Hold it right there! I'm not one of them big chains, you know! You're robbing from a family business!\" \n\n*if (advantage = false)\n  She's going to catch it up within seconds.\n\n*choice\n  #Stop Geena by \"accidentally\" bumping into her.\n    You step out from your hiding place just as Geena approaches, walking directly across her path. You're careful not to look at her, trying to seem like you are about important business—\n\n    She crashes into you and you tumble heavily to the pavement together. The breath rushes out of you.\n\n    *if (visibility >= 10)\n      *goto geena_hmm\n    *else\n      *if (luck > 49)\n        \"Oh, my word! I'm so sorry, love. I was chasing some little ratbag who got a full style and then done a runner. Are you all right?\"\n\n        Your elbow is bleeding and it takes you a minute to get up. But there is no permanent harm done and the zombie has made its escape. You accept Geena's apologies and promise to visit the salon in the near future for some \"free styling\".\n\n        *set control %+5\n        *set humanity +2\n        *page_break Next Day\n        *goto_scene stageone\n      *else\n        *label geena_hmm\n        \"Aargh! Gerroff me!\"\n\n        You make a point of remaining tangled with Geena for long enough that the zombie gets out of sight. Eventually, you extract your limbs and you both get to your feet. She brushes herself down and you ask if she is all right.\n\n        \"Fine,\" she spits. \"But I guess I ain't catching that little ratbag any time soon.\"\n\n        She gives you a long, hard look with narrowed eyes. Then she turns and stalks back to the shop. She now has a slight limp.\n        *set control %-5\n        *set visibility +3\n        *set humanity +1\n        *page_break Next Day\n        *goto_scene stageone\n  #Trip Geena as she goes past.\n    You instruct the zombie to carry on down the street. At it passes, you stick out your foot. Geena is at a dangerous velocity for her current footwear. She tumbles over your ankle and goes down into the gutter, flailing. \n\n    Taking your chance, you sprint away. You can rendez-vous with the zombie back home. You don't think Geena saw your face. Did she?\n\n    *if (luck \u003c 70)\n      *set visibility +2\n    *set luck %+5\n    *set humanity +1\n    *page_break Next Day\n    *goto_scene stageone\n  *if (advantage) #Pick a good spot for a confrontation.\n    The zombie has enough of a head start that you can divert it down a quiet alleyway. Geena crashes in and meets the zombie face first. You move into position to watch.\n    *goto geena_showdown\n  #Unleash the entire horde on Geena.\n    *if ((zombies = 1) and (skeletons = 0))\n      Yeah…that zombie is your entire horde. While you do a mental facepalm, Geena catches it up and grabs it by the shoulder to spin it round.\n\n      *set control %-10\n      *goto geena_showdown\n    *else\n      The undead charge, converging on Geena. You see her eyes flash as she scents danger. She turns—and the zombie she chased is on her, rotten fingers clutching, already chewing into the back of her neck. She wails and goes down hard.\n\n      You try to send commands into the agitated mass of minions, to exert your will on the situation. The humerus burns against your hand. When you do get control, and pull the undead back, Geena's body is limp on the road, gore smeared down her back. Blood pools beneath her neck and collects in the gutter.\n\n      You stare down at the dead hairdresser. Is this the fate you would have chosen for her? Maybe—but you lost control. You turn away before Geena's cronies come looking for her. The horde leave with you. They have no moral issues.\n\n      *set hair_kill true\n      *set bodycount +1\n      *set visibility +6\n      *set control %-10\n      *set luck %-5\n      *set corruption +1\n      *page_break Next Day\n      *goto_scene stageone\n      \n\n*comment *****************************************************************\n*label geena_showdown\n\nIt's a clash between two brawlers. One is a wild-eyed, raging monster—the other is your zombie. You have the uncanny feeling of playing a movement-sensing computer game as you animate the zombie to trade blows with Geena.\n\n\"Family business!\" she shrieks with a crosspunch. \"The personal touch! Overheads!\" Her strange little bun has begun to break apart, strands of hair springing loose. The zombie is knocked back by her brutal assault.\n\n*choice\n  #Try to overpower her with the zombie's weight.\n    The zombie doesn't feel pain, of course. You flop the zombie through her fusillade of blows and try to lean its dead weight on her.\n\n    *if (luck > 52)\n      The plan works and Geena screams as she collapses to the ground under a pile of fetid flesh.\n      *goto geena_down\n    *else\n      She elbows the looming fetid figure to one side, managing a solid kick to its former solar plexus as it goes down. \n      *goto geena_up\n  #Watch for an opening.\n    It's not too hard to shake off blows that aren't actually hitting you, but instead an upright bag of dead flesh some metres away. The zombie staggers under the onslaught but you see an opening when Geena pulls back for a big haymaker.\n\n    *if (control >= 50)\n      Your zombie grabs for her head at just the right moment and topples her to the ground.\n      *goto geena_down\n    *else\n      The zombie responds a little too slowly. Geena lashes a foot out and sweeps its legs from under it. It drops like a bag of mulch.\n      *goto geena_up\n  #Wait until she tires.\n    You use a Mohammed Ali tactic against Geena, letting her wear herself out while the zombie gets angry—except the zombie is largely incapable of emotional response and every strike knocks pieces off it.\n\n    *if (energy > 48)\n      Finally, Geena's movements slow and you push the zombie through her guard. She gasps as it bears her hard to the ground.\n      *goto geena_down\n    *else\n      Geena, however, does not seem to get tired. The zombie is knocked off-balance and finally drops.\n      *goto geena_up\n\n\n*comment *****************************************************************\n*label geena_down\n\nGeena blinks and moans, stretched out on the ground. Your zombie looms over her. \"Wha—\" she says. \"What did—?\"\n\n*choice\n  #Hold the zombie back and lecture her on customer care.\n    The zombie leans in for a killing blow but you restrain it with a finger on the bone. You begin a catalogue of the indignities you've suffered at her hair salon: the teasing, the inattention, the unfortunate retro style choices. Geena seems initially startled, then confused, but after a couple of minutes of this, she seems to have a moment of revelation.\n\n    \"I try to create a positive environment. With my bubbly personality,\" she murmurs. \"But maybe it's too much for some customers—too overpowering—\"\n\n    You slip away before she can recover her wits, taking the zombie with you. \n\n    *set visibility +2\n    *set humanity +4\n    *set control %+10\n    *set luck %+10\n    *page_break Next Day\n    *goto_scene stageone\n  #Leave, satisfied with the scare you've already given.\n    She trembles as she waits for a killing blow that never comes. You slip away and the zombie staggers after you. Geena might go on cutting hair but she will be a little more reflective in the days to come.\n\n    *set humanity +3\n    *set control %+5\n    *set luck %+10\n    *page_break Next Day\n    *goto_scene stageone\n  #Kill her.\n    The zombie plunges and you feel its savage surge of energy as it delivers a killing blow. You hold out for long enough for it to get its feed, then you turn for home, leaving the broken, blood-sodden body of the hairdresser behind.\n\n    *set visibility +2\n    *set corruption +2\n    *set control %+10\n    *set luck %+10\n    *set hair_kill true\n    *set bodycount +1\n    *page_break\n    *goto geena_bone\n  #Kill her and get the zombie to remove her scalp.\n    The zombie plunges and you feel its savage surge of energy as it delivers a killing blow. You do some careful, very draining control, using an exposed fragment of bone to tear the scalp away from the hairdresser's head. That strange little hair bun will convincingly cover a chunk of exposed scalp on another zombie.\n\n    You feel tired as you turn for home, leaving Geena's broken, blood-sodden body behind.\n\n    *set visibility +2\n    *set corruption +4\n    *set control %+20\n    *set luck %+10\n    *set hair_kill true\n    *set bodycount +1\n    *page_break\n    *goto geena_bone\n\n\n*comment *****************************************************************\n*label geena_bone\n\nYou haven't gone four steps before you hear a chilling sound, like a wet sack being dragged across the ground. You can't help but look back.\n\nGeena's shattered body rises from the floor and confronts you with a snarl, ribs twisted and shoulders bent. Its scissor fingers twitch and malevolence radiates from its sunken eyesockets. Yet it seems to follow the humerus in your hand.\n\nOne of its arms reaches up and touches the top of its head. It pats to one side, then down the back. It seems to recoil at the mess it finds there. \n\n*choice\n  #Blast Geena back to oblivion.\n    The humerus has yanked this thing back from death. But you don't need an ex-hairdresser disrupting your horde. You level the bone and command the forces animating it to withdraw. \n\n    It twists, frowns with the little bit of face it has left, then goes slack. Its body hits the floor once more with a final, wet thud.\n\n    Time to clear off before the process begins again.\n\n    *set control %+5\n    *set max_energy %+5\n    *set humanity +1\n    *page_break Next Day\n    *goto_scene stageone\n  #Instruct Geena to obey your will.\n    You level the humerus and launch a battle of wills against the deceased hairdresser. The thing doesn't seem interested. Distracted, it tears at its head, peeling off strips of flesh. The carnage is a little too much even for your experienced eye. You continue the battle of wills without looking directly at Geena.\n\n    *if (control > 47)\n      As the thing continues to tear itself to pieces, you feel its resistance falter. You press your advantage and introduce a reassuring, calming tone to your commands. Its movements slow.\n\n      By the time it succumbs and steps forward to join your ranks, there is precious little flesh left on its bones. You suppose this is a new skeleton. You're going to have to rinse it before you can use it.\n\n      *set skeletons +1\n      *set minion_count +1\n      *set max_energy %+5\n      *set energy %-20\n      *set corruption +2\n      *page_break Next Day\n      *goto_scene stageone\n    *else\n      The thing pays no attention, literally tearing itself to pieces from the head down. Overwhelmed, you stagger back. Once it has stripped off enough flesh, it begins to pull its own bones apart. You can't help but stare in grim fascination. Surely this must contradict the laws of physics?\n\n      In the end, you are left with a pile of bones and gore. Still, at least things are quiet again. Time to slip off.\n\n      *set energy %-40\n      *set corruption +2\n      *page_break Next Day\n      *goto_scene stageone\n\n  #Appeal to her professionalism.\n    In an approach so twisted you amaze yourself, you try to communicate that this dripping figure could continue its hairdressing even beyond the grasp of death.\n\n    The thing stops tearing at itself for a moment, poised as if listening. Then it begins to walk. It pauses every couple of steps to rip another strip of flesh off in a violent burst, like a really serious wax job. At its desk in the salon, it picks up a few pairs of scissors.\n\n    *if (luck > 48)\n      By the time it shuffles into your ranks, it's really just a skeleton carrying scissors. But it desperately needs a wash.\n\n      *set skeletons +1\n      *set minion_count +1\n      *set max_energy %+5\n      *set energy %-20\n      *set corruption +2\n      *page_break Next Day\n      *goto_scene stageone\n    *else\n      It faces you for a good ten seconds, considering. Then it rams the scissors into its own skull and collapses into a slack pile of body parts.\n\n      Now that was just rude.\n\n      *set energy %-40\n      *set corruption +2\n      *set control %-10\n      *page_break Next Day\n      *goto_scene stageone\n\n*comment *****************************************************************\n*label geena_up\n\nHer rage held in check, Geena bends over the zombie. Her nose wrinkles as she begins to search its pockets. To your surprise, she finds a thin wallet. She peels a couple of notes from it, hesitates, then takes another. She throws the wallet onto the chest of the fallen zombie.\n\n\"Just so you know,\" she says, breathing heavily, \"you left a good tip.\" Then she stomps away.\n\nYou assist the defeated zombie to leave the scene.\n\n*set luck %+5\n*set control %-10\n*set max_energy %+10\n*page_break Next Day\n*goto_scene stageone\n\n*comment *****************************************************************\n*label hair_window\n\n*set hair_window true\n\nYour pulse races as your\n*if (minion_count \u003c= 2)\n  mini\nundead horde rushes the window.\n*if (skeletons > 0)\n  A skeletal head butt, delivered with animated glee, shatters the glass\n  *goto hair_window2\n*else\n  Grasping zombie hands force their way through the glass\n  *goto hair_window2\n*label hair_window2\nand the salon crowd look up as the cheerful window of \"Colour and Cut\" rains to the floor in pieces.\n\nYour horde steps through the raggedy spikes of glass.\n\n*if (minion_count > 7)\n  Faced with such overwhelming numbers, the salon hangers-on screech like a hellish choir, and fumble against each other trying to reach the back door. Knitting and hats and what appears to be a half-bottle of gin go flying.\n\n  *goto geena_alone\nGeena's mouth curls into a snarl. She snatches up a metal bin. \"You wee freaks! Get out of my salon! Ladies—could you lend a hand?\" \n\nThe three hangers-on look startled, yet respond to the authority in Geena's voice. One comes forward brandishing a rolled-up golf umbrella. The other two lift their chairs ready to swing.\n\n*choice\n  #Concentrate on Geena.\n    You order a direct charge on the lady in command.\n\n    *if (((energy > 50) and (control > 50)) and (skeletons > 0))\n      In a spectacular assassination move, a skeleton leaps from the window and thrusts her to the ground by the neck. You hear a gurgle and a dry snap. The hangers-on shriek and flee.\n\n      Whether you intended to or not, your skeleton has killed Geena. You stare around the wrecked salon which moments ago was a functioning beauty shop.\n\n      You had better get out of here before anyone arrives.\n\n      *set bodycount +1\n      *set control %-10\n      *set corruption +1\n      *page_break Next Day\n      *goto_scene stageone\n    *elseif ((control > 50) and (zombies > 0))\n      A zombie knocks aside a blow to the face and disarms Geena. It drags her down in a jumble of chairs, rollers, and hairdryer cord. Seeing her felled so quickly, her cronies work out they will be next on the menu. They drop their weapons and flee, screaming.\n\n      *set luck %+15\n      *page_break\n      *goto geena_down\n    *else\n      Geena grits her teeth and swings hard. You may have underestimated the fierceness of a small business owner in today's harsh financial climate. She levels the bin and smashes the leading undead in the face. It's knocked back. You almost feel the blow yourself.\n\n      *set energy %-15\n      *set luck %-5\n      *page_break\n      *goto general_mayhem\n\n  #Ignore Geena and rush her cronies.\n    Geena blinks as the undead, loose-jawed and smelling of the grave, go straight past her and charge her lieutenants. The sudden attack catches them unaware. \n\n    *set target (100 - (minion_count * 12))\n    *if (energy > target)\n      Their brave formation breaks under the assault and they fall back, weapons scattered, eyes wide. Geena charges into the fray from behind, smiting with the bin, but she isn't fast enough to restore discipline. Two of them make it out the door but the third gets caught by her jacket. She struggles out of the sleeve.\n\n      *if (control > 43)\n        You must make a quick decision.\n\n        *choice\n          #Let her go.\n            She breaks after her friends, terrified. You feel something from the undead. Was that frustration?\n\n            *set humanity +1\n            *goto geena_alone \n\n          #Kill her.\n            *label third_neck\n            A minion moves in. Her howl is chilling and perhaps just a little exciting, but snaps off quickly as her neck breaks.\n \n            *set bodycount +1\n            *set corruption +1      \n            *goto geena_down \n      *else\n        Your control falters with the chaos inside the shop.\n        *goto third_neck\n    *else\n      These women are made of stronger stuff than you gave them credit for.\n      *if (skeletons > 0)\n        The two with chairs swing them together and hit a skeleton from both sides. Its ribs shatter and it goes down. You feel a moment of dizziness.\n\n        *set skeletons -1\n        *set minion_count -1\n        *set control %-10\n        *page_break\n        *goto general_mayhem\n      *else \n        The one with the umbrella makes a precise thrust straight into a zombie's face. As you see the ichor-stained point emerge from the back of its head, the zombie freezes and drops. You feel a sudden nausea.\n        *set zombies -1 \n        *set minion_count -1\n        *set control %-10\n        *page_break\n        *goto general_mayhem\n  #Order general mayhem.\n    *goto general_mayhem\n\n*comment *****************************************************************\n*label general_mayhem\n\nThe shop is suddenly full of battling women and marauding undead. Chairs fly. A hairdryer whines. Somebody puts up a golf umbrella. You see fists, shredded pieces of purple blouse, a bloody hand print on the wall that wasn't there a moment before.\n\n*if ((control \u003c 63) and (zombies > 0))\n  A zombie falls out of the front door, its face somehow impaled on a hatstand. \n  *if (corruption > humanity)\n    The mushy sight gives you a strange thrill.\n    *goto hatstand\n  *else\n    The mushy sight makes you feel queasy. \n    *goto hatstand\n  *comment endif\n\n  *label hatstand\n  The hatstand lies still. So does the zombie.\n  \n  *set zombies -1\n  *set minion_count -1\n  *set control %-5\n*comment endif\n\nYou feel a headache come on with abnormal speed as you try to control the fray. There is too much going on, too quickly.\n\n*if ((energy \u003c 47) and (skeletons > 0))\n  As you stare, a skeleton is knocked back against a mirror and the glass spiderwebs. The skeleton's component bones begin to drop off, one by one. First fingers, then ribs, then the jaw, hanging loosely to one side before it plunges to the floor. The skeleton falls apart as you watch. \n\n  *set skeletons -1\n  *set minion_count -1\n  *set control %-10\n*comment endif\n\nYou know you have to get away right now. It takes a concentrated effort to get yourself moving. You try to recall your minions—the connection feels very tenuous.\n\nThrough sheer willpower, you make it back to your house. You collapse on the floor in the hall and blackness overwhelms you.\n\n*page_break\n\nYour eyes open to see carpet. You struggle up. Your remaining minions are there, all accounted for. The door hangs open. It's dark outside.\n\nYou get the impression one of the women is dead. Perhaps two of them.\n\nMaybe you should concentrate on smaller groups of undead until your control over them is more developed. You drag yourself upstairs to bed.\n\n*rand bomb 1 2\n*set bodycount +bomb\n*set control %+5\n*set visibility +6\n*if (bomb = 2)\n  *set hair_kill true\n*page_break Next Day\n*goto_scene stageone\n\n\n*comment *****************************************************************\n*label geena_alone\n*if (zombies = 0)\n  A skeleton closes in on Geena. Her earlier bravado seems to wilt at the sight of its strange gait and its hollow eyesockets. It steps back and forward in front of her, tilting its head, sizing her head.\n\n  The moment seems to go on too long for Geena. She lashes out a foot and spins her customer chair. The back clatters into the skeleton. Geena is immediately off through the spikes of glass, towards the main road, yelling for help. \n\n  You had better get out of here. You proved a point—sort of.\n\n  *set control %+5\n  *set luck %+10\n  *set visibility +4\n  *page_break Next Day\n  *goto_scene stageone\n\n*else\n  As Geena stands there alone, a zombie lurches from the mob with a strange, purposeful movement. You wonder if it had a bad experience here before. Faster than you expected, it slams her to the floor.\n\n  *goto geena_down\n\n\n*comment *****************************************************************\n*label zombie_home\n\n*if (control > 37)\n  The zombie shows up two hours later, bumping its face against your front door. Its hair, previously a lank and greasy mop, now features layers and a conditioned sheen. Although chunks of its bare scalp remain visible, it now smells faintly of summer meadows. \n  *set luck %+10\n  *set max_energy %+5\n  *page_break Next Day\n  *goto_scene stageone\n*else\n  By morning, the zombie hasn't shown up, and you make an early reconnaisance alone. \"Cut and Colour\" is open as normal. The same three women are sitting inside. There are no signs of a zombie. You take the rest of the day off.\n  *set luck %-10\n  *set zombies -1\n  *set minion_count -1\n  *page_break Next Day\n  *goto_scene stageone\n\n", "halloween": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, halloween\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\n*if (horde_family = false)\n  Late that night, you find yourself sitting outside on the garden wall. Something nags at you, a moment from long ago. You broke a neighbour's window with a ball and hid under the bed when they came to complain. You still remember your father's angry voice and the thunder of his feet on the stairs.\n\n  Now? You've fought with the actual police. And…nothing. The assorted misfits indoors are the only family you have left, and they don't care. You feel a brief burst of loneliness.\n\n  Immediately you hear breaking glass from inside the house. If you're lucky, it's just a tumbler. If it's an actual window, that means another draught while you're watching TV.\n\n  Yet as you head inside to view the damage, you find you're not angry. There is something helpless about the undead. They need you.\n\n  *set horde_family true\n  *set luck %+5\n  *page_break\n*comment endif\n\nYou sleep poorly and wake late. Perhaps the encounter with PC McMurdo has bothered you more than you thought. Even the banshee doesn't wake you up. You have a late breakfast—which could be more accurately described as a late lunch—under the eyes of the shuffling undead.\n\nOutside, something has changed about $!{town}.\n*if (visibility > 20)\n  There are empty drives where you're used to seeing family cars parked. Several shopfronts remain covered by metal shutters. One features new graffiti which reads I SAW THE DEAD.\n  *goto pumpkin\n*else\n  The streets feel quieter than usual. Gusts of wind chill your face, reminding you that winter is coming.\n  *goto pumpkin \n\n*label pumpkin\n\nYou walk several streets before you notice a house with two pumpkins flanking the door. You stop and check the date. Sure enough, it's Halloween. How did you manage to miss that? Of course, in your house lately, every day has been Halloween.\n\nHow will you spend the evening?\n\n*choice\n  #Take advantage of this rare occasion to parade the undead in public.\n    *goto parade\n  #Stay in and watch old horror films.\n    *goto horror\n  #Go to bed early.\n    *set max_energy %+5\n    *set energy %+5\n    *goto disturbed\n\n*comment *****************************************************************\n*label parade\n\nYou do a bit of undead makeup and make a cloak out of your parents' best tablecloth.\n*if (minion_count = 1)\n  After dark, you head out onto the street with your solitary minion.\n  *goto parade2\n*else\n  After dark, you take your shuffling horde out on the streets.\n  *goto parade2\n\n*label parade2\nIt feels good to be able to strut around without having to watch your back.\n\nThere seem to be fewer kids out on the street this year. There are a couple of good fake zombies, a nurse with a chainsaw, some confused character with a Batman cape and a pumpkin head, and several Disney princesses accompanied by bored-looking fathers. You get a nod from some hipster in a fez.\n\n\"$!{name}!\" somebody shouts from across the street.\n\n*page_break\n\nA figure runs across the street brandishing a huge sword covered in baking foil. You reach for the humerus—but it's Robbie, dressed as a sort of manga character. He has a look in his eyes you recognise as an excess of cola and chocolate. He pretends to cut your head off with his lame cardboard sword.\n\n\"Hi $!{name}! I didn't know you'd be out tonight. I've got to take my sister round the neighbourhood.\" He scowls and points a thumb over his shoulder to where a sulky girl in a Disney princess outfit is battering a magic wand against a wall, trying to break the star off the end. \"We could go round togeth—\"\n\nRobbie's words die away as your undead horde comes into view. Of course. You never quite got round to telling him you were a necromancer for real.\n\n*if (school_attacked)\n  \"I was off school sick that day,\" he says slowly. \"I thought people had made it all up to see if I would believe it. But it was true, wasn't it? It was you.\"\n  *goto parade3\n*else\n  His face folds into a pout. \"I was wondering why you hadn't come round for a while. I suppose\n  *if (minion_count = 1)\n    this is your new friend.\"\n    *goto parade3\n  *else\n    these are your new friends.\"\n    *goto parade3\n\n*label parade3\n\nHow will you handle Robbie?\n\n*choice\n  #Pretend you do not know any nearby minions.\n    You look around as if surprised by the company of the undead. You deny everything and cross the road towards Robbie's sister. A minion follows you. You slip your hand into your pocket and silently command it to step back. It pauses, then disappears into the shadows. You turn to Robbie, gratified to have resolved the problem.\n\n    \"I'm not stupid, you know. You're controlling it with that weird bone in your pocket. I don't need to hang out with you. I can hang out with my sister. Come on, Trudy.\"\n\n    He grabs the grubby princess by her upper arm and hauls her away down the street. She yells and starts punching him with her other arm. Oh well, you don't suppose you're going back to school any time soon. Who needs a friend there?\n\n    *set control %+3\n    *set luck %-25\n    *set visibility +2\n    *goto trick\n\n  #Claim that a nearby minion is your cousin.\n    *if (zombies > 0)\n      You haul a zombie over and introduce it as \"Sarah,\" your cousin. Robbie stares at a trail of ichor dripping from \"Sarah's\" left eye socket and staining the torn pinafore she has selected as her outfit to roam the Earth.\n\n      \"She stinks,\" he says with a frown.\n\n      You agree with a winning smile. \"Sarah\" moans.\n\n      *goto cousin\n    *else\n      You haul a skeleton over and introduce it as \"Bob,\" your cousin. Robbie tilts his head to one side to examine its bony frame. He extends a finger and waves it in an exploratory fashion between \"Bob's\" ribs.\n\n      \"That's a pretty good costume,\" he says, frowning hard.\n\n      You throw an arm around \"Bob's\" shoulders, presenting the perfect family picture.\n\n      *goto cousin\n    *label cousin\n    *if (control > 58)\n      \"Nice to meet you,\" Robbie says. \"I'd better get back to my sister. Bye, $!{name}.\"\n\n      He shoves off. You're pleased with your diplomatic solution to the situation.\n      *set luck %+10\n      *set humanity +2\n      *page_break\n      *goto trick\n    *else\n      \"You think I'm stupid!\" Robbie sticks out his chin. \"Well…well…I'm not!\"\n\n      He storms off across the street, muttering something unintelligible. You feel bad until you remember his dance of victory the last time you played [i]Zombie Wars[/i]. He'll get over it.\n      *set humanity +2\n      *page_break\n      *goto trick\n\n  #Introduce Robbie to the undead.\n    You gesture Robbie close and talk about the situation as if it were merely an expansion pack for [i]Zombie Wars[/i], the board game. Robbie is wary of the undead, but warms up as you engage his gaming brain. You discuss tactics and he offers a couple of useful insights into rapid deployment of slow-moving zombies. \n\n    Across the road, Robbie's sister appears to be trying to kick a beagle. It snarls at her. Robbie says a hurried goodbye and runs across to break things up.\n\n    *set control %+15\n    *set luck %+10\n    *goto trick\n\n  #Slaughter Robbie.\n    It's difficult to say why you give the order. Perhaps it's one too many long, wet afternoons waiting for Robbie to read rulebooks instead of playing the game and having fun. Perhaps it's those victory dances. Or perhaps you're simply committed to a certain path and these kinds of decisions are the markers you must lay along that path.\n\n    He hardly notices. There's simply a movement at the periphery of his vision, and\n    *if (skeletons > 0)\n      the skeleton grabs him in a headlock and twists. Robbie's breath stops; his tongue bulges for an instant; then with a SNAP…he's gone. The skeleton drops his body to the pavement and gives what might be a fleshless yawn.\n      *goto trudy\n    *else\n      the zombie sinks its teeth into his neck, pressing down on him. Robbie's body collapses and there is a loud CLUNK as his skull bounces off the road. His eyes look dazed for a moment before the zombie shoves its broken fingers into his mouth and eats his head like a toffee apple.\n      *goto trudy\n\n\n*label trudy\n\nAcross the road, Robbie's sister blinks and frowns. You walk away and leave her there. It's a bit late now to worry what will happen to her.\n\n*set control %+5\n*set corruption +8\n*set luck %+10\n*set bodycount +1\n*page_break\n*goto trick\n\n*comment *****************************************************************\n*label horror\n\nAfter your recent skirmish, a leisurely night on the sofa looks very appealing. You find a family-size bag of tortilla chips, some mini muffins, and a two-litre bottle of cola. Once you add the remote control and a footrest, you're set.\n\nYou flick through the TV guide, looking for a film. There are a few likely candidates. As you flick, the undead gather around the TV.\n*if (zombies > 0)\n  A zombie repeatedly thumps the screen for George Romero's original [i]Night of the Living Dead[/i]. Each blow leaves a sticky mark.\n*if (skeletons > 0)\n  A skeleton rat-a-tats its fingerbones against the cabinet every time [i]The Bone Collector[/i] is highlighted. \nThe banshee glares at you, pale arms folded. \"Why are you still dithering? [i]Titanic[/i] is on.\"\n\nWhich movie will you select?\n\n*choice\n  #[i]Halloween[/i] (the original).\n    You're only halfway through John Carpenter's innovative point-of-view camera opening when you feel movement beside you on the sofa. The banshee slides in beside you and presses close. Once the guy in the mask turns up, she grabs your hand, eyes fixed on the screen. Her fingers are cold.\n\n    It feels like uncomfortable and inappropriate intimacy with a friend of your mother's. When the movie finishes, you neglect to mention that there is a sequel.\n\n    *set film \"Halloween\"\n    *set control %+5\n    *set max_energy %-5\n    *set energy %-5\n    *goto sleep\n  *if (zombies > 0) #[i]Night of the Living Dead[/i].\n    You have trouble watching Romero's classic because a zombie head keeps leaning in front of the TV, following people as they move across the screen. After that movie's brutal climax, the zombie continues to follow the people in the toilet paper advert. \n\n    You eventually amuse yourself by throwing mini muffins at the back of the zombie's head.\n\n    *set film \"Night of the Living Dead\"\n    *set control %-5\n    *set max_energy %+5\n    *set energy %+5\n    *goto sleep\n  #[i]The Shining[/i].\n    You are five confusing minutes into the film when you realise there has been a mistake in the programme description and you are watching [i]The Shining Hour[/i] starring Joan Crawford, a black-and-white story of a nightclub dancer moving to a farm and having trouble with her sister-in-law.\n\n    You try to change the channel, but every time you do, the banshee pokes you until you change it back. For the last thirty minutes you fantasise about going after her with an axe.\n\n    *set max_energy %+5\n    *set energy %+5\n    *set luck %-5\n    *goto sleep\n  *if (skeletons > 0) #[i]The Bone Collector[/i]\n    The initial air of clackety excitement around the room fades as it becomes apparent this is a crime thriller with a forensic flavour and the actual bone content is rather minimal.\n\n    You have to snatch your tortilla chips back from a bored skeleton who has taken to flicking them around the room.\n\n    *set film \"The Bone Collector\"\n    *set control %+5\n    *set luck %-5\n    *goto sleep\n  #[i]Ring[/i].\n    You turn off the light to properly get in the mood for the perplexing J-horror of [i]Ring[/i]. Five minutes in you feel so uneasy that you put the light back on. Your minions slowly evacuate the room and leave you alone with your building dread.\n\n    Just as the film finishes, your landline rings for the first time since your parents died.\n\n    You answer it with trembling fingers. \n\n    From down the hall, the banshee holds up your mobile and guffaws, collapsing to the floor in hysterical laughter. You resist the urge to boot her in the ribs and go to bed instead. It takes a long time to get to sleep.\n    *set film \"Ring\"\n    *set control %-5\n    *set luck %+5\n    *page_break\n    *goto disturbed\n  #[i]Titanic[/i].\n    You decide a few hours of Leonardo DiCaprio are worth it to keep the banshee happy. She settles down on the sofa with a box of tissues. During the scenes of developing romance, she sobs, her tears staining the tissues a weak green. By the time Kate Winslet is flying at the front of the ship, the banshee is wailing so loud you have to press a cushion against your ear.\n\n    Once the boat starts going down she visibly brightens, and cheers out loud when it breaks in half. \"What?\" she snaps when she catches you staring. \n    *goto sleep\n\n*label sleep\n\nEventually you get sleepy and turn in.\n\n*page_break\n*goto disturbed\n\n\n*comment *****************************************************************\n*label trick\n\nA bit further along the road, you see two guys and two girls come out of a house wearing immense backpacks and large black guns. For a moment you stiffen, wondering if they are from The Base…but no. Those are Ghostbusters jumpsuits. \n\nOne girl steps forward.\n\n\"As a duly-designated representative of $!{town}, I order you to cease\nany and all supernatural activity and return forthwith to your place of origin, or to the nearest convenient parallel dimension.\"\n\n*choice\n  #Agree with good grace.\n    You hold your hands up and admit that you are, in fact, harnessing supernatural forces. As you withdraw, the jumpsuited figures strike a four-way pose which they have obviously rehearsed. It is a combination of diligent watchfulness and 80s record cover. You find yourself grinning as you go in search of the parallel dimension they mentioned.\n\n    *set humanity +1\n    *set luck %+5\n    *page_break\n    *goto hallosam\n\n  #Try to think of a corresponding undead movie speech.\n    There is something from [i]Evil Dead[/i]…no…how about [i]Shaun of the Dead[/i]…no…[i]Nightmare Before Christmas[/i]…no…\n\n    Finally you remember \"When there's no more room in hell, the dead will walk the Earth!\" But the Ghostbusters are already moving on to another house and the moment has passed.\n\n    A minion gives you a reproachful look.\n\n    *set max_energy %-5\n    *set energy %-5\n    *page_break\n    *goto hallosam\n\n  #Ask if she is the Gatekeeper.\n    \"Ha! No. Are you the Keymaster?\" she asks.\n\n    There follow some jovial minutes where they show you synchronised dance moves to the Ray Parker, Jr. theme tune. You give an undead response; something which looks more like Kraftwerk on an off-night. Finally they give you and your horde high-fives and move off.\n    *if (zombies > 0)\n      You hear a definite squelch as the last of them gives her zombie high-five. She examines her palm with a queasy expression.\n    *set humanity +2\n    *set luck %+15\n    *page_break\n    *goto hallosam\n\n  #Send a minion to attack them.\n    Your minion advances. The supernatural elimination specialists level their particle throwers. The ends light up orange. The effort they have gone to is nearly enough to persuade you to hold back their doom.\n\n    Nearly.\n\n    \"Don't cross the—auugh!\" one of the guys shouts, as your minion tears at his face.\n    *if (minion_count > 1)\n      You send in the entire horde.\n    Several seconds of frantic battering and screaming follow. Blood sluices onto the steps, joined by something soggy which might be a tongue or a spleen. The other Ghostbusters break away, pan
