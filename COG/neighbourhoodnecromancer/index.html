 tears the zombie apart at the neck. The banshee wails, distraught.\n\n          Time to get some distance and regroup.\n          *set zcommit -1\n          *set zombies -1\n          *set minion_count -1\n          *set control %-10\n          *page_break\n          *goto flee\n        *else \n          The struggle continues but he is clearly overpowering the zombie one blow at a time. Time to fall back and try to save it.\n          *set control %+5\n          *page_break\n          *goto flee\n    *else\n      You send them in together.\n\n      PC McMurdo is startled by this new attack. When he sees he is outnumbered, he grabs up a coffee table and starts swinging. One zombie gets it in the face but it keeps coming. The policeman changes tactics; he flings it through the front window. It shatters.\n\n      You gape as he steps on your sofa, elbows a few sharp splinters out of the way and vaults into the front garden.\n\n      *set control %+5\n      *set luck %-5\n      *set visibility +2\n      *goto pursuit\n  *if ((skeletons > 0) and (zombies > 0)) #COMBO ATTACK\n    *label combo_attack\n    You flood the living room with undead. PC McMurdo freezes, trying to process what he is seeing: yellowing bone and festering flesh approaching in a wave. Behind them, the banshee grins.\n    *set scommit skeletons\n    *set zcommit zombies\n    *set energy %-40\n\n    *if (control > 33)\n      The policeman breaks out of his trance, darting towards the exit—but it's too late. You've manoeuvered your forces around him and there's no escape route. Together, a zombie and a skeleton thrust him back against the fireplace.\n\n      *set luck %+5\n      *goto kill_spare\n    *else\n      PC McMurdo spots an opening. He elbows his way between a skeleton and a zombie and makes it to the hall. You follow, but he has already burst out the front door. He moves fast for a heavy man.\n\n      *set luck %-5\n      *goto pursuit\n  #Try to reason with the policeman.\n    You hold back the undead and step forward to talk to the unsettled policeman. You explain you have the greatest of respect for the law, but you are a necromancer and the associated responsibilities mean you must answer to more than the law. \n\n    Even confronted by forces beyond the grave, you see a simple conviction in the old duffer's eyes. \"Nobody's beyond the law,\" he says. \"Not even a ${gender} with some fancy new friends.\"\n\n    You could offer him a chance to leave. But his eyes say he's not going anywhere yet.\n\n    *set control %-5\n    *choice\n      *selectable_if (skeletons > 0) #Skeletal assault.\n        *goto skeleton_attack\n      *selectable_if (zombies > 0) #Zombie assault.\n        *goto zombie_attack\n      *if ((skeletons > 0) and (zombies > 0)) #Send in both.\n        *goto combo_attack\n      #Take the fight outside.\n        *goto fight_outside\n  #Take the fight outside.\n    *label fight_outside\n    This space is too cramped and PC McMurdo looks stronger than you expected. You need some distance to regroup and assemble your force properly. Also, you're sick of having bits of the house smashed up.\n\n    *set control %+5\n    *goto flee\n\n*comment *****************************************************************\n*label kill_spare\n\n*choice\n  #Finish off PC McMurdo.\n    *label finish_off\n    PC McMurdo sees the blow coming and flinches just a little. Your minion breaks his neck in a savage, supernatural strike. The local bobby sags against your fireplace, then drops like a sack of potatoes.\n\n    *goto dead\n  #Try to knock him unconscious.\n    Knocking people out isn't quite as easy as it seems in Hollywood films.\n\n    *if (luck > 45)\n      After a couple of ineffective attempts by another minion, the banshee steps in and breaks a chair over the policeman's head. He drops. You feel the floor move beneath you.\n\n      The banshee is all for boiling his bones down into some kind of unholy soup. You briefly contemplate keeping him prisoner in the cellar, but you have enough mouths to feed. Instead, you drive him to a remote clearing and leave him there with a note about the power of the undead and some pointed advice about staying out of town.\n\n      *set control %+5\n      *set humanity +5\n      *page_break\n      *goto_scene halloween\n    *else\n      Your minion fluffs the first couple of attempts. On the third one, it tries too hard.\n\n      *goto finish_off\n  #Offer him the chance to leave.\n    You point out the policeman's disadvantaged position. As the banshee looms at your shoulder, you explain your new role as a ${master} of the dead and how it comes with certain unshakeable obligations—which he, as someone obliged to enforce the letter of the law despite any personal feelings, can surely relate to.\n\n    In fact, you get a bit carried away and end up suggesting that you could enforce justice in $!{town}, thus freeing him up to pursue other interests. PC McMurdo raises an eyebrow.\n\n    *if (control > 45)\n      He might not like what you say, but he concedes that you have the upper hand. You let him leave with the understanding that he will leave you to pursue your necromantic interests uninterrupted, and you will attempt to play fair.\n\n      \"That was a mistake,\" spits the banshee as PC McMurdo walks down the hall, gets into his car and leaves.\n\n      *set humanity +4\n      *set control %+5\n      *set luck %-5\n      *page_break\n      *goto_scene halloween\n    *else \n      As PC McMurdo opens his mouth to reply, you feel the banshee moving behind you. As you glance around, one of your minions strikes. You hear a cry, a crack—you grip the humerus—but it's too late. The policeman topples to the floor in front of you, lifeless eyes rolling back in his skull. \n\n      You stare at the undead. Having only partial control over them is deeply unsettling. Particularly when you live in the same house.\n\n      For now, it's time to dispose of the body and the car.\n\n      *set corruption +3\n      *set bodycount +1\n      *set cop_kill true\n      *page_break\n      *goto_scene halloween\n      \n*comment *****************************************************************\n*label flee\n\n\"Oi!\" shouts PC McMurdo as you yank open the back door and throw yourself through. You know a confrontation is inevitable but it would be better to find an open place where your minions are less vulnerable to the burly policeman. \n\nThe back garden is no use. You haven't been much of a groundskeeper since your parents died—and neither of them bothered. The space is full of broken pots and tanglefoot weeds; it might slow down the policeman but your undead control is not consistent enough to avoid outright falling-on-face comedy.\n\nYou put a foot up on a trellis and boost yourself over the fence. You catch sight of PC McMurdo's red face as he charges out from the house. He won't be able to follow. \"You're only making it hard for yourself!\" he yells.\n\nYou hear his feet tramp off in search of another way round. Out of sight behind a house, you have a moment to summon your horde.\n\n*choice\n  #Calm yourself.\n    You put aside the feeling of being hunted and deliberately slow down your breathing. You know every scrap of these surroundings. You've lived among them your whole life. You have the undead on your side. You have control.\n\n    *set control %+5\n    *set luck %-5\n    *goto police_car\n  #Use the adrenaline rush.\n    Your heart pounds. Energy rushes through your limbs and everything looks vivid. If you can push on without hesitation, you might overcome the slow policeman on buzz alone.\n\n    *set max_energy %+5\n    *set energy %+5\n    *set control %-5\n    *goto police_car\n  #Pause to appreciate the moment.\n    It wasn't very long ago that you were complaining that nothing ever happened in $!{town}. Well, it has. And now your best friends are slavering dead and you are being hunted by the law. Not every day will be this much fun.\n\n    *set luck %+5\n    *set max_energy %-5\n    *set energy %-5\n    *goto police_car\n\n*comment *****************************************************************\n*label pursuit\n\nTime to decide. Will you follow the policeman, risking further exposure? Or let him go and hope he doesn't come back with the flying squad?\n\n*choice\n  #Pursue him.\n    *set advantage true\n    *goto police_car\n  #Let him go.\n    He knows what he's dealing with now. These are the undead, not kids breaking windows. If he's smart, he'll go home, hang up his cap, crack a beer, and stay there. If he's very smart, he'll go to another town.\n\n    *set humanity +3\n    *page_break\n    *goto_scene halloween\n\n\n*comment *****************************************************************\n*label police_car\n\n*if ((skeletons = 0) and (zombies = 0))\n  It's only now, with a breathing space, you realise you have no horde left. PC McMurdo has cleaned you out. You're back to being a regular teenager. That means the law has won—and you had better leave town.\n\n  *page_break\n  *goto_scene exile\n\nYou find PC McMurdo on the street behind yours, behind the wheel of his chequered Vauxhall Astra. It's stopped but its engine is running. You summon \n*if (minion_count = 1)\n  your solitary minion to stand by your side.\n  *goto standoff\n*elseif (minion_count = 2)\n  your two remaining minions to flank you.\n  *goto standoff\n*else\n  your impressive undead entourage.\n  *goto standoff\n  \n*label standoff\nThe policeman sees you. Your eyes lock and you are drawn into a timeless battle of wills with the older man.\n\n*if (control > 42)\n  After a few seconds, his composure falters as he sees the commitment in your eyes.\n  *set advantage true\n  *goto charge\n*else\n  You find it hard to compete with the experience and determination in his gaze.\n  *goto charge\n  \n*label charge\nHis jaw twists and he revs the engine. Then, with a squeal of abused rubber, the squad car lurches forward, towards you.\n\n*choice\n  #Dive out the way.\n    You throw yourself to the side, getting a faceful of pavement for your trouble. Woozy, you pick yourself up to see PC McMurdo has stopped the car just short of your horde. That was unnecessary.\n    *set energy %-25\n    *goto road_brawl\n\n  #Stand your ground.\n    No policeman is going to run over a teenager. Nevertheless, your eyes still close for a second as he spins the steering and shrieks the car to a halt barely a metre from your legs.\n    *set control %+5\n    *goto road_brawl\n\n  #Try to jump onto the car.\n    You brace yourself and leap at what you hope is just the right time to board the incoming car. However PC McMurdo tears it to a halt just short of your position. You look pretty stupid jumping up and down on the spot.\n    *set control %-5\n    *goto road_brawl\n\n  #Urge the undead forward.\n    PC McMurdo skids the car to an impressive stop.\n    *if (zombies > 1)\n      The leading zombie goes under the wheel with an unfortunate squelch. Its arm is torn off. The policeman looks momentarily appalled, then sees the putrid flesh and sets his chin.\n      *set luck %-10\n      *set zombies -1\n      *set minion_count -1\n      *goto road_brawl\n    *else \n      Your leading minion bounces off the side door and staggers back.\n      *goto road_brawl\n\n*comment *****************************************************************\n*label road_brawl\n\nThe constable steps out and sizes you up.\n*if (scratched)\n  Blood still drips from his face where the banshee scratched him.\n*comment endif\n\n\"I've been on the beat here a long time,\" he says. \"I've seen some very strange things: kids on drugs, trains on fire,\n*rand bomb 1 5\n*if (bomb = 1)\n  and joyriding clowns with squeaky shoes.\n  *goto road_brawl2\n*if (bomb = 2)\n  and crocodiles living in bathtubs.\n  *goto road_brawl2\n*if (bomb = 3)\n  and bank robbers in pumpkin outfits.\n  *goto road_brawl2\n*if (bomb = 4)\n  and women on Facebook.\n  *goto road_brawl2\n*else\n  and giant prawns.\n  *goto road_brawl2\n\n*label road_brawl2\nBut you know one thing they're all vulnerable to? Good old-fashioned police work.\" He cracks his knuckles. Then he strides towards the nearest undead.\n\n*choice\n  #Trade blows.\n    *if (skeletons > 0)\n      You square a skeleton up to the angry copper. He throws a punch, faster than you expected, and catches it clean across the cranium.\n      *if (luck > 41)\n        The skeleton staggers, cracks its jaw back into place, and returns to the fray with a little more caution.\n        *set energy %-10\n        *goto road_brawl3\n      *else\n        The concussion to the skull pulls the spine out of alignment. Your skeleton hangs there like a bony jigsaw puzzle, then rains to the road in pieces, gone forever.\n        *set skeletons -1\n        *set minion_count -1\n        *set energy %-10\n        *set advantage false\n        *goto road_brawl3\n    *else\n      You square a zombie up to the angry copper. He throws a punch, faster than you expected—and his fist gets stuck in its face. He hops around, dragging the zombie, trying to pull his fingers out of the stinking flesh. You can't help laughing. When he finally manages it, his expression of moustachioed anguish undermines the hard-man image he was attempting to present.\n\n      *set luck %+20\n      *set advantage true\n      *goto road_brawl3\n  #Keep the undead out of reach until he tires.\n    It's like the end of [i]Rocky II[/i]. You keep a minion tantalisingly close and then pull it back as PC McMurdo swings. He keeps moving, circling, launching great big haymakers. His face goes pink and he starts puffing. But this fiddly control stuff is wearing you out, too.\n    *set energy %-40\n    *goto road_brawl3\n  #Look for anything interesting in his car.\n    While PC McMurdo is busy with the undead, you skirt around the back and take a look in the police car. There is a radio, a first aid kit, a half-eaten pie, and a small, portable fire extinguisher. You snatch up this last item and advance on the brawling lawman as he\n    *if (zombies > 0)\n      kicks a zombie in the nuts.\n      *goto extinguisher\n    *else\n      smashes a skeleton in the ribs with a double-handed strike.\n      *goto extinguisher\n\n    *label extinguisher\n    *set energy %-20\n\n    You glance at the instructions, pop the tab, and shout. When the policeman looks round at you, you give him a faceful of foam. He staggers back, wiping it out of his eyes with a sleeve.\n\n    *set luck %+15\n    *set advantage true\n    *goto road_brawl3\n\n*label road_brawl3\n\nThe constable glares at you. Then he notices the humerus in your hand. His eyes narrow. He charges, reaching to grab it.\n\n*choice \n  #Take him down by any means necessary.\n    *if (skeletons > 0)\n      A skeletal figure leaps on him in a high rugby tackle. They go down together, death glinting from your minion's empty sockets. Even as its bony hands flash at his neck, he turns and gives it a vicious bear hug.\n\n      *if (advantage)\n        Weakened by a lack of oxygen, he can't muster the strength to shatter the skeleton. His grip falters and his limp bulk collapses onto the road.\n\n        *set luck %+5\n        *page_break\n        *goto dead\n      *else\n        The ribs bend and splinter. PC McMurdo crushes your skeleton to dust even as it takes him to the afterlife.\n\n        *set luck %-5\n        *set skeletons -1\n        *set minion_count -1\n        *page_break\n        *goto dead\n    *else\n      The zombie grabs him by the ankle. It slows him down enough to keep you clear. He kicks at it but every attack means another contact with the sticky, dead flesh. He bleeds. It clings. It begins to consume him.\n\n      *set luck %+5\n      *goto finish_him\n\n  #Try to keep out of his reach.\n    *if (advantage)\n      Already unsettled, the constable swipes with no real accuracy. You lead him round and round, a minion harassing him at every stage. Inevitably, he trips and goes down into the road. An undead is on him in an instant.\n\n      *set luck %+5\n      *goto finish_him\n    *else\n      It's easy for you to keep undead between you and him. Frustration mounts on PC McMurdo's face as he realises he's not going to win this one. \"This isn't over,\" he puffs. \"Believe it.\" He breaks for the car, battering a pursuing minion with the driver's door. As it reels back, he slides into the seat and throws the car into gear. You barely manage to pull your horde out of the way as it screeches off.\n\n      *goto escaped\n\n  #Clutch the humerus to your chest and curl up to protect it.\n    He's stronger than you. But if he gets the humerus, it's all over. You clutch the bone to your chest and roll away. You feel the constable's big hands on you, forcing your knees down, reaching for your hands, freeing the fingers one by one…\n\n    There's an abrupt, wet noise. Something splashes on your face. The policeman crumples on top of you, then rolls off and lies still. A minion towers over both of you, entrails swinging from its hand.\n\n    *set control %-10\n    *set luck %+10\n    *page_break\n    *goto dead\n\n*comment and use scratched\n\n\n*comment *****************************************************************\n*label finish_him\n\nThe policeman's eyes show fear for the first time as he lies there, helpless.\n\n*choice\n  #Let him go.\n    *if (energy > 35)\n      You pull the undead back and offer him a hand up. He frowns and slowly levers himself upright without your assistance. You let him know you didn't start this business to kill policemen. He looks at you for a long time. Then he tramps back to his car in silence, watching the undead.\n\n      *set humanity +4\n      *goto escaped\n    *else\n      Suddenly weary, you pull the undead back. The message doesn't get through to one minion. It falls upon him. By the time you pull it off, the policeman's neck is open and his eyes have closed.\n\n      *set corruption +2\n      *set luck %-10\n      *goto dead\n\n  #Try to explain your reasons.\n    As your horde stands waiting, you recount the events that led to your parents' death, without emphasising the role of the humerus. PC McMurdo finds his feet and looks you in the eye.\n\n    \"Lots of people have power thrust upon them,\" the old cop says. \"It's what you choose to do with it that tells me who you are.\"\n\n    You process this as he takes a few steps back. Suddenly, he's at the car and throwing open the door. You're not quick enough to stop him. Perhaps you don't really want to.\n\n    *set humanity +2\n    *goto escaped\n\n  #Kill him.\n    You steel yourself and watch as your horde does what it does best. $!{town}'s sole law enforcer bleeds out on the road. By the time you turn away, nobody is going to be recognising him.\n\n    *goto dead\n\n*comment *****************************************************************\n*label escaped\n\nYou watch PC McMurdo drive off into the distance.\n\n*set humanity +1\n*set luck %+5\n*page_break\n*goto_scene halloween\n\n*comment *****************************************************************\n*label dead\n\nYou're safe from the local law for now. Of course, he will be missed in time. For now, you have another body to dispose of—a large one. Then you're going to have to move that car.\n\n*set corruption +5\n*set bodycount +1\n*set cop_kill true\n*page_break\n*goto_scene halloween\n\n", "pet": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, pet\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\nIt's not that you are lacking in minions, exactly. It's more that you sense something big coming, and you can't imagine a situation where you could have too many of the undead on your side. You wait until the sun is going down, then wrap up warm and make for the door.\n\n*if (vampire)\n  \"You're going to the graveyard?\" says $!{vampname} the vampire. He is watching \"Knight Rider\". \"Give it half an hour and I'll drive you. I haven't checked out the local scene yet…and this performance isn't one of the Hoff's best.\"\n\n  You are startled by his offer. As you think about it, light rain begins to pelt the windows. Perhaps it would be good to have a vampire bodyguard. And a lift.\n\n  A few minutes after sunset, you step out and take the passenger seat in the hearse, trying not to think about yourself lying in the coffin which is directly behind your head. $!{vampname} drives with a cool reserve, like an expensive chauffeur. \"I've got to install a turbo boost on this thing,\" he says.\n  *page_break\n  *goto emptygrave\n*else\n  A light rain begins as you struggle up the lonely road to the graveyard. It seems a mistake to take the horde, so instead you keep the humerus close at hand and watch your back. In the distance, cars pass on the main road, their headlights painting twin Vs on the road. You notice for the first time that many of $!{town}'s streetlights have broken and nobody has repaired them.\n  *page_break\n  *goto emptygrave\n\n*comment #################################################################\n*label emptygrave\nThe gate wails as you push it open and advance into the burial ground. Gravel crunches beneath your feet. Not so long ago, visiting a graveyard after dark would have given you the creeps. It doesn't seem such a big deal any more.\n\n*if (graveyard = 0)\n  You expected something here. A connection perhaps. A sense of energy. A layer of decrepit residents waiting for nothing more than the opportunity to do your bidding. But there's nothing. Rain runs down your nose and slips inside your collar.\n*if (graveyard > 0)\n  Something has changed, however. You grip the humerus, you reach down into the ground, but the graveyard feels…spent. Like whatever you drew from the soil last time you were here is gone now, exhausted. The remaining bones are good for nothing but archaeology.\n*comment endif\n\n*if (vampire)\n  \"This place is dead,\" $!{vampname} says, with no obvious sense of irony. \"Anything you dig up here will only stagger around in circles leaving a trail of bones. Let's go to the other place.\"\n\n  You're pretty sure $!{town} has only one graveyard, and you tell him so.\n\n  \"For humans, maybe. But there's another place not too far off with lots of tiny little dead things. We should go. It'd be fun!\"\n\n  You give him a hard look.\n\n  \"What?\" he says. \n\n  *choice \n    #Go to this mysterious other graveyard.\n      *goto sematary\n      \n    #Head back home instead.\n      \"Pfft,\" ${vampname} says. \"What a buzzkill.\" He drives you back, taking the corners with a little less patience than before. Rather than park, he stops outside your house and revs the engine until you get out.\n\n      You've barely put your feet on the ground before his tyres squeal and the hearse shoots off into the night.\n\n      Somewhere in the small hours of the morning you hear him come in, crashing around and knocking over bottles in the kitchen. Do vampires get drunk? You're too sleepy to get up and find out.\n\n      *set humanity +1\n      *set stagetwo +1\n      *page_break Next Day\n      *goto_scene stagetwo\n*else\n  This is a problem. You need more minions but there is nothing to be gained by hanging around here. And you can't exactly go around slaughtering people just to use their corpses as footsoldiers. Well, you could. But it seems like an awful lot of work.\n\n  *if (banshee)\n    Maybe the banshee will have an idea. You head back down the darkened road, rain and wind chilling your face.\n    *page_break\n    *goto banshidea\n  *else\n    You could drive to another town and raid their graveyard. But something about that idea bothers you. It's not that you're scared, exactly. It's just…$!{town} is a known quantity. You have it under control, sort of. If you go somewhere else, you'll have to think a bit harder about what you've been doing. Maybe you're not quite ready for that.\n\n    For the rest of the evening you're bothered by a feeling that you missed something.\n\n    *set humanity +1\n    *set luck %-5\n    *set stagetwo +1\n    *page_break Next Day\n    *goto_scene stagetwo\n\n*comment #################################################################\n*label banshidea\n\nYou arrive home to find the banshee arranging potted plants in the kitchen. They are only potted plants in the sense that they have been inserted into pots; they are actually random flowers, weeds, and bits of shrub. Earth is scattered across every worktop and the floor. However, she seems happy, humming a lament as she works. You ask where she got the plants at this time of night and she gestures at your neighbours' garden. Even in the gloom you can see it is torn to pieces. Oh well. They left town two weeks ago.\n\nAfter an appropriate amount of compliments on the crappy new indoor garden, you put your problem before the banshee. Those green eyes look at you sidelong.\n\n\"You're only thinking about people,\" she says, tinkering with a tulip. \"It's very typical of you. Very limited.\"\n\nYou bite your lip and persevere. Five minutes later, you have vague directions to a mysterious second graveyard—and a slight headache.\n\n*set control %-5\n*page_break\n*goto sematary\n\n\n*comment #################################################################\n*label sematary\n\nYou must have passed the gate hundreds of times without noticing it. It's a weatherbeaten piece of peeling ironwork with the broken remains of a small plaque. Behind it lies a tiny path, hemmed in between two neighbouring houses and their overgrown hedges. \n\n*if (vampire)\n  \"Magic doesn't exist, of course,\" $!{vampname} says. \"But if it did, you'd find it in places like this. Wells of emotion and tears in the veil.\"\n*comment endif\n\nA bird caws somewhere off through the murk. The foliage opens up until you can see a clearing ahead. Rain patters through the trees above and your nostrils fill with thick, exotic scent. Ahead, you can make out tiny shapes on the ground—\n\nYou pull back as a branch swings close to your face. A squirrel is perched on it, staring at you with tufty, grey intensity. It's hard to say why, but you get the very strong impression that it wishes you evil.\n\n*choice\n  #Pretend to punch the squirrel.\n    You make a playful feint at the encroaching rodent. It doesn't even flinch, just sits there on the branch, swaying back and forth in the breeze, staring you down. After a few moments, you realise you are quite intimidated by the squirrel. You take as wide a route around its tree as you can in this confined space.\n\n    *set control %-10\n    *goto sematary2\n\n  #Punch the squirrel.\n    You lash out at the branch. The squirrel, alert at your movement, springs up onto another branch. Its tiny eyes blaze down at you, staring, assessing. Judging. You keep an eye on it as you push past.\n\n    *set attuned -1\n    *goto sematary2\n\n  #Talk to the squirrel.\n    You speak to the squirrel in a low, friendly tone. It cocks its head and narrows its piercing, black eyes. You assure it of your good intentions and it seems to relax, just a little. \n\n    Perhaps all this undead stuff has damaged your brain.\n\n    *set attuned +1\n    *goto sematary2\n  #Ignore the squirrel.\n    You pass under the branch, moving it gently away from your head. Although you don't look at the squirrel, you sense that it is watching you the entire time. This bothers you more than it should.\n\n    *set luck %-5\n    *goto sematary2\n\n*comment #################################################################\n*label sematary2\n\nYou step forward into the clearing. Above you, trees twist and climb towards a dark, brooding sky. Rain streams from the branches onto your upturned face. And yet the little space feels warm and intimate, sheltered. You can't quite place the smell, a heady aroma like pine forest but more pungent.\n\nBefore your feet lie a number of tiny memorial markers, none bigger than your shoe. Which will you examine?\n\n*fake_choice\n  #A cross of twine and chicken bone.\n    Although a grisly little thing, the cross is surprisingly well-engineered, the bones bound together in a staggered and rigid structure. A small panel is incorporated into the design, labelled in black felt tip and wrapped in clingfilm. It reads, FOR DESMOND. HE LIKED BONES.\n  #A pile of coloured stones.\n    Five black stones seem to have fallen from the pile until you look closer. Four of them are at opposite corners and the fifth, the largest, points forward. You see it suddenly—it is a tortoise built from pebbles. The colours vary so widely they must have been gathered from many different places.\n  #An earth-spattered snow globe.\n    You wipe the earth off with careful fingers. What you thought was a snow globe actually contains no snowflakes. It has tiny gold flakes which catch the dim light from above, and something rests flat on the bottom.\n\n    After a moment's hesitation, you lift it from the grass and turn it over a couple of times. The flakes shimmer through the dome and the large piece dances through them. It's a cheap but recognisable image of a goldfish. On the base, scrawled in permanent market, is the word GOLDIE.\n\n    You return the globe to its original place.\n  #A little statuette.\n    You wipe leaves from the base of the statuette. It shows a bird feeding table, high on a pole, and a frustrated black cat watching it. It's difficult to know whether whoever placed it loved cats or birds. Maybe both.\n  #None of them—just look around the perimeter.\n    As you step back, your foot bumps a tiny stone. You freeze, your other foot in mid-air. There are more stones than you think, arranged in a loose spiral around the clearing. Here and there lie relics: a tartan collar, a faded plastic mouse, a cracked hamster ball half-full of water.\n\n*comment #################################################################\n*label sematary3\n\nIt's clear now. This is a pet cemetery. Do you really want to reach for the humerus and add a decrepit zoo to your horde?\n\n*if (vampire)\n  $!{vampname} lurks near the entrance, saying nothing. His eyes are non-committal.\n*comment endif\n\nA movement in the trees draws your attention. Was that a flutter, or something scurrying between branches? It sounds again, behind you. You get the feeling that you are being watched by something. By several somethings, in fact.\n\n*choice\n  #Flee quickly.\n    You brush the stray branches out of your way and run down the path. Your fingers feel clumsy as they fiddle with the gate latch. Something is bearing down on you, something large and silent, something reaching for you—you push through onto the street.\n\n    Standing outside, breathing hard, you're not sure why you felt such a sudden burst of terror. There was nothing there, and you, y'know, live with the dead. But you are sure you won't be going back inside that gate anytime soon.\n\n    *if (vampire)\n      $!{vampname} looks at you and raises an eyebrow. \"I forget how susceptible humans can be,\" he says. Thunder rolls in the distance. \"Come on, back to the car.\" He turns away.\n    *set control %-5\n    *set stagetwo +1\n    *page_break Next Day\n    *goto_scene stagetwo\n\n  #Walk away at a restrained pace.\n    You step between tiny tombstones, placing each foot with precision, fighting down a building sense of alarm. The hedges scratch at your shoulders as you walk towards the gate. Its mechanism seems stiff. You force it open and step outside.\n\n    On the street, you realise you have been holding your breath.\n    *if (vampire)\n      $!{vampname} raises an eyebrow at you, but says nothing.\n    Perhaps you will come back and investigate the little cemetery another time.\n\n    Probably in bright sunlight.\n\n    *set control %+5\n    *set stagetwo +1\n    *page_break Next Day\n    *goto_scene stagetwo\n\n  #Wait and see what happens.\n    You freeze, resisting the urge to retreat. Your hand slips over and pats the humerus through your jacket. It is still there, and reassuringly solid.\n\n    The feeling of scrutiny builds. It's all around you now, little pairs of eyes staring silently. The back of your neck prickles. You notice you're breathing faster than usual and you concentrate, forcing yourself to relax and slow it down.\n\n    *set luck %+5\n    *page_break\n    *goto sematary4\n\n  #Touch the humerus and see if you can sense anything.\n    As soon as your fingers brush the surface of the humerus you feel a strange tingle and pull them away. The feeling dissipates, leaving only lingering pins and needles.\n\n    The clearing is hushed, expectant. You take a deep breath and try again.\n\n    This time the tingle spreads to your head. You have a brief sense of sparks swirling around you, a column of tiny extinguished lives inhabiting the clearing. After a few seconds, you get dizzy, and snatch your hand away.\n\n    *set luck %+5\n    *set control %+5\n    *set corruption +1\n    *page_break\n    *goto sematary4\n\n\n*comment #################################################################\n*label sematary4\n\nYou blink, then blink again. The clearing becomes a strange double image. One version is offset to the side, its colours blurred and intense. Your legs feel weak beneath you, your body too heavy to hold up. The scents overwhelm you and you drop to your knees.\n\n*if (vampire)\n  $!{vampname} is suddenly there beside you, a cold hand against your neck. \"I'll put in a good word for you,\" he says. \"But you'll have to convince them yourself. Try to think like—\" His words slur. You try to look up at his face but your head turns too slowly.\n  *set attuned +1\n*comment endif\n\nYour breathing slows and the ground pulls at you. Seconds later you're stretched out, raindrops pattering against your cheek. The last thing you see as you fade are blades of grass, so close to your eyes that they seem like towers.\n\n*page_break\n\n[i](fIrE)[/i]\n\nThe sun is low over the burning dunes. A smell comes on the sirocco, telling you of death soon to come. Already you can feel the crunch of bone, taste the juices of the meat as they break over your dry tongue. You lope into the night through gusts of sand, your mate howling in excitement as ${ahe} follows.\n\nThe dying bird comes into sight beneath a stony bluff. It has found a crack between two rocks but you can easily reach it. Anticipation floods you, beating like thunder. Yet your mate barks. Another pair has come to lay claim to the bird. Your mark is recent and clear. They are trespassing. \n\n*choice\n  #Warn them off.\n    You take a position between them and the food. Locking your eyes on the closest one, you show your teeth and form a growl deep in your throat.\n    *set attuned +1\n    *goto sematary5\n    \n  #Try to reason with them.\n    You try to explain that they are on your territory and so the bird is your prize by right. Forming the sound is a struggle.\n    *goto sematary5\n    \n  #Take only half the bird and share the rest.\n    You bend towards the bird. As you struggle to tear it into two equal parts, the intruders charge you. They don't understand what you are doing.\n    *goto sematary5\n    \n  #Attack them.\n    Your mate squares up beside you, howling and snapping as you dart in, going for the throat of the nearest one.\n    *set attuned +1\n    *goto sematary5\n\n\n*comment #################################################################\n*label sematary5\n\n[i](waTEr)[/i]\n\nHope slams back through you as you drop into life again, gulping furiously, forcing water through your gills even as the pain behind your eyes begins to fade. Waves toss you this way and that as the immense shadow above slips into motion, the water hammering as it moves off.\n\nYou take a moment to calm down. This place is unfamiliar, the reef and the weeds oriented all wrong. Yet the light from above lets you sense the direction of home.\n\n*choice\n  #Start for home.\n    You head towards home. You hope it is not far away.\n    *set attuned +1\n    *goto sematary6\n  #Explore.\n    Although this area also has weeds and smaller fish, you struggle to relate to it. It is not home.\n    *goto sematary6\n  #Hide to recover strength.\n    Home may be a long way away. You will rest before you start out.\n    *set attuned +1\n    *goto sematary6\n  #Find another to communicate with.\n    There is another swimming by, with coloured markings. You struggle to understand its movements.\n    *goto sematary6\n\n*comment #################################################################\n*label sematary6\n\n[i](aIR)[/i]\n\nYour feathers flare. It's there among the leaves, the predator; slitted eyes gleaming, ears up, advancing softly with claws dug into the branch. Its mouth opens for a moment and you glimpse its tiny, dreadful teeth. Directly ahead, in a wall niche, one of your kind slumbers.\n\nYou've seen others chased by this thing, and caught, their wings ripped off, their necks torn open. It moves fast when it wants to. This slow approach is only to get close. When it strikes, it will be too fast to stop.\n\n*choice\n  #Call an alarm.\n    You call out for danger. The prey stirs, thrashing its wings as it sees the danger so close. It rises from the confined space. A little too far away, the predator hisses. A third bird comes to your aid.\n    *set attuned +1\n    *goto sematary7\n  #Try to distract the predator.\n    You land above the predator, thrashing the branches. Its head lashes up, those eyes of death focused on you. It leaps and nearly catches you, scrabbling on another branch. The other bird stirs at the commotion and scrambles from its niche.\n    *set attuned +1\n    *goto sematary7\n  #Attack the predator alone.\n    The slit-eyed one is shrouded in leaves. You struggle to find a route of attack which will keep you clear of those lethal, fast claws.\n    *goto sematary7\n  #Wait and take the wall niche.\n    Once the predator is satisfied, the sleeping place will be yours. You struggle with your instincts, sensing something wrong with that plan.\n    *goto sematary7\n\n*comment #################################################################\n*label sematary7\n\n[i](eARtH)[/i]\n\nThis is the end. The ground is soft beneath you as your killer approaches, the earth damp, open and hungry. A moment of pain, a last helplessness, and you will begin the long process of sinking beneath. The worms await, threading their hidden ways. They have the patience and they will devour.\n\nOnly moments are left to you now. Just time to look up, a last sensation—then its jaws are on you—\n\n*if (control > 67)\n  It is nothing. It is part of the cycle of all life. This is where you began. This is where you will end. And perhaps in time you will begin again.\n\n  *set attuned +1\n  *page_break\n  *goto sematary8\n*else\n  Pain slices through you, your quiet reflection torn away by the agony of departure. There is more to do here. It was not long enough, not nearly long enough—\n  *page_break\n  *goto sematary8\n\n\n*comment #################################################################\n*label sematary8\n\n*if (attuned >= 5)\n  You gasp and sit up, taking a huge gulp of air. You've been stretched on the ground, in the rain. You should be sodden and cold. But—\n\n  The clearing is no longer dark. Tiny red sparks swirl around you, rising and falling, painting the foliage like Christmas lights. You feel a vibration in your calves, your forearms; an energy that crackles from the tiny memorials, leaping from one to another.\n\n  You draw the humerus into your hands, and you feel them there, beneath. The cats and the dogs, the guinea pigs and budgies, the rats and fish and lizards and snakes. They know you and you know them and they are ready to come, ready to follow your command. For now, they will rest here and wait. The sparks spin into a column of red, fizzing and scattering like fireworks. Then the clearing is quiet, although you are far from alone. Time to move on.\n\n  *if (vampire)\n    \"Those crazy critters,\" says $!{vampname}. He leads the way back to his car.\n  *comment endif\n  *set animal_help true\n  *set stagetwo +1\n  *achieve animal\n  *page_break Next Day\n  *goto_scene stagetwo\n*else\n  You gasp and sit up, taking a huge gulp of air. It's cold. Your jeans are sodden with mud, clammy against your thighs. Fallen leaves have piled up around your ankles. Rain patters around you, soaking through your jacket. And the stones, the little memorials, are nothing, as empty and dead as the rest of the clearing.\n\n  The ground makes a thick, wet sucking sound as you pull your legs free and stand up.\n  *if (vampire)\n    $!{vampname} stands aside, looking down his thin nose at your efforts. He makes no move to help.\n  *comment endif\n\n  Out of curiosity, you take out the humerus anyway, watching the glow taint your skin as you reach through it, feeling for the pets buried here. There's nothing. You're done here.\n\n  All the way home, you have a nagging feeling that you missed something important.\n\n  *set luck %-10\n  *set stagetwo +1\n  *page_break Next Day\n  *goto_scene stagetwo\n\n\n", "sammeet": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, sammeet\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\nYou have to pop out to the corner shop for supplies: milk, bread,\n*if (zombies = 1)\n  skin cream for the zombie,\n*if (zombies > 1)\n  skin cream for the zombies,\n*if (skeletons = 1)\n  mineral oil for the skeleton,\n*if (skeletons > 1)\n  mineral oil for the skeletons,\nand industrial-strength cleaner for…well, everything. On the way into the shop, you collide with a black-clad figure in big, goth boots. It's Sam, whom you know from school. You feel heat in your cheeks and mutter apologies as you squeeze past.\n\nIs it because you find Sam attractive? Admit it.\n\n*choice\n  #Yes, and Sam's a boy.\n    You've been in a few classes with Sam. His full name is Samuel. You suppose he must be a goth; the black vest, spiky black hair, subtle hieroglyph necklace, and unsubtle eyeliner are definite markers.\n\n    You're not entirely sure why you like him in particular; maybe it's because he does his own thing and doesn't seem intimidated by anyone, even the Kendall kids. Maybe it's because he's always reading but he's not a snob about books. Or maybe it's just that smile. \n    *set ahim \"him\"\n    *set ahis \"his\"\n    *set ahe \"he\"\n    *set abf \"boyfriend\"\n    *set humanity +1\n    *goto sam_outside\n  #Yes, and Sam's a girl.\n    You've been in a few classes with Sam. Her full name is Samantha. You suppose she must be a goth; the black velvet dress, bushy black hair, simple ankh, and intricate eyeliner are definite markers.\n\n    You're not entirely sure why you like her in particular; maybe it's because she does her own thing and doesn't seem intimidated by anyone, even the popular bitch squad. Maybe it's because she's always reading but she's not a snob about books. Or maybe it's just that smile.\n    *set ahim \"her\"\n    *set ahis \"her\"\n    *set ahe \"she\"\n    *set abf \"girlfriend\"\n    *set humanity +1\n    *goto sam_outside\n  #I am a solitary necromancer with a secret life. I find no-one attractive.\n    Was there a flicker of something there? No. You can't risk exposure when you are waging war against the entire town from the shadows. You skulk off with your cheerful, blue polythene bag full of bulk groceries.\n\n    Still, you feel uneasy. A feeling of doom bothers you for a few blocks. You pass a decorative homeware shop with an interesting window display. Perhaps you should freshen up your domestic environment. What item will you choose?\n\n    *fake_choice\n      #A lampshade which, in a certain light, might appear to be made of human skin.\n        You purchase the lampshade. The cashier remarks upon its intricate texturing and retro appeal.\n\n        On the way home you examine it again. In daylight, it looks more like a bad 70s kitsch piece from a second-rate TV cop show. Still, undead residents will give it context.\n\n        You head home, the lampshade bumping against your leg.\n\n      #A pair of cushions with a sequinned skull motif.\n        You purchase the cushions. They are black and furry. The cashier seems to think the sequins form a picture of a silver pretzel. Outside, you examine the cushions again. They are clearly skulls, unless you hold them tipped sideways. And why would a pretzel be silver anyway?\n\n        Still, it bothers you all the way home.\n        \n      #A statuette of a zombie mermaid.\n        You purchase a large, plaster ornament of a weed-choked corpse rising from beneath the waves carrying a trident. The cashier remarks upon its intricate tail and the small fish sculpted into the splashing water.\n\n        Halfway home, you bump the bag against a bollard and the statue smashes. You find you are not terribly upset at its loss.\n\n      #I WILL DECORATE MY HOME WITH THE BONES OF MY ENEMIES\n        OK, good plan. Plenty of time for that later.\n\n        You head home. \n\n    *comment end fake_choice\n    *set corruption +1\n    *page_break\n    *goto banshee\n\n*comment *****************************************************************\n*label sam_outside\n\nYou'd like to get to know ${ahim} better. But you've missed your chance for today. You agonise over how you might engineer a chance to bump into ${ahim} again.\n\n*page_break\n\n\"Hi.\" Sam stands outside in the sun, waiting for you. $!{ahe} gives a smile which manages to be enigmatic and dazzling at the same time. \"Get anything good?\"\n\nYou make a couple of ineffective noises and try to smile back. Your mouth feels wired into a grimace. You don't want to talk about the six litres of industrial-strength cleaner you just bought.\n\n*set sam 1\n\n*fake_choice\n  #Artfully change the subject.\n    You talk about a heist film you were watching on TV last night and suggest you might assemble a small team to \"do over\" the corner shop.\n\n    \"I'll be the getaway driver if you like,\" Sam says. \"I'm hot shit at [i]Grand Theft Auto[/i].\"\n  #Talk about how lame the shops are in $!{town}.\n    You bitch about the prices and the limited selection of soft drinks the corner shop stocks.\n\n    Sam nods. \"I asked for Cherry Coke once and they looked at me like I had a pumpkin head. Now I make my own with regular coke and cherry syrup.\"\n  #Complain about them being out of your favourite noodles.\n    You claim that this is the fourth time you've been in looking for the instant noodles you like. The shelf always has a massive overstock of the hideous beef flavour but whenever they restock, they buy yet another crate of hideous beef along with the good stuff.\n\n    \"I like the Tom Yum ones,\" Sam says. \"They never have those.\"\n  #Make a joke about doing secret drug deals in the corner shop.\n    You claim to have purchased half a brick of Colombian marching powder for a knock-down price.\n\n    \"Yeah. Their Mexican brown is the best.\" Sam doesn't miss a beat. \"I never get mine anywhere else.\"\n*set luck %+5\n\nYou stroll along the street for a while. \"A couple more years and we're out of this dump for ever,\" Sam says. $!{ahe} is planning to move away to university. You feel a sudden lurch in your stomach. With the death of your parents, your future has become very uncertain. Undead faces loom in your mind's eye.\n\n*choice\n  #Ask about Sam's plans.\n    \"I thought I might do computer science,\" ${ahe} says. \"Apps and stuff. Or architecture. I really like the idea of walking around buildings that I designed. Is that mad?\"\n\n    You assure Sam that somebody has to design new buildings and it could easily be ${ahim}. $!{ahe} gives you a long look and grins. \"Yeah,\" ${ahe} says. \"It could.\"\n\n    *set sam +1\n    *set luck %+5\n    *goto wayhome\n  #Sneak in a compliment.\n    You try to deflect your sudden feeling of personal doom by commenting that Sam always does well whatever ${ahe} turns ${ahis} hand to.\n\n    *if (luck > 38)\n      That earns you a rueful smile. \"I'm glad it looks that way,\" ${ahe} says. \"You weren't in my French class. But, hey, thanks for the vote of confidence.\"\n      *set sam +1\n      *goto wayhome\n    *else\n      Sam frowns. \"You think I don't have to work at it? I keep a set of earplugs so I can put in the hours while my parents tear strips off each other, two nights out of three.\"\n\n      You walk in awkward silence for a few steps. \n\n      \"Sorry,\" ${ahe} says. \"Not your fault, really.\"\n      *goto wayhome\n  #Admit your uncertainty about the future.\n    You don't know Sam very well but you have a feeling you can trust ${ahim}. Without explaining why, you admit you don't really know where your life will take you.\n\n    \"I'll tell you something my dad said,\" Sam says. \"He said you only learn, only really learn, by making mistakes. And the earlier you make them, the better.\"\n\n    You muse on this in silence.\n\n    \"Of course, later in the same day, he messed up with a saw and nearly cut off one of his fingers.\" Sam smiles.\n    *set sam +1\n    *set luck %+5\n    *goto wayhome\n  #Exit this uncomfortable conversation.\n    You mumble some excuse about having to get home in a hurry and abruptly head off down a side street. Sam stares after you. At the end of the street, you realise you are heading way off route and you have to take a lengthy diversion to avoid passing Sam again. \n\n    During the extended walk, you seem unable to shake a cloud of doom. You mooch back to the house like one of your undead.\n\n    *set control %+5\n    *set luck %-10\n    *page_break\n    *goto banshee\n\n*comment *****************************************************************\n*label wayhome\n\nIt takes you five more minutes to realise that you are walking towards your house. Under normal circumstances you could invite Sam in. You could get to know ${ahim} better. You have a brief flash of roaming the streets, hand in hand with\n*if (ahe = \"he\")\n  a ruggedly pale prince of the night,\n  *goto prince_princess\n*else\n  an elegant princess of darkness,\n  *goto prince_princess\n*label prince_princess\nan honour guard of undead marching in your wake. Maybe you should dig out some early Anne Rice stuff and read it again. However…you are currently running a guest house for the undead and that sort of precludes unexpected visitors.\n\nSam tips ${ahis} head to the side. \"You zoned out there for moment,\" ${ahe} says.\n\nYou're at the end of your street. Time to say goodbye to Sam. You never know what might be peering out of your window.\n\n*page_break\n\n\"Just a minute.\" Sam bits ${ahis} lip and looks at the ground. Your head buzzes. Is ${ahe} nervous about talking to you?\n\n\"I hear that you've, um…\" ${ahe} says, \"…recently made some, ah, new friends.\"\n\nYou're not quite sure what ${ahe} is getting at. This is $!{town}. The pool of potential friends is, frankly, limited.\n\n*if (school_attacked)\n  Sam scuffs the ground with one big goth boot. \"I heard about what happened at school. I worked out it was you. Some of them are saying it was a costume stunt that got out of hand. But I don't think that's what happened.\" $!{ahe} looks up into your eyes.\n  *goto freeze\n*else\n  Sam scuffs the ground with one big goth boot. \"I mean, um…new friends who maybe, already…you know…died.\" $!{ahe} looks up into your eyes.\n  *goto freeze\n\n*label freeze\n\nYou freeze.\n\n*choice\n  #Laugh it off and flee.\n    *label laugh\n    It's not actually that hard to laugh at the suggestion. You've had to think about some harsh realities this afternoon, and you're feeling strung out and a little hysterical. Plus—necromancy? Not very believable.\n\n    Sam takes a step back. $!{ahe} blushes at your laughter. You give ${ahim} a friendly slap on the shoulder to show there are no hard feelings, and head off down your street with the bag of industrial-strength cleaner.\n\n    *set visibility +1\n    *set control %+5\n    *page_break\n    *goto banshee\n  #Pretend not to understand.\n    You ask Sam what ${ahe} is talking about. \n\n    \"People…from out of the ground,\" ${ahe} says.\n\n    You shake your head and ask again. \n\n    After a few rounds of this, Sam frowns and says, \"I know it sounds stupid. And I can see you'd want to keep it quiet. But I've read a bit about necromancy. And if it can work anywhere, it's a broken town like $!{town}. Yes, I think you are commanding the dead. Are you?\"\n\n    *set luck %-5\n    *choice \n      #Laugh at ${ahim} and leave.\n        *goto laugh\n      #Reluctantly admit the truth of it.\n        *goto confide\n      #Show ${ahim} some evidence.\n        *goto evidence\n  #Confide in Sam.\n    *label confide\n    You put your bag on the ground, sit on a nearby wall, and admit your life has recently changed and you are now a fully-fledged necromancer. Sam's eyes widen but ${ahe} doesn't recoil in horror. If anything, ${ahe} draws closer. \"I knew it!\" ${ahe} says.\n\n    The last of the afternoon sun is surprisingly warm. You sit there, and in a low voice you spill the whole story: the Kendall kids fighting the soldier, the weird bone, and the grisly death of your parents. As you tell ${ahim} the details you feel a strange surge of relief; you didn't realise how much keeping it a secret was weighing you down. \n\n    Sam sits down beside you. \"Let's be honest,\" ${ahe} says, \"this place sucks. I can't think of anything cooler than having your own undead army.\" $!{ahe} touches you lightly on the shoulder. \"You're a good person. At least, I think you are. You'll find a way to achieve something positive with this.\"\n\n    $!{ahe} stands up and looks you straight in the eyes. Then ${ahe} leans close to your ear. \"You and me are going to see more of each other,\" ${ahe} murmurs. Then ${ahe} turns, and walks off into the gathering twilight.\n\n    You sit there for a few minutes, just watching ${ahim} go.\n\n    *set sam +1\n    *set luck %+15\n    *set max_energy %+5\n    *set energy %+5\n    *page_break\n    *goto banshee\n  #Let ${ahim} see one of the undead.\n    *label evidence\n    With a shrug, you beckon Sam to follow. $!{ahe} raises an eyebrow.\n\n    The neighbourhood is quiet. You lead ${ahim} down the side of the house to where the fence is highest. Something stops you taking ${ahim} inside. Instead, you take the humerus from your pocket. Sam's eyes widen as ${ahe} watches the glowing liquid run through its slow cycle.\n\n    *if (skeletons > 1)\n      While ${ahis} gaze is fixed on the bone, you draw a skeleton out through the back door. It strikes a dramatic, Ray Harryhausen stance of menace. Sam looks up and actually leaps back against the fence. \"Holy shit!\" ${ahe} shouts, and then immediately covers ${ahis} mouth.\n      *goto demo_choice\n    *else \n      While ${ahis} gaze is fixed on the bone, you draw a zombie out through the back door. It has trouble with the handle and proceeds to stumble on the steps. The effect on Sam is dramatic, however. $!{ahe} leaps back against the fence. \"Holy shit!\" ${ahe} shouts, and then immediately covers ${ahis} mouth.      \n      *goto demo_choice\n\n*comment *****************************************************************\n*label demo_choice\n\nYou move the undead a little: head tilt, arm flex, slow advance. Sam watches it come, breathing hard.\n\n*choice\n  #Slaughter Sam.\n    You give the kill command with a burst of malicious glee. Your minion rushes Sam. $!{ahis} mouth drops open as ${ahe} sees what is about to happen.\n\n    *if (control > 50)\n      One lunge, and Sam is on the ground, drawing breath for a scream. $!{ahe} never gets the chance to let it out as\n      *if (skeletons > 1)\n        the skeleton leaps upon ${ahim}, tearing at ${ahis} face with bony fingers.\n        *goto sam_dead\n      *else\n        the zombie falls onto ${ahim}, tearing at ${ahis} face with broken yellow teeth.\n        *goto sam_dead\n    *else\n      *goto sam_flee\n  #Let Sam touch your minion.\n    *if (humanity > 10)\n      Your minion lashes out at Sam's face. [i]What was that?[/i] You gave no command. Sam is just fast enough to tumble to one side. The undead follows with relentless steps. Shocked, you grab the humerus and freeze it in its tracks.\n\n      *goto sam_flee\n    *else\n      Sam extends a hand and, very gingerly, touches the undead. \"Woah,\" ${ahe} says. \"I'm not even seeing things.\" It shuffles a little and watches ${ahim} with patient curiosity.\n\n      *set control %+5\n      *set luck %+5\n      *goto withdraw\n  #Withdraw it back into the house.\n    *label withdraw\n\n    After a few moments, you order the undead back inside. It takes unhurried steps and disappears into the kitchen. You close the door.\n\n    \"So the rumours are true,\" Sam says. \"What the—I mean, what are you even going to do with this?\"\n\n    You don't know. But you put the kettle on, and you sit in the garden and talk in low voices, your heads close together. Much later, as the last daylight fades, Sam gets up to leave. $!{ahe} puts a hand on your shoulder for a few electric moments.\n\n    \"You've got a lot of courage,\" ${ahe} says. \"I know you'll do something good with this. Something important.\"\n\n    Then ${ahe}'s gone. You take a long breath of night air before you go in.\n\n    *set sam +2\n    *set luck %+15\n    *set humanity +1\n    *page_break\n    *goto banshee\n\n*label sam_dead\n\nEventually, you pull your minion off. Sam stares at the sky through one remaining eye. Another body to deal with. Well, it's nothing new. Just one more piece of $!{town} trash looking for a new way to screw you over.\n\nYou go inside for plastic sacks.\n\n*set corruption +3\n*set bodycount +1\n*set sam 66\n*page_break\n*goto banshee\n\n*label sam_flee\nSam grips the house wall and stares at you, breathing hard. \"You're not who I thought you were,\" ${ahe} spits. \"Stay away from me. Stay the hell away from me!\"\n\n$!{ahe} turns and scrambles down the path, glancing behind to see if ${ahe}'s being chased. Something tells you not to follow.\n \n*set control %-10\n*set luck %-10\n*set visibility +2\n*set sam 0\n*page_break\n*goto banshee\n\n*comment *****************************************************************\n*label banshee\n\nInside the house, you are struck by a feeling that something is wrong, something out of place. You freeze and listen. You hear nothing, except—is that a cold breeze against your skin? You imagine armed police in bulletproof vests, crouched against doorways, waiting for the signal to take you down—seconds away—\n\nYou look back at the door to outside. Should you trust your instincts?\n\n*page_break\n\n[i]\"What time do you call this?\"[/i]\n\nThe shriek makes you leap right off the floor. An immensely tall woman looms towards you, straggly red hair plastered down the side of her face with what looks like swamp water. She wears a loose green slip from some long-ago era, while her eyes are wide, dark-rimmed, and fixed on you.\n\nIt takes you a moment to realise she is floating six inches above the linoleum.\n\n*choice\n  #Make a break for it.\n    You scrabble for the door. The handle is cold—so cold, it burns. You snatch your tingling fingers away, gasping for breath.\n\n    *set max_energy %-10\n    *set energy %-10\n    *goto banshee2\n  #Talk to her in a calm tone.\n    You politely enquire what this shrill apparition is doing in your house. She seems a little miffed at your calm demeanour.\n\n    *set control %+5\n    *goto banshee2\n  #Summon the undead to attack.\n    You grip the humerus and flex your necromantic powers, directing your wrath at the floaty intruder.\n\n    A single minion appears at the bottom of the stairs, but it makes no move to attack. You urge it forward. Nothing. Wait, did it just wave?\n\n    *set control %-5\n    *goto banshee2\n\n*comment *****************************************************************\n*label banshee2\n\nThe woman drifts closer, towering over you, looking down her bony nose like a nightmare primary school teacher. She smells of grave dirt and Lily Of The Valley.\n\n\"The arrogance,\" she hisses. \"You conjure the dead from their resting places below, for a twilight existence of whimsy and servitude. You quarter them here, in grubby suburban squalor. And then, do you spend your time caring for their immortal souls? No. You pop out to the shops.\"\n\n*choice\n  #Point out you went to buy serious cleaning materials.\n    You heft your blue plastic bag and point out that industrial-strength cleaning products vastly outnumber the few items of cheap food you purchased. The woman glares, like she thinks you have another bag somewhere filled with toys and pornography.\n\n    This relationship appears to be stalled. You ask the woman who she actually is.\n\n    *set max_energy %+5\n    *set energy %+5\n    *page_break\n    *goto banshee3\n  #Explain that you didn't exactly choose to become a necromancer.\n    You find yourself getting defensive as you explain about the bone, how it came into your possession and what happened to your parents. In fact you can almost sense yourself regressing to a guilty school${gender}. The woman's expression darkens and she stares you into silence.\n\n    After an extended period of awkwardness, you ask who she is. It takes an effort not to add, \"miss\" at the end of your question.\n\n    *set luck %-5\n    *page_break\n    *goto banshee3\n  #Challenge this woman's right to lecture you.\n    \"Auugh! You simpering youth! You play with life and death like they were wooden bricks! If you knew the full extent of the forces you harness, you would sink to your knees and despair.\"\n\n    She seems to be waiting for you to sink to your knees. There is an awkward moment. Eventually, you ask who the hell she is.\n\n    *set control %+5\n    *page_break\n    *goto banshee3\n\n*comment *****************************************************************\n*label banshee3\n\nA gleam comes into her forbidding eyes. \"Some call me She Of The Fairy Mounds. Some, The Washer At The Ford. For truth, I am the [i]bean nighe[/i] and I walk the ways that death will follow. And frankly, when you then turn up and reverse the flow down those ways, it makes my job a nightmare.\"\n\nUnsure, you ask her to repeat those words—were they Gaelic?\n\n[i]\"Bean nighe[/i]—oh, I can't bear to hear you slaughter it. 'Banshee' will do.\"\n\nShe drifts from side to side, appraising you. One long, twig-like finger rises to point at your face. \"The undead are not playthings for your childish whimsy. I will be here to care for them, and protect them. And I will be keeping my eye on you,\n*if (gender = \"boy\")\n  young man.\n  *goto care\n*else\n  young lady.\n  *goto care\n\n*label care\n*if (zombies > 0)\n  Now, when was the last time you gave this zombie a shampoo? I suppose you think that the undead have no need for hygiene. Well, you're about to learn different. Have you got the hot water on?\"\n  *goto banshee4\n*else\n  Have you chosen an army of skeletons so you can avoid a skincare regime? Well, let me tell you, these bones will get brittle if not properly cared for. I suppose you've only got vegetable oil…\"\n  *goto banshee4\n  \n*comment *****************************************************************\n*label banshee4\n\n*fake_choice\n  #Ask where exactly she has come from.\n  #Ask what her regular job is.\n  #Ask how she found you.\n  #Ask about the humerus.\n\n\"'Ere you ask me a question, you must answer three of mine.\" She smirks and swings away. You point out that she has already answered at least one question, but she dismisses you with a spindly hand.\n\nThe banshee drifts off down the hall, leaving a caustic green vapour in her wake. It's no good. She seems to have an affinity with the undead, and she seems to have taken it upon herself to move in. You could demand she leaves—but something tells you you're not going to get very far with that.\n\n\n\n\nYou sigh, and begin to unpack the shopping.\n\n*set banshee true\n*page_break Next Day\n*goto_scene stageone\n", "school": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, school\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\nSchool. Long days in hot rooms with dazzling sunlight, large windows and no blinds; rammed together with a bunch of no-hope thickers whose finest moments in life will be the torments they inflict on the smarter kids here.\n\nThis year there will be the additional pressures of exams and career choices—or will there? This term is different from every one that went before because you have a posse. It might look a bit rough and smell of rancid flesh but it's a posse all the same.\n\n*choice\n  #Attend without the undead.\n    *gosub_scene end_trial\n    To avoid unnecessary complications, you leave your horde at home.\n    *label class\n    You get through the formalities of registration and timetabling in the first half hour. By late morning, you're at a talk about ancient history—specifically, Egyptian funerary practices.\n\n    Ancient Egyptians believed that your soul had two parts: the Ba, which watched over your surviving family by day, and the Ka, which flew off to the heavenly fields of the afterlife. If something happened to your entombed, preserved body, the Ba and Ka would become lost, and you would be forever denied your chance at the afterlife.\n\n    This lesson makes you uncomfortable.\n\n    *goto class2\n  #Have the undead hide nearby.\n    *gosub_scene end_trial\n    *set hidden true\n    *goto class\n  #Walk straight through the front gate with an undead bodyguard.\n    *gosub_scene end_trial\n    *goto bodyguard\n  #Send all your undead over the wall and watch the mayhem.\n    *gosub_scene end_trial\n    *set zcommit zombies\n    *set scommit skeletons\n    *if (minion_count = 1)\n      You give your solitary minion a little assistance to scrabble over the school wall. For a moment you wonder if this is a good idea, but then you hear it land on its head on the other side with a dry crunch. Too late to rethink the plan.\n\n      *goto wall\n    *else\n      Your undead go into action, scaling the wall like cadets on an assault course. Skinny, decaying cadets, that is. On the other side, they reassemble and march towards the school buildings.\n      *goto wall\n\n*comment *****************************************************************\n*label wall\n\n*set school_attacked true\n\nYou rush to see the impending scholastic mayhem. You remember a spot where you can sit on top of an outbuilding and get a clear view. As you clamber up, you hear screaming.\n\n*page_break\n\nThe school grounds are full of the usual kids in scruffy blazers and off-centre ties. You can sense the usual buzz of excitement and dread. However, your undead forces are adding something unique to the mix. \n\n*if (zcommit > 0)\n  A group of heavily made-up girls, eyes wide, scatter, shielding immaculate Charlie's Angels hair from the grasping greenish fingers of a zombie.\n*if (scommit > 0)\n  A girl from the orchestra seems to be sparring with a skeleton, blocking its lunges with her cello case and trying to thump it in the face.\n*comment endif\n\nSomewhere in the middle, a first-year boy is screaming, a pristine sports bag strung around his neck like a harness. A group of older kids shove him out the way and advance on your horde. One boy has a cricket bat. Two girls heft hockey sticks. You recognise them from a stuck-up, popular crowd. One of the girls tripped you up once, and kicked your books away as you tried to gather them. \n\n*choice\n  #Concentrate your forces, but aim only to scare.\n    *set humanity +2\n    *goto mob\n  #Pull your minions together and let them follow their instincts.\n    *set corruption +1\n    *set lethal true\n    *goto mob\n  #Fight a running but non-lethal battle.\n    *set humanity +1\n    *goto hitandrun\n  #Hit and run; aim to kill.\n    *set corruption +1\n    *set lethal true      \n    *goto hitandrun\n\n*comment *****************************************************************\n*label class2\n*choice\n  #Go home and study the undead instead.\n    Looking around the class, you feel detached from the other pupils. You're making life and death decisions. You have responsibilities. They're still in the school's…cocoon. You wait for the interval between classes, then slip out.\n\n    The grounds seem very exposed, but you walk briskly to the gate, as if you had a doctor's appointment or another valid reason for leaving.\n\n    At home, you spend the rest of the day with your minions, patching them up where they need it, trying to understand what they do when left idle.\n    *if (zombies > 0)\n      A zombie repeatedly walks into a door jamb until you turn it to face the empty part of the doorway.\n    *comment endif\n\n    *if (skeletons > 0)\n      A skeleton balances on one leg, steadying itself like a surfer.\n    *comment endif\n\n    *if (horde_family = false)\n      Watching them go about their insane domestic activity, you suddenly understand something. These creatures of the afterlife are all that you have. They are your family now.\n\n      The insight makes your head swim. You collapse into an armchair, breathing hard. You stay there for a long time, just watching.\n      *set horde_family true\n      *set luck %+5\n    *comment endif\n\n    *set visibility +1\n    *set control %+10\n    *set luck %+5\n    *page_break Next Day\n    *goto_scene stageone          \n\n  #Stick it out until lunchtime.\n    You get through the morning, feeling a bit isolated from the people around you. At lunchtime you buy a sandwich and slink off round the back of the sports block to eat it. You've had one bite and you're deep in thought when a younger kid comes by with two friends and slaps it out of your hand. You look up in exasperation.\n\n    \"Haw!\" he brays.\n\n    *if (hidden)\n      Your minion jumps out from hiding, grabs his head and stares him down from barely an inch away with its dead, fetid sockets.\n\n      His heartfelt shriek of terror seems to echo around the place for at least five seconds. He and his friends tear away and run, tripping over each other and running into walls as they flee. You feel a deep satisfaction as you go for another sandwich.\n\n      *set visibility +2\n      *set luck %+20\n      *goto lunch\n    *else \n      Immediately, you call a minion. It's an instinct by now.\n\n      Of course, you left it at home. It won't get here for ten minutes or so. You sigh as you watch the little brat walk off with his hangers-on. You could come back tomorrow and seek him out with your full posse in tow. But really, you have more important things to do. That goes for classes, too.\n\n      What doesn't kill you makes you stronger. You buy another sandwich.\n\n      *set max_energy %+10\n      *set energy %+10\n      *set luck %-10\n      *goto lunch\n  #Liven up the morning with an undead attack.\n    You pretend to reach into your bag for a pen. Instead, you wrap your fingers around the humerus and call the undead. Even from your desk you feel the connection made—like a plug fitting into a socket. A melted plug, perhaps, and a socket dripping in ichor. \n\n    Five minutes later, there is a crash and screaming from outside. Everybody piles up to the window to see. Even the teacher neglects ancient history for long enough to let you grab your bag and slip out of the classroom door. You sprint down the stairs.\n\n    *set control %+5\n    *set luck %+5\n    *page_break\n    *goto wall\n\n\n*comment *****************************************************************\n*label lunch\n\nWhat now?\n\n*choice\n  #Put in the entire day at school.\n    You shift from class to class, keeping your head down, picking up the new curricula and textbooks without really taking anything in. In Biology, the illustrations of skeletons seem to grin at you. In English, you start [i]Hamlet[/i] and all you can think of is that there's a gravedigger scene coming up later. Later you sit in on a career seminar, and when the presenter mentions opportunities in the army, your hand strays to the humerus in your pocket.\n\n    You get through the day and walk home with a heavy stride. It doesn't feel worth coming in tomorrow. You have a feeling your life will no longer be shaped by academic achievement.\n\n    *set luck %-5\n    *set humanity +3\n    *page_break Next Day\n    *goto_scene stageone\n\n  #Extend the lunch period by having undead assault the school.\n    *set max_energy %+5\n    *set energy %+5\n    *set luck %+5\n    *goto wall\n\n  #Search the stores for anything useful.\n    The sign on the door reads NO ADMITTANCE. During your school career, you've had only glimpses inside when the janitor has been going in or out. If you're ever going to look inside, today is the day. You try the handle and slip inside.\n\n    The room is cavernous. Light from dim bulbs paints everything a weak yellow. You tiptoe past volleyball nets, mouldering theatre backdrops, and the tired flags from sports day. Towards the back, dusty cardboard boxes are stacked in haphazard piles. There are a lot of them.\n\n    *if (energy > 44)\n      The boxes are full of interesting junk. You find old staff handbooks, faded academic gowns, and a stack of textbooks called [i]Science For The Seventies[/i]. Right at the bottom of one box is a folder labelled ARMED FORCES. You open it and flip through.\n\n      It contains files on former pupils, mostly boys, who joined the military. Their school photographs are there beside shots taken a few years later, proud and in uniform. Most of them seem to have been posted locally. Your breath catches in your throat as you notice one more thing: most of them died in their twenties. What does this mean?\n\n      It's getting late in the day and the janitor will soon be making his rounds. You return the folder, slip out a back door and head for home. The air seems cold on your face.\n      *set luck %+10\n      *set control %+5\n      *page_break Next Day\n      *goto_scene stageone\n\n    *else\n      Searching through the boxes is a tedious process. You find stacks of booklets from old prizegivings, broken acoustic guitars and a huge pair of spider-infested waders. You're about to give up when you discover a forgotten box of isotonic sports drinks. Their use-by date is imminent. You cram your bag full of bottles. That ought to keep you alert during the next undead skirmish.\n\n      You've missed your class now. You slip out a back door and head for home, bag bumping at your hip.\n      *set max_energy %+15\n      *set energy %+15\n      *page_break Next Day\n      *goto_scene stageone\n\n*comment *****************************************************************\n*label bodyguard\n*set school_attacked true\n*if (zombies >= 2)\n  *set zcommit 2\n  *goto bodyguard1\n*else\n  *set zcommit zombies\n  *goto bodyguard1\n\n*label bodyguard1  \n*if (skeletons >= 2)\n  *set scommit 2\n  *goto bodyguard2\n*else\n  *set scommit skeletons\n  *goto bodyguard2\n*label bodyguard2\n*if (zcommit = 0)\n  You'll need to make it a skeletal bodyguard;\n  *if (scommit = 1)\n    not hard as you only have the one.\n    *goto bodyguard3\n  *else\n    one on either side like you're royalty.\n    *goto bodyguard3\n*elseif (scommit = 0)\n  You line up a zombie bodyguard;\n  *if (zcommit = 1)\n    it looks at you through its one good eye.\n    *goto bodyguard3\n  *else\n    the two of them stagger along beside you, slowing you down.\n    *goto bodyguard3\n*else\n  You assemble an impressive escort;\n  *if (zcommit = 1)\n    one shambling, moaning zombie\n  *if (zcommit = 2)\n    two shambling, moaning zombies\n  and \n  *if (scommit = 1)\n    a hyperactive, clattering skeleton.\n  *if (scommit = 2)\n    two clattering skeletons. One elbows the other in the ribs.\n  *goto bodyguard3\n*label bodyguard3\n\nYou take a deep breath, check the humerus is secure in your pocket, and march towards the gates and the noisy kids behind them.\n\nIt feels cinematic; shot in slow motion. It's like the opening of [i]Reservoir Dogs[/i] or the end of [i]Ocean's Eleven[/i]. For the first time, you've got a gang, a team, a clique. You just had to pull their decomposing bodies from the earth itself.\n\nDespite your undead backup, you feel your heart hammer as you enter the school.\n\n*page_break\n \n\"Woah! Look at $!{name}!\" A girl from the year below you yells and points. You're a little surprised she knows your name.\n\nYou hear gasps, see hands pressed to mouths. A gap opens up in front of you as younger kids scramble out of the way. For once, you're head ${gender}. You're in charge. You feel a smile coming on and somehow control it into a satisfied grin. You order a minion to leer at the kids, to fake a grab. You're rewarded with squeals.\n\n*set luck %+10\n*set max_energy %+5\n*set visibility +10\n\n\"I can't tell which one is uglier.\" Your head snaps round. Derek Stone, a thug from your gym class, is standing in your way. Last time you tangled, he deliberately kicked a volleyball into your face. Your eyes watered for half an hour.\n\n\"Good costumes,\" he snarls, and rolls up his sleeves. \"Shame about the faces.\" He squares up to the undead.\n\n*choice\n  #Take him on by yourself.\n    You roll up your own sleeves and make a fist like the master explained in that kung fu comic you read. Having an undead backup gives you the confidence to steam in.\n\n    *if (gender = \"girl\")\n      \"Uh, what? Woah. Just a minute.\" Derek Stone seems not to know how to handle a fist fight with a girl. He blocks your first couple of punches, then he starts grinning. \"Steady on, girly,\" he laughs.\n\n      You feint left and connect a solid haymaker with his jaw. His eyes open wide in shock. Then he sets his jaw and frowns.\n    *comment endif\n\n    You jab a couple of times but Derek sweeps your arms aside and launches a low blow at your stomach.\n\n    *if (control > 41)\n      You dodge, and catch him on the side of his jaw. He staggers.\n      *goto stone1\n    *else \n      [i]Nfffff.[/i] His fist crashes home. The breath rushes out of you.\n      *set energy %-50\n      *goto stone1\n\n    *label stone1          \n    *fake_choice\n      #Go for his face.\n        You swipe while Derek is leaning close but he yanks his face away.\n      #Launch a kick to his knee.\n        You try for the knee but he moves surprisingly fast for somebody generally slow on the uptake. He steps inside the kick and you pull your leg back to balance.\n      #Try to trip him up.\n        Your foot sneaks round his ankle and you yank at it. Nothing. He seems rooted into the tarmac.\n    *comment endif\n\n    Derek suddenly lunges and grabs you round the neck with one meaty palm. He draws back a fist. \"Is it lunchtime already?\" he quips. \"Eat this.\" The fist flies towards your face.\n    *if (control > 53)\n      Instinctively, you lift up your legs so he is holding your entire weight. It pulls him off balance and his fist slams past your ear. His grip breaks and you scramble to your feet.\n      *goto stone2\n    *else\n      White light explodes inside your skull. You taste blood and stagger, breaking the grip on your neck. You can see two of your adversary and you're breathing hard.\n
