ic on their faces, and stare open-mouthed as your minion eviscerates Venkman. Or Spengler. It's not obvious which.\n\n    Your minion turns its head, covered in gleaming fresh blood, and steps towards them. They run into the darkness, screaming. You feel a wicked thrill.\n \n    *set control %+5\n    *set corruption +2\n    *set visibility +5\n    *set bodycount +1\n    *page_break\n    *goto hallosam\n\n*comment *****************************************************************\n*label hallosam\n\n*if ((sam \u003c 2) or (sam > 65))\n  Things get quiet on the street and you stifle a yawn. Maybe Halloween is better when your gang are still warm. You head home for a snooze.\n  *goto disturbed\n\nYou pass a few more kids on the Halloween prowl. Your horde attracts some admiring glances but everyone seems to accept the undead as just teenagers in exceptionally good costumes.\n\nYou're crossing the road at a T-junction when you hear an unearthly howl. A beast rushes at you. In the few seconds you have, you register that it's wearing something like Victorian evening dress. But its hands are missing, and its head…its head is a wobbling, erupted mass of tentacles!\n\n*choice\n  #Run!\n    Something about this apparition deeply unsettles you on a primal level. You take off, sprinting back towards the house as fast as you can. You urge the horde to follow you. You don't look back.\n\n    It might be your imagination but odd, rubbery laughter seems to follow you down the street. There is something familiar about it.\n\n    Back home, you catch your breath. Maybe that was not behaviour appropriate to a ${master} of the dead. But you are comfortable on this side of the veil for now. Why take chances?\n\n    *set control %-10\n    *set luck %+5\n    *set sam +1\n    *if ((sam > 3) and (sam_achieve = false))\n      *achieve sam\n      *set sam_achieve true\n    *comment endif\n    *page_break\n    *goto disturbed\n  #Wait to see what it does.\n    The beast draws closer, hooting and howling. An undead shifts behind you, responding to your unease. Those tentacles come closer…closer…a foot from your face…\n\n    \"Tchuh! You're no fun,\" the beast says. Hands slip out from its sleeves, reach up, and grip the tentacles at neck level. They pull…and Sam's head emerges from the mask. \"I thought I'd get at least a couple of screams out of you.\" But ${ahe}'s grinning.\n\n    You ask what the costume is. \"I'm obviously a non-specific tentacled Victorian horror.\" $!{ahe} examines ${ahis} frock coat. \"Or maybe Georgian. I'm not sure. Read some Lovecraft, you'll get the idea. Anyway, what have you come as? A necromancer? You're supposed to make an effort.\"\n\n    Sam roams the streets with you for a while. Together you give some kids the serious heebie-jeebies, even if your overall image is inconsistent. Asking about the tentacles, you learn Sam has a long-held fascination with movie special effects and likes to build ${ahis} own monsters.\n\n    Controlling the undead is tiring, however. You're going to have to turn in soon.\n\n    *choice\n      #Say goodnight to Sam.\n        You can't help yawning. Sam looks at you. \"Don't want to spend the whole evening with \n        *rand bomb 1 6\n        *if (bomb = 1)\n          an eldritch horror,\n          *goto cyclopean\n        *elseif (bomb = 2)\n          a squamous abomination,\n          *goto cyclopean\n        *elseif (bomb = 3)\n          an unutterable thing,\n          *goto cyclopean\n        *elseif (bomb = 4)\n          an antediluvian foulness,\n          *goto cyclopean\n        *elseif (bomb = 5)\n          a fungous polyp,\n          *goto cyclopean\n        *else\n          an ichorous ooze,\n          *goto cyclopean\n          \n        *label cyclopean\n        eh? Well, fair enough.\"\n\n        $!{ahe} gives you a last grin, pulls the mask back over ${ahis} neck and gives your face a friendly brush with the tentacles. Then ${ahe} heads off towards another group of small children.\n\n        Maybe you should have pushed your luck there? Still, you think ${ahe} likes you.\n\n        *set max_energy %+10\n        *set energy %+10\n        *set sam +1\n        *if ((sam > 3) and (sam_achieve = false))\n          *achieve sam\n          *set sam_achieve true\n        *comment endif\n        *goto disturbed\n      #Try for an impulsive kiss.\n        Next time Sam lifts the mask for a breath of fresh air, you dart in to kiss ${ahim}. \n        \n        *if (luck \u003c 45)\n          $!{ahe} moves at the wrong time and a rubbery tentacle slaps you in the face. You don't think it was deliberate; you don't think Sam even noticed; but the moment is definitely ruined.\n\n          Soon you're nearing home and you say goodnight. Sam gives you a smile, pulls the mask back on, and stalks back down the street, hooting. You watch ${ahim} go. Maybe next time.\n\n          *set max_energy %+10\n          *set energy %+10\n          *set sam +1\n          *if ((sam > 3) and (sam_achieve = false))\n            *achieve sam\n            *set sam_achieve true\n          *comment endif\n          *goto disturbed\n        *else\n          $!{ahis} eyes widen in surprise as your lips press ${ahis}. But ${ahe} doesn't pull away. You feel ${ahis} palms rest against the back of your arms, holding you very gently.\n\n          Eventually, ${ahe} pulls away. ${ahis} eyes are amused. \"Uh-huh,\" Sam says. \"I see what I need to wear to get your attention.\" $!{ahe} wiggles ${ahis} tentacles at you.\n\n          You go your separate ways, ${ahim} with ${ahis} rubbery headpiece, you with the undead. But you try the kiss out again first.\n          *set max_energy %+10\n          *set energy %+10\n          *set luck %+10\n          *set sam +2\n          *if ((sam > 3) and (sam_achieve = false))\n            *achieve sam\n            *set sam_achieve true\n          *comment endif\n          *goto disturbed\n\n      #Tell Sam you like ${ahim}.\n        You move Sam away from the undead, and sit ${ahim} down on a wall. $!{ahe} lifts the mask to look you in the eyes. The moment feels right, despite the wobbling tentacles. You confess that you like ${ahim} and watch for a reaction, trying to stay calm despite your heart hammering.\n\n        *if (corruption > 10)\n          There is hesitation in those eyes. You notice for the first time that ${ahe} is still wearing eyeliner, even under the rubbery mask.\n\n          \"I like you too,\" ${ahe} says. \"But what you're doing with the undead makes me very uncomfortable.\"\n\n          You draw back.\n\n          \"I don't believe they're evil.\" Sam glances around. \"They're just…new. Like children. If you can control them, you have to be their conscience. You brought them back, right? So you're ultimately responsible for what they do.\"\n\n          $!{ahe} stands up and puts a hand on your shoulder. \"You and me could be a thing,\" ${ahe} says. \"Believe it. But I need to know you stand for something, not just revenge, or destruction. I'm not trying to tell you what to do…but I need to be able to look you in the eyes without flinching.\"\n\n          You watch Sam go, still carrying ${ahis} mask. You sit there until ${ahe} rounds the corner and disappears. Then you head home.\n\n          *set sam +1\n          *if ((sam > 3) and (sam_achieve = false))\n            *achieve sam\n            *set sam_achieve true\n          *comment endif\n\n          *set max_energy %+10\n          *set energy %+10\n          *goto disturbed\n        *else\n          Those eyes soften. You notice for the first time that ${ahe} is still wearing eyeliner, even under the rubbery mask. Funny. \n\n          \"I like you too,\" ${ahe} says. \"I like you a lot, in fact.\"\n\n          You sit under the moon for a while, a strange pair. You talk about things you like: movies, books, bands. You talk about school and maybe getting out of $!{town} and making something of your life before you get old. Somewhere in the middle, you kiss for the first time, and although the undead are staring, and there is a strong smell of latex, it's perfect.\n\n          *page_break\n\n          Two hours have passed when Sam stands up. \"I've got to get home,\" ${ahe} says. \"I'll see you soon. Got to make sure it's me you like and not just the tentacles.\"\n\n          You're pretty cool about saying goodbye. But you have a massive, stupid grin plastered on your face all the way home.\n\n          *set sam +3\n          *if ((sam > 3) and (sam_achieve = false))\n            *achieve sam\n            *set sam_achieve true\n          *comment endif\n          *set max_energy %+15\n          *set energy %+15\n          *set luck %+15\n          *goto disturbed\n\n  #Attack with a minion.\n    This is automatic by now. As the beast rushes you, you issue the command and a minion steps in. There's a clean strike to the neck, a hook and tear. The thing snaps to a stop, and claws at its neck, from which blood has begun to fountain. Human-looking blood, in fact.\n\n    It drops to its knees, giving a wet gurgle. Its tentacles wave, staining as its life departs. What was that thing?\n\n    Then you see it. Just half an inch of it, really. Skin, between its collar and the white edge of its tentacle. The white edge…of its mask. You reach down and pull the headpiece away.\n\n    *page_break\n\n    It's Sam.\n\n    Lying dead on the ground.\n\n    Those sparkling eyes are dull, one socket brimming with ${ahis} blood. It drips out of what was really quite a superb home-made tentacle mask, and pools around ${ahis} teeth. A wave of vertigo rushes up to cover you; you sway on your feet. What have you done?\n\n    You should bury ${ahim}. You can't leave the body here in the street—\n\n    And then, of course, ${ahe} gets up to join you. But not in a good way.\n\n    You look at that pale face, now streaked with gore. The eyes are glazed, a flap on the neck hanging open, stringy muscle moving beneath. Was this somebody you used to be sweet on? You can't send ${ahim} away. You can't think of this as Sam. The only way you can work this is to treat ${ahim} like any other zombie.\n\n    As you head home, you can't stop shivering.\n\n    *set luck %-15\n    *set control %-10\n    *set sam 67\n    *set zombies +1\n    *set minion_count +1\n    *set bodycount +1\n    *set corruption +5\n    *if (baddate = false)\n      *achieve baddate\n      *set baddate true\n    *comment endif\n\n    *goto disturbed\n\n*comment *****************************************************************\n*label disturbed\n\nYour street is quiet. Yawning, you lock up and head upstairs. The undead match your energy levels, moving slower and becoming inert as you tire. The banshee fusses around them, checking for damage; removing the random bits of hedges and other debris which accumulate when you take them out. There is something reassuring about the whole situation.\n\nAs you begin to drowse, you think you hear something in the back garden. You check the window but all is still.\n\n*page_break\n\n\"$!{name}.\"\n\nYou wake up. What was that? You look out the window again. Is there something there, in the darkness at the back?\n\nYou creep downstairs and pad through the darkened kitchen. This time you're sure. There is a figure standing in your back garden, wearing a cloak. It wouldn’t be so surprising—this is Halloween, after all—except for his aristocratic poise and an authenticity about the old-time costume.\n\nAs you hunch there in the dark, his head turns and glittering eyes seem to focus on you. One delicate hand gestures for you to come outside.\n\n*label hellovamp\n\n*choice\n  #Go out to see this mysterious visitor.\n    Having an undead army for home security does give you a certain confidence. You stride out and size up the intruder. He's younger than you thought, with floppy blonde hair and regal cheekbones. He looks you up and down, tapping manicured nails against his sleeve. \"A little short for a necromancer,\" he says.\n\n    *set luck %+10\n    *goto vampchat\n\n  #Open the door but talk without going outside.\n    You know the theory. This snappily-dressed blonde guy is a vampire. They can't come inside a residence unless they're invited. You're safer inside the invisible doorway forcefield. You ask him what he wants.\n\n    He raises his eyes to the night sky and sighs. Then he looks directly at you. You blink, and you are standing outside, one step away from him. You had no sensation of movement.\n\n    \"Don't worry,\" he says. \"I wouldn't lower myself. You're AB positive. I can smell it. It's as bad as a refermented Bordeaux.\"\n\n    *set control %-10\n    *goto vampchat\n\n  *hide_reuse #Ask the Banshee for suggestions.\n    The Banshee peers out the window for an extended period and nods to herself. Then she turns to drift away.\n\n    You stop her and ask her to spill the details.\n\n    \"'Ere you ask me a question, you must answer three of mine,\" she whispers, and gives a brown-toothed grin.\n\n    Great.\n\n    *set energy %-10\n    *goto hellovamp\n    \n  *if ((zombies > 1) and (zomvamp = false)) #Send zombies out to attack.\n    One thing guaranteed to upset the aristocracy is a zombie attack. You open the door enough to let the shambling forms through. You have to hold your nose when they are in such close proximity.\n\n    They stagger towards the figure outside. He does not appear at all discommoded, and waves a hand in relaxed dismissal. The zombies bumble around in the garden, seemingly unable to find your visitor. Eventually, they come back in. You think you hear a dry yawn.\n\n    *set zomvamp true\n    *set energy %-10\n    *set luck %-10\n    *goto hellovamp\n\n*comment *****************************************************************\n*label vampchat\n\nYou ask what a vampire is doing in your back garden.\n\n\"This is All Hallows' Eve,\" he says, with a sepulchral frown. \"The end of summer. The time when the veil between the worlds is at its thinnest. A festival with roots stretching—\"\n\nYou interrupt him and emphasise that the question concerns why he has picked your garden in particular.\n\nHe frowns again. \"You are the one who walks with the unliving. Who sweeps aside the dust of the grave. Where else would I come on this night of all nights? Plus, I'm bloody fed up sleeping in the car.\"\n\nYou look down the side of the house. Sure enough, a long black hearse is parked in the space your parents' car previously occupied. Behind scarlet curtains and smoked glass lies a black, reinforced coffin.\n\n*fake_choice\n  #Ask where your car is.\n    \"Pfah! That thing?\" He waves a dismissive hand. \"I moved it. Lucky nobody saw me. I'd have been blackballed from any club that matters.\"\n  #Ask what he's been eating lately.\n    A gleam comes into his eye and he beckons you around the side of the house. He opens a side door in the hearse and you see a little black fridge, built into the body of the vehicle. The fridge is full of hospital blood packs.\n\n    \"You wouldn't believe what these camper van places can do,\" he says.\n  #Ask how he drives the car from the coffin.\n    He gives you a long, withering look. \"You think it's like Robot Wars?\" he spits. \"That a car with no driver wouldn't get attention? I drive it from the bloody driver's seat, don't I? I just don't do it during the day.\"\n*comment endif\n\nYou blink at him. You're not absolutely sure you're not dreaming this.\n\n\"So!\" He claps his hands together. You notice he is wearing immaculate white gloves. \"Where's my room? Got something in the cellar? I'll be staying for a couple of months at least. Maybe through the winter. Although I do like to spend New Year in the city. All that champagne and desperation.\" His tongue flicks quickly across his bottom lip.\n\n*choice\n  #Welcome this vampire into your home.\n    You give a little bow and open the back door for him. He sweeps into the kitchen, turning his nose up at the pizza boxes and half-drunk bottles of cola.\n\n    \"This is your regular diet? Most irresponsible. You should eat more fresh tomatoes, red meat, and perhaps the odd piece of dark chocolate as a treat. Blood quality is everything, you know.\"\n\n    *set luck %-5\n    *page_break\n    *goto vamplodger\n  #Turn him away, gently.\n    You explain politely that your family home, which was originally adequate for three people, now has to house animated skeletons, walking corpses, a flying matriarchal figure of Celtic lineage and, somewhere, yourself.\n\n    You soften it a little by referring to his obvious breeding and imply that your accommodation is clearly beneath the standard he would expect. \n\n    *if (energy > 57)\n      \"While that's very flattering, I'm used to roughing it a little. I wasn't always the well-heeled gentleman you see today. Why, in Prague during the 1950s…\"\n\n      You listen patiently to several stories of attics and rat-infested sewers. At the end of each he entreats you to invite him in. You decline. After five rounds of this, his nostrils flare.\n\n      \"Snivelling mortal!\" he spits, and stomps back to the hearse. Its engine roars, its metal shrieks as it scrapes the gatepost, and he speeds off.\n\n      You head back inside.\n\n      *set control %+20\n      *page_break\n      *goto vampcheerio\n    *else\n      *label hypnolodger\n      As your words finally falter, those gleaming eyes draw you in and his mouth curls into a smile. \"Nevertheless, you would like me to stay, wouldn't you?\"\n\n      You say yes.\n\n      Wait, what?\n\n      He heads into the house and leaves you standing alone in the garden.\n \n      *set control %-20\n      *page_break\n      *goto vamplodger\n  #Turn him away, not so gently.\n    You lose your temper with this foppish blonde parasite. You explain that it's your house, that you've been put upon since you found the damn bone, that your whole life has changed, that you're nothing but a glorified janitor for a bunch of smelly has-beens and the last thing you need is another freeloading guest who will spend his evenings looking for your last friends and acquaintances in order to puncture them and drain their vital fluids.\n\n    *if (control > 62)\n      \"Well!\" He draws his cloak around him and sniffs. \"I can see I was wrong to expect a bit of old-fashioned courtesy here. I expect the conversation of your shuffling minions is about all you can handle, hmm? I shall depart and leave you to your certain fate.\"\n\n      He stomps back to the hearse and guns its engine in a clear attempt to wake up all the neighbours. As it roars away down the drive, you hear it clip another vehicle; no doubt your parents' car.\n\n      You head back in, trying not to think about that \"certain fate\" remark.\n\n      *set luck %+10\n      *set control %+10\n      *page_break\n      *goto vampcheerio\n    *else\n      *goto hypnolodger\n\n  #Ask him to make you into a vampire.\n    The vampire draws himself up, looking down his thin nose for a moment. Those eyes seem much older than that young face. They bore into you.\n\n    \"Hardly,\" he says. \n\n    He sweeps by you, into the house. You didn't invite him in, did you? You have a sudden feeling of deep inadequacy. Is this some kind of vampire mojo? Or does your life just suck?\n\n    *set luck %-10\n    *set control %-10\n    *set max_energy %-10\n    *set energy %-10\n    *page_break\n    *goto vamplodger\n\n*comment *****************************************************************\n*label vamplodger\n\n*set vampire true\nThe vampire examines every room in the house and sticks his head down into the cellar. \"Hmm.\" He goes back up to your parents' room and casts a critical eye on the wallpaper, chin in one hand. He rubs the curtains between finger and thumb.\n\n\"I think it would be best if I slept here,\" he says. \"How quickly can you brick up the window?\"\n\n*choice\n  #Brick up the window to keep him happy.\n    You haven't done a lot of bricklaying up until now, but how hard can it be? The vampire agrees to sleep in the car for a day. You Google \"how to lay bricks,\" find your parents' car around the corner, and drive it to the DIY superstore.\n\n    By the time you have dragged the bricks upstairs and mixed up a bucket of mortar, you are ready for a break. But you persevere, laying lines of brick across the windowsill like the web page advises. The room gets darker and darker as you work. You don't have a spirit level so you judge it by eye.\n\n    A few hours later, you're done. You go outside to examine your handiwork. It looks a bit uneven. And certainly not suspicious, like a serial killer lives there.\n\n    *set max_energy %+10\n    *set energy %+10\n    *set visibility +5\n    *page_break\n    *goto vampname\n\n  #Try to put him off this room.\n    Despite anything he might say, you're not keen to have a hungry vampire sleeping in the room next to yours.\n\n    You talk about your parents for a while. The vampire frowns at you. You emphasise how much in love they were. He doesn't know that's a lie. You point out the stains in the carpet caused by their untimely demise. It's only when you reason that you were probably conceived in here that he finally wrinkles his nose and agrees to sleep in the cellar.\n\n    You give him a hand to drag the coffin inside.\n\n    *set luck %+15\n    *page_break\n    *goto vampname\n\n  #Wait until dawn and then fry him with sunlight.\n    You help him shift the coffin into your parents' room and agree to go for bricks once the store opens. He settles down for the day.\n\n    However, once the room is bathed in direct sunlight, you brace a broom against the coffin, and lever off the top.\n\n    *if (control > 61)\n      The lid springs open. The vampire is bathed in warm sunlight. He shrieks, raises his hands to his face and ignites.\n\n      For about five seconds your parents' room is illuminated with a blazing figure; the flames dance blue and green and other colours you remember from chemistry class. Then, with a flat, dry report, the vampire implodes and drifts to the ground as a cloud of dust.\n\n      You drag the coffin outside and burn it. You'd better drive the hearse into a lake or something.\n\n      *set luck %+10\n      *set control %+5\n      *set humanity +5\n      *set vampire false\n      *page_break\n      *goto vampcheerio\n    *else\n      You only get the lid half-open before a pale hand shoots from inside the coffin and grabs it. The hand immediately bursts into flame, giving off dirty smoke as it grips. On instinct, you leap close and pull at the lid. You cough as you inhale a lungful of smouldering vampire.\n\n      The hand grabs you! It tries to drag you inside. In the shadow of the lid, you see the vampire's mouth open, baring two sharp canines. You try not to look into those enraged eyes. You kick at the lid.\n\n      Those teeth sink into your neck. Your back arches and with your last reserves of strength you shove at the lid. It breaks free and the sun falls across your attacker. He detonates beside you with an unholy shriek.\n\n      You stagger from the coffin, dripping blood and burned down one side of your face. Time for a cold shower. Then you'd better find somewhere to ditch that hearse before someone comes asking questions.\n\n      *set luck %-5\n      *set control %-5\n      *set humanity +5\n      *set vampire false\n      *page_break\n      *goto vampcheerio\n\n\n*comment *****************************************************************\n*label vampcheerio\n\nWith all the vampire excitement, you're too wired to go back to sleep. In fact, you could go for some sugary cereal and morning cartoons. You wander to the kitchen and open up the fridge.\n\nWait a minute. You step back into the living room and do a head count. Yep, you have two more skeletons than you started the night with. Where did they come from?\n\n*set skeletons +2\n*set minion_count +2\n*set luck %+5\n*page_break\n*goto_scene dayofthedead\n\n*comment *****************************************************************\n*label vampname\n\nYour new guest pauses from scooshing a blood pack into a wine glass to ask your name.\n\n*label namevamp\n\n\"$!{name}, eh? Charmed, I'm sure. You won't be able to pronounce my name unless you're fluent in the Transylvanian Saxon dialect. No, hmm? Unsurprising, given the state of schooling today. Well, you can call me…\"\n\n*choice\n  #Cristian.\n    *set vampname \"Cristian\"\n    *goto halloexit\n  #Dragos.\n    *set vampname \"Dragos\"\n    *goto halloexit\n  #Radu.\n    *set vampname \"Radu\"\n    *goto halloexit\n  #Stefan.\n    *set vampname \"Stefan\"\n    *goto halloexit\n  #Eric.\n    *set vampname \"Eric\"\n    *goto halloexit\n  #Something else.\n    What is the vampire's name?\n\n    *input_text vampname\n\n    He's called $!{vampname}. Is that right?\n\n    *choice\n      #Yes.\n        *goto halloexit\n      #No.\n        *goto namevamp\n\n*comment *****************************************************************\n*label halloexit\n\n*set vampchat 0\n\n$!{vampname} disappears briefly, then returns to the lounge wearing a velvet smoking jacket, cravat, and dress trousers. He settles down into the best armchair.\n\n\"So! I have driven a long way and I am very tired. But I would not be rude to one who has extended ${his} hospitality to a guest, no matter how eminent. You may ask me any questions you like. Expand your education. Probe the unseen mysteries of the universe. Hear a tale from centuries before your birth. What will it be?\"\n\n*label vampchatloop\n\n*if (vampchat = 3)\n  $!{vampname} raises a hand. \"Enough talk! It will soon be time for [i]Scarecrow and Mrs King[/i]. Ah-hah!\"\n\n  *label no_chat\n\n  You don't see his hand move. The remote seems to simply blink from the table into his grasp. That could get irritating.\n\n  *page_break\n  *goto vamptv\n*comment endif\n\n*if (vampchat = 2)\n  $!{vampname} regards you for a moment. \"I see this expression on your face. I am not quite what you expected, eh? Many are the secrets of the hidden realms. And they are not to be found in the book of that title. Ask again, by all means.\"\n*comment endif\n\n*if (vampchat = 1)\n  $!{vampname} checks his lapels. \"That was all you wanted to know? Go on, ask another.\"\n*comment endif\n\n*fake_choice\n  *hide_reuse #All that stuff about stakes, garlic and crucifixes. Is it true?\n    $!{vampname} frowns. \"Hardly the question of a gracious host. But it is all true, to a point. We recoil from the crucifix because of some geometrical phenomenon I do not understand. And yes, a stake through the heart will kill us as surely as it would kill you.\"\n\n    He wrinkles his nose. \"But the garlic thing is simple common sense. It is one reason I felt comfortable lodging here. You are clearly not a sophisticated cook.\"\n\n    *goto morevampchat\n\n  *hide_reuse #Does he approve of the depiction of vampires in film and TV?\n    \"Ach.\" He shifts in his seat. \"Lugosi had it, the terrible old ham. And your Christopher Lee, when he cut down on the coffee. Although he was better as Scaramanga. I didn't like Gary Oldman. What was he doing with that hair?\"\n\n    You press him on more recent treatments of the subject.\n\n    \"I don't understand this lady who writes the sparkly grumpy teenage vampires who cannot communicate. And [i]Buffy[/i]. Very funny. Very sad. But what is this?\" He strokes an invisible ridge down his forehead. \"They confuse vampires with [i]The Incredible Hulk[/i], yes?\" He dismisses it with a regal wave.\n\n    \"Although…\" he looks thoughtful for a moment, \"…Joss Whedon himself is a vampire.\"\n\n    *goto morevampchat\n\n  *hide_reuse #Why has he come to $!{town}?\n    \"Why! To see you, of course. Your life is short. How can you understand? Eternity is a thrilling dance across the rooftops of Europe, a glittering romance which starts anew each night and ends in the jugular. But it's also bloody boring sometimes.\"\n\n    He leans over. \"Sometimes you just want to go to a small town and watch the rules of death thrown away, to watch a newcomer struggle with a power they neither want nor understand. And the likely presence of multiple crude, undead murders does help cover my particular appetites.\" He grins.\n\n    *goto morevampchat\n\n  *hide_reuse #Why does the humerus do what it does?\n    \"That toy? Powerful, I see. You need not worry about me taking it. I have a feeling that were I to attempt to use it, I might transfer my existence into one of those shambling creatures you command. Thank you, but no thank you.\"\n    He regards the humerus for a moment, green light shifting in his eyes.\n\n    \"As to how it works…how should I know? I did not build it.\"\n\n    *goto morevampchat\n\n  *hide_reuse #Who is his tailor?\n    \"Ah. You have a cultured eye. This jacket came from Vienna. I have many fine tailors I visit throughout Europe. My criteria are strict. They must work in the traditional style, for I have no patience with changing fashions. They must be men, for I am a—how do you say—sexist bastard. And of course, most importantly, they must be open after dark.\"\n\n    *goto morevampchat\n\n  *hide_reuse #Will he actually do anything to help you?\n    \"Help you? Of course, of course. What guest would be rude enough to refuse a favour? I can advise on many things: fine art, good wines and difficult positions at backgammon.\"\n\n    You explain you were thinking more of actual physical help in the thick of undead battles.\n\n    \"Well, yes, yes, of course,\" he says. Then he looks down and frowns. \"Just give me a little warning so I can change out of my best shoes.\"\n\n    *goto morevampchat\n\n  *hide_reuse #That's enough talk.\n    \"You are a quiet one. We will coexist with no problems at all.\"\n    *goto no_chat\n\n*label morevampchat\n*set vampchat +1\n*goto vampchatloop\n\n\n*comment *****************************************************************\n*label vamptv\n\nYou settle down to watch some TV, trying not to think about your new lodger. Perhaps you will keep different hours anyway. It should be fine as long as he doesn't get hungry.\n\n$!{vampname} changes the channel to \"I Dream of Jeannie\". You find it strangely unsettling. It takes ten minutes before you realise that it's not the programme which is disturbing you. It's extra bodies in the room. You do a head count. Yep. You have two skeletons more than you used to. Where did they come from?\n\n*set skeletons +2\n*set minion_count +2\n*set luck %+5\n*page_break Next Day\n*goto_scene dayofthedead\n", "kendall": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, kendall\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\nYou make your regular trek to the grocery store alone. You could take a bodyguard, of course; but living with the undead all day, every day makes you value the moments you get away from them.\n\nDrawing near to the shop, you see something has changed. The shutters are down and the door is bolted. The rusty van which is usually parked round the side is not there.\n\nOf course, you've noticed people clearing out of town lately. But this could be a serious problem. You need to eat. You need to clean.\n\n*page_break\n\nYou slip down the side and check the back of the building. The rear door is a plain, metal panel and somebody has forced it open. The locking bar hangs loose and the door is open a few inches.\n\nYou peer inside. The only light gleams through the front shutters. But the shop looks undisturbed; maybe a little low on stock.\n\n*choice\n  #Get your usual shopping and leave some money on the counter.\n    Yeah, you command the dead and terrorise a small town. But that doesn't mean you're a thief. You still have a few months of money left in your parents' bank accounts. You gather what you need, work out the total, and slip it underneath the cash register. As you hoist the bags, you feel a moment of ethical satisfaction.\n    \n    *set luck %+5\n    *set humanity +1\n    *goto punch\n    \n  #Take as much as you can carry without paying.\n    You've played the post-apocalypse boardgames with Robbie. You know how this works. This is your last chance to stock your bunker. Tomorrow, the shop will be half-empty. The next day, it will be completely empty. The day after that, it will be a burnt-out shell.\n\n    *set luck %+5\n    *set corruption +1\n    *goto punch\n\n  #Come back another time.\n    You've still got some frozen peas at the back of the freezer, and a couple of jars of chutney. Plus some of that rice that always seems to burn when you cook it. You can survive for another day or two. Better that than risk going into a shut-up shop.\n\n    *set control %+5\n    *set max_energy %-10\n    *set energy %-10\n    *goto punch\n\n\n*comment #################################################################\n*label punch\n\nAs you step round the corner, something slams you in the face and knocks you back into the scrub. You taste blood in your mouth. Everything looks blurry. What just happened?\n\n*page_break\n\nA shadow falls across you. You look up at a dark figure blocking the sun. Two other shapes step forward to flank it. Who—?\n\n\"Look for a glowing stick,\" the lead one says. \"That's how ${he} controls them.\"\n\nNo. Oh no. It's the Kendall kids. You're completely alone and out of sight from the street. Mikey and Denzil reach for you, grinning. The humerus is hidden inside your jacket. But they'll surely find it.\n\n*choice\n  #Kick them away.\n    You can't let these two get their hands on you. Bracing yourself on the ground, you give an almighty kick with both feet towards their faces.\n\n    *if (energy > 60)\n      Your initial kick only connects with Mikey, but you follow it up with enough ferocity that they both fall back. It buys you enough time to get to your feet.\n\n      *set energy %-10\n      *goto on_feet\n    *else \n      It's too hard to coordinate both feet while you're on your back. You settle for flailing around. You land a couple of blows on Mikey and one on Denzil. But they slip past and grab a knee each, piling on top of you.\n      *set energy %-10\n      *goto seized\n     \n  #Scramble back as quickly as you can.\n    You push back with your feet and pedal as fast as you can away from the grasping hands of the Kendall kids. Dirt crunches beneath you and you feel your hands slip into the undergrowth.\n\n    *if (luck > 60)\n      Skittering after you, Denzil trips on a bit of exposed root and crashes to the ground, taking Mikey with him. You spring to your feet as they recover.\n      *set energy %-5\n      *goto on_feet\n    *else \n      Your back bumps against a bin. There's nowhere left to go. You scrabble around, trying to get up, but Mikey and Denzil fall upon you hard.\n      *set energy %-5\n      *goto seized\n \n  #Make a threatening bluff.\n    You are outnumbered, out of sight, and on the ground. About the only thing you have in your favour is that you're known to control the undead and that might be frightening to even confirmed toughs like the Kendall kids.\n\n    Trying for your best evil eye stare, you thrust a hand towards Mikey and say something spontaneously enigmatic and threatening about the power of the dead. The exact details would probably not bear close examination.\n\n    *if (control > 63)\n      Controlling an undead horde has given you presence. The Kendall kids are startled enough to pause for a moment. You have enough time to get to your feet.\n      *set control %+10\n      *goto on_feet\n    *else \n      The Kendall kids are not impressed. Denzil and Mikey push you back against the ground.\n      *set control %+5\n      *goto seized\n      \n  #Huddle and try to summon the undead.\n    You roll into a ball and thrust a hand inside your jacket to touch the humerus. You taste dirt and feel Mikey and Denzil's rough hands on your shoulders. With a desperate effort you try to throw a command through the humerus to reach your horde, several streets away at home. You only have a couple of seconds before your hand is dragged away and they turn you over. Did the message get through?\n    *if ((control > 35) and (energy > 35))\n      *set remote true\n    *set energy %-5\n    *goto seized\n\n*comment #################################################################\n*label on_feet\n\nThe Kendall kids close in on you as a pack, backing you against the wall of the shop. They're used to hand-to-hand scrapping. You, on the other hand, get the undead to do all your dirty work. \n\n*choice\n  #Break through them and run for it.\n    *if ((control > 41) and (energy > 38))\n      Denzil is the weak link. You lunge towards his face and he flinches back. This leaves just enough of a gap for you. You plunge through, feeling Mikey grab at your clothes.\n      *set luck %+5\n      *goto kendall_chase\n    *else\n      You spring at the gap between Mikey and Denzil but they're too quick for you. They grab an arm each. Sean sweeps out your legs and you thump to the ground.\n      *set luck %-5\n      *set energy %-5\n      *page_break\n      *goto lost_bone\n\n  #Bargain with them.\n    You try the old \"if you don't hurt me I'll show you something you won't believe\" ploy. Denzil falls for it immediately, his eyes widening and his head tilting to one side.\n\n    Mikey steps in and pushes you to the ground. So much for that.\n\n    *set control %-5\n    *page_break\n    *goto lost_bone\n\n  #Flee into the shop.\n    You dart towards the shop doorway.\n    *if (energy > 40) \n      Mikey moves to block but you are too fast. You flee to the front through darkness. The main entrance and the windows are all shuttered.\n\n      Three silhouettes move against the back doorway as the Kendall kids begin to stalk you. You freeze against a shelf, breathing silent breaths, trying to blend into the darkness. Perhaps you could throw something to the other side of the shop as a distraction…\n\n      Sean's voice comes inches from your head. \"Is ${he} over there?\" You smell sweat and lager, and sense rather than see him begin to move on. The back doorway hangs open, inviting and close.\n\n      *if (luck > 48)\n        You break for it. The Kendall kids hear your footsteps but you're already out and slamming the door to slow them down.\n\n        *set max_energy %+5\n        *set energy %+5\n        *page_break\n        *goto kendall_chase\n\n      *else\n        You bump a bottle of cola. It clinks. Sean's hands are there immediately, grabbing your shoulders. Mikey and Denzil blunder over through the darkened shop. Together they drag you out and dump you on the ground.\n\n        *set control %-5\n        *page_break\n        *goto lost_bone\n\n    *else\n      Mikey slams the door closed before you can get through. Then they are on you, pushing and grabbing. You stumble and fall.\n      *set energy %-10\n      *goto lost_bone\n\n  #Try to summon the undead.\n    You reach inside your jacket and wrap your fingers around the humerus. You use your other arm to disguise the action, trying to look like you're folding your arms in defence. Meanwhile, you are desperately sending out a mental signal to call the undead here.\n\n    It's hard to concentrate under pressure. Was that enough? The Kendall kids grab you and throw you to the ground.\n\n    *if (control > 40)\n      *set remote true\n    *goto lost_bone\n\n\n*comment #################################################################\n*label seized\n\nYou struggle. While the other two hold you down, Sean advances on you, baring his teeth in a crackedy grin. You remember him sticking his knife into the soldier without a moment's hesitation.\n\n*choice\n  #Try to negotiate.\n    You admit you are in control of an undead horde and offer to use it to help the Kendall kids. Sean looks at you sideways for a moment. \"Yeah,\" he says. \"Or I could just take them and do whatever the hell I want.\" He bends down towards you.\n\n    *set luck %-5\n    *goto lost_bone\n\n  #Make a supreme effort to escape.\n    You throw your body from side to side as violently as you can. For a moment Mikey's grip wavers—then he kneels on your shoulder. Denzil follows his lead on the other side.\n\n    *set energy %-30\n    *goto lost_bone\n\n  #Shout for help.\n    You holler as loud as you can, feeling your throat dry. Mikey clamps a hand over your mouth, forcing your jaw closed. Denzil regards you with a grim satisfaction.\n\n    *set control %-10\n    *goto lost_bone\n\n  #Stop resisting and wait for an opportunity.\n    They won't work so hard at restraining you if they think you've given up. You go slack in Mikey's and Denzil's grasp.\n\n    *set control %+5\n    *goto lost_bone\n\n*comment #################################################################\n*label lost_bone\n\nSean frisks you, checking every pocket for the bone. After a few seconds, he notices the bulge beneath your jacket. \"Ha!\" He snatches it out.\n\nDenzil thrusts you back down but Mikey loses interest as Sean holds up the glowing humerus. In the shadows behind the shop, its light tints his face a sickly green. \"Ha!\" he shouts again. He points the bone at Denzil, then flicks it like he expects a lightning bolt to come out.\n\nNothing happens.\n\nDenzil frowns. \"Don't do that! It might be loaded.\"\n\nYou get to your feet, brushing off dirt and undergrowth. \"It's not a stick,\" says Sean. \"It's a bone. A real bone.\" He turns it over in his hands.\n\n*choice\n  #Snatch the bone and flee.\n    You're free of Mikey and Denzil and all three toughs have their attention on the bone. You might be able to grab it if you're fast enough. Everything's down to the timing. You loosen up and watch.\n\n    Sean tries to use the bone like a magic wand again, then jabs Mikey in the stomach with it. Finally, he notices the contents are slowly changing colour and he brings it close to his eyes to examine it. Nobody is looking at you.\n\n    This is the moment. You spring and lash out a hand to grab the bone.\n\n    *if (energy > 57)\n      You're fast and slick. You lift the humerus literally from under Sean's eyes and you're away before the three of them can react. You're halfway round the corner before you hear the shouts.\n\n      *set energy %-10\n      *page_break\n      *goto kendall_chase\n    *else\n      Sean sticks a hammer hand into your chest without taking his eyes off the humerus. You double over, coughing. Not fast enough.\n\n      *set energy %-25\n      *page_break\n      *goto lost_bone2\n\n  #Claim to have killed the bone's original owner.\n    You step forward and inject a grim note into your voice. You describe a demonic ritual that you conducted to doom the previous owner of the humerus so you could dismember his body. This is not too hard as it is the plot of a shoddy horror film called [i]Ritual: Y2K[/i] you caught on TV a couple of weeks back.\n\n    Things get a bit more vague when you describe how you found the corpse and sawed its arm off. You have to draw on a half-remembered episode of \"CSI\" and add a bit of supernatural flavour.\n\n    Sean walks over and puts his face so close to yours that you could lick it. He stares deep into your eyes for a moment. \"Nice story,\" he says. \"Any of it true?\"\n\n    It was worth a try.\n    *set luck %-5\n    *page_break\n    *goto lost_bone2\n\n  #Try to trick Sean into handing it over.\n    You drop into a conversational tone as you watch Sean experiment with the bone. Eventually he points it at the ground and you wince and turn away.\n\n    \"What?\" He glares at you. \"What is it?\"\n\n    You make a show of reluctance and let the Kendall kids threaten you a bit more before you cough up the story. You explain how the bone is a conduit between the living and the dead and it only flows in one direction. So if Sean uses it the wrong way round it will steal his life force and return it to the earth.\n\n    Sean looks at the humerus with a dubious eye. Denzil looks at Mikey. \"What's a 'conduit'?\" he says.\n\n    You offer to check it and reach out for the bone.\n    *if (luck > 60)\n      Sean allows you to take it from his loose fingers. You pretend to examine the end while issuing as urgent a summon order as you can manage. Sean sees your concentration and snatches the bone back. Was that enough?\n      *set luck %+10\n      *set remote true\n      *page_break\n      *goto lost_bone2\n    *else\n      Sean pulls it away and shoves you back. \"Nice try,\" he spits.\n      *set luck %-5\n      *page_break\n      *goto lost_bone2\n\n  #Attempt a spooky mental attack through the bone.\n    It didn't exactly come with an instruction manual. But you have spent long enough channelling your will through this thing that you think you might be able to influence Sean with it.\n\n    You close your eyes and concentrate, visualising Sean's fingers on the humerus, the blood inside his fingers, the veins taking the blood up through his arm. You follow the blood through his heart, riding the flow back up to…his brain. \n\n    *if (control > 66)\n      Sean shrieks, a howl so abrupt and deafening that it startles you. You step forward and pluck the humerus from his grasp. It takes less than a second to call out for your horde.\n\n      *set luck %+10\n      *page_break\n      *goto kendall_overlord\n    *else\n      A breeze cools your face.\n\n      \"Hoi!\" Something slaps you. You open your eyes to see Mikey's twisted little face pushed into yours. \"Dozing off, are you? Keeping you up, are we?\"\n\n      So much for your mysterious mental powers.\n      *set luck %-10\n      *page_break\n      *goto lost_bone2\n\n*comment #################################################################\n*label lost_bone2\n\n\"Think you're a bit of a wild one, don't you?\" Sean steps close and leers.\n*if (chippy_kill)\n  \"I used to like the chips from that chip shop. They were crap but they were hot and there were plenty of them. Now those guys are dead and my gut tells me you're to blame. You've made me cook.\"\n  *goto threat_end\n*elseif (hair_kill)\n  \"Our old lady used to clear out of our way during the day and hang out at that weirdo hairdressers. Now she's at home all the time. All the time. That was you. I know it was.\"\n  *goto threat_end\n*elseif (cop_kill)\n  \"I didn't like that copper, either. I was going to deal with him one day. I was looking forward to it. But somebody\"—he prods you in the chest—\"somebody got to him first. I know it was you. It doesn't make you my friend. It makes you my enemy.\"\n  *goto threat_end\n*else\n  \"Don't look so impressive without your lightsabre here.\"\n  *goto threat_end\n\n*label threat_end\nMikey chips in. \"Your card's marked,\" he says. \"Believe it.\" He pushes you onto your back again.\n\nIf they leave with the bone, you may never get it back. You can make one last attempt to communicate with the horde. Perhaps you can somehow channel through the humerus even without touching it.\n\nHow will you do this?\n\n*choice\n  #Concentrate as hard as you can.\n    You visualise a sort of mental tunnel through the space between you and the humerus in Sean's hand. As soon as it is solid in your mind, you fire an instruction through to summon the undead. \n\n    Denzil gapes at you with mouth half-open. \"What's ${he} doing?\"\n\n    Sean tears his eyes away from the glowing humerus. \"$!{he}'s just trying to weird you out with mind games.\" He shoves Denzil. \"Don't let ${him} rattle you.\"\n\n    Denzil shoves you by the shoulder, breaking your concentration. Well, that either worked or it didn't.\n\n    *if (energy > 42)\n      *set remote true\n    *goto corner_of_truth\n \n  #Recall a moment when you felt in total control of the undead.\n    There was a point, about a week after your parents died, when you first realised you were directing the undead without concentrating on every little movement. Control became fluid and straightforward, something you did without thinking. You reach for that feeling now.\n\n    You don't have the humerus. It doesn't matter. The control comes from you. The bone is simply the transmitter. You reach out for that first moment of intuitive control.\n\n    \"Why aren't you looking scared?\" Denzil shoves you. \"Why aren't you trying to run?\"\n\n    You stare back at him. If you have just successfully contacted the undead, he'll be the one running.\n\n    *if (control > 55)\n      *set remote true\n    *goto corner_of_truth\n\n  #Clear your mind and try to do it without conscious effort.\n    This is just Luke Skywalker using the Force, right? The Kendall kids are the flying ball shooting you in the backside. You need to empty your mind and let the order flow directly from you to the undead. The humerus is only steps away…you close your eyes and let yourself float. Away from this grubby back lot, away from $!{town} altogether…you're not here, you're with the undead…\n\n    \"Don't relax!\" Denzil shoves you. \"You're supposed to be scared!\"\n\n    You feel a beautiful yawn coming and let it go. Denzil stares at you, obviously dismayed.\n\n    *if (luck > 59)\n      *set remote true\n    *goto corner_of_truth\n\n  #Think yourself into an \"undead state of mind\".\n    They smell. They have difficulty moving in a straight line. They get excited by live human prey and big explosions on the TV. They have passed through the trauma of death to inhabit a lonely shadow state between life and oblivion. They have been your constant companions since the rest of your family passed away. And were, uh, eaten by them.\n\n    Can you truly relate to the undead? Can you communicate with them through empathy alone?\n\n    Denzil wrinkles his nose. \"Did one of you two fart?\" he asks.\n\n    *if (corruption > 18)\n      *set remote true\n    *goto corner_of_truth\n\n\n*comment *****************************************************************\n*label corner_of_truth\n\nSean is fascinated by the humerus, rolling it across his palm and watching the colours shift. Mikey nudges him. \"Come on,\" he says. \"Let's leave this idiot and get started.\"\n\nFor a moment, you think he won't move. But Sean turns to look at you and gives you a last salute, the green-yellow glow of the bone tinting the side of his face. Then the three of them turn the corner.\n\n*page_break\n\nDenzil sees it coming by a split-second. Mikey doesn't; he's looking back at you. Sean doesn't; he's still studying the humerus.\n*if (skeletons > 0)\n  A bony figure leaps onto Mikey's chest and bears him to the ground, jaw hanging open in silent glee. It pushes its black sockets close to his fleshy white eyes. He's not smiling now.\n\n  *goto rehumerised\n*else\n  A green-skinned, noxious figure walks straight into and over Mikey, trampling him with dead weight. It pushes its festering face close to his, little grave worms raining from the blackened stumps of its remaining teeth.\n\n  *goto rehumerised\n\n*label rehumerised\n*if (minion_count > 1)\n  The remainder of the horde descend on Denzil. The Kendall boys shriek. They struggle and punch, but it's no use. The undead have them.\n*comment endif \n\nWide-eyed, Sean waves the humerus at the advancing horde. There is no reaction at first.\n*if (remote)\n  Then your minion leans forward and knocks the glowing bone from his hands.\n\n  You step forward and pick it up. It feels solid in your hand. Reassuring.\n\n  *page_break\n  *goto kendall_overlord\n*else\n  Then your minion swipes at him. He throws the glowing bone to the ground and darts sideways, bouncing off a wall to get around the horde. Without a look back at his brothers, Sean sprints away.\n\n  Mikey gurgles as he dies. Denzil makes a sound closer to a whimper.\n\n  *page_break\n\n  You step forward to pick up the bone, but\n  *if (zombies > 0)\n    a zombie bars your path, sunken eyes staring at your shoulder. You try to step around it, but it reaches out and grabs you. \n\n    *goto awesome_fail\n  *else\n    a skeleton bars your path, looking down at you through empty eyesockets. You try to step around it, but it reaches out and grabs you.\n\n    *goto awesome_fail\n\n*comment *****************************************************************\n*label awesome_fail\n\nStruggling, you're forced to the ground. The humerus is there, just ahead. You push and shove, scrabbling a little closer. It's two arm lengths away. Undead hands pull at your clothes. If you can just reach it—\n\nCRACK. You taste blood in your mouth.\n\nCRACK. Everything goes dark.\n\n*page_break\n\nThe world is slow, blurred. You taste blood and earth.\n\nA hand rises to your face. The skin hangs loose; torn. Something smells bad, but it is receding from you. Distant. One of your arms is broken.\n\nAnother one like you is close. It knows you. You walk together through the haze, your steps stiff and faltering. As you move, you feel the hunger build, a memory of juices on your tongue.\n\nThere is no choice to make. You are following the one who got away, the one who had the bone. There were three, and two are dead. One remains.\n\nYou will feast on his flesh.\n\n*set control 0\n*set luck 0\n*set max_energy 0\n*set energy 0\n*page_break End\n*goto exit\n\n\n\n*comment *** awesomefied in v4\n*comment  You wait for the zombie moan, the reassuring clack of animated bones.\n\n*comment  None comes.\n\n*comment  When you finally get to your feet and look round the corner, the Kendall kids are already in the distance, laughing and punching each other. Maybe they'll learn to control the undead. Maybe they'll just kill themselves trying. But one thing is sure: you can't go back home. The house is full of bloodthirsty undead, and the only thing restraining them from devouring you has just been taken away. \n\n*comment  You can't go back. Not now. Maybe never. You dust yourself down and look inside the darkened shop at the remaining supplies. A bag of those could last you for two or three days' walk.\n\n*comment  *page_break\n\n*comment  As you leave the suburbs, sun breaks through the clouds. You blink at the unexpected warmth on your face and heft your rucksack. It's not far to the next town. You'll be there before dark, and you still have enough money to get by for a while.\n\n*comment  The strange thing is, you don't feel like something has been stolen from you. Instead, it's more like a burden has been removed. You take a couple of deep breaths of country air. You've spent too long around death lately. It's time to start living.\n\n*comment  An army personnel truck roars past you, heading in the direction of $!{town}.\n\n*comment  Your necromantic career is over. You feel fine.\n\n\n*comment #################################################################\n*label kendall_chase\n\nYour heart pounds as you flee down the main street. A couple of months ago you might have seen passers-by to ask for help. Not now. There is nobody else around. The boots of the Kendall kids thump the tarmac behind you. Every breath becomes an effort.\n\nWhat will you do to shake your pursuers?\n\n*choice\n  #Just outdistance them.\n    *if (energy > 59)\n      You're in great shape whereas the Kendall kids spend all day loitering, smoking, and underage drinking. When you concentrate and get your head down, you begin to pull ahead.\n\n      Sixty seconds later, you hear them slow and stop. \"You're marked,\" yells Mikey after you. But he is so out of breath that it sounds more desperate than threatening.\n\n      *set max_energy %+5\n      *set energy %+5\n      *page_break\n      *goto kendall_exit\n    *else\n      Being free of parental supervision does mean you have spent longer on the couch than you used to. As you tire, the boots steadily gain on you.\n\n      Something heavy lands on your back and you thump to the ground. Denzil is on you immediately, plucking the humerus from inside your jacket. \"Ha!\" he shouts.\n\n      Sean slaps him and takes the bone from his hands. He gives a yellowed grin as he stares at the glowing liquid inside.\n\n      *set energy %-25\n      *set control %-5\n      *set luck %-5\n      *page_break\n      *goto lost_bone2\n      \n  #Try a difficult jump.\n    A block ahead, the street rises up and there's an old industrial area off to the left. It has a barbed wire fence but it's close to a low wall. You've seen kids daring each other to jump it. It's scary—but better to hurt yourself than lose the bone. You veer right to get a better run up.\n\n    \"We're going to catch you!\" yells Mikey. \"There's three of us and one of you!\" He does not seem to appreciate that a chase is about speed rather than numbers and you are running on pure adrenaline right now.\n\n    You don't have time to think as you put a foot on the wall and launch yourself over the fence.\n\n    *page_break\n\n    *if ((energy + luck) > 110)\n      You clear the barbed wire by a couple of inches and land on the grass beyond. Looking up at the fence, it seems very high and a wave of dizziness passes over you.\n\n      The Kendall kids come thundering up but stop when they see what you've done. Sean puts his foot on your takeoff point and for a moment he looks ready to follow you…but he frowns and shakes his head.\n\n      \"Round this way,\" he snaps. \"We can get at ${him} through the side.\"\n\n      You check inside your jacket. The humerus is still safely there. You'll be long gone by the time they reach you.\n\n      *set humanity +3\n      *set luck %+5\n      *set control %+5\n      *page_break\n      *goto kendall_exit\n    *else \n      Aaugh! Your leg snags on the barbed wire and you tumble to the ground, scrabbling for a hold on the fence on the way down. Your face smashes against concrete.\n\n      Your vision swims. You look down. Your jeans are torn to a raggedy mess and blood is seeping through the holes. You feel bile rise in your throat and fight back the urge to throw up.\n\n      \"Haw!\" From the street above, Denzil points and laughs. \"Haw!\"\n\n      Sean frowns. \"Round this way,\" he snaps. \"We can get at ${him} through the side.\"\n\n      You limp to your feet. You had better be gone when they get here. You feel for the humerus. It's still safe—but your leg is going to need serious attention when you get home. And you won't be wearing these jeans again.\n\n      *set max_energy %-15\n      *set energy %-15\n      *set control %-5\n      *page_break\n      *goto kendall_exit\n\n  #Run straight towards home—and the undead.\n    You begin to count down the route in your head. Five streets away. Four streets away. You grab a lamppost to help you turn a corner. Three streets away. A snoozing cat yowls and scatters from under your feet. You can hear the Kendall kids gaining. Did they know where you live before? Maybe coming here was a very bad idea. Two streets away. Maybe you should—\n\n    A blue recycling tub has been left on the street, directly ahead. You swerve to avoid it, misstep—and you go down, your palms stinging as you hit the tarmac. \n\n    The humerus bounces from your pocket and rolls into the road. Sean snatches it up with a savage grin.\n\n    \"So this is it,\" he spits. \"This is what you use to control them.\"\n\n    *set remote true\n    *page_break\n    *goto corner_of_truth\n\n\n*comment #################################################################\n*label kendall_overlord\n\n*if (minion_count = 1)\n  Your solitary minion is not enough to keep the Kendall kids penned in. They break and scramble through the undergrowth, hissing with pain as thorns tear at their clothes. For a moment, it looks like Mikey might shout something—then he closes his mouth and rushes off.\n\n  You learned something today about letting your guard down. It looks like the Kendall kids learned something too.\n\n  *set visibility +5\n  *set luck %+10\n  *set control %+10\n  *set max_energy %+5\n  *set energy %+5\n  *set stagetwo 3\n  *page_break Next Day\n  *goto_scene stagetwo\nThe Kendall kids are trapped against the shop with you. Your minions press in, penning them and leering.\n*if (zombies > 0)\n  Sean lashes out with his knife and plants it directly into the heart of one zombie. It turns its dead eyes to point at him and gives a low moan. Rattled, he tries to pull the knife out. It seems to be stuck against something.\n*comment endif\n\nFinally you see fear in their eyes. It's time to deal with this family once and for all.\n\n*choice\n  #Show the better way. You've demonstrated your superiority. Now let them go.\n    You walk up to each of the Kendall kids in turn and look them in the eye. Mikey is trying to keep the fear down. Sean's eyes are flint and his jaw set. Denzil's cheeks are wet—and so are his trousers.\n\n    *if ((humanity > 26) and (control \u003c 72))\n      Suddenly you feel a kind of savage feedback from the horde. You fight it, trying to tamp it down. But you're still a little woozy from the first punch. Your control slips and the horde succumbs to its instincts.\n      *goto off_leash\n    For a few more seconds you hold them there. Then you pull back the horde and incline your head. They don't need to be told twice. They scarper at Olympic speeds.\n\n    You can feel a current of frustration within your horde. You tamp it down but they strain at your psychic leash like frisky dogs. \n    *set humanity +8\n    *set control %+10\n    *set luck %+10\n    *set max_energy %+5\n    *set energy %+5\n    *set stagetwo 3\n    *page_break Next Day\n    *goto_scene stagetwo\n\n  #Pretend you're going to kill them, then relent at the last moment.\n    You channel great TV and movie villains, strutting up and down in front of your captives and talking about their impending doom. A tearful Denzil watches you. Mikey stares into the sky, looking pale. Sean watches the undead with cold eyes, still looking for an opening.\n\n    After you have gotten a few things off your chest, you wind up with some crap about how you want more sport out of them and you will come looking for them one day soon and you would like it if they left town because it would make the chase sweeter, and so on. You pull back the undead, feeling a buzz of frustration through the humerus. The Kendall kids stare at you for a long moment. You don't blink. Then they slink off.\n\n    After a moment, you see Mikey cuff Denzil around the ear. Sean takes a sullen look over his shoulder. Is that the last you'll see of them?\n\n    *set humanity +5\n    *set corruption +2\n    *set control %+10\n    *set luck %+10\n    *set max_energy %+5\n    *set energy %+5\n    *set stagetwo 3\n    *page_break Next Day\n    *goto_scene stagetwo\n\n  #Kill them quickly.\n    It feels easy, just letting go and targeting. Your minions move in with clean strikes to the neck and head. First Mikey drops, then Denzil. Sean fights to the last, grappling and kicking, and finally even biting his attackers. But numbers and the uncanny strength of the undead are against him. One decisive blow breaks his neck, and he drops, the determination fading with the light in his eyes.\n\n    You turn the humerus over in your hand. Your path is set. No point in being squeamish about it.\n\n    *set humanity +2\n    *set corruption +5\n    *set kendall_kill true\n    *set control %+10\n    *set luck %+10\n    *set max_energy %+5\n    *set energy %+5\n    *set bodycount +3\n    *set stagetwo 3\n    *page_break Next Day\n    *goto_scene stagetwo\n\n  #Allow the horde to satisfy its appetite.\n    In a situation like this, you are mainly exerting control to restrain your minions. Now you simply step back and release that control. The undead move in.\n\n    *label off_leash\n    First comes two gasps as Mikey and Denzil are thrust against the wall. Sean struggles, gritting his teeth and lashing out. The first blow to the face surprises him. The second leaves his eyes wandering, dizzy like a boxer.\n\n    Mikey is pushed up the wall, blood drizzling from the side of his mouth. Denzil wails and sags under repeated strikes. The horde gains momentum, tearing and gnawing until the wall is painted with spray and the ground is drenched. Your minions don't stop, devouring every piece like dogs. After thirty seconds, you have to look away.\n\n    *set corruption +8\n    *set kendall_kill true\n    *set control %+10\n    *set luck %+10\n    *set max_energy %+5\n    *set energy %+5\n    *set bodycount +3\n    *set stagetwo 3\n    *page_break Next Day\n    *goto_scene stagetwo\n\n\n*comment #################################################################\n*label kendall_exit\n\nAs you head home, you take a moment to think through the situation. The game has changed. The Kendall kids know what you are; and they know about the humerus. They surprised you this time and they nearly took it. You can't go out on your own any more. Perhaps it's time you ended this situation, one way or another.\n\nAlso, if the Kendall kids know all about you, they won't be the only ones. Somebody outside will hear and they'll come. This might be the beginning of the end. Are you ready for it?\n\n*set visibility +10\n*set stagetwo 3\n*page_break Next Day\n*goto_scene stagetwo\n\n*comment #################################################################\n*label exit\n\n[b]THE END[/b]\n\nYour final statistics were: undead control ${control}%, energy rating ${max_energy}% and luck ${luck}%. You reached a visibility level of ${visibility}.\n\n${bodycount} people died during the story.\n\nYour final humanity score was: ${humanity}%.\n\nYour final corruption score was: ${corruption}%.\n\n*if (sam = 1)\n  You met Sam.\n  *goto max\n*elseif (sam = 2)\n  You felt a mutual attraction with Sam but it never really went anywhere.\n  *goto max\n*elseif (sam = 3)\n  You and Sam had a flirty relationship.\n  *goto max\n*elseif (sam = 4)\n  You and Sam had a solid relationship.\n  *goto max\n*elseif ((sam >= 5) and (sam \u003c 66))\n  You and Sam had a smoking hot relationship.\n  *goto max\n*elseif (sam > 65)\n  Sam died.\n  *goto max\n*comment endif\n\n*label max\n*if (max = 1)\n  You met Max.\n  *goto endgame\n*elseif (max = 2)\n  You felt a mutual attraction with Max but it never really went anywhere.\n  *goto endgame\n*elseif (max = 3)\n  You and Max had a flirty relationship.\n  *goto endgame\n*elseif (max = 4)\n  You and Max had a pleasantly chilling relationship.\n  *goto endgame\n*elseif ((max >= 5) and (max \u003c 66))\n  You and Max had a dark, intense relationship.\n  *goto endgame\n*elseif (max > 65)\n  Max died.\n  *goto endgame\n*comment endif\n\n*label endgame\n\n*goto_scene ending\n", "localcop": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, localcop\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*if (localcop = false)\n  $!{town} has one policeman—PC McMurdo. An older man with a bit of a belly and a salt-and-pepper moustache. He is the slow-moving, ultimate expression of legal authority in the town. If you can run him off, your dominion will be complete.\n\n  *set advantage true\n  *set luck %+5\n  *page_break\n  *goto police_car\n*else\n  *goto doorstep\n\n*comment *****************************************************************\n*label doorstep\n\nYour doorbell clangs. Moving with quiet steps, you peer between the curtains. A police car is parked outside. A tall shadow in a cap darkens the front door.\n\n*choice\n  #Answer the door.\n    You recognise the portly policeman at the door. PC McMurdo. You're not sure but you think $!{town} actually only has one policeman.\n\n    *if (police_graveyard)\n      He opens his mouth, then closes it and looks hard at you. \"Haven't we spoken recently?\" he says. \"Young $!{name}, isn't it?\"\n      \n      *if ((luck >= 60) and (visibility \u003c 10))\n        After a few seconds, he shakes his head.\n        *goto whew\n      *else\n        He looks at you for a little longer. You try not to react. You know he's talking about the graveyard.\n\n        PC McMurdo clicks his fingers. \"That business at the graveyard. That was you.\" \n\n        You wilt under the force of his gaze. He pushes the door aside and steps into the hall.\n\n        *goto entry\n    *else\n      *label whew\n      \"Your parents in? I need a word.\"\n\n      Well, this is awkward.\n\n      *choice\n        #Run for it.\n          *goto flee\n        #Invite him in to ambush him.\n          You invite PC McMurdo in. He sniffs as he walks through the hall. You offer him a seat in the lounge, reasoning that his bulk will make it difficult to get up in a hurry. Instead of sitting down, he proceeds to tour the room, examining little details like objects on the mantelpiece. He sniffs again. Then he notices a couple of stains the zombies made on the carpet.\n\n          \"We've had some reports…\" he eyes the stains, then looks up at you, \"…of unusual activity around this house. Do you have any comment on that?\"\n\n          His eyes fix on yours. He steps closer. As your hand flicks to the humerus in your pocket, he follows the movement. Your fingers wrap around it and pull the undead.\n\n          *page_break\n          *set advantage true\n          *goto ambush\n        #Say that they're not available.\n          You explain that your parents are out right now.\n\n          \"Mmm-hmm.\" He makes no move to turn away. \"And when are you expecting them back?\" \n\n          You mutter something about a few hours but PC McMurdo does not seem to listen to your answer. His ample nose wrinkles and makes a slow, considered sniff. His eyes narrow. \n\n          PC McMurdo grabs your shoulder and shoves you out of the way. He steps over the threshold, into the house.\n          *page_break\n          *goto entry\n\n  #Hide and wait.\n    You crouch behind the door to the lounge. The bell clangs again.\n\n    \"Come on there.\" You recognise the voice of local copper PC McMurdo. \"I know you're in there. I want to ask you a few questions.\"\n\n    You stick it out, trying to keep your breathing silent.\n\n    \"Come on now.\" You hear a slow squeak. Almost too late, you yank your head back out of view. He's lifted the flap of the letterbox and is staring through. There is something very creepy about those eyes moving around in the slot.\n\n    Finally, you hear a third sound. Is that…sniffing?\n\n    The door crashes open and smashes against the wall. You jump to your feet. PC McMurdo advances into the house.\n    *page_break\n    *goto entry\n\n  #Go out the back door and over the wall.\n    *goto flee\n\n*comment *****************************************************************\n*label entry\n\n\"I'm entering this house without a warrant because I believe a crime to be in progress,\" PC McMurdo says. You always thought of him as a bit of a duffer but he's scary when he's channelling the power of The Law.\n\nHe looks down at you. \"Every police officer knows the smell of death, ${gender}. Sooner or later. This house stinks of it.\" \n\n*choice\n  #Attack with the undead.\n    *goto ambush\n  #Come quietly.\n    You could probably take him. You could probably make it out of the house. But something stops you doing either. Maybe you're fed up of the responsibility, the constant company of the staggering undead. Maybe your conscience is bothering you. Or maybe you've simply tired of the tricky decisions.\n\n    Either way, you offer no resistance as PC McMurdo cuffs you and leads you out to the car. But then he turns to go back in. \n\n    You warn him not to. But he does it anyway.\n\n    *achieve arrest\n    *page_break\n\n    You sit helpless in the back of the police car, hands cuffed behind your back, as the first crash comes from inside. There is a shriek, repeated thumps of something falling down a staircase, and guttural cursing. Finally you hear a rich, thick, squelch.\n\n    After a stage wait, the banshee drifts out from the front door, lank hair forming a ghastly wake behind her. She opens the car door and peers in.\n\n    \"This is how you behave in a tough spot, is it? This is the best that you can do? You have a responsibility towards these unfortunates you have ripped from their eternal rest. And at the first sniff of authority you're ready to abandon them? You should be ashamed of yourself. Take a look at yourself!\" She goes on for some time, and two passers-by observe the bizarre exchange. Eventually, she lets you out of the cuffs. \n\n    *set visibility +4\n    *page_break\n\n    You stagger inside. PC McMurdo's corpse lies at the bottom of the stairs. His head is facing backwards and a massive slash has been torn across his belly. The uniform has split and entrails hang loose in a dark flood which leaks onto your hall carpet.\n\n    *if ((zombies > 1) and (luck \u003c 38))\n      He seems to have taken two zombies with him. One has been crushed against the wall halfway up the stair; the other lies ruptured beneath his corpse.\n      *set zombies -2\n      *set minion_count -2\n      *goto quietly_skel\n    *elseif (zombies > 0)\n      He seems to have wrestled a zombie on the way down the stairs. It lies around him in rotten, rag-covered pieces.\n      *set zombies -1\n      *set minion_count -1\n      *goto quietly_skel\n    *else \n      *goto quietly_skel\n      \n    *label quietly_skel\n    *if (skeletons > 0)    \n      A skeleton has somehow become shattered in the struggle. Bones are wedged in the wallpaper and the banister. The skull lies in the corner of the hall, upside down. Its vacant sockets reproach you.\n      *set skeletons -1\n      *set minion_count -1\n    *comment endif\n\n    *if (zombies = 0) and (skeletons = 0)\n      You're looking at a dead policeman and you have no undead minions left to command. Best not come back here. Ever.\n\n      *page_break\n      *goto_scene exile\n    *else\n      You sigh and head for the kitchen to get black bags and carpet cleaner. The banshee glares at you. This is going to be a long afternoon.\n\n      *set humanity +5\n      *set bodycount +1\n      *set cop_kill true\n      *page_break\n      *goto_scene halloween\n\n  #Bolt for the back door.\n    *goto flee\n\n*comment *****************************************************************\n*label ambush\n\nBefore you can throw in a minion, the banshee streaks through the air, green and shrieking. Her long pale fingers claw at the policeman while her hair stands up in an electric spray.\n\n*if (advantage)\n  *goto banshee_power\n*elseif luck > 43\n   *goto banshee_power\n*else\n  *goto cop_power\n\n*label banshee_power\nIt might be too many doughnuts or too many days riding around in a Vauxhall Astra, but PC McMurdo reacts slower than he should. The banshee forces him back against the wall and her eerie fingernails tear two long scratches across his cheek.\n\nHe twists and thrusts her away, then lifts a hand to his face. Blood drips to your carpet.\n\n*set luck %+5\n*set scratched true\n*goto house_party\n\n*label cop_power\nClearly PC McMurdo is used to being abruptly assaulted by dodgy women. His forearm snaps up to deflect her attack and he walks her back, throwing her into the wall with a thump. A painting that your mother used to like falls to the ground.\n\nThe banshee yells something in filthy Gaelic.\n\n*set luck %-5\n*goto house_party\n\n*comment *****************************************************************\n*label house_party\n\nA minion stands ready.\n\n*choice \n  *selectable_if (skeletons > 0) #SKELETON ATTACK\n    *label skeleton_attack\n    A skeleton will move faster than a startled cop with a beer belly.\n    *set scommit skeletons\n    *set energy %-30\n    *if (skeletons = 1)\n      You urge your remaining bony maniac to the attack.\n\n      Although it moves fast, PC McMurdo's personal bulk allows him to throw the skeleton off with ease. It falls behind the sofa, clattering in frustration. \n\n      He looks at the banshee, looks at you, then makes an abrupt tactical withdrawal, nipping into the hall. You follow quickly enough to see his black-clad frame disappear through the front door. \n\n      *set luck %-5\n      *goto pursuit \n    *else\n      You send them in as a group.      \n\n      PC McMurdo stares at this new animated apparition. \"It's Jason and the bloody Argonauts,\" he says. He seizes the coffee table and lifts it like a shield to fend off the skeletons' blows. When he gets a moment's slack, he uses it as a battering ram, pounding the skeletons against the wall.\n\n      *if (energy > 42)\n        He keeps it up for a minute or two, but he visibly tires, while your energy remains high. Finally, the skeletons come at him from both sides and wrestle the table off him. He is forced back against the fireplace.\n       \n        *set max_energy %+10\n        *set luck %+5\n        *goto kill_spare\n      *else \n        He keeps it up for a minute or two but finally decides to isolate one skeleton. He batters it to the floor, covers it with the table, and jumps on it. You hear the distinctive CRACK of brittle, old bones failing to support the weight of a plump, smalltown policeman.\n\n        This killing blow leaves him vulnerable. A second skeleton forces him back against the fireplace.\n\n        *set skeletons -1\n        *set minion_count -1\n        *set scommit -1\n        *set luck %-10\n        *set control %-5\n        *goto kill_spare\n  *selectable_if (zombies > 0) #ZOMBIE ATTACK\n    *label zombie_attack\n    A zombie is the right tool for a confined space; nobody likes rotting skin and broken teeth at close quarters.\n    *set zcommit zombies\n    *set energy %-25\n    *if (zombies = 1)\n      You urge your remaining specimen to the attack.\n \n      PC McMurdo circles, trying to keep the advancing zombie between himself and the banshee. He jabs at it, aiming for the breast rather than the face. The zombie lunges. \n\n      *if ((control >= 66) and (luck > 39))\n        You have a moment of perfect flow. PC McMurdo over-extends, the zombie slips inside his guard and seizes him by the shoulders. It chews on his neck. He staggers back, flailing at it, but catches his legs and falls behind an armchair. You see blood spatter the wall.\n\n        *choice \n          #Stop the zombie.\n            You snap the zombie back from its meal and advance on the policeman, composing some kind of gloating speech. But you see it's too late for that. Blood gushes from PC McMurdo's thick neck as he wheezes. His eyes cloud over and he stops struggling.\n\n            The banshee gives you a long stare but says nothing. You head for the kitchen to get black bags. Something tells you the right thing to do is take up the carpet and burn it.\n\n            *set corruption +3\n            *set bodycount +1\n            *set cop_kill true\n            *page_break\n            *goto_scene halloween\n          #Let it finish.\n            The zombie hacks and tears at the struggling policeman. Somewhere in the middle of it, his cap is tossed out. Within a minute, his struggles cease. The zombie staggers away, blood-drenched and satisfied. You sigh and make yet another trip to the kitchen for cleaning supplies.\n\n            The banshee tries on the cop hat. She looks like an anaemic dominatrix.\n\n            *set corruption +5\n            *set bodycount +1\n            *set cop_kill true\n            *page_break\n            *goto_scene halloween\n      *else\n        PC McMurdo shoulders it out of the way.\n        *if (luck \u003c= 35)\n          As it topples into the fireplace, its head snags and the weight of its body
