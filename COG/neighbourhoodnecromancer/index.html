g,\" $!{vampname} says. \"Infiltrating military bases? Pfft. And I'm not into receiving orders through some gristly, old bone either. I've taken out the goons for you—now I'm going to pack the car. Don't expect to see me when you get back.\"\n\n    In a blink, he's gone. Oh well. You emerge into a gloomy, green corridor.\n    *set vampire false\n    *set bodycount +2\n    *goto saved\n\n  *if (animal_help) #Call the animals from the pet cemetery.\n    You turn your back on the camera and send a desperate call for aid using the humerus. Nothing happens for half an hour. Then you hear scrabbling from the corridor outside and eerie, little cries. The lock clicks. You open the door and peer out.\n\n    A squirrel crouches outside, blinking up at you. Its head and breast are covered in blood. For a moment you think it is munching on an acorn, but then you notice that the acorn is kind of squishy and you stop looking so hard. Three dead soldiers lie along the corridor. At the end, an emaciated dog peers at you with glowing green eyes. Something slithers around the shadows behind it.\n\n    As if at a signal, the animals turn away. The squirrel gives you a last stare before edging out the door. \n\n    *set bodycount +3\n    *goto saved\n\n\n*comment #################################################################\n*label baseexit\n\nYou've pushed your luck and have somehow infiltrated a military establishment with no preparation or training. Do you have an escape plan, too?\n\nThat stream which conceals a gap in the wire is a possibility. You could also try to get out through the front gate.\n*if (base_alert)\n  Those sirens, however, probably mean increased security.\nOr you could simply find a quiet spot and cut a hole in the wire. \n\n*choice\n  #Brave the freezing water of the stream.\n    *label stream_out\n    It takes you ten minutes of looking—and five minutes of hiding from a passing patrol—to locate the stream in the dark. An engine roars behind you, drawing close, so you take a breath and plunge in. Aaugh! The cold finds every hidden corner of your body.\n\n    By the time you emerge on the other side of the wire, you are shivering uncontrollably. All you can do is run towards home and a hot shower.\n\n    *set max_energy %-10\n    *set energy %-30\n    *set stagetwo +1\n    *page_break Next Day\n    *goto_scene stagetwo\n\n  #Try to slip through the gate.\n    The gate is buzzing with military personnel. Some are in lines being briefed; others are on the radio. At the booth, three officers consult what looks like a map. The gate is closed. \n\n    You watch for five minutes. A truck driver pulls up and shows ID. The guard shakes his head and points to the gate. The driver turns and heads back to the interior.\n\n    No way are you getting out through the gate right now.\n\n    *choice\n      #Try the stream.\n        *goto stream_out\n      #Head for a quieter spot and cut a hole.\n        *goto wire_out\n\n  #Go for the direct exit and cut yourself a hole. \n    *label wire_out\n    You head towards a dark corner of The Base. There is some tree cover there which will hopefully protect you as you work.\n\n    The wire cutters are still in your pocket and you set to work snipping individual links in the wire until you can bend a section back. Once it's wide enough, you squeeze through.\n\n    *if ((control \u003c 78) or (luck \u003c 66))\n      Your ankle catches on a section of loose wire. As you prise it loose, you hear the boots of an approaching patrol. In your haste, you snag the back of your hand on the wire. It tears a nasty gash from your knuckles to your wrist. Perhaps it looks worse than it is. But it looks pretty bad.\n      *set control %-10\n    *comment endif\n\n    Emerging from the wire, you feel an unusual moment of appreciation for $!{town}. You head home through abandoned but familiar streets.\n\n    *set stagetwo +1\n    *page_break Next Day\n    *goto_scene stagetwo\n\n\n\n\n", "chippy": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, chippy\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\nIt was shortly after you came home with fish suppers that your parents were slaughtered by undead. Therefore, in a way, their deaths are the fault of the fish and chip shop. Plus, the shop prices are steep and their customer service is appalling.\n\nClearly, the appropriate response is a visit from the undead.\n\n*page_break\n\n*comment *****************************************************************\n*label chippy_attack\n*set chippy_attacked true\n\nYou examine the fish and chip shop. It's a shabby, detached shack on a side street with a patch of waste ground around the back where, apparently, they pile up heaps of stinking bin bags. The back door is fastened with a chain and heavy-duty padlock. But one of the upper windows is slightly ajar. \n\nYou feel a little queasy as you return to the front. It's still daylight. What approach will you take?\n\n*choice\n  #Slip an undead inside now and lie in wait.\n    *gosub_scene end_trial\n    You find a wire hanger among the rubbish and twist it into an extended loop. With a little patience, you manage to work it over the window catch and unlock the window. You can probably get one minion through the resulting gap, if you help push them through.\n    *choice\n      *selectable_if (skeletons > 0) #Send in a skeleton.\n        The skeleton scales the wall without much effort, dry toes scraping against the brick. You guide its feet through the gap, still slightly weirded-out by how the bones stay together without muscles, tendons, and ligaments.\n\n        Now you wait, skulking behind a tree. It's half an hour before Al the fat manager shows up. He messes with the padlock then pulls the chain away and opens the door. You wait for a scream.\n\n        It comes immediately. Pretty high-pitched for a man who works with so much grease.\n        *set scommit 1\n        *set luck %+5\n        *set energy %-30\n        *page_break\n        *goto secret_assault\n      *selectable_if (zombies > 0) #Send in a zombie.\n        The zombie stares at the window, inert. Musty breath rasps from its raggedy mouth. You lift it up by the knees and try to cram it through the open window. The top of its head scrapes around on the brick of the walls, leaving a syrupy trail.\n\n        Eventually, you get the torso through the window and shove. There is a crash from the other side and the window swings shut. That was more effort than it should have been. \n\n        You get some distance and rest behind a tree. It's half an hour before Al the fat manager shows up, carrying two boxes. He messes with the padlock then pulls the chain away and opens the door. You wait for a scream.\n\n        There is a pause.\n\n        \"What the hell is this?\" Al yells from inside.\n        *set zcommit 1\n        *set luck %-5\n        *set energy %-20\n        *page_break\n        *goto secret_assault\n  #Confront them as they are setting up for the evening.\n    *gosub_scene end_trial\n    You cool your heels behind a tree.\n    *if (zombies > 0)\n      A zombie keeps straying out of cover and you end up draping branches over its head as a disguise.\n      *set visibility +1\n    *comment endif\n    \n    After half an hour, Al the fat manager shows up, carrying two boxes. He fiddles with the padlock then pulls the chain away and opens the door. A few seconds later, there is a clatter and then a stream of colourful swearing directed at \"Rick\". You presume this is the other guy.\n\n    *choice\n      *selectable_if (skeletons > 0) #Send in a skeleton.\n        The skeleton extends its arms and twists its head a little. It seems to be doing some kind of warm-up. It might be your imagination but you think you hear its knuckles crack. Then it marches towards the unlocked back door and grabs it with bony fingers.\n  \n        *set scommit 1\n        *set energy %-20\n        *goto secret_assault\n\n      *selectable_if (zombies > 0) #Send in a zombie. \n        The zombie stares at you with one yellowed eyeball. The other seems interested in a pile of leaves three metres away. You grip the humerus and concentrate. It's harder than you expected to instruct the zombie to open the door. Still, in the end, it stumbles through.\n\n        *set zcommit 1\n        *set energy %-30\n        *set control %+5\n        *goto secret_assault\n      #Wait until the other guy (presumably Rick) shows up.\n        It gets dark while you wait. You check your watch. When does the shop open? Keeping the undead hidden and quiet is a strain. One car pulls up in front of the shop, then another. Al must already be serving customers. There go your chances at a secret attack.\n\n        Finally, Rick shows up, his moustache glistening in the twilight. He scuttles in the back door.\n\n        *set luck %-5\n        *set energy %-10\n        \n        *choice\n          #Go ahead and attack even though the shop is now open for business.\n            *goto public_assault\n          #Give up on revenge against the fish and chip shop.\n            Hiding behind a tree, staring at the back of a hot food emporium. This won't go down as the most spectacular evening of your life. Maybe there are more important targets for your wrath than two fish and chip shop guys. You might as well quit for tonight and see what tomorrow brings.\n\n            At least you got some practice in controlling your malodorous minions.\n\n            *set control %+10\n            *set humanity +1\n            *page_break Next Day\n            *goto_scene stageone\n  #Confront them while they are serving customers.\n    *gosub_scene end_trial\n    Their humiliation will only be complete if it takes place in public. You wait as the sun goes down, remembering all the discoloured chips, the \"accidental\" short change, the queue jumpers, and those late-night pints of milk that were always past their best-before date.\n\n    Revenge is a dish best served deep-fried.\n    *page_break\n    *goto public_assault\n\n*comment *****************************************************************\n*label secret_assault\n\nYou slip around the side of the building and peer in the window.\n*if (zcommit = 1)\n  Al is squaring up to the zombie behind the counter, his hands knotted into beefy fists. \"Gerraway!\" he shouts. \"I just got the hygiene certificate back for this place!\" He seems about to throw a punch at the zombie's festering face, then thinks twice and shoves it in the chest. The zombie staggers back against the tiled wall.\n\n  Al, for some reason, takes the opportunity to slip his hands into blue latex gloves. \n  *choice\n    #Press the attack.\n      You urge the zombie forward while Al is still fiddling with his gloves. It leans its dead weight on him and bears him to the floor. You hear a wet thump like a dropped blancmange.\n\n      *set luck %+15\n      *set al_down true\n      *set energy %-10\n      *goto rick_arrives\n\n    #Topple the boxes of supplies.\n      It's easy enough to get the zombie to flail around. It scatters cardboard boxes and knocks bottles to the the floor. Raw burgers spill across the tiles and glass shatters, spraying colourful sauce across the units.\n\n      *if (luck > 46)\n        Al rushes the zombie, yelling \"That's my margin, you festering f—!\" and immediately slips on his ruined stock. He grabs the zombie as he goes down. You hear a wet crunch as they land on the glass together.\n \n        *set control %+5\n        *set luck %+10\n        *set energy %-20\n        *set al_down true\n        *goto rick_arrives\n      *else\n        Al rushes the zombie, yelling \"That's my margin, you festering f—!\" and immediately slips on his ruined stock. He grabs the edge of the fryer to stop his fall. Then he grips the zombie's shoulder and pounds it to the floor.\n        *set control %+5\n        *set energy %-20\n        *goto rick_arrives\n    #Contaminate the fryer with zombie fingers.\n      You move the zombie's arm, trying to get it to scrape a strip of flesh off into the cooking oil. Wide-eyed, Al yells and takes a swing at it.\n\n      It's difficult to do fine motor control on a staggering zombie while it's being pummeled by an angry chip shop manager. You channel your command through the bone.\n\n      *if (control > 50)\n        The zombie leans into a sharp edge and a long strip of putrefying flesh tears off. It drops into the fryer and immediately sinks from view. \"Nooooo!\" Al howls. \"I'll have to sterilise that whole pan again!\" He wrestles the zombie to the floor.\n        *set energy %-20\n        *set luck %+15\n        *set al_down true\n        *goto rick_arrives\n      *else\n        The zombie hesitates, confused. Al seizes the moment and kicks it in the stomach with his grubby loafers. It falls back, away from the fryer. He stalks forward, blue latex fists at the ready.\n        *set energy %-20\n        *set luck %-5\n        *goto rick_arrives\n*else \n  Al and the skeleton are engaged in some sort of grotesque dance behind the counter. The skeleton shuffles its feet and gives a twisted version of 'jazz hands'. Al snaps at it with his fryer tongs.\n  *choice\n    #Instruct the skeleton to disarm Al.\n      *if (control > 46)\n        This skeleton has some kind of freaky phantom muscle memory kung fu thing going on. It blocks the tongs with one arm and plucks them from Al with the other. His eyes widen and he staggers back.\n\n        It advances on him, nipping the tongs near his ears like some kind of reanimated Mr. Miyagi. Backed against the wall, Al drops, protecting his face with an arm.\n        *set energy %-15\n        *set luck %+15\n        *set al_down true\n        *goto rick_arrives\n      *else \n        The skeleton moves fast but you can't relay your commands quickly enough to react to what Al is doing. He gets a grip on the skeleton's collarbone, twists, and kicks its legs out from beneath it. It clatters to the ground.\n        *set energy %-20\n        *set luck %-5\n        *goto rick_arrives\n    #Press the skeleton forward, unarmed.\n      The skeleton advances on Al, backing him up against the wall.\n      *if (luck > 42)\n        He slips on something greasy and goes down with a wet thump.\n        *set energy %-10\n        *set luck %+10\n        *set al_down true\n        *goto rick_arrives\n      *else\n        He lunges with the tongs and gets a lucky grip on the edge of the nasal cavity. You think he might plunge the skeleton into the fryer but he turns it in the other direction and drags it into the doorway. He slams the door on its arm bones and you hear a distinct CRACK. Then he does it again. And again.\n\n        The door begins to warp and snap when he starts on the legs. By now the skeleton is unsteady and it collapses. Al jumps on its chest for a bit, then grabs a metal bin and starts to smash it into the ground. He clearly has issues to work out.\n\n        Eventually the other guy, the one with the droopy moustache, comes through the door to find his manager pulverising a small pile of bones with the now concertina-folded bin. \"Everything all right, Al?\" he asks, like this is nothing special.\n\n        You drop down from the window and slink away with your remaining undead. Clearly the fish and chip shop was a harder target than you expected.\n        *set energy %-20\n        *set luck %-15\n        *set skeletons -1\n        *set minion_count -1\n        *page_break\n        *goto chippy_fail\n    #Improvise a weapon.\n      Al's fish tongs are a serious piece of hardware. Through the window, you can't really get a clear look at your skeleton's environment. What will you urge it towards?\n\n      *choice\n        #An item from the fryer.\n          Your skeleton rakes around in the fryer and comes up with a jumbo sausage in batter. Unfortunately, the soggy sausage disintegrates between the bony fingers. You make a mental note to avoid this kind of delicate manoeuvre in future.\n\n          Al takes advantage of the weaponry malfunction to crash his fists down on the skeleton's shoulders. He howls as his puffy flesh strikes bone, but your light-footed minion goes down under the impact, feet skittering on the tiles.\n          *set energy %-20\n          *set control %+5\n          *page_break\n          *goto rick_arrives\n\n        #The floor mop.\n          Your skeleton seizes the blue, plastic mop. Al and the skeleton duel like swashbucklers. He lunges towards a ball joint; it catches him in the ear with the dirty mop head. The skeleton swings; Al parries. The combat ranges back and forth behind the counter while the fryers hiss. \n\n          You feel a terrible weariness. Keeping your eyes up at this window is becoming a strain.\n          *if (energy > 50)\n            But you shake it off and concentrate. With a deft flick, the skeleton sends Al's fish tongs flying. It rams him with the mop head and bears him to the ground.\n            *set energy %-60\n            *set luck %+15\n            *set control %+10\n            *set al_down true\n            *page_break\n            *goto rick_arrives\n          *else\n            You close them for a minute, and you [i]feel,[/i] quite clearly, your control of the skeleton end. You hear a dry clatter. When you force your eyes back open, Al is using his shoe to poke a pile of bones which used to be your skeleton. \"What the hell?\" he says. \n\n            Leaning against the wall of the chip shop, breathing heavily, you look at your remaining minions and feel your connection with them waver. It would be very easy to just lie down and sleep here.\n\n            You force yourself to begin the march towards home and your bed. You try to tell yourself you learned something here; it wasn't a total failure. What are minions if not expendable?\n            *set energy %-75\n            *set luck %-20\n            *set control %+10\n            *set skeletons -1\n            *set minion_count -1\n            *page_break\n            *goto chippy_fail            \n        #The strip light from the ceiling.\n          Al won't get back up if you can hit him with a metre-long metal light. You direct the skeleton to stretch up and grab it. It's a little too high.\n          The skeleton stretches. Al takes the opportunity to plant a boot in its exposed rib cage. The skeleton stumbles and goes down.\n          *set energy %-20\n          *set control %+5\n          *set luck %-5\n          *goto rick_arrives\n\n*comment *****************************************************************\n*label rick_arrives\n\nAbruptly you hear the scrape of the back door. The guy with the droopy moustache has arrived for work. He stares at the unexpected intruder behind the counter.\n\n*if (al_down) and (zcommit > 0)\n  The zombie looms over Al. He waves his hands to keep the dripping ichor off of his face. \"Rick! Get this thing away from me!\" he yells.\n  *goto rick_fight\n*elseif (al_down) and (scommit > 0)\n  The skeleton appears to be treading on Al's face. \"Rick! Gmm thg mway fme!\" he yells.\n  *goto rick_fight\n*else\n  \"Rick! Keep it down while I get something to smash it with!\" he yells.\n  *goto rick_fight\n\n*comment *****************************************************************\n*label rick_fight\n\n*if (luck > 45)\n  Rick stands frozen, staring. His eyes appear to be getting slowly wider.\n  *set advantage true\n*comment endif\n\nThis is the moment for decisive action.\n\n*choice\n  *if ((scommit > 0) and (zombies > 0)) #Send in a zombie to finish the job.\n    *goto double_team\n  *if ((zcommit > 0) and (skeletons > 0)) #Send in a skeleton to finish the job.\n    *label double_team\n    *gosub_scene end_trial\n    *set energy %-50\n    Minion Number Two piles through the door and enters the struggle. You feel sweat break on your brow. Controlling the two different types of undead at the same time is extremely difficult. Also, there is not really enough room behind the counter for a four-way fight.\n\n    For a few moments it looks like a tag-team wrestling match inside. You close your eyes to concentrate and hear desperate yells, clackety bones, and throaty moaning.\n\n    *if (((energy + control) + luck) > 110)\n      Your necromantic squad eventually gets the upper hand and topples both men to the floor.\n      *page_break\n      *goto chippy_victory\n    *else\n      As you tire, Al gets hold of the metal fire extinguisher and crashes it on the zombie's head, bludgeoning it to the floor. You can feel you are about to lose control of the skeleton, so you issue a last command for it to flee. It slips through the back door and sprints for the trees.\n      *set zcommit 1\n      *set scommit 0\n      *page_break\n      *goto chippy_defeat\n\n  #Concentrate hard on controlling your minion.\n    *gosub_scene end_trial\n    *set energy %-40\n    *set control %+5\n    *if (((advantage) and (al_down)) and (scommit > 0))\n      The humerus glows in your hands. You try to inhabit the skeleton's figure, the rhythm of its bones. It responds smoothly, grabbing Rick and knocking his ankles out from under him. \n\n      He plunges to the floor beside Al. You're tiring quickly, but you scent victory.\n      *page_break\n      *goto chippy_victory\n    *elseif (((advantage) and (al_down)) and (zcommit > 0))\n      The humerus glows in your hands. You try to inhabit the zombie's lumbering form, to work within its stiff movements. It seizes Rick and leans down on him with its dead weight.\n\n      His legs fail and he topples to the floor beside Al. You're tiring quickly, but you scent victory.\n      *page_break\n      *goto chippy_victory\n    *elseif (al_down)\n      Rick grapples with your minion, mouth stretched open, howling. Together they bounce off the counter and crash against some pizza boxes. Cans of diet cola and a painting of the Virgin Mary thunder to the ground.\n\n      *if (control > 42)\n        You're tiring quickly, but you hold it together long enough to trip Rick and toss him to the floor beside Al. \n        *page_break\n        *goto chippy_victory\n      *else\n        You're finding it difficult to keep yourself upright as all your energy is directed into the fight. At a vital point, your concentration slips and Rick smashes the undead to the floor.\n        *page_break\n        *goto chippy_defeat\n    *elseif (advantage)\n      While Rick's brain is processing this paranormal situation, you attempt to use him to knock over Al. This may be the wrong way around as Al clearly possesses a lower centre of gravity.\n\n      *if (luck > 38)\n        Your minion gets off a clean throw and directs Rick's head into Al's stomach at some velocity. Al gasps. The subtle control takes a lot out of you, but the two men crash to the floor in a tangle of arms and legs.\n        *page_break\n        *goto chippy_victory\n      *else\n        Rick wakes up as your minion seizes him. He grabs at the counter, disrupting the throw. Al steps in while your minion's guard is down and smashes it to the floor.\n        *page_break\n        *goto chippy_defeat\n    *else \n      Obviously used to dealing with customer complaints, the two men work well together. They block your minion's swipes and force it back. As it crashes to the floor, you feel your energy falter. You lose control.\n      *page_break\n      *goto chippy_defeat\n\n  #Enter the fight personally.\n    *gosub_scene end_trial\n    It's a very strange sensation to move yourself while controlling the actions of an undead minion. You run round to the back door and plunge inside, shouldering Rick as you enter.\n\n    He blinks and shoves you back out through the door. \"Get help, kid!\" he yells. \"There's some kind of drug addicts attacking the shop!\" Your feet catch on one of the bin bags and you topple. Your head smacks against something hard and pain flares behind your eyes.\n\n    *set visibility +2\n\n    As you struggle to your feet, you hear the distinctive sound of\n    *if (zcommit > 0)\n      a zombie being pounded to mush.\n      *page_break\n      *goto chippy_defeat\n    *else\n      brittle old bones being fractured.\n      *page_break\n      *goto chippy_defeat\n\n*comment *****************************************************************\n*label public_assault\n\nYou step into the fish and chip shop. The fluorescent lighting seems harsh and white after the darkness outside. A girl sits on the windowsill checking her phone. A boy in a dirty tracksuit leans against the wall, eyes closed, rubbing his nose.\n\nYou remember coming here, time after time, sent by your father or just because you were hungry. You look at the guys behind the counter. They always sneer. They always skimp on the chips. They know you have nowhere else to go. Theirs is a chip monopoly.\n\nThis time, out in the dark, the undead are waiting. This time, it's going to be different.\n\n*page_break\n\nYou close the door quietly and stand there looking at them. The fat one yells at the one with the moustache. \"That's crap, Rick. She can't have said garlic mushrooms in a roll. Who ever heard of garlic mushrooms in a roll? They'd fall out. She must have said garlic mushrooms and a chip roll.\"\n\n\"Al.\" The moustache sticks a greasy finger in his partner's face. \"She said garlic mushrooms in a roll, and chips. She was maybe pregnant and that. Just do the garlic mushrooms.\"\n\n\"We've only got plain mushrooms.\"\n\nNeither of them asks you what you would like. This is the level of customer service you've come to expect.\n\n*choice\n  *selectable_if (zombies > 0) #Trigger a zombie attack through the rear door.\n    *label zombie_chipper\n    *gosub_scene end_trial\n    *set zcommit zombies\n    Your fingers brush the dry surface of the bone. You close your eyes and make the silent call.\n\n    A slow rain of blows begins on the back door. Rick frowns and turns toward it. \"Is that you, Denzil?\" he says. No answer. He opens it.\n\n    *if (zcommit = 1)\n      *set energy %-20\n      Your zombie lurches through the door. Rick gasps and tries to backpedal. He trips over his own feet and goes down on the floor with a thump.\n\n      Al sees the intruder. Responding intuitively, he grabs a jumbo smoked sausage from the hot cabinet and flings it at the zombie's face. It slaps against the decaying flesh with a sizzle and drops to the floor.\n\n      The girl screams and runs from the chippy. The boy, now clearly drunk, lurches after her. Al squares up to the zombie with a sauce bottle. \n\n      *if (control > 33)\n        You lift the zombie's arm to block it and use the other to grab the lapels of Al's overalls. The zombie drags him down on top of Rick.\n        *goto chippy_victory\n      *else\n        From the floor, Rick locks arms around the decaying ankles. The zombie's movements are restricted enough for Al to get a lock with his sauce bottle. He smashes it over the zombie's head. Fragments of glass lodge in its flesh and a pile of red sludge begins to drip down its face. Together, the chip shop guys wrestle the zombie to the floor and begin to pulverise it.\n\n        Perhaps this would be a prudent time to leave.\n        *set luck %-5\n        *set zombies -1\n        *set minion_count -1\n        *page_break\n        *goto chippy_fail\n    *else\n      *set energy %-30\n      Zombies pile through the door. Rick staggers and falls back under the onslaught. The girl screams and runs from the chippy. The boy, now clearly drunk, lurches after her.\n\n      Al stares at the invaders, his eyes wide.\n      *if (zcommit > 2)\n        He is quickly overcome by the sheer weight of zombies and dragged to the floor.\n        *goto chippy_victory\n      *elseif (luck > 33)\n        He reaches for a sauce bottle but dead hands tear it from his grasp. Their green-tinged flesh makes a nice contrast with the red bottle. The zombies tear at his overalls and pull him to the floor.\n        *goto chippy_victory\n      *else\n\n        Unfortunately, years of serving drunk customers have prepared the staff for a zombie assault. They work together intuitively, Rick immobilising zombies from the ground while Al goes for the head with bottles, tongs and, eventually, a painting of the Virgin Mary. You have no option but to call a retreat and flee from the shop yourself. One zombie doesn't make it.\n\n        On the way home, you find yourself wondering if Al will deep-fry the parts of the fallen zombie. It is not an appetising thought.\n  \n        *set luck %-5\n        *set zombies -1\n        *set minion_count -1\n        *page_break\n        *goto chippy_fail\n  *selectable_if (skeletons > 0) #Launch a skeleton assault through the front windows.\n    *label skeleton_chipper\n    *gosub_scene end_trial\n    *set scommit skeletons\n    *if (scommit = 1)\n      *set energy %-30\n      You close your eyes and reach mentally behind you for your single-handed skeleton horde. There is a two-second pause, then a familiar $!{town} weekend sound—the tinkle of a window smashing under a head butt.\n\n      The bony troublemaker vaults through. The girl screams. The boy screams. It ruffles their hair with splayed fingers and tries to push their heads together in a clunky kiss.\n\n      The girl punches it in the face. \"Ow!\" she shouts, and shakes bruised knuckles. The skeleton staggers back against the window. Both customers leg it.\n\n      You turn to the counter. To your horror, you see Rick is on the phone. \"Yeah, police!\" he says. \"It's the chip shop! Those skater kids are back and they're on drugs this time!\" Al stops staring at the skeleton and stares at Rick instead.\n\n      You're not ready to take on police yet. You bolt. The skeleton sprints after you. Skeletons need a tighter leash than zombies. Better to find that out now.\n\n      *set control %+5\n      *set luck %+5\n      *set visibility +2\n      *goto chippy_fail\n    *else\n      *set energy %-40\n      The windows behind you shatter and a small wave of bony troublemakers clatters through. The shopkeepers freeze. Frozen mushrooms rain to the floor.\n\n      *if (luck \u003c 41)\n        Something touches your neck. You lift a hand and find blood on your fingers. A stray spike of glass has scored a line into your flesh. You shiver.\n        *set max_energy %-5\n        *set energy %-20\n      *comment endif\n\n      The customers scatter for the door. The boy's scream is higher pitched than the girl's. You throw the skeletons forward and instruct them to leap over the counter. They pass you on either side, with a skittering sprint.\n\n      *if (energy > 25)\n        *if (control > 47)\n          The skeletons vault the counter with impressive agility and plunge both white-coated staff directly to the floor.\n          *set luck %+10\n          *page_break\n          *goto chippy_victory\n        *else\n          The skeletons tumble over the counter in a clutter of flying limbs. Still, the effect is the same. The white-coated staff are knocked off their feet and go down under a tangle of bones.\n          *set control %+5\n          *set luck %+5\n          *page_break\n          *goto chippy_victory\n      *else\n        The skeletons seem to lose momentum at the last moment. Instead of leaping, they thump against the counter. Al and Rick, immobile, stare at them as they try to claw their way over. \n\n        You try to urge them forward but suddenly lurch against the wall. You feel dizzy, your legs weak. Your link with the skeletons falters. You're going to pass out, right here on the floor of the chip shop.\n\n        Somehow you find the strength to stagger outside. The cold air awakens you a little. You've got to try for home while you still can. With your last reserves, you recall the skeletons. They lurch after you.\n\n        *set luck %-10\n        *set control %+5\n        *page_break\n        *goto chippy_fail\n\n  #Do something threatening with a sauce bottle.\n    *gosub_scene end_trial\n    You wrap your fingers around the bottle of sauce and unscrew the top. \"Hey,\" you say, just loud enough to attract the attention of the guys behind the counter. \"Your service sucks.\" Then you swing the bottle, the open end pointing in their direction.\n\n    *set visibility +2\n    *if (energy > 40)\n      Tomato sauce flies from the bottle, painting a sticky red line across the counter, the wall, and in between, Al and Rick. Strained tomato fills Rick's eye socket and smears through Al's hair. You feel a greasy satisfaction.\n      *set luck %+15\n      *label post_sauce\n      *choice\n        *selectable_if (skeletons > 0) #SKELETON ATTACK\n          *goto skeleton_chipper\n        *selectable_if (zombies > 0) #ZOMBIE ATTACK\n          *goto zombie_chipper\n        *selectable_if ((zombies > 0) and (skeletons > 0)) #COMBO ATTACK\n          *goto combo_chipper\n        *if (mayonnaise = false) #Follow up with the mayonnaise sachets.\n          The mayonnaise is a much trickier sauce to attack with because it comes in little individual packets which need to be opened by hand. You do a couple but it's fiddly, and you can't get any real coverage with such small quantities of creamy goop. \n\n          You feel a sudden sense of movement nearby—\n\n          *if (control > 46)\n            You duck to one side. A mop head, thick with dirty grease, thrusts through the space where your face was. Al has taken advantage of your distraction to counterattack. He pulls the mop back to strike again.\n\n            *set luck %+5\n            *set mayonnaise true\n            *goto post_sauce\n          *else\n            SPLUT. You get a mop head in the face. It grinds greasy floor muck into your eyes and nose. You pull away and wipe your stinging eyes. Al pulls it back for another strike. \n            *set luck %-5\n            *set max_energy %-5\n            *set energy %-5\n            *set mayonnaise true\n            *goto post_sauce\n        #Laugh and run for it.\n          It's hardly the work of a ${master} of darkness. But you give a maniacal laugh as you flee through the night. Satisfying.\n\n          Fish suppers are probably off the menu for a couple of months at least. You had better go to the supermarket.\n          *set luck %+10\n          *set humanity +2\n          *page_break Next Day\n          *goto_scene stageone\n    *else \n      Unfortunately the sauce is so thick that it doesn't leave the bottle. You try another couple of waves. Nothing happens. Everybody stares at you.\n      *set energy %-10\n      *set luck %-5\n      *goto post_sauce\n  #Wait and see what they do.\n    Al eventually sees you. \"Oh! Sorry. What can I get for you?\"\n\n    His friendly tone is confusing. Now you think about it, you're not quite so sure that the guys behind the counter are all that bad. Maybe it's just the clientele who pick on you. What should you do?\n\n    *choice\n      *selectable_if (skeletons > 0) #SKELETON ATTACK\n        *goto skeleton_chipper\n      *selectable_if (zombies > 0) #ZOMBIE ATTACK\n        *goto zombie_chipper\n      *selectable_if ((zombies > 0) and (skeletons > 0)) #COMBO ATTACK\n        *goto combo_chipper\n      #Buy a bag of chips and go home.\n        You have enough money in your pocket for a bag of chips. You pay up and receive a warm bag wrapped in brown paper. It is a cold night, after all, and there is something comforting about a hot packet of salty fried potato.\n\n        As you walk, you slip an occasional chip from the bag. Your undead\n        *if (minion_count = 1)\n          minion slinks\n        *comment endif\n        *if (minion_count > 1)\n          minions slink\n        *comment endif\n        after you through the dark. You'll just have to find another place to conduct your terrifying campaign of revenge. You can think about it tomorrow.\n        *set humanity +2\n        *set luck %+10\n        *set max_energy %+5\n        *page_break Next Day\n        *goto_scene stageone\n\n*comment *****************************************************************\n*label combo_chipper\n\n*set zcommit zombies\n*set scommit skeletons\n*set energy %-50\n\nIt's like a horror film shot by a really good action movie director. Skeleton legs spring through the front window; zombie arms thrust through the back door. There are flying fragments of glass, flying pizza boxes, flying frozen mushrooms. Everything seems in slow-motion, and you feel a dark thrill at the power you've deployed.\n\n*if (luck \u003c 35)\n  Unfortunately the boy lurches against you as he flees and cracks your head against the wall. Ow!\n  *set energy %-25\n*comment endif\n\nYou blink, and both of the chip shop guys are on the floor. That was easy.\n\n*set luck %+10\n*set control %+5\n*page_break\n*goto chippy_victory\n\n*comment *****************************************************************\n*label chippy_defeat\n\nYou feel the link with your minion drop. It's like a light going out; a sickly, greenish light inside your brain. You're startled by a sudden, overwhelming feeling of sadness.\n\nAny moment now, Al and Rick are going to come outside and start looking around. You slink off into the night, exhausted.\n\n*set control %+5\n*set max_energy %+5\n\n*if (zcommit > 0)\n  *set zombies -1\n  *set minion_count -1\n  *page_break\n  *goto chippy_fail\n*else\n  *set skeletons -1\n  *set minion_count -1\n  *page_break\n  *goto chippy_fail\n\n*comment *****************************************************************\n*label chippy_fail\n\n*if (zombies = 0) and (skeletons = 0)\n  You have no minions left. Your career as a necromancer has ended early, in a fish and chip shop. Besides the risk of being arrested or killed, you can never show your face around town again because of the embarrassment.\n\n  *page_break\n  *goto_scene exile\n*comment endif\n\n*if (energy > 32)\n  *set max_energy %+5\n*comment endif\n\n*if (minion_count = 1)\n  Back home, you collapse onto the sofa and watch bad television. Your solitary minion slumps to the floor and leans against the cushions at an awkward angle. This companionship is a little comforting, like some macabre variant of a cat in your lap.\n\n  Your mission of revenge against the fish and chip shop has ended in failure. It could be that they were simply too well-equipped, but perhaps you need to revise your tactics.\n  *page_break Next Day\n  *goto_scene stageone\n*else \n  Back home, you slump onto the sofa and watch bad television. The remaining undead seem infected by your mood and hang around the lounge like party guests who have outstayed their welcome. Soon enough, you shut off the TV and go to bed.\n\n  Your mission of revenge against the fish and chip shop has ended in failure. It could be that they were simply too well-equipped, but perhaps you need to revise your tactics.\n  *page_break Next Day\n  *goto_scene stageone\n\n*comment *****************************************************************\n*label chippy_victory\n\n*if (energy > 32)\n  *set max_energy %+10\n*comment endif\n\nYou enter behind the counter and stare down at the helpless staff. One side of Rick's hair sticks straight up, gleaming with fryer oil. Al's face is puffy and confused. The shadow of your minion weaves across them.\n\n\"Don't kill us,\" says Rick. \"Please. This was just a temp job for me. I've got things I want to do.\"\n\n\"Why?\" Al says. \"Why? What did we do?\"\n\n*choice\n  #Spare them and leave silently.\n    They're frightened enough. They will be doing some serious re-evaluation of their lives in the next week or so. You turn away and stalk out into the night, a mysterious figure whose motivations remain ${his} own. \n    *if (minion_count = 1)\n      Your minion lingers on for a moment before following you.\n      *set humanity +3\n      *goto chippy_end\n    *else\n      One minion lingers on for a moment before following you.\n      *set humanity +3\n      *goto chippy_end\n  #Lecture them, then spare them.\n    You offer a list of suggestions for improvements to the business. It covers prices, hygiene, queue discipline, cooking times, condiments available, and exactly what they should do with that crap chippy milk. At first they hang on your every word but after five minutes you can see the surreal nature of the situation is distracting them. Time to go.\n    *if (minion_count = 1)\n      Your minion lingers on for a moment before following you.\n      *set humanity +5\n      *set visibility +1\n      *goto chippy_end\n    *else\n      One minion lingers on for a moment before following you.\n      *set humanity +5\n      *set visibility +1\n      *goto chippy_end\n  #Kill them.\n    You turn away and issue the command. Al and Rick cringe together, then \n    *if (zcommit > 0)\n      shriek as zombie teeth tear at their greasy faces. Blood sprays against the fryer and pools on the tiled floor. You head outside and wipe it from your shoes while you wait for the feast to complete.\n      *set bodycount +2\n      *set corruption +4\n      *set chippy_kill true\n      *page_break\n      *goto raise_attempt\n    *else \n      scream as a skeleton lifts the fire extinguisher high above their heads. After five blows, they stop screaming. You head outside and wait for the grisly tenderising to complete.\n      *set bodycount +2\n      *set corruption +4\n      *set chippy_kill true\n      *page_break\n      *goto raise_attempt\n  #Kill them and dump their bodies in the fryer.\n    You turn away and issue the command. Al and Rick cringe together, then \n    *if (zcommit > 0)\n      shriek as zombie teeth tear at their greasy faces. Blood sprays against the fryer and pools on the tiled floor. You head outside and wipe it from your shoes while you wait for the feast to complete. With a little extra effort, you direct the zombie to plunge the chewed remains into the cooking oil. One leg sticks out onto the counter, still wearing a grubby, white training shoe. Al appears to have been wearing a wig. It floats on top of the oil, sizzling.\n      *set bodycount +2\n      *set corruption +6\n      *set fryer true\n      *set chippy_kill true\n      *page_break\n      *goto raise_attempt\n    *else \n      scream as a skeleton lifts the fire extinguisher high above their heads. After five blows, they stop screaming. You head outside and wait for the grisly tenderising to complete. It's not hard to direct the skeleton to plunge their battered bodies into the cooking oil. One leg sticks out on the counter, still wearing a grubby, white training shoe. Al appears to have been wearing a wig. It floats on top of the oil, sizzling.\n      *set bodycount +2\n      *set corruption +6\n      *set fryer true\n      *set chippy_kill true\n      *page_break\n      *goto raise_attempt\n\n*comment *****************************************************************\n*label raise_attempt\n\nLooking at your horde, you realise you may need more of them in time. Could you recruit from the recent dead? Al and Rick are less-than-perfect specimens, but then, you've never seen a zombie win a beauty contest.\n\nOn the other hand, all of this undead control has tired you, and maybe you ought to get some distance from the scene of the crime.\n\n*choice\n  #Try to reanimate Al and Rick through force of will.\n    You confront the corpses in the chip shop and grip the humerus in both hands. Channelling your will as best you can, you pull at their limbs. The key is to move one, then another. The entire body will follow.\n\n    The moment stretches on as you reach through the veil of death.\n\n    *if (fryer)\n      *label hot_oil\n      Nothing. The oil sputters and one leg sinks a little further in. Perhaps you shouldn't have deep-fried the bodies before attempting to recruit them.\n\n      Still, that doesn't negate your achievement here. You have a feeling that somebody is watching as you leave the chip shop, but nobody is visible.\n\n      *set control %-5\n      *set luck %-5\n      *set visibility +2\n      *goto chippy_end\n    *elseif (control \u003c 46)\n      Nothing. You might have felt a little tickle or it might have been your imagination. Perhaps this will work once you have more experience. \n      \n      As you leave the chip shop, you have a feeling that somebody is watching but you can't see anybody.\n      *set control %+10\n      *set luck %-5\n      *set visibility +2\n      *goto chippy_end\n    *else\n      Rick's arm twitches. It knocks against the fryer a couple of times. Then his legs move in a scissor action. Animation seems to return to his broken body and it claws its way upright. You feel control flood into you from the bone.\n\n      His face is none too pretty, with a massive dent in the skull which squeezes that eyeball out towards you. Still, you don't need him to be pretty, just obedient.\n\n      *set luck %+10\n      *set max_energy %+5\n      *set energy %+5\n      *set visibility +2\n      *set zombies +1\n      *set minion_count +1\n      *set corruption +2\n      *if (raised = false)\n        *achieve raise\n      *comment endif\n      *set raised true\n      *goto chippy_end\n\n  #Try to reanimate Al and Rick through empathy. \n    You approach the corpses in the chip shop and grip the humerus in both hands. You try to relate to them as human beings.\n\n    Al was smitten by that orange-skinned woman who liked to skip the queue. Rick clearly had some kind of personal inadequacy or he would never have grown a moustache like that. You reach out to those characteristics through the veil of death.\n\n    *if (fryer)\n      *goto hot_oil\n    *elseif (energy \u003c 39)\n      Nothing. You might have felt a little tickle or it might have been your imagination. Perhaps this would work if you weren't so tired.\n\n      As you leave the chip shop, you have a feeling that somebody is watching but you can't see anybody.\n\n      *set max_energy %+10\n      *set luck %-5\n      *set visibility +2\n      *goto chippy_end\n    *else\n      Rick's body shudders on the floor. The jaw drops open then cracks closed. This motion repeats three times with such violence that he would surely need dental care were he not dead. Then Rick stands up.\n\n      It's an eerie sight. The mustachioed corpse seems at ease despite its shattered nose and the damp organs spilling from its torn side. It waits for instructions.\n\n      *set luck %+10\n      *set control %+5\n      *set visibility +2\n      *set zombies +1\n      *set minion_count\t+1\n      *set corruption +2\n      *if (raised = false)\n        *achieve raise\n      *comment endif\n      *set raised true\n      *goto chippy_end\n\n  #Make a clean getaway.\n    Your undead horde follows as you slip away through the gloom.\n \n    *set luck %+5\n    *goto chippy_end\n\n*comment *****************************************************************\n*label chippy_end\n\nYou head home, new purpose in your stride. $!{town} will have to take you seriously now. It's only later, in front of the TV, that you wonder if you did the right thing at the end. \n\n…Time will tell.\n\n*page_break Next Day\n*goto_scene stageone\n\n\n", "choicescript_description": "Command the undead to take revenge on the suburbs! Oh, everyone at school laughed at you, but no one will laugh when your minions seize control of critical local infrastructure. Perhaps you’ll start by taking over a convenience store.\n\n\"Neighbourhood Necromancer\" is a hilarious interactive horror novel where your choices control the story. The game is entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nWill you rule suburbia openly or skulk in the shadows? Will your necromancing impress the cool kids at school? Will you use your dark powers to destroy your home town, or save it from the secret industrial/military operatives who have come to destroy you? The choice is yours.\n", "choicescript_stats": "A successful necromancer must manage an array of vital character statistics.\n\n*stat_chart\n  percent Control\n  percent Energy\n  percent Luck\n  percent Corruption\n  percent Humanity\n\n*if (reached_climax = true)\n  *goto army\n\n*if (visibility \u003c 5)\n  You are as anonymous as a necromancer could hope to be.\n  *goto army\n*elseif (visibility \u003c 10)\n  Your activities have attracted some attention.\n  *goto army\n*elseif (visibility \u003c 20)\n  You are recognised and distrusted.\n  *goto army\n*elseif (visibility \u003c 30)\n  Most people flee when they see you.\n  *goto army\n*else\n  You might as well have erected a sign on your house saying NECROMANCER BASE HERE.\n  *goto army\n\n*label army\n\n*if (army_state > 0)\n  Your undead army consists of:\n  *stat_chart\n    text Skeletons\n    text Zombies\n  and it has killed ${bodycount} people in total.\n*comment endif\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2024-08-01 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n", "climax": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, climax\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set reached_climax true\n\n*if ((sam >= 2) and (sam \u003c 66))\n  You drag yourself out of bed after a late night spent watching TV round at your next door neighbours' house. Perhaps you will work out how to reconnect your house to the mains one day. But you will probably just move. There are plenty of houses lying empty in your street and no police around to bother about a broken window.\n\n  Breakfast is beginning to look like cereal with milk at room temperature, when you hear a tap-tap-tap at the front door. It could be another attack. You peer round the frame. The shadow on the glass panel is slight and familiar.\n  \n  You shift the door a little to the side, scanning the street before you look at your visitor.\n\n  *page_break\n\n  *if (corruption > 30)\n    Sam claps a hand to ${ahis} mouth as ${ahe} sees the corruption on your face. \"What…what happened to you?\" ${ahe} gasps. \n\n    A minion wanders up behind you. Sam's eyes flick from you to the undead and back.\n\n    \"I dreamed about this,\" ${ahe} says, shaking ${ahis} head. \"But I thought it was only a nightmare.\" $!{ahe} turns and runs down the path. Runs away from you.\n\n    Maybe this is how it was always meant to turn out with Sam. But it doesn't feel good. You had better get on with something constructive.\n\n    *set sam 0\n    *goto fence\n  *else\n    \"Hi,\" says Sam. $!{ahe} studies you for a moment. \"What happened to your door? And your window? And…\" ${ahe} notices the stains on the hall carpet. \"Have you had some kind of crazy meltdown in the last couple of days?\"\n\n    You try to make some remark about other people wearing crazy pharaoh eyeliner at this time in the morning, but you haven't had enough coffee to bring it off.\n\n    \"Whatever, it doesn't matter. Listen, somebody built a fence overnight. All the way around $!{town}. I don't know if it's the people from The Base or the government or what. We're completely cut off from the outside world. I'm…\" ${ahe} bites ${ahis} black lip. \"I'm kind of scared.\"\n\n    *goto fence\n*else\n  You drag yourself out of bed after a late night spent watching TV round at your next door neighbours' house. Perhaps you will work out how to reconnect your house to the mains one day. But you will probably just move. There are plenty of houses lying empty in your street and no police around to bother about a broken window.\n\n  After a limp breakfast of cereal and unrefrigerated milk, you survey the remaining debris in the hall. With a bit of work you could reattach the door. Every day is a little colder.\n\n  Your late couch potato of a father has no tools which are up to the job, so you head out towards the DIY superstore on the outskirts of town. Just as it should come into view, you see something which presents a bigger problem than the broken door.\n\n  *page_break\n\n  A fence stretches across the road, a blank curtain of metal perhaps six metres high. It looks like a more serious version of something you've seen enclosing a music festival site on the TV. It follows the course of a suburban street in both directions, turning at the junction. Given the way it's arranged, you wouldn't be surprised if it circled the entire town.\n\n  Did this appear overnight? That would have taken some serious, coordinated engineering effort.\n\n  You might find something in the DIY superstore you could use to cut through. Of course, it's on the wrong side of the fence.\n\n  *goto fence\n\n*comment *****************************************************************\n*label fence\n\n*choice\n  #Walk the perimeter to assess the fence.\n    You keep your horde close but out of sight as you trace the line of the fence. It snakes through suburbs and industrial estates. At points, it penetrates far inside the town boundary. Once it hits the perimeter of The Base, it runs in parallel with the fence, leaving just enough between the two barriers to drive a truck through. You find only two gates: one to the east and one to the west. They are every bit as heavy duty as the fence itself, with metal guard towers on either side. Other towers rise behind the fence at regular intervals. Some are still under construction.\n\n    It takes you about sixty minutes to walk a complete circuit. Just as you approach the point where you started, you hear shouts from a nearby tower. Two men rush to the parapet and point something black and metallic in your direction. A red laser sight flashes across your vision. You melt behind a house.\n\n    *if ((sam >= 2) and (sam \u003c 66))\n      \"Is this what life has been like for you?\" Sam asks. \"Tangling with the army?\" $!{ahe} shakes ${ahis} head and takes your hand. \"How have you stayed sane?\"\n\n      You remind ${ahim} that you see dead people following you.\n\n      \"Mmm,\" ${ahe} says, and eyes a nearby minion.\n    *set max_energy %+10\n    *set energy %+10\n    *page_break\n    *goto incursion\n\n  *if ((sam > 2) and (sam \u003c 66)) #Spend some private time with Sam.\n    There is one hotel in $!{town}. It is cleverly named \"The $!{town} Hotel\". All the guests and staff have long since cleared out. You nip behind the gleaming wood counter at reception and enjoy issuing room keys to Sam. Sam in turn enjoys coming back with a bogus complaint about every single one. When that gets boring, you go in search of ice cream in the kitchens.\n\n    To your surprise, the hotel has a penthouse room with a hot tub—and the tub is still functional. You settle in and look out over the town. It's difficult to relax when the panoramic view shows you the ugly, metal curtain imprisoning you, and the military activity beyond it. \n\n    \"Don't look out there.\" Sam pulls you close. \"Look at me.\" Those black-rimmed eyes become your world as you sink deeper into the steaming water.\n\n    *set sam +1\n    *if ((sam > 3) and (sam_achieve = false))\n      *achieve sam\n      *set sam_achieve true\n    *comment endif\n    *set luck %+30\n    *page_break\n    *goto incursion\n\n  #Check out what supplies remain inside the barrier.\n    Is the plan to quarantine $!{town} and starve you? You do a quick survey. Neither of the two mini-markets inside the fence have any vegetables or fruit left, only bags of evil-smelling slush. The canned soup, instant noodles, and frozen pies are gone, too. If you're planning a dinner party, you'll have to do something with lentils, mayonnaise, and hoisin sauce. No obvious recipes come to mind.\n\n    You stomp through several rows of back gardens looking for vegetable patches. It looks like baked potatoes for the next few months, with a little cheese if you can raid it from abandoned fridges.\n\n    *if ((sam >= 2) and (sam \u003c 66))\n      \"At the weekend we could build a bonfire,\" Sam says. \"Cook them on a stick. I guarantee they would be raw in the middle but the atmosphere would be great.\"\n    *comment endif\n    \n    You need to come up with some ideas for tackling this wall. Otherwise, things are going to get tough.\n\n    *set control %+5\n    *page_break\n    *goto incursion\n  #Find a weak point and hit it with the undead.\n    It takes nearly three hours before you find a potential breakthrough spot: an uneven join where the fence crosses rough ground. You sneak the horde close through a terrace of back gardens. Then you throw it at the weak point and watch, keeping yourself hidden behind a bin.\n\n    At first, the attack makes nothing but noise, dead arms thundering against metal. Then the relentless pressure forces the fence outwards. It buckles…buckles…and parts. A gap appears.\n\n    Immediately, there is a blaze of light from the other side, shouts, and squeals of tyres. Shots split the air, rattling against the other side of the fence. You pull the horde back. It brings something with it. A soldier…in three pieces.\n    *if ((sam >= 2) and (sam \u003c 66))\n      Sam shivers and turns away.\n    *comment endif\n\n    They'll patch this hole. But you proved something.\n\n    *set bodycount +1\n    *set luck %+10\n    *page_break\n    *goto incursion\n\n\n*comment *****************************************************************\n*label incursion\n\nLurking near the fence later, you hear activity: rustling packs, vehicle doors slamming, men snapping to attention. It's difficult to hear any detail but one report catches your ear. \n\n\"The incursion is set for tomorrow. All units stand ready for insertion at zero five hundred hours.\"\n\n*if ((sam >= 2) and (sam \u003c 66))\n  Sam frowns. \"What do they mean, incursion? There are still people living here. Hundreds of people. Some are bound to get hurt.\" $!{ahe} looks over ${ahis} shoulder, then touches your arm. \"I'm going to go talk to some people. You had better make sure your…friends are ready. For whatever. I'll see you back at your house.\"\n*comment endif\n\nIt's already beginning to get dark. You have to think about this and make a decision. Perhaps the big decision. \n\n*page_break\n\n*if ((max >= 2) and (max \u003c 66))\n  You're sitting on your front wall, staring at $!{town} and trying to decide how you feel about it, when a slim figure approaches.\n\n  It's Max.\n\n  \"Took me a whole hour to track you down,\" ${mhe} says. \"I must be slipping.\" $!{mhe} sits down beside you and draws close to whisper in your ear. \"This is it. You know that, right? My phone's down, the cable's down, even the satellite's being blocked somehow. They'll come in tonight. I just want to know your plan so I can stay out of the crossfire.\" $!{mhe} touches ${mhis} lips with ${mhis} tongue for an instant. \"Or find a good place to watch.\"\n\n  *if ((sam >= 2) and (sam \u003c 66))\n    Right at that moment, Sam appears from the other direction.\n\n    *page_break\n\n    You feel Max stiffen just a little. Sam wrinkles ${ahis} nose at the sight of Max.\n\n    \"I should have known,\" Max drawls. \"You would be a natural for ${his} undead army.\"\n\n    Sam opens ${ahis} mouth and shuts it again. $!{ahe} looks from Max to you and back. $!{ahe} blinks, then checks ${ahis} watch.\n\n    \"Can you come back later?\" Max slips an arm around your shoulder. \"The grown-ups have things to talk about.\"\n\n    Sam rolls ${ahis} eyes. \"$!{name},\" ${ahe} says. \"People are worried. I think we can get something organised before they come in. But we have to move soon.\"\n\n    Max narrows ${mhis} eyes.\n\n    *page_break\n    *goto decision\n  *else\n    *if ((max >= 2) and (max \u003c 66))\n      Max gazes into your eyes for a moment.\n\n      \"Inside,\" ${mhe} says, and points at the house. $!{mhe} takes your hand. $!{mhis} grip is a little too hard.\n\n      *page_break\n\n      *if (corruption \u003c 30)\n        Part of you wants to go with Max. But another part hesitates. You resist, looking into those cool, blue eyes. Max frowns and puts a hand on your shoulder.\n\n        For an instant, ${mhis} flesh seems to melt away and you see inside Max's body. $!{mhis} skull is a cracked mosaic of stone topping a fractured skeleton. Dirty veins snake across and down, leading to the chest cavity, where every organ is beset with tumors and rot. \n\n        You gasp and pull away. Max's frown has deepened. What did you just see? Whatever it was, you don't want intimacy with ${mhim} until that particular vision fades. Which might take a while. \n\n        You make your excuses and pull away. Max narrows ${mhis} eyes and turns away.\n\n        *set max 0\n        *page_break\n        *goto decision\n\n      *else\n        Max pulls you inside the house. $!{mhe} barely seems to notice the wreckage in the hall. Part of you wants to stop this but your hunger is stronger. You just about manage to kick the door back into place before Max presses you to the ground and gets on top of you.\n\n        Heat flushes your face. Max's eyes slide in and out of focus as ${mhe} kisses, scratches, nibbles. Things seem to slow down, your vision smearing as you roll through broken things and strange dark thoughts. Now Max is drawing on you, on your body, daubing red symbols on your chest and neck. You feel the earth beneath you, the dead calling…\n\n        *page_break\n\n        Did you sleep? You feel confused, but filled with an eerie calm. Max sits against the stairwell, looking at you. \n\n        \"Time to get serious,\" ${mhe} says.\n\n        You move the door aside and stare out.\n\n        *set max +1\n        *if ((max > 3) and (max_achieve = false))\n          *achieve max\n          *set max_achieve true\n        *comment endif\n        *set corruption +4\n        *goto decision\n\n    *else\n      You take a long hard look at Max. What do you want?\n      *page_break\n      *goto decision\n*else\n  *if ((sam >= 2) and (sam \u003c 66))\n    You sit on your front wall, picking out details on the houses across the road while also keeping a rein on the undead wandering around behind you. It's second nature now.\n\n    Sam approaches. \"I've asked around. People are scared, for sure, but they're ready to do something. You're not exactly their favourite person…but it wasn't you who put them in prison.\"\n\n    *set humanity +2\n    *set luck %+10\n    *page_break\n    *goto decision\n  *else\n    You stand on your street and look between the houses to where the wall is visible. You're alone here. You've always been alone. It's how a necromancer lives—your only company is death.\n\n    *set corruption +2\n    *goto decision\n\n  \n*comment *****************************************************************\n*label decision\n\n*if ((max >= 2) and (max \u003c 66))\n  \"You've been holding yourself back all this time,\" Max looks at you, cold and steady. \"Pull harder. Bring them all back.\"\n*comment endif\n\n*if ((sam >= 2) and (sam \u003c 66))\n  Sam brushes hair from ${ahis} face. \"There's still a way back,\" ${ahe} says. \"The people here only need somebody to go first. You wouldn't be alone.\"\n*comment endif\n\nYou look back at the house. You remember living here with your parents, doing normal things like homework and messing about in the garden. $!{town} wasn't everything you wanted, for sure. But do you really want to give it up to the people from The Base who started all this? Are you ready to see it wiped off the face of the Earth?\n\nThe sun is going down. Make up your mind.\n\n*choice\n  #Work with the residents to defend the town.\n    Having an army of mind-controlled minions has been great, no mistake. But there has been that feeling at the back of your mind; a sense that you've been walking down a road to desolation, and there's no turning back. Maybe you [i]can[/i] turn back and this is your chance. \n\n    *if ((max >= 2) and (max \u003c 66))\n      Max's face twists into a grimace of contempt. \"I thought you had such potential,\" ${mhe} spits. \"Some necromancer. You'll die as easily as the rest of them. I might even watch.\" \n\n      $!{mhe} stalks off, Italian shoes squeaking.\n      *set max 0\n    *comment endif\n\n    *if ((sam >= 2) and (sam \u003c 66))\n      Sam closes ${ahis} eyes for a moment and breathes. Then ${ahe} hugs you tight. \"I really wasn't sure you would,\" ${ahe} says, smudging eyeliner on your T-shirt. \"Get organised. I'll spread the word.\" $!{ahe} sprints off down the street.\n      *set sam +2\n      *if ((sam > 3) and (sam_achieve = false))\n        *achieve sam\n        *set sam_achieve true\n      *comment endif\n    *comment endif\n\n    *set destiny \"save\"\n    *set humanity +10\n    *page_break\n    *goto raid\n  #Reach deeper into necromancy and annihilate the town.\n    This town did nothing for you before the humerus came into your life. Its people tormented you and laughed at you. Well, lately you've been the one laughing. It's time to take it to the next level. Who cares if nothing is left of $!{town}?\n\n    *if ((sam >= 2) and (sam \u003c 66))\n      Sam looks at you with shining eyes. \"I just can't believe it,\" ${ahe} says. \"I thought you were only…I don't know…working something through. Don't ask me to be around this. I just can't.\"\n\n      $!{ahe} wipes at ${ahis} eyes. The liner leaves black smudges down ${ahis} cheeks. \n      \n      \"I guess this is goodbye.\" $!{ahe} draws ${ahis} raggedy, old leather coat around ${ahis} shoulders. Then ${ahe} turns and leaves.\n\n      *set sam 0\n    *comment endif\n\n    *if ((max >= 2) and (max \u003c 66))\n      Max nods slowly, watching you with a tiny smile and gleaming eyes. \n\n      \"Do your thing,\" ${mhe} says. \"I'll be watching.\"\n\n      *set max +2\n      *if ((max > 3) and (max_achieve = false))\n        *achieve max\n        *set max_achieve true\n      *comment endif\n    *comment endif\n\n    *set destiny \"destroy\"\n    *set corruption +4\n    *page_break\n    *goto raid\n  #Look for a chance to leave town for good.\n    You've had to make some hard decisions in the last few weeks. This is one too many. The wall is just a symbol of the mental prison you've been in. It's time to break out. You'll be watching for the opportunity.\n    *set humanity +5\n    *set corruption +2\n    *set destiny \"leave\"\n    *page_break\n    *goto raid\n\n*comment *****************************************************************\n*label raid\n\nIt seems like a long night but you're too wired to sleep. You find a house with a view of the east gate and a convenient streetlight. Its fridge provides a useful, half-drunk bottle of cola and family-size bar of chocolate. You settle down, horde in place, and watch the gate.\n\nAt five o'clock, its panels pull back, and figures spill through, dressed in grey camo uniforms. Some carry ugly, black rifles. Others are packing equipment you've never seen before: glowing sticks attached to squat, metallic backpacks. The invasion of $!{town} has begun.\n\nYou need to take out as many as you can or the town will be overwhelmed.\n\n*set clock +1\n\n*comment *****************************************************************\n*label raidloop\n\n*if (clock = 4)\n  *goto interlude\n*elseif (clock = 3)\n  In a nearby garden, you see an old couple dragged from their front door. An infantryman hits them behind the knees and cable-ties their hands behind their back. This can't be the regular army, can it?\n  *goto raidloop1\n*elseif (clock = 2)\n  The grey-suited figures move from house to house, kicking in doors with a practised rhythm. You hear shouts of \"Clear!\" \"Clear!\" punctuated by the sound of splintering wood. They're getting closer.\n  *goto raidloop1\n*else\n  The soldiers spread out through the streets. Watching the way they move, you can see that each has a specific route to follow. They will cover every street and you won't be able to slip past. However, they will be in isolated groups…\n  *goto raidloop1\n\n*comment *****************************************************************\n*label raidloop1\n\n*choice\n  *if (suburbs = 0) #Try to ambush a group in the suburbs.\n    Most of the streets here are too wide to approach armed soldiers. But occasionally, they have to cut down an alley between houses. You see a squad advance into a cul-de-sac and station your troops on one side of the only exit route. They crouch behind a fence. Hefting a rock in your hand, you wait. \n\n    As the squad advances, its members scan both flanks. You stand up and heave the rock at a window on the other side.\n\n    *if (minion_count = 1)\n      The window smashes. The entire squad looks round. Your remaining minion stumbles over the fence to fall on them. One goes down but the rest recover quickly and swing to the attack. Your minion is clubbed to ground with rifle butts. You wince as its skull breaks with a definite, distinct CRACK.\n\n      And that leaves you…zero minions. In total.\n\n      As you decide what to do next, you sense movement behind you. Something dark flashes and connects with your skull. Everything goes black.\n\n      *set bodycount +1\n      *page_break\n      *goto_scene fail\n\n    *elseif (luck \u003c 44)\n      The rock bounces off the house wall. Your minions rise to the attack, but they move too slowly. With a series of barks, the squad commander pulls her troops out of the kill zone. \"Form up!\" she yells. \"Prepare attack pattern gamma!\"\n\n      You've lost the element of surprise. Best to pull your undead back and melt into the darkness.\n\n      *set clock +1\n      *set suburbs 1\n      *page_break\n      *goto raidloop\n\n    *elseif (humanity > corruption)\n      The window smashes. The entire squad looks round. You urge your minions over the fence. They descend into the midst of the squad like a waterfall of terror. The men yell. One shot barks—two, bullets pinging off the masonry. But the soldiers crumble under undead savagery, falling one by one under a rain of blows, until their bodies lie stretched in the alley. \n\n      The minions strain, desperate to kill, but you hold them back with a mental command and begin to strip the unconscious squaddies of their weapons. They will have some serious bruising by the time they wake up.\n\n      *set progress +1\n      *set clock +1\n      *set suburbs 1\n      *set humanity +5\n      *page_break\n      *goto raidloop\n\n    *else\n      The window smashes. The entire squad looks round. You urge your minions over the fence. They descend into the midst of the squad like a waterfall of death. The men yell. One shot barks—two, bullets pinging off the masonry. But the soldiers crumble under undead savagery, falling one by one as their armour is torn off and their limbs broken.\n\n      You catch your breath as the horde pulverises the defeated soldiers, stretching them out in the alley in a pool of muck and blood. \n\n      *set progress +1\n      *set clock +1\n      *set suburbs 1\n      *set bodycount +5\n      *set corruption +2\n      *page_break\n      *goto raidloop\n\n  *if (industrial = false) #Trap a squad in an industrial area.\n    On the other side of town, there's a run-down industrial estate you used to explore with Robbie on your bikes, and pretend you were being chased by evil enemies. The morality has become more complex but you still think you can remember where the gaps in the fences are. It could be the perfect location for an ambush.\n\n    You take the horde down there and look for a suitable point of attack. Which will you try?\n\n    *set industrial true\n    *choice\n      #Hit and run at a choke point inside a carpet warehouse.\n        You station undead on top of the bulky rolls of carpet.\n        *if (zombies > 0)\n          One particular zombie keeps toppling off and losing pieces of its face, so you wedge it between two rolls.\n        You instruct them to keep low and quiet. Then you head off to wait outside for the soldiers.\n\n        It only takes about fifteen minutes for a squad to show up but you're still shivering by the time you see the grey uniforms. \"There!\" shouts one, and points. You flee towards the warehouse, heavy boots crashing after you.\n \n        *page_break\n\n        The door bangs behind you as you sprint to the choke point. \"Stop!\" They're closing. You throw yourself between the rolls of carpet, breath hammering in your chest.\n\n        *if (energy > 47)\n          Massive rolls of carpet tip behind you, crashing down on your pursuers, knocking them off their feet. It seems to start a chain reaction. Carpet after carpet shudders and falls, burying the unfortunate squad under several tons of woolly floor covering in a variety of unattractive shades. They're probably alive. But they aren't getting out any time soon.\n          *set progress +1\n          *set clock +1\n          *set max_energy %+5\n          *set energy %-10\n          *page_break\n          *goto raidloop\n        *else\n          Massive rolls of carpet tip behind you, so slowly that your pursuers easily dodge through. You ram through a fire exit, nip around the corner of the building and take one of Robbie's favourite escape routes, a gap between two bent railings. As the squad struggles to follow, you disappear into the woods. You'll rendez-vous with the undead later. Much later, judging by the speed of delivery on that particular trap.\n          *set clock +1\n          *set energy %-10\n          *page_break\n          *goto raidloop\n\n      #An elaborate scheme with heavy machinery inside a sawmill.\n        You search around the darkened building, smelling sawdust and oil. Eventually, you find a giant, evil-looking circular saw. What you need to do is rig this to suddenly spin up and break free of its housing. Or you could set a sort of snare which would catapult people against it.\n\n        *if (control > 50)\n          After a moment, you recognise this as an insane plan that you are not going to be able to implement in any kind of sensible timeframe. Better to save your energy for something fast and practical.\n\n          You ease open the rear door and flee across waste ground.\n\n          *set clock +1\n          *set max_energy %+5\n          *set energy %+5\n          *page_break\n          *goto raidloop\n\n        *else\n          Its casing seems locked in place. You eye the safety notices. Perhaps if you find the office, then search any drawers…\n\n          Boots thump on the road outside. Too late. You suppose it was a bit of a \"Before I kill you, Mr Bond\" plan. You ease open the rear door and flee across waste ground.\n          *set clock +1\n          *set luck %-10\n          *page_break\n          *goto raidloop\n\n      #Terrain advantage at an overgrown ditch.\n        All great generals throughout history knew the importance of terrain. There's a trench here which, even eight years ago, was hidden under thorny creepers. It is situated directly in front of a useful hole in a fence. If you can lure a squad into that area, you might be able to paralyse them.\n\n        *if (skeletons > 0)\n          You position a skeleton on the overlooking roof.\n        *if (zombies > 0)\n          A zombie slides underneath the creepers. You try not to look as the thorns tear off some of its few remaining chunks of skin.\n        You position yourself outside the wire, in easy line of sight.\n\n        Finally, the squad rounds the building. You act startled and disturb a few saplings for good measure. \"There!\" shouts a spotter. \"It's ${him}!\" The squad surge forward.\n\n        *if (luck > 50)\n          Keen to show they are not afraid of a few scratches, they step right on top of the trench and sink to their thighs in a thorny tangle. Their agonised faces give you brief satisfaction even as you issue the attack command.\n\n          *if (humanity >= corruption)\n            They're helpless under your horde's assault. Ankles wedged into the trench, every twisting movement tears at their flesh. Dead feet crash through the thorns without pain; dead fingers tear away their weapons and deliver knockout blows. One by one, the squad slump against the thorns. Even when they wake up, they'll still have to extricate themselves.\n\n            *set clock +1\n            *set progress +1\n            *set humanity +5\n            *page_break\n            *goto raidloop\n\n          *else\n            They're helpless under your horde's assault. Ankles wedged into the trench, every twisting movement tears at their flesh. Dead feet crash through the thorns without pain; dead fingers claw at their faces. In fifteen seconds, the creepers are thick with the soldiers' blood.\n\n            *set clock +1\n            *set progress +1\n            *set corruption +2\n            *set bodycount +5\n            *page_break\n            *goto raidloop\n\n        *else \n          \"Hold it!\" barks the squad leader. \"Check that patch for booby traps!\"\n\n          The lead soldiers pull up short and probe your careful trap with bayonets.\n          *if (zombies > 0)\n            You can only watch as they discover the zombie and turn it into an unappetising, giant kebab.\n            *set zombies -1\n            *set minion_count -1\n            *if (minion_count = 0)\n              So much for holding off an entire army with one brave zombie. You'll have to—but a second squad has come up behind you, weapons drawn. \n\n              \"What do we have here?\" says the commander. \n\n              Somebody slips behind you and a bag goes over your head.\n\n              *page_break\n              *goto_scene fail\n            *else\n              \n              It occurs to you that you might be next. \n\n              *set clock +1\n              *page_break\n              *goto raidloop\n          *else\n          \n            Your trap has failed. Time to try something else.\n            *set clock +1\n            *page_break\n            *goto raidloop\n\n  *if (vampire) #Ask the vampire to help.\n    You find $!{vampname} loading your mother's silver cutlery set into the back of the hearse. He doesn't even look guilty about it. He beckons you close and whispers in your ear. His words are silken and cold.\n\n    \"One of the secrets to eternal life,\" he says, \"is knowing when to quit.\"\n\n    *if (corruption \u003c 24)\n      *label cheerio\n      He gets into the long, black Jaguar and roars off down the road without bothering to turn his headlights on.\n\n      You stare as the car disappears into the moonlight. What a bastard.\n\n      *set vampire false\n      *set clock +1\n      *page_break\n      *goto raidloop\n    *else\n      He looks down his nose at you.\n\n      \"I suppose…you could come with me. I need a driver.\"\n\n      *choice\n        #Give up the town and go with him.\n          You get in the passenger seat. As $!{vampname} roars out of the drive with no lights, you grab at your seatbelt. He takes corners with relaxed grace, swerving only to ram one army group and scatter another behind the post office. The hearse grips the road with surprising ease.\n\n          At the gate, he floors it. Reinforcements dive out of the way and bullets ping against the rear body. \"Don't worry,\" he grins, \"I had ar
