 the house?\"\n\n        You turn to show her into the living room. She's about to have quite a shock—\n\n        Then you feel the needle in your neck.\n\n        For a few seconds you're floating. You're on a stretcher. You're being carried out. It's peaceful, really. Then it all goes away.\n\n        *set early_doom true\n        *set luck %-50\n        *set humanity +20\n        *set visibility +50\n        *page_break\n        *goto_scene fail\n\n      #Forget it.\n        You've seen enough late-night films to know how this works. There's always some sap caught in the middle—an innocent victim who ends up framed to cover up an unspeakable conspiracy. You don't know for sure there's an unspeakable conspiracy here. But there's definitely something shady going on. You put down the phone.\n\n        Of course, you still have to deal with the remains of your parents.\n\n        *set luck %-10\n        *set control %+5\n        *goto parents_choice\n\n  #Bury them in the cellar.\n    Crime stories are full of people who think they can get away with burying bodies in remote places, only to have them dug up by friendly dogs and used in evidence during murder trials. Under the house is safer.\n\n    You spend an unsettling few hours wrapping your parents in bin bags and dragging them down the stairs. The cellar is damp, full of spiderwebs, and you can't stand up straight. But the earth is soft and you dig a big enough hole for both bodies.\n\n    As you reach for the first bag, it begins to wriggle.\n\n    Oh great.\n\n    *choice\n      #Bury it anyway.\n        *label bury_it\n        You put the second bag on top of the first and pile earth on top, packing it down hard. Eventually, the ground stops moving. But you'll never rest quite as easily in this house as you did before.\n        *set corruption +2\n        *set luck %-5\n        *goto cleaned\n      #Try to use the bone to suppress its movement.\n        You bring out the humerus and hold it between your palms. Eerie green light fills the cellar. You try to send some sort of command to cease movement permanently. It's difficult to visualise what you want as you're not entirely sure what is moving inside the bag. But you're sure not opening it up again.\n\n        *if (control > 40)\n          Nothing seems to happen for about fifteen seconds. Then the body parts inside abruptly stiffen, then relax. The bag ceases to move and you can bury it without interference.\n          *set control %+5\n          *set luck %+10\n          *set humanity +1\n          *goto cleaned\n        *else\n          Fifteen seconds pass, then thirty. Two minutes later, the bag is still wriggling and your concentration wavers. You'll just have to bury it, moving or not.\n          *goto bury_it\n      #Hit it with your shovel.\n        You batter the crawling bag with all of your energy. It flails around like a giant black worm. Eventually, something seems to burst inside and the bag lies still. You go on to bury it, but you feel distinctly queasy afterward.\n        *set max_energy %+5\n        *set energy %+5\n        *set corruption +1\n        *goto cleaned\n  #Drive out of town and bury them somewhere remote.\n    You can't technically drive, but you know the theory and you've watched your father savage the steering enough to have the basics. You package up the bodies in bin bags and drag them into the car boot while it's still dark.\n\n    It takes a while to figure out how to turn on the headlights but you eventually locate the switch. You roll the car down the drive and turn it into the street. You're feeling pretty confident until you shift up and the gearbox makes a noise like teeth grinding together.\n\n    You keep to back roads as you learn to handle the car. You know a place: a small copse up in the hills which isn't near any farms. Somehow you get the car there and douse the lights. It takes more than two hours to bury the bodies, but there is something calming about the manual labour in the morning air. You feel a little better knowing your parents will have a proper resting place.\n\n    *set humanity +2\n    *set luck %+10\n    *if (luck > 41)\n      You get the car home before the morning traffic starts.\n      *goto cleaned\n    *else\n      As you clean off your shovel, you hear the growl of an approaching engine. You have just enough time to press yourself behind a nearby tree before headlights sweep across the area, picking out the car among the trees. The driver doesn't slow down. But did they notice you? The thought troubles you as you guide the car home.\n      *set visibility +4\n      *goto cleaned\n  #Allow zombie nature to take its course.\n    It's unthinkable, of course. But so is the idea of dealing with the bodies yourself. And in a way, it's just like dogs cleaning up after a spillage. In the end, you direct the\n    *if (zombies = 1)\n      zombie\n      *goto zombie_cleanup\n    *else\n      zombies\n      *goto zombie_cleanup\n    *label zombie_cleanup\n    up the stairs and back into your parents' bedroom. When the noises begin, you slip away into the kitchen.\n\n    When dawn breaks, you complete the cleanup by throwing out the bedsheets and burning the carpet.\n    *set corruption +3\n    *set luck %+10\n    *goto cleaned\n\n*comment #################################################################\n*label cleaned\n\n*page_break\nThat's it. Your parents' bodies have been safely disposed of. You are going to have to grow up quickly and start a new life. Whatever that might be.\n\nYou stare at the undead for a bit. There are little pieces of zombie soaking into the carpet. The skeletons are fiddling with the mantelpiece. They're like pets. You're going to have to take them outside sometimes to stop them getting cranky. Maybe you should start with a walk around the block.\n\n*choice\n  #Stride down the street with an obvious undead bodyguard.\n    You've been pushed around for years. Now it's time to show $!{town} you're someone to be reckoned with. You hold the humerus like a baton and march out into the morning light. Your undead fall in behind you.\n\n    It's a curious feeling as you walk the suburban street, like that shot in a hundred TV shows where the team walk towards the camera in slow-motion. Professionals, going about their business. That's you and your undead entourage. The sun glints on a house window and you can almost see yourself. You look incredible.\n\n    A kid rides around the corner on a red bike. He looks at your minions, gasps, and falls off the bike.\n\n    *page_break\n    You wait for the kid to scream and flee. Indeed, he does skitter back a few steps, dragging the bike by the handlebars. But then he drops it and reaches into his pocket for his mobile phone. He fiddles with it and you realise he is going to take a photograph.\n\n    *choice\n      #Strike a cinematic pose.\n        You raise your chin and put your hands on your hips. The kid's phone clicks loudly as it takes the shot. Did you blink? He leaps on his bike and pedals away, glancing back over his shoulder.\n\n        It feels good to get that kind of reaction. You grin. Then your smile slips. That photo is likely to end up on the Web, or in the hands of the kid's parents at least. You visualise the police kicking in your door in the small hours, tear gas grenades coming in the windows. Dread builds in your stomach. This was a very unwise thing to do. You should disguise your undead in future.\n        *set visibility +15\n        *set luck %-10\n        *set humanity +1\n        *goto end_day_one\n      #Attack and kill the kid.\n        You're a necromancer, a ${master} of the undead. There's no point in being squeamish. You grip the humerus, concentrate, and send your small horde at the kid. He squeals, throws the phone into the air, and charges off down the street, leaving his bike behind. Fear drives his little legs and your minions quickly fall behind. You recall them.\n\n        As you look at the fallen bike, you think this through. Nobody will believe some kid screaming about monsters. But if he'd got the photo taken, that would have drawn serious attention to you. You don't need the police at your door asking questions about your parents. Maybe you should disguise your undead when you're out and about.\n\n        You give the bike a last look as you leave. In the heat of the moment, you were willing to kill that kid.\n        *set visibility +2\n        *set luck %+15\n        *set control %+5\n        *set corruption +2\n        *goto end_day_one\n      #Steal his phone.\n        The skeletons are the fastest. You urge one forward. It snatches the phone right out of the kid's hand. He shrieks, gathers up his bike, and pedals away, screaming. It's a satisfying moment. Nevertheless, you don't want some kid putting pictures of your undead army up on Facebook. Not until it's big enough to crush all opposition, anyway. Maybe you should disguise them if you're going to walk around by day.\n\n        You check the phone. It now contains a superb action photo of the skeleton, its outstretched hand filling most of the frame, jaw hanging open as it lunges. The kid has potential.\n        *set visibility +2\n        *set luck %+10\n        *set control %+10\n        *set humanity +2\n        *goto end_day_one\n      #Flee before he can get the shot off.\n        It's not really the style of an evil genius. But you can't risk a photo of you and your undead minions going viral on the Internet. And the only way you were going to stop that was to hurt the kid.\n\n        Your sudden movement startles the kid and his arm jerks. You still hear the phone click, taking the shot, but you're pretty sure it will be a blurry mess. Maybe next time you should disguise the more obvious undead.\n\n        At the corner, you look back to see if you're being followed. But the kid is already back on his bike, racing off in the other direction.\n        *set visibility +4\n        *set control %+5\n        *set humanity +2\n        *goto end_day_one    \n  #Go cautiously, with the undead disguised.\n    You go through your parents' wardrobe. There are a few coats and hats which ought to do the job, plus a couple of 'personal' items in a box that you did not need to see.\n\n    You dress up your minions. Getting trousers on them is the hardest thing; you experiment with having them lie down, or laying the legholes open and having them step inside. You tire quickly with the amount of concentration it takes to make them move. You're going to have to be careful not to overdo things.\n\n    When you go outside, however, the effort pays off. Three different people glance at you and carry on without remark. This is $!{town}, after all. Your undead don't look all that different from the guys who drink white cider under the bridge.\n\n    *set control %+10\n    *set luck %+10\n    *set max_energy %+5\n    *set energy %-50\n    *goto end_day_one\n  #Keep them inside until you have a reason to take them out.\n    You were at a party one night when the kids took it in turns to strip off and run around the block naked. In the cold light of day, that was not a good idea; strolling around with an undead retinue for no particular reason is probably worse.\n\n    Soon enough, you'll come up with a plan and then you'll take them out. Until then, you practise with the bone, making ever more subtle skeleton and zombie movements. It gets easier but the concentration tires you out. By bedtime, you're quite exhausted.\n\n    It's easier to sleep now you've spent so many hours with the undead, but their presence is still a little unnerving.\n\n    *set control %+15\n    *set max_energy %+5\n    *set energy %-50\n    *if (visibility > 1)\n      *set visibility -1\n    *page_break\n    *goto main\n\n*comment #################################################################\n*label end_day_one\n\nYou return home, feeling like you learned something. There are mini pizzas in the freezer. Tomorrow, you'll get more ambitious.\n\n*page_break\n\n*comment #################################################################\n*label main\n\n*if (zombies = 0) and (skeletons = 0)\n  Your horde is gone. And you had better be gone, too. A necromancer with no minions is just a weird kid telling horror stories.\n\n  *page_break\n  *goto_scene exile\n*comment endif\n\n*set energy max_energy\n*rand bomb 1 7\n\nIt's a new day.\n\n*if (stageone = 0)\n  *goto loop\n*comment endif\n\n*if ((bomb = 1) and (banshee = false))\n  The weather is overcast and gloomy. Wind whistles around your house and occasional showers rap on the windows.\n  *goto loop\n*elseif ((bomb = 2) and (banshee = false))\n  The sun seems terminally stuck behind a cloud. But the air is fresh and clear.\n  *goto loop\n*elseif ((bomb = 3) and (banshee = false))\n  A packet of junk mail crashes through your letterbox. It contains adverts for two Chinese takeaways in neighbouring towns which have apparently identical menus to the one in $!{town}.\n  *goto loop\n*elseif ((bomb = 4) and (banshee = false))\n  You need to do laundry. The undead peer at you as you load the washing machine. \n  *if (zombies > 0) \n    A zombie watches the drum spin, following the motion with its head. It goes round and round…and round…\n  *goto loop\n\n*elseif ((bomb = 5) and (banshee = false))\n  Somebody wakes you up by ringing your doorbell. By the time you struggle out of bed, they've gone. But they left a note inviting you to change your electricity provider.\n  *goto loop\n*elseif ((bomb = 6) and (banshee = false))\n  Breakfast television features a debate on whether children's development and behaviour is being affected by violent video games.\n  *goto loop\n*elseif (banshee = false)\n  When you come into the living room, a lamp has been knocked over and its bulb smashed. None of your horde admit responsibility.\n  *if (skeletons > 0)\n    A skeleton nearby pointedly stares at the ceiling.\n  *goto loop\n*elseif (bomb = 1)\n  You come down to find the undead shuffling around in glaring sunlight. The banshee has put your curtains in the washing machine. \"They were filthy,\" she hisses.\n  *goto loop\n*elseif (bomb = 2)\n  You're awoken from a peaceful dream about flying by your face thumping the carpet, hard. The banshee towers above you, holding your bedsheets, feet floating above the ground. \"Are you going to waste your whole life in sleep?\" she spits.\n  *goto loop\n*elseif (bomb = 3)\n  You awake with a very strong feeling that somebody has been in your room, watching you while you have been asleep. You can't find any evidence, though.\n  *goto loop\n*elseif (bomb = 4)\n  The banshee is on your landline, talking in a language that sounds like Gaelic. When you enter the room, she glances at you and says something clipped. You would swear you hear eerie laughter from the other end of the line.\n  *goto loop\n*elseif (bomb = 5)\n  The banshee is perched in an armchair, engrossed in a Muriel Spark novel. She doesn't react to your arrival but her hair drifts through the air as if it were underwater.\n  *goto loop\n*elseif (bomb = 6)\n  The banshee is at the window, fixing a chaffinch in the garden with her penetrating stare. It looks around and chirps.\n  *goto loop\n*else\n  There is an empty bottle of malt whisky in the bin. That wasn't there last night.\n  *goto loop\n\n*comment #################################################################\n*label loop\n*set stageone +1\n\n*gosub corruption_check\n\n*comment #################################################################\n*comment interrupts\n\n*comment ### PC McMurdo will eventually find you.\n*if (stageone > 5)\n  *label detected\n  *set localcop true\n  *goto_scene localcop\n\n*comment ### Earlier if you are too visible.\n*if ((stageone > 4) and (visibility > 17))\n  *goto detected\n\n*comment ### Sam turns up after two scenes.\n*if ((stageone = 3) and (visibility > 0))\n  *goto_scene sammeet\n\n*comment end of interrupts\n*comment #################################################################\n\n*if (stageone = 1)\n  Like it or not, you have command of a small force of undead. They live in your house. You can either get all mopey about it or you can do something positive.\n\n  What could be more positive than seeking revenge against the people who treated you badly in the past? You don't have to kill them or anything. Unless you want to…\n*comment endif\n\n*if (stageone = 2)\n  It occurs to you that school is in session. You don't have to go, of course. If the truant officer comes to your door, he is going to get a nasty surprise. But you might decide to go all the same. Who knows what might happen?\n*comment endif\n\n*if (stageone = 5)\n  This can't go on, of course. You've watched enough cop shows to understand that somebody hiding a big enough secret will always get caught. And having a house full of bloodthirsty undead is a fairly large secret. Sooner or later, when you least expect it, the local police will come knocking at your door. You could avoid that moment by making a pre-emptive strike…\n*comment endif\n\nWhat will you do?\n\n*choice\n  *if (graveyard = 0) #Visit the graveyard to recruit more undead.\n    *goto_scene graveyard\n  *if ((graveyard > 0) and (graveyard \u003c 3)) #Return to the graveyard for another try.\n    *goto_scene graveyard\n  *if (chippy = false) #Take undead to the fish and chip shop.\n    *set chippy true\n    *goto_scene chippy\n  *if (hairdresser = false) #Take undead to the hairdressers.\n    *set hairdresser true\n    *goto_scene hairdresser\n  *if ((stageone > 1) and (school = false)) #Go to school.\n    *set school true\n    *goto_scene school\n  *if (stageone > 4) #Challenge the local police.\n    *goto_scene localcop\n\n\n*comment #################################################################\n*label corruption_check\n\n*if ((corruption_count = 1) and (corruption > 23))\n  You peer into the mirror. Your skin is flaking. It's like bad dandruff but it's coming off of…your face. You cover it in moisturiser, using nearly half a tube. The skin gleams, red and angry.\n  *set corruption_count 2\n*if ((corruption_count = 0) and (corruption > 10))\n  Your skin seems really bad this morning. It's red, dry and—is that a rash? Or acne? You'll have to look for some lotion at the chemist.\n  *set corruption_count 1\n*return\n\n", "stagetwo": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, stagetwo\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*comment #################################################################\n*label loop\n\n*comment reset tactical variables\n*set zcommit 0\n*set scommit 0\n*set vcommit 0\n*set mcommit 0\n*set gcommit 0\n*set advantage false\n\n*set energy max_energy\n\n*if (zombies = 0) and (skeletons = 0)\n  Your horde is gone. And you had better be gone, too. A necromancer with no minions is just a weird kid telling horror stories.\n\n  *page_break\n  *goto_scene exile\n*gosub corruption_check\n\n*if (stagetwo = 0)\n  Next morning, you press past a couple of inert zombies to get to the kitchen. Wait, you don't recognise that one. And the other is wearing a green paramedic jacket. A headcount reveals that your zombie numbers have swelled by two. When did that happen? \n\n  You look around at the accommodations. If you're going to attract any more new recruits, you're going to have to find a bigger barracks.\n\n  *set stagetwo 1\n  *set zombies +2\n  *set minion_count +2\n  *page_break\n  *goto loop\n\n*comment ### stagetwo 1 is a choice\n*if (stagetwo = 1)\n  You wake the next day with a feeling of certain doom, like you have swallowed a small piece of a black hole, which will eventually weigh you down so much, you will be dragged straight to the core of the earth and incinerated.\n\n  Either your imagination has become so used to the presence of animated dead that it has had to reach further for ominous novelty, or unknown forces have deployed a strange mind control weapon against you. They probably amount to the same thing.\n\n  It occurs to you that you have never been inside The Base. Yet the humerus came from that soldier. And the soldier came from The Base. Could you get inside without a straight-up fight?\n\n*if (stagetwo = 2)\n  *goto_scene kendall\n\n*comment ### stagetwo 3 is a choice\n*if (stagetwo = 3)\n  The next day, you feel like you are being watched. You move from window to window, peering into the street and into the back garden. There's nothing there.\n\n  The feeling lasts all morning.\n*if (stagetwo = 4)\n  *goto_scene decap\n\n*comment ### stagetwo 5 is the climax unless you're very subtle\n*if ((stagetwo = 5) and (visibility > 15))\n  *goto_scene climax\n\n*comment ### edge case\n*if (((stagetwo = 5) and (pet = true)) and ((base = true) and (banshee = false)))\n  *goto_scene climax\n*if (stagetwo = 5)\n  Under a pile of plaster in the hall, you find an old family photograph. Your father looks away, distracted, while your mother has her goofy camera smile on. You wipe the mess away and put it in a drawer.\n\n  Looking at the undead later, you experience a bizarre urge to get a family photograph taken with them. You are clearly traumatised.\n\n*comment ### stagetwo 6 is definitely the climax\n*if (stagetwo = 6)\n  *goto_scene climax\n\n*comment ### otherwise you get to the choice\n*choice\n  *if (pet = false) #Try to recruit more undead.\n    *set pet true\n    *goto_scene pet\n  *if (base = false) #Infiltrate The Base.\n    *set base true\n    *goto_scene base\n  *if ((banshee = true) and (ask = false)) #Ask advice from the banshee.\n    *set ask true\n    *goto_scene ask\n  *if (rest = false) #Rest at home.\n    Thinking about it, you haven't really slept well for weeks. Being a necromancer turned out to rarely involve comic-book poses and evil scheming. It seems to be more like managing nightmare employees who also live in your house, while having to clean all the time.\n\n    You take snacks and drinks to your bedroom and close the curtains. You read and snooze through the late morning and afternoon. At one point, you hear what sounds like a cabinet falling off the wall downstairs. You ignore it.\n\n    By evening, you feel quite refreshed.  \n\n    *set luck %+5\n    *set max_energy %+5\n    *set control %+5\n    *page_break\n\n    You head downstairs, ready for anything. The house is suspiciously quiet.\n    *if (banshee)\n      The banshee is nowhere to be seen.\n    *comment endif\n    You peer around the dining room door.\n\n    *if (minion_count = 1)\n      Your solitary minion has located a pristine tea set that you can't remember your mother ever using. It has somehow managed to set two places at the table for tea, without breaking a single cup or saucer. It sits, almost upright, waiting for you to sit down and join it.\n\n      The sight is confusing and heartbreaking at the same time.\n\n      *goto tea\n\n    *else\n      Your minions have located a tea set that you can't remember your mother ever using. You suspect it was pristine until a few minutes ago, at which point several cups got battered on the table or crunched against jawbones or something. However, many of them are still intact. \n\n      *if (skeletons > 0)\n        A skeleton sits at the table, bony arms folded neatly in its lap.\n      *comment endif\n      *if (zombies > 0)\n        A zombie holds a cup frozen in the air, staring at it with one mashed eyeball.\n      *comment endif\n      *goto tea      \n\n    *label tea\n    There is no actual tea in the teapot, of course. \n\n    *choice\n      #Go back to bed.\n        You turn around and go back up the stairs. By reading a really boring book, you are able to become drowsy again and you snatch another few hours of solid sleep.\n\n        In the morning, the tea set has disappeared. You write the whole thing off as a particularly vivid dream.\n\n        *set max_energy %+5\n        *goto no_tea\n\n      #Make tea and sit down.\n        It's a bizarre experience, using an actual teapot instead of just throwing a teabag in a mug. Still, you remember to warm the pot first and find a separate jug for milk and a bowl for sugar. There are no scones but you put an assortment of biscuits on a plate. You take the whole apparatus out to the table on a flowery plastic tray. It feels like the tray ought to be silver.\n\n        And then you have an undead tea party with fine china. There is no conversation, exactly, but there is civilised interaction of a sort.\n        *if (zombies > 0)\n          A zombie raises a cup to its face and actually gets a fraction of the tea into its mouth.\n        *comment endif\n        *if (skeletons > 0)\n          A skeleton tips tea into its open mouth with obvious pleasure. The tea drips down its spine and pools on the chair cushion.\n        *comment endif\n\n        There is something familiar and reassuring about the whole thing. And you had pretty much given up on keeping the carpet clean anyway.\n\n        *set luck %+5\n        *achieve teaparty\n        *goto no_tea\n\n      #Rage at your horde for its presumption.\n        A tea party indeed! This is no middle-class social event. This is war! You lash out, dashing the crockery to the floor. A minion scatters out of your way and you settle for dispatching fiery mental blasts through the humerus.\n\n        Your anger makes a deep impression. The undead will behave better in future. You go through to the kitchen and brew a cup of tea. Just for yourself. Just because you can.\n\n        *set control %+5\n        *set luck %-15\n        *goto no_tea\n\n    *label no_tea\n    *set rest true\n    *set stagetwo +1\n    *page_break\n    *goto loop\n\n*comment #################################################################\n*label corruption_check\n\n*if ((corruption_count = 4) and (corruption > 70))\n  It's time to stop kidding yourself. The face in the mirror is no longer a human being. It looks like a skeleton with a withered wrapping of flesh. You're a necromancer, a creature of the dead, forever. You will never be accepted back into human society. \n  *set corruption_count 5\n  *page_break\n  *return\n*if ((corruption_count = 3) and (corruption > 56))\n  You're beginning to dread looking in the mirror. Your eyes seem to have withdrawn, sunk back into the flesh of your face. They have no lustre any more. The skin around them is darkening, hinting at the socket beneath. You stifle a gasp as you realise you can clearly see the shape of your own skull.\n  *set corruption_count 4\n  *page_break\n  *return\n*if ((corruption_count = 2) and (corruption > 39))\n  You catch sight of yourself in the mirror and gasp. The flaking seems to have eased, but…maybe it's the light bulb or something, but…your skin has a definite grey tinge. You prod it. It feels dry and lifeless.\n  *set corruption_count 3\n  *page_break\n  *return\n*if ((corruption_count = 1) and (corruption > 23))\n  You peer into the mirror. Your skin is flaking. It's like bad dandruff, but it's coming off of…your face. You cover it in moisturiser, using nearly half a tube. The skin gleams, red and angry.\n  *set corruption_count 2\n  *page_break\n  *return      \n*if ((corruption_count = 0) and (corruption > 10))\n  Your skin seems really bad this morning. It's red, dry and—is that a rash? Or acne? You'll have to look for some lotion at the chemist.\n  *set corruption_count 1\n*return\n", "startup": "*title Neighbourhood Necromancer\n*author Gavin Inglis\n*scene_list\n\tsetup\n\tstageone\n\tchippy\n\thairdresser\n\tgraveyard\n\tsammeet\n\tschool\n\t$ localcop\n\t$ halloween\n\t$ dayofthedead\n\t$ stagetwo\n\t$ kendall\n\t$ pet\n\t$ base\n\t$ decap\n\t$ ask\n\t$ climax\n\t$ exile\n\n*create corruption 0 \n*comment of 100 -- only ever goes up\n*create humanity 0 \n*c tGet a haircut.\n\tYou got a haircut.\n*achievement driver visible 25 Just the Driver\n\tBecome a chauffeur for a vampire.\n\tYou served as a vampire's chauffeur.\n*achievement deadend visible 100 Live and Let Die\n\tComplete the game with dead people.\n\tYou completed the game with dead people.\n*achievement liveend visible 100 Live and Let Live\n\tComplete the game with live people.\n\tYou completed the game with living people.\n*achievement max visible 50 Max On My Mind\n\tHave a meaningful relationship with Max.\n\tYou had a meaningful relationship with Max.\n*achievement hotchoc visible 10 No Marshmellows\n\tMake hot chocolate.\n\tYou made hot chocolate.\n*achievement tealady visible 10 No Tea\n\tKnock down a tea lady.\n\tYou knocked down a tea lady.\n*achievement raise visible 10 Only Sleeping\n\tRaise the dead.\n\tYou raised the dead.\n*achievement sam visible 50 Seduced by Sam\n\tHave a meaningful relationship with Sam.\n\tYou had a meaningful relationship with Sam.\n*achievement teaparty visible 10 The Good China\n\tHave a tea party.\n\tYou held a tea party.\n*achievement corrupt visible 50 Totally Corrupt\n\tReach 100% Corruption.\n\tYou reached 100% Corruption.\n*achievement human visible 50 Totally Humane\n\tReach 100% Humanity.\n\tYou reached 100% Humanity.\n*achievement weasel visible 10 Weasel Ways\n\tBefriend a zombie weasel.\n\tYou befriended a zombie weasel.\n*achievement banshee visible 50 Winner\n\tBeat the banshee at her own game.\n\tYou beat the banshee at her own game.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCommand the undead to take revenge on the suburbs! Oh, everyone at school laughed at you, but no one will laugh when your minions seize control of critical local infrastructure. Perhaps you’ll start by taking over a convenience store.\n\n\t
