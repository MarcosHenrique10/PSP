mour plating installed by a guy who works out of Monaco.\"\n\n          Four miles out of town, a line of pink begins to tickle the sky. $!{vampname} stops and goes round to the back. \"Drive us somewhere far away,\" he says. Then he pauses. \"By sundown, find a wine warehouse.\"\n\n          You ask the question which has been on your mind. Will he want to turn you into a vampire?\n\n          \"I don't need a partner,\" he chuckles. \"I need a chauffeur.\"\n          \n          This partnership might not last. But you're definitely going to make sure he always has enough to drink.\n          *set bodycount +6\n          *page_break\n          Your necromantic career is over. However, you ought to have plenty of time to practise your driving skills.\n\n          *achieve driver\n          *goto exit\n          \n\n        #Ask him to help.\n          \"Nah,\" he says.\n          *goto cheerio\n\n        #Suggest that the army are too tough for him anyway.\n          A flicker of irritation crosses his brow. \"I've crossed swords with the Red Army, you know,\" he spits. \"Oh…come here.\"\n\n          He marches you down a couple of streets and then pushes you behind a fence. A grey-garbed squad is approaching. \"Watch,\" hisses $!{vampname}.\n\n          The air bursts in front of your face, a tiny chilled detonation that tugs at your skin. Suddenly there is nothing there but a fluttering black shape. It flits over the fence, hovers above the advancing squad…and the vampire drops into their midst, erupting once more into human form. He strikes so fast he seems to have three, four arms, tearing the soldiers from the air and casting them to the ground. With an infernal roar he plunges, drinking deep from one, then another fallen form.\n\n          \"Too tough? Pffft.\" He wipes blood from his dark lips. \"It'll be dawn soon. Good luck making it to lunchtime.\" He climbs into the hearse and roars off down the street. Still, that's five less soldiers to worry about.\n          *set vampire false\n          *set progress +1\n          *set clock +1\n          *set corruption +1\n          *set bodycount +5\n          *page_break\n          *goto raidloop\n\n  *if ((humanity >= corruption) and (talk = false)) #Try to talk to the commander.\n    From a vantage point on a garage roof, you watch the squads search a cul-de-sac. These are grunts—there's no commander in the field you can approach. Maybe you could raise them by radio. Or…\n\n    You find a throwaway mobile phone and an old telephone book in a nearby house. Moving around as fast as you can to avoid easy detection, you ring the local army office.\n\n    \"Operator.\" The voice on the other end is brief and businesslike. When you say you are in $!{town}, he connects you to somebody else. This man has a voice that could break concrete. He doesn't identify himself.\n\n    \"There is no operation in $!{town},\" he says. \"You are misinformed.\"\n\n    You explain you are inside the cordon.\n\n    \"There is no operation in $!{town},\" he says again. But he doesn't hang up on you.\n\n    *choice\n      #Hang up.\n        You cut the connection and toss the phone into a nearby bin. What did you expect, really? To get a general on the line? \n\n        Time to try something else.\n        *set talk true\n        *set clock +1\n        *set luck %-5\n        *page_break\n        *goto raidloop\n\n      #Admit to being the necromancer.\n        You tell this man that you are the one he's looking for. There is a long pause, then a series of clicks on the line. Finally a gruff voice which sounds distant comes on. \n\n        \"Is this $!{name}?\"\n\n        You confirm it.\n\n        \"Listen here. This is not a game. I advise you to relinquish the piece of classified technology you stole. Then lie down in the street with your hands over your head. A squad will take you into custody.\"\n\n        *choice\n          #Do as he says.\n            You think about the advancing soldiers and the rundown state of $!{town}. You touch the humerus, sense your horde, and suddenly feel very, very tired. You toss the glowing bone into the street and lie down on the cold tarmac. Three minutes pass. \n\n            Then you hear running feet in heavy boots. Your hands are pulled behind your back and a bag thrown over your head. Something hisses beneath your nose. You drop into black, icy dreams.\n            *set humanity +5\n            *set talk true\n            *page_break\n            *goto_scene fail\n          #Claim you mean no harm to the civilians inside the cordon.\n            \"Really?\n            *if (chippy_kill)\n              Did you say that to the proprietors of the fish and chip shop?\n            *if (hair_kill)\n              Did you say that to the hairdresser?\n            *if (school_attacked)\n              What about when you attacked the school?\n            *if (cop_kill)\n              Did you mean no harm before you killed the local constable?\n            Excuse me if I find your peaceable intentions difficult to believe.\"\n\n            You persevere, asking him to withdraw his forces and remove the wall. He can surely hear the emotion in your words.\n            \n            \"The best way you can prove that is to surrender.\" But you think you can hear a new note of doubt in his voice.\n\n            Running footsteps echo from around the corner. Time to ditch the phone and split.\n\n            *set progress +1\n            *set clock +1\n            *set humanity +3\n            *set control %+5\n            *set talk true\n            *page_break\n            *goto raidloop\n          #Hang up.\n            You cut the connection and toss the phone into a nearby bin. What did you expect, really? Surrender?\n    \n            Time to try something else.\n            *set clock +1\n            *set talk true\n            *goto raidloop\n\n      #Threaten to call the press.\n        \"You should do that.\" He cuts the call.\n\n        That wasn't what you expected.\n\n        The phone book has the number for a city newspaper. You dial their number. \"Operator.\" The voice is familiar and chilling. You try the police. \"Operator.\"\n\n        A nearby house has a landline. The dial tone sounds strange. The connection seems to happen before you have finished dialling the number.\n\n        \"Operator.\"\n\n        There's no way of contacting the outside world. Whatever happens now is down to you.\n\n        *set humanity +2\n        *set luck %-5\n        *set clock +1\n        *set talk true\n        *goto raidloop\n\n  *if ((corruption >= humanity) and (traps = false)) #Try to maim soldiers to slow their squads down.\n    If watching all those late-night films about Vietnam veterans going crazy in small town America has taught you anything, it's how to improvise booby traps from household materials. You pick up tools, nails, wood offcuts, and a small shovel. Keeping ahead of the invaders, you rig up spiked panels that swing down when doors are opened and little pitfalls that impale an ankle when stepped upon.\n\n    In one old lady's shed, you find an old, rusty scythe. Using a length of clothesline and some leaves for cover, you construct something particularly nasty in an alley aimed at the groin area.\n\n    You retire to a garage roof and keep watch over the trapped area.\n\n    *set traps true\n    *page_break\n\n    *if (control > 57)\n      CRAKK. \"Eughhhhn!\" A voice howls from somewhere to the northwest. The victim will not be moving their foot any time soon.\n\n      SFIKT. \"Auuugh! Auuuugh!\" Somebody panics to the east. Well, they shouldn't have gone into a house without knocking.\n\n      TSCHK! \"Unghhh.\" The soldiers are all wearing body armour. It's likely the scythe only gave them a sore stomach and a very bad scare. You are sure that's what happened.\n\n      You lie on the roof until most of the traps are accounted for. Then you head back towards the town centre.\n\n      *set progress +1\n      *set clock +1\n      *set corruption +4\n      *page_break\n      *goto raidloop\n    *else\n      You press yourself close to the aluminium roof, listening for the distant sounds of swinging panels, snapping boards, and howls of pain. A minion strays out of cover and you urge it back into position.\n\n      Time passes. The wind chills the left side of your face.\n\n      Even now, the invaders are drawing close, their heavy boots waiting to crash down on a spiked cavity, the door traps ready to swing down. The advantage of booby traps is that they slow and demoralise the enemy. It will take patience but your work will pay off.\n\n      You lie there for another half hour, cramming your hands into your mouth to keep them warm. Hmm. Surely at least one of them should have been triggered by now. You worked really hard at making the mechanism just like the ones on TV.\n\n      PLUT! A massive bird dropping paints the roof inches from your face.\n\n      Perhaps it's time to move.\n\n      *set clock +1\n      *set luck %-5\n      *set corruption +1\n      *page_break\n      *goto raidloop\n\n  *if (look = false) #Get a closer look at the specialist equipment which the troops carry.\n    The squads move house to house but there are not enough of them to do an entire terrace at once. You slip into a house which has already been cleared and study the invaders from behind lace curtains.\n\n    There's a hint of [i]Ghostbusters[/i] about the extra gear these soldiers are packing. Each squad has at least one member with the black rods, lined with little glimpses of a glowing red interior. Their backpacks are small units of dark metal, linked to the rod with a heavy, rubberised cable.\n\n    *if (revelation) \n      You've seen technology like this before in pieces around the labs in The Base. It could well be something which is effective against the undead. You may need to disable it.\n    *comment endif\n\n    Feeling apprehensive, you slip off before the search moves into the street behind you.\n    \n    *set control %+15\n    *set luck %+15\n    *set clock +1\n    *set look true\n    *page_break\n    *goto raidloop\n \n  #Probe the fence for a weakness.\n    The squads are moving in towards the town centre, so you can be fairly sure that the fence around the edges is being lightly watched. You slip through the cordon and make a quick survey of the fence. The news isn't good. Any weak points you saw before have been reinforced.\n\n    You're just about to give up when you spot something behind the post office: a delivery lorry, a ten-wheeler whose side features the words SUNFIELD BREAD and a large picture of the sun shining on a wheat field. If you could get that up to speed…\n\n    You break the window as quietly as you can and climb into the driving seat. The keys are, unfortunately, not in the ignition.\n\n    *if (luck \u003c 46)\n      You search the glove compartment, the door pockets, and the pile of sandwich wrappers between the seats. Nothing. If only you had learned to hotwire heavy goods vehicles instead of wasting all that time playing board games with Robbie.\n      *set clock +1\n      *page_break\n      *goto raidloop\n    *else\n      You search the glove compartment, the door pockets, and the pile of sandwich wrappers between the seats. Nothing. You slip your fingers down the side of the driver's seat…and touch something rubbery and metal. A dropped key! Luck is with you for once.\n\n      *page_break\n\n      You start the lorry and pull out of the parking bay. It feels a lot heavier than driving your parents' car but the steering is surprisingly easy. As you get moving, you try to think of a long thoroughfare at right angles to the fence…Maloney Road should do it. \n\n      Guns bark and bullets ping off your cargo space. You put your foot down and hope this bread truck is not carrying any explosives.\n\n      The engine roars and the fence looms up ahead. For one horrible moment, you think you don't have your seatbelt on…then the truck's front smashes into the fence. An entire section goes down. Two detonations sound from beneath you and the cab drops. Your front tyres have gone.\n\n      *if (destiny = \"leave\")\n        This is your chance. You wanted to escape. In minutes this place will be swarming with soldiers. They'll block the gap. Minions will only slow you down. Do you really want to leave $!{town}—and your horde—for good?\n\n        *choice\n          #Yes.\n            You take a last look back through the massive hole in the fence at the town where you grew up. Already you think you can hear approaching feet.\n\n            The humerus still nestles safely inside your jacket. But your horde is too clumsy and too visible. It will be hard enough to slip away by yourself. You issue an attack command in the direction of the approaching soldiers. Undead eyesockets turn away from you for the last time. Was there a moment's hesitation? Surely not. This is not the time to get sentimental. You sprint away from the fence.\n\n            *set control %+20\n            *set humanity +5\n            *page_break\n            *goto_scene exile\n          #No. Stay and work with the residents to defend the town.\n            Your childhood was peppered with badly-animated cartoons where crude characters made the decision to stick around and help their friends. Not even a season living with the undead can eliminate that kind of programming.\n\n            *if ((max >= 2) and (max \u003c 66))\n              Max seems unlikely to go for this. You don't see a lot of future there.\n              *set max 0\n            *comment endif\n            *set destiny \"save\"\n            *set humanity +2\n            *goto truck_return\n          #No. Stay and be the one to annihilate the town.\n            A military clampdown? All these people who made your life hell will probably end up in secret detention cells, probed and interrogated. Who knows if they will ever be released? And yet…it's not satisfying. You, personally, need to be the one to make them pay.\n\n            *if ((sam >= 2) and (sam \u003c 66))\n              You have a feeling that this decision spells the end for you and Sam.\n              *set sam 0\n            *comment endif\n            *set destiny \"destroy\"\n            *set corruption +5\n            *goto truck_return\n\n      *else\n        *label truck_return\n\n        That massive hole in their beloved fence ought to distract the intruders for a bit anyway. Although, you don't expect it will still be there when you get back.\n\n        As you head back inside the fence, you experience a strange craving for a sandwich. \n          \n        *set clock +1\n        *set progress +1\n        *page_break\n        *goto raidloop\n\n \n*comment *****************************************************************\n*label interlude\n\nYou fall back to the town centre to regroup. In fact, you find yourself in the very square where you saw the soldier come back from the dead. Have you neutralised enough of the invading squads? \n\n*if (progress \u003c 2) \n  The clunk of automatic weapons from all around brings your answer. They have you covered from every exit. And the guns are all trained directly on you. You grip the humerus and assess your options. This could be the end.\n\n  *choice\n    #Use the horde to punch an exit down one street.\n      You form a flying wedge and charge the squad whose members look most tired. Their eyes widen as the dead—and a wild-eyed teenager waving a glowing bone—bear down on them.\n\n      *if ((control > 68) and (minion_count > 4))\n        This stuff is second nature to you by now. Your minions overpower the soldiers, creating a gap you can leap through. Still, the squad digs in, wrestling your undead cronies. You dart around a corner and look back.\n\n        *set luck %+10\n        *set energy %-10\n        *page_break\n        *goto interlude2\n      *else\n        The squad react smoothly, two shooters dropping to one knee. They level the strange backpack weapons and fire. The ends glow blood red, there is a strange flash, and your horde drops to the ground in front of you in raggedy pieces.\n\n        Now it's just you, unarmed, charging an infantry unit. It's almost a relief when you get clubbed in the face and go down.\n\n        *set control %-10\n        *page_break\n        *goto_scene fail\n\n    #Run, hoping they won't shoot an unarmed person.\n      You react instantly, running towards the nearest wall, beyond which lies a terrace of gardens. If you can make it over without getting shot, you can escape, find a new approach…\n\n      *if (energy > 50)\n        One thing about having to run a household and command an undead army: you've never been so fit. You cover the distance in bare seconds. Guns swing to follow you but you soar over the wall.\n\n        What will happen to your horde? You glance back.\n\n        *set energy %-15\n        *page_break\n        *goto interlude2\n      *else\n        A burly sergeant steps in front of you and shoulders you to the ground. He plants a heavy foot on your chest. Something slips over your head and everything goes black.\n\n        *set max_energy %-10\n        *set energy %-20\n        *page_break\n        *goto_scene fail\n\n    #Try to create chaos.\n      You pull your horde from its hiding place and throw it into the square with all the speed it can muster. If you can come at two different groups from a spot directly between them, they won't dare shoot. From there, maybe you can slip away and choose more advantageous terrain.\n\n      *if (minion_count > 7)\n        There are so many swirling corpses—and your clothes are, frankly, quite dirty by this point—that you are able to sneak to the edge of the square and leap over a wall into the beer garden behind the pub. You peer back into the square, considering your next move.\n\n        *set control %+5\n        *set luck %+5\n        *page_break\n        *goto interlude2\n      *else\n        You don't really have enough minions to make it work. A commander brings forward two infantry with the strange backpack weapons. At a barked order, they level and fire. The tips glow blood red and there is a brief flash.\n\n        Every one of your minions collapses, lifeless. You grab the humerus and urge them to get back to their feet. Nothing. The soldiers round on you.\n\n        \"Take ${him},\" spits a commander.\n\n        Something smashes the back of your knees. You drop to the ground and feel a rough sack thrown over your head.\n\n        *set luck %-20\n        *page_break\n        *goto_scene fail\n    #Give up.\n      You drop the bone and raise your hands. Two soldiers approach, weapons trained on you. You should be scared…but all you feel is a heaviness in your stomach, a dread at separation. The undead have been constant companions, and now…\n\n      One of the soldiers clubs you to the ground. As you try to stand back up, a bag slips over your head and everything goes dark.\n\n      *set control %+5\n      *page_break\n      *goto_scene fail\n\n*else\n  While a few squads are still mobile, there are definite holes in their lines. You think you can take them if you just get the tactics right. You back towards a wall, trying to keep all the soldiers in view at once.\n  *set control %+5\n  *set luck %+5\n  *set max_energy %+5\n  *set energy %+5\n  *page_break\n  *goto interlude2\n\n*comment *****************************************************************\n*label interlude2\n\nOn a barked command, a member of each squad steps forward and levels the strange black rods you've seen them carry. Thin, red stripes illuminate along the side. You hear a rising whine, like a old camera bulb charging…the ends glow a fierce blood red…then they fire, an off-kilter sequence of detonations which paint the square with crimson. \n\nAnd your horde drops. \n*if (skeletons > 0)\n  Skeletal bones detach and rain to the ground in a brittle pile.\n*if (zombies > 0)\n  You see a zombie face slacken and droop. Its body hits the ground like a sack of old meat.\n*comment endif\n\nAt exactly the same moment, you feel a stabbing sense of loss, projected through the humerus. Another family gone.\n\nInstinct kicks in and you scramble away. Grey-clad figures flood towards you. You plunge through the gardens, branches ripping at your clothes, wet earth sucking at your shoes.\n\n*set skeletons 0\n*set zombies 0\n*set minion_count 0\n*set progress 0\n*set clock 0\n*set army_state 0\n\n*page_break\n\nFor the first time since your parents died, you feel helpless. You were the menace here, the power. Now you're alone. Hunted. It barely matters what you decided to do. \n\nThundering engines turn your head. You're nearer the fence than you thought. Suddenly, the gate splits open and three vehicles roar through. Their bodies are grey and heavily armoured, with a blunt snout and a roll cage. Atop each, an infantryman stands behind a swivel-mounted machine gun.\n\n*if (destiny = \"leave\")\n  Well, that settles it. You need to get out of here now. But how?\n\n  *choice\n    #Sprint through the gate before it closes.\n      You try not to think too much as you bolt into the open, in full view of armoured military vehicles. You'll have to hope they are watching the road ahead.\n\n      The gates are already closing. You put your head down and sprint. The gap is wide enough for a bus…wide enough for a car…wide enough for a motorcycle…you throw yourself through it.\n\n      *page_break\n\n      *if (energy > 57)\n        The very edge of the gate scrapes your shoulder and tears a strip off your jacket. But you're through, and you get a good twenty metres farther before the shouts begin. They've just sent their only vehicles inside the fence, and you have the local knowledge they lack. You slip from house to house, working farther and farther out. \n\n        A helicopter passes overhead. When it's on the other side of town, you slip into the countryside, using trees for cover.\n        \n        *set luck %+20\n        *page_break\n        *goto_scene exile\n      *else\n        Rough hands seize you and your head spins as you are tossed to the floor in some kind of judo move. Breath rushes out of you. A large infantryman kneels on your stomach.\n\n        \"Thought we'd never find you in there,\" he says. \"Nice of you to come out and save us the trouble.\"\n\n        *set luck %-20\n        *page_break\n        *goto_scene fail\n\n    #Ram the gates with your family car.\n      For a moment, you fantasise about commandeering one of the armoured transports you've just seen. However, it seems unlikely that you—unarmed with no minions—could overpower the three armed soldiers inside whilst taking fire from the other transport.\n\n      You snake through the streets until you get near your house. To a quick glance, it looks much as you left it but there is a shadow in the upstairs window which didn't used to be there. They are lying in wait for you. Fortunately, the car is parked around the corner. You get in and fire it up.\n\n      Maloney Road gives you the longest stretch of acceleration. You shift gears and blast towards the crack in the gate. It feels strangely appropriate: you, the last of the family, about to break free from the dead forever. Or join them.\n\n      The vehicle crashes against the metal of the gate, tearing it open.\n\n      *page_break\n\n      *if (luck > 63)\n        Your chest slams against the seatbelt. Metal shrieks and one wing mirror fires straight up in the air. Yet the car somehow keeps going. You hear shouts around you, a scuffle of feet. But it seems all their vehicles are now inside the cordon. You floor it and head for country roads. You need to avoid the cameras.\n\n        One and a half miles later, the engine splutters and dies. You're out of fuel. Perhaps it's for the best. That registration number must be on more than one wanted list. And the mangled car is bound to attract attention.\n\n        *set luck %+20\n        *page_break\n        *goto_scene exile\n      *else\n        The car jams between the gates and the engine dies. You turn the key in the ignition. It splutters and coughs. You pump it again. It catches! You shift into gear and floor it. Wheels spin. The car judders against the gates and sprays mud behind you, but it doesn't move. You try reverse. Metal wails. The gate is wedged against a wing mirror. You shift into forward again.\n\n        A cold barrel touches your ear. The man's face looks like stone. \"Turn off the engine,\" he says. Before you can comply, he cracks you with a rifle butt and drags you out of the car.\n\n        *set luck %-20\n        *page_break\n        *goto_scene fail\n\n    #Search for another way through.\n      You thread your way around the perimeter of the wall, ducking into the shadows every time an engine sounds nearby. It looks bad. Every weakness in the wall appears to have been sealed. You're about to give it up when you see an old laundry pole in a rear garden. It's too awkward to climb but you might be able to find a house near enough to the wall to shimmy over from an upstairs window.\n\n      Sure enough, a ten-minute search finds a house close enough. It takes another full ten minutes to manoeuvre the lengthy pole into the house and up the stairs. One of the transports roars past behind the house. Once the street is quiet, you open the window and feed the long piece of wood across to the top of the fence. It is [i]just[/i] long enough.\n\n      *page_break\n      \n      The obvious approach is to walk along the pole like a tightrope. But you only get two steps before it wobbles and you nearly lose your balance. You drop to a hanging position, shifting hand over hand. By the time you reach the middle of the street, the pole has bent under your weight and your arms are burning with pain.\n\n      *if (control > 70)\n        You close your eyes and dismiss the pain for thirty more seconds. Handhold by handhold, you press on to the fence. The short climb over the top is agony and as you drop to the ground, your teeth clash together. But you're out. You set off through the outer suburbs.\n\n        *set luck %+20\n        *page_break\n        *goto_scene exile\n      *else\n        Your fingers weaken and lose their grip. Cold air rushes past your face as you plunge to the street and your head batters the tarmac. Your vision swims and you feel like you might throw up. \n\n        When you eventually get to one knee, you're looking down the barrel of a gun.\n\n        *set luck %-20\n        *page_break\n        *goto_scene fail\n\n*elseif (destiny = \"destroy\")\n  As the vehicles roar into town, you find a dark corner behind some neglected dustbins and settle down to focus. Something with a long tail scurries away into the bushes.\n\n  *label will_to_command\n\n  You still have the will to command. You still have your rage. This town is yours and you will destroy it before you give it up.\n\n  Inside your jacket, you reach for the humerus. With a single finger you trace its length, from the grimy hinge at one end to the scratched hemisphere at the other. In the clear central compartment, the eerie liquid slops back and forth. You hold the instrument to your chest; you close your eyes; you reach deep, deep, into the ground.\n\n  *page_break\n\n  You have no idea how long $!{town} has been here. You imagine the first settlers trudging in, making a new, dusty track. You imagine the tents, the shacks, and the carts. You imagine the pickaxes, the shovels, the felled trees, the bricks. The people came here; they brought their hopes and ambitions; they brought their lovers and they started new families.\n\n  All of those people died. And as the town expanded, their remains became the very foundation it was built upon.\n\n  You reach into the earth and you summon them. All of them.\n\n  The first breaks from a cellar door nearby, his shrunken face still bearing wisps of white beard. The rest stagger in: children in Sunday suits from long-past eras, misshapen brutes with peeling flesh, society maidens stained with grave filth, and line after line of skeletons.\n\n  *if ((max >= 2) and (max \u003c 66))\n    Somewhere in their midst, Max gazes at you and grins.\n\n  *page_break\n\n  *if (humanity > 32)\n    You turn to assess the terrain, to plan your revenge. But this new horde does not wait obediently like your previous one. It keeps coming.\n\n    You stand as the newly-undead converge on you. You lock both hands on the humerus and assert your authority.\n\n    They keep coming.\n\n    It's just a matter of mental fortitude, of exerting your will. But you've had doubts all along, of course. You didn't really want to slaughter your neighbours, to live among abominations. It was visited upon you. Those doubts nag at you, clutter the single-mindedness necessary for undead command. One or two falter, stumble…but the rest march on.\n\n    As you turn to run, it's already too late. Undead fingers tear at your clothes. Undead faces press down. Undead teeth sink into your flesh. And as your body is broken by the wrath of the long-forgotten dead, the humerus slips from your fingers, lying bare inches out of reach.\n\n    *page_break\n    Your necromantic career is over. You were torn to pieces by the undead. What were you expecting?\n    *goto exit\n    \n  *else \n    *goto lastloop\n\n*else \n  As the vehicles roar into town, you hear a soft call. \"Pssst!\" it says.\n\n  You look around, reluctant to call out and draw the soldiers.\n\n  \"Pssst!\" it comes again. Over a nearby wall is the back of the community centre, and its fire exit. From between the doors pokes the face of a frizzy-haired girl. When she sees she has your attention, she waves you over.\n\n  Behind you, an engine draws closer. Thinking about that machine gun, there is no real choice. You swing yourself over the wall and dash for the door.\n\n  What you see inside startles you.\n\n  *page_break\n\n  Eighty or ninety people are crammed inside the sports centre, keeping low and away from the windows. They look like they've been up all night. You see determined little kids, parents with tired faces, pensioners with walking sticks and fire in their eyes. \n  *if (chippy_kill = false)\n    You see Al and Rick from the chippy, still wearing their greasy, white coats.\n  *if (hair_kill = false)\n    You see Geena from the hairdresser, jaw set and with a makeshift bandolier of scissors. \n  *if (cop_kill = false)\n    PC McMurdo sits towards the rear, tie loosened and cap on the floor.\n  *if (robbie_kill = false)\n    Even Robbie is there, looking that way he does when he thinks he is about to lose a board game and he has come up with a plan to save the situation.\n  *comment endif\n\n  You thought that everyone had left town, but here they are, looking back at you.\n\n  *if ((sam >= 2) and (sam \u003c 66))\n    Sam gets to ${ahis} feet and grins.\n  *comment endif\n\n  *if (corruption > 32)\n    \"Look at ${his} face!\" shrieks a girl at the back. \"$!{he}'s not human.\"\n\n    A murmur begins among the survivors. Some draw away, afraid of the deathly mask you've gotten used to seeing in the mirror. Others step closer. You see horror in their eyes.\n\n    Then it ignites, like a spark which leaps from person to person. The hatred. It twists their faces, grits their teeth.\n\n    \"You did this.\"\n\n    \"You're the reason they came.\"\n\n    And finally, the worst: \"It's not a real person. Put it out of its misery.\" Fists come up. One person lifts an iron bar.\n\n    *if ((sam >= 2) and (sam \u003c 66))\n      \"No!\" shouts Sam, wide-eyed. Someone drags ${ahim} away.\n    *comment endif\n\n    *page_break\n\n    The first blow hits you from behind, in the back of the head. You stagger, groping for the humerus, to pull in the horde which has saved you so many times. A teenager punches you in the stomach and someone else swings at your knees. You hit the floor before you remember that your horde is lying in pieces in the town square. All you can do is hold your arms up to your face as the kicks begin.\n\n    It seems like an hour later when you begin to move, tasting blood and coughing up teeth as your feet are dragged along the floor. Your vision swims. They toss you onto tarmac. It seems very, very cold.\n\n    Perhaps the soldiers will come in time. But you hope not. You start to crawl towards the nearest patch of grass. Every inch is agony. But you must reach it.\n\n    You're ready to slip beneath the ground.\n\n    *page_break\n\n    Your necromantic career is over. A new experience awaits, just beyond the veil.\n    *goto exit\n    \n  *else\n    An older woman steps in front of you. She seems familiar. Her eyes are hard.\n\n    \"You scared us all,\" she says. \"!${town} might not be much, but it's [i]ours.[/i] You marched the dead around our streets. The dead. You brought back memories we had dealt with long ago. And now you've done this.\" She points a finger at the fence which looms outside. \"They say you want to put it right again. But first, you owe us an explanation.\"\n\n    Eighty or ninety silent faces stare at you. It's too late for excuses. Your next words had better come from the heart.\n\n    *choice\n      #Explain how you came to possess the humerus.\n        You explain about the fight you witnessed and the strange, glowing bone which has haunted you ever since. You pull it from your jacket to show them.\n\n        \"It's from The Base, isn't it?\" one man says.\n\n        You nod. A rumble of anger runs around the room.\n        *goto forgive\n\n      #Tell the story of how your parents died.\n        You talk about that night, how you were awakened by intruders in your parents' bedroom, and the first appearance of the living dead in your house. Your voice wavers and you realise you've never really let all this out before. People stare at you, aghast.\n        *goto forgive\n\n      #Admit your mistakes and ask them for forgiveness.\n        Your voice quavers as you tell the story of how the humerus came into your possession, then how the undead appeared in your house. You relate the death of your parents, and how the things you did afterwards made sense at the time. You look at your hands and admit you made some bad choices, and ultimately, you caused the trouble that the town now faces.\n\n        The woman touches your shoulder. \"We can't forget,\" she says. \"But perhaps we can move on.\"\n\n        *set humanity +2\n        *goto forgive\n      #Thrust them aside and set about destroying the town.\n        You don't need these people. You push past them and out through the fire exit. \"We knew you couldn't be trusted,\" the woman yells.\n\n        Two blocks away, you find a quiet spot behind some neglected dustbins.\n\n        *goto will_to_command\n\n*comment *****************************************************************\n*label forgive\n\nThe remaining residents are still angry. But they can see you were forced into the situation, at least at first. You have a common enemy out there and they are ready to work with you, for now. $!{town} didn't ask for The Base and its freaky experiments. You're just one more victim. \n\nYou lead the people out into the morning half-light.\n\n*page_break\n*goto lastloop\n  \n\n*comment *****************************************************************\n*label lastloop\n\n*hide_reuse\n*set clock +1\n\n*if (clock = 4)\n  *goto the_end\n*elseif (clock = 3)\n  You hear scattered machine gun fire from barely a block away. In the breaks you hear shouts. Is that an edge of panic in the soldiers' voices?\n\n  *goto lastloop2\n*elseif (clock = 2)\n  An engine roars in a nearby street. The soldiers are closing on you and your forces.\n\n  *goto lastloop2\n*else\n  This is the last stand. You've heard how the government covers up its shady secrets. The story might be a lethal gas leak. It might be a terrorist attack or a nuclear accident.\n\n  Not this time—not if you get your way.\n\n  *goto lastloop2\n\n*comment *****************************************************************\n*label lastloop2\n\nHow will you attack?\n\n*choice\n  *if (destiny = \"destroy\") #Rush a vehicle with the massed undead.\n    One of the armoured transports approaches down the main street. One grim face is hunched over the steering wheel. A second swivels the machine gun. You could never have taken this on with one or two skeletons or zombies. But now you have generations at your command. You feel a savage joy as you grip the humerus and urge the undead forward.\n\n    The vehicle skids to a halt as the massed wall of dead pours into the street, flooding towards the grey invaders. You see the gunner's mouth drop open and he swings his weapon to bear. You throw yourself behind a house as the machine gun opens up, THUMP-THUMP-THUMP-THUMP, tearing holes in long-dead grandmothers and staggering men who are already missing half their faces. It's too little, too late.\n\n    *if (energy > 52)\n      Your decrepit army engulfs the vehicle, swarming up and over each other to tear the soldiers from their seats. Two minutes later, you pull them off, and the vehicle is painted with blood and bone.\n\n      *set progress +1\n      *page_break\n      *goto lastloop\n    *else\n      The driver thinks faster, and hauls the vehicle in a tight turn across somebody's prized flowerbed, crushing five of your minions into the tarmac. The gunfire goes wild, scribbling a line across the brickwork of an unassuming, semi-detached house and shattering all its downstairs windows. The vehicle disappears away around the corner.\n\n      Missed them. But they'll think twice about a second attack.\n      *page_break\n      *goto lastloop\n\n  *if (destiny = \"save\") #Listen to an idea from a veteran.\n    An old guy in a beret steps forward. You recognise him as a regular smoker outside the pub.\n\n    \"These transports are Jackals,\" he says. \"They were designed for Afghanistan. Lots of features to protect the crew against IEDs. Not so many against a fast young man who likes to climb. Easy step, easy handholds. All we need to do is get them to look the other way.\"\n\n    *if (gender = \"girl\")\n      His sexist attitude annoys you. Boys didn't seem more agile than girls in the gym classes you were forced to endure.\n    You've had a good look at these vehicles. You think you can board one of them no problem.\n\n    \"Not you,\" says the old guy. \"You don't send your general out for hand-to-hand with the opposition.\"\n\n    *page_break\n\n    The ambush is set up. One girl volunteers to ride her bicycle and crash it. Beret man will run from the house and pull her away from the vehicle. Three parkour wannabes in soft shoes will approach from the other side and board the vehicle.\n\n    You get the urge to bite your nails as the Jackal rounds the corner. You might have cared about your undead minions but you knew they'd already had one life. These guys are not expendable.\n\n    *if (luck > 58)\n      The girl rides her bike out from a driveway, perfectly on cue. Her shock at seeing the Jackal is almost believable, and the screech of tyres and subsequent topple makes you wince. That's real blood. The beret guy is out already, shaking his fist and shouting at the soldiers.\n\n      Your teenagers go in fast and silent. With one hop, they're on the footplate; with the next, they're wrestling the driver and gunner off their controls. The soldiers fight back, regaining the upper hand—but the rest of the townspeople swarm the vehicle and weight of numbers wins the day. \n\n      Enterprising Girl Guides tie the soldiers up in a nearby house. The teenage strike team makes off with the Jackal, knocking over a wall as they attempt to turn the corner. Still, that's one less vehicle to worry about.\n\n      *set progress +1\n      *page_break\n      *goto lastloop\n    *else\n      The girl misjudges the moment to launch herself out from the driveway and comes within an arm's length of going under the wheels of the Jackal. Startled, she veers off and goes down in a rather too realistic skid. Her head cracks against the road and the tarmac tears open her knees. The blood, dirt, and tears are quite genuine.\n\n      The rapid movement alarms the driver. He brakes and backs off as the beret guy rushes out. The machine gun scans the street. The plan is a bust. You gesture your people to melt away behind the houses.\n\n      *page_break\n      *goto lastloop\n\n  *if (animal_help) #Call the animals from the pet cemetery.\n    The animals have been away from $!{town} too long. You concentrate on the humerus and send a message about their territory being violated. \n\n    Nothing happens for fifteen minutes. Then you notice clouds in the sky that weren't there before. Another drifts in. Then another. They are moving in opposite directions. How is that even—\n\n    Thunder cracks. Rain slams down on the path, tiny pins of water drawing closer and closer together. You sprint for a nearby porch as the street darkens around you.\n\n    They scurry from pipes, push out from foundations and wet earth. A cat leaps from a roof to a wall, fixing you with interrogator's eyes. The dogs slink by in a pack, sniffing at drains more from habit than curiosity. Somewhere in there is a dead fox, its predatory gaze burning with malice. Your heart thumps as you suddenly realise they all might turn on you. But the pack howls—a deep chord you'll hear in your nightmares—and the animals move as one.\n\n    Five minutes later, the clouds break and the rain stops. The surface of the street steams as it bakes in the returning sun.\n\n    Around the corner you find three dead soldiers, still in their transport. You don't look too hard at the bodies.\n\n    *set progress +1\n    *set bodycount +3\n    *page_break\n    *goto lastloop\n\n  #Come out of hiding to lure the soldiers into wrecking a vehicle. \n    Weir Street has a tight turn at the end leading to a stream in a ditch. If you can get a vehicle to follow you close, you could leap out of the way at the last moment and hope they drive into the trap.\n\n    Sophisticated as this plan might be, you still feel the touch of nerves as you stand in the middle of the street and wave at a military vehicle hunting for you personally. Sure enough, it turns and rumbles towards you, its engine deafening. \n\n    You see the gunner crouch and squeeze. THUMP-THUMP-THUMP-THUMP. Heavy fire tears up the road in fist-sized chunks. Burning sheer adrenaline, you race behind a house and throw yourself over a fence. Eight seconds later bullets are punching through the same fence.\n\n    Well. That didn't work.\n\n    *page_break\n    *goto lastloop\n\n  *if (revelation) #Risk explaining what you learned at the base to the soldiers.\n    You yell from an upstairs window at a passing transport. It screeches to a halt.\n\n    The gunner spins to point his weapon at you. As you'd hoped, his firing arc doesn't quite reach you. The driver guns the engine to reverse. You promise that if they move, you'll flee out back and they'll never see you again.\n\n    \"Give yourself up,\" snaps the young lieutenant in charge.\n\n    You explain you've been inside The Base. They are dismissive until you mention the labs. Then they start listening. You ask how many years they signed up for. They exchange glances. The officer has a five-year plan. The enlisted men are in for longer. Then you ask what they plan to do once they retire. They hesitate. So you explain how their unit plans to use their bodies after death.\n\n    The man in the driving seat grins. He likes the idea of himself as a warrior beyond the grave. But the gunner frowns. \"Did you know about this, lieutenant?\"\n\n    \"No. You might have to give up your life for your country. Nobody's asking you for more than that.\" He stares at you for a long moment…\n\n    Finally, he turns away. \"Back to the gate!\" he orders. \"I need to talk to the Major face to face.\" The vehicle speeds off. \n\n    *set progress +1\n    *page_break\n    *goto lastloop\n\n  #Try to extend your control to terrify the soldiers.\n    You rest in an upstairs bedroom and stare at the humerus. Somehow, it lets you link to the dead; to control the impulses in their decayed bodies. Supposedly, cells are dying all the time in living people. Couldn't you, somehow, make that connection?\n\n    An engine turns over in a nearby street. Peering through the curtains, you stare at the soldiers. And you concentrate. Very, very hard.\n\n    *page_break\n\n    You send the nightmares. Simple ones: something in the darkness, crawling insects, high places, confined spaces. Then more elaborate ones: buried alive, devouring maws, surgery, drowning. But eventually you settle into clearer, more tailored fears. Dying alone. Capture and torture. Weakness. Failure. Letting down your mates in the squad.\n\n    *if (control > 66)\n      The vehicle veers off, clipping a lamppost. The gunner opens up at nothing, peppering the metal fence with heavy rounds. It shudders. The man in the passenger seat begins to scream. They are definitely losing effectiveness as a combat unit.\n\n      If you had learned this years ago, school would have been so much easier.\n      *set progress +1\n      *set corruption +5\n      *page_break\n      *goto lastloop\n\n    *else\n      The vehicle pauses at a junction, then turns and cruises off at a leisurely pace. So much for being a ${master} of nightmares.\n      *page_break\n      *goto lastloop\n\n  *if (destiny = \"save\") #Ask for ideas.\n    A little girl holding a pumpkin soft toy tugs at your sleeve. \"When I don't want my brother getting in my room,\" she says, \"I build a barricade.\"\n\n    You're about to crush her youthful suggestion like those armoured transports could crush anything you can transport to the street. But you remember the scrap metal merchant nearby. It is likely to have something spiky which you can point upwards. And those transports—heavy duty though they may be—have tyres.\n\n    You dispatch a couple of runners to find the sharp stuff. Everyone else starts hauling junk into the street.\n\n    *page_break\n\n    You set up in a cul-de-sac which is far enough off the main street to be rarely visited by patrolling military, but which has sufficiently unusual houses to look like it might be concealing something. You pitch in to haul beds, sofas, sheds, filing cabinets and, in one memorable case, the empty shell of a rusty car into place. Your runners come back from the scrapyard with an assortment of old chimney tops which are ideal to wedge kitchen knives into.\n\n    *if (energy > 50)\n      You have just enough time to set them up behind the barricade and get everybody out of sight when a transport approaches, its engine growling. It pauses and the men survey the barricade.\n\n      What's needed is an impulsive move. You show yourself at the end of the street, strolling across with a box as if building some doomsday weapon. The driver shouts and accelerates, driving straight over the barricade.\n\n      Gunfire—no, it's the tyres blowing, THUD THUD THA-THUD. They might have a spare. They won't have four. Your team slips away into the town. The girl with the pumpkin nods and begins to suck her thumb.\n\n      *set progress +1\n      *page_break\n      *goto lastloop\n    *else\n      You just about have the knives wedged into the pots when you look out the window to see an armoured transport rolling right over your painstakingly-assembled barricade. It drives up to the end of the cul-de-sac, pauses, does a three-point turn, and flattens the other half of the barricade on the way out.\n\n      The little girl stamps her foot and throws her pumpkin at you. It hits you in the eye.\n\n      *page_break\n      *goto lastloop\n  *if (destiny = \"destroy\") #Use undead one at a time to exhaust their ammo.\n    You find a house with a particularly ugly, purple bedroom suite and look down on a crossroads, pressing your palms against the humerus and visualising the tactical situation. You don't have to wait long for a vehicle to arrive.\n\n    You send in a female corpse in a 1950s pinafore. The machine gun barks, ripping through her lemon outfit. Next comes a young boy in vintage tweed and a raggedy bowtie. He charges and it takes more rounds to put him down. Two now, a thin-faced preacher and a woman with the build of a wrestler. They get closer before being mown down. The gun shudders, blowing through its rounds in seconds. The crew scramble to reload. You send in one after another of the stumbling dead until the soldiers resort to hand weapons.\n\n    *if (control > 56)\n      You can keep this up all day. In time, even their sidearms fall silent. The commander waves his hand in a circle and the vehicle screeches off. Let them reload. You have decades of dead.\n\n      *set progress +1\n      *set corruption +5\n      *page_break\n      *goto lastloop\n    *else\n      While the others lay down cover, one of the crew loads more ammo into the mounted machine gun. If only you'd had longer to practise with this new army, you might have drained their supplies quicker. Time to pull back your reserves and try something different.\n\n      *page_break\n      *goto lastloop\n\n*comment *****************************************************************\n*label the_end\n\n*if (progress \u003c 2)\n  You're crouched in yet another abandoned house, feeling punchy and watching the road, when the troops hit you from behind. Windows and doors shatter. It reminds you of the assault on your house, and the memory makes you hesitate for just long enough. The soldiers are on you in overwhelming numbers.\n\n  *if (destiny = \"destroy\")\n    Most of them are packing the glowing guns. They fire in volleys, strobing the walls with red. Your new minions hold out longer, staggering on towards the attackers with the patience of a century. But one by one, the animation leaves their bones and they crumble. Fifteen seconds later, the carpet is ankle-deep in grave dust.\n\n    *if ((max >= 2) and (max \u003c 66))\n      \"Nooooo!\" Max yells, baring ${mhis} faultless teeth.\n    *comment endif\n\n    You reach for the humerus, searching for one more chance. A massive soldier steps over and knocks you to the floor, pulling the glowing bone from your grip. He stares at it, yellow-green liquid swirling in his eyes.\n  *comment endif\n\n  *if (destiny = \"save\")\n    They move among the civilians, clubbing them to the floor and immobilising them with cable ties.\n    *if ((sam >= 2) and (sam \u003c 66))\n      You see Sam struck twice before ${ahe} goes down.\n    One of the soldiers grabs you before you can attack—or make it to the window.\n  *comment endif\n\n  \"They want you at the lab,\" he rasps. \"But we're going to make sure we take the long way round. Me and the boys want to talk to you first. Talk to you good and proper.\"\n\n  Somebody thrusts a black hood over your head and you feel your hands dragged up behind you.\n\n  \"Cheer up,\" he says through the rough fabric. \"You'll live longer than this excuse for a town will.\"\n\n  *page_break\n\n  Your necromantic career is over. You can still serve society…as a test subject for unethical researchers probing the boundaries of life itself.\n\n  *goto exit\n  \n*comment endif\n\nThe military seem to be falling back. For a moment—just a moment—you think you've won. Then you see the gate open again, open wide, and you feel the vibration through the soles of your feet. Driving into $!{town}, crushing walls and debris beneath its hungry treads, comes an actual, immense, deafening, theatre-of-war tank.\n\nIts sloped grey turret turns, scanning the street. You see a nasty-looking secondary gun beside the main barrel, and a soldier's head poking up behind yet another gun on top. Two groups of strange tubes protrude from the front.\n\nSo much for fighting your move-and-hide guerilla skirmish. This thing can simply demolish houses one by one until you have nowhere left to hide.\n\n*if (destiny = \"destroy\")\n  *choice\n    #Surrender.\n      All good generals know when the end has come. Stepping towards the door, you reach for the humerus and send the order to stand down.\n\n      The bone blazes and feedback shudders through your body, knocking you back against the wall. You gasp for breath. For once, the undead are taking matters into their own hands.\n\n      *set humanity +5\n      *if (humanity > 100)\n        *set humanity 100\n      *comment endif\n      *goto dead_end\n    #Hit the tank with undead from every side.\n      You guess that turret takes about ten seconds to turn all the way round. The undead might be slow, but numbers are on your side. You commit everything you have to the assault.\n\n      *set control %+20\n      *goto dead_end      \n    #Direct your overwhelming rage at the crew of the vehicle.\n      After all this…no! You won't be denied. You launch a murderous mental blast towards the tank casing. Perhaps the crew aren't dead yet. But it's only a matter of time.\n\n      To your surprise, the dead of $!{town} rise on their own and surge towards the tank.\n \n      *set corruption +5\n      *if (corruption > 100)\n        *set corruption 100\n      *comment endif\n      *goto dead_end\n\n\n  *label dead_end\n\n  Twisted figures converge on the tank, decayed eyes staring in opposite directions, grisly bones crunching. The tank stops. Then the odd tubes on either side of the gun fire, POOM-POOM-POOM-POOM, launching canisters in a wide arc.\n\n  Before they even touch the ground, they detonate, painting the street in familiar red light.\n\n  Your heart pounds in your chest and your troops crumble.\n\n  *page_break\n\n  The tank rolls forward once more, then it judders and turns slightly to the right. Something is lodged in its track. You stare. It's a hand…no, two hands. No, five or seven or…\n\n  The ground erupts with the rage of the dead. A forest of decaying arms break through the road surface, clawing at the tracks. Cracked skulls and withered shoulders emerge, tearing at the tank's fittings. Tracks snap and break free, wheels and pieces of hull ripped off with uncanny strength. Something missing half its head bites through the secondary gun. Three brutes of muscle and gore bend the main barrel through ninety degrees.\n\n  Wide-eyed, the soldier on top opens up with his swivel gun. The undead pay no attention as bullets carve holes in their unfeeling flesh. The tank tips and dips…and is dragged beneath the earth, its crew screaming as they leave the sun for the final time. \n\n  *page_break\n\n  The remaining soldiers rout. The gate lies open. You are the unchallenged ${master} of $!{town}. You intended to destroy it, of course…but there is plenty of time.\n\n  Perhaps after breakfast.\n\n  *if ((max >= 2) and (max \u003c 66))\n    Max approaches and runs a cold finger down your neck. \"Shame to lose the tank,\" ${mhe} says. \"but I think we could salvage one of those armoured cars. I've had enough of this place. Fancy a road trip?\"\n\n    You pull ${mhim} close and kiss those cruel lips. $!{mhis} hands stroke your pallid, sunken cheeks.\n\n    \"Mmm,\" ${mhe} says. \"We really need to get you a better moisturiser.\"\n  *comment endif\n  *set bodycount +3\n  *set corruption +12\n  *if (corruption > 100)\n    *set corruption 100\n  *comment endif\n  *if (corruption = 100)\n    *achieve corrupt\n  *comment endif\n  *achieve deadend\n  *page_break\n  *goto exit\n  \n\n*else \n  *choice\n    #Give yourself up to save the residents.\n      It's the only way. These people trust you despite everything that's happened. You've already turned their town into a war zone. You can't let any more of them get hurt. You stand up, take a deep breath, and step towards the door.\n\n      A soft but firm hand grips your shoulder. It's the lady from the little fruit and veg shop. You remember her from when you were very young. She would total your mother's shopping, then slip a small, home-grown apple into your hand before you left.\n\n      \"Whoever is in command here,\" she says, \"those are ordinary soldiers in that thing. They're not going to fire on civilians. Stay here. You've done your bit.\"\n\n      She steps outside before you can protest. One by one, the rest of them file past.\n\n      *set humanity +5\n      *if (humanity > 100)\n        *set humanity 100\n      *comment endif\n      *page_break\n      *goto live_end\n    #Send the townspeople out to confront the tank.\n      Against a machine like this, the residents are no safer inside a building than outside. It's probably easier to destroy a building than to look somebody in the eyes and open fire. You tell the people to go out there and face down the tank. \n\n      Some of them look at you with dropped jaws and wide eyes. And yet many, particularly the older residents, seem to understand your reasoning. An old fellow you've seen gardening in a public park stands up. He puts on his flat cap and walks out the front door. One by one, the others follow. Some carry children. Even after all that's happened, they still trust you. Sort of.\n\n      Alone in the house, you watch them step through the morning sunlight. Living or dead—what difference does it make? Even if they walk into a hail of gunfire, you can bring them back to fight again, can't you? \n\n      *set corruption +5\n      *if (corruption > 100)\n        *set corruption 100\n      *comment endif\n      *page_break\n      *goto live_end\n    #Ask the residents what they want to do.\n      You look at the faces: hunted and scared. Furniture and fittings vibrate as the tank moves outside.\n\n      The local pharmacist stands up, a round-faced man who coaches the local football team in his spare time. \n\n      \"I blamed you when all this started,\" he says. \"Corpses walking the streets and smashing windows. But you didn't cause all this. You're just a kid, really. You didn't wake up one day and bring back the dead. The real villains are out there.\" He stabs a finger towards the street.\n\n      \"I'm fed up hiding. I'm going to go out there and let them know what I think. And if they shoot an unarmed man, well, they had better take a hard look at themselves.\"\n\n      You can barely believe it. But a rumble of agreement passes through the room. And one by one, every other resident gets up to follow him. You stare at the useless bone you're still carrying around. Are you about to see a suburban massacre?\n      *set control %-20\n      *page_break\n      *goto live_end\n\n  *label live_end\n  Your heart pounds as you see the townspeople form up across the street in front of the tank. Every one of them looks fragile, vulnerable, in front of the grey, metal monster. The secondary gun sweeps across them. But it doesn't fire.\n\n  Atop the turret, a young soldier mans the swivel gun. Even from here, you can see the sweat on his brow. He talks urgently into a headset.\n\n  A kid you know from school climbs up the front of the left track. Another mounts the right track. The tank shudders into life and begins to reverse. The residents walk with it. You slip out and join them.\n\n  By the time those treads reach the gate, ten people have climbed the tank's body. An old guy with a beret is talking to a commander who has emerged from its hatch. You walk through the cordon amidst a crowd, blinking in the daylight.\n\n  More soldiers run to cover you and you hear the buzz of rotors from above. A helicopter. You suppose this is what they'll use to take you to some faceless military prison. You take a last look up and close your eyes, feeling the heat of the sun while you can.\n\n  *page_break\n\n  The copter sweeps low and hovers. You suddenly realise it has civilian markings. Something is mounted beneath its body in a white dome. Is that…a camera?\n\n  More engines sound and you see vans approaching. Two have satellite dishes on the roof. It's the press! You can see the video feed already: looming guard towers, a town curtained off with metal, its citizens walking on a tank. This is no riot. These are reasonable people making a peaceful protest against the military.\n\n  *if ((sam >= 2) and (sam \u003c 66))\n    Sam comes up behind you and takes your hand. \"This footage will run every ten minutes for the next week,\" ${ahe} says. \"You want to star in it? Or do you want to go for a walk on the beach? I think we could borrow a car.\"\n\n    $!{ahe} wraps a cool hand around your neck and kisses you.\n  *comment endif\n\n  $!{town} has finally amounted to something. You could choose to be part of that story if you want. Undead walking the streets? A ridiculous idea. Who would believe it? Whatever happens, The Base will be closed down. You're sure of that.\n\n  You pat the humerus. Still inside your jacket. Still safe.\n\n  In case you ever need it.\n\n  *set humanity +10\n  *if (humanity > 100)\n    *set humanity 100\n  *comment endif\n  *if (humanity = 100)\n    *achieve human\n  *comment endif\n\n  *achieve liveend\n  *page_break\n  *goto exit\n  \n\n*comment *****************************************************************\n*label exit\n\n[b]THE END[/b]\n\nYour final statistics were: undead control ${control}%, energy rating ${max_energy}% and luck ${luck}%. You reached a visibility level of ${visibility}.\n\n${bodycount} people died during the story.\n\nYour final humanity score was: ${humanity}%.\n\nYour final corruption score was: ${corruption}%.\n\n*if (sam = 1)\n  You met Sam.\n  *goto max\n*elseif (sam = 2)\n  You felt a mutual attraction with Sam but it never really went anywhere.\n  *goto max\n*elseif (sam = 3)\n  You and Sam had a flirty relationship.\n  *goto max\n*elseif (sam = 4)\n  You and Sam had a solid relationship.\n  *goto max\n*elseif ((sam >= 5) and (sam \u003c 66))\n  You and Sam had a smoking hot relationship.\n  *goto max\n*elseif (sam > 65)\n  Sam died.\n  *goto max\n*comment endif\n\n*label max\n*if (max = 1)\n  You met Max.\n  *goto endgame\n*elseif (max = 2)\n  You felt a mutual attraction with Max but it never really went anywhere.\n  *goto endgame\n*elseif (max = 3)\n  You and Max had a flirty relationship.\n  *goto endgame\n*elseif (max = 4)\n  You and Max had a pleasantly chilling relationship.\n  *goto endgame\n*elseif ((max >= 5) and (max \u003c 66))\n  You and Max had a dark, intense relationship.\n  *goto endgame\n*elseif (max > 65)\n  Max died.\n  *goto endgame\n*comment endif\n\n*label endgame\n*goto_scene ending", "dayofthedead": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, dayofthedead\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set energy max_energy\n\nYour nocturnal visitor has thrown off your sleep pattern. You have a lie down in the late afternoon and dream that the blonde vampire is floating outside your window, trying to get in. From far away, you hear the sound of…is that a horn? You drift awake.\n\nIt's dark outside. You had better get up for a bit. You head downstairs for a glass of water.\n*if (vampire)\n  $!{vampname} is lounging in your favourite spot on the sofa, still in his waistcoat and cummerbund, watching\n  *rand bomb 1 6\n  *if (bomb = 1)\n    \"Dr Quinn: Medicine Woman\".\n    *goto nobones\n  *elseif (bomb = 2)\n    \"Champion The Wonder Horse\".\n    *goto nobones\n  *elseif (bomb = 3)\n    \"The Littlest Hobo\".\n    *goto nobones\n  *elseif (bomb = 4)\n    \"Space: 1999\".\n    *goto nobones\n  *elseif (bomb = 5)\n    \"Ironside\".\n    *goto nobones\n  *else\n    \"Airwolf\".\n    *goto nobones\n\n  *label nobones\n  \"Good evening,\" he says without looking up.\n*comment endif\n\nYou run the tap, fill a glass, and take a long drink, blinking under the fluorescent light. Sleeping during the day always makes you dozy. You have a feeling that something has changed.\n\nIt takes a minute before you spot it. \n\n*if (zombies > 0)\n  Although a zombie leans against the wall near you,\n  *goto nobones2\n*else\n  Everything is too quiet because\n  *goto nobones2\n  \n*label nobones2\nthere are no skeletons in the room. However, there appear to be some new artworks on the table. They are…crude, decorated skulls. \n\n*choice\n  #Scrutinise the skulls.\n    You take the time to examine the skulls as art. They have been constructed from sugar cubes, toothpaste, and a bunch of old, coloured icing your mum bought when she had that cupcake obsession. You notice now that there are candles burning on either side and frozen pizza piled in front of the skulls. It's a shrine. To the dead?\n\n    Something about the scene teases your memory. Wait a minute, what date is this? Two days after Halloween?\n    *set control %+5\n    *set luck %-5\n    *goto skeletonparty\n    \n  #Look outside.\n    The front door hangs ajar. This can't be a good sign. You peek out.\n\n    There is a visible trail of destruction leading from your front door, across the street, and away. Shrubs are uprooted, the bin knocked over, and the garden is choked with frozen pizza packaging and empty bottles of tequila beer.\n\n    What is going on? Halloween is over.\n\n    Then you remember. Two days after Halloween is a holiday too. It's called…\n    *set max_energy %-5\n    *set energy %-5\n    *goto skeletonparty\n    \n  #Ask the banshee where the skeletons are.\n    The banshee drifts sideways, leaving green vapour. \"'Ere you ask me a question, you must answer three of mine,\" she says.\n\n    You roll your eyes at her.\n\n    \"Ah, pffft,\" she says. \"They left five minutes ago.\"\n\n    Left? \n\n    \"You've forgotten what day it is,\" she says, in a reproving tone.\n\n    What date? It's two days after Halloween. Wait a minute…\n    *set luck %+5\n    *set control %-5\n    *goto skeletonparty\n\n  *if (vampire) #Ask the vampire where the skeletons are.\n    He lifts a dismissive hand without taking his eyes off the television. \"It's All Souls' Day. I'm sure a ${master} of the macabre like you prepared a programme of activities to keep them out of trouble.\"\n\n    You try to draw him out further but he waves you off.\n\n    All Souls' Day? Wait a minute, that's…that's…\n    \n    *goto skeletonparty\n\n*comment *****************************************************************\n*label skeletonparty\n\nThe Day of The Dead. [i]El Dia de los Muertos[/i]. Your stomach lurches. Around the world, this is a day of celebration of friends and family who have passed on. What does it mean to these clackety maniacs?\n\nFrom somewhere in the distance, across the sleepy town, you hear the blare of a trumpet.\n\n*page_break\n\nThese skeletons represent half your undead army. You can't afford to lose them. Worse, whatever mayhem they cause will be blamed on you. It's not that you are against mayhem, exactly. You just like to select the form it takes.\n\nYou can follow the trail of devastation from the house towards the town. Dustbins have been turned over and garden furniture stacked into odd towers. It leads you to a small side street with a music shop on it.\n\nYou've often passed this shop. It's rarely open, and you have never seen it sell anything. But its window has been smashed and there are two instruments missing from the dusty, faded display. Both trumpets.\n\nAs you examine the display, you hear the trumpet sound again, a brash fanfare with more enthusiasm than skill.\n\n*choice\n  #Examine the window for clues.\n    You stare at the remaining stock, now covered in gleaming fragments of glass. You notice there's no obvious rock or other missile; whoever broke the window might have done it with their bare hands. Or with their bony hands.\n\n    From behind you comes the sound of running footsteps. You spin round but you can't tell which direction they went. They didn't sound skeletal. You had better return to the chase.\n\n    *set control %+5\n    *set visibility +1\n    *goto costume_shop\n  #Try to reason out how a skeleton could play a trumpet.\n    You got to try a trumpet in school once. It only makes a noise if you put your lips up to the mouthpiece and make them buzz. A skeleton has no lips. It doesn't even breathe. How could it shape air in the precise way required? Have they hooked up with other undead musicians? Or are you chasing a strange jazz funeral?\n\n    Of course, you never did solve the question of how they even stand up. So perhaps you are wasting your time. You head off.\n\n    *set control %+5\n    *set energy %-5\n    *goto costume_shop\n\n  #Hurry in the direction of the trumpet sound.\n    There will be  plenty time to play detective or philosopher once you have caught this roving band of undead vandals. You hurry in pursuit.\n\n    *set luck %+5\n    *goto costume_shop\n\n\n*comment *****************************************************************\n*label costume_shop\n\nYou're getting closer to town now. It's still rather quiet but there are a few more tell-tale signs of the skeletons' passing. A road sign has been moved to direct all traffic into an underground car park. A bus stop has been uprooted and thrown into a hedge. Even you, a teenager, recognise this is adolescent stuff.\n\nTwo girls run past you, screaming. Ahead, a shop door hangs open. It looks like the lock has been busted open. It's a costume hire business. You glance inside. Various outfits are scattered across the floor.\n\n*choice\n  *hide_reuse #Try to analyse what the skeletons did here.\n    There seems to be no pattern to the costumes that have been discarded. There is, however, a big space on the hat shelf. Is this a clue?\n\n    *choice\n      #Choose a disguise.\n        *goto disguise\n      #Return to the chase.\n        Halloween was yesterday. You've wasted enough time in here. \n\n        *goto bus\n\n  #Disguise yourself with a costume.\n    *label disguise\n    The skeletons are bound to have attracted attention. You really don't want to be associated with them. On the other hand, you could easily look as if you are late (very late) coming home from a Halloween party.\n\n    What costume will you choose?\n    *choice\n      #1950s mobster.\n        You find a serious, stripey gangster suit with a fake tie and a fedora hat. With the brim down, nobody should recognise you.\n\n        *set disguise true\n        *set outfit \"gangster\"\n        *set outfit_art \"a\"\n        *achieve disguise\n        *goto bus\n      #A duck.\n        You select a bright yellow furry one-piece with eyeholes in its protruding orange bill. It has a pocket hole which will let you get at the humerus. \n        *set disguise true\n        *set outfit \"duck\"\n        *set outfit_art \"a\"\n        *achieve disguise\n        *goto bus\n      #An alien.\n        This costume would be grey and rather boring were it not for its cool plastic headpiece. Looking out through the eyes is like wearing massive, stupid sunglasses. \n        *set disguise true\n        *set outfit \"alien\"\n        *set outfit_art \"an\"\n        *achieve disguise\n        *goto bus\n      #A clown.\n        You put together a composite clown with pieces of various outfits. The loud, green wig ought to distract passers-by, while the red nose obscures your features. With some regret, you leave the long, squeaky shoes behind as impractical.\n        *set disguise true\n        *set outfit \"clown\"\n        *set outfit_art \"a\"\n        *achieve disguise\n        *goto bus\n      #A pirate.\n        The boots aren't in your size but you make something work with a stripey shirt, long waistcoat, and a tricorn hat. The eyepatch is necessary to protect your identity but it does destroy your depth perception.\n        *set disguise true\n        *set outfit \"pirate\"\n        *set outfit_art \"a\"\n        *achieve disguise\n        *goto bus\n      #A ninja.\n         The classic costume—easy to construct and an effective disguise. You cover yourself in black and slip on the headpiece. Only your eyes remain. It keeps your head warm, too.\n        *set disguise true\n        *set outfit \"ninja\"\n        *set outfit_art \"a\"\n        *achieve disguise\n        *goto bus\n      #Actually, this was a really bad idea.\n        You stop and take a look at yourself. Are you really going to look [i]less[/i] suspicious turning up at an undead outbreak dressed like an idiot? You've wasted enough time here.\n        *goto bus\n\n  #Ignore the costume shop and press on.\n    It doesn't matter what bizarre beyond-the-veil logic has taken the skeletons in there. The important thing is to catch up with them fast.\n\n    *set luck %+5\n    *goto bus\n\n*comment *****************************************************************\n*label bus\n\nAs you get some distance from the costume hire place, you hear another trumpet—no, two of them—just ahead, and a screech of brakes. You round the corner to see a bus stopped, and—yes, those must be your skeletons piling on board. Are they wearing something on their heads?\n\n\"Aieee!\" The driver topples out, and the doors close. The engine roars and the bus begins to move off. Wait, they can drive? \n\n*label bus_stop\n*choice\n  *hide_reuse #Command them to stop the bus.\n    You grab for the humerus.\n    *if (disguise)\n      It takes a moment to find it in your new costume.\n    *comment endif\n\n    Reaching out with its unearthly glow, you try to rein in the mutinous skeletons. \n    *if (control > 62)\n      The bus screeches to a halt. Then it starts up again. You nearly had them. Your control is solid—something external has affected these skeletons.\n      *set max_energy %+5\n      *set luck %+10\n      *goto bus_stop\n    *else\n      You grit your teeth. No matter how hard you concentrate, the bus doesn't slow down. You might be too far away; or maybe something else is influencing your minions?\n      *set energy %-10\n      *goto bus_stop\n  #Run after the bus.\n    *if (energy > 57)\n      *goto bus_storm\n    *else\n      *set energy %-25\n      *goto pursuit\n  #Try to find some transport.\n    Hot-wiring a car for real is probably harder than it looks in [i]Grand Theft Auto[/i]. But down the side of a house, you see a bicycle about your size. You scramble over a wall and grab it.\n\n    As you're pulling off, a woman runs out of the house. \"Hey!\" she shouts at you.\n    *if (disguise)\n      She stops short and stares when she sees her bike is being ridden by ${outfit_art} ${outfit}. \n      *set energy %-10\n      *goto pursuit\n    *else\n      \"Hey! I know where you live!\"\n      *set visibility +4\n      *set energy %-10\n      *goto pursuit\n\n*comment *****************************************************************\n*label bus_storm\n\nYou've been keeping fit, and it shows now. You're able to match the bus's speed for long enough to come up alongside the door. You grab the rearview mirror arm and balance yourself on the footplate. Wind whips at your face.\n\nA skeleton is sitting in the driver's seat, wearing…wearing a sombrero. It is also swigging from a tequila beer. The beer pours straight through its ribcage and splashes on the seat. You batter a fist against the door. The skeleton looks over and gives you a cheerful wave.\n*set luck %+10\n*choice\n  #Try to get at the humerus and command it to stop.\n    It's difficult holding on to a moving bus with one hand. You reach for the humerus.\n\n    *if (disguise)\n      The unfamiliar costume makes it harder. The bus takes an unexpected turn and you find yourself thrown off. You get your feet down just in time—take a couple of steps to avoid falling over—and you thump into a hedge.\n\n      Damn it. You pick yourself up and set off again.\n\n      *set control %-5\n      *set luck %-10\n      *goto pursuit\n    *else \n      You wield the glowing thing, still hanging on to the bus with one hand. You give all your concentration to this one skeleton, telling it to press the brake…press the brake…\n\n      *if (control > 63)\n        The skeleton's rhythm seems to break. It looks at you and stiffens. The bus eases to a stop. You force the door open and step on board.\n\n        *set control %+10\n        *page_break\n        *goto early_stop\n      *else \n        The skeleton's rhythm seems to break. It hesitates. It looks at you—and you abruptly have to leap from the bus to avoid getting splattered on the side of a bus stop.\n\n        *set control %+5\n        *goto pursuit\n\n  #Just hang on.\n    The bus weaves left, then right. A dog chases it for a few minutes, nipping at your heels. The bus blasts past a stop where an elderly gentleman with a stick is waiting to board. His mouth drops open as you pass.\n    *if (disguise)\n      You can't tell if he was startled by the bus of skeletons or the ${outfit} trying to board it.\n      *goto hang_on\n    *else\n      *set visibility +2\n      *goto hang_on\n    \n    *label hang_on\n    *if (energy > 62)\n      Sixty seconds later, a lorry backs out of a nearby alley. The skeleton slams on the brakes. You force the door open and step on board.\n\n      *set max_energy %+5\n      *page_break\n      *goto early_stop\n    *else\n      After another couple of minutes, you feel your grip loosen on the mirror. You're going to fall off. You take advantage of a slow turn and leap off, running to avoid falling over.\n\n      *goto pursuit\n      \n  #Try to open the door.\n    There is a handle built into the bus body at the side of the door. It's an awkward stretch with you hanging on to the mirror. You try once, twice…on the third time you get hold of it. The door hisses and begins to swing open.\n\n    *if (luck > 66)\n      Your feet come off the kickplate but you swing smoothly back inside. Now to confront these bony troublemakers.\n\n      *set control %+10\n      *page_break\n      *goto early_stop\n    *else\n      It catches you in the chest and your feet come off the kickplate. You tumble backwards onto a lawn. You're not seriously hurt—considering you just fell off a bus—but you are definitely pissed off.\n      *set control %-5\n      *if (disguise = false)\n        *set visibility +2\n      *goto pursuit\n\n*comment *****************************************************************\n*label early_stop\n\nYou're just giving the skeleton driver the evil eye when you're startled by a blast of trumpet from the back of the bus. Another skeleton advances, playing something which sounds like a mariachi number done by a deaf espresso addict.\n\nYour swift action has managed to halt the skeletons before they can do too much damage. You order them off the bus.\n\n*set luck %+25\n*page_break\n*goto harsh\n\n*comment *****************************************************************\n*label pursuit\n\nAhead of you, the bus rattles around a few corners, but it never gets up to top speed. It runs into a large, wheeled, plastic bin and drags it around for another couple of minutes. You keep it in view as you pursue but you're getting tired.\n\nFinally, it stops. The doors hiss open. \n\n*page_break\n\nYou're in the town centre now. The skeletons pile out of the bus and mill around aimlessly beside a large, official building. Every single one is wearing a sombrero. The trumpet players alternate random parps. They seem to aim for volume rather than melody.\n\nJust as you roll up, breathing hard, a man with large whiskers and an immense barrel chest rams open the building's front door.\n\n\"WHAT THE HELL IS THIS RACKET?\" he demands. \"WE'RE HAVING A TOWN COUNCIL MEETING HERE…oh. Oh my word. It's…it's them.\" He lumbers back through the doo
