rs, still bellowing. \"Gentlemen! Gentlemen! It's true. The horde of the undead is here. They've come for the office-bearers!\"\n\nThe skeletons look at each other. They shrug, clavicles lifting in unison. Then they pile into the council building together.\n\n*choice\n  #Pile in after them.\n    This seems to be some kind of low-budget version of a town hall. The walls are lined with black and white pictures of fat people wearing frock coats. Occasional cabinets display engraved trophies for insignificant achievements. A certificate states that $!{town} was \"Council of the Year 1982\".\n\n    You follow the screams through a grubby door.\n    *page_break\n    *goto council\n    \n  #Look around the back of the building.\n    You don't want it to seem like you arrived with these clackety freaks. You slip down the neighbouring alley, searching for a back door. The distant scuttling of a rat greets you as you turn the corner.\n\n    A dim, green light ahead picks out the fire exit. You have to clamber over boxes filled with expensive, soggy brochures for failed civic projects but you get to the doorway without incident. It is a double door but neither side has a handle. Hmm. How to—\n\n    The door snaps open.\n\n    *if (energy > 45)\n      You leap back on instinct. The grey panel passes within an inch of your face.\n      *set luck %+5\n      *goto backway\n    *else\n      You don't jump back fast enough. The door clobbers you on the side of the head and knocks you into the pile of mouldy brochures.\n      *set luck %-5\n      *goto backway\n\n    *label backway\n    Two screaming men and a wide-eyed woman thunder out of the door and flee along the alleyway. They don't seem to notice you. You pull the door aside and head into the building.\n\n    *set backdoor true\n    *page_break\n    *goto council\n    \n  #Sit down and do nothing.\n    *label exterior\n    You find a nearby wall and settle down for a breather. After a moment, you hear the distinctive sound of a bunch of people screaming in unison. Something bangs from around the back of the building. Two windows break in quick succession. The trumpets give a short burst of something you could swear is the theme tune for a 70s detective series your father used to watch on repeat.\n\n    *if (disguise)\n      A rough character cruises by in a convertible. He stares at you, obviously confused by why ${outfit_art} ${outfit} is loitering outside the council building in broad daylight. Then he speeds off.\n      *set luck %+5\n      *goto all_quiet\n    *else \n      A rough character cruises by in a convertible. He stares at you, eyes narrowed. Then he speeds off.\n      *set visibility +3\n      *goto all_quiet\n\n    *label all_quiet\n    After about ten minutes, everything goes quiet. The skeletons stroll out the front door like nothing has happened. You seize your chance and touch the humerus, issuing a stern order of control. The skeletons stiffen like soldiers, and turn to face you.\n\n    *set luck %+5\n    *set energy %+10\n    *page_break\n    *goto harsh\n\n*comment *****************************************************************\n*label council\n\n*set council_mayhem true\nThe council chamber is a strange combination of very old, wooden panelling and cheap, plastic furniture. The council themselves seem to be an assortment of hard-faced men and women in shabby suits. Their meeting may have been quite dignified five minutes ago; now it is mayhem. One door hangs off its hinges. Several chairs and a table have been knocked over.\n\nOne of your skeletons is chasing a councillor around the perimeter of the room, jumping on and off tables. A tea lady squares up to another skeleton, thick arms raised in a boxer's stance.\n\nAt least three or four of the remaining councillors are trying to get a signal on their mobile phones.\n\nThis situation could swing in many different directions. What will you do?\n\n*choice\n  #Incapacitate the tea lady.\n    *label tealady\n    Her attention is totally on the skeleton. Even in her long apron, she bobs and weaves in a fluid motion. She jabs, jabs again, and lands a massive haymaker on the side of the skeleton's head. It topples over a bench with a clatter.\n\n    You admire the tea lady's courage and smooth control. You wonder if she is a regular at a local boxing gym. You smack her over the head with one of her trays. She goes down hard.\n\n    *set luck %+5\n    *set corruption +1\n    *achieve tealady\n\n    Now what?\n\n    *choice\n      #Control the skeletons and withdraw them.\n        *goto withdraw\n      #Control the skeletons and slaughter as many as you can.\n        *goto slaughter\n      #Make an impassioned speech on behalf of the dead.\n        *goto speech\n  #Control the skeletons and withdraw them.\n    *goto withdraw\n  #Control the skeletons and slaughter as many as you can.\n    *goto slaughter\n\n  #Watch for a while.\n    The tea lady gets the upper hand for a bit and gives the skeleton a solid pounding. It staggers back and stumbles. You are a bit torn on how to feel about this. On the one hand, that's one of your minions she's beating up. On the other hand, it serves it right for disobeying your commands.\n\n    *choice\n      #Take the fight to the tea lady.\n        There has been a certain satisfaction in watching her thump the recalcitrant skeleton. But enough is enough. You slip round behind the tea lady.\n\n        *set luck %+3\n        *goto tealady\n\n      #Control the skeletons and withdraw them.\n        *goto withdraw\n        \n      #Control the skeletons and turn them on the council.\n        *goto slaughter\n        \n      #Make an impassioned speech on behalf of the dead.\n        While you've been watching the boxing match, you failed to notice that most of the councillors have left the building. You start a speech, but it's quite clear that nobody—living or dead—is giving you their attention. Your efforts at public speaking allow the last stragglers to flee the council chamber.\n\n        Well, that was a dead loss. You might as well gather up the remainder of your followers and leave.\n\n        *set max_energy %+5\n        *set energy %+5\n        *set luck %-10\n        *goto withdraw2        \n\n  #Make an impassioned speech on behalf of the dead.\n    *goto speech\n\n\n*comment *****************************************************************\n*label speech\n\nYou step up on the central table, a large antique thing with a leather top. It gives an alarming creak beneath your weight. You look at the panicked council members, supposedly the most responsible citizens of your town, and launch into a spontaneous speech.\n\nYou talk of friends and relatives who passed on prematurely. You talk about the graveyard as a place for reflection and meditation. As you speak, the skeletons calm down and turn to listen. The councillors pause at the exits. Heads poke from beneath desks.\n\nYou remind the council that today, [i]El Dia De Muertos,[/i] is celebrated in Latin America to cherish the memory of the dead, and the many lessons you learned from them during their life. You suggest that, from now on, $!{town} declares this date as a local holiday, in order that its venerated dead may forever have a place in its heart. You warm to your theme until you have the attention of the entire room. \n\nOne of the younger men steps forward.\n*if (disguise)\n  \"Why are you wearing ${outfit_art} ${outfit} suit?\" he asks.\n\n  Mayhem breaks out again. You sigh and wait for the room to clear.\n\n  *set luck %-10\n  *goto withdraw2\n*else\n  *if ((control > 58) and (luck > 56))\n    \"We hear you,\" he says. \"We wondered what your motivation was for putting this town under siege. I think we understand better now, and we'll think on what you've said. But please…call off these…call off our new, undead friends.\"\n\n    *set control %+5\n    *set luck %+10\n    *set visibility +10\n    *choice\n      #Agree and withdraw the skeletons.\n        *goto withdraw\n        \n      #You've had your fun. Now kill them all.\n        You let a wicked grin spread across your face. Then you reach for the humerus.\n\n        *goto slaughter\n        \n      #Just walk away.\n        Part of this whole respecting the dead thing is to allow them to express themselves. You head back outside. A moment of silence descends on the room.\n\n        *goto exterior\n  *else\n    \"$!{town} Council will not be intimidated by you—whatever you are! We'll fight you,\" he yells. \"We'll fight you whatever it takes.\"\n\n    As he has been speaking, the older councillors have taken the opportunity to slip out. He looks around and realises he's alone. \"Dammit,\" he says. Then he runs for it.\n\n    *set visibility +10\n    *goto withdraw2\n\n*comment *****************************************************************\n*label withdraw\n\nYou stand by the door and channel your will through the humerus. The remaining councillors stare as your horde falls in to a military formation and marches out. They can see you're a force to be reckoned with. And if they survived, it was because you decided to spare them.\n\n*set control %+5\n*set humanity +6\n\n*label withdraw2\nYour skeletons assemble outside the council hall. It's time you had a word with them about their conduct today.\n\n*page_break\n*goto harsh\n\n*comment *****************************************************************\n*label slaughter\n\nThe screaming takes on a new edge as your skeletons' attacks become lethal. One councillor goes down under a flying plastic chair. Another is dragged around by his spotted tie. One particularly resourceful skeleton finds the suspension cable for the central chandelier and releases it.\n\n*if (luck > 60)\n  It whistles as it drops, a glittering bomb of spiky, glassy death. It plummets towards a spluttering gentleman in a tweed waistcoat. Even as the main shaft impales his considerable stomach, nailing him to the grubby floorboards, a dozen small fountains of his blood shower the ornate mouldings.\n\n  Messy. Still, you just saved $!{town} a small fortune in lunch bills.\n\n  *page_break\n\n  You pick your way through the broken chamber. You count five more corpses on the ground, in various states of surprise and bludgeoning. The town is clearly going to need an election soon.\n\n  *set corruption +3\n  *set bodycount +6\n  *goto withdraw2  \n\n*else\n  It whistles as it drops, a glittering bomb of spiky, glassy death. It smashes on the ground, inches from a startled, puffed-up gentleman in a tweed waistcoat. Wide-eyed, he scrambles towards the exit.\n\n  You pick your way through the broken chamber. You count four corpses on the ground, in various awkward, broken poses. The skeletons are beginning to calm down. Time to round them up and explore the real power in this town.\n\n  *set corruption +6\n  *set bodycount +4\n  *goto withdraw2  \n\n*comment *****************************************************************\n*label harsh\n\nThe skeletons stand around in their sombreros. Although they don't have expressions, exactly, their body language seems dejected. One kicks its trumpet along the pavement. The scrape of brass on tarmac forces you to cover your ears.\n\nYou have a discipline problem in your ranks. Maybe this is some kind of sacred day for the skeletons and you should make allowances for them. On the other hand, what if Christmas becomes a sacred day, too? St. Patrick's Day? Talk Like a Pirate Day? \n\nStanding here, you're not far from the railway line. A whistling from the wires tells you a train is coming. You could sacrifice one skeleton as an example to the rest. \n\n*choice\n  #Drive one skeleton in front of the train.\n    You urge the horde over to the railway line. They move with sluggish steps, but they don't resist the command of the humerus. Their hollow eyesockets gape at you. In the distance, you can see the train.\n\n    From the bony freaks available, you pick out one particularly sullen character. You grip the humerus and move the skeleton, step by slow step, over the wall and onto the grass beside the line. You feel resistance—a kind of mental feedback—as you force the skeleton onto the track. It stares at the onrushing locomotive.\n\n    The train's brakes go on very late, wheels screaming against the rails, sparks raining along the line. It hits the scapegoat skeleton with a dull thud and a dry clatter. Fractured bones tumble into the grass. Maybe they can be reassembled. You suspect not.\n\n    You give the remaining undead a moment to reflect, then issue the order to turn away. Fleshless legs react quickly. Your authority has been reestablished.\n    \n    *set control %+25\n    *set skeletons -1\n    *set minion_count -1\n    *set visibility +2\n    *set decimate true\n    *page_break\n    *goto maxtwo\n\n  #Pretend to do this, but relent at the last moment.\n    You urge the horde over to the railway line. They move with sluggish steps, but they don't resist the command of the humerus. Their hollow eyesockets gape at you. In the distance, you can see the train.\n\n    From the bony freaks available, you pick out one particularly sullen character. You grip the humerus and move it, step by slow step, over the wall and onto the grass beside the line. You feel resistance—a kind of mental feedback—as the skeleton stares at the onrushing locomotive.\n\n    As the train thunders past, you lift its arm and make it wave to the passengers. Some stare with open mouths. Some are too absorbed with coffee and ebooks to notice.\n\n    You bring the skeleton back to rejoin the horde. It responds smoothly. Your little demonstration has had an effect.\n\n    *set control %+10\n    *set visibility +1\n    *page_break \n    *goto maxtwo\n\n  #Give the skeletons a stern lecture.\n    You strut back and forth along the line of shabby skeletons, gesturing with the glowing humerus. You remind them that secrecy is crucial; your operation is still vulnerable; and you point out how badly they may have compromised your identity and the safety of the house.\n\n    Are you getting through? How can you tell when they don't have eyeballs? The party seems to be over, in any case.\n    \n    \"Bloody hell!\" says a voice from behind you. You turn in time to see a battered, red Ford screech away. Was someone watching?\n\n    *set control %-10\n    *set visibility +3\n    *set humanity +2\n    *page_break\n    *goto maxtwo\n\n  #Forgive them.\n    The undead have to find their excitement where they can. You play the benevolent ${master}, treating them more like mischievous schoolkids than undead fiends on the rampage. You wave the glowing humerus in their face and ask them to promise never to do this again.\n\n    There is much shuffling of feet. What did you expect? An answer? They're only levitating bones.\n\n    \"Bloody hell!\" says a voice from behind you. You turn in time to see a battered, red Ford screech away. Was someone watching?\n\n    *set control %-25\n    *set visibility +1\n    *set humanity +4\n    *page_break\n    *goto maxtwo\n\n*comment *****************************************************************\n*label maxtwo\n\nFavouring side streets, you try to shuttle your bony horde back home.\n*if (max = 1)\n  You think you see Max in the distance and take a hasty turn to avoid ${mhim}.\n  *goto eveningofthedead\n*comment endif\n\n*if ((max \u003c 1) or (max > 65))\n  For once, luck seems to be with you and you get home without incident.\n  *goto eveningofthedead\n*comment endif\n\nYou've only made it a couple of blocks when you recognise a face from school. It's Max, immaculate as usual, in red Converse boots and an expensive-looking leather jacket. \n\n*if (disguise = false)\n  *goto installation\n*else\n  $!{mhe} gives you a strange look and passes by without acknowledgement. You feel hurt for a moment until you remember you're wearing ${outfit_art} ${outfit} costume.\n\n  *choice\n    #Unmask and wave.\n      *goto installation\n      \n    #Go over in character and menace Max.\n      You cross the road and lay some ${outfit} moves on Max. $!{mhis} features draw into a look of contempt. \"Get away from me, you peasant,\" ${mhe} snaps.\n      *choice\n        #Unmask.\n          \"Oh, hi. It's you. Sorry for calling you that. I just get enough bother from these kids on Halloween, I don't need it for the rest of the year, you know?\"\n\n          You exchange some token conversation with Max but ${mhe} keeps it impersonal. After a few moments ${mhe} excuses ${mhim}self to go do something suspiciously vague in town. You watch ${mhim} go, feeling ditched.\n          *set max 1\n          *set luck %-15\n          *page_break\n          *goto eveningofthedead\n          \n        #Go home.\n          The remark leaves a bad taste in your mouth. Maybe this outfit taught you something about how Max treats regular people.\n          *set luck %-5\n          *goto eveningofthedead\n          \n        #Slaughter Max.\n          Nobody talks that way to a ${master} of the undead.\n\n          *goto killmax\n          \n    #Take advantage of the situation to slip away unrecognised.\n      *goto eveningofthedead\n\n*comment *****************************************************************\n*label installation\n$!{mhe} raises a hand and strolls across the street. \"Hi, $!{name}. Thought I might bump into you. I saw your art installation back there.\"\n\nArt installation?\n\n\"The big skull made from tomato sauce and beer bottles? You're not telling me you did more than one.\" Max gives you a knowing look.\n\n*fake_choice\n  #Take credit for this unseen art installation.\n    You try to remain cool as you talk some nonsense about it being inspired by the consumerisation of Halloween. Max nods in a thoughtful way which makes you wonder if ${mhis} family actually makes big profits out of the holiday.\n  #Blame the independently-minded skeletons.\n    You dismiss the giant tomato-and-beer skull as something the skeletons did when you weren't watching. Max gives a short laugh and gives you a light punch of the shoulder. \"You crack me up,\" ${mhe} says.\n  #Change the subject.\n    You ask Max if ${mhe} dressed up for Halloween. \"Nah. I like to sometimes, you know, just as a kind of fun thing. But we were out of town last night at a club. Next year maybe.\"\n\n    You can't think of a way to ask what kind of club ${mhe} means without sounding really naive, so you just leave it.\n*comment end fake_choice\n\nYou chat for a while. \"I'm enjoying the break from school,\" Max grins. \"Getting to spend more time with my own art and watch some good movies on the projector. So, thanks for that. More power to you.\"\n\n*choice\n  #Ask about Max's art.\n    You didn't know Max was an artist.\n\n    \"Yeah, abstracts and sculpture,\" ${mhe} says. \"Found objects sometimes. I'm going to art school in a couple of years. Not sure which one yet. I've been checking out their degree shows.\"\n\n    You ask how ${mhe} is getting on assembling a portfolio for ${mhis} application. Max waves a dismissive hand. \"I'll get to it. It's not an issue.\" It might stray into arrogance…but ${mhis} confidence is certainly attractive.\n    *goto phonenumber\n    \n  #Talk about films.\n    *if (film = \"none\")\n      You ask about Max's taste in films.\n\n      \"Oh, you know. European stuff. Edge cinema from the festivals. New darkwave in particular. I can't stand the movies they show in the local fleapit. Every time I've been in there, I come away feeling like I've sat on something sticky.\"\n\n      Max talks about ${mhis} projector setup. You think about the flaky, old TV you have back home.\n      *goto phonenumber\n    *else\n      You mention you watched ${film} last night.\n\n      \"Oh yeah.\" Max nods. \"Not bad. Think I have the Blu-ray of that somewhere. Might have a couple of good extras if you want to check it out.\"\n\n      That wasn't exactly an invitation to come round for a private session in Max's personal cinema. Or was it?\n      *set luck %+5\n      *goto phonenumber\n\n  #Cut it short and head home.\n    Max is easy on the eye, but you've had a long day and you won't feel settled until you get your mutinous horde back to the house. You wind it up quickly and say goodbye. Max watches you as you walk away.\n    *set luck %+5\n    *goto eveningofthedead\n\n  #Kill Max.\n    You draw the conversation out for a little longer, turning Max's eyes away from the hedge where the horde is hidden. Once you're sure ${mhe} is totally unaware, you slip your hand into your pocket.\n    *goto killmax\n\n*comment *****************************************************************\n*label phonenumber\n\n*if (disguise)\n  Max glances at ${mhis} watch. \"I've got to go,\" ${mhe} says. \"Good seeing you. Great outfit.\" You're not sure that last remark was entirely sincere. \n\n  *goto phonenumber2\n*else\n  Max glances at ${mhis} watch. \"I've got to go,\" ${mhe} says. \"Good seeing you.\" \n\n  *goto phonenumber2\n  \n*label phonenumber2\n$!{mhe} takes a few steps away then pauses and turns back.\n\n*if (humanity \u003c 19)\n  \"Can I get your phone number? We always seem to meet at a bad time. I'd like to have you round my place sometime.\"\n  \n  *choice\n    #Give your phone number.\n      You try to seem cool as you give Max the number. \"I'll be in touch,\" ${mhe} says, and smiles. $!{mhe} doesn't offer you ${mhis} own number. Still, that seemed genuine.\n      *set luck %+10\n      *set max +1\n      *if ((max > 3) and (max_achieve = false))\n        *achieve max\n        *set max_achieve true\n      *comment endif\n\n      *goto eveningofthedead\n\n    #Give a fake number.\n      You give Max a phone number which is basically the same as yours but with a couple of digits reversed. That takes care of that without you having to be rude to ${mhis} face.\n      *goto eveningofthedead\n\n    #Let Max down gently.\n      You thank Max for the invitation but explain you're going to be busy for the near future. $!{mhe} blinks. You don't suppose ${mhe} gets many knockbacks.\n\n      \"I see. Well…good luck to you.\" $!{mhe} walks off, glancing back once. You head for home.\n\n      *set luck %+5\n      *set control %+5\n      *set max 1\n      *goto eveningofthedead\n\n    #Kill Max.\n      The arrogance! You're a necromancer. You don't give out your phone number. You slip your hand into your pocket.\n      *goto killmax\n\n*else\n  \"I meant to say to you…stop being such a lightweight. You have an army of the dead, you know? You can use it to get anything you want. So step up and do something instead of just messing around. Be somebody.\"\n\n  You're staggered at this. Your mouth hangs open as Max takes ${mhis} leave.\n\n  *set luck %-10\n  *set control %-10\n  *goto eveningofthedead\n\n*comment *****************************************************************\n*label killmax\n\nYou clamp your fingers on the humerus and pull a skeleton out from cover. Max watches it with no trace of fear. \"It's very cool,\" ${mhe} says. \"How does it…\"\n\nThe skeleton's hand flashes out and grabs Max around the throat. You direct it to drag ${mhim} over a nearby wall. $!{mhis} legs thrash, feet skittering across the top of the wall as the murderous bag of bones chokes the life out of ${mhim}. Finally, they relax and lie still. The skeleton returns to you with an amiable stride and a small shrub wedged into its ribcage.\n\n*page_break\n\nYou're ready for home when you hear movement. You spin, hand going to the bone, ready to defend yourself.\n\nA face is staring at you from behind the wall. A face that, until recently, was cool and assessing, very sure of itself, talking about film and art. Now the face is pale and one eye sags in its socket.\n\nYou have a new zombie. One in red Converse boots and an expensive leather jacket. You suppose you had better try to forget its original name.\n\n*set luck %+5\n*set control %+5\n*set max 67\n*set zombies +1\n*set minion_count +1\n*set bodycount +1\n*set corruption +3\n*if (baddate = false)\n  *achieve baddate\n  *set baddate true\n*comment endif\n*if (raised = false)\n  *achieve raise\n*comment endif\n*set raised true\n*goto eveningofthedead\n\n*comment *****************************************************************\n*label eveningofthedead\n\nYou feel dead on your feet as you open the house door. The irony of this does not escape you. The skeleton behind you has to take off its sombrero to fit through the door.\n\nYou're three steps inside when the banshee rears up before you, a picture of chaotic emerald and twisted red hair.\n\n*page_break\n\n*if (decimate)\n  She presses her face close to yours. \"You arrogant…self-centred…entitled…crass, little…\" Her breath stinks of dead cats and food refuse. \"These skeletons have put aside their eternal rest to work for you. For nothing! And this is how you repay them? They have one religious holiday a year. You can't even let them have that. And to show them who's boss, you…you…\" She shudders with fury. Then she slaps you across the face. You feel her nails rake your flesh.\n\n  \"I'm done with you. Mercy on your soul.\"\n\n  An uncanny green vortex shimmers from the floor and swirls around the banshee's feet. Fibres of her slip break off and join the weird whirlpool until abruptly, her body plunges in and the vortex dissolves with a wet pop. An eerie howl seems to echo around the room, taking ten or fifteen seconds to fade.\n\n  *if (vampire)\n    $!{vampname} looks through from the sofa, where he's watching an episode of \"Downton Abbey\" with the curtains drawn. He pulls a face.\n  *comment endif\n\n  You guess you're making your own dinner.\n  \n  *set banshee false\n  *finish Next Day\n*else\n  She presses her face close to yours. \"These skeletons have put aside their eternal rest to work for you. For nothing! And this is how you repay them? They have one religious holiday a year. You can't even let them relax!\"\n\n  By this point, you are accomplished at handling the banshee. You let her rant until she runs out of steam.\n\n  *if (vampire)\n    $!{vampname} looks through from the sofa, where he's watching an episode of \"Downton \"Abbey\" with the curtains drawn. He declines to get involved.\n  *comment endif\n\n  In time she gives you a final, baleful look, and slinks off into the kitchen.\n  *set luck %+5\n  *finish Next Day\n", "decap": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, decap\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\nThe TV screen is the only illumination, its flickering images painting the room. A long, slow yawn escapes you. You meant to go to bed an hour ago but then\n*rand bomb 1 7\n*if (bomb = 1)\n  a show came on with minor celebrities playing [i]Jenga[/i] on a set so large that the inevitable collapse could put them in hospital. The spectacle was strangely compelling.\n  *goto aftershow\n*elseif (bomb = 2)\n  you flicked over to a low-budget film about a psychic otter which used its powers to cause strange accidents to humans. There was an impenetrable subplot about its failure to build a proper dam. Frankly, something about this otter disturbed you and you had to find out what happened.\n  *goto aftershow\n*elseif (bomb = 3)\n  a cookery show came on, dedicated to making your own ice cream. Every time you reached to turn it off, they would come up with a strange, new flavour like Avocado and Cashew or Spiced Pomegranate and you would give it five more minutes.\n  *goto aftershow\n*elseif (bomb = 4)\n  you came across a bizarre late-night show where viewers phone in to play 80s video games for cash prizes. \"Left!\" shouted the nasal caller who got Pac-Man. \"Up! Left! Down! Up! Go for the cherry!\" Donkey Kong was next, followed by Asteroids. \"Thrust! Fire! Fire! Fire! Fire! Hyperspace!\"\n  *goto aftershow\n*elseif (bomb = 5)\n  you saw a new reality TV show where they reunite minor league bands from the 90s and get them to perform a series of gruelling mental and physical challenges on lonely moorland. One of the team is a mole.\n  *goto aftershow\n*elseif (bomb = 6)\n  you caught the start of a documentary about human body language with a retired KGB interrogator. His accent was difficult to understand but at one point you thought he said you must \"be careful not to remove the eyebrow\" or you will lose valuable information. You didn't immediately feel like turning in after that.\n  *goto aftershow\n*else\n  the BBC started showing a season of classic \"Doctor Who\"—only the stories which still had episodes missing. A man with a strange, lopsided beard is doing the fill-in narration. He has a hacking cough.\n  *goto aftershow\n\n*label aftershow\n\n*if (early_warning = \"sentinel\")\n  A jolt from the humerus makes you sit up. The minion you stationed in the bushes outside has seen something.\n\n  *goto assault\n*elseif (early_warning = \"tripwire\")\n  K-TSCH-K-TSCH! From your front drive comes the telltale sound of shattering cola bottles. Something has triggered your early warning tripwire.\n\n  *goto assault\n*elseif (early_warning = \"crunch\")\n  CRRRRRK. CRRRRRK. Somebody is walking on your concealed patch of early warning gravel. Nobody has approached the house in days, apart from one guy from out of town who wanted you to switch your gas and electricity provider.\n  *goto assault\n*else\n  You yawn again. Time to turn off the TV. You reach for the remote.\n  *page_break\n  *goto assault2\n\n*comment *****************************************************************\n*label assault\n\nYou glance between the curtains without moving them. Two black-clad figures with assault rifles are crouched behind your garden wall. Ever since you found those surveillance photographs deep inside The Base, you've known they would come for you at home. This is that moment, but you are ready.\n\n*set squad -1\n*page_break\n\n*comment *****************************************************************\n*label assault2\n\nThe TV turns itself off.\n\nThis confuses you for several seconds until you realise all the lights in other rooms are dead and you can't hear the hum of the fridge. Power is out to the entire house. You hear heavy boots rushing down your front path.\n\n*if (animal_help = false)\n  *goto assault3\n\nThe animals are out there, however, the dead ones with open eyes. You can feel them flitting through the flowerbeds, skulking through the shadows, staring down from the roof. The humerus crackles in your hand.\n\n*choice\n  #Reach out to the dogs.\n    Unearthly howls pipe up from your neighbours' gardens, howls which chill you to your heart. You hear scrabbling feet, wet snarls, and the thud of a body hitting the ground.\n\n    Two soft coughs follow—was that silenced gunfire?—and now it is a man who howls.\n\n    *set energy %-10\n    *set luck %+5\n    *set squad -1\n    *goto assault3\n\n  #Reach out to the cats.\n    You gasp as you feel a surge of feline energy, cats moving in a sleek, dark pack. A tiny tornado of clawed, hissing mayhem passes outside the window. Gruff voices shout \"Aayah!\" and \"Yow!\"\n\n    *set energy %-10\n    *set max_energy %+5\n    *set squad -1\n    *goto assault3\n\n  #Reach out to the birds.\n    Your eyes burn as you plunge through the air with twenty or thirty dead birds, strange wide-angle images battering your brain. They swoop at masked eyes, rake talons at scalps covered in black hoods, fluttering and blinding. The tactical information is overwhelming.\n\n    *set energy %-10\n    *set control %+5\n    *set squad -1\n    *goto assault3\n\n  #Reach out to all of them.\n    You open your mind to the creatures from the little, shrouded cemetery. Immediately you are overwhelmed with feral sensation: leaping over the fence, clawing at ankles, plunging towards a masked face. It's addictive and overwhelming. You stumble back and drop into your chair.\n\n    *set control %+10\n    *set energy %-20\n    *set squad -1\n    *goto assault3\n    \n  #Ignore the animals.\n    *goto assault3\n\n*comment *****************************************************************\n*label assault3\n\nWood splinters as the front door crashes in. The window beside you shatters, fragments of glass showering the sill. A gloved hand pulls the curtain aside and throws something short and cylindrical into the room.\n\n*choice\n  #Dive to grab the object.\n    You turn to spring and something thumps. You stagger, a white image of the table searing your retina for an instant. The room turns chair on top shelf up feet whine ear grab for \n\n    which way\n\n    got to get left \n\n    not there they\n\n    why\n\n    going to\n\n    *set blind true\n    *achieve flashbang\n    *page_break\n    *goto assault4\n\n  #Roll behind the sofa.\n    You throw yourself over the padded back of the sofa. There is a reflected flash, a dull thump, and the sofa rams you up against the wall. A persistent whine blocks out every other sound.\n\n    You shove the sofa back and peer out.\n\n    *set advantage true\n    *goto assault4\n\n  #Drop and close your eyes.\n    You flatten yourself on the floor, hands over your head. Something thumps and a hot wind scrapes your skin. The room is wrong. A persistent whine blocks out every other sound.\n\n    *goto assault4\n\n*comment *****************************************************************\n*label assault4\n\n*if (vampire = false)\n  *goto assault5\n\n*elseif (blind)\n  Something hurtles through the air beside you, something fast. You feel the floor shudder. Your head knocks against metal. The radiator? Which way is up?\n\n  *set squad -1\n  *page_break\n  *goto assault5\n\n*else\n  A hefty, hooded figure leaps through the shattered window. Moonlight picks out his hazy silhouette as he advances through the room with slow, deliberate steps. That looks like an armoured vest, an automatic weapon. Some kind of goggles? His head turns and he scans the room. As he sees you, his weapon comes up—\n\n  Something soars through the air between you, a poised, ballistic shadow. It falls upon the intruder, pressing him to the floor, shrouding him in blackness. He barely has time to gasp before it plunges, ripping fabric from his neck, tearing the goggles from his face. It drinks.\n\n  It's $!{vampname}. He glances at you as the curtain swings, his pale face briefly revealed, his mouth brimming with blood. \"Move,\" he hisses. \"I'll cover you.\"\n\n  Mist spills across the carpet and flows to the door.\n\n  *set luck %+5\n  *set squad -1\n  *page_break\n  *goto assault5\n\n*comment *****************************************************************\n*label assault5\n\nYou stagger towards the hall. A cold breeze presses your face. You can sense somebody ahead, two people, moving, fluid and controlled. You hold the doorframe to steady yourself.\n*if (blind)\n  Your murky vision begins to clear, slipping in and out of focus.\n*comment endif\n\n*if (banshee = false)\n  *goto assault6\n\nThe wood reverberates with a sudden, devastating shriek that you feel through the palms of your hands. The hall blazes with light and you see the banshee at the top of the stairs, looking like an incensed boarding school teacher awakened in the middle of the night. Her demented, jagged hair trails behind her as she falls upon the invaders.\n\nHer cry knocks you back against the wall, and you get one frozen glimpse of her attack. She thrusts spidery fingers directly into—and through—the men's heads. Blood droplets strobe through the air. Her head snaps round to look at you and you feel the touch of ice inside you at the fury etched on that ancient face.\n\n*if (squad = 1)\n  For a terrible moment you think she will turn on you, then her features relax. All your attackers have been incapacitated.\n\n  \"What a shower of big jessies,\" she grins.\n\n  *set squad 0\n  *set luck %+15\n  *set control %+15\n  *page_break\n  *goto victory\n\n*set squad -1\n*page_break\n\n\"There's another one out there!\" she snaps. \"Move!\"\n\nSure enough, there's another man advancing through the kitchen, coming fast through the gloom. Your hand grips the humerus.\n\n*choice\n  *if (zombies > 0) #Hit him with a zombie.\n    It lunges from the hall cupboard, with festering flesh and the breath of the grave.\n\n    *goto easy_check\n\n  *if (skeletons > 0) #Hit him with a skeleton.\n    The bony freak leaps and pushes off a wall to drop on him sideways.\n\n    *goto easy_check\n\n  #Just pile anything you have on top of him.\n    *if (minion_count > 2)\n      The man swings his gun, trying to pick a target. He goes down under the weight of the dead. They stamp on his head with unnecessary glee.\n\n      *set squad -1\n      *goto assault6\n\n    *else\n      The man ducks and swings, evading the awkward movements of his assailant. He has clearly trained for undead assault.\n\n      *goto assault6\n\n  #Pull back through the wrecked house.\n    You retreat from this armed intruder with quiet, careful steps. Behind you, the banshee fades back into the gloom, hissing.\n\n    *goto assault6\n\n\n*comment *****************************************************************\n*label easy_check\n\n*if ((luck > 30) and (control > 30))\n  The soldier isn't expecting an attack from his flank. He goes down hard.\n\n  *set squad -1\n  *goto assault6\n*else\n  He pushes it off with a trained movement. You take the opportunity to duck out of view.\n  \n  *goto assault6\n\n*comment *****************************************************************\n*label assault6\n\n*if (squad = 0)\n  You freeze and listen to the sounds of the ravaged house.\n\n  Water gurgles through a pipe somewhere upstairs. A radiator clicks, cooling in the night air.\n\n  Nothing else. Your attackers are either dead or in retreat.\n\n  *set control %+10\n  *set max_energy %+5\n  *set energy %+5\n  *page_break\n  *goto victory\n*comment endif\n\nThe remaining attackers close in. The red dots of laser sights track along the wall. From the footsteps, you think there are two of them left. Of course there might be a sniper in the upstairs window across the road. That's how you would do it if you had a…er, an undead sniper.\n\n*choice\n  #Sprint up the stairs and try to use the height to your advantage.\n    Right at the top of the stair, there is a low bookcase. It's heavy enough to make a good missile. You scurry up and tug at the thing. It shifts very slowly. Out of the corner of your eye, you see an intruder pace along the lower landing, checking the corners. Any moment now, he will look up.\n\n    *if (energy > 40)\n      As he pivots at the bottom of the stairs, you heave the bookcase. It tumbles and slides, crashing into the attacker's calves with the full force of your mother's collection of P.D. James and Ruth Rendell crime novels. It might be the frame of the bookcase you hear snap. Or it might be his bones. Either way, a minion pounces on his head and the question becomes irrelevant. \n\n      *set squad -1\n      *page_break\n      *goto assault7\n    *else\n      You tug at the bookcase. It takes a little too long to shift. The attacker turns and raises his gun. You roll out of his line of sight. A burst of gunfire chews holes in the wallpaper.\n\n      *set luck %-10\n      *page_break\n      *goto assault7\n  #Let off your fire extinguisher.\n    It's about five years past the date at which it ought to have been checked. But you have looked at this thing all your childhood and pondered the instructions about pulling out the pin and directing the nozzle at the base of the fire. You're not going to miss an opportunity to actually use it.\n\n    *if (control > 54)\n      You pop the tab and press yourself against the wall, trying not to breathe as the heavy boots pad across the floor to where you're concealed. You watch the shadow on the carpet. At what you hope is just the right moment, you swing out of cover and blast carbon dioxide into the attacker's face.\n\n      The white spray covers his goggles in one extended burst. He reels back, blind and groping. As he pulls the goggles off, you slam him in the face with the base of the extinguisher. Undead teeth finish the job.\n\n      *set squad -1\n      *page_break\n      *goto assault7\n    *else\n      You pop the tab and press yourself against the wall, trying not to breathe as the heavy boots pad across the floor to where you're concealed. You watch the shadow on the carpet. At what you hope is just the right moment, you swing out of cover and blast carbon dioxide into the attacker's face.\n\n      He's too fast for you. As you let off the extinguisher, he ducks and swivels, coming at you from a low stance. You chuck the heavy cylinder at him. It buys you enough time to scramble up the stairs, coughing with the backspill from the spray.\n\n      *set max_energy %-10\n      *set energy %-10\n      *page_break\n      *goto assault7\n  #Scatter debris across the floor.\n    The attackers are wearing some kind of image-intensifying goggles. But they probably can't see as clearly as they would like. You overturn chairs, clothes dryers, ironing board. Assorted junk belonging to your late father fills in the gaps.\n    *if (vampire)\n      $!{vampname}'s mist swirls across the dangerous terrain you've created.\n    *comment endif\n\n    *if (luck > 53)\n      It's a simple but effective ruse. The lead man stumbles on the shoeshine box and crashes down into the debris. His gear tangles with the vacuum cleaner and he is easy prey for a lumbering minion.\n      *set squad -1\n      *page_break\n      *goto assault7\n    *else\n      So much for that plan. The lead man glides across the debris like a dancer. You flee up the stairs, keeping low. \n      *page_break\n      *goto assault7\n\n*comment *****************************************************************\n*label assault7\n\n*if (squad = 0)\n  You're running out of options. Perhaps you can come at them from inside a cupboard. Or you could slip out a back window and drop down to the garden. Maybe you could block a door with the undead, or…\n\n  It takes a good fifteen seconds to realise that the house is silent. You glance over the banister. No more advancing soldiers. You and the horde have dealt with every single one of them.\n\n  *page_break\n  *goto victory\n*elseif ((advantage = false) or (minion_count \u003c 3))\n  You're running out of options. Perhaps you can come at them from inside a cupboard. Or you could slip out a back window and drop down to the garden. Maybe you could block a—\n\n  Glass breaks behind you. You turn. Something dark and solid smashes into the side of your head. Your legs fold beneath you and you slip away.\n\n  *goto failure\n*else\n  You're running out of options. Perhaps you can come at them from inside a cupboard. Or you could slip out a back window and drop down to the garden. Maybe you could block a door with the undead, or…\n\n  No. Back to basics. You crouch under a desk, rolling the humerus between your fingers. Bring your minions together, overpower the intruders. It's that simple. You clear your mind and concentrate.\n\n  The intruder—the last one?—takes the stairs at a run. You visualise the top landing in precise detail: every step, the banister, nearby doorways. You swarm the undead.\n\n  There is a gasp; rhythmic thuds. Gunfire rips through the room you're in and chews up one of your mother's favourite cushions. A blade scrapes a sheath. The man snorts with rage. You feel a minion drop, then another. Finally, there comes a wet gurgle and the slow moan of death. You chance a look around the door. The landing wallpaper is covered in blood spatter. But your troops paid a heavy price.\n  *if (zombies > 2)\n    *set zombies -2\n    *set minion_count -2\n    *page_break\n    *goto victory\n  *elseif ((zombies > 0) and (skeletons > 0))\n    *set skeletons -1\n    *set zombies -1\n    *set minion_count -2\n    *page_break\n    *goto victory\n  *else\n    *set skeletons -2\n    *set minion_count -2\n    *page_break\n    *goto victory   \n\n*comment *****************************************************************\n*label failure\n\nYou flutter back towards consciousness. You're floating—no, someone is carrying you. The air is cold.\n\n\"$!{he}'s waking up.\"\n\n\"Too early. Dose ${him},\"\n\nA tiny spray hisses beneath your nose. You return to black, pulsating dreams.\n\n*page_break\n*goto_scene fail\n\n\n*comment *****************************************************************\n*label victory\n\nYou step out and survey the situation. The house is utterly wrecked. The three-pronged assault of the military, the undead and your own improvisation have left most of your belongings smashed on the floor. You count one, two, three, four soldiers, lying broken on the ground. Blood seeps from their armour and helmets and slowly soaks into your carpet.\n\nCould you fix all this with a large hole in the back garden and a call to industrial cleaners from out of town?\n\nGuess not. \n\nYou board up enough windows to stop the wind howling through the room. You check the dead soldiers. No ID. Some pretty serious hardware, but could you learn to use it well in time? Against soldiers who have trained for years?\n\nFinally, the anger comes. They entered your house to take you or kill you. Your comfortable existence in this husk of a town is coming to an end. It's time to take charge. Or split.\n\n*set bodycount +4\n*set stagetwo 5\n*achieve decap\n*page_break Next Day\n*goto_scene stagetwo\n\n", "end_trial": "*check_purchase adfree\n*if (choice_purchased_adfree or not(choice_purchase_supported)) or (stageone \u003c 2)\n  *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase_discount adfree 2024-08-01 $4.99 $2.99 purchased\n*abort\n*label purchased\n*return", "ending": "*page_break\nWe hope you've enjoyed playing [i]Neighbourhood Necromancer.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "exile": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, exile\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*if (reached_climax)\n  It takes a few minutes until it really sinks in. You're outside the fence. You're not being followed. You're free—well, free in the sense that you will probably be a hunted fugitive for the rest of your life. All you have in the world are your clothes—they need a wash—and one weird, glowing humerus. You may not be able to afford food or accommodation, but at least you have a night light that doesn't need to be recharged. \n\n  You begin to walk. \n\n  *page_break\n  *goto animal\n*else\n  You can fit everything you need in one case—a battered thing with squeaky wheels. It still has two stickers from your last family holiday: one, chosen by your father, that says I (HEART) SPAIN, with a picture of a bull standing on the Spanish flag. The second sticker is a laughing skull, which you stuck onto the side because you thought your father's sticker was naff.\n\n  You take the family car as far through the suburbs as you dare. Your activities are bound to have attracted attention, and maybe the law already has its registration number. You leave it in the car park of a twenty-four hour supermarket and start walking.\n\n  *page_break\n  *goto animal\n\n*comment *****************************************************************\n*label animal\n\nYou thread your way out through the last of the suburbs and hit the open road. A cool breeze makes the pace easier; trees along the roadside screen you from helicopters or spy satellites. Are you being paranoid? Perhaps. But then what would you expect from a necromancer without minions. An ex-necromancer.\n\nIt's peaceful, really, having nothing speaking to your mind. No whispering corpses with eternal, deathless needs. There's just you. And yet, as you cross another hilltop and get a little further from $!{town}, you feel a terrible loneliness high in your chest.\n\nSomething stops you—a sound out of place. Something is moving in the undergrowth. And it's getting closer to your feet.\n\n*choice\n  #Call out.\n    You take a couple of steps back from the edge of the road and call in a non-threatening tone. The rustling stops. Then you see the grass moving, almost within reach.\n    *set luck %+5\n    *goto animal2\n\n  #Grab a branch to fight it.\n    There are a couple of dead trees nearby. You snap off a hefty branch and prod at the grassy bank, shifting tufts out of the way while keeping your distance. There is a momentary silence. Then the grass moves, almost under your feet.\n\n    *set control %+5\n    *goto animal2\n\n  #Sprint away from it.\n    You've spent a little too long recently avoiding natural and supernatural threats. Nevertheless, you manage a short spurt down the road, keeping your feet well away from the grass.\n\n    When you pause for a breather, it's still there, just out of reach. The grass rustles.\n\n    *set max_energy %+5\n    *set energy %+5\n    *goto animal2\n\n*comment *****************************************************************\n*label animal2\n\n*if (reached_climax)\n  A white shape flies through the air in a long arc and disappears back into cover. You blink. It seemed almost weightless. It comes again, two hops this time, hurtling through the air so fast your eyes can barely follow it. Then it makes one further, impulsive movement, and lands on the road.\n\n  You crouch down and examine the delicate, white shape. It's a tiny skeleton. The rear legs seem oversized, back feet more than twice the size of the front. Its wide, flat head turns in abrupt jolts. It stares at you through massive empty eyesockets and waits patiently.\n\n  It leaps again, startling you, and disappears from view. You wait for it to show itself again but everything remains still. You're ten minutes further down the road before you find it in your jacket pocket.\n\n  You are now transporting a skeletal frog.\n  \n  *set companion \"frog\"\n  *achieve frog\n  *page_break\n  *goto animal3\n\n*elseif ((control > luck) and (control > max_energy))\n  A face pokes out from behind a branch, two little eyes which catch the light. And…whiskers. There is a cat in the grass. It tilts its head to one side and sizes you up. Then it strolls from the grass like it's arriving at a cocktail party.\n\n  You crouch down and examine the cat. What looks at first like a dense tortoiseshell pattern is in fact a light tortoiseshell coat featuring several open wounds. You see discoloured, putrefying flesh inside. \n\n  The cat meows. You recognise the body language. It wants food.\n\n  You take a few experimental steps. The cat appears disinterested. But when you look back, it has followed you. It stops for a moment and scratches behind its ear. Little strips of flesh shred off.\n\n  You have been adopted by a zombie cat.\n\n  *set companion \"cat\"\n  *achieve cat\n  *page_break\n  *goto animal3\n\n*elseif ((max_energy > luck) and (max_energy > control))\n  A hairy, brown thing with huge floppy ears bounds from the grass and jumps up at your stomach. You almost land a karate chop to its head before you realise it is licking your hands. It's a dog! Some kind of spaniel…but something is wrong. You look more closely.\n\n  Your first thought is that the dog has been in a fight. But it's worse than that. Under strips of hair, its flesh is visible and turning green. As it bounces around, you glimpse internal organs through a split in its belly. This is no ordinary dog. It's dead, and it doesn't understand that. It also looks ready to follow you anywhere you go.\n\n  Yes, you have been adopted by a zombie dog.\n\n  *set companion \"dog\"\n  *achieve dog\n  *page_break\n  *goto animal3\n\n*else\n  A tiny, brown head pokes up from the grass, then drops out of sight. You barely have time to blink before a second head pokes up from another location. Or, wait, was that the same one?\n\n  You step back in alarm as something furry, about the size of a hot dog, streaks from the grass and thumps your shoe. It disappears back into the grass.\n\n  A few moments pass. You're not sure how to react to this. It breaks cover again, dashing in a tight circle around your other foot, dunting it with its head before blazing back into the grass. The creature seems harmless.\n\n  The head pops up again. With a slow, easy movement, you crouch to get a better look at it. One entire ear is missing, the furry brown head torn open to expose a fusty chunk of brain.\n\n  It tears between your legs again, its body weaving as it runs in a circle and bumps your toes. Despite its manic energy, its status seems clear. You have befriended a zombie weasel.\n\n  It continues to prod you as you walk farther down the road. In time, it tries to go to sleep on your foot. You gather it up in your palms and drop it into a pocket. Its head sticks out, watching the landscape go past.\n\n  *set companion \"weasel\"\n  *achieve weasel\n  *page_break\n  *goto animal3\n\n*comment *****************************************************************\n*label animal3\n\nOne more hill, and your stomach is beginning to rumble when you reach the outskirts of the next town. A van drives past but you think it unwise to try hitchhiking with your new—and frankly, rather fragrant—animal associate.\n\nIn the suburbs, you see people gardening and washing cars. Two kids race past on bikes, yelling at one another. You blink. The scene seems…unreal. Like some picture of small town bliss prepared by property developers.\n\n*if (companion = \"dog\")\n  A woman with large headphones and a massive German Shepherd dog struts past, lost in her music. The dog sniffs at your zombie spaniel and its ears flick back in alarm. It whines and skitters after its owner.\n  *goto how\n*elseif (companion = \"cat\")\n  Your cat leaps onto a nearby fence and prowls along the edge. At the end, it pauses and stares at birds on a nearby roof.\n  *goto how\n*elseif (companion = \"weasel\")\n  An impatient wriggling in your pocket suggests the weasel requires entertainment.\n  *goto how\n*elseif (companion = \"frog\")\n  The frog pokes its head out of your pocket and stares. Can it actually perceive things without eyes of flesh?\n  *goto how\n*comment endif\n\n*label how\n\nHow will you fit into this world?\n\n*choice\n  #Make for the graveyard and summon more minions.\n    Weariness has settled into your very bones as you walk up the steps to the church. It's a spired structure of mossy stone, and the graves behind it date back to the eighteenth century.\n\n    *if (companion = \"dog\")\n      Your zombie hound howls as he crosses the threshold.\n      *goto low\n    *elseif (companion = \"weasel\")\n      As you pass through the gates, you hear a short squeak from your pocket. The weasel stares up at you with inscrutable eyes.\n      *goto low\n    *comment endif\n\n    *label low\n    You find a low wall on the west side. \n    *if (companion = \"cat\")\n      Nearby, the cat rubs its back against a crumbling gravestone.\n      *goto sink\n    *elseif (companion = \"frog\")\n      The frog leaps from your pocket. It makes a series of hops to the end of the wall. It stares at the church for a while, then hops back.\n      *goto sink\n    *comment endif\n\n    *label sink\n    The sun sinks behind you.\n    \n    You're hungry now. Dirty, too. And you have nowhere to sleep. But soon, you'll have the power to take what you want. The people here don't know to fear you. But they will. You toss the humerus from hand to hand and stare one more time at the eerie liquid within.\n\n    Then you close your eyes and reach down into the earth.\n\n    *set corruption +8\n    *goto exit\n\n  #Set yourself up as a psychic.\n    It takes a week or two to get started. You raid the bins behind a fabric store to assemble a suitably mystical outfit. Your early gigs have to be impromptu: table to table in the pubs, house calls to customers who saw your card in the post office, and, strangely enough, a lucrative spot at the church fayre. You take a little room above the hairdressers and buy a pack of tarot cards. \n\n    *if (companion = \"dog\")\n      The occasional client seems reluctant to pay. They change their mind quickly when your Hound Of Doom fixes them with the beady eye.\n      *goto not_hard\n    *elseif (companion = \"cat\")\n      A zombie cat turns out to make an excellent familiar.\n      *goto not_hard\n    *elseif (companion = \"weasel\")\n      Over time, you train the weasel to knock over objects on cue. The resultant \"manifestations\" prove quite convincing.\n      *goto not_hard\n    *elseif (companion = \"frog\")\n      The frog enjoys posing frozen on a shelf, then making quick, subtle movements to unsettle your customers.\n      *goto not_hard\n    *comment endif\n\n    *label not_hard\n    It's not hard work. You learn all the general techniques and for the climax, you touch the humerus and reach out to actual dead people. You glean just enough information to be convincing. You could settle here, for a while at least.\n\n    It would be a life.\n\n    *set corruption +4\n    *set humanity +4\n    *goto exit\n\n  #Try to find honest work.\n    Getting a job is tricky with no references, no address, and no facilities for personal hygiene. But the town baker seems a kind-hearted soul and the second time he catches you eating from his stale leftovers, he gives you a chance. Twelve hours later, you're showered, rested, and wearing a floury apron as you watch him prepare loaves for the oven.\n\n    It's strange but the job is satisfying. You start from basic ingredients, you knead and bake, and at the end of your shift, you sell the result. The late hours suit you and\n    *if (companion = \"dog\")\n      you get to slip the occasional morsel to your doggy friend out back.\n      *goto fake_name\n    *elseif (companion = \"cat\")\n      the cat prowls nearby rooftops, inducing nightmares with its eerie howl.\n      *goto fake_name\n    *elseif (companion = \"weasel\")\n      sometimes you smuggle the weasel in so it can stay warm. After one regrettable incident with a custard tart, it learns to stay in your pocket.\n      *goto fake_name\n    *elseif (companion = \"frog\")\n      the frog likes to hop from tray to tray when the baker isn't looking.\n      *goto fake_name\n    *comment endif\n\n    *label fake_name\n    You take a small room under a fake name and you always pay rent on time.\n\n    Every day, on your way home, you look up through the morning light at the graveyard and its ancient stones. It might be your imagination, but at these times you feel the humerus shift position inside your jacket.\n\n    Perhaps one day you'll go up there.\n\n    Not today.\n\n    *set humanity +8\n    *goto exit\n\n  #Rest, eat, and move on.\n    It's not too hard to find food, if you're not too proud to eat the date-expired products the supermarket throws out. You sleep in different places: under a bridge, in a shed, and once, when you found an open window, among the soft play equipment in the community centre.\n\n    *if (companion = \"dog\")\n      Walking your dog gives you a reason to roam the town, even if his pungent aura stops you making friends. You look at the other people in the street. They seem complacent and trivial.\n      *goto law\n    *elseif (companion = \"cat\")\n      The cat brings you strange, random objects. They range from packets of cigars to tubs of instant noodles. Occasionally, you luck into a tube of toothpaste or a doll with half its face missing. At these times, the cat stares at you as if trying to remember something. You scratch it behind the ears. Not too hard.\n      *goto law\n    *elseif (companion = \"weasel\")\n      Sometimes you let your weasel chase unaccompanied children. They pass through three distinct phases: alarm at the speedy little shape, amused delight as they realise it's a weasel, and then shrieking terror as they see its rotting insides. It's fun.\n      *goto law\n    *elseif (companion = \"frog\")\n      Often the frog serves as a scout. It hops away in speedy arcs; by the third or fourth, it is always lost from view. When it returns, it never communicates information, simply stares. Occasionally it turns its head. You wonder if it is trying to gulp air using long-gone muscles and flesh.\n\n      Sometimes, when you talk to people, the frog leaps through their field of vision and immediately vanishes, just to make mischief.\n      *goto law\n    *comment endif\n\n    *label law\n    Over weeks, the law takes an interest in your behaviour. One cop in particular, a young one with cold, blue eyes, stops by every day to ask you insulting questions. When the anger makes you reach for the humerus, you know it's time to move on.\n\n    A gentle rain is falling as you walk out of town. In the fields, tractors are turning the soil. The musty, earthy smell makes your heart beat faster.\n\n    *set humanity +6\n    *set corruption +2\n    *goto exit\n    \n\n*comment *****************************************************************\n*label exit\n*page_break End\n\n[b]THE END[/b]\n\nYour final statistics were: undead control ${control}%, energy rating ${max_energy}% and luck ${luck}%. You reached a visibility level of ${visibility}.\n\n${bodycount} people died during the story.\n\nYour final humanity score was: ${humanity}%.\n\nYour final corruption score was: ${corruption}%.\n\n*if (sam = 1)\n  You met Sam.\n  *goto max\n*elseif (sam = 2)\n  You felt a mutual attraction with Sam, but it never really went anywhere.\n  *goto max\n*elseif (sam = 3)\n  You and Sam had a flirty relationship.\n  *goto max\n*elseif (sam = 4)\n  You and Sam had a solid relationship.\n  *goto max\n*elseif ((sam >= 5) and (sam \u003c 66))\n  You and Sam had a smoking hot relationship.\n  *goto max\n*elseif (sam > 65)\n  Sam died.\n  *goto max\n*comment endif\n\n*label max\n*if (max = 1)\n  You met Max.\n  *goto endgame\n*elseif (max = 2)\n  You felt a mutual attraction with Max, but it never really went anywhere.\n  *goto endgame\n*elseif (max = 3)\n  You and Max had a flirty relationship.\n  *goto endgame\n*elseif (max = 4)\n  You and Max had a pleasantly chilling relationship.\n  *goto endgame\n*elseif ((max >= 5) and (max \u003c 66))\n  You and Max had a dark, intense relationship.\n  *goto endgame\n*elseif (max > 65)\n  Max died.\n  *goto endgame\n*comment endif\n\n*label endgame\n\n*goto_scene ending\n", "fail": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, fail\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\nThe cell is windowless. Its walls are heavy blocks painted a miserable off-white. The bed is hard and fixed to the floor. The lights keep you on edge. Two cameras watch from the ceiling, out of reach.\n\nA thin panel in the door slides open. The eyes which peer in are clear and passionless.\n\n\"You've caused a lot of trouble,\" the viewer says. \"But in a way, we should thank you. You took our experiment out of the laboratory. The data we gathered was immensely valuable.\"\n\nYou feel for the humerus. Of course, it's gone.\n\n\"We expect there were physiological changes in your brain as a result of the process. We'll take a look, of course. But before we risk damaging you, we have questions. Quite a lot of questions.\"\n\nThe panel slams shut.\n\nYou try to imagine the humerus in your hand, to reconstruct the mental channel that linked you to the dead. You close your eyes and concentrate.\n\nAll it would take is one or two of them.\n\n*set luck %-50\n*page_break\n\nYour necromantic career is over. A battery of psychological tests await.\n\n*if (early_doom)\n   (You might want to try again; you missed the vast majority of the game.)\n*comment endif\n\n*comment *****************************************************************\n*label exit\n\n[b]THE END[/b]\n\nYour final statistics were: undead control ${control}%, energy rating ${max_energy}% and luck ${luck}%. You reached a visibility level of ${visibility}.\n\n${bodycount} people died during the story.\n\nYour final humanity score was: ${humanity}%.\n\nYour final corruption score was: ${corruption}%.\n\n*if (sam = 1)\n  You met Sam.\n  *goto max\n*elseif (sam = 2)\n  You felt a mutual attraction with Sam, but it never really went anywhere.\n  *goto max\n*elseif (sam = 3)\n  You and Sam had a flirty relationship.\n  *goto max\n*elseif (sam = 4)\n  You and Sam had a solid relationship.\n  *goto max\n*elseif ((sam >= 5) and (sam \u003c 66))\n  You and Sam had a smoking hot relationship.\n  *goto max\n*elseif (sam > 65)\n  Sam died.\n  *goto max\n*comment endif\n\n*label max\n*if (max = 1)\n  You met Max.\n  *goto endgame\n*elseif (max = 2)\n  You felt a mutual attraction with Max, but it never really went anywhere.\n  *goto endgame\n*elseif (max = 3)\n  You and Max had a flirty relationship.\n  *goto endgame\n*elseif (max = 4)\n  You and Max had a pleasantly chilling relationship.\n  *goto endgame\n*elseif ((max >= 5) and (max \u003c 66))\n  You and Max had a dark, intense relationship.\n  *goto endgame\n*elseif (max > 65)\n  Max died.\n  *goto endgame\n*comment endif\n\n*label endgame\n\n*goto_scene ending\n", "graveyard": "*comment *****************************************************************\n*comment Neighbourhood Necromancer, graveyard\n*comment by Gavin Inglis -- www.gavininglis.com\n*comment *****************************************************************\n\n*set graveyard +1\n\n*if (graveyard = 1)\n  Alone, you weave your way out of town to the graveyard. It's a lonely, windy spot crammed between the ruins of the church and a potato field. The gates are patchy with rust. They open with a squeal which seems to touch all the frequencies painful to human hearing.\n\n  Near the front, the stones are old, grey; crooked like bad teeth. Moss chokes the inscriptions and many of them have been worn smooth by years of cold rain.\n\n  Further back are signs of more recent use. Some marble stones gleam among the granite, gold still visible on their inscriptions.\n\n  *page_break\n  *goto recruit\n*if (graveyard = 2)\n  Alone, you weave your way back out of town to the graveyard. A car roars past you as you draw close. The sound of its engine recedes until all you can hear is far-off bird cries. \n\n  Arriving at the squeaky gate, you see it's already open. And you hear a new sound, regular and rhythmic. First there is a dull thunk, then a light patter. It repeats: thunk, patter.\n\n  Someone is digging.\n\n  *page_break\n\n  You slip through the gate and advance through the graveyard, walking on the grass. You're careful to avoid the crunch of the gravel paths. About halfway back, a man comes into view: a grey, bent figure in a flat cap. He works the spade, shovelling loose earth into an open grave. Thunk, patter. \n\n  There is nothing furtive about his body language. You guess this is the groundskeeper or some kind of council caretaker. This will make it awkward to raise new minions—unless you're not worried about being noticed.\n\n  *choice\n    #Come back another time.\n      *label leave_groundskeeper\n      *gosub_scene end_trial\n      There are a lot of activities you can disguise. Drawing forth dead people from the very earth to become your eternal minions is not one of those activities. The graveyard will still be here tomorrow, and perhaps a little tidied up. Your necromantic extravaganza can wait until then.\n\n      *set luck %+10\n      *set control %-5\n      *page_break Next Day\n      *goto_scene stageone\n\n    #Talk to the groundskeeper.\n      *gosub_scene end_trial\n      You approach the groundskeeper and make some boring comment about the weather. \"Always cold here,\" he says. \"Cold and quiet's how we like it.\"\n\n      He seems to be filling in a recently excavated grave. He glances up and sees your interest. \n\n      *if (raised)\n        \"Body snatchers, we've got. Real Burke and Hare stuff. The department's in a right kerfuffle about it. Come here often, do you? Have you seen anything suspicious?\"\n\n        You try to hit a delicate balance between looking surprised at the news of body snatching and looking unperturbed at the groundskeeper's question. He studies you from under his cap.\n\n        It's too risky to do anything necromantic right now. You had better come back another time.\n\n        *set visibility +1\n        *set luck %+5\n        *page_break Next Day\n        *goto_scene stageone\n      *else \n        \"Covering the latest addition with this new turf. You best believe I hear about it when the grass gets patchy.\"\n\n        You chat about gardening and how members of the local council are largely overpaid, overfed, and uncommonly pleased with themselves. Well, the groundskeeper talks and you make small noises of agreement.\n\n        Eventually, he pats the turf down with a grunt of satisfaction, touches his cap, and heads for the gates. You watch him disappear down the road.\n\n        *set luck %+10\n        *page_break\n        *goto recruit\n    #Wait to see if he leaves.\n      *gosub_scene end_trial\n      You find a hidden spot behind a Victorian headstone which is sheltered from the worst of the weather. There, you draw your legs up and listen to the groundskeeper work. As his spade shifts the mound of earth, he sings a lonely lament.\n\n      *if (luck > 40)\n        After about half an hour, the rhythm of the spade ceases. You peer round the headstone. The groundskeeper shrugs a sack onto his back, braces the spade over his shoulder, and heads for the gate. Five minutes later, the graveyard is yours.\n\n        *set luck %+10\n        *page_break\n        *goto recruit\n      *else\n        After about half an hour, the rhythm of the spade ceases. You peer round the headstone. The groundskeeper glances around the cemetery. His movements seem a little too casual and you wonder if he is actually doing something nefarious. Then he lights a cigarette—no doubt against the rules.\n\n        You wait out his smoke break. He taps the stub into a little tin then moves to another grave. His spade begins all over again: thunk, patter. He is clearly here for the afternoon.\n\n        You could go ahead and raise some dead anyway but your face is chilled and you're losing feeling in your fingers. This can wait until tomorrow.\n\n        *set luck %-10\n        *page_break Next Day\n        *goto_scene stageone\n\n    #Go ahead and raise some dead anyway.\n      *gosub_scene end_trial\n      You stride around the paths of the graveyard, trying to find a good spot. The groundskeeper continues to work with his spade. You have a feeling that under that cap, his eyes are on you. Well, you'll give him something to look at.\n\n      The humerus is warm against your fingers. You settle your feet into the earth, close your eyes, and reach down into the ground for the unquiet dead.\n\n      *set groundskeeper true\n      *set zcommit 1\n      *set scommit 1\n      *if (control > 52)\n        *set zcommit +1\n      *comment endif\n      *if (luck > 52)\n        *set scommit +1\n      *comment endif\n      *page_break\n      *goto rise  \n*if (graveyard > 2)\n  Alone, you weave your way back out of town to the graveyard, yet again.\n  *if (raised = false)\n    You are getting distinctly bored of this place. It is no Highgate Cemetery or Père Lachaise. You swear this will be your last visit.\n\n    *page_break\n    *goto recruit\n  *else\n    You push through the cemetery gates. They open with their now-familiar shriek. Gravel crunches under your feet as you prowl the graveyard, trying to find a good spot. It seems harder this time. It occurs to you that the place has a finite capacity. You may have drawn from the ground all the minions that are available.\n\n    Weather-worn stones mark your route as you survey the older section, moving through to the newer section. A precious few rays of sunshine break through the clouds. The humerus seems to twitch against your hand. This seems like a good spot for…\n\n    The gate wails again. Someone is coming in behind you. You glance round to see a black jacket, a cap with a chequered band. It's a policeman. His car is parked across the entrance.\n\n    *set police_graveyard true\n    *choice\n      #Pretend you're an innocent visitor.\n        *gosub_scene end_trial\n        *label innocent_visitor\n        The policeman walks straight towards you. You recognise him now, an older man with a bit of a belly and a salt-and-pepper moustache. He did a talk on road safety at your school. PC…McMurdo. \n\n        \"Unusual to see young 'uns up at the cemetery,\" he says. \"A frequent visitor, are you?\"\n\n        *fake_choice\n          #Yes.\n          #No.\n          #Not really.\n          #Stay silent.\n\n        \"Mmm-hmm.\" He takes out his notebook and checks his watch. His movements are slow but his eyes are sharp. \"$!{name}, isn't it? I'm investigating certain…disturbances that have happened on this site. Disturbances of an illegal nature. Have you seen anybody acting suspiciously?\"\n\n        You haven't.\n\n        \"Mmm-hmm. And what's the reason for your visit today?\" He stares at you. \n\n        *choice\n          #Visiting the grave of an elderly relative.\n            \"Oh yes? What's the name? Where's the stone?\"\n\n            Your hesitation says enough. PC McMurdo narrows his eyes and writes in his notebook.\n\n            *label likely_story\n            \"A likely story. The only reason I'm not detaining you today,\" he says, \"is that I'm looking for a miscreant with a large spade and it's clear you are not in possession of such an item. But make no mistake…\" He taps his notebook. \"…if I see you here again, I'll be having a word with your parents. Now, hop it.\" He points a thumb at the cemetery gate.\n\n            You really do not want the local constable visiting your dead parents. You hop it as instructed.\n\n            *set visibility +7\n            *set luck %-15\n            *page_break Next Day\n            *goto_scene stageone\n          #Visiting the grave of a friend your age.\n            A name comes to your mind—Fiona, a girl from the year above you who got drunk in the playground one night, staggered onto the main road, and was knocked down and killed. You hardly knew her but he doesn't know that. You mention her name and try to get a little tearful about the incident.\n\n            PC McMurdo touches the brim of his cap. \"I remember the girl. Sad business. Hope you learned a lesson from that. Alcohol's not to be trifled with.\"\n\n            You have definitely seen this man purchase supermarket lager twenty-four cans at a time. Still, your answer seems to satisfy him and he closes his notebook with a snap.\n\n            *set visibility +2\n\n            *if (luck > 46)\n              He returns to his car and drives off. You have a few minutes of opportunity at least.\n              *set luck %+5\n              *goto recruit\n            *else\n              He returns to his car and drives a short distance down the road. You see he's keeping the graveyard under surveillance. Better give up on recruiting new minions for today.\n\n              You trudge in the direction of home, feeling the policeman's eyes on you.\n\n              *set luck %-5\n              *page_break Next Day\n              *goto_scene stageone\n \n          #Looking for inspiration for your poetry.\n            \"Poetry? Hrrmp! One of those 'goths' are you? Why don't you write about real things instead of lurking around the likes of here? Take William McGonagall.\" The constable gestures with his pen. \"He's not well-regarded. But he writes proper rhymes and he covered the issues of his day. Like the Tay Bridge disaster. You should look up some of that instead of moping around here. Go on, get off with you.\"\n\n            He ushers you from the graveyard and moves his car out of sight a little down the road. Clearly, he's intent on watching the graveyard. You had better look elsewhere for your minions now.\n\n            *set visibility +4\n            *set corruption +1\n            *set humanity +1\n            *page_break Next Day\n            *goto_scene stageone\n            \n          #Looking for peace and quiet.\n            \"Oh yes? Peace and quiet? You know who else looks for peace and quiet in cemeteries? Perverts and murderers.\"\n\n            He narrows his eyes and takes a long look at you.\n\n            *goto likely_story\n      #Run for it.\n        *gosub_scene end_trial\n        The graveyard has an old stone wall. You brace on a low section and catapult yourself over into the field beyond.\n\n        \"Hoi!\" The policeman shouts behind you and you hear running feet. You hare off through the lines of potato crops. Every step leaves footprints but you will have to hope that $!{town} Constabulary do not possess the resources to trace your shoes back to where you bought them just because you ran from a graveyard.\n\n        You leap over a fence and end up in a field of cows. They stare at you curiously as you sprint past, breathing hard. You risk a glance back. The policeman has fallen behind. He seems like an older man. You remember his name—PC McMurdo—from a talk he gave at your school. Even then he looked fond of fish and chips and beer. You are probably safe.\n\n        Behind a barn, you take off your jacket to change your appearance and slip back towards town. You won't be going to the graveyard again.\n\n        *set visibility +5\n        *set max_energy %+5\n        *page_break Next Day\n        *goto_scene stageone\n      #Try to summon an undead escort.\n        *gosub_scene end_trial\n        Ripping undead from the ground under time pressure…this is a new challenge. You grip the humerus, quiet your mind, and tug at the dead beneath your feet.\n        \n        *if (control > 52)\n          You grin as you feel the recently-deceased stir in response to your command. \n          *set zcommit +1\n          *if (control > 61)\n            *set zcommit +1\n          *comment endif       \n          *if (control > 70)\n            *set zcommit +1\n          *comment endif\n\n          The policeman—you remember him now, an older man named McMurdo—staggers back as \n          *set number zcommit\n          *gosub number\n          zombies erupt from the ground between you. He stares, wide-eyed, and you send these new minions lurching towards him. For seconds he's frozen, and then he makes a tactical withdrawal to the safety of his car. You see him on the radio as he screeches away down the road.\n\n          Time to make a covert exit with your new minions.\n\n          *set zombies +zcommit\n          *set minion_count +zcommit\n          *set visibility +10\n          *set luck %+10\n          *set control %+5\n          *page_break Next Day\n          *goto_scene stageone\n        *else\n          Your concentration falters. The graves stay intact, silent. You're still new at this. Better just keep cool. After all, you're doing nothing suspicious—unless you count carrying a glowing, human bone around.\n          *goto innocent_visitor\n\n\n*comment ********************************************
