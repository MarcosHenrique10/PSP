w's reaction.\n        *label cutdirect\n        *set frye %-15\n        *set deputy %+15\n        Despite having your own reasons for ignoring John Gordon, the deputy seems to take your response as falling into line with his strategies—you see half of a smirk in your direction and notice that his posture heightens in his saddle.\n        *if sweetheart = \"gordon\"\n          Gordon watches you as you ride past, and the hurt on his face is clear as day. You'll have to make it up to him later.\n        *goto house\n  #I steer my horse in his direction for a chat.\n    *set frye %+15\n    *set deputy %-15\n    Winslow makes a disapproving noise as your horse veers from its course, but he reins in to a stop.\n    *label gordon\n\t\n    \"Mr. Gordon,\" you say politely.\n\t\n    \"${titlemr} ${surname},\" he responds, just as formally. \n    *if sweetheart=\"gordon\"\n      But the grin he shoots you is anything but formal, and gone almost as quickly as you notice it—but not before it has time to shoot tingles all the way to your toes.\n      *comment end_if\n\t\n    \"Deputy Winslow,\" he says, acknowledging your partner. Winslow grunts in response.\n\t\n    \"Deputy Winslow is itchin' to speak to Mr. Frye,\" you explain, and Winslow nods emphatically.\n\t\n    \"That's why I came to talk to y'all,\" Gordon drawls. \"Mr. Frye's out at the north fence, repairing a break. I can take y'all out to him. Or we can have some of Mrs. Ford's fine coffee while we wait.\"\n\t\n    Winslow looks annoyed; he clearly expected Frye to be waiting for his arrival, wringing his hands in worry for his daughter.\n    *goto investigation\n  #I dismount so we can talk on the same level.\n    *set frye %+20\n    *set deputy %-20\n    Winslow makes an undisguised sound of exasperation as you dismount. He looks as though he's about to continue on toward the house without you, but then he reins in to a stop and waits.\n    *goto gordon\n  *if (sweetheart=\"gordon\") #I flash Gordon a knowing smile before greeting him.\n      *set frye %+15\n      *set deputy %-15\n      You don't normally visit Gordon at work, because you know he likes to keep his private life private—and there's not much privacy among the men living in the bungalow. So you stay on your horse as he approaches and try not to let any of your relationship make it past your eyes.\n      *goto gordon\n  #I ignore the cowboy.\n    *goto cutdirect\n\t\n*label house\nIt's not much farther to the ranch house. Winslow gets there just enough ahead of you that he's already hitched his horse to the post and made it to the door before your horse is settled. As you join him, Frye's housekeeper and cook, Mrs. Ford, is opening the door.\n\n\"Deputy Winslow,\" she says with what you suspect is forced cheerfulness. \"We had no idea Sheriff Rogers was sending you out today.\"\n\nWinslow smiles. \"Hope it's a pleasant surprise,\" he says, with every expectation that it should be. \"We're all very concerned about Victoria,\" he continues, without an ounce of empathy in his voice.\n\n\"I'm just glad it's not another of Mr. Mason's messengers from the bank,\" Mrs. Ford says crossly. \"I've had about enough of Mr. Mason's pressure on poor Mr. Frye. But today Mr. Frye is out at the north fence, repairing a break,\" she explains.\n\n\"Which is what I was trying to tell you,\" John Gordon says, arriving behind you on foot. \"Mr. Frye hoped someone might be along today. I'll take y'all to him.\"\n\nWinslow looks annoyed; he clearly expected Frye to be waiting for his arrival, wringing his hands in worry for his daughter.\n\n*label investigation\n\nHow would you like to investigate?\n*choice\n  *hide_reuse #I'd like to look for clues in the ranch house.\n    *set investigate +1\n    *set investigatin %+10\n    The housekeeper, Mrs. Ford, allows you to look around the inside of the house—mostly because Deputy Winslow flashes his badge and she doesn't quite have the gumption to argue with him.\n\t\n    Mrs. Ford leads you to Victoria's room, which is casually messy but without the broken objects you'd associate with a struggle. \"We haven't moved anything much since she disappeared,\" Mrs. Ford says.\n    *page_break\n    Many of the things in the room are just what you'd expect of a well-off sixteen-year-old girl: more clothes than you have in your own closet, some cosmetics, a small bottle of vanilla that looks as though it's used as perfume.\n\t\n    *if investigatin > 50\n      But it's the less common items that strike your interest. Under her pillow you find a dime novel that looks harmless enough—until you realize that her bookmark is a pamphlet on women's suffrage. Once you've found that, it's not hard to spot the other indications that Victoria is a budding suffragist—other dime novels also hide propaganda for the movement, and you notice that from Victoria's mirror hangs a necklace with peridot, pearl, and amethyst stones—gemstones associated with the movement because the acronym formed from their colors (green, white, and violet) shares its initials with the phrase \"Give Women Votes.\"\n      *if investigatin > 65\n        *set foundshells true\n\n        You also detect the scent of gunpowder in the room, and a careful examination of one pair of gloves shows powder burn on the fingers. In a jewelry box on her vanity, you find among some baubles a shell casing.\n      It seems Victoria may not be the innocent, play-by-the-rules young woman her father makes her out to be.\n      *label huntforclues\n      *choice\n        #Look for more clues outside her window.\n          *set investigatin %+10\n          Victoria's window is on the second story, but you notice that the ground below it is practically undisturbed. There are no indentations from a ladder, nor deep footprints from a leap made from the second story.\n          *if investigatin > 65\n            You do notice, however, that the window casing at the bottom of the sill looks newly cracked—the way it might look if someone had put all her weight on it—and there's something that looks suspiciously like a partial boot print about halfway down.\n\t\t\t\n            *label cluesfinish\n            As you finish up, Mrs. Ford approaches, offering any assistance—which you understand clearly means she's uncomfortable with your snooping and would like you to be on your way.\n            *goto investigation\n          *else\n            You do notice a crack in the window casing, and you think for a moment that maybe a rope being lowered over it could make a dent like that, but if so, what happened to the rope?\n\n            *goto cluesfinish\t\t\t\n        #Look for clues in Frye's office.\n          *set investigatin %+10\n          Frye's office is a dark room full of books and ledgers and a monstrous desk that looks more impressive than practical. A tintype of Frye, his wife, and a young Victoria sits in a frame on the desk in a prominent place. Victoria appears to get her good looks from her mother; Frye is a sturdy man, but not one people would call handsome. His wife, on the other hand, has an almost frail look to her; Victoria seems to have inherited some of her father's strength while she gained her mother's fine features.\n\t\t  \n          *if investigatin > 65\n            You can't spend too much time going over the paperwork in the office, but a quick glance at the recent ledgers shows that the Frye ranch has come on some hard times, in part due to a series of bad investments made by Frye. But there are also notes about pressure to make payments on loans from several businesses in town. The paperwork implicates Gilbert Mason as one of the main forces behind this pressure, and the numbers make it clear that Mason is after something from Frye. Another look at the desk shows a recent letter reiterating an offer to purchase part of Frye's land at an insulting price, signed by Mason.\n\t\t\t\n            You also see a few newspaper clippings about the railroad coming into town several years ago; the clippings all mention the rerouting of the rail through Mason's small ranch, which cut off a chunk of his non-bank profits—though the railroad likely paid him well for the land, Mason had to purchase several additional acres to be able to graze his cattle without crossing the rail. \n            *goto cluesfinish\n          *else\n            There isn't much time to go over the paperwork in the office, but a quick glance at the open ledger shows numbers that aren't as healthy as you'd expect. It looks as though Frye is having a little trouble making ends meet, and the name Gilbert Mason appears prominently on bills that are coming due….\n            *goto cluesfinish\n        #Continue investigating elsewhere.\n          *goto investigation\n    *else\n      Otherwise, you find little to make you suspect she's anything other than the good girl the others have portrayed aside from some daring taste in dime novels. You spot a couple of spy adventures and a detective novel under her pillow.\n      *goto huntforclues\n  *hide_reuse #The ranch hands are sure to know some gossip. I interview the cowboys.\n    *set investigate +1\n    John Gordon accompanies you back to the bunkhouse, where a handful of the ranch hands are gathered. One of them has a broken leg, and the others look to be taking turns keeping him company. They've got a game of five-card stud going with a pile of pennies being bet among them.\n    *if male=false\n      The man with the broken leg makes a teasing comment about Gordon bringing a skirt into the bunkhouse, but after Gordon gives him a whap up the side of the head, none of the rest of them follow that line of conversation.\n    *choice\n      #Pennies? Let's increase the stakes with nickels and loosen their tongues.\n        *set gamblin %+20\n        *if gamblin > 70\n          *set money %+10\n          *label game\n          There's an art to cards and gossip that has to do with winning just enough to earn the respect of your opponents, but not winning so much that they shut up entirely and focus on the game. With the addition of your coin to the pot and a hand or two in which you barely lose, it doesn't take long to start steering the conversation the way you want it to go.\n\t\t  \n          *label chatter\n          The men are all scrupulously respectful of young Miss Victoria, and the one slip of the tongue commenting on how pretty she is, from the youngest ranch hand, quickly gets muffled under the weight of four brotherly glares. They're mighty concerned about her, but none of them are willing to even consider she might have been involved in anything to get herself into trouble.\n\t\t  \n          \"Had to be that damned banker,\" says the man with the broken leg.\n\t\t  \n          \"Coulda been the Utes,\" the youngest hand pipes up. One of the others smacks him across the back of the head and tells him to cough up a bet or fold.\n\t\t  \n          \"Ain't like the Utes to risk kidnapping a girl out of a well-guarded home,\" Broken Leg says. \"Stealin' cattle from the edge of the ranch? Sure. And if Miss Victoria made herself an easy target, well then maybe. But Miss Victoria ain't likely to put herself in harm's way.\"\n          *choice\n            #Damned banker?\n              \"Gilbert Mason,\" Broken Leg explains. \"He's had it for Mr. Frye since they was both young men here in Willow Creek. Tried to buy the land out from under Mr. Frye more'n once. And didn't much like when Mr. Frye convinced the mayor that the rail ought to go through Mason's land instead of the Frye ranch.\"\n\t\t\t  \n              The men chuckle at this, and you get the sense that the rivalry between Mason and Frye is one they heartily endorse.\n\t\t\t  \n              \"And it ain't just the Utes been stealin' Mr. Frye's cattle,\" the head smacker pipes up. \"That last raid, I know I saw one of Mason's thugs rustlin' 'em up.\"\n\t\t\t  \n              \"You tell the sheriff?\" Winslow asks.\n\t\t\t  \n              \"Would have if he hadn't been drinkin' that night,\" Broken Leg says. \"I was out there and didn't see any real evidence myself.\"\n\t\t\t  \n              \"On account of you fell off your horse,\" the head smacker protests.\n\t\t\t  \n              *label endgamble\n              The game continues long enough for you to get ahead in both money and information, but you realize you'd quickly dry up both wells if you kept playing. Better to quit while you're ahead.\n              *goto investigation\n            #How did Victoria go missing then?\n              Every hand has a different answer to this question, which means that no one knows. The only consistent details are that they saw her at dinner and didn't see her at breakfast the next morning. No one was able to find any evidence of a break-in to the ranch house—though Broken Leg admits that the doors aren't always locked—and there was no sign of a struggle in Victoria's room, according to her father, as none of the ranch hands have ever entered her personal space.\n\t\t\t  \n              *goto endgamble\n            #But the Utes do kidnap women on occasion….\n              *set utes %-10\n              The youngest hand seems glad for your support, but the other men just laugh. \"Well, sure they do,\" Broken Leg says. \"Women and kids, if it works out for 'em. But that's mostly where there's actually a war brewin' between the settlers and the Utes. We ain't had violence here nigh on ten years. We and the Utes have been peaceable.\"\n\t\t\t  \n              \"Except for the cattle rustlin' and horse thievin',\" you point out.\n\t\t\t  \n              Broken Leg waves your point away. \"That ain't personal. Not like with Gilbert Mason.\"\n\t\t\t  \n              *goto endgamble\n        *else\n          *label mistake\n          *set money %+15\n          You make the mistake of winning the first two hands, and suddenly the game is too rich for everyone's blood. The game dissolves without your learning anything useful from any of the gamblers. But at least you have a few extra coins in your pockets.\n          *goto investigation\n      #Throw down a few pennies of my own to buy into their game.\n        *set gamblin %+10\n        *if gamblin > 60\n          *set money %+5\n          *goto game\n        *else\n          *goto mistake\n      #Ignore the game and ask for a few minutes of their time.\n        *set talkin %+10\n        *if talkin > 80\n          The men are set on playing, but they keep half an ear to you, and despite not sitting at the table with them, you're able—through a combination of friendliness and flattery—to get the details you want.\n\t\t  \n          *goto chatter\n        *else\n          \"You ain't interested in playin', we ain't interested in talkin',\" says Broken Leg. He turns his back on you in a direct snub.\n          *choice\n            #Oh, that does it. I tell him to draw.\n              *set shootin %+10\n              *if shootin > 60\n                Everyone in Willow Creek knows your reputation for a fast draw and a faster trigger finger. Broken Leg backs down at once, though not before Winslow shoots you a glare for proposing the shootout in the first place.\n\t\t\t\t\n                *label unreliable\t\t\t\t\n                The result is that you gather some information, but you're not sure how reliable it is—the ranch hands tell you that Victoria vanished in the night, no signs of break-in, no signs of struggle. All of them believe that she's an innocent girl, and—with the exception of the youngest ranch hand, who suspects involvement from the Utes—all of the men are quick to blame banker Gilbert Mason, Frye's rival.\n                *goto investigation\n              *else\n                Broken Leg starts to rise, but Winslow claps a hand on your shoulder. \"Afraid I can't condone that strategy while we're on official business,\" he says firmly. \"You conduct a shootout on your own time.\" He tips his hat at the ranch hands. \"Gentlemen,\" he says. \"We'll get back to work and let you get on with your game.\"\n                *goto investigation\n            #I won't take that insult! I'll beat information out of him.\n              *set deputy %+10\n              *set brawlin %+10\n              You start in on Broken Leg, and immediately the other ranch hands are in the way. John Gordon is intent on pulling you apart, but Winslow is eager to jump into the fray himself, clobbering the ranch hands with a billy club.\n              *if brawlin > 60\n                Eventually, the ranch hands stand down.\n                *goto unreliable\n              *else\n                *set health %-10\n                But you're outnumbered five to two, plus John Gordon trying to pull you all off each other. The ranch hands are a little bit concerned about hitting the deputy, but you're fair game. Eventually, Winslow makes as though he'd been with Gordon in breaking up the fight in the first place and lets you take the brunt of the beating. The end result is a split lip, a black eye, and a tooth you're sure wasn't loose before wiggling around in your mouth. Might be a cracked jaw, too.\n\t\t\t\t\n                Oh, and no additional information. So much for the ranch hands.\n                *goto investigation\n            #All right, all right, I'll join the game.\n              *if gamblin > 60\n                *goto game\n              *else\n                *goto mistake\n            #I'm clearly not going to get anything useful out of them anyway. Back to the investigation.\n              *goto investigation\n  *hide_reuse #I ask John Gordon for his opinion.\n    *set talkin %+10\n    *set investigate +1\n    Gordon has a well-deserved reputation as a forthright and honest type, if a bit overly loyal to the Fryes. Mr. Frye gave Gordon a job when he first came to Willow Creek, and the trust Frye's shown Gordon has given him a rosy picture of the family. Even so, he's likely to have some good information.\n\t\n    \"Mr. Gordon, what do you think happened to Victoria?\"\n\t\n    Gordon takes off his hat, kneading the brim in his hands. \"Can't help but think it has something to do with Gilbert Mason,\" he says.\n\t\n    \"The banker,\" Winslow says dryly.\n\t\n    \"Troubles between those two go back a long way, or so I hear tell,\" Gordon continues. \"Mr. Mason wants this land, and Mr. Frye ain't about to sell it.\" A troubled expression crosses his honest face for a moment, but it's covered quickly.\n    *choice\n      #Ask him what's troubling him.\n        *if (frye > 60) or ((talkin > 60) or (sweetheart = \"gordon\"))\n          He hesitates, shooting a look at Winslow before turning back to you. \"Fact is, I'm a little worried over Mr. Frye, not just because of Miss Victoria. I think times are harder for the ranch than he's letting on. He let Joe Nelson go two weeks back, and he's been quarrelin' with Mrs. Ford about the expense of stocking her kitchen. Which, since she's got a host of cowboy mouths to feed, didn't get him far.\"\n          *goto gordonmore\n        *else\n          *label gordonmore\n\t\t  \n          He puts his hat back on before continuing. \"There's the trouble with the thieving as well. Mr. Frye's lost some good cattle and horses, maybe to the Utes that border the ranch, but maybe to Gilbert Mason's hired thugs.\" Gordon spits to show exactly what he thinks of Mason. \"You ask me, Mason's the one behind a lot of Mr. Frye's troubles, and he'd make more if he thought he could get away with it. He's already crossing to the other side of the law.\"\n\t\t\n          \"We'll take that under consideration,\" Winslow says.\n\t\t\n          \"You do that,\" Gordon says.\n          *goto investigation\n\n\t\t  \n      #Ask him what he knows about Mason.\n        Gordon spits when he hears the banker's name. \"He ain't an honest man, and that's the truth,\" Gordon says devoutly. \"I understand Mr. Frye and Gilbert Mason go back a long way, and they ain't never got along. But about a year ago, shortly after I started on here, Mason came to the ranch and said he wanted to buy out Mr. Frye. Well Frye just laughed him off. Said he wouldn't sell to Mason, not never.\"\n\t\t\n        Winslow shrugs. \"Nothing dishonest about a man offering for a bit of land,\" he says.\n\t\t\n        But Gordon just shakes his head. \"Wasn't too long after that when the thieving started. Granted, it could be the Utes, but they ain't here all year long, and the losses are consistent. And every time something goes missing, one of Mason's thugs shows up the next day, askin' if Mr. Frye is sure he's set in his decision. You ask me, Mason's the one behind almost all of Mr. Frye's troubles, and he'd make more if he thought he could get away with it. He's already crossing to the other side of the law.\"\n\t\t\n        \"We'll take that under consideration,\" Winslow says.\n\t\t\n        \"You do that,\" Gordon says.\n        *goto investigation\n      #Ask him if he noticed anything about Victoria before she disappeared.\n        *if (talkin > 60) or (sweetheart = \"gordon\")\n          Gordon seems reluctant to say anything about Victoria that might be considered less than perfectly respectful. After starting his sentence three or four times, he sighs and says, \"Miss Victoria's a sweet girl with a good heart. Bit of a dreamer, but that's in her favor I think. Asks me questions about abolition on occasion.\" Here, he smiles. \"I wasn't on the benefiting end of abolition 'til after the War, but she 'spects me to be an expert. She does go on about causes. Something in the paper caught her interest a few weeks back, but I can't say I recall what it was.\"\n\t\t  \n          \"She have any trouble with the men here?\" Winslow interrupts. \"Girl her age could be receiving unwanted attention….\"\n\t\t  \n          Gordon glares at him. \"Ain't like that. She's a good girl, maybe a little over-interested in politics, but that may well do her good. The men here all look after her like a kid sister, or Mr. Frye sends 'em packing.\"\n\t\t  \n          After that, Gordon's not willing to discuss Victoria any further.\n          *goto investigation\n        *else\n          \"Oh, I ain't got much to say about Miss Victoria,\" Gordon says respectfully. \"You ask Mrs. Ford, and maybe she'll say different, bein' the other woman on the ranch and all.\"\n          *goto investigation\n  *hide_reuse #I ask Mrs. Ford for some coffee and conversation.\n    *set greengage %+10\n    *set investigate +1\n    Mrs. Ford lets you and Winslow sit down at her table, and though Winslow clearly thinks this is a waste of time, he keeps what little charm he has turned on whenever Mrs. Ford looks his way. He explains that you're consulting on the case, and assures Mrs. Ford that finding Victoria is one of the sheriff's top priorities.\n\t\n    The coffee is very good. \n\t\n    As you drink, Mrs. Ford bustles around the kitchen, saying how glad she is that the sheriff is focusing so much attention on this case by hiring a consultant, and how concerned she is about where Victoria might be. \"It isn't a safe world out there for a young woman,\" she says sagely.\n\t\n    How do you get information from Mrs. Ford?\n    *choice\n      #I compliment Mrs. Ford's coffee and guide conversation to ranch gossip.\n        *set talkin %+10\n        *if (talkin > 60) or (male = false)\n          It isn't hard to get Mrs. Ford talking about life on the ranch—it's actually much harder to get her to let go of a topic you're not particularly interested in. But you manage to steer the conversation to find out what you need to know.\n          *label womenstalk\n          As Winslow stares out the window, clearly not listening to \"women's talk,\" you learn that Victoria had spent the three weeks before she disappeared reading up on land disputes around Willow Creek. Mrs. Ford thinks some of that might revolve around the Utes. \"They're all supposed to be on a reservation now, and good riddance,\" Mrs. Ford says. \"But there are a few sticking around, and Miss Victoria probably had it in her head to help them in some way. She's ever been after someone to save.\"\n          *page_break\n          You also find out that the dispute between Frye and Mason goes back to when both of them were young men in Denver City, right after they settled in Willow Creek. \"Fact is, Mrs. Frye, God rest her soul, was quite the object of competition between the two men,\" Mrs. Ford says confidentially. \"Mr. Frye won her heart, of course, and then along came Miss Victoria. That didn't sit well with Mr. Mason, of course, and Mr. Mason has made Mr. Frye's life difficult ever since, especially after Mrs. Frye passed away and she couldn't shame him out of his bad behavior.\"\n\t\t  \n          Once talk moves on to the various ranch hands—or stories about Mrs. Ford's own poor, departed husband—you realize that the housekeeper's well of information has run dry.\n          *goto investigation\n        *else\n          Mrs. Ford sees your flattery for what it is, and she won't be drawn into gossiping with you. \"You just find Miss Victoria,\" she says with concern. \"Mr. Frye will tell you everything you need to know about life on his ranch.\"\n          *goto investigation\n      #I ask Mrs. Ford some interview-style questions to find out more about the Fryes.\n        *set investigatin %+10\n        *if investigatin > 65\n          It's clear Mrs. Ford isn't used to a direct question and answer approach, but you're practically a professional at this. You ease her in with some harmless questions, and before she realizes it, you've moved onto the more relevant parts to your investigation.\n          *goto womenstalk\n        *else\n          It's clear Mrs. Ford isn't used to a direct question and answer approach, and the whole thing makes her increasingly uncomfortable. You get to the recipe for baked beans that she recommends before she explains that she really has a lot to do to get lunch ready for the ranch hands. After a few more moments, she shoos you out of her kitchen, coffee mugs still in hand.\n          *goto investigation\n      #Mrs. Ford looks like a gambler; I ask for the odds on when Victoria will be home.\n        *set gamblin %+10\n        *if gamblin > 70\n          It turns out that Mrs. Ford is a gambling woman, much to her own chagrin. But all of the men—especially Mr. Frye—have been far too worried about Victoria to put money on her homecoming. \"It's not as though she's run off with a man,\" Mrs. Ford assures you, but you hear just enough doubt in her voice to recognize her own doubts about a sixteen-year-old girl's prudence in romance.\n\t\t  \n          Not that Mrs. Ford or anyone else on the ranch has seen Victoria with a particular beau.\n          *goto womenstalk\n        *else\n          Mrs. Ford is insulted by the very idea of gambling over poor Victoria's fate. She unceremoniously ushers both you and Winslow out of her kitchen, claiming she needs the space to prepare lunch for the ranch hands.\n\t\t  \n          So much for that avenue of investigation.\n          *goto investigation\n  *hide_reuse #We should talk to Frye…and I'm curious about that broken fence.\n    *set investigate +1\n    John Gordon leads you out to the northern border of Frye's property, where Frye—a stout man with thinning red hair—and one of his ranch hands are hard at work replacing logs in a broken section of fence.\n\t\n    \"What happened?\" you ask without preamble.\n\t\n    Frye looks you over, then nods to the deputy. \"Cattle stampeded and busted right through,\" Frye says grumpily, pointing to the beginning of the broken section. \"Had to move 'em all out to the south pastures this week 'til we could get it fixed.\" He offers you his hand. \"Julian Frye.\"\n\t\n    \"${name},\" you reply.\n\t\n    \"$!{pronounhe}'s aiding in the investigation,\" Winslow interrupts.\n\t\n    \"You plan to arrest Gilbert Mason yet?\" Frye asks Winslow, almost casually, but you can see the worry on his face. \"Or you still waiting on that?\"\n\t\n    Winslow grumbles something about not having enough evidence, giving you a chance to ask Frye some questions.\n    *choice\n      *if (foundshells) #Did you know anything about your daughter learning to shoot?\n        Frye looks perturbed. \"What in tarnation do you mean by that?\"\n\t\t\n        \"Her gloves have powderburn on the fingertips, and she keeps a shell casing in her jewelry box.\" You try not to sound accusatory. \"It also appears that she's involved with the suffragist movement.\"\n\t\t\n        Frye curses. \"I won't hear that kind of talk about my little girl,\" he says. \"You just arrest Gilbert Mason and get my daughter back.\"\n\t\t\n        You don't get much more out of Frye after this—he's too distracted by trying to support his denial about Victoria's activities.\n        *goto investigation\n      #Can you tell us more about why you suspect Mason?\n        *set frye %+10\n        \"I like that you cut right to the heart of the issue,\" Frye says. \"Mason and me, we go back a long time. Competed on pretty much everything. Mostly in good fun—no hard feelings on either side.\" You're a little skeptical about that remark, but Frye carries on without pause. \"Lately, though, he's been pushing harder—encouraging folk to call in debts on me to put me under some financial pressure, trying to make lowball offers on my land that I'd never take, sending his thugs out here to make trouble with the cattle. Maybe even paying the Utes to steal horses from the ranch. I hear he's friendly with those lawbreakers.\"\n\t\t\n        \"Ought to be in their reservations and off our territory by now,\" says Frye's ranch hand.\n\t\t\n        \"I have no doubt that he would stoop to kidnapping to get his way,\" Frye says with conviction.\n        *label ransom\n\t\t\n        \"Has he claimed to have done it?\" you ask. \"If he wants the pressure on you, why wouldn't he come out and threaten you with the fact that he has her?\"\n\t\t\n        \"Not yet, and I intend to get her back before he can,\" Frye says. \"He wants me worried and fearful when he sends his men over to make a claim for my land again, I'm sure of it.\" He points a finger at the deputy. \"You get my daughter back, hear?\"\n\t\t\n        As though he expects you to magically make Victoria appear at a moment's notice, Frye turns back to mending his fence, and you don't get much more of use from him.\n        *goto investigation\n      #Did something cause the cattle to stampede?\n        Frye grunts. \"Sure enough. We've had some trouble with the Utes lately, but they usually limit themselves to theft, not destruction. Could have been they changed their tactics—or could be that Mason's paid them to make more trouble for me. Or Mason might've sent out his own thugs to rile up the cattle. Wouldn't put it past him, any more than I'd put kidnapping past him.\"\n        *goto ransom\n      #How did Victoria disappear?\n        Frye recounts how she was acting perfectly normal at dinner, then retired to her room early to read, which was often her habit. The next morning, when Mrs. Ford went to get her for breakfast, she was gone.\n\t\t\n        \"Were there any signs of forced entry?\" Winslow asks.\n\t\t\n        \"None,\" Frye acknowledges.\n\t\t\n        \"What about a rope out the window?\" you offer.\n\t\t\n        Frye's face darkens. \"I won't have that type of talk about my Victoria,\" he says firmly. \"You all follow up on real leads, like Mason's interference, not this—\" he waves his hands in the air, as though trying to capture the words, \"irresponsible conjecture! Now if you'll excuse me, I got work to do.\"\n        *goto investigation\n  *if (investigate > 0) #I'm finished investigating.\n    *goto stampede\n\t\n*label stampede\nYou've gotten about as much as you can out of investigating at the ranch, and you think your next best bet is figuring out what Mason's role is in all of this—if he's even involved and Frye isn't just blaming his rival for the sake of it. As you and Winslow mount up, you hear what sounds like thunder coming from the south. Then there's a gunshot, and there's a sudden mad rush of ranch hands for horses as they ride toward the sound.\n\nYou and Winslow charge off with them. At the southern pastures, the cattle are stampeding through the fence, and several men on horseback—unidentifiable at this range—are herding them off of Frye's land. As soon as they've cleared the fence, the riders veer away from the herd.\n\n\"We've got to go after them,\" Winslow shouts.\n\n\"The stampede could head straight for Willow Creek if we can't bring 'em back under control,\" Gordon yells back.\n\nWhat do you want to do?\n*choice\n  #Go after the horsemen. The cowboys can handle the cows.\n    *set greengage %+10\n    *set deputy %+15\n    You agree with Winslow—this is your chance to find out more about what's really going on at the Frye ranch. You gallop after the horsemen, but it's clear that their headstart is going to make catching them a challenge.\n    *choice\n      #I trust my physical control of my horse. Ride hard and we'll catch 'em.\n        *set brawlin %+10\n        *if brawlin > 60\n          *set utesclear true\n          You encourage your horse to his fastest, and you're soon within close enough range to see that these men aren't Utes—they're definitely white men, though you can't tell if they're from Willow Creek or just bandits. As soon as they realize how close you are, they split up.\n\t\t  \n          Winslow is still well behind you, so you follow the rider you think you're most likely to catch. You're almost on him when you hear gunfire, and a bullet ricochets off a nearby rock.\n          *choice\n            #I shoot back!\n              *label intheback\n              *set shootin %+15\n              *if shootin > 70\n                *set deputy %-10\n                *set utesclear true\n                *set lawless %+10\n                You draw and take the first open shot you have, avoiding the rider's bullets aimed back at you. As you aim, you breathe, and you feel the whole world slow down as you pull the trigger.\n\t\t\t\t\n                Then, the rider is tumbling from his horse and onto the dirt. You rein in your own horse and approach, gun still drawn.\n\t\t\t\t\n                Winslow catches up as you're approaching the body. \"Had to kill him, did you?\" he asks critically.\n\t\t\t\t\n                \"He shot at me,\" you explain.\n\t\t\t\t\n                Dead men tell no tales, and neither of you recognize the man from Willow Creek, but it's clear from his blond hair that he's not a Ute. The riderless horse long gone, you and Winslow load the dead body up on Winslow's horse so you can take it back to Willow Creek and try to identify him.\n                *goto masonlead\n              *else\n                *label shootout\n                You draw and take the first open shot you have. He fires back. Neither of you hits very much until you feel a punch in the shoulder that almost knocks you off your horse. \n                *label stitches\n                *set deputy %-10\n\t\t\t\t\n                By the time you're back in control of your mount, the rider is gone.\n\t\t\t\t\n                You're pretty sure you're going to need stitches.\n\t\t\t\t\n                \"Lost him?\" Winslow calls out as he catches up. He sees your shoulder and frowns at you. \"Got grazed, did you?\"\n\t\t\t\t\n                \"Something like that,\" you say.\n                *set health %-40\n                *goto masonlead\n            #I shoot his horse out from under him.\n              *set shootin %+15\n              *if shootin > 80\n                It requires a hell of a shot, and some might say luck—but you're sure it's all skill. You take the shot and the horse stumbles before it crashes to the ground, throwing its rider.\n\t\t\t\t\n                You approach the fallen rider carefully, just in case he's bluffing, but no further shots are fired, and as you dismount, Deputy Winslow catches up.\n\t\t\t\t\n                \"Dead?\" Winslow asks.\n\t\t\t\t\n                You watch the rider's chest rise and fall with a steady—if slow—breath. \"Nope. Knocked out from the fall, I reckon.\"\n\t\t\t\t\n                Winslow smiles, and there's a cruel streak in it you're not surprised to see. \"We'll have some fun questioning him back in Willow Creek. Whenever he wakes up.\"\n                *set utesclear true\n                *set ridercaught true\n                *goto masonlead\n              *else\n                *goto shootout\n            #I trust my luck to get me close enough to unhorse him.\n              *set gamblin %+15\n              Gambling with your life is a pretty huge bet, but you trust your riding skills and your luck to get you through.\n              *if gamblin > 70\n                *set deputy %+10\n                And it's either your good luck or the rider's poor aim that's on your side. You keep your mount going at full speed, and as the bullets zing past you, you home in. Your horse is running alongside his, and with a little encouragement, you close the gap between you, just as the rider realizes he's run out of bullets.\n\t\t\t\t\n                You grab for the other horse's bridle, but it rears, tossing its rider to the ground. You bring both horses under control, but it takes some time, and Winslow finally has a chance to catch up. The deputy kneels next to the fallen rider.\n\t\t\t\t\n                \"He still alive?\" you ask.\n\t\t\t\t\n                \"Yep,\" Winslow says. \"Out cold, though. We'll have some fun questioning him back in Willow Creek. Whenever he wakes up.\"\n                *set ridercaught true\n                *goto masonlead\n              *else\n                But the rider's aim is better than your luck for this hand—you feel a bullet punch through your shoulder, almost sending you tumbling off your horse.\n                *goto stitches\n            #Retreat! I've got enough information to clear the Utes; that'll have to do.\n              *set deputy %+20\n              You wheel back to meet up with Winslow and give him what little information you gained. He seems disappointed not to have a reason to haul off and arrest all the Utes, but agrees that, with the lead the horsemen have, there's no catching them now.\n\t\t\t  \n              He also seems relieved that he won't have to give you credit for capturing one of the riders on your own.\n              *goto masonlead\n        *else\n          *set health %-20\n          Your horse can't keep up with the speed you're demanding—and, it turns out, neither can you. One minute you're charging ahead, and the next minute, your horse has reared and you're in the air. The fall takes the wind out of you, and you know that your rib cage isn't supposed to feel like that….\n\t\t  \n          Winslow looks down at you in frustration. \"How the hell are we supposed to catch them now?\"\n\t\t  \n          You'd like to shrug, but it hurts.\n          *goto masonlead\n      #I don't need to get closer when I can shoot one from here.\n        Shooting from horseback is always a challenge, especially when the horses are going as fast as both you and your quarry.\n        *goto intheback\n      #I don't worry about catching up—I just follow their trail.\n        *set investigatin %+15\n        Winslow charges after the horsemen, but you set a slower pace, knowing that following at a distance might actually give you better information in the long run. It means a longer chase, but you believe you have the time for it.\n\t\t\n        Eventually, you catch up with Winslow, who is cursing about how the bandits split up and he's lost them. The tracks do indeed split up, and given the proximity of Willow Creek river, you suspect some of the riders will clear their trail that way.\n\t\t\n        *if investigatin > 70       \n          One trail, however, is still quite easy to follow…at least, right up until you reach the outskirts of the town of Willow Creek and there are too many tracks mingled together to keep following this one. That, however, is already good information: At least one of the riders came into Willow Creek after the job was done, which makes you suspect that these are locally hired outlaws if not locally based ones.\n\t\t  \n          It might just be a good time to talk to Mason after all….\n\t\t  \n          *goto masonlead\n        *else\n          And unfortunately, you're right. After backtracking a few times, you can't make head nor tail out of where the riders may have gone.\n\t\t  \n          Without a better lead, you decide to head back to Willow Creek and have a chat with Gilbert Mason.\n          *goto masonlead\n  #Help the cowboys get the stampede under control before it endangers the town.\n    *set frye %+30\n    *set brawlin %+10\n    *set greengage %+10\n    You join the other cowboys, racing ahead of the cattle to try to get them turned to the right. There are just enough cowboys to start curving the cattle around—but you see one horse stumble and throw its rider.\n\n    You ride near John Gordon, trying to keep your horse steady while shouting at the cattle to turn.\n    *if brawlin > 60\n      And turn they do. For whatever reason, cattle don't like to run to the right, and once the spiral gets set, they manage to pull themselves into a tight circle that eventually has to slow and then stop. You don't learn much that will help with the investigation, but you have the satisfaction of knowing that you've kept a stampede from damaging Willow Creek.\n      *goto masonlead\n    *else\n      But your horse finds a hole in the ground as well, tossing you ass over tea-kettle and out of your saddle. Your breath crashes out of you as your back hits the ground, and you're fairly certain your ribcage is not supposed to feel like that.\n\t  \n      Luckily, you've crashed out of the path of the stampede, which the other cowboys are getting under control. Several loose cattle do make it past them and continue on toward Willow Creek, but you'd guess the damage to the town will only be, proportionately, about as bad as the damage to you.\n      *set health %-20\n      *goto masonlead\n  #Get the heck out of Dodge. This isn't my job!\n    *set greengage %-10\n    *set frye %-10\n    You're investigating a missing person, not cattle rustlers causing wanton destruction. \"We'll get to the bottom of this faster just questioning Mason,\" you yell to Winslow, and after a moment, he agrees.\n\t\n    *goto masonlead\n  \n*label masonlead\n*if health >89\n  *set HealthText \"You're fit as a fiddle.\"\n  *goto fit\n*else\n  *if health > 69\n    *set HealthText \"You've got a couple of scratches and bruises to show for your vigorous activity, but it ain't bad.\"\n    *goto Foo\n  *elseif health > 39\n    *set HealthText \"You ache all over, you worry about whether you're bleeding on your good shirt, and you can't really see straight.\"\n    *goto Foo\n  *else\n    *set HealthText \"You're almost dead. It's a wonder you can still stand.\"\n    *goto Foo\n*label Foo\n*if money > 69\n  *set CashText \"You've got a fistful of dollars.\"\n  *goto health\n*elseif money > 39\n  *set CashText \"Things are a little tight, and you're not feelin' spendy.\"\n  *goto health\n*else\n  *set CashText \"Fact is, you're broke. You might be able to squeak by.\"\n  *goto health\n\n*label health\n${HealthText} If you don't take care of yourself, you could die. But visiting a doctor will bite into your funds, and they ain't always more reliable than a home remedy. ${CashText} Would you like to visit a doctor before continuing your investigation?\n*choice\n  #Yes, I'll stop in to see the doc.\n    *set money %-30\n    *set health %+30\n    Winslow waits for you outside the doctor's office while the doctor does his best to deal with your various aches and ailments. When you rejoin the deputy, he's anxious to make his way to confront Gilbert Mason.\n    *gosub delay\n    *finish Chapter Three: Mason's Secrets\n  #No, I'll self-medicate at the saloon.\n    *set money %-10\n    *set health %+10\n    You stop off at the saloon to dull the pain some, and it seems to help. Winslow joins you and seems in a much better mood as you leave the saloon. He's even more eager to confront Gilbert Mason now, however, and you aren't sure you like that excited gleam in his eyes….\n    *gosub delay\n    *finish Chapter Three: Mason's Secrets\n  #Who, me? I'm fit as a fiddle!\n    *label fit\n    Winslow is eager to confront Gilbert Mason, and you're sure that's where the next clues are to be had as well. You make your way off to the banker's house in Willow Creek.\n    *gosub delay\n    *finish Chapter Three: Mason's Secrets\n\n*label delay\n*check_purchase full\n*if not(choice_purchased_full or choice_is_steam)\n  *page_break\n  *check_purchase full\n  *if choice_purchased_full\n    *return\n  Come back later to play the next part of [i]Showdown at Willow Creek[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase full $4.99 delay_purchased\n  *delay_break 7200\n\n*label delay_purchased\n*return", "screenshots": "screenshots\n*script window.animateEnabled = false;\n\n*page_break\n\n*set Brawlin 30\n*set Gamblin 30\n*set Shootin 30\n*set talkin 30\n*set investigatin 30\n*set lawless 50\n*set progress 50\n*set money 80\n*set health 90\n*set Name \"Clint Johnson\"\n*set Sweetheart2 \"My own self\"\n*set deputy 30\n*set frye 50\n*set mason 50\n*set utes 50\n\n*script changeBackgroundColor(\"sepia\")\n\nThe cell door closes with a clank that sounds like a verdict. The young deputy twirls the keys mockingly as he strolls back to the single desk in the Willow Creek jail.\n\n\"So,\" a voice says behind you, \"what're you in for?\"\n\n*fake_choice\n  #I was on a case….\n  #I was interviewing Jesse the Kid for my next dime novel….\n  #I was playing in a high-stakes card game….\n  #I was having a quiet drink….\n  #I was in a showdown….\n  \n*script changeBackgroundColor(\"black\")\n\n*set Brawlin 40\n*set Gamblin 85\n*set Shootin 32\n*set talkin 64 \n*set investigatin 58\n*set lawless 72\n*set progress 31\n*set money 88 \n*set health 68\n*set Name \"Bai Hailin\"\n*set Sweetheart2 \"John Gordon, Cowboy\"\n*set deputy 27\n*set frye 86\n*set mason 35\n*set utes 52\n\n\nYou are winning more than you're losing—and, as it turns out, more than Elijah. You watch his winnings shrink as yours grow and you feel the warm rush of climbing on the edge of a high place, one step away from falling off.\n\nThen you get a hand that makes your blood run cold. Two black eights. Two black aces. Queen of Hearts. With this crowd, two pair with a queen high could win. But there's something about this hand that gives you the willies—like it's a hand a man could die over.\n*fake_choice\n  #Fold. I've already taken these gamblers for a ride.\n  #Throw the eights and see what turns up.\n  #Throw the queen and go for a full house.\n  \n*script changeBackgroundColor(\"sepia\")\n\n*set Brawlin 68\n*set Gamblin 42\n*set Shootin 72\n*set talkin 34\n*set investigatin 56\n*set lawless 62\n*set progress 46\n*set money 62 \n*set health 74\n*set Name \"Verity Cobb\"\n*set Sweetheart2 \"Summer Rain, Soiled Dove\"\n*set deputy 48\n*set frye 62\n*set mason 44\n*set utes 68\n\nYou encourage your horse to his fastest, and you're soon within close enough range to see that these men aren't Utes—they're definitely white men, though you can't tell if they're from Willow Creek or just bandits. As soon as they realize how close you are, they split up.\n\nWinslow is still well behind you, so you follow the rider you think you're most likely to catch. You're almost on him when you hear gunfire, and a bullet ricochets off a nearby rock.\n*fake_choice\n  #I shoot back!\n  #I shoot his horse out from under him.\n  #I trust my luck to get me close enough to unhorse him.\n  #Retreat! I've got enough information to clear the Utes; that'll have to do.\n\n*set Brawlin 32\n*set Gamblin 42\n*set Shootin 46\n*set talkin 78\n*set investigatin 68\n*set lawless 42\n*set progress 86\n*set money 72 \n*set health 54\n*set Name \"Zeke Wayne\"\n*set Sweetheart2 \"Amelia Greengage, Detective, unrequited\"\n*set deputy 56\n*set frye 42\n*set mason 72\n*set utes 46\n\n\"Are you a believer in Progress, Mr. Wayne? A follower of the works of Mr. Morse, Mr. Faraday, and Mr. Meucci—all of whom have made great strides in the inventions of devices to better the human condition? Do you subscribe to Popular Science?\" He gestures to a small stack of magazines on his desk bearing the title. \"I hope to bring Progress to Willow Creek. To find better ways to supply light than oil and gas lanterns. To harness the powers of nature to serve man, rather than to have man continually serve its whims. Don't you agree?\"\n*fake_choice\n  #Absolutely. Progress is vital to the survival of any community.\n  #And what about preserving the wild places?\n  #I think I fell asleep. I nod and smile.\n  #This has nothing to do with our case.", "standoff": "*if sweetheart=\"tess\"\n  *set sweetheart3 \"Tess\"\n\n*if plans\n  The sun is almost at its peak as you walk away from the train. The papers in your hand don't seem like much, but a lot of blood has been spilled for them. As you hear the sound of hoofbeats approaching, you have a feeling there may still be more to come. Then you hear more hoofbeats coming from the other direction and you're no longer guessing: You're certain. The odds of this ending well are not in your favor.\n  \n  From one direction rides Mason at the head of a band of ten thugs. From the other direction rides Frye and a dozen of his ranch hands. There along a ridge above the tracks, you see the horses of Walkara and a handful of Ute Dog Soldiers, watching.\n  *if lawmen\n    And, not to be left out, Sheriff Rogers is approaching from Willow Creek with what looks like a veritable posse behind him, Amelia Greengage riding next to him.\n    *comment end_if\n\t\n  So, here you all are.\n  *label enddecision\n  \n  Both Frye and Mason stop their men and ride forward toward you on their own. Looks like this is headed for a good old-fashioned Mexican standoff, unless you've got a better idea.\n  *choice\n    #Let them come. I'm sure we can talk this out.\n      *set talkin %+10\n      \"There's no need for violence,\" you say calmly.\n\t  \n      \"All I want is my daughter,\" Frye says, his hand still twitching like it'll go for his pistol at any moment.\n\t  \n      \"I just want my cargo,\" Mason responds, and his voice is so icy you can feel the frost from where you stand.\n\t  \n      \"And given that we're all reasonable human beings, I'm sure we can come to a conclusion that's going to satisfy everyone,\" you say, trying to infuse the polite words with something like a command.\n\t  \n      *if talkin > 75\n        To your surprise, the men break their death gazes at each other and look at you.\n\t\t\n        \"And why should we listen to you?\" Mason asks finally.\n\t\t\n        You glance at all the guns around you before looking back at Mason. \"Because ruthless as you are, Mason, you don't want good men to die here today. You don't even want those ruffians you've hired to die here today. You especially don't want them to die when Sheriff Rogers will arrest everyone involved. And since I've got your cargo, I'm the person who you need to listen to.\"\n\t\t\n        That shuts Mason right up. \n        *goto callingtheshots\n      *else\n        But these two men have been locked in their own personal battles for too long. They draw and fire—and you don't think either of them could hit the broad side of a barn. But once the shooting starts, Mason's thugs and Frye's cowboys are quick to join in.\n        *label shooting2\n        *if uteshostile > 0\n          When the ground begins to shake, you realize Walkara and his band are charging down on their horses, ready to join the fray. This is going to go down in the history books as one of the Ute Wars, and it's probably going to bring the government down even harder on the Utes when all's said and done.\n        *goto shooting\t\t\n    #Being in the middle of those two when they start shooting is not a good gamble; time to get while the gettin's good!\n      The odds of you getting out of here with the papers are bad—but it's better than staring down the wrong end of a gun. You whistle for your horse, and everyone tenses, suspecting that you're signaling an attack. But when no one starts shooting, they start eyeing each other again. And no one moves when your horse arrives on the scene. \n\t  \n      \"Where's my daughter?\" Frye demands, though whether he's talking to you or to Mason is unclear.\n\t  \n      Mason, however, looks to you. \"Where is my cargo?\"\n      *choice\n        #I tell Frye his daughter is on the train while I mount.\n          \"She's on the train, Frye,\" you say, while you swing up into your saddle. \"You want her, just go in and get her.\"\n\t\t  \n          *label turntail\t\t  \n          With that, you turn tail and flee. The only clear way away from conflict where there are no guns pointed at you is behind you—where the train is. You think there's enough room between one car and the next—over those between-car platforms—for you to make a getaway. At least, you're willing to bet your life you can make it that way.\n\t\t  \n          *if gamblin > 75\n            You hold your breath, as though it'll make you and your horse skinnier. Then you're through—and the gunshots behind you give you a good idea of how someone's reacting to your departure.\n\t\t\t\n            Better hole up for a few days if you're going to make it out of this one alive.\n\t\t\t\n            You're sure that eventually someone's going to follow you, but whether it's sheer luck or just your knowledge of the area, you manage to vanish out of sight, into the cottonwoods and upriver, before anyone can find you. Once alone, you have the time to look over these mysterious plans Victoria Frye handed you. It seems like she was right: Mason's plans will wipe out most of the town of Willow Creek once his dam is built, and he'll have some nice lakeside property with that mansion. Based on the plans he's written up, it looks as though he's bought up enough property to essentially move the town beyond where the land will flood—and that he expects to sell that land at a profit when it becomes clear to the townsfolk that they have no other choice. While this might all be underhanded, it doesn't actually look illegal. One of the documents is from the U.S. Geological Survey office, granting permission for Mason to undertake the building of the dam, so either Mason has someone in the federal offices looking the other way, or they believe his path to progress is the right one.\n\t\t\t\n            What do you do with this information?\n            *choice\n              #Give it back to Mason. It's his, after all.\n                *set progress %+20\n                *set lawless %-10\n                This documentation proves that Mason's work is legal, whether Victoria Frye approves of it or not. You make your way to the nearby town of Hot Sulphur Springs—the closest town that doesn't involve crossing the mountains—and put the documents in the stage coach mailbag. After that, your work is done. You figure it's about time you moved on, anyway.\n\n                *label masonending\n                *if sweetheart != \"none\"\t\t\t\t\n                  You send a letter to your sweetheart shortly thereafter, explaining where you're off to, and that you'd be glad if ${sweethe} joined you.\n                  *if sweetheart = \"gordon\"\n                    But John Gordon doesn't even bother to write back to you. Mr. Frye can't have been too happy with the way things turned out, and it looks like John's in agreement with his boss.\n                    *comment end_if\n                    *goto masonending2\n                  *elseif (sweetheart = \"amelia\") or (sweetheart = \"tess\")\n                    Despite the challenge now that you're on the road, ${sweetheart3} isn't ready to give up on your budding relationship either. The two of you find each other whenever her work and yours allow for it. It's not a normal courtship, but when you're together, you know it's worth overcoming the challenges.\n                    *comment end_if\n                    *goto masonending2\n                  *else\n                    You've never traveled with anyone on the road before, but the fact that ${sweetheart3} was willing to give up ${sweethis} life in Willow Creek to travel with you means you're willing to adjust. You'd had a good run in Willow Creek, and despite how it all ended, you're glad you didn't have to leave everything behind.\n                    *comment end_if\n                    *goto masonending2\t\t\t\t\t\n\t\t\n                *label masonending2\t\t\n                Over the next few years, you hear news about the crazy project that Gilbert Mason is working on, and how it'll never pan out to anything. You take odd jobs, and you get by, always keeping an ear out for news of Willow Creek. As the dam gets bigger, the town gets smaller, and once it's finally built, Willow Creek, as you knew it, is gone. Mason owns most of the town, most of the businesses, and the dam is actually creating a new phenomenon: hydroelectricity. You hear that the development is one of the reasons President Grant is pushing for statehood for Colorado, and it looks like, this year, it's finally going to pass.\n                *if utesmasonally > 1\n\t\t\t\t\n                  You also hear that federal agents attempted to move Walkara's band out of Willow Creek, and that Mason and the upper class of Willow Creek declared Walkara and his people weren't Utes, they were citizens of Willow Creek and should be treated accordingly. You even heard one cowboy song about the Civilized Utes of Willow Creek, and you wonder if it'll stick.  \n                *if winslowdead = false\n\t\t\t\t\n                  You also hear that Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n\t\t\t\t  \n                *goto_scene ending\n              #Sell it back to Mason. If he wants it, he can pay for it.\n                *set progress %+10\n                *set lawless %-10\n                Just because Mason's work is legal doesn't mean he shouldn't have to pay to have his papers returned to him. You make your way to the nearby town of Hot Sulphur Springs—the closest town that doesn't involve crossing the mountains—and put your offer in the stage coach mailbag. A few days later, one of Mason's thugs tracks you down with a bag of cash. \n                *label bidder\n                You hand over the paperwork and take the money, keeping your gun handy. It almost comes to a draw, but instead, the thug just tells you to get out of town and not let your hide be seen around these parts again. Suits you just fine. With that amount of money on hand, you figure it's about time you moved on, anyway.\n                *set money %+50\n\t\t\t\t\n                *goto masonending\n              #Send it on to Amelia Greengage in hopes she'll interfere with Mason's plans.\n                *set progress %-10\n                This wasn't the case you were hired for, but you figure if anyone will know what to do with this information to keep Willow Creek from being destroyed, it's Amelia. You make your way to the nearby town of Hot Sulphur Springs—the closest town that doesn't involve crossing the mountains—and put the documents in the stage coach mailbag, along with an impassioned letter about how Willow Creek should avoid this fate. Then you sit back and wait for word.\n\t\t\t\t\n                About a week later, Amelia arrives in Hot Sulphur Springs and finds you in the general store, playing cards with some of the old men. \"I thought I might track you down here,\" she says cheerfully.\n                *if ameliawin\n                  She leans in and gives you a peck on the cheek before pulling up a chair to your table. The other players finish off their hands and excuse themselves to give you some space.\n                \"You'll be glad to hear that Gilbert Mason's plans are all tied up in court,\" she continues. \"It'll be years before he can get work started on that dam, and by then, he might have some serious competition.\" \n                *if tessflee\n                  Amelia grins mischievously. \"Tess Albertson may have seen the names of Mason's investors on the papers before she left his employ, and since her name is on the patent applications…\"\n\t\t\t\t\n                  Amelia lets the sentence hang, and both of you imagine what the future will look like in the hands of Tess Albertson.\n                  *comment end_if\n\t\t\t\t  \n                Your employer hands you a bag of coins. \"And, of course, you did find Victoria Frye. So there's your pay for the case, minus expenses.\" She grins. \"At any rate, it's safe for you to make your way back to Willow Creek,\" Amelia explains. \"Mason's going to be in Denver City trying to fight Mayor Gray in court, and everyone else seems to think you're a hero.\"\n                *if utesfryeally > 1\n\t\t\t\t\n                  From Amelia's description, it sounds like Walkara and his band have found a place in Willow Creek as well. Although Julian Frye was not initially pleased at the news that his daughter and Ancha were courting, he's also given Ancha credit for almost dying while saving Victoria's life from the outlaws who kidnapped her, despite Victoria's protests that it didn't quite happen that way. Even better: Ancha is making a full recovery. \"It isn't as though Frye has enough money to hire any more hands,\" Amelia says, \"but he's well connected, and a surprising number of Utes have been hired as trail guides and cowboys at other ranches in Willow Creek. Frye even convinced Sheriff Rogers to deputize Sowiet, though how that will go over in town, we have yet to see.\"\n                *if winslowdead = false\n\t\t\t\t\n                  You also hear that Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\t\t\t\t  \n                  *comment end_if\n\t\t\t\t  \n                Given that you thought you might have to move on after running away with the plans, being welcomed back as a hero is unexpected. \n                *if sweetheart != \"none\"\n                  You're especially gratified by the private welcome ${sweetheart3} has promised. \n                *if sweetheart = \"hammond\"\n                  You'd thought that Elijah might be mad about Mason's plans being foiled, but as it turns out, he's got an in with the competition, so it's all worked out well in the end.\n                  *comment end_if\n\n                As you ride back into town, and everyone greets you with hearty handshakes, you notice the gas lamps in the buildings and can't help but wonder what the town might look like all lit up by electricity. You suppose only time will tell if that sort of thing will ever catch on.\n                *goto backtonormal\n              #I sell the papers to the highest bidder.\n                You're probably not going to get paid for working on this case, given how everything turned out. You have to make a profit somehow! You make your way to the nearby town of Hot Sulphur Springs—the closest town that doesn't involve crossing the mountains—and put your ear to the ground. By circulating among the right element, you get the word out that you've got something to sell. About a week later, one of Mason's thugs tracks you down with a bag of cash.\n                *goto bidder\n          *else\n            You hold your breath as though it'll help make you and your horse better able to squeeze through the gap…but at the last moment, your horse rears, tossing you out of the saddle and crashing you onto the ground. Your luck just isn't with you, and you have a feeling this isn't going to end well….\n\t\t\t\n            *set health %-20\n            *if health \u003c 20\n              As your head hits the ground, you realize you were all out of aces. Then, everything goes black. As you feel yourself leaving your body behind, you wonder what will happen to Willow Creek now that you're gone.\n              *set dead true\n              *goto_scene ending\n            *else\n              That's about when the shooting starts. Whether it's Mason firing at Frye or Frye firing at Mason, you're not sure. You lie prone for a moment, gathering your breath and your wits before you figure out how to get to safety.\n              *if uteshostile > 0\n                You struggle to sit and realize that the shaking of the ground wasn't the after effect of your likely concussion—it's Walkara and his band charging down on their horses, ready to join the fray. This is going to go down in the history books as one of the Ute Wars, and it's probably going to bring the government down even harder on the Utes when all's said and done.\n              *label shooting\n              *choice\n                #I crawl back toward the train and hide until the shooting's over.\n                  You crawl backwards, hiding between rail cars. \n                  *label arrested\n                  It takes a while, but eventually, Sheriff Rogers arrests pretty much everybody—including you. \"I don't know how you manage to cause so much chaos, ${surname},\" Rogers scolds, \"but after I unravel what the hell just happened, you and I are going to have a little chat.\"\n\t\t\t\t\t\n                  Which is how Rogers ends up with the paperwork and Amelia Greengage ends up finding Victoria Frye still inside the train.\n\t\t\t\t  \n                  *label wary\t\t\t\t\t\n                  *page_break\t\t\t\t\t\n                  In the coming weeks, the people of Willow Creek eye you warily, expecting that at any moment you'll be responsible for some storm of chaos in their fair town. But soon, Mayor Gray announces that he's going to be traveling to Denver City to ask the state for an injunction against Gilbert Mason's plans to build a dam that would flood the town out of existence. Now, enemy number one in town is Gilbert Mason—who quickly follows the mayor to Denver City to protest the town's suit against him.\n\t\t\t\t\t\n                  \"It was all perfectly legal,\" Amelia tells you over coffee a few weeks later. \"He had a document from the U.S. Geological Survey office granting him permission to build the dam. At this rate, it'll all be tied up long enough that his investors will go elsewhere.\"\n                  *if tessflee\n\t\t\t\t  \n                    Amelia grins. \"Who knows? Maybe Tess Albertson will find her own investors and build her creation farther downstream—without Mason's help.\"\n                  *if utesfryeally > 1\n\t\t\t\t  \n                    It looks like Walkara and his band have found a place in Willow Creek as well. Although Julian Frye was not initially pleased at news that his daughter and Ancha were courting, he's also given Ancha credit for almost dying while saving Victoria's life from the outlaws who kidnapped her, despite Victoria's protests that it didn't quite happen that way. Even better: Ancha is making a full recovery. \"It isn't as though Frye has enough money to hire any more hands,\" you tell Amelia, \"but he's well connected, and a surprising number of Utes have been hired as trail guides and cowboys at other ranches in Willow Creek. Frye and I even convinced Sheriff Rogers to deputize Sowiet, though how that will go over in town, we have yet to see.\"\n                    *if winslowdead = false\n\t\t\t\t\t  \n                      To top things off, Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n\t\t\t\t\t\t\n                      Still, sometimes you can't help looking at the gas lamps in town and wondering what Willow Creek would look like lit up by electricity. You suppose only time will tell if that type of thing will ever catch on.\n                    *label backtonormal\n                    \t\t  \n                    Soon enough things settle back to normal. \n                    *if sweetheart != \"none\"\n                      And you and ${sweetheart3} settle back into your normal routine as well. \n                    Life is good. Especially when the Greengage Detective Agency tells you they need you on another case….\n                    *goto_scene ending\n                  *elseif utesmasonally > 1\n                    With Mason tied up in court, Walkara and his band have found themselves without a patron, and once they move on, there's little chance they'll return. You try to keep track of them over the next few years, but the papers rarely distinguish between bands of Utes. None of the news covering the Utes is good news, and eventually, you stop looking.\n\t\t\t\t\t  \n                    *if winslowdead = false\n                      On a happier note, Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n                    *goto backtonormal\n                  *elseif uteshostile > 0\n                    With the attack by Walkara and his band on Mason and Frye, it didn't take long for the Willow Creek Utes to find themselves at odds with the U.S. Army. You read about it later in the news; of the few members of the band who survived, all have been forced onto the reservations farther west. The battle was considered a great triumph for the U.S. Army, and proof that federal presence is required to keep the Indians at bay.\n\t\t\t\t\t  \n                    *if winslowdead = false\n                      In other news, Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n\t\t\t\t\t\t\n                    *goto backtonormal\n                  *else\n                    *goto backtonormal                \n                #I can't get left out of a fight like this! Start firing!\n                  Who do you shoot at?\n                  *choice\n                    #Mason's thugs.\n                      They're all outlaws anyway. You're doing Sheriff Rogers a favor….\n\t\t\t\t\t  \n                      Unfortunately, he doesn't see it that way.\n                      *goto arrested\n                    #The Utes.\n                      If there's one thing that ought to unite the good folks of Willow Creek, it's a common enemy. You shoot at Walkara and his band, and, though Mason and Frye only have eyes for each other (sad as their aim is…neither of them could hit the broad side of a barn by the look of it), the cowboys and thugs join up against the Utes.\n                      *set uteshostile +1\n                      *set utesmasonally 0\n                      *set utesfryeally 0\n\t\t\t\t\t  \n                      Eventually, the Utes retreat and the shooting stops. You see Sheriff Rogers through the gunsmoke, and he seems to be making his best effort to get to the bottom of this mess. You suspect it'll get written up officially as a Ute attack on the train and everyone else will get away scot-free.\n\t\t\t\t\t  \n                      *label shootinpapers\n                      What do you do with those papers?\n                      *choice\n                        #I give them to Amelia Greengage.\n                          She's your employer, after all. You hand the paperwork over to her surreptitiously.\n\t\t\t\t\t\t  \n                          \"So, I found Victoria Frye,\" you say, and she nods.\n\t\t\t\t\t\t  \n                          \"Once she's home, you'll get your fee,\" Amelia promises. She tucks the papers into her jacket. \"And maybe something extra. Good work, ${surname}.\"\n\t\t\t\t\t\t  \n                          Sheriff Rogers sees the pair of you and glares. \"I don't know what you two are up to, ${surname}, but if you're thinking of causing any more trouble--\"\n\t\t\t\t\t\t  \n                          \"I don't cause it, Sheriff,\" you say earnestly. \"It just follows me….\"\n\t\t\t\t\t\t  \n                          \"I'm sure we'll have a chat later,\" Amelia says to the sheriff, and he grudgingly leaves you to your own devices.\n                          *goto wary\n                        #I turn them over to Sheriff Rogers.\n                          Who can provide justice but the law? Victoria would have done the same.\n\t\t\t\t\t\t  \n                          *label trouble\t\t\t\t\t\t  \n                          Rogers takes them and shakes his head. \"This is going to cause me more trouble, isn't it, ${surname}?\"\n\t\t\t\t\t\t  \n                          \"Probably,\" you say with a shrug. \"But I don't think you can arrest me over it.\"\n\t\t\t\t\t\t  \n                          Rogers grumbles and turns away, just as Amelia Greengage spots you in the crowd. \"Did you find Miss Frye?\"\n\t\t\t\t\t\t  \n                          \"On the train,\" you say.\n\t\t\t\t\t\t  \n                          \"Once she's home, you'll get your fee,\" Amelia promises. \"Good work. Unorthodox, but good work.\"\n\t\t\t\t\t\t  \n                          You have a feeling, though, that not everyone in town is going to feel the same way.\n                          *goto wary\n                        #I hand them off to Mason.\n                          They're his, after all.\n\t\t\t\t\t\t  \n                          You find Mason in the chaos; he's uninjured but mad as a spitting bull. Handing him the papers doesn't seem to endear you to him at all. \"You should leave Willow Creek,\" he says. \"Get out before I make your life a living hell.\"\n\t\t\t\t\t\t  \n                          It was about time you moved on, anyway. You have a chat with ${sweetheart3} and figure out how best you'll carry on from here—but when you finally leave Willow Creek, it's on your own.\n\t\t\t\t\t\t  \n                          *goto masonending\n                    #The horses.\n                      You don't want to hurt people if you can avoid it—but you figure shooting horses will provide cover and keep more people from being shot. As the gunfire gets faster and the gunsmoke thickens, you're not sure whether you managed to keep anyone safe or if there are going to be a lot of deaths today.\n                      *goto arrested\n                #There's got to be a way to put a stop to this.\n                  And it occurs to you that way might be getting aboard the train and getting the engineer to start her up. A moving train—especially one that contains both prized cargo and a missing daughter—ought to get their attention.\n\t\t\t\t\t\n                  You quietly make your way toward the engine, crouching out of the way and dodging stray bullets. After what seems like hours, you reach the engine. \"Get moving!\" you order the engineer, who is only too keen to get his train out of the line of fire.\n\t\t\t\t\n                  As the train starts up, you look out the window and see that your strategy is working—rather than shooting at each other, everyone's chasing the train.\n\t\t\t\t\t\n                  \"Should I pull into the station?\" shouts the engineer.\n\t\t\t\t\t\n                  \"I reckon that's as good a plan as any,\" you answer. \"And there's likely folks who want to get off!\"\n\t\t\t\t\t\n                  Once you disembark, Sheriff Rogers is the first to get to you inside the station. \"I don't know how you manage to cause so much chaos, ${surname},\" Rogers scolds, \"but I'll take it from here.\"\n\t\t\t\t\t\n                  Amelia Greengage is quick on the scene as well, and you take her to where Victoria Frye, Ancha, and Tess Albertson are still huddled, the doctor doing his best to stitch up poor Ancha's stomach. It looks like he'll survive, but only time will tell. \"I guess this ends your work on the case,\" Amelia says. \"Your methods on this one were a little…unorthodox.\"\n\t\t\t\t\t\n                  \"I do my best,\" you say.\n                  *goto shootinpapers\n        #I tell Mason his cargo is in good hands while I mount.\n          \"Don't worry about your cargo, Mason,\" you call out, while you swing up into your saddle. \"It's in good hands!\"\n\t\t  \n          *goto turntail\n        #I mount and then tell Frye his daughter's an outlaw.\n          \"You'll be lucky to keep that one out of jail, Frye!\" you holler as you swing into your saddle. Frye sputters and fumbles for his gun, too angry to draw quickly.\n\t\t  \n          *goto turntail\t\t\n        #I don't answer either of them—I get out of here!\n          *goto turntail\n    #I can draw faster than either of them; Mexican standoff works in my favor.\n      You're not sure just what you get out of shooting either of these men—except your freedom—but here you are, locked in a three-way battle. None of you have drawn, but you know that it'll come down to whichever one of you is faster, and whichever one shoots the right target.\n      *if shootin > 75\n\t  \n        So you're surprised when it ends before it even starts. You're not sure what passes between Mason and Frye to have them both surrendering at the same moment, but you know it's your reputation with the gun that's done it.\n\t\t\n        \"I just want to know my daughter's safe,\" Frye says, his hands well clear of his holster.\n\t\t\n        \"And I want my investment to be safe,\" Mason says, looking at you. \"It's hardly a good business practice to get shot.\"\n\t\t\n        *label callingtheshots\t\t\n        It looks like you're the one calling the shots. How do you want this to end?\n        *choice\n          *if (mason > 50) #Mason's a snake, but he's the only one looking to the future of the Colorado Territory. I support him.\n            \"We are all going to walk away,\" you say calmly. \"Frye, Victoria's on the train, tending to one of Walkara's men, who was wounded by outlaws on the train.\" It's close enough to the truth, and you're sure Victoria will give her father an earful about what happened anyway.\n            *if victoriahurt\n              Telling him that she got injured would just make him mad, and he could still reach for that gun. Better that he find out on his own.\n              *comment end_if\n\t\t\t  \n            When Frye leaves, you see his men loosen up. Their boss isn't going to get shot today.\n\t\t\t\n            And with Frye gone, you're free to talk to Mason. \"Your project is going to cause a lot of trouble, Mason,\" you say, handing over the paperwork. \"I hope I'm on the right side of it.\"\n\t\t\t\n            Mason just smiles. \"You surely are. We'll drag this Territory kicking and screaming into the future, but she will come.\"\n\t\t\t\n            By t
