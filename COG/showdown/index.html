          *set lawless %+15\n              *set landrecords true\n              *goto riverside\n            #It can wait until morning. I'll try something else.\n              *goto decisions\n  *allow_reuse #I figure I'll turn in and get a good start tomorrow.\n    *if teens\n      *label turningin\n      And where do you head to get some shuteye?\n      *choice\n        *allow_reuse #I bunk up at my room in the Riverside Hotel.\n          *if riversidetext\n            *goto riverside\n          *else\n            *goto bedtime\n        *if (sweetheart=\"rain\") #I go back to Summer Rain's to spend the night.\n          You go to the Lamplight to get some rest—and relaxation—before your day. It's a comfort to spend time wrapped in Rain's arms, away from thoughts of kidnapped girls and the Ute encampment, where you may find more clues.\n          *set health %+10\n          *goto health\n        *if (sweetheart=\"hammond\") #I go back to Elijah's room to spend the night.\n          Elijah is glad to see you, and you spend some time exploring each other before finally getting some rest. Your dreams are troubled with images of kidnapped girls, and you wake thinking of the lead that will take you to the Ute encampment.\n          *set health %+10\n          *goto health\n        *if (sweetheart=\"gordon\") #I invite Gordon back to my room at the Riverside Hotel for the night.\n          You're both discreet, and you know that John Gordon won't be missed at the bunkhouse out at Frye's ranch. It's a comfort to spend time wrapped in Gordon's arms, away from thoughts of kidnapped girls and the Ute encampment, where you may find more clues.\n          *set health %+10\n          *goto health\n        *if (ameliawin) #I go back to Amelia's room at the Riverside.\n          You return to the Riverside Hotel, and instead of sleeping in your own room, you go back to Amelia's. \n          *label amelianight\n          This is the start of a good thing, though you can't help worrying that if you mess up this case, your relationship might take a hit as well. That's what happens when you get sweet on the boss.\n          *set health %+10\n          *goto health\n        *if (sweetheart=\"tess\") #I go back to Tess's room at the Riverside.\n          You return to the Riverside Hotel and the sweet scientist who has captured your heart. \n          *label tessnight\n          This is the start of a good thing, though you can't help but wonder how the outcome of the case might impact your relationship.\n          *set health %+10\n          *goto health\n        #I camp with my horse outside of town.\n          You always sleep best under the stars, and getting away from Willow Creek ought to help you get some more perspective on things. The cool night air clears your head, and you drift off, thinking of kidnapped girls and the Ute encampment, where you may find more clues.\n          *set health %+10\n          *goto health\n    There's nothing like a good rest to clear your head. Especially after spending some time behind bars.\n\t\n    Of course, hoping for a quiet night isn't the same as getting one.\n    *goto street\n\n*label saloon\n*set saloon false\n*set event +1\nThere are a few saloons in Willow Creek—drinking is important business for the town, and gambling runs a close second—but the best of them is the Tombstone. Despite its morbid name, the saloon boasts the liveliest gambling tables and the highest stakes. It's the saloon where the best gamblers in Willow Creek, including Elijah Hammond, can be found on most evenings.\n\nAnd this evening is like any other: Elijah is sitting at a table in the back of the saloon, his chair to the wall so no one can come up behind him, surrounded by challengers hoping to beat his luck for the evening. That's where the real gambling is taking place. You make your way over to the table.\n*choice\n  #Deal me in. I can handle the stakes.\n    The game is poker, five card draw, no wilds. The other players clear a spot for you next to Elijah—the game just proved too rich for one man's blood, and he excuses himself with empty pockets. In Elijah's winnings, you notice a pocket watch you're sure you've seen that man wear proudly on more than one occasion, and it's clear the game went badly for him.\n    *choice\n      #You can't have progress without risk, but a man ought to be careful where he places his bets.\n        *set progress %+10\n        *goto game\n      #You have to know when to hold 'em, and know when to fold 'em.\n        At the poker table—and much of the rest of life—it's really every man for himself. You don't have much sympathy for a man who'd risk a prized possession and lose it.\n        *set lawless %+10\n        *goto game\n      #I aim to get that watch out of Elijah and return it to the fella.\n        Out of the goodness of your heart?\n        *choice\n          #Nah, I'll sell it back to him at a profit.\n            Of course, if he didn't have any money left, you might be waiting awhile on that payoff.\n            *goto game\n          #Yep. I do have a good heart, after all.\n            *set lawless %-20\n            So you do.\n            *goto game\n          #Yep. Can't profit if he's got no money, but I could use the goodwill.\n            *set lawless %-10\n            You know a man's good word can be worth more than money—in the right circumstances.\n            *label game\n\n            The dealer tonight is Big Nose Claire, a regular feature at Tombstone. She shuffles a bridge, her long fingers moving the cards so quickly that it'd be hard to pick out a single one. You've heard she made her living for a time as a card sharp, and it wouldn't surprise you if she could pull an ace out of her sleeve with no one the wiser.\n\t\t\t\n            She deals you an average hand—a pair of sevens and not much else to speak of. How do you play?\n            *choice\n              #I play on the conservative side—my goal is to break even and focus on the conversation.\n                *set gamblin %+10\n                *if gamblin > 60\n                  Your winnings are just about as average as your hand: which is to say, there's nothing to write home about. You do manage to break even, staying in the game and not drawing too much attention to yourself. \n                  *label tabletalk\n                  *set uteclue true\n                  \n                  The conversation is mostly political, and it keeps returning to the troubles the Utes have been causing Colorado Territory. The Denver Times reported on conflict at the Ute reservation; some dissenters set fire to Chief Ouray's cabin on the property and burned it to the ground. A few of the locals say that this is just further proof that the Utes can't be civilized. That turns the conversation to the Utes near Willow Creek, who are still refusing to settle on the reservation at all.\n\t\t\t\t  \n                  *page_break\n\t\t\t\t  \n                  Mr. Sam Ellison, editor of the Willow Creek Gazette, is sitting at the table, and several of the players criticize him for publishing some pro-Ute letters. \"They're a menace,\" says one man, showing two pair: deuces and tens. But Mr. Ellison, laying down a full house, insists that he's gotten several letters from pro-Ute readers, especially young people.\n\t\t\t\t  \n                  \"Some are from quite respectable families,\" he insists. \"I'm afraid I can't divulge anyone's identity, but I will say that one young woman in particular impressed me, and her father is one of the most influential men in our town.\" From the looks on the faces at the table—most of whose tells you have figured out—you conclude that everyone believes he's talking about Victoria Frye.\n\t\t\t\t  \n                  The man next to you throws in his hand. \"And look what happened to her,\" he mutters. \n\t\t\t\t  \n                  How could Victoria have reached a pro-Ute sentiment without her father's support? It's certainly worth looking into—even if you have to go talk to the Utes themselves to find out.\n                  *goto cheat\n                *else\n                  *set money %-15\n                  You think you're playing reasonably well, but you get wrapped up in the conversation, and you realize you're not playing at your best. You lose a little more money than you'd have liked, but you're too interested in the discussion to care much.\n                  *goto tabletalk \n              #I aim to give Elijah a run for his money.\n                You'll pay attention to the conversation, but your real goal is to make Elijah sweat, regardless of how much you bring home.\n                *set gamblin %+15\n                *if gamblin > 70\n                  *set money %+25\n                  Elijah is still better than you, but you out-bluff him on a couple of hands, and you're gratified when he throws the watch in the middle and you're able to retrieve it. You are, indeed, making him sweat.\n                  *if sweetheart = \"hammond\"\n                    But he glances at you once when his poker face is down, and the smolder you see in his eyes tells you that he's got no complaints about your performance. If anything, you're increasing the stakes for whatever game you play later.\n                    *comment end_if\n\t\t  \n                  Conversation sounds as though it is taking a turn toward discussing the local Utes. Do you participate?\n                  *choice\n                    #I listen, but I'm too focused on the game to contribute.\n                      *goto tabletalk\n                    #I listen, but I ask Elijah a few pointed questions about Mason's investment opportunity.\n                      *set talkin %+10\n                      *if talkin > 60\n                        One of the other listeners—Mr. Sam Ellison of the Willow Creek Gazette—perks up at the question. \n                        *label givememore\n                        \"Didn't know you were working with Mason, Eli,\" he says smoothly. But you see his tell; he knows this is a big story, and he's not going to miss the opportunity to dig in.\n\n                        \"I'm just a speculator,\" Elijah deflects.\n\n                        \"I heard Mason's getting a little friendly with the Utes, too,\" says another man sitting at the table. And the gamblers speculate on the nature of that relationship—whether Mason is trying to civilize the Utes as he says, or whether he's using them for his own gain. \"Could hide a lot of dirty laundry that way,\" says one of Mason's critics.\n                        *goto tabletalk\t\t\t  \n                      *else\n                        *label badtalk\n                        Elijah ignores you and keeps focusing on the game, and no one else seems interested in your questions. They return to the conversation at hand.\n                        *goto tabletalk\n                    #I steer the whole conversation toward Mason's investment opportunity.\n                      *set talkin %+15\n                      *if talkin > 70\n                        Money and risk are the twin factors that interest this audience, so when you ask what you make sound like an innocuous question about the gambling Elijah has been doing at Mason's house, the whole table gets interested. At first, he demures, trying to avoid the questions—especially when Mr. Sam Ellison of the Willow Creek Gazette, who'd just won a hand with a straight flush, starts asking. Eventually, you get a few extra details out of him: The investment opportunity has to do with a new kind of power source that could bring electricity to Willow Creek. \"It's just in the beginning stages,\" Elijah insists.\n\t\t\t\t\t\t\n                        Ellison isn't one to let go after just a few answers, though.\n                        *goto givememore\n                      *else \n                        *goto badtalk\n                *else\n                  *set money %-20\n                  *label losing\n                  The cards just aren't with you—or your skill isn't up to the level this table is playing at. You lose far more than you intended, but at least the conversation took an interesting turn.\n                  *goto tabletalk\n              #That pot is mine. The other players just don't know it yet.\n                You're here for the game; any tips for your case are secondary. The thrill of the risk makes you giddy.\n                *set gamblin %+20\n                *if gamblin > 80\n                  *set money %+35\n                  You are winning more than you're losing—and, as it turns out, more than Elijah. You watch his winnings shrink as yours grow and you feel the warm rush of climbing on the edge of a high place, one step away from falling off.\n\n                  Then you get a hand that makes your blood run cold. Two black eights. Two black aces. Queen of Hearts. With this crowd, two pair with a queen high could win. But there's something about this hand that gives you the willies—like it's a hand a man could die over.\n                  *choice\n                    #Fold. I've already taken these gamblers for a ride.\n                      *set money %-5\n                      One of the things you've learned about gambling is when to listen to instinct. You fold, and you play less aggressively after, paying more attention to the conversation.\n                      *goto tabletalk\n                    #Throw the eights and see what turns up.\n                      *set gamblin %+10\n                      The eights out of your hand make the cards look much less unlucky. You end up folding shortly thereafter, and Mr. Sam Ellison of the Willow Creek Gazette wins the hand with three of a kind, but you're satisfied that you made the right choice, and you keep up your earlier pace, quickly recovering what you lost. You also turn one ear to the conversation.\n                      *goto tabletalk\n                    #Throw the queen and go for a full house.\n                      *set money %+10\n                      *set gamblin %+15\n                      It's a risky choice, especially on a hand that gives you the willies. But your doubts are resolved when you realize you've drawn the Ace of Hearts. You win the hand, and you win over that moment of doubt. And while you keep up your earlier pace in gambling, you turn your ear to the table's conversation.\n                      *goto tabletalk\n                *else\n                  *set money %-25\n                  *goto losing \n  #I flirt with Elijah until he pays attention to me.\n    *if elifight\n      *label fightconsequence\n      You have never been so fully ignored by Elijah Hammond. Usually, even when he's gambling, he's a cheerful sort—but Elijah's clear cold shoulder has the other gamblers turning away from you as well. You're not going to get any conversation here tonight.\n      *if sweetheart = \"hammond\"\n        And it's going to take a lot of apologizing—and maybe groveling—to get back on Elijah's good side. You make a note that roughing up your sweetheart is not a good idea.\n      *goto cheat\n    *elseif cheaterelijah\n      You don't know how the news got to Elijah so quickly, but it's clear from the way he gives you the cold shoulder that he knows you haven't been true to him. When he doesn't acknowledge you, neither do the other gamblers. You're not going to get any conversation here tonight.\n      *goto cheat\n    *else\n      *if sweetheart = \"hammond\"\n        *if male=false\n          Elijah pulls you onto his lap without seeming to give your presence any thought, and you can tell he's wrapped up in his cards. His arm around you is a comfort, though, and the way he strokes your thigh promises you attention later on. Especially if he wins.\n          *label meantime\n          In the meantime, the conversation at the table is interesting.\n          *goto tabletalk\n        *else\n          Elijah swings a chair around for you to sit next to him, and you can tell he's wrapped up in his cards. But beneath the table, your legs brush against each other, and every once in a while he looks up from his hand at you with that smile that makes your insides melt, promising you attention later on. Especially if he wins.\n          *goto meantime\n      *elseif talkin > 70\n        Getting Elijah's attention is challenging…but not impossible. He doesn't like having anyone behind him, so you sidle up next to him and whisper in his ear, at first about the cards, but progressively moving to ideas about what else you could be doing to spend the night together. After one particularly creative suggestion, he folds. \"I'm afraid that's all for me tonight. I'll give you a chance to win your money back tomorrow.\"\n\t\t\n        There are groans from the table as Elijah cleans up his winnings and then leads you to a part of the bar that's relatively solitary, compared to the rest of the Tombstone. \"You are damnedably distracting,\" he says with that stomach-flipping grin. \"Now that you've got my attention, what do you intend to do with it?\"\n        *choice\n          #I want to ask a few questions….\n            *label rejected\n            Elijah laughs. \"Your bluff is better than mine,\" he says. \"All right. I'll give you what you're looking for.\"\n\t\t\t\n            *label details\n            *set uteclue true\n            Elijah orders a Mule Skinner—a whiskey with blackberry liquor—and knocks it back before he starts to give you details. \"Mason's project is all about energy—a new energy source that he says will be more reliable even than the steam engine. He's got some young scientist, a woman, working on designs for him, and it all looks very impressive. She knows her trade well enough to convince me it's a good bet, at any rate. He's also working on some deal with the Utes to bring them on board. Something about purchasing land and giving them a fairer shake than the government.\"\n\t\t\t\n            He rubs a thumb over his eyebrow and orders another drink. \"If Mason were hiding something he didn't want to be associated with, I'd suggest asking the Utes. But you didn't hear that from me.\" He looks at his glass. \"I think I'll need a little time at the bar this evening—but if you'd like to make good on any of those ideas, you come on back later tonight.\"\n            *goto cheat\n          #I want to put some of those suggestions into practice….\n            *if sweetheart = \"none\"\n              *label sweetoneli\n              Elijah leans into you and kisses you full on the lips, then backs away, searching your face to determine if you're bluffing. What he sees must convince him that you're not. But then his smile fades. \"I have to come clean first, then. I know I've got information you want.\"\n              *if sweetheart = \"rain\"\n                *set cheaterrain true\n                *set sweetheart \"hammond\"\n                *set sweetheart2 \"Elijah Hammond, Gambler\"\n                *set sweetheart3 \"Elijah\"\n                *set sweethe \"he\"\n                *set sweethis \"his\"\n                *set sweethim \"him\"\n                *goto details\n              *elseif sweetheart = \"gordon\"\n                *set cheatergordon true\n                *set sweetheart \"hammond\"\n                *set sweetheart2 \"Elijah Hammond, Gambler\"\t\n                *set sweetheart3 \"Elijah\"\n                *goto details\n              *else\n                *set sweetheart \"hammond\"\n                *set sweetheart2 \"Elijah Hammond, Gambler\"\n                *set sweetheart3 \"Elijah\"\n                *set sweethe \"he\"\n                *set sweethis \"his\"\n                *set sweethim \"him\"\t\t\t\t\n                *goto details\n            *else\n              \"Aren't you already with someone?\" he asks. \"Not that I mind sharing. I just want to be clear.\"\n              *if sweetheart = \"amelia\"\n                *if ameliawin\n                  *goto lovethem\n                *else\n                  \"Not anyone who'd consider that we're in a relationship,\" you say glumly.\n\t\t\t\t  \n                  Elijah smiles. \"Far be it from me to refrain from taking advantage of a willing participant, but it sounds as though your heart is somewhere else.\"\n                  *choice\n                    #It is. One day I'll win Amelia over!\n                      Elijah buys you a drink. \"You look like you need this more than me,\" he says. The whiskey in the glass smells of gunpowder and tobacco. \"But I'll be a good sport and let you know there are no hard feelings.\"\n                      *goto details\n                    #It's time I moved on—and I'd like to move on with Elijah.\n                      *goto sweetoneli\n                    #Maybe I'd better just ask a few questions….\n                      *goto rejected\n              *else\n                *label lovethem\n                *choice\n                  *if (sweetheart = \"gordon\") #I admit I'm with John Gordon, and I love him.\n                    *label love\n                    Elijah nods. \"I expected as much. If you're willing to risk that, you must need information pretty badly.\"\n                    *goto details\n                  *if (sweetheart = \"rain\") #I admit I'm with Summer Rain, and I love her.\n                    *goto love\n                  *if (sweetheart = \"amelia\") #I admit I've just won over Amelia Greengage, and I love her.\n                    *goto love\n                  *if (sweetheart = \"tess\") #I admit I've just won over Tess Albertson, and I love her.\n                    *goto love\n                  #I was. Whether or not I still am depends on Eli.\n                    *goto sweetoneli\n                  #Maybe I'd better just ask a few questions.\n                    *goto rejected\n      *else\n        *goto wrapped\n  #I join the onlookers, hoping to get Elijah's attention.\n    *if elifight\n      *goto fightconsequence\n    *else\n      *label wrapped\n      Elijah is wrapped up in the game, unconcerned by those watching unless it looks like someone might be helping another player cheat. Then he gets a sharp look on his face, and the crowd thins out. But what's more important is the discussion over cards.\n      *goto tabletalk\n\t  \n*label cheat\n\nIt's about then that the real action in the saloon starts. At another gaming table, a man stands up and draws on Old Man Ridley, whose son runs the General Store. \n\n\"And I say there's aces in those sleeves,\" the stranger accuses loudly. \"Ain't no man as lucky as you've been.\"\n\nThe fact is, you wouldn't be surprised if Old Man Ridley had been cheating. He's got an accomplished sleight of hand he uses to pull a short bit out from behind the ears of town kids.\n*choice\n  #This is none of my business. Seems like a good time to leave.\n    *set greengage %-10\n    Better not to get involved in what could turn into a brawl the day you got out of jail.\n\n    *if sweetheart = \"hammond\"\n      You give Elijah a wave and say you'll see him later.\n\n      \"I'll hold you to it,\" he promises.\n\n    Where do you go now?\n    *goto decisions\n  #I'm as good as deputized. I break it up before it explodes.\n    *set lawless %-15\n    How do you do that?\n    *choice\n      #I draw on the stranger. Man who talks with a gun will listen to one.\n        *set shootin %+10\n        You draw, and if the saloon could have gone quieter, it would have.\n\t\t\n        \"Put it away, stranger,\" you say. \"I think you and I and Old Man Ridley need to make our way down to the sheriff's office before anyone gets hurt. We can have this discussion there.\"\n\t\t\n        Then there's a buzz, as you hear your name—and your reputation with a gun—go up for a very quiet and tense discussion around the stranger.\n        *if shootin > 55\n          What he hears is enough to convince him that you could shoot before he did. He holsters his pistol.\n\t\t  \n          \"I hope this sheriff of yours is a fair man,\" says the stranger. Old Man Ridley stands up, and the three of you leave the saloon.\n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n          *set collared true\n          *if rainchat\n            *page_break\n            *goto sheriff\n          *else\n            *label sheriff2\n\t\t\t\n            You find Sheriff Rogers for the second time this evening, handing over the two gamblers to his care. \"Another pair?\" he says. \"Ain't it enough that I've got a gang of outlaws spotted just outside town, and Utes coming in and harassing the locals—now I've got a pair of gamblers to deal with, too? You're just creating work for me, ${surname}.\"\n\t\n            \"Doing my best to keep the peace, Sheriff,\" you offer.\n\t\t\t\n            \"Sure,\" he says glumly. \"When you ain't the one breakin' it.\"\n\t\t\t\n            Where do you go from here?\n            *goto decisions\n        *else\n          *set health %-20\n          *set rogers %-10\n          The stranger spins on one heel, ducking down and firing at the same instant, and his shot goes off before yours. He's quick, but his aim is only mediocre—the bullet grazes your thigh. Yours hits him with a graze, too, so it's just as well that the shooting starts a full-on brawl as some of the locals try to disarm the stranger, and other travelers jump into the mix. After a moment, it's hard to tell who's on whose side.\n          *label tombstonebrawl\t\t  \n          \n          It doesn't take long for Sheriff Rogers to appear with a few of his deputies. Winslow is not among them.\n\t\t  \n          After the chaos dies down, Rogers sidles up to you. \"${surname}, I'm going to pretend I didn't see you here, out of respect for Amelia Greengage. Next time, though, we'll have words. Now get out of here and stay out of trouble.\"\n\n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n          Where do you go from here?\n          *goto decisions\n      #He's bluffing. I walk over and take the gun out of his hand.\n        *set gamblin %+10\n        *if gamblin > 65\n          You're good at reading people, and the way the stranger's hand is shaking around his pistol shows you he doesn't want to shoot. You walk over and take the gun out of his hand.\n\t\t  \n          \"I think you and I and Old Man Ridley need to make our way down to the sheriff's office before anyone gets hurt,\" you say calmly. \"We can have this discussion there.\"\n\t\t  \n          The stranger nods, looking relieved that you cooled down the situation before he actually shot. \"I hope this sheriff of yours is a fair man,\" he says, and you politely ignore the little quiver in his voice. Old Man Ridley stands up, and the three of you leave the saloon.\n\n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n          *set collared true\n          *if rainchat\n            *page_break\n            *goto sheriff\n          *else\n            *goto sheriff2\n        *else\n          *set health %-20\n          You're good at reading people, but apparently not good enough—the stranger definitely wasn't bluffing, and, as you approach from behind, he spins on one heel and fires, his bullet grazing your thigh. You're not sure if it was intended as a warning shot or if he'd meant to injure you worse—but it ends up not mattering and the Tombstone erupts into a full-on brawl.\n          *goto tombstonebrawl\n      #I sneak up behind him and disarm him.\n        *set brawlin %+10\n        You're accustomed to moving quietly and quickly when needed, and though disarming a man with a gun using just your bare hands is difficult, as long as his attention remains elsewhere, you should manage.\n        *if brawlin > 70\n          With everyone in the saloon watching Old Man Ridley and the stranger, no one notices you until you lock the stranger's wrist, forcing him to drop the gun. Only luck keeps it from firing as it hits the ground. Keeping his wrist trapped painfully, you say, calmly, \"I think you and I and Old Man Ridley need to make our way down to the sheriff's office before anyone gets hurt. We can have this discussion there.\"\n\t\t  \n          The stranger winces as you apply pressure to his wrist. \"Doesn't appear I have much choice,\" he acknowledges. Old Man Ridley stands up, and the three of you leave the saloon.\n\t\t  \n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n          *set collared true\n          *if rainchat\n            *page_break\n            *goto sheriff\n          *else\n            *goto sheriff2\n        *else\n          *set health %-20\n          Unfortunately, you hit a creaky floorboard. The stranger, already strung high with tension, whirls around and doesn't wait to shoot. His bullet grazes your thigh, and the saloon erupts into chaos before he can fire another shot.\n          *goto tombstonebrawl\n      #I talk him down.\n        *set talkin %+10\n        You're confident that calm words are the solution to ending this tense situation, and you know just how to deliver them. \"Put it away, stranger,\" you say. \"I think you and I and Old Man Ridley need to make our way down to the sheriff's office before anyone gets hurt. We can have this discussion there.\"\n        *if talkin > 70\n          You wait a few tense moments until the stranger lowers—and holsters—his gun. \"I didn't come in here askin' for trouble,\" he says. \"But I can't abide a cheater. I hope your sheriff is a fair man.\"\n\n          Old Man Ridley stands up slowly, and the three of you leave the saloon.\n\t\t  \n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n          *set collared true\n          *if rainchat\n            *page_break\n            *goto sheriff\n          *else\n            *goto sheriff2\n        *else\n          \"That'd take too long,\" says the stranger. \"I demand my satisfaction now.\"\n          *label ridleysurrender\t\t  \n\n          Old Man Ridley has gotten tired of looking down the end of the barrel. \"If it's that important to you, stranger, just take the pot. Looks to me like you've got a mighty good hand right now.\"\n\t\t  \n          \"Sixes high,\" someone calls out, and suddenly, there's laughter in the saloon. Nervous, but laughter all the same. Ridley slides his winnings over to the stranger's seat, and the stranger holsters his gun.\n\t\t  \n          So it's all resolved peacefully, whether Ridley was guilty of cheating or not, and with the stranger winning by right of violence.\n\t\t  \n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n\t\t  \n          Where do you go now?\n          *goto decisions\n  #I side with Ridley. Even if he's a cheater, he's a local.\n    *set lawless %+10\n    *set frye %+15\n    How do you intervene?\n    *choice\n      #I shoot the gun out of the stranger's hand.\n        *set shootin %+10\n        It's a shot that happens all the time in dime novels, but you know just how difficult it is.\n        *if shootin > 80\n          So when you take your shot, you're almost surprised to watch the gun spin out of the stranger's hand.\n          *label threat\n\t\t  \n          \"I don't believe you're welcome here, stranger,\" you say coldly. The stranger looks at you, then around the room at the locals who all look ready to leap to Ridley's support. The stranger angrily grabs his hat and storms out of the saloon. Cheers follow him out, and someone buys you a drink before you leave the saloon.\n\t\t  \n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\t\t  \n          Where do you go next?\n          *goto decisions\n        *else\n          *set health %-10\n          So you're only a little bit disappointed when the shot misses and hits the back wall of the Tombstone.\n\t\t  \n          \"That was a warning shot,\" you bluff.\n\t\t  \n          Enraged, the stranger leaps at you—apparently forgetting he had a gun in his hand—and soon the Tombstone is embroiled in chaos as local and traveler alike get in the mix. You think you see Ridley vanish with the pot from his table, and maybe a little extra, but you're not entirely sure, as you think your eye is puffing up from one of the fists that hit it.\n          *goto tombstonebrawl\n      #I intimidate the stranger into leaving while he's still got both his arms.\n        *set talkin %+10\n        \"Callin' a man a cheater is a serious offense,\" you say, putting as much danger into your tone as you can. \"We don't much like hearing one of our own getting called out.\"\n        *if talkin > 65\t\t\n          Several other locals rise, looking just as intimidating as you sound.\n          *goto threat\n        *else\n          You were intimidating, but not intimidating enough, and the stranger's anger turns on you. He spins on one heel and fires, his bullet grazing your thigh. You're not sure if it was intended as a warning shot or if he'd meant to injure you worse—but it ends up not mattering and the Tombstone erupts into a full-on brawl.\n          *goto tombstonebrawl\n      #I hit the stranger over the head with a whiskey bottle.\n          *set brawlin %+10\n          *set money %-10\n          *set health %-10\n          When in doubt, default to violence. Your bottle crashes down over his head—you now owe the Tombstone a few extra coins for at least the bottle, if not the damages—and a full-scale brawl breaks out. While no one gets shot, you can't say you've put a halt to any violence. But it does your heart good to be in the thick of the chaos, until someone shows up to spoil the fun.\n          *goto tombstonebrawl\n  #I side with the stranger. Ridley probably did cheat.\n    *set mason %+15\n    *set lawless %+10\n    The stranger is clearly well-dressed, a businessman, and he's certainly not the type to accuse someone frivolously. You believe he could use the support, especially as most of the Tombstone's patrons would back the local, regardless of guilt. How do you intervene?\n    *choice\n      #I draw on Ridley to add to the stranger's threat.\n        *set shootin %+10\n        \"You heard the man, Ridley,\" you say, letting the gun carry the weight of your words. \"Hand over the pot and we'll all forget this happened.\"\n        *if shootin > 60\n          Ridley knows your reputation, and he's staring down two barrels. He lets himself be intimidated—this time. But you're sure that neither he nor the other locals will forget where you sided. The stranger collects his winnings and leaves, and you follow after, knowing no one is going to think too kindly on you at the Tombstone for a while.\n\t\t  \n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n          Where do you go next?\n          *goto decisions\n        *else\n          *label intimidatefail\n          You hear several other guns cocked around the room as pistols are drawn at you and the stranger. \"Well, look at that,\" says Mr. Sam Ellison from the newspaper. \"I do believe I see five of a kind—sixes all 'round.\"\n\t\t  \n          The stranger lowers his gun and heads out of the saloon empty handed, and you follow after, knowing no one is going to think too kindly on you at the Tombstone for a while.\n\t\t  \n          *if sweetheart = \"hammond\"\n            You give Elijah a wave and say you'll see him later.\n\n            \"I'll hold you to it,\" he promises.\n\n          Where do you go next?\n          *goto decisions\n      #I shove Ridley's money at the stranger.\n        *set brawlin %+10\n        *set health %-10\n        Touching another man's winnings is almost always the start of a brawl even when things aren't tense—so you're not surprised when someone jumps you from behind. The chaos that erupts is glorious, with locals and travelers alike getting in the mix. By the time the violence is in full swing, no one really remembers who it was that touched it off. And, at the very least, no one's getting shot.\n        *goto tombstonebrawl\n      #I tell Ridley to hand over the winnings.\n        *set talkin %+10\n        \"You'd best do as he says, Ridley,\" you say calmly. \"No one wants you shot.\"\n        *if talkin > 60\n          *goto ridleysurrender\n        *else\n          It's true—none of the locals do want Old Man Ridley shot, but they also don't want to see him lose face.\n          *goto intimidatefail\n\n*label targets\n*set shooting false\n*set event +1\nThere's a target fence on the outskirts of Willow Creek where local gunslingers and cowboys gather to shoot the breeze and some bottles. John Gordon is nearly always there, along with travelers who consort with outlaws and free agents looking for work. You've spent some time here yourself.\n\nWhat are you here for tonight?\n*choice\n  #I'd like to make a little extra money, proving my skill.\n    *set shootin %+5\n    You pay your fee to enter, and the man who owns the property sets up a series of bottles for you to target. The pay for knocking all the targets down is double what you pay in; pay for hitting half is breaking even. If you miss everything, you leave at a loss.\n\t\n    *if shootin > 55\n      *if shootin > 65\n        *set money %+20\n        It's not gambling if you're guaranteed to win. You have the owner set 'em up, then set 'em up again, shooting a bullseye every time. While you're making money, you keep half an ear to the conversation, which sounds like it's about the local Utes. Most of the gunslingers are against them, and they're talking about how the Utes steal horses, women, and children.\n        *goto gordondefense\n      *else\n        Today's a day you break even, unfortunately. You hit half of the targets, but listen in on the conversation.\n        *goto rangetalk\n    *else\n      *set money %-5\n      Today is not your day. You don't manage to hit a single one of the targets. It must be the conversation that's distracting you.\n      *label rangetalk\n      *set uteclue true\n\t  \n      The gunslingers are all discussing Walkara, the leader of the Utes camped outside of Willow Creek. The federal government has divided the Utes into two simple categories: \"good Indians,\" whom they reward with silver badges, and \"bad Indians,\" who don't conform to the treaties and laws being put in place. Walkara is one of the leaders of the \"bad Indians,\" and he's rumored to have done everything from stealing horses to stealing women and children.\n      *label gordondefense\n\n      \"Some of that's just plain propaganda,\" John Gordon says, and people are surprised to hear him speak up at all. \"Don't get me wrong, I don't like the Utes much. But Mi—I mean, a source of mine who's done the research says that the men out in Washington will say most anything to keep folk out here from having any sympathy toward the Utes.\"\n\t  \n      The conversation continues on, but you didn't miss Gordon's slip. You're almost certain he's talking about Miss Victoria Frye as his source. And if she really did have something to do with the Utes, then that's where you'd best follow up.\n      *page_break\n      The conversation stops as a horse's frightened scream comes from the street, and you see a mare, her haunches smeared with blood, bolting out of town. The gunslingers and cowboys start to mount their own horses, ready to chase down the escaped horse.\n\t  \n      \"Carson's never going to keep that horse if he keeps beating her,\" one of the cowboys says.\n\n      Do you get involved?\n      *choice\n        #It's none of my business.\n          *set greengage %-10\n          Fair enough. With the target range deserted, there's no more to be learned here. Where do you head next?\n          *goto decisions\n        #A man shouldn't beat his horse. I interfere so the horse will escape.\n          *set progress %-15\n          *set lawless %+10\n          You mount up and join the riders, but you ride clumsily, goading your horse into the paths of others. She's none too happy about it, but as you watch the wounded mare gain, you feel satisfied by your own efforts. The gunslingers soon give up the chase.\n\t\t  \n          \"Damned Utes will probably find her now,\" says one of them unhappily.\n\t\t  \n          Another laughs. \"They can't take worse care of her than Carson.\"\n\n          Where do you head next?\n          *goto decisions\n        #That horse belongs to Carson. I help bring her in.\n          *set progress %+15\n          *set lawless %-10\n          The mare is running frightened, but she's wounded, and the gunslingers and cowboys are used to roping in wilder steeds. One of them rings her with a lasso and reigns her in.\n\t\t  \n          Carson is waiting back on the edge of Willow Creek, and he offers his thanks to the posse that brought in his horse before whipping her wounded rump again. It's ugly, but a man's property is his own, and it's his right to treat it how he chooses. Otherwise, how would order be kept?\n\t\t  \n          Where do you go next?\n          *goto decisions\n  #I want to listen in on the conversation.\n    *goto rangetalk\n  #I want to talk to Gordon.\n    *if cheatergordon\n      Apparently, news gets around fast. Gordon's not inclined to look at you, let alone speak with you. You suspect you broke the poor man's heart. The best you can do is listen in on the gunslingers' conversation and hope that something comes up that will give you a lead.\n      *goto rangetalk\n    *elseif sweetheart=\"gordon\"\n      Gordon squeezes your hand surreptitiously. \"It's good to see you,\" he says, and you can tell he's got a lot weighing on his mind.\n      *goto gordonchat\n    *else\n      *label gordonchat\n      \"Any news about Miss Victoria?\" he asks.\n\t  \n      \"None yet,\" you say, and you give him a brief account of running dry at Mason's. \"I was hoping you might have some other information you could give me that would point me in the right direction.\"\n\t  \n      \"I wish I did,\" he says. \"We're all just worried sick about her. I came down here to take my mind off it for a bit.\"\n\t  \n      Gordon pays his fee to enter the target shooting, and he makes half his shots, breaking even.\n      *goto rangetalk\n\t  \n*label lamplight\n*set rainchat false\nThe Lamplight is on the wrong side of Willow Creek—if a town this size could be considered to have a wrong side. It's brightly painted, and there's nothing tasteful about the decor. But the women inside welcome you warmly, and the mistress of the dove house, who goes by Guenivere though you're sure it's not the name she was born to, calls you over.\n\n\"It's good to see you, ${firstname},\" she says brightly. \"I was wondering if you could do me a favor. Summer Rain should be here for her shift, but she's out and about somewhere. Think you could find her and bring her in?\"\n*choice\n  #Sure. I was looking for Rain anyway.\n    *set utes %+15\n    Guenivere smiles. \"There's a dear. I'm sure you'll track her down.\"\n\t\n    *label huntforrain\n    In fact, it doesn't take long to track Summer Rain down.\n    *goto sheriff\n  #I'll do it in exchange for some cash.\n    Guenivere shakes her head at you. \"Money talks, doesn't it?\" she says, and she hands two bits over the counter. \"I'm sure you'll track her down.\"\n    *set money %+15\n\t\n    *goto huntforrain\n  #I'll do it in exchange for information.\n    \"I'm on a case trying to locate a kidnapped girl. Victoria Frye. She's sixteen and probably has her daddy's red hair.\"\n\t\n    Guenivere grins. \"The world does love a redhead. I've heard a bit about her going missing, some from the sympathetic side and some who are glad it's making Frye nervous. But as far as I know, none of the doves have heard anything about who's responsible. I'll keep an ear on it for you, though, so long as you bring Rain back.\"\n\t\n    *goto huntforrain\n\n*label riverside\n*set riversidetext false\n\nThe Riverside Hotel houses both stagecoach guests and locals who have no need of a house to themselves. You started as the former and ended up the latter. The proprietor is a Mexican man named Marcos, who looks unassuming but is an excellent shot. There's a parlor and a small bar below the rooms where there's always a quiet—but not somber—atmosphere. Marcos's wife Gabriella tends the bar, and you've heard she's just as good a shot as her husband.\n\n*if event \u003c 4\n  Where do you go?\n  *choice\n    #Amelia's room.\n      *label ameliaroom\n      *set ameliachat false\n      *set event +1\n      Amelia greets you at her door with a smile, then leads you back into her room, where she sits down at the small desk, paperwork spread out across it. She spins the chair around to face you, leaving the only other spot to sit down as the edge of her bed. You sit. @{(sweetheart=\"amelia\") And you try to hide the thoughts of how you'd like to use her bed from showing on your face.|}\n\n      \"How's the case going?\" she asks.\n\t  \n      \"Nothing definite yet,\" you say, recapping the day. @{uteclue \"I've got a lead that the Utes may have some additional information, but it's all just gossip.\"|}\n\t\t\n      \"Listening to gossip is always valuable, even if it's not definite,\" she says. \"I know you'll come up with something, or I wouldn't have put you on this case.\"\n\t  \n      What do you want to talk to Amelia about?\n      *label ameliaconversation\n      *choice\n        #I ask for her advice on where I should look for a lead.\n          After listening to every detail of your day, and asking questions about things you saw and heard that made you remember details you hadn't realized you noticed, Amelia leans back in her chair and steeples her fingers on her chin. \"It seems to me that you may find out something by going out to the Ute encampment. I've heard rumors myself that Mason has been trying to bring the rebel Utes onto some project or another of his, and if he is involved with the kidnapping—which I agree is questionable—it may be that you'll find some clue of it there.\" She smiles. \"Or another clue. Even if it's a waste of a morning, you may learn something.\"\n\t\t  \n          She sits up straight with a shrug. \"Does that help at all? Was there something else on your mind?\n          *goto ameliaconversation\n        *if (landrecords) #I explain that I'd like to get access to the Willow Creek land records before Town Hall opens.\n          *set greengage %+10\n          You describe your goal of breaking in under cover of darkness, and Amelia laughs. \"It won't be necessary,\" she says with a grin, gesturing to the paperwork on her desk. \"Bringing you in to consult on this case wasn't my only reason to personally visit Willow Creek. One of our clients is curious about why Mr. Mason is so interested in buying up land downriver of Willow Creek. You can take a look for yourself—see if you can come up with anything I'm not noticing.\"\n\t\t  \n          You look over the land records and note that Frye's land, which Mason is interested in purchasing, is on a lower parcel of land than Willow Creek itself. You also notice that other land purchased recently by Mason is along Willow Creek. There doesn't look to be anything illegal about the purchases—other than the possibility that Mason used thugs to move other people off their land, but you're not sure you could prove that in court.\n          *if (hydroclue)\n            *set greengage %+15\n            You show Amelia the blueprints you stole from Mason's house, and she's very interested—it might not be a clue for your case, but it looks relevant to hers.\n            *comment end_if\n\t\t  \n          You share your thoughts with Amelia, and she makes some notes of her own, thanking you for giving her some additional perspective. She yawns, and looks about ready to bid you a good evening, unless you want to continue the conversation.\n          *goto ameliaconversation\n        *if (tessflee) #I talk to Amelia about Tess Albertson.\n          Amelia nods seriously. \"That poor girl,\" she says, though Tess is probably only a year or two younger than Amelia herself. \"She's quite frightened of what Mason might do to her when he realizes she's been gone. I've coached her on a few bluffs if it comes down to it, but I'm not sure she's got deceit in her.\"\n\t\t  \n          After a moment, Amelia frowns. \"Silence, though, that she's good at. I couldn't get anything out of her, and I'm sure she knows something that's relevant to my case. Ah well. There's always tomorrow.\"\n\t\t  \n          Do you continue the conversation?\n          *goto ameliaconversation\n        *if (sweetheart=\"amelia\") #I get up the nerve to finally confess my feelings to her.\n          *if greengage > 60\n            Amelia blushes, her eyelashes covering her eyes as she looks at the ground. \"Your honesty is refreshing,\" she says, after what looks like some effort to collect herself. \"I confess I've wondered what we might be like together.\"\n\t\t\t\n            *if greengage > 70\n              *set ameliawin true\n              *set sweetheart2 \"Amelia Greengage, Detective\"\n              She reaches out to hold your hand. \"It's a little unorthodox, me with one of our consultants, but if you're willing to take the risk, so am I.\" She leans in to kiss your cheek, but you turn to meet her lips, deepening the kiss to something full of passion before she can pull away. You're relieved when she doesn't.\n\t\t\t\t\n              Finally, you separate, though she's still holding your hand. \"Are there other things you need to do tonight? Or can you stay?\"\n              *choice\n                #I have to go, but I'll return.\n                  She brushes her hair back, as though surprised that it's become mussed. \"I understand. Go find clues and solve mysteries. I'll be here.\"\n\t\t\t\t  \n                  Where do you go next?\n                  *goto decisions\n                #It wouldn't be right to stay when this relationship is so new.\n                  Amelia looks surprised at your response, as though she hadn't expected you to be worried about proper behavior. But you think she might be a little relieved, the newness of it hitting her as well.\n\t\t\t\t\t\n                  \"You may be right,\" she says. Then she glances at the bed you're sitting on and blushes. \"But if you change your mind, my door will be open.\"\n\t\t\t\t\t\n                  Where do you go next?\n                  *goto decisions\n                #There's nothing I'd like better than staying.\n                  She moves from her chair onto the bed next to you, and you tentatively embark on a new romance together.\n                  *goto amelianight\n            *else\n              You hold your breath as she shakes her head. \"But I think it's unwise for us to embark on anything yet. Not while we have a professional relationship. Maybe after this case…\" She blushes again. \"Ask me again,\" she says, almost breathlessly. \"Later. But for now, I think you should go.\"\n\n              Where do you go next?\n              *goto decisions\n          *else\n            Amelia looks startled—but not pleased—by the admission. \"Goodness,\" she says, and you can tell from her tone that this isn't going to be pretty.\n\t\t\t  \n            \"Forget I said anything,\" you interrupt. \"I'll talk to you when there's more to say about the case.\"\n\t  \n            You hightail it out of there before she can say anything that'll break your heart. Where do you go?\n            *goto decisions\n        #I say goodnight and head out. Places to go, people to see.\n          You bid Amelia a good evening and make your way out of the Riverside. Where do you go?\n          *goto decisions\n    *if (tessflee) #Tess's room.\n      *label tessroom\n      Tess greets you at her door with a tentative smile. \"Hello again,\" she says, holding the door between the two of you. \"Your Miss Greengage was very kind to me. Thank you again for helping me get the space to think.\"\n\t  \n      \"Come to any conclusions?\" you ask.\n\t  \n      The young scientist shakes her head. \"Not yet. I believe I'll sleep on it and see what happens.\"\n      *choice\n        #\"Would you invite me in?\"\n          *if talkin > 55\n            *set event +1\n            Tess looks embarrassed that you had to ask. \"Oh! Of course. Come in and sit down.\"\n\t\t\t\n            *label comein\t\t\t\n            Inside her room, there's one small chair at a desk, which is covered in doodles that look scientific in nature, and a bed. Tess places herself delicately on the edge of her bed, sitting with posture so straight you think she might break.\n\t\t\t\n            \"What do you want to discuss?\"\n            *label tesstions2\n            *choice\n              #I need to know more about the project she's working on.\n                *if talkin > 70\n                  *set uteclue true\n                  \"Beyond what I already told you,\" she says slowly, \"I think I should mention that Mr. Mason has been using scouts from among the Utes who are living nearby to advise him on the flow of Willow Creek. I know he's been buying up land downriver of Willow Creek with the goal of building…the seating for the project I'm working on. I don't know if that helps, but that's all I'm ready to say.\"\n\t\t\t\t  \n                  Curiouser and curiouser. Maybe visiting the Utes would give you a better idea of what Mason is up to.\n\t\t\t\t  \n                  Tess laughs nervously. \"Maybe we could talk about something else?\"\n                  *goto tesstions2\n                *else\n                  \"I'd really, really rather not, unless you just want to talk about electricity in general,\" she says. \"Or waterwheels. Or theory. Just…not practice. I don't think I can manage to put this all in perspective if I talk around it in circles. Maybe we could talk about something else?\"\n                  *goto tesstions2\n              #I want to know more about Tess herself.\n                *if talkin > 65\n                  She shakes her head. \"You can't possibly be that interested in me,\" she says.\n\t\t\t\t  \n                  \"Of course I am,\" you say. \"It's an odd choice of career you've made, and I'm curious how you got into it.\"\n\t\t\t\t  \n                  Tess explains that she had a love for building devices at an early age, and her parents supported her decision to pursue an education. She attended university in Boston before deciding to make a name for herself out West.\n\n                  \"But really, you [i]can't[/i] be interested in all that,\" she finishes. \"Why on earth would you want to bother with me?\"\n                  *choice\n                    #I like a good story, and hers is compelling.\n                      *set investigatin %+15\n                      She shakes her head, grinning. \"I don't know about that,\" she says, \"but I'm glad to repay you just a little bit for the space you've given me to think. It's meant the world to me. Even if I go back to Mr. Mason in the morning to finish my work, deciding all my worry is just silly, I'll be grateful.\"\n                      *goto tesschat\n                    #I'd like us to be friends.\n                      Tess smiles. \"I think you've already proved that you are my friend, even when I was just a stranger,\" she says. \"Thank you again. For everything. Regardless of how things turn out, I will appreciate what you've done for me.\"\n                      *label tesschat\n\t\t\t\t\t  \n                      You stay and chat awhile longer until Tess wishes you goodnight, leaving you to pursue another activity.\n                      *goto decisions\n                    *if (ameliawin = false) #I'd like to be more than friends.\n                      Tess is a lovely, albeit unconventional, woman, and you're attracted to her curiosity and her inventiveness as much as her petite body and shy smile. It's no surprise you find her attractive, though you surprise yourself a little bit by pursuing it.\n\t\t\t\t\t  \n                      Tess blushes all the way to the roots of her hair—and, you suspect, if you could see under her dress, she'd be blushing all the way down. \"I don't know what to say,\" she says bashfully.\n\t\t\t\t\t\t\n                      \"Let me take your mind off your troubles, just for an evening then,\" you reply. \"We can play it by ear after that.\"\n\t\t\t\t\t  \n                      *if talkin > 75\n                        \"I think I'd like that,\" she says slowly, then she leans forward, her lips angling toward yours for a kiss. And though you'd suspected from her demeanor that she'd be tentative, the kiss is passionate and anything but hesitant.\n\n                        After a little while, she pulls away. \"Can you stay?\" she asks.\t\t\t\t\t\t\n                        *choice\n                          #I have to go, but I'll return.\n                            She kisses you again. \"I'll be waiting,\" she says. \n\t\t\t\t\t\t\t\n                            *label tessnext\n                            You make your way downstairs and catch Marcos giving you the hairy eyeball. Whatever he suspects, it's sure to get around town ahead of you.\n\n                            Where do you go next?\n                            *if sweetheart = \"none\"\n                              *set sweetheart \"tess\"\n                              *set sweetheart2 \"Tess Albertson, Scientist\"\n                              *set sweetheart3 \"Amelia\"\n                              *goto decisions\n                            *else\n                              *goto tesscheat\n                          #It wouldn't be right to take advantage of her confusion like that.\n                            Tess looks surprised, unsure whether to be hurt or grateful. Instead of responding immediately, she leans in for another kiss, this one deeper than the one before. \"If you change your mind, I'll be here.\"\n\t\t\t\t\t\n                            *goto tessnext\n                          #There's nothing I'd like better than staying.\n                            You join Tess on her bed, exploring each other and driving away her worries.\n                            *if sweetheart = \"none\"\n                              *set sweetheart \"tess\"\n                              *set sweetheart2 \"Tess Albertson, Scientist\"\n                              *set sweetheart3 \"Amelia\"\n                              *goto tessnight\n                            *else\n                              *goto tesscheat2\n                      *else\n                        She blushes. \"I hardly know you. And I have enough things in my life confusing me at the moment to add another.\"\n\t\t\t\t\t\t\n                        Well, it's not a no for forever, but it's clear this isn't going to go anywhere now. After that, Tess makes her excuses and sends you on your way.\n                        *goto decisions\n                *else\n                  Tess shakes her head. \"I thank you for the offer of conversation, but I really just need some time alone with my thoughts.\" She smiles, but it's a tired smile. \"I appreciate everything you've done.\"\n\t\t\t\t  \n                  Tess bids you good evening and ushers you out of her room.\n                  *goto decisions\n              #I ask if there's any family she'd like to get in touch with.\n                *set greengage %+10\n                Tess smiles. \"You really are too kind to me,\" she says. \"I'm a stranger, but you've gone out of your way to help me. Thank you for that. As far as my family…. I know where the telegraph office is. If I need to get in touch with them, I will.\"\n                *goto tesstions2\n              #I bid Tess a good night.\n                Tess ushers you to her door and wishes you goodnight as well. Where do you go next?\n                *goto decisions\n          *else\n            Tess bites her lip in concentration, then finally shakes her head. \"I don't really think that would be proper. I want to use this time to think for myself, not be persuaded into anything. And I suspect you of being persuasive.\"\n\t\t\t\n            You bid Tess goodnight and figure out what you're going to do next.\n            *goto decisions\n        #\"I just wanted to check on you and make sure you're all right.\"\n          *set greengage %+10\n          *set progress %+10\n          Tess smiles. \"No. But I will be. Thank you. For everything.\" She takes a moment, then shuts the door, leaving you standing out in the hallway to figure out what you're going to do next.\n          *goto decisions\n        #\"Do you think you'd be willing to tell me anything more about those plans?\"\n          Tess hesitates, and you remind her, \"A girl's life may be in danger.\"\n          *if talkin > 60\n            *set event +1\n            The scientist hesitates just a moment longer. \"All right. Come in.\"\n\t\t\t\n            *goto comein\n          *else\n            She shakes her head. \"I just can't. Not until I know something for sure. Honestly, if I thought it had anything to do with the girl, I'd speak up. But I can't see how it's relevant, and until I have real evidence, I'll keep my concerns to myself.\"\n\t\t\t\n            You try to wheedle a bit, but Tess is having none of it, and she bids you a firm goodnight, leaving you standing out in the hallway to figure out what you're going to do next.\n            *goto decisions\n    #My own bed. Time for some shuteye.\n      *label bedtime\n      You turn in, glad the day is finally over, hoping that your lead to go talk to the Utes in the morning isn't a waste of time.\n      *set health %+10\n      *label health\n      *if health >89\n        In the morning, you feel well rested and no worse for your adventures the previous day. \n        *set HealthText \"You're completely uninjured.\"\n        *goto fit\n      *else\n        *if health > 69\n          *set HealthText \"You've got a couple of scratches and bruises to show for your vigorous activity, but it ain't bad.\"\n          *goto Foo\n        *elseif health > 39\n          *set HealthText \"You ache all over, you worry about whether you're bleeding on your good shirt, and you can't really see straight.\"\n          *goto Foo\n        *else\n          *set HealthText \"You're almost dead. It's a wonder you can still stand.\"\n          *goto Foo\n\t\t  \n*else\n  *goto bedtime\n\n*label tesscheat\n*if sweetheart = \"gordon\"\n  *set cheatergordon true\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\"\n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"\n  *goto decisions\n*if sweetheart = \"hammond\"\n  *set cheaterelijah true\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\" \n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"  \n  *goto decisions\n*if sweetheart = \"rain\"\n  *set cheaterrain true\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\" \n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"\n  *goto decisions\n*if sweetheart = \"amelia\"\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\" \n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"\n  *goto decisions\n*else\n  *goto decisions\n\n*label tesscheat2\n*if sweetheart = \"gordon\"\n  *set cheatergordon true\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\"\n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"\n  *goto tessnight\n*if sweetheart = \"hammond\"\n  *set cheaterelijah true\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\" \n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"  \n  *goto tessnight\n*if sweetheart = \"rain\"\n  *set cheaterrain true\n  *set sweetheart \"tess\"\n  *set sweetheart2 \"Tess Albertson, Scientist\" \n  *set sweetheart3 \"Amelia\"\n  *set sweethe \"she\"\n  *set sweethis \"her\"\n  *set sweethim \"her\"\n  *goto tessnight\n*else\n  *goto decisions\n  \n*label sheriff\n*set event +1\n*set rainchat false\n\nAs you approach the sheriff's office, you're surprised to see Sheriff Rogers standing outside, talking to a near-hysterical woman. After a moment, you realize that the woman is Summer Rain. Her half-Ute heritage is even clearer than usual in the darkening light, and you're surprised that Sheriff Rogers is unmoved by her pleas.\n\n\"There's nothing I can do, Rain,\" Rogers says bluntly. \"As far as the law's concerned, the Utes outside of Willow Creek are squatters. A person who's not supposed to be where he is can't go missing. He can only stop bein' where he ain't supposed to be in the first place.\"\n\n\"But Sheriff,\" Summer Rain protests, and he starts to cut her off. But she persists. \"He's my brother.\"\n*label rainchoice\n*choice\n  *if (landrecords) #I interrupt to ask the sheriff if I can get access to those land records.\n    *label later\n    *set later true\n    *set rogers %-10\n    \"${surname}, that can wait until morning,\" he says gruffly. \"I've got enough on my hands at the moment, and neither of your missing persons cases,\" he looks at Rain and then back to you, \"can take priority. Now I'd like to go home and have some dinner before I have to go back out again on night rounds. Not only do I have Utes coming into town and picking fights with my townsfolk, we've got a gang of outlaws may be coming into Willow Creek, and I mean to keep that threat away from my people.\"\n\t\n    So, no records tonight.\n    *goto rainchoice\n  *if (ridercaught) #I want to follow up on that rider I caught.\n    *if later\n      Rogers just glares at you and shakes his head. \"I'm going home. Do the same.\"\n      *goto rainchoice\n    *else\n      *goto later\n  *if (collared) #I drop off the pair of gamblers and let the sheriff sort out that mess.\n    *set rogers %+10\n    Rogers sighs. \"Another pair?\" he says. \"Ain't it enough that I've got a gang of outlaws spotted just outside town, and Utes coming in and harassing the locals—I've got a pair of gamblers to deal with, too? You're just creating work for me, ${surname}.\"\n\t\n    \"Doing my best to keep the peace, Sheriff,\" you offer.\n    *goto rainchoice\n  #I offer Summer Rain some help if she'll fill me in on the details.\n    *set rogers %+10\n    *set utes %+20\n    \"Good,\" says Rogers. \"Ask a freelancer. ${surname} can help you out. I hear ${pronounhe}'s good with missing persons.\"\n\t\n    Rogers tips his hat at you and heads out into Willow Creek. Summer Rain watches after him, shaking her head. \"I'm not the first to talk to him about this,\" she says, \"but he wouldn't listen to the Utes. We figured we might as well try having an actual resident ask for help. Some use.\"\n\t\n    \"What's going on?\" you ask.\n\t\n    *label anchastory\n    *if cheaterrain\n      Rain glares at you. \"Why do you care? You've already found someone else to warm your bed.\" She turns and starts walking toward the Lamplight. \"I'll find someone who'll pay to warm mine. I'm through with you.\"\n\t  \n      Well, however she heard about it, the secret's out. Probably best to carry on somewhere else.\n      *set rainmad true\n      *goto street\n    *set anchaclue true\n    \"My brother's name is Ancha,\" she says. \n\t\n    \"I didn't know you had a brother.\"\n\t\n    \"Half-brother,\" she corrects. \"He's a full Ute, and he's traveling with Walkara and the others, trying to find a way to stay out from under the federal government's thumb. Three days ago, he disappeared without telling anyone where he was going.\"\n\t\n    Three days ago is when Victoria Frye disappeared. Seems like an odd coincidence.\n\t\n    \"We'll find him,\" you say.\n\t\n    Summer Rain tries to give you a smile, but it falls short. \"Thank you,\" she says.\n    *if sweetheart=\"rain\"\n      \"Will I see you later tonight?\"\n\t  \n      \"I hope so,\" you say, giving her a kiss on the cheek. \"It's going to be all right.\"\n\t  \n      \"I know,\" she says.\n    Rain turns and heads back toward the Lamplight, leaving you to figure out how to spend the rest of your evening.\n    *goto street\n  #I tell Summer Rain to stop bothering the sheriff. The law's the law.\n    *set utes %-20\n    *set rogers %+10\n    \"No one cares,\" she says harshly. \"Is it any wonder that the Utes here are unhappy with the way they're treated? It's no mystery to me!\"\n\t\n    She storms off in the direction of the Lamplight.\n    *choice\n      #I go after her.\n        \"Rain, wait!\" you call.\n        *if cheaterrain\n          She whirls around, and as soon as you're within striking range, she smacks you across the face. \"How dare you?\" she says, her voice low and dangerous. \"You've already found someone else to warm your bed, so just leave me to find someone who'll pay to warm mine. I'm through with you.\"\n\t\t  \n          Well. However she heard about it, the secret's out. Probably best to carry on somewhere else.\n          *set rainmad true\n          *goto street\n        *elseif sweetheart=\"rain\"\n          She turns to you and sobs. \"Why would you embarrass me like that?\" she asks, but you can tell that the emotion isn't really directed at you.\n\t\t  \n          \"I'm sorry,\" you say. \"Tell me what's going on.\"\n          *goto anchastory\n        *else\n          *if talkin > 60\n            \"What do you want?\" Rain demands, not stopping to look at you. She does slow her pace and let you catch up. \"I've got nothing to say to you about a case if you're not going to help me.\"\n\t\t\t\n            \"All right,\" you agree. \"Tell me what's going on.\"\n            *goto anchastory\n          *else\n            Rain ignores you and heads back to the Lamplight. This trip was a dead end. Where do you go next?\n            *set rainmad true\n            *goto street\n      #I decide it's time to turn in.\n        It's been a long day, and you're ready to head home.\n        *goto street\n      #I consider my other choices for the evening.\n        *goto street\n  #I decide I'd rather pursue my investigation elsewhere.\n    *goto street\n\n*label street\n*set teens true\n\nYou haven't walked far when you see a group of young men—teenagers—out in the street, hurling insults at each other. It takes only a moment to realize that three of the young men are Utes, and two others are local townsfolk. Before you can reach them, they're at each other's throats, and you have a feeling it won't take long for the conflict to become a full-fledged brawl. What do you do?\n*choice\n  #This is none of my business.\n    *set greengage %-10\n    You can avoid the whole situation by cutting over a block and walking along behind the saloons.\n    *goto decisions\n  #I wade into the brawl to try to stop it.\n    *set brawlin %+10\n    *if brawlin > 60\n      *set health %-10\n      There may be five teenagers in this caterwaul, but you've got more experience than any three of them combined. It doesn't take you long to gain control of the fight and start putting the kids on their asses—though you take a few good hits in the meantime that'll probably feel mighty sore in the morning.\n\t  \n      Who do you side with?\n      *choice\n        #I try to protect the Utes.\n          *set utes %+20\n          *set frye %-20\n          Sure, they had the locals outnumbered, and they're not even supposed to be in Willow Creek at this time of day, but they've had enough trouble lately without adding this to it.\n\t\t  \n          You get the three Ute teens loose from the brawl and tell them to get on home before anyone catches them. They get the idea that you're on their side and they scoot out of town. After they're out of sight, you bash the heads together of the two local kids and tell them to get on home as well, before you tell their mamas they were making a scene.\n\t\t  \n          Where do you go next?\n          *goto decisions\n        #I try to protect the locals.\n          *set frye %+20\n          *set utes %-20\n          *set uteshostile +1\n          The Utes may be having trouble with the federal government, but that's no excuse for taking it out on local kids, especially three against two. You rough them up and send them running home, threatening them with worse than they've already gotten if they don't get out of town. The two local kids thank you, and you suggest they get on home too before their mamas find out they were fighting in the street.\n\t\t  \n          Where do you go next?\n          *goto decisions\n        #That's for the law to decide.\n          *set lawless %-20\n          *if brawlin > 70\n            Subduing all five teens is a challenge, but you manage to get them all by the ears and drag them back to the sheriff's office. If you had to describe how you'd done it, you're not sure you could get the anatomy right in the story.\n\t\t\t\n            The deputy at the jail isn't happy to see them, but he takes them all off your hands. Where do you go next?\n            *goto decisions\n          *else\n            *label fightloss\n            *set health %-10\n            Unfortunately, you can't manage to subdue all five teens before one of the local saloons opens its doors and some of the patrons wade into the fight. Soon, it's a free-for-all, and you're right in the middle of it—and in the morning, you'll have the bruises to prove it. You're pretty sure you left a tooth somewhere on the ground. A group of deputies arrives not long after to try to weed out the victims from the aggressors. Though Winslow isn't there, one of them remembers that you're working with him and lets you off with a warning.\n\t\t\t\n            Where do you go next?\n            *goto decisions\n    *else\n      *goto fightloss\n  #I fire a warning shot to get their attention.\n    *set shootin %+10\n    The shot fires and all five teens freeze. Who do you side with?\n    *choice\n      #I side with the Utes.\n        *set utes %+20\n        *set frye %-20\n        Sure, they had the locals outnumbered, and they're not even supposed to be in Willow Creek at this time of day, but they've had enough trouble lately without adding this to it.\n\t\t  \n        You tell the Ute teens to get lost before the sheriff comes and picks them up, keeping your gun trained on the locals. The Ute kids laugh triumphantly and take off while the locals protest the crimes of their enemies. You don't bother to listen. You scold the locals up one side and down the other and tell them to get on home before their mamas find out they were fighting in the street.\n\t  \n        Where do you go next?\n        *goto decisions\n      #I try to protect the locals.\n        *set frye %+20\n        *set utes %-20\n        The Utes may be having trouble with the federal government, but that's no excuse for taking it out on local kids, especially three against two. You rough them up and send them running home, threatening them with worse than they've already gotten if they don't get out of town. The two local kids thank you, and you suggest they get on home too before their mamas find out they were fighting in the street.\n\t\t  \n        Where do you go next?\n        *goto decisions\n      #I don't care who's right. I tell them all to go home.\n        *set lawless %-10\n        You scold the kids up one side and down the other and tell them all to get home before they get arrested, or worse—their mamas find out what they've been up to. The kids all disappear into the night soon after, and luckily, they're gone just before the local saloon empties out to find out what the shot was all about.\n\t\t\n        You don't bother to offer an explanation.\n\t\t\n        Where do you go next?\n        *goto decisions\n\t\t\n*label Foo\n*if money > 69\n  *set CashText \"You've got a fistful of dollars.\"\n  *goto foo2\n*elseif money > 39\n  *set CashText \"Things are a little tight, and you're not feelin' spendy.\"\n  *goto foo2\n*else\n  *set CashText \"Fact is, you're broke. You might be able to squeak by.\"\n  *goto foo2\n\n*label foo2\n${HealthText} If you don't take care of yourself, you could die. But visiting a doctor will bite into your funds, and they ain't always more reliable than a home remedy. ${CashText} Would you like to visit a doctor before continuing your investigation?        \n*choice\n  #Yes, I'll stop in to see the doc.\n    *set money %-30\n    *set health %+30\n    You let the doc patch you up and head over to pick up that deputy you're saddled with, ready to make your way out to the Ute encampment.\n    *finish Chapter Five: Ute Country\n  #No, I'll self-medicate at the saloon.\n    *set money %-10\n    *set health %+10\n    It's a bit early to start at the saloon, but Marcos and Gabriella fix you up with a hearty breakfast—complete with a gunpowder and tobacco-laden shot of whiskey—at the Riverside Hotel to start the day off right. You're not sure this is the best way to take care of your body, but you're sure everything will heal up right eventually. After finishing off the last swig, you head over to the sheriff's office to pick up that deputy you're saddled with, ready to make your way out to the Ute encampment.\n    *finish Chapter Five: Ute Country\n  #Who, me? I'm fit as a fiddle!\n    *label fit\n    You're ready to head back to the sheriff's office, pick up that deputy you're saddled with, and make your way out to the Ute encampment.\n    *finish Chapter Five: Ute Country\n"}};
