as you can.\n  \n    \"That looks like Len Peterson of the Harry Bledsoe Gang!\" Winslow shouts at you. \"He'll lead us straight to Bledsoe—and a shootout!\"\n  \n    Winslow's prediction proves right—your gallop slows as you climb, but so does Peterson's. Eventually, he rides up to a cabin, dismounts, and dashes inside. In the doorway stands an outlaw in a wide-brimmed black hat, who tucks himself into the cover of the door frame as you approach. The cabin is surrounded by buckthorn trees, which are small, but provide enough cover for you and Winslow to dismount and get closer as the shooting starts.\n  \n    *if shootin > 60\n      *goto shootout\n    *else\n      *set health %-10\n      One of Bledsoe's bullets richochets off the ground next to you, sending a spray of sharp rock fragments up into your face. You duck behind your chosen cover and breathe for a moment before shooting back.\n      *goto shootout\n\n*label delay\n*check_purchase full\n*if not(choice_purchased_full or choice_is_steam)\n  *page_break\n  *check_purchase full\n  *if choice_purchased_full\n    *return\n  Come back later to play the next part of [i]Showdown at Willow Creek[/i]!\n\n  Or, you can buy the game now to skip the wait.\n\n  *purchase full $4.99 delay_purchased\n  *delay_break 7200\n\n*label delay_purchased\n*return", "ending": "*page_break\nLife in the Colorado Territory goes on—for some longer than for others.\n*if dead = false\n  *if profession = \"detective\"\n    Your work on this case—messy as it was—has increased your clientele. Your business as a freelance detective keeps you in work, and money, until the next big case turns up.\n    *goto donext\n  *elseif profession = \"writer\"\n    With the case closed, you sit down to write up your notes and discover you could turn this into a dime novel. So you do. It sells to a publisher out East, and you hear it's the toast of the newsstands—at least, for a few weeks.\n    *goto donext\n  *elseif profession = \"gambler\"\n    What earnings you made on this case quickly circulate at the gambling tables, growing rapidly (as money you put into cards so frequently does). You win more games than you lose, and some days, that's all you can ask for.\n    *goto donext\n  *elseif profession = \"honest man\"\n    And for a time, you think that you'll be out of the center of attention—until the next time you head into the saloon for a quiet drink….\n    *goto donext\n  *elseif profession = \"gunslinger\"\n    If anything, the young would-be gunslingers have crept even more quickly out of the woodwork to try to take you down a peg after your work on this case gets around. But it's a momentary surge, and soon you're only facing off some raw kid once every month or two. Mostly, you let 'em live.\n    *goto donext\n  *else\n    *goto donext\n\n*label donext\n*page_break End\nWe hope you've enjoyed playing [i]Showdown at Willow Creek.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*check_purchase full\n*if choice_purchased_full\n  *ending\n*delay_ending 7200 $4.99\n", "mason": "*temp sneak false\n*temp opportunity false\n*temp progressrant true\n*temp notasked true\n*temp chat true\n*temp notcaught false\n*temp questions 0\n*temp workrant true\n*temp project true\n*temp suspicious true\n*temp masonquestions 0\n\nGilbert Mason lives in the largest house inside the boundaries of Willow Creek, a three-story brick confection with a large porch and a balcony overlooking each level, complete with a widow's walk on the upper story and a brick wall separating a lawn from the street. You've heard that before the railroad cut through his property, he lived on a ranch outside of town, much like Frye's. Still, he doesn't seem to be suffering for having moved into civilization—if you consider Willow Creek to be civilized, that is. Do you?\n\n*choice\n  #Civilization is about structure. Willow Creek may not be much, but it is civilization.\n    *set progress %+10\n    *set frye %+10\n    You've heard folks from out East who might argue that case, but to you, a shelter in a storm is still a shelter. Willow Creek may not have the kind of class that Chicago—or even Denver City—has, but it's been a good home to you.\n    *goto gamblinman\n  #Civilization? Maybe one day, but it's got a long way to go.\n    *set progress %+20\n    When you think of civilization, you think of something bigger and more advanced than a one-horse town like Willow Creek. If you don't need to hire a horse-drawn cab to get from one end of the city to the other—or if the city can't even support a cab service—it's not a real city.\n    *goto gamblinman\n  #Willow Creek is still half wild, and that's just the way I like it.\n    *set progress %-20\n    They couldn't pay you to live in a city like Chicago—or even Denver City—when you've got the option to live out here closer to where the world is still wild. You hope Willow Creek stays small and humble for a good long time to come.\n    *goto gamblinman\n  \n*label gamblinman\n\nAs you and Winslow ride up toward the Mason mansion, Elijah Hammond, the town's best known gambler and occasional troublemaker, is leaving, closing the gate on the brick wall behind him. As Elijah heads in your direction, Winslow cracks his knuckles, steering his horse forward with his knees.\n\n\"Been meaning to rough up Hammond for some time now,\" he says. \"That man has far too pretty a face for his own good.\"\n*choice\n  *if (sweetheart=\"hammond\") #\"His face is fine just the way it is. I'll talk to him.\"\n    *set deputy %-10\n    *set mason %+10\n    Winslow snorts and shakes his head disparagingly. \"Fella ain't nothin' but charm, and it's clear you've fallen for it. Won't amount to anything good, I tell you.\"\n  \n    You're just glad Winslow didn't say \"fallen for HIM.\" Winslow thinking you had a bias toward Elijah that was more than just friendly wouldn't do the investigation a lick of good.\n\t\n    You dismount and walk over to Elijah; he smiles broadly at you until he sees the company you're keeping. Then he just laughs.\n\t\n    \"Honestly, ${firstname}, what kind of trouble are you giving Deputy Winslow this time?\" he says cheerfully. \"You shouldn't annoy a man of the law.\"\n\t\n    Winslow just glares from atop his horse.\n    *page_break\n    *label hammondtalk\n    \"We're looking into the disappearance of Victoria Frye,\" you explain. \"Sixteen. Attractive. The daughter of Mason's nemesis.\"\n\t\n    Elijah chuckles. \"Points for the use of a fifty-cent word, ${firstname},\" he says flirtatiously. \"Feel like teaching me a few more over a drink and a hand of cards?\"\n\t\n    \"Can it, Aces,\" Winslow interrupts. \"We want to know what business you've got with Mason.\"\n\t\n    Elijah completely ignores Winslow and looks at you as though you're the only two people on the street.\n    *choice\n      *if (sweetheart=\"hammond\") #I give him a wink. If there's anyone he'll open up to, it's me.\n        He may keep his cards close to the chest, but you're sure you can get him to talk. How do you find out what he was doing with Mason?\n        *goto getinfo\n      #This man could swindle a skunk. I want to find out what he's hiding.\n        *if sweetheart=\"hammond\"\n          That's one of the things you like about him. In this case, however, it's not his most useful trait.\n        Maybe he is hiding something. If he is, how will you get it out of him?\n        *label getinfo\n        *choice\n          #I ask him nicely.\n            *set talkin %+10\n            Sometimes the most direct way to get what you want is simply to ask.\n            *if talkin > 75\n              And right now, it seems, that's all it takes. The gambler winks at you so fleetingly, you're not sure you actually saw the expression at all.\n              *goto cracked\n            *else\n              Sometimes, however, it's not enough.\n              *label nohelp\n\t\t\t  \n              Elijah shakes his head with that trademark cheerful—but unreadable—expression on his face. \"I'm afraid it was a private matter. Simple business. But I'm not inclined to divulge any of Mr. Mason's secrets without some sort of documentation proclaiming I must do so.\"\n\t\t\t  \n              \"You admit he's got secrets,\" Winslow growls.\n\t\t\t  \n              \"Certainly,\" Elijah says blandly. \"We all do, deputy.\" He nods at you, touching the brim of his hat. \"${firstname}.\" He saunters off down the street, as though he hasn't got a care in the world.\n              *goto mansion\n          *if (sweetheart != \"hammond\") #Maybe Winslow had the right idea in the first place. A little violence might not go amiss.\n            *label brawl1\n            *set elifight true\n            *set deputy %+20\n            *set brawlin %+10\n            *set mason %-10\n            *goto terriblebrawl\n          #I make him an innocuous bet.\n            *set gamblin %+10\n            *set mason %+10\n            *set deputy %-10\n            Elijah can't pass up a gamble. You suggest that he guess an object you're thinking of; if he loses, he answers your questions. If he guesses right, you let him go on his merry way unharassed. He agrees, on the condition that you write down your object in advance.\n\t\t\t\n            \"You don't trust me?\" you ask.\n\t\t\t\n            He grins and waits as you scrawl an object on a piece of paper.\n\t\t\t\n            *if gamblin > 70\n              It's a good thing that your bluff is nearly as good as Elijah's—and that your ability to read him is better than his ability to read you. He stares at you for several moments before realizing you're not going to show a tell, then finally names Winslow's horse's ass as what must be occupying your thoughts.\n\t\t\t  \n              It's very hard not to laugh, but you manage it.\n\t\t\t  \n              \"I was thinking of the blue flag flying outside Mr. Mason's house,\" you explain. You make a note to yourself that it's a blue flag with a single star, which was an unofficial Confederate—and not a Union—flag.\n              *goto cracked\n            *else\n              Sadly for you, Elijah is an incredibly good gambler. He must have caught the eye twitch you made toward the blue flag bearing a single star—an unofficial Confederate flag, you notice, rather than a flag of the United States—flying outside of Mason's mansion.\n\t\t\t  \n              \"Can't win every hand,\" he says kindly.\n              *goto nohelp\n          *if (sweetheart=\"hammond\") #I whisper a promise of quality time later if he'll open up.\n            *set mason %+10\n            *set talkin %+10\n            You know just how to make the kind of promise that Elijah will listen to. You've certainly had enough practice at it. And you know enough to see his tell—that sudden pulse flutter just behind his right ear—when you've hit the mark.\n            *label cracked\t\t  \n\t\t\t\n            Elijah leans back, his easy bluff expression back on before Winslow could notice a change. \"That is a fine reason for me to divulge information to the authorities. To answer Deputy Winslow's question, Mr. Mason has offered me the opportunity to invest in a business proposition. As you know, Mr. Mason is a man of progress, a forward thinker in our community. He believes that this new opportunity will bring Willow Creek into the future.\"\n\t\t  \n            \"What kind of opportunity?\" Winslow badgers.\n\t\t  \n            Elijah shrugs. \"I only listened to the pitch, Deputy Winslow. And I admit to being intrigued enough to buy in to the initial offering. But he's not divulged the full information of his project, nor did I ask. Things get confusing once the technical details are released, and I am a man of grand pictures.\"\n\t\t  \n            Winslow mutters, \"And bullshit.\" The deputy waves his hat at the gambler. \"Get on minding those grand pictures then, Hammond, and don't dawdle too long on the streets.\"\n\t\t  \n            Hammond nods. \"Wouldn't dream of it.\"\n            *set opportunity true\n            *goto mansion\n          *if (sweetheart != \"hammond\") #I attempt to seduce him with words.\n            *if sweetheart=\"gordon\"\n              *goto notcheating\n            *elseif sweetheart=\"rain\"\n              *goto notcheating\n            *elseif sweetheart=\"amelia\"\n              It's not as if Amelia even knows about your feelings, after all.\n              *goto seduce\n            *else\n              *goto seduce\n      #I'm tired of this conversation already. Violence is the answer! \n        *goto brawl1\n      #Talking to Elijah is a waste of our time.\n        *label waste\n        *set greengage %-10\n        *set deputy %-10\n        After all, given the man's reputation for bluffing, how could you be sure that any of the information he gave you was true?\n        *if sweetheart=\"hammond\"\n          You know him better than most people, and he's still likely to slip one past you now and again. And he's not looking to do Winslow any favors.\n        You bid him a good afternoon. He tips his hat at you—still ignoring the deputy—and takes his leave. \n        *goto mansion\n  #I sweet-talk Winslow into letting me have a chat with Elijah.\n    *set talkin %+10\n    *if talkin>60\n      *set deputy %+10\n      For all his tough demeanor, Winslow melts in the face of your flattery like butter on a skillet. After you dismount, he takes the reins of your horse and hangs back, giving you a little space to work. \n      *label elijahapproach\n\t  \n      Elijah tips his hat as you approach.\n\t  \n      \"${firstname},\" he says.\n\n      \"Elijah,\" you greet him. \n\t  \n      He nods toward the deputy. \"You're keeping interesting company these days.\"\n\t  \n      You figure it's best to just let that comment lie.\n      *goto hammondtalk\n    *else\n      *set deputy %-10\n      Winslow just scowls at you. \"You want to talk to him, you go right ahead, but don't you try to play me for a fool.\"\n      *goto elijahapproach\n  #A little violence might not go amiss.\n    \"I'll handle it,\" you tell Winslow, cracking your knuckles. The deputy's perpetually sour face lights up, and he takes your horse as you dismount.\n    *goto brawl1\n  #Talking to Elijah is a waste of our time.\n    *goto waste\n\t  \n*label notcheating\n*set lawless %+10\nIt's not cheating until you act on it, right?\n*goto seduce\n\n*label seduce\n*set talkin %+10\n\nElijah is a hard man to read. It's one of the things that makes him such an accomplished gambler. You lean forward and speak quietly into his ear, making the type of suggestions that would have you all a titter.\n*if talkin >65\n  *set mason %+10\n  \"I never knew you had it in you, ${firstname},\" he says, pouring at least as much seduction back into his tone as you've been using. \"We'll continue this discussion later, I trust.\"\n  *goto cracked\n*else\n  Elijah just claps you on the shoulder. \"Never bluff a bluffer,\" he says quietly.\n  *goto nohelp\n\n*label terriblebrawl\nYou shove Elijah up against the wall surrounding Mason's mansion, hidden from the house's view by Mason's well-kept cottonwood trees. \"What business do you have with Mason?\" you demand.\n*if brawlin > 50\n  Elijah doesn't put up much of a fight. He doesn't have a reputation for violence, and you can see by the sheen of sweat that breaks out on his normally hard-to-read face that the threat of it is enough to cow him. How the man has survived saloon brawls is a mystery.\n\t\n  You let him go, and he stumbles forward briefly as Winslow approaches.\n  *goto cracked\n*else\n  *set deputy %-10\n  Even a pansy gambler like Elijah Hammond isn't afraid of you. He slowly removes your hands from his lapels, then dusts himself off. \"I hardly think that's behavior suited to a civilized town like Willow Creek,\" he says, and you can't quite tell if he's being sarcastic.\n\t\n  Winslow cracks his knuckles. \"Maybe it takes a lawman to put some fear into you?\"\n\t\n  \"Fear is something with which I am quite familiar,\" says Elijah. \"As is law. And unless you have documentation stating an adequate reason to detain me…?\"\n\t\n  Elijah watches with an unreadable expression as Winslow's face falls. \"I thought not.\" He tips his hat at both of you. \"Perhaps some other time, then.\"\n\t\n  You and Winslow avoid looking at each other until after he's out of sight.\n  *goto mansion\n \n*label mansion\n*page_break\nHow do you intend to approach Mason? Winslow prefers a straightforward approach—just beat on the man's door until he lets you in and demand answers to your questions. Do you have a better plan?\n*choice\n  *hide_reuse #I use my investigative skills to find a surreptitious point of entry.\n    *gosub end_trial\n    *set investigatin %+10\n    *set greengage %+10\n    The gate appears to be perpetually left unlocked, so there would be no trouble crossing the wall by the front—but there might be trouble going through the front unnoticed. The Mason mansion is clearly well kept: You notice that the building is in the Second Empire style, with mansard roofs, but the brick is all locally made. There's plenty of greenery surrounding it, all well manicured. There are several windows facing the street, their view partly blocked by the cottonwood trees in the yard: two at the porch level, three on the second floor, and three on the third. A cupola rises above the third floor, with a window on each of its four sides. The effect of the house is a rather boxy Victorian with lovely ironwork on the balcony trellises.\n\n    Aside from the gate, there are no other obvious entrances over the wall, though the wall itself is only about as tall as an average man, and is more symbolic than a practical line of defense.\n    *label backyard\n    *choice\n      *hide_reuse #I look for an area where the trees conceal the wall from view and climb the wall there.\n        *set investigatin %+10\n        *if investigatin > 65\n          There are plenty of trees providing shade for the mansion, and there's a trio of them in the back, hiding the wall well enough that you can take your time climbing over.\n\t\t  \n          Winslow grumbles, but follows you into the backyard. \n          *label yard\n\t\t  \n          The back door of the mansion isn't too far from this part of the wall, though there is also a closer, closed window. At the farthest corner of the back side of the house, past the back door, there is a window that is wide open, letting out the smell of a fresh apple pie.\n          *choice\n            #Head for the door. I can pick the lock.\n              *set investigatin %+10\n              One of the useful skills you've picked up in your line of work is lock picking. You're pretty fast at it. And in no time, the back door is open, and you slip inside.\n              *goto sneaky\n            #Odds are good that the closed window can be jimmied open quietly.\n              *set gamblin %+10\n              You're betting that the closed window is going to be the quickest and easiest entrance.\n              *if gamblin >65\n                And it looks like you were right. The window slides open with little effort on your part, and it's close enough to the ground that you only have to lever yourself over a little bit to get into the house. You find yourself—and Winslow shortly after you—in a parlor.\n                *goto sneaky\n              *else\n                But it looks like your luck wasn't with you this time. The window isn't only stuck.\n                *goto distinctive\t\t\t\t\n            #Mmmmmm, pie. Make a quick dash and swing into the far window.\n              *if brawlin >65\n                You dash across the yard, counting on speed more than stealth, and you vault into the window and over the pie that's cooling on the windowsill. You grab the pie out of the way and set it down on the counter—it's cool enough not to burn your hands—as Winslow levers himself into the window. The kitchen is empty for the moment, and you have a minute to catch your breath before you decide where you're going to head.\n                *goto sneaky\n              *else\n                You're just not fast enough. And, unluckily, the window—or maybe the pie— is being watched by a man in the cupola—a boxy square atop the third story with windows in each direction. You notice the man just after you hear the sound of a bolt-action rifle being cleared.\n                *goto sound\n        *else\n          Unfortunately, you aren't sure enough of the view from that cupola—you might be able to be seen from pretty much anywhere around the wall.\n          *label onefailure\n          *choice\n            #I try to sneak over the wall another way.\n              *goto backyard\n            #I'll go around to the front and trust my luck that the back door's open after all.\n              *goto luck\n            #Forget all this sneaking and just knock on the door.\n              *goto frontdoor\n      *hide_reuse #I find an open spot in the wall, vault over, and dash to cover.\n        You've honed your physical skills with brawls and riding, and a little wall won't stop you.\n        *set brawlin %+10\n        *if brawlin > 65\n          You make the leap over the wall easily. Winslow's not quite as quick as you are, but he levers himself over with brute strength. Soon, the two of you are crouched in the backyard, Winslow grumbling quietly next to you.\n          *goto yard\n        *else\n          But despite your confidence, you run smack into reality: You can't hop over this wall any better than you could vault a train car.\n          *goto onefailure\n      *hide_reuse #Gunfire is a distracting sound. I take a shot at the top of the flag pole to get everyone's attention to the front of the house.\n        *set greengage %-10\n        *set shootin %+10\n        It's not an easy target at this distance, but at least it's standing still. You settle in and take aim….\n        *if shootin > 50\n          The bullet rings off the top of the flag pole, but though the sound of the gun's discharge is distorted by the acoustics, it's not distorted enough to keep four toughs from coming out of Mason's mansion and surrounding you. Still, it was a hell of a shot.\n\t\t  \n          \"Hell of a shot,\" Winslow acknowledges. \"Dumb idea, though.\" Winslow shows his badge to the approaching thugs.\n          *goto easy\n        *else\n          The shot goes wide, putting a hole right through the center of the star in the Bonnie Blue flag. The result is that the loudest sound came from the discharge of your gun, not the top of the flag pole, and though the sound is distorted by the acoustics, it's not distorted enough to keep four toughs from coming out of Mason's mansion and surrounding you.\n\t\t  \n          \"So much for that brilliant idea,\" Winslow snipes at you, showing his badge to the approaching thugs. \n          *label easy\n          \"Easy, fellas. We just want to ask Mr. Mason some questions.\"\n\t\t  \n          The tallest tough, a gorilla of a man with shoulders wider than two men put together, glares at you. \"You disrespectin' the Bonnie Blue?\"\n          *choice\n            *if (war=\"Confederate\") #I'd never disrespect a Confederate flag, no matter how unofficial.\n              You apologize quite sincerely to the tough, and he seems to take your word for it.\n              *label escort\n\t\t\t  \n              \"We'll show you to Mr. Mason,\" he says grimly, and the toughs usher you and Winslow back through the front door and directly to Mason's study.\n              *goto masontalk\n            #I don't have any respect for the Confederate flag, but I'm prepared to bluff.\n              *if talkin > 60\n                You apologize, appearing quite sincere, and the thugs don't seem to be the sharpest spikes in the rail, so they don't trouble you about it any further.\n                *goto escort\n              *else\n                You apologize, but you can't seem to keep your lack of sincerity from slipping through. The toughs quickly take offense, and Winslow steps back, clearly not about to get between you and a beating.\n                *goto toughsbrawl\n            *if (war=\"Union\") #I didn't fight for the Union to respect a Confederate flag, and I'll say so with my fists.\n              *set brawlin %+10\n              \"War's over,\" you say, squaring off. \"You lost.\"\n\t\t\t  \n              Winslow backs away, clearly not about to get in between you and a beating.\n              *label toughsbrawl\n              *if brawlin > 65\n                *set health %-5\t\t\t\t\n                The gorilla makes a grab for you, but you dodge out of the way, and he grabs one of his buddies—a short tough wearing a bowler hat—instead. The tallest of the thugs—who you start thinking of as String Bean—already has a shiner in progress, and despite his reach, he's not fast enough to grab you. You ram your shoulder into his ribs and he crumples as the wind is knocked out of him. But as he's going down, he throws a wild punch and hits you in the shoulder. Bowler Hat stomps on Gorilla's feet to get the bigger man to let go just as the last thug, a fire-headed and sunburned brute with freckles, dives at you. Again, you dodge out of the way, and Freckles sends Bowler Hat and Gorilla into a pile. String Bean, recovering his breath, reaches into his waistband for a knife, so you've no choice but to knock him senseless. \n\t\t\t\t\n                Freckles lunges for you from behind, but you throw him over your shoulder and onto the ground, then punch him while he's down for good measure. Gorilla and Bowler Hat are still at it on their own—apparently no love lost there—and you think this might be a great time to mosey about your way. Given the ruckus, Winslow refuses to try to sneak in again, and you suspect he's contemplating arresting you. Instead, he just heads for the front door, and you count a couple of bruises that must mean some punches you weren't paying attention to got through.\n\t\t\t\t\n                Still, pretty invigorating for a mid-afternoon fracas.\n                *page_break\n                *goto frontdoor\n              *else\n                *set health %-15\n                *set deputy %-10\n                The gorilla grabs you by the shoulders and spins you around, holding you against his chest. He's just too big to move, and despite a few well-placed kicks at his knees, he's as solid as a boulder. The other three thugs take turns punching you for a bit—mostly concentrating on your face and your stomach—until Winslow finally says, \"I think that's enough boys. I'm sure ${pronounhe}'s learned ${pronounhis} lesson.\"\n\t\t\t\t  \n                A few more punches make it through before Winslow's words register. The gorilla drops you on the ground and says gruffly, \"We'll take you to see Mr. Mason.\"\n\t\t\t\t  \n                Winslow helps you to your feet with an expression of disgust you can't mistake, and you limp along where the toughs lead.\n                *page_break\n                *goto masontalk\n            #I say, \"I don't care about symbols one way or the other—just a man's actions.\"\n              The toughs look confused, wondering if you're actually looking for a fight or if you're getting philosophical.\n              *choice\n                #I take advantage of the momentary confusion to head toward the front door, keeping my poker face on.\n                  *set gamblin %+10\n                  It's a risk, but the toughs, who aren't the sharpest spikes in the rail, fall for it, and you and Winslow reach the front door unhindered.\n                  *goto frontdoor\n                #You wax philosophical just long enough to bore them completely.\n                  *set talkin %+10\n                  By the time you reach your conclusion, they seem to have forgotten why they were upset with you in the first place. They aren't the sharpest spikes in the rail.\n\t\t\t\t  \n                  \"We'll take you to Mr. Mason,\" one of them says finally, and they usher you and Winslow back through the front door and directly to Mason's study.\n                  *goto masontalk\n                #Hell yes, I'm looking for a fight!\n                  *set brawlin %+10\n                  To make it obvious, you throw the first punch. It connects, and all hell breaks loose.\n                  *goto toughsbrawl\n  #I trust my luck that the back door is open, and no one's looking my way.\n    *gosub end_trial\n    *label luck\n    *set gamblin %+10\n    Despite the fact that you and Winslow have been loitering in front of the house, you're sure no one has noticed you yet. You and Winslow tie up your horses down the street a ways, then walk back to the Mason mansion as though you belong exactly where you are.\n\t\n    Winslow has no trouble with a confident walk, but he does grumble about your idea of sneaking around.\n\t\n    The gate is unlocked, and you and Winslow saunter around the yard, enjoying the shade provided by the cottonwood trees and the well-manicured shrubs that surround the mansion. \n    *page_break\n    *if gamblin > 70\n      *set sneak true\n      The back door is, in fact, unlocked, so your bet has paid off. You hear the sound of whistling from above—probably from the cupola, a boxy square room atop the third story with windows in each direction—but no one has noticed your presence. You open the door and step inside.\n      *goto sneaky\n    *else\n      When you reach the back door, however, you find that your gamble has not paid off. \n      *label distinctive\n      It is locked, and, it seems, watched by a man in the cupola—a boxy square atop the third story with windows in each direction. You notice the man just after you hear the sound of a bolt-action rifle being cleared.\n\t  \n      *label sound\t  \n      It's a very distinctive sound.\n\t  \n      Deputy Winslow seems unperturbed. He shines his badge up at the cupola. \"Just here to see Mr. Mason for a few questions,\" he calls up.\n\t  \n      A gruff voice above you shouts down, \"Come on to the front door, then.\"\n\t  \n      Winslow shakes his head at you and starts toward the front—which had been his preferred plan all along.\n      *set deputy %-10\n\t  \n      *goto frontdoor\n  #I approach Mason directly and knock on the door.\n    *gosub end_trial\n    *set deputy %+10\n    Why bother with all that sneakin' around when you could just knock? Especially after you've just been standing outside for a while. Mason may have plenty of greenery surrounding his house and some tall cottonwoods blocking a partial view of the street, but your interactions with Elijah might not have gone unnoticed.\n    *label frontdoor\n\n    The door is opened by a middle-aged woman of Hispanic descent dressed as a housekeeper. You announce that you're here to see Mr. Mason and she nods, beckoning you into the house. As you follow her, you count no fewer than six burly men on the first floor alone. That's an awful lot of muscle hanging around a man who works as a banker.\n\n    The rooms you see are all formal—a parlor, a dining room, and then Mason's office.\n    *label masontalk\n\t\n    Mason is sitting at his desk in a room full of bookcases, lit by a large open window and a small gas lamp. Two large men hover nearby. Mason recognizes Winslow and smiles, standing as you enter. \"Deputy Winslow, and friend,\" he says, nodding at you. \"How ever may I help the law today?\"\n\t\n    *label masontalk2\n    *set chat false\t\n\t\n    Winslow grunts in response. \"This is ${name}, a consultant on a missing persons case. We're looking into the disappearance of Victoria Frye.\"\n\t\n    Mason, a broad man with a thick mustache and wire-rimmed glasses, shakes his head, doing a well-feigned expression of sympathy. \"Yes, I'd heard about that. Dreadful thing for a young girl to go missing. I am curious why it would bring you here, however.\"\n    *choice\n      #I sit down and have a conversation with Mason like a reasonable human being.\n        *set talkin %+10\n        *set greengage %+10\n        No reason not to behave as though you're all reasonable people. After a moment's hesitation, Winslow sits as well, though he looks unhappy about it.\n\t\t\n        \"We believe you might have evidence pertinent to the case, Mr. Mason,\" you say in your best polite voice.\n\t\t\n        Mason looks amused. \"Ask away.\"\n        *label questions\n        *choice\n          *hide_reuse #\"Mr. Frye believes you may have something to do with his daughter's kidnapping.\"\n            *set masonquestions +1\n            \"I'm sure he does,\" Mason says simply. \"Mr. Frye believes that everything I do has some alternate motivation of impacting him and his family.\" He offers a tight smile. \"Mr. Frye and I don't get along.\"\n\t\t\t\n            \"Care to elaborate?\" Winslow prompts.\n\t\t\t\n            Mason sighs. \"Mr. Frye and I have never gotten along. I acknowledge that I want his land, and that I'm happy to do what I can to encourage him to take my offers. But Mr. Frye would have you believe that I'm the villain and he's some bastion of goodwill. This, from the man who has undermined my efforts to bring Willow Creek into the future at every turn! The railroad was supposed to bring even greater prosperity to Willow Creek, but Mr. Frye was determined to keep the rail out of his property, delaying the track years—years!—with the only resolution being rerouting the track through my own land, or the railroad might have failed entirely. It's just one in a long series of examples.\" Mason gestures to Winslow. \"You can check the records of town council meetings. The animosity he feels toward me has a long history.\"\n            *choice\n              *if (progressrant) #\"Bring Willow Creek into the future?\"\n                *label progress\n                *set progressrant false\n                \"Are you a believer in Progress, ${titlemr} ${surname}? A follower of the works of Mr. Morse, Mr. Faraday, and Mr. Meucci—all of whom have made great strides in the inventions of devices to better the human condition? Do you subscribe to Popular Science?\" He gestures to a small stack of magazines on his desk bearing the title. \"I hope to bring Progress to Willow Creek. To find better ways to supply light than oil and gas lanterns. To harness the powers of nature to serve man, rather than to have man continually serve its whims. Did you know it took only one man—one man!—to set the Industrial Revolution into motion? Eli Whitney's invention of the cotton gin—a simple device when properly considered—changed the entire economy of the South.\"\n\t\t\t\t\n                \"As much good as that does them now,\" Winslow mutters, and either Mason is caught up enough in his rant or polite enough not to notice.\n\t\t\t\t\n                \"The rail is a vital part of the future of Colorado Territory. We must prevent railroad investors from seeking other railways to support—I've written letters to editors and peers in an effort to stem the current exodus that seems to be transpiring.\" You recall at least one of those letters in the Willow Creek Examiner. And you've heard about people pulling out of Colorado Territory railways now that the Transcontinental Railroad is completed through the Wyoming Territory. \"But we must also seek new means of bringing business and inventions here in order to prevent the Territory of Colorado from being completely left behind. Don't you agree?\"\n                *choice\n                  #Absolutely. Progress is vital to the survival of any community.\n                    *set progress %+20\n                    *set mason %+20\n                    Mason is pleased to see someone like-minded in his office.\n\t\t\t\t\t\n                    You think Winslow may have fallen asleep.\n                    *goto questions\n                  #And what about preserving the wild places?\n                    *set progress %-20\n                    *set mason %-10\n                    You counter his discussion of Whitney with quotes from the works of Ralph Waldo Emerson. You think you hear Winslow snoring.\n\t\t\t\t\t\n                    Mason just shakes his head. \"And such I continue to face in my efforts to better the lives of my neighbors,\" he says with a sigh.\n                    *goto questions\n                  #I think I fell asleep. I nod and smile.\n                    *set mason %+10\n                    Mason looks pleased that you agree.\n                    *goto questions\n                  #This has nothing to do with our case.\n                    Mason shrugs. \"I don't believe that anything I say will help you with your case. But do go on asking your questions.\"\n                    *goto questions\n              *if (notasked) #\"So, you don't deny trying to strong-arm him?\"\n                *label strongarm\n                Mason shakes his head. \"It is possible that some of my hired help have taken my advice to put pressure on Mr. Frye rather more strenuously than I intended. I'll make sure to look into any complaints Mr. Frye would care to level at me. Any staff I find acting outside of my best interest will, of course, be let go.\"\n\t\t\t\t\n                You notice that Mason has very carefully not actually admitted to being responsible for anything.\n\t\t\t\t\n                \"But I assure you, I've nothing to do with Miss Frye's disappearance. Please, look around my home until you are content I've told the truth. But before that, do you have further questions for me?\"\n                *goto questions\n              #\"You seem to have motive for revenge….\"\n                At this, Mason just laughs. \"My revenge will come soon enough, and not through my own efforts. Frye's ranch is failing. I give him another five years before he has to fold, unless he can find some outside investors. And I doubt, given his track record, that there will be any interested parties.\"\n\t\t\t\t\n                You suspect Mason may have something to do with making sure of that.\n\t\t\t\t\n                \"But kidnapping?\" Mason continues. He gestures around his house. \"You're welcome to look around. You'll find that the only women in my home are under my employ. Now, do you have any further questions for me?\"\n                *goto questions\n          *hide_reuse *if (opportunity) #\"Mr. Hammond mentioned an interesting business opportunity….\"\n            *set masonquestions +1\n            \"Ah, yes, the intrepid Mr. Hammond,\" Mason says. \"He's a fine man, and a useful investor. Likes risk. I don't see what that has to do with young Miss Frye.\"\n\t\t\t\n            \"Just consider me curious,\" you answer.\n\t\t\t\n            \"It's a bit of a secret,\" he says, \"so I'm afraid I can't divulge any details until all the paperwork is properly worked out. But it will spell big changes for Willow Creek. We'll be moving into the future!\"\n            *if progressrant\n\t\t\t\n              \"What type of future do you see?\" you ask.\n              \n              *goto progress\n            *else\n\t\t\t\n              Mason's grin is boyish, but he looks at you and remembers you're here on business. \"But surely that isn't what you wanted to discuss. How else may I help you?\"\n              *goto questions\n          *hide_reuse #\"Do you have any interactions with the Utes?\"\n            *set masonquestions +1\n            *set utes %+10\n            *set utesmason true\n            *set utesmasonally +1\n            Mason brightens. \"I'm so glad you've asked! So many people complain about their presence on what previously was territory they regularly traveled. Of course, the federal government has now declared they must farm on parcels of land no good for farming, which is nonsense. Such disrespect for a knowledgeable people! But unsurprising from the Union, given their continued poor relationships with the native people of this continent, unlike the treaties formed by the Confederate government, which are now so much scrap paper.\"\n\t\t\t\n            He looks bitter for a moment, then leans toward you across his desk urgently. \"The truth of the matter is that in order for people to embrace Progress, they must experience its benefits. Indeed, the Cherokee, Creek, and Choctaw peoples farmed in the style of other Southerners until recent political events changed the practicality of that structure.\"\n\t\t\t\n            You assume here he means that they held slaves to work their farms. You'd heard about that.\n\t\t\t\n            \"When the benefits are clear, sensible people will adopt a lifestyle that delivers those benefits. Thus, intrepid men like me seek out ways to incorporate our Ute neighbors as business partners rather than enemies. I have made entreaties to our Ute neighbors in hopes that they might leave behind their reliance on a nomadic lifestyle, which is untenable in this modern age, and join the world of science—as surely, their chief, Ouray, would want, given his negotiations with President Grant.\"\n            *if gamblin > 60\n              His bitterness returns as he speaks the president's name, but it's gone quickly enough that someone not used to calling other people's bluffs might not have noticed it.\n\t\t\t  \n            Mason shrugs. \"But I'm not sure how that helps with your investigation. Did you have other questions?\"\n            *goto questions\n          #\"We'd like a look around.\"\n            Mason nods. \"Help yourselves. And please see yourselves out when you're finished.\"\n            *if (notcaught)\n              *label runofthehouse\n              *set greengage %+10\n              But of course, you've already had your run of the house. \n              *label novic\n              There was no evidence of Victoria Frye in the mansion, and you're inclined to believe Mason's denial of that involvement at least.\n\t\t\t  \n              Which means you're back at square one, and it's getting on toward evening. Might be time to have a quiet drink.\n              *goto health\n            *else\n              *goto explore\n          *if (masonquestions > 0) #I'm done investigating here.\n            Mason has one of his men see you to the door. It's all done very politely, but with an undercurrent of violence that's off-putting in an ostensibly civilized house. \n            *goto novic\n      #Intimidation is a great tactic, no matter how many brutes are under Mason's employ.\n        *set brawlin %+10\n        *set deputy %+20\n        *if brawlin > 80\n          As you talk, discussing the ways you have of getting information out of people, Mason's expression goes from confident to uncertain. You can tell he is not a man easily cowed.\n\t\t  \n          *label wanttoknow\t\t  \n          \"I'll tell you what you want to know,\" he says. \"I have threatened Frye in the past—it's an ongoing part of our relationship. He undermines my attempts to bring Willow Creek into the future and I try to purchase his land out from under him. Strong-arm tactics are just a small part of how we interact. But I'm hardly the only guilty party in our rivalry. You can check the town records on that. And I certainly did not kidnap his daughter! You are welcome to look around. You'll find that the only women in my home are under my employ.\" He shuffles some papers on his desk; you see the most recent issue of the new magazine Popular Science in the mix. \"Once you've finished, please see yourselves out.\"\n\n          *if (notcaught)\n            *goto runofthehouse\t\t  \n          *else\n            *goto explore\n        *else\n          Mason glares at you. \"I don't take kindly to being threatened in my own home. Now, if you care to behave in a civilized fashion, I am happy to help the law. If you wish to level accusations at me and wave your fists, I will have you escorted out, unless you can show me a warrant.\"\n          *choice\n            #I'll behave. But I don't have to like it.\n              *set deputy %-20\n              You sit, and you can almost feel the deputy's respect for you drop.\n              *goto questions\n            #I'll call his bluff. We'll just have to come back with a warrant.\n              *set gamblin %+10\n              *set deputy %+10\n              You tell Winslow he needs to order a warrant, and he glares at you. \"Don't suppose you'd just save us some time and tell us what you know about Victoria Frye?\" he says to Mason. \"I'd hate for a search warrant to go on your record….\"\n              *if gamblin > 60\n                This works where your threats of violence did not. You were right—he was bluffing.\n\t\t\t\t\n                *goto wanttoknow\n              *else\n\t\t\t  \n                \"I'll see you upon your return, Deputy Winslow,\" Mason says calmly. \n                *label goons\n                He gestures, and three hired toughs loom over you, all of them clearly showing their guns.\n\t\t\t\t\n                \"Ain't a time for a gunfight,\" Winslow mutters. \"We'll get what we need later.\"\n\t\t\t\t\n                Which effectively puts you back at square one. You can't move on Mason and you don't have any other leads. It might be time to sit down and mull this over with a good, stiff drink.\n                *goto health\n\n            *if (notcaught) #Fine. We've had our run of the house anyway.\n              There was no evidence of Victoria Frye, and it's clear Mason doesn't want to have anything to do with you. You glare at the banker and threaten to return with a warrant—but you doubt there's a point. Victoria Frye isn't at the Mason mansion. Which leaves you back at square one and in need of a quiet drink.\n              *goto health\n            #I make a reference to something blackmail worthy I heard about him in one of my prior investigations.\n              *if investigatin > 70\n                This works where your threats of violence did not. Clearly, Mason is more concerned about reputation than physical harm.\n\t\t\t\t\n                *goto wanttoknow\n              *else\n                \"Get out of my house,\" Mason says, quietly, but with steel backing his words.\n                *goto goons\t\t\t\t\n      #Conversation always goes more smoothly for me if there are cards involved….\t\n        *set gamblin %+10\n        *set deputy %-10\n        Mason laughs and pulls a deck of cards out of his desk drawer. \"Shall we make wagers for cash or information?\"\n\t\t\n        \"Hard to say which is more valuable,\" you respond thoughtfully. \"How about both?\"\n        *if gamblin > 50\n          *set money %+15\n\t\t  \n          You're a far better card player than Mason—that, or he's letting you win. Yep, you're pretty sure that's it. Which is curious. But you get the sense that he wants to answer your questions. That, with his answers, he's trying to convert you over to his way of thinking.\n\t\t\t\n          You're also making a fair bit of cash on the side.\n\t\t\t\n          What questions do you want to ask?\n          *goto questions\n        *else\n          *set money %-10\n          It seems that Mason's as good a card player as he is a businessman, though you get the sense that he's letting you win a hand here and there to keep you in the game. It's almost as though he wants to answer your questions.\n\t\t\t\n          He's also getting a juicy tidbit or two from you as he's providing his answers. Information does have its own value, and you've just given up a handful of metaphorical change. But he is talking.\n          *goto questions\n      *if (utesclear) #I want to confront him about sending thugs to stampede Frye's cattle.\n        *set notasked false\n        *goto strongarm\n\t\t\n*label sneaky\nThere are several large men, probably armed, on the first floor, but you can see that the path to the stairs is clear. How do you proceed?\n*choice\n  #Eliminate the guards one at a time by knocking them out.\n    *if brawlin > 80\n      *set deputy %+20\n      *set notcaught true\n      It's nearly impossible to sneak up on all of the thugs, but you're good with a headlock, and soon, the guards have dropped like flies, leaving you and Winslow with the run of the house.\n\t  \n      \"I'd think about arresting you,\" Winslow mutters, \"but that was damned handy.\"\n\t  \n      A compliment from Winslow? That's a lot of impossible things happening in tandem. Maybe you'll find Victoria upstairs and you can all go home.\n      *goto explore\n    *else\n      *set health %-10\n      It's a nearly impossible task—and, it turns out, one not possible for you. You're able to knock out one guard, but the next tough appears before you've finished the job, and then there's a mob of them. Both you and Winslow take a few hard knocks before they deliver you to Mason's office.\n      *label caught\n\t  \n      \"Caught these two sneakin' around, Mr. Mason,\" says one of the toughs.\n\t  \n      Mason is sitting at a large desk in a room walled with bookshelves. He looks at Deputy Winslow in surprise. \"You know, you could have just knocked,\" he says, as though a lawman breaking and entering his house is the most natural thing in the world. \"Who's your friend, Deputy?\"\n\t  \n      *goto masontalk2\n  #Dash for the stairs and accept the risk of getting caught.\n    *if gamblin > 65\n      Not only is your luck with you on the first floor, but it appears that there are no guards on the second floor—at least, not immediately visible. You'll have to stay quiet, but it looks like you've got the run of the house.\n      *goto explore\n    *else\n      *set health %-10\n      Your luck wasn't quite enough to get you to the stairs, and soon several toughs have surrounded you, giving both you and Winslow a few hard knocks before they deliver you to Mason's office.\n      *goto caught\n  #Watch the patterns of the guards and wait for the right opportunity.\n    *if investigatin > 50\n      It doesn't take long to determine that it's a somewhat random pattern—these aren't professionally trained guards, just hired thugs. Which is interesting in and of itself. What is Mason doing with so much muscle on staff?\n\t  \n      But you hear the moment as soon as it happens: One of the toughs calls for the others to see something—probably an attractive woman—passing outside the front of the house. You and Winslow make your way quietly up the stairs, taking your time. At first glance, there don't seem to be any guards on the second floor. So though you'll have to be quiet, it looks like you've got the run of the house.\n      *goto explore\n    *else\n      There's no pattern you can discern, so you take your best guess at the moment to move. Unfortunately, it wasn't a very good guess. Soon several toughs have surrounded you, giving both you and Winslow a few hard knocks before they deliver you to Mason's office.\n      *goto caught\n*label explore\n\n*set notcaught true\nThe second floor has a couple of bedrooms, a sitting room, and a breakfast room that looks like it doubles as a library. You spend a little time there, looking for anything you might find about Mason's business, but you suspect based on the more frivolous titles lining these shelves that his work files are kept in his office on the first floor. One of the bedrooms looks as though it must be Mason's; it's the only well lived-in room on the whole floor, and a tall wardrobe houses a number of suits that look in keeping with what you hear they're wearing out East. The other bedroom has a few women's outfits in it, but they're nothing like the clothing a sixteen-year-old young woman would wear, and they appear to be for a woman older and taller than Victoria.\n\nNo evidence of a girl here, especially not one being held captive.\n\nThe third floor is only slightly more interesting—that is, until you hear a popping sound coming from behind a closed door. After a quick nod from Winslow, you push the door open to reveal a laboratory that would fit well in a dime store novel. Gears and small steel rods are strewn about one table, weights and counterweights piled on anther, while at a far corner of the room, a woman in her mid-twenties, eyes covered by goggles, is using a hammer to hit one side of a small, misbehaving steam engine. After her unorthodox attempt at repair, the engine begins chugging away rather than popping, and a small, attached turbine spins in response.\n\nBlueprints on a drawing board show specifications for a much larger turbine than the one the young woman is experimenting with. Lost in her work, the woman doesn't seem to have noticed you.\n*choice\n  #I've seen enough. There's no evidence of kidnapping in this house.\n    The young woman in the room might feel out of place, but she's not Victoria Frye, so she's just not that interesting to you.\n\t\n    Where do you go now?\n    *label lab\n    *choice\n      #We're done here. Finish poking around the house and leave.\n        *set greengage %-10\n        *label donehere\n        You haven't found anything that points to Mason's involvement in Victoria's kidnapping, which means you're back at square one. You let yourself out the way you came in.\n        *goto health\n      *if (chat) #Might as well talk to Mason while I'm here.\n        *label return\n        You return downstairs and make your way to Mason's office—he looks up, surprised at your unannounced appearance, but only for a moment. Two toughs stand by the window at the far side of his office, and Mason remains seated at his desk. He nods at your partner.\n\t\t\n        \"Deputy Winslow and…friend,\" he says in greeting. \"What a surprise to see you here.\"\n        *goto masontalk2\n      #No harm in asking the woman a few questions, as long as I'm here.\n        *goto tess\n      #I want to steal those blueprints.\n        Just because they're not apparently involved with your case doesn't mean they're not relevant. \n        *if investigatin > 65\n          *set hydroclue true\n          You sneak over, snag the blueprint from the board while the young woman is adjusting a series of gears on the engine, and you and Winslow exit out the way you came.\n          *label lastoptions\n          *choice\n            #We're done here. Finish poking around the house and leave.\n              *goto donehere\n            *if (chat) #Might as well talk to Mason while I'm here.\n              *goto return\n        *else\n          *goto seeyou\n  #I sneak into the room, looking for clues while the woman is distracted.\n    *set investigatin %+10\n    *if investigatin > 55\n      The young woman is clearly involved in her work, and the steam engine is loud enough to cover the sound of even Winslow's footsteps. For the most part, you can't even decipher the tools in the room—probably because you don't have an advanced degree in engineering. The young woman, however, seems quite adept at her task. Along with puttering with the steam engine, she is making a number of mathematical notations on the blueprints on the drawing board.\n\t  \n      Whatever she's working on, it's not a kidnapping scheme. And she's clearly no prisoner here.\n      *goto lab\n    *else\n      *label seeyou\n      Though the young woman is clearly involved in her work, she's also more observant than you were hoping. And Winslow's shoes are awfully squeaky.\n\t  \n      \"I can see you, you know,\" she says absently, continuing to adjust the steam engine. The turbine picks up speed. \"Care to introduce yourselves? Or should I just keep ignoring you, so long as you don't touch anything?\"\n      *choice\n        #The jig is up. I introduce myself.\n          *goto tess\n        #\"Just pretend you didn't see us.\"\n          The young woman smirks, then returns her attention to the machine. \"I've gotten quite adept at ignoring things that seem out of place around here. Good day, whoever you are!\"\n          *choice\n            #Wait, what did she mean by that? We'd better chat after all.\n              *goto tess\n            #She's just playing with my head.\n              *goto lastoptions\n        #I grab the blueprints and run. She won't catch me.\n          *if brawlin > 50\n            *set brawlin %+10\n            *set hydroclue true\n            You're faster than the young woman, but she's got a quicker response time than you expected. As you grab the blueprints, she brings a metal rod crashing down on the drawingboard, nearly managing to clip you. But then you're gone, rushing down the stairs and out of the house. The strange blueprints may yet be a clue, but for the most part, it looks like Mason wasn't involved in the kidnapping. For now. And you're back at square one.\n            *goto health\n          *else\n            *set brawlin %+10\n            *set health %-10\n            *set deputy %-10\n            The young woman is surprisingly fast. When you make a grab for the blueprints, she brings a metal rod crashing down on your hand. It keeps you from grabbing the blueprints, and the threat in her eyes as you dart away makes you think she'd keep hitting you until you cleared out. You run for it, and Winslow follows after, all the while muttering disparaging comments under his breath. You're back at square one, and you don't even have mysterious blueprints to show for it.\n            *goto health\n  #I introduce myself and ask her a few questions.\n    *label tess\n    *set greengage %+10\n    \"Sorry for disturbing your work, Miss,\" you say. \"I'm ${name}, and this is Deputy Winslow.\"\n\t\n    The young woman wipes a greasy hand on what appears to be some sort of coverall draped over her dress, then offers it to you. \"Tess Albertson,\" she says. \"I hope nothing terrible has happened to bring you to Mr. Mason's house.\"\n\t\n    \"We're investigating a missing person,\" you explain. \"Would you be willing to answer some questions for us?\"\n\t\n    She shrugs. \"I don't know how I'll be of help, but I'll do my best.\"\n    *label tesstions\n    *choice\n      *hide_reuse #\"What do you know about the Frye family?\"\n        *set questions +1\n        Miss Albertson shrugs. \"They're a local family, I assume? With a missing person? I'm afraid I don't get out into Willow Creek very much. I stick close to my lab and my tools, and will until my project is over.\" She looks thoughtful for a moment. \"You know, actually, I do think I heard Mr. Mason say something about how a Mr. Frye would be lucky to keep his ranch going for anything more than five more years. I assume the family has fallen on hard times, then, and that Mr. Mason's not upset about ill luck befalling them. Is that helpful?\"\n\t\t\n        *goto tesstions\n      *hide_reuse *if (project) #\"What are you working on?\"\n        *set project false\n        *label work\n        *set questions +1\n        *set workrant false\n        Miss Albertson's face brightens. \"It's an incredibly exciting project! Do you know very much about electricity, ${titlemr} ${surname}?\"\n\t\t\n        You think you catch Winslow rolling his eyes before he goes over to poke at the devices on one of the tables. He clearly doesn't have any faith that this woman could know what she's talking about.\n\t\t\n        \"Some,\" you answer. It's usually best to let the person you're questioning do the talking, after all.\n\t\t\n        \"It's an incredibly exciting field to be a part of right now,\" she says, practically bubbling over with excitement. \"It's the century of electricity, I think. Oh, Mr. Franklin made some discoveries about positive and negative charges around a hundred years ago, but the really exciting work is happening now. Mr. Watt predicted that the steam engine would replace animal power, and I think he'll be proven right, but the tricky bit is to find a consistent way to [i]generate[/i] electricity in a usable format. If it were easy, I think the electric arc lamps would be in more prominent use—can you imagine, houses lit from the inside with electricity rather than gas?\"\n        *choice\n          #\"I can imagine that future—and I'd love to be a part of making it happen!\"\n            Miss Albertson grins at you, knowing she's found a kindred spirit who's just as excited about the world of scientific progress as she is.\n            *set progress %+15\n            *goto tesstinued\n          #\"Why bother? Gas has been working just fine for years….\"\n            *set progress %-15\n            Miss Albertson looks disappointed. \"Efficiency, ${titlemr} ${surname}. If we can improve the way we use resources, they won't become as scarce. I think we all remember experiencing some shortages during the war years.\"\n\t\t\t\n            You suspect she couldn't have been much more than a child back then, but you remember how hard it was to get supplies during the War, so you don't argue her point.\n            *goto tesstinued\n          #I don't know why we're talking about this. Let's go back to my other questions.\n            *goto tesstions\t\t  \n      *hide_reuse #\"Have you seen a sixteen-year-old girl on Mr. Mason's property?\"\n        *set questions +1\n        At this, Miss Albertson titters a laugh in a most unladylike fashion, her broad smile anything but hidden as she giggles. \"The very idea,\" she says after a moment. \"Mr. Mason wouldn't know what to do with a thirty-year-old woman, let alone a sixteen-year-old girl! But then, who really does know what to do with a sixteen-year-old girl? I know I was utterly incorrigible at that age.\" \n\t\t\n        A sudden realization seems to hit her, and the smile vanishes, replaced by a look of pity. \"Oh, you don't mean that a young girl has gone missing! That's dreadful! I hope you're able to find her soon!\"\n        *goto tesstions\n      *hide_reuse #\"How would you characterize your relationship with Mr. Mason?\"\n        *set questions +1\n        \"He's my employer,\" she explains. \"And my patron, I suppose. There aren't very many people willing to employ a woman as an engineer, let alone an inventor!\"\n\t\t\n        Winslow grunts in an approving fashion, as though clearly most people are right about those hiring decisions.\n\t\t\n        \"So I'm very grateful to Mr. Mason.\" She gestures to the lab around her. \"He's given me plenty of space to work—in his own home! If it means I have to overlook certain things that happen around here, or certain details of my project….\" She hesitates.\n        *choice\n          *if (suspicious) #\"What types of things happen around here?\"\n            *goto suspicious\n          *if (workrant) #\"What type of project?\"\n            *set project false\n            *goto work\n          #\"Let's go back to my other questions.\"\n            *goto tesstions\n      *hide_reuse *if (suspicious) #\"Have you seen anything strange around here we should know about?\"\n        *label suspicious\n        *set suspicious false\n        *set questions +1\n        *if talkin > 50\n          She looks toward the door, as though to be sure you're not going to be overheard. \"Don't you find it strange how many large men Mr. Mason has working in his house? It doesn't seem normal for a banker. And I think I've seen evidence of the kitchen being used to perform surgery—for things like gunshot wounds. I think there's some fishy activity happening here, and I think it might have something to do with the project that Mr. Mason has me working on. Which makes me all manner of uncomfortable, I don't mind telling you!\"\n          *choice\n            *if (workrant) #\"What are you working on?\"\n              *set project false\n              *goto work\n            #She hasn't told us anything new. I think we're done here.\n              You thank Miss Albertson for her assistance and bid her farewell.\n              *goto donehere\n            #\"Let's go back to my other questions.\"\n              *goto tesstions\n        *else\n          She shakes her head. \"Not that I care to discuss. I know better than to wag my tongue at shadows. Is there anything else?\"\n          *goto tesstions\n      *if (questions > 0) #\"No further questions, Miss.\"\n        \"I trust you can see yourselves out?\" Miss Albertson asks. But she turns back to her work before she gets an answer.\n        *goto lastoptions\n\n*label tesstinued\nMiss Albertson continues. \"Mr. Mason has me working on a possible way to generate consistent electricity. He read a paper that my academic supervisor and some of my peers worked on for Scientific American on water wheels and the conversion of old hydropower into hydroelectricity. The idea of the water wheel is that a river generates a reasonably consistent amount of energy; the wheel harnesses that energy and uses it to power, say, a mill. But the same idea could be applied on a larger scale for the generation of electricity.\" She shrugs. \"In theory, anyway. But Mr. Mason is insisting on moving forward with some of my more theoretical ideas, and…\" She hesitates, remembering that she's not just talking to herself.\n*choice\n  #I ask her about her concerns.\n    *if talkin > 55\n      \"The truth is, I don't think the designs are ready—and I'm not sure I care for some of the details in the implementation,\" Miss Albertson says after a moment. \"The specifications Mr. Mason has given me don't quite add up the way I'd like them to, and I'm concerned that there's more going on here than Mr. Mason is telling me. But he's lined up a number of investors, and there's a potential fortune to be made by being the first to leap on this type of opportunity….\"\n\t  \n      \"Fortune?\" Winslow says, suddenly paying attention to the conversation again.\n\t  \n      Miss Albertson nods sagely. \"Any time you're introducing a new technology—especially one that will have such a positive impact—the potential for return on investment is staggering. Which sometimes means that projects are rushed into without thorough consideration of all the…implications.\"\n\t  \n      As soon as the discussion returns to morality from the subject of money, Winslow loses interest again.\n      *choice\n        #I encourage Miss Albertson to stick with the project. She's clearly got the brains to make it work!\n          *label forscience\n          *set progress %+15\n          *set mason %+15\n          Miss Albertson lets out a big breath, looking relieved. \"It's as though a weight has come off my shoulders,\" she says. \"I think that's exactly what I needed to hear today to keep working. Thank you, ${titlemr} ${surname}. You've done me a great kindness. Maybe I can return the favor and answer another question for you?\"\n          *goto tesstions\n        #If she has moral concerns…maybe Amelia could help her.\n          *set progress %-15\n          *set greengage %+15\n          *set mason %-15\n          *set talkin %+10\n          Amelia Greengage deals in information—but also in a world that is rarely black and white. \"I have a friend,\" you say. \"Amelia Greengage of the Greengage Detective Agency. She's staying at the Riverside Hotel here in Willow Creek right now.\"\n\t\t  \n          You pull a card from your jacket pocket—you usually carry one of Amelia's cards with you, just in case you need it. \"She's a fair hand at sorting through messy…implications. And even if you don't want to talk 'em through, she's got a soft spot for bright young women needing a little space to themselves to think.\" You gesture around the lab. \"Might be a fine place to work, but I imagine it's hard to get any distance from your worries when the work's all around you.\"\n\t\t  \n          *if talkin > 60\n            *set tessflee true\n            Miss Albertson takes the card and tucks it in her coveralls. \"Thank you,\" she says. \"I'll go to see her this evening. You've given me a lot to think about. But I suppose you've got a lot to think about, as well. Can I answer any other questions for you?\"\n            *goto tesstions\n          *else\n            Miss Albertson shakes her head. \"I don't think I could just abandon Mr. Mason like that after he's been so kind to me. I'll figure it out on my own. But thank you for the kind offer. Can I answer any other questions for you?\"\n            *goto tesstions\n        #If she thinks something underhanded is going on, we should all make a break for it right now.\n          \"If you're worried about those thugs keeping you from leaving, we can get you out,\" you say confidently.\n          *if brawlin > 65\n            *set health %-10\n            *set money %-10\n            *set tessflee true\n            The mention of all those toughs is enough to make up Miss Albertson's mind. \"You're right—who can think clearly in conditions like this? Clear a path and I'll follow you.\"\n\t\t\t\n            The rest is just a matter of not letting anything stop you. You lead the way, plowing through any of Mason's hired hands that get in your path. To any witnesses, it might well look like you're abducting Miss Albertson, but you've got the deputy as a witness to the lady's willingness to come along. Once you get clear of the Mason house, you head to the Riverside Hotel, where you deposit Miss Albertson after putting down some money toward her room. You're feeling a little ragged around the edges after all that fist fighting, but you're glad Miss Albertson will have some time to think away from Mason. There's something just not right about what's going on at the banker's.\n\t\t\t\n            But no evidence to tie him to the kidnapping, either. You're back at square one.\n            *goto health\n          *else\n            She looks at you, then bursts out laughing. \"I'm sorry, but are you serious?\" she asks. \"Break for it. Honestly. No, I'll stay here and mull it over. I'm sure it's nothing, anyway. Can I answer any more of your questions?\n            *goto tesstions\n    *else\n      She shakes her head. \"I'm sure it's nothing. Can I answer any more of your questions?\"\n      *goto tesstions\n  #I encourage her; clearly she's got a good mind, and working toward Progress benefits us all!\n    *goto forscience\n  #I don't know why we're talking about this. Let's go back to my other questions.\n    *goto tesstions\n\n*label health\n*if health >89\n  *set HealthText \"You're fit as a fiddle.\"\n  *goto fit\n*else\n  *if health > 69\n    *set HealthText \"You've got a couple of scratches and bruises to show for your vigorous activity, but it ain't bad.\"\n    *goto Foo\n  *elseif health > 39\n    *set HealthText \"You ache all over, you worry about whether you're bleeding on your good shirt, and you can't really see straight.\"\n    *goto Foo\n  *else\n    *set HealthText \"You're almost dead. It's a wonder you can still stand.\"\n    *goto Foo\n*label Foo\n*if money > 69\n  *set CashText \"You've got a fistful of dollars.\"\n  *goto foo2\n*elseif money > 39\n  *set CashText \"Things are a little tight, and you're not feelin' spendy.\"\n  *goto foo2\n*else\n  *set CashText \"Fact is, you're broke. You might be able to squeak by.\"\n  *goto foo2\n\n*label foo2\n${HealthText} If you don't take care of yourself, you could die. But visiting a doctor will bite into your funds, and they ain't always more reliable than a home remedy. ${CashText} Would you like to visit a doctor before continuing your investigation?\n*choice\n  #Yes, I'll stop in to see the doc.\n    *set money %-30\n    *set health %+30\n    Winslow leaves you at the doctor's office and suggests you meet back up in the morning to continue the investigation, unless something comes up, leaving you with an evening in town, either for leisure or to try to find a new lead on this case.\n\t\n    *finish Chapter Four: A Night on the Town\n  #No, I'll self-medicate at the saloon.\n    *set money %-10\n    *set health %+10\n    Winslow leaves you at the saloon, claiming a need to do paperwork and a promise to catch up in the morning, unless something comes up. The first drink helps ease the pain some, and you've got an evening to yourself in Willow Creek, either for leisure or to try to find a new lead on this case.\n\t\n    *finish Chapter Four: A Night on the Town\n  #Who, me? I'm fit as a fiddle!\n    *label fit\n    Winslow heads off toward the jail, claiming paperwork, and suggesting you meet back up in the morning—unless something comes up. That means you've got an evening to yourself in Willow Creek, either for leisure or to try to find a new lead on this case.\n\t\n    *finish Chapter Four: A Night on the Town\n\n*label end_trial\n*check_purchase full\n*if not(choice_is_steam or choice_randomtest) or ((choice_purchased_full or (choice_is_web or choice_is_omnibus_app)) or not(choice_purchase_supported))\n  *label purchased\n  *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n*purchase full $4.99 purchased\n*abort", "ranch": "*temp investigate 0\n*temp foundshells false\n\nThere's some folks who would call the Frye ranch idyllic. With acres of grazing land, interrupted by the occasional cottonwood, leading right into the foothills of the Rockies, it's a prime location for cattle. That Willow Creek, the town's namesake river, flows right through the property means there's good fishing to be had as well, and no shortage of water. As you and Deputy Winslow guide your horses over the wooden bridge onto Frye's land, you look out at Frye's operation. What do you think about Frye's ranch?\n\n*choice\n  #Frye settled here, but there's still a wild to the land that I love.\n    *set progress %-20\n    If the fences weren't so obvious, and the ranch buildings not so clearly rising in front of you, you could imagine this as still open territory and wilderness. You allow yourself a moment to appreciate the scenery before Winslow interrupts your thoughts.\n    *goto takethelead\n  #A man who can keep this amount of land tended deserves the respect Frye has.\n    *set progress %+10\n    *set frye %+10\n    You admire a man who has made his own way in the world. Before Frye settled this area, it was all wilderness, but he's carved it into his own domain. You take a moment to appreciate what Frye's done with the place before Winslow interrupts your thoughts.\n    *goto takethelead\n  #Seems to me there's an awful lot more that could be done with this property….\n    *set progress %+20\n    You might embrace the ideals of the West, but you also value civilization, and open spaces like this fill you with that pull to build and improve. You could imagine using the creek here for a papermill, for instance, or adding a water wheel to pound fibers for cloth manufacturing…. You take a moment to picture the land the way you'd develop it before Winslow interrupts your thoughts.\n    *goto takethelead\n\t\n*label takethelead\n\n\"Well, ${Surname}, can't say I'm much pleased about this arrangement,\" the deputy drawls. \"I'm sure you're a fine investigator….\" You can tell by the way he leaves the sentence hanging that he's dubious about your abilities.\n\n*choice\n  #I don't take offense. This is a job. I do the job, and then I get paid.\n    *set deputy %+15\n    Winslow grins in understanding, clearly a man who likes to get paid himself. \"I can respect that,\" he says. \"So I trust you'll leave the heavy investigating to the  professional then?\"\n    *label lead\n    *choice\n      #I ain't playing second fiddle. I make it clear that he and I are in this as equals.\n        Winslow frowns. \"We'll see how it goes,\" he says noncommittally.\n        *goto ranch\n      #I didn't ask to get saddled with him either. This is my show.\n        *set deputy %-30\n        There goes any goodwill you'd just established with the deputy. He glares at you, the type of glare green lawmen get when they think they're better than everyone else, even when they couldn't out-shoot an eighty-year-old schoolmarm. \n\n        \"You stay outta my way,\" Winslow growls.\n\t\t\n        \"You stay outta mine,\" you snarl back.\n\t\t\n        Well. Glad that's settled.\n        *goto ranch\n      #I'm no sidekick. I sweet-talk the deputy into letting me lead.\n        *set talkin %+10\n        *if talkin > 60\n          *set deputy %+30\n          You lay it on thick, praising Winslow's clear intelligence and finesse. You claim that his skills would be wasted as the front man—with keen eyes like his, he's sure to see something you'll miss, but not if he's too preoccupied with steering the investigation.\n\t\t  \n          You're worried you may have played too many aces at once, but Winslow is blissfully unaware of your verbal roundup. He's just glad someone's finally recognized his talents. For the moment, he appears content to bask in your praise and let you lead.\n          *goto ranch\n        *else\n          You lay it on thick, praising Winslow's clear intelligence and finesse. But you don't quite sell it, and Winslow looks as though he's suspicious you're mocking him. \"We'll see how it goes,\" he says noncommittally.\n          *goto ranch\n      #I agree. He'll work from the front and I'll get the juicy bits on the sly.\n        *set deputy %+15\n        Winslow nods contentedly. \"Glad we can see eye to eye,\" he says.\n        *goto ranch\n  #\"And I'm sure you're a fine deputy….\" I say, echoing his disparaging tone exactly.\n    *set deputy %-15\n    Winslow glares at you, the type of glare green lawmen get when they think they're better than everyone else, even when they couldn't out-shoot a preacher's daughter. \n\n    \"You stay outta my way,\" Winslow growls.\n\t\t\n    \"You stay outta mine,\" you snarl back.\n\t\t\n    Well. Glad that's settled.\n    *goto ranch\n  #I tell him I'm not lookin' for a fight. I just want to make sure the missing girl gets found.\n    Winslow looks skeptical of your motives, and you sense that he isn't personally invested in the case, despite the fact that real people are involved. \"So I trust you'll leave the heavy investigating to the professional then?\" he says, testing.\n    *goto lead\n\n*label ranch\n\nBefore you can approach the Frye house, you have to pass several outbuildings, including more than a few barns for housing animals and machinery and the residences of the ranch hands. Outside the bungalow where most of the cowboys live, you see a few hands lounging, John Gordon among them. One of the few black cowboys working on the ranch, he's easy to recognize at a distance. When he sees you coming, he saunters toward the road to greet you and the deputy.\n\nDo you greet him?\n*label greetgordon\n*choice\n  *hide_reuse #I wait to see if Winslow greets him.\n    Winslow completely ignores the cowboy's approach, urging his horse along at a slightly faster pace. You suppose that on official business, it's regulation behavior to talk to the head of the house before his hands. Or it could be that Winslow's even more misanthropic about cowboys—or blacks—than he is about everyone else.\n    *choice\n      #Follow his lead.\n        *set frye %-15\n        *set deputy %+15\n        If Winslow's set on talking to Frye first, you'll go along with it. \n\t\t\n        *goto house\n      #How unforgivably rude. I wave in acknowledgment.\n        Gordon nods in response, still approaching. Do you stop to talk?\n        *goto greetgordon\n      #I was planning to ignore the cowboy regardless of Winslo
