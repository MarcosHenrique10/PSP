he time Sheriff Rogers catches up with you, there's nothing to see. \"Why do I get the feeling that you didn't actually save me any trouble?\" Rogers asks you, but you just shrug. You head back to Willow Creek, imagining what it would look like lit up by electric lights.\n\n            *page_break\t\t\t\n            Within the week, Mason has offered you a very good price on a homestead just up into the foothills, a little way out of town from his own mansion. With the money you earned on this case, you can afford it—and you know that if you want to stay in Willow Creek, investing in high ground is a good idea. You settle into a routine, continuing to take the odd case for the Greengage Detective Agency when they're hiring.\n            *if sweetheart != \"none\"\n              And taking the time to deepen your relationship with ${sweetheart3}.\n\t\t\t\n            Over the next few years, as the waters start to rise, the buildings of Willow Creek relocate. Some of the people move to the nearby town of Hot Sulphur Springs, but others move uphill, buying up what will one day be lakefront property. Willow Creek will survive, and you continue to reap the benefits of having been on Mason's side. As hydroelectricity catches on, President Grant throws his full support behind the Colorado Territory becoming a state, and you have a feeling that good things are in store for Willow Creek's future.\n\t\t\t\n            *if utesmasonally > 1\n              When federal agents visit the town to move Walkara's band out of Willow Creek, Mason and the upper class of Willow Creek declare that Walkara and his people aren't Utes, they are citizens of Willow Creek and should be treated accordingly. Shortly thereafter, you hear a cowboy song about the Civilized Utes of Willow Creek, and you wonder if it'll stick.\n\t\t\t\t  \n            *if winslowdead = false\n              As for Winslow, he's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n\t\t\t\t  \n            *goto_scene ending\n          *if (frye > 50) #Victoria Frye wanted justice for Willow Creek, and I agree with her. I'm turning the papers over to the law.\n            \"We are all going to walk away,\" you say calmly. \"Frye, Victoria's on the train, tending to one of Walkara's men, who was wounded by outlaws on the train.\" It's close enough to the truth, and you're sure Victoria will give her father an earful about what happened anyway.\n            *if victoriahurt\n              Telling him that she got injured would just make him mad, and he could still reach for that gun. Better that he find out on his own.\n              *comment end_if\n\t\t\t  \n            When Frye leaves, you see his men loosen up. Their boss isn't going to get shot today.\n\t\t\t\n            \"Mason, you're going to take your thugs home. If you've got all your t's crossed and i's dotted, I'm sure you won't have any problems with my turning these papers over to the sheriff.\"\n\t\t\t\n            Mason grits his teeth, but turns and wheels back to his men.\n\t\t\t\n            You deliver the papers to Sheriff Rogers.\n            *goto trouble\n          *if (utes > 50) #Owning an energy supply could get the Utes out from under the federal government's thumb.\n            \"Walkara!\" you call out, and heads turn toward the Utes at the top of the cliff. \"Why don't you come down here and join us?\"\n\t\t\t\n            It takes a few moments, and the tension's thick as day-old chili, but Walkara rides up, looking at the three of you with trepidation. \"How will today end, ${surname}? With blood or with water?\"\n\t\t\t\n            \"Water,\" you say, tapping the papers. \"Frye, your daughter's on the train. She's tending to one of Walkara's men, who was wounded by outlaws on the train.\" It's close enough to the truth, and you're sure Victoria will give her father an earful about what happened anyway.\n            *if victoriahurt\n              Telling him that she got injured would just make him mad, and he could still reach for that gun. Better that he find out on his own.\n              *comment end_if\n\t\t\t  \n            When Frye leaves, you see his men loosen up. Their boss isn't going to get shot today.\n\t\t\t\n            \"Ancha's been injured?\" Walkara asks, concern clear in his voice.\n\t\t\t\n            \"I think he'll make it through,\" you say hopefully. \"Right now I want to talk to you about the future of your people.\" You glance at Mason. \"You should appreciate this. It's all about making the future a better place.\"\n\t\t\t\n            You show Walkara the papers—which include a grant of permission to build a dam from the U.S. Geological Survey office, along with signatures from Mason's investors. \"I'm giving them to you,\" you say, and Mason sputters. Your hand hovers over your pistol, and he quiets. \"Mr. Mason is clearly one of the largest investors in this project,\" you continue, \"but you're now the owners. Aside from your investors, you may well be able to sell this energy back to the Colorado Territory. If it works. There's a scientist named Tess Albertson on that train and she can explain it all better. Right in the same car with Ancha.\"\n\t\t\t\n            Walkara takes the papers and starts toward the train, leaving you and Mason to stare each other down.\n\t\t\t\n            Mason smirks. \"Well played,\" he says. \"We'll have to see what the next hand brings.\" With that, he goes back to his men and waves them off.\n\t\t\t\n            *if lawmen\n              Sheriff Rogers rides over to you. \"What was that about?\" he asks.\n\t\t\t  \n              \"It was about nobody getting shot,\" you respond. And even Sheriff Rogers can't question that.\n            *page_break\n            *set progress %+20\n            Eventually, things start to return to normal in Willow Creek. Within the week, Mason has offered you a very good price on a homestead just up into the foothills, a little way out of town from his own mansion. With the money you earned on this case, you can afford it—and you know that if you want to stay in Willow Creek, investing in high ground is a good idea. You settle into a routine, continuing to take the odd case for the Greengage Detective Agency when they're hiring.\n            *if sweetheart != \"none\"\n              And spending time and pleasure in the company of ${sweetheart3}.\n            Walkara and his band have located downriver, and when you visit them on occasion, you're impressed with the progress they're making. None of them seem to feel too bad about the eventual fate of Willow Creek. \n\t\t\t\n            Over the next few years, as the waters start to rise, the buildings of Willow Creek relocate. Some of the people move to the nearby town of Hot Sulphur Springs, but others move uphill, buying up what will one day be lakefront property. Willow Creek will survive, even if the residents do grumble about having to pay the Utes for the privilege of keeping their houses lit. As hydroelectricity catches on, President Grant throws his full support behind the Colorado Territory becoming a state, and you have a feeling that good things are in store for Willow Creek's future.\n\t\t\t\n            *if winslowdead = false\n              Even better, Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n            *goto_scene ending\n          #It's more complicated than that.\n            What other options do you have?\n            *choice\n              *if (utesmasonally > 1) #I want to help both Mason and the Utes bring Willow Creek into the future.\n                \"Frye, your daughter's on the train,\" you say calmly. \"She's tending to one of Walkara's men, who was wounded by outlaws on the train.\" It's close enough to the truth, and you're sure Victoria will give her father an earful about what happened anyway.\n                *if victoriahurt\n                  Telling him that she got injured would just make him mad, and he could still reach for that gun. Better that he find out on his own.\n                  *comment end_if\n\n                You can't tell if Frye's upset or relieved by the news, but he heads out without a further word. His cowboys all relax as soon as he's inside the train—no one's going to shoot their boss today.\n\t\t\t\t\n                You tap the paperwork Victoria gave you. \"I know you're going to flood the town,\" you say to him quietly. \"But I also know you're the one who'll drag the Colorado Territory into the future. I just need to know what you mean to do with the Utes.\"\n\t\t\t\t\n                Mason raises an eyebrow. \"Do with them?\"\n\t\t\t\t\n                You gesture toward Walkara with the papers. \"What if they were the ones who owned the dam? Cut them in on the deal, but make it so the government has to buy energy from them if they want it. Bring them into the future, Mason, but on their own terms.\"\n\t\t\t\t\n                Mason smiles, then offers you his hand. \"If you can get them on board, I think we've got a deal.\" You see a glimmer in his eyes that tells you he's found a loophole that will allow him to make even more money, but you can always deal with that later.\n                *page_break\n                *label uteswin\n                *set progress %+20\n                Eventually, things start to return to normal in Willow Creek. Amelia Greengage pays you your fee—after all, you did find the missing girl and get her back to her father—and you've enough cash on hand to relax. \n                *if sweetheart != \"none\"\n                  And spend plenty of time and pleasure in ${sweetheart3}'s company.\n                You are surprised at how well your plan has worked out. Walkara and his band have located downriver, and when you visit them on occasion, you're impressed with the progress they're making.\n\t\t\t\n                None of them seem to feel too bad about the eventual fate of Willow Creek. And although they're in charge rather than Mason, the banker doesn't seem too put out with how things are going. That is, until the Greengage Detective Agency heads up an investigation into how he acquired so much land outside of Willow Creek's flood plain so quickly. With the resulting lawsuit tying up his funds, you suspect he won't benefit as much from the new hydroelectricity as he'd like.\n\t\t\t\n                Over the next few years, as the waters start to rise, the buildings of Willow Creek relocate. Some of the people move to the nearby town of Hot Sulphur Springs, but others move uphill, buying up what will one day be lakefront property. Willow Creek will survive, even if it has to pay the Utes it never did accept for the privilege of keeping its houses lit. As hydroelectricity catches on, President Grant throws his full support behind the Colorado Territory becoming a state, and you have a feeling that good things are in store for Willow Creek's future.\n\t\t\t\t\n                *if winslowdead = false\n                  Even better, Winslow's been arrested for his part in all of this, and he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n                *goto_scene ending\n              *if (utesfryeally > 1) #I want to solidify an alliance between Frye—and Willow Creek—and the Utes.\n                \"Frye, before you go get your daughter, I'd like to discuss this paperwork with you.\"\n\t\t\t\t\n                Mason glares, and then, without a word, turns back toward his men and rides off. You have a feeling that while he still has any power in Willow Creek, he'll do his best to make your life abjectly miserable.\n\t\t\t\t\n                You go over the paperwork with Frye, showing him what Victoria told you—that the town will be flooded unless someone ties up Mason in court to keep him from going through with his project. \"I can turn this over to you,\" you say, \"in exchange for a favor. Walkara needs an ally in Willow Creek. I need you to speak up for him.\"\n\t\t\t\t\n                Frye looks at you skeptically. \"And if I don't?\" he asks.\n\t\t\t\t\n                \"Then your daughter will be very sad,\" you say with a shrug. \"I think the young man who saved her life has grown on her, and I'd hate to see her run off with a man who could be your future son-in-law if you only keep an open mind.\"\n\t\t\t\t\n                You grin into Frye's scowl, and you see the moment when he accepts your offer. You hand him the paperwork, and he goes into the train to find Victoria.\n                *if winslowdead = false\n                  And then you watch as Winslow is arrested for his part in all of this, with the satisfaction that he's probably going to be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n                *page_break\n                A few weeks later, you are having coffee with Amelia Greengage at the Frye ranch. Mrs. Ford serves the best coffee in town, and she's become fond of you ever since you got Victoria home safely. \n\t\t\t\t\n                \"So how is Mr. Frye dealing with his new neighbors?\" Amelia asks Mrs. Ford.\n\t\t\t\t\n                Mrs. Ford is only too happy to gossip. Although Julian Frye was not initially pleased at news that his daughter and Ancha were courting, he's  given Ancha credit for almost dying while saving Victoria's life from the outlaws who kidnapped her, despite Victoria's protests that it didn't quite happen that way. Even better: Ancha is making a full recovery. \n\t\t\t\t\n                \"It isn't as though Frye has enough money to hire any more hands,\" you tell Amelia when Mrs. Ford leaves the room, \"but he's well connected, and a surprising number of Utes have been hired as trail guides and cowboys at other ranches in Willow Creek. Frye and I even convinced Sheriff Rogers to deputize Sowiet, though how that will go over in town, we have yet to see.\"\n\t\t\t\t\n                And so life in Willow Creek goes on. Your payment from the case is enough to get you by for a while, and give you time to relax.\n                *if sweetheart != \"none\"\n                  You spend plenty of that enjoying ${sweetheart3}'s company. \n                And, of course, you're always glad to go on the next assignment from the Greengage Detective Agency.\n\t\t\t\t\n                But sometimes when you're in town at night, you look at the gas lamps and wonder what Willow Creek would look like if its lights were electric. You don't let it bother you, though. You're sure electricity will never catch on.\n                *goto_scene ending\n              #There's got to be a way to get that hydroelectricity developed without sacrificing Willow Creek.\n                \"Frye, your daughter's on the train.\" The rancher starts immediately toward the train, but you gesture for him to stop. \"But before you go in, I think we all have something to discuss.\"\n\n                Mason looks decidedly skeptical at this, but he waits for you to continue.\n\n                \"Mason, I know your plans for the future involve flooding Willow Creek,\" you say bluntly, ignoring Frye's gasp in response. \"Victoria had it figured out, and she made sure I had the papers to prove it.\"\n\t\t\t\t\n                \"It's all legal,\" Mason says, but you can see him sweating.\n\t\t\t\t\n                Frye snorts, and you glare at him. \"Aren't you two tired of feuding? This is an opportunity. Mason wants to bring Willow Creek into the future. I think he should do it without drowning Willow Creek.\" You shake the papers at Frye. \"But there's no incentive for him to do so while he's still gunning for you.\"\n\t\t\t\t\n                \"So what, you just expect us to apologize and be best friends?\" Frye asks, sarcasm heavy in his voice.\n\t\t\t\t\n                You shake your head. \"No. But I expect you to come up with a solution, or I'm going to hand these papers over to the Utes right now and turn over the water rights that are included in here to them.\"\n\t\t\t\t\n                *if talkin > 75\n                  Mason blinks. \"You really would.\"\n\t\t\t\t  \n                  You nod. \"I really would.\"\n\t\t\t\t  \n                  Mason growls, then gestures to Frye. \"Frye, we'll have a meeting in the morning to figure out just how we're going to work this out.\"\n\t\t\t\t  \n                  \"Fine,\" Frye spits back.\n\t\t\t\t  \n                  Which leaves you still holding the paperwork the next morning. But at least Mrs. Ford makes excellent coffee.\n\t\t\t\t  \n                  *if winslowdead = false\n                    You stick around the train until everything settles down, so you're there to watch as Winslow's arrested for his part in all of this. You suspect he'll be stuck behind bars for a long time. Considering how you started this case, the idea of the tables being turned gives you a little reason to smile.\n                  *page_break\n                  The next few weeks are a struggle, but you finally hammer out a working deal.\n                  *if utesmasonally > 1\n                    *label goodforutes\n                    Not only does the deal work out for Willow Creek, and for Mason, but it includes the Utes as well. Between Mason and Frye, the pair find ways to incorporate the Utes into Willow Creek, bringing them into the future, as Mason says, but on their own terms. Whether the federal government will let it work, you're not sure, but both Frye and Mason have agreed to back the Utes up if anyone questions their right to be in Willow Creek.\n                    *goto compromise\n                  *if utesfryeally > 1\n                    *goto goodforutes\n                  *else\n                    *goto compromise\n                *else\n                  Mason laughs. \"You wouldn't.\"\n\t\t\t\t  \n                  Frye scowls. \"I'm going to get Victoria. You both stay out of my way.\"\n\t\t\t\t  \n                  You march off toward Walkara.\n\t\t\t\t  \n                  \"What do you think you're doing?\" Mason calls after you.\n\t\t\t\t  \n                  \"Making good on my threat!\" you holler back.\n                  *goto uteswin\n      *else\n        You draw. Who do you shoot?\n        *choice\n          #Frye.\n            *label barndoor\n            The three of you draw almost all at the same time—and all three of you miss. But as soon as the shot's fired, the cowboys and thugs start to join in.\n            *goto shooting2\n          #Mason.\n            *goto barndoor\n          #I don't want to kill either of them.\n            You aim to wound, and, by watching the two of them, you'd wager that Mason's the better shot, so you shoot for him first. You're no faster than either of them, but you've got better aim—you doubt that Frye or Mason could hit the broad side of a barn. Mason falls, but no one seems to bother thinking that you intentionally aimed to injure but not kill—the cowboys and thugs start to join in as soon as the first shots are fired.\n            *goto shooting2\n*else\n  You ride alongside Sheriff Rogers and Amelia Greengage at the head of the posse, making your way slowly toward the train. You can see from a distance that it's already stopped, which is a mercy; at least this way you won't have to ride it down.\n  \n  Problematically, you can see that Frye and his men didn't wait for the sheriff. You spot them in the distance preparing to face off. You hear the sound of hoofbeats, and up on a ridge overlooking the rail, Walkara and his Dog Soldiers ride into view.\n  \n  What a fun party you've come to.\n  \n  Rogers sighs. \"Listen, ${surname}, I hate to do this, but I'm going to ask you to ride down on the far side of what looks like is brewing into a gunfight, and see if you can get onto that train. Track down the girl and make sure she's all right so we can cool off Frye's temper. We might be able to keep this from ending in a shooting.\"\n  *page_break\n  Frye and Mason are so absorbed with staring each other down that they don't seem bothered by the fact that you're riding along behind them. You get to the far side of the train and climb into the engine. The engineer is there, looking nervous and covered with sweat that you think didn't come from proximity to the coal.\n  \n  \"There have been shots,\" he says to you. \"A young woman came in and told me to stop the train because we had some wounded aboard.\"\n  \n  \"Red hair?\" you ask.\n  \n  \"No,\" he says. \"Brown. Wore some weird smock with large pockets over her dress.\"\n  \n  Tess Albertson, you presume. \"The sheriff's on the way,\" you promise the engineer, then make your way back through the train. A few cars back, you're stopped by a body: Winslow, dead on the ground, laying across the door of a cargo-car. Victoria Frye is unharmed, but Ancha is bleeding from his stomach, and a man—a doctor, you hope—is leaning over him. Tess is slumped up against the far wall, her face sooty, but otherwise in good enough shape.\n  *set winslowdead true\n  *if sweetheart = \"tess\"\n    When she sees you, she grins. \"About time you got here,\" she says, the giggle in her voice sounding right at the edge of hysteria.\n    *comment end_if\n\t\n  Victoria stands when she sees you, giving a concerned look at Ancha before she walks to your side. \"I can't leave Ancha,\" she says quietly, pressing some rolled up papers into your hand. \"Take the papers. I'm trusting you—get justice for Willow Creek.\"\n  \n  She turns quickly, before she thinks better of this plan, and kneels next to Ancha while the doctor keeps pressure on the Ute man's wound.\n  \n  As you leave the train, you consider just what you'll do with Victoria's request for justice—and whether your interpretation is different from hers.\n  \n  In the meantime, things have heated up outside, and you're about to walk into the middle of it. As soon as you exit the train, you're spotted, and you realize you're about to become the center of this conflict.\n  *goto enddecision\n  \n*label compromise\n\nA few years down the road, Willow Creek gets its first electric lights. The lake to the south, filled by the first hydroelectric dam, is not only a good source of power, but is fine for fishing and a cool swim as well. \n*if sweetheart != \"none\"\n  You and ${sweetheart3} have gone out at night a few times, just the two of you, the water, and the stars—not a stitch of clothing between you. And that suits you just fine.\n\nThe presence of hydroelectricity puts a burr under the United States Congress's saddle, and they finally get a move on granting Colorado statehood. And while Mason and Frye will never be friends, the fact that they're both making money hasn't done Willow Creek any harm. They're not the only ones making money: Tess Albertson's work is not only bringing her income, it's put her as a leading headline in Scientific American; and Elijah Hammond, early investor in the project, is never at a loss for funds at the gambling tables, which is only partly due to his skill at cards. In fact, Willow Creek is doing so well that there's even talk of running another line of the railroad through the town and down to Colorado Springs.\n\n*if utesfryeally > 1\n  And despite the tensions you suspect will always exist between the Creekers and the Utes, Frye was open-minded enough to give his daughter and Ancha his blessing. The wedding was an event to be remembered, and you see Victoria in town with her toddler now and again, both wearing \"Votes for Women\" sashes. That kid is a spitting image of her mother. She'll be a heartbreaker when she's older—if she doesn't try to run for president.\n  *comment end_if\n  \nYes, the future is bright, especially when it's lit by electric lights.\n*goto_scene ending", "startup": "*title Showdown at Willow Creek\n*author Alana Joli Abbott\n*scene_list\n  startup\n  bail\n  ranch\n  mason\n  willowcreek\n  utes\n  couple\n  trainjob\n  standoff\n  ending\n*comment from willowcreek forward. But use $full instead of just $ (eg $full wiillowcreek)\n*comment trial gosub mason.218\n\n*product full\n\n*create brawlin 30\n*create gamblin 30\n*create shootin 30\n*create talkin 30\n*create investigatin 30\n*create health 90\n*create money 80\n*create lawless 50\n*create progress 50\n*create firstname \"Unnamed\"\n*create surname \"Unnamed\"\n*create name \"Unnamed\"\n*create profession \"none\"\n*create healthtext \"You're completely uninjured.\"\n*create cashtext \"You've got a fistful of dollars.\"\n*create male true\n*create pronounhe \"he\"\n*create pronounhis \"his\"\n*create pronounhim \"him\"\n*create titlemr \"Mr.\"\n*create sweetheart \"none\"\n*create sweetheart2 \"None\"\n*create utes 50\n*create frye 50\n*create mason 50\n*create greengage 50\n*create deputy 30\n*create rogers 50\n*create buckfree false\n*create ridercaught false\n*create utesclear false\n*create war \"none\"\n*create elifight false\n*create hydroclue false\n*create tessflee false\n*create cheaterrain false\n*create cheatergordon false\n*create cheaterelijah false\n*create ameliawin false\n*create rainmad false\n*create anchaclue false\n*create dead false\n*create utesmason false\n*create utesmasonally 0\n*create uteshostile 0\n*create utesfryeally 0\n*create bledsoedead false\n*create sweetheart3 \"none\"\n*create sweethe \"he\"\n*create sweethis \"his\"\n*create sweethim \"him\"\n*create lawmen false\n*create plans false\n*create winslowdead false\n*create victoriahurt false\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n    *comment no advertisements in Showdown standalone apps; see the packet\n*check_purchase full\n*if choice_purchase_supported and not(choice_purchased_full)\n  Saddle up and defend the town of Willow Creek from nefarious outlaws and city slickers! It all starts when a rancher's daughter goes missing, and it ends at the showdown at Willow Creek, where greed, lust, science and Mother Nature will face off at high noon.\n\n  Showdown at Willow Creek is an interactive western mystery novel where your choices control the story. The game is entirely text-based--without graphics or sound effects--but powered by the vast, unstoppable power of your imagination.\n\n  Gamble, seduce, brawl, or shoot your way through Willow Creek, where gunslingers make the laws, and everybody has secrets. Will you romance the gambler or the soiled dove (or both)? Will you side with the scientists bringing electricity to the Old West, or with a tribe of native American Utes? Will you unravel the conspiracy that threatens to tear the town apart, or will you light the fuse to blow it all sky high?\n\n  *if choice_is_steam\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\n    *purchase full $4.99 purchased\n    *page_break Play Now for Free\n    *goto purchased\n  *else\n    *if choice_is_advertising_supported\n      [i]Showdown at Willow Creek[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\n      *purchase full $4.99 purchased\n      *if choice_is_advertising_supported\n        *page_break_advertisement\n      *if not(choice_is_advertising_supported)\n        *page_break Play Now for Free\n\n      *goto purchased\n    *else\n      [i]You can play the game for free, with 2 hour breaks between chapters, or you can buy the game now for unlimited play without breaks.[/i]\n\n      *purchase full $4.99 purchased\n      *page_break_advertisement\n\n      *goto purchased\n\n*label purchased\n", "trainjob": "*temp s3he \"he\"\n*if ((sweetheart3 = \"Amelia\") or (sweetheart3 = \"Tess\")) or (sweetheart3 = \"Summer\")\n  *set s3he \"she\"\nThe first thing you notice when you wake up is that you feel roughly like you've been kicked by a horse.\n*if health \u003c 50\n  Then trampled. Then kicked again.\n\n*set health %+25\n*if health >89\n  *set HealthText \"You're in better shape than you have any right to be.\"\n  *goto secondthing\n*elseif health > 69\n  *set HealthText \"You've taken a beating, but you've had worse.\"\n  *goto secondthing\n*elseif health > 39\n  *set HealthText \"Everything hurts. Everything.\"\n  *goto secondthing\n*else\n  *set HealthText \"You're almost dead. It's a wonder you can still stand.\"\n  *goto secondthing\n\n*label secondthing\nThe second thing you notice is that you're not dead. You open your eyes to find that you're still in the cabin of the Bledsoe Gang, but rather than lying helpless on the floor, you've been moved onto the table. You can smell turpentine and whiskey, and you hear someone puttering around behind you. You shift, and that someone moves to your side.\n*if sweetheart = \"gordon\"\n  There is John Gordon, hat off, shirt opened, and worried expression on his face. When he meets your eyes, he lets out a deep breath of relief.\n  *goto living\n  \n*elseif sweetheart = \"rain\"\n  Summer Rain sidles up next to the table, checking a compress under your neck before she realizes you're awake. When she meets your eyes, a smile lights up her whole face.\n  *goto living\n  \n*if sweetheart = \"hammond\"\n  It's Elijah Hammond, his poker face totally lost in an expression of worry—that is, until he meets your open eyes. An unrestrained grin breaks across his face, and he gives you a gentle peck of a kiss on the forehead.\n  *goto living\n  \n*else\n  Amelia Greengage steps into view and applies a wet cloth to your forehead. She smiles when she sees you've woken.\n  *goto living\n\n*label living\n  \n\"Welcome back to the land of the living,\" ${sweethe} says.\n*if deputy \u003c 31\n  \"Had a little scare with that bullet hole, but it missed everything important. I stitched it up while you were unconscious.\"\n  *comment end_if\n\n\"How long have I been out?\" you ask, and you're surprised at how thick your voice sounds. You've more than likely been concussed. \"And how did you find me?\"\n\n\"It's dawn now,\" ${sweethe} says, glancing out the window. \"I don't know how long you were out before I got here.\"\n*if sweetheart=\"rain\"\n  Rain smiles sweetly. \"And I found you because you told me where you were going. Deputy Winslow leaves a trail like a herd of buffalo, so it wasn't hard to follow where you'd gone.\"\n  *goto winslow\n*else\n  ${sweetheart3} takes your hand. \"If it hadn't been for Summer Rain coming to tell me where you'd gone, I probably wouldn't have found you at all. She knew you'd gone up Table Mountain—and Deputy Winslow leaves a trail like a herd of buffalo, so it wasn't hard to follow where you'd gone.\"\n  *goto winslow\n\n*label winslow\n\n$!{sweethe} pauses a second before continuing. \"When Winslow came back without you, I didn't worry—but then he arrested Mason's scientist Tess Albertson, and that seemed strange. I went down to the jail house out of curiosity, and neither he nor Tess were there, and that's when I decided to come looking for you.\" $!{sweethe} looks you over, pausing on the places where you feel aches. \"And it's a good thing I did.\"\n*if sweetheart = \"tess\"\n  You flinch as though someone's hit you. Tess, taken by Winslow? What the hell does he have planned? There's no way you're going to let him get away with kidnapping your girl!\n  *comment end_if\n\nIf it's dawn, then Victoria's train job is already set in motion—and Winslow's definitely up to something. What do you do?\n*choice\n  #Take a swig of whiskey and head out.\n    *set health %+10\n    *set brawlin %-10\n    Between the turpentine ${sweetheart3} applied to your bruises and the whiskey, you figure you're medicated enough to get going. The amount of whiskey it takes to ward off some of the pain makes you stumble a bit on your feet, though. Alcohol on top of injuries might not have been your best idea, but you are feeling a little better.\n    *label headout\n\n    \"And what do you think you're doing?\" ${sweetheart3} demands as you sit up on the table. \n  \n    \"I've got a train to catch,\" you say, and ${sweethe} sighs.\n  \n    \"You're really not going to tell me what the hell's going on?\" ${sweethe} asks.\n\t\n    You shake your head. It smarts. \"There's no time.\"\n\t\n    You never thought exasperation could look so comforting on a face, but ${sweetheart3} manages. \"Then what do you expect me to do?\"\n    *label do\n    *choice\n      #\"Don't do anything. We'll keep this as quiet as we can 'til it's sorted out.\"\n        ${sweetheart3} looks frustrated for a moment, then nods. \"I can't say anything when I don't actually know anything, I suppose.\"\n        *label kissgoodbye\n        *if sweetheart = \"none\"\n          *goto heademup\n        *elseif sweetheart = \"tess\"\n          *goto heademup\n        *elseif ((sweetheart = \"amelia\") and (ameliawin = false))\n          *goto heademup\n        *else\n          But before you go, ${sweetheart3} cups your face in ${sweethis} hand and leans in, giving you a passionate kiss. You'd enjoy it more if it didn't send shudders of pain through your body, but you'll take it as a promise for later.\n\t\t\n          \"Don't get yourself killed,\" ${sweetheart3} admonishes.\n\t\t \n          \"Wouldn't dream of it,\" you say.\n          *goto heademup\n      #\"Head back to Willow Creek for help.\"\n        ${sweetheart3} pauses. \"What kind of help?\"\n        *choice\n          #\"Tell Frye his daughter's going to rob a train and he'd best get down to stop her.\"\n            *set frye %+20\n            You doubt Frye would believe it, but it'll get his attention.\n\t\t\t\n            *if sweetheart = \"gordon\"\n              Gordon frowns at you. \"Miss Victoria wouldn't…\"\n\t\t\t  \n              \"I'll explain everything later—it's more complicated than it sounds, and I need Frye's attention right away. Can you do this for me?\"\n\t\t\t  \n              After a moment of hesitation,\n              *label handle\n              ${sweetheart3} gives a sharp nod. \"I can handle that,\" ${sweethe} says. $!{sweethe} gives you a hand to help you down off the table, and your body groans with every move you make. Still, you've got to head out.\n              *goto kissgoodbye\n            *elseif sweetheart = \"hammond\"\n              \"He's got no reason to believe me,\" Elijah reminds you.\n\t\t\t  \n              \"Then just make him mad enough to come,\" you say. \"You're awfully good at irking people when you put your mind to it.\"\n\t\t\t  \n              He laughs, and then\n              *goto handle\n            *else\n              *goto handle\n          #\"Tell Mason there's outlaws who are going to steal his property off that train.\"\n            *set mason %+20\n            You're sure Mason has enough armed thugs to prevent his paperwork from going too far.\n\t\t\t\n            *if sweetheart = \"gordon\"\n              He hesitates for a moment, but then nods in agreement.\n            *goto handle\n          #\"Tell Walkara that Ancha's about to rob a train, and he might want to interrupt.\"\n            *set utes %+20\n            It might be best for Walkara to just deny any connection to Ancha, but any Ute robbing a train will end up being bad for the rest of the band. If they decide to give up on Ancha, at least this way, they'll get a head start leaving.\n\n            *if sweetheart = \"rain\"\n              \"My brother's going to do what?\" Rain demands.\n\n              \"There's no time,\" you insist, \"and it's not as bad as it sounds.\" Rain glares at you. \"All right, it may be as bad as it sounds. But we'll fix it. Can you do this for me?\"\n\n              After a moment of hesitation,\n              *goto handle\n            *else\n              *goto handle\n          #\"Get Sheriff Rogers.\"\n            *set lawmen true\n            One of his deputies has gone rogue. The outlaws outside of town are going to rob a train—in cahoots with the missing person. Yep, you're pretty sure that this is really the sheriff's job at this point. Better to get him on the scene.\n\t\t\t\n            *goto handle\n          *if ((sweetheart = \"rain\") or ((sweetheart = \"gordon\") or (sweetheart = \"hammond\"))) #\"Find Amelia Greengage at the Riverside Hotel.\"\n            *label greengage\n            *set greengage %+20\n            *set lawmen true\n            You're not working for Frye or Mason or the Utes or even the law. You're working for the Greengage Detective Agency, and your first duty is to make sure your employer knows what's going on in the case.\n\t\t  \n            That way, even if this all goes south, you're still likely to get paid.\n\t\t\t\n            *goto handle\n      *hide_reuse #\"It'd be nice to have backup. Come with me?\"\n        \"Backup for what, exactly?\" ${sweetheart3} demands.\n\t\t\n        \"Boarding a moving train, stopping some outlaws, and getting some secret documentation while rescuing a scientist from a deputy who's off his hinges,\" you say. It's the quickest summary you can offer.\n\t\t\n        *if sweetheart = \"gordon\"\n          \"And where's Miss Victoria in all of this?\" Gordon asks, and you realize that there are important details you left out. \"I love you,\" he continues, and you let your stomach get all warm and quivery inside before you recognize the \"but\" that's coming. \"But I have a responsibility to Mr. Frye and Miss Victoria I need to be thinking on.\"\n\t\t  \n          If you took Gordon with you, his loyalties would get all tangled up as soon as he saw what Victoria was up to. Better to leave him behind. What would you have him do?\n          *goto do\n        *elseif sweetheart = \"hammond\"\n          ${sweetheart3} blanches. It's clear ${sweethe}'s not comfortable with the idea. A reluctant backup might be worse than no backup at all.\n\t  \n          \"Nevermind,\" you say. What would you have him do?\n          *goto do\n        *elseif sweetheart = \"rain\"\n          \"And what does all of this have to do with Ancha?\" Rain asks, and you realize that there are important details you left out. \"I love you,\" she continues, and you let your stomach get all warm and quivery inside before you recognize the \"but\" that's coming. \"But he's my brother, ${name}. If he needs my help, I have to help him.\"\n\t\t  \n          If you took Rain with you, her loyalties would get all tangled up as soon as she realized what Ancha had gotten himself into. Better to leave her behind. What would you have her do?\n          *goto do\n        *else\n          Amelia shakes her head. \"You certainly know how to heap trouble on top of trouble,\" she says, and you think there's a fondness in her voice. \"You're also mad as a loon, and it sounds as though you'll need more backup than just me.\"\n\t\t  \n          She has a point, and knowing Amelia, now that she's got it into her head to get help, that's what she's likely to do. What do you want her to do?\n          *goto do\n  #Head out and hope my head clears.\n    You hurt everywhere, but you don't want to compound things by adding alcohol to the mix, especially not with your head already feeling fuzzy. But you can't let misery stop you from doing your job—so you'll suffer through it.\n    *goto headout\n  #Go back to Frye and Sheriff Rogers and report my findings.\n    *set greengage %-10\n    *set frye %+10\n    Your assignment was to find the missing girl—and you found her all right. You know right where she'll be. And frankly, you're in no shape to head her off yourself. You and ${sweetheart3} slowly make your way down Table Mountain. When you hear the train whistle in the distance, you wonder if Victoria has officially become a train robber yet, but a sharp pain in the back of your head and your blurred vision are cause for greater personal concern.\n  \n    Luckily for you, Frye is at the sheriff's office when you ride into Willow Creek. The town's more buzzed up than a hornet's nest, and you hear the gossip: Winslow as a kidnapper and a train robber, Victoria Frye captured by outlaws, and the Utes getting ready to ride through town in a stampede. Sounds like some things got taken way out of proportion or made up all together.\n  \n    \"Sheriff Rogers,\" you say as you approach.\n  \n    \"${surname}, what the hell happened to you?\" Rogers says.\n  \n    \"Deputy Winslow,\" you answer. \"Victoria Frye's about to rob a train,\" you continue. \"Just thought you should know.\"\n  \n    Rogers throws his hands in the air while Frye sputters about you defaming his daughter. \"Well, who the hell isn't robbing a train today?\" Rogers demands. \"I'm headed out there right now. Frye, if you and your men want to come, you stay back and out of my way.\" Rogers gives you a look over. \"You coming, ${surname}? You could probably still get out there faster than I can corral this posse into moving.\"\n  \n    ${HealthText} Your vision has cleared and you've loosened up some, but whether it's wise to get into the thick of things is a decision only you can make. ${sweetheart3} did patch you up—${s3he}'s done it before, and you came out all right. Besides, if you don't head out now, you're likely to miss all the action—as it is, you're already running the risk of missing the train after coming back to Willow Creek. What do you do?\n    *choice\n      #I'll head out in advance. Now that I know the law's on the way, I'm less worried about the need for backup.\n        You nod to Rogers, wheel your horse around, and head toward the tracks.\n        *goto priority\n      #I'll wait for the posse to get together. I won't have to get in the way of any bullets, but I'll still get paid.\n        You've had enough action for a few days. Better to sit back and let the law take care of things, so long as you're still around to witness it.\n        *set lawmen true\n        *finish Chapter Eight: Showdown at High Noon\n      #I'm going to the doc before I go anywhere.\n        *set money %-30\n        *set health %+30\n        Not everyone trusts the old sawbones, especially considering how expensive his services are, but even after ${sweetheart3} patched you up, you know you need the attention of a professional. Once the doc's done with you, you're feeling better—but Sheriff Rogers is still getting the posse together. Looks like you haven't missed all the action after all.\n        *set lawmen true\n        *finish Chapter Eight: Showdown at High Noon\n\n*label heademup\nYou mount up, and though you still hurt, you can feel your body loosening up. It's enough to encourage you to ride down the mountain and make a beeline for the railroad. The whistle blowing in the distance sets you at a faster pace, and you urge your horse forward.\n\n*label priority\nWhat is your priority when you get to the train?\n*choice\n  *if (sweetheart = \"tess\") #I've got to rescue Tess!\n    After what Winslow did to you, you can't let him get away with stealing your girl—and you've got to keep her from coming to harm.\n\t\n    \"Hold on, Tess,\" you mutter, with only your horse to hear you. \"I'm coming for you….\"\n    *goto tracks\n  #Stop Victoria and Ancha from robbing the train.\n    *set frye %+10\n    Those young people aren't criminals, but the law won't see their idealism as entitling them to an exemption. You've got to stop them before they get themselves in trouble so deep they can't get out of it.\n    *goto tracks\n  #Help Victoria get those papers so Mason can't flood the town.\n    *set greengage %+10\n    *set progress %-10\n    Your job might be to get Victoria back home safely—but you can't let Mason go through with his plans to flood Willow Creek. \n    *goto tracks\n  #Keep Mason's paperwork safe so he can keep moving Willow Creek toward progress.\n    *set mason %+10\n    *set progress %+10\n    Sacrifices must be made in order to move into the future—something Mason understands. You'll prevent his papers from being stolen, or steal them yourself to protect him.\n    *goto tracks\n  #I've got a bone to pick with Winslow….\n    *set deputy %-10\n    Your job is important, but revenge is even more so. Winslow betrayed you and left you for dead. You intend to show him you don't die so easily.\n    *label tracks\n\t\n    The railroad whistle blows, then again, and you can almost sense the urgency with which the conductor is pulling the cord. The train robbery has already started.\n\n    You've seen this done before, and you've read about the exploits of train robbers in dime novels. In order to get on the train, you ride alongside an open cargo car—or, riskier, the observation car at the end of the train—and then make a jump for it. As you race toward the rails, the train passes you, giving you your choice: open cargo, observation, or the skinny platform between cars.\n    *if investigatin > 60\n      Or you can grab a hold of a ladder on the outside of one of the new-fangled refrigerator cars.\n    *choice\n      #I leap for the open cargo door.\n        *set brawlin %+10\n        You get into a crouched position on your saddle, urging your horse to just the right speed so you can make the jump.\n        *if brawlin > 65\n          It's easier than you expected. You get close, make a short jump, and then it's all over but the standing. From here, you can slide open the door to the platform between cars and make your way through the train.\n          *label upandout\n          *choice\n            #I go through the inside of the train toward the front.\n              *goto inside\n            #I climb up the ladder to the top; walking on the train roof will be faster.\n              *goto top\n        *else\n          *set health %-10\n          *if health \u003c 20\n            And that leap is the last straw for your already failing body. Your feet miss, and though you manage to land with legs dangling over the rails, you can only hold on for just a moment before you fall onto the tracks beneath a moving train.\n            *if lawmen\n              At least you're dying knowing that help is on the way. \n            Maybe Victoria will make it home safely and succeed in keeping Willow Creek from being flooded; maybe Mason will be able to protect his documents after all and will thrust Willow Creek into the future whether it wants to go there or not. You have only a brief moment to wonder before you have no more thoughts at all.\n            *set dead true\n            *goto_scene ending\n          *else\n            It's harder than you expected. You get close, you make the short jump, and you land hard, your legs dangling over the edge of the train. But after a day like yesterday, what's a few more bruises to count? From here you can slide open the door to the platform between cars and make your way through the train.\n            *goto upandout\n      #I bet I can make it to that skinny platform.\n        *set gamblin %+10\n        It's a gamble, and frankly, the odds aren't that good—your other options would be easier. But you're not depending on skill. You're depending on luck.\n        *if gamblin > 65\n          And your luck is with you. You jump from the back of your horse to the platform at exactly the right angle, as easily as if you were a circus performer. Maybe in your next career. From here you can slide open the door to the next car or climb up the ladder to the roof.\n          *goto upandout\n        *else\n          *set health %-10\n          *if health \u003c 20\n            But your luck just isn't with you. You hit the tracks, and though your body stops, the train's forward momentum does not. If you'd had to think of how you'd die before this, you would never have guessed it would be from falling off a moving train.\n            *if lawmen\n              At least you're dying knowing that help is on the way. \n            Maybe Victoria will make it home safely and succeed in keeping Willow Creek from being flooded; maybe Mason will be able to protect his documents after all and will thrust Willow Creek into the future whether it wants to go there or not. You have only a brief moment to wonder before you have no more thoughts at all.\n            *set dead true\n            *goto_scene ending\n          *else\n            And you just don't have it today. You make the jump, but you hit the platform hard, your legs dangling over the edge as the rails fly past. But after a day like yesterday, what's a few more bruises to count? From here you can slide open the door to the next car or climb up the ladder to the roof.\n            *goto upandout\n      #Observation car. If there's people there, I can call out to them to grab my hands.\n        *set talkin %+10\n        You trust your people skills more than your athletics—you'll have a helping hand to get on board the train, and you can warn the passengers if they don't already know there's outlaws on board.\n\t\t\n        You ride toward the end of the train, then turn your horse so you're riding in the same direction, but more slowly, letting the train pass you. There are people on the observation deck, sitting at a table and drinking tea. It appears that word of the outlaws has not reached this end of the train.\n\t\t\n        \"I'm with the sheriff's office!\" you call out, which is more or less true. \"There are outlaws on this train. I need to get on board!\"\n\t\t\n        *if talkin > 65\n          The response is immediate. Two of the men reach out their hands, and when you leap from the back of your horse for the observation deck, they catch you and pull you on.\n\t\t  \n          \"Thanks kindly,\" you say, then hurry into the car.\n          *goto inside\n        *else\n          *set health %-10\n          But despite your words, you're not wearing a badge, and rather than get closer, the people on the observation deck shy away from you. You leap for the deck and hit it hard, your legs dangling over the edge.\n          *if health \u003c 20\n            And that leap is the last straw for your already failing body. You tumble off the end of the observation deck and hit the ground, your face grazing the rails below for a moment before you lose consciousness. If you'd had to think of how you'd die before this, you would never have guessed it would be from falling off a moving train.\n            *if lawmen\n              At least you're dying knowing that help is on the way. \n            Maybe Victoria will make it home safely and succeed in keeping Willow Creek from being flooded; maybe Mason will be able to protect his documents after all and will thrust Willow Creek into the future whether it wants to go there or not. You have only a brief moment to wonder before you have no more thoughts at all.\n            *set dead true\n            *goto_scene ending\n          *else\n            It takes a moment until you get up the strength to pull yourself forward on your belly. Finally, you're clear of the railings. The people on the observation deck—all on the wealthier end of the spectrum—cower away from you, but you ignore them and your injuries and press forward into the observation car and into the train.\n            *goto inside\n      *if (investigatin > 60) #Grab onto the ladder on the refrigerator car.\n        *set investigatin %+10\n        Without your trained eye, you wouldn't have spotted the ladder on the refrigerator car—it's the same color as the rest of the car and not well defined. You coax your horse into position, goading him to the right speed. You have to stay in sync with the train for just a few moments….\n\t\t\n        And there, you've got it. With both hands locked onto the ladder, you swing your feet over and hang on. Your horse drops back to safety and leaves you clinging to the side of a moving train. What do you do?\n        *choice\n          #Climb to the top and head toward the front to find Victoria.\n            *label top\n            You climb up to the top of the train car, wind pulling at your clothes and attempting to dislodge you. Crawling up over and onto the top is a challenge, but there are several hand-holds to help you get your grip, as well as a number of hatches across the top, where an ice-salt mixture is loaded in to keep the inside of the car cool.\n\t\t\t\n            You get the feeling that this was actually a little too easy—just before you hear the first shot ring out. A bullet pings off of a hatch behind you, and you see an outlaw several cars in front, only his head showing through a ventilation hatch on a passenger car, his rifle out in front of him, braced on the train roof.\n            *choice\n              #Gunfight on top of a train? Exactly my style!\n                *set shootin %+10\n                You lay flat, hooking your feet through the handle on the hatch lid as you draw your gun. There's not much to target on the outlaw with only his head showing, and even that he can duck back inside the train car ahead to dodge your bullet. Any shot you take has got to count.\n\t\t\t\t\n                *if shootin > 80\n                  You breathe. In. The train jostles under you, but you are still, and as you aim, time slows. Out. You see the outlaw come up just high enough to let you aim a little better. In. You squeeze.\n\t\t\t\t  \n                  Before you've finished exhaling, your bullet has found its target. The outlaw's head jerks backward and he tumbles into the open train car, leaving his rifle on the roof above him.\n\t\t\t\t  \n                  The train is moving slowly enough that you can stand and walk forward in a crouch without fear of losing your balance too badly. And it's a manageable leap between cars. Where do you go?\n                  *choice\n                    #I head forward to pick up that gun.\n                      *label rifle\n                      You make your way forward, holding onto your hat as the wind whips by you. You're almost to that left-behind rifle when shots start to come up through the roof of the passenger car.\n                      *choice\n                        #Shoot back through the roof; innocent bystanders may just have to be the sacrifice for my survival.\n                          *set lawless %+20\n                          You shoot down through the roof, still making your way to the rifle and the open hatch. You hear screams from below, and more shots punch through the ceiling.\n\t\t\t\t\t\t  \n                          *if brawlin > 65\n                            You're fast enough that you make it to the hatch without getting shot, despite the number of bullets fired from below. From there, you stick your head down just quick enough to get an idea of where the outlaws are—three of them, so you didn't meet all of the Bledsoe Gang yesterday—and then you fire. Your ears ring, and you realize it's because all the shooting has stopped. Another glance below and your suspicion is confirmed: All of the outlaws are down for the count.\n\t\t\t\t\t\t\t\n                            You grab the rifle and drop down into the passenger car.\n\n                            *label doctor\t\t\t\t\t\t\t\n                            \"We need a doctor!\" one of the passengers shouts out.\n                            *choice\n                              #I find a way to stop and help.\n                                *set lawless %-10\n                                You're no doctor, so there's not much you can do—but luckily for you, there is a doctor among the passengers, and the injuries aren't severe. One man needs a wound bound where he caught a stray bullet in his shoulder, and one of the women passengers has a cut around her neck from when one of the outlaws tried to yank off her necklace. Victoria lost control of these outlaws—if she ever had control of them to begin with. You stay and help for a minute before the doctor shoos you away.\n\t\t\t\t\t\t\t\t\n                                \"Find out if there are any more of them,\" the doctor suggests.\n\t\t\t\t\t\t\t\t\n                                \"And shoot 'em for me,\" the man who caught the bullet says between clenched teeth.\n                                *goto mexicanstandoff\n                              #I tell them help is on the way.\n                                *if lawmen = false\n                                  You have no idea if it's true, but it might offer them some comfort.\n                                Your words seem to take the edge off of the crowd. Help is coming. They only need to wait a little longer and they'll be taken care of.\n\t\t\t\t\t\t\t\t\n                                *label through\n                                As you make your way to the head of the car, you see one man caught a bullet in his shoulder—another passenger is attending to him, and you think he'll make it. There's also a woman with a cut bleeding around her neck from where it looks like the outlaws ripped off her necklace. Victoria lost control of these outlaws—if she ever had control of them to begin with.\n\t\t\t\t\t\t\t\t\n                                You can think of some choice words you'd like to share with that girl when this is all over.\n                                *goto mexicanstandoff\n                              #The passengers aren't my concern.\n                                *set lawless %+10\n                                There are still people with guns on this train likely to cause more trouble—and you're no doctor.\n\t\t\t\t\t\t\t\t\n                                *goto through\n                          *else\n                            You hurry forward across the top, shooting into the car below you and dodging bullets, but one shot comes up exactly where you are and punches into your forearm. \n                            *set health %-15\n                            *if health \u003c 20\n                              By itself, the wound wouldn't be fatal, but with the beating you've already taken today, it's your body's final straw. The force of the impact sends you staggering backwards, and you're almost unconscious before you fall off the train. \n                              *label deathfall\n                              The last thing you experience as you make your way out of the world and into whatever comes next is the cushioning feel of the air catching you as you fall off the side of a train. You have just a moment to wonder what will become of Willow Creek now that you've left it behind.\n                              *set dead true\n                              *goto_scene ending\n                            *else\n                              Luckily, it's not your gun hand, but it hurts like a railroad spike. You reach the hatch, take a quick peek below, and get an idea of where the outlaws are—three of them, so you didn't meet all of the Bledsoe Gang yesterday. You fire three quick shots below. Your ears ring, and after a few breaths, you realize that's because the shots have stopped being fired. Another glance below and your suspicion is confirmed: All of the outlaws are down for the count.\n\t\t\t\t\t\t\t\n                              You grab the rifle then lower yourself down through the hatch, swearing at the pain in your arm before you hit the floor.\n                              *goto doctor\n                        #I dive through the open hatch.\n                          *goto bledsoegang\n                        #I retreat and get down between the cars to enter through the platform door.\n                          You drop down to the platform and slide open the passenger car door. The three outlaws are still watching the train car roof, giving you just the opportunity you need to rapid-fire, targeting each one and fanning the hammer, unloading the last shots from your chamber.\n\t\t\t\t\t\t  \n                          Almost as one, the three outlaws fall to the ground. And then there is a moment of silence as the frightened passengers process what's just happened. It doesn't take them long to collect themselves.\n                          *goto doctor\n                    #I drop down to the platform between cars and make my way forward inside the train.\n                      You lower yourself down the ladder on the front end of the refrigerator car and head forward toward the passenger cars.\n                      *goto inside\n                    #I go to the back of the train. I don't want to leave any outlaws behind me.\n                      You steady yourself as you walk across the top of the train, staying low to keep your balance. No one else shoots at you, and you lower yourself down onto the observation deck, startling a few well-to-do passengers and one shocked woman.\n\t\t\t\t\t  \n                      \"Ma'am,\" you say, tipping your hat. And then you're inside.\n                      *goto inside\n                *else\n                  You're a good shot, but not good enough—and worse, you run out of bullets. Luckily, he's no better, and his rifle goes quiet a moment after you realize your chamber is empty.\n                  *choice\n                    #Good thing I brought a knife to this gunfight.\n                      Your knife—and your fists—never run out of bullets.\n                      *if brawlin > 70\n                        You stand and run across the top of the train, making the leap between cars as easily as jumping over a hay bale. The outlaw has just pulled himself up to the roof of the train when he begins to realize that this wasn't his brightest idea. You don't wait for him to square off—you lower your shoulder and ram him backward; he trips over the ventilation hatch and rolls, grabbing himself just before he tumbles between the train cars. As you approach, he whips out a kick at your legs; you dodge, but lose your balance just enough to stumble backward and let him get his feet. He swings at you, wide, and you pivot as you block, shoving his bicep with one open hand and the center of his chest with the other. He looks at you in surprise as he trips over the railing at the top of the train car and plummets to the ground. You take a second to reload your revolver and catch your breath.\n                        *label shortbreak\n\t\t\t\t\t\t\n                        That's when the shooting starts from below you. You grab the rifle and drop into the ventilation hatch.\n                        *goto bledsoegang\n                      *else\n                        *set health %-10\n                        You stand and run across the top of the train, but it's much harder than you'd expected. You leap to the passenger car as the outlaw lifts himself up out of the hatch and squares off against you. He throws the first punch, and you dodge just enough to take it on the shoulder rather than in the jaw. \n                        *if health \u003c 20\n                          The force of the blow sends you stumbling, and while that wouldn't phase you on a normal day, you've already taken enough punishment that it throws you off your game. You try to regain your balance as you near the side of the car, but the railing at the edge of the train car catches your foot, and you're thrown off the side.\n                          *goto deathfall\n                        *else\t\t\t\t\t\t\n                          You punch him back and he stumbles, but he grabs your shirt and pulls you off balance with him. You swing your arm under his to clear him, but you both tumble to the roof and roll before you catch yourself on the railing atop the car, your face pushing against the cold metal. You elbow the outlaw and he grunts, and you push yourself away from the edge, rolling on top of him again. He shoves his hand in your face, pushing your chin backward, and you slam the butt of your gun into his arm. He screams, releasing the pressure on your face and giving you a chance to punch him with your gun in his temple. His scream cuts short as he goes limp, and you take a moment to reload your revolver and catch your breath.\n                          *goto shortbreak\n                    #Crawl toward the back of the car and lower myself down to the platform.\n                      Going slowly will give him a chance to reload, but it's also the way you're least likely to get injured. It doesn't take long before the bullets are flying again. You'll reload when you hit the platform.\n                      *goto crawling\n                    #Can't we just talk about this?\n                      *set talkin %+15\n                      \"Hold your fire!\" you call out, knowing he can't help but wait since he has to reload. No sense in your not reloading as well. \"There's no reason this has to end in blood!\"\n\n                      \"You aim to stop us from takin' all the riches off of this here train?\" he calls back.\n\n                      Well, at least he shoots straight when he talks.\n                      *choice\n                        *if (lawmen=false) #I lie and tell him the law's on the way.\n                          *label surrender\n                          \"It ain't me you need to worry about,\" you call out. \"Sheriff's on the way with a whole posse of men. Won't take long 'til someone gets twitchy and puts a bullet in you.\"\n\t\t\t\t\t\t  \n                          The gunman considers this for a moment.  \n\t\t\t\t\t\t  \n                          \"We're about done here anyway,\" he says. \"You just stay up there until we finish and we won't give you any more trouble.\"\n\t\t\t\t\t\t  \n                          Well what do you know? Your gun is reloaded.\n                          *choice\n                            #I let them go. No sense in my getting shot to save some rich passengers a few trinkets.\n                              *label letgo\n                              *set lawless %+20\n                              You wait until you see the outlaw and three companions—more men than you met yesterday—jump from the train. Once they're clear, you get down from the train roof and make your way into the passenger car they robbed. The passengers look shocked but, other than a couple of injuries, none too worse for the wear.\n                              *goto doctor\n                            #I bet I can get that shot now that he's not shooting at me.\n                              *set gamblin %+10\n                              *set lawless %+10\n                              *if gamblin > 60\n                                Now that you're not being fired at, the shot is much easier to make. Your revolver cracks and the outlaw's head is thrown back. He falls into the car below. Your luck is holding!\n                                *goto rifle\n                              *else\n                                The shot goes wide, and the outlaw glares at you before ducking back down into the train car. There's no way you're going to get into—or past—that car from the roof. You drop down onto the platform in front of the refrigerator car and start making your way forward.\n                                *goto inside\n                            #I promise that he won't get away, describing exactly how the law will hunt them down.\n                              *set lawless %-15\n                              *label hunt\n                              \"Your only chance is to surrender,\" you say. You start to describe all the ways in which the law will catch up to them, using all of the techniques you've learned as an investigator and making some up on the fly. You recite the punishments for train robbery—and suggest a lesser punishment for attempted train robbery—and watch for signs of sweat.\n                              *if investigatin > 65\n                                And you see them. You're intimidating the living daylights out of this outlaw. He lets go of the rifle and drops out of sight. You make your way carefully across the roof and look into the hatch only to see four outlaws demanding that one of the passengers tie them up with a long rope.\n\t\t\t\t\t\t\t\t\n                                You drop down through the hatch into the train car. \"I'll take care of that,\" you say. The four outlaws blubber their thanks to you for not shooting them and for keeping the sheriff from doing so. You take their guns and give one to a likely looking passenger.\n\t\t\t\t\t\t\t\t\n                                \"If they change their minds,\" you say, \"shoot 'em.\"\n                                *goto doctor\n                              *else\n                                \"We'll just have to take that chance,\" he says before he drops back into the train car. You start working your way forward, but before you reach the car, you see four outlaws—more than you met yesterday—jumping out of the train and heading away from the railroad. Finally, you clamber into the passenger car they robbed. The passengers look shocked but, other than a couple of injures, none too worse for the wear.\n                                *goto doctor\n                        *if (lawmen) #I tell him the law's on the way.\n                          *goto surrender\n                        #I promise that he won't get away, describing exactly how the law will hunt them down.\n                          *goto hunt\n                        #It's none of my business who they rob from.\n                          You don't particularly care who gets robbed—that's not what you were hired for. He shouts back that they've almost finished up and will be out of your hair shortly.\n                          *goto letgo\n              #Crawl toward the back of the car and lower myself down to a between-cars platform.\n                *label crawling\n                You crawl backward, avoiding the gunfire by keeping yourself low to the train. A couple of bullets ping off the roof near you, but you remain unhurt. Your feet hook onto a ladder on the far end of the refrigerator car and you climb down. \n\t\t\t\t\n                *label refrigerator\n                You swing the door open and shudder at the cold within. Slabs of meat hang from hooks in the ceiling, and boxes of grains line the walls. \t\t\n                You hurry through, slowly sliding the door open at the front end of the car, but there's no one else on the platform, and the cargo car ahead is likewise empty of life. You move cautiously forward to the passenger cars in front of you.\n                *goto inside\n              #Stand up and dash to the end of the car; I'll be lucky enough to avoid more bullets.\n                You know straight away that this is one of your stupidest ideas—giving your back to a gunman on a moving train where you can't dodge…well, the odds just aren't in your favor.\n\t\t\t\t\n                *if gamblin > 65\n                  Lucky for you, you prefer to gamble on long odds. You drop down the far side of the refrigerator car, swinging down onto a ladder before the next bullet pings against the roof.\n                  *goto refrigerator\n                *else\n                  *set health %-15\n                  And today's not your day for long odds. Just as you're about to reach the end of the car, a bullet grazes your calf, and rather than swinging down gracefully onto the ladder below, you stumble forward. \n                  *if health \u003c 20\n                    And that fall is your last. You hit the platform below hard enough to hear bone crunch, and then you're off the side. Death by speeding train is not pretty, and you only barely have time to wonder what will become of Willow Creek now that you're gone.\n                    *set dead true\n                    *goto_scene ending\n                  *else\n                    You only barely catch yourself before you land face-first on the platform, your good leg dangling over the rails speeding under you as you hold onto the ladder with both arms. After you pull yourself back to your feet, you allow yourself a few good breaths to collect yourself before you move ahead.\n                    *goto refrigerator\t\t\t\t\n          #Swing to the platform between the refrigerator car and the next cargo car.\n            *if brawlin > 60\n              You swing over easily and land on the platform between the cars. A quick slide of the next car door and you're inside.\n              *goto inside\n            *else\n              *set health %-10\n              This is one of those dime-novel stunts that sounds easier than it actually is. After a few false tries and one tense moment with your feet danging in the air over the rails passing quickly beneath you, you make the landing on the platform. You've earned a few new bruises, but considering the debt you already owe your body, what's a few more lumps? A quick slide of the next car door, and you're inside the train.\n              *goto inside\n          #Climb to the top and head toward the back looking for an easy way to climb down.\n            *goto top\n\t  \n*label inside\nAlthough your heart speeds up every time you step onto a platform to open the door between cars, there's little of interest between you and the first passenger car. Close enough to the sounds of violence ahead—you've heard at least one gunshot since you got inside—the first passenger car is filled with scared families, packed in tight with others who couldn't afford better tickets. They look at you and cringe backward.\n\n*choice\n  #I don't have time to talk to them. Onward!\n    You ignore their frightened stares and make your way forward. \n    *label gasp\n    As you slowly slide open the door at the front end of the car, you can feel the passengers behind you hold their breath.\n    *goto platform\n  #I tell them I'm here to help.\n    *set talkin %+10\n    *if talkin > 60\n      Still afraid, a few of the passengers nod at you, placing their trust on your shoulders. One woman crosses herself and whispers a blessing over you in Spanish. You walk to the front of the car.\n      *goto gasp\n    *else\n      Your words don't do much to ease the fear in their eyes, but at least you tried. You keep moving, walking to the front of the car.\n      *goto gasp\n  #I explain that there are outlaws on the train and tell them they should start moving to the back car.\n    *set talkin %+10\n    You may not be able to keep them all safe, but they've got a better chance the farther away they are from the gunfire. \n    *if talkin > 65\n      They react slowly, but they finally seem to register your words. Quietly—almost silently—they begin to organize, as though they realize that the only way they're going to survive this is by making as little noise as possible. You wait until they're in motion before you move to the head of the car, giving them a little time to start getting clear before you inevitably throw the next car into chaos.\n\n      *label platform\n      Once you step out on the platform, you shut the door to the passenger car behind you. You take a deep breath and slide open the next door.\n\n      The scene in front of you is about what you expected: four outlaws, one standing on the back of a seat to keep watch out the ventilation hatch on top of the roof, are relieving the passengers in the car of their valuables. They pause as they see you in the open doorway, the roar of the train's passing echoing behind you.\n      *choice\n        #Before they can react, I grab the one nearest the door and use him for a human shield.\n          *label shield\n          *if brawlin > 60\n            The outlaw tries to dodge out of your way, but you're faster. You wrap an arm around his neck and hold your gun to his head.\n\t\t\t\n            \"You want to shoot me, you'll have to shoot him first,\" you threaten.\n\t\t\t\n            One of the outlaws aims and fires—and you dodge out of the way as the bullet hits your human shield. So much for that idea.\n            *label bledsoegang\n\t\t\t\n            In an instant, everything is chaos. The passengers are doing their best to stay under cover, and you're doing your best not to get shot as all three of the outlaws target you. You stay low and fire back, and as one of the outlaws reloads, you leap for him, knocking him to the ground unconscious before rolling out of the way of another shot. You can't see to aim, but you keep firing to get them to keep their own heads down as you snake your way under the seats and through the passengers. In one seat, a boy about ten hands you a knife; you take it with a nod, then rush one of the two remaining outlaws, stabbing him in the neck.\n\t\t\t\n            Your last shot hits the final outlaw squarely in the chest, and he stumbles back against the train car wall, dead. Your ears ring as the sound of gunfire stops, and then you hear someone—probably your ten-year-old accomplice—give a whoop and a holler because all the outlaws are dead.\n\t\t\t\n            *goto doctor\n          *else\n            The outlaw dodges out of the way, and then the shooting starts. You fire once into the close outlaw, taking him down before he can get back in the fight, and a bullet zings across your arm, a bright line of blood showing the graze through your sleeve.\n            *set health %-15\n            *if health \u003c 20\n              On a better day, you'd ignore it, but with everything else that's been done to your body, it's as though you can't look away. Another bullet finds your body, and then another, and as your chest shudders and the blood leaks out, you still can't take your eyes away from that bright red line. You always suspected you'd die in a gunfight—you just didn't think it would be today. As your body plummets to the floor of the passenger car, you wonder what will happen to Willow Creek now that you're gone. Then the darkness claims you and you don't think about anything at all.\n              *set dead true\n              *goto_scene ending\n            *else\n              *goto bledsoegang\n        #I talk them down, telling them they should give up for their own good.\n          \"You're all in a heap of trouble,\" you say casually. \"Ain't me you should worry about. It's the lawmen on the way. Sheriff's comin' with a whole posse of men. Won't take long 'til someone gets twitchy and puts a bullet in you. Best to surrender right now.\"\n\t\t  \n          *if talkin > 65\n            Your calm demeanor has unsettled them, as has the fact that you're threatening them without even raising your gun. One of them lifts up a rope. \"I guess you'll be tying us up then?\" he asks.\n\t\t\t\n            Cowardly outlaws: the best kind.\n\t\t\t\n            You take the guns away from the outlaws and hand one to a likely looking passenger once you've got them tied up. \n            *label shame\n            \"They change their minds about surrendering,\" you say clearly, \"shoot them.\"\n\t\t\t\n            One of the outlaws whimpers. They have no shame.\n            *goto doctor\n          *else\n            One of the men just laughs. \"Is that all you got?\"\n\t\t\t\n            Well, violence it is then.\n            *choice\n              #I draw and shoot all four of them before they can get a shot of
