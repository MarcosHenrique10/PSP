f.\n                *label rapidfire\n                *if shootin > 70\n                   The handy thing about a revolver is that if you keep one hand on the hammer, you can unload your bullets into your enemies incredibly quickly. It's even better if you never miss. And you never do.\n\t\t\t\t   \n                   Before they even realize you've drawn, you fan the hammer and get off four quick shots. The outlaws hang, open-mouthed, for just a moment before they fall backward onto the floor. There's a moment of silence before someone lets out a loud whoop of cheer.\n                   *goto doctor\n                *elseif shootin > 60\n                  *set health %-15\n                  The handy thing about a revolver is that if you keep one hand on the hammer, you can unload your bullets into your enemies incredibly quickly. The problem is, you have to sacrifice a little accuracy to make it work. You fan the hammer and unload four quick shots at the outlaws, hitting two of them stone cold dead. The other two draw and shoot back at you, and a bullet grazes you in the side, pain burning along your ribs.\n                  *goto ribs\n                *else\n                  You draw, but they're just as fast. You take one down and duck back into the doorway before their shots hit where you were just standing. From around the corner, you continue to fire, the passenger car filling with gunsmoke and making it harder and harder to aim. As you lean around, trying to get a shot, a bullet grazes you in the side, pain burning up along your ribs.\n                  *set health %-20\n                  *label ribs\n                  *if health \u003c 20\n                    You stumble backward—but there's nowhere to stumble to. Your foot comes down where the platform is not, and you fall off the side of the train, hitting the ground hard, and rolling as the whistle blows and your eyes close for the last time. You have a moment to wonder what will happen to Willow Creek now that you're gone before blackness swallows you whole.\n                    *set dead true\n                    *goto_scene ending\n                  *else\n                    You keep firing and finally, the sounds of gunfire cease and the smoke begins to clear. The passengers inside the train car look shocked, but other than a few minor injuries, no worse for the wear. It takes them only a minute before they burst into noise, talking about what's just happened.\n\t\t\t\t\t\n                    *goto doctor\n              #I grab the one nearest the door and use him for a human shield.\n                *goto shield\n              #I calculate the odds of shooting two of them with one bullet.\n                You've heard of this sort of thing—it's not a matter of skill, but a matter of pure luck. And it does an amazing job of intimidation.\n                *if gamblin > 80\n                  You draw and shoot faster than you've ever done it before, and you hit exactly the right angle—the bullet travels through the nearest outlaw's throat and into the outlaw guarding the roof, hitting him in the stomach. He crumples and falls out of the ceiling, weeping as he hits the ground.\n\t\t\t\t  \n                  \"I think maybe you ought to reconsider your surrender,\" you say.\n\t\t\t\t  \n                  The two remaining outlaws drop their guns, and one very helpfully offers you a rope to tie them up. You hand one of the guns to a likely looking passenger.\n                  *goto shame\n                *else\n                  You draw. You fire. The nearest outlaw falls to the ground. If you're lucky, you'll survive what comes next….\n                  *goto bledsoegang\n        #I draw and shoot all four of them before they can get a shot off.\n          *goto rapidfire\t\t\n\t\t  \n*label mexicanstandoff\nYou edge closer to the front of the train. There aren't that many cars left, and you're not sure where Victoria—and Winslow—are hiding. Your answer comes when you hear their voices through the next platform door.\n\n\"I figure it ought to be worth quite a bit in blackmail,\" Winslow is saying. \"What do you think Mason would pay a man to keep him from turning these papers over to the law?\"\n\n\"You're insane!\" Victoria shouts. \"How do you think you can go back to Willow Creek after this? Kidnapping? Shooting a man in the back? Probably worse!\"\n\nSounds like your cue. You slide open the door. Inside you see Winslow, using Tess Albertson as a human shield. His gun is pointed at Victoria, who's holding onto some papers with one hand and pointing her derringer back at Winslow with the other. Behind Victoria is Ancha, holding onto his stomach and trying to keep the blood from seeping out of him.\n\nThe door is noisy, and both Victoria and Winslow have glanced at you, but you have a moment before either will shift the aim of their guns. And you've got a clear shot at Winslow's back that you could probably take without hitting his hostage.\n*choice\n  #I shoot Winslow in the back. He won't get the chance to blindside me again.\n    *set lawless %+10\n    *if lawless > 60\n      Once you get over the moral issue of shooting a man in the back, it's not that hard a shot. His hostage is covering his front. His back is clear, and if you aim so you'll hit him sideways, she's in no risk.\n\t  \n      You breathe. In. Out. You take the shot.\n\t  \n      The bullet rips through Winslow's ribs, and he stumbles. His grip slackens, and Tess elbows him in the stomach, darting away from him and behind you. The former deputy crumples to the ground, blood seeping out of his mouth. He looks at you once, and then his eyes go dim.\n      *set winslowdead true\n\t  \n      *goto anchahurt\n    *else\n      *set health %-40\n      There's something about shooting a man in the back that gives you pause, and by the time you've convinced yourself over that moral hump, the shot has gotten much harder. He's turned, but you take the shot—just as he pulls his trigger on you. He crumples and falls back—Tess elbows him in the stomach and dashes toward you—just as his bullet slams into your hip. It hurts worse than the time you were a kid and fell face-first into a hornet's nest.\n      *if health \u003c 20\n        *goto hornets\n      *else\n        You clutch at your side as Winslow falls to the ground. He looks at you in surprise, then his eyes go dim. You'll live to fight another day.\n        *set winslowdead true\n\t\t\n        *goto anchahurt\n  #I convince Winslow we can still salvage this and go back to how things were.\n    *set lawless %+10\n    \"It doesn't have to be this way,\" you say. \"You had a good life, Winslow. Don't throw it away.\"\n\n    *if deputy > 50\n      \"A good life?\" Winslow asks incredulously. \"No one ever respected me, there was no future in my job, and nowhere for me to go. I was going to be stuck doing the same work in the same crummy town for the rest of my life with no end in sight. Would you settle for that, ${surname}?\"\n\n      \"No,\" you say. \"I wouldn't. But I wouldn't resort to kidnapping and abandoning my wounded partner, either.\"\n\t  \n      Winslow lowers his gun. \"I'm sorry about that, ${surname}. I really am. We're a good team.\"\n\t  \n      \"Then let's make this go away,\" you say. \"We can say you infiltrated the outlaws who were holding Victoria captive.\"\n\t  \n      \"But…\" says Victoria.\n\t  \n      \"Clears both of you of any wrongdoing,\" you say over Victoria's protests. \"I don't know what to say about Tess, but we'll figure out something.\"\n\t  \n      Winslow releases Tess, who darts around behind you for cover. \"I can't go back,\" Winslow says hopelessly. \"I can't face that life again.\"\n\t  \n      He raises his gun, and before you realize what he's going to do—he swallows it, bullet and all. Winslow's body falls to the floor, and for a moment, everyone is silent.\n      *set winslowdead true\n\t  \n      *goto anchahurt\n\t  \n    *else\n      \"There's no coming back from this,\" Winslow says firmly. \"I know the law as well as you do, and I know that if I go back, there's no hope. Best I can hope for is to take you out, too.\"\n\t  \n      *goto sneer\n  #I explain to Winslow exactly what is going to happen when the law catches up to him.\n    *set investigatin %+10\n    *set lawless %-10\n    You can't risk shooting Tess, and you're not going to let Winslow escape. You know the law, and you know exactly what happens to dogs like him. As you told him at the beginning of the case, you're a good investigator, and it's time you let that show.\n\t\n    \"There's nowhere you can go from here, Winslow,\" you say coldly. \"I bet the whole town's talkin' about how you're robbing a train. Kidnapped a girl. Hell, I wouldn't be surprised if they decide you kidnapped Victoria here, too. And that's without mentioning how you abandoned me on Table Mountain. All for what?\" You watch as he considers you, wondering where you're going. \"Money, Winslow? You'd risk your life, your home, everything you have on the chance—slim that it is—that you could get away with this a rich man?\"\n\t\n    \"I might still,\" Winslow says defiantly.\n    *label sneer\n\t\n    \"It's too late for that, partner,\" you say with a sneer. \"Best you can hope for now is a quiet jail cell to end out your days.\"\n\n    You see the moment when he decides he believes you. It's the same moment when you see the look in his eyes that says he'd rather die than let that happen. He turns toward you and cocks the hammer of his gun, which is still pointed at Victoria….\n    *choice\n      #I take the long odds and shoot his gun out of his hand.\n        It's a huge risk, but you'd rather risk missing than risk hitting Tess.\n        *if gamblin > 65\n          You pull the trigger the instant before he does, and the gun goes flying out of his hand. Tess elbows him in the stomach and darts away from him and behind you. Disarmed, Winslow faces down your revolver and Victoria's shaking derringer defiantly.\n\t\t  \n          \"Do your worst,\" he sneers.\n\t\t  \n          You walk over, flip your revolver, and bring the butt crashing down on his temple. He crumples onto the floor, out cold.\n          *label anchahurt\n\t\t  \n          Victoria lowers her derringer and drops next to Ancha, pressing her hand over his stomach. \"So much blood,\" she whispers, and she doesn't seem to notice the tears falling down her cheeks.\n\t\t  \n          \"There's a doctor in the passenger car,\" you say. \"He's your best chance.\"\n\t\t  \n          Ancha grits his teeth in pain and nods. \n\t\t  \n          \"I'll go get him,\" says Tess.\n          *if sweetheart = \"tess\"\n            *set sweetheart3 \"Tess\"\n            She presses a kiss to your jaw. \"Thank you,\" she whispers.\n          Then she hurries out the platform door and back toward the passenger car.\n\t\t  \n          *label papers\n          Victoria looks up at you, the papers still clenched in one hand. \"You have to take them,\" she says. \"Take the papers. Get justice for Willow Creek.\"\n\t\t  \n          You head to the engine to let the conductor know he ought to stop the train, what with the injured folk on board. As the train slows and you hop off, you consider just what you'll do with Victoria's request for justice. You know what she had in mind, but what do you think is right for the town?\n          *set plans true\n          *finish Chapter Eight: Showdown at High Noon\n        *else\n          Your shot goes wide, but it hits Winslow in the arm. He drops the gun, but not before his own shot goes off. Victoria stumbles back, her own arm covered with blood. As Winslow's gun falls to the ground, Tess elbows him in the stomach and darts away, dashing behind you for cover. \n          *label victoriahurt\n          *set victoriahurt true\n          Winslow sneers at you defiantly.\n\t\t  \n          \"Do your worst,\" he says.\n\t\t  \n          You walk over, flip your revolver, and bring the butt crashing down on his temple. He crumples to the floor, out cold.\n\t\t  \n          Victoria drops limply to the ground next to Ancha, tears streaming down her face. \"So much blood,\" she whispers.\n\t\t  \n          \"There's a doctor in the passenger car,\" you say. \"I'll go…\"\n\t\t  \n          \"I'll go,\" says Tess.\n          *if sweetheart = \"tess\"\n            *set sweetheart3 \"Tess\"\n            She presses a kiss to your jaw. \"Thank you,\" she whispers.\n          Then she hurries out the platform door and back toward the passenger car.\n          \n          *goto papers\n      #I shoot Winslow in the head.\n        He's taller than Tess, and if your aim is true, you'll hit him with no danger to the hostage.\n        *if shootin > 60\n          In the end, it's not that difficult a shot. The bullet pierces straight through his forehead, and he falls backward before he can pull the trigger. Tess dashes away from him and toward you, touching Winslow's blood that sprayed in her hair.\n          *set winslowdead true\n\t\t  \n          *goto anchahurt\n        *else\n          But it all goes horribly wrong. Winslow fires, and it jerks his head out of your line. Your bullet hits low, grazing Tess's cheek—hopefully nothing worse—and punching Winslow in the shoulder, making him drop his gun. Victoria crumbles to the wall, her arm soaked in blood, and Tess elbows Winslow in the stomach, darting away from him and toward you, her hand over the blood gushing out of her cheek.\n\t\t  \n          Disarmed,\n          *goto victoriahurt\n      #I charge him before he can get the shot off.\n        You dash forward, and the movement startles Winslow enough that he changes his aim, swinging his gun toward you.\n        *if brawlin > 65\n          You rush in before he can finish aiming, barreling into both Tess and Winslow, grabbing Winslow's gun arm for control of his gun. The impact sends all of you flying—Winslow loses his hold on both the gun and Tess, who rolls away, and you end up on top of your former partner. You cock your gun and point it at his head.\n\t\t  \n          \"Do your worst,\" he sneers.\n\t\t  \n          You flip the gun and slam the butt end into his temple. He crumples, unconscious.\n          *goto anchahurt\n        *else\n          *set health %-25\n          You rush in just as Winslow shoots. The bullet slams into your hip and hurts worse than the time you were a kid and fell face-first into a hornet's nest.\n          *if health \u003c 20\n            *label hornets\n            It's funny how you remember things like that. You remember floating on your back once in a big lake, staring up at the clouds as they floated past the sun. You remember the first time you rode a horse, the smell of the horse's sweat and yours mingling under the summer heat. \n\t\t\t\n            You remember that you were trying to save some lives. You hear another gunshot as you fall to the floor and you see Victoria's shaking hands as she drops her smoking derringer. Winslow falls to the ground next to you.\n\t\t\t\n            \"See ya in hell, partner,\" he whispers as blood drips from his lips.\n\t\t\t\n            As the world starts to go black, you wonder what will become of Willow Creek without you.\n            *set winslowdead true\n            *goto_scene ending\n          *else\n            But your momentum propels you forward, and you tumble into Winslow, knocking the gun out of his hand and loosing his hold on Tess, who rolls away as you both hit the ground. From on top of your former partner, you cock your gun and point it at the deputy's head.\n\t\t\t\n            \"Do your worst,\" he sneers.\n\t\t\t\n            You flip the gun and slam the butt end into his temple. He crumples, unconscious.\n            *goto anchahurt", "utes": "*hide_reuse\n*temp kids true\n*temp look true\n*temp leaders true\n*temp buckanswers 0\n*temp investigate 0\n*temp kidchat 0\n*temp story true\n*temp leaderchat 0\n\nDeputy Winslow is waiting at the sheriff's office when you arrive. \n*if ridercaught\n  He looks in a poor mood—there wasn't any information worth getting off of the rider who attacked Frye's cattle. His mood doesn't improve once you start talking.\n*comment endif\n\nIt doesn't take long to explain your leads, and with a grumble, he sends off for Summer Rain to serve as a translator before you head out to the Ute encampment. Rain's half-Ute heritage and her proficiency with the Ute language make her a resource for Sheriff Rogers and his deputies when the local Utes are involved in a crime. That is, when shooting first doesn't resolve issues in advance. \n\nThe soiled dove arrives promptly, wearing the most modest clothing she owns, you suspect. \n*if rainmad\n  Not that Rain's giving you the time of day. She greets Winslow, who doesn't seem to think much of her, but gives you a clear cold shoulder.\n*if sweetheart=\"rain\"\n  She gives you a wink and a smile before greeting Winslow, who doesn't seem to think much of her—but you can tell, in spite of her pleasant expression, that she doesn't think much of him, either.\n*comment end_if\n  \nThe three of you mount up, Winslow grumbling about the need to go out to the Ute encampment anyway.\n\n\"Can't see how this won't be a waste of time,\" he says. \"Those savages won't give us any straight answers regardless.\"\n\nRain bristles, but waits to give you a chance to respond.\n\n*choice\n  #I stay neutral on the subject of the Utes, just saying we have to follow the lead.\n    *label raindefense\n    Rain looks exasperated, protesting, \"You do know that the United States military has called on the Utes to campaign against the Plains tribes, don't you? Some of the men we're about to see may well have fought side by side with white soldiers.\"\n\t\n    \"Might have also fought next to Confederate soldiers,\" Winslow says easily, as though this is worse than being a savage. \"They've also burned down blacksmith shops, rustled cattle, exhibited public drunkenness, and chased off hardworking miners.\"\n\t\n    \"Chased off squatters on their own lands,\" Rain bites back.\n\t\n    \"Then their chief shouldn'ta sold those lands out from under 'em,\" Winslow rebukes. \"Been almost ten years now they shoulda been on their reservations, living off handouts that us hardworking citizens are supporting with real labor, but they're still gadding about refusing to learn how to live like civilized folk.\"\n\t\n    Rain just growls under her breath, but it's clear she's had this argument enough times she knows when someone won't listen regardless of her points.\n    *goto encampment\n  #I defend the Utes.\n    *set utes %+20\n    *set deputy %-20\n    \"It's hardly savage to defend your homeland against invaders,\" you say. \"That's just basic human will, wanting to keep your home and family safe.\"\n\t\n    \"Thank you,\" Rain says firmly.\n\t\n    Winslow just snorts.\n    *goto raindefense\n  #I agree with him, but say it's for the investigation.\n    *set deputy %+20\n    *set utes %-20\n    *goto raindefense\n\t\n*label encampment\n*page_break\nThe land rolls under you, stealing away the sight of Willow Creek before you catch the first glimpse of the Ute encampment. As you approach, you see a grouping of wickiups—round huts covered with brush and easy to pick up and move, or leave behind—and Utes of all ages going about their daily tasks. You'd guess there's about a hundred of them, all wearing a mix of buckskins and clothing they've gotten in trade from white folks. It's a more varied group than the townspeople of Willow Creek would have led you to expect from their gossip; to hear them tell, the local Utes are a band of warriors, men ready to commit crimes and kidnap women and children at the drop of a hat.\n\nAs you get closer, you do notice a few blond heads among the children, dressed and treated the same as the rest. Kidnapped or not, they're not being tortured; they're just being raised like Utes. Which, you suppose, some might say amounts to torture in the long run.\n\nQuite a number of cattle and horses are grazing nearby, and you hear Winslow sniff loudly. \"My left eye if those aren't Frye's cattle. Those are fresh brands on top of older ones.\"\n\nYour approach hasn't gone unnoticed, and three men ride out to greet you before you can get any closer to the wickiups. The tallest you recognize as Walkara, who the Willow Creekers call Walker, the leader of this band.\n\n\"Mique wush tagooven,\" Rain says warmly, using one of the few Ute phrases you know—\"Hello, my friend.\"\n\nWalkara and the others look you over dubiously. \"Mique,\" Walkara says after a moment. He speaks too quickly then for you to follow, even if your understanding of the language were better. Rain responds, but Walkara shakes his head.\n\n\"You will come no further,\" he says to you and Winslow in perfect English. The deputy's posture tightens, and you can tell he's thinking about reaching for his gun.\n*choice\n  #\"We'd just like to ask a few questions, Walkara.\"\n    *if utes > 65\n      Walkara nods at you in greeting. \"I've heard of you by reputation, ${name}. Perhaps we can help each other.\"\n      *goto anchatalk\n    *else\n      Walkara looks at you for the first time. \"Who are you, that I should answer?\"\n\t\t\n      \"I'm ${name}, and this is Deputy Winslow,\" you say in the same polite tone of voice. \"We're investigating a missing persons case. A young woman from Willow Creek has gone missing, and we've reason to believe she may have been sympathetic to your cause. She might have wandered out this way.\"\n      *if talkin > 65\n\n        Walkara hesitates, but only for a moment. \"We also have someone missing,\" he says. \"Perhaps we can help each other.\"\n\t\t\n        *goto anchatalk\n      *else\n\n        \"And then we kidnapped her?\" Walkara fills in angrily. \n\t\t\n        Winslow's hand looks like it's itching to grab his gun.\n\t\t\n        \"I wasn't suggesting that,\" you say calmly. \"We don't want any trouble. And I'm sure you've got enough trouble without starting more with us.\"\n        *goto nowar\n  #\"Give us the girl you kidnapped, Walker, and we'll leave.\"\n    *set utes %-15\n    *set deputy %+15\n    Walkara glares at you—it's the first he's looked at you, and you have to admit, even though you've stared death in the face before, the frost in his expression makes you uneasy. \"Return to us the man you stole and we'll have a civil conversation,\" he says in a clipped voice.\n    *choice\n      *if (anchaclue = false) #Wait, what? There's another missing person?\n        *set investigatin %+10\n        \"Hold your horses,\" you say, and you manage not to grin when one of the men behind Walkara takes your idiom literally, his hands tightening on his horse's reins. \"What's this about someone missing?\"\n\t\t\n        \"They ain't connected,\" Winslow protests.\n\t\t\n        \"They could be,\" you say. \"As far as I know, we didn't steal anyone,\" you continue, thinking briefly of the man who was in prison when you were. \"But we've got a girl who's been missing for three days. Maybe we can help each other.\"\n\t\t\n        Walkara hesitates, but only for a moment. \"Perhaps we can,\" he says with resignation.\n\t\t\n        *goto anchatalk\n      #I'm not interested in his problems, and I won't let him stand in the way of my investigation.\n        *set brawlin %+10\n        You know you can be physically intimidating, and you believe that even with Walkara's chilly glare, you could give him a run for his money. \"I don't know anything about a stolen man,\" you say.\n        *if buckfree=false\n          \"There was a criminal in jail when I left it, but I didn't put him there, and I'm not much concerned for his fate.\"\n          *comment end_if\n\t\t\t\n        You take a moment to make yourself look larger in your saddle. \"What I am concerned about is a young girl who may have found her way out here. I aim to discover if anyone knows anything about where she might be. And I don't think you want to stand in my way.\"\n\t\t\n        Walkara glares at you, and you watch his breathing as he struggles to get his temper under control.\n        *goto nowar\n      #This can clearly only be settled with violence. Draw!\n        *set deputy %+15\n        You move your hand to your gun, and you see Winslow do the same.\n        *goto draw        \n  *if (anchaclue) #\"I understand you've got a missing person, Walkara—a fella named Ancha? We'd like to help.\"\n    *set utes %+30\n    *set deputy %-30\n    Winslow and Walkara both look at you with expressions of shock—though the former is far less pleased in his expression than the latter. \"What in tarnation are you on about, ${surname}?\" Winslow demands.\n\t\n    You explain that one of your informants—you don't mention Rain by name, and she doesn't hint back—told you of a Ute man who disappeared right about the same time as Victoria Frye. \"It might be that they're not connected,\" you admit, \"but I'd like to hear it from Walkara what happened on this end. We'll see if any of the pieces fit.\"\n    *page_break\t\n    *label anchatalk\n    *set anchaclue true\n\n    Walkara escorts you back toward the encampment in a way that almost seems peaceable, if it weren't for the other two men following behind. You know what it feels like to enter hostile territory, and that's exactly what's happening here.\n\t\n    \"Three days ago, Ancha, one of my young men, a member of our Dog society—you'd say a soldier—disappeared. If he left on his own, he told no one where he was going. If he was taken, he left no sign of struggle. It is unlike him in either case.\"\n\t\n    One of the other riders says from behind, in English as clear as Walkara's, \"We suspected he'd been arrested, but Shosheen…\" He nods to Rain, who's riding next to you. \"…told us he's not in the jail.\"\n\t\n    \"Shosheen?\" you murmur to Rain.\n\t\n    Her blush is the only acknowledgment of your question. \"That's Sowiet,\" she says instead. \"Walkara's brother. Of the three, he's most likely to try to work with the whites rather than fight. The third is Ammon.\"\n\t\n    Walkara continues without acknowledging Sowiet's interruption or Rain's quiet explanations. \"If you believe you can find Ancha, or find something that will lead us to him, you may have access to our camp.\"\n\t\n    \"Tog'oiak,\" Rain says politely, and you guess it to be a word of thanks. The three Utes leave you to your own devices—but you notice that everyone in the encampment is keeping an eye on you.\n\t\n    How do you investigate?\n    *label investigate\n    *choice\n      *if (kids) #I'd like to talk to the children.\n        *goto kids\n      *if (leaders) #I want to talk more to the three leaders.\n        *goto leaders\n      *if (buckfree) #I want to check to see if my fellow prisoner, the horse thief, is in this camp.\n        *set investigate +1\n        You describe to Rain the man you met in the jail, and Winslow confirms a few details, though he didn't bother to get the man's name. \"Figured he was set to be hanged,\" Winslow mutters, but Rain ignores him.\n\t\t\n        \"Sounds like Buckskin Jack,\" she says, shaking her head. \"He's not one of Walkara's followers, but he is a Ute. Well, half, like me. Half Apache, I think. Maybe Kiowa. Might depend on the day you ask him.\"\n\t\t\n        \"That does sound like the man I met,\" you agree, remembering the crazy stories you thought he might have been making up on the spot. \"Any chance he's here?\"\n\t\t\n        Rain shrugs. \"I'll find out.\"\n\t\t\n        It only takes a few questions—and a few wide smiles among the women—to reveal that Buckskin Jack is indeed at the camp. You head out toward the cattle and are unsurprised to find him applying a fresh brand. You think you might be able to hear Winslow's teeth grinding together.\n\t\t\n        Buckskin Jack looks up at you with a grin. \"If it ain't my fellow criminal,\" he says brightly, then nods to Winslow. \"He your probation officer?\"\n\t\t\n        \"Working a case together,\" you say neutrally. Winslow doesn't need anything more to grind his teeth about. \"I thought maybe you'd have heard some gossip.\"\n\t\t\n        The horse thief blows across the brand. \"Shoot.\"\n        *label buckquestions\n        *choice\n          *if (anchaclue) #\"Heard anything about a young man named Ancha? Disappeared from here in the Ute encampment a few days back.\"\n            *label substory\n            *if story\n              *label story\n              *set story false\n              *set buckanswers +1\n              With a tip of his hat, Buckskin Jack settles into a crouch, then gestures, inviting you to do the same. \"Old Buck's got a story for you,\" he says, like a storyteller who's just warming up. \"Once, there was a girl. Pretty thing. Red hair. Too bright for her own good and for her daddy's peace of mind. Wanted to make a real difference in the world and got it in her head that she could do it. But her daddy weren't too keen on the idea of his daughter making a name for herself as anything other than a future wife, so this girl, she had to find more creative ways to reach her goals. Then she found out something secret and knew there wasn't a way she could stand in its path unless she went outside the law.\n\t\t\t\n              \"Meanwhile, there was a boy. Ladies liked to look at him, so I suppose he was handsome. Strong, too. In a bit of a tough spot, what with half his family giving in to the law and staying on a reservation and the other half hanging onto the old ways. He could smell there was trouble brewing, and violence on its way, and strong as he was, he didn't want that.\n\t\t\t\n              \"And by chance, the two young people met in town one day, and the girl told her secret to the boy. She was going to look to hire some outlaws, you see. And because she was a smart girl, she knew better than to just go look 'em up on her own. So the boy and the girl headed off to the lair of some notorious outlaws up on Table Mountain, the location of which was provided to them by yours truly, 'round 'bout five days ago now.\" Buckskin Jack stabs the still-hot brand into the dry earth next to him. \"Paid me in high quality whiskey for the information, too, which is how I ended up in that jail cell.\"\n\t\t\t\n              \"Not actually for horse thieving?\" you ask.\n\t\t\t\n              He grins. \"Not this time.\" He stands up and adjusts his hat. \"I'll give you the location of the house, seein' as how you got me clear of the jail. Now, is there anything else Old Buck can help you with?\"\n              *goto buckquestions\n            *else\n              \"Weren't you listening to what I already told you?\" Buckskin Jack asks irritably. \"I ain't going to spell it all out. You have to listen when Old Buck tells you a story the first time.\"\n              *goto buckquestions\n          #\"Girl named Victoria Frye's gone missing. Sixteen, well-bred if not well off. Any gossip?\"\n            *goto substory\n          #\"Someone's been causing a rancher named Frye's cattle to stampede. Heard rumors?\"\n            *set buckanswers +1\n            Buckskin Jack just laughs. \"That ain't even a question,\" he says. \"That banker Mason's had word out that he's hiring anyone who'll cause Frye a bit of trouble, so long as they take cash in return so it doesn't appear on his accounts. Half the outlaws in Colorado Territory have done a job or two for that fella. 'Course, word of an outlaw ain't much good against the word of a banker, and he does cover his tracks well.\"\n\t\t\t\n            \"I suppose you know this because he's hired you?\" Winslow says with disdain.\n\t\t\t\n            \"Me? Nah,\" Buckskin Jack says without taking offense. \"Man's a snake. Big picture fella. Willing to do things he shouldn't when he thinks it gets him closer to his ideal world. I say you can't build a house on a rotten foundation, but no one's bothered to ask me. But speaking of asking, did you want to know anything else?\"\n            *goto buckquestions\n          #\"What's the dynamic here at the Ute encampment?\"\n            *set buckanswers +1\n            \"Well, I don't know about a dynamic, but I sure as hell wouldn't want to live here,\" Buckskin Jack answers quickly. \"Not that I ain't thankful for the hospitality, but I'll be glad to hit the road soon—and I think most of this group will, too. Don't see 'em sticking around much after they find their boy. They're pressing luck as it is, staying this long. Ain't like at Denver City where they'll set up a ration line for 'em—not enough here to make the feds give 'em a temporary agency 'til they can force everyone back to those dried out plots of desert they call a reservation and tell folks to farm.\"\n\t\t\t\n            \"Yeah, it's tough all over,\" Winslow says without sympathy. \n\t\t\t\n            Buckskin Jack just ignores him. \"In particular, I think Walkara's 'bout ready to pop his cork. Won't take much for him to start spilling blood, and then it's all over for this band. The army will come down like a hammer. So you'll see Sowiet and Ammon thinking of different options. Ammon, well, he's thinking that maybe Chief Ouray has the right of it, talking to Grant out East. He'll turn 'good Indian' before long, I'd guess, and some white'll come by and pin a medal on him that says so. Sowiet, though, he's a thinker, and I'll bet on him trying something that ain't either of those options. That man would deal with a snake if he thought it wouldn't bite him in the end.\" Buckskin Jack shrugs. \"They always do though. Snakes. It's their nature. Now is there anything else Old Buck can help you with?\"\n            *goto buckquestions\n          *if (buckanswers > 1) #\"That's all I wanted to know.\"\n            \"Glad to help, partner,\" Buckskin Jack answers cheerfully.\n\t\t\t\n            Do you want to continue gathering information?\n            *goto investigate\n      *if (look) #I just want to take a look around.\n        *goto wander\n      *if (investigate > 1) #I've learned what I wanted to know.\n        You've got the lead you came for; all that's left now is to leave the encampment and follow up on it.\n        *goto raid\n  #\"Your move, Deputy.\"\n    *set deputy %+30\n    *set utes %-30\n    Winslow is the law here, and if he thinks a shootout is a good idea, you'll back him. Besides, your trigger finger is getting a little itchy.\n\t\n    *label draw\n    Rain looks at the two of you in horror. \"No! No need for that.\"\n\t\n    Walkara's face goes cold with anger. \"You would not make it back to Willow Creek alive,\" he promises.\n    *choice\n      #Three guns against two—with more guns to follow—aren't great odds. Better back down.\n        *set talkin %+10\n        *set deputy %-15\n        Before Winslow can make things worse, you apologize. \"Rain's right; there's no need for violence.\" You nudge your horse forward toward Walkara. \"A young girl went missing from Willow Creek, so you can understand if we're a little on edge.\"\n\n        For a moment, Walkara's angry expression hints at something like sadness. \"We also have someone missing,\" he says slowly. \"Perhaps we are also on edge.\"\n\t\t\n        \"Why don't you tell us about your problem, and we'll tell you about ours,\" you say, still hoping to talk everyone down. \"See if we can't help each other.\"\n        *page_break\n        *goto anchatalk\n      #I bet he's bluffing. I'll call.\n        *set gamblin %+10\n        \"Probably not,\" you say amicably, banking on his threat being a bluff. \"But you'd still be dead. Where would your people be then?\"\n        *label stillbedead\n        *if shootin > 60\n          Time slows as you watch Walkara consider his chances. His eyes flick to the deputy and then back to you, and though his expression doesn't change, you can tell when he reaches his decision.\n\t  \n          *label nowar\t  \n          \"I would not start a war today,\" he says. \"But you are not welcome here, and this insult will not be forgotten.\"\n\t  \n          Walkara wheels around on his horse and rides back into the encampment; the two other men follow behind him.\n\t  \n          \"Fantastic,\" Rain murmurs. \"Couldn't have gone better.\"\n\t  \n          \"Just have to show 'em who's boss,\" Winslow says with satisfaction.\n\t  \n          Rain looks at you with a glare. \"Who do you expect to get information from now?\"\n          *choice\n            #Isn't knowing who to talk to supposed to be Rain's job? She should explain our options.\n              Rain explains in a clipped voice that the three men who greeted you are the leaders of this band: Walkara, his brother Sowiet, and Ammon. \"Of the three, Sowiet is the most likely to deal cordially with outsiders,\" she says. \"Who do you want to talk to?\"\n              *label talkto\n              *choice\n                #Walkara.\n                  Rain laughs bitterly. \"I think you've burned that bridge. Try again.\"\n                  *goto talkto\n                #Sowiet.\n                  *goto leaders\n                #Ammon.\n                  *goto leaders\n            #I want to question the children.\n              *goto kids\n            #I just want to take a look around.\n              *goto wander\n        *else\n          Walkara takes a moment to consider your reputation before he smiles. \"Let's find out.\"\n\t  \n          The three Utes have a faster draw than you'd have imagined—at least two are faster than yours, because you take two hits as you're pulling your trigger. Winslow falls out of his saddle just moments before you hit the ground. You can't tell if any of the Utes got hit before you black out.\n\t  \n          You always suspected you'd die in a gunfight, and it seems you were right. Of course, Walkara's band just signed their own death warrants, as well—shooting a white deputy and his companion brings the United States Army down hard on them, and soon they're nothing more than a footnote in history. \n          *set dead true\n          *goto_scene ending\t\t\n      #I've got faith in my gun to get me through.\n        *set shootin %+10\n        \"Probably not,\" you admit, though you think you stand a good chance. \"But you'd still be dead. Where would your people be then?\"\n        *goto stillbedead\t\n\n*label kids\n*set investigate +1\n*set kids false\n*if (anchaclue)\n  If the leaders don't know where to find Ancha, they're probably missing some clues—and it's possible that the kids have picked up on something the grown-ups haven't noticed. \n\nYou see a group on the west side of the encampment, playing a ball game of some kind on a cleared field. The group, mostly girls, carries sticks, and they are racing up and down the field, hitting or kicking a skin ball and trying to reach the goals at either end of the field. You can't tell the teams apart, but the kids all seem to know their teammates.\n\nThere's a boy, probably about five and younger than the kids on the field, watching from the sidelines, following the game with an intense focus. When one of the girls hits the ball across the goal line, he cheers.\n\nYou hand Rain the reins of your horse and walk over. \"What're they playing?\" you ask.\n\n\"Shinny,\" he answers, then looks up at you warily, as if he's just realized that maybe he shouldn't be talking to you. But he can't seem to hold back his cheer. \"My sister's team just scored the first goal.\"\n\nThe teams separate, and you see them gathering at both sides of the center.\n*choice\n  #A break in the action is a great time to ask them questions. I interrupt the game.\n    *set talkin %+10\n    You mosey onto the field, and the kids look at you with a mixture of irritation and dismay.\n\t\n    You keep your voice calm and cheerful as you approach. \"Mind if I ask you a few questions before you get back to your game?\"\n    *if talkin > 70\n      Your tone has them intrigued—most Willow Creekers probably wouldn't bother to talk to them, let alone ask them questions. By their expressions, they all seem to understand English without trouble.\n\t  \n      One of the girls, who looks about twelve and is probably the oldest player on the field, steps forward. \"What do you want to know?\" she asks, and you can hear her suspicion in spite of the ready acceptance the other kids have shown.\n      *label kidquestions\n      *choice\n        *if (anchaclue) #\"You kids know a fella named Ancha?\"\n          *set kidchat +1\n          The children all nod their heads. \"He's the youngest Dog Soldier,\" one of the few boys on the field pipes up. And then they all start talking over each other.\n\t\t  \n          \"He can shoot really far.\"\n\t\t  \n          \"Bows and guns!\"\n\t\t  \n          \"He's really nice, too.\"\n\t\t  \n          \"Sometimes he plays shinny with us, even though it's mostly for girls.\"\n\n          \"But he's missing.\"\n\t\t  \n          \"Nobody knows where he went.\"\n\t\t  \n          \"I think he's helping the apple lady.\"\n\t\t  \n          \"No, he's on a secret mission for Walkara!\"\n\t\t  \n          \"I heard that the white men put him in jail.\"\n\t\t  \n          You try to stop the chaotic answers in search of the clue you think you heard. \"Who's the apple lady?\"\n\t\t  \n          In another bout of answers, you gather that the apple lady is a red-haired white woman—who sounds very much like Victoria Frye that the kids had spotted Ancha with a number of times, usually because they were sneaking after Ancha, a hero of theirs, when they didn't have chores. \n          *label mountain\n          One of the boys says that a few days ago, he followed them off toward Table Mountain, one of the lower peaks to the east. This is apparently news to the other kids, and they alternate between celebrating the boy for his skill and reprimanding him for not sharing earlier.\n  \n          Do you want to continue asking the children questions?\n          *goto kidquestions\n        *if (kidchat > 0) #I'm done asking questions.\n          Will you investigate further?\n          *goto investigate\n        *if (anchaclue=false) #\"I'm looking for a girl who's missing from Willow Creek.\"\n          *set kidchat +1\n          You start to describe Victoria Frye to the kids, and mostly, you get blank stares. They don't seem much concerned with white folks. It's not until you mention her red hair that one of the girls perks up.\n\t\t  \n          \"The apple lady?\" she asks. \"She's nice!\"\n\t\t  \n          As it turns out, the kids have spotted the apple lady, who sounds very much like Victoria Frye, spending time with Ancha, a young man in Walkara's band whom many of the kids consider a hero. He's a strong fighter, a good shot, and he spends time playing with the kids. Oftentimes, the kids sneak after Ancha to see what he's doing, and more than once, he's met with Victoria. Usually the kids sneak back off, but at least once, some of the kids surrounded her and asked her a bunch of questions—and she patiently answered all of them, then gave them candied apples. This was a big, memorable hit.\n          *goto mountain\n        #\"Where do y'all get your cows?\"\n          *set kidchat +1\n          The children answer in a flurry about the Dog Society, and how they go off and catch cattle, sometimes from behind fences—there are a couple of jokes about tricking the white folks, and some of the older kids tell the jokers to hush up—and sometimes from out in the wilderness. You try to direct your questions toward the stampedes at the Frye ranch, and the kids look baffled at why anyone would want to send the cattle running if they weren't going to catch them or kill them for food.\n\t\t  \n          Do you want to continue asking the children questions?\n          *goto kidquestions\n        #\"Have you ever met a man named Mason?\"\n          *set kidchat +1\n          *set utesmason true\n          They don't immediately know the name, but you start describing him—his thick mustache, his small glasses—and the kids start to chatter about Sowiet's friend. Apparently, Mason and some of his thugs have visited with Sowiet a few times, though the kids didn't bother to follow much of the discussion. \n\t\t  \n          Do you want to continue asking the children questions?\n          *goto kidquestions\n    *else\n      Your abrupt interruption of their game doesn't seem to have endeared you to any of them, and some of the kids run off, probably to tell their parents that you're bothering them. The other half toss the ball and go after it with their sticks, and you get the idea that if you stay in their way, you're going to get clubbed. You can take a hit from a ten year old with a stick, but it isn't going to get you any further on your case.\n\t  \n      The boy watching the game has stuck around, though. You shrug and settle down next to him again.\n\t  \n      \"They don't like it when you interrupt their game,\" he says, commiserating. \"Maybe I can help?\"\n      *goto five\n  #This kid seems like a font of information. I'll stick with asking him questions while he's distracted.\n    *set talkin %+10\n    The game starts back up, and the boy's eyes follow the ball with something like envy.\n\t\n    \"How come you're not playing?\" you ask.\n\t\n    He frowns but doesn't take his eyes off the game. \"I'm too little. They all run faster than me, and sometimes I get hit with the sticks, so my sister told me to wait 'til I'm bigger so she doesn't have to protect me.\"\n\t\n    Getting this kid talking is apparently not going to be a problem.\n    *label five\n    What do you want to ask him?\n    *choice\n      #I ask him if he's seen Victoria Frye.\n        *set kidchat +1\n        You describe Victoria, and watch as the puzzlement on his face changes to a smile. He actually glances up from the game to answer your question. \"The apple lady!\" he says cheerfully. \"That's what we call her. Because one time a bunch of us—we were following Ancha—we met her and she gave us some apples that had candy on them, and they were really good. Arapo says he followed her and Ancha out toward Table Mountain a few days ago, but he always brags about stuff like that and I don't know if I believe him.\"\n\t\t\n        Table Mountain is a mesa-topped peak to the east of Willow Creek. There's not much there to speak of, but it'd be a place to look.\n        *goto five\n      #I want to know where he thinks their cows come from.\n        *set kidchat +1\n        The boy has clear ideas of the heroism it takes to catch cows. His story—interrupted when one team makes a goal, and the kids all gather in the center again—involves times when the Dog Society has to trick villains in order to get the cows to come home with them, and you get the idea that he probably means ranchers, but in his head, they're closer to monsters hoarding, and possibly torturing, cattle until the Dog Society sets them free.\n        *goto five\n      #I describe Mason to find out if he's been here.\n        *set kidchat +1\n        *set utesmason true\n        It takes a minute of describing, due to the intense scuffle on the field keeping the boy distracted, but finally the boy says, \"Oh, Sowiet's friend.\" The kids have spotted Sowiet meeting with Mason outside of the encampment, but they weren't really concerned about what they were talking about, and the boy seems confused that you'd think it's important.\n        *goto five\n      #I'm done asking questions.\n        You leave the boy to watching the game.\n\t\t\n        How else would you like to investigate?\n        *goto investigate     \n  #I ask the kids to teach me how to play.\n    *set brawlin %+15\n    *if male\n      The children giggle, and in a flurry of conversation, all in good English, you pick up that this is a game mostly played by women. You shrug, and their amusement continues as they teach you how to play.\n      *goto rules\n    *else\n      The girls, particularly the older ones, look shocked that you don't already know how to play. You gather from their overlapping explanations, all in good English, that all women play Shinny. They're eager to correct this clear deficiency in your education and start to teach you how to play.\n      *label rules\n\t  \n      The rules seem simple enough. The object is to get the ball from the center of the field to the opposing team's end—and to keep the opposing team from crossing the goal line at your team's end. The ball can be hit with the stick or kicked. With that explanation, they assign you to a team, and you're off. You get the sneaky idea to flick the ball up and carry it on your stick, which gets you called a bad sport (though it is apparently not against the rules, just frowned on) until you drop it and keep playing.\n\t  \n      You're somewhere in the middle of the field when the ball crosses your team's goal line, which the opposing team considers a victory. Your teammates assure you that you'll do better next time. Then they start to pepper you with questions: What's your horse's name? How far can you shoot a target? Why don't you have any beadwork on your clothes? You answer their questions and have a chance to ask your own.\n      *goto kidquestions\n\n*label leaders\n*set investigate +1\n*set leaders false\nSowiet, Ammon, and Walkara are all together at the edge of the encampment along Willow Creek. The noise of the river covers their conversation as you approach, but as it's in the Ute language, anyway, you wouldn't have understood it. Walkara gives you a look as you approach, as though wondering why you're wasting time here instead of doing what you came to do and leaving.\n\n\"Just wanted to ask a few more questions,\" you say, and the three men begrudgingly make room for you to dismount and join their conversation.\n*label leadertalk\n*choice\n  #I ask them about their relationships with Mason and Frye.\n    *set leaderchat +1\n    You describe Mason to the three men, explaining that he's a person of interest in the investigation due to his relationship with the missing girl's father.\n    *if utesclear\n      You also say you believe he's been using thugs to impersonate the Utes when he's been causing stampedes on Frye's ranch.\n    *if utesmason\n      And you know that he's been in contact with the group here, probably to promote his ideas on progress.\n      *comment end_if\n\t  \n    After a moment, Sowiet nods. \"This is the man I have been telling you about,\" he says to the other two leaders, using English for your benefit. \"He wants to hire us to do some scouting work for him. He's particularly interested in information about the flow of Willow Creek, and I have expressed that we might be willing to work with him.\"\n\t\n    \"In exchange for what?\" Walker says flatly.\n\t\n    \"He owns much land,\" Sowiet says, though that's not really an answer.\n\t\n    \"And why would it be better to work with this man than to cooperate with the government, as Ouray recommends?\" Ammon asks. \"We have a voice in Washington through him. Surely men there will listen, and things here will improve.\"\n\t\n    Walkara snorts and ignores Ammon entirely. \"How would Mason's land be different from a reservation?\"\n\t\n    \"We would become citizens rather than slaves,\" Sowiet says sagely, but Walkara just shakes his head in disgust.\n\n    The three men have interacted sporadically with Frye for years, mostly in an antagonistic relationship. The best they can say for him is that he doesn't shoot at them when they visit his land. They very carefully do not say that they steal his cattle in front of Winslow, but by the way the Deputy rolls his eyes, he's certainly thinking about that.\n\t\n    It occurs to you that if they're looking for a patron to work with, Mason's not the only one they could be talking to. It may be that Frye has use of them—they certainly know how to treat cattle. \n\n    Do you ask them any further questions?\t\n    *goto leadertalk\n  #I really want to understand their positions on Willow Creek and the United States.\n    *set leaderchat +1\n    You start to ask something that involves the words \"settlers\" or \"United States\"—you're not sure just what it is that sets Walkara off—and he glares at you. \"The people who have come here and built their towns are invaders,\" he says, and there is no room for argument in his tone. \"We have long been an independent people, moving with our families, following leaders of our own choosing. We are not united behind a few names of men who would sign away everything that is ours to conquerors and thieves.\"\n\t\n    Ammon puts a gentle hand on Walkara's shoulder. \"When we cannot fight, words are our only weapons,\" he offers. Walkara shrugs off his hand.\n\t\n    \"I do not want to hear more about following Ouray,\" Walkara says sharply. \"He would give away everything until we have nothing left.\"\n\t\n    Ammon shakes his head. \"He is trying to make sure we have a voice. He wants us to have peace, to make room for us to live with the settlers without fear and hatred.\"\n\t\n    \"But it is not working,\" Sowiet interrupts. \"The government men do not care about us.\" He turns to Walkara. \"And we cannot fight. They are endless. There must be a third path, one that we could walk while staying Nuutsiu. I have been meeting with a man named Mason who could help us find this third path….\"\n    \n    You aren't a part of their leadership triune, but there's always a chance you could weigh in here and be listened to. Whom do you support?\n    *choice\n      #I agree with Walkara—they have to fight to keep their way of life.\n        *set utes %+10\n        *set deputy %-20\n        *set progress %-15\n        *if utes > 60\n          *set uteshostile +1\n          *set utesmasonally 0\n          *set utesfryeally 0\n          All three men are surprised by your position. \"You see?\" says Walkara. \"Even an outsider recognizes that, sometimes, fighting is the only way to survive.\"\n\t\t  \n          \"In fighting, we will die,\" Ammon says seriously, but when neither of the other leaders responds to him, he walks off in frustration. Sowiet glares at you before he, too, walks off.\n\t\t  \n          \"They will come around,\" says Walkara. \"I have many things to plan, and you have missing people to find.\"\n\t\t  \n          Where will you investigate next?\n          *goto investigate\n        *else\n          *label deceit\n          Walkara scoffs. \"Your word means nothing here,\" he says. \"Any agreement you give is filled with deceit. Ask your questions, but do not think to give us counsel.\"\n\t\t  \n          *goto leadertalk\n      #I agree with Ammon—someone in Washington will listen, and things will get better.\n        *if utes > 70\n          *set uteshostile -1\n          Walkara looks at you strangely. \"Do you truly believe this?\"\n\t\t  \n          \"I do,\" you say. \"Politicians can't always be trusted, but there are good folk in Washington, too. Someone'll work hard to see you get a fair shake. We all want peace out here.\"\n\t\t  \n          Walkara rubs his chin. \"I must think on this.\" He nods to the other two leaders, then walks back toward the center of the encampment. Sowiet sighs and follows him, but Ammon reaches for your hand and shakes it, the way Willow Creekers shake on a business deal.\n\t\t  \n          \"Thank you,\" he says. Then he, too, leaves.\n   \n          How else would you like to investigate?\n          *goto investigate\n        *else\n          Walkara scoffs. \"Of course you would say that,\" he says. \"Ask your questions, but do not think to give us counsel.\"\n\t\t  \n          *goto leadertalk\n      #I agree with Sowiet—maybe there are better options.\n        *set utes %+10\n        \"You're right that you can't trust the government,\" you say to Walkara. \"But Ammon's right when he says you can't fight forever. If Sowiet thinks he's got a better way…well, I say listen to the man.\"\n\t\t\n        Sowiet nods a thanks to you. \"We will need to make changes, but they will be our changes, our choices,\" he says.\n\t\t\n        *if utes > 70\n          Walkara considers you and Sowiet for a moment, then shakes his head. \"There is sense in what you say,\" he offers. \"But I will have to ponder it. And Sowiet must tell us more about these plans.\" \n          *choice\n            #I support Sowiet's alliance with Mason.\n              *set mason %+15\n              *set progress %+20\n              *set utesmasonally +1\n              *set utesfryeally -1\n              You add your recommendation to Sowiet's that Mason is the kind of person who could help the Utes have a real future. Sowiet smiles at you, and the three leaders put their heads together.\n\t\t\t  \n              *label somewhereelse\n              \"You should continue to investigate,\" Walkara says to you, and you hear the silent \"somewhere else\" in his tone.\n\t\t\t  \n              Where else do you go?\n              *goto investigate\n            #I suggest that they consider allying with Frye.\n              *set frye %+15\n              *set progress %+10\n              *set utesfryeally +1\n              *set utesmasonally -1\n              \"But you should know that Mason's a snake,\" you say. \"He'd throw an ally under the train if he thought he'd get ahead by it. You might reconsider how you feel about Mr. Frye, though. He's also a powerful man in Willow Creek. Could be he's a good man to have on your side.\"\n\t\t\t  \n              Sowiet looks at you consideringly, then at Walkara, who is rubbing his chin. \"Yes, we have much to discuss,\" Walkara says, and the three leaders put their heads together.\n\t\n              *goto somewhereelse\n            #I let them figure out their fate themselves.\n              *set progress %+10\n              The three leaders put their heads together.\n              *goto somewhereelse\t  \n        *else\n          *goto deceit\n      #It's none of my business.\n        *set greengage %-10\n        Do you ask them any further questions?\n        *goto leadertalk\n  *if (anchaclue) #I want to ask them more about Ancha.\n    *set leaderchat +1\n    They have little more to say about Ancha; all of them praise him for his skills and dedication, though Sowiet mentions that the young man had been moody for a few weeks, as though he were concerned about something, but Ancha never talked about his troubles. They also mention that Ancha enjoys spending time with the children, but doubt that's useful information.\n\t\n    What else would you like to ask?\n    *goto leadertalk\n  *if (leaderchat > 0) #I'm done talking to the leaders.\n    You excuse yourself from talking to these men and return to your investigation. Where do you go?\n    *goto investigate\n\n*label wander\n*set investigate +1\n*set look false\nYou wander around the encampment, weaving through the wickiups and taking in the work that people are doing: The kids are mostly playing, but some are running errands. Some of the women are working on beadwork while others are preparing hides, and many of the men are working with the cattle. The wickiups are largely undecorated, but there are hides hung from some of the doorways in decoration. You see several shapes and decorations, but the most prominent is the bear, which appears almost everwhere in the camp. You don't see any evidence of a red-haired white girl in the encampment.\n\n*if (anchaclue)\n  Rain leads you to the wickiup where Ancha lives, a small shelter to house a single young man without family. Rain explains that Ancha is the only one of their family to follow Walkara; the rest are living outside of Denver City where there's a makeshift agency set up for families refusing to move to the reservations. His wickiup has little in it—to one side of the small fire pit in the wickiup's center, there's a basket containing some old shotgun shells, a ball made of buckskin, and a shirt he might have gotten at the Willow Creek general store. On the other side of the fire pit are some blankets, and at one end of the blankets is a pair of cowboy boots, one of which looks like it's got a hole in the sole. A few tools are laid out, giving the appearance that Ancha intended to fix the boot. Rolled up in the other boot is a map on which the town of Willow Creek, the river, and Table Mountain off to the east are labeled. There are some specific markings on Table Mountain, but you can't read them, and neither can Rain.\n  *comment end_if\n  \n  *if investigatin > 65\n    You see some paper tucked under the blankets, and after you pull it out, you realize it's part of a newspaper article from the Denver Times a few weeks ago about a robbery in the mining town of Golden. The outlaws being accused of the crime are the Harry Bledsoe gang. They escaped, but the report says they're headed west. A second page from the Willow Creek Gazette from just a few days ago is an editorial complaining that outlaws have been spotted near Table Mountain, but the sheriff has done nothing to get rid of them.\n    *comment end_if\n\t\nYou don't find anything else of particular value.\n*goto investigate\n\n*label raid\nAs you're wrapping up your investigation and considering the best way to head out to Table Mountain, you see some cowboys approaching the encampment. Walkara, Sowiet, and Ammon are already on horseback, getting ready to go out and meet them. You, Rain, and Winslow mount up and head over as well. You recognize John Gordon among the cowboys, so the men must be from the Frye ranch.\n\n\"Mr. Walker,\" John Gordon calls out, tipping his hat to Walkara. \"Heard a rumor that you might have information about a young woman who's missing.\"\n\nSeems Gordon and the others picked up on some of the same rumors in town that you did. You start to head that direction, but out of the corner of your eye you see another rider heading to the back of the encampment.\n\nWhat do you do?\n*choice\n  #I'd better go interrupt Gordon and keep things from escalating….\n    You ride over quickly. \"We've got things under control, Gordon,\" you say. \"Deputy Winslow and I were just concluding our investigation here.\"\n\t\n    \"I dislike how everyone is accusing us of kidnapping,\" Walkara says darkly.\n\t\n    Just then, a scream breaks out from back in the encampment. Ammon wheels his horse and races back to the encampment; you realize a moment later that there are flames spouting from one of the farthest wickiups. \n\t\n    \"You have done this!\" Walkara shouts, raising his pistol at John Gordon. The cowboys all look as though they're going to draw.\n    *choice\n      #\"We don't have time for fighting! We've got to put out that fire!\"\n        *set talkin %+10\n        *if talkin > 70\n          Instantly, everyone is looking at you, and they know that your words are the truth.\n          *goto rideback\n        *else\n          Your tone isn't foreceful enough to cut through the tension between the men, and another moment ticks by.\n\t\t  \n          *goto secondrider\n      #I ride in front of Gordon to shield him from the bullet.\n        *set brawlin %+10\n        *set frye %+15\n        *if brawlin > 60\n          Your sudden movement startles Walkara, and instead of aiming at Gordon, he shoots into the sky. \n          *label cowboys\n          The cowboys almost certainly would have shot back had you not been in the way. It was a brash move, but you've kept people from killing each other—for the moment.\n\t\t  \n          *label secondrider\t\t  \n          \"There was another rider that went to that side of the camp,\" you say. \"I don't know who he was, but unless we get over there, we're not going to find out.\"\n\t\t  \n          *label rideback\n          Walkara and Sowiet ride back toward the fire.\n\n          *if frye > 65\n            After a moment, Gordon signals the cowboys to follow and lend a hand. It's hard, dirty work, and the dry fall weather doesn't help keep the fire from spreading from one wickiup to the next. Luckily, the river is close by, and with as many hands working to contain the fire as you have, you're able to put it out without anyone getting injured.\n\n            Any sign of the rider is long gone, but the help given to the Utes by Frye's men has gone a long way toward clearing them from suspicion. You suspect that it might also be the start of something else.\n            *set utesfryeally +1\n            *set uteshostile 0\n\t\t\t\n            *label cleanedup\n            It's a little while before everything is contained, and longer until you're cleaned up and ready to leave the encampment behind. You and Winslow send Rain back to Willow Creek and head east. \n            *goto headeast\n          *else\n            *set health %-15\n            *set utesfryeally -1\n            After a moment, Frye's men ride off, leaving you with the Utes to put out the fire. It's hard, dirty work, and the dry fall weather doesn't help keep the fire from spreading from one wickiup to the next. Luckily, the river is close by, and with as many hands working to contain the fire as you have, you're able to put it out with a few minor injuries to yourself and the Utes.\n\n            Any sign of the rider is long gone, and despite anything you say, Walkara is positive that Frye's men are responsible.\n\t\t\t\n            *goto cleanedup\n        *else\n          *set health %-15\n          Your sudden movement startles Walkara, and he swings his pistol at you. The shot zings past your arm, barely grazing the skin.\n          *goto cowboys\n      #This is really none of my business. Get the hell out of Dodge!\n        *goto ignore\n  #I'm concerned about the solo rider. I head that way.\n    Gordon's a polite man, and you managed to converse with Walkara without getting shot, so you're sure he can handle it. That other rider is more suspicious. You spur your horse into action, urging speed, ignoring whether the others have noticed you or not.\n\n    *if brawlin > 60\n      There, at the far edge of the encampment, you see a thug you recognize from Mason's house, lighting a match near the wickiup.\n      *choice\n        #I charge and tackle him.\n          You ride your horse toward him, and at the last second, you leap off it and onto the thug. \n          *if brawlin > 65\n            *set health %-10\n            The man is large, but, it seems, not quick on his feet. He collapses beneath you, and the two of you tumble around together, the match long forgotten as you try to pin him to the ground. It doesn't take long for your activity to attract a crowd, and thankfully, you're the better fighter, so soon, it's all over but the shouting.\n\t\t\t\n            *label thehell\t\t\t\n            \"${surname}, what the hell is going on here?\" Winslow demands.\n\n            \"One of Mason's men,\" you explain. \"Tried to set a fire.\"\n\t\t\t\n            Walkara's face takes on the appearance of stone, and John Gordon, who has trailed along behind, scratches his head under his hat. \"Why would he bother you folks?\" Gordon asks Walkara.\n\t\t\t\n            \"Maybe to frame Frye,\" Winslow muses.\n\t\t\t\n            \"Or to put us in a bad bargaining spot,\" Sowiet says reluctantly.\n            *set utesmasonally -1\n\t\t\t\n            Winslow delivers a swift kick to the thug's ribs, and John Gordon offers you a hand to help you up.\n            *if sweetheart = \"gordon\"\n              Then he pulls you to his side for a quick, almost unnoticeable hug. It warms you from your toes.\n              *comment end_if\n\n            \"You'll take him back to jail?\" Rain asks Winslow.\n\t\t\t\n            \"Can't arrest him for trying to set fire to buildings that aren't supposed to be here,\" Winslow says with a shrug. He levels his pistol at the thug. \"Go on now, get. If you're out of sight before I count to ten, I won't shoot.\"\n\t\t\t\n            The thug races to his horse and takes off. Winslow doesn't even bother to count. Instead, he turns to you and says, \"If you're done playing, we've got work to do.\"\n\n            After excusing yourself to Gordon and Walkara, you mount up. You and Winslow send Rain back to Willow Creek and head east. \n            *goto headeast\t\t\n          *else\n            *set health %-15\n            The man is large, and rather than collapsing as you land on top of him, he pushes you to the side so you tumble to the ground. In that move, though, his match was lost, and you leap at him again, determined to keep him from his task. He punches you in the stomach, winding you, and as people start to head toward the noise, he hurries back toward his horse. Despite your injuries, you persist, and tackle him from behind, sending him falling forward. As Winslow and the others arrive, the thug is kicking at you, and you're still holding on for dear life. \n            *label chamber\n            Winslow cocks the hammer on his revolver, aiming at the thug, and at the sound, the man goes still.\n\t\t\t\n            *goto thehell\n        #I draw, but try to talk him down.\n          You cock the hammer on your revolver, and the sound draws the thug's attention to you.\n\t\t  \n          \"I don't want to shoot you,\" you say calmly. \"But I can't let you start that fire.\"\n          *if talkin > 65\n            Slowly, the thug raises his hands, the cold matchstick falling from them.\n\t\t\t\n            \"You just kneel on the ground right there and keep your hands up,\" you order.\n\t\t\t\n            *label horses\n            From behind, you hear horses approaching, and you suspect the others have caught up to you.\n            *goto thehell\n          *else\n            Neither your gun nor your words are persuasive enough, and the thug lights the match. So you do what any reasonable gunslinger would do when ${pronounhis} threat was ignored: You shoot.\n            *goto shoot\n        #I draw and shoot.\n          *label shoot\n          You fire, aiming for his hand, because he might be of more use to you alive than dead.\n          *if shootin > 70\n            Your shot makes his general hand/arm area—you're not sure where it actually hits as the thug clutches his arm to his chest in protection. The match flutters to the ground, landing without a flame.\n            *goto horses\n          *else\n            But for all your careful aim, you miss. The bullet goes between the man and the wickiup, and the shot startles him backwards. He drops the match, and you decide rather than risking another misfire, you'll tackle him while he's off balance. He kicks to try to get away from you, and you take a heel to the head that will probably not look pretty in the morning as you hear horses approaching. \n\t\t\t  \n            *goto chamber\n    *else\n      As you round the far edge of the encampment, you see a thug you recognize from Mason's house setting one of the wickiups alight. It's too late to stop the fire from starting, and without some quick action, the dry fall the Colorado Territory has had this year could send it out of control.\n      *choice\n        #Yell \"fire!\" and go after the thug.\n          You shout but keep riding off after the thug.\n          *if brawlin > 50\n            *set health %-10\n            Soon, you're practically on top of him, and you leap from your horse to knock him off his. The fall jars you both, but hits him worse—he's out cold from the fall before you even throw a punch. You collect the two horses and load him up on the saddle of his mount before you head back.\n\t\t\t\n            Your shout was quick enough to get the attention of the nearest people, and by the time you make it back, it's largely been put out. The damage doesn't look too bad, either, though you've got an untrained eye for that sort of thing. As you approach, Winslow gives you a glare.\n\t\t\t\n            \"Who in tarnation is that?\" he demands.\n\t\t\t\n            \"One of Mason's thugs,\" you explain. \"He was busy starting that fire while Frye's cowboys were talking to Walkara.\"\n\t\t\t\n            Winslow takes one look at the thug, then smacks the horse on the rear and sends them riding away. \"Can't arrest him for arson when these buildings ain't even supposed to be here,\" he says. \"Now, if you're done playing, let's get back to work.\"\n\t\t\t\n            You and Winslow send Rain back to Willow Creek and head east. \n            *goto headeast\n          *else\n            But the thug has too much of a head start. You follow him until you can't deny that you won't catch up. By the time you make it back, the fire has largely been put out. The damage doesn't look too bad, so you must have called out early enough to get people gathered to stop it.\n\t\t\t\n            \"What the hell just happened?\" demands Winslow as you approach.\n\t\t\t\n            \"One of Mason's thugs set a fire,\" you explain. \"I tried to ride him down but he got away.\"\n\t\t\t\n            Winslow shrugs. \"Couldn't have arrested him anyway. It isn't arson if the building's not even supposed to be here,\" he says. \"Now, if you're done playing, let's get back to work.\"\n\t\t\t\n            You and Winslow send Rain back to Willow Creek and head east.\n            *goto headeast\n        #Focus on helping stop the fire.\n          You shout \"Fire!\" and ride to the river to start getting people organized enough to get water, then you ride back to where you left Gordon and Walkara.\n\t\t  \n          \"One of Mason's men set a fire in the encampment,\" you shout. \"We've got to put it out before it spreads!\"\n          *goto rideback\n        #This is none of my business. To Table Mountain!\n          *goto ignore\n  #This none of my business. To Table Mountain!\n    *label ignore\n    You're sure things will take care of themselves without your interfering. \n\n    You and Winslow send Rain back to Willow Creek and head east. You notice as you ride off that a fire is growing out of control at the Ute encampment. As dry as it's been, you suspect the Utes will need a lot of luck to bring it under control.\n\n    *label headeast\t\n    It'll take you a couple of hours to get to Table Mountain before you start looking around for where Victoria may have gotten to. It doesn't sound like that long—but if Winslow keeps grumbling, it'll feel a lot longer.\n\t\n    *finish Chapter Six: The Good, the Bad, and the Worse\n  ", "willowcreek": "*hide_reuse\n*temp teens false\n*temp collared false\n*temp event 0\n*temp landrecords false\n*temp uteclue false\n*temp later false\n*temp saloon true\n*temp shooting true\n*temp rainchat true\n*temp ameliachat true\n*temp riversidetext true\n*temp NotLandRecords true\n\nWillow Creek is more active in the evening than any other time of day—the miners, farm hands, and ranch hands all make their way into town to visit the saloons or relieve some stress with the doves at the Lamplight. Some of them even attend Bible Study, though that's not known to be a raucous group. How will you spend your evening?\n\n*label decisions\n*choice\n  *if (event \u003c 4)\n    *allow_reuse #There's some folks I'd like to talk to.\n      Who did you have in mind?\n      *choice\n        *if (saloon) #Elijah Hammond, gambler and Mason's investor.\n          *if (sweetheart=\"hammond\")\n            How else to spend the evening but in the arms of your sweetheart? And there's another reason.\n          He may have more information he can give you in a social setting than with the deputy in your company.\n          *goto saloon\n        *if (shooting) #John Gordon, cowboy and Frye's ranch hand.\n          *if (sweetheart=\"gordon\")\n            How else to spend the evening but in the arms of your sweetheart? And there's another reason.\n          He may have more information he can give you in a social setting than with the deputy in your company.\n          *goto targets\n        *if (rainchat) #Summer Rain, the soiled dove.\n          *if (sweetheart=\"rain\")\n            How else to spend the evening but in the arms of your sweetheart? And there's another reason.\n          Rain is bound to have heard gossip that people in more…respectable professions won't know about. Because she's half Ute, she may have picked up on some news from the Utes, as well.\n          *goto lamplight\n        *if (ameliachat) #Amelia Greengage.\n          *if (sweetheart=\"amelia\")\n            Amelia may not be aware of your feelings for her, but you always enjoy spending time in her company. Who knows? Tonight might be the night where you confess—and she accepts—your romantic intentions. But it's also just good for the case.\n          Amelia can always put a new perspective on situations that helps you see cases more clearly. Consulting her now that you've got some information may help you find a new lead.\n          *if riversidetext\n            *goto riverside\n          *else\n            *goto ameliaroom\n        *if (tessflee) #Tess Albertson.\n          You know that Tess has more information about Mason's plans than she's letting on—and if his plots involved kidnapping someone in the name of progress, you're sure she'd know. You might be able to get more information out of her without the deputy in tow.\n          *if riversidetext\n            *goto riverside\n          *else\n            *goto tessroom\n    *allow_reuse *if (saloon or (shooting or (rainchat or NotLandRecords))) #I've got some activities planned.\n      What did you have in mind?\n      *choice\n        *if (saloon) #I'll go to the saloon and play a few hands.\n          Nothing like gambling to take your mind off your worries—or create a few new ones. Besides, players talk over their cards. You may hear something that will give you a new lead in the case.\n          *goto saloon\n        *if (shooting) #I hear there's target shooting competitions at the edge of town.\n          You're always up for shooting some targets—especially if there's prize money to be won. Even if there isn't, you may hear some talk between shots that will give you a new lead.\n          *goto targets\n        *if (rainchat) #I'd like to visit the Lamplight. No one knows gossip like soiled doves.\n          One thing you've learned working detective jobs is that men bare their souls to two types: priests and prostitutes. Clergy—even the Protestant ones—aren't likely to share anything they've heard from their parishioners, but the doves are under no such moral requirements. For the right price, you can learn a lot of secrets other folk would like kept quiet.\n          *goto lamplight\n        #I'd like to look at land records for Willow Creek.\n          Town Hall is closed at this time of day, but you could head down to the sheriff's office and see if you can requisition a key. Or you could see if Amelia Greengage wants to tag along and bring her lockpicks with her—and if anyone's going to pick the locks on a government office, you'd rather they had the full weight of the Greengage Agency to get 'em out of trouble. Sure, it's illegal, but it'd save you the hassle of dealing with clerks in the morning.\n          *set NotLandRecords false\n          *choice\n            *if (rainchat) #I head to the sheriff's office. I'd rather do this the legal way.\n              *set lawless %-15\n              *set landrecords true\n              *goto sheriff\n            *if (ameliachat) #I ain't worried about the law, and talking to Amelia is a good idea anyway. I'll head to the Riverside.\n
