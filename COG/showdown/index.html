<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Showdown at Willow Creek — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "showdown", "title": "Showdown at Willow Creek", "scenes": {"bail": "*temp buck 50\n\nChapter One: Making Bail\n\nThe cell door closes with a clank that sounds like a verdict. The young deputy twirls the keys mockingly as he strolls back to the single desk in the Willow Creek jail.\n\n\"So,\" a voice says behind you, \"what're you in for?\"\n\nA man in the adjoining cell, reclined comfortably on what passes for a bed, looks at you from beneath the brim of his cowboy hat. He wears dungarees and a cotton shirt, but his soft leather vest and long braids mark him as one of the Utes currently making camp near town.\n\n*choice\n  #Ignore him. No good comes from talking to criminals.\n    *set lawless %-10\n    *set buck %-20\n    The irony of the thought is not lost on you. Of course, that must mean you are innocent.\n    *choice\n      #Of course I'm innocent! It's all a misunderstanding.\n        *set lawless %-10\n        Of course you are.\n        *goto doingtime\n      #Technically no. But there's a good reason!\n        There always is.\n        *goto doingtime\n      #I'm guilty. I just don't associate with riffraff.\n        *set lawless %+10\n        Ah, you're a higher class of criminal.\n        *goto doingtime\n  #Give him the stink eye.\n    *set buck %-30\n    It's none of his business anyway.\n    *goto doingtime\n  #Ask him for his story first.\n    *set buck %+40\n    The man tips the brim of his hat up a little further and gives you an unrepentant smile. \"Horse thievin',\" he says cheerfully.\n\t\n    *label horsethief\n    The Utes have a reputation—warranted or not—of being horse thieves, something that in most towns is a hanging offense. Your fellow prisoner could be pulling your leg. Or not. How do you feel about sharing a cell with him?\n    *choice\n      #Horse thieves should be hanged.\n        *set lawless %-10\n        People's lives depend on the well-being of their horses, after all. Can't let a crime like that go unpunished.\n        *goto doingtime\n      #If people can't hold onto what's theirs, a man's got a right to take it.\n        *set lawless %+15\n        *set rogers %-10\n        As important as horses are to the way of life out West, you'd think they'd protect them better. If they let a horse get stolen, they probably deserved it.\n        *goto doingtime\n      #Given what the federal government has taken from the Utes lately, it's only fair.\n        *set lawless %+10\n        *set utes %+15\n        Most of the Utes have been moved onto reservations in the last few years to keep them out of the way of the settlers. You've heard that the government's trying to get them to farm on land that's not fit for farming in order to put an end to their seasonal hunting. It's a bad business for the Utes.\n\n        After that, what's a horse or two?\n        *goto doingtime\n  #He looks like a kindred spirit. I tell him what happened.\n    *set buck %+50\t\n    You tell the man your story, and he immediately commiserates by explaining that he's a horse thief—and by his smile, he feels no guilt.\n\t\n    *goto horsethief\n\n*label doingtime\n\nSo, why are you here?\n*choice\n  #I was on a case….\n    *set investigatin %+60\n    *set brawlin %+30\n    *set profession \"detective\"\n    Life as a freelance detective has its ups and downs—sometimes when you least expect them. You knew when you took a case for the mayor's wife that it wasn't going to end well, but the money was good, and you hadn't had an assignment from the Greengage Agency, for whom you frequently work, in long enough that your cupboard was down to beans.\n\t\n    Of course, when the mayor of Willow Creek, Allen Gray, caught you following him to the Lamplight—Willow Creek's brothel—just as his wife suspected, he was quick to see that Sheriff Josiah Rogers was summoned to keep you out of his business.\n\t\n    How did you try to avoid arrest?\n    *choice\n      #Put on my winning-est smile and tried to talk my way out.\n        *set talkin %+40\n        *set lawless %-10\n        *set rogers %+10\n        You've always been known as a charmer, but with Gray staring Rogers down in the middle of the street, and the soiled doves of the Lamplight watching from their windows, the Sheriff was left with little choice but to arrest you for \"interferin' and generally makin' a nuisance.\"\n\t\t\n        You could tell he felt bad about it though.\n        *goto creek\n      #Threatened to draw—Rogers knows I'm quicker than he is.\n        *set shootin %+40\n        *set lawless %+20\n        *set rogers %-50\n        You may be a faster draw than Rogers, but damned if that man isn't faster than light whipping a handcuff around your pistol hand. Up close and personal, he'd beat you in a fight—something you'll remember from here on.\n\t\t\n        You're probably lucky he didn't do worse than throw you in the cell, considering.\n        *goto creek\n      #Put down some money with Rogers on the outcome of the news on Gray's wife.\n        *set gamblin %+40\n        *set rogers %+20\n        Rogers was happy to take your bet—he's a kindred spirit when it comes to gambling about gossip—but he arrested you anyway. Said you've got to stop \"interferin' and generally makin' a nuisance,\" which you took to mean he'd rather you didn't harass the man who pays his salary.\n        *goto creek\n  #I was interviewing Jesse the Kid for my next dime novel….\n    *set lawless %+10\n    *set talkin %+60\n    *set investigatin %+30\n    *set rogers %+10\n    *set profession \"writer\"\n    The notorious outlaw was the perfect subject for your next dime novel. You've made a decent living writing about life in the West and selling the—mostly fabricated—versions of everyday stories to a publisher back East. When you happened upon Jesse the Kid in a saloon a few nights ago, you couldn't wait to set up an interview, and you used your way with words to convince him to give it to you. You'd made the plan to meet him at one of his gang's hideouts just this morning.\n\t\n    Unfortunately, the federal marshals had to pick that moment to crash down on Jesse and his gang. The firefight that followed was astounding.\n\t\n    What did you do?\n    *choice\n      #When a man's shooting at me, I shoot back.\n        *set shootin %+40\n        *set lawless %+10\n        *set rogers %-20\n        Even when that man is a federal marshal. This was, perhaps, not your most self-preserving idea. Luckily, Josiah Rogers, the sheriff of Willow Creek, owed you a favor for a piece you wrote for the local paper on the importance of respecting local law enforcement. Irony is a specialty in your life. Rogers reluctantly took you into his custody, professing that you're a local and should come under his jurisdiction, rather than the marshal's. \n\t\t\n        Man probably saved you from hangin'. He no longer owes you one, and the debt has racked up in his favor.\n        *goto creek\n      #I dodged out of the firefight to get behind the marshals—and safety.\n        *set gamblin %+40\n        Running through a firefight is not the sanest nor safest course of action, ever, but you've always been a gambler with a high risk tolerance. You trusted your luck to get you through to the side of the law, and it did you well.\n        *goto marshals\n      #I plowed through the outlaws to get out of the line of fire and behind the marshals.\n        *set brawlin %+40\n        You've gotten into a tough physical scrape a time or two, and your skills came in handy. Had to punch Danny Hook-nose right in his honker to get through the crowd, but you made it.\n        *label marshals\n        \n        The marshals didn't think much of your explanation, but luckily, Josiah Rogers, the sheriff of Willow Creek, was keeping them company for the arrests. He owed you a favor for a piece you wrote for the local paper on the importance of respecting local law enforcement, and he was quick to take custody of you. He professed that you're a local and should come under his jurisdiction, rather than the marshals'. \n\t\t\n        Man probably saved you from hangin'. He no longer owes you one, and the debt has racked up in his favor.\n        *goto creek\n  #I was playing in a high-stakes card game….\n    *set gamblin %+60\n    *set shootin %+30\n    *set profession \"gambler\"\n    You were winning, too. Hand had three aces, and you knew the last one was still in the deck. How did you know?\n    *choice\n      #I just had a good feeling.\n        You are known for your intuition when it comes to the cards. Unfortunately, your luck was running a little too well, and one of your table mates accused you of cheating. How dare he!\n        *label cheatresponse\n\t\t\n        How did you respond?\n        *choice\n          #I reminded him of the seriousness of his charge.\n            *set talkin %+40\n            *set rogers %+10\n            Once you started discussing the legal repercussions for making such a charge without the evidence required to prove your claim—not to mention the smirch on the honor of the accuser should the case be dismissed—your foe backed down. He didn't need to know that you invented about half of the legal jargon you used. If your fellow table mates noticed, they didn't breathe a word.\n\t\t\t\n            Unfortunately, Willow Creek's own Sheriff Josiah Rogers heard the nonsense you were spouting and recommended you come with him for your own safety, telling you that sort of creative invention was likely to get you shot, and he was arresting you for causing him a headache.\n\t\t\t\n            He did let you keep your winnings, though.\n            *goto creek\n          #I mentioned something—true—in regards to his character.\n            *set investigatin %+40\n            *set lawless %+10\n            *set rogers %-10\n            You pick up information about things people oughtn't be doing now and again, and you keep close track of that information in case you need it in a situation just like this one. Your opponent shuts up immediately and sits down, knowing a hint at blackmail when he hears it.\n\t\t\t\n            Unfortunately, Willow Creek's own Sheriff Josiah Rogers recognizes the sound of blackmail, as well. Sitting just a few chairs over, having a quiet drink, he sidled up to you and recommended that you accompany him down to the jail house to have a little chat about being a good spirited player.\n\t\t\t\n            He did let you keep your winnings, though.\n            *goto creek\n          #I threw down a dusty leather glove in challenge.\n            *set brawlin %+40\n            *set rogers %-10\n            *set lawless %+10\n            Often, this sort of smirch on the honor of a gambler results in a shooting, but you thought you'd take it to fisticuffs first. Unfortunately, the rest of the saloon thought it would be great fun to join in, and suddenly, a terrible brawl broke out. Sheriff Josiah Rogers and his deputies had to be called in, and by the time they were done carting everyone out and dumping buckets of water over the hottest heads, the story had come out that you were to blame for the fight. Which didn't seem entirely fair.\n\t\t\t\n            You did snag your winnings before everything went to hell, though, so there's at least a little bright side.\n            *goto creek\n      #I was cheating.\n        *set lawless %+10\n        Cheating at cards? You do live a dangerous life. A person could get shot for that sort of thing.\n\t\t\n        Whether one of your opponents realized the truth or whether he was just getting bitter about your winnings, he stood right up at the table and accused you of cheating. How dare he!\n        *goto cheatresponse\n      #I'd seen how my opponents bet—with an ace they'd be in for more.\n        *set investigatin %+20\n        You have a reputation for luck, but some of your knack is pure skill—a good memory and some analytical smarts to help you out. Unfortunately, those who aren't as clever as you don't always take your wins kindly. This was one of those nights—one of your table mates accused you of cheating. How dare he!\n        *goto cheatresponse\n  #I was having a quiet drink….\n    *set brawlin %+60\n    *set talkin %+30\n    *set profession \"honest man\"\n    It always happens. You go to a saloon intending to have a quiet drink, and then someone says something about the War. And then someone says something else about the War that's unkind in regards to the first speaker's opinion. And then someone's fist comes into contact with someone else's jaw.\n\t\n    And you—well, you've never been one to step away once there's fists in the air. As usual, you wade into the thick of things, not particular as to the cause or the companions you might be bruising, because there's a life to a brawl that's all its own. At least, until Willow Creek's own Sheriff Josiah Rogers shows up with buckets of water to cool down the hottest heads.\n\t\n    You may have taken a swing at the sheriff himself, now that you think about it. But it's all just a friendly scuffle, right? When you came face to face with the sheriff, however, he didn't seem too friendly. What did you do?\n    *choice\n      #Threatened to draw. No man wants a brawl to become a shootout.\n        *set shootin %+40\n        *set rogers %-15\n        *set lawless %+20\n        While it's true that no man wants a brawl to become a shootout, sheriff least of all, it's also true that Rogers has a quicker draw than you do. You might be able to take him in a fist fight, but he'd have you in a gun fight, no doubt about it.\n\t\t\n        He reminded you of that fact as he slapped the handcuffs on your wrists.\n        *goto creek\n      #Offered him some of the juicy tidbits of information I've overheard lately.\n        *set investigatin %+40\n        *set rogers %+15\n        *set lawless %-15\n        You have a knack for picking up details in conversations that are useful to the sheriff, and he's usually inclined to overlook your injurious indiscretions so long as no one gets too hurt. This is not one of those times, however—he feels obliged to take you in, but at least offered you coffee while you're in jail.\n        *goto creek\n      #Laid a bet on whose wife would be most peeved by the brawl come morning.\n        *set gamblin %+40\n        *set rogers %+15\n        Rogers was happy to take your bet—he's a kindred spirit when it comes to gambling about gossip—but he arrested you anyway. He put down even odds on Widow Carlson making a visit to the jail house in the morning if he didn't clamp handcuffs on somebody, and you were his scapegoat for the evening. At least he's offered you coffee while you're in jail.\n        *goto creek\n  #I was in a showdown….\n    *set shootin %+60\n    *set gamblin %+30\n    *set lawless %+15\n    *set profession \"gunslinger\"\n    You're known around Willow Creek—and other places—for your speed on the draw and your skill on the trigger. Which means there's always some young buck or another trying to prove they're faster and better. This rarely ends well for them. And today was one of those typical cases.\n\t\n    Unfortunately, even when you can claim that shootin' another fella is self-defense, there's paperwork to be done, and most of it rests on Sheriff Josiah Rogers. Which means that he had to come and arrest you and make sure his deputies cleaned up the body of the poor gunslingers who couldn't match up to you.\n\t\n    How did you try to avoid arrest?\n    *choice\n      #Put on my winning-est smile and tried to talk my way out.\n        *set talkin %+40\n        *set lawless %-15\n        *set rogers %+15\n        Fact is, Rogers likes you well enough, even with the paperwork. But though he was happy to make chit chat, he was also just as happy to arrest you, just for the formality of it. It apparently makes his job easier if he actually sticks you in the cell for a bit.\n        *goto creek\n      #Slugged him in the jaw. He should have taken it as a mercy.\n        *set brawlin %+40\n        *set lawless %+15\n        *set rogers %-15\n        Considering the speed of your draw, the sheriff ought to have known that your fist hitting his face was a sign that you liked him well enough not to shoot. He didn't seem to take it kindly, though. And his deputies were right on you making sure those handcuffs were keeping your fingers away from your holster.\n        *goto creek\n      #Offered him some of the juicy tidbits of information I've overheard lately.\n        *set investigatin %+40\n        *set rogers %+15\n        *set lawless %-10\n        You have a knack for picking up details in conversations that are useful to the sheriff, which is why he's never been willing to put murder charges on you, despite the unfair advantage you've had over a few of your challengers. He still felt obliged to take you in, but at least offered you coffee while you're in jail.\n        *goto creek\n*label creek\n*page_break\nWillow Creek, Colorado Territory has been your home for a while now—long enough to get to know the locals and the local politics, at any rate. It's the fall of 1872, and the War Between the States is a thing of the past, though some folks still seem to live it. The Territory of Colorado had its share of sympathizers on either side, and opinions are harder to kill than soldiers.\n\nWhat did you do during the War?\n*choice\n  #I fought in the War, just like any man should have.\n    *set shootin %+25\n    *goto soldiers\n  #I disguised myself as a man to fight in the War.\n    *set shootin %+25\n    *set lawless %+5\n    *set male false\n    *set pronounhe \"she\"\n    *set pronounhis \"her\"\n    *set pronounhim \"her\"\n    *set titlemr \"Miss\"\n    *goto soldiers\n  #I am a man of diplomacy, not combat.\n    *set talkin %+25\n    *goto civilian\n  #I am a woman of diplomacy, not combat.\n    *set talkin %+25\n    *set male false\n    *set pronounhe \"she\"\n    *set pronounhis \"her\"\n    *set pronounhim \"her\"\n    *set titlemr \"Miss\"\n    *goto civilian\n\t\t\n*label soldiers\nOn which side did you fight?\n*choice\n  #I fought on the side of the Confederacy to preserve my family's plantation and way of life.\n    *set talkin %+20\n    *set mason %+10\n    *set war \"Confederate\"\n    Your background mingling with the upper classes taught you to navigate your way through society with diplomacy, though you also got handy with a rifle. After the War, there wasn't much left at home to keep you there, so you thought you'd try your luck out West—and here you are.\n    *if male\n      *goto name\n    *else\n      *goto girlname\n  #I fought on the side of the Union to support the abolition movement.\n    *set war \"Union\"\n    *set gamblin %+20\n    *set frye %+10\n    Your work with the abolition movement made you realize just how much luck can have an impact on one's birth—and one's freedom. While in the army, you trusted your luck as much as your skill to get you through. It did, and you ended up on the winning side. You'd put money on it going the same way again.\n    *if male\n      *goto name\n    *else\n      *goto girlname\n  #I worked as an Indian Scout for the Confederacy.\n    *set war \"Confederate\"\n    *set investigatin %+20\n    *set mason %+5\n    *set utes %+5\n    Confederate leadership made some pretty sweet offers when they proposed alliances with your people—but of course, after the Confederacy lost, all the treaties that looked so good on paper were dissolved by the federal government. Not that the treaties they wrote for themselves have held much water.\n\t  \n    Still, working as a scout has honed your tracking skills, which have been handy when you've done freelance work collecting information here in Willow Creek.\n\t\n    To make things easy on your army compatriots, you took on a name that sounded like theirs, and it stuck even after the War. It's also helped the residents of Willow Creek \"forget\" about your background and treat you like any other member of the community—most of the time, anyway—especially since you dress like everyone else in Willow Creek.\n    *if male\n      *goto name\n    *else\n      *goto girlname\n  #I served in the Union Army as a Buffalo Soldier.\n    *set war \"Union\"\n    *set brawlin %+20\n    *set frye %+5\n    *set greengage %+5\n    Being a member of the \"Negro Cavalry\" meant fighting alongside—but never really with—white soldiers. You dealt with the systematic prejudice inherent in the army's system, and it prepared you to deal with it further out West, where it continues to linger on. But while the school of hard knocks taught you to let stupid comments roll off your back, the most useful thing you've taken with you was the horse work you did in the cavalry. You've been able to apply those physical skills to plenty of work here in Willow Creek, and gain respect in the area, despite the attitude of most white settlers toward your race.\n    *if male\n      *goto name\n    *else\n      *goto girlname\n*label civilian\nWhat did you do during the War?\n*choice\n  #I came from China to work on the Transcontinental Railroad.\n    *set progress %+10\n    *set brawlin %+20\n    Despite the war going on, work continued on the railroad, which was completed in 1869. It's considered one of the greatest feats of American technology of the century—and maybe ever. It also put you through plenty of hard labor, which has given you confidence in your physical skills.\n\t\n    It has been difficult to gain acceptance among the dominantly white population, but in your years at Willow Creek, you've shown yourself to be competent enough at your work that most folks are willing to ignore your background these days.\n    *if male=(false)\n      And since they're willing to ignore your background, your gender hardly seems to matter, either.\n\t  \n    What is your name?\n    *choice\n      *if male\n        #Han Tao.\n          *set surname \"Han\"\n          *set firstname \"Tao\"\n          *set Name (surname & \" \")& firstname\n          *goto amelia\n        #Bai Li.\n          *set surname \"Bai\"\n          *set firstname \"Li\"\n          *set Name (surname & \" \")& firstname\n          *goto amelia\n        #Lu Jin.\n          *set surname \"Lu\"\n          *set firstname \"Jin\"\n          *set Name (surname & \" \")& firstname\n          *goto amelia\n        #I don't like any of these names.\n          What is your family name?\n          *input_text surname\n          Your given name?\n          *input_text firstname\n          *set Name (surname & \" \") & firstname\n          *goto amelia\n      *else\n        #Han Mei\n          *set surname \"Han\"\n          *set firstname \"Mei\"\n          *set Name (surname & \" \")& firstname\n          *goto amelia\n        #Bai Hailin\n          *set surname \"Bai\"\n          *set firstname \"Hailin\"\n          *set Name (surname & \" \")& firstname\n          *goto amelia\n        #Lu Jin\n          *set surname \"Lu\"\n          *set firstname \"Jin\"\n          *set Name (surname & \" \")& firstname\n          *goto amelia\n        #I don't like any of these names.\n          What is your family name?\n          *input_text surname\n          Your given name?\n          *input_text firstname\n          *set Name (surname & \" \") & firstname\n          *goto amelia\n  #I was a reporter.\n    *set investigatin %+20\n    You didn't want to fight—just document what you were sure, correctly, was a big moment in history. You've recorded, researched, and did some of your own information hunting, all skills that have served you well out here in the West.\t\n    *if male\n      *goto name\n    *else\n      *goto girlname\n  #I was a miner trying to make it rich.\n    *set gamblin %+20\n    Like many folks who moved West, you were in it for the cash. You pretty much ignored the whole war as well as you could in favor of paying attention to those shiny bits that sometimes turned up in your claims. Sometimes the ventures panned out, and sometimes they didn't, but you like to think you've won more than you've lost.\n    *if male\n      *goto name\n    *else\n      *goto girlname\n  #I was already working as a ranch hand.\n    *set shootin %+20\n    You've been out West long enough to know that finding steady work is as important as being able to shoot your way out of a dangerous situation. Working as a ranch hand gave you both a reliable income and a steady hand when it came to fending off beasts—or rustlers—from the cattle.\t\n    *if male\n      *goto name\n    *else\n      *goto girlname\n\t\t\n*label name\nWhat is your first name?\n*choice\n  #Zeke.\n    *set firstname \"Zeke\"\n    *goto surname\n  #Stephan.\n    *set firstname \"Stephan\"\n    *goto surname\n  #Clint.\n    *set firstname \"Clint\"\n    *goto surname\n  #I don't like any of these names.\n    What is your name?\n    *input_text firstname\n    *goto surname\n*label girlname\n*page_break\nAs a woman, you've faced prejudice as you've followed your own, nontraditional path. Thankfully, rules in the West are a bit more fluid than in the more restricted East. You've not always been taken seriously, but by now, you've established yourself in Willow Creek well enough that most of the locals have stopped giving you trouble.\n\nWhat is your first name?\n*choice\n  #Verity.\n    *set firstname \"Verity\"\n    *goto surname\n  #Jane.\n    *set firstname \"Jane\"\n    *goto surname\n  #Laura.\n    *set firstname \"Laura\"\n    *goto surname\n  #I don't like any of these names.\n    What is your name?\n    *input_text firstname\n    *goto surname\n*label surname\nWhat is your family name?\n*choice\n  #Cobb.\n    *set surname \"Cobb\"\n    *goto namefinish\n  #Wayne.\n    *set surname \"Wayne\"\n    *goto namefinish\n  #Johnson.\n    *set surname \"Johnson\"\n    *goto namefinish\n  #I don't like any of these names.\n    What is your last name?\n    *input_text surname\n    *goto namefinish\n\t\n*label namefinish\n*set Name (firstname & \" \")& surname\n\n*label amelia\nFirst thing in the morning, someone comes by to pay your bail.\n*if buck > 50 \n  The time has flown since your fellow prisoner is such good company—he keeps you entertained with stories you're half-sure aren't true about his various exploits as a horse thief and cattle rustler. You repay the favor in kind.\n  *comment end_if\n\nIt is something of a surprise when you see Amelia Greengage, head of the Denver City office of the Greengage Detective Agency, signing for your release. You've done work as a consultant for the Greengage Agency from time to time, but if anyone were going to pay your bail, you'd have expected it to be your sweetheart. Like with many of the other rules of the West, ideas about romance are a little more flexible out here than they are back East.\n\nWho are you seeing these days, anyway?\n*choice\n  #Elijah Hammond, an inveterate gambler.\n    *set sweetheart2 \"Elijah Hammond, Gambler\"\n    *set sweetheart \"hammond\"\n    *set sweetheart3 \"Elijah\"\n    *set mason %+10\n    Elijah is one of those men who has little respect for the rules of propriety, and that's just the way you like him. His carefree attitude about nearly everything gets him in trouble from time to time, but with a smile like that—and luck to match—he's managed to keep his head on his shoulders and avoided being shot thus far.\n    *goto case\n  #John Gordon, a cowboy.\n    *set frye %+10\n    *set sweetheart2 \"John Gordon, Cowboy\"\n    *set sweetheart \"gordon\"\n    *set sweetheart3 \"Gordon\"\n    There's a certain romance to being with a cowboy, especially one as attractive as John Gordon. A former slave, Gordon is making the best of his new life here in the Territory of Colorado, which includes his relationship with you.\n    *goto case\n  #Summer Rain, a soiled dove.\n    *set utes %+10\n    *set sweetheart2 \"Summer Rain, Soiled Dove\"\n    *set sweetheart \"rain\"\n    *set sweetheart3 \"Rain\"\n    *set sweethe \"she\"\n    *set sweethis \"her\"\n    *set sweethim \"her\"\n    Summer Rain entertains all sorts of sweethearts, but you like to think she's got a soft spot in her heart for you. It's likely true, since she never charges you for her affections. Half-Ute and the daughter of a dove herself, Rain keeps social with the Utes that still camp near Willow Creek during the summer season.\n    *goto case\n  #Actually, I have an unrequited love for Miss Greengage.\n    *set greengage %+10\n    *set sweetheart2 \"Amelia Greengage, Detective, unrequited\"\n    *set sweetheart \"amelia\"\n    *set sweetheart3 \"Amelia\"\n    *set sweethe \"she\"\n    *set sweethis \"her\"\n    *set sweethim \"her\"\n    Your heart thumps whenever Amelia comes in from Denver City to give you work, and you leap at any opportunity to show her what you can do. You're a little embarrassed to have put her in the situation of bailing you out of jail, but since it can't be helped, you bask in the stomach butterflies making you aware of her proximity.\n    *goto case\n  #Who needs a sweetheart? I've got my gun and my horse.\n    *set sweetheart2 \"My own self\"\n    *set sweethe \"she\"\n    *set sweethis \"her\"\n    *set sweethim \"her\"\n    You came out West to get some peace and revel in your independence, not to get entangled with some female or fella set on tying you down. So it's particularly nice of Amelia to have come to bail you out—much nicer than waiting for Sheriff Rogers to let you off, anyway.\n    *goto case\n\t\n*label case\n\nAs Sheriff Rogers finalizes your release, Amelia comes over to your cell. \"You've been busy without me, I see,\" she says, her prim accent seeming out of place both in the jail house in particular and out West in general.\n\n\"I get by,\" you say with a grin.\n\n\"Unrepentant sinner,\" she scolds, but you can tell from her smile that it doesn't bother her one bit to be bailing you out. \"I'll have you know I'll be docking your bail money from your payment. Assuming, of course, that you're interested in a job?\"\n*choice\n  #Of course!\n    *set greengage %+15\n    \"Your enthusiasm is greatly appreciated,\" she says, and despite her dry tone, you think she means it.\n    *goto details\n  #If I have to. I guess I'm in her debt.\n    \"Your enthusiasm is greatly appreciated,\" she says sarcastically.\n    *goto details\n  #I'll have to check my calendar….\n    Amelia's eyebrows raise straight up to her bonnet. \"I'll just have the sheriff leave off on his paperwork, then, shall I?\"\n    *choice\n      #It was a joke!\n        Amelia smirks. \"Ha, ha,\" she says, pronouncing each word so it's clear there's no real laughter in it.\n        *goto details\n      #A job's better than jail, I guess.\n        \"Your enthusiasm is greatly appreciated,\" she says sarcastically.\n        *goto details\n\t\t\n*label details\nAmelia describes the case: Victoria Frye, the sixteen-year-old daughter of local rancher Julian Frye, went missing three days ago. Sheriff Rogers is working on the case, but Frye's very concerned about his daughter's well-being, and he's hired the Agency to…consult on the case.\n\n\"You'll be working with Deputy Todd Winslow,\" Amelia explains.\n\n\"Someone has to keep an eye on you, or you're bound to set my town alight,\" Rogers calls from his desk.\n\n*if rogers > 50\n  \"That only happened the once,\" you protest, joking.\n  \n  \"Shut it, ${surname}, before I forget myself and keep you locked in there,\" Rogers shouts back, laughing.\n  \n*page_break\nThe first thing to do seems to be heading on out to the Frye ranch to investigate. \n\n*if buck > 60 \n  That, of course, leaves your fellow prisoner to contemplate his horse-thieving fate.\n  *choice\n    #We all have to face our own fates.\n      Maybe someone will pay his bail, and maybe he'll hang, but at least you'll have made his time in the Willow Creek jail a little more entertaining.\n\t\n      The deputies unlock your cell, and…\n      *goto winslowmeet\n    #Maybe I could pay his bail….\n      \"Amelia, I don't suppose you could put another loan against my pay,\" you say tentatively.\n\t\n      Amelia looks into your cell, where the horse thief grins at her, tipping his hat. She turns to you, her expression showing that she's contemplating your sanity.\n\t\n      \"He's the good sort of criminal, I swear,\" you say.\n      *if talkin > 60\n        *set utes %+20\n        *set buckfree true\n        *set money %-20\n\t\t\n        Amelia sighs. \"All right, an advance against your pay for your partner in crime.\"\n\n        When the deputies unlock your cell, they glower at both you and the horse thief, but they release you anyway. Your companion is out of the jail house before you've even cleared the cell door.\n        *goto winslowmeet\n      *else\n        *set utes %+10\n        Amelia shakes her head. \"I'm afraid I can't risk the Agency's reputation on releasing the wrong type of criminal into the wild.\" She smirks. \"I'm going to be in enough trouble for paying your bail, I suspect.\"\n\t  \n        You look back at your fellow prisoner with regret, but he doesn't seem too concerned.\n        *goto winslowmeet\n    #I'll have a word with Sheriff Rogers.\n      *set lawless %-10\n      *if rogers > 50\n        You don't think the sheriff is terribly pleased with letting a horse thief off easy—not when it's a hanging offense. But he trusts your opinion, for some bizarre reason, and he says he'll do his best.\n        *set buckfree true\n        *goto winslowmeet\n      *else\n        Rogers isn't inclined to give you the time of day, let alone do you any favors. You'll just have to hope that there's someone else around to help out your friend.\n        *goto winslowmeet\n\n*label winslowmeet  \nAmelia turns you over to Deputy Winslow, informing you that she'll be staying at the Riverside Hotel working on a different project should you need to discuss the case.\n\nTodd Winslow is a reedy man with a cruel smile who likes his fists a bit more than a lawman should, in your opinion. You've never gotten along with him, but you'll make the best of it for the case. Based on his condescending expression, you're not sure he'll do the same for you.\n\n\"Out to Frye's then?\" he asks, though you know he doesn't actually mean for you to have a say in this first move.\n\n\"Lead on,\" you answer, and as soon as you're both mounted up, you make your way out to the Frye Ranch.\n\n*finish Chapter Two: Meanwhile, Back at the Ranch\n", "choicescript_description": "Saddle up and defend the town of Willow Creek from nefarious outlaws and city slickers! It all starts when a rancher's daughter goes missing, and it ends at the showdown at Willow Creek, where greed, lust, science and Mother Nature will face off at high noon.\n\nShowdown at Willow Creek is an interactive western mystery novel where your choices control the story. The game is entirely text-based--without graphics or sound effects--but powered by the vast, unstoppable power of your imagination.\n\nGamble, seduce, brawl, or shoot your way through Willow Creek, where gunslingers make the laws, and everybody has secrets. Will you romance the gambler or the soiled dove (or both)? Will you side with the scientists bringing electricity to the Old West, or with a tribe of native American Utes? Will you unravel the conspiracy that threatens to tear the town apart, or will you light the fuse to blow it all sky high?\n", "choicescript_stats": "*label display\n*stat_chart\n  percent Brawlin Brawlin'\n  percent Gamblin Gamblin'\n  percent Shootin Shootin'\n  percent talkin Sweet talkin' \n  percent Investigatin Investigatin'\n  \n  opposed_pair lawless\n    Lawless\n    Strait & narra\n  opposed_pair progress\n    Power of science\n    Back in my day\n*comment end\n\nCashey money: ${CashText}\n*line_break\nHealth: ${HealthText}\n*line_break\nName: ${Name}\n*line_break\nSweetheart: ${Sweetheart2}\n  \nYour relationships:\n*stat_chart\n  percent deputy Deputy Winslow\n  percent frye Willow Creek & the Fryes\n  percent mason Mason\n  percent utes Walkara & the Utes\n", "choicescript_upgrade": "*check_purchase full\n*if not(choice_purchased_full)\n  [b]Chapters 4 through 8[/b]\n  \n  Purchase Chapters 4 through 8 now!\n  \n  *purchase full $4.99 thanks\n  *finish\n*else\n  *label thanks\n  Thank you for purchasing Chapters 4 through 8!\n", "couple": "*temp disarmed false\n*temp banditsdisarmed false\n\nThere's a well-known Table Mountain in the mining town of Golden, farther east in the Colorado Territory where the land is still flatter. The Table Mountain near Willow Creek is a taller peak and not nearly as clean a mesa as that landmark, and it's no easy climb. There are no clear trails here, and there's plenty of loose rock that skitters out from under your horse's hooves. You meander through stands of ponderosa pine, but most of the time you're in the shorter brush, among the cliffrose and sumac. You don't see much evidence of people up here, and the mountain's big enough that you could wander for a while before you get your bearings.\n\n*choice\n  #I look for signs of tracks—human or horse—and follow them.\n    You get down off your horse and lead him by the reins, crouching low to the ground every few feet to look for any sign of passage. Winslow grumbles that this approach is going to take you hours.\n    *if investigatin > 60\n      *set deputy %+10\n      Luckily, your tracking skills prove Winslow entirely wrong. The sun hasn't passed too far overhead by the time you've located a pair of tracks—one set of cowboy boots worn by a fairly tall man, and a much smaller pair of prints made by a low-heeled woman's boot.\n\t\n      \"They went this-a-way,\" you drawl. Winslow growls, but then tips his hat to you with something like respect.\n\t\n      Taking the horses along the trail is a challenge—the two young people managed some climbs on foot that your horses can't handle—but once you've spotted the trail, you don't have trouble picking it up again.\n      *label lair\t\n      After another hour or so, you spot some smoke rising in the distance and see a small cabin nestled in a clump of buckthorn trees. Standing outside the cabin lighting a cigarette is a man you don't recognize, but you hear Winslow hiss.\n\t\n      \"Harry Bledsoe,\" he mutters. \"We got his wanted poster up on the wall in the jailhouse. We ought to head right in there, guns blazing.\"\n\n      How do you want to approach?\n      *choice\n        #I agree with Winslow. Yippee ki yi yay!\n          *label kiyiyay\n          *set deputy %+20\n          *set shootin %+10\n          The buckthorn trees aren't tall, but they do provide plenty of cover. You and Winslow hitch your horses to some low branches and creep toward the house behind the shield of trees. From your relatively safe position, you and Winslow both prepare to shoot.\n\t\t\n          \"Harry Bledsoe, you're under arrest!\" Winslow calls out. \"You can come peaceably, or we can shoot you where you stand.\"\n\t\t\n          Bledsoe steps into the doorway of the cabin, giving himself partial cover as he calls out, \"We got a civilian up here you might not want to put holes in, lawman!\"\n          *choice\n            #If we shoot him down, he won't be in the way of our getting to the civilian….\n              *label shootout\n              *set shootin %+10\n              You fire. The bullet ricochets off of the door frame, and Bledsoe tucks himself further into the small cover it provides. Winslow fires, and his shot goes even wider.\n\t\t\t\n              You see a shotgun barrel pointing out from the cabin's window, and two shots—one from the shotgun and one from Bledsoe—thump into the trees you're using for cover.\n              *choice\n                #Maybe there's still time to talk them down….\n                  \"Those were warning shots, Bledsoe!\" you yell. \"We could do this all day! You want to take this chance to surrender?\"\n\n                  You hear some muttered curses, but your tough words seem to have the desired effect. \"All right, lawmen, we're layin' 'em down.\" You watch as Bledsoe lowers his revolver to the ground and kicks it in your direction, then extracts the shotgun from the window. \"There's more weapons inside, but I can't rightly hand those over,\" he shouts.\n\t\t\t\t  \n                  \"We'll take these as a sign of good faith,\" Winslow says, starting out from your cover.\n                  *fake_choice\n                    #Bledsoe's the honest type of bandit. If he says his guns are down, they're down.\n                    #I don't trust that bandit one bit. They'll shoot as soon as we clear the cover.\n                    #Best time to shoot a man is when he doesn't expect it. I fire at Bledsoe again.\n                  Three things happen almost at the same moment. Winslow steps into Bledsoe's clear view, Bledsoe draws with the intent to fire on the deputy, and you shoot Bledsoe.\n\t\t\t\t\t  \n                  *goto bledsoeshot\n                #I shoot his gun out of his hand. The question is, do I feel lucky? Well, do I?\n                  It's an almost impossible shot. But you're feeling lucky.\n                  *if gamblin > 65\n                    And your luck is good. The gun skitters out of hand and he looks at you in shock.\n\t\t\t\t  \n                    *goto vic2\n                  *else\n                    And your luck just isn't quite right. On the upside, you hit a larger target….\n                    *goto bledsoeshot\n                #No time for fancy shootin'. Aim to kill.\n                  One less notorious bandit in the world can only be a good thing.\n\t\t\t\t\n                  *label bledsoeshot\n                  *if shootin > 65\n                    *set bledsoedead true\n                    Red blossoms from Bledsoe's chest, and the bandit stumbles backward against the cabin door. You hear a scream from inside the cabin, and the door bursts open. A red-headed young woman stands over Bledsoe as his corpse tumbles into the room. She utters a very unladylike curse, then levels a glare at Winslow. \"You killed him!\" she says. \"You owe me a bandit!\"\n\t\t\t\t  \n                    \"Actually, I killed him, Miss Frye,\" you say, stepping partially out from your cover, keeping your gun trained on the window where the second shooter was moments ago. \"And I believe you've got some explaining to do.\"\n\t\t\t\t  \n                    Victoria Frye sighs, and if she hadn't already shown her callous response to the outlaw's death, you'd be surprised by her appearance of ruthless lack of concern. \"Mr. Peterson,\" she calls inside the cabin, \"could you please move Mr. Bledsoe's corpse? Don't bother shooting at the lawmen; apparently they have no qualms about shooting to kill. You either, Mr. Blackburn.\"\n\t\t\t\t\t\n                    She looks back at you and shakes her head. \"Come inside, won't you?\"\n                    *goto inside\n                  *else\n                    You hit Bledsoe square in the leg, and he curses, loudly.\t\t\t\t\n                    *goto vic2\n            #Time to call a truce…for now.\n              \"We'll stand down,\" you call. \"But we want to talk to that civilian.\"\n              *label disarmed\n\t\t\t\n              \"That sounds like good civilized folk,\" Bledsoe says, and you get the sense that he's laughing at you. \"You toss down your guns and head over here with your hands up.\"\n\t\t\t\n              Winslow looks mortified. \"I ain't givin' up my gun.\"\n              *choice\n                #\"Don't worry, Deputy—I'll sweet talk him into letting us keep 'em.\"\n                  *set talkin %+10\n                  \"From what I've heard, Harry Bledsoe is a gentleman among thieves,\" you begin. \"Fella like that wouldn't be so threatened by a pair of law-abiding folk that he'd make them lose their weapons out here in the wilderness. Can you trust our word not to shoot, Bledsoe?\"\n\t\t\t\t\n                  Winslow snorts. But then perhaps he noticed that you phrased that just ambiguously enough that you didn't really promise anything.\n\t\t\t\t\n                  *if talkin > 60\n                    Bledsoe, on the other hand, doesn't seem to have noticed the room you left for error. \"I can't object to such pretty persuasion,\" he says cheerfullly.\n                    *goto victoria\n                  *else\n                    *label trust\n                    *set disarmed true\n                    \"'Fraid I don't know you well enough to trust you with anything,\" he says. \"Arms down where I can see 'em.\"\n\t\t\t\t  \n                    Winslow grumbles. \"Well now we ain't got much choice.\" You both empty the cartridges from your revolvers and toss them out where Bledsoe can see them.\n                    *goto gunaway\n                #\"I'll bluff. He'll believe we left 'em with the horses.\"\n                  *set gamblin %+10\n                  \"We're putting our weapons in our saddlebags now, Bledsoe,\" you call out. You fill your voice with the same earnestness you put into your expression at the poker table when you've only got a pair of twos, but you've gone all in.\n\t\t\t\t\n                  *if gamblin > 70\n                    Bledsoe seems to buy it. \"Fair enough. Can't blame a man for wanting to know where his gun is,\" he says.\n                    *goto victoria\n                  *else\n                    Either Bledsoe is a very good poker player, or he's paranoid.\n                    *goto trust\t\t\t\t\n                #\"What, you only have one gun?\"\n                  *set shootin %+10\n                  You've been out West long enough to know that a man's only as good as his guns—and that he ought to always have more than one, and enough ammo to keep both of 'em loaded. You don't like to give one of them up, but since you can secret the other one away—out of sight but where you can still draw quickly if you need to—well, that's a sacrifice you're willing to make.\n\t\t\t\t\n                  For now.\n\t\t\t\t\n                  You swing out the cylinder and empty out the cartridges before you toss your gun onto the ground ahead of you where Bledsoe can see it. After a few moments, Winslow does the same. You can't tell if he's still armed or not—which, you figure, is the point.\n\n                  *label gunaway\n                  \"All right, Bledsoe,\" you call back. \"We'd appreciate it if you'd put your gun away, too. We'll all talk like those good civilized folk you mentioned.\"\n\t\t\t\t\n                  *label victoria\n                  Bledsoe holsters his revolver and, as you both come out of the woods, saunters toward you. \"You have me at a disadvantage,\" he says, without the slightest hint of sarcasm. \"Who do I have the pleasure of meeting?\"\n\t\t\t\t\n                  \"I'm ${surname} and this is Winslow,\" you say. \"We're here lookin' for Victoria Frye.\"\n\t\t\t\t\n                  *label vic2\t\t\t\t\n                  A young red-headed woman pokes her head out of the cabin door. \"I suppose they may as well come inside, Mr. Bledsoe,\" she says. \"If they're here, it can't be long until someone else realizes where I've gone; perhaps we can persuade them to give us the time we need.\"\n\t\t\t\t\n                  \"Fat chance of that,\" Winslow mutters.\n                  *label inside\n                  *page_break\n                  Inside the small cabin is a small table, Victoria, and three men: two who you suspect are members of Bledsoe's gang, and a third, broad-shouldered Ute man wearing cowboy clothes who hovers near Victoria protectively.\n\t\t\t\t\n                  \"${titlemr} ${surname}, Deputy Winslow, may I introduce you to Ancha,\" she gestures to the Ute behind her, \"Mr. Peterson,\" she nods to one of the outlaws, a freckle-faced man with hair nearly as red as Victoria's, \"and Mr. Blackburn,\" she points to the other outlaw, a swarthy man wearing a pair of circular glasses. \n                  *if bledsoedead = false\n                    \"And of course you already made Mr. Bledsoe's acquaintence.\"\n\t\t\t\t\n                  \"Pleasure,\" you say, dryly. Victoria's pretense of being a hostess in some high-brow parlor set against the backdrop of an outlaw cabin in the wilderness is disorienting. The outlaws themselves seem slightly in awe of her. \"Would you like to tell us what's going on here, Miss Frye?\"\n\t\t\t\t\n                  \"Where do I begin?\" she muses.\n                  *choice\n                    #\"Let's start with what you're doing up here with a pack of outlaws.\"\n                      *if bledsoedead=false\n                        \"No offense intended, of course,\" you say to Bledsoe.\n\t\t\t \t\n                        \"Of course,\" Bledsoe responds.\n\n                      Victoria sighs. \"The fact is, I'm only one woman, and a young one at that. My word is considered\"—she ticks the adjectives off on her fingers—\"fanciful, hyberbolic, hysterical, or, on good days, simply overly imaginative. When I discovered what Gilbert Mason is planning for Willow Creek, and how it will destroy the town, I knew I had to get proof before I could go to the authorities. Which meant going a bit outside the law.\"\n\t\t\t\t\t\n                      \"I don't follow,\" says Winslow.\n\n                      Victoria laughs. \"Well, I certainly don't know how to rob a train!\"\n\t\t\t\t\t\n                      \"Rob a train?\" you and Winslow echo incredulously, thinking in unison for the first time in your acquaintance.\n                      *label paperwork\n                      *page_break\n                      \"Let me start from the beginning,\" Victoria says. \"Gilbert Mason has been pressuring my father to sell his land, but we didn't know why, aside from their personal animosity. I started looking into the land records to see whether Mason was buying up other properties, and he has been—all of them downriver of Willow Creek. I started talking to Ancha about what Mason was doing with his people, and it began to sound like what Mason is actually after is creating a dam that will drown out the town.\" She looks flabberghasted that someone would do such a thing. \"All for some silly science project!\"\n\t\t\t\t\t\n                      \"He has been asking my people to provide scouts along the river,\" Ancha adds. \"Looking for stable banks, areas that would be easy to ford, that sort of thing. Victoria asked for my help in approaching some outside resources after we discovered that Mason would be receiving paperwork from investors in the East via tomorrow morning's train.\"\n\t\t\t\t\t\n                      Victoria begins to look excited. \"With that paperwork, we'd have concrete proof of what Mason was planning. We'd be sure to get the town to stop him from flooding them out!\"\n\t\t\t\t\t\n                      \"And just how did you discover all of this?\" Winslow demands.\n\t\t\t\t\t\n                      Victoria turns to you. \"You see why I need proof? The law won't listen without it. But outlaws…\" she gestures to the rest of the company. \"Those papers will certainly be worth a reward. We just need one more day, and we'll have our proof. Will you help us?\"\n                      *label victoriaqs\n                      *choice\n                        *hide_reuse #\"Victoria, why do you think there will be a reward?\"\n                          Victoria shrugs. \"Aside from saving the town, which will surely be worth something? The paperwork will also contain a list of Mason's investors, along with scientific sketches from that lady inventor he has cooped up in his mansion. I'm sure someone would pay good money for those details.\"\n                          *goto victoriaqs\n                        *hide_reuse #\"Wouldn't Mason's own lands get flooded out with the town?\"\n                          The girl shakes her head, her red curls bouncing against her shoulders. \"After the railroad bought out Mason's land, everything he purchased was uphill, farther away from the river. Even his mansion is on the outskirts of where I suspect the floodplain will be.\"\n                          *goto victoriaqs\n                        *hide_reuse #\"Surely this is just a misunderstanding. Mason is working toward Willow Creek's future, not its destruction!\"\n                          *set progress %+10\n                          Victoria just gives you a look that shows she can't believe how you've been duped by Mason. You know you're not going to win an argument here.\n                          *goto victoriaqs\n                        *hide_reuse #\"So you and Ancha just have a business relationship?\"\n                          Victoria and Ancha look at each other quickly, and then both glance away. There could be something there if you kindled it….\n                          *choice\n                            #I don't really care about romance.\n                              Back to your questions, then.\n                              *goto victoriaqs\n                            #Her father would never approve. I encourage her to walk a more traditional path.\n                              \"That's how you should keep it,\" you say gently. \"You've both got enough trouble without inviting any further complications.\"\n\t\t\t\t\t\t\t\n                              Victoria nods firmly, as though you've just given her sage advice.\n                              *goto victoriaqs\n                            #A romance between Victoria and Ancha could mean an alliance between the Utes and Frye….\n                              \"I think there's more between you,\" you say, encouraging them both with your tone. \"If you do succeed in taking down Mason, the friendship—and more—you two share with each other could open other doors. Don't deny your feelings for each other—especially when today may be all you have.\"\n\t\t\t\t\t\t\t\n                              The two glance at each other again, and you see their eyes get all moony. Yes, your work here is done.\n                              *set utesfryeally +1\n                              *set uteshostile 0\n                              *goto victoriaqs\n                        #\"Even if you're right, this is the wrong way to do it, Victoria. Let's get you home and talk to your father.\"\n                          Victoria has a derringer pointed at you before you even realize she's drawn it. On second glance, you see Ancha's got his own revolver trained on Winslow. \"I'm sorry you feel that way,\" she says cooly. \"I will do what is necessary to save Willow Creek, no matter who is standing in my way. We are leaving.\"\n\t\t\t\t\t\t\n                          Winslow, surprisingly, puts his hands up with no protest. \"Far be it from us to get in your way, Miss Frye,\" he says.\n\t\t\t\t\t\t\n                          Victoria, Ancha, and the outlaws leave, keeping their weapons trained on you the entire time. After a moment, you stand in the doorway and watch them ride off.\n                          *fake_choice\n                            #\"We have to go after them!\"\n                            #\"We'll let them get a little way out and I'll track them. We'll catch up.\"\n                            #\"Maybe this is best after all….\"\n                          *label traitor\n\n                          \"I don't know about you,\" Winslow says from behind you, \"but I think I've finally figured out my ticket to fame and fortune. So long, partner.\"\n                          *if deputy > 30\n                            *if deputy > 50\n                              *set health %-15\n                              You feel the butt of a pistol strike you on the back of the head and have an instant to realize you're being betrayed before you pass out stone cold on the floor.\n\t\t\t\t\t\t\t\n                              *if disarmed\n                                The thought does flit through your head as you fall—where did he get that gun?\n\t\t\t\t\t\t\t  \n                              *if health \u003c 20\n                                *label dead\n\t\t\t\t\t\t\t  \n                                Though you'd never have guessed it would end this way, the deputy's betrayal is what tipped you over from living the rest of your life into spending eternity elsewhere. As you drift off into the ether, you wonder vaguely whether Willow Creek will be flooded out, or whether the town will keep on going without you.\n                                *goto_scene ending\n                              *else\t\n                                *label health\n                                *if health > 69\n                                  *set HealthText \"You know this is going to hurt when you come to\"\n                                  *label health2\n                                  ${HealthText}, but there's not a damn thing you can do about it right now.\n                                  *gosub delay\n                                  *finish Chapter Seven: Racin' the Rails\n                                *elseif health > 39\n                                  *set HealthText \"As bad as it hurts now, you know you're in for a world of pain when you come to\"\n                                  *goto health2\n                                *else\n                                  *set HealthText \"You feel bad enough as you black out that you ain't sure you're going to come to\"\n                                  *goto health2\n                            *else\n                              *set health %-30\n                              You feel the butt of a pistol strike you on the back of the head and have an instant to realize you're being betrayed before you start to fall into unconsciousness. You register the sound of a shot being fired and feel a sharp sting in your leg before you pass out stone cold on the floor.\n\t\t\t\t\t\t\t\n                              *if disarmed\n                                Before you lose consciousness, you do have a moment to wonder—where did he get that gun?\n\t\t\t\t\t\t\t\n                              *if health \u003c 20\n                                *goto dead\n                              *else\n                                *goto health\n                          *else\n                            *set health %-60\n                            And that's when your partner shoots you in the back. Literally. You hear the shot and you feel the sting of the bullet going through your back and out your front before you fall forward on your face. You're still conscious as Winslow steps over you toward your horses, but you don't have the capacity to move and shoot him back.\n\t\t\t\t\t\t\t\n                            *if disarmed\n                              You do take a moment to wonder…where did he get that gun?\n\t\t\t\t\t\t\t\n                            Surviving this would take a miracle.\n                            *if health \u003c 20\n                              And a miracle is not what the universe has in store for you.\n\t\t\t\t\t\t\t  \n                              *goto dead\n                            *else\n                              And maybe that's just what the universe has in store for you.\n\t\t\t\t\t\t\t  \n                              *goto health\n                        #\"I'm convinced. You've got twenty-four hours to get home, Miss Frye.\"\n                          Victoria shoots you a smile that could melt a snowball. \"I knew you'd be on our side. I just knew it.\" She looks around the cabin. \"We need to get our things together and head out. Mind giving us some time on the road before you leave? Just so you're not tempted to give us any help that might incriminate you.\"\n\t\t\t\t\t\t\n                          There's probably more to it than what she's saying, but you figure it's a fair enough request. After they're done packing up their things, Victoria, Ancha, and the outlaws head out, mounting their horses and riding off into the sunset. To your surprise, Winslow does nothing to stop them.\n\t\t\t\t\t\t\n                          You stand in the doorway and watch them go. \"I think this is for the best,\" you tell the deputy.\n                          *goto traitor\n                    #\"This have anything to do with what's going on between Mr. Mason and your father?\"\n                      *goto paperwork\n                    #\"On second thought, I don't really care. Let's just get you home.\"\n                      \"Just hear me out,\" Victoria says, her hands in front of her as though to push your insistance away.\n                      *goto paperwork\n            #I call his bluff and ask him to produce the civilian or we'll shoot anyway.\n              *set gamblin %+10\n              *if gamblin > 50\n                Bledsoe looks at you for a moment, then calls out, \"Miss Frye? There's some people here to see you.\"\n\t\t\t  \n                *goto vic2\n              *else\n                *set health %-10\n                Bledsoe doesn't wait to give you the chance to shoot him first—he fires, and the sharp bits of rock that ricochet off the ground next to you burn as they hit your skin. You take a moment to recover before you start shooting back.\n                *goto shootout\n        #I've got a white handkerchief somewhere. Let's see if we can't just have a chat.\n          *label handkerchief\n          *set talkin %+10\n          *set deputy %-10\n          You hoist a hankerchief on a stick and raise it out in front of the cover. \"Bledsoe,\" you holler out, and Bledsoe turns on his heel and darts into the cover of the door frame. He's got a gun drawn before he spots your white flag.\n\t\t\n          \"We just want to talk, Bledsoe!\" you yell. \"We're right peaceable.\"\n\t\t\n          *goto disarmed\n        #I bet he's not too observant. I sneak up closer.\n          *set gamblin %+10\n          The buckthorn trees here aren't that tall, and your horses probably won't be too hard to spot, but you're willing to take that risk to get a little closer.\n          *if gamblin > 65\n            And as it turns out, luck is with you. Bledsoe takes a long drag on his cigarette as you and Winslow creep around to the side of the cabin. You edge closer, listening to see if you can hear voices inside.\n\t\t  \n            \"You sure this is going to make us all rich?\" a male voice asks gruffly.\n\t\t  \n            \"Positive,\" says the voice of a young woman. \"And you'll be able to take pride in knowing you've saved an entire town.\"\n\t\t  \n            There are dark chuckles. \"Can't say I'm much concerned about that, Miss,\" another male voice says.\n\n            \"Must be two of Bledsoe's men,\" Winslow mutters. \"And our missing Miss Frye. No shootin' into the cabin.\" He says that last part with severe disapointment.\n            *choice\n              #I'll make a grab for Bledsoe and use him as a human shield to greet his men.\n                *set brawlin %+10\n                You sneak around to the far side of the house so you can come up behind Bledsoe before he knows what's hit him. You glance around, watching him stare off into the distance…and notice your horses. He steps away from the door to get a better look, and you dash out to grab him from behind.\n                *if brawlin > 65\n                  You've got one arm wrapped around his throat and your gun pointed at his temple before he even realizes you're there. He struggles for a bare second before he feels that cool steel muzzle pressed up against his head.\n\t\t\t\t\n                  \"I reckon you're under arrest,\" you say to him calmly. \"Drop your gun, and we'll go on in so you can introduce us to your men.\"\n\t\t\t\t\n                  Just then, the door opens, and Victoria Frye steps out. \"Oh!\" she breathes. But her composure returns almost instantly. \"I don't suppose you'd be willing to unhand Mr. Bledsoe, as I have need of him tomorrow morning?\"\n\t\t\t\t\n                  \"I wouldn't bet on it,\" says Winslow. But you loosen your grip on Bledsoe's neck enough so that he won't pass out on you just yet.\n\t\t\t\t\n                  Victoria sighs. \"Well, I suppose you should come in then, and we'll discuss what happens next.\"\n                  *goto inside\n                *else\n                  *set health %-10\n                  Unfortunately, Bledsoe has a better eye than you anticipated. He dodges out of the way of your charge, sending you straight back into the buckthorn trees while he recovers the door frame for cover. Winslow darts after you, taking cover among the short trees just as Bledsoe starts shooting. A stray bullet richochets off the ground and sends sharp bits of rock shooting up into your face. You take a moment to recover before you start shooting back.\n                  *goto shootout\n              #We could always talk like civilized folk.\n                *goto handkerchief\n              #I say we shoot Bledsoe and wait for the chance to take out his men, then haul that girl back home.\n                It sounds like Victoria Frye's already up to her ears in more trouble than she'll be able to get out of if you don't interrupt things now. The cover is better back where you left your horses, so you sneak back that direction.\n                *goto kiyiyay\n          *else\n          \n            *set health %-10\n            Unfortunately, Bledsoe has a better eye than you anticipated. He shoots, ducking into the cover of the door frame, before you even leave the cover of the buckthorn trees. A stray bullet richochets off the ground and sends sharp bits of rock shooting up into your face. You take a moment to recover before you start shooting back.\n            *goto shootout\n    *else\n      *set health %-10\n      And, in fact, he's right. Your tracking skills just aren't up to the challenge, and the sagebrush and mountain lilac don't make it any easier. You're covered with brambles, and one skid down a loose rock slope scrapes up both your arms. But it also puts you eye level with a pair of tracks—one set of cowboy boots worn by a fairly tall man, and a smaller pair of women's heeled boots.\n\t\n      From there, following the tracks is a bit of a challenge, as the two climbed places your horses can't, but now that you've finally spotted the trail, you manage to pick it back up.\n      *goto lair\n  #I trust that my luck will get us where we need to go.\n    It isn't as though you have any place else to be, and you don't think that Victoria is going to be in any more danger in a few hours than she is right now. You're sure your luck will speed you along in the right direction.\n    *if gamblin > 60\n      And truly, it doesn't take you long to figure out where you're going.\n      *goto lair\n    *else\n      *set health %-10\n      But it's a good thing you're not in a rush. You wander about aimlessly, with Winslow grumbling the whole time. He's sure you're taking him in circles, and maybe you are—you're letting your gut guide you and not paying much attention to the details. Eventually, you stumble into some tracks, a pair of women's heeled boots and a pair of cowboy boots, that point you in the right direction.\n      *goto lair\n  #Make them come to us: I fire into the air and make some noise.\n    Your shot startles a man who clearly looks like a bandit out of some cover. He scrambles for his horse and starts off at a gallop—a difficult pace to match in this terrain. You and Winslow gallop behind him as closely
