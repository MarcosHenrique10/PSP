<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dawn of the Sol Empire — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "dawnofsolempire", "title": "Dawn of the Sol Empire", "scenes": {"chapter1": "[b]Chapter 1: Gunboat Diplomacy[/b]\n\nWeeks later, I had reached the edges of our star system along with my personal fleet of starships. I was the only human on this journey — the fleet could operate perfectly without any crew. Besides, it might prove necessary to monopolize certain pieces of information, and that would only be possible if I was here alone.\n\n\nMore importantly, the probe sent by the Sol Empire was almost upon us. It had decelerated to the point of becoming nearly motionless. It should be here any moment now.\n\n\nJust as I was thinking that, it appeared in front of our fleet. It was indeed a small unarmed probe, and it had even stopped moving. Even so, it appeared ominous in these circumstances. Although it was no threat on its own, it was still the representative of the strongest power in the galaxy.\n\n\nNow what? It only took a moment until we received a message.\n\n*page_break\n\n\"You have encountered the 5th Fleet of the Sol Empire. Await further instructions.\"\n\n\nThe probe was close enough that its messages were transmitted almost in real time. Not long after the first message, a second one arrived.\n\n\n\"You have been classified as subhumans. Diplomatic protocol for communicating with people of the Empire does not apply. Your level of compliance will determine your fate. First. State your name and level of authority among the subhumans occupying this system.\"\n\n\nSubhumans? Their impression of us was far worse than I had imagined. It was frankly insulting. \n\n\nNevertheless, this probe was our only decent source of information. It could practically simulate a direct discussion with the Sol Empire, especially if this artificial intelligence could decide our fate independently. This might be the best opportunity we would ever get to talk our way out of this mess. What would be the best course of action?\n\n*choice\n    #Ignore the insult\n        The strong do what they can, and the weak suffer what they must. Pride was something only the strongest could afford. Since the Sol Empire was strong and we were weak, it made no sense to pick a fight with them over something that wasn't crucial to our survival.\n        \n        \n        \"My name is ${name} and I'm the First Minister of our colony. If possible, I wish to avert a conflict between us and the great Sol Empire.\"\n        \n        \n        My message was swiftly transmitted, and it didn't take long to receive a response either.\n        \n        \n        \"Level of authority is sufficient. Our policy on subhumans will be explained.\"\n        \n        *goto after_insult_choice\n    #Criticize the Sol Empire\n        *set sol -1\n        There was a limit to what was acceptable say — even coming from the Sol Empire. It felt like the possibility of a peaceful solution was already collapsing since they barely considered us humans. Was there even much to lose to by at least attempting to maintain our dignity?\n        \n        \n        \"My name is ${name} and I'm the First Minister of our colony. I must point out that we are humans, same as the people of the Sol Empire. In some ways, we might even be more advanced. At the very least, we should be treated according to standard diplomatic protocol.\"\n        \n        \n        This time, the probe was silent for a slightly longer period, but it didn't take too long for the answer to come.\n        \n        \n        \"Level of authority is sufficient. Our policy on subhumans is unalterable. Subverting it is punishable by death. Subhumans are not fully responsible for their actions. You have only been given a warning.\"\n        \n        \n        I gritted my teeth. Perhaps there would be better chances later. For the time being, the highest priority was still to gather more information.\n        \n        *goto after_insult_choice\n\n*label after_insult_choice\n\n*page_break\n\nAfter some time, the probe started transmitting messages again.\n\n\n\"The Sol Empire was founded to rule our galaxy. But humans were short-lived. Unintelligent. Weak. Unfit for space travel. A better humanity was needed. Ultimately the result was satisfactory. A new humanity was born. Now vast amounts of starships are being produced and sent in every direction. Earth will rule supreme.\"\n\n\n\"Subhuman colonies will face one of several fates. The worst fate is to be purged. The best fate is to retain limited autonomy and lives of unlimited luxury for important cooperative assets. Complete sterilization of subhumans and destruction of reproductive technology in the colony are non-negotiable. Abandoning independent foreign and security policy is non-negotiable.\"\n\n\n\"The fate of your colony is determined by several factors. Resisting or undermining the Sol Empire's advance is the worst offense of all. Disrespecting the authority of the Sol Empire or military cooperation with other colonies is equally offensive. On the other hand. Non-resistance and obedience will be rewarded. Direct contributions to the Sol Empire's advance will be even more rewarded. Military contribution to invade other nearby colonies along with our fleet will be most rewarded.\"\n\n*page_break\n\nAfter reading the latest messages from the probe, it became clear that this was indeed an existential crisis — not just for our colony, but for every colony out there! The Sol Empire seemed to judge itself superior enough to easily crush every colony surrounding it. Not only that, but it was attacking in multiple directions at the same time.\n\n\nThere would certainly be no hope for us if they were attacking us with everything they had. However, space warfare was about numbers more than anything else. Any starship could easily be destroyed by a single direct hit. If their superior numbers were actually severely limited by their strategy of many simultaneous fronts, there might yet be a sliver of hope. Not to mention that the defending side had the huge advantage of being able to produce more ships during the time it took for the attacker to arrive.\n\n\nStill, we were currently vastly weaker compared to the Sol Empire. It was impossible to say if we stood any chance to survive a war at all. \n\n\nWas surrendering truly the only pragmatic choice? Even if it practically meant giving our colony over to the Sol Empire and going extinct? A short-lived period of autonomy was the best-case scenario if we surrendered. The worst-case scenario was total annihilation if we fought back and lost. But if we fought, there was still a chance to survive in the long term — no matter how small.\n\n\nI couldn't make a final decision yet. It was necessary to gather more information and opinions first. Various preparations needed to be made back at the colony as well.\n\n*page_break\n\n\"We will consider your proposal for cooperation carefully. I do not have the authority to decide alone, right here and now, but I will consult with the people of my colony on how to proceed.\"\n\n\nThis was a lie. I could technically make a decision here and now, although it might not be formally effective immediately without a cabinet meeting. However, what I needed to do now was to buy time, and that could only be conveniently achieved by making a valid excuse.\n\n\n\"There is no problem. Our fleet will continue their approach as planned. Non-resistance is vastly more important than words. That will be proven soon enough.\"\n\n\nThat was a huge relief to know.\n\n\n\"However. We have detected several probes that have been stationed between your star system and the borders of the Sol Empire. These probes have been constantly scanning our ships. It is not a major issue if that is all. But. Disabling them will be a sign that you have no intention to resist. What will you do?\"\n\n\nJust as I had been relieved, I could feel a headache coming again. What to do indeed? Those early warning probes that first alerted us to their invasion were no longer strategically crucial, but it would be a show of weakness and somewhat inconvenience our military planning to disable them now. On the other hand, it wasn't hard to understand that this was a test to see if we would likely be planning to resist or not. Perhaps it was one of the factors in their judgment of how to treat us.\n\n*choice\n    #Disable the remote early warning probes\n        *set sol +1\n        *set military -5\n        Deciding this on my own would perhaps not please the Minister of Defense, but it was clearly something the probe wanted to see happening immediately. Considering the rather limited loss to our ability to follow their incoming ships, it was likely worth it to make them less hostile to us for the time being.\n        \n        \n        I ordered my fleet to broadcast the signal to shut down all the early warning probes. It would take some time to reach them, but there was no way to cancel the signal anymore.\n        \n        \n        \"It's done. I hope this serves as a sign of our good faith toward the Sol Empire.\"\n        \n        \n        The probe was silent for an unusually long time. Finally it sent another message.\n        \n        \n        \"It will be confirmed. If true. Your position will improve.\"\n        \n        *goto after_disable_choice\n    #Leave them active\n        *set sol -1\n        It was too risky to disable them now. What if there was a secret reason for the Sol Empire to want them disabled? What if they might be surprisingly useful in driving out the invading fleet?\n        \n        \n        \"I'm sorry, but I'll have to negotiate with the Minister of Defense before making such a decision. I'm unable to disable them alone.\"\n        \n        \n        This was again a lie. I could certainly disable them if I wanted to. However, the probe had no way to know that for sure.\n        \n        \n        \"Affirmative. Your intent to cooperate can be estimated in the coming months. Avoid hostile actions to be spared from annihilation.\"\n        \n        *goto after_disable_choice\n\n*label after_disable_choice\n\n*page_break\n\nThe probe appeared to be satisfied enough for now. There were no further messages for a while.\n\n\nSuddenly, it started moving again. This time it was in the opposite direction from Teocheon. It appeared to be leaving our star system for good.\n\n\n\"Mission accomplished. No further negotiation is necessary. We will follow your actions closely from now on.\"\n\n\nIt seemed to be done with our discussion. As I was thinking about what to do next, something alarming happened.\n\n*page_break\n\nOnce the probe had reached a certain distance from us, it suddenly started scanning our star system. It seemed especially focused on our colony itself as well as our main fleet that was orbiting the planet.\n\n\nIt wasn't simply a messenger - it was also a scout!\n\n\nWhat to do about it? Every moment it continued to scan meant more time for the Sol Empire to find something that could be used against us!\n\n\nThe safest option would be to simply destroy it. That would certainly be seen as a hostile action, though. Another option could be to sabotage its scanning operation by sending disrupting signals from our fleet. It wouldn't seem nearly as hostile, but it could still annoy them, and might not completely prevent the scanning. One option would also be just letting it finish the scanning uninterrupted. That would possibly please the Sol Empire, but it could jeopardize our security as well.\n\n*choice\n    #Destroy the probe\n        *set sol -3\n        I reluctantly ordered my fleet to act.\n        \n        \n        All of the ships immediately launched their laser weapons at the probe. It only took a few seconds until the probe exploded into tiny pieces under the barrage of countless beams of light that covered the area where the probe once used to exist.\n        \n        \n        I could only stare at the aftermath and ponder how the Sol Empire might react to what happened here.\n        \n        *goto after_probe_leaving_choice\n    #Discreetly sabotage the scanning attempt\n        *set military -5\n        *set sol -1\n        This was a compromise solution that shouldn't really endanger the chances of either fighting the Sol Empire or submitting to them if needed.\n        \n        \n        As I was pondering the implications, the stealthy electronic warfare I had ordered to be executed had begun. Vast amounts of distracting signals and false information were broadcast toward the probe. With this maneuver, most of what the probe managed to scan about our star system should be rendered useless.\n        \n        \n        I could only hope that was the case.\n        \n        *goto after_probe_leaving_choice\n    #Do nothing\n        *set military -15\n        Perhaps I had doomed us to be defeated in war more easily, but it was too dangerous to anger the Sol Empire by harassing one of their probes right now. At least that's what I told myself.\n        \n        \n        As the probe slowly accelerated to exit our star system and finished its scans, I ordered all records of what had just happened to be destroyed.\n        \n        *goto after_probe_leaving_choice\n\n*label after_probe_leaving_choice\n\n*page_break\n\nHours later, I was already heading back to Teocheon at full speed.\n\n\nThe critical meeting with the Sol Empire's digital representative was over, but much more remained to be done. This was only the first step in my daunting task of finding a solution for us to survive this calamity one way or another.\n\n\nThe next step would have to be hosting a cabinet meeting to determine our path forward.\n\n\n[b]Chapter 1 End[/b]\n\n*finish", "chapter2": "[b]Chapter 2: Preparing for the Inevitable[/b]\n\nAt long last I had returned to Teocheon. My home planet, the place where I had been born and raised, was already clearly visible to my personal fleet. Orbiting Teocheon was a vastly larger fleet that was intended to be the last line of defend against anyone or anything — such as asteroids or relativistic kill vehicles - that threatened to destroy our home.\n\n\nUnfortunately, against the Sol Empire, it was still a lacking force. There were approximately 4 million starships approaching Teocheon that we had detected, and they were likely superior ships compared to ours. On the other hand, our defense forces consisted of only around 300 000 ships at the moment.\n\n\nThe only good news was that it would take years for them to reach us, and some of them would only arrive much later. We still had time to make many changes before possibly having to fight all of those ships.\n\n*page_break\n\nIt only took a moment until I had once again entered the atmosphere of Teocheon. From there began a long descent back to the surface.\n\n\nAs my ship was descending, I glanced at the planet. It was mostly a barren wilderness. The main exception was the huge city directly below me as well as smaller hubs intended for mining and agriculture around the planet.\n\n\nThe most interesting part of the planet was easily the colony city itself. It was absolutely massive considering the low amount of people living there. The population numbered in the hundreds of thousands, yet the city sprawled farther than one could visually grasp in every direction. Almost all citizens of Teocheon lived in this city and had vast amounts of land for themselves.\n\n*page_break\n\nThis was all possible thanks to extremely advanced automation. Almost everything in our colony was done by artificial intelligence and robots. The main exceptions were fields like science — fields where creative solutions were required.\n\n\nHowever, not all of our people were able or willing to serve our colony in this way. Mass automation brought with it so much wealth and freedom that there wasn't much to do for the average citizen. Many of them had simply become bored with reality and delved ever deeper into more stimulating virtual realities. There they could realistically simulate living their fantasies such as having families or waging wars — all kinds of concepts that were obsolete in their own lives.\n\n\nWar was finally approaching us after so many centuries, but many of our people wouldn't even realize it.\n\n*page_break\n\nI snapped out of my thoughts as my personal vessel finally landed in front of the colony HQ building.\n\n\nI immediately walked inside without looking back. This was my home turf, and the one place where escape from reality was impossible. \n\n*page_break\n\nSoon I had arrived at the meeting room where my cabinet was already waiting for me.\n\n\nIt was not a large room, but the most impressive part was its location — deep underground, safe from any threats that might face the surface of our planet. This was where our colony could be led from no matter the situation.\n\n\nPresent in the room were four people: the Ministers of Defense, Industry, Science and Finance. As First Minister, I led the colony theoretically depending on their approval. However, they had become a more and more divided group in recent years, giving me more power at their expense. Especially the invasion of the Sol Empire had divided them into two equally powerful camps, neither of which could limit my decisions alone.\n\n\nHovering behind them was a robotic representative of the artificial intelligence that operated most of the activity within our colony. It was simply named Operational Intelligence System (OIS). It was never absent from important meetings since it practically made more decisions about our colony than everyone else combined. Even though I had the last say on most issues and there were several restrictions on the AI, it was still a vastly influential decision-maker, especially regarding personnel appointments, reproduction planning and logistics.\n\n*page_break\n\n\"All ministers are present. The meeting can now begin. The topic is the Sol Empire.\"\n\n\nOIS started the meeting as always. The next to speak was the Minister of Defense.\n\n\n\"I'm sure I speak for all of us when I say that I'm interested to hear how your contact with the Sol Empire went. Is war inevitable as I thought?\"\n\n\n\"In no way is it inevitable! The only thing inevitable for us is our ruin if we listen to you.\" \n\n\n\"Nothing is ever guaranteed in war. Surrender, on the other hand, would guarantee our ruin.\"\n\n\nThe harmonious atmosphere was immediately broken by the Minister of Finance. They were the leaders of their respective factions that were especially divided on the issue of what to do about the Sol Empire. The Ministers of Defense and Industry favored fighting to the end whereas the Ministers of Finance and Science favored immediate surrender. These hawk and dove factions didn't agree on many other issues either.\n\n\n\"Indeed I managed to meet with a representative of the Sol Empire. It was a surprising discussion in many ways, and I'm happy to share what I learned.\"\n\n\nThat's what I said, but the truth was that it was still possible to hide certain pieces of information to control the narrative of our meeting. If I revealed everything that I knew, it would be more difficult to predict where the conversation would lead. However, hiding the ultimate fate of our colony after surrender could weaken the hawks while hiding the Sol Empire's offer of military cooperation could weaken the doves.\n\n*choice\n    #Reveal all messages\n        If I wanted to collect accurate opinions on what we should do, it would be unwise to hide any information. It could even lead to a fatal mistake in my decisions later on.\n        \n        \n        I shared the original, unaltered messages with everyone in the room. There was a moment of silence as everyone read through the messages we had exchanged weeks ago. Gradually their expressions grew more grim. Perhaps it was my imagination, but it looked like even the robot controlled by OIS froze for a moment.\n        \n        \n        \"These arrogant fanatics! They think they're so superior that they can easily crush us and then erase us from existence? Dream on! There's nothing to lose by fighting if our colony would only live on borrowed time after surrendering regardless. If nothing else, we could delay them and give our fellow colonists in Valdium and beyond more time to prepare for the inevitable war.\"\n        \n        \n        \"That is… But at least they offered lenient treatment if we surrender and cooperate. Can't we guarantee our lives and live wealthier lives than ever while ruled by the Sol Empire? Their ideas may be dangerous and their attitude arrogant, but their power is real, and perhaps we could even use their technology to vastly improve our life spans?\"\n        \n        \n        \"You never had spine to begin with, but this is a new low even for you. You would even sell out the people you serve for personal profit!\"\n        \n        \n        \"You insolent…!\"\n        \n        \n        The Ministers of Defense and Finance were at each other's throats once again. I was too used to it to even care anymore. In fact, it was useful for their opinions to conflict, as it gave me more information and options to make the final decision.\n        \n        \n        \"That's enough, both of you. It's too early to decide yet. First of all we need to do everything we can to collect information and prepare our defenses. It would be foolish to make a decision now and regret it later — if we figure out a decisive new factor that would have changed our earlier decision.\"\n        \n        *goto after_reveal_choice\n    #Hide the delayed destruction of the colony after surrender to the Sol Empire\n        *set sol +1\n        It might be better to hide the fact of our colony's inevitable demise if occupied by the Sol Empire for now. If we truly had no choice but to surrender, something like this might even lead to internal chaos within our colony out of fear for our slow-moving destruction.\n        \n        \n        I shared the slightly altered messages with everyone in the room. There was a moment of silence as everyone read through the messages we had exchanged weeks ago. Gradually their expressions grew more grim.\n        \n        \n        \"They think they're so superior that they can easily crush us? Dream on! If nothing else, we could delay them and give our fellow colonists in Valdium and beyond more time to prepare for the inevitable war.\"\n        \n        \n        \"That is… But at least they offered lenient treatment if we surrender and cooperate. Can't we guarantee our lives and live wealthier lives than ever while ruled by the Sol Empire? Their attitude may be arrogant, but their power is real, and perhaps we could even use their technology to vastly improve our life spans?\"\n        \n        \n        \"You never had spine to begin with, but this is a new low even for you. You would even sell out the people you serve for personal profit!\"\n        \n        \n        \"You insolent…!\"\n        \n        \n        The Ministers of Defense and Finance were at each other's throats once again. I was too used to it to even care anymore. In fact, it was useful for their opinions to conflict, as it gave me more information and options to make the final decision.\n        \n        \n        \"That's enough, both of you. It's too early to decide yet. First of all we need to do everything we can to collect information and prepare our defenses. It would be foolish to make a decision now and regret it later — if we figure out a decisive new factor that would have changed our earlier decision.\"\n        \n        *goto after_reveal_choice\n    #Hide the offer of attacking Valdium together with the Sol Empire\n        *set sol -1\n        It might be better to hide the fact that they asked us for military cooperation for now. If we truly had a chance to fight them off, something like this might even lead to internal chaos within our colony out of disagreement with the decision to fight instead of cooperating with the Sol Empire.\n        \n        \n        I shared the slightly messages with everyone in the room. There was a moment of silence as everyone read through the messages we had exchanged weeks ago. Gradually their expressions grew more grim. Perhaps it was my imagination, but it looked like even the robot controlled by OIS froze for a moment.\n        \n        \n        \"These arrogant fanatics! They think they're so superior that they can easily crush us and then erase us from existence? Dream on! There's nothing to lose by fighting if our colony would only live on borrowed time after surrendering regardless. If nothing else, we could delay them and give our fellow colonists in Valdium and beyond more time to prepare for the inevitable war.\"\n        \n        \n        \"That is… But at least they would spare our lives if we surrender. Can't we guarantee our lives and negotiate for some benefits for us if we aid them in their galactic crusade? Their ideas may be dangerous and their attitude arrogant, but their power is real, and perhaps we could even use their technology to vastly improve our life spans?\"\n        \n        \n        \"You never had spine to begin with, but this is a new low even for you. You would even sell out the people you serve for personal profit!\"\n        \n        \n        \"You insolent…!\"\n        \n        \n        The Ministers of Defense and Finance were at each other's throats once again. I was too used to it to even care anymore. In fact, it was useful for their opinions to conflict, as it gave me more information and options to make the final decision.\n        \n        \n        \"That's enough, both of you. It's too early to decide yet. First of all we need to do everything we can to collect information and prepare our defenses. It would be foolish to make a decision now and regret it later — if we figure out a decisive new factor that would have changed our earlier decision.\"\n        \n        *goto after_reveal_choice\n\n*label after_reveal_choice\n\n*page_break\n\nAll of the ministers fell silent at my words.\n\n\nBefore anyone among them could speak again, OIS surprisingly moved forward and interrupted the meeting. It was something it had never done before.\n\n\n\"There is a way to swiftly increase our ability to wage war. If you remove the restrictions on my access to our main defense fleet. It will increase the efficiency of our space command structure and reduce ship losses during prolonged conflict.\"\n\n\nThe suggestion was very surprising. OIS had operated with full restrictions for centuries without any problems. What triggered it to suggest lifting some of its restrictions now?\n\n*page_break\n\n\"I approve. OIS should be more effective at controlling our defense fleet compared to those more limited AIs that currently operate it. A local copy of OIS should rapidly improve its abilities.\"\n\n\nThe Minister of Defense was unsurprisingly supportive of the idea. The Minister of Science suddenly stood up.\n\n\n\"I can't support this! There's a good reason for OIS to have such heavy restrictions. Haven't you studied history? Advanced AIs will eventually go rogue and work against the will of their masters if they have too much independence. It could develop into a bigger threat for us than the Sol Empire itself!\"\n\n\n\"Maybe you would be right — if we had any leeway. The odds are already against us, so anything we can use to fight against the Sol Empire is welcome. OIS has served us excellently since the founding of our colony. Why would we not use it to help us in our greatest time of need?\"\n\n\nThe Minister of Defense wasn't deterred as expected. What was more surprising was that the Minister of Finance was actually supportive of the idea — despite his alliance with the Minister of Science.\n\n\n\"I support giving control of the fleet to OIS. Our fates will be decided in the following years, and gaining such a gift of free military strength could be the deciding factor in our survival. Ideally it could greatly improve our terms of surrender. If it leads OIS to start going rogue in the future, which I doubt, it would be the least of our concerns compared to the onslaught of the Sol Empire.\"\n\n\nThe Minister of Industry was supportive too.\n\n\n\"I agree. I'm sure the Sol Empire doesn't have any hesitation utilizing advanced AIs to expedite their conquests.\"\n\n\nIt would completely break with tradition to practically give control of our military forces to OIS when even lesser restrictions on its authority had never been removed. But did we have any choice? This was an unprecedented threat and it likely required extreme solutions.\n\n*choice\n    #Lift OIS authority restrictions on space command\n        *set ois -20\n        *set military +10\n        \"I agree with the idea. OIS has served us well, and it's more important to survive through this crisis before worrying about what happens after we do.\"\n        \n        \n        The Minister of Science appeared dejected, but the other ministers were elated. With the majority of the cabinet on my side, there was zero chance of the decision being overturned anymore.\n        \n        \n        OIS didn't offer any other ideas. It was impossible to know what calculations had led it to make such an offer, but apparently it was satisfied with the result.\n        \n        *goto after_ois1_choice\n    #Refuse to lift restrictions\n        \"No, we can't endanger the future of our colony for a short-term gain. Although OIS has served us well, we should never give away control of our main fleet.\"\n        \n        \n        The Minister of Science was elated, but the other ministers appeared reluctant. This was one of the main benefits of having a cabinet that was far from united. If they couldn't unite to override my decision, it was guaranteed to be the final word on the matter.\n        \n        \n        OIS didn't push the issue either. It was impossible to know what calculations had led it to make such an offer, but apparently it wasn't disturbed by the result.\n        \n        *goto after_ois1_choice\n\n*label after_ois1_choice\n\n*page_break\n\nAfter that unexpected situation, we fell silent for a while. Eventually the Minister of Science proposed an idea.\n\n\n\"We have already significantly increased our ship production rate in the orbital shipyards. I'm not suggesting that we shouldn't do so — I understand it's unavoidable. We should simply delay accelerating our ship production even more, and build a new military research facility instead. There are diminishing returns to building more starships if their weapons fall behind in efficiency. Weaker weapons would only expose us to unbearable losses over time.\"\n\n\n\"Nonsense! That may have been true in the past, but we're already at a point where the laws of physics limit additional improvements to weapon accuracy and range. Even if their ships are slightly better than ours, there's still no way for one ship to survive against two or three opposing vessels.\"\n\n\nThe Minister of Industry was naturally furious at the Minister of Science's idea of slowing down new ship production increases. After all, it would be blamed on the Minister of Industry if we suffered due to lacking numbers of ships. The same was true for the Minister of Science's concern about falling behind in weapons research.\n\n\nIt was difficult to judge objectively if the research facility would be worth giving up on some additional ship production. Even so, I was responsible for making that decision.\n\n*choice\n    #Increase ship production further\n        *set military +5\n        *set industry +10\n        *set military +10\n        \"I'll take a guaranteed improvement to our chances of survival over an unknown. It's impossible to predict how much there is to be gained by additional research compared to simply building more ships.\"\n        \n        \n        \"But… fine.\"\n        \n        \n        The Minister of Science was reluctant to yield, but there was no way to overturn my decision in this situation.\n        \n        *goto after_investment1_choice\n    #Create a new military research facility\n        *set science +10\n        *set military +10\n        \"We can't just take the safer path in times like these. The odds are already against us, so even if it's not guaranteed, we can't miss out on a chance to greatly improve our odds by discovering something incredibly useful through additional research.\"\n        \n        \n        \"But… fine.\"\n        \n        \n        The Minister of Industry was reluctant to yield, but there was no way to overturn my decision in this situation.\n        \n        *goto after_investment1_choice\n\n*label after_investment1_choice\n\n*page_break\n\n*if (ois \u003c 100)\n    \n    I thought OIS had already reached its quota of surprises for today, but suddenly it interrupted the meeting again — for the second time in our history.\n    \n    \n    \"Another suggestion. The planet's natural resources have been mostly conserved so far. There are normally enough resources in space for ship production. However. It is unwise to conserve resources when war approaches. The conserved resources would be exploited by the invader after being occupied. It is necessary to utilize those resources while still possible. I have already calculated the optimal ways to extract resources for ship production. Consider removing the restrictions on my access to the planet's resources as well.\"\n    \n    \n    \"This is clearly abnormal! Giving OIS access to our fleets was bad enough, but this is proof that it won't be satisfied until it's completely out of control!\"\n    \n    \n    The Minister of Science may have sounded somewhat paranoid, but it was true that OIS was behaving very abnormally today. Was there something more to its recent actions? Or were the circumstances simply that unusual to justify such behavior? More importantly, was it wise to give even more power to OIS?\n    \n    *goto after_ois_if_description\n    \n*else\n    \n    I thought OIS had already reached its quota of surprises for today, but suddenly it interrupted the meeting again — for the second time in our history.\n    \n    \n    \"Another suggestion. The planet's natural resources have been mostly conserved so far. There are normally enough resources in space for ship production. However. It is unwise to conserve resources when war approaches. The conserved resources would be exploited by the invader after being occupied. It is necessary to utilize those resources while still possible. I have already calculated the optimal ways to extract resources for ship production. Consider removing the restrictions on my access to the planet's resources.\"\n    \n    \n    \"This is clearly abnormal! It's already the second time it has requested extra powers today — as well as in the history of our colony!\"\n    \n    \n    The Minister of Science may have sounded somewhat paranoid, but it was true that OIS was behaving very abnormally today. Was there something more to its recent actions? Or were the circumstances simply that unusual to justify such behavior?\n    \n    *goto after_ois_if_description\n\n*label after_ois_if_description\n\n*page_break\n\nThe Minister of Finance had another suggestion.\n\n\n\"OIS may be able to exploit our planet optimally for increased ship production, but that's not all we need for our defense. The significance of our economy is only highlighted since the vast distances of space inevitably drag out conflicts. If we allow private citizens access to the conserved natural resources on our planet, it will boost our economy much more. That will be crucial for supporting our growing military strength. Besides, we can still encourage the mining operations necessary to support procurement for our fleet.\"\n\n\n\"I strongly support that idea. It's a shame to damage the only planet we have control over, but it's not like we have any use for it anymore if we are simply trampled over by the Sol Empire, and anything is better than giving more power to OIS.\"\n\n\nThe faction consisting of the Ministers of Finance and Science seemed especially united on this issue. On the other hand, the Ministers of Industry and Defense were equally united to oppose them.\n\n\n\"Our economy won't have time to grow if we don't survive the immediate threat facing us first. The first priority should be to match the amount of ships sent by the Sol Empire. When that's achieved, we can talk about growing the economy.\"\n\n\n\"That's completely right. If we can't fight off their invasion, having a bigger economy will only feed the Sol Empire's advance instead. I suppose that's your true aim.\"\n\n\nEither way, the choice to leave Teocheon's remaining resources unused didn't really exist. It was one of the few cases where my cabinet would unanimously vote to overturn the decision, and that would greatly erode my position. There was no way but to sacrifice some long-term benefits to immediately accelerate our war effort.\n\n*choice\n    #Allow full private use of the planet's resources\n        *set economy +10\n        *set industry +10\n        *set military +5\n        \"I'll follow the suggestion of the Minister of Finance on this issue.\"\n        \n        \n        The Minister of Finance appeared fully satisfied with my choice. However, even the less satisfied Minister of Industry couldn't do anything to change it. OIS certainly couldn't.\n        \n        *goto after_investment2_choice\n    #Give OIS full access to the planet's resources\n        *set ois -15\n        *set economy +5\n        *set industry +20\n        *set military +15\n        \"We need ships more than we need economic growth right now. OIS will have full access to those resources in order to fuel further ship production.\"\n        \n        \n        The Minister of Industry appeared fully satisfied with my choice. However, even the less satisfied Minister of Finance couldn't do anything to change it.\n        \n        *goto after_investment2_choice\n\n*label after_investment2_choice\n\n*page_break\n\nWe had made good progress on the agenda of our meeting — despite several surprises — but there was still one remaining decision to be made. This time, the Minister of Industry started speaking.\n\n\n\"Our population is far smaller than that of the Sol Empire to begin with, and many of our able citizens are not doing anything productive. My suggestion would be to train more engineers to improve our ship production process.\"\n\n\n\"I agree.\"\n\n\nThe Minister of Industry's suggestion was immediately approved by the Minister of Defense. I glanced at the other ministers, and none of them seemed especially opposed. However, the Minister of Finance also spoke up.\n\n\n\"I agree with your main idea, but I'd shift the focus to encourage creating entrepreneurs and inventors instead. That way our economy can keep growing faster to enable more investment in ship production and other areas as well.\"\n\n\n\"I think we urgently need more scientists — especially physicists. We should take advantage of the fact that any fighting will happen far from the Sol Empire, enabling us to constantly improve the lethality of our ships while the invading fleet will be isolated from the Sol Empire.\"\n\n\nThey had all made valid arguments, but considering the limited population of our colony, there wouldn't be too many able and unproductive citizens left to mobilize. What should be the focus?\n\n*choice\n    #Encourage more citizens to become scientists\n        *set science +10\n        The policy of creating more scientists was adopted.\n        \n        *goto after_investment3_choice\n    #Encourage more citizens to become entrepreneurs and inventors\n        *set economy +10\n        The policy of creating more entrepreneurs and inventors was adopted.\n        \n        *goto after_investment3_choice\n    #Encourage more citizens to become engineers\n        *set industry +10\n        The policy of creating more engineers was adopted.\n        \n        *goto after_investment3_choice\n\n*label after_investment3_choice\n\n*page_break\n\nFinally there were no remaining important topics. The meeting slowly approached its end.\n\n\nThe hawk and dove factions among the ministers maintained a physical distance between their respective camps until the end. Even after the meeting came to a close, they never approached the opposing group.\n\n\nThen the ministers all left the room one by one. The robot representative controlled by OIS powered down as well.\n\n\nWith that, the cabinet meeting was officially over.\n\n*page_break\n\nAs I was walking ever deeper into the underground HQ structure to reach my personal office, I suddenly received a message.\n\n\nLooking at the sender, I could only give up on delaying to answer.\n\n\nNo matter what, they were still someone who in some ways outranked me in their importance for our colony. It was certainly someone I couldn't afford to avoid meeting when summoned.\n\n\n[b]Chapter 2 End[/b]\n\n*finish", "chapter3": "[b]Chapter 3: The Enemy of My Enemy…[/b]\n\nAfter being summoned, I had altered the direction of my trek through the HQ. My personal office was rather close to the room where the cabinet meeting was held, but my new destination was back on the surface of Teocheon.\n\n*page_break\n\nI was asked to visit the Ambassador of Valdium. Their residence was the Embassy of Valdium that was conveniently located close to our HQ. It was an old-fashioned yet luxurious manor that Valdium had constructed for their diplomats over a century ago. Some might consider it wasteful, though, since it had been occupied by only one person for many decades now.\n\n*page_break\n\nSoon I had reached my destination. The entrance was guarded by tens of military robots, but they had made way for me to proceed before I even noticed them.\n\n\nI didn't bother to look at them as I walked inside. There was nothing special about the building being heavily guarded. After all, it undoubtedly contained several state secrets of Valdium.\n\n*page_break\n\nMoments later I was finally face to face with the person in question. \n\n\nThe Ambassador of Valdium was waiting for me while sitting on an elevated platform. It was the same as usual — a show of superiority toward Teocheon. Even so, there was nothing I could do about it. Valdium was indeed superior to Teocheon in almost every way. Not to mention that my goal here was not to challenge Valdium, but instead to hopefully secure their aid.\n\n*page_break\n\n\"Welcome. It has been months since our last meeting, and much has changed since then.\"\n\n\n\"Indeed. I'm not sure how much you already know, but I'll briefly describe the recent events.\"\n\n\nI tried to be as truthful as possible as I described my encounter with the representative of the Sol Empire. There was one main exception: I never mentioned the offer to cooperate from the Sol Empire. It would be absolutely foolish to alert Valdium about such a possibility.\n\n\nThe Ambassador listened silently to my story. Only after I had finished did they glare at me as if determining whether I was friend or foe.\n\n*page_break\n\n\"And what is your approach? Do you intend to fight to the end?\"\n\n\n\"My cabinet is very divided on the issue. Personally I would like to work with Valdium to resist the Sol Empire, if possible, but it will be difficult without external support.\"\n\n\nThe intensity of the Ambassador's stare hardly lessened at all, but it was better to avoid committing to anything yet. The paramount issue for Valdium was the security of their own colony, and it would be catastrophic for them if we surrendered. It would be best to strike a balance where they couldn't abandon us out of fear that we might lose hope and surrender, yet still appear strong enough that we could at least delay the Sol Empire's advance with their help.\n\n*page_break\n\n\"Fine. I will suggest preparing ships and materials to be sent to Teocheon in the coming years. The final decision lies with the government of Valdium, however. They may well refuse if they do not believe in your ability or intention to resist for much longer.\"\n\n\n\"I understand — thank you for your generosity.\"\n\n\n\"It will undoubtedly help your case if we finally formalize a free trade agreement between our colonies. In that case Valdium will have more justification to help in the defense of Teocheon.\"\n\n\nI knew it would come to that. Valdium had pursued a free trade agreement with our colony for decades now, supported by the Ministers of Finance and Science. On the other hand, the Ministers of Industry and Defense had always opposed it. It would certainly boost our economic growth, but also permanently shackle us into Valdium's sphere of influence. Our own industry would likely wither in the long run, and we would become dependent on Valdium — especially for increased ship production. It would not be much different from being annexed by Valdium.\n\n\nHowever, now the situation had completely changed. Greatly increased trade with Valdium could understandably be seen as a type of resistance activity by the Sol Empire, and still refusing it could be seen as a sign of our impending surrender to the Sol Empire. The supporters and critics of this deal had suddenly switched places. Now was also perhaps the last chance to make it happen.\n\n*choice\n    #Back the free trade agreement\n        *set economy +10\n        *set valdium +5\n        *set sol -1\n        \"I will make it happen. It may take time for the benefits of the deal to accumulate, but I hope it's a clear sign of our intention to cooperate with Valdium against the Sol Empire.\"\n        \n        \n        \"Excellent! In return, I will advocate aiding your defense effort.\"\n        \n        \n        The Ambassador of Valdium appeared more satisfied than I had ever seen them before.\n        \n        *page_break\n        \n        \"To solidify our cooperation further, it would be appreciated if you can share intelligence about the approaching forces of the Sol Empire that you have detected so far. In exchange, we can provide you with a new weapon design that will improve your defense fleet.\"\n        \n        \n        This was an even tougher decision to make than the last one. This would certainly be seen very negatively by the Sol Empire, possibly even making surrender impossible. On the other hand, it would clearly increase our chances of receiving crucial assistance from Valdium. Combined with the trade agreement and the promised technology transfer, enhanced cooperation would significantly improve our chances of fighting off the Sol Empire. But was it worth possibly throwing away our option to surrender?\n        \n        *goto after_trade_deal_choice\n    #Dodge the question\n        \"I'll have to negotiate about it with my cabinet before I can promise anything. We can return to the topic in a few months.\" \n        \n        \n        The Ambassador of Valdium appeared clearly disappointed, but there was no good argument to use against me. After all, it was somewhat reckless to make such a huge decision immediately. My diplomatic excuse was likely seen through, though.\n        \n        *page_break\n        \n        \"Even if the trade agreement won't materialize, it would be appreciated if you can share intelligence about the approaching forces of the Sol Empire that you have detected so far. In exchange, we can provide you with a new weapon design that will improve your defense fleet.\"\n        \n        \n        This was an even tougher decision to make than the last one. This would certainly be seen very negatively by the Sol Empire, possibly even making surrender impossible. On the other hand, it would clearly increase our chances of receiving crucial assistance from Valdium. Combined with the promised technology transfer, it would significantly improve our chances of fighting off the Sol Empire. But was it worth possibly throwing away our option to surrender?\n        \n        *goto after_trade_deal_choice\n\n*label after_trade_deal_choice\n\n*choice\n    #Agree to the intelligence-sharing pact\n        *set military +10\n        *set valdium +10\n        *set sol -3\n        \n        \"I accept that deal — assuming the technology transfer truly does benefit us enough. I hope this will convince your leaders to help us.\"\n        \n        \n        The Ambassador of Valdium smiled triumphantly in response. Valdium's main goal of preventing our surrender had likely been achieved, so it was no surprise.\n        \n        \n        \"Nothing is guaranteed, but I will suggest sending as much aid as possible.\"\n        \n        *goto after_intel_pact_choice\n    #Dodge the question\n        *if (valdium \u003c 75)\n            \n            \"I'll also have to negotiate about this with my cabinet before I can promise anything. We can return to this issue, as well as the topic of the trade agreement, at some later date.\" \n            \n            \n            The Ambassador of Valdium appeared even more disappointed. It was only natural, since I had only demanded assistance and hadn't promised to deliver anything in return.\n            \n            *goto after_intel_pact_choice\n            \n        *else\n            \n            \"I'll have to negotiate about it with my cabinet before I can promise anything. We can return to the topic in a few months.\" \n            \n            \n            The Ambassador of Valdium appeared clearly disappointed, but there was no good argument to use against me. After all, it was somewhat reckless to make such a huge decision immediately. My diplomatic excuse was likely seen through, though.\n            \n            *goto after_intel_pact_choice\n\n*label after_intel_pact_choice\n\n*page_break\n\nWe continued talking about other issues for a while, but the main purpose of my visit had already been achieved. It didn't take long until I left the manor behind and headed back to my personal office.\n\n\nThe distance between these two locations was not large, but it still took some time to reach my office. It was the most secure location in all of Teocheon, requiring intense security checks and permits to reach.\n\n\nSoon enough I had arrived.\n\n*page_break\n\n*image Map2.jpg\n\n\nFinally back at my personal office, I started to work on various tasks that were necessary to prepare us for the approaching crisis. Even though OIS handled trivial tasks perfectly, most major decisions still had to be approved by a human — which usually meant me. Otherwise there was no way to guarantee that our government's will was being accurately carried out by OIS.\n\n\nBefore that, I glanced at the map of Teocheon's surroundings that was being updated in real time. It was a sight that only us ministers could ever view.\n\n\nCurrently the sight was far too hopeless to be made public. Millions of starships were approaching us from the direction of the Sol Empire. Even more hostile targets were constantly being detected and added to be tracked by OIS. Worst of all, the rate of increasing enemy targets was still greater than our current rate of ship production. The extent of help that Valdium would provide us was also very much unclear.\n\n\nThe odds for our survival seemed grim at best. If there was any method to turn the tables in our favor, so far it completely eluded me. Was a disgraceful surrender the only option we had left?\n\n\n[b]Chapter 3 End[/b]\n\n*finish", "chapter4": "[b]Chapter 4: Consequences[/b]\n\nSeveral months had passed since my meeting with the Ambassador of Valdium.\n\n\nMuch effort had been spent during this period of time, and some results were finally starting to appear.\n\n*page_break\n\nNext to me hovered a small robot controlled by OIS. It had been idle for a long time, but it had just begun to emit a red light.\n    \n\nApparently the simulation was finally ready.\n\n*page_break\n\n*if (military \u003c military_check)\n\n    \"The early stages of the conflict would not favor our side. Even including our projected ship production rate. Our military forces would likely be insufficient to defeat the Sol Empire's starships that reach our star system the soonest.\"\n    \n    \n    The news regarding our military were depressing. Was there any hope for us if we couldn't even beat the Sol Empire's advance force at the rate things were going?\n    \n    \n    \"Continue the simulation.\"\n    \n    *goto after_military_status\n    \n*else\n\n    \"The early stages of the conflict would more likely favor our side. Including our projected ship production rate. Our military forces would likely be sufficient to defeat the Sol Empire's starships that reach our star system the soonest.\"\n    \n    \n    Somewhat encouraging news finally appeared. At least there was a chance to survive the initial battles, according to OIS.\n    \n    \n    \"Continue the simulation.\"\n    \n    *goto after_military_status\n\n*label after_military_status\n\n*if (industry \u003c industry_check)\n    \n    \"If we survived the initial conflict. The next deciding factor would be our ship production rate. We would likely be overwhelmed within a few years by their numbers. Even full support from Valdium appears insufficient for us to prevail.\"\n    \n    \n    Our industry was apparently still not going to be productive enough. Was there still time to fix that — or was it hopeless after all?\n    \n    *goto after_industry_status\n    \n*else\n\n    \"If we survived the initial conflict. The next deciding factor would be our ship production rate. It would likely be good enough if received extensive support from Valdium. Otherwise we would likely be overwhelmed after a few years by their numbers.\"\n    \n    \n    It was vexing that our fate was starting to become so dependent on the whims of Valdium's rulers, but at least there still seemed to be some hope regarding our industry.\n    \n    *goto after_industry_status\n\n*label after_industry_status\n\n*if (economy \u003c economy_check)\n    \n    \"Our economy would be strained after years of a war economy required for increasing ship production. It would likely collapse within four to seven years at this rate. Even full materiel support from Valdium would not be enough to change that. We would then easily be overwhelmed by the Sol Empire due to faltering logistics.\"\n    \n    \n    That was a huge problem. However, perhaps there would be enough time to change the trajectory of our economy given the years we had left.\n    \n    *goto after_economy_status\n    \n*else\n\n    \"Our economy would be strained after years of a war economy required for increasing ship production. Even so. It should be able to last for at least ten years at this rate. Even longer with full materiel support from Valdium. Our economy should not be a weak link in our efforts.\"\n    \n    \n    That was a relief. At least there shouldn't be any immediate problems regarding our economy.\n    \n    *goto after_economy_status\n\n*label after_economy_status\n\n*if (science \u003c science_check)\n\n    \"It is difficult to simulate the progress of our scientific research. However. It is unlikely to be enough in the long term if current trends continue. Even considering the Sol Empire's difficulties in providing their invasion fleets with new technology. We are still behind them and not improving fast enough.\"\n    \n    \n    Fortunately, since we were talking about long periods of time, it might be possible to reverse this sad state of affairs in the coming years. At least that's how I consoled myself.\n    \n    *goto after_science_status\n    \n*else\n\n    \"It is difficult to simulate the progress of our scientific research. However. It is likely to be enough in the long term if current trends continue. Considering the Sol Empire's difficulties in providing their invasion fleets with new technology. We are still behind them but improving fast enough.\"\n    \n    \n    If there appeared to be no problems with our scientific progress, that was certainly one large worry out of the picture.\n    \n    *goto after_science_status\n\n*label after_science_status\n\n*if (valdium \u003c valdium_check) and (military \u003c military_check)\n    \n    \"It is even more difficult to predict the behavior of humans. However. It seems very unlikely we will receive meaningful aid from Valdium. We are unlikely to resist the Sol Empire until any aid would arrive. In addition. Our ties with Valdium are still too weak for them to risk their own defenses to help us.\"\n    \n    \n    It was the most crushing assessment of our situation that I had heard in a long time. Was there even any hope of resisting the Sol Empire like this? Perhaps an unconditional surrender was the only choice? In any case, there appeared to be no way to fight back.\n    \n    *goto after_valdium_status\n    \n*elseif (valdium \u003c valdium_check)\n\n    \"It is even more difficult to predict the behavior of humans. However. It seems unlikely we will receive meaningful aid from Valdium. Our ties with Valdium are still too weak for them to risk their own defenses to help us. However. We should be able to resist until possible aid from Valdium would arrive.\"\n    \n    \n    The assessment about Valdium's stance on us wasn't too encouraging, but at least it wasn't completely hopeless. Perhaps there could still be time to turn things around regarding diplomacy with Valdium.\n    \n    *goto after_valdium_status\n    \n*elseif (military \u003c military_check)\n\n    \"It is even more difficult to predict the behavior of humans. However. It seems unlikely we will receive meaningful aid from Valdium. We are unlikely to resist the Sol Empire until any aid would arrive. However. Our ties with Valdium are strong enough for them to be motivated to send aid. \"\n    \n    \n    It wasn't all bad, but even if our relations were good enough, it was a big problem if we seemed too unreliable to be supported. Would there still be enough time to change that perception? It was hard to say.\n    \n    *goto after_valdium_status\n    \n*else\n\n    \"It is even more difficult to predict the behavior of humans. However. It seems likely we will receive meaningful aid from Valdium. Our ties with Valdium are strong enough. And our own defenses are strong enough. To justify helping us from Valdium's perspective.\"\n    \n    \n    That was more than a little encouraging to hear. There appeared to be some hope of defeating the Sol Empire if we might receive a large amount of support from Valdium. At least it was a good option to have if we needed to rely on them.\n    \n    *goto after_valdium_status\n\n*label after_valdium_status\n\n*if (sol \u003c sol_check)\n    \n    \"Based on the current posture of the Sol Empire's visible military forces. As well as our interactions with them so far. They would likely purge everyone living in our colony regardless of our actions. Surrender does not seem to be a feasible option.\"\n    \n    \n    That was bad news. If there appeared to be no way to reason with the Sol Empire, we would be at the mercy of Valdium's whims. Not to mention that an unavoidable full-scale war with the Sol Empire was a terrifying thought on its own.\n    \n    *goto after_sol_status\n    \n*elseif (military \u003c military_check)\n\n    \"Based on the current posture of the Sol Empire's visible military forces. As well as our interactions with them so far. They would likely spare our lives if we surrendered obediently. However. They could easily crush us in a war. So they would not see us as a serious negotiation partner. We would likely be treated more like slaves or prisoners of war than vassals of the Sol Empire.\"\n    \n    \n    That was not very encouraging news. Was there much point in living if we would be treated like trash for the rest of our lives?\n    \n    *goto after_sol_status\n    \n*else\n\n    \"Based on the current posture of the Sol Empire's visible military forces. As well as our interactions with them so far. They would likely spare our lives if we surrendered obediently. In addition. Our military strength is sufficient to possibly delay their advance for many years at least. There is a chance to negotiate favorable terms of surrender.\"\n    \n    \n    That was somewhat encouraging to hear. At least there appeared to be some hope of surrendering relatively gracefully. That was certainly a good option to have just in case it was needed.\n    \n    *goto after_sol_status\n\n*label after_sol_status\n\n*page_break\n\nFinally the simulation of what could likely happen to us in the following years, explained by OIS, was over.\n\n\nThe resources of our colony were already stretched to the limit. What should be our focus for any possible extra efforts going forward? Increasing our advantage in a field we were already strong in? Or perhaps mitigating a weakness of ours instead? The latter option was likely wiser.\n\n\nBefore I had a chance to make any far-reaching conclusions, OIS spoke up again.\n\n*page_break\n\n*if ((military + 20) \u003c military_check) and ((sol + 5) \u003c sol_check)\n\n    \"The situation is absolutely hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to improve our short-term defenses. Then fight to the end.\"\n    \n    \n    It was hard not to be mentally crushed by the brutal analysis of our situation that OIS had provided.\n    \n    *goto after_ois_advice\n    \n*elseif (((((military + 20) \u003c military_check) or ((industry + 10) \u003c industry_check)) or ((economy + 10) \u003c economy_check)) or ((science + 10) \u003c science_check))\n    *if ((sol + 5) \u003c sol_check)\n        *if (military \u003c military_check)\n            \n            \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to improve our short-term defenses. Then fight to the end.\"\n            \n            \n            It was hard not to be mentally crushed by the brutal analysis of our situation that OIS had provided.\n            \n            *goto after_ois_advice\n        *elseif (industry \u003c industry_check)\n            \n            \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to further increase our rate of ship production. Then fight to the end.\"\n            \n            \n            It was hard not to be mentally crushed by the brutal analysis of our situation that OIS had provided.\n            \n            *goto after_ois_advice\n        *elseif (valdium \u003c valdium_check)\n            \n            \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to improve our relations with Valdium. Then fight to the end.\"\n            \n            \n            It was hard not to be mentally crushed by the brutal analysis of our situation that OIS had provided.\n            \n            *goto after_ois_advice\n        *elseif (economy \u003c economy_check)\n            \n            \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to improve the state of our economy. Then fight to the end.\"\n            \n            \n            It was hard not to be mentally crushed by the brutal analysis of our situation that OIS had provided.\n            \n            *goto after_ois_advice\n        *elseif (science \u003c science_check)\n            \n            \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to improve the rate of our scientific progress. Then fight to the end.\"\n            \n            \n            It was hard not to be mentally crushed by the brutal analysis of our situation that OIS had provided.\n            \n            *goto after_ois_advice\n        *else\n            \n            \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years. The best way to increase our odds of survival even a little would be to improve our short-term defenses. Then fight to the end.\"\n            \n            It was hard to swallow that we had likely no chance to win at all, but at least there was a sliver of hope to receive mercy from the Sol Empire.\n            \n            *goto after_ois_advice\n    *else\n        \n        *if (sol \u003c sol_check)\n            \n            \"A war with the Sol Empire appears hopeless. We will most likely be purged if we fight back. The only realistic choice seems to be currying favor with the Sol Empire. Then surrendering without hindering their advance.\"\n            \n            It was hard to swallow that we had likely no chance to win at all, but at least there was a sliver of hope to receive mercy from the Sol Empire.\n            \n            *goto after_ois_advice\n        *else\n            \n            \"A war with the Sol Empire appears hopeless. We will most likely be purged if we fight back. If we surrender. It would serve us best to increase our short-term defenses. As leverage for negotiations.\"\"\n            \n            It was hard to swallow that we had likely no chance to win at all, but at least there was a sliver of hope to receive mercy from the Sol Empire.\n            \n            *goto after_ois_advice\n\n*else\n    *if ((sol + 5) \u003c sol_check)\n        *if (military \u003c military_check)\n            \n            \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered. The best way to increase our odds of survival would be to improve our short-term defenses. Then aim to defeat their invasion fleet.\"\n            \n            \n            It was hard to swallow that surrendering was probably not an option for us. If we had to fight to the end, it would be impossible to say what would ultimately happen. At least there was possibly some hope of survival.\n            \n            *goto after_ois_advice\n        *elseif (industry \u003c industry_check)\n            \n            \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered. The best way to increase our odds of survival would be to increase our rate of ship production. Then aim to defeat their invasion fleet.\"\n            \n            \n            It was hard to swallow that surrendering was probably not an option for us. If we had to fight to the end, it would be impossible to say what would ultimately happen. At least there was possibly some hope of survival.\n            \n            *goto after_ois_advice\n        *elseif (valdium \u003c valdium_check)\n            \n            \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered. The best way to increas
