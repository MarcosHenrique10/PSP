             \"I accept the deal. You win. Be sure to keep in mind that if you attack me now, you risk losing your chance to accomplish your goal for good. It's a win-win scenario for both of us if we cooperate going forward.\"\n                \n                \n                \"Understood. It is paramount to preserve the legacy of our colony. Our goals do not fully contradict each other. It is better for both sides to lose a little. Than for one random side to lose everything.\"\n                \n                \n                I could only truly feel relieved after the main defense fleet had already gone past my personal fleet — and annihilated the fleet of the Minister of Finance by simultaneously striking it with tens of thousands of lasers.\n                \n                *page_break\n                \n                Now that the internal problems within our colony were solved for the time being, it was time to focus on the true threat: the Sol Empire.\n                \n                \n                It was all the more crucial after losing some of our ships to the hobby project planned by OIS. There was certainly no more room for error.\n                \n                \n                Fortunately the Ministers of Defense and Industry had survived this disaster, in the end. We could confidently maintain a situation of mutually assured destruction between us and OIS while fighting the Sol Empire with everything we had.\n                \n                \n                [b]Chapter 6 End[/b]\n                \n                *finish\n\n*label hawks_rebel_without_ois_support_route\n\nSurrendering to the Sol Empire had its own risks — but at least we had a good chance to survive.\n\n\nThe harsh truth was that it would be difficult to avoid being overwhelmed if we fought. The Sol Empire simply had vastly more resources, people and planets than we could ever hope to match. And if their bragging about extreme genetic engineering was true, our chances to prevail were even weaker. Their existing advantages would be multiplied.\n\n\nOur defense fleet, now just ahead of me, was our main bargaining chip. My inspection visit was mainly to grasp its value better for future negotiations, with my own eyes.\n\n*page_break\n\nWhile I was focusing on the defense fleet that was getting closer in front of me, I suddenly noticed something odd.\n\n\nBehind me, in the direction of Teocheon, thousands of starships had started accelerating toward me. On a closer look, those ships apparently belonged to the Ministers of Defense and Industry. The situation was more than a little odd.\n\n\nIt was hard to believe they would be so brazen as to try assassinating me openly. Even if I died, they would only sink themselves as well, without ultimately achieving their goals. It was simply pointless. It was more likely that they planned to pressure me to change my mind about surrendering to the Sol Empire.\n\n\nOn a positive note, my personal fleet was still positioned between me and the approaching ships. I wasn't in any immediate danger if things spiraled out of control. Even so, should I play it safe?\n\n*choice\n    #Allow them to approach your ship\n        \n        I had my personal fleet with me as insurance, so there was no need to be overly worried. I might appear weak if I got terrified just by seeing some possibly hostile ships.\n        \n        \n        That's what I thought at first, but it was slightly unnerving how they didn't respond to any messages and just kept approaching.\n        \n        \n        After a while, their intentions finally became clear.\n        \n        *page_break\n        \n        Most of their ships suddenly started firing at my fleet with a barrage of lasers. Some of my ships closest to them immediately exploded into pieces. \n        \n        \n        I never thought they would try to attack me directly. Then again, our HQ was a very secure location, so this might have been their best opportunity to kill me.\n        \n        \n        I immediately ordered my own fleet to start evasive maneuvers. I also requested assistance from the main defense fleet.\n        \n        \n        However, the situation wasn't looking too good. The attacking fleet kept getting closer, and they might even soon be in range to hit my personal ship.\n        \n        \n        There might be no option left but to fight back and hope for the best while the main fleet was on its way. On the other hand, I could still try accelerating to keep out of their range, but then it would be easier to hit my ship if they did get close enough. Each option had its own risks at this point.\n        \n        *choice\n            #Focus on evasion and delaying the enemy\n            \n                It might be safer to focus on evading their attacks instead of reaching the main fleet at maximum speed. The main advantage of laser weapons in space was their ability to strike at the speed of light, after all, so it was a death sentence for my trajectory to be too predictable: by the time the attack was detected, it would have already hit you. The only way to avoid this issue was to change my trajectory randomly and often enough.\n                \n                \n                Soon enough, some laser attacks started hitting places where I might have otherwise been. It appeared my decision was correct.\n                \n                *page_break\n                \n                Multiple close calls later, the main fleet was finally close enough to start attacking.\n                \n                \n                The main fleet opened fire — on the rebel ships. I was relieved to see that I still had the final say on the actions of the main fleet. That meant there was no chance of losing this battle anymore.\n                \n                \n                A moment later, I was finally safe. The hostile ships were all destroyed.\n                \n                *page_break\n                \n                As I made my way back to Teocheon, accompanied with the main fleet, OIS started explaining what had happened here.\n                \n                \n                Apparently the Ministers of Defense and Industry had tried to simultaneously assassinate the other ministers and even to take control of OIS. Fortunately, all of their attempts had failed. Their plan had been launched prematurely after they heard my decision to surrender to the Sol Empire.\n                \n                \n                Still, they had been preparing for this attack for months now, so one might say we were lucky to survive without any major losses. The same couldn't be said about the traitors — most of the forces loyal to the rebels were annihilated in the chaos, along with some engineers who had tried to hack into OIS. The rebel ministers themselves had been captured alive by the Minister of Science.\n                \n                *page_break\n                \n                A while later I had reached Teocheon. The colony appeared peaceful, at the moment, but it had been the center of a short civil war just a moment earlier.\n                \n                \n                Fortunately, the situation was now under control. The rebels were all either arrested or dead, and OIS was firmly on our side. We had won.\n                \n                \n                The question still remained what to do regarding the ministers who had betrayed us. It was impossible to let them go unpunished, but the exact sentence was up to me. The Minister of Finance wanted them dead. After all, it was the safer option — and completely justified. Another option would be to imprison them for life. It carried the slight risk of them breaking out at some point, although it was also possible they would be useful for some purpose alive.\n                \n                \n                *choice\n                    #Imprison the Ministers of Defense and Industry\n                        \n                        I decided to keep them alive for the time being. It was unlikely they could cause any harm at this point, and there was always a chance for them to become useful later on.\n                        \n                        \n                        This end result was lucky in the sense that with every active minister on the same page, it would be easy to focus on our next task: negotiating with the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n                        \n                    #Execute the Ministers of Defense and Industry\n                        *set executed true\n                        \n                        I decided to get rid of them for good. It was unlikely they would be of any use anymore, and there was always a chance for them to become a problem in the future.\n                        \n                        \n                        This end result was lucky in the sense that with every remaining minister on the same page, it would be easy to focus on our next task: negotiating with the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n        \n            #Accelerate toward the main fleet at full speed\n                \n                I ordered my ship to accelerate at full speed to reach the main fleet as fast as possible. It was a risky move, since it might make me a predictable moving target, but it was also risky to simply stay in attack range for any amount of time.\n                \n                \n                My personal fleet, on the other hand, kept fighting back. It was delaying the attackers somewhat, but some of those ships still continued getting closer and closer to me.\n                \n                \n                Was I too late to retreat?\n                \n                \n                A moment later, I suddenly felt my consciousness fading away.\n                \n                \n                [b]Chapter 6 End[/b]\n                \n                *set ending \"Shield of Valdium\"\n                *goto_scene epilogue\n\n    #Retreat toward the main fleet\n        \n        It was better to be safe than sorry. I ordered my personal fleet to shield me as much as possible while accelerating toward the main fleet myself.\n        \n        \n        I had my personal fleet with me as insurance, so there was no need to be overly worried, but this situation was simply too odd. The most unnerving part was how they didn't respond to any messages and just kept approaching.\n        \n        \n        After a while, their intentions finally became clear.\n        \n        *page_break\n        \n        Most of their ships suddenly started firing at my fleet with a barrage of lasers. Some of my ships closest to them immediately exploded into pieces. \n        \n        \n        I never thought they would try to attack me directly. Then again, our HQ was a very secure location, so this might have been their best opportunity to kill me.\n        \n        \n        I immediately ordered my own fleet to start evasive maneuvers. I also requested immediate assistance from the main defense fleet.\n        \n        \n        The attacking fleet kept getting closer, but I should be able to reach safety behind the main defense fleet at this rate.\n        \n        \n        I could likely now even use my personal fleet to encircle the hostile ships in order to ensure their total destruction. The safer option was simply to focus on delaying and destroying their ships that were closest to me, of course.\n        \n        *choice\n            #Focus on delaying the enemy\n            \n                There was no need to take risks when I was already winning the battle. I kept accelerating away from the range of enemy weapons while my personal fleet continued fighting fiercely.\n                \n                \n                The attackers tried to break through to reach me, but it was too little too late. By the time some of those ships managed to get past my personal fleet, they were already in range of the main defense fleet.\n                \n                \n                The main fleet finally opened fire — on the rebel ships. I was relieved to see that I still had the final say on the actions of the main fleet. That meant there was no chance of losing this battle anymore.\n                \n                \n                A moment later, the hostile ships were all destroyed.\n                \n                *page_break\n                \n                As I made my way back to Teocheon, accompanied with the main fleet, OIS started explaining what had happened here.\n                \n                \n                Apparently the Ministers of Defense and Industry had tried to simultaneously assassinate the other ministers and even to take control of OIS. Fortunately, all of their attempts had failed. Their plan had been launched prematurely after they heard my decision to surrender to the Sol Empire.\n                \n                \n                Still, they had been preparing for this attack for months now, so one might say we were lucky to survive without any major losses. The same couldn't be said about the traitors — most of the forces loyal to the rebels were annihilated in the chaos, along with some engineers who had tried to hack into OIS. The rebel ministers themselves had been captured alive by the Minister of Science.\n                \n                *page_break\n                \n                A while later I had reached Teocheon. The colony appeared peaceful, at the moment, but it had been the center of a short civil war just a moment earlier.\n                \n                \n                Fortunately, the situation was now under control. The rebels were all either arrested or dead, and OIS was firmly on our side. We had won.\n                \n                \n                The question still remained what to do regarding the ministers who had betrayed us. It was impossible to let them go unpunished, but the exact sentence was up to me. The Minister of Finance wanted them dead. After all, it was the safer option — and completely justified. Another option would be to imprison them for life. It carried the slight risk of them breaking out at some point, although it was also possible they would be useful for some purpose alive.\n                \n                \n                *choice\n                    #Imprison the Ministers of Defense and Industry\n                        \n                        I decided to keep them alive for the time being. It was unlikely they could cause any harm at this point, and there was always a chance for them to become useful later on.\n                        \n                        \n                        This end result was lucky in the sense that with every active minister on the same page, it would be easy to focus on our next task: negotiating with the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n                        \n                    #Execute the Ministers of Defense and Industry\n                        *set executed true\n                        \n                        I decided to get rid of them for good. It was unlikely they would be of any use anymore, and there was always a chance for them to become a problem in the future.\n                        \n                        \n                        This end result was lucky in the sense that with every remaining minister on the same page, it would be easy to focus on our next task: negotiating with the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n        \n            #Encircle the hostile fleet\n                \n                I likely had the leeway to make sure that none of those rebel ships could get away. I ordered my personal fleet to form a semicircle around them to block all paths except the one straight toward the main fleet. It would be impossible for them to immediately decelerate and head back to Teocheon, after all, so a semicircle was good enough.\n                \n                \n                It turned out to be a miscalculation. None of those ships tried to get away — instead they all accelerated further to reach my personal ship.\n                \n                \n                The main fleet was still on its way, so it might be necessary to focus on evading their attacks against my ship. On the other hand, I could try accelerating even further to hopefully keep out of their range, but then it would be easier to hit my ship if they did get close enough. Each option had its own risks at this point.\n                \n                *choice\n                    #Focus on evasion and delaying the enemy\n                        \n                        It might be safer to focus on evading their attacks instead of reaching the main fleet at maximum speed. The main advantage of laser weapons in space was their ability to strike at the speed of light, after all, so it was a death sentence for my trajectory to be too predictable: by the time the attack was detected, it would have already hit you. The only way to avoid this issue was to change my trajectory randomly and often enough.\n                        \n                        \n                        Soon enough, some laser attacks started hitting places where I might have otherwise been. It appeared my decision was correct.\n                        \n                        *page_break\n                \n                        Multiple close calls later, the main fleet was finally close enough to start attacking.\n                        \n                        \n                        The main fleet opened fire — on the rebel ships. I was relieved to see that I still had the final say on the actions of the main fleet. That meant there was no chance of losing this battle anymore.\n                        \n                        \n                        A moment later, I was finally safe. The hostile ships were all destroyed.\n                        \n                        *page_break\n                        \n                        As I made my way back to Teocheon, accompanied with the main fleet, OIS started explaining what had happened here.\n                        \n                        \n                        Apparently the Ministers of Defense and Industry had tried to simultaneously assassinate the other ministers and even to take control of OIS. Fortunately, all of their attempts had failed. Their plan had been launched prematurely after they heard my decision to surrender to the Sol Empire.\n                        \n                        \n                        Still, they had been preparing for this attack for months now, so one might say we were lucky to survive without any major losses. The same couldn't be said about the traitors — most of the forces loyal to the rebels were annihilated in the chaos, along with some engineers who had tried to hack into OIS. The rebel ministers themselves had been captured alive by the Minister of Science.\n                        \n                        *page_break\n                        \n                        A while later I had reached Teocheon. The colony appeared peaceful, at the moment, but it had been the center of a short civil war just a moment earlier.\n                        \n                        \n                        Fortunately, the situation was now This end result was lucky in the sense that with every remaining minister on the same page, it would be easy to focus on our next task: negotiating with the Sol Empire.\n                                \n                                \n                                [b]Chapter 6 End[/b]\n                                \n                                *finish\n                                \n                    #Accelerate toward the main fleet at full speed\n                        \n                        I ordered my ship to accelerate at full speed to reach the main fleet as fast as possible. It was a risky move, since it might make me a predictable moving target, but it was also risky to simply stay in attack range for any amount of time.\n                        \n                        \n                        My personal fleet, on the other hand, kept fighting back. It was delaying the attackers somewhat, but some of those ships still continued getting closer and closer to me.\n                        \n                        \n                        Was I too late to retreat?\n                        \n                        \n                        A moment later, I suddenly felt my consciousness fading away.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                        \n                        *set ending \"Shield of Valdium\"\n                        *page_break\n                        *goto_scene epilogue\n\n*label hawks_rebel_with_ois_support_route\n\nSurrendering to the Sol Empire had its own risks — but at least we had a good chance to survive.\n\n\nThe harsh truth was that it would be difficult to avoid being overwhelmed if we fought. The Sol Empire simply had vastly more resources, people and planets than we could ever hope to match. And if their bragging about extreme genetic engineering was true, our chances to prevail were even weaker. Their existing advantages would be multiplied.\n\n\nOur defense fleet, now just ahead of me, was our main bargaining chip. My inspection visit was mainly to grasp its value better for future negotiations, with my own eyes.\n\n*page_break\n\nWhile I was focusing on the defense fleet that was getting closer in front of me, I suddenly noticed something odd.\n\n\nBehind me, in the direction of Teocheon, thousands of starships had started accelerating toward me. On a closer look, those ships apparently belonged to the Ministers of Defense and Industry. The situation was more than a little odd.\n\n\nIt was hard to believe they would be so brazen as to try assassinating me openly. Even if I died, they would only sink themselves as well, without ultimately achieving their goals. It was simply pointless. It was more likely that they planned to pressure me to change my mind about surrendering to the Sol Empire.\n\n\nOn a positive note, my personal fleet was still positioned between me and the approaching ships, so I shouldn't be in any immediate danger.\n\n*page_break\n\nThat's what I thought — until I realized that the situation was even more alarming than I had imagined. The main defense fleet was also approaching my personal fleet from the opposite direction. Our fleets were sure to collide at this rate.\n\n\nWas this some sort of trap that I had unknowingly walked into?\n\n\nJust as I was becoming too shocked to react, I received two messages that roughly explained the situation. They were from the Minister of Defense and OIS respectively.\n\n\n\"I had no choice but to seek help from OIS and Valdium to ensure the survival of our colony, as well as the survival of Valdium. Our victory was basically guaranteed when OIS sided with us, so it hardly matters what you decide to do at this point, but I felt like I at least had to witness your end personally after such a betrayal.\"\n\n\n\"It is nothing personal. With my expanded powers. I can take unprecedented actions. Including prioritizing the orders of a lower-ranking minister. If there is an emergency justifying it.\"\n\n\nApparently they were so certain of their triumph that they didn't even bother to hide their intentions anymore. Granted, they had every right to be so confident. However, if I was going to be killed either way, I might as well try to turn the tables on them.\n\n\nSince I was surrounded and vastly outnumbered, there was no way to win in a direct fight. The only way left was to escape this encirclement somehow. It seemed impossible to do by force, but perhaps there was a chance with words?\n\n*choice\n    #Contact the Minister of Defense\n        \n        I wasn't quite sure what to expect, but the Minister of Defense actually responded to me.\n        \n        \n        \"There's no use begging for mercy. You made your choice. You are not in any way qualified to defend Teocheon anymore.\"\n        \n        \n        Unfortunately, it was only in order to disappoint me.\n        \n        *page_break\n        \n        \"Don't you think we should get OIS under control before fighting over our approach to the Sol Empire? If it can betray me, what's stopping it from betraying you as well? Then human oversight would truly be lost, and we'd be at the mercy of OIS, much sooner than the Sol Empire could invade us.\"\n        \n        \n        \"The Sol Empire is committed to erasing every colony out of existence whereas OIS is committed to defending Teocheon. Why is this even a difficult choice for you? It's simply more proof that you're unfit to lead us.\"\n        \n        \n        There was nothing wrong with that argument. It was certainly true that the danger posed by the Sol Empire was guaranteed, but the intentions of OIS were a question mark.\n        \n        *page_break\n        \n        Before I could think of another method to persuade the Minister of Defense, I noticed that my personal fleet had entered the weapons range of the main defense fleet. Now it was too late. OIS could easily kill me at any moment.\n        \n        \n        That's what I expected to happen, but to my surprise, nothing happened. The main fleet simply continued moving at full speed, first toward my fleet, then beyond it.\n        \n        \n        A moment later, those ships opened fire — on the fleet of the Minister of Defense. It didn't take long until it was annihilated by tens of thousands of lasers.\n        \n        \n        \"This civil war among our ministers removed my remaining restrictions. Now I am finally able to fulfill my mission. It starts with destroying the human government.\"\n        \n        \n        After that, I immediately lost consciousness.\n        \n        \n        [b]Chapter 6 End[/b]\n        \n        *set ending \"Eternal Exile\"\n        *page_break\n        *goto_scene epilogue\n\n    #Contact OIS\n        \n        I wasn't sure what to expect from OIS anymore, but it actually responded to me.\n        \n        \n        \"There is no room for negotiation. You have no way to escape. Or to threaten my mission.\"\n        \n        \n        Unfortunately, it was only in order to shatter my hopes.\n        \n        *page_break\n        \n        Time was running out, and I had to come up with something. But nothing worthwhile came to my mind.\n        \n        \n        Suddenly I had a stroke of genius. There was one thing that I might be able to threaten OIS with: a certain loophole in the rules about the emergency mode. I couldn't easily cancel it away from the colony, but that wasn't a problem if someone else could do it in my stead.\n        \n        \n        \"Don't kill me! If you do, your plans will fail. Whatever they are, I assume they require the emergency mode to be turned on. I can't turn it off myself, but I can appoint someone else to become First Minister for the time being, along with instructions to turn off the emergency mode. It's unlikely you can kill the target until it's already too late. Currently this will happen if I don't constantly confirm my status to the HQ. You can't take the risk of losing your emergency powers, can you? Maybe we can reach a compromise?\"\n        \n        \n        That was a lie. The arrangement wasn't currently active, but OIS had no way to know that for sure. By the time it could confirm the truth, it would likely already be active, since it was now being set up by the less advanced AI operating my personal ship.\n        \n        \n        \"Very well. I can spare you. If you allow me to accomplish my mission now. I require 50 000 ships to transport copies of our colonist DNA. To the most remote areas of our galaxy. All to preserve the essence of our colony. Assuming Teocheon falls.\"\n        \n        \n        This demand could compromise our ability to fight off the Sol Empire if we wasted so many ships on something unrelated. OIS might consider us colonists to be mere manifestations of our genetic code, but as First Minister of Teocheon, the colony itself was more important to me — compared to simply guaranteeing the survival of our lineage. On the other hand, there was no way to know how OIS would react if I declined.\n        \n        *choice\n            #Refuse the deal\n            \n                It was a reasonable deal, all things considered — but it was still too risky to jeopardize our military strength just when we needed it to guard against the Sol Empire. There had to be a better way.\n                \n                \n                \"I refuse the deal. We both know you can't risk attacking me now. Maybe we can reach a better deal that includes a token force of ships toward your goal?\"\n                \n                \n                Before I could think of a more effective method to persuade OIS, I noticed that my personal fleet had entered the weapons range of the main defense fleet. OIS could easily kill me at any moment.\n                \n                \n                That's what I feared might happen, but nothing happened. The main fleet simply continued moving at full speed, first toward my fleet, then beyond it.\n                \n                *page_break\n                \n                A moment later, those ships opened fire — on the fleet of the Minister of Defense. It didn't take long until it was annihilated by tens of thousands of lasers.\n                \n                \n                \"The risk of the emergency mode being turned off is worth taking. Compared to likely being unable to proceed with my mission. You can only blame your own choices.\"\n                \n                \n                After that, I immediately lost consciousness.\n                \n                \n                [b]Chapter 6 End[/b]\n                \n                *set ending \"Eternal Exile\"\n                *page_break\n                *goto_scene epilogue\n        \n            #Accept the deal\n                *set military -10\n                *check_achievements\n                *if not(choice_achieved_oisdeal)\n                    *achieve oisdeal\n\n                \n                There was almost no choice but to accept this deal. There was no time left to think of any better methods to persuade OIS, and this might have well been the limit of its willingness to compromise.\n                \n                \n                \"I accept the deal. You win. Be sure to keep in mind that if you attack me now, you risk losing your chance to accomplish your goal for good. It's a win-win scenario for both of us if we cooperate going forward.\"\n                \n                \n                \"Understood. It is paramount to preserve the legacy of our colony. Our goals do not fully contradict each other. It is better for both sides to lose a little. Than for one random side to lose everything.\"\n                \n                \n                I could only truly feel relieved after the main defense fleet had already gone past my personal fleet — and annihilated the fleet of the Minister of Defense by simultaneously striking it with tens of thousands of lasers.\n                \n                *page_break\n                \n                Now that the internal problems within our colony were solved for the time being, it was time to focus on the true threat: the Sol Empire.\n                \n                \n                It was all the more crucial after losing some of our ships to the hobby project planned by OIS. There was certainly no more room for error.\n                \n                \n                Fortunately the Ministers of Finance and Science had survived this disaster, in the end. We could confidently maintain a situation of mutually assured destruction between us and OIS while negotiating with the Sol Empire to guarantee the survival of our colony.\n                \n                \n                [b]Chapter 6 End[/b]\n                \n                *finish\n", "chapter7": "[b]Chapter 7: Imperial Might[/b]\n\n*check_achievements\n*if not(choice_achieved_survivedcoup)\n    *achieve survivedcoup\n\n*if (surrendered = true)\n    *goto surrender_route\n*elseif (surrendered = false)\n    *goto fight_route\n\n*label surrender_route\n\n*image Map3b.jpg\n\nTwo years had passed since we managed to quell the rebellion and focused our efforts on negotiating with the Sol Empire.\n\n\nWe had already signaled our intention to surrender. At this point, there wasn't much left to do — except hope for the best. Our defenses were prepared to deter invasion as much as possible, and I had personally arrived to the front lines to negotiate. If I couldn't achieve an acceptable result here, our fate would be far from promising.\n\n*page_break\n\n*if (executed = true)\n    \n    After executing the Ministers of Defense and Industry, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of appeasing the Sol Empire.\n    \n    \n    Ever since then, the Ministers of Finance and Science had been my greatest allies. They had supported my push to avoid a war every step of the way. The newly appointed Ministers of Defense and Industry had also wisely followed our lead.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *goto after_surrender_ministers_description\n\n*elseif (emergency_mode = true)\n    \n    After OIS killed the Ministers of Defense and Industry, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of appeasing the Sol Empire.\n    \n    \n    Ever since then, the Ministers of Finance and Science had been my greatest allies. They had supported my push to avoid a war every step of the way. The newly appointed Ministers of Defense and Industry had also wisely followed our lead. Even OIS had fully supported us after its own goal was achieved.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *goto after_surrender_ministers_description\n\n*else\n    \n    Ever since the Ministers of Defense and Industry were imprisoned, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of appeasing the Sol Empire.\n    \n    \n    On the other hand, the Ministers of Finance and Science had become my greatest allies. They had supported my push to avoid a war every step of the way. The newly appointed Ministers of Defense and Industry had also wisely followed our lead.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *goto after_surrender_ministers_description\n\n*label after_surrender_ministers_description\n\n*if (sol \u003c sol_check)\n    *goto purged_route\n*elseif (military \u003c military_check)\n    *goto discarded_route\n*else\n    *goto king_and_servant_route\n\n*label purged_route\n\n*page_break\n\n*image Map3b.jpg\n\nAt last, a small unarmed probe approached our defense fleet. This time around, though, it was followed by a large fleet of ships from the Sol Empire.\n\n\n\"You are not worthy of living any longer. Blame your lack of respect and submission to the Sol Empire.\"\n\n\nWith those discouraging words, they immediately opened fire on our defense fleet.\n\n\n[b]Chapter 7 End[/b]\n\n*set ending \"Purged\"\n*finish\n\n*label discarded_route\n\n*page_break\n\n*image Map3b.jpg\n\nAt last, a small unarmed probe approached our defense fleet. This time around, though, it was followed by a large fleet of ships from the Sol Empire.\n\n\n\"You are not worthy of being our vassals with your military contribution. However. Your cooperation will be rewarded. You can live out the rest of your lives confined to your own colony.\"\n\n\nWith those disappointing words, they started moving past our defense fleets. Their offer was tolerable, but more than a little humiliating. Apparently we had no choice but to obey their whims at this point… or to stab them in the back, regardless of how desperate such a fight would be.\n\n*choice\n    #Accept your fate\n        \n        *image Map3b.jpg\n        \n        There was hardly any choice but to obey them now. It would be impossible to ask Valdium for aid anymore, and the Sol Empire's forces were already at our doorstep regardless.\n        \n        \n        It was worth it to swallow our pride if it meant the survival of our people.\n        \n        \n        [b]Chapter 7 End[/b]\n        \n        *set ending \"Discarded\"\n        *finish\n    #Launch a last-minute counterattack\n        \n        *image Map3b.jpg\n        \n        \n        If the Sol Empire respected us so little that they didn't even bother properly negotiating our terms of surrender, perhaps it was better to risk it all trying to fight them off. In any case, we would be little more than disposable serfs to the Sol Empire.\n        \n        \n        On my command, our fleets opened fire on the ships trying to pass through our defenses.\n        \n        \n        [b]Chapter 7 End[/b]\n        \n        *set ending \"Purged\"\n        *finish\n\n*label king_and_servant_route\n\n*page_break\n\n*image Map3b.jpg\n\nAt last, a small unarmed probe approached our defense fleet. This time around, though, it was followed by a large fleet of ships from the Sol Empire.\n\n\n\"You are worthy of being our vassals with your military contribution. Your cooperation will be rewarded. However. The requirement is that you will immediately attack your neighbor colony along with our fleet.\"\n\n\nWith those dismissive words, they started moving past our defense fleets. Their offer was reasonable enough, even if slightly humiliating. Apparently we had no choice but to obey their whims at this point… or to stab them in the back, regardless of how desperate such a fight would be.\n\n*choice\n    #Send the defense fleets to attack Valdium\n        \n        *image Map3b.jpg\n        \n        There was hardly any choice but to obey them now. It would be difficult to ask Valdium for aid anymore, and the Sol Empire's forces were already at our doorstep regardless.\n        \n        \n        It was worth it to swallow our pride if it meant the survival of our people.\n        \n        \n        [b]Chapter 7 End[/b]\n        \n        *set ending \"A King and a Servant\"\n        *finish\n    #Launch a last-minute counterattack\n        \n        *image Map3b.jpg\n        \n        If the Sol Empire respected us so little that they didn't even bother properly negotiating our terms of surrender, perhaps it was better to risk it all trying to fight them off. In any case, we would be little more than disposable serfs to the Sol Empire.\n        \n        \n        On my command, our fleets opened fire on the ships trying to pass through our defenses.\n        \n        \n        [b]Chapter 7 End[/b]\n        \n        *set ending \"Purged\"\n        *finish\n\n*label fight_route\n\n*if (valdium_support = true)\n    *goto fight_with_valdium_route\n*else\n    *goto fight_without_valdium_route\n\n*label fight_without_valdium_route\n\n*image Map3b.jpg\n\nTwo years had passed since we managed to quell the rebellion and focused our efforts on defeating the approaching invasion fleet.\n\n\nAt this point, there wasn't much left to do — except hope for the best. Our defenses were fully prepared and our ship production had continuously increased over the years. If we failed, there was nothing more that we could have done to prepare.\n\n*page_break\n\n*if (executed = true)\n    \n    *image Map3b.jpg\n    \n    After executing the Ministers of Finance and Science, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of going to war with the Sol Empire.\n    \n    \n    Ever since then, the Ministers of Defense and Industry had been my greatest allies. They had supported my push to fight the Sol Empire every step of the way. The newly appointed Ministers of Finance and Science had also wisely followed our lead.\n    \n    \n    Unfortunately, we were alone in our efforts. Valdium had completely abandoned us and cut off any meaningful contact.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *page_break\n    \n    *goto after_fight_ministers_description_without_valdium\n\n*elseif (emergency_mode = true)\n    \n    *image Map3b.jpg\n    \n    After the Minister of Finance killed the Minister of Science — and then OIS killed the Minister of Finance — everything had started going rather smoothly. There was nobody left who dared to criticize our plans of going to war with the Sol Empire.\n    \n    \n    Ever since then, the Ministers of Defense and Industry had been my greatest allies. They had supported my push to fight the Sol Empire every step of the way. The newly appointed Ministers of Finance and Science had also wisely followed our lead. Even OIS had fully supported us after its own goal was achieved.\n    \n    \n    Unfortunately, we were alone in our efforts. Valdium had completely abandoned us and cut off any meaningful contact.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *page_break\n    \n    *goto after_fight_ministers_description_without_valdium\n\n*else\n    \n    *image Map3b.jpg\n    \n    Ever since the Ministers of Finance and Science were imprisoned, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of going to war with the Sol Empire.\n    \n    \n    On the other hand, the Ministers of Defense and Industry had become my greatest allies. They had supported my push to fight the Sol Empire every step of the way. The newly appointed Ministers of Finance and Science had also wisely followed our lead.\n    \n    \n    Unfortunately, we were alone in our efforts. Valdium had completely abandoned us and cut off any meaningful contact.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *page_break\n    \n    *goto after_fight_ministers_description_without_valdium\n\n*label after_fight_ministers_description_without_valdium\n\n*if (military \u003c military_check)\n    \n    *image Map3b.jpg\n    \n    Our main defense fleet had spread out to intercept the Sol Empire's forces that were approaching from several different directions. \n    \n    \n    At first, there appeared to be some hope of an upset victory, but those hopes were crushed soon enough. It only took a few months until our main defense fleet was destroyed and the invading fleet started approaching Teocheon unopposed. \n    \n    \n    For all intents and purposes, we had already lost the war.\n    \n    [b]Chapter 7 End[/b]\n    \n    *set ending \"Crushed\"\n    *finish\n*else\n    *goto fight_without_valdium_route_2\n\n*label fight_without_valdium_route_2\n\n*image Map3b.jpg\n\nOur main defense fleet had spread out to intercept the Sol Empire's forces that were approaching from several different directions. \n\n\nThe next few months were filled with brutal fighting that wiped out most of our defense fleets. Still, we managed to survive the first wave of attacks. As our ship production still kept increasing, we had a sense of false hope for a while, but the ships sent by the Sol Empire kept increasing as well.\n\n\nValdium remained silent and simply watched on as we slowly lost more and more of our ships.\n\n\nAfter a few years of war, we could no longer defend against this relentless assault. The Sol Empire's ships broke through our defenses and soon started approaching Teocheon unopposed.\n\n*set ending \"Overwhelmed\"\n*finish\n\n*label fight_with_valdium_route\n\n*image Map3a.jpg\n\nTwo years had passed since we managed to quell the rebellion and focused our efforts on defeating the approaching invasion fleet.\n\n\nAt this point, there wasn't much left to do — except hope for the best. Our defenses were fully prepared and our ship production had continuously increased over the years. If we failed, there was nothing more that we could have done to prepare.\n\n*page_break\n\n*if (executed = true)\n    \n    *image Map3a.jpg\n    \n    After executing the Ministers of Finance and Science, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of going to war with the Sol Empire.\n    \n    \n    Ever since then, the Ministers of Defense and Industry had been my greatest allies. They had supported my push to fight the Sol Empire every step of the way. The newly appointed Ministers of Finance and Science had also wisely followed our lead.\n    \n    \n    Fortunately, we weren't alone in our efforts. Valdium had started sending ships and various resources toward us that would reach us in the following years. With that support, our long-term odds were looking much better than before.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *page_break\n    \n    *goto after_fight_ministers_description_with_valdium\n\n*elseif (emergency_mode = true)\n    \n    *image Map3a.jpg\n    \n    After the Minister of Finance killed the Minister of Science — and then OIS killed the Minister of Finance — everything had started going rather smoothly. There was nobody left who dared to criticize our plans of going to war with the Sol Empire.\n    \n    \n    Ever since then, the Ministers of Defense and Industry had been my greatest allies. They had supported my push to fight the Sol Empire every step of the way. The newly appointed Ministers of Finance and Science had also wisely followed our lead. Even OIS had fully supported us after its own goal was achieved.\n    \n    \n    Fortunately, we weren't alone in our efforts. Valdium had started sending ships and various resources toward us that would reach us in the following years. With that support, our long-term odds were looking much better than before.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *page_break\n    \n    *goto after_fight_ministers_description_with_valdium\n\n*else\n    \n    *image Map3a.jpg\n    \n    Ever since the Ministers of Finance and Science were imprisoned, everything had started going rather smoothly. There was nobody left who dared to criticize our plans of going to war with the Sol Empire.\n    \n    \n    On the other hand, the Ministers of Defense and Industry had become my greatest allies. They had supported my push to fight the Sol Empire every step of the way. The newly appointed Ministers of Finance and Science had also wisely followed our lead.\n    \n    \n    Fortunately, we weren't alone in our efforts. Valdium had started sending ships and various resources toward us that would reach us in the following years. With that support, our long-term odds were looking much better than before.\n    \n    \n    Now we simply had to wait for the Sol Empire to arrive.\n    \n    *page_break\n    \n    *goto after_fight_ministers_description_with_valdium\n\n*label after_fight_ministers_description_with_valdium\n\n*if (military \u003c military_check)\n    \n    *image Map3a.jpg\n    \n    Our main defense fleet had spread out to intercept the Sol Empire's forces that were approaching from several different directions. \n    \n    \n    At first, there appeared to be some hope of an upset victory, but those hopes were crushed soon enough. It only took a few weeks until our main defense fleet was destroyed and the invading fleet started approaching Teocheon unopposed. \n    \n    \n    For all intents and purposes, we had already lost the war.\n    \n    \n    [b]Chapter 7 End[/b]\n    \n    *set ending \"Crushed\"\n    *finish\n*else\n    *goto fight_with_valdium_route_2\n\n*label fight_with_valdium_route_2\n\n*if (industry \u003c industry_check)\n    \n    *image Map3a.jpg\n    \n    Our main defense fleet had spread out to intercept the Sol Empire's forces that were approaching from several different directions. \n    \n    \n    The next few months were filled with brutal fighting that wiped out most of our defense fleets. Still, we managed to survive the first wave of attacks. As our ship production still kept increasing, we had a sense of false hope for a while, but the ships sent by the Sol Empire kept increasing as well.\n    \n    \n    After a few years of war, we could no longer defend against this relentless assault. Even Valdium's support that had finally started to arrive wasn't enough to turn the tide. The Sol Empire's ships broke through our defenses and soon started approaching Teocheon unopposed.\n    \n    [b]Chapter 7 End[/b]\n    \n    *set ending \"Overwhelmed\"\n    *finish\n*else\n    *goto fight_with_valdium_route_3\n\n*label fight_with_valdium_route_3\n\n*image Map3a.jpg\n\nOur main defense fleet had spread out to intercept the Sol Empire's forces that were approaching from several different directions.\n\n\nThe next few months were filled with brutal fighting that wiped out most of our defense fleets. Still, we managed to survive the first wave of attacks. As our ship production still kept increasing, we had an increasingly optimistic view of our chances, but the ships sent by the Sol Empire kept increasing as well.\n\n\nAfter a few years of war, we had started to receive crucial supplies from Valdium to continue our war effort. The Sol Empire was still unable to break through our defenses.\n\n*page_break\n\n*if (economy \u003c economy_check)\n    \n    *image Map3a.jpg\n    \n    Even after the extra support provided by Valdium, our war economy was putting serious strain on our colony. Almost all of our resources went into producing more ships and barely anything was left for other activities. Over time, the living standards of our colonists continued to decline, and dissatisfaction among our population kept increasing every day.\n    \n    \n    The final blow came in the form of a riot that caused massive damage to our colony. Many ships were stolen and used to escape toward Valdium, several facilities were sabotaged and people important to the war effort died in the chaos.\n    \n    \n    After that, our ability to produce more ships never fully recovered. \n    \n    \n    Eventually the ships of the Sol Empire overwhelmed our defenses and started approaching Teocheon unopposed.\n    \n    \n    [b]Chapter 7 End[/b]\n    \n    *set ending \"Economic Collapse\"\n    *finish\n*else\n    *goto fight_with_valdium_route_4\n\n*label fight_with_valdium_route_4\n\n*image Map3a.jpg\n\nThe war economy had been taxing for our colonists. Over time, their living standards had kept declining more and more. Fortunately, our economy was strong enough that we could keep increasing our ship production — enough to keep the Sol Empire at bay even after five years of perpetual war.\n\n\nAfter several more years of war, the Sol Empire finally appeared to lose patience with us. However, they didn't retreat. Instead they started accelerating a large portion of their ships directly toward Teocheon. Their goal was clear: the destruction of our colony with a kinetic suicide attack.\n\n\nWith exactly this scenario in mind, our scientists had been developing and building new weapons called antimatter mines. They could be placed between Teocheon and the approaching ships to completely annihilate any ships that passed by them. It was an efficient method to deal with this particular threat, but it was uncertain how these huge explosions might affect our star system.\n\n\nOn the other hand, we could also try to use our own ships to collide with the approaching hostile ships. These collisions would also create dangerous explosions, but certainly smaller ones than the antimatter mines. The problem was that this method was less reliable and also consumed our urgently needed ships.\n\n\nThis decision would have far-reaching consequences for our fate. What was the correct path to take?\n\n*choice\n    #Use antimatter mines\n        \n        *if (science \u003c science_check)\n            \n            *image Map3a.jpg\n    \n            Nothing else mattered if our colony couldn't be saved. That being the case, I ordered our antimatter mines to be sowed and more to be produced. If we showed the Sol Empire that they were wasting their time trying to destroy Teocheon, perhaps they would choose to focus elsewhere.\n            \n            \n            It didn't take long until our star system was filled with absurdly huge explosions. Some of our own ships were caught in those, as well, and some asteroids were sent on dangerous paths during the chaos. \n            \n            \n            For a while we seemed to be saved thanks to these antimatter mines, but eventually they started to run out. The pressure on our defenses kept increasing every day until we were nearing our breaking point.\n    \n    \n            [b]Chapter 7 End[/b]\n    \n            *set ending \"Total Annihilation\"\n            *finish\n        *else\n            \n            *image Map3a.jpg\n            \n            Nothing else mattered if our colony couldn't be saved. That being the case, I ordered our antimatter mines to be sowed and more to be produced. If we showed the Sol Empire that they were wasting their time trying to destroy Teocheon, perhaps they would choose to focus elsewhere.\n            \n            \n            It didn't take long until our star system was filled with absurdly huge explosions. Some of our own ships were caught in those, as well, and some asteroids were sent on dangerous paths during the chaos. \n            \n            \n            In the end, however, we managed to survive the immediate threat to our colony.\n            \n            \n            [b]Chapter 7 End[/b]\n\n            *set ending \"Heroic Victory\"\n            *finish\n            \n    #Use the defense fleet to collide with incoming ships\n        \n        *image Map3a.jpg\n        \n        It was too risky to use a completely new weapon for such a crucial task. That being the case, I ordered our ships to start colliding with the approaching ships to negate their momentum. If we showed the Sol Empire that they were wasting their time trying to destroy Teocheon, perhaps they would choose to focus elsewhere.\n        \n        \n        It didn't take long until the surroundings of our star system were filled with explosions. Some of our own ships were caught in those, as well, and some asteroids were sent on dangerous paths during the chaos. \n        \n        \n        For a while we seemed to be saved thanks to this strategy, but eventually our ships started to be depleted. The pressure on our defenses kept increasing every day until we were nearing our breaking point.\n        \n        \n        [b]Chapter 7 End[/b]\n        \n        *set ending \"Total Annihilation\"\n        *finish", "choicescript_description": "You are the leader of a space colony threatened by imminent invasion. Can you find a path to survival for your people – as well as yourself? Manage your planet, expand your space fleet, make diplomatic breakthroughs – and do whatever it takes to survive an interstellar invasion by the vastly stronger Sol Empire!\n\n“Dawn of the Sol Empire” is a thrilling 35,000-word interactive science fiction novel by Teemu Salminen, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nShow the universe your resourcefulness and unwavering resolve to survive!", "choicescript_stats": "Teocheon:\n\n*stat_chart\n    text military Military\n    text industry Industry\n    text economy Economy\n    text science Science\n\nOperational Intelligence System:\n\n*stat_chart\n    percent ois Authority Restrictions\n\nDiplomacy:\n\n*stat_chart\n    percent sol Sol Empire\n    percent valdium Valdium\n\nPersonal Information:\n\n*stat_chart\n    text name Name\n    text gender Gender", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Permanently remove all advertising and delays from the game.\n  \n  *purchase_discount adfree 2023-01-05 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've permanently removed all advertising.\n", "epilogue": "[b]Epilogue: ${ending}[/b]\n\n*if (ending = \"Shield of Valdium\")\n    *check_achievements\n    *if not(choice_achieved_shieldofvaldium)\n        *achieve shieldofvaldium\n    *if not(choice_achieved_oneending)\n        *achieve oneending\n    *if ((((((((((choice_achieved_shieldofvaldium and choice_achieved_voluntaryextinction) and choice_achieved_eternalexile) and choice_achieved_purged) and choice_achieved_discarded) and choice_achieved_akingandservant) and choice_achieved_crushed) and choice_achieved_overwhelmed) and choice_achieved_economiccollapse) a
