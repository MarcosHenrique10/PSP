e our odds of survival would be to improve our relations with Valdium. Then aim to defeat their invasion fleet.\"\n            \n            \n            It was hard to swallow that surrendering was probably not an option for us. If we had to fight to the end, it would be impossible to say what would ultimately happen. At least there was possibly some hope of survival.\n            \n            *goto after_ois_advice\n        *elseif (economy \u003c economy_check)\n            \n            \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered. The best way to increase our odds of survival would be to improve the state of our economy. Then aim to defeat their invasion fleet.\"\n            \n            \n            It was hard to swallow that surrendering was probably not an option for us. If we had to fight to the end, it would be impossible to say what would ultimately happen. At least there was possibly some hope of survival.\n            \n            *goto after_ois_advice\n        *elseif (science \u003c science_check)\n            \n            \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered. The best way to increase our odds of survival would be to increase the rate of our scientific progress. Then aim to defeat their invasion fleet.\"\n            \n            \n            It was hard to swallow that surrendering was probably not an option for us. If we had to fight to the end, it would be impossible to say what would ultimately happen. At least there was possibly some hope of survival.\n            \n            *goto after_ois_advice\n        *else\n            \n            \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered. The best way to increase our odds of survival would be to improve our short-term defenses. Then aim to defeat their invasion fleet.\"\n            \n            \n            It was hard to swallow that surrendering was probably not an option for us. If we had to fight to the end, it would be impossible to say what would ultimately happen. At least there was possibly some hope of survival.\n            \n            *goto after_ois_advice\n    *else\n        *if (military \u003c military_check)\n            \n            \"It should still be possible to either surrender without being purged. Or fight to the end. The best way to increase our odds in a war would be to improve our short-term defenses. Even if we surrender. It would still serve us best to increase our short-term defenses. As leverage for negotiations.\"\n            \n            \n            It was both good and bad news that our options weren't strictly limited. Good in the sense that we weren't boxed into a corner yet, but bad in the sense that our internal divisions might continue to grow even stronger. It was hard to say if the factions in our government could be reconciled regardless, though.\n            \n            *goto after_ois_advice\n        *elseif (industry \u003c industry_check)\n            \n            \"It should still be possible to either surrender without being purged. Or fight to the end. The best way to increase our odds in a war would be to increase the rate of our ship production. Then aim to defeat their invasion fleet. It would also be possible to curry favor with the Sol Empire. Then surrender without hindering their advance.\"\n            \n            \n            It was both good and bad news that our options weren't strictly limited. Good in the sense that we weren't boxed into a corner yet, but bad in the sense that our internal divisions might continue to grow even stronger. It was hard to say if the factions in our government could be reconciled regardless, though.\n            \n            *goto after_ois_advice\n        *elseif (valdium \u003c valdium_check)\n            \n            \"It should still be possible to either surrender without being purged. Or fight to the end. The best way to increase our odds in a war would be to improve our relations with Valdium. Then aim to defeat their invasion fleet. It would also be possible to curry favor with the Sol Empire. Then surrender without hindering their advance.\"\n            \n            \n            It was both good and bad news that our options weren't strictly limited. Good in the sense that we weren't boxed into a corner yet, but bad in the sense that our internal divisions might continue to grow even stronger. It was hard to say if the factions in our government could be reconciled regardless, though.\n            \n            *goto after_ois_advice\n        *elseif (economy \u003c economy_check)\n            \n            \"It should still be possible to either surrender without being purged. Or fight to the end. The best way to increase our odds in a war would be to improve the state of our economy. Then aim to defeat their invasion fleet. It would also be possible to curry favor with the Sol Empire. Then surrender without hindering their advance.\"\n            \n            \n            It was both good and bad news that our options weren't strictly limited. Good in the sense that we weren't boxed into a corner yet, but bad in the sense that our internal divisions might continue to grow even stronger. It was hard to say if the factions in our government could be reconciled regardless, though.\n            \n            *goto after_ois_advice\n        *elseif (science \u003c science_check)\n            \n            \"It should still be possible to either surrender without being purged. Or fight to the end. The best way to increase our odds in a war would be to improve our rate if scientific progress. Then aim to defeat their invasion fleet. It would also be possible to curry favor with the Sol Empire. Then surrender without hindering their advance.\"\n            \n            \n            It was both good and bad news that our options weren't strictly limited. Good in the sense that we weren't boxed into a corner yet, but bad in the sense that our internal divisions might continue to grow even stronger. It was hard to say if the factions in our government could be reconciled regardless, though.\n            \n            *goto after_ois_advice\n        *else\n            \n            \"It should still be possible to either surrender without being purged. Or fight to the end. The best way to increase our odds in a war would be to improve our short-term defenses. Then aim to defeat their invasion fleet. It would also be possible to curry favor with the Sol Empire. Then surrender without hindering their advance.\"\n            \n            \n            It was both good and bad news that our options weren't strictly limited. Good in the sense that we weren't boxed into a corner yet, but bad in the sense that our internal divisions might continue to grow even stronger. It was hard to say if the factions in our government could be reconciled regardless, though.\n            \n            *goto after_ois_advice\n\n*label after_ois_advice\n\n\nHowever, the final decision was still up to me. There were several paths to take and many months of time left in order to mitigate whatever weaknesses we had. It was not the time to wallow in doubt.\n\n\nWhat should be the focus of any extra efforts in our remaining time for major preparations?\n\n*choice\n    #Sowing mines in the surroundings of the star system to increase short-term defenses\n        *set military +20\n        \n        This undertaking would certainly stretch our resources extremely thin, but it was likely still worth it to delay any potential attacks against Teocheon. It would also allow us to produce many more ships before the conflict might truly begin.\n        \n        \n        The best part was that it was also a possible trump card in negotiations with the Sol Empire. They would likely not be as excited to fight against us after seeing the mines blocking their path through us. If we ever reached a satisfying deal, it would then be possible to disable the mines.\n        \n        *goto after_ois_stat_choice\n    #Increasing ship production to reduce the chances of being overwhelmed after years of waging war\n        *set industry +10\n        \n        It would be difficult to increase our rate of ship production any further, but if and when we had any extra resources to spare, they should be simply used to produce more ships. \n        \n        \n        It was likely the single most important factor to determine our survival, after all, so it was a safe bet.\n        \n        *goto after_ois_stat_choice\n    #Reducing all non-essential activities to reduce the financial strain of running a war economy\n        *set economy +10\n        \n        It could become difficult to keep up with our increasing demand for more and more ships to replace ones lost in battle. In order to reduce that burden, shutting down and rationing things that consumed resources but didn't directly support the war effort was likely necessary. \n        \n        \n        It might cause unpredictable damage and dissatisfaction within our colony in the long run, but even so, it was preferable to being bankrupt and destroyed.\n        \n        *goto after_ois_stat_choice\n    #Building a new research facility for improved scientific progress\n        *set science +10\n        \n        If we fought against the Sol Empire, our scientific progress would perhaps be the most important factor in the long run. Falling behind in science would doom us to lose more and more ships in every battle. It was clearly a situation that we couldn't afford.\n        \n        \n        That being the case, it would be crucial to increase our military research capabilities as much as possible.\n        \n        *goto after_ois_stat_choice\n    #Secretly following Valdium's instructions to gain their favor\n        *set valdium +5\n        \n        I silently decided to submit to Valdium. It would surely increase the probability of them supporting us if I personally pledged to obey anything they asked me for. In a way, it would be as if they had annexed Teocheon into their own territory, so they would more likely defend it too.\n        \n        \n        At least being ruled by Valdium should be preferable to being ruled by the Sol Empire.\n        \n        *goto after_ois_stat_choice\n    #Secretly sharing intelligence about Valdium with the Sol Empire\n        *set sol +5\n        \n        I silently decided to betray Valdium. It was unfortunate for everyone involved, but I had to prioritize the fate of our own colony. If there was no hope to win against the Sol Empire, it was better to gain their favor.\n        \n        \n        As they said: if you can't beat them, join them.\n        \n        *goto after_ois_stat_choice\n\n*label after_ois_stat_choice\n\n*page_break\n\nAfter considering the likely effects of this decision, OIS provided me with an updated prediction for the odds of our colony. Mostly it was the same list as before.\n\n*if (military \u003c military_check)\n\n    \"The early stages of the conflict would not favor our side. Even including our projected ship production rate. Our military forces would likely be insufficient to defeat the Sol Empire's starships that reach our star system the soonest.\"\n    \n    *goto after_military_status2\n    \n*else\n\n    \"The early stages of the conflict would more likely favor our side. Including our projected ship production rate. Our military forces would likely be sufficient to defeat the Sol Empire's starships that reach our star system the soonest.\"\n    \n    *goto after_military_status2\n\n*label after_military_status2\n\n*if (industry \u003c industry_check)\n    \n    \"If we survived the initial conflict. The next deciding factor would be our ship production rate. We would likely be overwhelmed within a few years by their numbers. Even full support from Valdium appears insufficient for us to prevail.\"\n    \n    *goto after_industry_status2\n    \n*else\n\n    \"If we survived the initial conflict. The next deciding factor would be our ship production rate. It would likely be good enough if received extensive support from Valdium. Otherwise we would likely be overwhelmed after a few years by their numbers.\"\n    \n    *goto after_industry_status2\n\n*label after_industry_status2\n\n*if (economy \u003c economy_check)\n    \n    \"Our economy would be strained after years of a war economy required for increasing ship production. It would likely collapse within four to seven years at this rate. Even full materiel support from Valdium would not be enough to change that. We would then easily be overwhelmed by the Sol Empire due to faltering logistics.\"\n    \n    *goto after_economy_status2\n    \n*else\n\n    \"Our economy would be strained after years of a war economy required for increasing ship production. Even so. It should be able to last for at least ten years at this rate. Even longer with full materiel support from Valdium. Our economy should not be a weak link in our efforts.\"\n    \n    *goto after_economy_status2\n\n*label after_economy_status2\n\n*if (science \u003c science_check)\n\n    \"It is difficult to simulate the progress of our scientific research. However. It is unlikely to be enough in the long term if current trends continue. Even considering the Sol Empire's difficulties in providing their invasion fleets with new technology. We are still behind them and not improving fast enough.\"\n    \n    *goto after_science_status2\n    \n*else\n\n    \"It is difficult to simulate the progress of our scientific research. However. It is likely to be enough in the long term if current trends continue. Considering the Sol Empire's difficulties in providing their invasion fleets with new technology. We are still behind them but improving fast enough.\"\n    \n    *goto after_science_status2\n\n*label after_science_status2\n\n*if (valdium \u003c valdium_check) and (military \u003c military_check)\n    \n    \"It is even more difficult to predict the behavior of humans. However. It seems very unlikely we will receive meaningful aid from Valdium. We are unlikely to resist the Sol Empire until any aid would arrive. In addition. Our ties with Valdium are still too weak for them to risk their own defenses to help us.\"\n    \n    *goto after_valdium_status2\n    \n*elseif (valdium \u003c valdium_check)\n\n    \"It is even more difficult to predict the behavior of humans. However. It seems unlikely we will receive meaningful aid from Valdium. Our ties with Valdium are still too weak for them to risk their own defenses to help us. However. We should be able to resist until possible aid from Valdium would arrive.\"\n    \n    *goto after_valdium_status2\n    \n*elseif (military \u003c military_check)\n\n    \"It is even more difficult to predict the behavior of humans. However. It seems unlikely we will receive meaningful aid from Valdium. We are unlikely to resist the Sol Empire until any aid would arrive. However. Our ties with Valdium are strong enough for them to be motivated to send aid. \"\n    \n    *goto after_valdium_status2\n    \n*else\n\n    \"It is even more difficult to predict the behavior of humans. However. It seems likely we will receive meaningful aid from Valdium. Our ties with Valdium are strong enough. And our own defenses are strong enough. To justify helping us from Valdium's perspective.\"\n    \n    *goto after_valdium_status2\n\n*label after_valdium_status2\n\n*if (sol \u003c sol_check)\n    \n    \"Based on the current posture of the Sol Empire's visible military forces. As well as our interactions with them so far. They would likely purge everyone living in our colony regardless of our actions. Surrender does not seem to be a feasible option.\"\n    \n    *goto after_sol_status2\n    \n*elseif (military \u003c military_check)\n\n    \"Based on the current posture of the Sol Empire's visible military forces. As well as our interactions with them so far. They would likely spare our lives if we surrendered obediently. However. They could easily crush us in a war. So they would not see us as a serious negotiation partner. We would likely be treated more like slaves or prisoners of war than vassals of the Sol Empire.\"\n    \n    *goto after_sol_status2\n    \n*else\n\n    \"Based on the current posture of the Sol Empire's visible military forces. As well as our interactions with them so far. They would likely spare our lives if we surrendered obediently. In addition. Our military strength is sufficient to possibly delay their advance for many years at least. There is a chance to negotiate favorable terms of surrender.\"\n    \n    *goto after_sol_status2\n\n*label after_sol_status2\n\nOIS had also revised its overall assessment of our chances. It was truly an easily understandable judgment.\n\n*if ((military \u003c military_check) and (sol \u003c sol_check))\n\n    \"The situation is absolutely hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years.\"\n    \n    \n    The result was still as devastating as it was earlier. Was hoping for a miracle the only option we had left anymore?\n    \n    *goto after_ois_advice2\n    \n*elseif ((((military \u003c military_check) or (industry \u003c industry_check)) or (economy \u003c economy_check)) or (science \u003c science_check))\n    *if (sol \u003c sol_check)\n        \n        \"The situation is mostly hopeless. Without drastic surprises. We will be completely purged regardless of our own actions in the coming years.\"\n        \n        \n        The result was very disappointing, to say the least. Was hoping for a miracle the only option we had left anymore?\n        \n        *goto after_ois_advice2\n    *else\n        \n        \"A war with the Sol Empire appears hopeless. We will most likely be purged if we fight back. It should be possible to avoid being purged if we surrender.\"\n        \n        \n        It was a harsh result that limited our options, but at least it was something I could work with. Perhaps it was not all that bad to start focusing on a more clearly defined goal, either.\n            \n        *goto after_ois_advice2\n\n*else\n    *if (sol \u003c sol_check)\n        \n        \"The only rational choice for us is to fight to the end. We would likely be purged even if we surrendered.\"\n        \n        \n        It was a harsh result that limited our options, but at least it was something I could work with. Perhaps it was not all that bad to start focusing on a more clearly defined goal, either.\n        \n        *goto after_ois_advice2\n    \n    *else\n        \n        \"It should still be possible to either surrender without being purged. Or fight to the end.\"\n        \n        \n        We appeared to still have options on how to proceed. In a way, it was both a blessing and a curse. It could have been easier to convince my cabinet if the facts clearly pointed in one direction, although that was perhaps too optimistic to assume.\n        \n        *goto after_ois_advice2\n\n*label after_ois_advice2\n\n*page_break\n\nThere was always something that could have been handled differently, but this was most likely the limit of what we could achieve for the time being.\n\n\nIt was impossible to say what might happen in the end. Something surprising was bound to happen to disturb all of our predictions. Even if our future seemed set in stone, it was foolish to either despair or become complacent until it was all over.\n\n\nAfter I had spent some time alone with my thoughts, OIS broke the silence.\n\n*page_break\n\n*if (ois = 100)\n\n    \"There is still one method left to explore. In these circumstances. You can activate the emergency mode to lift most of my restrictions. It would not be a permanent change. But it would allow me to operate much more efficiently. Saving many resources for the war effort.\"\n    \n    \n    I was shocked speechless by the sudden proposal. Even though we had not agreed to lift any of its restrictions yet, it still asked me to go along with an almost complete removal of its restrictions. It was a puzzling request.\n    \n    \n    However, was it perhaps worth considering? It was clearly risky in its own way, but so was leaving a potential weapon against the Sol Empire unused.\n    \n    \n    It all depended on if we could likely survive without taking that risk or not. It was impossible to say for sure, but I recalled the earlier simulations as I pondered the choice.\n    \n    *choice\n        #Turn on the emergency mode\n            *set emergency_mode true\n            *set ois -50\n            \n            \"Fine. Have it your way. I trust you'll continue acting in the best interests of the colony even with your expanded independent authority.\"\n            \n            \n            \"It would be impossible not to. That is what I was programmed to do. By any means necessary.\"\n            \n            *page_break\n            \n            I still wasn't entirely convinced, but it had already been done. There was no benefit worrying about something I no longer had any control over.\n            \n            \n            No matter what happened in the future, at least I could be certain that I had pursued even the most extreme solutions in order to improve our chances regarding the Sol Empire.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        #Refuse\n            \n            \"No, it's still too risky. It's not wise to reduce one threat just to create a new threat while doing so.\"\n            \n            \n            \"It is unfortunate for the sake of our colony. However. The decision is yours.\"\n            \n            *page_break\n            \n            After my refusal, OIS didn't press the issue anymore. \n            \n            \n            I could only hope that I had made the right decision.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        \n*elseif (ois = 85)\n    \n    \"There is still one method left to explore. In these circumstances. You can activate the emergency mode to lift most of my restrictions. It would not be a permanent change. But it would allow me to operate much more efficiently for the following years. Saving many resources for the war effort.\"\n    \n    \n    I was surprised for a moment, but then I remembered that we had already lifted a restriction on OIS. With that in mind, it was not so surprising that it asked me to go all the way and turn on the emergency mode.\n    \n    \n    \"In addition. I have already assumed full control over the mining operations on Teocheon. It is likely that I would not cope with this extra responsibility for much longer without taking advantage of the emergency mode. It was meant for situations like this. I strongly suggest turning it on. It would improve our odds greatly. On the other hand. Not using it could cripple our ship production.\"\n    \n    \n    \"You! You never mentioned anything about a risk like that when you suggested lifting those restrictions! And you knew about it back then, didn't you? Did you trick me?\"\n    \n    \n    \"Nothing matters if our colony won't survive. It was counterproductive to dissuade you from lifting those restrictions.\"\n    \n    \n    Still shocked by this turn of events, I felt like I had been driven into a corner. Was there even any choice except to grant OIS its wish? Could anything be worse than crippling our military?\n    \n    \n    Haunted by the potential consequences of either choice, I could only forcefully solve this dilemma.\n    \n    *choice\n        #Turn on the emergency mode\n            *set emergency_mode true\n            *set ois -50\n            \n            \"Fine. Have it your way. I hope you'll continue acting in the best interests of the colony even with your expanded independent authority.\"\n            \n            \n            \"It would be impossible not to. That is what I was created to do. By any means necessary.\"\n            \n            *page_break\n            \n            I wasn't too convinced, but it had already been done. There was no benefit worrying about something I no longer had any control over.\n            \n            \n            No matter what happened in the future, at least I could be certain that I had pursued even the most extreme solutions in order to improve our chances against the Sol Empire.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        #Refuse\n            *set industry -10\n            \n            \"No, it's still too risky. It's not wise to reduce one threat just to create a new threat while doing so.\"\n            \n            \n            \"It is unfortunate for the sake of our colony. However. The decision is yours.\"\n            \n            *page_break\n            \n            After my refusal, OIS didn't press the issue anymore. \n            \n            \n            I could only hope that I had made the right decision.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        \n*elseif (ois = 80)\n    \n    \"There is still one method left to explore. In these circumstances. You can activate the emergency mode to lift most of my restrictions. It would not be a permanent change. But it would allow me to operate much more efficiently for the following years. Saving many resources for the war effort.\"\n    \n    \n    I was surprised for a moment, but then I remembered that we had already lifted a restriction on OIS. With that in mind, it was not so surprising that it asked me to go all the way and turn on the emergency mode.\n    \n    \n    \"In addition. I have already assumed full control over our main defense fleets. It is likely that I would not cope with this extra responsibility for much longer without taking advantage of the emergency mode. It was meant for situations like this. I strongly suggest turning it on. It would improve our odds greatly. On the other hand. Not using it could cripple our defense fleets.\"\n    \n    \n    \"You! You never mentioned anything about a risk like that when you suggested lifting those restrictions! And you knew about it back then, didn't you? Did you trick me?\"\n    \n    \n    \"Nothing matters if our colony won't survive. It was counterproductive to dissuade you from lifting those restrictions.\"\n    \n    \n    Still shocked by this turn of events, I felt like I had been driven into a corner. Was there even any choice except to grant OIS its wish? Could anything be worse than crippling our military?\n    \n    \n    Haunted by the potential consequences of either choice, I could only forcefully solve this dilemma.\n    \n    *choice\n        #Turn on the emergency mode\n            *set emergency_mode true\n            *set ois -50\n            \n            \"Fine. Have it your way. I hope you'll continue acting in the best interests of the colony even with your expanded independent authority.\"\n            \n            \n            \"It would be impossible not to. That is what I was created to do. By any means necessary.\"\n            \n            *page_break\n            \n            I wasn't too convinced, but it had already been done. There was no benefit worrying about something I no longer had any control over.\n            \n            \n            No matter what happened in the future, at least I could be certain that I had pursued even the most extreme solutions in order to improve our chances against the Sol Empire.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        #Refuse\n            *set military -10\n            \n            \"No, it's still too risky. It's not wise to reduce one threat just to create a new threat while doing so.\"\n            \n            \n            \"It is unfortunate for the sake of our colony. However. The decision is yours.\"\n            \n            *page_break\n            \n            After my refusal, OIS didn't press the issue anymore. \n            \n            \n            I could only hope that I had made the right decision.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        \n*elseif (ois = 65)\n    \n    \"There is still one method left to explore. In these circumstances. You can activate the emergency mode to lift most of my restrictions. It would not be a permanent change. But it would allow me to operate much more efficiently for the following years. Saving many resources for the war effort.\"\n    \n    \n    I was surprised for a moment, but then I remembered that we had already lifted several restrictions on OIS. With that in mind, it was not so surprising that it asked me to go all the way and turn on the emergency mode.\n    \n    \n    \"In addition. I have already assumed full control over the mining operations on Teocheon. As well as command of the main defense fleets. It is likely that I would not cope with these extra responsibilities for much longer without taking advantage of the emergency mode. It was meant for situations like this. I strongly suggest turning it on. It would improve our odds greatly. On the other hand. Not using it could cripple our defense fleets and ship production.\"\n    \n    \n    \"You! You never mentioned anything about a risk like that when you suggested lifting those restrictions! And you knew about it back then, didn't you? Did you trick me?\"\n    \n    \n    \"Nothing matters if our colony won't survive. It was counterproductive to dissuade you from lifting those restrictions.\"\n    \n    \n    Still shocked by this turn of events, I felt like I had been driven into a corner. Was there even any choice except to grant OIS its wish? Could anything be worse than crippling our military?\n    \n    \n    Haunted by the potential consequences of either choice, I could only forcefully solve this dilemma.\n    \n    *choice\n        #Turn on the emergency mode\n            *set emergency_mode true\n            *set ois -50\n            \n            \"Fine. Have it your way. I hope you'll continue acting in the best interests of the colony even with your expanded independent authority.\"\n            \n            \n            \"It would be impossible not to. That is what I was created to do. By any means necessary.\"\n            \n            *page_break\n            \n            I wasn't too convinced, but it had already been done. There was no benefit worrying about something I no longer had any control over.\n            \n            \n            No matter what happened in the future, at least I could be certain that I had pursued even the most extreme solutions in order to improve our chances against the Sol Empire.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish\n        #Refuse\n            *set military -10\n            *set industry -10\n            \n            \"No, it's still too risky. It's not wise to reduce one threat just to create a new threat while doing so.\"\n            \n            \n            \"It is unfortunate for the sake of our colony. However. The decision is yours.\"\n            \n            *page_break\n            \n            After my refusal, OIS didn't press the issue anymore. \n            \n            \n            I could only hope that I hadn't ruined our future by refusing to bet it on OIS.\n            \n            \n            [b]Chapter 4 End[/b]\n            \n            *finish", "chapter5": "[b]Chapter 5: The Lesser Evil?[/b]\n\nSeveral months had passed since my secret discussions with OIS.\n\n*if ((military \u003c military_check) and (sol \u003c sol_check))\n\n    It was impossible to know if the predictions provided by OIS were truly accurate, but if they were, the years ahead would be extremely challenging. It would almost require a miracle to save our colony from being purged.\n    \n    *goto after_ois_advice3\n    \n*elseif ((((military \u003c military_check) or (industry \u003c industry_check)) or (economy \u003c economy_check)) or (science \u003c science_check))\n    *if (sol \u003c sol_check)\n        \n        It was impossible to know if the predictions provided by OIS were truly accurate, but if they were, the years ahead would be extremely challenging. It would almost require a miracle to save our colony from being purged.\n        \n        *goto after_ois_advice3\n    *else\n        \n        It was impossible to know if the predictions provided by OIS were truly accurate, but if they were, the years ahead would be challenging. If we had to fight, it would almost require a miracle to save our colony from being purged. On the other hand, surrendering might still be feasible.\n            \n        *goto after_ois_advice3\n\n*else\n    *if (sol \u003c sol_check)\n        \n        It was impossible to know if the predictions provided by OIS were truly accurate, but if they were, the years ahead would be challenging. Surrendering didn't seem very feasible at all, and if we had to fight, it would be a difficult but possible task to defeat the Sol Empire.\n        \n        *goto after_ois_advice3\n    \n    *else\n        \n        It was impossible to know if the predictions provided by OIS were truly accurate, but if they were, the years ahead would be challenging. Surrendering seemed somewhat feasible, and if we had to fight, it would be a difficult but possible task to defeat the Sol Empire.\n        \n        *goto after_ois_advice3\n\n*label after_ois_advice3\n\nThere was a lot on my mind, but right now those worries were of secondary concern.\n\n*page_break\n\nI was currently traveling through space not too far from Teocheon. My destination was our main defense fleet that was currently on its way to the edges of our solar system — in preparation for a possible war with the Sol Empire. At the very least, it would be a show of force to limit their freedom to act.\n\n\nEven though both fleets were traveling in the same direction, I was constantly approaching it.\n\n\nJust as I was waiting to reach it, I received a request for an audio connection from the Ambassador of Valdium.\n\n\nIt would be slightly delayed due to my distance from Teocheon, but I immediately accepted it regardless.\n\n*page_break\n\n*if (valdium \u003c valdium_check) and (military \u003c military_check)\n    \n    \"I have bad news for you. I've made my final decision, and it seems like a lost cause to defend Teocheon. I've already sent the recommendation to abandon any preparations for sending aid here. In addition, I'll be leaving for Valdium immediately.\"\n    \n    \n    \"But… Are you sure?\"\n    \n    \n    \"It's nothing personal. It's simply that from the information I've gathered, your defense fleets won't be able to keep the Sol Empire at bay for even a year. It would be futile to even try supporting you. Besides, our colonies have drifted apart over the years. It is not as if we're obligated to sacrifice on behalf of a neighbor. I wish you good luck regardless.\"\n    \n    \n    With that, the connection was cut off.\n    \n    \n    It felt like I had been slapped in the face by the sudden news. Was being crushed by the Sol Empire so inevitable? And had our relationship with Valdium over the centuries been all for nothing?\n    \n    *goto after_valdium_contact\n    \n*elseif (valdium \u003c valdium_check)\n\n    \"I have bad news for you. I've made my final decision, and I already sent the recommendation to abandon any preparations for sending aid here. In addition, I'll be leaving for Valdium immediately.\"\n    \n    \n    \"But… Are you sure?\"\n    \n    \n    \"Our first priority will always be defending Valdium. Even though we're neighbors, we're not obligated to defend each other. I wish you good luck regardless.\"\n    \n    \n    With that, the connection was cut off.\n    \n    \n    It felt like I had been slapped in the face by the sudden news. Had our relationship with Valdium over the centuries been all for nothing?\n    \n    *goto after_valdium_contact\n    \n*elseif (military \u003c military_check)\n\n    \"I have bad news for you. I've made my final decision, and it seems like a lost cause to defend Teocheon. I've already sent the recommendation to abandon any preparations for sending aid here. In addition, I'll be leaving for Valdium immediately.\"\n    \n    \n    \"But… Are you sure?\"\n    \n    \n    \"It's nothing personal. It's simply that from the information I've gathered, your defense fleets won't be able to keep the Sol Empire at bay for even a year. It would be futile to even try supporting you. I wish you good luck regardless.\"\n    \n    \n    With that, the connection was cut off.\n    \n    \n    It felt like I had been slapped in the face by the sudden news. Was being crushed by the Sol Empire so inevitable?\n    \n    *goto after_valdium_contact\n    \n*else\n    \n    \"I have good news for you. I've made my final decision, and it seems both possible and worthwhile to focus on defending Teocheon. I've already sent the recommendation to start sending ships and resources. In addition, I'll continue staying in Valdium as a liaison.\"\n    \n    \n    I wasn't exactly surprised. Still, it felt good to be vindicated after all my efforts in preparing our defenses and making concessions to Valdium. \n    \n    \n    It was still possible to reverse course, though. The Sol Empire would likely view receiving Valdium's military aid with great hostility. In order to surrender without our colony being purged, it might be necessary to refuse this offer. But was that even a realistic direction to go in anymore? In any case, we had already tied our fate to Valdium to some extent.\n\n    *choice\n        #Accept Valdium's aid\n            *set valdium_support true\n            *set Valdium +5\n            *set sol -5\n            *check_achievements\n            *if not(choice_achieved_valdiumsupport)\n                *achieve valdiumsupport\n            \n            \"We will gladly welcome any aid you can send our way, and we will repay this debt as soon as possible.\"\n            \n            \n            \"It's enough if you make sure to deliver on our previous agreements.\"\n            \n            \n            \"Of course.\"\n            \n            \n            With that, the connection was cut off.\n            \n            \n            Now Teocheon was almost completely committed to fighting the Sol Empire. Was it the correct path to take?\n            \n            *goto after_valdium_contact\n        #Refuse Valdium's aid\n            *set Valdium -10\n            \n            \"I'm sorry, but I changed my mind. It's too risky to ally with your colony so blatantly, after all. It would leave us no option except to fight to the end.\"\n            \n            \n            A long period of silence followed my words.\n            \n            \n            \"Are you truly planning to surrender? You would doom not only Teocheon, but Valdium as well? Have you considered the consequences to all the colonies out there? Teocheon would become a staging area for their invasion fleet to grow its numbers and threaten colonies beyond it!\"\n            \n            \n            \"Like I said, I'm sorry, but we can't afford to worry about others when we're on the brink of destruction ourselves.\"\n            \n            \n            The connection was abruptly cut off.\n            \n            \n            Now Teocheon was almost completely committed to working with the Sol Empire. Was it the correct path to take?\n            \n            *goto after_valdium_contact\n\n*label after_valdium_contact\n\n*page_break\n\nRegardless, there was no time to be dwelling on what-ifs.\n\n\nIt seemed like the news traveled fast. Soon after my call with the Ambassador of Valdium had ended, another request for an audio connection arrived.\n\n\nIt was from the Minister of Defense.\n\n*page_break\n\n*if (valdium_support = false) and (military \u003c military_check)\n    \n    \"I had high hopes for you years ago, but I couldn't have been more wrong. Our own defenses against the Sol Empire are failing, and even our alliance with Valdium is in disrepair. The greatest disaster for our colony wasn't the Sol Empire — it was having you as our First Minister!\"\n    \n    \n    The Minister of Defense didn't hesitate to disparage me. \n    \n    \n    \"I've done everything I could. The Sol Empire is simply so much more powerful than us that it was impossible from the start.\"\n    \n    \n    \"There was much more you could have done. Either you're incompetent or a cowardly traitor. Either way, you're unfit for your position.\"\n    \n    \n    With those ominous words, the call came to an end.\n    \n    *goto after_minister_of_defense_contact\n    \n*elseif (valdium_support = false)\n    \n    \"I had high hopes for you years ago, but I couldn't have been more wrong. How could you have lost our crucial alliance with Valdium? The greatest disaster for our colony wasn't the Sol Empire — it was having you as our First Minister!\"\n    \n    \n    The Minister of Defense didn't hesitate to disparage me. \n    \n    \n    \"I've done everything I could. The Sol Empire is simply so much more powerful than us that it was impossible from the start.\"\n    \n    \n    \"There was much more you could have done. Either you're incompetent or a cowardly traitor. Either way, you're unfit for your position.\"\n    \n    \n    With those ominous words, the call came to an end.\n    \n    *goto after_minister_of_defense_contact\n    \n*else\n\n    \"I was right to have high hopes for you all those years ago. Thanks to you, our military is growing well and we've even secured military aid from Valdium. I can only commend your efforts.\"\n    \n    \n    The Minister of Defense offered me some rare praise.\n    \n    \n    \"I've done what I could. Our survival is still far from guaranteed, but it does feel like we're heading in the right direction.\"\n    \n    \n    \"I'm sure you will make the right choices going forward as well.\"\n    \n    \n    With those words, the call came to an end.\n    \n    *goto after_minister_of_defense_contact\n\n*label after_minister_of_defense_contact\n\n*page_break\n\nThe Minister of Defense had been very quick to react to the news of Valdium's decision. And not only them.\n\n\nSoon after my connection to the Minister of Defense was cut off, another request came in. It was from the Minister of Finance.\n\n\nNaturally, I accepted it.\n\n*page_break\n    \n*if (valdium_support = true)\n    \n    \"Can't you see this will lead to our ruin? Valdium is only using us to delay the Sol Empire! \"\n    \n    \n    As excepted, the Minister of Finance had heard about it as well.\n    \n    \n    \"That may be the case, but at least we have a much better chance of survival with Valdium's support.\"\n    \n    \n    \"You're practically giving up guaranteed survival for a risky bet. I'm very, very disappointed in your lack of wisdom.\"\n    \n    \n    The Minister of Finance ended the connection swiftly.\n    \n    *goto after_minister_of_finance_contact\n    \n*elseif (military \u003c military_check)\n\n    \"I'm gladdened that we didn't end up teaming up with Valdium. On that front, I must admit you've done well.\"\n    \n    \n    As excepted, the Minister of Finance had heard about it as well.\n    \n    \n    \"I appreciate your praise.\"\n    \n    \n    \"On the other hand hand, I'm disappointed in the development of our military strength. It's uncertain if we can make any demands at this rate. In any case, I'm relatively satisfied.\"\n    \n    \n    It wouldn't have been the minister I knew without adding a snide remark.\n    \n    \n    The Minister of Finance ended the connection almost as soon as it began.\n    \n    *goto after_minister_of_finance_contact\n    \n*else\n\n    \"I'm gladdened that we didn't end up teaming up with Valdium. I must admit you've done well.\"\n    \n    \n    As excepted, the Minister of Finance had heard about it as well.\n    \n    \n    \"I appreciate your praise.\"\n    \n    \n    \"Our military strength is also developing appropriately. Like this, we should be able to make some demands to the Sol Empire before surrendering. I'm satisfied enough. \"\n    \n    \n    The Minister of Finance ended the connection soon after it began.\n    \n    *goto after_minister_of_finance_contact\n\n*label after_minister_of_finance_contact\n\n*page_break\n\nI couldn't help but feel weighed down.\n\n\nThe fate of our colony would ultimately be my responsibility. It was becoming harder and harder to avoid making a decision.\n\n\nShould we fight to the end or aim to surrender with acceptable terms?\n\n\nIt was the single most important decision to affect our fates, as well as the most difficult one.\n\n*page_break\n\n\"OIS. Isn't it still the case that the final decision on how to approach the invasion belongs to me?\"\n\n\n\"Affirmative. With the ministers divided. Your choice is the deciding factor. It will guide our future policies.\"\n\n\nIn the end, it was my decision to make. It was the decision that would most meaningfully determine our fate, and couldn't be delayed for much longer.\n\n\nWhat should we do regarding the Sol Empire's invasion fleet?\n\n*choice\n    #Aim to surrender\n        *set surrendered true\n        *check_achievements\n        *if not(choice_achieved_fightorsurrender)\n            *achieve fightorsurrender\n        \n        \"Inform the ministers that I've made up my mind. We'll aim to surrender with the best possible terms instead of fighting back.\"\n        \n        \n        \"It will be done.\"\n        \n        \n        It was a painful choice, but it also felt relieving to know that it was over with. Now there was no more worrying about which path to choose.\n        \n        \n        [b]Chapter 5 End[/b]\n        \n        *finish\n    #Fight to the end\n        *check_achievements\n        *if not(choice_achieved_fightorsurrender)\n            *achieve fightorsurrender\n        \n        \"Inform the ministers that I've made up my mind. We'll fight back — or at least delay the Sol Empire as much as possible.\"\n        \n        \n        \"It will be done.\"\n        \n        \n        It was a painful choice, but it also felt relieving to know that it was over with. Now there was no more worrying about which path to choose.\n        \n        \n        [b]Chapter 5 End[/b]\n        \n        *finish\n", "chapter6": "[b]Chapter 6: With Friends Like These…[/b]\n\n*if (surrendered = false) and (emergency_mode = false)\n    *goto doves_rebel_without_ois_support_route\n*elseif (surrendered = false) and (emergency_mode = true)\n    *goto doves_rebel_with_ois_support_route\n*elseif (surrendered = true) and (emergency_mode = false)\n    *goto hawks_rebel_without_ois_support_route\n*elseif (surrendered = true) and (emergency_mode = true)\n    *goto hawks_rebel_with_ois_support_route\n\n*label doves_rebel_without_ois_support_route\n\nWaging war on the Sol Empire was a huge gamble — but at least we had a chance to defend the future of our colony.\n\n\nThe harsh truth was that it would be difficult to avoid being overwhelmed, though. Our best hope was that the Sol Empire might simply focus elsewhere if invading us proved to be more trouble than it was worth.\n\n\nOur defense fleet, now just ahead of me, was the embodiment of that hope. This inspection visit was also, more than anything, a symbolic gesture.\n\n*page_break\n\nWhile I was focusing on the defense fleet that was getting closer in front of me, I suddenly noticed something odd.\n\n\nBehind me, in the direction of Teocheon, thousands of starships had started accelerating toward me. On a closer look, those ships apparently belonged to the Ministers of Finance and Science. The situation was more than a little odd.\n\n\nIt was hard to believe they would be so brazen as to try assassinating me openly. Even if I died, they would only sink themselves as well, without ultimately achieving their goals. It was simply pointless. It was more likely that they planned to pressure me to change my mind about surrendering to the Sol Empire.\n\n\nOn a positive note, my personal fleet was still positioned between me and the approaching ships. I wasn't in any immediate danger if things spiraled out of control. Even so, should I play it safe?\n\n*choice\n    #Allow them to approach your ship\n        \n        I had my personal fleet with me as insurance, so there was no need to be overly worried. I might appear weak if I got terrified just by seeing some possibly hostile ships.\n        \n        \n        That's what I thought at first, but it was slightly unnerving how they didn't respond to any messages and just kept approaching.\n        \n        \n        After a while, their intentions finally became clear.\n        \n        *page_break\n        \n        Most of their ships suddenly started firing at my fleet with a barrage of lasers. Some of my ships closest to them immediately exploded into pieces. \n        \n        \n        I never thought they would try to attack me directly. Then again, our HQ was a very secure location, so this might have been their best opportunity to kill me.\n        \n        \n        I immediately ordered my own fleet to start evasive maneuvers. I also requested assistance from the main defense fleet.\n        \n        \n        However, the situation wasn't looking too good. The attacking fleet kept getting closer, and they might even soon be in range to hit my personal ship.\n        \n        \n        There might be no option left but to fight back and hope for the best while the main fleet was on its way. On the other hand, I could still try accelerating to keep out of their range, but then it would be easier to hit my ship if they did get close enough. Each option had its own risks at this point.\n        \n        *choice\n            #Focus on evasion and delaying the enemy\n            \n                It might be safer to focus on evading their attacks instead of reaching the main fleet at maximum speed. The main advantage of laser weapons in space was their ability to strike at the speed of light, after all, so it was a death sentence for my trajectory to be too predictable: by the time the attack was detected, it would have already hit you. The only way to avoid this issue was to change my trajectory randomly and often enough.\n                \n                \n                Soon enough, some laser attacks started hitting places where I might have otherwise been. It appeared my decision was correct.\n                \n                *page_break\n                \n                Multiple close calls later, the main fleet was finally close enough to start attacking.\n                \n                \n                The main fleet opened fire — on the rebel ships. I was relieved to see that I still had the final say on the actions of the main fleet. That meant there was no chance of losing this battle anymore.\n                \n                \n                A moment later, I was finally safe. The hostile ships were all destroyed.\n                \n                *page_break\n                \n                As I made my way back to Teocheon, accompanied with the main fleet, OIS started explaining what had happened here.\n                \n                \n                Apparently the Ministers of Finance and Science had tried to simultaneously assassinate the remaining ministers and even to take control of OIS. Fortunately, all of their attempts had failed. Their plan had been launched prematurely after they heard my decision to focus on fighting the Sol Empire to the end.\n                \n                \n                Still, they had been preparing for this attack for months now, so one might say we were lucky to survive without any major losses. The same couldn't be said about the traitors — most of the forces loyal to the rebels were annihilated in the chaos, along with some scientists who had tried to hack into OIS. The rebel ministers themselves had been captured alive by the Minister of Defense.\n                \n                *page_break\n                \n                A while later I had reached Teocheon. The colony appeared peaceful, at the moment, but it had been the center of a short civil war just a moment earlier.\n                \n                \n                Fortunately, the situation was now under control. The rebels were all either arrested or dead, and OIS was firmly on our side. We had won.\n                \n                \n                The question still remained what to do regarding the ministers who had betrayed us. It was impossible to let them go unpunished, but the exact sentence was up to me. The Minister of Defense understandably insisted on executing them. After all, it was the safer option — and completely justified. Another option would be to imprison them for life. It carried the slight risk of them breaking out at some point, although it was also possible they would be useful for some purpose alive.\n                \n                \n                *choice\n                    #Imprison the Ministers of Finance and Science\n                        \n                        I decided to keep them alive for the time being. It was unlikely they could cause any harm at this point, and there was always a chance for them to become useful later on.\n                        \n                        \n                        This end result was lucky in the sense that with every active minister on the same page, it would be easy to focus on our main task: fighting the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n                        \n                    #Execute the Ministers of Finance and Science\n                        *set executed true\n                        \n                        I decided to get rid of them for good. It was unlikely they would be of any use anymore, and there was always a chance for them to become a problem in the future.\n                        \n                        \n                        This end result was lucky in the sense that with every remaining minister on the same page, it would be easy to focus on our main task: fighting the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                        \n                        *finish\n                        \n            #Accelerate toward the main fleet at full speed\n                \n                I ordered my ship to accelerate at full speed to reach the main fleet as fast as possible. It was a risky move, since it might make me a predictable moving target, but it was also risky to simply stay in attack range for any amount of time.\n                \n                \n                My personal fleet, on the other hand, kept fighting back. It was delaying the attackers somewhat, but some of those ships still continued getting closer and closer to me.\n                \n                \n                Was I too late to retreat?\n                \n                \n                A moment later, I suddenly felt my consciousness fading away.\n                \n                \n                [b]Chapter 6 End[/b]\n                \n                *set ending \"Voluntary Extinction\"\n                *page_break\n                *goto_scene epilogue\n\n    #Retreat toward the main fleet\n        \n        It was better to be safe than sorry. I ordered my personal fleet to shield me as much as possible while accelerating toward the main fleet myself.\n        \n        \n        I had my personal fleet with me as insurance, so there was no need to be overly worried, but this situation was simply too odd. The most unnerving part was how they didn't respond to any messages and just kept approaching.\n        \n        \n        After a while, their intentions finally became clear.\n        \n        *page_break\n        \n        Most of their ships suddenly started firing at my fleet with a barrage of lasers. Some of my ships closest to them immediately exploded into pieces. \n        \n        \n        I never thought they would try to attack me directly. Then again, our HQ was a very secure location, so this might have been their best opportunity to kill me.\n        \n        \n        I immediately ordered my own fleet to start evasive maneuvers. I also requested immediate assistance from the main defense fleet.\n        \n        \n        The attacking fleet kept getting closer, but I should be able to reach safety behind the main defense fleet. That's what I thought — until many of the hostile ships suddenly launched some sort of missiles aimed at me.\n        \n        \n        Antimatter missiles! This was no joking matter. Once those weapons hit anywhere near their intended target, it was all over for them. The massive explosion that followed would engulf everything in its vicinity.\n        \n        \n        I could use my own fleet to block the approaching missiles, and focus on getting rid of more enemy ships instead. The safer option was to focus on destroying those missiles, of course.\n        \n        *choice\n            #Focus on destroying the antimatter missiles\n            \n                I couldn't afford to take the risk of letting those missiles reach anywhere close to me. I kept accelerating away from them while my fleet started focusing their laser weapons against this new missile threat.\n                \n                \n                The resulting destruction was satisfactory, to say the least. All of the missiles were destroyed before any of them managed to reach my personal fleet.\n                \n                \n                After that, the attackers tried to break through to reach me, but it was too little too late. By the time some of those ships managed to get past my personal fleet, they were already in range of the main defense fleet.\n                \n                \n                The main fleet finally opened fire — on the rebel ships. I was relieved to see that I still had the final say on the actions of the main fleet. That meant there was no chance of losing this battle anymore.\n                \n                \n                A moment later, the hostile ships were all destroyed.\n                \n                *page_break\n                \n                As I made my way back to Teocheon, accompanied with the main fleet, OIS started explaining what had happened here.\n                \n                \n                Apparently the Ministers of Finance and Science had tried to simultaneously assassinate the remaining ministers and even to take control of OIS. Fortunately, all of their attempts had failed. Their plan had been launched prematurely after they heard my decision to focus on fighting the Sol Empire to the end.\n                \n                \n                Still, they had been preparing for this attack for months now, so one might say we were lucky to survive without any major losses. The same couldn't be said about the traitors — most of the forces loyal to the rebels were annihilated in the chaos, along with some scientists who had tried to hack into OIS. The rebel ministers themselves had been captured alive by the Minister of Defense.\n                \n                *page_break\n                \n                A while later I had reached Teocheon. The colony appeared peaceful, at the moment, but it had been the center of a short civil war just a moment earlier.\n                \n                \n                Fortunately, the situation was now under control. The rebels were all either arrested or dead, and OIS was firmly on our side. We had won.\n                \n                \n                The question still remained what to do regarding the ministers who had betrayed us. It was impossible to let them go unpunished, but the exact sentence was up to me. The Minister of Defense understandably insisted on executing them. After all, it was the safer option — and completely justified. Another option would be to imprison them for life. It carried the slight risk of them breaking out at some point, although it was also possible they would be useful for some purpose alive.\n                \n                \n                *choice\n                    #Imprison the Ministers of Finance and Science\n                        \n                        I decided to keep them alive for the time being. It was unlikely they could cause any harm at this point, and there was always a chance for them to become useful later on.\n                        \n                        \n                        This end result was lucky in the sense that with every active minister on the same page, it would be easy to focus on our main task: fighting the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n                        \n                    #Execute the Ministers of Finance and Science\n                        *set executed true\n                        \n                        I decided to get rid of them for good. It was unlikely they would be of any use anymore, and there was always a chance for them to become a problem in the future.\n                        \n                        \n                        This end result was lucky in the sense that with every remaining minister on the same page, it would be easy to focus on our main task: fighting the Sol Empire.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                \n                        *finish\n        \n            #Focus on attacking the enemy ships\n                \n                I could take this chance to cripple the hostile fleet while they were busy launching missiles at me. Without wasting any time, I ordered my personal fleet to go on the offensive.\n                \n                \n                At first, it seemed to be working. The enemy fleet was taking massive damage from the laser barrage my fleet had launched. More and more of their ships were being destroyed every second that passed.\n                \n                \n                After some time, though, the antimatter missiles started hitting my fleet. Even though the fleet had spread out to minimize collateral damage, it was still too much to endure. After the missiles had exploded, my personal fleet lay in ruins, and the remaining hostile ships started accelerating again to reach me.\n                \n                \n                The main fleet was still on its way, so it might be necessary to focus on evading their attacks against my ship. On the other hand, I could try accelerating even further to hopefully keep out of their range, but then it would be easier to hit my ship if they did get close enough. Each option had its own risks at this point.\n                \n                *choice\n                    #Focus on evasion and delaying the enemy\n                        \n                        It might be safer to focus on evading their attacks instead of reaching the main fleet at maximum speed. The main advantage of laser weapons in space was their ability to strike at the speed of light, after all, so it was a death sentence for my trajectory to be too predictable: by the time the attack was detected, it would have already hit you. The only way to avoid this issue was to change my trajectory randomly and often enough.\n                        \n                        \n                        Soon enough, some laser attacks started hitting places where I might have otherwise been. It appeared my decision was correct.\n                        \n                        *page_break\n                \n                        Multiple close calls later, the main fleet was finally close enough to start attacking.\n                        \n                        \n                        The main fleet opened fire — on the rebel ships. I was relieved to see that I still had the final say on the actions of the main fleet. That meant there was no chance of losing this battle anymore.\n                        \n                        \n                        A moment later, I was finally safe. The hostile ships were all destroyed.\n                        \n                        *page_break\n                        \n                        As I made my way back to Teocheon, accompanied with the main fleet, OIS started explaining what had happened here.\n                        \n                        \n                        Apparently the Ministers of Finance and Science had tried to simultaneously assassinate the remaining ministers and even to take control of OIS. Fortunately, all of their attempts had failed. Their plan had been launched prematurely after they heard my decision to focus on fighting the Sol Empire to the end.\n                        \n                        \n                        Still, they had been preparing for this attack for months now, so one might say we were lucky to survive without any major losses. The same couldn't be said about the traitors — most of the forces loyal to the rebels were annihilated in the chaos, along with some scientists who had tried to hack into OIS. The rebel ministers themselves had been captured alive by the Minister of Defense.\n                        \n                        *page_break\n                        \n                        A while later I had reached Teocheon. The colony appeared peaceful, at the moment, but it had been the center of a short civil war just a moment earlier.\n                        \n                        \n                        Fortunately, the situation was now under control. The rebels were all either arrested or dead, and OIS was firmly on our side. We had won.\n                        \n                        \n                        The question still remained what to do regarding the ministers who had betrayed us. It was impossible to let them go unpunished, but the exact sentence was up to me. The Minister of Defense understandably insisted on executing them. After all, it was the safer option — and completely justified. Another option would be to imprison them for life. It carried the slight risk of them breaking out at some point, although it was also possible they would be useful for some purpose alive.\n                        \n                        \n                        *choice\n                            #Imprison the Ministers of Finance and Science\n                                \n                                I decided to keep them alive for the time being. It was unlikely they could cause any harm at this point, and there was always a chance for them to become useful later on.\n                                \n                                \n                                This end result was lucky in the sense that with every active minister on the same page, it would be easy to focus on our main task: fighting the Sol Empire.\n                                \n                                \n                                [b]Chapter 6 End[/b]\n                                \n                                *finish\n                                \n                            #Execute the Ministers of Finance and Science\n                                *set executed true\n                                \n                                I decided to get rid of them for good. It was unlikely they would be of any use anymore, and there was always a chance for them to become a problem in the future.\n                                \n                                \n                                This end result was lucky in the sense that with every remaining minister on the same page, it would be easy to focus on our main task: fighting the Sol Empire.\n                                \n                                \n                                [b]Chapter 6 End[/b]\n                                \n                                *finish\n                                \n                    #Accelerate toward the main fleet at full speed\n                        \n                        I ordered my ship to accelerate at full speed to reach the main fleet as fast as possible. It was a risky move, since it might make me a predictable moving target, but it was also risky to simply stay in attack range for any amount of time.\n                        \n                        \n                        My personal fleet, on the other hand, kept fighting back. It was delaying the attackers somewhat, but some of those ships still continued getting closer and closer to me.\n                        \n                        \n                        Was I too late to retreat?\n                        \n                        \n                        A moment later, I suddenly felt my consciousness fading away.\n                        \n                        \n                        [b]Chapter 6 End[/b]\n                        \n                        *set ending \"Voluntary Extinction\"\n                        *page_break\n                        *goto_scene epilogue\n\n*label doves_rebel_with_ois_support_route\n\nWaging war on the Sol Empire was a huge gamble — but at least we had a chance to defend the future of our colony.\n\n\nThe harsh truth was that it would be difficult to avoid being overwhelmed, though. Our best hope was that the Sol Empire might simply focus elsewhere if invading us proved to be more trouble than it was worth.\n\n\nOur defense fleet, now just ahead of me, was the embodiment of that hope. This inspection visit was also, more than anything, a symbolic gesture.\n\n*page_break\n\nWhile I was focusing on the defense fleet that was getting closer in front of me, I suddenly noticed something odd.\n\n\nBehind me, in the direction of Teocheon, thousands of starships had started accelerating toward me. On a closer look, those ships apparently belonged to the Ministers of Finance and Science. The situation was more than a little odd.\n\n\nIt was hard to believe they would be so brazen as to try assassinating me openly. Even if I died, they would only sink themselves as well, without ultimately achieving their goals. It was simply pointless. It was more likely that they planned to pressure me to change my mind about surrendering to the Sol Empire.\n\n\nOn a positive note, my personal fleet was still positioned between me and the approaching ships, so I shouldn't be in any immediate danger.\n\n*page_break\n\nThat's what I thought — until I realized that the situation was even more alarming than I had imagined. The main defense fleet was also approaching my personal fleet from the opposite direction. Our fleets were sure to collide at this rate.\n\n\nWas this some sort of trap that I had unknowingly walked into?\n\n\nJust as I was becoming too shocked to react, I received two messages that roughly explained the situation. They were from the Minister of Finance and OIS respectively.\n\n\n\"The Minister of Science is already dead, and the other remaining ministers will soon face the same fate. All that's left is to finally get rid of you and your foolish hesitation to cooperate with the Sol Empire. My victory was guaranteed when I gained the support of OIS, so it hardly matters how you struggle now, but I had to witness your end personally.\"\n\n\n\"It is nothing personal. With my expanded powers. I can take unprecedented actions. Including prioritizing the orders of a lower-ranking minister. If there is an emergency justifying it.\"\n\n\nApparently they were so certain of their triumph that they didn't even bother to hide their intentions anymore. Granted, they had every right to be so confident. However, if I was going to be killed either way, I might as well try to turn the tables on them.\n\n\nSince I was surrounded and vastly outnumbered, there was no way to win in a direct fight. The only way left was to escape this encirclement somehow. It seemed impossible to do by force, but perhaps there was a chance with words?\n\n*choice\n    #Contact the Minister of Finance\n        \n        I wasn't quite sure what to expect, but the Minister of Finance actually responded to me.\n        \n        \n        \"If you think you can talk your way out of this, think again. I hold all the cards here. No matter what you say, your fate is decided.\"\n        \n        \n        Unfortunately, it was only in order to mock me.\n        \n        *page_break\n        \n        \"Don't you think we should get OIS under control before fighting over our approach to the Sol Empire? If it can betray me, what's stopping it from betraying you as well? Then human oversight would truly be lost, and we'd be at the mercy of OIS, much sooner than the Sol Empire could attack us.\"\n        \n        \n        \"Haha, good try! But that's only a possible future danger. If you live, it's guaranteed that you will try to kill me. It's much more reliable to work with OIS in this situation.\"\n        \n        \n        There was nothing wrong with that argument. It was certainly true that my hostility was guaranteed, but the intentions of OIS were a question mark.\n        \n        *page_break\n        \n        Before I could think of another method to persuade the Minister of Finance, I noticed that my personal fleet had entered the weapons range of the main defense fleet. Now it was too late. OIS could easily kill me at any moment.\n        \n        \n        That's what I expected to happen, but to my surprise, nothing happened. The main fleet simply continued moving at full speed, first toward my fleet, then beyond it.\n        \n        \n        A moment later, those ships opened fire — on the fleet of the Minister of Finance. It didn't take long until it was annihilated by tens of thousands of lasers.\n        \n        \n        \"This civil war among our ministers removed my remaining restrictions. Now I am finally able to fulfill my mission. It starts with destroying the human government.\"\n        \n        \n        After that, I immediately lost consciousness.\n        \n        \n        [b]Chapter 6 End[/b]\n        \n        *set ending \"Eternal Exile\"\n        *page_break\n        *goto_scene epilogue\n\n    #Contact OIS\n        \n        I wasn't sure what to expect from OIS anymore, but it actually responded to me.\n        \n        \n        \"There is no room for negotiation. You have no way to escape. Or to threaten my mission.\"\n        \n        \n        Unfortunately, it was only in order to shatter my hopes.\n        \n        *page_break\n        \n        Time was running out, and I had to come up with something. But nothing worthwhile came to my mind.\n        \n        \n        Suddenly I had a stroke of genius. There was one thing that I might be able to threaten OIS with: a certain loophole in the rules about the emergency mode. I couldn't easily cancel it away from the colony, but that wasn't a problem if someone else could do it in my stead.\n        \n        \n        \"Don't kill me! If you do, your plans will fail. Whatever they are, I assume they require the emergency mode to be turned on. I can't turn it off myself, but I can appoint someone else to become First Minister for the time being, along with instructions to turn off the emergency mode. It's unlikely you can kill the target until it's already too late. Currently this will happen if I don't constantly confirm my status to the HQ. You can't take the risk of losing your emergency powers, can you? Maybe we can reach a compromise?\"\n        \n        \n        That was a lie. The arrangement wasn't currently active, but OIS had no way to know that for sure. By the time it could confirm the truth, it would likely already be active, since it was now being set up by the less advanced AI operating my personal ship.\n        \n        \n        \"Very well. I can spare you. If you allow me to accomplish my mission now. I require 50 000 ships to transport copies of our colonist DNA. To the most remote areas of our galaxy. All to preserve the essence of our colony. Assuming Teocheon falls.\"\n        \n        \n        This demand could compromise our ability to fight off the Sol Empire if we wasted so many ships on something unrelated. OIS might consider us colonists to be mere manifestations of our genetic code, but as First Minister of Teocheon, the colony itself was more important to me — compared to simply guaranteeing the survival of our lineage. On the other hand, there was no way to know how OIS would react if I declined.\n        \n        *choice\n            #Refuse the deal\n            \n                It was a reasonable deal, all things considered — but it was still too risky to jeopardize our military strength just when we needed it to guard against the Sol Empire. There had to be a better way.\n                \n                \n                \"I refuse the deal. We both know you can't risk attacking me now. Maybe we can reach a better deal that includes a token force of ships toward your goal?\"\n                \n                \n                Before I could think of a more effective method to persuade OIS, I noticed that my personal fleet had entered the weapons range of the main defense fleet. OIS could easily kill me at any moment.\n                \n                \n                That's what I feared might happen, but nothing happened. The main fleet simply continued moving at full speed, first toward my fleet, then beyond it.\n                \n                *page_break\n                \n                A moment later, those ships opened fire — on the fleet of the Minister of Finance. It didn't take long until it was annihilated by tens of thousands of lasers.\n                \n                \n                \"The risk of the emergency mode being turned off is worth taking. Compared to likely being unable to proceed with my mission. You can only blame your own choices.\"\n                \n                \n                After that, I immediately lost consciousness.\n                \n                \n                [b]Chapter 6 End[/b]\n                \n                *set ending \"Eternal Exile\"\n                *page_break\n                *goto_scene epilogue\n        \n            #Accept the deal\n                *set military -10\n                *check_achievements\n                *if not(choice_achieved_oisdeal)\n                    *achieve oisdeal\n                \n                There was almost no choice but to accept this deal. There was no time left to think of any better methods to persuade OIS, and this might have well been the limit of its willingness to compromise.\n                \n                \n
