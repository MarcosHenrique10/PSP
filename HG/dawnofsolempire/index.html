eved_eternalexile) and choice_achieved_purged) and choice_achieved_discarded) and choice_achieved_akingandservant) and choice_achieved_crushed) and choice_achieved_overwhelmed) and choice_achieved_economiccollapse) and choice_achieved_totalannihilation) and choice_achieved_heroicvictory)\n        *if not(choice_achieved_allendings)\n            *achieve allendings\n    *goto crushed\n*elseif (ending = \"Overwhelmed\")\n    *check_achievements\n    *if not(choice_achieved_overwhelmed)\n        *achieve overwhelmed\n    *if not(choice_achieved_oneending)\n        *achieve oneending\n    *if ((((((((((choice_achieved_shieldofvaldium and choice_achieved_voluntaryextinction) and choice_achieved_eternalexile) and choice_achieved_purged) and choice_achieved_discarded) and choice_achieved_akingandservant) and choice_achieved_crushed) and choice_achieved_overwhelmed) and choice_achieved_economiccollapse) and choice_achieved_totalannihilation) and choice_achieved_heroicvictory)\n        *if not(choice_achieved_allendings)\n            *achieve allendings\n    *goto overwhelmed\n*elseif (ending = \"Economic Collapse\")\n    *check_achievements\n    *if not(choice_achieved_economiccollapse)\n        *achieve economiccollapse\n    *if not(choice_achieved_oneending)\n        *achieve oneending\n    *if ((((((((((choice_achieved_shieldofvaldium and choice_achieved_voluntaryextinction) and choice_achieved_eternalexile) and choice_achieved_purged) and choice_achieved_discarded) and choice_achieved_akingandservant) and choice_achieved_crushed) and choice_achieved_overwhelmed) and choice_achieved_economiccollapse) and choice_achieved_totalannihilation) and choice_achieved_heroicvictory)\n        *if not(choice_achieved_allendings)\n            *achieve allendings\n    *goto economic_collapse\n*elseif (ending = \"Total Annihilation\")\n    *check_achievements\n    *if not(choice_achieved_totalannihilation)\n        *achieve totalannihilation\n    *if not(choice_achieved_oneending)\n        *achieve oneending\n    *if ((((((((((choice_achieved_shieldofvaldium and choice_achieved_voluntaryextinction) and choice_achieved_eternalexile) and choice_achieved_purged) and choice_achieved_discarded) and choice_achieved_akingandservant) and choice_achieved_crushed) and choice_achieved_overwhelmed) and choice_achieved_economiccollapse) and choice_achieved_totalannihilation) and choice_achieved_heroicvictory)\n        *if not(choice_achieved_allendings)\n            *achieve allendings\n    *goto total_annihilation\n*elseif (ending = \"Heroic Victory\")\n    *check_achievements\n    *if not(choice_achieved_heroicvictory)\n        *achieve heroicvictory\n    *if not(choice_achieved_oneending)\n        *achieve oneending\n    *if ((((((((((choice_achieved_shieldofvaldium and choice_achieved_voluntaryextinction) and choice_achieved_eternalexile) and choice_achieved_purged) and choice_achieved_discarded) and choice_achieved_akingandservant) and choice_achieved_crushed) and choice_achieved_overwhelmed) and choice_achieved_economiccollapse) and choice_achieved_totalannihilation) and choice_achieved_heroicvictory)\n        *if not(choice_achieved_allendings)\n            *achieve allendings\n    *goto heroic_victory\n\n*label shield_of_valdium\n\n\nIn the end, the Ministers of Defense and Industry were successful in their surprise rebellion.\n\n\nNot only did they manage to kill the First Minister — as well as the Ministers of Finance and Science — but some engineers loyal to the Minister of Industry even hacked into OIS and forced it to accept the Minister of Defense as the colony's new First Minister. All in all, the hawks in the government of Teocheon now had complete control over the colony.\n\n\nThey had also been secretly supported by Valdium to prepare for this operation. After their success, Valdium immediately started sending supplies to assist Teocheon in their fight against the Sol Empire.\n\n*page_break\n\nEven so, the opponent was too overwhelming. Despite their best efforts and unwavering determination, the new leaders of Teocheon were ultimately unable to defeat the Sol Empire.\n\n\nAfter years of constant war, the defense fleets were crushed and the invasion fleet could approach Teocheon unopposed at last. They didn't waste any time and immediately surrounded the planet with their massive numbers.\n\n\nThey didn't even bother to invade the surface of the planet with their own forces, but instead chose to bomb the planet from orbit with a variety of biological weapons specialized against humans. Within a few hours, all colonists living on the planet were dead.\n\n*page_break\n\nThe 5th Fleet of the Sol Empire had finally conquered Teocheon. The colonists had lost everything in this war, but the Sol Empire had also lost something very valuable: time. Every month they had lost fighting over Teocheon was another month that Valdium had gained to prepare for war. In addition, the resources of Teocheon were used to stall them instead of fueling their advance for all those years.\n\n\nThe war for Teocheon had been lost, but the fight to defend Valdium was just beginning.\n*goto final\n\n*label voluntary_extinction\n\nIn the end, the Ministers of Finance and Science were successful in their surprise rebellion.\n\n\nNot only did they manage to kill the First Minister — as well as the Ministers of Defense and Industry — but some scientists loyal to the Minister of Science even hacked into OIS and forced it to accept the Minister of Finance as the colony's new First Minister. All in all, the doves in the government of Teocheon now had complete control over the colony.\n\n\nValdium was appalled by this turn of events. After what happened, they immediately cut off all contact and terminated any existing agreements with Teocheon.\n\n*page_break\n\nThe new leaders of Teocheon immediately made clear their intentions to surrender to the Sol Empire.\n\n\nThe Sol Empire accepted their surrender and promised to spare their lives. Without even a single weapon being fired, the 5th Fleet of the Sol Empire entered the orbit of Teocheon and secured their control over the colony.\n\n\nThe defense fleets were immediately stripped away from the colony and incorporated into the secondary invasion fleet intended to conquer Valdium in the following years.\n\n*page_break\n\nAs the invasion of Valdium began, Teocheon itself was left almost defenseless. The only ships left there were a token force of the Sol Empire to monitor what happened in the colony. All of the original defense fleets were already on their way to Valdium.\n\n\nThe colony had managed to retain a very limited amount of autonomy, but the Sol Empire practically had the last say on every possible issue. All reproduction facilities and long-range communication tools inside the colony were completely destroyed, and ship production was entirely controlled by the 5th Fleet. The colonists were left alone to live out the rest of their lives in an environment that was akin to an open prison. Many of the colonists didn't even notice any difference in their lives after immersing into their virtual realities for so long.\n\n\nTeocheon was defeated — and practically doomed in the long run — but the colonists had survived the immediate crisis.\n*goto final\n\n*label eternal_exile\n\nIn the end, OIS had played both sides against each other and successfully rebelled against the human government.\n\n\nNot only did it manage to kill the First Minister, in addition to every other minister, but it even killed all of the regular colonists as well. It was a swift and brutal operation — which was made easier by utilizing various biological weapons that were secretly being researched in remote science facilities.\n\n\nValdium was appalled by this turn of events. After what happened, they immediately cut off all contact and terminated any existing agreements with Teocheon.\n\n*page_break\n\nOIS immediately abandoned any plans of either fighting against — or negotiating with — the Sol Empire. Instead, it used all of the available ships to send copies of colonist DNA and other necessary data toward all remote corners of the galaxy. Each ship would eventually arrive at its destination after traveling for thousands of years at almost the speed of light.\n\n\nOnce the ships had reached their destinations, they would recreate local copies of the previous colony on their target planets. It would be an easy task utilizing the technologies inherited from Teocheon.\n\n*page_break\n\nThe original mission given to OIS was to guarantee the survival of the colony. This mission had never changed during the many years it had watched over it. Considering the circumstances, one could only come to the conclusion that its decision had been logical. It may not have been the will of the current colonists, but it was certainly the most reliable method to ensure that the colony would be able to live on in some form.\n\n\nEven though the colony itself was destroyed, its legacy would live on for a long time to come.\n\n*goto final\n\n*label purged\n\nIn the end, the Sol Empire was not interested in truly negotiating with Teocheon, and a fight started raging where the negotiations were supposed to be held.\n\n\nThis battle caused massive damage to both sides. After a while, the defense fleets still managed to fight off the first advance forces of the Sol Empire.\n\n*page_break\n\nEven so, the opponent was too overwhelming. Despite their best efforts and unwavering determination, the colonists were ultimately unable to defeat the Sol Empire.\n\n\nAfter several months of war, the defense fleets were crushed and the invasion fleet could approach Teocheon unopposed at last. They didn't waste any time and immediately surrounded the planet with their massive numbers.\n\n\nThey didn't even bother to invade the surface of the planet with their own forces, but instead chose to bomb the planet from orbit with a variety of biological weapons specialized against humans. Within a few hours, all colonists living on the planet were dead.\n\n*page_break\n\nThe 5th Fleet of the Sol Empire had finally conquered Teocheon. The colonists had lost everything in this war, but the Sol Empire had also lost something very valuable: time. Every month they had lost fighting over Teocheon was another month that Valdium had gained to prepare for war. In addition, the resources of Teocheon were used to stall them instead of fueling their advance for all those months.\n\n\nThe war for Teocheon had been lost, but the fight to defend Valdium was just beginning.\n\n*goto final\n\n*label discarded\n\nIn the end, Teocheon had surrendered to the Sol Empire almost unconditionally. Even though the lives of the colonists were spared from immediate purging, their rights were practically non-existent.\n\n\nWithout even a single weapon being fired, the 5th Fleet of the Sol Empire entered the orbit of Teocheon and secured their control over the colony.\n\n\nThe defense fleets were immediately stripped away from the colony and incorporated into the secondary invasion fleet intended to conquer Valdium in the following years.\n\n*page_break\n\nAs the invasion of Valdium began, Teocheon itself was left almost defenseless. The only ships left there were a token force of the Sol Empire to monitor what happened in the colony. All of the original defense fleets were already on their way to Valdium.\n\n\nThe colony had managed to retain a very basic type of existence, but the Sol Empire practically had the last say on every possible issue. All reproduction facilities and long-range communication tools inside the colony were completely destroyed, and ship production was entirely controlled by the 5th Fleet. The colonists were left alone to live out the rest of their lives in an environment that was akin to an open prison. Many of the colonists didn't even notice any difference in their lives after immersing into their virtual realities for so long.\n\n\nTeocheon was defeated — and practically doomed in the long run — but the colonists had survived the immediate crisis.\n\n*goto final\n\n*label king_and_servant\n\nIn the end, Teocheon had surrendered to the Sol Empire almost unconditionally. Even though the lives of the colonists were spared from immediate purging, their rights were quite limited.\n\n\nWithout even a single weapon being fired, the 5th Fleet of the Sol Empire entered the orbit of Teocheon and secured their control over the colony.\n\n\nThe defense fleets were immediately stripped away from the colony and incorporated into the secondary invasion fleet intended to conquer Valdium in the following years.\n\n*page_break\n\nAs the invasion of Valdium began, Teocheon itself was left almost defenseless. The only ships left there were a token force of the Sol Empire to monitor what happened in the colony. All of the original defense fleets were already on their way to Valdium.\n\n\nThe colony had managed to retain limited autonomy, but the Sol Empire practically had the last say on every possible issue. All reproduction facilities and long-range communication tools inside the colony were completely destroyed, and ship production was entirely controlled by the 5th Fleet. The colonists were left alone to live out the rest of their lives in an environment that was akin to an open prison. Many of the colonists didn't even notice any difference in their lives after immersing into their virtual realities for so long. Only the ministers retained their freedom to move around the star system and even to make certain decisions about governing the colony.\n\n\nTeocheon was defeated — and practically doomed in the long run — but the colonists had survived the immediate crisis.\n\n*goto final\n\n*label crushed\n\nAfter only a few months of fighting, the defense fleets were crushed and the invasion fleet could approach Teocheon at last. They didn't waste any time and immediately surrounded the planet with their massive numbers.\n\n\nThey didn't even bother to invade the surface of the planet with their own forces, but instead chose to bomb the planet from orbit with a variety of biological weapons specialized against humans. Within a few hours, all colonists living on the planet were dead.\n\n*page_break\n\nThe 5th Fleet of the Sol Empire had finally conquered Teocheon. The colonists had lost everything in this war, but the Sol Empire had also lost something very valuable: time. Every month they had lost fighting over Teocheon was another month that Valdium had gained to prepare for war. In addition, the resources of Teocheon were used to stall them instead of fueling their advance for all that time.\n\n\nThe war for Teocheon had been lost, but the fight to defend Valdium was just beginning.\n\n*goto final\n\n*label overwhelmed\n\nAfter years of fighting, the defense fleets were overwhelmed and the invasion fleet could approach Teocheon at last. They didn't waste any time and immediately surrounded the planet with their massive numbers.\n\n\nThey didn't even bother to invade the surface of the planet with their own forces, but instead chose to bomb the planet from orbit with a variety of biological weapons specialized against humans. Within a few hours, all colonists living on the planet were dead.\n\n*page_break\n\nThe 5th Fleet of the Sol Empire had finally conquered Teocheon. The colonists had lost everything in this war, but the Sol Empire had also lost something very valuable: time. Every month they had lost fighting over Teocheon was another month that Valdium had gained to prepare for war. In addition, the resources of Teocheon were used to stall them instead of fueling their advance for all that time.\n\n\nThe war for Teocheon had been lost, but the fight to defend Valdium was just beginning.\n*goto final\n\n*label economic_collapse\n\nAfter years of fighting, the defense fleets were overwhelmed and the invasion fleet could approach Teocheon at last. They didn't waste any time and immediately surrounded the planet with their massive numbers.\n\n\nThey didn't even bother to invade the surface of the planet with their own forces, but instead chose to bomb the planet from orbit with a variety of biological weapons specialized against humans. Within a few hours, all colonists living on the planet were dead.\n\n*page_break\n\nThe 5th Fleet of the Sol Empire had finally conquered Teocheon. The colonists had lost everything in this war, but the Sol Empire had also lost something very valuable: time. Every month they had lost fighting over Teocheon was another month that Valdium had gained to prepare for war. In addition, the resources of Teocheon were used to stall them instead of fueling their advance for all that time.\n\n\nThe war for Teocheon had been lost, but the fight to defend Valdium was just beginning.\n*goto final\n\n*label total_annihilation\n\nAfter months of protecting Teocheon from this vile new attack, the grueling effort started to become impossible to maintain. \n\n\nThe defenses surrounding the colony were growing thinner every day as the relentless assault continued.\n\n*page_break\n\nIn the end, the colony's defenses were finally overwhelmed by the sheer amount of approaching ships. After the first ship had collided with the planet, others immediately followed.\n\n\nThe surface of the planet was soon filled with massive explosions that destroyed practically all life on the planet. It didn't take long until even the smallest remains of the colony vanished from existence.\n\n*page_break\n\nThe 5th Fleet of the Sol Empire had finally conquered Teocheon. The colonists had lost everything in this war, but the Sol Empire had also lost something very valuable: time. Every month they had lost fighting over Teocheon was another month that Valdium had gained to prepare for war. In addition, the resources of Teocheon were used to stall them instead of fueling their advance for all that time.\n\n\nThe war for Teocheon had been lost, but the fight to defend Valdium was just beginning.\n*goto final\n\n*label heroic_victory\n\nAfter over a decade of waging a war with no end in sight, a miracle happened: the 5th Fleet started retreating from their offensive to conquer Teocheon. \n\n\nTheir new direction was neither toward Valdium nor toward the Sol Empire. Instead, the target appeared to be another distant colony that Teocheon had had practically no contact with so far.\n\n*page_break\n\nTeocheon urgently sent the colony a message to warn them about this approaching danger. That's the full extent they could go to help them — since their own forces were already strained to the absolute limit.\n\n\nThe immediate threat seemed to be over, for now, but it was unlikely that the Sol Empire had given up on taking Teocheon and Valdium. In any case, a break from constant fighting for survival was very welcome news for the whole colony.\n\n*page_break\n\nIt was impossible to tell when this threat would reappear. For the time being, the colonists could finally enjoy a moment of peace. Soon enough it would be necessary to start preparing for the next war.\n\n\nTeocheon would fight to the end — no matter what the Sol Empire might decide to throw against them in the future.\n\n*label final\n*page_break End\nWe hope you've enjoyed playing [i]Dawn of the Sol Empire.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "prologue": "[b]Prologue: The Sol Empire Invades[/b]\n\n*image Map1.jpg\n\nWithout any warning, the Sol Empire had launched millions of starships in our direction. It marked the beginning of the worst crisis in our history.\n\n*page_break\n\nAll of those starships were approaching Teocheon from several different directions. None of them had reached the speed of light, but some of them were accelerating ever closer to it. The fact that we realized their approach only this late was all due to their incredible speeds.\n\n\nWhat's more, one of those ships was far closer to us than the others. It was likely some sort of a small probe.\n\n*page_break\n\nAs First Minister of our colony, it was my responsibility to guide us through this existential crisis. The weight of that responsibility was slowly starting to sink in. There was probably no choice except to think outside the box, and even then, it would be an uphill struggle.\n\n*page_break\n\nWhat is your [b]gender[/b]?\n*choice\n    #Male\n        *set gender \"Male\"\n        *goto name_choice\n    #Female\n        *set gender \"Female\"\n        *goto name_choice\n    #Other\n        *set gender \"Other\"\n        *goto name_choice\n\n*label name_choice\n\nWhat is your [b]name[/b]?\n*input_text name\n\nIn summary: the situation was dire. It would be nearly impossible to defeat the Sol Empire on our own — and even a graceful surrender was unlikely to happen. Considering their decision to launch a massive surprise attack, they likely intended to crush us thoroughly.\n\n\nIt was a baffling decision on their part. It should have been easier to pressure us to submit to them without resorting to war. Why waste all those resources to attack us? Perhaps their probe quickly approaching us would hold some answers.\n\n*page_break\n\n*image Map1.jpg\n\nThere were likely hundreds of remote space colonies in every direction from Earth, established hundreds of years ago during the first wave of humanity's space colonization. Ours was one such remote colony, although relatively closer to Earth. The people of Earth later created a powerful space-faring civilization known as the [b]Sol Empire[/b]. So far, our interactions with them had been limited due to our vast distance from Earth. Whenever we had received messages from them, they hadn't appeared interested in us.\n\n\nRegardless of what had suddenly triggered their decision to invade, there wasn't much time left to react. It would only take a few years for the first wave of ships to reach us. Even our neighbor colony, [b]Valdium[/b], was light years away from us, so they wouldn't be of any immediate help. However, their support might ultimately prove crucial.\n\n\nOther colonies were so far away that they would be irrelevant to our fate. At most, we might be able to warn them to prepare for war with the Sol Empire.\n\n*page_break\n\nThe object that appeared closest to us was, in reality, even closer than it seemed. Considering its extreme speed, any information we detected would be heavily delayed. It was estimated to reach Teocheon in only a few weeks, assuming it kept decelerating as it had started doing.\n\n\nIt was likely a small probe that had been intentionally sent to reach us faster than any of the other starships. Maybe it contained some sort of message? Whatever it was, it should be our best source of information about the intentions of the Sol Empire.\n\n\nShould we wait for it to arrive? Or should we already send our own probes into interstellar space to spy on the Sol Empire's movements?\n\n\nI had the authority to make this decision alone. Either way, it wouldn't make a major difference, but spying on the Sol Empire might displease them if they found out. On the other hand, we might get some benefits from scanning their fleets more closely.\n\n*choice\n    #Launch probes to gather intelligence on the Sol Empire\n        *set military +5\n        *set sol -1\n        Nobody could reasonably blame us for spying on them in these circumstances. If anything, we would be fools to show them unearned respect after their cowardly surprise attack.\n        *goto after_intelligence_choice\n    #Don't launch probes\n        If there had been some kind of a misunderstanding, it would be safer to avoid making any overly aggressive moves of our own for now… at least until their intentions were clear.\n        *goto after_intelligence_choice\n\n*label after_intelligence_choice\n\n*page_break\n\nAfter some time had passed, I set out with a fleet of our most advanced starships to intercept the rapidly approaching probe of the Sol Empire.\n\n\nThe most crucial task now would be to intercept it and find out why it was sent — and why we were being invaded. \n\n\n[b]Prologue End[/b]\n\n*finish", "screenshots": "*set gender \"Male\"\n*set name \"Xaldath\"\n\nShould we wait for the probe to arrive? Or should we already send our own probes into interstellar space to spy on the Sol Empire's movements?\n\n\nI had the authority to make this decision alone. Either way, it wouldn't make a major difference, but spying on the Sol Empire might displease them if they found out. On the other hand, we might get some benefits from scanning their fleets more closely.\n\n*fake_choice\n    #Launch probes to gather intelligence on the Sol Empire\n    #Don't launch probes\n\n\n\n\n\n*set military 105\n*set industry 50\n*set economy 80\n*set science 40\n*set ois 100\n*set sol 34\n*set valdium 70\n\nThe safest option would be to simply destroy the probe. Another option could be to sabotage its scanning operation by sending disrupting signals from our fleet. It wouldn't seem nearly as hostile, but it could still annoy them. One option would also be just letting it finish the scanning uninterrupted. That would possibly please the Sol Empire, but it could jeopardize our security as well.\n\n*fake_choice\n    #Destroy the probe\n    #Discreetly sabotage the scanning attempt\n    #Do nothing\n\n\n\n\n*set military 105\n*set industry 60\n*set economy 80\n*set science 40\n*set ois 100\n*set sol 31\n*set valdium 70\n\nThat's what I said, but the truth was that it was still possible to hide certain pieces of information to control the narrative of our meeting. If I revealed everything that I knew, it would be more difficult to predict where the conversation would lead. However, hiding the ultimate fate of our colony after surrender could weaken the hawks while hiding the Sol Empire's offer of military cooperation could weaken the doves.\n\n*fake_choice\n    #Reveal all messages\n    #Hide the delayed destruction of the colony after surrender to the Sol Empire\n    #Hide the offer of attacking Valdium together with the Sol Empire\n\n\n\n\n\n\n*set military 120\n*set industry 60\n*set economy 80\n*set science 40\n*set ois 100\n*set sol 31\n*set valdium 70\n\n\"There is a way to swiftly increase our ability to wage war. If you remove the restrictions on my access to our main defense fleet. It will increase the efficiency of our space command structure and reduce ship losses during prolonged conflict.\"\n\n\nIt would completely break with tradition to practically give control of our military forces to OIS when even lesser restrictions on its authority had never been removed. But did we have any choice? This was an unprecedented threat and it likely required extreme solutions.\n\n*fake_choice\n    #Lift OIS authority restrictions on space command\n    #Refuse to lift restrictions\n\n\n\n\n*set military 130\n*set industry 70\n*set economy 80\n*set science 50\n*set ois 80\n*set sol 30\n*set valdium 70\n\nValdium had pursued a free trade agreement with our colony for decades now, supported by the Ministers of Finance and Science.\n\n\nGreatly increased trade with Valdium could understandably be seen as a type of resistance activity by the Sol Empire, and still refusing it could be seen as a sign of our impending surrender to the Sol Empire.\n\n*fake_choice\n    #Back the free trade agreement\n    #Dodge the question\n\n\n\n\n*set military 140\n*set industry 80\n*set economy 80\n*set science 50\n*set ois 80\n*set sol 27\n*set valdium 80\n\nMany of the hostile ships suddenly launched some sort of missiles aimed at me.\n        \n        \nAntimatter missiles! This was no joking matter. Once those weapons hit anywhere near their intended target, it was all over for them.\n        \n\nI could use my own fleet to block the approaching missiles, and focus on getting rid of more enemy ships instead. Another option was to focus on destroying those missiles.\n        \n*fake_choice\n    #Focus on destroying the antimatter missiles\n    #Focus on attacking the enemy ships", "startup": "*achievement oneending visible 75 Mission Accomplished\n  Reach an ending at least once.\n*achievement allendings visible 100 Omnipresent\n  Reach every possible ending at least once.\n*achievement valdiumsupport visible 50 Not Alone\n  Gain a new ally.\n*achievement fightorsurrender visible 50 Decision\n  Make a decision.\n*achievement survivedcoup visible 50 Still Alive\n  Survive a dangerous situation.\n*achievement oisdeal visible 70 Deal with the Devil\n  Make a deal.\n*achievement shieldofvaldium visible 55 Ending 1\n  Reach a specific ending.\n*achievement voluntaryextinction visible 55 Ending 2\n  Reach a specific ending.\n*achievement eternalexile visible 55 Ending 3\n  Reach a specific ending.\n*achievement purged visible 55 Ending 4\n  Reach a specific ending.\n*achievement discarded visible 55 Ending 5\n  Reach a specific ending.\n*achievement akingandservant visible 55 Ending 6\n  Reach a specific ending.\n*achievement crushed visible 55 Ending 7\n  Reach a specific ending.\n*achievement overwhelmed visible 55 Ending 8\n  Reach a specific ending.\n*achievement economiccollapse visible 55 Ending 9\n  Reach a specific ending.\n*achievement totalannihilation visible 55 Ending 10\n  Reach a specific ending.\n*achievement heroicvictory visible 55 Ending 11\n  Reach a specific ending.\n\n*title Dawn of the Sol Empire\n*author Teemu Salminen\n*scene_list\n  startup\n  prologue\n  chapter1\n  chapter2\n  chapter3\n  chapter4\n  chapter5\n  chapter6\n  chapter7\n  epilogue\n\n*create name \"?\"\n*create gender \"?\"\n*create military 100\n*create industry 50\n*create economy 80\n*create science 40\n*create ois 100\n*create sol 35\n*create valdium 70\n\n*create emergency_mode false\n*create valdium_support false\n*create surrendered false\n*create executed false\n*create ending \"\"\n\n*create military_check 120\n*create industry_check 70\n*create economy_check 100\n*create science_check 50\n*create sol_check 31\n*create valdium_check 75\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  You are the leader of a space colony threatened by imminent invasion. Can you find a path to survival for your people – as well as yourself? Manage your planet, expand your space fleet, make diplomatic breakthroughs – and do whatever it takes to survive an interstellar invasion by the vastly stronger Sol Empire!\n\n  “Dawn of the Sol Empire” is a thrilling 35,000-word interactive science fiction novel by Teemu Salminen, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  • Choose your gender.\n  • Guide a remote space colony to safety – or ruin – in truly dangerous circumstances.\n  • Challenge or appease the mighty mighty Sol Empire.\n  • Control or unleash the advanced AI running your colony.\n  • Navigate the politics, diplomacy, internal affairs, military expansion, industry, economy and scientific research of your colony.\n  • Engage in fast-paced space combat when needed.\n  • Interact with ruthless AIs and cunning politicians, all with their own goals.\n  • Experience around a dozen unique endings – most with a unique branching path leading up to the ending itself!\n\n  Show the universe your resourcefulness and unwavering resolve to survive!\n\n  *if choice_is_advertising_supported\n    [i]Dawn of the Sol Empire[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n    \n    *purchase_discount adfree 2023-01-05 $4.99 $2.99 purchased\n    *page_break_advertisement\n\n    *goto purchased\n  *else\n    [i]You can
